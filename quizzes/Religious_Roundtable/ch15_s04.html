        <div class="subtitle">Religious Roundtable &mdash; Chapter 15, Section 4</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary mechanism through which Islam fosters community among its adherents?", "options": [{"text": "A common language and shared cultural traditions.", "isCorrect": false, "rationale": "The text explicitly states that the Ummah (Islamic community) is not held together by a common language or shared culture, but by shared practice."}, {"text": "Universal adherence to shared divine obligations and acts of worship.", "isCorrect": true, "rationale": "The text states that Islam 'creates community through shared obligation,' emphasizing the Five Pillars as 'divine commands' whose 'performance is the same everywhere in the world,' and that 'the community is constituted by the act of worship itself.'"}, {"text": "A centralized religious authority guiding global practices.", "isCorrect": false, "rationale": "The text specifically mentions that there is 'no Islamic pope,' indicating a lack of a central authority as the binding mechanism."}, {"text": "A focus on individual spiritual enlightenment through personal reflection.", "isCorrect": false, "rationale": "While personal spirituality is important, the text highlights 'shared obligation' and 'shared practice' as the community-building elements, not primarily individual reflection."}]}, {"question": "An anthropologist observes Muslim communities across various countries and notes consistent prayer rituals and pilgrimage practices, despite significant cultural differences. Based on the provided text, what conclusion would best explain this observation?", "options": [{"text": "These practices are primarily social customs that have been globally adopted over time.", "isCorrect": false, "rationale": "The text clarifies that the Five Pillars are 'divine commands,' not merely social customs, and their performance is an act of submission."}, {"text": "The shared, universal performance of divine commands is fundamental to constituting the global Muslim community.", "isCorrect": true, "rationale": "The text emphasizes that 'their performance is the same everywhere in the world' and that 'the community is constituted by the act of worship itself,' driven by 'divine commands,' explaining the consistency despite cultural variations."}, {"text": "A powerful central religious authority ensures the uniformity of these practices worldwide.", "isCorrect": false, "rationale": "The text explicitly states 'there is no Islamic pope,' ruling out a central authority as the cause of uniformity."}, {"text": "The communities maintain these practices due to strong historical ties to a single, originating culture.", "isCorrect": false, "rationale": "The text states the Ummah is not held together by a 'shared culture,' indicating that a common historical culture is not the primary unifying factor."}]}, {"question": "In Islam, how does the text describe the relationship between the outer forms of worship (like prayer and pilgrimage) and the inner life of an adherent?", "options": [{"text": "Outer forms are merely optional expressions, with true community arising solely from inner sincerity.", "isCorrect": false, "rationale": "The text states the Five Pillars are 'not optional spiritual extras' but 'divine commands,' indicating their mandatory nature, not optional."}, {"text": "The performance of outer forms is itself an act of submission and community membership, though sincerity enriches it.", "isCorrect": true, "rationale": "The text directly states: 'For Islam, the outer form...is commanded by God and its performance is itself the act of submission and community membership -- though it is enriched by sincerity.'"}, {"text": "Outer forms are primarily therapeutic, designed to produce inner transformation rather than obligation.", "isCorrect": false, "rationale": "This description is applied to Buddhism in the text, where outer forms are 'designed to produce inner transformation' and are 'therapeutic, not merely obligatory.'"}, {"text": "Inner virtue (ren) must always precede and give proper shape to the outer forms (li).", "isCorrect": false, "rationale": "This description pertains to Confucianism's concept of 'li' and 'ren,' not Islam."}]}, {"question": "For Buddhists, particularly in the Mahayana tradition, what is the fundamental purpose of taking refuge in the Sangha?", "options": [{"text": "To establish a social network that supports individual material well-being.", "isCorrect": false, "rationale": "The text states the 'monastery is not primarily a social institution,' implying its purpose goes beyond social networking or material support."}, {"text": "To create an environment where conditions for individual and collective liberation become possible.", "isCorrect": true, "rationale": "The text states the 'Sangha provides the conditions under which awakening becomes possible,' and in Mahayana, 'individual liberation and collective liberation are inseparable.'"}, {"text": "To follow a set of divine commands that constitute community membership.", "isCorrect": false, "rationale": "This describes the Islamic approach to community, not the Buddhist one of shared refuge."}, {"text": "To participate in rituals that make human relationships harmonious and legible.", "isCorrect": false, "rationale": "This describes the Confucian approach to community through shared ritual (Li), not Buddhism."}]}, {"question": "A Buddhist monastic community adheres to strict routines, meditation schedules, and vows. Based on the text, what is the primary function of these 'outer forms' within the Buddhist tradition?", "options": [{"text": "To demonstrate obedience to a central religious authority's decrees.", "isCorrect": false, "rationale": "The text does not mention a central authority in Buddhism comparable to how it discusses Islam's lack of one; the focus is on personal and collective liberation."}, {"text": "To standardize social interactions and maintain societal harmony through prescribed etiquette.", "isCorrect": false, "rationale": "This aligns more with the Confucian concept of Li, which governs human interactions for legibility and harmony."}, {"text": "To therapeutically cultivate inner transformation and reduce ego for awakening.", "isCorrect": true, "rationale": "The text explicitly states that for Buddhism, 'the outer form (the monastery, the routines, the vow) is designed to produce inner transformation; it is therapeutic, not merely obligatory.'"}, {"text": "To provide a clear set of obligations that define community membership.", "isCorrect": false, "rationale": "While there are obligations, the text emphasizes their therapeutic purpose for inner transformation, contrasting with Islam's focus on obligation for submission/membership."}]}, {"question": "The text states that in Buddhism, 'You take refuge in the Sangha not just because it helps you, but because you and the Sangha are, in a deep sense, the same thing.' This statement primarily suggests which of the following about the Buddhist concept of community?", "options": [{"text": "The Sangha functions as a collective ego, absorbing individual identities.", "isCorrect": false, "rationale": "The text mentions the Sangha provides structure that 'reduces ego,' not that it absorbs individual identities into a collective ego."}, {"text": "Individual liberation is inherently interconnected with the liberation of the entire community.", "isCorrect": true, "rationale": "This statement is directly followed by 'In Mahayana Buddhism, the community extends outward through the bodhisattva vow: individual liberation and collective liberation are inseparable,' reinforcing the deep interconnectedness suggested by 'you and the Sangha are...the same thing.'"}, {"text": "Adherents must sacrifice their personal spiritual journey for the sake of the communal practice.", "isCorrect": false, "rationale": "The phrase 'not just because it helps you' implies individual benefit is still present, but the relationship is deeper than mere personal gain or sacrifice."}, {"text": "The Sangha is a metaphor for the universal human need for social belonging.", "isCorrect": false, "rationale": "While the Sangha provides belonging, the 'deep sense' of being 'the same thing' points to a profound spiritual interconnectedness beyond a simple social metaphor."}]}, {"question": "What does the text identify as the fundamental element that creates and sustains community in Confucianism?", "options": [{"text": "Adherence to a strict legal code enforced by a powerful state.", "isCorrect": false, "rationale": "The text explicitly states: 'Society is held together not by law (though law matters) or by force (though force exists).'"}, {"text": "Shared forms of ritual (Li) that govern all human interactions.", "isCorrect": true, "rationale": "The text clearly states: 'Confucianism creates community through shared ritual. Li is...the grammar of every human interaction -- how you greet someone, how you eat, how you mourn the dead, how you address your ruler.'"}, {"text": "The collective pursuit of individual spiritual awakening.", "isCorrect": false, "rationale": "This concept is central to Buddhism, not Confucianism, which focuses on social harmony and ethical conduct."}, {"text": "Universal submission to divine commands and obligations.", "isCorrect": false, "rationale": "This describes the Islamic approach to community, not Confucianism."}]}, {"question": "The text describes Li in Confucianism as 'the grammar of every human interaction.' What is the primary implication of this description for a Confucian society?", "options": [{"text": "Li functions as a set of rules that, when memorized, allow for social order but lack deeper meaning.", "isCorrect": false, "rationale": "The text emphasizes that 'li without ren is empty,' indicating that Li is not just rote rules but requires inner virtue to be meaningful."}, {"text": "Li provides the structured forms that make relationships understandable and harmonious, ensuring everyone knows their place.", "isCorrect": true, "rationale": "The text explains: 'Society is held together...by the shared forms that make human relationships legible and harmonious. When everyone knows the ritual, everyone knows where they stand and what is expected of them.'"}, {"text": "Li is a system of artistic expression that individuals use to distinguish themselves within the community.", "isCorrect": false, "rationale": "Li focuses on shared forms and harmony, not individual distinction or artistic expression."}, {"text": "Li is primarily a system of religious ceremonies reserved for specific sacred occasions.", "isCorrect": false, "rationale": "The text states: 'Li is not just what you do at religious ceremonies; it is the grammar of every human interaction,' highlighting its pervasive nature."}]}, {"question": "How does Confucianism, according to the text, describe the relationship between 'li' (outer form) and 'ren' (inner virtue)?", "options": [{"text": "Li is a therapeutic tool designed to transform one's inner ren over time.", "isCorrect": false, "rationale": "The 'therapeutic' description is used for Buddhism, not Confucianism, where the relationship is more about proper expression and meaning."}, {"text": "Ren is solely a personal, internal quality that has no necessary connection to li.", "isCorrect": false, "rationale": "The text refutes this by stating 'ren without li has no proper shape,' indicating a strong connection is necessary."}, {"text": "The relationship is bidirectional: li without ren is empty, but ren without li lacks proper expression.", "isCorrect": true, "rationale": "The text explicitly states: 'the relationship between outer form and inner virtue runs in both directions: li without ren is empty, but ren without li has no proper shape.'"}, {"text": "Li and ren are distinct and separate concepts, with li being externally imposed and ren being internally discovered.", "isCorrect": false, "rationale": "The text emphasizes their interconnectedness and mutual dependence, not separation."}]}, {"question": "All three traditions discussed in the text acknowledge a common human reality. Which of the following best summarizes this shared understanding?", "options": [{"text": "Humans are naturally inclined towards self-sufficiency and thrive best in solitude.", "isCorrect": false, "rationale": "The text directly contradicts this: 'left to our own devices, in isolation, we are not at our best.'"}, {"text": "Genuine community can only be achieved through strict adherence to a single, universally accepted form of ritual.", "isCorrect": false, "rationale": "The text highlights that each tradition has a different 'kind of community, organized how, around what practices,' indicating no single universal form is presented as necessary for all genuine communities."}, {"text": "Individuals require structured communities and shared practices to overcome isolation and achieve their full potential.", "isCorrect": true, "rationale": "The text concludes: 'All three traditions are responding to the same human reality: left to our own devices, in isolation, we are not at our best. We need structures, communities, and shared practices that pull us out of our private worlds and into something larger.'"}, {"text": "The primary purpose of community is to enforce societal laws and maintain political stability.", "isCorrect": false, "rationale": "While law and order may be aspects, the text focuses on spiritual, social, and ethical development and belonging as the core purpose of community in these traditions, not just political stability."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
