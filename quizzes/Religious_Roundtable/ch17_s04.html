<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental paradox inherent in the transcendence-immanence tension?", "options": [{"text": "If God is infinite, God cannot be limited by human understanding.", "isCorrect": false, "rationale": "While related, this option describes a consequence of God's infinity rather than the core paradox of simultaneous transcendence and immanence as presented in the text."}, {"text": "If God is utterly beyond the world, God cannot simultaneously be intimately present in human experience.", "isCorrect": true, "rationale": "The text directly states this tension: 'If God is utterly beyond the world... then how can God be near to us...? And if God is genuinely near... then is God really infinite?' This encapsulates the central paradox."}, {"text": "If God is uncaused, God cannot be responsible for the creation of the world.", "isCorrect": false, "rationale": "The text does not present the uncaused nature of God as conflicting with responsibility for creation in the context of the transcendence-immanence tension."}, {"text": "If God is responsive to us, God must be bound by our prayers and desires.", "isCorrect": false, "rationale": "This option describes a potential implication of responsiveness but is not identified as the foundational paradox of transcendence-immanence in the provided content."}]}, {"question": "Which statement best describes Islam's unique method for navigating the transcendence-immanence tension?", "options": [{"text": "It resolves the tension philosophically by identifying transcendent and immanent aspects as one reality.", "isCorrect": false, "rationale": "This approach, involving philosophical resolution and identification of aspects, is characteristic of Advaita Hinduism, not Islam as described."}, {"text": "It dissolves the categories of transcendence and immanence, viewing ultimate reality as prior to such distinctions.", "isCorrect": false, "rationale": "This method of dissolving categories is attributed to Taoism in the text, not Islam."}, {"text": "It insists on holding both poles of transcendence and immanence simultaneously, relying on revealed scripture as validation.", "isCorrect": true, "rationale": "The text explicitly states: 'Islamic theology does not resolve this tension so much as insist on both sides of it... because it rests on revealed scripture rather than philosophical argument: God has told us that both are true, so both are true.'"}, {"text": "It prioritizes transcendence over immanence, emphasizing God's absolute otherness and separation from creation.", "isCorrect": false, "rationale": "While Islam emphasizes transcendence (tawhid), the text clearly states it holds *both* poles simultaneously, including God's nearness, not just prioritizing transcendence."}]}, {"question": "How does Advaita Hinduism conceptually resolve the transcendence-immanence tension?", "options": [{"text": "It asserts that nirguna Brahman is superior to saguna Brahman, making immanence a lesser truth.", "isCorrect": false, "rationale": "The text states that nirguna Brahman (transcendent) and saguna Brahman (immanent) are 'two aspects of one reality,' not that one is superior to the other."}, {"text": "It maintains that the individual soul (atman) is ultimately identical with the formless absolute (Brahman), experiencing separation only through illusion (maya).", "isCorrect": true, "rationale": "The text states: 'The Advaita school goes further: at the deepest level, atman is Brahman... The experience of separation is the product of maya (illusion). Transcendence and immanence are, at the ultimate level, the same.'"}, {"text": "It requires adherence to specific rituals to bridge the gap between the divine and human experience.", "isCorrect": false, "rationale": "While rituals exist in Hinduism, the text describes a philosophical resolution for this specific tension in Advaita, not a ritualistic one."}, {"text": "It denies the existence of a transcendent divine, focusing solely on the immanent presence of God within creation.", "isCorrect": false, "rationale": "Advaita Hinduism includes *nirguna Brahman*, the transcendent, formless absolute, demonstrating it does not deny transcendence."}]}, {"question": "What does Taoism do with the categories of transcendence and immanence, according to the text?", "options": [{"text": "It defines the Tao as purely transcendent, existing entirely beyond human comprehension.", "isCorrect": false, "rationale": "Taoism does not define the Tao within these categories at all; it views it as prior to them."}, {"text": "It resolves the tension through philosophical argumentation, demonstrating how they are two sides of the same coin.", "isCorrect": false, "rationale": "This philosophical resolution is characteristic of Advaita Hinduism, not Taoism, which takes a different approach."}, {"text": "It dissolves the categories themselves, positing the Tao as prior to such distinctions as 'beyond the world' or 'within the world.'", "isCorrect": true, "rationale": "The text explicitly states: 'It does not hold transcendence and immanence in tension... or resolve them philosophically... Instead, it dissolves the categories themselves. The Tao is prior to \"the distinction between beyond the world\" and within the world.\"'"}, {"text": "It holds both poles in constant tension, embracing the inherent contradiction as a divine mystery.", "isCorrect": false, "rationale": "Holding both poles in tension is the approach attributed to Islam in the text, not Taoism."}]}, {"question": "Despite their differing approaches, what is a shared characteristic among Islam, Advaita Hinduism, and Taoism regarding the ultimate divine reality?", "options": [{"text": "All three emphasize the divine as being merely a very large and powerful thing within the universe.", "isCorrect": false, "rationale": "The text explicitly states: 'None of the three traditions is satisfied with a God (or ultimate reality) that is merely one more thing in the universe, albeit a very large and powerful one.'"}, {"text": "All three provide a definitive philosophical resolution to the transcendence-immanence tension.", "isCorrect": false, "rationale": "Only Advaita Hinduism provides a philosophical resolution; Islam holds the tension, and Taoism dissolves the categories."}, {"text": "All three insist that the divine is fundamentally 'other' than ordinary categories of experience, yet also somehow accessible.", "isCorrect": true, "rationale": "The text notes: 'All three insist that the divine is in some fundamental sense other than the ordinary categories of experience. And yet all three also insist on access.'"}, {"text": "All three rely solely on revealed scripture to understand the nature of the divine.", "isCorrect": false, "rationale": "Only Islam is described as relying on revealed scripture for this tension; Hinduism uses philosophy, and Taoism focuses on responsive alignment."}]}, {"question": "The Advaita school's claim that 'atman is Brahman' raises a significant question, as mentioned in the text. What is this question?", "options": [{"text": "How can a formless Brahman create a world with distinct forms?", "isCorrect": false, "rationale": "While a valid philosophical question, this is not the specific question the text states arises from the 'atman is Brahman' identity in the context of transcendence-immanence."}, {"text": "What is the significance of individual existence if the self (atman) is ultimately identical with the absolute (Brahman)?", "isCorrect": true, "rationale": "The text directly asks: 'if atman is Brahman, what is the significance of individual existence? Is the self ultimately real or ultimately illusory?'"}, {"text": "How can one achieve enlightenment if the path to Brahman is obscured by maya?", "isCorrect": false, "rationale": "Maya explains the *experience of separation*, but the central question raised by the *identity* of atman and Brahman is about the reality of individual existence itself."}, {"text": "Is it possible for a personal God (saguna Brahman) to be truly one with an impersonal absolute (nirguna Brahman)?", "isCorrect": false, "rationale": "This question concerns the relationship between nirguna and saguna Brahman, not the specific implication of the identity of atman and Brahman."}]}, {"question": "Within Islam, the Sufi tradition's primary contribution to navigating the transcendence-immanence tension is its focus on:", "options": [{"text": "Rational philosophical arguments to reconcile God's absolute otherness with His nearness.", "isCorrect": false, "rationale": "The text notes Islam's overall approach 'rests on revealed scripture rather than philosophical argument,' and Sufism focuses on experience, not primarily rational arguments."}, {"text": "The pursuit of mystical experience to feel God's immanent nearness (qurb), rather than merely affirming it.", "isCorrect": true, "rationale": "The text states: 'The Sufi tradition takes the immanence side and pursues it into mystical experience -- qurb, the nearness that can be felt, not just affirmed.'"}, {"text": "Strict adherence to the doctrine of tawhid, emphasizing only God's incomparable transcendence.", "isCorrect": false, "rationale": "While *tawhid* emphasizes transcendence, Sufism specifically emphasizes the *immanence* side, balancing the overall tension, not just one pole."}, {"text": "Developing an elaborate system of rituals to bridge the conceptual gap between divine poles.", "isCorrect": false, "rationale": "The text highlights Sufism's focus on *mystical experience* (qurb) as its distinctive contribution to this tension, not primarily ritual systems."}]}, {"question": "The Taoist concept of 'wu wei' is presented as the appropriate response to understanding the Tao. This implies that 'wu wei' involves:", "options": [{"text": "Deep philosophical meditation to logically categorize the Tao's transcendent and immanent qualities.", "isCorrect": false, "rationale": "Taoism 'dissolves the categories themselves,' meaning it does not seek to logically categorize the Tao within these distinctions."}, {"text": "A responsive, unforced alignment with the natural flow of the Tao, rather than analytical argument.", "isCorrect": true, "rationale": "The text explains: 'The appropriate response is not argument but wu wei -- a responsive, unforced alignment with the Tao as it flows through everything, including you.'"}, {"text": "Rigorous ascetic practices to transcend the physical world and experience the Tao's pure transcendence.", "isCorrect": false, "rationale": "Wu wei is about aligning with the Tao as it flows *through everything*, implying immanent presence, rather than transcending the physical world through asceticism."}, {"text": "Actively striving to resolve the paradox between the Tao being beyond and within the world.", "isCorrect": false, "rationale": "Taoism *dissolves* the categories of beyond/within, so it would not actively strive to resolve a paradox within that framework."}]}, {"question": "The concluding paragraph suggests that the transcendence-immanence tension may not be resolvable. Instead, it might represent:", "options": [{"text": "An insoluble contradiction that invalidates theological claims about the divine.", "isCorrect": false, "rationale": "While the text asks 'Is that a contradiction,' it immediately offers an alternative: '— or is it a description of something real that just does not fit neatly into ordinary language?' It does not conclude it invalidates claims."}, {"text": "A conceptual framework that is fundamentally flawed and should be abandoned by theology.", "isCorrect": false, "rationale": "The text speaks of 'navigating' the tension, implying it is a persistent and significant issue, not one to be abandoned due to flaw."}, {"text": "A description of a real aspect of ultimate reality that transcends ordinary language and logical categories.", "isCorrect": true, "rationale": "The text asks: 'Is that a contradiction — or is it a description of something real that just does not fit neatly into ordinary language?' This implies that the tension might point to a reality beyond conventional understanding."}, {"text": "A temporary philosophical puzzle that will eventually be resolved through advanced logical reasoning.", "isCorrect": false, "rationale": "The text explicitly states the tension 'cannot be resolved — only navigated,' suggesting it is not a temporary puzzle awaiting a logical solution."}]}, {"question": "A student argues that Islam's approach to the transcendence-immanence tension is less 'intellectually ambitious' than Advaita Hinduism's. Based on the text, what is the most appropriate counter-argument?", "options": [{"text": "Islam's approach is intellectually ambitious because it requires advanced linguistic analysis of the Quran.", "isCorrect": false, "rationale": "While linguistic analysis is important in Islam, the text attributes Islam's navigation of the tension to 'revealed scripture' rather than a distinct form of intellectual ambition focused on linguistic analysis for this specific problem."}, {"text": "While Advaita offers a philosophical resolution, Islam's ambition lies in holding both poles simultaneously based on divine revelation, which bypasses philosophical argument.", "isCorrect": true, "rationale": "The text states Advaita is 'the most intellectually ambitious resolution' for its *philosophical resolution*. Islam's ambition is presented differently: 'insist[ing] on both sides of it... because it rests on revealed scripture.' This implies a different *kind* of ambition, one of faithful acceptance of paradox through divine word, rather than philosophical explanation."}, {"text": "Islam actually resolves the tension through the Sufi tradition's focus on immanence, similar to Advaita.", "isCorrect": false, "rationale": "The text clearly states 'Islamic theology does not resolve this tension so much as insist on both sides of it,' and Sufism 'takes the immanence side,' it does not resolve the overall tension for the tradition as a whole."}, {"text": "The text explicitly states that Islam's approach is not intellectually ambitious at all, only fideistic.", "isCorrect": false, "rationale": "The text contrasts Islam's reliance on scripture with Hinduism's 'philosophical argument' and 'intellectually ambitious resolution,' but it does not diminish Islam's approach as 'not intellectually ambitious at all,' merely different in its method."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
