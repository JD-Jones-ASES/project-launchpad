    };

        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 6, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a key difference in the *style* of the Tao Te Ching and the Chuang Tzu?", "options": [{"text": "The Tao Te Ching uses straightforward prose to convey its message, while the Chuang Tzu is primarily a collection of short poems.", "isCorrect": false, "rationale": "The Tao Te Ching uses deliberately paradoxical language, not straightforward prose, and its chapters are not exclusively poems."}, {"text": "The Tao Te Ching employs deliberate paradoxes and concise, often aphoristic chapters, whereas the Chuang Tzu features diverse forms like parables, dialogues, and philosophical arguments.", "isCorrect": true, "rationale": "The text explicitly states the Tao Te Ching uses 'deliberately paradoxical' language in 'eighty-one short chapters,' while the Chuang Tzu is a 'collection of essays, parables, dialogues, and philosophical arguments,' highlighting their stylistic contrast."}, {"text": "The Chuang Tzu focuses exclusively on political advice for rulers, while the Tao Te Ching delves solely into cosmic principles.", "isCorrect": false, "rationale": "The Tao Te Ching alternates between cosmic and political themes, and the Chuang Tzu focuses on broader philosophical exploration rather than exclusively political advice."}, {"text": "The Tao Te Ching is a comprehensive collection of essays, while the Chuang Tzu consists of short, aphoristic statements.", "isCorrect": false, "rationale": "This statement reverses the descriptions; the Tao Te Ching has short chapters and aphorisms, while the Chuang Tzu is known for its diverse forms including essays."}]}, {"question": "According to the text, what is the primary function of the deliberate paradoxes found in the Tao Te Ching?", "options": [{"text": "To present complex puzzles that require logical deduction and extensive academic research to solve.", "isCorrect": false, "rationale": "The text explicitly states that 'The paradoxes are not puzzles to be solved' but rather practices."}, {"text": "To provide clear, unambiguous answers to life's most challenging philosophical questions.", "isCorrect": false, "rationale": "The paradoxical nature of the text is designed to 'unsettle the mind's habit of grabbing for easy answers,' rather than to provide simple solutions."}, {"text": "To unsettle the mind's reliance on easy answers and encourage deeper, more contemplative engagement with the concepts.", "isCorrect": true, "rationale": "The text states, 'The paradoxes are not puzzles to be solved but practices to be sat with—they unsettle the mind's habit of grabbing for easy answers,' indicating their purpose is to challenge conventional thinking."}, {"text": "To demonstrate the author's superior intellectual ability through intricate rhetorical complexity.", "isCorrect": false, "rationale": "While the text is complex, its purpose is described in terms of the reader's experience and spiritual practice, not as a display of authorial intellect."}]}, {"question": "The story of Cook Ding in the Chuang Tzu illustrates the concept of *wu wei* in action. Which of the following best describes this application?", "options": [{"text": "Deliberately forcing one's will upon a task to achieve maximum efficiency through strict control.", "isCorrect": false, "rationale": "Wu wei emphasizes effortless action and natural flow, which contradicts 'deliberately forcing one's will' or 'strict control.'"}, {"text": "Meticulously planning every step of a process in advance to eliminate any potential errors or uncertainties.", "isCorrect": false, "rationale": "Cook Ding's action is described as moving 'exactly as the Tao moves between all things, finding the space that is already there,' implying an intuitive, unforced approach rather than rigid pre-planning."}, {"text": "Performing a task with such natural skill and understanding that one effortlessly navigates existing structures, finding inherent spaces without resistance.", "isCorrect": true, "rationale": "Cook Ding's knife 'never dulls, because he cuts between the joints of the animal exactly as the Tao moves between all things, finding the space that is already there,' exemplifying wu wei as effortless action in harmony with natural patterns."}, {"text": "Relying solely on spontaneous intuition without any prior practice or developed knowledge.", "isCorrect": false, "rationale": "Cook Ding 'has practiced his craft so long' that he achieves this effortless skill, indicating that practiced knowledge is essential, not absent."}]}, {"question": "Beyond the philosophical insights found in the Tao Te Ching and Chuang Tzu, the broader Daozang (Taoist 'Canon') includes texts pertaining to which of the following?", "options": [{"text": "Exclusively historical accounts of ancient Chinese emperors and their court lives.", "isCorrect": false, "rationale": "The Daozang is a much broader collection, not limited to historical accounts of emperors."}, {"text": "Only commentaries on the foundational texts by later scholars.", "isCorrect": false, "rationale": "While it may include commentaries, the text specifies a wider range of content, such as ritual manuals and alchemical texts."}, {"text": "Ritual manuals, meditation guides, alchemical texts, and works on cosmology and medicine.", "isCorrect": true, "rationale": "The text explicitly states that the Daozang 'includes ritual manuals, meditation guides, alchemical texts, and works on cosmology and medicine,' demonstrating its extensive scope."}, {"text": "Strict legal codes and detailed economic principles for governing a state.", "isCorrect": false, "rationale": "These specific categories are not mentioned as part of the Daozang's content; its focus is more on spiritual, practical, and cosmological aspects of Taoism."}]}, {"question": "The Tao Te Ching is noted for its alternation between 'the cosmic and the political.' Which statement best exemplifies this thematic range?", "options": [{"text": "It describes the historical lineage of Taoist masters and their political influence throughout dynasties.", "isCorrect": false, "rationale": "The text does not mention historical lineages as part of the Tao Te Ching's content."}, {"text": "It critiques existing political structures and offers detailed plans for revolutionary societal change.", "isCorrect": false, "rationale": "While it advises on governance, it focuses on wise rulership through inaction rather than critiquing structures or planning revolution."}, {"text": "It explains the Tao as the silent ground of all being and, in another chapter, advises a ruler on how to govern wisely by doing less.", "isCorrect": true, "rationale": "The text directly states, 'in one chapter it describes the Tao as the silent ground of all being; in the next it advises a ruler on how to govern wisely by doing less,' perfectly illustrating its cosmic and political alternation."}, {"text": "It focuses entirely on individual spiritual enlightenment, avoiding any societal or governmental matters.", "isCorrect": false, "rationale": "The text explicitly mentions its 'political' dimension, contradicting the idea that it avoids governmental matters."}]}, {"question": "Why do different translations of the Tao Te Ching often differ quite dramatically?", "options": [{"text": "Many ancient versions of the text contain conflicting passages and interpolations, making a single definitive translation impossible.", "isCorrect": false, "rationale": "While textual variations can exist, the primary reason given in the text is the nature of the classical Chinese language itself."}, {"text": "The original text was written in various regional Chinese dialects, making consistent translation difficult.", "isCorrect": false, "rationale": "The text refers to 'classical Chinese' generally, not to a multitude of dialects as the cause for translation differences."}, {"text": "The classical Chinese language in which it was written inherently allows for multiple readings and interpretations of almost every line.", "isCorrect": true, "rationale": "The text explicitly states, 'different translations of the Tao Te Ching can differ quite dramatically, because the classical Chinese allows multiple readings of almost every line.'"}, {"text": "Translators deliberately alter passages to align with their own modern philosophical interpretations, regardless of the original meaning.", "isCorrect": false, "rationale": "While translator bias can be a factor, the text identifies the ambiguity of classical Chinese as the fundamental reason for dramatic differences, rather than deliberate alteration."}]}, {"question": "Which of the following correctly attributes a foundational Taoist text to its traditional author?", "options": [{"text": "The Chuang Tzu is traditionally attributed to Laozi.", "isCorrect": false, "rationale": "The Chuang Tzu is attributed to Zhuangzi; the Tao Te Ching is attributed to Laozi."}, {"text": "The Daozang is a collection of texts attributed to Cook Ding.", "isCorrect": false, "rationale": "The Daozang is an enormous canon of texts, not attributed to a single author like Cook Ding, who is a character in the Chuang Tzu."}, {"text": "The Tao Te Ching is traditionally attributed to Laozi.", "isCorrect": true, "rationale": "The text clearly states, 'The Tao Te Ching... is attributed to Laozi.'"}, {"text": "Both the Tao Te Ching and the Chuang Tzu were written anonymously by various unknown sages.", "isCorrect": false, "rationale": "Both texts have traditional attributions, to Laozi and Zhuangzi respectively."}]}, {"question": "What unique distinction does the Tao Te Ching hold among the world's literary works, according to the provided text?", "options": [{"text": "It is recognized as the oldest continuously published book in human history.", "isCorrect": false, "rationale": "This claim is not made in the text."}, {"text": "It is considered the most comprehensive and exhaustive philosophical treatise ever written.", "isCorrect": false, "rationale": "The text does not make this superlative claim; it notes its short, eighty-one chapters."}, {"text": "It is the second most translated book in history, after the Bible.", "isCorrect": true, "rationale": "The keyterm for Tao Te Ching explicitly states, 'It is the second most translated book in history after the Bible.'"}, {"text": "It is the only ancient text that successfully combines spiritual wisdom with practical political advice.", "isCorrect": false, "rationale": "While it combines these, the text does not claim it is the *only* ancient text to do so."}]}, {"question": "Which characteristic *does not* describe the Chuang Tzu according to the provided text?", "options": [{"text": "It utilizes parables, dialogues, and philosophical arguments to explore its themes.", "isCorrect": false, "rationale": "The text states the Chuang Tzu is a 'collection of essays, parables, dialogues, and philosophical arguments.'"}, {"text": "It often employs humor, lyrical passages, and paradoxical statements.", "isCorrect": false, "rationale": "The text describes it as 'some comic, some lyrical, some vertiginously strange,' and its keyterm mentions 'humor, and paradox.'"}, {"text": "It is composed of eighty-one short chapters, some barely a paragraph long, with deliberately paradoxical language.", "isCorrect": true, "rationale": "This description belongs to the Tao Te Ching, not the Chuang Tzu. The Chuang Tzu takes a 'completely different approach' stylistically."}, {"text": "It explores the limitations of conventional thinking and the freedom available to those living in harmony with the Way.", "isCorrect": false, "rationale": "The Chuang Tzu keyterm states it 'uses... paradox to explore... the limitations of conventional thinking, and the freedom available to those who live in harmony with the Way.'"}]}, {"question": "Considering both the Tao Te Ching and the Chuang Tzu, what overarching goal do these foundational texts share regarding human existence?", "options": [{"text": "To establish a rigid set of moral laws and religious rituals for society to follow.", "isCorrect": false, "rationale": "The texts emphasize harmony and natural flow rather than rigid laws, and while the broader Daozang includes rituals, the core philosophical texts do not focus on establishing a rigid set of them."}, {"text": "To guide individuals toward living in harmony with the Way (Tao) and achieving a deeper, more intuitive wisdom.", "isCorrect": true, "rationale": "Both keyterms mention 'living in harmony with the Way,' and the Tao Te Ching speaks of 'true wisdom' and the Chuang Tzu of 'freedom available to those who live in harmony with the Way,' indicating this shared overarching goal."}, {"text": "To provide practical instructions for military strategy and political conquest to unite warring states.", "isCorrect": false, "rationale": "While the Tao Te Ching offers political advice, its emphasis is on wise governance through 'doing less,' not military conquest, and this is not a central theme for the Chuang Tzu."}, {"text": "To record the historical events and biographies of ancient Chinese philosophers and rulers.", "isCorrect": false, "rationale": "These texts are primarily philosophical and spiritual, focusing on concepts and ways of living, rather than being historical records or biographies."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
