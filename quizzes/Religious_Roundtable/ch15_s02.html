<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 15, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Confucian thought, what is the primary relationship between 'li' (ritual propriety) and 'ren' (benevolence)?", "options": [{"text": "Li is an optional enhancement to ren, not essential for its expression.", "isCorrect": false, "rationale": "The text states that 'without li, ren has no proper expression,' indicating li is crucial, not optional, for ren's manifestation."}, {"text": "Ren is the internal virtue, while li is its necessary outward expression, and both are interdependent.", "isCorrect": true, "rationale": "The text explicitly states, 'without ren, li is empty performance; without li, ren has no proper expression,' highlighting their essential and interdependent relationship."}, {"text": "Li must always precede ren, as outward actions dictate inner feelings.", "isCorrect": false, "rationale": "While the text suggests li can cultivate feelings, it does not state that li must always precede ren. Analects 3:3 implies ren is a prerequisite for meaningful li."}, {"text": "Ren is a modern interpretation of li, not a foundational Confucian concept.", "isCorrect": false, "rationale": "Ren is defined as 'the central virtue in Confucian ethics' and is foundational, not a modern interpretation of li."}]}, {"question": "Confucius's view on ritual (li) suggests a profound claim about its nature. Which statement best captures this claim?", "options": [{"text": "Ritual is primarily an external performance, a display of social status.", "isCorrect": false, "rationale": "The text refutes this, stating 'Li is not merely external etiquette; it is the embodiment of virtue in social form' and 'ritual was serious. It was not mere ceremony to be performed automatically.'"}, {"text": "Ritual serves as a static expression of pre-existing inner feelings, like a vessel holding water.", "isCorrect": false, "rationale": "The text challenges this 'we might assume that the feelings come first... Confucius suggests the relationship runs the other way as well.'"}, {"text": "The proper performance of ritual actively generates and sustains the feelings and virtues it represents.", "isCorrect": true, "rationale": "The text explicitly states: 'the proper performance of ritual generates and sustains the feelings that give it meaning. When you bow to your parent, you are not merely expressing pre-existing filial love; you are, by the act of bowing, cultivating and reinforcing that love.'"}, {"text": "Ritual's meaning is entirely subjective and depends solely on individual interpretation.", "isCorrect": false, "rationale": "Confucius emphasizes shared forms and understanding in ritual, implying a common, rather than purely subjective, meaning for social harmony."}]}, {"question": "What is the primary purpose of 'ancestral veneration' in Confucian practice, according to the text?", "options": [{"text": "To worship deceased ancestors as deities who can grant favors to the living.", "isCorrect": false, "rationale": "The text explicitly clarifies, 'It is not, strictly speaking, worship of the dead.'"}, {"text": "To sever ties with the past and focus solely on the present and future generations.", "isCorrect": false, "rationale": "Ancestral veneration actively affirms continuity and gratitude towards those who came before, directly contradicting the idea of severing ties."}, {"text": "To express filial piety (xiao) beyond death and affirm one's place in a generational chain.", "isCorrect": true, "rationale": "The text states it 'is an expression of xiao (filial piety) extended beyond death' and that 'the living affirm that they are part of a chain of generations, each of which owes gratitude and care to those who came before.'"}, {"text": "To practice rituals that are purely symbolic with no deeper meaning or personal connection.", "isCorrect": false, "rationale": "Confucius insisted on 'full presence' and understanding in ritual, making it far from purely symbolic or devoid of personal connection."}]}, {"question": "The concept of 'Junzi' (the exemplary person) represents the ideal moral character in Confucianism. How is this character primarily developed?", "options": [{"text": "Through inherited noble lineage and natural talent alone.", "isCorrect": false, "rationale": "The text mentions 'produced by proper education, self-cultivation, and ritual practice,' emphasizing learned virtues rather than solely inherited traits."}, {"text": "By accumulating wealth and achieving high social status.", "isCorrect": false, "rationale": "The definition focuses on 'ideal moral character' rather than material wealth or social status."}, {"text": "Through proper education, continuous self-cultivation, and diligent ritual practice.", "isCorrect": true, "rationale": "The text defines Junzi as 'the ideal moral character produced by proper education, self-cultivation, and ritual practice.'"}, {"text": "By isolating oneself from society to focus on individual spiritual enlightenment.", "isCorrect": false, "rationale": "Confucianism emphasizes social relationships and engagement, making isolation contradictory to the development of an exemplary person within its framework."}]}, {"question": "The Five Relationships are central to Confucian social structure. What is a key characteristic of these relationships?", "options": [{"text": "They are only applicable to family members and close acquaintances.", "isCorrect": false, "rationale": "The relationships include 'ruler and subject,' which extends beyond family and close acquaintances to the broader society."}, {"text": "They mandate that one party always holds absolute authority over the other, with no reciprocal obligations.", "isCorrect": false, "rationale": "The text states, 'Each relationship has specific obligations on both sides,' implying reciprocity, even in hierarchical relationships."}, {"text": "They are fundamental human connections, each with specific, reciprocal obligations.", "isCorrect": true, "rationale": "The text defines them as 'five fundamental human relationships' and notes that 'Each relationship has specific obligations on both sides.'"}, {"text": "They are primarily about individual autonomy and freedom from social constraint.", "isCorrect": false, "rationale": "The Five Relationships establish a structured social order based on mutual obligations, which is the opposite of emphasizing individual autonomy over social constraints."}]}, {"question": "Analects 3:3 states, 'If a person is not benevolent (ren), what has he to do with ritual (li)?' What does Confucius imply about the nature of ritual through this statement?", "options": [{"text": "Ritual is intrinsically valuable, regardless of the performer's inner state.", "isCorrect": false, "rationale": "Confucius implies the opposite; without benevolence, ritual is meaningless or 'empty performance'."}, {"text": "Outer rituals should be completely discarded in favor of internal reflection.", "isCorrect": false, "rationale": "Confucius is 'not abandoning ritual'; rather, he insists it 'must be kept alive from the inside,' meaning inner virtue is necessary for meaningful ritual, not a replacement for it."}, {"text": "Ritual performed without genuine humaneness is empty, potentially dangerous, and lacks true meaning.", "isCorrect": true, "rationale": "The text explains this passage: 'Confucius insists that ritual and music divorced from humaneness are empty and even dangerous. A society can perform all the correct forms while the inner life has rotted away.'"}, {"text": "The meaning of ritual is purely intellectual and requires no emotional engagement.", "isCorrect": false, "rationale": "Confucius emphasizes the connection between ritual and feelings, and the necessity of 'full presence,' which includes emotional and moral engagement."}]}, {"question": "In Analects 3:12, Confucius advises, 'Sacrifice as if present; 'sacrifice to the spirits as if the spirits were present.'' This counsel emphasizes which aspect of ritual performance?", "options": [{"text": "The belief that spirits literally inhabit the ritual space during ceremonies.", "isCorrect": false, "rationale": "The phrase 'as if present' suggests an attitude of profound sincerity and engagement, not necessarily a literal belief in physical presence."}, {"text": "The importance of elaborate physical displays and large gatherings during sacrifices.", "isCorrect": false, "rationale": "The focus is on the internal state and presence of the performer, not the scale or extravagance of the external display."}, {"text": "The necessity of full personal presence, sincerity, and authentic engagement for the ritual to be meaningful.", "isCorrect": true, "rationale": "The text explains, 'The ritual act requires full presence, not mechanical execution. You must be truly there for the ritual to work,' highlighting sincerity and engagement."}, {"text": "The idea that ritual is a purely symbolic act with no real impact on the participants.", "isCorrect": false, "rationale": "Confucius's emphasis on 'full presence' and the idea that rituals 'work' implies a significant impact and meaning, contradicting pure symbolism without effect."}]}, {"question": "How did Confucius view the role of music in society and individual life?", "options": [{"text": "As a pleasant diversion, primarily for entertainment and relaxation.", "isCorrect": false, "rationale": "The text explicitly states: 'Confucius was passionate about music -- and not merely as entertainment.'"}, {"text": "As a powerful tool capable of shaping character, calming emotions, and stabilizing society.", "isCorrect": true, "rationale": "The text highlights, 'The proper music, performed properly, had the power to shape character, calm emotions, and stabilize society' and 'Music is not decoration; it is moral education.'"}, {"text": "As an irrelevant art form that has no bearing on moral cultivation or governance.", "isCorrect": false, "rationale": "Confucius saw music as 'moral education' and linked its quality to society's moral character, indicating it was highly relevant."}, {"text": "As a means to express individual rebellion against societal norms.", "isCorrect": false, "rationale": "Confucius believed 'licentious, exciting music could corrupt the moral character of a society,' suggesting he viewed it as a tool for reinforcing, not rebelling against, moral order."}]}, {"question": "Confucius once refused to discuss the sacrifice to Heaven because he did not understand it well enough. What does this reveal about his approach to ritual?", "options": [{"text": "He believed certain rituals were too sacred for public discussion.", "isCorrect": false, "rationale": "His reason was lack of understanding, not a general sacredness prohibiting discussion. He himself discussed many rituals."}, {"text": "He emphasized that ritual performance must be accompanied by deep understanding and sincerity.", "isCorrect": true, "rationale": "The text directly states: 'This refusal reveals something important: for Confucius, ritual was serious. It was not mere ceremony to be performed automatically. You had to understand what you were doing and why. A ritual performed without understanding was, for Confucius, worse than no ritual at all.'"}, {"text": "He viewed all religious rituals with skepticism and generally avoided them.", "isCorrect": false, "rationale": "He valued rituals like ancestral veneration, court rituals, and family rituals, indicating he did not generally avoid them but approached them with seriousness."}, {"text": "He thought personal feelings were more important than any specific ritual actions.", "isCorrect": false, "rationale": "While he valued inner feelings (ren), he saw li as essential for their proper expression and cultivation. His refusal was about understanding the ritual itself, not prioritizing feelings over action."}]}, {"question": "Considering the various elements discussed (Li, Ren, Five Relationships, Ancestral Veneration, Music), what is the overarching goal of Confucian practice for society?", "options": [{"text": "To encourage individual self-expression and personal liberation above all else.", "isCorrect": false, "rationale": "Confucianism emphasizes social harmony, moral order, and interconnectedness through relationships and rituals, which is often in tension with unrestrained individual liberation."}, {"text": "To establish a rigid hierarchy where obedience is the sole virtue.", "isCorrect": false, "rationale": "While hierarchies exist in the Five Relationships, there are 'specific obligations on both sides' and an emphasis on ren and mutual respect, not solely blind obedience."}, {"text": "To create a harmonious and stable society through moral self-cultivation and proper social conduct.", "isCorrect": true, "rationale": "All discussed concepts—virtue (ren), proper conduct (li), structured relationships, respect for tradition (ancestral veneration), and character-shaping arts (music)—aim to produce 'the exemplary person' and stabilize society, leading to harmony."}, {"text": "To prepare individuals for an afterlife through spiritual enlightenment.", "isCorrect": false, "rationale": "The text focuses on present life, social ethics, and human relationships, not explicitly on preparation for an afterlife or spiritual enlightenment in a transcendent sense."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
