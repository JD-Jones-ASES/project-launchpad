    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 0, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best summarizes the section's primary argument for studying religion?", "options": [{"text": "To encourage individuals to adopt a specific religious tradition.", "isCorrect": false, "rationale": "The text explicitly states, 'Not to adopt their religion,' indicating that the goal is understanding, not conversion."}, {"text": "To equip every educated person with essential historical, cultural, philosophical, and civic understanding.", "isCorrect": true, "rationale": "This option synthesizes the three main reasons (historical/cultural literacy, philosophical necessity, civic necessity) and the introductory statement that 'every educated person — religious or not — needs to understand the world's great religious traditions.'"}, {"text": "To demonstrate the superiority of religious explanations over scientific ones for life's big questions.", "isCorrect": false, "rationale": "The text clarifies that science doesn't answer these questions 'not because science is wrong, but because these questions fall outside the scope of what science is designed to do,' avoiding claims of religious superiority."}, {"text": "To provide a comprehensive overview of the world's largest religious groups and their doctrines.", "isCorrect": false, "rationale": "While the 'Did You Know' section offers some statistics, providing an overview of groups and doctrines is not presented as the primary *argument* for why *every educated person* should study religion, but rather an outcome or supporting detail of its prevalence."}]}, {"question": "A student is analyzing a historical account of the American founding. According to the text's argument for 'historical and cultural literacy,' what critical element might they overlook if they neglect the religious context of that era?", "options": [{"text": "The scientific advancements that influenced the framers' understanding of natural law.", "isCorrect": false, "rationale": "While the history of science is mentioned in relation to religion, the text specifically states religion is 'woven into every thread' of the American founding, indicating a deeper influence than just scientific advancements."}, {"text": "The profound influence of religious thought on the motivations and beliefs that shaped the founding.", "isCorrect": true, "rationale": "The text states, 'When you study the American founding... religion is woven into every thread,' implying that neglecting this context would lead to missing crucial motivations and beliefs."}, {"text": "The philosophical necessity of establishing a government entirely separate from religious institutions.", "isCorrect": false, "rationale": "The text discusses philosophical necessity as a separate reason for studying religion, focusing on existential questions, not specifically the separation of church and state in historical context, though related."}, {"text": "The artistic and architectural styles prevalent in places of worship during the colonial period.", "isCorrect": false, "rationale": "While art and architecture (e.g., cathedrals) are mentioned as products of religious context, the question pertains to understanding the American founding itself, which extends beyond mere aesthetic appreciation of religious structures."}]}, {"question": "The text states that science does not answer questions like 'Is there a purpose to human life?' or 'What do we owe to each other?' What is the author's reasoning for this limitation of science?", "options": [{"text": "Science is inherently flawed and incapable of addressing abstract or subjective human experiences.", "isCorrect": false, "rationale": "The text explicitly states these questions fall outside the scope of science, 'not because science is wrong,' which contradicts the idea of science being inherently flawed."}, {"text": "These questions fall outside the defined scope and methodological approach that science is designed to employ.", "isCorrect": true, "rationale": "The text directly states, 'not because science is wrong, but because these questions fall outside the scope of what science is designed to do,' highlighting a boundary in methodology and purpose."}, {"text": "Religious traditions have already provided definitive and universally accepted answers to these questions.", "isCorrect": false, "rationale": "The text mentions religion has been confronting these questions for thousands of years, implying a continuous engagement, not that definitive, universally accepted answers have been found that preclude further inquiry."}, {"text": "Scientists typically lack the philosophical and ethical training required to seriously consider such profound dilemmas.", "isCorrect": false, "rationale": "The text focuses on the *nature of science* as a discipline, not the personal training or capabilities of individual scientists, as the reason for this limitation."}]}, {"question": "Imagine a situation where a professional needs to collaborate with colleagues from various religious and non-religious backgrounds on a complex project. According to the text's concept of 'civic necessity,' what is the most effective approach for this professional to foster productive collaboration when faced with differing deep convictions?", "options": [{"text": "To identify and focus solely on the shared secular goals of the project, setting aside all personal beliefs.", "isCorrect": false, "rationale": "While focusing on shared goals is important, the text advocates for understanding others' 'deepest convictions' rather than setting them aside, as these convictions influence perspectives."}, {"text": "To passively tolerate different viewpoints, but primarily pursue their own strategic agenda for the project.", "isCorrect": false, "rationale": "The text defines true understanding as 'something stronger' than 'tolerance in the weak sense of merely putting up with people.'"}, {"text": "To proactively strive to understand colleagues' perspectives, taking their most serious commitments into account, even without agreeing.", "isCorrect": true, "rationale": "This aligns directly with the text's definition of understanding under civic necessity: 'the ability to see the world as another person sees it...and to take their most serious commitments seriously.'"}, {"text": "To respectfully challenge any convictions that seem to obstruct the project's progress or contradict rational decision-making.", "isCorrect": false, "rationale": "The text emphasizes understanding 'why' people believe what they do, not challenging their convictions from one's own rational framework, especially as an initial approach."}]}, {"question": "The text differentiates between 'understanding' religion and merely 'agreeing' with it or 'tolerating' it in a weak sense. What does this distinction fundamentally emphasize about the goal of studying religion?", "options": [{"text": "That the primary aim is to identify and resolve conflicts between different belief systems through logical argumentation.", "isCorrect": false, "rationale": "The text focuses on empathetic understanding and taking commitments seriously, not on conflict resolution through argumentation or necessarily identifying common ground for agreement."}, {"text": "That the study aims for deep, empathetic engagement with other perspectives, without requiring personal endorsement or superficial acceptance.", "isCorrect": true, "rationale": "This statement captures the essence of the text's definition: 'Understanding is not the same as agreement... It is something stronger: the ability to see the world as another person sees it... and to take their most serious commitments seriously.'"}, {"text": "That individuals should maintain a strictly objective, academic distance, avoiding any personal connection or empathy with religious adherents.", "isCorrect": false, "rationale": "The emphasis on 'seeing the world as another person sees it' implies a form of empathetic engagement, which goes beyond mere objective distance."}, {"text": "That the ultimate purpose is to assess the truth claims of various religions and determine their validity.", "isCorrect": false, "rationale": "While philosophical questions are raised, the text frames the study as understanding 'what other people believe and why,' not as a tribunal to judge the truth claims of religions."}]}, {"question": "According to the 'Did You Know' section, approximately what percentage of the world's population identifies with a religious group?", "options": [{"text": "31%", "isCorrect": false, "rationale": "31% is the approximate percentage of Christians, the largest single religious group, not the total percentage of religiously affiliated people globally."}, {"text": "16%", "isCorrect": false, "rationale": "16% is the approximate percentage of the population that identifies as religiously unaffiliated, not religiously affiliated."}, {"text": "84%", "isCorrect": true, "rationale": "The 'Did You Know' section states, 'approximately 84% of the world's population identifies with a religious group.'"}, {"text": "6.7 billion", "isCorrect": false, "rationale": "6.7 billion is the *number* of people, not the percentage, that identifies with a religious group."}]}, {"question": "An individual who identifies as an atheist states, 'I don't believe in God, so religious texts and philosophies have no value for me.' Based on the text's argument for 'philosophical necessity,' what valid counterpoint could be offered?", "options": [{"text": "Studying religion would show them how science has disproven many religious claims, reinforcing their atheism.", "isCorrect": false, "rationale": "The text states science's limits are not due to religion being wrong, and it does not advocate using religious study to 'disprove' claims, but to engage with profound questions."}, {"text": "Religious texts offer a unique lens through which humanity has consistently confronted fundamental existential and ethical questions.", "isCorrect": true, "rationale": "The 'philosophical necessity' section argues that religion 'asks the hardest questions there are' about purpose, ethics, and existence, and that 'accumulated thinking is worth taking seriously,' regardless of one's personal belief in God."}, {"text": "Engaging with religious philosophy will inevitably lead them to reconsider their lack of belief in a higher power.", "isCorrect": false, "rationale": "The text does not suggest that studying religion leads to conversion or a change in personal belief; its purpose is understanding, not adoption of faith."}, {"text": "The study would primarily serve to prepare them for respectful debates with religious believers.", "isCorrect": false, "rationale": "While understanding can aid respectful dialogue, the text emphasizes a deeper engagement with 'accumulated thinking' on fundamental questions, not merely preparing for debates."}]}, {"question": "The text opens by stating that 'regardless of where you begin' (religious, non-religious, or unsure), there are compelling reasons to study religion. This statement most strongly suggests that the study of religion is presented as:", "options": [{"text": "A niche academic pursuit primarily for those with existing religious inclinations or academic interest in theology.", "isCorrect": false, "rationale": "The phrase 'every educated person — religious or not' directly contradicts the idea of it being a niche pursuit for only certain individuals."}, {"text": "A critical component of a comprehensive education essential for all individuals navigating a complex global society.", "isCorrect": true, "rationale": "This option synthesizes the universal appeal ('regardless of where you begin,' 'every educated person') with the three broad reasons (historical, philosophical, civic necessity) which highlight its criticality for living in the world."}, {"text": "An optional cultural enrichment, less vital for understanding the world than scientific or purely secular historical studies.", "isCorrect": false, "rationale": "The text argues that without religious context, 'enormous portion of human achievement' is 'unintelligible,' implying it is *not* optional or less vital."}, {"text": "A personal spiritual journey intended to help individuals discover their own truth and meaning in life.", "isCorrect": false, "rationale": "While religion deals with such questions, the text focuses on the academic, cultural, and civic benefits of studying religion for understanding the world and others, rather than primarily personal spiritual discovery."}]}, {"question": "A student argues that because modern society is increasingly secular, understanding religious traditions is becoming less relevant. Which two of the text's primary reasons for studying religion *most directly* challenge this student's claim by highlighting persistent, universal relevance?", "options": [{"text": "Historical and Cultural Literacy, and Philosophical Necessity.", "isCorrect": true, "rationale": "These two reasons argue that religion is fundamental to understanding human history, culture, and enduring existential questions, aspects that remain relevant regardless of contemporary secular trends."}, {"text": "Philosophical Necessity, and the need to promote religious tolerance in a diverse world.", "isCorrect": false, "rationale": "While philosophical necessity is strong, 'tolerance' is presented as a weaker form of understanding in the text, and 'promotion' is not a primary reason. Civic necessity (which includes understanding in a diverse world) would be a stronger fit than just tolerance, but historical/cultural literacy also has strong universal relevance."}, {"text": "Civic Necessity, and the spiritual benefits derived from engaging with faith traditions.", "isCorrect": false, "rationale": "Civic necessity is relevant, but the text does not present 'spiritual benefits' as a reason for *studying* religion for everyone, especially for someone claiming it's irrelevant due to secularism. It focuses on external impacts."}, {"text": "Cultural Literacy, and the statistical fact that most of the world's population identifies as religious.", "isCorrect": false, "rationale": "Cultural Literacy is one strong reason, but the statistical fact (while supportive) is a detail, not one of the main *reasons* for its relevance in the same conceptual category as 'philosophical necessity.'"}]}, {"question": "When the text cites 'the great cathedrals of Europe' and 'the art of India' as examples of things 'unintelligible without religious context,' it is primarily illustrating which specific benefit of studying religion?", "options": [{"text": "Philosophical necessity, by showing how religion inspires monumental human achievement.", "isCorrect": false, "rationale": "While these achievements may be philosophically inspired, the text places them specifically under 'historical and cultural literacy,' focusing on their role in shaping human civilization and art."}, {"text": "Civic necessity, by demonstrating the global reach and influence of various religious communities.", "isCorrect": false, "rationale": "Civic necessity focuses on understanding living people with diverse beliefs to navigate shared spaces, not primarily on the interpretation of historical art or architecture."}, {"text": "Historical and cultural literacy, as these represent major achievements deeply embedded in religious traditions.", "isCorrect": true, "rationale": "These examples are provided directly under the first reason, 'historical and cultural literacy,' highlighting how religion is integral to understanding human civilization's art, architecture, and other achievements."}, {"text": "The didactic role of religion in teaching moral lessons through visual and artistic narratives.", "isCorrect": false, "rationale": "While religion can have a didactic role, the text's emphasis in this context is on these creations being *unintelligible* without religious *context*, rather than their function as moral lessons."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
