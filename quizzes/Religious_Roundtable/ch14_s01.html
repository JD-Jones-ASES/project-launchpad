        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>

        <div class="subtitle">Religious Roundtable &mdash; Chapter 14, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is presented as the fundamental grounding of Christian ethics, from which all other moral obligations flow?", "options": [{"text": "The Ten Commandments and prophetic calls for justice.", "isCorrect": false, "rationale": "While the Ten Commandments and prophetic calls are part of Christian ethics, the text states they 'flow from' a deeper, double source, rather than being the fundamental grounding themselves."}, {"text": "The two great commandments: love God and love your neighbor.", "isCorrect": true, "rationale": "The text explicitly states that Jesus identified 'love God with all your heart, soul, and mind; and love your neighbor as yourself' as the foundation, adding, 'On these two commandments hang all the law and the prophets.'"}, {"text": "The Beatitudes as a description of ideal character.", "isCorrect": false, "rationale": "The Beatitudes describe the character of those in the Kingdom of God, but the text identifies the two great commandments as the foundational source from which all other obligations, including these ideals, ultimately stem."}, {"text": "The apostolic letters on how communities should live.", "isCorrect": false, "rationale": "Apostolic letters provide guidance for community living, but the text categorizes them as flowing 'from this double source' of love God and neighbor, not as the root grounding."}]}, {"question": "The text describes 'agape' as central to Christian ethics. Which of the following best characterizes agape?", "options": [{"text": "A sentimental or romantic feeling, often expressed in greeting cards.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating that Paul's description of agape 'is not a sentimental greeting card — it is a complete moral program.'"}, {"text": "A love focused primarily on friendship and shared interests.", "isCorrect": false, "rationale": "The text differentiates agape from 'friendship love (philia),' indicating it is distinct from love based primarily on shared interests."}, {"text": "Unconditional, self-giving love that forms a complete moral program.", "isCorrect": true, "rationale": "The text defines agape as 'unconditional, self-giving love' and states that Paul's meditation on it is 'a complete moral program,' placing it at the center of Christian ethics."}, {"text": "Love that is earned through moral achievement and good works.", "isCorrect": false, "rationale": "Agape is presented as unconditional, and Christian ethics emphasizes that the good life is not 'earned by following rules,' but grows naturally."}]}, {"question": "What is the primary implication of the Sermon on the Mount 'refusing to be merely reasonable' and pushing 'past the boundaries of prudential calculation'?", "options": [{"text": "It suggests that Christian ethics is irrational and impractical for daily life.", "isCorrect": false, "rationale": "The text does not imply irrationality; instead, it highlights that the ethics transcend typical human calculation, pointing to 'something more demanding and more hopeful' rather than being impractical."}, {"text": "It indicates that its commands are primarily for spiritual leaders, not ordinary believers.", "isCorrect": false, "rationale": "The text presents the Sermon on the Mount as 'the heart of Jesus's ethical teaching,' implying it's a vision for all who belong to the Kingdom, without making a distinction for leaders only."}, {"text": "It highlights that Christian ethics demands a different kind of life, rooted in the values of the Kingdom of God.", "isCorrect": true, "rationale": "The text explains that these commands 'push past the boundaries of prudential calculation into something more demanding and more hopeful: the ethics of a Kingdom that has already begun but has not yet fully arrived,' describing 'a different kind of life.'"}, {"text": "It means Christians are encouraged to be careless and not worry about practical consequences.", "isCorrect": false, "rationale": "While the Sermon mentions 'Do not worry about tomorrow,' the overall context is about trust in God and prioritizing Kingdom values, not advocating for carelessness or irresponsibility in general."}]}, {"question": "The text states that the Greek word 'makarios,' translated as 'blessed' in the Beatitudes, carries a meaning closer to 'fully alive' or 'living well in the deepest sense.' What does this deeper meaning imply about the Beatitudes?", "options": [{"text": "They are a list of virtuous actions that, once achieved, grant God's favor and happiness.", "isCorrect": false, "rationale": "The text explicitly states, 'The Beatitudes do not say Try hard to be meek' or 'Work to become merciful.' They say the meek and merciful are already blessed. This isn't about achievement for reward."}, {"text": "They describe an external state of material prosperity that is a sign of God's blessing.", "isCorrect": false, "rationale": "The Beatitudes mention 'poor in spirit,' 'they that mourn,' 'the meek,' which are counter-intuitive to material prosperity as the world defines it, turning 'ordinary moral calculations upside down.'"}, {"text": "They define an aspirational moral standard that believers should continuously strive for to receive future rewards.", "isCorrect": false, "rationale": "The text questions, 'What does it mean to be blessed before you have achieved anything? How is this different from a system of moral reward?' highlighting that it's not simply an aspirational standard for future reward."}, {"text": "They describe the intrinsic character and condition of those who are truly flourishing in God's Kingdom, regardless of worldly success.", "isCorrect": true, "rationale": "The text concludes, 'This is not moral advice. It is a description of a different kind of life' – one where those who are poor in spirit, mourn, are gentle, and hunger for justice 'are the ones who are truly flourishing.'"}]}, {"question": "How does the text distinguish between 'justification' and 'sanctification' in Christian ethics?", "options": [{"text": "Justification is the ongoing process of growing in holiness, while sanctification is the initial declaration of righteousness.", "isCorrect": false, "rationale": "This reverses the definitions provided. Justification is the declaration of righteousness, and sanctification is the ongoing growth in holiness."}, {"text": "Justification is a human effort to follow rules for moral achievement, while sanctification is God's work.", "isCorrect": false, "rationale": "Justification is what God does, declaring righteousness 'not through moral achievement.' Sanctification is the 'ongoing work of the Holy Spirit,' not primarily a human effort to earn something."}, {"text": "Justification is God declaring a believer righteous through faith, and sanctification is the subsequent process of spiritual growth.", "isCorrect": true, "rationale": "The text states: 'Justification is what God does: the believer is declared righteous through faith in Christ... Once justified, the Christian is called to grow in holiness — sanctification — through the ongoing work of the Holy Spirit.'"}, {"text": "Justification is optional for Christians, but sanctification is a mandatory requirement for salvation.", "isCorrect": false, "rationale": "The text does not present justification as optional, nor does it state sanctification is a 'mandatory requirement for salvation,' but rather a calling once justified, where the 'good life... grows naturally.'"}]}, {"question": "The text refers to the 'already and not yet' of the Kingdom of God in relation to Christian ethics. What does this phrase signify?", "options": [{"text": "That believers should only focus on the future Kingdom and disregard present moral actions.", "isCorrect": false, "rationale": "The text presents the Sermon on the Mount as 'the ethics of a Kingdom that has already begun,' implying that present moral actions are significant precisely because the Kingdom has already started, not to be disregarded."}, {"text": "That the Kingdom of God has fully arrived, and therefore all ethical challenges have been resolved.", "isCorrect": false, "rationale": "The phrase 'not yet fully arrived' directly contradicts the idea that ethical challenges are fully resolved or that the Kingdom is complete."}, {"text": "That the Kingdom of God has begun to exert its influence in the present, but its full realization and perfection are still awaited.", "isCorrect": true, "rationale": "The text uses this phrase to describe 'the ethics of a Kingdom that has already begun but has not yet fully arrived,' indicating both a present reality and a future hope/fulfillment."}, {"text": "That ethical teachings are relevant only for the 'not yet' future, rather than for the 'already' present.", "isCorrect": false, "rationale": "The ethical teachings like the Sermon on the Mount are presented as active guides for the present life, informed by a Kingdom that 'has already begun,' not just for a future state."}]}, {"question": "The text states, 'The Christian moral life is not primarily a matter of compliance with a code; it is a matter of becoming a person capable of genuine love.' What is the best application of this statement?", "options": [{"text": "Christians are free from any moral obligations or rules, as long as they feel love in their hearts.", "isCorrect": false, "rationale": "The text does not negate moral obligations entirely but states they 'flow from' love. It's about genuine love leading to moral action, not a dismissal of all rules."}, {"text": "Moral rules and laws are irrelevant in Christianity because love is the only requirement.", "isCorrect": false, "rationale": "The text says 'Every other moral obligation -- the Ten Commandments... flows from this double source' of love, indicating they are still relevant, but not the primary focus themselves."}, {"text": "The focus of Christian ethics is on the internal transformation of character that naturally produces right actions.", "isCorrect": true, "rationale": "This aligns with 'becoming a person capable of genuine love' and the idea of sanctification where the 'good life... grows naturally, as fruit grows from a healthy tree,' emphasizing internal transformation over mere external compliance."}, {"text": "Achieving moral perfection through strict adherence to rules is the ultimate goal of the Christian life.", "isCorrect": false, "rationale": "The text explicitly states 'The good life is not earned by following rules' and emphasizes love as the foundation, countering the idea of strict rule-adherence for perfection."}]}, {"question": "According to the 'DID YOU KNOW?' section, what makes Paul's description of love in 1 Corinthians 13 significant for Christian ethics?", "options": [{"text": "It serves as a guideline for romantic relationships only, due to its poetic language.", "isCorrect": false, "rationale": "The text explicitly states it's 'not a sentimental greeting card' and identifies it as a 'complete moral program,' indicating a broader application beyond just romantic relationships."}, {"text": "It is a list of emotional states that believers should cultivate to feel good.", "isCorrect": false, "rationale": "The text describes it as a 'complete moral program,' implying a comprehensive ethical framework rather than just a pursuit of good feelings."}, {"text": "It presents a comprehensive ethical framework for how Christians should live, encompassing attitudes and actions.", "isCorrect": true, "rationale": "The text labels it 'a complete moral program,' indicating it's a holistic guide for Christian living, encompassing various aspects of character and behavior (patient, kind, not envious, etc.)."}, {"text": "It is an example of philia (friendship love) elevated to a spiritual level.", "isCorrect": false, "rationale": "The definition of agape explicitly states it is 'Distinct from friendship love (philia),' so Paul's description of agape would not be an example of philia."}]}, {"question": "Jesus's commands in the Sermon on the Mount, such as 'Blessed are the meek' or 'Love your enemies,' are described as counter-intuitive. What does this reveal about the nature of Christian morality?", "options": [{"text": "Christian morality is designed to defy all societal norms and common sense.", "isCorrect": false, "rationale": "While it challenges common calculations, it's not about defying all norms arbitrarily, but rather about embodying the values of a different Kingdom, which often transcends or redefines worldly wisdom."}, {"text": "It demands a radical reorientation of values that often contradicts conventional worldly wisdom.", "isCorrect": true, "rationale": "The text states the Sermon 'refuses to be merely reasonable' and that 'The Beatitudes turn ordinary moral calculations upside down,' describing a 'different kind of life' where worldly 'losers' are truly flourishing. This reflects a radical reorientation."}, {"text": "These commands are meant metaphorically and are not to be taken literally in practice.", "isCorrect": false, "rationale": "The text presents these as demanding ethical principles, not mere metaphors. 'Love your enemies' is contrasted with 'most moral systems settle for do not harm your enemies,' suggesting a practical, albeit challenging, command."}, {"text": "They are exclusive to specific spiritual disciplines and not applicable to everyday situations.", "isCorrect": false, "rationale": "The Sermon on the Mount is presented as 'the heart of Jesus' ethical teaching' and a 'concentrated summary of Christian moral vision,' implying broad applicability to the life of a believer, not just specialized disciplines."}]}, {"question": "The text states that 'The Beatitudes do not say 'Try hard to be meek' or 'Work to become merciful.' They say the meek and merciful are already blessed.' This implies what about the Beatitudes?", "options": [{"text": "They describe inherent qualities that are either present or absent in an individual, with no room for growth.", "isCorrect": false, "rationale": "While they describe a present state of blessing, this does not preclude growth. The concept of sanctification (growing in holiness) is central to Christian ethics, suggesting ongoing transformation."}, {"text": "They are divine declarations of blessing upon a certain type of character, rather than a checklist for moral achievement.", "isCorrect": true, "rationale": "The text highlights, 'What does it mean to be blessed before you have achieved anything? How is this different from a system of moral reward?' This points to the Beatitudes as declarations of blessing on a character type, not an earning process."}, {"text": "They mean that human effort is completely unnecessary in the pursuit of a virtuous life.", "isCorrect": false, "rationale": "While blessing isn't earned by effort, the Christian life still involves actively 'growing in holiness' (sanctification), which implies engagement and discipleship, not passive inaction."}, {"text": "They are a system of moral reward where blessing is granted only after successfully demonstrating virtues.", "isCorrect": false, "rationale": "The text explicitly asks, 'How is this different from a system of moral reward?' and frames 'blessed' as a present reality ('already blessed'), not a future reward contingent on prior achievement."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
