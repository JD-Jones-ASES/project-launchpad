<script>
var QUESTIONS = [{"question": "According to the Norse creation story, which of the following sets of gifts transformed Ask and Embla from inert trees into the first man and woman?", "options": [{"text": "An immortal soul, free will, and divine purpose.", "isCorrect": false, "rationale": "The text explicitly states that the Norse creation story does not say humans carry a divine spark or an immortal soul, nor does it emphasize free will in the way many other traditions do."}, {"text": "Breath/life-force, sense/consciousness, and blood/goodly color.", "isCorrect": true, "rationale": "The text directly states these were the three gifts: 'ond (breath, life-force), s'er (sense and consciousness), and blood and goodly color (warmth).'"}, {"text": "Physical strength, cunning intellect, and a warrior's heart.", "isCorrect": false, "rationale": "While these might be valued characteristics in Norse culture, they are not described as the fundamental gifts that created the first humans."}, {"text": "A divine spark, spiritual insight, and eternal life.", "isCorrect": false, "rationale": "The text explicitly states that the Norse creation story does not say humans carry a divine spark or an immortal soul, nor does it suggest eternal life in this context."}]}, {"question": "The Norse creation story explicitly *avoids* stating which of the following about human beings?", "options": [{"text": "They are physical beings belonging to this world.", "isCorrect": false, "rationale": "The text clearly states, 'We are not primarily spiritual beings having a physical experience; we are physical beings... The Norse view of the human person is fundamentally earthy: we belong to this world, we are part of it, and we will return to it.' This is an affirmation, not an avoidance."}, {"text": "They are primarily spiritual beings with an immortal soul.", "isCorrect": true, "rationale": "The text explicitly states: 'It does not say that humans carry a divine spark or an immortal soul. It does not say that humans are the pinnacle of creation... We are not primarily spiritual beings having a physical experience; we are physical beings...'"}, {"text": "Their lives are woven by the Norns before birth.", "isCorrect": false, "rationale": "While this is a key aspect of Norse anthropology, the creation story itself is distinct from the concept of fate woven by the Norns, which is introduced later as the 'second great element.'"}, {"text": "They are capable of courage in the face of hardship.", "isCorrect": false, "rationale": "This describes the Norse heroic ideal, which is discussed as a consequence of their view on fate, not something the creation story 'does not say' about human nature."}]}, {"question": "The Norse concept of 'ond' is best understood as:", "options": [{"text": "An immortal soul that continues to exist after the body's death.", "isCorrect": false, "rationale": "The text explicitly defines 'ond' as 'not a ghost that lives after death,' differentiating it from an immortal soul in that sense."}, {"text": "The animating life-force that gives a living body movement and breath.", "isCorrect": true, "rationale": "The KEY TERM box defines 'ond' as 'breath or life-force... the animating spirit... the principle that makes a living body alive.'"}, {"text": "The divine spark that connects humans directly to the gods.", "isCorrect": false, "rationale": "The text states the creation story 'does not say that humans carry a divine spark,' making this option incorrect for 'ond.'"}, {"text": "The inherent free will that allows humans to defy their destiny.", "isCorrect": false, "rationale": "The concept of 'ond' relates to animation and life, not free will, and the text emphasizes that 'a person cannot escape their wyrd.'"}]}, {"question": "A contemporary philosopher argues that human existence is primarily defined by an eternal, immaterial essence that temporarily inhabits a physical body. Based on the provided text, how would the Norse pagan view most likely respond to this argument?", "options": [{"text": "It would fully endorse this view, as 'ond' represents the eternal essence.", "isCorrect": false, "rationale": "The text clarifies that 'ond' is not an immortal soul, and the Norse view is 'fundamentally earthy,' directly opposing the idea of an eternal, immaterial essence."}, {"text": "It would partially agree, acknowledging the importance of a spiritual component alongside the physical.", "isCorrect": false, "rationale": "The text states, 'We are not primarily spiritual beings having a physical experience; we are physical beings...,' suggesting a fundamental disagreement with the premise, not a partial agreement."}, {"text": "It would fundamentally disagree, emphasizing humans as physical beings belonging to the earthly world.", "isCorrect": true, "rationale": "The text explicitly counters the idea of humans as primarily spiritual beings, stating the Norse view is 'fundamentally earthy: we belong to this world, we are part of it, and we will return to it.'"}, {"text": "It would find the concept irrelevant, as Norse thought focuses solely on the actions of gods.", "isCorrect": false, "rationale": "The entire section is about Norse anthropology—the understanding of the human person—making such a concept highly relevant to their philosophy."}]}, {"question": "Which statement most accurately describes the Norse concept of 'wyrd'?", "options": [{"text": "It is a simple predestination that completely dictates every human choice.", "isCorrect": false, "rationale": "The KEY TERM box for 'wyrd' explicitly states, 'wyrd is not simple predestination.'"}, {"text": "It is a cosmic web of accumulated patterns, including choices and conditions, from which one cannot escape.", "isCorrect": true, "rationale": "The text defines 'wyrd' as 'a complex, interconnected web in which your choices, your character, and the conditions of your birth all interweave' and states, 'A person cannot escape their wyrd.'"}, {"text": "It refers to the individual's free will to forge their own path entirely independent of external forces.", "isCorrect": false, "rationale": "This contradicts the core idea that 'a person cannot escape their wyrd' and that 'you are a being embedded in a cosmic web whose threads were set before your birth.'"}, {"text": "It is a divine blessing that guarantees success and a glorious afterlife for heroes.", "isCorrect": false, "rationale": "'Wyrd' is about destiny and fate, which applies to all beings including gods, and does not guarantee success or specific afterlife conditions."}]}, {"question": "The fact that the Norns weave the threads of destiny for all living things, including the gods, primarily implies what about the Norse understanding of existence?", "options": [{"text": "Humans are fundamentally superior to the gods due to their unique spiritual gifts.", "isCorrect": false, "rationale": "The text provides no basis for human superiority over gods; instead, it establishes a shared condition of being subject to fate."}, {"text": "Individual free will is an illusion, and all actions are predetermined down to the smallest detail.", "isCorrect": false, "rationale": "The text states 'wyrd is not simple predestination' and emphasizes that one can control 'the quality of how you live within it,' suggesting agency within fate, not total predetermination of actions."}, {"text": "All beings, divine and mortal, are bound by a pervasive, pre-existing cosmic order.", "isCorrect": true, "rationale": "The text emphasizes that 'Every human being's life is woven by the Norns before birth. The three Norns... spin the threads of destiny for all living things, gods included,' implying a universal, inescapable cosmic order."}, {"text": "The gods are benevolent protectors who can alter human fate at will.", "isCorrect": false, "rationale": "The text explicitly states 'even the gods cannot escape it,' meaning they cannot arbitrarily alter fate, their own or others'."}]}, {"question": "A Norse warrior, aware of a prophecy that predicts their unavoidable death in a coming battle, decides to lead a charge against overwhelming enemy forces. Which aspect of the Norse heroic ideal does this action best exemplify?", "options": [{"text": "The belief that one's ultimate fate can be changed through extraordinary courage.", "isCorrect": false, "rationale": "The text states, 'Because you cannot escape what has been woven for you,' indicating that fate itself cannot be changed, only how one faces it."}, {"text": "The triumph of individual free will over the predetermined forces of wyrd.", "isCorrect": false, "rationale": "The Norse view emphasizes acceptance of wyrd, not triumph over it. Agency lies in character and response, not in altering the fated outcome."}, {"text": "Facing overwhelming odds with clear eyes and not flinching, despite knowing the inevitable outcome.", "isCorrect": true, "rationale": "The text defines the Norse heroic ideal as 'the figure who faces overwhelming odds with clear eyes and does not flinch -- who fights knowing that Ragnarök is coming, who sails knowing that storms exist, who loves knowing that everyone dies.'"}, {"text": "Seeking glory through a desperate act, hoping to be remembered as a victorious hero.", "isCorrect": false, "rationale": "The ideal is not about winning or personal glory, but about the *quality* of one's actions in the face of fate, often in unwinnable situations."}]}, {"question": "When the text states, 'fate does not determine character. Character is what you bring to fate,' what significant insight does this offer about the Norse view of human agency?", "options": [{"text": "Humans possess the ultimate power to alter their destiny through sheer willpower.", "isCorrect": false, "rationale": "The text repeatedly emphasizes that one 'cannot escape what has been woven for you,' directly contradicting the idea of altering destiny."}, {"text": "While the *events* of life are predetermined, an individual's *response* and moral qualities are within their control.", "isCorrect": true, "rationale": "This statement encapsulates the core of the Norse heroic ideal: fate dictates the circumstances, but character dictates 'the quality of how you live within it,' including courage, loyalty, and honesty."}, {"text": "Character is irrelevant in the face of an all-encompassing, unchangeable destiny.", "isCorrect": false, "rationale": "The entire section on the heroic ideal highlights the profound importance of character precisely *because* fate is unchangeable, making how one faces it paramount."}, {"text": "The Norns only weave physical events, leaving spiritual and ethical development entirely open.", "isCorrect": false, "rationale": "The text describes wyrd as a 'complex, interconnected web in which your choices, your character, and the conditions of your birth all interweave,' suggesting that character is also part of the web, but one's *agency* is in how they embody it."}]}, {"question": "According to the Völuspá stanzas quoted in the text, which deity gave 'ond' (soul/breath) to Ask and Embla?", "options": [{"text": "Honir", "isCorrect": false, "rationale": "The Völuspá states, 'Sense gave Honir.'"}, {"text": "Lothur", "isCorrect": false, "rationale": "The Völuspá states, 'Heat gave Lothur and goodly hue.'"}, {"text": "Urðr", "isCorrect": false, "rationale": "Urðr is one of the Norns who weave fate, not a god credited with giving the initial gifts of life."}, {"text": "Othin", "isCorrect": true, "rationale": "The Völuspá states, 'Soul gave Othin,' and the KEY TERM for 'ond' clarifies it was given by Odin."}]}, {"question": "Which statement best encapsulates the Norse understanding of the human person's existence and purpose?", "options": [{"text": "Humans are divinely appointed beings with free will, destined to achieve spiritual enlightenment and transcend their earthly fate.", "isCorrect": false, "rationale": "This contradicts the earthy nature, the concept of wyrd as inescapable, and the lack of emphasis on spiritual transcendence or enlightenment."}, {"text": "Humans are physical creatures whose lives are pre-ordained by fate, but who find meaning and honor through courageous action and noble character in the face of inevitable hardship.", "isCorrect": true, "rationale": "This statement synthesizes the key tenets: humans as physical ('earthy'), their lives woven by fate ('wyrd'), and the importance of character ('courage, skill, loyalty') in how they face this fate ('heroic ideal')."}, {"text": "Humans are purely material beings with no inherent purpose, whose brief lives are ultimately meaningless due to an unchangeable destiny.", "isCorrect": false, "rationale": "While acknowledging the material and fated aspects, this option ignores the profound meaning derived from 'character is what you bring to fate' and the heroic ideal of facing hardship with dignity."}, {"text": "Humans are spiritual beings tested by the gods, with their worth determined by their ability to change their fate and achieve personal glory.", "isCorrect": false, "rationale": "This contradicts the 'fundamentally earthy' nature, the inability to change fate, and the idea that the heroic ideal is not about winning but how one faces overwhelming odds."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
