    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 0, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why do scholars of religion, as presented in the text, include Communism in a discussion alongside traditional religions despite Karl Marx's hostility towards religion?", "options": [{"text": "Because the textbook aims to endorse Communist political ideology.", "isCorrect": false, "rationale": "The text explicitly states that including Communism is 'not an endorsement of Communist politics'."}, {"text": "Because its structural features and functional role in adherents' lives align with broader scholarly definitions of religion.", "isCorrect": true, "rationale": "The text explains that scholars, using definitions from Tillich and Eliade, found Communism 'has the full structure of a religion' and 'functions, in the lives of its adherents and in its intellectual structure, like a religion'."}, {"text": "Because Karl Marx himself eventually accepted that Communism had religious characteristics.", "isCorrect": false, "rationale": "The text clearly states, 'Marx would have rejected it.'"}, {"text": "Because all political ideologies are considered forms of religion in this academic context.", "isCorrect": false, "rationale": "The text focuses specifically on Communism's unique structural and functional similarities to religion, not on a general classification of all political ideologies."}]}, {"question": "According to the theologian Paul Tillich, as cited in the text, how should \"faith\" be understood?", "options": [{"text": "As ultimate concern—whatever a person values most and would sacrifice everything else for.", "isCorrect": true, "rationale": "The text states: 'Paul Tillich defined faith not as belief in God, but as ultimate concern — whatever a person treats as the most important thing in their life, the thing they would sacrifice everything else for.'"}, {"text": "Primarily as belief in a divine being or supernatural entity.", "isCorrect": false, "rationale": "Tillich's definition explicitly states 'not as belief in God' but as ultimate concern, broadening the concept."}, {"text": "As adherence to a specific set of moral doctrines and rituals.", "isCorrect": false, "rationale": "While related, this is a narrower interpretation and does not capture Tillich's broader concept of 'ultimate concern' as the essence of faith."}, {"text": "As an inherited tradition passed down through generations.", "isCorrect": false, "rationale": "Tillich's definition focuses on the individual's most important commitment, not specifically on the origin or transmission of the commitment."}]}, {"question": "Mircea Eliade's understanding of \"the sacred,\" as described in the text, expands beyond the supernatural to encompass what?", "options": [{"text": "Only those aspects of reality that are inherently divine or magical.", "isCorrect": false, "rationale": "Eliade's argument is that the sacred is 'not simply the supernatural,' implying a broader scope."}, {"text": "Exclusively the moral codes and ethical principles of a society.", "isCorrect": false, "rationale": "While moral codes can be significant, this is too narrow. Eliade's definition refers to 'any reality' treated with special significance."}, {"text": "Any historical event that has significantly shaped human civilization.", "isCorrect": false, "rationale": "Historical events can be significant, but Eliade's definition focuses on how humans *treat* a reality as 'set apart' and 'charged with special significance,' rather than just any significant event."}, {"text": "Any reality human beings treat as set apart, charged with special significance, and deserving of a response beyond ordinary behavior.", "isCorrect": true, "rationale": "The text explicitly states Eliade argued the sacred is 'any reality that human beings treat as set apart, charged with special significance, and deserving of a response beyond ordinary everyday behavior.'"}]}, {"question": "The text identifies Communism's theory of historical materialism, which explains all of human history as a movement through stages toward a final classless society, as fulfilling which structural feature of a religion?", "options": [{"text": "Eschatological hope", "isCorrect": false, "rationale": "Eschatological hope refers to the ultimate future redemption, while the cosmic story explains the entire historical trajectory from beginning to end."}, {"text": "Moral demands", "isCorrect": false, "rationale": "Moral demands relate to ethical imperatives and behavior, not the overarching narrative of reality."}, {"text": "A cosmic story", "isCorrect": true, "rationale": "The text states: 'First, it has a cosmic story: the theory of historical materialism, which explains all of human history as a movement through stages... This is as comprehensive a story of reality as any creation myth.'"}, {"text": "Sacred texts", "isCorrect": false, "rationale": "Sacred texts are the foundational writings, not the cosmic story itself, although they may contain the cosmic story."}]}, {"question": "When the text describes the classless society in Communism as \"a vision of ultimate redemption—the end of alienation, the restoration of human wholeness, the fulfillment of history,\" which structural feature of religion is it highlighting?", "options": [{"text": "Eschatological hope", "isCorrect": true, "rationale": "The text explicitly states: 'And fourth, it has eschatological hope: the classless society is not just a political goal but a vision of ultimate redemption — the end of alienation, the restoration of human wholeness, the fulfillment of history.'"}, {"text": "A cosmic story", "isCorrect": false, "rationale": "A cosmic story explains the overall narrative of reality, while eschatological hope focuses on the ultimate future outcome or destiny."}, {"text": "Moral demands", "isCorrect": false, "rationale": "Moral demands are ethical imperatives for action, not a vision of future salvation or fulfillment."}, {"text": "Sacred texts", "isCorrect": false, "rationale": "Sacred texts are the foundational writings, not the ultimate future vision itself."}]}, {"question": "What was Karl Marx's personal stance on religion, according to the provided text?", "options": [{"text": "He saw religion as a necessary tool for social cohesion and morality.", "isCorrect": false, "rationale": "This contradicts Marx's view of religion as an 'opiate of the masses'."}, {"text": "He was indifferent to religion, considering it irrelevant to his theories.", "isCorrect": false, "rationale": "The text states he was 'actively hostile' and called it an 'opiate of the masses,' indicating he was far from indifferent."}, {"text": "He was actively hostile to it, considering it an \"opiate of the masses.\"", "isCorrect": true, "rationale": "The text explicitly states: 'Its founder, Karl Marx, 'was actively hostile to religion — he called it the opiate of the masses,' meaning that it numbed people to their real suffering...'"}, {"text": "He believed religion was a precursor to advanced communist thought.", "isCorrect": false, "rationale": "There is no information in the text to support this claim; rather, his hostility suggests the opposite."}]}, {"question": "According to the \"did you know\" section, what is the fundamental driving force behind history, according to Karl Marx's theory of historical materialism?", "options": [{"text": "The evolution of ideas and philosophical concepts.", "isCorrect": false, "rationale": "The text states Marx 'transformed' Hegel's framework, arguing history was *instead* driven by material conditions, rather than ideas."}, {"text": "Material conditions, specifically who owns the tools of production and who performs the labor.", "isCorrect": true, "rationale": "The 'did you know' box explains: 'instead of history being driven by ideas, Marx argued it was driven by material conditions — by who owns the tools of production, and who does the labor.'"}, {"text": "The spiritual development and moral progress of humanity.", "isCorrect": false, "rationale": "Historical materialism is explicitly presented as being driven by material, economic factors, not spiritual or moral ones primarily."}, {"text": "The actions and decisions of influential political leaders.", "isCorrect": false, "rationale": "While leaders may play a role, the fundamental *driving force* in historical materialism is the underlying material and economic structures, not individual leadership."}]}, {"question": "Which of the following is presented in the text as an example of a \"sacred text\" within Communism, functioning similarly to scriptures in traditional religions?", "options": [{"text": "The Universal Declaration of Human Rights", "isCorrect": false, "rationale": "This document is not mentioned in the text as a sacred Communist text."}, {"text": "The Communist Manifesto", "isCorrect": true, "rationale": "The text states: 'Third, it has sacred texts: the Communist Manifesto (1848), Das Kapital (1867), and the Economic and Philosophic Manuscripts of 1844 function as authoritative scriptures...'"}, {"text": "The works of G.W.F. Hegel", "isCorrect": false, "rationale": "Hegel influenced Marx, but his works are not presented as sacred texts of Communism itself."}, {"text": "The United Nations Charter", "isCorrect": false, "rationale": "This document is not mentioned in the text as a sacred Communist text."}]}, {"question": "What do the moral demands of Communism, as described in the text, primarily call its adherents to do?", "options": [{"text": "To prioritize personal wealth accumulation and individual success.", "isCorrect": false, "rationale": "The text states the call is 'to subordinate personal interest to the revolutionary cause,' which contradicts prioritizing personal gain."}, {"text": "To engage in regular spiritual contemplation and ritual worship.", "isCorrect": false, "rationale": "The moral demands are described in terms of social and political action, not spiritual or ritualistic practices."}, {"text": "To passively accept existing social structures and hierarchies.", "isCorrect": false, "rationale": "The text states the call is 'to resist exploitation,' which implies actively challenging existing structures."}, {"text": "To show solidarity with the oppressed and subordinate personal interests to the revolutionary cause.", "isCorrect": true, "rationale": "The text states: 'it makes moral demands: it calls the faithful to solidarity with the oppressed, to resist exploitation, and to subordinate personal interest to the revolutionary cause.'"}]}, {"question": "The author emphasizes that including Communism in the discussion is a \"scholarly and analytical classification.\" What does this imply about the textbook's approach?", "options": [{"text": "It is an endorsement of Communist political systems and their historical applications.", "isCorrect": false, "rationale": "The text explicitly states: 'including Communism... is not an endorsement of Communist politics.'"}, {"text": "It assumes Karl Marx himself would have agreed with the characterization of Communism as a religion.", "isCorrect": false, "rationale": "The text clarifies: 'nor is it a claim that Marx would have accepted this characterization. Marx would have rejected it.'"}, {"text": "It is an examination of Communism's functional and intellectual structure, rather than an endorsement or a claim about Marx's personal views.", "isCorrect": true, "rationale": "The text clarifies: 'This is a scholarly and analytical classification — a way of saying that Communism functions, in the lives of its adherents and in its intellectual structure, like a religion.'"}, {"text": "It suggests that only traditions raising questions about suffering and justice can be classified as religions.", "isCorrect": false, "rationale": "While Communism raises these questions, the classification as a religion is based on its 'full structure' and how it 'functions,' not solely on the types of questions it addresses."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
