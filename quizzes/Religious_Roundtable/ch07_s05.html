<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 7, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Based on the text, which statement best characterizes Confucianism's religious nature?", "options": [{"text": "It is a polytheistic religion with a detailed creation myth.", "isCorrect": false, "rationale": "The text explicitly states Confucianism 'has no creator God' and is not a religion in the sense that Christianity or Islam are, which rules out a creation myth or polytheism."}, {"text": "It functions as an ethical and political framework, rather than a religion with a creator God or salvation narrative.", "isCorrect": true, "rationale": "The text clarifies that Confucianism is 'not a religion in the sense that Christianity or Islam are' and 'has no creator God, no salvation narrative, no account of the afterlife,' instead providing an 'ethical and political framework'."}, {"text": "It shares core theological doctrines with Christianity and Islam, despite lacking a specific deity.", "isCorrect": false, "rationale": "The text contrasts Confucianism with Christianity and Islam precisely because it lacks features like a creator God, salvation narrative, or afterlife account, indicating a difference in core theological doctrines."}, {"text": "It primarily focuses on an individual's path to the afterlife and spiritual salvation.", "isCorrect": false, "rationale": "Confucius famously deflected questions about death and the afterlife, stating 'Not yet understanding life, how can you understand “death?”', indicating a lack of focus on the afterlife or spiritual salvation."}]}, {"question": "For approximately 2,500 years, Confucian thought provided the ethical and political framework for which of the following civilizations?", "options": [{"text": "India, Persia, and the Middle East.", "isCorrect": false, "rationale": "The text does not mention these regions as being influenced by Confucianism."}, {"text": "Ancient Greece and Rome.", "isCorrect": false, "rationale": "The text does not mention these Western civilizations as being influenced by Confucianism."}, {"text": "China, Korea, Japan, and Vietnam.", "isCorrect": true, "rationale": "The text explicitly states that Confucian thought 'provided the ethical and political framework for Chinese civilization and for the civilizations of Korea, Japan, and Vietnam that developed in conversation with it.'"}, {"text": "Egypt, Mesopotamia, and the Indus Valley.", "isCorrect": false, "rationale": "The text does not mention these ancient civilizations as being influenced by Confucianism."}]}, {"question": "According to the text, what is the primary path to self-improvement and social contribution in Confucian thought?", "options": [{"text": "Accumulating wealth and power.", "isCorrect": false, "rationale": "The text later contrasts the ideal 'junzi' (noble person) as someone defined 'not by power or wealth but by virtue, learning, and care for others,' indicating this is not the primary path."}, {"text": "Engaging in military service to defend the state.", "isCorrect": false, "rationale": "The text does not emphasize military service as the primary path to self-improvement and social contribution."}, {"text": "Emphasis on education.", "isCorrect": true, "rationale": "The text states, 'The emphasis on education as the primary path to self-improvement and social contribution is Confucian in origin.'"}, {"text": "Achieving individual spiritual enlightenment.", "isCorrect": false, "rationale": "Confucianism is presented as an ethical and political framework, not a religion focused on individual spiritual enlightenment in the sense of other traditions."}]}, {"question": "The text mentions 'intense filial piety' as a key Confucian concept. How does Confucius view the role of the family in relation to virtues?", "options": [{"text": "The family is a secondary institution, with the state being the primary source of moral guidance.", "isCorrect": false, "rationale": "The text highlights the 'intense filial piety' and states 'the family is the school of all virtues,' indicating a foundational role, not a secondary one."}, {"text": "The family provides economic stability but does not directly influence moral development.", "isCorrect": false, "rationale": "The text explicitly states 'the family is the school of all virtues,' directly linking family to moral development."}, {"text": "The family serves as the fundamental institution where all virtues are learned.", "isCorrect": true, "rationale": "The text directly quotes Confucius's 'insistence that the family is the school of all virtues,' making it the fundamental source for learning moral principles."}, {"text": "Filial piety primarily promotes individual freedom and assertion within family dynamics.", "isCorrect": false, "rationale": "Filial piety emphasizes devotion and respect, which aligns with social harmony and mutual obligation over individual assertion, especially within the family."}]}, {"question": "The Confucian conviction that human beings are fundamentally relational creatures who become fully human only within a web of mutual obligations leads to an emphasis on which of the following?", "options": [{"text": "Prioritizing individual autonomy and personal freedom above all else.", "isCorrect": false, "rationale": "The text explicitly states the value placed on 'social harmony and the common good over individual assertion,' directly contradicting the prioritization of individual autonomy."}, {"text": "Valuing social harmony and the common good over individual assertion.", "isCorrect": true, "rationale": "The text directly states, 'The value placed on social harmony and the common good over individual assertion reflects the Confucian conviction that human beings are fundamentally relational creatures who become fully human only within a web of mutual obligations.'"}, {"text": "The pursuit of personal wealth as the ultimate measure of success.", "isCorrect": false, "rationale": "The text's description of the 'junzi' (noble person) defines them 'not by power or wealth but by virtue, learning, and care for others,' indicating that personal wealth is not the ultimate measure."}, {"text": "Establishing a rigid social hierarchy with no room for dissent or criticism.", "isCorrect": false, "rationale": "While hierarchies existed, the text also mentions 'a philosophy of mutual obligation that gave the governed the right to criticize the governor,' indicating that dissent was not absolutely forbidden."}]}, {"question": "In the 20th century, Chinese reformers criticized Confucianism for which of the following reasons?", "options": [{"text": "Its promotion of technological advancement and industrial growth.", "isCorrect": false, "rationale": "Reformers criticized Confucianism as the 'root of China’s backwardness,' implying a lack of modern advancement, not its promotion."}, {"text": "Its emphasis on individual rights and democratic governance.", "isCorrect": false, "rationale": "The critique was that it 'suppressed individual rights,' not that it emphasized them."}, {"text": "Its role in enforcing hierarchy, suppressing individual rights, and subordinating women.", "isCorrect": true, "rationale": "The text clearly states reformers attacked Confucianism 'as the root of China's backwardness—a tradition that enforced hierarchy, suppressed individual rights, and kept women subordinate.'"}, {"text": "Its rejection of traditional family values and ancestral worship.", "isCorrect": false, "rationale": "Confucianism is known for promoting filial piety and ancestral devotion, not rejecting them."}]}, {"question": "While acknowledging valid criticisms, the text also presents aspects of Confucianism that counter the notion of it being purely backward. Which of these is an example of such a counterpoint?", "options": [{"text": "Its rigid adherence to a caste system based solely on birthright.", "isCorrect": false, "rationale": "The text specifically mentions the examination system 'opened government to talent regardless of birth,' which contradicts a rigid caste system based on birth."}, {"text": "The development of an examination system that opened government to talent regardless of birth.", "isCorrect": true, "rationale": "The text states, 'The same tradition that produced hierarchical rigidity also produced the examination system that opened government to talent regardless of birth,' as a counterpoint to the critique."}, {"text": "Its absolute prohibition of any form of criticism against rulers.", "isCorrect": false, "rationale": "The text mentions 'a philosophy of mutual obligation that gave the governed the right to criticize the governor,' which contradicts an absolute prohibition on criticism."}, {"text": "Its exclusive focus on military strength as the highest virtue.", "isCorrect": false, "rationale": "The ideal of the 'junzi' is defined by 'virtue, learning, and care for others,' not exclusively military strength."}]}, {"question": "The text describes the 20th-century critique of Confucianism as 'incomplete.' What is the main reason for this assessment?", "options": [{"text": "Reformers did not fully understand the core religious tenets of Confucianism.", "isCorrect": false, "rationale": "The text focuses on the societal impacts and internal contradictions of the tradition itself, not a misunderstanding of its religious aspects (which it states are not its primary identity anyway)."}, {"text": "The critique failed to acknowledge the flexibility of Confucian principles to adapt to modern society.", "isCorrect": false, "rationale": "The text points to specific positive outcomes fostered by the tradition, not a general adaptability to modern society, though those outcomes might imply some underlying adaptability."}, {"text": "While acknowledging flaws, the tradition also fostered meritocracy, mutual obligation, and a virtue-based ideal of personhood.", "isCorrect": true, "rationale": "The text directly states, 'But the critique is also incomplete,' and then lists counterpoints: 'produced the examination system... a philosophy of mutual obligation... and a vision of the fully human person (junzi)... defined not by power or wealth but by virtue, learning, and care for others.'"}, {"text": "The criticisms were based on misinterpretations of Confucius's original teachings, which were universally progressive.", "isCorrect": false, "rationale": "The text notes that 'Confucianism as it was actually practiced over two thousand years often did enforce unjust hierarchies,' indicating that the practice itself, not just misinterpretation, led to some problems, even if Confucius's principles were better."}]}, {"question": "A person striving to embody the Confucian ideal of 'junzi' (the noble person or gentleman) would primarily prioritize which of the following attributes?", "options": [{"text": "Accumulating significant personal wealth and political power.", "isCorrect": false, "rationale": "The text explicitly states the 'junzi' is 'someone defined not by power or wealth' but by other qualities."}, {"text": "Demonstrating virtue, a commitment to learning, and care for others.", "isCorrect": true, "rationale": "The text defines the 'junzi' as 'someone defined not by power or wealth but by virtue, learning, and care for others.'"}, {"text": "Asserting individual rights and challenging all forms of social hierarchy.", "isCorrect": false, "rationale": "While Confucianism allowed for criticism of rulers (mutual obligation), its primary emphasis is on social harmony and the common good, not the assertion of individual rights in opposition to all hierarchy."}, {"text": "Achieving spiritual enlightenment through ascetic practices and meditation.", "isCorrect": false, "rationale": "The text does not mention spiritual enlightenment or ascetic practices as defining characteristics of the 'junzi' ideal."}]}, {"question": "What central question does the text suggest remains relevant in Confucianism today?", "options": [{"text": "How can humanity achieve spiritual salvation and eternal life?", "isCorrect": false, "rationale": "The text mentions Confucius famously deflected questions about death and the afterlife, so this is not its central question."}, {"text": "How should governments best achieve economic prosperity through free markets?", "isCorrect": false, "rationale": "While economic stability is important, the text frames Confucianism's core around human relationships and ethics, not primarily free-market economics."}, {"text": "How should human beings treat each other?", "isCorrect": true, "rationale": "The text concludes by stating, 'Confucianism's central question—how should human beings treat each other?—has not gone away.'"}, {"text": "How can one maximize individual freedom in a complex society?", "isCorrect": false, "rationale": "Confucianism emphasizes social harmony and mutual obligations over individual assertion, so maximizing individual freedom is not its central question."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
