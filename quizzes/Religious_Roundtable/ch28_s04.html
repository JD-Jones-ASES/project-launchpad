        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>

        <div class="subtitle">Religious Roundtable &mdash; Chapter 28, Section 4</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the 'Going Further' section, what is the primary purpose of the recommended books?", "options": [{"text": "To provide a complete and exhaustive academic study of each tradition.", "isCorrect": false, "rationale": "The introduction states the books are 'a starting point — a doorway into each tradition,' not a complete and exhaustive academic study. They are meant for readers who want to 'go deeper,' implying initial access rather than final mastery."}, {"text": "To offer primary and accessible secondary sources for readers wanting to explore traditions more deeply.", "isCorrect": true, "rationale": "The text explicitly states that the books are 'a starting point — a doorway into each tradition for readers who want to go deeper,' and that for each tradition, 'at least one primary text is listed... alongside accessible secondary sources.'"}, {"text": "To present only ancient sacred texts without any modern interpretations or histories.", "isCorrect": false, "rationale": "The section explicitly lists both primary texts (sacred texts or founding documents) and secondary sources like 'biographies, introductions, and histories written for general readers,' indicating a blend, not an exclusion, of modern interpretations."}, {"text": "To exclusively recommend scholarly works intended only for specialists and academics.", "isCorrect": false, "rationale": "The text mentions 'accessible secondary sources: biographies, introductions, and histories written for general readers,' contradicting the idea that recommendations are only for specialists."}], "id": "q01"}, {"question": "If a reader wants to begin understanding the theological core of Christianity using a primary text, which specific book and section is recommended?", "options": [{"text": "The Holy Bible, starting with the Book of Genesis.", "isCorrect": false, "rationale": "While Genesis is in the Bible, the recommendation for the theological core is 'the Gospel of Mark' and 'Paul s Letter to the Romans,' not Genesis."}, {"text": "The Holy Bible (King James Version), starting with the Gospel of Mark and Paul's Letter to the Romans.", "isCorrect": true, "rationale": "The text specifically recommends beginning with 'the Gospel of Mark (the shortest and most immediate of the four Gospels) and Paul s Letter to the Romans for the theological core' of Christianity within The Holy Bible (King James Version)."}, {"text": "C.S. Lewis, Mere Christianity, as it distills Christian belief.", "isCorrect": false, "rationale": "C.S. Lewis's 'Mere Christianity' is listed as an accessible secondary source for a case for Christian belief, not a primary text for understanding its theological core directly from scripture."}, {"text": "Diarmaid MacCulloch, A History of Christianity, for historical context.", "isCorrect": false, "rationale": "Diarmaid MacCulloch's book is a comprehensive history, excellent for 'historical context,' but it is a secondary source, not a primary text for the theological core itself."}], "id": "q02"}, {"question": "For a non-specialist seeking a practical and warm introduction to Jewish practice and belief, which secondary source is specifically recommended?", "options": [{"text": "The Torah (Five Books of Moses), focusing on Exodus.", "isCorrect": false, "rationale": "The Torah is the primary text for Judaism, and Exodus is a specific section, but neither is described as a 'practical and warm introduction' for a non-specialist; that description applies to a secondary source."}, {"text": "Joseph Telushkin, Jewish Literacy.", "isCorrect": false, "rationale": "Joseph Telushkin's 'Jewish Literacy' is described as a 'comprehensive reference covering Jewish history, religion, culture, and texts,' useful for looking up specific topics, but not specifically a 'practical and warm introduction' for a non-specialist."}, {"text": "Anita Diamant, Living a Jewish Life.", "isCorrect": true, "rationale": "The text explicitly recommends 'Anita Diamant, Living a Jewish Life' as a 'Practical and warm introduction to Jewish practice and belief for the non-specialist.'"}, {"text": "The Jewish Publication Society translation of the Torah.", "isCorrect": false, "rationale": "The JPS translation is praised for the primary text (Torah), but it is a translation of scripture, not a practical introduction to practice and belief for a non-specialist."}], "id": "q03"}, {"question": "A reader is interested in understanding the historical emergence of Islam and the life of the Prophet Muhammad from a sympathetic and historically grounded perspective. Which book should they consult?", "options": [{"text": "The Quran, specifically Sura 1 and Sura 2.", "isCorrect": false, "rationale": "The Quran is the primary text for 'theological foundations,' but it is not described as a 'sympathetic and historically grounded account of the Prophet s life and the emergence of Islam' in the way a biography would be."}, {"text": "Reza Aslan, No god but God: The Origins, Evolution, and Future of Islam.", "isCorrect": false, "rationale": "Reza Aslan's book is an 'Accessible historical and theological introduction,' which covers origins, but it is Karen Armstrong's work that is specifically highlighted for the 'Prophet's life' and a 'sympathetic' account."}, {"text": "Karen Armstrong, Muhammad.", "isCorrect": true, "rationale": "The text describes Karen Armstrong's 'Muhammad' as a 'Careful, sympathetic, and historically grounded account of the Prophet s life and the emergence of Islam,' making it the ideal choice for this specific interest."}, {"text": "The Abdel Haleem translation of the Quran.", "isCorrect": false, "rationale": "This is a translation of the primary text, recommended for clarity and readability, but it is not a secondary source providing a historical account of Muhammad's life and the emergence of Islam."}], "id": "q04"}, {"question": "Which resource is recommended for advanced readers seeking a rich, detailed, and potentially controversial understanding of Hinduism's diversity?", "options": [{"text": "The Bhagavad Gita, focusing on Chapter 2.", "isCorrect": false, "rationale": "The Bhagavad Gita is a primary text for Hinduism, with Chapter 2 recommended for its philosophical heart, but it is not described as a detailed exploration of Hinduism's diversity for advanced readers."}, {"text": "Huston Smith, The World's Religions.", "isCorrect": false, "rationale": "Huston Smith's chapter on Hinduism is described as 'one of the clearest introductions available,' which is suitable for general understanding, not specifically for advanced readers exploring diversity in a 'rich, detailed, and sometimes controversial' manner."}, {"text": "Wendy Doniger, The Hindus: An Alternative History.", "isCorrect": true, "rationale": "The text explicitly states that Wendy Doniger's 'The Hindus: An Alternative History' is 'Rich, detailed, and sometimes controversial. Excellent for advanced readers who want to understand Hinduism s diversity.'"}, {"text": "Barbara Stoler Miller's translation of the Bhagavad Gita.", "isCorrect": false, "rationale": "This is a specific translation of a primary text, praised for its accessibility and rendering, but it does not fit the description of a detailed history for advanced readers interested in diversity."}], "id": "q05"}, {"question": "A student wants to read a precise, scholarly, yet readable introduction to Buddhism written by a Buddhist monk. Which book from the list fits this description?", "options": [{"text": "Dhammapada (trans. F. Max Müller).", "isCorrect": false, "rationale": "The Dhammapada is the primary text (collection of Buddha's sayings), described as short and beautiful, but it is not an introduction written by a Buddhist monk."}, {"text": "Thich Nhat Hanh, The Heart of the Buddha's Teaching.", "isCorrect": false, "rationale": "Thich Nhat Hanh's book is a 'lucid introduction' to core teachings, and he is a Zen master, but the description 'precise, scholarly, and readable introduction by a Sri Lankan Buddhist monk' is specifically for Walpola Rahula's work."}, {"text": "Walpola Rahula, What the Buddha Taught.", "isCorrect": true, "rationale": "The text describes Walpola Rahula's 'What the Buddha Taught' as a 'Precise, scholarly, and readable introduction by a Sri Lankan Buddhist monk,' directly matching the student's requirement."}, {"text": "Alan Watts, The Way of Zen.", "isCorrect": false, "rationale": "Alan Watts's book covers both Taoism and Zen Buddhism and is described as accessible and enjoyable, but not specifically as a 'precise, scholarly, yet readable introduction to Buddhism written by a Buddhist monk.'"}], "id": "q06"}, {"question": "To explore the 'witty, paradoxical, and surprisingly funny' aspects of Taoist thought, which specific text and suggested starting point should a reader consult?", "options": [{"text": "Tao Te Ching (Laozi), reading the whole thing.", "isCorrect": false, "rationale": "The Tao Te Ching is described as poetic, but not specifically 'witty, paradoxical, and surprisingly funny.' That description is reserved for Chuang Tzu."}, {"text": "Chuang Tzu (trans. Burton Watson), starting with 'the Cook and the Ox' story in Chapter 3.", "isCorrect": true, "rationale": "The text describes Chuang Tzu as the 'second great Taoist classic' and 'Witty, paradoxical, and surprisingly funny,' specifically recommending to 'Begin with “ the Cook and the Ox” story in Chapter 3.'"}, {"text": "Alan Watts, The Way of Zen.", "isCorrect": false, "rationale": "Alan Watts's book is an accessible and enjoyable introduction covering Taoism and Zen Buddhism, but it's a secondary source, not the primary text described as witty and paradoxical, nor does it contain 'the Cook and the Ox' story as a starting point within the primary text itself."}, {"text": "Legge translation of the Tao Te Ching, available free online.", "isCorrect": false, "rationale": "This is a translation of the Tao Te Ching, but that specific text is not described as 'witty, paradoxical, and surprisingly funny' in the same way Chuang Tzu is."}], "id": "q07"}, {"question": "Which primary Confucian text is characterized as 'short, aphoristic, and endlessly thought-provoking,' with initial readings suggested from Books 1, 2, and 4?", "options": [{"text": "Mencius, included in 'Readings in Classical Chinese Philosophy.'", "isCorrect": false, "rationale": "Mencius is mentioned as a key Confucian text within an anthology, but it is 'The Analects' that is described as 'short, aphoristic, and endlessly thought-provoking,' with specific book recommendations."}, {"text": "The Analects (trans. D.C. Lau).", "isCorrect": true, "rationale": "The text states that 'The Analects (trans. D.C. Lau, Penguin Classics, 1979)' is 'The primary text. Short, aphoristic, and endlessly thought-provoking. Begin with Books 1, 2, and 4.'"}, {"text": "Xunzi, from the anthology by Ivanhoe and Van Norden.", "isCorrect": false, "rationale": "Xunzi is another key text in the anthology, but 'The Analects' is the one specifically given the description and reading suggestions provided in the question."}, {"text": "Michael Schuman, Confucius.", "isCorrect": false, "rationale": "Michael Schuman's book is an 'Accessible biography and cultural history' of Confucius, a secondary source, not the primary text described as aphoristic."}], "id": "q08"}, {"question": "For a beginner interested in the creation and doom narratives of Norse mythology from a primary text, where is the recommended starting point?", "options": [{"text": "Neil Gaiman, Norse Mythology, for a vivid retelling.", "isCorrect": false, "rationale": "Neil Gaiman's book is described as a 'Vivid, accessible retelling of the major myths,' making it a secondary companion, not a primary text starting point for creation and doom narratives."}, {"text": "The Prose Edda (Snorri Sturluson), beginning with Gylfaginning.", "isCorrect": false, "rationale": "The Prose Edda is a primary text and Gylfaginning is recommended for the Norse cosmos, but it is The Poetic Edda that is specifically recommended for 'Völuspá (creation and doom).'"}, {"text": "The Poetic Edda (trans. Henry Adams Bellows), beginning with Völuspá.", "isCorrect": true, "rationale": "The text explicitly states for The Poetic Edda: 'Begin with Völuspá (creation and doom) and Hávamál (practical wisdom of Odin),' making Völuspá the correct starting point for creation and doom from a primary text."}, {"text": "John Lindow, Norse Mythology: A Guide to the Gods, Heroes, Rituals, and Beliefs.", "isCorrect": false, "rationale": "John Lindow's book is described as 'The standard English-language reference for specific figures and concepts,' making it a secondary reference, not a primary text for specific narratives."}], "id": "q09"}, {"question": "According to the section on Communism, which work by Karl Marx is identified as the source of his concept of alienation?", "options": [{"text": "The Communist Manifesto.", "isCorrect": false, "rationale": "The Communist Manifesto is described as 'fierce, and historically indispensable,' but it is not specifically noted as the source of Marx's concept of alienation."}, {"text": "Das Kapital, Volume I, specifically Chapter 10.", "isCorrect": false, "rationale": "Das Kapital, Volume I, is Marx's masterwork, and Chapter 10 ('The Working Day') is mentioned as readable, but it is not identified as the source of the concept of alienation."}, {"text": "Economic and Philosophic Manuscripts of 1844.", "isCorrect": true, "rationale": "The text explicitly states that 'Karl Marx, Economic and Philosophic Manuscripts of 1844... is the source of Marx s concept of alienation.'"}, {"text": "Francis Wheen, Karl Marx.", "isCorrect": false, "rationale": "Francis Wheen's book is described as a 'Lively, balanced biography of Marx the man' and a secondary source, not one of Marx's primary works containing the concept of alienation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
