    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 7, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a fundamental characteristic of Confucianism's historical development?", "options": [{"text": "It strictly adhered to Confucius's original teachings without significant alteration.", "isCorrect": false, "rationale": "The text states that Confucianism 'has never been a fixed, unchanging system,' directly contradicting this option."}, {"text": "It evolved through distinct phases, adapting to new intellectual and historical contexts.", "isCorrect": true, "rationale": "The text explicitly states that Confucianism 'evolved through several major phases, each responding to new intellectual and historical challenges while remaining recognizably rooted in Confucius's original concerns.'"}, {"text": "It primarily focused on military strategy and imperial expansion.", "isCorrect": false, "rationale": "The text describes Confucianism as focused on ethics, governance, metaphysics, and human nature, not primarily military strategy."}, {"text": "Its influence was limited to China until the 20th century.", "isCorrect": false, "rationale": "The 'Did you know' section and discussion of Neo-Confucianism's impact clearly show its spread to Korea, Japan, and Vietnam much earlier than the 20th century."}], "id": "q01"}, {"question": "The primary disagreement between Mencius and Xunzi, prominent Classical Confucian thinkers, concerned:", "options": [{"text": "The importance of ritual in daily life.", "isCorrect": false, "rationale": "While ritual was important, Xunzi in particular emphasized it. Their core disagreement was not about the importance of ritual itself, but rather the underlying human nature it sought to shape."}, {"text": "Whether human nature is inherently good or requires external imposition of virtue.", "isCorrect": true, "rationale": "The text clearly states: 'Mencius taught that human nature is fundamentally good...while Xunzi taught that human nature is fundamentally chaotic and that virtue must be imposed through education and ritual.'"}, {"text": "The role of the emperor in governance.", "isCorrect": false, "rationale": "The text focuses on their debate regarding human nature and cultivation, not specific governmental roles like the emperor."}, {"text": "The historical accuracy of Confucius's teachings.", "isCorrect": false, "rationale": "Their debate was philosophical about human nature, not an academic critique of historical texts."}], "id": "q02"}, {"question": "Neo-Confucianism primarily emerged during the Song dynasty as a response to what intellectual challenge?", "options": [{"text": "The need to justify imperial expansion and military conquest.", "isCorrect": false, "rationale": "The text identifies the challenge as intellectual and philosophical, not related to military or territorial expansion."}, {"text": "The rise of Western scientific thought.", "isCorrect": false, "rationale": "Neo-Confucianism emerged during the Song dynasty (960–1279 CE), long before Western science posed a significant intellectual challenge to East Asian philosophy."}, {"text": "The sophisticated metaphysical systems offered by Buddhism and Taoism.", "isCorrect": true, "rationale": "The text states Neo-Confucianism emerged 'as a response to the intellectual challenge of Buddhism and Taoism. Both had offered sophisticated metaphysical accounts of reality that classical Confucianism...had not provided.'"}, {"text": "The decline of agricultural productivity and economic stability.", "isCorrect": false, "rationale": "The challenge described was intellectual and philosophical, not economic or agricultural."}], "id": "q03"}, {"question": "Zhu Xi's synthesis of Neo-Confucianism was described as 'enormously influential.' Which of the following best exemplifies this influence on a state level?", "options": [{"text": "It led to the adoption of a purely democratic system in Tokugawa Japan.", "isCorrect": false, "rationale": "Neo-Confucianism shaped Tokugawa Japan's samurai code and education, but Tokugawa Japan was a feudal military government, not a democracy."}, {"text": "It prompted a complete abandonment of traditional Confucian ethics in favor of Buddhist doctrines.", "isCorrect": false, "rationale": "Zhu Xi's synthesis *integrated* Confucian ethics with other metaphysical elements; it did not abandon them."}, {"text": "It became the organizing principle for the Joseon dynasty in Korea, shaping its state and society.", "isCorrect": true, "rationale": "The text explicitly states that in Korea, 'the Joseon dynasty (1392–1910 CE) was explicitly organized around Neo-Confucian principles, producing one of the most Confucian states in history.'"}, {"text": "It caused China to reject all foreign philosophical influences for centuries.", "isCorrect": false, "rationale": "Neo-Confucianism itself was a synthesis that responded to the 'foreign' (non-Confucian) influences of Buddhism and Taoism."}], "id": "q04"}, {"question": "The central tension addressed by New Confucianism in the 20th century revolves around:", "options": [{"text": "Reconciling traditional Confucian ritual with modern scientific advancements.", "isCorrect": false, "rationale": "While New Confucianism engaged with science, its core question was about social and political adaptation, not primarily ritual and science."}, {"text": "Integrating Confucian emphasis on social roles and hierarchy with modern values of individual rights and democratic equality.", "isCorrect": true, "rationale": "The text states New Confucian thinkers 'asked a hard question: can Confucianism, with its emphasis on social roles and ritual hierarchy, adapt to a world that values individual rights and democratic equality?'"}, {"text": "Resolving the metaphysical debates between Classical Confucianism and Neo-Confucianism.", "isCorrect": false, "rationale": "This metaphysical integration was largely achieved by Neo-Confucianism itself, not the central focus of 20th-century New Confucianism."}, {"text": "Determining the historical authenticity of Confucius's original texts.", "isCorrect": false, "rationale": "The text does not mention the authenticity of texts as a central concern for New Confucianism."}], "id": "q05"}, {"question": "Place the three major phases of Confucian thought discussed in the text in correct chronological order and identify their primary motivations for development:", "options": [{"text": "New Confucianism (Western engagement) → Classical Confucianism (metaphysics) → Neo-Confucianism (human nature).", "isCorrect": false, "rationale": "This option presents an incorrect chronological order and misrepresents the primary motivations of Classical Confucianism and Neo-Confucianism."}, {"text": "Classical Confucianism (ethics/governance) → Neo-Confucianism (metaphysical challenge) → New Confucianism (Western engagement).", "isCorrect": true, "rationale": "This correctly orders the phases (Classical 5th BCE, Neo-Confucian Song Dynasty, New Confucian 20th Century) and accurately states their primary motivations: Classical focused on ethics/governance, Neo-Confucianism responded to Buddhist/Taoist metaphysics, and New Confucianism engaged with Western thought and modern values."}, {"text": "Neo-Confucianism (social reform) → New Confucianism (ethical foundation) → Classical Confucianism (governance).", "isCorrect": false, "rationale": "This option is chronologically incorrect and misidentifies the primary motivations for Neo-Confucianism and New Confucianism."}, {"text": "Classical Confucianism (responding to Taoism) → New Confucianism (responding to Buddhism) → Neo-Confucianism (human rights).", "isCorrect": false, "rationale": "This option has an incorrect chronological order and misattributes the responses to Taoism and Buddhism, as well as the motivation for Neo-Confucianism."}], "id": "q06"}, {"question": "Despite their differing views on the fundamental nature of humanity, Mencius and Xunzi, both Classical Confucian thinkers, agreed on the paramount importance of what?", "options": [{"text": "Rejecting all forms of external governance.", "isCorrect": false, "rationale": "Confucianism, in general, is deeply concerned with proper governance and societal structure, making this option incorrect."}, {"text": "Cultivation.", "isCorrect": true, "rationale": "The text explicitly states: 'Both agreed on the importance of cultivation; they disagreed about what you are cultivating toward.'"}, {"text": "Adopting a purely individualistic approach to ethics.", "isCorrect": false, "rationale": "Confucianism emphasizes social roles, relationships, and community, which is not a purely individualistic approach."}, {"text": "Eliminating all ritual practices.", "isCorrect": false, "rationale": "Xunzi, in particular, emphasized ritual as a means to impose virtue on inherently chaotic human nature."}], "id": "q07"}, {"question": "How did Neo-Confucian thought influence the samurai code (bushido) and the education system in Japan during the Tokugawa period?", "options": [{"text": "It promoted an anarchic rejection of authority, leading to frequent rebellions.", "isCorrect": false, "rationale": "Neo-Confucianism typically emphasizes order, hierarchy, and ethical discipline, not anarchy."}, {"text": "It introduced a new emphasis on individual spiritual enlightenment through meditation.", "isCorrect": false, "rationale": "While related to self-cultivation, this description sounds more aligned with Buddhist practices rather than the specific impact of Neo-Confucianism on samurai or education."}, {"text": "It provided a philosophical framework that shaped their ethics, discipline, and scholarly pursuits.", "isCorrect": true, "rationale": "The text states: 'In Japan, Neo-Confucian thought shaped the samurai code (bushido) and the education system of the Tokugawa period,' implying a foundational philosophical influence."}, {"text": "It led to the complete eradication of native Japanese religious practices.", "isCorrect": false, "rationale": "The text does not mention such an extreme outcome, and cultural history shows native Japanese practices largely persisted."}], "id": "q08"}, {"question": "The ongoing debate within New Confucianism, particularly regarding its historical treatment of women and emphasis on hierarchy, suggests what about the movement?", "options": [{"text": "It has largely failed to find relevance in the modern world.", "isCorrect": false, "rationale": "The existence of an 'ongoing debate' about adaptation indicates continued relevance and engagement, not failure."}, {"text": "It is a static philosophical system unwilling to adapt to contemporary criticisms.", "isCorrect": false, "rationale": "The debate itself is about *how* to adapt and reform, indicating a dynamic, not static, system."}, {"text": "It acknowledges internal challenges and differing perspectives on how to modernize and reform Confucian thought.", "isCorrect": true, "rationale": "The text explicitly states: 'Some argue that Confucian values...are not opposed to democracy...Others argue that Confucianism must be more radically reformed,' illustrating internal acknowledgment of challenges and diverse approaches to modernization."}, {"text": "It primarily seeks to re-establish Confucianism as a state religion.", "isCorrect": false, "rationale": "The focus of New Confucianism is on engagement with Western philosophy, democracy, human rights, and science, not a push for state religion status."}], "id": "q09"}, {"question": "Which phase of Confucianism was characterized by the development of a 'comprehensive philosophical system that integrated Confucian ethics with a metaphysical account of reality'?", "options": [{"text": "Classical Confucianism, through the works of Confucius and Mencius.", "isCorrect": false, "rationale": "The text notes that Classical Confucianism, 'focused on ethics and governance, had not provided' sophisticated metaphysical accounts."}, {"text": "Neo-Confucianism, exemplified by Zhu Xi's synthesis.", "isCorrect": true, "rationale": "The keyterm definition and the description of Neo-Confucianism state it 'synthesized Confucian ethics with elements of Buddhist and Taoist metaphysics to create a comprehensive account of reality, human nature, and self-cultivation,' with Zhu Xi's synthesis being the most full expression."}, {"text": "New Confucianism, as it engaged with Western science.", "isCorrect": false, "rationale": "New Confucianism's primary focus was adapting to modern political and social values, not building a new comprehensive metaphysical system from scratch."}, {"text": "The initial teachings of Confucius, which laid out a complete worldview.", "isCorrect": false, "rationale": "Confucius's original teachings were foundational but were not described as a 'comprehensive philosophical system' integrating advanced metaphysics in the way Neo-Confucianism later developed."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
