<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 14, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the Christian understanding of the primary ethical demand?", "options": [{"text": "To achieve salvation through strict adherence to divine laws.", "isCorrect": false, "rationale": "The text states the ethical demand is 'not merely external compliance,' which strict adherence to laws would represent. Instead, it emphasizes internal transformation."}, {"text": "To undergo internal transformation guided by love of God and neighbor.", "isCorrect": true, "rationale": "The text explicitly states: 'The ethical demand is not merely external compliance; it is internal transformation,' formed by love of God and neighbor."}, {"text": "To demonstrate faith through public acts of charity and service.", "isCorrect": false, "rationale": "While acts of charity may be an outcome, the primary ethical demand described is the internal transformation, not merely the external demonstration."}, {"text": "To ensure collective well-being through communal living and sharing resources.", "isCorrect": false, "rationale": "This describes a social model, not the primary individual ethical demand according to the text's description of Christian morality."}]}, {"question": "In Taoist morality, the concept of *wu wei* for a sage is best characterized as:", "options": [{"text": "A disciplined effort to transcend all human emotions and desires.", "isCorrect": false, "rationale": "Taoism emphasizes 'naturalness,' which doesn't necessarily mean transcending all human emotions, but rather aligning with an unforced state. Wu wei is not about striving or disciplined effort in this sense."}, {"text": "Consciously resisting societal conventions and artificial constructs.", "isCorrect": false, "rationale": "While it involves not being 'forced' by convention, the emphasis is on 'being what it is' or 'being real,' rather than conscious resistance as an act of rebellion."}, {"text": "Acting in accordance with one's true, unforced nature, like water flowing downhill.", "isCorrect": true, "rationale": "The text explains *wu wei* by stating, 'The sage who exhibits wu wei is not being compliant; they are being real,' drawing an analogy to 'Water flowing downhill is not following a rule; it is being what it is.'"}, {"text": "Following a predetermined set of rules that reflect natural law.", "isCorrect": false, "rationale": "The text explicitly states the good life is 'not achieved by following more rules or trying harder,' but by 'removing the obstacles to naturalness.'"}]}, {"question": "From a communist perspective as described, moral obligations primarily arise from:", "options": [{"text": "Universal moral principles that are eternal and unchanging.", "isCorrect": false, "rationale": "The text directly refutes this, stating: 'Moral obligations are not eternal Platonic truths; they arise from actual conditions...'"}, {"text": "The objective interests of the class that produces value, driven by historical conditions.", "isCorrect": true, "rationale": "The text states: 'Communism grounds morality in history -- specifically, in the objective interests of the class that produces all value... The source of moral obligation is historical and material.'"}, {"text": "Divine commands passed down through sacred texts and teachings.", "isCorrect": false, "rationale": "This is characteristic of Christianity, not Communism, which is grounded in historical and material conditions."}, {"text": "Individual conscience and personal empathy for others' suffering.", "isCorrect": false, "rationale": "While empathy might play a role, the primary source of obligation is framed as historical and material solidarity with the working class, not individual conscience."}]}, {"question": "Which of the following best summarizes the primary source of moral obligation for Christianity, Taoism, and Communism, respectively, as presented in the text?", "options": [{"text": "Divine decree, inherent human goodness, and governmental authority.", "isCorrect": false, "rationale": "Inherent human goodness is not the primary Taoist source (it's nature/Tao), and governmental authority is not the primary Communist source (it's historical class interests)."}, {"text": "Relational love, deep patterns of reality (Tao), and historical class interests.", "isCorrect": true, "rationale": "The text clearly states: 'Christianity grounds morality in love,' 'Taoism grounds morality in nature -- specifically, in the Tao,' and 'Communism grounds morality in history -- specifically, in the objective interests of the class...'"}, {"text": "Sacred traditions, ecological balance, and economic efficiency.", "isCorrect": false, "rationale": "While related, these terms do not precisely capture the core 'source of moral obligation' as described for each tradition in the text."}, {"text": "Personal salvation, individual authenticity, and collective equity.", "isCorrect": false, "rationale": "These are more outcomes or aspirations rather than the *source* of moral obligation as defined by the text for each tradition."}]}, {"question": "The Christian critique of Taoism, as described in the text, primarily challenges the Taoist notion of nature by asking:", "options": [{"text": "Whether the Tao is truly accessible to human understanding.", "isCorrect": false, "rationale": "The critique mentioned is not about accessibility but about the ambiguous nature of 'nature' itself."}, {"text": "If human nature, with its competitive and violent aspects, should also be considered a moral standard.", "isCorrect": true, "rationale": "The text states: 'The Christian asks the Taoist: if nature is the standard, which nature? Human nature is also naturally competitive, violent, and tribalistic,' highlighting this specific challenge."}, {"text": "How natural harmony can be achieved in a world impacted by human sin.", "isCorrect": false, "rationale": "This introduces a Christian theological concept (sin) not explicitly part of the direct critique of Taoism presented in the text."}, {"text": "If natural patterns can truly provide specific ethical guidance for complex human dilemmas.", "isCorrect": false, "rationale": "The critique is more fundamental about *which* aspect of nature to follow, rather than the specificity of guidance."}]}, {"question": "A Taoist's critique of Christian morality, as outlined in the text, would question:", "options": [{"text": "The historical accuracy of the life and teachings of Jesus.", "isCorrect": false, "rationale": "The text does not mention this as a Taoist critique."}, {"text": "Whether true love can genuinely exist if it is a commanded obligation.", "isCorrect": true, "rationale": "The text states: 'The Taoist asks the Christian: if love is commanded by God, what makes divine commands binding? Is it love if it is commanded?'"}, {"text": "The efficacy of prayer and divine intervention in moral matters.", "isCorrect": false, "rationale": "This is not the specific Taoist critique of Christian morality presented in the text."}, {"text": "The emphasis on internal transformation over external action.", "isCorrect": false, "rationale": "Taoism also emphasizes internal alignment (naturalness/wu wei), so this is unlikely to be a central critique."}]}, {"question": "The Marxist critique of Christian and Taoist moral standards, 'your eternal' moral standards... look suspiciously like the values of people who are not working twelve-hour days in a factory,' implies that these standards:", "options": [{"text": "Are too abstract to be understood by ordinary workers.", "isCorrect": false, "rationale": "The critique isn't about complexity but about whose interests these 'eternal' standards serve."}, {"text": "Are fundamentally flawed in their philosophical foundation.", "isCorrect": false, "rationale": "The critique is more social and economic, suggesting they serve specific class interests, rather than a purely philosophical flaw."}, {"text": "May implicitly reflect and uphold the interests of the powerful or privileged class.", "isCorrect": true, "rationale": "The phrase 'values of people who are not working twelve-hour days in a factory' directly implies that these 'eternal' standards are actually the values of the leisured or dominant class."}, {"text": "Promote idleness rather than productive labor for society.", "isCorrect": false, "rationale": "The critique is not about promoting idleness but about the origin and beneficiaries of the values themselves."}]}, {"question": "What is the 'deep problem' that all three moral traditions (Christianity, Taoism, and Communism) acknowledge they face?", "options": [{"text": "The challenge of achieving complete moral consensus among diverse populations.", "isCorrect": false, "rationale": "While a challenge, the text identifies a specific shared problem related to power."}, {"text": "The difficulty in clearly defining what constitutes 'the good life' in a changing world.", "isCorrect": false, "rationale": "Each tradition *has* a definition of the good life; the problem is its realization."}, {"text": "That individuals who embody their moral ideals often lack worldly power or influence.", "isCorrect": true, "rationale": "The text explicitly states: 'And all three face the same deep problem: the person who most clearly sees the moral ideal -- the meek, the sage, the class-conscious worker -- does not seem to be the person who actually holds power in the world.'"}, {"text": "The constant struggle against human nature's inherent tendency towards selfishness.", "isCorrect": false, "rationale": "While a relevant ethical issue, this is not the 'deep problem' explicitly identified as common to all three in the text."}]}, {"question": "Consider an act of kindness, such as helping a stranger in need. Based on the text, which option correctly aligns the *most likely motivation* for this act with each moral tradition?", "options": [{"text": "Christianity: To earn divine favor; Taoism: To maintain personal karma; Communism: To avoid social punishment.", "isCorrect": false, "rationale": "These motivations are not consistent with the text's description for each tradition. Christianity emphasizes love, Taoism naturalness, and Communism solidarity."}, {"text": "Christianity: As an expression of love in response to being loved; Taoism: As a natural, unforced response; Communism: As an act of class solidarity.", "isCorrect": true, "rationale": "This directly reflects the core groundings: Christianity ('you owe love because you have been loved'), Taoism ('being what it is'/naturalness), and Communism ('owe solidarity to the working class')."}, {"text": "Christianity: To fulfill a communal obligation; Taoism: To achieve inner peace; Communism: To promote individual self-interest.", "isCorrect": false, "rationale": "While outcomes might include inner peace, these are not the stated primary *motivations* for moral obligation. Communism's motivation is collective, not individual self-interest."}, {"text": "Christianity: To set a good example for others; Taoism: To practice detachment from worldly concerns; Communism: To destabilize existing power structures.", "isCorrect": false, "rationale": "Setting an example is secondary for Christianity. Taoism isn't about detachment from *all* concerns, but alignment with nature. Communism's motivation is solidarity for collective good, not just destabilization."}]}, {"question": "The final question posed by the text, 'And does it matter, as long as you helped?', primarily encourages the reader to reflect on:", "options": [{"text": "The relative effectiveness of different moral systems in producing good outcomes.", "isCorrect": false, "rationale": "While implied, the question directly follows a discussion of the *sources* of obligation, pointing more towards the 'why' than solely the 'what worked best'."}, {"text": "Whether the underlying motivation or source of a moral act holds significance beyond the act itself.", "isCorrect": true, "rationale": "The entire section explores 'where do moral obligations actually come from?' The concluding question directly challenges the reader to consider if the *source* (motivation/grounding) matters, even if the helpful outcome is the same."}, {"text": "The universal agreement on what constitutes a 'helpful' action across cultures.", "isCorrect": false, "rationale": "The section focuses on the *source* of morality, not the definition of helpfulness across cultures."}, {"text": "The practical challenges of living a morally upright life in the modern world.", "isCorrect": false, "rationale": "This is a broader implication but not the direct focus of that specific concluding question."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
