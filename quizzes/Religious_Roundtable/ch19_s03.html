<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 19, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary purpose of studying world religions?", "options": [{"text": "To identify the single correct religion and potentially adopt it.", "isCorrect": false, "rationale": "The text explicitly states, 'The point of studying world religions is not to adopt one of them,' nor 'to find the one that is correct and dismiss the rest.'"}, {"text": "To learn to 'think religiously' by engaging deeply with fundamental questions with rigor, humility, and imagination.", "isCorrect": true, "rationale": "The text directly states, 'The point is to learn to think religiously — to engage the great questions with rigor, humility, and imagination.'"}, {"text": "To determine which religions are illogical because their disagreements prove they must all be wrong.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating the point is not 'to decide that since they disagree they must all be wrong.'"}, {"text": "To rank them based on their historical influence and number of adherents.", "isCorrect": false, "rationale": "The text clarifies that the purpose is 'not to rank them.'"}], "id": "q01"}, {"question": "Which of the following best describes what 'thinking religiously' entails, as explained in the text?", "options": [{"text": "Believing in God and adhering to a specific spiritual doctrine.", "isCorrect": false, "rationale": "The text explicitly states, 'Thinking religiously does not require believing in God.'"}, {"text": "Seriously engaging with profound existential questions about the world's origin, our obligations, and mortality, irrespective of belief in God.", "isCorrect": true, "rationale": "The text states it 'does not require believing in God. It requires taking the questions seriously. It requires being willing to ask, without flinching, where the world came from, what you owe to others, and what you will do with the fact of your own mortality.'"}, {"text": "Developing a comprehensive understanding of religious rituals and practices across different cultures.", "isCorrect": false, "rationale": "While understanding rituals might be part of studying religions, the text emphasizes engaging with core questions as the essence of 'thinking religiously,' not just cultural observation."}, {"text": "Adopting a skeptical or dismissive attitude towards all supernatural claims.", "isCorrect": false, "rationale": "Thinking religiously involves taking questions seriously, not dismissing them, even if one doesn't believe in God."}], "id": "q02"}, {"question": "The text highlights the diversity of traditions and figures encountered. Which statement accurately reflects this variety?", "options": [{"text": "All traditions, despite their differences, ultimately agree on the existence of a personal God.", "isCorrect": false, "rationale": "The text explicitly states encountering 'traditions that insist on a personal God, traditions that insist there is no God, and traditions that consider the question beside the point.'"}, {"text": "The traditions include figures who refused to answer cosmological questions and others who were furious about the answers they found.", "isCorrect": true, "rationale": "The text mentions 'figures as different as the Buddha (who refused to answer cosmological questions) and Karl Marx (who was furious about the answers he found).'"}, {"text": "The content exclusively focuses on ancient religious texts, deliberately omitting modern philosophical or political thought.", "isCorrect": false, "rationale": "The text mentions the 'Communist Manifesto,' which is a modern political and philosophical text, alongside ancient religious texts."}, {"text": "The key commonality among all traditions is their shared narrative about where the world came from.", "isCorrect": false, "rationale": "The very diversity highlighted, including Buddha's refusal to answer cosmological questions, indicates there is no shared narrative on world origin."}], "id": "q03"}, {"question": "How does the text connect Socrates' statement about the 'unexamined life' to the study of world religions?", "options": [{"text": "It implies that without adopting a specific religious belief, one's life lacks purpose.", "isCorrect": false, "rationale": "The text states 'Thinking religiously does not require believing in God,' and focuses on asking questions, not adopting beliefs."}, {"text": "It suggests that having definitive answers to all questions is essential for a worthwhile life.", "isCorrect": false, "rationale": "Socrates 'did not mean that you need to have all the answers. He meant that you need to be asking.'"}, {"text": "It illustrates that the nine traditions offer diverse and serious methods for engaging in fundamental self-examination and inquiry.", "isCorrect": true, "rationale": "The text states, 'The nine traditions in this Roundtable are, among other things, nine very different ways of taking that instruction seriously' (i.e., seriously asking questions)."}, {"text": "It argues that only through philosophical debate, rather than personal reflection, can life truly be examined.", "isCorrect": false, "rationale": "The text encourages personal reflection (e.g., 'Your Turn at the Table') as a way of examining life."}], "id": "q04"}, {"question": "The 'Your Turn at the Table' exercise encourages readers to answer fundamental questions and then formulate new ones. What is the intended outcome of revisiting these reflections in five years?", "options": [{"text": "To confirm that one's original answers were correct and unchanging, signifying a strong belief system.", "isCorrect": false, "rationale": "The text asks to 'See whether your answers have changed and your questions have deepened,' implying that change and deepening are positive."}, {"text": "To measure one's intellectual and moral growth through changes in understanding and the deepening of questions.", "isCorrect": true, "rationale": "The text explicitly states, 'See whether your answers have changed and your questions have deepened. That is what intellectual and moral growth looks like.'"}, {"text": "To compare one's personal views with academic research to ensure factual accuracy.", "isCorrect": false, "rationale": "The exercise explicitly states, 'Do not look up any answers,' focusing on personal reflection rather than immediate factual verification."}, {"text": "To choose a specific religious tradition that now best aligns with one's developed worldview.", "isCorrect": false, "rationale": "The purpose of studying religions is 'not to adopt one of them,' and the exercise focuses on personal inquiry and growth, not adopting a tradition."}], "id": "q05"}, {"question": "When the 'Big Question' invites the reader to imagine being the 'tenth voice' at the Roundtable, what is the crucial prerequisite for this engagement?", "options": [{"text": "Having arrived at definitive and final answers to all major existential questions.", "isCorrect": false, "rationale": "The text explicitly states, 'You do not need final answers — but you do need a willingness to engage the questions honestly.'"}, {"text": "A comprehensive mastery of the philosophical arguments presented by the previous nine voices.", "isCorrect": false, "rationale": "While understanding is good, the emphasis is on one's own contribution and honest engagement, not just regurgitating others' ideas."}, {"text": "The willingness to honestly and seriously engage with profound questions, even without immediate answers.", "isCorrect": true, "rationale": "The text concludes this section by stating, 'That willingness is the beginning of wisdom.'"}, {"text": "The ability to formulate a unique, unprecedented worldview that challenges all existing traditions.", "isCorrect": false, "rationale": "The invitation is to engage honestly with the questions, not necessarily to invent something completely new and challenging."}], "id": "q06"}, {"question": "What is the central message conveyed by the 'One final thought' section about the origins and endurance of traditions?", "options": [{"text": "Only traditions that achieve global dominance are truly significant.", "isCorrect": false, "rationale": "The text mentions Norse Paganism being reconstructed today, indicating that significance isn't solely tied to global dominance."}, {"text": "Every powerful tradition today began as a minority voice, demonstrating the enduring impact of ideas and persistent questioning.", "isCorrect": true, "rationale": "The text states, 'Every tradition we studied was, at some point, a minority voice,' and provides examples of their survival and spread, concluding that 'Ideas matter. Questions matter.'"}, {"text": "The spread of traditions is primarily due to political power and military expansion.", "isCorrect": false, "rationale": "While these factors can play a role, the text emphasizes the power of 'Ideas' and 'Questions' and examples like Buddhism's spread from a single teacher, or Judaism's survival through persecution."}, {"text": "New traditions emerge only when existing ones completely collapse.", "isCorrect": false, "rationale": "The text shows that traditions can endure and be reconstructed (like Norse Paganism) even after significant changes, not just by complete collapse and replacement."}], "id": "q07"}, {"question": "The author concludes by stating, 'The roundtable does not adjourn. It simply moves — to the next reader, the next question, the next generation.' What does this statement imply about the nature of the conversation?", "options": [{"text": "That the academic study of world religions is an endless and unchanging discipline.", "isCorrect": false, "rationale": "While ongoing, the emphasis is on the broader human conversation about fundamental questions, not just academic study, and implies evolution ('next question, next generation')."}, {"text": "That humanity's ongoing quest for meaning, answers, and self-understanding is a continuous and evolving process across generations.", "isCorrect": true, "rationale": "This statement encapsulates the idea that the 'oldest and most important conversation our species has ever had' is ongoing, passed down, and continually re-engaged by new individuals."}, {"text": "That no definitive answers to life's profound questions will ever be discovered.", "isCorrect": false, "rationale": "While the focus is on asking, the statement emphasizes the *continuation* of the conversation, not necessarily the futility of finding answers."}, {"text": "That people should constantly switch between different religious traditions throughout their lives.", "isCorrect": false, "rationale": "The text focuses on personal engagement with questions, not on adopting or switching traditions."}], "id": "q08"}, {"question": "The text advocates for engaging the great questions 'with rigor, humility, and imagination.' In the context of the 'Your Turn at the Table' activity, which action would best exemplify 'humility'?", "options": [{"text": "Confidently asserting one's initial answers as absolute and final truths.", "isCorrect": false, "rationale": "This would be the opposite of humility, which involves acknowledging the limits of one's knowledge."}, {"text": "Acknowledging one's current limitations in knowledge by articulating questions one still has and wants to keep thinking about.", "isCorrect": true, "rationale": "The exercise specifically asks to 'write three questions you still have — questions you cannot answer, questions that feel important,' which is a direct demonstration of humility regarding one's current understanding."}, {"text": "Conducting extensive research online before writing any personal reflections or answers.", "isCorrect": false, "rationale": "The instruction is explicitly 'Do not look up any answers. Just write what you actually think, right now, with what you know.'"}, {"text": "Refusing to engage with questions that seem too complex or uncomfortable to answer.", "isCorrect": false, "rationale": "This contradicts the call to engage 'without flinching' and to take questions seriously."}], "id": "q09"}, {"question": "Considering the entire section, what is the overarching message the author intends to convey to the reader?", "options": [{"text": "That intellectual and moral growth is primarily achieved by aligning oneself with a historically significant religious tradition.", "isCorrect": false, "rationale": "The text emphasizes personal engagement with questions and growth, not necessarily alignment with a specific tradition (reiterating 'not to adopt one of them')."}, {"text": "That the continuous and honest engagement with fundamental questions about existence and meaning is a lifelong human endeavor that fosters wisdom.", "isCorrect": true, "rationale": "This option synthesizes key themes: 'thinking religiously,' Socrates' emphasis on asking, the 'Your Turn' and 'Big Question' activities, and the idea that the 'conversation continues' as the 'beginning of wisdom.'"}, {"text": "That the diversity of world religions ultimately proves their inherent contradictions and the futility of seeking universal truths.", "isCorrect": false, "rationale": "While diversity is highlighted, the author frames it as an opportunity for rigorous and imaginative engagement, not as proof of futility or contradiction."}, {"text": "That the primary goal of studying world religions is to develop skills for interfaith dialogue and promote global unity.", "isCorrect": false, "rationale": "While these can be positive outcomes, the text focuses more on individual intellectual and moral growth and the personal engagement with fundamental questions as the 'point' of study."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
