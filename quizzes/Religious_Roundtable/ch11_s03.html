    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 11, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The opening line of the Tao Te Ching, \"The Tao that can be told is not the eternal Tao,\" primarily suggests which of the following about the nature of reality?", "options": [{"text": "The Tao is a secret knowledge only accessible to a select few.", "isCorrect": false, "rationale": "The text states it's about the limitations of language, not an exclusive secret. While difficult to grasp, it's not described as intentionally hidden from all but a few."}, {"text": "The fundamental ground of reality is beyond the complete grasp and accurate description of human language.", "isCorrect": true, "rationale": "This option directly reflects the text's assertion: 'whatever we are about to say about the source of the universe will be, by the nature of language, incomplete... the ground of reality cannot be captured in words without being distorted.'"}, {"text": "Taoism is primarily concerned with silence and meditation, not verbal teachings.", "isCorrect": false, "rationale": "While silence might be part of the practice, the core philosophical point here is about the *distortion* of language, not a blanket rejection of verbal teachings or a sole focus on meditation."}, {"text": "All philosophical discourse is inherently flawed and should be abandoned.", "isCorrect": false, "rationale": "The text doesn't advocate abandoning discourse but acknowledges its limitations. Laozi himself reluctantly names the Tao and offers descriptions, demonstrating that some discourse is necessary despite its incompleteness."}], "id": "q01"}, {"question": "A project manager, striving to embody *wu wei* in their leadership, would most likely approach a sudden, unforeseen challenge by:", "options": [{"text": "Immediately implementing a pre-planned contingency strategy, even if it feels forced.", "isCorrect": false, "rationale": "This represents forcing one's will or a pre-determined plan, which goes against the *wu wei* principle of 'acting in alignment with the natural flow of things rather than forcing, straining, or imposing one's will.'"}, {"text": "Pausing to assess the situation, allowing insights to emerge naturally, and responding flexibly to the emerging conditions.", "isCorrect": true, "rationale": "This aligns with *wu wei*'s emphasis on 'effortless action' and 'acting in alignment with the natural flow of things' rather than forcing a solution. It implies a receptive, adaptive approach."}, {"text": "Delegating the problem entirely to junior staff to avoid personal engagement.", "isCorrect": false, "rationale": "While delegation can be appropriate, simply 'doing nothing' or avoiding responsibility is explicitly stated as not being the meaning of *wu wei*. It's about *effortless action*, not inaction."}, {"text": "Asserting strong authority to ensure a rapid, decisive resolution regardless of team input.", "isCorrect": false, "rationale": "This exemplifies 'imposing one's will' and 'forcing' a solution, which are directly contrary to the spirit of *wu wei*."}], "id": "q02"}, {"question": "Based on the Taoist account, the unfolding of the cosmos from the Tao fundamentally differs from many Western creation narratives by lacking:", "options": [{"text": "A clear chronological sequence of events.", "isCorrect": false, "rationale": "Chapter 42 provides a sequence ('The Tao begot one. One begot two. Two begot three. And three begot the ten thousand things'), indicating a chronological unfolding, even if not a detailed timeline."}, {"text": "A divine consciousness or will that deliberates and chooses to create.", "isCorrect": true, "rationale": "The text explicitly states: 'it does not describe a creator deciding to make something. The Tao does not deliberate. The Tao does not choose.' This is a core distinction from many Western creation myths."}, {"text": "An explanation for the existence of multiplicity in the universe.", "isCorrect": false, "rationale": "The sequence 'Tao begot one...three begot the ten thousand things' directly explains the emergence of multiplicity from unity."}, {"text": "Any form of ultimate source or origin for reality.", "isCorrect": false, "rationale": "The Tao itself is presented as the ultimate source, the 'mother of all things,' 'Originator of heaven and earth.'"}], "id": "q03"}, {"question": "In Taoist thought, yin and yang are best understood as:", "options": [{"text": "Opposing forces of good and evil that are in constant battle for dominance.", "isCorrect": false, "rationale": "The text explicitly clarifies: 'Yin and yang are not good and evil, not God and the devil' and 'the cosmos, in Taoism, is not a battle between opposites but a dance between complements.'"}, {"text": "Complementary, mutually arising forces that together create the dynamism of nature.", "isCorrect": true, "rationale": "This directly matches the text's description: 'complementary, mutually arising forces that together account for all of nature's dynamism.' Examples like day/night and activity/rest illustrate this."}, {"text": "Static, independent principles that define absolute categories of existence.", "isCorrect": false, "rationale": "Yin and yang are described as 'mutually arising' and requiring their 'complement,' indicating they are neither static nor independent, but rather dynamic and interdependent."}, {"text": "Two distinct deities, one benevolent and one malevolent, guiding cosmic events.", "isCorrect": false, "rationale": "The text states they are 'not good and evil, not God and the devil,' ruling out any interpretation as deities."}], "id": "q04"}, {"question": "Chapter 1 of the Tao Te Ching states, \"Always without desire we must be found, If its deep mystery we would sound; But if desire always within us be, Its outer fringe is all that we shall see.\" This passage suggests that understanding the \"deep mystery\" of the Tao requires:", "options": [{"text": "Intense study of ancient texts and scholarly debate.", "isCorrect": false, "rationale": "While scholarship may be involved, the passage's focus is on the internal state of 'desire' as an impediment, rather than a specific method of intellectual pursuit."}, {"text": "Cultivating a state of non-attachment or inner stillness to perceive reality more directly.", "isCorrect": true, "rationale": "The presence of 'desire' is presented as an impediment to seeing the 'deep mystery,' implying that a state 'without desire' is necessary to truly 'sound' or understand it. This points to non-attachment and inner stillness."}, {"text": "Suppressing all emotions and aspirations to achieve a blank mental state.", "isCorrect": false, "rationale": "While 'without desire' points to non-attachment, it doesn't necessarily mean suppressing *all* emotions or aiming for a blank state, but rather freedom from grasping desires that obscure perception."}, {"text": "Actively seeking out unique spiritual experiences through rigorous practices.", "isCorrect": false, "rationale": "The emphasis is on the absence of desire, which contrasts with actively 'seeking out' or 'rigorous practices' driven by a desire for specific experiences. It implies a more receptive state."}], "id": "q05"}, {"question": "The Taoist concept of the cosmos emerging naturally through \"non-forcing\" (cosmic *wu wei*) primarily implies what for human beings seeking to live in harmony with the Tao?", "options": [{"text": "Humans must exert their will to improve and perfect the natural world.", "isCorrect": false, "rationale": "This contradicts the core implication: 'not by conquering the world or by imposing their will on it.'"}, {"text": "True wisdom comes from understanding and aligning oneself with the inherent patterns and flow of existence.", "isCorrect": true, "rationale": "The text explicitly states the implication for human life: 'the person who understands the Tao will live in the same way -- not by conquering the world or by imposing their will on it, but by discovering the natural current and flowing with it.' This is alignment."}, {"text": "Human actions are ultimately meaningless in the face of cosmic processes, so effort is futile.", "isCorrect": false, "rationale": "While *wu wei* emphasizes effortlessness, it doesn't equate to futility or meaninglessness. It is 'effortless *action*', not passive resignation. The sage still acts."}, {"text": "Spiritual enlightenment can only be achieved by completely withdrawing from society.", "isCorrect": false, "rationale": "While Laozi withdrew, the text states the implication is about *how* one lives in the world, 'discovering the natural current and flowing with it,' not necessarily about complete withdrawal."}], "id": "q06"}, {"question": "Which of the following statements accurately clarifies a common misconception about the Taoist concept of *wu wei*?", "options": [{"text": "*Wu wei* means achieving a state where one no longer experiences any emotions.", "isCorrect": false, "rationale": "*Wu wei* is about alignment and effortless action, not about eliminating emotions. It pertains to how one acts in the world."}, {"text": "*Wu wei* instructs individuals to cease all activity and become completely passive.", "isCorrect": false, "rationale": "The text directly refutes this: '*Wu wei* does not mean doing nothing.' It means 'acting in alignment with the natural flow of things.'"}, {"text": "*Wu wei* refers to acting without conscious thought, relying purely on instinct.", "isCorrect": false, "rationale": "While it involves natural flow, it's about aligned action, which can include conscious wisdom from a sage, not a mindless state of pure instinct."}, {"text": "*Wu wei* is about acting in harmony with natural processes rather than trying to force outcomes.", "isCorrect": true, "rationale": "This is the precise definition given in the text: 'It means acting in alignment with the natural flow of things rather than forcing, straining, or imposing one's will on the world.'"}], "id": "q07"}, {"question": "The legend of Laozi becoming \"disillusioned with civilization\" and departing for the frontier before writing the Tao Te Ching most strongly resonates with which core Taoist principle or attitude?", "options": [{"text": "The importance of establishing strong governmental structures.", "isCorrect": false, "rationale": "Laozi's disillusionment and departure suggest a critique of, or detachment from, established societal structures, not an endorsement of strengthening them."}, {"text": "The necessity of embracing human-made laws and social conventions.", "isCorrect": false, "rationale": "His disillusionment implies a rejection or skepticism of 'civilization,' which includes its laws and conventions, in favor of a more natural 'way'."}, {"text": "A preference for natural spontaneity and simplicity over complex societal constructs.", "isCorrect": true, "rationale": "Laozi's disillusionment with 'civilization' and subsequent departure aligns with the Taoist emphasis on finding truth in the 'natural current' and simple flow of things, away from artificial complexities."}, {"text": "The belief that knowledge should only be transmitted orally, never written down.", "isCorrect": false, "rationale": "The fact that he wrote the Tao Te Ching, albeit reluctantly, directly contradicts the idea that knowledge should never be written down."}], "id": "q08"}, {"question": "According to Chapter 25 of the Tao Te Ching, \"Man takes his law from the Earth; the Earth takes its law from Heaven; Heaven takes its law from the Tao. The law of the Tao is its being what it is.\" This hierarchical structure culminates in the Tao's law, which signifies:", "options": [{"text": "The Tao's absolute authority to dictate all cosmic and human laws.", "isCorrect": false, "rationale": "While the Tao is the ultimate source, its 'law' is described as 'its being what it is,' which emphasizes inherent nature rather than active dictation or authoritarian rule."}, {"text": "The Tao operates according to an unchanging, self-sovereign natural principle.", "isCorrect": true, "rationale": "The phrase 'The law of the Tao is its being what it is' signifies that the Tao's governing principle is its own spontaneous, uncreated nature – a self-sufficient, inherent 'law' that requires no external imposition or conscious decision."}, {"text": "The Tao is a cosmic legislator who designs the universe with specific rules.", "isCorrect": false, "rationale": "The text states the Tao 'does not deliberate. The Tao does not choose.' Its 'law' is not a designed set of rules but its inherent nature."}, {"text": "Humanity's ultimate responsibility is to create its own laws independently of nature.", "isCorrect": false, "rationale": "The passage clearly states 'Man takes his law from the Earth,' implying an interconnectedness and dependence on natural order, not independence."}], "id": "q09"}, {"question": "The text identifies a \"radical philosophical position\" in Taoism. What is this position?", "options": [{"text": "The belief that all deities are mere human constructs.", "isCorrect": false, "rationale": "While Taoism has a unique take on divinity, the text doesn't identify this as *the* most radical position. The focus is on language and reality."}, {"text": "The assertion that the ultimate ground of reality cannot be adequately expressed or grasped through human language.", "isCorrect": true, "rationale": "The text explicitly states this: 'This is a philosophical position -- perhaps the most radical position in this entire Roundtable: the ground of reality cannot be captured in words without being distorted.'"}, {"text": "The rejection of all forms of social organization and government.", "isCorrect": false, "rationale": "While Laozi was disillusioned with civilization, the text doesn't claim this total rejection as the *most radical philosophical position* described in the opening."}, {"text": "The idea that suffering is an illusion and can be overcome through mental discipline.", "isCorrect": false, "rationale": "This concept is not discussed in the provided text as the 'radical philosophical position' of Taoism. The focus is on the nature of reality and language."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
