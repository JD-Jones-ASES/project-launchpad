<script>
var QUESTIONS = [{"question": "The social and economic conditions that fundamentally shaped Karl Marx's ideas were primarily a result of which major historical transformation?", "options": [{"text": "The Enlightenment's emphasis on individual rights.", "isCorrect": false, "rationale": "While the Enlightenment influenced political thought, the text focuses on the Industrial Revolution's economic and social upheavals as the direct catalyst for Marx's specific ideas about class and capital."}, {"text": "The rapid urbanization and industrialization of Europe.", "isCorrect": true, "rationale": "The text explicitly states that in Marx's birth year, 'the Industrial Revolution was remaking Europe,' leading to millions moving to cities, harsh factory conditions, and the rapid accumulation of wealth by owners, which directly informed Marx's critique of capitalism."}, {"text": "The widespread famines caused by agricultural failures.", "isCorrect": false, "rationale": "The text describes poverty, disease, and short lifespans for industrial workers due to factory conditions and exploitation, not primarily widespread agricultural failures or famines."}, {"text": "The decline of monarchical power across European nations.", "isCorrect": false, "rationale": "The text emphasizes the economic and social changes brought by industrialization as the primary context for Marx's ideas, rather than a significant focus on the decline of monarchical power."}]}, {"question": "While Marx adopted Hegel's idea that history progresses through conflict, he fundamentally rejected Hegel's explanation of the conflict's origin. What did Marx propose as the true driver of historical change, in contrast to Hegel's view?", "options": [{"text": "The development of religious doctrine and moral philosophy.", "isCorrect": false, "rationale": "For Marx, religion and philosophy were part of the 'superstructure,' shaped by the economic 'base,' not the primary drivers of history."}, {"text": "The ownership of economic resources and the organization of labor.", "isCorrect": true, "rationale": "The text states, 'For Marx, what really drove history was something far more concrete: who owned the land, who owned the factories, and who had to sell their labor to survive,' directly contrasting with Hegel's focus on 'ideas and the development of mind.' This is the core of historical materialism."}, {"text": "The struggle between different national identities and cultures.", "isCorrect": false, "rationale": "While national identities can be involved in conflict, Marx's primary focus for historical dynamism was on class struggle rooted in material economic conditions, not cultural differences."}, {"text": "The evolution of scientific knowledge and technological innovation.", "isCorrect": false, "rationale": "Though technology plays a role in production, Marx saw the *social relations* surrounding production and ownership as the fundamental driver of history, not scientific advancements themselves."}]}, {"question": "Friedrich Engels' unique background and contributions were crucial to Karl Marx's work and legacy. Which of the following best describes Engels' most significant and distinct contributions?", "options": [{"text": "He provided the philosophical framework that Marx then elaborated upon.", "isCorrect": false, "rationale": "Marx's philosophical framework was developed through his education and engagement with thinkers like Hegel; Engels' contribution was more empirical and supportive."}, {"text": "He was the primary author of 'The Communist Manifesto', while Marx contributed only minor edits.", "isCorrect": false, "rationale": "The text identifies Marx and Engels as co-authors of 'The Communist Manifesto,' and Marx is generally recognized as the primary author of its core philosophical and economic arguments."}, {"text": "He translated Marx's complex German writings into English, making them accessible globally.", "isCorrect": false, "rationale": "The text mentions Engels ensuring the publication of Marx's work and maintaining his legacy, but not specifically acting as a translator to English."}, {"text": "He documented the harsh realities of industrial capitalism firsthand and provided long-term financial and editorial support to Marx.", "isCorrect": true, "rationale": "Engels, the 'son of a successful factory owner,' had 'firsthand knowledge of industrial capitalism' and 'documented the poverty, disease, and brutality.' He also 'financially supported Marx's family' and 'prepared the second and third volumes of Das Kapital for publication after Marx's death.'"}]}, {"question": "A historian is analyzing a historical period where a new dominant political system emerged. If this historian were applying Marx's theory of historical materialism, which of the following would they focus on as the primary explanatory factor?", "options": [{"text": "The prevailing intellectual and philosophical movements of the time.", "isCorrect": false, "rationale": "According to historical materialism, intellectual movements are part of the 'superstructure,' which is shaped by the economic 'base,' rather than being the primary driving force themselves."}, {"text": "The specific religious beliefs and practices of the majority population.", "isCorrect": false, "rationale": "Marx viewed religion as part of the 'superstructure,' determined by social existence and the economic base, not as the fundamental cause of historical change."}, {"text": "The changes in how goods were produced, distributed, and owned within society.", "isCorrect": true, "rationale": "Historical materialism states that 'history is driven by material economic conditions — who owns what, how goods are produced, and how that production is organized.' These factors constitute the 'economic base' that shapes all other aspects of society."}, {"text": "The charismatic leadership and persuasive rhetoric of key political figures.", "isCorrect": false, "rationale": "While leaders can influence events, historical materialism emphasizes that underlying material conditions and class relations are the ultimate determinants of political systems, not solely individual actions."}]}, {"question": "According to 'The Communist Manifesto', what is the overarching theme that characterizes all of human history?", "options": [{"text": "The perpetual quest for individual liberty and autonomy.", "isCorrect": false, "rationale": "While important to some philosophies, this is not identified as the 'central claim' of 'The Communist Manifesto' in the provided text."}, {"text": "The cyclical rise and fall of great empires and civilizations.", "isCorrect": false, "rationale": "This describes a pattern of history but does not capture the specific, fundamental dynamic that Marx identified as the driving force."}, {"text": "The continuous advancement of scientific and technological capabilities.", "isCorrect": false, "rationale": "Technological advancement is a factor in historical development, but Marx's central thesis focuses on the social relations stemming from these advancements."}, {"text": "The history of class struggle between oppressor and oppressed groups.", "isCorrect": true, "rationale": "The text explicitly states that 'The Manifesto’s central claim was stark: all of human history is the history of class struggle. Masters against slaves, lords against serfs, and now: the bourgeoisie against the proletariat.'"}]}, {"question": "In Marxist terminology, the fundamental distinction between the bourgeoisie and the proletariat lies in their relationship to the means of production. Which statement accurately captures this distinction?", "options": [{"text": "The bourgeoisie performs physical labor, while the proletariat manages capital.", "isCorrect": false, "rationale": "This statement reverses the roles; the bourgeoisie does not perform physical labor, and the proletariat sells its labor, not manages capital."}, {"text": "The bourgeoisie owns the means of production, while the proletariat sells its labor to survive.", "isCorrect": true, "rationale": "The keyterms define the bourgeoisie as 'the class that owns the means of production' and the proletariat as 'those who own no means of production and must sell their labor to the bourgeoisie in order to survive.'"}, {"text": "The bourgeoisie is primarily the older aristocracy, while the proletariat is the new merchant class.", "isCorrect": false, "rationale": "The text explicitly distinguishes the bourgeoisie from the older aristocracy and the proletariat from any merchant class, defining them by their relationship to industrial production."}, {"text": "The bourgeoisie advocates for workers' rights, while the proletariat seeks to maintain the status quo.", "isCorrect": false, "rationale": "This is incorrect; Marx identified the bourgeoisie as the exploiting class and the proletariat as the exploited class destined to overthrow the status quo."}]}, {"question": "Marx envisioned a specific ultimate role for the proletariat in the historical process. Based on the text, what was this role?", "options": [{"text": "To negotiate better working conditions with the bourgeoisie.", "isCorrect": false, "rationale": "While seeking better conditions might be an immediate goal, Marx's ultimate vision for the proletariat was revolutionary, not merely reformist."}, {"text": "To gradually accumulate capital and join the ranks of the bourgeoisie.", "isCorrect": false, "rationale": "Marx believed the fundamental class divide prevented widespread upward mobility and that the proletariat's destiny was to dismantle the capitalist system, not assimilate into it."}, {"text": "To overthrow the capitalist order and liberate all humanity.", "isCorrect": true, "rationale": "The keyterm for proletariat states, 'For Marx, the proletariat is both the most oppressed class and — ultimately — the class destined to overthrow the capitalist order and liberate all humanity.'"}, {"text": "To form independent trade unions to protect their immediate interests.", "isCorrect": false, "rationale": "Trade unions represent a reformist approach within capitalism, whereas Marx's vision for the proletariat was a complete revolutionary overthrow of the system itself."}]}, {"question": "Karl Marx came from a 'comfortable family' and received an 'excellent philosophical education.' How might these personal circumstances, despite his focus on the working class, have shaped his approach to social analysis?", "options": [{"text": "His personal comfort prevented him from truly understanding the plight of the working class.", "isCorrect": false, "rationale": "The text indicates he understood their plight well enough to 'ignite a revolution,' aided by Engels' firsthand accounts and his own rigorous analysis, despite his personal background."}, {"text": "His family's wealth alienated him from Engels, hindering their early collaboration.", "isCorrect": false, "rationale": "The text states they 'immediately recognized in each other a like mind' and collaborated for decades, with Engels financially supporting Marx, indicating strong collaboration, not alienation."}, {"text": "His privileged upbringing led him to advocate for gradual reform rather than revolutionary change.", "isCorrect": false, "rationale": "The text describes Marx as a 'radical journalist' whose 'ideas ignited a revolution,' indicating a push for fundamental, revolutionary change, not just gradual reform."}, {"text": "His philosophical background allowed him to develop a complex theoretical framework for analyzing class conflict, rather than just documenting it.", "isCorrect": true, "rationale": "His 'excellent philosophical education at the University of Berlin,' where he encountered Hegel's ideas, provided him with the tools to develop a systematic theory of history and class struggle (historical materialism), moving beyond mere observation of suffering."}]}, {"question": "The text highlights a significant 'gap between Communist theory and Communist practice.' What is this gap primarily attributed to?", "options": [{"text": "Marx's lack of clarity in his original writings, leading to multiple interpretations.", "isCorrect": false, "rationale": "The text acknowledges that various governments 'interpreted his theory differently,' but it attributes the gap more to the actual outcomes and repressive systems that emerged, rather than just ambiguity in Marx's writing."}, {"text": "The unintended and often lethal outcomes of real-world Communist states compared to Marx's theoretical predictions and purported endorsements.", "isCorrect": true, "rationale": "The text explicitly states this gap arose because real-world Communist governments 'produced outcomes — including some of the most lethal systems of political repression in human history — that Marx himself neither predicted nor (his defenders argue) would have endorsed.'"}, {"text": "The inability of real-world Communist leaders to fully grasp Marx's complex economic theories.", "isCorrect": false, "rationale": "While differing interpretations occurred, the text doesn't attribute the gap primarily to a lack of understanding by leaders, but to the actual, severe consequences of their regimes."}, {"text": "The natural evolution of societies making Marx's 19th-century theories irrelevant in the 20th century.", "isCorrect": false, "rationale": "The text frames the gap as a divergence between the *theory* and the *practice* of implementing those theories, rather than simply rendering the theories irrelevant."}]}, {"question": "Considering the description of industrial Europe at the time of Marx's birth, which observation would most strongly support Marx's later theories about class conflict?", "options": [{"text": "The rise of new democratic governments advocating for universal suffrage.", "isCorrect": false, "rationale": "While political changes occurred, the text's emphasis for Marx's context is on economic exploitation and inequality, not primarily democratic advancements."}, {"text": "The increasing social mobility allowing many workers to become factory owners.", "isCorrect": false, "rationale": "The text indicates the opposite: workers were 'simply replaced' and 'grew sick and died young,' suggesting a rigid class structure with little mobility for the working class."}, {"text": "The development of advanced medical technologies that significantly extended the lifespan of all social classes.", "isCorrect": false, "rationale": "The text states workers 'often grew sick and died young,' indicating that advanced medical technologies were not broadly improving the health of the working class during this period."}, {"text": "The stark contrast between the rapidly growing wealth of factory owners and the extreme poverty and exploitation of laborers.", "isCorrect": true, "rationale": "The text describes factory owners 'grew wealthy at a speed that would have been unimaginable a generation earlier,' while workers 'grew sick and died young' and suffered 'poverty, disease, and brutality.' This stark economic inequality is a direct illustration of the class conflict central to Marx's theories."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
