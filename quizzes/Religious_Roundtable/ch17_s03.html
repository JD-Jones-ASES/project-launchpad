    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 17, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary philosophical implication of the opening line of the Tao Te Ching, \"The Tao that can be named is not the eternal 'Tao'\"?", "options": [{"text": "Language is inherently flawed and should be abandoned in pursuit of ultimate truth.", "isCorrect": false, "rationale": "While language is seen as limiting, the text clarifies, 'This is not a refusal to speak -- Laozi goes on to speak for eighty-one chapters,' indicating that language is not to be abandoned entirely but used with caution."}, {"text": "The ultimate reality, the Tao, transcends human categories of language and description.", "isCorrect": true, "rationale": "The text states this line is 'a warning about language itself: every name we give to the ultimate reality is a partial gesture toward something that exceeds naming,' meaning the Tao is beyond full linguistic description."}, {"text": "Laozi intentionally chose an ambiguous opening to confuse readers and encourage debate.", "isCorrect": false, "rationale": "While the 'DID YOU KNOW?' section mentions deliberate ambiguity in the text's translation, the primary philosophical implication of this specific opening line is about the Tao's indescribability, not simply about confusing readers."}, {"text": "The Tao can only be understood through mystical experiences, not intellectual discourse.", "isCorrect": false, "rationale": "The text describes this as a 'precise philosophical observation,' suggesting it's not 'mere mysticism' but a profound insight into the nature of reality that can be intellectually engaged with, albeit not fully grasped by ordinary thought."}]}, {"question": "How does the Tao fundamentally differ from concepts like the God of Islam or the Brahman of Hindu theology, as described in the text?", "options": [{"text": "The Tao is a personal being who creates the world through an act of choice or love.", "isCorrect": false, "rationale": "The text explicitly states: 'Unlike the God of Islam or the Brahman of Hindu theology, the Tao is not a being with a personality. It does not create the world by choice or out of love.'"}, {"text": "The Tao is a 'higher' power that exists above the world, separate from creation.", "isCorrect": false, "rationale": "The text clarifies that Taoist transcendence is 'not the transcendence of a God who is 'higher' than the world but the transcendence of a ground that is 'prior' to the world,' emphasizing it's not an added level above creation."}, {"text": "The Tao is the ultimate ground of all reality, existing prior to the world and without personality.", "isCorrect": true, "rationale": "The text defines the Tao as 'the ultimate ground of all reality' and explicitly states it is 'not a being with a personality,' but rather 'the condition of possibility for creation itself,' existing 'before heaven and earth.'"}, {"text": "The Tao is a deity that commands obedience and judges human actions.", "isCorrect": false, "rationale": "The text states the Tao is not 'a lord who commands' and makes no assumption of being their lord (Chapter 34), indicating it does not act as a judgmental deity."}]}, {"question": "The text describes the Tao's transcendence as 'not the transcendence of a God who is 'higher' than the world but the transcendence of a ground that is 'prior' to the world in an ultimate sense.' Which analogy best captures this unique form of transcendence?", "options": [{"text": "A king who rules over a kingdom from a lofty throne.", "isCorrect": false, "rationale": "This analogy implies a 'higher' personal ruler, which the text explicitly contrasts with the Tao's 'prior' transcendence and lack of personality."}, {"text": "A sculptor who shapes clay into a work of art.", "isCorrect": false, "rationale": "This analogy suggests a craftsman who 'builds' or creates by choice, which the text explicitly states the Tao is not."}, {"text": "The fundamental laws of physics that govern all natural phenomena.", "isCorrect": true, "rationale": "This analogy represents an underlying principle or condition that makes all phenomena possible without being a personal entity or a separate, 'higher' level. The Tao is 'the condition of possibility for creation itself,' analogous to fundamental laws or principles."}, {"text": "A parent who guides and nurtures their children from a loving distance.", "isCorrect": false, "rationale": "This analogy implies a personal, loving, and guiding entity, which contradicts the description of the Tao as lacking personality and not creating out of choice or love."}]}, {"question": "The Taoist concept of immanence, as expressed by 'The great Tao flows everywhere. It may go left or right,' suggests that:", "options": [{"text": "The Tao is a fluid, ever-changing entity that lacks a fixed nature.", "isCorrect": false, "rationale": "While 'flows everywhere' implies dynamism, other parts of the text (Ch. 25) describe the Tao as 'unchanging,' indicating its fundamental nature is stable, even as it manifests dynamically."}, {"text": "The Tao is present within and as the very fabric of all natural phenomena.", "isCorrect": true, "rationale": "The text states, 'The Tao is not remote or above; it is in everything, the way grain is in wood. The naturalness (ziran)... in nature... all of these are expressions of the Tao's presence in the ordinary world. Nothing in nature is not the Tao.'"}, {"text": "The Tao is a guiding force that directs all events in the world with purpose.", "isCorrect": false, "rationale": "The phrase 'It may go left or right' suggests an undirected, natural flow rather than a purposeful, commanding guidance often associated with a personal divine force. The text also clarifies it's 'immanence without a personal God.'"}, {"text": "The Tao can be found in sacred places or specific rituals rather than daily life.", "isCorrect": false, "rationale": "The text emphasizes that the Tao 'flows everywhere' and is present 'in everything' and 'in the ordinary world,' which contradicts the idea of it being confined to sacred places or rituals."}]}, {"question": "A modern architect aims to design a building that perfectly integrates with its natural surroundings, using local materials and allowing the environment to dictate the structure's flow rather than imposing a preconceived rigid design. This approach is most analogous to which Taoist concept?", "options": [{"text": "The 'returning to the root' described in Chapter 16.", "isCorrect": false, "rationale": "'Returning to the root' focuses on understanding origins, stillness, and clarity, which is a contemplative state rather than an active design methodology aligned with working with nature's flow."}, {"text": "The transcendence of the Tao as 'prior' to the world.", "isCorrect": false, "rationale": "The Tao's transcendence describes its fundamental nature as the ground of all reality, not a human practice or design principle."}, {"text": "The practice of 'wu wei,' or acting without forcing.", "isCorrect": true, "rationale": "The architect's approach of 'allowing the environment to dictate the structure's flow rather than imposing a preconceived rigid design' directly reflects 'wu wei,' which means 'acting in accordance with the Tao -- with the grain of reality rather than against it... not straining, forcing, or imposing.'"}, {"text": "The humility of the sage who 'does not make himself great.'", "isCorrect": false, "rationale": "While related to wu wei, the humility of the sage (Ch. 34) refers to a personal quality and its result (accomplishing great things) rather than the direct methodology of harmonizing with the environment in design."}]}, {"question": "The text describes the 'paradox at the heart of Taoist theology': the Tao is both 'the farthest thing from ordinary experience' and 'the closest thing to ordinary experience.' How does Taoism suggest one should respond to this paradox?", "options": [{"text": "By engaging in rigorous philosophical debate to resolve the apparent contradiction.", "isCorrect": false, "rationale": "The text explicitly states: 'Resolving this paradox is not Taoism's aim. The appropriate response is not a clever philosophical argument that explains it away.'"}, {"text": "By accepting it as a fundamental teaching and cultivating a responsive openness.", "isCorrect": true, "rationale": "The text advises: 'The paradox is the teaching. The appropriate response is... a kind of responsive openness -- wu wei -- in which one stops fighting the way things are and begins to move with the Tao rather than against it.'"}, {"text": "By seeking direct mystical enlightenment that transcends all paradoxes.", "isCorrect": false, "rationale": "While Taoism involves deep insights, the text focuses on 'responsive openness' and 'wu wei' as the direct response to this paradox, rather than implying a transcendence that 'explains away' the paradox."}, {"text": "By choosing to focus on either the transcendent or immanent aspect, whichever resonates more.", "isCorrect": false, "rationale": "The core of the teaching is the coexistence of both aspects, and the text emphasizes that the Tao is 'prior to the distinction between transcendent and immanent.' Choosing one aspect would miss the holistic nature of the paradox."}]}, {"question": "Chapter 1 of the Tao Te Ching mentions the Tao as 'having no name, it is the Originator of heaven and earth; (conceived of as) having a name, it is the Mother of all things.' What does this distinction primarily emphasize?", "options": [{"text": "The Tao evolves over time, first nameless, then acquiring a name as it creates.", "isCorrect": false, "rationale": "The text clarifies that 'Under these two aspects, it is really the same,' indicating these are simultaneous perspectives rather than a temporal evolution of the Tao itself."}, {"text": "Human language can only ever grasp a partial and secondary aspect of the Tao.", "isCorrect": true, "rationale": "This reiterates the main philosophical point: the Tao in its ultimate, eternal form 'cannot be named' and 'exceeds naming.' Any 'name' like 'Mother of all things' is a way of conceiving it for human understanding, a partial gesture towards its full mystery."}, {"text": "The Tao is dualistic, consisting of both a nameless and a named entity.", "isCorrect": false, "rationale": "The chapter explicitly states, 'Under these two aspects, it is really the same,' indicating it is one entity understood in different ways, not two separate entities."}, {"text": "The Tao initially has no influence, but through naming, becomes active in the world.", "isCorrect": false, "rationale": "The nameless Tao is already described as the 'Originator of heaven and earth,' implying its fundamental influence is always present, irrespective of human naming."}]}, {"question": "Chapter 16 of the Tao Te Ching describes 'returning to the root' as achieving 'stillness' and 'clarity,' which leads to 'knowing that unchanging rule.' What is the ultimate benefit of knowing this unchanging rule?", "options": [{"text": "It allows one to manipulate natural processes for personal gain.", "isCorrect": false, "rationale": "Taoist principles, particularly wu wei, emphasize acting in harmony with the Tao, not manipulating it for personal, self-serving ends."}, {"text": "It ensures a safe and comfortable existence free from all danger.", "isCorrect": false, "rationale": "While 'exempt from all danger of decay' is mentioned for the end of bodily life, the ultimate benefit described extends beyond mere physical safety to a profound state of being: 'kingliness of character' and 'likeness to heaven.'"}, {"text": "It grants a profound connection to all things, leading to kingliness and likeness to heaven.", "isCorrect": true, "rationale": "The text states: 'The knowledge of that unchanging rule produces a... community (of feeling with all things). From this community of feeling comes a kingliness of character; and he who is king-like goes on to be heaven-like. In that likeness to heaven he possesses the Tao.'"}, {"text": "It provides the intellectual framework to finally 'grasp' the eternal Tao.", "isCorrect": false, "rationale": "The section repeatedly stresses that the Tao 'cannot be fully grasped' or described in ordinary language. Knowing the unchanging rule leads to 'possessing the Tao' through being, rather than grasping it intellectually."}]}, {"question": "The 'Did You Know?' section highlights the deliberate ambiguity of the Tao Te Ching text, suggesting that 'reading several versions side by side can itself become a Taoist exercise in not-grasping.' How does this act of 'not-grasping' align with broader Taoist principles?", "options": [{"text": "It encourages readers to develop their own unique interpretations, asserting intellectual dominance over the text.", "isCorrect": false, "rationale": "Asserting intellectual dominance contradicts the Taoist emphasis on humility and the understanding that the ultimate reality transcends individual interpretations or complete mastery by the mind."}, {"text": "It reinforces the idea that true understanding comes from transcending language and resisting the urge to define ultimate reality.", "isCorrect": true, "rationale": "The concept of 'not-grasping' aligns perfectly with the opening statement that 'The Tao that can be named is not the eternal 'Tao'' and the idea that the Tao 'exceeds naming,' encouraging an openness to its elusive nature rather than striving for a definitive definition."}, {"text": "It proves that the Tao is ultimately unknowable and that all attempts to understand it are futile.", "isCorrect": false, "rationale": "While the Tao is ultimately indescribable, Taoism offers a 'way' (Tao) of interacting with it, such as through wu wei. 'Not-grasping' is an active engagement with its mystery, not a surrender to futility."}, {"text": "It prepares the reader to resolve the paradoxes of the Tao through comparative analysis.", "isCorrect": false, "rationale": "The text explicitly states that 'Resolving this paradox is not Taoism's aim. The paradox is the teaching.' 'Not-grasping' is about embracing, not resolving, contradictions."}]}, {"question": "Considering the entirety of the section, which statement best summarizes the unique approach of Taoist theology to understanding ultimate reality?", "options": [{"text": "It seeks to define ultimate reality through precise conceptual frameworks and logical arguments.", "isCorrect": false, "rationale": "The text explicitly cautions against the limits of language and intellectual 'grasping,' stating that the Tao 'cannot be described in ordinary language' and that resolving paradoxes through 'clever philosophical argument' is not the aim."}, {"text": "It presents ultimate reality as a personal, higher being that directs the world.", "isCorrect": false, "rationale": "The text clearly distinguishes the Tao from a personal God, stating it 'is not a being with a personality' and does not 'command' or act as a 'lord.'"}, {"text": "It embraces the unnameable, paradoxical nature of ultimate reality as both transcendent and immanent, encouraging a responsive, non-forcing way of being.", "isCorrect": true, "rationale": "This statement synthesizes the core teachings: the Tao's unnameable nature, its simultaneous transcendence ('prior' ground) and immanence ('in everything'), and the appropriate human response of 'responsive openness' or 'wu wei' (non-forcing action)."}, {"text": "It advocates for a retreat from the world to achieve spiritual purity and connection with the ultimate.", "isCorrect": false, "rationale": "While 'stillness' is valued, the emphasis on the Tao's immanence ('in everything, the way grain is in wood') and the practice of wu wei (acting in the world harmoniously) suggests engagement with the ordinary world rather than retreat."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
