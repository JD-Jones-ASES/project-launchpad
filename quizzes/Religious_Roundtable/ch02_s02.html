    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "How does Jewish monotheism, as declared in the Shema, fundamentally differ from a belief system that acknowledges one supreme deity among many lesser gods?", "options": [{"text": "It emphasizes God's role as a benevolent ruler rather than a distant creator.", "isCorrect": false, "rationale": "While Judaism emphasizes God's benevolence, this specific point does not capture the fundamental distinction of its monotheism as described in the text, which focuses on God's absolute unity and singularity."}, {"text": "It asserts that God is the sole, undivided, and ultimate source of all reality and morality, without any rival divine powers.", "isCorrect": true, "rationale": "The text explicitly states Jewish monotheism is 'not merely one chief god among many, but the only God, creator and sustainer of all reality,' emphasizing God's 'absolute unity' as 'one ultimate source of reality, one ultimate ground of morality.'"}, {"text": "It prioritizes the worship of God through specific rituals rather than general faith.", "isCorrect": false, "rationale": "The nature of worship is not the primary distinguishing factor of Jewish monotheism described here; the focus is on the metaphysical nature of God as 'One.'"}, {"text": "It suggests that God's power is limited to the spiritual realm, leaving the physical world to other forces.", "isCorrect": false, "rationale": "This contradicts the text, which describes God as 'creator and sustainer of all reality,' indicating comprehensive power over both spiritual and physical realms."}], "id": "q01"}, {"question": "The text describes the Jewish God as 'intensely personal' yet 'utterly unlike anything human' and strictly forbids making images of God. What central tension does the prohibition on idolatry resolve in this description of God?", "options": [{"text": "It prevents the mixing of divine and human attributes, ensuring God remains purely abstract.", "isCorrect": false, "rationale": "God is described as 'intensely personal,' indicating God is not purely abstract, but rather engaged and relational."}, {"text": "It reinforces God's role as a distant creator who does not intervene in human affairs.", "isCorrect": false, "rationale": "This contradicts the text, which states God 'speaks, who hears prayer, who grieves over human suffering,' indicating active intervention and personal engagement."}, {"text": "It safeguards God's transcendence and incomprehensibility by resisting the human tendency to reduce the divine to controllable, human-made forms.", "isCorrect": true, "rationale": "The text explains the prohibition on idolatry is 'about the human tendency to reduce God to something manageable, something we can control,' and that 'The Jewish God resists all such reductions,' thereby preserving God's unique and transcendent nature."}, {"text": "It limits the expressions of faith to verbal prayers and textual study, excluding all visual artistry.", "isCorrect": false, "rationale": "While visual images of God are forbidden, the rationale for this prohibition, as explained in the text, is deeper than merely limiting artistic expression; it's about the nature of God and human attempts to control it."}], "id": "q02"}, {"question": "According to the concept of *brit* (covenant) described, if the Jewish people consistently failed to uphold their commitment to justice and obedience, what would be the primary theological implication from God's perspective, as the 'senior partner'?", "options": [{"text": "God would likely revoke the covenant entirely, choosing a new people.", "isCorrect": false, "rationale": "The text states God 'commits to care for, guide, and ultimately redeem Israel,' implying an enduring commitment from God's side despite human failings. Revoking the covenant entirely is not suggested."}, {"text": "God's commitment to 'care for, guide, and ultimately redeem Israel' would remain, but the relationship would be strained by Israel's unfaithfulness.", "isCorrect": true, "rationale": "The covenant involves 'genuine obligations on both sides.' While God is the 'senior partner' with an ultimate commitment, Israel's failure to uphold its side (obedience, justice) would naturally strain the mutual relationship without necessarily dissolving God's overarching commitment to redeem them."}, {"text": "God would demand a greater number of sacrifices to atone for their failures.", "isCorrect": false, "rationale": "The text does not mention sacrifice as the primary response to covenant failure within this description of *brit*."}, {"text": "The concept of 'chosen people' would automatically become null and void, as it's a privilege, not a responsibility.", "isCorrect": false, "rationale": "The text explicitly clarifies that 'chosenness is not a privilege but a responsibility,' suggesting it's an enduring call rather than a conditional status that can become null and void."}], "id": "q03"}, {"question": "The text clarifies the common misunderstanding of 'the Jewish concept of the chosen people.' Which statement best reflects the nuanced theological understanding presented in the section?", "options": [{"text": "It signifies a spiritual superiority inherent to the Jewish people, granting them exclusive divine favor.", "isCorrect": false, "rationale": "The text explicitly states this understanding is a 'misunderstanding' and that 'chosen people has often been misunderstood as a claim of racial or spiritual superiority.'"}, {"text": "It implies a divine selection for a unique and demanding responsibility to model justice and holiness for the world.", "isCorrect": true, "rationale": "The text states: 'chosenness is not a privilege but a responsibility. To be chosen is to be called—called to a specific way of life, called to model justice and holiness for the world.'"}, {"text": "It designates the Jewish people as the sole recipients of God's ultimate redemption, excluding all others.", "isCorrect": false, "rationale": "The text focuses on the *role* and *responsibility* of being chosen, not on an exclusive claim to redemption."}, {"text": "It refers to God's choice of a particular land for the Jewish people, rather than a specific people.", "isCorrect": false, "rationale": "While the land is significant in Judaism, the term 'chosen people' refers to the people themselves and their specific calling, as detailed in the text."}], "id": "q04"}, {"question": "A group of Jewish scholars engages in a vigorous debate over the precise meaning and contemporary application of a specific Torah commandment. They arrive at multiple valid interpretations, with no single, universally agreed-upon resolution. Based on the text's description of Jewish 'interpretive energy,' what is the most significant takeaway from this process?", "options": [{"text": "The lack of a definitive resolution indicates a weakness in the tradition's ability to provide clear guidance.", "isCorrect": false, "rationale": "The text states this 'is not a sign of doubt—it is an expression of faith,' countering the idea that it signifies weakness."}, {"text": "The debate itself, and the ongoing engagement with the questions, is considered a sacred and vital aspect of the tradition.", "isCorrect": true, "rationale": "The text explicitly states: 'Judaism treats the conversation itself as sacred. The tradition lives not in fixed answers but in ongoing engagement with the questions.'"}, {"text": "Only the oldest interpretations hold true authority, rendering contemporary debates largely irrelevant.", "isCorrect": false, "rationale": "The text emphasizes that the Torah is 're-examined in every generation,' implying contemporary interpretations are vital, not irrelevant."}, {"text": "Such debates are primarily academic exercises with little bearing on actual Jewish religious life.", "isCorrect": false, "rationale": "The text highlights this interpretive energy as a 'most distinctive feature of Jewish religious life,' indicating its central importance."}], "id": "q05"}, {"question": "According to the text, which of the following is an explicit example of how *tikkun olam* takes 'specific shape in Jewish law'?", "options": [{"text": "The exclusive study of sacred texts in isolation from worldly concerns.", "isCorrect": false, "rationale": "*Tikkun olam* involves active engagement with the world to 'repair of the world,' not isolation from it."}, {"text": "The prohibition against charging interest to the vulnerable.", "isCorrect": true, "rationale": "The text explicitly lists this as an example: 'in the commandment to leave a corner of one's field for the poor, in the prohibition against charging interest to the vulnerable, in the obligation to welcome the stranger.'"}, {"text": "Mandatory participation in annual temple pilgrimages.", "isCorrect": false, "rationale": "Annual temple pilgrimages are not mentioned in this section as an example of *tikkun olam* taking specific shape in Jewish law."}, {"text": "The requirement to donate a fixed percentage of income to religious institutions.", "isCorrect": false, "rationale": "While charity is related, the text specifically mentions 'leaving a corner of one's field for the poor' and 'prohibition against charging interest to the vulnerable' as examples of *tikkun olam*, not a fixed percentage to institutions."}], "id": "q06"}, {"question": "The Shema declares God's absolute unity ('Adonai Echad'). How does this core belief conceptually underpin the Jewish vocation of *tikkun olam* (repair of the world), as described in the text?", "options": [{"text": "If God is one, then the world's problems are merely illusions, negating the need for repair.", "isCorrect": false, "rationale": "This contradicts the core concept of *tikkun olam*, which acknowledges a 'broken creation' and the need for active repair."}, {"text": "A single, undivided God implies a singular, ultimate source of morality, making injustice a violation of the divine order that humans are called to resist.", "isCorrect": true, "rationale": "The text links God's unity to morality: 'One God means one ultimate source of reality, one ultimate ground of morality.' It then connects this to *tikkun olam*: 'Poverty, injustice, oppression, and cruelty are not simply unfortunate facts—they are violations of the divine order. Jews are called to actively resist them.'"}, {"text": "The unity of God suggests that humans should focus solely on spiritual purity, detaching from worldly suffering.", "isCorrect": false, "rationale": "*Tikkun olam* is about active engagement with and healing of worldly suffering, not detachment."}, {"text": "God's unity means all efforts to repair the world must be undertaken by a single, unified global authority.", "isCorrect": false, "rationale": "The text emphasizes individual and communal Jewish responsibility for *tikkun olam*, not a requirement for a single global authority."}], "id": "q07"}, {"question": "The text states, 'The prohibition on idolatry is not merely about statues; it is about the human tendency to reduce God to something manageable, something we can control.' This implies which of the following about the Jewish understanding of God?", "options": [{"text": "God's essence is fundamentally unknowable and beyond human manipulation or full comprehension.", "isCorrect": true, "rationale": "By describing God as resisting all 'reductions' and the human tendency to make God 'manageable' or 'controllable,' the text strongly implies God's transcendence and incomprehensibility beyond human constructs."}, {"text": "God is an abstract concept that exists only in philosophical thought, not in lived experience.", "isCorrect": false, "rationale": "The text explicitly states God is 'intensely personal—a God who speaks, who hears prayer,' indicating a presence in lived experience."}, {"text": "God prefers to communicate directly through prophetic visions rather than through physical representations.", "isCorrect": false, "rationale": "While direct communication occurs, the implication of the idolatry statement is broader: it's about God's nature being beyond human attempts to define or control, not just a preferred mode of communication."}, {"text": "Humanity is inherently incapable of perceiving God in any form, physical or spiritual.", "isCorrect": false, "rationale": "The text states God 'speaks' and 'hears prayer,' indicating forms of perception and interaction, albeit not through physical images created by humans."}], "id": "q08"}, {"question": "A Jewish community is grappling with how to address a significant issue of systemic poverty in their city. Based on the text's understanding of 'chosenness' as a responsibility, which approach would be most consistent with their identity?", "options": [{"text": "Focus primarily on internal community welfare, ensuring their own members are cared for before addressing external issues.", "isCorrect": false, "rationale": "Chosenness involves being 'called to model justice and holiness for the world,' and *tikkun olam* is about 'repair of the world,' which extends beyond the immediate community."}, {"text": "Advocate for policies that address the root causes of poverty, seeing it as an active resistance to a violation of the divine order.", "isCorrect": true, "rationale": "The text states 'chosenness is a responsibility... to model justice... for the world' and that 'Poverty, injustice... are violations of the divine order. Jews are called to actively resist them.' Advocating for policies to address root causes aligns with active resistance to injustice."}, {"text": "Emphasize prayer and spiritual contemplation, believing that divine intervention will ultimately resolve such problems.", "isCorrect": false, "rationale": "While prayer is important, *tikkun olam* emphasizes human beings as 'God's partners in completing and healing creation' through active 'acts of repair,' not passive waiting for divine intervention alone."}, {"text": "Seek to convert those suffering from poverty to Judaism, believing this is the ultimate solution to their plight.", "isCorrect": false, "rationale": "The text describes chosenness as a call 'to model justice and holiness for the world,' not primarily as a mandate for proselytization."}], "id": "q09"}, {"question": "The text highlights that the Talmud preserves centuries of debates, sometimes without resolution, recording multiple valid positions. What fundamental aspect of Jewish religious life does this practice most clearly illustrate?", "options": [{"text": "The emphasis on individual intuition as the ultimate source of religious truth.", "isCorrect": false, "rationale": "The Talmud reflects scholarly debate and collective engagement with texts, not simply individual intuition."}, {"text": "The belief that religious truth is fluid and subject to change with each new generation's preferences.", "isCorrect": false, "rationale": "The re-examination of Torah is an 'expression of faith' in its 'inexhaustibly rich' nature, suggesting deeper understanding rather than arbitrary change of truth."}, {"text": "The value placed on ongoing intellectual engagement and sacred conversation over the attainment of fixed, singular answers.", "isCorrect": true, "rationale": "The text explicitly states: 'Judaism treats the conversation itself as sacred. The tradition lives not in fixed answers but in ongoing engagement with the questions.'"}, {"text": "A historical inability of Jewish scholars to agree on definitive legal and theological principles.", "isCorrect": false, "rationale": "The text presents this practice as a 'sign of faith' and 'distinctive feature,' not as a historical failing or inability."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
