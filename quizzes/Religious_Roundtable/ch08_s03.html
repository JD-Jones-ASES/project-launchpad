    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What makes the surviving sacred texts of Norse Paganism, such as the Eddas, unique compared to the sacred texts of many other traditions?", "options": [{"text": "They were originally written in a dead language, making translation difficult.", "isCorrect": false, "rationale": "The text does not highlight the archaic language as the unique characteristic compared to other traditions; rather, it focuses on the authorship."}, {"text": "They were recorded by people who no longer practiced the religion but wished to preserve cultural heritage.", "isCorrect": true, "rationale": "The text explicitly states: 'its surviving sacred texts were not written by its practitioners — they were written by Christians who wanted to preserve a cultural heritage they no longer held as religion.'"}, {"text": "They were primarily composed as instructional guides for religious rituals.", "isCorrect": false, "rationale": "The text indicates that the Eddas do not provide guidance on daily ritual or theology, making this statement incorrect regarding their primary purpose."}, {"text": "They were compiled and written down by practitioners of the religion themselves.", "isCorrect": false, "rationale": "This option directly contradicts the text, which states the texts 'were not written by its practitioners.'"}], "id": "q01"}, {"question": "Which poem from the Poetic Edda specifically describes the creation of the world and the prophesied coming of Ragnarök?", "options": [{"text": "Háttatal", "isCorrect": false, "rationale": "Háttatal is a section of the Prose Edda by Snorri Sturluson, demonstrating verse forms, not a poem from the Poetic Edda describing creation or Ragnarök."}, {"text": "Hávamál", "isCorrect": false, "rationale": "Hávamál contains practical wisdom, accounts of Odin's sacrifices, and rune-lore, but not the creation of the world or Ragnarök prophecy."}, {"text": "Skáldskaparmál", "isCorrect": false, "rationale": "Skáldskaparmál is a section of the Prose Edda that catalogues kennings and poetic techniques, not a mythological poem about creation or Ragnarök."}, {"text": "Völuspá", "isCorrect": true, "rationale": "The text states that the Völuspá ('The Seeress's Prophecy') 'describes the creation of the world and the coming Ragnarök'."}], "id": "q02"}, {"question": "Snorri Sturluson's primary motivation for compiling the Prose Edda was to:", "options": [{"text": "Record the precise theological beliefs and daily rituals of Norse Paganism.", "isCorrect": false, "rationale": "The text clarifies that the Eddas do not provide a theology or information about daily ritual and worship, so this was not Snorri's primary motivation."}, {"text": "Serve as a handbook to instruct aspiring poets (skalds) in the traditional Norse poetic forms and mythology.", "isCorrect": true, "rationale": "The text explicitly states: 'Written by the Icelandic scholar Snorri Sturluson around 1220 as a handbook for aspiring skalds.'"}, {"text": "Provide a comprehensive historical account of ancient Scandinavian kingdoms and rulers.", "isCorrect": false, "rationale": "While Snorri was a historical figure, the Prose Edda's content (mythology, kennings, verse forms) is presented as a guide for poets, not primarily a historical chronicle of rulers."}, {"text": "Criticize and refute the pagan beliefs from a Christian perspective.", "isCorrect": false, "rationale": "The text implies a goal of cultural preservation rather than refutation, and the content is framed as instruction for skalds."}], "id": "q03"}, {"question": "The text states that runes were not merely a writing system. What deeper significance did the very word 'rune' hold in Old Norse, and what does this imply about their nature?", "options": [{"text": "It meant 'courage' or 'strength,' reflecting their use on weapons.", "isCorrect": false, "rationale": "While runes appeared on weapons, the text provides a specific Old Norse meaning for 'rune' that is different."}, {"text": "It meant 'secret' or 'mystery,' indicating their association with magic, prophecy, and hidden knowledge.", "isCorrect": true, "rationale": "The text directly states: 'The very word “rune” means “secret” or “mystery” in Old Norse,' and connects them with 'magic, prophecy, and hidden knowledge.'"}, {"text": "It meant 'history' or 'record,' emphasizing their role in documenting events.", "isCorrect": false, "rationale": "While runes recorded events, this is not the given Old Norse meaning of the word 'rune,' and it misses the magical/sacred aspect."}, {"text": "It meant 'divine law' or 'commandment,' highlighting their use in religious decrees.", "isCorrect": false, "rationale": "There is no mention of runes being associated with divine law or commandments; their significance is described as mysterious and magical."}], "id": "q04"}, {"question": "Odin's mythological act of hanging himself from Yggdrasil for nine nights to gain the wisdom of the runes, as told in the Hávamál, most directly illustrates which principle about sacred knowledge in Norse tradition?", "options": [{"text": "That sacred knowledge is freely bestowed upon a willing community by the gods.", "isCorrect": false, "rationale": "The text explicitly contrasts this with other traditions, stating that in the Norse account, sacred knowledge 'must be earned through suffering, not given freely.'"}, {"text": "That even the highest gods must undergo significant personal suffering and sacrifice to acquire profound sacred wisdom.", "isCorrect": true, "rationale": "The text highlights this by saying 'makes sacred knowledge something that must be earned through suffering, not given freely,' and 'In the Norse account, even the greatest god has to bleed for what matters.'"}, {"text": "That deities must constantly prove their worthiness to maintain their power over mortals.", "isCorrect": false, "rationale": "The focus of Odin's sacrifice is on gaining wisdom for himself, not proving worthiness to mortals."}, {"text": "That meditation and ritual purity are the primary methods for receiving divine insight.", "isCorrect": false, "rationale": "The text contrasts Odin's method of extreme suffering with 'Vedic seers receiving the eternal sound in meditation,' indicating a different approach for Odin."}], "id": "q05"}, {"question": "How does the primary function and content of the Poetic Edda differ from that of the Prose Edda?", "options": [{"text": "The Poetic Edda is a Christian critique of pagan myths, while the Prose Edda is a pagan's defense.", "isCorrect": false, "rationale": "Both Eddas were compiled/written by Christians for preservation, not as a critique/defense of paganism in the way implied."}, {"text": "The Poetic Edda is a collection of older mythological and heroic poems, while the Prose Edda is a later handbook for skalds, retelling myths and detailing poetic techniques.", "isCorrect": true, "rationale": "The text describes the Poetic Edda as 'A collection of Old Norse mythological and heroic poems' and 'our oldest and most direct source,' while the Prose Edda was 'Written by the Icelandic scholar Snorri Sturluson around 1220 as a handbook for aspiring skalds' containing 'Gylfaginning' (mythology), 'Skáldskaparmál' (poetic techniques), and 'Háttatal' (verse forms)."}, {"text": "The Poetic Edda focuses on historical events, while the Prose Edda concentrates solely on magical spells and prophecies.", "isCorrect": false, "rationale": "The Poetic Edda focuses on mythology and heroic poems, not historical events, and the Prose Edda's content is broader than just spells and prophecies."}, {"text": "The Poetic Edda describes daily rituals, whereas the Prose Edda outlines the strict moral codes of the Norse.", "isCorrect": false, "rationale": "Neither Edda provides detailed information on daily rituals or strict moral codes; they primarily convey mythology and poetic instruction."}], "id": "q06"}, {"question": "What is identified as the central 'challenge of the Norse textual tradition' when trying to understand Norse Paganism?", "options": [{"text": "The difficulty in deciphering the archaic language of Old Norse without modern linguistic tools.", "isCorrect": false, "rationale": "While language can be a challenge, the text highlights a more fundamental interpretive problem than linguistic tools."}, {"text": "The lack of an accompanying community of practice to explain how texts were used, what was believed, and how stories related to daily worship.", "isCorrect": true, "rationale": "The text explicitly states: 'we do not have a community of practice to tell us how they were used, what was required belief and what was optional, or how the stories we know related to daily ritual and worship.'"}, {"text": "The scarcity of surviving texts, with only fragments remaining from the original religion.", "isCorrect": false, "rationale": "The text mentions the Eddas and thousands of runic inscriptions, indicating a substantial body of surviving texts, so scarcity is not the central challenge described."}, {"text": "The deliberate alteration of the texts by Christian scribes to remove all pagan elements.", "isCorrect": false, "rationale": "The text implies preservation of cultural heritage by Christians, not necessarily a systematic removal of all pagan elements, and this is not presented as the primary interpretive challenge."}], "id": "q07"}, {"question": "According to the text, on what types of objects were runes commonly inscribed throughout the Germanic and Scandinavian world?", "options": [{"text": "Only on sacred scrolls and illuminated manuscripts.", "isCorrect": false, "rationale": "Runes were typically inscribed on durable physical objects, not primarily on scrolls or manuscripts, which were more characteristic of later textual traditions."}, {"text": "On weapons, grave-markers, jewelry, and stone monuments.", "isCorrect": true, "rationale": "The text states: 'The runic alphabet ... was used for inscriptions on weapons, grave-markers, jewelry, and stone monuments throughout the Germanic and Scandinavian world.'"}, {"text": "Primarily on wooden tablets used for temporary messages and administrative records.", "isCorrect": false, "rationale": "While some wooden inscriptions existed, the text emphasizes more permanent objects like stone and metal, and runes carried sacred significance beyond temporary messages."}, {"text": "Exclusively on the interior walls of temples and ceremonial halls.", "isCorrect": false, "rationale": "The text lists a wider variety of objects and locations for runic inscriptions, not exclusively temple walls."}], "id": "q08"}, {"question": "The Hávamál, a key poem within the Poetic Edda, is attributed to Odin. What kind of content is predominantly found within its verses?", "options": [{"text": "Detailed genealogies of Norse gods and mythical creatures.", "isCorrect": false, "rationale": "While such information exists in Norse mythology, the Hávamál's specific focus is different."}, {"text": "Practical wisdom, accounts of Odin's sacrifices, and rune-lore.", "isCorrect": true, "rationale": "The text states the Hávamál contains 'practical wisdom alongside accounts of his sacrifices and rune-lore.'"}, {"text": "Epic battle narratives of gods against giants during Ragnarök.", "isCorrect": false, "rationale": "The Völuspá, not the Hávamál, describes Ragnarök. The Hávamál is focused on wisdom and Odin's experiences."}, {"text": "Complex instructions for performing divination rituals using animal entrails.", "isCorrect": false, "rationale": "There is no mention of such ritual instructions being the predominant content of the Hávamál."}], "id": "q09"}, {"question": "Which statement best summarizes the unique predicament of studying Norse Paganism through its surviving texts like the Eddas?", "options": [{"text": "The texts provide a clear, unified theology, but lack historical context.", "isCorrect": false, "rationale": "The text explicitly states 'they do not give us a theology,' making this option incorrect."}, {"text": "The sacred aspects were entirely lost because everything was written down, changing its original meaning.", "isCorrect": false, "rationale": "The text notes that 'the most sacred things were not written down' and that writing changes preservation, but not that *everything* was lost or that writing inherently destroyed meaning."}, {"text": "The texts were written by outsiders, offering mythology without clear guidance on religious practice or individual belief.", "isCorrect": true, "rationale": "The text explains the Eddas 'were not written by its practitioners' and that 'they do not give us a theology. They tell us what the Norse stories were, not precisely what individual Norse people believed,' highlighting the lack of context for religious practice and belief."}, {"text": "The abundance of runic inscriptions has made the Eddas redundant for understanding Norse religion.", "isCorrect": false, "rationale": "The text presents runes as a 'different dimension' of sacred writing, complementing the Eddas rather than rendering them redundant; both contribute to understanding Norse culture."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
