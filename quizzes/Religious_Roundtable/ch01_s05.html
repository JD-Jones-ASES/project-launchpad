        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 1, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary reason Christianity 'matters' beyond its large number of adherents?", "options": [{"text": "It has consistently been the most politically powerful religion throughout history.", "isCorrect": false, "rationale": "The text does not claim consistent political dominance, nor does it present this as the primary reason for its significance beyond numbers. It focuses on cultural and intellectual shaping."}, {"text": "It fundamentally shaped the civilization of Europe and the Americas, which then had enormous global influence.", "isCorrect": true, "rationale": "The text explicitly states: 'The deeper claim is that Christianity did not merely spread across the world; it fundamentally shaped the world, particularly the civilization of Europe and the Americas that has had such enormous global influence.'"}, {"text": "Its ethical teachings are uniquely superior to all other religious frameworks.", "isCorrect": false, "rationale": "The text highlights the influence of Christian ethics but does not make a comparative judgment about their superiority over other religious frameworks."}, {"text": "It introduced the concept of organized religious institutions to the world.", "isCorrect": false, "rationale": "The text does not make this claim; organized religious institutions existed prior to Christianity and in other traditions."}]}, {"question": "The text states that the concept of universal human dignity is deeply rooted in which Christian teaching?", "options": [{"text": "The belief in divine judgment and eternal salvation.", "isCorrect": false, "rationale": "While related to Christian theology, this belief is not identified as the direct root of universal human dignity in the text. The text points to a more fundamental concept of human worth."}, {"text": "The teaching that every human being is made in the image of God (imago Dei).", "isCorrect": true, "rationale": "The text directly states: 'The concept of universal human dignity... has deep roots in the Christian teaching that every human being is made in the image of God (imago Dei).'"}, {"text": "The emphasis on communal worship and fellowship among believers.", "isCorrect": false, "rationale": "Communal aspects are important in Christianity, but the text attributes universal human dignity to the imago Dei concept, not specifically to fellowship."}, {"text": "The doctrine of original sin, which highlights human fallibility.", "isCorrect": false, "rationale": "Original sin speaks to human imperfection and fallenness, which is distinct from the inherent worth associated with universal human dignity."}]}, {"question": "Which of the following social movements is *not* explicitly mentioned as being significantly influenced by Christian teaching in the provided text?", "options": [{"text": "The abolitionist movement.", "isCorrect": false, "rationale": "The text explicitly mentions: 'The abolitionist movement... were all, in significant part, theological projects, driven by people who read the Gospels.'"}, {"text": "The American civil rights movement.", "isCorrect": false, "rationale": "The text explicitly mentions: 'The... American civil rights movement were all, in significant part, theological projects, driven by people who read the Gospels.'"}, {"text": "The women's suffrage movement.", "isCorrect": true, "rationale": "While Christian individuals and groups may have been involved in the women's suffrage movement, the provided text does not explicitly list it as one of the 'theological projects' influenced by Christian teaching."}, {"text": "The early labor movement.", "isCorrect": false, "rationale": "The text explicitly mentions: 'The... early labor movement... were all, in significant part, theological projects, driven by people who read the Gospels.'"}]}, {"question": "The text suggests that major figures in modern astronomy, genetics, and physics—like Copernicus, Mendel, and Newton—viewed their scientific work primarily as:", "options": [{"text": "A means to disprove existing religious dogmas.", "isCorrect": false, "rationale": "The text states these scientists were 'devout Christians' who understood their work as studying God's order, which contradicts the idea of disproving religious dogmas."}, {"text": "An independent pursuit entirely separate from their religious beliefs.", "isCorrect": false, "rationale": "The text states they were 'devout Christians who understood their scientific work as studying the order God had built into creation,' indicating a connection, not a separation, between their faith and science."}, {"text": "A way to study the order God had built into creation.", "isCorrect": true, "rationale": "The text explicitly states: 'Copernicus, Mendel, Newton—were devout Christians who understood their scientific work as studying the order God had built into creation.'"}, {"text": "A method for establishing the superiority of Christian theology over other worldviews.", "isCorrect": false, "rationale": "The text focuses on their understanding of science as studying creation's order, not as a tool for theological apologetics or asserting superiority."}]}, {"question": "Why does the author claim that 'the overwhelming majority of Western art through the nineteenth century is unintelligible without understanding Christian theology'?", "options": [{"text": "Most artists were financially sponsored by the Church.", "isCorrect": false, "rationale": "While patronage was significant, the text focuses on the *content* and *meaning* of the art, not primarily the funding mechanism, as rendering it 'unintelligible'."}, {"text": "Christian themes, narratives, and symbols were central to the subject matter and meaning of these artworks.", "isCorrect": true, "rationale": "The text provides examples like 'Dante's Divine Comedy to Bach's cantatas, from Michelangelo's Sistine Chapel ceiling to Dostoevsky's novels,' all of which are deeply embedded with Christian themes and theology, making understanding them dependent on this knowledge."}, {"text": "Only Christian artists were allowed to create significant works during this period.", "isCorrect": false, "rationale": "This statement is not supported by the text and is an oversimplification of art history. The issue is the content's intelligibility, not the artists' exclusive religious affiliation."}, {"text": "The technical innovations in art were primarily developed within Christian contexts.", "isCorrect": false, "rationale": "The text discusses the thematic and theological substance of the art, not the origin of its technical innovations, as the reason for its unintelligibility without Christian theology."}]}, {"question": "The text describes modern debates about bioethics, social justice, and human rights as being conducted in 'deeply, sometimes invisibly, theological' terms. What does this statement imply about the nature of these contemporary discussions?", "options": [{"text": "These debates are exclusively led by religious leaders and institutions.", "isCorrect": false, "rationale": "The text contradicts this by stating 'even in societies that consider themselves secular,' indicating broader participation beyond religious leaders."}, {"text": "Participants in these debates are often unaware that their foundational concepts are rooted in Christian thought.", "isCorrect": true, "rationale": "The phrases 'invisibly, theological' and 'whether they know it or not' directly support the idea that the underlying theological grammar is often unacknowledged or unnoticed by participants."}, {"text": "Contemporary society is becoming more religious, leading to a resurgence of theological influence.", "isCorrect": false, "rationale": "The text highlights a *continuing* and *unseen* influence, not necessarily a resurgence due to increasing religiosity. It notes this influence even in secular contexts."}, {"text": "Theological arguments are universally accepted as the definitive basis for resolving these issues.", "isCorrect": false, "rationale": "If the influence is 'invisibly' theological, it implies that the theological basis is often not explicitly recognized or universally accepted as such, even if it shapes the language."}]}, {"question": "Christian thinkers like Thomas Aquinas and John Locke are cited in the text for their contribution to what concept?", "options": [{"text": "The development of advanced scientific methodologies.", "isCorrect": false, "rationale": "While these thinkers were influential, the text specifically attributes their contribution to the natural rights tradition, not to scientific methodologies."}, {"text": "The natural rights tradition that undergirds modern democracy.", "isCorrect": true, "rationale": "The text explicitly states: 'The natural rights tradition that undergirds modern democracy was developed by Christian thinkers like Thomas Aquinas and John Locke.'"}, {"text": "The establishment of the first monastic orders in Europe.", "isCorrect": false, "rationale": "Monastic orders predate these thinkers by centuries and are not the contribution the text associates with Aquinas and Locke."}, {"text": "The codification of ecumenical councils' doctrines.", "isCorrect": false, "rationale": "While Aquinas engaged with doctrine, the specific contribution mentioned for both him and Locke in the text is the natural rights tradition."}]}, {"question": "The text states, 'When a politician “speaks of the dignity of every person” or an activist insists that justice demands we care for the vulnerable, they are often speaking a language whose grammar was shaped by centuries of Christian thought.' This analogy primarily emphasizes that:", "options": [{"text": "Christian teachings provide a rigid structure that dictates all political and social discourse.", "isCorrect": false, "rationale": "The analogy speaks of 'shaping the grammar,' not dictating all discourse, implying a foundational influence rather than rigid control over every utterance."}, {"text": "The foundational principles and vocabulary used in modern ethical discourse have historical origins in Christian theology.", "isCorrect": true, "rationale": "The 'grammar' of a language refers to its underlying structure and rules. The analogy suggests that the very framework and vocabulary used to discuss concepts like dignity and care for the vulnerable were historically formed by Christian thought, even if not explicitly acknowledged today."}, {"text": "All politicians and activists must consciously acknowledge their Christian influences to be effective.", "isCorrect": false, "rationale": "The text explicitly mentions 'whether they know it or not,' indicating that conscious acknowledgment is not required for the influence to be present."}, {"text": "Contemporary language on social issues is directly quoting Christian scriptures.", "isCorrect": false, "rationale": "The analogy refers to 'grammar' shaping a 'language,' not direct quotation. It's about the underlying conceptual framework, not verbatim scripture use."}]}, {"question": "Based on the text, what is the geographical scope of Christianity's most significant historical shaping influence?", "options": [{"text": "Primarily the Middle East and North Africa.", "isCorrect": false, "rationale": "While Christianity has roots in the Middle East, the text specifically identifies 'Europe and the Americas' as the regions primarily shaped by Christianity's global influence."}, {"text": "Exclusively global civilizations, with no specific regional focus.", "isCorrect": false, "rationale": "The text specifies 'particularly the civilization of Europe and the Americas,' indicating a distinct regional focus for its enormous global influence, rather than a diffuse, undifferentiated global impact."}, {"text": "Particularly the civilization of Europe and the Americas.", "isCorrect": true, "rationale": "The text states: 'it fundamentally shaped the world, particularly the civilization of Europe and the Americas that has had such enormous global influence.'"}, {"text": "Only isolated communities that have maintained strict theological traditions.", "isCorrect": false, "rationale": "The text speaks of 'civilization' and 'global influence,' indicating broad societal impact, not just isolated communities."}]}, {"question": "What is the overarching message the author conveys to readers, regardless of their personal religious beliefs?", "options": [{"text": "That one must convert to Christianity to fully understand Western civilization.", "isCorrect": false, "rationale": "The text's final paragraph explicitly addresses readers who 'are skeptical of religion altogether,' implying that conversion is not the point, but rather awareness of Christianity's pervasive influence."}, {"text": "That Christianity's influence is so pervasive that its concepts are part of the intellectual landscape, whether recognized or not.", "isCorrect": true, "rationale": "The concluding lines, 'what Christianity believes about God, humanity, sin, and redemption is part of the intellectual air of the modern world. You are already in conversation with it. The question is whether you have noticed,' perfectly encapsulate this message."}, {"text": "That the historical contributions of Christianity have been largely forgotten and need to be rediscovered.", "isCorrect": false, "rationale": "While the text highlights historical influence, its emphasis is on the *current* and *often unnoticed* pervasiveness of this influence, not on a forgotten past needing rediscovery."}, {"text": "That engaging with Christian theology is primarily an academic exercise with little practical relevance.", "isCorrect": false, "rationale": "The entire 'Why It Matters' section argues for the profound and ongoing practical relevance of Christian thought in areas like law, ethics, social justice, and human rights, contradicting this option."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
