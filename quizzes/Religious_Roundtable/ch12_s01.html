    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 12, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Confucian thought, what is the fundamental nature of the human self?", "options": [{"text": "The self is an isolated individual who then chooses to enter into relationships as external accessories.", "isCorrect": false, "rationale": "This option contradicts the core Confucian idea that the self is constituted by relationships from the very beginning, not an isolated entity that later adds relationships."}, {"text": "The self is inherently constituted by its relationships with others, such as family, friends, and community members.", "isCorrect": true, "rationale": "The text explicitly states, 'We are constituted by our relationships from the very beginning. A human person is a son or daughter, a student, a friend, a sibling, a citizen. These relationships are not external accessories added to a pre-existing self -- they are the substance of the self.'"}, {"text": "The self is primarily a genetic code and a fixed, private possession that defines one's humanity.", "isCorrect": false, "rationale": "The text refutes this, stating, 'your humanity is not a fixed, private possession that you carry around like a genetic code. It is something you either realize or fail to realize in the way you actually treat other people.'"}, {"text": "The self is a pre-existing entity whose relationships are merely superficial social arrangements.", "isCorrect": false, "rationale": "Confucianism argues that relationships are the 'substance of the self' and not superficial or external accessories to a pre-existing self."}]}, {"question": "What is the most accurate interpretation of the Confucian key term 'ren' (benevolence, humaneness) based on its etymology and the provided text?", "options": [{"text": "Ren is an intrinsic, individual state of goodness that requires no interaction with others to achieve.", "isCorrect": false, "rationale": "The text explicitly states, 'You cannot be ren in isolation; you can only practice it in relationship,' making it inherently relational, not individualistic."}, {"text": "Ren is the virtue that arises and is practiced exclusively in the context of one's immediate family.", "isCorrect": false, "rationale": "While family is crucial, ren applies to all relationships ('between people'), not exclusively to the immediate family, and extends to community, friends, etc."}, {"text": "Ren represents humaneness as it is realized and expressed through ethical interactions and relationships between people.", "isCorrect": true, "rationale": "The text explains that the character for 'ren' combines 'person' and 'two,' meaning 'humaneness is what happens between people' and 'the virtue that arises between people.' It is something to be 'realize[d]...in the way you actually treat other people.'"}, {"text": "Ren is primarily intellectual knowledge about moral principles, irrespective of how one treats others.", "isCorrect": false, "rationale": "The text counters this by saying, 'A person who knows all the right things but treats others with contempt has failed to achieve genuine humaneness,' indicating that practice and treatment of others are paramount."}]}, {"question": "Which scenario best illustrates the Confucian concept of achieving 'genuine humaneness' (*ren*)?", "options": [{"text": "A scholar who has memorized all the classical texts but frequently dismisses the feelings of others.", "isCorrect": false, "rationale": "The text states, 'A person who knows all the right things but treats others with contempt has failed to achieve genuine humaneness,' directly contradicting this scenario."}, {"text": "An individual who lives a solitary life dedicated to self-improvement through meditation, avoiding social interaction.", "isCorrect": false, "rationale": "Ren is inherently relational and cannot be practiced in isolation. This scenario fails to engage with others, which is essential for realizing ren."}, {"text": "A person of modest background who consistently acts with warmth, loyalty, and care towards their neighbors and colleagues.", "isCorrect": true, "rationale": "The text provides this exact example: 'A person of modest education and simple circumstances who consistently shows warmth, loyalty, and care to those around them has achieved something real and valuable -- has become, in Confucius's terms, genuinely human.'"}, {"text": "A wealthy merchant who makes large donations to charity but maintains a cold and distant demeanor in personal interactions.", "isCorrect": false, "rationale": "While donations are good, the 'cold and distant demeanor in personal interactions' indicates a failure to practice humaneness in daily relationships, which is central to ren."}]}, {"question": "According to Analects 12:1, what is the essential 'process' or 'steps' for a man to subdue himself and return to propriety, thereby achieving perfect virtue?", "options": [{"text": "Studying ancient philosophical texts and debating their meaning with others.", "isCorrect": false, "rationale": "While studying texts is part of self-cultivation, Analects 12:1 specifically outlines a behavioral approach related to propriety: 'Look not... listen not... speak not... make no movement which is contrary to propriety.'"}, {"text": "Focusing solely on one's internal moral compass, disregarding external social norms.", "isCorrect": false, "rationale": "Returning to 'propriety' (*li*) involves adherence to appropriate social conduct, which includes external norms, not disregarding them."}, {"text": "Refraining from looking at, listening to, speaking, or moving in ways contrary to propriety.", "isCorrect": true, "rationale": "Confucius directly advises Yen Yuan: 'Look not at what is contrary to propriety; listen not to what is contrary to propriety; speak not what is contrary to propriety; make no movement which is contrary to propriety.'"}, {"text": "Seeking a ruler who will implement ethical governance across the society.", "isCorrect": false, "rationale": "This was Confucius's personal quest but not the 'steps of that process' for an individual's perfect virtue as described in Analects 12:1."}]}, {"question": "The Confucian Golden Rule, 'What you do not want done to yourself, do not do to others,' is presented as a negative prohibition. What is the most significant implication of this negative formulation?", "options": [{"text": "It suggests that morality is primarily about avoiding punishment rather than cultivating positive virtues.", "isCorrect": false, "rationale": "While it sets boundaries, the rationale provided in the text emphasizes understanding the feeling of cruelty and choosing not to inflict it, linking it to empathy and humaneness, not just fear of punishment."}, {"text": "It provides a universal, intuitively understood basis for ethical conduct by appealing to shared experiences of suffering.", "isCorrect": true, "rationale": "The text explains, 'Perhaps because anyone who has been on the receiving end of cruelty, betrayal, or contempt understands immediately what it feels like -- and understands, without needing an elaborate argument, that they should not inflict that feeling on others.' This highlights its universality and intuitive basis in shared experience."}, {"text": "It implies that one's ethical obligations are limited to avoiding harm, not actively promoting well-being.", "isCorrect": false, "rationale": "While it focuses on avoiding harm, Confucianism as a whole, particularly the concept of *ren*, strongly emphasizes active benevolence and positive conduct, making this option an incomplete interpretation of its broader ethical framework."}, {"text": "It limits moral responsibility only to those actions that directly cause physical harm to others.", "isCorrect": false, "rationale": "The rule encompasses 'cruelty, betrayal, or contempt,' which go beyond physical harm, implying a broader scope of ethical consideration."}]}, {"question": "Why is 'self-cultivation' considered essential in Confucianism?", "options": [{"text": "Because genuine humaneness (*ren*) is a fixed genetic trait that must be discovered through introspection.", "isCorrect": false, "rationale": "The text states that humanity is 'not a fixed, private possession' and must be 'realize[d],' not just discovered, making deliberate effort essential."}, {"text": "Because society naturally guides individuals toward perfect virtue without personal effort.", "isCorrect": false, "rationale": "The text indicates that *ren* 'does not assume that ren comes naturally or easily,' requiring 'deliberate effort' rather than natural societal guidance."}, {"text": "Because becoming genuinely human requires deliberate effort, learning, and correction over a lifetime.", "isCorrect": true, "rationale": "The text explicitly states: 'Confucianism does not assume that ren comes naturally or easily. This is where the concept of self-cultivation becomes essential. We become genuinely human not by simply existing but by making deliberate effort: studying... practicing... reflecting... correcting... seeking out teachers and friends.'"}, {"text": "Because self-cultivation ensures individual liberation from societal expectations and relational duties.", "isCorrect": false, "rationale": "Self-cultivation in Confucianism aims to better fulfill one's relational duties and contribute to social harmony, not to achieve liberation from societal expectations."}]}, {"question": "What role do the five key relationships (ruler/subject, parent/child, husband/wife, elder/younger brother, friend/friend) play in Confucian ethics?", "options": [{"text": "They are merely social arrangements that Confucius observed in his society, without deeper ethical significance.", "isCorrect": false, "rationale": "The text explicitly states: 'They are not simply social arrangements. They are the school in which ren is learned and practiced, day by day, across a lifetime,' highlighting their profound ethical significance."}, {"text": "They are the primary contexts and 'schools' where the virtue of *ren* is learned and continually practiced.", "isCorrect": true, "rationale": "The text states: 'The five key relationships... are not simply social arrangements. They are the school in which ren is learned and practiced, day by day, across a lifetime.'"}, {"text": "They represent a hierarchy that discourages independent thought and individual moral development.", "isCorrect": false, "rationale": "While hierarchical, the relationships are for cultivating virtue, which includes moral development, within a relational context, not discouraging it. Self-cultivation is key."}, {"text": "They are historical artifacts that are no longer relevant to contemporary Confucian practice.", "isCorrect": false, "rationale": "The text presents them as foundational to how *ren* is learned and practiced, implying ongoing relevance within the tradition."}]}, {"question": "How did Confucius's teachings come to be preserved and widely influential despite his failure to secure a high government position?", "options": [{"text": "He meticulously wrote down all his teachings himself in the Analects during his lifetime.", "isCorrect": false, "rationale": "The text states, 'It was those students who preserved his teachings in the Analects, writing down what they remembered him saying after his death,' meaning he did not write the Analects himself."}, {"text": "He successfully found a ruler who implemented his ideas, leading to their immediate adoption.", "isCorrect": false, "rationale": "The text explicitly states: 'He failed in this quest -- no ruler took him on as a chief minister.'"}, {"text": "His students compiled and preserved his spoken teachings in the Analects after his death.", "isCorrect": true, "rationale": "The text clearly states: 'He spent his final years teaching students. It was those students who preserved his teachings in the Analects, writing down what they remembered him saying after his death.'"}, {"text": "His ideas were independently rediscovered and codified by later philosophers centuries after his passing.", "isCorrect": false, "rationale": "While later philosophers certainly engaged with his ideas, the initial preservation was done directly by his students, not by independent rediscovery centuries later."}]}, {"question": "A community leader consistently demonstrates humility, actively listens to the concerns of all residents, and ensures fairness in resource allocation, even when it means challenging established norms. Which Confucian virtue is this leader primarily embodying through their actions, especially in relation to Analects 12:1?", "options": [{"text": "Exclusive pursuit of personal fame and recognition.", "isCorrect": false, "rationale": "The actions described (humility, listening, fairness) are contrary to an 'exclusive pursuit of personal fame and recognition.'"}, {"text": "Subduing oneself and returning to propriety (*li*), prioritizing the collective good over personal bias.", "isCorrect": true, "rationale": "Subduing oneself and returning to propriety (Analects 12:1) involves disciplined conduct that aligns with what is appropriate and ethical. In a leadership context, this translates to humility, active listening, and fairness, which prioritize the community's well-being and proper order over personal desires or biases."}, {"text": "Strict adherence to rigid rituals without adapting to changing community needs.", "isCorrect": false, "rationale": "While rituals (*li*) are important, 'ensuring fairness... even when it means challenging established norms' implies a nuanced application of principles, not blind, rigid adherence that ignores changing needs."}, {"text": "Advocating for a completely isolated and self-sufficient community.", "isCorrect": false, "rationale": "Confucianism emphasizes relationships and community, making the idea of an 'isolated and self-sufficient community' contrary to its core principles."}]}, {"question": "Which statement best summarizes the Confucian understanding of how one's 'humanity' is realized?", "options": [{"text": "It is a predetermined quality inherited at birth, fully present from the moment of conception.", "isCorrect": false, "rationale": "The text explicitly states, 'your humanity is not a fixed, private possession that you carry around like a genetic code,' refuting the idea of it being fully predetermined or inherited."}, {"text": "It is achieved through solitary introspection and detachment from worldly concerns.", "isCorrect": false, "rationale": "Confucianism emphasizes that humanity (*ren*) is realized 'in the way you actually treat other people' and 'in relationship,' making solitary detachment incompatible."}, {"text": "It is something one actively realizes or fails to realize through the ethical quality of their interactions and treatment of others.", "isCorrect": true, "rationale": "The text states, 'your humanity... is something you either realize or fail to realize in the way you actually treat other people,' highlighting the active and relational nature of achieving it."}, {"text": "It is primarily measured by one's material wealth and social status within the community.", "isCorrect": false, "rationale": "The example of 'a person of modest education and simple circumstances who consistently shows warmth, loyalty, and care' achieving 'genuine humaneness' disproves that material wealth or social status are primary measures."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
