<script>
var QUESTIONS = [{"question": "What central paradox defines Christian eschatology as described in the text?", "options": [{"text": "It is solely focused on an escape from history, ignoring past events.", "isCorrect": false, "rationale": "The text explicitly states that Christian eschatology is 'not an escape from history but its completion.'"}, {"text": "It postulates that the future God promises is both entirely new and the fulfillment of everything that has come before.", "isCorrect": true, "rationale": "The first sentence of the section defines Christian eschatology as built on this paradox: 'the future that God promises is both entirely new and the fulfillment of everything that has come before.'"}, {"text": "It emphasizes that God's promises are exclusively about the soul's survival, not the physical world.", "isCorrect": false, "rationale": "The text mentions a 'new heaven and a new earth,' 'renewal of all creation,' and the 'transformation and restoration of the whole person—body and soul,' indicating a physical and cosmic scope, not just soul survival."}, {"text": "It suggests that God's final word will abolish all historical memory.", "isCorrect": false, "rationale": "The text states it is history's 'completion' and 'renewal,' not an abolition of its memory or past events."}]}, {"question": "According to the provided text, what is the primary purpose and scope of eschatology?", "options": [{"text": "It is a philosophical inquiry into the origins of the universe.", "isCorrect": false, "rationale": "The 'KEY TERM: eschatology' defines it as a 'branch of theology' focused on 'death, judgment, and the final destiny'—not philosophical origins."}, {"text": "It is the branch of theology that deals with death, judgment, and the final destiny of the soul and the world.", "isCorrect": true, "rationale": "The 'KEY TERM: eschatology' definition states: 'Eschatology is the branch of theology that deals with death, judgment, and the final destiny of the soul and the world.'"}, {"text": "It is primarily a historical study of ancient religious texts.", "isCorrect": false, "rationale": "While it involves religious texts, it is defined as a 'branch of theology' concerned with future destiny, not just historical study."}, {"text": "It is a theological branch that exclusively studies the moral character of God.", "isCorrect": false, "rationale": "While 'grounded in the character of God,' its primary scope is specifically 'death, judgment, and the final destiny,' as outlined in the key term."}]}, {"question": "Why is the resurrection of Jesus considered the 'foundation of Christian eschatological hope'?", "options": [{"text": "Because it demonstrates God's immediate plan to remove all suffering from the present age.", "isCorrect": false, "rationale": "The text notes that 'the groaning and suffering of the present age' are 'birth pangs of a new world,' implying suffering is present, not immediately removed by the resurrection itself, but leading to future renewal."}, {"text": "Because it is a peripheral belief that supports other, more central Christian doctrines.", "isCorrect": false, "rationale": "The text explicitly states: 'This is not a peripheral belief but the center of everything.'"}, {"text": "Because it serves as evidence that death does not have the final word and foreshadows the renewal of all creation.", "isCorrect": true, "rationale": "The text states the resurrection 'is the evidence that death does not have the final word' and is 'the first fruits of a harvest yet to come,' indicating a renewal that 'will ultimately include all of creation.'"}, {"text": "Because it allows Christians to escape from history and avoid present-day responsibilities.", "isCorrect": false, "rationale": "The initial paragraph states eschatology is 'not an escape from history but its completion,' and the end of the section highlights present-day participation in God's ending."}]}, {"question": "How does the Christian understanding of 'resurrection' differ from the concept of 'survival of a soul after death,' according to the text?", "options": [{"text": "Christian resurrection is solely about spiritual existence, while soul survival includes the body.", "isCorrect": false, "rationale": "This statement reverses the definitions given in the text. Christian resurrection is 'bodily raising' and 'transformation and restoration of the whole person — body and soul.'"}, {"text": "Soul survival is a bodily transformation, while resurrection is a Greek concept of immortality.", "isCorrect": false, "rationale": "This statement also reverses and misattributes the concepts. The text clarifies that resurrection is a Christian concept, and soul survival is 'closer to Greek ideas of immortality.'"}, {"text": "There is no significant difference; both concepts are used interchangeably in Christian theology.", "isCorrect": false, "rationale": "The 'KEY TERM: resurrection' explicitly states that resurrection 'is not understood as the survival of a soul after death (that is a different concept, closer to Greek ideas of immortality).'"}, {"text": "Christian resurrection involves the bodily raising and transformation of the whole person, whereas soul survival is closer to Greek ideas of immortality.", "isCorrect": true, "rationale": "The 'KEY TERM: resurrection' clearly states it is 'the bodily raising of Jesus...as the transformation and restoration of the whole person—body and soul,' and distinguishes this from 'survival of a soul after death (that is a different concept, closer to Greek ideas of immortality).'"}]}, {"question": "When the text states that 'The groaning and suffering of the present age (Romans 8:22) is the birth pangs of a new world,' what does this imply about Christian hope?", "options": [{"text": "That current suffering is a sign of God's absence and abandonment of the world.", "isCorrect": false, "rationale": "The text explicitly states this suffering is 'not evidence of God's absence,' but rather a sign of a coming new world."}, {"text": "That present difficulties are temporary and signify a transformative process leading to a coming renewal.", "isCorrect": true, "rationale": "The metaphor of 'birth pangs' implies that present suffering is a necessary, painful but temporary stage leading to the emergence of something new and good ('a new world')."}, {"text": "That suffering is an inevitable, endless cycle with no ultimate purpose or resolution.", "isCorrect": false, "rationale": "The 'birth pangs' metaphor implies a purposeful process with a definite outcome—the 'new world'—not an endless cycle."}, {"text": "That Christians should actively seek out suffering to accelerate the end times.", "isCorrect": false, "rationale": "The text does not suggest actively seeking suffering; rather, it provides an interpretation of existing suffering as a sign of future hope."}]}, {"question": "What is the fundamental distinction between Amillennialism and Premillennialism regarding the millennium?", "options": [{"text": "Amillennialism believes Christ returns *before* a literal 1000-year reign, while Premillennialism sees the millennium as symbolic.", "isCorrect": false, "rationale": "This option reverses the positions. Premillennialism believes Christ returns *before* the millennium, and Amillennialism holds the millennium is symbolic."}, {"text": "Amillennialism views the millennium as a symbolic representation of the present age, while Premillennialism expects Christ to return *before* a literal millennium.", "isCorrect": true, "rationale": "The text states: 'Amillennialism holds that the thousand-year 'reign' (millennium) described in Revelation 20 is a symbolic description of the present age' and 'Premillennialism holds that Christ will return to earth before the millennium, establishing a literal reign of peace and justice.'"}, {"text": "Amillennialism posits that the church will gradually transform the world, while Premillennialism believes history ends with immediate judgment.", "isCorrect": false, "rationale": "The idea of the church gradually transforming the world is characteristic of Postmillennialism, not Amillennialism or Premillennialism in this context."}, {"text": "Premillennialism asserts God is not involved in history's direction, unlike Amillennialism.", "isCorrect": false, "rationale": "The text clearly states that all three positions 'agree that history is going somewhere, that God is involved in its direction, and that the destination is good.'"}]}, {"question": "How does Christian eschatology, despite differing views on the 'end times,' inform believers' actions in the present?", "options": [{"text": "It encourages withdrawal from worldly affairs, as the world is destined for complete destruction.", "isCorrect": false, "rationale": "The text states eschatology is 'not merely a prediction about the future' but 'a claim about the present,' suggesting engagement, not withdrawal."}, {"text": "It asserts that present actions are irrelevant, as God's plan will unfold regardless.", "isCorrect": false, "rationale": "The last sentence directly contradicts this, stating 'every act of love, justice, and faithfulness done now participates in that ending.'"}, {"text": "It suggests that only grand, sweeping societal changes, not individual acts, contribute to God's kingdom.", "isCorrect": false, "rationale": "The phrase 'every act of love, justice, and faithfulness' implies that individual actions are significant."}, {"text": "It emphasizes that every act of love, justice, and faithfulness performed now participates in God's good ending for the world.", "isCorrect": true, "rationale": "The text concludes by stating: 'because the world has a good ending, every act of love, justice, and faithfulness done now participates in that ending, even if it does not yet see it.'"}]}, {"question": "Based on the 'DID YOU KNOW?' section, what is the most appropriate way to interpret the Book of Revelation?", "options": [{"text": "As a literal, chronological blueprint detailing future events with precise accuracy.", "isCorrect": false, "rationale": "The 'DID YOU KNOW?' section explicitly warns that 'Reading Revelation as a literal blueprint for future events misses its genre.'"}, {"text": "As a historical document primarily describing events from the first century CE.", "isCorrect": false, "rationale": "While written in the first centuries, its primary purpose is to 'communicate theological truth' using symbolic imagery, not merely historical reporting."}, {"text": "As a work of fiction with no theological significance.", "isCorrect": false, "rationale": "The text states it uses imagery 'to communicate theological truth,' indicating significant theological importance."}, {"text": "As apocalyptic literature using symbolic imagery to convey theological truths about good, evil, and God's ultimate victory.", "isCorrect": true, "rationale": "The 'DID YOU KNOW?' section describes Revelation as 'apocalypse' that 'typically used vivid, symbolic imagery...to communicate theological truth about the conflict between good and evil and God's ultimate victory.'"}]}, {"question": "Despite their differences in timing and mechanism, what do Amillennialism, Premillennialism, and Postmillennialism all agree upon?", "options": [{"text": "That the millennium is a literal thousand-year reign on Earth.", "isCorrect": false, "rationale": "Amillennialism holds the millennium to be symbolic, so this is not a point of agreement among all three."}, {"text": "That Christ's return is contingent on human efforts alone.", "isCorrect": false, "rationale": "The text states they agree 'that God is involved in its direction,' implying more than just human efforts."}, {"text": "That history is going somewhere, God is involved in its direction, and the destination is good.", "isCorrect": true, "rationale": "The text explicitly states: 'These positions differ on timing and mechanism; they agree that history is going somewhere, that God is involved in its direction, and that the destination is good.'"}, {"text": "That the church will gradually transform the world before Christ's return.", "isCorrect": false, "rationale": "This specific belief is characteristic of Postmillennialism, not a point of agreement for all three positions."}]}, {"question": "According to the excerpt from Revelation 21:1-5, which of the following will *not* be present in the new heaven and new earth?", "options": [{"text": "God dwelling with humanity.", "isCorrect": false, "rationale": "Verse 3 states: 'Behold, the tabernacle of God is with men, and he will dwell with them, and they shall be his people, and God himself shall be with them, and be their God.'"}, {"text": "Death, sorrow, crying, or pain.", "isCorrect": true, "rationale": "Verse 4 clearly states: 'And God shall wipe away all tears from their eyes; and there shall be no more death, neither sorrow, nor crying, neither shall there be any more pain: for the former things are passed away.'"}, {"text": "The holy city, new Jerusalem.", "isCorrect": false, "rationale": "Verse 2 describes: 'And I John saw the holy city, new Jerusalem, coming down from God out of heaven, prepared as a bride adorned for her husband.'"}, {"text": "A new heaven and a new earth.", "isCorrect": false, "rationale": "Verse 1 begins: 'And I saw a new heaven and a new earth: for the first heaven and the first earth were passed away; and there was no more sea.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
