<script>
var QUESTIONS = [{"question": "Buddhism is presented as unusual among world traditions because it begins with a 'diagnosis'. What is the central problem identified by this diagnosis?", "options": [{"text": "The existence of a malevolent deity causing suffering in the world.", "isCorrect": false, "rationale": "The text states Buddhism 'begins not with a creation story, a god, or a moral code, but with a diagnosis,' making this option incorrect."}, {"text": "A universal moral code that humanity consistently fails to uphold.", "isCorrect": false, "rationale": "The text clarifies Buddhism's starting point is a diagnosis, not a moral code, although moral conduct is part of its path."}, {"text": "The pervasive unsatisfactoriness of conditioned existence, known as dukkha.", "isCorrect": true, "rationale": "The text explicitly states that 'life as ordinarily lived involves suffering' (dukkha) and that this is the starting point, describing dukkha as 'the pervasive unsatisfactoriness of conditioned existence.'"}, {"text": "The necessity of a creation story to provide meaning to human origins.", "isCorrect": false, "rationale": "The text directly contrasts Buddhism with traditions that begin with a 'creation story,' making this an incorrect description of its starting point."}], "id": "q01"}, {"question": "The term 'dukkha' is often translated as 'suffering,' but the text emphasizes its richer meaning. Which of the following best captures this broader interpretation?", "options": [{"text": "The temporary discomfort experienced during physical exertion or illness, which is easily overcome.", "isCorrect": false, "rationale": "While physical pain is a part of dukkha, the text specifies it also includes 'subtler dissatisfaction' and the 'pervasive unsatisfactoriness,' indicating it's more than just temporary discomfort."}, {"text": "The spiritual emptiness felt by those who deny a divine creator or higher power.", "isCorrect": false, "rationale": "The definition of dukkha in the text focuses on the nature of conditioned existence itself, not specifically on belief in a divine creator."}, {"text": "The pervasive unsatisfactoriness, impermanence, and subtle dissatisfaction that makes all conditioned experience ultimately unreliable.", "isCorrect": true, "rationale": "The text defines dukkha as including 'obvious forms of suffering' but also 'the subtler dissatisfaction that haunts even pleasant experience' and 'the pervasive unsatisfactoriness of conditioned existence' due to impermanence."}, {"text": "The remorse one feels after committing a sinful or morally reprehensible act.", "isCorrect": false, "rationale": "The text defines dukkha as a fundamental aspect of conditioned existence, not primarily as a consequence of specific moral transgressions."}], "id": "q02"}, {"question": "According to the Second Noble Truth, what is identified as the direct cause of dukkha?", "options": [{"text": "Ignorance of the true nature of reality and the Buddha's teachings.", "isCorrect": false, "rationale": "While ignorance plays a role in Buddhist philosophy, the text explicitly states the Second Noble Truth identifies 'tanha, meaning craving or thirst,' as the cause of dukkha."}, {"text": "Tanha, which is described as a specific kind of clinging, grasping craving for final satisfaction.", "isCorrect": true, "rationale": "The text clearly states, 'The Second Noble Truth identifies the cause of dukkha: tanha, meaning craving or thirst.' It further elaborates this as 'the clinging, grasping quality of a mind that says, If only I had this, I would 'finally be satisfied.'' "}, {"text": "External circumstances and unavoidable misfortunes that befall individuals.", "isCorrect": false, "rationale": "The text frames the cause of suffering as an internal 'structural feature of the unexamined mind' (tanha), rather than solely external events."}, {"text": "The inherent evil nature of humanity that leads to selfish desires.", "isCorrect": false, "rationale": "Buddhism sees craving as a 'structural feature of the unexamined mind,' not as inherent evil within humanity."}], "id": "q03"}, {"question": "The text states, 'Craving is suffering because it is an attempt to hold on to what cannot be held.' This statement primarily illustrates which fundamental Buddhist concept mentioned?", "options": [{"text": "Anatta, the concept of a permanent self that grasps at external objects.", "isCorrect": false, "rationale": "Anatta (without a fixed, permanent self) is mentioned as a feature of the world, but the statement 'what cannot be held' directly points to impermanence, not the nature of the self holding."}, {"text": "Nirvana, the cessation of suffering by letting go of all attachments.", "isCorrect": false, "rationale": "This statement explains *why* craving leads to suffering, not the state of cessation itself."}, {"text": "Anicca, the impermanent nature of all conditioned things and experiences.", "isCorrect": true, "rationale": "The phrase 'what cannot be held' directly refers to the impermanence of all things (anicca), highlighting that craving causes suffering precisely because it seeks to make permanent that which is inherently fleeting."}, {"text": "Dukkha, as a specific form of physical pain resulting from emotional attachment.", "isCorrect": false, "rationale": "While this explains why craving *is* dukkha, the explanation 'what cannot be held' specifically points to the concept of impermanence (anicca) as the underlying reason."}], "id": "q04"}, {"question": "How does the Buddhist understanding of 'tanha' (craving) differ from the simple act of wanting something necessary, like food when hungry?", "options": [{"text": "Tanha is inherently evil and must be eliminated entirely, whereas wanting food is a neutral act.", "isCorrect": false, "rationale": "The text clarifies, 'This is not a claim that all desire is evil -- Buddhism does not ask us to stop wanting food when we are hungry,' indicating tanha is not simply 'evil desire' but a specific type."}, {"text": "Tanha is a deep spiritual longing for enlightenment, while wanting food is a basic biological need.", "isCorrect": false, "rationale": "Tanha is described as a 'clinging, grasping quality of a mind that says, If only I had this, I would 'finally be satisfied'' in relation to worldly objects, not a longing for enlightenment."}, {"text": "Tanha is a clinging, grasping desire for *final* satisfaction from impermanent objects, which ultimately disappoints or generates new craving.", "isCorrect": true, "rationale": "The text specifies, 'The problem is a specific kind of desire: the clinging, grasping quality of a mind that says, If only I had this, I would 'finally be satisfied.' The trouble is that the mind structured by tanha is never finally satisfied.'"}, {"text": "Tanha is a collective societal craving, while wanting food is an individual, personal desire.", "isCorrect": false, "rationale": "The distinction is based on the *quality* of the desire (clinging, seeking final satisfaction) rather than whether it is collective or individual."}], "id": "q05"}, {"question": "Which of the following best describes the nature of 'nirvana' as explained in the text?", "options": [{"text": "A heavenly afterlife where all desires are instantly fulfilled eternally.", "isCorrect": false, "rationale": "Nirvana is described as the 'blowing out' of craving, not the fulfillment of desires, and is not depicted as a 'heavenly afterlife' but a state of liberation."}, {"text": "An oblivion or nothingness where individual identity ceases to exist completely.", "isCorrect": false, "rationale": "The text explicitly states, 'Nirvana has been misunderstood as a kind of oblivion or nothingness, but the Buddhist tradition is careful here: nirvana is not the annihilation of the person.'"}, {"text": "The 'blowing out' of the fires of craving, hatred, and delusion, resulting in a state of clarity, freedom, and peace.", "isCorrect": true, "rationale": "The text defines nirvana as 'the blowing out' of the fires of craving, hatred, and delusion, and describes what remains as 'a clarity, a freedom, a peace.'"}, {"text": "A temporary state of intense bliss achieved through meditation, followed by a return to ordinary suffering.", "isCorrect": false, "rationale": "Nirvana is presented as the 'goal of liberation' and the 'end of the grasping, ego-driven patterns that generate suffering,' implying a lasting cessation, not a temporary state."}], "id": "q06"}, {"question": "A person dedicates their life to accumulating wealth, believing that once they achieve a certain financial status, all their worries will disappear, and they will finally be content. From a Buddhist perspective as described in the text, this pursuit is most likely an example of operating under the influence of which concept?", "options": [{"text": "Right Livelihood, as it involves diligent work towards a goal.", "isCorrect": false, "rationale": "While it involves work, 'Right Livelihood' in the Noble Eightfold Path refers to ethical and wholesome work, not a pursuit driven by the belief in ultimate satisfaction from wealth, which would perpetuate suffering."}, {"text": "The experience of dukkha in its most obvious form, such as physical pain.", "isCorrect": false, "rationale": "This scenario describes the *cause* of future suffering (dukkha) through attachment, not dukkha itself in its obvious form of pain."}, {"text": "Tanha, specifically the clinging, grasping quality of a mind seeking final satisfaction from impermanent objects.", "isCorrect": true, "rationale": "This aligns precisely with the text's description of tanha: 'the clinging, grasping quality of a mind that says, If only I had this, I would 'finally be satisfied.'' The text explains this mind 'is never finally satisfied' and that 'the object is obtained, either it disappoints or it generates new craving.'"}, {"text": "The path to nirvana, as it involves disciplined effort towards a goal.", "isCorrect": false, "rationale": "The path to nirvana involves extinguishing craving, not fulfilling it through material accumulation in the hope of final satisfaction."}], "id": "q07"}, {"question": "What is the primary characteristic of the Noble Eightfold Path as described in the text?", "options": [{"text": "A magical ritual or an act of divine grace required for instant enlightenment.", "isCorrect": false, "rationale": "The text explicitly states the Noble Eightfold Path 'is not magic or grace.'"}, {"text": "A systematic, practical program for transforming the whole person through sustained, disciplined practice.", "isCorrect": true, "rationale": "The text describes it as 'a systematic, practical program for transforming the whole person' and emphasizes it is 'a path, not a destination you arrive at by conversion or sudden insight alone,' requiring 'sustained, disciplined practice.'"}, {"text": "A set of strict moral prohibitions designed to punish sinful behavior and ensure obedience.", "isCorrect": false, "rationale": "While moral conduct is part of it, the description 'covers every dimension of human life' and focuses on transformation, not merely punishment or prohibitions."}, {"text": "A destination one arrives at solely through sudden insight or religious conversion.", "isCorrect": false, "rationale": "The text states it is 'not a destination you arrive at by conversion or sudden insight alone,' emphasizing practice over singular events."}], "id": "q08"}, {"question": "The opening verses of the Dhammapada, as quoted in the text, primarily emphasize which of the following about the human experience?", "options": [{"text": "That external circumstances and destiny are the ultimate determinants of one's happiness or suffering.", "isCorrect": false, "rationale": "The verses repeatedly begin with 'All that we are is the result of what we have thought,' emphasizing internal thoughts over external circumstances."}, {"text": "The importance of physical strength and diligent action over mental states in achieving success.", "isCorrect": false, "rationale": "This contradicts the core message: 'All that we are is the result of what we have thought: it is founded on our thoughts, it is made up of our thoughts.'"}, {"text": "The centrality of the mind in shaping our reality and determining whether suffering or happiness follows.", "isCorrect": true, "rationale": "The verses directly state: 'All that we are is the result of what we have thought: it is founded on our thoughts, it is made up of our thoughts. If a man speaks or acts with an evil thought, pain follows him... If a man speaks or acts with a pure thought, happiness follows him.'"}, {"text": "That suffering is an unavoidable and permanent condition for all humanity, regardless of thought.", "isCorrect": false, "rationale": "The verses provide a clear path away from suffering (e.g., 'If a man speaks or acts with a pure thought, happiness follows him'), contradicting the idea of unavoidable suffering."}], "id": "q09"}, {"question": "According to Dhammapada 1:3-5, what is the ultimate way for hatred to cease?", "options": [{"text": "By retaliating against those who cause harm, thereby teaching them a lesson.", "isCorrect": false, "rationale": "Dhammapada 1:5 states: 'For hatred does not cease by hatred at any time,' directly contradicting retaliation as a solution."}, {"text": "By engaging in deep philosophical debate to understand the roots of conflict.", "isCorrect": false, "rationale": "While understanding is valuable, the specific method highlighted in the verses is about mental attitude and love, not philosophical debate."}, {"text": "By actively harboring thoughts of abuse, defeat, or revenge against those who have wronged you.", "isCorrect": false, "rationale": "Dhammapada 1:3 clearly states: 'in those who harbour such thoughts hatred will never cease.'"}, {"text": "By love, and by not harboring thoughts of abuse, beating, defeat, or robbery against others.", "isCorrect": true, "rationale": "Dhammapada 1:4 states: 'in those who do not harbour such thoughts hatred will cease,' and 1:5 concludes: 'For hatred does not cease by hatred at any time: hatred ceases by love, this is an old rule.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
