    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to Taoist core beliefs, which statement best describes the Tao?", "options": [{"text": "A divine entity that issues commands and can be prayed to.", "isCorrect": false, "rationale": "The text explicitly states, 'The Tao is not a god in the Western sense—it is not a person, does not issue commands, and cannot be prayed to.'"}, {"text": "The fundamental nature of things, the nameless source and underlying order of reality.", "isCorrect": true, "rationale": "The text defines the Tao as 'The Way; the nameless, formless source and underlying order of all reality' and 'the fundamental nature of things: the way the universe moves when nothing is forcing it.'"}, {"text": "A set of strict moral laws that govern human behavior.", "isCorrect": false, "rationale": "The Tao is described as the underlying order of reality, not a prescriptive set of moral laws, and it is 'resistant to precise definition.'"}, {"text": "A historical figure whose teachings form the basis of the tradition.", "isCorrect": false, "rationale": "The Tao is a concept or principle, not a historical person or founder of the tradition."}]}, {"question": "The Tao Te Ching states that 'the name that can be named 'is not the eternal name.'' What does this statement imply about understanding the Tao?", "options": [{"text": "That the Tao is ultimately unknowable and irrelevant to practical life.", "isCorrect": false, "rationale": "The text refutes this by stating, 'This is not pure mysticism, disconnected from practical life,' and draws immediate conclusions about how a person should live in alignment with it."}, {"text": "That human language and rigid definitions are insufficient to fully capture its essence.", "isCorrect": true, "rationale": "The statement highlights the Tao's resistance 'to precise definition' and that 'it cannot be named.' The text then 'proceeds to describe it for eighty-one chapters, using images,' indicating that words are limited."}, {"text": "That only a select few enlightened individuals can truly comprehend the Tao.", "isCorrect": false, "rationale": "The text does not suggest an exclusive understanding; rather, it focuses on the nature of the Tao itself and the limitations of language."}, {"text": "That the Tao changes its nature constantly, making any name temporary.", "isCorrect": false, "rationale": "The Tao is described as the 'eternal name' that cannot be named, implying its unchanging fundamental nature, not its constant alteration."}]}, {"question": "A student is trying to understand *wu wei*. Which of the following examples best illustrates the principle of *wu wei*?", "options": [{"text": "A leader who forcefully implements a new policy despite strong public opposition.", "isCorrect": false, "rationale": "This scenario demonstrates 'forcing, straining, or imposing one's will,' which is contrary to the principle of *wu wei*."}, {"text": "A gardener who observes the natural growth patterns of plants and cultivates them accordingly.", "isCorrect": true, "rationale": "This example aligns with 'acting in accordance with the natural flow of things rather than forcing,' and 'farming with the land rather than against it,' as described in the text."}, {"text": "A person who avoids all work and responsibilities, choosing to do nothing.", "isCorrect": false, "rationale": "The text explicitly states, '*Wu wei* is not laziness—it is the art of doing exactly what the situation requires, with no wasted energy.' It does not mean doing nothing."}, {"text": "An athlete who rigorously trains for hours each day to overpower their opponents.", "isCorrect": false, "rationale": "This describes 'imposing your agenda on a situation,' whereas the 'martial arts ideal is the fighter who redirects an opponent's force rather than meeting it head-on.'"}]}, {"question": "A company faces a complex market challenge. Instead of launching an aggressive, expensive marketing campaign, the CEO decides to monitor market trends closely, adapt product features based on customer feedback, and allow the product's quality to speak for itself. This approach most closely aligns with which Taoist concept?", "options": [{"text": "Yin and Yang", "isCorrect": false, "rationale": "While Yin and Yang represent complementary forces, the primary concept illustrated by this action of adapting and allowing is not about the interplay of opposites, but about effortless action."}, {"text": "Ziran", "isCorrect": false, "rationale": "*Ziran* is about naturalness and spontaneity, often without conscious effort. The CEO's actions, while non-forceful, are still a considered strategy rather than pure spontaneity."}, {"text": "Wu Wei", "isCorrect": true, "rationale": "This scenario perfectly exemplifies *wu wei* ('non-action' or 'effortless action'), which means 'acting in accordance with the natural flow of things rather than forcing, straining, or imposing one's will.' The CEO is working with the market rather than aggressively imposing their will."}, {"text": "The Tao as a prescriptive set of rules", "isCorrect": false, "rationale": "The Tao is described as the fundamental nature of things, not a prescriptive set of rules for business strategy."}]}, {"question": "How does the concept of *ziran* relate to *wu wei*?", "options": [{"text": "*Ziran* is the cause of *wu wei*, meaning one must first be spontaneous to achieve effortless action.", "isCorrect": false, "rationale": "The text states the inverse: '*Ziran* is what happens when *wu wei* is fully realized,' meaning *wu wei* precedes *ziran* as its realization."}, {"text": "*Wu wei* is a prerequisite for *ziran*; fully realizing *wu wei* leads to *ziran*.", "isCorrect": true, "rationale": "The text explicitly states: '*Ziran* is what happens when *wu wei* is fully realized.' This indicates *wu wei* is foundational to achieving *ziran*."}, {"text": "They are opposing concepts, where *ziran* represents artifice and *wu wei* represents naturalness.", "isCorrect": false, "rationale": "They are 'closely related' and both represent aspects of naturalness; *ziran* is 'acting from one's own true nature without artifice.'"}, {"text": "*Ziran* is a more difficult state to achieve than *wu wei*, requiring conscious effort.", "isCorrect": false, "rationale": "The text clarifies that '*ziran* does not require effort; in fact, effort is usually a sign that *ziran* has been lost.'"}]}, {"question": "A skilled musician improvises a beautiful melody, flowing seamlessly from one note to the next without conscious deliberation, completely absorbed in the music. This exemplifies which Taoist principle?", "options": [{"text": "Striving against the current", "isCorrect": false, "rationale": "This action is the opposite of striving; it's effortless and natural."}, {"text": "Wu wei", "isCorrect": false, "rationale": "While related to *wu wei* (effortless action), the specific emphasis on 'flowing seamlessly,' 'without conscious deliberation,' and being 'completely absorbed' points more directly to the unselfconscious spontaneity of *ziran*."}, {"text": "Ziran", "isCorrect": true, "rationale": "This scenario perfectly illustrates *ziran* ('naturalness or spontaneity; the quality of acting from one's own true nature without artifice or self-consciousness'), where the musician is fully oneself, like 'a tree growing or a stream flowing.'"}, {"text": "Dominance of Yang over Yin", "isCorrect": false, "rationale": "This concept is about the interplay of complementary forces, not the description of spontaneous action."}]}, {"question": "What is a crucial insight conveyed by the black-and-white symbol of yin and yang, particularly the small dot of the opposite color within each half?", "options": [{"text": "That one force will eventually overpower and consume the other.", "isCorrect": false, "rationale": "The text states, 'Yin and yang are not enemies in a battle that one side will win.'"}, {"text": "That each force is entirely separate and distinct from the other.", "isCorrect": false, "rationale": "The symbol shows interaction and the text says 'each defining and requiring the other,' indicating interdependence, not separation."}, {"text": "That each complementary force inherently contains the potential or seed of its opposite.", "isCorrect": true, "rationale": "The text explains, 'Notice what the symbol actually shows: each half contains a seed of the other,' signifying that within every yin there is a bit of yang, and vice versa."}, {"text": "That reality is ultimately a battle between good and evil.", "isCorrect": false, "rationale": "The text clarifies, 'This is not a dualism of good versus evil. It is a description of how reality is structured.'"}]}, {"question": "The text explicitly states that yin and yang are 'not enemies in a battle that one side will win.' What does this statement challenge regarding common interpretations of duality?", "options": [{"text": "The idea that balance is impossible to achieve in reality.", "isCorrect": false, "rationale": "The text emphasizes their complementary nature and dynamic whole, implying balance is possible and inherent."}, {"text": "The notion of a fixed hierarchy where one force is inherently superior to the other.", "isCorrect": true, "rationale": "By describing them as 'dance partners' and stating 'Neither is superior; both are necessary,' the text challenges any view that one side is definitively better or dominant."}, {"text": "The concept that all phenomena arise from a single, unified source.", "isCorrect": false, "rationale": "The text states the Tao is the source from which all things arise; Yin and Yang describe how phenomena *generated by that source* interact, not challenge the single source idea."}, {"text": "The belief that life is inherently chaotic and lacks any underlying structure.", "isCorrect": false, "rationale": "Yin and Yang are presented as 'a description of how reality is structured,' refuting chaos."}]}, {"question": "If a Taoist sought to create a thriving community, which combination of principles would be most central to their approach?", "options": [{"text": "Strict enforcement of laws, clear hierarchies, and suppression of dissent.", "isCorrect": false, "rationale": "This approach of 'imposing one's will' and forceful control goes against *wu wei* and the natural flow emphasized by Taoism."}, {"text": "Allowing people to self-organize, fostering natural talents, and adapting to changing needs.", "isCorrect": true, "rationale": "This reflects the *wu wei* ideal of a ruler where 'the people say 'we did it ourselves',' and the emphasis on 'naturalness' (*ziran*) and 'working with their natural direction' rather than forcing things."}, {"text": "Prioritizing individual achievement and competition to drive innovation.", "isCorrect": false, "rationale": "Taoism emphasizes harmony and working with the flow, not competitive striving, which would be seen as 'straining against the grain of reality.'"}, {"text": "Imposing a rigid philosophical framework that dictates all aspects of life.", "isCorrect": false, "rationale": "The Tao itself is 'resistant to precise definition' and Taoist principles encourage working with natural flow rather than rigid imposition."}]}, {"question": "The 'big question' section asks about historical or personal examples where 'forcing a situation made things worse' versus 'allowing things to unfold led to a better result.' Which of the following modern-day scenarios best reflects a Taoist approach to problem-solving based on *wu wei*?", "options": [{"text": "A government launching a massive infrastructure project without adequate environmental impact assessments.", "isCorrect": false, "rationale": "This represents 'forcing a situation' and 'straining against the grain of reality,' ignoring natural consequences."}, {"text": "A parent constantly micromanaging their child's every activity to ensure academic success.", "isCorrect": false, "rationale": "This exemplifies 'imposing one's will' and 'straining,' rather than allowing natural development or working with the child's innate tendencies."}, {"text": "A software development team adopting an agile methodology, iteratively responding to user feedback and market shifts rather than adhering to a rigid, upfront plan.", "isCorrect": true, "rationale": "This aligns with *wu wei* by 'acting in accordance with the natural flow of things rather than forcing,' and 'adapting to what the situation requires' (customer feedback, market shifts) instead of 'imposing an agenda.'"}, {"text": "An individual trying to change a friend's deeply held beliefs through persistent argument and confrontation.", "isCorrect": false, "rationale": "This demonstrates 'forcing a situation' and 'imposing your agenda,' which is contrary to the Taoist ideal of non-contention."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
