    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which statement accurately distinguishes the Poetic Edda from the Prose Edda?", "options": [{"text": "The Poetic Edda was written by Snorri Sturluson, while the Prose Edda is a collection of anonymous poems.", "isCorrect": false, "rationale": "This statement incorrectly attributes the authorship and nature of the two Eddas. The Poetic Edda is a collection of anonymous poems, and the Prose Edda was written by Snorri Sturluson."}, {"text": "The Poetic Edda is an older collection of anonymous Old Norse poems, whereas the Prose Edda is a narrative retelling of mythology written by Snorri Sturluson.", "isCorrect": true, "rationale": "The text states the Poetic Edda is 'the older of the two Eddas, a collection of anonymous Old Norse poems' and the Prose Edda was 'Written by Snorri Sturluson... Retells Norse mythology in narrative form.'"}, {"text": "The Poetic Edda focuses exclusively on heroic tales, while the Prose Edda only contains mythological stories.", "isCorrect": false, "rationale": "The text indicates the Poetic Edda contains 'mythological and heroic poems,' and the Prose Edda 'retells Norse mythology,' suggesting both cover aspects of mythology and potentially heroism, not exclusively one or the other."}, {"text": "The Poetic Edda was compiled by pagan believers, while the Prose Edda was written by a Christian outsider.", "isCorrect": false, "rationale": "The text states that the compiler of the Poetic Edda was 'almost certainly Christian,' and Snorri Sturluson, author of the Prose Edda, was a 'Christian Icelandic chieftain.' Both were preserved by Christians."}]}, {"question": "A skald is composing a poem about a fierce battle and refers to the fighting as 'sword-storm' and the warriors as 'raven-feeders.' These phrases are examples of what poetic device described in the text?", "options": [{"text": "Alliteration", "isCorrect": false, "rationale": "While alliteration is common in Norse poetry, it is a different poetic device based on repeating initial sounds. The given examples are compound metaphors."}, {"text": "Metonymy", "isCorrect": false, "rationale": "Metonymy is a figure of speech where a thing or concept is referred to by the name of something closely associated with that thing or concept. While related, the specific term for these compound metaphors in Norse poetry is 'kenning'."}, {"text": "Kenning", "isCorrect": true, "rationale": "The text defines a kenning as 'A compound poetic metaphor used in skaldic verse' and provides examples like 'whale-road' (the sea) and 'raven-feeder' (warrior), which perfectly match 'sword-storm' and 'raven-feeders'."}, {"text": "Epic simile", "isCorrect": false, "rationale": "An epic simile (or Homeric simile) is a detailed comparison in the form of a simile that is many lines in length. This is a distinct poetic device from the compound metaphors described."}]}, {"question": "According to the Hávamál, what was the ultimate goal of Odin's self-sacrifice on Yggdrasil?", "options": [{"text": "To demonstrate his supreme power and authority over all other gods.", "isCorrect": false, "rationale": "The text emphasizes Odin's quest for knowledge, not a display of power. He sacrifices 'to himself, for himself' for wisdom."}, {"text": "To atone for past transgressions and secure forgiveness from other deities.", "isCorrect": false, "rationale": "There is no mention in the text of Odin's sacrifice being for atonement or forgiveness from other gods."}, {"text": "To acquire the sacred knowledge of the runes, which contained hidden wisdom.", "isCorrect": true, "rationale": "The text explicitly states: 'For nine nights he hung... until the runes... finally appeared to him. He seized them... The knowledge was his. The suffering was the price.'"}, {"text": "To establish a new covenant with humanity, granting them access to divine wisdom.", "isCorrect": false, "rationale": "The text contrasts this with the Jewish Torah given at Sinai as a covenant, implying Odin's act was for his own acquisition of knowledge, not a public covenant with humanity."}]}, {"question": "The text highlights a 'radically different account' of how sacred wisdom enters the world in Norse tradition compared to Judaism and Hinduism. What is this key distinction?", "options": [{"text": "The Norse tradition involves a public, historical event of revelation, unlike the private revelations in Judaism and Hinduism.", "isCorrect": false, "rationale": "The text states that Judaism's Torah was given at Sinai as a 'public revelation to an entire people,' making it public, whereas Odin's sacrifice was a personal ordeal."}, {"text": "In Norse tradition, sacred knowledge is paid for through divine suffering, whereas in the other traditions, the divine does not suffer to impart knowledge.", "isCorrect": true, "rationale": "The text states: 'In neither case [Judaism or Hinduism] did the divine suffer. In the Norse account, even the highest god must pay for what matters most. This is not a detail to overlook.'"}, {"text": "Norse wisdom is accessible only to the highest god, while Jewish and Hindu knowledge is available to all people.", "isCorrect": false, "rationale": "While Odin's *acquisition* involved personal suffering, the runes represent knowledge that can then be understood. Jewish knowledge is for a people, and Hindu for seers, not strictly 'all people' in the same way."}, {"text": "The Norse texts were compiled by non-believers, which is not true for Jewish or Hindu texts.", "isCorrect": false, "rationale": "This refers to the *preservation* of the texts, not the *acquisition* of the sacred knowledge itself by the divine or seers. The question asks about how wisdom 'enters the world'."}]}, {"question": "Odin's act of 'sacrifice to himself, for himself' on Yggdrasil primarily conveys what about the Norse understanding of wisdom?", "options": [{"text": "That wisdom is a gift freely bestowed by the gods upon those they favor.", "isCorrect": false, "rationale": "This contradicts the narrative that Odin *paid a price* through suffering for the knowledge, indicating it was not freely bestowed, even by himself."}, {"text": "That true wisdom demands immense personal cost and suffering, even for the most powerful divine beings.", "isCorrect": true, "rationale": "The text explicitly states: 'The knowledge was his. The suffering was the price.' This highlights the profound cost associated with acquiring significant wisdom in the Norse worldview."}, {"text": "That the gods are ultimately indifferent to the plight of mortals seeking profound knowledge.", "isCorrect": false, "rationale": "The act is about Odin's personal quest for wisdom, not a statement about divine indifference to mortals."}, {"text": "That wisdom is best gained through solitary meditation and detachment from the world.", "isCorrect": false, "rationale": "While Odin's act was solitary, it involved intense physical agony and ordeal, which is distinct from 'detachment' or passive meditation as described for Hindu seers."}]}, {"question": "Which statement most accurately describes Snorri Sturluson's role in the preservation of Norse mythology?", "options": [{"text": "He was a devout pagan priest who sought to re-establish the old religion through his writings.", "isCorrect": false, "rationale": "The text states Snorri Sturluson was a 'Christian Icelandic chieftain,' not a pagan priest, and preserved myths as 'cultural heritage,' not as a re-establishment of the religion."}, {"text": "He compiled the anonymous poems of the Poetic Edda into the manuscript known as the Codex Regius.", "isCorrect": false, "rationale": "Snorri Sturluson wrote the Prose Edda. The Poetic Edda was compiled by an anonymous individual around 1270 in the Codex Regius."}, {"text": "As a Christian chieftain, he authored the Prose Edda as a handbook for aspiring skalds, thereby preserving the myths as cultural and literary material.", "isCorrect": true, "rationale": "The text states: 'Written by Snorri Sturluson (1179--1241 ), a Christian Icelandic chieftain, as a handbook for aspiring skalds. Retells Norse mythology... preserved the myths not as revelation but as cultural heritage -- as literature, as the material for poetry.'"}, {"text": "He was the Völva who spoke the prophecies in the Völuspá, which he then recorded in the Prose Edda.", "isCorrect": false, "rationale": "A Völva is a female seer or prophetess, and she is the speaker of the Völuspá. Snorri was a male chieftain and author of the Prose Edda."}]}, {"question": "The text argues that the unique circumstance of the Eddas being preserved by non-believers (Christians) raises a significant question for modern Ásatrú practitioners. What is this question primarily concerned with?", "options": [{"text": "The authenticity of the myths as historical events that actually occurred.", "isCorrect": false, "rationale": "The text does not focus on the historical accuracy of the myths but on their religious meaning. Modern practitioners grapple with the *interpretation* of the texts, not their historicity."}, {"text": "The literary quality and poetic merit of the texts, which might have been compromised.", "isCorrect": false, "rationale": "The text describes the Eddas as 'genuine treasures' containing 'real mythology, real poetry,' suggesting their literary quality is not in question."}, {"text": "Whether the texts fully capture the original religion's inner life, ritual meanings, or theological nuances, due to being filtered through a different worldview.", "isCorrect": true, "rationale": "The text states: 'Whether they preserve the original religion's inner life, its ritual meanings, or its theological nuances is harder to say... a window... that looks into a room they can partially but never completely see.'"}, {"text": "The ability of non-believers to accurately translate the Old Norse language into modern languages.", "isCorrect": false, "rationale": "The linguistic challenge is not presented as the *primary* concern for modern practitioners, compared to the philosophical/theological filtering of the worldview."}]}, {"question": "According to the text, kennings were crucial to the Norse oral tradition for what primary reason?", "options": [{"text": "They made the poetry easier to understand for a broad, uneducated audience.", "isCorrect": false, "rationale": "The text states kennings 'made the oral tradition denser and more resistant to casual paraphrase,' implying they made it *less* accessible without proper understanding."}, {"text": "They added humor and lightheartedness, balancing the often serious subject matter of the myths.", "isCorrect": false, "rationale": "The text does not mention humor or lightheartedness as a function of kennings."}, {"text": "They made the oral tradition denser and more resistant to casual paraphrase, requiring memorization and proper understanding to function.", "isCorrect": true, "rationale": "The text explicitly states: 'Kennings made the oral tradition denser and more resistant to casual paraphrase -- they had to be memorized and understood properly to work.'"}, {"text": "They served as a secret language to hide sacred knowledge from outsiders and enemies.", "isCorrect": false, "rationale": "While dense, kennings were part of the skaldic tradition and poetry, meant to be appreciated and understood by those familiar with the myths, not to be a secret code."}]}, {"question": "For modern Ásatrú practitioners, what is the most significant challenge or consideration presented by the nature of the Eddas, as described in the text?", "options": [{"text": "The difficulty in translating the archaic Old Norse language into contemporary understanding.", "isCorrect": false, "rationale": "While language can be a challenge, the text highlights a deeper issue. The core challenge is not just translation but interpretation through a filtered lens."}, {"text": "Reconciling the Eddas' polytheistic content with the monotheistic beliefs prevalent in the modern world.", "isCorrect": false, "rationale": "Ásatrú is a modern pagan tradition that embraces polytheism, so reconciling with monotheism is not its primary challenge with the texts themselves."}, {"text": "Accessing the true, unfiltered 'inner life, ritual meanings, or theological nuances' of the original religion, given the texts' Christian preservation.", "isCorrect": true, "rationale": "The text concludes by saying Ásatrú practitioners 'grapple seriously with this question: they have the texts, but they also know the texts were filtered through a different worldview,' making it hard to see the 'inner life, ritual meanings, or theological nuances.'"}, {"text": "Proving the historical accuracy of the mythological events described within the Eddas.", "isCorrect": false, "rationale": "The text focuses on the religious and cultural meaning of the myths, not their historical veracity, as the central challenge for practitioners."}]}, {"question": "Based on the Norse account of Odin obtaining knowledge, what broader implication does this tradition suggest about the relationship between suffering and wisdom?", "options": [{"text": "Wisdom is a divine gift that is freely bestowed upon those who are worthy, requiring no effort or pain to acquire.", "isCorrect": false, "rationale": "This contradicts Odin's intense suffering and the idea that 'The suffering was the price' for his wisdom."}, {"text": "The most profound and sacred wisdom often necessitates a significant personal sacrifice and ordeal, even for the most powerful beings.", "isCorrect": true, "rationale": "The text explicitly states: 'In the Norse account, even the highest god must pay for what matters most,' highlighting that 'The suffering was the price' for ultimate wisdom."}, {"text": "Suffering is primarily a punishment for seeking forbidden knowledge, rather than a path to wisdom.", "isCorrect": false, "rationale": "Odin's suffering was a deliberate act to *gain* knowledge, presented as a price, not a punishment for seeking something forbidden."}, {"text": "Wisdom is best gained through communal ritual and shared experience, minimizing individual hardship.", "isCorrect": false, "rationale": "Odin's ordeal on Yggdrasil was a solitary, intensely personal act of sacrifice, not a communal ritual."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
