<script>
var QUESTIONS = [{"question": "What is the primary difference in focus between Philosophical Taoism and Religious Taoism, according to the text?", "options": [{"text": "Philosophical Taoism focuses on societal reform, while Religious Taoism emphasizes personal enlightenment.", "isCorrect": false, "rationale": "Philosophical Taoism focuses on personal wisdom and freedom, not societal reform, and Religious Taoism addresses practical and communal needs, not solely personal enlightenment."}, {"text": "Philosophical Taoism is concerned with understanding the Tao and cultivating personal wisdom, whereas Religious Taoism addresses practical, communal needs, and longevity through rituals.", "isCorrect": true, "rationale": "The text states Philosophical Taoism's focus is on understanding the Tao and cultivating personal wisdom, while Religious Taoism's concerns are practical, communal (healing, harvests), and about longevity, involving priests and rituals."}, {"text": "Philosophical Taoism primarily uses priests and liturgy, while Religious Taoism relies solely on textual study.", "isCorrect": false, "rationale": "This statement reverses the roles; Religious Taoism is the one with priests, liturgy, and rituals, while Philosophical Taoism is rooted in texts but focuses on contemplation."}, {"text": "Philosophical Taoism is a modern development, while Religious Taoism is an ancient practice from before the Common Era.", "isCorrect": false, "rationale": "The text specifies that Religious Taoism developed from roughly the 2nd century CE onward, while Philosophical Taoism is rooted in the ancient texts of Laozi and Zhuangzi, implying it is older in its textual foundation."}]}, {"question": "Which ancient texts are identified as the foundational roots of Philosophical Taoism?", "options": [{"text": "The I Ching and The Analects.", "isCorrect": false, "rationale": "While the I Ching is a significant Chinese classic, and The Analects are foundational to Confucianism, neither is explicitly stated as the root of Philosophical Taoism in this text."}, {"text": "The Tao Te Ching (Laozi) and the writings of Zhuangzi.", "isCorrect": true, "rationale": "The text explicitly states that Philosophical Taoism 'is rooted in the texts of Laozi and Zhuangzi,' with the Tao Te Ching being the most familiar to Western readers."}, {"text": "Buddhist sutras and Vedic hymns.", "isCorrect": false, "rationale": "These texts belong to Buddhism and Hinduism, respectively, which are different religious and philosophical traditions from Taoism."}, {"text": "Legalist treatises and historical chronicles.", "isCorrect": false, "rationale": "Legalism is another distinct school of thought in ancient China, and historical chronicles are not the foundational philosophical texts of Taoism."}]}, {"question": "A person is deeply engaged in contemplative practices, attempting to release rigid thinking and find 'effortless action' by aligning with the inherent patterns of the universe. This person's approach is most aligned with which stream of Taoism?", "options": [{"text": "Folk Taoism.", "isCorrect": false, "rationale": "Folk Taoism is not a stream explicitly defined in the text, although elements of folk religion contribute to Religious Taoism. The described activities fit a different stream."}, {"text": "Religious Taoism.", "isCorrect": false, "rationale": "Religious Taoism is characterized by practical, communal concerns, rituals, and longevity practices, not primarily contemplative efforts to release rigid thinking or find effortless action."}, {"text": "Philosophical Taoism.", "isCorrect": true, "rationale": "The text describes Philosophical Taoism as tending 'toward the contemplative: stepping back from social roles, releasing rigid thinking, finding the effortless action that the situation actually calls for.'"}, {"text": "Syncretic Taoism.", "isCorrect": false, "rationale": "Syncretic Taoism is not a stream explicitly defined in the text. While Taoism is flexible and blends influences, the specific practices described align with one of the two main streams."}]}, {"question": "Which of the following is NOT a characteristic feature of Religious Taoism as described in the text?", "options": [{"text": "An organized structure with priests, temples, and liturgy.", "isCorrect": false, "rationale": "The text explicitly states Religious Taoism is 'a fully organized religion with priests, liturgy, temples, festivals... and elaborate ritual practices.'"}, {"text": "A focus on practical concerns like healing the sick, protecting communities, and ensuring good harvests.", "isCorrect": false, "rationale": "The text lists these as key 'practical and communal' concerns of Religious Taoism."}, {"text": "An emphasis on stepping back from social roles and releasing rigid thinking through contemplative study of the Tao Te Ching alone.", "isCorrect": true, "rationale": "This description aligns with the focus of Philosophical Taoism, not Religious Taoism. Religious Taoism, while drawing on philosophical texts, is not primarily characterized by this specific contemplative emphasis as its main feature, especially 'alone'."}, {"text": "An interest in achieving longevity or immortality through diet, breathing exercises, meditation, and ritual.", "isCorrect": false, "rationale": "The text identifies this as 'one of religious Taoism's most distinctive features'."}]}, {"question": "The text states, 'The division between philosophical and religious Taoism should not be overdrawn. A Chinese villager in the 10th century CE did not necessarily experience them as separate.' This statement primarily emphasizes which aspect of Taoism?", "options": [{"text": "The historical evolution of Taoism from a philosophical school to a religion.", "isCorrect": false, "rationale": "While there was an evolution, the statement emphasizes the intertwining and lack of distinct experience, rather than a linear progression where one replaced the other."}, {"text": "The theoretical distinction made by scholars often did not reflect the lived experience of practitioners.", "isCorrect": true, "rationale": "This directly explains the quote, highlighting that scholarly categories might not capture the integrated reality of how Taoism was practiced and perceived by ordinary people."}, {"text": "The superiority of practical, ritualistic Taoism over abstract philosophical inquiry.", "isCorrect": false, "rationale": "The text makes no judgment of superiority; it only describes their interconnectedness."}, {"text": "The complete absence of philosophical texts in rural Chinese communities.", "isCorrect": false, "rationale": "The text explicitly contradicts this by stating, 'The Tao Te Ching sat alongside ritual manuals on the same shelf,' indicating philosophical texts were present."}]}, {"question": "The distinctive interest in longevity and, in some traditions, immortality, achieved through practices like specific diets, breathing exercises, meditation, and ritual practice, is a hallmark of which Taoist stream?", "options": [{"text": "Pure Philosophical Taoism.", "isCorrect": false, "rationale": "Philosophical Taoism focuses on understanding the Tao and personal wisdom, not specifically on physical longevity or immortality practices as a 'distinctive feature'."}, {"text": "Early Shamanic Taoism.", "isCorrect": false, "rationale": "Shamanic tradition is mentioned as contributing to Religious Taoism, but it is not presented as the distinct stream characterized by the longevity/immortality pursuit."}, {"text": "Religious Taoism.", "isCorrect": true, "rationale": "The text clearly states, 'One of religious Taoism's most distinctive features is its interest in longevity and, in some traditions, immortality,' detailing the associated practices."}, {"text": "Martial Arts Taoism.", "isCorrect": false, "rationale": "While martial arts like Tai chi have Taoist roots and can contribute to health, the broader, distinctive pursuit of longevity and immortality through diverse practices is attributed to Religious Taoism."}]}, {"question": "Tai chi is described as a Taoist martial art rooted in the principles of 'wu wei' and 'yin-yang'. Its flowing, circular movements, meeting force with softness, and finding balance through constant, gentle motion best exemplify which characteristic of Taoist philosophy?", "options": [{"text": "The strict adherence to traditional forms and rigid physical discipline.", "isCorrect": false, "rationale": "The description of 'softness,' 'gentle motion,' and 'flowing' contradicts strict adherence and rigid discipline."}, {"text": "The pursuit of communal harmony through organized religious rituals.", "isCorrect": false, "rationale": "Tai chi is a physical practice that embodies philosophical principles, not primarily a communal religious ritual."}, {"text": "The embodiment of effortless action (wu wei) and dynamic balance in aligning with natural forces.", "isCorrect": true, "rationale": "The text explicitly links Tai chi to 'wu wei and yin-yang' and describes its movements as 'meeting force with softness, finding balance through constant, gentle motion,' which aligns perfectly with effortless action and dynamic balance."}, {"text": "The quest for physical immortality through strenuous physical exertion.", "isCorrect": false, "rationale": "While longevity is a Taoist concern, Tai chi's description emphasizes its philosophical embodiment of wu wei and yin-yang, not just strenuous exertion for immortality."}]}, {"question": "The term 'gong fu' (cultivation) is defined in its original sense as 'disciplined practice over time' in the context of Religious Taoism's interest in longevity. This term primarily suggests:", "options": [{"text": "That martial arts are the sole path to achieving immortality in Taoism.", "isCorrect": false, "rationale": "The text mentions 'diet, breathing exercises, meditation, and ritual practice' in addition to martial arts as paths for longevity, indicating it's not solely martial arts."}, {"text": "The necessity of consistent, dedicated effort to achieve desired outcomes, whether physical, spiritual, or practical.", "isCorrect": true, "rationale": "The definition 'disciplined practice over time' highlights the importance of sustained, intentional effort for any form of 'cultivation,' aligning with the various practices mentioned for longevity and health."}, {"text": "A natural, spontaneous awakening to the Tao without any structured effort.", "isCorrect": false, "rationale": "The concept of 'disciplined practice' directly contradicts a spontaneous awakening without effort."}, {"text": "The exclusive study of philosophical texts to gain intellectual understanding.", "isCorrect": false, "rationale": "While philosophical texts are important, gong fu applies to a broader range of practices, including diet and breathing, which are not solely intellectual study."}]}, {"question": "The text concludes that 'Taoism's genius is its flexibility—its ability to speak at once to the philosopher, the farmer, the martial artist, and the person looking for healing.' This 'flexibility' primarily refers to:", "options": [{"text": "Its capacity to adapt and cater to diverse human needs and interests across different social strata.", "isCorrect": true, "rationale": "The list of diverse individuals (philosopher, farmer, martial artist, person seeking healing) directly illustrates Taoism's ability to address a wide range of needs and appeal to various segments of society."}, {"text": "Its strict adherence to a single, unchanging doctrine across millennia.", "isCorrect": false, "rationale": "Flexibility implies adaptability and diversity, which is the opposite of strict adherence to a single, unchanging doctrine."}, {"text": "Its sole focus on individual enlightenment, disregarding communal needs.", "isCorrect": false, "rationale": "The mention of the 'farmer' and 'person looking for healing' implies communal or practical concerns beyond just individual enlightenment."}, {"text": "Its historical evolution into a global religion, shedding its Chinese origins.", "isCorrect": false, "rationale": "The text focuses on Taoism's breadth within its Chinese context, not its global spread or shedding of origins."}]}, {"question": "Which statement most accurately captures a key distinction between Philosophical and Religious Taoism, based on the provided text?", "options": [{"text": "Philosophical Taoism is prescriptive, offering clear rules for living, while Religious Taoism is descriptive, analyzing the nature of reality.", "isCorrect": false, "rationale": "Philosophical Taoism tends to be more contemplative and about aligning with the Tao, while Religious Taoism is more prescriptive in its rituals and practices for practical ends."}, {"text": "Philosophical Taoism is primarily concerned with personal wisdom and aligning with the Tao, whereas Religious Taoism is a fully organized religion focused on practical, communal, and physical concerns like longevity.", "isCorrect": true, "rationale": "This statement directly summarizes the core differences outlined in the text: Philosophical Taoism's focus is on understanding the Tao and personal wisdom, while Religious Taoism is an organized religion with practical, communal, and physical concerns, including longevity."}, {"text": "Philosophical Taoism originated in the 2nd century CE, while Religious Taoism is rooted in the ancient texts of Laozi and Zhuangzi.", "isCorrect": false, "rationale": "This statement reverses the historical timelines. Religious Taoism developed from the 2nd century CE, and Philosophical Taoism is rooted in ancient texts like those of Laozi and Zhuangzi."}, {"text": "Philosophical Taoism rejects folk religion and shamanic traditions, while Religious Taoism exclusively uses the Tao Te Ching for guidance.", "isCorrect": false, "rationale": "Religious Taoism 'draws on the philosophical texts but combines them with folk religion, shamanic tradition.' Neither stream is presented with such exclusive or rejecting characteristics."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
