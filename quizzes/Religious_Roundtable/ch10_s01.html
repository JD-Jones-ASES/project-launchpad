<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 10, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the context of the New Testament, what is the primary meaning of the Greek word pistis as it relates to Christian faith?", "options": [{"text": "Intellectual agreement with a set of theological propositions.", "isCorrect": false, "rationale": "The text explicitly states that pistis is 'not merely intellectual agreement' but involves a total orientation of the self."}, {"text": "Trust, conviction, and loyalty, orienting the entire self toward God.", "isCorrect": true, "rationale": "The text defines pistis as 'trust, conviction, and loyalty -- not merely intellectual agreement. Faith, in the Christian sense, is a total orientation of the self toward God: the mind, the will, and the affections all directed toward a reality that is trusted rather than proven.'"}, {"text": "A rock-solid, evidence-based certainty about God's existence.", "isCorrect": false, "rationale": "The text distinguishes faith from 'certainty -- the rock-solid, evidence-based confidence of a scientist measuring a known quantity.'"}, {"text": "Carelessly accepting things without thought simply because an authority says so.", "isCorrect": false, "rationale": "The text clarifies that pistis is 'not the same as credulity -- accepting things carelessly, without thought, simply because an authority says so.'"}], "id": "q01"}, {"question": "The text describes Christian faith as occupying a 'third territory' distinct from credulity and scientific certainty. Which analogy best illustrates this unique nature of faith?", "options": [{"text": "A scientist verifying a hypothesis through repeated experimentation.", "isCorrect": false, "rationale": "This analogy represents scientific certainty, which the text distinguishes Christian faith from."}, {"text": "Trusting a friend who has not yet proven themselves in every possible situation.", "isCorrect": true, "rationale": "The text uses this exact analogy: 'Faith occupies a third territory: it is trust extended toward something real but not fully visible, the way you trust a friend before they have had a chance to prove themselves in every possible situation.'"}, {"text": "Believing a persuasive advertisement without checking its claims.", "isCorrect": false, "rationale": "This analogy represents credulity, which the text explicitly states faith is not."}, {"text": "Memorizing historical facts from a reliable textbook.", "isCorrect": false, "rationale": "This represents factual recall, not the active and personal trust described for Christian faith."}], "id": "q02"}, {"question": "According to the passage from Hebrews 11:1, what unique characteristic does faith possess regarding 'things hoped for' and 'things not seen'?", "options": [{"text": "It is merely a subjective feeling or a personal wish.", "isCorrect": false, "rationale": "The text explicitly states: 'Faith is not merely a feeling or a wish -- it is described as having substance, as being real.'"}, {"text": "It acts as the 'substance' and 'evidence' for these realities.", "isCorrect": true, "rationale": "Hebrews 11:1 states: 'Now faith is the substance of things hoped for, the evidence of things not seen.' The text further emphasizes that faith is described 'as having substance, as being real in a way that precedes and grounds ordinary visible reality.'"}, {"text": "It requires visible proof before one can truly believe.", "isCorrect": false, "rationale": "The verse refers to 'things not seen,' indicating that visible proof is not a prerequisite for this type of faith."}, {"text": "It contradicts logical reasoning and sensory perception.", "isCorrect": false, "rationale": "Thomas Aquinas is quoted as saying faith is 'not against reason, but goes beyond reason.'"}], "id": "q03"}, {"question": "How does Thomas Aquinas characterize the relationship between human reason and Christian faith, particularly concerning the existence of God and specific Christian doctrines?", "options": [{"text": "Faith completely replaces reason, as reason is insufficient to know anything about God.", "isCorrect": false, "rationale": "Aquinas states that 'the natural human intellect can arrive at the conclusion that God exists,' showing reason has a role."}, {"text": "Reason can prove the existence of God, but specific Christian claims require faith, which goes beyond reason.", "isCorrect": true, "rationale": "The text explains: 'faith is not against reason, but goes beyond reason. The natural human intellect can arrive at the conclusion that God exists... But the specifically Christian claims... cannot be reached by reason alone. They must be received by faith.'"}, {"text": "Reason and faith are entirely separate domains with no overlap or interaction.", "isCorrect": false, "rationale": "Aquinas's view shows interaction and a progression from reason to faith, not complete separation."}, {"text": "All aspects of Christian theology, including the Trinity and Incarnation, can be fully understood through reason alone.", "isCorrect": false, "rationale": "The text explicitly states that 'specifically Christian claims -- the Trinity, the Incarnation, the resurrection -- cannot be reached by reason alone.'"}], "id": "q04"}, {"question": "Imagine a person using the 'cosmological argument' to deduce that a first cause must exist for the universe. Based on the provided text, what is the most accurate assessment of this conclusion within Christian theology?", "options": [{"text": "This conclusion fully encompasses all essential Christian claims, including the Incarnation.", "isCorrect": false, "rationale": "The text states that 'specifically Christian claims -- the Trinity, the Incarnation, the resurrection -- cannot be reached by reason alone' but require faith."}, {"text": "This conclusion aligns with reason's ability to discern God's existence, but Christian faith is still required for doctrines like the Trinity.", "isCorrect": true, "rationale": "The text explains that 'the natural human intellect can arrive at the conclusion that God exists -- through what philosophers call the cosmological argument,' but that 'the specifically Christian claims... cannot be reached by reason alone. They must be received by faith.'"}, {"text": "This conclusion is rejected by Christian theology because faith requires no rational backing whatsoever.", "isCorrect": false, "rationale": "Aquinas states 'faith is not against reason,' implying reason can support certain aspects of belief, like God's existence."}, {"text": "This conclusion is a form of credulity and therefore contrary to genuine Christian faith.", "isCorrect": false, "rationale": "The cosmological argument is presented as a product of 'natural human intellect,' which is distinct from unthinking credulity."}], "id": "q05"}, {"question": "According to Christian theology as described in the text, what is its most distinctive claim about revelation?", "options": [{"text": "God dictated sacred texts to prophets.", "isCorrect": false, "rationale": "While true for some aspects of revelation, the text explicitly states the Incarnation is the 'most distinctive claim.'"}, {"text": "God personally became a human being in the person of Jesus Christ.", "isCorrect": true, "rationale": "The text states: 'This leads to the most distinctive claim in all of Christian theology about revelation: the Incarnation. God did not merely send a message... According to Christian theology, God entered the story personally -- became a human being...'"}, {"text": "God communicated through divine messages and prophecies.", "isCorrect": false, "rationale": "Similar to dictating texts, this is a form of revelation but not identified as the 'most distinctive claim' in this section."}, {"text": "God established a system of moral principles for humanity to follow.", "isCorrect": false, "rationale": "This describes an outcome of revelation, but not the 'most distinctive claim' about the *nature* of revelation itself."}], "id": "q06"}, {"question": "The text states that Jesus is considered the 'supreme and final revelation.' What is the fundamental reason provided for this distinction?", "options": [{"text": "He delivered a more comprehensive set of laws and commandments than previous prophets.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating 'not because he delivered superior information'."}, {"text": "In him, the divine message (information) and the divine messenger (informer) became one.", "isCorrect": true, "rationale": "The text states: 'This is why Christianity calls Jesus the supreme and final revelation: not because he delivered superior information, but because in him, information and the informer became one.'"}, {"text": "He performed the most impressive miracles, demonstrating divine power.", "isCorrect": false, "rationale": "While miracles are part of the Christian narrative, the text does not cite them as the *fundamental reason* for Jesus being the 'supreme and final revelation' in this specific context."}, {"text": "He authored the most philosophically sophisticated texts in the New Testament.", "isCorrect": false, "rationale": "The text refers to the Letter to the Hebrews as philosophically sophisticated, not attributing it to Jesus as author in this context, nor is authorship the reason for 'supreme revelation.'"}], "id": "q07"}, {"question": "If Christian faith is ultimately trust in the person of Jesus Christ, rather than primarily a text or a system of principles, what implication does this have for an individual's journey toward understanding Christianity?", "options": [{"text": "The primary focus should be on rigorous academic study of theological texts and historical documents.", "isCorrect": false, "rationale": "While study can be valuable, the text emphasizes 'trust in a person -- not a text, not a system, not a set of principles' as the ultimate nature of faith."}, {"text": "A personal relationship of trust with Jesus Christ is central to apprehending its core truths.", "isCorrect": true, "rationale": "The text concludes: 'Faith, in the Christian sense, is ultimately trust in a person -- not a text, not a system, not a set of principles, but the person of Jesus Christ.' This indicates a personal dimension is key."}, {"text": "Understanding comes first through intellectual assent to a complete set of doctrines, then trust follows.", "isCorrect": false, "rationale": "This contradicts the description of faith as trust preceding full understanding, as highlighted by Anselm's 'faith seeking understanding.'"}, {"text": "Christianity is primarily about adherence to a list of rules and moral codes to gain divine favor.", "isCorrect": false, "rationale": "The text focuses on 'trust in a person' as the core of faith and revelation, not solely a system of rules."}], "id": "q08"}, {"question": "According to the 'DID YOU KNOW?' section, what is a crucial function of reciting a creed within Christian tradition, beyond being a purely intellectual exercise?", "options": [{"text": "It serves as a personal confession of doubt and uncertainty.", "isCorrect": false, "rationale": "Creeds are formal statements of *beliefs* and 'a declaration of where one stands,' indicating conviction rather than doubt."}, {"text": "It is primarily a historical recitation of ancient philosophical arguments.", "isCorrect": false, "rationale": "While creeds are historical, their primary function described is not merely academic recitation but an act of loyalty."}, {"text": "It is an act of communal loyalty and a public declaration of one's stance.", "isCorrect": true, "rationale": "The text states: 'Reciting a creed is not merely an intellectual exercise -- it is an act of communal loyalty, a declaration of where one stands.'"}, {"text": "It functions as a magical incantation to ward off evil.", "isCorrect": false, "rationale": "This concept is not mentioned or implied in the provided text."}], "id": "q09"}, {"question": "Anselm of Canterbury's phrase 'fides quaerens intellectum' (faith seeking understanding) challenges a common modern tendency. What sequence of spiritual engagement does Anselm advocate?", "options": [{"text": "Fully understanding and comprehending all divine truths before committing to faith.", "isCorrect": false, "rationale": "The text states this is 'the opposite of the modern tendency to demand understanding before belief,' which Anselm counters."}, {"text": "Committing to faith first, then actively seeking to understand what one has committed to.", "isCorrect": true, "rationale": "The text explains: 'Faith, for Anselm, does not wait for understanding before it commits. It commits first, and then seeks to understand what it has committed to.'"}, {"text": "Prioritizing intellectual understanding entirely, with no role for personal trust or commitment.", "isCorrect": false, "rationale": "Anselm's approach emphasizes both faith and understanding, with faith preceding and enabling deeper understanding."}, {"text": "Remaining perpetually in a state of questioning without ever making a commitment of faith.", "isCorrect": false, "rationale": "Anselm's concept involves *commitment* (trust) as the necessary first step, followed by seeking understanding."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
