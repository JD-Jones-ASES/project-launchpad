<script>
var QUESTIONS = [{"question": "According to the text, why is the Quran considered 'untranslatable in a strict sense' by Muslims?", "options": [{"text": "Its ancient Arabic script is too complex for modern linguists to fully decipher.", "isCorrect": false, "rationale": "The text does not mention the script's complexity as the reason for untranslatability, but rather its divine origin."}, {"text": "Muslims believe it is the direct, verbatim word of God, meaning only the original Arabic text embodies its true, divine essence.", "isCorrect": true, "rationale": "The text states, 'the Quran itself is the Arabic text, and its Arabic is held to be miraculous in its beauty and precision,' emphasizing its divine, untranslatable nature in its original form."}, {"text": "The Prophet Muhammad forbade any translation of the Quran during his lifetime to prevent misinterpretation.", "isCorrect": false, "rationale": "The text does not mention any prohibition from Muhammad regarding translation; the reason for untranslatability lies in its perceived divine origin as God's direct speech."}, {"text": "The Quran's intricate rhythms and sound patterns, essential to its impact, are impossible to replicate in other languages.", "isCorrect": false, "rationale": "While the text mentions the importance of its rhythms and sound patterns, the primary reason for 'untranslatable in a strict sense' is its status as God's direct word in Arabic, not merely the difficulty of replicating its aesthetics."}], "id": "q01"}, {"question": "What is the significance of the term 'hafiz' in the context of the Quran?", "options": [{"text": "A hafiz is an individual authorized to lead the daily prayers in a mosque.", "isCorrect": false, "rationale": "While a hafiz may lead prayers, the term's specific significance mentioned in the text is related to memorization, not authorization to lead prayers."}, {"text": "A hafiz is a Muslim who has memorized the entire Quran, signifying a cherished honor as 'one who preserves'.", "isCorrect": true, "rationale": "The text explicitly states, 'A Muslim who has memorized the entire Quran is called a hafiz (one who preserves), and this is a cherished honor.'"}, {"text": "A hafiz is a scholar who compiles Hadith collections and authenticates their reliability.", "isCorrect": false, "rationale": "The term hafiz is linked to Quran memorization, not the compilation or authentication of Hadith."}, {"text": "A hafiz is an early caliph responsible for the initial compilation of the Quran after Muhammad's death.", "isCorrect": false, "rationale": "The early caliphs (Abu Bakr, Uthman) were involved in compilation, but the term hafiz refers to an individual who memorizes the text, not a historical compiler."}], "id": "q02"}, {"question": "How does the Muslim belief about the Quran's origin fundamentally differ from typical understandings of other religious scriptures?", "options": [{"text": "Muslims believe the Quran was composed by Muhammad under divine inspiration, making it his interpretation of God's will.", "isCorrect": false, "rationale": "The text explicitly states, 'Muslims do not say that Muhammad wrote it, or that he composed it under divine inspiration.'"}, {"text": "The Quran is seen as God's direct speech, delivered verbatim through Muhammad as a vessel, not Muhammad's own authored work about God.", "isCorrect": true, "rationale": "The text emphasizes, 'They say that God spoke it, and Muhammad recited it. The Quran is not Muhammad's book about God; it is God's speech, delivered through Muhammad as a vessel.'"}, {"text": "The Quran was revealed to multiple prophets over several centuries, unlike scriptures attributed to a single founder.", "isCorrect": false, "rationale": "The text states the Quran was revealed 'to the Prophet Muhammad through the angel Gabriel between 610 and 632,' indicating a single prophet over a specific period."}, {"text": "Its content is entirely legalistic, offering no theological or ethical guidance, which is uncommon for sacred texts.", "isCorrect": false, "rationale": "The text states the Quran 'addresses an enormous range of topics: theology, ethics, law, history, the stories of earlier prophets, the nature of Paradise and Hell, the duties of the believer, and the nature of God.'"}], "id": "q03"}, {"question": "What critical role did the third caliph, Uthman ibn Affan, play in the preservation of the Quran?", "options": [{"text": "He initiated the initial collection of scattered Quranic fragments from various materials.", "isCorrect": false, "rationale": "The text credits the first caliph, Abu Bakr, with ordering the fragments compiled into a single document."}, {"text": "He composed new suras (chapters) to complete the Quran's theological framework after Muhammad's death.", "isCorrect": false, "rationale": "The Quran is believed to be the complete word of God as revealed to Muhammad; no new suras were composed by caliphs."}, {"text": "He produced the authoritative written text, standardized copies, and ordered other versions destroyed, ensuring textual uniformity.", "isCorrect": true, "rationale": "The text states, 'The third caliph, Uthman ibn Affan, produced the authoritative written text around 650 and sent standardized copies to major cities of the Muslim world, ordering other versions destroyed.'"}, {"text": "He established the practice of memorizing the entire Quran as a community honor, which was previously uncommon.", "isCorrect": false, "rationale": "The text indicates that memorization was practiced 'From the beginning' of the community, not established by Uthman."}], "id": "q04"}, {"question": "Which statement accurately describes the general organization of the Quran's chapters?", "options": [{"text": "Chapters are arranged chronologically according to the time of their revelation to the Prophet Muhammad.", "isCorrect": false, "rationale": "The text explicitly states the chapters are 'arranged roughly from longest to shortest,' not chronologically."}, {"text": "Chapters are organized thematically, with each sura dedicated to a distinct topic like law, ethics, or history.", "isCorrect": false, "rationale": "While the Quran addresses various topics, its chapters are 'arranged roughly from longest to shortest,' not primarily thematically."}, {"text": "Chapters (suras) are generally arranged from longest to shortest, with the opening chapter, Al-Fatiha, as a notable exception.", "isCorrect": true, "rationale": "The text states, 'The Quran is organized into 114 chapters called suras, arranged roughly from longest to shortest (with the exception of the short opening chapter, Al-Fatiha...).'"}, {"text": "Chapters are ordered alphabetically by their unique titles, facilitating easy navigation.", "isCorrect": false, "rationale": "The text specifies organization by length, not alphabetical order."}], "id": "q05"}, {"question": "Based on the 'Did You Know' section, what is the primary significance of Al-Fatiha for a practicing Muslim?", "options": [{"text": "It is the longest chapter of the Quran, containing the most comprehensive legal rulings for daily life.", "isCorrect": false, "rationale": "The 'Did You Know' section states Al-Fatiha is 'seven verses long,' making it one of the shortest, and its significance is not primarily legal rulings."}, {"text": "It is recited in every unit of every Muslim's five daily prayers, making it an exceptionally rehearsed and central text in a Muslim's life.", "isCorrect": true, "rationale": "The 'Did You Know' section highlights that Al-Fatiha 'is recited in every unit of every Muslim's five daily prayers,' leading to its frequent recitation and central role."}, {"text": "It provides the historical narrative of early Islam and the life of the Prophet Muhammad, essential for contextual understanding.", "isCorrect": false, "rationale": "The 'Did You Know' section describes Al-Fatiha as a prayer, not a historical narrative."}, {"text": "It is a chapter reserved for special occasions and communal gatherings, recited only once a week during Friday prayers.", "isCorrect": false, "rationale": "The text states it is recited 'seventeen times per day' for someone who performs all five daily prayers, indicating its daily, not weekly, importance."}], "id": "q06"}, {"question": "What is the fundamental difference in the perceived origin of the Hadith compared to the Quran?", "options": [{"text": "The Hadith are believed to be divinely inspired interpretations of the Quran, while the Quran is God's direct word.", "isCorrect": false, "rationale": "The Hadith are 'not the word of God' and are not interpretations of the Quran but rather Muhammad's own sayings and actions."}, {"text": "The Hadith are considered the verbatim word of God revealed through Muhammad, whereas the Quran comprises Muhammad's own reflections.", "isCorrect": false, "rationale": "This statement reverses the definitions; the Quran is God's verbatim word, and Hadith are Muhammad's example."}, {"text": "The Hadith are recorded reports of Muhammad's sayings, actions, and tacit approvals, serving as his example, while the Quran is understood as God's direct, verbatim speech.", "isCorrect": true, "rationale": "The text clearly distinguishes: the Quran is 'the direct, verbatim word of God,' whereas the Hadith 'are not the word of God, but they are the word and example of God's final prophet.'"}, {"text": "Both the Hadith and the Quran are regarded as the direct word of God, differing only in their historical compilation methods.", "isCorrect": false, "rationale": "The text explicitly states that Hadith are 'not the word of God,' distinguishing their origin from the Quran."}], "id": "q07"}, {"question": "How does the Sunnah primarily function within the broader framework of Islamic guidance, as described in the text?", "options": [{"text": "The Sunnah is an alternative scripture that replaces the Quran for specific legal matters not addressed by God's direct word.", "isCorrect": false, "rationale": "The Sunnah complements the Quran, serving as a model and forming the foundation of Sharia with the Quran, but does not replace it."}, {"text": "The Sunnah is the practice and way of life of Prophet Muhammad, preserved in the Hadith, serving as a model for Muslim behavior and forming part of Sharia.", "isCorrect": true, "rationale": "The text defines Sunnah as 'the practice and way of life of the Prophet Muhammad, as preserved in the Hadith, which serves as a model for Muslim behavior in all areas of life' and states that 'Together, the Quran and the Sunnah form the foundation for Islamic law, called Sharia.'"}, {"text": "The Sunnah is a collection of theological interpretations of the Quran by early Islamic scholars, distinct from the Hadith.", "isCorrect": false, "rationale": "The Sunnah is Muhammad's practice, preserved *in* the Hadith, not a collection of scholarly interpretations distinct from it."}, {"text": "The Sunnah refers solely to the historical compilation process of the Quran and Hadith after Muhammad's death.", "isCorrect": false, "rationale": "The Sunnah refers to Muhammad's example, not the compilation process of texts."}], "id": "q08"}, {"question": "The text states that 'Sharia' literally means 'the path to the watering hole.' What does this suggest about its nature?", "options": [{"text": "It implies a rigid, restrictive set of rules designed to control every aspect of a Muslim's life, limiting personal freedom.", "isCorrect": false, "rationale": "The text explicitly refutes this interpretation, stating it suggests 'not a prison of rules but a road to life.'"}, {"text": "It signifies a life-giving road or guide, leading believers toward a flourishing and righteous existence.", "isCorrect": true, "rationale": "The text explains the meaning as 'suggesting not a prison of rules but a road to life,' indicating its positive, guiding nature."}, {"text": "It refers to the physical journey Muslims undertake to pilgrimage sites, such as wells or oases, to purify themselves.", "isCorrect": false, "rationale": "The meaning is metaphorical, referring to guidance for life, not a literal physical journey to a watering hole."}, {"text": "It denotes a historical account of how early Muslim communities sourced water in arid regions, emphasizing resourcefulness.", "isCorrect": false, "rationale": "The term Sharia refers to Islamic law and guidance, not a historical account of water sourcing."}], "id": "q09"}, {"question": "Based on the provided text, which statement best synthesizes the comprehensive nature of Islamic guidance for believers?", "options": [{"text": "Islamic guidance primarily relies on the Quran as the sole source of law and ethics, with other texts serving minor historical roles.", "isCorrect": false, "rationale": "The text highlights the importance of the Hadith and Sunnah alongside the Quran, indicating the Quran is not the sole source."}, {"text": "The Quran offers foundational theological principles and broad guidance, while the Hadith and Sunnah provide practical examples from Muhammad's life, together forming the complete basis for Islamic law (Sharia).", "isCorrect": true, "rationale": "This statement accurately combines the roles of the Quran (direct word of God, theology, ethics), Hadith (reports of Muhammad's example), Sunnah (Muhammad's practice based on Hadith), and Sharia (Islamic law founded on both Quran and Sunnah), reflecting the text's comprehensive description."}, {"text": "Guidance is found mainly in the legal codes established by early caliphs, which are considered to supersede the revelations given to Muhammad.", "isCorrect": false, "rationale": "The early caliphs compiled and standardized existing revelations and practices, but their decrees did not supersede the Quran or Muhammad's Sunnah as primary sources."}, {"text": "Muslims are primarily encouraged to derive their own individual interpretations from the Quran and Hadith, as there is no standardized legal framework like Sharia.", "isCorrect": false, "rationale": "The text clearly states that 'the Quran and the Sunnah form the foundation for Islamic law, called Sharia,' indicating a standardized framework."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
