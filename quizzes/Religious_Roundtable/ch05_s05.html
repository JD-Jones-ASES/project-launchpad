        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary reason the text asserts Buddhism's influence reaches 'far beyond' its number of adherents?", "options": [{"text": "Its historical impact on ancient civilizations.", "isCorrect": false, "rationale": "While Buddhism has historical impact, the text emphasizes its modern, contemporary influence beyond traditional religious numbers."}, {"text": "Its role in shaping global political structures.", "isCorrect": false, "rationale": "The text does not mention Buddhism's direct role in shaping global political structures, focusing instead on its influence in psychology, ethics, and philosophy."}, {"text": "Its adaptation and application of Buddhist ideas, particularly mindfulness, in secular modern institutions.", "isCorrect": true, "rationale": "The text explicitly states that Buddhist ideas, especially mindfulness meditation, have moved into hospitals, schools, corporate offices, and psychological clinics, illustrating its influence beyond traditional adherents."}, {"text": "Its unique architectural and artistic contributions worldwide.", "isCorrect": false, "rationale": "The text does not discuss Buddhist architectural or artistic contributions; its focus is on intellectual and ethical influence."}]}, {"question": "Which specific modern therapeutic approach is highlighted as drawing directly on Buddhist meditation practices to treat depression and anxiety?", "options": [{"text": "Cognitive Behavioral Therapy (CBT).", "isCorrect": false, "rationale": "CBT is a widely used therapy, but the text specifically mentions a related therapy that draws directly on Buddhist practices."}, {"text": "Mindfulness-Based Stress Reduction (MBSR).", "isCorrect": false, "rationale": "While MBSR is a mindfulness-based approach, the text specifically names Mindfulness-Based Cognitive Therapy (MBCT)."}, {"text": "Dialectical Behavior Therapy (DBT).", "isCorrect": false, "rationale": "DBT is a form of psychotherapy, but it is not mentioned in the text as drawing directly on Buddhist meditation practices."}, {"text": "Mindfulness-Based Cognitive Therapy (MBCT).", "isCorrect": true, "rationale": "The text explicitly states that 'Mindfulness-Based Cognitive Therapy (MBCT), developed in the 1990s and now widely used to treat depression and anxiety, draws directly on Buddhist meditation practices.'"}]}, {"question": "The text describes the relationship between Buddhist thought and Western philosophers of mind, neuroscience, and phenomenology as 'intellectually fertile.' What does this phrase imply?", "options": [{"text": "That Buddhist thought has definitively proven Western theories incorrect.", "isCorrect": false, "rationale": "The text describes Buddhist thought as a 'serious dialogue partner,' suggesting collaboration and discussion rather than outright refutation."}, {"text": "That these fields have found common ground and productive areas for discussion and mutual learning.", "isCorrect": true, "rationale": "'Intellectually fertile conversation' and 'serious dialogue partner' imply a rich, productive exchange of ideas and mutual influence between these domains."}, {"text": "That Buddhist ideas are now universally accepted as scientific truths.", "isCorrect": false, "rationale": "While highly influential, the text speaks of 'conversations' and 'dialogue,' which denotes ongoing intellectual engagement rather than universal scientific acceptance."}, {"text": "That Western thinkers are primarily interested in converting to Buddhism.", "isCorrect": false, "rationale": "The text focuses on intellectual engagement and shared areas of inquiry, not on religious conversion."}]}, {"question": "A non-governmental organization is designing a program to address both inter-community conflict resolution and sustainable environmental practices. Which aspect of Buddhist thought, as described in the text, would offer the most direct conceptual foundation for their work?", "options": [{"text": "The analysis of consciousness and perception.", "isCorrect": false, "rationale": "While important, the analysis of consciousness and perception is presented as relevant to psychology and philosophy of mind, not directly to inter-community conflict or environmental practices."}, {"text": "The principle of ahimsa and the concept of interdependent Buddhist ecology.", "isCorrect": true, "rationale": "Ahimsa (non-harm) directly applies to conflict resolution and peace, while Buddhist ecology, 'grounded in the insight that all things are interdependent,' directly addresses humanity's relationship with the natural world and sustainable practices."}, {"text": "The rigorous account of mind without a creator God.", "isCorrect": false, "rationale": "This describes Buddhism's philosophical uniqueness but is not directly applicable to the practical aspects of conflict resolution or environmental protection."}, {"text": "Mindfulness meditation for individual stress reduction.", "isCorrect": false, "rationale": "Mindfulness is mentioned for individual psychological benefits, but the question asks for a conceptual foundation for broader social and environmental programs."}]}, {"question": "According to the text, what makes Buddhism philosophically 'rare' compared to many other traditions?", "options": [{"text": "Its emphasis on personal spiritual enlightenment.", "isCorrect": false, "rationale": "While a core aspect, the text highlights a more specific philosophical rarity regarding its foundational assumptions."}, {"text": "Its rigorous account of mind and suffering without appealing to a creator God or demanding supernatural faith.", "isCorrect": true, "rationale": "The text explicitly states that Buddhism offers 'a rigorous account of mind and suffering that makes no appeal to a creator God, no demand for supernatural faith, and no exclusion of those who cannot accept certain metaphysical claims.'"}, {"text": "Its historical longevity and global spread.", "isCorrect": false, "rationale": "This describes its influence and number of adherents, not its unique philosophical stance."}, {"text": "Its detailed scriptures and monastic traditions.", "isCorrect": false, "rationale": "Many religions have detailed scriptures and monastic traditions; this is not the specific philosophical rarity mentioned."}]}, {"question": "The text notes the movement of 'Buddhist ideas—particularly mindfulness meditation—into hospitals, schools, corporate offices, and psychological clinics.' This phenomenon primarily suggests:", "options": [{"text": "A widespread global conversion to the Buddhist religion.", "isCorrect": false, "rationale": "The text states influence 'reaches far beyond that count' (adherents), indicating adaptation and application rather than mass conversion."}, {"text": "The increasing secular applicability and practical utility of certain Buddhist practices.", "isCorrect": true, "rationale": "The integration of Buddhist ideas into diverse secular institutions for practical benefits like stress reduction and mental health signifies their secular applicability and utility."}, {"text": "A decline in traditional religious practice among Buddhists.", "isCorrect": false, "rationale": "The text does not discuss a decline in traditional practice, but rather an expansion of influence."}, {"text": "The commercialization of spiritual practices.", "isCorrect": false, "rationale": "While commercial aspects might exist, the text emphasizes the intellectual and therapeutic value and utility, not primarily commercialization."}]}, {"question": "What is the principle of 'ahimsa' and with which other traditions does the text state it is shared?", "options": [{"text": "A monastic vow of poverty, shared with early Christian ascetics.", "isCorrect": false, "rationale": "This is an incorrect definition of ahimsa and misidentifies the shared traditions mentioned in the text."}, {"text": "A concept of universal love, shared with Sikhism and Sufism.", "isCorrect": false, "rationale": "This is an incorrect definition of ahimsa and misidentifies the shared traditions mentioned in the text."}, {"text": "Non-harm or non-violence, shared with Hinduism and Jainism.", "isCorrect": true, "rationale": "The text explicitly defines ahimsa as 'non-harm or non-violence' and states it is 'shared with Hinduism and Jainism.'"}, {"text": "The pursuit of ultimate truth, shared with Daoism and Confucianism.", "isCorrect": false, "rationale": "This is an incorrect definition of ahimsa and misidentifies the shared traditions mentioned in the text."}]}, {"question": "The final paragraph describes Buddhism's 'method' as one of humanity's great intellectual achievements. Which of the following best characterizes this method?", "options": [{"text": "Exclusive reliance on ancient scriptures and prophetic revelations.", "isCorrect": false, "rationale": "The method is described as 'careful observation of experience,' not solely reliance on scriptures or revelations."}, {"text": "A focus on abstract metaphysical speculation without practical testing.", "isCorrect": false, "rationale": "The text emphasizes 'practical application' as part of the method, contrasting with purely abstract speculation."}, {"text": "Careful observation of experience, systematic analysis, and practical application.", "isCorrect": true, "rationale": "The text directly states: 'the method—careful observation of experience, systematic analysis, practical application—is one of the great intellectual achievements of human civilization.'"}, {"text": "Emphasizing faith-based acceptance over critical inquiry.", "isCorrect": false, "rationale": "The description highlights 'rigorous account' and 'systematic analysis,' which are antithetical to uncritical faith-based acceptance."}]}, {"question": "A university psychology department is considering integrating a new module into its curriculum to address mental well-being, focusing on how individuals perceive reality and construct their sense of self. Based on the text, which aspect of Buddhist thought would be most pertinent to this module?", "options": [{"text": "The historical development of monastic orders.", "isCorrect": false, "rationale": "While a part of Buddhist studies, the historical development of monastic orders is not directly relevant to the psychological analysis of perception and self-construction."}, {"text": "Its analysis of consciousness, perception, and the constructed nature of the self.", "isCorrect": true, "rationale": "The text specifically states that Western philosophers of mind and neuroscience have found a 'serious dialogue partner' in Buddhist thought, 'particularly its analysis of consciousness, perception, and the constructed nature of the self.'"}, {"text": "The ethical principles of social justice.", "isCorrect": false, "rationale": "Buddhist ethical principles are crucial for social justice, but the question specifically asks about a module focusing on individual perception and self-construction, which falls under the psychological/philosophical domain."}, {"text": "The concept of reincarnation and karma.", "isCorrect": false, "rationale": "The text does not mention reincarnation or karma in the context of Buddhism's engagement with modern psychology or philosophy of mind."}]}, {"question": "Considering the entire 'Why It Matters' section, which statement best encapsulates the text's overarching argument about Buddhism's significance in the late twentieth and early twenty-first centuries?", "options": [{"text": "Buddhism is significant primarily due to its large number of global adherents, making it a major world religion.", "isCorrect": false, "rationale": "The text explicitly states that Buddhism's influence 'reaches far beyond that count,' indicating its significance is not limited to its demographic size."}, {"text": "Buddhism offers a unique and impactful intellectual framework that transcends traditional religious boundaries, influencing modern psychology, ethics, and philosophy through its adaptable practices and rigorous methods.", "isCorrect": true, "rationale": "This statement synthesizes all the key points made in the section: its influence in psychology (mindfulness, MBCT), ethics (ahimsa, Engaged Buddhism), philosophy (analysis of self, no creator God), and its method (observation, analysis, application), demonstrating its broad and adaptable significance."}, {"text": "Buddhism's main contribution is providing a historical model for non-violent social movements, especially in Asia.", "isCorrect": false, "rationale": "While ahimsa and Engaged Buddhism are mentioned, this statement is too narrow and does not capture the full breadth of Buddhism's influence in psychology, philosophy, and its global applicability as described."}, {"text": "The primary importance of Buddhism lies in its philosophical challenge to the concept of a creator God in Western thought.", "isCorrect": false, "rationale": "This is one aspect of Buddhism's philosophical uniqueness, but the text presents a much broader array of reasons why Buddhism matters, including its psychological and ethical impacts."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
