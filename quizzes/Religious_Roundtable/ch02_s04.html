    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 2, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Which statement best encapsulates the primary theme described in 'A Living, Arguing Tradition: Branches of Judaism'?", "options": [{"text": "All branches of Judaism adhere to identical interpretations of Jewish law, fostering a uniform global practice.", "isCorrect": false, "rationale": "The text explicitly states that Judaism is 'not a single, uniform practice' and that branches differ 'in how strictly Jewish law should be interpreted and applied'."}, {"text": "Judaism is a family of diverse traditions, united by core elements but differing significantly in how Jewish law is interpreted and applied in the modern world.", "isCorrect": true, "rationale": "This statement accurately reflects the introductory paragraph, which describes Judaism as 'a family of related traditions, united by shared texts, shared history, and shared covenantal identity, but differing in how strictly Jewish law should be interpreted and applied'."}, {"text": "Modernity has completely superseded traditional Jewish law, rendering strict observance irrelevant for all contemporary Jewish movements.", "isCorrect": false, "rationale": "While some movements allow flexibility, Orthodox Judaism maintains that 'modernity does not override tradition,' and Conservative Judaism affirms the 'binding nature of Jewish law,' contradicting this statement."}, {"text": "The arguments among Jewish branches are a recent phenomenon, indicating a fundamental breakdown in shared Jewish identity.", "isCorrect": false, "rationale": "The text notes that 'the tradition has always thrived on argument' and that 'the argument itself is a form of belonging,' indicating these differences are not a breakdown but an inherent part of Jewish identity."}], "id": "q01"}, {"question": "According to the text, which practice is characteristic of Orthodox Judaism?", "options": [{"text": "Conducting services primarily in the local language with men and women seated together.", "isCorrect": false, "rationale": "This practice is characteristic of Reform Judaism, not Orthodox, which 'pray in Hebrew' and 'maintain gender-separated worship'."}, {"text": "Affirming that Jewish law was a human response to divine revelation, with each generation discerning its moral weight.", "isCorrect": false, "rationale": "This view belongs to Reform Judaism, whereas Orthodox Judaism holds that the Torah 'was revealed by God to Moses exactly as it has been received' and its commandments are 'binding on all Jews in every age'."}, {"text": "Refraining from work, electricity, and commerce on Shabbat, and strictly following kashrut.", "isCorrect": true, "rationale": "The text explicitly states that Orthodox Jews 'observe Shabbat... by refraining from work, electricity, and commerce' and 'follow kashrut—the dietary laws'."}, {"text": "Viewing Judaism as an evolving civilization where God is reinterpreted in non-personal terms.", "isCorrect": false, "rationale": "This perspective is foundational to Reconstructionist Judaism, not Orthodox Judaism."}], "id": "q02"}, {"question": "A key distinction between Orthodox and Conservative Judaism regarding the Torah's authority lies in their respective beliefs about:", "options": [{"text": "The number of commandments binding on Jews, with Orthodox recognizing 613 and Conservative only the ethical ones.", "isCorrect": false, "rationale": "Both recognize the 613 commandments, but Conservative Judaism allows more flexibility in interpretation and application, not necessarily a reduction in the number of binding laws, and it doesn't diminish the Torah's authority, even while accepting its development over time."}, {"text": "Whether Jewish law applies to women, with Orthodox restricting women's roles and Conservative allowing full equality.", "isCorrect": false, "rationale": "While there are differences in gender roles, the text highlights gender-separated worship in Orthodox Judaism but doesn't state that Conservative Judaism allows 'full equality' in a way that is the 'key distinction' regarding Torah authority. The primary distinction noted is about the Torah's historical development and flexibility of interpretation."}, {"text": "The historical development of the Torah and the flexibility in applying its laws.", "isCorrect": true, "rationale": "The text states Orthodox Judaism believes the Torah 'was revealed... exactly as it has been received,' while Conservative Judaism 'accepts that the Torah developed over time and in historical context,' but both insist on its binding nature, with Conservative allowing 'more flexibility in its interpretation and application'."}, {"text": "The language of prayer, with Orthodox praying exclusively in Hebrew and Conservative using only local languages.", "isCorrect": false, "rationale": "Orthodox Jews 'pray in Hebrew,' but the text does not state Conservative Jews use *only* local languages, and this is not presented as the *key distinction* regarding the Torah's authority, but rather a practice."}], "id": "q03"}, {"question": "What does Reform Judaism emphasize as more fundamental than any dietary rule, according to the text?", "options": [{"text": "The strict adherence to all 613 commandments as divinely mandated for all generations.", "isCorrect": false, "rationale": "This is characteristic of Orthodox Judaism, not Reform, which holds that each generation must discern which laws 'still carry moral weight today'."}, {"text": "The reinterpretation of God as a non-personal force that enables human flourishing.", "isCorrect": false, "rationale": "This is a core tenet of Reconstructionist Judaism, not Reform Judaism."}, {"text": "The insistence that justice—what the prophets demanded—is more fundamental than any dietary rule.", "isCorrect": true, "rationale": "The text explicitly states Reform Judaism's 'watchword is prophetic Judaism: the insistence that justice—what the prophets demanded—is more fundamental than any dietary rule'."}, {"text": "Maintaining gender-separated worship and exclusive Hebrew prayer as traditions to be preserved.", "isCorrect": false, "rationale": "These are practices of Orthodox Judaism; Reform synagogues often 'seat men and women together' and conduct services 'in the local language alongside Hebrew'."}], "id": "q04"}, {"question": "How does Reconstructionist Judaism primarily reinterpret the concept of God?", "options": [{"text": "As the personal, supernatural creator who revealed the Torah precisely as received.", "isCorrect": false, "rationale": "This aligns with Orthodox (and generally traditional) views, but Reconstructionist Judaism 'reinterpreted in non-personal terms'."}, {"text": "As a force that enables human flourishing, rather than a personal, supernaturally revealed deity.", "isCorrect": true, "rationale": "The text states that in Reconstructionist Judaism, 'God is reinterpreted in non-personal terms (as the force that enables human flourishing)'."}, {"text": "As a concept whose interpretation evolves over time but whose divine authority remains unquestioned.", "isCorrect": false, "rationale": "While acknowledging evolution, Reconstructionist Judaism moves beyond 'divine authority' in the supernatural sense, defining Judaism as an 'evolving civilization' and practice as 'expression of a people's culture and identity rather than divine command'."}, {"text": "As an ethical ideal primarily concerned with social justice, as advocated by the ancient prophets.", "isCorrect": false, "rationale": "While social justice is important, this description of God's reinterpretation is more aligned with Reform Judaism's emphasis on 'prophetic Judaism'."}], "id": "q05"}, {"question": "A synagogue decides to ordain an openly LGBTQ+ individual as a rabbi and often conducts services primarily in English, though some Hebrew is included. This synagogue's practices most closely align with which branch of Judaism?", "options": [{"text": "Orthodox Judaism", "isCorrect": false, "rationale": "Orthodox Judaism maintains gender-separated worship and looks to authoritative rabbinic decisors, not typically ordaining LGBTQ+ individuals or conducting services primarily in English."}, {"text": "Conservative Judaism", "isCorrect": false, "rationale": "While more flexible than Orthodox, Conservative Judaism generally adheres to traditional interpretations of rabbinic law regarding ordination and gender roles, which would not typically include ordaining openly LGBTQ+ individuals."}, {"text": "Reform Judaism", "isCorrect": true, "rationale": "The text states Reform synagogues 'often conduct services in the local language alongside Hebrew, seat men and women together, and ordain women and LGBTQ+ individuals as rabbis,' directly matching the scenario."}, {"text": "Reconstructionist Judaism", "isCorrect": false, "rationale": "While Reconstructionist Judaism is also progressive, the specific examples given (ordination of LGBTQ+ rabbis, local language services) are explicitly mentioned as characteristics of Reform Judaism in the text."}], "id": "q06"}, {"question": "Despite their differences, all the discussed branches of Judaism share which of the following?", "options": [{"text": "A uniform interpretation of kashrut and Shabbat observance.", "isCorrect": false, "rationale": "The text explicitly states differences in how strictly Jewish law, including kashrut and Shabbat, is interpreted and applied."}, {"text": "The belief that only the Messiah can legitimately restore Israel.", "isCorrect": false, "rationale": "This was a view held by *some* Orthodox Jews regarding early Zionism, but not a belief shared by 'all these movements'."}, {"text": "The Torah, the Talmud, the Hebrew language of prayer, and the cycle of holy days.", "isCorrect": true, "rationale": "The text states, 'Despite their differences, all these movements share the Torah, the Talmud, the Hebrew language of prayer, the cycle of holy days (Passover, Yom Kippur, Rosh Hashanah), and the memory of a shared history'."}, {"text": "A consensus on the political policies of the modern State of Israel.", "isCorrect": false, "rationale": "The text mentions that 'Jews hold a wide range of views about its politics and policies,' indicating a lack of consensus."}], "id": "q07"}, {"question": "Based on the provided text, what is the most accurate characterization of Zionism within the context of Judaism?", "options": [{"text": "It is the newest and most progressive branch of Judaism, primarily concerned with social justice.", "isCorrect": false, "rationale": "The text clearly states, 'Zionism is not a branch of Judaism; it is a political movement,' and it's not described as 'newest' or 'most progressive' compared to the others."}, {"text": "It is a political movement that sought to establish a Jewish homeland, distinct from a religious branch, and has always had divided Jewish opinion.", "isCorrect": true, "rationale": "The text directly states, 'Zionism—the 19th-century political movement that sought to establish a Jewish homeland... Zionism is not a branch of Judaism; it is a political movement, and Jewish opinion about it has always been divided'."}, {"text": "It is an Orthodox Jewish movement that universally opposed the founding of the State of Israel.", "isCorrect": false, "rationale": "The text notes that 'Some Orthodox Jews opposed early Zionism,' but 'Others embraced it as a practical necessity,' indicating it was not a universal opposition even within Orthodox Judaism, and Zionism itself is not an Orthodox movement."}, {"text": "It is the foundational religious belief unifying all Jewish branches globally, regardless of political views.", "isCorrect": false, "rationale": "The text highlights that 'Jewish opinion about it has always been divided' and that Jews hold 'a wide range of views about its politics and policies,' meaning it does not universally unify all Jewish branches."}], "id": "q08"}, {"question": "If one were to order the described branches of Judaism from the strictest to the most flexible in their interpretation and application of Jewish law, which sequence would be most accurate?", "options": [{"text": "Reform, Conservative, Orthodox, Reconstructionist", "isCorrect": false, "rationale": "This order is incorrect. Reform and Reconstructionist are generally more flexible than Conservative and Orthodox."}, {"text": "Orthodox, Reform, Conservative, Reconstructionist", "isCorrect": false, "rationale": "This order incorrectly places Reform before Conservative, as Conservative occupies a 'middle position' and Reform emphasizes flexibility significantly more."}, {"text": "Orthodox, Conservative, Reform, Reconstructionist", "isCorrect": true, "rationale": "Orthodox holds the most binding view of law. Conservative allows 'more flexibility' than Orthodox but affirms binding nature. Reform holds law was human response and discerns moral weight. Reconstructionist views practice as cultural expression rather than divine command, implying the most interpretive flexibility."}, {"text": "Reconstructionist, Orthodox, Conservative, Reform", "isCorrect": false, "rationale": "This order is reversed in its flexibility, starting with the most flexible and ending with a more flexible one, not a strict-to-flexible continuum."}], "id": "q09"}, {"question": "The 'did you know' section explains that 'halakha' literally means 'the way of walking.' This interpretation suggests that Jewish law is primarily understood as:", "options": [{"text": "A rigid set of divine commands that strictly restricts individual freedom.", "isCorrect": false, "rationale": "The text explicitly states, 'Jewish law is understood not as a cage that restricts but as a path that orients,' contradicting the idea of a 'rigid set of divine commands that strictly restricts freedom'."}, {"text": "A structured path that guides one's life in a conscious relationship with God, rather than a restrictive set of rules.", "isCorrect": true, "rationale": "The text states, 'Jewish law is understood not as a cage that restricts but as a path that orients: a structured way of moving through time... in conscious relationship with God,' directly supporting this option."}, {"text": "An ancient legal code that has lost its relevance in the modern world due to its outdated nature.", "isCorrect": false, "rationale": "The text emphasizes that halakha 'orients' and provides 'a structured way of moving through time,' implying ongoing relevance, not outdatedness."}, {"text": "A philosophical concept unrelated to daily practice, focusing solely on abstract theological debates.", "isCorrect": false, "rationale": "The text describes halakha as 'a structured way of moving through time, through the seasons, through daily life,' indicating it is deeply connected to daily practice, not just abstract debate."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
