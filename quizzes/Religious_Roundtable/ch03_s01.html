    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which description best characterizes Muhammad's reputation in Mecca before his prophetic call?", "options": [{"text": "A wealthy and powerful tribal leader.", "isCorrect": false, "rationale": "The text states Muhammad came from a respected but not wealthy family and worked as a merchant. He was not described as a powerful tribal leader at that time, though his tribe, the Quraysh, was influential."}, {"text": "An honest and reliable merchant known as 'Al-Amin'.", "isCorrect": true, "rationale": "The text explicitly states Muhammad worked as a merchant and 'earning a reputation for honesty and reliability that won him the nickname 'Al-Amin'—the trustworthy.'' This directly answers the question."}, {"text": "A profound scholar of existing religious texts.", "isCorrect": false, "rationale": "While Muhammad was a man of 'deep religious seriousness,' the text does not mention him as a scholar of existing religious texts before his prophetic call, but rather a merchant."}, {"text": "A military strategist admired for his leadership in battles.", "isCorrect": false, "rationale": "Muhammad's military leadership emerged later in Medina. Before his revelations, his reputation was based on his character as a merchant."}], "id": "q01"}, {"question": "The beginning of divine revelation to Muhammad on Mount Hira involved which of the following key elements?", "options": [{"text": "A vision commanding him to establish a new city.", "isCorrect": false, "rationale": "The command was not to establish a city, but to recite. The establishment of Medina as a central city came later, during the Hijra."}, {"text": "A command from the angel Gabriel (Jibril) to recite divine speech.", "isCorrect": true, "rationale": "The text explicitly states that 'The angel Gabriel—called Jibril in Arabic—appeared to Muhammad and commanded him to recite. The Arabic word for reciting or reading aloud is iqra', from the same root as Quran.'"}, {"text": "A direct voice from God instructing him to rebuild the Ka'ba.", "isCorrect": false, "rationale": "The revelation was through the angel Gabriel, and the command was to recite, not to rebuild the Ka'ba. The Ka'ba was cleansed and rededicated much later."}, {"text": "A dream predicting the migration of his followers to Ethiopia.", "isCorrect": false, "rationale": "The flight to Ethiopia was a consequence of persecution, not a divine instruction given at the outset of the revelations."}], "id": "q02"}, {"question": "Why did the wealthy, polytheistic merchants of Mecca find Muhammad's initial preaching deeply threatening?", "options": [{"text": "He advocated for a complete boycott of trade with other tribes, which would harm their economy.", "isCorrect": false, "rationale": "While early Muslims faced boycotts, Muhammad's preaching itself wasn't primarily about trade boycotts. The threat was more fundamental to their power and beliefs."}, {"text": "His message challenged their social hierarchy, polytheistic religious beliefs, and economic practices.", "isCorrect": true, "rationale": "The text states Muhammad's message proclaimed 'that there was only one God,' 'that all human beings were equal before this God,' and 'that the rich had obligations to the poor.' These tenets directly undermined the Meccan elite's polytheistic religion, social stratification, and wealth accumulation practices."}, {"text": "He formed a powerful military alliance against them immediately upon beginning his public preaching.", "isCorrect": false, "rationale": "Muhammad began preaching publicly around 613 and faced persecution; military engagement and alliances developed later, primarily after the Hijra."}, {"text": "He proposed building a new sacred shrine outside Mecca, diverting pilgrims from the Ka'ba.", "isCorrect": false, "rationale": "Muhammad's aim was to purify the Ka'ba and rededicate it to the one God, not to build a new competing shrine."}], "id": "q03"}, {"question": "The 'first Muslim diaspora' to Christian Ethiopia in 615 CE primarily served as an example of:", "options": [{"text": "The early Muslim community's desire to spread Islam beyond the Arabian Peninsula.", "isCorrect": false, "rationale": "The text indicates they 'fled' due to persecution, implying it was an escape for safety rather than an intentional mission to proselytize Ethiopia."}, {"text": "The willingness of some non-Muslim rulers to offer protection to the persecuted for humanitarian reasons.", "isCorrect": true, "rationale": "The text states the Negus (king) of Christian Ethiopia 'granted them protection,' highlighting an instance of religious tolerance and asylum in a challenging period for early Muslims."}, {"text": "Muhammad's failure to protect his followers within Mecca, leading to a loss of faith.", "isCorrect": false, "rationale": "While Muhammad could not prevent persecution, the text describes this period as a 'formative test of faith,' implying resilience, not a loss of faith, and highlights the Negus's protection rather than Muhammad's failure."}, {"text": "A successful attempt to establish Islam as the dominant religion in a foreign land.", "isCorrect": false, "rationale": "The purpose was refuge, not conversion of Ethiopia. There is no indication in the text that Islam became dominant in Ethiopia as a result of this diaspora."}], "id": "q04"}, {"question": "The Hijra (migration) of Muhammad and his followers from Mecca to Medina in 622 CE is considered the founding moment of the Muslim community because it marked a transition from:", "options": [{"text": "A period of armed conflict with Mecca to an era of immediate peace and alliance.", "isCorrect": false, "rationale": "The text states that 'The relationship between Mecca and Medina was not peaceful. A series of battles followed,' indicating continued conflict, not immediate peace."}, {"text": "A community solely focused on spiritual practice to one led by a designated religious successor.", "isCorrect": false, "rationale": "Muhammad did not designate a successor before his death, which occurred in 632, ten years after the Hijra. The Hijra established the community's political structure under Muhammad, not a successor."}, {"text": "A persecuted religious group to a self-governing political and religious community.", "isCorrect": true, "rationale": "The text states that in Medina, Muhammad 'was not merely a preacher; he became a statesman and lawgiver. He established the first Muslim community, the ummah...and negotiated a remarkable agreement called the Constitution of Medina.' This indicates the transition to a self-governing entity."}, {"text": "A nomadic lifestyle to a settled agricultural society.", "isCorrect": false, "rationale": "The text does not suggest that the community was nomadic before the Hijra, nor does it focus on a transition to an agricultural society. The emphasis is on political and religious organization."}], "id": "q05"}, {"question": "Upon his arrival in Medina, Muhammad's role expanded significantly beyond that of a mere preacher, primarily by:", "options": [{"text": "Establishing a vast trading empire throughout the Arabian Peninsula.", "isCorrect": false, "rationale": "While Muhammad had been a merchant, his new role in Medina was primarily political and religious, not the establishment of a trading empire."}, {"text": "Becoming a statesman and lawgiver, organizing diverse communities under a common framework.", "isCorrect": true, "rationale": "The text explicitly states: 'In Medina, Muhammad was not merely a preacher; he became a statesman and lawgiver. He established the first Muslim community, the ummah...and negotiated a remarkable agreement called the Constitution of Medina that organized the city's various tribes—Muslim, Jewish, and pagan—under a common framework.'"}, {"text": "Leading a theological council to redefine Abrahamic traditions.", "isCorrect": false, "rationale": "While Islamic law and practice took shape, his primary role was as a statesman and lawgiver for the nascent community, not solely a theological reformer of existing traditions through a council."}, {"text": "Declaring himself the sole military commander of all Arabian tribes.", "isCorrect": false, "rationale": "Muhammad became a military leader for the Muslim community, but he did not immediately declare himself the sole commander of all Arabian tribes upon arriving in Medina. His leadership was established within the ummah and through treaties."}], "id": "q06"}, {"question": "The concept of the 'ummah,' as established by Muhammad in Medina, fundamentally signifies:", "options": [{"text": "A military alliance exclusively among the Quraysh tribe.", "isCorrect": false, "rationale": "The ummah transcended tribal affiliations, including the Quraysh, uniting diverse believers. It was not exclusively military, though it did have defense aspects."}, {"text": "A political system based on hereditary leadership and succession.", "isCorrect": false, "rationale": "The text notes that Muhammad left no designated successor, indicating the ummah was not initially based on hereditary leadership, though the issue of succession became critical later."}, {"text": "A community of all Muslim believers, understood as a single spiritual family transcending tribe, race, and nationality.", "isCorrect": true, "rationale": "The text defines ummah as 'the community of all Muslim believers, understood as a single spiritual family transcending tribe, race, and nationality.' This is a direct quote defining the concept."}, {"text": "A strict economic boycott against non-Muslims in the region.", "isCorrect": false, "rationale": "The Constitution of Medina included Jewish and pagan tribes, indicating a framework for coexistence, not a universal boycott against non-Muslims. Boycotts were tactics used by Meccans against early Muslims."}], "id": "q07"}, {"question": "Muhammad's cleansing of the Ka'ba in 630 CE was a pivotal moment primarily because it:", "options": [{"text": "Marked the final battle between Mecca and Medina, leading to the destruction of the city.", "isCorrect": false, "rationale": "The text states the city 'surrendered with almost no bloodshed,' indicating peace, not destruction. It was a victory, but not 'the final battle' in the sense of prolonged fighting."}, {"text": "Symbolically redefined the site from a polytheistic shrine to a monotheistic center of worship for the one God.", "isCorrect": true, "rationale": "The text states Muhammad 'cleansed it of its idols and rededicated it to the one God,' emphasizing the transformation from polytheistic worship to pure monotheistic worship, restoring its Abrahamic origins."}, {"text": "Led to the immediate and forced conversion of all Meccans to Islam without exception.", "isCorrect": false, "rationale": "While many Meccans converted, the text highlights the symbolic act of cleansing and rededication, not a forced mass conversion. The surrender was with 'almost no bloodshed,' implying a peaceful transition, not coercion."}, {"text": "Established a new architectural design for all future mosques worldwide.", "isCorrect": false, "rationale": "The cleansing was about religious meaning and practice, not architectural innovation for mosque design."}], "id": "q08"}, {"question": "Which statement best characterizes the spread of Islam within a century of Muhammad's death?", "options": [{"text": "It remained largely confined to the Arabian Peninsula due to internal conflicts.", "isCorrect": false, "rationale": "The text states, 'Within a century of his death, Islam had spread to Persia, Egypt, North Africa, Spain, and Central Asia,' which clearly refutes confinement to the Arabian Peninsula."}, {"text": "It was a gradual process, primarily through trade routes without significant political expansion.", "isCorrect": false, "rationale": "The text describes it as 'one of the most rapid expansions of a religious and political movement in recorded history,' indicating significant political expansion alongside any trade-based spread."}, {"text": "It was one of the most rapid expansions of a religious and political movement in recorded history.", "isCorrect": true, "rationale": "The text explicitly states: 'Within a century of his death, Islam had spread to Persia, Egypt, North Africa, Spain, and Central Asia—one of the most rapid expansions of a religious and political movement in recorded history.'"}, {"text": "It led to the immediate establishment of a unified, singular caliphate across all conquered lands.", "isCorrect": false, "rationale": "While caliphates emerged, the text highlights the rapid spread but doesn't detail the political structure's immediate and universal unification across all conquered lands as the primary characteristic of the spread itself."}], "id": "q09"}, {"question": "Based on its Arabic root 's-l-m,' the name 'Islam' fundamentally conveys a meaning related to:", "options": [{"text": "Conquest and dominion over new territories.", "isCorrect": false, "rationale": "While Islam did expand politically, the etymological root focuses on submission and peace, not conquest."}, {"text": "Warfare and defense against aggressors.", "isCorrect": false, "rationale": "The root does not primarily mean warfare, even though defense was necessary at times. The core meaning is peace and submission."}, {"text": "Peace, safety, and submission to God.", "isCorrect": true, "rationale": "The 'didyouknow' section states: 'The name Islam” comes from the Arabic root s-l-m, meaning peace, safety, and wholeness. A Muslim is one who makes islam—surrender or submission—to God.'"}, {"text": "Economic prosperity and mercantile success.", "isCorrect": false, "rationale": "The etymological root 's-l-m' is associated with peace and submission, not directly with economic prosperity."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
