    <title>Religious Roundtable &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 14, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is 'De' in Taoist philosophy, as described in the text?", "options": [{"text": "A moral code to be diligently followed through societal rules.", "isCorrect": false, "rationale": "De is described as flowing naturally and effortlessly, not as a code to be diligently followed or a set of rules imposed by society."}, {"text": "The outcome of rigorous self-improvement and ascetic practices.", "isCorrect": false, "rationale": "The text states 'de is not a moral achievement,' and emphasizes stopping 'forcing,' which contradicts the idea of rigorous self-improvement or asceticism."}, {"text": "The natural, effortless virtue that arises from living in harmony with the Tao.", "isCorrect": true, "rationale": "The definition provided is 'the natural, effortless virtue that flows from a life aligned with the Tao. It is not a moral achievement; it is what naturally emerges when you stop forcing.'"}, {"text": "A social reputation for goodness cultivated through public acts of kindness.", "isCorrect": false, "rationale": "Taoist ethics critique 'performance' and ostentatious displays of virtue, emphasizing that the truly good person 'acts and leaves no trace,' which contradicts seeking a social reputation."}], "id": "q01"}, {"question": "According to Taoist ethics, the fact that people 'are talking about ethics at all is already a problem' primarily implies what?", "options": [{"text": "Ethical discussions are inherently divisive and lead to conflict among individuals.", "isCorrect": false, "rationale": "While discussions can be divisive, the text's emphasis is not on the social outcome of debate, but on the underlying cause for the need of ethics in the first place."}, {"text": "True virtue is spontaneous and needs no articulation or formal instruction, as its need signifies a departure from natural alignment.", "isCorrect": true, "rationale": "The text explicitly states: 'When the great Tao is forgotten, 'kindness and morality appear.' ... It is a diagnosis. When people live in alignment with the Tao... virtue (de) flows without effort. ... But when that natural alignment is lost, people begin reaching for rules... The rules are a symptom of the disease they claim to cure.'"}, {"text": "Moral philosophy is an advanced stage of human intellectual development necessary for complex societies.", "isCorrect": false, "rationale": "The text presents the need for moral philosophy as a 'symptom of the disease,' not an advanced stage of development. It suggests a regression from a natural state."}, {"text": "Only sages are capable of understanding true ethical principles, rendering general discussion futile.", "isCorrect": false, "rationale": "The point is not about who can understand, but about the very emergence of the need for ethical discourse as a sign that something is amiss from the natural order."}], "id": "q02"}, {"question": "How does the analogy of water in the Tao Te Ching (Chapter 8) best illustrate the Taoist understanding of moral excellence?", "options": [{"text": "Water's power to erode stone demonstrates the dominance and strength required for true virtue.", "isCorrect": false, "rationale": "The text states water 'does not fight rock; it flows around,' emphasizing flexibility and non-aggression, rather than dominance."}, {"text": "Its ability to cleanse and purify signifies the importance of moral righteousness and a pure heart.", "isCorrect": false, "rationale": "While water cleanses, the text focuses on water's humility, non-competition, and natural path-finding as reflections of the Tao, not primarily its purifying aspect in a moral sense."}, {"text": "Water's humble flow to low places and its non-competitive nature reflect effortless alignment with the Tao.", "isCorrect": true, "rationale": "The text explicitly states, 'Water... flows to low places that people reject, 'and so is like the Tao.' Water does not force its way; it finds the lowest path and takes it. It does not fight rock; it flows around. It does not demand recognition; it simply gives life.' This exemplifies effortless alignment."}, {"text": "The vastness of the ocean represents the expansive knowledge a truly moral person must possess.", "isCorrect": false, "rationale": "The analogy focuses on water's actions and characteristics (humility, flexibility, persistence) rather than its volume or a connection to extensive knowledge."}], "id": "q03"}, {"question": "Laozi's critique, stating that 'the person of highest virtue' does not try to be virtuous, while 'the person of lowest virtue' tries very hard, highlights which core Taoist principle?", "options": [{"text": "The importance of humility over pride in all spiritual and moral development.", "isCorrect": false, "rationale": "While humility is a related concept, the primary focus of this specific critique is on the efficacy and nature of moral *striving* itself, not just pride."}, {"text": "Moral striving is self-defeating and obscures true, natural virtue ('de').", "isCorrect": true, "rationale": "The text states: 'For Laozi, moral striving is self-defeating -- like trying to fall asleep by trying very hard to fall asleep.' This directly explains the paradox presented in the critique."}, {"text": "Virtue is an innate quality that cannot be acquired or lost through any human effort.", "isCorrect": false, "rationale": "The text implies that virtue *emerges* naturally when one stops forcing, suggesting it's not a fixed innate quality that effort can't affect, but rather that effort prevents its natural manifestation."}, {"text": "Society's definitions of virtue are inherently flawed and should be universally rejected.", "isCorrect": false, "rationale": "The critique is focused on the *act of striving* for virtue, not a blanket rejection of all societal definitions, though it does imply they are often misdirected."}], "id": "q04"}, {"question": "A ruler practicing *wu wei* would govern in a way that primarily emphasizes:", "options": [{"text": "Strict enforcement of laws and swift punishment to maintain absolute order and control.", "isCorrect": false, "rationale": "This approach involves forcing and dominating, which directly contradicts the principle of 'wu wei' ('non-action,' 'effortless action,' 'not forcing')."}, {"text": "Inspiring people to believe they achieved good outcomes themselves, through minimal interference and aligning with natural order.", "isCorrect": true, "rationale": "The text states, 'A good ruler exhibits wu wei: the people are governed so lightly that at the end they say, 'We did it ourselves.'' This perfectly aligns with the concept of effortless action and not imposing one's agenda."}, {"text": "Aggressive competition with other states to ensure national prosperity and security.", "isCorrect": false, "rationale": "The text highlights that the sage 'does not compete,' and applies this principle to governance as well, where competition is antithetical to wu wei."}, {"text": "Public displays of compassion and moral righteousness to set an example for the populace.", "isCorrect": false, "rationale": "Taoist ethics have 'a built-in critique of performance,' stating that ostentatious displays of virtue are 'out of wu wei and into ego.'"}], "id": "q05"}, {"question": "The Taoist metaphor of 'pu' (the uncarved block) serves as a critique against which aspect of human existence?", "options": [{"text": "The physical limitations and vulnerabilities of the human body.", "isCorrect": false, "rationale": "The text defines 'pu' in terms of a person's nature before social conditioning, not physical limitations."}, {"text": "The innate desire for material possessions and worldly pleasures.", "isCorrect": false, "rationale": "While Taoism often critiques materialism, 'pu' specifically refers to the distortion of one's original nature, not primarily the desire for possessions."}, {"text": "The distortions of original nature caused by social conditioning and artificial virtues.", "isCorrect": true, "rationale": "The text defines 'pu' as 'the original, undistorted nature of a person before social conditioning and artificial virtues have shaped them.'"}, {"text": "The pursuit of intellectual knowledge and scholarly achievements for their own sake.", "isCorrect": false, "rationale": "While the text questions extensive learning ('the extensively learned do not know it'), 'pu' specifically addresses the shaping of one's fundamental character by external influences rather than intellectual pursuit generally."}], "id": "q06"}, {"question": "The statement 'The sage does not compete, and therefore no one can compete with him' (Chapter 81) illustrates a Taoist paradox implying that true power and effectiveness come from:", "options": [{"text": "Achieving ultimate dominance through strategic non-engagement in conflicts.", "isCorrect": false, "rationale": "The paradox is not about dominance, but about rendering competition irrelevant by transcending the need to engage in it, reflecting 'softness overcomes hardness.'"}, {"text": "Avoiding conflict at all costs, even if it means sacrificing one's principles or goals.", "isCorrect": false, "rationale": "It's not about avoiding conflict out of fear or sacrifice, but about operating in such a way that conflict doesn't arise or is rendered ineffectual against one's natural flow."}, {"text": "Embracing a state of natural alignment and non-striving, which renders opposition irrelevant and allows natural outcomes to manifest.", "isCorrect": true, "rationale": "The text explains this paradox by stating, 'Softness overcomes hardness. Emptiness is useful. The good life is not the result of maximizing effort; it is the result of removing the obstacles to naturalness.' Non-competition here means operating in harmony such that external opposition cannot find a point of resistance."}, {"text": "Secretly cultivating superior skills and knowledge to outmaneuver rivals unseen.", "isCorrect": false, "rationale": "This implies striving and competition, which are contrary to the Taoist principles of wu wei and natural virtue."}], "id": "q07"}, {"question": "Which of the following actions best embodies the concept of 'ziran'?", "options": [{"text": "A student diligently studying for hours, meticulously planning their study schedule to master a new subject.", "isCorrect": false, "rationale": "Diligence and meticulous planning suggest striving and conscious effort, which are contrary to 'ziran' (spontaneity and being unforced)."}, {"text": "An artist carefully planning every stroke and color choice of their painting before beginning.", "isCorrect": false, "rationale": "Careful planning indicates a calculated, forced approach, rather than the spontaneous and unforced nature of 'ziran.'"}, {"text": "A child spontaneously laughing and running through a field, fully absorbed in the moment without concern for appearance or rules.", "isCorrect": true, "rationale": "The definition of 'ziran' is 'naturalness, 'or self-so-ness.' The quality of being spontaneous and unforced, following one's own nature without strain or performance.' This scenario perfectly illustrates that."}, {"text": "A politician carefully crafting a speech to appeal to a wide range of voters and achieve a specific policy goal.", "isCorrect": false, "rationale": "Crafting a speech for an agenda is a performance-oriented action, which goes against the 'unforced' and 'without strain or performance' aspects of 'ziran.'"}], "id": "q08"}, {"question": "How do Taoist ethics fundamentally contrast with moral systems that 'emphasize effort and discipline' to achieve virtue?", "options": [{"text": "Taoism views effort as a necessary initial step before natural virtue can truly emerge.", "isCorrect": false, "rationale": "The text directly states that moral striving is 'self-defeating' and that 'the rules are a symptom of the disease they claim to cure,' implying effort is a misdirection, not a necessary step."}, {"text": "Taoism suggests that true virtue is achieved by consciously breaking social rules and conventions.", "isCorrect": false, "rationale": "Taoism emphasizes living in alignment with the Tao, which is distinct from actively breaking rules. It's about transcending the *need* for rules, not simply defying them."}, {"text": "Taoism argues that moral striving is self-defeating and that virtue flows naturally when obstacles to the Tao are removed, rather than through arduous discipline.", "isCorrect": true, "rationale": "The text explicitly states: 'For Laozi, moral striving is self-defeating... The good life is not the result of maximizing effort; it is the result of removing the obstacles to naturalness.' This directly contrasts with systems emphasizing effort and discipline."}, {"text": "Taoism promotes strict self-denial and ascetic practices as the only path to enlightenment and virtue.", "isCorrect": false, "rationale": "The text emphasizes naturalness and effortless flow, which are contrary to 'strict self-denial and ascetic practices.'"}], "id": "q09"}, {"question": "Based on the section content, which statement best summarizes the Taoist understanding of how to achieve 'the good life'?", "options": [{"text": "The good life is attained through persistent effort to adhere to a strict moral code and cultivate specific virtues.", "isCorrect": false, "rationale": "This contradicts the core Taoist critique of moral striving, effort, and the idea that rules are symptoms of a problem."}, {"text": "It is the result of cultivating extensive intellectual wisdom and philosophical understanding of the universe.", "isCorrect": false, "rationale": "While understanding is part of the Tao, the text emphasizes naturalness, effortless virtue, and even critiques 'extensively learned' individuals not knowing the Tao."}, {"text": "The good life is an effortless, natural state of being that arises from alignment with the Tao, free from striving and artificial impositions.", "isCorrect": true, "rationale": "This statement synthesizes key concepts: 'virtue (de) flows without effort,' 'wu wei' (effortless action), 'ziran' (naturalness), and returning to 'pu' (uncarved nature), all stemming from alignment with the Tao and free from the striving criticized throughout the text."}, {"text": "Achieving the good life requires demonstrating one's virtue publicly to inspire others and build a righteous reputation.", "isCorrect": false, "rationale": "The text has a 'built-in critique of performance,' stating that ostentatious displays of virtue are 'out of wu wei and into ego' and that the truly good person 'acts and leaves no trace.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
