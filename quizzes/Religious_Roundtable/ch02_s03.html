<script>
var QUESTIONS = [{"question": "Which of the following best describes the relationship between the Tanakh and the Christian Old Testament, according to the text?", "options": [{"text": "They are identical in content and terminology, with Jews and Christians using the terms interchangeably.", "isCorrect": false, "rationale": "The text states they are 'roughly equivalent' but emphasizes that 'Jews do not use that term [Old Testament]—for them, it is simply the Bible, complete and authoritative in itself.' This highlights a difference in terminology and perceived completeness, not identical usage."}, {"text": "The Tanakh is a smaller subset of the Christian Old Testament, omitting several books considered sacred by Christians.", "isCorrect": false, "rationale": "The text implies a strong equivalence, not that the Tanakh is a smaller subset. The difference lies in terminology and perspective, rather than a significant reduction in content."}, {"text": "They are roughly equivalent in content, but Jews consider the Tanakh complete and authoritative in itself, without using the term 'Old Testament'.", "isCorrect": true, "rationale": "The text explicitly states the Tanakh is 'roughly equivalent to what Christians call the Old Testament, though Jews do not use that term—for them, it is simply the Bible, complete and authoritative in itself.' This accurately captures the nuances presented."}, {"text": "The Tanakh is an entirely different collection of sacred texts, unrelated to what Christians call the Old Testament.", "isCorrect": false, "rationale": "The text explicitly states they are 'roughly equivalent,' disproving the idea that they are entirely different and unrelated."}]}, {"question": "According to the text, what distinguishes the Torah (the five books of Moses) from the Nevi'im and Ketuvim within the Tanakh?", "options": [{"text": "The Torah contains only ethical guidelines, while Nevi'im and Ketuvim focus solely on historical events and poetry, respectively.", "isCorrect": false, "rationale": "While the Torah provides laws, it also contains significant narrative (e.g., Genesis, Exodus). Nevi'im includes historical books, and Ketuvim includes narrative, demonstrating that the distinction is not solely based on genre."}, {"text": "The Torah is believed to have been revealed directly by God to Moses at Sinai and forms the 'innermost core' of the Jewish sacred library.", "isCorrect": true, "rationale": "The text explicitly states: 'The Torah (the five books of Moses...) forms the innermost core, believed to have been revealed directly by God to Moses at Sinai.' This highlights its unique origin and foundational importance."}, {"text": "The Torah was compiled much later than Nevi'im and Ketuvim, signifying its role as a commentary on the earlier texts.", "isCorrect": false, "rationale": "The text implies the Torah is foundational and of prime importance due to its direct divine revelation, not a later commentary. Its position as the 'innermost core' suggests antiquity and primacy."}, {"text": "Only the Torah is read publicly in synagogues, while Nevi'im and Ketuvim are reserved for private study.", "isCorrect": false, "rationale": "The text does not discuss public reading distinctions between these parts of the Tanakh, and all parts are revered and studied within Jewish tradition."}]}, {"question": "Why was the Oral Torah eventually committed to writing, leading to the creation of the Mishnah?", "options": [{"text": "To replace the Written Torah, which was deemed too complex for the general populace.", "isCorrect": false, "rationale": "The Oral Torah was intended to interpret and explain the Written Torah, not to replace it. Both Written and Oral Torah remain essential components of Jewish tradition."}, {"text": "Because the rabbis believed that God had intended all Torah, both written and oral, to be in written form from the beginning.", "isCorrect": false, "rationale": "The text states the Oral Torah was 'passed down by word of mouth for generations' and was only written down due to external circumstances, not a pre-existing divine intention for immediate inscription."}, {"text": "Due to the destruction of the Second Temple in 70 CE, which scattered the community and made oral transmission fragile.", "isCorrect": true, "rationale": "The text explicitly states: 'After the destruction of the Second Temple in 70, when the community was scattered and oral transmission became fragile, the rabbis decided this Oral Torah had to be written down.'"}, {"text": "To incorporate new laws and traditions that emerged long after the time of Moses, effectively updating the original divine revelation.", "isCorrect": false, "rationale": "The Oral Torah is understood as interpretations and applications of the original revelation to Moses, not an update with entirely new laws developed independently after Moses."}]}, {"question": "A modern Jewish scholar is researching a complex legal question by examining ancient rabbinic debates and their subsequent interpretations. Which of the following texts would be most central to their research, combining both foundational rulings and extensive commentary?", "options": [{"text": "The Nevi'im, as it contains the prophetic interpretations of Israel's history.", "isCorrect": false, "rationale": "Nevi'im focuses on prophets and historical narratives, not the rabbinic legal debates and commentaries that form the core of later Jewish law."}, {"text": "The Mishnah, primarily, as it is the first written collection of the Oral Torah.", "isCorrect": false, "rationale": "While the Mishnah contains foundational rulings, the question asks for both rulings AND 'subsequent interpretations' and 'extensive commentary,' which points beyond the Mishnah alone to the Gemara and the combined Talmud."}, {"text": "The Talmud, which comprises the Mishnah (rabbinic rulings) and the Gemara (commentary on the Mishnah).", "isCorrect": true, "rationale": "The text defines the Talmud as 'comprising the Mishnah and the Gemara,' and describes the Gemara as 'rabbinic commentary on the Mishnah.' This combination provides both foundational rulings and the extensive subsequent commentary needed."}, {"text": "The Siddur, as it organizes daily prayer services and special liturgies.", "isCorrect": false, "rationale": "The Siddur is a prayer book and does not contain the rabbinic legal debates and interpretations essential for this type of scholarly research."}]}, {"question": "The text notes that the Talmud is 'unlike almost any other sacred text' because 'Most religious texts record conclusions. The Talmud records the arguments.' What is the most significant implication of this characteristic for Jewish intellectual life?", "options": [{"text": "It implies that Jewish law is perpetually undecided, lacking definitive rulings on many issues.", "isCorrect": false, "rationale": "While it preserves debates, the preservation of arguments is presented as a principle of intellectual life, not an indicator of perpetual indecision. Rulings are often established, but the reasoning and alternative views are still valued."}, {"text": "It fosters a tradition of critical inquiry and the valuing of diverse perspectives, even minority opinions, as part of divine revelation.", "isCorrect": true, "rationale": "The text highlights the preservation of both sides of arguments, including minority opinions, and the saying 'These and these are the words of the living God.' This directly supports the fostering of critical inquiry and valuing diverse, divinely-inspired perspectives."}, {"text": "It demonstrates a lack of consensus among ancient rabbis, which eventually led to a fragmentation of Jewish religious practice.", "isCorrect": false, "rationale": "The text presents the preservation of arguments as a strength and a principle ('a principle of Jewish intellectual life'), not a weakness or cause of fragmentation. It reflects a unified tradition of ongoing debate."}, {"text": "It suggests that only the arguments of the majority opinion are considered truly authoritative, with minority views serving as historical footnotes.", "isCorrect": false, "rationale": "The statement 'Even the minority opinion, even the ruling that was not adopted—it was not erased. It might be needed later' directly contradicts this option, emphasizing the ongoing potential value of all preserved views."}]}, {"question": "How did the role of the 'rabbi' fundamentally change after the destruction of the Second Temple, according to the text?", "options": [{"text": "Rabbis became the primary figures for performing sacrifices, replacing the traditional priestly class.", "isCorrect": false, "rationale": "The text explicitly states the opposite: 'the rabbi...replaced the priest as the central figure of Jewish religious life precisely because the tradition now lived in interpretation, not in sacrifice.'"}, {"text": "Their role shifted from local community leaders to international emissaries, spreading Judaism across the globe.", "isCorrect": false, "rationale": "The text focuses on the *nature* of their religious function (interpretation vs. sacrifice) within the community, not a change in their geographical scope or outreach efforts."}, {"text": "Rabbis transitioned from figures primarily associated with sacrifice to those central to the interpretation and transmission of Torah.", "isCorrect": true, "rationale": "The text states: 'The rabbi...replaced the priest as the central figure of Jewish religious life precisely because the tradition now lived in interpretation, not in sacrifice.' This captures the fundamental shift in their religious authority and function."}, {"text": "They became solely political leaders, abandoning their religious functions to focus on rebuilding the Jewish state.", "isCorrect": false, "rationale": "The text emphasizes their religious and intellectual role as 'teacher and interpreter of Torah,' not a complete abandonment of religious functions for solely political ones."}]}, {"question": "A student in a yeshiva is engaging with a centuries-old debate recorded in the Talmud between Rabbi Akiva and earlier sages. Based on the 'Did You Know' section, what aspect of the Talmud's nature makes this direct engagement possible?", "options": [{"text": "The Talmud was meticulously edited to present only the consensus opinions, making it easier to identify the final ruling.", "isCorrect": false, "rationale": "Both the main text and the 'Did You Know' section highlight the preservation of diverse arguments and even dissenting opinions, not a consensus-only editing approach. This preservation is key to the ongoing debate."}, {"text": "The Talmud is regularly updated by contemporary rabbis, adding new layers of commentary and effectively 'bridging' historical gaps.", "isCorrect": false, "rationale": "While rabbinic commentary continues, the text describes the Talmud as a fixed compilation of ancient debates. The 'conversation across time' occurs by engaging with the preserved ancient arguments directly, not through constant updates to the original text."}, {"text": "Its preservation of diverse arguments and the tradition's view that time is no barrier to conversation allow students to engage with ancient voices as if present.", "isCorrect": true, "rationale": "The 'Did You Know' section states: 'Because both sides of an argument were preserved, students today can read a discussion between Rabbi Akiva... and earlier sages as if they were in the same room. The tradition treats time as no barrier to conversation.'"}, {"text": "The text itself contains prophecies about future debates, allowing students to prepare for discussions with long-dead scholars.", "isCorrect": false, "rationale": "This is not supported by the text. The engagement is through the preserved arguments and the tradition's intellectual approach, not through prophetic content within the Talmud itself."}]}, {"question": "Which of the following best characterizes the primary orientation of Jewish worship as described in the section about the Siddur?", "options": [{"text": "It is primarily focused on individual salvation and personal connection with 'my God.'", "isCorrect": false, "rationale": "The text explicitly states: 'They speak not of “my God” but of “our God,” not of personal salvation but of the restoration of Israel and of all humanity,' directly contradicting this option."}, {"text": "It is a highly individualistic practice, with prayers designed for silent contemplation rather than communal recitation.", "isCorrect": false, "rationale": "The text states: 'The prayers are largely communal—said together, often in a minyan, a quorum of ten adults—and they are profoundly oriented toward the collective,' contradicting the idea of an individualistic practice."}, {"text": "It centers on communal expression and collective aspirations for the restoration of Israel and all humanity.", "isCorrect": true, "rationale": "The text states: 'The prayers are largely communal...and they are profoundly oriented toward the collective. They speak not of “my God” but of “our God,” not of personal salvation but of the restoration of Israel and of all humanity.' This accurately summarizes its communal and collective focus."}, {"text": "It is solely focused on historical remembrance, with little emphasis on future hopes or present-day needs.", "isCorrect": false, "rationale": "While remembrance is a part of tradition, the text's mention of 'restoration of Israel and of all humanity' clearly indicates a future-oriented and aspirational aspect, not solely historical focus."}]}, {"question": "A contemporary rabbi is asked about the meaning of a specific law found in the Written Torah. To provide a comprehensive answer rooted in tradition, what would be the most appropriate approach, integrating the various sacred texts mentioned?", "options": [{"text": "Refer only to the Five Books of Moses (Torah) for the literal wording, as that is the direct divine revelation.", "isCorrect": false, "rationale": "While the Written Torah is foundational, the text emphasizes the Oral Torah (Mishnah, Gemara/Talmud) as essential for 'interpretations, explanations, and applications' of the written law, which are crucial for a comprehensive traditional answer."}, {"text": "Consult the Siddur to find relevant prayers that might offer an interpretation of the law.", "isCorrect": false, "rationale": "The Siddur is a prayer book and, while sacred, is not the primary source for detailed legal interpretations or explanations of the Written Torah. Its function is liturgical."}, {"text": "Examine the Written Torah, then consult the Mishnah for early rabbinic rulings, and finally the Gemara (as part of the Talmud) for further commentary and debates.", "isCorrect": true, "rationale": "This approach correctly outlines the hierarchical and interconnected nature of the sacred texts for legal understanding: Written Torah for the original law, Mishnah for its initial oral interpretation (now written), and Gemara (within the Talmud) for extensive commentary and debate, thus providing a comprehensive traditional answer."}, {"text": "Focus primarily on the Ketuvim for wisdom literature, as it offers the most direct ethical guidance.", "isCorrect": false, "rationale": "Ketuvim contains wisdom and poetry but is not the primary source for detailed legal interpretations of the Written Torah. The Talmudic literature (Mishnah, Gemara) fulfills this role."}]}, {"question": "The statement 'These and these are the words of the living God,' attributed to rabbinic disputes, most profoundly illustrates which aspect of Jewish tradition?", "options": [{"text": "The absolute infallibility of all rabbinic pronouncements, regardless of their content.", "isCorrect": false, "rationale": "The phrase specifically applies to disagreements, implying that even differing interpretations hold divine value, not that every single pronouncement is infallible. It emphasizes the process of debate itself."}, {"text": "The preference for maintaining ambiguity in legal matters to allow for individual discretion.", "isCorrect": false, "rationale": "While debate is preserved, the goal of rabbinic discussion is often to arrive at practical rulings. The phrase affirms the divine origin of the *process* of debate and the truth within multiple perspectives, not a deliberate cultivation of ambiguity for its own sake."}, {"text": "The belief that divergent, even opposing, interpretations of divine revelation can both contain truth and derive from a divine source.", "isCorrect": true, "rationale": "This option directly reflects the text's explanation of the phrase and the preservation of minority opinions: 'Even the minority opinion, even the ruling that was not adopted—it was not erased. It might be needed later.' It signifies that multiple perspectives in a sacred debate can simultaneously be divinely inspired and hold truth, fostering intellectual pluralism."}, {"text": "The importance of achieving unanimous consensus in all rabbinic discussions before any ruling can be adopted.", "isCorrect": false, "rationale": "The text explicitly states rabbis 'disagreed constantly' and both sides were preserved. This directly contradicts the idea that unanimous consensus is required or achieved; rather, the principle celebrates the divine inspiration within the disagreement itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
