<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Roundtable &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what was Confucius's primary motivation for his life's work?", "options": [{"text": "To restore his family's lost aristocratic status and wealth.", "isCorrect": false, "rationale": "While Confucius came from a family that had once been aristocratic, the text states his motivation was to address the societal decline he observed, not to restore his personal family's status."}, {"text": "To close the gap between the chaotic reality of his time and the standards he read about in ancient texts.", "isCorrect": true, "rationale": "The text explicitly states he was 'acutely aware of how far his society had fallen from the standards he read about in the ancient texts. He would spend his entire life trying to close that gap.'"}, {"text": "To establish a new, powerful military dynasty to unify China.", "isCorrect": false, "rationale": "Confucius believed the problem was moral, not merely political, and rulers he encountered wanted military advisors, indicating his focus was not on military unification."}, {"text": "To compile and preserve all existing classical Chinese texts.", "isCorrect": false, "rationale": "He did edit classical texts later in life, but his overarching mission was about societal reform based on those texts, not just their preservation."}]}, {"question": "Confucius viewed the crisis of his time, marked by the disintegrating Zhou dynasty, as fundamentally a moral problem. What did he believe was the core issue?", "options": [{"text": "A lack of strong centralized government and effective military leaders.", "isCorrect": false, "rationale": "While political instability was present, Confucius believed the root cause was moral, stating 'the problem was moral, not merely political.'"}, {"text": "The abandonment of traditional religious beliefs and rituals.", "isCorrect": false, "rationale": "He noted rituals were 'ignored or performed as empty theater,' implying the problem was deeper than just abandonment; it was the loss of inner virtues that the rituals were meant to express."}, {"text": "The loss of inner virtues that the outer rituals were meant to express and reinforce.", "isCorrect": true, "rationale": "The text states Confucius was 'convinced that the problem was moral, not merely political: people had lost the inner virtues that the outer rituals were meant to express and reinforce.'"}, {"text": "The constant warfare between rival states that depleted resources.", "isCorrect": false, "rationale": "Constant warfare was a symptom of the crisis, but Confucius identified the underlying cause as moral decay, not merely resource depletion."}]}, {"question": "What significant and 'radical' change did Confucius introduce in Chinese education during his lifetime?", "options": [{"text": "He established the first university system funded by the state.", "isCorrect": false, "rationale": "The text describes him opening his own school, not a state-funded university system."}, {"text": "He limited his teachings exclusively to the sons of ruling families.", "isCorrect": false, "rationale": "This is the opposite of what the text states; he opened his school 'to anyone who was willing to learn, regardless of their social rank.'"}, {"text": "He opened his school to anyone willing to learn, regardless of their social rank.", "isCorrect": true, "rationale": "The text highlights this as a 'radical move in a society organized around hereditary privilege,' noting he was 'one of the first educators in Chinese history to open his school to anyone who was willing to learn, regardless of their social rank.'"}, {"text": "He focused solely on military strategy and governance for future leaders.", "isCorrect": false, "rationale": "He taught classical texts and 'how to become the kind of people who could reform government and society from the inside,' not just military strategy."}]}, {"question": "During his thirteen years of wandering, why did Confucius reportedly fail to find a ruler to implement his ideas?", "options": [{"text": "Rulers of his time were primarily interested in military conquest, not philosophical advice.", "isCorrect": true, "rationale": "The text states: 'The rulers he encountered wanted military advisors, not philosophers.'"}, {"text": "His philosophical ideas were too complex for the rulers to understand.", "isCorrect": false, "rationale": "The text does not suggest his ideas were too complex, but rather that rulers had different priorities."}, {"text": "He lacked the necessary social connections to gain an audience with powerful rulers.", "isCorrect": false, "rationale": "The text implies he *did* encounter rulers, but their priorities differed from his."}, {"text": "He demanded too much political power and authority for himself.", "isCorrect": false, "rationale": "The text indicates he sought 'a position from which he could put his ideas into practice,' not excessive power for himself."}]}, {"question": "Confucius reportedly died convinced that his mission had failed. Which later historical development most strongly demonstrates the irony of this personal belief?", "options": [{"text": "His students compiled his sayings into the Analects, preserving his thoughts.", "isCorrect": false, "rationale": "While important for preservation, the Analects themselves do not represent the widespread societal impact that later proved his mission's success."}, {"text": "The state of Lu eventually adopted his teachings locally.", "isCorrect": false, "rationale": "The text points to a much broader impact on the entire civilization, not just one state."}, {"text": "The Han dynasty adopted Confucianism as the official philosophical framework for governing China.", "isCorrect": true, "rationale": "The text states, 'He was wrong...When the Han dynasty unified China in 206 BCE...They chose Confucianism,' establishing it as the foundation for governing a vast empire for centuries."}, {"text": "Other philosophical schools continued to compete with Confucianism for influence.", "isCorrect": false, "rationale": "This indicates continued debate, not a definitive success for Confucius's mission on a grand scale."}]}, {"question": "The Confucian imperial examination system, established during the Han dynasty, significantly impacted Chinese society by:", "options": [{"text": "Ensuring that only direct descendants of the emperor could hold government office.", "isCorrect": false, "rationale": "The 'Did You Know' section states it was 'far more open than the purely hereditary systems,' indicating it moved away from lineage."}, {"text": "Creating a purely merit-based civil service, accessible to all regardless of financial status.", "isCorrect": false, "rationale": "While merit-based, the text notes a limitation: 'it favored those who could afford years of education,' so it wasn't fully accessible to *all*."}, {"text": "Determining who could hold government office based on mastery of Confucian classics.", "isCorrect": true, "rationale": "The text states the system 'determined who could hold government office' and was 'based on mastery of the Confucian classics.'"}, {"text": "Promoting military prowess as the primary qualification for leadership roles.", "isCorrect": false, "rationale": "The system was based on 'mastery of the Confucian classics' and 'writing elaborate essays,' not military prowess."}]}, {"question": "According to the 'Did You Know' section, what was a notable limitation of the otherwise revolutionary Confucian imperial examination system?", "options": [{"text": "It was too short and easy, allowing unqualified candidates to pass.", "isCorrect": false, "rationale": "The text describes it as a 'rigorous series of tests' requiring candidates to 'spend years memorizing the Confucian classics,' suggesting it was not easy."}, {"text": "It favored candidates who could afford years of extensive education.", "isCorrect": true, "rationale": "The text explicitly states: 'The system was not perfect—it favored those who could afford years of education.'"}, {"text": "It exclusively tested knowledge of military strategy and tactics.", "isCorrect": false, "rationale": "It was based on 'mastery of the Confucian classics' and their application to governance, not solely military knowledge."}, {"text": "It was only implemented for a brief period and had little lasting impact.", "isCorrect": false, "rationale": "The text states it 'endured, with modifications, until 1905 CE,' indicating a very long-lasting impact."}]}, {"question": "The Latinized name 'Confucius' was given by Jesuit missionaries. What was his original Chinese name, as mentioned in the text?", "options": [{"text": "Kong Fuzi", "isCorrect": false, "rationale": "Kong Fuzi ('Master Kong') is an honorific, but not his original birth name."}, {"text": "Shandong", "isCorrect": false, "rationale": "Shandong Province is the region where he was born, not his name."}, {"text": "Kong Qiu", "isCorrect": true, "rationale": "The 'keyterm' section clarifies that 'Confucius' is the Latinized name of 'Kong Qiu (also called Kong Fuzi, “Master Kong”).'"}, {"text": "Lu dynasty", "isCorrect": false, "rationale": "Lu was the state where he was born, not his name."}]}, {"question": "The statement 'For more than two thousand years, the road to power in China ran through Confucius' primarily signifies what?", "options": [{"text": "Confucius personally advised every Chinese emperor during that period.", "isCorrect": false, "rationale": "Confucius died in 479 BCE, long before the Han dynasty and the full establishment of his influence over two millennia."}, {"text": "All successful military generals studied Confucius's works for strategic insights.", "isCorrect": false, "rationale": "The text indicates rulers wanted military advisors *instead* of philosophers like Confucius during his lifetime, and the later system focused on classics, not military strategy."}, {"text": "Mastery of Confucian classics was required to pass the imperial examinations and gain government office.", "isCorrect": true, "rationale": "The text explicitly states: 'The imperial examination system—a rigorous series of tests based on mastery of the Confucian classics, which determined who could hold government office—was established and endured...For more than two thousand years, the road to power in China ran through Confucius.'"}, {"text": "Confucian temples became the centers of political decision-making across China.", "isCorrect": false, "rationale": "The text focuses on the philosophical framework and examination system as the 'road to power,' not temple politics."}]}, {"question": "Confucius's background, being from a family of 'modest means that had once been aristocratic,' contributed to his mission by:", "options": [{"text": "Providing him with the necessary financial resources to travel and establish schools.", "isCorrect": false, "rationale": "The text specifies 'modest means,' implying limited financial resources, and he spent 13 years wandering, implying he wasn't well-resourced."}, {"text": "Giving him access to a classical education while simultaneously making him aware of societal decline.", "isCorrect": true, "rationale": "The text states his family was 'just prosperous enough to give him a classical education, just poor enough to make him acutely aware of how far his society had fallen from the standards he read about in the ancient texts.'"}, {"text": "Granting him hereditary political connections that he later leveraged for influence.", "isCorrect": false, "rationale": "The text indicates he failed to find a ruler to implement his ideas, suggesting a lack of effective political leverage from his background."}, {"text": "Motivating him to overthrow the existing aristocratic system.", "isCorrect": false, "rationale": "His goal was to restore societal standards and virtues based on ancient texts, not to overthrow the entire aristocratic structure, though he challenged its hereditary privilege in education."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
