        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 9, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary reason the textbook states that understanding Communism is crucial for comprehending the last 175 years?", "options": [{"text": "It remains the most popular political system globally.", "isCorrect": false, "rationale": "The text does not claim Communism is currently the most popular global system; rather, it notes its historical peak and enduring intellectual influence."}, {"text": "It dramatically shaped 20th-century conflicts, revolutions, and global geopolitics.", "isCorrect": true, "rationale": "The text explicitly states, 'No ideology shaped the 20th century more dramatically than Communism' and links it to 'wars, its revolutions, its social movements, its geopolitics'."}, {"text": "Its philosophical tenets are universally accepted by modern political theorists.", "isCorrect": false, "rationale": "While Marx's philosophical ideas are influential, the text notes his 'specific political prescriptions have a troubled track record,' indicating they are not universally accepted."}, {"text": "It consistently led to democratic reforms in capitalist nations.", "isCorrect": false, "rationale": "The text focuses on Communism's direct impact as a governing ideology and its role in the Cold War conflict, not its consistent role in promoting democratic reforms in capitalist nations."}]}, {"question": "At its peak, approximately what proportion of the world's population lived under governments identifying as Communist?", "options": [{"text": "One-tenth", "isCorrect": false, "rationale": "The text specifies a higher proportion than one-tenth."}, {"text": "One-half", "isCorrect": false, "rationale": "The text specifies a lower proportion than one-half."}, {"text": "One-third", "isCorrect": true, "rationale": "The text clearly states, 'At its peak, roughly one-third of the world's population lived under governments that called themselves Communist'."}, {"text": "Three-quarters", "isCorrect": false, "rationale": "The text specifies a much lower proportion than three-quarters."}]}, {"question": "The text describes the legacy of Communist governance as 'deeply and genuinely contested.' Which statement best represents the dual nature of this contested legacy?", "options": [{"text": "While achieving rapid industrialization, Communist governments universally failed to address gender inequality.", "isCorrect": false, "rationale": "The text states that Communist governments 'pursued genuine commitments to gender equality in some contexts,' so 'universally failed' is incorrect."}, {"text": "Communist regimes were responsible for both significant human rights catastrophes and successful anti-colonial movements.", "isCorrect": true, "rationale": "The text balances 'some of the worst human rights catastrophes in history' with achievements like 'rapid industrialization in some countries...and led or supported anti-colonial movements'."}, {"text": "Their philosophical ideas were influential, but their political practices led only to widespread suffering.", "isCorrect": false, "rationale": "This oversimplifies; the text also notes positive impacts like rapid industrialization and support for anti-colonial movements, not just suffering from political practices."}, {"text": "The USSR collapsed, but China thrived, proving the system's adaptability.", "isCorrect": false, "rationale": "This focuses on two specific countries and misses the broader scope of the contested legacy, which includes both achievements and severe atrocities across various regions and eras."}]}, {"question": "Which of the following historical events is NOT cited in the text as an example of a human rights catastrophe under Communist governments?", "options": [{"text": "Stalin's purges and the Gulag system.", "isCorrect": false, "rationale": "The text explicitly mentions 'Stalin’s purges and labor camps (the Gulag system) killed millions'."}, {"text": "Mao Zedong's Great Leap Forward.", "isCorrect": false, "rationale": "The text explicitly mentions 'Mao Zedong’s Great Leap Forward' causing a famine that 'killed an estimated 15 to 55 million people'."}, {"text": "The Rwandan Genocide.", "isCorrect": true, "rationale": "The text lists atrocities under Stalin, Mao, and Pol Pot/Khmer Rouge, but the Rwandan Genocide is not mentioned as a human rights catastrophe under a Communist government in this section."}, {"text": "The Cambodian Khmer Rouge's systematic murders.", "isCorrect": false, "rationale": "The text explicitly mentions 'The Cambodian Khmer Rouge, under Pol Pot, systematically murdered approximately 25 percent of their own country’s population'."}]}, {"question": "The text highlights an ongoing debate among historians and political philosophers regarding the atrocities committed under Communist regimes. What is the core question of this debate?", "options": [{"text": "Whether capitalism or communism is inherently superior as an economic system.", "isCorrect": false, "rationale": "While a related economic debate, the specific debate mentioned in the text focuses on the *attribution* of responsibility for the atrocities."}, {"text": "How much responsibility lies with Marx's original theory versus the specific actions of individual leaders and historical contexts.", "isCorrect": true, "rationale": "The text directly states this as the ongoing debate: 'How much of this is attributable to Marx’s theory, and how much to the specific decisions of specific leaders in specific historical circumstances, is a question historians and political philosophers continue to debate.'"}, {"text": "If Communist governments truly intended to achieve rapid industrialization.", "isCorrect": false, "rationale": "The text lists 'rapid industrialization' as an achievement, not a debated intention regarding atrocities."}, {"text": "Whether anti-colonial movements benefited sufficiently from Communist support to justify the human cost.", "isCorrect": false, "rationale": "This is a valid historical question but not the specific debate the text outlines concerning the *causality* of the human rights catastrophes."}]}, {"question": "According to the text, what aspect of Marx's legacy remains 'intellectually alive and influential' and 'not contested'?", "options": [{"text": "The specific political prescriptions he offered for governing.", "isCorrect": false, "rationale": "The text states that 'The specific political prescriptions Marx offered have a troubled track record,' indicating they are contested or problematic, not uncontested."}, {"text": "The historical accuracy of his predictions about the inevitable fall of capitalism.", "isCorrect": false, "rationale": "The text does not mention this as an uncontested aspect of his intellectual legacy; rather, it highlights his philosophical contributions."}, {"text": "His philosophical concepts such as alienation, exploitation, and the critique of capitalism.", "isCorrect": true, "rationale": "The text explicitly states: 'The concepts of alienation, exploitation, and the critique of capitalism are engaged seriously by philosophers, sociologists, economists, and political activists'."}, {"text": "The success of Communist revolutions in establishing utopian societies.", "isCorrect": false, "rationale": "The text highlights the 'troubled track record' and 'worst human rights catastrophes' under Communist governments, not their success in creating utopias."}]}, {"question": "The text suggests that Marx's ideas continue to be relevant even for those who are not Communists or Marxists. Which of the following best exemplifies this enduring relevance?", "options": [{"text": "The ongoing debate about whether economic systems can dehumanize workers by turning creativity into a commodity.", "isCorrect": true, "rationale": "The text states: 'The question of whether capitalism creates conditions that dehumanize workers — whether there is something structurally wrong with a system that turns human creativity and effort into a commodity — is a question that remains urgently relevant'."}, {"text": "The continued formation of new Communist political parties in democratic nations.", "isCorrect": false, "rationale": "While such parties may exist, the text emphasizes the *intellectual and philosophical* engagement with Marx's ideas by non-Communists, not necessarily the expansion of political movements claiming his name."}, {"text": "The widespread adoption of centrally planned economies by developing nations.", "isCorrect": false, "rationale": "The text does not indicate a widespread adoption of centrally planned economies by *non-Communist* developing nations as a sign of Marx's enduring relevance to non-Marxists."}, {"text": "The universal agreement on how to implement gender equality policies inspired by Communist ideals.", "isCorrect": false, "rationale": "The text notes 'genuine commitments to gender equality in some contexts' under Communist governments, but not a universal agreement on implementation by non-Communists."}]}, {"question": "Why does this textbook include Communism alongside other worldviews like Christianity and Islam?", "options": [{"text": "To endorse Communism as a valid alternative to capitalism.", "isCorrect": false, "rationale": "The text explicitly states it is 'not because we think all ideologies are equally valid'."}, {"text": "Because it offers forceful answers to fundamental human questions about existence, suffering, and history's direction.", "isCorrect": true, "rationale": "The text explains, 'It is included because the questions this course asks — Where did the world come from? What is a human being? Why do we suffer? How should we live? Where is history going? — are questions that Communism answers, in its own way, with great force and seriousness'."}, {"text": "To promote a specific political agenda to its readers.", "isCorrect": false, "rationale": "The textbook's stated purpose is 'honest examination' and understanding, not political promotion."}, {"text": "Because it has had fewer negative historical impacts than other ideologies.", "isCorrect": false, "rationale": "The text details Communism's responsibility for 'some of the worst human rights catastrophes in history,' directly contradicting this option."}]}, {"question": "The textbook states that including Communism does NOT imply 'that all ideologies are equally valid, or that mass atrocity is morally equivalent to worship or meditation.' What is the primary implication of this disclaimer?", "options": [{"text": "The textbook is adopting a neutral stance on all historical atrocities.", "isCorrect": false, "rationale": "The disclaimer precisely *avoids* moral equivalency, implying that atrocities are recognized as distinct and morally severe, not neutrally viewed."}, {"text": "The study of Communism must acknowledge its severe moral failings while still examining its comprehensive worldview.", "isCorrect": true, "rationale": "This statement clarifies that the inclusion is for academic understanding of a worldview that addresses fundamental human questions, despite the historical record of 'mass atrocity,' which is not dismissed or equated with other topics."}, {"text": "Students are encouraged to develop their own personal political ideologies.", "isCorrect": false, "rationale": "The primary implication relates to the approach to studying the subject matter, not student ideology formation."}, {"text": "Communism's philosophical answers are inferior to those offered by religions.", "isCorrect": false, "rationale": "The text does not make a judgment about the superiority or inferiority of Communism's answers compared to religions, only that it *provides* answers to fundamental questions."}]}, {"question": "Based on the final paragraph's 'note about this textbook,' what is the recommended approach for examining a worldview like Communism?", "options": [{"text": "To immediately evaluate and criticize its moral and political failures.", "isCorrect": false, "rationale": "The text advises understanding 'on its own terms *before* we evaluate it,' so immediate evaluation is not the recommended first step."}, {"text": "To understand it objectively on its own terms before making an evaluation.", "isCorrect": true, "rationale": "The text explicitly states: 'The honest examination of any great worldview, including this one, requires that we understand it on its own terms before we evaluate it.'"}, {"text": "To only focus on its positive contributions and avoid its controversies.", "isCorrect": false, "rationale": "An 'honest examination' would require addressing both positives and negatives, not avoiding controversies."}, {"text": "To primarily compare it with other ideologies to determine its validity.", "isCorrect": false, "rationale": "While comparison might be part of evaluation, the initial and primary step emphasized is understanding it 'on its own terms,' not primarily through comparison for validity."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
