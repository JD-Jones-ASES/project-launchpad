<script>
var QUESTIONS = [{"question": "Which statement best encapsulates the core theological principle of tawhid in Islam, as described in the text?", "options": [{"text": "God shares ultimate authority with revered prophets who deliver divine guidance.", "isCorrect": false, "rationale": "The text explicitly states tawhid means God is 'without partner, equal, or rival,' rejecting any shared ultimate authority."}, {"text": "God is the sole, unique, and indivisible entity deserving of ultimate loyalty and worship.", "isCorrect": true, "rationale": "Tawhid is defined as 'the absolute oneness and unity of God,' holding that God is 'utterly unique, undivided, and without partner, equal, or rival,' and that 'Everything that is not God... is rejected as unworthy of worship.'"}, {"text": "God's will is primarily expressed through human reason and philosophical inquiry, rather than direct revelation.", "isCorrect": false, "rationale": "The text emphasizes God communicating 'through a series of prophets' and divine guidance, not solely human reason."}, {"text": "God's essence is mysterious and entirely unknowable to humanity, making all forms of worship speculative.", "isCorrect": false, "rationale": "While aspects of God may be mysterious, the text focuses on God's oneness and the call to worship, not the unknowability of God's essence as the core principle of tawhid."}]}, {"question": "The text describes shirk as 'associating partners with God' and an unforgivable offense, stemming from the 'sweeping negation' aspect of tawhid. Based on this, which of the following scenarios would an Islamic theologian most likely identify as a form of shirk in a modern context?", "options": [{"text": "A person donating a significant portion of their income to a secular humanitarian organization to alleviate poverty.", "isCorrect": false, "rationale": "Donating to help others, even through a secular organization, aligns with ethical conduct and social responsibility, not with claiming ultimate loyalty for something other than God."}, {"text": "An individual dedicating their entire life's purpose to achieving immense personal wealth and status, prioritizing it above all other values and loyalties.", "isCorrect": true, "rationale": "The text states that 'every ruler, every idol, every ideology, every desire that claims ultimate loyalty—is rejected as unworthy of worship.' Prioritizing personal wealth and status above all else, making it the 'ultimate loyalty,' would be considered shirk, as it elevates something other than God to a supreme position."}, {"text": "A community engaging in interfaith dialogue to promote understanding and cooperation between different religious traditions.", "isCorrect": false, "rationale": "Promoting understanding and cooperation does not inherently involve associating partners with God or giving ultimate loyalty to something other than God."}, {"text": "A government establishing a public holiday to honor a national hero, celebrating their contributions to society and culture.", "isCorrect": false, "rationale": "Honoring a national hero, while a form of respect and commemoration, is distinct from rendering ultimate loyalty or worship, which is reserved solely for God in the context of tawhid."}]}, {"question": "According to Islamic theology as presented, what is the significance of Muhammad being the 'Seal of the Prophets' in relation to previous divine revelations?", "options": [{"text": "Muhammad's prophethood signifies the first instance of direct divine communication to humanity, establishing a new faith.", "isCorrect": false, "rationale": "The text states that 'Adam was the first prophet' and mentions a 'long line of prophets' before Muhammad, indicating earlier divine communication."}, {"text": "The Quran, revealed to Muhammad, fully replaces and renders all earlier scriptures, like the Hebrew Bible and Gospels, entirely invalid and without historical value.", "isCorrect": false, "rationale": "The text states that Islam 'honors the Hebrew Bible and the Gospels in principle,' implying they are not entirely invalid, but that their current versions are not 'fully reliable.'"}, {"text": "Muhammad's revelation in the Quran confirms the original messages of previous prophets while correcting any human distortions or corruptions found in current versions of their scriptures.", "isCorrect": true, "rationale": "The text explains that earlier revelations were 'subsequently distorted or corrupted by human error,' and Muhammad's revelation in the Quran 'supersedes and corrects all previous ones,' while still honoring them 'in principle.'"}, {"text": "Prior prophets, such as Moses and Jesus, delivered messages that were fundamentally different in their core theological principles from Muhammad's teachings.", "isCorrect": false, "rationale": "The text states that Abraham, Moses, and Jesus 'were all genuine prophets who received genuine revelation,' implying a shared divine origin and core message, despite later distortions."}]}, {"question": "Which of the following is NOT explicitly listed as one of the six fundamental 'articles of faith' (arkan al-iman) in Islamic theology?", "options": [{"text": "Belief in divine providence (qadar).", "isCorrect": false, "rationale": "Belief in divine providence (qadar) is explicitly listed as an article of faith."}, {"text": "Belief in the angels.", "isCorrect": false, "rationale": "Belief in the angels is explicitly listed as an article of faith."}, {"text": "Belief in the absolute oneness of God.", "isCorrect": false, "rationale": "Belief in one God is explicitly listed as an article of faith."}, {"text": "Belief in the Five Pillars of Islam.", "isCorrect": true, "rationale": "The text clarifies that the Five Pillars are the 'practical expression of Islamic faith,' not among the 'articles of faith (arkan al-iman)' which are core beliefs. The articles of faith are God, angels, revealed scriptures, prophets, Day of Judgment, and divine providence."}]}, {"question": "The text states that the Day of Judgment (Yawm al-Qiyama) is 'not a peripheral detail; it is a motivating force for every ethical choice.' What does this imply about its practical role in a Muslim's life?", "options": [{"text": "It primarily serves as a theological concept to explain the origins of good and evil in the world, rather than influencing daily conduct.", "isCorrect": false, "rationale": "While it addresses good and evil, its primary stated role is as a 'motivating force for every ethical choice,' directly influencing conduct, not just theoretical understanding."}, {"text": "It encourages Muslims to focus solely on spiritual contemplation and detachment from worldly actions, as these are ultimately inconsequential.", "isCorrect": false, "rationale": "The text says 'Every human being will be resurrected and held accountable for every act of their lives,' implying worldly actions are highly consequential and not to be detached from."}, {"text": "It provides a clear framework for understanding moral accountability and the ultimate consequences of one's actions, thereby guiding ethical behavior and decision-making.", "isCorrect": true, "rationale": "The statement 'accountable for every act of their lives' and 'motivating force for every ethical choice' directly links the Day of Judgment to moral accountability and its influence on ethical decision-making."}, {"text": "It suggests that human beings are inherently flawed and incapable of making ethical choices without constant divine intervention.", "isCorrect": false, "rationale": "The text emphasizes accountability and motivation for ethical choice, not an inherent incapability requiring constant intervention, although divine guidance is central."}]}, {"question": "How does the Islamic concept of Zakat fundamentally differ from a general understanding of charity as a 'generous extra'?", "options": [{"text": "Zakat is a voluntary act of goodwill, whereas charity is a mandatory religious duty for all Muslims.", "isCorrect": false, "rationale": "This is incorrect. Zakat is explicitly stated as 'an obligation,' not voluntary, while general charity is often understood as discretionary."}, {"text": "Zakat is specifically designated for non-Muslims in need, while charity can be given to anyone, regardless of faith.", "isCorrect": false, "rationale": "The text specifies Zakat is given 'to those in need,' without limiting it exclusively to non-Muslims, and its primary purpose is a purification of wealth for the Muslim giver."}, {"text": "Zakat is a mandatory annual purification of wealth for eligible Muslims, calculated at a specific rate, while charity is a discretionary act of giving that can be performed at any time.", "isCorrect": true, "rationale": "The text directly states, 'Zakat is not charity in the sense of a generous extra; it is an obligation, a purification of wealth,' and specifies '2.5% of their savings annually' for those 'above a minimum threshold,' highlighting its mandatory and structured nature versus discretionary charity."}, {"text": "Zakat involves giving material possessions, while charity focuses solely on acts of service and time, excluding monetary contributions.", "isCorrect": false, "rationale": "Both Zakat and charity can involve monetary contributions. Zakat is specifically about a percentage of wealth."}]}, {"question": "Beyond abstaining from food and drink, what multifaceted purpose does the Sawm (fasting during Ramadan) serve for Muslims, according to the text?", "options": [{"text": "It is solely an act of penance for past sins, requiring severe self-deprivation and isolation from society.", "isCorrect": false, "rationale": "The text describes it as 'simultaneously a physical discipline, an act of gratitude, and a practice of solidarity,' not solely penance or requiring isolation."}, {"text": "It aims to develop physical endurance, emotional detachment from worldly desires, and intellectual superiority through spiritual contemplation.", "isCorrect": false, "rationale": "While physical discipline is mentioned, 'emotional detachment' and 'intellectual superiority' are not listed. Instead, 'gratitude' and 'solidarity' are key components."}, {"text": "It combines physical discipline with an act of gratitude for God's blessings and fosters empathy and solidarity with the less fortunate who experience hunger.", "isCorrect": true, "rationale": "The text explicitly states: 'The fast is simultaneously a physical discipline, an act of gratitude, and a practice of solidarity with those who go hungry involuntarily.'"}, {"text": "It serves primarily as a public display of religious devotion, demonstrating commitment to Islamic practices to impress others within the community.", "isCorrect": false, "rationale": "The text emphasizes internal motivations (discipline, gratitude, solidarity) rather than external display to impress others."}]}, {"question": "The Hajj involves pilgrims from diverse backgrounds dressing identically in white cloth and performing the same rituals. What deeper theological message does the text suggest this uniformity conveys?", "options": [{"text": "It promotes economic equality among nations by requiring all pilgrims to wear identical, inexpensive clothing, regardless of their wealth.", "isCorrect": false, "rationale": "While the identical dress may be inexpensive, the text specifies the deeper message is 'a foretaste of the equality of Judgment Day,' not primarily an economic policy."}, {"text": "It symbolizes the universal brotherhood and sisterhood of Muslims, foreshadowing the absolute equality of all humanity before God on the Day of Judgment.", "isCorrect": true, "rationale": "The text states the Hajj is 'a foretaste of the equality of Judgment Day,' directly linking the identical dress and rituals to the concept of universal equality before God."}, {"text": "It emphasizes the importance of strict adherence to traditional attire and customs as a mandatory practice in all aspects of a Muslim's daily life.", "isCorrect": false, "rationale": "The identical dress is specific to the Hajj rituals, not a general requirement for 'all aspects of a Muslim's daily life.' The message is equality, not sartorial rigidity."}, {"text": "It is a practical measure to prevent social distinctions and maintain order among the large crowds of pilgrims, ensuring smooth execution of rituals.", "isCorrect": false, "rationale": "While it may have practical benefits, the text highlights the 'most powerful experience... a foretaste of the equality of Judgment Day' as its deeper significance, moving beyond mere logistics."}]}, {"question": "The Shahada is described as the declaration of faith that, 'spoken sincerely, make one a Muslim.' What does this statement imply about its fundamental importance?", "options": [{"text": "It is a complex theological treatise requiring years of specialized study and deep understanding before it can be recited meaningfully.", "isCorrect": false, "rationale": "The text states it's 'words, spoken sincerely,' implying it's a foundational, accessible statement, not a complex treatise."}, {"text": "It is the sole ritual required to achieve salvation in Islam, rendering other acts of worship secondary or optional.", "isCorrect": false, "rationale": "The Shahada is one of the Five Pillars, and the text mentions other 'non-negotiable acts of worship' and accountability on the Day of Judgment, indicating it's not the *sole* requirement for salvation."}, {"text": "It is the foundational statement of belief that formally initiates an individual into the Islamic faith and is essential for identity.", "isCorrect": true, "rationale": "The phrase 'spoken sincerely, make one a Muslim' directly indicates its role as the fundamental entry point and declaration of identity for someone embracing Islam."}, {"text": "It is a private expression of faith that should not be openly declared or used in communal religious practice.", "isCorrect": false, "rationale": "It's called a 'Declaration of Faith' and is 'whispered into a newborn's ear,' indicating its public and communal significance."}]}, {"question": "The text describes Iman (faith) as having 'three dimensions.' Which of the following best reflects the comprehensive nature of Iman as a 'whole-person orientation'?", "options": [{"text": "Iman is primarily an intellectual assent to theological doctrines and philosophical principles, requiring mental acceptance above all else.", "isCorrect": false, "rationale": "The text explicitly states, 'Faith is not merely a set of ideas held in the mind,' contradicting this option."}, {"text": "Iman encompasses sincere internal belief (heart), vocal profession of that belief (tongue), and practical application through actions (deeds).", "isCorrect": true, "rationale": "The text states, 'iman has three dimensions—belief in the heart, affirmation with the tongue, and enactment in deeds,' aligning perfectly with this description of a 'whole-person orientation.'"}, {"text": "Iman is a mystical experience of divine presence, independent of external rituals or societal engagement, focusing on personal spiritual encounter.", "isCorrect": false, "rationale": "While personal experience is part of faith, 'enactment in deeds' and 'shows in how one lives' contradict the idea of it being independent of external rituals or engagement."}, {"text": "Iman represents a passive acceptance of God's will, requiring no personal effort or active engagement in ethical choices or religious practices.", "isCorrect": false, "rationale": "The text describes it as a 'whole-person orientation toward God that shows in how one lives,' which implies active engagement and effort, not passive acceptance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
