    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Religious_Roundtable.html">&larr; Back to Religious Roundtable</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Religious Roundtable &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The Christian understanding of God is described as 'unusual in the history of religion' primarily because it teaches which of the following?", "options": [{"text": "God is a solitary, self-contained being.", "isCorrect": false, "rationale": "This is explicitly stated as what Christianity does NOT picture God to be. The text says it 'does not picture God as a solitary, self-contained being.'"}, {"text": "God is a Trinity, consisting of three distinct persons within one divine being.", "isCorrect": true, "rationale": "The text immediately introduces the Trinity doctrine as the 'unusual' understanding: 'Instead, Christianity teaches that God is a Trinity—the Christian doctrine that God is three distinct persons—Father, Son, and Holy Spirit—who together constitute one divine being.'"}, {"text": "God is a mystery that human comprehension cannot fully grasp.", "isCorrect": false, "rationale": "While the text mentions the Trinity is a mystery, this is a characteristic of the doctrine, not the primary reason it's described as 'unusual' in its initial introduction. The unusual part is the three-in-one concept itself."}, {"text": "God requires a single word to describe Him.", "isCorrect": false, "rationale": "The text notes most Christians begin with 'God,' but this doesn't make the understanding unusual; it sets up the explanation of *how* God is understood."}]}, {"question": "According to the text, what is NOT an accurate interpretation of the Christian doctrine that God is 'three persons'?", "options": [{"text": "That God is three distinct centers of relationship within a single divine reality.", "isCorrect": false, "rationale": "The keyterm definition explicitly states this: 'they are three distinct centers of relationship within a single divine reality.'"}, {"text": "That God is relational, with communication and love within the divine being.", "isCorrect": false, "rationale": "The text explains: 'It means that within the single divine being, there is relationship, communication, love.'"}, {"text": "That there are three separate gods.", "isCorrect": true, "rationale": "The text directly clarifies: '“To say they are three persons” does not mean three separate gods.'"}, {"text": "That the Trinity is ultimately a mystery that exceeds full human comprehension.", "isCorrect": false, "rationale": "This is a statement about the nature of the Trinity, but it doesn't clarify what 'three persons' means or doesn't mean in terms of divine unity vs. separation."}]}, {"question": "The doctrine of the Incarnation is described as 'the most startling claim in Christian theology.' What is its central tenet?", "options": [{"text": "God disguising Himself as a human to observe humanity.", "isCorrect": false, "rationale": "The text explicitly refutes this: 'This is not a god disguising himself as human, or briefly visiting earth as an observer.'"}, {"text": "God briefly visiting earth in human form.", "isCorrect": false, "rationale": "The text explicitly refutes this: 'or briefly visiting earth as an observer.' It emphasizes becoming fully human."}, {"text": "The eternal Son of God took on a fully human nature, being both fully human and fully divine in Jesus Christ.", "isCorrect": true, "rationale": "The text defines Incarnation as 'the belief that the eternal Son of God took on a fully human nature in the person of Jesus Christ... Christianity insists Jesus was fully human and fully divine at the same time.'"}, {"text": "Jesus Christ was a remarkable human teacher with divine insights.", "isCorrect": false, "rationale": "While Jesus is a teacher, the Incarnation claims he *was* God, not just a human with insights, and was fully divine, which this option underplays."}]}, {"question": "The text states the Incarnation is 'Christianity's answer to the question: How far would God go to reach humanity?' What does this answer primarily suggest about the nature of God's love and commitment?", "options": [{"text": "God's power is limited, requiring Him to take on human form to interact with creation.", "isCorrect": false, "rationale": "The text doesn't suggest God's power is limited. Instead, it highlights a choice to go 'all the way,' indicating profound love, not a lack of power."}, {"text": "God's primary method of interaction with humanity involves suffering and sacrifice.", "isCorrect": false, "rationale": "While suffering is involved, the primary implication is the extent of God's love and commitment to bridging the gap, which is expressed *through* that suffering, rather than suffering being the primary method itself."}, {"text": "God's love is so profound and committed that He would fully enter human finitude and experience, even unto death, to connect with humanity.", "isCorrect": true, "rationale": "The text says 'the answer, Christians say, is all the way,' detailing that God 'entered finite human life: was born, grew up, got tired, felt grief, and ultimately died,' indicating a profound, self-sacrificial commitment borne of love."}, {"text": "God prioritizes direct, physical presence over spiritual guidance in reaching humanity.", "isCorrect": false, "rationale": "The text describes the Holy Spirit as the 'continuing divine presence that guides and empowers believers,' showing spiritual guidance is also a key aspect. The Incarnation is about *how far* God would go, not a prioritization over other forms of presence."}]}, {"question": "Based on the text, what is the Christian understanding of sin's fundamental impact on human nature?", "options": [{"text": "Sin is merely making individual mistakes that can be corrected through good deeds.", "isCorrect": false, "rationale": "The text explicitly states: 'Humans are not simply people who make mistakes.' It describes a deeper issue."}, {"text": "Sin is an act of separation from God that introduced a rupture into human nature itself, inclining humans toward selfishness, pride, and injustice.", "isCorrect": true, "rationale": "The text defines sin as 'any thought, word, or deed that turns a person away from God and toward self—an act of separation' and states 'this original sin introduced a rupture into human nature itself.'"}, {"text": "Sin is a legal transgression that requires divine punishment for all humanity.", "isCorrect": false, "rationale": "While punishment might be a theological consequence, the text focuses on sin as 'separation' and a 'rupture' in nature, not primarily a legal transgression in this context."}, {"text": "Sin is an outdated concept that has been largely overcome by modern human progress.", "isCorrect": false, "rationale": "This contradicts the entire premise of the section, which presents sin as a core problem requiring divine intervention."}]}, {"question": "The text uses the analogy, 'a doctor who is himself sick cannot heal himself,' to explain the need for outside intervention regarding sin. What is the core implication of this analogy?", "options": [{"text": "Humans are physically and mentally incapable of spiritual growth.", "isCorrect": false, "rationale": "The analogy speaks to spiritual healing, not general physical or mental capability."}, {"text": "Humanity's inclination toward sin is so deeply ingrained that humans cannot, by their own efforts, fully remedy their spiritual condition or restore themselves to God.", "isCorrect": true, "rationale": "The analogy means humanity is 'sick' with sin and cannot 'heal itself,' thus needing 'outside intervention.' This directly supports that 'No human effort alone can fix it.'"}, {"text": "Spiritual healing requires specialized knowledge only available to divine figures.", "isCorrect": false, "rationale": "While divine intervention is mentioned, the analogy's point is the *self-inability* to heal, not the exclusivity of the 'doctor' role."}, {"text": "Humans must first acknowledge their sickness before God can intervene.", "isCorrect": false, "rationale": "While acknowledging sin might be a step in faith, the analogy's primary point is the *inability to self-heal*, regardless of acknowledgement."}]}, {"question": "Why is the Resurrection considered 'the central event in all of history' for Christians, according      to the text?", "options": [{"text": "It provides a comforting story about life after death.", "isCorrect": false, "rationale": "The text explicitly states: 'The Resurrection is not merely a comforting story about life after death; it is, for Christians, the central event.'"}, {"text": "It serves as evidence that Jesus was merely a ghost or vision.", "isCorrect": false, "rationale": "The text clarifies it was 'not as a ghost or vision, but in a transformed physical body.'"}, {"text": "It signifies the defeat of death and the overcoming of the separation between God and humanity introduced by sin, forming the basis of Christian hope.", "isCorrect": true, "rationale": "The text states it is 'taken as evidence that death itself has been defeated—that the separation between God and humanity introduced by sin has been overcome. It is the basis of the Christian hope.'"}, {"text": "It demonstrates God's power to intervene miraculously in human affairs.", "isCorrect": false, "rationale": "While it does show God's power, the text emphasizes its centrality due to its impact on death, sin, and hope, not just its miraculous nature."}]}, {"question": "How do most Christian traditions, as described in the text, understand the concept of 'salvation' in relation to human effort and divine grace?", "options": [{"text": "Salvation is primarily achieved through a person's good behavior and religious effort.", "isCorrect": false, "rationale": "The text states: 'salvation... is not something human beings can achieve through their own good behavior or religious effort.'"}, {"text": "Salvation is a gift from God, received through faith, which then leads to genuine changes in behavior.", "isCorrect": true, "rationale": "The text says salvation 'is a gift. God reaches toward humanity first; humans respond with faith... genuine faith produces genuine change. But the change follows the gift; it does not earn it.'"}, {"text": "Salvation is earned by demonstrating strong faith and commitment before God offers grace.", "isCorrect": false, "rationale": "The text emphasizes 'God reaches toward humanity first' and that faith is a *response* to what God has done, not an earning mechanism."}, {"text": "Salvation is an irrelevant concept because human beings are inherently good and do not require it.", "isCorrect": false, "rationale": "This contradicts the entire section on sin and the need for intervention."}]}, {"question": "The text notes that while salvation is a gift, 'genuine faith produces genuine change. But the change follows the gift; it does not earn it.' This statement best illustrates which principle?", "options": [{"text": "Good works are unnecessary for a Christian because grace covers all sin.", "isCorrect": false, "rationale": "The text states 'genuine faith produces genuine change,' implying good works are a natural outcome, not unnecessary."}, {"text": "Salvation is conditional on a person's ability to demonstrate significant behavioral change.", "isCorrect": false, "rationale": "The text clearly states the change 'does not earn' the gift, meaning it's not conditional in an earning sense."}, {"text": "Behavioral transformation is a natural, unforced consequence and evidence of received grace and genuine faith, rather than a prerequisite for them.", "isCorrect": true, "rationale": "The phrase 'the change follows the gift; it does not earn it' perfectly captures that transformation is an *effect* of salvation and faith, not the cause or earning mechanism."}, {"text": "The pursuit of good deeds is the ultimate goal of Christian faith.", "isCorrect": false, "rationale": "The ultimate goal is relationship with God and eternal life (salvation), of which good deeds are an outcome, not the goal itself."}]}, {"question": "Considering the core beliefs discussed—Trinity, Incarnation, Sin, Resurrection, Grace, and Faith—what overarching theme best encapsulates the Christian understanding of God's interaction with humanity?", "options": [{"text": "God's distant observation and eventual judgment of human moral choices.", "isCorrect": false, "rationale": "The Incarnation, Resurrection, and Grace highlight active, involved intervention, not distant observation."}, {"text": "Humanity's continuous struggle to earn God's favor through religious rituals and self-improvement.", "isCorrect": false, "rationale": "The text emphasizes that salvation 'is not something human beings can achieve through their own good behavior or religious effort. It is a gift.'"}, {"text": "God's profound, self-sacrificial love and active intervention to bridge the chasm created by sin and restore humanity to a relationship with Him.", "isCorrect": true, "rationale": "This synthesizes the key themes: Incarnation (self-sacrifice, bridging chasm), Sin (chasm), Resurrection (restoration, defeat of separation), and Grace (unearned love, restoration of relationship)."}, {"text": "The revelation of God's power through miraculous acts that demonstrate divine authority over creation.", "isCorrect": false, "rationale": "While power is present, the primary emphasis across these doctrines is on relationship, rescue, and restoration, driven by love, rather than just raw authority display."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
