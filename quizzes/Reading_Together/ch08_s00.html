        <a href="../../courses/Reading_Together.html">&larr; Back to Let&#x27;s Read: Five Children and It</a>

        <div class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 8</div>

<script>
var QUESTIONS = [{"question": "What is Cyril's primary motivation for suggesting that the children play traditional games like 'bandits' or 'forts'?", "options": [{"text": "To distract Robert from the pain of his injury after the first skirmish.", "isCorrect": false, "rationale": "Cyril proposes the idea of playing games to generate better wishes *before* the second fight with the baker's boy, and his speech outlines the strategy for effective wishing, not distraction from injury at that moment."}, {"text": "To naturally inspire a genuinely useful wish from the Psammead through spontaneous thought.", "isCorrect": true, "rationale": "Cyril explicitly states, 'We're dead sure to think of something if we try not to. You always do,' indicating his belief that playing without actively seeking a wish would lead to a truly valuable one."}, {"text": "To avoid thinking about their previous, disappointing wishes that brought no lasting benefit.", "isCorrect": false, "rationale": "Cyril explicitly discusses their previous disappointing wishes as the premise for his idea, demonstrating that he wants to *improve* their wishing strategy, not avoid the topic."}, {"text": "To re-enact the adventure stories from 'The Boys of England' magazine.", "isCorrect": false, "rationale": "While the children enjoy adventurous games, Cyril's stated reason is to facilitate the emergence of a 'real earnest wish' through natural play, not simply to mimic published stories."}]}, {"question": "In the context of the children's argument on the water-butt, what does Cyril's use of the word 'pax' signify?", "options": [{"text": "A demand for silence from Robert to allow Cyril to continue his speech.", "isCorrect": false, "rationale": "While Cyril does want Robert to be quiet, 'pax' specifically refers to a truce or ceasefire in British schoolchildren's slang, typically after a physical altercation, not just a demand for quiet."}, {"text": "A truce or an agreement to cease hostilities after a physical struggle.", "isCorrect": true, "rationale": "The text explains 'Pax' as 'A Latin word meaning “peace.” British schoolchildren used it as a truce call during fights,' and it is used immediately after a struggle between Cyril and Robert."}, {"text": "A declaration of victory for Cyril in their verbal dispute.", "isCorrect": false, "rationale": "Pax implies a mutual cessation of conflict, not a declaration of one party's victory. It's about restoring peace, even if grudgingly."}, {"text": "A request for peace and quiet for personal reflection.", "isCorrect": false, "rationale": "While it brings peace, 'pax' is a specific term used to stop a fight or argument, not a general request for quiet contemplation."}]}, {"question": "Which of the following items was adapted from an everyday use to serve a specific purpose in the children's game of bandits, as described in the text?", "options": [{"text": "The water-butt, used as a strategic lookout point during the game.", "isCorrect": false, "rationale": "The water-butt was used by Cyril as a platform for his oration *before* the bandit game began, not as a prop within the game itself."}, {"text": "A skipping-rope, utilized as a weapon against adversaries during the game.", "isCorrect": false, "rationale": "The skipping-rope was used as an improvised weapon *during* the spontaneous encounter with the baker's boy, not as part of the initial, planned setup for the bandit game."}, {"text": "A dust-coloured handkerchief, offered as a bandage for Robert's first injury.", "isCorrect": false, "rationale": "The handkerchief was used by Anthea to tend to Robert's injury from the skirmish with Cyril, which happened before the bandit game commenced."}, {"text": "The Lamb's mail-cart, transformed into a baggage-wagon for the banditti.", "isCorrect": true, "rationale": "The text explicitly states, 'The Lamb's mail-cart was covered with a red-and-blue checked tablecloth, and made an admirable baggage-wagon,' demonstrating an imaginative adaptation for the game."}]}, {"question": "How does the baker's boy's initial reaction to the children's 'Stand and deliver!' demand characterize him?", "options": [{"text": "He is easily intimidated and frightened by their aggressive approach.", "isCorrect": false, "rationale": "The baker's boy shows no fear; instead, he pushes them aside 'most disrespectfully,' indicating a lack of intimidation."}, {"text": "He possesses a strong sense of humor and enthusiastically plays along with their game.", "isCorrect": false, "rationale": "The text states, 'he did not seem to enter into the spirit of the thing at all,' indicating he did not find their game amusing or engage with it."}, {"text": "He is large, dismissive, and entirely uninterested in their childish antics.", "isCorrect": true, "rationale": "He is described as 'unusually large' and responds with 'Chuck it now, d'ye hear!' while pushing them 'most disrespectfully,' showing his dismissive attitude towards their game."}, {"text": "He is chivalrous and protective of his goods, immediately defending them with courage.", "isCorrect": false, "rationale": "His actions are rude and aggressive rather than chivalrous. He doesn't bravely defend; he simply dismisses and then fights."}]}, {"question": "The narrator's commentary on describing fights ('I never can see what happens during a fight, even when it is only dogs') primarily serves to:", "options": [{"text": "Highlight the chaotic and confusing nature of real-life confrontations, making them difficult to recount accurately.", "isCorrect": true, "rationale": "The narrator states, 'I never can see what happens during a fight,' emphasizing the inherent difficulty in observing and therefore describing the precise details of a chaotic event, even a dog fight."}, {"text": "Suggest that the narrator is generally uninterested in violent or conflict-ridden events.", "isCorrect": false, "rationale": "The narrator does describe two fights in the chapter, indicating a willingness to include conflict, but acknowledges a personal limitation in detailing the specific actions within them."}, {"text": "Apologize for the lack of detailed action in the story, despite it being an adventure tale.", "isCorrect": false, "rationale": "It is more an honest observation about the narrator's personal inability ('I cannot do it') and a justification for a less detailed account, rather than a formal apology for a perceived failing."}, {"text": "Critique the exaggerated and unrealistic fight descriptions found in 'The Boys of England' magazine.", "isCorrect": false, "rationale": "While the narrator contrasts their style with 'The Boys of England' (especially regarding who 'wins'), the primary reason given for the lack of detail is a personal inability to see what happens, not a direct critique of others' methods."}]}, {"question": "Anthea's plea to the baker's boy, 'Oh, don't hurt my brother any more! ... He didn't mean it - it's only play,' was detrimental to Robert's 'honour' because:", "options": [{"text": "It revealed Robert's true cowardice, showing he needed a girl to protect him.", "isCorrect": false, "rationale": "While Anthea's intervention might make Robert look weak, the text specifically states the impact on his 'honour' was that it would prevent him from future retaliation, not expose him as a coward."}, {"text": "It implicitly admitted Robert's guilt and apologized on his behalf, thereby removing his right to seek future retribution.", "isCorrect": true, "rationale": "The text explains, 'if the baker's boy had had any right and chivalrous instincts, and had yielded to Anthea's pleading and accepted her despicable apology, Robert could not, in honour, have done anything to him at a future time.' Anthea's apology for him effectively disarmed him of the right to avenge himself."}, {"text": "It made Robert look weak in front of his adversary by needing his sister to protect him.", "isCorrect": false, "rationale": "The core issue highlighted by the narrator regarding 'honour' is the constraint on future action if the apology were accepted, not merely appearing weak in the moment."}, {"text": "It caused the baker's boy to become even more enraged and violent towards Robert.", "isCorrect": false, "rationale": "The baker's boy was already enraged; Anthea's intervention did not necessarily increase his rage but rather failed to appeal to any 'chivalrous instincts' he might have had."}]}, {"question": "How does the baker's boy's response to Anthea's pleading demonstrate the absence of 'chivalry' as defined in the text?", "options": [{"text": "He did not bravely defend his loaves from the 'bandits' but resorted to violence.", "isCorrect": false, "rationale": "Chivalry, in this context, refers to a code of honor, bravery, and courtesy towards the weak, especially women, not just the defense of property. His initial defense was dismissive, not chivalrous."}, {"text": "He failed to uphold the code of honor by fighting unfairly, pulling Robert's hair and kicking him.", "isCorrect": false, "rationale": "While fighting unfairly is ungentlemanly, the question specifically asks about his response to *Anthea's pleading*. His unchivalrous actions towards Robert are separate from his unchivalrous response to Anthea."}, {"text": "He roughly pushed Anthea away, ignoring her tears and appeal for mercy, rather than being courteous and protective.", "isCorrect": true, "rationale": "Chivalry is defined as 'The medieval code of honour followed by knights — being brave, courteous, and protective of the weak.' The baker's boy's act of 'push[ing] Anthea away very roughly' directly contradicts the expectation of courtesy and protection for the 'weak' (Anthea in tears)."}, {"text": "He refused to accept Robert's apology, thus prolonging the conflict unnecessarily.", "isCorrect": false, "rationale": "Anthea offered the apology, not Robert. His refusal to accept it (and thereby grant peace) is part of his general lack of chivalry, but the specific act of pushing Anthea demonstrates his disregard for the code."}]}, {"question": "After being defeated by the baker's boy, Robert's sobbing is primarily attributed to what emotion?", "options": [{"text": "Physical pain from his numerous injuries and bruises.", "isCorrect": false, "rationale": "While Robert did sustain injuries, the text explicitly states his sobbing was 'mostly with rage,' indicating that anger was the predominant emotion, not physical pain."}, {"text": "Shame over being beaten and needing his sister's intervention.", "isCorrect": false, "rationale": "While shame might have contributed to his distress, the text specifically identifies 'rage' as the primary emotion driving his sobbing."}, {"text": "Intense rage at the baker's boy's unfair tactics and superior size.", "isCorrect": true, "rationale": "The text states, 'For Robert was sobbing - mostly with rage.' His subsequent wish, 'I only wish I was bigger than him,' further confirms his anger stemmed from the baker's boy's unfair advantage in size and behavior."}, {"text": "Frustration with his siblings for their actions during and after the fight.", "isCorrect": false, "rationale": "Robert was angry with Anthea, but the core reason for his *sobbing* (a very strong emotional display) is specified as 'rage' directed at the baker's boy."}]}, {"question": "What is the immediate and most striking emotional consequence for Robert after his wish to be 'bigger than him' is granted?", "options": [{"text": "A feeling of immense satisfaction and triumph over his recent defeat.", "isCorrect": false, "rationale": "Robert does not express triumph; instead, his 'Immense tears of fury still stood on his flushed giant face,' and he comments on feeling 'silly.'"}, {"text": "A sense of awkwardness and foolishness due to his disproportionate and unusual size.", "isCorrect": true, "rationale": "Robert states, 'You've no idea how silly it feels,' and Cyril further reinforces this by saying, 'I can jolly well see how silly it looks,' highlighting the immediate emotional impact of feeling foolish or absurd due to his sudden giant size."}, {"text": "A desire to immediately retaliate against the baker's boy with his new size.", "isCorrect": false, "rationale": "While he previously wished to pay the baker's boy out, his immediate reaction to being gigantic is surprise and awkwardness, not an immediate urge for revenge."}, {"text": "Relief that his injuries are now hidden by his larger, tougher form.", "isCorrect": false, "rationale": "Robert actively 'tore down a stocking and showed a purple bruise touched up with red' on his 'vast leg,' indicating he wanted to display his injury, not hide it."}]}, {"question": "Cyril's opening statement, 'We haven't really got anything worth having for our wishes,' most strongly suggests that the children's previous wishes:", "options": [{"text": "Lacked creativity and imagination, leading to uninteresting outcomes.", "isCorrect": false, "rationale": "Their previous wishes, such as wings, beauty, wealth, and castles, were quite imaginative, but their execution or consequences were undesirable, not that the initial idea lacked creativity."}, {"text": "Were primarily driven by superficial desires and failed to provide lasting value or happiness.", "isCorrect": true, "rationale": "Cyril lists wishes for 'wings, and being beautiful as the day - ugh! - that was pretty jolly beastly if you like - and wealth and castles,' implying that these superficial desires either had negative consequences or did not bring true satisfaction, thus not being 'worth having.'"}, {"text": "Were too grand and impossible for the Psammead to grant effectively without complications.", "isCorrect": false, "rationale": "The Psammead *did* grant these wishes, albeit often with unintended or undesirable side effects. The problem wasn't the Psammead's inability, but the wishes' inherent flaws or their consequences."}, {"text": "Were always twisted by the Psammead with malicious intent to cause them distress.", "isCorrect": false, "rationale": "While wishes often go awry, the text generally frames it as the children's lack of foresight or poor choice of wishes, rather than the Psammead acting with deliberate malice."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
