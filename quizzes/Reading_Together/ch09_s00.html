<script>
var QUESTIONS = [{"question": "What was Cyril's primary motivation for seeking out the Psammead early in the morning?", "options": [{"text": "To wish for a Megatherium, as the Psammead suggested.", "isCorrect": false, "rationale": "Cyril politely declined the Psammead's suggestion for a Megatherium, stating, 'Thank you - not to-day, I think.'"}, {"text": "To negotiate a change in how the children could make wishes, without having to disturb the Psammead repeatedly.", "isCorrect": true, "rationale": "Cyril explicitly asks, 'won't you let us have our wish just when we think of it, and just where we happen to be? So that we don't have to come and disturb you again,' indicating his primary goal was convenience for wish-making."}, {"text": "To reverse Robert's previous wish to be bigger than the baker's boy.", "isCorrect": false, "rationale": "The text mentions Robert's wish was 'the morning after the morning after,' suggesting it was two days prior, and Cyril's focus was on a new arrangement for future wishes, not reversing a past one."}, {"text": "To ask the Psammead if it was still feeling ill from Robert's tears.", "isCorrect": false, "rationale": "While Cyril started the conversation by asking about the Psammead's health, this was a polite opening, not his main purpose for the early visit."}]}, {"question": "How does the Psammead generally perceive the children and their requests in this section?", "options": [{"text": "With genuine fondness and a desire to help them learn from their mistakes.", "isCorrect": false, "rationale": "The Psammead's statements like 'I'm getting tired of you - all of you. You have no more sense than so many oysters' contradict any notion of genuine fondness or patient guidance."}, {"text": "With resigned exasperation and a belief that they lack common sense.", "isCorrect": true, "rationale": "The Psammead yawns, expresses tiredness, and states that the children 'have no more sense than so many oysters,' indicating deep exasperation and a low opinion of their wisdom."}, {"text": "With keen interest, as their wishes often provide it with amusement.", "isCorrect": false, "rationale": "The Psammead explicitly says 'I seldom play' and yawns during the conversation, showing boredom rather than amusement or keen interest."}, {"text": "With deep concern for their safety, advising them against dangerous wishes.", "isCorrect": false, "rationale": "The Psammead suggests they 'Ask for a good fat Megatherium,' which is hardly a safe or responsible suggestion, showing a lack of concern for their well-being."}]}, {"question": "What precisely triggered the Lamb's sudden transformation into a grown-up?", "options": [{"text": "Anthea's wish that the Lamb would 'grow up some day' in a dreamlike state.", "isCorrect": false, "rationale": "Anthea said, 'I suppose he'll be grown up some day,' but this was a reflective comment, not a direct wish that activated the Psammead's magic. The text confirms it was Cyril's wish."}, {"text": "The Lamb's own stated desire to 'grow big boy, have guns an' mouses.'", "isCorrect": false, "rationale": "The Lamb's statement was a charming but incoherent expression of a child's imagination, not a formal wish to the Psammead that would trigger a magical transformation."}, {"text": "Cyril's exasperated wish, 'Grow up now!', made immediately after the Lamb broke his watch.", "isCorrect": true, "rationale": "The text states: 'Cyril - 'Grow up now!'' and then immediately 'The faithful Psammead was true to its promise, and there... the Lamb suddenly and violently grew up,' confirming Cyril's direct wish was the cause."}, {"text": "The collective wish of all the children to prevent the Lamb from breaking any more of Cyril's possessions.", "isCorrect": false, "rationale": "The children wished collectively for the transformation *to stop* ('Oh, I wish it wouldn't!'), not for it to start. This happened after Cyril's wish and the beginning of the transformation."}]}, {"question": "The description of the Lamb's transformation suggests which of the following about the Psammead's magic?", "options": [{"text": "It primarily affects mental development, leaving the physical body childlike.", "isCorrect": false, "rationale": "The description details significant physical changes, including his face, a moustache, and eventually his entire body, clothing, and voice, not just mental development."}, {"text": "It grants wishes literally and sometimes incompletely, affecting physical appearance before full integration.", "isCorrect": true, "rationale": "The change was 'not so sudden as the wish-changes usually were,' starting with his face and moustache while his body was still a baby's, before he fully transformed into a young man. This shows a literal, phased, and initially incomplete physical transformation."}, {"text": "It instantly transforms a person entirely, mind and body, without any transitional stages.", "isCorrect": false, "rationale": "The text explicitly states, 'The change was not so sudden as the wish-changes usually were. The Baby's face changed first,' indicating a gradual rather than instantaneous change."}, {"text": "It prioritizes the emotional state of the one making the wish, leading to unpredictable outcomes.", "isCorrect": false, "rationale": "While Cyril's exasperation was the impetus for the wish, the *nature* of the transformation itself highlights the Psammead's literal interpretation and physical progression, not just emotional unpredictability."}]}, {"question": "Based on the grown-up Lamb's initial interactions, what immediate challenge are the children likely to face beyond simply getting him home?", "options": [{"text": "Convincing him to help them find nuts for dinner.", "isCorrect": false, "rationale": "He is dismissive of their 'grub' and expresses his desire for a club lunch, showing no interest in their childhood needs."}, {"text": "Managing his independent, dismissive attitude and convincing him to acknowledge his past and responsibilities.", "isCorrect": true, "rationale": "The grown-up Lamb immediately rejects his childhood name ('Lamb'), calls them 'kiddies,' and expresses a desire for solitude and a trip to his club, completely dismissing his siblings and their concerns, posing a major challenge to their authority and his perceived responsibilities."}, {"text": "Explaining his sudden appearance to their parents without revealing the Psammead.", "isCorrect": false, "rationale": "While this is a significant future problem, the question asks about the *immediate* challenge based on his initial interactions, which is his behavior and unwillingness to cooperate."}, {"text": "Dealing with his sudden exhaustion and tendency to fall asleep at inconvenient times.", "isCorrect": false, "rationale": "While he was 'evidently weary' and going to sleep, his immediate verbal interactions upon waking focused on his new, dismissive demeanor and desire for independence, which presents a more pressing behavioral challenge."}]}, {"question": "When woken, the grown-up Lamb addresses the children with a tone best described as:", "options": [{"text": "Affectionate but confused about his new state.", "isCorrect": false, "rationale": "He is clearly not confused, and his languid, patronizing address of 'Hullo, kiddies!' and telling them to 'cut along home' is far from affectionate."}, {"text": "Enthusiastic about his new freedom and adult responsibilities.", "isCorrect": false, "rationale": "His tone is described as 'languid,' and he expresses a desire for 'solitude' and lunch at his club, indicating a focus on leisure and self-indulgence rather than responsibility or enthusiasm."}, {"text": "Languid, patronizing, and dismissive of their concerns.", "isCorrect": true, "rationale": "He speaks in a 'languid tone,' calls them 'kiddies,' dismisses their concerns about dinner, and tells them to 'cut along home,' clearly demonstrating a patronizing and dismissive attitude."}, {"text": "Angry at being disturbed and demanding immediate solitude.", "isCorrect": false, "rationale": "His initial remarks are 'Bother the flies!' and 'Hullo, kiddies!' in a languid tone, indicating annoyance and dismissal rather than outright anger."}]}, {"question": "The grown-up Lamb's rejection of the name 'Lamb' and his preference for his 'baptismal names' (Hilary, St Maur, Devereux) reveals his desire to:", "options": [{"text": "Punish the children for carelessly wishing him grown-up.", "isCorrect": false, "rationale": "His explanation for rejecting the name is that it's 'a relic of foolish and far-off childhood,' focusing on his own identity rather than punishing his siblings."}, {"text": "Establish a new, more dignified adult identity separate from his childish past.", "isCorrect": true, "rationale": "He calls 'Lamb' a 'relic of foolish and far-off childhood,' indicating a clear desire to shed his former, childish identity and assert a new, mature one befitting his grown-up status."}, {"text": "Impress strangers with his sophisticated, multi-barrelled names.", "isCorrect": false, "rationale": "He makes this assertion to his siblings, not strangers, and the motivation is internal (shedding childhood) rather than external (impressing others)."}, {"text": "Conceal his true identity from anyone who might suspect he was a baby.", "isCorrect": false, "rationale": "The text suggests he genuinely views his old name as childish and wants to move on, rather than actively attempting to conceal his origin."}]}, {"question": "Anthea and Cyril's attempts to persuade the grown-up Lamb to stay with them, using arguments like 'father didn't wish you to go to London' and 'behave as such and take us over to Maidstone,' demonstrate:", "options": [{"text": "Their continued naivete in believing he would listen to childish reasoning.", "isCorrect": false, "rationale": "They are not using 'childish reasoning'; rather, they are attempting to use adult-like arguments (parental authority, elder sibling responsibility) to manipulate him, showing a developing sophistication."}, {"text": "Their developing understanding of adult social conventions and how to manipulate them.", "isCorrect": true, "rationale": "The children's arguments, such as invoking 'father's wishes' and appealing to his new status as an 'elder brother' to demand a 'blow-out,' show them trying to apply and manipulate perceived adult rules and social roles to their advantage."}, {"text": "Their deep-seated fear of parental punishment if they return without him.", "isCorrect": false, "rationale": "While fear of parental disapproval is certainly a motivator, the question asks what their *arguments* demonstrate, which is their evolving strategy and understanding of social dynamics."}, {"text": "A desperate attempt to revert him back to his original baby form through psychological suggestion.", "isCorrect": false, "rationale": "Their goal is to get him to *comply* in his grown-up form, not to revert him. They are trying to make him act responsibly within his current state."}]}, {"question": "When the grown-up Lamb expresses a desire to 'run up to town and have some lunch at the club,' this most clearly signifies his:", "options": [{"text": "Unwavering commitment to fulfilling adult responsibilities.", "isCorrect": false, "rationale": "Going to a private club for personal leisure ('solitude') and lunch is an act of self-indulgence, not an indication of a commitment to responsibilities, especially when contrasted with the children's immediate need for dinner and his dismissal of them."}, {"text": "Immediate need for adult companionship and intellectual conversation.", "isCorrect": false, "rationale": "He explicitly states 'I should prefer solitude,' directly contradicting any desire for companionship or conversation with others, even adults."}, {"text": "Embrace of a self-indulgent, leisure-focused adult lifestyle, free from childish ties.", "isCorrect": true, "rationale": "His desire to go to a club alone, for personal enjoyment, and his dismissal of the children's needs and concerns, clearly shows he's embracing the freedom and pleasures of adulthood without its perceived burdens, particularly his siblings."}, {"text": "Plan to seek professional help to understand his sudden transformation.", "isCorrect": false, "rationale": "There is no indication he seeks help or is confused by his transformation; he seems to accept it and immediately wants to enjoy its benefits."}]}, {"question": "The incident with the grown-up Lamb best illustrates which recurring theme in the Psammead's adventures?", "options": [{"text": "The importance of children learning to be independent and self-reliant.", "isCorrect": false, "rationale": "While the children are forced into a difficult situation that requires resourcefulness, the core theme highlighted by *this specific wish* is the problematic nature of the wish itself, not simply the outcome of independence."}, {"text": "That grown-ups are inherently selfish and unreliable, especially concerning children.", "isCorrect": false, "rationale": "The story depicts the *transformed Lamb's* specific behavior, which is self-centered, but it's not a general statement about all adults; rather, it's about the unintended result of a wish."}, {"text": "The literal and often unintended consequences of carelessly made wishes.", "isCorrect": true, "rationale": "Cyril's wish for the Lamb to 'Grow up now!' was made in a moment of frustration, and the Psammead granted it literally, resulting in a young man who behaves selfishly and creates new, unforeseen problems, reinforcing the recurring lesson about the dangers of impulsive wishes."}, {"text": "The magic of the Psammead is unpredictable and uncontrollable, regardless of the wish.", "isCorrect": false, "rationale": "The Psammead's magic is consistently literal and predictable in *how* it grants wishes; the 'unpredictability' comes from the wishers' lack of foresight and understanding of the consequences, not the magic itself being random."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
