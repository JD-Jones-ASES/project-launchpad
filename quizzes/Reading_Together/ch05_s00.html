        <a href="../../courses/Reading_Together.html">&larr; Back to Let&#x27;s Read: Five Children and It</a>
    </div>

        <div class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 5</div>
    </div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was the children's primary, coordinated strategy to alert someone to their predicament in the church tower?", "options": [{"text": "Wait until morning to signal with their handkerchiefs.", "isCorrect": false, "rationale": "Anthea initially suggested this, but the children quickly decided they couldn't wait all night and needed a more immediate solution."}, {"text": "Attempt to pick the lock on the door using a hidden tool.", "isCorrect": false, "rationale": "The text does not mention any attempt to pick the lock; their focus was on attracting external attention."}, {"text": "Yell as loudly and distinctively as possible in a coordinated effort.", "isCorrect": true, "rationale": "Cyril explicitly devises a plan for a 'fourfold yell,' assigning specific sounds (railway engine, coo-ee) to maximize their impact and ensure they are heard."}, {"text": "Try to climb down the outside of the tower using bell ropes.", "isCorrect": false, "rationale": "This dangerous option is not mentioned or considered by the children in the text. They sought help from below rather than attempting a self-rescue descent."}], "id": "q01"}, {"question": "Cyril's persistent attempts to hide the soda-water syphon, even during moments of extreme stress like descending the tower, primarily reveal his:", "options": [{"text": "Overwhelming sense of responsibility for his siblings' wellbeing.", "isCorrect": false, "rationale": "While he cares for his siblings, his concern for the syphon is more about his own potential punishment for what he perceives as stealing, not their safety."}, {"text": "Deep-seated fear of being punished for perceived wrongdoing.", "isCorrect": true, "rationale": "Cyril states, 'I'm not sure NOW' about whether it's stealing, and he goes to great lengths to conceal the syphon, indicating a strong fear of the repercussions if it's discovered by adults."}, {"text": "Strategic planning to use the syphon as a bargaining tool once rescued.", "isCorrect": false, "rationale": "There is no indication in the text that Cyril has any strategic plan for the syphon beyond keeping it hidden to avoid trouble."}, {"text": "Unwavering commitment to keeping secrets from adults for amusement.", "isCorrect": false, "rationale": "His efforts are driven by anxiety and guilt, not amusement or a general commitment to secret-keeping. He is genuinely worried about the consequences."}], "id": "q02"}, {"question": "How does the reaction of the Vicarage staff to the children's yells illustrate a central theme of perception versus reality in the story?", "options": [{"text": "The staff correctly identified the source of the noise as children in distress.", "isCorrect": false, "rationale": "The staff members significantly misinterpret the source of the yells, perceiving ghosts, murder, or a dangerous lunatic, not children."}, {"text": "Their fears were amplified by the darkness and unfamiliar sounds, leading to exaggerated and incorrect conclusions.", "isCorrect": true, "rationale": "The adults jump to wildly exaggerated conclusions (ghost, murder, lunatic, desperadoes) based on limited and frightening information, highlighting how perception can distort reality, especially under duress and in the dark."}, {"text": "The Vicar's immediate concern for the 'lunatic who stole the tongue' shows their prior knowledge of the children's mischief.", "isCorrect": false, "rationale": "The 'lunatic who stole the tongue' is an unrelated local incident mentioned by the Vicar, not evidence of prior knowledge of *these children's* mischief."}, {"text": "Andrew's reluctance to investigate alone demonstrates a practical understanding of potential dangers.", "isCorrect": false, "rationale": "While Andrew's caution is practical, it doesn't directly address the theme of *misperception* of the yelling's source, only his reaction to his misperception."}], "id": "q03"}, {"question": "The detailed description of the ascent into the church tower by the rescue party, including the 'corkscrew staircase,' 'bell-ringers' loft,' and 'belfry,' primarily serves to:", "options": [{"text": "Provide a realistic architectural layout of a typical English church tower.", "isCorrect": false, "rationale": "While it does describe the setting, its primary purpose is not merely architectural realism but to serve the narrative."}, {"text": "Increase the sense of suspense and the perceived danger or difficulty of the situation for both the rescuers and the trapped children.", "isCorrect": true, "rationale": "The detailed, winding, dark, and challenging path emphasizes the perilous journey, making the rescue seem more heroic and the children's ordeal more significant, thus building suspense."}, {"text": "Highlight the physical exertion required for the adults to climb such a structure.", "isCorrect": false, "rationale": "Physical exertion is a minor element. The focus is more on the atmosphere and the unknown awaiting them."}, {"text": "Foreshadow a future event involving these specific locations within the church.", "isCorrect": false, "rationale": "There is no indication of foreshadowing a future event in this excerpt; the description is focused on the present rescue."}], "id": "q04"}, {"question": "The gamekeeper's cautious approach at the top of the tower, demanding the 'desperadoes' move to the other side before opening the door, reveals his:", "options": [{"text": "Experience in dealing with potentially dangerous individuals and prioritizing safety.", "isCorrect": true, "rationale": "As a gamekeeper, he is 'used to dealing with vicious characters' and brings a gun. His actions demonstrate a professional caution born of experience, assuming the worst-case scenario with 'desperadoes'."}, {"text": "Lack of trust in the Vicar's judgment about the nature of the emergency.", "isCorrect": false, "rationale": "While he has his own opinions (e.g., 'Great cry, little wool'), his caution at the door is about standard procedure when facing what he believes are dangerous criminals, not about doubting the Vicar."}, {"text": "Personal enjoyment of theatrical displays of authority and control.", "isCorrect": false, "rationale": "His actions are portrayed as professional caution, not a theatrical display for personal enjoyment. He genuinely believes he is confronting dangerous characters."}, {"text": "Desire to prolong the children's discomfort as a form of punishment.", "isCorrect": false, "rationale": "He has no idea he's dealing with children at this point; he expects 'desperadoes,' so there is no intent to punish children."}], "id": "q05"}, {"question": "Contrast the Vicar's wife's initial reaction to the yells ('Frightening everybody out of their wits like this! You ought to be ashamed of yourselves.') with Robert's earlier attempt to calm her ('Yes, he's quite safe. We haven't hurt him at all.'). What does this contrast primarily highlight?", "options": [{"text": "The children's lack of remorse for their actions.", "isCorrect": false, "rationale": "Jane explicitly says 'We are' ashamed, so it's not a lack of remorse, but a difference in priorities and perspective."}, {"text": "The divergent priorities and perspectives between adults and children in the narrative.", "isCorrect": true, "rationale": "The Vicar's wife focuses on the disruption and fear caused to the adults, while Robert focuses on his and his siblings' immediate safety and desire to go home, illustrating a key difference in their priorities and experiences of the event."}, {"text": "The different priorities of the male and female adults in the story.", "isCorrect": false, "rationale": "While male/female adult reactions differ, the core contrast here is between the children's (Robert's) perspective of their plight and the adults' (Vicar's wife's) perspective of the disruption caused."}, {"text": "Robert's manipulative nature in trying to deflect blame from himself.", "isCorrect": false, "rationale": "Robert is genuinely trying to reassure the anxious adult and facilitate their release, not manipulate or deflect blame in a negative sense."}], "id": "q06"}, {"question": "Upon the rescue party finding the children in the tower, what was their most pressing immediate concern, as expressed by Jane and the others?", "options": [{"text": "Fully explaining how they managed to get into the tower.", "isCorrect": false, "rationale": "While this question is asked, the children (especially Jane) defer the explanation, prioritizing their immediate need to get out. Cyril even lies about how they got up."}, {"text": "Ensuring the soda-water syphon remained hidden from the adults.", "isCorrect": false, "rationale": "This was Cyril's personal, persistent concern, but not the collective 'most pressing' concern expressed by all children upon discovery."}, {"text": "Being taken down from the dark, uncomfortable tower.", "isCorrect": true, "rationale": "Jane cries, 'Oh, take us down,' and 'The others crowded round him, with the same entreaty,' making it clear their most immediate and urgent desire is to descend."}, {"text": "Apologizing profusely for the commotion they had caused.", "isCorrect": false, "rationale": "While Jane does express shame ('We are,' she said gently), this comes after the immediate request to be taken down and is prompted by the Vicar's wife's scolding."}], "id": "q07"}, {"question": "The incident where the maid, Jessie, faints after hearing the yells and reports seeing a ghost, contributes to the story primarily by:", "options": [{"text": "Introducing a genuine supernatural element to the plot.", "isCorrect": false, "rationale": "The narrator explicitly states, 'It was quite untrue, of course,' regarding the ghost, indicating it's not a real supernatural event but a misinterpretation."}, {"text": "Demonstrating the Vicarage staff's general cowardice.", "isCorrect": false, "rationale": "Her reaction is described as due to 'nerves' being upset, not necessarily general cowardice, and serves a humorous purpose rather than a character indictment."}, {"text": "Adding a humorous touch by highlighting the exaggerated adult reactions to the children's actions.", "isCorrect": true, "rationale": "The extreme reaction of fainting and reporting a 'ghost' in response to mere yelling by children provides comic relief and further underscores the theme of adult misunderstanding and exaggeration."}, {"text": "Setting up a future conflict between Jessie and the children.", "isCorrect": false, "rationale": "There is no indication in the text that Jessie's fainting incident leads to any future conflict with the children."}], "id": "q08"}, {"question": "Which character best exemplifies the trait of *resourcefulness* in this excerpt?", "options": [{"text": "Anthea, for comforting Jane during her distress.", "isCorrect": false, "rationale": "Anthea shows compassion and calm, but not resourcefulness in devising a solution to their primary problem."}, {"text": "Robert, for suggesting they throw away the soda-water syphon.", "isCorrect": false, "rationale": "Robert's suggestion is more an act of desperation to avoid trouble than a resourceful plan for getting out or solving a problem."}, {"text": "Cyril, for devising the coordinated yelling strategy with specific sounds.", "isCorrect": true, "rationale": "Cyril takes charge, thinks strategically about how to get attention ('railway engine,' 'coo-ee'), and organizes the children's efforts, demonstrating clear resourcefulness in a crisis."}, {"text": "The gamekeeper, for bringing his gun and leading the rescue.", "isCorrect": false, "rationale": "The gamekeeper is prepared and cautious, but his actions are standard for his role (dealing with perceived threats) rather than an act of creative resourcefulness in *this specific* predicament."}], "id": "q09"}, {"question": "The repeated misinterpretations of the children's yells (as ghosts, murder, a lunatic, or desperadoes) by the adults most strongly conveys which theme?", "options": [{"text": "The inherent dangers and spooky atmosphere of rural church towers at night.", "isCorrect": false, "rationale": "While the setting contributes to the atmosphere, the theme focuses on human reactions, not the inherent nature of the towers themselves."}, {"text": "The difficulty of effective communication across different social classes.", "isCorrect": false, "rationale": "While present, communication *breakdown* is not the primary driver of the misinterpretations; rather, it's the lack of information combined with fear."}, {"text": "How fear and a lack of complete information can lead to wild assumptions and panic.", "isCorrect": true, "rationale": "The adults, operating in darkness and with only limited, alarming auditory information, immediately jump to sensational and terrifying conclusions (ghosts, murder, lunatics, desperadoes), perfectly illustrating how fear and incomplete data fuel exaggerated perceptions and panic."}, {"text": "The universal effectiveness of loud noises in attracting attention.", "isCorrect": false, "rationale": "This is a practical outcome of the yells, but it's not the underlying theme revealed by the *misinterpretations* of those yells."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
