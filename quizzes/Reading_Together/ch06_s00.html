    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Reading_Together.html">&larr; Back to Let&#x27;s Read: Five Children and It</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is Martha's primary motivation for punishing the children by keeping them indoors?", "options": [{"text": "She enjoys the quiet in the house when they are confined.", "isCorrect": false, "rationale": "The text explicitly states that Martha knew 'what a noise there would be in the house all day,' indicating she did not anticipate quiet."}, {"text": "She believes it is her duty to correct their \"naughtiness\" for their own good.", "isCorrect": true, "rationale": "The text explains, 'She only thought she was doing her duty' and grown-ups often say they do it 'for your own good,' which is 'very often the truth' for Martha."}, {"text": "She is seeking revenge for the misfortunes they caused the day before.", "isCorrect": false, "rationale": "Martha considers it 'naughtiness,' not misfortune, but her motivation is duty and their good, not revenge."}, {"text": "She wants to ensure they appreciate the lovely day they are missing.", "isCorrect": false, "rationale": "Martha says, 'it seems almost a shame keeping of them indoors this lovely day,' indicating regret, not a punitive goal of making them appreciate it."}]}, {"question": "In the context of Martha's conversation with the cook, what does the phrase \"no rabbits caught!\" signify?", "options": [{"text": "A literal lack of rabbits for dinner.", "isCorrect": false, "rationale": "The text immediately clarifies, 'People say that in Kent when they mean 'and no work done'.' It is an idiom, not a literal statement."}, {"text": "The children have not yet completed their assigned chores.", "isCorrect": false, "rationale": "Martha says this to Eliza, urging her to get on with 'them beds,' referring to their own household work, not the children's chores."}, {"text": "There has been a significant delay in completing household tasks.", "isCorrect": true, "rationale": "The phrase is directly defined in the text as meaning 'and no work done,' which fits Martha's concern about the time ('Here's ten o'clock nearly')."}, {"text": "A lament about the beautiful day being wasted indoors.", "isCorrect": false, "rationale": "While Martha does comment on the 'lovely day,' the idiom 'no rabbits caught!' specifically refers to a lack of work accomplished."}]}, {"question": "Robert struggled to make a wish for the day because:", "options": [{"text": "The Psammead was pressuring him to hurry, making him anxious.", "isCorrect": false, "rationale": "While the Psammead did say 'Time flies,' Robert's initial struggle occurred before this comment and stemmed from his own inability to think of a suitable wish."}, {"text": "He could only think of personal desires that wouldn't benefit the group.", "isCorrect": true, "rationale": "The text states he 'could only think of things for himself, like toffee... or a clasp-knife' and 'things the others would not have cared for,' highlighting his struggle to find a collective wish."}, {"text": "He was worried the wish would lead to another punishment for the children.", "isCorrect": false, "rationale": "His immediate problem was what to wish for, not the consequences of a wish he hadn't yet formulated. He was more concerned about the difficulty of finding an amusing *indoor* wish."}, {"text": "He had forgotten where the rest of the children were to consult them.", "isCorrect": false, "rationale": "Robert clearly states, 'the others are kept indoors,' so he knew exactly where they were."}]}, {"question": "Robert's unexpected wish primarily enabled the Psammead to:", "options": [{"text": "Grant a wish to someone who was physically present with the Psammead.", "isCorrect": false, "rationale": "Robert's wish was specifically 'without their having to come here to ask for it,' indicating a remote granting of a wish."}, {"text": "Transfer its wish-granting ability to another individual.", "isCorrect": false, "rationale": "The Psammead still granted the wish itself, albeit remotely, rather than transferring its power."}, {"text": "Fulfill a wish for one of the other children without them needing to be near it.", "isCorrect": true, "rationale": "Robert's wish was explicitly, 'I wish you could give one of the others their wish without their having to come here to ask for it,' which the Psammead then fulfilled with great effort."}, {"text": "Prevent the other children from making any wishes until Robert returned.", "isCorrect": false, "rationale": "The Psammead's immediate warning, 'Run along home, or they're sure to wish for something silly before you get there,' indicates it did not prevent wishes but enabled one to be granted remotely."}]}, {"question": "Upon his return, what initial visual cue first made Robert realize that a significant wish had been granted in his absence?", "options": [{"text": "The sight of men in armor walking among tents.", "isCorrect": false, "rationale": "Robert saw the castle first, then observed the tents and men in armor as he got nearer."}, {"text": "The sudden disappearance of his family's house.", "isCorrect": true, "rationale": "The text states, 'for there was no house to be seen... where the house had stood - Robert rubbed his eyes and looked again. Yes, the others HAD wished - there was no doubt about that.'"}, {"text": "The discovery of a moat where the garden used to be.", "isCorrect": false, "rationale": "The moat is mentioned later, in relation to the castle gate, after he had already realized the house was gone and the castle was present."}, {"text": "A handkerchief being waved from a high window of a new building.", "isCorrect": false, "rationale": "He saw the handkerchief waving after he had already observed the castle and recognized it as a wish."}]}, {"question": "What conclusion does Robert draw immediately upon observing the castle surrounded by tents and armed men?", "options": [{"text": "The family's house has been accidentally replaced by a historical landmark.", "isCorrect": false, "rationale": "Robert instantly links the transformation to a wish, saying, 'They HAVE! They've wished for a castle!'"}, {"text": "The others wished for a castle, and now it is under attack.", "isCorrect": true, "rationale": "Robert exclaims, 'They've wished for a castle, and it's being besieged!' clearly understanding both components of the situation."}, {"text": "The Psammead has played a trick on them, turning their home into a fortress.", "isCorrect": false, "rationale": "He attributes the castle to the others' wish, not a trick by the Psammead, though he does express regret for having seen the 'beastly thing.'"}, {"text": "A real medieval army has somehow appeared in his garden.", "isCorrect": false, "rationale": "Robert connects the army's presence directly to the wish, understanding it as part of the castle's situation, not a random occurrence."}]}, {"question": "Robert decided not to run away from the approaching men in armor primarily because:", "options": [{"text": "He believed his small size would make him invisible if he stayed still.", "isCorrect": false, "rationale": "His reasoning was about the futility and irritation of running, not invisibility. He had already been seen."}, {"text": "He hoped to explain the situation to them immediately.", "isCorrect": false, "rationale": "His immediate thoughts were about the practicalities of escape, not about communication strategy at that moment. He later *hopes* to explain but that's after deciding not to run."}, {"text": "He judged running would be futile due to his shorter legs and might provoke them.", "isCorrect": true, "rationale": "The text states, 'Robert remembered the shortness of his own legs and did not run away. He knew it would be useless to himself, and he feared it might be irritating to the foe.'"}, {"text": "He was too awestruck by their historical appearance to move.", "isCorrect": false, "rationale": "While he was later 'dumb with admiration' for the leader, his decision not to run was a conscious, logical assessment of the situation, not a state of awe."}]}, {"question": "What was the main challenge Robert anticipated when trying to explain the situation to the besieging leader, Wulfric de Talbot?", "options": [{"text": "Wulfric's harsh and intimidating demeanor would make him afraid to speak.", "isCorrect": false, "rationale": "The leader was described as having 'a kind face' and speaking kindly, reassuring Robert he would 'take no scathe'."}, {"text": "Wulfric would not believe stories involving magical creatures like the Psammead.", "isCorrect": false, "rationale": "Robert 'had a wild feeling that this glorious leader of the besieging party - being himself part of a wish - would be able to understand better'."}, {"text": "He lacked the archaic vocabulary needed to communicate effectively in a historical manner.", "isCorrect": true, "rationale": "Robert's 'only difficulty was that he knew he could never remember enough 'quothas' and 'beshrew me's', and things like that, to make his talk sound like the talk of a boy in a historical romance.'"}, {"text": "The leader's questions were too complex for him to understand fully.", "isCorrect": false, "rationale": "While he sometimes struggled to follow the dialogue in romances, he was able to interpret the leader's meaning of 'hither' and 'intent' fairly well, even if his responses were literal."}]}, {"question": "The narrator's detailed description of the leader's anachronistic (out-of-place) armor serves to:", "options": [{"text": "Highlight the Psammead's magical ability to conjure items from different eras.", "isCorrect": false, "rationale": "The text attributes the inconsistency to the 'gifted artists who usually drew the pictures for the historical romances,' implying a commentary on the source of the wish's 'reality,' not the Psammead's specific magical style."}, {"text": "Emphasize Robert's deep knowledge of medieval history and warfare.", "isCorrect": false, "rationale": "The text explicitly states Robert 'knew no more of heraldry or archaeology than the gifted artists who usually drew the pictures for the historical romances,' meaning he *lacked* deep knowledge."}, {"text": "Subtly critique the historical inaccuracies often found in popular historical romances.", "isCorrect": true, "rationale": "The narrator's specific listing of items from 'quite different periods' and the comment about Robert's knowledge mirroring that of 'gifted artists' is a clear, subtle jab at the lack of historical accuracy in such children's literature."}, {"text": "Suggest that the leader is a time traveler rather than a product of a wish.", "isCorrect": false, "rationale": "Robert clearly perceives the leader as 'being himself part of a wish,' and the text supports the idea that the wish manifests elements from Robert's romanticized view of history, not actual time travel."}]}, {"question": "When the leader asks Robert \"What is thine intent?\" and expresses concern for his mother, Robert's response (\"I don't think so; you see, she doesn't know I'm out\") reveals:", "options": [{"text": "His naive belief that his mother's emotions are solely tied to her immediate awareness.", "isCorrect": true, "rationale": "Robert takes the leader's emotional statement ('thy mother's heart aches for thee e'en now') literally and logically concludes it can't be true if she doesn't know he's in danger or even 'out'."}, {"text": "His disrespect for the leader's authority and concern.", "isCorrect": false, "rationale": "Robert generally attempts to be polite and is impressed by the leader; his reply stems from a literal interpretation rather than disrespect."}, {"text": "His attempt to avoid explaining the true reason for his presence.", "isCorrect": false, "rationale": "Robert actually 'had a wild feeling' that the leader, being part of a wish, 'would be able to understand better' the true tale of the wishes and the Psammead, so he intended to explain."}, {"text": "His cynical view that adults' expressions of concern are often insincere.", "isCorrect": false, "rationale": "Robert's reaction is characterized by literal thinking and a lack of understanding of idiomatic or emotional expressions, not cynicism."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
