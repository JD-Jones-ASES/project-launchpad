<script>
var QUESTIONS = [{"question": "The day after the children's first wish, a series of mishaps prevented them from successfully communicating with their mother. What was the primary recurring challenge that thwarted their efforts to send letters?", "options": [{"text": "Lack of desire to communicate with their mother.", "isCorrect": false, "rationale": "The text explicitly states that 'they had all meant to do this' (tell their mother about the Psammead), indicating a desire to communicate, not a lack thereof."}, {"text": "Constant distractions and unforeseen accidents, such as an ink spill, lost letters, and difficulties with spelling, that prevented proper completion or timely delivery.", "isCorrect": true, "rationale": "Anthea's letter was ruined by an ink spill and the Lamb's antics, Robert's was unbegun due to the cleanup and a promise, Cyril's was lost after he left it, and Jane struggled with spelling 'Psammead' until it was too late. These illustrate constant disruptions and challenges."}, {"text": "Their mother's lack of interest in their daily activities.", "isCorrect": false, "rationale": "There is no indication in the text that their mother was uninterested. The focus is on the children's difficulties in writing and sending the letters."}, {"text": "The postman's irregular schedule.", "isCorrect": false, "rationale": "The postman was heard blowing his horn, and Robert rushed out to stop his cart, implying the postman was on schedule, but the letters were not ready."}]}, {"question": "Anthea decides to wake up early and visit the Psammead alone, reasoning that her plan 'would not be any better if she were to tell the others about it.' What does this action reveal about Anthea's approach to complex situations?", "options": [{"text": "She is inherently selfish and always seeks personal gain from the Psammead.", "isCorrect": false, "rationale": "Anthea explicitly tells the Psammead, 'everything we have wished has turned out rather horrid. I wish you would advise us.' Her goal is to resolve the group's misfortune, not to gain personally."}, {"text": "She lacks trust in her siblings' judgment and capabilities.", "isCorrect": false, "rationale": "While she prefers to go alone, the text suggests it's more about the effectiveness of *her* plan and less about a general mistrust of her siblings' abilities. She later states it's 'one thing to say you're silly, and quite another to say that other people are.'"}, {"text": "She recognizes that individual, focused initiative can sometimes be more effective than group consensus or potential distractions when facing a delicate or uncertain task.", "isCorrect": true, "rationale": "Her thought, 'she could not be sure that it was a good plan, but she was quite sure that it would not be any better if she were to tell the others about it,' indicates a strategic decision that going solo might reduce complications or make the interaction more productive."}, {"text": "She is afraid of what the Psammead might do if multiple children approach it at once.", "isCorrect": false, "rationale": "There is no textual evidence to support this fear. Her concern is about the plan's effectiveness and her preference for independent action."}]}, {"question": "Robert's choice of gift from Uncle Richard is presented as an example of a child unknowingly choosing 'a really instructive thing.' What was the deceptive nature of this gift?", "options": [{"text": "He chose a plain wooden box, not the model engine he desired.", "isCorrect": false, "rationale": "Cyril chose the model engine. Robert's box had pictures on it."}, {"text": "He chose a box with pictures of mythical winged creatures, expecting live animals, but received a Sunday puzzle about ancient Nineveh.", "isCorrect": true, "rationale": "The text states, 'He thought there would be animals inside, the same as on the box. When he got it home it was a Sunday puzzle about ancient Nineveh!'"}, {"text": "It was a very expensive item that he felt guilty about choosing.", "isCorrect": false, "rationale": "Uncle Richard explicitly allowed them to choose 'without any restrictions about price,' so expense was not a factor."}, {"text": "He chose a book of Latin proses, mistaking it for a storybook.", "isCorrect": false, "rationale": "Latin proses are mentioned as a general school exercise, not as Robert's specific gift."}]}, {"question": "The Psammead initially refuses to give advice to Anthea, stating, 'one thing I won't give - that's advice.' However, it later offers the saying, 'think before you speak,' quickly adding, 'That piece doesn't count... Besides, it's not original. It's in all the copy-books.' This interaction primarily suggests:", "options": [{"text": "The Psammead is a whimsical creature whose rules are easily broken by persistent children.", "isCorrect": false, "rationale": "The Psammead clarifies *why* it gives that specific piece of advice, not that its rules are simply broken. It provides a logical, albeit ancient, distinction."}, {"text": "The Psammead distinguishes between genuine, original 'advice' it won't offer and common, unoriginal wisdom that it deems acceptable to share.", "isCorrect": true, "rationale": "The Psammead's explanation that 'that piece doesn't count' because 'it's not original. It's in all the copy-books' directly indicates this distinction. It's not giving new advice, but reiterating common knowledge."}, {"text": "Anthea's flattery successfully manipulates the Psammead into breaking its own rules.", "isCorrect": false, "rationale": "While Anthea does flatter the Psammead, its reasoning for offering the 'advice' is tied to its lack of originality, not a change of heart due to flattery."}, {"text": "The Psammead secretly wishes to help the children but is bound by ancient magical laws.", "isCorrect": false, "rationale": "The Psammead already helps the children by granting wishes. Its specific refusal to give *advice* is a character trait, explained by the origin of the advice."}]}, {"question": "The Psammead warns Anthea about a 'little Ninevite boy' who flew 'high at sunset' after wishing for wings. Given the recurring pattern of wishes having unexpected or problematic consequences throughout the story, what does this warning most strongly imply about the nature of a wish for wings?", "options": [{"text": "It suggests that flying is inherently dangerous and should be avoided entirely.", "isCorrect": false, "rationale": "The Psammead says, 'I should think you might do worse,' implying wings aren't the worst wish, but still comes with a specific warning, not a general prohibition."}, {"text": "It highlights that even seemingly beneficial wishes come with specific conditions or potential perils if not exercised with caution and awareness of timing.", "isCorrect": true, "rationale": "The specific caution 'Only, take care you aren't flying high at sunset' directly reinforces the story's theme that wishes, even for desirable things like wings, have particular dangers or downsides that require careful consideration and usage."}, {"text": "It indicates that ancient Ninevite children were particularly prone to accidents.", "isCorrect": false, "rationale": "The 'Ninevite boy' is an example, not a generalization about Ninevite children. The lesson is universal regarding the consequences of wishes."}, {"text": "It means that only children from specific historical periods could safely use wings.", "isCorrect": false, "rationale": "The Psammead is offering a cautionary tale applicable across time, not a historical limitation on wish effects."}]}, {"question": "Anthea's success in making the 'very cross' Psammead more amenable to conversation despite its initial irritation demonstrates her gentle persuasion. What specific actions did she take to soothe and warm the creature?", "options": [{"text": "She offered it a special kind of magical sand from another pit.", "isCorrect": false, "rationale": "This action is not mentioned in the text. Anthea uses her own belongings and body warmth."}, {"text": "She prepared it a warm drink and a small blanket.", "isCorrect": false, "rationale": "This action is not mentioned in the text. She is out early in the morning and uses what she has on hand."}, {"text": "She covered it with her white pinafore for warmth and then invited it to sit on her lap, wrapping her frock skirt around it.", "isCorrect": true, "rationale": "Anthea 'took off her white pinafore and covered the Sand-fairy up with it' and later asked, 'would you like to come and sit on my lap? You'd be warmer, and I could turn the skirt of my frock up round you.'"}, {"text": "She promised to never wish for anything again if it would just talk to her.", "isCorrect": false, "rationale": "Anthea specifically asks it *not* to give wishes 'till after breakfast,' not to stop giving wishes permanently."}]}, {"question": "The chapter details multiple attempts by the children to write letters to their mother, all of which fail to convey their secret about the Psammead. This repeated failure serves to emphasize which narrative element?", "options": [{"text": "The children's general incompetence in writing and communication.", "isCorrect": false, "rationale": "While Jane struggles with spelling, Cyril writes 'very fast,' and Robert draws, suggesting varied, not uniform, competence. The issue is broader than just skill."}, {"text": "The inherent difficulty of explaining truly extraordinary or magical experiences through ordinary means, especially when combined with everyday mishaps and the challenges of childhood.", "isCorrect": true, "rationale": "The combination of the extraordinary nature of the Psammead, the children's struggle to articulate it ('useless to tell a story unless you do tell it properly,' difficulty spelling 'Psammead'), and common childhood mishaps (ink spill, lost letter) makes communication of their secret impossible, highlighting this narrative element."}, {"text": "Their collective decision to intentionally keep the Psammead a secret from all adults.", "isCorrect": false, "rationale": "The text explicitly states, 'they had all meant to do this' (tell their mother), indicating their intent was to share, not to keep it secret intentionally during the letter-writing."}, {"text": "The unreliability of the postal service in their time.", "isCorrect": false, "rationale": "The postal service is shown to be functional, as Robert can run out to stop the cart and Jane's letter eventually goes. The issue lies with the children's ability to prepare the letters for sending."}]}, {"question": "Anthea has a unique and precise method for ensuring she wakes up at a specific time, such as five o'clock. What are the key components of this self-waking technique?", "options": [{"text": "Drinking a glass of water before bed and thinking about the desired wake-up time.", "isCorrect": false, "rationale": "The text does not mention drinking water as part of her method."}, {"text": "Repeating the desired wake-up time aloud while performing a specific physical action (chin to chest, head bang) a number of times corresponding to the hour, combined with a genuine desire to wake up.", "isCorrect": true, "rationale": "The text describes this method: 'you say 'I must wake up at five'... and as you say it you push your chin down on to your chest and then bang your head back on the pillow. And you do this as many times as there are ones in the time you want to wake up at. ... Of course everything depends on your really wanting to get up at five'."}, {"text": "Placing a cold compress on her forehead and visualizing the clock.", "isCorrect": false, "rationale": "Anthea puts her face and hands in cold water *after* waking, as a 'fairy charm that prevents your wanting to get back into bed again,' not to help her wake up initially."}, {"text": "Asking the black-and-gold clock to strike the correct time for her.", "isCorrect": false, "rationale": "The black-and-gold clock always struck wrong; Anthea understood its 'language,' but it didn't wake her up precisely."}]}, {"question": "The description of the black-and-gold clock striking eleven when it's three minutes to five, and Anthea understanding its meaning as 'clock language,' primarily functions to:", "options": [{"text": "Highlight the humorous chaos and lack of precision within the children's household.", "isCorrect": false, "rationale": "While there's an element of humor, the primary function is less about general chaos and more about Anthea's specific ability to interpret it."}, {"text": "Demonstrate Anthea's precocious ability to master foreign languages and complex codes.", "isCorrect": false, "rationale": "The text states it's 'like a person talking a foreign language,' but the specific example is limited to this unique clock, not a general linguistic skill."}, {"text": "Establish Anthea's unique perceptiveness and her ability to navigate and interpret the idiosyncratic elements of her environment, including the unusual and seemingly illogical.", "isCorrect": true, "rationale": "Anthea's understanding of the clock's 'language' shows her ability to make sense of something unconventional and specific to her world, preparing the reader for her unique interaction with the magical Psammead and the challenges of the wish-granting environment."}, {"text": "Imply that the clock itself possesses a form of magical consciousness.", "isCorrect": false, "rationale": "The text attributes the 'understanding' to Anthea, stating 'Anthea knew the clock language,' not that the clock itself is magical or conscious beyond its unique way of telling time."}]}, {"question": "The narrator states, 'They did not tell Uncle Richard anything about the Psammead. I do not know why. And they do not know why. But I daresay you can guess.' Based on the events of the chapter, what is the most plausible inference for their continued secrecy from Uncle Richard?", "options": [{"text": "They believed Uncle Richard, being an adult, would not believe in such a creature.", "isCorrect": false, "rationale": "While this is a common trope, the text doesn't specifically hint at Uncle Richard's skepticism. The children had *intended* to tell their mother, suggesting adult belief wasn't the initial deterrent."}, {"text": "Their previous, repeated failures to articulate or successfully communicate the Psammead's existence to their mother, due to various mishaps and the inherent strangeness of the topic, likely made them reluctant to try again with another adult.", "isCorrect": true, "rationale": "The chapter's extensive detailing of the children's inability to convey their secret in letters, combined with the difficulty of explaining the inexplicable, makes it highly plausible that they anticipated similar challenges with Uncle Richard and opted for silence, even if they couldn't consciously articulate this reason."}, {"text": "Uncle Richard had a reputation for being strict and might have punished them for associating with a magical being.", "isCorrect": false, "rationale": "The text describes Uncle Richard as 'the very best kind of uncle,' who was generous and unrestricted in gift-giving, contradicting the idea of him being strict or punitive."}, {"text": "They wanted to keep the magical wishes entirely for themselves and avoid sharing them with adults.", "isCorrect": false, "rationale": "Their earnest attempts to tell their mother earlier contradict this. The issue was communicating the secret, not withholding the wishes themselves."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
