    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Reading_Together.html">&larr; Back to Let&#x27;s Read: Five Children and It</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 7</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What was the primary challenge the children faced regarding their dinner at the beginning of the section?", "options": [{"text": "They didn't like the taste of the food.", "isCorrect": false, "rationale": "The text states the dinner was 'invisible' and 'unfeelable', indicating a problem of tangibility, not taste preference."}, {"text": "The food was physically present but they couldn't reach it.", "isCorrect": false, "rationale": "The text explicitly says 'for them there was nothing there BUT table', meaning the food was not physically present for them to interact with, not just out of reach."}, {"text": "The food was invisible and unfeelable to them.", "isCorrect": true, "rationale": "The opening lines clearly state, 'the dinner was invisible, and unfeelable too; for, when they rubbed their hands along the table, they knew but too well that for them there was nothing there BUT table.'"}, {"text": "Martha refused to serve them dinner.", "isCorrect": false, "rationale": "Martha 'brought in the dinner', implying she did serve it, but the children could not perceive it due to its invisibility."}], "id": "q01"}, {"question": "Cyril's initial explanation for why the biscuits were real, unlike the invisible dinner, was that:", "options": [{"text": "They were a special kind of magical biscuit.", "isCorrect": false, "rationale": "Cyril does not suggest the biscuits are magical; his explanation is tied to their origin and possession."}, {"text": "He had personally acquired them and kept them in his pocket.", "isCorrect": true, "rationale": "Cyril states, 'I don't know...unless it's because WE had them. Nothing about us has changed. Everything's in my pocket all right.' This suggests possession and proximity to their person made them tangible."}, {"text": "The cook had enchanted them to be visible.", "isCorrect": false, "rationale": "Cyril explicitly says he got them from the cook, but there's no mention of enchantment; his focus is on his personal possession of them."}, {"text": "They were too small to be affected by the invisibility spell.", "isCorrect": false, "rationale": "The size of the biscuits is not given as a reason for their visibility; the magical effect seems to be tied to personal connection rather than object dimensions."}], "id": "q02"}, {"question": "Based on how Cyril and the others eventually made the invisible food real, what seems to be the underlying magical principle at play?", "options": [{"text": "Food only becomes real when placed in one's mouth or pocket.", "isCorrect": false, "rationale": "While food did become real in their mouths and pockets, the core principle is more about the intent and act of possession/consumption rather than just the physical location. 'If we HAD the mutton it would be real,' implies ownership, which is then made tangible by the act of eating."}, {"text": "Food from the outside world is always real, while castle food is not.", "isCorrect": false, "rationale": "The text doesn't differentiate food by its origin (inside or outside the castle); the distinction is based on whether the children 'had' it."}, {"text": "The act of intending to consume or possess an item makes it tangible for the children.", "isCorrect": true, "rationale": "Cyril successfully makes bread real by opening and shutting his mouth 'as if he were taking bites out of air.' Robert captures mutton the same way. This shows that the intention and action of 'having' or 'eating' the food transforms its magical state into reality for them."}, {"text": "Magic only affects solid foods, not liquids or other dinner items.", "isCorrect": false, "rationale": "The text does not specify limitations based on food type, only on the children's interaction with it. They were trying to eat an entire invisible dinner, which likely included various types of food."}], "id": "q03"}, {"question": "How did Martha react to the children's successful, albeit messy, method of eating the suet roly-poly?", "options": [{"text": "She was pleased they had finally eaten.", "isCorrect": false, "rationale": "Martha's reaction was one of dismay at the state of the table, not satisfaction that they had eaten."}, {"text": "She expressed bewilderment and annoyance at the mess.", "isCorrect": true, "rationale": "When Martha came to change the plates, 'she said she had never seen such a mess in all her born days' and later, 'Well, I never - what next, I wonder!' indicating annoyance and bewilderment."}, {"text": "She asked them to explain their strange eating habits.", "isCorrect": false, "rationale": "While she expressed surprise, she didn't ask for an explanation of their eating method; she questioned their preference for plain pudding."}, {"text": "She immediately understood the magical circumstances.", "isCorrect": false, "rationale": "Martha's comments show she had no understanding of the magical reason for the mess, only that it was unprecedented."}], "id": "q04"}, {"question": "If the children were to apply their understanding of medieval castle defenses, which of the following actions would they consider most effective against an approaching battering-ram?", "options": [{"text": "Sending out a party to negotiate with the besiegers.", "isCorrect": false, "rationale": "The children's immediate reaction is to defend aggressively, not to negotiate. Robert later rejects the summons to surrender outright."}, {"text": "Pouring boiling lead or, failing that, cold water, onto the besiegers.", "isCorrect": true, "rationale": "Anthea recalls her father showing her holes at Bodiam Castle 'on purpose for pouring it down through,' and they later brought up 'iron pots of cold water to pour on the besiegers instead of hot lead,' which directly addresses a threat like a battering-ram at the gate."}, {"text": "Using longbows to shoot arrows from the castle walls.", "isCorrect": false, "rationale": "The text explicitly states that 'none of the children could even begin to bend them' (longbows), making this an impractical defense for them."}, {"text": "Dropping daggers and knives from the gate-tower.", "isCorrect": false, "rationale": "While they did collect daggers to drop, this is a less effective countermeasure against a heavy battering-ram than a large volume of liquid poured from above."}], "id": "q05"}, {"question": "The text highlights a key difference in how Robert and the other children generally perceived the siege for much of the afternoon. What was this difference?", "options": [{"text": "Robert saw it as a grand adventure, while others were bored.", "isCorrect": false, "rationale": "The others found it 'exciting' and a 'splendidly distinct and perfectly safe dream,' not boring."}, {"text": "Robert viewed it as a deadly, real threat, while the others saw it as a game or a dream.", "isCorrect": true, "rationale": "The text states, 'none of them, except Robert, could feel all the time that this was real deadly dangerous work. To the others... the whole thing seemed half a game of make-believe, and half a splendidly distinct and perfectly safe dream.'"}, {"text": "Robert was constantly scared, while the others remained calm.", "isCorrect": false, "rationale": "Robert is depicted as brave and even putting his tongue out at the besiegers, while Jane, for example, is 'far too pale' and scared."}, {"text": "Robert was the only one who believed in the magic, while others were skeptical.", "isCorrect": false, "rationale": "All the children participated in the magic of making food real, showing a shared acceptance of that aspect of their situation."}], "id": "q06"}, {"question": "Anthea demonstrated her practical thinking during the afternoon by:", "options": [{"text": "Suggesting they use longbows, which she knew were powerful.", "isCorrect": false, "rationale": "Anthea knew about boiling lead, but it was Cyril who mentioned longbows, and they found them too heavy to use."}, {"text": "Immediately understanding how the drawbridge mechanism worked.", "isCorrect": false, "rationale": "Cyril noted he 'should never have known how to work it' and the children didn't interact with it. Anthea showed no specific knowledge of this."}, {"text": "Requesting biscuits for tea specifically to 'provision the garrison' by utilizing the pocket magic.", "isCorrect": true, "rationale": "Anthea had a 'sudden and valuable idea' to ask Martha for biscuits for tea, asking for hers in her pocket 'to provision the garrison,' directly applying their unique 'pocket magic' to their siege play."}, {"text": "Being the first to identify the besiegers' leader on the grey horse.", "isCorrect": false, "rationale": "Anthea pointed out the leader, but Robert was the one she confirmed it with, implying he may have known or identified him first."}], "id": "q07"}, {"question": "The sudden sound that made Cyril drop three reserve biscuits served as a pivotal moment because it:", "options": [{"text": "Signified the children's exhaustion after a long afternoon.", "isCorrect": false, "rationale": "The sound, a 'loud fierce cry of a trumpet,' energized them, turning their focus to the imminent attack, rather than signifying exhaustion."}, {"text": "Marked the official commencement of the besiegers' attack and heightened the sense of reality.", "isCorrect": true, "rationale": "The trumpet blast led Robert to declare, 'You see it IS real... and they are going to attack.' This instantly shifted the children's perception and prepared them for battle."}, {"text": "Revealed that the besiegers had a hidden magical ability to create sounds.", "isCorrect": false, "rationale": "The trumpet sound is presented as a realistic element of a siege, not a magical one from the besiegers."}, {"text": "Caused an argument among the children about who was the bravest.", "isCorrect": false, "rationale": "While a brief exchange about bravery happens shortly after, the trumpet's direct effect was to signal the attack, not cause an argument."}], "id": "q08"}, {"question": "Jane's increasing anxiety near the end of the section is best illustrated by her:", "options": [{"text": "Insistence that they try to negotiate with the besiegers.", "isCorrect": false, "rationale": "Jane's fear makes her want to stop playing, not negotiate. It's Anthea who tries to reassure her about 'civilized armies.'"}, {"text": "Questioning whether the besiegers are 'civilized' and expressing a desire not to play.", "isCorrect": true, "rationale": "Jane asks, 'But are you quite, quite sure they ARE civilized?' and earlier says, 'I don't want to play,' clearly indicating her growing fear and desire to end the 'game.'"}, {"text": "Attempting to hide in the stone cupboard with the reserve biscuits.", "isCorrect": false, "rationale": "Cyril was putting away the biscuits when the trumpet sounded; Jane did not try to hide there."}, {"text": "Criticizing Cyril for wishing for a castle in the first place.", "isCorrect": false, "rationale": "While she tells Cyril he was 'a perfect silly to wish for a castle,' this is part of her overall expression of fear and wanting to stop playing, but the core of her anxiety is about the reality and civility of the attackers, not just Cyril's initial wish."}], "id": "q09"}, {"question": "When the besiegers' man shouted, 'Do ye surrender?', Robert's immediate and unequivocal response, followed by rallying the children to cheer, demonstrates which of the following?", "options": [{"text": "His impetuous nature and disregard for potential consequences.", "isCorrect": false, "rationale": "While Robert is bold, his response is presented as a firm, determined defense of the castle, showing leadership and resolve, rather than a reckless disregard for consequences. He is taking the 'game' seriously."}, {"text": "His determination to maintain the illusion of the game for the others.", "isCorrect": false, "rationale": "Robert is the one who most strongly believes the siege is 'real,' and his actions are consistent with defending a real castle, not maintaining an illusion for others."}, {"text": "His emerging leadership and resolve in the face of perceived danger.", "isCorrect": true, "rationale": "Robert immediately shouts 'No...Never, Never, NEVER!' and then takes charge by saying, 'Cheer...rattle the daggers to make more noise,' actively leading the defense and showing determination."}, {"text": "His understanding that the besiegers were bluffing and would not attack.", "isCorrect": false, "rationale": "Robert's actions and earlier statement ('You see it IS real... and they are going to attack') indicate he fully believes the threat is imminent, not a bluff."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
