        <div class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 11</div>

</div>

<script>
var QUESTIONS = [{"question": "What significant news at breakfast caused the children to abandon their initial wish ideas?", "options": [{"text": "A letter arrived announcing a family trip to the seaside.", "isCorrect": false, "rationale": "The text states 'a letter from mother' but it was about Granny being better and parents coming home, not a family trip to the seaside."}, {"text": "Their parents were coming home that very afternoon.", "isCorrect": true, "rationale": "The text explicitly states: 'First, there was a letter from mother. Granny was better, and mother and father hoped to be home that very afternoon. A cheer arose. And of course this news at once scattered all the before-breakfast wish-ideas. For everyone saw quite plainly that the wish for the day must be something to please mother and not to please themselves.'"}, {"text": "They heard about a massive treasure hunt starting that day.", "isCorrect": false, "rationale": "There is no mention of a treasure hunt in the text."}, {"text": "Martha informed them that their allowance had been doubled.", "isCorrect": false, "rationale": "Martha shared news about burglars, not an allowance increase."}]}, {"question": "What specific incident reported by Martha at breakfast indirectly led to Jane's critical wish?", "options": [{"text": "A local fair was coming to town, exciting the children.", "isCorrect": false, "rationale": "Martha's news was dark and important, not about a fair."}, {"text": "Lady Chittenden's diamonds and jewels were stolen from Peasmarsh Place.", "isCorrect": true, "rationale": "Martha dramatically announces, 'There's been burglars over at Peasmarsh Place... and they've took every single one of Lady Chittenden's diamonds and jewels and things.' This leads directly to Jane's wish about Mother finding 'all those lovely things' like necklaces and tiaras."}, {"text": "A new family with many children had moved into the neighboring house.", "isCorrect": false, "rationale": "The news was about a serious crime, not new neighbors."}, {"text": "The local bakery had run out of their favorite pastries.", "isCorrect": false, "rationale": "This is a trivial detail not mentioned and wouldn't lead to the plot's central conflict."}]}, {"question": "What was Cyril's primary argument against telling their mother the truth about the Psammead and the jewels?", "options": [{"text": "He believed she would be angry about them keeping secrets.", "isCorrect": false, "rationale": "While she might be angry, Cyril's main concern was her disbelief and the dire consequences that would follow from that."}, {"text": "He feared she would think they were mad and send them to an asylum.", "isCorrect": true, "rationale": "Cyril explicitly states, 'She'll think we're raving mad, and then we shall be sent to Bedlam... How would you like it, to be shut up in an iron cage with bars and padded walls...' This was his strongest point against telling the truth."}, {"text": "He thought she would demand they return all the Psammead's previous wishes.", "isCorrect": false, "rationale": "This is not mentioned as a fear of Cyril's."}, {"text": "He worried she would confiscate all their pocket money.", "isCorrect": false, "rationale": "Confiscating pocket money is too minor a concern compared to being sent to an asylum."}]}, {"question": "Which of the following best describes Jane's exact wish that caused the main problem in the chapter?", "options": [{"text": "She wished for her mother to receive a gift of new jewels from an anonymous admirer.", "isCorrect": false, "rationale": "Jane's wish was much more direct about finding existing jewels in her mother's room."}, {"text": "She wished their mother could find Lady Chittenden's stolen jewels in her own room upon returning home.", "isCorrect": true, "rationale": "Jane's wish was, 'Wouldn't it be jolly... if mother could find all those lovely things, necklaces and rivers of diamonds and tarrers?... in her room when she came home? I wish she would.' This wish, combined with the earlier news of Lady Chittenden's stolen jewels, directly implies the Psammead brought those specific stolen jewels."}, {"text": "She wished for her mother to discover a long-lost family heirloom hidden in the house.", "isCorrect": false, "rationale": "The wish was explicitly about 'lovely things, necklaces and rivers of diamonds and tarrers,' which directly echoed Martha's description of Lady Chittenden's stolen items, not family heirlooms."}, {"text": "She wished for a magical fairy to present her mother with a dazzling diamond necklace.", "isCorrect": false, "rationale": "While a fairy was involved, the wish was about her mother 'finding' the items, not being 'presented' them by a fairy, and it was about specific types of jewels, not just a necklace."}]}, {"question": "Before their mother arrived, the children put flowers in all the vases and pots. What was their primary intention behind this action?", "options": [{"text": "To hide the stolen jewels amongst the greenery.", "isCorrect": false, "rationale": "They had already searched for the jewels and failed; the jewels were meant for the mother to find. Hiding them wasn't the goal of the flowers."}, {"text": "To celebrate their mother's return with a pleasant and distracting atmosphere.", "isCorrect": true, "rationale": "Cyril says, 'Let's put flowers in all the vases, and try not to think about diamonds.' The text then describes them filling the house with flowers until it was 'a perfect bower,' and Mother was 'very delighted with the flowery-boweryness of the house.' This was an attempt to make things seem normal and pleasant, creating a welcoming atmosphere, rather than drawing attention to a problem."}, {"text": "To create a distraction so their mother wouldn't notice the missing Psammead.", "isCorrect": false, "rationale": "The Psammead's presence or absence in the house wasn't a concern for the mother to notice."}, {"text": "To signal to the Psammead that they needed another wish.", "isCorrect": false, "rationale": "There is no indication that flowers served as a signal to the Psammead, and they were actively trying to find the Psammead directly to undo the wish."}]}, {"question": "When their mother started to go upstairs to her bedroom, why did the children try so desperately to stop her?", "options": [{"text": "They wanted her to play with them downstairs first.", "isCorrect": false, "rationale": "While they loved her, their desperation stemmed from a much more serious reason than wanting to play."}, {"text": "They knew she would find the stolen jewels and they wanted to delay the discovery.", "isCorrect": true, "rationale": "The children had already searched for the jewels and couldn't find them, concluding 'It'll be mother who'll do that.' They knew the wish meant she would find them in her room, and they wanted to prevent or at least delay this discovery, as shown by their frantic attempts: 'Don't go up, mummy darling,' 'Or I will,' 'We want you to come and look at the rose-tree,' 'Oh, don't go up!'"}, {"text": "They were afraid she would discover the mess they had made searching for the Psammead.", "isCorrect": false, "rationale": "The text doesn't indicate a significant mess in the bedroom, and their fear was much greater than a mere messy room."}, {"text": "They had hidden a surprise gift for her in another room.", "isCorrect": false, "rationale": "There's no mention of a surprise gift in another room; the focus is entirely on the impending discovery in her bedroom."}]}, {"question": "Upon finding the jewels, Jane confesses, 'We found a Fairy.' What was Cyril's immediate reaction and strategy to mitigate the situation?", "options": [{"text": "He confessed the whole truth about the Psammead to their mother.", "isCorrect": false, "rationale": "Cyril had previously argued strongly against telling the truth about the Psammead, fearing their mother would think them mad. He actively tried to stop Jane from revealing this."}, {"text": "He interrupted Jane and suggested the jewels were Lady Chittenden's, left by burglars.", "isCorrect": true, "rationale": "When Jane says, 'We found a Fairy,' Cyril immediately interjects, 'Don't be silly, Jane.' He then quickly formulates a plausible, though untrue, explanation: 'Look here, mother, we've never seen the things before, but Lady Chittenden at Peasmarsh Place lost all her jewellery by wicked burglars last night. Could this possibly be it?'"}, {"text": "He denied Jane's statement and claimed the jewels belonged to their father.", "isCorrect": false, "rationale": "He didn't claim they were their father's; he linked them to Lady Chittenden's theft."}, {"text": "He tried to make the jewels vanish by wishing them away again.", "isCorrect": false, "rationale": "The Psammead was not found, so he couldn't wish them away."}]}, {"question": "Why did Robert suggest waiting for his father to return home before their mother called the police?", "options": [{"text": "He wanted his father to handle the police interaction, believing he might be more understanding or effective, or that the wish might vanish.", "isCorrect": true, "rationale": "The text states Robert 'knowing that his father would not be home before sunset.' By sunset, Psammead wishes typically vanish. This suggests Robert hoped his father's presence would either delay the police until the jewels disappeared or provide an adult who might believe or handle their fantastical explanation better than a distraught mother or disbelieving police."}, {"text": "He believed his father had secretly bought the jewels as a surprise for their mother.", "isCorrect": false, "rationale": "There is no textual support for this belief; the context is about stolen jewels."}, {"text": "He was afraid of the police and wanted to avoid them entirely.", "isCorrect": false, "rationale": "While fear might be present, the explicit reason ties to his father's arrival time, which coincides with the sunset, a time when wishes usually vanish."}, {"text": "He thought the police would only listen to an adult male.", "isCorrect": false, "rationale": "While possibly true in the era, the primary implied reason links to the Psammead's powers and the vanishing of wishes at sunset, making his father's late arrival a strategic delay."}]}, {"question": "What critical aspect of the Psammead's wishes did the children, particularly Jane, forget or momentarily overlook when Jane made her wish?", "options": [{"text": "Wishes granted by the Psammead are permanent and irreversible.", "isCorrect": false, "rationale": "The children immediately sought the Psammead to take back the wish, indicating they knew wishes could be reversed if the creature was found and willing."}, {"text": "Wishes must be spoken directly to the Psammead to be effective.", "isCorrect": false, "rationale": "Anthea explicitly warns, 'Remember, we get our wishes now just wherever we happen to be when we say 'I wish'.' Jane's wish proved this point."}, {"text": "Wishes come true immediately and literally, often with unforeseen and negative consequences.", "isCorrect": true, "rationale": "The children had several prior experiences where wishes came true instantly and literally, leading to trouble (e.g., getting in for 'anything silly' as Anthea warned). Jane's wish for Mother to 'find all those lovely things' immediately resulted in the stolen diamonds appearing, highlighting the lack of foresight regarding the *source* and *legality* of the 'lovely things.'"}, {"text": "Wishes only work for selfish desires, not for pleasing others.", "isCorrect": false, "rationale": "The children specifically decided the wish 'must be something to please mother,' indicating they believed the Psammead could grant wishes for others."}]}, {"question": "The children's interaction with Martha regarding the burglary, and their subsequent thoughts about Lady Chittenden, reveal what about their moral perspective?", "options": [{"text": "They believed wealth should always be shared equally among everyone.", "isCorrect": false, "rationale": "Their comments were specific to Lady Chittenden's character and her existing wealth, not a general philosophy of wealth distribution."}, {"text": "They associated Lady Chittenden's negative character with her undeserved possession of vast riches.", "isCorrect": true, "rationale": "Anthea states, 'I don't see why she should ever have had such lots of diamonds... She was rather a nasty lady, I thought.' This implies a judgment that a 'nasty lady' doesn't deserve such wealth, especially compared to their own mother who 'hasn't any diamonds, and hardly any jewels.' This moral judgment implicitly connects character with the right to wealth."}, {"text": "They were indifferent to the concept of theft as long as no one they knew was harmed.", "isCorrect": false, "rationale": "They understood the severity of the theft, especially regarding its impact on their mother's potential legal trouble."}, {"text": "They thought it was humorous that such a rich person could be robbed.", "isCorrect": false, "rationale": "There is no indication of humor; rather, Anthea's comments are critical and judgmental."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
