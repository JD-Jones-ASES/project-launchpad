<body>

<script>
var QUESTIONS = [{"question": "Upon their arrival, how did the children's initial perception of the White House primarily differ from their mother's?", "options": [{"text": "The children found the house too small and impractical, while their mother admired its rustic charm.", "isCorrect": false, "rationale": "The text states the mother found the house inconvenient and annoying, while the children viewed it as a 'Fairy Palace set down in an Earthly Paradise'."}, {"text": "The children saw it as a magical, exciting place of freedom, whereas their mother perceived it as ordinary and inconvenient.", "isCorrect": true, "rationale": "The children immediately embraced the house as a 'Fairy Palace' offering freedom from rules, while their mother 'thought it was rather inconvenient, and was quite annoyed at there being no shelves'."}, {"text": "The children were disappointed by its plainness, but their mother was thrilled by its spaciousness.", "isCorrect": false, "rationale": "The children were thrilled by the sense of freedom and new experiences, despite the house itself being 'quite ordinary'. Their mother was annoyed by its practical shortcomings."}, {"text": "Both the children and their mother were equally enthusiastic about the house's potential for adventure.", "isCorrect": false, "rationale": "The text clearly establishes a contrast, with the children finding it 'decent' and a 'Fairy Palace,' while the mother was 'inconvenient' and 'annoyed'."}], "id": "q01"}, {"question": "According to the narrator, what is the primary reason many children in towns like London become 'extremely naughty'?", "options": [{"text": "They are naturally more mischievous due to their urban environment.", "isCorrect": false, "rationale": "The narrator implies that the naughtiness is a symptom of their environment, not an inherent trait. The reasons are explained as being different from country children's naughtiness."}, {"text": "They lack access to natural, varied environments and unrestricted play that allow for healthy exploration.", "isCorrect": true, "rationale": "The narrator states London lacks 'nice things that children may play with without hurting the things or themselves - such as trees and sand and woods and waters,' and that everything is 'all straight lines and flat streets, instead of being all sorts of odd shapes, like things are in the country.' This lack of stimulating, natural environment leads to naughtiness."}, {"text": "Their parents are often too poor to provide them with stimulating activities like theatres and shops.", "isCorrect": false, "rationale": "While the text mentions that poor relations mean not going to theatres or buying from shops, the narrator's main explanation for naughtiness focuses on the lack of natural, varied play environments, not just economic limitations on entertainment."}, {"text": "They are constantly told 'You mustn't touch,' which makes them rebellious.", "isCorrect": false, "rationale": "While the 'You mustn't touch' rule is mentioned as a characteristic of London, the primary cause for naughtiness is attributed to the lack of natural, varied surroundings that children can interact with freely, rather than just the prohibitions themselves."}], "id": "q02"}, {"question": "The narrator explicitly states a preference for telling 'really astonishing things' rather than 'ordinary things.' What does this choice reveal about the narrator's perspective on storytelling?", "options": [{"text": "The narrator believes that everyday events are too boring to capture the reader's interest.", "isCorrect": false, "rationale": "The narrator actually says, 'I could go on and make this into a most interesting story about all the ordinary things... and you would believe every word of it.' The choice is not about boredom, but about what grown-ups believe and what makes a 'wonderful' story."}, {"text": "The narrator aims to appeal primarily to children, who are more open to believing extraordinary events than adults.", "isCorrect": true, "rationale": "The narrator states, 'Grown-up people find it very difficult to believe really wonderful things, unless they have what they call proof. But children will believe almost anything, and grown-ups know this.' This highlights a focus on children as the ideal audience for 'astonishing things'."}, {"text": "The narrator is constrained by the publishers to only include exciting, fantastical elements.", "isCorrect": false, "rationale": "There is no mention of external constraints from publishers. The choice is presented as the narrator's own decision based on appealing to a specific audience (children) and avoiding adult skepticism."}, {"text": "The narrator wishes to avoid critical feedback from adults who might find 'ordinary things' too relatable.", "isCorrect": false, "rationale": "The narrator mentions aunts writing 'How true!' in the margin as a reason to avoid ordinary things, but this is linked to adult belief systems and their skepticism about 'wonderful things' without 'proof.' The primary reason is to tell things that children will believe and grown-ups might not."}], "id": "q03"}, {"question": "Which set of details best represents the 'Earthly Paradise' aspect of the White House that captivated the children?", "options": [{"text": "The ironwork on the roof and coping, the lack of shelves, and the inconvenient layout.", "isCorrect": false, "rationale": "These were aspects that annoyed the mother and were considered 'an architect's nightmare' by the father, not features that delighted the children."}, {"text": "The bustling activity of the limekilns and brewery, and the nearby town for excursions.", "isCorrect": false, "rationale": "While the scenery with the limekilns and brewery is described as beautiful, it's the natural, unrestricted elements of the house and its immediate grounds that formed their 'Earthly Paradise,' not industrial activity or proximity to a town."}, {"text": "The sweet-smelling jasmine, a smooth green lawn, a stable with old hay, and freedom from rules.", "isCorrect": true, "rationale": "These are explicitly mentioned as things that made the children 'almost certain' of happiness, culminating in 'no rules about not going to places and not doing things.' These sensory and freedom-related details contribute to their 'Fairy Palace' perception."}, {"text": "The fact that it was 'quite ordinary,' and the father's appreciation for its rural isolation.", "isCorrect": false, "rationale": "The house being 'quite ordinary' was a mother's observation; the children saw beyond its ordinariness. The father's view on isolation isn't highlighted as central to the children's joy."}], "id": "q04"}, {"question": "What common childhood belief about the world do the children demonstrate through their actions in the gravel-pit?", "options": [{"text": "That nature is inherently dangerous and must be approached with caution.", "isCorrect": false, "rationale": "While they show some caution (e.g., Jane's fear of falling to Australia), their primary actions, like digging through the earth, demonstrate a fearless, imaginative engagement with nature, not caution."}, {"text": "That the earth is flat, allowing for easy travel to distant lands by digging straight down.", "isCorrect": false, "rationale": "The text explicitly states, 'These children, you see, believed that the world was round, and that on the other side the little Australian boys and girls were really walking wrong way up.'"}, {"text": "That the world is round, and digging straight down can lead to the antipodes where people walk upside down.", "isCorrect": true, "rationale": "The text states: 'These children, you see, believed that the world was round, and that on the other side the little Australian boys and girls were really walking wrong way up, like flies on the ceiling, with their heads hanging down into the air.' This directly explains their 'Australia' digging game."}, {"text": "That the gravel-pit was once a real seaside, with magical creatures and buried treasure.", "isCorrect": false, "rationale": "While Jane imagines it was 'wet sea here once' and wishes for treasure, this is her specific imaginative play, not a core belief about the world's structure demonstrated by their collective 'digging to Australia' project."}], "id": "q05"}, {"question": "What motivated Cyril to suggest digging in the gravel-pits, specifically stating, 'We can pretend it's seaside'?", "options": [{"text": "They had recently visited Margate seaside and wanted to recreate the experience.", "isCorrect": false, "rationale": "The text mentions 'Margate spades,' implying familiar tools, but specifically states they hadn't been to the seaside for 'two years' while in London. Their motive was to *simulate* a seaside experience, not recreate a recent one."}, {"text": "Their parents had forbidden them from playing anywhere else in the countryside.", "isCorrect": false, "rationale": "The text states 'there were no rules about not going to places and not doing things.' They avoided the gravel-pit and chalk-quarry before 'for fear father should say they mustn't play there,' but once parents were gone, this restriction was removed, and their motivation was to cure boredom."}, {"text": "They were bored and longed for the fun of a beach, which they hadn't experienced in a long time.", "isCorrect": true, "rationale": "After their parents left, 'the house seemed dreadfully quiet and empty, and the children wandered from one room to another... and wished they had something to do.' Cyril's suggestion directly addresses this boredom and longing for a seaside experience."}, {"text": "They knew their father had found ancient shells there and hoped to discover new ones.", "isCorrect": false, "rationale": "Anthea recalls their father saying 'there are shells there thousands of years old,' but Cyril's initial motivation for going was to 'pretend it's seaside,' not primarily an archaeological hunt."}], "id": "q06"}, {"question": "How does the narrator characterize the gravel-pit, using imagery to create a vivid description?", "options": [{"text": "As a treacherous chasm, fraught with danger and unstable edges.", "isCorrect": false, "rationale": "While caution is advised against climbing the edges, the narrator describes it as 'not really dangerous if you don't try to climb down the edges, but go the slow safe way round by the road.' The primary imagery is not about danger but its vastness and features."}, {"text": "As a large, wide basin with grass edges, wildflowers, and small holes for sand-martins' nests.", "isCorrect": true, "rationale": "The text describes it as 'very large and wide, with grass growing round the edges at the top, and dry stringy wildflowers, purple and yellow. It is like a giant's wash-hand basin. And there are mounds of gravel, and holes in the sides... and high up in the steep sides there are the little holes that are the little front doors of the little sand-martins' little houses.'"}, {"text": "As a dark, mysterious cave system waiting to be explored by smugglers.", "isCorrect": false, "rationale": "Cyril *wanted* to dig a cave for smugglers, but the gravel-pit itself is described as an open basin, not a cave system."}, {"text": "As a dusty, barren wasteland, devoid of any natural beauty.", "isCorrect": false, "rationale": "The description includes 'grass growing round the edges,' 'dry stringy wildflowers,' and the imagery of a 'giant's wash-hand basin,' contradicting the idea of a barren wasteland."}], "id": "q07"}, {"question": "What is the most significant contrast the children experience moving from London to the White House regarding rules and restrictions?", "options": [{"text": "In London, they had many visible labels saying 'You mustn't touch,' which were absent in the country.", "isCorrect": false, "rationale": "The text states the 'You mustn't touch' label was 'invisible' in London but 'just as bad, because you know it's there.' The contrast is not in visibility but the presence of the rules themselves."}, {"text": "London offered freedom in public spaces, while the country house imposed strict household rules.", "isCorrect": false, "rationale": "This is the opposite of what the text describes. London was restrictive ('like prison'), while the White House had 'no rules about not going to places and not doing things.'"}, {"text": "They moved from an environment with constant, often invisible, prohibitions to one with virtually no restrictions on their exploration and play.", "isCorrect": true, "rationale": "The text highlights that 'In London almost everything is labelled 'You mustn't touch,' and though the label is invisible, it's just as bad,' whereas at the White House, 'The best part of it all was that there were no rules about not going to places and not doing things.'"}, {"text": "The country rules were explicit and easy to understand, unlike the confusing London regulations.", "isCorrect": false, "rationale": "The country house's 'best part' was the *absence* of rules, not their clarity. London's rules were understood as being implicitly everywhere."}], "id": "q08"}, {"question": "When the children are digging to Australia, what concern does Jane raise that demonstrates a more practical or empathetic perspective compared to her siblings' initial enthusiasm?", "options": [{"text": "She worried about the structural integrity of their sand castle.", "isCorrect": false, "rationale": "Her concern was not about the castle but about the hole they were digging through it, specifically its impact on the 'little Australians'."}, {"text": "She feared falling out among the 'little Australians' and getting sand in their eyes.", "isCorrect": true, "rationale": "Jane's exact words were, 'Suppose the bottom of the hole gave way suddenly... and you tumbled out among the little Australians, all the sand would get in their eyes.' This shows concern for the imaginary people on the other side."}, {"text": "She was worried about getting lost in the vastness of the gravel-pit.", "isCorrect": false, "rationale": "Her concerns were focused on the outcome of their digging project, not getting lost in the pit itself."}, {"text": "She suggested they stop because the sand was too hard to dig with spades.", "isCorrect": false, "rationale": "The sand at the bottom was 'very soft and fine and dry,' and she begged them to stop due to the theoretical impact on Australians, not the difficulty of digging."}], "id": "q09"}, {"question": "The chapter concludes with the children digging in the gravel-pit, finding soft sand and shells. What does this final scene primarily foreshadow or set the stage for, according to the narrator's earlier statements?", "options": [{"text": "The children's eventual boredom with the countryside and their desire to return to London.", "isCorrect": false, "rationale": "The text strongly emphasizes their newfound joy and freedom in the country. The scene sets up an exciting discovery, not a return to boredom."}, {"text": "A conflict with local authorities over unauthorized digging in the gravel-pit.", "isCorrect": false, "rationale": "There is no hint of conflict with authorities; instead, the narrative builds towards a fantastical discovery."}, {"text": "The discovery of a 'fairy' or other 'astonishing thing' as promised by the narrator.", "isCorrect": true, "rationale": "The narrator explicitly states, 'So I will only tell you the really astonishing things that happened... you will find it quite easy to believe that before Anthea and Cyril and the others had been a week in the country they had found a fairy.' The digging in the gravel-pit is the direct lead-in to this promised discovery."}, {"text": "The arrival of their parents, putting an end to their unsupervised play.", "isCorrect": false, "rationale": "The parents have 'gone away suddenly' and are not expected back immediately. The narrative is building suspense for a fantastical event, not a return to supervision."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
