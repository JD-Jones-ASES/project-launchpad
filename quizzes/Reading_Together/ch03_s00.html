    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Reading_Together.html">&larr; Back to Let&#x27;s Read: Five Children and It</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "At the beginning of the chapter, why do the children lack the 'enthusiastic happiness' they felt on the previous day regarding the Psammead?", "options": [{"text": "They had forgotten about the Psammead's ability to grant wishes.", "isCorrect": false, "rationale": "The text states they 'remembered how they had had the luck to find a Psammead,' indicating they had not forgotten."}, {"text": "Their previous two wishes for 'Beauty' and 'Wealth' had not made them truly happy or provided useful enjoyment.", "isCorrect": true, "rationale": "The text explicitly states: 'For now they had had two wishes, Beauty and Wealth, and neither had exactly made them happy,' leading to their lack of enthusiasm."}, {"text": "The Psammead had informed them it would no longer grant wishes.", "isCorrect": false, "rationale": "The Psammead had given its 'promise to grant them a new wish every day,' and there's no mention of it withdrawing this promise."}, {"text": "They were too busy dealing with the Baby's antics to think about wishes.", "isCorrect": false, "rationale": "While the Baby was chaotic, their initial lack of enthusiasm predates the breakfast incident and is attributed to the disappointment of past wishes."}], "id": "q01"}, {"question": "Which event best illustrates the chaotic and disruptive nature of the Baby (the Lamb) during breakfast?", "options": [{"text": "He refused to eat his 'bread-and-milk' and demanded 'nam'.", "isCorrect": false, "rationale": "While he did this, it was part of a larger pattern of disruption and not the single most illustrative event of chaos."}, {"text": "He deliberately hit Cyril on the head with a tablespoon.", "isCorrect": false, "rationale": "This was one disruptive act, but the spilling of the goldfish bowl had a more widespread and messy impact on everyone."}, {"text": "He knocked over the bowl of golden carp, spilling water and fish into everyone's laps.", "isCorrect": true, "rationale": "This incident caused 'a flood of mixed water and goldfish' and upset 'everyone almost as much as the goldfish,' requiring multiple people to change clothes, making it the most significant chaotic event."}, {"text": "He wriggled through the bar of his high chair and hung by his head, choking.", "isCorrect": false, "rationale": "This was a dangerous act but primarily affected the Baby, whereas the goldfish incident involved everyone directly."}], "id": "q02"}, {"question": "What is Robert and Anthea's primary suspicion regarding the Psammead's intentions?", "options": [{"text": "They believe the Psammead is too confused by human wishes to grant them properly.", "isCorrect": false, "rationale": "They attribute the outcomes to malice, not confusion. Robert states, 'I feel almost sure it wishes every time that our wishes shan't do us any good.'"}, {"text": "They think the Psammead is a 'spiteful brute' that ensures their wishes turn out badly.", "isCorrect": true, "rationale": "Robert explicitly says, 'Anthea and I think the Sammyadd is a spiteful brute. If it can give us our wishes I suppose it can give itself its own, and I feel almost sure it wishes every time that our wishes shan't do us any good.'"}, {"text": "They suspect the Psammead is simply indifferent to their happiness.", "isCorrect": false, "rationale": "Indifference is less strong than their stated belief that the Psammead actively works against them ('wishes that our wishes shan't do us any good')."}, {"text": "They fear the Psammead will eventually run out of wishes to grant.", "isCorrect": false, "rationale": "There is no textual evidence to support this concern; their worry is about the quality of the wishes, not the quantity."}], "id": "q03"}, {"question": "Martha insists that Jane mend her torn dress instead of wearing her 'very, very pretty' petticoat. What societal value does Martha's reasoning 'It's not respectable' primarily reflect?", "options": [{"text": "The importance of practical clothing over fashionable attire.", "isCorrect": false, "rationale": "While it involves clothing, Martha's emphasis is on 'respectability,' which relates to social norms and appearances, not practicality."}, {"text": "A strict hierarchical family structure where children must obey adults.", "isCorrect": false, "rationale": "While true that Martha's word is law, the *reason* for the law ('not respectable') is the key societal value being highlighted here."}, {"text": "The cultural emphasis on proper public appearance and social decorum.", "isCorrect": true, "rationale": "The footnote explains that 'wearing just a petticoat in public would be like going out in your underwear,' directly linking Martha's 'not respectable' to social decorum and public appearance."}, {"text": "The value of mending and thrift in an era before cheap clothing.", "isCorrect": false, "rationale": "While Jane *does* mend her frock (and the footnote mentions mending clothes), Martha's primary objection to the petticoat is its unsuitability for public wear, not the act of mending itself."}], "id": "q04"}, {"question": "The children decide to wish for 'fifty pounds in two-shilling pieces' instead of 'boundless wealth.' This change in their desired wish indicates a development in their understanding of magic, specifically:", "options": [{"text": "A realization that the Psammead is only capable of granting wishes for money.", "isCorrect": false, "rationale": "They previously wished for beauty, so this is incorrect. Their focus is on *how* wealth is granted, not that it's the only option."}, {"text": "A shift towards more practical, specific, and manageable wishes based on past negative experiences.", "isCorrect": true, "rationale": "After 'boundless wealth' proved unmanageable and caused problems, Cyril suggests 'Fifty pounds in two-shilling pieces would have been much more sensible,' showing they learned to make wishes practical and specific."}, {"text": "A desire to test if the Psammead can differentiate between different denominations of currency.", "isCorrect": false, "rationale": "There is no indication of them testing the Psammead's capabilities in this way; their motivation is stated as making a 'sensible' wish."}, {"text": "An attempt to make wishes that are less likely to attract unwanted attention from adults.", "isCorrect": false, "rationale": "Their previous 'boundless wealth' was hidden, and the new wish is for a specific, smaller amount for personal use, not primarily to avoid adult attention."}], "id": "q05"}, {"question": "Anthea's argument against Jane's suggestion to devote wishes to the Baby's future ('assuring the Baby's future') reveals which crucial limitation of the Psammead's magic?", "options": [{"text": "The Psammead's wishes cannot affect a person's long-term well-being or development.", "isCorrect": false, "rationale": "While the wishes are temporary, the limitation is not that they *cannot* affect well-being, but that the effect won't last due to the time limit."}, {"text": "The Psammead's wishes are temporary and only last until sunset of the day they are granted.", "isCorrect": true, "rationale": "Anthea 'soberly reminded her that as the Sand-fairy's wishes only lasted till sunset they could not ensure any benefit to the Baby's later years,' directly stating the time limit."}, {"text": "The Psammead is unable to grant wishes related to abstract concepts like 'future' or 'well-being.'", "isCorrect": false, "rationale": "The text only specifies a time limit, not an inability to grant abstract wishes, as 'beauty' was an abstract wish."}, {"text": "The Psammead prioritizes wishes for the children who found it over wishes for others.", "isCorrect": false, "rationale": "There is no mention of the Psammead having preferences for whom wishes are granted, only for the duration of the wish."}], "id": "q06"}, {"question": "The narrator's interjection about 'vulgar fractions' and 'lending ears' serves primarily to:", "options": [{"text": "Introduce a new educational challenge that the children must overcome.", "isCorrect": false, "rationale": "The narrator explicitly says, 'I won't ask you to tell me whether 3/4 X 2 = 1 1/2,' indicating it's not a challenge for the children."}, {"text": "Critique the children's ability to communicate effectively with each other.", "isCorrect": false, "rationale": "The narrator praises their ability to talk 'by fours' and listen effectively, so it's not a critique."}, {"text": "Provide a humorous, meta-fictional aside that directly engages the reader and maintains a lighthearted tone.", "isCorrect": true, "rationale": "The narrator breaks the fourth wall with phrases like 'If you had been there' and 'as I daresay you can't do even that,' offering a humorous, self-aware commentary on the narrative itself."}, {"text": "Foreshadow a future plot point involving a complex mathematical problem.", "isCorrect": false, "rationale": "The narrator dismisses the mathematical problem as too difficult for the reader, indicating it's not a plot point."}], "id": "q07"}, {"question": "As the children head to the gravel-pits, their 'high hopes and excellent resolutions' are suddenly dashed by what realization?", "options": [{"text": "They remember that Martha will likely catch them and make them wash their hands again.", "isCorrect": false, "rationale": "Martha had already made them wash their hands, and this was an annoyance, not a 'sudden thought' that turned them pale."}, {"text": "They realize they have forgotten to bring the Baby (the Lamb) with them.", "isCorrect": false, "rationale": "Martha had just 'plumped the Lamb into Anthea's arms,' so they were definitely taking him."}, {"text": "They remember they failed to mark the Psammead's exact location the previous day.", "isCorrect": true, "rationale": "The text states, 'For now they remembered that yesterday... they had not had time to mark the spot where the Psammead was, with a ring of stones, as before. And it was this thought that put such silly expressions on their faces.'"}, {"text": "They overhear their parents discussing an early end to their holidays.", "isCorrect": false, "rationale": "There is no mention of parents or an early end to holidays in this section."}], "id": "q08"}, {"question": "Despite the negative outcomes of previous wishes, Cyril and Jane remain more optimistic about using the Psammead's magic. What is their primary reason for this optimism?", "options": [{"text": "They believe the Psammead will learn from their mistakes and grant better wishes.", "isCorrect": false, "rationale": "Their focus is on *their own* mistakes, not the Psammead learning."}, {"text": "They feel confident that a 'really useful' and 'sensible' wish will lead to a positive outcome.", "isCorrect": true, "rationale": "Cyril says, 'it WAS silly to wish for boundless wealth... And wishing to be beautiful... was simply donkeyish. We must try to find a really useful wish, and wish it.' Jane agrees they can find things that 'wouldn't turn out Dead Sea fish,' showing belief in better choices."}, {"text": "They are naturally more gullible and less critical than Robert and Anthea.", "isCorrect": false, "rationale": "While described as 'more hopeful,' their reasoning is based on analysis of past errors, not naivety."}, {"text": "They have a secret plan to force the Psammead to grant a perfect wish.", "isCorrect": false, "rationale": "There is no mention of a secret plan; their optimism stems from a belief in making better choices for wishes."}], "id": "q09"}, {"question": "The children's ongoing struggle to manage the Baby, adhere to Martha's rules, and deal with unexpected consequences from their wishes, while still trying to use magic, highlights which overarching theme of the chapter?", "options": [{"text": "The inherent danger and unpredictability of magical powers.", "isCorrect": false, "rationale": "While there are unpredictable elements, the primary theme is the integration of magic into daily life, rather than just its danger."}, {"text": "The contrast between the extraordinary potential of magic and the persistent realities of everyday life.", "isCorrect": true, "rationale": "The children possess a wish-granting creature (extraordinary), yet are continually grounded by mundane issues like a messy baby, torn dresses, Martha's rules, and the practicalities of making a 'sensible' wish, demonstrating this contrast."}, {"text": "The moral imperative to use magical abilities for the greater good, not personal gain.", "isCorrect": false, "rationale": "The children are focused on their own gain (money, enjoyment), and while there's a thought for the Baby, the moral imperative isn't a central theme here."}, {"text": "The importance of adult supervision when children are entrusted with great power.", "isCorrect": false, "rationale": "Adults (like Martha) are present but are portrayed as part of the 'realities' the children must navigate, rather than as a solution to their magical dilemmas."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
