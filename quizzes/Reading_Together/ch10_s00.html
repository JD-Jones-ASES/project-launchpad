<script>
var QUESTIONS = [{"question": "What was Cyril's initial, casual wish that set the events of the chapter in motion?", "options": [{"text": "He wished for a hundred pounds in two-shilling pieces.", "isCorrect": false, "rationale": "This was a previous wish the children had, but not the one Cyril made at breakfast on this particular day."}, {"text": "He wished for the Psammead to grant wishes wherever they happened to be.", "isCorrect": false, "rationale": "This was a wish made the previous day, which enabled the current wish to be granted without the Psammead's physical presence."}, {"text": "He wished there were Red Indians in England, 'just about the right size for us to fight.'", "isCorrect": true, "rationale": "Cyril, inspired by 'The Last of the Mohicans,' expressed this specific wish dreamily at breakfast, which the Psammead later confirmed had been granted."}, {"text": "He wished for a fine day.", "isCorrect": false, "rationale": "Jane briefly mentioned this as a possibility, and Cyril tried to suggest it, but Anthea refuted it, and the Psammead's reaction indicated something 'undesirable' had been wished for."}], "id": "q01"}, {"question": "Initially, why were the children distressed and agitated after the Psammead's confirmation that a wish had been granted?", "options": [{"text": "They were worried the Psammead had tricked them into wishing for something harmful.", "isCorrect": false, "rationale": "While they knew something awful might happen, their primary distress stemmed from not being able to remember what they had wished for, not a belief in trickery."}, {"text": "They couldn't remember what they had wished for that morning and feared it was 'undesirable.'", "isCorrect": true, "rationale": "The text explicitly states, 'no one could remember anyone's having wished for anything that morning... and everyone kept expecting something awful to happen every minute,' based on the Psammead's ominous hints."}, {"text": "They were angry that the Psammead was too sleepy and cross to grant their request for money.", "isCorrect": false, "rationale": "The Psammead's sleepiness was a factor, but their primary distress came from the realization a new wish had been granted, not just the denial of a new request."}, {"text": "They discovered the wish had caused their previous wishes to disappear.", "isCorrect": false, "rationale": "The story indicates previous wishes, like the fifteen shillings, persisted, not disappeared. Anthea even references this as proof wishes don't 'go.'"}], "id": "q02"}, {"question": "Anthea's actions, such as breaking the water-jug and the missionary-box, demonstrate her understanding of the Psammead's wishes. What specific characteristic of the Psammead's magic did she act upon?", "options": [{"text": "Wishes are only granted for children, not adults.", "isCorrect": false, "rationale": "The text does not suggest this limitation. Anthea's actions were driven by the perceived threat of the wish itself, not who it applied to."}, {"text": "Wishes are temporary and fade at sunset.", "isCorrect": false, "rationale": "Anthea explicitly refutes this idea, stating, 'The things that grow out of the wishes don't go. Look at the fifteen shillings!'"}, {"text": "Wishes, once granted, have lasting and often inconvenient or dangerous consequences.", "isCorrect": true, "rationale": "Anthea's urgency and extreme measures to protect the Lamb stem from her conviction that the Red Indians are a real and persistent danger because the Psammead's wishes are permanent and often bring trouble."}, {"text": "The Psammead can only grant wishes involving inanimate objects.", "isCorrect": false, "rationale": "The wish for Red Indians clearly contradicts this, as does the previous wish for money which involved many individual coins."}], "id": "q03"}, {"question": "Anthea uses both 'far-seeing promptitude' and a 'general-like' approach in her plan. Which of the following best exemplifies her strategic thinking?", "options": [{"text": "Breaking the jug and missionary-box to secure funds.", "isCorrect": false, "rationale": "While these actions were part of her plan, they were the means to an end. Her strategic thinking is better demonstrated by her manipulation of Martha."}, {"text": "Forcing herself to cry to relieve her stress after the plan was accomplished.", "isCorrect": false, "rationale": "Her crying was an emotional release, not a strategic action. The text highlights that she didn't give way 'till her aim was accomplished.'"}, {"text": "Negotiating with Martha by offering her Liberty box and paying for her trip to ensure the Lamb's safety.", "isCorrect": true, "rationale": "Anthea cleverly identifies Martha's motivation (getting the Lamb 'off her hands'), uses a valuable bribe (the Liberty box), and covers the travel cost to ensure the crucial part of her plan – getting the Lamb out of perceived danger – is executed, demonstrating a strategic understanding of others' incentives."}, {"text": "Confronting Cyril and the boys about their disbelief at dinner.", "isCorrect": false, "rationale": "Her confrontation at dinner was a reaction to their skepticism, not a pre-planned strategic move to achieve her primary goal of protecting the Lamb."}], "id": "q04"}, {"question": "What does Cyril's persistent denial of the Red Indians' existence during dinner reveal about his character, especially given his initial wish?", "options": [{"text": "He genuinely believes the Psammead only grants wishes that are harmless or easily reversible.", "isCorrect": false, "rationale": "While he hopes this, his internal conflict ('trying not to believe things when in your heart you are almost sure they are true') suggests he knows the wishes can be serious."}, {"text": "He is trying to protect his siblings from unnecessary fear and panic.", "isCorrect": false, "rationale": "His tone is 'tartly' and he's dismissive, suggesting irritation and self-preservation rather than a protective instinct for his siblings."}, {"text": "He feels responsible for the wish and is attempting to avoid guilt by denying its reality.", "isCorrect": true, "rationale": "The text states, 'You see, he felt in his heart that if there SHOULD be Indians they would be entirely his own fault, so he did not wish to believe in them.' His denial is a coping mechanism for his guilt."}, {"text": "He considers Anthea to be overly imaginative and prone to exaggeration.", "isCorrect": false, "rationale": "While he does call her 'a little silly,' his primary motivation for denial is deeper and more personal than simply dismissing her imagination."}], "id": "q05"}, {"question": "The Psammead's reaction to the children's request for money for Queen Victoria's head on them ('Oh, don't bother me. You've had your wish.') suggests what about its nature?", "options": [{"text": "It prefers to grant wishes for money over other types of wishes.", "isCorrect": false, "rationale": "The Psammead shows clear annoyance and tells them they've already had a wish, indicating it doesn't prioritize money wishes."}, {"text": "It is always agreeable and eager to help the children.", "isCorrect": false, "rationale": "The Psammead is described as 'very cross and sleepy' and speaks 'disagreeably,' directly contradicting this option."}, {"text": "It is often grumpy and can be short-tempered when approached.", "isCorrect": true, "rationale": "The descriptions 'very cross and sleepy' and speaking 'still more disagreeably' clearly indicate its often irritable and uncooperative nature."}, {"text": "It only grants one wish per day, regardless of the wish's nature.", "isCorrect": false, "rationale": "The rule mentioned was 'to let you have your wishes wherever you happened to be,' not specifically 'one per day.' The focus is on the granted wish, not a daily limit."}], "id": "q06"}, {"question": "What is the most significant emotional turning point for Anthea in this section?", "options": [{"text": "When she realizes Cyril's wish for Red Indians was the one granted.", "isCorrect": false, "rationale": "This was a critical moment of realization and fear, but the peak emotional release occurs later."}, {"text": "When she decides to break the jug and the missionary-box for money.", "isCorrect": false, "rationale": "This shows her resolve, but the act itself is described as 'heartless work,' not an emotional turning point."}, {"text": "When she bursts into tears after Martha and the Lamb have safely departed.", "isCorrect": true, "rationale": "The text describes her flinging herself on the floor and bursting into 'floods of tears' immediately after the Lamb is safe, revealing the immense emotional strain and relief she had been suppressing."}, {"text": "When the boys laugh at her tale of the Red Indians during dinner.", "isCorrect": false, "rationale": "This made her 'very cross' but was an external frustration, not an internal emotional release like her crying spell."}], "id": "q07"}, {"question": "Why did Anthea believe it was essential for Martha to take the Lamb to town immediately, even offering a valuable bribe?", "options": [{"text": "She wanted the Lamb to experience an outing to Rochester.", "isCorrect": false, "rationale": "Her primary motivation was the Lamb's safety, not an enjoyable outing, as evidenced by her extreme measures."}, {"text": "She feared the Red Indians would specifically target 'the Lamb' (the youngest child).", "isCorrect": true, "rationale": "Anthea explicitly states, 'And suppose they scalped the Lamb!' and later, 'She had got the dear Lamb out of danger - she felt certain the Red Indians would be round the White House or nowhere.'"}, {"text": "She needed Martha out of the house to execute her plan of breaking things.", "isCorrect": false, "rationale": "Anthea broke the items before speaking with Martha. Her goal with Martha was to get the Lamb out of the house, not Martha herself."}, {"text": "She wanted to prevent Martha from 'splitting' about the broken items.", "isCorrect": false, "rationale": "The 'splitting' concern was later raised by Cyril regarding the missionary-box, but it was not Anthea's primary motivation for sending Martha and the Lamb away."}], "id": "q08"}, {"question": "The author notes that it's a mistake to tell a 'thrilling tale' while people are eating 'minced beef and boiled potatoes.' What literary device or effect does this observation highlight?", "options": [{"text": "Foreshadowing, indicating that the Red Indians will arrive during dinner.", "isCorrect": false, "rationale": "The text doesn't suggest the Indians will arrive at dinner; rather, it's about the mood and reception of the story."}, {"text": "Irony, as the boys are eating a meal historically associated with frontier life.", "isCorrect": false, "rationale": "Minced beef and boiled potatoes are not typically associated with frontier life in a way that creates irony with Red Indians; it's more about the mundane contrast."}, {"text": "Contrast, where the mundane setting and food diminish the perceived reality of the fantastic story.", "isCorrect": true, "rationale": "The text states, 'There seemed somehow to be something about the food that made the idea of Red Indians seem flat and unbelievable.' This directly points to the contrast between the ordinary, unexciting meal and the thrilling, terrifying idea Anthea is presenting, making it hard for the boys to take it seriously."}, {"text": "Hyperbole, exaggerating the boys' disbelief to make Anthea's distress seem greater.", "isCorrect": false, "rationale": "While the boys' disbelief adds to Anthea's distress, the author's comment is more an observation about the narrative impact of setting and atmosphere on a story, rather than mere exaggeration."}], "id": "q09"}, {"question": "What common flaw in the children's wishes does this chapter reinforce, as stated by Jane?", "options": [{"text": "Their wishes are always too specific, preventing the Psammead from granting them.", "isCorrect": false, "rationale": "Cyril's wish for Red Indians was vague enough to cause broad trouble, and the Psammead had no trouble granting it."}, {"text": "They consistently forget their wishes immediately after making them.", "isCorrect": false, "rationale": "While they forgot this particular wish, the broader flaw is the negative outcome, not just the forgetting."}, {"text": "They frequently get themselves into trouble or 'let themselves in for a nice thing' due to unintended consequences.", "isCorrect": true, "rationale": "Jane sadly states, 'We always do, somehow,' referring to getting into trouble, and the Psammead's 'A nice thing you've let yourselves in for!' confirms the recurring pattern of wishes leading to undesirable outcomes."}, {"text": "Their wishes only affect them and never anyone else.", "isCorrect": false, "rationale": "The fear of the Lamb being scalped demonstrates that the wishes can affect others, especially those close to them."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
