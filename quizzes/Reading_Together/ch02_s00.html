        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Reading_Together.html">&larr; Back to Let&#x27;s Read: Five Children and It</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How did Robert specifically manage to wake Anthea from her dream?", "options": [{"text": "By splashing a bucket of cold water over her face.", "isCorrect": false, "rationale": "The text describes Robert's method as gentle and ingenious, not a harsh splash from a bucket."}, {"text": "By gently squeezing water from a wet bath-towel onto her face.", "isCorrect": true, "rationale": "The text explicitly states: 'The rain fell in slow drops on to Anthea's face from the wet corner of a bath-towel which her brother Robert was gently squeezing the water out of, to wake her up'."}, {"text": "By making a loud, sudden noise right next to her bed.", "isCorrect": false, "rationale": "While Robert is 'ingenious' in awakening relatives, the described method involved water, not noise, and was perceived as 'rain'."}, {"text": "By setting up a booby-trap that startled her awake.", "isCorrect": false, "rationale": "Booby-traps are mentioned as one of Robert's 'accomplishments,' but not the specific method he used to wake Anthea in this instance."}], "id": "q01"}, {"question": "What specific confusion arises among Anthea, Robert, and Jane after waking, concerning their dreams?", "options": [{"text": "They couldn't agree on the exact appearance of the Sand-fairy in their individual dreams.", "isCorrect": false, "rationale": "Their confusion centered on the shared nature of the events, not the details of the fairy's appearance."}, {"text": "They questioned whether it was possible for different people to truly dream the same exact sequence of events.", "isCorrect": true, "rationale": "Anthea articulates this confusion directly: 'But CAN different people all dream the same thing?' after realizing they all dreamed of the Sand-fairy."}, {"text": "They debated who among them had been the first to discover the Sand-fairy.", "isCorrect": false, "rationale": "The focus was on the shared experience, not individual precedence in the dream."}, {"text": "They were puzzled by why the Sand-fairy had only granted one wish in the dream state.", "isCorrect": false, "rationale": "The children's primary concern at this point was the veracity and shared nature of the dream itself, not the number of wishes."}], "id": "q02"}, {"question": "Cyril's entry into the conversation significantly shifts the children's perception of their shared dream. What is his definitive claim?", "options": [{"text": "He suggests that their collective dream must be a shared subconscious desire.", "isCorrect": false, "rationale": "Cyril's explanation is much more direct and pragmatic, cutting through their theoretical musings."}, {"text": "He asserts with certainty that the dream was actually a real event that happened.", "isCorrect": true, "rationale": "Cyril unequivocally states: 'Dream?' he said, 'you little sillies, it's TRUE. I tell you it all happened.' This revelation immediately changes the children's perspective."}, {"text": "He scolds them for dreaming such fantastic things instead of practical ones.", "isCorrect": false, "rationale": "While he mentions 'No more peerless beauties for this child,' his main point is the reality of the events, not a general scolding for fanciful dreams."}, {"text": "He proposes they return to the gravel-pits to try and recreate the dream.", "isCorrect": false, "rationale": "Cyril's point is that it *did* happen, and he wants to go back for another wish, not to 'recreate' something that wasn't real."}], "id": "q03"}, {"question": "Jane offers a detailed, imaginative explanation for why Martha enjoys taking the Lamb to see her cousins in Rochester. What is her theory?", "options": [{"text": "Martha uses the trip as an opportunity to gossip about the children with her cousins.", "isCorrect": false, "rationale": "Jane's speculation is far more romantic and imaginative, focusing on Martha's self-perception rather than gossip."}, {"text": "Martha pretends the Lamb is her own child, making her feel like a noble lady.", "isCorrect": true, "rationale": "Jane suggests: 'I expect they pretend they're their own babies, and that they're not servants at all, but married to noble dukes of high degree, and they say the babies are the little dukes and duchesses.'"}, {"text": "Martha seeks to impress her relatives with the family's wealth and status.", "isCorrect": false, "rationale": "While the Lamb is in his 'best coat and hat,' Jane's theory focuses on Martha's internal fantasy of being a duchess, not on showing off the family's wealth."}, {"text": "Martha secretly hopes to lose the Lamb during the journey.", "isCorrect": false, "rationale": "This is a negative and unsupported interpretation. The text implies Martha enjoys the outing for her own imaginative reasons."}], "id": "q04"}, {"question": "To reach Rochester, Martha and the Lamb utilize a specific mode of transportation described in the text. What is it?", "options": [{"text": "They walk the entire distance, despite the Lamb being heavy.", "isCorrect": false, "rationale": "Robert initially thinks this would be the case, but Jane corrects him, indicating a different mode of transport."}, {"text": "They travel by a 'carrier,' which is a horse and cart service.", "isCorrect": true, "rationale": "Jane clarifies: 'She's going by carrier,' and the text later states, 'It was a smart party that the carrier's cart picked up at the Cross Roads.' The definition of 'carrier' is also provided."}, {"text": "They board a public stagecoach that regularly travels to Rochester.", "isCorrect": false, "rationale": "While a carrier provides a similar service, the specific term and description point to a 'carrier's cart,' not a stagecoach."}, {"text": "They are driven in the family's personal carriage.", "isCorrect": false, "rationale": "The text specifies 'the carrier's cart,' implying a public or shared service, not a private family carriage."}], "id": "q05"}, {"question": "While the children are arguing loudly over the Psammead's hiding spot, how does the Psammead respond to their disagreement?", "options": [{"text": "It expresses annoyance at their noise and tells them to quiet down.", "isCorrect": false, "rationale": "While it noted their 'disagreeable' behavior, its primary response was not a direct command to be quiet but a reflection on its own perceptions."}, {"text": "It hints that their bickering almost made it believe they were merely a figment of its own dreams.", "isCorrect": true, "rationale": "The Psammead states: 'Humph! Do you know, until I heard you being disagreeable to each other just over my head, and so loud too, I really quite thought I had dreamed you all. I do have very odd dreams sometimes.'"}, {"text": "It threatens to withdraw its wish-granting powers if they continue to fight.", "isCorrect": false, "rationale": "It later mentions reduced strength for wishes if it tells its dreams, but it does not directly threaten withdrawal over their initial argument."}, {"text": "It offers to grant a wish for improved tempers to resolve their dispute.", "isCorrect": false, "rationale": "It mentions 'good tempers' as something it might *not* have strength to give, not as an offer or solution to their current argument."}], "id": "q06"}, {"question": "Before stating their grand wish for immense wealth, the children present a smaller, 'extra' wish to the Sand-fairy. What was this specific wish?", "options": [{"text": "That the Sand-fairy would feel better after its restless night.", "isCorrect": false, "rationale": "Anthea's polite inquiry about its whisker was a courtesy, not a wish made to the fairy."}, {"text": "That their parents would never find out about the Sand-fairy.", "isCorrect": false, "rationale": "The wish specifically concerned the servants noticing 'gifts,' not parents knowing about the fairy itself."}, {"text": "That the servants would not notice any of the gifts the Sand-fairy gives them.", "isCorrect": true, "rationale": "Robert states, 'We don't want the servants to notice the gifts you give us,' which the fairy grants as 'quite easy' because 'People don't notice things much, anyway.'"}, {"text": "That the Sand-fairy would grant them good manners and common sense.", "isCorrect": false, "rationale": "These were mentioned by the Psammead as things it might not have strength to give if it told its dreams, not as something the children wished for."}], "id": "q07"}, {"question": "Upon realizing the Sand-fairy is real, Cyril imposes a crucial rule for future wishing. What is this rule?", "options": [{"text": "Only Cyril, as the eldest, is permitted to articulate the wish to the Sand-fairy.", "isCorrect": false, "rationale": "While Cyril sets the rule, Robert is later chosen to speak to the fairy for the main wish."}, {"text": "All the children must collectively agree on a wish before it is made.", "isCorrect": true, "rationale": "Cyril declares: 'Only we'll make up our minds, solid, before we go, what it is we do want, and no one must ask for anything unless the others agree first.'"}, {"text": "Wishes must be chosen for their practicality and direct benefit, avoiding frivolous desires.", "isCorrect": false, "rationale": "While Cyril expresses a preference against a wish for 'peerless beauties,' the explicit rule he establishes is about unanimous agreement, not the type of wish."}, {"text": "They must write down their wishes in advance to prevent any misunderstandings.", "isCorrect": false, "rationale": "There is no mention in the text of writing down wishes as part of Cyril's rule."}], "id": "q08"}, {"question": "After the Psammead grants their wish for gold, what is Robert's significant initial finding about the nature of the coins?", "options": [{"text": "He discovers they are enchanted coins that disappear when touched by adults.", "isCorrect": false, "rationale": "No such magical disappearing property is mentioned in the text."}, {"text": "He realizes they are not British sovereigns, despite being pure gold.", "isCorrect": true, "rationale": "Robert inspects a coin and states, 'It's not sovereigns.' This indicates they are gold, but not the specific currency he expected."}, {"text": "He finds that the gold is merely an illusion, not tangible wealth.", "isCorrect": false, "rationale": "The children can pick up and play with the gold, confirming it is tangible and real, not an illusion."}, {"text": "He learns they are ancient Roman coins, making them extremely valuable to collectors.", "isCorrect": false, "rationale": "The text only says they are 'not sovereigns,' not that they are specifically ancient Roman coins."}], "id": "q09"}, {"question": "When Jane politely asks the Psammead to tell them about its dreams, how does the Psammead primarily react, revealing a key aspect of its character?", "options": [{"text": "It happily begins to recount a fascinating dream, eager to share.", "isCorrect": false, "rationale": "The Psammead responds with a yawn and a conditional statement, not eagerness."}, {"text": "It uses the opportunity to hint that fulfilling trivial requests might diminish its ability to grant more substantial wishes.", "isCorrect": true, "rationale": "The Psammead replies, 'If I do I shan't have strength to give you a second wish; not even good tempers, or common sense, or manners, or little things like that,' effectively discouraging the wish by implying a cost to its wish-granting powers."}, {"text": "It dismisses her question as irrelevant, preferring to focus on the children's wishes.", "isCorrect": false, "rationale": "It *addresses* her question by explaining the potential consequences, rather than simply dismissing it."}, {"text": "It becomes visibly irritated by her politeness, as it prefers directness.", "isCorrect": false, "rationale": "The Psammead's reaction is more about preserving its energy or control over wishes than irritation with politeness."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
