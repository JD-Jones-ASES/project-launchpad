<script>
var QUESTIONS = [{"question": "A busy professional needs to quickly understand the budget implications of a recent project detailed in a report. Which feature of a well-structured report is most critical for this reader?", "options": [{"text": "A detailed appendix with raw financial data.", "isCorrect": false, "rationale": "While the appendix might contain relevant data, its primary purpose is supplementary material, not a quick summary for busy readers. The report's main structure facilitates quick understanding of the core information."}, {"text": "Clearly labeled sections and an executive summary.", "isCorrect": true, "rationale": "The text states that 'Most professionals do not read reports from start to finish. They scan the executive summary, jump to the section that matters to them, and move on.' Labeled sections and an executive summary directly enable this efficient scanning and targeted reading."}, {"text": "A stream-of-consciousness writing style throughout the document.", "isCorrect": false, "rationale": "The text explicitly states, 'A report is not a stream-of-consciousness essay.' This style would hinder, not help, quick information retrieval."}, {"text": "An extremely lengthy introduction covering all historical context.", "isCorrect": false, "rationale": "A lengthy introduction might provide context but would slow down a busy reader trying to find specific information quickly. The executive summary is designed for rapid comprehension."}]}, {"question": "Which of the following components is *always* included in the standard structure of an informational report, regardless of whether it's a short (1-3 pages) or long report?", "options": [{"text": "A Table of Contents.", "isCorrect": false, "rationale": "The text notes that 'Long reports may add a table of contents,' implying it's not always present in short reports, and thus not an 'always included' component across all lengths."}, {"text": "An Appendix.", "isCorrect": false, "rationale": "The text states 'Short reports (1–3 pages) may omit the... appendix,' indicating it's not a universal component."}, {"text": "An Executive Summary.", "isCorrect": true, "rationale": "The 'Standard Report Structure' lists the Executive Summary as a core component. While short reports may omit the title page and appendix, the Executive Summary, Introduction, Body, and Conclusion are fundamental to all standard informational reports for providing a quick overview and the main content."}, {"text": "A References section.", "isCorrect": false, "rationale": "The text mentions 'Long reports may add a... references section,' meaning it's not a standard, always-included component for all reports."}]}, {"question": "A project manager is writing a progress report for a complex engineering project. She needs to ensure all stakeholders understand exactly which subsystem and time frame the report covers, and what specific aspects (e.g., only electrical, not civil) are *not* included. Which part of the report's introduction should she focus on detailing to achieve this clarity?", "options": [{"text": "Purpose", "isCorrect": false, "rationale": "The purpose explains why the report exists, but not its boundaries. For example, 'This report summarizes progress' is a purpose, but doesn't define what's included or excluded."}, {"text": "Background", "isCorrect": false, "rationale": "Background provides necessary context, like overall project timelines or previous incidents, but it doesn't explicitly delineate the report's coverage limits."}, {"text": "Scope", "isCorrect": true, "rationale": "The text defines 'Scope' as answering 'What does this report cover, and what does it not cover?' and explicitly states it 'prevents misunderstandings' by setting boundaries, such as specific weeks or focusing only on mechanical failure, not insurance claims."}, {"text": "Findings", "isCorrect": false, "rationale": "Findings are the main content in the body of the report, presenting results, not the introductory definition of the report's boundaries."}]}, {"question": "Consider the following introductory statement for a report: 'This document reviews our recent activities. We've been busy and have some initial findings to share.' Based on the textbook's guidance for effective introductions, what is the most significant weakness of this statement?", "options": [{"text": "It uses informal language.", "isCorrect": false, "rationale": "While formality can be a factor, the primary issue highlighted by the 'Vague Introduction vs. Clear Introduction' example is lack of specific information, not just tone."}, {"text": "It lacks clear details regarding the report's specific purpose, scope, or necessary background context.", "isCorrect": true, "rationale": "The text emphasizes that a clear introduction answers 'Purpose — Why does this report exist?', 'Scope — What does this report cover, and what does it not cover?', and 'Background — What context does the reader need?'. The example statement provides none of this specific information, mirroring the 'Vague Introduction' given in the textbook."}, {"text": "It is too short to be considered a proper introduction.", "isCorrect": false, "rationale": "Length itself isn't the primary weakness; an introduction can be concise yet clear. The problem is the absence of crucial information."}, {"text": "It inappropriately reveals 'initial findings' in the introduction.", "isCorrect": false, "rationale": "The introduction might hint at findings or state the report 'summarizes results,' but the main weakness here is the lack of specific context, not the mention of findings per se."}]}, {"question": "You are tasked with writing a report detailing the sequence of events that led to a software system outage, including troubleshooting steps taken over several hours. Which organization method would be most appropriate for the 'Body/Findings' section of this incident report?", "options": [{"text": "Topical", "isCorrect": false, "rationale": "Topical organization is best for subjects or categories (e.g., 'Electrical systems, Plumbing'), not for a sequence of events as required by an incident report."}, {"text": "Chronological", "isCorrect": true, "rationale": "The text states that 'Chronological — Organized by time. Best for progress reports, incident reports, and trip reports.' An incident report detailing a sequence of events perfectly fits this method."}, {"text": "Most-important-first", "isCorrect": false, "rationale": "While identifying the root cause might be important, an incident report's primary goal is often to reconstruct the timeline, making chronological organization more suitable for the body, even if the executive summary highlights the most important finding."}, {"text": "Alphabetical", "isCorrect": false, "rationale": "Alphabetical organization is not mentioned as a standard method for organizing report findings and would be highly illogical for an incident report."}]}, {"question": "According to the textbook's advice on 'Strong Headers,' which of the following would be the *most* effective header for a section discussing the financial results from the last quarter?", "options": [{"text": "Section 3", "isCorrect": false, "rationale": "The text explicitly lists 'Weak headers: “Part 1,” “Part 2,” “Part 3”' and compares them to strong, descriptive headers. 'Section 3' provides no information about the content."}, {"text": "Financial Data", "isCorrect": false, "rationale": "While 'Financial Data' is better than 'Section 3,' it's still somewhat vague. Strong headers should be more specific, as demonstrated by examples like 'Q3 Sales Performance by Region' or 'Budget Overview.'"}, {"text": "Summary of Quarter 3 Revenue and Expenses", "isCorrect": true, "rationale": "This header is specific and descriptive, telling the reader exactly what to expect in the section ('Q3 Sales Performance by Region' and 'Website Traffic and Conversion Rates' are given as examples of strong headers in the text). It goes beyond generic terms to provide clear content cues."}, {"text": "Economic Aspects", "isCorrect": false, "rationale": "'Economic Aspects' is too broad and vague, not providing the specific detail a strong header should offer."}]}, {"question": "A team is having a follow-up meeting about a detailed, 20-page technical report. During the discussion, a participant needs to quickly direct others to the specific part discussing 'expenditures to date.' What structural element, emphasized for longer reports, would be most helpful for this quick reference?", "options": [{"text": "A comprehensive index at the end of the report.", "isCorrect": false, "rationale": "While an index helps find topics, numbered sections and sub-sections are specifically mentioned as making it 'easy to refer to specific parts of the report in meetings or follow-up emails' with direct references like 'See Section 3.2 for the budget breakdown.'"}, {"text": "Generic headers like 'Part 3' and 'Part 4.'", "isCorrect": false, "rationale": "The text explicitly states these are 'Weak headers' and would not allow for precise referencing to 'expenditures to date.'"}, {"text": "Numbered sections and sub-sections (e.g., 3.1, 3.2).", "isCorrect": true, "rationale": "The 'Report Section Numbering' example directly shows '3.0 > Budget Summary' and '3.1 Expenditures to Date,' highlighting how this system facilitates easy and precise referencing to specific report segments, which is crucial in discussions."}, {"text": "An extensively written executive summary.", "isCorrect": false, "rationale": "An executive summary provides an overview but doesn't allow for precise navigation to a specific detail like 'expenditures to date' within a 20-page document."}]}, {"question": "In the 'Riverside Park Cleanup Project' progress report, the 'Issues and Risks' section honestly states that heavy rain caused delays and that volunteer retention is a concern. What is the most likely reason a report writer would choose to include such potentially negative information transparently?", "options": [{"text": "To subtly shift blame for project setbacks away from the project lead.", "isCorrect": false, "rationale": "While it might explain issues, the primary intent of transparent reporting, especially in progress reports, is generally not to shift blame but to provide an accurate status for collaborative problem-solving."}, {"text": "To provide a complete and accurate picture of the project's status, enabling informed decision-making and collaborative problem-solving.", "isCorrect": true, "rationale": "The teacher's note directly states: 'Discuss the honesty of the Issues section—the writer does not hide the weather delays or the volunteer retention problem. Ask: “How would this report be different if the writer tried to hide the problems?”' This emphasizes that transparency allows for realistic assessment and prevents unforeseen issues from escalating, leading to better decision-making."}, {"text": "To make the report appear longer and more detailed, regardless of actual utility.", "isCorrect": false, "rationale": "Including such specific, pertinent information serves a functional purpose of informing, not merely padding the report length."}, {"text": "To impress the reader with the writer's vulnerability and self-awareness.", "isCorrect": false, "rationale": "While self-awareness is good, the professional objective is practical: to inform stakeholders about challenges so they can be addressed, not to impress with personal traits."}]}, {"question": "Maria Santos, the City Parks Department Director, receives the 'Riverside Park Cleanup — October Progress Report.' If she only has one minute to grasp the project's overall status, key achievements, and any significant issues, which section should she prioritize reading?", "options": [{"text": "2.0 Completed Work (October 1–31)", "isCorrect": false, "rationale": "This section provides details on specific completed tasks but doesn't offer the comprehensive overview of the entire project status, including risks and future steps, that a busy director would need immediately."}, {"text": "4.0 Budget Summary", "isCorrect": false, "rationale": "This section would focus only on financial aspects, not the overall project health, achievements, or risks."}, {"text": "1.0 Executive Summary", "isCorrect": true, "rationale": "The text defines the Executive Summary as 'A one-paragraph to one-page overview of the entire report.' This section is specifically designed for busy readers like Maria Santos to quickly get the most critical information, including status, progress, and identified risks, as demonstrated in the model document."}, {"text": "5.0 Issues and Risks", "isCorrect": false, "rationale": "This section is important for identifying problems but doesn't give a full picture of the overall progress, completed work, or next steps in a single glance. It's a part of the overview, but not the overview itself."}]}, {"question": "The 'Riverside Park Cleanup Project' progress report effectively uses different sections to communicate the project's status across various timelines. Which of the following correctly identifies three distinct time frames presented within its body sections that are typical for a progress report?", "options": [{"text": "Introduction, Body, Conclusion.", "isCorrect": false, "rationale": "These are structural sections of a report, not time frames within the project's progress. The question asks for time frames typically communicated within the *body* sections of a progress report."}, {"text": "Last Week, This Week, Next Week.", "isCorrect": false, "rationale": "While these are time frames, they are too generic and not the specific section titles used in the model document or the common categories for progress reporting outlined in the 'teachernote' discussion points."}, {"text": "Completed Work, Current Work, Next Steps.", "isCorrect": true, "rationale": "The 'teachernote' specifically asks students to 'identify the three time frames (completed, current, upcoming) in this progress report.' The model document uses '2.0 Completed Work (October 1–31),' '3.0 Current Work,' and '6.0 Next Steps (November),' which correspond directly to past, present, and future activities."}, {"text": "Executive Summary, Findings, Appendix.", "isCorrect": false, "rationale": "These are structural sections of a report, not time frames that describe the progress itself. Findings are the results, but the question asks about distinct time frames of activity."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
