<script>
var QUESTIONS = [{"question": "What is the primary purpose of a follow-up email after a meeting, as described in the text?", "options": [{"text": "To serve as a formal legal record of all discussions and debates that occurred.", "isCorrect": false, "rationale": "The text states that a follow-up email is not the same as full meeting minutes, which are the complete record. Its purpose is more concise."}, {"text": "To confirm decisions, remind attendees of their assigned tasks, and inform absent members of key outcomes.", "isCorrect": true, "rationale": "The text explicitly lists these three goals: 'Confirm shared understanding,' 'Document accountability,' and 'Inform absent members,' summarizing the core purpose."}, {"text": "To allow attendees to debate unresolved issues from the meeting or introduce new topics for discussion.", "isCorrect": false, "rationale": "The purpose of a follow-up email is to confirm what was decided, not to reopen debates or introduce new topics, which would lead to inefficiency."}, {"text": "To schedule social gatherings for the team outside of regular work hours.", "isCorrect": false, "rationale": "While team cohesion is valuable, scheduling social events is not a stated purpose of a professional meeting follow-up email."}]}, {"question": "The text describes a follow-up email as a 'highlight reel.' How does this primarily distinguish it from full meeting minutes?", "options": [{"text": "Follow-up emails are much longer and contain more extensive details than traditional meeting minutes.", "isCorrect": false, "rationale": "The text states a follow-up email is 'concise — usually no more than one screen of text,' making it shorter and less detailed than full minutes."}, {"text": "Follow-up emails include only the most critical decisions and action items, whereas minutes provide a complete, detailed record of the entire meeting.", "isCorrect": true, "rationale": "The text explicitly states: 'Think of the minutes as the complete record and the follow-up email as the highlight reel,' focusing on brevity and key takeaways."}, {"text": "Follow-up emails are only sent to people who missed the meeting, while minutes are distributed to all attendees.", "isCorrect": false, "rationale": "The text states follow-up emails are sent to 'all attendees (and sometimes to people who missed the meeting),' indicating they are for everyone, not just absentees."}, {"text": "Follow-up emails are always written by an external consultant, while minutes are exclusively written by an internal secretary.", "isCorrect": false, "rationale": "The text does not specify the author's role, only that the follow-up is written by a notetaker or someone taking initiative."}]}, {"question": "According to the text, which of the following is *not* a predictable consequence when a meeting lacks a follow-up email?", "options": [{"text": "Tasks are frequently forgotten by attendees without a written reminder.", "isCorrect": false, "rationale": "The text lists 'Tasks are forgotten' as a direct consequence, emphasizing the importance of written reminders."}, {"text": "Disputes arise because there is no written record to resolve disagreements over decisions.", "isCorrect": false, "rationale": "The text states 'Disputes arise' as a predictable outcome, as people recall different versions of what was decided."}, {"text": "The next meeting ends up rehashing the same topics without making progress.", "isCorrect": false, "rationale": "The text notes that 'The next meeting rehashes the same topics' due to undocumented decisions."}, {"text": "All attendees spontaneously remember their specific commitments and decisions perfectly.", "isCorrect": true, "rationale": "This is the opposite of what the text describes. The opening paragraph and 'When No Follow-Up Is Sent' section highlight that people forget decisions and commitments rapidly without a follow-up."}]}, {"question": "A team just concluded a project planning meeting on November 5th. Based on the guidelines in the text, which subject line is most appropriate for the follow-up email?", "options": [{"text": "Meeting today", "isCorrect": false, "rationale": "The text emphasizes subject lines should be 'Clear and specific,' and include the date. This option is too vague and lacks specific context or date."}, {"text": "Project Planning", "isCorrect": false, "rationale": "While specific to the topic, this subject line lacks the date and an indication of the email's purpose (summary, action items), which are recommended for searchability and clarity."}, {"text": "Project Plan: What we talked about", "isCorrect": false, "rationale": "This subject line is informal ('What we talked about') and lacks the date, making it less professional and harder to reference later."}, {"text": "Meeting Summary & Action Items – Project Alpha, Nov. 5", "isCorrect": true, "rationale": "This subject line is 'Clear and specific,' indicates the email's purpose ('Summary & Action Items'), includes the meeting name ('Project Alpha'), and the date, making it highly searchable and informative as per the guidelines."}]}, {"question": "Which detail is most crucial to include in the 'Action Items' section of a follow-up email to effectively document accountability?", "options": [{"text": "A brief summary of the discussion that led to the task being assigned.", "isCorrect": false, "rationale": "While background can be helpful, the text emphasizes brevity in action items. Summarizing discussions is less crucial for accountability than identifying who is responsible."}, {"text": "The estimated time commitment required for completing the task.", "isCorrect": false, "rationale": "An estimated time commitment can be useful for planning but is not specifically mentioned as critical for accountability in the text's guidelines for action items."}, {"text": "The owner's name and a specific deadline for each task.", "isCorrect": true, "rationale": "The text explicitly states to 'List each action item with the owner's name and deadline, formatted so it is impossible to miss' as the most important part for documenting accountability."}, {"text": "A list of potential challenges or obstacles the owner might encounter.", "isCorrect": false, "rationale": "Identifying potential challenges is a planning activity for the task owner, not a required element of the follow-up email's action item format for accountability."}]}, {"question": "Marcus receives a follow-up email after a meeting where he was assigned a task. Upon reviewing the email, he realizes the description of his task is slightly different from what he understood during the meeting. What action should Marcus take, according-to the purpose of follow-up emails?", "options": [{"text": "Assume the email is correct and proceed with the task as written to avoid questioning the sender.", "isCorrect": false, "rationale": "This would contradict the goal of 'Confirm shared understanding,' where the text advises, 'If I got anything wrong, speak up now.'"}, {"text": "Wait until the next meeting to clarify the discrepancy, as it might resolve itself.", "isCorrect": false, "rationale": "Delaying clarification defeats the purpose of timely follow-up. Discrepancies should be addressed quickly to prevent wasted effort or misunderstandings."}, {"text": "Contact the sender immediately to confirm the shared understanding and clarify the task.", "isCorrect": true, "rationale": "This action directly aligns with the purpose 'Confirm shared understanding,' which aims to prevent 'two people leaving the same meeting with different understandings.' Immediate clarification is key."}, {"text": "Delete the email and rely solely on his personal notes from the meeting.", "isCorrect": false, "rationale": "Deleting the email negates its purpose as a written record and would likely lead to the 'Disputes arise' consequence if his personal notes differ from others'."}]}, {"question": "The 'Writing Tip' emphasizes sending the follow-up email within a specific timeframe. What is this recommended timeframe, and why is it important?", "options": [{"text": "Within a week, to allow sufficient time for careful reflection and comprehensive drafting.", "isCorrect": false, "rationale": "The text warns that 'Sent a week later, it is an archaeological artifact' because its value decreases rapidly. A week is too long."}, {"text": "Immediately before the next scheduled meeting, to serve as a last-minute reminder of tasks.", "isCorrect": false, "rationale": "Sending it just before the next meeting is too late; memories will have faded, and it doesn't allow time for action or clarification of misunderstandings."}, {"text": "Within 24 hours, because its value significantly decreases with every passing hour that memories fade.", "isCorrect": true, "rationale": "The text states 'Within 24 hours' and 'The value of a follow-up email decreases with every hour that passes,' highlighting the importance of timely reinforcement of fresh memories."}, {"text": "Only when specifically requested by a meeting attendee, to avoid unnecessary communication.", "isCorrect": false, "rationale": "The text advocates for proactive sending of follow-up emails to ensure productivity, not waiting for requests."}]}, {"question": "The step-by-step process for writing a follow-up email suggests starting by writing the action items. What is the primary reason for this recommended approach?", "options": [{"text": "Action items are typically the easiest part to write, so doing them first helps to build momentum.", "isCorrect": false, "rationale": "While it might build momentum, the primary reason given is not about ease but about importance and accuracy."}, {"text": "It ensures that the most critical information, which people need most, is captured accurately while fresh in the sender's mind.", "isCorrect": true, "rationale": "The text explicitly states: 'This is the part people need most, so write it first and write it carefully,' indicating that freshness of memory is crucial for accuracy here."}, {"text": "It allows the sender to quickly delegate the action item list to someone else for final review and distribution.", "isCorrect": false, "rationale": "The process described is for the sender to write and send the email, with no mention of delegating parts of the writing process."}, {"text": "The subject line depends heavily on the action items, so they must be finalized before anything else.", "isCorrect": false, "rationale": "The text advises writing the 'subject line last,' explicitly stating it should be done after knowing all the email's content, not before or simultaneously with action items."}]}, {"question": "A meeting organizer sends a follow-up email with the subject 'meeting' and includes only the lines: 'Good meeting today. We talked about a bunch of stuff and made some decisions. You know who needs to do things.' Based on the text, which critical element for a clear follow-up email is *most* conspicuously missing?", "options": [{"text": "A friendly closing remark, such as 'See you next time!'", "isCorrect": false, "rationale": "While a friendly closing is part of the recommended format, the lack of specific content makes this a minor omission compared to the core purpose of the email."}, {"text": "The date, time, and location of the next scheduled meeting.", "isCorrect": false, "rationale": "This is an important logistical detail, but the absence of specific decisions and action items is a more fundamental failure of the email's purpose."}, {"text": "Specific key decisions made and clearly assigned action items with owners and deadlines.", "isCorrect": true, "rationale": "The example directly mirrors the 'Vague Follow-Up' provided, which is criticized for communicating 'nothing useful' because it lacks specific decisions and action items with names and deadlines, which are the most important parts."}, {"text": "An attached copy of the full meeting minutes for detailed reference.", "isCorrect": false, "rationale": "Attaching full minutes is an optional element ('If full minutes exist, attach them or link to them') and not a 'critical element' that is conspicuously missing from the email's core content."}]}, {"question": "The 'Real-World Application' section suggests that sending follow-up emails after group project meetings, even when not asked, can demonstrate leadership. Which aspect of a follow-up email primarily contributes to this perception of leadership?", "options": [{"text": "The ability to use advanced email formatting features, like tables or bold text.", "isCorrect": false, "rationale": "While good formatting is helpful, it's a technical skill, not the core reason a follow-up demonstrates leadership. The content and proactive nature are key."}, {"text": "Taking initiative to ensure clarity, accountability, and continued progress for the group.", "isCorrect": true, "rationale": "This aligns with the overall purpose of follow-up emails (confirm understanding, document accountability, avoid rehashing) and the text's statement that the sender 'often becomes the de facto project leader' by ensuring the group stays on track."}, {"text": "Demonstrating superior note-taking skills during the meeting itself.", "isCorrect": false, "rationale": "Good note-taking is a prerequisite, but the act of *sending* the organized follow-up, and its impact, is what demonstrates leadership, not just the initial note-taking."}, {"text": "Having the inherent authority to assign new tasks and set deadlines for others.", "isCorrect": false, "rationale": "The follow-up email primarily *confirms* tasks and deadlines that were *agreed upon* in the meeting, not necessarily establishing new authority for the sender to assign tasks at will."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
