<script>
var QUESTIONS = [{"question": "According to the section, what is the primary determinant of professional email tone?", "options": [{"text": "By always maintaining a highly formal and serious demeanor to show respect.", "isCorrect": false, "rationale": "While respect is crucial, the text explicitly states that professional tone is not a 'fixed setting' and needs adjustment, not a constant 'highly formal' demeanor."}, {"text": "By adopting a single, consistent tone across all professional communications.", "isCorrect": false, "rationale": "The text's central premise is that 'the same message changes depending on who reads it,' directly contradicting the idea of a single, consistent tone."}, {"text": "By adjusting a flexible tone based on the recipient's relationship, the power dynamic, and the message's context.", "isCorrect": true, "rationale": "The 'keyconcept' box clearly states that professional tone 'is a spectrum that you adjust based on three factors: Your relationship, The power dynamic, and The context.'"}, {"text": "By prioritizing brevity and directness above all other considerations.", "isCorrect": false, "rationale": "Brevity and directness are important for certain recipients (e.g., supervisors, cold contacts), but they are characteristics of a chosen tone, not the primary factors that *determine* the tone itself."}]}, {"question": "Amara needs Mr. Patel's feedback on the Henderson Bridge proposal. Based on the guidelines for emailing a supervisor, which approach is most effective?", "options": [{"text": "Subject: Hey Mr. P, check out my draft when you can. Lmk what you think. Email: (no salutation) Just attach the draft.", "isCorrect": false, "rationale": "This approach is overly informal, uses slang, lacks specific details, and does not show respect for the supervisor's time, directly contradicting the guidelines for emailing a supervisor."}, {"text": "Subject: Request: Feedback on Draft Proposal by Wednesday. Email: Dear Mr. Patel, I have attached the first draft of the Henderson Bridge proposal. I would appreciate your input on the timeline in Section 3 and budget detail by Wednesday afternoon, as the client deadline is Friday. Thank you.", "isCorrect": true, "rationale": "This email is respectful, concise, and direct. It states the purpose immediately, specifies what feedback is needed, provides a clear deadline with a reason, and closes with gratitude, mirroring the model document's effective structure."}, {"text": "Subject: Proposal Feedback. Email: Mr. Patel, can you look at this draft? It's really important for the client. Get back to me ASAP.", "isCorrect": false, "rationale": "While direct, this email lacks crucial context (which draft, specific feedback areas), is demanding with 'ASAP,' and doesn't clearly value the supervisor's time by making the request easy to fulfill."}, {"text": "Subject: General Feedback. Email: Dear Mr. Patel, I have completed the first draft of the Henderson Bridge proposal. Please provide general feedback at your convenience. (No attachments)", "isCorrect": false, "rationale": "This email is too vague; it doesn't specify what kind of feedback is needed, which could lead to miscommunication or require more effort from the supervisor. It also fails to attach the draft."}]}, {"question": "Why is the 'After' version of Amara's email to James (a coworker) considered more effective than the 'Before' version?", "options": [{"text": "It uses more sophisticated vocabulary to sound more intelligent.", "isCorrect": false, "rationale": "The effectiveness comes from clarity and specificity, not necessarily sophisticated vocabulary. The 'After' version uses clear, direct language rather than complex terms."}, {"text": "It maintains a friendly tone while providing clear, specific details and context for the request.", "isCorrect": true, "rationale": "The text explains that the 'After' version is 'still friendly' (e.g., 'No rush,' 'Thanks!') but is 'clear, specific, and easy to act on,' providing necessary details like the file location and specific feedback areas."}, {"text": "It includes emojis, which are acceptable for internal communication with peers.", "isCorrect": false, "rationale": "The text explicitly advises against using 'slang, emoji, and text-speak' even in emails to coworkers, emphasizing the need to remain professional."}, {"text": "It uses a formal salutation like 'Dear James' to show respect.", "isCorrect": false, "rationale": "The 'After' version uses 'Hi James,' and the text notes that for coworkers, you can 'drop the 'Dear'' and adopt a friendlier tone, making 'Dear James' more formal than needed."}]}, {"question": "A client, Ms. Wang, has expressed concerns about an inspection timeline. Based on the advice for emailing a client, what is the most effective way for Amara to respond?", "options": [{"text": "Apologize vaguely for the inconvenience and promise to 'figure something out' at an unspecified future date.", "isCorrect": false, "rationale": "This response lacks confidence and concrete action, which would likely increase client frustration. The text emphasizes offering a 'concrete solution with specific dates.'"}, {"text": "Defend the original timeline, explaining all the reasons it was initially set and why the client's new plan is problematic.", "isCorrect": false, "rationale": "This approach is defensive and not 'solution-oriented' or 'helpful,' which are key characteristics for client emails, especially when handling complaints. It fails to acknowledge the client's problem immediately."}, {"text": "Immediately acknowledge the problem, apologize, offer a concrete solution with specific updated dates, explain how it addresses their concern, and reaffirm the professional partnership.", "isCorrect": true, "rationale": "This strategy aligns perfectly with the 'teachernote' on handling client complaints: 'acknowledges the problem immediately,' 'offers a concrete solution with specific dates,' 'explains how the solution addresses the client's concern,' and 'reaffirms the relationship.'"}, {"text": "Redirect the client's complaint directly to your supervisor without offering any initial response or solution yourself.", "isCorrect": false, "rationale": "While CC'ing the supervisor is standard, simply redirecting without any direct acknowledgment or attempt at a solution from Amara would likely frustrate the client further. The example shows Amara handling the response directly."}]}, {"question": "According to the 'keyconcept' box, which of the following is NOT one of the three key factors for adjusting professional email tone?", "options": [{"text": "Your relationship with the person.", "isCorrect": false, "rationale": "This is explicitly listed as the first factor: 'How well do you know this person?'"}, {"text": "The power dynamic between you and the recipient.", "isCorrect": false, "rationale": "This is explicitly listed as the second factor: 'Are they your supervisor, your peer, or someone you are trying to impress?'"}, {"text": "The length of the email.", "isCorrect": true, "rationale": "While brevity can be a characteristic of an effective email for certain recipients (like cold contacts), email length is not identified as one of the three fundamental *factors* that *determine* the appropriate tone spectrum."}, {"text": "The context of the message.", "isCorrect": false, "rationale": "This is explicitly listed as the third factor: 'Is this a routine message, a formal request, or a sensitive topic?'"}]}, {"question": "Daniel needs to email his history teacher, Mr. Brennan, after missing class. Which detail is crucial for Daniel to include to ensure Mr. Brennan can effectively help him?", "options": [{"text": "His entire medical history explaining his absence in detail.", "isCorrect": false, "rationale": "Providing extensive personal medical information is unnecessary and potentially inappropriate for an email to a teacher. A brief, professional reason for absence is sufficient."}, {"text": "A simple and informal 'What did I miss?'", "isCorrect": false, "rationale": "This is too vague and informal. It doesn't provide enough context for the teacher to quickly identify Daniel or his class, which the text highlights as crucial."}, {"text": "His full name, specific class period, date of absence, and a clear, specific request for covered material or assignments.", "isCorrect": true, "rationale": "The 'After' version of Daniel's email demonstrates the importance of these details: identifying 'which class,' 'the specific date,' and providing a clear request, along with showing initiative by promising to catch up."}, {"text": "An informal greeting like 'Hey Mr. B,' assuming a friendly relationship.", "isCorrect": false, "rationale": "The text advises against assuming a first-name basis with teachers unless explicitly invited and models using a respectful title like 'Dear Mr. Brennan.'"}]}, {"question": "Carlos is writing a cold email to Ms. Nakamura, a professional in UX design he admires. According to the 'Cold Email Formula' writing tip, which element is most critical for increasing the likelihood of a positive response?", "options": [{"text": "Sending a very long email that details his entire resume, academic achievements, and extensive career aspirations.", "isCorrect": false, "rationale": "The 'Writing Tip' explicitly states: 'Keep the entire email under 150 words if possible. Long cold emails rarely get read.'"}, {"text": "A subject line that simply says 'Question about UX Design' to pique curiosity.", "isCorrect": false, "rationale": "A vague subject line doesn't give the recipient a clear reason to open the email. The example uses a specific and informative subject line ('High School Student Interested in UX Design — Brief Question')."}, {"text": "Clearly establishing who he is, why he's contacting her specifically, and asking a concise, specific question, while acknowledging her valuable time.", "isCorrect": true, "rationale": "This directly aligns with the 'Cold Email Formula': 'Who you are (one sentence),' 'Why you are writing to them specifically,' 'Your specific question or request (make it easy to answer),' and 'Acknowledgment of their time (brief, genuine).'"}, {"text": "Demanding an immediate response due to the urgency of his career decision.", "isCorrect": false, "rationale": "Being demanding is disrespectful of the recipient's time and would likely deter them from responding to a cold email."}]}, {"question": "You need to request feedback on a project document. How would the appropriate level of formality typically differ between an email to your supervisor and an email to a peer, according to the text?", "options": [{"text": "Both should be equally formal, using full titles and explicit deadlines to ensure professional standards.", "isCorrect": false, "rationale": "The text clearly differentiates formality levels, stating professional tone is a spectrum, not one fixed setting for all recipients."}, {"text": "The email to your supervisor should be highly formal, concise, and direct, while the email to a peer can be slightly less formal and friendlier, but still professional and specific.", "isCorrect": true, "rationale": "This accurately reflects the text's guidance: 'When writing to a supervisor, be respectful, concise, and direct.' For coworkers, 'Emails to coworkers can be slightly less formal, but they should still be professional. You can use a first name, drop the 'Dear,' and adopt a friendlier tone.'"}, {"text": "The email to your supervisor can be informal, while the email to a peer should be very formal to maintain professional distance.", "isCorrect": false, "rationale": "This reverses the appropriate formality levels. Supervisors require a more formal and respectful tone, while peers allow for slight relaxation of formality."}, {"text": "Both can be informal, using text-speak and emojis to build rapport and speed up communication.", "isCorrect": false, "rationale": "The text explicitly advises against 'slang, emoji, and text-speak' even for coworkers, indicating that professional standards should always be maintained to some degree."}]}, {"question": "Which scenario best exemplifies the underlying principle of matching professional email tone to the recipient?", "options": [{"text": "Sending the exact same email requesting a favor to your CEO, a junior intern, and a client, to ensure consistency.", "isCorrect": false, "rationale": "This contradicts the core message that 'the same message changes depending on who reads it' and that tone is a 'deliberate choice,' not a fixed setting."}, {"text": "Crafting a highly formal email for a colleague, but an informal one for your boss to show personal connection.", "isCorrect": false, "rationale": "This reverses the appropriate formality levels for these two recipients and would likely be perceived as unprofessional, not a 'personal connection' with a boss."}, {"text": "Sending a concise, direct request with specific needs to your supervisor, a friendly but specific request to a coworker, and a polished, solution-oriented response to a client complaint.", "isCorrect": true, "rationale": "This scenario demonstrates the application of the varying tones for different recipients described in the text. It shows how the core message ('need feedback' or 'address issue') is adapted in style, formality, and specific details based on who is reading it."}, {"text": "Always writing emails that are under 50 words to save everyone time, regardless of the recipient or context.", "isCorrect": false, "rationale": "While conciseness is often valued, the text emphasizes providing 'enough context' and adjusting for the 'context' of the message, which sometimes requires more than 50 words (e.g., a detailed client response)."}]}, {"question": "According to the 'keyconcept' box at the beginning of the section, what is the ultimate benefit of getting the professional email tone right?", "options": [{"text": "It guarantees a promotion or a raise.", "isCorrect": false, "rationale": "While effective communication can contribute to career advancement, the text does not make such a definitive guarantee."}, {"text": "It ensures that all your emails are shorter and easier to read.", "isCorrect": false, "rationale": "While brevity is often a goal, the primary benefit is broader than just email length. The main focus is on how the tone impacts the recipient's perception and willingness to engage."}, {"text": "It shows respect, builds trust, and makes people more likely to help you.", "isCorrect": true, "rationale": "The 'keyconcept' box explicitly states: 'Getting the tone right shows respect, builds trust, and makes people more likely to help you.'"}, {"text": "It allows you to use more slang and informal language, especially with peers.", "isCorrect": false, "rationale": "The text advises *against* slang and informal language even with peers, stressing that emails should 'still be professional.' The benefit is about effective professional communication, not informal ease."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
