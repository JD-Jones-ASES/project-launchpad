    };

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary purpose of writing an effective complaint letter?", "options": [{"text": "To express frustration and anger about a poor product or service.", "isCorrect": false, "rationale": "The text explicitly states, 'The purpose of a complaint letter is not to vent your frustration. It is to get a specific problem resolved.'"}, {"text": "To get a specific problem resolved by providing factual details and a clear resolution request.", "isCorrect": true, "rationale": "The text emphasizes that an effective complaint letter 'is to get a specific problem resolved' and 'is specific, factual, and solution-oriented.'"}, {"text": "To warn other potential customers about the company's inadequate products or services.", "isCorrect": false, "rationale": "While a consequence of unresolved issues might be negative reviews, the primary purpose of the letter itself, as defined, is direct resolution with the company, not public warning."}, {"text": "To initiate legal action against the company for damages.", "isCorrect": false, "rationale": "The text positions complaint letters as a first step for resolution, not immediately for legal action, though a paper trail might be useful for escalation."}]}, {"question": "Which of the following elements is NOT one of the 'Four-Part Complaint Structure' outlined in the text?", "options": [{"text": "Document what you have already tried.", "isCorrect": false, "rationale": "This is explicitly listed as the third part of the complaint structure."}, {"text": "State your desired resolution clearly.", "isCorrect": false, "rationale": "This is explicitly listed as the fourth part of the complaint structure."}, {"text": "Threaten to involve consumer protection agencies if the issue is not resolved.", "isCorrect": true, "rationale": "The text advises against threatening language, stating that 'a complaint letter that is angry, vague, or threatening almost never works.' Threatening is not part of the recommended structure."}, {"text": "Explain the impact of the problem factually.", "isCorrect": false, "rationale": "This is explicitly listed as the second part of the complaint structure, emphasizing a factual, not emotional, explanation."}]}, {"question": "Imagine you are a customer service manager receiving two complaint letters. Letter A is vague and uses emotional language, while Letter B is specific, factual, and outlines previous attempts at resolution. Based on the text, which letter would you prioritize for immediate action and why?", "options": [{"text": "Letter A, because the emotional language signifies a very upset customer who needs immediate appeasement.", "isCorrect": false, "rationale": "The text states that 'emotional language makes you look unreasonable' and 'an angry, vague, or threatening almost never works.' While the customer is upset, Letter A provides little actionable information."}, {"text": "Letter B, because it provides all the necessary details for efficient problem-solving and demonstrates the customer's good-faith effort.", "isCorrect": true, "rationale": "The text highlights that an effective complaint 'gives the customer service team everything they need to resolve the issue immediately: the product, the order number, the timeline, the steps already taken, and a clear resolution request.'"}, {"text": "Neither, as both letters suggest a difficult customer who might be better handled by a supervisor.", "isCorrect": false, "rationale": "The text contrasts 'Angry Rant vs. Effective Complaint' directly, showing that an effective complaint (like Letter B) is designed to make the resolution process easier for the company, not more difficult."}, {"text": "Letter A, to understand the customer's feelings before delving into the facts presented in Letter B.", "isCorrect": false, "rationale": "The text clearly states the purpose is 'not to vent your frustration' but 'to get a specific problem resolved,' prioritizing facts over feelings for effective resolution."}]}, {"question": "When writing an adjustment letter, why is it crucial to 'explain and take responsibility' without making excuses or blaming the customer?", "options": [{"text": "To prevent the customer from escalating the issue to a consumer protection agency.", "isCorrect": false, "rationale": "While a positive resolution may prevent escalation, the primary reason for taking responsibility is to maintain trust and goodwill, as a defensive tone 'guarantees the customer will never buy from them again.'"}, {"text": "To simplify the company's internal investigation process by quickly identifying the responsible department.", "isCorrect": false, "rationale": "Explaining the cause helps the customer understand, but it's not primarily about internal investigation efficiency. The focus is on the customer relationship."}, {"text": "To maintain customer trust and goodwill, showing the company values their business and takes product quality seriously.", "isCorrect": true, "rationale": "The text emphasizes that a professional adjustment letter 'earns goodwill and loyalty' by acknowledging, explaining the cause honestly, and taking responsibility without being defensive or blaming the customer."}, {"text": "To legally admit fault, which can protect the company in potential future lawsuits.", "isCorrect": false, "rationale": "The text focuses on customer relations and business loyalty rather than legal strategy. An apology and explanation in this context are for building goodwill, not necessarily a legal admission of fault for litigation purposes."}]}, {"question": "Sandra Yamamoto's adjustment letter to David Park includes a $15 credit to his TechEdge account, which David did not explicitly request. Based on the text, what is the most likely strategic reason for this action?", "options": [{"text": "It is a standard company policy to offer a credit for any defective product complaint.", "isCorrect": false, "rationale": "The text does not state this is standard policy, but rather highlights it as a 'smart move' by Sandra, implying it's a strategic decision beyond the minimum required."}, {"text": "The company was legally obligated to provide additional compensation beyond a replacement or refund.", "isCorrect": false, "rationale": "The text does not suggest legal obligation; David requested a replacement or refund, implying those were the expected resolutions."}, {"text": "To 'turn a frustrated customer into a loyal one' by exceeding expectations and showing extra value for their business.", "isCorrect": true, "rationale": "The text explicitly states: 'She even goes beyond what David requested by offering a store credit—a smart move that turns a frustrated customer into a loyal one.'"}, {"text": "To compensate for the time David spent writing the complaint letter and communicating with support.", "isCorrect": false, "rationale": "While it implicitly acknowledges inconvenience, the primary strategic benefit highlighted is customer loyalty, not direct compensation for time spent."}]}, {"question": "A business receives a complaint about a billing error. Which of the following responses aligns best with the 'Three-Part Adjustment Structure' and demonstrates professionalism?", "options": [{"text": "“We received your complaint. Our billing department assures us there was no error on our part, but we will look into it if you provide proof.”", "isCorrect": false, "rationale": "This response is defensive, dismissive of the customer's claim, and shifts the burden of proof, violating the 'explain and take responsibility' and 'avoid blaming the customer' principles."}, {"text": "“We apologize for the inconvenience with your bill. We found a system glitch that double-charged you, and we've already processed a full refund to your account, which will appear in 3-5 business days.”", "isCorrect": true, "rationale": "This response acknowledges and apologizes, explains the cause (system glitch), takes responsibility without blaming the customer, and states a specific resolution with a timeline, aligning perfectly with the 'Three-Part Adjustment Structure'."}, {"text": "“We are sorry for the error. We have adjusted your bill. Please check your next statement for the correction.”", "isCorrect": false, "rationale": "While it acknowledges and apologizes, it lacks specific detail on the cause and the timeline/method of correction, which is crucial for 'stating the resolution' effectively."}, {"text": "“Thank you for your feedback. We are investigating your billing concern and will get back to you within 30 days.”", "isCorrect": false, "rationale": "This acknowledges but doesn't explain the cause or state a resolution, and a 30-day turnaround might be too long given the need for prompt attention to complaints."}]}, {"question": "Why does the text advise against using emotional language like 'furious' or 'unacceptable' in a complaint letter, even if the frustration is valid?", "options": [{"text": "Such language can make the letter sound unprofessional, potentially undermining the validity of the complaint.", "isCorrect": false, "rationale": "This is part of the reason, but the text gives a more specific consequence."}, {"text": "It makes the customer seem unreasonable, which can hinder the chances of a positive resolution.", "isCorrect": true, "rationale": "The 'Common Mistake' section states: 'Emotional language makes you look unreasonable, even if your complaint is completely valid. Stick to facts and specific details. A calm, factual letter is far more likely to get results than an angry one.'"}, {"text": "Companies are legally allowed to disregard complaint letters containing overly emotional terms.", "isCorrect": false, "rationale": "The text does not mention any legal implications; the advice is about effectiveness and perception."}, {"text": "Emotional language is more appropriate for public forums or social media, not direct correspondence.", "isCorrect": false, "rationale": "While true that public forums might see more emotional venting, the text's advice focuses on the ineffectiveness of such language in direct complaint letters regardless of other venues."}]}, {"question": "David Park's complaint letter includes details like 'Order #WK-39841' and 'Case #CS-11247.' What is the most significant benefit of including such specific identifying information?", "options": [{"text": "It proves that David is an organized customer, which may earn him special consideration.", "isCorrect": false, "rationale": "While organization is a side effect, the primary benefit is practical for the company."}, {"text": "It demonstrates David's thoroughness, making it easier for him to track his own complaint.", "isCorrect": false, "rationale": "It helps David, but the text focuses on how it helps the *recipient* resolve the issue."}, {"text": "It streamlines the resolution process by providing the customer service team with immediate access to relevant records.", "isCorrect": true, "rationale": "The text states: 'The “After” letter gives the customer service team everything they need to resolve the issue immediately: the product, the order number, the timeline, the steps already taken, and a clear resolution request.' Specifics are crucial for this."}, {"text": "It helps the company categorize complaints by type for internal reporting purposes.", "isCorrect": false, "rationale": "While the company might use this for internal reporting, the immediate and most significant benefit highlighted is speeding up the resolution of *that specific complaint*."}]}, {"question": "A student is asked to write a complaint letter based on a scenario where they ordered a blue shirt but received a red one. Which piece of information would be LEAST crucial to include for an effective complaint, based on the 'Four-Part Complaint Structure'?", "options": [{"text": "The exact date the order was placed and received.", "isCorrect": false, "rationale": "Dates are crucial for specific problem identification and are part of the 'State the problem clearly and specifically' element."}, {"text": "The emotional distress caused by not having the blue shirt for a planned event.", "isCorrect": true, "rationale": "The text advises to 'Be factual, not emotional' and that the purpose is 'not to vent your frustration.' Emotional impact, while real, should not be the focus."}, {"text": "The order number and product name (e.g., 'Men's Casual Shirt, SKU #12345').", "isCorrect": false, "rationale": "Product names and order numbers are essential 'identifying details' for stating the problem clearly."}, {"text": "A clear request for either a replacement blue shirt or a full refund.", "isCorrect": false, "rationale": "Stating the desired resolution is the fourth and critical part of the complaint structure."}]}, {"question": "The 'Writing Tip' advises readers to 'Keep Copies of Everything.' What is the primary reason for this recommendation?", "options": [{"text": "To keep track of personal expenses for tax purposes.", "isCorrect": false, "rationale": "While copies might have secondary uses, the text explicitly states the reason is related to complaint resolution and potential escalation."}, {"text": "To reduce paper waste by having digital copies instead of physical ones.", "isCorrect": false, "rationale": "The advice is about having a record, not the format (paper vs. digital) or environmental impact."}, {"text": "To provide a 'paper trail of professional, factual correspondence' that serves as strong evidence if the complaint needs to be escalated.", "isCorrect": true, "rationale": "The text directly states: 'If the issue is not resolved, you may need to escalate the complaint... A paper trail of professional, factual correspondence is your strongest evidence.'"}, {"text": "To help the company improve its record-keeping system by cross-referencing customer copies.", "isCorrect": false, "rationale": "The purpose is for the customer's benefit in managing their complaint, not for improving the company's internal systems."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
