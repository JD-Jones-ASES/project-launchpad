    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 15, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary distinction between a white paper with credible evidence and one without?", "options": [{"text": "A white paper with evidence is typically shorter and more concise due to focused information.", "isCorrect": false, "rationale": "The text does not suggest that white papers with evidence are shorter. In fact, strong evidence might sometimes require more detailed explanation, but conciseness is a writing goal separate from the presence of evidence."}, {"text": "A white paper without evidence is merely an opinion piece or a wish list, lacking substantiated claims.", "isCorrect": true, "rationale": "The text explicitly states: 'A white paper without evidence is just an opinion piece. A technical proposal without evidence is just a wish list.' This highlights the crucial role of evidence in transforming claims into substantiated arguments."}, {"text": "A white paper with evidence is generally easier to write because the facts guide the argument.", "isCorrect": false, "rationale": "While facts provide guidance, the process of finding, evaluating, and effectively integrating evidence can be complex. The text focuses on the *necessity* of evidence, not the ease of writing."}, {"text": "A white paper without evidence uses more sophisticated and persuasive language to compensate for the lack of data.", "isCorrect": false, "rationale": "Sophisticated language cannot compensate for a lack of credible evidence. The text emphasizes that claims must be supported by real evidence, not just eloquent phrasing."}]}, {"question": "A researcher for a technical proposal on renewable energy conducts a new experiment measuring the efficiency of a novel solar cell material. They then read an academic journal article summarizing existing research on similar materials to provide background. Which statement correctly identifies the source types?", "options": [{"text": "The experiment results are a secondary source; the journal article is a primary source.", "isCorrect": false, "rationale": "This statement incorrectly reverses the definitions. Original data from an experiment is primary, while an article summarizing other research is secondary."}, {"text": "Both the experiment results and the journal article are primary sources.", "isCorrect": false, "rationale": "The journal article summarizing existing research is a secondary source, as it interprets and analyzes primary sources, rather than presenting original, firsthand evidence."}, {"text": "The experiment results are a primary source; the journal article is a secondary source.", "isCorrect": true, "rationale": "The experiment results represent original, firsthand data, making them a primary source. The journal article, by analyzing, interpreting, or summarizing primary sources (other research), functions as a secondary source."}, {"text": "Both the experiment results and the journal article are secondary sources.", "isCorrect": false, "rationale": "Original data from an experiment is explicitly defined as a primary source, not a secondary one."}]}, {"question": "The 'Writing Tip: Lead with Primary, Support with Secondary' suggests which approach for constructing an argument in a white paper?", "options": [{"text": "Rely solely on primary sources to avoid bias, using secondary sources only for the bibliography.", "isCorrect": false, "rationale": "The tip acknowledges the value of secondary sources for context and background, not just for bibliography entries. Avoiding bias is important, but secondary sources aren't inherently biased simply by being secondary."}, {"text": "Build the core argument using primary sources and use secondary sources to provide broader context or show that findings fit a larger pattern.", "isCorrect": true, "rationale": "This option accurately reflects the advice: 'When possible, build your argument on primary sources and use secondary sources to provide context' and 'use secondary sources to show that your findings fit a larger pattern.'"}, {"text": "Prioritize secondary sources for general information and introduce primary sources only when specific, unique data is required.", "isCorrect": false, "rationale": "This reverses the recommended strategy of 'leading with primary.' Primary sources should form the foundation of specific claims."}, {"text": "Use an equal balance of primary and secondary sources in every section to ensure comprehensive coverage.", "isCorrect": false, "rationale": "The tip emphasizes strategic use based on the source's role (leading vs. supporting), not an equal numerical balance in every section."}]}, {"question": "You are writing a technical proposal about optimizing energy use in K-12 schools. You find an article from 2012 by a solar panel company advocating for solar installation, an independent research report from 2023 on school energy efficiency, and a personal blog post from 2024 about a homeowner's electricity bill. Which source would be the *most* credible based on the criteria in the text?", "options": [{"text": "The 2012 article from the solar panel company.", "isCorrect": false, "rationale": "This source suffers on multiple credibility criteria: 'Currency' (2012 data is old for fast-moving fields), and 'Purpose' (a company selling solar panels may have a marketing bias)."}, {"text": "The independent research report from 2023 on school energy efficiency.", "isCorrect": true, "rationale": "This source excels on credibility criteria: 'Authority' (independent research), 'Currency' (2023 is recent), 'Purpose' (independent research suggests less bias), and 'Relevance' (directly related to school energy efficiency)."}, {"text": "The personal blog post from 2024 about a homeowner's electricity bill.", "isCorrect": false, "rationale": "This source lacks 'Authority' (personal blog post vs. expert organization) and 'Relevance' (homeowner's bill may not apply to K-12 school buildings), despite its 'Currency'."}, {"text": "All sources are equally credible if they contain relevant keywords that match the proposal's topic.", "isCorrect": false, "rationale": "This statement directly contradicts the section on 'Evaluating Source Credibility,' which emphasizes that not every source deserves a place and that specific criteria must be applied beyond mere keyword matching."}]}, {"question": "The 'Common Mistake: Citing Everything You Find' section highlights a critical point about source selection. Which statement best reflects this advice?", "options": [{"text": "The quantity of sources is generally more important than their individual quality for demonstrating thorough research.", "isCorrect": false, "rationale": "The text explicitly states the opposite: 'Ten strong sources are far more persuasive than thirty mediocre ones.' Quantity without quality is not beneficial."}, {"text": "Including weak, irrelevant, or tangential sources does not strengthen an argument; it actually makes it weaker and is noticed by evaluators.", "isCorrect": true, "rationale": "The text directly states: 'Including weak or irrelevant sources does not make your argument stronger—it makes it weaker. Evaluators notice when a white paper pads its reference list with tangential sources, outdated studies, or low-credibility websites.'"}, {"text": "All sources encountered during research should be cited to ensure no idea is accidentally plagiarized.", "isCorrect": false, "rationale": "While avoiding plagiarism is crucial, the advice here is about *evaluating* sources and choosing only *strong, relevant* ones to cite, rather than indiscriminately citing everything found."}, {"text": "The primary purpose of citations is to pad the reference list, giving the appearance of extensive research.", "isCorrect": false, "rationale": "This contradicts the ethical and practical purposes of citations (credibility, verification, ethics) and is precisely what the 'Common Mistake' warns against (padding with tangential sources)."}]}, {"question": "You are incorporating data from a government report into your white paper. The report contains a detailed statistical analysis of energy consumption trends. You also find a quote from the Secretary of Energy making a precise policy statement that you want to reference. How should you generally handle these two types of information, according to the text?", "options": [{"text": "Quote both the statistical analysis and the policy statement directly to preserve accuracy.", "isCorrect": false, "rationale": "Direct quoting is rarely the default for statistical analysis, which is better conveyed in your own words. While a policy statement *might* warrant a direct quote, it's not the default for all information."}, {"text": "Paraphrase both the statistical analysis and the policy statement to maintain your own writing voice.", "isCorrect": false, "rationale": "While paraphrasing is the default, the text suggests quoting directly 'when the exact wording matters—for example... a famous statement by a recognized authority.' A precise policy statement might fall into this category."}, {"text": "Paraphrase the statistical analysis to convey its substance in your own words, and quote the Secretary of Energy's policy statement directly if its exact wording is critical.", "isCorrect": true, "rationale": "This aligns perfectly with the guidance: 'Paraphrase when you need to convey the substance of a finding or argument. This is the default... Quote directly only when the exact wording matters—for example... a famous statement by a recognized authority.'"}, {"text": "Summarize both briefly, without quoting or detailed paraphrasing, to keep the document concise.", "isCorrect": false, "rationale": "While conciseness is good, this approach doesn't distinguish between the best way to handle different types of information (statistical substance vs. precise wording) and might sacrifice clarity or accuracy."}]}, {"question": "Consider the 'Poor Paraphrase vs. Effective Paraphrase' example. What is the key advantage of the 'after' version over the 'before' version?", "options": [{"text": "The 'after' version uses more technical jargon, demonstrating the writer's expertise on the subject matter.", "isCorrect": false, "rationale": "The 'after' version actually simplifies the language and avoids jargon where possible, making it more accessible, not more technical."}, {"text": "The 'after' version includes a longer direct quote, which is always preferred for impactful statistical data.", "isCorrect": false, "rationale": "The 'after' version uses *less* direct quoting and more effective paraphrasing, demonstrating that the writer understands and can integrate the data rather than just copying it."}, {"text": "The 'after' version effectively condenses the information, adds original insight (like the 80% calculation), integrates the data into the writer's own voice, and cites the source once.", "isCorrect": true, "rationale": "The text explains the 'after' version: 'paraphrases the data in the writer's own voice, uses a calculated figure (80%) to add insight, and cites the source once. The result reads more naturally and demonstrates that the writer actually understands the data rather than just copying it.'"}, {"text": "The 'after' version provides multiple citations for the same data, enhancing its credibility.", "isCorrect": false, "rationale": "The 'after' version explicitly states it 'cites the source once,' indicating a more streamlined approach to attribution for a single source, rather than multiple citations for the same data point."}]}, {"question": "Which of the following is NOT listed as one of the three primary purposes of citations?", "options": [{"text": "Enhancing readability by breaking up long paragraphs with parenthetical references.", "isCorrect": true, "rationale": "While citations might visually break up text, their primary purposes are not about readability or paragraph structure. The text lists Credibility, Verification, and Ethics as the three purposes."}, {"text": "Allowing readers to check sources and verify claims independently.", "isCorrect": false, "rationale": "This is listed as 'Verification,' one of the three primary purposes of citations."}, {"text": "Giving proper credit to the people who produced the original research or data.", "isCorrect": false, "rationale": "This is listed as 'Ethics,' one of the three primary purposes of citations."}, {"text": "Showing that claims are supported by real evidence from identifiable sources.", "isCorrect": false, "rationale": "This is listed as 'Credibility,' one of the three primary purposes of citations."}]}, {"question": "What fundamental rule governs the relationship between in-text citations and the reference list, as described in the text?", "options": [{"text": "All sources found during research must appear in the reference list, regardless of whether they are cited in the text.", "isCorrect": false, "rationale": "This is incorrect. The text states 'every entry in your reference list must be cited somewhere in the text,' meaning only cited sources should be in the reference list."}, {"text": "Only sources directly quoted in the text need to be included in the reference list.", "isCorrect": false, "rationale": "This is incorrect. Any idea, data, or argument, whether quoted or paraphrased, that originates from a source must be cited in text and have a corresponding entry in the reference list."}, {"text": "Every source cited in the text must appear in the reference list, and every entry in the reference list must be cited somewhere in the text.", "isCorrect": true, "rationale": "This option perfectly describes the 'two-way correspondence' rule: 'Every source cited in your text must appear in a reference list at the end of your document, and every entry in your reference list must be cited somewhere in the text.'"}, {"text": "The reference list is optional for short technical proposals but mandatory for comprehensive white papers.", "isCorrect": false, "rationale": "The text makes no such distinction. Both white papers and technical proposals 'demand that you support every significant claim with credible evidence—and that you tell your reader exactly where that evidence comes from,' implying a reference list for both."}]}, {"question": "You are writing a white paper and state, 'The Earth revolves around the Sun.' You then include a specific statistic: 'Global average temperatures have risen by approximately 1.1 degrees Celsius since the late 19th century (IPCC, 2021).' What is the correct approach regarding citations for these two statements, according to the 'Simple Rule for Avoiding Plagiarism'?", "options": [{"text": "Both statements require a citation because all facts, regardless of their commonality, must be attributed to a source.", "isCorrect": false, "rationale": "The text explicitly states 'common knowledge—facts so widely known that they do not need attribution' as the only exception to the rule, and 'The Earth revolves around the Sun' falls into this category."}, {"text": "Neither statement requires a citation, as both are generally accepted facts within a well-educated audience.", "isCorrect": false, "rationale": "While 'The Earth revolves around the Sun' is common knowledge, the specific temperature increase is precise data, not common knowledge, and requires attribution."}, {"text": "'The Earth revolves around the Sun' does not require a citation as it is common knowledge, but the temperature statistic does because it is specific data derived from research.", "isCorrect": true, "rationale": "This correctly applies the 'Simple Rule for Avoiding Plagiarism': Common knowledge ('The sun rises in the east' example given) does not need a citation. Specific data or statistics ('Global average temperatures...') are not common knowledge and always require a citation to their source."}, {"text": "The temperature statistic needs a citation only if it is a direct quote; if paraphrased, no citation is necessary.", "isCorrect": false, "rationale": "This is incorrect. The 'Simple Rule' states: 'If an idea, fact, statistic, argument, or phrase came from somewhere other than your own mind, cite it.' This applies to both direct quotes and paraphrased information."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
