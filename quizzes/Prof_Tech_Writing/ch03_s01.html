    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Based on the text, what is the fundamental difference between \"instructions\" and \"process descriptions\"?", "options": [{"text": "Instructions are always sequential, while descriptions can include parallel tasks.", "isCorrect": false, "rationale": "While instructions often involve sequential steps, this is not the fundamental difference. The core distinction lies in their purpose and audience, as described in the text."}, {"text": "Instructions tell someone how to do something for a doer, while process descriptions tell someone how something works for a reader.", "isCorrect": true, "rationale": "The text explicitly states: 'Instructions tell someone how to do something. They are written for the doer... Process descriptions tell someone how something works. They are written for the reader who wants to understand a process, not necessarily perform it.'"}, {"text": "Instructions are typically for advanced users, while descriptions are for beginners.", "isCorrect": false, "rationale": "The text does not categorize instructions or descriptions by the skill level of their audience in this manner. Both can be for various skill levels depending on the content."}, {"text": "Instructions focus on theory, whereas descriptions focus on practical application.", "isCorrect": false, "rationale": "This is incorrect. Instructions are inherently practical and action-oriented, while descriptions focus on understanding the mechanics or theory of how something works."}]}, {"question": "A technical writer is drafting a step for assembling a product: 'Insert Tab A into Slot B until it clicks.' Which grammatical mood is used for the command 'Insert'?", "options": [{"text": "Indicative mood", "isCorrect": false, "rationale": "The indicative mood states a fact or asks a question (e.g., 'Tab A is inserted'). It does not give a direct command."}, {"text": "Subjunctive mood", "isCorrect": false, "rationale": "The subjunctive mood expresses a wish, a possibility, or a hypothetical situation (e.g., 'I suggest you insert Tab A'). It is not used for direct commands."}, {"text": "Interrogative mood", "isCorrect": false, "rationale": "The interrogative mood is used for asking questions (e.g., 'Did you insert Tab A?'). It does not give a command."}, {"text": "Imperative mood", "isCorrect": true, "rationale": "The text defines 'Imperative mood' as 'A verb form that gives a direct command or instruction (“Click the button,” “Remove the cap”).' 'Insert Tab A' is a direct command."}]}, {"question": "According to the chapter, what is the broadest range of consequences that can result from poor instructions?", "options": [{"text": "Mild annoyance and minor equipment damage only.", "isCorrect": false, "rationale": "This is too narrow a scope. While these are consequences, the text highlights more severe outcomes."}, {"text": "Patient medication errors and product recalls.", "isCorrect": false, "rationale": "These are significant examples, but the text also mentions broader consequences like frustration, wasted time, and food safety issues, indicating a wider range than just these specific scenarios."}, {"text": "Frustration, wasted time, financial costs, and serious injury or danger.", "isCorrect": true, "rationale": "The text discusses consequences ranging from 'mildly annoying (spending an extra hour assembling a bookshelf)' to 'genuinely dangerous' scenarios like 'patient received ten times the intended dose' and 'workplace injury,' encompassing frustration, time, money, and personal safety."}, {"text": "Negative customer reviews and inability to use new technology.", "isCorrect": false, "rationale": "These are consequences, but they do not cover the full breadth of issues, such as physical danger or significant financial losses for companies, that bad instructions can cause."}]}, {"question": "When designing instructions for a new coffee machine, what is the *most* crucial factor an instructional designer should consider first?", "options": [{"text": "The marketing strategy for promoting the coffee machine.", "isCorrect": false, "rationale": "While important for sales, the marketing strategy does not directly influence the clarity and effectiveness of the instructions themselves for the user."}, {"text": "What the end user already knows about coffee machines and their access to tools or specific coffee beans.", "isCorrect": true, "rationale": "The text emphasizes: 'When you write instructions, you must always ask: 'Who is my end user? What do they already know? What tools do they have?'' Understanding the end user's context is paramount for effective instructions."}, {"text": "The legal disclaimers and warranty information that must be included.", "isCorrect": false, "rationale": "Legal information is necessary but is not the primary factor in ensuring the usability and effectiveness of the instructional steps themselves."}, {"text": "The aesthetic design and packaging of the instructions booklet.", "isCorrect": false, "rationale": "The visual presentation is important for usability, but it's secondary to understanding the user's needs and the content of the instructions."}]}, {"question": "A 'Warning' is distinct from a 'Caution' in technical instructions because a Warning specifically indicates a risk of:", "options": [{"text": "Minor inconvenience or delay.", "isCorrect": false, "rationale": "Neither a Warning nor a Caution is primarily for minor inconvenience or delay; these are for potential harm or damage."}, {"text": "Helpful additional information that is not required to complete a step.", "isCorrect": false, "rationale": "This describes a 'Note,' not a Warning or Caution."}, {"text": "Serious injury or major equipment damage.", "isCorrect": true, "rationale": "The vocabbox defines 'Warning' as 'A notice about a risk of serious injury or major damage,' distinguishing it from 'Caution' which is for 'minor injury or equipment damage.'"}, {"text": "Minor injury or equipment damage.", "isCorrect": false, "rationale": "This definition specifically applies to a 'Caution,' not a 'Warning,' as per the vocabbox."}]}, {"question": "A nurse is writing instructions for a patient on how to care for a wound at home. Based on the chapter's examples, why are clear and precise instructions particularly critical in this healthcare scenario?", "options": [{"text": "Unclear instructions might lead the patient to seek unnecessary follow-up appointments.", "isCorrect": false, "rationale": "While a possibility, the text highlights a more severe consequence in healthcare."}, {"text": "The patient could develop a serious infection if the instructions are misunderstood or incomplete.", "isCorrect": true, "rationale": "The text explicitly states: 'Healthcare: A nurse writes instructions for a patient on how to care for a wound at home. If the instructions are unclear, the patient could develop an infection.'"}, {"text": "The hospital might face administrative penalties for poor documentation.", "isCorrect": false, "rationale": "This is an institutional consequence, but the chapter emphasizes the direct impact on the 'doer' or end-user in terms of safety and outcome."}, {"text": "The instructions might not adhere to standard medical terminology.", "isCorrect": false, "rationale": "While important for professionalism, this isn't the primary 'why good instructions matter' consequence emphasized in the text for patient care."}]}, {"question": "The 'Writing Tip: Start with the End in Mind' suggests writing the completion statement first. What is the primary analytical benefit of this approach for the instructional writer?", "options": [{"text": "It helps in estimating the total time required for the task more accurately.", "isCorrect": false, "rationale": "While estimating time is part of good instructions, it's not the *primary* benefit of this specific tip."}, {"text": "It ensures that the instructions are visually appealing and easy to read.", "isCorrect": false, "rationale": "This tip focuses on content and completeness, not primarily on aesthetic presentation."}, {"text": "It prevents the inclusion of unnecessary steps and ensures all critical steps are present to achieve the desired outcome.", "isCorrect": true, "rationale": "The tip states: 'Starting from the end helps you avoid including unnecessary steps and ensures you do not leave out critical ones,' directly leading to a complete and relevant set of instructions."}, {"text": "It allows the writer to determine the appropriate level of detail for each substep.", "isCorrect": false, "rationale": "While important, determining detail comes *after* establishing the necessary steps. This tip focuses on the overall sequence and content. "}]}, {"question": "Which element of good instructions primarily ensures that the reader possesses all necessary materials, tools, permissions, or background knowledge before beginning a task?", "options": [{"text": "A clear title", "isCorrect": false, "rationale": "A clear title informs the reader what the instructions are about, but not what they need to *start* it."}, {"text": "An introduction", "isCorrect": false, "rationale": "The introduction explains the task and its purpose, but typically doesn't detail specific items or knowledge needed to begin."}, {"text": "A list of prerequisites", "isCorrect": true, "rationale": "The text defines 'prerequisites' as 'something that must be true or done before the instructions can begin—materials, tools, permissions, or knowledge the reader needs before starting.'"}, {"text": "A result or completion statement", "isCorrect": false, "rationale": "The completion statement describes what success looks like *after* the task is done, not what's needed beforehand."}]}, {"question": "The key concept 'Instructions Are for the Doer' implies that every sentence in a set of instructions should primarily serve what purpose?", "options": [{"text": "To entertain the reader and keep them engaged with the content.", "isCorrect": false, "rationale": "While engagement is good, the primary purpose of instructions is practical action, not entertainment."}, {"text": "To provide historical context or background information about the process.", "isCorrect": false, "rationale": "This type of information is more characteristic of a process description, not action-oriented instructions."}, {"text": "To help the reader take the next immediate action or step.", "isCorrect": true, "rationale": "The text states: 'Instructions are action-oriented documents written for someone who needs to perform a task. Every sentence should help the reader take the next step. If a sentence does not help the reader act, it probably does not belong in the instructions.'"}, {"text": "To justify the necessity of performing the task to the reader.", "isCorrect": false, "rationale": "While the introduction might briefly explain 'why' the reader might need to do it, the core of the instructions is about the 'how to do,' not justification for every sentence."}]}, {"question": "Which component of effective instructions explicitly informs the reader about the successful outcome or state they should observe upon finishing the task?", "options": [{"text": "Numbered steps written in the imperative mood.", "isCorrect": false, "rationale": "These steps describe *how* to perform the task, not the final observable state of success."}, {"text": "Warnings, cautions, and notes.", "isCorrect": false, "rationale": "These provide critical contextual information, risks, or helpful tips, but they do not describe the successful completion state."}, {"text": "An introduction that explains the task and its duration.", "isCorrect": false, "rationale": "The introduction sets the stage but doesn't detail what the end result should look like."}, {"text": "A result or completion statement.", "isCorrect": true, "rationale": "The text explicitly lists 'A result or completion statement that tells the reader what success looks like' as a building block of good instructions."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
