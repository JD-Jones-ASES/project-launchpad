<script>
var QUESTIONS = [{"question": "What is the primary objective of using the 'inverted pyramid' structure in professional announcements?", "options": [{"text": "To create suspense and encourage readers to read the entire document for the main revelation.", "isCorrect": false, "rationale": "The inverted pyramid aims to deliver critical information immediately, which is the opposite of creating suspense. Its goal is efficiency for the reader, not to encourage full document consumption."}, {"text": "To ensure that the most critical information is immediately accessible, especially for busy readers who may only skim the content.", "isCorrect": true, "rationale": "The text states the inverted pyramid 'puts the most important information first' specifically to solve the challenge of 'getting people to actually read them,' ensuring 'If the reader stops here, they have the essentials.'"}, {"text": "To follow a traditional narrative arc, building up to the main point through a series of supporting details.", "isCorrect": false, "rationale": "The text explicitly contrasts the inverted pyramid with a 'traditional essay' structure, noting that professional communication 'flip that structure upside down' instead of building up to the main point."}, {"text": "To organize details chronologically, from the earliest event or decision to the most recent update.", "isCorrect": false, "rationale": "The inverted pyramid organizes information by importance, not by chronology. It prioritizes 'the who, what, when, where, and why' regardless of the timeline of their occurrence relative to other details."}], "id": "q01"}, {"question": "Which of the following would be the most effective 'lead' for an announcement about a new company policy regarding remote work?", "options": [{"text": "As you may know, the landscape of work has been evolving rapidly over the past few years, prompting many organizations to reconsider their operational models.", "isCorrect": false, "rationale": "This opening provides general background and context, burying the actual news. It does not answer 'What do I need to know?' immediately, failing the 'Busy Reader' Test."}, {"text": "The company is implementing a new remote work policy, effective October 15, allowing eligible employees greater flexibility.", "isCorrect": true, "rationale": "This lead immediately provides the 'who' (company), 'what' (new remote work policy), 'when' (effective October 15), and 'why it matters' (greater flexibility), making it highly effective for a busy reader."}, {"text": "A memo from HR regarding remote work will be distributed soon; please read it carefully for important updates.", "isCorrect": false, "rationale": "This lead is vague and doesn't provide the actual news. It announces an announcement rather than providing the essential information upfront, making the reader wait for crucial details."}, {"text": "After extensive discussions and a comprehensive review of employee feedback, a decision has been reached on our remote work strategy.", "isCorrect": false, "rationale": "Similar to a 'buried lead,' this sentence provides a setup and background information about the decision-making process before revealing what the decision actually is. It's the writer's story, not the reader's immediate need."}], "id": "q02"}, {"question": "A manager is drafting an announcement about a mandatory software update. Applying the 'Busy Reader' Test, which opening sentence would be most effective?", "options": [{"text": "Our IT department has been evaluating several options for improving system efficiency and data security, and we've decided on a new approach.", "isCorrect": false, "rationale": "This sentence offers background information about the IT department's process rather than the crucial information about the update itself. It's a 'buried lead' that fails the 'Busy Reader' Test."}, {"text": "A critical system-wide software update will be deployed on Sunday, October 27, requiring a temporary system shutdown from 9 AM to 1 PM.", "isCorrect": true, "rationale": "This lead immediately informs the reader about 'what' (software update), 'when' (Sunday, October 27), 'what' it entails (system shutdown), and 'when' the disruption will occur. This provides essential information upfront, passing the 'Busy Reader' Test."}, {"text": "It's important that all employees are aware of upcoming changes to our software infrastructure, which will enhance our operational capabilities.", "isCorrect": false, "rationale": "This sentence is too general and lacks specific details about 'what' the changes are, 'when' they will happen, or 'how' they specifically affect the reader. A busy reader would still lack the essential information."}, {"text": "The process for updating our software has been complex, involving coordination across multiple teams and vendors, but it's finally nearing completion.", "isCorrect": false, "rationale": "This focuses on the writer's experience and the complexity of the update process, not the reader's need for information about the update itself. It describes the 'writer's story' rather than the 'reader's need.'"}], "id": "q03"}, {"question": "According to the inverted pyramid structure, where should 'nice to know, but not essential' information be placed?", "options": [{"text": "In the lead paragraph, alongside the most important details.", "isCorrect": false, "rationale": "The lead is reserved for the 'Most important information first,' which includes the essentials. 'Nice to know' details are specifically identified as non-essential and should not clutter the lead."}, {"text": "As supporting details, directly after the main announcement.", "isCorrect": false, "rationale": "Supporting details provide 'Context, background, and additional information that helps the reader understand fully.' While important, 'nice to know' details are considered less critical than these supporting details."}, {"text": "In the conclusion, as a summary of the entire announcement.", "isCorrect": false, "rationale": "The conclusion typically focuses on 'next steps or contact information,' not minor background details. Summaries should reinforce essential points, not introduce non-essential ones."}, {"text": "Last, as minor details and background, as it's not essential for core understanding.", "isCorrect": true, "rationale": "The text explicitly states this tier is for 'Minor details and background last — Nice to know, but not essential. If the reader never gets this far, they still have what they need.'"}], "id": "q04"}, {"question": "When writing an effective announcement, what is the correct sequence of information as outlined in the text?", "options": [{"text": "Provide necessary details; Lead with the news; Explain why it matters; Close with next steps.", "isCorrect": false, "rationale": "This sequence incorrectly places necessary details and explanation before leading with the news, contradicting the inverted pyramid principle."}, {"text": "Lead with the news; Explain why it matters; Provide necessary details; Close with next steps or contact information.", "isCorrect": true, "rationale": "This sequence directly matches the enumerated steps for 'Writing Effective Announcements' provided in the text, starting with the most critical information and progressing to lesser but still important details."}, {"text": "Close with next steps; Lead with the news; Provide necessary details; Explain why it matters.", "isCorrect": false, "rationale": "This sequence incorrectly starts with next steps and places 'why it matters' too late, failing to prioritize information for the busy reader."}, {"text": "Explain why it matters; Provide necessary details; Lead with the news; Close with next steps.", "isCorrect": false, "rationale": "This sequence places the 'lead with the news' too far down and incorrectly prioritizes explanation and details over the core announcement itself."}], "id": "q05"}, {"question": "Consider the 'Before' example of 'The Buried Lead' regarding the company picnic. What is the primary problem with its opening?", "options": [{"text": "It is too brief and lacks sufficient background detail for the reader to understand the context.", "isCorrect": false, "rationale": "The 'Before' version is criticized for being too long with irrelevant background, not too brief. It includes 'three sentences of background that nobody asked for.'"}, {"text": "It presents extensive background information about the decision-making process before stating the actual news (date and location).", "isCorrect": true, "rationale": "The text explicitly states the 'Before' version 'buries the actual news—the date and location—after three sentences of background that nobody asked for.' This is the definition of a buried lead."}, {"text": "It fails to include a clear call to action or RSVP instructions in the initial paragraph.", "isCorrect": false, "rationale": "While true that a call to action isn't in the opening, the primary problem identified with the *opening* specifically is the background overwhelming the news, not the absence of later details."}, {"text": "It uses overly formal and impersonal language, which is inappropriate for a company social event announcement.", "isCorrect": false, "rationale": "The language formality isn't identified as the primary issue. The main problem is the *structure*—specifically, the placement of information in relation to reader needs."}], "id": "q06"}, {"question": "What is the defining characteristic of an effective 'lead' in an announcement?", "options": [{"text": "It provides a detailed history and context of the event or change, ensuring the reader has all background knowledge.", "isCorrect": false, "rationale": "Detailed history and context are considered supporting details or minor background, not part of the immediate, critical information that constitutes an effective lead. A lead focuses on current essentials."}, {"text": "It immediately answers the reader's question: 'What do I need to know?' by covering the most critical information.", "isCorrect": true, "rationale": "The text defines the lead as 'the most important part of any announcement' and that 'A strong lead answers the reader's immediate question: “What do I need to know?”'"}, {"text": "It includes all possible logistical details and comprehensive contact information for further questions.", "isCorrect": false, "rationale": "While important, logistical details and contact information are 'necessary details' or 'next steps,' which typically follow the lead, not comprise the lead itself. The lead covers the essentials."}, {"text": "It introduces the topic in a narrative or storytelling manner to engage the reader emotionally.", "isCorrect": false, "rationale": "A narrative or storytelling approach is characteristic of traditional essays, not professional announcements using the inverted pyramid, which prioritizes immediate information over engagement through story."}], "id": "q07"}, {"question": "Referring to the 'Company-Wide Announcement of an Event' example, which formatting technique is highlighted as crucial for a busy reader to quickly grasp key information?", "options": [{"text": "Using formal memorandum headings like 'TO,' 'FROM,' 'DATE,' and 'RE' to categorize information.", "isCorrect": false, "rationale": "While standard memo formatting is present, the text specifically points out other techniques for *quickly grasping key information* beyond the initial header block."}, {"text": "Employing bullet points for all details to break up long paragraphs and improve readability.", "isCorrect": false, "rationale": "Bullet points are used effectively in the example, but the text specifically calls out the use of 'bold text' and 'clear headings' as crucial for scanning."}, {"text": "Using bold text for the most critical information and organizing details under clear, descriptive headings.", "isCorrect": true, "rationale": "The text explicitly states: 'Notice how this announcement uses bold text for the most critical information... organizes details under clear headings, and ends with specific contact information. A reader could scan this memo in ten seconds and know everything they need to do.'"}, {"text": "Ensuring all sentences are short and concise, avoiding complex vocabulary to maintain clarity.", "isCorrect": false, "rationale": "Clarity and conciseness are good writing practices, but the text specifically highlights the visual formatting of bold text and headings as a 'notice how' point for scannability."}], "id": "q08"}, {"question": "The text states, 'That background is the writer's story, not the reader's need.' What does this imply for announcement writing?", "options": [{"text": "Writers should prioritize their personal narrative and experiences to make the announcement more engaging and relatable.", "isCorrect": false, "rationale": "This is the opposite of the principle. The 'writer's story' (background on how decisions were made) should be de-emphasized in favor of the 'reader's need' (the actual news)."}, {"text": "Announcements should primarily include information that directly affects or is immediately relevant to the reader, pushing extensive background to later or omitting it.", "isCorrect": true, "rationale": "This directly aligns with the implication: the reader needs 'when, where, what,' and the 'background about the selection process can go later in the memo, or it can be left out entirely' because it's not the reader's immediate need."}, {"text": "Background information is always irrelevant in professional announcements and should be entirely omitted to save space.", "isCorrect": false, "rationale": "The text states background 'can go later in the memo, or it can be left out entirely,' implying it's not *always* irrelevant, but its placement and necessity depend on whether it serves the 'reader's need.'"}, {"text": "The writer should clearly separate their opinions and subjective observations from factual information within the announcement.", "isCorrect": false, "rationale": "The statement is about the relevance and placement of *background information* versus the *essential news*, not about separating opinion from fact."}], "id": "q09"}, {"question": "How does the inverted pyramid principle apply to 'Updates and Progress Announcements' compared to event announcements?", "options": [{"text": "It emphasizes concluding with an overview of all historical progress made since the project's inception.", "isCorrect": false, "rationale": "Concluding with historical progress would place critical new updates late in the memo, which contradicts the inverted pyramid. The focus is on *what has changed*, not a full history."}, {"text": "It means leading with the current status or what has changed, rather than providing a chronological history of the project from the beginning.", "isCorrect": true, "rationale": "The text explicitly states for updates, 'The same inverted-pyramid principle applies: lead with what has changed, then explain the details.' This prioritizes the current impact over historical narrative."}, {"text": "It requires providing extensive background on why the update is necessary before stating the actual update's details.", "isCorrect": false, "rationale": "Providing extensive background before the actual update would be a 'buried lead,' which the text specifically advises against for updates, just as it does for event announcements."}, {"text": "It suggests that these types of announcements should always be shorter than event announcements due to their nature.", "isCorrect": false, "rationale": "The inverted pyramid dictates the *order* of information, not necessarily the *length* of the announcement. An update could be complex and still follow the principle while being lengthy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
