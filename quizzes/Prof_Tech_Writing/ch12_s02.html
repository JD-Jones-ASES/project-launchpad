        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 12, Section 2</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary distinction between a weak and a strong resume's description of experience?", "options": [{"text": "Weak resumes describe the job title; strong resumes describe skills required for the job.", "isCorrect": false, "rationale": "While weak resumes might imply job titles, the core distinction isn't just about skills, but specific actions and results. This option is too general."}, {"text": "Weak resumes tell what the job was; strong resumes tell what the applicant did and what happened because of it.", "isCorrect": true, "rationale": "The text explicitly states: 'Weak resumes tell the reader what the job was. Strong resumes tell the reader what the applicant did—and what happened because of it.'"}, {"text": "Weak resumes focus on duties; strong resumes focus on future career aspirations.", "isCorrect": false, "rationale": "The text contrasts duties with accomplishments, but future aspirations are not the primary focus of experience descriptions on a strong resume."}, {"text": "Weak resumes use simple language; strong resumes use complex, professional jargon.", "isCorrect": false, "rationale": "The text advocates for clear, specific language (action verbs, quantifiable results), not necessarily complex jargon."}], "id": "q01"}, {"question": "Which of the following resume bullet points best exemplifies a 'passive description' or 'resume deadwood' as described in the text?", "options": [{"text": "Streamlined inventory management, reducing waste by 10%.", "isCorrect": false, "rationale": "This uses an action verb ('streamlined') and quantifies a positive result, making it a strong description."}, {"text": "Coordinated weekly team meetings for a staff of 10.", "isCorrect": false, "rationale": "This uses an action verb ('coordinated') and quantifies the scope, making it a strong description."}, {"text": "Was responsible for managing customer inquiries.", "isCorrect": true, "rationale": "The phrase 'Was responsible for' is highlighted in the text as 'resume deadwood' because it describes a role rather than a specific accomplishment or action taken."}, {"text": "Developed and launched a new marketing campaign, increasing engagement by 15%.", "isCorrect": false, "rationale": "This uses strong action verbs ('developed,' 'launched') and quantifies the impact, making it a strong description."}], "id": "q02"}, {"question": "A student currently has 'Duties included assisting customers' on their resume. Which option best transforms this into an active accomplishment, adhering to the principles outlined in the text?", "options": [{"text": "Provided customer assistance.", "isCorrect": false, "rationale": "While 'provided' is an action verb, this statement is still vague and lacks quantification or specific impact."}, {"text": "Helped customers daily with various issues.", "isCorrect": false, "rationale": "The phrase 'Helped with' is identified as 'resume deadwood' in the text, and 'various issues' is too vague. This is not an active accomplishment."}, {"text": "Resolved 20+ customer issues per shift, achieving a 95% satisfaction rating.", "isCorrect": true, "rationale": "This option uses a strong action verb ('resolved') and quantifies both the volume of work and the positive outcome ('20+ issues,' '95% satisfaction'), perfectly aligning with the text's advice."}, {"text": "Managed customer service tasks efficiently.", "isCorrect": false, "rationale": "While 'managed' is an action verb and 'efficiently' is positive, it lacks specific quantification and concrete details about what was accomplished."}], "id": "q03"}, {"question": "The text states that 'Strong action verbs make your resume vivid and specific.' What is the main reason for this recommendation?", "options": [{"text": "To make the resume longer and more visually appealing to the reader.", "isCorrect": false, "rationale": "While a vivid resume is appealing, the primary goal of action verbs is not just length or visual appeal, but to convey specific actions and value."}, {"text": "To describe concrete actions taken by the applicant and avoid passive language that focuses on roles.", "isCorrect": true, "rationale": "The text emphasizes that strong action verbs describe 'a specific, concrete action taken by the applicant' and contrast with passive descriptions that only describe a role."}, {"text": "To ensure the resume uses a formal and academic tone appropriate for professional applications.", "isCorrect": false, "rationale": "While professionalism is important, the core reason for action verbs is specificity and demonstrating action, not just tone."}, {"text": "To impress the reader with a wide and sophisticated vocabulary.", "isCorrect": false, "rationale": "While using good vocabulary is a side benefit, the main point is specificity and clarity of action, not simply demonstrating vocabulary range."}], "id": "q04"}, {"question": "A student wants to describe their experience successfully organizing a school fundraiser. Based on the 'Power Verbs for Resumes' table, which category and verb would be most appropriate?", "options": [{"text": "Support - Assisted", "isCorrect": false, "rationale": "'Assisted' implies helping, not leading or taking primary responsibility for organizing the entire event. 'Support' verbs are for helping roles."}, {"text": "Communication - Presented", "isCorrect": false, "rationale": "'Presented' is a communication action, which might be part of a fundraiser, but it doesn't describe the overarching act of organizing it."}, {"text": "Leadership - Coordinated", "isCorrect": true, "rationale": "The 'Leadership' category includes 'coordinated' and 'organized,' which are perfect for describing the successful planning and execution of an event like a fundraiser."}, {"text": "Creation - Built", "isCorrect": false, "rationale": "'Built' implies constructing something tangible. While organizing creates an event, 'coordinated' or 'organized' are more fitting for event management than 'built'."}], "id": "q05"}, {"question": "Why does the 'Writing Tip: Vary Your Verbs' section advise against starting every bullet point with the same action verb?", "options": [{"text": "It makes the resume harder to scan quickly and understand the main points.", "isCorrect": false, "rationale": "While repetition can be tedious, it doesn't necessarily make the resume harder to scan. The core issue is the perception of limited experience."}, {"text": "It suggests a limited vocabulary and a lack of diverse responsibilities or skills.", "isCorrect": true, "rationale": "The text directly states, 'If three of your four bullets begin with “Managed,” it looks like you only know one word,' implying a lack of range in both vocabulary and demonstrated skills."}, {"text": "It can cause automated applicant tracking systems (ATS) to filter out the resume.", "isCorrect": false, "rationale": "The text does not mention ATS systems. This is an unsupported claim outside the scope of the provided content."}, {"text": "It violates standard resume formatting guidelines and can lead to immediate rejection.", "isCorrect": false, "rationale": "While it's a best practice, it's not a strict formatting rule that would lead to immediate rejection. The text frames it as a 'tip' to improve impact."}], "id": "q06"}, {"question": "What is the primary benefit of applying 'The Quantification Test' to every resume bullet point?", "options": [{"text": "It helps the applicant recall more details about past experiences.", "isCorrect": false, "rationale": "While asking 'How many?' might prompt recall, the primary benefit highlighted is external (to the reader), not internal (to the applicant)."}, {"text": "It transforms vague claims into credible, concrete evidence that catches the reader's eye.", "isCorrect": true, "rationale": "The text explicitly states: 'Numbers are the most powerful tool on a resume. They transform vague claims into concrete evidence... Numbers catch the reader's eye and make your claims credible.'"}, {"text": "It ensures the resume meets a minimum length requirement for submission.", "isCorrect": false, "rationale": "The purpose of quantification is to add value and credibility, not simply to meet a length requirement."}, {"text": "It demonstrates the applicant's advanced mathematical and analytical skills.", "isCorrect": false, "rationale": "While using numbers involves math, the core benefit emphasized is credibility and impact on the reader, not demonstrating mathematical prowess itself."}], "id": "q07"}, {"question": "A student wants to quantify their experience tutoring in a way that shows impact, as described in the text. Which of the following examples best uses quantification?", "options": [{"text": "Tutored students in math after school frequently.", "isCorrect": false, "rationale": "'Frequently' is vague and doesn't provide concrete numbers for volume, frequency, or outcome."}, {"text": "Provided extensive tutoring services to various students.", "isCorrect": false, "rationale": "'Extensive' and 'various' are vague and offer no specific, measurable data."}, {"text": "Tutored 8 students weekly in Algebra I, helping 6 of 8 improve their grades by at least one letter grade within one semester.", "isCorrect": true, "rationale": "This statement uses multiple forms of quantification (volume: '8 students', '6 of 8'; frequency: 'weekly'; specific outcome: 'improve grades by at least one letter grade'; time: 'one semester'), directly aligning with the text's examples of showing impact."}, {"text": "Helped many students succeed in their math classes by offering support.", "isCorrect": false, "rationale": "'Many' is not a specific number and 'offering support' is a passive description without quantifiable results."}], "id": "q08"}, {"question": "A student states, 'I babysit my neighbor's kids a couple times a week. I make them snacks and help with homework and stuff.' Which option best translates this casual description into professional resume language?", "options": [{"text": "Babysat children regularly, assisting with various household duties and educational support.", "isCorrect": false, "rationale": "While using action verbs, 'regularly,' 'various,' and 'educational support' are still quite vague and lack the specificity and quantification recommended."}, {"text": "Managed childcare responsibilities for two children, including meal preparation and homework help.", "isCorrect": false, "rationale": "This is better, using an action verb 'managed' and providing some specifics, but it lacks the full level of quantification and professional detail seen in the example from the text."}, {"text": "Provided after-school childcare for two children (ages 6 and 9) three days per week, including meal preparation, homework supervision, and activity coordination. Maintained a consistent 18-month schedule with zero cancellations.", "isCorrect": true, "rationale": "This option perfectly matches the text's example, using strong action verbs ('Provided,' 'Maintained'), quantifying details (number of children, ages, frequency, duration, consistency), and translating casual tasks into professional responsibilities."}, {"text": "Responsible for looking after kids and making food.", "isCorrect": false, "rationale": "This uses 'responsible for,' which the text identifies as 'resume deadwood,' and is generally vague and unprofessional."}], "id": "q09"}, {"question": "The 'Common Mistake' section differentiates between 'presenting your experience in the best possible light' and 'lying.' What is the key takeaway from this distinction?", "options": [{"text": "It's acceptable to slightly exaggerate your role or responsibilities if it makes your application stand out more.", "isCorrect": false, "rationale": "The text explicitly states that 'Saying you “led” a project when you participated is exaggeration' and that 'Both can get your application rejected—or get you fired.'"}, {"text": "Employers rarely check the details of experience, so minor fabrications are usually overlooked.", "isCorrect": false, "rationale": "The text directly refutes this by stating, 'Employers do check.'"}, {"text": "Strong resumes accurately translate actual accomplishments using action verbs and real numbers, without fabricating or exaggerating details.", "isCorrect": true, "rationale": "The text advises: 'Present what you have actually done, but present it with strong verbs and real numbers. You do not need to lie; you need to translate.'"}, {"text": "The primary goal of a resume is to make a strong first impression, even if it means bending the truth slightly.", "isCorrect": false, "rationale": "This contradicts the ethical advice in the text, which warns against fabrication and exaggeration due to severe consequences."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
