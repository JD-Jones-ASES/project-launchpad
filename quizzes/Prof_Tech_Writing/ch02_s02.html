<script>
var QUESTIONS = [{"question": "According to the text, why is the subject line considered the most critical component of a professional email?", "options": [{"text": "It's the first thing the recipient sees, ensuring the email is visually appealing.", "isCorrect": false, "rationale": "While it is the first thing seen, its criticality stems from its function, not just visual appeal. The text emphasizes its role in determining whether the email is opened or disregarded."}, {"text": "It dictates whether the email is opened, saved, or disregarded, acting as a gateway to the message's content.", "isCorrect": true, "rationale": "The text explicitly states: 'It determines whether your message gets opened immediately, saved for later, or lost in an inbox with 300 other unread messages.' This highlights its critical role in the email's fate."}, {"text": "It allows the sender to quickly categorize emails for their own organization.", "isCorrect": false, "rationale": "The text focuses on the receiver's perspective and their decision-making process when encountering a subject line, not primarily on the sender's organizational benefits."}, {"text": "It is typically the longest line, providing the most information upfront.", "isCorrect": false, "rationale": "The subject line is not necessarily the longest line, and its effectiveness comes from conciseness and clarity, not length. In fact, the text advises front-loading due to display truncation."}], "id": "q01"}, {"question": "A project manager needs to send an email to their team asking for their review of a critical budget proposal by the end of the day. Which subject line best incorporates 'The Three Elements of a Strong Subject Line' for this scenario?", "options": [{"text": "Important Budget Review", "isCorrect": false, "rationale": "This subject line includes the topic ('Budget Review') but misses the required action and the specific deadline, making it less effective for an urgent request."}, {"text": "Budget Proposal: Please Review by EOD Today", "isCorrect": true, "rationale": "This subject line effectively includes all three elements: the topic ('Budget Proposal'), the action ('Please Review'), and the deadline ('by EOD Today'), making it clear and actionable."}, {"text": "Review Needed", "isCorrect": false, "rationale": "This subject line indicates an action ('Review Needed') but is too vague about the topic and lacks a deadline, failing to provide sufficient information upfront."}, {"text": "Q4 Budget Proposal Update", "isCorrect": false, "rationale": "This subject line indicates a topic ('Q4 Budget Proposal') but suggests an informational update rather than a request for action with a deadline, which is crucial for this scenario."}], "id": "q02"}, {"question": "The text emphasizes that 'the most common subject line mistake is being too vague.' From the reader's perspective, what is the primary negative consequence of a vague subject line like 'Question'?", "options": [{"text": "It suggests the sender is unsure of the email's content, leading to confusion.", "isCorrect": false, "rationale": "While a vague subject line might hint at uncertainty, the primary negative consequence highlighted in the text is the reader's inability to prioritize or understand the email's relevance without opening it."}, {"text": "It forces the reader to open the email to understand its purpose, wasting their time if it's not urgent or relevant.", "isCorrect": true, "rationale": "The text explicitly states that a specific subject line 'tells you instantly what the email is about and whether it is urgent,' implying that a vague one forces the reader to investigate, which is inefficient and time-consuming, especially for busy individuals."}, {"text": "It makes the email appear informal and unprofessional.", "isCorrect": false, "rationale": "While vagueness can contribute to an unprofessional impression, the core problem from the reader's perspective is the lack of immediate actionable information to decide whether to open or prioritize the email."}, {"text": "It often leads to the email being automatically flagged as spam by email filters.", "isCorrect": false, "rationale": "The text warns that a *blank* subject line can look like spam, but it does not state that a merely vague subject line like 'Question' is typically flagged as spam."}], "id": "q03"}, {"question": "A colleague sends an email with the subject line 'Meeting.' Applying the Newspaper Headline Test, why does this subject line likely fail?", "options": [{"text": "It's too short, indicating a lack of effort from the sender.", "isCorrect": false, "rationale": "The length of the subject line is not the primary criterion for the Newspaper Headline Test; its ability to convey meaning independently is. A short, clear subject line can still pass."}, {"text": "It doesn't allow a busy person to understand the meeting's topic, purpose, or urgency without opening the email.", "isCorrect": true, "rationale": "The Newspaper Headline Test asks if a busy person could glance at it and know what the email is about. 'Meeting' is too vague, failing to provide essential context like 'Meeting about what?' or 'When?' as demonstrated by the 'Update about what?' example."}, {"text": "It uses common words, which can be easily overlooked in a crowded inbox.", "isCorrect": false, "rationale": "While common words might blend in, the failure of the Newspaper Headline Test specifically relates to the lack of information conveyed, not the commonality of the words themselves."}, {"text": "It contains a single word, which is generally considered unprofessional for formal communication.", "isCorrect": false, "rationale": "The issue is not the single word count but the lack of specificity it conveys. A single-word subject line could be professional if it clearly communicated the topic."}], "id": "q04"}, {"question": "The writing tip suggests 'Front-Load the Important Words' in a subject line. What is the main reason for this practice?", "options": [{"text": "To make the subject line easier to remember for the recipient.", "isCorrect": false, "rationale": "While clarity might aid memory, the text specifies a different primary reason related to display limitations."}, {"text": "To ensure that critical information is visible even if the subject line is truncated on smaller screens or in email previews.", "isCorrect": true, "rationale": "The text states: 'Many email apps display only the first 40–60 characters of a subject line, especially on phones. Put the most important words first. The key information appears even if the rest gets cut off.'"}, {"text": "To add a sense of urgency to the email's content.", "isCorrect": false, "rationale": "While important words often convey urgency, the main reason for front-loading is ensuring visibility of *any* key information, not exclusively urgency."}, {"text": "To adhere to character limits imposed by most professional email servers.", "isCorrect": false, "rationale": "The limitation mentioned is about how email apps *display* the subject line, not a hard character limit imposed by servers that would prevent sending longer subject lines."}], "id": "q05"}, {"question": "You realize you've just sent an important project update to a client with a blank subject line. Following the advice in the 'Common Mistake' section, what is the most appropriate next step?", "options": [{"text": "Immediately recall the email, as it will surely be deleted as spam.", "isCorrect": false, "rationale": "Recalling an email is not always possible and is not the advised solution in the text. The text suggests a different follow-up action."}, {"text": "Send a new email with the correct subject line and a one-line apology for the oversight.", "isCorrect": true, "rationale": "The text explicitly advises: 'If you realize you forgot the subject line after sending, send a brief follow-up... with the correct subject and a one-line apology: 'Resending with the subject line I forgot to include — sorry about that.'' This is the correct procedure."}, {"text": "Do nothing, assuming the client will open it due to its importance.", "isCorrect": false, "rationale": "The text warns that an email with no subject looks careless and 'Many recipients will delete or ignore it,' making this a risky and incorrect approach."}, {"text": "Forward the original email to the client, adding the subject line to the forwarded message.", "isCorrect": false, "rationale": "While forwarding might seem logical, the text specifically suggests sending a *new* brief follow-up message with the correct subject and an apology, not forwarding the original email which may still confuse the recipient."}], "id": "q06"}, {"question": "How does the skill of crafting strong email subject lines directly benefit a student's ability to write effective essays, according to the 'Writing Connection' section?", "options": [{"text": "It teaches them to use engaging language to capture a reader's attention, similar to an essay's introduction.", "isCorrect": false, "rationale": "While engaging language is important, the text specifically connects subject lines to essay titles and thesis statements through clarity and conciseness of the main point, not just general engagement."}, {"text": "It helps them summarize complex information concisely, a skill essential for developing clear essay titles and thesis statements.", "isCorrect": true, "rationale": "The text states: 'A strong essay title, like a strong subject line, tells the reader what the piece is about.' And for thesis statements: 'Practicing clear, specific subject lines trains the same skill: say exactly what you mean in as few words as possible.'"}, {"text": "It encourages them to always include a call to action in their writing, which is crucial for persuasive essays.", "isCorrect": false, "rationale": "While some essays are persuasive, the connection drawn in the text is about clearly stating the *topic* or *main point* (like a thesis statement), not necessarily always a call to action."}, {"text": "It makes them aware of character limits, which can improve sentence structure in academic papers.", "isCorrect": false, "rationale": "Character limits are specific to email display and are not a generalized skill transfer to improving sentence structure in academic papers, which have different constraints."}], "id": "q07"}, {"question": "According to 'The Subject Line Formula,' which of the three elements are almost always required for an urgent request?", "options": [{"text": "Only the topic.", "isCorrect": false, "rationale": "The text states an informational update might only need the topic, but an urgent request requires more."}, {"text": "The topic and the action.", "isCorrect": false, "rationale": "The text states a general request almost always needs the topic and the action. However, an *urgent* request necessitates the third element."}, {"text": "The topic, the action, and the deadline.", "isCorrect": true, "rationale": "The text explicitly states: 'An urgent request needs all three' – the topic, the action, and the deadline."}, {"text": "Only the action and the deadline.", "isCorrect": false, "rationale": "The topic is a fundamental element that clarifies what the email is about; it's always implied or stated for effective communication, even in urgent requests."}], "id": "q08"}, {"question": "An employee frequently uses the subject line 'hey, about that thing' for follow-up emails. Based on the 'Before and After' examples, which improved subject line best replaces this, considering professional communication?", "options": [{"text": "Quick Chat", "isCorrect": false, "rationale": "This is still too casual and vague. It doesn't specify what the 'chat' is about, failing the principle of clarity."}, {"text": "Following Up", "isCorrect": false, "rationale": "While better than the original, it's still missing the specific topic of the follow-up, which is crucial for a strong subject line according to the text."}, {"text": "Follow-Up: Volunteer Schedule for Saturday Event", "isCorrect": true, "rationale": "This subject line is directly from the 'Before and After' example of fixing 'hey, about that thing.' It clearly states the type of email ('Follow-Up') and the specific topic ('Volunteer Schedule for Saturday Event')."}, {"text": "Reminder for Our Discussion", "isCorrect": false, "rationale": "This is an improvement but still somewhat vague. 'Our Discussion' doesn't specify the subject of the discussion, similar to how 'that thing' was problematic."}], "id": "q09"}, {"question": "Considering all the advice provided in the section 'Subject Lines That Work,' what is the overarching principle guiding the creation of effective professional email subject lines?", "options": [{"text": "To maximize email open rates by creating curiosity.", "isCorrect": false, "rationale": "While a good subject line influences open rates, the text emphasizes clarity and directness over creating curiosity, which can be misleading or vague."}, {"text": "To ensure the recipient can immediately understand the email's topic, required action, and relevant timeline without opening it.", "isCorrect": true, "rationale": "This principle synthesizes the key advice: the 'Three Elements,' the 'Newspaper Headline Test,' and the importance of avoiding vagueness, all aimed at empowering the recipient to make informed decisions about the email's content and urgency at a glance."}, {"text": "To always keep the subject line as short as possible to fit mobile displays.", "isCorrect": false, "rationale": "While brevity and front-loading for mobile displays are important tips, the overarching principle is about conveying essential information clearly, not merely limiting length at the expense of clarity or completeness."}, {"text": "To avoid using any informal language or emojis.", "isCorrect": false, "rationale": "Avoiding informal language is a component of professionalism, but it's a rule of formality rather than the overarching principle that defines *effectiveness* in conveying the email's core message and purpose."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
