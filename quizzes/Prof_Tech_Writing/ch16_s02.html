    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A student discovers that their report's main argument isn't clear and decides to reorganize several sections and add a new introductory paragraph to better align with the audience's needs. Which activity are they primarily performing?", "options": [{"text": "Editing", "isCorrect": false, "rationale": "Editing focuses on improving sentences for clarity, tone, and grammar, not on reorganizing entire sections or rethinking the main argument."}, {"text": "Proofreading", "isCorrect": false, "rationale": "Proofreading is the final pass to check for surface errors like spelling, punctuation, and capitalization, not for structural or conceptual changes."}, {"text": "Revision", "isCorrect": true, "rationale": "Revision involves rethinking and rewriting to improve ideas, structure, clarity, and audience awareness. Reorganizing sections and rewriting paragraphs to improve the main argument are core activities of revision."}, {"text": "Formatting", "isCorrect": false, "rationale": "Formatting relates to the visual presentation of the document (fonts, spacing, margins) and is a component of proofreading or design, not the primary activity described."}]}, {"question": "According to the text, what is the most effective sequence for improving a document, and why is that order crucial?", "options": [{"text": "Proofread, then Edit, then Revise, because catching typos first saves time.", "isCorrect": false, "rationale": "This order is incorrect. Proofreading first would be a waste of effort if the content is later rewritten during revision."}, {"text": "Revise, then Proofread, then Edit, to ensure big-picture issues are addressed before surface errors.", "isCorrect": false, "rationale": "This order is incorrect. Editing (sentence-level) should come before proofreading (surface-level errors)."}, {"text": "Edit, then Revise, then Proofread, to ensure clear sentences before addressing structure.", "isCorrect": false, "rationale": "This order is incorrect. Revision (big-picture) should precede editing (sentence-level) because editing individual sentences is inefficient if entire paragraphs or sections are later cut or rewritten."}, {"text": "Revise, then Edit, then Proofread, because major structural and conceptual changes should precede sentence-level and surface-level corrections.", "isCorrect": true, "rationale": "This is the correct order. The text explicitly states, 'Always revise first, then edit, then proofread,' emphasizing that deeper changes should happen before more granular ones to avoid wasted effort."}]}, {"question": "The 'First Draft vs. Polished Version' example transforms a paragraph from 'The cafeteria is really bad...' to 'The cafeteria's current lunch service has three specific problems...'. This transformation primarily demonstrates which aspect of writing improvement?", "options": [{"text": "Effective proofreading by correcting all grammatical errors.", "isCorrect": false, "rationale": "While grammatical correctness is important, the core transformation shown is not about surface errors but about the depth and specificity of the content and argument."}, {"text": "Strategic editing to ensure consistent tone and word choice.", "isCorrect": false, "rationale": "While tone and word choice improve, the most significant change is the shift from vague statements to concrete, evidence-based arguments and proposed solutions, which goes beyond sentence-level editing."}, {"text": "Comprehensive revision by moving from vague generalities to specific, evidence-based arguments and solutions.", "isCorrect": true, "rationale": "The text explicitly states that this transformation—'from vague to specific, from passive to active, from general to evidence-based'—is what revision accomplishes."}, {"text": "Proper formatting and adherence to a style guide.", "isCorrect": false, "rationale": "The example focuses on the content and structure of the argument, not on formatting elements like fonts or margins."}]}, {"question": "During 'Pass 1 — Purpose and audience' of the Four-Pass Revision Method, a writer reads their entire document. Which of the following questions would be most central to their focus during this pass?", "options": [{"text": "Are all sentences concise and free of filler words?", "isCorrect": false, "rationale": "This question belongs to Pass 3: Sentences and Word Choice, which focuses on sentence-level clarity."}, {"text": "Is every section contributing to the intended purpose and reader's needs?", "isCorrect": true, "rationale": "Pass 1 explicitly asks, 'Who is the reader? What should they know or do after reading? Does every section contribute to that purpose?' This question directly addresses the core goals of Pass 1."}, {"text": "Are all headings clear and do transitions connect ideas smoothly?", "isCorrect": false, "rationale": "This question belongs to Pass 2: Structure and Flow, which focuses on the organization and logical progression of ideas."}, {"text": "Are there any spelling or punctuation errors?", "isCorrect": false, "rationale": "This question belongs to Pass 4: Surface Accuracy, which focuses on correcting surface-level errors."}]}, {"question": "A student is reviewing their research paper using the Four-Pass Revision Method. They notice that the methodology section appears after the discussion of results, making it difficult for readers to understand how the data was collected before seeing the findings. In which pass should they address this issue?", "options": [{"text": "Pass 1 — Purpose and audience", "isCorrect": false, "rationale": "Pass 1 focuses on the overall purpose and audience relevance, not the logical ordering of major sections within the document."}, {"text": "Pass 2 — Structure and flow", "isCorrect": true, "rationale": "Pass 2 specifically addresses checking the organization and ensuring sections are in logical order. Reorganizing the methodology section to appear before the results is a structural change."}, {"text": "Pass 3 — Sentences and word choice", "isCorrect": false, "rationale": "Pass 3 focuses on improving individual sentences and word choice, not the overall arrangement of content blocks."}, {"text": "Pass 4 — Surface accuracy", "isCorrect": false, "rationale": "Pass 4 deals with surface-level errors like spelling, punctuation, and formatting, not with the logical flow of content sections."}]}, {"question": "A technical writer is preparing a user manual and, during one revision pass, focuses on changing phrases like 'in order to facilitate the process' to 'to facilitate the process' and replacing 'very important' with 'critical.' Which pass of the Four-Pass Revision Method are they currently executing?", "options": [{"text": "Pass 1 — Purpose and audience", "isCorrect": false, "rationale": "Pass 1 focuses on the document's overall purpose and its alignment with the audience's needs, not on individual sentence conciseness or word choice."}, {"text": "Pass 2 — Structure and flow", "isCorrect": false, "rationale": "Pass 2 focuses on the logical organization of sections and transitions between ideas, not on refining individual phrases or words."}, {"text": "Pass 3 — Sentences and word choice", "isCorrect": true, "rationale": "Pass 3 involves reading each sentence individually, making it as short as possible without losing meaning, and replacing vague words with specific ones, which aligns with eliminating filler words and choosing precise alternatives."}, {"text": "Pass 4 — Surface accuracy", "isCorrect": false, "rationale": "Pass 4 focuses on surface errors such as spelling, punctuation, capitalization, and formatting, not on improving the conciseness or specificity of language."}]}, {"question": "Before submitting a final report, a consultant meticulously checks that all dates are formatted consistently (e.g., 'MM/DD/YYYY'), verifies the spelling of client names, and ensures the font size matches the company's style guide. Which pass of the Four-Pass Revision Method are they performing?", "options": [{"text": "Pass 1 — Purpose and audience", "isCorrect": false, "rationale": "Pass 1 focuses on the big picture of content relevance and audience engagement, not specific formatting or accuracy details."}, {"text": "Pass 2 — Structure and flow", "isCorrect": false, "rationale": "Pass 2 deals with the logical organization and connection of ideas within the document, not with consistency in formatting or factual verification."}, {"text": "Pass 3 — Sentences and word choice", "isCorrect": false, "rationale": "Pass 3 focuses on the clarity and conciseness of individual sentences and precise word usage, not on consistent formatting or factual checks."}, {"text": "Pass 4 — Surface accuracy", "isCorrect": true, "rationale": "Pass 4 specifically involves checking spelling, punctuation, capitalization, number formatting, consistency, and verifying names, dates, and facts, as well as ensuring formatting matches the style sheet. All the described actions fall under Pass 4."}]}, {"question": "The 'Common Mistake' section warns against trying to fix typos and rethink arguments in a single reading. What is the primary reason given for why this approach is ineffective?", "options": [{"text": "It leads to writers spending too much time on minor details.", "isCorrect": false, "rationale": "While it can be inefficient, the text identifies a more fundamental cognitive limitation as the primary reason."}, {"text": "The brain cannot effectively focus on both big-picture logic and minute surface errors simultaneously.", "isCorrect": true, "rationale": "The text explicitly states, 'Your brain cannot focus on big-picture logic and comma placement at the same time,' highlighting the cognitive difficulty of performing both types of tasks concurrently."}, {"text": "Peer reviewers prefer to see perfect grammar before offering structural feedback.", "isCorrect": false, "rationale": "The text does not mention peer reviewer preferences in this context, and peer review typically occurs at an earlier stage where structural feedback is paramount."}, {"text": "Most software tools can automatically catch all surface errors, making a manual pass unnecessary.", "isCorrect": false, "rationale": "While software aids in catching errors, it doesn't eliminate the need for careful human review, and this is not the reason cited for the ineffectiveness of combining revision and proofreading."}]}, {"question": "What is the most significant advantage of using peer review as described in the text?", "options": [{"text": "It ensures that all documents meet a specific page count or word limit.", "isCorrect": false, "rationale": "Peer review is focused on improving the quality and effectiveness of writing, not primarily on enforcing arbitrary length requirements."}, {"text": "It helps writers catch problems they've overlooked due to familiarity with their own work.", "isCorrect": true, "rationale": "The text states that 'A fresh set of eyes catches problems you cannot see because you are too close to your own writing,' highlighting the benefit of an objective perspective."}, {"text": "It allows writers to delegate proofreading tasks to others, saving personal time.", "isCorrect": false, "rationale": "While it involves another person, the primary benefit is the quality of feedback for deeper revision and improvement, not merely offloading proofreading."}, {"text": "It provides an opportunity to get immediate approval for submission without further revision.", "isCorrect": false, "rationale": "Peer review is a tool for *identifying areas for improvement* before submission, not for immediate final approval."}]}, {"question": "A student receives peer feedback for their essay. Which of the following statements represents the most useful and constructive feedback according to the principles of effective peer review outlined in the text?", "options": [{"text": "This essay is pretty good, but the middle part was kind of confusing.", "isCorrect": false, "rationale": "This is an example of vague feedback. It identifies a problem ('confusing') but lacks specificity about *why* it's confusing or *where* exactly the issue lies, making it unhelpful for the writer to revise effectively."}, {"text": "Your introduction clearly states the problem. In the third paragraph, the sentence about budget allocation interrupts your argument about project timelines; consider moving it to the appendix. Your conclusion is strong but could suggest a specific next action for the reader.", "isCorrect": true, "rationale": "This feedback is highly specific, constructive, and actionable. It identifies both strengths and specific areas for improvement, explains *why* something is an issue, and offers concrete suggestions, mirroring the 'Useful Peer Feedback' example in the text."}, {"text": "It's fine. I didn't see any obvious typos.", "isCorrect": false, "rationale": "This feedback is vague and focuses only on surface errors (typos), neglecting deeper issues of content, structure, or purpose that are the focus of effective peer review."}, {"text": "I don't understand why you chose this topic. It's not interesting to me.", "isCorrect": false, "rationale": "This feedback is subjective, unconstructive, and does not provide an actionable path for the writer to improve the document based on its intended purpose or audience, which is a key aspect of effective peer review."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
