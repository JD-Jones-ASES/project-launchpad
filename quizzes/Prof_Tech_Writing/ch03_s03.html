    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the \"Golden Rule\" presented in the text, where should a safety notice be placed in relation to the step it applies to?", "options": [{"text": "Immediately after the step, to ensure the reader has completed the action before being warned.", "isCorrect": false, "rationale": "This placement violates the Golden Rule, as the reader would have already taken the potentially dangerous action before seeing the warning, making it ineffective."}, {"text": "Before the step, so the reader has the information prior to taking the action.", "isCorrect": true, "rationale": "The text explicitly states: 'A warning, caution, or note must appear before the step it applies to—never after. The reader needs the information before taking the action, not after the damage is done.'"}, {"text": "At the beginning of the entire procedure, as a general disclaimer.", "isCorrect": false, "rationale": "While general disclaimers can exist, the Golden Rule specifically refers to placing notices 'before the step it applies to,' ensuring specific information is provided at the point of need, not just generally at the start."}, {"text": "Integrated within the step itself, as part of the instruction.", "isCorrect": false, "rationale": "The text states that safety notices and notes 'should be visually distinct from the numbered steps,' indicating they should not be integrated directly into the instruction itself but placed separately before it."}]}, {"question": "Which of the following scenarios would most appropriately use a DANGER signal word, rather than WARNING?", "options": [{"text": "Operating a machine without a safety guard, which could cause serious injury.", "isCorrect": false, "rationale": "The keyword 'could' suggests a 'WARNING,' which indicates a hazard that 'could cause death or serious injury,' rather than a certainty or high probability."}, {"text": "Forcing a connector, which could bend pins and damage equipment.", "isCorrect": false, "rationale": "This scenario describes a hazard that 'could cause minor injury or equipment damage,' which aligns with the definition of 'CAUTION.'"}, {"text": "Contact with exposed high-voltage wires, which will cause electrocution.", "isCorrect": true, "rationale": "The text defines 'DANGER' as indicating 'a hazard that will cause death or serious injury if the instruction is not followed,' using the example 'DANGER: High voltage. Contact with exposed wires will cause electrocution.'"}, {"text": "Not backing up files before a procedure that erases all data on the drive.", "isCorrect": false, "rationale": "This scenario involves 'information important for avoiding equipment damage or data loss—no risk of personal injury,' which fits the definition of 'NOTICE.'"}]}, {"question": "A technician is writing instructions for disassembling a computer. They need to warn users about two distinct issues: 1) inadvertently bending a fragile pin connector, and 2) accidentally deleting important system files. Which signal words should they use, respectively?", "options": [{"text": "DANGER for bending pins, WARNING for deleting files.", "isCorrect": false, "rationale": "DANGER and WARNING are reserved for severe personal injury or death, which do not apply to bending pins or deleting files."}, {"text": "CAUTION for bending pins, NOTICE for deleting files.", "isCorrect": true, "rationale": "'CAUTION' is used for hazards that 'could cause minor injury or equipment damage' (like bending pins). 'NOTICE' is used for information important for 'avoiding equipment damage or data loss' (like deleting files), with no risk of personal injury."}, {"text": "WARNING for bending pins, CAUTION for deleting files.", "isCorrect": false, "rationale": "This swaps the appropriate uses and applies 'WARNING' (serious injury) too broadly to bending pins, which is equipment damage. Deleting files is data loss, not minor injury/equipment damage."}, {"text": "NOTICE for bending pins, DANGER for deleting files.", "isCorrect": false, "rationale": "This swaps the appropriate uses. Bending pins is equipment damage (CAUTION), and deleting files is data loss (NOTICE), neither of which warrants a 'DANGER' signal word."}]}, {"question": "Unlike safety notices, a 'Note' in a technical document primarily serves what purpose?", "options": [{"text": "To indicate a hazard that will cause death or serious injury.", "isCorrect": false, "rationale": "This describes the purpose of a 'DANGER' safety notice, not a 'Note.'"}, {"text": "To provide helpful context, tips, or explanations that are not required to complete the task.", "isCorrect": true, "rationale": "The text defines a 'Note' as 'additional information that is helpful but not required to complete the step provides useful context, tips, or explanations, but the reader can complete the task without it.'"}, {"text": "To warn about potential equipment damage or data loss without personal injury risk.", "isCorrect": false, "rationale": "This describes the purpose of a 'NOTICE' safety notice, not a 'Note.'"}, {"text": "To ensure the reader puts on safety gear before proceeding with a dangerous step.", "isCorrect": false, "rationale": "This is a function of a safety notice (e.g., WARNING or CAUTION), which alerts the reader to a risk and the necessary precautions, rather than a 'Note' which is supplemental information."}]}, {"question": "The text describes 'overusing warnings' as a common mistake. What is the primary negative consequence of this practice?", "options": [{"text": "It makes the document excessively long and difficult to print.", "isCorrect": false, "rationale": "While an overuse of warnings could add length, the text does not identify this as the 'primary' negative consequence. The main issue is reader attention."}, {"text": "Readers become desensitized and stop paying attention to genuine risks.", "isCorrect": true, "rationale": "The text states: 'If every step has a warning, readers stop paying attention to them. Use safety notices only when there is a genuine risk. If you warn about everything, you effectively warn about nothing.'"}, {"text": "It is impossible to achieve visual consistency across the document.", "isCorrect": false, "rationale": "Overusing warnings is a content issue, not a formatting issue. Visual consistency pertains to the style of the warnings, not their frequency."}, {"text": "It forces writers to use DANGER and WARNING less frequently.", "isCorrect": false, "rationale": "Overusing warnings typically means using CAUTION and NOTICE too frequently, not necessarily reducing DANGER or WARNING, which are for more extreme risks."}]}, {"question": "In the 'Operating the Classroom Laminator' example, the instruction 'Note: Do not feed documents while the orange light is still on. The pouch will not seal properly at a lower temperature.' is provided. Why is this specifically a 'Note' and not a 'NOTICE'?", "options": [{"text": "Because it prevents equipment damage if the machine is used incorrectly.", "isCorrect": false, "rationale": "While improper use could eventually lead to wear, the immediate consequence described is 'the pouch will not seal properly,' which relates to the quality of the result, not equipment damage or data loss as defined by NOTICE."}, {"text": "Because it provides helpful information about optimal machine operation without indicating a risk of personal injury, equipment damage, or data loss.", "isCorrect": true, "rationale": "This 'Note' explains why a step is done a certain way (to ensure proper sealing) and provides helpful context. It does not warn of personal injury, equipment damage, or data loss, which are the purview of 'NOTICE' and other safety signals."}, {"text": "Because it indicates a hazard that could cause minor injury to the user.", "isCorrect": false, "rationale": "There is no indication of personal injury risk in this particular instruction, thus it would not be a 'CAUTION' or other injury-related safety notice."}, {"text": "Because it is an alternative method for achieving the same result.", "isCorrect": false, "rationale": "The 'Note' is a condition for the step to be performed correctly (waiting for the light), not an alternative method for laminating."}]}, {"question": "The 'Writing Tip' emphasizes using consistent visual signals for safety notices and notes. What is the main benefit of this practice for the reader?", "options": [{"text": "It allows for more creative and varied document designs.", "isCorrect": false, "rationale": "The focus of the tip is on consistency, which often means adhering to a specific style rather than encouraging variety, to aid reader recognition."}, {"text": "It ensures the document is shorter and easier to navigate.", "isCorrect": false, "rationale": "Visual consistency relates to the appearance of notices, not directly to the length or overall navigation structure of the document."}, {"text": "It helps readers quickly recognize the type and level of information being presented.", "isCorrect": true, "rationale": "The text states: 'Readers learn to recognize the visual signal quickly: bold red means danger, blue means helpful note. Changing the format mid-document forces readers to re-learn your system.'"}, {"text": "It reduces the need for signal words like DANGER or CAUTION.", "isCorrect": false, "rationale": "Visual signals work in conjunction with signal words to reinforce the message; they do not eliminate the need for the words themselves."}]}, {"question": "Review the 'beforeafter' example demonstrating correct placement of a Warning regarding corrosive cleaning solution. What is the most significant improvement in the 'Before a Step' version compared to the 'After a Step' version?", "options": [{"text": "It adds more detail about the nature of the cleaning solution.", "isCorrect": false, "rationale": "The detail about the corrosive nature is similar in both versions. The improvement lies in the placement and integration of the safety measure."}, {"text": "It removes unnecessary steps, simplifying the procedure.", "isCorrect": false, "rationale": "The corrected version actually adds a separate step ('Put on rubber gloves') to ensure the safety measure is explicitly included, making it less likely to be skipped."}, {"text": "It actively integrates the safety measure (wearing gloves) into the procedure *before* the hazard is encountered.", "isCorrect": true, "rationale": "The text highlights this: 'Notice that in the corrected version on the right, the warning appears before the step, and the writer even added a separate step for putting on gloves. This makes it impossible for the reader to skip the safety measure.'"}, {"text": "It uses a different font for the warning, making it more visually distinct.", "isCorrect": false, "rationale": "While visual distinctiveness is important, the example focuses on the structural change (placement and addition of a step) as the primary improvement, not a specific font choice."}]}, {"question": "A manual instructs users to 'CAUTION: Do not force the connector. Forcing it may bend the pins.' Based on the definitions provided, why is CAUTION the most appropriate signal word here?", "options": [{"text": "Bending pins will cause death or serious injury.", "isCorrect": false, "rationale": "This describes a 'DANGER,' and bending pins typically does not result in death or serious injury, but rather equipment damage."}, {"text": "Bending pins could cause minor injury or equipment damage.", "isCorrect": true, "rationale": "The text defines 'CAUTION' as indicating 'a hazard that could cause minor injury or equipment damage.' Bending pins fits the description of equipment damage."}, {"text": "Bending pins primarily causes data loss.", "isCorrect": false, "rationale": "Data loss is covered by 'NOTICE.' Bending pins is primarily a physical damage to the equipment."}, {"text": "The information is helpful but not critical for task completion.", "isCorrect": false, "rationale": "This describes a 'Note.' Preventing bent pins is critical for the proper functioning and integrity of the equipment, making it more than just 'helpful but not critical.'"}]}, {"question": "The fundamental reason why safety notices must appear before the step they apply to is to:", "options": [{"text": "Ensure the document meets ANSI standards for technical writing.", "isCorrect": false, "rationale": "While adherence to standards is a goal, the fundamental reason for the rule itself is practical safety, not just compliance."}, {"text": "Allow the reader to identify all potential risks before beginning any procedure.", "isCorrect": false, "rationale": "While true that notices highlight risks, placing them before *each relevant step* is about immediate action prevention, not a comprehensive pre-reading of all risks at once."}, {"text": "Prevent the reader from taking a dangerous action *before* they are aware of the risk and necessary precautions.", "isCorrect": true, "rationale": "The text explicitly states: 'The reader needs the information before taking the action, not after the damage is done.' This prevents harm by informing the reader proactively."}, {"text": "Provide an opportunity for additional helpful tips and explanations related to the step.", "isCorrect": false, "rationale": "This describes the purpose of a 'Note,' not the fundamental reason for the placement rule of safety notices, which are specifically about risk mitigation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
