    };

        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary objective of a technical writer when explaining complex subjects like encryption or climate feedback loops?", "options": [{"text": "To simplify the topics by removing difficult details.", "isCorrect": false, "rationale": "The text explicitly states that simplifying risks losing accuracy and 'dumbing down' the topic. The goal is accessibility without oversimplification."}, {"text": "To make the ideas accessible to readers without prior background, without sacrificing accuracy.", "isCorrect": true, "rationale": "The text emphasizes 'Accessible, Not Simple' and states, 'Your job as a technical writer is not to simplify these topics… but to make them accessible without dumbing them down.'"}, {"text": "To ensure the reader can immediately perform tasks related to the subject.", "isCorrect": false, "rationale": "While understanding can lead to task performance, the primary objective discussed is comprehension of the *idea*, not immediate task execution."}, {"text": "To provide an exhaustive overview of all technical nuances.", "isCorrect": false, "rationale": "The section on 'Control Your Level of Detail' warns against providing too much detail, which can 'drown' the reader. The goal is sufficient understanding, not exhaustive detail."}], "id": "q01"}, {"question": "Which strategy does the text strongly advocate for when beginning to explain a new, complex concept to a reader?", "options": [{"text": "Immediately introducing all relevant technical jargon to establish credibility.", "isCorrect": false, "rationale": "The 'before/after' example on public-key cryptography shows that starting with jargon is less effective and assumes too much prior knowledge."}, {"text": "First anchoring the new concept to something the reader already understands.", "isCorrect": true, "rationale": "The text clearly states, 'The most effective explanations build from the familiar to the unfamiliar. Before introducing a new concept, anchor it to something your reader already understands.'"}, {"text": "Providing a comprehensive historical background of the concept.", "isCorrect": false, "rationale": "While potentially useful, historical background is not mentioned as the primary initial strategy for building comprehension of the concept itself."}, {"text": "Stating the concept's importance and real-world implications upfront.", "isCorrect": false, "rationale": "Though important, this is not the primary strategy for building foundational understanding of the concept itself, which the text advises to do by linking to the familiar."}], "id": "q02"}, {"question": "If you were explaining the function of a network 'firewall' (a system that prevents unauthorized access to or from a private network) using the text's recommended approach, which analogy would be most effective?", "options": [{"text": "Comparing it to a complex algorithm that filters data packets based on header information and port numbers.", "isCorrect": false, "rationale": "This describes the technical operation of a firewall, not a familiar analogy that builds from the concrete to the abstract for a new reader."}, {"text": "Describing it as a digital gatekeeper or security guard at the entrance of a building, checking IDs before allowing people to enter.", "isCorrect": true, "rationale": "This option uses a familiar, concrete image (a gatekeeper/security guard) to explain an abstract technical concept (a firewall's access control), directly aligning with the text's recommendation to 'start with what the reader already knows.'"}, {"text": "Defining it as a network appliance running an operating system with specific rule sets for IP traffic.", "isCorrect": false, "rationale": "This is a technical definition, not an analogy that bridges familiar understanding to a new concept."}, {"text": "Explaining how it differs from a router or switch in network topology.", "isCorrect": false, "rationale": "This compares one technical concept to others, assuming prior knowledge of networking devices, rather than starting with a universally familiar idea."}], "id": "q03"}, {"question": "The text states, 'Define Terms in Context.' What is the primary reason for this recommendation?", "options": [{"text": "To impress the reader with a broad vocabulary.", "isCorrect": false, "rationale": "The goal of defining terms is clarity and reader comprehension, not demonstrating the writer's vocabulary or impressing the reader."}, {"text": "To ensure the text maintains a high level of academic rigor.", "isCorrect": false, "rationale": "While clear definitions contribute to rigor, the immediate benefit highlighted in the text is for the reader's uninterrupted comprehension."}, {"text": "To prevent the reader from having to interrupt their reading flow to look up unfamiliar terms.", "isCorrect": true, "rationale": "The text explicitly states, 'Do not make the reader hunt for a glossary,' emphasizing that definitions in context allow the reader to 'never have to stop and wonder what something means.'"}, {"text": "To demonstrate the writer's expertise in the subject matter.", "isCorrect": false, "rationale": "Similar to impressing the reader, showing expertise is not the primary reason given for defining terms in context; reader comprehension is."}], "id": "q04"}, {"question": "A medical device company needs to create two documents for a new MRI machine: one for potential investors and another for radiology technicians. Applying the 'Audience Test for Detail,' how should the level of detail differ?", "options": [{"text": "Both documents should provide the same level of exhaustive technical detail to maintain consistency.", "isCorrect": false, "rationale": "The text directly contradicts this, stating 'Same subject, different levels of detail' for different audiences (patient vs. radiology technician)."}, {"text": "The investor document should focus on the machine's financial benefits, while the technician document should explain only the basic operational steps.", "isCorrect": false, "rationale": "Radiology technicians need enough detail to 'operate the machine safely,' which goes beyond just basic operational steps. Investors need to feel 'informed and comfortable' about the technology, not just financial benefits."}, {"text": "The investor document should provide enough detail for general understanding and comfort, while the technician document needs specific details for safe operation and maintenance.", "isCorrect": true, "rationale": "This aligns perfectly with the 'Audience Test for Detail' example: 'A patient reading about how an MRI works needs enough detail to feel informed and comfortable. A radiology technician reading the same topic needs enough detail to operate the machine safely.'"}, {"text": "The technician document should include analogies for clarity, while the investor document should use precise jargon for credibility.", "isCorrect": false, "rationale": "Analogies are generally for making complex ideas accessible, not specific to technicians. Jargon without definition would violate the 'Define Terms in Context' principle and hinder accessibility for investors."}], "id": "q05"}, {"question": "Comparing the 'before' and 'after' explanations of 'Public-key cryptography,' what is the most significant improvement made in the 'after' version?", "options": [{"text": "The 'after' version introduces more complex mathematical concepts.", "isCorrect": false, "rationale": "The 'after' version simplifies by using an analogy, avoiding the direct mathematical details ('computational difficulty of factoring large prime numbers') of the 'before' version."}, {"text": "The 'after' version uses a familiar, concrete analogy to build understanding before introducing technical terms.", "isCorrect": true, "rationale": "The 'after' version starts with 'Imagine you have a mailbox...' which is a concrete, familiar image that anchors the abstract concepts of public and private keys, making the explanation accessible."}, {"text": "The 'after' version removes all technical jargon, making it overly simplified.", "isCorrect": false, "rationale": "The 'after' version still uses technical terms like 'public key' and 'private key' but defines them clearly through the analogy, rather than removing them entirely."}, {"text": "The 'after' version is shorter and more concise.", "isCorrect": false, "rationale": "The 'after' version is actually slightly longer due to the inclusion of the analogy and its explanation, prioritizing clarity over conciseness."}], "id": "q06"}, {"question": "In the 'How Encryption Protects Your Password' model document, what is the specific role of your device during 'Stage 1: Your Device Encrypts the Password'?", "options": [{"text": "It receives the encrypted password from the server.", "isCorrect": false, "rationale": "Receiving encrypted data from the server is not described as the device's role in Stage 1; Stage 3 describes the server receiving data."}, {"text": "It uses TLS to scramble your password into ciphertext.", "isCorrect": true, "rationale": "The model document explicitly states, 'When you click “Log In,” your browser ... uses an encryption protocol called TLS (Transport Layer Security) to scramble the password into a string of random-looking characters called ciphertext.'"}, {"text": "It compares your password against a stored hash.", "isCorrect": false, "rationale": "Comparing the password against a stored hash is an action performed by the server in Stage 3, not the user's device in Stage 1."}, {"text": "It verifies the server's private decryption key.", "isCorrect": false, "rationale": "The server uses its private decryption key; the device's role is encryption, not verification of the server's key."}], "id": "q07"}, {"question": "According to the model document on password encryption, why is it crucial that the website server stores a 'hash' of your password rather than your actual password?", "options": [{"text": "Hashes are faster to transmit across the internet.", "isCorrect": false, "rationale": "The text does not mention transmission speed as the reason for storing hashes; it focuses on security implications."}, {"text": "Storing hashes makes the decryption process more efficient for the server.", "isCorrect": false, "rationale": "Hashes are used for verification, not for making the decryption of the *incoming* password more efficient. The server decrypts the incoming password and *then* compares it to the stored hash."}, {"text": "If the server's database is breached, hackers cannot directly recover actual passwords from the stored hashes.", "isCorrect": true, "rationale": "The document states, 'Importantly, the server does not store your actual password; it stores only the hash, so even if hackers breach the server's database, they cannot directly recover passwords.'"}, {"text": "Hashes contain more detailed information about the user's account than plain passwords.", "isCorrect": false, "rationale": "Hashes are one-way functions, meaning they transform data into a fixed-size string, not store more detailed information; their primary purpose here is secure comparison without storing the original."}], "id": "q08"}, {"question": "The 'Explain Like I'm a Smart Fifteen-Year-Old' writing standard, as described in the text, primarily emphasizes which characteristic of the target audience?", "options": [{"text": "They prefer highly technical language to feel respected.", "isCorrect": false, "rationale": "The text explicitly states this audience 'will not tolerate unexplained jargon' and does not imply a preference for highly technical language."}, {"text": "They are intelligent and capable of learning, but require clear, logically structured explanations without unexplained jargon or assumed knowledge.", "isCorrect": true, "rationale": "The tip describes this reader as 'intelligent enough to follow logical reasoning and learn new terms, but they will not tolerate unexplained jargon or assumptions about what they already know,' directly supporting this option."}, {"text": "They need content simplified to a very basic level, even if it loses some accuracy.", "isCorrect": false, "rationale": "The overall philosophy is 'accessible, not simple' and to avoid 'dumbing down,' indicating accuracy should not be sacrificed for extreme simplification."}, {"text": "They are primarily interested in the practical application of the information, not the underlying concepts.", "isCorrect": false, "rationale": "The description 'smart, curious' and 'intelligent enough to follow logical reasoning' suggests an interest in understanding concepts, not just applications."}], "id": "q09"}, {"question": "A technical writer is tasked with explaining 'quantum entanglement' (a phenomenon where two or more particles are linked in such a way that they cannot be described independently) to a general audience. Which approach best aligns with the principles in this section?", "options": [{"text": "Begin by explaining the complex mathematical equations that govern quantum entanglement to establish scientific rigor.", "isCorrect": false, "rationale": "This approach starts with abstract and complex details, violating the principle of 'Start with What the Reader Already Knows' and building from familiar to unfamiliar."}, {"text": "Define 'quantum entanglement' using a familiar analogy, like two coins that always show opposite faces regardless of how far apart they are, then gradually introduce the underlying physics.", "isCorrect": true, "rationale": "This approach exemplifies 'Start with What the Reader Already Knows' by using a concrete, familiar analogy before introducing complex scientific concepts, making the idea accessible without 'dumbing it down.'"}, {"text": "Provide only a brief, high-level definition and suggest readers consult academic journals for more detail, to avoid overcomplicating the topic.", "isCorrect": false, "rationale": "This provides too little detail, failing the 'Audience Test for Detail' by not giving enough information for the reader to understand 'How does this work?' in their own words."}, {"text": "Use advanced physics terminology throughout the explanation, assuming the audience will look up unfamiliar terms if truly interested.", "isCorrect": false, "rationale": "This violates the principle 'Define Terms in Context' and goes against the 'Explain Like I'm a Smart Fifteen-Year-Old' standard, which warns against unexplained jargon."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
