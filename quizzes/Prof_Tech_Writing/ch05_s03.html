<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear and Effective: Professional &amp; Technical Writing &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 5, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is a primary consequence of using vague language in professional and technical writing?", "options": [{"text": "It enhances creativity and allows for broader interpretations.", "isCorrect": false, "rationale": "The text states that vague language 'wastes time, causes mistakes, and can cost real money,' which is contrary to enhancing creativity or streamlining interpretation."}, {"text": "It leads to wasted time, mistakes, and potential financial costs.", "isCorrect": true, "rationale": "The first paragraph explicitly states: 'In professional and technical writing, vague language wastes time, causes mistakes, and can cost real money.'"}, {"text": "It primarily affects the aesthetic quality of the document, not its utility.", "isCorrect": false, "rationale": "The text emphasizes that vague language has significant practical consequences, affecting utility through wasted time, mistakes, and financial costs, not just aesthetics."}, {"text": "It streamlines communication by focusing on general ideas.", "isCorrect": false, "rationale": "Vague language does not streamline communication; instead, it forces the reader to guess and leads to misunderstanding, which wastes time and causes mistakes."}]}, {"question": "Which of the following phrases is the clearest example of a 'weasel word' as defined and illustrated in the text?", "options": [{"text": "10.5 kilograms", "isCorrect": false, "rationale": "This is a specific, measurable unit, directly contradicting the definition of a weasel word which conveys no specific information."}, {"text": "approximately 200 employees", "isCorrect": false, "rationale": "While 'approximately' is on the list of weasel words, the text explicitly states it is 'acceptable when an exact number is genuinely unknown or unimportant,' making this a potentially acceptable usage depending on context."}, {"text": "The motor operates at 6,500 RPM", "isCorrect": false, "rationale": "This is a specific condition for a performance number, adhering to technical writing conventions rather than being a weasel word."}, {"text": "The system is pretty much ready.", "isCorrect": true, "rationale": "The phrase 'pretty much' is listed as a weasel word example in the text ('pretty much') because it sounds meaningful but conveys no specific information, forcing the reader to guess what 'ready' entails."}]}, {"question": "A technical writer drafts the sentence, 'The new safety feature makes the product relatively secure.' Applying the 'Weasel Word Test,' why would this sentence likely need revision?", "options": [{"text": "Because it uses an abbreviation that might not be understood by all readers.", "isCorrect": false, "rationale": "The sentence does not contain an abbreviation; the issue is with the vagueness of 'relatively secure,' which is what the Weasel Word Test addresses."}, {"text": "Because 'secure' is a subjective term, making the sentence inherently unfixable.", "isCorrect": false, "rationale": "'Secure' can be objectively quantified (e.g., security protocols, resistance to specific threats). The problem lies with the qualifier 'relatively,' not 'secure' itself."}, {"text": "Because two reasonable people could disagree on what 'relatively secure' means in practice.", "isCorrect": true, "rationale": "The 'Weasel Word Test' asks: 'Could two reasonable people disagree about what this means?' 'Relatively secure' is a prime example where different individuals could have vastly different interpretations, necessitating revision for precision."}, {"text": "Because the sentence does not specify the cost savings associated with the safety feature.", "isCorrect": false, "rationale": "The Weasel Word Test focuses on the clarity and specificity of the language used, not on including every possible piece of related information like cost savings."}]}, {"question": "Consider the original statement: 'The printer is fairly easy to set up and runs quite well.' Based on the 'Eliminating Weasel Words' example, which revision best improves its precision?", "options": [{"text": "The printer's setup process is straightforward, and its operation is smooth.", "isCorrect": false, "rationale": "While an improvement, 'straightforward' and 'smooth' are still subjective terms that lack the verifiable specificity advocated by the text's 'after' example."}, {"text": "The printer can be set up in under 5 minutes using the included quick-start guide and prints at 30 pages per minute.", "isCorrect": true, "rationale": "This revision provides specific, measurable, and verifiable details ('under 5 minutes,' '30 pages per minute'), directly mirroring the approach shown in the 'Eliminating Weasel Words' 'after' example."}, {"text": "The printer is significantly better than previous models in terms of ease of use and performance.", "isCorrect": false, "rationale": "'Significantly better' is another vague comparative that fails the 'Compared to What?' test and lacks the precise details required."}, {"text": "The printer offers a good user experience and reliable performance.", "isCorrect": false, "rationale": "'Good user experience' and 'reliable performance' are subjective and vague, failing to provide specific, verifiable information as emphasized in the text."}]}, {"question": "Which of the following is NOT listed as a convention for presenting numerical information clearly in technical writing?", "options": [{"text": "Always include units.", "isCorrect": false, "rationale": "The text explicitly lists 'Always include units' as the first convention for clear numerical information."}, {"text": "Express all numbers as whole integers to avoid confusion.", "isCorrect": true, "rationale": "The text does NOT state this; it explicitly advises 'Use consistent decimal precision,' indicating that decimal numbers are often necessary and should be presented with consistency, not avoided by using only whole integers."}, {"text": "Use standard abbreviations for units.", "isCorrect": false, "rationale": "The text explicitly lists 'Use standard abbreviations' as a convention for clear numerical information."}, {"text": "Specify conditions for performance numbers.", "isCorrect": false, "rationale": "The text explicitly lists 'Specify conditions for performance numbers' as a convention, giving the example of '150 horsepower at 6,500 RPM.'"}]}, {"question": "A technical manual describes a product's dimensions. If one dimension is stated as '15.0 inches,' how should another dimension of 10 inches ideally be written to adhere to the conventions of technical writing regarding precision?", "options": [{"text": "10 inches", "isCorrect": false, "rationale": "This violates the convention of 'Use consistent decimal precision' as it omits the decimal place, suggesting a lower level of precision than '15.0 inches.'"}, {"text": "Ten inches", "isCorrect": false, "rationale": "While acceptable in general writing for small numbers, technical writing typically uses numerals for measurements for clarity and consistency, and this also lacks consistent decimal precision."}, {"text": "10.0 inches", "isCorrect": true, "rationale": "This adheres to the convention 'Use consistent decimal precision.' If '15.0 inches' is used, then '10.0 inches' maintains the signaled precision across all measurements."}, {"text": "Approximately 10 inches", "isCorrect": false, "rationale": "This introduces vagueness ('approximately') where precise measurement ('10.0 inches') is implied by the context of a manual and the stated precision of '15.0 inches.'"}]}, {"question": "A product brochure claims, 'Our new engine offers 20% more power.' According to the 'Compared to What?' test, what crucial piece of information is missing from this statement?", "options": [{"text": "The specific type of fuel the engine uses.", "isCorrect": false, "rationale": "While important for an engine, the 'Compared to What?' test specifically addresses relative terms and the need for a reference point, not general product specifications like fuel type."}, {"text": "The cost difference between the new and old engines.", "isCorrect": false, "rationale": "The 'Compared to What?' test focuses on quantifying the comparison itself, not external factors like cost."}, {"text": "The absolute power output of both the new and previous models.", "isCorrect": true, "rationale": "The 'Compared to What?' test states that 'Relative terms... are meaningless without a reference point.' The text explicitly gives an example: 'Vague: 'The new model is 40% faster.' Clear: 'The new model processes 1,400 transactions per second, a 40% increase over the previous model's 1,000 transactions per second.' Both the absolute values and the comparison are useful."}, {"text": "The environmental impact of the engine.", "isCorrect": false, "rationale": "The 'Compared to What?' test is concerned with making relative claims concrete and verifiable, not with every possible attribute of a product."}]}, {"question": "The text states, 'A consumer shopping for a desk does not need the wood grain density to three decimal places. But the factory producing that desk absolutely does.' This example primarily illustrates which principle of technical writing?", "options": [{"text": "The importance of using dual units for international audiences.", "isCorrect": false, "rationale": "While dual units are mentioned, this example specifically focuses on the *amount* of detail, not the *types* of units used."}, {"text": "The necessity of eliminating weasel words in all contexts.", "isCorrect": false, "rationale": "This example is about the appropriate level of *objective detail*, not the removal of vague weasel words."}, {"text": "The need to tailor the level of detail to the document's purpose and audience.", "isCorrect": true, "rationale": "The text explicitly states this: 'Not every technical document needs the same level of precision. The level of detail depends on the document's purpose and audience.' The example directly follows this statement."}, {"text": "The preference for objective language over subjective language.", "isCorrect": false, "rationale": "Both the consumer's need and the factory's need for information are objective; the difference is in the *granularity* of that objective detail, not its subjectivity."}]}, {"question": "Which of the following statements uses objective language as defined in the text?", "options": [{"text": "The new software update is fantastic and dramatically improves user experience.", "isCorrect": false, "rationale": "'Fantastic' and 'dramatically improves' express personal opinion and interpretation rather than measurable facts, making them subjective."}, {"text": "The device has an elegant design and feels very comfortable to hold.", "isCorrect": false, "rationale": "'Elegant' and 'very comfortable' are personal opinions and interpretations, typical of subjective language."}, {"text": "The solution changed from colorless to deep violet within 15 seconds of adding the indicator.", "isCorrect": true, "rationale": "This statement describes measurable and verifiable facts ('colorless to deep violet,' 'within 15 seconds'), aligning perfectly with the definition of objective language."}, {"text": "Our customer service is outstanding, providing excellent support to all users.", "isCorrect": false, "rationale": "'Outstanding' and 'excellent' are subjective judgments and opinions, not verifiable facts."}]}, {"question": "The 'Writing Connection' section argues that replacing vague language with specific details improves all kinds of writing. Which of the following scenarios best exemplifies this claim?", "options": [{"text": "A marketing team uses evocative language to create an emotional connection with consumers.", "isCorrect": false, "rationale": "While effective in marketing, this focuses on emotional appeal through evocative language, which might include subjective or less precise terms, rather than improving credibility through specific details in the way the text describes."}, {"text": "A poet employs ambiguous metaphors to encourage multiple interpretations of their work.", "isCorrect": false, "rationale": "Poetry often intentionally uses ambiguity for artistic effect, which is the opposite of precision and specificity as discussed in the text."}, {"text": "A historian revises 'Many people were affected' to 'The 1918 influenza pandemic infected an estimated 500 million people — roughly one-third of the world's population.'", "isCorrect": true, "rationale": "This is a direct example provided in the 'Writing Connection' section, demonstrating how specific details make historical writing 'more credible, more memorable, and more persuasive than vague generalizations.'"}, {"text": "A novelist focuses on developing complex characters rather than describing their exact physical traits.", "isCorrect": false, "rationale": "A novelist's choice of detail is an artistic one, and while specific details can enhance character, this scenario does not exemplify the *replacement* of vague language with specific, verifiable facts to improve clarity and credibility as highlighted in the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
