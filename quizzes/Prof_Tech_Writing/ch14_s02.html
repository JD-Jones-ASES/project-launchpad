<script>
var QUESTIONS = [{"question": "According to the \"Slide Design Principles\" section, what is the primary role of a slide deck in a presentation?", "options": [{"text": "To serve as a comprehensive document that can be distributed to the audience for later review.", "isCorrect": false, "rationale": "The text explicitly states, 'A slide deck ... is not a report.' Slides are visual aids, not standalone documents."}, {"text": "To act as a script for the presenter, ensuring all talking points are covered accurately.", "isCorrect": false, "rationale": "The text clarifies, 'It is not a script.' Slides are meant to reinforce, not replace, the speaker."}, {"text": "To function as a visual aid that reinforces the speaker's message without replacing the speaker.", "isCorrect": true, "rationale": "The text states that a slide deck 'is a backdrop that reinforces what you are saying, not a replacement for you.'"}, {"text": "To present all detailed information, allowing the audience to read independently while the presenter summarizes.", "isCorrect": false, "rationale": "The text advises against dense slides, explaining that 'Your audience cannot read a dense slide and listen to you at the same time.'"}]}, {"question": "The principle 'Less Is More' in slide design is primarily driven by which of the following audience behaviors?", "options": [{"text": "Audiences prefer aesthetically minimalist designs over detailed ones.", "isCorrect": false, "rationale": "While minimalism can be aesthetic, the text emphasizes a cognitive reason: the inability to read and listen simultaneously."}, {"text": "Audiences typically have short attention spans and get bored with too much content.", "isCorrect": false, "rationale": "Although true in general, the text specifically identifies the cognitive conflict between reading and listening as the core issue."}, {"text": "Audiences cannot effectively read dense text on a slide and simultaneously listen to the speaker.", "isCorrect": true, "rationale": "The text clearly states, 'Your audience cannot read a dense slide and listen to you at the same time. When you put a paragraph on the screen, the audience reads the paragraph and stops listening to you.'"}, {"text": "Audiences appreciate when presenters keep information brief to save time.", "isCorrect": false, "rationale": "Saving time is a potential outcome, but the primary reason given is the audience's inability to multitask reading and listening effectively."}]}, {"question": "A presenter is developing a slide about 'Benefits of Local Farmers Markets.' On the same slide, they also include a section on 'How to Start Your Own Produce Garden.' Based on 'The Slide Purpose Rule,' what is the most appropriate action for this presenter?", "options": [{"text": "Consolidate both topics into a single, well-structured slide to maintain flow.", "isCorrect": false, "rationale": "The Slide Purpose Rule states, 'If a slide tries to do two things, split it into two slides,' directly contradicting consolidation of distinct ideas."}, {"text": "Remove the 'How to Start Your Own Produce Garden' section if it doesn't directly support the current point about farmers markets.", "isCorrect": false, "rationale": "While removing irrelevant content is good, the issue here is two distinct ideas on one slide, not necessarily irrelevance of the second idea altogether. It should be on its own slide."}, {"text": "Split the content into two separate slides, one for 'Benefits of Local Farmers Markets' and another for 'How to Start Your Own Produce Garden.'", "isCorrect": true, "rationale": "The Slide Purpose Rule dictates, 'Each slide should serve exactly one purpose... If a slide tries to do two things, split it into two slides.'"}, {"text": "Use different font sizes and colors to visually separate the two distinct ideas on the same slide.", "isCorrect": false, "rationale": "While visual hierarchy is important, it does not override the fundamental 'One Idea Per Slide' or 'Slide Purpose Rule' which requires splitting distinct concepts onto separate slides."}]}, {"question": "A presenter adheres strictly to the 6x6 guideline, ensuring every bullet point has exactly six words and every slide has exactly six bullet points. What potential pitfall might this approach introduce, according to the text?", "options": [{"text": "It might make the presentation too long, as more slides would be needed.", "isCorrect": false, "rationale": "The text suggests that breaking down information often leads to more, clearer slides, which is generally a positive outcome, not a pitfall of strict adherence to word/bullet count."}, {"text": "It could lead to sacrificing clarity and conciseness for the sake of an arbitrary word count.", "isCorrect": true, "rationale": "The text clarifies, 'The point is not to count words obsessively but to internalize the principle: slides are not for reading.' It suggests 'If you can communicate a point with an image and three words, that is even better,' implying strict adherence can hinder optimal communication."}, {"text": "It prevents the use of images and charts, as they don't fit the bullet point format.", "isCorrect": false, "rationale": "The 6x6 guideline applies to text, not visuals, and the text explicitly encourages replacing text with images."}, {"text": "It might make the slides too sparse, leaving the audience without enough information.", "isCorrect": false, "rationale": "The core principle is 'less is more,' with the speaker providing details. Sparse slides are generally preferred over dense ones."}]}, {"question": "A presenter wants to emphasize a critical statistic (e.g., '75% Success Rate') on a slide that also contains a title, a bulleted list of features, and a small company logo. To ensure this statistic grabs attention first, which combination of visual hierarchy principles would be most effective?", "options": [{"text": "Place the statistic in the bottom-right corner, make it the same size as the other text, but in a unique font.", "isCorrect": false, "rationale": "Placing it in the bottom-right goes against the principle of placing important content in the upper portion. Keeping the same size won't make it stand out first."}, {"text": "Make the statistic significantly larger than other text, bold it, and use a contrasting accent color, placing it in the upper portion of the slide.", "isCorrect": true, "rationale": "This option applies multiple visual hierarchy principles: 'Size. Larger elements attract attention first.', 'Contrast. A key number in a bold accent color stands out.', and 'Position. Place your most important content in the upper portion of the slide.'"}, {"text": "Surround the statistic with plenty of white space and ensure it's the only element on the slide.", "isCorrect": false, "rationale": "While white space is good, making it the 'only element' might not be feasible with other required content, and it doesn't address size and contrast as primary attention-grabbers when other elements are present."}, {"text": "Position the statistic directly below the title, use a dark color on a dark background for subtlety, and keep its font size consistent with bullet points.", "isCorrect": false, "rationale": "Dark text on a dark background lacks contrast and reduces readability. Keeping the font size consistent with bullet points will not make it stand out as the 'most important information'."}]}, {"question": "A presenter performs the 'Squint Test' on their slide and finds it difficult to discern the main point or read the text. What is the most likely conclusion and recommended action based on this outcome?", "options": [{"text": "The slide likely contains too much white space, making the key elements appear disconnected; add more content.", "isCorrect": false, "rationale": "The text identifies the issue as 'too much text or the font is too small,' not too much white space. White space helps readability."}, {"text": "The font chosen is too decorative for a professional setting; switch to a simpler typeface.", "isCorrect": false, "rationale": "While font choice is important for readability, the Squint Test specifically points to the *amount* of text or the *size* of the font as the problem for distant viewing."}, {"text": "There is probably too much text or the font is too small, making it unreadable from a distance; reduce text or increase font size.", "isCorrect": true, "rationale": "The Writing Tip states: 'If not [you can't read and understand], there is too much text or the font is too small.'"}, {"text": "The slide's visual hierarchy is poorly designed; reorder elements to place the most important content at the bottom-right.", "isCorrect": false, "rationale": "While poor hierarchy can be an issue, the Squint Test specifically diagnoses problems with text density and size affecting overall readability from afar."}]}, {"question": "Why does the text strongly advocate for the 'One Idea Per Slide' principle, even if it results in a higher number of total slides?", "options": [{"text": "To reduce the presenter's preparation time by simplifying individual slide creation.", "isCorrect": false, "rationale": "Splitting content might increase preparation time to structure ideas effectively, rather than reduce it."}, {"text": "To ensure each idea receives adequate visual support and prevents the audience from being overwhelmed.", "isCorrect": true, "rationale": "The text explains, 'If you find yourself wanting to put a lot of content on a single slide, that is a signal that the slide is trying to do too much. Split it.' It also states, 'A ten-slide presentation with one clear idea per slide is better than a five-slide presentation with two cramped ideas per slide,' implying better audience comprehension."}, {"text": "To allow presenters to incorporate more detailed textual explanations on each slide without crowding.", "isCorrect": false, "rationale": "The overall philosophy is 'less is more' regarding text, not to make space for more detailed explanations on individual slides."}, {"text": "To make the presentation seem more substantial by having a greater quantity of slides.", "isCorrect": false, "rationale": "The text explicitly states, 'Slides are free — there is no prize for having fewer of them,' indicating that quantity is not the goal, but clarity per slide is."}]}, {"question": "A student is creating a presentation comparing different types of renewable energy sources. They find a high-resolution infographic online that clearly illustrates the cost-benefit analysis of three energy types using pie charts and bar graphs, alongside a detailed textual explanation. Which guideline should they prioritize when incorporating this visual into their slide?", "options": [{"text": "Copy and paste the entire infographic, including all text, to provide comprehensive information.", "isCorrect": false, "rationale": "The text advises 'One visual per slide' and to replace text with visuals, not to include extensive textual explanations with the visual. Including all text would make it a document."}, {"text": "Ensure the image is high-quality and cite the source, but consider simplifying or splitting the infographic if it contains multiple competing visuals or too much text.", "isCorrect": true, "rationale": "The guidelines state 'Use high-quality images,' 'One visual per slide. Multiple competing images confuse the viewer,' and 'Cite your sources.' A complex infographic with multiple charts and text likely violates the 'One visual per slide' and 'Less Is More' principles, requiring simplification."}, {"text": "Stretch the infographic to fill the entire slide, as larger visuals are always better.", "isCorrect": false, "rationale": "The text warns, 'Blurry, stretched, or clip-art images undermine your credibility.' Stretching an image can reduce its quality."}, {"text": "Only include the textual explanation from the infographic, as visuals can be distracting.", "isCorrect": false, "rationale": "The text strongly encourages replacing text with visuals, stating, 'The most effective slides replace text with visuals.' Avoiding visuals entirely contradicts this."}]}, {"question": "The 'Common Mistake' section advises against reading slides aloud. What is the primary reason provided for this recommendation?", "options": [{"text": "It indicates a lack of preparation by the presenter, who should know their material.", "isCorrect": false, "rationale": "While it can be a symptom of poor preparation, the text's stated reason focuses on the audience's experience and cognitive processing."}, {"text": "It makes the presenter appear less confident and professional to the audience.", "isCorrect": false, "rationale": "This is a consequence, but not the primary reason articulated in the text."}, {"text": "The audience can read faster than the presenter can speak, leading to boredom and disengagement.", "isCorrect": true, "rationale": "The text states, 'The audience can read faster than you can speak, so they finish before you do and then wait, bored, for you to catch up.'"}, {"text": "It prevents the presenter from making eye contact and connecting with the audience.", "isCorrect": false, "rationale": "This is another consequence of reading slides, but the text's primary explanation directly addresses the audience's reading speed versus the speaker's pace."}]}, {"question": "A teacher asks a student to create a 'Slide Outline for a 5-Minute Class Presentation.' The student designs seven slides, each with a single key message and minimal text, relying on images and charts where appropriate. The student plans to provide detailed explanations orally. Which set of slide design principles has this student most effectively applied?", "options": [{"text": "The 6x6 guideline, consistent templates, and citing sources.", "isCorrect": false, "rationale": "While these are good practices, the description specifically highlights 'minimal text,' 'one idea per slide,' and 'relying on images and charts,' which points more strongly to the other principles."}, {"text": "Less is More, The Slide Purpose Rule, and using visuals to replace text.", "isCorrect": true, "rationale": "The student's approach (seven slides for five minutes, one clear idea per slide, minimal text, using images/charts, and speaker providing details) directly aligns with 'Less Is More,' 'The Slide Purpose Rule' (one idea per slide), and 'The most effective slides replace text with visuals.'"}, {"text": "Visual hierarchy, consistent use of a template, and avoiding 'death by PowerPoint.'", "isCorrect": false, "rationale": "Visual hierarchy and templates are important, but the description doesn't explicitly detail their application beyond general good design. 'Avoiding death by PowerPoint' is an outcome, not a principle itself, and the primary actions taken fit other principles better."}, {"text": "The Squint Test, high-quality images, and reading slides aloud for timing.", "isCorrect": false, "rationale": "The text explicitly identifies 'Reading Your Slides Aloud' as a 'Common Mistake' to be avoided, making this option incorrect."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
