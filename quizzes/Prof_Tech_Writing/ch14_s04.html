    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 14, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the most effective approach for a presenter to prepare for the question-and-answer period?", "options": [{"text": "Memorizing a detailed script for every single point made in the presentation.", "isCorrect": false, "rationale": "The text suggests anticipating 'most likely questions' and drafting 'concise answers,' not memorizing a script for every single point, which would be impractical and rigid."}, {"text": "Putting themselves in the audience's shoes to anticipate likely questions in predictable categories and drafting concise answers.", "isCorrect": true, "rationale": "The text explicitly states: 'After you finish building your presentation, put yourself in the audience's shoes and ask: “What would I want to know after hearing this?” Most audience questions fall into predictable categories... For each category, prepare one or two likely questions and draft concise answers.'"}, {"text": "Focusing solely on a flawless delivery of the main presentation, believing that questions will naturally resolve themselves.", "isCorrect": false, "rationale": "The text warns that 'many speakers fall apart' during Q&A if unprepared, emphasizing that handling questions is a skill to 'prepare for, just like the rest of your presentation.'"}, {"text": "Preparing answers only for potential objections or challenges to the presentation's claims.", "isCorrect": false, "rationale": "The text lists several categories of questions beyond just objections, including Clarification, Evidence, Application, and Extension, indicating a broader preparation is needed."}], "id": "q01"}, {"question": "When faced with an audience question, the text recommends a 'Three-Step Answer' pattern. What is the correct sequence of these steps?", "options": [{"text": "Answer directly, acknowledge the question, then connect back to your key message.", "isCorrect": false, "rationale": "This sequence reverses the first two steps and misplaces the bridging technique."}, {"text": "Connect back to your key message, acknowledge the question, then answer directly.", "isCorrect": false, "rationale": "This sequence incorrectly places the 'connect back' step at the beginning, which is the final step in the pattern."}, {"text": "Acknowledge the question, answer directly, then connect back to your key message.", "isCorrect": true, "rationale": "The text clearly outlines these steps in order: 'Acknowledge the question,' 'Answer directly,' and 'Connect back to your key message (rhetorical bridge technique).'"}, {"text": "Acknowledge the question, connect back to your key message, then answer directly.", "isCorrect": false, "rationale": "This sequence incorrectly places the 'connect back' step before the direct answer."}], "id": "q02"}, {"question": "A presenter has just explained a new software feature. An audience member asks, 'How would this specific feature integrate with our existing legacy systems?' Into which category of audience questions would this most likely fall?", "options": [{"text": "Clarification", "isCorrect": false, "rationale": "Clarification questions typically ask for a simpler explanation or definition (e.g., 'Can you explain what you mean by?'), not about practical implementation."}, {"text": "Evidence", "isCorrect": false, "rationale": "Evidence questions seek sources or support for claims (e.g., 'Where did you get that number?'). This question is about implementation, not proof."}, {"text": "Objection", "isCorrect": false, "rationale": "Objection questions raise concerns or counterpoints (e.g., 'But what about the downside?'). This question is practical, not an objection."}, {"text": "Application", "isCorrect": true, "rationale": "The text defines Application questions as 'How would that work in practice?' or 'What would the first step be?'. The question about integrating with existing systems directly addresses how the feature would 'work in practice' within a specific context."}], "id": "q03"}, {"question": "During a Q&A session, a speaker is asked a question for which they do not have the specific data or a direct answer. What is the most professional response, according to the text?", "options": [{"text": "Provide an educated guess to avoid appearing unprepared.", "isCorrect": false, "rationale": "The text explicitly warns, 'Making up an answer or guessing destroys your credibility far more than admitting a gap in your knowledge.'"}, {"text": "State, 'I don't have that specific data, but I can follow up with you after the presentation.'", "isCorrect": true, "rationale": "The text advises, 'When you do not know: Say so. “I don't have that specific data, but I can follow up with you after the presentation” is a perfectly professional response.'"}, {"text": "Redirect the question to another audience member or change the topic.", "isCorrect": false, "rationale": "This tactic avoids the question and can appear evasive or unprepared, potentially damaging credibility."}, {"text": "Apologize repeatedly for the oversight in not having the information.", "isCorrect": false, "rationale": "While honesty is key, excessive apology is unnecessary and less professional than a clear offer to follow up."}], "id": "q04"}, {"question": "An audience member states during Q&A, 'I think peer tutoring is just a way to avoid hiring real tutors. Students aren't qualified to teach.' Which of the following responses aligns best with the text's advice for handling disagreements?", "options": [{"text": "That's not true at all. Peer tutoring is totally proven and it works way better than you think. Have you even looked at the research?", "isCorrect": false, "rationale": "This response is defensive and confrontational, directly contradicting the advice to 'Stay calm and professional' and 'avoid getting defensive.'"}, {"text": "I understand that concern. Peer tutors aren't replacing professional teachers—they're providing supplemental support. The training program would cover tutoring techniques and when to refer students to a teacher for more help. The research from Jefferson High and Lincoln Academy shows that trained peer tutors produce measurable improvements in grades.", "isCorrect": true, "rationale": "This response follows the text's advice: 'Acknowledge their point,' 'respond with evidence if you have it,' and 'avoid getting defensive.' It directly uses the professional response example provided in the text."}, {"text": "You're entitled to your opinion, but the data I showed clearly proves otherwise, so there's no need to discuss this further.", "isCorrect": false, "rationale": "While acknowledging the opinion, this response is dismissive and does not engage professionally with the point or offer to consider other research, as advised by the text."}, {"text": "I'm not here to debate policy decisions; my presentation focuses solely on the benefits of the proposed program.", "isCorrect": false, "rationale": "This response avoids the disagreement by deflecting the question, which is not the recommended approach for handling disagreements professionally."}], "id": "q05"}, {"question": "The text suggests several techniques for audience engagement *beyond* the Q&A session. Which of the following is NOT listed as an effective engagement technique *during* the body of the talk?", "options": [{"text": "Asking a question early in the presentation to prompt raised hands.", "isCorrect": false, "rationale": "The text lists 'Ask a question early' as a recommended technique to make the problem feel real."}, {"text": "Using a brief poll, such as 'Raise your hand if...' to create instant, visible evidence.", "isCorrect": false, "rationale": "The text lists 'Use a brief poll' as a recommended technique to create instant, visible evidence."}, {"text": "Distributing handouts summarizing key points to the audience at the beginning of the presentation.", "isCorrect": true, "rationale": "The text explicitly states for handouts: 'Distribute handouts after your talk, not before — if you give them out first, the audience reads ahead and stops listening.' This is a technique *not* recommended during the body of the talk."}, {"text": "Telling a short, relevant story or anecdote to make a point more memorable.", "isCorrect": false, "rationale": "The text lists 'Tell a short story' as a recommended technique for memorability."}], "id": "q06"}, {"question": "Regarding handouts and follow-up materials, what is the best practice for their distribution and content?", "options": [{"text": "Distribute comprehensive printouts of all your presentation slides before the talk begins to ensure the audience has all information.", "isCorrect": false, "rationale": "The text advises distributing handouts 'after your talk, not before' to avoid distraction, and that they should contain 'Your key message and main points (not your full slides).'"}, {"text": "Provide a clean, readable handout summarizing key messages, supporting data, and contact information *after* the presentation.", "isCorrect": true, "rationale": "The text recommends to 'Distribute handouts after your talk, not before' and specifies contents like 'Your key message and main points,' 'Supporting data,' 'Your contact information,' and 'A clean, readable layout — not just a printout of your slides.'"}, {"text": "Handouts should be given out *during* the presentation as new topics are introduced, containing detailed speaker notes.", "isCorrect": false, "rationale": "The text states handouts should be given 'after' the talk and contain 'key message and main points (not your full slides),' indicating they are not detailed speaker notes."}, {"text": "Avoid handouts entirely to prevent distracting the audience from your verbal delivery.", "isCorrect": false, "rationale": "The text frames handouts as a way to 'extend the life of your presentation beyond the room,' implying they are a valuable tool when used correctly."}], "id": "q07"}, {"question": "The 'Writing Connection' section draws a parallel between a presentation's key message and a thesis statement. What is the fundamental purpose they both share?", "options": [{"text": "To introduce as much new, complex information as possible to the audience or reader.", "isCorrect": false, "rationale": "The text emphasizes specificity and clarity, not complexity or sheer volume of new information. It also connects to the 'one thing' concept."}, {"text": "To answer the question, 'What is the one thing I want my reader (or listener) to take away?'", "isCorrect": true, "rationale": "The text explicitly states: 'Both answer the same question: “What is the one thing I want my reader (or listener) to take away?”'"}, {"text": "To ensure the content is broad enough to accommodate multiple interpretations and perspectives.", "isCorrect": false, "rationale": "The text advises against being 'too broad' or 'too vague' and suggests narrowing a thesis if it's too expansive for a short presentation."}, {"text": "To serve as an outline for the entire presentation or essay, listing all sub-points.", "isCorrect": false, "rationale": "A key message or thesis is a single, focused statement of the main point, not a full outline of all sub-points."}], "id": "q08"}, {"question": "The text mentions a 'Writing Tip: Drop the Filler Phrases.' What does this tip advise presenters to do when needing time to think during Q&A?", "options": [{"text": "Say 'That's a great question' to acknowledge the question while buying time.", "isCorrect": false, "rationale": "The text explicitly states, '“That's a great question” has become such an automatic response that it has lost all meaning. The audience knows you are stalling for time.'"}, {"text": "Ask the questioner to repeat or rephrase their question to gain extra time.", "isCorrect": false, "rationale": "This tactic is not mentioned as a professional way to buy time; it could come across as not having heard or understood the question."}, {"text": "Utilize a brief, professional pause instead of using filler phrases.", "isCorrect": true, "rationale": "The text advises, 'If you need a moment to think, a brief pause is far more professional than filler.'"}, {"text": "Directly ask the audience for their thoughts on the question before answering.", "isCorrect": false, "rationale": "While engaging, this is not presented as a method for the presenter to gather their own thoughts when they need time, and it changes the dynamic of the Q&A."}], "id": "q09"}, {"question": "Considering all the advice in the 'Handling Questions' section, which overarching principle is most vital for transforming a challenging Q&A into a successful part of a presentation?", "options": [{"text": "Relying on spontaneous wit and improvisation to keep the audience entertained and engaged.", "isCorrect": false, "rationale": "The text emphasizes Q&A as a 'skill you can prepare for,' directly contradicting reliance on improvisation for success."}, {"text": "Prioritizing strict adherence to the planned presentation content, even if it means dismissing unexpected questions.", "isCorrect": false, "rationale": "The purpose of Q&A is to address audience questions, and dismissing them would negate this, contrary to the advice on handling objections and engaging with questions."}, {"text": "Viewing Q&A as a predictable, trainable skill that requires preparation, a structured response method, and a professional, honest demeanor.", "isCorrect": true, "rationale": "This option synthesizes key themes: Q&A 'is a skill you can prepare for,' preparation involves anticipating questions, the 'Three-Step Answer' provides structure, and 'Answering with Honesty and Confidence' (professional demeanor) is crucial. It encapsulates the core message of the section."}, {"text": "Minimizing the Q&A period to avoid potential disagreements or questions the presenter cannot answer.", "isCorrect": false, "rationale": "While the section helps handle difficult Q&A, it doesn't suggest minimizing it. Instead, it provides tools to make it a confident and successful part of the presentation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
