<script>
var QUESTIONS = [{"question": "According to the text, which of the following is NOT one of the primary factors determining the appropriate 'register' for communication?", "options": [{"text": "The situation of the communication.", "isCorrect": false, "rationale": "The text explicitly states that register is chosen based on 'the situation, audience, and purpose of the communication,' making 'situation' a primary factor."}, {"text": "The audience receiving the communication.", "isCorrect": false, "rationale": "The text explicitly states that register is chosen based on 'the situation, audience, and purpose of the communication,' making 'audience' a primary factor."}, {"text": "The purpose of the communication.", "isCorrect": false, "rationale": "The text explicitly states that register is chosen based on 'the situation, audience, and purpose of the communication,' making 'purpose' a primary factor."}, {"text": "The personal preference of the writer.", "isCorrect": true, "rationale": "The text defines register as being determined by situation, audience, and purpose, not the writer's personal preference for how they like to write. While personal habits might influence a draft, the correct register is externally determined by context."}]}, {"question": "A student is asked to write an email to their professor requesting an extension. They write: 'Hey prof, cant finish report by friday. need extension lol. thx!'. Based on the text, which 'mode' are they most likely defaulting to?", "options": [{"text": "The Essay Writer.", "isCorrect": false, "rationale": "The 'Essay Writer' mode is characterized by long, complex sentences and overly formal language, which is the opposite of the casual example provided."}, {"text": "The Professional Middle Ground.", "isCorrect": false, "rationale": "The 'Professional Middle Ground' is characterized by clear, concise, professional, and respectful language, which the example email is not."}, {"text": "The Texter.", "isCorrect": true, "rationale": "The example email uses abbreviations ('cant,' 'thx'), slang ('lol'), lacks capitalization, and assumes familiarity, which are all hallmarks of 'The Texter' mode described in the text."}, {"text": "The Overly Formal Writer.", "isCorrect": false, "rationale": "The 'Overly Formal Writer' mode is synonymous with the 'Essay Writer' in this context, focusing on excessive formality and complex phrasing, not casual shorthand."}]}, {"question": "Which quality is NOT listed as a characteristic of 'The Professional Middle Ground' for effective professional writing?", "options": [{"text": "Clear.", "isCorrect": false, "rationale": "Clarity ('the reader understands it immediately') is explicitly listed as a key characteristic of the Professional Middle Ground."}, {"text": "Concise.", "isCorrect": false, "rationale": "Conciseness ('uses no more words than necessary') is explicitly listed as a key characteristic of the Professional Middle Ground."}, {"text": "Impressive.", "isCorrect": true, "rationale": "The text emphasizes clarity, conciseness, professionalism, and respect, but not 'impressiveness' through complex language. In fact, it warns against using big words just to sound impressive, linking it to the 'Essay Writer' mode."}, {"text": "Respectful.", "isCorrect": false, "rationale": "Respect ('treats the reader's time as valuable') is explicitly listed as a key characteristic of the Professional Middle Ground."}]}, {"question": "Alex Rivera's 'Overly Formal' email to Ms. Chen (Dear Esteemed Ms. Chen, I am writing to most respectfully request...) is criticized in the text for what primary reason?", "options": [{"text": "It lacks a clear statement of purpose.", "isCorrect": false, "rationale": "While wordy, the email does clearly state its purpose (requesting to leave early). The issue isn't a lack of purpose but how it's conveyed."}, {"text": "It contains factual errors about the appointment.", "isCorrect": false, "rationale": "The example does not indicate any factual errors; it's the style and wordiness that are problematic."}, {"text": "It is overly wordy and forces the reader to search for the main request.", "isCorrect": true, "rationale": "The text explicitly states this email 'takes 85 words to say what could be said in 45' and that 'The reader has to dig through layers of unnecessary formality to find the actual request,' highlighting its wordiness and lack of conciseness."}, {"text": "It is too casual for a supervisor.", "isCorrect": false, "rationale": "The 'Overly Formal' example is the opposite of casual; its problem is excessive formality, not informality. That criticism applies to the 'Text Message' example."}]}, {"question": "A student is drafting an email to their internship supervisor. They read it aloud and it 'sounds like a robot wrote it.' According to the 'Would I Say This Out Loud?' test, what does this suggest about the email's register?", "options": [{"text": "It is perfectly professional and appropriate.", "isCorrect": false, "rationale": "The 'Would I Say This Out Loud?' test specifically states that if it 'sounds like a robot wrote it, it is too formal,' indicating it is not perfectly professional."}, {"text": "It is too casual for the workplace.", "isCorrect": false, "rationale": "The test indicates 'too casual' if it sounds like a text to a friend. 'Sounds like a robot wrote it' refers to excessive formality."}, {"text": "It is too formal and stiff for effective communication.", "isCorrect": true, "rationale": "The text explicitly states: 'If it sounds like a robot wrote it, it is too formal.' This aligns with the 'Essay Writer' mode and the 'Overly Formal' example, which are characterized by stiffness and excessive formality."}, {"text": "It requires more complex vocabulary to sound impressive.", "isCorrect": false, "rationale": "The text warns against using big words to sound impressive, clarifying that professional writing favors simple, direct language. Sounding like a robot implies the opposite of effective communication."}]}, {"question": "A project manager sends an update email that omits a crucial deadline and the name of the team member responsible for the next step. Which quality of professional writing, as defined in the text, is primarily lacking?", "options": [{"text": "Clear.", "isCorrect": false, "rationale": "While the missing information might make the message less clear, the primary issue is the absence of necessary details, which falls under completeness."}, {"text": "Concise.", "isCorrect": false, "rationale": "Conciseness refers to using no more words than necessary, not to omitting essential information. The problem here is insufficient information, not excessive words."}, {"text": "Complete.", "isCorrect": true, "rationale": "The text defines 'Complete' as ensuring 'The reader has all the information they need to understand your message and take action. No missing dates, no vague references...' The omitted deadline and team member directly violate this quality."}, {"text": "Correct.", "isCorrect": false, "rationale": "Correctness relates to accuracy in grammar, spelling, punctuation, and facts. While missing information could lead to incorrect actions, the direct violation is that the information isn't fully provided."}]}, {"question": "The text warns against the 'Common Mistake: Confusing 'Formal' with 'Professional'.' Which of the following statements best encapsulates this warning?", "options": [{"text": "Professional writing always requires using the most sophisticated vocabulary available to impress the reader.", "isCorrect": false, "rationale": "The text explicitly refutes this, stating, 'Many students think professional writing means using the longest, fanciest words they can find. It does not.'"}, {"text": "True professional writing prioritizes simple, direct language over overly complex or verbose phrasing.", "isCorrect": true, "rationale": "The text clearly states, 'Professional writing favors simple, direct language' and provides examples like 'use' instead of 'utilize' and 'now' instead of 'at this point in time,' directly supporting this statement."}, {"text": "Formal writing is never appropriate in any workplace communication.", "isCorrect": false, "rationale": "The text presents register as a spectrum and acknowledges that 'very formal (a legal contract)' exists, implying certain situations require high formality, but this is distinct from 'overly formal' for most workplace communication."}, {"text": "The primary goal of professional writing is to maintain a consistently serious and unapproachable tone.", "isCorrect": false, "rationale": "The text mentions 'Appropriate' tone, noting a congratulations note can be warm, or a complaint response empathetic, showing that a consistently serious tone is not always the goal."}]}, {"question": "Which change best exemplifies the principle of 'concise' professional writing as described in the text?", "options": [{"text": "Replacing 'FYI' with 'For your information' in an email.", "isCorrect": false, "rationale": "This change actually makes the phrase longer, going against the principle of conciseness which aims to use 'no more words than necessary.'"}, {"text": "Adding 'kindly' before requests (e.g., 'Kindly send me the report').", "isCorrect": false, "rationale": "Adding 'kindly' adds an unnecessary word without adding significant meaning or politeness, making the sentence less concise, not more."}, {"text": "Changing 'In the event that you are unable to attend' to 'If you cannot attend'.", "isCorrect": true, "rationale": "This change significantly shortens a wordy phrase ('In the event that you are unable to attend' to 'If you cannot attend') while retaining the full meaning, directly demonstrating conciseness by removing filler words."}, {"text": "Using a thesaurus to find more impressive synonyms for common words.", "isCorrect": false, "rationale": "This practice goes against the text's advice that professional writing favors simple, direct language over 'longest, fanciest words,' and often leads to less concise or clear writing."}]}, {"question": "The text argues that the ability to shift language register is something people 'already do naturally when speaking.' What does it identify as the main 'challenge' related to this skill?", "options": [{"text": "Understanding the complex grammatical rules of formal language.", "isCorrect": false, "rationale": "While grammar is important for correctness, the text highlights the natural shift in speaking and the challenge of replicating that ease in writing, not the mastery of complex grammar as the primary hurdle."}, {"text": "Learning to do it just as naturally when writing.", "isCorrect": true, "rationale": "The text explicitly states: 'This ability to shift your language is something you already do naturally when speaking. The challenge is learning to do it just as naturally when writing.'"}, {"text": "Memorizing specific formal phrases for every professional scenario.", "isCorrect": false, "rationale": "The text encourages a natural, adaptable approach to register ('dial, not a switch') rather than rote memorization of specific phrases, especially given its critique of overly formal language."}, {"text": "Overcoming the fear of sounding too casual in the workplace.", "isCorrect": false, "rationale": "While a concern, the text frames the challenge more broadly as replicating the natural spoken ability in writing, which encompasses avoiding both overly casual and overly formal modes, rather than just fear of sounding casual."}]}, {"question": "Imagine you are writing a company-wide email about a new safety procedure. Which aspect of 'Appropriate' register, as described, would be most critical to consider?", "options": [{"text": "Ensuring the email is as short as possible, even if it omits minor details.", "isCorrect": false, "rationale": "While conciseness is valued, for a safety procedure, completeness and directness are paramount. Omitting minor details could compromise safety, which would be inappropriate."}, {"text": "Using humor to lighten the mood of the serious subject matter.", "isCorrect": false, "rationale": "The text states 'A safety warning must be direct and serious,' making humor highly inappropriate for such a critical message."}, {"text": "Adopting a direct, serious, and unambiguous tone.", "isCorrect": true, "rationale": "The text explicitly provides an example for 'Appropriate' register: 'A safety warning must be direct and serious,' directly aligning with this option."}, {"text": "Beginning with an elaborate, respectful greeting to show deference to employees.", "isCorrect": false, "rationale": "While respect is important, an 'elaborate, respectful greeting' would likely fall into the 'overly formal' category and detract from the directness required for a safety warning, which needs to get straight to the point."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
