    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 13, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary distinguishing feature of a recommendation report compared to an analytical report?", "options": [{"text": "It includes a more detailed introduction and background section.", "isCorrect": false, "rationale": "While a recommendation report may have a detailed introduction, this is not its primary distinguishing feature from an analytical report. Both report types require adequate context."}, {"text": "It proposes specific actions based on the analysis and conclusions.", "isCorrect": true, "rationale": "The text states that an analytical report tells what the data means, but a recommendation report 'goes one step further: it tells the reader what to do about it' by proposing specific actions."}, {"text": "It focuses solely on presenting raw data without interpretation.", "isCorrect": false, "rationale": "A recommendation report includes data, analysis, and conclusions, going beyond just raw data to interpret it and suggest actions."}, {"text": "It is typically much longer and includes more appendices.", "isCorrect": false, "rationale": "The length and number of appendices can vary for both report types; this is not the fundamental difference in their purpose or content."}]}, {"question": "According to the 'Full Structure' section, which part of a recommendation report should be written last but appear first?", "options": [{"text": "Introduction", "isCorrect": false, "rationale": "The Introduction is typically written early in the report process and appears near the beginning, after the Title Page and Executive Summary."}, {"text": "Executive Summary", "isCorrect": true, "rationale": "The text explicitly states for the Executive Summary: '(write last, place first)'. It summarizes the entire report, including recommendations, which can only be finalized once the rest of the report is complete."}, {"text": "Recommendations", "isCorrect": false, "rationale": "Recommendations are written after findings and analysis, but they appear in their own section towards the end of the main body, not at the very beginning of the report."}, {"text": "Title Page", "isCorrect": false, "rationale": "The Title Page is generally one of the first elements prepared for a report, not the last."}]}, {"question": "A report's methodology section states, 'We gathered feedback from some students about their cafeteria experience.' Based on the text, what is the most significant weakness of this methodology statement?", "options": [{"text": "It lacks an executive summary for the methodology.", "isCorrect": false, "rationale": "An executive summary covers the entire report, not just the methodology section. This is a structural element, not a weakness of the methodology description itself."}, {"text": "It does not explain how the data was analyzed.", "isCorrect": false, "rationale": "While a complete methodology should explain data analysis, the primary weakness in this vague statement is the lack of detail about the data collection itself."}, {"text": "It fails to provide specific details about the data collection process and scope.", "isCorrect": true, "rationale": "The text emphasizes that a strong methodology answers 'What sources did you use?', 'How did you collect the data?', and includes specific details (e.g., 'online survey sent to 150 employees'). The phrase 'some students' is vague and doesn't allow readers to judge the findings' trustworthiness."}, {"text": "It incorrectly places findings before analysis.", "isCorrect": false, "rationale": "The question refers to a statement *within* the methodology section, not the overall structure of the report's sections."}]}, {"question": "A consultant recommends, 'Our organization should immediately overhaul its entire IT infrastructure to adopt cutting-edge quantum computing solutions.' Which characteristic of strong recommendations is most clearly violated by this statement?", "options": [{"text": "Specific", "isCorrect": false, "rationale": "While it could be more specific, the statement identifies the area (IT infrastructure), a general action (overhaul), and the target technology (quantum computing). Other characteristics are more severely violated."}, {"text": "Supported", "isCorrect": false, "rationale": "Without knowing the report's findings and conclusions, we cannot definitively say it's unsupported, although it's highly probable. However, another characteristic is more glaringly violated."}, {"text": "Practical", "isCorrect": true, "rationale": "The text defines practical as considering 'cost, timeline, and feasibility,' citing 'rebuild the entire school' as impractical. An immediate overhaul to 'cutting-edge quantum computing' is highly unlikely to be practical for most organizations due to immense cost, complexity, and current technological readiness."}, {"text": "Prioritized", "isCorrect": false, "rationale": "This is a single recommendation, so the concept of prioritizing *multiple* recommendations isn't directly applicable as a violation here."}]}, {"question": "Why is the 'logical progression' from findings to conclusions to recommendations crucial in a recommendation report?", "options": [{"text": "It allows the report to be shorter and more concise.", "isCorrect": false, "rationale": "While a logical flow can contribute to clarity, its primary purpose is not to shorten the report but to ensure its validity and effectiveness."}, {"text": "It ensures the recommendations are credible and justifiable to the reader.", "isCorrect": true, "rationale": "The text states, 'Each step depends on the one before it. Skip a step and the whole chain breaks.' This logical progression allows readers to follow the evidence, understand the interpretation, and therefore trust that the proposed actions are well-founded and justifiable."}, {"text": "It helps the author meet the required page count for the report.", "isCorrect": false, "rationale": "Meeting a page count is a superficial goal and not the fundamental reason for structuring the report logically."}, {"text": "It is primarily a stylistic choice that improves readability.", "isCorrect": false, "rationale": "While it does improve readability, its importance extends beyond mere style; it's about the report's underlying validity and persuasive power."}]}, {"question": "In the 'Model Recommendation Report,' the Technology Advisory Committee recommends deploying two different laptop models (Model A for grades 6-8, Model C for grades 9-12). What primary analytical reason supports this 'split approach'?", "options": [{"text": "To reduce the total number of laptops purchased across the district.", "isCorrect": false, "rationale": "The report specifies 1,200 units of each model, totaling 2,400 units, which is the full number of students in grades 6-12. The split does not reduce the total quantity."}, {"text": "To simplify vendor negotiations by working with two different suppliers.", "isCorrect": false, "rationale": "Working with two vendors typically adds complexity, not simplification, to negotiations, although the report does recommend negotiating a combined volume discount."}, {"text": "To balance cost-efficiency for younger students with specific software compatibility needs for upper-grade coursework.", "isCorrect": true, "rationale": "The Executive Summary states the split 'balances cost efficiency for younger students with the software requirements of upper-grade coursework.' The Conclusions section elaborates that Model A is cost-effective but lacks compatibility for advanced software, while Model C provides necessary Windows compatibility at a moderate cost."}, {"text": "To offer students more variety in their device choices.", "isCorrect": false, "rationale": "The report does not indicate student choice as a factor in the recommendation; the decision is based on educational and financial criteria."}]}, {"question": "When writing a methodology section, why is it important to acknowledge the 'limitations' of your data collection?", "options": [{"text": "It makes the report seem more objective and professional.", "isCorrect": false, "rationale": "While it contributes to professionalism, the primary reason is more fundamental to the report's credibility and usefulness."}, {"text": "It helps readers understand the potential reliability and generalizability of the findings.", "isCorrect": true, "rationale": "The text explicitly states, 'Readers need this [methodology] to judge whether your findings are trustworthy.' Acknowledging limitations, such as a low survey response rate, allows readers to critically assess how reliable the data is and how broadly the findings can be applied."}, {"text": "It signals to readers that the author is unsure of their own data.", "isCorrect": false, "rationale": "Acknowledging limitations demonstrates critical self-awareness and honesty, which enhances credibility, rather than indicating uncertainty in the data itself."}, {"text": "It is a required element by most formatting styles, regardless of content.", "isCorrect": false, "rationale": "While often a standard component, the *reason* for its requirement is rooted in academic and professional best practices for transparent research, not merely stylistic adherence."}]}, {"question": "Which of the following recommendations best exemplifies the 'specific' characteristic described in the text?", "options": [{"text": "Improve employee morale by year-end.", "isCorrect": false, "rationale": "This recommendation is vague about *how* morale will be improved and what specific actions will be taken, making it insufficiently specific."}, {"text": "Invest in better technology solutions for all departments next quarter.", "isCorrect": false, "rationale": "'Better technology solutions' is vague. It doesn't specify what technology, for what purpose, or with what budget."}, {"text": "Implement a new email communication policy by the end of Q3 to reduce internal email traffic by 15%.", "isCorrect": true, "rationale": "This recommendation is highly specific: it names the action ('implement a new email communication policy'), provides a timeline ('by the end of Q3'), and includes a measurable outcome ('reduce internal email traffic by 15%'). This aligns with the example given in the text: 'Switch to double-sided default printing on all shared printers by January 15'."}, {"text": "Enhance customer satisfaction in the upcoming fiscal year.", "isCorrect": false, "rationale": "Similar to improving employee morale, 'enhance customer satisfaction' is a desirable outcome but lacks specific actions, methods, or metrics to achieve it."}]}, {"question": "What is the main purpose of the 'Appendices' section in a recommendation report?", "options": [{"text": "To provide an executive summary of the report's key findings.", "isCorrect": false, "rationale": "The Executive Summary is a distinct section at the beginning of the report and has a different purpose: a concise overview of the entire report."}, {"text": "To present the author's personal opinions and reflections on the topic.", "isCorrect": false, "rationale": "Recommendation reports are formal, objective documents. Personal opinions without supporting data do not belong in the appendices or the main body of the report."}, {"text": "To offer supplementary background information and raw data for readers who need more detail.", "isCorrect": true, "rationale": "The text defines appendices as 'Supporting materials (raw data, surveys, detailed tables)'. This section provides evidence and supplementary information that supports the report's findings but would be too extensive to include in the main body."}, {"text": "To list all the sources cited in the report's bibliography.", "isCorrect": false, "rationale": "While a bibliography or references section might appear near or within the appendices, the main purpose of appendices is broader, covering all types of supporting materials beyond just cited sources."}]}, {"question": "If a recommendation report's analysis does not logically support its recommendations, what does the text suggest about the report's quality?", "options": [{"text": "The report is likely to be accepted more quickly due to bold suggestions.", "isCorrect": false, "rationale": "Recommendations without logical support are unlikely to be accepted; they lack credibility and justification."}, {"text": "The analysis is either incomplete or the recommendations themselves are flawed.", "isCorrect": true, "rationale": "The text explicitly states: 'If your analysis does not support your recommendations, either your analysis is incomplete or your recommendations are wrong.'"}, {"text": "The report successfully demonstrates innovative thinking, even without direct data support.", "isCorrect": false, "rationale": "While innovation is valued, a recommendation report requires that even innovative recommendations be logically supported by analysis and data to be credible and actionable."}, {"text": "The methodology section was probably too detailed, overwhelming the reader.", "isCorrect": false, "rationale": "The level of detail in the methodology is unrelated to the logical disconnect between analysis and recommendations; a poorly executed methodology leads to unreliable findings, but an *unsupported* recommendation implies a breakdown in the logical chain from analysis to action."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
