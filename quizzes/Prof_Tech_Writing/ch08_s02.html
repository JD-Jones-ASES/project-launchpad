    };

        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 8, Section 2</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary role of meeting minutes?", "options": [{"text": "To capture every word spoken during the meeting for legal purposes.", "isCorrect": false, "rationale": "The text explicitly states, 'Meeting minutes are not a transcript. You are not recording every word spoken.'"}, {"text": "To serve as the official written record of what was discussed, decided, and assigned.", "isCorrect": true, "rationale": "The first paragraph defines minutes as 'the official written record of what was discussed, decided, and assigned during a meeting.'"}, {"text": "To provide a platform for attendees to express their personal opinions after the meeting.", "isCorrect": false, "rationale": "The text advises to 'Leave Out of Minutes' 'Personal opinions and jokes' and emphasizes neutrality."}, {"text": "To plan the next meeting's agenda.", "isCorrect": false, "rationale": "The text clarifies, 'If the agenda is the plan for the meeting, the minutes... are the record of what actually happened.'"}]}, {"question": "The word 'minutes' in the context of meeting notes comes from the Latin 'minutia,' meaning 'small details.' What does this origin imply about the purpose of good minutes?", "options": [{"text": "Good minutes emphasize brevity, summarizing lengthy discussions into short paragraphs.", "isCorrect": false, "rationale": "While minutes should be concise, the Latin origin 'minutia' refers to detail, not the duration or length of the summary itself."}, {"text": "Good minutes meticulously record the precise timing of each discussion point.", "isCorrect": false, "rationale": "The text states, 'The word 'minutes' has nothing to do with time.'"}, {"text": "Good minutes focus on accurately documenting the critical, specific outcomes that might otherwise be overlooked.", "isCorrect": true, "rationale": "The text explains, 'that is exactly what good minutes capture: the small but important details that people will forget if no one writes them down.'"}, {"text": "Good minutes capture the brief, unimportant points that are easily forgotten.", "isCorrect": false, "rationale": "The text specifies 'small but important details,' not unimportant ones."}]}, {"question": "During a project team meeting, which of the following scenarios *must* be captured in the meeting minutes according to the section 'The Three Things Minutes Must Capture'?", "options": [{"text": "The lively debate between two team members regarding the best approach to a problem.", "isCorrect": false, "rationale": "The 'Include in Minutes & Leave Out of Minutes' table states to 'Leave Out of Minutes' 'Who argued for which side'."}, {"text": "A team member's personal anecdote about a previous, similar project.", "isCorrect": false, "rationale": "The 'Include in Minutes & Leave Out of Minutes' table states to 'Leave Out of Minutes' 'Personal opinions and jokes'."}, {"text": "The decision to adopt Option B for the project, the assignment of tasks to Sarah and John, and the deadline for completion.", "isCorrect": true, "rationale": "The text lists 'Decisions made,' 'Action items assigned (What/Who/When),' and 'Key information shared' as the three things minutes must capture. This option includes a decision and action items."}, {"text": "Off-topic conversations that eased tension and built team camaraderie.", "isCorrect": false, "rationale": "The 'Include in Minutes & Leave Out of Minutes' table states to 'Leave Out of Minutes' 'Off-topic conversations'."}]}, {"question": "A new notetaker writes, 'Sarah argued strongly against the budget increase and seemed frustrated with the committee's direction.' Based on the 'Common Mistake: Attributing Opinions in Minutes' tip, how should this statement be revised for professional minutes?", "options": [{"text": "Sarah's emotional outburst demonstrated her strong disapproval of the budget increase.", "isCorrect": false, "rationale": "This revision still attributes emotions ('emotional outburst') and characterizes attitudes, which the writing tip advises against ('recording emotions and characterizing people's attitudes can create conflict')."}, {"text": "Sarah expressed concern about the budget increase, citing limited remaining funds.", "isCorrect": true, "rationale": "This revision, directly from the example, is factual and neutral, reporting what was said (concern about budget, reason cited) rather than how someone felt."}, {"text": "Sarah disagreed with the budget increase, believing it was a poor financial decision.", "isCorrect": false, "rationale": "While better than the original, 'believing it was a poor financial decision' still attempts to interpret Sarah's internal opinion rather than stating her factual concern or a concrete statement she made."}, {"text": "The committee heard Sarah's objections to the budget increase but proceeded anyway.", "isCorrect": false, "rationale": "This phrasing implies a judgment ('but proceeded anyway') and doesn't capture Sarah's specific factual point as effectively as focusing on her stated concern."}]}, {"question": "A notetaker wrote: 'I reported that the new policy is effective.' To adhere to the professional writing tips for minutes, how should this be rephrased?", "options": [{"text": "The notetaker reports that the new policy is effective.", "isCorrect": false, "rationale": "This uses third person but incorrectly uses present tense ('reports') instead of past tense."}, {"text": "It was reported that the new policy was effective.", "isCorrect": true, "rationale": "This uses past tense ('was reported,' 'was effective') and third person (passive voice), adhering to the instruction to write 'as a neutral observer, not as a participant.'"}, {"text": "The notetaker will report that the new policy was effective.", "isCorrect": false, "rationale": "This uses third person and past tense for the policy's effectiveness, but 'will report' is future tense for the act of reporting, which describes what happened at the meeting in the past."}, {"text": "I will report that the new policy is effective.", "isCorrect": false, "rationale": "This incorrectly uses both first person ('I') and future tense ('will report'), violating both writing tips."}]}, {"question": "Which element of the standard meeting minutes format is most crucial for quickly identifying individual responsibilities and deadlines after the meeting?", "options": [{"text": "The detailed discussion under each agenda item.", "isCorrect": false, "rationale": "While this section provides context, it does not offer a quick, consolidated list of tasks. The text notes 'A consolidated list at the end... makes it easy for anyone to scan... and find their tasks.'"}, {"text": "The 'Header block' with attendees and facilitator.", "isCorrect": false, "rationale": "The header block provides general meeting information, not a summary of assigned responsibilities."}, {"text": "The 'Action items summary' at the end of the document.", "isCorrect": true, "rationale": "The text explicitly states this section is 'A consolidated list at the end of all action items from the meeting, with owners and deadlines. This makes it easy for anyone to scan the document and find their tasks.'"}, {"text": "The 'Adjournment time' of the meeting.", "isCorrect": false, "rationale": "The adjournment time simply indicates when the meeting concluded."}]}, {"question": "During a fast-paced meeting, a notetaker is struggling to keep up with all the discussion points. According to the text, what is the most effective strategy to ensure accurate minutes are produced?", "options": [{"text": "Attempt to write down everything said and then transcribe it word-for-word later.", "isCorrect": false, "rationale": "The text explicitly states, 'Meeting minutes are not a transcript. You are not recording every word spoken.'"}, {"text": "Focus primarily on listening for moments when decisions are made or tasks are assigned, rather than the entire conversation.", "isCorrect": true, "rationale": "The text advises, 'Focus on outcomes, not process. Do not try to write down the discussion. Listen for the moment when someone says, “So we are going to” or “Let's decide that” — that is what you write.'"}, {"text": "Interrupt speakers frequently to ask them to slow down or repeat themselves.", "isCorrect": false, "rationale": "While asking for clarification is suggested, frequently interrupting to slow down or repeat everything is disruptive and counter-productive to capturing outcomes efficiently."}, {"text": "Record only the names of speakers and assume the full context can be recalled later.", "isCorrect": false, "rationale": "This would result in too little information; the text warns that 'Your memory fades fast,' emphasizing the need for timely, detailed minutes of outcomes."}]}, {"question": "A school club is discussing options for a fundraiser. The treasurer reports the current club balance. Members then debate two ideas for fundraising, with several jokes exchanged. Finally, they vote to pursue a bake sale, and two members are assigned to research costs by next week. Which of the following should be included in the minutes?", "options": [{"text": "The jokes exchanged during the debate and who told them.", "isCorrect": false, "rationale": "The text advises to 'Leave Out of Minutes' 'Personal opinions and jokes'."}, {"text": "A detailed account of each member's arguments for and against the bake sale.", "isCorrect": false, "rationale": "The text advises to 'Leave Out of Minutes' 'Who argued for which side' and to 'Focus on outcomes, not process'."}, {"text": "The treasurer's report, the decision to hold a bake sale, and the assigned tasks with deadlines.", "isCorrect": true, "rationale": "The treasurer's report is 'Key information shared,' the bake sale selection is a 'Decision made,' and the research tasks are 'Action items assigned (What/Who/When).' These are the three core elements minutes must capture."}, {"text": "A verbatim transcript of the entire fundraising discussion.", "isCorrect": false, "rationale": "The text clearly states, 'Meeting minutes are not a transcript. You are not recording every word spoken.'"}]}, {"question": "In the 'Rambling Notes vs. Structured Minutes' example, what is the key advantage of the 'after' (structured) version compared to the 'before' (rambling) version?", "options": [{"text": "The 'after' version captures the emotional tone and dynamics of the meeting more effectively.", "isCorrect": false, "rationale": "Structured minutes prioritize facts and outcomes, explicitly avoiding emotional characterizations to maintain neutrality and professionalism."}, {"text": "The 'after' version provides a concise, result-oriented summary that quickly conveys decisions and actions.", "isCorrect": true, "rationale": "The text states, 'The 'after' version captures the results of the meeting. A month from now, the structured version tells you everything you need to know. The rambling version tells you almost nothing useful.'"}, {"text": "The 'after' version includes more personal opinions and detailed dialogue, giving a richer account.", "isCorrect": false, "rationale": "The 'after' version deliberately omits personal opinions and word-for-word dialogue to focus on outcomes."}, {"text": "The 'after' version ensures that all spoken words are accurately recorded for future reference.", "isCorrect": false, "rationale": "The text emphasizes that minutes are not a transcript and should focus on outcomes, not every word spoken."}]}, {"question": "Referring to the 'Project Team Meeting Minutes' model, if a club member reviewed these minutes a month later, which section would most efficiently help them determine their assigned responsibilities?", "options": [{"text": "The 'Old Business: Campus Recycling Audit Results' section.", "isCorrect": false, "rationale": "This section details the discussion and specific action item related to recycling, but it's not a consolidated list of *all* action items from the entire meeting."}, {"text": "The 'Approval of September Minutes' section.", "isCorrect": false, "rationale": "This section pertains to an administrative task (approving previous minutes) and contains no new assigned responsibilities for the current meeting."}, {"text": "The 'Action Items Summary' at the very end of the document.", "isCorrect": true, "rationale": "The text describes this section as 'A consolidated list at the end of all action items from the meeting, with owners and deadlines. This makes it easy for anyone to scan the document and find their tasks.'"}, {"text": "The 'Announcements' section.", "isCorrect": false, "rationale": "This section contains general information or upcoming events, not specifically assigned individual tasks."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
