<script>
var QUESTIONS = [{"question": "How do technical proposals differ significantly from the \"short proposals\" discussed in Chapter 10?", "options": [{"text": "Technical proposals are always much shorter and less formal, focusing only on the problem.", "isCorrect": false, "rationale": "The text states that short proposals might be two or three pages, while a technical proposal can run twenty pages or more, indicating they are significantly longer and more formal."}, {"text": "Technical proposals exclusively focus on financial problems, while short proposals address technical ones.", "isCorrect": false, "rationale": "The text defines a technical proposal as presenting a solution to a 'technical problem,' and examples include engineering, network upgrades, and scientific research, not exclusively financial problems."}, {"text": "Technical proposals offer significantly more depth and detail on methodology, qualifications, timeline, and budget.", "isCorrect": true, "rationale": "The text explicitly states that a technical proposal 'adds significantly more depth' than short proposals, explaining 'exactly how' a problem will be solved with detailed methodology, qualifications, timeline, and budget."}, {"text": "Short proposals are typically submitted in response to an RFP, unlike technical proposals.", "isCorrect": false, "rationale": "The text clearly states that a technical proposal is 'often submitted in response to a Request for Proposal (RFP),' not short proposals."}], "id": "q01"}, {"question": "In which of the following scenarios would an organization most likely require a technical proposal?", "options": [{"text": "A company needs to quickly order standard office supplies from a known vendor.", "isCorrect": false, "rationale": "Ordering office supplies is a routine, simple transaction that does not involve complex problems or competing solutions requiring a formal technical proposal."}, {"text": "An employee wants to request a day off for personal reasons from their supervisor.", "isCorrect": false, "rationale": "An employee leave request is an internal HR process, not a complex organizational problem requiring a detailed external solution from competing teams."}, {"text": "A city government is seeking detailed plans and bids from engineering firms to construct a new public transportation system.", "isCorrect": true, "rationale": "This scenario involves a complex problem (new infrastructure), a need to evaluate competing solutions from external firms (engineering firms), and the likely issuance of an RFP, all characteristic of when technical proposals are used."}, {"text": "A manager needs to assign a simple, internal task to a team member within their department.", "isCorrect": false, "rationale": "Assigning an internal task is a basic management function for which a formal technical proposal is entirely inappropriate and unnecessary."}], "id": "q02"}, {"question": "The text emphasizes that technical proposals are \"competitive documents.\" What is the primary implication of this characteristic for the proposal writer?", "options": [{"text": "The proposal must be written quickly to beat competitors to submission.", "isCorrect": false, "rationale": "While timeliness can be a factor, the primary implication of competitiveness is not speed over quality; it's about making a stronger case than rivals. Rushing can compromise quality."}, {"text": "The proposal must not only be technically sound but also clearer, better organized, and more convincing than alternatives.", "isCorrect": true, "rationale": "The text explicitly states, 'This means your proposal must not only be technically sound—it must also be clearer, better organized, and more convincing than the alternatives.'"}, {"text": "The writer should focus solely on the technical details, assuming the client will understand the value.", "isCorrect": false, "rationale": "Focusing solely on technical details neglects the need for clarity, organization, and persuasiveness, which are crucial for winning against competitors."}, {"text": "Technical proposals should avoid including budgets to remain flexible.", "isCorrect": false, "rationale": "A 'Timeline and Budget' is a required section of a technical proposal, and it must be detailed. Avoiding a budget would make the proposal incomplete and uncompetitive."}], "id": "q03"}, {"question": "A reader who only reads the Executive Summary should still understand the core of the proposal. Based on the text's \"Writing Tip,\" which element is LEAST critical to include in a strong Executive Summary?", "options": [{"text": "A brief summary of the problem being solved.", "isCorrect": false, "rationale": "The writing tip lists 'the problem you are solving' as one of the four essential components of a miniature proposal within the executive summary."}, {"text": "Your proposed solution in brief.", "isCorrect": false, "rationale": "The writing tip lists 'your proposed solution in brief' as one of the four essential components of a miniature proposal within the executive summary."}, {"text": "A detailed breakdown of all project tasks and deliverables.", "isCorrect": true, "rationale": "While the executive summary should briefly outline the solution, a 'detailed breakdown of tasks and deliverables' belongs in the Statement of Work (SOW) section, not the compact executive summary."}, {"text": "Why your team is qualified and the expected outcomes.", "isCorrect": false, "rationale": "The writing tip lists 'why your team is qualified' and 'the expected outcomes' as essential components of a miniature proposal within the executive summary."}], "id": "q04"}, {"question": "A technical proposal for a large-scale software development project includes a section detailing how progress will be tracked, who will be responsible for quality assurance, and how potential technical issues will be resolved. Which standard proposal section does this content primarily align with?", "options": [{"text": "Proposed Solution / Technical Approach", "isCorrect": false, "rationale": "The Proposed Solution describes what will be done and how technically, not the management processes for supervising and controlling the project."}, {"text": "Qualifications and Experience", "isCorrect": false, "rationale": "Qualifications and Experience focus on the team's credentials and past successes, not the operational plan for managing the current project."}, {"text": "Management Plan", "isCorrect": true, "rationale": "The text defines the Management Plan as explaining 'how the project will be organized, supervised, and controlled, including roles, communication methods, and risk management,' which perfectly matches the described content."}, {"text": "Statement of Work", "isCorrect": false, "rationale": "The Statement of Work details specific tasks, deliverables, and timelines, but it doesn't typically cover the overarching management processes, roles, or risk handling in the same way a Management Plan does."}], "id": "q05"}, {"question": "Why is \"precision\" emphasized as enormously important in the Statement of Work (SOW)?", "options": [{"text": "To impress the client with the writer's attention to detail.", "isCorrect": false, "rationale": "While a side benefit, impressing the client is not the primary reason for precision. The core reason relates to the SOW's contractual nature."}, {"text": "The SOW transforms the proposal from 'what we plan to do' into 'what we contractually commit to deliver,' making the organization accountable for its contents.", "isCorrect": true, "rationale": "The text explicitly states, 'The statement of work (SOW) transforms your proposal from “what we plan to do” into “what we contractually commit to deliver.” It is the section that the client will hold you accountable for, so precision matters enormously.'"}, {"text": "It allows for flexible interpretation of tasks as the project progresses.", "isCorrect": false, "rationale": "Precision aims to *reduce* ambiguity and prevent flexible or subjective interpretations, ensuring clear expectations and accountability."}, {"text": "Precision ensures that the timeline can be easily adjusted without client approval.", "isCorrect": false, "rationale": "Precision in a SOW means specific timelines are agreed upon; changes would typically require formal amendment and client approval, not easy adjustment."}], "id": "q06"}, {"question": "The \"before\" example of an executive summary opening is criticized for being \"pure filler.\" What is the primary failing of this weak opening?", "options": [{"text": "It uses overly technical jargon that might confuse the reader.", "isCorrect": false, "rationale": "The 'before' example is vague and generic, not overly technical. Its failing is a lack of specificity, not jargon."}, {"text": "It fails to specifically name the client's problem, present a concrete solution, or state expected benefits.", "isCorrect": true, "rationale": "The text directly states, 'The “before” version is pure filler—it says nothing specific about the problem, the solution, or the results.'"}, {"text": "It includes too much detail, overwhelming the reader.", "isCorrect": false, "rationale": "The 'before' example is criticized for lacking detail and being generic, not for overwhelming the reader with too much information."}, {"text": "It does not clearly state the submission date of the proposal.", "isCorrect": false, "rationale": "While the submission date is important for the cover page and summary, its absence is not the primary failing that makes the opening 'pure filler' regarding the *content* of the proposal's core message."}], "id": "q07"}, {"question": "Based on the EcoTech Solutions Executive Summary model, what analytical insight can be drawn about the Greenfield Unified School District's energy challenge?", "options": [{"text": "The district's energy consumption is solely due to outdated HVAC systems.", "isCorrect": false, "rationale": "While HVAC is mentioned, the solution addresses multiple areas like LED lighting, building envelope sealing, smart controls, and rooftop solar, indicating the problem is not solely due to HVAC."}, {"text": "The district's energy costs are projected to decrease significantly without intervention due to market trends.", "isCorrect": false, "rationale": "The summary states, 'Rising utility rates (averaging 2.8% annually over the past decade) threaten to increase this cost to $2.5 million within five years,' indicating costs will *increase* without intervention."}, {"text": "The district's current energy expenditure is substantially higher than national averages for similar districts, and rising rates will exacerbate the problem.", "isCorrect": true, "rationale": "The summary highlights that the $1.92 million annual energy expenditure 'represents 31% above the national average' and that 'Rising utility rates... threaten to increase this cost,' clearly indicating a significant and growing problem."}, {"text": "The district's primary concern is the environmental impact of its energy use, not the cost.", "isCorrect": false, "rationale": "The summary heavily emphasizes financial metrics like '$1.92 million,' '$672,000 savings,' '35% reduction,' and 'diverting resources from instructional programs,' showing cost-effectiveness is a primary driver."}], "id": "q08"}, {"question": "In the Statement of Work example for \"Task 1.1: Energy Audit and Baseline Assessment,\" what do the \"Acceptance Criteria\" specifically define?", "options": [{"text": "The methods EcoTech Solutions will use to conduct the audit.", "isCorrect": false, "rationale": "The methods are detailed under 'The audit will include' (e.g., 'On-site inspection,' 'Installation of temporary energy monitoring')."}, {"text": "The qualifications required for the staff performing the audit.", "isCorrect": false, "rationale": "Staff qualifications are covered in the 'Qualifications and Experience' section of the overall proposal, not within the SOW's acceptance criteria for a specific task."}, {"text": "How the client will officially recognize that the work for this task is complete and satisfactory.", "isCorrect": true, "rationale": "The text states that SOWs include 'Acceptance criteria (how the client will know the work is done),' and the example specifies 'Reports delivered in PDF and Excel formats, reviewed and approved by the District Facilities Director within 10 business days of submission,' clearly defining the conditions for acceptance."}, {"text": "The total budget allocated for Phase 1 of the project.", "isCorrect": false, "rationale": "The budget is a separate section of the proposal ('Timeline and Budget') and is not specified within the acceptance criteria for individual SOW tasks."}], "id": "q09"}, {"question": "The 'Activity' in the teacher's note suggests comparing the executive summary to short proposals from Chapter 10. What advanced skill does a technical proposal demand that significantly expands upon the foundational problem-solution structure learned previously?", "options": [{"text": "The ability to present extremely brief and general overviews without specific data.", "isCorrect": false, "rationale": "Technical proposals, and their executive summaries, demand *more* detail and specific data (like phased approaches, cost/return figures) compared to the more general nature of short proposals."}, {"text": "The capacity to integrate detailed phased approaches, specific qualifications, and comprehensive cost/return figures into the core narrative.", "isCorrect": true, "rationale": "The teacher's note explicitly asks students to identify what is 'different' in the technical proposal's executive summary, listing 'more detail, phased approach, specific qualifications, cost/return figures' as examples of this expanded scope."}, {"text": "The skill of focusing exclusively on qualitative benefits rather than quantitative metrics.", "isCorrect": false, "rationale": "The EcoTech example heavily relies on quantitative metrics (e.g., 31% above average, $1.92 million, 35% reduction, $672,000 savings) to make a compelling financial case, showing a focus on quantitative data."}, {"text": "The necessity to avoid including any financial information in the summary to prevent bias.", "isCorrect": false, "rationale": "The teacher's note specifically discusses 'why the executive summary includes the total project cost and projected savings so prominently,' indicating financial information is crucial, not avoided."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
