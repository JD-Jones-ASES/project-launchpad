        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 15, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic that distinguishes a white paper from a typical report or proposal, according to the text?", "options": [{"text": "It serves as a short summary of a research project, primarily for internal stakeholders.", "isCorrect": false, "rationale": "The text describes a white paper as typically 5–15 pages long and an 'in-depth report,' which contradicts it being a 'short summary.' While it may be used internally, its primary distinguishing factor is not stakeholder type."}, {"text": "It presents an authoritative, evidence-based argument or solution to a complex problem, aiming to educate and persuade.", "isCorrect": true, "rationale": "The text defines a white paper as 'an authoritative, in-depth report that presents a well-researched argument or solution to a complex problem' and notes its dual purpose: 'it educates the reader... Second, it persuades the reader.'"}, {"text": "Its main goal is to outline a project's tasks, deliverables, and timeline for contractual purposes.", "isCorrect": false, "rationale": "This description matches a 'statement of work,' often included in proposals, not the primary distinguishing characteristic of a white paper itself, which focuses on presenting an argument or solution."}, {"text": "It is a preliminary document used to gauge interest in a new product before full development.", "isCorrect": false, "rationale": "The text emphasizes that persuasion in a white paper 'should never feel forced or salesy,' distinguishing it from preliminary marketing or interest-gauging documents."}], "id": "q01"}, {"question": "According to the text, what is the inherent challenge in achieving a white paper's dual purpose of educating and persuading?", "options": [{"text": "Balancing the need for extensive primary source research with a concise page count.", "isCorrect": false, "rationale": "While white papers involve depth and have a typical page count, the text does not identify this specific balance as the *inherent challenge* of the dual purpose itself."}, {"text": "Ensuring the persuasion grows naturally from the evidence without appearing forced or overly sales-oriented.", "isCorrect": true, "rationale": "The text explicitly states: 'The persuasion must grow naturally from the evidence—it should never feel forced or salesy,' highlighting this as the critical aspect of successfully blending education and persuasion."}, {"text": "Covering a complex topic in depth while maintaining clarity for a broad audience.", "isCorrect": false, "rationale": "This is a general challenge in technical communication but not specifically identified as the *inherent challenge* tied to the *dual purpose* of educating and persuading in the text."}, {"text": "Integrating historical background effectively without making the section too lengthy or academic.", "isCorrect": false, "rationale": "This is a specific writing tip for the background section, not a broader challenge of the white paper's dual purpose."}], "id": "q02"}, {"question": "A software company publishes a document detailing the capabilities of its new AI platform, supported by independent benchmark tests and expert testimonials, concluding with a recommendation for industry adoption. Which type of document does this most closely resemble, according to the text?", "options": [{"text": "A technical report, because it presents findings and data.", "isCorrect": false, "rationale": "While it presents findings like a report ('Here is what we found'), the inclusion of expert testimonials, a persuasive case, and a recommendation for 'industry adoption' goes beyond merely reporting, making it more than just a report."}, {"text": "A white paper, as it uses evidence and analysis to build a persuasive case for a course of action.", "isCorrect": true, "rationale": "The description aligns with a white paper's purpose: 'Here is what the evidence shows, here is what it means, and here is what should be done about it.' It combines 'authoritative + persuasive' elements using evidence to support a solution or argument."}, {"text": "A business proposal, since it aims to convince an audience to adopt a new technology.", "isCorrect": false, "rationale": "A proposal typically says 'Here is what we want to do' and is action-oriented from the proposer's perspective. This document focuses on 'what should be done' based on evidence, which is the white paper's role."}, {"text": "A marketing brochure, due to its goal of promoting a new product.", "isCorrect": false, "rationale": "White papers are authoritative and in-depth, often 5–15 pages, and aim for natural persuasion rather than the more direct promotional style of a marketing brochure, which the text advises against ('never feel forced or salesy')."}], "id": "q03"}, {"question": "Why does the 'Writing Tip' recommend drafting the abstract after the conclusion is complete, even though it appears at the beginning of a white paper?", "options": [{"text": "To allow for last-minute changes to the white paper's main argument based on feedback.", "isCorrect": false, "rationale": "The writing tip does not mention external feedback as the reason; it focuses on the author's ability to accurately summarize."}, {"text": "It ensures the summary accurately reflects the final content, findings, and recommendations of the completed document.", "isCorrect": true, "rationale": "The text explicitly states: 'You cannot accurately summarize a document you have not finished writing. Draft your abstract after the conclusion is complete, then place it before the introduction. This ensures your summary actually matches your content.'"}, {"text": "The abstract is typically written by an editor or another team member, not the primary author.", "isCorrect": false, "rationale": "The text does not mention abstracts being written by anyone other than the author; it provides advice directly to the writer."}, {"text": "Readers are more likely to read the introduction first, making the abstract less critical in the initial drafting phase.", "isCorrect": false, "rationale": "The text implies the abstract is critical because it gives 'key points... before they read the full text,' meaning many readers may read it first or only it."}], "id": "q04"}, {"question": "A white paper's problem statement begins: 'Many employees are unhappy with our current benefits package, leading to low morale and some turnover. We need to find a better solution quickly.' Based on the 'Vague vs. Specific Problem Statement' example, what is the most significant weakness of this opening?", "options": [{"text": "It fails to provide a proposed solution to the problem.", "isCorrect": false, "rationale": "The 'Common Mistake' box warns against starting with the solution; a problem statement's role is to define the problem, not solve it immediately."}, {"text": "It uses vague language and lacks specific evidence or data to define the scope and impact of the problem.", "isCorrect": true, "rationale": "The 'before' example in the text uses 'vague language ('a lot,' 'big issue,' 'something should be done') and provides no evidence,' similar to the provided statement's 'many employees,' 'low morale,' and 'some turnover.'"}, {"text": "It introduces new information that should be reserved for the background section.", "isCorrect": false, "rationale": "The statement doesn't introduce 'new information' as much as it makes unsubstantiated claims without specific context or data."}, {"text": "It does not clearly state who is affected by the issue.", "isCorrect": false, "rationale": "It clearly states 'Many employees' are affected, but the *extent* and *nature* of their dissatisfaction are vague, not the identity of the affected group."}], "id": "q05"}, {"question": "A new white paper writer is eager to showcase their innovative solution and includes a detailed description of it in the opening paragraph of the 'Introduction / Problem Statement' section. Why is this approach considered a 'Common Mistake' according to the text?", "options": [{"text": "It undermines the credibility of the solution by presenting it too early.", "isCorrect": false, "rationale": "The text does not state that it undermines credibility directly. Instead, it focuses on the reader's engagement with the *problem*."}, {"text": "It prevents the reader from understanding the necessity or relevance of the solution if the problem has not been adequately established.", "isCorrect": true, "rationale": "The 'Common Mistake' box explicitly states: 'If your reader does not understand why the problem matters, they will not care about your solution—no matter how brilliant it is.'"}, {"text": "Solutions should always be presented in the 'Evidence and Analysis' section, not the introduction.", "isCorrect": false, "rationale": "The 'Solution / Argument' section is where the proposed solution is presented, not solely 'Evidence and Analysis,' and the mistake is presenting it too early in the *paper's opening*."}, {"text": "Detailed solutions typically require diagrams and charts, which are not suitable for an opening paragraph.", "isCorrect": false, "rationale": "The advice is not about the format of the solution but the timing of its introduction relative to the problem statement."}], "id": "q06"}, {"question": "A writer crafting the 'Background' section for a white paper on implementing a new employee training system includes a comprehensive history of corporate training methodologies from the 1950s to the present. Based on the 'Writing Tip: The Background Section Is Not a Textbook,' what is the primary issue with this approach?", "options": [{"text": "It risks overwhelming the reader with too much irrelevant historical detail that does not directly support the paper's specific argument.", "isCorrect": true, "rationale": "The 'Writing Tip' advises: 'Your background section should cover only the information your reader needs to understand your argument... Be selective. Every paragraph should earn its place by directly supporting your argument.'"}, {"text": "Historical overviews are generally reserved for academic papers, not professional white papers.", "isCorrect": false, "rationale": "The issue is not that historical overviews are *never* appropriate, but that they must be *relevant and selective* to the argument, regardless of document type."}, {"text": "The background section should focus exclusively on existing research, not historical methodologies.", "isCorrect": false, "rationale": "The text states the background 'reviews what others have said, tried, or discovered,' which can include relevant historical context, but emphasizes selectivity."}, {"text": "It suggests the writer has not done enough current research on modern training techniques.", "isCorrect": false, "rationale": "This is an assumption about the writer's research; the problem lies in the *selection and relevance* of the presented information, not necessarily the lack of other research."}], "id": "q07"}, {"question": "In the 'Model White Paper Excerpt,' the authors strategically use several techniques to build credibility. Which of the following is NOT explicitly mentioned or demonstrated as a primary technique for building credibility in the provided text?", "options": [{"text": "Citing specific government agencies and research laboratories.", "isCorrect": false, "rationale": "The 'Teacher Note' explicitly mentions '(2) named sources (Department of Energy, NREL)' as a technique to build credibility."}, {"text": "Including rhetorical questions to engage the reader and reframe the problem.", "isCorrect": false, "rationale": "The 'Teacher Note' explicitly mentions '(4) the rhetorical question at the end of the introduction that reframes the issue' as a technique to build credibility."}, {"text": "Providing detailed biographies of the authors to establish their expertise.", "isCorrect": true, "rationale": "The text and the 'Teacher Note' discuss specific dollar figures, named sources, concrete examples, and rhetorical questions as credibility builders, but they do NOT mention author biographies."}, {"text": "Using precise financial figures and statistical data instead of general statements.", "isCorrect": false, "rationale": "The 'Teacher Note' explicitly mentions '(1) specific dollar figures rather than vague claims' as a technique to build credibility."}], "id": "q08"}, {"question": "A company is evaluating a new manufacturing process that promises significant cost savings but requires highly specialized machinery not yet widely available. Assessing whether this process can realistically be put into practice with current capabilities and market resources would primarily involve examining its:", "options": [{"text": "Primary source research.", "isCorrect": false, "rationale": "Primary source research is a *method* of gathering original data, not the *assessment* of whether a solution is practical to implement."}, {"text": "Credibility.", "isCorrect": false, "rationale": "Credibility refers to trustworthiness and belief. While the assessment might *contribute* to credibility, the core evaluation of practicality is not 'credibility' itself."}, {"text": "Technical feasibility.", "isCorrect": true, "rationale": "The vocabulary box defines 'technical feasibility' as 'the practical possibility of building, implementing, or carrying out a proposed solution with available technology, resources, and expertise,' which perfectly matches the scenario."}, {"text": "Secondary source analysis.", "isCorrect": false, "rationale": "Secondary source analysis is a method of interpreting existing information, not the assessment of a solution's practical implementability."}], "id": "q09"}, {"question": "Why are white papers particularly valuable for 'Decision-makers in business and government' when facing complex issues and high stakes?", "options": [{"text": "They provide a concise, one-page summary that allows for quick decision-making.", "isCorrect": false, "rationale": "White papers are 'typically 5–15 pages long,' indicating they are not one-page summaries, although they contain an abstract. The value comes from their depth, not just brevity."}, {"text": "They offer an authoritative, in-depth, and evidence-based analysis that validates a proposed course of action.", "isCorrect": true, "rationale": "The text states: 'Decision-makers in business and government rely on white papers when the stakes are high and the issues are complex' because they are 'authoritative, in-depth' and 'use evidence and analysis to build a persuasive case,' demonstrating 'depth' and 'prov[ing] it.'"}, {"text": "They primarily serve as marketing tools to promote new technologies or policies to the public.", "isCorrect": false, "rationale": "The text emphasizes that white paper persuasion 'should never feel forced or salesy,' indicating they are not primarily marketing tools aimed at the general public, but rather authoritative documents for decision-makers."}, {"text": "They are informal documents designed to spark initial discussions rather than provide definitive solutions.", "isCorrect": false, "rationale": "White papers are described as 'authoritative' and 'in-depth reports' that present a 'solution to a complex problem,' which contradicts the idea of them being informal or merely discussion-starters."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
