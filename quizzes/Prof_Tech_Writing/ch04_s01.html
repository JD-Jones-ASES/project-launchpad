        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following scenarios is MOST appropriate for using a memo instead of an email, according to the textbook?", "options": [{"text": "A quick question to a colleague about lunch plans for the day.", "isCorrect": false, "rationale": "Quick, routine, and one-on-one messages are explicitly stated as appropriate for email, not memos."}, {"text": "A project manager notifying the entire department about a new company-wide policy change that needs to be filed for future reference.", "isCorrect": true, "rationale": "This scenario fits multiple criteria for using a memo: it's directed to a group, important enough to be filed, and announces a policy. Memos provide the necessary structure and formality for such messages."}, {"text": "A routine update to a single team member about a minor task completion.", "isCorrect": false, "rationale": "Routine updates and one-on-one messages are best handled by email, which is more informal and faster for daily use."}, {"text": "A personal message to a manager requesting a day off next month.", "isCorrect": false, "rationale": "A personal request to an individual is typically an email or a formal request form, not a memo, which is reserved for broader, more formal internal communication."}]}, {"question": "What is a primary characteristic that distinguishes a memo from an email, according to the text?", "options": [{"text": "Memos are always shorter than emails.", "isCorrect": false, "rationale": "The text does not state that memos are always shorter; in fact, their structured nature can lead to them being longer to provide details. The key difference is structure and purpose, not length."}, {"text": "Emails are exclusively for external communication, while memos are for internal.", "isCorrect": false, "rationale": "While memos are for internal communication, emails are used extensively for both internal and external communication. This option misrepresents the scope of email use."}, {"text": "Memos are structured internal documents signaling important, organized content meant to be kept on file.", "isCorrect": true, "rationale": "The text explicitly states that a memo is a 'structured internal document' that 'signals that its content matters enough to be organized, formatted, and kept on file,' unlike an email which can be 'dashed off in seconds.'"}, {"text": "Emails typically include a header block with 'To,' 'From,' 'Date,' and 'Subject' fields, whereas memos do not.", "isCorrect": false, "rationale": "This statement is incorrect. Memos explicitly require a header block with these fields, while emails also have similar fields (To, From, Date, Subject)."}]}, {"question": "According to the 'The Header Block' section, why is it important to include the sender's title in the FROM field of a memo?", "options": [{"text": "It helps the reader determine the sender's seniority within the organization.", "isCorrect": false, "rationale": "While a title might indicate seniority, the text specifically states its purpose is to 'tell the reader why you have the authority to send this message,' which is about the message's legitimacy and impact, not just seniority."}, {"text": "It fulfills a legal requirement for all internal communications.", "isCorrect": false, "rationale": "The text does not mention any legal requirements for including a title in the FROM field."}, {"text": "It helps the reader understand the sender's authority to communicate the message.", "isCorrect": true, "rationale": "The text explicitly states: 'In a memo, your title tells the reader why you have the authority to send this message,' indicating its role in establishing credibility and the message's weight."}, {"text": "It ensures the memo can be easily tracked and filed by the recipient.", "isCorrect": false, "rationale": "The RE line is primarily for tracking and filing. The FROM field's title is about authority."}]}, {"question": "When writing the DATE field in a memo, what format is recommended and why?", "options": [{"text": "A numerical format like '1/8/26' because it is concise and universally understood.", "isCorrect": false, "rationale": "The text explicitly advises against '1/8/26' because it is ambiguous and can be interpreted differently depending on the reader's country (e.g., Jan 8 vs. Aug 1)."}, {"text": "A complete, unambiguous format like 'January 8, 2026' to avoid misinterpretation.", "isCorrect": true, "rationale": "The text specifically states, 'Always write out the month ('January 8, 2026,' not '1/8/26,' which could mean January 8 or August 1 depending on the reader's country),' emphasizing clarity and avoiding ambiguity."}, {"text": "Any format is acceptable as long as the year is included.", "isCorrect": false, "rationale": "The text provides a specific recommendation for an unambiguous date format, implying that 'any format' is not acceptable if it leads to confusion."}, {"text": "The date can be omitted if the memo is time-sensitive.", "isCorrect": false, "rationale": "The DATE field is a mandatory component of the memo header block and should never be omitted, especially for important, filed documents."}]}, {"question": "A safety officer is reporting a workplace incident that requires new safety protocols. Which part of the memo's body would outline the new steps employees must take?", "options": [{"text": "The purpose statement, to immediately inform employees of the required changes.", "isCorrect": false, "rationale": "The purpose statement announces *why* the memo is being written (e.g., to announce new protocols), but the specific steps would go into the 'Details' section."}, {"text": "The details (middle paragraphs), as this section provides information on what is changing and how it affects them.", "isCorrect": true, "rationale": "The 'Details' section is where the information the reader needs, including 'what is changing, why, how it affects them, and what they need to do,' is provided. New safety steps fall under 'what they need to do.'"}, {"text": "The action or closing paragraph, to summarize all the required actions.", "isCorrect": false, "rationale": "The action or closing paragraph states *any required actions, deadlines, or next steps* for the reader to take *after* understanding the details, or provides contact information. The comprehensive outline of new steps belongs in the 'Details.'"}, {"text": "The 'RE' line, as it summarizes the subject of the memo.", "isCorrect": false, "rationale": "The 'RE' line is part of the header block and serves as the subject line. It does not contain the detailed instructions for actions."}]}, {"question": "Why does the textbook emphasize that the RE line should be specific, such as 'RE: New Parking Lot Hours Effective January 6' instead of 'RE: Parking'?", "options": [{"text": "Specific RE lines are a requirement for all professional internal communications.", "isCorrect": false, "rationale": "While it's a best practice, the text doesn't state it's a strict 'requirement' for all communications, but rather a functional recommendation for memos."}, {"text": "It helps the sender to easily recall the memo's content without rereading it.", "isCorrect": false, "rationale": "The benefit of specificity in the RE line is primarily for the *recipient* or future readers when filing and searching for the memo, not the sender's recall."}, {"text": "It allows recipients to quickly understand the exact topic and easily locate the memo later if filed.", "isCorrect": true, "rationale": "The text states, 'Be specific... If someone files your memo, the RE line is how they will find it again six months later.' This highlights the importance of specificity for quick understanding and retrievability."}, {"text": "Broad RE lines are considered unprofessional in formal settings.", "isCorrect": false, "rationale": "The text focuses on functionality and clarity for filing/retrieval rather than categorizing broad RE lines as inherently 'unprofessional,' though less effective."}]}, {"question": "Which common mistake does the textbook specifically warn against when writing the body of a memo?", "options": [{"text": "Using bullet points instead of numbered lists for details.", "isCorrect": false, "rationale": "The text actually shows examples of both bullet points and numbered lists being used effectively in memo bodies, so this is not cited as a common mistake."}, {"text": "Burying the purpose statement in the second or third paragraph.", "isCorrect": true, "rationale": "The 'Common Mistake: Burying the Purpose' section directly addresses this, stating 'Many writers bury their purpose in the second or third paragraph, opening instead with background information or pleasantries.'"}, {"text": "Including too many details in the middle paragraphs.", "isCorrect": false, "rationale": "The text emphasizes providing *sufficient* details; it does not warn against including 'too many' details, but rather against burying the main point."}, {"text": "Forgetting to include contact information in the closing.", "isCorrect": false, "rationale": "While a good practice, the text highlights 'Burying the Purpose' as the specific common mistake in the body structure, not this particular omission."}]}, {"question": "The model memo uses bold headings within its body, such as 'What Is Changing' and 'Why We Are Making This Change.' What is the primary purpose of this technique?", "options": [{"text": "To add visual flair and make the memo look more appealing.", "isCorrect": false, "rationale": "While it may improve appearance, the 'teachernote' focuses on the functional benefit, not aesthetic flair. The primary goal is readability and information access."}, {"text": "To separate the memo's purpose statement from its details.", "isCorrect": false, "rationale": "The purpose statement is typically a standalone first paragraph. Headings are used within the 'Details' section to organize different aspects of the information."}, {"text": "To help readers scan for specific information and navigate longer memos more easily.", "isCorrect": true, "rationale": "The 'teachernote' explicitly states this is 'a technique for longer memos that helps readers scan for the information they need,' indicating its purpose for readability and navigation."}, {"text": "To mark paragraphs that require a specific action from the reader.", "isCorrect": false, "rationale": "Headings organize content; they don't necessarily indicate required action. Actions are typically outlined in the 'Action or closing' paragraph or detailed within the relevant section."}]}, {"question": "Consider the 'Before' and 'After' examples of opening a memo. The 'After' version is preferred because it demonstrates:", "options": [{"text": "An informal tone that makes the message more approachable.", "isCorrect": false, "rationale": "The 'After' version is direct and professional, not informal. Memos maintain a formal tone for important communications."}, {"text": "The use of background information to prepare the reader for the main topic.", "isCorrect": false, "rationale": "The 'Before' version contains excessive background information. The 'After' version prioritizes the main point, addressing the 'Why am I reading this?' question immediately."}, {"text": "A clear and immediate statement of purpose, making the memo's intent obvious from the first sentence.", "isCorrect": true, "rationale": "The text highlights that the 'After' version 'takes 30 words to tell you exactly what is happening, when, and what the memo will cover,' directly embodying the advice to 'Get to the point immediately' in the purpose statement."}, {"text": "Extensive deliberation and consultation with multiple departments, showing thoroughness.", "isCorrect": false, "rationale": "While thoroughness is good, the 'Before' version uses vague language to convey this, burying the actual news. The 'After' version focuses on clearly stating the outcome, not the process of deliberation."}]}, {"question": "A project lead needs to summarize a critical decision for the record and ensure all involved parties are aware of their next steps. Which two purposes of a memo are best served by this communication?", "options": [{"text": "Announcing policies or changes and requesting action.", "isCorrect": false, "rationale": "While requesting action is relevant, summarizing a decision for the record is a more precise fit than 'announcing policies or changes,' which implies broader, more general organizational rules."}, {"text": "Summarizing decisions and creating a record.", "isCorrect": true, "rationale": "The scenario explicitly states 'summarize a critical decision for the record.' The memo's purposes include 'Summarizing decisions' and 'Creating a record,' making this the most accurate combination."}, {"text": "Requesting action and reporting workplace incidents.", "isCorrect": false, "rationale": "Reporting a workplace incident is a specific type of 'creating a record' but not the primary purpose here. 'Requesting action' is relevant, but 'summarizing decisions' is a more direct fit for the first part of the scenario."}, {"text": "Creating a record and daily routine updates.", "isCorrect": false, "rationale": "Daily routine updates are typically handled by email due to their informality and speed. Memos are for more significant, structured communications that need to be filed."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
