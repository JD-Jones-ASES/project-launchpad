    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What is the overarching message about the role of writing in a professional career, as established in the provided text?", "options": [{"text": "Writing is primarily a skill for academic success, with limited application beyond school.", "isCorrect": false, "rationale": "The text explicitly states, 'Writing is a core professional skill regardless of your field,' indicating its relevance extends far beyond academic settings."}, {"text": "Writing is a core professional skill, essential in every field, and a significant factor in career advancement.", "isCorrect": true, "rationale": "The text emphasizes, 'Every Career Requires Writing' and introduces 'Writing Is a Career Multiplier,' stating that strong writing leads to important projects, promotions, and recognition."}, {"text": "Writing is a supplementary skill that aids in minor communication tasks but is not central to career progression.", "isCorrect": false, "rationale": "The text contradicts this by labeling writing as a 'core professional skill' and a 'career multiplier,' indicating its central role in advancement, not just minor tasks."}, {"text": "Writing is important only in specific technical fields like engineering and science.", "isCorrect": false, "rationale": "While acknowledging its importance in technical fields, the text explicitly states 'regardless of your field' and provides examples across diverse professions like nursing, marketing, and nonprofit work."}], "id": "q01"}, {"question": "A nonprofit director is seeking funding for a new community initiative. Which type of document would be most crucial for securing this funding, based on the categories discussed in the text?", "options": [{"text": "Communication documents (e.g., emails, meeting notes)", "isCorrect": false, "rationale": "While essential for daily operations, communication documents are not typically the primary means for securing significant funding for a new initiative; they are too informal and lack the persuasive depth required."}, {"text": "Technical documents (e.g., specifications, process descriptions)", "isCorrect": false, "rationale": "Technical documents focus on 'how it works' or 'what it is,' which might be part of a larger funding request, but they are not the main vehicle for persuading donors to provide funds."}, {"text": "Persuasive documents (e.g., proposals, pitches, white papers)", "isCorrect": true, "rationale": "The text identifies 'proposals, pitches, and white papers' as persuasive documents that 'argue for a course of action,' which directly aligns with the goal of securing funding for an initiative (grant proposals are specifically mentioned in the example for a nonprofit director)."}, {"text": "Self-presentation documents (e.g., resumes, professional profiles)", "isCorrect": false, "rationale": "These documents are used to 'open doors to opportunities' for an individual, not to solicit funding for an organizational initiative."}], "id": "q02"}, {"question": "The text introduces the 'keyconceptWriting Is a Career Multiplier.' Which of the following scenarios best illustrates this principle?", "options": [{"text": "An architect uses standard templates to ensure all project proposals meet company formatting guidelines.", "isCorrect": false, "rationale": "While using templates is a good practice for efficiency and consistency, it primarily ensures compliance and professionalism, not necessarily active 'multiplier' effects like promotion or increased trust in important projects."}, {"text": "A nurse learns to write patient care instructions more concisely, improving comprehension among care staff.", "isCorrect": false, "rationale": "Improved clarity is valuable for job performance, but the 'multiplier' concept goes beyond efficiency and direct job execution to include advancement, leadership roles, and recognition as an expert."}, {"text": "A marketing manager consistently drafts clear, data-driven analytical reports, leading to their selection for a strategic leadership position.", "isCorrect": true, "rationale": "This scenario directly aligns with the 'Career Multiplier' concept, where strong writing skills make other skills 'more visible and more effective,' leading to being 'trusted with important projects, promoted to leadership roles, and recognized as experts.'"}, {"text": "A scientist frequently contributes to professional journals, enhancing their personal academic reputation.", "isCorrect": false, "rationale": "While contributing to journals involves writing, the 'Career Multiplier' as described in the text focuses on advancement *within* an organization or profession through daily clear communication, rather than external academic publication."}], "id": "q03"}, {"question": "According to the 'Continued Improvement' section, which of these is NOT a recommended strategy for enhancing professional writing skills?", "options": [{"text": "Actively reading and analyzing professional writing to identify effective structures and styles.", "isCorrect": false, "rationale": "The text explicitly states: 'Read professional writing. Pay attention to how well-written emails, reports, and articles are structured. Notice what makes them effective.'"}, {"text": "Relying solely on grammar-checking software to catch all errors and improve prose.", "isCorrect": true, "rationale": "The text emphasizes 'Revise deliberately' and 'focused editing,' implying a proactive, human-driven process of revision beyond automated tools, which are not mentioned as a sole solution."}, {"text": "Seeking specific feedback from supervisors, professors, and colleagues on your writing.", "isCorrect": false, "rationale": "The text advises: 'Seek feedback. Ask supervisors, professors, and colleagues to comment on your writing. Specific feedback helps you improve.'"}, {"text": "Building a 'swipe file' of well-written examples to use as models.", "isCorrect": false, "rationale": "The text recommends: 'Keep a swipe file. When you encounter a particularly well-written email, report introduction, or executive summary, save it.'"}], "id": "q04"}, {"question": "You are preparing a technical specification document for a new product. To prevent misunderstandings and ensure the manufacturing team can build the product correctly, which core principle should you prioritize?", "options": [{"text": "Audience awareness", "isCorrect": false, "rationale": "While audience awareness is always important, for a technical specification, prioritizing it alone might not ensure the necessary exactness in details. The specific language is more critical here."}, {"text": "Appropriate tone", "isCorrect": false, "rationale": "An appropriate tone is vital for professionalism, but it doesn't directly address the need for exactness to prevent manufacturing errors. Precision is more directly related to accuracy."}, {"text": "Precision", "isCorrect": true, "rationale": "The text defines 'Precision' as using 'specific, measurable language instead of vague generalities.' This is critical in a technical specification to ensure the manufacturing team receives exact, unambiguous instructions."}, {"text": "Evidence over assertion", "isCorrect": false, "rationale": "Evidence over assertion is crucial for reports and proposals, but for a technical specification, the focus is on stating exact details and requirements, not necessarily arguing for a claim with supporting data."}], "id": "q05"}, {"question": "A colleague provides feedback on your draft report, saying, 'Your introduction was very clear, but I found the conclusion a bit confusing regarding the next steps.' According to the text, why is this an example of effective feedback?", "options": [{"text": "It focuses only on positive aspects to encourage the writer.", "isCorrect": false, "rationale": "While it includes a positive, the text emphasizes 'Specific feedback' that 'helps you improve,' which includes identifying areas for improvement, not just praise."}, {"text": "It comes from a peer, which is generally more trusted than feedback from a supervisor.", "isCorrect": false, "rationale": "The text states to 'Ask supervisors, professors, and colleagues,' implying all sources of feedback are valuable, with no hierarchy of trust specified."}, {"text": "It is specific and actionable, identifying both strengths and precise areas for improvement.", "isCorrect": true, "rationale": "The text states, 'Specific feedback ('This report's executive summary was very clear' or 'I wasn't sure what action you needed from me in this email') helps you improve.' This example clearly identifies specific parts (introduction, conclusion) and specific issues (clarity, next steps), making it actionable."}, {"text": "It compares the report to other similar documents, providing a benchmark.", "isCorrect": false, "rationale": "The text does not mention comparing documents as a characteristic of effective feedback; it focuses on the specificity of the comment itself."}], "id": "q06"}, {"question": "Which of the following would be considered the most effective writing goal, according to the criteria of being specific, measurable, and realistic?", "options": [{"text": "I will improve my overall writing by reading more books.", "isCorrect": false, "rationale": "This goal is not specific ('overall writing') or measurable ('reading more books' doesn't quantify improvement). While reading helps, it's not an effective goal according to the criteria."}, {"text": "I will eliminate all grammatical errors from my documents starting tomorrow.", "isCorrect": false, "rationale": "This goal is unrealistic ('eliminate all grammatical errors') and possibly not measurable in a practical sense, making it hard to achieve or track."}, {"text": "I will ensure every email I send includes a clear call to action and proofread it for typos before sending.", "isCorrect": true, "rationale": "This goal is 'Specific' ('every email,' 'clear call to action,' 'proofread for typos'), 'Measurable' (can be checked for each email), and 'Realistic' (an achievable practice for improved quality)."}, {"text": "I will become a published author within the next year.", "isCorrect": false, "rationale": "While aspirational, this goal is likely unrealistic for many in the short term, and its measurability focuses on an outcome rather than a process of improvement, which is what the text emphasizes for 'writing goals.'"}], "id": "q07"}, {"question": "A student is struggling to organize their research papers, leading to arguments that are difficult for the reader to follow. Which transferable skill should this student primarily focus on to address this issue?", "options": [{"text": "Clarity and conciseness", "isCorrect": false, "rationale": "While clarity and conciseness improve individual sentences and paragraphs, they don't directly address the overarching organization of an entire document or the logical flow of arguments."}, {"text": "Logical structure", "isCorrect": true, "rationale": "The text defines 'Logical structure' as organizing 'information so the reader can follow it without effort,' directly addressing the problem of arguments being 'difficult for the reader to follow' in research papers."}, {"text": "Appropriate tone", "isCorrect": false, "rationale": "Appropriate tone relates to matching language to audience and purpose, not the structural organization or the coherence of arguments within a paper."}, {"text": "Precision", "isCorrect": false, "rationale": "Precision focuses on specific language choice within sentences, not the higher-level organization of an entire paper or its arguments."}], "id": "q08"}, {"question": "You receive an email from a supervisor that brilliantly summarizes a complex project update in just three concise paragraphs, effectively communicating all key details. Following the advice in the 'Continued Improvement' section, what is the most beneficial action to take?", "options": [{"text": "Immediately forward the email to your team as an example of good communication.", "isCorrect": false, "rationale": "While sharing with the team can be useful, the text's advice for *personal* improvement is more specific. Just forwarding doesn't necessarily help *you* improve directly in the long term."}, {"text": "Try to replicate its exact phrasing and structure in your very next email.", "isCorrect": false, "rationale": "Attempting immediate replication without deeper analysis or saving it for future reference might not be as effective as building a resource for ongoing learning. It could also lead to inappropriate imitation if the context differs."}, {"text": "Add it to your 'swipe file' as a model for how to effectively summarize complex information in future professional communications.", "isCorrect": true, "rationale": "The text explicitly states, 'Keep a swipe file. When you encounter a particularly well-written email, report introduction, or executive summary, save it. These examples become models for your own writing.'"}, {"text": "Delete it after reading, assuming you'll remember its effectiveness when needed.", "isCorrect": false, "rationale": "Relying on memory is less reliable than maintaining a dedicated resource like a swipe file for continued learning and reference."}], "id": "q09"}, {"question": "The 'Writing Tip: Your Writing Identity' encourages students to recognize that they are 'someone who can write — clearly, concisely, and professionally.' What is the primary implication of 'owning' this writing identity?", "options": [{"text": "Achieving mastery in one specific type of professional document, such as technical reports or proposals.", "isCorrect": false, "rationale": "The text emphasizes broad competency: 'You did not just learn to write memos and reports — you learned to write well.' Owning the identity applies to diverse writing situations, not just one type."}, {"text": "Developing a unique personal writing style that sets you apart from other professionals.", "isCorrect": false, "rationale": "While individuality is part of identity, the focus here is on the *qualities* of professional writing (clear, concise, professional) that apply broadly, not necessarily a 'unique' personal style that might overshadow professional standards."}, {"text": "Acknowledging your ability to communicate effectively in various contexts throughout your college and professional life.", "isCorrect": true, "rationale": "The tip states, 'That identity follows you into college, into your career, and into every situation where you need to communicate effectively. Own it.' This implies recognizing and embracing the broad applicability of your enhanced writing capabilities."}, {"text": "Being able to write a perfect first draft for any document without the need for revision.", "isCorrect": false, "rationale": "The text explicitly lists 'Revision as process' as a core principle, stating 'First drafts are starting points, not finished products.' Owning a writing identity means being a *proficient* writer, not a perfect one who bypasses processes like revision."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
