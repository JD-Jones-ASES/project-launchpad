    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 4, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines internal communication?", "options": [{"text": "Messages sent to customers, the media, or government agencies.", "isCorrect": false, "rationale": "This describes external communication, which is intended for audiences outside the organization."}, {"text": "Messages exchanged between employees, managers, or departments within the same organization.", "isCorrect": true, "rationale": "Internal communication is explicitly defined as messages intended for people within the same organization, such as employees, managers, or department members."}, {"text": "Any message that contains sensitive operational details.", "isCorrect": false, "rationale": "While internal messages often contain operational details, this is a characteristic, not the defining principle of internal communication's audience."}, {"text": "Communication that requires immediate action or compliance.", "isCorrect": false, "rationale": "This describes a directive or compliance-related communication, which can be internal or external, but not internal communication in general."}], "id": "q01"}, {"question": "Greenfield Community Hospital needs to announce a new patient check-in system. For an internal memo to staff, why would the hospital include details about 'PaperTrail 3.2 reaching end-of-life support on June 30'?", "options": [{"text": "To reassure patients that the hospital uses up-to-date technology.", "isCorrect": false, "rationale": "This detail would not be in a message intended for patients, and its purpose for internal staff is not patient reassurance but operational necessity."}, {"text": "Because internal readers already understand the organization's context and need operational justifications.", "isCorrect": true, "rationale": "Internal readers, such as staff, are assumed to have greater audience knowledge and require operational details and context, like the end-of-life support for the old system, to understand the 'why' behind the change."}, {"text": "To provide a positive framing of the change for all stakeholders.", "isCorrect": false, "rationale": "This detail is an operational justification, not a positive framing, and is typically omitted from external messages which focus on benefits."}, {"text": "To ensure compliance with external regulatory bodies.", "isCorrect": false, "rationale": "While the new system might relate to compliance, the specific detail about the old system's end-of-life is an internal operational reason, not primarily for external regulatory compliance in this context."}], "id": "q02"}, {"question": "A company is experiencing a temporary service outage. Which of the following best illustrates the difference in tone and framing between an internal message to employees and an external announcement to customers?", "options": [{"text": "Internal: 'Service is down.' External: 'Our service will be back up soon.'", "isCorrect": false, "rationale": "While the external message is slightly more positive, it still lacks the characteristic 'polished and positive' framing often used externally, and the internal message could be more direct/operational."}, {"text": "Internal: 'We need to fix this outage immediately, team.' External: 'We are experiencing an issue and are working diligently to restore full service.'", "isCorrect": true, "rationale": "The internal message is direct and operational ('We need to fix this'), suitable for colleagues. The external message is polished and reassuring ('working diligently to restore full service'), focusing on resolution for customers, aligning with the text's explanation of tone and framing differences."}, {"text": "Internal: 'Our servers crashed due to an unexpected power surge.' External: 'We regret to inform you of a service interruption.'", "isCorrect": false, "rationale": "The external message is too vague and lacks a positive commitment to resolution. The internal message provides a specific cause, which is appropriate, but the option as a whole doesn't capture the best contrast in tone."}, {"text": "Internal: 'All hands on deck to resolve the issue.' External: 'We apologize for any inconvenience.'", "isCorrect": false, "rationale": "Both are somewhat appropriate, but the external message is quite generic and doesn't explicitly show a 'more polished and positive' framing in action or the distinction as clearly as option B."}], "id": "q03"}, {"question": "When adapting an internal message about a budget cut for an external audience, which type of detail would most likely be omitted or reframed?", "options": [{"text": "The overall impact on the organization's mission.", "isCorrect": false, "rationale": "The organization's mission or the overall impact (if framed positively or as a necessary strategic move) might still be relevant for external audiences like investors or community members, though details would be different."}, {"text": "Specific departmental budget numbers and internal responsible individuals.", "isCorrect": true, "rationale": "The text states that 'Internal messages often include operational details (budget numbers, responsible individuals, internal deadlines). External messages focus on what the audience needs to know, omitting internal logistics.' Specific budget numbers and internal responsible parties are precisely these types of operational details that would be omitted or reframed for external audiences."}, {"text": "The strategic reason for the budget cut (e.g., reinvestment in a new area).", "isCorrect": false, "rationale": "Strategic reasons, especially if they can be framed positively (e.g., 'reinvesting in growth areas'), are often communicated externally to explain decisions to stakeholders like investors or the public."}, {"text": "The benefits of the budget cut for long-term financial stability.", "isCorrect": false, "rationale": "Benefits, especially for long-term stability, are precisely what an external message would focus on to frame the decision positively for external stakeholders."}], "id": "q04"}, {"question": "According to the text, which group would NOT typically be considered an external stakeholder for a community hospital?", "options": [{"text": "Patients receiving care.", "isCorrect": false, "rationale": "Patients are explicitly listed as external stakeholders (customers)."}, {"text": "Government regulatory bodies.", "isCorrect": false, "rationale": "Government agencies/regulators are explicitly mentioned as external communication audiences and are stakeholders."}, {"text": "Local media outlets.", "isCorrect": false, "rationale": "The media is mentioned as an audience for external communication and is therefore an external stakeholder."}, {"text": "Front desk and registration staff.", "isCorrect": true, "rationale": "Front desk and registration staff are employees, who are described as internal stakeholders within the organization, not external."}], "id": "q05"}, {"question": "A university is implementing a new online registration system. For an internal memo to academic advisors, the communication would likely emphasize:", "options": [{"text": "How the new system offers a 'seamless and efficient experience' for students.", "isCorrect": false, "rationale": "This phrasing is focused on student benefits and is typical of external communication, not the detailed operational information advisors would need."}, {"text": "The specific technical specifications and vendor contract details of the new system.", "isCorrect": false, "rationale": "While internal, this level of detail (technical specs, vendor contracts) would likely be for IT staff, not general academic advisors who need operational instructions."}, {"text": "Training schedules for advisors, changes to current workflows, and key features relevant to their advising role.", "isCorrect": true, "rationale": "An internal memo for staff (like academic advisors) would focus on operational details, training, and how the change affects their specific tasks and workflows, much like the Greenfield Hospital memo for front desk staff."}, {"text": "A general announcement about the university's commitment to technological advancement.", "isCorrect": false, "rationale": "This is a high-level, positive framing more appropriate for a general external announcement or a high-level internal message, not a detailed operational memo for advisors."}], "id": "q06"}, {"question": "You are drafting a persuasive essay for an English class arguing for a change in school policy. According to the 'Writing Connection' section, what strategy from external communication would make your essay stronger?", "options": [{"text": "Including highly specific operational details and internal deadlines for implementing the policy.", "isCorrect": false, "rationale": "Operational details and internal deadlines are characteristic of internal communication. For a persuasive essay (external audience), these would likely be omitted or reframed."}, {"text": "Beginning with a direct statement of the problem and the many reasons why the policy needs to change.", "isCorrect": false, "rationale": "The text advises against opening with 'There are many reasons why the school should change its lunch policy,' suggesting leading with benefits instead."}, {"text": "Framing the argument by leading with the benefits for the audience (e.g., students), rather than just stating the problem.", "isCorrect": true, "rationale": "The 'Writing Connection' explicitly states, 'Leading with benefits rather than operational details—the external communication skill—makes every persuasive essay stronger' and gives the example of leading with the benefit of a later lunch period."}, {"text": "Using jargon specific to student government operations to demonstrate expertise.", "isCorrect": false, "rationale": "Using jargon is characteristic of internal communication, assuming shared audience knowledge. For an external audience (like an English teacher who may not be deeply immersed in student government specifics), jargon should be explained or avoided."}], "id": "q07"}, {"question": "A manager sends an email announcing a new mandatory company policy to all employees. For this policy to be considered properly 'disseminated,' what must occur?", "options": [{"text": "The email must be sent to all employees, regardless of whether they open it.", "isCorrect": false, "rationale": "Dissemination is 'not just sending—it is ensuring receipt.' Simply sending an email does not guarantee receipt or that the information has been spread widely."}, {"text": "All employees must read and understand the new policy.", "isCorrect": true, "rationale": "The text defines 'disseminate' as 'to distribute or spread information widely, especially to ensure that all relevant parties receive it.' An unread inbox means it has 'not been properly disseminated,' implying receipt and engagement are key to proper dissemination."}, {"text": "The policy must be posted on the company's internal portal.", "isCorrect": false, "rationale": "While posting on a portal is a method of distribution, it doesn't alone guarantee receipt or widespread understanding, which is central to the concept of dissemination."}, {"text": "The manager must receive a 'read receipt' from every employee.", "isCorrect": false, "rationale": "While a read receipt could be an indicator, it's not explicitly stated as the requirement. The core concept is 'ensuring receipt' and wide distribution, which implies more than just a technical confirmation of opening."}], "id": "q08"}, {"question": "A memo states: 'This new safety procedure is mandatory for all production staff effective immediately. Failure to comply may result in disciplinary action.' Why is this explicit language important, according to the 'Writing Tip'?", "options": [{"text": "It ensures the message maintains a consistently positive and polished tone.", "isCorrect": false, "rationale": "Explicit language about compliance and consequences is direct, not necessarily 'positive and polished,' which is more characteristic of external framing."}, {"text": "It clearly communicates whether the policy is optional or required, preventing ambiguity and unfairness.", "isCorrect": true, "rationale": "The 'Writing Tip' states: 'The reader deserves to know whether something is optional or required, and vague language ('We encourage everyone to consider...') when the policy is actually mandatory is both unclear and unfair.' Explicit language serves this purpose."}, {"text": "It encourages creative problem-solving by highlighting potential risks.", "isCorrect": false, "rationale": "While safety procedures inherently aim to prevent risks, the explicit language about compliance is not primarily for 'creative problem-solving' but for establishing mandatory adherence."}, {"text": "It focuses on providing operational details and internal logistics for implementation.", "isCorrect": false, "rationale": "While it relates to an operational procedure, the explicit language about 'mandatory' and 'failure to comply' is about compliance enforcement, not just detailing logistics."}], "id": "q09"}, {"question": "An organization is announcing a new employee dress code policy. Which statement best represents a 'policy' versus a 'procedure' in this context?", "options": [{"text": "Policy: All employees must wear business casual attire. Procedure: Specific guidelines on what constitutes 'business casual,' including examples of acceptable and unacceptable clothing.", "isCorrect": true, "rationale": "The text defines 'policy' as an official rule or guideline governing behavior, and 'procedure' as a specific series of steps to follow to comply with a policy. 'Business casual' is the rule (policy), and the detailed guidelines are the steps for compliance (procedure)."}, {"text": "Policy: The HR department will conduct monthly dress code checks. Procedure: Employees are encouraged to dress appropriately.", "isCorrect": false, "rationale": "The monthly check is a procedure related to enforcement, but 'employees are encouraged...' is vague and not a clear procedure, nor is it the core policy itself."}, {"text": "Policy: Employees can expense new work clothes. Procedure: A general statement about professional appearance expectations.", "isCorrect": false, "rationale": "Expensing clothes is a separate policy/procedure, not the dress code policy itself. A general statement is not a 'procedure' (specific steps)."}, {"text": "Policy: To ensure a professional work environment. Procedure: The dress code is subject to managerial discretion.", "isCorrect": false, "rationale": "'To ensure...' is a goal or rationale, not the policy itself. 'Managerial discretion' is a guiding principle, not a specific series of steps (procedure)."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
