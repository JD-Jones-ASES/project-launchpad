    };

        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 14, Section 1</div>
    </div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what are the three essential questions you must answer before starting to build your slides or rehearse?", "options": [{"text": "What fonts should I use, what images are best, and how many times should I rehearse?", "isCorrect": false, "rationale": "These are practical execution details that come after the initial planning phase, not the foundational questions outlined in the text."}, {"text": "What is my purpose, who is my audience, and what is the one thing I want them to remember?", "isCorrect": true, "rationale": "The text explicitly states these three questions—Purpose, Audience, and Key Message (the 'one thing')—are crucial to answer before any other steps in presentation creation."}, {"text": "What is my budget, how long should it be, and where will I present?", "isCorrect": false, "rationale": "While practical considerations, these are not the core strategic planning questions emphasized by the text as fundamental to a presentation's success."}, {"text": "What kind of visual aids will I use, what handouts are needed, and what will be my call to action?", "isCorrect": false, "rationale": "Visual aids and handouts are supporting elements, and the call to action is part of the closing structure, all of which are determined after establishing the presentation's core purpose and message."}]}, {"question": "Why does the text emphasize the importance of identifying a single 'key message' that an audience should remember?", "options": [{"text": "Because it allows the speaker to include an exhaustive list of all information related to the topic without worrying about audience retention.", "isCorrect": false, "rationale": "The text argues the opposite: trying to communicate too many ideas results in none being remembered clearly. The 'key message' forces focus, not breadth."}, {"text": "Because audiences typically retain only a small fraction of what they hear, so focusing on one main idea increases the likelihood of it being remembered.", "isCorrect": true, "rationale": "The text explicitly states that 'audiences forget almost everything' and that 'listeners retain only a fraction of what they hear,' making a single key message essential for effective recall."}, {"text": "Because it ensures the presentation will be exactly 15 key ideas long, which is the optimal number for memory.", "isCorrect": false, "rationale": "The text states that trying to communicate fifteen ideas results in none being remembered clearly, and advocates for focusing on 'one idea supported by strong evidence and examples'."}, {"text": "Because it simplifies the process of choosing fonts and images, leading to a more aesthetically pleasing slide deck.", "isCorrect": false, "rationale": "While a clear message might indirectly influence design choices, its primary purpose is related to audience retention and communication effectiveness, not just aesthetics."}]}, {"question": "A student is preparing a presentation on 'The Benefits of Renewable Energy.' Their initial plan includes discussing solar, wind, geothermal, hydroelectric, the history of fossil fuels, climate change statistics, and government policies. Applying the 'One Thing' Test from the text, what is the most critical advice for this student?", "options": [{"text": "Ensure each energy source receives equal time in the presentation.", "isCorrect": false, "rationale": "While important for structure, this advice does not address the fundamental issue of focus raised by the 'One Thing' Test."}, {"text": "Identify the single most important idea or argument about renewable energy that the audience should take away.", "isCorrect": true, "rationale": "The 'One Thing' Test requires defining the single idea you want the audience to remember. The example provided (solar panels for schools) illustrates moving from a broad topic to a specific, measurable claim, which is the core of having a key message."}, {"text": "Make sure to include compelling visuals for each type of renewable energy source.", "isCorrect": false, "rationale": "Visuals are important, but they are a tool to support the message, not a substitute for having a clear key message itself."}, {"text": "Focus on gathering as much data and research as possible for each subtopic to ensure thoroughness.", "isCorrect": false, "rationale": "The text warns against trying to cover an 'entire textbook,' emphasizing focus over exhaustive detail for audience retention."}]}, {"question": "Which of the following presentation scenarios best demonstrates a purpose that is *both* informing and persuading?", "options": [{"text": "A historian delivering a lecture on the causes of World War II to a university class.", "isCorrect": false, "rationale": "This scenario is primarily informing, as the goal is to present historical facts and analysis."}, {"text": "A company CEO presenting quarterly financial results to shareholders.", "isCorrect": false, "rationale": "This is largely informing, providing updates on performance, though it might subtly persuade confidence. However, a project update is a clearer example."}, {"text": "A project manager providing an update on project progress to stakeholders and advocating for continued resource allocation.", "isCorrect": true, "rationale": "As described in the text, a 'project update does both — it informs stakeholders of progress and persuades them that the project is on track' (and, by extension, deserves continued support)."}, {"text": "A debate team arguing for or against a specific policy in a competition.", "isCorrect": false, "rationale": "This is almost purely persuading, as the goal is to convince an audience of a specific viewpoint."}]}, {"question": "A speaker is planning a presentation on 'The Importance of Cybersecurity Practices' for two very different groups: a team of IT professionals and a group of senior citizens at a community center. According to the text, what is a key consideration for adapting the presentation to the 'Audience'?", "options": [{"text": "The length of the presentation should be identical for both groups to maintain consistency.", "isCorrect": false, "rationale": "The text focuses on what the audience 'already know, what they need to know, [and] what will make them care,' implying content adaptation is more critical than fixed length."}, {"text": "The core cybersecurity principles must remain unchanged, regardless of the audience's background.", "isCorrect": false, "rationale": "While principles might be constant, the *way* they are presented and the specific depth and relevance (what they need to know, what makes them care) must be adapted for each audience, as highlighted by the 'cybersecurity to your computer science class is very different from the same topic presented to the school board' example."}, {"text": "The speaker should consider what each audience already knows, needs to know, and what will make them care about the topic.", "isCorrect": true, "rationale": "The text explicitly states these are the questions to ask when defining the audience: 'What do they already know? What do they need to know? What will make them care?'"}, {"text": "The visual aids used should be identical for both presentations to ensure brand consistency.", "isCorrect": false, "rationale": "Visual aids should be tailored to the audience's understanding and interest, meaning they would likely differ significantly between IT professionals and senior citizens."}]}, {"question": "The 'Writing Tip' introduces the 'So What?' Filter. For what purpose should a presenter use this filter?", "options": [{"text": "To determine if a slide's design is aesthetically pleasing to the audience.", "isCorrect": false, "rationale": "The 'So What?' filter focuses on the relevance and value of content, not its aesthetic presentation."}, {"text": "To ensure that every point included in the presentation is directly relevant and valuable to the audience.", "isCorrect": true, "rationale": "The text states: 'For every point you plan to include, ask: “So what? Why does my audience care about this?” If you cannot answer that question in one sentence, the point probably does not belong in your presentation.'"}, {"text": "To decide whether to use bullet points or full sentences on a slide.", "isCorrect": false, "rationale": "This filter evaluates content relevance, not formatting style."}, {"text": "To calculate the appropriate time allocation for each section of the presentation.", "isCorrect": false, "rationale": "Time allocation is part of the structure, but the 'So What?' filter is about content inclusion based on audience relevance."}]}, {"question": "According to the 'Three-Part Presentation Structure,' what is the primary goal of the Opening section?", "options": [{"text": "To present the majority of the evidence and examples supporting the key points.", "isCorrect": false, "rationale": "This is the primary goal of the Body section, not the Opening."}, {"text": "To summarize the key points, restate the key message, and deliver a call to action.", "isCorrect": false, "rationale": "This describes the Closing section of the presentation."}, {"text": "To hook the audience's attention, state the key message, and preview the main points.", "isCorrect": true, "rationale": "The text states the Opening should 'Hook the audience, state your key message, and preview your main points' because 'The audience decides in the first 30 seconds whether to pay attention.'"}, {"text": "To engage in a question-and-answer session with the audience.", "isCorrect": false, "rationale": "The Q&A period typically follows the main presentation, after the closing."}]}, {"question": "In a well-structured presentation, what percentage of the total presentation time is typically dedicated to the Body section, where key points are presented with evidence and examples?", "options": [{"text": "10-15%", "isCorrect": false, "rationale": "10-15% is the suggested time for the Opening and Closing sections."}, {"text": "25-30%", "isCorrect": false, "rationale": "This percentage is too low for the main content delivery section."}, {"text": "75-80%", "isCorrect": true, "rationale": "The 'Three-Part Presentation Structure' allocates '75–80% of your time' to the Body section."}, {"text": "50%", "isCorrect": false, "rationale": "50% is significantly less than the recommended allocation for the Body section, which contains the bulk of the content."}]}, {"question": "Which of the following best exemplifies an effective opening strategy, according to the 'Common Mistake' section?", "options": [{"text": "Beginning with 'Um, so, my presentation is about the history of computing...'", "isCorrect": false, "rationale": "The text explicitly labels 'Starting with “Um, so, my presentation is about”' as a common mistake that wastes the crucial first impression."}, {"text": "Starting with a surprising fact or a bold statement that immediately grabs the audience's attention.", "isCorrect": true, "rationale": "The text advises to 'start with a surprising fact, a brief story, a question, or a bold statement' to make a strong first impression and state the key message directly."}, {"text": "Handing out detailed speaker notes to the audience so they can follow along from the very beginning.", "isCorrect": false, "rationale": "Speaker notes are for the presenter, and handouts summarizing key points are typically for after or during the presentation, not as an opening strategy itself."}, {"text": "Immediately diving into the first complex technical detail of the topic without any introduction.", "isCorrect": false, "rationale": "An effective opening should first hook the audience and state the key message, not jump straight into complex details without context."}]}, {"question": "In the context of presentation planning, what is the definition of a 'Call to action'?", "options": [{"text": "A verbal or visual bridge that connects one section of a presentation to the next.", "isCorrect": false, "rationale": "This describes a 'Transition (presentation)' as defined in the vocab box."}, {"text": "A clear statement telling the audience what you want them to do next.", "isCorrect": true, "rationale": "The vocab box defines 'Call to action' as 'A clear statement telling the audience what you want them to do next.' This is reinforced in the Closing section description."}, {"text": "Brief phrases or notes that remind a speaker of the main ideas to cover.", "isCorrect": false, "rationale": "This describes 'Talking points' as defined in the vocab box."}, {"text": "Techniques and strategies that capture and hold the audience's attention.", "isCorrect": false, "rationale": "This describes 'Audience engagement' as defined in the vocab box."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
