    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 11, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Chapter 1 (and reiterated in this section), what are the two fundamental questions to ask before writing any documentation?", "options": [{"text": "Who is the product manager? What is the project deadline?", "isCorrect": false, "rationale": "These questions are related to project management but are not the foundational questions for audience analysis in documentation."}, {"text": "Who will read this? What should they do after reading?", "isCorrect": true, "rationale": "The text explicitly states these are the two questions learned in Chapter 1 that still matter when writing documentation."}, {"text": "What are the system requirements? How much does it cost?", "isCorrect": false, "rationale": "These questions relate to product specifications and business, not directly to understanding the audience and purpose of documentation."}, {"text": "How many pages should it be? Which font should I use?", "isCorrect": false, "rationale": "These are stylistic and scope-related questions, not the core questions for determining audience and purpose."}]}, {"question": "What does it mean for documentation to be \"task-oriented\"?", "options": [{"text": "It is organized around the software's internal features and modules.", "isCorrect": false, "rationale": "The text explicitly states that task-oriented documentation is NOT organized around the product's features, but rather the user's goals."}, {"text": "It prioritizes the author's writing goals over the user's needs.", "isCorrect": false, "rationale": "Effective documentation, especially task-oriented, prioritizes the user's needs and what they want to accomplish."}, {"text": "It structures information based on what the user wants to accomplish.", "isCorrect": true, "rationale": "The definition box for 'Task-Oriented Documentation' clearly states it's 'organized around what the user wants to do, not around the product's features.'"}, {"text": "It uses a formal, technical tone appropriate for expert users.", "isCorrect": false, "rationale": "Tone is a separate aspect of documentation style; task-oriented refers to the organizational principle."}]}, {"question": "A software company is onboarding new employees and needs to create documentation for a proprietary system. These employees have never used the system and need to be shown where to find menus and what basic icons mean. Which audience skill level primarily drives the content strategy for this initial documentation?", "options": [{"text": "Expert", "isCorrect": false, "rationale": "Expert users know the product well and get frustrated by long introductions and basic definitions. They would not need guidance on basic menus or icons."}, {"text": "Intermediate", "isCorrect": false, "rationale": "Intermediate users use the product regularly for basic tasks and want to learn more advanced features, implying they already understand basic navigation and icons."}, {"text": "Novice", "isCorrect": true, "rationale": "The description perfectly matches the 'Novice' skill level: 'Has never used the product before. Needs step-by-step guidance, definitions of basic terms, and reassurance. Do not assume they know where to find menus or what icons mean.'"}, {"text": "Administrator", "isCorrect": false, "rationale": "Administrator is typically a role, not a skill level. While administrators can be novices, the primary descriptor here is lack of prior experience, not their job function."}]}, {"question": "The \"Writing Tip: Layering Information\" suggests putting essential information first, followed by details and advanced notes. What is the primary benefit of this approach?", "options": [{"text": "It reduces the overall length of the documentation by removing redundancy.", "isCorrect": false, "rationale": "Layering information might increase length by adding detail, but it improves usability for different audiences by structuring information effectively, not necessarily by reducing overall content."}, {"text": "It ensures that every reader consumes all available information, regardless of their skill level.", "isCorrect": false, "rationale": "The purpose of layering is the opposite: to allow experts to skip what they don't need, while novices read through everything. It does not force all readers to consume all information."}, {"text": "It allows readers of different skill levels to find relevant information efficiently without being overwhelmed or frustrated.", "isCorrect": true, "rationale": "Layering information lets novices read top-to-bottom for comprehensive learning, while experts can 'scan quickly' and 'skip ahead to the detail they need' without wading through irrelevant material."}, {"text": "It makes the document easier to translate into multiple languages.", "isCorrect": false, "rationale": "While good organization can indirectly help with translation management, layering information is primarily a strategy for audience accommodation within a single language, not for translation itself."}]}, {"question": "A company provides rugged tablets to field technicians who service machinery. These technicians often need to access troubleshooting guides while on-site, potentially in challenging environments. What characteristic of documentation is MOST critical for this context of use?", "options": [{"text": "Extensive cross-references to theoretical manuals.", "isCorrect": false, "rationale": "Technicians in the field need quick, practical answers, not extensive theoretical material or complex navigation between documents."}, {"text": "Long paragraphs and detailed explanations for deep understanding.", "isCorrect": false, "rationale": "The text explicitly states for 'On a phone, in the field' that users need 'Short steps, large text, and minimal scrolling,' not long paragraphs."}, {"text": "Short steps, large text, and minimal scrolling.", "isCorrect": true, "rationale": "This aligns directly with the 'Context of Use' description for 'On a phone, in the field,' emphasizing usability for quick access in challenging physical conditions."}, {"text": "A comprehensive table of contents for browsing at leisure.", "isCorrect": false, "rationale": "While a table of contents is useful, 'in the field' implies urgency and a need for direct answers, making the format of the content itself more critical than just browsing tools."}]}, {"question": "According to the \"vocabbox,\" how does a \"user guide\" primarily differ from a \"quick-reference card\"?", "options": [{"text": "A user guide is a searchable collection of articles, whereas a quick-reference card is for troubleshooting.", "isCorrect": false, "rationale": "A searchable collection of articles describes a 'knowledge base,' not a user guide. Quick-reference cards are not solely for troubleshooting."}, {"text": "A user guide is for basic setup only, while a quick-reference card covers advanced features.", "isCorrect": false, "rationale": "A user guide is 'comprehensive,' covering use 'from start to finish,' not just basic setup. A quick-reference card is briefer."}, {"text": "A user guide is a comprehensive document explaining product use from start to finish, while a quick-reference card is shorter and less complete.", "isCorrect": true, "rationale": "The vocabbox defines a 'user guide' as 'a comprehensive document that explains how to use a product from start to finish' and explicitly states it's 'Longer and more complete than a quick-reference card.'"}, {"text": "A user guide is for developers, and a quick-reference card is for end-users.", "isCorrect": false, "rationale": "User guides are primarily for end-users. Technical manuals are more for developers or technicians."}]}, {"question": "An experienced system administrator needs to quickly look up a specific parameter setting for a less common configuration in a large, single-document user guide. Which strategy from \"Writing for Multiple Audiences in One Document\" would be most beneficial for them?", "options": [{"text": "Reading through the \"Getting Started\" section for a general overview.", "isCorrect": false, "rationale": "The text states 'experts skip' the 'Getting Started' section, as they already know the basics and need specific information."}, {"text": "Focusing on inline definitions and the glossary for basic terminology.", "isCorrect": false, "rationale": "An experienced user would likely already be familiar with basic terminology and would find this approach inefficient for finding specific settings."}, {"text": "Utilizing clear headings and a detailed table of contents to jump directly to the relevant section.", "isCorrect": true, "rationale": "The text advises 'Clear headings and table of contents. Let readers skip sections that are not relevant to their level.' This allows experts to 'skip ahead to the detail they need' efficiently."}, {"text": "Examining the cross-references to find related beginner-level information.", "isCorrect": false, "rationale": "While cross-references are useful, an expert looking for a specific setting would prioritize direct navigation via headings rather than following links to potentially beginner-level or broadly related content."}]}, {"question": "A marketing professional uses a new analytics platform daily for standard reports but needs to generate a specialized custom report only once a quarter. When attempting this infrequent task, they get stuck on a specific filter option. What is their primary goal for consulting the documentation at this moment?", "options": [{"text": "Learning: To understand the fundamental principles of data analytics.", "isCorrect": false, "rationale": "The user uses the platform daily, implying they already know the fundamentals. Their issue is with a specific, infrequent task."}, {"text": "Quick reference: To get reminded how to perform a specific step or option for the custom report.", "isCorrect": true, "rationale": "This scenario perfectly aligns with the 'Quick reference' goal: 'I know the basics. Just remind me how to do this one thing.' The user knows the platform but needs help with a specific, less common task."}, {"text": "Onboarding: To get started with the basic features of the platform.", "isCorrect": false, "rationale": "The user uses the platform daily, so they are past the onboarding phase."}, {"text": "Troubleshooting: To identify and solve a problem with the platform's functionality.", "isCorrect": false, "rationale": "The user is stuck on a step, not necessarily encountering a malfunction or bug in the system. They need instruction, not problem-solving for a fault."}]}, {"question": "A software designer wants to add a brief explanation for an unfamiliar icon in a new application interface, so users can understand its function without having to navigate to a separate help page. Which documentation tool is most appropriate for this purpose?", "options": [{"text": "A callout on a screenshot.", "isCorrect": false, "rationale": "Callouts are for static images (screenshots) and are not interactive elements that appear on hover/tap within a live application."}, {"text": "A troubleshooting guide.", "isCorrect": false, "rationale": "A troubleshooting guide is for solving problems, not for providing immediate definitions of UI elements."}, {"text": "A tooltip.", "isCorrect": true, "rationale": "The vocabbox defines a 'tooltip' as 'a small pop-up text that appears when a user hovers over or taps an element on screen' which 'provide brief help without leaving the current screen,' exactly fitting this use case."}, {"text": "A comprehensive user guide.", "isCorrect": false, "rationale": "While the icon's function might be explained in a user guide, the question specifies providing a 'brief explanation... without having to navigate to a separate help page,' making a tooltip a better in-context solution."}]}, {"question": "The \"before\" version of the Gradebook Pro welcome message is criticized for being vague and wordy, failing to immediately inform the user what they will find. For a user \"at a desk, in a hurry,\" which principle of effective documentation does this \"before\" example most significantly violate?", "options": [{"text": "Providing a comprehensive glossary of terms.", "isCorrect": false, "rationale": "While glossaries are useful, the primary failure of the 'before' example is not the absence of a glossary but its general lack of clarity and conciseness for quick information retrieval."}, {"text": "Offering detailed tutorials for every feature.", "isCorrect": false, "rationale": "The issue is not the *lack* of tutorials, but the *presentation* of introductory information which is unhelpful for someone seeking quick answers."}, {"text": "Facilitating quick access to specific information through clear, concise navigation and immediate relevance.", "isCorrect": true, "rationale": "For a user 'at a desk, in a hurry,' the text states 'Headings, bullet points, and a good search function matter most.' The 'before' example's 'vague, wordy prose' directly impedes quick access and immediate understanding of content, making it ineffective for this context."}, {"text": "Reassuring novice users with hand-holding and basic definitions.", "isCorrect": false, "rationale": "While the 'before' example isn't good for novices either, the question specifically asks about a user 'in a hurry,' for whom speed and directness are paramount over reassurance or basic definitions."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
