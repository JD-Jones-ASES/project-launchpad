        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what are the two essential questions every writer must answer before starting to write any document?", "options": [{"text": "What is my personal opinion on this topic, and how can I express it creatively?", "isCorrect": false, "rationale": "The text explicitly states that workplace writing is reader-centered and not for self-expression, making this option incorrect as it focuses on the writer's personal opinion and creative expression rather than the reader or objective purpose."}, {"text": "Who will read this (Your audience), and what should they do after reading it (Your purpose)?", "isCorrect": true, "rationale": "The text identifies 'Who will read this?' (Audience) and 'What should they do after reading it?' (Purpose) as the two essential questions, emphasizing that 'Every piece of effective writing starts with clear answers to both questions.'"}, {"text": "How long should this be, and what formatting styles should I use?", "isCorrect": false, "rationale": "While length and formatting are important writing decisions, they are determined by the audience and purpose, not the foundational questions themselves. These are tactical choices that come later."}, {"text": "What information do I already know, and what information do I need to research?", "isCorrect": false, "rationale": "Understanding existing knowledge and research needs is part of content gathering, but it's not the primary starting point for defining the direction and effectiveness of the writing, which is governed by audience and purpose."}]}, {"question": "You are writing an email to a new client explaining the features of your company's complex software. Which of the following considerations best demonstrates an understanding of your audience?", "options": [{"text": "Using highly technical jargon to impress the client with your expertise.", "isCorrect": false, "rationale": "Using highly technical jargon without considering the client's existing knowledge would likely confuse them, making the communication ineffective. The text emphasizes tailoring language to the audience."}, {"text": "Focusing on the benefits the software provides for their specific business needs, using clear and concise language.", "isCorrect": true, "rationale": "This option directly applies the concept of understanding your audience by tailoring the level of detail, choosing appropriate words (clear and concise), and focusing on what the reader 'needs to know' (benefits for their business), as described in the 'Audience Test'."}, {"text": "Sending a very brief email with only bullet points to save the client time.", "isCorrect": false, "rationale": "While conciseness is often good, a 'complex software' explanation likely requires more detail than just bullet points to ensure full comprehension for a new client, especially if they need to 'do' something with the information. The level of detail depends on what the audience needs."}, {"text": "Writing in a very informal tone, like you would to a friend, to appear approachable.", "isCorrect": false, "rationale": "A new client typically expects a professional, though friendly, tone, not an informal one appropriate for a friend. The text explicitly states that 'the right tone depends on your audience and purpose.'"}]}, {"question": "A camp counselor writes an incident report for camp records and an email to a parent about a child's bee sting. How does the 'tone' of these two documents differ, and why?", "options": [{"text": "The incident report uses an enthusiastic tone to convey prompt action, while the email uses a sympathetic tone to comfort the parent.", "isCorrect": false, "rationale": "An incident report for records is typically factual and objective, not 'enthusiastic.' While the email to a parent might be reassuring, 'sympathetic' isn't its primary tone; 'warm' and 'reassuring' are more accurate, as stated in the text."}, {"text": "The incident report is formal and factual for official documentation, while the email is warm and reassuring to address the parent's concerns.", "isCorrect": true, "rationale": "The text explicitly contrasts the 'factual, detailed' incident report for 'official record' with the email being 'warm, reassuring, and written in conversational-but-professional language' because the parent 'needs to know what happened and that her child is safe.' This demonstrates a clear difference in tone based on audience and purpose."}, {"text": "Both documents maintain a strictly formal tone to ensure professionalism and minimize liability.", "isCorrect": false, "rationale": "The text clearly shows that the email to the parent is 'warm' and 'reassuring,' not 'strictly formal,' to cater to the parent's emotional needs regarding their child's safety. Strict formality might even be counterproductive in that context."}, {"text": "The incident report is brief and informal for quick reference, and the email is detailed and technical for full transparency.", "isCorrect": false, "rationale": "The incident report is detailed and organized, not brief and informal. The email is warm and clear, not technical, as demonstrated by the 'Same Facts, Wrong Tone' example which highlights why technical language is inappropriate for a parent."}]}, {"question": "The text states that 'Most workplace writing has a clear, practical purpose.' Which of the following is NOT listed as a common purpose in workplace writing?", "options": [{"text": "To persuade", "isCorrect": false, "rationale": "To persuade is explicitly listed as a common purpose in workplace writing."}, {"text": "To express oneself emotionally", "isCorrect": true, "rationale": "The text states, 'You are not writing to express yourself (that is what journals and creative writing are for),' emphasizing that workplace writing is reader-centered and objective, not for emotional self-expression."}, {"text": "To instruct", "isCorrect": false, "rationale": "To instruct is explicitly listed as a common purpose in workplace writing."}, {"text": "To document", "isCorrect": false, "rationale": "To document is explicitly listed as a common purpose in workplace writing, exemplified by the incident report."}]}, {"question": "When the text says, 'Effective workplace writing is reader-centered,' what does this imply about the writer's primary focus?", "options": [{"text": "The writer should primarily focus on showcasing their vocabulary and writing style.", "isCorrect": false, "rationale": "While good writing uses appropriate vocabulary and style, the text warns against focusing on 'big vocabulary' in the college essay example and emphasizes accomplishing something through the reader, not self-expression or showing off."}, {"text": "The writer's main goal is to accomplish something through their reader, such as informing, requesting, or persuading.", "isCorrect": true, "rationale": "The text explicitly states, 'You are not writing to express yourself... You are writing to accomplish something through your reader,' listing purposes like to inform, request, persuade, instruct, document, or respond. This directly supports the idea of being reader-centered."}, {"text": "The writer should ensure the document is entertaining and engaging above all else.", "isCorrect": false, "rationale": "While engagement is helpful, the primary goal of workplace writing is typically practical and actionable (inform, request, persuade, etc.), not entertainment. The text emphasizes purpose-driven communication."}, {"text": "The writer needs to express their personal feelings and opinions clearly.", "isCorrect": false, "rationale": "The text explicitly contrasts workplace writing with journals and creative writing, stating that workplace writing is not for self-expression, but rather for achieving an objective through the reader."}]}, {"question": "The 'Incident Report' and 'Email to Parent' about Ethan's bee sting use the same core facts but differ significantly. What is the primary reason for these differences?", "options": [{"text": "The incident report is legally mandated, while the email is optional.", "isCorrect": false, "rationale": "While incident reports can be legally mandated, the text focuses on the *communication* differences. The primary reason for the content and tone variation is the distinct audience and purpose, not merely legal requirement versus optional communication."}, {"text": "The need to minimize details in the email to avoid alarming the parent.", "isCorrect": false, "rationale": "The email doesn't minimize details; it presents relevant details in a reassuring way. The difference lies in the *selection and presentation* of facts and tone, not necessarily a reduction of information, to suit the parent's need to know their child is safe."}, {"text": "The differing audiences and their specific needs and expectations.", "isCorrect": true, "rationale": "The text clearly explains that the incident report is for 'official record' (an internal audience needing factual detail and organization), while the email is for the parent (an external audience needing reassurance, clarity, and a warm tone). This directly illustrates 'How Audience Changes Everything.'"}, {"text": "The incident report includes medical information that cannot be shared with parents.", "isCorrect": false, "rationale": "Both documents share key medical facts (sting removed, ice, antihistamine, monitoring). The difference is in the *way* these facts are presented (clinical vs. reassuring language), not a withholding of information due to privacy concerns."}]}, {"question": "You are preparing to write an important proposal for a potential new client. According to the 'Audience Test' writing tip, which question is LEAST relevant to consider at this initial stage?", "options": [{"text": "What does this client already know about our services?", "isCorrect": false, "rationale": "This is a highly relevant question from the 'Audience Test,' as understanding what they already know helps determine the level of detail and background information to include."}, {"text": "What is their relationship to us (potential client)?", "isCorrect": false, "rationale": "This is a relevant question from the 'Audience Test,' as the relationship helps determine the appropriate formality and persuasive strategy."}, {"text": "How can I make this proposal sound impressive to my colleagues?", "isCorrect": true, "rationale": "The 'Audience Test' and the text in general emphasize focusing on the *reader* (the client in this case) and their needs, not on impressing internal colleagues. This goes against the principle of reader-centered writing."}, {"text": "How formal do they expect the communication to be?", "isCorrect": false, "rationale": "This is a relevant question from the 'Audience Test,' as it directly influences the register and tone of the proposal."}]}, {"question": "The text presents an example of 'Same Facts, Wrong Tone' where a clinical email about a bee sting is sent to a parent. Why is this considered an ineffective communication?", "options": [{"text": "The clinical language implies incompetence on the part of the camp staff.", "isCorrect": false, "rationale": "The clinical language doesn't imply incompetence; rather, it's technically accurate but inappropriate for the audience. The issue is communication effectiveness, not staff capability."}, {"text": "It uses overly complex terms that are typically reserved for internal medical records, alienating and potentially frightening the parent.", "isCorrect": true, "rationale": "The text explicitly states, 'The clinical language would frighten most people,' and points out terms like 'hymenoptera envenomation' and 'the subject' as 'the wrong register for a parent email.' The language is technically accurate but fails to consider the parent's emotional state and need for reassurance."}, {"text": "The email is too long and provides unnecessary detail, overwhelming the parent.", "isCorrect": false, "rationale": "The issue wasn't the length or amount of detail, but the *type* of language used. The appropriate email was similar in length but differed in tone and word choice."}, {"text": "It fails to include crucial information about the child's recovery and return to activities.", "isCorrect": false, "rationale": "The example states 'Same facts' and describes the child's return to activities, indicating the content isn't lacking crucial information, but the *delivery* is flawed."}]}, {"question": "The 'Writing Connection' section uses college application essays to illustrate audience awareness. What is the key takeaway for a student writing such an essay?", "options": [{"text": "Impress admissions officers with a vast vocabulary and complex sentence structures.", "isCorrect": false, "rationale": "The text explicitly states that admissions officers 'value authenticity over big vocabulary.' Focusing on a vast vocabulary for its own sake would be misinterpreting the audience's preference."}, {"text": "Write a generic essay that could apply to any college to save time.", "isCorrect": false, "rationale": "The text implies that the essay should be 'genuine, specific, and memorable' to stand out to a 'tired admissions officer' who has read many essays. A generic essay would fail this test."}, {"text": "Tailor the essay to appeal to a 'tired admissions officer' by being genuine, specific, and memorable about who you are.", "isCorrect": true, "rationale": "This option directly captures the essence of the 'Writing Connection,' which states admissions officers 'value authenticity...and they want to understand who you are as a person,' and that an effective essay will be 'genuine, specific, and memorable' for a 'tired admissions officer at 11 p.m.'"}, {"text": "Focus on what your English teacher would expect, as they are experts in essay evaluation.", "isCorrect": false, "rationale": "The text explicitly states, 'When you write a college essay, you are not writing for your English teacher.' This highlights the difference in audience and their specific expectations."}]}, {"question": "Before writing a new communication, a writer should run through a quick mental checklist. Which of the following questions from this checklist is most focused on ensuring the message is actionable for the reader?", "options": [{"text": "Who is my reader? What is their role?", "isCorrect": false, "rationale": "While crucial for audience analysis, this question primarily focuses on identifying the reader and their context, not directly on the actionability of the message itself."}, {"text": "What register is appropriate? How formal or informal should this be?", "isCorrect": false, "rationale": "This question focuses on tone and formality, which affects how the message is received, but not directly on whether the message provides the necessary information for the reader to take action."}, {"text": "What does my reader need? What information must I include for them to understand my message and act on it?", "isCorrect": true, "rationale": "This question directly addresses the core of an actionable message by asking what information is essential for the reader to 'understand my message and act on it,' linking directly to the purpose of workplace writing (to know, believe, feel, or *do*)."}, {"text": "What is my purpose? Am I informing, requesting, persuading, instructing, documenting, or responding?", "isCorrect": false, "rationale": "This question defines the writer's overarching goal, which is foundational, but the question about 'what the reader needs' specifically drills down into the content required for that purpose to be achieved and for the reader to act."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
