<script>
var QUESTIONS = [{"question": "What is the fundamental difference in purpose between an informational report and an analytical report?", "options": [{"text": "Informational reports are always shorter than analytical reports.", "isCorrect": false, "rationale": "The length of a report is not the fundamental distinction; an analytical report's purpose is to interpret facts, which often leads to longer documents, but length is not the defining characteristic."}, {"text": "Informational reports present facts, while analytical reports interpret those facts and draw conclusions about what they mean.", "isCorrect": true, "rationale": "The text explicitly states that an informational report 'presents facts' and answers 'What are the facts?', while an analytical report 'interprets them' and answers 'What do the facts mean?'."}, {"text": "Informational reports are exclusively for internal audiences, whereas analytical reports are for external stakeholders.", "isCorrect": false, "rationale": "The text does not specify audience type as a distinguishing factor; both types of reports can be used internally or externally depending on the context."}, {"text": "Informational reports always include data visualization, while analytical reports never do.", "isCorrect": false, "rationale": "The text does not make this claim; in fact, analytical reports often use data visualization to present findings and support conclusions more effectively."}], "id": "q01"}, {"question": "According to the 'keyconcept' box, which of the following is NOT one of the three core actions an analytical report performs?", "options": [{"text": "Breaks data into parts.", "isCorrect": false, "rationale": "The text states an analytical report 'breaks data into parts' as one of its three core actions."}, {"text": "Identifies patterns and relationships.", "isCorrect": false, "rationale": "The text states an analytical report 'identifies patterns and relationships' as one of its three core actions."}, {"text": "Explains what those patterns mean.", "isCorrect": false, "rationale": "The text states an analytical report 'explains what those patterns mean' as one of its three core actions."}, {"text": "Summarizes raw data without further interpretation.", "isCorrect": true, "rationale": "Summarizing raw data without further interpretation is characteristic of an informational report. An analytical report goes 'a step further' to interpret the data, not just present or summarize it without meaning."}], "id": "q02"}, {"question": "When defining criteria for evaluating options in an analytical report, which characteristic is most crucial for ensuring effective and credible comparison?", "options": [{"text": "Being subjective, allowing for flexible interpretation.", "isCorrect": false, "rationale": "The text emphasizes good criteria are 'specific, measurable, and relevant,' which is the opposite of being subjective and open to flexible, potentially inconsistent interpretation."}, {"text": "Being comprehensive, covering every possible minute detail.", "isCorrect": false, "rationale": "While comprehensiveness is good, the text prioritizes specificity, measurability, and relevance over an exhaustive list of every minute detail, which could make the analysis cumbersome without adding significant value."}, {"text": "Being specific, measurable, and relevant to the decision being made.", "isCorrect": true, "rationale": "The definition box for 'Criteria' explicitly states, 'Good criteria are specific, measurable, and relevant to the decision being made.'"}, {"text": "Being qualitative, focusing on non-numerical aspects only.", "isCorrect": false, "rationale": "Criteria can be both qualitative and quantitative. The example of criteria (cost per page, print speed) includes measurable, quantitative aspects, and good criteria are 'measurable' according to the text."}], "id": "q03"}, {"question": "A project manager is evaluating two software solutions. After identifying a preferred solution, she decides to only include data in her report that highlights the strengths of her chosen option while omitting data that points to its weaknesses. What common mistake is she making, and what is its impact?", "options": [{"text": "Using an option-based organization, which makes the report difficult to follow.", "isCorrect": false, "rationale": "The method of organization is unrelated to the selective presentation of data. Both option-based and criteria-based organization can be effective if applied consistently."}, {"text": "Failing to include a comparison table, which hinders visual comparison.", "isCorrect": false, "rationale": "While a comparison table is a useful tool, its absence is a structural oversight, not the specific ethical/credibility issue described regarding data selection."}, {"text": "Cherry-picking data, which introduces bias and destroys the credibility of her analysis.", "isCorrect": true, "rationale": "The 'Common Mistake: Cherry-Picking Data' box directly describes this scenario, stating it 'is called bias, and it destroys the credibility of your analysis' because it 'presents only the data that supports your choice'."}, {"text": "Not defining clear criteria, leading to an inconsistent evaluation.", "isCorrect": false, "rationale": "The issue here is the *application* of data to criteria, not necessarily the clarity of the criteria themselves. Even with clear criteria, one can still cherry-pick data."}], "id": "q04"}, {"question": "A company needs to decide between three different cloud storage providers for its data. The report will evaluate each provider based on cost, security features, and customer support. What type of analytical report is most appropriate for this task?", "options": [{"text": "A feasibility report.", "isCorrect": false, "rationale": "A feasibility report assesses if a plan is practical or viable. While a decision might stem from this report, the primary action here is evaluating multiple existing options against criteria."}, {"text": "A cause-and-effect report.", "isCorrect": false, "rationale": "A cause-and-effect report investigates 'why something happened.' This scenario is about choosing between options, not explaining a past event."}, {"text": "A comparison report.", "isCorrect": true, "rationale": "The text defines 'Comparison reports' as those that 'evaluate two or more options against the same set of criteria,' which perfectly matches the scenario of evaluating cloud providers based on cost, security, and support."}, {"text": "An incident report.", "isCorrect": false, "rationale": "An incident report is an informational report about 'what happened,' typically related to a specific event or occurrence, not an analytical comparison of options."}], "id": "q05"}, {"question": "A manufacturing plant notices a significant increase in equipment malfunctions over the last quarter. The plant manager commissions a report to investigate why this is happening and identify the underlying issues. What type of analytical report is being requested?", "options": [{"text": "A feasibility report.", "isCorrect": false, "rationale": "A feasibility report assesses the practicality of a proposed plan. This scenario is about understanding a past problem, not evaluating a future plan's viability."}, {"text": "A comparison report.", "isCorrect": false, "rationale": "A comparison report evaluates multiple options against criteria. This scenario focuses on a single problem and its causes, not comparing options."}, {"text": "A progress report.", "isCorrect": false, "rationale": "A progress report is an informational report about 'what you have done' or 'where a project stands,' not an analysis of the causes of a problem."}, {"text": "A cause-and-effect report.", "isCorrect": true, "rationale": "The text states, 'Cause-and-effect reports investigate why something happened,' and specifically gives the example 'When a factory's defect rate doubles... someone writes a report analyzing the causes.'"}], "id": "q06"}, {"question": "A consultant is writing a report comparing several complex investment strategies for a client. Each strategy has multiple facets (risk, return, liquidity, tax implications). Why might the consultant choose a criteria-based organization over an option-based organization for the body of the report?", "options": [{"text": "Because it allows the reader to understand each strategy as a complete package first.", "isCorrect": false, "rationale": "This describes the primary advantage of 'Option-Based Organization,' where each option is discussed across all criteria before moving to the next option."}, {"text": "Because it makes direct comparisons between strategies on each specific measure easier for the reader.", "isCorrect": true, "rationale": "The text states, 'Most professional reports use criteria-based organization because it makes comparison easier for the reader,' and explicitly notes, 'This works well when you want readers to compare options directly on each measure.'"}, {"text": "Because it is generally shorter and quicker to write.", "isCorrect": false, "rationale": "The chosen organization structure doesn't inherently dictate report length or writing time; both approaches require presenting the same information."}, {"text": "Because it helps to hide any personal bias of the consultant.", "isCorrect": false, "rationale": "Neither organization method inherently prevents bias; bias is related to the data selection and interpretation, not the structure. 'Cherry-picking data' is the specific issue related to bias."}], "id": "q07"}, {"question": "The text mentions that 'data visualization' includes charts, graphs, tables, and diagrams. Based on the 'modeldoc' example, what is the primary benefit of using a well-designed comparison table for presenting data in an analytical report?", "options": [{"text": "It eliminates the need for any written explanation in the report's body.", "isCorrect": false, "rationale": "While tables summarize data, they usually require accompanying text to explain context, analysis, and conclusions. They don't replace the entire written explanation."}, {"text": "It allows readers to quickly scan and compare key data points across different options at a glance.", "isCorrect": true, "rationale": "The 'modeldoc' note explicitly states, 'A well-structured comparison table presents each criterion in its own row, with options in columns, so the reader can scan across to compare.' The 'Writing Tip' also advises making it easy for the reader to see differences."}, {"text": "It is primarily used for showcasing the author's graphic design skills.", "isCorrect": false, "rationale": "The purpose of data visualization is to clarify data and facilitate understanding for the reader, not to showcase design skills."}, {"text": "It ensures that only qualitative data is presented, avoiding numerical information.", "isCorrect": false, "rationale": "The comparison table example ('Capacity,' 'Cost per person') clearly shows quantitative data, and tables are excellent for presenting numerical comparisons."}], "id": "q08"}, {"question": "Consider the following two statements from a report: \n1. 'Our software's performance is okay, but some users have mentioned it's slow.' \n2. 'Average page load time for our software increased by 15% last month, from 2.5 seconds to 2.9 seconds, impacting user satisfaction scores which dropped from 4.2 to 3.8 out of 5.' \nWhich statement exemplifies clear analysis, and why?", "options": [{"text": "Statement 1, because it incorporates user feedback directly, making it relatable.", "isCorrect": false, "rationale": "While user feedback is valuable, Statement 1 uses vague terms ('okay,' 'some users,' 'slow') without specific, measurable data, which the text identifies as 'Vague Analysis'."}, {"text": "Statement 1, because it uses simple language that anyone can understand without technical jargon.", "isCorrect": false, "rationale": "While simplicity is often good, Statement 1 lacks the specificity and measurability crucial for 'Clear Analysis' as demonstrated in the 'beforeafter' example."}, {"text": "Statement 2, because it provides specific, measurable data and connects it to an identifiable impact.", "isCorrect": true, "rationale": "Statement 2 mirrors the 'Clear Analysis' example provided in the 'beforeafter' box, using specific numbers (15% increase, 2.5s to 2.9s, 4.2 to 3.8 scores) and showing a clear relationship between cause (load time) and effect (satisfaction scores)."}, {"text": "Statement 2, because it avoids any subjective language entirely.", "isCorrect": false, "rationale": "While Statement 2 is more objective, 'user satisfaction scores' can still have a subjective component in their origin (e.g., surveys), but it's presented in a measurable way, making it analytically clear. The key is measurability and specificity, not absolute elimination of anything that might derive from subjective perception."}], "id": "q09"}, {"question": "Ultimately, what is the overarching purpose of an analytical report, extending beyond simply presenting facts?", "options": [{"text": "To impress the reader with the sheer volume of data collected during the investigation.", "isCorrect": false, "rationale": "While analytical reports involve data, the purpose is not to impress with volume but to make sense of it. The 'Vague Analysis vs. Clear Analysis' tip suggests focusing on meaningful data, not just quantity."}, {"text": "To provide a historical record of events and data points without further evaluation.", "isCorrect": false, "rationale": "Providing a historical record of events is more aligned with informational reports. Analytical reports interpret 'what the information means' beyond mere record-keeping."}, {"text": "To interpret information, draw conclusions, and serve as a bridge between raw data and informed decisions.", "isCorrect": true, "rationale": "The 'keyconcept' box states, 'Analysis is the bridge between raw data and informed decisions,' and the text repeatedly emphasizes that analytical reports 'interprets them' (facts) and 'draws conclusions about what the information means'."}, {"text": "To entertain the reader with engaging narratives about data trends and observations.", "isCorrect": false, "rationale": "While clear writing is important, entertainment is not the primary goal of an analytical report; its purpose is to inform and facilitate decision-making through objective interpretation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
