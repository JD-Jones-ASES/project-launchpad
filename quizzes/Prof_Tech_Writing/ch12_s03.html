<script>
var QUESTIONS = [{"question": "According to the section, what is the primary benefit of tailoring your resume for each specific job application, rather than sending a generic one?", "options": [{"text": "It saves time in the long run by allowing you to reuse content across multiple applications.", "isCorrect": false, "rationale": "Tailoring a resume actually requires more time for customization, contradicting the idea of saving time. A generic resume, while quicker to send, is explicitly stated as signaling a lack of care."}, {"text": "It demonstrates to the employer that you understand their specific needs and possess the desired qualities for the position.", "isCorrect": true, "rationale": "The text explicitly states: 'When you tailor your resume for each position, you show the employer that you understand their needs and that you have the specific qualities they are looking for.' This is the core benefit of tailoring."}, {"text": "It ensures your resume will be longer and more comprehensive, providing more information to the hiring manager.", "isCorrect": false, "rationale": "Tailoring often involves cutting irrelevant content to focus on what's important, not necessarily making the resume longer. The goal is relevance and impact, not just length."}, {"text": "It primarily helps to impress the employer with your advanced graphic design skills.", "isCorrect": false, "rationale": "While aesthetics can play a minor role, tailoring is fundamentally about content and relevance, not graphic design. In fact, overly creative designs can be detrimental according to the 'Template Trap' warning."}], "id": "q01"}, {"question": "When tailoring your resume, what is the most important step related to the job description?", "options": [{"text": "To decide whether you are truly interested in the company's mission and values.", "isCorrect": false, "rationale": "While important for your own career planning, this is not the *most important step in tailoring your resume* itself. The focus of this section is on matching your qualifications to the job."}, {"text": "To identify specific keywords and phrases the employer uses to describe their ideal candidate.", "isCorrect": true, "rationale": "The text clearly states: 'The most important step in tailoring your resume is reading the job description carefully—not just to understand the job, but to identify the keywords the employer uses to describe their ideal candidate.'"}, {"text": "To learn about the company's culture and employee benefits.", "isCorrect": false, "rationale": "Information about company culture and benefits is typically found on the company's website or during an interview, not the primary focus of reading the job description for resume tailoring."}, {"text": "To ensure you can use impressive, industry-specific jargon throughout your resume.", "isCorrect": false, "rationale": "While using some industry terms is fine, the goal is to 'mirror that language' genuinely, not just to use jargon to impress. Clarity for human readers is also crucial."}], "id": "q02"}, {"question": "A student lists 'Member of the debate team for three years' on their resume. Applying the 'So What?' test, which revised bullet point best connects this experience to a potential employer's needs?", "options": [{"text": "Participated in over 50 debate competitions, showcasing strong public speaking ability.", "isCorrect": false, "rationale": "While public speaking is a transferable skill, 'participated' is passive and 'showcasing' is a weak verb. It could be stronger by using action verbs and emphasizing more skills."}, {"text": "Developed critical thinking and persuasive communication skills as a three-year member of the debate team, regularly researching complex topics and presenting arguments to diverse audiences.", "isCorrect": true, "rationale": "This option effectively applies the 'So What?' test by connecting the activity ('debate team') to specific, transferable skills ('critical thinking,' 'persuasive communication,' 'researching complex topics,' 'presenting arguments') that are valuable to employers, expanding beyond just public speaking."}, {"text": "Attended weekly debate club meetings and enjoyed discussing current events.", "isCorrect": false, "rationale": "This option is too passive and general. It doesn't highlight any specific accomplishments, skills developed, or value to an employer, failing the 'So What?' test."}, {"text": "Became proficient in obscure logical fallacies, which is useful for specialized academic discussions.", "isCorrect": false, "rationale": "This detail is too niche and likely not relevant or transferable to most professional roles, failing the 'So What?' test by not connecting to employer needs."}], "id": "q03"}, {"question": "What is the primary purpose and benefit of maintaining a 'master resume'?", "options": [{"text": "It is the comprehensive document you submit to Applicant Tracking Systems (ATS) for initial screening.", "isCorrect": false, "rationale": "The master resume is explicitly stated as a document 'you never send to anyone.' It's for your personal use, not for submission to ATS or employers."}, {"text": "It serves as a detailed personal record of all your experiences, skills, and accomplishments, streamlining the process of tailoring specific applications.", "isCorrect": true, "rationale": "The text describes the 'master resume' as a document that 'lists every experience, skill, and accomplishment you have ever had,' and states that when applying, 'you just select the right pieces for each application,' indicating its purpose is to streamline tailoring from a comprehensive source."}, {"text": "It is a document designed to be shared with mentors and advisors for career guidance.", "isCorrect": false, "rationale": "While a master resume *could* be shared with a mentor, its primary stated purpose in the text is for the individual to use as a source for tailoring job-specific resumes, not for general sharing."}, {"text": "It helps to ensure your resume is always at least two or three pages long for any job application.", "isCorrect": false, "rationale": "The master resume *itself* might be two or three pages, but the instruction is to 'cut it down to one page' for specific applications, especially for high school students. Its purpose is not to make submitted resumes longer."}], "id": "q04"}, {"question": "What is the primary function of an Applicant Tracking System (ATS) in the hiring process?", "options": [{"text": "To design visually appealing resume templates for candidates.", "isCorrect": false, "rationale": "ATS software is used by employers to screen applications, not to design resumes for candidates."}, {"text": "To conduct initial video interviews with candidates before human review.", "isCorrect": false, "rationale": "ATS typically screens written resumes based on keywords and qualifications, it does not conduct video interviews."}, {"text": "To scan, sort, and filter job applications based on keywords and qualifications before a human reviewer sees them.", "isCorrect": true, "rationale": "The text defines ATS as 'software used by employers to scan, sort, and filter job applications based on keywords, qualifications, and other criteria before a human ever reads them.'"}, {"text": "To automatically schedule interviews for all applicants who meet basic eligibility criteria.", "isCorrect": false, "rationale": "While ATS can help manage scheduling, its primary function is screening and filtering candidates, not automatically scheduling interviews for all qualified applicants, as it still ranks them for human review."}], "id": "q05"}, {"question": "To effectively satisfy both ATS software and human hiring managers, which approach should you take when crafting your resume?", "options": [{"text": "Prioritize creative fonts and graphic elements to capture human attention, as ATS can generally handle all visual styles.", "isCorrect": false, "rationale": "The text explicitly advises against graphics and unusual fonts, stating they 'confuse scanning software' and can cause resumes to be 'rejected by a computer before a human ever sees it.'"}, {"text": "Use highly complex vocabulary and industry jargon to demonstrate expertise to humans, and only simple words for ATS.", "isCorrect": false, "rationale": "While some industry-specific keywords are important, clarity is key for humans. Overly complex vocabulary can hinder readability for both audiences. The goal is to use keywords naturally, not just jargon."}, {"text": "Use keywords from the job description and standard section headings for the ATS, while writing clear, compelling bullet points that demonstrate value for the human reader.", "isCorrect": true, "rationale": "The text advises: 'For the ATS, use keywords from the job description and standard section headings... For the human, write clear, compelling bullet points that demonstrate your value.' This addresses both audiences effectively."}, {"text": "Submit two separate documents: one plain text file for the ATS and one graphically rich PDF for the human manager.", "isCorrect": false, "rationale": "The text does not suggest submitting two separate documents. It advises making a single document ATS-friendly while also appealing to humans, often by saving it as a .docx or .pdf."}], "id": "q06"}, {"question": "Which of the following is an ATS-friendly resume practice recommended in the section?", "options": [{"text": "Using a multi-column layout with colorful sidebars for distinct sections.", "isCorrect": false, "rationale": "The section specifically warns against 'multi-column layouts' and 'colorful sidebars' in the 'Template Trap' common mistake, as ATS software often cannot read text in such non-standard formats."}, {"text": "Employing unique and creative fonts to stand out from other applicants.", "isCorrect": false, "rationale": "The text advises against 'unusual fonts that confuse scanning software' and recommends 'professional font (Calibri, Garamond, Cambria, Arial).'"}, {"text": "Including text boxes and graphics to highlight key achievements.", "isCorrect": false, "rationale": "The text states: 'Use a clean, simple format—no tables, text boxes, graphics, or unusual fonts that confuse scanning software' and 'ATS software cannot read text inside graphics or non-standard layouts.'"}, {"text": "Using standard section headings like 'Experience' and 'Education'.", "isCorrect": true, "rationale": "The text explicitly lists 'Use standard section headings ('Experience,' not 'Where I've Worked'; 'Education,' not 'My Learning Journey')' as an ATS-friendly practice."}], "id": "q07"}, {"question": "Why does the section caution against using online resume templates with colorful sidebars or multi-column layouts?", "options": [{"text": "They generally make resumes too long, exceeding the one-page limit.", "isCorrect": false, "rationale": "While some templates might contribute to length, the primary concern highlighted is not length, but compatibility with ATS."}, {"text": "They are considered unprofessional by most hiring managers, regardless of content.", "isCorrect": false, "rationale": "While some might find them less professional, the *main* reason given is technical incompatibility, not subjective aesthetic judgment by human managers."}, {"text": "Applicant Tracking Systems (ATS) may not be able to correctly read or parse text within non-standard layouts or graphics.", "isCorrect": true, "rationale": "The 'Common Mistake: The “Template Trap”' section explicitly states: 'ATS software cannot read text inside graphics or non-standard layouts. The creative template that looks great in Canva may get your resume rejected by a computer before a human ever sees it.'"}, {"text": "They are difficult to print cleanly in black and white, which is essential for physical copies.", "isCorrect": false, "rationale": "While printability is mentioned for 'No graphics or photos,' the primary reason given for avoiding complex templates specifically concerns ATS functionality, not just print quality."}], "id": "q08"}, {"question": "For high school students, what is presented as the absolute and unwavering rule regarding resume formatting?", "options": [{"text": "Using a specific font like Calibri or Arial in 10-12pt size.", "isCorrect": false, "rationale": "While using a professional, readable font is a rule, the text does not present this as 'no exception' as it does with page limit. Specific fonts are listed as recommendations."}, {"text": "Ensuring margins are at least 0.5 inches on all sides.", "isCorrect": false, "rationale": "This is a recommended formatting practice for white space, but not highlighted as an 'absolute' rule like the page limit for high school students."}, {"text": "Limiting the resume to a single page.", "isCorrect": true, "rationale": "The text explicitly states: 'One page. For high school students, there is no exception to this rule. If you cannot fit everything on one page, you need to cut content, not shrink the font.'"}, {"text": "Excluding all graphics and photos from the document.", "isCorrect": false, "rationale": "This is a key formatting rule mentioned, but the 'no exception' emphasis is specifically placed on the one-page rule for high school students."}], "id": "q09"}, {"question": "James Okafor's resume includes 'Volunteer Data Assistant' where he 'Entered and organized donation records for 500+ monthly donors using Excel spreadsheets.' If he were applying for a different role that emphasized project management and efficiency, how could this bullet point be rephrased for better impact, adhering to the principles of tailoring?", "options": [{"text": "Assisted with data entry tasks, demonstrating basic computer skills.", "isCorrect": false, "rationale": "This rephrasing weakens the original by making it generic ('assisted,' 'basic computer skills') and removes the quantification ('500+ monthly donors'), which reduces its impact and relevance for project management/efficiency."}, {"text": "Independently managed and organized extensive donor databases for 500+ monthly contacts, improving data retrieval efficiency by 15% through strategic use of Excel functions.", "isCorrect": true, "rationale": "This option highlights 'managed and organized' (project management), quantifies the impact ('improved efficiency by 15%'), and specifies the tool ('Excel functions') relevant to the new emphasis on efficiency. It uses strong action verbs and focuses on results."}, {"text": "Volunteered at a food bank, gaining experience in a non-profit environment.", "isCorrect": false, "rationale": "This is too broad and doesn't connect the specific data entry task to project management or efficiency. It removes all quantifiable details and specific skills."}, {"text": "Maintained accurate records for a large volume of donors, ensuring compliance with privacy regulations.", "isCorrect": false, "rationale": "While 'accurate records' and 'compliance' are good, this option doesn't emphasize project management or efficiency as strongly as the correct answer. It also doesn't quantify improvement or strategic methods."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
