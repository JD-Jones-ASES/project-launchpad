<script>
var QUESTIONS = [{"question": "What is the primary reason the Fresh-Eyes Test is considered the single best way to find problems in instructions?", "options": [{"text": "It ensures the instructions comply with industry standards.", "isCorrect": false, "rationale": "While good instructions might align with industry standards, the text does not state that compliance is the primary reason for the Fresh-Eyes Test's effectiveness. Its value comes from identifying practical usability issues."}, {"text": "It reveals unconscious gaps in the instructions that the writer overlooked because they are too familiar with the task.", "isCorrect": true, "rationale": "The text explicitly states: 'when you write instructions for a task you know well, you unconsciously skip things that feel obvious to you... These gaps are invisible to you because your brain fills them in automatically. A fresh pair of eyes catches them immediately—by getting stuck.'"}, {"text": "It provides an opportunity for the writer to demonstrate the task to the tester.", "isCorrect": false, "rationale": "The text advises against demonstrating the task: 'Do not explain the task verbally. Do not demonstrate it first. Hand them the written instructions and the materials, and step back.'"}, {"text": "It allows the writer to receive direct feedback on their writing style and grammar.", "isCorrect": false, "rationale": "While some feedback might be stylistic, the primary focus of the Fresh-Eyes Test is on identifying functional problems (missing steps, ambiguity, etc.) that prevent task completion, not just grammatical errors."}], "id": "q01"}, {"question": "During a Fresh-Eyes Test, why is it crucial for the instruction writer to 'watch silently' without offering help, even if the tester struggles?", "options": [{"text": "To gauge the tester's problem-solving abilities under pressure.", "isCorrect": false, "rationale": "The test is not about evaluating the tester's abilities; it's about evaluating the instructions. The text states: 'Every moment of confusion reveals a flaw in your instructions, not a flaw in your tester.'"}, {"text": "To prevent the tester from becoming too reliant on external assistance.", "isCorrect": false, "rationale": "While good testing aims for independence, the core reason for silence is to ensure that any difficulty encountered by the tester directly points to a problem in the written instructions, not in their execution."}, {"text": "Each moment of the tester's confusion or error highlights a specific flaw in the instructions.", "isCorrect": true, "rationale": "The text directly states: 'When your tester hesitates, looks confused, or does something wrong, you will feel the urge to jump in and help. Resist. Every moment of confusion reveals a flaw in your instructions, not a flaw in your tester.'"}, {"text": "To ensure the test can be completed within the allotted time.", "isCorrect": false, "rationale": "Time efficiency is not mentioned as the reason for silent observation. The emphasis is on identifying instructional flaws."}], "id": "q02"}, {"question": "A technical writer is observing a Fresh-Eyes Test. The tester pauses, re-reads a particular step multiple times, then correctly completes the action. What is the most appropriate action for the writer to take *during* this observation?", "options": [{"text": "Immediately interrupt and ask the tester what was confusing.", "isCorrect": false, "rationale": "The instructions advise watching silently and only debriefing *after* the test. Interrupting would break the observation and might influence subsequent actions."}, {"text": "Silently note the specific step and the tester's behavior for later analysis.", "isCorrect": true, "rationale": "The text clearly states to 'Watch silently' and 'Take notes. Write down every place where the tester: Pauses or re-reads a step...'"}, {"text": "Provide a verbal clarification to help the tester proceed more smoothly.", "isCorrect": false, "rationale": "Providing verbal clarification goes against the instruction to 'Watch silently' and 'Resist' the urge to help, as it would prevent the identification of flaws in the written instructions."}, {"text": "Conclude that the step is clear enough since the tester eventually succeeded.", "isCorrect": false, "rationale": "Pausing and re-reading indicates ambiguity or difficulty, even if the tester eventually succeeds. This is a crucial observation for revision, as it suggests a potential 'flaw in your instructions.'"}], "id": "q03"}, {"question": "According to the text, what is the fundamental difference between 'revision' and 'proofreading' in the context of improving instructions?", "options": [{"text": "Proofreading is done by the writer, while revision is done by a professional editor.", "isCorrect": false, "rationale": "The text does not specify who performs these tasks, but rather distinguishes between their *focus*. Both can be done by the writer or others."}, {"text": "Revision focuses on catching typos and grammatical errors, whereas proofreading improves the overall clarity and completeness of the content.", "isCorrect": false, "rationale": "This statement reverses the definitions. The text explicitly states: 'Proofreading catches typos and grammar errors. Revision improves the content itself—the clarity, organization, and completeness of your writing.'"}, {"text": "Proofreading catches typos and grammatical errors, while revision improves the content's clarity, organization, and completeness.", "isCorrect": true, "rationale": "The text explicitly defines these: 'Proofreading catches typos and grammar errors. Revision improves the content itself—the clarity, organization, and completeness of your writing.'"}, {"text": "Proofreading is a preliminary step before writing, while revision occurs after the final draft.", "isCorrect": false, "rationale": "The text implies both occur after writing. Proofreading is a final check for surface errors, while revision involves deeper content improvement, often iteratively after testing."}], "id": "q04"}, {"question": "A tester following instructions for assembling a new toy repeatedly tries to attach a piece to the wrong slot, despite the instructions stating, 'Attach the small connector piece.' What common problem revealed by testing is most likely at fault?", "options": [{"text": "Missing steps", "isCorrect": false, "rationale": "The step itself is present, so it's not a missing step. The issue is with the clarity of the existing step."}, {"text": "Assumed knowledge", "isCorrect": false, "rationale": "While some knowledge might be assumed, the specific issue described points more directly to vague phrasing rather than assuming the user knows a technical term or concept."}, {"text": "Ambiguous language", "isCorrect": true, "rationale": "The phrase 'Attach the small connector piece' is vague if there are multiple 'small connector pieces' or multiple 'slots' to which it could attach. The text lists 'Ambiguous language' as a common problem, citing an example 'Attach the piece to the side'—which piece? Which side?"}, {"text": "Wrong order", "isCorrect": false, "rationale": "The problem isn't that the step is in the wrong sequence, but that the step itself isn't clear enough for the tester to execute correctly."}], "id": "q05"}, {"question": "The text emphasizes that professional technical writers test and revise instructions multiple times. What is the fundamental reason for this iterative process?", "options": [{"text": "To ensure the initial draft is absolutely perfect before the first test.", "isCorrect": false, "rationale": "The text states the opposite: 'The best instructions are the ones that have been revised the most—not because the first draft was bad, but because every round of testing reveals something the writer could not see alone.'"}, {"text": "To gather feedback from a diverse group of users, each with unique needs.", "isCorrect": false, "rationale": "While beneficial, the text focuses on identifying issues the *writer* missed due to familiarity, rather than catering to a broad diversity of users. The core reason is the writer's 'blind spots.'"}, {"text": "Every round of testing reveals new problems that the writer, due to their familiarity with the task, could not identify alone.", "isCorrect": true, "rationale": "The 'Writing Tip: Test, Revise, Repeat' section explicitly states: 'every round of testing reveals something the writer could not see alone.'"}, {"text": "To measure improvement in user satisfaction scores after each revision.", "isCorrect": false, "rationale": "The text focuses on identifying and fixing functional problems to make instructions work, not primarily on tracking satisfaction scores."}], "id": "q06"}, {"question": "Based on the 'Professional Recipe: Instructions Format' for a grilled cheese sandwich, which safety-related element is prominently placed *before* the first numbered step of the procedure?", "options": [{"text": "A troubleshooting section for common errors.", "isCorrect": false, "rationale": "The troubleshooting section is placed at the very end of the instructions, after all the steps and the result statement."}, {"text": "A note explaining the importance of medium-low heat.", "isCorrect": false, "rationale": "This 'Note' is embedded within the first step, not before the numbered steps."}, {"text": "A caution about handling the hot skillet and keeping the stove area clear.", "isCorrect": true, "rationale": "The model document includes 'CAUTION: The skillet handle and cooking surface become extremely hot...' directly before the numbered 'Steps' section."}, {"text": "A list of prerequisite equipment and ingredients.", "isCorrect": false, "rationale": "The 'Equipment and Ingredients' list is a prerequisite, but it's not primarily a safety-related element and is placed above the caution."}], "id": "q07"}, {"question": "When selecting a tester for a Fresh-Eyes Test, what is identified as the *most crucial* characteristic of the ideal candidate?", "options": [{"text": "They have extensive experience with similar tasks.", "isCorrect": false, "rationale": "The text states the opposite: 'Choose someone who has never done the task before... The more unfamiliar the tester is, the better the test.'"}, {"text": "They possess strong communication skills to articulate their difficulties.", "isCorrect": false, "rationale": "While helpful during debrief, the primary characteristic is lack of familiarity, as the writer observes actions, not just relies on verbal feedback."}, {"text": "They have never performed the specific task before.", "isCorrect": true, "rationale": "The text explicitly states: 'Choose someone who has never done the task before... The more unfamiliar the tester is, the better the test.'"}, {"text": "They are a representative of the target audience for the instructions.", "isCorrect": false, "rationale": "While being a representative is good, the *most crucial* characteristic, according to the text, is their unfamiliarity with the task to reveal the writer's blind spots."}], "id": "q08"}, {"question": "A user follows instructions for assembling a bookshelf, completes all the steps, but only realizes the bookshelf is wobbly and incorrect after putting it in place. Which common problem revealed by testing did the instructions most likely suffer from?", "options": [{"text": "Assumed knowledge", "isCorrect": false, "rationale": "While possible, the immediate problem is the lack of feedback during the process, not necessarily the assumption of prior knowledge."}, {"text": "Wrong order of steps", "isCorrect": false, "rationale": "The issue is not that steps were out of sequence, but that the user couldn't verify correctness until the very end."}, {"text": "Missing result statements", "isCorrect": true, "rationale": "The text describes this problem as: 'The reader completes a step and has no way to know if they did it correctly. They keep going and discover five steps later that something went wrong.' This perfectly matches the scenario."}, {"text": "Ambiguous language", "isCorrect": false, "rationale": "Ambiguous language would likely lead to errors earlier in the process, not necessarily completing all steps only to find a systemic failure at the end due to lack of verification."}], "id": "q09"}, {"question": "Which statement best encapsulates the overarching philosophy presented in 'Testing Your Instructions'?", "options": [{"text": "Effective instructions are primarily achieved through meticulous proofreading and adherence to strict grammar rules.", "isCorrect": false, "rationale": "The text differentiates revision from proofreading, emphasizing that revision, driven by testing, improves content clarity, not just surface errors. Proofreading is important but not the overarching philosophy."}, {"text": "Writers, due to their expertise, are inherently incapable of objectively evaluating the clarity and completeness of their own instructions for a novice.", "isCorrect": true, "rationale": "This statement summarizes the core argument of the Fresh-Eyes Test, explaining that writers 'unconsciously skip things that feel obvious' and have 'gaps that are invisible' to them, necessitating external testing."}, {"text": "The primary goal of instruction writing is to provide comprehensive troubleshooting options for users.", "isCorrect": false, "rationale": "While troubleshooting is a valuable component of good instructions (as shown in the model), the overarching philosophy is about making the instructions clear enough to prevent problems in the first place through testing and revision, not just fixing them afterward."}, {"text": "Instructions are considered complete and effective after a single, thorough review by the author.", "isCorrect": false, "rationale": "The entire section, especially the 'Test, Revise, Repeat' tip, argues against this, emphasizing that 'you have no idea whether they actually work until someone else tries to follow them' and that multiple rounds of testing and revision are necessary."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
