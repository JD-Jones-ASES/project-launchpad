    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which component of a strong request email primarily helps the recipient understand the urgency and importance of your request?", "options": [{"text": "A detailed explanation of your credentials.", "isCorrect": false, "rationale": "While providing context about yourself can be useful in some emails, it is not listed as a key component for helping the recipient prioritize a request in this section. The focus is on the request itself."}, {"text": "A clear statement of why you need the information.", "isCorrect": true, "rationale": "The text states, 'Why you need it — Context helps people prioritize your request.' This directly answers how to help the recipient understand urgency and importance."}, {"text": "An urgent deadline, regardless of actual need.", "isCorrect": false, "rationale": "While a deadline is important, an artificially urgent deadline can be counterproductive and isn't the primary factor for helping the recipient understand the true priority based on the email's context. The 'why' provides the foundational context for prioritization."}, {"text": "A list of all your previous related projects.", "isCorrect": false, "rationale": "This information is generally irrelevant to helping a recipient prioritize a specific request; it's too much detail and not directly tied to the immediate need."}]}, {"question": "Amara needs the March customer satisfaction report for a presentation to the leadership team on Friday and prefers a PDF via email by Thursday noon. Which email draft best applies the principles of a strong request?", "options": [{"text": "Subject: Report\nHey, can you send me that report for my presentation?", "isCorrect": false, "rationale": "This request is vague; it lacks specificity on 'what' report, 'why' it's needed, 'when' it's needed, and 'how' to deliver it."}, {"text": "Subject: Request: March Customer Satisfaction Report for Friday's Presentation\nHi Priya,\nCould you send me the March customer satisfaction report? I need the data for my quarterly presentation to the leadership team on Friday. A PDF to this email address would be perfect. If you could get it to me by Thursday noon, that would give me time to incorporate the numbers.\nThank you!\nAmara", "isCorrect": true, "rationale": "This email adheres to all four components of a strong request: it specifies 'what' (March customer satisfaction report), 'why' (for quarterly presentation), 'when' (by Thursday noon for Friday presentation), and 'how' (PDF to this email address)."}, {"text": "Subject: Urgent Report\nI need the customer satisfaction data ASAP for my presentation tomorrow. Please send it quickly.", "isCorrect": false, "rationale": "This request is too demanding and lacks specific details like 'what' month's report is needed and 'how' to deliver it, making it less professional and harder to fulfill efficiently."}, {"text": "Subject: Data Request\nJust checking if you have the customer satisfaction report ready. Let me know when you can send it.", "isCorrect": false, "rationale": "This email is too passive and lacks the necessary specific details (what, why, when, how) to be considered a strong request."}]}, {"question": "You receive an urgent request for a project update that requires significant time to compile. According to the text, what is the best immediate response?", "options": [{"text": "Wait until you have the complete update ready to send a single, comprehensive email.", "isCorrect": false, "rationale": "The text advises against silence, stating, 'A quick 'I got your email and will have the report to you by Wednesday' is far better than silence followed by a late response.'"}, {"text": "Send a brief email acknowledging the request and stating when you expect to provide the update.", "isCorrect": true, "rationale": "A good response email 'Acknowledges the request' and 'Provides what was asked for (or explains when you will).' This option fulfills both, managing expectations promptly."}, {"text": "Forward the request to a colleague and assume they will handle the response.", "isCorrect": false, "rationale": "This avoids direct responsibility and doesn't acknowledge the request to the original sender, which is unprofessional."}, {"text": "Ignore the email for a few hours while you gather as much information as possible.", "isCorrect": false, "rationale": "Ignoring the email, even for a few hours, goes against the principle of responding promptly to a request. A quick acknowledgment is preferred."}]}, {"question": "Maria sent a non-urgent email requesting design feedback on Monday morning. Assuming a standard business week (Monday-Friday), when would be the earliest appropriate time for her to send a follow-up email?", "options": [{"text": "Monday afternoon, if she hasn't received a response by then.", "isCorrect": false, "rationale": "The writing tip states, 'Wait at least 48 hours (two business days) before following up on a non-urgent request.' Monday afternoon is far too soon."}, {"text": "Tuesday morning, if she still hasn't heard back.", "isCorrect": false, "rationale": "Tuesday morning is less than 24 hours (one business day) after Monday morning, which does not meet the 48-hour (two business days) guideline for non-urgent requests."}, {"text": "Wednesday morning, if no response has been received.", "isCorrect": true, "rationale": "Sending the original email on Monday morning, a follow-up on Wednesday morning would be approximately 48 hours or two business days later, aligning with the guideline 'Wait at least 48 hours (two business days) before following up on a non-urgent request.'"}, {"text": "The following Monday, to give ample time for a response.", "isCorrect": false, "rationale": "While eventually acceptable, this would be too late for the 'earliest appropriate' time, exceeding the minimum 48-hour guideline by a significant margin."}]}, {"question": "Which of the following phrases is recommended to use at the beginning of a follow-up email to politely remind the recipient about a previous message?", "options": [{"text": "“Per my last email...”", "isCorrect": false, "rationale": "The text explicitly advises, 'Never write 'Per my last email' or 'As I already mentioned.' These phrases sound passive-aggressive.'"}, {"text": "“As I already mentioned...”", "isCorrect": false, "rationale": "The text explicitly advises, 'Never write 'Per my last email' or 'As I already mentioned.' These phrases sound passive-aggressive.'"}, {"text": "“Following up on my email from Tuesday regarding the project proposal...”", "isCorrect": true, "rationale": "The text recommends to 'Reference your original email ('Following up on my email from Tuesday...').' This phrase is polite, specific, and professional."}, {"text": "“Just wondering why I haven't heard back about...”", "isCorrect": false, "rationale": "This phrase can sound accusatory or annoyed, which goes against the guideline to 'Keep the tone helpful, not annoyed.'"}]}, {"question": "The text outlines principles for 'Introducing Yourself' and 'Thanking Someone' emails. What core principle do these two email types share regarding their length and focus?", "options": [{"text": "They should both include a detailed biography of the sender.", "isCorrect": false, "rationale": "For introductions, the text advises 'keep it brief and make it about the recipient, not about you,' and for thank-yous, 'Keep it under 5 sentences.' A detailed biography contradicts both."}, {"text": "They should both be brief and directly address the core purpose.", "isCorrect": true, "rationale": "For 'Introducing Yourself,' the text says 'keep it brief,' and for 'Thanking Someone,' it advises 'Keep it under 5 sentences' and 'specifically mention what you are thanking them for,' highlighting brevity and focus on the purpose."}, {"text": "They should both propose an immediate follow-up meeting.", "isCorrect": false, "rationale": "While a follow-up might occur, it's not a mandated core principle for either type of email mentioned in the section."}, {"text": "They should both be written using highly formal language regardless of the recipient.", "isCorrect": false, "rationale": "The general principle of 'Appropriate tone' suggests matching formality to the recipient and situation, not universally using highly formal language."}]}, {"question": "Amara accidentally sent an outdated inspection schedule. Which of her draft responses best reflects the professional approach to apologizing and correcting a mistake?", "options": [{"text": "Subject: OMG So Sorry\nOMG I am SO sorry, I can't believe I sent the wrong file, I feel terrible, this is so embarrassing, I promise it will never happen again, I'm really really sorry.", "isCorrect": false, "rationale": "This response is overly apologetic and unprofessional. The text advises against excessive self-flagellation and repeating 'sorry' multiple times, as it 'undermines your professionalism.'"}, {"text": "Subject: Correction: Inspection Schedule\nHi Ms. Wang,\nI apologize for sending the incorrect version of the inspection schedule earlier today. The correct version is attached. The key difference is the updated dates for the electrical inspection (now April 10 instead of April 17).\nPlease disregard the earlier attachment. I'm sorry for any confusion.\nBest regards,\nAmara", "isCorrect": true, "rationale": "This email effectively follows the four steps: it acknowledges the mistake ('I apologize'), provides the correction ('The correct version is attached'), explains what changed ('updated dates for the electrical inspection'), and moves on. It uses a single, professional apology."}, {"text": "Subject: Wrong File\nSorry about that. Here's the right file. My mistake.", "isCorrect": false, "rationale": "While brief, this response is too informal and lacks the crucial step of explaining 'what changed' from the incorrect file, which could lead to further confusion."}, {"text": "Subject: Regarding the Schedule\nIt seems I sent the wrong file. Please check this one instead. It's totally different.", "isCorrect": false, "rationale": "This response lacks a clear apology and a specific explanation of the differences, potentially causing the recipient to compare files unnecessarily to find the correction."}]}, {"question": "According to the section on 'Apologizing or Correcting,' what is the primary reason that repeating 'sorry' multiple times in an apology email can be detrimental?", "options": [{"text": "It makes the email too long and difficult to read.", "isCorrect": false, "rationale": "While it can lengthen an email, the text's primary concern is not just length but the perception of professionalism. A long, well-structured apology might still be professional if it isn't repetitive."}, {"text": "It undermines your professionalism rather than strengthening it.", "isCorrect": true, "rationale": "The text explicitly states: 'One 'I apologize' is sufficient. Repeating 'sorry' five times actually undermines your professionalism rather than strengthening it.' This is the direct reason provided."}, {"text": "It implies that the sender does not genuinely regret the mistake.", "isCorrect": false, "rationale": "Excessive apologies usually imply the opposite – an *overabundance* of regret. The issue is its effect on professionalism, not the sincerity of the regret itself."}, {"text": "It suggests the mistake was intentional or malicious.", "isCorrect": false, "rationale": "Repeating apologies does not imply intentionality; rather, it suggests an excessive focus on the sender's feelings of embarrassment or guilt."}]}, {"question": "When sending a scheduling email, which specific detail is highlighted as crucial to include to prevent confusion, especially for participants across different regions?", "options": [{"text": "A list of suggested talking points for the meeting.", "isCorrect": false, "rationale": "While helpful for meeting preparation, a list of talking points is not a 'crucial detail' specifically mentioned for avoiding scheduling ambiguity related to time zones."}, {"text": "The full names and titles of all invited participants.", "isCorrect": false, "rationale": "Including participant names is good practice for clarity, but it doesn't directly address the problem of ambiguity in meeting times across different regions."}, {"text": "The relevant time zone for the scheduled event.", "isCorrect": true, "rationale": "The text states, 'Be specific about dates, times (include the time zone if relevant), locations, and what participants should prepare.' Including the time zone is crucial for avoiding confusion for participants in different geographical locations."}, {"text": "A personal anecdote related to the meeting's theme.", "isCorrect": false, "rationale": "Personal anecdotes are generally irrelevant to the practical details of scheduling and can detract from professionalism."}]}, {"question": "The 'Putting It All Together' section lists five core principles applicable to all email types. Which of these principles directly addresses the problem of 'extra emails' caused by recipient uncertainty or further questions?", "options": [{"text": "Clear subject line.", "isCorrect": false, "rationale": "A clear subject line helps the recipient decide to open the email and understand its general topic, but it doesn't prevent extra emails due to a lack of detail within the email body itself."}, {"text": "Purpose in the first sentence.", "isCorrect": false, "rationale": "Stating the purpose early helps the reader quickly grasp the email's main point, but it doesn't necessarily prevent follow-up questions if the specific details are still missing later in the email."}, {"text": "Appropriate tone.", "isCorrect": false, "rationale": "An appropriate tone ensures the message is received well, but it doesn't directly prevent additional emails caused by a lack of factual information or clarity."}, {"text": "Specific details.", "isCorrect": true, "rationale": "The text explicitly links this principle to avoiding 'extra emails,' stating, 'Specific details — Dates, names, file names, deadlines. Vagueness creates extra emails.' Providing specific details eliminates ambiguities that might otherwise require follow-up emails for clarification."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
