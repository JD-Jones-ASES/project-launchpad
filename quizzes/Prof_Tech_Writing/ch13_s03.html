<script>
var QUESTIONS = [{"question": "What is the primary purpose of data visualization in a report, according to the textbook section?", "options": [{"text": "To decorate the report and make it visually appealing.", "isCorrect": false, "rationale": "The text explicitly states, 'Data visualization does not decorate your report. It communicates.' Its purpose is functional, not merely aesthetic."}, {"text": "To translate complex numbers into pictures that reveal patterns quickly and clearly.", "isCorrect": true, "rationale": "The text defines data visualization as translating 'numbers into pictures that reveal patterns the human eye can grasp in seconds' and emphasizes that it should 'help the reader understand something faster or more clearly'."}, {"text": "To provide raw data in an organized format for detailed scrutiny.", "isCorrect": false, "rationale": "While visualizations use data, their primary purpose is to reveal patterns and communicate insights from that data, not simply to present raw data in an organized fashion (which is a function of tables, but not the overarching purpose of 'visualization')."}, {"text": "To replace written explanations, making reports shorter and more concise.", "isCorrect": false, "rationale": "The text emphasizes that charts should 'never appear in a report without being discussed in the text,' indicating they complement, rather than replace, written explanations."}]}, {"question": "A business manager wants to compare the sales performance of five different regional offices for the past quarter. Which type of chart would be most appropriate to answer the question, 'Which office performed best?'", "options": [{"text": "Line chart", "isCorrect": false, "rationale": "Line charts are best for showing trends over time, not for comparing distinct categories at a specific point in time."}, {"text": "Pie chart", "isCorrect": false, "rationale": "Pie charts show parts of a whole (proportions) and are generally unsuitable for comparing quantities across distinct, non-proportional categories like regional sales."}, {"text": "Bar chart", "isCorrect": true, "rationale": "The text states that bar charts 'compare quantities across categories' and are best for answering 'Which is biggest?' or 'How do these categories compare?'. Comparing sales across five regional offices fits this description perfectly."}, {"text": "Table", "isCorrect": false, "rationale": "While a table would present the precise sales figures, a bar chart would provide a quicker and clearer visual comparison of relative performance, directly answering 'Which is biggest?'."}]}, {"question": "An environmental scientist needs to visualize the change in air pollution levels in a city measured daily over the last year. Their goal is to show if pollution is generally increasing, decreasing, or remaining stable. Which chart type is best suited for this purpose?", "options": [{"text": "Bar chart", "isCorrect": false, "rationale": "Bar charts compare discrete categories; they are not designed to effectively show continuous change or trends over time."}, {"text": "Line chart", "isCorrect": true, "rationale": "The text specifies that 'Line charts show trends over time' and are used to answer 'Is this going up, down, or staying flat?' This directly aligns with showing daily air pollution changes over a year."}, {"text": "Pie chart", "isCorrect": false, "rationale": "Pie charts show parts of a whole and are completely inappropriate for displaying trends or changes over time."}, {"text": "Table", "isCorrect": false, "rationale": "While a table would contain the daily pollution data, it would not allow for quick visual identification of overall trends like an increase, decrease, or stability, which is the scientist's main goal."}]}, {"question": "You are creating a visualization to show how a company's annual budget is allocated across 10 different departments, with some departments receiving very small percentages. According to the text, why might a pie chart be a poor choice, and what alternative would be more effective?", "options": [{"text": "A pie chart is ideal for showing many categories; a line chart would be less effective for proportions.", "isCorrect": false, "rationale": "The text cautions that 'Pie charts become unreadable with more than 6–7 slices' and is not ideal for many categories. A line chart is for trends, not proportions."}, {"text": "Pie charts become unreadable with too many slices; a bar chart would better allow comparison of distinct budget allocations.", "isCorrect": true, "rationale": "The text warns, 'Pie charts become unreadable with more than 6–7 slices. If you have many small categories, group them into 'Other' or use a bar chart instead.' A bar chart would allow clear comparison of each department's budget."}, {"text": "Pie charts are only for showing trends; a table is needed for precise budget allocations.", "isCorrect": false, "rationale": "Pie charts are for showing parts of a whole (proportions), not trends. While a table offers precision, a bar chart would still be better for visualizing the comparative allocations effectively."}, {"text": "Pie charts cannot show percentages; only exact monetary values are possible with them.", "isCorrect": false, "rationale": "Pie charts are specifically designed to show percentages and parts of a whole. The issue is with the *number* of slices, not the type of value."}]}, {"question": "When is a table the most appropriate choice for presenting data in a report, rather than a chart?", "options": [{"text": "When the goal is to visualize trends over an extended period.", "isCorrect": false, "rationale": "Line charts are explicitly recommended for showing trends over time."}, {"text": "When comparing general quantities or 'which is biggest' across a few categories.", "isCorrect": false, "rationale": "Bar charts are recommended for comparing quantities across categories."}, {"text": "When precise, specific values need to be referenced and exact numbers matter more than visual patterns.", "isCorrect": true, "rationale": "The text states, 'Tables present precise values when exact numbers matter more than visual patterns' and are 'Best for: Presenting specific values the reader may need to reference (prices, dates, specifications, test results).'"}, {"text": "When showing parts of a whole, especially if there are more than 7 categories.", "isCorrect": false, "rationale": "While a table can list many categories, pie charts (with limitations on category count) or bar charts are generally preferred for visualizing parts of a whole. The 'more than 7 categories' caution applies to pie charts, not a reason to use a table over a chart that visualizes proportions."}]}, {"question": "A research team publishes a bar chart showing a 'significant' 2% increase in project success rate from 96% to 98%. You notice the Y-axis of the chart begins at 95%. What principle of honest chart design has been violated, and what is its consequence?", "options": [{"text": "The use of inconsistent scales; this prevents accurate comparison with other similar data.", "isCorrect": false, "rationale": "Inconsistent scales are a dishonest practice, but the specific issue described (Y-axis starting above zero for a bar chart) is a distinct principle."}, {"text": "Failure to include a data source; the claim of success cannot be verified.", "isCorrect": false, "rationale": "Including a data source is important for honesty, but the described manipulation is visual, not about the source of the data itself."}, {"text": "Not starting the Y-axis at zero for bar charts; this exaggerates small differences, making them appear more dramatic.", "isCorrect": true, "rationale": "The text explicitly states, 'Start the Y-axis at zero (for bar charts). When you cut off the bottom of a bar chart, small differences look enormous. This is one of the most common ways charts mislead readers.' Starting at 95% makes a 2% increase look much larger than it truly is."}, {"text": "The use of 3D effects; these distort the actual proportions of the data.", "isCorrect": false, "rationale": "Using 3D effects is a dishonest practice, but the scenario describes a manipulation of the Y-axis origin, not the dimension of the chart."}]}, {"question": "Which of the following practices is explicitly advised AGAINST when designing honest charts?", "options": [{"text": "Starting the Y-axis at zero for bar charts.", "isCorrect": false, "rationale": "The text advises *for* starting the Y-axis at zero for bar charts as a principle of honest design."}, {"text": "Using 3D effects for pie charts and bar charts to enhance visual appeal.", "isCorrect": true, "rationale": "The text states, 'Do not use 3D effects. Three-dimensional pie charts and bar charts look flashy but distort the data... Keep it flat and honest.' This is explicitly advised against."}, {"text": "Labeling everything, including titles, axis labels with units, and a data source.", "isCorrect": false, "rationale": "The text strongly advises *for* labeling everything as a principle of honest design."}, {"text": "Including the data source in a caption or footnote beneath the chart.", "isCorrect": false, "rationale": "The text advises *for* including the data source as a principle of honest design to ensure verifiability."}]}, {"question": "A report states, 'Our data shows that districts with higher per-student spending also have higher average test scores, which proves that increased funding directly causes improved academic performance.' What common mistake, highlighted in the text, might this statement be making?", "options": [{"text": "Failing to provide a legend, making it difficult to differentiate between data points.", "isCorrect": false, "rationale": "While providing a legend is good practice, it's not the specific logical error described in the statement."}, {"text": "Confusing correlation with causation.", "isCorrect": true, "rationale": "The 'Common Mistake' section explicitly warns, 'Correlation means two things change together. Causation means one thing makes the other happen. These are not the same.' The statement observes a correlation (spending and scores rise together) but then asserts causation ('causes improved academic performance') without the necessary stronger evidence."}, {"text": "Not labeling the axes clearly, leading to ambiguity about what is being measured.", "isCorrect": false, "rationale": "Axis labels are about clarity of presentation, not the logical interpretation of the relationship between variables."}, {"text": "Using a bar chart instead of a line chart for demonstrating a trend.", "isCorrect": false, "rationale": "The mistake is in the conclusion drawn from the data, not necessarily the type of visualization used to present it. The statement is about interpretation, not chart choice."}]}, {"question": "You have created a detailed table showing a decline in student enrollment over five years. According to the textbook, how should you effectively integrate this visual into your report's text?", "options": [{"text": "Place the table in the appendix to keep the main report concise, referring to it generally in the text.", "isCorrect": false, "rationale": "The text advises against dropping in visuals and explicitly states they should be discussed in the main text, not just generally referred to in an appendix."}, {"text": "Insert the table directly into the text with a generic caption, assuming the reader will interpret its meaning.", "isCorrect": false, "rationale": "The text provides an example of a 'Dropped-In Visual' as incorrect, emphasizing that visuals need explicit introduction, direction, and interpretation."}, {"text": "Introduce the table, direct the reader's attention to key patterns or specific data points, and then interpret what those findings mean.", "isCorrect": true, "rationale": "The text outlines a three-step pattern for referencing visuals: 'Introduce,' 'Direct attention' to what to notice, and 'Interpret' what it means. This approach fully integrates the visual into the narrative."}, {"text": "Only include the table if it is entirely self-explanatory, otherwise, it might confuse the reader.", "isCorrect": false, "rationale": "The text states that even if a visual is clear, it should still be discussed and interpreted to ensure the reader grasps its significance within the report's context."}]}, {"question": "A financial analyst needs to present the monthly stock price fluctuations of three competing companies over the last two years, highlighting both their individual trends and the precise opening and closing prices for each quarter. To best achieve these goals while adhering to principles of clarity and honesty, what visualization strategy should they employ?", "options": [{"text": "Create three separate bar charts, one for each company, starting the Y-axis at the lowest recorded price to emphasize volatility.", "isCorrect": false, "rationale": "Bar charts are poor for showing trends over time, and starting the Y-axis at a non-zero value for a bar chart is a dishonest practice that exaggerates differences, violating the 'Designing Honest Charts' principle."}, {"text": "Use a single 3D pie chart for each company's annual performance, as 3D effects make comparisons more dynamic and engaging.", "isCorrect": false, "rationale": "Pie charts are unsuitable for showing trends over time or comparing multiple entities' performance. 3D effects are explicitly advised against because they distort data and are not honest."}, {"text": "Employ a line chart with distinct lines for each company to visualize trends over time, complemented by a table to provide precise quarterly opening and closing prices.", "isCorrect": true, "rationale": "A line chart is ideal for showing trends over time for multiple items ('Is it going up, down, or staying flat?'). A table is perfect for presenting 'precise values when exact numbers matter,' such as specific opening and closing prices, balancing visual patterns with exact data reference as recommended in the text."}, {"text": "Rely solely on a comprehensive table, as exact values are paramount in financial analysis, and charts can be misleading.", "isCorrect": false, "rationale": "While exact values are important, a table alone would not allow for the quick visual identification of trends and comparisons between the three companies, which is a key goal of data visualization (revealing patterns quickly)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
