        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>

        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 6, Section 4</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary function a cover letter serves that a resume alone cannot?", "options": [{"text": "To list all past job titles and employers.", "isCorrect": false, "rationale": "A resume's primary purpose is to list past job titles and employers, along with responsibilities and achievements. The cover letter's role is different."}, {"text": "To explain why your experiences matter to the specific opportunity and demonstrate your writing ability.", "isCorrect": true, "rationale": "The text explicitly states that a cover letter 'explains why it matters—and why you are the right person for this specific opportunity' and 'demonstrates your writing ability—which matters in nearly every job.' These are unique functions compared to a resume."}, {"text": "To provide a chronological record of educational achievements.", "isCorrect": false, "rationale": "Educational achievements, including a chronological record, are typically detailed on a resume, not primarily in a cover letter."}, {"text": "To summarize your entire professional network.", "isCorrect": false, "rationale": "Summarizing a professional network is not a stated purpose of a cover letter. Networking is a separate professional activity."}], "id": "q01"}, {"question": "According to the 'Three-Paragraph Cover Letter' structure, which element is essential to include in the opening paragraph?", "options": [{"text": "A detailed list of all your previous work experiences.", "isCorrect": false, "rationale": "A detailed list of experiences belongs in the body paragraph(s) to connect to specific requirements, not the opening. The opening should be concise."}, {"text": "A thank you to the reader for considering your application.", "isCorrect": false, "rationale": "Thanking the reader is an essential part of the closing paragraph, not the opening."}, {"text": "The position you are applying for, how you learned about it, and a hook sentence about your strongest qualification.", "isCorrect": true, "rationale": "The text states the opening paragraph should 'State the position you are applying for and how you learned about it. Include one sentence that hooks the reader—your strongest qualification or a specific reason you are excited about this opportunity.'"}, {"text": "An enumeration of all your technical skills and certifications.", "isCorrect": false, "rationale": "Specific skills and certifications are typically discussed in the body paragraph(s) to show how they meet job requirements."}], "id": "q02"}, {"question": "The text states that 'Tailoring is what separates a good cover letter from a great one.' Based on the explanation, what is the *core action* of tailoring?", "options": [{"text": "Using elaborate vocabulary to impress the reader.", "isCorrect": false, "rationale": "While professional language is important, tailoring is about content and relevance, not just vocabulary choice."}, {"text": "Sending the same polished letter to many different companies to save time.", "isCorrect": false, "rationale": "This describes a 'generic' cover letter, which the text explicitly contrasts with effective 'tailored' letters."}, {"text": "Customizing the letter by matching your specific qualifications to the employer's stated needs in the job description.", "isCorrect": true, "rationale": "The definition of tailoring provided is 'the practice of customizing a cover letter or resume for a specific position by matching your qualifications to the employer's stated needs.'"}, {"text": "Asking a friend to proofread your letter for grammatical errors.", "isCorrect": false, "rationale": "Proofreading is a vital step in any writing, but it is a general editing practice, not the specific act of tailoring content to a job description."}], "id": "q03"}, {"question": "A student writes in their cover letter body paragraph: 'My resume lists my experience as a cashier at 'The Corner Store' for two years, where I handled customer transactions and restocked shelves.' What common mistake is this student making, according to the text?", "options": [{"text": "Failing to include a specific example.", "isCorrect": false, "rationale": "The student does include a specific example, but the way it's presented is the issue."}, {"text": "Not adequately addressing the 'So What?' test.", "isCorrect": false, "rationale": "While this statement might not fully pass the 'So What?' test, the more direct and explicit common mistake addressed in the text is restating the resume."}, {"text": "Restating their resume rather than explaining the story behind the experience.", "isCorrect": true, "rationale": "The 'Common Mistake: Restating Your Resume' section warns against this, stating, 'Your cover letter should not be a paragraph version of your resume... Instead, pick your two or three strongest qualifications and explain them. Tell the story behind the bullet point.'"}, {"text": "Using informal language for a business letter.", "isCorrect": false, "rationale": "The language used is generally formal and appropriate for a business letter; the issue is the content's redundancy."}], "id": "q04"}, {"question": "Applying the 'So What?' test from the writing tip, which of the following statements would be *most effective* in a cover letter?", "options": [{"text": "I am a very responsible person.", "isCorrect": false, "rationale": "This is a general assertion that fails the 'So What?' test; it lacks specific evidence to back up the claim."}, {"text": "I have excellent communication skills.", "isCorrect": false, "rationale": "This is another general assertion. The reader would still ask 'So what?' or 'Prove it.'"}, {"text": "I worked as a volunteer.", "isCorrect": false, "rationale": "While it states an action, it lacks detail about the impact or specific responsibilities, making it weak under the 'So What?' test."}, {"text": "I organized a campus-wide fundraiser that engaged 50 student organizations and raised over $10,000 for local charities.", "isCorrect": true, "rationale": "This statement provides specific, quantifiable evidence of responsibility, organizational skills, and impact, directly addressing the 'So What?' test by showing concrete achievements."}], "id": "q05"}, {"question": "Compare the 'Generic' and 'Tailored' cover letter openings provided. What is the *most significant* difference that makes the tailored version more effective?", "options": [{"text": "The tailored version uses a more formal salutation ('Dear Ms. Okonkwo:' vs. 'To Whom It May Concern,').", "isCorrect": false, "rationale": "While using a specific name is more formal and better, the text emphasizes connecting qualifications and understanding the company, which is more significant than just the salutation for overall effectiveness."}, {"text": "The tailored version is significantly longer, providing more details.", "isCorrect": false, "rationale": "The tailored version is only slightly longer. Its effectiveness comes from the *quality* and *relevance* of its content, not merely its length."}, {"text": "The tailored version specifically names the position, company, and connects a key qualification to the opportunity, showing thought and understanding.", "isCorrect": true, "rationale": "The analysis after the examples states, 'The 'After' version names the company, the position, and a specific qualification that matches the job. It took five more minutes to write and is ten times more effective.'"}, {"text": "The tailored version includes a complete mailing address for the recipient.", "isCorrect": false, "rationale": "The mailing address is part of the standard business letter format but is not the most significant differentiator in content that makes the *opening* effective, as highlighted by the text's analysis."}], "id": "q06"}, {"question": "In Maria Santos's model cover letter, how does she effectively demonstrate 'evidence, not assertions' regarding her social media management skills?", "options": [{"text": "She simply states, 'I am good at social media.'", "isCorrect": false, "rationale": "This would be an assertion without evidence, which the text explicitly advises against ('Evidence, not assertions'). Maria does the opposite."}, {"text": "She lists the names of all the social media platforms she has used.", "isCorrect": false, "rationale": "Listing platforms shows familiarity but doesn't demonstrate impact or skill level with specific results. Maria goes beyond just listing."}, {"text": "She provides specific metrics like growing followers from 340 to 1,800 and increasing charity drive funds by 60%.", "isCorrect": true, "rationale": "The text notes that Maria 'provides numbers—200 posts, 1,800 followers, $4,200 raised, 60% increase—that prove her impact,' which is the essence of 'evidence, not assertions.'"}, {"text": "She mentions that she completed an online course in digital marketing.", "isCorrect": false, "rationale": "Completing a course is a qualification, but it's not direct evidence of *her* practical impact or the results she achieved, which is what 'evidence, not assertions' emphasizes."}], "id": "q07"}, {"question": "A job description for a Marketing Assistant lists 'strong organizational skills,' 'proficiency in Microsoft Office,' and 'ability to work in a fast-paced team environment' as key qualifications. Which of the following applicant experiences would *best* demonstrate an understanding of 'tailoring' for this specific description?", "options": [{"text": "I am a very organized person.", "isCorrect": false, "rationale": "This is a general assertion and does not provide specific evidence of organizational skills. It fails the 'So What?' test."}, {"text": "I have used Microsoft Word and Excel for school projects.", "isCorrect": false, "rationale": "While it mentions Microsoft Office, it lacks specific examples of *how* it was used, the complexity, or the results, making it less impactful than a tailored, results-oriented example."}, {"text": "As Project Lead for our school's annual science fair, I managed schedules for 30 volunteers and coordinated logistics for 150 student presentations, ensuring all deadlines were met effectively.", "isCorrect": true, "rationale": "This statement directly addresses 'strong organizational skills' and 'ability to work in a fast-paced team environment' with specific, quantifiable examples of managing people, coordinating events, and meeting deadlines. This is the essence of tailoring with evidence."}, {"text": "I enjoy working with others and am a great team player.", "isCorrect": false, "rationale": "This is a general assertion about teamwork without any specific evidence or example to demonstrate the claim."}], "id": "q08"}, {"question": "A student with limited formal work experience believes they 'have nothing to put on a cover letter.' Based on the 'Common student struggle' advice, what types of experiences *could* they draw upon?", "options": [{"text": "Only paid, full-time employment roles.", "isCorrect": false, "rationale": "The text explicitly counters this, stating that many non-traditional experiences count, making this option incorrect."}, {"text": "Solely academic achievements like grades and test scores.", "isCorrect": false, "rationale": "While academic achievements are valuable, the advice suggests a much broader range of experiences beyond just grades and test scores."}, {"text": "School activities, volunteer work, class projects, personal projects, and family responsibilities.", "isCorrect": true, "rationale": "The 'Common student struggle' section states, 'Remind them that school activities, volunteer work, class projects, personal projects, and family responsibilities all count.'"}, {"text": "Future aspirations and hypothetical contributions to the company.", "isCorrect": false, "rationale": "A cover letter should focus on past experiences and how they prepare you for the role, not just future aspirations, which lack supporting evidence."}], "id": "q09"}, {"question": "The text draws a 'Writing Connection' between a cover letter and a persuasive essay. What is the fundamental logical parallel between the two?", "options": [{"text": "Both primarily focus on narrating a personal life story.", "isCorrect": false, "rationale": "Neither a cover letter nor a persuasive essay primarily focuses on narrating a personal life story; both are structured to argue a point with evidence."}, {"text": "Both require a strong introduction, evidence-supported body, and a reinforcing conclusion to make a clear argument.", "isCorrect": true, "rationale": "The 'Writing Connection' states, 'The structure of a business letter—opening that states your purpose, body that develops your argument with evidence, closing that reinforces your message—is the same structure that makes essays effective.'"}, {"text": "Both are typically around 500-750 words in length.", "isCorrect": false, "rationale": "The connection is about structure and logic, not typical word count, which can vary greatly for both document types."}, {"text": "Both are written exclusively for academic audiences.", "isCorrect": false, "rationale": "Cover letters are written for professional, business audiences, not exclusively academic ones."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
