        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary reason writing matters at work?", "options": [{"text": "To impress colleagues with extensive vocabulary.", "isCorrect": false, "rationale": "While vocabulary is part of writing, the text emphasizes practical outcomes, not just impression. The primary reason is to avoid confusion and its costly consequences."}, {"text": "To avoid confusion that can lead to financial loss, wasted time, or danger to lives.", "isCorrect": true, "rationale": "The text explicitly states: 'Writing matters at work because confusion costs money, time, and sometimes lives.' This option directly captures the core message."}, {"text": "To fulfill an academic requirement for career advancement.", "isCorrect": false, "rationale": "The text contrasts academic stakes with workplace stakes, where consequences are far more significant than just a grade, indicating it's not merely an academic exercise."}, {"text": "To provide opportunities for creativity and self-expression.", "isCorrect": false, "rationale": "While writing can be creative, the focus in the workplace, as presented, is on clarity, accuracy, and purpose-driven communication, not primarily self-expression."}]}, {"question": "A software developer is creating a user guide for a new application. Which of the following underlying writing skills would be *most* critical for this task, according to the text's 'Universal Career Skill' concept?", "options": [{"text": "Focusing solely on technical jargon to demonstrate expertise.", "isCorrect": false, "rationale": "The text warns against jargon confusing outsiders and emphasizes clarity and awareness of the reader. Over-reliance on jargon would hinder user understanding."}, {"text": "Ensuring the guide is concise, accurate, clear, and written with the user's understanding in mind.", "isCorrect": true, "rationale": "The 'Universal Career Skill' key concept lists 'clarity, conciseness, accuracy, and awareness of your reader' as the underlying skills, which are all crucial for an effective user guide."}, {"text": "Prioritizing speed of writing over quality to meet deadlines.", "isCorrect": false, "rationale": "The 'Cost of Bad Writing' section highlights that poor quality writing, even if fast, can lead to significant problems, emphasizing that 'good enough' isn't sufficient in professional settings."}, {"text": "Emphasizing persuasive language to encourage more users.", "isCorrect": false, "rationale": "User guides are primarily informative and explanatory, not persuasive. While encouraging use is a goal, clarity and accuracy in instructions are paramount for technical writing."}]}, {"question": "The 'Two Million Dollar Comma' anecdote best illustrates which of the following principles from the section?", "options": [{"text": "The importance of strong negotiation skills in contract disputes.", "isCorrect": false, "rationale": "The issue was the interpretation of the written contract due to a punctuation mark, not a failure in negotiation itself."}, {"text": "How a single punctuation mark can fundamentally alter the legal meaning and financial outcome of a professional document.", "isCorrect": true, "rationale": "The text explicitly states the comma 'changed the meaning of a termination clause, and a court ruled that the contract meant something different from what one party intended,' resulting in the $2 million loss."}, {"text": "The necessity of using specialized legal jargon in all business communications.", "isCorrect": false, "rationale": "The problem was a punctuation error, not a lack of jargon. Jargon, if unclear, can also contribute to confusion."}, {"text": "The difficulty of writing long contracts without any errors.", "isCorrect": false, "rationale": "While contracts can be difficult, the specific lesson is the profound impact of even a tiny, seemingly insignificant error like a comma on meaning and cost, not just general difficulty."}]}, {"question": "Based on the 'Real Cost of Unclear Writing' key concept, which of these situations *least* aligns with the tangible consequences of poor writing in a professional setting?", "options": [{"text": "A poorly written grant proposal causing a nonprofit to lose critical funding.", "isCorrect": false, "rationale": "This aligns with 'lost money' mentioned in the key concept."}, {"text": "An ambiguous instruction manual leading to a product recall and damaged company reputation.", "isCorrect": false, "rationale": "This aligns with 'lost money' (for recall) and 'damaged relationships' (with customers, impacting reputation)."}, {"text": "A student receiving a lower grade on an essay due to grammar mistakes.", "isCorrect": true, "rationale": "The 'Writing Tip: Why 'Good Enough' Isn't' section explicitly contrasts school consequences (a letter grade) with workplace consequences (lost clients, project delays, legal liability). This situation represents lower stakes than the 'real cost' in a professional setting."}, {"text": "A vague safety protocol contributing to a workplace accident, injuring an employee.", "isCorrect": false, "rationale": "This aligns with 'physical harm' mentioned in the key concept (and exemplified by the Challenger disaster)."}]}, {"question": "A marketing manager is drafting an email to potential clients, outlining the technical specifications of a new product and proposing a meeting to discuss a customized solution. This communication primarily demonstrates an overlap between which two types of writing?", "options": [{"text": "Academic writing and creative writing.", "isCorrect": false, "rationale": "These categories are not discussed as workplace writing types in the text, nor do they fit the description of the email content."}, {"text": "Professional writing and technical writing.", "isCorrect": true, "rationale": "The email for client relationships and proposing a meeting falls under 'professional writing,' while outlining 'technical specifications' falls under 'technical writing.' The text explicitly states these categories often overlap."}, {"text": "Journalistic writing and literary writing.", "isCorrect": false, "rationale": "These are not the workplace writing categories defined in the text, and the content does not align with their typical characteristics."}, {"text": "Internal communication and external communication.", "isCorrect": false, "rationale": "While this communication is 'external,' these terms describe the *direction* of communication, not the *types* of writing (professional vs. technical) as defined in the textbook section."}]}, {"question": "The Space Shuttle Challenger disaster, as described in the text, primarily highlights which critical failure in workplace writing?", "options": [{"text": "The lack of sophisticated scientific data from the engineers.", "isCorrect": false, "rationale": "The text states engineers 'wrote memos warning that cold temperatures could cause the shuttle's O-ring seals to fail,' implying they had the data, but it was poorly communicated."}, {"text": "The inability to communicate urgent, critical warnings clearly and effectively to decision-makers.", "isCorrect": true, "rationale": "The text explains the memos were 'poorly organized, buried key warnings in technical details, and failed to communicate the urgency of the risk to decision-makers,' directly leading to the tragic outcome."}, {"text": "Over-reliance on formal reports instead of face-to-face meetings.", "isCorrect": false, "rationale": "The issue was the *quality* and *clarity* of the written communication, not necessarily the medium itself. Clearer writing could have changed the outcome regardless of meeting format."}, {"text": "Engineers using too much jargon, preventing understanding by other engineers.", "isCorrect": false, "rationale": "The text indicates the failure was in communicating to 'decision-makers' (likely non-engineers or higher management), not primarily an issue between engineers themselves. The problem was clarity and urgency, not just jargon."}]}, {"question": "Which of the following best exemplifies the concept of 'concise' writing, as defined in the vocabulary box?", "options": [{"text": "A 20-page report detailing every single minor step of a complex process, ensuring nothing is left out.", "isCorrect": false, "rationale": "This would likely include unnecessary detail, contradicting the definition of concise ('expressing ideas in few words, without unnecessary detail')."}, {"text": "An email that clearly explains a project update using precise language and no superfluous words, even if it's brief.", "isCorrect": true, "rationale": "This aligns perfectly with the definition of 'concise': 'expressing ideas in few words, without unnecessary detail' while maintaining clarity."}, {"text": "A lengthy legal brief that covers all possible interpretations of a clause to prevent any loopholes.", "isCorrect": false, "rationale": "While thorough, a 'lengthy' brief is unlikely to be 'in few words' and might include extensive details that are not strictly concise."}, {"text": "A presentation slide with a single, impactful image and no text, requiring oral explanation.", "isCorrect": false, "rationale": "While very brief, this might not 'express ideas' completely through writing alone and may lack necessary detail, which differs from being concise while still being clear and comprehensive."}]}, {"question": "A junior employee submits a client report with several grammatical errors and confusing sentences, thinking 'it's good enough for a draft.' Based on the 'Why 'Good Enough' Isn't' writing tip, what is the *most likely* professional consequence of this mindset?", "options": [{"text": "The employee might receive a slightly lower performance review at the end of the year.", "isCorrect": false, "rationale": "While possible, the writing tip emphasizes more immediate and severe consequences than a slight reduction in a review, which is a longer-term assessment."}, {"text": "The client might lose trust in the company, leading to a lost contract or damaged reputation.", "isCorrect": true, "rationale": "The writing tip explicitly states: 'At work, sloppy writing can cost your company a client, delay a project by weeks, or create a legal liability,' directly aligning with loss of trust and business."}, {"text": "The employee will be asked to rewrite the report, improving their writing skills in the process.", "isCorrect": false, "rationale": "This focuses on a learning opportunity, whereas the tip highlights the *costs* and *risks* to the company, not the individual's development in this context."}, {"text": "The report will simply take longer to review by a supervisor, causing minor delays.", "isCorrect": false, "rationale": "This understates the potential severity. The tip mentions 'delay a project by weeks,' indicating a more significant impact than just minor review delays."}]}, {"question": "According to the text, what is the primary purpose of technical writing?", "options": [{"text": "To persuade readers to adopt a new product or service through compelling arguments.", "isCorrect": false, "rationale": "Persuasion is generally a characteristic of professional writing (e.g., proposals) or marketing, not the primary focus of technical writing as defined."}, {"text": "To explain how something works or how to do something, using precise language and organized structure.", "isCorrect": true, "rationale": "The definition box for 'technical writing' explicitly states it is 'writing that explains how something works or how to do something, using precise language and organized structure.'"}, {"text": "To foster strong interpersonal relationships and team cohesion within an organization.", "isCorrect": false, "rationale": "This is more aligned with the relationship-focused aspect of 'professional writing,' rather than the information-focused nature of technical writing."}, {"text": "To record casual daily business interactions and decisions for internal reference.", "isCorrect": false, "rationale": "This describes forms of professional writing like memos or meeting notes, but technical writing is more focused on detailed explanations and instructions."}]}, {"question": "Considering all the examples and key concepts presented in 'Writing at Work,' which overarching conclusion about professional communication is best supported?", "options": [{"text": "While important, writing skills are secondary to technical expertise in most careers.", "isCorrect": false, "rationale": "The text strongly refutes this, emphasizing that writing is a 'universal career skill' essential in 'every career,' and poor writing can nullify even great technical work."}, {"text": "Effective writing is a critical, universal career skill with tangible financial, safety, and reputational consequences.", "isCorrect": true, "rationale": "This synthesizes the entire section's message, covering the 'universal career skill' aspect and the 'cost of bad writing' (money, lives, relationships/reputation) highlighted through various examples like the comma, medical errors, and Challenger."}, {"text": "The most significant challenge in workplace writing is avoiding jargon and overly complex vocabulary.", "isCorrect": false, "rationale": "While jargon is a challenge, the text presents a broader range of problems, including poor organization, lack of clarity, and failure to communicate urgency, as equally or more significant (e.g., Challenger)."}, {"text": "Only careers in law, healthcare, and engineering require exceptionally clear and precise writing.", "isCorrect": false, "rationale": "The text lists numerous diverse careers (business, education, trades, technology, nonprofit) that require strong writing, explicitly stating 'there is no career that does not involve writing.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
