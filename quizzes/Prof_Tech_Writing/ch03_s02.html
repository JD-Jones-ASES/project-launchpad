    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary grammatical mood recommended for writing numbered steps in instructions?", "options": [{"text": "Indicative", "isCorrect": false, "rationale": "The indicative mood states facts or asks questions, which is not direct action. The imperative mood is specifically recommended for instructions."}, {"text": "Subjunctive", "isCorrect": false, "rationale": "The subjunctive mood expresses wishes, possibilities, or hypothetical situations, which is unsuitable for direct commands in instructions."}, {"text": "Imperative", "isCorrect": true, "rationale": "The text explicitly states, 'Every step should be written in the imperative mood: a direct command that tells the reader exactly what to do.' It is described as clear, concise, and action-oriented."}, {"text": "Conditional", "isCorrect": false, "rationale": "The conditional mood expresses possibilities or conditions ('if desired'), which the text explicitly advises against because it makes the reader wonder if the step is optional."}], "id": "q01"}, {"question": "Which of the following phrases *correctly* uses the imperative mood for an instruction?", "options": [{"text": "The user should open the settings menu.", "isCorrect": false, "rationale": "This uses the indicative mood with a modal verb ('should'), which is less direct and action-oriented than the imperative. The text cautions against passive or wordy versions."}, {"text": "To open the settings menu, you will want to proceed.", "isCorrect": false, "rationale": "This is a wordy and indirect phrasing that buries the action, which the text advises to avoid as it is not concise."}, {"text": "Open the settings menu.", "isCorrect": true, "rationale": "This phrase starts directly with a verb and issues a command, embodying the 'clear, concise, and action-oriented' nature of the imperative mood as described in the text."}, {"text": "If desired, the settings menu may be opened.", "isCorrect": false, "rationale": "This is conditional language, which the text explicitly states to avoid because it makes the reader question if the step is optional."}], "id": "q02"}, {"question": "Why does the text emphasize having only 'one action per step'?", "options": [{"text": "To save space in the document.", "isCorrect": false, "rationale": "The text explicitly warns against combining steps to 'save space,' stating that it is a 'Common Mistake: The Run-On Step' and leads to confusion."}, {"text": "To prevent readers from losing their place or skipping actions.", "isCorrect": true, "rationale": "The text explains, 'When you pack multiple actions into a single step, readers lose their place. They complete one action, look back at the step, and cannot tell whether they have finished it,' and explicitly warns against 'The Run-On Step' leading to skipped actions."}, {"text": "To make the document easier to translate into other languages.", "isCorrect": false, "rationale": "While potentially a side benefit, the text does not mention translation as the reason for this rule; the primary focus is on reader comprehension and task completion."}, {"text": "To allow for more flexible formatting options.", "isCorrect": false, "rationale": "This guideline is about the clarity and structure of the content itself, not about enabling more formatting flexibility."}], "id": "q03"}, {"question": "According to the text, when is it appropriate to use substeps within a main numbered step?", "options": [{"text": "Whenever a step requires more than two sentences of explanation.", "isCorrect": false, "rationale": "The text advises that if a step requires a paragraph of explanation, the explanation should come *before* the step or in a Note, not inside the step itself or as substeps."}, {"text": "To combine multiple unrelated actions into a single, comprehensive step.", "isCorrect": false, "rationale": "Substeps are for *logically related* smaller actions, not for combining unrelated ones, which would violate the 'one action per step' principle for clarity."}, {"text": "When smaller actions logically belong together under a single main task and separating them would lose context.", "isCorrect": true, "rationale": "The text states, 'Use substeps when the smaller actions logically belong together and the reader would lose context if you numbered them as separate main steps.'"}, {"text": "To introduce a new section or topic within the overall instructions.", "isCorrect": false, "rationale": "New sections or topics would typically be introduced with new main numbered steps or headings, not substeps, which are nested within existing steps."}], "id": "q04"}, {"question": "A technical writer is creating a section in a user manual listing safety precautions that *must* be observed before operating a machine, but the order in which these precautions are *read* doesn't strictly matter for safety (as long as all are read). Which formatting choice is most appropriate for this list, according_to the text?", "options": [{"text": "Numbered list.", "isCorrect": false, "rationale": "Numbered lists are for sequential steps where the order matters. If the reading order of precautions doesn't matter, a numbered list implies a sequence that isn't functionally present."}, {"text": "Bulleted list.", "isCorrect": true, "rationale": "The 'Writing Tip: Numbers vs. Bullets' states, 'Use bulleted lists only when the items can be done in any order—for example, a list of materials to gather before starting or a set of parallel checks that can be done in any sequence.' Safety precautions, if their order of reading doesn't matter, fit this description."}, {"text": "A single paragraph with precautions separated by semicolons.", "isCorrect": false, "rationale": "While grammatically possible, this would reduce clarity and readability, especially for critical information like safety precautions, compared to a list format."}, {"text": "Substeps under a main heading.", "isCorrect": false, "rationale": "Substeps are for actions *nested within* a main step, not for an independent list of items where order doesn't matter."}], "id": "q05"}, {"question": "Which of the following is *not* one of the additional formatting guidelines provided for writing effective numbered steps?", "options": [{"text": "Start each step with a verb.", "isCorrect": false, "rationale": "This is explicitly listed as a guideline: 'Start each step with a verb. “Click,” “Open,” “Remove,” “Insert”—the action word comes first.'"}, {"text": "Aim for one to two sentences per step.", "isCorrect": false, "rationale": "This is explicitly listed as a guideline: 'Keep steps short. Aim for one to two sentences per step.'"}, {"text": "Always include a 'Note' after every step.", "isCorrect": true, "rationale": "The text mentions that explanations for long steps should go 'in a Note' but does not state that a 'Note' must be included *after every step*. It only suggests including an 'expected result' after *critical* steps."}, {"text": "Use consistent formatting for elements like button names or menu options.", "isCorrect": false, "rationale": "This is explicitly listed as a guideline: 'Use consistent formatting. If you bold button names in step 3, bold them in every step. If you italicize menu options in step 5, italicize them everywhere.'"}], "id": "q06"}, {"question": "Why is it important to include the 'expected result' after critical steps in instructions?", "options": [{"text": "To make the instructions longer and more thorough.", "isCorrect": false, "rationale": "The goal is clarity and user success, not simply length. Adding unnecessary text can actually reduce clarity."}, {"text": "To help readers confirm they completed the step correctly and what to expect next.", "isCorrect": true, "rationale": "The text states, 'Include the expected result. After critical steps, tell the reader what they should see... This helps readers confirm they completed the step correctly.'"}, {"text": "To provide alternative methods for completing the step.", "isCorrect": false, "rationale": "Expected results confirm success and guide expectations for the next state, they do not offer alternative methods."}, {"text": "To give the reader background information about the task.", "isCorrect": false, "rationale": "Background information typically goes in an introduction, purpose statement, or notes, not directly after a step as an 'expected result.'"}], "id": "q07"}, {"question": "In the 'Setting Up a New Employee Email Account' model document, what is the primary purpose of the 'Prerequisites' section?", "options": [{"text": "To list the tools or information the reader must have *before* beginning the steps.", "isCorrect": true, "rationale": "The 'Prerequisites' section in the model document lists items like 'Your employee ID number' and 'A computer connected to the company network' as necessary items the reader must possess *before* starting the setup procedure."}, {"text": "To provide troubleshooting tips if the setup fails.", "isCorrect": false, "rationale": "Troubleshooting is a separate section in the model document, located at the very end."}, {"text": "To explain the expected outcome of completing the instructions.", "isCorrect": false, "rationale": "The 'Result' section serves this purpose, also located at the end of the instructions."}, {"text": "To introduce the topic and state the approximate time commitment.", "isCorrect": false, "rationale": "The 'Purpose' section fulfills this role at the beginning of the instructions."}], "id": "q08"}, {"question": "A new technical writer submits the following step: 'Locate and click the 'Settings' icon, then navigate to 'Account Preferences', and finally select 'Change Password'.' What specific guideline for writing numbered steps does this example violate?", "options": [{"text": "Use the imperative mood.", "isCorrect": false, "rationale": "The sentence *does* use imperative verbs ('Locate,' 'click,' 'navigate,' 'select'), so this rule is not violated here."}, {"text": "Start each step with a verb.", "isCorrect": false, "rationale": "The step starts with 'Locate,' which is a verb, adhering to this guideline."}, {"text": "Include the expected result.", "isCorrect": false, "rationale": "While this step doesn't include an expected result, the most significant and immediate violation is not this. The text suggests including expected results after *critical* steps, but this isn't a universal requirement for *every* step, nor is it the most obvious flaw."}, {"text": "One action per step.", "isCorrect": true, "rationale": "This single 'step' contains at least three distinct actions: 'Locate and click,' 'navigate,' and 'select.' The text clearly states, 'Each numbered step should contain exactly one action. When you pack multiple actions into a single step, readers lose their place.'"}], "id": "q09"}, {"question": "Considering all the principles discussed in the 'Writing Numbered Steps' section, what is the ultimate goal of adhering to these guidelines?", "options": [{"text": "To produce the shortest possible set of instructions.", "isCorrect": false, "rationale": "While conciseness is valued, the text explicitly warns against shortening by combining steps ('The Run-On Step'), which can lead to confusion rather than clarity. The goal is effectiveness, not just brevity."}, {"text": "To ensure the instructions are grammatically perfect and adhere to strict academic standards.", "isCorrect": false, "rationale": "While good grammar is important for clarity, the primary focus of these guidelines is on practical communication and user success in completing a task, not adherence to abstract academic standards for their own sake."}, {"text": "To make even complex tasks manageable and prevent reader confusion and errors.", "isCorrect": true, "rationale": "The very beginning of the section states, 'Clear, well-organized steps make even complex tasks manageable. Vague, poorly ordered steps turn simple tasks into nightmares.' This encapsulates the overarching goal of all the presented guidelines."}, {"text": "To demonstrate the writer's expertise in technical communication theory.", "isCorrect": false, "rationale": "The goal of technical writing is to serve the reader and enable them to complete a task successfully, not to showcase the writer's knowledge to other professionals."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
