        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental reason technical writers use visual aids?", "options": [{"text": "To reduce the overall word count of the document by replacing lengthy descriptions.", "isCorrect": false, "rationale": "While visual aids can sometimes condense information, their primary purpose is not merely to reduce word count but to convey information more effectively than words alone. The text states, 'Sometimes words alone are not enough.'"}, {"text": "To present information, such as surface texture or internal components, that words alone cannot effectively convey.", "isCorrect": true, "rationale": "The text explicitly states: 'Sometimes words alone are not enough. A photograph can show surface texture... A labeled diagram can reveal internal components that are invisible from the outside.' This highlights the unique capability of visuals to communicate certain types of information."}, {"text": "To make technical documents appear more professional and aesthetically pleasing.", "isCorrect": false, "rationale": "While a well-integrated visual aid can enhance professionalism, this is a secondary benefit, not the fundamental purpose. The core reason relates to clarity and effective information transfer."}, {"text": "To offer readers an alternative to reading extensive paragraphs, thus making the document quicker to skim.", "isCorrect": false, "rationale": "This is a benefit of certain visual aids like tables, which 'take seconds to scan,' but the overarching reason for *all* visual aids, as stated, is to convey information that words struggle to capture effectively, not just to speed up reading."}]}, {"question": "A technical writer needs to show the step-by-step process of assembling a complex piece of furniture, highlighting how each part fits relative to others. Which type of visual aid would be most effective for this purpose?", "options": [{"text": "A photograph", "isCorrect": false, "rationale": "A photograph shows actual appearance and surface finish but is less effective for illustrating the relationship of parts in an assembly process, especially if parts are hidden during steps or need to be shown separated."}, {"text": "A cross-section", "isCorrect": false, "rationale": "A cross-section reveals internal structure, layers, and wall thickness, which is not the primary goal when showing assembly steps and how parts connect."}, {"text": "An exploded view", "isCorrect": true, "rationale": "The text states an exploded view is 'Best for assembly instructions and bills of materials' because it shows 'all parts of an assembly separated along an axis,' making their relationship and order clear."}, {"text": "A schematic", "isCorrect": false, "rationale": "A schematic uses standardized symbols for components and connections, typically in electrical or plumbing systems, and is not suitable for showing the physical assembly of furniture parts."}]}, {"question": "In technical documentation, what is the defining characteristic of a 'schematic'?", "options": [{"text": "It shows the actual surface texture and color of an object or scene.", "isCorrect": false, "rationale": "This describes a photograph, not a schematic. Schematics are highly simplified and symbolic."}, {"text": "It uses standardized symbols to represent components and their connections in a simplified drawing.", "isCorrect": true, "rationale": "The text defines a schematic as 'A highly simplified diagram using standardized symbols to represent components and their connections.'"}, {"text": "It displays the interior of an object as if it has been sliced open along a plane.", "isCorrect": false, "rationale": "This describes a cross-section, which reveals internal structure rather than symbolic connections."}, {"text": "It separates all parts of an assembly along an axis, showing each part labeled.", "isCorrect": false, "rationale": "This describes an exploded view, used for assembly instructions, not a schematic."}]}, {"question": "A technical document describes a circuit board. A diagram of the board (Figure 5) appears on page 10. The text discussing this diagram first references it on page 12, stating 'As seen in Figure 5, the primary processor...' What rule for integrating visuals has been primarily violated?", "options": [{"text": "Explain what to notice.", "isCorrect": false, "rationale": "The text does indicate 'As seen in Figure 5, the primary processor...', which begins to explain what to notice. The primary violation is related to the placement of the reference itself."}, {"text": "Reference before appearance.", "isCorrect": true, "rationale": "The text explicitly states: 'Reference before appearance. Mention the figure or table in the text before it appears on the page.' In this scenario, the figure appears on page 10, but the first reference is on page 12, violating this rule."}, {"text": "Keep visuals near their references.", "isCorrect": false, "rationale": "While related (a visual appearing two pages before its first reference is not 'near'), the more fundamental rule violated here is the 'reference before appearance.' The visual has already been encountered by the reader before it's even acknowledged, making 'reference before appearance' the most direct violation."}, {"text": "Make visuals accessible.", "isCorrect": false, "rationale": "The scenario does not provide information about text descriptions or other accessibility features, so this rule is not addressed."}]}, {"question": "Consider the following snippet from a technical manual: 'The advanced cooling system prevents overheating. See Figure 4 below for details.' Followed directly by: [Figure 4: Cooling System Diagram]. What is the most significant improvement needed for this integration, according to the text's rules?", "options": [{"text": "The figure number should be placed above the diagram.", "isCorrect": false, "rationale": "The text states 'Every figure needs a number and a descriptive caption,' but does not specify its exact placement relative to the diagram itself, only that it needs to be clearly associated."}, {"text": "The text should appear after the diagram, not before.", "isCorrect": false, "rationale": "The rule 'Reference before appearance' dictates that the text *should* appear before the diagram, so this suggestion would violate the rule."}, {"text": "The diagram needs a more detailed caption.", "isCorrect": false, "rationale": "While a more detailed caption can always be beneficial, the most significant issue here, as highlighted by the text, is the instruction to 'Explain what to notice' in the text itself, beyond just referring to the figure."}, {"text": "The text should explain what specific features in the diagram the reader should observe and why they matter.", "isCorrect": true, "rationale": "The text explicitly advises: 'Explain what to notice. Do not just say “See Figure 3.” Tell the reader what the figure shows and why it matters.' The given snippet only refers to the figure without explaining its significance or pointing out key details."}]}, {"question": "A product manager wants to present information about a new safety feature. Which scenario would be least appropriate for using a table, according to the 'When to Use a Table' writing tip?", "options": [{"text": "Comparing the dimensions, weight, and battery life of three different models of the product.", "isCorrect": false, "rationale": "The tip suggests using a table when you have 'Three or more items with the same set of properties,' which this scenario fits perfectly."}, {"text": "Listing the specific torque values required for each of the 15 fasteners in the assembly.", "isCorrect": false, "rationale": "The tip recommends tables for 'A list of specifications with names and values' and 'Data that readers will need to look up rather than read sequentially,' both of which apply here."}, {"text": "Providing a narrative explanation of how the safety feature prevents accidents, including its historical development and impact.", "isCorrect": true, "rationale": "The tip states to 'Use running text when you have: Narrative information that needs context and explanation' or 'Information that must be read in order.' A narrative explanation of how a feature works falls into this category, making a table inappropriate."}, {"text": "Displaying a matrix of compatible accessories and their part numbers for the product.", "isCorrect": false, "rationale": "This scenario involves data that readers would likely 'need to look up rather than read sequentially,' making a table an appropriate choice."}]}, {"question": "What is the primary function of a Bill of Materials (BOM) in technical documentation?", "options": [{"text": "To illustrate the final assembled appearance of a product with labels.", "isCorrect": false, "rationale": "While a BOM is related to assembly, its primary function is not to show the *appearance* of the finished product; that would be a photograph or diagram."}, {"text": "To provide a structured list of every part and material required to build a product.", "isCorrect": true, "rationale": "The text explicitly defines a BOM as 'a structured list of every part and material needed to build a product.'"}, {"text": "To detail the step-by-step instructions for assembling a product.", "isCorrect": false, "rationale": "A BOM lists the *parts*, but assembly instructions (often with exploded views) detail the *steps*. While a BOM is a prerequisite for assembly, it is not the instructions themselves."}, {"text": "To compare the specifications of different product models or versions.", "isCorrect": false, "rationale": "Comparing specifications is a general use for tables, but not the specific, primary function of a Bill of Materials, which focuses on the components of a single product build."}]}, {"question": "A student is tasked with creating a Bill of Materials for a simple device. Based on the example and description provided in the text, which of the following is least essential to include in a comprehensive BOM entry for a single part?", "options": [{"text": "The exact dimensions of the part (e.g., length, width, thickness).", "isCorrect": false, "rationale": "The text highlights that a BOM provides 'exactly how big each part should be,' making dimensions essential."}, {"text": "The specific material the part is made of (e.g., steel, ABS plastic, plywood).", "isCorrect": false, "rationale": "The text notes a BOM includes 'what it is made of,' emphasizing the importance of material specifications."}, {"text": "The number of units of that particular part required for one assembly.", "isCorrect": false, "rationale": "The text specifies a BOM indicates 'how many are needed,' which is crucial for procurement and assembly."}, {"text": "The manufacturing process used to create the part (e.g., injection molding, CNC machining).", "isCorrect": true, "rationale": "While manufacturing processes are important in design and production, the text's description of a BOM's contents focuses on 'what each part is, what it is made of, how many are needed, and exactly how big each part should be.' It does not list the manufacturing process as an essential element for a general BOM, though material *grade* is mentioned in the example's notes."}]}, {"question": "The text states, 'Make visuals accessible. Provide a text description for every visual so that readers who cannot see the image still receive the information it contains.' Which of the following best explains the underlying principle behind this rule?", "options": [{"text": "To ensure legal compliance with disability acts, which mandate alternative text for images.", "isCorrect": false, "rationale": "While accessibility often relates to legal compliance, the rationale provided in the text focuses on the functional aspect of information transfer: 'so that readers who cannot see the image still receive the information it contains,' not the legal mandate itself."}, {"text": "To facilitate easier translation of documents into other languages, as text is easier to translate than embedded images.", "isCorrect": false, "rationale": "The text does not mention translation. The principle stated is about conveying information to those who cannot see the image, not about linguistic translation."}, {"text": "To guarantee that all readers, regardless of visual ability or device limitations, can access and comprehend the critical information conveyed by the visual.", "isCorrect": true, "rationale": "This option directly reflects the text's explanation: 'so that readers who cannot see the image still receive the information it contains.' It emphasizes inclusive communication of essential information."}, {"text": "To reduce document file sizes by allowing images to be omitted for users with slow internet connections.", "isCorrect": false, "rationale": "The text does not suggest omitting images or reducing file size as the purpose of text descriptions; rather, it's to supplement the image for those who cannot perceive it visually."}]}, {"question": "A project manager needs to document the internal structure of a new medical device, showing its layers and how different materials are used for various components. They also need to provide a list of 20 critical safety specifications for the device. Which combination of visual aids and integration strategies would be most effective?", "options": [{"text": "A photograph for the internal structure and a running text description for the specifications.", "isCorrect": false, "rationale": "A photograph is not ideal for revealing internal layers and materials. Running text is inefficient and harder to scan for '20 critical safety specifications,' which are best presented as lookup data."}, {"text": "A cross-section diagram for the internal structure and a table for the safety specifications.", "isCorrect": true, "rationale": "A cross-section is 'Best for revealing internal structure, layers, and wall thickness.' A table is 'Best for presenting specifications' and 'dozens of specifications into a format that takes seconds to scan,' which aligns with 20 critical safety specs."}, {"text": "An exploded view for the internal structure and a schematic for the safety specifications.", "isCorrect": false, "rationale": "An exploded view is for assembly, not for showing internal layers of a device. A schematic uses symbols for connections, not for listing detailed safety specifications."}, {"text": "A diagram showing the external features and a bulleted list for the specifications within the main text.", "isCorrect": false, "rationale": "A diagram for 'external features' would not show internal layers and materials. While a bulleted list is better than a paragraph for specifications, a table would be significantly more effective and scannable for 20 critical specifications, especially if readers need to look up specific values."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
