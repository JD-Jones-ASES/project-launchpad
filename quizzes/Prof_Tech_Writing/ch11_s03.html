<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear and Effective: Professional &amp; Technical Writing &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 11, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best encapsulates the core principle of 'task-oriented writing' in user documentation?", "options": [{"text": "It focuses on describing the features and capabilities of the software in detail.", "isCorrect": false, "rationale": "Feature-oriented writing describes what the software has, which is the opposite of task-oriented writing's focus on user actions."}, {"text": "It structures content around what the user wants to accomplish, often starting headings and steps with verbs.", "isCorrect": true, "rationale": "The text states, 'Task-oriented writing starts with a verb. Every section heading, every numbered step, and every topic sentence focuses on something the user wants to do.'"}, {"text": "It ensures that every section provides a comprehensive overview of a specific module or panel.", "isCorrect": false, "rationale": "While comprehensive, this still aligns more with a feature-oriented approach (describing 'what' a module is) rather than a task-oriented one (describing 'what the user does' with it)."}, {"text": "It emphasizes elegant prose and varied vocabulary to maintain reader engagement.", "isCorrect": false, "rationale": "Task-oriented writing prioritizes clarity and action over elegance or varied vocabulary, especially in technical documentation where consistency is key."}]}, {"question": "A technical writer is drafting a heading for a new section. They apply the 'How Do I' test and arrive at 'How do I change my profile picture?'. According to the text, what should the final heading be?", "options": [{"text": "User Profile Picture Management", "isCorrect": false, "rationale": "This heading is feature-oriented and does not directly convey a user task, failing the 'How Do I' test's intent."}, {"text": "Changing Your Profile Picture", "isCorrect": true, "rationale": "The text advises, 'Drop the 'How do I' from the final heading, and you have a clear, active section title,' making 'Changing Your Profile Picture' the correct application."}, {"text": "Guide to Profile Picture Options", "isCorrect": false, "rationale": "This is a descriptive, feature-oriented heading rather than a task-oriented one that answers 'How do I?'"}, {"text": "The Profile Picture Feature", "isCorrect": false, "rationale": "This is explicitly a feature-oriented heading, which the text contrasts with task-oriented writing."}]}, {"question": "A common mistake in documentation, 'synonym swapping,' is explicitly warned against. Why is using different words for the same concept dangerous in technical documentation?", "options": [{"text": "It makes the document longer and more difficult to navigate.", "isCorrect": false, "rationale": "While it might slightly increase length, the primary danger highlighted is confusion, not just length."}, {"text": "It forces the reader to wonder if different terms refer to different things, leading to confusion.", "isCorrect": true, "rationale": "The text states, 'Each new word forces the reader to wonder: is this the same thing, or something different?' and 'If you call it a 'roster' in one paragraph and a 'class list' in the next, the user may think those are two different things.'"}, {"text": "It demonstrates a lack of vocabulary on the part of the writer.", "isCorrect": false, "rationale": "The text suggests writers might be taught to avoid repetition, implying they have vocabulary, but it's detrimental in this context. The issue isn't the writer's vocabulary but the impact on the user."}, {"text": "It makes the documentation less elegant and engaging.", "isCorrect": false, "rationale": "The text explicitly says, 'Consistency beats elegance every time,' prioritizing clarity over elegance in documentation."}]}, {"question": "Which of the following is NOT a required component of a good 'getting started' section as outlined in the text?", "options": [{"text": "A detailed history of the product's development.", "isCorrect": true, "rationale": "The text outlines four key components: prerequisites, first-time setup, guiding through one basic task, and pointing to next steps. Product history is not mentioned as a required component."}, {"text": "A walk-through of the first-time setup process, if applicable.", "isCorrect": false, "rationale": "This is explicitly listed as a component: 'Walks through first-time setup.'"}, {"text": "A guide through one complete, basic task the user will commonly perform.", "isCorrect": false, "rationale": "This is explicitly listed as a component: 'Guides the user through one complete basic task.'"}, {"text": "A list of prerequisites the user needs before they begin.", "isCorrect": false, "rationale": "This is explicitly listed as a component: 'States prerequisites.'"}]}, {"question": "According to the 'Writing Tip,' when is the optimal time to write the 'getting started' section of a user guide, and why?", "options": [{"text": "First, to ensure that the document's foundational concepts are established early.", "isCorrect": false, "rationale": "The text explicitly advises against writing it first, as it often leads to vagueness or excessive detail due to incomplete product understanding."}, {"text": "Last, because it allows the writer to have a clearer picture of essential tasks and prerequisites.", "isCorrect": true, "rationale": "The text states, 'Even though the getting-started section goes first in the document, write it last. By the time you have written the rest of the guide, you will have a much clearer picture of which tasks are most important and what prerequisites matter.'"}, {"text": "Concurrently with the main content, to integrate setup instructions seamlessly.", "isCorrect": false, "rationale": "The tip suggests writing it after the main content is complete, not concurrently, to gain a full understanding of the product."}, {"text": "After user testing, to incorporate feedback on common initial difficulties.", "isCorrect": false, "rationale": "While user testing is good, the text's rationale for writing it last is based on the writer's comprehensive understanding after documenting the full product, not specifically post-user testing."}]}, {"question": "Under which circumstance would a technical writer most likely choose to *include* a screenshot in their documentation?", "options": [{"text": "When describing a simple, familiar action like 'Click Save.'", "isCorrect": false, "rationale": "The text advises to 'Skip the screenshot when: The action is simple and the interface is familiar ('Click Save').'"}, {"text": "When the screen displays personalized data that varies for each user.", "isCorrect": false, "rationale": "The text advises to 'Skip the screenshot when: The screen will look different for each user (personalized dashboards).'"}, {"text": "When the interface involved is complex and presents many options to the user.", "isCorrect": true, "rationale": "The text states, 'Use a screenshot when: The action involves a complex interface with many options.'"}, {"text": "When the software is expected to update frequently, quickly rendering images outdated.", "isCorrect": false, "rationale": "The text advises to 'Skip the screenshot when: The software updates frequently and the screenshot will quickly become outdated.'"}]}, {"question": "A software company frequently updates its user interface, causing elements to shift or change appearance regularly. Based on the documentation guidelines, what is the most appropriate approach regarding screenshots for this company?", "options": [{"text": "Invest heavily in high-quality, frequently updated screenshots to ensure accuracy.", "isCorrect": false, "rationale": "The text advises against using screenshots when 'The software updates frequently and the screenshot will quickly become outdated,' suggesting that frequent updates make screenshots a burden, not an investment priority."}, {"text": "Use screenshots only for core functionalities that are unlikely to change.", "isCorrect": true, "rationale": "The text implies that frequent updates make screenshots quickly outdated, so limiting them to stable elements would be a practical application of this advice, reducing maintenance burden and ensuring greater accuracy where they are used."}, {"text": "Prioritize text-based instructions exclusively, avoiding all screenshots to prevent obsolescence.", "isCorrect": false, "rationale": "While caution is advised, completely avoiding all screenshots might hinder understanding for complex interfaces or when showing results. The advice is to 'skip the screenshot when' updates are frequent, not to ban them entirely."}, {"text": "Include screenshots but add a disclaimer that images may not reflect the latest UI.", "isCorrect": false, "rationale": "A disclaimer might mitigate the issue, but the core advice is to 'skip the screenshot when' updates are frequent, implying it's better to avoid them where they will quickly become misleading rather than simply flagging them."}]}, {"question": "What is the primary function of a 'callout' on a screenshot in user documentation?", "options": [{"text": "To add artistic flair and visual appeal to the image.", "isCorrect": false, "rationale": "While they add visual elements, their primary purpose is instructional, not aesthetic. The text focuses on their teaching utility."}, {"text": "To credit the source or creator of the screenshot.", "isCorrect": false, "rationale": "Callouts are for guiding the user's attention within the image, not for attribution."}, {"text": "To transform the image into an active teaching tool by directing the user's attention to specific elements.", "isCorrect": true, "rationale": "The text states, 'Callouts... transform a screenshot from a passive image into an active teaching tool. A callout says, 'Look here.'' They prevent the user from hunting for the right button."}, {"text": "To reduce the file size of the screenshot for faster loading.", "isCorrect": false, "rationale": "Callouts are graphical annotations; they do not reduce file size and may even slightly increase it."}]}, {"question": "A developer needs to write a tooltip for an 'Export' button in an application. Which tooltip text best aligns with the guidelines for good tooltips?", "options": [{"text": "This button offers various data export functionalities for different report types.", "isCorrect": false, "rationale": "This tooltip is not action-oriented ('functionalities' instead of a verb) and less specific than desired, going against the 'Action-oriented' and 'Specific' guidelines."}, {"text": "Export functionality", "isCorrect": false, "rationale": "This is too short and not action-oriented, directly contrasting with the example given in the text: 'Export functionality' is incorrect, 'Click to export your grades as a PDF' is correct."}, {"text": "Click to export your grades as a PDF, CSV, or Excel file.", "isCorrect": true, "rationale": "This tooltip is short (one sentence), action-oriented ('Click to export'), and specific ('as a PDF, CSV, or Excel file'), matching all the guidelines provided in the text."}, {"text": "Provides options for exporting data. See the full manual for more details.", "isCorrect": false, "rationale": "While it mentions options, it's not as specific or action-oriented as it could be, and directing the user to a manual defeats the purpose of micro-documentation like a tooltip."}]}, {"question": "Based on the description of the 'Quick-Reference Card for SchoolSync App,' which characteristic is most crucial for its effectiveness?", "options": [{"text": "Its detailed explanations of every feature and setting.", "isCorrect": false, "rationale": "The text emphasizes conciseness ('keeps each entry to 2–3 sentences') and finding information quickly, not detailed explanations of every feature."}, {"text": "Its use of extensive graphics and colorful illustrations.", "isCorrect": false, "rationale": "The description does not mention extensive graphics; it highlights organization by task, bolding interactive elements, and conciseness."}, {"text": "Its organization by task, bolding of interactive elements, and conciseness.", "isCorrect": true, "rationale": "The text explicitly states, 'This quick-reference card works because it is organized by task, uses bold for interactive elements, and keeps each entry to 2–3 sentences.'"}, {"text": "Its inclusion of a comprehensive index for quick lookups.", "isCorrect": false, "rationale": "While an index aids lookup, the text credits the card's effectiveness to its task-based organization, bolding, and conciseness, allowing a student to 'find what they need in seconds—no scrolling through a long manual,' without mentioning an index."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
