<script>
var QUESTIONS = [{"question": "According to the text, why are budgets and timelines considered essential components of a proposal, rather than mere formalities?", "options": [{"text": "They are primarily used to impress the reader with the writer's organizational skills.", "isCorrect": false, "rationale": "While organization is a byproduct, the text states their primary role is to demonstrate practical planning, respect for resources, and 'having done your homework,' moving beyond just an idea."}, {"text": "They demonstrate that the project has moved from the idea stage to practical planning, showing respect for the reader's resources.", "isCorrect": true, "rationale": "The text explicitly states: 'These sections demonstrate that you have moved beyond the idea stage and into practical planning. They show that you respect the reader's resources and have done your homework.'"}, {"text": "They are legally required documents for any project seeking external funding.", "isCorrect": false, "rationale": "The text does not mention legal requirements for budgets and timelines, focusing instead on their practical utility for decision-makers and demonstrating preparedness."}, {"text": "They serve as a historical record of project costs and durations after the project is completed.", "isCorrect": false, "rationale": "While they can later be used for comparison, their role in a proposal is forward-looking: to help decision-makers evaluate the project 'before they say yes' based on cost and duration."}]}, {"question": "A project manager is creating a budget for a new initiative. Which of the following line items best adheres to the budget principle of 'Be specific'?", "options": [{"text": "Office Supplies: $300", "isCorrect": false, "rationale": "This entry is vague and doesn't allow the reader to verify the calculation or understand precisely what supplies are included, failing the 'Be specific' principle."}, {"text": "Training Manuals (50 copies @ $12.50 each): $625", "isCorrect": true, "rationale": "This option provides specific quantity and unit cost, allowing the reader to verify the math and understand exactly what is being purchased, aligning with the text's example of 'Workbooks (90 copies @ $4.50 each): $405'."}, {"text": "Consultant Fees: $2,500", "isCorrect": false, "rationale": "While a specific amount, it lacks detail about the consultant's hourly rate or estimated hours, making it less specific than ideal for verification."}, {"text": "Miscellaneous Expenses: $150", "isCorrect": false, "rationale": "This is inherently non-specific and should ideally be minimized or explained in a budget, often covered by a contingency fund rather than a vague line item."}]}, {"question": "The text advises including a 10–15% contingency in a budget and rounding up, not down, when estimating costs. What is the primary analytical reason for these practices?", "options": [{"text": "To ensure the project always generates a profit for the organization.", "isCorrect": false, "rationale": "The goal of a proposal budget is not necessarily profit generation, but accurate and realistic cost projection. A contingency is for unexpected costs, not profit."}, {"text": "To deter potential competitors by making the project appear more expensive.", "isCorrect": false, "rationale": "Budget principles emphasize honesty and transparency for the decision-makers, not strategic deterrence of competitors, which is outside the scope of internal proposal writing."}, {"text": "To demonstrate realistic planning and prevent the project from running out of funds due to unforeseen expenses.", "isCorrect": true, "rationale": "The text states, 'A 10–15% buffer for unexpected costs shows realistic planning,' and 'Underestimating costs... will backfire when you run out of money halfway through,' directly supporting this option."}, {"text": "To allow for a flexible budget that can be easily adjusted if the project scope changes dramatically.", "isCorrect": false, "rationale": "While a contingency provides flexibility, its primary purpose is for *unexpected* costs within the *existing* scope, not for dramatic scope changes, which would typically require a revised proposal."}]}, {"question": "A 'deliverable' is defined as 'a tangible product or result that must be provided at the end of a project or project phase.' What is its most significant role in a project proposal?", "options": [{"text": "To serve as a placeholder for tasks that are yet to be fully defined.", "isCorrect": false, "rationale": "Deliverables are concrete and defined products or results, not placeholders for vague tasks. They signify completion and progress."}, {"text": "To provide specific checkpoints for accountability and prove progress to decision-makers.", "isCorrect": true, "rationale": "The text states, 'Deliverables are how you prove progress. They are especially important in proposals because they give the reader specific checkpoints for accountability.'"}, {"text": "To inflate the perceived value of the project by listing numerous outputs.", "isCorrect": false, "rationale": "The purpose of deliverables is to provide clear, concrete evidence of progress and results, not to artificially inflate value. Honesty and transparency are key budget and timeline principles."}, {"text": "To outline the necessary resources, such as equipment and personnel, required for each phase.", "isCorrect": false, "rationale": "Resources are part of the budget and operational planning. Deliverables are the *results* of utilizing those resources, not the resources themselves."}]}, {"question": "After drafting a project budget, a writer applies the 'Explain to Your Principal' Test. Which scenario best illustrates a successful outcome of this test for a specific line item?", "options": [{"text": "The writer realizes they 'just guessed' the cost for training room rental and decides to remove it to simplify the budget.", "isCorrect": false, "rationale": "This indicates a failure of the test, as the writer couldn't provide a clear reason. Removing a necessary item due to a guess is not a successful outcome; it requires further research."}, {"text": "When asked about the $150 for training room rental, the writer can clearly articulate that it covers 3 sessions at a community center, including audio-visual equipment, for volunteer tutor training.", "isCorrect": true, "rationale": "The text explicitly states: 'If you can answer every such question with a clear, specific reason, your budget is strong.' This option demonstrates a clear, specific, and verifiable explanation."}, {"text": "The writer decides to combine several small, specific costs into a single 'Facilities Use' category to reduce the number of line items.", "isCorrect": false, "rationale": "While grouping by category is good, combining specific costs without clear breakdown for verification would likely fail the 'Explain to Your Principal' test, which emphasizes specificity and clear justification for *each* line item."}, {"text": "The writer determines that the principal is unlikely to question minor costs, so no further action is needed for the $150 training room rental.", "isCorrect": false, "rationale": "The test is about the *writer's* ability to justify, not the perceived likelihood of questioning. Assuming lack of scrutiny undermines the principle of transparency and preparedness."}]}, {"question": "A school district is evaluating a proposal for a new literacy program. Which statement from the proposal's cost-benefit analysis section would most effectively convince decision-makers?", "options": [{"text": "The program requires $15,000, which we believe is a worthwhile investment given the critical importance of student literacy.", "isCorrect": false, "rationale": "This statement is vague and lacks concrete benefits or comparative data, similar to the 'Missing Cost-Benefit' example in the text. It doesn't quantify worth."}, {"text": "At an annual cost of $15,000 for 250 students, the program costs $60 per student, a fraction of the cost of private tutoring, and is projected to reduce remedial reading courses by 20%, saving the district an estimated $500 per student in the long term.", "isCorrect": true, "rationale": "This statement aligns perfectly with the 'Clear Cost-Benefit' example: it translates total cost to a per-student cost, compares it to alternatives, and quantifies potential savings/benefits, making a strong financial case."}, {"text": "The program budget is significantly less than similar programs implemented in neighboring districts.", "isCorrect": false, "rationale": "While a comparative cost might be relevant, it doesn't quantify the *benefits* or ROI of *this specific program*, making it an incomplete cost-benefit analysis."}, {"text": "Implementing this program will enhance the school's reputation and student morale.", "isCorrect": false, "rationale": "These are intangible benefits that, while potentially true, are not quantified or tied directly to the cost, thus not forming a strong cost-benefit argument in the way the text describes."}]}, {"question": "According to the text, who is considered a 'stakeholder' in a project, and why is understanding them crucial for a strong proposal?", "options": [{"text": "Only the individuals or groups directly providing funding for the project, because their approval is essential.", "isCorrect": false, "rationale": "The text defines stakeholders as 'anyone who is affected by or has an interest in a project's outcome,' which is much broader than just funders, including students, parents, administration, etc."}, {"text": "Anyone who will be affected by the proposal or has an interest in its outcome, because a strong proposal addresses the concerns of multiple groups.", "isCorrect": true, "rationale": "This directly matches the definition provided: 'A stakeholder is anyone who will be affected by your proposal.' The text also states, 'A strong proposal addresses the concerns of multiple stakeholder groups.'"}, {"text": "Members of the project team responsible for implementation, because they need to be motivated.", "isCorrect": false, "rationale": "While the project team is interested, the definition of stakeholder is broader, encompassing anyone affected, even indirectly (e.g., parents, school board), not just those implementing."}, {"text": "Competitors of the proposing organization, whose reactions must be anticipated.", "isCorrect": false, "rationale": "The text focuses on internal or directly affected parties related to the project's success and approval, not external competitors."}]}, {"question": "In the complete proposal implementation flow, what step is listed immediately before 'Build the budget'?", "options": [{"text": "Research the problem.", "isCorrect": false, "rationale": "Researching the problem is the very first step, preceding developing the solution and identifying who will do what, which then precedes building the budget."}, {"text": "Create the timeline.", "isCorrect": false, "rationale": "Creating the timeline comes *after* building the budget in the listed flow."}, {"text": "Identify who will do what.", "isCorrect": true, "rationale": "The flow lists 'Develop a solution. Design specific, actionable steps. Identify who will do what.' as the step immediately preceding 'Build the budget.'"}, {"text": "Prepare the elevator pitch.", "isCorrect": false, "rationale": "Preparing the elevator pitch is one of the final steps in the proposal flow, for verbal delivery after the document is drafted."}]}, {"question": "The model budget for the 'After-School Math Tutoring Program' lists 'Funding Sources' separately from the detailed cost categories. What is the primary analytical purpose of presenting this information distinctly?", "options": [{"text": "To hide any potential funding shortfalls from the reader.", "isCorrect": false, "rationale": "The goal is transparency, not hiding shortfalls. The example shows funding slightly exceeding costs, providing a cushion."}, {"text": "To demonstrate how the total project costs will be covered, showing financial viability and responsibility.", "isCorrect": true, "rationale": "The text explicitly notes this feature: 'Funding sources are listed separately, showing how costs will be covered.' This directly demonstrates how the budget will be financed."}, {"text": "To allow for easy comparison with other funding opportunities.", "isCorrect": false, "rationale": "While comparison might be an indirect benefit, the primary purpose in the context of *this* proposal is to show how *its* costs will be met, not to facilitate a general comparison of funding opportunities."}, {"text": "To simplify the budget categories by removing funding details from the cost breakdown.", "isCorrect": false, "rationale": "Simplification is not the main reason; rather, it's about providing a complete financial picture that separates 'what it costs' from 'how we pay for it' for clarity and accountability."}]}, {"question": "The 'Writing Connection' section suggests that supporting arguments with specific, verifiable details, as practiced in budget writing, applies to all forms of writing. How might this skill be best demonstrated in a college application essay?", "options": [{"text": "By making broad claims about personal qualities, such as 'I am highly dedicated and a natural leader,' to emphasize self-confidence.", "isCorrect": false, "rationale": "The text explicitly states that 'concrete examples ('I tutored 12 students every Tuesday for two years') are more memorable than abstract claims ('I am very dedicated to helping others'), making this option incorrect."}, {"text": "By focusing on hypothetical scenarios and future aspirations, rather than past achievements, to show ambition.", "isCorrect": false, "rationale": "While future aspirations are relevant, the skill emphasizes 'specific, verifiable details,' which often relate to concrete past actions and achievements, not just hypotheticals."}, {"text": "By using precise numbers and examples, such as 'I led a team of 5 volunteers who collected 200 pounds of food for the local shelter,' to substantiate claims of leadership and community involvement.", "isCorrect": true, "rationale": "This option directly reflects the text's advice: 'concrete examples ('I tutored 12 students every Tuesday for two years') are more memorable than abstract claims.' It provides specific, verifiable details (5 volunteers, 200 pounds of food) to support a claim."}, {"text": "By employing complex vocabulary and sophisticated sentence structures to showcase advanced writing abilities.", "isCorrect": false, "rationale": "While good writing is important, the 'Writing Connection' focuses specifically on the *content* and *evidence* of arguments, not just stylistic choices. Specificity and verifiability are the key takeaways."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
