        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 15, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is identified as the most challenging aspect of writing effective white papers and technical proposals?", "options": [{"text": "Gathering sufficient data and evidence.", "isCorrect": false, "rationale": "While gathering data is crucial, the text explicitly states that 'finding the right balance' is the hardest part, not the data gathering itself."}, {"text": "Balancing technical details with persuasive language.", "isCorrect": true, "rationale": "The text states, 'The hardest part of writing these documents is finding the right balance. Lean too far toward technical detail... Lean too far toward persuasion...'"}, {"text": "Structuring the document logically and coherently.", "isCorrect": false, "rationale": "Logical structure is important, but the section focuses on the inherent tension between technical and persuasive elements as the primary challenge."}, {"text": "Adhering to strict formatting and citation guidelines.", "isCorrect": false, "rationale": "Formatting and citation are important for professionalism, but they are not presented as the most challenging aspect of balancing content."}]}, {"question": "According to the text, how do effective white papers and technical proposals primarily establish authority?", "options": [{"text": "By using strong, assertive language to highlight superiority.", "isCorrect": false, "rationale": "This approach aligns with 'too salesy' writing, which actually undermines credibility rather than establishing authority."}, {"text": "By presenting comprehensive evidence, data, and analysis.", "isCorrect": true, "rationale": "The text states, 'The most effective white papers and technical proposals establish authority through evidence rather than through self-promotion. Let your data, research, and analysis do the persuading.'"}, {"text": "By focusing solely on technical specifications without interpretation.", "isCorrect": false, "rationale": "This approach describes 'too dry' writing, which fails to persuade because it lacks interpretation and meaning for the reader."}, {"text": "By clearly stating the writer's credentials and experience upfront.", "isCorrect": false, "rationale": "While credentials can be part of a proposal, the text emphasizes that the content's evidence, not self-promotion, is the primary way to establish authority."}]}, {"question": "A report states: 'Project A costs $15,000. Project B costs $12,500. Project C costs $18,000.' Based on the section's advice, this statement is problematic because it:", "options": [{"text": "Lacks sufficient technical detail for a decision-maker.", "isCorrect": false, "rationale": "The statement provides technical details (costs), but the problem is not the lack of detail itself, but the lack of meaning derived from it."}, {"text": "Uses overly persuasive language without support.", "isCorrect": false, "rationale": "There is no persuasive language in the given statement; it is purely factual reporting."}, {"text": "Presents raw data without analysis or interpretation of its significance.", "isCorrect": true, "rationale": "This example mirrors the 'Data Without Interpretation' problem, where data is presented as 'raw material' without explaining what it means or why it matters."}, {"text": "Fails to acknowledge the project's limitations.", "isCorrect": false, "rationale": "While acknowledging limitations is a good practice, the primary issue with this specific statement is the absence of analysis, not a missing disclaimer."}]}, {"question": "Which of the following sentences would most likely reduce a proposal's credibility, according to the text?", "options": [{"text": "Our software reduced client operational costs by an average of 15% in Q3.", "isCorrect": false, "rationale": "This statement provides specific, verifiable evidence, which builds credibility."}, {"text": "Independent studies confirm the superior efficiency of our patented process.", "isCorrect": false, "rationale": "While relying on external validation is good, the issue of credibility primarily arises if these studies are not cited or presented. However, compared to option C, this is less directly problematic in terms of 'salesy' language."}, {"text": "This groundbreaking solution will revolutionize your industry with its unparalleled performance.", "isCorrect": true, "rationale": "This sentence uses unsupported superlatives ('groundbreaking,' 'revolutionize,' 'unparalleled') and aggressive sales language, which the text explicitly states 'reduce credibility because they signal that the writer is more interested in selling than in providing accurate information.'"}, {"text": "We project a 25% return on investment within two years, based on historical data.", "isCorrect": false, "rationale": "This statement provides a specific projection backed by a reference to historical data, making it a credible claim."}]}, {"question": "The 'Says Who?' test is primarily designed to help writers:", "options": [{"text": "Ensure their document adheres to professional formatting standards.", "isCorrect": false, "rationale": "The 'Says Who?' test is about content validation, not document formatting."}, {"text": "Verify that every claim made is supported by evidence or can be.", "isCorrect": true, "rationale": "The text explains, 'If a skeptical reader asked 'Says who?' after every sentence, could I answer?' and advises adding a source or softening the claim if evidence is lacking."}, {"text": "Determine if the language is accessible to a general audience.", "isCorrect": false, "rationale": "While important, accessibility is a separate concern from the 'Says Who?' test, which focuses on evidentiary support for claims."}, {"text": "Prevent the accidental inclusion of confidential information.", "isCorrect": false, "rationale": "This test is not related to information security or confidentiality."}]}, {"question": "A technical proposal for a new air filtration system states, 'While highly effective against airborne allergens, this system requires monthly filter replacement, which may be a consideration for budget-sensitive clients.' This statement primarily serves to:", "options": [{"text": "Demonstrate the writer's extensive technical knowledge.", "isCorrect": false, "rationale": "While it shows knowledge, its primary purpose in this context is not merely to display expertise."}, {"text": "Alert readers to potential legal disclaimers.", "isCorrect": false, "rationale": "It's an honest acknowledgment, not necessarily a legal disclaimer."}, {"text": "Increase credibility by honestly acknowledging a limitation.", "isCorrect": true, "rationale": "The text advises, 'Admitting what your solution cannot do actually increases credibility,' and provides a similar example of acknowledging limitations to build trust."}, {"text": "Suggest an opportunity for future product development.", "isCorrect": false, "rationale": "While it might indirectly hint at future improvements, its direct function, as described in the text, is to build credibility by being transparent."}]}, {"question": "When the text advises writers to 'Write for the decision-maker,' it means that writers should:", "options": [{"text": "Tailor the document's design to appeal to senior executives.", "isCorrect": false, "rationale": "The advice focuses on the content and its relevance to decision-making, not purely on aesthetic design."}, {"text": "Focus on translating technical details into practical outcomes and benefits.", "isCorrect": true, "rationale": "The text explicitly states to 'Help them by clearly connecting your technical findings to practical outcomes: cost savings, risk reduction, improved performance, compliance with regulations.'"}, {"text": "Use advanced technical jargon to impress a knowledgeable audience.", "isCorrect": false, "rationale": "This contradicts the 'Common Mistake: Hiding Behind Complexity' section, which advises against dense technical language for decision-makers."}, {"text": "Exclude any negative information that might sway a decision against the proposal.", "isCorrect": false, "rationale": "This contradicts the advice to 'Acknowledge limitations honestly' to build credibility."}]}, {"question": "A project manager presents a report stating, 'The system's modular architecture facilitates asynchronous processing, mitigating potential for deadlock conditions within distributed computational nodes.' For an audience of non-technical stakeholders, this statement would be considered a 'common mistake' because it:", "options": [{"text": "Lacks sufficient supporting data or evidence.", "isCorrect": false, "rationale": "The statement makes a technical claim, but the problem identified is the language used, not necessarily the lack of evidence at this point."}, {"text": "Fails to acknowledge the system's limitations.", "isCorrect": false, "rationale": "The statement is not about limitations, but about a technical feature. The issue is how that feature is communicated."}, {"text": "Uses dense technical language that obscures the practical implications for the audience.", "isCorrect": true, "rationale": "This directly aligns with the 'Hiding Behind Complexity' common mistake, where writers use jargon instead of translating technical data into terms the audience can act on and understand."}, {"text": "Is overly persuasive and uses promotional language.", "isCorrect": false, "rationale": "The language is technical and descriptive, not promotional or 'salesy.'"}]}, {"question": "Based on the 'Data Without Interpretation vs. Data with Analysis' example, which statement best describes the difference between reporting data and analyzing data?", "options": [{"text": "Reporting data involves presenting raw facts, while analyzing data explains their significance and implications.", "isCorrect": true, "rationale": "The 'before' version in the text simply lists numbers (reporting), while the 'after' version identifies outliers, calculates deviations, compares, and draws conclusions (analyzing)."}, {"text": "Reporting data uses complex technical terms, while analyzing data simplifies them for a general audience.", "isCorrect": false, "rationale": "Both reporting and analyzing can involve technical terms; the distinction lies in the interpretation, not necessarily the simplification of language, though accessibility is often a goal of good analysis."}, {"text": "Reporting data focuses on future projections, while analyzing data reviews past performance.", "isCorrect": false, "rationale": "Both reporting and analysis can apply to past, present, or future data. This is not the fundamental distinction."}, {"text": "Reporting data is objective, while analyzing data is inherently subjective and biased.", "isCorrect": false, "rationale": "Good analysis should aim for objective interpretation, drawing reasonable conclusions from evidence, rather than being inherently subjective or biased."}]}, {"question": "All of the following are recommended techniques for achieving a balanced tone in white papers and proposals, *except*:", "options": [{"text": "Using comparisons and benchmarks to contextualize results.", "isCorrect": false, "rationale": "The text explicitly recommends to 'Use comparisons and benchmarks' as a technique for balanced writing."}, {"text": "Presenting strong claims upfront and then scrambling to find evidence to support them.", "isCorrect": true, "rationale": "The text explicitly advises the opposite: 'Do not open with a bold claim and then scramble to find evidence to support it. Let evidence precede conclusions.'"}, {"text": "Translating complex technical details into terms accessible to the target audience.", "isCorrect": false, "rationale": "The 'Common Mistake: Hiding Behind Complexity' section advises against using dense technical language and instead to 'Translate technical data into terms your audience can act on.'"}, {"text": "Honestly acknowledging the limitations of your solution or approach.", "isCorrect": false, "rationale": "The text recommends to 'Acknowledge limitations honestly' as a strategy for increasing credibility."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
