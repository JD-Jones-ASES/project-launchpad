<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear and Effective: Professional &amp; Technical Writing &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 13, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the single most common error in analytical and recommendation reports?", "options": [{"text": "Providing too many specific data points without context.", "isCorrect": false, "rationale": "While providing data without context is addressed as a writing tip, the text explicitly states the 'single most common error' is confusing findings, conclusions, and recommendations."}, {"text": "Confusing findings, conclusions, and recommendations.", "isCorrect": true, "rationale": "The text states, 'The single most common error in analytical and recommendation reports is confusing findings, conclusions, and recommendations.'"}, {"text": "Failing to include specific numbers and sources in findings.", "isCorrect": false, "rationale": "This describes a poor finding, but not the primary error identified, which is the miscategorization of report elements."}, {"text": "Making recommendations that are not practical or prioritized.", "isCorrect": false, "rationale": "This is a characteristic of poor recommendations, but the core issue highlighted is the fundamental confusion between the three report sections."}], "id": "q01"}, {"question": "Based on the 'Three-Step Chain' and characteristics described, which statement below is an example of a pure 'finding'?", "options": [{"text": "The marketing campaign was effective, indicating a strong return on investment.", "isCorrect": false, "rationale": "This statement includes an interpretation ('effective,' 'indicating a strong return'), making it a conclusion, not a pure finding."}, {"text": "Revenue increased by 12% in the third quarter compared to the previous quarter.", "isCorrect": true, "rationale": "This is a factual, specific, and verifiable statement with numbers and no interpretation, fitting the definition of a finding ('What did the data show?')."}, {"text": "We should increase the marketing budget by 15% for the next fiscal year.", "isCorrect": false, "rationale": "This is a proposed action, making it a recommendation, not a finding."}, {"text": "The increase in revenue suggests that customer engagement strategies have been successful.", "isCorrect": false, "rationale": "This statement interprets the meaning of data ('suggests,' 'successful'), making it a conclusion, not a finding."}], "id": "q02"}, {"question": "Given the finding: 'Of the 845 students surveyed, 315 (37.3%) reported riding the school bus as their primary transportation,' which of the following is the most appropriate conclusion?", "options": [{"text": "More students should be encouraged to ride the school bus to reduce traffic congestion.", "isCorrect": false, "rationale": "This is a proposed action, making it a recommendation, not a conclusion."}, {"text": "Only 37.3% of students rely on the school bus, indicating that alternative transportation methods are prevalent or preferred among the majority.", "isCorrect": true, "rationale": "This statement interprets the finding ('indicating that...') and draws an inference about what the data means, aligning with the definition of a conclusion."}, {"text": "315 students ride the bus, while 530 (62.7%) do not.", "isCorrect": false, "rationale": "This is merely a re-statement and slight re-calculation of the finding, not an interpretation of its meaning."}, {"text": "The school bus service should be re-evaluated for efficiency and student satisfaction.", "isCorrect": false, "rationale": "This is a proposed action or an area of investigation, making it a recommendation, not a conclusion about what the existing data means."}], "id": "q03"}, {"question": "Which statement accurately describes the relationship between findings, conclusions, and recommendations?", "options": [{"text": "Conclusions are opinions based on general knowledge, while findings are specific data points.", "isCorrect": false, "rationale": "Conclusions must be supported by findings and logical, not just opinions based on general knowledge. Findings are indeed specific data points."}, {"text": "Recommendations are specific actions, findings are verifiable facts, and conclusions are interpretations that link the two.", "isCorrect": true, "rationale": "This statement correctly defines each term and describes their logical sequence as presented in the 'Three-Step Chain' and subsequent explanations."}, {"text": "Findings should include interpretation and judgment to guide the reader effectively.", "isCorrect": false, "rationale": "The text explicitly states that findings should be 'Factual. No interpretation, no opinion, no judgment.'"}, {"text": "Recommendations can be made directly from findings, bypassing the need for conclusions.", "isCorrect": false, "rationale": "The text warns that 'Recommendations without conclusions are just guesses,' emphasizing the necessity of conclusions to bridge findings to recommendations."}], "id": "q04"}, {"question": "According to the 'Sorting Test,' if you can verify a statement with raw data, what is it?", "options": [{"text": "A conclusion.", "isCorrect": false, "rationale": "Conclusions interpret data; they are not directly verifiable with raw data alone, but rather derived from it."}, {"text": "A recommendation.", "isCorrect": false, "rationale": "Recommendations propose action and are not directly verifiable with raw data."}, {"text": "A finding.", "isCorrect": true, "rationale": "The Sorting Test explicitly states: 'Can I verify it with raw data? It is a finding.'"}, {"text": "An opinion.", "isCorrect": false, "rationale": "Opinions are subjective and not verifiable with raw data in the context of reports."}], "id": "q05"}, {"question": "When writing a conclusion, what is a crucial characteristic to ensure it is robust and credible?", "options": [{"text": "It must introduce new data not previously mentioned in the findings.", "isCorrect": false, "rationale": "Conclusions must be 'Supported' by findings already presented. Introducing new data at the conclusion stage is inappropriate."}, {"text": "It should be clearly distinguished from findings and traceable to one or more findings.", "isCorrect": true, "rationale": "The text specifies that conclusions must be 'Supported. Every conclusion must be traceable to one or more findings' and 'Clearly distinguished from findings' with signaling phrases."}, {"text": "It should propose specific steps the reader should take.", "isCorrect": false, "rationale": "Proposing specific steps is the role of a recommendation, not a conclusion."}, {"text": "It must avoid any logical inference to prevent overreach.", "isCorrect": false, "rationale": "Conclusions are interpretations and draw inferences, but they must be 'Logical' and 'Do not overreach.'"}], "id": "q06"}, {"question": "How does mastering the distinction between findings and conclusions benefit a student writing a science lab report?", "options": [{"text": "It helps them focus solely on experimental procedures in the results section.", "isCorrect": false, "rationale": "While experimental procedures are part of a lab report, the distinction primarily impacts how results (findings) are presented versus how they are discussed (conclusions)."}, {"text": "It ensures they discuss what the data means in the Discussion section, rather than simply reporting raw results.", "isCorrect": true, "rationale": "The 'Writing Connection' section explicitly states this: 'Results section = Findings (what the data shows)', 'Discussion section = Conclusions (what the results mean)'. Mixing these up is a common error that leads to lost points."}, {"text": "It allows them to skip the 'Results' section entirely if the 'Discussion' is strong.", "isCorrect": false, "rationale": "Both sections are critical; the distinction helps ensure each fulfills its proper role, not to eliminate one."}, {"text": "It encourages them to make policy recommendations based on their scientific observations.", "isCorrect": false, "rationale": "While lab reports might have implications/future work (recommendations), the primary benefit described is separating data (results) from interpretation (discussion)."}], "id": "q07"}, {"question": "A business report includes the statement: 'The average response time for customer inquiries decreased from 3.5 hours to 2.1 hours over the past quarter, compared to the industry average of 2.8 hours.' In this statement, '2.8 hours' serves as what?", "options": [{"text": "A metric.", "isCorrect": false, "rationale": "While 'average response time' is a metric, '2.8 hours' in this context is specifically a point of comparison to give meaning to the company's performance, thus a benchmark."}, {"text": "A recommendation.", "isCorrect": false, "rationale": "A recommendation is an action, not a comparative value."}, {"text": "A finding.", "isCorrect": false, "rationale": "The company's 3.5 and 2.1 hours are findings. The 2.8 hours is used as a context to interpret these findings, making it a benchmark."}, {"text": "A benchmark.", "isCorrect": true, "rationale": "The text defines a benchmark as 'a standard of comparison—a reference point that gives context to your data.' The 2.8 hours (industry average) serves exactly this purpose."}], "id": "q08"}, {"question": "According to the 'Writing Tip: Always Provide Context for Numbers,' what three questions should every number in a report answer?", "options": [{"text": "Who collected it? Why was it collected? What challenges were faced?", "isCorrect": false, "rationale": "These questions are related to research methodology but are not the specific contextual questions for numbers outlined in the text."}, {"text": "What is it? How does it compare? Is it going up or down?", "isCorrect": true, "rationale": "The 'Writing Tip' explicitly states: 'Every number in your report should answer three questions: What is it? How does it compare? Is it going up or down?'"}, {"text": "Is it accurate? Is it relevant? Is it surprising?", "isCorrect": false, "rationale": "While important considerations, these are not the three specific questions for providing numerical context listed in the text."}, {"text": "How will it impact the budget? What actions are needed? Who is responsible?", "isCorrect": false, "rationale": "These questions relate to recommendations and actions, not the context for understanding a number itself."}], "id": "q09"}, {"question": "Which of the following scenarios best demonstrates a common error in report writing, as described in the section 'Mixed-Up Report Section vs. Properly Sorted Report Section'?", "options": [{"text": "A report clearly separates sections for raw survey data, analysis of the data's implications, and proposals for future projects.", "isCorrect": false, "rationale": "This describes a properly sorted report, where raw data (findings), analysis (conclusions), and proposals (recommendations) are distinct."}, {"text": "A paragraph states, 'The survey results (34% satisfaction) indicate student dissatisfaction, so we should switch vendors immediately to improve food quality.'", "isCorrect": true, "rationale": "This example directly mirrors the 'Mixed-Up Report Section' from the text, where a finding ('34% satisfaction'), a conclusion ('indicate student dissatisfaction'), and a recommendation ('switch vendors immediately') are jumbled into a single statement."}, {"text": "A report presents a list of key performance indicators (metrics) without comparing them to industry benchmarks.", "isCorrect": false, "rationale": "This is an issue with providing context for numbers and utilizing benchmarks, but it's not the primary error of mixing findings, conclusions, and recommendations."}, {"text": "A report provides detailed methodologies for data collection but omits the actual data points.", "isCorrect": false, "rationale": "This describes missing findings, but not the error of confusing the three distinct types of statements within a report."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
