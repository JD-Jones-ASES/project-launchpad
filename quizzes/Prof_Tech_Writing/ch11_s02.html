<script>
var QUESTIONS = [{"question": "Why is effective organization crucial for large user guides, such as a 200-page manual for an accounting system?", "options": [{"text": "It primarily helps writers by creating a clear outline during the drafting process, reducing writer's block.", "isCorrect": false, "rationale": "While organization does help writers, the primary benefit for large user guides is for the reader to find information. The text states organization is 'the difference between a helpful guide and a digital paperweight' because 'readers cannot find what they need.'"}, {"text": "It ensures readers can quickly and efficiently locate the specific information they need, preventing the document from becoming unusable.", "isCorrect": true, "rationale": "The text explicitly states that without proper organization, such manuals 'will be useless if readers cannot find what they need,' highlighting reader navigation as the crucial aspect."}, {"text": "It minimizes the total page count by condensing information, making the document appear less daunting.", "isCorrect": false, "rationale": "Organization focuses on structure and access, not necessarily on reducing page count. In fact, chunking information might even increase page count slightly due to headings and white space, but it improves usability."}, {"text": "It allows for the integration of more multimedia elements, making the guide more engaging for the user.", "isCorrect": false, "rationale": "Multimedia integration is a separate design choice and is not directly addressed as a primary reason for the foundational 'organization' of content discussed in the text."}]}, {"question": "A technical writer is organizing a user guide for a new software feature. They create a Level 1 heading 'Managing User Permissions' and then a single Level 2 heading 'Assigning Roles.' According to the rule of thumb for heading hierarchy, what action should the writer consider?", "options": [{"text": "The structure is perfectly acceptable, as long as the Level 2 heading accurately describes its content.", "isCorrect": false, "rationale": "The 'Rule of thumb' states, 'If you have a Level 2 heading, you should have at least two of them under the same Level 1 heading.' A single subsection indicates a potential organizational issue."}, {"text": "The writer should consider creating additional Level 2 headings under 'Managing User Permissions' or folding 'Assigning Roles' content into the Level 1 section.", "isCorrect": true, "rationale": "The text's 'Rule of thumb' advises that 'A single subsection under a section usually means the heading is unnecessary—fold that content into the section above it,' or create at least two Level 2 headings."}, {"text": "The writer should elevate 'Assigning Roles' to a Level 1 heading, as it seems to be a significant topic.", "isCorrect": false, "rationale": "Elevating it to a Level 1 heading would disrupt the hierarchy if 'Managing User Permissions' is indeed a broader category. The issue is having only one Level 2 heading, not the significance of the topic itself."}, {"text": "The writer should rename the Level 1 heading to 'Assigning Roles' to match the single Level 2 heading more closely.", "isCorrect": false, "rationale": "Renaming the Level 1 heading might narrow its scope too much if other permission management topics are intended to be covered. The problem lies with the singular Level 2 heading, not the name of the Level 1 heading."}]}, {"question": "Which of the following sets of headings best demonstrates the principle of specific, task-oriented, and scannable organization, as advocated in the text?", "options": [{"text": "A) Section 1: Introduction; Section 2: Core Functions; Section 3: Advanced Topics", "isCorrect": false, "rationale": "These headings are vague and generic, similar to the 'before' examples like 'Using the System' and 'More Information,' which tell the reader little about the content."}, {"text": "B) Section 1: Getting Started; Section 2: Daily Operations; Section 3: System Management", "isCorrect": false, "rationale": "While slightly better than option A, these headings are still somewhat broad and lack the specificity and task-orientation demonstrated by the 'after' examples in the text."}, {"text": "C) Section 1: Setting Up Your Account; Section 2: Creating New Projects; Section 3: Generating Reports", "isCorrect": true, "rationale": "These headings are specific, task-oriented ('Setting Up,' 'Creating,' 'Generating'), and scannable, directly mirroring the 'after' examples provided in the text like 'Entering and Editing Grades' and 'Running Grade Reports.'"}, {"text": "D) Section 1: Overview; Section 2: Features; Section 3: Troubleshooting", "isCorrect": false, "rationale": "'Overview' and 'Features' are general and not task-oriented. 'Troubleshooting' is more specific but still less detailed than the ideal specific action-oriented headings."}]}, {"question": "A user guide employs numbered sections (e.g., 1.0, 1.1, 2.0). What is the most significant advantage this provides for users and support staff?", "options": [{"text": "It makes the document appear more professional and formal, enhancing credibility.", "isCorrect": false, "rationale": "While it can contribute to a professional appearance, the text emphasizes the practical benefit of precise communication and easier reference, not primarily aesthetic or credibility concerns."}, {"text": "It allows for easier calculation of the total number of sections and subsections within the document.", "isCorrect": false, "rationale": "Counting sections is a minor, secondary benefit. The main advantage is about navigation and communication, not quantitative analysis of the document structure itself."}, {"text": "It enables precise communication and simplified cross-referencing, allowing readers to quickly pinpoint exact locations for information.", "isCorrect": true, "rationale": "The text states, 'Numbered sections let readers and support staff communicate precisely: “Look at Section 3.2” is much faster than “It's somewhere in the middle of the grades part.”' It also mentions 'Cross-references become easier with numbered sections.'"}, {"text": "It automatically generates a dynamic table of contents that updates with every edit.", "isCorrect": false, "rationale": "Numbered sections facilitate a table of contents, but the automatic generation and dynamic updating are functions of document software, not an inherent property of numbering itself."}]}, {"question": "A technical writer is preparing content for a section on user settings. Which of the following proposed chunk headings best adheres to the 'One Question' Test for effective chunking?", "options": [{"text": "Account Information", "isCorrect": false, "rationale": "This heading is vague and, as noted in the 'Writing Tip,' 'probably tries to cover too much.' It doesn't answer a specific user question."}, {"text": "User Preferences", "isCorrect": false, "rationale": "Similar to 'Account Information,' this heading is too broad and doesn't pose a specific question a user would ask, failing the 'One Question' Test."}, {"text": "Settings Overview", "isCorrect": false, "rationale": "This is a general heading that offers an overview rather than a specific task or question a user might have, thus failing the 'One Question' Test."}, {"text": "How Do I Change My Notification Settings?", "isCorrect": true, "rationale": "This heading directly poses a user's question, which, according to the 'Writing Tip: The “One Question” Test,' indicates that 'the chunk is probably well-scoped.'"}]}, {"question": "Beyond helping readers find specific information, what is another significant advantage of 'chunking' information for both users and writers?", "options": [{"text": "It allows for more creative and engaging narrative writing, as information is broken into smaller stories.", "isCorrect": false, "rationale": "Chunking prioritizes clarity, navigability, and task-orientation over narrative storytelling. The text does not suggest it's for creative narrative."}, {"text": "It enables writers to update specific pieces of content efficiently without having to re-evaluate or rewrite large, continuous sections.", "isCorrect": true, "rationale": "The text explicitly states, under 'Why chunk?', that 'Writers can update content. When the password policy changes, you update one chunk instead of searching through a long, flowing narrative.'"}, {"text": "It encourages the use of more complex technical jargon, as each chunk can introduce new terminology.", "isCorrect": false, "rationale": "Chunking aims for clarity and accessibility, generally discouraging unnecessary jargon. It doesn't inherently promote or discourage complex language."}, {"text": "It reduces the overall file size of digital documents, improving loading times.", "isCorrect": false, "rationale": "Chunking involves organizing content logically, not compressing it or reducing file size. In fact, adding more headings and sub-sections could even slightly increase file size."}]}, {"question": "A user is trying to find instructions for configuring advanced email filters in a digital user guide. They navigate from the home page to 'Email Settings,' then click 'Filter Options,' then 'Advanced Rules,' and finally have to scroll through several pages of detailed explanations to find the specific rule they need. According to the Three-Click Rule, what does this scenario suggest?", "options": [{"text": "The document's organization is likely effective, as the user eventually found the information.", "isCorrect": false, "rationale": "The Three-Click Rule aims for finding information within three steps/clicks. The described scenario involves more than three steps (home page to Email Settings = 1, Filter Options = 2, Advanced Rules = 3, and then scrolling through 'several pages' indicates an issue within that final 'article' or 'chunk' beyond just the initial clicks)."}, {"text": "The document's organization needs improvement, as the user required too many steps/clicks and extensive scrolling to locate specific information.", "isCorrect": true, "rationale": "The text states, 'If a user needs more than three steps, the document's organization needs work. Either the table of contents is too vague, the sections are too long, or the headings are not specific enough.' Exceeding three clicks and needing to scroll 'several pages' aligns with this assessment."}, {"text": "The problem lies with the user's searching skills, not the document's organization.", "isCorrect": false, "rationale": "The Three-Click Rule is a test of the document's organization, assuming a reasonable user. Blaming the user shifts responsibility away from the documentation's design."}, {"text": "The issue is solely due to the document being digital; print documents would not have this problem.", "isCorrect": false, "rationale": "The Three-Click Rule applies to both print and digital documents, with analogous steps (open TOC, find section, flip page vs. clicks). The issue is organizational, not medium-dependent."}]}, {"question": "A software company's user manual has a section titled 'Interface Modules' with subsections like 'Dashboard Module,' 'Reports Module,' and 'Settings Module.' Each subsection then details every button and field within that module. A technical writer reviews this structure based on the provided text. What is the most significant issue with this organization?", "options": [{"text": "The use of the word 'Module' is too technical and should be replaced with simpler language.", "isCorrect": false, "rationale": "While clarity in language is important, the core problem identified in the text is the structural approach, not just specific word choice. The 'Common Mistake' focuses on the organizational principle."}, {"text": "The manual is organized by the product's internal features rather than by the tasks users want to accomplish.", "isCorrect": true, "rationale": "This describes the 'Common Mistake: Organizing by Feature, Not by Task.' The text states, 'Writers who know a product well tend to organize documentation the way the product is built... But users do not think that way. ... Always organize by task—by what the user wants to accomplish.'"}, {"text": "The document relies too heavily on a hierarchical structure instead of a flat list of topics.", "isCorrect": false, "rationale": "The text strongly advocates for a consistent heading hierarchy, not a flat list. The issue is *what* the hierarchy is based on, not the existence of hierarchy itself."}, {"text": "There are too many subsections, violating the 'rule of thumb' for heading hierarchy.", "isCorrect": false, "rationale": "The 'rule of thumb' refers to having *at least two* Level 2 headings. While having too many could be an issue in general, the primary problem here, according to the 'Common Mistake,' is the basis of the organization (feature-based) rather than the quantity of subsections."}]}, {"question": "The 'Getting Started with Gradebook Pro' model document includes a 'What You Will Need' section at the beginning and a 'What's Next?' section with cross-references at the end. What key principles of effective documentation organization do these sections primarily demonstrate?", "options": [{"text": "The importance of using bullet points for lists and bolding key terms for emphasis.", "isCorrect": false, "rationale": "While the model document uses bullet points, the 'What You Will Need' and 'What's Next?' sections specifically illustrate setting expectations and providing navigation, not just formatting."}, {"text": "Setting clear expectations for users and providing effective navigation pathways to related information or further steps.", "isCorrect": true, "rationale": "The 'What You Will Need' section 'Lists prerequisites' to 'prevents frustration,' setting expectations. The 'What's Next?' section 'points readers to related tasks,' demonstrating effective navigation via cross-references."}, {"text": "Adherence to the 'Three-Click Rule' and the 'One Question' Test for chunking.", "isCorrect": false, "rationale": "While these are important principles from the text, the 'What You Will Need' and 'What's Next?' sections specifically relate to setting expectations and navigation, rather than the Three-Click Rule's measurement of access depth or the chunking test."}, {"text": "Organizing by feature rather than by task, reflecting the software's architecture.", "isCorrect": false, "rationale": "This statement describes a 'Common Mistake' that the model document *avoids*. The model document is task-oriented ('Log In,' 'Set Up Classes')."}]}, {"question": "A student is writing a 15-page research paper and is struggling with its structure, fearing it might become a 'wall of text.' Based on the principles discussed for organizing large documents, which piece of advice would be most beneficial for them?", "options": [{"text": "Focus on using complex vocabulary and varied sentence structures to keep the reader engaged throughout the long narrative.", "isCorrect": false, "rationale": "While good writing style is important, it doesn't address the structural problem of a 'wall of text.' The text emphasizes clear organization, not just linguistic complexity."}, {"text": "Prioritize a strong introduction and conclusion, as these are the only sections readers typically focus on in long papers.", "isCorrect": false, "rationale": "While important, an introduction and conclusion alone won't solve structural issues within the body of a 15-page paper. The text advocates for guiding the reader throughout."}, {"text": "Implement a clear heading hierarchy, chunk information into logical sections, and use topic sentences as internal 'headings' to guide the reader through the argument.", "isCorrect": true, "rationale": "The 'Writing Connection' section explicitly states: 'The skills you use to organize a user guide—headings, hierarchy, chunking, and cross-references—are exactly the skills you need for a long research paper.' It also mentions 'clear section headings, a logical flow... and an introduction that previews the structure' and 'topic sentences as the headings that guide your reader.'"}, {"text": "Limit the use of external sources to maintain a consistent authorial voice and prevent fragmentation.", "isCorrect": false, "rationale": "The use of sources is an academic requirement for research papers, and their management is a separate skill from organizational structure. Limiting them wouldn't necessarily solve a structural problem."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
