    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 1, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental difference in purpose between the 'Professional writing' chapters and the 'Technical writing' chapters of this book?", "options": [{"text": "Professional chapters focus on external communication, while technical chapters focus on internal communication.", "isCorrect": false, "rationale": "The text does not specify that professional writing is exclusively external or technical writing is exclusively internal; both can encompass various audiences."}, {"text": "Professional chapters teach everyday business documents, while technical chapters teach documents requiring specific precision for explanation and description.", "isCorrect": true, "rationale": "The text states professional writing chapters 'teach you the documents that drive everyday business,' and technical writing chapters 'teach you the documents that explain, describe, and report' and 'require particular precision and organization.'"}, {"text": "Professional chapters are for entry-level writers, and technical chapters are for advanced specialists.", "isCorrect": false, "rationale": "The book explains that chapters build in complexity, starting simple and working up, indicating both types of writing are taught progressively rather than being segregated by skill level."}, {"text": "Professional chapters cover informal writing, and technical chapters cover formal writing.", "isCorrect": false, "rationale": "Both professional and technical writing within a workplace context are formal, though levels of formality can vary. The distinction is not between formal and informal."}]}, {"question": "Which specific feature of the book is described as 'one of the fastest ways to improve your writing'?", "options": [{"text": "Vocabulary exercises", "isCorrect": false, "rationale": "Vocabulary exercises reinforce terms, but the text does not identify them as the 'fastest way to improve writing' overall."}, {"text": "Before & After Examples", "isCorrect": true, "rationale": "The text explicitly states, 'Studying these transformations is one of the fastest ways to improve your writing.'"}, {"text": "Model Documents", "isCorrect": false, "rationale": "Model documents provide examples of effective writing, but the side-by-side comparison and transformation in 'Before & After Examples' is singled out for rapid improvement."}, {"text": "Writing Connections sidebars", "isCorrect": false, "rationale": "Writing Connections sidebars show skill transfer to other types of writing, which is valuable but not the feature highlighted for 'fastest' direct improvement."}]}, {"question": "A new employee is tasked with creating a weekly status report. They remember the textbook's definition of 'format.' Which action best demonstrates their understanding of this concept?", "options": [{"text": "They focus solely on the clarity and conciseness of their sentences.", "isCorrect": false, "rationale": "Clarity and conciseness are important writing principles, but 'format' refers to the structural conventions, not sentence-level mechanics."}, {"text": "They research existing company status reports to understand the expected sections, headings, and overall layout.", "isCorrect": true, "rationale": "The definition of 'format' is 'the structure, layout, and organization conventions of a particular type of document' that 'readers expect.' Researching existing reports directly aligns with understanding these conventions."}, {"text": "They prioritize using formal language and avoiding jargon.", "isCorrect": false, "rationale": "This relates to tone and audience awareness, which are important, but not directly to the 'format' (structure and layout) of the document."}, {"text": "They ensure all key stakeholders are listed in the report's distribution.", "isCorrect": false, "rationale": "Identifying stakeholders is part of audience analysis, but not directly related to the 'format' or structural conventions of the report itself."}]}, {"question": "The book states, 'You cannot learn to write by reading about writing. You learn by writing, getting feedback, and revising.' What does this statement imply about the role of exercises in this textbook?", "options": [{"text": "Exercises are supplementary tools for students who need extra practice.", "isCorrect": false, "rationale": "The text explicitly states, 'The exercises in this book are not optional extras,' contradicting this option."}, {"text": "Exercises are the primary mechanism for skill acquisition and measurable improvement.", "isCorrect": true, "rationale": "The text emphasizes that exercises 'are where the real learning happens' and that doing them seriously will lead to measurable improvement, positioning them as central to learning."}, {"text": "Exercises are primarily for testing comprehension of chapter content.", "isCorrect": false, "rationale": "While some exercises test comprehension, the key concept 'Learning by Doing' highlights their role in active skill development and revision, not just assessment."}, {"text": "Exercises are designed to prepare students for real-world job applications.", "isCorrect": false, "rationale": "While the skills learned are applicable to job applications, the statement's implication is about the fundamental process of learning to write, not just a specific application."}]}, {"question": "The 'Writing Connections' sidebars emphasize that professional writing skills are not 'siloed.' What does this mean for a student's overall writing development?", "options": [{"text": "These skills are only applicable within a corporate environment.", "isCorrect": false, "rationale": "The text states the skills 'transfer to everything,' including 'essays, creative writing, college applications,' directly contradicting this option."}, {"text": "Mastering professional writing can improve other forms of writing, such as essays and creative writing.", "isCorrect": true, "rationale": "The text explains that these sidebars show how professional writing skills 'improves other types of writing you do: essays, creative writing, college applications, and more,' indicating broad transferability."}, {"text": "Students should avoid using professional writing techniques in academic contexts.", "isCorrect": false, "rationale": "This option contradicts the idea of skill transferability and the examples provided (e.g., college applications)."}, {"text": "Professional writing requires a completely different set of abilities than academic writing.", "isCorrect": false, "rationale": "The emphasis on 'Writing Connections' and skill transfer suggests common underlying principles and abilities, not entirely separate skill sets."}]}, {"question": "Based on the 'What Clear Writing Looks Like' preview email, which aspect demonstrates the writer's strong understanding of audience awareness and efficiency, beyond simply conveying information?", "options": [{"text": "Including 'Hi Sarah,' for a friendly tone.", "isCorrect": false, "rationale": "While contributing to a professional-but-friendly tone, the greeting itself isn't the strongest example of efficiency or audience awareness in structuring the *information* for clarity."}, {"text": "Using a bulleted list for updated meeting details.", "isCorrect": true, "rationale": "The text notes this email's effectiveness includes 'all necessary details organized in a scannable list,' which caters to an audience's need for quick comprehension and demonstrates efficiency in presentation."}, {"text": "Specifying 'Thursday, March 20' for the date.", "isCorrect": false, "rationale": "Providing specific details is important, but the *method* of presentation (scannable list) is a more direct indicator of efficiency and audience awareness for complex information."}, {"text": "Stating 'The Henderson Group asked to reschedule' as the reason.", "isCorrect": false, "rationale": "Providing a clear reason for writing is good practice, but the question asks about 'efficiency' and 'audience awareness' in presenting the *details*, which the bulleted list addresses more directly."}]}, {"question": "A project manager is about to send an email to their team. Applying the 'Writing Tip: Start Today,' what is the most critical question they should ask themselves before clicking 'send'?", "options": [{"text": "Is this email perfectly grammatically correct and free of typos?", "isCorrect": false, "rationale": "While important for professionalism, the 'Start Today' tip specifically emphasizes clarity and completeness from the *reader's perspective*, not just mechanics."}, {"text": "Have I included at least one new professional vocabulary term?", "isCorrect": false, "rationale": "The tip focuses on the reader's needs for information and clarity, not on demonstrating vocabulary usage."}, {"text": "Does the reader have everything they need to understand and act, and is anything confusing or unnecessary?", "isCorrect": true, "rationale": "This directly reflects the advice in the 'Writing Tip: Start Today' which states: 'reread it from your reader's perspective. Does the reader have everything they need? Is anything confusing? Is anything unnecessary?'"}, {"text": "Is the email formal enough for a workplace setting?", "isCorrect": false, "rationale": "Appropriate tone is part of professional writing, but the 'Start Today' tip specifically focuses on the clarity, completeness, and conciseness of the message's content for the reader."}]}, {"question": "How are new professional and technical terms typically introduced and reinforced in each chapter of this book?", "options": [{"text": "They are listed at the end of each chapter without definitions.", "isCorrect": false, "rationale": "The text states terms are defined 'right there in the text' and reinforced with exercises, contradicting a list without definitions."}, {"text": "They appear bolded in the text with an immediate definition, and are reinforced through dedicated exercises.", "isCorrect": true, "rationale": "The text clearly states terms 'will see them bolded when they first appear, with a definition right there in the text' and that there are 'Vocabulary exercises to reinforce the chapter's professional and technical terms.'"}, {"text": "Students are expected to look up new terms independently using a glossary.", "isCorrect": false, "rationale": "The book provides definitions directly within the text, so students are not expected to look them up independently from an external source."}, {"text": "They are only discussed during in-class lectures by the instructor.", "isCorrect": false, "rationale": "The book's structure describes how it introduces and reinforces vocabulary directly through its content and exercises, not solely through lectures."}]}, {"question": "Beyond teaching specific document types like emails and resumes, what overarching goal does the book aim to achieve for students, serving them 'for the rest of your life'?", "options": [{"text": "To make students experts in all industry-specific technical jargon.", "isCorrect": false, "rationale": "While vocabulary is taught, the 'for the rest of your life' emphasis is on fundamental principles, not mastering all possible industry jargon, which is too vast and specific."}, {"text": "To provide a comprehensive database of document templates for various careers.", "isCorrect": false, "rationale": "The book is described as a 'toolkit' of principles, not merely a collection of templates for mimicry."}, {"text": "To instill foundational principles of clarity, conciseness, audience awareness, and purposeful organization applicable to all communication.", "isCorrect": true, "rationale": "The text states, 'you will understand the principles behind all of them: clarity, conciseness, audience awareness, and purposeful organization,' and that these will serve you 'for the rest of your life.'"}, {"text": "To ensure students can perfectly mimic model documents without deviation.", "isCorrect": false, "rationale": "The goal is to understand underlying principles so one can apply them effectively, not just to copy specific models."}]}, {"question": "Referencing the 'Vague Request vs. Specific Request' example, if a project manager consistently sends vague requests, what is the most direct negative impact on team efficiency?", "options": [{"text": "Team members might feel less respected by the project manager.", "isCorrect": false, "rationale": "While possible, the 'Before & After' example specifically highlights the direct waste of time due to lack of clarity, not interpersonal feelings."}, {"text": "The team will likely spend extra time seeking clarification, delaying tasks.", "isCorrect": true, "rationale": "The 'Vague Request' example explicitly states, 'The reader has to guess or write back to ask—wasting both people's time,' directly pointing to delays and wasted effort due to needing clarification."}, {"text": "Projects will often exceed their allocated budget due to miscommunication.", "isCorrect": false, "rationale": "Budget overrun is a potential *indirect* consequence, but the most direct impact on *efficiency* is the immediate time wasted on clarifying vague requests."}, {"text": "It encourages team members to also communicate vaguely, leading to a general decline in standards.", "isCorrect": false, "rationale": "This could be a long-term cultural effect, but the 'Before & After' example's immediate focus is on the direct inefficiency caused by the lack of clarity in a single interaction."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
