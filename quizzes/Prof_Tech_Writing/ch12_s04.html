<script>
var QUESTIONS = [{"question": "According to the text, why is managing your professional identity online considered a basic career skill in today's job market?", "options": [{"text": "Because employers only consider candidates with extensive online portfolios.", "isCorrect": false, "rationale": "While portfolios are valuable, the text states 'managing your professional identity' is a basic career skill primarily because employers routinely search online and form impressions based on what they find or don't find, not solely on portfolios."}, {"text": "Because employers routinely search for candidates online, and what they find shapes their impression before an interview.", "isCorrect": true, "rationale": "The text explicitly states: 'In today's job market, employers routinely search for candidates online. What they find—or do not find—shapes their impression before you ever walk into an interview. Managing your professional identity... is no longer optional; it is a basic career skill.'"}, {"text": "Because most jobs now require applicants to have a strong social media presence on platforms like Instagram.", "isCorrect": false, "rationale": "The text emphasizes a 'professional identity' and mentions LinkedIn specifically, not a general strong social media presence on platforms like Instagram for job applications."}, {"text": "Because online profiles have completely replaced traditional resumes.", "isCorrect": false, "rationale": "The text notes 'Your resume is not the only document that represents you professionally,' implying resumes are still relevant but supplemented by digital profiles, not replaced."}], "id": "q01"}, {"question": "Which of the following LinkedIn headlines best demonstrates the principles for a student outlined in the text?", "options": [{"text": "Student at Northwood High School", "isCorrect": false, "rationale": "The text explicitly advises against generic headlines like this, stating 'Not just 'Student at Lincoln High School.'' It encourages specificity."}, {"text": "Junior at Northwood High School | Aspiring Environmental Scientist | Volunteer at City Park Conservancy", "isCorrect": true, "rationale": "This headline is specific, indicates the student's current status, highlights aspirations, and includes a relevant activity or skill, mirroring the example provided in the text ('Junior at Lincoln High School | Aspiring Marketing Professional | Social Media Manager for Student Government')."}, {"text": "Seeking Opportunities", "isCorrect": false, "rationale": "This headline is too generic and doesn't provide any specific information about the student's identity, skills, or aspirations, which is contrary to the advice given."}, {"text": "I am a hard-working student looking for a job.", "isCorrect": false, "rationale": "While stating a goal, this is more descriptive text suitable for a summary, not a concise, impactful headline. It also lacks specific details encouraged by the text."}], "id": "q02"}, {"question": "Maria Santos's LinkedIn summary paragraph is highlighted as effective. Which aspect most contributes to its effectiveness, according to the provided analysis?", "options": [{"text": "It exclusively focuses on her academic achievements and future career aspirations.", "isCorrect": false, "rationale": "While it mentions interests, the summary also highlights specific experience, skills, and availability, not exclusively academics and aspirations."}, {"text": "It naturally integrates her skills and interests with concrete experience, and clearly states her availability and what she is seeking.", "isCorrect": true, "rationale": "The provided analysis states the summary 'Opens with who she is and what she cares about,' 'Highlights specific experience (library volunteer) with concrete details,' 'Mentions a valuable skill (bilingual) naturally,' 'States what she is looking for,' and 'Includes practical availability information.' This option encompasses all these points."}, {"text": "It is exceptionally long, providing a comprehensive overview of her entire life story.", "isCorrect": false, "rationale": "The summary is described as a '3–5 sentence paragraph' and an 'elevator pitch,' which is concise, not exceptionally long or a life story."}, {"text": "It avoids mentioning any specific experiences to keep options open for recruiters.", "isCorrect": false, "rationale": "The summary specifically highlights her 'volunteer library assistant' experience with concrete details, which directly contradicts this statement."}], "id": "q03"}, {"question": "Based on the section on professional email addresses, which email format would be considered appropriate for job applications?", "options": [{"text": "mariabutterfly2009@email.com", "isCorrect": false, "rationale": "This format is similar to 'mariaxoxo2009@email.com,' which the text explicitly identifies as 'not' professional."}, {"text": "maria.santos.writes@email.com", "isCorrect": true, "rationale": "The text states: 'If your name is common and taken in all variations, add a professional qualifier: maria.santos.writes@email.com is fine.' This example follows that guidance."}, {"text": "msantos@email.com, but only if you are applying for a highly technical role.", "isCorrect": false, "rationale": "While 'flastname@email.com' is a professional format, the text does not limit its use to only highly technical roles; it's a general professional option."}, {"text": "Any email address is fine as long as it's easy for the employer to remember.", "isCorrect": false, "rationale": "Memorability is not the sole criterion for a professional email. Professionalism in appearance is paramount, as demonstrated by the 'mariaxoxo2009@email.com' example being memorable but inappropriate."}], "id": "q04"}, {"question": "A high school student, interested in pursuing a career in digital media and video production, has several completed short films. Based on the text, what would be the most effective way for them to showcase their work to potential internships or colleges?", "options": [{"text": "Uploading all their films to a private Instagram account.", "isCorrect": false, "rationale": "Instagram is not listed as a professional portfolio option, and a private account would prevent potential employers/colleges from viewing the work."}, {"text": "Creating a curated Google Sites page that features their best films with descriptions of their role and what they learned.", "isCorrect": true, "rationale": "The text lists 'A Google Sites page' as a 'simple portfolio option for students' and advises including 'a brief description explaining what the project was, what your role was, and what you learned' for each piece, emphasizing quality over quantity. This aligns perfectly with showcasing creative work."}, {"text": "Listing their video production skills on their LinkedIn profile without providing any samples of their work.", "isCorrect": false, "rationale": "While listing skills on LinkedIn is good, a portfolio 'shows' what you can do, whereas a resume/LinkedIn 'tells.' For creative fields like video production, visual evidence is crucial."}, {"text": "Printing still frames from each film and compiling them into a physical binder.", "isCorrect": false, "rationale": "The text focuses on 'Online Portfolios' and digital platforms for showcasing work, making a physical binder less relevant for digital media."}], "id": "q05"}, {"question": "The 'Writing Tip' for portfolios states, 'A portfolio with three excellent pieces beats one with fifteen mediocre ones.' What is the primary implication of this advice?", "options": [{"text": "Students should only include their most recent work, regardless of quality, to show current skills.", "isCorrect": false, "rationale": "The tip prioritizes 'excellent' quality over mere recency. Showing current skills is important, but quality remains the emphasis."}, {"text": "The overall impact of a portfolio is determined by the quality and relevance of each piece, supported by contextual explanations.", "isCorrect": true, "rationale": "The tip stresses 'excellent pieces' over 'mediocre ones' and further states, 'For each piece, include a brief description explaining what the project was, what your role was, and what you learned. Context helps the reader appreciate your work.' This means quality, relevance, and context are key."}, {"text": "A portfolio should always be as short as possible to save the employer time.", "isCorrect": false, "rationale": "While conciseness is often valued, the core message is about the *quality* of content, not just the quantity or brevity for time-saving."}, {"text": "It is always better to have fewer items in a portfolio to make it seem exclusive.", "isCorrect": false, "rationale": "The focus is on the *excellence* of the pieces, not merely having a low number for exclusivity. A well-curated, high-quality selection is the goal."}], "id": "q06"}, {"question": "When employers screen candidates' social media profiles, what is one key element that would likely cause concern?", "options": [{"text": "A professional online presence that matches the candidate's resume activities.", "isCorrect": false, "rationale": "The text lists 'Evidence that you are who you say you are (activities, interests that match your resume)' as a positive employers look for."}, {"text": "Evidence of community involvement or creative projects.", "isCorrect": false, "rationale": "The text lists 'Community involvement or creative projects' as a positive employers look for."}, {"text": "Posts containing complaints about previous employers or discriminatory content.", "isCorrect": true, "rationale": "The text explicitly lists 'Complaints about previous employers or coworkers' and 'Discriminatory or offensive content' under 'What concerns employers (negatives).'"}, {"text": "A LinkedIn profile showcasing good communication skills.", "isCorrect": false, "rationale": "The text lists 'Good communication skills visible in your posts' as a positive employers look for."}], "id": "q07"}, {"question": "A student performs the 'Employer Search Test' and finds concerning or irrelevant information on the first page of results. According to the text, what is the most appropriate course of action?", "options": [{"text": "Delete all personal social media accounts to eliminate any digital footprint.", "isCorrect": false, "rationale": "The text advises: 'This does not mean you need to scrub your entire online life or stop being yourself on social media.'"}, {"text": "Immediately create a professional LinkedIn profile and a simple portfolio to push positive content up in search results, and adjust privacy settings on personal accounts.", "isCorrect": true, "rationale": "The text advises to 'take steps now to improve your digital footprint—build positive professional content that appears in search results, and adjust privacy settings on personal social media accounts.' This option directly matches that advice."}, {"text": "Ignore the results, as employers are not interested in personal social media.", "isCorrect": false, "rationale": "The text states '70% of employers screen candidates' social media profiles' and 'What they find can help or hurt your chances,' making ignoring the results a poor strategy."}, {"text": "Only build a professional profile if a specific job application requires it.", "isCorrect": false, "rationale": "The advice is proactive to 'take steps now to improve your digital footprint,' not to wait until an application requires it."}], "id": "q08"}, {"question": "The text advises students on managing their digital footprint without 'scrubbing their entire online life.' What is the recommended strategy for having both a personal and professional online presence?", "options": [{"text": "Merge all personal and professional content onto a single, public social media profile to be transparent.", "isCorrect": false, "rationale": "The text advises to 'just keep them separate' and distinguish what is 'public versus private,' contradicting the idea of merging everything publicly."}, {"text": "Set all social media accounts to private, ensuring no employer can ever find anything about you online.", "isCorrect": false, "rationale": "The text mentions 'No online presence at all (which can seem unusual in the digital age)' as a negative, and it also prevents showcasing a professional profile."}, {"text": "Maintain separate personal social media accounts set to private, while keeping professional profiles (like LinkedIn) public.", "isCorrect": true, "rationale": "The text states: 'Most social platforms allow you to set your personal accounts to private while keeping a professional profile public. You can have both a personal online life and a professional one—just keep them separate.'"}, {"text": "Avoid engaging in any online activities beyond school assignments to prevent potential issues.", "isCorrect": false, "rationale": "This approach is overly restrictive and contradicts the advice to 'build positive professional content' and manage a digital footprint actively."}], "id": "q09"}, {"question": "The 'Writing Connection: Self-Presentation Across Genres' section emphasizes an overarching principle. Which statement best captures this principle for students in various application contexts?", "options": [{"text": "The goal is always to 'tell' the reader you are hardworking and passionate.", "isCorrect": false, "rationale": "The text explicitly states: 'A college admissions essay that 'shows' your qualities through specific stories and results is far more compelling than one that merely 'tells' the reader you are hardworking and passionate.'"}, {"text": "Skills learned from resume writing, such as quantifying results and proving claims with evidence, apply to all forms of self-presentation.", "isCorrect": true, "rationale": "The text states: 'The skills from this chapter—choosing strong verbs, quantifying results, tailoring your message to your reader, and managing your overall impression—apply to every form of self-presentation you will encounter... The resume teaches you to prove your claims with evidence. That habit will serve you in every application you ever write.'"}, {"text": "Different genres, like resumes and college essays, require completely different approaches to self-presentation.", "isCorrect": false, "rationale": "The section highlights the *connection* between different genres of self-presentation, emphasizing shared fundamental skills rather than completely different approaches."}, {"text": "The primary focus of self-presentation is always to impress with a large quantity of achievements.", "isCorrect": false, "rationale": "The emphasis is on the *quality* and proof of claims rather than simply a large quantity of achievements, as seen in the 'Quality Over Quantity' tip for portfolios and 'showing' vs. 'telling'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
