    };

        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>

        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the section, for a professional message (memo, email, announcement) to be considered successful, it must explicitly answer which three core questions for the reader?", "options": [{"text": "What is the main topic, who sent it, and what are the key takeaways?", "isCorrect": false, "rationale": "While these might be relevant, the text specifically identifies 'What do I need to know?', 'What do I need to do?', and 'By when?' as the three critical questions a successful professional message must answer."}, {"text": "What do I need to know, what do I need to do, and by when?", "isCorrect": true, "rationale": "The text explicitly states: 'Every professional message... should make three things clear to the reader: What do I need to know? What do I need to do? By when?' If the reader cannot answer these, the memo has failed."}, {"text": "Is this urgent, who else needs to see this, and what is the background?", "isCorrect": false, "rationale": "These questions are not explicitly listed in the text as the core requirements for a successful professional message, although they might be answered within one."}, {"text": "What problem is being solved, what resources are available, and what are the next steps?", "isCorrect": false, "rationale": "These questions go beyond the fundamental clarity requirements outlined for every professional message in this section."}], "id": "q01"}, {"question": "Which of the following is NOT one of the three essential components of an effective action item, as defined in the section?", "options": [{"text": "What specific task needs to be completed.", "isCorrect": false, "rationale": "'What — The specific task to be completed' is explicitly listed as a required component of an effective action item."}, {"text": "Who is responsible for the task.", "isCorrect": false, "rationale": "'Who — The person or group responsible' is explicitly listed as a required component of an effective action item."}, {"text": "Why the task is important.", "isCorrect": true, "rationale": "The text identifies 'What,' 'Who,' and 'When' as the three indispensable components of an effective action item. 'Why' the task is important, while often useful context, is not listed as one of these three required parts of the action item itself."}, {"text": "When the task is due.", "isCorrect": false, "rationale": "'When — The deadline or timeframe' is explicitly listed as a required component of an effective action item."}], "id": "q02"}, {"question": "Consider the following action item: 'Please review the draft and send comments.' Based on the examples provided in the text, which component is most critically missing, making this action item ineffective?", "options": [{"text": "The 'what' is missing.", "isCorrect": false, "rationale": "The 'what' ('review the draft and send comments') is present in this action item."}, {"text": "The 'who' is missing.", "isCorrect": false, "rationale": "While the 'who' could be more explicit, the text specifically uses this exact phrase as an example of a 'Missing 'when'', asking 'Today? This week? Before the next meeting in a month?'"}, {"text": "The 'when' is missing.", "isCorrect": true, "rationale": "The text uses 'Please review the draft and send comments' as a direct example of a 'Missing 'when'' action item, highlighting the ambiguity of the deadline."}, {"text": "Both the 'who' and 'when' are missing.", "isCorrect": false, "rationale": "While the 'who' is implicit (the reader), the text specifically calls this example out for its missing 'when'."}], "id": "q03"}, {"question": "A team lead writes: 'We need to get the budget stuff figured out soon. Everyone should look at the numbers and let someone know if there are any issues. Also, someone should probably update the spreadsheet at some point.' Which option best transforms this vague statement into effective action items, following the principles outlined in the text?", "options": [{"text": "The budget needs immediate attention. Everyone should review it.", "isCorrect": false, "rationale": "This statement remains vague and does not clearly specify 'who' does 'what' by 'when', similar to the 'Before' example in the text."}, {"text": "By Friday, March 7: All department heads: Review your Q2 budget draft (attached) and email corrections to Ana Reyes. Ana Reyes: Update the master spreadsheet with all corrections by Monday, March 10. Finance team: Prepare the consolidated budget summary for the March 12 board meeting.", "isCorrect": true, "rationale": "This option directly mirrors the 'After' example provided in the text, assigning specific tasks ('what') to specific people or groups ('who') with clear deadlines ('when'). This leaves no room for confusion."}, {"text": "Budget items require review; issues to be reported. Spreadsheet updates pending.", "isCorrect": false, "rationale": "This rephrases the vagueness without providing the specific 'who,' 'what,' and 'when' components necessary for effective action items."}, {"text": "Budget figures require clarification. Team members are advised to address discrepancies promptly. Spreadsheet custodian to update as necessary.", "isCorrect": false, "rationale": "This uses generic terms like 'team members' and 'spreadsheet custodian' and vague timing ('promptly,' 'as necessary'), failing to meet the criteria for specific action items."}], "id": "q04"}, {"question": "Why does the section emphasize the importance of making action items visually distinct from the surrounding text in a professional message?", "options": [{"text": "To make the document appear more professional and aesthetically pleasing.", "isCorrect": false, "rationale": "While good formatting can contribute to professionalism, the primary reason stated in the text is clarity and ensuring action items are actually seen by the reader, not just aesthetics."}, {"text": "To ensure readers, who often scan quickly, do not miss the required tasks.", "isCorrect": true, "rationale": "The text explicitly states: 'Readers scan memos quickly; if your action items are buried in a paragraph, they will be missed.' Visual distinction helps ensure these critical items are caught."}, {"text": "To highlight the sender's authority and the importance of the requests.", "isCorrect": false, "rationale": "The text focuses on clarity and accountability as the goal of formatting, not on signaling the sender's authority."}, {"text": "To separate them from confidential information meant for specific eyes only.", "isCorrect": false, "rationale": "The text does not mention confidentiality as a reason for formatting action items."}], "id": "q05"}, {"question": "When presenting multiple action items, the text recommends a specific formatting technique to improve scannability. Which of the following examples best demonstrates this recommendation?", "options": [{"text": "The conference room needs to be scheduled by Marcus.", "isCorrect": false, "rationale": "This uses passive voice and does not start with the responsible person's name in the recommended direct manner."}, {"text": "Schedule the conference room; Marcus is responsible.", "isCorrect": false, "rationale": "While it identifies Marcus, it does not start the item with his name, which is the specific recommendation for scannability."}, {"text": "Marcus: Schedule the conference room.", "isCorrect": true, "rationale": "The text specifically advises, 'Start each item with the responsible person's name. 'Marcus: Schedule the conference room' is easier to scan than 'The conference room needs to be scheduled, and Marcus said he could do it.''"}, {"text": "Conference room scheduling: Marcus's task.", "isCorrect": false, "rationale": "This is not the specific recommended format and is less direct than starting with the person's name followed by the task."}], "id": "q06"}, {"question": "According to the 'Writing Tip' in the text, what is the primary benefit of including a clearly labeled 'Action Required' or 'Next Steps' section near the end of a memo that requires the reader to do something?", "options": [{"text": "It makes the memo longer, indicating a thorough approach.", "isCorrect": false, "rationale": "The length of the memo is not identified as a benefit of this header. The focus is on clarity and ease of access for the reader."}, {"text": "It ensures that the memo meets a specific document structure standard.", "isCorrect": false, "rationale": "While it contributes to good structure, the primary benefit highlighted is for the reader's clarity, not merely meeting a standard."}, {"text": "It allows readers who skim to quickly find exactly what is expected of them.", "isCorrect": true, "rationale": "The 'Writing Tip' explicitly states: 'This makes it easy for readers who skim to find exactly what is expected of them.'"}, {"text": "It provides an opportunity to reiterate the main points of the memo.", "isCorrect": false, "rationale": "While some reiteration might occur, the primary purpose is not to summarize, but to clearly delineate the required actions from the rest of the content."}], "id": "q07"}, {"question": "Your team receives a memo with the RE line: 'RE: Policy Update — New Leave Request Procedure.' The first paragraph then states: 'This memo outlines changes to our leave request procedure and requires action from all employees by the end of the month.' Which strategy for distinguishing 'For Information' from 'For Action' memos has been employed here?", "options": [{"text": "Bold the deadline in the body of the memo.", "isCorrect": false, "rationale": "Bolding the deadline is a formatting recommendation for action items, but it's not one of the two primary strategies mentioned for initially distinguishing the *type* of memo (informational vs. action-oriented) at the very beginning."}, {"text": "Use bullet points for action items.", "isCorrect": false, "rationale": "Using bullet points is a formatting technique for action items, not a strategy for signaling the memo's overall purpose in the RE line or first paragraph."}, {"text": "Signal it in the RE line AND state it in the first paragraph.", "isCorrect": true, "rationale": "The RE line ('RE: Policy Update — New Leave Request Procedure') signals action, and the first paragraph explicitly states, 'This memo... requires action from all employees by the end of the month.' The text lists both 'Signal it in the RE line' and 'State it in the first paragraph' as key strategies."}, {"text": "Use a separate 'Action Required' heading.", "isCorrect": false, "rationale": "While an 'Action Required' heading is recommended elsewhere, the question specifically asks about strategies employed in the RE line and first paragraph to distinguish memo types."}], "id": "q08"}, {"question": "A team member writes an action item: 'The quarterly reports should be submitted by the end of the month.' Based on the 'Common Mistake' section, how should this action item primarily be improved?", "options": [{"text": "Add a rationale explaining *why* the reports are needed.", "isCorrect": false, "rationale": "While context can be helpful, the 'Common Mistake' section specifically addresses the use of passive voice and the missing 'who,' not the rationale behind the task."}, {"text": "Change it to active voice, specifying *who* is responsible for submission.", "isCorrect": true, "rationale": "The 'Common Mistake' section directly addresses this: 'The passive voice (“should be submitted”) hides the actor.' It then provides an example of using active voice to name the responsible person: 'All team leads: submit your quarterly reports to Finance by March 31.'"}, {"text": "Bold the deadline to draw attention to it.", "isCorrect": false, "rationale": "Bolding the deadline is a good formatting practice but does not resolve the core issue of passive voice and the missing 'who' identified as the 'common mistake' in this context."}, {"text": "Rephrase it to 'Reports are due end of month.'", "isCorrect": false, "rationale": "This rephrasing still uses passive voice ('are due') and does not specify *who* is responsible for submitting the reports."}], "id": "q09"}, {"question": "In the 'Memo Requesting Action from a Team' example, James Ortega includes a 'Next Meeting' section *after* the 'Action Required' section. What is the most likely strategic reason for this placement?", "options": [{"text": "To ensure that the informational content about the meeting is read only by those who have completed their tasks.", "isCorrect": false, "rationale": "The memo and meeting information are relevant to the entire team, regardless of individual task completion status. The placement aims to connect actions with their review."}, {"text": "To reinforce the deadlines by connecting them to a specific review point for the deliverables.", "isCorrect": true, "rationale": "By placing the 'Next Meeting' section directly after the action items and stating, 'Please bring printed copies of your deliverables,' the memo strategically links the completion of tasks to an immediate accountability and review point, effectively reinforcing the deadlines."}, {"text": "To separate the meeting details from the critical action items for better clarity.", "isCorrect": false, "rationale": "While the overall principle is to separate action items from general informational content, placing 'Next Meeting' immediately after 'Action Required' creates a direct link rather than a complete separation, for the purpose of accountability."}, {"text": "To avoid overwhelming the reader with too much information at the beginning of the memo.", "isCorrect": false, "rationale": "While memos prioritize action, placing the meeting details after the action items creates a strong link to the deliverables rather than simply reducing initial information load."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
