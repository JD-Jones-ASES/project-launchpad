<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear and Effective: Professional &amp; Technical Writing &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following scenarios is most appropriate for sending a full business letter instead of an email?", "options": [{"text": "Sending a quick update to a colleague on a minor project detail.", "isCorrect": false, "rationale": "Quick updates for minor details are best handled by email, as they do not typically require the higher formality or permanent record of a business letter."}, {"text": "Submitting a formal resignation to your employer or filing a legal claim against a company.", "isCorrect": true, "rationale": "The text states that a business letter is appropriate for situations with legal significance (claims), formal requests, and when the situation demands a higher level of formality (resignation). These situations often require a permanent record and carry more weight."}, {"text": "Scheduling an informal coffee meeting with a mentor.", "isCorrect": false, "rationale": "An informal meeting request, especially with an existing mentor, is typically handled with email due to its speed and informality."}, {"text": "Sharing a link to an interesting article with your professional network.", "isCorrect": false, "rationale": "Sharing articles is a common informal communication best suited for email or social media, not a formal business letter."}]}, {"question": "A business letter where 'every line—date, address, greeting, body, and closing—starts at the left margin' and paragraphs are separated by a blank line rather than indented, is known as what format?", "options": [{"text": "Modified Block format", "isCorrect": false, "rationale": "Modified Block format shifts the date, complimentary close, and signature block to the center or right, and may optionally indent paragraphs."}, {"text": "Semi-Block format", "isCorrect": false, "rationale": "Semi-Block format is not explicitly defined in the text, but typically involves indented paragraphs, which is contrary to the description."}, {"text": "Indented Block format", "isCorrect": false, "rationale": "Indented Block format implies indented paragraphs, which contradicts the 'paragraphs are separated by a blank line rather than indented' rule for the described format."}, {"text": "Block format", "isCorrect": true, "rationale": "The definition provided directly matches the description of Block format: 'a letter layout in which every element starts at the left margin' and 'paragraphs are separated by a blank line rather than indented'."}]}, {"question": "According to the standard structure of a business letter, which of the following elements correctly precedes the 'Inside address'?", "options": [{"text": "Salutation", "isCorrect": false, "rationale": "The Salutation comes after the Inside Address."}, {"text": "Complimentary close", "isCorrect": false, "rationale": "The Complimentary Close comes much later in the letter, after the Body and before the Signature Block."}, {"text": "Body", "isCorrect": false, "rationale": "The Body is the main content of the letter and comes after the Salutation."}, {"text": "Date", "isCorrect": true, "rationale": "The correct order of parts is Sender's address (or letterhead), then Date, then Inside address. Therefore, the Date correctly precedes the Inside address."}]}, {"question": "You need to write a business letter to the customer service department of a large corporation, but you cannot find the name of a specific individual. Which salutation is the most appropriate and professional choice according to the text?", "options": [{"text": "To Whom It May Concern:", "isCorrect": false, "rationale": "The text advises against 'To Whom It May Concern' because it signals a lack of effort to find the recipient's name."}, {"text": "Dear Customer Service Department:", "isCorrect": true, "rationale": "The text explicitly states that if you cannot find a specific name, you should address the letter to the department or title, such as 'Dear Customer Service Department:'."}, {"text": "Dear Sir or Madam:", "isCorrect": false, "rationale": "While historically used, this salutation is not mentioned as a preferred alternative and can be considered outdated or less specific than addressing the department directly."}, {"text": "Hello Customer Service:", "isCorrect": false, "rationale": "'Hello' is generally too informal for a business letter salutation."}]}, {"question": "What is the primary purpose of including an 'Enclosure' notation at the bottom of a business letter?", "options": [{"text": "To indicate that copies of the letter have been sent to other individuals.", "isCorrect": false, "rationale": "This is the purpose of the CC notation, not the Enclosure notation."}, {"text": "To confirm that the letter is a permanent record for official documentation.", "isCorrect": false, "rationale": "While letters often serve as permanent records, the 'Enclosure' notation specifically addresses accompanying documents, not the letter's record status."}, {"text": "To inform the recipient that additional documents are included with the letter and to check that they all arrived.", "isCorrect": true, "rationale": "The text clearly states, 'Enclosure... This tells the recipient to check that all documents arrived,' indicating its purpose is to signal and verify accompanying materials."}, {"text": "To signify the letter's legal validity and enforceability.", "isCorrect": false, "rationale": "The Enclosure notation does not inherently signify legal validity; that comes from the content and context of the letter itself."}]}, {"question": "A writer is drafting a business letter and decides to use a block format for the sender's address and date, but then shifts the complimentary close and signature to the right, similar to a modified block format. What critical formatting principle is this writer violating?", "options": [{"text": "Always indent paragraphs in Modified Block format.", "isCorrect": false, "rationale": "Indenting paragraphs in Modified Block format is optional, not a critical principle for consistency between formats."}, {"text": "Mix formats for stylistic variety to make the letter more engaging.", "isCorrect": false, "rationale": "The text explicitly advises against mixing formats: 'Never mix formats' and 'Pick one format... and use it consistently throughout a single letter.'"}, {"text": "Use one chosen format consistently throughout a single letter.", "isCorrect": true, "rationale": "The 'Writing Tip: Formatting Consistency' section states, 'Pick one format—block or modified block—and use it consistently throughout a single letter. Never mix formats.'"}, {"text": "Only use Block format for formal communications.", "isCorrect": false, "rationale": "Both Block and Modified Block formats are acceptable for formal communications; the choice often depends on preference or organizational standard, not formality level."}]}, {"question": "You are writing a formal business letter to a potential employer as a follow-up to a job interview. Which complimentary close is considered the safest and most universally appropriate choice?", "options": [{"text": "Thanks!", "isCorrect": false, "rationale": "'Thanks!' is too informal for a professional business letter, especially in a job application context."}, {"text": "Regards,", "isCorrect": false, "rationale": "'Regards,' is described as 'slightly less formal, good for ongoing relationships,' which might not be ideal for an initial formal communication like a job interview follow-up."}, {"text": "Sincerely,", "isCorrect": true, "rationale": "The text identifies 'Sincerely,' as 'the safest, most universally appropriate choice' for business letters, making it ideal for a formal communication to a potential employer."}, {"text": "Best,", "isCorrect": false, "rationale": "'Best,' is generally considered more informal than 'Sincerely,' and less appropriate for a highly formal communication like this."}]}, {"question": "The text states that business letter formats 'are not arbitrary rules.' What is the primary reason given for the standardization of these formats over time?", "options": [{"text": "To save on paper and printing costs by optimizing layout.", "isCorrect": false, "rationale": "While efficient layout might save some space, the text does not cite cost savings as the primary reason for standardization."}, {"text": "To make letters more visually appealing and modern.", "isCorrect": false, "rationale": "While aesthetics are a factor, the primary reasons for standardization are functionality and professionalism, not just visual appeal."}, {"text": "To help readers find information quickly and signal that the writer is professional and credible.", "isCorrect": true, "rationale": "The text explicitly states that 'These formats are not arbitrary rules—they exist because a consistent structure helps readers find information quickly and signals that the writer is professional and credible.'"}, {"text": "To ensure all letters are legally binding regardless of content.", "isCorrect": false, "rationale": "Letter format alone does not make content legally binding; legal validity depends on the substance of the communication, not just its layout."}]}, {"question": "In a Modified Block format letter, which of the following elements is typically NOT left-aligned with the body paragraphs?", "options": [{"text": "Inside address", "isCorrect": false, "rationale": "The 'inside address... remain left-aligned' in Modified Block format."}, {"text": "Salutation", "isCorrect": false, "rationale": "The 'salutation... remain left-aligned' in Modified Block format."}, {"text": "Date", "isCorrect": true, "rationale": "The text states that in Modified Block format, 'the date, complimentary close, and signature are moved to the center or slightly right of center,' meaning the date is not left-aligned with the body paragraphs."}, {"text": "Body paragraphs", "isCorrect": false, "rationale": "The 'body paragraphs remain left-aligned' in Modified Block format."}]}, {"question": "A student submits a business letter where the salutation reads 'Dear Ms. Chen,'. What specific formatting or punctuation error has the student made for a business letter?", "options": [{"text": "The complimentary close is missing.", "isCorrect": false, "rationale": "The error is in the salutation, not the complimentary close."}, {"text": "The tone of the salutation is too informal for a business letter.", "isCorrect": false, "rationale": "The use of 'Dear Ms. Chen' is appropriate for a business letter; the error is not in its formality."}, {"text": "A colon, not a comma, should follow the salutation in a business letter.", "isCorrect": true, "rationale": "The text specifies that in business letters, the salutation 'is followed by a colon (not a comma, which is reserved for personal letters).'"}, {"text": "The recipient's title 'Ms.' is incorrectly used.", "isCorrect": false, "rationale": "Using 'Ms.' is a correct and appropriate professional title."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
