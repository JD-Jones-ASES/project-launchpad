        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of writing an inquiry letter in business correspondence?", "options": [{"text": "To market new products or services to potential customers.", "isCorrect": false, "rationale": "An inquiry letter is a request for information, not a marketing tool. Marketing aims to promote, while inquiry aims to gather information."}, {"text": "To formally request specific information, products, or services from a person or organization.", "isCorrect": true, "rationale": "The text explicitly defines an inquiry letter as a 'formal letter requesting information, products, or services from a person or organization.'"}, {"text": "To issue a formal complaint about a product or service received.", "isCorrect": false, "rationale": "This describes a complaint letter, which has a different purpose and structure than an inquiry letter."}, {"text": "To acknowledge receipt of a payment or order.", "isCorrect": false, "rationale": "This describes a confirmation or acknowledgement letter, which is different from requesting information."}], "id": "q01"}, {"question": "According to the 'Three-Part Inquiry Structure,' what crucial elements must be included in the opening paragraph of an inquiry letter?", "options": [{"text": "A detailed list of all questions and a specific deadline.", "isCorrect": false, "rationale": "Specific questions belong in the middle paragraph(s), and the deadline is typically stated in the closing paragraph."}, {"text": "Your contact information and a brief summary of your qualifications.", "isCorrect": false, "rationale": "Contact information belongs in the closing, and qualifications are optional and usually found in the middle paragraphs to provide context."}, {"text": "Your identity, the purpose of your writing, and what prompted the letter.", "isCorrect": true, "rationale": "The text states the opening paragraph should 'Identify yourself and state your purpose clearly. Why are you writing? What prompted this letter?'"}, {"text": "An offer of thanks and a suggestion for the reader's next step.", "isCorrect": false, "rationale": "Thanking the reader and stating next steps are components of the closing paragraph."}], "id": "q02"}, {"question": "Why does the text recommend using numbered or bulleted lists for questions in the middle paragraph(s) of an inquiry letter?", "options": [{"text": "It allows the writer to include more questions than they otherwise could.", "isCorrect": false, "rationale": "While it can organize many questions, the primary benefit highlighted is clarity and ease of response, not simply quantity."}, {"text": "It makes the letter look more professional and visually appealing.", "isCorrect": false, "rationale": "While a neat list can look professional, the main reason given relates to the functionality for both the writer and responder."}, {"text": "It makes the letter easier for the reader to understand and respond to completely.", "isCorrect": true, "rationale": "The 'Writing Tip: Number Your Questions' states it 'makes your letter easier to read, and it makes the reader's response easier to write. A reader who sees a numbered list can simply answer each item in order, which means you are more likely to get complete answers.'"}, {"text": "It is a standard formatting requirement for all business correspondence.", "isCorrect": false, "rationale": "The text presents it as a helpful tip for clarity, not a universal requirement for all business letters."}], "id": "q03"}, {"question": "Which of the following is an essential component of an effective inquiry letter's closing paragraph?", "options": [{"text": "A repetition of all previously asked questions to ensure clarity.", "isCorrect": false, "rationale": "Repeating questions is redundant and unnecessary if they were clearly stated in the middle paragraphs."}, {"text": "A thank you, contact information, and any relevant deadline.", "isCorrect": true, "rationale": "The 'Three-Part Inquiry Structure' specifies the closing paragraph should 'Thank the reader, provide your contact information, and state any relevant deadline.'"}, {"text": "A detailed explanation of why the requested information is critical.", "isCorrect": false, "rationale": "The 'why' for the inquiry is typically established in the opening or middle paragraphs, not the closing."}, {"text": "A comprehensive summary of the writer's qualifications and experience.", "isCorrect": false, "rationale": "Qualifications, if included, are usually placed in the middle paragraphs to provide context for the inquiry, not as a main closing element."}], "id": "q04"}, {"question": "A student writes: 'I want to know about your internships for next summer. What do I need to do?' Based on the 'Vague vs. Specific Inquiry' example, what is the most significant flaw in this student's inquiry?", "options": [{"text": "It fails to use formal salutations like 'Dear Sir or Madam.'", "isCorrect": false, "rationale": "While formality is important, the text identifies more fundamental issues of missing information as the primary flaws, not just the salutation."}, {"text": "It does not identify the writer, specify needed information, or provide contact details.", "isCorrect": true, "rationale": "The text states the 'Before' version fails for 'three reasons: it does not identify who the writer is, it does not specify what information is needed, and it provides no way for the reader to respond.' This scenario mirrors those critical omissions."}, {"text": "It uses an informal tone that is inappropriate for business correspondence.", "isCorrect": false, "rationale": "The tone is less formal, but the core issue is the lack of concrete, actionable information for the reader, not merely tone."}, {"text": "It is too short and should include more introductory pleasantries.", "isCorrect": false, "rationale": "Brevity itself isn't the problem; it's the lack of essential information. Adding pleasantries without substance wouldn't fix the core issue."}], "id": "q05"}, {"question": "In Alice Chen's inquiry letter (Model Document 6.2), why does she include a brief mention of her qualifications (AP Biology, volunteer work)?", "options": [{"text": "To impress the reader with her academic achievements for college applications.", "isCorrect": false, "rationale": "While her achievements are impressive, the text specifically states the purpose is 'not to brag,' implying a more practical reason for the letter's recipient."}, {"text": "To help the reader assess whether she is a realistic candidate for the program.", "isCorrect": true, "rationale": "The text explains she mentions qualifications 'not to brag, but to help the reader understand whether she is a realistic candidate.' This helps the recipient tailor their response effectively."}, {"text": "To fulfill a requirement for all internship inquiry letters.", "isCorrect": false, "rationale": "The text does not state this is a universal requirement; it's presented as a strategic choice for an effective inquiry."}, {"text": "To demonstrate her ability to write a detailed and comprehensive letter.", "isCorrect": false, "rationale": "Her qualifications speak to her background in environmental science, not directly to her writing skills, though the letter itself demonstrates her writing ability."}], "id": "q06"}, {"question": "The 'Writing Tip: Number Your Questions' advises using numbered lists for multiple questions. How does this practice primarily benefit the *reader* of an inquiry letter?", "options": [{"text": "It signals that the writer expects a quick and informal response.", "isCorrect": false, "rationale": "Numbered lists promote clarity and completeness, suggesting a desire for a thorough, structured response, not necessarily a quick or informal one."}, {"text": "It reduces the overall length of the response letter required.", "isCorrect": false, "rationale": "The benefit is ease of writing a *complete* response, not necessarily a shorter one. A complete answer might require more detail."}, {"text": "It makes the response easier to write by allowing them to answer each item in order.", "isCorrect": true, "rationale": "The text states, 'A reader who sees a numbered list can simply answer each item in order, which means you are more likely to get complete answers.' This directly benefits the responder's efficiency and effectiveness."}, {"text": "It prevents the reader from needing to reread the questions multiple times.", "isCorrect": false, "rationale": "While clarity might reduce rereading, the primary benefit stated is the ease of structuring the response itself."}], "id": "q07"}, {"question": "When writing an effective response letter, what is a fundamental principle regarding the content of the reply?", "options": [{"text": "It should only provide information that the organization wants to disclose.", "isCorrect": false, "rationale": "The text states the response should answer 'every question the writer asked,' even if the answer is 'I do not have that information, but here is who does,' implying completeness over selective disclosure."}, {"text": "It must address every question asked in the original inquiry, even if the answer is 'unknown.'", "isCorrect": true, "rationale": "One of the 'Principles of a Strong Response Letter' is to 'Answer every question the writer asked.' The text clarifies this by noting, 'even if the answer to one of them is 'I do not have that information, but here is who does.''"}, {"text": "It should primarily focus on marketing other products or services.", "isCorrect": false, "rationale": "While providing 'additional useful information' is good, the primary focus remains on answering the specific inquiry, not aggressive marketing."}, {"text": "It needs to be shorter than the original inquiry letter.", "isCorrect": false, "rationale": "The length of the response is less important than its completeness and clarity in addressing all parts of the inquiry."}], "id": "q08"}, {"question": "The text emphasizes that a strong response letter should be 'organized to match the original request.' What specific guidance is given for this organization?", "options": [{"text": "It should categorize answers by topic, regardless of the original order.", "isCorrect": false, "rationale": "The text explicitly states to 'Address them in the same order they were asked,' directly contradicting a reordering by topic."}, {"text": "It should begin with an apology for any delay in responding.", "isCorrect": false, "rationale": "The guidance is to 'Acknowledge the inquiry in your opening,' which is about reference, not necessarily an apology for delay."}, {"text": "It should address questions in the same order they were asked in the inquiry.", "isCorrect": true, "rationale": "One of the 'Principles of a Strong Response Letter' is to 'Answer every question the writer asked. Address them in the same order they were asked.'"}, {"text": "It should prioritize answering the most important questions first.", "isCorrect": false, "rationale": "The guidance is to follow the original order, not to reorder by perceived importance, which might not align with the inquirer's priority or expectation."}], "id": "q09"}, {"question": "Beyond simply answering questions, what additional goal does a good response letter aim to achieve, according to the text?", "options": [{"text": "To persuade the reader to become a loyal customer or client.", "isCorrect": false, "rationale": "While fostering loyalty is a positive outcome, the text emphasizes building a 'positive relationship' more broadly, which includes all interactions, not just sales or conversion."}, {"text": "To ensure the reader will not have any further questions or need for follow-up.", "isCorrect": false, "rationale": "While thoroughness can reduce follow-up, the text suggests providing 'a clear next step,' implying that further interaction might be expected or encouraged, not eliminated."}, {"text": "To build a positive relationship and reflect well on the entire company.", "isCorrect": true, "rationale": "The text states, 'A good response letter does not just answer questions—it builds a positive relationship. The reader is reaching out to your organization because they need something. A thorough, friendly response reflects well on the entire company.'"}, {"text": "To minimize the amount of time the organization spends on follow-up communication.", "isCorrect": false, "rationale": "While an efficient response might indirectly save time, the explicit goal highlighted is about the reader's experience and the company's image, not internal time-saving alone."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
