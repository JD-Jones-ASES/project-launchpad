    };

<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 9, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best encapsulates the primary reason why reports must support claims with evidence?", "options": [{"text": "To make the report longer and appear more thorough.", "isCorrect": false, "rationale": "The length of a report is not the primary objective of including evidence. The goal is to ensure accuracy and verifiability, not simply volume."}, {"text": "To demonstrate the writer's extensive research skills.", "isCorrect": false, "rationale": "While using evidence might demonstrate research skills, this is a secondary benefit, not the main purpose. The core goal is to validate the report's claims."}, {"text": "To transform subjective opinions into verifiable facts and findings.", "isCorrect": true, "rationale": "The text explicitly states, 'Reports deal in facts. Every claim you make in a report should be backed by evidence,' highlighting that evidence converts opinions into supported facts."}, {"text": "To appeal to the emotions of the reader and build a stronger narrative.", "isCorrect": false, "rationale": "Reports are typically factual and objective documents. Appealing to emotions is generally not their purpose; rather, they aim to present objective information supported by data."}]}, {"question": "A project manager states in their report, 'The team morale has significantly improved, as evidenced by anonymous survey comments describing a 'more collaborative atmosphere' and 'better communication from leadership.'' What type of evidence is primarily being used here?", "options": [{"text": "Quantitative data", "isCorrect": false, "rationale": "Quantitative data involves numbers, measurements, and percentages. The provided evidence consists of descriptive statements, not numerical values."}, {"text": "Documentary evidence", "isCorrect": false, "rationale": "While survey comments are 'documented,' the *nature* of the data itself—observations and descriptions—categorizes it as qualitative, not simply that it's a record."}, {"text": "Expert testimony", "isCorrect": false, "rationale": "Expert testimony comes from qualified professionals. These are comments from employees, not statements from a recognized expert providing professional opinion on the subject."}, {"text": "Qualitative data", "isCorrect": true, "rationale": "Qualitative data consists of observations, descriptions, and interview responses. The anonymous survey comments describing feelings and experiences ('more collaborative atmosphere') are prime examples of qualitative data."}]}, {"question": "According to 'The Evidence Rule,' if a report writer makes the claim, 'Our customer retention strategies are highly effective,' what is the most appropriate next step if they cannot immediately recall specific data to support it?", "options": [{"text": "Remove the claim from the report to avoid making an unsupported statement.", "isCorrect": false, "rationale": "While removing an unsupported claim is an option, the rule suggests a preliminary step. The primary instruction is to attempt to find data first."}, {"text": "Include the claim but add a note that the data will be provided later.", "isCorrect": false, "rationale": "This approach undermines credibility and does not fulfill the requirement of supporting claims with evidence at the point of presentation. It risks leaving an unsupported claim in the final report."}, {"text": "Find the specific data to prove the claim, or soften the claim's assertion.", "isCorrect": true, "rationale": "The Evidence Rule explicitly states: 'If not, either find the data or soften the claim.' This provides two clear, appropriate courses of action to maintain report integrity."}, {"text": "Rephrase the claim as a question to invite reader feedback.", "isCorrect": false, "rationale": "Rephrasing a claim as a question changes the nature of the statement from an assertion to an inquiry, which is not the intent of a factual report following the Evidence Rule."}]}, {"question": "A financial analyst needs to present the exact monthly sales figures for the past five years, allowing stakeholders to easily look up specific values for any given month. Which visual aid would be most appropriate for this purpose, and why?", "options": [{"text": "A bar chart, because it clearly shows trends over time.", "isCorrect": false, "rationale": "While bar charts can show trends, they are generally less effective for precise value look-up and detailed comparisons of many specific numbers than a table."}, {"text": "A pie chart, because it highlights proportions of total sales.", "isCorrect": false, "rationale": "A pie chart is used for showing proportions of a whole, not for presenting a series of precise individual monthly figures over an extended period for look-up."}, {"text": "A table, because it is best for presenting precise data and comparing specific numbers across categories.", "isCorrect": true, "rationale": "The text states: 'Use tables when readers need to look up specific values or compare numbers across categories. Tables are best for precise data.' This perfectly matches the requirement for presenting exact monthly figures for individual look-up."}, {"text": "A line graph, because it illustrates relationships between different sales metrics.", "isCorrect": false, "rationale": "Line graphs are excellent for showing trends and relationships over time, but they are not designed for quick and precise look-up of individual data points as effectively as a table."}]}, {"question": "A report includes a complex chart detailing regional market share. Which of the following actions demonstrates compliance with the recommended rules for incorporating figures into reports?", "options": [{"text": "Placing the chart at the very end of the report as an appendix to avoid interrupting the text flow.", "isCorrect": false, "rationale": "The rules state: 'Place tables and figures near the text that discusses them.' Placing it in an appendix separates it from the relevant discussion, making it less effective."}, {"text": "Giving the chart the title 'Chart 1' to keep it concise and let the data speak for itself.", "isCorrect": false, "rationale": "The rules require a *descriptive* title, such as 'Table 3: Monthly Volunteer Hours, July–December 2025.' 'Chart 1' is not descriptive enough."}, {"text": "Ensuring the chart is numbered (e.g., Figure 1) and referenced directly in the preceding or accompanying text.", "isCorrect": true, "rationale": "The rules state: 'Number every table and figure' and 'Reference every table and figure in the text. Do not drop in a table and hope the reader notices it.'"}, {"text": "Omitting units from the axes labels, assuming readers will infer them from the context.", "isCorrect": false, "rationale": "The rules state: 'Label rows, columns, and axes clearly. Include units (dollars, hours, kilograms) in column headers, not in individual cells.' Omitting units causes ambiguity."}]}, {"question": "A business report states, 'The 2024 Employee Engagement Survey indicated that 78% of staff feel their contributions are valued.' If this statistic came from an external consulting firm, why is it crucial to attribute this information in the report?", "options": [{"text": "To increase the report's overall word count and meet minimum length requirements.", "isCorrect": false, "rationale": "Attribution is about credibility and verification, not artificially inflating the word count. It serves a functional purpose, not just a quantitative one."}, {"text": "To demonstrate the writer's network of professional contacts.", "isCorrect": false, "rationale": "While it might indirectly show this, the primary purpose of attribution is not to showcase the writer's network but to credit the source and allow verification."}, {"text": "To allow readers to verify the claim and protect the writer from accusations of presenting someone else's work as their own.", "isCorrect": true, "rationale": "The text states that citations 'let the reader verify your claims by checking the original source, and they protect you from accusations of presenting someone else's work as your own.'"}, {"text": "To imply that the company itself conducted the survey.", "isCorrect": false, "rationale": "Attribution typically clarifies that the information comes from an *external* source, not to imply the company conducted it, unless the attribution explicitly states so."}]}, {"question": "A report contains the statement, 'Research shows that 87% of employees desire more flexible work arrangements.' If the writer cannot locate the source for this specific percentage, what is the most significant consequence, according to the 'Common Mistake' section?", "options": [{"text": "The report will be perceived as too academic and detached from practical business needs.", "isCorrect": false, "rationale": "An unsourced statistic would make the report less, not more, academic and would undermine its practical relevance by lacking factual basis."}, {"text": "The claim will be seen as an opinion rather than a fact, diminishing the report's credibility.", "isCorrect": true, "rationale": "The 'Common Mistake' section explicitly warns: 'Unsourced statistics damage your credibility more than they help your argument.' Without a source, a precise number loses its factual weight and becomes mere assertion."}, {"text": "The report will likely be rejected for not including enough visual elements.", "isCorrect": false, "rationale": "The lack of visual elements is a separate issue from the credibility of a specific numerical claim. The 'Common Mistake' focuses solely on the source of the number."}, {"text": "The writer will be forced to simplify the language of the entire report.", "isCorrect": false, "rationale": "There is no indication that an unsourced statistic would necessitate simplifying the language of the entire report. It specifically impacts the credibility of that particular claim."}]}, {"question": "In the 'Model Document: Incident Report — Chemistry Lab Spill,' the section on 'Contributing Factors' identifies 'Lab Station 6 has a 24-inch-wide bench surface' and 'The beaker was positioned 3 inches from the edge.' What does this focus on specific conditions rather than solely on 'Student A was careless' suggest about the report's approach?", "options": [{"text": "It aims to assign blame directly to the student for the incident.", "isCorrect": false, "rationale": "The teacher's note explicitly states: 'The report does not say the student was “careless” or “at fault.” It simply describes what happened.' The focus on systemic issues counters blaming the student."}, {"text": "It seeks to distract readers from the actual cause of the spill.", "isCorrect": false, "rationale": "The report's purpose is to accurately document and analyze the incident, not to distract. Identifying contributing factors helps in prevention."}, {"text": "It adopts a factual, neutral tone to identify systemic issues and prevent future occurrences.", "isCorrect": true, "rationale": "The teacher's note confirms this, stating: 'The 'Contributing Factors' section identifies systemic issues (narrow bench, beaker placement) rather than blaming the student.' This approach is factual and aims at systemic improvement."}, {"text": "It indicates a lack of complete information regarding the student's actions.", "isCorrect": false, "rationale": "The report details the student's actions ('accidentally knocked the beaker while reaching'). The choice to focus on systemic factors is deliberate, not due to a lack of information."}]}, {"question": "The Incident Report notes that 'Student A was wearing required safety goggles and a lab apron at the time of the incident.' Based on the discussion points for this model document, what is the most likely reason for including this specific detail?", "options": [{"text": "To imply that the safety equipment was faulty and contributed to the spill.", "isCorrect": false, "rationale": "The report states 'No injuries sustained,' which suggests the safety equipment was effective, not faulty. There's no implication of equipment failure."}, {"text": "To emphasize that the student's compliance with safety protocols helped prevent injury.", "isCorrect": true, "rationale": "The teacher's note directly addresses this: 'Why does the report mention that the student was wearing safety goggles?' (Answer: it documents compliance with safety requirements and shows that proper precautions were in place.)"}, {"text": "To indicate that the student was overly cautious, which may have caused the accident.", "isCorrect": false, "rationale": "Wearing safety gear is standard protocol, not an indication of being 'overly cautious' or a cause for the accident. The report attributes the spill to reaching across the bench."}, {"text": "To provide an irrelevant detail that pads the report length.", "isCorrect": false, "rationale": "Incident reports require a high level of detail, and documenting safety compliance is a relevant and important detail, especially in a safety-focused report."}]}, {"question": "An operations manager is writing a report to justify purchasing new manufacturing equipment. They claim the new equipment will 'significantly reduce production errors.' To make this claim most credible and effective, which combination of practices from the section 'Data and Evidence' should the manager prioritize?", "options": [{"text": "Use qualitative data from employee interviews only, and present it in a series of paragraph descriptions.", "isCorrect": false, "rationale": "While qualitative data can be useful, a claim about 'significantly reduce production errors' primarily requires quantitative evidence. Burying data in paragraphs also goes against best practices for clarity."}, {"text": "Provide quantitative data on current error rates and projected reductions, attributed to an expert's analysis, presented in a referenced table or figure.", "isCorrect": true, "rationale": "This option combines several key principles: using quantitative data for measurable outcomes, attributing claims (especially projections or analyses from experts), and presenting data clearly in tables/figures with proper references. This comprehensively builds credibility and clarity."}, {"text": "State the claim strongly without specific numbers, relying on the manager's authority, and place all visuals at the end of the report.", "isCorrect": false, "rationale": "This violates the 'Evidence Rule' (claims need support), ignores the importance of data, and contradicts the rules for placing tables and figures near relevant text."}, {"text": "Include various types of evidence but ensure the report focuses on the subjective benefits rather than measurable outcomes.", "isCorrect": false, "rationale": "While various evidence types can be good, for a claim like 'significantly reduce production errors,' focusing on *subjective* benefits over *measurable* outcomes (quantitative data) would weaken the report's factual basis and persuasiveness for a business decision."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
