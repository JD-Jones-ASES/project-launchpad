<script>
var QUESTIONS = [{"question": "Which metaphor does the text primarily use to describe the purpose and content of a professional writing portfolio?", "options": [{"text": "A comprehensive archive of every document you've ever written.", "isCorrect": false, "rationale": "The text explicitly states that a portfolio is not 'every game' or 'every snapshot,' but rather a curated collection, making this option incorrect."}, {"text": "A highlight reel of your best work, demonstrating skills and growth.", "isCorrect": true, "rationale": "The text directly uses the analogy of a 'highlight reel' for a basketball player or photographer to describe a portfolio as a curated collection of best work."}, {"text": "A historical journal detailing the evolution of your writing style over time.", "isCorrect": false, "rationale": "While a portfolio can show growth, its primary description isn't a 'historical journal.' The focus is on demonstrating skills through 'best work,' not merely documenting evolution."}, {"text": "A legal brief presenting arguments for your qualifications as a writer.", "isCorrect": false, "rationale": "The text does not suggest a portfolio serves as a legal brief. Its purpose is professional self-presentation, not a legal argument."}], "id": "q01"}, {"question": "According to the section, which of the following is NOT explicitly mentioned as a reason to build a professional writing portfolio?", "options": [{"text": "To attract clients as a freelance writer or consultant.", "isCorrect": false, "rationale": "The text states, 'A freelance writer or consultant uses a portfolio to attract clients,' making this a correct purpose."}, {"text": "To fulfill a program requirement for college students.", "isCorrect": false, "rationale": "The text states, 'A college student might submit a portfolio as part of a program requirement,' making this a correct purpose."}, {"text": "To secure intellectual property rights for original written works.", "isCorrect": true, "rationale": "The text lists several purposes for building a portfolio (job applications, college requirements, attracting clients, self-critique), but securing intellectual property rights is not among them."}, {"text": "To critically evaluate your own work and identify areas for improvement.", "isCorrect": false, "rationale": "The text states, 'building one forces you to do something valuable — look back at your own work with a critical eye, decide what is strong, and make it stronger through revision,' making this a correct purpose."}], "id": "q02"}, {"question": "The text emphasizes the portfolio as 'evidence-based self-presentation' and the 'ultimate 'show, don't tell'.' Which action best exemplifies this principle?", "options": [{"text": "Including a statement in your cover letter that you possess excellent communication skills.", "isCorrect": false, "rationale": "This is an example of 'telling' a reader about your skills, rather than 'showing' them through tangible evidence of your work."}, {"text": "Listing all the writing awards and accolades you have received on your resume.", "isCorrect": false, "rationale": "While awards are evidence, they 'tell' about recognition rather than directly 'showing' your writing ability through your actual work, which is the essence of the portfolio's principle."}, {"text": "Presenting a well-structured and clearly written technical report you authored.", "isCorrect": true, "rationale": "This option directly demonstrates your writing ability through a tangible piece of work, allowing the reader to observe your skills firsthand, embodying the 'show, don't tell' principle."}, {"text": "Providing testimonials from former clients praising your writing abilities.", "isCorrect": false, "rationale": "Testimonials provide 'evidence' of others' opinions, but they don't directly 'show' your work to the reader in the same way your actual writing samples do."}], "id": "q03"}, {"question": "A student is building their portfolio and has selected the following pieces: three professional emails, one memo, and one set of instructions. Based on the 'Range of document types' criterion, what advice would be most relevant?", "options": [{"text": "The student has met the 'five to seven pieces' guideline, so no changes are needed.", "isCorrect": false, "rationale": "While the quantity might be within the suggested range, the advice specifically cautions against too many similar document types (e.g., three emails) and encourages broader variety."}, {"text": "The student should replace one of the emails or the memo with a more distinct document type, such as a report or proposal.", "isCorrect": true, "rationale": "The text advises showing 'variety' and warns, 'If you include three emails and nothing else, the reader learns you can write emails — but not much else.' Replacing a similar document with a different type (like a report or proposal) would improve the range."}, {"text": "The student should add more examples of emails and memos to demonstrate expertise in professional correspondence.", "isCorrect": false, "rationale": "This goes against the advice to show 'variety.' Adding more similar documents would further narrow the demonstrated range of skills."}, {"text": "The student should focus on including only the highest-quality emails, regardless of document type.", "isCorrect": false, "rationale": "While quality is important, this advice ignores the specific criterion of 'Range of document types,' which is equally crucial for a well-rounded portfolio."}], "id": "q04"}, {"question": "When selecting pieces for 'Quality of writing,' the text references principles from various chapters. Which set of principles, if applied, would best indicate high-quality writing for a professional portfolio?", "options": [{"text": "Extensive use of technical jargon, creative storytelling, and detailed descriptions.", "isCorrect": false, "rationale": "Extensive jargon might hinder clear communication (unless for a specific expert audience), and creative storytelling is not a primary principle for professional writing quality as outlined in this text."}, {"text": "Clear audience awareness, concise language, and logical structure.", "isCorrect": true, "rationale": "These principles directly align with those cited in the text for quality: 'clear audience awareness (Chapter 1), concise language (Chapters 2 and 4), precise details (Chapter 5), logical structure (Chapters 9 and 13), and persuasive yet professional tone (Chapter 10).'"}, {"text": "Subjective opinions, emotional appeals, and elaborate visual design.", "isCorrect": false, "rationale": "Subjective opinions and emotional appeals are generally not hallmarks of strong professional or technical writing as taught in this context, which prioritizes clarity, precision, and professionalism."}, {"text": "Long, descriptive paragraphs, complex sentence structures, and a personal narrative voice.", "isCorrect": false, "rationale": "Long, descriptive paragraphs and complex sentences often go against the principle of concise language, and a personal narrative voice is usually inappropriate for professional documents."}], "id": "q05"}, {"question": "A student wants to demonstrate 'growth' in their portfolio. They have an early draft of a memo from Chapter 2 that was heavily revised and a polished final report from Chapter 10. How should they best leverage these pieces to show growth?", "options": [{"text": "Include only the polished final report, as it represents their current best work.", "isCorrect": false, "rationale": "While the polished report shows current ability, it doesn't, by itself, demonstrate 'measurable improvement in skill over time' without a comparative piece."}, {"text": "Include both the early memo (with its revisions highlighted) and the polished report, explaining the progression.", "isCorrect": true, "rationale": "The text advises, 'Consider including one earlier piece and one later piece to show how much you have improved.' Presenting both, especially with an explanation of the revisions, directly illustrates growth."}, {"text": "Only include the heavily revised memo, to show the effort and learning process.", "isCorrect": false, "rationale": "While the revised memo shows effort, focusing solely on it would miss the opportunity to showcase the student's polished later work and overall progression."}, {"text": "Exclude both, as the heavily revised memo suggests initial weakness, and the report alone doesn't show growth.", "isCorrect": false, "rationale": "This option misinterprets the purpose of showing growth; demonstrating improvement from an earlier, rougher piece to a later, polished one is precisely what the criterion aims for."}], "id": "q06"}, {"question": "A student is applying the 'Would I Send This?' test to a marketing proposal they plan to include. They feel the content is innovative, but the formatting is inconsistent, and there are a few typos. What is the most appropriate next step based on the writing tip?", "options": [{"text": "Include the proposal as is, assuming the innovative content will overshadow minor errors.", "isCorrect": false, "rationale": "The 'Would I Send This?' test implies a high standard; if the answer is 'not yet' due to inconsistencies or typos, it needs work. Assuming content outweighs flaws is risky."}, {"text": "Revise the proposal to fix formatting and typos, then re-evaluate for inclusion.", "isCorrect": true, "rationale": "The writing tip states: 'If the answer is 'not yet,' that piece either needs more revision or should be replaced with a stronger selection.' Revision is the direct solution for identified weaknesses."}, {"text": "Replace the proposal with an entirely different, stronger piece immediately, without attempting revision.", "isCorrect": false, "rationale": "Replacement is an option only if revision is not feasible or effective. The first step for 'not yet' is 'needs more revision.'"}, {"text": "Add a brief disclaimer in the introduction to the proposal, explaining the known flaws.", "isCorrect": false, "rationale": "Explaining flaws rather than fixing them undermines the purpose of presenting 'best work' and the professional impression the portfolio should make."}], "id": "q07"}, {"question": "Which of the following elements is NOT listed as a minimum requirement for organizing a professional portfolio?", "options": [{"text": "A cover page with the student's name, portfolio title, and date.", "isCorrect": false, "rationale": "The text lists 'A cover page with your name, the portfolio title, the date, and optionally a brief tagline or subtitle' as a minimum requirement."}, {"text": "A table of contents listing each included piece with its title and page number.", "isCorrect": false, "rationale": "The text lists 'A table of contents listing each included piece with its title and page number' as a minimum requirement."}, {"text": "A personal reflective essay summarizing the student's overall learning journey in the course.", "isCorrect": true, "rationale": "While brief introductions for *each piece* are required, a comprehensive 'personal reflective essay' summarizing the entire learning journey is not listed as a minimum organizational component."}, {"text": "Brief introductions for each document, explaining its context and why it was chosen.", "isCorrect": false, "rationale": "The text lists 'Brief introductions for each piece — one to three sentences explaining what the document is, what assignment it came from, and why you chose to include it' as a minimum requirement."}], "id": "q08"}, {"question": "Based on the 'Table of Contents' provided in the model document, what primary principle of portfolio building does it exemplify?", "options": [{"text": "Strict adherence to a maximum of six documents to maintain conciseness.", "isCorrect": false, "rationale": "The text suggests five to seven pieces; six is just an example, not a strict maximum. The primary takeaway from the ToC is the variety of document types, not the exact count."}, {"text": "The importance of including only formal business communications.", "isCorrect": false, "rationale": "The ToC includes 'Professional Email' and 'Technical Instructions,' which are not exclusively formal business communications, demonstrating a broader range."}, {"text": "An excellent demonstration of the 'Range of document types' criterion.", "isCorrect": true, "rationale": "The Table of Contents lists a diverse array of document types: email, instructions, business letter, progress report, proposal, and resume, which directly exemplifies the 'Range of document types' criterion."}, {"text": "How to show 'Demonstration of growth' by comparing early and later work.", "isCorrect": false, "rationale": "While the ToC lists documents, it doesn't provide enough information (like dates or explicit comparisons) to demonstrate growth directly. This principle is about the content itself, not just the titles in the ToC."}], "id": "q09"}, {"question": "A student is overwhelmed by the task of selecting their best work for their portfolio. According to the 'Teaching strategy' note, what is the most effective way to help this student?", "options": [{"text": "Instruct them to only include documents that received a perfect score from their instructor.", "isCorrect": false, "rationale": "The teaching strategy emphasizes objective evaluation and peer feedback, not solely relying on grades, as students may be able to revise weaker pieces to show growth."}, {"text": "Advise them to print out all their assignments, spread them out, and ask a classmate for objective feedback on strong pieces.", "isCorrect": true, "rationale": "The teaching strategy explicitly states: 'Have students spread their chapter work out... Encourage peer consultation: a classmate can often identify your strongest work more objectively than you can.'"}, {"text": "Encourage them to include every piece they've written to ensure a comprehensive overview of their progress.", "isCorrect": false, "rationale": "The differentiation note specifically advises against this, stating, 'encourage them to be selective rather than exhaustive. Quality over quantity.'"}, {"text": "Tell them to pick the five pieces they enjoyed writing the most, as passion often correlates with quality.", "isCorrect": false, "rationale": "Personal enjoyment is not a reliable criterion for 'best work' in a professional context; objective quality, range, and growth are the stated criteria."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
