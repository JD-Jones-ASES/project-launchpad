<script>
var QUESTIONS = [{"question": "According to the textbook section, what is the fundamental purpose of an agenda?", "options": [{"text": "To create a formal record of discussions for legal compliance.", "isCorrect": false, "rationale": "While meeting minutes create a record, the agenda's fundamental purpose is planning and guiding the meeting, not primarily legal compliance. The text states an agenda is 'a written outline of topics to be discussed'."}, {"text": "To provide a structured plan that guides discussions, ensures preparation, and promotes accountability during a meeting.", "isCorrect": true, "rationale": "The text explicitly states an agenda serves three critical purposes: Focus, Preparation, and Accountability. It is described as 'a plan' and 'the map that keeps your meeting on course'."}, {"text": "To solely allocate specific time slots to each speaker to ensure everyone gets a chance to talk.", "isCorrect": false, "rationale": "Time allocation is one component of an agenda, but it's part of the broader purpose of maintaining focus and progress, not merely ensuring speaking turns. The text emphasizes time allocations for topics and keeping discussion on track."}, {"text": "To list all potential topics that might arise, allowing for spontaneous discussion.", "isCorrect": false, "rationale": "The text warns against vague items and states that if a topic is not on the agenda, 'it does not belong in the meeting' to prevent drifting and maintain focus."}]}, {"question": "A project manager is leading a meeting where a discussion has gone significantly over its allocated time, preventing other crucial items from being addressed. According to the text, how does a well-structured agenda empower the facilitator in this situation?", "options": [{"text": "It requires the facilitator to extend the meeting duration to accommodate all discussions.", "isCorrect": false, "rationale": "The text indicates that without an agenda, 'the meeting runs long'. A good agenda helps prevent this by setting time expectations, not by requiring extensions."}, {"text": "It allows the facilitator to politely interrupt and redirect the conversation to the next topic, citing the pre-agreed time allocations.", "isCorrect": true, "rationale": "Under 'Why Agendas Matter', the Accountability section states, 'An agenda with time allocations gives the facilitator permission to say, “We need to move on to the next topic.”' This directly addresses the scenario."}, {"text": "It forces attendees to self-regulate their discussion length without facilitator intervention.", "isCorrect": false, "rationale": "While attendees should be mindful, the text highlights the facilitator's active role in enforcing the agenda's structure and time limits for accountability."}, {"text": "It provides a clear record to blame specific individuals for lengthy discussions after the meeting.", "isCorrect": false, "rationale": "The purpose of accountability in an agenda is to keep the meeting on track and productive, not to assign blame. Its role is proactive, not punitive post-meeting."}]}, {"question": "Which of the following describes an 'Action item' as defined in the vocabulary box?", "options": [{"text": "A general topic that needs further discussion in future meetings.", "isCorrect": false, "rationale": "An action item is specific and assigned with a deadline, not a general discussion topic. General topics for future meetings might be 'tabled'."}, {"text": "A specific task assigned to a particular person with a definite completion deadline.", "isCorrect": true, "rationale": "The vocabbox defines 'Action item' as 'A specific task assigned to a specific person with a specific deadline.' This option perfectly matches the definition."}, {"text": "A list of attendees who were present at the meeting.", "isCorrect": false, "rationale": "Attendees are people participating in a meeting, not a task. This describes the 'Attendee' vocabulary term."}, {"text": "A detailed report presented by a stakeholder during the meeting.", "isCorrect": false, "rationale": "A report might be part of an agenda item, but an 'Action item' is a task to be completed, not the report itself. A stakeholder is a person affected by a decision."}]}, {"question": "According to the 'Writing Tip: Specific Agenda Items,' which of these agenda items is most effective and why?", "options": [{"text": "Project Update: Information sharing only.", "isCorrect": false, "rationale": "While it states 'Information sharing only,' it lacks specificity on *which* project, *who* is leading, and *how long* it will take, making it less effective than a fully specific item."}, {"text": "Budget Review (15 min) - Led by Finance Dept. - Decision on Q4 spending.", "isCorrect": true, "rationale": "This option is specific: it names the topic ('Budget Review'), allocates time (15 min), identifies the leader ('Finance Dept.'), and states the expected outcome ('Decision on Q4 spending'), aligning with the 'Writing Tip's example: 'Decide on fundraiser type... Decision needed'."}, {"text": "Discuss various items.", "isCorrect": false, "rationale": "This is a vague agenda item, similar to the 'Common Mistake' example of 'Other,' providing no clear direction, leader, time, or outcome."}, {"text": "Team Check-in: Open discussion.", "isCorrect": false, "rationale": "While 'Team Check-in' is a title, 'Open discussion' provides no specific topic, time, leader, or expected outcome for individual sub-items, leading to potential wandering discussions."}]}, {"question": "In the standard structure for organizing agenda items, when is 'Old business' typically addressed, and what is its purpose?", "options": [{"text": "At the very end of the meeting, to quickly recap anything missed.", "isCorrect": false, "rationale": "Old business is not a recap of missed items; it is a follow-up on previous action items. It appears before new business, not at the very end."}, {"text": "Immediately after the Call to order, to allow for new urgent topics to be introduced.", "isCorrect": false, "rationale": "Old business comes after 'Approval of previous minutes' and is for follow-up on existing items, not introducing new urgent topics, which fall under 'New business'."}, {"text": "After approval of previous minutes and before new business, to follow-up on action items from the last meeting.", "isCorrect": true, "rationale": "The text states the common structure: 'Approval of previous minutes' is followed by 'Old business' where participants 'Follow-up on action items from the previous meeting. Who completed what? What is still pending?'"}, {"text": "Only in informal meetings, where formal minutes are not approved.", "isCorrect": false, "rationale": "The text presents this as a common structure for 'most meetings,' not exclusively informal ones, and it follows the approval of minutes, which implies a degree of formality."}]}, {"question": "A facilitator struggles to keep meeting attendees focused, often finding conversations drifting to unrelated topics. Based on the section 'Why Agendas Matter,' which critical purpose is being undermined in this situation?", "options": [{"text": "Preparation, because attendees are not doing their homework before the meeting.", "isCorrect": false, "rationale": "Preparation is about attendees coming ready to contribute on the agenda topics. While drifting might occur due to lack of preparation, the primary issue of off-topic discussions points more directly to 'Focus'."}, {"text": "Accountability, as there's no clear way to assign follow-up tasks.", "isCorrect": false, "rationale": "Accountability relates to task completion and reporting progress, and for facilitators, politely cutting off long discussions. While related to overall meeting effectiveness, the specific issue of 'drifting to unrelated topics' is about maintaining 'Focus'."}, {"text": "Focus, because the agenda isn't clearly defining what belongs in the meeting and what does not.", "isCorrect": true, "rationale": "The 'Focus' purpose explicitly states, 'An agenda tells everyone what the meeting is about — and, just as importantly, what it is not about. If a topic is not on the agenda, it does not belong in the meeting. This prevents the all-too-common problem... because someone brought up something unrelated.'"}, {"text": "Consensus, as the group cannot reach general agreement.", "isCorrect": false, "rationale": "Consensus is a vocabulary term referring to general agreement, not one of the three critical purposes of an agenda. Lack of focus might hinder consensus, but it's not the undermined purpose itself."}]}, {"question": "Referring to the 'Model Document: School Club Meeting Agenda,' what critical information would be missing for an attendee if the 'New business' item only stated 'Spring project' instead of 'Choose spring community service project (park cleanup vs. community garden vs. river trail restoration)'?", "options": [{"text": "The location of the spring project.", "isCorrect": false, "rationale": "The 'New business' item, even in its specific form, doesn't detail the location of the project itself, only the type. This information would be decided later or be part of discussion, not directly specified in the agenda item itself."}, {"text": "The expected outcome and the specific options to be decided upon.", "isCorrect": true, "rationale": "The specific item 'Choose spring community service project...' clearly states the expected outcome ('Decision') and lists the distinct options for that decision. A vague 'Spring project' would miss both of these, as highlighted in the 'Writing Tip' and 'beforeafter' sections."}, {"text": "Who is leading the spring project after the decision is made.", "isCorrect": false, "rationale": "The specific agenda item states 'Lead: All' for the decision-making part, not who will lead the project post-decision. The subsequent project leadership is an action item arising from the decision, not part of the agenda item itself."}, {"text": "The exact date and time when the spring project will take place.", "isCorrect": false, "rationale": "The agenda item is about *choosing* the project, not scheduling its execution. Dates for the project itself would be determined later, possibly as action items."}]}, {"question": "The textbook emphasizes sending the agenda to attendees at least 24 hours before the meeting. What is the primary benefit of this practice?", "options": [{"text": "It guarantees that all action items will be completed before the meeting starts.", "isCorrect": false, "rationale": "Action items are typically assigned *during* or *after* a meeting, or are follow-ups from previous meetings. Distributing the agenda is for preparation, not pre-meeting task completion."}, {"text": "It allows participants sufficient time to prepare, gather information, and formulate their contributions for the scheduled topics.", "isCorrect": true, "rationale": "The text states, 'This gives people time to prepare. Include any documents they need to review, and ask them to confirm attendance.' The 'Preparation' purpose also emphasizes participants gathering information and thinking through positions."}, {"text": "It serves as the official legal record of the meeting before minutes are taken.", "isCorrect": false, "rationale": "Meeting minutes are the official record, not the agenda. The agenda is a plan. This confuses the purpose of agendas with minutes."}, {"text": "It ensures that the meeting facilitator has final approval on all discussion points.", "isCorrect": false, "rationale": "While the facilitator leads, sending the agenda is about participant preparation, not the facilitator's final approval on discussion points. The facilitator ensures the agenda is followed, but the agenda itself is a collaborative plan."}]}, {"question": "Which of the following scenarios best exemplifies the danger of a 'Common Mistake: The Agenda That Is Really a List,' as described in the text?", "options": [{"text": "A meeting with detailed agenda items, but no assigned leaders, causing confusion about who should speak.", "isCorrect": false, "rationale": "This describes missing 'person responsible,' which is a crucial detail, but the 'Common Mistake' specifically targets agenda items that are just vague single words like 'Budget' or 'Other,' leading to a lack of focus."}, {"text": "A meeting where the agenda lists 'Budget,' 'Website,' and 'Other,' resulting in discussions that wander off-topic with no clear decisions or outcomes.", "isCorrect": true, "rationale": "The text directly uses these examples ('Budget', 'Website', 'Other') to illustrate the 'Common Mistake' of an agenda being just a list, leading to vagueness and 'destroying the focus that an agenda is supposed to provide.'"}, {"text": "A recurring weekly meeting that uses a template agenda, making it efficient but predictable.", "isCorrect": false, "rationale": "The text explicitly states that 'you can create a template agenda that stays mostly the same... This saves time and helps attendees know what to expect.' This is a recommended practice, not a mistake."}, {"text": "A meeting agenda that only allocates 5 minutes for 'New business,' despite having several complex topics.", "isCorrect": false, "rationale": "This indicates poor time allocation, which is an issue with agenda *quality*, but not the specific 'Common Mistake' of having single-word, vague topics. The mistake is about the lack of specificity, not insufficient time."}]}, {"question": "According to the 'Key Concept: The Purpose of an Agenda,' an effective agenda should answer four questions. Which of the following is NOT one of those questions?", "options": [{"text": "What will we discuss?", "isCorrect": false, "rationale": "This is one of the four key questions listed: 'What will we discuss? (Topics, listed in order)'."}, {"text": "Who needs to be there?", "isCorrect": false, "rationale": "This is one of the four key questions listed: 'Who needs to be there? (Attendees and their roles)'."}, {"text": "What was decided in the previous meeting?", "isCorrect": true, "rationale": "The four questions are 'What will we discuss?', 'Who needs to be there?', 'How long will each topic take?', and 'What outcome do we need?'. 'What was decided in the previous meeting?' is addressed by reviewing and approving minutes, which is part of 'Old business,' but not one of the four core questions an agenda *answers before the meeting begins*."}, {"text": "What outcome do we need?", "isCorrect": false, "rationale": "This is one of the four key questions listed: 'What outcome do we need? (Decision, update, brainstorm)'."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
