<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear and Effective: Professional &amp; Technical Writing &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the primary shared purpose of all reports, regardless of their specific type?", "options": [{"text": "To assign blame and accountability for project failures.", "isCorrect": false, "rationale": "While reports might indirectly inform accountability, the text explicitly states that incident reports, for example, are not for assigning blame, and this is not the overarching purpose of all reports."}, {"text": "To present organized factual information for decision-making, tracking, or understanding events.", "isCorrect": true, "rationale": "The introductory paragraph states: 'reports... all share the same basic purpose: to present organized information so that someone can make a decision, track progress, or understand what happened.'"}, {"text": "To provide a platform for personal opinions and subjective interpretations.", "isCorrect": false, "rationale": "The 'Common Mistake' section for incident reports strongly advises against including opinions, emphasizing factual reporting, which applies to most professional reports."}, {"text": "To strictly fulfill legal and regulatory compliance requirements.", "isCorrect": false, "rationale": "While some reports (like compliance reports or incident reports) serve this purpose, it is not the primary, overarching purpose for *all* types of reports mentioned (e.g., progress reports, trip reports)."}]}, {"question": "A project manager needs to inform stakeholders about the current state of a long-term software development project, including what tasks have been finished in the last month, what the team is currently working on, and the upcoming milestones for the next two weeks. Which type of report would be most appropriate?", "options": [{"text": "Incident report", "isCorrect": false, "rationale": "An incident report documents unexpected events, not the regular progression of a project."}, {"text": "Status report", "isCorrect": false, "rationale": "While a status report covers the current state and next steps, the explicit inclusion of 'what has been finished since the last report' and the 'arc of a project' points more specifically to a progress report."}, {"text": "Progress report", "isCorrect": true, "rationale": "A progress report directly answers 'What have we done so far?', 'What are we doing right now?', and 'What still needs to happen?', covering completed, current, and upcoming work, which perfectly matches the scenario."}, {"text": "Trip report", "isCorrect": false, "rationale": "A trip report summarizes a business trip or conference, not project development progress."}]}, {"question": "According to the writing tip, what is the best practice when a project is behind schedule or over budget in a progress report?", "options": [{"text": "Omit the negative information to avoid alarming stakeholders and preserve credibility.", "isCorrect": false, "rationale": "The 'Writing Tip: Be Honest About Problems' explicitly states that 'Hiding problems in a progress report is one of the fastest ways to lose credibility.'"}, {"text": "Briefly mention the problem without details, focusing on positive aspects instead.", "isCorrect": false, "rationale": "The tip advises to 'clearly, factually' state the problem and 'explain why it happened,' which goes beyond a brief mention without details."}, {"text": "Clearly state the problem, explain its cause, and describe the planned corrective actions.", "isCorrect": true, "rationale": "The 'Writing Tip: Be Honest About Problems' states: 'State the problem, explain why it happened, and describe what you are doing to fix it.'"}, {"text": "Assign blame to specific team members to document accountability for the delay.", "isCorrect": false, "rationale": "The text for incident reports (and general report writing principles) advises against assigning blame, focusing instead on facts and solutions."}]}, {"question": "What is the key difference between an 'Abstract' and an 'Executive Summary' as defined in the vocabulary section?", "options": [{"text": "An Abstract is only used for internal company documents, while an Executive Summary is for external stakeholders.", "isCorrect": false, "rationale": "The text does not specify this distinction; both can be used internally or externally depending on context."}, {"text": "An Abstract is a longer, more detailed version, whereas an Executive Summary is much shorter.", "isCorrect": false, "rationale": "Both are defined as short summaries, serving similar purposes."}, {"text": "They serve essentially the same purpose as a short summary, but an Abstract is more common in academic and scientific writing.", "isCorrect": true, "rationale": "The vocabulary definition for 'Abstract' states it is 'similar to an executive summary but more common in academic and scientific writing.'"}, {"text": "An Abstract presents raw data, while an Executive Summary provides conclusions.", "isCorrect": false, "rationale": "Neither presents raw data; both summarize the key points, purpose, methods, findings, and conclusions of a report."}]}, {"question": "An incident report is being drafted after an employee slipped on a wet floor. Which statement exemplifies the 'Common Mistake: Opinion in Incident Reports' and should be avoided?", "options": [{"text": "The employee, John Doe, slipped on a puddle near the water cooler at approximately 10:15 AM.", "isCorrect": false, "rationale": "This is a factual statement about who, what, when, and where, which is appropriate for an incident report."}, {"text": "Water from a leaking pipe formed a puddle, creating a hazardous condition for employees.", "isCorrect": false, "rationale": "This describes contributing factors based on observation, which is factual and relevant for preventing future incidents."}, {"text": "The employee was clearly not paying attention to where he was walking, which caused the fall.", "isCorrect": true, "rationale": "This statement expresses an opinion ('clearly not paying attention') and assigns blame, directly violating the 'Common Mistake: Opinion in Incident Reports' guidance."}, {"text": "Maintenance was notified immediately to address the leaking pipe and clean the floor.", "isCorrect": false, "rationale": "This describes actions taken in response to the incident, which is a required factual component of an incident report."}]}, {"question": "Which of the following is NOT listed as a primary purpose for creating an incident report?", "options": [{"text": "To identify patterns if similar incidents occur repeatedly.", "isCorrect": false, "rationale": "The text lists 'Identify patterns (if similar incidents keep occurring)' as a purpose."}, {"text": "To create a factual record for legal or regulatory compliance.", "isCorrect": false, "rationale": "The text lists 'Satisfy legal or regulatory requirements' as a purpose."}, {"text": "To immediately assign blame to the individuals responsible for the incident.", "isCorrect": true, "rationale": "The text explicitly states: 'The purpose of an incident report is not to assign blame.'"}, {"text": "To gather information that can help prevent future similar incidents.", "isCorrect": false, "rationale": "The text lists 'Prevent the same incident from happening again' as a purpose."}]}, {"question": "How do Status Reports fundamentally differ from Progress Reports?", "options": [{"text": "Status reports are typically much longer and more detailed than progress reports.", "isCorrect": false, "rationale": "The text states that status reports are 'usually shorter than progress reports.'"}, {"text": "Status reports focus on past achievements and future plans, while progress reports are a present snapshot.", "isCorrect": false, "rationale": "This statement reverses the definitions. Progress reports cover past, present, and future; status reports are a present snapshot."}, {"text": "Status reports are a snapshot of the current moment, whereas progress reports describe an arc of accomplishment over time.", "isCorrect": true, "rationale": "The text defines a status report as 'a snapshot: here is where things stand right now,' while a progress report describes 'what has been accomplished... what is currently underway, and what remains to be done,' covering an arc of time."}, {"text": "Status reports are only for external stakeholders, while progress reports are strictly internal.", "isCorrect": false, "rationale": "The text does not specify these limitations; both can be for internal or external audiences."}]}, {"question": "A researcher completes a study and is writing a report. The core results and their interpretation will be presented in the main body. Where would the detailed raw survey responses and statistical output tables most appropriately be placed?", "options": [{"text": "The Executive Summary", "isCorrect": false, "rationale": "The Executive Summary is a brief overview of key points, not a place for detailed raw data."}, {"text": "The Appendix", "isCorrect": true, "rationale": "The vocabulary defines 'Appendix' as 'A section at the end of a report containing supplementary material (raw data, forms, detailed charts) that supports the main text.'"}, {"text": "The Findings section", "isCorrect": false, "rationale": "The Findings section presents the factual *results* discovered through research, not the raw underlying data itself."}, {"text": "The Conclusion", "isCorrect": false, "rationale": "The Conclusion provides an interpretation of what the findings mean, not the raw data."}]}, {"question": "A team is preparing a report on customer satisfaction. They decide to conduct a survey via email to 500 randomly selected customers and follow up with 20 phone interviews. This description of how they plan to gather information for their report primarily falls under which report element?", "options": [{"text": "Findings", "isCorrect": false, "rationale": "Findings are the factual results discovered, not the process used to find them."}, {"text": "Scope", "isCorrect": false, "rationale": "Scope defines the boundaries of what a report covers, not the methods used for data collection."}, {"text": "Data", "isCorrect": false, "rationale": "Data refers to the facts, numbers, or observations collected, not the plan or process of collection."}, {"text": "Methodology", "isCorrect": true, "rationale": "The vocabulary defines 'Methodology' as 'The process or methods used to gather information for a report,' which perfectly matches the description of conducting surveys and interviews."}]}, {"question": "Based on the 'Writing Connection' tip, which type of informational report has a structure that closely mirrors the core structure (introduction, methods, results, conclusion) found in professional reports?", "options": [{"text": "Trip reports", "isCorrect": false, "rationale": "While a type of informational report, trip reports are not highlighted for mirroring the core professional report structure in the text."}, {"text": "Meeting summaries", "isCorrect": false, "rationale": "Meeting summaries capture decisions and action items, which is different from the introduction, methods, results, conclusion structure."}, {"text": "Inspection reports", "isCorrect": false, "rationale": "Inspection reports record conditions after an inspection, which doesn't directly map to the mentioned core structure."}, {"text": "Lab reports", "isCorrect": true, "rationale": "The 'Writing Connection' explicitly states: 'A lab report has an introduction (purpose), methods, results, and conclusion—the same core structure used in professional reports.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
