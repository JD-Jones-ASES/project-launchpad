<script>
var QUESTIONS = [{"question": "According to the text, what is the primary purpose of a style guide or style sheet in professional writing?", "options": [{"text": "To impress readers with complex formatting unique to each document.", "isCorrect": false, "rationale": "The text states the opposite: inconsistency distracts. Style guides aim for uniformity, not unique, complex formatting per document."}, {"text": "To ensure consistency in formatting, language, and presentation across multiple documents.", "isCorrect": true, "rationale": "The text explicitly states, 'The purpose is always the same: consistency—uniformity in formatting, language, and presentation across all documents in a set or organization.'"}, {"text": "To allow writers full creative freedom with formatting without rules.", "isCorrect": false, "rationale": "Style guides establish 'agreed-upon rules' and conventions, which inherently means setting boundaries, not unlimited freedom, for the sake of consistency."}, {"text": "To reduce the total word count by enforcing strict abbreviations.", "isCorrect": false, "rationale": "While some style choices might involve abbreviations, the primary purpose is consistency and reader focus, not word count reduction."}]}, {"question": "The 'keyconcept' section states, 'Consistency Builds Credibility.' Which of the following best explains *how* consistency achieves this in a professional portfolio?", "options": [{"text": "It demonstrates a writer's ability to innovate unique design elements for each piece.", "isCorrect": false, "rationale": "Consistency focuses on uniformity and adherence to established rules, not on demonstrating unique innovation in design for each document."}, {"text": "It allows the reader to focus on the content, implying the writer is careful and organized.", "isCorrect": true, "rationale": "The text explains, 'When every document follows the same conventions... the reader can focus on content instead of being distracted by shifting formats.' It further adds, 'A portfolio with consistent formatting tells the reader: This person is careful, organized, and professional.'"}, {"text": "It ensures that all documents are visually appealing, regardless of their content.", "isCorrect": false, "rationale": "While consistency can contribute to visual appeal, the core link to credibility is through demonstrating attention to detail and professionalism, which allows the reader to trust the content."}, {"text": "It proves that the writer has consulted multiple external style guides.", "isCorrect": false, "rationale": "Consistency demonstrates adherence to *a* chosen set of rules, whether internal or external, but doesn't specifically prove consultation of *multiple* external guides."}]}, {"question": "Based on the text, what is the fundamental difference between an 'organizational style guide' and a 'style sheet' for a personal portfolio?", "options": [{"text": "An organizational style guide is exclusively for academic writing, while a style sheet is for business.", "isCorrect": false, "rationale": "The text mentions organizational style guides for newspapers (AP), academic researchers (APA, MLA, Chicago), and companies, indicating they are not sector-exclusive. A style sheet is for a specific set of documents, like a portfolio, regardless of sector."}, {"text": "A style sheet is a much simpler, typically one-page reference tailored for a specific set of documents, whereas an organizational style guide is extensive and covers all publications for a large entity.", "isCorrect": true, "rationale": "The text states, 'A full organizational style guide can run hundreds of pages. For your portfolio, you need a much simpler document: a style sheet—a one-page reference listing the specific formatting conventions used in a particular document or set of documents.'"}, {"text": "An organizational style guide focuses only on grammar, while a style sheet only covers formatting.", "isCorrect": false, "rationale": "Both types of guides cover a broad range of conventions including formatting, punctuation, terminology, and other usage rules, not just grammar or formatting exclusively."}, {"text": "A style sheet is mandatory for all professional writers, but an organizational style guide is optional.", "isCorrect": false, "rationale": "Major organizations typically have style guides, implying they are not optional in those contexts. For a portfolio, a style sheet is presented as a crucial tool for professionalism."}]}, {"question": "Which of the following conventions is *not* explicitly listed as a minimum requirement to include in a portfolio style sheet?", "options": [{"text": "Date format.", "isCorrect": false, "rationale": "The text lists 'Date format' as a minimum requirement."}, {"text": "Number conventions.", "isCorrect": false, "rationale": "The text lists 'Number conventions' as a minimum requirement."}, {"text": "Preferred font types and sizes.", "isCorrect": true, "rationale": "While important for overall document design, 'Preferred font types and sizes' are not explicitly mentioned in the enumerated list of minimum requirements for a style sheet. The list covers date, number, time, titles/headings (capitalization, bold, italic, underlined), lists, names/terms, and punctuation."}, {"text": "Punctuation preferences.", "isCorrect": false, "rationale": "The text lists 'Punctuation preferences' (e.g., Oxford comma) as a minimum requirement."}]}, {"question": "The text suggests a specific approach to applying your style sheet. When is the most effective time to begin creating a style sheet for a large writing project like a portfolio?", "options": [{"text": "Only after all documents are complete and ready for final review.", "isCorrect": false, "rationale": "The 'Writing Tip' advises, 'Do not wait until your portfolio is assembled to create a style sheet.'"}, {"text": "As a final proofreading step, combining it with content revisions.", "isCorrect": false, "rationale": "The text states, 'This is best done as a dedicated pass — separate from content revision and proofreading.'"}, {"text": "At the very beginning of the project, adding decisions to it as they are made.", "isCorrect": true, "rationale": "The 'Writing Tip' recommends, 'Start one at the beginning of any large writing project. Add decisions to it as you make them.'"}, {"text": "When a peer reviewer points out inconsistencies.", "isCorrect": false, "rationale": "Creating the style sheet proactively helps prevent inconsistencies, rather than reacting to them after they've been identified by others."}]}, {"question": "To efficiently ensure consistency across multiple documents in a portfolio, the text recommends a 'methodical approach.' What is a key technique suggested for catching inconsistencies?", "options": [{"text": "Reading each document aloud multiple times to catch awkward phrasing.", "isCorrect": false, "rationale": "While a useful proofreading technique, reading aloud is primarily for identifying issues with flow and grammar, not specifically for consistent formatting details like date or number formats."}, {"text": "Using a word processor's search function to find every instance of potential variations (e.g., 'PM' vs. 'p.m.').", "isCorrect": true, "rationale": "The text explicitly advises, 'A useful technique: use the search function in your word processor to find every instance of a potential inconsistency. Search for “PM” and “p.m.” to make sure you have used only one.'"}, {"text": "Asking multiple people to read the documents and mark any errors they find.", "isCorrect": false, "rationale": "Peer review can be helpful, but the text emphasizes a self-driven, methodical approach using specific tools for consistency checking."}, {"text": "Randomly selecting pages from each document to check for overall stylistic feel.", "isCorrect": false, "rationale": "A 'methodical approach' implies thoroughness and systematic checking, not random selection."}]}, {"question": "Analyze the 'before/after' example provided. The 'After' version is considered more professional primarily because:", "options": [{"text": "It uses more formal vocabulary, such as 'document' instead of 'doc.'", "isCorrect": false, "rationale": "While it does use more formal vocabulary, the text emphasizes that 'None of these individual choices is the only “right” way — but applying them consistently is what makes the writing look professional.' The core reason is consistency, not just formality."}, {"text": "It applies consistent rules for dates, times, numbers, and titles, even if individual choices aren't universally 'right.'", "isCorrect": true, "rationale": "The text directly states, 'Notice that the “After” version follows consistent rules... None of these individual choices is the only “right” way — but applying them consistently is what makes the writing look professional.'"}, {"text": "It has eliminated all abbreviations, making it easier to read.", "isCorrect": false, "rationale": "The 'After' version still uses abbreviations like 'Q3 Report.' The point is consistent application of chosen rules, not necessarily eliminating all abbreviations."}, {"text": "It uses a specific brand-name style guide like APA or MLA.", "isCorrect": false, "rationale": "The example demonstrates internal consistency based on personal choices recorded in a style sheet, not adherence to a named external style guide."}]}, {"question": "The 'Common Mistake' box highlights students 'changing conventions midway through' a document. What is identified as the primary reason for this mistake and its prevention?", "options": [{"text": "Lack of creativity, leading to boredom with a single format.", "isCorrect": false, "rationale": "The text does not mention creativity or boredom as the cause; it points to a lack of a clear, written reference."}, {"text": "Not having a written style sheet to consult, which a written style sheet can prevent.", "isCorrect": true, "rationale": "The text explicitly states, 'This happens because they do not have a written style sheet to consult. Writing your conventions down prevents drift.'"}, {"text": "Over-reliance on a word processor's grammar checker.", "isCorrect": false, "rationale": "The text does not mention grammar checkers in relation to this common mistake."}, {"text": "Prioritizing speed over accuracy in the writing process.", "isCorrect": false, "rationale": "While related, the text specifically identifies the absence of a written style sheet as the direct cause of 'drifting' conventions."}]}, {"question": "The text advises that applying your style sheet should be done as a 'dedicated pass.' This implies that checking for formatting consistency should be:", "options": [{"text": "Integrated into the initial drafting phase to save time later.", "isCorrect": false, "rationale": "The text advises it is 'separate from content revision and proofreading,' suggesting it is not part of the initial drafting."}, {"text": "Performed simultaneously with content revision and proofreading for maximum efficiency.", "isCorrect": false, "rationale": "The text explicitly states it should be 'separate from content revision and proofreading,' emphasizing it as a distinct activity."}, {"text": "A distinct activity, separate from editing for content or correcting grammar/spelling.", "isCorrect": true, "rationale": "The text states, 'This is best done as a dedicated pass — separate from content revision and proofreading. Read specifically for formatting consistency.'"}, {"text": "Delegated to a peer reviewer to catch errors the writer might miss.", "isCorrect": false, "rationale": "While peer review is valuable, the text describes *your* dedicated pass as the method for applying the style sheet, not necessarily delegating it."}]}, {"question": "Considering the entire 'Style Guide Basics' section, what is the overarching benefit a well-maintained style sheet brings to a professional portfolio?", "options": [{"text": "It guarantees perfect grammar and eliminates all spelling errors.", "isCorrect": false, "rationale": "While consistency can indirectly improve clarity, the primary focus of a style sheet is consistency in formatting and usage conventions, not a guarantee of perfect grammar or spelling."}, {"text": "It allows the writer to avoid any formal formatting rules by setting their own.", "isCorrect": false, "rationale": "A style sheet involves *setting* and *following* rules, albeit personalized ones, to ensure consistency, not to avoid formal rules altogether."}, {"text": "It enhances the portfolio's professionalism and credibility by demonstrating attention to detail and organized thinking.", "isCorrect": true, "rationale": "This synthesizes several points from the text, including 'Consistency Builds Credibility,' 'Inconsistent formatting signals a lack of attention to detail,' and 'A portfolio with consistent formatting tells the reader: This person is careful, organized, and professional.'"}, {"text": "It ensures the portfolio will appeal to the widest possible audience by conforming to all major industry standards.", "isCorrect": false, "rationale": "A style sheet ensures *internal* consistency for *your* portfolio. While it may align with some professional standards, it does not guarantee conformity to *all* major industry standards or universal audience appeal."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
