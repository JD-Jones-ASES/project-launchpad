<script>
var QUESTIONS = [{"question": "What is the primary purpose of an executive summary?", "options": [{"text": "To provide a highly detailed analysis of every section of the report for comprehensive understanding.", "isCorrect": false, "rationale": "The executive summary is a brief overview for busy readers, not a detailed analysis of every section."}, {"text": "To offer a concise overview of the report's key points, findings, and conclusions for busy readers.", "isCorrect": true, "rationale": "The text explicitly defines an executive summary as 'a brief overview of a report's key points, written for busy readers who may not read the full document.'"}, {"text": "To replace the need for the full report by containing all necessary information.", "isCorrect": false, "rationale": "While it should allow for understanding the main message, it doesn't entirely replace the full report, as specific details would still be in the main document for those who need to delve deeper. It's a 'miniature version,' not a replacement."}, {"text": "To serve as an introductory chapter, setting the historical context and background for the report's topic.", "isCorrect": false, "rationale": "The executive summary focuses on the report's key points, findings, conclusions, and recommendations, not primarily historical context or extensive background."}]}, {"question": "According to the section, at which stage of the report writing process should the executive summary be drafted?", "options": [{"text": "First, to establish a clear direction and outline for the entire report.", "isCorrect": false, "rationale": "Writing it first can lead to vague or incomplete summaries because the full content and final key points are not yet solidified."}, {"text": "After the introduction but before the main findings, to provide a preview.", "isCorrect": false, "rationale": "The text states it 'sits at the beginning of the report,' but should be written last, not after only the introduction."}, {"text": "Last, after the full report has been completed and its key points are definitively known.", "isCorrect": true, "rationale": "The text explicitly states, 'It sits at the beginning of the report, but you should write it last—after you have finished the rest of the document and know exactly what the key points are.'"}, {"text": "Concurrently with the findings section, to ensure it accurately reflects the data.", "isCorrect": false, "rationale": "Writing it concurrently might still lead to incompleteness if the full scope and conclusions are not yet finalized."}]}, {"question": "The hospital administrator example illustrates that decision-makers often rely on executive summaries because:", "options": [{"text": "They prefer to delegate reading the full report to subordinates.", "isCorrect": false, "rationale": "While delegation may happen, the primary reason given is the sheer volume of information and lack of time for busy executives to read everything cover to cover."}, {"text": "Executive summaries typically contain more detailed information than the full report.", "isCorrect": false, "rationale": "Executive summaries are miniature versions; the full report contains the detailed information. The summary points to where to find details."}, {"text": "They need to quickly identify critical information and decide which sections of the full report require their attention.", "isCorrect": true, "rationale": "The example shows administrators using summaries to 'triage' reports: if something 'catches your attention,' you read the full section; 'Otherwise, you move on.' This highlights the need to quickly identify critical information."}, {"text": "The full report is usually written in a technical language that decision-makers cannot understand.", "isCorrect": false, "rationale": "The text does not suggest a language barrier; it emphasizes time constraints and the need for efficiency."}]}, {"question": "Which of the following elements is explicitly stated as a required component of an executive summary?", "options": [{"text": "A comprehensive appendix listing all raw data used in the report.", "isCorrect": false, "rationale": "Appendices are part of the full report, not the executive summary itself. Key findings would summarize data, but not include raw data."}, {"text": "A detailed methodology section explaining data collection techniques.", "isCorrect": false, "rationale": "Methodology is typically found in the main body of the report, not the executive summary, which focuses on findings and conclusions."}, {"text": "The report's purpose, key findings, conclusions, and any recommendations.", "isCorrect": true, "rationale": "The 'What an Executive Summary Must Include' section explicitly lists these four components: Purpose, Key findings, Conclusions, and Recommendations (if any)."}, {"text": "An extensive background section to fully contextualize the report's subject.", "isCorrect": false, "rationale": "While context is important, an 'extensive' background section would contradict the summary's brief nature. The purpose covers 'Why the report was written' which includes context, but not an extensive section."}]}, {"question": "A team is preparing an executive summary for a 45-page research paper. Based on the guidelines provided in the text, what is a reasonable length for this executive summary?", "options": [{"text": "One paragraph (4-6 sentences).", "isCorrect": false, "rationale": "One paragraph is recommended for a 5-page report. A 45-page report requires a longer summary."}, {"text": "Approximately one page.", "isCorrect": true, "rationale": "The text states 'For a 20-page report, one page. For a 100-page report, two to three pages.' Given that a 45-page report is significantly longer than 20 pages but less than half of 100, approximately one page is the most proportional and reasonable estimate within the given examples, also considering the 'no more than 10%' rule (4.5 pages maximum)."}, {"text": "Two to three pages.", "isCorrect": false, "rationale": "Two to three pages is recommended for a 100-page report, which would be disproportionately long for a 45-page report based on the 10% rule (4.5 pages)."}, {"text": "Five to eight pages.", "isCorrect": false, "rationale": "This length would exceed the 'no more than 10% of the total report length' guideline for a 45-page report (maximum 4.5 pages)."}]}, {"question": "When writing an executive summary, the guideline 'Lead with the bottom line' primarily means you should:", "options": [{"text": "Provide all necessary background information before presenting any findings.", "isCorrect": false, "rationale": "The text specifically advises, 'Do not make the reader wade through background before reaching the point.'"}, {"text": "Start by explaining the report's methodology and data collection process.", "isCorrect": false, "rationale": "Methodology is not the 'bottom line' that decision-makers are primarily seeking immediately."}, {"text": "Place the most important finding or conclusion in the first or second sentence.", "isCorrect": true, "rationale": "The guideline 'Lead with the bottom line' is explained as: 'The most important finding or conclusion... should be the first or second sentence.'"}, {"text": "Conclude the summary with a brief statement of the report's overall success.", "isCorrect": false, "rationale": "Leading means starting, not concluding, with the most important point."}]}, {"question": "The 'Send Only This' Test for an executive summary primarily assesses its ability to:", "options": [{"text": "Be so brief that it can be conveyed in a single email subject line.", "isCorrect": false, "rationale": "While brevity is a characteristic, the test focuses on comprehensibility and decision-making, not extreme brevity like a subject line."}, {"text": "Stand alone and provide sufficient information for a decision-maker to understand the situation and potentially make a decision without the full report.", "isCorrect": true, "rationale": "The test asks, 'Would your boss understand the situation? Could they make a decision based on this summary alone?' This directly tests its standalone capability for decision-making."}, {"text": "Introduce new, compelling information that encourages the reader to delve into the full report.", "isCorrect": false, "rationale": "The guideline 'Match the report' explicitly states: 'Do not introduce new information in the summary.'"}, {"text": "Function as a table of contents for the full report.", "isCorrect": false, "rationale": "While it previews the report's content, its primary function is to convey the main message and enable understanding/decision-making, not just list sections."}]}, {"question": "Comparing the 'Weak Executive Summary' with the 'Strong Executive Summary' example, what is the most significant differentiating factor highlighted by the text?", "options": [{"text": "The strong summary is significantly longer, ensuring more complete coverage.", "isCorrect": false, "rationale": "While the strong summary is longer, its length is secondary to the quality of its content. The text emphasizes specific details over mere length."}, {"text": "The strong summary uses more formal and academic language.", "isCorrect": false, "rationale": "The language style is not the primary differentiator highlighted; rather, it is the specificity and data."}, {"text": "The strong summary provides specific, quantifiable data, objective observations, and concrete recommendations.", "isCorrect": true, "rationale": "The text states the strong version gives 'specific quantities, a comparison to the goal, participation numbers, key problems, and a concrete recommendation,' contrasting with the weak version's vagueness."}, {"text": "The strong summary avoids mentioning any negative aspects or issues.", "isCorrect": false, "rationale": "The strong summary explicitly mentions 'Two logistical issues,' demonstrating that it includes problems, not avoids them."}]}, {"question": "Based on the 'Teacher Note' regarding the Model Document, what is a key distinction of an informational report compared to analytical or recommendation reports?", "options": [{"text": "Informational reports strictly avoid presenting any conclusions, only raw data.", "isCorrect": false, "rationale": "The 'What an Executive Summary Must Include' section and the model document show that informational reports include conclusions (e.g., 'Lincoln High School's Wi-Fi network provides adequate service... but cannot handle peak demand')."}, {"text": "Informational reports present findings and conclusions but explicitly leave the decision-making or specific actions to the reader.", "isCorrect": true, "rationale": "The 'Teacher Note' states: 'This is an informational report—it presents findings and conclusions but leaves the decision to the reader.'"}, {"text": "Informational reports must always include a 'Methodology' section, unlike other report types.", "isCorrect": false, "rationale": "While the model document includes methodology, the text doesn't suggest this is a *unique* defining feature of *informational* reports compared to analytical/recommendation reports."}, {"text": "Informational reports prioritize persuasive arguments to convince the reader of a particular viewpoint.", "isCorrect": false, "rationale": "Persuasive arguments are more characteristic of analytical or recommendation reports, not purely informational ones."}]}, {"question": "According to the 'Writing Connection' section, how can applying the principles of report structure, specifically thinking of an essay's introduction as an 'executive summary,' benefit essay writing?", "options": [{"text": "It encourages the use of numbered headings and subheadings throughout the essay.", "isCorrect": false, "rationale": "The text states essays 'do not use visible headers,' but that thinking about them as having named sections can be beneficial."}, {"text": "It prompts the writer to clearly state their main argument or thesis upfront, similar to how an executive summary presents the 'bottom line'.", "isCorrect": true, "rationale": "The text states, 'Your introduction is your 'executive summary'—it should state your main argument clearly.'"}, {"text": "It primarily helps students write longer and more comprehensive introductions.", "isCorrect": false, "rationale": "The benefit is clarity and structure, not necessarily increased length. An executive summary is concise."}, {"text": "It suggests that essay body paragraphs should avoid presenting specific evidence and focus on general observations.", "isCorrect": false, "rationale": "The text explicitly equates body paragraphs to 'findings,' where each should 'present evidence,' directly contradicting this option."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
