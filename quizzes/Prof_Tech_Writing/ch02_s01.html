<script>
var QUESTIONS = [{"question": "Based on the introduction to 'Anatomy of an Email', what is the foundational principle that differentiates professional email from casual communication?", "options": [{"text": "Professional emails must always be formal, regardless of the recipient or context.", "isCorrect": false, "rationale": "The text implies that different situations call for different writing, meaning formality is contextual, not absolute."}, {"text": "The writing style and content should be adapted to suit the specific situation and audience.", "isCorrect": true, "rationale": "The introduction states, 'That instinct — the sense that different situations call for different writing — is the foundation of professional email.'"}, {"text": "Professional emails should prioritize brevity above all other considerations to save the reader time.", "isCorrect": false, "rationale": "While brevity is often valued, the foundational principle is adaptation to context, not just brevity. Sometimes detail is necessary."}, {"text": "All professional emails must include attachments and be sent to multiple stakeholders for transparency.", "isCorrect": false, "rationale": "Not all professional emails require attachments or multiple recipients; these are specific tools, not a foundational principle."}]}, {"question": "You are organizing a company event and need to send an invitation to 200 employees. To protect their privacy by preventing recipients from seeing each other's email addresses, which field should you use for the employee list?", "options": [{"text": "To", "isCorrect": false, "rationale": "The 'To' field is for primary recipients, and all recipients' addresses would be visible to each other."}, {"text": "CC (Carbon Copy)", "isCorrect": false, "rationale": "The 'CC' field is for recipients who need to stay informed, but like 'To', all recipients' addresses are visible to each other."}, {"text": "BCC (Blind Carbon Copy)", "isCorrect": true, "rationale": "The text states, 'Use BCC when you are emailing a large group and you do not want recipients to see each other's email addresses,' specifically citing a company sending a newsletter to protect customer privacy as an example."}, {"text": "Subject Line", "isCorrect": false, "rationale": "The Subject Line is for the email's title or topic, not for recipient addresses."}]}, {"question": "Sarah is emailing her team lead about a project deadline. Her project manager needs to be aware of the discussion but does not need to take direct action or respond. How should Sarah include her project manager in this email?", "options": [{"text": "Include the project manager in the 'To' field.", "isCorrect": false, "rationale": "The 'To' field is for primary recipients who need to act on or directly receive the message. The project manager's role here is to be informed, not to act directly."}, {"text": "Add the project manager to the 'CC' field.", "isCorrect": true, "rationale": "The text advises, 'Use CC when someone needs to stay informed but does not need to respond.' This perfectly matches the project manager's need to stay in the loop without direct action."}, {"text": "Place the project manager in the 'BCC' field.", "isCorrect": false, "rationale": "BCC is used when other recipients should not know who received a copy, which isn't the scenario described. The team lead can know the project manager is informed."}, {"text": "Send a separate email to the project manager later to summarize the discussion.", "isCorrect": false, "rationale": "This is less efficient and doesn't ensure the project manager is informed concurrently with the main discussion. CC allows them to be 'in the loop' immediately."}]}, {"question": "Which of the following best describes the characteristics of an effective professional email subject line?", "options": [{"text": "It should be vague to encourage the recipient to open the email out of curiosity.", "isCorrect": false, "rationale": "The text states a good subject line is 'specific' and 'tells the reader what the email is about before they open it,' which contradicts being vague."}, {"text": "It should include a formal greeting, such as 'Dear Ms. Torres'.", "isCorrect": false, "rationale": "The greeting is part of the email body, not the subject line."}, {"text": "It should be specific, action-oriented, and clearly indicate the email's content.", "isCorrect": true, "rationale": "The text explicitly states, 'A good subject line is specific and action-oriented' and 'tells the reader what the email is about before they open it.'"}, {"text": "It should list all the primary and secondary recipients of the email.", "isCorrect": false, "rationale": "Recipient lists belong in the 'To', 'CC', and 'BCC' fields, not the subject line."}]}, {"question": "According to the 'Writing Tip: State Your Purpose First', what is the most critical placement for the main purpose of a professional email in the body?", "options": [{"text": "It should be clearly stated in the closing remarks of the email.", "isCorrect": false, "rationale": "The tip warns against burying the purpose; placing it in the closing would make busy professionals miss it."}, {"text": "It should be subtly introduced in the second or third paragraph after some background information.", "isCorrect": false, "rationale": "The tip explicitly says, 'Do not bury your purpose in the third paragraph' and emphasizes busy professionals scan emails quickly."}, {"text": "It should be included in an attachment, with the email body simply directing the reader to 'See attached'.", "isCorrect": false, "rationale": "While details might be in an attachment, the *purpose* of the email itself (why you're sending it) must be clear in the body, not just referenced as an attachment."}, {"text": "It should be stated in the first sentence of the email body.", "isCorrect": true, "rationale": "The 'Writing Tip: State Your Purpose First' explicitly advises, 'the first sentence of the body should tell the reader why you are writing.'"}]}, {"question": "Your manager sends an email to 50 employees regarding a new company policy. You have a small, specific question about the policy that only your manager needs to answer. What is the most appropriate way to ask your question?", "options": [{"text": "Use 'Reply-all' to ask your question to the manager and all 49 other employees.", "isCorrect": false, "rationale": "The 'Common Mistake: Reply-All Disasters' section warns against this, stating, 'Does everyone on this email need to see my response?' If only the manager needs to see it, 'reply-all' is inappropriate."}, {"text": "Forward the original email to your manager with your question added.", "isCorrect": false, "rationale": "While forwarding includes the original context, a direct 'Reply' to the sender is more efficient and appropriate for a question to the original sender."}, {"text": "Reply only to the sender (your manager) with your question.", "isCorrect": true, "rationale": "The text advises, 'Reply only to the sender unless your response genuinely applies to the whole group.' In this scenario, only the manager needs to see the question."}, {"text": "Start a brand new email thread to your manager, referencing the policy.", "isCorrect": false, "rationale": "Starting a new thread is less efficient than a direct reply, as it separates the question from the original context of the policy email."}]}, {"question": "You are sending an email to a client with an important contract attached. What is the recommended best practice for handling this attachment within your email?", "options": [{"text": "Do not mention the attachment in the email body, as the recipient will see the attachment icon automatically.", "isCorrect": false, "rationale": "The text states, 'When you attach a file, always mention it in the body of the email.'"}, {"text": "Write 'See attached' in the body of the email, assuming the file is correctly uploaded.", "isCorrect": false, "rationale": "The text identifies 'writing “see attached” and forgetting to actually attach the file' as a common mistake and recommends more specific phrasing."}, {"text": "Clearly state in the email body, 'I have attached the contract for your review,' explaining what the file is and its purpose.", "isCorrect": true, "rationale": "The text advises, 'always mention it in the body of the email... This tells the recipient what the file is and why they should open it.'"}, {"text": "Copy and paste the entire contract text directly into the email body to ensure it's seen.", "isCorrect": false, "rationale": "Attaching is for files; copying large documents into the email body makes the email unwieldy and difficult to read or reference as a formal document."}]}, {"question": "What is the primary function of the 'Closing and Signature' section in a professional email?", "options": [{"text": "To introduce the main topic of the email before the body content.", "isCorrect": false, "rationale": "Introducing the topic is the function of the subject line and the first sentence of the body, not the closing and signature."}, {"text": "To provide a summary of the email's contents and offer the sender's contact information.", "isCorrect": true, "rationale": "The text states the closing 'wraps up the message' and the signature block 'provides your contact information,' effectively summarizing and offering contact details."}, {"text": "To list all individuals who are carbon copied (CC'd) on the email.", "isCorrect": false, "rationale": "The CC field lists recipients, not the closing or signature."}, {"text": "To specify the desired tone of the email for the recipient.", "isCorrect": false, "rationale": "Tone is conveyed throughout the email by word choice; the closing mainly offers a sign-off and contact details."}]}, {"question": "You receive a forwarded email thread without any additional message from the sender. What is the likely consequence for you as the recipient, according to the text?", "options": [{"text": "You will immediately understand the purpose of the forwarded message due to the clear subject line.", "isCorrect": false, "rationale": "The text explicitly states, 'Without that note, the recipient has to read the entire thread... to figure out why you sent it,' indicating the subject line alone might not be sufficient context."}, {"text": "You will need to read the entire email thread to understand why it was sent to you.", "isCorrect": true, "rationale": "The text explains, 'Without that note, the recipient has to read the entire thread... to figure out why you sent it,' highlighting the burden on the recipient."}, {"text": "You will be able to easily identify the key points because the sender removed irrelevant messages.", "isCorrect": false, "rationale": "If no note is added, there's no indication that irrelevant messages were removed; the recipient still faces the full unedited thread."}, {"text": "The email's tone will be automatically adjusted to be more professional.", "isCorrect": false, "rationale": "Tone is conveyed by words chosen, not by the act of forwarding without context. The lack of context creates confusion, not a specific tone adjustment."}]}, {"question": "In the model email for 'Vacation Request: March 24–28', Sarah Kim includes the sentence: 'I have confirmed that my current projects will not require action during that week, and I have asked James Chen (CC'd) to handle any urgent client inquiries in my absence.' What analytical purpose does this specific statement serve for her manager?", "options": [{"text": "It states the primary reason for sending the email, which is to request vacation time.", "isCorrect": false, "rationale": "The primary reason is stated in the first sentence: 'I am writing to request vacation time...' This sentence provides supporting details and addresses potential issues, not the core request itself."}, {"text": "It provides a detailed breakdown of her remaining vacation days for the year.", "isCorrect": false, "rationale": "While she mentions her remaining days in the next sentence, this specific sentence focuses on project coverage, not the quantity of days."}, {"text": "It anticipates and proactively addresses potential concerns her manager might have regarding her absence.", "isCorrect": true, "rationale": "As noted in the teacher's note, 'The second paragraph anticipates questions the manager might have.' By explaining project coverage and naming a backup, Sarah alleviates potential managerial concerns about work continuity."}, {"text": "It formally requests that James Chen approve her vacation time.", "isCorrect": false, "rationale": "James Chen is CC'd to be informed and cover, not to approve the vacation. The request is directed to Ms. Rodriguez."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
