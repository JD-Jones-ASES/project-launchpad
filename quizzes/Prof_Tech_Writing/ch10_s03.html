        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 10, Section 3</div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to the text, what is the 'specific zone' that defines the tone of a strong proposal?", "options": [{"text": "Highly enthusiastic, aiming to generate maximum excitement and engagement.", "isCorrect": false, "rationale": "The text explicitly states that a proposal 'is not a sales pitch... not a pep rally speech, or a social media post designed to generate excitement.' Leaning too far toward enthusiasm makes it sound like selling."}, {"text": "Confident, professional, and honest, acknowledging both strengths and limitations.", "isCorrect": true, "rationale": "The first paragraph defines the tone as 'confident enough to inspire trust, professional enough to be taken seriously, and honest enough to acknowledge limitations,' which directly aligns with this option."}, {"text": "Aggressive and assertive, making bold claims to convince the reader of guaranteed success.", "isCorrect": false, "rationale": "The 'Persuasive Professional Zone' section warns against being 'Too aggressive (overselling),' which makes 'promises without evidence' and 'dismisses risks.'"}, {"text": "Cautious and humble, frequently hedging statements to avoid overpromising.", "isCorrect": false, "rationale": "The text warns against leaning 'too far toward caution,' which sounds like 'you do not believe in your own idea' and is characteristic of 'Too passive (underselling)' behavior like 'hedges constantly.'"}], "id": "q01"}, {"question": "Which of the following statements best exemplifies the 'Confident Professional' tone described in the section?", "options": [{"text": "Our revolutionary new software is guaranteed to boost productivity significantly!", "isCorrect": false, "rationale": "This uses superlatives ('revolutionary,' 'guaranteed,' 'significantly') and bold claims without specific evidence, characteristic of 'overselling' and emotional language, not confident professionalism."}, {"text": "We anticipate a 10-12% reduction in operational costs, based on a six-month pilot program at Company X, which saw an 11% reduction.", "isCorrect": true, "rationale": "This statement uses specific data ('10-12% reduction'), provides evidence ('six-month pilot program at Company X'), and cites a comparable outcome, embodying the 'Confident Professional' approach of 'states benefits with evidence, uses specific data instead of adjectives.'"}, {"text": "We might be able to improve efficiency, potentially, if everything goes well.", "isCorrect": false, "rationale": "This statement uses hedging language ('might,' 'potentially, if everything goes well'), which is characteristic of 'underselling' or being 'too passive' and fails to state benefits clearly."}, {"text": "It's obvious that our plan is the best option, and everyone agrees the current system is terrible.", "isCorrect": false, "rationale": "This is an assertion that dismisses opposing views and relies on opinion rather than evidence, typical of an 'aggressive' or 'overselling' tone that pressures the reader."}], "id": "q02"}, {"question": "A project manager is writing a proposal and states: 'Our groundbreaking new method will achieve unparalleled results!' According to the 'Writing Tip: Replace Adjectives with Data' section, how should this statement primarily be improved?", "options": [{"text": "By adding more exclamation points to convey excitement.", "isCorrect": false, "rationale": "The text states, 'Confident writing does not need exclamation points' and advises against emotional language."}, {"text": "By replacing 'groundbreaking' and 'unparalleled' with specific, evidence-backed projections or quantifiable outcomes.", "isCorrect": true, "rationale": "The 'Writing Tip' advises, 'Replace Adjectives with Data.' It suggests replacing phrases like 'significant improvement' with 'a 15% improvement,' directly addressing the use of vague adjectives with concrete numbers."}, {"text": "By acknowledging potential minor challenges associated with the new method.", "isCorrect": false, "rationale": "While acknowledging limitations is important for overall proposal strength, this option addresses a different principle (Acknowledging Limitations Honestly) than the 'Writing Tip: Replace Adjectives with Data' specifically targets."}, {"text": "By making the claim even bolder to inspire greater trust.", "isCorrect": false, "rationale": "The text warns against 'bold claims' and 'overselling,' stating that decision-makers 'would trust it less, not more' when writers prioritize enthusiasm over accuracy."}], "id": "q03"}, {"question": "What is the key difference between an 'assertion' and 'evidence' in the context of professional proposals?", "options": [{"text": "An assertion is a strong opinion, while evidence is a suggestion.", "isCorrect": false, "rationale": "The text defines an assertion as 'a claim without proof' and evidence as 'a claim with support,' not merely a suggestion. An assertion isn't necessarily just a 'strong opinion' but any unsubstantiated claim."}, {"text": "An assertion is a claim presented without proof, whereas evidence is a claim supported by verifiable facts or data.", "isCorrect": true, "rationale": "The text clearly states: 'An assertion is a claim without proof: 'Our program will succeed.' Evidence is a claim with support: 'Our program model has succeeded at three comparable schools, improving test scores by an average of 18% (Rivera et al., 2024).''"}, {"text": "An assertion uses data, while evidence uses expert opinions.", "isCorrect": false, "rationale": "This is incorrect. The text lists 'Data and statistics' as a type of evidence, not assertion. Expert opinions are also a type of evidence. Assertions lack any form of proof."}, {"text": "An assertion is subjective, while evidence is always objective and undeniable.", "isCorrect": false, "rationale": "While evidence aims for objectivity, the primary distinction is the presence of support. Assertions are subjective because they are unsubstantiated, but evidence isn't necessarily 'always undeniable' – it simply has support."}], "id": "q04"}, {"question": "Why does the text suggest that acknowledging weaknesses or limitations can actually make a proposal stronger?", "options": [{"text": "It lowers the reader's expectations, making any positive outcome seem more impressive.", "isCorrect": false, "rationale": "The text does not suggest manipulating expectations. Instead, it focuses on building trust and demonstrating thoroughness."}, {"text": "It demonstrates thorough thinking and builds trust by addressing potential concerns proactively.", "isCorrect": true, "rationale": "The section 'Acknowledging Limitations Honestly' states, 'When you address potential concerns before the reader raises them, you demonstrate thorough thinking and build trust.' This directly matches the rationale."}, {"text": "It allows the writer to avoid responsibility if the project encounters problems later.", "isCorrect": false, "rationale": "The purpose of acknowledging limitations is not to shirk responsibility but to show comprehensive planning and feasibility."}, {"text": "It adds a dramatic element to the proposal, making it more memorable.", "isCorrect": false, "rationale": "The tone of a professional proposal is not focused on dramatic effect but on credibility and persuasion through evidence and honesty."}], "id": "q05"}, {"question": "A proposal writer states: 'We recognize that recruiting enough skilled IT staff can be challenging. To address this, we have partnered with three local universities to establish an internship pipeline, which has successfully supplied our last two projects with qualified candidates.' Which principle of persuasive professional tone does this best illustrate?", "options": [{"text": "Using superlatives to emphasize project strength.", "isCorrect": false, "rationale": "The statement avoids superlatives. It directly addresses a concern rather than exaggerating positive aspects."}, {"text": "Prioritizing enthusiasm over accuracy.", "isCorrect": false, "rationale": "The statement is realistic and addresses a known challenge, which is the opposite of prioritizing enthusiasm over accuracy."}, {"text": "Acknowledging limitations honestly and providing a plan to address them.", "isCorrect": true, "rationale": "This example directly follows the advice in 'Acknowledging Limitations Honestly': 'Name the concern directly... Explain your plan to address it.' It explicitly names the challenge (recruiting staff) and offers a concrete solution (internship pipeline and past success)."}, {"text": "Replacing adjectives with data.", "isCorrect": false, "rationale": "While good practice, this statement's primary focus is on addressing a potential problem, not specifically on replacing adjectives with numerical data, although 'last two projects' offers some quantification."}], "id": "q06"}, {"question": "In the context of proposals, what does the term 'feasibility' primarily refer to?", "options": [{"text": "The emotional appeal of the proposal to the target audience.", "isCorrect": false, "rationale": "Feasibility is defined as 'whether a plan is realistic and achievable given available resources, constraints, and conditions,' not its emotional appeal."}, {"text": "The extent to which the proposal's benefits are universally appealing.", "isCorrect": false, "rationale": "Feasibility relates to the practical possibility of implementation, not the broad appeal of its benefits."}, {"text": "Whether a plan is realistic and achievable given available resources, constraints, and conditions.", "isCorrect": true, "rationale": "The 'definition' box in the text explicitly defines feasibility as 'whether a plan is realistic and achievable given available resources, constraints, and conditions.'"}, {"text": "The potential for the proposal to be scaled up to a national level.", "isCorrect": false, "rationale": "Feasibility focuses on the current context and resources, not necessarily on future scalability, though a feasible plan might be scalable."}], "id": "q07"}, {"question": "Imagine you are writing the conclusion for a professional proposal. Which approach would best align with the 'strong conclusion' example provided in the text?", "options": [{"text": "Hedge your statements and apologize for any shortcomings, then ask vaguely for feedback.", "isCorrect": false, "rationale": "The 'weak conclusion' example directly illustrates this approach, using phrases like 'maybe,' 'could maybe work,' and 'or whatever,' which the text advises against."}, {"text": "Restate your strongest claim using emotional language to ensure memorability.", "isCorrect": false, "rationale": "The text warns against emotional language and 'overselling.' A strong conclusion is confident but not pushy or overly emotional."}, {"text": "Clearly state the proposed action, provide specific next steps, and offer direct contact information.", "isCorrect": true, "rationale": "The 'strong conclusion' example states the case clearly, provides a specific start date, identifies a next step (present at Board meeting), and gives a contact name, precisely matching this option."}, {"text": "Summarize all the benefits using superlatives and bold fonts.", "isCorrect": false, "rationale": "Using superlatives and bold fonts is characteristic of 'overselling' and 'too aggressive' tones, which undermine trust rather than build it."}], "id": "q08"}, {"question": "In the 'Bright Futures Tutoring' model proposal, what type of evidence is primarily used in the 'Qualifications' section to support their credibility?", "options": [{"text": "Testimonials from students who benefited from their programs.", "isCorrect": false, "rationale": "While testimonials are a valid type of evidence, the 'Qualifications' section specifically mentions operational history ('operated for three years'), number of students served ('340 students'), average proficiency improvement ('18%'), and the Program Director's credentials (master's degree, five years experience). These are primarily data/statistics and expert opinion/precedent rather than direct testimonials."}, {"text": "Expert opinions from renowned educational psychologists.", "isCorrect": false, "rationale": "The section mentions the Program Director's qualifications, which could be considered expert opinion, but it's combined with their own program's data and operational history, not external renowned psychologists."}, {"text": "Data and statistics about their program's past performance and the credentials of their key staff.", "isCorrect": true, "rationale": "The 'Qualifications' section states: 'operated for three years, serving 340 students... average participant improves math proficiency scores by 18%... Program Director David Park holds a master's degree in education and has managed tutoring programs for five years.' This is a direct example of using data, statistics, and professional qualifications (expert credentials) as evidence."}, {"text": "Case studies of programs that failed to highlight their own superiority.", "isCorrect": false, "rationale": "The model proposal's 'Qualifications' section focuses on their own successes and expertise, not on analyzing failures of other programs."}], "id": "q09"}, {"question": "A proposal for a new community garden project mentions that securing enough water could be a problem, but it offers no solution or mitigation plan. According to the 'Common Mistake: Ignoring Obvious Problems' tip, what is the likely impact on the reader?", "options": [{"text": "The reader will appreciate the honesty and overlook the problem.", "isCorrect": false, "rationale": "The text states that simply naming a concern without addressing it is insufficient: 'If your proposal requires volunteers and your reader knows volunteers are hard to find, do not pretend the issue does not exist. A reader who spots an unaddressed risk will lose confidence in the entire proposal.'"}, {"text": "The reader will assume the writer has a plan that isn't explicitly stated.", "isCorrect": false, "rationale": "The text warns against this, implying that an unaddressed risk will lead to a loss of confidence, not an assumption of an unstated plan."}, {"text": "The reader will lose confidence in the entire proposal due to the unaddressed risk.", "isCorrect": true, "rationale": "The 'Common Mistake' box explicitly states: 'A reader who spots an unaddressed risk will lose confidence in the entire proposal.' This directly matches the scenario."}, {"text": "The reader will be prompted to find a solution to the problem themselves.", "isCorrect": false, "rationale": "It is the proposal writer's responsibility to present a feasible plan, not to delegate problem-solving to the reader."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
