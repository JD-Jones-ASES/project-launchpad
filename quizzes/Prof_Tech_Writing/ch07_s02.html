        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which set of qualities defines an effective process description, according to the textbook section?", "options": [{"text": "It primarily uses past tense, includes every sub-step, and focuses on abstract concepts.", "isCorrect": false, "rationale": "The text advises against including every sub-step and using abstract concepts where concrete is better, and past tense is for one-time events, not all processes."}, {"text": "It is organized logically, employs clear transitions, and partitions complex processes into manageable stages.", "isCorrect": true, "rationale": "The text explicitly states these three qualities: 'A good process description has three qualities: it is organized logically, it uses clear transitions, and it partitions complex processes into manageable stages.'"}, {"text": "It focuses solely on cause-and-effect relationships and avoids any time-based descriptions.", "isCorrect": false, "rationale": "While cause-and-effect transitions are important, process descriptions often rely heavily on chronological (time-based) order."}, {"text": "It uses abstract language to encourage broader interpretation and includes minimal technical detail regardless of audience.", "isCorrect": false, "rationale": "The text advocates for concrete language and matching the level of detail to the audience, implying technical detail is sometimes necessary."}]}, {"question": "A technical writer is preparing a process description for the daily startup procedure of a specific machine, which is performed consistently every morning. Which tense should the writer predominantly use for the steps in this description?", "options": [{"text": "Future tense, because the process will be performed repeatedly in the future.", "isCorrect": false, "rationale": "Future tense is not typically used for repeatable, ongoing processes in descriptions; present tense is preferred."}, {"text": "Past tense, because each step is completed before the next one can begin.", "isCorrect": false, "rationale": "Past tense is reserved for one-time, historical, or completed processes, not ongoing or repeatable ones."}, {"text": "Present tense, as it describes an ongoing, repeatable, or general process.", "isCorrect": true, "rationale": "The 'Key Concept: Tense in Process Descriptions' section states, 'Present tense for ongoing, repeatable, or general processes.'"}, {"text": "A mix of past and present tense to add variety and indicate the current status.", "isCorrect": false, "rationale": "The text specifically warns against mixing tenses, stating, 'Be consistent within a single description. Mixing tenses confuses readers.'"}]}, {"question": "What is the primary function of transition words and phrases in an effective process description?", "options": [{"text": "To introduce new, specialized vocabulary for the reader to learn.", "isCorrect": false, "rationale": "While vocabulary might be introduced, this is not the primary function of transitions."}, {"text": "To add stylistic variety to sentences and paragraphs, making the text more engaging.", "isCorrect": false, "rationale": "Although they can add variety, their primary role is functional, not purely stylistic."}, {"text": "To clearly show the reader when things happen relative to each other and how steps connect.", "isCorrect": true, "rationale": "The text states, 'They tell the reader when things happen relative to each other and how steps connect.'"}, {"text": "To highlight the most critical steps in bold or italics, drawing reader attention.", "isCorrect": false, "rationale": "Highlighting is a formatting choice, not the function of transition words themselves."}]}, {"question": "A project manager is describing a phased implementation where one team completes a task, *which then triggers* the start of another team's task, and *during this time*, a separate compliance review occurs. Which types of transitions would be most effective for this scenario?", "options": [{"text": "Duration and time sequence.", "isCorrect": false, "rationale": "While time sequence is relevant, 'duration' transitions are less critical for showing the causal link and simultaneous action described."}, {"text": "Cause and effect, and simultaneous actions.", "isCorrect": true, "rationale": "The phrase 'which then triggers' indicates a cause-and-effect relationship, and 'during this time' indicates simultaneous actions, both of which are listed as specific transition categories ('Cause and effect' and 'Simultaneous actions')."}, {"text": "Only time sequence to maintain strict chronological order.", "isCorrect": false, "rationale": "Relying solely on time sequence would miss the crucial cause-and-effect and simultaneous relationships mentioned."}, {"text": "Mainly 'then' to connect every step chronologically.", "isCorrect": false, "rationale": "The 'Writing Tip: Don't Overuse \"Then\"' specifically advises against this, encouraging variety and specific relationship types."}]}, {"question": "Why is 'partitioning complex processes' into stages considered an essential practice when writing process descriptions, especially for lengthy or intricate procedures?", "options": [{"text": "It reduces the overall length of the document by condensing information.", "isCorrect": false, "rationale": "Partitioning organizes, but doesn't necessarily reduce the total information; it makes it more digestible."}, {"text": "It allows the writer to omit less significant details from the description entirely.", "isCorrect": false, "rationale": "While one might omit *sub-steps* based on audience, partitioning itself is about organizing existing detail, not necessarily omitting it."}, {"text": "It breaks down overwhelming information into manageable, logical units, improving readability and making it easier for readers to find specific information.", "isCorrect": true, "rationale": "The text states, 'When a process has many steps, you need to partition it into stages — groups of related steps that form a meaningful unit... making the description easier to read and easier to reference.'"}, {"text": "It replaces the need for chronological organization by grouping unrelated steps into themes.", "isCorrect": false, "rationale": "Partitioning complements chronological order; stages are still typically presented chronologically, and steps within stages are related, not unrelated."}]}, {"question": "A new technical writer is drafting a description of 'how the internet works' for a general audience. They are including detailed explanations of fiber optic cable construction and satellite communication protocols. Based on the 'Common Mistake: Describing Every Sub-Step' advice, what feedback should this writer receive?", "options": [{"text": "This level of detail is excellent for ensuring a comprehensive understanding for all readers.", "isCorrect": false, "rationale": "The text warns against over-detailing for a general audience, stating it's a 'common mistake.'"}, {"text": "You should add even more technical jargon to demonstrate expertise and impress the audience.", "isCorrect": false, "rationale": "The advice is to match detail to audience, not to overwhelm them with unnecessary jargon."}, {"text": "You should match your level of detail to your audience; for a general reader, high-level stages are usually sufficient, saving sub-steps for technical audiences.", "isCorrect": true, "rationale": "The text explicitly states: 'Match your level of detail to your audience. For a general reader, the high-level stages are enough. Save the sub-steps for technical audiences who need them.'"}, {"text": "The description needs to be significantly longer to cover every possible scenario and edge case.", "isCorrect": false, "rationale": "Adding unnecessary length with excessive sub-steps is the exact 'common mistake' the text advises against for general audiences."}]}, {"question": "In the 'Weak Transitions vs. Strong Transitions' example, the 'after' version of the process description is significantly more effective than the 'before' version primarily because:", "options": [{"text": "The 'after' version is much shorter and more concise, using fewer words overall.", "isCorrect": false, "rationale": "The 'after' version is actually longer and more detailed, but clearer."}, {"text": "The 'after' version exclusively uses the word 'then' to maintain a consistent chronological flow.", "isCorrect": false, "rationale": "The 'Writing Tip: Don't Overuse \"Then\"' advises against this; the 'after' version uses varied transitions."}, {"text": "It uses a variety of specific transition words and phrases to clearly show causal links, temporal relationships, and simultaneous actions between steps, creating a coherent explanation.", "isCorrect": true, "rationale": "The text explicitly states the 'after' version 'reads like a coherent explanation because transitions show the reader why each step follows the previous one,' using examples like 'First,' 'then,' 'As,' 'Meanwhile,' and 'Finally.'"}, {"text": "The 'after' version avoids any specific technical details, making it simpler for a non-technical audience.", "isCorrect": false, "rationale": "The 'after' version includes specific details like '212 F,' '3,600 RPM,' and 'condenser,' but integrates them clearly."}]}, {"question": "Considering the 'How a School's Wi-Fi Network Routes a Web Request' model document, which of the following characteristics is *least* emphasized or demonstrated by its structure and content, based on the chapter's advice?", "options": [{"text": "Chronological organization of the overall process.", "isCorrect": false, "rationale": "The document is clearly organized chronologically, from the device sending a request to the browser displaying the page."}, {"text": "Clear partitioning of the complex process into distinct, manageable stages.", "isCorrect": false, "rationale": "The document is explicitly divided into five stages with bolded headings, a direct application of partitioning."}, {"text": "The inclusion of an exhaustive list of every intricate technical sub-step and underlying protocol.", "isCorrect": true, "rationale": "The 'Teacher Note' highlights 'Technical detail appropriate for a general audience (milliseconds and hops are explained without requiring networking knowledge),' indicating it avoids exhaustive sub-steps, consistent with the 'Common Mistake' advice."}, {"text": "The effective use of transitions to connect sequential and simultaneous actions.", "isCorrect": false, "rationale": "The 'Teacher Note' points out 'Transition words ('begins when,' 'at this point,' 'once,' 'when,' 'finally')' as a key feature."}]}, {"question": "In the model document's 'Stage 2: The School Network Processes the Request,' the sentence 'At this point, the school's firewall inspects the request to ensure it does not violate the district's acceptable-use policy' primarily illustrates which aspect of effective process description writing?", "options": [{"text": "An example of a cause-and-effect transition leading directly to the next step.", "isCorrect": false, "rationale": "'At this point' is a time sequence transition, not specifically cause-and-effect for this action, though the subsequent 'If the request is approved' is conditional."}, {"text": "The integration of a specific policy or security check as a logical step within a chronological stage.", "isCorrect": true, "rationale": "The firewall inspection is a distinct, logical action that occurs at a specific point in the network's processing, demonstrating how specific checks are integrated into the chronological flow of a stage without excessive technical detail."}, {"text": "The use of an abstract concept without any concrete explanation or context.", "isCorrect": false, "rationale": "The firewall is given context (inspects for acceptable-use policy), making it concrete in function, even if its internal workings aren't detailed."}, {"text": "An instance of parallel or simultaneous actions occurring with other network processes.", "isCorrect": false, "rationale": "The sentence describes a sequential step ('inspects the request'), not an action happening concurrently with others within this specific phrasing."}]}, {"question": "According to the 'Key Concept: Tense in Process Descriptions' section, what is the most important reason for maintaining consistent tense within a single process description?", "options": [{"text": "It helps to reduce the overall word count of the document.", "isCorrect": false, "rationale": "While conciseness is good, it's not the primary reason given for tense consistency."}, {"text": "It makes the description appear more formal and academic.", "isCorrect": false, "rationale": "Consistency is about clarity, not primarily formality."}, {"text": "It avoids confusing readers about when events occur or if the process is ongoing or completed.", "isCorrect": true, "rationale": "The text explicitly states: 'Be consistent within a single description. Mixing tenses confuses readers.'"}, {"text": "It simplifies the process for translation into multiple languages.", "isCorrect": false, "rationale": "Language translation benefits from clarity but is not the primary reason for tense consistency in the context of this text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
