    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 14, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental difference between speaker notes and a script for a presentation?", "options": [{"text": "A script is for extemporaneous speaking, while notes are for memorized content.", "isCorrect": false, "rationale": "This is incorrect. A script is a word-for-word manuscript, which often leads to a presenter reading, not extemporaneously speaking. Notes support natural, unmemorized delivery."}, {"text": "Speaker notes are brief prompts to guide natural delivery, while a script is a word-for-word manuscript to be read aloud.", "isCorrect": true, "rationale": "The text explicitly defines a script as 'a word-for-word manuscript that you read aloud' and speaker notes as 'a collection of prompts — key phrases, transitions, data points, and reminders — that help you talk naturally'."}, {"text": "Speaker notes are visible to the audience, but a script is only for the presenter.", "isCorrect": false, "rationale": "This is incorrect. Both speaker notes and a script are typically private to the presenter. The difference lies in their content and how they are used."}, {"text": "A script helps you sound conversational, whereas speaker notes make you sound rehearsed.", "isCorrect": false, "rationale": "This is incorrect and the opposite of what the text states. The text explains that reading a script makes you 'sound robotic' and 'vocal tone flattens', while speaker notes 'naturally fill in the details in your own words' which means 'you sound conversational, not rehearsed'."}], "id": "q01"}, {"question": "The text argues that using speaker notes instead of a script primarily addresses which challenge for a presenter?", "options": [{"text": "Ensuring all data points are accurately recalled without fail.", "isCorrect": false, "rationale": "While notes help with data recall, the text emphasizes a broader issue. Key data is one element, but not the primary challenge notes solve compared to a script's drawbacks."}, {"text": "Allowing for natural, conversational delivery and audience engagement.", "isCorrect": true, "rationale": "The text highlights that reading a script makes you 'lose the ability to make eye contact, respond to the audience's reactions,' whereas notes help you 'sound conversational' and 'naturally fill in the details'."}, {"text": "Reducing the overall preparation time required for the presentation.", "isCorrect": false, "rationale": "The text does not suggest that speaker notes reduce preparation time; effective notes still require thoughtful planning and rehearsal."}, {"text": "Guaranteeing that the presentation strictly adheres to the planned timing.", "isCorrect": false, "rationale": "Timing notes are included, but notes primarily facilitate natural delivery, not strict adherence to time, which can be rigid with a script."}], "id": "q02"}, {"question": "Based on the 'What Speaker Notes Should Include' section, which combination of elements is considered essential for *each* slide's speaker notes?", "options": [{"text": "The main point, key data, and optional reminders.", "isCorrect": false, "rationale": "This option misses two essential elements: a transition sentence and a timing note, both explicitly listed as what speaker notes 'should contain'."}, {"text": "A word-for-word introduction, a detailed conclusion, and audience questions.", "isCorrect": false, "rationale": "This describes elements more akin to a script and misses the prompt-style content specifically outlined for speaker notes."}, {"text": "The main point, key data or details, a transition sentence, and a timing note.", "isCorrect": true, "rationale": "The text's 'keyconcept' box enumerates these four items as fundamental inclusions for speaker notes for each slide."}, {"text": "Full paragraphs explaining visuals, a list of potential objections, and personal anecdotes.", "isCorrect": false, "rationale": "This is far too detailed for prompt-style notes and includes elements not specified as essential for every slide's notes."}], "id": "q03"}, {"question": "What is the primary function of writing effective transitions into your speaker notes?", "options": [{"text": "To ensure the presenter speaks at a consistent, measured pace throughout the presentation.", "isCorrect": false, "rationale": "While transitions can indirectly affect pacing, their primary role is not to regulate speaking speed. Timing notes serve this purpose more directly."}, {"text": "To provide specific details and statistics that support the slide's main point.", "isCorrect": false, "rationale": "This is the function of 'key data or details' within the speaker notes, not transitions."}, {"text": "To logically connect the current slide's information to the next slide, ensuring a smooth flow for the audience.", "isCorrect": true, "rationale": "The text states, 'Transitions are the glue between your slides. Without them, your presentation feels like a series of disconnected facts. With them, your audience follows a clear logical thread from beginning to end.'"}, {"text": "To give the presenter an opportunity to pause and review their upcoming material.", "isCorrect": false, "rationale": "While a natural pause might occur, the main purpose of a transition is to bridge content for the audience, not solely for the presenter's review."}], "id": "q04"}, {"question": "Consider the transition sentence from Maya Chen's model notes for Slide 4: 'So it works — and we can do it for a fraction of what professional tutoring costs.' Which type of transition, as described in the text, does this sentence best exemplify?", "options": [{"text": "Cause-effect", "isCorrect": false, "rationale": "A cause-effect transition would link one event or fact as directly leading to another, which is not the primary relationship here."}, {"text": "Contrast", "isCorrect": true, "rationale": "The sentence highlights 'it works' (a positive outcome from the previous slide) and then introduces 'a fraction of what professional tutoring costs,' creating a contrast between the value/results and the cost."}, {"text": "Sequence", "isCorrect": false, "rationale": "A sequence transition would describe a series of steps or an order of events, which this sentence does not do."}, {"text": "Question", "isCorrect": false, "rationale": "The sentence is a statement, not a question, so it does not fit the 'Question' transition type."}], "id": "q05"}, {"question": "The 'Writing Tip: Practice with Notes, Not from Notes' primarily emphasizes which aspect of using speaker notes during the actual presentation?", "options": [{"text": "Reading the notes verbatim to ensure accuracy.", "isCorrect": false, "rationale": "The tip explicitly advises against reading from notes and states they are 'your safety net, not your crutch,' implying they should not be read verbatim."}, {"text": "Using notes as a safety net for key points and transitions, rather than a script to be read.", "isCorrect": true, "rationale": "The tip encourages practicing 'to build familiarity' so that during the presentation, you 'glance at your notes only for data points and transitions,' reinforcing the idea of notes as a guide or 'safety net' rather than a full script."}, {"text": "Avoiding all eye contact with the audience while consulting notes.", "isCorrect": false, "rationale": "This is incorrect. The point of using notes instead of a script is precisely to enable better eye contact and engagement."}, {"text": "Incorporating new details spontaneously, even if not in the notes.", "isCorrect": false, "rationale": "While notes allow for natural speaking, the tip is focused on how to *use* the notes themselves effectively, not on spontaneous improvisation of new content."}], "id": "q06"}, {"question": "According to the text, what is a specific problem that arises from reading a script, severely hindering audience engagement?", "options": [{"text": "The speaker's voice becomes too loud and overbearing.", "isCorrect": false, "rationale": "The text states the opposite: reading a script causes 'vocal tone flattens.'"}, {"text": "The speaker loses the ability to make eye contact and respond to audience reactions.", "isCorrect": true, "rationale": "The text directly states, 'Your eyes stay glued to your paper or screen. Your vocal tone flattens. You lose the ability to make eye contact, respond to the audience's reactions, or adjust your pacing.'"}, {"text": "The audience becomes overwhelmed by too much visual information on the slides.", "isCorrect": false, "rationale": "This issue relates to slide design, not directly to the act of reading a script during the presentation."}, {"text": "The presentation usually runs significantly over the allotted time.", "isCorrect": false, "rationale": "While possible, the text does not list this as a specific, primary problem of script-reading, which often leads to rigid pacing rather than necessarily going over time."}], "id": "q07"}, {"question": "In the 'Notes Swap' activity, if a partner attempts to present using the provided notes but struggles to speak naturally and instead reads them verbatim, what does this outcome suggest about the original notes?", "options": [{"text": "The notes are too brief and lack sufficient detail.", "isCorrect": false, "rationale": "If the partner reads verbatim, it implies the notes were too comprehensive, like a script, not too brief."}, {"text": "The notes are too detailed, essentially functioning as a script rather than prompts.", "isCorrect": true, "rationale": "The 'teachernote' explicitly states: 'If the partner reads the notes verbatim and it sounds like a speech, the notes need to be trimmed to prompts.' This indicates the notes were too extensive."}, {"text": "The partner did not adequately rehearse with the notes.", "isCorrect": false, "rationale": "The activity tests the *quality* of the notes, not the partner's rehearsal. The assumption is the partner is trying to use the notes as intended."}, {"text": "The slides themselves are poorly designed and lack clear visuals.", "isCorrect": false, "rationale": "The 'Notes Swap' activity specifically evaluates the effectiveness of the *speaker notes*, not the accompanying slides."}], "id": "q08"}, {"question": "Which statement best summarizes the overarching benefit of using prompt-style speaker notes, as highlighted throughout the section?", "options": [{"text": "They guarantee perfect memorization of all presentation content.", "isCorrect": false, "rationale": "Speaker notes reduce the *need* for memorization by providing prompts; they don't guarantee perfect recall, but support natural delivery."}, {"text": "They allow for a dynamic, adaptable, and engaging presentation style while ensuring key information is covered.", "isCorrect": true, "rationale": "This statement encapsulates the core benefits discussed: sounding conversational ('dynamic, adaptable'), making eye contact ('engaging'), and including main points/data ('ensuring key information is covered'), all without being tied to a script."}, {"text": "They eliminate the need for any rehearsal before the actual presentation.", "isCorrect": false, "rationale": "The 'Writing Tip' explicitly advises to 'Practice with Notes' multiple times, indicating rehearsal is crucial even with good notes."}, {"text": "They serve as a comprehensive backup document for the audience to review later.", "isCorrect": false, "rationale": "While some presenters might share simplified notes, their primary purpose is for the speaker during delivery, not as a comprehensive audience handout."}], "id": "q09"}, {"question": "Referring to Maya Chen's 'Speaker Notes for a Proposal Presentation,' what specific instruction or detail does she include for her *Title Slide* (Slide 1)?", "options": [{"text": "A specific data point about student struggles.", "isCorrect": false, "rationale": "Data about student struggles is mentioned for Slide 2 ('The Problem'), not the Title Slide."}, {"text": "An instruction to pause after a specific statement to let the impact sink in.", "isCorrect": true, "rationale": "For Slide 1, the notes include: 'Pause after the cost line — let it land.' This is a specific reminder for delivery."}, {"text": "A transition sentence to the next slide about the problem.", "isCorrect": false, "rationale": "The Title Slide typically introduces the presentation and doesn't explicitly contain a transition to the next content slide in this example."}, {"text": "A reminder to show a demo.", "isCorrect": false, "rationale": "A reminder to show a demo is an 'Optional reminder' type, but it is not listed for the Title Slide in this model."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
