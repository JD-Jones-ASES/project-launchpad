    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear and Effective: Professional &amp; Technical Writing &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental difference between instructions and a process description?", "options": [{"text": "Instructions are always shorter, while process descriptions are always longer and more detailed.", "isCorrect": false, "rationale": "While instructions can be shorter, length is not the fundamental distinguishing factor; purpose and audience's goal are."}, {"text": "Instructions tell the reader how to perform a task, whereas a process description explains how something happens or works for understanding.", "isCorrect": true, "rationale": "This accurately captures the core distinction: instructions guide action (how to do), while process descriptions explain for comprehension (how it works/happens)."}, {"text": "Instructions use technical jargon, while process descriptions use simple, everyday language.", "isCorrect": false, "rationale": "The level of technical detail or jargon depends on the audience and topic, not whether it's an instruction or a process description. Both can be highly technical or simple."}, {"text": "Instructions are written in the third person, and process descriptions are written in the second person.", "isCorrect": false, "rationale": "This is incorrect. Instructions typically use the second person ('you') and imperative mood, while process descriptions use the third person and indicative mood."}]}, {"question": "Which verb mood is characteristic of a process description, and why?", "options": [{"text": "Imperative mood, because it commands the reader to observe the process.", "isCorrect": false, "rationale": "The imperative mood gives commands and is characteristic of instructions, not process descriptions. Process descriptions aim for understanding, not action."}, {"text": "Subjunctive mood, because it describes hypothetical situations in a process.", "isCorrect": false, "rationale": "The subjunctive mood expresses wishes, possibilities, or hypothetical situations, which is not the primary function of a process description."}, {"text": "Indicative mood, because it states facts and describes what happens.", "isCorrect": true, "rationale": "The indicative mood states facts and describes reality, aligning perfectly with the purpose of a process description to explain how something works or happens."}, {"text": "Conditional mood, because it outlines the conditions under which a process occurs.", "isCorrect": false, "rationale": "While conditions might be mentioned, the conditional mood (e.g., 'would,' 'could') is not the defining characteristic of a process description's overall tone and purpose."}]}, {"question": "A student is researching 'How a Smartphone's Touchscreen Detects Input.' According to the text, which type of document would best suit this research goal?", "options": [{"text": "Instructions, as the student needs to learn how to use the touchscreen.", "isCorrect": false, "rationale": "The student's goal is to understand *how* the touchscreen works, not *how to use* it. This indicates a need for explanation, not instruction."}, {"text": "A simple process description, focusing on the sequence of events when the screen is touched.", "isCorrect": false, "rationale": "While it describes a sequence, the primary focus on *how the device itself* is built and *its parts interact* points to a more specific type of description."}, {"text": "A mechanism description, explaining how the device is built and its parts interact to achieve input detection.", "isCorrect": true, "rationale": "This scenario directly aligns with the definition of a mechanism description, which explains how a device (smartphone's touchscreen) is constructed and how its parts work together."}, {"text": "An instructional manual for repairing smartphone touchscreens.", "isCorrect": false, "rationale": "Repairing a touchscreen involves performing a task, which would require instructions, but the student's goal is understanding, not performing repair."}]}, {"question": "Consider the statement: 'The pump circulates water through the filter.' What does this statement exemplify in the context of process descriptions?", "options": [{"text": "An imperative command to the reader to circulate water.", "isCorrect": false, "rationale": "This statement is not a command. It is a factual observation or description of an action."}, {"text": "A step in a set of instructions for operating a water pump.", "isCorrect": false, "rationale": "While it describes an action of a pump, it does not tell the reader *what to do*. It describes *what happens*."}, {"text": "The use of the indicative mood to state a fact or describe reality.", "isCorrect": true, "rationale": "This statement uses the indicative mood by stating a fact about what the pump does, which is characteristic of process descriptions."}, {"text": "An explanation of why the water needs to be circulated.", "isCorrect": false, "rationale": "The statement describes *what* the pump does, not *why* it does it or *why* the action is necessary."}]}, {"question": "You are writing content about a coffee machine. Which of the following would be an appropriate excerpt for a process description, as opposed to instructions?", "options": [{"text": "1. Fill the reservoir with cold water. 2. Insert a coffee pod into the chamber.", "isCorrect": false, "rationale": "These are direct commands, numbered steps, and use the imperative mood, making them typical of instructions rather than a process description."}, {"text": "Press the brew button to begin the brewing cycle.", "isCorrect": false, "rationale": "This is a command or instruction to the user, not an explanation of what the machine does internally."}, {"text": "The machine's heating element raises the water temperature to 200°F in approximately 30 seconds after the brew button is pressed.", "isCorrect": true, "rationale": "This statement explains *what the machine does* (its internal process) using factual, descriptive language in the indicative mood, which is characteristic of a process description."}, {"text": "Wait 60 seconds for brewing to complete, then remove your mug.", "isCorrect": false, "rationale": "This gives direct commands to the reader regarding actions to perform and a time to wait, making it an instruction."}]}, {"question": "According to the 'Why' Test, if a reader's main question is 'How do I do this?', what type of document should be written?", "options": [{"text": "A process description, to explain the underlying mechanisms.", "isCorrect": false, "rationale": "If the reader's question is 'How do I do this?', they are looking for guidance on performance, not just understanding the mechanism."}, {"text": "A mechanism description, to detail the components involved.", "isCorrect": false, "rationale": "While components might be relevant, the core question is about *doing*, not just understanding how something is built."}, {"text": "Instructions, to provide step-by-step directions for performance.", "isCorrect": true, "rationale": "The 'Why' Test explicitly states that if the reader's main question is 'How do I do this?', instructions are the appropriate document type."}, {"text": "An argumentative essay, to persuade the reader to perform the task.", "isCorrect": false, "rationale": "An argumentative essay has a persuasive purpose, which is distinct from simply guiding a reader to perform a task or understand a process."}]}, {"question": "Which of the following document titles would most likely be a process description?", "options": [{"text": "How to Change the Oil in a Lawnmower", "isCorrect": false, "rationale": "This title implies a 'how-to' guide for performing a task, making it instructions."}, {"text": "How to Set Up Your School Email", "isCorrect": false, "rationale": "This title clearly indicates steps for the reader to perform, classifying it as instructions."}, {"text": "How a Four-Stroke Engine Generates Power", "isCorrect": true, "rationale": "This title suggests an explanation of *how something works* (an engine's operation) rather than how a reader performs a task, fitting the definition of a process description (specifically, a mechanism description with process elements)."}, {"text": "How to File Your Tax Return", "isCorrect": false, "rationale": "This title asks the reader 'how to do' a specific task, therefore it is a set of instructions."}]}, {"question": "A technical writer is tasked with explaining the water cycle to elementary school students. What type of document should they primarily create, and why?", "options": [{"text": "Instructions, to teach them how to replicate the water cycle in a science experiment.", "isCorrect": false, "rationale": "While a lab experiment would require instructions, the goal here is to explain the water cycle, not for students to perform it themselves directly."}, {"text": "A mechanism description, to detail the components of the water cycle.", "isCorrect": false, "rationale": "A mechanism description focuses on devices/systems and their parts. The water cycle is more about a series of natural events and actions, making a standard process description more appropriate."}, {"text": "A process description, to explain the series of natural events and actions involved.", "isCorrect": true, "rationale": "The water cycle is a classic example of a series of natural events/actions (evaporation, condensation, precipitation), making it a perfect fit for a process description which explains 'how something happens'."}, {"text": "A persuasive essay, to convince them of the importance of water conservation.", "isCorrect": false, "rationale": "A persuasive essay aims to influence beliefs or actions, which is distinct from explaining how a natural phenomenon works."}]}, {"question": "Which statement best describes the relationship between a process description and a mechanism description?", "options": [{"text": "They are mutually exclusive; a document cannot contain elements of both.", "isCorrect": false, "rationale": "The text explicitly states that 'The line between the two can blur — a mechanism description often includes process elements'."}, {"text": "A process description explains a series of events, while a mechanism description explains how a device is built and its parts interact, but both are explanatory.", "isCorrect": true, "rationale": "This correctly distinguishes between the two types while acknowledging their common explanatory purpose. A mechanism description often details processes within the mechanism."}, {"text": "A mechanism description is a type of instruction, and a process description is a type of explanation.", "isCorrect": false, "rationale": "Both process descriptions and mechanism descriptions are types of explanations, not instructions."}, {"text": "Mechanism descriptions are always shorter and less detailed than process descriptions.", "isCorrect": false, "rationale": "Length and detail depend on the complexity of the subject and audience, not the document type itself. Either can be very long and detailed."}]}, {"question": "A biology textbook passage explains 'How Photosynthesis Converts Sunlight into Chemical Energy.' This is an example of a process description because:", "options": [{"text": "It uses the imperative mood to guide the reader through an experiment.", "isCorrect": false, "rationale": "This example describes a natural process, not an experiment for the reader to perform. It would use the indicative mood, not imperative."}, {"text": "Its purpose is to tell the reader how to perform the steps of photosynthesis.", "isCorrect": false, "rationale": "Photosynthesis is a natural process that readers cannot 'perform.' The purpose is understanding, not action."}, {"text": "It explains how a system (photosynthesis) works for the reader to understand, rather than to perform.", "isCorrect": true, "rationale": "This aligns perfectly with the definition of a process description: it explains how something (photosynthesis) happens or works, for the reader's understanding."}, {"text": "It provides step-by-step instructions for a biology lab activity.", "isCorrect": false, "rationale": "A lab activity would be instructions. The textbook passage, in contrast, explains the scientific process itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
