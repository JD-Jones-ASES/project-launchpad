    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 10, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary distinction between a proposal and other documents like reports, as described in the section 'What Makes a Proposal Different from Other Documents?'", "options": [{"text": "A proposal is always longer and more detailed than a report, covering more complex topics.", "isCorrect": false, "rationale": "The text does not state that proposals are always longer or more detailed than reports. The crucial difference lies in their purpose, not necessarily their length or complexity."}, {"text": "A report primarily informs, while a proposal primarily persuades and specifically asks for something.", "isCorrect": true, "rationale": "The text explicitly states: 'Unlike a report, which presents information for the reader to interpret, a proposal presents information and argues for a specific course of action. ...a proposal asks for something. It does not just inform; it persuades.'"}, {"text": "Reports are strictly internal documents, while proposals are exclusively external, addressing audiences outside the organization.", "isCorrect": false, "rationale": "Both reports and proposals can be internal or external, depending on their audience. The text clarifies that proposals fall into both internal and external categories."}, {"text": "Proposals must include a budget and timeline, which are never required in reports.", "isCorrect": false, "rationale": "While proposals typically include budgets and timelines, reports can also contain these elements. This is not the fundamental distinction highlighted in the text."}], "id": "q01"}, {"question": "According to the 'Proposal Basics' section, a professional proposal is defined by its three core functions. Which of the following is NOT one of these functions?", "options": [{"text": "Identifies a problem.", "isCorrect": false, "rationale": "Identifying a problem is explicitly stated as one of the core functions of a proposal: 'a written plan that identifies a problem...'"}, {"text": "Presents a solution.", "isCorrect": false, "rationale": "Presenting a solution is explicitly stated as one of the core functions of a proposal: '...presents a solution...'"}, {"text": "Critiques existing solutions without offering an alternative.", "isCorrect": true, "rationale": "A proposal is characterized by *presenting a solution*, not merely critiquing existing ones without offering a viable alternative. This option describes an action contrary to the definition of a proposal."}, {"text": "Requests permission or funding.", "isCorrect": false, "rationale": "Requesting permission or funding is explicitly stated as one of the core functions of a proposal: '...and requests permission or funding to carry it out'."}], "id": "q02"}, {"question": "A local community organizer wants to convince the city council to implement a new recycling program across the city. Which type of proposal would they most likely write, and what characteristic would it primarily exhibit?", "options": [{"text": "An internal proposal, assuming shared context with the city council.", "isCorrect": false, "rationale": "The city council is an entity outside the community organizer's immediate personal or volunteer organization, meaning there wouldn't necessarily be shared internal context. Therefore, it's not an internal proposal."}, {"text": "An external proposal, requiring more background information for the reader.", "isCorrect": true, "rationale": "The city council is an audience outside the organizer's immediate organization. External proposals 'require more background information because the reader may not know your organization or share your assumptions.'"}, {"text": "An unsolicited proposal, as the city council likely requested it through an RFP.", "isCorrect": false, "rationale": "While it could be unsolicited, the fact that the city council *likely* requested it through an RFP is an assumption not supported by the prompt. More importantly, classifying it as external is the primary, definite characteristic based on audience."}, {"text": "A solicited proposal, allowing for a less formal tone due to shared organizational culture.", "isCorrect": false, "rationale": "The prompt does not indicate that the proposal was requested (solicited). Furthermore, an external proposal to a city council would typically maintain a formal tone, even if solicited, due to the external relationship."}], "id": "q03"}, {"question": "A student notices that their school's library lacks updated resources for a specific subject area. They decide to write a detailed plan suggesting new acquisitions and an accompanying budget, and then present it to the school principal. Based on the text, how would this proposal most accurately be classified by its origin?", "options": [{"text": "Solicited, because the principal is a decision-maker who could potentially approve it.", "isCorrect": false, "rationale": "A solicited proposal is 'requested by the recipient.' The principal being a decision-maker doesn't mean they requested the proposal; the student initiated it."}, {"text": "Internal, but its origin is not specified by the information given.", "isCorrect": false, "rationale": "While it is an internal proposal (to someone within the organization), the origin *is* specified by the context: the student initiated it themselves, meaning it wasn't requested by the principal."}, {"text": "Unsolicited, as the student initiated it without a formal request from the principal.", "isCorrect": true, "rationale": "An unsolicited proposal is 'one you send on your own initiative. Nobody asked for it.' The student noticed a problem and developed a solution independently, fitting this definition perfectly."}, {"text": "An RFP response, as it addresses a problem within the school.", "isCorrect": false, "rationale": "An RFP (Request for Proposal) is a formal invitation issued by an organization. The student did not respond to such a formal request from the principal."}], "id": "q04"}, {"question": "An organization issues a Request for Proposal (RFP). What is the primary advantage for a writer responding to this RFP compared to writing an unsolicited proposal?", "options": [{"text": "The writer does not need to include a budget or timeline, as these are typically pre-approved by the RFP.", "isCorrect": false, "rationale": "RFPs typically *require* budgets and timelines, and often specify their format, rather than exempting the writer from including them."}, {"text": "The writer can assume the reader already agrees with their proposed solution and does not need to argue its merits.", "isCorrect": false, "rationale": "The reader is evaluating multiple proposals and is looking for the *best* solution; agreement is not assumed. The writer still needs to argue why their solution is superior."}, {"text": "The writer already knows what the organization needs, the required format, and the submission deadline.", "isCorrect": true, "rationale": "The text states: 'An RFP tells you exactly what the organization needs, what format to follow, and when to submit.' This significantly streamlines the writing process compared to an unsolicited proposal."}, {"text": "The writer has more freedom to define the problem, the scope of work, and the criteria for success.", "isCorrect": false, "rationale": "An RFP usually defines the problem and scope of work for the project, limiting the writer's freedom in these areas. This is more characteristic of an unsolicited proposal."}], "id": "q05"}, {"question": "According to the text, what is the most significant initial hurdle a writer of an unsolicited proposal must overcome?", "options": [{"text": "Convincing the reader of the writer's qualifications to carry out the solution.", "isCorrect": false, "rationale": "While qualifications are important for any proposal, the text highlights a more fundamental initial challenge for unsolicited proposals."}, {"text": "Securing the necessary funding or resources for the proposed project.", "isCorrect": false, "rationale": "Securing funding is the ultimate goal, but the *initial hurdle in writing* the proposal is about establishing the need, not directly securing the funds yet."}, {"text": "Establishing that a problem exists and is worth solving before presenting a solution.", "isCorrect": true, "rationale": "The text states: 'Unsolicited proposals are harder to write because you must first convince the reader that a problem exists before you can propose a solution.'"}, {"text": "Adhering strictly to a pre-defined format and submission timeline.", "isCorrect": false, "rationale": "This challenge is more characteristic of solicited proposals, especially those responding to RFPs, which typically specify strict formats and deadlines."}], "id": "q06"}, {"question": "A company is receiving an unsolicited proposal. Following the 'Writing Tip: Start with the Reader's Question,' which section of the proposal should most strongly address the reader's likely first question: 'Why should I care about this?'", "options": [{"text": "The Budget section.", "isCorrect": false, "rationale": "The Budget section details costs, not the fundamental importance or relevance of the problem being addressed."}, {"text": "The Proposed Solution section.", "isCorrect": false, "rationale": "The Proposed Solution outlines what will be done, but the reader needs to understand *why* a solution is necessary before delving into its details."}, {"text": "The Problem Statement section.", "isCorrect": true, "rationale": "For an unsolicited proposal, the writing tip advises starting by answering 'Why should I care about this?' The 'Problem Statement — What problem you are solving and why it matters. Use data, examples, and evidence' is explicitly designed to address this question."}, {"text": "The Qualifications section.", "isCorrect": false, "rationale": "The Qualifications section establishes the writer's credibility but doesn't primarily explain *why the problem itself* is important or relevant to the reader."}], "id": "q07"}, {"question": "In the context of a project proposal, what does a 'deliverable' primarily represent?", "options": [{"text": "The estimated cost breakdown for the project's completion.", "isCorrect": false, "rationale": "This describes a 'Budget,' which is a detailed plan showing expected costs, not a tangible output."}, {"text": "A significant checkpoint or achievement within the project timeline.", "isCorrect": false, "rationale": "This describes a 'Milestone,' which is a significant checkpoint or achievement in a project's timeline."}, {"text": "A tangible product or result that must be provided at the end of a project or project phase.", "isCorrect": true, "rationale": "The vocabulary box defines 'Deliverable' as 'A tangible product or result that must be provided at the end of a project or project phase.'"}, {"text": "The overall schedule detailing when each project phase will be finished.", "isCorrect": false, "rationale": "This describes a 'Timeline,' which is a schedule showing when each phase of a project will be completed."}], "id": "q08"}, {"question": "Which of the following scenarios best exemplifies the 'implementation' phase of a proposed project?", "options": [{"text": "Analyzing the expected costs against the potential benefits of the project.", "isCorrect": false, "rationale": "This describes 'Cost-benefit' analysis, which is part of the planning and evaluation, not the active process of putting the plan into action."}, {"text": "Determining if the proposed plan is realistic and achievable with available resources.", "isCorrect": false, "rationale": "This describes 'Feasibility' assessment, which occurs before implementation to decide if the project should proceed."}, {"text": "Developing a detailed schedule showing when each phase of the project will be completed.", "isCorrect": false, "rationale": "This describes creating a 'Timeline,' which is a planning document, not the act of putting the plan into action."}, {"text": "Deploying new software across all company departments as outlined in the approved plan.", "isCorrect": true, "rationale": "The vocabulary box defines 'Implementation' as 'The process of putting a plan into action.' Deploying the software is a direct action of putting the plan into effect."}], "id": "q09"}, {"question": "A consulting firm is responding to an RFP issued by a city for urban planning services. Based on the 'Solicited vs. Unsolicited Opening' example, which of the following opening sentences would be most appropriate for their proposal?", "options": [{"text": "“We’ve noticed several inefficiencies in the city’s current urban development and believe we can help.”", "isCorrect": false, "rationale": "This opening identifies a problem from the writer's perspective and implies they are bringing it to the reader's attention, typical of an *unsolicited* proposal, not a response to an RFP."}, {"text": "“This proposal suggests that the city might consider reviewing its planning strategies to improve future growth.”", "isCorrect": false, "rationale": "This opening is too vague and tentative for a formal response to an RFP. An RFP response should be direct and confident."}, {"text": "“In response to the City of Springfield’s October 1st RFP for comprehensive urban planning, Apex Consultants proposes a phased revitalization strategy.”", "isCorrect": true, "rationale": "This opening directly references the RFP, which is the defining characteristic of a solicited proposal's opening, as demonstrated in the 'beforeafter' example for a solicited proposal."}, {"text": "“Having extensive experience in urban planning, we are interested in discussing potential collaborations with your esteemed city.”", "isCorrect": false, "rationale": "This sounds like an initial inquiry or a letter of interest rather than a formal response to an RFP. It doesn't acknowledge a specific request."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
