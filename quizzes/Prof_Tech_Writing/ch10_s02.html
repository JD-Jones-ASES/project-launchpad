    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 10, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental organizational pattern described as the problem-solution structure?", "options": [{"text": "Presenting a series of facts followed by a concluding summary.", "isCorrect": false, "rationale": "While proposals include facts and summaries, this option does not capture the core 'problem-solution' dynamic of establishing an issue and then proposing a fix."}, {"text": "Establishing a problem and then presenting a plan to solve it.", "isCorrect": true, "rationale": "The text explicitly defines the problem-solution structure as 'an organizational pattern that first establishes a problem and then presents a plan to solve it.'"}, {"text": "Beginning with a solution and then explaining its benefits.", "isCorrect": false, "rationale": "This reverses the order described in the text. The problem must be established first to gain reader buy-in before a solution is presented."}, {"text": "Debating opposing viewpoints to reach a compromise.", "isCorrect": false, "rationale": "While proposals aim for agreement, the problem-solution structure is about presenting a specific problem and a solution, not a debate format."}], "id": "q01"}, {"question": "According to the text, which of the following is NOT one of the five essential questions every effective proposal must answer?", "options": [{"text": "What is the problem?", "isCorrect": false, "rationale": "This is one of the five essential questions (Problem Statement)."}, {"text": "Why does it matter?", "isCorrect": false, "rationale": "This is one of the five essential questions (Significance / Impact)."}, {"text": "Who are the key stakeholders involved?", "isCorrect": true, "rationale": "While important to a project, 'Who are the key stakeholders involved?' is not listed as one of the 'Five Questions Every Proposal Must Answer' directly. The five are: What is the problem?, Why does it matter?, What do you propose to do?, Why will your solution work?, and What will it cost and how long will it take?."}, {"text": "What will it cost and how long will it take?", "isCorrect": false, "rationale": "This is one of the five essential questions (Budget / Timeline)."}], "id": "q02"}, {"question": "A proposal draft contains the problem statement: 'Many students feel stressed about exams, and the school should do something about it.' Based on the text's guidance for writing problem statements, which revision best improves its effectiveness?", "options": [{"text": "Student stress levels are high, impacting morale and academic performance.", "isCorrect": false, "rationale": "While better than the original, this statement is still somewhat vague and lacks specific data or concrete evidence, which the text emphasizes."}, {"text": "A May 2023 survey of 500 students revealed 75% reported significant exam-related anxiety, leading to a 15% increase in counseling requests and a 5% drop in average GPA during exam periods.", "isCorrect": true, "rationale": "This revision identifies the problem specifically, provides concrete evidence (survey data, percentages, specific impacts on counseling and GPA), and explains consequences (anxiety, increased requests, GPA drop), aligning with all three requirements for a strong problem statement."}, {"text": "Students are overworked and need more support during exams.", "isCorrect": false, "rationale": "This statement expresses an opinion and a need but lacks the specific evidence and consequences required for a strong problem statement, as highlighted by the 'Vague vs. Specific Problem Statement' example."}, {"text": "The school's current exam policies are inadequate, contributing to student distress.", "isCorrect": false, "rationale": "This identifies a potential cause but doesn't provide specific evidence of the problem's scope or measurable consequences, making it less effective than a data-driven statement."}], "id": "q03"}, {"question": "According to the text, the problem-solution structure is highly effective because it directly addresses which aspect of a decision-maker's thought process?", "options": [{"text": "It quickly establishes the writer's credibility and expertise.", "isCorrect": false, "rationale": "While a well-structured proposal can build credibility, the text states the problem-solution structure's effectiveness comes from mirroring how decision-makers think, not primarily from establishing writer credibility."}, {"text": "It mirrors how decision-makers logically process information and questions.", "isCorrect": true, "rationale": "The text states, 'This structure works because it mirrors how decision-makers think. Before anyone will approve your plan, they need to agree that a problem exists. Before they will spend money, they need to believe your solution will actually work. Each section of your proposal answers the next logical question in the reader's mind.'"}, {"text": "It allows for the integration of emotional appeals and anecdotal evidence.", "isCorrect": false, "rationale": "The text emphasizes specific data and evidence rather than just emotional appeals or anecdotes, especially in problem statements."}, {"text": "It reduces the overall length and complexity of the proposal document.", "isCorrect": false, "rationale": "The problem-solution structure provides clarity and logic, but it doesn't necessarily reduce length; comprehensive proposals still require detail for each section."}], "id": "q04"}, {"question": "A strong problem statement, as described in the text, must provide evidence. What type of information does the text suggest using as evidence?", "options": [{"text": "Personal opinions and testimonials from dissatisfied individuals.", "isCorrect": false, "rationale": "The text warns against 'just your personal complaint' and favors objective data over mere personal opinions."}, {"text": "Data, surveys, incident reports, or expert opinions.", "isCorrect": true, "rationale": "The text explicitly states: 'Provides evidence. Data, surveys, incident reports, expert opinions—anything that proves the problem is real, not just your personal complaint.'"}, {"text": "Historical precedents of similar problems in other organizations.", "isCorrect": false, "rationale": "While potentially useful as supporting information, historical precedents are not explicitly listed as the primary forms of evidence in the same way data, surveys, reports, and expert opinions are."}, {"text": "Guesses and estimations of future potential issues.", "isCorrect": false, "rationale": "The text emphasizes proving the problem is 'real' and using specific data, not guesses about future issues."}], "id": "q05"}, {"question": "A community leader is outlining a proposal to address local littering. She clearly states her overall solution ('We will implement a neighborhood cleanup program') but has not yet detailed who will be responsible for coordinating volunteers or purchasing supplies. Based on the text, what crucial element of a strong proposed solution is she missing?", "options": [{"text": "A clear statement of the solution in the first sentence.", "isCorrect": false, "rationale": "The leader has already done this by stating her overall solution clearly."}, {"text": "Anticipating and addressing potential objections.", "isCorrect": false, "rationale": "While an important part of a strong solution, the scenario specifically describes a lack of defined roles, not a failure to address objections."}, {"text": "Identifying who will be responsible for each part of the solution.", "isCorrect": true, "rationale": "The text lists 'Identifies who will be responsible for each part' as a key element of a strong proposed solution, directly matching the missing detail in the scenario."}, {"text": "Explaining how each step addresses the problem.", "isCorrect": false, "rationale": "This is also a key element, but the scenario specifically points out the absence of assigning responsibility for tasks, which is more directly addressed by option C."}], "id": "q06"}, {"question": "The text warns against the 'Disconnected Solution,' where a proposal describes a problem in detail but offers a solution that doesn't clearly address each aspect of the problem. What is the most significant negative impact of this common mistake?", "options": [{"text": "It suggests the writer has not conducted enough research on the problem.", "isCorrect": false, "rationale": "The scenario states the problem is described in detail, implying research has been done on the problem itself, but the solution is inadequate."}, {"text": "It makes the proposal overly long and difficult to read.", "isCorrect": false, "rationale": "A disconnected solution doesn't inherently make the proposal longer; it makes it less effective and raises questions."}, {"text": "It leaves the reader with unanswered questions and reasons to reject the proposal.", "isCorrect": true, "rationale": "The text explains this common mistake results in the reader 'wondering, “But what about the other two problems?”' and essentially gives them a reason to say 'no'."}, {"text": "It can lead to unnecessary budget increases for the proposed project.", "isCorrect": false, "rationale": "While a poorly planned solution could lead to budget issues, the immediate and most significant impact described is the reader's doubt and potential rejection."}], "id": "q07"}, {"question": "What is the primary function of including a 'Scope of Work' statement in a proposal?", "options": [{"text": "To provide a detailed breakdown of the project's budget and timeline.", "isCorrect": false, "rationale": "The budget and timeline are separate sections of the proposal. The Scope of Work focuses on tasks and boundaries."}, {"text": "To define the specific tasks, deliverables, and boundaries of the proposed project, preventing misunderstandings.", "isCorrect": true, "rationale": "The text defines 'Scope of Work' as 'the specific tasks, deliverables, and boundaries of a proposed project defines exactly what the project will and will not include. A clear scope prevents misunderstandings.'"}, {"text": "To justify the necessity of the proposed solution by reiterating the problem.", "isCorrect": false, "rationale": "The problem statement and significance sections handle justifying the necessity of the solution."}, {"text": "To introduce the qualifications and experience of the project team.", "isCorrect": false, "rationale": "Qualifications are typically part of the 'Why will your solution work?' section, not the Scope of Work."}], "id": "q08"}, {"question": "Sarah has an idea for a new student mentorship program and needs to make a quick, persuasive case to the school board president in a brief, informal encounter. Based on the text's guidance for an 'elevator pitch,' which set of questions should Sarah prioritize answering to be most effective?", "options": [{"text": "What are the potential risks, who are the stakeholders, and what are the long-term benefits?", "isCorrect": false, "rationale": "These are important considerations but not the core three questions the text identifies for a compressed elevator pitch."}, {"text": "What is the problem, what is your solution, and what do you need from the listener?", "isCorrect": true, "rationale": "The text explicitly states an effective elevator pitch answers these three questions in about 60 seconds: 'What is the problem? What is your solution? What do you need from the listener?'"}, {"text": "What research supports your idea, how innovative is it, and who else agrees?", "isCorrect": false, "rationale": "While supporting details, these are too extensive for the compressed nature of an elevator pitch's core message."}, {"text": "What is the history of this issue, what are alternative solutions, and what is your personal motivation?", "isCorrect": false, "rationale": "These questions provide too much background or personal detail, deviating from the direct problem-solution-ask structure of an effective elevator pitch."}], "id": "q09"}, {"question": "A proposal details a significant problem of outdated classroom technology and outlines a comprehensive plan for upgrades, including specific steps and responsible parties. However, it fails to include 'What will it cost and how long will it take?' According to the text, what is the most likely consequence of this omission?", "options": [{"text": "The reader will assume the costs are minimal and approve the proposal.", "isCorrect": false, "rationale": "Decision-makers require financial and timeline details. Assuming minimal costs is an unrealistic expectation for a proposal lacking this information."}, {"text": "The proposal will still be approved, but implementation will be delayed.", "isCorrect": false, "rationale": "Approval is unlikely without critical budget and timeline information. Delays would likely stem from a lack of approval rather than an approved but incomplete plan."}, {"text": "The reader will likely reject the proposal because a key logical question is unanswered.", "isCorrect": true, "rationale": "The text states, 'A proposal that leaves any of these questions unanswered gives the reader a reason to say 'no.' The 'What will it cost and how long will it take?' question is one of the five essential elements, and its absence provides a strong reason for rejection."}, {"text": "The project team will have more flexibility in managing the budget and timeline.", "isCorrect": false, "rationale": "Lacking a budget and timeline indicates a lack of planning, not flexibility. It would create uncertainty and hinder approval."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
