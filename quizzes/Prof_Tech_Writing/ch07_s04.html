        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the primary function of an analogy in technical writing, according to the provided text?", "options": [{"text": "To provide a literal definition of a complex term.", "isCorrect": false, "rationale": "Analogies are comparisons, not literal definitions. They simplify by relating, not by defining directly."}, {"text": "To simplify an unfamiliar concept by relating it to a familiar one.", "isCorrect": true, "rationale": "The text explicitly states: 'an analogy...is used to help explain an unfamiliar concept by relating it to a familiar one'."}, {"text": "To replace technical language with everyday vocabulary entirely.", "isCorrect": false, "rationale": "Analogies introduce an idea but do not replace the actual explanation using accurate technical language; they are a tool to aid understanding, not a substitute for precise terminology."}, {"text": "To present a completely new perspective without any comparison.", "isCorrect": false, "rationale": "Analogies are fundamentally about comparison to something familiar, not about presenting something entirely new without a frame of reference."}], "id": "q01"}, {"question": "According to the text, which scenario is LEAST suited for using an analogy?", "options": [{"text": "Explaining quantum physics to a high school student.", "isCorrect": false, "rationale": "Quantum physics is an abstract concept, and a high school student likely has no prior knowledge, making it an ideal candidate for an analogy to convey logic."}, {"text": "Describing the data flow in a cloud computing network.", "isCorrect": false, "rationale": "Data transmission is cited as an 'abstract or invisible' concept where analogies work best, especially if the reader has no prior knowledge."}, {"text": "Detailing the precise chemical formula for water (H2O).", "isCorrect": true, "rationale": "Analogies are best for conveying the logic of a process or an abstract concept, not for stating precise facts or literal descriptions like a chemical formula. The text indicates analogies are for 'logic of a process, not just the facts'."}, {"text": "Demonstrating the logical steps in a software debugging process.", "isCorrect": false, "rationale": "Analogies work well to 'convey the logic of a process,' which aligns with explaining the steps in debugging."}], "id": "q02"}, {"question": "The extended analogy of a CPU as a short-order cook effectively illustrates which of the following aspects of CPU operation?", "options": [{"text": "The exact physical layout of a CPU's internal components.", "isCorrect": false, "rationale": "The analogy focuses on the *process* and *logic* of instruction execution and memory access, not the physical architecture."}, {"text": "The sequential processing of instructions and the hierarchical role of different memory types (cache vs. main memory).", "isCorrect": true, "rationale": "The analogy maps the cook to the CPU, order tickets to instructions, nearby bins to cache, and walk-in cooler to main memory, clearly illustrating the process of fetching, executing, and accessing different memory levels."}, {"text": "The specific programming languages used to write CPU instructions.", "isCorrect": false, "rationale": "The analogy simplifies the 'instructions' but does not delve into the specifics of programming languages."}, {"text": "The emotional stress experienced by a CPU under heavy load.", "isCorrect": false, "rationale": "This option introduces a human-like emotional aspect which is beyond the scope and intent of a technical analogy for a CPU."}], "id": "q03"}, {"question": "A technical writer compares data encryption to a locked safe. Where would this analogy most likely break down, according to the 'Common Mistake: Stretching an Analogy Too Far' guideline?", "options": [{"text": "Explaining that the safe protects valuable items.", "isCorrect": false, "rationale": "This aligns well; both safes and encryption protect valuable information (items)."}, {"text": "Explaining how the safe prevents unauthorized access.", "isCorrect": false, "rationale": "This is a strong point of comparison; both mechanisms are designed to prevent unauthorized access."}, {"text": "Explaining the specific mathematical algorithms used to lock/unlock the data.", "isCorrect": true, "rationale": "A physical safe does not use mathematical algorithms in the way encryption does. This attempts to push the analogy beyond its structural similarity into specific technical details where it no longer accurately represents the concept, similar to how a highway analogy fails for encryption or packet switching."}, {"text": "Explaining that both encryption and safes aim to secure information.", "isCorrect": false, "rationale": "This is the overarching purpose and a valid point of comparison for the analogy."}], "id": "q04"}, {"question": "A writer explains how a VPN works by comparing it to a private tunnel. To use this analogy responsibly, according to the guidelines provided, the writer should NOT do which of the following?", "options": [{"text": "Clearly state, 'Think of a VPN as a private tunnel...'", "isCorrect": false, "rationale": "The text recommends using signal phrases like 'Think of it as' to 'State the analogy explicitly'."}, {"text": "Explain that, unlike a physical tunnel, a VPN uses software protocols to create a secure connection over a public network.", "isCorrect": false, "rationale": "The text advises to 'Identify the limits' and state when the comparison stops working, using phrases like 'Unlike a highway...'."}, {"text": "Continue to refer to all aspects of VPN operation, such as server load balancing, exclusively in terms of tunnel mechanics.", "isCorrect": true, "rationale": "This action exemplifies 'Stretching an Analogy Too Far' and fails to 'Return to the real concept'. The analogy should introduce an idea, not replace the actual technical explanation when it no longer fits specific features like server load balancing."}, {"text": "After using the analogy, describe the real technical process of a VPN in accurate terms.", "isCorrect": false, "rationale": "The text recommends to 'Return to the real concept' and 'describe the real process using accurate technical language' after the analogy."}], "id": "q05"}, {"question": "Which of the following best exemplifies the principle of using concrete examples to make an abstract process tangible?", "options": [{"text": "Stating that 'software updates improve system performance.'", "isCorrect": false, "rationale": "This is an abstract description, lacking specific details, similar to the 'Abstract Description' given in the text."}, {"text": "Explaining that 'the operating system regularly downloads patches to fix vulnerabilities and enhance speed, for instance, reducing boot time by 5 seconds.'", "isCorrect": true, "rationale": "This provides specific details ('boot time by 5 seconds') and a specific action (downloads patches), making the abstract concept of performance improvement tangible, much like the 'Concrete Example' in the text."}, {"text": "Defining 'system performance' as the efficiency and responsiveness of a computer system.", "isCorrect": false, "rationale": "This is a definition, not a concrete example of a process made tangible."}, {"text": "Comparing software updates to routine car maintenance.", "isCorrect": false, "rationale": "This is an analogy, not a concrete example demonstrating an abstract process directly."}], "id": "q06"}, {"question": "In the 'How a Bicycle's Gear System Works' model document, what is the primary purpose of comparing the gear system to a stepladder?", "options": [{"text": "To illustrate the physical height of a bicycle's gears.", "isCorrect": false, "rationale": "The analogy relates to effort and speed, not the physical height of the components."}, {"text": "To explain the relationship between gear size, pedaling effort, and wheel speed in an intuitive way.", "isCorrect": true, "rationale": "The analogy states: 'Shifting to a larger rear sprocket is like stepping down to a lower rung — pedaling becomes easier but the wheel turns more slowly. Shifting to a smaller rear sprocket is like stepping up — pedaling becomes harder but the wheel turns faster.' This directly links the abstract concepts to a familiar physical action."}, {"text": "To provide a step-by-step guide on how to repair a broken gear.", "isCorrect": false, "rationale": "The model document focuses on how the system works, not on repair procedures."}, {"text": "To emphasize the importance of safety when climbing hills.", "isCorrect": false, "rationale": "While related to hills, the analogy itself is about the mechanics of shifting and its effect, not safety."}], "id": "q07"}, {"question": "A cyclist is struggling to pedal uphill. Based on the 'How a Bicycle's Gear System Works' explanation, what gear configuration should they select, and why?", "options": [{"text": "A high gear (large chainring, small rear sprocket) for maximum speed.", "isCorrect": false, "rationale": "The text states a high gear is for 'flat ground or a downhill' to cover more distance, but requires more effort, making it unsuitable for struggling uphill."}, {"text": "A low gear (small chainring, large rear sprocket) to reduce pedaling effort.", "isCorrect": true, "rationale": "The text explicitly states: 'On a steep hill, a rider shifts to a low gear (small chainring, large rear sprocket) so that each pedal stroke requires less force'."}, {"text": "Any gear, as long as they pedal faster.", "isCorrect": false, "rationale": "The gear ratio significantly impacts the effort needed; simply pedaling faster in the wrong gear will not make uphill cycling easier."}, {"text": "A medium gear to balance speed and effort.", "isCorrect": false, "rationale": "While sometimes useful, for 'struggling uphill,' the optimal choice according to the text is a low gear to minimize effort."}], "id": "q08"}, {"question": "The 'Writing Connection' section suggests that describing how the assassination of Archduke Franz Ferdinand led to World War I is an example of what?", "options": [{"text": "A historical narrative, distinct from process description.", "isCorrect": false, "rationale": "The text explicitly connects these historical explanations to process descriptions, stating they use the 'same principles'."}, {"text": "A chronological process description, emphasizing cause and effect.", "isCorrect": true, "rationale": "The text states this is an example of 'writing a process description' by tracing 'the specific chain of events — the assassination, the ultimatum, the alliance obligations, the mobilization orders' as a cause-and-effect chain."}, {"text": "A character analysis of historical figures.", "isCorrect": false, "rationale": "While character analysis might be part of history, the example focuses on the sequence of events and their connections."}, {"text": "An abstract political theory.", "isCorrect": false, "rationale": "The text emphasizes making 'abstract political or economic forces tangible' through concrete examples and specific chains of events, contrasting with merely stating abstract theory."}], "id": "q09"}, {"question": "A technical writer develops an analogy comparing cloud computing to a vast library. Before finalizing it, they test it on a colleague who is unfamiliar with cloud computing. The colleague asks, 'But how does the library decide which books to throw out if storage is infinite?' Based on the 'Writing Tip,' what does this response indicate?", "options": [{"text": "The colleague is too focused on minor details, and the analogy is fine.", "isCorrect": false, "rationale": "The Writing Tip states that if the audience 'look confused or start asking questions about the analogy itself,' the comparison is not clear enough. Such questions reveal where the analogy breaks down or is being stretched."}, {"text": "The analogy is effective because it sparks questions and engagement.", "isCorrect": false, "rationale": "While engagement is good, confusion about the analogy's internal logic ('What do you mean by the cooler?') indicates a problem with the analogy, not its success."}, {"text": "The analogy might be too complex and needs further explanation or simplification, or it's being stretched too far beyond its useful limits.", "isCorrect": true, "rationale": "The colleague's question highlights a point where the library analogy ('books to throw out') conflicts with the reality of cloud storage ('infinite'), indicating the analogy is being stretched or has limits that need to be identified or the analogy itself needs refinement, as per the 'Writing Tip' and 'When Analogies Mislead' sections."}, {"text": "The analogy should be replaced with a purely technical description immediately, without further refinement.", "isCorrect": false, "rationale": "The text suggests refining or identifying limits, not necessarily abandoning it immediately. It emphasizes knowing when to stop, but also testing for clarity, implying refinement is an option."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
