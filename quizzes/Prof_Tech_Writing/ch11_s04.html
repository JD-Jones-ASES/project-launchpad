    };

        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 11, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is the primary goal of a well-designed troubleshooting section in a user guide?", "options": [{"text": "To list every conceivable technical error a product might encounter.", "isCorrect": false, "rationale": "While a troubleshooting section lists problems, its primary goal is not just an exhaustive list, but to empower users to resolve them, thereby reducing the need for external support."}, {"text": "To give users a systematic way to identify the cause of an issue and fix it independently.", "isCorrect": true, "rationale": "The text states that a good troubleshooting section 'gives users a systematic way to identify the cause and fix the issue on their own, without calling the help desk.' This directly aligns with empowering users for self-resolution."}, {"text": "To provide highly technical explanations of system failures for advanced users.", "isCorrect": false, "rationale": "The text advises keeping causes 'brief and non-technical unless the audience is technical,' indicating that highly technical explanations are not the primary goal for all audiences and can be counterproductive for general users."}, {"text": "To offer a quick reference for common product features and general usage questions.", "isCorrect": false, "rationale": "This describes the purpose of an FAQ (Frequently Asked Questions) section, which the text explicitly differentiates from a troubleshooting guide, stating FAQs answer 'common questions about the product—including questions that are not problems.'"}], "id": "q01"}, {"question": "Why is the Symptom–Cause–Solution format structured with the Symptom first?", "options": [{"text": "It ensures the guide prioritizes complex technical details over user experience.", "isCorrect": false, "rationale": "Prioritizing user experience is key, and starting with the symptom does exactly that. Technical details (cause) come later and are often simplified."}, {"text": "Users typically already know the technical cause of their problem before consulting the guide.", "isCorrect": false, "rationale": "The text explicitly states, 'The symptom always comes first because that is what the user knows. They do not know the cause yet—that is why they are reading your troubleshooting section.'"}, {"text": "The solution cannot be provided without first fully detailing the underlying technical cause.", "isCorrect": false, "rationale": "While the cause informs the solution, the guide can often lead users to a solution based on a high-level, non-technical cause, without needing extensive technical details first."}, {"text": "Users begin troubleshooting based on what they observe or experience, not the underlying technical reason.", "isCorrect": true, "rationale": "The text explains, 'The symptom always comes first because that is what the user knows. They do not know the cause yet—that is why they are reading your troubleshooting section.' This puts the user's immediate experience at the forefront."}], "id": "q02"}, {"question": "A user guide includes a troubleshooting section with primary headings like 'Server Errors,' 'Authentication Failures,' and 'Browser Compatibility Issues.' Based on the provided text, what is the most significant drawback of this organizational approach?", "options": [{"text": "It implies that the product is inherently prone to many different types of technical problems.", "isCorrect": false, "rationale": "While a list of issues might suggest problems, the organization method itself is the focus, not the quantity of problems it implies."}, {"text": "It requires the user to already possess technical knowledge to categorize their problem before finding a solution.", "isCorrect": true, "rationale": "The text states, 'If you organize by cause ('Server Errors,' 'Authentication Issues'), the user has to guess the technical category of their problem before they can find the fix.' This means it assumes prior technical understanding."}, {"text": "It makes the troubleshooting section appear too brief and may not cover all potential issues comprehensively.", "isCorrect": false, "rationale": "The issue is not about the length or comprehensiveness, but the user-friendliness of the organization, regardless of how many entries it contains."}, {"text": "It is only effective for highly technical audiences, making it unsuitable for general users.", "isCorrect": false, "rationale": "Even for technical users, if they don't know the technical *type* of error they're experiencing, this organization is unhelpful, as highlighted by the medical guide analogy."}], "id": "q03"}, {"question": "In which scenario would a decision tree be particularly effective for a troubleshooting section?", "options": [{"text": "When the goal is to list general product features rather than resolve issues.", "isCorrect": false, "rationale": "Decision trees are specifically designed for troubleshooting problems, not for describing features, which is typically covered in other parts of a guide or an FAQ."}, {"text": "When a single symptom consistently has only one known, straightforward cause.", "isCorrect": false, "rationale": "For simple symptom-to-single-cause problems, the 'If X, Try Y' table format is more efficient. Decision trees shine with more complexity."}, {"text": "When a common user symptom could potentially stem from several different underlying causes.", "isCorrect": true, "rationale": "The text explains, 'Decision trees work especially well when a single symptom can have multiple causes,' guiding the user through a series of questions to narrow down the specific cause."}, {"text": "When the solutions are extremely simple and involve only one or two basic steps.", "isCorrect": false, "rationale": "For very simple solutions, a direct Symptom–Cause–Solution entry or 'If X, Try Y' table would be more concise than a decision tree."}], "id": "q04"}, {"question": "Which of the following would be an appropriate entry for a Troubleshooting Guide, as opposed to an FAQ?", "options": [{"text": "How do I change the display language on my device?", "isCorrect": false, "rationale": "This is a common 'how-to' question about a product feature, not a problem where something is not working as expected. It belongs in an FAQ."}, {"text": "My device suddenly stopped recognizing external USB drives.", "isCorrect": true, "rationale": "This describes a situation where something is 'not working as expected,' which is the definition of a problem meant for a troubleshooting guide."}, {"text": "Where can I find instructions for pairing a Bluetooth accessory?", "isCorrect": false, "rationale": "This is a question about a normal operation or feature, not a problem. It belongs in an FAQ or a 'Getting Started' section."}, {"text": "What are the minimum system requirements for installing the software?", "isCorrect": false, "rationale": "This is an informational question, not a problem with the software's current function. It belongs in an FAQ or installation guide."}], "id": "q05"}, {"question": "A user reports, 'My computer keeps freezing randomly.' Applying the Symptom–Cause–Solution format, which sequence best represents a logical troubleshooting entry for this issue?", "options": [{"text": "Symptom: Computer freezing randomly. Cause: Overheating. Solution: Check fan vents for blockage and ensure proper airflow.", "isCorrect": true, "rationale": "This option correctly starts with the user's reported symptom in their language, proposes a plausible cause (overheating), and offers a concrete solution, following the prescribed format."}, {"text": "Cause: Low disk space. Symptom: Applications crashing. Solution: Delete old files and clear cache.", "isCorrect": false, "rationale": "This option reverses the Symptom and Cause, presents a different symptom ('Applications crashing' instead of 'freezing'), and doesn't start with the user's immediate observation."}, {"text": "Solution: Restart the computer. Cause: Corrupted software. Symptom: Screen is blank.", "isCorrect": false, "rationale": "This option reverses the order, starting with the solution. It also presents a different symptom ('Screen is blank') from the user's original report ('freezing randomly')."}, {"text": "Symptom: 'Kernel Panic' error. Cause: Hardware failure. Solution: Contact IT support immediately.", "isCorrect": false, "rationale": "While a 'Kernel Panic' is a symptom, it's expressed in technical jargon, not 'the user's language' for 'freezing randomly.' The problem statement is 'freezing randomly', not a specific error code."}], "id": "q06"}, {"question": "The text emphasizes writing symptoms in 'the user's language.' Which of the following symptom descriptions best exemplifies this principle?", "options": [{"text": "ERROR_CONNECTION_REFUSED (0x80072EFD)", "isCorrect": false, "rationale": "This is highly technical and specific, using an error code that most users would not understand or recognize as their immediate problem."}, {"text": "The server failed to establish a secure connection.", "isCorrect": false, "rationale": "While clearer than an error code, 'server' and 'secure connection' are still somewhat technical and not as user-centric as describing the actual user experience."}, {"text": "I can't access any websites.", "isCorrect": true, "rationale": "This directly describes the user's experience and what they observe, using common language. It aligns with the example 'The page won't load,' not 'HTTP 503 service unavailable error.'"}, {"text": "HTTP 503 service unavailable error.", "isCorrect": false, "rationale": "This is a technical error code that the text specifically uses as an example of what *not* to write for a symptom, preferring 'The page won't load.'"}], "id": "q07"}, {"question": "According to the 'Writing Tip,' what is the most effective method for testing a troubleshooting guide?", "options": [{"text": "Having a group of technical experts review the guide for accuracy and completeness.", "isCorrect": false, "rationale": "Expert review is valuable for technical accuracy, but it doesn't directly test the *user experience* of following the guide as effectively as hands-on testing."}, {"text": "Conducting a survey among potential users to gauge clarity and helpfulness after they read it.", "isCorrect": false, "rationale": "User surveys can provide feedback on perceived clarity, but they don't test if the instructions actually *work* when followed to resolve a real problem."}, {"text": "Purposely creating the problems described in the guide and then following the instructions to resolve them.", "isCorrect": true, "rationale": "The 'Writing Tip' explicitly states: 'The best way to test a troubleshooting guide is to cause the problems on purpose and then follow your own instructions to fix them.'"}, {"text": "Comparing the guide against industry best practices and similar existing documentation.", "isCorrect": false, "rationale": "Benchmarking is useful during the design phase, but it does not confirm the functional efficacy of the specific guide for its intended problems and audience."}], "id": "q08"}, {"question": "A newly published troubleshooting section for an email client includes an entry titled 'Email quota exceeded.' The solution explains how to delete old emails. Based on the principles discussed, what is the primary flaw with this entry's symptom phrasing?", "options": [{"text": "It uses overly technical jargon that most users won't understand as their immediate problem.", "isCorrect": true, "rationale": "The term 'Email quota exceeded' is technical jargon. The text emphasizes writing symptoms 'in the user's language' (e.g., 'The page won't load' instead of 'HTTP 503 service unavailable error'). A user would likely say 'I can't send or receive emails' or 'My inbox is full.'"}, {"text": "It fails to provide sufficient detail about the cause of the problem for the user.", "isCorrect": false, "rationale": "The cause ('quota exceeded') is implied by the title, which is presented as the symptom. The primary flaw is in the *language* of that symptom, not a lack of cause detail."}, {"text": "It doesn't offer enough steps for the user to effectively resolve the issue on their own.", "isCorrect": false, "rationale": "The question describes the solution as 'explains how to delete old emails,' which seems like a sufficient action. The flaw is in the symptom phrasing, not the solution's completeness."}, {"text": "It mixes an FAQ-style question with a troubleshooting problem, causing confusion.", "isCorrect": false, "rationale": "While phrased poorly, 'Email quota exceeded' describes a problem state, not a 'how-to' question. Thus, it's a troubleshooting entry, not an FAQ, but its language is problematic."}], "id": "q09"}, {"question": "In the 'Wi-Fi Troubleshooting Guide' example, the 'Before You Start' section includes a note about ensuring Wi-Fi is on and being within range. What is the main benefit of including such a 'Before You Start' section?", "options": [{"text": "It preemptively addresses common, simple non-technical issues before complex troubleshooting begins.", "isCorrect": true, "rationale": "This section effectively filters out the most basic, often overlooked problems (like Wi-Fi being off or out of range) that don't require complex troubleshooting, saving user time and frustration."}, {"text": "It discourages users from trying to troubleshoot issues outside the defined service area.", "isCorrect": false, "rationale": "While it implicitly clarifies service boundaries, its main purpose is practical guidance to help users solve problems, not to discourage them."}, {"text": "It provides a detailed technical overview of the Wi-Fi network's architecture and limitations.", "isCorrect": false, "rationale": "The 'Before You Start' note is concise and non-technical ('Wi-Fi does not reach the parking lot or athletic fields'), not a detailed technical overview."}, {"text": "It acts as a formal legal disclaimer regarding network service availability and reliability.", "isCorrect": false, "rationale": "The tone and content are instructional and helpful, not formal legal language or a disclaimer."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
