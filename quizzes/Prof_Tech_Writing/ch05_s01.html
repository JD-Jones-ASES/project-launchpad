        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary difference between a technical description and a creative writing description, according to the text?", "options": [{"text": "Technical descriptions use evocative language; creative writing uses precise details.", "isCorrect": false, "rationale": "This statement reverses the roles; technical descriptions prioritize precision, while creative writing often uses evocative language."}, {"text": "Technical descriptions aim for clarity and precision to enable understanding or construction, while creative writing uses evocative language to create imagery.", "isCorrect": true, "rationale": "The text explicitly states that technical descriptions 'paint a picture so clear and precise that the reader can visualize — or even build' the object, contrasting it with creative writing's 'evocative and beautiful' descriptions that are 'completely useless if you need someone to build you a sunset-colored sign.'"}, {"text": "Technical descriptions prioritize emotional impact; creative writing focuses on practical function.", "isCorrect": false, "rationale": "Technical descriptions avoid emotional language and focus on objective facts and practical function, while creative writing often aims for emotional impact."}, {"text": "Technical descriptions are always shorter than creative writing descriptions.", "isCorrect": false, "rationale": "Length is not the defining characteristic; precision and purpose are. A technical description can be quite long if extensive detail is required."}]}, {"question": "A technical writer is describing a new surgical instrument. Which of the following statements demonstrates adherence to the 'Objective' pillar of technical description?", "options": [{"text": "The instrument's sleek design provides an ergonomic and comfortable grip.", "isCorrect": false, "rationale": "Words like 'sleek,' 'ergonomic,' and 'comfortable' are subjective and represent the writer's opinion or feeling, violating the 'Objective' pillar."}, {"text": "The instrument is made from medical-grade stainless steel (AISI 316L) and weighs 0.35 kg.", "isCorrect": true, "rationale": "This statement provides factual, measurable details (material specification, precise weight) without any opinions or emotional language, directly aligning with the 'Objective' pillar."}, {"text": "This amazing new tool will revolutionize surgical procedures.", "isCorrect": false, "rationale": "Phrases like 'amazing new tool' and 'will revolutionize' are promotional, subjective, and speculative, not objective descriptions of 'what is'."}, {"text": "Its cutting edge feels incredibly sharp.", "isCorrect": false, "rationale": "'Incredibly sharp' is a subjective assessment based on feeling, not an objective, measurable characteristic that could be used for manufacturing or evaluation."}]}, {"question": "In a technical specification for an aircraft component, the statement 'The component *shall* withstand temperatures up to 200°C' indicates what about the temperature requirement?", "options": [{"text": "The component might withstand this temperature, but it's not strictly necessary.", "isCorrect": false, "rationale": "This description aligns with the meaning of 'may,' which denotes an optional condition, not 'shall'."}, {"text": "It is recommended that the component withstand this temperature, but not mandatory.", "isCorrect": false, "rationale": "This description aligns with the meaning of 'should,' which indicates a recommended but not mandatory condition."}, {"text": "The component is optionally designed to withstand this temperature.", "isCorrect": false, "rationale": "This description aligns with the meaning of 'may,' indicating an optional design choice."}, {"text": "The component is mandatorily required to withstand this temperature.", "isCorrect": true, "rationale": "According to the 'vocabbox,' 'shall' is a formal term used in specifications that means 'mandatory,' indicating a strict requirement that must be met."}]}, {"question": "Consider the 'before' description of the water bottle: 'The water bottle is a nice size, not too big and not too small. It is made of some kind of hard plastic...' What is the main weakness of this description in a technical context?", "options": [{"text": "It provides too much detail, overwhelming the reader.", "isCorrect": false, "rationale": "The description provides too little detail, not too much. It lacks the specifics needed for technical understanding."}, {"text": "It uses subjective and vague terms that lack precision for identification or manufacturing.", "isCorrect": true, "rationale": "The text highlights that terms like 'nice size' and 'some kind of hard plastic' are vague and 'do not help a manufacturer, a buyer, or a safety inspector,' failing to provide the precision required for technical purposes."}, {"text": "It focuses too heavily on the water bottle's emotional appeal.", "isCorrect": false, "rationale": "While it lacks objectivity, its primary flaw isn't emotional appeal but rather the absence of concrete, measurable details."}, {"text": "It incorrectly identifies the material as plastic.", "isCorrect": false, "rationale": "The problem isn't that it's identified as plastic, but that 'some kind of hard plastic' is not specific enough. The 'after' version confirms it is plastic (Tritan copolyester)."}]}, {"question": "A technical writer is preparing a description of a new robotic arm. Which sequence of information best adheres to the general-to-specific organizational pattern recommended in the text?", "options": [{"text": "Detailed instructions for programming the arm's movements, followed by its overall dimensions, then a list of individual servo motors.", "isCorrect": false, "rationale": "This sequence starts with very specific operational details, then broadens to overall dimensions, then becomes specific again, violating the general-to-specific flow."}, {"text": "An overview of the arm's purpose and general dimensions, then a description of its main joints and manipulators, concluding with how these parts integrate for function.", "isCorrect": true, "rationale": "This sequence follows the recommended structure: 'Introduction' (purpose, general dimensions), 'Overall characteristics' (main joints/manipulators as major parts), and 'How the parts work together' (integration for function)."}, {"text": "A list of all electronic components, followed by the type of power supply, then the arm's total weight.", "isCorrect": false, "rationale": "This starts with specific components, then a sub-component, and finally an overall characteristic, which is not a general-to-specific flow."}, {"text": "A historical background of robotic arms, then a comparison to competitor models, then a brief mention of its primary material.", "isCorrect": false, "rationale": "This includes information that may not be part of the technical description of the *object itself* and does not follow a general-to-specific pattern for the product's characteristics."}]}, {"question": "A technical writer describing a common office chair states: 'The chair features the standard lumbar support adjustment and a typical five-star base.' This phrasing is a common mistake because it:", "options": [{"text": "Fails to use formal technical terminology.", "isCorrect": false, "rationale": "While formality is good, the core problem isn't the lack of jargon but the lack of specific detail. 'Standard' and 'typical' are informal and vague."}, {"text": "Assumes the reader is familiar with the object, omitting necessary specific details.", "isCorrect": true, "rationale": "The text warns against 'Assuming the Reader Knows What You Mean,' specifically citing examples like 'the standard mechanism' or 'the usual configuration,' which omit details critical for a reader who may have never seen the object."}, {"text": "Overloads the reader with too much technical jargon.", "isCorrect": false, "rationale": "On the contrary, this phrasing lacks sufficient technical detail and specificity, rather than overloading the reader."}, {"text": "Violates the spatial organization principle by mixing components.", "isCorrect": false, "rationale": "The issue here is the vagueness of the description, not necessarily the order in which components are mentioned. The 'common mistake' specifically addresses assuming reader knowledge."}]}, {"question": "According to the technical description of the standard office stapler, what is the primary function of the anvil's two settings?", "options": [{"text": "To adjust the force required to drive a staple.", "isCorrect": false, "rationale": "The description of the anvil does not mention adjusting the force required; that is related to the user pressing the upper arm."}, {"text": "To change the size of the staples the stapler can accept.", "isCorrect": false, "rationale": "The stapler accepts 'standard 1/4-inch (6 mm) staples,' and the anvil's settings do not change this capability."}, {"text": "To determine whether the fastening is permanent or temporary.", "isCorrect": true, "rationale": "The text states: 'In the “staple” position, the anvil bends the staple legs inward for a permanent fastening. In the “pin” position, the anvil bends the legs outward, creating a temporary fastening that is easy to remove.' This directly describes its function in creating permanent or temporary fastenings."}, {"text": "To allow the stapler to be used on different thicknesses of paper.", "isCorrect": false, "rationale": "While a stapler's capacity relates to paper thickness, the anvil's described function is not to accommodate different paper thicknesses, but to alter the staple's bend for permanence."}]}, {"question": "Which element is uniquely crucial when describing a *mechanism* or *system*, as opposed to a simple static object?", "options": [{"text": "Listing all the individual parts and their dimensions.", "isCorrect": false, "rationale": "Listing parts and dimensions is crucial for both static objects and mechanisms; it's not unique to mechanisms."}, {"text": "Detailing the overall weight and color.", "isCorrect": false, "rationale": "Overall weight and color are 'Overall characteristics' that apply to static objects as well as mechanisms."}, {"text": "Explaining the interaction between components and the transfer of force or motion.", "isCorrect": true, "rationale": "The text explicitly states that for mechanisms, you 'need to explain how the parts interact — how motion, force, or energy transfers from one component to the next,' framing it as answering 'How do the parts work together?' This goes beyond merely listing parts and is unique to mechanisms."}, {"text": "Providing a bill of materials for manufacturing purposes.", "isCorrect": false, "rationale": "A bill of materials is relevant for building any product, whether it's a simple object or a complex mechanism, but it doesn't describe the *interaction* of parts."}]}, {"question": "A design blueprint for a medical device specifies a dimension as '15.0 mm ± 0.02 mm.' The '± 0.02 mm' refers to which key term from the vocabulary list?", "options": [{"text": "Nominal", "isCorrect": false, "rationale": "The '15.0 mm' is the nominal, or intended, value. The '± 0.02 mm' specifies the permissible variation around this nominal value."}, {"text": "Threshold", "isCorrect": false, "rationale": "A threshold is a minimum or maximum acceptable value, not a range of variation around a nominal dimension."}, {"text": "Tolerance", "isCorrect": true, "rationale": "The 'vocabbox' defines 'Tolerance' as 'The acceptable range of variation in a measurement or dimension (e.g., ± 0.5 mm),' which perfectly matches the '± 0.02 mm' given."}, {"text": "Parameter", "isCorrect": false, "rationale": "A parameter is a measurable characteristic or variable, which is a broader term. 'Tolerance' is the precise term for the acceptable range of variation."}]}, {"question": "You are tasked with writing a technical description of a new smartphone for a manufacturing plant. Which approach best combines the 'Three Pillars' and the recommended organizational structure?", "options": [{"text": "Start with an introduction about the phone's innovative features, then express your personal excitement about its camera, and finally list its dimensions using rough estimates.", "isCorrect": false, "rationale": "This approach includes subjective opinion ('personal excitement'), lacks precision ('rough estimates'), and the organization is not clearly general-to-specific, violating multiple principles."}, {"text": "Begin with an emotional appeal about user experience, followed by a general overview of its components, and then provide a subjective assessment of its performance.", "isCorrect": false, "rationale": "This approach is highly subjective ('emotional appeal,' 'subjective assessment') and would not be considered objective, precise, or well-suited for a manufacturing plant's needs."}, {"text": "Provide a general overview including purpose and primary dimensions, then objectively detail the materials and precise specifications of each major component (e.g., display, processor, camera module), and finally explain how these components interact.", "isCorrect": true, "rationale": "This approach aligns with all key requirements: it starts with a 'general overview' (general-to-specific), is 'objectively' detailed with 'precise specifications' (Objective, Precise), covers 'each major component' and 'how these components interact' (Organized, Components, How parts work together)."}, {"text": "Immediately dive into a detailed schematic diagram of the motherboard, followed by a list of all software applications, and then conclude with a personal opinion on its market potential.", "isCorrect": false, "rationale": "This approach starts too specific (not general-to-specific), includes irrelevant detail for a physical description (software applications), and ends with a subjective opinion, violating objectivity."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
