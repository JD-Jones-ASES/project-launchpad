<script>
var QUESTIONS = [{"question": "The opening scenario, where a hiring manager spends roughly 20 seconds per resume, primarily highlights which crucial aspect of resume writing?", "options": [{"text": "The need for a highly decorative and visually striking design to grab attention.", "isCorrect": false, "rationale": "While aesthetics play a minor role, the text emphasizes organization and scannability, not decoration for its own sake. The core message is about immediate value communication, not just visual appeal."}, {"text": "The necessity for a resume to be immediately organized, scannable, and clearly communicate value.", "isCorrect": true, "rationale": "The text explicitly states, 'This means your resume must communicate your value immediately. It must be organized, scannable, and relevant.' This directly addresses the challenge of the 20-second review."}, {"text": "The importance of including every single detail of an applicant's life to provide comprehensive information.", "isCorrect": false, "rationale": "The text advises against including every job held or making the resume an autobiography, as it must be concise and relevant to the position."}, {"text": "The advantage of using a functional resume exclusively, as it hides employment gaps.", "isCorrect": false, "rationale": "The text warns that some hiring managers view functional resumes with suspicion if they perceive the applicant is hiding something. It's not a universal solution for the 20-second rule and is suited for specific situations."}]}, {"question": "What is the primary distinction between a resume and a curriculum vitae (CV) as defined in the text?", "options": [{"text": "A resume is always a one-page document, while a CV can be multiple pages.", "isCorrect": false, "rationale": "The text clarifies that a resume is usually one page for students but can be up to two pages maximum for experienced professionals, making this statement inaccurate."}, {"text": "A resume focuses on academic accomplishments, whereas a CV highlights professional experience.", "isCorrect": false, "rationale": "This statement reverses the definitions. A CV is a comprehensive academic document, while a resume summarizes education, experience, and skills for a job."}, {"text": "A resume is a concise, targeted document for job applications, while a CV is a comprehensive academic document used mainly in academia and international markets.", "isCorrect": true, "rationale": "The 'Resume vs. Curriculum Vitae' definition box clearly states this distinction, with CVs listing all academic and professional accomplishments and being longer, mainly for academia and international job markets."}, {"text": "A resume includes personal information like age and marital status, while a CV does not.", "isCorrect": false, "rationale": "The text explicitly advises against including personal information like age or marital status on a resume due to discrimination concerns, and neither document typically includes these details."}]}, {"question": "According to the text, which applicant would most benefit from using a chronological resume format?", "options": [{"text": "A career changer whose previous job titles do not align with their desired new field.", "isCorrect": false, "rationale": "The text suggests a functional resume for people changing careers because their old job titles might not reflect their new direction."}, {"text": "A high school student applying for a job where any prior experience, even varied part-time roles, is relevant.", "isCorrect": true, "rationale": "The text states that chronological is 'Best for: ...High school students applying for jobs where any experience is relevant' and advises, 'For your first resume as a student, chronological is almost always the right call.'"}, {"text": "An experienced professional with significant employment gaps over the last five years.", "isCorrect": false, "rationale": "The text suggests a functional resume for people with gaps in employment, as it emphasizes skills over a continuous timeline."}, {"text": "Someone with impressive skills but a work history that is less directly illustrative of those skills.", "isCorrect": false, "rationale": "This scenario would lean towards a functional or combination resume, where skills are prioritized over a strict chronological listing of jobs."}]}, {"question": "A student with significant volunteer experience, several project roles (not traditional jobs), and a desire to change career fields after initial part-time jobs should carefully consider which resume format?", "options": [{"text": "Chronological, because it's the safest and most recognized format.", "isCorrect": false, "rationale": "While chronological is often the safest, this student's specific situation—varied experience not fitting a timeline and career change—makes functional a better fit according to the text, even with its caution."}, {"text": "Functional, acknowledging the caution about potential hiring manager suspicion.", "isCorrect": true, "rationale": "The text states functional resumes are 'Best for: ...People changing careers' and 'Students with lots of varied experience (volunteering, projects, part-time work) that does not fit neatly into a timeline.' It also explicitly includes the caution about suspicion."}, {"text": "Combination, as it blends skills and a timeline without caution.", "isCorrect": false, "rationale": "While combination is an option for students with both skills and some experience, functional is more specifically recommended for 'varied experience that does not fit neatly into a timeline' and career changes. The text also notes the caution specific to functional resumes, which applies here."}, {"text": "A CV, as it allows for comprehensive listing of all accomplishments.", "isCorrect": false, "rationale": "A CV is primarily used in academia, medicine, and international job markets, not typically for general job applications in the United States, as described in the text."}]}, {"question": "What is a key advantage of the combination resume format, particularly for experienced professionals?", "options": [{"text": "It exclusively highlights academic achievements, making it ideal for university positions.", "isCorrect": false, "rationale": "This describes a Curriculum Vitae (CV), not a combination resume, which merges skills with work history."}, {"text": "It allows applicants to entirely omit their work history, preventing scrutiny of employment gaps.", "isCorrect": false, "rationale": "A combination resume includes a chronological work history section; it does not omit it. This function is more aligned with a functional resume's purpose, but even then, it doesn't 'hide' gaps."}, {"text": "It leads with an applicant's strongest skills and qualifications, then supports them with a chronological work history.", "isCorrect": true, "rationale": "The text states, 'The combination resume merges both approaches: a skills summary at the top followed by a chronological work history. This gives you the best of both worlds—you lead with your strengths, then back them up with your timeline.'"}, {"text": "It is specifically designed to bypass automated applicant tracking systems (ATS).", "isCorrect": false, "rationale": "The text does not mention ATS optimization as a feature or advantage of any specific resume format."}]}, {"question": "When crafting an objective or summary statement for a resume, what principle does the text emphasize as crucial for making a strong impression?", "options": [{"text": "Keeping it generic so it can apply to multiple job applications without changes.", "isCorrect": false, "rationale": "The 'before/after' example explicitly warns against generic objectives like 'Seeking a challenging position in a dynamic company' and advocates for specificity."}, {"text": "Focusing on what the applicant seeks from the position rather than what they offer.", "isCorrect": false, "rationale": "While an objective states what is sought, a summary states what is offered. The text highlights that for students, 'either works. The key is to be specific—not generic' for both."}, {"text": "Being specific by naming the company, position, and relevant qualities, rather than using vague phrases.", "isCorrect": true, "rationale": "The 'before/after' example demonstrates this principle, contrasting a generic objective with a specific one that names the company, position, and specific qualities, stating it 'tells the reader: I know what this job is, and I am a good fit.'"}, {"text": "Ensuring it is at least three sentences long to convey sufficient detail.", "isCorrect": false, "rationale": "The text does not specify a length requirement for objectives or summaries, but rather focuses on their specificity and relevance."}]}, {"question": "Which of the following items should generally be excluded from a modern resume for a job in the United States, according to the text?", "options": [{"text": "Professional certifications, such as a food handler's permit.", "isCorrect": false, "rationale": "The 'Skills' section explicitly lists certifications (e.g., CPR, food handler's permit) as items to include."}, {"text": "Relevant coursework and academic honors.", "isCorrect": false, "rationale": "The 'Education' section explicitly lists 'Relevant coursework, honors, or academic awards' as important for high school students."}, {"text": "A photograph of the applicant and personal information like marital status.", "isCorrect": true, "rationale": "The 'What NOT to Include' section explicitly states, 'A photograph. In the United States, including a photo creates legal complications for the employer (discrimination concerns)' and 'Personal information: Age, marital status, religion, Social Security number—none of these belong on a resume.'"}, {"text": "Bullet points describing accomplishments in previous roles.", "isCorrect": false, "rationale": "The 'Experience' section specifically advises including '2–4 bullet points describing what you accomplished' as a crucial part of each entry."}]}, {"question": "Based on the text's advice, which entry would be most effective in a 'Skills' section for a high school student applying for a part-time retail job?", "options": [{"text": "“Team Player: Works well with others and takes direction easily.”", "isCorrect": false, "rationale": "The text advises listing specific, relevant skills, not vague qualities. 'Hard worker' is given as an example of a claim without evidence; 'Team Player' is similarly vague."}, {"text": "“Proficient in Microsoft Excel and Google Sheets; Conversational Spanish; CPR Certified.”", "isCorrect": true, "rationale": "The 'Skills' section advises including 'Software and technology skills,' 'Languages (and your proficiency level),' and 'Certifications.' This option provides specific, verifiable skills as recommended."}, {"text": "“Excellent Communication Skills: Can talk to customers and co-workers.”", "isCorrect": false, "rationale": "Similar to 'Team Player,' this is a vague quality. The text stresses specificity over broad claims. Good communication should be demonstrated through experience, not just stated as a skill."}, {"text": "“Enjoys reading and keeping up with current trends.”", "isCorrect": false, "rationale": "The text advises against including hobbies 'unless directly relevant to the job' and provides an example where 'I like video games' is not helpful, but 'I moderate a book review channel...' is. This option is too vague and generally not a relevant skill."}]}, {"question": "Why does the text suggest that the 'Activities, Leadership, and Volunteer Work' section can be just as important as work experience for high school students?", "options": [{"text": "Because employers prefer volunteer work over paid experience for student applicants.", "isCorrect": false, "rationale": "The text does not state a preference for volunteer over paid work. It acknowledges the common reality of limited paid experience for students."}, {"text": "Because high school students often have limited paid experience, and this section demonstrates responsibility and engagement.", "isCorrect": true, "rationale": "The text explicitly states: 'Employers know that most high school students have limited paid experience. They want to see what you do with your time and what responsibilities you have taken on.'"}, {"text": "Because it allows students to include hobbies that might not be directly job-relevant.", "isCorrect": false, "rationale": "The text advises against including hobbies unless they are directly relevant and impactful, making this a reason *not* to over-rely on this section for non-job-related interests."}, {"text": "Because it is a required section for all resume formats, regardless of content.", "isCorrect": false, "rationale": "The text lists 'Activities and Leadership (optional)' for chronological resumes, indicating it is not universally required, though highly recommended for students."}]}, {"question": "Looking at the example of Maria Santos's resume for a sales associate position at Riverside Books, which technique effectively demonstrates her qualifications?", "options": [{"text": "Her objective statement, which broadly states a desire for any challenging position.", "isCorrect": false, "rationale": "Maria's objective is highly specific ('Seeking a part-time sales associate position at Riverside Books...'), directly contradicting a broad or generic statement, which the text advises against."}, {"text": "The detailed list of personal hobbies like 'enjoys reading and video games' to show personality.", "isCorrect": false, "rationale": "Maria's resume does not include personal hobbies. The text explicitly advises against including hobbies unless directly relevant and substantial, like moderating a book review channel."}, {"text": "Quantifying accomplishments in her volunteer and babysitting roles using numbers and action verbs.", "isCorrect": true, "rationale": "The 'model document discussion' highlights Maria's use of action verbs and numbers ('Shelved and organized 200+ books,' 'Assisted 10–15 patrons,' 'increased section foot traffic by 30%,' '100% reliability record over 18 months') to present even non-traditional experience professionally and effectively."}, {"text": "Omitting her GPA and expected graduation date to avoid age discrimination.", "isCorrect": false, "rationale": "Maria's resume includes both her GPA (3.6/4.0) and expected graduation date (June 2027), which the text advises for high school students with a strong GPA."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
