<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear and Effective: Professional &amp; Technical Writing &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary distinction between a mere conversation and a productive meeting?", "options": [{"text": "A productive meeting always includes a social component to build team rapport.", "isCorrect": false, "rationale": "The text does not mention a social component as the primary distinction for productivity; rather, it focuses on output."}, {"text": "A productive meeting generates specific action items that move things forward.", "isCorrect": true, "rationale": "The text explicitly states: 'A meeting without action items is a conversation. It might be pleasant, but it does not move anything forward.' Thus, action items are key to productivity."}, {"text": "A productive meeting focuses solely on brainstorming new ideas without immediate commitments.", "isCorrect": false, "rationale": "While brainstorming can occur, the purpose of most meetings is to 'decide what needs to happen and who will make it happen,' which implies moving beyond just ideas to specific tasks."}, {"text": "A productive meeting has more attendees and a formal setting than a casual conversation.", "isCorrect": false, "rationale": "The number of attendees or formality of the setting is not identified as the primary factor distinguishing a conversation from a productive meeting in terms of output."}]}, {"question": "A team discusses improving internal communication. Which of the following best exemplifies a correctly formatted action item according to the 'What/Who/When' framework?", "options": [{"text": "We need to improve our internal communication flow by next month.", "isCorrect": false, "rationale": "This statement lacks a specific 'Who' and the 'What' is vague ('improve communication flow'). The 'When' ('next month') is also not a specific date."}, {"text": "Sarah will draft a new communication protocol and distribute it to all department heads by Friday, November 15th.", "isCorrect": true, "rationale": "This action item clearly defines the 'What' (draft new protocol and distribute), the 'Who' (Sarah), and the 'When' (Friday, November 15th), adhering to all three components of the framework."}, {"text": "The entire team should work on updating communication channels soon.", "isCorrect": false, "rationale": "This assigns responsibility to a 'team' rather than a single 'Who,' uses a vague 'When' ('soon'), and the 'What' ('updating communication channels') could be more specific."}, {"text": "Someone should look into better communication tools by the next meeting.", "isCorrect": false, "rationale": "This statement uses a vague 'Who' ('Someone'), a weak verb ('look into'), and a somewhat vague 'When' ('by the next meeting' could be a specific date, but the overall item is weak)."}]}, {"question": "Consider the statement: 'The marketing team will develop a social media strategy.' Which critical component of a robust action item, as defined in the 'What/Who/When' framework, is most notably missing or poorly defined here?", "options": [{"text": "The 'What' (specific task).", "isCorrect": false, "rationale": "While 'develop a social media strategy' could be broken down further, it provides a general 'What.' The primary issue lies elsewhere."}, {"text": "The 'Who' (single person responsible).", "isCorrect": true, "rationale": "The text explicitly highlights 'Assigning Tasks to Groups' like 'The marketing team' as a common mistake leading to 'diffusion of responsibility,' making the 'Who' the most notably poorly defined component here."}, {"text": "The 'When' (deadline).", "isCorrect": false, "rationale": "The 'When' is indeed missing, which is a significant flaw. However, the text specifically calls out group assignments as a 'common mistake' leading to failure, making the 'Who' aspect particularly problematic according to the section's emphasis."}, {"text": "The 'Why' (reason for the task).", "isCorrect": false, "rationale": "The 'Why' is not one of the three required components of an action item in the 'What/Who/When' framework."}]}, {"question": "Which of the following action items violates the guideline of using strong, specific verbs?", "options": [{"text": "Priya will email three local businesses requesting sponsorship by October 30.", "isCorrect": false, "rationale": "'Email' is a strong, specific verb that clearly defines the action."}, {"text": "Marcus will look into the recycling situation and report back next week.", "isCorrect": true, "rationale": "'Look into' is explicitly listed in the text as a weak verb that hides the actual task, violating the guideline for using strong, specific verbs."}, {"text": "Tyler will update the events page with the November meeting date by October 25.", "isCorrect": false, "rationale": "'Update' is a strong, specific verb that clearly defines the action."}, {"text": "Sofia will call the Elm Street Community Center to confirm lot availability by October 31.", "isCorrect": false, "rationale": "'Call' is a strong, specific verb that clearly defines the action."}]}, {"question": "Identify the action item that fails to follow the guideline 'One task per item.'", "options": [{"text": "Sarah will research three presentation software options and provide a recommendation by Friday.", "isCorrect": false, "rationale": "While it involves two parts (research and recommend), these are often considered a single cohesive task leading to one deliverable (the recommendation). The text's examples of 'three tasks disguised as one' are more distinct, like 'research costs AND contact the vendor AND prepare a presentation'."}, {"text": "David will contact the vendor, prepare a budget proposal, and present it to the finance committee by end of month.", "isCorrect": true, "rationale": "This item clearly combines three distinct tasks ('contact the vendor,' 'prepare a budget proposal,' and 'present it') that should be broken into separate action items for clearer tracking, as per the guideline 'One task per item'."}, {"text": "Elena will draft the quarterly report by end of day Tuesday.", "isCorrect": false, "rationale": "This is a single, clear task: 'draft the quarterly report'."}, {"text": "Kevin will schedule the next team meeting for November 10th.", "isCorrect": false, "rationale": "This is a single, clear task: 'schedule the next team meeting'."}]}, {"question": "Why does reviewing action items as the 'first agenda topic of the next meeting' effectively create accountability?", "options": [{"text": "It ensures that only the most critical tasks are carried over to the next meeting's agenda.", "isCorrect": false, "rationale": "While important tasks are certainly reviewed, the primary reason for accountability in this method is not task prioritization but public reporting."}, {"text": "It allows for immediate rescheduling of tasks that were not completed on time.", "isCorrect": false, "rationale": "Rescheduling is a possible outcome, but it's not the direct mechanism by which accountability is *created* by the review process itself."}, {"text": "It puts the task owner on the spot, as everyone knows their name will be called to report progress.", "isCorrect": true, "rationale": "The text states: 'This simple review creates accountability because everyone knows their name will be called.' This public reporting mechanism fosters a sense of responsibility."}, {"text": "It gives the facilitator an opportunity to reassign tasks if the original owner is unavailable.", "isCorrect": false, "rationale": "Reassigning tasks might happen, but the core of accountability creation is the expectation of reporting on one's own assigned tasks."}]}, {"question": "A project manager is overseeing a complex, long-term project with multiple team members and interdependent tasks. Which action item tracking method would be most suitable for this scenario, based on the text's recommendations?", "options": [{"text": "Relying solely on the action item table at the end of the meeting minutes.", "isCorrect": false, "rationale": "The text describes this as the 'simplest approach,' but for 'ongoing projects,' it suggests more dynamic tools."}, {"text": "Sending a single follow-up email after each meeting listing all action items.", "isCorrect": false, "rationale": "While useful for initial distribution, a single email is less effective for continuously tracking the status and progress of multiple interdependent tasks over a long period."}, {"text": "Using a shared spreadsheet or a dedicated task board like Trello or Asana.", "isCorrect": true, "rationale": "The text explicitly recommends: 'For ongoing projects, keep a running list of all action items with columns for status (Not Started, In Progress, Complete). Tools like shared spreadsheets, Trello, or Asana serve this purpose,' making it ideal for complex, long-term projects."}, {"text": "Trusting individual team members to remember their tasks without any formal centralized tracking.", "isCorrect": false, "rationale": "This approach undermines accountability and the purpose of formal action items, which the text emphasizes."}]}, {"question": "The text describes 'diffusion of responsibility' as a common reason why group assignments for action items often fail. What does this concept primarily imply?", "options": [{"text": "That tasks requiring multiple people are inherently too complex to assign effectively.", "isCorrect": false, "rationale": "The text notes that even for collaborative tasks, 'one person is still the owner who makes sure it gets done,' implying complexity isn't the sole issue, but rather the lack of a single owner."}, {"text": "That individuals assume someone else in the group will complete the task, leading to inaction.", "isCorrect": true, "rationale": "The text explicitly states regarding group assignments that 'everyone assumes someone else will do it. This is called diffusion of responsibility — the more people who share a task, the less likely any one person is to act.'"}, {"text": "That the task must be broken down into individual sub-tasks before assignment to a group.", "isCorrect": false, "rationale": "While breaking down tasks is good practice, 'diffusion of responsibility' itself refers to the psychological phenomenon where individuals in a group feel less personal accountability."}, {"text": "That highly responsible individuals will take on extra work to compensate for less responsible team members.", "isCorrect": false, "rationale": "While this might happen, diffusion of responsibility primarily explains why tasks assigned to a group tend to fail due to a lack of *anyone* taking initiative, not how responsible members react."}]}, {"question": "Which of the following proposed action items demonstrates the best adherence to all the writing guidelines discussed in the section (What/Who/When, strong verbs, specific output, one task, owner first)?", "options": [{"text": "Marketing team will figure out a new social media campaign soon.", "isCorrect": false, "rationale": "This violates several guidelines: it has a group owner ('Marketing team'), a weak verb ('figure out'), a vague output ('new social media campaign'), and a vague deadline ('soon')."}, {"text": "Jessica will create a draft of the new employee onboarding checklist and send it to David for review by November 5th.", "isCorrect": true, "rationale": "This action item is well-formed: 'Jessica' (Who) is first, 'create a draft... and send it' (strong verbs and clear 'What' with specific output), and 'by November 5th' (When). It represents a single cohesive task."}, {"text": "Mark will look into the budget for the spring event and prepare a report for the next meeting.", "isCorrect": false, "rationale": "This uses a weak verb ('look into') and combines two distinct tasks ('look into budget' and 'prepare a report') into one."}, {"text": "The committee will discuss potential vendors for the annual gala at our next meeting.", "isCorrect": false, "rationale": "This assigns the task to a group ('The committee'), uses a somewhat weak verb for an action item ('discuss'), and lacks a specific, tangible output or deliverable beyond the discussion itself."}]}, {"question": "The 'Writing Connection' section draws parallels between taking meeting notes and class notes. Which skill is highlighted as essential for both effective meeting minutes and class notes?", "options": [{"text": "Ensuring notes are always typed, not handwritten, for maximum readability and searchability.", "isCorrect": false, "rationale": "The text does not specify the format (typed vs. handwritten) for notes, focusing instead on the cognitive skills involved."}, {"text": "The ability to listen actively, filter for importance, and organize information clearly.", "isCorrect": true, "rationale": "The text explicitly states: 'Both skills require the same ability to listen actively, filter for importance, and organize information clearly.'"}, {"text": "Recording every word spoken to ensure complete accuracy and recall of details.", "isCorrect": false, "rationale": "The text advises the opposite: 'Listen for the key points, not try to write down every word.'"}, {"text": "Focusing primarily on the chronological order of events rather than thematic organization.", "isCorrect": false, "rationale": "The text suggests organizing information 'by topic, not chronologically,' which contradicts this option."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
