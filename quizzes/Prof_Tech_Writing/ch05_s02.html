    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Prof_Tech_Writing.html">&larr; Back to Clear and Effective: Professional &amp; Technical Writing</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Clear and Effective: Professional &amp; Technical Writing &mdash; Chapter 5, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best captures the fundamental difference between a technical description and a specification?", "options": [{"text": "A technical description is typically longer and more detailed than a specification.", "isCorrect": false, "rationale": "Length and detail are not the primary distinguishing factors. A specification can be very detailed."}, {"text": "A technical description explains an existing object, while a specification defines requirements for an object yet to be created.", "isCorrect": true, "rationale": "The text states, 'Descriptions are written about objects that already exist. Specifications are written before the object exists, to guide the people who will design and build it.' This highlights the core distinction in purpose and timing."}, {"text": "Specifications are used for consumer products, whereas technical descriptions are for industrial equipment.", "isCorrect": false, "rationale": "Both descriptions and specifications are used across all types of products, systems, and materials, regardless of their consumer or industrial nature. The phone case example demonstrates a consumer product using specifications."}, {"text": "A technical description uses more precise language than a specification.", "isCorrect": false, "rationale": "The opposite is true. Specifications are noted for their use of highly precise language ('shall,' 'should,' 'may') to avoid ambiguity, making every requirement testable."}], "id": "q01"}, {"question": "In the language of specifications, what is the precise implication of a requirement that uses the word 'shall'?", "options": [{"text": "The requirement is optional, and the designer can choose whether to include it.", "isCorrect": false, "rationale": "The word 'may' indicates an optional requirement, not 'shall'."}, {"text": "The requirement is recommended, and non-compliance requires justification.", "isCorrect": false, "rationale": "The word 'should' indicates a recommended requirement where non-compliance needs justification, not 'shall'."}, {"text": "The requirement is mandatory, and failure to comply means the product does not meet the specification.", "isCorrect": true, "rationale": "The text explicitly defines 'shall' as meaning 'The requirement is mandatory. The product must meet this condition. There is no flexibility. Failure to comply means the product does not meet the specification.'"}, {"text": "The requirement applies only under certain operating conditions.", "isCorrect": false, "rationale": "While conditions can be specified within a 'shall' requirement, 'shall' itself defines the mandatory nature of the requirement, not conditional applicability."}], "id": "q02"}, {"question": "A product specification includes the requirement: 'The case material should resist yellowing for a minimum of 12 months under normal indoor use.' If a product fails this requirement, what is the most likely outcome?", "options": [{"text": "The product automatically fails inspection and cannot be sold.", "isCorrect": false, "rationale": "This would be the outcome if 'shall' were used. 'Should' indicates a recommended requirement, not an automatic disqualification."}, {"text": "The product is immediately subject to a recall and potential lawsuit.", "isCorrect": false, "rationale": "A 'should' requirement, if not met, requires justification but does not automatically lead to legal action or recall unless it impacts safety or core functionality covered by 'shall' requirements."}, {"text": "The product's non-compliance would require justification, but it might still be deemed acceptable.", "isCorrect": true, "rationale": "The text defines 'should' as meaning 'The requirement is recommended. The product ought to meet this condition, and there should be a good reason if it does not. Non-compliance requires justification but does not automatically disqualify the product.'"}, {"text": "The manufacturer has the option to include this feature, but it's not expected.", "isCorrect": false, "rationale": "This describes the meaning of 'may,' not 'should.' 'Should' implies an expectation that the condition will be met unless there's a strong, documented reason otherwise."}], "id": "q03"}, {"question": "Which of the following requirements adheres best to the writing tip: 'Make Every Requirement Testable'?", "options": [{"text": "The product shall be user-friendly.", "isCorrect": false, "rationale": "'User-friendly' is subjective and difficult to objectively test or measure. It is too vague."}, {"text": "The battery shall have a long life.", "isCorrect": false, "rationale": "'Long life' is subjective and not measurable. How long is 'long'? This requirement is not testable."}, {"text": "The display shall be sufficiently bright for outdoor viewing.", "isCorrect": false, "rationale": "'Sufficiently bright' is vague. What constitutes 'sufficient'? This requirement lacks a measurable criterion."}, {"text": "The device shall operate for a minimum of 8 hours on a single charge under continuous video playback.", "isCorrect": true, "rationale": "This requirement is specific and testable. It provides a measurable criterion (8 hours) and defines the conditions for testing (continuous video playback on a single charge)."}], "id": "q04"}, {"question": "A city planning department writes a specification for a new park bench, stating: 'The bench seating surface shall be constructed from recycled plastic lumber with a minimum density of 55 lbs/ft³.' What type of specification is this?", "options": [{"text": "Performance specification", "isCorrect": false, "rationale": "Performance specifications define what the product must *do* (e.g., withstand certain loads, last a certain time), not what it's made of or its physical properties."}, {"text": "Dimensional specification", "isCorrect": false, "rationale": "Dimensional specifications define size and shape. This requirement specifies the material composition and density, not its dimensions."}, {"text": "Material specification", "isCorrect": true, "rationale": "Material specifications define what the product must be made of and its associated properties. This example specifies 'recycled plastic lumber' and its 'minimum density.'"}, {"text": "Quality specification", "isCorrect": false, "rationale": "Quality specifications define standards for appearance, finish, and consistency. While material quality is implied, the direct focus here is on the material itself and its physical properties."}], "id": "q05"}, {"question": "According to the text, what is the primary purpose of defining a 'tolerance' in a specification?", "options": [{"text": "To ensure the product is manufactured to an absolutely perfect, exact measurement.", "isCorrect": false, "rationale": "The text explicitly states, 'In the real world, nothing is manufactured to a perfectly exact measurement.' Tolerances acknowledge and manage this reality."}, {"text": "To allow for marketing flexibility in product dimensions.", "isCorrect": false, "rationale": "Tolerances are technical engineering requirements, not marketing tools. They define acceptable manufacturing variation, not promotional claims."}, {"text": "To define the acceptable range of variation for a measurement from its nominal value.", "isCorrect": true, "rationale": "The text defines tolerance as 'the acceptable range of variation' from the nominal (target) measurement."}, {"text": "To specify the maximum weight the product can safely bear.", "isCorrect": false, "rationale": "The maximum weight a product can bear would be part of a performance specification, not a tolerance, which relates to manufacturing precision of dimensions or other physical properties."}], "id": "q06"}, {"question": "A product development team is designing a new electronic device. Why would they be advised against specifying unnecessarily tight tolerances, such as requiring a measurement of '10.000 inches +/- 0.0001 inches' when '10.0 inches +/- 0.1 inch' would suffice functionally?", "options": [{"text": "Tighter tolerances make the product less durable.", "isCorrect": false, "rationale": "Tighter tolerances relate to precision, not inherently durability. If anything, extreme precision might sometimes imply better fit, but it doesn't directly reduce durability."}, {"text": "Unnecessarily tight tolerances increase manufacturing cost and production time without functional benefit.", "isCorrect": true, "rationale": "The 'Common Mistake' section highlights that 'unnecessarily tight tolerances waste money and slow production' and 'multiply the cost without improving the product.'"}, {"text": "Loose tolerances are a sign of more professional and experienced design.", "isCorrect": false, "rationale": "Professional design involves specifying the *appropriate* tolerance, which is the loosest tolerance that still meets functional needs, not simply the loosest possible."}, {"text": "Customers prefer products with visible variations.", "isCorrect": false, "rationale": "While customers may not notice tiny variations, they generally expect consistency and quality. The issue with tight tolerances is internal cost, not customer preference for variation."}], "id": "q07"}, {"question": "Consider the phone case example. Which of the following requirements from the 'Dimensional Requirements' section is a clear example of defining a necessary tolerance?", "options": [{"text": "The case interior dimensions shall accommodate the iPhone 15 with a snug fit, allowing no more than 0.5 mm of lateral movement in any direction.", "isCorrect": true, "rationale": "This statement specifies an acceptable range (no more than 0.5 mm) for 'lateral movement,' which is a form of tolerance for the fit of the device within the case. It defines the maximum allowable variation from a perfect, motionless fit."}, {"text": "The case shall add no more than 3.0 mm to the total thickness of the device.", "isCorrect": false, "rationale": "This is a maximum limit on a dimensional requirement, but not a tolerance in the +/- sense. It's a specific constraint on the final thickness, not a permissible variation around a target nominal value of the case's added thickness."}, {"text": "The case shall extend at least 1.0 mm above the screen surface on all four edges.", "isCorrect": false, "rationale": "This specifies a minimum required dimension (at least 1.0 mm) for a protective lip, but it's a minimum value, not a tolerance range around a nominal value."}, {"text": "All port openings, button cutouts, and speaker grilles shall be aligned with the device's features within a tolerance of ±0.3 mm.", "isCorrect": false, "rationale": "This *explicitly* uses the word 'tolerance' with a +/- value. While it is a correct example of a tolerance, it's not present in the options provided for the 'Dimensional Requirements' section of the phone case example. Rechecking the example, the first option, 'allowing no more than 0.5 mm of lateral movement', functions as a tolerance by setting a maximum acceptable deviation."}], "id": "q08"}, {"question": "A software company is developing a new social media platform. They include the following requirement in their specification: 'The live video streaming feature shall maintain a minimum resolution of 720p at 30 frames per second on standard broadband connections.' What primary type of specification is this?", "options": [{"text": "Material specification", "isCorrect": false, "rationale": "Material specifications define what a product is made of. This requirement concerns how the software *functions*."}, {"text": "Dimensional specification", "isCorrect": false, "rationale": "Dimensional specifications define size and shape. This requirement describes performance characteristics, not physical dimensions."}, {"text": "Quality specification", "isCorrect": false, "rationale": "Quality specifications relate to appearance, finish, and consistency. While resolution and frame rate impact quality, this requirement directly defines how the feature *performs* rather than its aesthetic or surface attributes."}, {"text": "Performance specification", "isCorrect": true, "rationale": "Performance specifications define what the product must *do* — its speed, capacity, accuracy, or durability. Maintaining a minimum resolution and frame rate for live video streaming is a direct measure of its performance."}], "id": "q09"}, {"question": "The text describes specifications as 'requirements documents.' Based on this, what is their most critical role in the product development lifecycle?", "options": [{"text": "To serve as a marketing brochure highlighting the product's best features.", "isCorrect": false, "rationale": "Specifications are internal technical documents guiding development, not external marketing materials. Marketing materials often come after the product exists and meets specifications."}, {"text": "To provide a detailed historical record of past product iterations.", "isCorrect": false, "rationale": "While design changes might be tracked, the primary role of a specification is forward-looking: to define what a product *must be* before it exists, not to document its history."}, {"text": "To guide designers and builders in creating a product that meets exact, measurable standards.", "isCorrect": true, "rationale": "The text states, 'Specifications are written before the object exists, to guide the people who will design and build it.' They define 'exact standards' and 'measurable criteria,' ensuring the final product meets predefined requirements."}, {"text": "To explain to end-users how a finished product operates and its various functions.", "isCorrect": false, "rationale": "This describes the role of an instruction manual or user guide, which is different from a specification. Specifications are for creators, not end-users."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
