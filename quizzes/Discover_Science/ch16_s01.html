<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 16, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the best definition of a 'body system'?", "options": [{"text": "A group of similar cells that work together to do the same job.", "isCorrect": false, "rationale": "This describes a 'tissue,' not a 'body system.' Tissues are a lower level of organization."}, {"text": "A group of organs that work together to do a specific job in the body.", "isCorrect": true, "rationale": "The text explicitly defines a 'Body system' as 'a group of organs that work together to do a specific job in the body.'"}, {"text": "The smallest living unit in your body.", "isCorrect": false, "rationale": "This describes a 'cell,' which is the fundamental building block, but not a 'body system.'"}, {"text": "A body part made of different tissues that work together to do a specific job.", "isCorrect": false, "rationale": "This describes an 'organ,' which is a component of a body system, but not the system itself."}]}, {"question": "Which of the following correctly represents the hierarchy of organization in the human body, from the simplest building block to the most complex functional unit mentioned?", "options": [{"text": "Organ → Tissue → Cell → Body System", "isCorrect": false, "rationale": "This order is incorrect. Cells are the simplest, followed by tissues, then organs, and finally body systems."}, {"text": "Cell → Organ → Tissue → Body System", "isCorrect": false, "rationale": "This order is incorrect. Cells form tissues, and tissues form organs. 'Organ' and 'Tissue' are swapped in the sequence."}, {"text": "Cell → Tissue → Organ → Body System", "isCorrect": true, "rationale": "The text clearly illustrates this hierarchy: 'Cells → Tissues → Organs → Body Systems → Your Body!'"}, {"text": "Tissue → Organ → Body System → Cell", "isCorrect": false, "rationale": "This order is incorrect. Cells are the smallest unit and precede tissues in the hierarchy."}]}, {"question": "During a race, your heart pumps faster to deliver oxygen and energy to your muscles. Which body system is primarily responsible for this action?", "options": [{"text": "The nervous system", "isCorrect": false, "rationale": "The nervous system sends signals and coordinates responses, but the circulatory system is responsible for pumping blood."}, {"text": "The respiratory system", "isCorrect": false, "rationale": "The respiratory system brings in and expels air (oxygen/carbon dioxide), but doesn't pump it around the body."}, {"text": "The circulatory system", "isCorrect": true, "rationale": "The text states the 'circulatory system — your heart and blood vessels — carries blood, oxygen, and nutrients to every part of your body,' and in the running example, 'Your circulatory system (heart) pumps faster to deliver oxygen and energy to your muscles.'"}, {"text": "The muscular system", "isCorrect": false, "rationale": "The muscular system helps you move, but the heart's pumping action as described is a function of the circulatory system."}]}, {"question": "The text uses analogies like a city and a sports team to describe the body, and a school to illustrate its organization. What fundamental principle do these analogies collectively emphasize about the body's systems?", "options": [{"text": "Each body system operates independently, focusing solely on its specialized task.", "isCorrect": false, "rationale": "The text explicitly states, 'But no part works alone. Just like players on a sports team, every part of your body depends on the others,' which contradicts independent operation."}, {"text": "Body systems are primarily designed to adapt and take over functions if another system fails completely.", "isCorrect": false, "rationale": "While some adaptation might occur, the main emphasis is on *working together* simultaneously, rather than systems being backup for complete failure."}, {"text": "The body's overall function and health rely on the interdependent and coordinated effort of all its various systems.", "isCorrect": true, "rationale": "The analogies and examples, especially the 'Teamwork Inside You' section, consistently highlight that systems 'all work together to keep things running smoothly' and 'Your body systems are always working together.'"}, {"text": "The most complex systems, like the nervous system, are responsible for managing all other systems directly.", "isCorrect": false, "rationale": "While the nervous system plays a coordinating role, the core message is about the mutual interdependence of *all* systems, not just central control."}]}, {"question": "Your stomach is an organ made of muscle tissue that churns food and special tissue that makes digestive juices. What does this specific example primarily demonstrate about organs?", "options": [{"text": "Organs are the smallest living units in the body, visible only with a microscope.", "isCorrect": false, "rationale": "Cells are the smallest living units, not organs. Organs are much larger."}, {"text": "Organs are always composed of only one type of tissue to perform a highly specialized function.", "isCorrect": false, "rationale": "The example of the stomach (muscle tissue + special digestive tissue) and heart (muscle, nerve, blood vessel tissue) explicitly shows organs are made of *different* tissues."}, {"text": "Organs are formed when different types of tissues join together to perform a specific job.", "isCorrect": true, "rationale": "The text states, 'Different tissues join together to form organs,' and uses the stomach as a prime example of different tissues (muscle and digestive juice tissue) collaborating for one organ's job."}, {"text": "Organs are the direct building blocks of cells, providing structure for cellular formation.", "isCorrect": false, "rationale": "This statement reverses the correct hierarchy; cells are the building blocks of tissues, which then form organs."}]}, {"question": "Imagine you skip breakfast before a busy morning. Later, you feel weak and tired. Based on the running example and the function of body systems, which system is most directly impacted by the lack of food energy, leading to your fatigue?", "options": [{"text": "The skeletal system, because it needs food for bone strength.", "isCorrect": false, "rationale": "While bones need nutrients, the immediate impact of lack of *energy* from food primarily affects systems that utilize that energy, like muscles."}, {"text": "The respiratory system, because it needs food to breathe properly.", "isCorrect": false, "rationale": "The respiratory system manages gas exchange; while it needs energy to function, it's not the primary system for *breaking down* food for energy."}, {"text": "The digestive system, because it's responsible for breaking down food into usable energy.", "isCorrect": true, "rationale": "The text explains the digestive system 'breaks down the food you eat into energy your body can use.' If no food is consumed, this system cannot provide the energy needed by other systems, directly leading to fatigue."}, {"text": "The nervous system, because it controls hunger signals.", "isCorrect": false, "rationale": "The nervous system does send hunger signals, but the fatigue stems from the *lack of energy* that the digestive system would normally process, not primarily a nervous system malfunction itself."}]}, {"question": "If a 'class of students' is analogous to a 'tissue' in the body's organization, what would 'a whole grade level with different classes' be analogous to?", "options": [{"text": "A single cell", "isCorrect": false, "rationale": "A cell is the smallest unit, whereas a class of students is already a step above. A grade level is much more complex."}, {"text": "An organ", "isCorrect": true, "rationale": "The 'sciencelife' box explicitly states, 'A whole grade level with different classes is like an organ.'"}, {"text": "A body system", "isCorrect": false, "rationale": "A body system would be analogous to the 'whole school' (all grades, office, etc.), which is more complex than a single grade level."}, {"text": "Your entire body", "isCorrect": false, "rationale": "The entire body is the ultimate level of organization, encompassing all body systems, similar to a school representing all grades and functions."}]}, {"question": "Which of the following describes the primary role of the muscular system?", "options": [{"text": "Protecting internal organs and supporting the body.", "isCorrect": false, "rationale": "This is the primary role of the skeletal system, as mentioned in the text: 'The skeletal system — your bones — holds you up and protects your insides.'"}, {"text": "Breaking down food into energy.", "isCorrect": false, "rationale": "This is the primary role of the digestive system: 'The digestive system — your stomach and intestines — breaks down the food you eat into energy your body can use.'"}, {"text": "Helping you move by pulling on bones.", "isCorrect": true, "rationale": "The text states, 'The muscular system — your muscles — helps you move,' and the running example clarifies, 'Your muscular system pulls on your bones to move your legs.'"}, {"text": "Sending messages and enabling the body to sense and respond.", "isCorrect": false, "rationale": "This is the primary role of the nervous system: 'The nervous system — your brain, spinal cord, and nerves — sends messages so your body can sense and respond to the world.'"}]}, {"question": "The 'thinkaboutit' section asks what would happen if one body system, like the muscular system, could not do its job. Based on the overall theme of the section, what is the most likely consequence?", "options": [{"text": "Only the muscular system would be affected, with no significant impact on other systems.", "isCorrect": false, "rationale": "This contradicts the core message that 'no part works alone' and that body systems are a team. A failure in one system will impact others."}, {"text": "Other systems would immediately take over the functions of the muscular system, ensuring continuous movement.", "isCorrect": false, "rationale": "While systems are interdependent, they have specialized jobs. Another system cannot simply 'take over' the specific function of muscle contraction and movement."}, {"text": "The body's overall ability to move and perform daily activities would be severely limited, impacting other systems that rely on movement or are affected by immobility.", "isCorrect": true, "rationale": "The text's central theme is interdependence: 'every part of your body depends on the others.' If the muscular system fails, functions dependent on movement (like seeking food for the digestive system, or escaping danger which involves nervous/skeletal systems) would be impaired, affecting overall body function."}, {"text": "The body would simply adapt by finding alternative, non-muscular ways to accomplish tasks, without adverse effects.", "isCorrect": false, "rationale": "This is an oversimplification. While some adaptation is possible, the text emphasizes the necessity of each system's specific job working in concert for smooth operation."}]}, {"question": "Which three body systems are specifically identified in this section as the focus for the current unit?", "options": [{"text": "The Circulatory system, the Respiratory system, and the Nervous system.", "isCorrect": false, "rationale": "The text mentions learning about these in 'future science courses,' not as the focus of 'this unit.'"}, {"text": "The Skeletal system, the Muscular system, and the Digestive system.", "isCorrect": true, "rationale": "The text explicitly states: 'In this unit, we will focus on three of these systems: the skeletal system, the muscular system, and the digestive system.'"}, {"text": "The Digestive system, the Circulatory system, and the Respiratory system.", "isCorrect": false, "rationale": "While the digestive system is included, the circulatory and respiratory systems are slated for future units."}, {"text": "The Nervous system, the Skeletal system, and the Circulatory system.", "isCorrect": false, "rationale": "The nervous and circulatory systems are mentioned for future units, not the current one."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
