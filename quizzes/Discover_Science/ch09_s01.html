    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the main problem scientists aim to overcome by using precise measurements instead of descriptive words like 'big' or 'small'?", "options": [{"text": "Measurements are harder to record and take more time.", "isCorrect": false, "rationale": "While recording measurements can take time, the primary benefit of measurement is not efficiency but accuracy and clarity. The text emphasizes precision and exactness."}, {"text": "Descriptive words are always incorrect and mislead findings.", "isCorrect": false, "rationale": "Descriptive words are not necessarily 'incorrect' but are subjective and lack exactness. The issue is ambiguity, not inherent falsehood."}, {"text": "Measurements prevent ambiguity and ensure exact, universally understood information.", "isCorrect": true, "rationale": "The text states that without a number, 'you cannot be sure,' and a measurement like '45 centimeters long' means 'anyone in the world knows exactly what you mean.' This directly addresses ambiguity and promotes universal understanding."}, {"text": "Descriptive words are only understood by a small group of scientists.", "isCorrect": false, "rationale": "Descriptive words are generally understood, but their interpretation can vary widely from person to person, leading to a lack of precision, not a lack of understanding by a specific group."}]}, {"question": "According to the provided text, which combination correctly defines a scientific measurement?", "options": [{"text": "A personal guess about the size or amount of something.", "isCorrect": false, "rationale": "The text explicitly differentiates a 'guess' from a 'measurement,' stating that a guess lacks exactness, while a measurement provides it."}, {"text": "A number describing quantity, always without a specific unit to ensure broad interpretation.", "isCorrect": false, "rationale": "The text emphasizes that a measurement always has 'two parts: a number and a unit.' Without a unit, the number is meaningless (e.g., '92' without 'centimeters')."}, {"text": "An exact number that tells you the size, amount, or level of something, determined with a tool and expressed with a unit.", "isCorrect": true, "rationale": "This option combines all elements from the definition provided: 'a number that tells you the exact size, amount, or level of something, using a tool and a unit.'"}, {"text": "A general observation that describes a characteristic of an object.", "isCorrect": false, "rationale": "A general observation is similar to a descriptive word; it lacks the exactness and quantitative nature that defines a scientific measurement."}]}, {"question": "A student describes the time it took for a ball to roll down a ramp as 'pretty fast.' To make this observation precise and useful for scientific comparison, what should the student do?", "options": [{"text": "Describe the color and material of the ball to help others visualize it.", "isCorrect": false, "rationale": "While describing the ball's characteristics can be useful, it does not make the measurement of 'time' more precise. Precision applies to the specific quantity being measured."}, {"text": "Use a stopwatch to record the time in seconds from start to finish.", "isCorrect": true, "rationale": "This action directly applies the concept of precision by introducing a tool (stopwatch) and a unit (seconds) to obtain a clear, repeatable, and exact number for the time taken, as per the text's examples."}, {"text": "Compare it to another ball rolling down a different ramp to see which is faster.", "isCorrect": false, "rationale": "While comparison is a benefit of precision, simply comparing doesn't make the initial observation of 'pretty fast' precise. Each individual measurement needs to be precise first."}, {"text": "Ask a friend if they also thought the ball rolled 'pretty fast.'", "isCorrect": false, "rationale": "Consulting a friend still relies on subjective perception and descriptive words, which leads to further ambiguity rather than precision."}]}, {"question": "The text states that precision helps scientists in comparing results and repeating experiments. How does precision in measurement primarily benefit the collaborative and verifiable nature of scientific research?", "options": [{"text": "It allows scientists to quickly publish their findings without peer review.", "isCorrect": false, "rationale": "Precision supports rigorous scientific practice, which typically includes peer review, not bypassing it. Quick publication is not the primary benefit mentioned."}, {"text": "It ensures that experiments are always exciting and lead to groundbreaking discoveries.", "isCorrect": false, "rationale": "While precision is crucial for valid discoveries, it does not guarantee 'exciting' or 'groundbreaking' results. Its role is in the reliability and validity of the process."}, {"text": "It enables different scientists in various locations to accurately compare their data and verify each other's work.", "isCorrect": true, "rationale": "Precision makes measurements 'clear, repeatable numbers.' This allows scientists to 'compare their numbers right away' and for 'someone else [to] follow your steps and see if they get the same results,' directly supporting collaboration and verification."}, {"text": "It reduces the amount of expensive equipment needed for an experiment.", "isCorrect": false, "rationale": "Precision often requires specific tools, which may or may not be expensive. Its benefit is not in cost reduction but in the quality of data."}]}, {"question": "In an experiment testing which type of paper airplane flies farther, why is it crucial to measure each flight in meters instead of just saying 'This one went pretty far'?", "options": [{"text": "Measuring distances is generally faster than estimating them.", "isCorrect": false, "rationale": "Speed is not the primary motivation. The main reason is accuracy and fairness, regardless of the time taken."}, {"text": "It ensures the experiment is a fair test by providing objective, comparable data to determine the winner.", "isCorrect": true, "rationale": "The text explains that 'Measurements make tests fair.' By measuring in meters, you 'know exactly which one won — and by how much,' which is essential for a fair, objective comparison in a scientific test."}, {"text": "Scientists prefer using meter sticks over visual estimation because they look more professional.", "isCorrect": false, "rationale": "Professionalism is a secondary consideration. The core reason is the objective and quantifiable data that measurements provide."}, {"text": "Only metric units are permitted in any scientific documentation.", "isCorrect": false, "rationale": "While the metric system is preferred in science for global agreement, the fundamental reason for using measurement in this context is to ensure a fair test, not merely unit compliance."}]}, {"question": "A scientist states that the mass of a rock sample is '50'. Why is this statement incomplete as a scientific measurement?", "options": [{"text": "It doesn't specify the color or texture of the rock, which are important characteristics.", "isCorrect": false, "rationale": "While rock characteristics might be relevant to a study, they are not part of the definition of a 'measurement' itself. The incompleteness here is about the measurement value."}, {"text": "It lacks the specific tool used, such as a balance or scale.", "isCorrect": false, "rationale": "The tool is used to obtain the measurement, but the reported measurement itself is incomplete because it's missing the unit, not the description of the tool in the statement itself."}, {"text": "It is missing the unit (e.g., grams, kilograms), making the amount unclear and ambiguous.", "isCorrect": true, "rationale": "The text explicitly states, 'A measurement always has two parts: a number and a unit. Saying 'the table is 92' does not help. Ninety-two what? Centimeters? Inches? Elephants? The unit tells people what kind of measurement you are talking about.'"}, {"text": "It does not explain the geological origin of the rock sample.", "isCorrect": false, "rationale": "The origin of the sample is contextual information, not a required component of the numerical measurement itself."}]}, {"question": "According to the text, what is the primary reason scientists worldwide primarily use the metric system for their measurements?", "options": [{"text": "To make calculations more complex and challenging for new researchers.", "isCorrect": false, "rationale": "The metric system is often considered simpler for calculations due to its base-10 nature, and its purpose is not to create difficulty."}, {"text": "To ensure consistency and ease of communication and comparison of results across different countries and research teams.", "isCorrect": true, "rationale": "The text explicitly states, 'In science, we use the metric system because scientists all around the world agree on the same units.' This agreement fosters consistency, communication, and comparability globally."}, {"text": "To avoid using common measurement tools like rulers and balances.", "isCorrect": false, "rationale": "The metric system uses these tools, just with metric units (e.g., meter stick instead of yardstick, balance for grams instead of pounds)."}, {"text": "To measure only very small objects and quantities, as it is less suited for large scales.", "isCorrect": false, "rationale": "The metric system is perfectly capable of measuring very large distances (kilometers) and masses (kilograms/metric tons) as well as very small ones."}]}, {"question": "Based on the provided chart, which pairing correctly identifies a type of measurement, its standard unit, and the tool used to obtain it?", "options": [{"text": "Mass, liters (L), balance.", "isCorrect": false, "rationale": "Liters (L) are units for Volume, not Mass. A balance is correctly used for Mass."}, {"text": "Length, meters (m), thermometer.", "isCorrect": false, "rationale": "A thermometer is used to measure Temperature, not Length. Meters (m) are correct for Length."}, {"text": "Volume, milliliters (mL), graduated cylinder.", "isCorrect": true, "rationale": "This option correctly matches Volume with its standard unit (milliliters) and the appropriate tool (graduated cylinder), as listed in the chart."}, {"text": "Temperature, kilograms (kg), ruler.", "isCorrect": false, "rationale": "Kilograms (kg) are units for Mass, not Temperature. A ruler is used for Length, not Temperature."}]}, {"question": "A student observes that 'the plant in the sunny window grew taller than the plant in the shade yesterday.' Which statement best explains why this is an observation but not a scientific measurement?", "options": [{"text": "It lacks a comparison to another plant for proper scientific methodology.", "isCorrect": false, "rationale": "While comparison is part of an experiment, the issue here is with the *type* of data (observation vs. measurement) for a single reported finding, not the overall experiment design."}, {"text": "It uses qualitative, comparative language instead of a specific number and unit for exactness.", "isCorrect": true, "rationale": "The text explains that 'When you say a fish is “big,” that is a guess,' but '45 centimeters long' is a measurement. Saying 'grew taller' is qualitative and lacks the 'exact size' with a 'number... and a unit' that defines a measurement."}, {"text": "The student should have waited until the end of the week to make the observation.", "isCorrect": false, "rationale": "The timing of the observation doesn't make it a measurement. The nature of the description (qualitative vs. quantitative) is the key difference."}, {"text": "It doesn't involve a complex experimental setup or sophisticated tools.", "isCorrect": false, "rationale": "The complexity of the experiment or tools is not what distinguishes a measurement from a non-measurement. Even simple measurements require a number and a unit."}]}, {"question": "A group of international scientists is collaborating on a climate study. One scientist measures rainfall in 'gallons per square mile,' another measures in 'liters per square kilometer,' and a third estimates 'a lot of rain.' Which action would most improve the accuracy and comparability of their collective data?", "options": [{"text": "Having all scientists switch to estimating 'a lot of rain' to standardize their qualitative observations.", "isCorrect": false, "rationale": "Estimation or qualitative descriptions ('a lot of rain') are imprecise and subjective, which scientists avoid. This would decrease, not improve, accuracy and comparability."}, {"text": "Each scientist continuing with their preferred units but translating for reports and publications.", "isCorrect": false, "rationale": "While translation is possible, it introduces potential for error and conversion mistakes. The text emphasizes global agreement on units for direct comparison and ease of communication."}, {"text": "All scientists agreeing to consistently use the metric system units like liters per square kilometer for measurement.", "isCorrect": true, "rationale": "The text states, 'In science, we use the metric system because scientists all around the world agree on the same units.' This choice directly applies this principle, ensuring consistency, precision, and direct comparability of data for global collaboration."}, {"text": "Focusing only on local weather patterns rather than attempting to combine global climate data.", "isCorrect": false, "rationale": "This changes the scope of the research rather than solving the measurement problem within the collaborative study. The issue is how to make existing global data comparable."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
