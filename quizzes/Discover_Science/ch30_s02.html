        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<body>
<div class="quiz-container">

        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 30, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A cactus has thick, waxy skin and spines instead of leaves. Which type of adaptation does this describe, and why is it effective?", "options": [{"text": "Behavioral adaptation; it helps the cactus perform photosynthesis more efficiently.", "isCorrect": false, "rationale": "Behavioral adaptations are actions or behaviors, not physical features. While waxy skin and spines are adaptations, their primary effectiveness isn't solely about photosynthesis efficiency, and they are not behavioral."}, {"text": "Structural adaptation; the thick skin and spines reduce water loss and protect against herbivores.", "isCorrect": true, "rationale": "Structural adaptations are physical features that help survival. The thick, waxy skin reduces water evaporation, and spines deter animals, both crucial for survival in arid environments."}, {"text": "Structural adaptation; the spines provide camouflage from predators.", "isCorrect": false, "rationale": "While spines are a structural adaptation, their primary purpose for a cactus is protection against herbivores and reducing water loss, not typically camouflage."}, {"text": "Behavioral adaptation; the waxy skin allows it to store water for long periods.", "isCorrect": false, "rationale": "Waxy skin is a physical feature, making it a structural adaptation, not a behavioral one. Storing water is a function of the plant's structure and physiology, not an action it performs."}]}, {"question": "Which of the following best describes an organism undergoing metamorphosis?", "options": [{"text": "A puppy growing into an adult dog, changing only in size.", "isCorrect": false, "rationale": "This describes growth, which involves changes in size but not a 'dramatic change in body form' as defined for metamorphosis."}, {"text": "A human child learning to walk and talk as they age.", "isCorrect": false, "rationale": "These are developmental milestones and learning processes, not a dramatic transformation of the organism's fundamental body structure."}, {"text": "A caterpillar transforming into a chrysalis, and then emerging as a butterfly.", "isCorrect": true, "rationale": "This is a classic example of metamorphosis, where an organism undergoes a complete and dramatic change in its body form during its life cycle."}, {"text": "A tree losing its leaves in autumn and regrowing them in spring.", "isCorrect": false, "rationale": "This is a seasonal change in a plant, not a transformation of an animal's body form during its life cycle."}]}, {"question": "Over many generations, a population of rabbits living in a cold environment developed thicker fur, leading to better survival rates and more offspring. If the climate suddenly became much warmer for an extended period, what is the most likely long-term outcome for this rabbit population based on the principle of natural selection?", "options": [{"text": "The rabbits would immediately shed their thick fur and grow thinner fur to adapt to the warmth.", "isCorrect": false, "rationale": "Adaptations through natural selection occur over many generations, not immediately within an individual's lifetime or even a few generations for such a drastic change."}, {"text": "Rabbits with naturally thinner fur, or those able to adapt better to heat, would survive and reproduce more, potentially leading to a shift in the population's dominant traits or even extinction if unable to adapt.", "isCorrect": true, "rationale": "Natural selection favors traits that help organisms survive in their current environment. In a warmer climate, thicker fur would be a disadvantage. Individuals with traits better suited to warmth would have higher survival and reproduction rates, shifting the population over time, or the population could face extinction if it cannot adapt."}, {"text": "The entire population would migrate to a colder region, preserving their thick fur trait.", "isCorrect": false, "rationale": "While migration is a possible behavioral adaptation, it's not guaranteed for an entire population, nor is it the only or most direct outcome described by natural selection on a physical trait like fur thickness. It doesn't account for the 'long-term outcome' of the trait within the population in the new environment."}, {"text": "The rabbits would store more body fat to insulate themselves against the heat.", "isCorrect": false, "rationale": "Storing more body fat would increase insulation, which would be detrimental in a warmer climate, making them overheat rather than adapt."}]}, {"question": "A country relies heavily on a resource that takes millions of years to form and cannot be replaced once it is used up. What type of resource is this, and which example fits this description?", "options": [{"text": "Renewable resource; sunlight.", "isCorrect": false, "rationale": "Sunlight is a renewable resource, but it doesn't take millions of years to form and is not 'used up' in the traditional sense like a material resource."}, {"text": "Nonrenewable resource; natural gas.", "isCorrect": true, "rationale": "Natural gas is a fossil fuel, which are nonrenewable resources formed from ancient organisms over millions of years and cannot be replaced within a human lifetime once consumed."}, {"text": "Renewable resource; trees.", "isCorrect": false, "rationale": "Trees are a renewable resource because they can be replanted and regrown within a human lifetime, not over millions of years."}, {"text": "Natural resource; water.", "isCorrect": false, "rationale": "Water is a natural resource, and largely renewable (through the water cycle), but it does not take millions of years to form in the way the question describes and is not 'used up' in the same finite manner as fossil fuels."}]}, {"question": "A community decides to implement a new program that encourages residents to reduce water usage, recycle plastic and paper, and plant trees. Which overarching principle are they primarily demonstrating?", "options": [{"text": "Natural selection.", "isCorrect": false, "rationale": "Natural selection is a biological process concerning the survival and reproduction of organisms based on their traits, not human-led management of resources."}, {"text": "Extinction prevention.", "isCorrect": false, "rationale": "While these actions can indirectly contribute to preventing extinction by preserving habitats and resources, the primary and broader principle encompassing all these actions (reducing water, recycling, planting trees) is the careful use and protection of resources."}, {"text": "Conservation.", "isCorrect": true, "rationale": "Conservation is defined as 'the careful use and protection of natural resources.' All the listed activities—reducing water usage, recycling, and planting trees—fall under this umbrella."}, {"text": "Resource generation.", "isCorrect": false, "rationale": "Resource generation would imply creating new resources. These actions are about managing and protecting existing resources, not generating them."}]}, {"question": "Which statement correctly differentiates between a molecule and a compound based on the provided definitions?", "options": [{"text": "All molecules are compounds, but not all compounds are molecules.", "isCorrect": false, "rationale": "This statement is incorrect. All compounds are molecules, but not all molecules are compounds (e.g., O2 is a molecule but not a compound)."}, {"text": "A molecule must contain at least two different types of atoms, while a compound can have just one type.", "isCorrect": false, "rationale": "This statement reverses the definitions. A compound must contain two or more *different* types of atoms, while a molecule can consist of two or more atoms of the *same* type (e.g., O2) or different types."}, {"text": "A compound is always a molecule, but a molecule is only a compound if it contains two or more different types of atoms.", "isCorrect": true, "rationale": "A molecule is 'two or more atoms bonded together.' A compound is 'a molecule made of two or more *different* types of atoms bonded together.' Therefore, all compounds are molecules, but a molecule like O2 (two oxygen atoms) is not a compound because it only has one type of atom."}, {"text": "Molecules are formed by chemical bonds, while compounds are formed by physical mixtures.", "isCorrect": false, "rationale": "Both molecules and compounds involve atoms bonded together by chemical bonds, not physical mixtures."}]}, {"question": "When you burn a log in a fireplace, it turns into ash, smoke, and gases. According to the principle of conservation of matter, what is true about this process?", "options": [{"text": "The total mass of the ash, smoke, and gases is less than the original mass of the log because some matter was destroyed.", "isCorrect": false, "rationale": "The principle of conservation of matter states that matter is never created or destroyed. The apparent mass loss is due to gases escaping, not matter being destroyed."}, {"text": "The total mass of the ash, smoke, and gases is greater than the original mass of the log because new matter was created.", "isCorrect": false, "rationale": "Matter is neither created nor destroyed. Any increase in mass would be due to reactants (like oxygen from the air) being incorporated, not new matter creation."}, {"text": "The atoms from the log have simply rearranged to form new substances, and the total mass of all products (ash, smoke, gases) is equal to the original mass of the log and the oxygen used for combustion.", "isCorrect": true, "rationale": "This correctly applies the conservation of matter. The atoms rearrange during combustion, and if all reactants (log + oxygen) and all products (ash + smoke + gases) are accounted for, their total mass remains constant."}, {"text": "The log loses matter as heat and light energy are released during combustion.", "isCorrect": false, "rationale": "Heat and light are forms of energy, not matter. Matter is conserved, even as energy is released."}]}, {"question": "After rubbing a balloon on your hair, you notice it sticks to a wall. This phenomenon is an example of what?", "options": [{"text": "Current electricity, because charges are flowing from the balloon to the wall.", "isCorrect": false, "rationale": "Current electricity is a steady flow of charges. The balloon sticking to the wall is due to a temporary imbalance of charges (a buildup), not a continuous flow."}, {"text": "Static electricity, due to a buildup of electric charge on the balloon's surface.", "isCorrect": true, "rationale": "Static electricity is precisely defined as 'a buildup of electric charge on an object,' which is what happens when rubbing a balloon on hair, causing it to attract to other surfaces."}, {"text": "Electromagnetism, as the friction created a magnetic field.", "isCorrect": false, "rationale": "Friction creates an electric charge, leading to static electricity, not a magnetic field in this context. Electromagnetism involves electric currents creating magnetic fields."}, {"text": "A complete circuit, allowing electrons to travel between the balloon and the wall.", "isCorrect": false, "rationale": "A complete circuit is a path for continuous electricity flow. Static electricity involves charge buildup and discharge, not a sustained circuit."}]}, {"question": "An electrician is working with live wires and needs a material to safely handle them without getting shocked. Which material would be the best choice for the handle of their tools?", "options": [{"text": "Copper.", "isCorrect": false, "rationale": "Copper is explicitly listed as a conductor, meaning it allows electricity to flow easily, which would result in an electric shock."}, {"text": "Aluminum.", "isCorrect": false, "rationale": "Aluminum is a metal and a good conductor of electricity, making it unsuitable for handling live wires safely."}, {"text": "Rubber.", "isCorrect": true, "rationale": "Rubber is explicitly listed as an insulator, which means it does not allow electricity to flow through it easily, providing protection against shock."}, {"text": "Iron.", "isCorrect": false, "rationale": "Iron is a metal and a conductor of electricity. While not as good as copper, it would still allow current to pass through, making it unsafe."}]}, {"question": "A device is used in a power plant to convert the motion of spinning turbines (driven by steam or wind) into electrical energy that can power homes. What is this device called, and what is its primary function?", "options": [{"text": "An electric motor; it uses electricity to create motion.", "isCorrect": false, "rationale": "An electric motor converts electricity into motion, which is the opposite function described in the question."}, {"text": "An electromagnet; it creates a magnetic field when electricity flows through it.", "isCorrect": false, "rationale": "An electromagnet creates a magnetic field using electric current. It does not convert motion into electricity in the way a power plant needs."}, {"text": "A generator; it converts motion into electricity.", "isCorrect": true, "rationale": "A generator is defined as 'A machine that converts motion into electricity using magnets and wire coils,' which perfectly matches the description of how electricity is produced in power plants from turbine motion."}, {"text": "A circuit; it provides a path for electricity to flow.", "isCorrect": false, "rationale": "A circuit is a path for electricity, not a device that converts motion into electricity."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
