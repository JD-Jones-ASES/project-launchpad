<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which of the following best describes the lithosphere?", "options": [{"text": "The layer of air that surrounds Earth.", "isCorrect": false, "rationale": "This describes the atmosphere, not the lithosphere. The lithosphere is the solid part of Earth."}, {"text": "The solid, rocky outer layer of Earth, including continents and the ocean floor.", "isCorrect": true, "rationale": "The text defines the lithosphere as 'the rocky outer layer of Earth, including all the land — continents, mountains, and the ocean floor,' and states it is 'the solid part of Earth.'"}, {"text": "All the water found on Earth, in various forms.", "isCorrect": false, "rationale": "This describes the hydrosphere, not the lithosphere. The lithosphere is specifically the rock and land."}, {"text": "The portion of Earth's surface primarily covered by glaciers and ice caps.", "isCorrect": false, "rationale": "While glaciers are on land, they are part of the hydrosphere. The lithosphere encompasses all solid rock and land, not just ice-covered areas."}], "id": "q01"}, {"question": "Which of these would NOT be considered part of Earth's hydrosphere?", "options": [{"text": "A glacier in the Arctic.", "isCorrect": false, "rationale": "Glaciers are frozen water and are explicitly mentioned as part of the hydrosphere."}, {"text": "Water vapor forming clouds in the sky.", "isCorrect": false, "rationale": "Water vapor in the air is specifically included in the definition of the hydrosphere."}, {"text": "An underground aquifer supplying well water.", "isCorrect": false, "rationale": "Underground water is part of the hydrosphere, as stated in the text."}, {"text": "The magma layer beneath Earth's crust.", "isCorrect": true, "rationale": "Magma is molten rock, which is a component of Earth's interior (and eventually the lithosphere if it solidifies), but it is not water and thus not part of the hydrosphere."}], "id": "q02"}, {"question": "The prefix 'atmo' in 'atmosphere' refers to which of the following, according to the provided text?", "options": [{"text": "Rock or solid ground.", "isCorrect": false, "rationale": "The prefix 'litho' means rock, not 'atmo'."}, {"text": "Water or liquid.", "isCorrect": false, "rationale": "The prefix 'hydro' means water, not 'atmo'."}, {"text": "Vapor or gas.", "isCorrect": true, "rationale": "The text explicitly states that 'Atmo' means 'vapor' or 'gas,' which correctly identifies the primary composition of the atmosphere."}, {"text": "Life or living organisms.", "isCorrect": false, "rationale": "This relates to the prefix 'bio' (biosphere), which is not mentioned in the text for these spheres."}], "id": "q03"}, {"question": "Based on the provided text, what percentage of Earth's water is freshwater, and where is the majority of it stored?", "options": [{"text": "97%, mostly in oceans.", "isCorrect": false, "rationale": "97% of Earth's water is salty ocean water, not freshwater."}, {"text": "3%, mostly in rivers and lakes.", "isCorrect": false, "rationale": "While 3% is freshwater, the text specifies that 'most of that is frozen in glaciers and ice caps,' not rivers and lakes."}, {"text": "3%, mostly frozen in glaciers and ice caps.", "isCorrect": true, "rationale": "The text states: 'Only about 3% is fresh water, and most of that is frozen in glaciers and ice caps,' making this the correct statement."}, {"text": "97%, mostly as water vapor in the air.", "isCorrect": false, "rationale": "97% is salty ocean water, and water vapor constitutes a very small fraction of total water, not the majority of all water."}], "id": "q04"}, {"question": "A scientist studies a geological fault line where two tectonic plates are grinding past each other. In which of Earth's spheres would this phenomenon primarily occur?", "options": [{"text": "Atmosphere.", "isCorrect": false, "rationale": "The atmosphere is the layer of air; tectonic plate movement occurs in the solid Earth."}, {"text": "Hydrosphere.", "isCorrect": false, "rationale": "The hydrosphere is all water; plate tectonics involves the movement of rocky layers."}, {"text": "Lithosphere.", "isCorrect": true, "rationale": "Tectonic plates are major sections of Earth's rocky outer layer. Fault lines and their movements are defining features of the lithosphere."}, {"text": "A combination of all three spheres.", "isCorrect": false, "rationale": "While other spheres might be indirectly affected (e.g., tsunamis in the hydrosphere due to an earthquake in the lithosphere), the primary phenomenon of plates grinding is within the lithosphere."}], "id": "q05"}, {"question": "During a heavy rainstorm, water (precipitation) falls from the clouds, through the air, and lands on a mountain slope, where it causes erosion and forms a small stream. This scenario primarily demonstrates the interaction between which of Earth's spheres?", "options": [{"text": "Atmosphere and Hydrosphere only.", "isCorrect": false, "rationale": "This option misses the interaction with the land (mountain slope, erosion, stream bed), which involves the lithosphere."}, {"text": "Hydrosphere and Lithosphere only.", "isCorrect": false, "rationale": "This option misses the origin of the rain from the atmosphere."}, {"text": "Lithosphere, Hydrosphere, and Atmosphere.", "isCorrect": true, "rationale": "Rain falls from the air (atmosphere), is water (hydrosphere), and lands on and erodes the ground (lithosphere), forming a stream (hydrosphere interaction with lithosphere). This scenario explicitly touches on all three."}, {"text": "Biosphere and Hydrosphere.", "isCorrect": false, "rationale": "The biosphere is not mentioned in the text, and this option misses the key roles of the atmosphere and lithosphere in this specific interaction."}], "id": "q06"}, {"question": "According to the text, what is a characteristic change observed in the atmosphere as one goes higher above Earth's surface?", "options": [{"text": "It becomes denser and warmer.", "isCorrect": false, "rationale": "The text states the atmosphere 'gets thinner the higher you go,' implying it becomes less dense, not denser. It also generally gets colder, not warmer, with altitude in the troposphere."}, {"text": "It gets thinner.", "isCorrect": true, "rationale": "The text explicitly states, 'It stretches hundreds of kilometers above the surface, but gets thinner the higher you go.'"}, {"text": "It maintains a consistent thickness and composition.", "isCorrect": false, "rationale": "The text contradicts this by stating it 'gets thinner the higher you go.'"}, {"text": "It rapidly transitions into a solid layer.", "isCorrect": false, "rationale": "The atmosphere remains gaseous and gradually thins; it does not transition into a solid layer."}], "id": "q07"}, {"question": "What is the fundamental difference in composition between the lithosphere and the hydrosphere, as described in the text?", "options": [{"text": "The lithosphere is primarily made of air, while the hydrosphere is made of solid rock.", "isCorrect": false, "rationale": "This statement incorrectly swaps the primary compositions and misidentifies them. The lithosphere is rock, and the hydrosphere is water."}, {"text": "The lithosphere is composed of solid rock and land, whereas the hydrosphere is made up of all forms of water.", "isCorrect": true, "rationale": "The text defines the lithosphere as 'the rocky outer layer of Earth' and 'the solid part of Earth,' and the hydrosphere as 'all the water on Earth.' This is the correct fundamental distinction."}, {"text": "The lithosphere is entirely frozen, while the hydrosphere is entirely liquid.", "isCorrect": false, "rationale": "The lithosphere is rock, not frozen, and the hydrosphere includes frozen water (glaciers) and water vapor, not just liquid."}, {"text": "The lithosphere is only found underground, while the hydrosphere is only found above ground.", "isCorrect": false, "rationale": "The lithosphere includes surface land (mountains, continents), and the hydrosphere includes underground water."}], "id": "q08"}, {"question": "The atmosphere is described as a blanket of air made of gases. Which two specific gases are explicitly mentioned in the text as components of the atmosphere?", "options": [{"text": "Hydrogen and Helium.", "isCorrect": false, "rationale": "While present in the universe, these gases are not explicitly mentioned in the text as primary components of Earth's atmosphere."}, {"text": "Carbon Dioxide and Methane.", "isCorrect": false, "rationale": "These are important greenhouse gases, but the text does not explicitly name them as the primary components it focuses on."}, {"text": "Nitrogen and Oxygen.", "isCorrect": true, "rationale": "The text states, 'The atmosphere... made of gases like nitrogen and oxygen,' explicitly naming these two."}, {"text": "Sulfur Dioxide and Ozone.", "isCorrect": false, "rationale": "These are components of the atmosphere, but they are not the two gases explicitly mentioned in the text provided."}], "id": "q09"}, {"question": "Consider a puddle forming on a sidewalk after a rain shower. Which of Earth's spheres are most directly interacting to create and contain this puddle?", "options": [{"text": "Atmosphere and Lithosphere.", "isCorrect": false, "rationale": "While the atmosphere provided the rain, the puddle itself is water (hydrosphere) contained by the ground (lithosphere). This option misses the hydrosphere."}, {"text": "Hydrosphere and Atmosphere.", "isCorrect": false, "rationale": "The puddle is water (hydrosphere) and it came from the atmosphere (rain), but the ground (lithosphere) is crucial for containing it. This option misses the lithosphere."}, {"text": "Lithosphere and Hydrosphere.", "isCorrect": true, "rationale": "The puddle itself is water (hydrosphere) and it rests on the sidewalk, which is part of the land/ground (lithosphere), directly showing the interaction of these two spheres in forming and containing the puddle. The atmosphere delivers the water, but the puddle's *existence* as a body of water on the ground primarily represents these two."}, {"text": "All three spheres equally.", "isCorrect": false, "rationale": "While the atmosphere is involved in the rain, the most direct interaction for the *puddle's existence* as a feature is between the water (hydrosphere) and the ground (lithosphere). 'Equally' is also often a less precise answer in such application questions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
