    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 21, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes a 'balanced' ecosystem according to the text?", "options": [{"text": "All populations within the ecosystem remain exactly the same size every day.", "isCorrect": false, "rationale": "The text states, 'This balance does not mean every ecosystem stays exactly the same every day. Populations go up and down a little, like a seesaw that tips gently back and forth.' This option contradicts the dynamic nature of a healthy balance."}, {"text": "The populations of different organisms stay fairly steady over time, with no single population growing out of control.", "isCorrect": true, "rationale": "The text defines a healthy ecosystem as one where 'the populations of different organisms stay fairly steady over time' and 'No single population grows out of control.' This accurately captures the essence of a balanced ecosystem."}, {"text": "Carnivore populations are always much larger than herbivore populations.", "isCorrect": false, "rationale": "The text indicates that there are 'enough herbivores to feed the carnivores,' implying a proportional relationship, but not necessarily a larger carnivore population. Carnivores are typically fewer in number than herbivores in a stable food web."}, {"text": "Decomposers are the only organisms whose populations are allowed to grow indefinitely.", "isCorrect": false, "rationale": "The text says 'decomposers keep recycling nutrients,' but it does not suggest their populations grow indefinitely or are exempt from the general balance. An uncontrolled population of any species would disrupt the balance."}]}, {"question": "According to the wolf-and-deer example, what is the *immediate* effect of wolves disappearing from a forest ecosystem?", "options": [{"text": "The plant populations would immediately begin to recover and grow denser.", "isCorrect": false, "rationale": "The immediate effect is an increase in deer population, which then leads to more grazing and a decline in plant life, not recovery."}, {"text": "The deer population would grow because there are no predators to hunt them.", "isCorrect": true, "rationale": "The text explicitly states, 'With no wolves to hunt them, the deer population grows' as the first step in the chain reaction after wolves are removed."}, {"text": "Other herbivores, like rabbits, would instantly increase their populations.", "isCorrect": false, "rationale": "While deer increase, the subsequent overgrazing by deer would reduce plants, leading to less food for other herbivores like rabbits, causing their populations to shrink, not grow."}, {"text": "Erosion would significantly decrease due to less disturbance in the soil.", "isCorrect": false, "rationale": "Erosion would increase later as plants are depleted and there is less to hold the soil, not decrease immediately."}]}, {"question": "In the Yellowstone National Park example, the reintroduction of wolves in 1995 ultimately helped the ecosystem recover. Beyond just the deer, how did the reintroduction of wolves likely contribute to restoring the balance of the *physical landscape*?", "options": [{"text": "The wolves directly consumed invasive plant species, allowing native plants to thrive.", "isCorrect": false, "rationale": "Wolves are carnivores; they hunt deer, not consume plant species directly. While their presence indirectly benefits plants, this option suggests a direct dietary impact on plants."}, {"text": "By reducing the deer population, plants recovered, which helped stabilize the soil and reduce erosion.", "isCorrect": true, "rationale": "The text explains that 'With fewer plants holding the soil in place, erosion increases' when deer overgraze. Therefore, by controlling the deer population, wolves allow plants to recover, which in turn helps prevent erosion and stabilizes the physical landscape, as mentioned in the teacher's note."}, {"text": "Wolves dug new channels in rivers, improving water flow for aquatic life.", "isCorrect": false, "rationale": "The text doesn't suggest wolves directly modify river channels. Their impact on rivers is indirect, through their effect on plant life along riverbanks, which then influences water flow and stability."}, {"text": "Their presence encouraged humans to clean up pollution more effectively.", "isCorrect": false, "rationale": "While the reintroduction was a human effort based on understanding, the wolves themselves do not directly encourage pollution cleanup. Their impact is ecological."}]}, {"question": "A specific type of bird builds its nest in the hollows of old oak trees, feeds primarily on acorns, and is preyed upon by foxes. Which term describes the 'hollows of old oak trees' for this bird?", "options": [{"text": "Niche", "isCorrect": false, "rationale": "The niche is the role or job, including what it eats, what eats it, and how it interacts. The hollows are a 'place where an organism lives' or shelters, which is part of its habitat."}, {"text": "Ecosystem", "isCorrect": false, "rationale": "An ecosystem is all the living and nonliving things in an area interacting. The hollows are just one component of a bird's living space within an ecosystem."}, {"text": "Habitat", "isCorrect": true, "rationale": "The text defines habitat as 'the place where an organism lives. A habitat provides the food, water, shelter, and space that the organism needs.' The hollows provide shelter, fulfilling a part of its habitat."}, {"text": "Community", "isCorrect": false, "rationale": "A community refers to all the different populations of organisms living and interacting in an area. The hollows are a specific location, not a collection of populations."}]}, {"question": "A new species of beetle is introduced to a forest where it has no natural predators. It consumes the same type of leaves as a native caterpillar, which is a primary food source for local birds. Based on the text, what is the most likely long-term outcome?", "options": [{"text": "Both the new beetle and the native caterpillar populations will thrive due to increased food availability.", "isCorrect": false, "rationale": "The text states that 'Two different species usually cannot have exactly the same niche in the same habitat for very long' due to competition. Increased food availability is unlikely if they compete for the same resource."}, {"text": "The native caterpillar population will decrease due to competition, potentially impacting the bird population.", "isCorrect": true, "rationale": "The text explains that if two species have the same niche, 'Eventually, one species will do better than the other.' In this case, with no predators, the invasive beetle will likely outcompete the native caterpillar, reducing its population and thus affecting the birds that rely on them."}, {"text": "The local birds will switch their diet to primarily consume the new beetle, leading to a new balance.", "isCorrect": false, "rationale": "While some adaptation is possible, the text emphasizes the disruption caused by invasive species, noting they 'can multiply quickly and push out native organisms.' A sudden and complete dietary shift for birds is not the most likely immediate or sole outcome without other factors."}, {"text": "The new beetle will quickly develop its own natural predators, restoring the balance.", "isCorrect": false, "rationale": "The text states that invasive species thrive 'Without natural predators in their new home,' and it takes a long time, if ever, for new predators to evolve or be introduced to control them."}]}, {"question": "Which of the following human actions is identified as the 'biggest threat to wildlife around the world' in the text?", "options": [{"text": "Pollution from factories and cars.", "isCorrect": false, "rationale": "Pollution is listed as a significant threat, but not the 'biggest.' It 'can poison plants and animals or make water unsafe to drink.'"}, {"text": "Introducing new, invasive species to ecosystems.", "isCorrect": false, "rationale": "Introducing invasive species is a serious threat that 'can multiply quickly and push out native organisms,' but the text specifies another as the 'biggest.'"}, {"text": "Overuse of resources like catching too many fish.", "isCorrect": false, "rationale": "Overuse of resources 'can remove important parts of an ecosystem faster than they can recover,' but it is not labeled as the 'biggest threat.'"}, {"text": "Habitat destruction by cutting down forests or building farms.", "isCorrect": true, "rationale": "The text explicitly states: 'Habitat destruction — ...This is the biggest threat to wildlife around the world.' This option directly matches the text."}]}, {"question": "Based on the example of rabbits in Australia, what is a key characteristic of an invasive species that makes it so damaging to a new ecosystem?", "options": [{"text": "They are typically much larger and stronger than native species, allowing them to dominate.", "isCorrect": false, "rationale": "While some invasive species might be larger, the text does not cite physical size as the defining characteristic. Rabbits, for example, are not necessarily larger than many native Australian animals."}, {"text": "They adapt very slowly to new environments, which paradoxically disrupts the balance.", "isCorrect": false, "rationale": "Invasive species typically adapt *quickly* and reproduce rapidly in their new environment because they lack natural controls, not slowly."}, {"text": "They have natural predators in their new home that allow them to establish a new, stable food chain.", "isCorrect": false, "rationale": "The text states, 'Without natural predators in their new home, invasive species can multiply quickly.' The lack of predators is key to their uncontrolled growth."}, {"text": "They lack natural predators in their new environment, allowing their populations to explode and outcompete native organisms.", "isCorrect": true, "rationale": "The text directly states, 'Without natural predators in their new home, invasive species can multiply quickly and push out native organisms.' The example of rabbits in Australia perfectly illustrates this."}]}, {"question": "Rachel Carson's work with 'Silent Spring' primarily demonstrated which fundamental principle about ecosystems?", "options": [{"text": "That the primary goal of environmentalism is to eliminate all pesticides.", "isCorrect": false, "rationale": "While her work led to the banning of DDT, her overarching message was about interconnectedness, not a blanket prohibition on all pesticides. The focus was on the unintended consequences of human actions."}, {"text": "That specific pesticides only affect the organisms they are designed to kill.", "isCorrect": false, "rationale": "Her book proved the opposite: DDT harmed 'much more than just the insects it was meant to kill,' affecting entire food chains."}, {"text": "That human actions can have far-reaching, unintended consequences throughout an entire ecosystem.", "isCorrect": true, "rationale": "The text concludes her section with 'She showed that in an ecosystem, everything is connected — and that what we do to one part, we do to all the others,' directly aligning with this option."}, {"text": "That birds at the top of the food chain are immune to environmental pollutants.", "isCorrect": false, "rationale": "Her research showed that birds at the top of the food chain, like eagles, received the 'highest doses' of DDT and were severely harmed, demonstrating they are *not* immune."}]}, {"question": "A farmer uses a pesticide that is absorbed by corn plants. Small insects eat the corn, and then small birds eat those insects. If a hawk eats many of these small birds, how would the pesticide most likely affect the hawk, based on Rachel Carson's findings about DDT?", "options": [{"text": "The hawk would only be minimally affected because the pesticide would be diluted at each step of the food chain.", "isCorrect": false, "rationale": "Carson's research showed 'DDT was building up in food chains.' This process, called biomagnification, means the concentration *increases* at higher trophic levels, not dilutes."}, {"text": "The hawk would not be affected at all, as pesticides only harm the organisms they are designed to target.", "isCorrect": false, "rationale": "This contradicts Carson's central finding that DDT harmed 'much more than just the insects it was meant to kill' and affected animals far up the food chain."}, {"text": "The hawk would receive the highest dose of the pesticide because it accumulates at each level of the food chain.", "isCorrect": true, "rationale": "The text explains that DDT 'was building up in food chains. Small organisms absorbed it. Bigger animals ate those organisms and absorbed even more DDT. Birds at the top of the food chain — like eagles and pelicans — got the highest doses.' This concept is biomagnification, leading to the top predator receiving the highest concentration."}, {"text": "The pesticide would be completely broken down by the time it reaches the hawk, rendering it harmless.", "isCorrect": false, "rationale": "Carson's research showed that DDT persisted and accumulated, indicating it was not completely broken down and remained harmful, especially at higher trophic levels."}]}, {"question": "Which of the following actions directly helps protect a local ecosystem by enhancing its biodiversity and supporting native wildlife?", "options": [{"text": "Bringing a unique, exotic plant from another continent to plant in your garden.", "isCorrect": false, "rationale": "The text warns against 'introducing new species' which can become invasive and harm native organisms. Planting exotic species could unintentionally do this."}, {"text": "Clearing a patch of forest to build a new recreational area for the community.", "isCorrect": false, "rationale": "This is an example of 'habitat destruction,' which is identified as the 'biggest threat to wildlife around the world.' It would reduce biodiversity, not enhance it."}, {"text": "Planting native wildflowers and shrubs in your yard that provide food and shelter for local insects and birds.", "isCorrect": true, "rationale": "The text lists 'Planting native species — Growing plants that belong in your area provides food and shelter for native animals' as a way people can help ecosystems. This action directly supports native biodiversity."}, {"text": "Using a strong pesticide in your garden to ensure no insects damage your vegetables.", "isCorrect": false, "rationale": "Rachel Carson's work highlighted how pesticides can harm entire food chains beyond their target. This action could introduce pollution and harm non-target native organisms."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
