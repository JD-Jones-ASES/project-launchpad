<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 0, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which of the following best describes science?", "options": [{"text": "A collection of established facts and formulas.", "isCorrect": false, "rationale": "While science involves facts, the text defines it as an active 'process' of inquiry, not just a static collection of knowledge."}, {"text": "The process of asking questions and finding answers about the natural world.", "isCorrect": true, "rationale": "This definition directly matches the one provided in the text: 'Science—the process of asking questions and finding answers about the natural world.'"}, {"text": "Something that only happens in laboratories with special equipment.", "isCorrect": false, "rationale": "The text explicitly states, 'Science is not just something that happens in laboratories,' countering this common misconception."}, {"text": "Making random guesses about how things work without any specific purpose.", "isCorrect": false, "rationale": "The text distinguishes scientific inquiry from random guesses, emphasizing that scientists make 'hypotheses' which are testable and educated guesses."}]}, {"question": "Which of the following statements represents a testable hypothesis, according to the definition in the text?", "options": [{"text": "Blue is the prettiest color for a car.", "isCorrect": false, "rationale": "This is an opinion and cannot be objectively tested or proven right or wrong through an experiment."}, {"text": "Reading books is more enjoyable than watching movies.", "isCorrect": false, "rationale": "This is a subjective opinion based on personal preference and is not testable by scientific methods."}, {"text": "Plants grown in soil with added fertilizer will produce more fruit than plants grown without fertilizer.", "isCorrect": true, "rationale": "This is a testable prediction. An experiment could be designed to grow plants under these two conditions and measure their fruit production to determine if the hypothesis is supported."}, {"text": "Dogs are inherently better pets than cats.", "isCorrect": false, "rationale": "This is a subjective opinion, as 'better' is not an objectively measurable quality in this context."}]}, {"question": "What is the primary difference between a 'guess' and a 'hypothesis' as explained in the text?", "options": [{"text": "A guess is always correct, while a hypothesis can be wrong.", "isCorrect": false, "rationale": "Both guesses and hypotheses can be wrong. The text specifies that a hypothesis is 'a testable prediction,' not necessarily a correct one."}, {"text": "A guess is made by anyone, but a hypothesis is only made by professional scientists.", "isCorrect": false, "rationale": "While hypotheses are a scientific tool, the text implies that 'thinking like a scientist' (which includes forming hypotheses) can be done by anyone who notices something and tries to figure out how it works."}, {"text": "A hypothesis is a testable prediction, whereas a typical guess or opinion often cannot be tested through an experiment.", "isCorrect": true, "rationale": "The text explicitly states that a hypothesis is 'a testable prediction' and gives examples of untestable opinions ('chocolate ice cream is the best') versus testable hypotheses ('ice melts faster in warm water')."}, {"text": "A guess is based on observation, while a hypothesis is based on pure imagination.", "isCorrect": false, "rationale": "The text implies that hypotheses are 'educated guesses' often stemming from observations, distinguishing them from random or purely imaginative guesses."}]}, {"question": "A team of researchers is investigating the migration patterns of monarch butterflies across North America and how climate change might impact their routes. Which branch of science are they primarily working within?", "options": [{"text": "Physics", "isCorrect": false, "rationale": "Physics deals with forces, energy, and motion, not directly with the study of living organisms and their behaviors."}, {"text": "Earth Science", "isCorrect": false, "rationale": "Earth Science focuses on the planet itself. While climate change (an Earth Science topic) is a factor, the primary subject of study here is a living organism."}, {"text": "Life Science", "isCorrect": true, "rationale": "Life Science is defined as 'the study of living things,' which directly applies to studying monarch butterflies and their biological patterns like migration."}, {"text": "Chemistry", "isCorrect": false, "rationale": "Chemistry focuses on the composition and changes of matter, not the large-scale behaviors of organisms."}]}, {"question": "If you are trying to understand why sugar dissolves faster in hot tea than in cold tea, which branch of science would be most relevant to your investigation?", "options": [{"text": "Life Science", "isCorrect": false, "rationale": "Life Science studies living things. Dissolving sugar is a chemical and physical process, not a biological one."}, {"text": "Earth Science", "isCorrect": false, "rationale": "Earth Science studies our planet. While sugar comes from plants (Life Science) and is found on Earth, the process of dissolving relates to its composition and changes, not Earth's geology or atmosphere."}, {"text": "Chemistry", "isCorrect": true, "rationale": "Chemistry is defined as 'the study of what things are made of and how they change.' Dissolving sugar involves the interaction and change in state of matter, which is central to chemistry."}, {"text": "Physics", "isCorrect": false, "rationale": "Physics studies forces, energy, and motion. While energy (heat) is involved, the focus on 'what things are made of and how they change' (like dissolving) falls under chemistry."}]}, {"question": "A student is observing how a pendulum swings and noting how its length affects the time it takes to complete one swing. Which branch of science is this student primarily exploring?", "options": [{"text": "Chemistry", "isCorrect": false, "rationale": "Chemistry deals with the composition and changes of matter, not the motion or forces acting on an object like a pendulum."}, {"text": "Earth Science", "isCorrect": false, "rationale": "Earth Science focuses on our planet. The behavior of a pendulum is a general principle of motion and forces, not specific to Earth's systems."}, {"text": "Life Science", "isCorrect": false, "rationale": "Life Science is the study of living things. A pendulum is an inanimate object, and its motion is a physical phenomenon."}, {"text": "Physics", "isCorrect": true, "rationale": "Physics is defined as 'the study of forces, energy, and how things move.' Observing the motion of a pendulum and the factors affecting it is a classic example of physics."}]}, {"question": "The text states that science is 'everywhere' and not just in laboratories. Which example from the text best illustrates this idea?", "options": [{"text": "Scientists wearing special lab coats while conducting experiments.", "isCorrect": false, "rationale": "This example reinforces the idea of science being confined to labs, which is the misconception the text aims to correct."}, {"text": "Wondering where puddles go on a sunny day or how ants find their way back to their hill.", "isCorrect": true, "rationale": "The text uses these exact examples to show that everyday observations and questions are instances of 'thinking like a scientist,' demonstrating science's presence outside formal labs."}, {"text": "The organization of science into four distinct branches for study.", "isCorrect": false, "rationale": "While organizing science makes it manageable, it doesn't directly illustrate its omnipresence in daily life outside of formal study."}, {"text": "The fact that all four branches of science are taught in this textbook.", "isCorrect": false, "rationale": "This refers to the educational structure of science, not its pervasive nature in everyday experiences."}]}, {"question": "Why do scientists organize the vast field of science into different branches like Life Science and Earth Science?", "options": [{"text": "To create competition among different scientific research groups.", "isCorrect": false, "rationale": "The text does not suggest competition as a reason; rather, it implies organization for clarity and manageability."}, {"text": "To ensure that each branch receives equal funding for research.", "isCorrect": false, "rationale": "The text doesn't mention funding allocation as a reason for branching science."}, {"text": "Because science is a big subject, and organizing it into branches makes it more manageable to study and specialize.", "isCorrect": true, "rationale": "The text explicitly states, 'Science is a big subject, so scientists organize it into branches,' indicating that organization aids in managing its vastness."}, {"text": "To prevent scientists from studying topics outside their area of expertise.", "isCorrect": false, "rationale": "While specialization is a result, the primary purpose of organization is manageability, not strict prevention of interdisciplinary work."}]}, {"question": "The 'sciencelife' section describes how your body uses chemistry to turn food into energy, which then lets your muscles move. If a plant grows using sunlight and nutrients from the soil, and an animal eats that plant for energy, what combination of scientific branches is primarily demonstrated by this entire sequence?", "options": [{"text": "Physics (plant growth), then Chemistry (animal eating).", "isCorrect": false, "rationale": "Plant growth is Life Science, and energy transformation in animals is Chemistry and Physics, so this option is incorrect."}, {"text": "Life Science (plant growth), then Earth Science (nutrients), then Life Science (animal eating), then Chemistry (energy conversion).", "isCorrect": true, "rationale": "Plant growth is Life Science, soil nutrients are Earth Science, an animal eating a plant is Life Science (interaction of living things), and energy conversion within the animal is Chemistry. This covers the most relevant branches in sequence."}, {"text": "Chemistry (plant growth), then Physics (animal eating).", "isCorrect": false, "rationale": "Plant growth is Life Science, and animal eating is a biological process involving Life Science, then chemistry for digestion. This option is incorrect."}, {"text": "Earth Science (plant growth), then Physics (animal eating).", "isCorrect": false, "rationale": "Plant growth is Life Science, not Earth Science, although Earth Science provides the environment. Animal eating involves Life Science and Chemistry, not solely Physics."}]}, {"question": "A common misconception is that a hypothesis is just a random guess. How does the text clarify what a hypothesis truly is?", "options": [{"text": "By stating that a hypothesis is always proven correct by scientists.", "isCorrect": false, "rationale": "The text defines a hypothesis as 'a testable prediction,' implying it can be right or wrong, not always correct."}, {"text": "By explaining that a hypothesis is an opinion that cannot be tested.", "isCorrect": false, "rationale": "The text explicitly contrasts a hypothesis with an opinion, stating that a hypothesis *can* be tested, while an opinion cannot."}, {"text": "By emphasizing that a hypothesis is an educated guess based on observation and must be testable through an experiment.", "isCorrect": true, "rationale": "The text clarifies that a hypothesis is 'a scientist's best educated guess about what will happen and why' and crucial, 'A hypothesis can be tested,' directly addressing the misconception."}, {"text": "By suggesting that a hypothesis is only made by people wearing white lab coats.", "isCorrect": false, "rationale": "This relates to another misconception about where science happens, not the nature of a hypothesis itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
