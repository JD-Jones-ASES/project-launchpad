<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 6, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is NOT one of the four essential requirements a plant needs to survive, as described in the text?", "options": [{"text": "Sunlight", "isCorrect": false, "rationale": "Sunlight is explicitly stated as an essential need for energy to make food."}, {"text": "Oxygen gas", "isCorrect": true, "rationale": "While animals need oxygen, the text states that plants 'release a gas called oxygen (O2) into the air' and 'take in carbon dioxide (CO2)' for photosynthesis, not oxygen as a primary requirement for their survival as food-making entities."}, {"text": "Water", "isCorrect": false, "rationale": "Water is stated as essential for photosynthesis and for keeping plant cells firm."}, {"text": "Carbon dioxide gas", "isCorrect": false, "rationale": "Carbon dioxide is a specific gas in the air that plants need for photosynthesis."}], "id": "q01"}, {"question": "A botanist observes that a new plant species consistently grows its stems and leaves in the direction of the nearest light source. This phenomenon is best explained by which of the following concepts from the text?", "options": [{"text": "The plant is performing photosynthesis more efficiently in that direction due to increased humidity.", "isCorrect": false, "rationale": "While photosynthesis is linked to light, the phenomenon described is a growth response, not directly a claim about efficiency due to humidity."}, {"text": "The plant is exhibiting phototropism, a natural response of turning toward light.", "isCorrect": true, "rationale": "The text defines phototropism as 'turning toward light' and uses the example of a houseplant bending toward a window."}, {"text": "The plant is seeking out warmer temperatures associated with light to protect itself from cold.", "isCorrect": false, "rationale": "The text links growing toward light to the need for sunlight energy to make sugar, not primarily for warmth."}, {"text": "The plant's roots are signaling the stem to move towards moisture in the air that is often found near light sources.", "isCorrect": false, "rationale": "The text does not suggest roots signal stems to move towards aerial moisture in response to light; it specifically mentions light as the driver for phototropism."}], "id": "q02"}, {"question": "Besides its crucial role in photosynthesis, how does water primarily contribute to a plant's physical structure and appearance?", "options": [{"text": "It helps roots absorb minerals by dissolving them in the soil.", "isCorrect": false, "rationale": "While water does dissolve minerals, its primary contribution to physical structure as described is different."}, {"text": "It makes plant cells firm and full, preventing wilting and allowing the plant to stand upright.", "isCorrect": true, "rationale": "The text explicitly states: 'Water also keeps plant cells firm and full — think of how a balloon feels when it is full of air versus when it is empty. A well-watered plant stands up straight. A plant that does not get enough water wilts and droops.'"}, {"text": "It creates a protective layer on leaves to prevent disease and pest infestation.", "isCorrect": false, "rationale": "The text does not mention water creating a protective layer for disease prevention."}, {"text": "It carries oxygen from the roots to the leaves to aid in respiration.", "isCorrect": false, "rationale": "Plants primarily release oxygen; the text doesn't describe water carrying oxygen from roots to leaves for respiration."}], "id": "q03"}, {"question": "A gardener notices their potted plant's leaves are turning yellow, and the soil smells foul. Upon inspection, they find the roots are soft and dark. What is the most likely cause of this issue, based on the text?", "options": [{"text": "The plant is not receiving enough sunlight for photosynthesis, leading to nutrient deficiency.", "isCorrect": false, "rationale": "Lack of sunlight would affect growth, but the symptoms (foul smell, soft/dark roots) strongly point to another issue described in the text."}, {"text": "The plant is not getting enough carbon dioxide from the air, impeding its ability to make food.", "isCorrect": false, "rationale": "Insufficient carbon dioxide would impact photosynthesis, but the described symptoms are more specific to a different problem."}, {"text": "The plant has been overwatered, leading to root rot because the roots cannot get the air they need.", "isCorrect": true, "rationale": "The text states: 'If roots sit in soggy soil, they cannot get the air they need and may start to rot.' This perfectly matches the symptoms of foul-smelling soil and decaying roots."}, {"text": "The plant is lacking essential minerals in the soil, causing the roots to weaken and discolor.", "isCorrect": false, "rationale": "Mineral deficiency would affect overall health, but the text specifically links soggy soil to root rot and foul odors."}], "id": "q04"}, {"question": "What is the primary exchange of gases that occurs through a plant's stomata during photosynthesis?", "options": [{"text": "Intake of oxygen, release of carbon dioxide.", "isCorrect": false, "rationale": "This describes animal respiration, not plant photosynthesis."}, {"text": "Intake of nitrogen, release of oxygen.", "isCorrect": false, "rationale": "Plants do not primarily exchange nitrogen through their leaves for photosynthesis."}, {"text": "Intake of carbon dioxide, release of oxygen.", "isCorrect": true, "rationale": "The text explicitly states: 'Leaves take in carbon dioxide through their stomata. During photosynthesis, the plant uses carbon dioxide... Plants also release a gas called oxygen (O2) into the air.'"}, {"text": "Intake of oxygen, release of nitrogen.", "isCorrect": false, "rationale": "This gas exchange does not align with the process of photosynthesis described."}], "id": "q05"}, {"question": "A student states, 'Plants eat soil to get their food.' Based on the analogy provided in the 'teachernote' section, which response best corrects this misconception?", "options": [{"text": "Plants actually eat sunlight, not soil, for their food.", "isCorrect": false, "rationale": "While sunlight is energy, it's used to *make* food (sugar), not eaten as food itself. The analogy clarifies the role of soil."}, {"text": "The soil provides water, which is the plant's main food source.", "isCorrect": false, "rationale": "Water is a reactant in photosynthesis, not the plant's 'food' in the way the analogy explains."}, {"text": "Soil provides minerals, which are like vitamins for plants, while the plant's real food is the sugar it makes through photosynthesis.", "isCorrect": true, "rationale": "The 'teachernote' clearly states: 'For a plant, minerals in the soil are like that vitamin. The plant's real food is the sugar it makes through photosynthesis.'"}, {"text": "Plants eat insects from the soil, which are their primary food source.", "isCorrect": false, "rationale": "The text does not mention plants eating insects as their primary food source; it focuses on photosynthesis."}], "id": "q06"}, {"question": "In the context of plant health, what are 'nutrients' primarily referred to as?", "options": [{"text": "The sugar a plant makes during photosynthesis.", "isCorrect": false, "rationale": "Sugar is the plant's food, not 'nutrients' as defined in the text."}, {"text": "The carbon dioxide absorbed from the air.", "isCorrect": false, "rationale": "Carbon dioxide is a raw material for photosynthesis, not 'nutrients' in the defined sense."}, {"text": "Minerals like nitrogen, phosphorus, and potassium dissolved in soil water that help plants grow and stay healthy.", "isCorrect": true, "rationale": "The text defines 'Nutrients' as 'substances that a living thing needs to grow and stay healthy' and specifies they are 'minerals — tiny amounts of substances like nitrogen, phosphorus, and potassium that plants need to build strong stems, green leaves, and healthy roots.'"}, {"text": "The sunlight absorbed by the leaves.", "isCorrect": false, "rationale": "Sunlight is the energy source, not 'nutrients' in the chemical substance sense."}], "id": "q07"}, {"question": "A gardener lives in an area with a large, dense oak tree that casts significant shade over a particular section of their yard for most of the day. Which of the following plants would the text suggest is MOST suitable to plant in this shady section?", "options": [{"text": "Sunflowers, because they need full exposure to light.", "isCorrect": false, "rationale": "The text states 'Sunflowers love full, bright sunshine all day long,' making them unsuitable for a shady spot."}, {"text": "Tomatoes, which thrive in varied light conditions.", "isCorrect": false, "rationale": "The text does not mention tomatoes, but typically they require significant sunlight."}, {"text": "Lettuce, as it grows quickly even with minimal light.", "isCorrect": false, "rationale": "While lettuce can be grown hydroponically, the text does not specify its light requirements, especially for shade."}, {"text": "Ferns, which are described as preferring shady spots.", "isCorrect": true, "rationale": "The text explicitly states: 'Ferns prefer shady spots under tall trees,' directly matching the given scenario."}], "id": "q08"}, {"question": "What is the key distinguishing feature of hydroponics compared to traditional soil-based plant cultivation?", "options": [{"text": "Plants are grown entirely without water, relying on humidity.", "isCorrect": false, "rationale": "This is incorrect; hydroponics specifically uses water as the growing medium."}, {"text": "Plants are grown using only artificial light, not natural sunlight.", "isCorrect": false, "rationale": "While artificial light can be used, it's not the defining characteristic that distinguishes it from traditional methods; the text mentions greenhouses, implying natural light can be used."}, {"text": "Plants are grown in water enriched with dissolved minerals instead of soil.", "isCorrect": true, "rationale": "The text states: 'Some plants grow in water with dissolved minerals added to it. This is called hydroponics... They just skip the soil.'"}, {"text": "Plants are grown in oxygen-rich soil with no added nutrients.", "isCorrect": false, "rationale": "This describes soil-based growth and contradicts the 'no added nutrients' part, as hydroponics focuses on providing nutrients via water."}], "id": "q09"}, {"question": "A scientist on a space station is planning to grow plants for food, where natural soil is unavailable. Based on the principles discussed in the section, which combination of provisions would be essential for successful plant growth in this environment?", "options": [{"text": "Sunlight, oxygen, pure water, and organic compost.", "isCorrect": false, "rationale": "Oxygen is released by plants, not primarily consumed for growth. Organic compost implies soil, which is unavailable. Pure water lacks essential minerals."}, {"text": "Artificial light, water with dissolved minerals, carbon dioxide, and air circulation.", "isCorrect": true, "rationale": "This option provides all four essential needs: light (artificial light), water (water with dissolved minerals, mimicking hydroponics), air (carbon dioxide), and nutrients (dissolved minerals). Air circulation ensures CO2 availability."}, {"text": "Heat lamps, nitrogen gas, nutrient-depleted water, and a soil substitute.", "isCorrect": false, "rationale": "Heat lamps provide warmth, not necessarily the specific light spectrum needed. Nitrogen gas is not the primary gas plants need for photosynthesis; carbon dioxide is. Nutrient-depleted water would prevent growth, and a 'soil substitute' isn't specific enough compared to hydroponics."}, {"text": "Darkness, humidity, filtered air, and a nutrient-free growth medium.", "isCorrect": false, "rationale": "Plants cannot survive in darkness, and a nutrient-free medium would prevent growth. Humidity alone isn't a substitute for water and CO2."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
