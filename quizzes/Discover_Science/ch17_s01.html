<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 17, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the most accurate definition of weather according to the provided text?", "options": [{"text": "The average temperature and rainfall patterns of a region over many years.", "isCorrect": false, "rationale": "This describes climate, not weather. The text defines weather as the condition of the atmosphere in a particular place at a particular time, emphasizing what is happening 'right now.'"}, {"text": "The condition of the atmosphere in a particular place at a particular time.", "isCorrect": true, "rationale": "This is the direct and precise definition of weather provided in the text."}, {"text": "The predictable changes in temperature and wind that occur over seasons.", "isCorrect": false, "rationale": "While temperature and wind are parts of weather, the text emphasizes weather's dynamic nature and its immediate state, not just predictable seasonal changes."}, {"text": "The long-term effects of the Sun's energy on Earth's land and water bodies.", "isCorrect": false, "rationale": "This describes broader atmospheric processes or climate drivers, not the immediate, specific definition of weather itself."}]}, {"question": "The text states that 'weather changes all the time.' Which scenario best illustrates this statement?", "options": [{"text": "A desert region consistently experiences very hot days and cool nights throughout the year.", "isCorrect": false, "rationale": "This describes a consistent climate pattern characteristic of a desert, not the moment-to-moment or day-to-day variability of weather."}, {"text": "A coastal city has a mild, rainy climate, with moderate temperatures year-round.", "isCorrect": false, "rationale": "This describes a stable climate, not the frequent and often unpredictable changes in daily weather."}, {"text": "It was sunny and calm this morning, but by the afternoon, heavy rain and strong winds began.", "isCorrect": true, "rationale": "This scenario directly exemplifies how weather can change rapidly within a single day, as highlighted by the text's example: 'It can be sunny in the morning and rainy by the afternoon.'"}, {"text": "Farmers in a temperate zone always plant their crops in spring to ensure they receive adequate rainfall.", "isCorrect": false, "rationale": "This reflects a seasonal agricultural practice based on general climate patterns, not the immediate and 'all the time' variability of weather."}]}, {"question": "When a weather forecaster describes 'how fast the air is moving' and 'which direction it's blowing,' which main part of weather is being discussed?", "options": [{"text": "Temperature", "isCorrect": false, "rationale": "Temperature refers to how hot or cold the air is, not its movement or direction."}, {"text": "Precipitation", "isCorrect": false, "rationale": "Precipitation refers to water falling from the sky (rain, snow, sleet, or hail), not air movement."}, {"text": "Clouds", "isCorrect": false, "rationale": "Clouds refer to the types of clouds in the sky and how much of the sky they cover, not the movement of air."}, {"text": "Wind", "isCorrect": true, "rationale": "The text explicitly defines Wind as inquiring 'Is the air moving? How fast? Which direction?'"}]}, {"question": "Imagine you are a meteorologist making observations. Which of the following would NOT be considered one of the 'four main parts' of weather specifically listed in the text?", "options": [{"text": "The amount of humidity in the air.", "isCorrect": true, "rationale": "The text explicitly lists Temperature, Wind, Clouds, and Precipitation as the four main parts scientists look at. While humidity is an atmospheric condition, it is not included in this specific enumerated list of four."}, {"text": "The type and coverage of clouds in the sky.", "isCorrect": false, "rationale": "Clouds are explicitly listed as one of the four main parts of weather."}, {"text": "Whether water is falling from the sky as rain or snow.", "isCorrect": false, "rationale": "Precipitation is explicitly listed as one of the four main parts of weather."}, {"text": "How hot or cold the air feels outside.", "isCorrect": false, "rationale": "Temperature is explicitly listed as one of the four main parts of weather."}]}, {"question": "According to the text, what is the primary relationship between the water cycle and weather?", "options": [{"text": "The water cycle influences long-term climate changes, not daily weather.", "isCorrect": false, "rationale": "The text states that the water cycle 'drives much of our weather' directly, affecting daily phenomena like clouds and precipitation."}, {"text": "The water cycle is responsible for heating Earth's surface, which in turn causes weather.", "isCorrect": false, "rationale": "The Sun heats the water, which then evaporates as part of the water cycle. The water cycle is a process driven by the Sun, not the initial heat source itself."}, {"text": "It is the 'engine that drives much of our weather,' particularly phenomena like clouds and precipitation.", "isCorrect": true, "rationale": "This statement directly reflects the text's explanation of the water cycle's role, including its specific connection to clouds and precipitation."}, {"text": "It ensures that the atmosphere always remains warm and calm, preventing stormy weather.", "isCorrect": false, "rationale": "The water cycle is involved in forming stormy weather (e.g., precipitation), and the text states the atmosphere is 'always changing,' not always calm."}]}, {"question": "If the Sun's heat were absent, which initial stage of the water cycle, critical for forming clouds and precipitation, would be prevented first?", "options": [{"text": "Condensation, because water vapor would not cool.", "isCorrect": false, "rationale": "Condensation requires water vapor to be present and cool. Without the Sun's heat, the prior step of creating water vapor would be impacted first."}, {"text": "Precipitation, as droplets would never grow heavy enough.", "isCorrect": false, "rationale": "Precipitation is the final stage of the process described. The entire cycle would be disrupted at an earlier point."}, {"text": "Evaporation, as water on Earth's surface would not turn into water vapor.", "isCorrect": true, "rationale": "The text states, 'The Sun heats water on Earth's surface, and some of it evaporates into the air as water vapor.' Without the Sun's heat, evaporation would not occur, stopping the cycle at this initial step."}, {"text": "Runoff, because water wouldn't flow into rivers and oceans.", "isCorrect": false, "rationale": "Runoff is not mentioned as a direct stage in the text's explanation of the water cycle's link to weather, and it wouldn't be the *first* stage impacted in relation to cloud formation."}]}, {"question": "A farmer in a specific region is experiencing a severe drought, leading to crop failure. This situation best illustrates which aspect of 'Why Does Weather Matter?'", "options": [{"text": "How weather influences what people wear daily.", "isCorrect": false, "rationale": "While drought affects daily life, its primary impact on crops relates to food production, not clothing choices."}, {"text": "How weather impacts recreational activities and leisure time.", "isCorrect": false, "rationale": "Crop failure is a serious economic and food security issue, not primarily about recreation."}, {"text": "How weather affects the food we eat and the ability to grow crops.", "isCorrect": true, "rationale": "The text explicitly states: 'Farmers need the right weather to grow crops. Too little rain means drought.' This directly links drought to food production."}, {"text": "How weather conditions make travel difficult and dangerous.", "isCorrect": false, "rationale": "Drought impacts agriculture more directly than travel conditions, which are usually affected by conditions like snow, ice, or fog."}]}, {"question": "A family planned a trip to the park, but the weather forecast predicted a thunderstorm. They decided to stay home instead. This decision reflects which benefit of understanding weather, as discussed in the text?", "options": [{"text": "It helps determine what kinds of clothes to purchase for the year.", "isCorrect": false, "rationale": "While weather affects clothing, the immediate decision to stay home due to a thunderstorm is about daily planning and safety, not long-term purchases."}, {"text": "It allows people to plan their days and stay safe during storms.", "isCorrect": true, "rationale": "The text states, 'Understanding weather helps people plan their days, stay safe during storms, and grow the food we all eat.' The decision to stay home during a thunderstorm aligns with planning for safety."}, {"text": "It ensures that farmers receive enough rain for their crops.", "isCorrect": false, "rationale": "This scenario is about personal planning and safety, not agricultural needs."}, {"text": "It primarily helps scientists study long-term climate trends.", "isCorrect": false, "rationale": "The example describes immediate personal decision-making based on a forecast, not long-term scientific study of climate."}]}, {"question": "Why is it important to understand the concept of the atmosphere when defining weather, according      to the text?", "options": [{"text": "The atmosphere is where all Earth's freshwater is stored before falling as precipitation.", "isCorrect": false, "rationale": "The atmosphere contains water vapor, but it is not where 'all' freshwater is stored; the text's focus is on weather happening *in* the atmosphere."}, {"text": "Weather is defined as the 'condition of the atmosphere' and 'what the atmosphere is doing right now.'", "isCorrect": true, "rationale": "The text directly links the definition of weather to the condition and activity of the atmosphere, stating: 'Weather—the condition of the atmosphere in a particular place at a particular time.'"}, {"text": "The atmosphere prevents the Sun's rays from reaching Earth, creating cooler weather.", "isCorrect": false, "rationale": "The atmosphere filters some rays, but it doesn't prevent them from reaching Earth entirely, and weather can be warm or cold."}, {"text": "Without the atmosphere, the Earth would experience only consistent, unchanging weather patterns.", "isCorrect": false, "rationale": "The text implies the atmosphere's changing nature *is* weather, stating the atmosphere 'is always changing,' rather than suggesting its absence would create unchanging patterns."}]}, {"question": "Which statement best synthesizes the main idea of the section 'What Is Weather?'?", "options": [{"text": "Weather is primarily concerned with the long-term patterns of temperature and precipitation in specific regions.", "isCorrect": false, "rationale": "This description aligns more with climate than the immediate and dynamic nature of weather, and it omits other key components and impacts discussed."}, {"text": "The most important aspect of weather is its effect on farmers' ability to grow crops and produce food.", "isCorrect": false, "rationale": "While significant, this is only one of many impacts discussed; it doesn't cover the fundamental definition, components, or dynamic nature of weather itself."}, {"text": "Weather is the immediate condition of the atmosphere, driven by the water cycle, characterized by four main components, and profoundly affects nearly all aspects of human life.", "isCorrect": true, "rationale": "This statement comprehensively summarizes all the key elements presented in the text: the definition, the driving force, the descriptive components, and the broad importance."}, {"text": "Understanding weather forecasts is mainly useful for planning outdoor recreational activities and choosing daily attire.", "isCorrect": false, "rationale": "This option focuses on only a few specific applications and overlooks the fundamental definition, components, and broader importance of weather as presented in the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
