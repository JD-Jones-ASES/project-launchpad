    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the fundamental difference between a rock and a mineral, according to the text?", "options": [{"text": "A mineral is alive and can grow, while a rock is nonliving.", "isCorrect": false, "rationale": "The text states that rocks are not alive, but it does not imply minerals are. Both are natural, nonliving solids."}, {"text": "A rock is typically a mixture of several different minerals, whereas a mineral is a single substance with a specific chemical makeup.", "isCorrect": true, "rationale": "The text explicitly states: 'a mineral is a single substance, but a rock is usually a mixture of several minerals stuck together.' This highlights the key difference."}, {"text": "Minerals are found on mountaintops, while rocks are only found at the bottom of the ocean.", "isCorrect": false, "rationale": "The text states rocks are found 'along riverbeds, on mountaintops, and even at the bottom of the ocean,' and that rocks are made of minerals, implying minerals are found in all these places too."}, {"text": "Rocks are rare and difficult to find, while minerals are very common.", "isCorrect": false, "rationale": "The text states 'Rocks are everywhere,' and 'The entire outer layer of Earth is made of rock!', indicating their abundance. While minerals are the building blocks, rocks themselves are also very common."}], "id": "q01"}, {"question": "Based on the description in the text, what is the defining characteristic that differentiates a mineral from any other natural solid material?", "options": [{"text": "It must be able to dissolve in water.", "isCorrect": false, "rationale": "The text does not mention solubility in water as a defining characteristic of all minerals."}, {"text": "It must have a specific chemical makeup and a crystal shape.", "isCorrect": true, "rationale": "The definition provided for a mineral is 'A natural, nonliving solid that has a specific chemical makeup and a crystal shape.' These are the critical defining properties."}, {"text": "It must be hard and shiny.", "isCorrect": false, "rationale": "The text notes 'Some minerals are hard. Some are soft. Some are shiny. Some are dull,' indicating these are variable properties, not universal defining characteristics."}, {"text": "It must be discovered by scientists from a list of over 5,000 types.", "isCorrect": false, "rationale": "While scientists have discovered many minerals, the discovery itself is not what defines a mineral's inherent properties."}], "id": "q02"}, {"question": "Imagine you pick up a piece of granite and observe it under a magnifying glass, noticing light-colored bits, glassy pieces, and dark, shiny flakes. According to the text, what does this observation primarily demonstrate?", "options": [{"text": "That granite is a very rare type of rock.", "isCorrect": false, "rationale": "The text uses granite as a common example to illustrate a point, not to suggest it's rare."}, {"text": "That rocks, like granite, are typically composed of multiple distinct minerals blended together.", "isCorrect": true, "rationale": "The text uses this exact example to explain that 'a rock is usually a mixture of several minerals stuck together,' identifying the light-colored bits as feldspar, glassy as quartz, and dark flakes as mica."}, {"text": "That all minerals have different colors and textures.", "isCorrect": false, "rationale": "While true that different minerals can have different colors/textures, the primary point of this observation in the text is to illustrate that a single rock is made of multiple minerals, not just the variability of minerals themselves."}, {"text": "That granite is made of a single mineral, despite its varied appearance.", "isCorrect": false, "rationale": "The text explicitly states the opposite, identifying three different minerals within granite, proving it's a mixture."}], "id": "q03"}, {"question": "The 'Think About It' section poses questions about why different rocks look different and why some have big grains while others have tiny ones. Based on the entire section content, what would be the most comprehensive explanation for these differences?", "options": [{"text": "Rocks look different simply because they are all unique and random creations of nature.", "isCorrect": false, "rationale": "While rocks are natural, their characteristics are not random but determined by specific geological processes and composition."}, {"text": "The differences are primarily due to variations in the types of minerals present, their proportions, and the conditions under which the rock formed (affecting grain size).", "isCorrect": true, "rationale": "The text explains rocks are made of minerals and that rocks are usually mixtures. The 'Think About It' prompt, combined with the example of granite's mineral composition, implies that the specific minerals and how they are 'locked together' (grain size from formation conditions) directly influence a rock's appearance."}, {"text": "All rocks look different because they are constantly changing shape and color.", "isCorrect": false, "rationale": "The text doesn't suggest constant, visible changes in shape and color as the primary reason for their current differences, but rather their inherent composition and formation."}, {"text": "The appearance of a rock is determined solely by how long it has been exposed to the elements.", "isCorrect": false, "rationale": "While weathering can affect a rock's surface, the fundamental appearance (mineral composition, grain size) is determined during its formation, as hinted by the 'Think About It' question about big vs. tiny grains."}], "id": "q04"}, {"question": "Which of the following properties is specific to Calcite, as mentioned in the text?", "options": [{"text": "It is the most abundant mineral in Earth's crust.", "isCorrect": false, "rationale": "Feldspar is identified as 'the most abundant mineral in Earth's crust,' not Calcite."}, {"text": "It can be peeled apart in thin sheets.", "isCorrect": false, "rationale": "Mica is described as 'shiny and flat. You can peel it apart in thin sheets,' not Calcite."}, {"text": "It fizzes when you put vinegar on it.", "isCorrect": true, "rationale": "The text states: 'Calcite — a white or clear mineral found in limestone and marble. It fizzes when you put vinegar on it!'"}, {"text": "It is clear like glass or comes in colors like pink, purple, or smoky gray.", "isCorrect": false, "rationale": "Quartz is described as having these characteristics, not Calcite."}], "id": "q05"}, {"question": "The text emphasizes that 'The entire outer layer of Earth is made of rock!' This statement primarily serves to highlight:", "options": [{"text": "The difficulty of finding rocks in nature.", "isCorrect": false, "rationale": "The statement implies the opposite, that rocks are extremely common and widespread."}, {"text": "The relatively small number of minerals found on Earth.", "isCorrect": false, "rationale": "The text states over 5,000 different minerals have been discovered, which is a significant number. This statement focuses on the prevalence of rocks, not the quantity of minerals."}, {"text": "The vital and ubiquitous presence of rocks as a fundamental component of our planet.", "isCorrect": true, "rationale": "The statement stresses that rocks form the 'entire outer layer of Earth,' emphasizing their widespread presence and fundamental importance to the planet's structure."}, {"text": "That rocks are living organisms essential for Earth's ecosystems.", "isCorrect": false, "rationale": "The text explicitly states, 'Rocks are not alive. They do not grow, eat, or breathe.'"}], "id": "q06"}, {"question": "Which of the following is NOT a characteristic of a rock, according to the text?", "options": [{"text": "It is a solid, natural material.", "isCorrect": false, "rationale": "The definition of a rock states it is 'a solid, natural material.'"}, {"text": "It is made of one or more minerals.", "isCorrect": false, "rationale": "The definition of a rock states it is 'made of one or more minerals.'"}, {"text": "It grows, eats, and breathes.", "isCorrect": true, "rationale": "The text explicitly states: 'Rocks are not alive. They do not grow, eat, or breathe.'"}, {"text": "It forms the outer layer of Earth.", "isCorrect": false, "rationale": "The text states: 'The entire outer layer of Earth is made of rock!'"}], "id": "q07"}, {"question": "A scientist finds a new natural, nonliving solid substance that has a consistent chemical formula and a distinct, repeating internal structure. Based on the textbook's definitions, how should this substance be classified?", "options": [{"text": "As a type of soil.", "isCorrect": false, "rationale": "Soil is typically a mixture of organic matter, minerals, and other substances, not a single, chemically consistent solid with a crystal shape."}, {"text": "As a rock, because all natural solids are rocks.", "isCorrect": false, "rationale": "The definition of a rock specifies it is 'made of one or more minerals.' This substance fits the definition of a mineral more precisely."}, {"text": "As a mineral, due to its specific chemical makeup and crystal shape.", "isCorrect": true, "rationale": "The definition of a mineral is 'A natural, nonliving solid that has a specific chemical makeup and a crystal shape.' The description perfectly matches this definition."}, {"text": "As a mixture, because all natural solids are mixtures.", "isCorrect": false, "rationale": "The description implies a single, consistent substance, not a mixture, and the text clarifies that minerals are single substances."}], "id": "q08"}, {"question": "Which mineral is known for being 'the most abundant mineral in Earth's crust' and is usually white or pink?", "options": [{"text": "Quartz", "isCorrect": false, "rationale": "Quartz is one of the most common minerals but not specifically identified as 'the most abundant in Earth's crust.' It's known for being clear or various colors."}, {"text": "Mica", "isCorrect": false, "rationale": "Mica is known for its shiny, flat appearance and ability to peel in thin sheets, not for being the most abundant or typically white/pink."}, {"text": "Calcite", "isCorrect": false, "rationale": "Calcite is found in limestone and marble and fizzes with vinegar. It's not identified as the most abundant in the crust."}, {"text": "Feldspar", "isCorrect": true, "rationale": "The text specifically states: 'Feldspar — the most abundant mineral in Earth's crust. It is usually white or pink.'"}], "id": "q09"}, {"question": "While most rocks are made of several minerals, the text provides an example of a rock made mostly of just one mineral. Which rock and its primary mineral is this?", "options": [{"text": "Granite, made mostly of Quartz.", "isCorrect": false, "rationale": "Granite is given as an example of a rock made of several minerals (Feldspar, Quartz, Mica), not just one."}, {"text": "Limestone, made mostly of Calcite.", "isCorrect": true, "rationale": "The text explicitly states: 'Some rocks are made of just one mineral. Limestone, for example, is made mostly of calcite.'"}, {"text": "Marble, made mostly of Mica.", "isCorrect": false, "rationale": "The text mentions Calcite is found in marble, but it doesn't state marble is made mostly of Mica or is an example of a single-mineral rock."}, {"text": "Sandstone, made mostly of Feldspar.", "isCorrect": false, "rationale": "Sandstone is not mentioned in the text as an example, nor is Feldspar specified as its primary component if it were a single-mineral rock."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
