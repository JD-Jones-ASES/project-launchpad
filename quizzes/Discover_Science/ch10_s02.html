<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 10, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A gardener notices that water absorbed by the roots of a plant is not effectively reaching the leaves, causing wilting. Which specialized plant structure is most likely impaired?", "options": [{"text": "Phloem", "isCorrect": false, "rationale": "Phloem is responsible for transporting sugars (food) from the leaves to other parts of the plant, not water from the roots to the leaves."}, {"text": "Xylem", "isCorrect": true, "rationale": "Xylem are tiny tubes inside a plant's stem specifically designed to carry water upward from the roots to the leaves. Impairment would lead to wilting due to lack of water reaching the leaves."}, {"text": "Flowers", "isCorrect": false, "rationale": "Flowers are involved in reproduction and attracting pollinators, not the transport of water throughout the plant."}, {"text": "Roots", "isCorrect": false, "rationale": "While roots absorb water, the question states water is 'not effectively reaching the leaves,' implying the transport system *after* absorption is failing, which is the xylem's role."}], "id": "q01"}, {"question": "Which of the following describes the primary function of a plant's fruit?", "options": [{"text": "To capture sunlight for photosynthesis.", "isCorrect": false, "rationale": "Leaves are the part of the plant responsible for capturing sunlight and photosynthesis."}, {"text": "To anchor the plant in the soil.", "isCorrect": false, "rationale": "Roots are the part of the plant that anchor it in the soil."}, {"text": "To support the leaves and flowers.", "isCorrect": false, "rationale": "The stem is the part of the plant that supports the leaves and flowers."}, {"text": "To surround and protect the seeds.", "isCorrect": true, "rationale": "The definition states that fruit is the part of a plant that surrounds and protects the seeds, aiding in seed dispersal and protection."}], "id": "q02"}, {"question": "A scientist examines a rock sample and determines it was formed from the cooling and solidification of molten material that erupted onto Earth's surface. What type of rock has the scientist found?", "options": [{"text": "Sedimentary rock", "isCorrect": false, "rationale": "Sedimentary rock is formed from pieces of rock, sand, or once-living things pressed and cemented together, not from cooled molten material."}, {"text": "Metamorphic rock", "isCorrect": false, "rationale": "Metamorphic rock is formed when existing rock is changed by heat and pressure deep underground, not directly from molten material."}, {"text": "Igneous rock", "isCorrect": true, "rationale": "Igneous rock is formed when melted rock (magma or lava) cools and hardens. Since the material 'erupted onto Earth's surface,' it refers to lava, which forms igneous rock."}, {"text": "Mineral", "isCorrect": false, "rationale": "A mineral is a natural, nonliving solid with a specific chemical makeup and crystal structure, and is a component of rocks, not a type of rock formed by cooling molten material."}], "id": "q03"}, {"question": "Which statement accurately describes a key difference between magma and lava?", "options": [{"text": "Magma is a solid, while lava is a liquid.", "isCorrect": false, "rationale": "Both magma and lava are forms of melted rock, meaning they are liquid (or semi-liquid), not solid."}, {"text": "Magma is found on Earth's surface, while lava is found underground.", "isCorrect": false, "rationale": "This statement reverses the correct definitions. Magma is underground, and lava is on the surface."}, {"text": "Magma is melted rock found underground, whereas lava is melted rock that has reached Earth's surface.", "isCorrect": true, "rationale": "This accurately differentiates magma as underground melted rock and lava as melted rock that has erupted onto the surface."}, {"text": "Magma forms metamorphic rock, while lava forms sedimentary rock.", "isCorrect": false, "rationale": "Both magma and lava form igneous rock when they cool and harden. Metamorphic and sedimentary rocks are formed through different processes."}], "id": "q04"}, {"question": "You are making a sugar solution. You continue adding sugar to water until no more sugar visibly disappears, and some undissolved sugar remains at the bottom of the container. At this point, you have created a solution that is:", "options": [{"text": "Diluted", "isCorrect": false, "rationale": "A diluted solution has a small amount of solute dissolved in the solvent. This scenario describes the opposite."}, {"text": "Unmixed", "isCorrect": false, "rationale": "The sugar and water have mixed, and some sugar has dissolved. 'Unmixed' implies no interaction."}, {"text": "Highly concentrated", "isCorrect": true, "rationale": "When no more solute can dissolve, the solution has reached its maximum capacity of dissolved solute, meaning it is highly concentrated (often referred to as saturated, though not a vocabulary term here, it aligns with 'highly concentrated')."}, {"text": "Filtered", "isCorrect": false, "rationale": "Filtering is a separation technique, not a description of the state of a solution in terms of dissolved solute."}], "id": "q05"}, {"question": "A chemist needs to separate a mixture containing iron filings, sand, and salt dissolved in water. Which sequence of separation techniques would be most effective in recovering all three original components?", "options": [{"text": "Filtering, then evaporation, then using a magnet.", "isCorrect": false, "rationale": "Using a magnet first is ideal for iron filings. Filtering after evaporation would be less effective for sand if the water is already gone."}, {"text": "Using a magnet, then filtering, then evaporation.", "isCorrect": true, "rationale": "First, use a magnet to remove iron filings. Then, filter the sand from the salt water. Finally, evaporate the water to recover the dissolved salt."}, {"text": "Evaporation, then using a magnet, then filtering.", "isCorrect": false, "rationale": "Evaporation first would leave a solid mixture of sand and salt, making subsequent separation more difficult. Also, iron filings would remain in the solid residue."}, {"text": "Filtering, then evaporation, then dissolving again.", "isCorrect": false, "rationale": "Dissolving again isn't a separation technique for recovering original components, and the sequence isn't optimal for the specific components given."}], "id": "q06"}, {"question": "A student measures the length of a desk three times and records the measurements as 120.1 cm, 120.0 cm, and 120.2 cm. These measurements demonstrate high:", "options": [{"text": "Mass", "isCorrect": false, "rationale": "Mass is the amount of matter in an object, measured in grams or kilograms, not related to the consistency of length measurements."}, {"text": "Volume", "isCorrect": false, "rationale": "Volume is the amount of space something takes up, measured in liters or milliliters, not related to the consistency of length measurements."}, {"text": "Temperature", "isCorrect": false, "rationale": "Temperature is how hot or cold something is, measured in degrees Celsius, unrelated to the consistency of repeated measurements."}, {"text": "Precision", "isCorrect": true, "rationale": "Precision refers to how close together repeated measurements are. The measurements are very close to each other (120.1, 120.0, 120.2), indicating high precision."}], "id": "q07"}, {"question": "To accurately determine the amount of space taken up by a liquid in a laboratory experiment, which measurement tool and unit would be most appropriate?", "options": [{"text": "A balance scale, measured in kilograms (kg).", "isCorrect": false, "rationale": "A balance scale measures mass, not the amount of space taken up (volume), and kilograms are units for mass."}, {"text": "A ruler, measured in centimeters (cm).", "isCorrect": false, "rationale": "A ruler measures length, not the amount of space taken up by a liquid. Centimeters are units for length."}, {"text": "A graduated cylinder, measured in milliliters (mL).", "isCorrect": true, "rationale": "A graduated cylinder is specifically designed to measure the volume of liquids, and milliliters (mL) are the appropriate units for liquid volume."}, {"text": "A thermometer, measured in degrees Celsius (°C).", "isCorrect": false, "rationale": "A thermometer measures temperature, not the amount of space taken up by a liquid."}], "id": "q08"}, {"question": "Which statement accurately distinguishes between a rock and a mineral?", "options": [{"text": "A rock is always a single, pure element, while a mineral is a combination of elements.", "isCorrect": false, "rationale": "Minerals are natural solids with specific chemical makeup, sometimes a single element but often compounds. Rocks are natural materials made of one or more minerals, not pure elements."}, {"text": "A rock is a natural, nonliving solid with a specific chemical makeup, while a mineral is a solid natural material made of one or more minerals.", "isCorrect": false, "rationale": "This statement reverses the definitions. The first part describes a mineral, and the second part describes a rock."}, {"text": "A mineral is a natural, nonliving solid with a specific chemical makeup and crystal structure, while a rock is a solid natural material made of one or more minerals.", "isCorrect": true, "rationale": "This statement correctly defines a mineral as a specific chemical compound or element with a crystal structure, and a rock as an aggregate of one or more minerals."}, {"text": "A mineral is melted rock found underground, while a rock is melted rock on Earth's surface.", "isCorrect": false, "rationale": "This statement describes magma and lava, not rocks and minerals. Minerals are solid components of rocks."}], "id": "q09"}, {"question": "The never-ending process by which rocks continuously change from one type to another over vast geological timescales is known as the:", "options": [{"text": "Water cycle", "isCorrect": false, "rationale": "The water cycle describes the continuous movement of water on, above, and below the surface of the Earth, not the transformation of rocks."}, {"text": "Photosynthesis process", "isCorrect": false, "rationale": "Photosynthesis is the process by which plants make food using sunlight, water, and carbon dioxide, unrelated to rock transformation."}, {"text": "Rock cycle", "isCorrect": true, "rationale": "The rock cycle is defined as the never-ending process by which rocks change from one type to another over very long periods of time."}, {"text": "Evaporation process", "isCorrect": false, "rationale": "Evaporation is the process of a liquid turning into a gas, used in separating mixtures, and not related to the transformation of rocks over geological time."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
