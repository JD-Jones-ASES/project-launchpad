<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic that defines a habitat for a living organism?", "options": [{"text": "It is the largest environment on Earth.", "isCorrect": false, "rationale": "While the ocean is Earth's largest habitat, this is a characteristic of only one specific habitat, not the defining characteristic of a 'habitat' in general."}, {"text": "It is a place where an organism can find all necessary resources to survive.", "isCorrect": true, "rationale": "The text defines a habitat as 'the natural home or environment of a living thing, where it finds everything it needs to survive,' including food, water, and shelter."}, {"text": "It exclusively features tall trees and rich soil.", "isCorrect": false, "rationale": "This describes a forest habitat, but not all habitats. Deserts, oceans, freshwater, and grasslands have very different features."}, {"text": "It is an environment that always has hot days and cold nights.", "isCorrect": false, "rationale": "This specifically describes a desert habitat, not the general definition or characteristic of all habitats."}], "id": "q01"}, {"question": "Which of the following is NOT listed as one of the four essential provisions a habitat must offer for a living thing to survive?", "options": [{"text": "Food", "isCorrect": false, "rationale": "Food is explicitly listed as an essential provision providing 'energy to survive'."}, {"text": "Companionship", "isCorrect": true, "rationale": "The text lists Food, Water, Shelter, and Space as the four essential needs. Companionship is not mentioned as a universal requirement for survival provided by a habitat."}, {"text": "Shelter", "isCorrect": false, "rationale": "Shelter is explicitly listed as an essential provision for 'protection from weather and predators'."}, {"text": "Space", "isCorrect": false, "rationale": "Space is explicitly listed as an essential provision for 'room to live and grow'."}], "id": "q02"}, {"question": "A team of biologists discovers a new species of marine plant that can only thrive in very salty water, requires constant submerged conditions, and uses specialized structures to absorb dissolved nutrients. In which habitat would they most likely find this new species?", "options": [{"text": "Freshwater", "isCorrect": false, "rationale": "Freshwater habitats (lakes, rivers) do not have salty water, which is a key requirement for this plant."}, {"text": "Forest", "isCorrect": false, "rationale": "Forests are terrestrial habitats and would not provide the salty, submerged conditions required by a marine plant."}, {"text": "Ocean", "isCorrect": true, "rationale": "The ocean is described as having 'salty water that covers most of Earth' and is home to marine life like seaweed, matching the requirements of a plant that needs salty, submerged conditions."}, {"text": "Grassland", "isCorrect": false, "rationale": "Grasslands are terrestrial, open spaces covered with grasses, completely unsuited for a plant requiring salty, submerged conditions."}], "id": "q03"}, {"question": "A small mammal is observed digging burrows for protection, feeding on seeds found among short plants, and avoiding large predators in wide-open areas. This animal most likely inhabits a:", "options": [{"text": "Desert", "isCorrect": false, "rationale": "While some desert animals burrow, the description of 'short plants' and 'wide-open areas' with more rain than deserts better fits a grassland."}, {"text": "Freshwater habitat", "isCorrect": false, "rationale": "The description clearly indicates a terrestrial (land-based) animal, not one primarily living in water."}, {"text": "Grassland", "isCorrect": true, "rationale": "Grasslands are characterized by 'wide open spaces covered with grasses,' and are home to animals like prairie dogs that dig burrows and feed on plants in such environments, aligning perfectly with the description."}, {"text": "Forest", "isCorrect": false, "rationale": "Forests are characterized by 'tall trees' and shade, which contradicts the 'wide-open areas' and 'short plants' described."}], "id": "q04"}, {"question": "Based on the text, how does a grassland habitat primarily differ from a desert habitat?", "options": [{"text": "Grasslands are typically saltier than deserts.", "isCorrect": false, "rationale": "The text does not mention salinity as a distinguishing factor between grasslands and deserts; salinity is primarily discussed in the context of the ocean."}, {"text": "Grasslands receive more rainfall than deserts.", "isCorrect": true, "rationale": "The text explicitly states, 'Grasslands get more rain than deserts but less than forests,' making this the primary difference mentioned."}, {"text": "Grasslands are home to more aquatic life than deserts.", "isCorrect": false, "rationale": "Both grasslands and deserts are primarily terrestrial habitats, and the text does not suggest grasslands have significantly more aquatic life than deserts."}, {"text": "Deserts have taller trees than grasslands.", "isCorrect": false, "rationale": "Grasslands are covered with grasses, and deserts have sparse vegetation like cactus, neither known for tall trees. Forests have tall trees."}], "id": "q05"}, {"question": "According to the text, which of Earth's main habitats is identified as the largest?", "options": [{"text": "Forest", "isCorrect": false, "rationale": "The text does not identify forests as the largest habitat."}, {"text": "Desert", "isCorrect": false, "rationale": "The text does not identify deserts as the largest habitat."}, {"text": "Ocean", "isCorrect": true, "rationale": "The text clearly states, 'The ocean is Earth's largest habitat.'"}, {"text": "Grassland", "isCorrect": false, "rationale": "The text does not identify grasslands as the largest habitat."}], "id": "q06"}, {"question": "If a major river that feeds into a freshwater habitat is dammed upstream, significantly reducing water flow and depth in the habitat, what is the most probable immediate consequence for the organisms living there?", "options": [{"text": "Terrestrial animals like deer will begin migrating to this habitat.", "isCorrect": false, "rationale": "Reduced water would make the habitat less suitable for aquatic and semi-aquatic organisms, not necessarily attract terrestrial animals, especially if they are not adapted to the new conditions."}, {"text": "Aquatic plants and fish adapted to flowing, deep water may struggle to survive or reproduce.", "isCorrect": true, "rationale": "The text states that 'when a habitat changes... the living things that depend on it may be in trouble.' A dam reducing water flow and depth directly impacts the 'water' provision for aquatic organisms, making survival difficult for those adapted to previous conditions."}, {"text": "The habitat will transform into a desert due to the sudden dryness.", "isCorrect": false, "rationale": "While it would become drier, a freshwater habitat would not immediately transform into a desert, which is a distinct habitat type with specific characteristics (e.g., hot days, cold nights) not solely defined by lack of water."}, {"text": "All organisms in the habitat will immediately develop new adaptations to the drier conditions.", "isCorrect": false, "rationale": "Adaptation is an evolutionary process that occurs over many generations, not an immediate response by individual organisms to sudden environmental change."}], "id": "q07"}, {"question": "Why would a cactus, known for its ability to store water and survive in arid conditions, not be able to survive in the ocean?", "options": [{"text": "The ocean lacks the necessary predators to keep cactus populations in check.", "isCorrect": false, "rationale": "Survival is primarily about finding essential needs and suitability, not predator control. The absence of specific predators would not be the main reason a cactus fails to survive in the ocean."}, {"text": "Cactus plants are not adapted to absorb salty water or live submerged, and would likely rot.", "isCorrect": true, "rationale": "The text states, 'Each living thing is suited to its own habitat. A cactus would not survive in the ocean.' Cacti are adapted to dry, not salty and submerged, conditions. Their cellular structure and water absorption mechanisms are not designed for a marine environment, leading to osmotic stress and rotting."}, {"text": "The ocean temperature is too cold for the cactus to grow effectively.", "isCorrect": false, "rationale": "While temperature can be a factor, the primary issues for a desert plant in the ocean are the salinity and the lack of oxygen/excess water from being constantly submerged, which are incompatible with its adaptations."}, {"text": "There is insufficient space for a cactus to grow roots in the vast open ocean.", "isCorrect": false, "rationale": "The ocean generally offers vast amounts of space. The problem is not lack of space, but the unsuitable conditions within that space."}], "id": "q08"}, {"question": "A group of explorers describes an environment as having non-salty, moving water with abundant reeds along the banks, and observations of frogs and dragonflies. This description most accurately points to which type of habitat?", "options": [{"text": "Ocean", "isCorrect": false, "rationale": "The description explicitly states 'non-salty' water, ruling out the ocean which is defined by 'salty water'."}, {"text": "Forest", "isCorrect": false, "rationale": "While a forest might have a river running through it, the primary features described ('non-salty, moving water,' 'reeds,' 'frogs, dragonflies') are characteristic of an aquatic habitat, not a forest itself."}, {"text": "Freshwater", "isCorrect": true, "rationale": "The description of 'non-salty, moving water' and the presence of 'frogs' and 'dragonflies' directly matches the text's description of a freshwater habitat (lakes, rivers, ponds, streams) and its inhabitants."}, {"text": "Desert", "isCorrect": false, "rationale": "Deserts are 'very dry' environments, which contradicts the description of 'abundant' moving water and reeds."}], "id": "q09"}, {"question": "Which statement best summarizes the fundamental relationship between a living organism and its habitat, as described in the text?", "options": [{"text": "Organisms can adapt to any habitat if given enough time.", "isCorrect": false, "rationale": "The text states that 'Each living thing is suited to its own habitat' and provides examples like 'A polar bear would not survive in a desert,' indicating limits to adaptation or immediate survival in unsuitable habitats."}, {"text": "A habitat is merely a temporary residence for most organisms.", "isCorrect": false, "rationale": "The text describes a habitat as a 'home' and a place where an organism 'finds everything it needs to survive,' implying a critical and often permanent relationship, not temporary residence."}, {"text": "Organisms are uniquely suited to specific habitats that provide their essential survival needs, and changes to these habitats can threaten their existence.", "isCorrect": true, "rationale": "This statement synthesizes the core ideas: habitats provide 'food, water, shelter, and space,' organisms are 'suited to its own habitat,' and 'when a habitat changes... the living things that depend on it may be in trouble.' It covers comprehension, suitability, and the impact of change."}, {"text": "The largest habitats are always the most stable and offer the best chances of survival for all organisms.", "isCorrect": false, "rationale": "While the ocean is the largest habitat, the text does not claim it's universally stable or best for 'all' organisms; rather, it emphasizes that 'Each living thing is suited to its own habitat,' meaning what's best varies greatly."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
