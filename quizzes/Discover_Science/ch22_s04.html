        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 22, Section 4</div>

        <div class="score-pct" id="score-pct"></div>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately defines 'weathering' as described in the textbook section?", "options": [{"text": "The process of moving broken rock and soil from one place to another.", "isCorrect": false, "rationale": "This describes erosion, not weathering. Weathering specifically refers to the breaking of rocks without movement."}, {"text": "The process of breaking rocks into smaller pieces while they remain in their original location.", "isCorrect": true, "rationale": "The text defines weathering as 'the process of breaking rocks into smaller pieces — without being moved. The rock stays in the same spot; it just gets smaller.'"}, {"text": "The process of rocks dissolving completely in water and being carried away.", "isCorrect": false, "rationale": "While water dissolving minerals is a form of weathering, weathering is broader and doesn't always involve complete dissolution or movement, which is characteristic of erosion."}, {"text": "The process by which glaciers carve out valleys and deposit sediment.", "isCorrect": false, "rationale": "Glacier action involving movement and carving is an example of erosion, not weathering."}], "id": "q01"}, {"question": "A large boulder has developed numerous deep cracks over time due to repeated freezing and thawing of water within its fissures. During a heavy rainstorm, small fragments of the boulder break off and are carried a short distance downstream by the rushing water. Which of the following accurately describes these two processes?", "options": [{"text": "Both processes are examples of erosion.", "isCorrect": false, "rationale": "The cracking due to freezing/thawing is weathering, while the transport of fragments by water is erosion. They are distinct processes."}, {"text": "The cracking of the boulder is weathering, and the transport of fragments is erosion.", "isCorrect": true, "rationale": "The breaking apart of the rock due to ice expansion is weathering (rock stays in place). The movement of the broken pieces by water is erosion (material is moved). This aligns with the definitions provided."}, {"text": "The cracking of the boulder is erosion, and the transport of fragments is weathering.", "isCorrect": false, "rationale": "This statement incorrectly swaps the definitions of weathering and erosion."}, {"text": "Neither process is related to soil formation.", "isCorrect": false, "rationale": "Both weathering (breaking rocks) and erosion (moving broken pieces) are fundamental steps in the continuous process of soil formation and movement."}], "id": "q02"}, {"question": "A scientist observes an ancient stone monument that has become pitted and smooth on one side due to consistent exposure to tiny airborne particles. Which agent of weathering is primarily responsible for this change?", "options": [{"text": "Water dissolution", "isCorrect": false, "rationale": "While water can dissolve minerals, the description of 'pitted and smooth' from 'airborne particles' points to physical abrasion, not chemical dissolution."}, {"text": "Ice wedging", "isCorrect": false, "rationale": "Ice wedging involves water freezing and expanding in cracks, which is not suggested by 'airborne particles' causing pitting and smoothing."}, {"text": "Wind abrasion", "isCorrect": true, "rationale": "The text states 'Wind carries tiny grains of sand that scrape against rocks. Over many years, this sandblasting wears the rock smooth or carves interesting shapes,' which perfectly matches the observation."}, {"text": "Plant root growth", "isCorrect": false, "rationale": "Plant roots push rocks apart, but they do not cause pitting and smoothing from airborne particles."}], "id": "q03"}, {"question": "In a region with high mountains and heavy annual snowfall, deep, U-shaped valleys are a prominent feature of the landscape. Which agent of erosion is most likely responsible for forming these valleys?", "options": [{"text": "Wind, due to the open, exposed mountain terrain.", "isCorrect": false, "rationale": "While wind can cause erosion in mountains, U-shaped valleys are not characteristic formations of wind erosion. Wind typically creates different types of erosional features."}, {"text": "Gravity, causing gradual soil creep and occasional landslides.", "isCorrect": false, "rationale": "Gravity causes mass movement like landslides, but it typically doesn't carve large, distinctive U-shaped valleys."}, {"text": "Water, through the action of fast-flowing mountain rivers.", "isCorrect": false, "rationale": "Rivers typically carve V-shaped valleys, not U-shaped valleys. The text specifies 'rivers carve valleys' but U-shaped is a distinctive glacial feature."}, {"text": "Glaciers, as massive ice sheets scrape and carry material.", "isCorrect": true, "rationale": "The text states that 'Glaciers are powerful enough to carve entire valleys,' and U-shaped valleys are a classic geological signature of glacial erosion, especially in mountainous regions with heavy snowfall."}], "id": "q04"}, {"question": "Which of the following scenarios describes a beneficial outcome of erosion?", "options": [{"text": "A powerful mudslide buries homes at the base of a steep hill.", "isCorrect": false, "rationale": "This is a harmful impact of erosion, causing destruction and loss."}, {"text": "Heavy rainfall washes away valuable topsoil from a farmer's field.", "isCorrect": false, "rationale": "This is a harmful impact of erosion, leading to loss of fertile soil and reduced agricultural productivity."}, {"text": "Sediment carried by a river is deposited at its mouth, forming a fertile delta where agriculture can thrive.", "isCorrect": true, "rationale": "The text states, 'River deltas — fan-shaped areas where rivers meet the ocean — are built by eroded sediment and are some of the most fertile land on Earth,' clearly identifying this as a helpful aspect of erosion."}, {"text": "Strong winds remove protective layers of soil, exposing bedrock underneath.", "isCorrect": false, "rationale": "This is a harmful impact of erosion, as it results in the loss of valuable topsoil necessary for plant growth."}], "id": "q05"}, {"question": "A major concern for farmers regarding erosion is its impact on crop production. Which harmful effect of erosion is most directly responsible for reduced agricultural yields?", "options": [{"text": "The creation of vast river deltas.", "isCorrect": false, "rationale": "River deltas are described as 'some of the most fertile land on Earth' due to deposited sediment, so this is a beneficial outcome, not a harmful one for crop production."}, {"text": "The deposit of sand on coastal beaches.", "isCorrect": false, "rationale": "While related to erosion, beach building is not directly linked to reduced agricultural yields on farms."}, {"text": "The removal of nutrient-rich topsoil.", "isCorrect": true, "rationale": "The text explicitly states, 'It removes precious topsoil from farms and gardens' and 'Losing topsoil means losing the nutrients that plants need to grow,' which directly leads to reduced crop production."}, {"text": "The formation of U-shaped valleys by glaciers.", "isCorrect": false, "rationale": "Glacial valley formation is a large-scale geological process and not the direct cause of reduced yields in active farmland, which is usually impacted by topsoil loss."}], "id": "q06"}, {"question": "A farmer in a flat, arid region frequently experiences significant loss of topsoil due to strong, dry winds. Which soil conservation method would be most effective in mitigating this specific problem?", "options": [{"text": "Terracing the fields.", "isCorrect": false, "rationale": "Terracing is described as cutting 'flat “steps” into the slope' to slow water, making it suitable for hillsides and water erosion, not wind erosion on flat land."}, {"text": "Practicing contour plowing.", "isCorrect": false, "rationale": "Contour plowing involves plowing 'across the slope' to create ridges that slow water down, making it effective for water erosion on hillsides, not primarily wind erosion on flat land."}, {"text": "Planting windbreaks around the fields.", "isCorrect": true, "rationale": "The text states, 'Windbreaks — Rows of trees planted along the edges of fields block the wind and keep it from blowing soil away,' making them specifically designed for wind erosion."}, {"text": "Applying mulch heavily over the entire area.", "isCorrect": false, "rationale": "Mulch protects bare soil from rain and wind, but for widespread wind erosion over large, flat fields, windbreaks are typically a more comprehensive and effective primary solution."}], "id": "q07"}, {"question": "The erosion experiment described in the text demonstrates that a tray with grass loses less soil than a tray with bare soil when water is poured over them. This result primarily illustrates which crucial role of plants in preventing erosion?", "options": [{"text": "Plants absorb excess water, preventing runoff.", "isCorrect": false, "rationale": "While plants do absorb water, the experiment's explanation explicitly focuses on the physical action of roots, not solely water absorption preventing runoff."}, {"text": "Plant roots act as anchors, binding soil particles together.", "isCorrect": true, "rationale": "The 'What to look for' section states: 'The tray with plants should hold its soil better because the roots act like anchors,' directly supporting this option."}, {"text": "Plants create a physical barrier that blocks wind.", "isCorrect": false, "rationale": "The experiment uses water, not wind, and focuses on the subsurface action of roots, not an above-ground barrier against wind."}, {"text": "Plants release chemicals that make soil more cohesive.", "isCorrect": false, "rationale": "The text mentions tiny organisms producing chemicals that dissolve rock (weathering), but not plant-released chemicals making soil cohesive for erosion prevention in this context."}], "id": "q08"}, {"question": "Wangari Maathai's Green Belt Movement in Kenya primarily focused on planting trees. Beyond directly preventing soil erosion, what broader impact did her work have on the communities involved?", "options": [{"text": "It led to the discovery of new agricultural technologies.", "isCorrect": false, "rationale": "The text does not mention the discovery of new technologies, but rather the application of an existing, traditional method (tree planting) for multiple benefits."}, {"text": "It encouraged large-scale industrial farming practices.", "isCorrect": false, "rationale": "Her work focused on community-based, sustainable practices, which is the opposite of large-scale industrial farming."}, {"text": "It improved community health and prosperity by providing resources and a healthier environment.", "isCorrect": true, "rationale": "The text states, 'Those trees did much more than prevent erosion. They provided fruit and firewood. They shaded the soil... They filtered water and cleaned the air. The communities that planted trees became healthier and more prosperous,' summarizing these broader impacts."}, {"text": "It solely focused on preserving untouched wilderness areas.", "isCorrect": false, "rationale": "The movement involved active tree planting by communities on degraded land, not just passive preservation of untouched wilderness."}], "id": "q09"}, {"question": "Considering the entire section, which statement best describes the fundamental relationship between weathering, erosion, and soil formation?", "options": [{"text": "Weathering is a harmful process that destroys rock, while erosion is a beneficial process that creates soil.", "isCorrect": false, "rationale": "Both weathering and erosion can have helpful and harmful aspects, and weathering is essential for soil formation rather than solely destructive."}, {"text": "Erosion is the initial process of breaking down rocks, followed by weathering which moves the broken material.", "isCorrect": false, "rationale": "This statement incorrectly reverses the order and definitions. Weathering breaks down rocks, and erosion then moves the broken material."}, {"text": "Weathering breaks down rocks into smaller pieces, which are then transported by erosion, with both processes contributing to the continuous cycle of soil formation and movement.", "isCorrect": true, "rationale": "This statement accurately synthesizes the key concepts: weathering is the breaking, erosion is the moving, and both are integral to how soil is formed and continually reshaped on Earth."}, {"text": "Soil formation occurs independently of weathering and erosion, which are merely geological forces that reshape landscapes.", "isCorrect": false, "rationale": "The text explicitly states 'Weathering is the first step in making soil' and discusses how erosion moves soil, demonstrating a direct and dependent relationship."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
