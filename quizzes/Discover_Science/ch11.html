    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 11</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which of the following is NOT one of the three key characteristics that scientists use to define animals?", "options": [{"text": "Animals move on their own.", "isCorrect": false, "rationale": "This is explicitly listed as one of the three key characteristics of animals in the text."}, {"text": "Animals can make their own food using sunlight.", "isCorrect": true, "rationale": "The text states, 'Plants make their own food using sunlight. Animals cannot do this.' Therefore, this is not a characteristic of animals, making it the correct answer for what is NOT a characteristic."}, {"text": "Animals eat other organisms for energy.", "isCorrect": false, "rationale": "This is explicitly listed as one of the three key characteristics of animals in the text, as animals are 'consumers.'"}, {"text": "Animals have senses to detect the world around them.", "isCorrect": false, "rationale": "This is explicitly listed as one of the three key characteristics of animals in the text."}], "id": "q01"}, {"question": "A newly discovered organism is observed to remain rooted in one spot, absorb nutrients from the soil, and react to light by changing its leaf angle. Based on the provided characteristics, why would this organism likely NOT be classified as an animal?", "options": [{"text": "It reacts to light, indicating a form of senses.", "isCorrect": false, "rationale": "While reacting to light could be a form of sensing, the primary characteristic that defines animals' senses is to detect the world for food, danger, and communication, which is not fully described here. More importantly, other animal characteristics are missing."}, {"text": "It absorbs nutrients from the soil rather than eating other organisms.", "isCorrect": true, "rationale": "The text clearly states that 'Animals must eat other living things... to get the energy they need,' calling them 'consumers.' Absorbing nutrients from the soil is characteristic of plants or fungi, not animals."}, {"text": "It shows some movement by changing leaf angle.", "isCorrect": false, "rationale": "The text emphasizes that 'Animals move on their own' from 'place to place,' which is different from a plant's limited, rooted movement like changing leaf angle."}, {"text": "Scientists have not yet named enough species.", "isCorrect": false, "rationale": "The number of named species is irrelevant to the classification criteria for this specific organism."}], "id": "q02"}, {"question": "The text states that 'Even a sea sponge — one of the simplest animals — can move water through its body.' What is the primary purpose of animals moving, as described in the section?", "options": [{"text": "To generate heat and regulate body temperature.", "isCorrect": false, "rationale": "While movement can impact body temperature, this is not the primary purpose of animal movement mentioned in the text."}, {"text": "To find food, escape danger, and find mates.", "isCorrect": true, "rationale": "The text explicitly states: 'Animals move to find food, escape danger, and find mates.'"}, {"text": "To communicate with plants and other non-moving organisms.", "isCorrect": false, "rationale": "The text does not mention this as a reason for animal movement."}, {"text": "To absorb sunlight for energy production.", "isCorrect": false, "rationale": "Animals do not make their own food from sunlight; plants do."}], "id": "q03"}, {"question": "Animals are called 'consumers' because:", "options": [{"text": "They consume oxygen for respiration.", "isCorrect": false, "rationale": "While animals do consume oxygen, the text specifically defines 'consumers' in the context of how animals obtain energy, not respiration."}, {"text": "They consume (eat) food from other living things to get energy.", "isCorrect": true, "rationale": "The text explicitly states, 'Scientists call animals consumers because they consume (eat) food.'"}, {"text": "They consume sunlight to produce their own food.", "isCorrect": false, "rationale": "This describes how plants, not animals, obtain energy."}, {"text": "They consume space in their habitats.", "isCorrect": false, "rationale": "This is not the definition of 'consumers' as provided in the context of animal characteristics."}], "id": "q04"}, {"question": "An earthworm is observed to retreat deeper into the soil when exposed to bright light and vibrations. According to the text, what does this behavior demonstrate about earthworms?", "options": [{"text": "They are capable of making their own food when necessary.", "isCorrect": false, "rationale": "The observed behavior is related to sensing the environment, not food production. Animals cannot make their own food."}, {"text": "They possess a complex brain structure.", "isCorrect": false, "rationale": "The text mentions earthworms sensing light and vibrations, but does not imply a complex brain structure, only the presence of senses."}, {"text": "They have senses to detect changes in their environment.", "isCorrect": true, "rationale": "The text explicitly states, 'Even earthworms can sense light and vibrations,' which aligns with the observed retreat from stimuli."}, {"text": "They are one of the simplest animals that cannot move on their own.", "isCorrect": false, "rationale": "The text identifies sea sponges as one of the simplest, and earthworms clearly demonstrate movement by retreating."}], "id": "q05"}, {"question": "Why are humans classified as animals according to the criteria presented in this section?", "options": [{"text": "Humans are the most intelligent species on the planet.", "isCorrect": false, "rationale": "While humans are intelligent, this section defines animals based on three core characteristics (movement, eating other organisms, senses), not intelligence."}, {"text": "Humans move on their own, eat other organisms for energy, and have senses.", "isCorrect": true, "rationale": "The text directly states, 'Yes! Humans are animals too. We move, we eat other organisms, and we have senses,' which aligns perfectly with the three defining characteristics."}, {"text": "Humans are able to build tools and complex societies.", "isCorrect": false, "rationale": "These are specific human abilities, not the general characteristics used to classify all animals in this section."}, {"text": "Humans belong to the mammal group, which includes many animals.", "isCorrect": false, "rationale": "While true, belonging to the mammal group is a further classification within the animal kingdom, not the fundamental reason why humans are initially identified as animals based on the three core characteristics."}], "id": "q06"}, {"question": "Based on the text, what is the current understanding of animal diversity?", "options": [{"text": "Scientists have discovered and named nearly all existing animal species.", "isCorrect": false, "rationale": "The text states that scientists 'think there may be millions more that have not been discovered yet.'"}, {"text": "There are an estimated 1.5 million animal species, with scientists believing millions more exist.", "isCorrect": true, "rationale": "The text says, 'Scientists have discovered and named about 1.5 million animal species so far. But they think there may be millions more that have not been discovered yet.'"}, {"text": "The majority of undiscovered species are large mammals in temperate zones.", "isCorrect": false, "rationale": "The text suggests undiscovered species are 'especially tiny creatures in the deep ocean and in tropical rainforests.'"}, {"text": "Animal species are only found in tropical rainforests and deep oceans.", "isCorrect": false, "rationale": "The text mentions these as locations for *undiscovered* species, not the exclusive habitats for all animal species."}], "id": "q07"}, {"question": "A Venus flytrap is a plant that snaps shut to catch insects. The text poses a question about why it's still a plant despite appearing to 'move' and 'eat' like an animal. Which of the following best explains why it is not classified as an animal?", "options": [{"text": "It produces offspring through seeds, unlike animals.", "isCorrect": false, "rationale": "While true, the method of reproduction is not one of the three core characteristics used in this section to distinguish animals from plants."}, {"text": "Its primary source of energy comes from making its own food using sunlight, and it does not move from place to place.", "isCorrect": true, "rationale": "The 'thinkaboutit' box specifically asks to consider 'how a Venus flytrap gets most of its energy' (plants make their own food) and 'Does it truly move from place to place?' (it does not in the animal sense)."}, {"text": "It only catches insects, whereas animals eat a wider variety of organisms.", "isCorrect": false, "rationale": "The variety of food consumed is not the primary distinguishing factor; the *method* of obtaining energy (eating vs. photosynthesis) is."}, {"text": "Plants do not have senses, even if they react to stimuli.", "isCorrect": false, "rationale": "The text does not define senses as exclusive to animals in this way, but rather focuses on the *purpose* of animal senses. The core reasons for the Venus flytrap's plant classification relate more to movement from place to place and energy source."}], "id": "q08"}, {"question": "According to the section, what defines a 'species'?", "options": [{"text": "A group of living things that can communicate with each other.", "isCorrect": false, "rationale": "While species communicate, this is not the definition provided in the text."}, {"text": "A group of living things that are very similar and can produce offspring together.", "isCorrect": true, "rationale": "The text defines 'Species' as 'A group of living things that are very similar and can produce offspring together.'"}, {"text": "A group of animals that live in the same habitat.", "isCorrect": false, "rationale": "This definition is too restrictive and does not include the essential genetic similarity and reproductive capability components."}, {"text": "A group of organisms that share common predators.", "isCorrect": false, "rationale": "Sharing common predators is an ecological relationship, not the definition of a species."}], "id": "q09"}, {"question": "Scientists have discovered 1.5 million animal species and believe millions more exist. Why do scientists need a way to organize animals into groups?", "options": [{"text": "To prevent overpopulation of certain species.", "isCorrect": false, "rationale": "While understanding populations is part of biology, organizing into groups is for classification, not directly for population control."}, {"text": "To sort them based on what they have in common, to better understand them.", "isCorrect": true, "rationale": "The text states, 'With so many different kinds of animals, scientists need a way to organize them. They sort animals into groups based on what the animals have in common.'"}, {"text": "To assign monetary value to different species for conservation efforts.", "isCorrect": false, "rationale": "This is not mentioned as the reason for organizing animals into groups in the text."}, {"text": "To determine which animals can be domesticated by humans.", "isCorrect": false, "rationale": "This is a specific human interest, not the general scientific purpose of animal organization presented in the text."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
