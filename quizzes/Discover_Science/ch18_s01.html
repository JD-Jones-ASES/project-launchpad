        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 18, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines a physical change according to the textbook section?", "options": [{"text": "A process that always creates a new substance with different properties.", "isCorrect": false, "rationale": "This describes a chemical change, not a physical change. The text explicitly states a physical change 'does not create a new substance'."}, {"text": "A change in the size, shape, or state of matter that does not create a new substance.", "isCorrect": true, "rationale": "This is the direct definition provided in the text for a physical change, emphasizing that the material stays the same."}, {"text": "Any change that is visible to the naked eye and involves heat or light.", "isCorrect": false, "rationale": "While physical changes can be visible, this definition is too broad and includes characteristics often associated with chemical changes (heat, light) while missing the core concept of no new substance."}, {"text": "A transformation that is permanent and cannot be reversed.", "isCorrect": false, "rationale": "The text states that a helpful way to think about physical changes is that 'in most cases, you can reverse them'."}], "id": "q01"}, {"question": "A student observes several changes in a lab. Which of these changes is a clear example of a physical change?", "options": [{"text": "Mixing two liquids that produce a gas and a noticeable color change.", "isCorrect": false, "rationale": "Production of a gas and color change often indicate a chemical reaction where new substances are formed, not just a physical alteration."}, {"text": "Burning a piece of wood into ash and smoke.", "isCorrect": false, "rationale": "Burning creates new substances (ash, smoke, carbon dioxide), which signifies a chemical change, not a physical one."}, {"text": "Slicing a banana into several smaller pieces.", "isCorrect": true, "rationale": "Slicing changes the banana's shape and size, but each piece is still banana. The material itself has not changed, which is a characteristic of a physical change."}, {"text": "An iron nail rusting over time in humid air.", "isCorrect": false, "rationale": "Rusting is a chemical reaction where iron combines with oxygen and water to form iron oxide (rust), a new substance."}], "id": "q02"}, {"question": "The text mentions 'The Big Clue: You Can Get It Back' as a helpful way to identify physical changes. Which of the following examples *best* demonstrates this clue?", "options": [{"text": "Baking cookies from dough.", "isCorrect": false, "rationale": "Baking cookies involves chemical changes (e.g., proteins denaturing, starches gelatinizing) that create new substances and cannot be easily reversed back to dough."}, {"text": "Frying an egg until it's solid.", "isCorrect": false, "rationale": "Frying an egg causes proteins to undergo chemical changes, making it impossible to revert the cooked egg back to its raw liquid state."}, {"text": "Freezing liquid water into ice cubes.", "isCorrect": true, "rationale": "Liquid water can be frozen into ice (a physical change), and then the ice can be melted back into liquid water. This reversibility directly illustrates 'you can get it back'."}, {"text": "Exploding dynamite to clear a path.", "isCorrect": false, "rationale": "An explosion is a rapid chemical reaction that produces entirely new substances (gases, heat, light, sound) and is not reversible to the original dynamite."}], "id": "q03"}, {"question": "The teacher's note specifically addresses the common misconception about dissolving sugar. Why is dissolving sugar in water considered a physical change, even though the sugar seems to 'vanish'?", "options": [{"text": "The sugar chemically reacts with the water to form a new, transparent compound.", "isCorrect": false, "rationale": "This is the common misconception the text aims to correct. Dissolving is a physical process; no new compound is formed."}, {"text": "The sugar particles become too small to see, but the sugar itself is still present and can be recovered.", "isCorrect": true, "rationale": "The text explains that if the water evaporates, the sugar crystals reappear, proving the sugar was there all along. This demonstrates that no new substance was created."}, {"text": "The water molecules completely destroy the sugar molecules, leaving only water.", "isCorrect": false, "rationale": "This would be a chemical decomposition, not simple dissolving. The sugar molecules remain intact, just dispersed."}, {"text": "Dissolving is a unique type of change that is neither strictly physical nor chemical.", "isCorrect": false, "rationale": "The text clearly categorizes dissolving as a physical change because the material stays the same and can be recovered."}], "id": "q04"}, {"question": "You learned about the three states of matter (solid, liquid, gas) in Unit 3. How does this knowledge relate to physical changes as described in this section?", "options": [{"text": "Changing from one state of matter to another is a prime example of a chemical change.", "isCorrect": false, "rationale": "The text uses melting ice as an example of a physical change, explicitly stating it goes 'from a solid to a liquid' but is 'still water'."}, {"text": "Physical changes only occur *within* a single state of matter, never between different states.", "isCorrect": false, "rationale": "Melting (solid to liquid) and freezing (liquid to solid) are explicitly listed as examples of physical changes involving state changes."}, {"text": "The transitions between solid, liquid, and gas represent fundamental physical changes because the substance's chemical identity remains the same.", "isCorrect": true, "rationale": "The text highlights that melting ice into water is a physical change because it's still water, despite changing state. This connects directly to the definition of physical change where the material stays the same."}, {"text": "States of matter are chemical properties, while physical changes describe only physical properties.", "isCorrect": false, "rationale": "States of matter are considered physical properties. Changes between these states are physical changes."}], "id": "q05"}, {"question": "Imagine you have a block of cheese. You grate it into fine shreds to put on pasta. What kind of change is this, and why?", "options": [{"text": "It is a chemical change because the cheese is now in a new form and cannot be easily turned back into a block.", "isCorrect": false, "rationale": "While the form changes, the cheese is still cheese. The difficulty of re-forming a block does not negate it being a physical change; the material itself is unaltered chemically."}, {"text": "It is a physical change because the cheese's shape and size have changed, but it is still fundamentally cheese.", "isCorrect": true, "rationale": "Grating is analogous to cutting or breaking, changing only the shape and size of the cheese, which remains the same substance. This fits the definition of a physical change."}, {"text": "It is neither a physical nor a chemical change; it's simply a preparation technique.", "isCorrect": false, "rationale": "Preparation techniques that alter size, shape, or state are indeed types of physical changes in matter."}, {"text": "It is a chemical change because the act of grating introduces air, altering the cheese's composition.", "isCorrect": false, "rationale": "Introducing air does not fundamentally change the chemical composition of the cheese itself into a new substance; the cheese molecules remain intact."}], "id": "q06"}, {"question": "The section concludes by stating that 'In the next section, you will learn about a very different kind of change — one where something brand new is created.' What is the most significant distinction between this 'very different kind of change' and a physical change?", "options": [{"text": "The 'very different kind of change' involves much larger objects than physical changes.", "isCorrect": false, "rationale": "The scale of objects is not the defining characteristic distinguishing physical from chemical changes."}, {"text": "Physical changes are always reversible, while the 'very different kind of change' is never reversible.", "isCorrect": false, "rationale": "While physical changes are 'in most cases' reversible, and many chemical changes are not easily reversed, reversibility is a helpful clue, but not the *most significant* distinction. Some chemical changes are reversible."}, {"text": "The 'very different kind of change' results in the formation of entirely new substances, unlike a physical change where the material remains the same.", "isCorrect": true, "rationale": "The core distinction highlighted in the text's definition of physical change ('does not create a new substance') and the hint for the next section ('something brand new is created') is the formation of new substances."}, {"text": "Physical changes always require less energy than the 'very different kind of change'.", "isCorrect": false, "rationale": "Energy requirements vary greatly for both physical and chemical changes; this is not the most significant defining characteristic."}], "id": "q07"}, {"question": "If you crumple a piece of aluminum foil into a tight ball, what kind of change has occurred, and how does the 'You Can Get It Back' clue apply?", "options": [{"text": "It's a chemical change because the foil's structure is permanently altered, preventing it from being fully flattened again.", "isCorrect": false, "rationale": "The foil is still aluminum, just in a different shape. The inability to perfectly flatten it doesn't mean a new substance was created, only that the physical structure was stressed."}, {"text": "It's a physical change because the aluminum itself is unchanged, and the foil can be flattened out (mostly) to its original state.", "isCorrect": true, "rationale": "Crumpling changes the shape, but the aluminum material remains aluminum. The text specifically lists 'Crumple paper? Flatten it out (mostly!)' as an example of reversibility for a physical change."}, {"text": "It's a chemical change because the internal bonds of the aluminum atoms are broken and reformed.", "isCorrect": false, "rationale": "Breaking and reforming internal atomic bonds would indicate a chemical change, but crumpling only deforms the metallic structure, not its atomic composition."}, {"text": "It's not a change in matter, but an external force acting upon the foil.", "isCorrect": false, "rationale": "Changes in shape are explicitly defined as physical changes in matter in the textbook section."}], "id": "q08"}, {"question": "In Unit 8, you learned about separating mixtures by filtering and evaporating. According to this section, why are these separation techniques considered physical changes?", "options": [{"text": "Because they involve the destruction of one substance to isolate another.", "isCorrect": false, "rationale": "Separation techniques aim to recover substances intact, not destroy them. Destruction would imply a chemical change."}, {"text": "Because they chemically alter the components of the mixture to make them easier to separate.", "isCorrect": false, "rationale": "If the components were chemically altered, they would no longer be the original substances. These methods rely on differences in physical properties."}, {"text": "Because they change the arrangement or state of the substances without altering their chemical identity.", "isCorrect": true, "rationale": "Filtering separates components based on particle size, and evaporation separates based on boiling points (a state change), both without creating new substances. The original substances are simply separated or change state, fitting the definition of physical changes."}, {"text": "Because they are always irreversible processes.", "isCorrect": false, "rationale": "The products of filtering and evaporation (the separated substances) are the original materials, demonstrating that the process didn't create new, irreversible substances."}], "id": "q09"}, {"question": "Consider a situation where a piece of wood is split into firewood logs. Later, some of these logs are used to build a small fence. What kind of changes are occurring in both scenarios (splitting and building), and why?", "options": [{"text": "Both are chemical changes because the wood is being altered for different purposes.", "isCorrect": false, "rationale": "Purpose does not define the type of change. The wood remains wood in both scenarios."}, {"text": "Splitting is a physical change, but building the fence is a chemical change due to new structures being formed.", "isCorrect": false, "rationale": "Building a fence involves arranging wood pieces; it changes the overall structure but not the chemical composition of the wood itself."}, {"text": "Both are physical changes because the wood's size and shape are changing, but its fundamental material remains wood.", "isCorrect": true, "rationale": "Splitting logs changes their size and shape. Building a fence involves arranging these pieces, changing their configuration and overall shape. In both cases, the wood itself is still wood, making them physical changes according to the textbook's definition."}, {"text": "Neither is a change in matter; they are simply acts of human labor.", "isCorrect": false, "rationale": "Acts that alter the size, shape, or state of matter are indeed classified as physical changes, regardless of who performs them."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
