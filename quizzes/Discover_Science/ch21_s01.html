    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the most accurate definition of an ecosystem based on the provided text?", "options": [{"text": "A collection of plants and animals that live in the same geographical area.", "isCorrect": false, "rationale": "While an ecosystem contains plants and animals, this definition misses the crucial 'nonliving things' and the concept of them 'working together as a system' as emphasized in the text."}, {"text": "All the living things and nonliving things in an area, working together as a system.", "isCorrect": true, "rationale": "This statement is the direct definition provided in the text for 'Ecosystem,' highlighting both biotic and abiotic components and their interactive nature."}, {"text": "A place where organisms primarily compete for food, water, and space.", "isCorrect": false, "rationale": "Competition is one type of interaction within an ecosystem, but it is not the complete definition, which also includes cooperation and the role of nonliving factors."}, {"text": "The nonliving factors that determine what kinds of living things can survive in an area.", "isCorrect": false, "rationale": "This describes the role of abiotic factors, which are only one part of an ecosystem, not the ecosystem itself."}], "id": "q01"}, {"question": "A scientist is studying a forest. Which of the following would be classified as a biotic factor in this forest ecosystem?", "options": [{"text": "The amount of rainfall received annually.", "isCorrect": false, "rationale": "Rainfall is a nonliving element (water) and is therefore an abiotic factor."}, {"text": "A mushroom growing on a fallen log.", "isCorrect": true, "rationale": "Mushrooms are a type of fungi, and fungi are explicitly listed as biotic factors in the text."}, {"text": "The temperature of the air throughout the year.", "isCorrect": false, "rationale": "Temperature is a nonliving physical condition and is therefore an abiotic factor."}, {"text": "The types of rocks and minerals present in the soil.", "isCorrect": false, "rationale": "Rocks and minerals are nonliving components of the soil and are therefore abiotic factors."}], "id": "q02"}, {"question": "In a desert ecosystem, which of the following is an abiotic factor that severely limits the types of life that can survive?", "options": [{"text": "Scorpions that hunt at night.", "isCorrect": false, "rationale": "Scorpions are living organisms (animals) and are therefore biotic factors."}, {"text": "Cacti that store water in their stems.", "isCorrect": false, "rationale": "Cacti are living organisms (plants) and are therefore biotic factors. Their adaptation helps them cope with abiotic limitations."}, {"text": "Very little rain throughout the year.", "isCorrect": true, "rationale": "Rain (water) is explicitly listed as an abiotic factor. The text notes that a desert's very little water limits survival for most organisms."}, {"text": "Lizards basking on rocks to warm themselves.", "isCorrect": false, "rationale": "Lizards are living organisms (animals) and are therefore biotic factors. Their behavior is a response to an abiotic factor (temperature/sunlight)."}], "id": "q03"}, {"question": "The text states that in an ecosystem, 'Every living thing… depends on other living things and on nonliving things around it.' If a deadly virus suddenly eliminated all the frogs in a pond ecosystem, what would be the most likely long-term consequence for other pond organisms, considering this interdependence?", "options": [{"text": "The population of lily pads would decrease because frogs help keep them healthy.", "isCorrect": false, "rationale": "The text does not suggest a direct dependence of lily pads on frogs for health, and frogs often use lily pads for resting, not maintaining them."}, {"text": "Predators that eat frogs would experience a decline in their food source, potentially impacting their own populations.", "isCorrect": true, "rationale": "This demonstrates interdependence. If a food source (frogs) is removed, organisms that depend on it for food will suffer, highlighting how biotic factors rely on each other."}, {"text": "The amount of sunlight reaching the pond would increase, leading to warmer water.", "isCorrect": false, "rationale": "The removal of frogs would not directly or significantly alter the amount of sunlight or water temperature, which are abiotic factors."}, {"text": "Fish populations would thrive due to less competition for space.", "isCorrect": false, "rationale": "While competition for space exists, the text highlights the food web aspect more. Fish and frogs often have different primary diets and niches, so direct competition might not be the most significant impact."}], "id": "q04"}, {"question": "The text states that abiotic factors 'set the stage for life.' What does this phrase primarily mean in the context of an ecosystem?", "options": [{"text": "Abiotic factors are less important than biotic factors because they do not change.", "isCorrect": false, "rationale": "The text emphasizes that abiotic factors are crucial ('set the stage') and that nonliving things are 'changed by the living things,' indicating they are not static or less important."}, {"text": "Abiotic factors directly consume other organisms within the ecosystem.", "isCorrect": false, "rationale": "Abiotic factors are nonliving; they do not consume organisms. This is a characteristic of some biotic interactions."}, {"text": "Abiotic factors create the specific environmental conditions that determine which types of living things can survive and thrive in an area.", "isCorrect": true, "rationale": "This aligns with the text's explanation that abiotic factors 'determine what kinds of living things can survive in an area,' acting as fundamental conditions for life."}, {"text": "Abiotic factors are the only components of an ecosystem that are affected by human activity.", "isCorrect": false, "rationale": "Both biotic and abiotic factors can be affected by human activity, and the text doesn't make this exclusive claim."}], "id": "q05"}, {"question": "Which of the following scenarios best illustrates the concept that ecosystems come in 'all sizes'?", "options": [{"text": "A pond ecosystem is studied in detail, focusing only on the interactions between fish and algae.", "isCorrect": false, "rationale": "This describes a focused study within an ecosystem, not the concept of varying sizes."}, {"text": "Scientists compare the vast biodiversity of an ocean ecosystem to the limited biodiversity of a desert ecosystem.", "isCorrect": false, "rationale": "This compares two large ecosystems in terms of biodiversity, but doesn't fully capture the 'all sizes' concept, particularly regarding very small ecosystems."}, {"text": "A single rotting log on a forest floor is identified as an ecosystem, just as the entire forest itself is considered an ecosystem.", "isCorrect": true, "rationale": "The text explicitly uses the example of a 'single rotting log' as a 'tiny ecosystem' and contrasts it with a 'thick forest' or 'vast ocean,' directly illustrating the range of sizes."}, {"text": "An ecologist focuses solely on the interaction between a bee and a flower to understand plant reproduction.", "isCorrect": false, "rationale": "This describes a specific biotic interaction, not the overall scale or size of an ecosystem."}], "id": "q06"}, {"question": "Based on the definition and examples provided, which of the following would NOT be considered a complete ecosystem?", "options": [{"text": "A backyard with grass, soil, earthworms, robins, ants, and rain.", "isCorrect": false, "rationale": "The text explicitly lists a 'Backyard ecosystem' as an example, including biotic (grass, earthworms, robins, ants) and abiotic (soil, rain) factors working together."}, {"text": "A single isolated plant grown in a sterile laboratory environment with controlled light and water, but no soil, air exchange, or microorganisms.", "isCorrect": true, "rationale": "This scenario lacks the necessary interaction with a 'system' of diverse living (microorganisms, other animals) and nonliving (soil, varied air components) things, which are essential for a complete ecosystem as defined."}, {"text": "A classroom aquarium containing fish, water, gravel, algae, and beneficial bacteria.", "isCorrect": false, "rationale": "An aquarium contains living (fish, algae, bacteria) and nonliving (water, gravel) components interacting as a system, making it a small, contained ecosystem."}, {"text": "A patch of grass in a park, including the soil, insects, birds, and sunlight.", "isCorrect": false, "rationale": "This example includes living (grass, insects, birds) and nonliving (soil, sunlight) factors that interact, forming a small but complete ecosystem."}], "id": "q07"}, {"question": "The text provides an example of a bee carrying pollen from flower to flower, helping the plant make seeds. This interaction best illustrates which characteristic of biotic factors?", "options": [{"text": "Competition among organisms for the same food or space.", "isCorrect": false, "rationale": "This example describes a mutually beneficial interaction (pollination), not competition."}, {"text": "The ability of some organisms to help other organisms within the ecosystem.", "isCorrect": true, "rationale": "The text explicitly states, 'Some help each other. A bee carries pollen from flower to flower, helping the plant make seeds,' which directly matches this option."}, {"text": "The process where some organisms eat other organisms to obtain energy.", "isCorrect": false, "rationale": "Pollination is not an act of consumption; it is a reproductive aid for the plant and a food source for the bee without harming the plant."}, {"text": "The fact that biotic factors are independent of abiotic factors.", "isCorrect": false, "rationale": "This example shows biotic-biotic interaction and does not speak to independence from abiotic factors; in reality, biotic factors are highly dependent on abiotic factors."}], "id": "q08"}, {"question": "The text emphasizes that an ecosystem is a 'system — a set of parts that work together.' Which statement best reflects the fundamental importance of this 'system' aspect?", "options": [{"text": "It means that individual parts of an ecosystem can be studied in isolation without affecting the others.", "isCorrect": false, "rationale": "The text explicitly states 'Everything is connected' and emphasizes interdependence, which contradicts the idea of studying parts in isolation without affecting others."}, {"text": "It highlights that living and nonliving components are interconnected and influence each other's existence and changes.", "isCorrect": true, "rationale": "This directly captures the essence of a 'system' in the context of an ecosystem, where biotic and abiotic factors interact and are mutually dependent, as explained in the text ('The living things need the nonliving things, and the nonliving things are changed by the living things')."}, {"text": "It implies that ecosystems are always closed off from outside influences and maintain a constant balance.", "isCorrect": false, "rationale": "The text does not state that ecosystems are closed systems or always maintain a constant balance, only that their internal parts work together."}, {"text": "It suggests that only the largest and most visible parts of an ecosystem truly matter for its overall function.", "isCorrect": false, "rationale": "The text explicitly mentions 'tiny creatures too small to see' and bacteria working 'invisibly,' indicating that even small parts are crucial."}], "id": "q09"}, {"question": "According to the 'Ecosystems Under Your Feet' section, what is the crucial role of billions of bacteria and hundreds of thousands of fungi in healthy soil?", "options": [{"text": "They compete with plant roots for available sunlight and space.", "isCorrect": false, "rationale": "Bacteria and fungi do not compete with plant roots for sunlight; sunlight is needed by plants for photosynthesis above ground."}, {"text": "They break down dead leaves and other material, converting them into nutrients that help plants grow.", "isCorrect": true, "rationale": "The text states these organisms 'break down dead leaves and other material, turning it into nutrients that help plants grow,' which is their crucial role as decomposers."}, {"text": "They primarily act as a direct food source for larger animals that live above ground, like deer.", "isCorrect": false, "rationale": "While some tiny animals might eat them, their primary role described here is decomposition and nutrient cycling for plants, not as a direct food source for large surface animals."}, {"text": "They help to prevent water from soaking into the soil too quickly, causing runoff.", "isCorrect": false, "rationale": "While soil structure (influenced by organisms) can affect water absorption, the text specifically highlights their role in nutrient cycling, not primarily water retention."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
