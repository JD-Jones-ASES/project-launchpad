<script>
var QUESTIONS = [{"question": "According to the text, what is the primary criterion scientists use to first divide the animal kingdom into two major groups?", "options": [{"text": "Whether the animal lays eggs or gives live birth.", "isCorrect": false, "rationale": "The text does not mention reproductive method as the primary division for the animal kingdom. It focuses on skeletal structure."}, {"text": "The presence or absence of a backbone.", "isCorrect": true, "rationale": "The text explicitly states: 'This simple question — 'Does it have a backbone?' — is the first big way scientists divide the animal kingdom into two groups.'"}, {"text": "Its habitat (land or water).", "isCorrect": false, "rationale": "While habitat is a classification method, the text does not present it as the 'first big way' scientists divide vertebrates and invertebrates."}, {"text": "The type of food it eats.", "isCorrect": false, "rationale": "Dietary habits are not used as the fundamental division for vertebrates and invertebrates in the provided text."}], "id": "q01"}, {"question": "Which of the following is NOT a primary function of an endoskeleton, as described in the text?", "options": [{"text": "Giving the body its shape and support.", "isCorrect": false, "rationale": "The text lists 'It gives the body its shape and support' as one of the three important jobs of an endoskeleton."}, {"text": "Shedding and growing a new, larger one as the animal grows.", "isCorrect": true, "rationale": "This process (molting) is characteristic of an exoskeleton, not an endoskeleton. Endoskeletons grow with the animal."}, {"text": "Protecting soft internal organs.", "isCorrect": false, "rationale": "The text lists 'It protects soft organs' as one of the three important jobs of an endoskeleton."}, {"text": "Working with muscles to aid in movement.", "isCorrect": false, "rationale": "The text lists 'It works with muscles to help the animal move' as one of the three important jobs of an endoskeleton."}], "id": "q02"}, {"question": "Based on the provided examples and definitions, which of the following animals is most likely a vertebrate?", "options": [{"text": "A crab, which has a hard outer shell.", "isCorrect": false, "rationale": "Crabs are explicitly listed as invertebrates in the text, and their hard outer shell is an exoskeleton, not an endoskeleton."}, {"text": "A jellyfish, which is soft all the way through.", "isCorrect": false, "rationale": "Jellyfish are explicitly listed as invertebrates, demonstrating that some invertebrates have no skeleton at all."}, {"text": "A snake, which has a long, flexible body.", "isCorrect": true, "rationale": "Snakes are explicitly listed as vertebrates in the text, meaning they possess a backbone and an endoskeleton."}, {"text": "An earthworm, which has no skeleton at all.", "isCorrect": false, "rationale": "Earthworms are explicitly listed as invertebrates in the text, fitting the description of an animal without a backbone or skeleton."}], "id": "q03"}, {"question": "An animal with an exoskeleton faces a unique challenge as it grows. What is this challenge and its solution?", "options": [{"text": "The exoskeleton becomes too heavy, so the animal strengthens its muscles to carry it.", "isCorrect": false, "rationale": "The text does not mention the exoskeleton becoming too heavy or strengthening muscles as the solution to growth."}, {"text": "The exoskeleton does not grow, so the animal must shed it and grow a new, larger one through a process called molting.", "isCorrect": true, "rationale": "The text clearly states: 'an exoskeleton does not grow! As the animal gets bigger, it must shed its old exoskeleton and grow a new, larger one. This process is called molting.'"}, {"text": "The exoskeleton becomes brittle with age, requiring the animal to reinforce it with new materials.", "isCorrect": false, "rationale": "The text does not describe brittleness or reinforcement as a challenge or solution for growth in exoskeletons."}, {"text": "The exoskeleton limits movement, so the animal develops flexible joints to compensate.", "isCorrect": false, "rationale": "While exoskeletons do influence movement, the text focuses on growth as the unique challenge, not inherent limitation of movement itself."}], "id": "q04"}, {"question": "Considering the proportion of animal species, if you randomly selected an animal from all known species, what would be the most statistically likely outcome?", "options": [{"text": "It would be a vertebrate, as they are the most commonly observed animals.", "isCorrect": false, "rationale": "The text states that vertebrates make up only 'about 5 percent of all animal species,' making them statistically less likely than invertebrates despite being commonly observed."}, {"text": "It would be an invertebrate, specifically an insect.", "isCorrect": true, "rationale": "The text states that 95% of animals are invertebrates, and 'insects alone make up more than half of all known animal species,' making this the most statistically likely outcome."}, {"text": "It would be an animal with a cartilage skeleton.", "isCorrect": false, "rationale": "While cartilage skeletons exist in some vertebrates, the overall probability of selecting any vertebrate is only 5%, and a specific subset of that is even less likely than an invertebrate."}, {"text": "It would be an animal that has no skeleton at all, like an earthworm.", "isCorrect": false, "rationale": "While earthworms are invertebrates, the text highlights that insects alone make up more than half of all species, making an insect a more likely pick than a 'no skeleton' invertebrate."}], "id": "q05"}, {"question": "A turtle has a hard outer shell. Based on the discussion in the 'thinkaboutit' and 'teachernote' sections, why is a turtle classified as a vertebrate rather than an invertebrate?", "options": [{"text": "Its shell is an exoskeleton that protects its soft body, similar to a crab.", "isCorrect": false, "rationale": "The 'teachernote' clarifies that 'The shell is actually made of modified bones and is part of the skeleton, fused to the spine,' indicating it's not an exoskeleton like a crab's."}, {"text": "It does not have a backbone, but its shell provides enough support.", "isCorrect": false, "rationale": "The 'teachernote' explicitly states, 'A turtle is a vertebrate — it has a backbone and an internal skeleton.'"}, {"text": "It possesses a backbone and an internal skeleton, with the shell being a modified part of its endoskeleton.", "isCorrect": true, "rationale": "This accurately reflects the information in the 'teachernote,' which states 'A turtle is a vertebrate — it has a backbone and an internal skeleton. The shell is actually made of modified bones and is part of the skeleton, fused to the spine.'"}, {"text": "It is able to move quickly, a characteristic more common in vertebrates.", "isCorrect": false, "rationale": "Movement speed is not the criterion for classifying an animal as a vertebrate or invertebrate; the presence of a backbone is the key factor."}], "id": "q06"}, {"question": "Which statement accurately differentiates between an endoskeleton and an exoskeleton based on the text?", "options": [{"text": "An endoskeleton is made of a hard, inflexible material, while an exoskeleton is always made of cartilage.", "isCorrect": false, "rationale": "Endoskeletons can be made of cartilage (e.g., sharks), and exoskeletons are described as 'hard outer coverings' not necessarily cartilage."}, {"text": "An endoskeleton grows continuously with the animal, whereas an exoskeleton must be shed and regrown.", "isCorrect": true, "rationale": "The text highlights that an exoskeleton 'does not grow!' and must be shed (molted), implying that an endoskeleton, by contrast, grows with the animal."}, {"text": "An endoskeleton provides protection but not support, while an exoskeleton provides support but not protection.", "isCorrect": false, "rationale": "Both endoskeletons and exoskeletons provide both support and protection, as stated in their respective descriptions."}, {"text": "Endoskeletons are only found in land animals, while exoskeletons are only found in aquatic animals.", "isCorrect": false, "rationale": "Examples given for both types (e.g., sharks, fish, frogs for vertebrates; crabs, insects for invertebrates) demonstrate that they can be found in both aquatic and terrestrial environments."}], "id": "q07"}, {"question": "You discover a new animal species that is soft-bodied, lacks a backbone, and lives in the ocean. Based on this description, which category would it most certainly fall into?", "options": [{"text": "A fish, due to its aquatic habitat.", "isCorrect": false, "rationale": "Fish are vertebrates because they have backbones. The description explicitly states the animal 'lacks a backbone.'"}, {"text": "A reptile, due to its soft body.", "isCorrect": false, "rationale": "Reptiles are vertebrates, meaning they possess a backbone. The description specifies 'lacks a backbone.'"}, {"text": "An invertebrate, similar to a jellyfish or earthworm.", "isCorrect": true, "rationale": "The defining characteristic of an invertebrate is that it 'does not have a backbone.' A soft-bodied, ocean-dwelling animal without a backbone perfectly fits the description of an invertebrate, with jellyfish being an explicit example from the text."}, {"text": "A mammal, given its complex internal structure.", "isCorrect": false, "rationale": "Mammals are vertebrates and possess backbones. This contradicts the description of the new species."}], "id": "q08"}, {"question": "Beyond providing shape and support, what crucial function does the backbone perform, as mentioned in the text?", "options": [{"text": "It serves as the primary digestive organ for the animal.", "isCorrect": false, "rationale": "The text does not mention the backbone having any digestive function."}, {"text": "It protects an important bundle of nerves inside the body.", "isCorrect": true, "rationale": "The text states the backbone 'protects an important bundle of nerves inside' and 'protects the spinal cord.'"}, {"text": "It generates heat to regulate the animal's body temperature.", "isCorrect": false, "rationale": "The text does not describe the backbone as having a role in thermoregulation."}, {"text": "It produces the chemicals necessary for photosynthesis.", "isCorrect": false, "rationale": "Photosynthesis is a process used by plants, not animals, and the backbone plays no role in it."}], "id": "q09"}, {"question": "The text mentions that some vertebrates have skeletons made of cartilage instead of bone. Why would an animal like a shark, which has a cartilage skeleton, still be classified as a vertebrate?", "options": [{"text": "Because cartilage is a type of exoskeleton that offers similar protection to bone.", "isCorrect": false, "rationale": "Cartilage forms an *internal* skeleton (endoskeleton), not an exoskeleton. The defining feature of a vertebrate is having a backbone, regardless of whether it's bone or cartilage."}, {"text": "Because it lacks a backbone, which is characteristic of cartilage-based animals.", "isCorrect": false, "rationale": "Vertebrates, by definition, *have* a backbone. The 'teachernote' clarifies that sharks are vertebrates precisely because they have an internal skeleton and a backbone, even if made of cartilage."}, {"text": "Because it possesses an internal skeleton (endoskeleton) that includes a backbone, fulfilling the definition of a vertebrate.", "isCorrect": true, "rationale": "The 'teachernote' differentiates this by explaining that an animal with cartilage 'is still a vertebrate' because it possesses an endoskeleton (including a backbone), even if it's not made of bone."}, {"text": "Because it is a large, powerful predator, a common trait among vertebrates.", "isCorrect": false, "rationale": "Physical traits like size or predatory behavior are not the scientific basis for classifying an animal as a vertebrate; the presence of an internal backbone is the key criterion."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
