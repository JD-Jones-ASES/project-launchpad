<!DOCTYPE html>

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 28, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the fundamental difference in atomic behavior between a solid, a liquid, and a gas?", "options": [{"text": "Solids have no kinetic energy, liquids have moderate kinetic energy, and gases have maximum kinetic energy.", "isCorrect": false, "rationale": "All states of matter possess kinetic energy, as their atoms or molecules are always in motion (vibrating at minimum). The amount of kinetic energy differs, but none have 'no energy'."}, {"text": "The speed of the atoms/molecules and the distance between them generally increase from a solid to a liquid to a gas.", "isCorrect": true, "rationale": "The text explicitly states that in a solid, atoms vibrate in place; in a liquid, they slide past each other; and in a gas, they move fast and spread far apart. This directly correlates with increasing speed and distance as energy (temperature) is added."}, {"text": "Atoms in a solid are broken down into subatomic particles, while in liquids and gases they remain intact.", "isCorrect": false, "rationale": "The atoms themselves remain intact across phase changes; it is their arrangement and movement that changes, not their fundamental structure or integrity."}, {"text": "Only gases are composed of individual atoms; solids and liquids are continuous substances without distinct atomic structures.", "isCorrect": false, "rationale": "The section clarifies that all matter, regardless of its state, is made of atoms and molecules. The atomic view applies to solids, liquids, and gases."}], "id": "q01"}, {"question": "When an ice cube melts into liquid water on a warm day, what primarily happens to its H2O molecules?", "options": [{"text": "They break apart into individual hydrogen and oxygen atoms.", "isCorrect": false, "rationale": "Melting is a physical phase change, not a chemical reaction. The H2O molecules remain intact; they do not break down into their constituent atoms."}, {"text": "They gain energy, speed up their movement, and begin to slide past each other more freely.", "isCorrect": true, "rationale": "The text explains that heating adds energy, causing atoms/molecules to move faster. When a solid melts into a liquid, the molecules gain enough energy to break free from their fixed positions and slide past one another."}, {"text": "They become less dense and disappear into the surrounding air.", "isCorrect": false, "rationale": "While water becomes less dense as it melts, the molecules do not disappear. They are still present as liquid water. Disappearing into the air implies evaporation, which is a different process."}, {"text": "They decrease in total mass as some molecules are lost during the phase change.", "isCorrect": false, "rationale": "This contradicts the Law of Conservation of Matter. No molecules are lost during a phase change; the total mass remains constant."}], "id": "q02"}, {"question": "According to the principle of conservation of matter, if iron rusts and the resulting rust weighs more than the original iron object, what must be true?", "options": [{"text": "Matter was created during the rusting process, violating the law of conservation.", "isCorrect": false, "rationale": "The Law of Conservation of Matter states that matter cannot be created or destroyed. The apparent increase in mass must be due to the addition of matter, not its creation."}, {"text": "The iron atoms individually gained mass through an internal transformation.", "isCorrect": false, "rationale": "Individual atoms do not spontaneously gain mass during a chemical reaction like rusting. The mass increase comes from external sources."}, {"text": "Additional atoms from the environment, specifically oxygen, combined with the iron atoms.", "isCorrect": true, "rationale": "The text explicitly states: 'When iron rusts, the rust weighs more than the original iron. Why? Because oxygen atoms from the air bonded to the iron atoms. The extra mass came from the oxygen — it was not created from nothing.'"}, {"text": "The original iron atoms were destroyed and replaced by heavier rust atoms.", "isCorrect": false, "rationale": "Atoms are rearranged, not destroyed or replaced, during chemical reactions according to the conservation of matter."}], "id": "q03"}, {"question": "A log is burned in a fireplace, turning into ash, smoke, and gases. Which statement accurately describes this event in terms of matter?", "options": [{"text": "The matter in the log is destroyed, creating energy and entirely new substances.", "isCorrect": false, "rationale": "The text clearly states that matter is conserved and cannot be destroyed, even when it 'seems' to disappear. Energy is released, but matter is not destroyed."}, {"text": "The atoms from the log are rearranged to form new molecules, but no atoms are lost or created.", "isCorrect": true, "rationale": "The section explains: 'The atoms in the wood rearrange to form carbon dioxide gas, water vapor, and ash. If you could collect all the gas, vapor, and ash, their total mass would equal the mass of the original log plus the oxygen used.' This is the essence of conservation of matter."}, {"text": "The total mass of the ash, smoke, and gases will always be less than the original log, as some matter vanishes.", "isCorrect": false, "rationale": "This is incorrect. If the mass of the oxygen consumed during combustion is also included, the total mass of reactants (log + oxygen) will equal the total mass of products (ash + smoke + gases), demonstrating conservation of matter."}, {"text": "The atoms of the log are transformed into lighter, gaseous elements during combustion.", "isCorrect": false, "rationale": "Atoms are rearranged into new molecules (e.g., CO2, H2O), but they are not transformed into entirely different elements, nor are they 'lighter' in the sense of disappearing mass."}], "id": "q04"}, {"question": "Which of the following statements best defines the Law of Conservation of Matter?", "options": [{"text": "Matter can change form, but its total mass can increase or decrease over time.", "isCorrect": false, "rationale": "The law explicitly states that the total amount of matter (and thus mass) stays the same; it cannot increase or decrease."}, {"text": "In a closed system, matter can be created from energy, but it cannot be destroyed.", "isCorrect": false, "rationale": "The law states that matter cannot be created or destroyed at all, irrespective of energy conversions in chemical reactions."}, {"text": "Matter is always recycled and never truly disappears, even if its form changes.", "isCorrect": true, "rationale": "This statement accurately captures the core idea from the text: 'matter cannot be created or destroyed. In any change or reaction, the total amount of matter stays the same. The atoms are rearranged, but none are lost and none are created.'"}, {"text": "The number of atoms remains constant, but they can spontaneously appear or vanish in a chemical reaction.", "isCorrect": false, "rationale": "The law states that atoms are neither lost nor created; they do not spontaneously appear or vanish."}], "id": "q05"}, {"question": "Imagine starting with a substance as a gas and cooling it down until it becomes a solid. What sequence of changes in atomic movement and energy occurs?", "options": [{"text": "Atoms speed up, energy is added, leading to condensation then freezing.", "isCorrect": false, "rationale": "Cooling involves removing energy, which causes atoms to slow down, not speed up."}, {"text": "Atoms slow down, energy is removed, leading to boiling then melting.", "isCorrect": false, "rationale": "Boiling and melting are processes that occur when energy is added and atoms speed up, not when they slow down and energy is removed."}, {"text": "Atoms slow down, energy is removed, leading to condensation then freezing.", "isCorrect": true, "rationale": "The text explains: 'When you cool a substance, you remove energy. The atoms and molecules slow down. Cool a gas enough...the gas condenses into a liquid. Cool the liquid further...the liquid freezes into a solid.' This matches the sequence of changes described."}, {"text": "Atoms remain at a constant speed, but their bonds strengthen due to cooling.", "isCorrect": false, "rationale": "Cooling directly affects atomic speed, causing them to slow down. The 'bonds strengthening' is a consequence of slower movement allowing closer packing, but the initial change is speed reduction."}], "id": "q06"}, {"question": "When a spoonful of sugar is stirred into a glass of water and completely dissolves, why can you no longer see the sugar, but the total mass of the solution is the sum of the original water and sugar?", "options": [{"text": "The sugar atoms are destroyed and transformed into water molecules, changing the overall mass.", "isCorrect": false, "rationale": "This violates the Law of Conservation of Matter. Sugar atoms are not destroyed or transformed into different substances, and mass is conserved."}, {"text": "The sugar molecules break down into individual atoms that are too small to see, thus reducing the total mass.", "isCorrect": false, "rationale": "Sugar dissolves as molecules, not necessarily individual atoms, and they are not destroyed. The total mass remains conserved, not reduced."}, {"text": "The sugar molecules spread out and mix evenly with the water molecules, but all the original sugar atoms are still present.", "isCorrect": true, "rationale": "The text states: 'When you dissolve sugar in water, the sugar seems to vanish. But every atom of the sugar is still there, mixed in with the water molecules. The total mass of the solution equals the mass of the water plus the mass of the sugar.' This aligns perfectly."}, {"text": "The sugar converts into a gas and escapes, but the water's increased density compensates for the mass loss.", "isCorrect": false, "rationale": "Sugar dissolves, it does not convert to a gas and escape. The mass of the system remains constant, demonstrating conservation."}], "id": "q07"}, {"question": "Linus Pauling's primary contribution to chemistry, for which he won his first Nobel Prize, was his work on:", "options": [{"text": "Developing the theory of relativity, which explains the relationship between mass and energy.", "isCorrect": false, "rationale": "The theory of relativity was developed by Albert Einstein, not Linus Pauling."}, {"text": "Understanding how and why atoms form chemical bonds and determine the shapes of molecules.", "isCorrect": true, "rationale": "The text states: 'Linus Pauling (1901–1994) was an American chemist who figured out how and why atoms bond together. He explained that atoms share or transfer tiny particles to form bonds, and he showed how the shape of a molecule depends on the way its atoms are bonded.' This is explicitly stated as his contribution for his Nobel Prize in Chemistry."}, {"text": "Discovering the atomic nucleus and the existence of protons.", "isCorrect": false, "rationale": "Ernest Rutherford is credited with the discovery of the atomic nucleus, and he, along with others, contributed to the understanding of protons."}, {"text": "Proving that high doses of vitamin C can cure all common illnesses and prevent cancer.", "isCorrect": false, "rationale": "While Pauling did research vitamin C, the text notes 'scientists still debate some of his claims about vitamin C,' and this was not the work for which he won his chemistry Nobel Prize."}], "id": "q08"}, {"question": "In a classroom demonstration, vinegar and baking soda are mixed inside a sealed plastic bag. The bag puffs up, indicating a gas is produced, but the total mass of the sealed bag and its contents remains unchanged. This demonstrates:", "options": [{"text": "That the newly formed gas has no mass and therefore does not affect the total weight.", "isCorrect": false, "rationale": "Carbon dioxide gas, like all matter, has mass. The reason the total weight doesn't change is that the gas is contained."}, {"text": "That chemical reactions always result in a net loss of matter in an open system.", "isCorrect": false, "rationale": "The demonstration uses a *sealed* bag precisely to prevent loss of matter, thereby showing conservation. In an open system, an apparent loss might occur if gas escapes, but this is not a *net loss* of matter, just a loss from the system."}, {"text": "The conservation of matter, as the gas produced is trapped inside the sealed system and its mass is accounted for.", "isCorrect": true, "rationale": "The teacher's note describes this exact demonstration: 'The mass is the same! The CO2 gas is trapped inside, so no matter escaped.' This directly illustrates the Law of Conservation of Matter."}, {"text": "That temperature changes do not affect the mass of a chemical system.", "isCorrect": false, "rationale": "While temperature might change, the demonstration's primary purpose is to show matter conservation, not the lack of effect of temperature on mass (which it doesn't directly address)."}], "id": "q09"}, {"question": "How do the atomic view of states of matter connect with the Law of Conservation of Matter?", "options": [{"text": "Both principles explain that atoms can spontaneously appear or disappear under extreme conditions, thus changing matter.", "isCorrect": false, "rationale": "Both principles affirm that atoms are neither created nor destroyed. Spontaneous appearance or disappearance contradicts both."}, {"text": "The atomic view describes how atoms move and arrange in different states, while conservation of matter ensures those same atoms are merely rearranged, not lost, during phase or chemical changes.", "isCorrect": true, "rationale": "The atomic view explains the 'how' (movement, spacing) of atoms in different states, while conservation of matter establishes the 'what' (the atoms themselves) remain constant throughout these physical and chemical transformations. The text states for states of matter: 'The atoms are the same atoms the whole time. All that changes is how fast they move and how far apart they are.' And for conservation of matter: 'The atoms are rearranged, but none are lost and none are created.'"}, {"text": "States of matter depend on the creation and destruction of atoms, which is consistent with conservation of matter in open systems.", "isCorrect": false, "rationale": "States of matter do not involve the creation or destruction of atoms, and conservation of matter applies universally, not just to open systems where matter might escape."}, {"text": "The conservation of matter only applies to phase changes, not chemical reactions, whereas states of matter apply to both.", "isCorrect": false, "rationale": "The text explicitly states that conservation of matter applies to 'any change or reaction,' including both phase changes and chemical reactions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
