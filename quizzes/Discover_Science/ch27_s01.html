        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 27, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the defining characteristic that classifies a natural resource as 'renewable'?", "options": [{"text": "It is found everywhere on Earth.", "isCorrect": false, "rationale": "While some renewable resources are widespread, this is not the defining characteristic of renewability. Many non-renewable resources are also widely distributed."}, {"text": "It can be replaced or regrown within a human lifetime.", "isCorrect": true, "rationale": "The text explicitly defines a renewable resource as 'a natural resource that can be replaced or regrown within a human lifetime,' specifically noting 'years or decades, not millions of years'."}, {"text": "It takes millions of years to form.", "isCorrect": false, "rationale": "Resources that take millions of years to form (like oil, mentioned in the text) are typically considered non-renewable, which is the opposite of the definition for renewable resources."}, {"text": "It does not create any pollution when used.", "isCorrect": false, "rationale": "While many renewable energy sources (like solar and wind) are clean, the absence of pollution is a characteristic of *how* some are used, not the fundamental definition of a renewable resource itself. Some renewable resources, like wood, can create pollution when burned."}]}, {"question": "The text warns that 'renewable' does not mean 'unlimited.' Which situation best illustrates this warning?", "options": [{"text": "Sunlight consistently reaches Earth, allowing solar panels to generate electricity daily.", "isCorrect": false, "rationale": "This scenario highlights the consistent availability of sunlight, not a situation where a renewable resource is depleted due to misuse."}, {"text": "A country utilizes wind turbines to harness strong winds, powering many homes efficiently.", "isCorrect": false, "rationale": "This describes the effective and beneficial use of a renewable resource, not a warning about its potential for depletion if used unwisely."}, {"text": "A logging company harvests trees from a forest at a rate much faster than new trees can grow and mature.", "isCorrect": true, "rationale": "This scenario directly aligns with the text's warning: 'If we cut down forests faster than new trees can grow, we will run out of forests.' This demonstrates how even a renewable resource can be depleted if not managed wisely."}, {"text": "A river's flow is regulated by a dam, ensuring a steady supply of water for a hydropower plant.", "isCorrect": false, "rationale": "This describes a method of managing a renewable resource (water) sustainably to ensure its continuous use, which is contrary to the warning about potential unlimited use leading to depletion."}]}, {"question": "According to the text, what makes sunlight an exceptionally reliable and long-term renewable resource?", "options": [{"text": "It is easily stored for later use.", "isCorrect": false, "rationale": "The text does not mention easy storage of solar energy; rather, it focuses on its continuous availability and conversion to electricity."}, {"text": "It warms homes and grows food.", "isCorrect": false, "rationale": "These are important *uses* of sunlight, but they do not explain why it is considered 'exceptionally reliable and long-term' in terms of its renewability."}, {"text": "It will continue to shine for another five billion years.", "isCorrect": true, "rationale": "The text explicitly states that 'As long as the Sun keeps shining — and scientists tell us it will for another five billion years — sunlight is a resource that will never run out,' directly addressing its long-term reliability."}, {"text": "It can power hundreds of homes from a single device.", "isCorrect": false, "rationale": "The text attributes the ability to power hundreds of homes to a single large *wind turbine*, not directly to sunlight or solar panels in this context."}]}, {"question": "How do solar panels and wind turbines primarily contribute to a cleaner environment, as described in the section?", "options": [{"text": "They generate electricity by burning natural resources.", "isCorrect": false, "rationale": "The text specifically states that solar panels 'do not burn anything.' Wind turbines harness moving air, not burning anything either. This method of energy generation is associated with fossil fuels, not these renewable technologies."}, {"text": "They operate without making any noise.", "isCorrect": false, "rationale": "While solar panels are noted to make no noise, wind turbines can produce some sound. More importantly, the primary environmental contribution highlighted is related to pollution, not noise."}, {"text": "They do not create pollution.", "isCorrect": true, "rationale": "The text explicitly states that solar panels 'do not burn anything and do not create pollution.' For wind, since it's harnessing moving air, the implication is a clean process without combustion pollution."}, {"text": "They require no maintenance.", "isCorrect": false, "rationale": "The text does not discuss the maintenance requirements of solar panels or wind turbines."}]}, {"question": "What is the fundamental process by which hydropower plants generate electricity?", "options": [{"text": "They burn biomass, such as wood, to heat water and create steam, which then drives generators.", "isCorrect": false, "rationale": "This describes a thermal power plant, possibly using biomass, but not hydropower. Hydropower uses water's kinetic energy."}, {"text": "They use solar panels to convert the Sun's energy directly into electrical current.", "isCorrect": false, "rationale": "This describes solar power, not hydropower. Hydropower relies on moving water."}, {"text": "They harness the energy of flowing water to spin special machines called turbines, which generate electricity.", "isCorrect": true, "rationale": "The text clearly explains: 'A dam built across a river holds water back, then lets it flow through special machines called turbines. The spinning turbines generate electricity. This is called hydropower'."}, {"text": "They capture moving air to rotate giant blades, converting kinetic energy into electrical power.", "isCorrect": false, "rationale": "This describes wind power, not hydropower. Hydropower specifically uses water."}]}, {"question": "The text explains that the water cycle contributes to flowing water being a renewable resource. What is the most significant implication of this connection for hydropower?", "options": [{"text": "It means hydropower is only available in dry climates where evaporation is minimal.", "isCorrect": false, "rationale": "The water cycle involves rain and snowmelt, which replenishes rivers in various climates, not just dry ones. Hydropower relies on consistent flow, not dryness."}, {"text": "It ensures rivers are continuously refilled by precipitation, sustaining the water supply for power generation.", "isCorrect": true, "rationale": "The text states: 'Remember from Unit 12 that the water cycle keeps moving water around the planet. Rivers are constantly being refilled by rain and snowmelt, so flowing water is a renewable resource.' This directly links the water cycle to the continuous availability of water for hydropower."}, {"text": "It suggests that water pollution is not a concern for hydropower plants.", "isCorrect": false, "rationale": "The water cycle's role in renewability is about the quantity of water, not its quality or the absence of pollution. Pollution remains a separate environmental consideration."}, {"text": "It implies that water flow can be easily stopped and started on demand for electricity production.", "isCorrect": false, "rationale": "While dams regulate flow, the water cycle's primary contribution to renewability is the continuous replenishment of water, not necessarily the ease of stopping and starting flow on a short-term basis."}]}, {"question": "For trees and plants to remain a renewable resource, what crucial human action is necessary according to the text?", "options": [{"text": "Converting all natural forests into highly managed tree farms.", "isCorrect": false, "rationale": "While tree farms are mentioned as an example of managed growth, the general and crucial action for all trees to remain renewable is not necessarily to convert *all* forests, but to manage cutting and replanting."}, {"text": "Protecting them from all natural predators and diseases.", "isCorrect": false, "rationale": "The text does not mention protection from predators or diseases as the crucial action for trees' renewability. It focuses on human harvesting practices."}, {"text": "Using only fast-growing species of trees that mature quickly.", "isCorrect": false, "rationale": "The text mentions fast-growing species for tree farms but states the general condition for renewability is 'As long as we replant trees after we cut them down'."}, {"text": "Planting new trees after old ones are cut down.", "isCorrect": true, "rationale": "The text explicitly states: 'As long as we replant trees after we cut them down, forests can keep providing these resources.' This highlights the human responsibility in maintaining renewability."}]}, {"question": "Based on the section, which statement accurately characterizes the renewability of soil?", "options": [{"text": "Soil is a non-renewable resource because it takes hundreds of years to form.", "isCorrect": false, "rationale": "The text explicitly states, 'Soil is renewable.' Although it forms slowly, it is still classified as renewable within the context of nature's ability to replace it."}, {"text": "Soil is quickly renewed within a few years if farmers use the right fertilizers.", "isCorrect": false, "rationale": "The text states soil is renewed 'very slowly,' taking '500 to 1,000 years to form just one inch of topsoil,' which contradicts quick renewal."}, {"text": "Soil is renewable, but its formation is extremely slow, making careful management essential to prevent rapid loss.", "isCorrect": true, "rationale": "The text notes: 'Soil is renewable — but very slowly... If we take care of the soil by preventing erosion and adding organic matter, it can keep producing food... But if we treat it carelessly, it can be lost much faster than it forms.' This accurately captures its slow renewability and the need for management."}, {"text": "Soil renews automatically without any human intervention, making it an unlimited resource.", "isCorrect": false, "rationale": "While soil forms naturally, the text emphasizes that 'if we take care of the soil' through specific actions like preventing erosion and adding organic matter, it can be maintained. It is also not unlimited due to its slow formation."}]}, {"question": "When the text defines a renewable resource as one that can be replaced 'within a human lifetime,' what does it specify as the approximate timeframe for this 'short time'?", "options": [{"text": "Days or weeks.", "isCorrect": false, "rationale": "While some natural processes occur quickly, the text's definition of 'short time' for renewable resources like trees (20-30 years) is much longer than days or weeks."}, {"text": "Years or decades.", "isCorrect": true, "rationale": "The text explicitly clarifies: ''Short' here means within a human lifetime — years or decades, not millions of years.' This timeframe aligns with the growth of trees, for example."}, {"text": "Centuries or millennia.", "isCorrect": false, "rationale": "While some renewal (like soil formation) can take centuries, the general definition of 'within a human lifetime' is specified as 'years or decades,' not extending to millennia."}, {"text": "Millions of years.", "isCorrect": false, "rationale": "The text explicitly states that 'short' means 'not millions of years,' as resources taking that long to form are considered non-renewable."}]}, {"question": "A city council is debating which type of new power plant to build. They want a source that produces no air pollution and is considered inexhaustible for the foreseeable future (billions of years). Based on the text, which option would best meet these criteria?", "options": [{"text": "A hydropower plant on a major river.", "isCorrect": false, "rationale": "Hydropower is clean and renewable, but the text does not describe its resource (flowing water) as 'inexhaustible for billions of years' in the same way it does sunlight, as it relies on the continuous water cycle on Earth."}, {"text": "A wind farm in a consistently breezy area.", "isCorrect": false, "rationale": "Wind power is clean and renewable, and the wind will blow as long as the Sun shines. However, the text specifically highlights sunlight as the resource with a five-billion-year timeframe, which is the direct answer to 'inexhaustible for billions of years'."}, {"text": "A large solar power facility.", "isCorrect": true, "rationale": "The text states that solar panels 'do not burn anything and do not create pollution' and that sunlight 'will for another five billion years' never run out. This perfectly matches the criteria of no pollution and inexhaustibility for billions of years."}, {"text": "A new tree farm designed for burning wood to generate electricity (biomass energy).", "isCorrect": false, "rationale": "While trees are renewable, burning wood (biomass) *does* create pollution (smoke), and the resource isn't described as inexhaustible for billions of years in the same way sunlight is. This option fails on the 'no air pollution' criterion."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
