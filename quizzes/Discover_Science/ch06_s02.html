<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the two primary functions of a plant's roots?", "options": [{"text": "Producing food and attracting pollinators.", "isCorrect": false, "rationale": "Leaves produce food through photosynthesis, and flowers attract pollinators. Roots do not perform these functions."}, {"text": "Anchoring the plant in the ground and absorbing water and dissolved minerals.", "isCorrect": true, "rationale": "The text explicitly states that roots 'anchor the plant in the ground' and 'absorb water and dissolved minerals from the soil'."}, {"text": "Transporting sugar and supporting the stem.", "isCorrect": false, "rationale": "The stem is responsible for transporting substances (including sugar via phloem) and supporting the plant upright, not the roots."}, {"text": "Releasing oxygen and protecting seeds.", "isCorrect": false, "rationale": "Leaves release oxygen, and fruit protects seeds. These are not functions of the roots."}]}, {"question": "Imagine a plant's delicate root hairs are extensively damaged by rough handling during transplanting. What would be the most immediate and significant consequence for the plant's survival?", "options": [{"text": "The plant would struggle to remain upright against strong winds.", "isCorrect": false, "rationale": "While severe root damage could affect anchoring, the main root system provides the primary anchor. Root hairs are more focused on absorption."}, {"text": "Its ability to absorb water and dissolved minerals would be severely impaired.", "isCorrect": true, "rationale": "The text states that 'Tiny root hairs... reach between grains of soil and soak up moisture.' Damaging these would directly hinder the plant's crucial water and mineral uptake."}, {"text": "The plant's leaves would turn yellow due to lack of sugar transport.", "isCorrect": false, "rationale": "Sugar transport is handled by phloem tubes in the stem and is not directly affected by root hair damage."}, {"text": "It would be unable to produce flowers or fruit in the next growing season.", "isCorrect": false, "rationale": "While severe damage could indirectly affect overall plant health and reproduction in the long term, this is not the most immediate or direct consequence of damaged root hairs. Reproduction is primarily handled by flowers, fruit, and seeds."}]}, {"question": "A gardener notices that despite regular watering, the new leaves on a plant are wilting and appear dehydrated, while older leaves seem unaffected. Upon inspection, they find a blockage in some of the plant's stem tissues. Which specific tubes are most likely blocked?", "options": [{"text": "Phloem tubes, preventing sugar from reaching the new leaves.", "isCorrect": false, "rationale": "Phloem tubes carry sugar, but wilting is a sign of lack of water, not sugar. Also, phloem primarily transports sugar *down* from leaves."}, {"text": "Stomata, preventing water vapor from being released.", "isCorrect": false, "rationale": "Stomata are found on leaves, not in the stem. While they regulate water, a blockage in the stem would affect water delivery, not release from stomata."}, {"text": "Xylem tubes, preventing water and minerals from reaching the new leaves.", "isCorrect": true, "rationale": "The text states that 'Xylem tubes carry water and minerals up from the roots to the leaves.' A blockage in these tubes would directly prevent water from reaching new leaves, causing wilting and dehydration."}, {"text": "Root hairs, preventing water absorption from the soil.", "isCorrect": false, "rationale": "Root hairs are in the roots, not the stem. If root hairs were the issue, all parts of the plant, including older leaves, would likely show signs of dehydration."}]}, {"question": "In the celery demonstration described, colored water rises through the stalk and eventually tints the leaves. This observation directly illustrates the function of which plant part and its specific vascular tissue?", "options": [{"text": "Roots, absorbing minerals.", "isCorrect": false, "rationale": "The demonstration focuses on upward movement *within the stem*, not the initial absorption by roots."}, {"text": "Stem, with its xylem tubes carrying water upward.", "isCorrect": true, "rationale": "The text explicitly states: 'If you place a stalk of white celery in a glass of water mixed with food coloring, the colored water rises through the xylem tubes.' This directly demonstrates the stem's xylem function."}, {"text": "Leaves, performing photosynthesis.", "isCorrect": false, "rationale": "While the water reaches the leaves, the demonstration illustrates the *transport* mechanism (xylem) in the stem, not the process of photosynthesis itself."}, {"text": "Stem, with its phloem tubes carrying sugar downward.", "isCorrect": false, "rationale": "Phloem tubes carry sugar *downward*, whereas the demonstration shows water moving *upward*."}]}, {"question": "During photosynthesis, leaves are described as 'food factories.' Which two crucial substances do leaves actively take in from their surrounding environment to perform this process and also facilitate 'breathing'?", "options": [{"text": "Oxygen and water vapor.", "isCorrect": false, "rationale": "Oxygen is released as a byproduct of photosynthesis, not taken in for it. Water vapor is also released from stomata, not taken in from the air for photosynthesis."}, {"text": "Glucose and minerals.", "isCorrect": false, "rationale": "Glucose (sugar) is *produced* by photosynthesis, not taken in. Minerals are absorbed by roots."}, {"text": "Sunlight and sugar.", "isCorrect": false, "rationale": "Sunlight is energy, not a substance taken in. Sugar (glucose) is produced, not absorbed from the environment for photosynthesis."}, {"text": "Carbon dioxide and water.", "isCorrect": true, "rationale": "The text states leaves use 'sunlight, water, and a gas from the air called carbon dioxide to make glucose.' Stomata let carbon dioxide in, and water is supplied from the roots."}]}, {"question": "On a hot, sunny day, a plant's stomata might partially close. Based on the text, what is the primary benefit of this action for the plant, and what is a potential trade-off?", "options": [{"text": "Benefit: Increases carbon dioxide intake; Trade-off: Reduces oxygen release.", "isCorrect": false, "rationale": "Closing stomata would *reduce* carbon dioxide intake, not increase it. Oxygen release would also be reduced."}, {"text": "Benefit: Conserves water vapor; Trade-off: Limits carbon dioxide intake.", "isCorrect": true, "rationale": "The text explains that stomata 'release water vapor, which keeps the leaf cool — just like sweating cools your skin.' Closing them would conserve water. However, closing also restricts the entry of carbon dioxide, which is essential for photosynthesis."}, {"text": "Benefit: Enhances photosynthesis; Trade-off: Reduces nutrient absorption.", "isCorrect": false, "rationale": "Closing stomata limits CO2, which would *hinder* photosynthesis, not enhance it. Nutrient absorption occurs in the roots, not via stomata."}, {"text": "Benefit: Attracts pollinators; Trade-off: Slows sugar transport.", "isCorrect": false, "rationale": "Stomata are not involved in attracting pollinators, and their closing does not directly slow sugar transport in phloem tubes."}]}, {"question": "Which of the following sequences accurately represents the reproductive process of a flowering plant as described in the text?", "options": [{"text": "Fruit develops → Seeds attract pollinators → Flowers are released.", "isCorrect": false, "rationale": "This sequence is incorrect. Flowers attract pollinators before fruit develops, and seeds are released from fruit, not that flowers are released from seeds."}, {"text": "Pollination occurs in flowers → Fruit forms around seeds → Seeds are released.", "isCorrect": true, "rationale": "The text states: 'Flowers attract pollinators... Pollen is carried from one flower to another. After pollination, the flower's base develops into a fruit that surrounds and protects the growing seeds. When the fruit is ripe, the seeds are released.'"}, {"text": "Seeds germinate → Flowers grow → Fruit produces pollen.", "isCorrect": false, "rationale": "This sequence is incorrect. Seeds germinate into a new plant, and fruit protects seeds; it does not produce pollen."}, {"text": "Pollen is carried by fruit → Seeds develop into flowers → New plants grow.", "isCorrect": false, "rationale": "This sequence is incorrect. Pollen is carried to flowers, not by fruit, and seeds grow into new plants, not into flowers."}]}, {"question": "A plant is observed to consistently produce flowers, but these flowers never develop into fruit, and thus no new seeds are formed. Based on the functions described, which part of the plant's reproductive system is most likely failing?", "options": [{"text": "The roots, failing to provide enough water for fruit development.", "isCorrect": false, "rationale": "While water is essential, the direct failure point is the transformation of the flower into fruit, not a general lack of water from the roots (which would likely show other symptoms first)."}, {"text": "The leaves, not producing enough sugar for seed growth.", "isCorrect": false, "rationale": "Sugar from leaves is important for overall growth, but the immediate failure is the *development* of fruit from the flower, pointing to a more direct issue with the reproductive process itself."}, {"text": "The flowers, failing to be pollinated or undergo the transformation into fruit.", "isCorrect": true, "rationale": "The text states, 'After pollination, the flower's base develops into a fruit that surrounds and protects the growing seeds.' If flowers are produced but fruit does not develop, it strongly suggests a problem with either the pollination process or the subsequent development within the flower itself."}, {"text": "The stem, unable to transport nutrients to the developing fruit.", "isCorrect": false, "rationale": "Transport is vital, but the primary issue is the *failure of fruit to form* in the first place, not necessarily an inability to transport to an already forming fruit."}]}, {"question": "If a plant were conceptualized as a complex machine or system, which analogy correctly pairs a plant part with its primary functional role in that system?", "options": [{"text": "Roots are like the solar panels, capturing energy.", "isCorrect": false, "rationale": "Leaves, not roots, are like solar panels, as they capture sunlight for energy production."}, {"text": "Leaves are like the factory production floor, manufacturing essential energy.", "isCorrect": true, "rationale": "The text refers to leaves as 'food factories' where the 'magic happens' and glucose (energy) is made through photosynthesis, making this a fitting analogy."}, {"text": "Stems are like the waste disposal unit, removing excess water.", "isCorrect": false, "rationale": "Stems are the 'delivery service' for transport. Stomata in leaves are responsible for releasing water vapor, acting more like a cooling/release mechanism."}, {"text": "Flowers are like the structural beams, holding the plant upright.", "isCorrect": false, "rationale": "The stem/trunk provides structural support and holds the plant upright, while flowers are primarily for reproduction."}]}, {"question": "The 'Sciencelife' section emphasizes that 'Plants are the starting point for nearly every meal on Earth.' This statement best supports which broader ecological principle?", "options": [{"text": "Plants are the primary consumers in most ecosystems.", "isCorrect": false, "rationale": "Plants are producers, not consumers. They create their own food and form the base of the food chain."}, {"text": "Photosynthesis is the ultimate source of energy for most life forms.", "isCorrect": true, "rationale": "Since plants produce food through photosynthesis, and nearly all food on Earth comes from plants (or animals that ate plants), photosynthesis is the fundamental process that converts light energy into usable chemical energy for ecosystems."}, {"text": "Animals are entirely dependent on fruits for their nutritional needs.", "isCorrect": false, "rationale": "The text mentions bread from wheat seeds, salad from leaves, and cows eating grass, indicating that animals consume various plant parts, not just fruits. Some animals also eat other animals."}, {"text": "All food products are directly derived from plant matter.", "isCorrect": false, "rationale": "The text clarifies 'almost all of it came from plants — or from animals that ate plants!' This implies indirect derivation through animals is also very common, so not *all* products are *directly* from plants."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
