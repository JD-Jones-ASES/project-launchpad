    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic of a solution, as described in the text?", "options": [{"text": "It is a mixture where different substances settle into distinct layers.", "isCorrect": false, "rationale": "This describes a mixture where substances do not dissolve, like oil and water, not a solution."}, {"text": "It is a special kind of mixture where one substance breaks apart and spreads evenly throughout another, becoming invisible.", "isCorrect": true, "rationale": "The text defines a solution as 'a special kind of mixture in which one substance dissolves evenly into another,' and 'dissolves' means to 'break apart and spread evenly throughout a liquid so that the pieces are too small to see.'"}, {"text": "It is a substance that has undergone a chemical change to form a new compound.", "isCorrect": false, "rationale": "The text describes dissolving as a physical process of spreading, not a chemical change to form a new compound."}, {"text": "It is a solid substance that has melted into a liquid form due to heat.", "isCorrect": false, "rationale": "This describes melting, which the text explicitly states is different from dissolving and forming a solution."}], "id": "q01"}, {"question": "When you stir sugar into water to make sugar water, what roles do the sugar and water play?", "options": [{"text": "Sugar is the solvent, and water is the solute.", "isCorrect": false, "rationale": "The solvent does the dissolving, and the solute is the substance that dissolves. Water does the dissolving of the sugar."}, {"text": "Sugar is the solute, and water is the solvent.", "isCorrect": true, "rationale": "The text states, 'The solute — the substance that dissolves. In sugar water, sugar is the solute.' And 'The solvent — the substance that does the dissolving. In sugar water, water is the solvent.'"}, {"text": "Both sugar and water are solutes.", "isCorrect": false, "rationale": "In a simple solution like sugar water, there is typically one primary solute and one primary solvent, each playing a distinct role."}, {"text": "Both sugar and water are solvents.", "isCorrect": false, "rationale": "In a simple solution like sugar water, there is typically one primary solute and one primary solvent, each playing a distinct role."}], "id": "q02"}, {"question": "Why is water commonly referred to as the 'universal solvent'?", "options": [{"text": "Because it is the most abundant liquid on Earth.", "isCorrect": false, "rationale": "While water is abundant, the text states its 'universal solvent' status is due to its dissolving capabilities, not its prevalence."}, {"text": "Because it can dissolve more substances than any other common liquid.", "isCorrect": true, "rationale": "The text explicitly states: 'Water is called the universal solvent because it can dissolve more substances than any other common liquid.'"}, {"text": "Because it can melt all solid substances when heated sufficiently.", "isCorrect": false, "rationale": "This option confuses melting with dissolving and doesn't explain the 'universal solvent' property in the context of the text."}, {"text": "Because it never allows any substance to form a separate layer on top.", "isCorrect": false, "rationale": "The text shows oil and water forming separate layers, demonstrating that water does not dissolve everything."}], "id": "q03"}, {"question": "A student attempts to mix sand into water, but the sand sinks to the bottom. What can be concluded about this mixture based on the text?", "options": [{"text": "The sand is a solute, and the water is a solvent, but it needs more stirring.", "isCorrect": false, "rationale": "The text states, 'No matter how long you stir, the sand sinks to the bottom. Sand does not dissolve in water.' Thus, it's not acting as a solute."}, {"text": "The sand and water form a solution, but the sand is too dense to spread evenly.", "isCorrect": false, "rationale": "If the sand sinks to the bottom and doesn't spread evenly, it has not formed a solution, as solutions require even distribution of the dissolved substance."}, {"text": "The sand does not dissolve in water, indicating that not all substances dissolve in every liquid.", "isCorrect": true, "rationale": "The text directly states, 'Sand does not dissolve in water.' and follows with 'Whether something dissolves depends on the substances involved.'"}, {"text": "The water has melted the sand, and it will eventually become invisible.", "isCorrect": false, "rationale": "This option incorrectly suggests melting and implies the sand will become invisible, both contrary to the text's description of sand in water."}], "id": "q04"}, {"question": "Which of the following scenarios best illustrates the process of dissolving, as distinct from melting?", "options": [{"text": "An ice cube turns into liquid water when left on a warm counter.", "isCorrect": false, "rationale": "This is an example of melting, where a solid turns into a liquid of the same substance due to heat, without a solvent."}, {"text": "A block of cheese softens and spreads when heated on a pizza.", "isCorrect": false, "rationale": "This is more akin to melting or softening due to heat, not dissolving in a liquid solvent."}, {"text": "A spoonful of instant coffee powder disappears when stirred into hot water.", "isCorrect": true, "rationale": "This is a classic example of dissolving, where a solid (coffee powder) breaks apart and spreads evenly into a liquid (hot water), becoming invisible, requiring a solvent."}, {"text": "Oil forms a separate layer on top of vinegar in a salad dressing.", "isCorrect": false, "rationale": "This is an example of substances that do not dissolve in each other, forming immiscible layers, not dissolving."}], "id": "q05"}, {"question": "The 'ScienceLife' box describes making lemonade. If you were to add too much sugar, and some remained at the bottom, which component would be 'saturated' or unable to dissolve more?", "options": [{"text": "The sugar, because it's the solute and there's too much of it.", "isCorrect": false, "rationale": "The sugar is the solute, but the solvent (water) is what becomes saturated or unable to dissolve more of the solute."}, {"text": "The lemon juice, because it affects the sugar's ability to dissolve.", "isCorrect": false, "rationale": "While lemon juice is a solute, the issue of undissolved sugar relates to the solvent's capacity, not the lemon juice."}, {"text": "The water, because it is the solvent and has reached its limit for dissolving sugar.", "isCorrect": true, "rationale": "The water is the solvent, and if sugar remains undissolved, it means the solvent has reached its capacity to dissolve the solute."}, {"text": "The entire lemonade solution, as it can no longer accept any more ingredients.", "isCorrect": false, "rationale": "More precisely, it's the solvent (water) within the solution that can no longer dissolve more of the specific solute (sugar)."}], "id": "q06"}, {"question": "What is the key difference between melting and dissolving, according to the text?", "options": [{"text": "Melting requires a solvent, while dissolving only needs heat.", "isCorrect": false, "rationale": "This statement reverses the requirements. Melting requires heat, dissolving requires a solvent."}, {"text": "Melting is a solid turning into a liquid due to heat; dissolving is a solid breaking apart and spreading through a liquid with a solvent.", "isCorrect": true, "rationale": "The text explicitly states: 'Melting happens when a solid gets warm enough to turn into a liquid. ...Only heat is needed.' and 'Dissolving happens when a solid breaks apart and spreads through a liquid. ...A solvent is needed.'"}, {"text": "Melting changes the chemical composition of a substance, while dissolving does not.", "isCorrect": false, "rationale": "Both melting and dissolving are generally physical changes, not chemical changes that alter composition."}, {"text": "Dissolving can only happen with sugar, whereas melting can happen with any solid.", "isCorrect": false, "rationale": "The text provides examples of other solutes (salt, acetic acid), showing dissolving is not limited to sugar, and implies other solids can melt."}], "id": "q07"}, {"question": "The 'teachernote' mentions that temperature affects dissolving speed. How might this concept be applied when making iced tea?", "options": [{"text": "Sugar should be added directly to cold water to prevent it from melting.", "isCorrect": false, "rationale": "Adding sugar to cold water would make it dissolve slower, and sugar doesn't melt in water. This is an inefficient approach."}, {"text": "It is best to dissolve sugar in a small amount of hot water first before adding cold water and ice.", "isCorrect": true, "rationale": "The 'teachernote' suggests that 'temperature affects dissolving speed' and asks 'Does sugar dissolve faster in warm water or cold water?' implying warm water is better. Dissolving sugar in hot water first maximizes dissolving speed before cooling."}, {"text": "Adding ice cubes makes the sugar dissolve faster because the cold helps break it apart.", "isCorrect": false, "rationale": "Cold temperatures generally slow down the dissolving process, as hinted by the extension question in the teachernote."}, {"text": "Temperature only affects melting, not dissolving, so it makes no difference.", "isCorrect": false, "rationale": "The teachernote specifically states 'temperature affects dissolving speed,' making this statement incorrect."}], "id": "q08"}, {"question": "The text provides a table listing various solutions, their solutes, and solvents. Which of the following is consistent with the information presented in the table and the text?", "options": [{"text": "In vinegar, acetic acid is the solvent because it gives vinegar its distinct taste.", "isCorrect": false, "rationale": "The table clearly states that in vinegar, acetic acid is the solute and water is the solvent."}, {"text": "In salt water, salt is the solute and water is the solvent.", "isCorrect": true, "rationale": "The table explicitly lists 'Salt water' with 'Salt' as the solute and 'Water' as the solvent."}, {"text": "Lemonade is a solution where only sugar is the solute, and water is the solvent.", "isCorrect": false, "rationale": "The table and 'ScienceLife' box specify that lemonade has 'Sugar + lemon juice' as solutes."}, {"text": "All solutions listed in the table use a non-water liquid as their solvent.", "isCorrect": false, "rationale": "The table shows 'Water' as the solvent for all examples provided, reinforcing its role as the 'universal solvent'."}], "id": "q09"}, {"question": "The text states, 'Whether something dissolves depends on the substances involved. ...This difference is one of the clues scientists use to identify and separate substances.' What does this suggest about the property of dissolving?", "options": [{"text": "Dissolving is a random process that cannot be predicted.", "isCorrect": false, "rationale": "The text implies that dissolving is predictable based on the substances, stating it's a 'clue scientists use' for identification."}, {"text": "The ability to dissolve or not dissolve in a specific solvent is a characteristic property unique to each substance.", "isCorrect": true, "rationale": "If scientists use this difference to 'identify and separate substances,' it implies that the dissolving behavior is a consistent and characteristic property of those substances."}, {"text": "Scientists only use the taste of a substance to determine if it has dissolved.", "isCorrect": false, "rationale": "While taste is mentioned for sugar, the broader context of 'identifying and separating substances' implies more scientific methods than just taste."}, {"text": "All substances will eventually dissolve if enough solvent or time is provided.", "isCorrect": false, "rationale": "The examples of sand and oil explicitly contradict this, stating they 'do not dissolve' in water, regardless of stirring time."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
