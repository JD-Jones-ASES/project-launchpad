    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 30, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the introductory 'Purpose of This Reading' note, what is the primary goal of this section?", "options": [{"text": "To introduce new scientific discoveries unique to urban environments.", "isCorrect": false, "rationale": "The text states the reading 'ties all four branches of science...to a single setting' and is a 'comprehensive review,' not an introduction of new discoveries."}, {"text": "To illustrate how all four branches of science are interconnected within a modern city setting.", "isCorrect": true, "rationale": "The purpose explicitly states it 'ties all four branches of science from Cycle 6 to a single setting — a modern city,' making this the core objective."}, {"text": "To detail the historical development of scientific principles used in city planning.", "isCorrect": false, "rationale": "While some historical figures are mentioned, the primary focus is on current scientific principles at play in a city, not the history of city planning."}, {"text": "To provide a detailed guide on how to conserve resources in an urban apartment.", "isCorrect": false, "rationale": "Conservation is a topic discussed under Earth Science, but it is a sub-theme within the broader goal of connecting all science branches to the city."}], "id": "q01"}, {"question": "A new species of bird is discovered nesting exclusively in the hollow lampposts of a bustling city park, using discarded plastic bags as nesting material. Which concept from the Life Science section best describes this phenomenon?", "options": [{"text": "Nonrenewable resource dependency.", "isCorrect": false, "rationale": "Nonrenewable resource dependency is an Earth Science concept, dealing with materials like iron ore, not biological adaptations for nesting."}, {"text": "Behavioral and structural adaptation.", "isCorrect": true, "rationale": "Nesting in lampposts (utilizing an urban structure) and using plastic bags (a specific material-gathering behavior) are examples of how organisms adapt behaviorally and structurally to their environment, as described in the Life Science section."}, {"text": "Conservation of matter.", "isCorrect": false, "rationale": "Conservation of matter is a Chemistry concept, concerning the indestructibility and rearrangement of atoms, unrelated to biological nesting strategies."}, {"text": "Principles of electricity and magnetism.", "isCorrect": false, "rationale": "Electricity and magnetism fall under Physics, describing how the city is powered, not how organisms adapt to live within it."}], "id": "q02"}, {"question": "Which pair of resources represents a nonrenewable resource followed by a renewable resource, as described in the text for building and sustaining a city?", "options": [{"text": "Iron ore; sand.", "isCorrect": false, "rationale": "Iron ore is nonrenewable. While sand is abundant, the text doesn't explicitly categorize it as a primary 'renewable resource' in the same context as wind or trees. It's a component of concrete and glass."}, {"text": "Copper; limestone.", "isCorrect": false, "rationale": "Both copper and limestone are mined from the earth and are considered nonrenewable on human timescales, despite very slow natural regeneration for limestone."}, {"text": "Steel; wood.", "isCorrect": false, "rationale": "Steel is a material made from iron ore (a nonrenewable resource), not a raw resource itself in this context. Wood is a renewable resource."}, {"text": "Iron ore; wind.", "isCorrect": true, "rationale": "The text explicitly states 'The steel in skyscrapers comes from iron ore — a nonrenewable resource.' It also mentions 'solar panels and wind turbines to generate electricity from sunlight and wind,' categorizing wind as a renewable resource."}], "id": "q03"}, {"question": "A city plans to demolish an old, unused bridge made primarily of concrete and steel. According to the principle of conservation of matter discussed in the Chemistry section, what is the most scientifically accurate outcome for the materials?", "options": [{"text": "The atoms in the concrete and steel will disappear as the bridge is destroyed, requiring new atoms to be created for any new construction.", "isCorrect": false, "rationale": "This statement directly contradicts the principle of conservation of matter, which states that atoms are neither created nor destroyed."}, {"text": "The atoms that make up the concrete and steel will be rearranged into new forms or structures, potentially for reuse in other projects.", "isCorrect": true, "rationale": "The text states, 'Atoms are never created or destroyed — they just move from one form to another,' giving examples like steel being melted down and concrete crushed for reuse, aligning with this option."}, {"text": "The concrete will dissolve into its elemental components and dissipate into the environment, while the steel will rust away completely.", "isCorrect": false, "rationale": "While materials can degrade (like steel rusting), the constituent atoms do not simply 'dissipate' or 'disappear'; they form new compounds or rearrange, which is not fully captured by this option."}, {"text": "The mass of the bridge materials will significantly decrease during demolition due to energy release, defying efforts to recycle them.", "isCorrect": false, "rationale": "The conservation of matter implies that the total mass of atoms remains constant, even if energy is released. Mass-energy equivalence is beyond the scope of this text's discussion on conservation of matter in this context."}], "id": "q04"}, {"question": "How do power plants primarily generate electricity for a city, based on the Physics section?", "options": [{"text": "By using electric motors to convert electrical energy into motion, which then powers the city.", "isCorrect": false, "rationale": "Electric motors convert electricity into motion; they do not generate the electricity for the grid. Generators perform the opposite function."}, {"text": "By employing generators that use spinning magnets within wire coils to transform motion into electric current.", "isCorrect": true, "rationale": "The text clearly states, 'Power plants use generators — spinning magnets surrounded by coils of wire — to convert motion into electric current.'"}, {"text": "By harnessing the direct power of simple machines like levers and inclined planes.", "isCorrect": false, "rationale": "Simple machines are used throughout the city for various tasks, but they are not the primary means of large-scale electricity generation at power plants."}, {"text": "By converting chemical energy from burning fossil fuels directly into electric current without mechanical intermediaries.", "isCorrect": false, "rationale": "While fossil fuels often provide the energy for the motion, the text emphasizes the role of generators (mechanical intermediaries) in converting that motion into electric current, not a direct conversion."}], "id": "q05"}, {"question": "You observe a street artist creating a sculpture from recycled plastic bottles, which he then coats with a special paint that changes color with temperature. Identifying the core scientific branch for the *plastic material itself* and the *temperature-changing paint*, respectively, would align with which two categories from the text?", "options": [{"text": "Life Science; Earth Science.", "isCorrect": false, "rationale": "Neither plastic nor the properties of paint are primarily classified under Life Science (organisms) or Earth Science (resources, geology) in the context of this text."}, {"text": "Physics; Life Science.", "isCorrect": false, "rationale": "While temperature relates to Physics, the material composition of plastic and the specific properties of the color-changing paint are not primarily Life Science concepts."}, {"text": "Chemistry; Chemistry.", "isCorrect": true, "rationale": "The text states, 'The plastic in a water bottle is a long chain of carbon and hydrogen atoms linked together,' which is a Chemistry concept. The color-changing property of paint involves chemical reactions or molecular structures reacting to temperature, also falling under Chemistry."}, {"text": "Earth Science; Physics.", "isCorrect": false, "rationale": "Earth Science is incorrect for plastic composition. While temperature is a Physics concept, the material science behind the color change is fundamentally Chemistry."}], "id": "q06"}, {"question": "The text mentions Eunice Newton Foote's discovery and links it to modern city conservation efforts. What is the analytical connection being made?", "options": [{"text": "Foote's work on electricity and magnetism paved the way for energy-efficient urban infrastructure.", "isCorrect": false, "rationale": "Foote's work, as described, focused on CO2's heat-trapping properties, not electricity and magnetism (which was Faraday's contribution)."}, {"text": "Her identification of CO2's heat-trapping properties highlights the importance of reducing fossil fuel use in cities to mitigate climate impacts.", "isCorrect": true, "rationale": "The text states, 'Eunice Newton Foote showed us that burning fossil fuels adds CO2 to the atmosphere and traps heat. Today, cities around the world are working to reduce, reuse, and recycle,' directly linking her discovery to modern climate-related conservation efforts."}, {"text": "Her discoveries primarily related to the structural adaptations of urban organisms, promoting biodiverse city planning.", "isCorrect": false, "rationale": "This describes a Life Science concept, which is unrelated to Eunice Newton Foote's work as presented in the text."}, {"text": "Foote's research into nonrenewable resources led directly to the development of recycling programs for urban waste.", "isCorrect": false, "rationale": "While recycling is a conservation effort, Foote's specific contribution mentioned was about CO2 and heat trapping, not general nonrenewable resource research or recycling program development."}], "id": "q07"}, {"question": "The text describes the life cycles of both a pigeon and a dandelion in a city. What fundamental aspect of life cycles do these two diverse organisms share, as implicitly presented?", "options": [{"text": "Both involve a period of hibernation or dormancy during harsh urban winters.", "isCorrect": false, "rationale": "The text does not mention hibernation or dormancy for either organism; it focuses on their developmental stages. Dandelions, for instance, are often hardy in winter without true hibernation."}, {"text": "Both require specialized structural adaptations to survive exclusively on skyscrapers.", "isCorrect": false, "rationale": "Only peregrine falcons are mentioned as adapting to nest on skyscrapers. Pigeons nest on ledges, and dandelions grow in cracks, not exclusively on skyscrapers."}, {"text": "Both follow a predictable sequence of development, reproduction, and new generation, leading back to the beginning state.", "isCorrect": true, "rationale": "The text illustrates cyclical sequences for both: 'egg -> chick -> adult -> egg' for pigeons, and 'seed -> germination -> growth -> flower -> seed' for dandelions, highlighting the cyclical nature of life cycles."}, {"text": "Both exclusively consume human-generated waste products for energy, demonstrating unique city survival skills.", "isCorrect": false, "rationale": "While some city organisms (like cockroaches) eat 'almost anything,' this specific diet is not stated for pigeons or dandelions, nor is it a universal characteristic of life cycles."}], "id": "q08"}, {"question": "A city construction worker uses a long metal bar to lift a heavy manhole cover. This action, making work easier by changing the direction or magnitude of force, is an application of which simple machine mentioned in the text?", "options": [{"text": "Inclined plane.", "isCorrect": false, "rationale": "An inclined plane is a ramp, used to move objects up or down a slope, not to lift them with a bar. Ramps help people in wheelchairs, as mentioned."}, {"text": "Wheel and axle.", "isCorrect": false, "rationale": "A wheel and axle, like a doorknob, uses rotation. A straight bar lifting an object is not a wheel and axle."}, {"text": "Lever.", "isCorrect": true, "rationale": "A long bar used to lift a heavy object is a classic example of a lever, which allows a smaller force to be applied over a greater distance to move a heavier load."}, {"text": "Wedge.", "isCorrect": false, "rationale": "A wedge, like the blade of scissors, is used to separate or split objects, not to lift them using a bar."}], "id": "q09"}, {"question": "The conclusion states that the four branches of science are 'not really separate at all' but 'four ways of looking at the same amazing world.' Which of the following scenarios best exemplifies this interconnectedness within a city?", "options": [{"text": "A scientist studying the unique genetic code of a city pigeon to understand its evolutionary history.", "isCorrect": false, "rationale": "This scenario primarily focuses on Life Science, without explicitly integrating concepts from other branches as outlined in the text's interconnected view."}, {"text": "An engineer designing a skyscraper using steel (chemistry/Earth science), powered by electricity (physics), and considering its impact on urban bird nesting (life science).", "isCorrect": true, "rationale": "This scenario demonstrates the integration of multiple branches: materials (steel involves Chemistry and Earth Science resources), power systems (electricity is Physics), and environmental impact on wildlife (bird nesting is Life Science), precisely matching the text's emphasis on interconnectedness in an urban context."}, {"text": "A geologist analyzing rock samples from the city's foundation to determine their origin and age.", "isCorrect": false, "rationale": "This scenario primarily focuses on Earth Science, without showcasing explicit connections to Chemistry, Physics, or Life Science as part of a single complex city element."}, {"text": "A physicist calculating the exact force required for a simple machine to lift a specific weight.", "isCorrect": false, "rationale": "This scenario primarily focuses on Physics (simple machines), without integrating other branches of science as part of a larger urban system."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
