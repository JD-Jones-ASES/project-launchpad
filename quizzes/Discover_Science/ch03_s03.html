<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines a 'property' of matter as described in the text?", "options": [{"text": "Something that makes matter useful for building things.", "isCorrect": false, "rationale": "While matter's characteristics can relate to its use, the text defines a property as an observable or measurable characteristic, not its utility."}, {"text": "A characteristic of matter that you can observe or measure.", "isCorrect": true, "rationale": "The text explicitly defines a property as 'a characteristic of matter that you can observe or measure, such as color, shape, size, texture, smell, or hardness.'"}, {"text": "The way matter changes from one state to another.", "isCorrect": false, "rationale": "Changes of state are processes matter undergoes, not the inherent characteristics (properties) used to describe it."}, {"text": "The amount of space an object occupies.", "isCorrect": false, "rationale": "The amount of space an object occupies is its volume, which is a specific type of property (size), but not the overarching definition of 'property' itself."}], "id": "q01"}, {"question": "According to the provided text, which of these is NOT listed as a common property used to describe matter?", "options": [{"text": "Smell", "isCorrect": false, "rationale": "Smell is explicitly listed as a common property in the text."}, {"text": "Hardness", "isCorrect": false, "rationale": "Hardness is explicitly listed as a common property in the text."}, {"text": "Weight", "isCorrect": true, "rationale": "The text lists color, shape, size, texture, smell, and hardness. Weight is not mentioned as one of the common properties, though mass is introduced later in the setup guide as an extension."}, {"text": "Texture", "isCorrect": false, "rationale": "Texture is explicitly listed as a common property in the text."}], "id": "q02"}, {"question": "You are given a mystery object. You cannot see it, but you feel it is hard, smooth, and round. Based on these properties, which of the following is the LEAST likely identity for the object?", "options": [{"text": "A marble", "isCorrect": false, "rationale": "A marble is typically hard, smooth, and round, fitting the description."}, {"text": "A crumpled piece of paper", "isCorrect": true, "rationale": "A crumpled piece of paper would likely be soft and irregular in shape, not hard, smooth, or perfectly round, making it the least likely match."}, {"text": "A small, polished stone", "isCorrect": false, "rationale": "A small, polished stone can be hard, smooth, and round, fitting the description."}, {"text": "A ball bearing", "isCorrect": false, "rationale": "A ball bearing is characteristically hard, smooth, and perfectly round, fitting the description."}], "id": "q03"}, {"question": "Scientists like geologists use properties such as hardness, color, and streak to identify minerals. What is the primary reason for using these observable and measurable characteristics?", "options": [{"text": "To change the chemical composition of the mineral.", "isCorrect": false, "rationale": "Observing and measuring properties does not change the chemical composition of a substance; it helps identify its existing composition."}, {"text": "To classify minerals based on how attractive they appear.", "isCorrect": false, "rationale": "While appearance is a property, the text emphasizes using properties for identification, not merely for aesthetic classification."}, {"text": "To narrow down possibilities and determine what kind of substance it is.", "isCorrect": true, "rationale": "The text states, 'Properties help you narrow down the possibilities' and 'Scientists use properties to identify substances too... to figure out what kind of mineral it is.'"}, {"text": "To determine the age of the mineral formation.", "isCorrect": false, "rationale": "Properties like color, hardness, and streak are generally used for identification, not for dating the age of a mineral, which would require different geological techniques."}], "id": "q04"}, {"question": "The 'Matter Scavenger Hunt' activity asks students to find objects in different states of matter. The hint for 'gases' suggests thinking about 'the air around you, steam from a kettle, or the gas inside a balloon.' What fundamental characteristic makes these examples useful for understanding gases?", "options": [{"text": "They all have a strong, noticeable smell.", "isCorrect": false, "rationale": "While some gases have a smell, air is largely odorless, and the common characteristic being highlighted for gases is their less visible, diffuse nature rather than smell."}, {"text": "They are typically hard and rigid.", "isCorrect": false, "rationale": "Gases are not hard or rigid; they expand to fill their container and are compressible."}, {"text": "They are often invisible or difficult to contain directly.", "isCorrect": true, "rationale": "The hint 'Gases are tricky!' and the examples (air, steam, gas inside a balloon) highlight that gases are often invisible, diffuse, and require containment (like a balloon) to be observed, making their properties harder to 'find' than solids or liquids."}, {"text": "They can all be easily scratched with a fingernail.", "isCorrect": false, "rationale": "Hardness, and therefore scratchability, is a property primarily associated with solids, not gases."}], "id": "q05"}, {"question": "If you describe a piece of velvet fabric as 'soft and fuzzy,' which property or properties are you primarily focusing on?", "options": [{"text": "Shape and color", "isCorrect": false, "rationale": "'Soft' and 'fuzzy' do not describe the shape or color of the fabric."}, {"text": "Size and hardness", "isCorrect": false, "rationale": "While softness relates to hardness, 'fuzzy' is not a measure of size. 'Soft' is the opposite of 'hard' in the context of texture/feel."}, {"text": "Texture", "isCorrect": true, "rationale": "The text asks 'How does it feel? Smooth, rough, bumpy, soft?' 'Soft' and 'fuzzy' directly relate to how something feels, which is described as texture."}, {"text": "Smell", "isCorrect": false, "rationale": "'Soft' and 'fuzzy' describe how something feels, not how it smells."}], "id": "q06"}, {"question": "The 'Setup Guide' for the Matter Scavenger Hunt suggests an extension: 'use a balance to measure the mass of 3 solid objects.' Based on the definition of a property provided in the section, would 'mass' be considered a property of matter?", "options": [{"text": "No, because mass is an action, not a characteristic.", "isCorrect": false, "rationale": "Mass is a measurable quantity of matter, not an action."}, {"text": "No, because properties are only observable, not measurable.", "isCorrect": false, "rationale": "The definition explicitly states a property is a characteristic 'that you can observe or measure.'"}, {"text": "Yes, because the Setup Guide mentions it, which implies it's relevant to understanding matter.", "isCorrect": false, "rationale": "While it's relevant, the direct justification comes from the definition of a property, not just its mention in an activity extension."}, {"text": "Yes, because it is a characteristic of matter that can be measured.", "isCorrect": true, "rationale": "The definition of a property is 'a characteristic of matter that you can observe or measure.' Mass is a measurable characteristic of matter, therefore it fits the definition of a property."}], "id": "q07"}, {"question": "When trying to identify a mystery object, the text suggests that properties 'help you narrow down the possibilities.' This implies that:", "options": [{"text": "Each property will immediately reveal the object's exact identity.", "isCorrect": false, "rationale": "The phrase 'narrow down the possibilities' suggests a process of elimination, not instant identification, especially with only a few properties."}, {"text": "More properties will lead to a more specific identification.", "isCorrect": true, "rationale": "By narrowing down possibilities, using more distinct properties allows for greater specificity and fewer potential matches, leading to a more precise identification."}, {"text": "Only scientists can effectively use properties for identification.", "isCorrect": false, "rationale": "The text provides an everyday example (mystery object in a bag) before mentioning scientists, indicating it's a general concept."}, {"text": "Properties are only useful for solids, not liquids or gases.", "isCorrect": false, "rationale": "The 'Matter Scavenger Hunt' asks to describe properties of solids, liquids, and gases, indicating properties apply to all states of matter."}], "id": "q08"}, {"question": "You are describing a unique flower to a friend. You say it has 'bright yellow petals, a soft velvety feel, and a sweet, citrusy scent.' Which option correctly categorizes the properties you used?", "options": [{"text": "Color, size, and shape", "isCorrect": false, "rationale": "'Soft velvety feel' is texture, not size or shape. 'Sweet, citrusy scent' is smell, not size or shape."}, {"text": "Color, texture, and smell", "isCorrect": true, "rationale": "'Bright yellow' is color, 'soft velvety feel' is texture, and 'sweet, citrusy scent' is smell. All are explicitly listed properties in the text."}, {"text": "Hardness, size, and texture", "isCorrect": false, "rationale": "'Bright yellow' is color, not hardness or size. 'Sweet, citrusy scent' is smell, not hardness or size."}, {"text": "Shape, smell, and hardness", "isCorrect": false, "rationale": "'Bright yellow' is color, not shape. 'Soft velvety feel' is texture, not hardness (though related to the 'soft' aspect, 'velvety' is texture). The text explicitly asks if something is 'hard like a rock or soft like a pillow' for hardness."}], "id": "q09"}, {"question": "The text warns: '(Remember: never smell unknown chemicals!)'. This warning primarily relates to which aspect of observing properties?", "options": [{"text": "The difficulty in accurately measuring the exact strength of a smell.", "isCorrect": false, "rationale": "The warning is about safety, not the precision of measurement."}, {"text": "The potential danger involved in directly observing certain properties.", "isCorrect": true, "rationale": "The parenthetical warning about 'never smell unknown chemicals' directly highlights a safety concern, indicating that direct observation of certain properties (like smell) can be dangerous."}, {"text": "The fact that not all matter possesses a smell.", "isCorrect": false, "rationale": "While true that not all matter smells, the warning is specifically about unknown chemicals, implying a danger, not merely absence of smell."}, {"text": "The idea that smell is not a reliable property for identification.", "isCorrect": false, "rationale": "Smell is listed as a common property for identification; the warning is about safety precautions during observation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
