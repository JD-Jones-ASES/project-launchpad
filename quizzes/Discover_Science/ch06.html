<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is NOT a primary function of a plant's roots?", "options": [{"text": "Anchoring the plant firmly in the soil.", "isCorrect": false, "rationale": "Roots are crucial for holding the plant in place, as explained by the dandelion example."}, {"text": "Absorbing water and nutrients from the ground.", "isCorrect": false, "rationale": "The text states roots 'soak up water and tiny nutrients from the soil the way a straw soaks up a drink.'"}, {"text": "Storing extra food for the plant's use.", "isCorrect": false, "rationale": "The text explicitly mentions carrots, radishes, and sweet potatoes as roots that 'store extra food for the plant.'"}, {"text": "Producing sugar through photosynthesis.", "isCorrect": true, "rationale": "Photosynthesis, the process of making sugar, is primarily performed by the leaves, which are described as 'tiny food factories' that 'catch sunlight and use it to make sugar.'"}], "id": "q01"}, {"question": "A scientist observes a plant with a thick, hard, woody stem that provides strong support and transports water and nutrients. Based on this observation, what is the most likely description of this plant's stem?", "options": [{"text": "It is similar to a daisy's thin, green, bendable stem, allowing for flexibility.", "isCorrect": false, "rationale": "A daisy's stem is described as thin, green, and bendable, which does not match the 'thick, hard, woody' description."}, {"text": "It functions primarily as a storage unit for water, like a cactus stem.", "isCorrect": false, "rationale": "A cactus stem is thick and watery, storing water for dry times, but the question emphasizes a 'hard, woody' nature for strong support, more characteristic of a trunk."}, {"text": "It is best described as a trunk, common in plants like oak trees.", "isCorrect": true, "rationale": "The text states, 'An oak tree has a thick, hard, woody stem that we call a trunk,' which perfectly matches the description given in the question."}, {"text": "It is a thin, green stem, optimized for rapid sugar production.", "isCorrect": false, "rationale": "Thin, green stems are not typically described as 'hard' or 'woody' and while stems transport sugar, leaves are optimized for its production."}], "id": "q02"}, {"question": "What is the primary role of chlorophyll in a plant's leaves?", "options": [{"text": "To attract insects for pollination through its bright color.", "isCorrect": false, "rationale": "Bright colors for attraction are a function of flowers, not chlorophyll in leaves. Chlorophyll is green."}, {"text": "To capture energy from sunlight for food production.", "isCorrect": true, "rationale": "The text explicitly states, 'Chlorophyll captures energy from sunlight,' which is essential for the leaves to make food (sugar)."}, {"text": "To provide structural support, keeping the leaf flat.", "isCorrect": false, "rationale": "While leaf structure is important, chlorophyll's role is not structural support; it is primarily involved in energy capture."}, {"text": "To store water for the plant during dry periods.", "isCorrect": false, "rationale": "Water storage is not the primary role of chlorophyll; some stems (like cacti) are adapted for water storage."}], "id": "q03"}, {"question": "In autumn, some leaves change from green to red, orange, or yellow. This phenomenon occurs because:", "options": [{"text": "The leaves are beginning to store water for the winter.", "isCorrect": false, "rationale": "Water storage is not the reason for autumn leaf color change; it's related to pigment changes."}, {"text": "New pigments are produced to protect the plant from cold temperatures.", "isCorrect": false, "rationale": "The text indicates the colors 'were there all along,' suggesting existing pigments are revealed, not newly produced ones."}, {"text": "The chlorophyll breaks down, revealing other pigments that were already present.", "isCorrect": true, "rationale": "The text explains, 'In autumn, some leaves lose their chlorophyll and turn red, orange, or yellow — the hidden colors were there all along!'"}, {"text": "The plant is preparing to release seeds, which causes the color change.", "isCorrect": false, "rationale": "Leaf color change is not directly linked to seed release; seed production is primarily a function of flowers and fruits."}], "id": "q04"}, {"question": "The most critical function of a flower for a flowering plant is:", "options": [{"text": "To provide nectar for insects and birds.", "isCorrect": false, "rationale": "Providing nectar is a means to attract pollinators, but not the ultimate critical function itself."}, {"text": "To make seeds for the reproduction of new plants.", "isCorrect": true, "rationale": "The text clearly states, 'Flowers... have an important job: making seeds so new plants can grow.' This is their primary reproductive role."}, {"text": "To add aesthetic beauty to the plant and its surroundings.", "isCorrect": false, "rationale": "While flowers are often beautiful, their beauty serves a biological purpose (attraction), and is not their critical function from a survival perspective."}, {"text": "To capture sunlight for photosynthesis.", "isCorrect": false, "rationale": "Leaves are the primary organs for capturing sunlight for photosynthesis, not flowers."}], "id": "q05"}, {"question": "A bee lands on a bright red flower, sips nectar, and then flies to another flower of the same type, depositing tiny grains on it. How does this action contribute to the plant's reproduction?", "options": [{"text": "The bee's visit encourages the flower to store more food in its roots.", "isCorrect": false, "rationale": "A bee's visit is not directly linked to root food storage. Root storage is a separate function."}, {"text": "The bee helps transport water and nutrients between flowers.", "isCorrect": false, "rationale": "Water and nutrient transport primarily occurs internally within the plant through the stem and roots, not externally by bees between flowers."}, {"text": "Pollen grains stick to the bee and are carried to the next flower, initiating seed formation.", "isCorrect": true, "rationale": "The text explains, 'When a bee visits a flower to sip nectar, tiny grains of pollen stick to the bee's body. The bee carries that pollen to another flower. This process is called pollination, and it is the first step in making seeds.'"}, {"text": "The bee's presence signals to other animals that the fruit is ripe for consumption.", "isCorrect": false, "rationale": "While fruit consumption can aid seed dispersal, the bee's action of transferring pollen directly facilitates seed formation, not signaling fruit ripeness."}], "id": "q06"}, {"question": "According to the scientific definition provided in the text, which of the following foods is botanically classified as a fruit?", "options": [{"text": "A stalk of celery", "isCorrect": false, "rationale": "Celery is mentioned as an example of a true vegetable, specifically a stem."}, {"text": "A carrot", "isCorrect": false, "rationale": "Carrots are explicitly identified as roots, and thus, true vegetables, not fruits."}, {"text": "A pumpkin", "isCorrect": true, "rationale": "The text states, 'Tomatoes, cucumbers, peppers, and pumpkins are all fruits because they contain seeds,' fitting the definition of fruit as the part of a plant that forms around and protects seeds."}, {"text": "A head of lettuce", "isCorrect": false, "rationale": "Lettuce is mentioned as an example of a true vegetable, specifically a leaf."}], "id": "q07"}, {"question": "A gardener is explaining the difference between a fruit and a vegetable to a child. Based on the textbook's scientific definition, which statement would be the most accurate explanation?", "options": [{"text": "\"Fruits are always sweet, while vegetables are savory.\"", "isCorrect": false, "rationale": "This statement describes culinary uses or tastes, not the scientific botanical definition. The text highlights that 'many foods we call “vegetables” are actually fruits' like tomatoes, which are not typically sweet."}, {"text": "\"A fruit is the part of the plant that contains seeds, like a tomato.\"", "isCorrect": true, "rationale": "This accurately reflects the scientific definition given: 'Fruit—the part of a plant that forms around the seeds and protects them,' with tomatoes as a prime example of a 'vegetable' that is scientifically a fruit."}, {"text": "\"Vegetables are eaten raw, but fruits are usually cooked.\"", "isCorrect": false, "rationale": "This is a culinary generalization and incorrect botanically. Many fruits are eaten raw (apples) and many vegetables are cooked (carrots, celery)."}, {"text": "\"If you eat it for dessert, it's a fruit; otherwise, it's a vegetable.\"", "isCorrect": false, "rationale": "This is a culinary and cultural distinction, not a botanical one. For example, a pumpkin, botanically a fruit, is rarely eaten for dessert."}], "id": "q08"}, {"question": "What two essential components are found inside every seed?", "options": [{"text": "Chlorophyll and water.", "isCorrect": false, "rationale": "Chlorophyll is primarily found in leaves, and while water is essential for life, it's not one of the two main packaged components within a seed as described."}, {"text": "A tiny plant and a supply of stored food.", "isCorrect": true, "rationale": "The text explicitly states, 'Inside every seed is a tiny plant waiting to sprout, plus stored food to give it energy until it can make its own,' describing it as a 'lunchbox for a baby plant.'"}, {"text": "Pollen and nectar.", "isCorrect": false, "rationale": "Pollen and nectar are associated with flowers and pollination, not the internal components of a seed."}, {"text": "Roots and a stem.", "isCorrect": false, "rationale": "A seed contains a *baby plant*, which will eventually develop roots and a stem, but the seed itself is not described as containing fully formed roots and a stem separately."}], "id": "q09"}, {"question": "Orchid seeds are described as 'fine as dust' and travel on the wind. This adaptation primarily benefits the orchid by:", "options": [{"text": "Preventing animals from eating the seeds.", "isCorrect": false, "rationale": "While small size might make them harder for some animals to eat, the primary benefit highlighted is dispersal, not protection from predation."}, {"text": "Allowing the plant to grow very quickly.", "isCorrect": false, "rationale": "Seed size and wind dispersal are related to distribution, not the speed of the plant's growth once established."}, {"text": "Enabling the plant to spread to new, often distant, areas.", "isCorrect": true, "rationale": "The text explains, 'Seeds travel in clever ways. Some have wings or fluff that catch the wind... This helps plants spread to new areas.' Fine, dust-like seeds are easily carried by wind, facilitating wide dispersal."}, {"text": "Ensuring the seeds remain dormant until perfect conditions arise.", "isCorrect": false, "rationale": "Dormancy is a property of the seed itself, not directly an outcome of its small size or wind dispersal mechanism."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
