<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 31, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The central message of the section 'You Are a Scientist' is that:", "options": [{"text": "Scientific discovery primarily occurs in specialized laboratories with advanced equipment.", "isCorrect": false, "rationale": "This statement contradicts the text, which explicitly states that 'you do not need a lab coat or a microscope' and that science happens everywhere."}, {"text": "Becoming a scientist requires a formal degree and extensive academic training.", "isCorrect": false, "rationale": "The text refutes this, noting 'You do not need to work in a laboratory or have a fancy degree' to be a scientist."}, {"text": "Everyone possesses an inherent capacity for scientific inquiry through natural curiosity and observation.", "isCorrect": true, "rationale": "This option captures the core message that science is a fundamental human activity, rooted in asking 'Why?', noticing, and testing, which everyone does."}, {"text": "The scientific method is a complex process that only trained experts can master.", "isCorrect": false, "rationale": "The text simplifies the scientific method, describing it as 'Every time you made a prediction and then tested it'—an activity accessible to all."}], "id": "q01"}, {"question": "According to the section, which action is LEAST indicative of engaging in science?", "options": [{"text": "Asking 'Why?' when encountering an unfamiliar phenomenon.", "isCorrect": false, "rationale": "The text identifies asking 'Why?' as a fundamental scientific action."}, {"text": "Noticing something interesting and observing it more closely.", "isCorrect": false, "rationale": "The text defines noticing and looking more closely as scientific acts."}, {"text": "Making a prediction and then performing an experiment to test it.", "isCorrect": false, "rationale": "This is explicitly stated as 'the scientific method in action' within the text."}, {"text": "Memorizing a list of scientific facts for an upcoming quiz.", "isCorrect": true, "rationale": "While an aspect of learning science, memorization alone, without inquiry, observation, or testing, is presented as least indicative of *being* a scientist according to the text's definition."}], "id": "q02"}, {"question": "Imagine you observe that a specific brand of bread molds faster than others in your kitchen. Based on the text, what is the most scientific next step you could take?", "options": [{"text": "Immediately switch to a different brand of bread, assuming it's inferior.", "isCorrect": false, "rationale": "This is a practical decision, not an act of scientific inquiry as described in the text, which emphasizes asking questions and testing."}, {"text": "Conclude that all bread molds quickly and stop buying it.", "isCorrect": false, "rationale": "This is a hasty generalization and a conclusion without further investigation, which is contrary to scientific thinking."}, {"text": "Buy two loaves of the problematic brand and two of another, storing them identically to see if one consistently molds faster.", "isCorrect": true, "rationale": "This action involves noticing (the mold), making an implicit prediction (one molds faster), and then testing that prediction through observation and comparison, which aligns with the scientific method as presented."}, {"text": "Look up online reviews to see if other people have experienced the same issue.", "isCorrect": false, "rationale": "While a useful research step, the text emphasizes personal observation, questioning, and testing as the core of 'being a scientist,' rather than solely relying on others' experiences."}], "id": "q03"}, {"question": "What common characteristic is emphasized across the diverse group of scientists listed in the section, such as Jane Goodall, Isaac Newton, and Marie Curie?", "options": [{"text": "They all conducted their research in well-funded institutional laboratories.", "isCorrect": false, "rationale": "The text includes examples like Mary Anning digging fossils out of cliffs or Michael Faraday starting as a bookbinder, showing that formal labs were not a universal starting point."}, {"text": "They each initiated their significant work with a fundamental human quality like curiosity, determination, or wonder.", "isCorrect": true, "rationale": "The text explicitly states for each scientist: 'She started with curiosity,' 'He started with wonder,' 'She started with hard work,' highlighting these foundational attributes."}, {"text": "They primarily focused on discoveries within the fields of physics or biology.", "isCorrect": false, "rationale": "The list includes geologists (Florence Bascom), meteorologists (Tetsuya Fujita), chemists (Percy Julian), and more, demonstrating a broad range of fields."}, {"text": "They all achieved public acclaim and significant awards during their active research careers.", "isCorrect": false, "rationale": "The text focuses on their starting points and contributions, not necessarily their public recognition or awards."}], "id": "q04"}, {"question": "The statement 'You do not need a lab coat or a microscope to be a scientist' primarily serves to:", "options": [{"text": "Suggest that traditional scientific tools are outdated and no longer necessary.", "isCorrect": false, "rationale": "The text does not imply tools are outdated, but rather that their absence doesn't prevent someone from being a scientist."}, {"text": "Emphasize that scientific pursuits are exclusively about theoretical thinking rather than practical investigation.", "isCorrect": false, "rationale": "The text mentions observation, testing, and experiments, indicating practical investigation is key."}, {"text": "Broaden the definition of a scientist and make scientific inquiry more accessible and relatable to everyone.", "isCorrect": true, "rationale": "This statement challenges the common stereotype of a scientist, making the concept more inclusive and showing that scientific thinking is part of everyday life."}, {"text": "Discourage individuals from pursuing formal science education or careers in professional labs.", "isCorrect": false, "rationale": "The intent is to empower and encourage scientific thinking, not to deter formal education or careers."}], "id": "q05"}, {"question": "When the text states, 'You have always been a scientist,' it most strongly implies that:", "options": [{"text": "All scientific knowledge is innate and requires no external learning.", "isCorrect": false, "rationale": "The text emphasizes starting points like curiosity and observation, but doesn't dismiss learning. It empowers inherent ability, not inherent knowledge."}, {"text": "Scientific thinking, characterized by curiosity and inquiry, is a fundamental and continuous aspect of human experience from a young age.", "isCorrect": true, "rationale": "The text links being a scientist to everyday actions like asking 'Why?' or noticing things, suggesting these are natural human tendencies present throughout life, starting early."}, {"text": "Everyone is destined to become a professional scientist in their chosen career path.", "isCorrect": false, "rationale": "The text focuses on a 'way of seeing' and thinking, not a professional career path for every individual."}, {"text": "Major scientific breakthroughs are typically made by ordinary people without any formal training.", "isCorrect": false, "rationale": "The text emphasizes the 'start' of scientific thinking, not that formal training is irrelevant for making breakthroughs or that all breakthroughs come from untrained individuals."}], "id": "q06"}, {"question": "The examples of everyday situations like watching a sunset and wondering why the sky turns orange, or noticing ice cream melts faster on a hot day, primarily illustrate that science:", "options": [{"text": "Is best understood through abstract theories and complex mathematical models.", "isCorrect": false, "rationale": "These examples highlight direct observation and simple questioning, not necessarily abstract theories or complex math."}, {"text": "Is a formal academic subject exclusively taught in schools.", "isCorrect": false, "rationale": "The text explicitly states: 'Science is not just a subject in school. It is a way of seeing.'"}, {"text": "Is an accessible 'way of seeing' and engaging with the world through observation and questioning.", "isCorrect": true, "rationale": "These examples demonstrate how everyday curiosity and observation about natural phenomena are fundamental aspects of scientific thinking."}, {"text": "Requires specific scientific questions that only trained individuals can formulate.", "isCorrect": false, "rationale": "The examples show that simple, everyday questions are also scientific."}], "id": "q07"}, {"question": "According to the text, what is the most foundational element that initiates significant scientific discovery?", "options": [{"text": "An accidental observation with no prior intent or question.", "isCorrect": false, "rationale": "While accidents can happen, the text emphasizes qualities like 'curiosity,' 'wonder,' 'thinking,' and asking questions as the starting points."}, {"text": "Advanced technology and substantial financial resources.", "isCorrect": false, "rationale": "The text focuses on internal qualities and simple actions as starting points, not external resources."}, {"text": "A human quality such as curiosity, wonder, or a driven intention to understand or solve a problem.", "isCorrect": true, "rationale": "The text repeatedly lists 'She started with curiosity,' 'He started with wonder,' 'She started with hard work,' reinforcing these human qualities as the genesis of discovery."}, {"text": "The mandate from a research institution or government agency.", "isCorrect": false, "rationale": "The text focuses on personal initiative and intrinsic motivation, not external mandates."}], "id": "q08"}, {"question": "The message 'You are a scientist... And now you have the tools, the vocabulary, and the thinking skills to keep asking questions and finding answers' is intended to primarily convey:", "options": [{"text": "That formal science education is no longer needed once basic skills are acquired.", "isCorrect": false, "rationale": "It implies readiness to continue the 'science journey,' not an end to learning or formal education."}, {"text": "A sense of empowerment and ongoing engagement with scientific inquiry throughout one's life.", "isCorrect": true, "rationale": "The phrase 'keep asking questions and finding answers — for the rest of your life' directly supports the idea of continuous, lifelong engagement and empowerment."}, {"text": "That grand, world-changing discoveries are within everyone's immediate reach.", "isCorrect": false, "rationale": "While encouraging, the primary emphasis is on the process of inquiry itself, rather than promising immediate grand discoveries."}, {"text": "The idea that all significant scientific questions have already been addressed.", "isCorrect": false, "rationale": "This contradicts the encouragement to 'keep asking questions and finding answers.'"}], "id": "q09"}, {"question": "Based on the section's overall tone and content, what is the primary role of the 'thinkaboutit' prompt at the end?", "options": [{"text": "To suggest that all unanswered questions require complex laboratory experiments.", "isCorrect": false, "rationale": "The prompt encourages thinking about how *you might use the scientific method* generally, not exclusively complex lab work."}, {"text": "To conclude the discussion by summarizing key scientific principles.", "isCorrect": false, "rationale": "The prompt is an open-ended call to action, not a summary of principles."}, {"text": "To prompt readers to immediately apply the concept of scientific inquiry to their own curiosities and future learning.", "isCorrect": true, "rationale": "The prompt asks readers to identify a question and 'think about how you might use the scientific method to start finding the answer,' directly encouraging immediate application and personal engagement."}, {"text": "To evaluate the reader's understanding of the specific historical scientists mentioned.", "isCorrect": false, "rationale": "The prompt asks about 'the world' and 'your science journey,' not specific historical recall."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
