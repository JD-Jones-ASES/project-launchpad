    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 20, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which sequence correctly represents the organizational hierarchy of the human body, from the most basic living unit to the most complex functional group?", "options": [{"text": "Organ → Tissue → Cell → Body system", "isCorrect": false, "rationale": "This sequence is incorrect because it starts with a more complex structure (organ) and moves towards a simpler one, reversing the correct hierarchy."}, {"text": "Cell → Tissue → Organ → Body system", "isCorrect": true, "rationale": "This is the correct hierarchy: a cell is the smallest living unit, a group of similar cells forms a tissue, different tissues working together form an organ, and a group of organs working together performs a specific job as a body system."}, {"text": "Tissue → Cell → Body system → Organ", "isCorrect": false, "rationale": "This sequence is incorrect as a tissue is made of cells, so 'Cell → Tissue' is the correct progression, not the other way around. Also, the order of body system and organ is reversed."}, {"text": "Body system → Organ → Tissue → Cell", "isCorrect": false, "rationale": "This sequence represents the hierarchy from most complex to least complex, which is the opposite of what the question asks for."}], "id": "q01"}, {"question": "A person decides to pick up a book from a table. Which type of muscle is primarily responsible for the conscious action of reaching and grasping the book?", "options": [{"text": "Involuntary muscle", "isCorrect": false, "rationale": "Involuntary muscles work automatically without conscious thought, such as the heart, and are not responsible for deliberate actions like grasping a book."}, {"text": "Skeletal muscle", "isCorrect": false, "rationale": "While skeletal muscles are involved, the specific term from the vocabulary that describes muscles controlled on purpose is 'voluntary muscle'."}, {"text": "Voluntary muscle", "isCorrect": true, "rationale": "Voluntary muscles are muscles you can control on purpose, such as the arm muscles used for reaching and grasping a book."}, {"text": "Smooth muscle", "isCorrect": false, "rationale": "Smooth muscles are a type of involuntary muscle (e.g., in internal organs) and are not covered in the provided text as a distinct category for deliberate movement."}], "id": "q02"}, {"question": "During an early morning observation, a meteorologist notes the presence of thin, wispy clouds high in the sky, made of ice crystals. What type of clouds did the meteorologist most likely observe?", "options": [{"text": "Cumulus", "isCorrect": false, "rationale": "Cumulus clouds are described as puffy, white clouds that usually mean fair weather, not thin, wispy, or made of ice crystals."}, {"text": "Stratus", "isCorrect": false, "rationale": "Stratus clouds are flat, gray clouds that form in layers and may bring drizzle, not thin, wispy, or high-altitude ice crystal clouds."}, {"text": "Nimbus", "isCorrect": false, "rationale": "The term 'nimbus' refers to rain-producing clouds (e.g., cumulonimbus, nimbostratus) and is not one of the specific cloud types listed in the provided vocabulary."}, {"text": "Cirrus", "isCorrect": true, "rationale": "Cirrus clouds are explicitly defined as thin, wispy clouds made of ice crystals high in the sky, matching the observation."}], "id": "q03"}, {"question": "A news report states, 'Tomorrow's forecast is sunny with a high of 25°C and light winds.' Another report says, 'This region experiences average temperatures of 10°C in winter and 25°C in summer, with moderate rainfall year-round.' Which statement describes the climate?", "options": [{"text": "The first statement, because it provides a specific temperature and wind condition.", "isCorrect": false, "rationale": "The first statement describes 'weather,' which is the condition of the atmosphere at a particular time and place, not the long-term average."}, {"text": "The first statement, because it indicates a short-term atmospheric condition.", "isCorrect": false, "rationale": "While the first statement does describe a short-term condition, it is a description of 'weather,' not 'climate'."}, {"text": "The second statement, because it describes an average pattern over many years.", "isCorrect": true, "rationale": "Climate is defined as the average weather pattern of a place over many years, which is precisely what the second statement describes."}, {"text": "The second statement, because it mentions specific seasonal temperatures.", "isCorrect": false, "rationale": "While specific seasonal temperatures are mentioned, the key aspect that makes this a description of climate is that these are *average* patterns observed *over many years*, not just the fact of seasonal temperatures themselves."}], "id": "q04"}, {"question": "You observe a log burning in a fireplace. Which of the following observations would *not* be considered a primary 'clue of chemical change' as defined in the text?", "options": [{"text": "The log is changing color from brown to black ash.", "isCorrect": false, "rationale": "Color change is explicitly listed as a clue of chemical change."}, {"text": "Heat and light are being produced.", "isCorrect": false, "rationale": "Production of heat or light is explicitly listed as a clue of chemical change."}, {"text": "A new, smoky smell is evident.", "isCorrect": false, "rationale": "A new smell is explicitly listed as a clue of chemical change."}, {"text": "The wood is splitting into smaller pieces due to the heat.", "isCorrect": true, "rationale": "The splitting of wood due to heat is a physical change (breaking apart), not one of the direct 'clues of chemical change' listed, which include color change, gas bubbles, heat or light, new smell, or being hard to reverse."}], "id": "q05"}, {"question": "When a piece of iron rusts, it combines with oxygen from the air to form iron oxide (rust). If you measure the mass of the original iron and the oxygen that reacted, and then the mass of the rust formed, what would you expect to find according to the principle of conservation of matter?", "options": [{"text": "The mass of the rust would be less than the original iron, as some matter is lost.", "isCorrect": false, "rationale": "This contradicts the conservation of matter, which states that matter is never created or destroyed."}, {"text": "The mass of the rust would be greater than the original iron, as new matter is created.", "isCorrect": false, "rationale": "This contradicts the conservation of matter. While the rust (product) will be heavier than the iron (one reactant) because oxygen has been added, the total mass of reactants (iron + oxygen) will equal the total mass of the product (rust)."}, {"text": "The mass of the rust would be exactly equal to the combined mass of the iron and oxygen that reacted.", "isCorrect": true, "rationale": "The conservation of matter states that matter is never created or destroyed in a chemical reaction; the atoms simply rearrange. Therefore, the total mass of the reactants (iron and oxygen) must equal the total mass of the products (rust)."}, {"text": "The mass cannot be accurately compared, as rust is a new substance and doesn't follow this rule.", "isCorrect": false, "rationale": "The conservation of matter applies to all chemical reactions, meaning mass is conserved even when new substances are formed."}], "id": "q06"}, {"question": "A person uses a crowbar to lift a heavy rock. The crowbar rests on a smaller rock near the heavy one, which acts as a pivot point. What two terms from the vocabulary best describe the crowbar and the smaller rock, respectively?", "options": [{"text": "Inclined plane; wedge", "isCorrect": false, "rationale": "An inclined plane is a ramp, and a wedge is two inclined planes joined; neither describes a crowbar or its pivot point."}, {"text": "Wheel and axle; fulcrum", "isCorrect": false, "rationale": "A wheel and axle consists of a wheel attached to a rod, which is not what a crowbar is. While 'fulcrum' is correct for the pivot, the first term is wrong."}, {"text": "Lever; fulcrum", "isCorrect": true, "rationale": "A crowbar acts as a lever, which is a bar that turns on a fixed point. The smaller rock serving as the pivot point is precisely what a fulcrum is defined as."}, {"text": "Pulley; axle", "isCorrect": false, "rationale": "A pulley is a wheel with a rope or chain, which doesn't describe a crowbar. An axle is a rod a wheel turns on, not a pivot point for a lever."}], "id": "q07"}, {"question": "Which simple machine is defined as an inclined plane wrapped around a cylinder, commonly used to hold things together or lift objects?", "options": [{"text": "Wedge", "isCorrect": false, "rationale": "A wedge consists of two inclined planes joined to form a sharp edge, used for splitting or cutting, not an inclined plane wrapped around a cylinder."}, {"text": "Screw", "isCorrect": true, "rationale": "This is the direct definition of a screw provided in the text: 'An inclined plane wrapped around a cylinder, used to hold things together or lift.'"}, {"text": "Pulley", "isCorrect": false, "rationale": "A pulley is a wheel with a rope or chain that changes the direction of a force, not an inclined plane wrapped around a cylinder."}, {"text": "Wheel and axle", "isCorrect": false, "rationale": "A wheel and axle consists of a wheel attached to a rod that turns with greater force, which is different from an inclined plane wrapped around a cylinder."}], "id": "q08"}, {"question": "A bicycle uses pedals connected to a chain that turns the wheels, and brakes that act on the wheel rims. Based on this description, how would a bicycle be classified according to the vocabulary?", "options": [{"text": "It is a simple machine because it has few moving parts.", "isCorrect": false, "rationale": "A simple machine has few or no moving parts, but a bicycle clearly combines multiple simple machines (e.g., wheel and axle, levers) to achieve its function, making it more complex."}, {"text": "It is a compound machine because it combines multiple simple machines.", "isCorrect": true, "rationale": "A compound machine is defined as a machine made of two or more simple machines working together. A bicycle integrates several simple machines like levers (brakes, pedals) and wheel and axle systems."}, {"text": "It is a complex machine, a category not covered by simple machines.", "isCorrect": false, "rationale": "While a bicycle is complex, the vocabulary provided explicitly includes 'compound machine' as the term for machines made of multiple simple machines, fitting the description."}, {"text": "It is not a machine, as it requires human effort to operate.", "isCorrect": false, "rationale": "Machines, including simple and compound machines, are devices that make work easier, often by changing force or direction, even if they require human input to operate."}], "id": "q09"}, {"question": "Imagine you are designing a complex robot that needs to perform multiple integrated tasks like sensing its environment, moving its limbs, and processing data. Which concept from the Human Body unit would best describe the robot's overall structure that combines these various functional parts for specific jobs?", "options": [{"text": "A simple machine", "isCorrect": false, "rationale": "A simple machine performs a basic task; it doesn't represent the integration of multiple complex functions like sensing, moving, and processing data within a single system."}, {"text": "A body system", "isCorrect": true, "rationale": "A body system is defined as 'A group of organs that work together to do a specific job for the body.' This concept is the best analogy for a robot's integrated structure, where different components (analogous to organs) collaborate to perform distinct, but interconnected, functions."}, {"text": "A climate zone", "isCorrect": false, "rationale": "A climate zone describes an area of Earth with a similar climate pattern; it is a geographical concept and has no relevance to the functional organization of a robot."}, {"text": "A chemical reaction", "isCorrect": false, "rationale": "A chemical reaction involves atoms rearranging to form new substances. While a robot's components might involve chemical processes, the 'chemical reaction' concept does not describe the overall functional architecture of integrated tasks."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
