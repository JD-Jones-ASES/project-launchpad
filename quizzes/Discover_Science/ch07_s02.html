<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic that defines an igneous rock?", "options": [{"text": "It contains preserved fossils.", "isCorrect": false, "rationale": "Fossils are characteristic of sedimentary rocks, not igneous rocks, as the heat involved in igneous rock formation would destroy organic remains."}, {"text": "It forms when hot, melted rock cools and hardens.", "isCorrect": true, "rationale": "The text explicitly defines igneous rocks as forming when magma (underground) or lava (on surface) cools and hardens, originating from the Latin word for fire."}, {"text": "It forms from layers of small pieces of rock, sand, mud, or shells pressed and cemented together.", "isCorrect": false, "rationale": "This describes the formation process for sedimentary rocks."}, {"text": "It has been changed from its original form by intense heat, pressure, or both deep inside the Earth.", "isCorrect": false, "rationale": "This describes the formation process for metamorphic rocks."}], "id": "q01"}, {"question": "A geologist discovers a rock deep underground with large, clearly visible crystals of different minerals. Based on its appearance, which rock is it most likely, and how did it form?", "options": [{"text": "Basalt, formed from quickly cooled lava on the surface.", "isCorrect": false, "rationale": "Basalt forms quickly on the surface from lava, resulting in tiny, barely visible mineral grains, not large crystals."}, {"text": "Sandstone, formed from cemented sand grains.", "isCorrect": false, "rationale": "Sandstone is a sedimentary rock made of sand grains, not large, visible mineral crystals formed from cooling melted rock."}, {"text": "Granite, formed from slowly cooled magma deep underground.", "isCorrect": true, "rationale": "The text states that granite forms when magma cools slowly deep underground, allowing mineral grains time to grow big enough to see, matching the description of large, visible crystals."}, {"text": "Slate, formed from compressed shale.", "isCorrect": false, "rationale": "Slate is a metamorphic rock that splits into flat sheets and forms from shale, not an igneous rock with large crystals from cooling magma."}], "id": "q02"}, {"question": "Which of the following processes is crucial for the formation of sedimentary rocks?", "options": [{"text": "Rapid cooling and solidification of molten material.", "isCorrect": false, "rationale": "Rapid cooling of molten material (lava) is characteristic of igneous rock formation, specifically basalt."}, {"text": "Transformation of existing rock by intense heat and pressure.", "isCorrect": false, "rationale": "This process describes the formation of metamorphic rocks, not sedimentary rocks."}, {"text": "Compacting and cementing of accumulated sediment layers over time.", "isCorrect": true, "rationale": "The text explains that sedimentary rocks form when layers of sediment settle, are pressed together by weight, and then cemented by minerals in water."}, {"text": "Rearrangement of mineral structures deep within the Earth.", "isCorrect": false, "rationale": "The rearrangement of minerals by heat and pressure is a key aspect of metamorphic rock formation."}], "id": "q03"}, {"question": "A paleontologist unearths a well-preserved trilobite fossil. In what type of rock was this fossil most likely found?", "options": [{"text": "Igneous rock, because it's born from heat.", "isCorrect": false, "rationale": "Igneous rocks form from molten rock, and the extreme heat would destroy any organic remains like fossils."}, {"text": "Sedimentary rock, as it's the only type that can preserve ancient life.", "isCorrect": true, "rationale": "The text states, 'Sedimentary rocks are special because they are the only type that can contain fossils,' making this the most likely rock type for fossil discovery."}, {"text": "Metamorphic rock, due to its changed form.", "isCorrect": false, "rationale": "Metamorphic rocks undergo intense heat and pressure, which would typically destroy or distort fossils if they were present in the original rock."}, {"text": "Any type of rock, depending on the environment.", "isCorrect": false, "rationale": "While environmental conditions are crucial for fossilization, the rock type itself is specific; the text clarifies only one type can contain fossils."}], "id": "q04"}, {"question": "The term 'metamorphic' means 'changed in form.' What are the primary agents that cause an existing rock to undergo this transformation?", "options": [{"text": "Erosion and weathering on the Earth's surface.", "isCorrect": false, "rationale": "Erosion and weathering break down rocks, creating sediment for sedimentary rocks, but they do not transform existing rocks into metamorphic types."}, {"text": "Cooling and solidification of magma or lava.", "isCorrect": false, "rationale": "This process describes the formation of igneous rocks, not metamorphic transformation."}, {"text": "Intense heat, pressure, or both deep inside the Earth.", "isCorrect": true, "rationale": "The text clearly states that metamorphic rocks are 'changed from its original form by intense heat, pressure, or both deep inside the Earth.'"}, {"text": "Chemical reactions with surface water and air.", "isCorrect": false, "rationale": "Chemical reactions with surface elements contribute to weathering and decomposition, not the deep-earth transformation of metamorphism."}], "id": "q05"}, {"question": "Limestone is a common sedimentary rock. If a body of limestone is subjected to significant heat from nearby magma and extreme pressure from overlying rock layers, what new rock type is it most likely to become?", "options": [{"text": "Granite", "isCorrect": false, "rationale": "Granite is an igneous rock formed from slowly cooled magma, not from the metamorphosis of limestone."}, {"text": "Sandstone", "isCorrect": false, "rationale": "Sandstone is another sedimentary rock, formed from sand, and would not form from the metamorphosis of limestone."}, {"text": "Marble", "isCorrect": true, "rationale": "The text explicitly states that 'Marble — forms when limestone is heated and squeezed,' indicating it is the metamorphic product of limestone."}, {"text": "Basalt", "isCorrect": false, "rationale": "Basalt is an igneous rock formed from quickly cooled lava, unrelated to the metamorphosis of limestone."}], "id": "q06"}, {"question": "A rock sample is described as feeling rough, having a sandy texture, and being composed of tiny grains of sand pressed together. Which type of rock is this, and what is a likely identifier?", "options": [{"text": "Granite, identifiable by large visible crystals.", "isCorrect": false, "rationale": "Granite is an igneous rock with large, visible crystals, but it does not have a rough, sandy texture from pressed grains of sand."}, {"text": "Limestone, identifiable by fizzing with vinegar.", "isCorrect": false, "rationale": "While limestone does fizz with vinegar, it is often made from shells and skeletons, and its texture isn't primarily described as rough and sandy from pressed sand grains."}, {"text": "Sandstone, identifiable as a sedimentary rock formed from sand.", "isCorrect": true, "rationale": "The text describes sandstone as 'made of tiny grains of sand pressed together. It often feels rough, like sandpaper,' which perfectly matches the description."}, {"text": "Slate, identifiable by splitting into flat sheets.", "isCorrect": false, "rationale": "Slate is a metamorphic rock formed from fine mud that splits into flat sheets, not a rough, sandy rock made of sand grains."}], "id": "q07"}, {"question": "According to the comparison table, which key clue is characteristic of metamorphic rocks?", "options": [{"text": "May have crystals or a glassy look.", "isCorrect": false, "rationale": "This clue is listed in the table as characteristic of igneous rocks."}, {"text": "May have layers or fossils.", "isCorrect": false, "rationale": "This clue is listed in the table as characteristic of sedimentary rocks."}, {"text": "May have wavy bands or a shiny, folded look.", "isCorrect": true, "rationale": "The comparison table explicitly lists 'May have wavy bands or a shiny, folded look' as a key clue for metamorphic rocks."}, {"text": "May fizz with vinegar.", "isCorrect": false, "rationale": "Fizzing with vinegar is a specific property of limestone, a sedimentary rock, not a general clue for all metamorphic rocks."}], "id": "q08"}, {"question": "When inspecting a building, you notice that some of the decorative stone surfaces are smooth, beautifully colored, and exhibit swirling patterns. You learn that this stone formed from limestone. This stone is most likely an example of:", "options": [{"text": "Igneous rock like granite.", "isCorrect": false, "rationale": "Granite is an igneous rock that doesn't form from limestone and has visible specks, not typically smooth with swirling patterns in this context."}, {"text": "Sedimentary rock like shale.", "isCorrect": false, "rationale": "Shale is a sedimentary rock made of mud that splits into thin layers, not a smooth, beautifully colored stone from limestone."}, {"text": "Metamorphic rock like marble.", "isCorrect": true, "rationale": "The text states that 'Marble — forms when limestone is heated and squeezed. Marble is smooth and can be beautifully colored,' directly matching the description and origin."}, {"text": "Another type of igneous rock like basalt.", "isCorrect": false, "rationale": "Basalt is a dark, fine-grained igneous rock formed from lava, completely different in appearance and origin from the described stone."}], "id": "q09"}, {"question": "What is the fundamental basis that scientists use to classify rocks into the three main groups: igneous, sedimentary, and metamorphic?", "options": [{"text": "Their hardness and density.", "isCorrect": false, "rationale": "While hardness and density are physical properties of rocks, they are not the fundamental criteria used to group them into igneous, sedimentary, and metamorphic categories."}, {"text": "Their color and overall appearance.", "isCorrect": false, "rationale": "Color and appearance can vary widely even within a single rock type, and are not the primary basis for this scientific classification."}, {"text": "How they were formed.", "isCorrect": true, "rationale": "The first sentence of the section states, 'Scientists sort rocks into three groups based on how they formed,' establishing this as the fundamental classification principle."}, {"text": "The specific minerals they contain.", "isCorrect": false, "rationale": "While minerals are components, the classification system groups rocks based on the processes that created them, rather than solely on their mineral content, which can overlap or vary."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
