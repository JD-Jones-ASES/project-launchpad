    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what fundamentally defines an object being in motion?", "options": [{"text": "Its visible movement relative to the ground.", "isCorrect": false, "rationale": "While visible movement often indicates motion, the core definition is broader than just 'relative to the ground' and focuses on position change."}, {"text": "A change in its position over time.", "isCorrect": true, "rationale": "The text explicitly defines motion as 'a change in an object's position over time,' making this the most accurate answer."}, {"text": "The speed at which it travels from one point to another.", "isCorrect": false, "rationale": "Speed is a measure of how fast motion occurs, not the definition of motion itself. Motion must exist for speed to be measured."}, {"text": "Its ability to cover distance in a given period.", "isCorrect": false, "rationale": "This describes the concept of speed (distance per time), not the fundamental definition of motion."}], "id": "q01"}, {"question": "Which statement accurately defines 'speed' as described in the section?", "options": [{"text": "The total distance an object covers during its movement.", "isCorrect": false, "rationale": "Distance is a component of speed, but speed also includes the element of time, indicating 'how fast'."}, {"text": "How fast an object moves.", "isCorrect": true, "rationale": "The text directly defines speed as 'how fast an object moves,' which is a concise and accurate definition."}, {"text": "The direction an object is traveling at any given moment.", "isCorrect": false, "rationale": "Direction is a component of velocity, not speed. Speed only indicates the magnitude of movement."}, {"text": "The time it takes for an object to come to a complete stop.", "isCorrect": false, "rationale": "This relates to deceleration or stopping time, which is not the definition of speed itself."}], "id": "q02"}, {"question": "You observe a drone flying 480 meters in 60 seconds. What is the drone's average speed?", "options": [{"text": "8 meters per second", "isCorrect": true, "rationale": "Using the formula Speed = Distance / Time, we calculate 480 meters / 60 seconds = 8 meters per second."}, {"text": "0.125 meters per second", "isCorrect": false, "rationale": "This would be Time / Distance (60/480), which is incorrect for speed calculation."}, {"text": "540 meters per second", "isCorrect": false, "rationale": "This is the sum of distance and time (480+60), not their ratio for speed."}, {"text": "420 meters per second", "isCorrect": false, "rationale": "This is the difference between distance and time (480-60), not their ratio for speed."}], "id": "q03"}, {"question": "Runner A completes 400 meters in 80 seconds. Runner B completes 300 meters in 50 seconds. Which runner is faster, and why?", "options": [{"text": "Runner A, because they covered a greater total distance.", "isCorrect": false, "rationale": "While Runner A covered more distance, they also took more time. To compare speed, both distance and time must be considered."}, {"text": "Runner B, because their speed is 6 m/s compared to Runner A's 5 m/s.", "isCorrect": true, "rationale": "Runner A's speed = 400m / 80s = 5 m/s. Runner B's speed = 300m / 50s = 6 m/s. Runner B is faster."}, {"text": "Runner A, because they ran for a longer period of time.", "isCorrect": false, "rationale": "Running for a longer time does not necessarily mean an object is faster; it depends on the distance covered in that time."}, {"text": "They have the same speed, as both are athletes.", "isCorrect": false, "rationale": "Calculating their speeds shows they do not have the same speed. Individual performance varies."}], "id": "q04"}, {"question": "If an object travels at a constant speed of 7 meters per second, how much distance will it cover in 25 seconds?", "options": [{"text": "3.57 meters", "isCorrect": false, "rationale": "This calculation would be Time / Speed (25/7), which yields incorrect units and value for distance."}, {"text": "18 meters", "isCorrect": false, "rationale": "This is the difference (25-7) which is not how distance is calculated from speed and time."}, {"text": "175 meters", "isCorrect": true, "rationale": "Using the rearranged formula Distance = Speed × Time, we get 7 m/s × 25 s = 175 meters."}, {"text": "32 meters", "isCorrect": false, "rationale": "This is the sum (25+7) which is not how distance is calculated from speed and time."}], "id": "q05"}, {"question": "The 'Ramp Races' activity is designed primarily to help students investigate what relationship?", "options": [{"text": "The relationship between the type of toy car and its durability.", "isCorrect": false, "rationale": "The activity focuses on ramp height, not car durability, although identical cars are a control variable."}, {"text": "How friction from the floor surface affects the car's stopping distance.", "isCorrect": false, "rationale": "While floor surface is mentioned as a factor ('Carpet slows cars too much'), the main variable being changed and investigated is ramp height, not surface material itself."}, {"text": "Whether increasing the ramp's height influences the toy car's speed and the distance it travels.", "isCorrect": true, "rationale": "The activity's prompt, 'What pattern do you notice? Does a higher ramp make the car go faster and farther?' directly indicates this is the primary investigation."}, {"text": "The precise measurement of gravitational acceleration on small objects.", "isCorrect": false, "rationale": "While gravity is involved, the activity is a more practical exploration of factors affecting speed and distance, not a precise measurement of g."}], "id": "q06"}, {"question": "Based on the prompt 'Does a higher ramp make the car go faster and farther?' in the 'Ramp Races' activity, what is the most likely pattern students are expected to observe?", "options": [{"text": "A higher ramp will cause the car to travel a shorter distance due to increased air resistance.", "isCorrect": false, "rationale": "While air resistance exists, the primary expectation with a higher ramp is increased speed and distance, as potential energy converts to kinetic energy."}, {"text": "The car's speed will decrease as the ramp height increases because gravity pulls it down faster.", "isCorrect": false, "rationale": "A higher ramp allows gravity to act over a longer 'fall' period, increasing the final speed and thus distance."}, {"text": "A higher ramp will result in the car having a greater speed and traveling a longer distance.", "isCorrect": true, "rationale": "The question implies a positive correlation between ramp height and speed/distance, as increased height means more potential energy converted to kinetic energy."}, {"text": "Ramp height will have no significant effect on the car's speed or distance traveled.", "isCorrect": false, "rationale": "The activity is designed to show a clear effect, making this unlikely."}], "id": "q07"}, {"question": "In the 'Ramp Races' activity, why is it crucial to use a stopwatch?", "options": [{"text": "To measure the exact height of the ramp for each trial.", "isCorrect": false, "rationale": "A tape measure or ruler would be used to measure the height of the ramp (by measuring the height of the books)."}, {"text": "To record the time it takes for the car to travel a measured distance, which is necessary for calculating speed.", "isCorrect": true, "rationale": "The definition of speed is Distance / Time. To calculate speed in the activity, both distance (measured by tape measure) and time (measured by stopwatch) are needed."}, {"text": "To mark the precise starting point where the car leaves the ramp.", "isCorrect": false, "rationale": "Tape or a physical marker is used for the starting point, not a stopwatch."}, {"text": "To compare the weight of different toy cars.", "isCorrect": false, "rationale": "A scale would be used to compare car weights, not a stopwatch."}], "id": "q08"}, {"question": "The 'Ramp Races Setup Guide' recommends using 'identical cars for fair comparison.' What scientific principle does this recommendation address?", "options": [{"text": "Improving the aesthetic appeal of the experiment.", "isCorrect": false, "rationale": "While it might look tidier, the reason is scientific, not aesthetic."}, {"text": "Ensuring that the only variable being changed is the ramp height, making the comparison valid.", "isCorrect": true, "rationale": "This is about controlling variables. If cars are different, their characteristics (mass, friction) could affect results, making it unclear if changes in speed/distance are due to ramp height or car differences."}, {"text": "Reducing the total time needed for the experiment.", "isCorrect": false, "rationale": "Using identical cars doesn't inherently reduce the time needed; it ensures data reliability."}, {"text": "Making it easier to record results in a tabular format.", "isCorrect": false, "rationale": "Recording results depends on organization, not the identical nature of the cars themselves."}], "id": "q09"}, {"question": "Which of the following scenarios best illustrates an object in 'motion' as defined in the section?", "options": [{"text": "A book sitting stationary on a shelf.", "isCorrect": false, "rationale": "A stationary book is not changing its position over time, so it is not in motion."}, {"text": "A photograph capturing a bird frozen mid-flight.", "isCorrect": false, "rationale": "A photograph captures a single moment in time, not the continuous change in position over time, which defines motion."}, {"text": "The minute hand of a clock steadily moving around the clock face.", "isCorrect": true, "rationale": "The minute hand continuously changes its position (rotates) over time, which directly aligns with the definition of motion."}, {"text": "A car parked in a garage overnight.", "isCorrect": false, "rationale": "A parked car is not changing its position over time, therefore it is not in motion."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
