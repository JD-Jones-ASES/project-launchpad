<body>

        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 28, Section 2</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary function of a chemical bond?", "options": [{"text": "To separate atoms from each other.", "isCorrect": false, "rationale": "Chemical bonds are forces that hold atoms together, not separate them."}, {"text": "To create new elements by changing the atomic structure.", "isCorrect": false, "rationale": "Chemical bonds involve existing atoms connecting, not changing them into new elements."}, {"text": "To hold two or more atoms together to form molecules and compounds.", "isCorrect": true, "rationale": "The text explicitly states, 'A chemical bond is a force that holds two or more atoms together.' This is its core function."}, {"text": "To change the physical state of a substance, such as turning a gas into a liquid.", "isCorrect": false, "rationale": "While bonds are involved in the structure of substances, their primary function is not to directly change physical state, but to hold atoms together."}]}, {"question": "Which of the following best describes the relationship between molecules and compounds?", "options": [{"text": "All molecules are compounds, but not all compounds are molecules.", "isCorrect": false, "rationale": "This statement is incorrect. The text clarifies, 'all compounds are molecules, but not all molecules are compounds.'"}, {"text": "All compounds are molecules, and all molecules are compounds.", "isCorrect": false, "rationale": "This statement is incorrect. Oxygen gas (O2) is an example of a molecule that is not a compound."}, {"text": "All compounds are molecules, but not all molecules are compounds.", "isCorrect": true, "rationale": "The text clearly states, 'all compounds are molecules, but not all molecules are compounds.' Compounds require different kinds of atoms, while molecules only require two or more atoms bonded together, which can be the same kind."}, {"text": "Molecules and compounds are two entirely separate categories with no overlap.", "isCorrect": false, "rationale": "This statement is incorrect. There is significant overlap, as all compounds are a subset of molecules."}]}, {"question": "Oxygen gas (O2) consists of two oxygen atoms bonded together. Water (H2O) consists of two hydrogen atoms bonded to one oxygen atom. Based on the provided definitions, why is O2 considered a molecule but not a compound, while H2O is both a molecule and a compound?", "options": [{"text": "O2 is a gas, and H2O is a liquid, which dictates their classification.", "isCorrect": false, "rationale": "The physical state (gas or liquid) does not determine whether something is a compound; the types of atoms present do."}, {"text": "H2O contains different kinds of atoms bonded together, while O2 contains only one kind of atom.", "isCorrect": true, "rationale": "A compound is defined as 'a molecule made of different kinds of atoms.' O2 has only one kind of atom (oxygen), making it a molecule but not a compound. H2O has two different kinds (hydrogen and oxygen), making it both a molecule and a compound."}, {"text": "Chemical bonds in O2 are weaker than in H2O, affecting their classification.", "isCorrect": false, "rationale": "The strength of chemical bonds is not mentioned as a criterion for distinguishing between molecules and compounds at this level."}, {"text": "O2 is found naturally in the atmosphere, while H2O is not.", "isCorrect": false, "rationale": "The natural occurrence or location of a substance does not determine its classification as a molecule or compound."}]}, {"question": "The text uses a LEGO analogy where different colored bricks represent different kinds of atoms. If you build a spaceship using red and blue bricks, and then dismantle it and build a house using the *same* red and blue bricks but arranged differently, what does this best illustrate about atoms?", "options": [{"text": "All atoms are the same size and shape, like LEGO bricks.", "isCorrect": false, "rationale": "While the analogy uses uniform bricks for simplicity, the primary point is about arrangement, not universal atom size/shape."}, {"text": "Atoms can change their identity (e.g., color) depending on what they form.", "isCorrect": false, "rationale": "The analogy states 'Each color represents a different kind of atom,' implying atoms retain their identity. They don't change color or kind."}, {"text": "The arrangement and number of atoms, even if the types are the same, determine the resulting substance and its properties.", "isCorrect": true, "rationale": "The text emphasizes: 'Same kinds of atoms, different arrangement, completely different substance!' The LEGO analogy highlights how different structures (substances) can be built from the same basic units (atoms) by changing their arrangement."}, {"text": "There are only a few kinds of atoms (like a few colors of bricks) in nature.", "isCorrect": false, "rationale": "While the text mentions 'only about 118 kinds of atoms,' the analogy specifically emphasizes how *rearrangement* of those few kinds leads to millions of substances, not just the fact of few kinds."}]}, {"question": "Hydrogen gas (H2) and water (H2O) are both molecules. What is the most significant difference between them in terms of their classification as described in the section?", "options": [{"text": "H2 is an element, while H2O is a mixture.", "isCorrect": false, "rationale": "H2O is a compound, not a mixture. While H2 is formed from an element, it is itself a molecule."}, {"text": "H2 is a molecule but not a compound, whereas H2O is both a molecule and a compound.", "isCorrect": true, "rationale": "H2 consists of only one kind of atom (hydrogen), making it a molecule but not a compound. H2O consists of two different kinds of atoms (hydrogen and oxygen), making it both a molecule and a compound."}, {"text": "H2 has a stronger chemical bond than H2O.", "isCorrect": false, "rationale": "The text does not compare the strength of bonds between H2 and H2O. Classification is based on atomic composition, not bond strength."}, {"text": "H2 is a naturally occurring gas, while H2O must be synthetically created.", "isCorrect": false, "rationale": "Water (H2O) occurs naturally and is not solely synthetic. Natural occurrence is not the basis for classification as molecule vs. compound."}]}, {"question": "In simple molecule models, what do the colored circles and lines primarily represent?", "options": [{"text": "Colored circles represent electrons, and lines represent protons.", "isCorrect": false, "rationale": "The models simplify atoms as circles and bonds as lines, not specific subatomic particles like electrons or protons."}, {"text": "Colored circles represent molecules, and lines represent different elements.", "isCorrect": false, "rationale": "Circles represent individual atoms (elements), not entire molecules, and lines represent bonds, not different elements."}, {"text": "Colored circles represent different kinds of atoms, and lines represent chemical bonds.", "isCorrect": true, "rationale": "The text states, 'In these models, each atom is drawn as a colored circle and each bond is drawn as a line.' Different colors are used for different elements."}, {"text": "Colored circles represent the substance's physical state, and lines represent its temperature.", "isCorrect": false, "rationale": "The models show atomic arrangement and bonding, not physical state or temperature."}]}, {"question": "The text notes that hydrogen peroxide (H2O2) has the 'Same kinds of atoms, different arrangement, completely different substance!' compared to water (H2O). What fundamental principle does this example best illustrate?", "options": [{"text": "All substances made of hydrogen and oxygen are liquids.", "isCorrect": false, "rationale": "The example doesn't make a claim about the state of all H/O substances, only that arrangement matters."}, {"text": "Chemical bonds can easily be broken and reformed to change substances.", "isCorrect": false, "rationale": "While bonds can break, the focus of the example is on how arrangement changes the *identity* of the substance, not the ease of bond breaking."}, {"text": "The specific way atoms are connected and their exact count determines the unique identity and properties of a molecule.", "isCorrect": true, "rationale": "The example highlights that even with the same elements, a change in their number or arrangement (H2O vs. H2O2) results in a 'completely different substance,' underscoring the importance of molecular structure."}, {"text": "Only compounds can have completely different properties from each other.", "isCorrect": false, "rationale": "The principle applies to molecules generally, and this example compares two different compounds."}]}, {"question": "Based on the information provided, if a hypothetical substance has the chemical formula AB3 (meaning one atom of element A bonded to three atoms of element B, where A and B are different elements), how should it be classified?", "options": [{"text": "It is a molecule, but not a compound.", "isCorrect": false, "rationale": "Since it contains different kinds of atoms (A and B), it must be a compound."}, {"text": "It is a compound, but not a molecule.", "isCorrect": false, "rationale": "The text explicitly states that 'all compounds are molecules.' Since it's a compound, it must also be a molecule."}, {"text": "It is both a molecule and a compound.", "isCorrect": true, "rationale": "It has two or more atoms bonded together (making it a molecule) and those atoms are of different kinds (A and B), making it a compound. Thus, it is both."}, {"text": "It cannot be classified without knowing the specific properties of elements A and B.", "isCorrect": false, "rationale": "The definitions for molecule and compound depend on the number and *kinds* of atoms, not their specific properties beyond being 'different kinds.'"}]}, {"question": "The 'teachernote' advises against introducing 'ionic vs. covalent bonding' and suggests using 'compound' loosely to mean any substance with more than one type of atom. What is the most likely reason for these pedagogical guidelines?", "options": [{"text": "To suggest that these advanced concepts are not scientifically accurate.", "isCorrect": false, "rationale": "These are accurate concepts, but they are considered advanced for the target grade level."}, {"text": "To simplify the material and prevent overwhelming students with overly complex classifications at this foundational stage.", "isCorrect": true, "rationale": "The purpose of pedagogical notes like this is typically to tailor content to the audience's learning level, focusing on core concepts before introducing nuanced complexities."}, {"text": "To encourage students to research these concepts independently outside of class.", "isCorrect": false, "rationale": "While independent research is good, the note aims to limit scope, not necessarily to defer teaching for self-discovery."}, {"text": "To deliberately mislead students about the precise definitions of chemical terms.", "isCorrect": false, "rationale": "Educational content aims to accurately convey information, even if simplified, not to mislead."}]}, {"question": "Which of the following describes a substance that is a molecule but *not* a compound, according to the definitions in the text?", "options": [{"text": "A substance formed from two different kinds of atoms bonded together.", "isCorrect": false, "rationale": "This describes a compound (and therefore also a molecule)."}, {"text": "A substance made of three atoms of the *same* element bonded together.", "isCorrect": true, "rationale": "This fits the definition of a molecule (two or more atoms bonded) but not a compound (which requires different kinds of atoms)."}, {"text": "A substance that consists of only one single, unbonded atom.", "isCorrect": false, "rationale": "A single atom is not considered a molecule, which requires 'two or more atoms bonded together.'"}, {"text": "A substance that can be seen without a microscope.", "isCorrect": false, "rationale": "Visibility to the naked eye is not a criterion for classifying substances as molecules or compounds."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
