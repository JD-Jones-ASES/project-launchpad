    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 26</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the most accurate definition of a 'life cycle' as presented in the text?", "options": [{"text": "The total number of years an organism is expected to live.", "isCorrect": false, "rationale": "The duration of life is a characteristic of a life cycle, but not its defining process. The definition encompasses stages beyond just length."}, {"text": "The series of stages a living thing goes through from birth to growth, reproduction, and eventual death.", "isCorrect": true, "rationale": "The text explicitly defines a life cycle as 'the series of stages a living thing goes through from birth to growth to reproduction to death'."}, {"text": "The process by which an organism adapts to its environment over time.", "isCorrect": false, "rationale": "Adaptation is a biological process, but it's distinct from the sequential stages of an individual's life cycle."}, {"text": "The transformation of non-living matter into living organisms.", "isCorrect": false, "rationale": "This describes abiogenesis or a similar concept, which is not what a life cycle (for an existing living thing) entails."}], "id": "q01"}, {"question": "Even though a whale and a daisy appear very different, they are both stated to follow the same basic life cycle pattern. Which fundamental stage applies to both, allowing for the continuation of their respective kinds?", "options": [{"text": "Metamorphosis.", "isCorrect": false, "rationale": "Metamorphosis is a specific type of development (like in insects or amphibians) and not a universal stage for all living things like whales or daisies."}, {"text": "Reproduction.", "isCorrect": true, "rationale": "The text states that 'all life cycles have the same basic pattern' which includes birth, growth, reproduction, and death. Reproduction is the stage where a living thing 'can make new living things of the same kind,' ensuring the continuation of the species."}, {"text": "Hibernation.", "isCorrect": false, "rationale": "Hibernation is a survival strategy for some animals, not a universal life cycle stage shared by all organisms, including plants like daisies."}, {"text": "Photosynthesis.", "isCorrect": false, "rationale": "Photosynthesis is how plants make food, but it's not a universal life cycle stage for animals like whales, nor is it listed as one of the four basic pattern stages."}], "id": "q02"}, {"question": "The text advises thinking of a life cycle as a 'circle, not a straight line.' What critical concept about life's continuity does this analogy emphasize?", "options": [{"text": "Organisms can biologically revert to earlier developmental stages.", "isCorrect": false, "rationale": "The analogy refers to the continuity of life across generations, not an individual organism's ability to reverse its own development."}, {"text": "The death of one organism permanently ends its lineage.", "isCorrect": false, "rationale": "This is the opposite of what the 'circle' analogy implies, as reproduction ensures the lineage continues."}, {"text": "Reproduction by one generation begins a new cycle with its offspring.", "isCorrect": true, "rationale": "The text explicitly states, 'When one generation reproduces, a new cycle begins with its young,' which directly supports the 'circle' analogy where the 'ending' of one cycle leads to the 'beginning' of the next."}, {"text": "All living things eventually return to their original form after death.", "isCorrect": false, "rationale": "Organisms die and decompose, returning nutrients, but they do not return to their original living form to restart their individual cycle."}], "id": "q03"}, {"question": "Based on the examples provided in the text, which comparison of life cycle lengths is accurate?", "options": [{"text": "A human typically lives longer than a bristlecone pine tree.", "isCorrect": false, "rationale": "The text states humans live 70-80 years, while bristlecone pine trees can live over 4,000 years, making this comparison incorrect."}, {"text": "A giant tortoise has a shorter life cycle than a house mouse.", "isCorrect": false, "rationale": "A giant tortoise can live over 100 years, whereas a house mouse lives about one to two years, making this statement incorrect."}, {"text": "An adult mayfly lives only long enough to reproduce, unlike most other animals listed.", "isCorrect": true, "rationale": "The text notes, 'An adult mayfly may live only a single day — just long enough to find a mate and lay eggs,' highlighting its uniquely short reproductive-focused adult life compared to others that grow and live for extended periods."}, {"text": "Dogs and fruit flies have similar life cycle durations.", "isCorrect": false, "rationale": "A dog lives 10-15 years, while a fruit fly completes its cycle in about two weeks, making their durations vastly different."}], "id": "q04"}, {"question": "Which of the following is an example of the 'Growth and development' stage of a life cycle?", "options": [{"text": "A sunflower producing seeds after pollination.", "isCorrect": false, "rationale": "Producing seeds is part of the 'Reproduction' stage."}, {"text": "A chick hatching from an egg.", "isCorrect": false, "rationale": "Hatching from an egg is an example of 'Birth (or beginning).'"}, {"text": "A seedling growing its first leaves and getting bigger.", "isCorrect": true, "rationale": "The text states, 'The young organism gets bigger and changes. A chick grows feathers. A seedling grows leaves,' which directly describes growth and development."}, {"text": "An adult mayfly finding a mate.", "isCorrect": false, "rationale": "Finding a mate is part of the 'Reproduction' stage."}], "id": "q05"}, {"question": "Why is the 'Death' stage an integral part of the overall life cycle, despite being the end for an individual organism?", "options": [{"text": "It prevents overpopulation of a species.", "isCorrect": false, "rationale": "While death can regulate populations, the text focuses on its ecological role, not population control."}, {"text": "It marks the complete cessation of life for a species.", "isCorrect": false, "rationale": "The text clearly states, 'But the cycle does not truly stop — the offspring carry on,' indicating life continues through reproduction."}, {"text": "It ensures nutrients are returned to the environment for new life.", "isCorrect": true, "rationale": "The text explains, 'The organism dies, and its body returns nutrients to the environment,' highlighting its role in nutrient cycling crucial for subsequent life."}, {"text": "It always leads to immediate extinction of the species.", "isCorrect": false, "rationale": "Death is for individual organisms; species continue through reproduction, as explained in the text."}], "id": "q06"}, {"question": "A student is observing an apple tree. Which of the following accurately describes a sequential part of the apple tree's plant life cycle as described in the text?", "options": [{"text": "Sprout directly leads to the production of fruit.", "isCorrect": false, "rationale": "After sprout comes seedling, mature plant, and flower before fruit and seeds are produced."}, {"text": "The mature plant produces flowers, which then lead to fruit and seeds.", "isCorrect": true, "rationale": "The text outlines the plant cycle as: Mature plant → Flower → Fruit and seeds."}, {"text": "Fruit and seeds scatter before the flower stage.", "isCorrect": false, "rationale": "Flowers produce fruit and seeds; scattering happens after the fruit and seeds are produced."}, {"text": "Germination occurs after the seedling grows its first leaves.", "isCorrect": false, "rationale": "Germination is when the seed cracks open and a small root and stem push out, which happens before it becomes a seedling."}], "id": "q07"}, {"question": "A gardener notices a tiny root and stem emerging from a bean seed they planted in moist soil. According to the text, what is this specific process called?", "options": [{"text": "Pollination.", "isCorrect": false, "rationale": "Pollination is the transfer of pollen, typically leading to fertilization and seed formation, not the sprouting of a seed."}, {"text": "Maturation.", "isCorrect": false, "rationale": "Maturation refers to reaching full size or adulthood, not the initial sprouting of a seed."}, {"text": "Germination.", "isCorrect": true, "rationale": "The text defines 'Germination' as 'the process of a seed beginning to sprout and grow into a new plant,' which aligns perfectly with a root and stem emerging."}, {"text": "Photosynthesis.", "isCorrect": false, "rationale": "Photosynthesis is the process by which plants make food using sunlight, and while important for a seedling, it's not the name for the act of sprouting itself."}], "id": "q08"}, {"question": "The 'sciencelife' section highlights that one apple tree can make thousands of apples, each with seeds that could grow into new trees, ultimately starting a cycle that lasts for hundreds of years. This example best demonstrates which overarching principle of life cycles?", "options": [{"text": "The primary role of flowers in attracting pollinators.", "isCorrect": false, "rationale": "While true, the example's emphasis is on the perpetuation of the cycle over time through seed production, not solely on pollination."}, {"text": "The specific nutritional requirements for fruit development.", "isCorrect": false, "rationale": "The text does not discuss nutritional requirements in this context; it focuses on the outcome of reproduction."}, {"text": "The powerful capacity of reproduction to perpetuate life across generations.", "isCorrect": true, "rationale": "The example directly illustrates how one tree, through its reproductive output (seeds), can ensure the continuation of its life cycle for a very long time through its offspring."}, {"text": "The rapid decomposition rate of fallen fruit in an ecosystem.", "isCorrect": false, "rationale": "Decomposition is part of the 'death' stage's outcome, but the 'sciencelife' box focuses on the creation of new life, not its decomposition."}], "id": "q09"}, {"question": "Imagine a newly discovered species of microorganism that reproduces by dividing into two identical cells every few minutes, after which the original cell ceases to exist as a distinct entity. Which of the four universal life cycle stages is most fundamental to the continued existence of this species?", "options": [{"text": "Growth and development, as it becomes two cells.", "isCorrect": false, "rationale": "While growth occurs, the crucial aspect for *species continuation* when individuals are short-lived is creating new individuals, which is reproduction."}, {"text": "Death, as the original cell ceases to exist.", "isCorrect": false, "rationale": "Death is the end for an individual, but for a species to continue, new life must be created."}, {"text": "Birth (or beginning), as the new cells are formed.", "isCorrect": false, "rationale": "Birth is the start of an individual, but 'reproduction' is the *process* by which new beginnings are made for the *species*."}, {"text": "Reproduction, as it directly creates new individuals to carry on the cycle.", "isCorrect": true, "rationale": "In a species with such a rapid turnover and short individual lifespan, reproduction is the most critical stage for the species' ongoing existence, ensuring that new organisms are constantly generated to replace those that 'end'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
