<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the characteristics of a solid?", "options": [{"text": "No definite shape, no definite volume.", "isCorrect": false, "rationale": "This description aligns with the properties of a gas, not a solid."}, {"text": "Definite shape, definite volume, keeps its shape.", "isCorrect": true, "rationale": "According to the text, a solid is 'a state of matter with a definite shape and a definite volume. It keeps its shape no matter what container you put it in.'"}, {"text": "Definite shape, takes the shape of its container.", "isCorrect": false, "rationale": "A solid has a definite shape and does not take the shape of its container; a liquid takes the shape of its container."}, {"text": "Definite volume, no definite shape.", "isCorrect": false, "rationale": "This description aligns with the properties of a liquid, not a solid."}]}, {"question": "A substance is observed to completely fill any container it is placed in, spreading out to occupy all available space. What state of matter is this substance most likely in?", "options": [{"text": "Solid", "isCorrect": false, "rationale": "Solids have a definite shape and volume and do not spread to fill containers."}, {"text": "Liquid", "isCorrect": false, "rationale": "Liquids have a definite volume and take the shape of their container, but they do not spread to fill the entire container or occupy all available space."}, {"text": "Gas", "isCorrect": true, "rationale": "The text states that a gas has 'no definite shape and no definite volume. It spreads out to fill whatever container it is in,' which matches the description."}, {"text": "Plasma", "isCorrect": false, "rationale": "Plasma is not mentioned as one of the three main states of matter in this section."}]}, {"question": "What is the primary difference in how a liquid and a gas interact with their containers, according to their definitions?", "options": [{"text": "A liquid keeps its own shape, while a gas takes the container's shape.", "isCorrect": false, "rationale": "Neither a liquid nor a gas keeps its own shape; both take the container's shape."}, {"text": "A liquid takes the shape of its container but has a definite volume, while a gas takes the shape of its container and fills its entire volume.", "isCorrect": true, "rationale": "The text defines a liquid as having a definite volume but no definite shape (taking the container's shape), and a gas as having no definite shape or volume (spreading to fill the entire container)."}, {"text": "A liquid has a definite volume, while a gas has a definite shape.", "isCorrect": false, "rationale": "While a liquid has definite volume, a gas does not have a definite shape."}, {"text": "Both liquids and gases have definite shapes.", "isCorrect": false, "rationale": "Neither liquids nor gases have definite shapes; they both take the shape of their container."}]}, {"question": "According to the table, how do the tiny particles that make up a liquid typically behave?", "options": [{"text": "They are packed tightly and vibrate in fixed positions.", "isCorrect": false, "rationale": "This description applies to the particles in a solid."}, {"text": "They are spread out and move very fast.", "isCorrect": false, "rationale": "This description applies to the particles in a gas."}, {"text": "They are close together but can slide past one another.", "isCorrect": true, "rationale": "The table explicitly states that liquid particles are 'Close, slide around'."}, {"text": "They are far apart and move slowly.", "isCorrect": false, "rationale": "Gas particles are spread out and move fast, not slowly."}]}, {"question": "Which characteristic is always definite for a liquid but never definite for a gas?", "options": [{"text": "Shape", "isCorrect": false, "rationale": "Neither a liquid nor a gas has a definite shape; both take the shape of their container."}, {"text": "Volume", "isCorrect": true, "rationale": "The text states a liquid has 'definite volume,' while a gas has 'no definite volume.'"}, {"text": "Ability to flow", "isCorrect": false, "rationale": "Both liquids and gases can flow or spread."}, {"text": "Particle arrangement", "isCorrect": false, "rationale": "While particle arrangement differs, 'definite' in this context refers to macroscopic properties of shape and volume."}]}, {"question": "Based on the examples provided in the text, which of the following is an example of water in its gas form?", "options": [{"text": "An ice cube", "isCorrect": false, "rationale": "The text identifies an ice cube as 'solid water'."}, {"text": "Water flowing from a tap", "isCorrect": false, "rationale": "The text identifies this as 'liquid water'."}, {"text": "Steam rising from a pot of boiling water", "isCorrect": true, "rationale": "The text explicitly states, 'And steam rising from a pot of boiling water is water in its gas form.'"}, {"text": "Dew on grass", "isCorrect": false, "rationale": "The 'sciencelife' box describes dew forming as gas becoming liquid, not an example of water already in gas form."}]}, {"question": "Compare the particles of a solid to those of a gas. What is the most significant difference in their arrangement and movement?", "options": [{"text": "Solid particles are spread out and move fast, while gas particles are close and slide around.", "isCorrect": false, "rationale": "This statement reverses the characteristics; solid particles are tightly packed, and gas particles are spread out."}, {"text": "Solid particles are close and slide around, while gas particles are packed tightly and vibrate.", "isCorrect": false, "rationale": "This statement incorrectly describes both solid and gas particle behavior."}, {"text": "Solid particles are packed tightly and vibrate, while gas particles are spread out and move fast.", "isCorrect": true, "rationale": "The table specifies solid particles are 'Packed tightly, vibrate' and gas particles are 'Spread out, move fast'."}, {"text": "Solid particles have definite volume, while gas particles have definite shape.", "isCorrect": false, "rationale": "This describes macroscopic properties of the states, not the microscopic behavior of particles, and misrepresents the shape of gas."}]}, {"question": "A substance initially has a definite volume and takes the shape of its container. If this substance is then heated and observed to expand significantly, completely filling a much larger container and having no fixed volume, what state change has most likely occurred?", "options": [{"text": "Solid to liquid", "isCorrect": false, "rationale": "A change from solid to liquid would result in a substance that still has a definite volume, not one that expands significantly to fill a larger container with no fixed volume."}, {"text": "Liquid to gas", "isCorrect": true, "rationale": "The initial description fits a liquid (definite volume, takes container's shape). The subsequent description of expanding to fill a larger container with no fixed volume perfectly matches the properties of a gas, indicating a liquid-to-gas transition."}, {"text": "Gas to liquid", "isCorrect": false, "rationale": "A change from gas to liquid would involve condensation and a decrease in volume, not an expansion to fill a larger container."}, {"text": "Liquid to solid", "isCorrect": false, "rationale": "A change from liquid to solid (freezing) would result in a substance with a definite shape, not one that expands to fill a larger container and loses its fixed volume."}]}, {"question": "A scientist discovers a new substance that, at room temperature, has a definite volume but takes the shape of whatever vessel it is poured into. Based on the provided information, how would you describe this substance and the behavior of its particles?", "options": [{"text": "It is a solid, and its particles are packed tightly and vibrate.", "isCorrect": false, "rationale": "A solid has a definite shape and does not take the shape of its container."}, {"text": "It is a gas, and its particles are spread out and move fast.", "isCorrect": false, "rationale": "A gas does not have a definite volume; it spreads to fill the entire container."}, {"text": "It is a liquid, and its particles are close but can slide around.", "isCorrect": true, "rationale": "The description matches that of a liquid: definite volume, no definite shape (takes container's shape), and its particles are 'close, slide around' according to the table."}, {"text": "It is a gas, and its particles are close and slide around.", "isCorrect": false, "rationale": "This incorrectly combines the properties of a gas (taking container's shape) with particle behavior of a liquid, and a gas does not have a definite volume."}]}, {"question": "The 'sciencelife' box mentions dew forming on grass in the morning. What state change is described by this phenomenon?", "options": [{"text": "Liquid becoming solid", "isCorrect": false, "rationale": "Liquid becoming solid is freezing, like making ice pops."}, {"text": "Solid becoming liquid", "isCorrect": false, "rationale": "Solid becoming liquid is melting, which is not what dew formation is."}, {"text": "Gas becoming liquid", "isCorrect": true, "rationale": "The 'sciencelife' box explicitly states, 'When dew forms on grass in the morning, gas (water vapor in the air) becomes liquid.'"}, {"text": "Liquid becoming gas", "isCorrect": false, "rationale": "Liquid becoming gas is boiling or evaporation, like boiling water for pasta."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
