    </div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

</div>

<script>
var QUESTIONS = [{"question": "What is the primary tool used to measure the mass of an object?", "options": [{"text": "A graduated cylinder", "isCorrect": false, "rationale": "A graduated cylinder is used to measure volume, not mass."}, {"text": "A balance", "isCorrect": true, "rationale": "The text states, 'A balance compares an object to known weights' to measure mass."}, {"text": "A ruler", "isCorrect": false, "rationale": "A ruler is used to measure length or distance, not mass."}, {"text": "A thermometer", "isCorrect": false, "rationale": "A thermometer is used to measure temperature, not mass."}]}, {"question": "Based on the provided mass benchmarks, which object would most likely have a mass of approximately 150-200 grams?", "options": [{"text": "A paperclip", "isCorrect": false, "rationale": "A paperclip has a mass of about 1 gram, which is much less than 150-200 grams."}, {"text": "A pencil", "isCorrect": false, "rationale": "A pencil has a mass of about 5–8 grams, which is significantly less than 150-200 grams."}, {"text": "An apple", "isCorrect": true, "rationale": "The text states that an apple has a mass of 'about 150–200 g'."}, {"text": "A textbook", "isCorrect": false, "rationale": "A textbook has a mass of about 500 grams, which is more than 150-200 grams."}]}, {"question": "When measuring the volume of a liquid in a graduated cylinder, especially if the liquid's surface curves (forming a meniscus), where should you read the measurement?", "options": [{"text": "At the highest point of the curve.", "isCorrect": false, "rationale": "For water, the text specifically instructs to read at the bottom of the curve, not the highest point."}, {"text": "At the exact middle of the liquid column.", "isCorrect": false, "rationale": "Reading at the exact middle is not the standard or most accurate method for liquids with a meniscus."}, {"text": "At the bottom of the curve, known as the meniscus.", "isCorrect": true, "rationale": "The text explicitly states: 'read the measurement at the bottom of the curve (called the meniscus).'"}, {"text": "At the top edge of the graduated cylinder opening.", "isCorrect": false, "rationale": "This position would not accurately reflect the volume of the liquid inside the cylinder."}]}, {"question": "A student uses the water displacement method to find the volume of an irregularly shaped object. The initial water level in a graduated cylinder is 50 mL. After carefully adding the object, the water level rises to 75 mL. What is the volume of the object?", "options": [{"text": "50 mL", "isCorrect": false, "rationale": "50 mL is the initial volume of the water, not the object."}, {"text": "75 mL", "isCorrect": false, "rationale": "75 mL is the final volume of the water plus the object, not the object's volume alone."}, {"text": "25 mL", "isCorrect": true, "rationale": "The volume of the object is the difference between the final and initial water levels: 75 mL - 50 mL = 25 mL."}, {"text": "125 mL", "isCorrect": false, "rationale": "125 mL would be the sum of the initial and final volumes, which does not represent the object's volume."}]}, {"question": "According to the 'teachernote' analogy, which statement best describes the fundamental difference between mass and volume?", "options": [{"text": "Mass is how much room something takes up, while volume is how much stuff it has.", "isCorrect": false, "rationale": "This statement incorrectly swaps the definitions of mass and volume as presented in the analogy."}, {"text": "Mass is how much stuff something has, while volume is how much room it takes up.", "isCorrect": true, "rationale": "The 'teachernote' explicitly states: 'mass is “how much stuff” something has, and volume is “how much room” it takes up.'"}, {"text": "Mass is measured in liters, while volume is measured in grams.", "isCorrect": false, "rationale": "This statement uses incorrect units; mass is measured in grams, and volume in liters or milliliters."}, {"text": "Mass applies only to solids, while volume applies only to liquids.", "isCorrect": false, "rationale": "Both mass and volume are fundamental properties that apply to all states of matter."}]}, {"question": "Which option correctly identifies the measurement and its appropriate unit(s) as specified in the section content?", "options": [{"text": "Mass: milliliters (mL)", "isCorrect": false, "rationale": "Milliliters (mL) are units for volume, not mass."}, {"text": "Volume: grams (g)", "isCorrect": false, "rationale": "Grams (g) are units for mass, not volume."}, {"text": "Mass: grams (g)", "isCorrect": true, "rationale": "The text and table clearly state that mass is measured in grams (g)."}, {"text": "Volume: centimeters (cm)", "isCorrect": false, "rationale": "Centimeters (cm) are units for length; volume is measured in milliliters (mL) or liters (L)."}]}, {"question": "In a baking recipe, an instruction reads: 'Add 250 mL of milk and use 200 g of flour.' These two measurements represent, respectively:", "options": [{"text": "Mass and mass.", "isCorrect": false, "rationale": "mL is a unit of volume, not mass."}, {"text": "Volume and volume.", "isCorrect": false, "rationale": "g is a unit of mass, not volume."}, {"text": "Volume and mass.", "isCorrect": true, "rationale": "The 'sciencelife' section confirms: '“Add 250 mL of milk” is a volume measurement. “Use 200 g of flour” is a mass measurement.'"}, {"text": "Mass and volume.", "isCorrect": false, "rationale": "This order is incorrect; 250 mL refers to volume, and 200 g refers to mass."}]}, {"question": "Marie Curie's discovery of polonium and radium through 'carefully measuring and studying the properties of mysterious substances' primarily illustrates which fundamental aspect of scientific discovery?", "options": [{"text": "That intuition alone is sufficient for groundbreaking scientific advancements.", "isCorrect": false, "rationale": "Curie's work emphasized 'careful measurement,' suggesting that intuition must be supported by empirical data, not replace it."}, {"text": "That scientific breakthroughs are limited to the most well-known elements.", "isCorrect": false, "rationale": "Curie discovered *new* elements from 'mysterious substances,' demonstrating that new discoveries can come from unknown areas."}, {"text": "That precise and diligent measurement is crucial for uncovering the hidden properties of matter.", "isCorrect": true, "rationale": "The text highlights Curie's 'careful measurement' and states that she 'showed the world that matter has secrets waiting to be uncovered, and that careful measurement is the key to discovering them.'"}, {"text": "That only scientists with multiple Nobel Prizes can make significant contributions.", "isCorrect": false, "rationale": "While Curie won multiple Nobels, her story is used to exemplify the importance of measurement, not to set a prerequisite for scientific contribution."}]}, {"question": "A large, fluffy pillow takes up a lot of space but is very light. Conversely, a small rock might take up little space but be very heavy. This comparison effectively demonstrates the difference between:", "options": [{"text": "Density and pressure.", "isCorrect": false, "rationale": "While related, the analogy specifically contrasts 'how much room it takes up' (volume) and 'how much stuff it has' (mass), not density or pressure."}, {"text": "Mass and volume.", "isCorrect": true, "rationale": "This is a direct application of the analogy from the 'teachernote': 'A pillow is big (lots of volume) but light (little mass). A rock might be small (little volume) but heavy (lots of mass).'"}, {"text": "Length and width.", "isCorrect": false, "rationale": "Length and width are dimensions that contribute to volume, but the comparison is about the overall quantity of matter versus the space occupied."}, {"text": "Weight and force.", "isCorrect": false, "rationale": "Weight is a measure of the force of gravity on an object's mass, but the analogy's core distinction is between the 'stuff' (mass) and 'room' (volume)."}]}, {"question": "Why does the section 'Measuring Matter' emphasize the use of specific tools and techniques like reading the meniscus or using water displacement for accurate measurements?", "options": [{"text": "Because rough estimates are often sufficient for scientific experiments.", "isCorrect": false, "rationale": "The emphasis on 'careful measurement' throughout the text (including Marie Curie's example) contradicts the idea that rough estimates are sufficient."}, {"text": "To ensure measurements are complicated enough for advanced students.", "isCorrect": false, "rationale": "The purpose of these techniques is accuracy and reliability, not complexity for complexity's sake."}, {"text": "To guarantee precision and reliability, which are foundational for understanding matter and making scientific discoveries.", "isCorrect": true, "rationale": "The text repeatedly stresses the importance of careful and precise measurement, exemplified by Marie Curie's discoveries and the detailed instructions for using balances and graduated cylinders, stating 'careful measurement is the key to discovering them [secrets].'"}, {"text": "Because different scientific fields prefer different measurement protocols.", "isCorrect": false, "rationale": "While protocols may vary, the fundamental reason for using precise techniques is universal across sciences: to achieve accurate and reliable data."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
