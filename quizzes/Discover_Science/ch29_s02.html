        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 29, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Which statement best describes the fundamental difference between static electricity and current electricity?", "options": [{"text": "Static electricity is used to power household appliances, while current electricity creates small zaps and sparks.", "isCorrect": false, "rationale": "This statement incorrectly swaps the roles of static and current electricity. The text states that static electricity creates zaps and sparks, while current electricity powers appliances."}, {"text": "Static electricity involves a steady flow of charges, whereas current electricity involves charges that remain in one place.", "isCorrect": false, "rationale": "This statement reverses the definitions. Current electricity involves a steady flow, and static electricity involves charges that stay in one place."}, {"text": "Current electricity requires a complete path to flow, but static electricity does not.", "isCorrect": false, "rationale": "While current electricity does require a complete path, the fundamental difference highlighted in the text is about the movement vs. stationary nature of charges, not just the path requirement which is specific to current."}, {"text": "Current electricity is characterized by a steady flow of electric charges through a path, unlike static electricity where charges stay in one place.", "isCorrect": true, "rationale": "The text clearly defines current electricity as 'a steady flow of electric charges through a path' and contrasts it with static electricity, which 'stays in one place,' making this the most accurate description of their fundamental difference."}], "id": "q01"}, {"question": "Imagine you are building a simple circuit with a battery, wires, and a light bulb. What is the primary role of the light bulb in this circuit?", "options": [{"text": "It acts as the energy source, pushing the charges along the path.", "isCorrect": false, "rationale": "The battery or power supply is the energy source, not the light bulb. The light bulb consumes energy."}, {"text": "It serves as the path, connecting everything together for the charges to flow.", "isCorrect": false, "rationale": "The wires serve as the path for the electric charges. The light bulb is connected by the wires."}, {"text": "It is the load, converting electrical energy into another form like light.", "isCorrect": true, "rationale": "The text defines a load as 'something that uses the electrical energy, like a light bulb... The load changes electrical energy into another form — light, sound, or motion.'"}, {"text": "It functions as a switch, opening or closing the circuit to control the flow.", "isCorrect": false, "rationale": "A switch is a separate device used to open or close the circuit. A light bulb's primary role is to use the energy, not control the flow directly."}], "id": "q02"}, {"question": "A student is trying to get a small flashlight bulb to light up using a battery and wires, but it remains dark. Which of the following is the most likely reason, according to the 'most important rule about circuits'?", "options": [{"text": "The battery is likely too old and has run out of chemical energy.", "isCorrect": false, "rationale": "While a dead battery could prevent the bulb from lighting, the question specifically asks based on the 'most important rule about circuits,' which focuses on the circuit's completeness, not the battery's charge."}, {"text": "The wires are probably made of an insulating material, blocking the current.", "isCorrect": false, "rationale": "Wires are typically made of conductive materials like copper. If the wires themselves were insulators, they wouldn't be effective circuit paths, but this is a less direct answer to the 'most important rule'."}, {"text": "The circuit is open, meaning there is a gap or break in the path.", "isCorrect": true, "rationale": "The text states, 'A circuit must be closed (complete) for electricity to flow.' It further explains that 'An open circuit has a gap or break. The path is incomplete, so charges cannot flow and the bulb stays dark.' This directly addresses the 'most important rule.'"}, {"text": "The light bulb is designed for static electricity, not current electricity.", "isCorrect": false, "rationale": "Light bulbs are designed to work with current electricity, not static electricity, which does not flow continuously."}], "id": "q03"}, {"question": "Why are electrical wires typically made with a copper core surrounded by a plastic or rubber coating?", "options": [{"text": "Copper is an insulator, and plastic/rubber is a conductor, to allow safe handling.", "isCorrect": false, "rationale": "This statement incorrectly identifies copper as an insulator and plastic/rubber as a conductor. Copper is a conductor, and plastic/rubber are insulators."}, {"text": "Copper acts as an insulator to prevent short circuits, while the coating conducts electricity.", "isCorrect": false, "rationale": "Copper is a good conductor, not an insulator. The coating insulates, it does not conduct."}, {"text": "The copper core is a good conductor, allowing current to flow, while the plastic/rubber coating is an insulator, blocking current for safety.", "isCorrect": true, "rationale": "The text explains, 'Wires are made of metal (usually copper) because metal is a great conductor. But the outside of the wire is covered in plastic or rubber — an insulator — so you can touch the wire safely without getting a shock.'"}, {"text": "Both copper and the coating are conductors, but the coating protects the copper from corrosion.", "isCorrect": false, "rationale": "The coating is an insulator, not a conductor. While it might offer some protection, its primary role mentioned in the text is safety through insulation."}], "id": "q04"}, {"question": "During the 'Build a Simple Circuit' activity, students test various objects. If a student places a wooden craft stick across a gap in a circuit and the bulb does not light up, what can they conclude about the wooden craft stick?", "options": [{"text": "It is an excellent conductor, but the circuit setup is faulty.", "isCorrect": false, "rationale": "If the bulb does not light, the object is not an excellent conductor. The activity's purpose is to test the object, assuming the circuit is otherwise functional."}, {"text": "It is an insulator, preventing the flow of electric current.", "isCorrect": true, "rationale": "The text lists 'wooden craft stick' as a 'Good Insulator' in the table and defines an insulator as a material that 'blocks the flow of electric current.' If the bulb doesn't light, it means the wood blocked the current, thus it's an insulator."}, {"text": "It is a weak conductor, allowing some current through but not enough to light the bulb.", "isCorrect": false, "rationale": "While 'weak conductor' describes graphite, wood is generally classified as an insulator, meaning it largely prevents current flow, not just diminishes it. The bulb staying dark suggests it's an insulator."}, {"text": "It is acting as a switch, keeping the circuit open.", "isCorrect": false, "rationale": "A switch actively opens or closes a circuit. The wooden stick is merely a material placed in the path; its property (insulator) dictates whether it allows current, not that it 'acts as a switch.'"}], "id": "q05"}, {"question": "Which of the following scenarios demonstrates an application of an 'open circuit' as described in the text?", "options": [{"text": "A light bulb glowing brightly when a switch is flipped to the 'on' position.", "isCorrect": false, "rationale": "When a light bulb glows, the circuit is closed, allowing electricity to flow. Flipping a switch 'on' closes the circuit."}, {"text": "A metal spoon completing a path between two wires, causing a small spark.", "isCorrect": false, "rationale": "A spark indicates current flow, implying a closed circuit (or a short circuit, which is a specific type of closed circuit)."}, {"text": "A flashlight that does not turn on because its battery has run out of charge.", "isCorrect": false, "rationale": "While the flashlight won't work, a dead battery means no *energy source*, not necessarily an *open circuit*. An open circuit implies a physical break in the path even if the battery has charge."}, {"text": "A television turning off when its power button is pressed, breaking the electrical path.", "isCorrect": true, "rationale": "The text explains, 'When you flip it off, you open the circuit — the path is broken and the light goes out.' Pressing a power button to turn off a device typically opens the circuit, breaking the path and stopping current flow."}], "id": "q06"}, {"question": "A student builds a circuit for the 'Try This' activity and includes a pencil's graphite tip as a test object. They observe the bulb glowing dimly. What does this observation suggest about graphite, based on the teacher's note?", "options": [{"text": "Graphite is a perfect insulator, and the dim glow indicates a faulty bulb.", "isCorrect": false, "rationale": "The teacher's note explicitly states graphite is 'a weak conductor,' not a perfect insulator. A dim glow is consistent with its conductive properties, not a faulty bulb in this context."}, {"text": "Graphite is a strong conductor, meaning the battery is nearly dead.", "isCorrect": false, "rationale": "If graphite were a strong conductor, the bulb would likely glow brightly (assuming a good battery). A dim glow points to less efficient conduction, not a dead battery."}, {"text": "Graphite is a weak conductor, allowing some current to pass but not as much as metal.", "isCorrect": true, "rationale": "The teacher's note states, 'Graphite is a weak conductor — it lets some current through but not as much as metal.' A dim glow directly supports this idea of partial conductivity."}, {"text": "Graphite is not meant to be used in circuits and causes resistance.", "isCorrect": false, "rationale": "Graphite is specifically mentioned as a test object. While it does cause resistance (all materials do to some extent), its specific classification as a 'weak conductor' is the key takeaway from the discussion note."}], "id": "q07"}, {"question": "According to the text, which of the following is NOT one of the three main parts of a simple circuit?", "options": [{"text": "Energy source", "isCorrect": false, "rationale": "The energy source (like a battery) is explicitly listed as one of the three main parts."}, {"text": "Load", "isCorrect": false, "rationale": "The load (like a light bulb) is explicitly listed as one of the three main parts."}, {"text": "Switch", "isCorrect": true, "rationale": "The text states, 'A simple circuit has three main parts,' listing 'Energy source,' 'Path,' and 'Load.' It then adds, 'Many circuits also have a switch' — indicating it's a common addition but not one of the *main three essential parts* defined."}, {"text": "Path", "isCorrect": false, "rationale": "The path (wires) is explicitly listed as one of the three main parts."}], "id": "q08"}, {"question": "The text compares static electricity to a 'puddle of water' and current electricity to a 'stream flowing through a pipe.' What does this analogy primarily emphasize about current electricity?", "options": [{"text": "Current electricity is always wet and conducts best in liquids.", "isCorrect": false, "rationale": "The analogy is figurative, not literal. Electricity does not literally involve water or wetness."}, {"text": "Current electricity requires a continuous, moving flow to be useful.", "isCorrect": true, "rationale": "The analogy highlights the steady, continuous movement ('stream flowing') of current electricity, contrasting it with the stationary nature of static electricity ('puddle'). This flow is what makes it useful."}, {"text": "Current electricity can only flow through enclosed spaces like pipes.", "isCorrect": false, "rationale": "While wires (paths) are typically enclosed, the analogy emphasizes the *flow* aspect, not that it must literally be in a pipe. It's a metaphor for a defined path."}, {"text": "Current electricity is less powerful than static electricity.", "isCorrect": false, "rationale": "The analogy speaks to the *nature of flow*, not power. The text explicitly states current electricity powers lights and computers, implying its utility and significance, not less power."}], "id": "q09"}, {"question": "When setting up a circuit, the safety notes advise, 'Remind students to always include the bulb in the circuit' and 'Wires may get warm if a battery is short-circuited (both wires touching without a bulb).' What is the primary safety concern addressed by always including a load like a bulb?", "options": [{"text": "To prevent the battery from losing its charge too quickly.", "isCorrect": false, "rationale": "While a short circuit drains a battery quickly, the primary concern highlighted by 'wires may get warm' is overheating and potential fire hazards due to excessive current, rather than just battery depletion."}, {"text": "To ensure the circuit remains open and safe to touch.", "isCorrect": false, "rationale": "Including a bulb *closes* the circuit, allowing current to flow. An open circuit would prevent current entirely."}, {"text": "To prevent excessive current flow which can cause wires to overheat and pose a burn or fire risk.", "isCorrect": true, "rationale": "The note explicitly states, 'Wires may get warm if a battery is short-circuited (both wires touching without a bulb),' indicating that the bulb (load) prevents a short circuit and thus controls the current, preventing overheating and safety risks."}, {"text": "To make the circuit visually appealing for observation.", "isCorrect": false, "rationale": "While observing the bulb light up is part of the activity, the safety note is concerned with hazards, not aesthetics or primary observation goals."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
