<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 24, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the fundamental cause of every sound you have ever heard?", "options": [{"text": "Changes in air pressure.", "isCorrect": false, "rationale": "While changes in air pressure are how sound waves manifest, the text specifies that the initial cause is a vibrating object, which then pushes air molecules."}, {"text": "The movement of light waves.", "isCorrect": false, "rationale": "Light waves are a different form of energy and are not the cause of sound. Radios use light waves for signals, but sound itself is not light-based."}, {"text": "Something vibrating.", "isCorrect": true, "rationale": "The text explicitly states: 'Every sound you have ever heard — music, voices, thunder, a door slamming — started with something vibrating.'"}, {"text": "The expansion of matter.", "isCorrect": false, "rationale": "The expansion of matter is not identified in the text as the cause of sound."}], "id": "q01"}, {"question": "Which statement best describes a sound wave and its travel requirements?", "options": [{"text": "A light wave that travels through empty space, carrying sound energy.", "isCorrect": false, "rationale": "Sound waves are vibrations, not light waves, and they cannot travel through empty space."}, {"text": "A vibration that carries sound energy through a material medium, such as air or water.", "isCorrect": true, "rationale": "The text defines a sound wave as 'a vibration that moves through air, water, or another material, carrying sound energy from one place to another' and states 'Sound Needs a Medium'."}, {"text": "An electrical signal that is sent directly to the brain from the vibrating object.", "isCorrect": false, "rationale": "Vibrations reach the ear, which then sends an electrical signal to the brain, but the sound wave itself is a mechanical vibration through a medium."}, {"text": "A quick back-and-forth movement that can only be heard if it occurs in a vacuum.", "isCorrect": false, "rationale": "Sound cannot travel through a vacuum; it requires a medium."}], "id": "q02"}, {"question": "Astronauts floating outside the space station cannot hear each other talk without radios. This is because:", "options": [{"text": "The sound waves are too weak to travel far in space.", "isCorrect": false, "rationale": "The issue is not the strength of the sound but the absence of a medium for the sound to travel through."}, {"text": "Sound requires a medium to travel, and outer space is a near-perfect vacuum.", "isCorrect": true, "rationale": "The text explicitly states: 'If there is no air, water, or solid material, there is nothing for the vibrations to move through. ... In outer space, there is almost no air — it is a near-perfect vacuum.'"}, {"text": "Their helmets block all sound from reaching their ears.", "isCorrect": false, "rationale": "While helmets affect sound, the primary reason given in the text is the absence of a medium in space."}, {"text": "Radios amplify sound to overcome the gravitational pull in space.", "isCorrect": false, "rationale": "Radios use light waves for signals, and gravity is not the reason sound doesn't travel in space."}], "id": "q03"}, {"question": "In scientific terms, what does 'pitch' refer to when describing a sound?", "options": [{"text": "How loud or soft a sound is.", "isCorrect": false, "rationale": "This describes volume, not pitch."}, {"text": "The speed at which sound travels through a medium.", "isCorrect": false, "rationale": "Pitch depends on the speed of the *vibration of the source*, not the speed of the sound wave's travel through the medium."}, {"text": "How high or low a sound is.", "isCorrect": true, "rationale": "The text defines pitch as 'how high or low a sound is.'"}, {"text": "The distance a sound wave can travel before fading.", "isCorrect": false, "rationale": "This describes sound propagation and intensity, not pitch."}], "id": "q04"}, {"question": "A musician plucks two guitar strings. String A vibrates 500 times per second, while String B vibrates 200 times per second. Based on the text, what can be concluded about the sounds produced?", "options": [{"text": "String A will produce a louder sound than String B.", "isCorrect": false, "rationale": "Loudness (volume) depends on the *size* of the vibration, not the speed of vibration."}, {"text": "String B will produce a higher-pitched sound than String A.", "isCorrect": false, "rationale": "Higher pitch results from faster vibrations; String B has slower vibrations (200 times/second) than String A (500 times/second)."}, {"text": "String A will produce a higher-pitched sound than String B.", "isCorrect": true, "rationale": "The text states: 'Fast vibrations = high pitch.' Since String A vibrates faster (500 times/second) than String B (200 times/second), it will produce a higher pitch."}, {"text": "Both strings will produce sounds of the same pitch if they are of similar thickness.", "isCorrect": false, "rationale": "Pitch depends on vibration speed, and these strings have different vibration speeds, regardless of thickness."}], "id": "q05"}, {"question": "Based on the 'Rubber Band Pitch' activity, what action would likely result in a higher-pitched sound?", "options": [{"text": "Using a thicker rubber band.", "isCorrect": false, "rationale": "The activity notice states 'Thicker... rubber bands vibrate more slowly and make a lower pitch.'"}, {"text": "Loosening the rubber band.", "isCorrect": false, "rationale": "The activity notice states 'Looser... rubber bands vibrate more slowly and make a lower pitch.'"}, {"text": "Making the vibrating part of the rubber band shorter.", "isCorrect": true, "rationale": "The activity notice states 'Shorter vibrating part... rubber bands vibrate faster and make a higher pitch.'"}, {"text": "Plucking the rubber band more gently.", "isCorrect": false, "rationale": "Plucking gently affects the *volume* (softness), not the pitch, according to the distinction between volume and pitch."}], "id": "q06"}, {"question": "How is 'volume' defined in the context of sound, according to the textbook?", "options": [{"text": "The intensity of a sound wave's frequency.", "isCorrect": false, "rationale": "Frequency relates to pitch, not volume."}, {"text": "The loudness or softness of a sound.", "isCorrect": true, "rationale": "The text defines volume as 'how loud or soft a sound is.'"}, {"text": "The duration for which a sound can be heard.", "isCorrect": false, "rationale": "This describes the sustain or decay of a sound, not its volume."}, {"text": "The distance a sound travels from its source.", "isCorrect": false, "rationale": "While volume affects how far a sound can travel, it is not the definition of volume itself."}], "id": "q07"}, {"question": "You gently tap a drum, and then you bang it hard. What is the primary difference in the physical vibration that accounts for the change in sound?", "options": [{"text": "The speed of the drumhead's vibration changes, altering the pitch.", "isCorrect": false, "rationale": "Tapping harder changes the *size* of the vibration, which affects volume, not the speed of vibration which affects pitch."}, {"text": "The material of the drumhead becomes more rigid, allowing for faster vibrations.", "isCorrect": false, "rationale": "The material properties of the drumhead do not change simply by tapping it harder."}, {"text": "The size of the drumhead's vibration increases, producing a louder sound.", "isCorrect": true, "rationale": "The text states: 'Volume depends on the size of the vibration: Big vibrations = loud sound. Bang a drum hard, and the drumhead moves a lot — the sound is loud.'"}, {"text": "The medium through which the sound travels becomes denser, reducing the sound's clarity.", "isCorrect": false, "rationale": "Tapping a drum does not change the density of the surrounding air (the medium)."}], "id": "q08"}, {"question": "The text states that 'Loud sounds carry more energy than soft sounds.' This can be applied to understand why:", "options": [{"text": "A whisper can be heard across a playground, but a shout cannot.", "isCorrect": false, "rationale": "This is the opposite of what the text implies; a shout carries more energy and travels further."}, {"text": "You need to use more force to create a high-pitched sound.", "isCorrect": false, "rationale": "Force relates to volume, not pitch, and this statement misapplies the concept of energy in sound."}, {"text": "A shout can be heard across a playground, but a whisper can only be heard up close.", "isCorrect": true, "rationale": "The text provides this exact example immediately after the statement: 'That is why a shout can be heard across a playground, but a whisper can only be heard up close.'"}, {"text": "Sound travels faster through solids than through air.", "isCorrect": false, "rationale": "This relates to the properties of different mediums, not directly to the energy carried by loud vs. soft sounds."}], "id": "q09"}, {"question": "A student observes a cricket chirping and a bullfrog croaking. The cricket's sound is high-pitched and soft, while the bullfrog's sound is low-pitched and loud. This scenario effectively illustrates that:", "options": [{"text": "Both pitch and volume are determined by the speed of vibrations.", "isCorrect": false, "rationale": "The 'Common Confusion' note explicitly states: 'pitch = high vs. low (depends on speed of vibration); volume = loud vs. soft (depends on size of vibration).'"}, {"text": "Pitch and volume are independent properties of sound, each depending on different characteristics of vibration.", "isCorrect": true, "rationale": "This is precisely the distinction the text and 'Common Confusion' note emphasize: pitch depends on vibration *speed*, and volume depends on vibration *size*. They can vary independently."}, {"text": "Louder sounds are always higher in pitch, and softer sounds are always lower in pitch.", "isCorrect": false, "rationale": "The example contradicts this: the loud bullfrog is low-pitched, and the soft cricket is high-pitched."}, {"text": "Animals with smaller bodies always produce higher-pitched and softer sounds.", "isCorrect": false, "rationale": "While often true, the text focuses on the *physics* of vibration (speed and size), not a biological generalization, and the relationship between body size and loudness is not explicitly stated as absolute."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
