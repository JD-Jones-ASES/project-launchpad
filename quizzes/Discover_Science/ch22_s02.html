    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 22, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What do scientists call the distinct layers found in soil?", "options": [{"text": "Soil strata", "isCorrect": false, "rationale": "While 'strata' can refer to layers, the specific term used by scientists for soil layers, as mentioned in the text, is 'soil horizons'."}, {"text": "Soil horizons", "isCorrect": true, "rationale": "The text explicitly states: 'Scientists call these layers soil horizons, but we will simply call them soil layers.'"}, {"text": "Soil profiles", "isCorrect": false, "rationale": "A soil profile refers to the vertical cross-section of the soil showing all its horizons, but 'soil profile' itself is not the name for the individual layers."}, {"text": "Soil beds", "isCorrect": false, "rationale": "'Soil beds' is not the scientific or common term used to describe the natural layers within the ground."}], "id": "q01"}, {"question": "Which of the following descriptions accurately characterizes topsoil?", "options": [{"text": "Lighter in color, with more rock fragments and less organic matter.", "isCorrect": false, "rationale": "This describes the subsoil, not the topsoil. Topsoil is rich in organic matter and typically dark."}, {"text": "Solid, unbroken rock beneath all other layers.", "isCorrect": false, "rationale": "This describes bedrock, the deepest layer, which is not soil."}, {"text": "Dark in color, rich in humus and nutrients, where most plants grow their roots.", "isCorrect": true, "rationale": "The text defines topsoil as 'dark in color and rich in humus and nutrients, where most plants grow their roots.'"}, {"text": "A collection point for water carrying dissolved minerals from above.", "isCorrect": false, "rationale": "This function is primarily attributed to the subsoil, where water filters down from the topsoil."}], "id": "q02"}, {"question": "A gardener notices that the soil directly beneath a thick, dark layer of topsoil is reddish-brown and contains many small pebbles, but fewer earthworms. Based on this observation, what soil layer has the gardener reached?", "options": [{"text": "Bedrock", "isCorrect": false, "rationale": "Bedrock is solid, unbroken rock, not a layer with small pebbles and some soil characteristics. It would be much deeper."}, {"text": "Parent material", "isCorrect": false, "rationale": "Parent material is the general term for the rock from which soil forms, but the observed layer is a distinct soil layer with specific characteristics."}, {"text": "Subsoil", "isCorrect": true, "rationale": "The text describes subsoil as being 'below the topsoil, lighter in color — often reddish, yellowish, or tan' and containing 'more bits of broken rock and fewer decomposed organisms.'"}, {"text": "Topsoil", "isCorrect": false, "rationale": "The gardener is describing the layer *beneath* the topsoil, and its characteristics (reddish, more pebbles, fewer earthworms) do not match topsoil."}], "id": "q03"}, {"question": "What is the primary role of bedrock in relation to the soil layers above it?", "options": [{"text": "It provides the dark color and rich humus to the topsoil.", "isCorrect": false, "rationale": "Humus comes from decomposed organic matter in the topsoil, not directly from bedrock."}, {"text": "It serves as the original rock material that weathers and breaks apart to form new soil particles.", "isCorrect": true, "rationale": "The text states bedrock 'is the original rock that the soil formed from' and 'slowly weathers and breaks apart, adding new rock particles to the soil above.'"}, {"text": "It is where most plant roots, including those of large trees, grow.", "isCorrect": false, "rationale": "Most plant roots are in the topsoil, with some deeper tree roots reaching the subsoil, but not typically the solid bedrock."}, {"text": "It is the main layer where water and dissolved minerals collect and are stored.", "isCorrect": false, "rationale": "Water collects in the subsoil, not the solid, unbroken bedrock."}], "id": "q04"}, {"question": "Why is topsoil considered the 'most important layer for life' despite its relatively thin thickness?", "options": [{"text": "It is the only layer where water can filter down to the deeper layers.", "isCorrect": false, "rationale": "While water filters through topsoil, its importance for life is not solely based on this function, and water continues to filter into the subsoil."}, {"text": "It is composed entirely of unbroken rock, providing a stable foundation.", "isCorrect": false, "rationale": "This describes bedrock, not topsoil. Topsoil is a loose, rich layer."}, {"text": "It contains the highest concentration of humus and nutrients vital for plant growth and decomposer activity.", "isCorrect": true, "rationale": "The text highlights topsoil's importance because 'Most of the nutrients that plants need are found here' and it is 'rich in humus'."}, {"text": "It prevents the subsoil from eroding away due to wind and rain.", "isCorrect": false, "rationale": "While topsoil does offer some protection, its primary importance for life is due to its nutrient content, not primarily as an erosion barrier."}], "id": "q05"}, {"question": "A pedologist examines a soil profile in a region known for heavy rainfall. What might they expect to observe about the soil in this area, based on the information provided?", "options": [{"text": "The soil layers would likely be very thin due to rapid erosion.", "isCorrect": false, "rationale": "The text states that 'rainy places often have deeper soil because water speeds up weathering,' which would lead to thicker soil, not thinner."}, {"text": "The bedrock would be primarily igneous rock, as water accelerates its formation.", "isCorrect": false, "rationale": "The type of bedrock is determined by geological processes, not directly by current rainfall, and water does not accelerate bedrock formation."}, {"text": "The soil layers would likely be deeper due to increased weathering activity.", "isCorrect": true, "rationale": "The text states that 'rainy places often have deeper soil because water speeds up weathering,' which creates more soil particles."}, {"text": "The topsoil would be lighter in color due to the leaching of organic matter.", "isCorrect": false, "rationale": "While heavy rain can cause leaching, the text emphasizes that rich, dark topsoil indicates abundant life, and doesn't suggest lighter color in rainy places as a rule."}], "id": "q06"}, {"question": "You are studying two areas, Area A and Area B. Area A has bedrock composed of limestone, while Area B has bedrock composed of sandstone. According to the cross-connection note, how might the soil in these two areas differ?", "options": [{"text": "The soils in both areas would look and feel identical, as bedrock type has minimal impact on soil characteristics.", "isCorrect": false, "rationale": "The text explicitly states that 'different parent rocks produce soil with different mineral content, color, and texture.'"}, {"text": "Area A's soil would be entirely composed of organic matter, while Area B's would be purely sand.", "isCorrect": false, "rationale": "Soil is a mix of weathered rock and organic matter. Neither would be purely one component, and organic matter comes from life, not directly from bedrock."}, {"text": "The soil in Area A and Area B would likely have different mineral content, color, and texture.", "isCorrect": true, "rationale": "The 'teachernote' section explains that 'different parent rocks produce soil with different mineral content, color, and texture.'"}, {"text": "The only difference would be the depth of the bedrock, not the soil above it.", "isCorrect": false, "rationale": "The type of bedrock directly influences the characteristics of the soil formed from its weathering, not just its depth."}], "id": "q07"}, {"question": "Which statement best explains why dark topsoil generally indicates 'lots of plants and decomposers' in an area?", "options": [{"text": "Dark topsoil reflects more sunlight, promoting plant growth.", "isCorrect": false, "rationale": "Dark colors absorb more sunlight, and the darkness of topsoil is due to organic matter, not sunlight reflection."}, {"text": "The darkness comes from the minerals found exclusively in bedrock.", "isCorrect": false, "rationale": "The dark color of topsoil comes from humus, which is decomposed organic matter, not solely minerals from bedrock."}, {"text": "Rich, dark topsoil is a result of abundant humus, which is added by plants and decomposers.", "isCorrect": true, "rationale": "The text explicitly links 'rich, dark topsoil' to 'lots of plants and decomposers have been adding humus'."}, {"text": "It means the soil is primarily composed of broken rock fragments from the subsoil.", "isCorrect": false, "rationale": "Rock fragments are more characteristic of subsoil and do not primarily contribute to the dark color associated with rich topsoil."}], "id": "q08"}, {"question": "When observing soil layers exposed on a cliff, a darker band near the top indicates which of the following?", "options": [{"text": "A high concentration of solid bedrock.", "isCorrect": false, "rationale": "Solid bedrock is at the very bottom, and is not dark due to humus."}, {"text": "A layer rich in water-dissolved minerals.", "isCorrect": false, "rationale": "While water carries dissolved minerals, the primary indicator of a dark layer is humus, not just dissolved minerals."}, {"text": "A greater amount of humus and organic matter.", "isCorrect": true, "rationale": "The text states: 'Darker layers near the top contain more humus.'"}, {"text": "A section of soil where weathering is occurring at its slowest rate.", "isCorrect": false, "rationale": "The color indicates composition, not directly the rate of weathering, though topsoil is a zone of active biological and chemical processes."}], "id": "q09"}, {"question": "Which of these is NOT something soil scientists (pedologists) can typically learn by looking at soil layers, according to the text?", "options": [{"text": "The approximate age of the soil.", "isCorrect": false, "rationale": "The text states 'thicker topsoil usually means the soil has been forming for a longer time', indicating age can be learned."}, {"text": "The specific species of every microorganism living in the soil.", "isCorrect": true, "rationale": "While they can infer 'what lives there' based on humus, the text does not suggest they can learn 'the specific species of every microorganism' just by looking at layers."}, {"text": "The type of rock that lies beneath the soil.", "isCorrect": false, "rationale": "The text explicitly mentions learning 'What kind of rock is underneath (the parent material)'."}, {"text": "Information about the local climate.", "isCorrect": false, "rationale": "The text indicates they can learn 'What the climate is like — rainy places often have deeper soil'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
