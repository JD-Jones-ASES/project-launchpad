<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 29, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes static electricity?", "options": [{"text": "The continuous flow of electrons through a conductor.", "isCorrect": false, "rationale": "This describes electric current, not static electricity, where charges remain in one place."}, {"text": "A buildup of electric charge that remains on the surface of an object.", "isCorrect": true, "rationale": "The text defines static electricity as 'a buildup of electric charge on the surface of an object' and emphasizes that 'the word “static” means staying in one place — the charges sit on the object instead of flowing.'"}, {"text": "The sudden release of energy from a power source.", "isCorrect": false, "rationale": "While static electricity can result in a sudden discharge (like a spark), this option is too general and doesn't capture the 'buildup' aspect specific to static electricity."}, {"text": "Magnetic forces acting between two charged objects.", "isCorrect": false, "rationale": "Static electricity involves electric forces (attraction or repulsion) between charges, not magnetic forces."}]}, {"question": "In a neutral atom, which subatomic particles are equal in number to balance the overall electric charge?", "options": [{"text": "Neutrons and protons.", "isCorrect": false, "rationale": "Neutrons have no charge, so their number does not directly balance the electric charge. Protons are positive."}, {"text": "Protons and electrons.", "isCorrect": true, "rationale": "The text states, 'Most of the time, an atom has the same number of protons and electrons. The positive and negative charges balance out, so the atom has no overall charge. It is neutral.'"}, {"text": "Electrons and neutrons.", "isCorrect": false, "rationale": "Neutrons have no charge, so their number does not balance the electric charge of electrons."}, {"text": "Only protons, as they carry all the charge.", "isCorrect": false, "rationale": "Electrons also carry charge (negative), and their number must balance the protons for a neutral atom."}]}, {"question": "When you rub a balloon on your hair, electrons move from your hair to the balloon. What happens to the electric charge of your hair as a result?", "options": [{"text": "It becomes negatively charged because it gained electrons.", "isCorrect": false, "rationale": "Your hair loses electrons, it does not gain them. Gaining electrons would make it negatively charged."}, {"text": "It remains neutral because only electrons moved, not protons.", "isCorrect": false, "rationale": "While protons don't move, the loss of electrons creates an imbalance, making the hair no longer neutral."}, {"text": "It becomes positively charged because it lost electrons.", "isCorrect": true, "rationale": "The text explains, 'The object that loses electrons becomes positively charged.' In the example, 'Your hair has lost electrons, so it is positively charged.'"}, {"text": "It becomes positively charged because it gained protons.", "isCorrect": false, "rationale": "Protons are found in the center of the atom and do not typically move between objects during rubbing."}]}, {"question": "A positively charged glass rod is brought near an unknown object. If the unknown object is repelled by the glass rod, what can be concluded about the unknown object's charge?", "options": [{"text": "It must be negatively charged.", "isCorrect": false, "rationale": "Opposite charges attract, so a negatively charged object would be attracted to a positively charged rod, not repelled."}, {"text": "It must be positively charged.", "isCorrect": true, "rationale": "The rule of charges states, 'Like charges repel.' If a positively charged rod repels the unknown object, the object must also be positively charged."}, {"text": "It must be neutral.", "isCorrect": false, "rationale": "A neutral object would be attracted to a charged object due to induction, but it would not be repelled."}, {"text": "Its charge cannot be determined from this interaction.", "isCorrect": false, "rationale": "Repulsion is a definitive indicator of like charges, allowing the unknown object's charge to be determined."}]}, {"question": "Why do clothes fresh from the dryer often stick together, a phenomenon known as 'laundry cling'?", "options": [{"text": "Heat from the dryer melts the fabric slightly, causing them to fuse.", "isCorrect": false, "rationale": "The heat in a dryer is not typically hot enough to melt clothes to this extent, and this is not the cause of 'cling'."}, {"text": "The clothes become magnetized by the tumbling action.", "isCorrect": false, "rationale": "Magnetism is a separate phenomenon from the electric charge buildup that causes laundry cling."}, {"text": "Clothes rub together, transferring electrons and creating opposite static charges that attract.", "isCorrect": true, "rationale": "The text explains, 'Clothes tumbling in a dryer rub together, trading electrons. That is why socks stick to shirts when you pull them out.' This is a direct description of static electricity at work."}, {"text": "Detergent residue creates a sticky film on the clothes.", "isCorrect": false, "rationale": "While detergent residue can occur, it's not the primary reason for the widespread clinging due to static electricity described in the text."}]}, {"question": "Lightning is described as 'Nature's Giant Spark.' What is the fundamental process that leads to a lightning strike?", "options": [{"text": "Nuclear reactions within the cloud release immense energy.", "isCorrect": false, "rationale": "Lightning is a phenomenon of electric charge, not nuclear reactions."}, {"text": "Friction between ice and water particles in a storm cloud causes a massive buildup and discharge of static electricity.", "isCorrect": true, "rationale": "The text states, 'Inside a storm cloud, tiny bits of ice and water droplets swirl around and rub against each other... Charges build up inside the cloud... When the difference in charge gets big enough, electrons leap from the cloud to the ground... That flash is lightning — a giant spark of static electricity.'"}, {"text": "Powerful magnetic fields generated by the Earth's core interact with the atmosphere.", "isCorrect": false, "rationale": "While Earth has a magnetic field, it is not the cause of lightning. Lightning is an electrical discharge."}, {"text": "Chemical reactions between atmospheric gases produce a luminous discharge.", "isCorrect": false, "rationale": "Lightning is an electrical phenomenon, not primarily a chemical reaction between gases."}]}, {"question": "Which of the following technologies explicitly utilizes static electricity to achieve its function?", "options": [{"text": "An electric stove using resistance heating.", "isCorrect": false, "rationale": "Electric stoves use the continuous flow of electric current to generate heat through resistance, not static charge."}, {"text": "A photocopier using charged particles to place ink on paper.", "isCorrect": true, "rationale": "The 'Static Electricity in Action' box states, 'Photocopiers and laser printers use static charge to place ink in exactly the right spots on paper.'"}, {"text": "A motor converting electrical energy into mechanical energy.", "isCorrect": false, "rationale": "Electric motors typically use electromagnetism and continuous current to create motion, not static charges."}, {"text": "A light bulb generating light from a heated filament.", "isCorrect": false, "rationale": "Light bulbs use continuous electric current to heat a filament until it glows, not static electricity."}]}, {"question": "The term 'static' in static electricity specifically refers to the fact that the electric charges:", "options": [{"text": "Are always positive.", "isCorrect": false, "rationale": "Static charges can be either positive or negative, depending on the transfer of electrons."}, {"text": "Remain in one place on the object instead of flowing continuously.", "isCorrect": true, "rationale": "The text's definition explicitly states, 'The word “static” means staying in one place — the charges sit on the object instead of flowing.'"}, {"text": "Are generated only by stationary objects.", "isCorrect": false, "rationale": "Static electricity is often generated by rubbing (movement) between objects, which causes charge transfer."}, {"text": "Have no actual effect or force.", "isCorrect": false, "rationale": "Static charges create forces of attraction and repulsion, causing observable effects like hair standing up or clinging."}]}, {"question": "When you pull plastic wrap off its roll, it often clings to itself or to bowls. This is an example of static electricity. Why does this clinging occur?", "options": [{"text": "The plastic becomes slightly sticky due to the release of a natural adhesive from the roll.", "isCorrect": false, "rationale": "The clinging is not due to an adhesive but to electrostatic forces."}, {"text": "The plastic acquires a net electric charge, which then creates attractive forces with neutral or oppositely charged surfaces.", "isCorrect": true, "rationale": "The text mentions, 'Pulling plastic wrap off the roll creates static charge, making it cling to bowls and to itself.' This charge then causes attraction based on the rule of charges or by inducing charge in neutral objects."}, {"text": "The plastic undergoes a temporary chemical reaction with the air, causing it to become adhesive.", "isCorrect": false, "rationale": "The clinging is an electrical phenomenon, not a chemical reaction."}, {"text": "The surface tension of the plastic increases dramatically, allowing it to adhere to other surfaces.", "isCorrect": false, "rationale": "Surface tension relates to liquid properties and is not the cause of plastic wrap clinging due to static electricity."}]}, {"question": "Imagine you rub two identical balloons with a wool cloth. If you then bring these two balloons close to each other, what would you expect to happen, and why?", "options": [{"text": "They would attract because one balloon gains positive charge and the other gains negative charge.", "isCorrect": false, "rationale": "Rubbing two identical balloons with the same material (wool) would give them both the same type of charge, not opposite charges."}, {"text": "They would repel because both balloons gained electrons from the wool, giving them like (negative) charges.", "isCorrect": true, "rationale": "When rubbed with wool, balloons typically gain electrons from the wool, becoming negatively charged. Since both balloons would acquire the same type of charge, 'Like charges repel,' causing them to push apart. This is also demonstrated in the 'teachernote'."}, {"text": "They would attract because the wool makes them magnetic.", "isCorrect": false, "rationale": "The interaction is due to electric charges, not magnetism."}, {"text": "Nothing would happen because wool is a neutral material and cannot transfer charge.", "isCorrect": false, "rationale": "Wool is effective at transferring electrons when rubbed against certain materials, leading to charge separation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
