<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is NOT one of the five characteristics that scientists use to determine if something is alive?", "options": [{"text": "Needs energy.", "isCorrect": false, "rationale": "Living things need energy to stay alive and do what they do, making this a characteristic of life."}, {"text": "Responds to its environment.", "isCorrect": false, "rationale": "Living things react to changes around them, which is a characteristic of life."}, {"text": "Grows and develops.", "isCorrect": false, "rationale": "All living things start small and get bigger or change as they get older, making this a characteristic of life."}, {"text": "Can move independently.", "isCorrect": true, "rationale": "While many living things move independently, this is not listed as one of the universal five characteristics. The five are: grows/develops, reproduces, needs energy, responds to environment, and made of cells."}], "id": "q01"}, {"question": "The section asks, 'Is fire alive?' Based on the five characteristics of living things, why do scientists classify fire as nonliving?", "options": [{"text": "Fire does not consume food for energy.", "isCorrect": false, "rationale": "The text states fire 'seems to 'eat' wood,' implying it does take in something for energy. This is not the primary reason it's considered nonliving."}, {"text": "Fire lacks the ability to respond to its environment.", "isCorrect": false, "rationale": "The text explicitly states fire 'responds to wind,' indicating it does react to changes around it."}, {"text": "Fire cannot reproduce through biological processes or be made of cells.", "isCorrect": true, "rationale": "The 'thinkaboutit' section directly prompts the reader to consider if fire reproduces and is made of cells, highlighting these as the key missing characteristics that prevent it from being classified as living."}, {"text": "Fire does not grow and develop in a structured way.", "isCorrect": false, "rationale": "The text states fire 'grows,' which is one characteristic it superficially exhibits, so this is not the reason it is nonliving."}], "id": "q02"}, {"question": "A piece of coal is found deep underground. According to the text, how would it be classified, and why?", "options": [{"text": "Living, because it contains energy and can fuel a fire.", "isCorrect": false, "rationale": "While coal contains energy, it does not currently exhibit all five characteristics of life (e.g., reproduction, response, cells), so it is not currently living."}, {"text": "Nonliving, because it is a rock-like substance and cannot grow.", "isCorrect": false, "rationale": "Nonliving things are something that was *never* alive. Coal was formed from once-living organisms, so it doesn't fit this definition."}, {"text": "Once-living, because it formed from organisms that lived millions of years ago.", "isCorrect": true, "rationale": "The text specifically lists 'Fossil fuels (coal, oil, natural gas) formed from organisms that lived millions of years ago' as examples of once-living things, meaning they were alive in the past but are not now."}, {"text": "Nonliving, because it doesn't need water or respond to its surroundings now.", "isCorrect": false, "rationale": "This describes why it's not *currently* living, but it fails to acknowledge that it *was* alive, which is the key distinction for 'once-living' versus 'nonliving'."}], "id": "q03"}, {"question": "A scientist discovers a new species of insect. To determine its ideal habitat, which of the following is the LEAST important factor to consider *among the core needs of a habitat* as listed in the text?", "options": [{"text": "The availability of suitable food sources.", "isCorrect": false, "rationale": "Food is one of the four essential needs a habitat provides for living things, making it a highly important factor."}, {"text": "Protection from predators and harsh weather.", "isCorrect": false, "rationale": "Shelter is one of the four essential needs a habitat provides, offering protection and making it a highly important factor."}, {"text": "Sufficient space for growth and reproduction.", "isCorrect": false, "rationale": "Space is one of the four essential needs a habitat provides, necessary for living things to grow and thrive, making it a highly important factor."}, {"text": "The average daily temperature throughout the year.", "isCorrect": true, "rationale": "While temperature is a crucial environmental condition that influences a habitat's suitability, it is not one of the four *direct needs* (Food, Water, Shelter, Space) that a habitat explicitly provides, making it the least direct 'core need' among the options given."}], "id": "q04"}, {"question": "A particular type of plant is observed to have very long roots, small, waxy leaves, and can store water in its stem. In which habitat would this plant most likely thrive?", "options": [{"text": "Forest", "isCorrect": false, "rationale": "Forests typically have ample water, making these extreme water conservation adaptations unnecessary for survival in such an environment."}, {"text": "Ocean", "isCorrect": false, "rationale": "Ocean plants have adaptations for living in salty water; this plant's characteristics are clearly suited for a dry, terrestrial environment."}, {"text": "Desert", "isCorrect": true, "rationale": "Long roots to reach deep water, small/waxy leaves to reduce water loss, and water storage in stems are all classic adaptations that enable plants to survive and thrive in the very dry conditions of a desert habitat."}, {"text": "Grassland", "isCorrect": false, "rationale": "While drier than forests, grasslands receive more rain than deserts. These specific, extreme water-saving adaptations are most characteristic of a desert, not typically a grassland."}], "id": "q05"}, {"question": "A student is on a nature walk and wants to observe a shy squirrel. Which of the following strategies is most consistent with being a 'good observer' according to the text?", "options": [{"text": "Making loud noises to attract the squirrel's attention.", "isCorrect": false, "rationale": "The text advises observers to 'Be quiet and patient' because 'Animals are shy,' so making loud noises would be counterproductive."}, {"text": "Bringing nuts to feed the squirrel to get it to come closer.", "isCorrect": false, "rationale": "The text does not mention feeding animals; it emphasizes passive observation without interference. Feeding wildlife can also alter their natural behavior or diet."}, {"text": "Sitting quietly and still, then writing down what they see in a notebook.", "isCorrect": true, "rationale": "The text explicitly instructs observers to 'Be quiet and patient. If you are still and quiet, you will see more,' and to 'Write it down. Carry a notebook and pencil,' which aligns perfectly with this strategy."}, {"text": "Trying to capture the squirrel for a closer look with a magnifying glass.", "isCorrect": false, "rationale": "While the text suggests using a magnifying glass, it's for observing 'tiny details on leaves, bark, or insects,' not for capturing live, shy animals, which would disturb them and go against being quiet and patient."}], "id": "q06"}, {"question": "What was the most significant contribution Jane Goodall made to scientific understanding, as described in the text?", "options": [{"text": "She discovered new species of chimpanzees in Africa.", "isCorrect": false, "rationale": "The text focuses on her observations of known chimpanzee species, not the discovery of new ones."}, {"text": "She proved that chimpanzees are capable of understanding human language.", "isCorrect": false, "rationale": "The text does not discuss chimpanzee language comprehension, but rather their natural behaviors and intelligence through observation."}, {"text": "She demonstrated that careful, patient observation can reveal complex behaviors and abilities in animals, like tool use.", "isCorrect": true, "rationale": "The text highlights her 'careful, patient observation' as a powerful scientific tool, leading to the discovery that chimps use tools and possess complex social lives, challenging previous beliefs."}, {"text": "She established the first chimpanzee conservation park in Tanzania.", "isCorrect": false, "rationale": "While her work likely contributed to conservation, the text emphasizes her scientific observations and discoveries as her primary contribution, not the establishment of parks."}], "id": "q07"}, {"question": "You find a dried, crunchy leaf on the ground. How would you classify it, and what is the primary reason for this classification?", "options": [{"text": "Living, because it was once part of a tree that is still alive.", "isCorrect": false, "rationale": "Once a leaf falls and dries up, it no longer performs the functions of a living organism, even if the tree it came from is still alive."}, {"text": "Nonliving, because it no longer grows or responds to its environment.", "isCorrect": false, "rationale": "This explains why it's not *currently* living, but 'nonliving' specifically means something 'was never alive.' The leaf was part of a living tree."}, {"text": "Once-living, because it was part of a living tree but is no longer alive now.", "isCorrect": true, "rationale": "The text explicitly uses 'A fallen leaf was part of a living tree, but once it falls and dries up, it is no longer alive' as a prime example of an once-living thing, fitting this description perfectly."}, {"text": "Nonliving, because it is made of plant material which is not considered living.", "isCorrect": false, "rationale": "Plant material comes from living things. The classification depends on its current state and past history, not just its composition in isolation."}], "id": "q08"}, {"question": "According to the definition provided, a 'living thing' must possess which of the following characteristics?", "options": [{"text": "The ability to move from one place to another.", "isCorrect": false, "rationale": "Many living things, such as most plants, do not move from place to place, yet they are still considered alive. This is not one of the five universal characteristics."}, {"text": "The capacity to produce its own food using sunlight.", "isCorrect": false, "rationale": "While plants do this, animals and fungi are also living things that do not produce their own food using sunlight. This is not a universal characteristic."}, {"text": "To be composed of tiny structures called cells.", "isCorrect": true, "rationale": "The text clearly states, 'Living things are made of cells,' and lists this as one of the five essential characteristics shared by all living things."}, {"text": "A complex brain and nervous system for thinking.", "isCorrect": false, "rationale": "Many living things, including bacteria, plants, and simpler animals, do not possess a complex brain or nervous system, but are still alive."}], "id": "q09"}, {"question": "If a large forest is cut down, what is the most likely consequence for the living things that depended on that forest?", "options": [{"text": "They will quickly adapt to living in a desert environment.", "isCorrect": false, "rationale": "The text emphasizes that 'Each living thing is suited to its own habitat.' Rapid adaptation to a vastly different habitat like a desert is highly unlikely for most species."}, {"text": "They may struggle to find food, water, and shelter, potentially endangering their survival.", "isCorrect": true, "rationale": "The text explicitly states, 'When a habitat changes — for example, if a forest is cut down — the living things that depend on it may be in trouble,' directly linking habitat loss to threats to survival due to lack of essential resources."}, {"text": "They will simply move to the nearest grassland habitat without issue.", "isCorrect": false, "rationale": "While some might attempt to move, different habitats offer different resources and challenges, meaning relocation is often not 'without issue' and many species cannot thrive elsewhere."}, {"text": "The change will have no significant impact since all living things can find a new home.", "isCorrect": false, "rationale": "This contradicts the entire section on the critical importance of habitats for survival and the explicit warning that living things 'may be in trouble' when habitats change."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
