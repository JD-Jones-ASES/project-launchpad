        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary educational purpose of the \"Making Connections: A Day in the Life of a Robin\" narrative?", "options": [{"text": "To teach students how to identify different bird species.", "isCorrect": false, "rationale": "While the text mentions an American robin, teaching bird identification is not its primary educational goal. The narrative focuses on broader scientific connections."}, {"text": "To demonstrate how the four main branches of science are interconnected through a single, real-world example.", "isCorrect": true, "rationale": "The 'teachernote' explicitly states the purpose is to tie all four branches of science to a single real-world example, and the conclusion reinforces this idea."}, {"text": "To provide a detailed biological study of the American robin's anatomy and behavior.", "isCorrect": false, "rationale": "The text touches on biology (Life Science), but it doesn't offer a detailed study of anatomy or behavior. Its scope is much broader, linking multiple scientific disciplines."}, {"text": "To introduce advanced concepts in environmental conservation and ecology.", "isCorrect": false, "rationale": "While the robin's habitat is mentioned, the text does not focus on environmental conservation or advanced ecological concepts. Its main goal is interdisciplinary science connection."}]}, {"question": "A robin is observed meticulously selecting a specific type of insect from a leaf. Which characteristic of life, as described in the Life Science section, is this action primarily demonstrating?", "options": [{"text": "It reproduces.", "isCorrect": false, "rationale": "Reproduction refers to creating offspring, which is not directly demonstrated by selecting food."}, {"text": "It grows.", "isCorrect": false, "rationale": "Growth is an increase in size or development over time. While food contributes to growth, the act of selecting food specifically demonstrates the need for energy."}, {"text": "It needs energy.", "isCorrect": true, "rationale": "Selecting and consuming food is a direct action taken to obtain energy, which is one of the fundamental characteristics of life described in the text."}, {"text": "It is made of cells.", "isCorrect": false, "rationale": "While all living things are made of cells, the action of actively choosing food does not specifically illustrate cellular composition."}]}, {"question": "The text describes dew as \"water that evaporated yesterday, rose into the air, and condensed overnight on the cool grass blades.\" This process is most directly illustrating a connection between which two components of Earth Science?", "options": [{"text": "Lithosphere and atmosphere.", "isCorrect": false, "rationale": "The lithosphere is the solid ground. While dew is on grass, its formation process primarily involves water and air, not the solid earth itself in terms of interaction."}, {"text": "Hydrosphere and atmosphere.", "isCorrect": true, "rationale": "Dew is a form of water (hydrosphere), and its formation involves processes like evaporation and condensation that occur within the air (atmosphere)."}, {"text": "Lithosphere and hydrosphere.", "isCorrect": false, "rationale": "This option describes water on the ground, but it doesn't capture the full dynamic process of evaporation and condensation, which critically involves the air."}, {"text": "Atmosphere and outer space.", "isCorrect": false, "rationale": "Outer space is not mentioned in relation to dew formation, and the process described is entirely within Earth's systems."}]}, {"question": "When the text explains that the robin's body breaks down a worm into nutrients that \"become part of the robin's body,\" this is presented as a prime example of chemistry because it involves:", "options": [{"text": "The physical act of digestion and chewing.", "isCorrect": false, "rationale": "While digestion involves physical processes, the core chemical aspect is the transformation of matter, not just its physical manipulation."}, {"text": "Matter changing from one form to another.", "isCorrect": true, "rationale": "Chemistry is fundamentally about the composition, properties, and reactions of matter, including how substances transform into new ones (e.g., worm tissue into robin tissue/energy)."}, {"text": "The measurement of the worm's mass and volume.", "isCorrect": false, "rationale": "Measuring physical properties like mass and volume are part of scientific observation, but they do not describe the chemical reaction or transformation itself."}, {"text": "The robin using its muscles to eat and move.", "isCorrect": false, "rationale": "Muscle use and movement are primarily concepts related to physics, describing forces and motion, not the chemical breakdown of food."}]}, {"question": "Imagine a robin attempting to fly against a strong headwind. To maintain altitude and forward motion, the robin must exert more force. Which principle from the Physics section best explains why this increased effort is necessary?", "options": [{"text": "The concept of friction between its feet and the air.", "isCorrect": false, "rationale": "Friction is discussed for the robin's feet gripping grass, not as a primary force in flight dynamics against wind, which is related to air resistance and lift."}, {"text": "The robin's mass increasing due to the wind.", "isCorrect": false, "rationale": "Wind does not increase the robin's mass; it applies an opposing force that must be overcome."}, {"text": "Newton's laws, requiring greater downward push of wings to generate sufficient upward and forward thrust against opposing forces.", "isCorrect": true, "rationale": "Newton's Third Law (action-reaction) explains how pushing air down creates lift. Against a headwind, the robin needs to generate greater forward and upward forces (thrust and lift) to counteract the opposing wind resistance and gravity."}, {"text": "Gravity pulling the robin upwards more strongly in wind.", "isCorrect": false, "rationale": "Gravity always pulls downwards. Wind does not alter the direction or strength of gravity's pull on the robin."}]}, {"question": "The text states that a robin's eggshell is \"made mostly of a substance called calcium carbonate.\" This information is used to exemplify which branch of science and why?", "options": [{"text": "Life Science, because eggshells are part of reproduction.", "isCorrect": false, "rationale": "While eggshells are crucial for reproduction (Life Science), the specific emphasis on 'made mostly of a substance called calcium carbonate' highlights the material's composition, which is the domain of chemistry."}, {"text": "Physics, because the shell protects the egg from forces.", "isCorrect": false, "rationale": "Protection from forces is a functional aspect, but the discussion specifically points to the *material* it is made of, not the forces acting upon it."}, {"text": "Chemistry, because it describes the specific material composition of an object.", "isCorrect": true, "rationale": "Chemistry is the branch of science that studies the composition, structure, properties, and reactions of matter, making the material makeup of the eggshell a clear example."}, {"text": "Earth Science, because calcium carbonate is found in rocks.", "isCorrect": false, "rationale": "Although calcium carbonate is a geological material, the example in the text specifically applies to the robin's eggshell, illustrating the composition of living things (via chemistry), not geological processes directly."}]}, {"question": "When a robin listens for a worm moving underground, tilting its head to pinpoint the sound, this action primarily demonstrates a connection between which two concepts discussed in the text?", "options": [{"text": "Earth Science (lithosphere) and Life Science (responds to environment).", "isCorrect": true, "rationale": "The worm is moving in the soil (lithosphere, Earth Science), and the robin's act of listening and reacting is a response to its environment (Life Science characteristic)."}, {"text": "Chemistry (matter) and Physics (forces).", "isCorrect": false, "rationale": "While matter and sound (which involves forces) are present, this option doesn't capture the specific interaction of a living organism responding to a component of its physical world."}, {"text": "Life Science (reproduction) and Earth Science (hydrosphere).", "isCorrect": false, "rationale": "Neither reproduction nor the hydrosphere (water) is directly related to a robin listening for a worm underground."}, {"text": "Physics (gravity) and Chemistry (nutrients).", "isCorrect": false, "rationale": "Gravity and nutrients are not the central concepts illustrated by the robin's act of listening for a worm."}]}, {"question": "A local park authority decides to pave over much of the grassy areas to create more walking paths. Based on the text's description of the robin's habitat, what is the most significant negative impact this would have on the robin population?", "options": [{"text": "It would reduce the amount of air the robins can breathe.", "isCorrect": false, "rationale": "Paving grass would not significantly reduce the overall air supply for robins."}, {"text": "It would increase friction for the robins' feet.", "isCorrect": false, "rationale": "While the surface changes, the primary habitat impact is not about friction for their feet, but about essential resources."}, {"text": "It would significantly decrease the available food sources like worms and insects.", "isCorrect": true, "rationale": "The text states that the park provides food (worms, insects) and the robin hops 'across the lawn' looking for breakfast. Paving grassy areas directly removes this primary foraging habitat and food source."}, {"text": "It would make it harder for the robin to reproduce without grass.", "isCorrect": false, "rationale": "While habitat loss can impact reproduction, the text specifies 'trees for nesting' as shelter. The primary function of grass mentioned is for food acquisition."}]}, {"question": "The text describes the robin's ability to fly using forces, and its body being made of matter. Which of the following statements best illustrates the distinction between how Physics and Chemistry explain the robin's flight?", "options": [{"text": "Physics explains the robin's speed, while Chemistry explains its altitude.", "isCorrect": false, "rationale": "Both speed and altitude are physical concepts explained by forces and motion, not by chemical composition or reactions."}, {"text": "Physics explains the forces that enable movement and flight dynamics, while Chemistry explains the metabolic processes within muscles that provide the energy for those forces.", "isCorrect": true, "rationale": "Physics deals with the external forces (lift, drag, gravity) and motion of flight. Chemistry (biochemistry) deals with the internal molecular transformations (metabolism) that convert nutrients into the energy required for muscle contraction and thus, flight."}, {"text": "Physics explains how the robin finds a mate, while Chemistry explains its feather color.", "isCorrect": false, "rationale": "Finding a mate is a biological (Life Science) behavior. Feather color involves biochemistry (Chemistry) but is not directly related to the *mechanics* of flight."}, {"text": "Physics explains why the robin lands, while Chemistry explains why it takes off.", "isCorrect": false, "rationale": "Both taking off and landing are governed by physical forces and principles of motion. Chemistry is not the primary explanation for either."}]}, {"question": "The \"Putting It All Together\" section concludes that \"Science is not four separate subjects — it is one big, connected way of understanding the world.\" Which specific interaction described in the text best exemplifies this statement by clearly integrating at least three branches of science?", "options": [{"text": "The robin's eggshell being made of calcium carbonate.", "isCorrect": false, "rationale": "This primarily highlights Chemistry (composition) and has a loose tie to Life Science (reproduction), but doesn't strongly integrate three or more branches as clearly as other options."}, {"text": "The robin using friction to grip the grass while walking.", "isCorrect": false, "rationale": "This primarily demonstrates Physics (friction) with a connection to Earth Science (grass/lithosphere), but doesn't integrate three or more branches significantly."}, {"text": "The robin hunting for worms underground, using sound to detect them and then consuming them for energy.", "isCorrect": true, "rationale": "This integrates: Life Science (needs energy, responds to environment), Earth Science (worms living in soil/lithosphere), Physics (sound waves for detection), and Chemistry (breaking down the worm for nutrients). This comprehensively links multiple branches."}, {"text": "The dew forming on the grass overnight from evaporated water.", "isCorrect": false, "rationale": "This is a strong example of Earth Science (hydrosphere and atmosphere interaction), but it does not clearly integrate three or more distinct branches as requested."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
