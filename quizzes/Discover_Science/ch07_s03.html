    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the most accurate definition of the rock cycle according to the provided text?", "options": [{"text": "The process by which rocks remain unchanged indefinitely over geological time.", "isCorrect": false, "rationale": "The text states 'rocks do not stay the same forever' and undergo continuous change, making this option incorrect."}, {"text": "A rapid transformation of rocks from one type to another, observable within a human lifetime.", "isCorrect": false, "rationale": "The text specifies 'very long periods of time — thousands, millions, even billions of years' and implies it's not observable within a lifetime, making this option incorrect."}, {"text": "The continuous process where rocks change from one type to another over extremely long geological periods.", "isCorrect": true, "rationale": "This definition directly matches the one provided in the text: 'the continuous process in which rocks change from one type to another over very long periods of time.'"}, {"text": "A linear sequence of changes where rocks always start as igneous and end as metamorphic.", "isCorrect": false, "rationale": "The text emphasizes 'no single starting point and no end' and that 'any type of rock can become any other type,' refuting a linear, fixed sequence."}], "id": "q01"}, {"question": "A mountain made of granite (igneous rock) is slowly broken down by wind and rain. The resulting small pieces are transported by a river and settle at the bottom of a lake. Over time, these pieces are pressed together. What type of rock is most likely formed from these processes?", "options": [{"text": "Metamorphic rock, due to intense heat and pressure from burial.", "isCorrect": false, "rationale": "While burial can lead to metamorphic rock, the scenario described (weathering, transport, deposition, pressing) directly forms sedimentary rock, not metamorphic at this stage."}, {"text": "Igneous rock, as the original granite was igneous and simply reformed.", "isCorrect": false, "rationale": "Igneous rock forms from the cooling of magma. The described process involves the breakdown and compaction of existing rock, not cooling magma."}, {"text": "Sedimentary rock, formed by the processes of weathering, erosion, deposition, and compaction.", "isCorrect": true, "rationale": "The description (breaking apart by wind/rain, washing into a river, settling in layers, being pressed together) perfectly illustrates the formation of sedimentary rock from igneous rock, as detailed in the example path 'Igneous → Sedimentary'."}, {"text": "Magma, which would then cool to form new igneous rock.", "isCorrect": false, "rationale": "Magma forms when rock melts due to extreme heat, which is not described in this scenario of surface weathering and deposition."}], "id": "q02"}, {"question": "If a sandstone (sedimentary rock) is buried deep underground and subjected to significant heat and pressure, what is the most likely outcome for this rock according to the rock cycle?", "options": [{"text": "It will melt into magma, then cool to form a new igneous rock.", "isCorrect": false, "rationale": "While possible if temperatures are high enough for melting, the direct result of 'heat and pressure' without explicitly mentioning melting is typically the formation of metamorphic rock, as described in the 'Sedimentary → Metamorphic' path."}, {"text": "It will be weathered and eroded back into new sediment.", "isCorrect": false, "rationale": "Weathering and erosion occur at or near the surface, not deep underground where heat and pressure are dominant factors for transformation."}, {"text": "It will transform into a metamorphic rock like quartzite.", "isCorrect": true, "rationale": "The text explicitly states: 'Sedimentary rock gets buried deep underground. Heat and pressure change it into metamorphic rock,' using the example of sandstone becoming quartzite."}, {"text": "It will remain sandstone, as sedimentary rocks do not change.", "isCorrect": false, "rationale": "This contradicts the fundamental principle of the rock cycle, where 'rocks do not stay the same forever' and can change from one type to another."}], "id": "q03"}, {"question": "For a metamorphic rock to complete the transition to an igneous rock, what critical process must occur first, followed by another specific process?", "options": [{"text": "It must be exposed to the surface and undergo weathering and erosion.", "isCorrect": false, "rationale": "Weathering and erosion would break the metamorphic rock into sediment, leading toward sedimentary rock, not igneous rock."}, {"text": "It must be subjected to intense pressure without an increase in temperature.", "isCorrect": false, "rationale": "While pressure is involved in metamorphism, forming igneous rock requires melting, which is driven by heat, not just pressure."}, {"text": "It must melt into magma, and then that magma must cool and solidify.", "isCorrect": true, "rationale": "The text states: 'If metamorphic rock gets hot enough, it melts into magma. When the magma cools, it becomes igneous rock.' This outlines the correct two-step process."}, {"text": "It must be compacted and cemented with other rock fragments.", "isCorrect": false, "rationale": "Compaction and cementation are processes that form sedimentary rock, not igneous rock."}], "id": "q04"}, {"question": "The 'thinkaboutit' section asks why we cannot watch a rock change from one type to another in our lifetime. Based on the text, what is the primary reason?", "options": [{"text": "The changes are microscopic and require special equipment to observe.", "isCorrect": false, "rationale": "While some changes might be microscopic, the text emphasizes the time scale, not the visibility of the changes themselves."}, {"text": "The rock cycle's processes occur over millions to billions of years, far exceeding a human lifespan.", "isCorrect": true, "rationale": "The text explicitly states: 'The rock cycle takes a very, very long time — usually millions of years,' directly addressing why it cannot be observed in a lifetime."}, {"text": "Scientists intentionally prevent public observation of rock transformations.", "isCorrect": false, "rationale": "There is no information in the text to support this claim; it is an unsupported conspiracy theory."}, {"text": "Rocks only change when influenced by catastrophic events, which are rare.", "isCorrect": false, "rationale": "While catastrophic events can play a role, the text describes the rock cycle as a continuous, ongoing process, not solely dependent on rare catastrophes."}], "id": "q05"}, {"question": "Which statement best illustrates the concept that 'any type of rock can become any other type' and that there is 'no single starting point and no end' in the rock cycle?", "options": [{"text": "Once igneous rock is formed, it must first become sedimentary, then metamorphic, before melting again.", "isCorrect": false, "rationale": "This describes a fixed, linear path, which the text explicitly refutes by stating 'there is no single starting point and no end' and showing multiple paths."}, {"text": "A sedimentary rock can be directly weathered back into sediment without first becoming metamorphic.", "isCorrect": true, "rationale": "The text directly states: 'A sedimentary rock does not have to become metamorphic next — it could be weathered right back into sediment and form a new sedimentary rock,' demonstrating a non-linear path."}, {"text": "Only magma can initiate the formation of new rock types in the cycle.", "isCorrect": false, "rationale": "New rock types can also form from existing rocks through weathering and metamorphism without magma as an intermediary."}, {"text": "All rocks must eventually pass through the metamorphic stage before returning to igneous.", "isCorrect": false, "rationale": "This suggests a required sequence, which contradicts the idea of 'many possible paths' and 'any type of rock can become any other type' directly."}], "id": "q06"}, {"question": "A massive volcanic eruption introduces a large amount of new igneous rock onto the Earth's surface. According to the rock cycle, what is the most immediate potential path this new igneous rock could take?", "options": [{"text": "It could be immediately buried and transformed into metamorphic rock.", "isCorrect": false, "rationale": "While possible in the very long term, 'immediately buried' and transformed into metamorphic rock is less likely than processes occurring at the surface after formation."}, {"text": "It will remain igneous rock indefinitely, being newly formed.", "isCorrect": false, "rationale": "The core concept of the rock cycle is that 'rocks do not stay the same forever,' so it will eventually change."}, {"text": "It could undergo weathering and erosion, breaking down into sediment that forms sedimentary rock.", "isCorrect": true, "rationale": "The example 'Igneous → Sedimentary' describes wind and rain breaking igneous rock into pieces that are carried and pressed into sedimentary rock, representing a common and immediate next step for surface igneous rock."}, {"text": "It must melt again into magma before any other change can occur.", "isCorrect": false, "rationale": "Melting requires very high temperatures deep underground, not an immediate path for newly formed surface igneous rock."}], "id": "q07"}, {"question": "The text states that 'any rock can become any other type' and mentions specific paths like 'Any rock → Magma → Igneous.' This highlights which overarching principle of the rock cycle?", "options": [{"text": "The stability of rock types under constant environmental conditions.", "isCorrect": false, "rationale": "This contradicts the dynamic nature of the rock cycle, where conditions are constantly changing over geological time."}, {"text": "The unidirectional flow of rock transformation from one fixed starting point.", "isCorrect": false, "rationale": "The text explicitly states 'no single starting point and no end' and that rocks can follow many paths, not a unidirectional flow."}, {"text": "The interconnectedness and fluidity of rock transformations, allowing for diverse pathways.", "isCorrect": true, "rationale": "This option accurately captures the essence of 'any type of rock can become any other type' and 'many possible paths,' emphasizing the interconnected and fluid nature of the cycle."}, {"text": "The ultimate destination of all rocks is to become magma.", "isCorrect": false, "rationale": "While any rock *can* melt into magma, not all rocks *must* follow this path, and magma then cools to form igneous rock, meaning it's not an ultimate 'destination.'"}], "id": "q08"}, {"question": "The teacher's note mentions cross-connections, including 'Chemistry (Unit 3: matter changes state)'. Which specific transformation within the rock cycle directly illustrates matter changing state?", "options": [{"text": "The breakdown of igneous rock into smaller pieces by weathering.", "isCorrect": false, "rationale": "Weathering is a physical breakdown (mechanical or chemical) of solid rock, not a change of state (solid to liquid, etc.)."}, {"text": "The compaction and cementation of sediments to form sedimentary rock.", "isCorrect": false, "rationale": "This is a process of lithification where loose particles become solid rock, but it's not typically classified as a change of state like melting or freezing."}, {"text": "The transformation of solid rock (any type) into liquid magma and its subsequent cooling back into solid igneous rock.", "isCorrect": true, "rationale": "This process involves solid rock changing to a liquid state (magma) through melting, and then the liquid changing back to a solid state (igneous rock) through cooling, directly correlating to 'matter changes state'."}, {"text": "The recrystallization of minerals within metamorphic rock under heat and pressure.", "isCorrect": false, "rationale": "Recrystallization involves changes within the solid state (minerals rearranging), not a change from solid to liquid or gas."}], "id": "q09"}, {"question": "Based on the example provided in the text (granite -> sandstone -> quartzite), if quartzite (metamorphic rock) were to be uplifted to the surface and exposed to the elements, what would be its most likely next step in the rock cycle?", "options": [{"text": "It would melt into magma and then cool to form new igneous rock.", "isCorrect": false, "rationale": "Melting occurs deep underground. If uplifted to the surface, it would be exposed to surface processes, not immediate melting."}, {"text": "It would remain quartzite indefinitely, as metamorphic rocks are very stable.", "isCorrect": false, "rationale": "The rock cycle states 'rocks do not stay the same forever.' All rock types are subject to change."}, {"text": "It would undergo weathering and erosion, breaking down into sediment that could eventually form new sedimentary rock.", "isCorrect": true, "rationale": "Any rock exposed to the surface is subject to weathering and erosion, which creates sediment that can then form sedimentary rock. This is a primary pathway from any rock type at the surface."}, {"text": "It would directly transform into a different type of igneous rock without melting.", "isCorrect": false, "rationale": "Igneous rocks form from cooling magma. There is no direct solid-state transformation from metamorphic to igneous without melting."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
