        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 11, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What characteristic uniquely defines birds among all other vertebrate groups?", "options": [{"text": "Laying eggs", "isCorrect": false, "rationale": "Fish, amphibians, and reptiles also lay eggs, so this is not a unique characteristic of birds."}, {"text": "Being warm-blooded", "isCorrect": false, "rationale": "Mammals are also warm-blooded, so this is not a unique characteristic of birds."}, {"text": "Having feathers", "isCorrect": true, "rationale": "The text explicitly states, 'Birds are the only animals with feathers,' making this their unique defining characteristic."}, {"text": "Ability to fly", "isCorrect": false, "rationale": "While most birds fly, the text notes exceptions like penguins and ostriches. Also, other animals (e.g., bats, insects) can fly, and the text is focused on vertebrates. Therefore, flight is not a unique or universal characteristic for all birds compared to other groups."}]}, {"question": "A scientist discovers a new cold-blooded vertebrate species. It has dry, scaly skin and lays tough, leathery eggs on land. To which group does it most likely belong?", "options": [{"text": "Fish", "isCorrect": false, "rationale": "Fish have scales but live in water, breathe through gills, and lay eggs in water, not on land. They also do not have dry skin."}, {"text": "Amphibian", "isCorrect": false, "rationale": "Amphibians are cold-blooded and lay eggs, but they have smooth, moist skin and lay soft, jelly-like eggs in water, not dry, scaly skin and leathery eggs on land."}, {"text": "Reptile", "isCorrect": true, "rationale": "The text describes reptiles as cold-blooded vertebrates with dry, scaly skin that lay tough, leathery eggs on land. These characteristics perfectly match the description."}, {"text": "Mammal", "isCorrect": false, "rationale": "Mammals are warm-blooded, have hair or fur, and typically give birth to live young, not lay leathery eggs. They also do not have dry, scaly skin."}]}, {"question": "A hiker finds an animal that starts its life in a pond with gills, then later develops lungs and lives primarily on land near the pond, requiring its skin to stay moist. What vertebrate group does this animal represent?", "options": [{"text": "Fish", "isCorrect": false, "rationale": "Fish live their entire lives in water and breathe through gills throughout their life, not developing lungs for land."}, {"text": "Amphibian", "isCorrect": true, "rationale": "The description of starting life in water with gills and later developing lungs to live on land, while needing moist skin, perfectly matches the definition and characteristics of amphibians (Greek for 'double life')."}, {"text": "Reptile", "isCorrect": false, "rationale": "Reptiles breathe with lungs their whole lives, have dry, scaly skin that retains water, and do not typically have an aquatic gill-breathing larval stage."}, {"text": "Bird", "isCorrect": false, "rationale": "Birds breathe with lungs, are warm-blooded, have feathers, and lay hard-shelled eggs. They do not start life in water with gills or require moist skin."}]}, {"question": "Why might a lizard be observed sunbathing on a warm rock, while a robin maintains a consistent body temperature regardless of the weather?", "options": [{"text": "The lizard is warm-blooded and needs to absorb heat, while the robin is cold-blooded and generates its own heat.", "isCorrect": false, "rationale": "This statement incorrectly reverses the classifications. Lizards are cold-blooded, and robins are warm-blooded."}, {"text": "Both are warm-blooded, but the lizard is trying to cool down, and the robin is trying to warm up.", "isCorrect": false, "rationale": "This statement is incorrect as lizards are cold-blooded, and sunbathing helps them warm up, not cool down. Robins regulate their own temperature."}, {"text": "The lizard is cold-blooded and relies on external heat sources, while the robin is warm-blooded and internally regulates its temperature.", "isCorrect": true, "rationale": "The text explains that reptiles (like lizards) are cold-blooded and 'you might see a lizard sunbathing on a warm rock — it is warming up its body!' Birds (like robins) are warm-blooded, meaning 'their body stays at about the same temperature no matter what the weather is.'"}, {"text": "The lizard is adapting to desert life, while the robin is adapting to colder climates through sunbathing.", "isCorrect": false, "rationale": "While lizards may live in deserts, their sunbathing is due to being cold-blooded, not specifically a desert adaptation unique to them. Robins do not sunbathe to regulate temperature in the same way, as they are warm-blooded."}]}, {"question": "Based on the text, which vertebrate group was the first to appear on Earth?", "options": [{"text": "Amphibians", "isCorrect": false, "rationale": "Amphibians appeared after fish, evolving to live on land."}, {"text": "Fish", "isCorrect": true, "rationale": "The text explicitly states, 'Fish were the first vertebrates to appear on Earth, hundreds of millions of years ago.'"}, {"text": "Reptiles", "isCorrect": false, "rationale": "Reptiles evolved later than fish and amphibians, becoming the first to live entirely on land."}, {"text": "Mammals", "isCorrect": false, "rationale": "Mammals are one of the most recent vertebrate groups to evolve."}]}, {"question": "Which two vertebrate groups share the characteristic of being warm-blooded?", "options": [{"text": "Fish and Amphibians", "isCorrect": false, "rationale": "Both fish and amphibians are cold-blooded."}, {"text": "Reptiles and Birds", "isCorrect": false, "rationale": "Reptiles are cold-blooded, while birds are warm-blooded."}, {"text": "Birds and Mammals", "isCorrect": true, "rationale": "The text clearly states, 'Only two of the five vertebrate groups are warm-blooded: birds and mammals.'"}, {"text": "Mammals and Fish", "isCorrect": false, "rationale": "Mammals are warm-blooded, but fish are cold-blooded."}]}, {"question": "While most birds can fly, the text mentions exceptions like penguins and ostriches. What characteristic do all birds, including these exceptions, still possess that makes them birds?", "options": [{"text": "They all swim or run quickly.", "isCorrect": false, "rationale": "Not all birds swim or run quickly; some, like kiwis, walk. This is not a universal defining characteristic of the group."}, {"text": "They are all cold-blooded.", "isCorrect": false, "rationale": "The text states that birds are warm-blooded, so this is incorrect."}, {"text": "They all have feathers.", "isCorrect": true, "rationale": "The text states, 'Birds are the only animals with feathers,' which is their defining characteristic regardless of their ability to fly, swim, or run."}, {"text": "They all lay soft, jelly-like eggs.", "isCorrect": false, "rationale": "Birds lay hard-shelled eggs, not soft, jelly-like eggs (which are characteristic of amphibians)."}]}, {"question": "A newly discovered vertebrate gives birth to live young and the mother feeds them a special liquid produced by her body. This characteristic immediately places the animal into which group?", "options": [{"text": "Amphibians", "isCorrect": false, "rationale": "Amphibians lay soft, jelly-like eggs and do not feed their young with milk."}, {"text": "Reptiles", "isCorrect": false, "rationale": "Reptiles usually lay tough, leathery eggs and do not feed their young with milk."}, {"text": "Birds", "isCorrect": false, "rationale": "Birds lay hard-shelled eggs and do not feed their young with milk."}, {"text": "Mammals", "isCorrect": true, "rationale": "The text states that 'Mother mammals produce milk to feed their babies' and 'Most mammals give birth to live young (not eggs),' matching the description precisely."}]}, {"question": "Reptiles were among the first vertebrates to live their entire lives on land. What adaptation primarily allowed them to do this, unlike amphibians?", "options": [{"text": "Their ability to breathe air with gills", "isCorrect": false, "rationale": "Reptiles breathe air with lungs their whole lives, not gills. Gills are characteristic of fish and early amphibian stages."}, {"text": "Their smooth, moist skin", "isCorrect": false, "rationale": "Smooth, moist skin is characteristic of amphibians, which requires them to stay near water; this adaptation would hinder living entirely on land."}, {"text": "Their dry, scaly skin", "isCorrect": true, "rationale": "The text explains, 'Their dry, scaly skin keeps water inside their bodies, so they do not need to stay near water the way amphibians do,' making this a key adaptation for terrestrial life."}, {"text": "Their hollow bones", "isCorrect": false, "rationale": "Hollow bones are a characteristic of birds, making their bodies lighter for flying, not a primary adaptation for reptiles to live on land."}]}, {"question": "Compare the eggs laid by amphibians, reptiles, and birds. Which statement accurately describes the differences?", "options": [{"text": "Amphibians lay hard-shelled eggs, reptiles lay soft eggs, and birds lay leathery eggs.", "isCorrect": false, "rationale": "This statement incorrectly describes all three egg types for the respective groups."}, {"text": "Amphibians lay soft, jelly-like eggs, reptiles lay tough, leathery eggs, and birds lay hard-shelled eggs.", "isCorrect": true, "rationale": "The text states 'Most lay soft, jelly-like eggs in water' for amphibians, 'Most lay tough, leathery eggs on land' for reptiles, and 'They lay hard-shelled eggs' for birds. This option accurately reflects these descriptions."}, {"text": "Amphibians lay leathery eggs, reptiles lay hard-shelled eggs, and birds lay soft eggs.", "isCorrect": false, "rationale": "This statement incorrectly describes all three egg types for the respective groups."}, {"text": "All three groups lay the same type of eggs, but in different locations.", "isCorrect": false, "rationale": "The text clearly differentiates the egg types (soft/jelly-like, leathery, hard-shelled) for these three groups, in addition to mentioning different laying locations."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
