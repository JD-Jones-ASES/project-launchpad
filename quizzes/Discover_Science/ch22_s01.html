    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 22, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the textbook, what is the key difference that distinguishes \"soil\" from simple \"dirt\"?", "options": [{"text": "Soil is typically found outdoors, while dirt refers to indoor dust.", "isCorrect": false, "rationale": "This is a common colloquial distinction, but the textbook defines soil scientifically based on its composition and importance, not just its location."}, {"text": "Soil is a complex mixture of specific ingredients vital for life, whereas \"dirt\" is a more general, less precise term for loose earth.", "isCorrect": true, "rationale": "The text states, 'Soil is not just dirt. It is one of the most complex and important materials on our planet,' emphasizing its specific composition (broken rock, decomposed organisms, water, and air) and function."}, {"text": "Dirt is solely composed of broken rock fragments, while soil includes decomposed organisms.", "isCorrect": false, "rationale": "The text doesn't define 'dirt' in this specific way; soil itself contains broken rock, along with other components."}, {"text": "Soil refers to cultivated land, while dirt is uncultivated ground.", "isCorrect": false, "rationale": "This describes an application or state of land, not the fundamental material difference between soil and dirt as presented in the definitions."}]}, {"question": "The textbook identifies four main ingredients of soil. Which of the following is NOT listed as one of these primary ingredients?", "options": [{"text": "Decomposed organisms (humus)", "isCorrect": false, "rationale": "Humus, formed from decomposed organisms, is explicitly listed as a main ingredient."}, {"text": "Living plants and animals", "isCorrect": true, "rationale": "While living organisms *inhabit* soil and their *remains* become humus, living plants and animals themselves are not listed as one of the four *ingredients* that make up the soil's structure."}, {"text": "Broken rock (minerals)", "isCorrect": false, "rationale": "Broken rock, or minerals, is explicitly listed as a main ingredient."}, {"text": "Water", "isCorrect": false, "rationale": "Water is explicitly listed as a main ingredient of soil."}]}, {"question": "A gardener observes that their soil is unusually dark brown, crumbly, and supports very vigorous plant growth. Based on the description in the text, which soil ingredient is most likely abundant in this gardener's soil?", "options": [{"text": "Sand", "isCorrect": false, "rationale": "Sand particles are large and contribute grit, but are not primarily responsible for the dark color, crumbly texture, or nutrient richness described."}, {"text": "Humus", "isCorrect": true, "rationale": "The text states, 'Humus is packed with nutrients. It is what makes rich garden soil look dark brown or black' and describes it as a 'dark, crumbly material,' directly matching the observations."}, {"text": "Clay", "isCorrect": false, "rationale": "Clay particles are tiny and sticky when wet, and while they hold water, they do not inherently give soil a dark, crumbly appearance or directly provide the observed nutrient richness."}, {"text": "Air", "isCorrect": false, "rationale": "Air pockets are essential for plant roots, but air itself is not a solid ingredient that contributes to the soil's color, crumbly texture, or nutrient content."}]}, {"question": "According to the textbook, what is the *initial* step in the long process of soil formation?", "options": [{"text": "Tiny organisms like mosses and lichens begin to grow on the surface.", "isCorrect": false, "rationale": "This is described as the *second* step, occurring only after rocks have already broken apart."}, {"text": "Layers develop and become distinct over time.", "isCorrect": false, "rationale": "This is the final stage of soil formation described, occurring much later in the process."}, {"text": "Wind, rain, ice, and plant roots slowly break down rocks into smaller pieces.", "isCorrect": true, "rationale": "The text clearly states this as the first step: 'Rocks break apart. Wind, rain, ice, and plant roots slowly crack and crumble rocks into smaller and smaller pieces. Scientists call this process weathering.'"}, {"text": "Worms, insects, and other small animals begin to dig tunnels.", "isCorrect": false, "rationale": "This step occurs later in the process, as humus builds up and larger plants take root."}]}, {"question": "A farmer's fields have become heavily compacted over time due to repeated use of heavy machinery. Based on the textbook's description of soil ingredients, what is the most significant negative consequence for plants growing in this compacted soil?", "options": [{"text": "The soil will hold too much water, leading to root rot.", "isCorrect": false, "rationale": "While compaction can lead to waterlogging at the surface by reducing drainage, its primary impact related to ingredients is on air space, not necessarily excess water retention throughout."}, {"text": "There will be insufficient space for air, hindering root respiration and growth.", "isCorrect": true, "rationale": "The text explicitly states, 'There are tiny pockets of air between the particles of soil, too. Plant roots and soil animals need this air to breathe. If soil is packed too tightly, there is no room for air, and roots cannot grow well.'"}, {"text": "Decomposed organisms will break down too quickly, depleting nutrients.", "isCorrect": false, "rationale": "Compaction primarily affects the physical structure and gas exchange within the soil, not the rate of organic matter decomposition in this manner."}, {"text": "The mineral content will increase, making the soil too acidic for most plants.", "isCorrect": false, "rationale": "Compaction does not inherently increase mineral content or alter soil pH to make it more acidic."}]}, {"question": "Which type of soil particle is characterized in the text as the \"tiniest,\" feeling \"sticky when wet,\" and holding water \"very well\"?", "options": [{"text": "Sand", "isCorrect": false, "rationale": "Sand is described as the largest soil particle, feeling gritty, and not holding water well."}, {"text": "Silt", "isCorrect": false, "rationale": "Silt is described as medium-sized and feeling smooth and powdery, but not the tiniest or sticky when wet."}, {"text": "Clay", "isCorrect": true, "rationale": "The text directly states, 'Clay — The tiniest soil particles. Clay feels sticky when wet and hard when dry. It holds water very well — sometimes too well!'"}, {"text": "Loam", "isCorrect": false, "rationale": "Loam is a type of soil that is a *mixture* of particles, not a single particle type itself."}]}, {"question": "A soil scientist analyzes a sample and determines it has an optimal balance of sand, silt, and clay particles, resulting in excellent drainage and water retention for plant growth. What term would a gardener most likely use to describe this ideal type of soil?", "options": [{"text": "Humus", "isCorrect": false, "rationale": "Humus is decomposed organic matter, an ingredient of soil, but not a classification of soil based on its particle balance."}, {"text": "Topsoil", "isCorrect": false, "rationale": "Topsoil refers to the uppermost layer of soil, which can vary in composition, and is not necessarily always the ideal 'balanced' type."}, {"text": "Loam", "isCorrect": true, "rationale": "The text explicitly defines loam as 'a type of soil that contains a balanced mixture of sand, silt, and clay, making it ideal for growing plants.'"}, {"text": "Weathered rock", "isCorrect": false, "rationale": "Weathered rock refers to the broken mineral pieces that are a component of soil, not a balanced soil type ready for planting."}]}, {"question": "A region is characterized by significant temperature fluctuations, leading to repeated freezing and thawing of water in rock cracks, alongside strong prevailing winds. Which stage of soil formation would be most dramatically accelerated by these environmental conditions?", "options": [{"text": "Tiny organisms moving in and adding humus.", "isCorrect": false, "rationale": "While climate affects organisms, these specific conditions are primarily physical forces that contribute to mechanical breakdown, not directly to biological colonization or humus production as the *most* accelerated stage."}, {"text": "The development of distinct soil layers.", "isCorrect": false, "rationale": "Layer development is a long-term cumulative process that happens after initial soil components have formed, not directly accelerated by these physical forces alone."}, {"text": "The breaking apart of rocks into smaller pieces.", "isCorrect": true, "rationale": "The text describes 'Rocks break apart' as the first step, driven by 'Wind, rain, ice, and plant roots.' Freezing and thawing (ice) and strong winds are classic agents of weathering, which is the process of rocks breaking down."}, {"text": "More plants and animals arriving to create tunnels.", "isCorrect": false, "rationale": "This stage occurs much later, after initial humus has built up to support larger life forms, and is not directly accelerated by the physical weathering described."}]}, {"question": "After rocks have been broken down into smaller pieces by weathering, what critical role do initial organisms like mosses, lichens, and bacteria play in the subsequent stage of soil formation?", "options": [{"text": "They directly contribute to the formation of clay particles.", "isCorrect": false, "rationale": "Clay particles primarily originate from the further weathering of mineral rock fragments, not directly from these organisms."}, {"text": "They create tunnels that allow air and water to penetrate deeper into the rock fragments.", "isCorrect": false, "rationale": "The text attributes tunnel creation and improved aeration to 'Worms, insects, and other small animals,' not the initial mosses, lichens, and bacteria."}, {"text": "They provide the first additions of humus when they die and decompose.", "isCorrect": true, "rationale": "The text explicitly states: 'Tiny organisms move in. Mosses, lichens, and bacteria begin to grow on the broken rock. When they die, their remains add the first bits of humus.'"}, {"text": "They absorb all available water, preventing larger plants from growing.", "isCorrect": false, "rationale": "Their role is to initiate the organic component of soil, not to inhibit future plant growth by water depletion."}]}, {"question": "In the suggested hands-on activity, students shake soil and water in a jar and observe it settling into layers. If a student observes a very fine layer immediately above the coarsest layer at the bottom, and this fine layer feels smooth and powdery when they carefully examine it, what soil particle type does it primarily represent?", "options": [{"text": "Clay", "isCorrect": false, "rationale": "Clay is the tiniest particle and would settle last, appearing at the very top of the settled layers (below the water and humus), and feels sticky when wet, not powdery."}, {"text": "Sand", "isCorrect": false, "rationale": "Sand is the largest and coarsest particle, which settles first at the very bottom of the jar."}, {"text": "Silt", "isCorrect": true, "rationale": "The text describes silt as 'medium-sized particles' that feel 'smooth and powdery when dry.' In a settling test, silt particles would settle after the larger sand particles but before the much tinier clay particles."}, {"text": "Humus", "isCorrect": false, "rationale": "Humus typically floats on the water or remains suspended in the upper water column due to its low density, rather than forming a settled layer between sand and clay."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
