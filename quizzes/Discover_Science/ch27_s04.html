<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 27, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary goal of conservation as described in the text?", "options": [{"text": "To completely stop using all natural resources to preserve them indefinitely.", "isCorrect": false, "rationale": "The text states, 'Conservation does not mean never using resources. People need resources to live.'"}, {"text": "To use natural resources wisely and carefully to ensure their availability for present and future generations.", "isCorrect": true, "rationale": "The text defines conservation as 'using natural resources wisely and carefully so they last as long as possible and cause as little harm as possible,' with the goal 'to make sure there are enough resources for people today and for people in the future.'"}, {"text": "To extract resources as quickly as possible to meet current demand before they run out.", "isCorrect": false, "rationale": "This approach is contrary to the principle of using resources 'wisely and carefully' and would deplete them faster."}, {"text": "To develop artificial alternatives for all natural resources to avoid using them.", "isCorrect": false, "rationale": "While alternatives can be part of resource management, the text focuses on managing natural resources themselves, not exclusively replacing them."}]}, {"question": "According to the text, which strategy for conserving resources is considered the \"most helpful,\" and why?", "options": [{"text": "Recycle, because it turns old materials into new products.", "isCorrect": false, "rationale": "The text states that 'Recycle comes last' in the order of helpfulness, after Reduce and Reuse."}, {"text": "Reuse, because it extends the life of existing products.", "isCorrect": false, "rationale": "While Reuse is important, the text places it second, stating 'Reuse is next' after Reduce."}, {"text": "Reduce, because it means fewer resources are extracted and less waste is created in the first place.", "isCorrect": true, "rationale": "The text explicitly states, 'The single best thing you can do is use less in the first place. Every product you do not buy is a product that did not need to be made.'"}, {"text": "Replace, because it substitutes natural resources with synthetic ones.", "isCorrect": false, "rationale": "'Replace' is not one of the 'Three R's' (Reduce, Reuse, Recycle) discussed as the most important strategies for conserving resources."}]}, {"question": "Which of the following actions best exemplifies the 'Reduce' strategy of conservation?", "options": [{"text": "Donating old clothes to a charity so others can use them.", "isCorrect": false, "rationale": "Donating items for others to use falls under the 'Reuse' strategy."}, {"text": "Using a refillable water bottle instead of buying single-use plastic bottles.", "isCorrect": true, "rationale": "The text lists 'Bring your own water bottle instead of buying a plastic one every time' as a 'Way to reduce,' because it lessens the demand for new products."}, {"text": "Melting down aluminum cans to create new aluminum products.", "isCorrect": false, "rationale": "This action describes 'Recycle,' which is the process of breaking down used materials to make something new."}, {"text": "Fixing a broken bicycle rather than purchasing a new one.", "isCorrect": false, "rationale": "Repairing an item to continue using it falls under the 'Reuse' strategy, specifically 'Repair broken items instead of replacing them.'"}]}, {"question": "A student has an old T-shirt with a small tear. Instead of throwing it away, they cut it into smaller pieces and use it for cleaning. This action is an example of which conservation strategy?", "options": [{"text": "Reduce", "isCorrect": false, "rationale": "Reduce means using less in the first place; this action involves using an existing item differently."}, {"text": "Reuse", "isCorrect": true, "rationale": "The text lists 'Turn old T-shirts into cleaning rags' as a specific example of 'Ways to reuse,' as it gives the item a continued purpose."}, {"text": "Recycle", "isCorrect": false, "rationale": "Recycling involves breaking down a material and transforming it into something new through an industrial process, which is not what the student is doing."}, {"text": "Repurpose", "isCorrect": false, "rationale": "While 'repurpose' accurately describes changing an item's use, the provided text categorizes this action directly under 'Reuse.'"}]}, {"question": "The text highlights a significant benefit of recycling aluminum cans compared to making new ones from raw ore. What is this primary benefit?", "options": [{"text": "It completely eliminates the need for any new resource extraction.", "isCorrect": false, "rationale": "While it significantly reduces the need, recycling doesn't completely eliminate new extraction for all related processes or products."}, {"text": "It uses approximately 95% less energy.", "isCorrect": true, "rationale": "The text explicitly states, 'For example, recycling an aluminum can uses about 95% less energy than making a new can from raw ore. That is a huge savings!'"}, {"text": "It improves the quality of the aluminum metal.", "isCorrect": false, "rationale": "The text does not mention an improvement in metal quality as a primary benefit of recycling."}, {"text": "It produces more durable products than those made from raw materials.", "isCorrect": false, "rationale": "The text does not claim that recycled products are more durable; the focus is on resource and energy savings."}]}, {"question": "The section states that 'saving energy is one of the most powerful forms of conservation.' Which statement best explains *why* this is true?", "options": [{"text": "Most energy sources are infinite and renewable, so saving energy has little impact.", "isCorrect": false, "rationale": "This is incorrect; many energy sources, like fossil fuels, are limited, and their use causes environmental harm, making energy saving impactful."}, {"text": "Saving energy primarily benefits personal finances by lowering utility bills.", "isCorrect": false, "rationale": "While true, the text's rationale for it being a 'powerful form of conservation' is not personal financial savings, but its broader environmental impact."}, {"text": "Making and transporting products, which uses many resources, requires significant energy, so saving energy reduces overall resource consumption.", "isCorrect": true, "rationale": "The text directly connects these ideas: 'Because making and transporting products uses so much energy, saving energy is one of the most powerful forms of conservation.' This means fewer fossil fuels burned and fewer resources used in manufacturing and distribution."}, {"text": "Energy-saving devices are more environmentally friendly to produce.", "isCorrect": false, "rationale": "The text focuses on the impact of *using* less energy, not primarily on the production of energy-saving devices themselves."}]}, {"question": "What is the primary reason why protecting natural places like forests and wetlands is crucial for conservation, beyond just resource use?", "options": [{"text": "These areas are typically rich in minerals and valuable timber that can be harvested later.", "isCorrect": false, "rationale": "While these resources might exist, the text emphasizes protection, not future harvesting, in this context."}, {"text": "Protecting these habitats prevents soil erosion and maintains water quality for human consumption.", "isCorrect": false, "rationale": "These are important benefits, but the text highlights the direct impact on living organisms as the primary reason in this specific section, especially concerning 'endangered species'."}, {"text": "Such protection helps prevent species from becoming endangered by preserving their homes and ecosystems.", "isCorrect": true, "rationale": "The text explicitly states, 'When forests are cut down, wetlands are drained, or oceans are polluted, the organisms that live there lose their homes. Some species become endangered...Protecting habitats helps protect the entire ecosystem.'"}, {"text": "These natural places are important for recreational activities like hiking and camping.", "isCorrect": false, "rationale": "Recreational value is a benefit, but the text focuses on biodiversity and ecosystem preservation as the core conservation reason."}]}, {"question": "Eunice Newton Foote's experiment with glass cylinders filled with different gases was significant because it demonstrated what concept?", "options": [{"text": "That certain gases are lighter than air, allowing them to float.", "isCorrect": false, "rationale": "Foote's experiment measured temperature changes, not the buoyancy of gases."}, {"text": "The principle of thermal expansion in glass materials.", "isCorrect": false, "rationale": "While heat was involved, the focus was on the gases' properties, not the glass itself."}, {"text": "That carbon dioxide in the atmosphere traps heat, leading to the greenhouse effect.", "isCorrect": true, "rationale": "The text states, 'What she discovered was remarkable. The cylinder filled with carbon dioxide got much hotter than the others, and it stayed hot for longer. From this, Foote concluded that CO2 in the atmosphere traps heat from the Sun. She was the first person to demonstrate what scientists now call the greenhouse effect.'"}, {"text": "The process of photosynthesis in different plant types.", "isCorrect": false, "rationale": "Foote's experiment was about the heat-trapping properties of gases, not plant biological processes."}]}, {"question": "The 'Trash Audit' activity described in the text typically reveals that:", "options": [{"text": "Most of the waste generated is 'True Trash' and cannot be diverted from landfills.", "isCorrect": false, "rationale": "The text indicates the opposite: 'Most groups find that more than half of their trash could have been recycled, reused, or composted. The 'True Trash' pile is usually the smallest.'"}, {"text": "The majority of classroom waste consists of food scraps that are difficult to manage.", "isCorrect": false, "rationale": "While food scraps are a category, the primary finding highlighted is the overall potential for diversion from landfill, not just food scraps, and that 'True Trash' is the smallest."}, {"text": "A significant portion of waste could have been reduced, reused, or recycled, making 'True Trash' the smallest category.", "isCorrect": true, "rationale": "The 'What to look for' section states, 'Most groups find that more than half of their trash could have been recycled, reused, or composted. The 'True Trash' pile is usually the smallest. This is a powerful discovery!'"}, {"text": "Recycling is the most effective way to manage all types of classroom waste.", "isCorrect": false, "rationale": "The audit includes categories for 'Reusable' and 'Compostable' in addition to 'Recyclable,' and the overall emphasis of the chapter is that Reduce is most effective, followed by Reuse, then Recycle."}]}, {"question": "The 'Teacher Note' section suggests connecting conservation to Unit 21 (Ecosystems) by discussing habitat destruction and food chains, and to Unit 22 (Soil and Erosion) regarding deforestation. What overarching message does this emphasize about conservation?", "options": [{"text": "Conservation efforts are only effective when focused on a single environmental issue at a time.", "isCorrect": false, "rationale": "The cross-connections imply that environmental issues are interconnected, requiring a holistic understanding rather than single-issue focus."}, {"text": "The impact of human actions on resources often has far-reaching consequences across different natural systems.", "isCorrect": true, "rationale": "Connecting deforestation to soil erosion and habitat destruction impacting food chains demonstrates how a single action can have consequences that ripple through various ecosystems and natural processes."}, {"text": "Learning about conservation is only relevant to scientific subjects like biology and geology.", "isCorrect": false, "rationale": "The chapter includes practical actions for kids, energy saving, and historical context, showing its relevance beyond just specific science disciplines."}, {"text": "Conservation is primarily about individual choices and has little to do with large-scale natural processes.", "isCorrect": false, "rationale": "The 'Teacher Note' explicitly links individual actions (like those leading to deforestation) to large-scale natural processes like erosion and ecosystem disruption, showing a strong connection."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
