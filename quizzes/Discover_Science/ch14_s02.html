<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 14, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is another name for heat energy, and in which direction does it naturally flow?", "options": [{"text": "Kinetic energy; from cooler objects to warmer objects.", "isCorrect": false, "rationale": "Kinetic energy is the energy of motion, not another name for heat energy. Heat always flows from warmer to cooler objects, not the other way around."}, {"text": "Thermal energy; from warmer objects to cooler objects.", "isCorrect": true, "rationale": "The text states that scientists also call heat energy 'thermal energy,' and that it always moves from warmer things to cooler things."}, {"text": "Potential energy; it stays in one place.", "isCorrect": false, "rationale": "Potential energy is stored energy. Heat energy is dynamic and flows, and 'potential energy' is not another term for it."}, {"text": "Light energy; it travels in straight lines.", "isCorrect": false, "rationale": "Light energy is what we can see and travels in straight lines; it is a distinct form of energy from heat."}]}, {"question": "Which of the following activities *best* demonstrates the creation of sound energy?", "options": [{"text": "Turning on a flashlight to see in the dark.", "isCorrect": false, "rationale": "A flashlight primarily produces light energy."}, {"text": "Holding a warm mug of tea on a chilly morning.", "isCorrect": false, "rationale": "A warm mug demonstrates heat energy flowing from the liquid to your hands."}, {"text": "Plucking a guitar string and hearing a note.", "isCorrect": true, "rationale": "The text explicitly states that 'Pluck a guitar string and watch it wiggle back and forth. That wiggling is called a vibration, and it creates sound energy.'"}, {"text": "Dropping a book from a high shelf.", "isCorrect": false, "rationale": "Dropping a book primarily demonstrates the conversion of potential energy to kinetic energy (and some sound upon impact), but the core act is not about creating sound through vibration in the way plucking a string is."}]}, {"question": "Imagine two vehicles: a small car traveling at 80 kilometers per hour and a large truck traveling at 40 kilometers per hour. Based on the rules of kinetic energy, which statement is most likely true?", "options": [{"text": "The small car has more kinetic energy because it is moving faster.", "isCorrect": false, "rationale": "While faster speed increases kinetic energy, the text also states 'Heavier = more kinetic energy.' A large truck's significantly greater mass can often result in more kinetic energy even at half the speed of a much lighter car."}, {"text": "The large truck has more kinetic energy because its greater weight likely compensates for its slower speed.", "isCorrect": true, "rationale": "The text provides two rules: 'Faster = more kinetic energy' and 'Heavier = more kinetic energy.' For kinetic energy, mass (related to weight) has a significant impact. Given the truck's greater weight and the car's relatively modest speed advantage, the truck would likely possess more kinetic energy overall, demonstrating an understanding of both rules."}, {"text": "Both vehicles have the same kinetic energy because they are both in motion.", "isCorrect": false, "rationale": "Kinetic energy is dependent on both the mass and speed of an object, not just the fact that it's moving. They would not have the same kinetic energy."}, {"text": "Neither vehicle has kinetic energy unless they accelerate.", "isCorrect": false, "rationale": "Kinetic energy is the energy an object has *because it is moving*, regardless of whether it is accelerating or moving at a constant speed."}]}, {"question": "Which of the following scenarios is the best example of potential energy?", "options": [{"text": "A flashlight beam traveling across a room.", "isCorrect": false, "rationale": "This describes light energy in action, not stored energy."}, {"text": "A bird flying through the air.", "isCorrect": false, "rationale": "A flying bird has kinetic energy because it is moving."}, {"text": "A stretched rubber band held taut, ready to be released.", "isCorrect": true, "rationale": "The text specifically mentions 'A stretched rubber band — it could snap back (elastic potential energy)' as an example of potential energy, which is energy stored due to its condition."}, {"text": "A drum being struck to produce a beat.", "isCorrect": false, "rationale": "Striking a drum produces sound energy through vibration."}]}, {"question": "When you eat food, what form of energy is initially stored within it, and what form might your body convert it into to run a race?", "options": [{"text": "Heat energy, then light energy.", "isCorrect": false, "rationale": "Food does not primarily store heat or light energy. Running a race involves motion, not light production by the body."}, {"text": "Potential energy, then kinetic energy.", "isCorrect": true, "rationale": "The text states 'Food on your plate — it holds chemical energy your body can use,' classifying chemical energy as a type of stored (potential) energy. Your body then converts this stored energy into kinetic energy (motion) to run."}, {"text": "Sound energy, then heat energy.", "isCorrect": false, "rationale": "Food does not store sound energy. While your body produces heat, the primary conversion for running a race is to motion."}, {"text": "Kinetic energy, then potential energy.", "isCorrect": false, "rationale": "Food does not contain kinetic energy, as kinetic energy is energy of motion. The body converts stored energy into motion, not the other way around in this context."}]}, {"question": "A student lights a candle. Which two main forms of energy are most directly being produced and observed from the burning candle?", "options": [{"text": "Sound and Kinetic energy.", "isCorrect": false, "rationale": "A burning candle primarily produces light and heat, not significant sound or kinetic energy."}, {"text": "Light and Heat energy.", "isCorrect": true, "rationale": "The flame of a candle produces visible light, and it also radiates warmth, indicating the production of heat (thermal) energy. The text lists 'candles' as a source of light energy."}, {"text": "Potential and Sound energy.", "isCorrect": false, "rationale": "While the candle wax has chemical potential energy before burning, the question asks what is *produced* and observed. A burning candle does not directly produce sound energy."}, {"text": "Kinetic and Potential energy.", "isCorrect": false, "rationale": "A stationary burning candle does not produce kinetic energy, and potential energy is what is *stored* in the wax, not what is directly produced as the candle burns."}]}, {"question": "The introduction likens forms of energy to 'different flavors of ice cream — they are all ice cream, but each one is different.' What fundamental characteristic of energy does this analogy aim to convey?", "options": [{"text": "All forms of energy are equally enjoyable and beneficial.", "isCorrect": false, "rationale": "The analogy is not about the subjective experience or benefit of energy, but about its classification."}, {"text": "Energy can only be seen in its various forms, much like different colored ice cream.", "isCorrect": false, "rationale": "Many forms of energy, like sound or heat, are not directly visible, making this statement incorrect."}, {"text": "Despite their unique properties and functions, all forms ultimately belong to the same overarching concept of 'energy.'", "isCorrect": true, "rationale": "The analogy emphasizes that while there are many distinct forms (flavors), they are all fundamentally the same core substance (ice cream/energy). The text states, 'They are all energy, but each form does something different.'"}, {"text": "Energy is a temporary state, eventually melting away like ice cream.", "isCorrect": false, "rationale": "The analogy does not imply that energy is temporary or disappears, but rather focuses on its varied manifestations."}]}, {"question": "Why does rubbing your hands together on a chilly morning make them feel warmer?", "options": [{"text": "Your hands are producing light energy that makes them glow and feel warm.", "isCorrect": false, "rationale": "Rubbing hands together does not produce light energy, and light is not the direct cause of the warmth in this context."}, {"text": "Heat energy is flowing from your colder hands into the warmer air around them.", "isCorrect": false, "rationale": "Heat flows from warmer objects to cooler objects. If your hands are chilly, they are cooler than the warmth generated by rubbing."}, {"text": "The friction from rubbing creates heat energy, which warms your hands.", "isCorrect": true, "rationale": "The text lists 'Rubbing your hands together on a chilly morning' as a source of heat energy, which is generated through friction."}, {"text": "This action primarily creates sound energy, which is perceived as warmth by the brain.", "isCorrect": false, "rationale": "While rubbing might create a slight sound, the primary energy form created and felt as warmth is heat energy, not sound interpreted as warmth."}]}, {"question": "Which object would possess the greatest amount of gravitational potential energy?", "options": [{"text": "A golf ball rolling on a flat putting green.", "isCorrect": false, "rationale": "A golf ball on a flat surface has very little gravitational potential energy, as it is not significantly elevated. It primarily has kinetic energy if rolling."}, {"text": "A small stone lying at the bottom of a deep well.", "isCorrect": false, "rationale": "An object at the bottom of a well has very low (or even negative relative to the surface) gravitational potential energy due to its low position."}, {"text": "A heavy dictionary balanced on the highest shelf of a tall bookcase.", "isCorrect": true, "rationale": "Potential energy is stored energy due to position. The text states, 'The higher a ball is above the ground, the more gravitational potential energy it has.' A heavy object at a high position would have significant gravitational potential energy."}, {"text": "A feather gently floating to the ground from a low branch.", "isCorrect": false, "rationale": "A feather has very little mass, and if it's falling from a low branch, its height is also limited, resulting in minimal potential energy."}]}, {"question": "According to the section, what is the fundamental cause or origin of all sound energy?", "options": [{"text": "An object needs to be illuminated by a light source.", "isCorrect": false, "rationale": "Illumination is related to light energy, not sound energy."}, {"text": "An object must be vibrating, sending waves through a medium.", "isCorrect": true, "rationale": "The text explicitly states: 'Sound energy... produced when an object vibrates, sending waves through the air (or other materials) that your ears can detect.' It also says, 'Every sound starts with something vibrating.'"}, {"text": "An object has to be completely still, creating a pressure vacuum.", "isCorrect": false, "rationale": "Sound is created by motion (vibrations), not stillness or a pressure vacuum."}, {"text": "An object needs to be generating heat, which then causes sound waves.", "isCorrect": false, "rationale": "While some processes might generate both heat and sound, heat is not the fundamental cause of all sound energy according to the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
