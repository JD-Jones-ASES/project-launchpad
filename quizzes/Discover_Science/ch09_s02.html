<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 9, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the definition of length as provided in the textbook section?", "options": [{"text": "The amount of space an object occupies.", "isCorrect": false, "rationale": "This describes volume, not length."}, {"text": "The distance from one end of an object to the other, or the distance between two points.", "isCorrect": true, "rationale": "This is the precise definition of length given in the text."}, {"text": "How heavy an object is.", "isCorrect": false, "rationale": "This describes weight or mass, not length."}, {"text": "The duration an object exists in a particular location.", "isCorrect": false, "rationale": "This describes time, not length."}], "id": "q01"}, {"question": "Which of the following objects would be most appropriately measured using centimeters?", "options": [{"text": "The height of a classroom door.", "isCorrect": false, "rationale": "A classroom door is about 2 meters tall, making meters the more appropriate unit."}, {"text": "The length of a basketball court.", "isCorrect": false, "rationale": "A basketball court is about 28 meters long, making meters the more appropriate unit."}, {"text": "The length of a new pencil.", "isCorrect": true, "rationale": "A new pencil is approximately 19 cm long, making centimeters an appropriate unit for this desk-sized object."}, {"text": "The length of a family car.", "isCorrect": false, "rationale": "A car is about 4-5 meters long, making meters the more appropriate unit."}], "id": "q02"}, {"question": "You need to measure the distance across your living room to buy a new rug. Which unit of measurement would be the most practical and easiest to understand?", "options": [{"text": "Centimeters, because they offer greater precision.", "isCorrect": false, "rationale": "While precise, measuring a room in centimeters would result in a very large, cumbersome number (e.g., 500 cm instead of 5 m)."}, {"text": "Meters, because it's a distance across a room, making it bigger than a desk-sized object.", "isCorrect": true, "rationale": "The text advises using meters for distances across a room, as it results in a more manageable and understandable number."}, {"text": "Millimeters, for the highest level of detail.", "isCorrect": false, "rationale": "Millimeters are too small for measuring a room and are not discussed in the provided text as a primary unit choice."}, {"text": "Kilometers, because rooms are considered large areas.", "isCorrect": false, "rationale": "Kilometers are far too large for measuring a room; they are used for very long distances like between cities."}], "id": "q03"}, {"question": "What is the crucial first step when using a ruler to accurately measure an object's length in centimeters?", "options": [{"text": "Place the very edge of the ruler at one end of the object.", "isCorrect": false, "rationale": "The text explicitly identifies this as a common error, as the zero mark might not be at the edge."}, {"text": "Align the zero mark on the ruler with one end of the object.", "isCorrect": true, "rationale": "The text specifies that lining up the zero mark, not the edge, is the correct first step for accurate measurement."}, {"text": "Hold the ruler slightly above the object to avoid obstruction.", "isCorrect": false, "rationale": "The ruler should be directly alongside the object for accurate reading, not held above it."}, {"text": "Ensure the ruler is perfectly horizontal, regardless of the object's orientation.", "isCorrect": false, "rationale": "While important for consistency, the primary first step for placement is aligning the zero mark, and the ruler should be aligned with the object's length."}], "id": "q04"}, {"question": "Marcus is running the 100-meter dash at school. This scenario highlights which of the following about measurement?", "options": [{"text": "Measurements are primarily used in scientific experiments.", "isCorrect": false, "rationale": "While true, the example highlights measurement in everyday life and sports, not just science."}, {"text": "Measurement is used in everyday life to ensure fairness and consistency, like in sports.", "isCorrect": true, "rationale": "The 'sciencelife' section specifically mentions Marcus's 100-meter dash to illustrate how measurement helps ensure every runner covers the same distance."}, {"text": "Meters are always used for distances greater than 100 cm.", "isCorrect": false, "rationale": "While 100 meters is a large distance, the statement implies an absolute rule that might not always be practical or accurate for all contexts of measurement choice."}, {"text": "Accuracy is less important in sports than in other fields.", "isCorrect": false, "rationale": "Accuracy is crucial in sports to ensure fair competition, as implied by the track being measured in meters 'so every runner covers the same distance'."}], "id": "q05"}, {"question": "A student measures an object and gets a reading of 5 meters. If they wanted to express this measurement in centimeters, what would it be?", "options": [{"text": "0.05 cm", "isCorrect": false, "rationale": "This would be 5 divided by 100, which is incorrect for converting meters to centimeters."}, {"text": "50 cm", "isCorrect": false, "rationale": "This would be 5 multiplied by 10, but 1 meter equals 100 centimeters."}, {"text": "500 cm", "isCorrect": true, "rationale": "Since 1 meter equals 100 centimeters, 5 meters would be 5 multiplied by 100, which is 500 cm."}, {"text": "5000 cm", "isCorrect": false, "rationale": "This would be 5 multiplied by 1000, which is incorrect for converting meters to centimeters."}], "id": "q06"}, {"question": "Which statement best explains why choosing the right unit of measurement (centimeters or meters) is important?", "options": [{"text": "Using only one unit for all measurements makes calculations simpler.", "isCorrect": false, "rationale": "The text advocates for choosing the *appropriate* unit, not a single one for all measurements, as that would lead to confusing numbers."}, {"text": "It ensures that the measured object perfectly fits into a standard category.", "isCorrect": false, "rationale": "Choosing the right unit helps describe the object's size clearly, but doesn't ensure it fits a 'standard category'."}, {"text": "It makes the number easy to understand, preventing tiny decimal values for large objects or huge numbers for small objects.", "isCorrect": true, "rationale": "The text explicitly states that 'picking the right unit makes the number easy to understand' by avoiding confusingly small (e.g., 0.003 m for an ant) or large (e.g., 9000 cm for a soccer field) numbers."}, {"text": "Different tools are only compatible with specific units of measurement.", "isCorrect": false, "rationale": "While different tools (ruler vs. meter stick) are used, the primary reason given for unit choice is clarity and ease of understanding the measurement value itself."}], "id": "q07"}, {"question": "According to the 'teachernote' section, what is a common error students make when using a ruler, and why is it problematic?", "options": [{"text": "They read the numbers from right to left, leading to an inverted measurement.", "isCorrect": false, "rationale": "This error is not mentioned in the 'teachernote' section."}, {"text": "They line up the edge of the ruler instead of the zero mark, which results in an inaccurate measurement.", "isCorrect": true, "rationale": "The 'teachernote' specifically warns that 'Many students line up the edge of the ruler instead of the zero mark,' leading to an incorrect reading."}, {"text": "They only measure the middle section of the object, ignoring the ends.", "isCorrect": false, "rationale": "This error is not mentioned in the 'teachernote' section."}, {"text": "They use a meter stick when a small ruler would be more appropriate.", "isCorrect": false, "rationale": "While a choice error, it's not the 'common error' related to ruler *use* described in the 'teachernote'."}], "id": "q08"}, {"question": "Which pair correctly associates a unit of length with an object whose approximate size helps visualize that unit?", "options": [{"text": "Centimeter: the length of a typical baseball bat.", "isCorrect": false, "rationale": "A baseball bat is used to visualize a meter, not a centimeter."}, {"text": "Meter: the width of your pinky finger.", "isCorrect": false, "rationale": "The width of a pinky finger is used to visualize a centimeter, not a meter."}, {"text": "Centimeter: the width of a paperclip.", "isCorrect": true, "rationale": "The text states a paperclip is 'about 3 cm', making this a good visual reference for a centimeter."}, {"text": "Meter: the length of a new pencil.", "isCorrect": false, "rationale": "A new pencil is about 19 cm, making it too small to visualize a meter."}], "id": "q09"}, {"question": "Based on the rule for choosing the right unit, if an object is 'bigger than your desk' or you are 'measuring a distance across a room,' what unit should you use?", "options": [{"text": "Centimeters, as they are versatile for any size.", "isCorrect": false, "rationale": "Centimeters are for smaller objects, and using them for large objects would result in huge, confusing numbers."}, {"text": "Meters, because these are larger measurements.", "isCorrect": true, "rationale": "The text explicitly states this rule: 'If the object is bigger than your desk (or you are measuring a distance across a room), use meters.'"}, {"text": "Only specific measuring tapes can determine this, not the unit itself.", "isCorrect": false, "rationale": "While meter sticks or measuring tapes are used, the question is about the *unit choice*, which is a conceptual decision."}, {"text": "Either unit, depending on personal preference.", "isCorrect": false, "rationale": "The text provides clear guidelines for choosing the unit, indicating it's not simply a matter of preference but practicality and clarity."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
