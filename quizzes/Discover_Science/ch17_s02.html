    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 17, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following scenarios best illustrates the concept of temperature as described in the text?", "options": [{"text": "A wind vane pointing north, indicating the direction of a cold front.", "isCorrect": false, "rationale": "A wind vane measures wind direction, not temperature. While a cold front might involve temperature changes, the instrument and measurement are incorrect for this concept."}, {"text": "A thermometer showing a reading of 35°C on a summer day, indicating a high amount of heat energy in the air.", "isCorrect": true, "rationale": "The text states that temperature measures how much heat energy is in the air, and a high temperature (like 35°C for a hot summer day) signifies a lot of heat energy. A thermometer is the correct instrument."}, {"text": "An anemometer's cups spinning rapidly, showing strong air movement.", "isCorrect": false, "rationale": "An anemometer measures wind speed, which is about air movement, not directly about the heat energy in the air that defines temperature."}, {"text": "A rain gauge collecting 10 millimeters of water after a thunderstorm.", "isCorrect": false, "rationale": "A rain gauge measures precipitation, which is water falling from the sky, not the heat energy content of the air or temperature."}], "id": "q01"}, {"question": "A student observes that the liquid in a thermometer is moving downwards. Based on the description in the text, what is most likely happening?", "options": [{"text": "The air is gaining heat energy, causing the liquid to contract.", "isCorrect": false, "rationale": "When air gains heat energy, it warms up, and the liquid in the thermometer expands (gets bigger), causing it to move upwards, not contract and move downwards."}, {"text": "The air is losing heat energy, causing the liquid to contract.", "isCorrect": true, "rationale": "The text explains that when the air cools down (loses heat energy), the liquid inside a thermometer contracts (gets smaller), which would result in the liquid moving downwards on the scale."}, {"text": "The air pressure is increasing, pushing the liquid down.", "isCorrect": false, "rationale": "The text attributes the movement of the liquid in a thermometer to temperature changes (expansion/contraction due to heat), not air pressure changes."}, {"text": "The thermometer is being affected by strong wind, causing a decrease in its reading.", "isCorrect": false, "rationale": "Wind speed or presence does not directly cause the liquid in a thermometer to move based on the mechanism described. Temperature changes are the cause."}], "id": "q02"}, {"question": "A meteorologist observes a strong breeze in a coastal area during the daytime. Which of the following is the most probable cause of this wind, according to the text?", "options": [{"text": "The Sun heats the ocean surface more intensely than the land, causing air to rise over the water.", "isCorrect": false, "rationale": "The text states that 'Land heats up faster than water.' Therefore, during the daytime, the land would heat more intensely, causing air to rise over it, not the ocean."}, {"text": "Cooler air from the sea rushes in to replace the warmer, rising air over the faster-heating land.", "isCorrect": true, "rationale": "The text explains that the Sun heats land faster than water. Warm air over the land rises, and cooler air from the water (sea) rushes in to take its place, creating wind (a sea breeze)."}, {"text": "Dark-colored ships in the harbor absorb more heat, creating a localized high-pressure zone.", "isCorrect": false, "rationale": "While dark surfaces absorb more heat, localized effects from ships are unlikely to cause a 'strong breeze' across a coastal area. Also, warm air creates a low-pressure zone, not high pressure."}, {"text": "The rotation of the Earth is directly creating a strong deflection of air currents.", "isCorrect": false, "rationale": "The text attributes wind primarily to the unequal heating of Earth's surface by the Sun and the subsequent movement of air (warm air rising, cool air rushing in), not directly to Earth's rotation, although rotation does influence global wind patterns, it's not the direct mechanism described here for a localized breeze."}], "id": "q03"}, {"question": "Which set of instruments would a meteorologist primarily use to understand a moderate wind blowing from the west, along with its intensity?", "options": [{"text": "A thermometer and a rain gauge", "isCorrect": false, "rationale": "A thermometer measures temperature and a rain gauge measures precipitation. Neither measures wind direction or speed."}, {"text": "A wind vane and an anemometer", "isCorrect": true, "rationale": "The text states that a wind vane shows the direction the wind is coming from, and an anemometer measures how fast the wind is blowing (wind speed). These are the correct instruments for the described task."}, {"text": "An anemometer and a barometer", "isCorrect": false, "rationale": "An anemometer measures wind speed, which is correct, but a barometer (not mentioned in the text for this purpose) measures air pressure, not wind direction."}, {"text": "A rain gauge and a wind vane", "isCorrect": false, "rationale": "A rain gauge measures precipitation. While a wind vane measures wind direction, it doesn't measure wind intensity (speed)."}], "id": "q04"}, {"question": "During a winter storm, a forecast predicts 'freezing rain changing to sleet.' Based on the text, what conditions would lead to the formation of sleet?", "options": [{"text": "Rain falls through a layer of air that is warm enough to keep it liquid until it hits the ground and freezes.", "isCorrect": false, "rationale": "This describes freezing rain, where rain freezes on contact with sub-freezing surfaces, not sleet, which freezes before reaching the ground."}, {"text": "Water vapor freezes directly into delicate, six-sided ice crystals in very cold air.", "isCorrect": false, "rationale": "This describes the formation of snow (snowflakes), not sleet."}, {"text": "Rain falls through a layer of freezing-cold air and turns into small pellets of ice before reaching the ground.", "isCorrect": true, "rationale": "The text defines sleet as forming 'when rain falls through a layer of freezing-cold air and turns to ice before it reaches the ground,' resulting in small pellets of ice."}, {"text": "Strong winds push ice pellets up and down through a tall thunderstorm cloud, adding layers of ice.", "isCorrect": false, "rationale": "This describes the formation of hail, not sleet."}], "id": "q05"}, {"question": "A farmer is concerned about damage to crops from precipitation. If the forecast warns of 'golf ball-sized' precipitation, which form is the farmer most worried about?", "options": [{"text": "Rain, due to its common occurrence and potential for flooding.", "isCorrect": false, "rationale": "While rain can cause damage, the text explicitly mentions 'golf ball' size in relation to hail, which indicates a much more severe and damaging form of precipitation."}, {"text": "Snow, because large accumulations can crush delicate plants.", "isCorrect": false, "rationale": "Snowflakes, while accumulating, are not described as 'golf ball-sized.' This descriptor is specific to hail."}, {"text": "Sleet, as the small ice pellets can cause abrasive damage.", "isCorrect": false, "rationale": "Sleet consists of 'small pellets of ice,' not golf ball-sized lumps. While it can be damaging, the descriptor doesn't match sleet."}, {"text": "Hail, which forms in layers and can reach significant sizes.", "isCorrect": true, "rationale": "The text states that 'Some hailstones can be as big as a golf ball!' and describes them as 'balls or lumps of ice,' which would cause significant damage to crops."}], "id": "q06"}, {"question": "After a sudden rainstorm, a homeowner wants to determine how much water has fallen on their garden. Which instrument should they check?", "options": [{"text": "A thermometer, to see if the temperature changed during the storm.", "isCorrect": false, "rationale": "A thermometer measures temperature, not the amount of rainfall. While temperature changes might occur during a storm, it won't tell them rainfall quantity."}, {"text": "A wind vane, to know the direction the storm came from.", "isCorrect": false, "rationale": "A wind vane measures wind direction, not the amount of precipitation."}, {"text": "A rain gauge, by reading the markings on its side.", "isCorrect": true, "rationale": "The text describes a rain gauge as 'a simple tool used to measure precipitation' that 'collects and measures how much rain has fallen' by reading its markings."}, {"text": "An anemometer, to see how strong the winds were during the storm.", "isCorrect": false, "rationale": "An anemometer measures wind speed, not the amount of rainfall."}], "id": "q07"}, {"question": "A meteorologist uses a variety of tools beyond basic instruments to create accurate forecasts. What is one of the key advanced tools mentioned in the text for this purpose?", "options": [{"text": "Powerful telescopes to observe distant weather systems on other planets.", "isCorrect": false, "rationale": "The text mentions satellites, weather balloons, and computers for weather forecasting, but not telescopes for observing other planets' weather."}, {"text": "Advanced microscopes to study the formation of individual snowflakes.", "isCorrect": false, "rationale": "While interesting, microscopes for individual snowflake study are not listed as a primary tool for making weather forecasts covering broad areas."}, {"text": "Satellites, weather balloons, and computers to gather data and process information.", "isCorrect": true, "rationale": "The text explicitly states that meteorologists use 'all of these instruments — plus satellites, weather balloons, and computers — to predict what the weather will do next.'"}, {"text": "Seismographs to detect ground vibrations caused by severe weather.", "isCorrect": false, "rationale": "Seismographs measure seismic activity (earthquakes), which is not listed as a tool for weather forecasting in the text."}], "id": "q08"}, {"question": "Imagine you are helping a meteorologist monitor local weather. If you observe an anemometer spinning very fast, a wind vane pointing consistently to the east, and a thermometer reading 5°C, what would be your most accurate summary of the weather at that moment?", "options": [{"text": "A hot, calm day with light rain from the west.", "isCorrect": false, "rationale": "A thermometer reading of 5°C is cool, not hot. A fast-spinning anemometer indicates strong wind, not calm. A wind vane pointing east means wind from the east, not west. Rain is not indicated by these instruments."}, {"text": "A cool day with strong winds blowing from the east.", "isCorrect": true, "rationale": "A thermometer reading of 5°C is described as a 'cool winter day' in the text. An anemometer spinning fast indicates strong wind. A wind vane pointing east means the wind is coming from the east."}, {"text": "A comfortable day with gentle breezes and freezing precipitation.", "isCorrect": false, "rationale": "A 5°C reading is cool, not comfortable (which is 20°C). A fast-spinning anemometer indicates strong winds, not gentle breezes. Freezing precipitation is not directly indicated by these instrument readings alone."}, {"text": "A warm day with wind coming from the west and heavy rainfall.", "isCorrect": false, "rationale": "A 5°C reading is cool, not warm. A wind vane pointing east means wind from the east, not west. Heavy rainfall is not indicated by these instruments."}], "id": "q09"}, {"question": "The text states that 'today's five-day forecast is more accurate than a one-day forecast was 40 years ago.' Which of the following best explains this improvement?", "options": [{"text": "A general increase in global temperatures making weather patterns simpler to predict.", "isCorrect": false, "rationale": "The text does not link forecasting accuracy to global temperature changes or simpler weather patterns. Climate change often makes weather more, not less, complex."}, {"text": "More people are observing weather conditions in their backyards with simple instruments.", "isCorrect": false, "rationale": "While backyard observations can be interesting, the significant improvement in forecasting accuracy is attributed to professional tools and technology, not widespread amateur observation."}, {"text": "The development of powerful computers and sophisticated instruments like satellites and weather balloons.", "isCorrect": true, "rationale": "The text explicitly states that 'Thanks to modern instruments and powerful computers, today's five-day forecast is more accurate...' This aligns with the mention of satellites and weather balloons as tools meteorologists use."}, {"text": "Changes in Earth's gravitational pull making precipitation easier to measure.", "isCorrect": false, "rationale": "Earth's gravitational pull is constant and does not change to make precipitation easier to measure or improve forecast accuracy over time. This is not mentioned in the text."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
