<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 13, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the most accurate definition of a molecule according to the text?", "options": [{"text": "The smallest unit of an element that retains its properties.", "isCorrect": false, "rationale": "This definition describes an atom, not a molecule, which is typically composed of multiple atoms."}, {"text": "A particle made of two or more atoms joined together.", "isCorrect": true, "rationale": "The text explicitly defines a molecule as 'a particle made of two or more atoms joined together' and 'the smallest piece of a substance that still acts like that substance.'"}, {"text": "Any single, unbroken particle found in a substance.", "isCorrect": false, "rationale": "While a molecule is a particle, the key part of its definition is that it is made of *two or more atoms joined together*, not just any single particle."}, {"text": "A type of energy that causes atoms to connect.", "isCorrect": false, "rationale": "Energy is involved in forming bonds, but a molecule itself is a particle, not a form of energy."}]}, {"question": "The text uses the term 'bond' to describe what happens when atoms 'snap together.' What does a bond represent in this context?", "options": [{"text": "A temporary attraction that causes atoms to briefly collide.", "isCorrect": false, "rationale": "The text describes a bond as a 'strong connection' that holds atoms together, implying more than a temporary attraction or collision."}, {"text": "A strong connection that holds atoms together in a molecule.", "isCorrect": true, "rationale": "The text defines 'Bond' as 'a strong connection that holds atoms together in a molecule,' directly aligning with this option."}, {"text": "The process by which atoms exchange electrons to become stable.", "isCorrect": false, "rationale": "While technically true in chemistry, the text explicitly states for this level to 'Simply describe bonds as “strong connections” that hold atoms together,' avoiding complex distinctions like electron exchange."}, {"text": "The physical merging of two atoms into a single, new atom.", "isCorrect": false, "rationale": "Atoms bond to form molecules, but they do not merge into a *new single atom*; their individual identities are maintained within the molecule."}]}, {"question": "Using the LEGO analogy from the text, if individual LEGO bricks represent atoms, what would a complex LEGO creation, like a spaceship built from many different bricks, represent?", "options": [{"text": "An individual atom of a pure element.", "isCorrect": false, "rationale": "Individual bricks represent individual atoms, not a complex creation."}, {"text": "The physical bond between two atoms.", "isCorrect": false, "rationale": "The 'snapping together' action represents bonding, not the finished creation itself."}, {"text": "A molecule, formed by multiple atoms joined together.", "isCorrect": true, "rationale": "The text states, 'By themselves, they are just bricks. But when you snap them together, you can build a house, a car, or a spaceship... Individual atoms snap together... to form molecules.'"}, {"text": "A pure, unreactive substance.", "isCorrect": false, "rationale": "The analogy focuses on structure and combination, not reactivity or purity in this context."}]}, {"question": "Which of the following statements accurately distinguishes an atom from a molecule, based on the provided text?", "options": [{"text": "Atoms are always visible, while molecules are always invisible.", "isCorrect": false, "rationale": "The text does not discuss the visibility of atoms or molecules, and both are generally invisible to the naked eye."}, {"text": "An atom is a single building block, and a molecule is a group of atoms bonded together.", "isCorrect": true, "rationale": "The text clearly states, 'An atom is a single building block — the smallest piece. A molecule is a group of atoms bonded together.'"}, {"text": "Molecules can only exist as gases, whereas atoms can be found in solids, liquids, or gases.", "isCorrect": false, "rationale": "This is incorrect; molecules like water (H2O) can exist as solids, liquids, or gases."}, {"text": "Atoms change their elemental identity when they form a molecule, but molecules do not.", "isCorrect": false, "rationale": "Atoms retain their elemental identity even when bonded into molecules. Hydrogen atoms remain hydrogen atoms in a water molecule."}]}, {"question": "The text describes simple molecule models. How many atoms are typically represented in a single molecule of carbon dioxide (CO2)?", "options": [{"text": "One carbon atom and one oxygen atom.", "isCorrect": false, "rationale": "This would represent carbon monoxide (CO), not carbon dioxide (CO2)."}, {"text": "Two carbon atoms and one oxygen atom.", "isCorrect": false, "rationale": "This combination (C2O) is not carbon dioxide; carbon dioxide has one carbon and two oxygen atoms."}, {"text": "One carbon atom and two oxygen atoms.", "isCorrect": true, "rationale": "The text states, 'Carbon dioxide has three atoms: one carbon and two oxygen,' making this the correct composition."}, {"text": "Only oxygen atoms, as carbon is only a structural component.", "isCorrect": false, "rationale": "Carbon is an integral part of the carbon dioxide molecule, not just a structural component, and oxygen atoms alone would be oxygen gas (O2)."}]}, {"question": "The 'Think About It' section explains that hydrogen and oxygen, both flammable or life-supporting gases, combine to form water, a liquid that puts out fire. What is the main conclusion an educational content specialist would want students to draw from this example?", "options": [{"text": "Gases are inherently more dangerous than liquids.", "isCorrect": false, "rationale": "This is a generalization not directly supported by the example, which focuses on the change in properties upon bonding, not the state of matter itself as a measure of danger."}, {"text": "Atoms lose their individual properties completely once they form a bond.", "isCorrect": false, "rationale": "Atoms retain their identity (e.g., still hydrogen and oxygen), but the *molecule* formed has completely different *properties* than the individual atoms or their pure forms. This option suggests atoms lose their identity, which is incorrect."}, {"text": "The properties of a molecule can be dramatically different from the properties of the individual atoms it is made of.", "isCorrect": true, "rationale": "This is the core concept illustrated: individual atoms (hydrogen and oxygen) have certain properties, but when they bond to form a molecule (water), the resulting substance has entirely new and different properties."}, {"text": "All dangerous gases will combine to form a safe liquid.", "isCorrect": false, "rationale": "This is an overgeneralization and is not supported by the text; it's a specific example, not a universal rule for all substances."}]}, {"question": "The text notes that 'the same bricks (atoms) can be put together in different ways to make completely different things.' Which of the following best exemplifies this principle?", "options": [{"text": "Water (H2O) and oxygen gas (O2) are both colorless gases.", "isCorrect": false, "rationale": "This comparison does not illustrate using the *same atoms* in different ways, as water contains hydrogen and oxygen, while oxygen gas contains only oxygen."}, {"text": "A single atom of oxygen and a single atom of carbon each have unique properties.", "isCorrect": false, "rationale": "This statement describes individual atoms, not how they combine to form different things."}, {"text": "If you have only carbon and oxygen atoms, you can form both carbon monoxide (CO) and carbon dioxide (CO2), which have different properties.", "isCorrect": true, "rationale": "This option accurately shows how the *same types of atoms* (carbon and oxygen) can be combined in *different ratios or arrangements* to create *different molecules* with different properties, such as CO and CO2."}, {"text": "Helium is made of single atoms, unlike most other substances.", "isCorrect": false, "rationale": "This describes an exception to bonding, not the principle of combining atoms in different ways."}]}, {"question": "Which substance is specifically mentioned in the text as an example of a substance made of just single atoms that are not bonded to anything else?", "options": [{"text": "Water (H2O)", "isCorrect": false, "rationale": "Water is a molecule made of two hydrogen atoms and one oxygen atom bonded together."}, {"text": "Oxygen gas (O2)", "isCorrect": false, "rationale": "Oxygen gas is a molecule made of two oxygen atoms bonded together."}, {"text": "Helium", "isCorrect": true, "rationale": "The text explicitly states: 'For example, helium — the gas that makes balloons float — is made of single helium atoms flying around by themselves.'"}, {"text": "Carbon dioxide (CO2)", "isCorrect": false, "rationale": "Carbon dioxide is a molecule made of one carbon atom and two oxygen atoms bonded together."}]}, {"question": "In the simple molecule models described, what do the lines (or sticks) that connect the circles (or balls) specifically represent?", "options": [{"text": "The relative size of the atoms.", "isCorrect": false, "rationale": "The circles represent atoms, and their size might indicate relative size, but the lines do not."}, {"text": "The direction of atomic movement.", "isCorrect": false, "rationale": "These models show static connections, not movement paths."}, {"text": "The bonds holding the atoms together.", "isCorrect": true, "rationale": "The text states, 'Each atom is drawn as a circle (or ball), and the bonds between them are drawn as lines (or sticks).'"}, {"text": "The electrical charge of the molecule.", "isCorrect": false, "rationale": "The models simplify representation and do not typically depict electrical charge at this introductory level."}]}, {"question": "According to the section, what is the fundamental reason why most atoms join together?", "options": [{"text": "To increase their individual mass and become heavier.", "isCorrect": false, "rationale": "While molecules are heavier than individual atoms, increasing mass is a consequence, not the fundamental reason atoms bond. The fundamental reason relates to forming stable substances."}, {"text": "To form molecules, which are the smallest pieces of a substance that still act like that substance.", "isCorrect": true, "rationale": "The text emphasizes that atoms rarely stay alone and join to form molecules, which are the fundamental units defining a substance's properties. This captures the main idea of why atoms join."}, {"text": "To change their elemental identity into a new type of atom.", "isCorrect": false, "rationale": "Atoms retain their elemental identity when they bond to form molecules; they do not transform into different elements."}, {"text": "To become single, isolated particles that float freely.", "isCorrect": false, "rationale": "Atoms join to form *groups* (molecules), which is the opposite of becoming single, isolated particles. Only a few rare elements like helium exist primarily as single atoms."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
