        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes a key characteristic of forces as introduced in the section?", "options": [{"text": "All forces require direct physical contact between objects.", "isCorrect": false, "rationale": "The text explicitly states, 'You do not always have to touch something to push or pull it. Some forces work from a distance!'"}, {"text": "Some forces can act on objects without direct touch.", "isCorrect": true, "rationale": "The opening sentence of the section highlights that 'You do not always have to touch something to push or pull it. Some forces work from a distance!'"}, {"text": "Forces are primarily pushing actions.", "isCorrect": false, "rationale": "The text mentions forces as both pushes and pulls, for example, in the definition of gravity as a pulling force and magnets being able to push or pull."}, {"text": "Forces only become active when an object is in motion.", "isCorrect": false, "rationale": "Gravity, for instance, 'never takes a break' and acts on objects even when they are stationary, like keeping your feet on the ground."}], "id": "q01"}, {"question": "According to the text, what is gravity?", "options": [{"text": "A pushing force that keeps objects from falling.", "isCorrect": false, "rationale": "Gravity is described as a 'pulling force' and is the reason things 'fall down when you drop them,' not a force that keeps them from falling."}, {"text": "The force your muscles create to lift things.", "isCorrect": false, "rationale": "This describes 'muscular force,' not gravity."}, {"text": "A pulling force that acts on everything, drawing objects toward Earth and each other.", "isCorrect": true, "rationale": "The text defines gravity as 'the force that pulls objects toward Earth (and toward each other)' and states it 'is a pulling force that acts on everything.'"}, {"text": "A force that only affects objects in space, like the Moon.", "isCorrect": false, "rationale": "While gravity affects the Moon's orbit, the text also states it 'keeps your feet on the ground' and acts on 'everything' on Earth."}], "id": "q02"}, {"question": "If Earth suddenly lost its gravitational force, which of the following scenarios would most likely occur first?", "options": [{"text": "The Moon would stop orbiting Earth.", "isCorrect": true, "rationale": "The text explicitly states, 'Gravity keeps the Moon orbiting Earth' and 'Without gravity, everything would float away into space!'"}, {"text": "People would find it easier to open jars.", "isCorrect": false, "rationale": "Opening jars primarily involves muscular force, which is independent of Earth's gravity."}, {"text": "Sailboats would move faster across lakes.", "isCorrect": false, "rationale": "Sailboats move due to wind force, which is separate from gravity."}, {"text": "Stretched rubber bands would no longer pull back.", "isCorrect": false, "rationale": "The pulling back of a stretched rubber band is due to elastic force, not gravity."}], "id": "q03"}, {"question": "Which of the following actions primarily involves muscular force, as described in the text?", "options": [{"text": "A leaf being blown off a tree by wind.", "isCorrect": false, "rationale": "This action is primarily due to wind, as mentioned in 'Wind — Moving air pushes on things. Wind can ... blow leaves off a tree.'"}, {"text": "A magnet attracting a metal paperclip.", "isCorrect": false, "rationale": "This is an example of magnetic force, not muscular force."}, {"text": "Picking up a heavy backpack.", "isCorrect": true, "rationale": "The text lists 'Picking up your backpack' as a direct example of using muscular force."}, {"text": "A ball falling to the ground after being thrown up.", "isCorrect": false, "rationale": "The ball falling is an effect of gravity, not muscular force."}], "id": "q04"}, {"question": "A child stretches a rubber band and then releases it, causing it to snap back. Which force is primarily demonstrated in the snapping back action?", "options": [{"text": "Magnetic force", "isCorrect": false, "rationale": "Magnetic force involves magnets and specific metals, which are not present in this scenario."}, {"text": "Gravity", "isCorrect": false, "rationale": "Gravity pulls objects downward; it does not cause a stretched object to snap back to its original shape."}, {"text": "Elastic force", "isCorrect": true, "rationale": "The text defines 'Elastic force' as 'A stretched rubber band pulls back when you let go.'"}, {"text": "Muscular force", "isCorrect": false, "rationale": "Muscular force is used to *stretch* the rubber band, but the *snapping back* is due to the elastic properties of the rubber band itself."}], "id": "q05"}, {"question": "What makes magnetic force distinct from muscular force, according to the text?", "options": [{"text": "Magnetic force is always a pulling force, while muscular force is always a pushing force.", "isCorrect": false, "rationale": "The text states magnets 'can push or pull,' and muscular force can also lift, push, or pull."}, {"text": "Magnetic force acts on specific metals without requiring physical contact.", "isCorrect": true, "rationale": "The text states, 'Magnets can push or pull certain metals without touching them,' which highlights the 'from a distance' aspect unique to some forces like magnetism, unlike muscular force which requires contact with the object being affected."}, {"text": "Magnetic force only works when objects are in motion.", "isCorrect": false, "rationale": "The text does not state that magnetic force requires motion; magnets can attract stationary objects."}, {"text": "Magnetic force keeps celestial bodies in orbit, unlike muscular force.", "isCorrect": false, "rationale": "Gravity is the force responsible for keeping celestial bodies in orbit, not magnetic force."}], "id": "q06"}, {"question": "Imagine you are trying to fly a kite. Which of the following forces is essential for the kite to stay airborne and move?", "options": [{"text": "Muscular force, because you are holding the string.", "isCorrect": false, "rationale": "Muscular force holds the string, but it doesn't primarily keep the kite airborne or move it. Wind is the primary force for flight."}, {"text": "Gravity, pulling the kite upward.", "isCorrect": false, "rationale": "Gravity pulls objects *downward*, so it would work against the kite staying airborne."}, {"text": "Wind, pushing on the kite's surface.", "isCorrect": true, "rationale": "The text states, 'Wind — Moving air pushes on things. Wind can push a sailboat across a lake or blow leaves off a tree,' indicating it's the pushing force that would keep a kite aloft and moving."}, {"text": "Elastic force, from the kite string.", "isCorrect": false, "rationale": "The kite string is typically not elastic in a way that would contribute to the kite's flight, and elastic force is not the primary force for keeping it airborne."}], "id": "q07"}, {"question": "The text states that gravity 'keeps the Moon orbiting Earth' and 'keeps Earth orbiting the Sun.' This illustrates that gravity is responsible for:", "options": [{"text": "Causing all objects to fall directly downwards.", "isCorrect": false, "rationale": "While gravity causes objects to fall, orbiting is a continuous motion around another object, not a direct fall."}, {"text": "The perpetual motion of celestial bodies around larger objects.", "isCorrect": true, "rationale": "The description of the Moon orbiting Earth and Earth orbiting the Sun directly illustrates gravity's role in maintaining the continuous, circular motion of celestial bodies around a central mass."}, {"text": "Preventing objects from ever moving away from their current position.", "isCorrect": false, "rationale": "Objects in orbit are constantly moving; gravity prevents them from floating away but doesn't keep them stationary."}, {"text": "The creation of all forces in the universe.", "isCorrect": false, "rationale": "Gravity is one type of force; the text does not suggest it creates all other forces like muscular or magnetic force."}], "id": "q08"}, {"question": "Based on the 'sciencelife' section, what must be true about a slide that is designed to make children go faster?", "options": [{"text": "It must have a very rough surface to increase friction.", "isCorrect": false, "rationale": "The text states, 'friction between your clothes and the slide surface slows you to a stop,' so a rough surface would make it slower, not faster."}, {"text": "It must be less steep, to reduce the pulling effect of gravity.", "isCorrect": false, "rationale": "The text explicitly states, 'The steeper the slide, the stronger the pulling effect, and the faster you go.'"}, {"text": "It must be steeper, to enhance the downward pull of gravity.", "isCorrect": true, "rationale": "The 'sciencelife' box explains, 'The steeper the slide, the stronger the pulling effect, and the faster you go,' indicating that a steeper slide uses gravity more effectively for speed."}, {"text": "It must be made of a magnetic material to repel the child.", "isCorrect": false, "rationale": "The text makes no mention of magnetism being involved in slides, and repulsion would not lead to sliding down for fun."}], "id": "q09"}, {"question": "Which of the following scenarios describes a force that *always* requires physical contact between objects to exert its effect, according to the provided text?", "options": [{"text": "A magnet attracting a nail.", "isCorrect": false, "rationale": "The text specifies that magnets can push or pull 'without touching them,' indicating magnetic force does not always require physical contact."}, {"text": "The Moon orbiting Earth.", "isCorrect": false, "rationale": "Gravity is described as a force that 'works from a distance' and doesn't require physical contact for celestial bodies to orbit."}, {"text": "A person lifting a box.", "isCorrect": true, "rationale": "Lifting a box is an act of 'muscular force,' which is always described with examples requiring direct physical interaction (lift, push, pull, throw, carry, pick up, open, pedal)."}, {"text": "Wind pushing a sailboat.", "isCorrect": false, "rationale": "Wind is 'moving air' that 'pushes on things' without direct physical contact in the way a person lifts an object."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
