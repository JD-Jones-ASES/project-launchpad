<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental strategy scientists use to separate components of a mixture?", "options": [{"text": "Changing the state of matter of the entire mixture.", "isCorrect": false, "rationale": "While some methods like evaporation involve a change of state for one component, it's not the overarching strategy for all separations, nor for the entire mixture."}, {"text": "Identifying and exploiting a distinct physical property of one component.", "isCorrect": true, "rationale": "The text states, 'The trick is to find a property that makes one ingredient different from the others,' which is the core principle behind all separation methods discussed."}, {"text": "Applying extreme heat or cold to the mixture.", "isCorrect": false, "rationale": "Extreme temperatures are not universally required for separation, and many methods (sorting, magnetism) do not involve them."}, {"text": "Using only methods that involve dissolving one component.", "isCorrect": false, "rationale": "Not all separation methods involve dissolving; for example, sorting, filtering, and magnetism work on undissolved components."}], "id": "q01"}, {"question": "You are given a bowl containing large pebbles, small grains of sand, and some dried leaves. Which method would be most effective for separating the pebbles from the rest of the mixture *first*?", "options": [{"text": "Filtering.", "isCorrect": false, "rationale": "Filtering is designed for solids mixed with liquids or very fine particles, and would not be efficient for separating large pebbles from other solids."}, {"text": "Evaporation.", "isCorrect": false, "rationale": "Evaporation is used for separating dissolved solids from liquids, which is not applicable to a mixture of dry solids like pebbles, sand, and leaves."}, {"text": "Sorting by hand.", "isCorrect": true, "rationale": "The text states, 'Sorting works well when the pieces are big enough to see and handle,' which perfectly describes pebbles in this mixture."}, {"text": "Using a magnet.", "isCorrect": false, "rationale": "Pebbles, sand, and leaves are generally not magnetic, so this method would be ineffective."}], "id": "q02"}, {"question": "Why is filtering ineffective for separating sugar that has completely dissolved in water?", "options": [{"text": "Sugar is magnetic and would stick to the filter.", "isCorrect": false, "rationale": "Sugar is not magnetic, so this is not why filtering fails."}, {"text": "The water would evaporate before it could be filtered.", "isCorrect": false, "rationale": "Filtering is a relatively quick process; evaporation would not typically occur significantly during the filtering process."}, {"text": "Dissolved sugar particles are too small to be caught by ordinary filter holes.", "isCorrect": true, "rationale": "The text explicitly states, 'It does not work for solutions — dissolved sugar particles are so small that they slip right through any ordinary filter.'"}, {"text": "Filtering only works for mixtures of two solids.", "isCorrect": false, "rationale": "Filtering works for solids mixed with liquids, as demonstrated with sand and water, as long as the solid particles are large enough."}], "id": "q03"}, {"question": "A chef accidentally spills a box of salt into a pot of boiling water, creating a very salty solution. To recover the salt, which method should the chef use?", "options": [{"text": "Pour the mixture through a fine sieve.", "isCorrect": false, "rationale": "Salt is dissolved in the water, meaning its particles are too small to be caught by a sieve or filter."}, {"text": "Allow the water to completely boil away, leaving the salt behind.", "isCorrect": true, "rationale": "This describes evaporation, which the text explains is used to recover dissolved solids from a liquid: 'The sugar cannot evaporate, so it stays behind as white crystals... This is the same process that happens at the ocean shore... leaving behind a thin crust of salt.'"}, {"text": "Add more water to dilute the salt, then filter.", "isCorrect": false, "rationale": "Diluting the salt will not make it undissolve, so filtering will still be ineffective for separating the salt from the water."}, {"text": "Use a strong magnet to pull the salt out.", "isCorrect": false, "rationale": "Salt (sodium chloride) is not magnetic, so this method would not work."}], "id": "q04"}, {"question": "You have a mixture of iron filings, sand, and water. Which separation method would be *least* useful if your goal is to separate *all three* components from each other?", "options": [{"text": "Using a magnet.", "isCorrect": false, "rationale": "A magnet would be very effective for separating the iron filings, making it useful in the overall separation process."}, {"text": "Filtering.", "isCorrect": false, "rationale": "Filtering would be useful for separating the sand (a solid) from the water, and also the iron filings if they were not already removed by a magnet, making it a valuable step."}, {"text": "Evaporation.", "isCorrect": false, "rationale": "If the water contained any dissolved substances (though not specified for sand and iron filings, water itself is a component to be separated), evaporation would be useful to separate it from any non-volatile solids."}, {"text": "Sorting by hand.", "isCorrect": true, "rationale": "Both iron filings and sand grains are typically too small to be effectively sorted by hand, and the presence of water makes this method impractical and inefficient for separating any of the components."}], "id": "q05"}, {"question": "What is the key difference in *what* evaporation and filtering are designed to separate?", "options": [{"text": "Evaporation separates mixtures based on magnetism, while filtering separates based on particle size.", "isCorrect": false, "rationale": "Evaporation separates based on differences in boiling points/volatility, not magnetism."}, {"text": "Evaporation separates dissolved solids from liquids, while filtering separates undissolved solids from liquids.", "isCorrect": true, "rationale": "The text clearly states filtering 'does not work for solutions' and that evaporation is used to get 'dissolved solids from a solution,' while filtering is for 'solids mixed with liquids' where particles are trapped."}, {"text": "Evaporation separates liquids from gases, while filtering separates gases from solids.", "isCorrect": false, "rationale": "Evaporation separates a liquid from a dissolved solid by changing the liquid to a gas; filtering separates solids from liquids."}, {"text": "Evaporation separates large visible pieces, while filtering separates very small pieces.", "isCorrect": false, "rationale": "Sorting separates large visible pieces. Evaporation separates dissolved particles (which are very small), but filtering separates undissolved particles that are larger than the filter holes."}], "id": "q06"}, {"question": "Imagine you accidentally drop a box of small metal staples into a pile of wood shavings. Which separation method would be the most efficient and effective?", "options": [{"text": "Sifting the mixture through a colander.", "isCorrect": false, "rationale": "While a colander might separate some components, staples could be too small or wood shavings too large/irregular for consistent sifting, and it's not the most specific method."}, {"text": "Carefully picking out each staple by hand.", "isCorrect": false, "rationale": "This is a form of sorting, but given the small size and potentially large number of staples, it would be very time-consuming and not the most efficient."}, {"text": "Waving a strong magnet over the mixture.", "isCorrect": true, "rationale": "As discussed in the 'Think About It' section, paperclips (and typically staples) are made of steel, which is magnetic. This method would quickly and effectively separate them from non-magnetic wood shavings."}, {"text": "Pouring water over the mixture to float the wood shavings.", "isCorrect": false, "rationale": "Not all wood shavings might float, and the staples would get wet, making subsequent separation or drying necessary, and it's not as clean or direct as magnetism."}], "id": "q07"}, {"question": "When filtering muddy water through a coffee filter, how does the filter physically separate the mud from the water?", "options": [{"text": "The filter chemically reacts with the mud, causing it to solidify.", "isCorrect": false, "rationale": "Filters generally act as physical barriers, not chemical reactants, in the separation process."}, {"text": "The filter's tiny holes are large enough for water molecules but too small for mud particles.", "isCorrect": true, "rationale": "The definition of filtering states it uses 'tiny holes that let small particles through but trap larger ones.' Water molecules are much smaller than mud particles, which get trapped."}, {"text": "The filter absorbs the mud particles, while the water passes around them.", "isCorrect": false, "rationale": "While some absorption might occur, the primary mechanism is trapping particles too large for the holes, not absorbing them entirely."}, {"text": "The water's surface tension causes the mud to cling to the filter's surface.", "isCorrect": false, "rationale": "Surface tension is not the primary mechanism for separating mud particles from water in filtering."}], "id": "q08"}, {"question": "You have a mixture containing iron filings, sand, and dissolved salt in water. What is the *most logical sequence* of steps to separate all three components cleanly?", "options": [{"text": "Evaporate the water, then use a magnet, then filter.", "isCorrect": false, "rationale": "Evaporating first would leave a mixture of salt, sand, and iron filings, making subsequent separation harder, especially of the sand from the salt."}, {"text": "Use a magnet, then filter the remaining mixture, then evaporate the filtered liquid.", "isCorrect": true, "rationale": "This is the most logical sequence: 1. Magnetism removes iron filings. 2. Filtering separates undissolved sand from the salt water solution. 3. Evaporation separates the dissolved salt from the water."}, {"text": "Filter the mixture, then evaporate the liquid, then use a magnet.", "isCorrect": false, "rationale": "Filtering first would separate sand and iron filings together (if they don't block the filter entirely) from the salt water. Separating iron from wet sand, or sand with collected iron, is less efficient than using a magnet first."}, {"text": "Sort by hand, then filter, then use a magnet.", "isCorrect": false, "rationale": "Sorting by hand is impractical for these small components, especially when mixed with water and dissolved salt. The magnet should be used when the iron is still easily accessible."}], "id": "q09"}, {"question": "The overall principle guiding the choice of a separation method for any mixture is to:", "options": [{"text": "Always start with the simplest method, like sorting, regardless of the mixture.", "isCorrect": false, "rationale": "While sorting is simple, it's only effective for mixtures with large, visible pieces; it's not universally applicable."}, {"text": "Select a method that changes the chemical composition of one component.", "isCorrect": false, "rationale": "Separation methods are typically physical processes that separate components based on their existing properties, not chemical reactions that change their composition."}, {"text": "Identify a physical property that is significantly different between the components to be separated.", "isCorrect": true, "rationale": "The text emphasizes, 'The trick is to find a property that makes one ingredient different from the others.' This could be size, magnetism, boiling point, etc."}, {"text": "Use only methods that require heating or cooling the mixture.", "isCorrect": false, "rationale": "Not all separation methods involve temperature changes; sorting, filtering, and magnetism do not inherently require heating or cooling."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
