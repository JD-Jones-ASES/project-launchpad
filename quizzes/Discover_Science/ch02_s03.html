<body>

        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "If a newly discovered exoplanet were described as being in its star's 'Goldilocks Zone,' which of the following conditions would be most likely true about it?", "options": [{"text": "It has a very dense atmosphere primarily composed of methane.", "isCorrect": false, "rationale": "While atmospheric composition is important, the 'Goldilocks Zone' specifically refers to the distance from a star where conditions are 'just right' for liquid water to exist, not the atmospheric makeup."}, {"text": "It is at a distance where liquid water could exist on its surface.", "isCorrect": true, "rationale": "The text explains the Goldilocks Zone as the 'just right' distance from the Sun for liquid water to exist on its surface, not too hot and not too cold."}, {"text": "Its surface temperature is extremely cold, preventing any form of life.", "isCorrect": false, "rationale": "Being in the Goldilocks Zone means it's not too cold; extreme cold would prevent liquid water from forming, contradicting the definition."}, {"text": "It is too close to its star, causing all water to evaporate.", "isCorrect": false, "rationale": "Being in the Goldilocks Zone means it's not too hot; being too close would cause water to evaporate, which is the 'too hot' scenario."}], "id": "q01"}, {"question": "According to the text, what is the primary reason why liquid water is considered essential for life on Earth?", "options": [{"text": "It helps in the formation of breathable oxygen.", "isCorrect": false, "rationale": "While water is involved in many planetary processes, the text directly states 'Water is essential for all life' as the primary reason for its importance, without specifying its role in oxygen formation."}, {"text": "It creates a protective shield against harmful solar rays.", "isCorrect": false, "rationale": "The protective shield against harmful rays is a function of Earth's atmosphere, not liquid water."}, {"text": "All known life forms require water to survive and function.", "isCorrect": true, "rationale": "The text explicitly states: 'Water is essential for all life,' making this the direct and primary reason for its importance."}, {"text": "It is the main component that keeps Earth warm enough for life.", "isCorrect": false, "rationale": "The atmosphere, specifically its ability to trap heat, is responsible for keeping the planet warm enough, as mentioned in the text."}], "id": "q02"}, {"question": "Earth's atmosphere serves two crucial functions for life as described in the text. Besides providing breathable air, what is the other major role it plays?", "options": [{"text": "It creates the 'blue marble' appearance from space.", "isCorrect": false, "rationale": "The 'blue marble' is a visual description of Earth, not a functional role of the atmosphere in supporting life."}, {"text": "It generates the magnetic field that protects the planet.", "isCorrect": false, "rationale": "The Earth's magnetic field is generated by its molten outer core, not by the atmosphere itself. This is not mentioned in the provided text."}, {"text": "It acts as a shield, blocking harmful solar rays and regulating temperature.", "isCorrect": true, "rationale": "The text clearly states, 'Earth's atmosphere acts like a shield. It blocks harmful rays from the Sun and keeps the planet warm enough for life,' outlining its protective and temperature-regulating roles."}, {"text": "It converts solar energy directly into liquid water.", "isCorrect": false, "rationale": "The atmosphere does not convert solar energy into liquid water. Its role is primarily protection and gas composition."}], "id": "q03"}, {"question": "Based on the comparison table, which statement accurately describes Mars's conditions compared to Earth's?", "options": [{"text": "Mars has a very thin atmosphere, but it contains some oxygen.", "isCorrect": false, "rationale": "The table indicates Mars has a 'Very thin, no oxygen' atmosphere, making this statement inaccurate."}, {"text": "Mars has large amounts of liquid water on its surface, similar to Earth.", "isCorrect": false, "rationale": "The table explicitly states 'No' for liquid water on Mars, contradicting this statement. The text also mentions Mars has 'some ice, but no flowing rivers or oceans.'"}, {"text": "Mars has some ice, but its atmosphere is not breathable and it's very cold.", "isCorrect": true, "rationale": "The text mentions Mars has 'some ice,' and the table confirms 'No' for breathable air ('Very thin, no oxygen') and 'Very cold' for temperature, accurately summarizing its conditions."}, {"text": "Mars's temperature is 'just right' for life, but it lacks breathable air.", "isCorrect": false, "rationale": "The table states Mars's temperature is 'Very cold,' not 'just right,' making this statement incorrect."}], "id": "q04"}, {"question": "What percentage of Earth's air is composed of oxygen, the gas essential for human respiration?", "options": [{"text": "Approximately 78%", "isCorrect": false, "rationale": "78% is the approximate percentage of nitrogen in Earth's atmosphere, not oxygen."}, {"text": "Approximately 1%", "isCorrect": false, "rationale": "1% typically represents the percentage of argon and other trace gases in Earth's atmosphere."}, {"text": "Approximately 21%", "isCorrect": true, "rationale": "The text explicitly states: 'Earth's air contains about 21% oxygen — the gas you need to breathe.'"}, {"text": "Approximately 0.04%", "isCorrect": false, "rationale": "0.04% is the approximate percentage of carbon dioxide in Earth's atmosphere, not oxygen."}], "id": "q05"}, {"question": "The text states that without its protective atmosphere, 'Earth would be as cold and lifeless as the Moon.' This implies that a celestial body lacking a significant atmosphere would experience what primary environmental challenge?", "options": [{"text": "An abundance of liquid water due to lack of evaporation.", "isCorrect": false, "rationale": "Without atmospheric pressure, liquid water would either quickly freeze or boil away depending on temperature, not become abundant. An atmosphere also helps regulate temperature."}, {"text": "Stable, moderate temperatures throughout the day and night.", "isCorrect": false, "rationale": "An atmosphere acts as an insulator, moderating temperature. Without it, temperatures would fluctuate wildly between extreme hot and cold, like on the Moon."}, {"text": "Extreme temperature fluctuations and exposure to harmful radiation.", "isCorrect": true, "rationale": "The comparison to the Moon, which lacks a significant atmosphere, indicates that without protection, a planet would face extreme temperature swings (very hot days, very cold nights) and direct exposure to harmful solar rays, as the atmosphere acts as a shield and temperature regulator."}, {"text": "A higher likelihood of forming breathable oxygen naturally.", "isCorrect": false, "rationale": "An atmosphere is crucial for the processes that lead to the formation and retention of breathable oxygen. Its absence would not make oxygen formation more likely."}], "id": "q06"}, {"question": "The text highlights liquid water as one of the three things that make Earth special for life. Considering this, what can be inferred about the universal requirements for life as we know it?", "options": [{"text": "All life forms require a planet to be a 'blue marble' in appearance.", "isCorrect": false, "rationale": "The 'blue marble' description is how Earth looks from space due to its water, not a universal requirement for life itself."}, {"text": "The presence of liquid water is a fundamental prerequisite for life's existence and sustenance.", "isCorrect": true, "rationale": "The text explicitly states 'Water is essential for all life,' implying it is a fundamental and universal requirement for life as we know it."}, {"text": "Life can only exist in environments with 21% oxygen in their atmosphere.", "isCorrect": false, "rationale": "While oxygen is essential for complex life like humans, many simpler life forms (anaerobic bacteria, etc.) do not require oxygen. The text emphasizes liquid water as 'essential for all life,' making it a more universal requirement than a specific oxygen percentage."}, {"text": "Temperatures must always be above freezing for any form of life to develop.", "isCorrect": false, "rationale": "While liquid water requires temperatures above freezing, the statement 'temperatures must always be above freezing' is too absolute. Some life forms can exist in frozen states or extreme cold, but liquid water remains key for active metabolic processes. The emphasis is on the *existence* of liquid water, not a constant above-freezing temperature across the entire planet."}], "id": "q07"}, {"question": "Imagine a planet that is in its star's Goldilocks Zone, has ample liquid water, and a protective atmosphere that blocks harmful radiation. However, its atmosphere is composed primarily of toxic gases like sulfur dioxide and lacks oxygen. What conclusion can be drawn about this planet's potential to support complex life as we know it?", "options": [{"text": "It is highly likely to support complex life due to the presence of water and a protective shield.", "isCorrect": false, "rationale": "While the planet has two of Earth's 'special' features (liquid water, protective atmosphere), the lack of breathable oxygen and presence of toxic gases would prevent the existence of complex, oxygen-breathing life forms as we know them."}, {"text": "It might support some forms of life, but not those requiring breathable oxygen for respiration.", "isCorrect": true, "rationale": "This planet possesses conditions for liquid water and protection, which are fundamental. However, the absence of breathable oxygen and presence of toxic gases means it couldn't support oxygen-dependent complex life. It might, however, support extremophiles or other forms of life adapted to such an atmosphere."}, {"text": "The Goldilocks Zone and protective atmosphere are irrelevant if the atmosphere is toxic.", "isCorrect": false, "rationale": "These factors are still highly relevant as they provide foundational conditions for any potential life (e.g., maintaining liquid water). They are just not sufficient on their own without a breathable atmosphere."}, {"text": "It is impossible for liquid water to exist on a planet with a toxic atmosphere.", "isCorrect": false, "rationale": "The composition of an atmosphere (toxic vs. non-toxic) does not inherently prevent the existence of liquid water if the temperature and pressure conditions (as implied by being in the Goldilocks Zone) are appropriate."}], "id": "q08"}, {"question": "Astronauts refer to Earth as 'the blue marble' when viewed from space. What characteristic of Earth primarily contributes to this visual description?", "options": [{"text": "The significant presence of landmasses and deserts.", "isCorrect": false, "rationale": "Landmasses and deserts would typically appear brown, green, or reddish, not predominantly blue."}, {"text": "The vast amounts of liquid water covering its surface.", "isCorrect": true, "rationale": "The text states, 'They call it 'the blue marble' because from far away, Earth looks like a small, beautiful, blue marble floating in space,' directly linking the blue appearance to its vast oceans."}, {"text": "The reflection of sunlight off its polar ice caps.", "isCorrect": false, "rationale": "Ice caps would appear white from space, not blue."}, {"text": "The thick layer of nitrogen gas in its atmosphere.", "isCorrect": false, "rationale": "While Earth's atmosphere has a blue tint due to Rayleigh scattering, the dominant 'blue marble' effect comes from the visible blue oceans underneath."}], "id": "q09"}, {"question": "If Earth were to gradually drift closer to the Sun, moving out of its current 'Goldilocks Zone,' what would be the most immediate and significant consequence for liquid water on its surface?", "options": [{"text": "The oceans would freeze solid due to decreased solar radiation.", "isCorrect": false, "rationale": "Moving closer to the Sun would *increase* solar radiation and thus temperature, not decrease it, making freezing less likely."}, {"text": "The planet's atmosphere would become thicker and more protective.", "isCorrect": false, "rationale": "While extreme heat can affect an atmosphere, the most immediate and direct consequence of moving closer to the Sun, out of the Goldilocks Zone, is related to the temperature's effect on liquid water, not necessarily an immediate thickening of the atmosphere."}, {"text": "All liquid water would eventually evaporate, leaving a dry, hot surface.", "isCorrect": true, "rationale": "The text explains the Goldilocks Zone ensures Earth is 'not too close to the Sun (which would make it too hot).' Moving closer would make it too hot, causing liquid water to evaporate, similar to Venus."}, {"text": "The composition of the water would change, making it unsuitable for life.", "isCorrect": false, "rationale": "The chemical composition of water (H2O) would not change; rather, its physical state (liquid to gas) would be affected by the increased temperature."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
