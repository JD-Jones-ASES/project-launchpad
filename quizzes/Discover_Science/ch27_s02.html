        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 27, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Which characteristic primarily defines a natural resource as \"nonrenewable\"?", "options": [{"text": "It is found deep underground.", "isCorrect": false, "rationale": "While many nonrenewable resources like fossil fuels and some metals are found deep underground, this is a location characteristic, not the defining factor of its renewability. Renewable resources can also be found underground (e.g., geothermal energy)."}, {"text": "It takes millions of years to form and cannot be replaced within a human timescale.", "isCorrect": true, "rationale": "The text explicitly defines a nonrenewable resource as one that \"takes millions of years to form, so it cannot be replaced once it is used up\" and \"we are using up much faster than Earth can make it.\" This option captures both elements of its formation time and the inability to replace it quickly."}, {"text": "It can be manufactured by humans.", "isCorrect": false, "rationale": "Nonrenewable resources are \"natural resources,\" meaning they originate from nature, not human manufacturing. Human manufacturing involves creating products from these resources."}, {"text": "It is essential for generating electricity.", "isCorrect": false, "rationale": "Many nonrenewable resources (like coal, oil, natural gas) are used for electricity, but this is a specific use, not the fundamental definition of why a resource is nonrenewable. Other nonrenewable resources (e.g., gold) are not used for electricity generation, and renewable resources also generate electricity."}], "id": "q01"}, {"question": "A scientist discovers a new fossil fuel deposit formed primarily from the remains of ancient swamp plants. Based on this information, which type of fossil fuel is most likely present?", "options": [{"text": "Oil", "isCorrect": false, "rationale": "The text states that oil is \"Formed mainly from tiny sea organisms,\" not swamp plants."}, {"text": "Natural gas", "isCorrect": false, "rationale": "The text states that natural gas is \"Also formed from ancient sea organisms,\" not swamp plants."}, {"text": "Coal", "isCorrect": true, "rationale": "The text specifically states, \"Coal — Formed from ancient swamp plants.\" This directly links the origin to the type of fossil fuel."}, {"text": "Petroleum", "isCorrect": false, "rationale": "Petroleum is another name for oil, which is formed from tiny sea organisms, not swamp plants."}], "id": "q02"}, {"question": "The formation of fossil fuels required a specific set of conditions over an immense period. Which statement accurately describes a key part of this process?", "options": [{"text": "Ancient organisms were quickly decomposed by bacteria in oxygen-rich environments.", "isCorrect": false, "rationale": "The process of fossil fuel formation requires an absence of significant decomposition by oxygen-loving bacteria to preserve the organic material. Anaerobic conditions are typically involved."}, {"text": "Layers of mud and sand covered dead organisms, which were then subjected to heat and pressure.", "isCorrect": true, "rationale": "The text explains, \"When these organisms died, they sank to the bottom of swamps and seas. Layer after layer of mud and sand covered them. Over millions of years, heat and pressure deep underground slowly changed those remains into the fossil fuels we use today.\" This option accurately summarizes these critical steps."}, {"text": "Volcanic activity rapidly melted ancient plants and animals into liquid fuels.", "isCorrect": false, "rationale": "Fossil fuels form through heat and pressure over millions of years, not rapid melting by volcanic activity. The process is a slow transformation, not a quick melt."}, {"text": "Dinosaurs' bones and teeth transformed into dense carbon deposits.", "isCorrect": false, "rationale": "The \"teachernote\" explicitly clarifies that \"fossil fuels did not come from dinosaur fossils,\" and that coal came from plants, and oil/natural gas from tiny marine organisms."}], "id": "q03"}, {"question": "A city planner is designing a new residential area and wants to specify a nonrenewable resource known for burning cleanly for cooking and heating homes. Which fossil fuel would best fit this requirement according to the text?", "options": [{"text": "Coal", "isCorrect": false, "rationale": "While coal is used for heating and generating electricity, it is not described as burning \"very cleanly\" in the text, and is generally known to be less clean than natural gas."}, {"text": "Oil", "isCorrect": false, "rationale": "Oil is primarily used to make gasoline and diesel fuel; while it can be used for heating, it is not highlighted for its clean burning properties in the context of residential use for cooking and heating, compared to natural gas."}, {"text": "Natural gas", "isCorrect": true, "rationale": "The text states, \"Natural gas... It burns very cleanly and is used for cooking, heating, and generating electricity.\" This directly matches the requirements."}, {"text": "Gasoline", "isCorrect": false, "rationale": "Gasoline is a refined product of oil, primarily used for powering cars, not typically for cooking or heating homes."}], "id": "q04"}, {"question": "While both fossil fuels and metals are nonrenewable resources that took millions of years to form, the text highlights a significant difference in how their depletion can be managed. What is this key difference?", "options": [{"text": "Metals are less scarce than fossil fuels.", "isCorrect": false, "rationale": "The text indicates both are finite and subject to depletion. It does not suggest metals are inherently less scarce, only that their management differs."}, {"text": "Fossil fuels can be easily converted into other useful forms, unlike metals.", "isCorrect": false, "rationale": "The text describes how fossil fuels are used directly or refined (like oil to gasoline), but not that they can be \"converted\" into other forms in a way that avoids depletion like recycling. Metals, in fact, are melted and reformed."}, {"text": "Metals can be recycled, significantly extending their usability, whereas fossil fuels cannot.", "isCorrect": true, "rationale": "The text explicitly states about metals: \"However, there is good news: metals can be recycled. When you recycle an aluminum can, the metal can be melted down and made into a brand-new can. This saves both the resource and the energy needed to mine new metal.\" It does not mention any similar recycling possibility for fossil fuels."}, {"text": "New deposits of metals are forming faster than new fossil fuel deposits.", "isCorrect": false, "rationale": "The text states that metal formation \"takes millions of years,\" just like fossil fuels, implying a similar, slow formation rate relative to human consumption, not a faster one."}], "id": "q05"}, {"question": "According to the text, why is recycling an old smartphone particularly important from a resource management perspective?", "options": [{"text": "It reduces the need for frequent phone upgrades.", "isCorrect": false, "rationale": "While reducing consumption is generally good, the text focuses on recovering materials from already used phones, not on influencing upgrade cycles."}, {"text": "It recovers valuable minerals and metals that would otherwise be mined again.", "isCorrect": true, "rationale": "The \"sciencelife\" section explains that phones contain \"more than 30 different minerals and metals,\" and when thrown away, \"those valuable metals go to waste. That is why recycling old electronics is so important — it recovers metals that would otherwise have to be mined from the ground all over again.\""}, {"text": "It generates electricity to power new devices.", "isCorrect": false, "rationale": "Recycling metals saves energy by not having to mine and process new ore, but the act of recycling itself doesn't directly \"generate electricity\" for new devices."}, {"text": "It prevents hazardous chemicals from leaking into landfills.", "isCorrect": false, "rationale": "While preventing hazardous waste is a benefit of e-waste recycling, the text specifically emphasizes the recovery of \"valuable metals\" and preventing the need for new mining."}], "id": "q06"}, {"question": "The text uses the analogy of a \"giant jar of candy\" to explain the problem with nonrenewable resources. What specific aspect of this analogy most effectively illustrates the core issue of resource depletion?", "options": [{"text": "The candy is sweet and desirable.", "isCorrect": false, "rationale": "While resources are desirable, this aspect of the analogy does not explain the problem of depletion itself."}, {"text": "The jar is large, giving a false sense of abundance.", "isCorrect": false, "rationale": "While the initial size might suggest abundance, the core issue the analogy points to is the lack of replenishment, not just the initial quantity."}, {"text": "No new candy is being added to the jar while pieces are continuously removed.", "isCorrect": true, "rationale": "The text states, \"Nobody is adding new candy to the jar. You eat a few pieces every day. What will happen eventually? The jar will be empty. That is exactly the problem with nonrenewable resources.\" This highlights the finite supply and continuous consumption without replenishment."}, {"text": "The candy pieces are small and individually insignificant.", "isCorrect": false, "rationale": "The size or significance of individual pieces is not the focus of the analogy; rather, it's the finite nature of the total supply combined with continuous consumption."}], "id": "q07"}, {"question": "The \"teachernote\" specifically addresses a common misconception about fossil fuels. What is this misconception, and why is it inaccurate according to the text?", "options": [{"text": "Misconception: Fossil fuels are primarily used for transportation; Inaccuracy: They are mainly for electricity generation.", "isCorrect": false, "rationale": "While fossil fuels have multiple uses, the misconception addressed in the \"teachernote\" is about their origin, not their primary use."}, {"text": "Misconception: All fossil fuels are liquid; Inaccuracy: Coal is a solid.", "isCorrect": false, "rationale": "This is a true statement about fossil fuels, but it is not the specific misconception highlighted in the \"teachernote.\""}, {"text": "Misconception: Fossil fuels are formed from dinosaurs; Inaccuracy: They mostly formed from ancient plants and tiny marine organisms.", "isCorrect": true, "rationale": "The \"teachernote\" clearly states, \"Many students (and adults!) believe fossil fuels are made from dinosaurs. The name “fossil fuel” is misleading... Most coal formed from ancient swamp plants... Oil and natural gas formed mainly from tiny marine organisms (plankton and algae). Dinosaurs appeared much later and are not a significant source of fossil fuels.\""}, {"text": "Misconception: Fossil fuels are renewable; Inaccuracy: They take millions of years to form.", "isCorrect": false, "rationale": "While the nonrenewable nature of fossil fuels is a key point, the specific \"teachernote\" addresses the source of the \"fossils\" in \"fossil fuels,\" not their renewability."}], "id": "q08"}, {"question": "Given the challenges posed by nonrenewable resource depletion, which of the following actions would be most effective in addressing the problem, based on the solutions mentioned in the text?", "options": [{"text": "Increasing exploration efforts to find new fossil fuel deposits globally.", "isCorrect": false, "rationale": "While finding new deposits might delay scarcity, it doesn't solve the fundamental problem of a finite resource being consumed faster than it forms, which the text emphasizes."}, {"text": "Investing in technologies that convert nonrenewable resources into renewable ones.", "isCorrect": false, "rationale": "The text does not suggest that nonrenewable resources can be \"converted\" into renewable ones. It advocates for using different (renewable) resources."}, {"text": "Prioritizing the development and use of renewable energy sources and promoting recycling.", "isCorrect": true, "rationale": "The text concludes by stating, \"That is why finding ways to use renewable energy — like solar, wind, and water power — is so important. It is also why recycling metals and reducing waste matters so much.\" This option directly combines these two primary solutions."}, {"text": "Limiting industrial growth to reduce overall resource consumption.", "isCorrect": false, "rationale": "While reducing waste is mentioned, \"limiting industrial growth\" is a broader economic policy not directly recommended in the text as a primary solution. The text focuses on specific actions like shifting to renewables and recycling."}], "id": "q09"}, {"question": "The text states that fossil fuels took about 300 million years to form, but humans have been using large amounts for only about 200 years. This comparison primarily highlights which aspect of the nonrenewable resource problem?", "options": [{"text": "The inefficiency of ancient geological processes.", "isCorrect": false, "rationale": "The text doesn't describe geological processes as inefficient, but rather slow on a human timescale."}, {"text": "The relatively short time humans have existed on Earth.", "isCorrect": false, "rationale": "While 200 years is short in geological terms, the comparison's point is the rate of consumption versus formation, not simply human history."}, {"text": "The vast disparity between formation time and consumption rate.", "isCorrect": true, "rationale": "The text presents these numbers side-by-side to illustrate \"simple math\" and that \"We are using them up in just a few hundred years\" compared to \"hundreds of millions of years\" to form. This directly shows the imbalance between how long they take to form and how quickly we are using them."}, {"text": "The increasing demand for energy over time.", "isCorrect": false, "rationale": "While increasing demand contributes to the problem (\"people are using more resources every year\"), the specific comparison of 300 million vs. 200 years emphasizes the rate difference, not just the trend of demand."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
