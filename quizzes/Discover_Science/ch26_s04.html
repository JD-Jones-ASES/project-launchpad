    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 26, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the core concept of natural selection as presented in the text?", "options": [{"text": "Organisms consciously choose to develop traits that will help them survive in their environment.", "isCorrect": false, "rationale": "The text explicitly states that 'Animals and plants did not simply choose to have them' and 'It does not happen on purpose,' indicating that adaptations are not a conscious choice by individuals."}, {"text": "Individuals with traits that make them better suited to their environment are more likely to survive, reproduce, and pass on those advantageous traits.", "isCorrect": true, "rationale": "This option accurately summarizes the definition provided: 'the process by which organisms with traits that help them survive are more likely to live, reproduce, and pass those traits to their offspring.'"}, {"text": "All variations within a population are equally likely to be passed on to the next generation, regardless of their impact on survival.", "isCorrect": false, "rationale": "The text explains that 'helpful traits give an advantage' making those individuals 'more likely to survive and have babies,' demonstrating that not all variations are equally passed on."}, {"text": "Adaptations occur rapidly within a single generation in response to immediate environmental changes.", "isCorrect": false, "rationale": "The text clearly states that adaptations 'develop slowly, over a very long time' and 'takes many, many generations — sometimes thousands or even millions of years,' contradicting rapid development."}]}, {"question": "According to the step-by-step explanation of natural selection, what is the *initial* and foundational element required for the process to begin?", "options": [{"text": "A sudden, drastic change in the environment that challenges the entire population.", "isCorrect": false, "rationale": "While environmental challenges ('struggle to survive') are part of the process, the very first step described is 'Variation' within a group, not a sudden environmental change."}, {"text": "Pre-existing variations among individuals within a population.", "isCorrect": true, "rationale": "The first step listed in the natural selection process is 'Variation,' stating 'individuals are not all exactly the same,' which is the raw material for selection."}, {"text": "The successful reproduction of all individuals in a population.", "isCorrect": false, "rationale": "The text states 'Not every individual will survive' and only those with helpful traits are 'more likely to have babies,' meaning successful reproduction for all is not the initial step or an outcome."}, {"text": "A conscious effort by organisms to adapt to their surroundings.", "isCorrect": false, "rationale": "The text emphasizes that natural selection 'does not happen on purpose' and organisms 'did not simply choose' their adaptations."}]}, {"question": "The 'thinkaboutit' example describes green beetles on green leaves, where a rare brown beetle is easily spotted by a bird. Over many generations, what outcome would you predict based on the principles of natural selection?", "options": [{"text": "The number of green beetles would decrease as the bird learns to spot them more effectively.", "isCorrect": false, "rationale": "The green beetles are well-camouflaged, making them harder for the bird to spot, so their numbers would likely increase or remain stable relative to the brown ones, not decrease due to being spotted."}, {"text": "The population would shift to mostly brown beetles as they develop immunity to bird predation.", "isCorrect": false, "rationale": "The brown beetles are more easily spotted, making them more vulnerable, not immune. Their numbers would decrease, not increase. Immunity is also not discussed as a direct outcome of camouflage selection."}, {"text": "The proportion of green beetles would increase, and brown beetles would become rarer due to selective predation.", "isCorrect": true, "rationale": "The green beetles are better camouflaged ('has trouble seeing the green ones'), giving them an advantage to survive and reproduce. The brown beetles ('easily spot a rare brown beetle') would be preyed upon more, making them rarer over generations."}, {"text": "Both green and brown beetles would remain in equal numbers, as predation affects all beetles equally.", "isCorrect": false, "rationale": "The scenario explicitly states a difference in how easily the bird spots them, meaning predation is not equal and would lead to a shift in population proportions."}]}, {"question": "Which of the following discoveries by Mary Anning significantly challenged the scientific understanding of Earth's history during her time?", "options": [{"text": "The existence of giant dragonflies with wings wider than a person's arms.", "isCorrect": false, "rationale": "While interesting, the text does not attribute the discovery of giant dragonflies to Mary Anning; it mentions it as a general finding from fossil studies. Her key contribution was proving extinction."}, {"text": "The fact that whales once had legs and walked on land.", "isCorrect": false, "rationale": "This is another example of what fossils show generally, not a specific discovery made by Mary Anning, though it is a significant finding in paleontology."}, {"text": "Proof that entire species had disappeared from Earth, known as extinction.", "isCorrect": true, "rationale": "The text states, 'She proved that species had gone extinct — an idea many people at the time did not believe,' highlighting her critical contribution to paleontology."}, {"text": "The process by which minerals replace organic matter to form fossils.", "isCorrect": false, "rationale": "Mary Anning was a fossil hunter, not necessarily the theorist who elucidated the chemical process of fossilization, though her discoveries certainly provided evidence for it. Her direct impact was proving extinction."}]}, {"question": "A scientist finds an ancient rock formation containing clear impressions of leaves and the preserved imprint of a bird's feather. What categories of fossils do these discoveries represent?", "options": [{"text": "Body fossils and trace fossils.", "isCorrect": false, "rationale": "Impressions of leaves are plant fossils, and a feather imprint, while part of a body, is often categorized differently from bones/shells when discussing 'impressions' as opposed to the hardened remains. A feather imprint is more akin to a 'plant fossil' description (impression) or sometimes a body fossil, but it's not a trace fossil. The best fit needs to be more specific."}, {"text": "Trace fossils and insects in amber.", "isCorrect": false, "rationale": "Leaves and feathers are not typically trace fossils (signs of activity like footprints) nor are they insects in amber."}, {"text": "Plant fossils and body fossils.", "isCorrect": true, "rationale": "The text lists 'Plant fossils — impressions of leaves, bark, or seeds' and 'Body fossils — actual remains like bones, teeth, or shells that have turned to rock.' A feather, though soft, is an actual part of a body, and its impression is effectively a body fossil representation, while the leaf is a clear plant fossil."}, {"text": "Amber fossils and trace fossils.", "isCorrect": false, "rationale": "Neither a leaf impression nor a feather imprint is an amber fossil (insects trapped in sap) or a trace fossil (footprints, burrows)."}]}, {"question": "What is the primary reason a species might face extinction, even if some individuals possess slight variations that could be beneficial?", "options": [{"text": "The variations within the species are too widespread, leading to a lack of reproductive success.", "isCorrect": false, "rationale": "Widespread variation is generally good for adaptation. A lack of reproductive success might be an outcome of environmental changes, but not the primary reason for extinction if beneficial variations exist."}, {"text": "The environment changes so rapidly that the species cannot adapt quickly enough through natural selection.", "isCorrect": true, "rationale": "The text explicitly states, 'Sometimes the environment changes faster than organisms can adapt. When that happens, a species may die out completely. This is called extinction.'"}, {"text": "Predators eliminate all individuals with helpful traits before they can reproduce.", "isCorrect": false, "rationale": "While predation is a 'struggle to survive,' if helpful traits exist, those individuals are more likely to survive predation, not less. This isn't the primary reason for widespread extinction."}, {"text": "The species chooses not to adapt, leading to its eventual decline.", "isCorrect": false, "rationale": "The text clarifies that adaptations do not happen 'on purpose' and organisms do not 'choose' them."}]}, {"question": "How does the study of fossils primarily support the understanding that adaptations happen over time?", "options": [{"text": "Fossils prove that organisms can consciously change their traits in response to environmental pressures.", "isCorrect": false, "rationale": "Fossils show physical changes over time, not conscious choices. The text states adaptations don't happen on purpose."}, {"text": "They provide direct evidence of organisms that lived long ago, showing species that are different from those alive today and suggesting ancient relatives.", "isCorrect": true, "rationale": "The text states fossils show 'Earth was once home to creatures very different from those alive today' and 'modern animals have ancient relatives,' directly supporting the idea of change and adaptation over vast timescales."}, {"text": "Fossils demonstrate that all species have remained unchanged since their first appearance on Earth.", "isCorrect": false, "rationale": "This contradicts the entire concept presented in the text, which explains how species change and evolve, and mentions dinosaurs and whales with legs as examples of ancient forms different from modern ones."}, {"text": "They show that adaptations only occur through catastrophic events like asteroid strikes, not through gradual natural selection.", "isCorrect": false, "rationale": "While the asteroid caused extinction, the text emphasizes natural selection as a 'slow' process over 'many, many generations' and mentions survivors of the asteroid 'adapted and evolved,' showing that adaptation is a gradual process that can follow such events, not only happen during them."}]}, {"question": "The asteroid impact 66 million years ago caused a mass extinction. However, some smaller animals, including early mammals, survived. What does this outcome best illustrate about the relationship between environmental change and adaptation?", "options": [{"text": "Only larger animals are vulnerable to extinction, while smaller animals are inherently resistant.", "isCorrect": false, "rationale": "The text does not suggest inherent resistance. The survival of smaller animals was circumstantial (e.g., ability to find shelter, different food sources) given the specific environmental changes, not simply due to size alone."}, {"text": "Rapid environmental changes always lead to complete disappearance of all life forms.", "isCorrect": false, "rationale": "The text states that 'many other species could not survive' but also that 'some smaller animals... did survive,' showing that not all life disappeared."}, {"text": "Existing traits in some populations provided an advantage that allowed them to survive drastic changes, leading to future adaptations.", "isCorrect": true, "rationale": "The surviving mammals likely had pre-existing traits (like being small, burrowing, or having a generalized diet) that allowed them to endure the changed climate. These survivors then 'adapted and evolved' further, illustrating how natural selection acts on existing variation to allow survival and subsequent adaptation."}, {"text": "Adaptations can only occur if the environment remains stable for millions of years.", "isCorrect": false, "rationale": "The text shows that adaptations can occur *after* drastic environmental changes, driven by the new conditions, and mentions that life has changed 'many times over millions of years' in response to such shifts."}]}, {"question": "The text emphasizes that natural selection 'does not happen on purpose.' What is the most accurate implication of this statement?", "options": [{"text": "Individual organisms decide which traits to pass on to their offspring based on environmental needs.", "isCorrect": false, "rationale": "The phrase 'does not happen on purpose' directly contradicts the idea of conscious decision-making by individuals regarding their traits or those of their offspring."}, {"text": "The environment acts as a 'selector,' favoring individuals whose pre-existing variations happen to be advantageous for survival and reproduction.", "isCorrect": true, "rationale": "This accurately reflects the key idea that 'nature “selects” the organisms that are best suited to their environment' based on 'variation' that already exists, without conscious intent from the organisms."}, {"text": "Adaptations are random occurrences that have no relation to an organism's ability to survive or reproduce.", "isCorrect": false, "rationale": "While the initial variations might be random, natural selection is not random in *which* traits are favored. It specifically favors 'helpful traits' that 'give an advantage' for survival and reproduction."}, {"text": "Only humans can intentionally influence the adaptations of other species through selective breeding.", "isCorrect": false, "rationale": "The statement refers to natural selection, which is a natural process distinct from human-directed selective breeding. The focus is on the lack of purpose in nature itself, not a comparison to human actions."}]}, {"question": "Why is protecting natural habitats considered crucial today, according to the text?", "options": [{"text": "To ensure that humans can continue to discover new species and study their unique adaptations.", "isCorrect": false, "rationale": "While discovery is valuable, the text's primary reason for habitat protection relates to preventing extinction, not solely for scientific study."}, {"text": "Because human activities like habitat destruction, pollution, and climate change are accelerating extinction rates.", "isCorrect": true, "rationale": "The text explicitly states, 'Extinction is not just something that happened long ago. It can happen today when habitats are destroyed, pollution increases, or climate changes too fast. That is one reason why protecting natural habitats is so important.'"}, {"text": "To preserve untouched areas for future generations to explore without human interference.", "isCorrect": false, "rationale": "While a positive outcome, the text emphasizes habitat protection as a response to current threats to species survival, specifically mentioning human-caused issues leading to extinction."}, {"text": "To allow organisms to choose their own adaptations without external pressures from humans.", "isCorrect": false, "rationale": "Organisms do not 'choose' adaptations, as stated in the text. The protection is about mitigating harmful human impacts, not about allowing choice."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
