<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 14, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the best definition of energy according to the textbook section?", "options": [{"text": "A physical substance that makes things move.", "isCorrect": false, "rationale": "The text explicitly states, 'Energy is not a material like water or sand. You cannot pour it into a bucket or weigh it on a scale.'"}, {"text": "The ability to cause change or make things happen.", "isCorrect": true, "rationale": "The section defines energy as 'the ability to cause change or make things happen,' making this the most accurate definition provided."}, {"text": "The heat, light, and sound produced by objects.", "isCorrect": false, "rationale": "While energy often manifests as heat, light, or sound, these are examples of what energy *does* or *becomes*, not the definition of energy itself."}, {"text": "A measurable quantity that can be poured into a bucket.", "isCorrect": false, "rationale": "The text clarifies that energy is not a material and cannot be poured or weighed like a substance."}]}, {"question": "Based on the section, why is it inaccurate to say you can 'hold' energy?", "options": [{"text": "Energy is always moving too fast to be held.", "isCorrect": false, "rationale": "The text does not attribute the inability to hold energy to its speed."}, {"text": "Energy is a description of change, not a material substance.", "isCorrect": true, "rationale": "The text explains, 'Energy is not a material... Energy is more like a description of what is happening.' It cannot be held because it is not a tangible thing."}, {"text": "Energy exists only in microscopic forms, too small to grasp.", "isCorrect": false, "rationale": "The text does not discuss the size or scale of energy in this context."}, {"text": "Energy is a force, and forces cannot be held.", "isCorrect": false, "rationale": "While related, the text defines energy as 'the ability to cause change,' not explicitly as a force, and its non-material nature is given as the reason for not being able to hold it."}]}, {"question": "Which of the following scenarios *most clearly* demonstrates energy causing change as described in the text?", "options": [{"text": "A rock sitting motionless on the ground.", "isCorrect": false, "rationale": "The text states, 'nothing happens by itself,' indicating that a motionless object is not actively demonstrating energy causing change."}, {"text": "A picture hanging still on a wall.", "isCorrect": false, "rationale": "Similar to the rock, a still picture is not actively undergoing change due to energy."}, {"text": "A plant absorbing sunlight to grow.", "isCorrect": true, "rationale": "The text identifies the Sun as a major energy source and notes that our bodies use energy to 'grow.' Plant growth through sunlight is an example of energy causing change."}, {"text": "A closed book resting on a shelf.", "isCorrect": false, "rationale": "A book at rest is not actively changing or 'making things happen' in the way described for energy in action."}]}, {"question": "According to the text, what is the primary role of an energy source like the Sun or a battery?", "options": [{"text": "To store energy so it can be weighed and measured.", "isCorrect": false, "rationale": "The text states energy cannot be weighed or measured like a physical object. While sources store energy, their primary role is to provide it for change."}, {"text": "To create energy from nothing when needed.", "isCorrect": false, "rationale": "The text states, 'the energy already exists in one form and moves or changes into another form,' implying energy is not created from nothing."}, {"text": "To provide energy that already exists in one form to cause change.", "isCorrect": true, "rationale": "The section explains, 'energy comes from sources... In every case, the energy already exists in one form and moves or changes into another form,' directly supporting this option."}, {"text": "To absorb energy that has already been used up.", "isCorrect": false, "rationale": "Energy sources provide energy; they do not primarily absorb used energy."}]}, {"question": "When the text states 'A ball at the top of a hill has energy,' what does this imply about the ball?", "options": [{"text": "It is actively using energy to move upwards.", "isCorrect": false, "rationale": "The ball is at the top, implying a state of rest, not active upward movement."}, {"text": "It is producing its own heat and light.", "isCorrect": false, "rationale": "The text does not suggest a ball at the top of a hill produces its own heat and light."}, {"text": "It has the potential to cause change, specifically to roll down.", "isCorrect": true, "rationale": "The text clarifies, 'The key word is “can” — energy is about what is possible.' A ball at the top of a hill *can* roll down, demonstrating its ability to cause change."}, {"text": "It is a physical container for energy.", "isCorrect": false, "rationale": "Energy is not a material substance that can be contained in a physical object like a bucket or a ball."}]}, {"question": "A student observes a flashlight turning on and says, 'The light *is* the energy.' Why is this statement incorrect based on the text?", "options": [{"text": "Light is a form of matter, not energy.", "isCorrect": false, "rationale": "Light is a form of energy, but the misconception here is about light *being* energy versus being a *manifestation* of it."}, {"text": "Light is an *effect* or manifestation of energy, not energy itself.", "isCorrect": true, "rationale": "The text states, 'You cannot see energy... but you can see what energy does' and 'electrical energy became light energy,' indicating light is a result or form that energy takes, not energy in its fundamental 'description of what is happening' sense."}, {"text": "Energy can only be heat or sound, not light.", "isCorrect": false, "rationale": "The text explicitly mentions 'electrical energy became light energy,' contradicting this statement."}, {"text": "The battery contains the energy, not the light itself.", "isCorrect": false, "rationale": "While the battery is the source of energy, the light is a transformation of that energy, not the fundamental energy itself, which is the point of the question."}]}, {"question": "A friend tells you, 'I have no energy today because I'm so tired.' Based on the 'Misconception Alert,' what is the best response?", "options": [{"text": "That's impossible; your body constantly creates new energy.", "isCorrect": false, "rationale": "Energy is not created; it is transformed or transferred. Also, this doesn't fully address the nuance of the misconception."}, {"text": "You're right, your body has completely run out of energy.", "isCorrect": false, "rationale": "This directly contradicts the 'Misconception Alert,' which states that even when tired, bodies still have energy for basic functions."}, {"text": "Your body still has energy for basic functions, but you might need more fuel or rest.", "isCorrect": true, "rationale": "The 'Misconception Alert' advises, 'Use this as a teaching moment — their bodies still have energy (their hearts are beating, lungs are breathing), but they may need food or rest to feel strong again.'"}, {"text": "Energy only applies to objects, not to living beings.", "isCorrect": false, "rationale": "The text gives examples of people using energy for movement, thinking, and growth, indicating energy applies to living beings."}]}, {"question": "When a guitar string vibrates and makes sound after being plucked, what is happening in terms of energy?", "options": [{"text": "The guitar string is creating new energy from nothing.", "isCorrect": false, "rationale": "The text implies energy is not created from nothing, but changes form from existing energy."}, {"text": "The energy from your fingers is destroyed, and sound is created.", "isCorrect": false, "rationale": "Energy is not destroyed; it is transformed. The text discusses energy changing forms."}, {"text": "Energy from your fingers is transferred to the string, causing it to change by vibrating and producing sound.", "isCorrect": true, "rationale": "The text states, 'your fingers give it energy, and it makes sound,' which demonstrates energy transfer and its subsequent change into vibration and sound."}, {"text": "The sound itself is the source of the energy for the vibration.", "isCorrect": false, "rationale": "The sound is a result of the energy transfer and vibration, not the source of the initial energy for the vibration."}]}, {"question": "Which situation *does not* necessarily involve energy actively causing a change in the way described in the section?", "options": [{"text": "An electric fan turning.", "isCorrect": false, "rationale": "A fan turning involves movement, which is a change caused by energy as per the text's examples."}, {"text": "A pot of water getting hotter.", "isCorrect": false, "rationale": "Water getting hotter involves heating up, which is a change caused by energy as per the text's examples."}, {"text": "A car parked on a level street.", "isCorrect": true, "rationale": "A parked car on a level street is motionless and not actively undergoing a change (movement, heating, lighting, sound) as the primary focus of energy in this section. While it possesses chemical energy in its fuel, it is not *demonstrating* energy causing change in this specific state."}, {"text": "A cell phone screen lighting up.", "isCorrect": false, "rationale": "A screen lighting up involves light, which is a change caused by energy as per the text's examples."}]}, {"question": "The text emphasizes that energy is fundamental because:", "options": [{"text": "It is the only thing scientists can directly see and measure.", "isCorrect": false, "rationale": "The text states, 'You cannot see energy... but you can see what energy does,' directly contradicting this option."}, {"text": "It is the reason why anything at all changes or happens.", "isCorrect": true, "rationale": "The section opens by stating, 'Something is needed to make things change — and that something is energy,' and later reinforces, 'Every time something changes... energy is the reason.'"}, {"text": "It is a rare substance found in only a few places.", "isCorrect": false, "rationale": "The text indicates energy is ubiquitous and not a substance."}, {"text": "It is always visible as light or heat.", "isCorrect": false, "rationale": "Energy manifests in various forms, including sound and movement, not just visible light or heat."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
