<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 31</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the fundamental process of science as introduced at the beginning of the course?", "options": [{"text": "Memorizing facts and formulas about the natural world.", "isCorrect": false, "rationale": "While facts and formulas are learned in science, the text emphasizes science as an active process of inquiry, not just memorization."}, {"text": "Asking questions and finding answers through observation, testing, and thinking.", "isCorrect": true, "rationale": "The text explicitly states: 'science is the process of asking questions about the world and finding answers through observation, testing, and thinking.'"}, {"text": "Developing new technologies to improve human life.", "isCorrect": false, "rationale": "Technology is an outcome of scientific understanding, but the definition of science itself focuses on the method of inquiry, not necessarily its practical applications."}, {"text": "Classifying all known organisms and their habitats.", "isCorrect": false, "rationale": "Classification is a part of life science, but it doesn't encompass the broad definition of science as a whole process of asking and answering questions across all disciplines."}], "id": "q01"}, {"question": "A scientist observes a newly discovered organism that moves towards light sources and consumes small insects for energy. Based on the Life Science concepts reviewed, which characteristic of life is NOT directly demonstrated by this observation?", "options": [{"text": "Made of cells", "isCorrect": true, "rationale": "The observation describes responding to the environment (moving towards light), needing energy (consuming insects), and implicitly, growth and reproduction (as it's an organism), but it does not provide direct evidence that the organism is 'made of cells' without microscopic examination."}, {"text": "Needs energy", "isCorrect": false, "rationale": "Consuming small insects directly demonstrates the organism's need for energy."}, {"text": "Responds to its environment", "isCorrect": false, "rationale": "Moving towards light sources is a direct response to the environment."}, {"text": "Reproduces", "isCorrect": false, "rationale": "While not directly observed, reproduction is a fundamental characteristic of any living organism, and the question asks what is NOT *directly demonstrated by this observation*. The 'made of cells' is a more fundamental underlying characteristic not observed externally."}], "id": "q02"}, {"question": "You are hiking in a mountainous region and notice a deep valley with a river at its bottom, surrounded by layers of various types of rock. What question, informed by Earth Science, would best help you understand the formation of this landscape?", "options": [{"text": "What form of energy is powering the water flow in the river?", "isCorrect": false, "rationale": "This question relates to Physics (energy) and the river's immediate mechanics, but less directly to the geological formation of the valley and rock layers over time, which is the core of Earth Science inquiry here."}, {"text": "Are the rocks in the valley primarily igneous, sedimentary, or metamorphic, and how has erosion reshaped the land?", "isCorrect": true, "rationale": "This question directly applies Earth Science concepts mentioned: 'rocks cycle between igneous, sedimentary, and metamorphic forms' and 'erosion reshapes the land,' linking them to understanding the valley's formation."}, {"text": "What adaptations do organisms in this river ecosystem possess to survive the current?", "isCorrect": false, "rationale": "This is a Life Science question about adaptations in an ecosystem, not directly related to the geological formation of the valley itself."}, {"text": "What chemical compounds are present in the river water that contribute to its unique taste?", "isCorrect": false, "rationale": "This is a Chemistry question about water composition, which, while relevant to the river, does not address the overall formation of the valley and its rock layers."}], "id": "q03"}, {"question": "Which of the following scenarios primarily describes a *chemical change* rather than a physical change?", "options": [{"text": "Ice melting into liquid water on a warm day.", "isCorrect": false, "rationale": "This is a physical change (change of state) as the chemical composition (H2O) remains the same."}, {"text": "Dissolving sugar in hot tea, creating a sweet solution.", "isCorrect": false, "rationale": "This is a physical change (forming a solution), as the sugar molecules are still sugar, just dispersed in water."}, {"text": "Burning a piece of wood in a campfire, producing ash and smoke.", "isCorrect": true, "rationale": "Burning involves a chemical reaction where wood combines with oxygen to form new substances like ash, carbon dioxide, and water vapor, thus representing a chemical change."}, {"text": "Crushing a soda can, changing its shape but not its material.", "isCorrect": false, "rationale": "This is a physical change; the aluminum of the can is still aluminum, only its form has changed."}], "id": "q04"}, {"question": "You observe a simple lever being used to lift a heavy rock. According to the Physics concepts learned, how does the lever make the work of lifting the rock easier?", "options": [{"text": "It increases the total amount of energy required to lift the rock.", "isCorrect": false, "rationale": "Simple machines are designed to make work *easier*, not to increase the total energy required. In an ideal scenario, the work done (force x distance) remains the same."}, {"text": "It eliminates the need for any force to be applied.", "isCorrect": false, "rationale": "Simple machines reduce the amount of force needed, but they never eliminate the need for force entirely."}, {"text": "It trades the amount of force applied for a greater distance over which the force is applied.", "isCorrect": true, "rationale": "The text states, 'simple machines make work easier by trading force for distance.' A lever allows you to apply less force over a greater distance to move a heavy object a shorter distance."}, {"text": "It generates new energy to power the lifting process.", "isCorrect": false, "rationale": "Simple machines do not generate energy; they merely change the way force is applied to do work. Energy conservation principles apply."}], "id": "q05"}, {"question": "A student is asked to determine the role of a specific type of algae in a pond ecosystem. Which primary scientific branch would be most relevant to this inquiry?", "options": [{"text": "Chemistry", "isCorrect": false, "rationale": "While chemistry might be involved in understanding the algae's cellular processes, the question focuses on its 'role in a pond ecosystem,' which is a domain of Life Science."}, {"text": "Physics", "isCorrect": false, "rationale": "Physics deals with energy, motion, and forces, which are not the primary focus when studying an organism's ecological role."}, {"text": "Earth Science", "isCorrect": false, "rationale": "Earth Science focuses on the planet's layers, cycles, and geology, not the specific roles of organisms within ecosystems."}, {"text": "Life Science", "isCorrect": true, "rationale": "Life Science explores 'food chains through ecosystems and learned that every organism has a role to play,' making it the most relevant branch for understanding the algae's role."}], "id": "q06"}, {"question": "You see a chemical formula for baking soda: NaHCO3. Based on your Chemistry knowledge, what does this formula immediately tell you?", "options": [{"text": "It is a mixture of several different substances.", "isCorrect": false, "rationale": "A chemical formula like NaHCO3 represents a specific compound, not a mixture, indicating fixed proportions of elements."}, {"text": "It is made up of atoms of sodium (Na), hydrogen (H), carbon (C), and oxygen (O).", "isCorrect": true, "rationale": "The text states 'You learned to read chemical formulas like H2O and CO2' and 'What atoms is this made of?' A chemical formula directly indicates the constituent elements (atoms) and their proportions."}, {"text": "It will undergo a physical change when heated.", "isCorrect": false, "rationale": "While baking soda does undergo changes when heated, the formula itself doesn't tell you the *type* of change (physical vs. chemical) or its specifics without further knowledge."}, {"text": "It is a liquid at room temperature.", "isCorrect": false, "rationale": "The chemical formula alone does not indicate the state of matter at a given temperature; that is a physical property not encoded in the elemental composition."}], "id": "q07"}, {"question": "After a heavy rainstorm, you observe a large amount of muddy water flowing quickly through a ditch, carrying away loose soil. This phenomenon primarily demonstrates which concept from Earth Science?", "options": [{"text": "The rock cycle", "isCorrect": false, "rationale": "The rock cycle describes the transformation of rock types, not the movement of soil by water."}, {"text": "Volcanic activity", "isCorrect": false, "rationale": "Volcanic activity is related to Earth's internal processes and magma, not surface water flow and soil movement."}, {"text": "Erosion reshaping the land", "isCorrect": true, "rationale": "The text states, 'You dug into soil layers and saw how erosion reshapes the land.' Muddy water carrying away soil is a direct example of erosion."}, {"text": "Atmospheric pressure changes", "isCorrect": false, "rationale": "Atmospheric pressure is related to weather and air, not directly to the physical movement of soil by water after rainfall."}], "id": "q08"}, {"question": "Imagine you are designing a flashlight. To make the light beam travel straight and appear brighter, which Physics principle would you primarily apply?", "options": [{"text": "The principles of sound as vibrations.", "isCorrect": false, "rationale": "Sound and light are distinct forms of energy; sound principles would not be applied to manipulate a light beam."}, {"text": "The connection between electricity and magnetism.", "isCorrect": false, "rationale": "While electricity powers the flashlight, this principle doesn't directly explain how to make the light beam straight or brighter through optical means."}, {"text": "The concept that light travels in straight lines and can be reflected.", "isCorrect": true, "rationale": "The text mentions 'You learned how light travels in straight lines, reflects off mirrors, and bends through water.' Using reflectors (like in a flashlight) relies on light traveling in straight lines and reflecting to direct and intensify the beam."}, {"text": "The trade-off between force and distance in simple machines.", "isCorrect": false, "rationale": "This principle applies to mechanical work and simple machines, not the behavior or manipulation of light."}], "id": "q09"}, {"question": "The final lesson emphasizes that the four branches of science (Life, Earth, Chemistry, Physics) are not separate. Which of the following best exemplifies this 'Big Picture' idea?", "options": [{"text": "A biologist studying a new species of insect.", "isCorrect": false, "rationale": "While this is a valid scientific inquiry, it primarily focuses on one branch (Life Science) and doesn't inherently demonstrate the interconnectedness of all four branches without further context."}, {"text": "An astronomer observing distant galaxies through a powerful telescope.", "isCorrect": false, "rationale": "Astronomy involves physics and some chemistry, but a single observation of galaxies doesn't immediately illustrate the connection across *all* four branches mentioned in the text."}, {"text": "Analyzing the chemical composition of soil to understand how it supports plant growth and affects water runoff.", "isCorrect": true, "rationale": "This scenario integrates Chemistry (chemical composition), Earth Science (soil, water runoff), and Life Science (plant growth), demonstrating the interconnectedness described in 'The Big Picture'."}, {"text": "An engineer designing a new type of electric car battery.", "isCorrect": false, "rationale": "This involves physics (electricity, motion) and chemistry (battery reactions), but the connection to Earth Science (resources, environment) or Life Science (biological impact) might not be immediately apparent without a broader scope."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
