<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 26, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary definition of an adaptation as described in the text?", "options": [{"text": "A change an animal makes to its diet to find new food sources.", "isCorrect": false, "rationale": "This describes a specific type of behavioral adjustment, not the overarching definition of an adaptation which encompasses all features and behaviors assisting survival."}, {"text": "A feature or behavior that helps a living thing survive in its environment.", "isCorrect": true, "rationale": "The text directly defines adaptation as 'a feature or behavior that helps a living thing survive in its environment.'"}, {"text": "A type of migration pattern observed in certain bird species.", "isCorrect": false, "rationale": "Migration is an example of a behavioral adaptation, not the definition of adaptation itself."}, {"text": "The process by which an organism learns new skills.", "isCorrect": false, "rationale": "Learning new skills is different from inherent features or behaviors that are considered adaptations over evolutionary time."}]}, {"question": "Which of the following is an example of a structural adaptation?", "options": [{"text": "A bear hibernating through winter.", "isCorrect": false, "rationale": "Hibernation is an action an organism does to survive, making it a behavioral adaptation."}, {"text": "A bird flying south for the winter.", "isCorrect": false, "rationale": "Flying south (migration) is an action an organism does, making it a behavioral adaptation."}, {"text": "A polar bear's thick white fur.", "isCorrect": true, "rationale": "A polar bear's thick white fur is a physical feature of its body that helps it survive, fitting the definition of a structural adaptation."}, {"text": "A squirrel burying nuts for later.", "isCorrect": false, "rationale": "Burying nuts (storing food) is an action an organism does, making it a behavioral adaptation."}]}, {"question": "Which of the following describes a behavioral adaptation?", "options": [{"text": "A fish having gills to breathe underwater.", "isCorrect": false, "rationale": "Gills are a physical body part, making them a structural adaptation."}, {"text": "A duck having webbed feet for swimming.", "isCorrect": false, "rationale": "Webbed feet are physical body parts, making them a structural adaptation."}, {"text": "An opossum playing dead when threatened.", "isCorrect": true, "rationale": "Playing dead is an action or behavior an organism does to survive, fitting the definition of a behavioral adaptation."}, {"text": "A rose bush having sharp thorns.", "isCorrect": false, "rationale": "Thorns are physical features of the plant, making them a structural adaptation."}]}, {"question": "A scientist observes an animal. Which observation would most clearly indicate a *behavioral* adaptation rather than a *structural* adaptation?", "options": [{"text": "The animal's body is covered in scales for protection.", "isCorrect": false, "rationale": "Scales are a physical feature of the animal's body, indicating a structural adaptation."}, {"text": "The animal constructs an elaborate nest to raise its young.", "isCorrect": true, "rationale": "Constructing a nest is an action or something the animal *does* to survive and reproduce, making it a behavioral adaptation."}, {"text": "The animal possesses venomous fangs to capture prey.", "isCorrect": false, "rationale": "Venomous fangs are a physical body part, indicating a structural adaptation."}, {"text": "The animal has unusually large eyes for seeing in low light.", "isCorrect": false, "rationale": "Large eyes are a physical feature of the animal's body, indicating a structural adaptation."}]}, {"question": "According to the text, what is the fundamental purpose of any adaptation?", "options": [{"text": "To make an organism more attractive to mates.", "isCorrect": false, "rationale": "While some adaptations contribute to mating success, the text states the fundamental purpose is survival, which includes finding food and staying safe."}, {"text": "To help a living thing survive in its environment.", "isCorrect": true, "rationale": "The text explicitly states that 'Every living thing has adaptations that help it find food, stay safe, and survive in its habitat.'"}, {"text": "To allow an organism to change its habitat regularly.", "isCorrect": false, "rationale": "Some behavioral adaptations like migration allow for movement between habitats, but this is not the fundamental purpose of *all* adaptations."}, {"text": "To enable an organism to grow larger than its competitors.", "isCorrect": false, "rationale": "Size can be an adaptation, but the primary purpose of adaptations is broader than just growth or competitive advantage; it's about overall survival."}]}, {"question": "Why do cacti have sharp spines instead of flat leaves, as explained in the text?", "options": [{"text": "Spines absorb more sunlight for photosynthesis.", "isCorrect": false, "rationale": "Flat leaves are generally better for absorbing sunlight; spines reduce surface area, which is counterproductive for maximizing light absorption."}, {"text": "Spines help the cactus climb other plants for support.", "isCorrect": false, "rationale": "While some plants have climbing adaptations, the text states cactus spines primarily help with water retention and protection."}, {"text": "Spines reduce water loss and protect the plant from animals.", "isCorrect": true, "rationale": "The text states, 'Spines lose much less water than leaves would. They also protect the plant from animals that might try to eat it.'"}, {"text": "Spines store extra nutrients for periods of drought.", "isCorrect": false, "rationale": "Cactus stems store water, but the spines' primary roles are water loss reduction and protection, not nutrient storage."}]}, {"question": "An imaginary animal is designed with a thick layer of blubber, small ears, and the ability to dig burrows quickly. Which of the specified habitats from the 'Design an Animal' activity would these adaptations best suit?", "options": [{"text": "Scorching Desert", "isCorrect": false, "rationale": "A thick layer of blubber would cause overheating in a scorching desert, making it unsuitable despite the benefit of burrows for shelter."}, {"text": "Deep Ocean Floor", "isCorrect": false, "rationale": "While blubber could help with cold, the primary challenges of the deep ocean floor are crushing pressure and total darkness, for which these adaptations aren't directly addressing."}, {"text": "Frozen Tundra", "isCorrect": true, "rationale": "A thick layer of blubber and small ears are excellent for conserving heat in extreme cold, and digging burrows provides essential shelter from icy winds and snow, all highly suitable for the Frozen Tundra."}, {"text": "Rainforest Canopy", "isCorrect": false, "rationale": "The rainforest canopy is hot and humid; blubber and digging burrows are not suitable adaptations for this environment, which would require adaptations for climbing and navigating high in trees."}]}, {"question": "Based on the principle 'Adaptations Match the Habitat,' which of the following adaptations would be *least* suitable for an animal living in the 'Scorching Desert' habitat described in the 'Design an Animal' activity?", "options": [{"text": "Ability to store large amounts of water internally.", "isCorrect": false, "rationale": "Water storage is a highly beneficial adaptation for a desert environment where water is scarce."}, {"text": "Nocturnal behavior to avoid daytime heat.", "isCorrect": false, "rationale": "Being active at night is a common and effective behavioral adaptation for desert animals to avoid extreme daytime temperatures."}, {"text": "A thick, insulating coat of dark fur.", "isCorrect": true, "rationale": "A thick coat would prevent heat loss, leading to overheating in a scorching desert. Dark fur would absorb more solar radiation, exacerbating the problem."}, {"text": "Specialized kidneys that produce very concentrated urine.", "isCorrect": false, "rationale": "Producing concentrated urine is a crucial physiological adaptation for desert animals to conserve water."}]}, {"question": "According to the 'Design an Animal' activity, which of the following is a mandatory requirement for designing your imaginary animal?", "options": [{"text": "The animal must be a predator that hunts other animals.", "isCorrect": false, "rationale": "The activity asks 'What it eats and how it finds food,' but does not specify it must be a predator."}, {"text": "The design must include exactly two structural and two behavioral adaptations.", "isCorrect": true, "rationale": "The instructions explicitly state, 'Include at least: Two structural adaptations (body features) [and] Two behavioral adaptations (things it does).'"}, {"text": "The animal must be able to migrate long distances.", "isCorrect": false, "rationale": "Migration is an example of a behavioral adaptation, but it is not a mandatory requirement for the animal design itself."}, {"text": "The drawing must be colored using only pencils.", "isCorrect": false, "rationale": "The setup guide suggests 'colored pencils, and markers,' not just pencils, and this refers to materials, not a design requirement for the animal's adaptations."}]}, {"question": "After the 'Design an Animal' activity, the teacher asks, 'Could your desert animal survive in the deep ocean? Why or why not?' What core concept is this question designed to reinforce?", "options": [{"text": "That animals can adapt to any environment if given enough time.", "isCorrect": false, "rationale": "The question highlights the *incompatibility* of adaptations across vastly different environments, not the idea of universal adaptability."}, {"text": "That some animals are naturally more robust than others.", "isCorrect": false, "rationale": "The question is about adaptation *specificity* to a habitat, not inherent robustness of certain species."}, {"text": "That adaptations are specific to and effective only within a particular habitat.", "isCorrect": true, "rationale": "This question directly reinforces the text's core message in the 'Adaptations Match the Habitat' section and the 'Discussion Prompt,' emphasizing that an adaptation suitable for one habitat is often unsuitable for another."}, {"text": "That all animals eventually evolve gills to breathe underwater.", "isCorrect": false, "rationale": "This is an extreme and incorrect generalization, not the concept the question aims to reinforce."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
