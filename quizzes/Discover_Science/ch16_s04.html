    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 16, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the main idea conveyed in the 'Staying Healthy' section about taking care of your body?", "options": [{"text": "Only professional athletes need to focus on nutrition, exercise, and sleep.", "isCorrect": false, "rationale": "The text states, 'You are in charge of taking care of your body every single day!', indicating it's important for everyone, not just athletes."}, {"text": "Your body is like a machine that requires fuel, care, and regular maintenance for optimal function.", "isCorrect": true, "rationale": "The introduction uses the analogy of a car needing fuel and care to explain that 'your body needs the right food, exercise, and rest' to keep running."}, {"text": "The body is self-sufficient and can stay healthy without conscious effort if you are young.", "isCorrect": false, "rationale": "The entire section emphasizes the importance of conscious choices ('the choices you make now') regarding food, movement, and sleep for lifelong health."}, {"text": "Genetics determine most of your health outcomes, making daily choices less impactful.", "isCorrect": false, "rationale": "While genetics play a role, the text stresses that daily choices 'will affect how your body feels and works for the rest of your life,' highlighting the impact of personal actions."}]}, {"question": "A student is preparing for a big exam and wants to eat foods that will provide long-lasting energy for their brain. Which food choice would be most effective based on the text?", "options": [{"text": "A sugary candy bar for a quick boost.", "isCorrect": false, "rationale": "Sugary foods provide quick energy, but the text emphasizes whole grains for 'energy that lasts longer,' which is beneficial for sustained focus."}, {"text": "A meal of brown rice with lean chicken and vegetables.", "isCorrect": true, "rationale": "Brown rice is a whole grain, which the text states provides 'energy that lasts longer.' Lean chicken provides protein for building and repair, and vegetables offer vitamins for overall health, all supporting sustained brain function."}, {"text": "A glass of milk and a cheese stick.", "isCorrect": false, "rationale": "Dairy is rich in calcium for strong bones and teeth, but it's not primarily highlighted for 'long-lasting energy' for the brain compared to whole grains."}, {"text": "A large glass of water and some fruit.", "isCorrect": false, "rationale": "Water is crucial, and fruits provide vitamins and some energy, but grains are specifically noted for providing sustained energy for thinking."}]}, {"question": "A child wants to grow taller and ensure their bones are strong and healthy throughout their growth spurt. According to the text, which food group should they prioritize for this specific goal?", "options": [{"text": "Fruits and vegetables.", "isCorrect": false, "rationale": "Fruits and vegetables provide vitamins and minerals to fight sickness and keep organs healthy, but dairy is specifically highlighted for bone strength."}, {"text": "Grains.", "isCorrect": false, "rationale": "Grains primarily give the body energy to move and think."}, {"text": "Dairy.", "isCorrect": true, "rationale": "The text states, 'Dairy (milk, cheese, yogurt) — Rich in calcium, which is the mineral your bones and teeth need to stay strong. Remember, your bones are alive and always rebuilding themselves!'"}, {"text": "Protein.", "isCorrect": false, "rationale": "Protein helps build and repair muscles, bones, and other tissues, but dairy is specifically called out as 'rich in calcium' for bone strength."}]}, {"question": "Although not a food group, water is emphasized as crucial for health. Which of the following is NOT listed as a primary function of water in the body?", "options": [{"text": "Helping blood flow smoothly.", "isCorrect": false, "rationale": "The text explicitly states, 'Water helps your blood flow'."}, {"text": "Assisting the digestive system.", "isCorrect": false, "rationale": "The text explicitly states, 'Water helps your... digestive system work'."}, {"text": "Providing essential vitamins and minerals.", "isCorrect": true, "rationale": "The text identifies 'Fruits and vegetables' as being 'Packed with vitamins and minerals,' while water's functions are listed as blood flow, digestion, and staying cool."}, {"text": "Helping the body stay cool.", "isCorrect": false, "rationale": "The text explicitly states, 'Water helps your body stay cool'."}]}, {"question": "The text states that exercise benefits 'every body system.' Which statement best illustrates this comprehensive benefit?", "options": [{"text": "Exercise only makes your muscles bigger, which doesn't affect other systems.", "isCorrect": false, "rationale": "This contradicts the text, which explicitly lists benefits for bones, muscles, heart, and the digestive system."}, {"text": "Running strengthens bones, makes the heart pump blood more efficiently, and helps food move through intestines.", "isCorrect": true, "rationale": "This statement accurately combines specific benefits mentioned for bones ('Bones get stronger and denser when you run, jump, and play'), the heart ('Exercise makes your heart stronger so it can pump blood more efficiently'), and the digestive system ('The digestive system works better when you are active. Moving around helps food travel smoothly through your intestines')."}, {"text": "Physical activity mainly helps you burn calories and lose weight, which is its sole purpose.", "isCorrect": false, "rationale": "While exercise can help burn calories, the text focuses on strengthening bones and muscles, improving heart efficiency, and aiding digestion as its primary benefits, not solely weight loss."}, {"text": "Only certain sports like weightlifting strengthen bones and muscles, while other activities have minimal impact.", "isCorrect": false, "rationale": "The text mentions a variety of activities like 'running, jumping rope, and dancing' for bones, and 'playing at recess, riding your bike, walking the dog' as counting towards daily activity."}]}, {"question": "How much physical activity do scientists recommend for kids your age each day?", "options": [{"text": "At least 30 minutes of intense, continuous exercise.", "isCorrect": false, "rationale": "The recommendation is 'at least 60 minutes,' not 30, and it doesn't specify 'intense, continuous' but rather 'physical activity'."}, {"text": "Exactly 60 minutes, all at once, in a structured sports activity.", "isCorrect": false, "rationale": "The text states 'at least 60 minutes' and clarifies 'That does not have to be all at once — playing at recess, riding your bike, walking the dog, and playing sports all count!'"}, {"text": "At least 60 minutes of physical activity, which can be broken up throughout the day.", "isCorrect": true, "rationale": "The text directly states, 'Scientists recommend that kids your age get at least 60 minutes of physical activity every day. That does not have to be all at once'."}, {"text": "Only vigorous activities like running or jumping rope count towards the daily recommendation.", "isCorrect": false, "rationale": "The text explicitly includes 'playing at recess, riding your bike, walking the dog, and playing sports' as activities that count."}]}, {"question": "Why is sleep considered 'one of the busiest times for your body,' especially for kids?", "options": [{"text": "It's when your body burns the most calories and digests food.", "isCorrect": false, "rationale": "While some metabolic processes occur, the text focuses on growth, repair, memory organization, and immune system strengthening, not primarily calorie burning or digestion."}, {"text": "The brain organizes memories, muscles repair, bones grow, and the immune system strengthens.", "isCorrect": true, "rationale": "The text lists these specific activities: 'Your bones grow... Your muscles repair... Your brain organizes everything you learned... Your immune system... gets stronger.'"}, {"text": "Your body rests completely, with all systems shutting down to conserve energy.", "isCorrect": false, "rationale": "This contradicts the text's statement that 'your body does not stop working' and that sleep is 'one of the busiest times'."}, {"text": "It's the only time your body can truly relax and prepare for the next day's stress.", "isCorrect": false, "rationale": "While relaxation is part of sleep, the text emphasizes active processes like growth, repair, and memory consolidation rather than just passive rest."}]}, {"question": "A student wants to become a stronger runner and improve their academic focus. Based on the 'Putting It All Together' section, what combination of habits would best support both goals?", "options": [{"text": "Eating mostly protein, exercising only once a week, and getting 7 hours of sleep.", "isCorrect": false, "rationale": "This falls short of the recommended daily exercise (60 minutes) and sleep (9-12 hours for kids), and an unbalanced diet is also not recommended."}, {"text": "Eating a balanced diet with whole grains and protein, exercising daily, and getting 9-12 hours of sleep.", "isCorrect": true, "rationale": "A balanced diet with whole grains provides lasting energy for focus, protein supports muscle repair and growth for running. Daily exercise (moving often) builds strength for running, and 9-12 hours of sleep allows for muscle repair and brain organization (for academic focus)."}, {"text": "Drinking lots of water, sleeping as little as possible to study more, and avoiding strenuous activity.", "isCorrect": false, "rationale": "Lack of sleep would hinder academic focus and physical repair, and avoiding strenuous activity would prevent becoming a stronger runner. Water alone is not sufficient."}, {"text": "Focusing only on fruits and vegetables, exercising intensely for 30 minutes daily, and sleeping exactly 8 hours.", "isCorrect": false, "rationale": "An intense focus solely on fruits and vegetables might lack sufficient protein/grains for sustained energy and muscle building. 30 minutes of exercise is half the recommended amount, and 8 hours of sleep is often less than the 9-12 hours recommended for kids."}]}, {"question": "Daniel Hale Williams is primarily recognized in medical history for which groundbreaking achievement?", "options": [{"text": "Discovering a new medicine to treat heart disease.", "isCorrect": false, "rationale": "The text describes him as a surgeon who performed an operation, not a discoverer of medicine."}, {"text": "Performing one of the world's first successful open-heart surgeries.", "isCorrect": true, "rationale": "The text explicitly states he 'made history in 1893 by performing one of the first successful open-heart surgeries in the world'."}, {"text": "Inventing new surgical tools.", "isCorrect": false, "rationale": "While he was a surgeon, the text does not mention him inventing surgical tools."}, {"text": "Being the first doctor to use X-rays in diagnosis.", "isCorrect": false, "rationale": "The text mentions his surgery and founding of a hospital, not his involvement with X-rays."}]}, {"question": "Beyond his famous surgery, how did Daniel Hale Williams significantly contribute to society, especially for African Americans in medicine?", "options": [{"text": "He established the first medical school in the United States for all students.", "isCorrect": false, "rationale": "He founded Provident Hospital, which was significant for Black doctors and nurses, but not described as the first medical school for all students."}, {"text": "He wrote groundbreaking textbooks on surgical techniques that became standard.", "isCorrect": false, "rationale": "The text highlights his surgical prowess and his founding of a hospital, but does not mention his authorship of textbooks."}, {"text": "He founded Provident Hospital, creating opportunities for Black doctors and nurses to work and train during a time of significant barriers.", "isCorrect": true, "rationale": "The text states, 'He founded Provident Hospital in Chicago in 1891 — one of the first hospitals in the United States where Black doctors and nurses could work and train. At a time when African Americans faced enormous barriers in medicine, Williams created opportunities for others'."}, {"text": "He became the first African American to lead a major national medical association.", "isCorrect": false, "rationale": "While his contributions were significant, the text does not state he led a national medical association."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
