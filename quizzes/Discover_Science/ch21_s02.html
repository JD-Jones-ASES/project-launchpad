<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 21, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary source of energy for almost all ecosystems on Earth, as described in the text?", "options": [{"text": "Heat from the Earth's core", "isCorrect": false, "rationale": "The text explicitly states that 'Almost all the energy in an ecosystem comes from sunlight,' not internal heat sources."}, {"text": "The Sun", "isCorrect": true, "rationale": "The first paragraph of the section clearly identifies the Sun as the source of almost all energy in an ecosystem."}, {"text": "Chemical reactions in the soil", "isCorrect": false, "rationale": "While chemical reactions occur in soil, they are not the primary, overarching energy source for the entire ecosystem as described; the Sun is."}, {"text": "Decomposition of dead organisms", "isCorrect": false, "rationale": "Decomposition releases nutrients, but it is a process within the energy cycle, not the initial energy source itself. The Sun provides the initial energy."}], "id": "q01"}, {"question": "A plant absorbs sunlight, water, and carbon dioxide to create its own food and release oxygen. This process makes the plant an example of which ecological role?", "options": [{"text": "A consumer, because it uses energy from its environment.", "isCorrect": false, "rationale": "A consumer eats other organisms for energy; plants make their own food, classifying them differently."}, {"text": "A decomposer, because it recycles elements from its surroundings.", "isCorrect": false, "rationale": "Decomposers break down dead material. While plants absorb elements, their primary role described here is food production, not decomposition."}, {"text": "A producer, because it makes its own food through photosynthesis.", "isCorrect": true, "rationale": "The definition of a producer is 'a living thing that makes its own food, usually by using energy from sunlight,' which directly describes the plant's activity."}, {"text": "An omnivore, because it uses multiple environmental resources.", "isCorrect": false, "rationale": "Omnivores are a type of consumer that eats both plants and animals. This term does not apply to organisms that produce their own food."}], "id": "q02"}, {"question": "If a bear eats both wild berries and salmon, which category of consumer best describes the bear?", "options": [{"text": "Herbivore", "isCorrect": false, "rationale": "A herbivore eats only plants. Since the bear also eats salmon (an animal), it is not a herbivore."}, {"text": "Carnivore", "isCorrect": false, "rationale": "A carnivore eats only other animals. Since the bear also eats berries (plants), it is not a carnivore."}, {"text": "Omnivore", "isCorrect": true, "rationale": "An omnivore eats both plants and animals. By consuming berries (plants) and salmon (animals), the bear fits this description perfectly."}, {"text": "Decomposer", "isCorrect": false, "rationale": "A decomposer breaks down dead material. Eating live organisms (or recently deceased in the case of hunting) does not classify it as a decomposer."}], "id": "q03"}, {"question": "Imagine an ecosystem where all decomposers suddenly ceased to function. What would be the most immediate and significant impact on this ecosystem?", "options": [{"text": "The population of primary consumers would rapidly increase due to less competition.", "isCorrect": false, "rationale": "Without decomposers, nutrients would eventually become unavailable, leading to a collapse of the food web, including primary consumers. There might be an initial short-term effect, but it's not the most significant long-term impact discussed."}, {"text": "Producers would quickly run out of essential nutrients, halting their growth.", "isCorrect": true, "rationale": "The text explains that decomposers return vital nutrients to the soil. Without them, these nutrients would remain locked in dead material, preventing producers from absorbing them and growing, leading to ecosystem collapse."}, {"text": "The amount of sunlight captured by producers would decrease dramatically.", "isCorrect": false, "rationale": "The absence of decomposers would not directly affect the amount of sunlight available for photosynthesis."}, {"text": "The overall temperature of the ecosystem would increase significantly.", "isCorrect": false, "rationale": "While decomposition can generate some heat, its absence would not lead to a significant, ecosystem-wide temperature increase; nutrient cycling is the key role highlighted."}], "id": "q04"}, {"question": "Which of the following organisms is explicitly mentioned as a producer that generates 'more than half of all the oxygen on Earth'?", "options": [{"text": "Land plants like trees and grasses", "isCorrect": false, "rationale": "Land plants are producers and generate oxygen, but the text specifically attributes 'more than half of all the oxygen on Earth' to a different producer."}, {"text": "Fungi such as mushrooms and mold", "isCorrect": false, "rationale": "Fungi are decomposers, not producers, and do not generate oxygen."}, {"text": "Phytoplankton, microscopic ocean organisms", "isCorrect": true, "rationale": "The text states, 'Phytoplankton — microscopic producers that float in the ocean. Even though they are tiny, phytoplankton produce more than half of all the oxygen on Earth!'"}, {"text": "Earthworms living in the soil", "isCorrect": false, "rationale": "Earthworms are decomposers and do not produce oxygen through photosynthesis."}], "id": "q05"}, {"question": "The process of photosynthesis is critical because it directly provides which two essential components for life in an ecosystem?", "options": [{"text": "Carbon dioxide for decomposers and heat for consumers", "isCorrect": false, "rationale": "Photosynthesis consumes carbon dioxide, it doesn't provide it. It provides food/energy, not primarily heat, and decomposers break down, they don't consume CO2 in this manner."}, {"text": "Sugar (food) for the plant and oxygen for other organisms", "isCorrect": true, "rationale": "The text clearly states, 'Using the Sun's energy, the plant combines water and carbon dioxide to make a sugar called glucose — its food. As a bonus, the plant releases oxygen into the air for us to breathe!'"}, {"text": "Water for animals and nutrients for the soil", "isCorrect": false, "rationale": "Plants use water; they don't produce it for animals in this context. While they absorb nutrients, photosynthesis itself primarily produces sugar and oxygen."}, {"text": "Energy for the Sun and carbon for consumers", "isCorrect": false, "rationale": "The Sun provides energy for photosynthesis; photosynthesis does not provide energy for the Sun. It converts carbon into sugar, but this option is incorrectly phrased."}], "id": "q06"}, {"question": "What common characteristic defines all consumers, regardless of whether they are herbivores, carnivores, or omnivores?", "options": [{"text": "They all eat only plants.", "isCorrect": false, "rationale": "This only defines herbivores, not all consumers."}, {"text": "They all make their own food from sunlight.", "isCorrect": false, "rationale": "This defines producers, not consumers."}, {"text": "They all break down dead organisms.", "isCorrect": false, "rationale": "This defines decomposers, not consumers."}, {"text": "They all must eat other organisms to get energy.", "isCorrect": true, "rationale": "The text states, 'Animals cannot make food from sunlight. They must eat other organisms to get energy. That is why animals are called consumers — they consume (eat) food that other organisms produced.'"}], "id": "q07"}, {"question": "The 'sciencelife' box emphasizes the importance of decomposers. What would happen if decomposers were absent in terms of nutrient availability?", "options": [{"text": "Nutrients would become locked in dead material, making them unavailable for producers.", "isCorrect": true, "rationale": "The text states, 'Dead material would pile higher and higher, and the nutrients locked inside it would never return to the soil. Plants would run out of nutrients and stop growing.'"}, {"text": "Producers would generate more of their own nutrients directly from sunlight.", "isCorrect": false, "rationale": "Producers make food from sunlight, but they still require physical nutrients from the soil, which decomposers recycle."}, {"text": "Consumers would find new ways to extract nutrients from rocks.", "isCorrect": false, "rationale": "Consumers get nutrients by eating other organisms, not directly from rocks, and this is not the primary impact of decomposer absence."}, {"text": "The amount of nitrogen in the atmosphere would significantly increase.", "isCorrect": false, "rationale": "While decomposers are involved in nitrogen cycles, the most emphasized impact in the text is the general locking up of 'nutrients' in dead material, which affects all nutrient cycles directly for plants."}], "id": "q08"}, {"question": "Consider the cycle described: 'Producers use sunlight to make food and store energy. Consumers eat producers (or other consumers) to get energy. When producers and consumers die, decomposers break them down and return nutrients to the soil. Producers use those recycled nutrients to grow — and the cycle continues!' Which of the following best represents the continuous flow of energy in this cycle?", "options": [{"text": "From decomposers to producers to the Sun.", "isCorrect": false, "rationale": "Energy flows from the Sun, not to it from decomposers, and decomposers primarily cycle nutrients, not energy in this direction."}, {"text": "From the Sun to producers to consumers.", "isCorrect": true, "rationale": "The text explicitly states, 'Energy flows from the Sun through producers to consumers,' describing this as a continuous flow."}, {"text": "From consumers to decomposers to producers.", "isCorrect": false, "rationale": "This describes nutrient cycling, not the initial and continuous flow of energy, which starts with the Sun."}, {"text": "From the soil to producers to decomposers.", "isCorrect": false, "rationale": "This describes nutrient cycling, and the soil is where nutrients are absorbed, not the initial source of energy for the entire ecosystem."}], "id": "q09"}, {"question": "A fallen apple on the ground slowly crumbles apart, turns dark, and eventually becomes part of the soil. The 'thinkaboutit' prompt asks what role decomposers are playing. Based on the text, what is the primary function decomposers perform in this scenario?", "options": [{"text": "They are using the apple's energy to make new plant food.", "isCorrect": false, "rationale": "Decomposers break down material; they don't 'make new plant food' in the same way producers do. They release nutrients."}, {"text": "They are consuming the apple as a primary energy source to grow large quickly.", "isCorrect": false, "rationale": "While they do get energy, their primary function highlighted is breaking down dead material and returning nutrients, not rapid growth from consuming directly as consumers do."}, {"text": "They are breaking down the apple's material and returning its nutrients to the soil for reuse.", "isCorrect": true, "rationale": "The text explains decomposers 'break down dead plants...into simpler substances... These substances — called nutrients — go back into the soil, where plant roots absorb them. This means decomposers recycle nutrients so producers can use them again!'"}, {"text": "They are converting the apple's nutrients into pure oxygen for the atmosphere.", "isCorrect": false, "rationale": "Decomposers do not convert nutrients into oxygen; producers release oxygen during photosynthesis."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
