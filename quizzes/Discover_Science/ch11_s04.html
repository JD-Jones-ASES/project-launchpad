    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 11, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following statements about invertebrates is most accurate according to the text?", "options": [{"text": "Invertebrates represent a small, specialized group of animals, typically found in aquatic environments.", "isCorrect": false, "rationale": "The text states that about 95 percent of all animal species are invertebrates, indicating they are an enormous group, not a small one. While many live in water, they are not exclusively aquatic."}, {"text": "All invertebrates have soft bodies and live in water, lacking any form of external protection.", "isCorrect": false, "rationale": "This is incorrect. While some, like Cnidarians or Mollusks (octopuses), have soft bodies, others like Crustaceans have hard exoskeletons, and many Mollusks have shells. Many also live on land (e.g., insects, worms)."}, {"text": "Invertebrates are defined by their lack of a backbone and constitute the vast majority of animal species.", "isCorrect": true, "rationale": "The text explicitly defines invertebrates as 'animals without backbones' and states that they make up 'about 95 percent of all animal species'."}, {"text": "Invertebrates are primarily characterized by their ability to fly, using wings for locomotion and escaping predators.", "isCorrect": false, "rationale": "While many insects (a group of invertebrates) have wings, this is not a universal characteristic of all invertebrates. Arachnids, crustaceans, mollusks, and worms generally do not fly."}], "id": "q01"}, {"question": "An animal is observed to have eight legs and two main body parts. Based on this description, which group does it most likely belong to?", "options": [{"text": "Insect", "isCorrect": false, "rationale": "Insects are described as having six legs and three body parts (head, thorax, abdomen)."}, {"text": "Crustacean", "isCorrect": false, "rationale": "Crustaceans typically live in water and have a hard exoskeleton, but the text does not specify an eight-leg, two-body-part characteristic for all of them; rather, 'eight legs and two body parts' is specifically linked to arachnids."}, {"text": "Arachnid", "isCorrect": true, "rationale": "The text explicitly states, 'Arachnids — These have eight legs and two body parts. Spiders, scorpions, and ticks are arachnids.'"}, {"text": "Mollusk", "isCorrect": false, "rationale": "Mollusks are soft-bodied animals, many with shells, and they do not fit the description of having eight legs and two body parts (e.g., snails, octopuses)."}], "id": "q02"}, {"question": "A student discovers a small, marine animal that looks like a rock but is actually a colony of tiny organisms with stinging cells. Which invertebrate group does this animal most likely belong to?", "options": [{"text": "Worms", "isCorrect": false, "rationale": "Worms have soft, long bodies with no legs and are generally associated with soil or aquatic environments, but not described as stinging colonies resembling rocks."}, {"text": "Mollusks", "isCorrect": false, "rationale": "Mollusks are soft-bodied, many with shells, and while marine, they don't fit the description of a colony with stinging cells that resembles a rock."}, {"text": "Crustaceans", "isCorrect": false, "rationale": "Crustaceans typically have a hard exoskeleton and include crabs, lobsters, and shrimp, which do not match the description."}, {"text": "Cnidarians", "isCorrect": true, "rationale": "The text states: 'Cnidarians — Soft, water-dwelling animals with stinging cells. Examples: jellyfish, sea anemones, coral. Coral may look like a rock, but it is actually a colony of tiny animals!'"}], "id": "q03"}, {"question": "Which of the following best defines an 'adaptation' as described in the text?", "options": [{"text": "A temporary change in an animal's behavior in response to immediate danger.", "isCorrect": false, "rationale": "While an animal might temporarily change behavior, an adaptation is a long-term, inherited feature or behavior that develops over many generations, not a temporary response."}, {"text": "Any physical characteristic an animal is born with, regardless of its survival benefit.", "isCorrect": false, "rationale": "The definition specifies that an adaptation is a feature 'that helps a living thing survive in its environment,' implying a functional benefit beyond just being a physical characteristic."}, {"text": "A body feature or behavior that helps a living thing survive in its environment, developed over a long time.", "isCorrect": true, "rationale": "The text defines adaptation as 'a body feature or behavior that helps a living thing survive in its environment' and adds that 'Adaptations develop over a very long time, across many generations.'"}, {"text": "A learned skill an animal acquires during its lifetime to better hunt or escape.", "isCorrect": false, "rationale": "While learning can aid survival (as shown by Charles Henry Turner's work), adaptations are features or behaviors that develop over 'many generations,' implying a genetic component rather than individual learned skills."}], "id": "q04"}, {"question": "A polar bear's thick fur and blubber layer are examples of which type of adaptation?", "options": [{"text": "Behavior adaptation, as they are actions the bear takes to keep warm.", "isCorrect": false, "rationale": "Thick fur and blubber are physical body features, not actions or behaviors. While they help with warmth, they are structural, not behavioral."}, {"text": "Body adaptation, specifically a structural feature for temperature regulation.", "isCorrect": true, "rationale": "The text lists 'Thick fur or blubber' under 'Body Adaptations' and explains they help polar bears 'stay warm in icy weather,' which is a form of temperature regulation."}, {"text": "Behavior adaptation, as they help the bear migrate to warmer climates.", "isCorrect": false, "rationale": "Migration is a behavior adaptation. Fur and blubber are not behaviors and do not directly cause migration; they help the bear survive in its cold environment."}, {"text": "Sensory adaptation, enhancing its ability to detect prey in the snow.", "isCorrect": false, "rationale": "While sensory adaptations exist, fur and blubber are for insulation and protection, not for enhancing senses. The text does not link them to sensory function."}], "id": "q05"}, {"question": "Which of the following scenarios best illustrates a behavior adaptation, according to the text?", "options": [{"text": "A chameleon changes its skin color to match the leaves it's resting on.", "isCorrect": false, "rationale": "This is an example of camouflage, which is listed under 'Body Adaptations' as blending in with surroundings (a physical characteristic/ability)."}, {"text": "A beaver constructs a dam across a stream to create a deep, still pond for its lodge.", "isCorrect": true, "rationale": "The text explicitly lists 'Building shelters' as a 'Behavior adaptation,' using 'Beavers build dams and lodges' as an example."}, {"text": "A pufferfish inflates its body to appear larger and more threatening to predators.", "isCorrect": false, "rationale": "While an action, inflating its body relies on a physical mechanism (body structure) and is more akin to a defense mechanism that is a body adaptation in how it's carried out."}, {"text": "A poison dart frog displays bright colors that warn predators of its toxicity.", "isCorrect": false, "rationale": "Bright colors are listed under 'Body Adaptations' as a warning mechanism, making this a physical attribute, not a behavior."}], "id": "q06"}, {"question": "A group of birds flies south for the winter to find warmer temperatures and more food. This action is an example of:", "options": [{"text": "Hibernation, as the birds are conserving energy during cold months.", "isCorrect": false, "rationale": "Hibernation involves sleeping through winter, not traveling long distances. The example given in the text for flying south is specifically migration."}, {"text": "Camouflage, as they are changing their location to blend into a new environment.", "isCorrect": false, "rationale": "Camouflage refers to blending in visually with surroundings, usually by color or pattern. Flying to a new location is not camouflage."}, {"text": "Migration, which is a type of behavior adaptation.", "isCorrect": true, "rationale": "The text lists 'Migration' under 'Behavior Adaptations' and describes it as animals traveling long distances when seasons change, like geese flying south for warmer places with more food."}, {"text": "A body adaptation, because it involves the use of wings for flight.", "isCorrect": false, "rationale": "While wings are body adaptations, the act of traveling long distances seasonally is a pattern of behavior, not a physical feature itself. The 'action' of flying south falls under behavior adaptation."}], "id": "q07"}, {"question": "Considering the 'Animal Classification Cards' activity, if a student encounters a 'dolphin' card, into which group should it be sorted?", "options": [{"text": "Fish, because dolphins live in water and have fins.", "isCorrect": false, "rationale": "The setup guide specifically notes 'dolphin (mammal, not a fish)' as a tricky card for discussion, indicating it's not a fish despite its aquatic habitat."}, {"text": "Mammals, because dolphins are warm-blooded and nurse their young.", "isCorrect": true, "rationale": "The setup guide confirms 'dolphin (mammal, not a fish),' aligning with the biological characteristics of mammals such as being warm-blooded and nursing young, even though not explicitly stated in the main text, it's implied by the activity's context."}, {"text": "Reptiles, due to their streamlined bodies and ability to hold their breath underwater.", "isCorrect": false, "rationale": "Reptiles (like sea turtles, which are also mentioned in the activity) are typically cold-blooded and lay eggs, unlike dolphins. The text specifically classifies dolphins as mammals."}, {"text": "Invertebrates, as they lack obvious external bones like a backbone.", "isCorrect": false, "rationale": "Dolphins are vertebrates, possessing a backbone. The initial sorting step in the activity is 'vertebrates and invertebrates,' and dolphins clearly fall into the vertebrate category."}], "id": "q08"}, {"question": "Charles Henry Turner's research, such as showing honeybees can see colors and cockroaches can learn mazes, challenged the prevailing view that insects and spiders:", "options": [{"text": "Were too small to possess complex behaviors.", "isCorrect": false, "rationale": "While insects are small, the text does not state that the prevailing view was about their size impacting behavior complexity, but rather about the *nature* of their behavior."}, {"text": "Could only act on instinct and were incapable of learning.", "isCorrect": true, "rationale": "The text states: 'At a time when many people believed insects were simple creatures that only acted on instinct, Turner showed that they could actually learn.' His findings directly contradicted this belief."}, {"text": "Were less important to scientific study than vertebrates.", "isCorrect": false, "rationale": "The text emphasizes his work on insect behavior, not a general comparison of research importance between vertebrates and invertebrates."}, {"text": "Did not possess the necessary sensory organs for complex interactions.", "isCorrect": false, "rationale": "His discovery that honeybees can see colors suggests they *do* have sensory organs for complex interactions, rather than contradicting it."}], "id": "q09"}, {"question": "An octopus, described as 'one of the smartest invertebrates,' lacks a shell and bones. Which of the following adaptations would most likely be crucial for its survival given these characteristics?", "options": [{"text": "A hard exoskeleton for protection against predators.", "isCorrect": false, "rationale": "The text explicitly states an octopus 'has no shell and no bones,' making a hard exoskeleton (like crustaceans) an unlikely adaptation for its defense."}, {"text": "Hunting in groups to overpower larger prey.", "isCorrect": false, "rationale": "While octopuses are predators, the text does not imply they hunt in groups like wolves. Their intelligence and camouflage are more commonly associated with their hunting strategies."}, {"text": "Advanced camouflage and problem-solving abilities to avoid threats and find food.", "isCorrect": true, "rationale": "Given its soft body and lack of physical armor, a 'smart' invertebrate like an octopus would greatly benefit from behavioral adaptations like camouflage for concealment and problem-solving (intelligence) for navigating its environment, finding food, and escaping predators."}, {"text": "Thick fur or blubber to stay warm in icy waters.", "isCorrect": false, "rationale": "Octopuses are mollusks and are not described as having fur or blubber; these are adaptations for very cold environments typically found in mammals like polar bears."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
