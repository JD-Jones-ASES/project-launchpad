<script>
var QUESTIONS = [{"question": "Which of the following statements most accurately represents the distribution of Earth's water resources available for human consumption and use?", "options": [{"text": "About 97% of Earth's water is readily available fresh water found in lakes and rivers.", "isCorrect": false, "rationale": "This statement is incorrect. The text states that about 97% of Earth's water is salt water, and only a tiny fraction of fresh water is easily accessible."}, {"text": "The vast majority of Earth's fresh water is locked in glaciers and ice caps, making only a very small percentage easily accessible in lakes and rivers.", "isCorrect": true, "rationale": "The text explains that 97% of Earth's water is salt water, and of the 3% that is fresh water, most is frozen in glaciers and ice caps, leaving only a minuscule amount (3 mL in the 1-liter analogy) in accessible lakes and rivers."}, {"text": "Groundwater constitutes the largest easily accessible source of fresh water for human populations.", "isCorrect": false, "rationale": "While groundwater is a source of fresh water, the text's analogy shows it is harder to get to than the surface water, and a significant portion of fresh water is still locked in glaciers, not groundwater."}, {"text": "Desalination technology has made most ocean water a practical and cost-effective source of drinking water globally.", "isCorrect": false, "rationale": "The text indicates that desalination is energy-intensive and expensive, implying it is not a universally practical or cost-effective solution for making most ocean water drinkable on a large scale."}], "id": "q01"}, {"question": "Why does drinking ocean water make a person more thirsty, rather than hydrating them?", "options": [{"text": "The extreme cold temperature of ocean water shocks the body's systems, preventing hydration.", "isCorrect": false, "rationale": "The text does not mention temperature as the reason for increased thirst; it focuses on the dissolved salt content."}, {"text": "The high concentration of dissolved salts in ocean water forces the body to use its own water reserves to flush out the excess salt.", "isCorrect": true, "rationale": "The text explicitly states that 'drinking salt water actually makes you more thirsty because your body has to use its own water to flush out the extra salt,' due to the high salt concentration."}, {"text": "Ocean water contains harmful bacteria and pathogens that cause dehydration symptoms.", "isCorrect": false, "rationale": "While ocean water may contain pathogens, the primary reason given in the text for increased thirst is the salt content, not microbial contamination."}, {"text": "The mineral content in ocean water causes a chemical reaction in the stomach that reduces water absorption.", "isCorrect": false, "rationale": "The text attributes the issue directly to the body's need to flush excess salt, not a specific chemical reaction preventing absorption."}], "id": "q02"}, {"question": "A community living near the coast is experiencing a severe drought, and their traditional fresh water sources are dwindling. They are considering desalination as a solution. Based on the text, what is a primary challenge they would face with this approach?", "options": [{"text": "Desalination technology is not yet advanced enough to remove all salt from ocean water.", "isCorrect": false, "rationale": "The text states that desalination 'works' to remove salt, implying the technology is effective, but highlights other challenges."}, {"text": "The process of desalination requires a significant amount of energy and money, making it a costly option.", "isCorrect": true, "rationale": "The text directly states, 'It works, but it takes a lot of energy and money,' identifying these as key challenges for desalination."}, {"text": "Desalinated water loses its beneficial minerals, making it unhealthy for long-term consumption.", "isCorrect": false, "rationale": "The text does not discuss the nutritional aspects or long-term health effects of desalinated water; its focus is on energy and cost."}, {"text": "The by-products of desalination are highly toxic and impossible to dispose of safely.", "isCorrect": false, "rationale": "The text does not mention toxic by-products or disposal challenges; its focus is on energy and monetary costs."}], "id": "q03"}, {"question": "Water conservation is crucial even though the water cycle naturally recycles water. Which of the following best explains why this is the case?", "options": [{"text": "The water cycle primarily recycles salt water, not fresh water, making fresh water supplies finite.", "isCorrect": false, "rationale": "The water cycle recycles all water, including fresh water. The issue is the *rate* and *availability*, not that fresh water isn't recycled."}, {"text": "Human populations often use fresh water much faster than the natural water cycle can replenish local sources, leading to depletion.", "isCorrect": true, "rationale": "The text states, 'If people use fresh water faster than nature can recycle it, rivers can dry up, wells can go empty, and farms can fail,' directly addressing why conservation is important despite the water cycle."}, {"text": "The water cycle only functions in certain climates, leaving many regions without natural water replenishment.", "isCorrect": false, "rationale": "The water cycle is a global phenomenon, not limited to specific climates, although its effects vary by region."}, {"text": "Recycled water from the water cycle is often contaminated and unusable without extensive treatment.", "isCorrect": false, "rationale": "While water quality is a concern, the text emphasizes the *rate* of usage versus replenishment as the primary reason for conservation, not inherent contamination of naturally recycled water."}], "id": "q04"}, {"question": "A family is trying to reduce their household water usage. Based on the conservation tips provided in the text, which action would lead to the most significant water savings over a year?", "options": [{"text": "Using a full load in the dishwasher or washing machine every time.", "isCorrect": false, "rationale": "This is a good tip, but the text provides more impactful daily savings elsewhere (like fixing leaks or shortening showers)."}, {"text": "Turning off the tap while brushing teeth, saving 8 liters per brush.", "isCorrect": false, "rationale": "This is a good tip and saves a significant amount per instance, but likely less than fixing a continuous drip over a year."}, {"text": "Fixing a dripping faucet that wastes thousands of liters per year.", "isCorrect": true, "rationale": "The text explicitly states, 'A dripping faucet can waste thousands of liters per year.' This represents a continuous and potentially very large waste, making its repair a highly significant conservation action."}, {"text": "Watering garden plants only in the early morning or evening.", "isCorrect": false, "rationale": "This tip saves water by reducing evaporation, but the text suggests fixing a leak can save 'thousands of liters per year,' which is a more direct and potentially larger saving."}], "id": "q05"}, {"question": "In the 'Water Cycle in a Bag' activity, what stage of the water cycle is primarily represented by the tiny water droplets forming on the inside of the plastic bag above the water line?", "options": [{"text": "Evaporation, as the water is turning into vapor.", "isCorrect": false, "rationale": "Evaporation is when water turns into vapor and rises. The droplets forming represent the reverse process."}, {"text": "Condensation, as water vapor cools and changes back into liquid drops.", "isCorrect": true, "rationale": "The text explains, 'After a while, you should see tiny water droplets forming on the inside of the bag above the water line. That is condensation!' It further clarifies that 'the vapor rises and hits the cooler plastic, and the vapor turns back into liquid drops.'"}, {"text": "Precipitation, as the droplets are falling down the bag.", "isCorrect": false, "rationale": "Precipitation occurs when the droplets fall. The question refers to the formation of droplets on the bag's surface, not their descent."}, {"text": "Collection, as water gathers at the bottom of the bag.", "isCorrect": false, "rationale": "Collection is when water gathers. The formation of droplets is a preceding stage to their collection at the bottom."}], "id": "q06"}, {"question": "What is the main purpose of taping the 'Water Cycle in a Bag' to a sunny window?", "options": [{"text": "To keep the bag upright and prevent water from spilling.", "isCorrect": false, "rationale": "While taping helps secure the bag, its primary purpose in this experiment, given the context, is not simply to prevent spills."}, {"text": "To provide the heat energy necessary to cause the water to evaporate.", "isCorrect": true, "rationale": "The text explains that 'the sun heats the water (evaporation),' indicating that the sunny window provides the energy for the evaporation stage of the water cycle model."}, {"text": "To demonstrate the effect of direct light on water's clarity.", "isCorrect": false, "rationale": "The experiment is about the water cycle processes (evaporation, condensation), not water clarity."}, {"text": "To cool the water inside the bag, enhancing condensation.", "isCorrect": false, "rationale": "The sun heats the water, which promotes evaporation. While a cooler surface is needed for condensation, the sun's role is to drive the initial heating and evaporation."}], "id": "q07"}, {"question": "Syukuro Manabe's research significantly contributed to our understanding of Earth's climate. Which of the following best describes the central connection he identified?", "options": [{"text": "He proved that ocean currents are the sole drivers of global weather patterns.", "isCorrect": false, "rationale": "The text states Manabe 'helped the world understand how water and air work together' and modeled the atmosphere, not solely ocean currents."}, {"text": "He demonstrated how the water cycle and the atmosphere are closely linked, with changes in one affecting the other.", "isCorrect": true, "rationale": "The text concludes, 'Thanks to scientists like Manabe, we understand that the water cycle and the atmosphere are closely linked — and that changes to one can affect the other,' summarizing his key contribution."}, {"text": "His work showed that human activities have no measurable impact on global climate change.", "isCorrect": false, "rationale": "Manabe's work showed how gases like carbon dioxide trap heat and warm the planet, which is contrary to this statement and supports human impact on climate."}, {"text": "He developed the first methods for directly measuring glacial ice melt rates.", "isCorrect": false, "rationale": "Manabe's research focused on computer models of the atmosphere and its link to the water cycle, not direct measurement of glacial melt."}], "id": "q08"}, {"question": "Given the 'Think About It' prompt and the overall message of the section, what is the most profound implication of understanding the limited availability of easy-to-reach fresh water?", "options": [{"text": "It implies that desalination will soon become the primary source of drinking water for all global populations.", "isCorrect": false, "rationale": "While desalination is a technology, the text highlights its high cost and energy use, making it unlikely to be the *primary* source for *all* populations in the near future, especially when contrasted with the urgent need for conservation."}, {"text": "It highlights the critical importance of water conservation and wise water management for the sustainability of life on Earth.", "isCorrect": true, "rationale": "The entire section, from the introduction to the conservation tips and the 'Think About It' prompt, emphasizes the scarcity of readily available fresh water and the necessity of protecting and conserving it for the future."}, {"text": "It suggests that most human settlements will need to relocate to areas with abundant glaciers and ice caps.", "isCorrect": false, "rationale": "The text notes that glaciers are 'far from where people live' and hard to reach, not a practical solution for relocation."}, {"text": "It means that the water cycle is insufficient to provide enough water, so artificial water creation is necessary.", "isCorrect": false, "rationale": "The water cycle *does* provide water; the problem is the rate of human use compared to natural replenishment, and the distribution of fresh vs. salt water, not that the water cycle itself is insufficient."}], "id": "q09"}, {"question": "A student sets up the 'Water Cycle in a Bag' experiment but places it in a dark closet instead of a sunny window. What would be the most likely outcome?", "options": [{"text": "The water would evaporate more quickly due to the enclosed space, but condensation would not occur.", "isCorrect": false, "rationale": "Evaporation requires heat (from the sun in this experiment), which would be absent in a dark closet. An enclosed space alone doesn't guarantee faster evaporation without heat."}, {"text": "Both evaporation and condensation would be significantly reduced or absent because the necessary heat energy for evaporation would be missing.", "isCorrect": true, "rationale": "The text states the sun 'heats the water (evaporation).' Without sunlight, there would be minimal heating, leading to little to no evaporation, and consequently, no significant condensation."}, {"text": "The bag would still demonstrate a full water cycle, but it would take a much longer time.", "isCorrect": false, "rationale": "Without the primary energy source (sunlight/heat), the initial evaporation step would be severely inhibited, preventing a noticeable water cycle from forming."}, {"text": "The water would turn blue more intensely, demonstrating the collection stage of the water cycle.", "isCorrect": false, "rationale": "Food coloring is optional and only makes the water easier to see. Its intensity or the collection stage are not affected by the absence of light in this context."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
