    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 14, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the scientific term for when energy changes from one form to another?", "options": [{"text": "Energy creation", "isCorrect": false, "rationale": "The text explicitly states that energy is never created, only transformed."}, {"text": "Energy transformation", "isCorrect": true, "rationale": "The section defines 'energy transformation' as when energy changes from one form to another, and it is a central concept."}, {"text": "Energy destruction", "isCorrect": false, "rationale": "The Law of Conservation of Energy states that energy is never destroyed, only transformed."}, {"text": "Energy conversion", "isCorrect": false, "rationale": "While 'conversion' is a synonym, the specific scientific term introduced and emphasized in the text is 'energy transformation'."}]}, {"question": "When you turn on a lamp, what is the primary energy transformation that occurs?", "options": [{"text": "Light energy into heat energy.", "isCorrect": false, "rationale": "While light bulbs produce both light and heat, the initial input is not light energy transforming into heat. Light and heat are the outputs."}, {"text": "Chemical energy into light energy.", "isCorrect": false, "rationale": "Lamps typically do not use chemical energy directly for light; they use electrical energy."}, {"text": "Electrical energy into light and heat energy.", "isCorrect": true, "rationale": "The text directly states: 'Electrical energy flows through the wire into the light bulb. Inside the bulb, electrical energy transforms into light energy and heat energy.'"}, {"text": "Kinetic energy into electrical energy.", "isCorrect": false, "rationale": "This describes a generator, not the operation of a lamp once turned on."}]}, {"question": "Imagine you are clapping your hands. Which sequence accurately describes the energy transformations involved, starting from your body's energy source?", "options": [{"text": "Kinetic energy -> Chemical energy -> Sound energy -> Heat energy", "isCorrect": false, "rationale": "The sequence is incorrect; chemical energy comes first, and kinetic energy is an intermediate step."}, {"text": "Chemical energy -> Kinetic energy -> Sound energy + Heat energy", "isCorrect": true, "rationale": "The text states: 'Your muscles use chemical energy (from food) to move your hands. When your hands hit each other, the kinetic energy of the moving hands turns into sound energy... and a tiny bit of heat energy.'"}, {"text": "Potential energy -> Kinetic energy -> Chemical energy -> Sound energy", "isCorrect": false, "rationale": "Potential energy is not the starting point for hand clapping in this context, and chemical energy is mispositioned."}, {"text": "Electrical energy -> Kinetic energy -> Sound energy -> Heat energy", "isCorrect": false, "rationale": "Clapping hands does not involve electrical energy."}]}, {"question": "What is the primary purpose of drawing an 'energy chain' in science?", "options": [{"text": "To prove that energy can be created and destroyed.", "isCorrect": false, "rationale": "Energy chains illustrate transformations, not creation or destruction, which are contrary to the Law of Conservation of Energy."}, {"text": "To measure the exact amount of energy lost at each step.", "isCorrect": false, "rationale": "While energy might dissipate as less useful forms, the text describes energy chains as showing 'each step' of transformation, not as a tool for precise measurement of loss."}, {"text": "To show how energy changes form step-by-step from a source to final observable forms.", "isCorrect": true, "rationale": "The text explicitly states: 'Scientists sometimes draw an energy chain to show each step... they always start with an energy source and end with the final forms of energy you can observe.'"}, {"text": "To illustrate how different types of energy never interact with each other.", "isCorrect": false, "rationale": "Energy chains demonstrate precisely the opposite – how different forms of energy *do* interact and transform into one another."}]}, {"question": "Consider the energy chain: Sun (light energy) → Plant (chemical energy) → You eat the plant (chemical energy) → You run (kinetic energy + heat energy). What does this chain primarily demonstrate?", "options": [{"text": "The destruction of energy as it moves through organisms.", "isCorrect": false, "rationale": "This contradicts the Law of Conservation of Energy, which states energy is never destroyed."}, {"text": "The creation of new energy forms at each step.", "isCorrect": false, "rationale": "Energy is transformed, not created, at each step."}, {"text": "How energy is conserved and transforms through a series of steps.", "isCorrect": true, "rationale": "This chain illustrates the continuous transformation of energy from one form to another, starting from the sun and ending with human activity, consistent with the conservation of energy."}, {"text": "That light energy is the only true source of energy.", "isCorrect": false, "rationale": "While the sun is a primary source, the statement that it's the *only* true source is not supported or implied as the primary demonstration of this specific chain; the focus is on the *transformations*."}]}, {"question": "Which of the following statements best describes the Law of Conservation of Energy?", "options": [{"text": "Energy can only be created from specific sources.", "isCorrect": false, "rationale": "The law states energy is never created."}, {"text": "Energy is constantly being destroyed and recreated.", "isCorrect": false, "rationale": "The law states energy is never destroyed and never created."}, {"text": "Energy can change form but is never created or destroyed.", "isCorrect": true, "rationale": "This is the direct definition provided in the text: 'Conservation of energy: the scientific rule that energy cannot be created or destroyed — it can only change from one form to another.'"}, {"text": "The total amount of energy in the universe is gradually decreasing.", "isCorrect": false, "rationale": "The law implies the total amount of energy in a closed system (or the universe) remains constant, though its form may change."}]}, {"question": "According to the Law of Conservation of Energy, when a dropped ball eventually stops bouncing, where does its initial potential and kinetic energy go?", "options": [{"text": "It vanishes completely because the ball is no longer moving.", "isCorrect": false, "rationale": "The text explicitly refutes this: 'When a ball stops bouncing, it may look like the energy is gone. But the energy has transformed into tiny amounts of heat and sound that are too small for you to notice.'"}, {"text": "It is absorbed back into the ball, increasing its mass.", "isCorrect": false, "rationale": "Energy transformation does not typically involve mass increase in this context, nor is it 'absorbed back' in the sense of being stored for later use in the same form."}, {"text": "It transforms into other forms like sound and heat energy, spreading into the surroundings.", "isCorrect": true, "rationale": "The text explains: 'When it hits the floor, some of the energy transforms into sound energy (the bounce noise) and heat energy (a tiny amount). ...The energy is still there — just in a different form.'"}, {"text": "It is stored as dormant kinetic energy, ready for the next bounce.", "isCorrect": false, "rationale": "Dormant kinetic energy is a contradiction in terms, and the energy is transformed, not stored in its original kinetic form."}]}, {"question": "A student asks, 'If energy is never destroyed, why do batteries run out?' Based on the provided text, what is the best explanation?", "options": [{"text": "Batteries actually destroy energy, making them an exception to the law.", "isCorrect": false, "rationale": "The text addresses this directly in the 'Common Confusion' section, stating batteries are *not* an exception and energy is not destroyed."}, {"text": "The chemical energy stored in the battery has been transformed into other forms like light and heat, not destroyed.", "isCorrect": true, "rationale": "The 'Common Confusion' section explains: 'Explain that the chemical energy stored in the battery has been transformed into other forms (light, heat, sound). The energy is not gone — it has just spread out into the surroundings.'"}, {"text": "Batteries convert energy into a form that cannot be detected.", "isCorrect": false, "rationale": "While some forms might be less obvious (tiny amounts of heat), the text specifies the energy transforms into detectable forms like light and heat."}, {"text": "The energy is used up and then simply disappears from existence.", "isCorrect": false, "rationale": "This contradicts the Law of Conservation of Energy, which is the core principle being explained."}]}, {"question": "When a person rides a bicycle downhill without pedaling, the bicycle gains kinetic energy. Where does this kinetic energy primarily originate from, according to the principles discussed?", "options": [{"text": "From the air resistance acting on the cyclist.", "isCorrect": false, "rationale": "Air resistance opposes motion and would convert kinetic energy into heat, not create it."}, {"text": "From chemical energy stored in the bicycle frame.", "isCorrect": false, "rationale": "Bicycle frames do not store chemical energy that converts to kinetic energy for movement."}, {"text": "From the potential energy the bicycle had at the top of the hill.", "isCorrect": true, "rationale": "The 'thinkaboutit' section directly prompts this: 'When you ride a bicycle downhill without pedaling, where does the kinetic energy come from? (Hint: think about what kind of energy the bicycle had at the top of the hill?)' This implies potential energy converting to kinetic energy."}, {"text": "From friction between the tires and the road.", "isCorrect": false, "rationale": "Friction would convert kinetic energy into heat and sound, slowing the bicycle down, not creating kinetic energy."}]}, {"question": "You eat a banana and then go for a run. Which of the following statements accurately reflects the energy transformations and the Law of Conservation of Energy in this scenario?", "options": [{"text": "The chemical energy in the banana is entirely converted into kinetic energy for running, with no other forms produced.", "isCorrect": false, "rationale": "The text specifically mentions heat and sound energy are also produced during a run, not just kinetic energy."}, {"text": "The banana creates new energy for your body to run, demonstrating energy creation.", "isCorrect": false, "rationale": "The Law of Conservation of Energy states energy is never created; it is transformed."}, {"text": "The chemical potential energy from the banana is transformed into kinetic energy for movement, heat energy, and sound energy, while the total energy remains conserved.", "isCorrect": true, "rationale": "The text states: 'The banana holds chemical potential energy. Your body breaks down the banana and transforms that stored energy into kinetic energy (your legs moving), heat energy (you warm up), and even sound energy (your feet hitting the ground).' This directly aligns with the concept of transformation and conservation."}, {"text": "The energy from the banana is destroyed as you run, which is why you feel tired afterward.", "isCorrect": false, "rationale": "Energy is never destroyed; it is transformed. Feeling tired is a result of energy transformation and depletion of readily available chemical energy, not destruction."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
