    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 9, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The text compares a tennis ball and a baseball, noting the baseball feels much heavier despite similar size. What key concept does this comparison primarily illustrate?", "options": [{"text": "How to measure the volume of spherical objects.", "isCorrect": false, "rationale": "The comparison focuses on weight (mass) and size, not directly on the method of measuring volume, which is covered later."}, {"text": "The difference between mass and size.", "isCorrect": true, "rationale": "The example highlights that objects can be similar in size (how much space they take up) but vastly different in mass (how much matter they contain), directly illustrating the distinction between these two concepts."}, {"text": "That all large objects have greater mass.", "isCorrect": false, "rationale": "The text explicitly refutes this idea with the example of a beach ball (large size, little mass) versus a small rock (small size, lots of mass)."}, {"text": "The importance of using kilograms for measurement.", "isCorrect": false, "rationale": "While kilograms are a unit of mass, the example itself does not emphasize the specific unit but rather the concept of mass itself compared to size."}], "id": "q01"}, {"question": "According to the provided benchmarks, a small cat has a mass of about 4 kg. How would this mass be expressed in grams?", "options": [{"text": "40 g", "isCorrect": false, "rationale": "This conversion incorrectly multiplies by 10 instead of 1000."}, {"text": "400 g", "isCorrect": false, "rationale": "This conversion incorrectly multiplies by 100 instead of 1000."}, {"text": "4,000 g", "isCorrect": true, "rationale": "The text states that 'A kilogram (kg) is 1000 grams,' so 4 kg is equal to 4 x 1000 g = 4,000 g."}, {"text": "0.004 g", "isCorrect": false, "rationale": "This conversion incorrectly divides by 1000, converting kilograms to a much smaller number of grams, which is incorrect."}], "id": "q02"}, {"question": "A student needs to find out 'how much matter' is in a new textbook. Based on the text, what tool and measurement unit should they primarily use?", "options": [{"text": "A graduated cylinder to measure in liters.", "isCorrect": false, "rationale": "A graduated cylinder is used for measuring volume, not mass, and liters are units of volume."}, {"text": "A balance to measure in grams or kilograms.", "isCorrect": true, "rationale": "The text defines mass as the amount of matter, measured in grams or kilograms, and states that 'A balance compares the mass of an object to known weights' to find its mass."}, {"text": "A ruler to measure in centimeters.", "isCorrect": false, "rationale": "A ruler measures length or dimensions, which can help determine size, but not directly the amount of matter (mass)."}, {"text": "A measuring cup to measure in milliliters.", "isCorrect": false, "rationale": "A measuring cup is used for volume, and milliliters are units of volume, not mass."}], "id": "q03"}, {"question": "Which of the following scenarios best demonstrates the concept of volume as defined in the text?", "options": [{"text": "Comparing a rock and a feather, where the rock is heavier.", "isCorrect": false, "rationale": "This scenario primarily compares mass (heaviness), not how much space each object takes up (volume)."}, {"text": "Noticing that a balloon full of air takes up a lot of space but has very little mass.", "isCorrect": true, "rationale": "The text defines volume as 'the amount of space that something takes up' and uses the example of a balloon to highlight that an object can have a large volume but little mass."}, {"text": "Weighing a paperclip to determine it has a mass of about 1 gram.", "isCorrect": false, "rationale": "This scenario directly relates to mass, not volume."}, {"text": "Calculating how many kilograms are in 1000 grams.", "isCorrect": false, "rationale": "This is a unit conversion for mass, not an illustration of the concept of volume."}], "id": "q04"}, {"question": "A standard large water bottle holds about 1 L of water. Based on the text, how many milliliters is this equivalent to?", "options": [{"text": "10 mL", "isCorrect": false, "rationale": "This conversion incorrectly multiplies by 10 instead of 1000."}, {"text": "100 mL", "isCorrect": false, "rationale": "This conversion incorrectly multiplies by 100 instead of 1000."}, {"text": "1,000 mL", "isCorrect": true, "rationale": "The text clearly states that 'A liter (L) is 1000 milliliters,' so 1 L equals 1,000 mL."}, {"text": "0.001 mL", "isCorrect": false, "rationale": "This conversion incorrectly divides by 1000, converting liters to a much smaller number of milliliters, which is incorrect."}], "id": "q05"}, {"question": "When measuring the volume of a liquid in a graduated cylinder, the text advises to 'read the number at the bottom of the curved surface.' What is this curved surface called, and why is this specific reading important?", "options": [{"text": "It's called the horizon, and it's important to read the middle for stability.", "isCorrect": false, "rationale": "The curved surface is called the meniscus, not the horizon. Reading the middle is not the recommended accurate method."}, {"text": "It's called the meniscus, and reading its bottom provides the most accurate measurement because water sticks to the glass.", "isCorrect": true, "rationale": "The text explicitly states 'This curve is called the meniscus' and 'Always read the bottom of the curve...for the most accurate measurement,' explaining that 'water sticks slightly to the glass.'"}, {"text": "It's called the liquid line, and reading the top prevents spills.", "isCorrect": false, "rationale": "The curved surface is called the meniscus, not the liquid line. Reading the top edge is incorrect for accurate measurement."}, {"text": "It's called the level, and reading the edges helps account for evaporation.", "isCorrect": false, "rationale": "The curved surface is called the meniscus, not the level. Reading the edges is incorrect, and the text does not mention evaporation in this context."}], "id": "q06"}, {"question": "A student is using a graduated cylinder to measure 200 mL of juice. They pour the juice in and observe the meniscus. Where should the student position their eyes to get an accurate reading?", "options": [{"text": "Standing above the cylinder, looking down at the liquid.", "isCorrect": false, "rationale": "The text instructs to 'Crouch down so your eyes are level with the liquid' for an accurate reading, as looking down would result in an inaccurate reading (parallax error)."}, {"text": "At an angle to the side, slightly below the liquid level.", "isCorrect": false, "rationale": "The text specifies 'eyes are level with the liquid,' meaning neither above nor below, but directly aligned horizontally."}, {"text": "Level with the bottom of the meniscus.", "isCorrect": true, "rationale": "The text advises to 'Crouch down so your eyes are level with the liquid' and 'Read the number at the bottom of the curved surface,' indicating that one's eye level should align with the bottom of the meniscus for accuracy."}, {"text": "Level with the top edge of the liquid where it touches the glass.", "isCorrect": false, "rationale": "The text explicitly states to 'Always read the bottom of the curve — not the edges — for the most accurate measurement.'"}], "id": "q07"}, {"question": "Which of the following items would most appropriately be measured using the water displacement method?", "options": [{"text": "The mass of a handful of sand.", "isCorrect": false, "rationale": "Water displacement measures volume, not mass. Also, while sand is granular, its irregular shape is not the primary reason to use displacement for mass."}, {"text": "The volume of juice in a juice box.", "isCorrect": false, "rationale": "Juice is a liquid and would be measured directly using a graduated cylinder or measuring cup, not water displacement."}, {"text": "The volume of an irregularly shaped toy car.", "isCorrect": true, "rationale": "The text states, 'What if you want to measure the volume of a rock or a toy dinosaur? You cannot pour it into a graduated cylinder! Instead, you use a trick called water displacement,' making an irregularly shaped toy car a perfect candidate."}, {"text": "The length of a piece of string.", "isCorrect": false, "rationale": "Water displacement measures volume. Length is measured with a ruler or measuring tape."}], "id": "q08"}, {"question": "A scientist uses water displacement to find the volume of a mineral sample. The water in the graduated cylinder starts at 60 mL. After gently adding the mineral, the water level rises to 85 mL. What is the volume of the mineral sample?", "options": [{"text": "25 mL", "isCorrect": true, "rationale": "To find the object's volume using water displacement, you subtract the initial water level from the final water level: 85 mL - 60 mL = 25 mL. This is consistent with the example provided in the text."}, {"text": "60 mL", "isCorrect": false, "rationale": "This is the initial water volume, not the volume of the mineral sample."}, {"text": "85 mL", "isCorrect": false, "rationale": "This is the final water volume after the mineral was added, not the volume of the mineral itself."}, {"text": "145 mL", "isCorrect": false, "rationale": "This incorrectly adds the initial and final volumes instead of subtracting them."}], "id": "q09"}, {"question": "Jamal has two rocks: Rock A (mass 200 g, volume 50 mL) and Rock B (mass 200 g, volume 100 mL). Both rocks have the same mass. What does the difference in their volumes tell us about the rocks?", "options": [{"text": "Rock B is heavier than Rock A because it has a larger volume.", "isCorrect": false, "rationale": "The problem states both rocks have the 'same mass' (200 g), so neither is heavier than the other. Mass and volume are distinct concepts."}, {"text": "Rock A contains less matter than Rock B.", "isCorrect": false, "rationale": "Mass is the 'amount of matter,' and both rocks have the same mass (200 g), meaning they contain the same amount of matter."}, {"text": "The matter in Rock A is packed more tightly than in Rock B.", "isCorrect": true, "rationale": "Since both rocks have the same mass (same amount of matter) but Rock A takes up less space (smaller volume), its matter must be packed more tightly. This aligns with the 'Think About It' section's conclusion about density without explicitly naming density."}, {"text": "Both rocks will take up the same amount of space because they have the same mass.", "isCorrect": false, "rationale": "The problem explicitly states Rock A has a volume of 50 mL and Rock B has a volume of 100 mL, clearly showing they take up different amounts of space despite having the same mass. This reinforces that mass and volume are independent measurements."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
