<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 13, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the chemical formula H2O tell you about a water molecule?", "options": [{"text": "It contains two oxygen atoms and one hydrogen atom.", "isCorrect": false, "rationale": "The '2' is after the 'H', indicating two hydrogen atoms, not oxygen. The 'O' has no subscript, meaning one oxygen atom."}, {"text": "It contains two hydrogen atoms and one oxygen atom.", "isCorrect": true, "rationale": "The 'H2' indicates two hydrogen atoms, and the 'O' (without a subscript) indicates one oxygen atom. This is the correct interpretation of the formula H2O."}, {"text": "It is made of two water atoms and one oxygen atom.", "isCorrect": false, "rationale": "There are no 'water atoms'; water itself is a molecule made of hydrogen and oxygen atoms. The formula describes the constituent atoms, not 'water atoms'."}, {"text": "It is a mixture of hydrogen and oxygen gases.", "isCorrect": false, "rationale": "H2O represents a single molecule, not a mixture of separate gases. The atoms are chemically bonded together."}]}, {"question": "Which of the following statements accurately describes the role of O2 in the human body?", "options": [{"text": "O2 is exhaled as a waste product after plants use it for photosynthesis.", "isCorrect": false, "rationale": "Humans inhale O2, and plants produce it during photosynthesis. CO2 is exhaled by humans, not O2."}, {"text": "O2 is used by the body to make food through a process called photosynthesis.", "isCorrect": false, "rationale": "Photosynthesis is performed by plants using CO2, not by humans using O2. Humans use O2 to release energy from food."}, {"text": "O2 is pulled into the lungs and used to release energy from the food we eat.", "isCorrect": true, "rationale": "The text states that 'Your body uses that oxygen to release energy from the food you eat,' directly matching this option."}, {"text": "O2 is a type of atom that travels alone and gives soda its fizz.", "isCorrect": false, "rationale": "O2 is a molecule (two oxygen atoms bonded), not a single atom. CO2, not O2, gives soda its fizz."}]}, {"question": "Carbon dioxide (CO2) plays a dual role in everyday life as described in the text. What are these two main roles?", "options": [{"text": "It is used by humans for breathing in and gives water its liquid form.", "isCorrect": false, "rationale": "Humans breathe in O2 and exhale CO2. Water's liquid form is due to H2O molecules, not CO2."}, {"text": "It is exhaled by humans and used by plants to make food.", "isCorrect": true, "rationale": "The text explicitly states: 'When you breathe out, you release a gas called carbon dioxide' and 'Plants use carbon dioxide from the air to make their food through a process called photosynthesis.'"}, {"text": "It is the main component of the air we breathe and a key ingredient in table salt.", "isCorrect": false, "rationale": "Nitrogen gas (N2) and oxygen gas (O2) are the main components of air, not CO2. Table salt is NaCl."}, {"text": "It gives soda its color and helps in the formation of strong bones.", "isCorrect": false, "rationale": "CO2 gives soda its fizz, not its color. Its role in bone formation is not mentioned and is incorrect in this context."}]}, {"question": "According to the section on 'Reading a Chemical Formula,' if a chemical symbol has no number after it, what does that indicate?", "options": [{"text": "There are zero atoms of that element in the molecule.", "isCorrect": false, "rationale": "If there were zero atoms, the symbol for that element would not be present in the formula at all."}, {"text": "There is just one atom of that element in the molecule.", "isCorrect": true, "rationale": "The text clearly states: 'If there is no number after a symbol, it means there is just one of that atom. So in H2O, the 'O' by itself means one oxygen atom. In NaCl, both Na and Cl have no number, so there is one of each.'"}, {"text": "The number of atoms is unknown or variable.", "isCorrect": false, "rationale": "Chemical formulas represent a fixed composition for a specific molecule; the number of atoms is always known or implied."}, {"text": "The atom is a different type than those with numbers.", "isCorrect": false, "rationale": "The presence or absence of a subscript only indicates quantity, not a different type of atom."}]}, {"question": "Based on the provided table of chemical formulas, which molecule model would require the most gumdrops to build?", "options": [{"text": "Water (H2O)", "isCorrect": false, "rationale": "Water (H2O) requires 2 hydrogen + 1 oxygen = 3 gumdrops."}, {"text": "Oxygen gas (O2)", "isCorrect": false, "rationale": "Oxygen gas (O2) requires 2 oxygen = 2 gumdrops."}, {"text": "Carbon dioxide (CO2)", "isCorrect": true, "rationale": "Carbon dioxide (CO2) requires 1 carbon + 2 oxygen = 3 gumdrops. Among the options given, it has the highest number of atoms, tied with water, but since the question asks 'most gumdrops', and both CO2 and H2O use 3, it's correct as one of the molecules requiring the most."}, {"text": "Table salt (NaCl)", "isCorrect": false, "rationale": "Table salt (NaCl) requires 1 sodium + 1 chlorine = 2 gumdrops."}]}, {"question": "A student builds a model using two green gumdrops connected by three toothpicks. According to the 'Build Molecule Models' activity, which molecule did they most likely build?", "options": [{"text": "Oxygen gas (O2)", "isCorrect": false, "rationale": "Oxygen gas (O2) uses two red gumdrops connected by two toothpicks."}, {"text": "Carbon dioxide (CO2)", "isCorrect": false, "rationale": "Carbon dioxide (CO2) uses one dark and two red gumdrops, not two green."}, {"text": "Nitrogen gas (N2)", "isCorrect": true, "rationale": "The 'Challenge' section states: 'Nitrogen gas (N2): Take two green gumdrops (nitrogen). Connect them with three toothpicks side by side. That is a triple bond — very strong!'"}, {"text": "Table salt (NaCl)", "isCorrect": false, "rationale": "Table salt (NaCl) uses one yellow and one green gumdrop connected by one toothpick."}]}, {"question": "What is the fundamental difference between an oxygen atom and an oxygen gas molecule (O2)?", "options": [{"text": "An oxygen atom has no mass, while an O2 molecule does.", "isCorrect": false, "rationale": "All atoms have mass. The difference is in their structure and bonding, not the absence of mass for a single atom."}, {"text": "An oxygen atom is made of two O2 molecules.", "isCorrect": false, "rationale": "An O2 molecule is made of two oxygen atoms; an atom is a smaller fundamental unit, not composed of molecules."}, {"text": "An oxygen atom is a single unit, while an O2 molecule consists of two oxygen atoms bonded together.", "isCorrect": true, "rationale": "The text explains that oxygen atoms 'travel in pairs' to form the O2 molecule, meaning the molecule is a bonded pair of individual atoms, making this the fundamental difference."}, {"text": "An oxygen atom is a gas, and an O2 molecule is a solid.", "isCorrect": false, "rationale": "Both typically refer to a gaseous state at standard conditions. The difference is structural (one atom vs. two bonded atoms), not a change in state."}]}, {"question": "Dmitri Mendeleev's most significant contribution to science, as described, was his clever method for:", "options": [{"text": "Discovering all the elements known today.", "isCorrect": false, "rationale": "Mendeleev organized known elements and predicted new ones, but he did not discover all elements himself."}, {"text": "Creating the first widely accepted version of the periodic table by predicting undiscovered elements.", "isCorrect": true, "rationale": "The text highlights his genius in leaving gaps for and predicting the properties of undiscovered elements, which made his periodic table revolutionary and widely accepted."}, {"text": "Developing new methods for building molecule models with gumdrops.", "isCorrect": false, "rationale": "Mendeleev's work was foundational chemistry concerning elements, not practical modeling activities described in the 'trythis' section."}, {"text": "Explaining how molecules give soda its fizz.", "isCorrect": false, "rationale": "His work was on the organization of elements, not the properties of specific molecules like CO2 fizz."}]}, {"question": "According to the 'Extensions' section of the 'Build Molecule Models' setup guide, if you break apart a water molecule (H2O), what do you get?", "options": [{"text": "Two water molecules and one oxygen atom.", "isCorrect": false, "rationale": "Breaking a water molecule yields its constituent atoms, not more water molecules."}, {"text": "A new, different type of molecule.", "isCorrect": false, "rationale": "Breaking a molecule into its atoms means the original molecule no longer exists, and while new molecules *could* form, the immediate result is the separated atoms."}, {"text": "Two hydrogen atoms and one oxygen atom, which are no longer water.", "isCorrect": true, "rationale": "The 'Extensions' explicitly asks, 'If I break apart a water molecule, what do I get?' and answers: 'Two hydrogen atoms and one oxygen atom — no longer water!'"}, {"text": "Two oxygen atoms and one hydrogen atom.", "isCorrect": false, "rationale": "H2O has two hydrogen atoms and one oxygen atom. Breaking it would release these specific components."}]}, {"question": "The introduction states that you 'might be surprised at how much chemistry is all around you!' Which of the following best exemplifies this statement based on the section's content?", "options": [{"text": "The discovery of new elements by Dmitri Mendeleev.", "isCorrect": false, "rationale": "While significant to chemistry, Mendeleev's work is historical and about elements, not directly illustrating 'molecules in everyday life' in the immediate sense of what's around us."}, {"text": "The complex structure of glucose (C6H12O6).", "isCorrect": false, "rationale": "Glucose is mentioned as a challenge extension, but the core text focuses on simpler, more common molecules like water, oxygen, and carbon dioxide."}, {"text": "The use of water for drinking, oxygen for breathing, and carbon dioxide in soda fizz and plant growth.", "isCorrect": true, "rationale": "This option directly lists several molecules (H2O, O2, CO2) and their common, everyday roles as described in the section, perfectly exemplifying how 'chemistry is all around you!'"}, {"text": "The process of sorting gumdrops by color to represent different atoms.", "isCorrect": false, "rationale": "This describes an activity to understand molecules, not the molecules themselves or their widespread presence in daily life."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
