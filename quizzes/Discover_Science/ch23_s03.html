<script>
var QUESTIONS = [{"question": "How does table salt (NaCl) effectively preserve food, preventing spoilage?", "options": [{"text": "It adds a strong antimicrobial chemical that kills all bacteria instantly.", "isCorrect": false, "rationale": "While salt inhibits bacteria, its primary mechanism for preservation is not adding a strong antimicrobial chemical, but rather drawing out water."}, {"text": "It draws water out of the food, creating an environment unsuitable for bacterial growth.", "isCorrect": true, "rationale": "The text explicitly states that 'Salt draws water out of food, which slows down the growth of bacteria,' making the food less hospitable for microbial activity."}, {"text": "It forms a protective barrier around the food, preventing air exposure.", "isCorrect": false, "rationale": "Salt does not form an airtight barrier; its preservative action is chemical (osmotic) rather than physical."}, {"text": "It changes the food's pH to an extremely acidic level that bacteria cannot tolerate.", "isCorrect": false, "rationale": "Table salt (sodium chloride) is a neutral substance and does not significantly alter the food's pH to an extremely acidic level for preservation."}]}, {"question": "A recipe calls for baking soda and buttermilk to make muffins rise. What is the chemical principle behind this action?", "options": [{"text": "Baking soda dehydrates the dough, making it lighter and expand more easily.", "isCorrect": false, "rationale": "Baking soda's role in baking is not related to dehydrating the dough, but rather gas production."}, {"text": "The buttermilk neutralizes baking soda, which then releases nitrogen gas that creates bubbles.", "isCorrect": false, "rationale": "While baking soda does react with an acid (like buttermilk), it produces carbon dioxide gas (CO2), not nitrogen gas."}, {"text": "Baking soda, as a mild base, reacts with the acid in buttermilk to produce carbon dioxide gas, creating bubbles that make the muffins fluffy.", "isCorrect": true, "rationale": "The text explains that 'When baking soda meets an acid (like vinegar or buttermilk), it produces carbon dioxide gas (CO2). Those bubbles get trapped in dough and make it rise...'"}, {"text": "The heat from baking causes baking soda to expand rapidly, directly fluffing the dough.", "isCorrect": false, "rationale": "The expansion comes from the gas produced by the acid-base reaction, not direct thermal expansion of the baking soda itself."}]}, {"question": "Based on the text, why is vinegar a good choice for cleaning mineral deposits and grease?", "options": [{"text": "Its neutral pH allows it to emulsify oils without leaving residue.", "isCorrect": false, "rationale": "Vinegar is a mild acid (pH 2-3), not neutral, and its cleaning action is due to its acidity rather than emulsifying oils."}, {"text": "Its strong basic properties react with and break down tough stains.", "isCorrect": false, "rationale": "Vinegar is an acid, not a base, so it does not have strong basic properties."}, {"text": "As an acid, it can chemically dissolve mineral deposits and break down grease.", "isCorrect": true, "rationale": "The text explicitly states, 'The acid in vinegar can dissolve mineral deposits and cut through grease,' highlighting its acidic nature as the reason for its cleaning efficacy."}, {"text": "It has abrasive qualities that scrub away dirt and grime effectively.", "isCorrect": false, "rationale": "Baking soda is described as mildly abrasive, but vinegar's cleaning action is chemical, not abrasive."}]}, {"question": "Considering water's role as a 'universal solvent,' why is it indispensable for the chemical reactions occurring within the human body?", "options": [{"text": "Water molecules directly participate in all cellular reactions as reactants, being transformed into other substances.", "isCorrect": false, "rationale": "While water can be a reactant in some reactions, its primary role as a 'universal solvent' in the body's context is to provide a medium for other substances to react, not to be transformed in 'almost every' reaction."}, {"text": "Water's ability to dissolve substances allows reactants to mix and interact efficiently within cells.", "isCorrect": true, "rationale": "The text states, 'almost every chemical reaction in your cells happens in a water solution,' emphasizing that water's solvent property enables the necessary mixing and interaction of chemical reactants."}, {"text": "Water acts as a catalyst, speeding up all bodily chemical reactions without being consumed.", "isCorrect": false, "rationale": "Water is a solvent, not a universal catalyst; enzymes typically fulfill the role of catalysts in biological reactions."}, {"text": "Water maintains a constant temperature, which is the sole factor enabling chemical reactions in the body.", "isCorrect": false, "rationale": "While water helps regulate temperature, its solvent property is identified as the reason it facilitates chemical reactions in cells, not temperature regulation as the 'sole factor.'"}]}, {"question": "The safety note for chlorine-based cleaners emphasizes a critical warning. What specific danger is highlighted?", "options": [{"text": "Prolonged skin contact can lead to severe burns.", "isCorrect": false, "rationale": "While strong chemicals can cause burns, the safety note specifically warns against mixing chlorine products, not prolonged skin contact."}, {"text": "Inhaling the fumes can cause temporary respiratory irritation.", "isCorrect": false, "rationale": "The note does mention 'good air flow,' implying fume inhalation is a concern, but the 'dangerous gases' warning is specifically about mixing with other products."}, {"text": "Mixing chlorine-based cleaners with other products like vinegar or ammonia can generate dangerous gases.", "isCorrect": true, "rationale": "The safety note explicitly states, 'Never mix bleach with vinegar, ammonia, or other cleaning products — the combination can produce dangerous gases,' highlighting this as a critical danger."}, {"text": "Using them in poorly ventilated areas will permanently damage surfaces.", "isCorrect": false, "rationale": "Poor ventilation is mentioned, but the consequence stated for mixing is 'dangerous gases,' not permanent surface damage."}]}, {"question": "A student uses red cabbage juice to test an unknown liquid. The solution turns blue. According to the provided chart, what can the student conclude about the unknown liquid?", "options": [{"text": "It is a strong acid with a pH between 0 and 4.", "isCorrect": false, "rationale": "The chart indicates that strong acids (pH 0-4) would turn the cabbage juice red or pink, not blue."}, {"text": "It is a mild base with a pH between 8 and 10.", "isCorrect": true, "rationale": "The chart clearly states that a 'Blue or green' color means a 'Mild base' with a 'pH range' of '8–10'."}, {"text": "It is a neutral substance with a pH of 7.", "isCorrect": false, "rationale": "Neutral substances (pH 5-7) would cause no color change, remaining purple."}, {"text": "It is a strong base with a pH between 11 and 14.", "isCorrect": false, "rationale": "A strong base (pH 11-14) would turn the cabbage juice yellow or greenish-yellow, not blue."}]}, {"question": "During the red cabbage pH indicator activity, if milk turns the cabbage juice a light pink color, what does this observation indicate about milk?", "options": [{"text": "Milk is a strong base, causing a significant shift to yellow.", "isCorrect": false, "rationale": "A light pink color indicates acidity, not a strong base, which would be yellow/greenish-yellow."}, {"text": "Milk is very slightly acidic, as indicated by the faint shift towards red/pink.", "isCorrect": true, "rationale": "The 'Expected Results' section explicitly states that 'Cup 4 (milk): light pink or pinkish-purple (slightly acidic),' aligning with the pH chart where pink indicates acidity."}, {"text": "Milk is completely neutral, and the pink color is an anomaly.", "isCorrect": false, "rationale": "A color change to pink from purple indicates a deviation from neutral; neutral would result in no color change (purple)."}, {"text": "Milk contains strong acids, similar to lemon juice, resulting in a bright red color.", "isCorrect": false, "rationale": "A 'light pink' color suggests slight acidity, whereas strong acids like lemon juice typically produce a 'bright red' color."}]}, {"question": "Which of the following pairs of chemicals from the text are specifically mentioned as being used for an acid-base neutralization reaction in a common household or personal care context?", "options": [{"text": "Salt to melt ice and vinegar to clean glass.", "isCorrect": false, "rationale": "Salt melting ice involves lowering the freezing point, and vinegar cleaning glass uses its acidic property to dissolve substances, neither is primarily an acid-base neutralization."}, {"text": "Chlorine to purify pool water and water as a universal solvent.", "isCorrect": false, "rationale": "Chlorine purifies by killing germs, and water acts as a solvent; neither of these are examples of acid-base neutralization."}, {"text": "Baking soda to settle stomach acid and toothpaste to neutralize mouth acids.", "isCorrect": true, "rationale": "The text states baking soda 'acts as an antacid, neutralizing excess stomach acid,' and toothpaste 'neutralizes the acids left behind by bacteria,' both are clear examples of acid-base neutralization."}, {"text": "Vinegar for pickling and baking soda for cleaning abrasively.", "isCorrect": false, "rationale": "Vinegar preserves by creating an acidic environment to inhibit bacteria, and baking soda cleans abrasively; these are not direct acid-base neutralization reactions for their stated purposes."}]}, {"question": "Based on the information provided, which of the following common chemicals can be used to prevent or slow the growth of harmful bacteria in food or on surfaces?", "options": [{"text": "Baking soda (as a deodorizer) and water (as a solvent).", "isCorrect": false, "rationale": "Baking soda absorbs smells, and water dissolves substances; neither is presented as a primary method for preventing bacterial growth as a preservative in this context."}, {"text": "Salt (for food preservation) and vinegar (for pickling).", "isCorrect": true, "rationale": "The text states salt 'slows down the growth of bacteria' for preserving food, and vinegar's 'acidic environment prevents harmful bacteria from growing' in pickling."}, {"text": "Pure chlorine gas (for household cleaning) and baking soda (for baking).", "isCorrect": false, "rationale": "Pure chlorine gas is dangerous and not used directly for household cleaning, and baking soda for baking causes rising, not preventing bacterial growth."}, {"text": "Water (for hydration) and toothpaste (for strengthening enamel).", "isCorrect": false, "rationale": "These are for hydration and dental health, not for preventing bacterial growth on food or surfaces as preservatives."}]}, {"question": "Besides neutralizing acids produced by mouth bacteria, how does toothpaste further protect tooth enamel?", "options": [{"text": "It coats the teeth with a protective layer that repels food particles.", "isCorrect": false, "rationale": "The text does not mention toothpaste creating a repelling layer for food particles."}, {"text": "It acts as a strong abrasive, physically removing bacteria and plaque.", "isCorrect": false, "rationale": "While toothpaste does have abrasive qualities to remove plaque, the text specifically highlights fluoride as the 'other' mechanism of protection beyond neutralization."}, {"text": "It contains fluoride, which strengthens tooth enamel and makes it more resistant to acid.", "isCorrect": true, "rationale": "The 'Science Life' section clearly states, 'Toothpaste also contains fluoride, a chemical that makes tooth enamel stronger and harder for acids to dissolve.'"}, {"text": "It changes the overall pH of the mouth to a permanently basic state.", "isCorrect": false, "rationale": "Toothpaste neutralizes acids temporarily but does not permanently alter the mouth's overall pH to a basic state."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
