    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 18, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is NOT listed as a primary clue that a chemical change has occurred?", "options": [{"text": "Formation of gas bubbles", "isCorrect": false, "rationale": "The formation of gas bubbles is explicitly listed as Clue 2 that a chemical change may be happening."}, {"text": "Change in density", "isCorrect": true, "rationale": "Change in density is not listed as one of the five main clues for a chemical change in the provided text. The listed clues are color change, gas bubbles, heat/light production, new smell, and being hard to reverse."}, {"text": "Production of heat or light", "isCorrect": false, "rationale": "The production (or absorption) of heat or light is explicitly listed as Clue 3 that a chemical change may be happening."}, {"text": "Appearance of a new smell", "isCorrect": false, "rationale": "The appearance of a new smell is explicitly listed as Clue 4 that a chemical change may be happening."}], "id": "q01"}, {"question": "A student observes bubbles forming when water is heated to its boiling point. According to the textbook, why is this *not* necessarily a sign of a chemical change?", "options": [{"text": "The bubbles are too small to indicate a chemical reaction.", "isCorrect": false, "rationale": "The size of the bubbles is not mentioned as a distinguishing factor between physical and chemical changes in the text."}, {"text": "Boiling water is a physical change, as liquid water turns into water vapor.", "isCorrect": true, "rationale": "The text specifically states, 'Remember: boiling water also makes bubbles, but that is a physical change (liquid water turning to water vapor). Chemical-change bubbles happen without heating to the boiling point.'"}, {"text": "Bubbles only indicate a chemical change if they are clear.", "isCorrect": false, "rationale": "The clarity or color of the bubbles is not provided as a criterion to distinguish chemical from physical changes."}, {"text": "Heat must be absorbed, not produced, for bubbles to signify a chemical change.", "isCorrect": false, "rationale": "While some chemical reactions absorb heat, the text distinguishes boiling by the *cause* of the bubbles (heating to boiling point) rather than the direction of heat transfer for the reaction itself."}], "id": "q02"}, {"question": "The textbook states, 'Remind students that these are clues, not proof.' What is the most important implication of this statement for identifying chemical changes?", "options": [{"text": "Scientists rarely rely on these clues because they are often misleading.", "isCorrect": false, "rationale": "The text introduces these as the 'five main clues' scientists look for, implying their usefulness, not that they are rarely relied upon. The nuance is about certainty."}, {"text": "A single clue is sufficient evidence if it is very obvious.", "isCorrect": false, "rationale": "The 'teachernote' explicitly states, 'The strongest evidence combines several clues together,' contradicting the idea that a single clue is sufficient."}, {"text": "Identifying a chemical change requires combining several clues or looking for strong evidence of a new substance.", "isCorrect": true, "rationale": "The 'teachernote' explains this nuance, stating, 'The strongest evidence combines several clues together,' and emphasizes the key question 'did a new substance form?' when discussing color change. This highlights that clues aren't definitive proof on their own."}, {"text": "Only changes that are 'hard to reverse' are definitive proof of a chemical change.", "isCorrect": false, "rationale": "While 'hard to reverse' is a strong clue, the text does not present any single clue as 'definitive proof.' It maintains that they are all 'clues, not proof.'"}], "id": "q03"}, {"question": "You are observing a reaction where a solid substance is mixed with a liquid. You notice the mixture starts to fizz vigorously, the container becomes noticeably cold to the touch, and a pungent odor begins to fill the air. Based on the textbook's clues, what is most likely happening?", "options": [{"text": "A physical change, as the solid is simply dissolving in the liquid.", "isCorrect": false, "rationale": "While dissolving is a physical change, the presence of multiple chemical change clues (fizzing/gas, temperature change, new smell) makes it highly unlikely to be only dissolving."}, {"text": "The liquid is boiling rapidly due to external heating.", "isCorrect": false, "rationale": "The container becoming 'cold to the touch' contradicts the idea of external heating causing boiling. Chemical reactions can absorb heat, making the container feel cold."}, {"text": "A chemical change, indicated by multiple clues: gas formation, temperature change (heat absorption), and a new smell.", "isCorrect": true, "rationale": "This scenario presents three distinct clues of a chemical change: 'fizz vigorously' (gas bubbles, Clue 2), 'container becomes noticeably cold' (heat absorbed, Clue 3), and 'pungent odor begins to fill the air' (new smell, Clue 4). The presence of multiple clues strongly suggests a chemical change, as highlighted in the 'teachernote'."}, {"text": "The substances are merely mixing, similar to mixing paint to change color.", "isCorrect": false, "rationale": "Mixing paint is given as an example of a physical change where only one clue (color change) is present. This scenario includes gas bubbles, a temperature change, and a new smell, which go beyond simple mixing."}], "id": "q04"}, {"question": "According to the 'safetynote,' what is the correct technique for detecting the smell of an unknown substance?", "options": [{"text": "Hold the container close to your nose and take a deep breath.", "isCorrect": false, "rationale": "The 'safetynote' explicitly warns, 'Never put your nose directly over an unknown substance and sniff!'"}, {"text": "Waft the air towards your nose from about 15 cm away.", "isCorrect": true, "rationale": "The 'safetynote' instructs: 'Scientists use a technique called wafting: hold the container about 15 cm from your nose and gently fan the air toward you with your hand.'"}, {"text": "Lightly touch the substance and then smell your fingers.", "isCorrect": false, "rationale": "The text does not mention this technique, and touching unknown substances is generally unsafe."}, {"text": "Assume it's safe and sniff directly, but only if it doesn't look dangerous.", "isCorrect": false, "rationale": "The 'safetynote' warns against direct sniffing of *any* unknown substance, regardless of its appearance."}], "id": "q05"}, {"question": "Which of the following examples best illustrates the 'hard to reverse' clue for a chemical change?", "options": [{"text": "Melting an ice cube into water.", "isCorrect": false, "rationale": "Melting ice is easily reversible by refreezing the water, making it a physical change."}, {"text": "Dissolving sugar in hot tea.", "isCorrect": false, "rationale": "Sugar can be recovered from tea by evaporating the water, making it a reversible physical change."}, {"text": "Burning a log in a fireplace, turning it into ash.", "isCorrect": true, "rationale": "The text states, 'You cannot turn ash back into wood.' This directly exemplifies the 'hard to reverse' clue for a chemical change."}, {"text": "Evaporating saltwater to get salt crystals.", "isCorrect": false, "rationale": "This is a physical change where the salt and water can be separated, demonstrating reversibility."}], "id": "q06"}, {"question": "In the 'Vinegar and Baking Soda Balloon' activity, the bottle becoming cooler to the touch indicates which clue of a chemical change?", "options": [{"text": "A color change.", "isCorrect": false, "rationale": "The activity observation notes do not mention a color change. A temperature change is distinct from a color change."}, {"text": "Heat or light is produced (specifically, heat is absorbed).", "isCorrect": true, "rationale": "The 'Observe' section of the activity specifically asks, 'Does the bottle feel cooler? (Clue 3 — this reaction absorbs heat.)' This directly links the cooling effect to the 'Heat or Light Is Produced' clue, noting it as heat absorption rather than production."}, {"text": "A new smell appears.", "isCorrect": false, "rationale": "While a new smell could be a clue, the specific observation of the bottle feeling cooler relates to heat transfer, not smell."}, {"text": "The change is hard to reverse.", "isCorrect": false, "rationale": "The 'hard to reverse' clue relates to the permanence of the change, not the immediate temperature change during the reaction."}], "id": "q07"}, {"question": "How does the chemical reaction involving baking soda contribute to a cake rising, as described in the 'Chemical Changes in Cooking' section?", "options": [{"text": "It creates a new flavor that makes the cake more appealing.", "isCorrect": false, "rationale": "While baking soda reactions contribute to flavor, the text specifically highlights its role in making the cake 'rise,' not just flavor."}, {"text": "It absorbs excess moisture, making the cake denser.", "isCorrect": false, "rationale": "The text states the reaction makes the cake 'fluffy' and 'rise,' which is the opposite of making it denser or absorbing excess moisture."}, {"text": "It produces carbon dioxide gas, which gets trapped in the batter, causing it to inflate.", "isCorrect": true, "rationale": "The 'sciencelife' section explains: 'When baking soda meets an acid ... it produces tiny bubbles of carbon dioxide gas. Those bubbles get trapped in the batter and make the cake rise.'"}, {"text": "It changes the color of the batter, making it visually lighter.", "isCorrect": false, "rationale": "The text does not mention a color change as the reason for the cake rising; it focuses on gas production."}], "id": "q08"}, {"question": "When considering 'Clue 1: Color Change,' what is the critical question to ask to determine if it indicates a chemical change versus a physical change?", "options": [{"text": "How quickly did the color change occur?", "isCorrect": false, "rationale": "The speed of a color change is not mentioned as a distinguishing factor in the text."}, {"text": "Was the color change expected or unexpected?", "isCorrect": false, "rationale": "Whether a change is expected or unexpected does not determine if it's chemical or physical. The underlying process is key."}, {"text": "Did a new substance form?", "isCorrect": true, "rationale": "Under 'Clue 1: Color Change,' the text explicitly states: 'Be careful, though! Not every color change means a chemical change. ... The key question is: did a new substance form?'"}, {"text": "Is the new color permanent?", "isCorrect": false, "rationale": "While permanence can be a clue ('hard to reverse'), for color change specifically, the text emphasizes whether a *new substance* was formed, not just the permanence of the color."}], "id": "q09"}, {"question": "The 'What happened' section of the 'Try It Yourself!' activity states that the vinegar and baking soda reaction forms carbon dioxide gas, water, and sodium acetate. Which of these products is directly responsible for the inflation of the balloon?", "options": [{"text": "Water (H2O)", "isCorrect": false, "rationale": "Water is a liquid product and would not inflate a balloon."}, {"text": "Vinegar (an acid)", "isCorrect": false, "rationale": "Vinegar is a reactant, not a product, and it is a liquid, so it would not inflate the balloon."}, {"text": "Carbon dioxide gas (CO2)", "isCorrect": true, "rationale": "The text states: 'The vinegar (an acid) and the baking soda (a base) reacted to form carbon dioxide gas (CO2), water (H2O), and a substance called sodium acetate. The carbon dioxide gas inflated the balloon.' This directly identifies CO2 as the cause of inflation."}, {"text": "Sodium acetate (a new substance)", "isCorrect": false, "rationale": "Sodium acetate is a new substance formed, but it is a solid or dissolved salt, not a gas that would inflate a balloon."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
