<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following statements best defines 'matter' as presented in the textbook section?", "options": [{"text": "Anything that can be seen and touched.", "isCorrect": false, "rationale": "This is incorrect because not all matter can be seen or touched (e.g., air is often invisible, and water can't be 'held' without a container)."}, {"text": "Anything that has mass and takes up space.", "isCorrect": true, "rationale": "This is the direct definition provided in the text: 'Matter—anything that has mass and takes up space.'"}, {"text": "Anything that has weight and is solid.", "isCorrect": false, "rationale": "This is incorrect because matter can exist as liquids or gases, not just solids, and 'weight' is related to mass but 'mass' is the fundamental property defined."}, {"text": "Anything that produces energy or light.", "isCorrect": false, "rationale": "This is incorrect because energy and light are explicitly stated as not being matter, even though matter can produce them."}], "id": "q01"}, {"question": "According to the text, what is the definition of 'mass' and how is it typically measured?", "options": [{"text": "The amount of space an object occupies, measured in liters.", "isCorrect": false, "rationale": "This describes volume, not mass, and liters are a unit of volume, not mass."}, {"text": "The amount of matter in an object, measured in grams.", "isCorrect": true, "rationale": "This is the direct definition given: 'Mass—the amount of matter in an object, measured in grams.'"}, {"text": "The force of gravity on an object, measured in newtons.", "isCorrect": false, "rationale": "This describes weight, not mass, and newtons are a unit of force/weight, not mass in the context given."}, {"text": "The density of an object, measured in grams per cubic centimeter.", "isCorrect": false, "rationale": "Density is a ratio of mass to volume, not mass itself, and is not the primary definition given."}], "id": "q02"}, {"question": "The text explains that if something 'takes up space, you cannot put something else in exactly the same spot.' If you place a rock into a bucket already full of sand, and some sand overflows, what property of the rock and sand does this primarily demonstrate?", "options": [{"text": "The rock is heavier than the sand.", "isCorrect": false, "rationale": "While the rock might be heavier, the overflow explicitly demonstrates that the rock cannot occupy the same space as the sand already there, causing displacement."}, {"text": "Both the rock and the sand take up space.", "isCorrect": true, "rationale": "The overflow signifies that the rock is occupying space that the sand previously held, illustrating that both substances possess the property of taking up space."}, {"text": "The sand is less dense than the rock.", "isCorrect": false, "rationale": "Density differences are not the primary concept being demonstrated by the simple act of displacement and overflow."}, {"text": "The rock and sand are both forms of energy.", "isCorrect": false, "rationale": "This is incorrect; both rock and sand are matter, not energy, as they have mass and take up space."}], "id": "q03"}, {"question": "Which of the following items is definitively classified as matter according to the principles outlined in the text?", "options": [{"text": "The sound of a musical instrument.", "isCorrect": false, "rationale": "Sound is a form of energy (vibrations), not matter. It does not have mass or take up space in the way matter does."}, {"text": "A ray of sunlight warming a surface.", "isCorrect": false, "rationale": "Light and warmth are forms of energy, as explicitly stated in the 'thinkaboutit' section, not matter."}, {"text": "The oxygen gas you breathe.", "isCorrect": true, "rationale": "Oxygen gas, like air, has mass and takes up space, making it a form of matter according to the definition."}, {"text": "The feeling of happiness.", "isCorrect": false, "rationale": "Feelings and emotions are abstract concepts and do not possess mass or take up space, thus they are not matter."}], "id": "q04"}, {"question": "The text describes blowing up a balloon and then weighing it against an empty balloon. What is the primary conclusion drawn from observing that the inflated balloon is slightly heavier?", "options": [{"text": "The rubber of the balloon gains mass when stretched.", "isCorrect": false, "rationale": "The material of the balloon itself does not gain mass simply by being stretched; its mass remains constant."}, {"text": "The air inside the balloon has mass.", "isCorrect": true, "rationale": "The text explicitly states: 'The inflated balloon is slightly heavier because the air inside has mass,' proving air is matter."}, {"text": "The pressure inside the inflated balloon pushes down on the scale.", "isCorrect": false, "rationale": "While there is pressure, the increase in *weight* (and thus mass) is due to the physical quantity of air, not just the pressure it exerts."}, {"text": "Empty balloons lose a small amount of mass over time.", "isCorrect": false, "rationale": "This is irrelevant to the comparison; the difference is attributed to the *added* air, not a change in the empty balloon's mass."}], "id": "q05"}, {"question": "The 'thinkaboutit' section asks if light is matter and provides a hint. What fundamental characteristic of matter, as defined in the text, does light *lack*?", "options": [{"text": "Light cannot be observed by humans.", "isCorrect": false, "rationale": "Light is observable; this is not the characteristic distinguishing it from matter."}, {"text": "Light does not have mass and does not take up space.", "isCorrect": true, "rationale": "The hint asks 'Can you weigh light? Does light take up space?' directly addressing the two defining characteristics of matter, implying light lacks both."}, {"text": "Light is not a naturally occurring phenomenon.", "isCorrect": false, "rationale": "Light is a natural phenomenon; this statement is factually incorrect and irrelevant to the definition of matter."}, {"text": "Light travels too quickly to be considered matter.", "isCorrect": false, "rationale": "Speed is not a defining characteristic that differentiates matter from non-matter."}], "id": "q06"}, {"question": "Which scenario best demonstrates that air takes up space?", "options": [{"text": "A fan blowing cool air across a room.", "isCorrect": false, "rationale": "This demonstrates air movement and temperature change, not necessarily that it *occupies* space."}, {"text": "The feeling of wind against your face.", "isCorrect": false, "rationale": "This shows air's movement and force, but not directly its property of occupying space."}, {"text": "Inflating a flat tire, causing it to become firm and round.", "isCorrect": true, "rationale": "The air pushed into the tire occupies the space within it, causing the tire to expand and become firm. This directly shows air taking up space."}, {"text": "Observing condensation on a cold glass of water.", "isCorrect": false, "rationale": "Condensation is water vapor (matter) changing state, but doesn't primarily demonstrate that *air* (the mixture) takes up space."}], "id": "q07"}, {"question": "The 'teachernote' highlights that the mass difference between an inflated and deflated balloon is small (1-2 grams) but visible on a sensitive digital scale. What is the most important takeaway from this note for a student learning about matter?", "options": [{"text": "Air barely qualifies as matter because its mass is so small.", "isCorrect": false, "rationale": "Even a small mass is still mass, which, combined with taking up space, fully qualifies air as matter."}, {"text": "The concept of mass is only important for large objects.", "isCorrect": false, "rationale": "The note demonstrates that mass is a fundamental property for all matter, regardless of scale, even if it requires precise tools to measure for lighter substances."}, {"text": "Precise scientific instruments are sometimes necessary to detect properties of matter that are not easily observable.", "isCorrect": true, "rationale": "The need for a 'sensitive digital kitchen scale' to see a small difference in mass emphasizes that subtle properties of matter (like air's mass) can be proven with the right tools, testing application."}, {"text": "The 'takes up space' property is more critical for air than its mass.", "isCorrect": false, "rationale": "Both mass and taking up space are equally critical for defining matter; the note addresses how to observe mass, not its relative importance."}], "id": "q08"}, {"question": "If you are told something 'cannot put something else in exactly the same spot,' which property of matter is being described?", "options": [{"text": "It has weight.", "isCorrect": false, "rationale": "While related, having weight (due to mass) doesn't directly describe the inability to occupy the same space as another object."}, {"text": "It is visible.", "isCorrect": false, "rationale": "Visibility is not a defining characteristic of matter or of occupying space. Air is often invisible but still takes up space."}, {"text": "It takes up space.", "isCorrect": true, "rationale": "The text directly states: 'takes up space (you cannot put something else in exactly the same spot)'. This is the definition of occupying space or having volume."}, {"text": "It has density.", "isCorrect": false, "rationale": "Density is a measure of mass per unit volume, not the property of occupying space itself."}], "id": "q09"}, {"question": "Based on the entire section, which statement most accurately summarizes why air is considered matter?", "options": [{"text": "Air is easily felt when it moves and is visible when it forms clouds.", "isCorrect": false, "rationale": "While air can be felt, and water vapor (a form of matter) forms clouds, these aren't the fundamental proofs that air *itself* is matter according to the text's definition."}, {"text": "Air can be weighed on a scale and can be compressed into a smaller volume.", "isCorrect": false, "rationale": "The text focuses on air *taking up space* (balloon inflates) and *having mass* (inflated balloon is heavier), not its compressibility (though true, not the explicit proof)."}, {"text": "Air has mass, proven by an inflated balloon being heavier, and takes up space, shown by a balloon getting bigger when filled.", "isCorrect": true, "rationale": "This statement combines both key proofs provided in the text: 'The air takes up space... Now put the inflated balloon on a balance... The inflated balloon is slightly heavier because the air inside has mass.'"}, {"text": "Air is essential for life and surrounds everything on Earth.", "isCorrect": false, "rationale": "These facts describe air's importance and presence, but do not directly prove it has mass and takes up space, which are the defining characteristics of matter."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
