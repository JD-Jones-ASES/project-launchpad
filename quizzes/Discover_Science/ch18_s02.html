    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

</div>

<script>
var QUESTIONS = [{"question": "Which statement best defines a chemical change?", "options": [{"text": "A change where a substance alters only its size, shape, or state.", "isCorrect": false, "rationale": "This describes a physical change, where the substance itself remains the same, as stated in the 'Physical Change vs. Chemical Change' table."}, {"text": "A change in matter that produces one or more new substances with different properties.", "isCorrect": true, "rationale": "The text explicitly defines a chemical change as 'a change in matter that produces one or more new substances with different properties.'"}, {"text": "A change that can always be easily reversed to the original substance.", "isCorrect": false, "rationale": "The text states that chemical changes are 'Usually no' when asked 'Can you reverse it?', providing examples like unburning wood or uncooking an egg."}, {"text": "A change where atoms are created or destroyed, leading to entirely new elements.", "isCorrect": false, "rationale": "The text, referencing Unit 13, emphasizes that 'atoms are never created or destroyed during a chemical change — they simply rearrange.'"}], "id": "q01"}, {"question": "Toasting a piece of bread until it turns brown and crispy is an example of a chemical change because:", "options": [{"text": "The bread simply changed its state from soft to crispy due to heat.", "isCorrect": false, "rationale": "While heat is involved, the change goes beyond a simple state change; the bread's chemical composition is altered, as indicated by new properties."}, {"text": "The appearance of the bread changed, but it's still fundamentally the same substance.", "isCorrect": false, "rationale": "The text states, 'The bread has become a new substance,' with different smell, taste, and an inability to revert to its original form, indicating a chemical change."}, {"text": "New substances with different properties (smell, taste, texture) are formed that cannot be reversed.", "isCorrect": true, "rationale": "The introductory example of toasting bread highlights new smell, taste, different properties, and irreversibility, which are key indicators of a chemical change and the formation of new substances."}, {"text": "The bread absorbed heat, which is a physical process that alters its moisture content.", "isCorrect": false, "rationale": "Heat can induce chemical changes, not just physical ones. The significant alteration of properties and formation of new substances signifies a chemical change, not just a physical alteration."}], "id": "q02"}, {"question": "What fundamental process occurs at the atomic level during a chemical change?", "options": [{"text": "Atoms are created or destroyed, leading to entirely new elements.", "isCorrect": false, "rationale": "The text explicitly states, 'atoms are never created or destroyed during a chemical change — they simply rearrange.'"}, {"text": "Atoms merely change their position within the substance without altering their chemical bonds.", "isCorrect": false, "rationale": "This describes a physical change. The text states that in a chemical change, atoms 'break apart from their old partners and join up with new ones.'"}, {"text": "Atoms break existing bonds and form new bonds with different partners, creating new molecules.", "isCorrect": true, "rationale": "The text explains that atoms 'break apart from their old partners and join up with new ones, forming brand-new molecules,' which is the essence of chemical bonding and rearrangement."}, {"text": "The overall number of atoms changes, but their types remain the same.", "isCorrect": false, "rationale": "The text clarifies that 'No atoms disappear. No new atoms appear,' indicating that the total number of atoms remains constant, even as they rearrange."}], "id": "q03"}, {"question": "Why is it generally impossible to reverse a chemical change, such as unburning wood?", "options": [{"text": "The atoms have been destroyed, so the original substance cannot be re-formed.", "isCorrect": false, "rationale": "The text emphasizes that 'atoms are never created or destroyed during a chemical change,' only rearranged."}, {"text": "The new substances formed have entirely different atomic arrangements and properties, making the original substance irrecoverable.", "isCorrect": true, "rationale": "The text explains that new substances with different properties are formed, and refers to the building block analogy where 'what you build is completely new,' making it difficult or impossible to return to the original substance's structure and properties."}, {"text": "The energy required to reverse the process is always too high to be practical or achievable.", "isCorrect": false, "rationale": "While energy might be a factor, the fundamental reason for irreversibility stems from the formation of entirely new substances with new chemical bonds and properties, as outlined in the table's 'What happens?' column for chemical change."}, {"text": "Physical changes cannot be reversed, and chemical changes are a type of physical change.", "isCorrect": false, "rationale": "The table clearly distinguishes between physical and chemical changes, stating physical changes 'Usually yes' can be reversed, unlike chemical changes, and they are not the same type of change."}], "id": "q04"}, {"question": "When iron rusts, which of the following correctly identifies the reactants and product?", "options": [{"text": "Reactant: Rust; Product: Iron, Oxygen, Water.", "isCorrect": false, "rationale": "Rust is the result of the change, making it the product, not a reactant."}, {"text": "Reactants: Iron, Oxygen, Water; Product: Rust (iron oxide).", "isCorrect": true, "rationale": "The text explicitly states: 'Iron + Oxygen + Water $$ Rust (iron oxide),' where the substances before the arrow are reactants and after are products."}, {"text": "Reactants: Iron, Rust; Products: Oxygen, Water.", "isCorrect": false, "rationale": "Rust is the product, and oxygen and water are reactants, not products in this context."}, {"text": "Reactant: Iron; Products: Oxygen, Water, Rust.", "isCorrect": false, "rationale": "Oxygen and water are reactants, not products, and there should be only one primary product listed for simplicity in this example."}], "id": "q05"}, {"question": "A key distinguishing feature between a physical change and a chemical change is whether:", "options": [{"text": "The change involves an increase or decrease in temperature.", "isCorrect": false, "rationale": "Both physical changes (e.g., melting ice) and chemical changes (e.g., burning wood) can involve temperature changes, so this is not a distinguishing factor."}, {"text": "The change is visible to the naked eye or requires special instruments.", "isCorrect": false, "rationale": "Many physical changes (e.g., cutting paper) and chemical changes (e.g., rusting) are visible, so visibility is not the defining difference."}, {"text": "One or more new substances with different properties are formed.", "isCorrect": true, "rationale": "The table clearly states that for a physical change, 'The substance stays the same,' while for a chemical change, 'One or more new substances form with different properties.' This is the fundamental distinction."}, {"text": "The process is reversible or irreversible under normal conditions.", "isCorrect": false, "rationale": "While reversibility is a strong indicator (usually yes for physical, usually no for chemical), it is a *consequence* of whether new substances form, not the primary distinguishing *definition* itself."}], "id": "q06"}, {"question": "The analogy of atoms as 'building blocks' helps explain that during a chemical change:", "options": [{"text": "The individual building blocks (atoms) themselves change into different types of blocks.", "isCorrect": false, "rationale": "The text specifies that 'The blocks are the same,' meaning the atoms' identities do not change."}, {"text": "New building blocks (atoms) are added to create a larger structure, increasing the total number of atoms.", "isCorrect": false, "rationale": "The text states, 'you use the exact same blocks' and 'No new atoms appear,' indicating that no new atoms are added."}, {"text": "The existing building blocks (atoms) are rearranged to form a new structure or substance.", "isCorrect": true, "rationale": "The analogy states, 'you take the blocks apart and snap them together in a different way... you built something new,' directly illustrating the rearrangement of existing atoms into new substances."}, {"text": "The building blocks (atoms) are destroyed, and new ones are created from scratch.", "isCorrect": false, "rationale": "The text explicitly notes that atoms are 'never created or destroyed,' contradicting this option."}], "id": "q07"}, {"question": "Which of the following scenarios describes a physical change rather than a chemical change?", "options": [{"text": "An iron gate developing a reddish-brown, flaky layer over time.", "isCorrect": false, "rationale": "This is an example of rusting, which the text lists as a chemical change where 'a new substance called rust forms.'"}, {"text": "Raw dough transforming into a fluffy cake when heated in an oven.", "isCorrect": false, "rationale": "The text lists 'Baking a cake' as a chemical change where ingredients 'combine and change when heated' to form a 'completely new substance.'"}, {"text": "A solid block of ice turning into liquid water when left at room temperature.", "isCorrect": true, "rationale": "This is melting, which the table lists as an example of a physical change, as only the state of matter changes, not the substance itself."}, {"text": "Wood burning to produce ash, smoke, carbon dioxide gas, and water vapor.", "isCorrect": false, "rationale": "The text lists 'Burning wood' as a chemical change, resulting in new substances like 'ash, smoke, carbon dioxide gas (CO2), and water vapor (H2O).'"}], "id": "q08"}, {"question": "According to the text, what important principle regarding atoms is upheld during a chemical change?", "options": [{"text": "Atoms can be created if enough energy is applied during the reaction.", "isCorrect": false, "rationale": "The 'Connection to Unit 13' explicitly states that 'atoms are never created or destroyed during a chemical change.'"}, {"text": "Atoms are destroyed to release the energy stored within their bonds.", "isCorrect": false, "rationale": "The text clearly states 'atoms are never created or destroyed,' refuting the idea of atoms being destroyed."}, {"text": "Atoms are conserved; they are neither created nor destroyed, only rearranged into new combinations.", "isCorrect": true, "rationale": "The 'Connection to Unit 13' highlights that 'atoms are never created or destroyed during a chemical change — they simply rearrange,' which is the principle of conservation of atoms."}, {"text": "The type of atoms can change from one element to another during the process.", "isCorrect": false, "rationale": "The analogy states that 'The blocks are the same,' meaning the types of atoms do not change, only their arrangement."}], "id": "q09"}, {"question": "If you observe a substance changing color, producing a new odor, and generating gas bubbles, these observations collectively indicate:", "options": [{"text": "A physical change, as only the appearance and state of the substance are altered.", "isCorrect": false, "rationale": "New color, odor, and gas production are strong indicators that new substances with different properties have formed, which defines a chemical change."}, {"text": "A chemical change, because new substances with distinct properties are likely forming due to atomic rearrangement.", "isCorrect": true, "rationale": "The text describes how chemical changes produce 'new substances with different properties' (e.g., toasted bread smells and tastes different, cooked egg looks different). These observable changes are classic signs of new substances being formed through atomic rearrangement."}, {"text": "A change in state, like melting, boiling, or sublimation, without chemical transformation.", "isCorrect": false, "rationale": "While gas bubbles might suggest boiling, the combined evidence of color change and new odor strongly points to a chemical reaction beyond a simple phase transition."}, {"text": "A simple rearrangement of molecules without any new substance formation.", "isCorrect": false, "rationale": "The formation of new odor and gas bubbles signifies the creation of new molecular structures (new substances), not just a different arrangement of existing molecules."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
