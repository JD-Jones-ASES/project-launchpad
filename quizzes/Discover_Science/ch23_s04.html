<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 23, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "You are cleaning your oven with a strong product, and you notice a warning symbol on the label. This symbol shows a substance eating through a surface or a hand. Which type of hazard does this symbol represent?", "options": [{"text": "The product catches fire easily.", "isCorrect": false, "rationale": "The Flame symbol indicates flammability, not corrosive properties."}, {"text": "The product is toxic (poisonous).", "isCorrect": false, "rationale": "The Skull and crossbones symbol indicates toxicity, not corrosive properties."}, {"text": "The product may irritate your skin, eyes, or lungs.", "isCorrect": false, "rationale": "The Exclamation mark symbol indicates irritancy, not corrosive properties."}, {"text": "The product is corrosive and can eat through materials or burn your skin.", "isCorrect": true, "rationale": "The Corrosion symbol specifically indicates that a product is corrosive, meaning it can eat through materials or burn skin, which is common for oven cleaners."}]}, {"question": "Which of the following pieces of information found on a chemical product label is *most directly* intended to help you respond to an accidental exposure, such as getting the chemical in your eyes or swallowing it?", "options": [{"text": "The ingredients of the product.", "isCorrect": false, "rationale": "While ingredients can be useful for medical professionals, they are not the most direct information for immediate accidental exposure response for a layperson."}, {"text": "Instructions on how to store the product.", "isCorrect": false, "rationale": "Storage instructions are for preventing accidents and maintaining product integrity, not for responding to an active exposure."}, {"text": "First aid instructions.", "isCorrect": true, "rationale": "First aid instructions are specifically designed to tell you what immediate steps to take if the product gets on your skin, in your eyes, or is swallowed, making them crucial for accidental exposure."}, {"text": "What the product is and what it is used for.", "isCorrect": false, "rationale": "Knowing the product's purpose is important for proper use but doesn't directly guide response to an accidental exposure."}]}, {"question": "Your friend suggests mixing bleach with a strong acid-based cleaner to remove a stubborn stain, believing it will make the cleaning solution more powerful. Based on the chemical safety rules, what is the most important reason to advise against this combination?", "options": [{"text": "Mixing different cleaners always dilutes their effectiveness.", "isCorrect": false, "rationale": "While some mixtures might dilute, the primary concern with mixing bleach and acids (or ammonia) is the creation of toxic gases, not just dilution."}, {"text": "It can cause the cleaning solution to become too thick to use effectively.", "isCorrect": false, "rationale": "Physical consistency changes are not the main danger emphasized for mixing cleaners like bleach and acids."}, {"text": "The combination can produce dangerous gases or fumes that are toxic to breathe.", "isCorrect": true, "rationale": "The text explicitly warns that mixing bleach with vinegar (an acid) or ammonia can produce toxic fumes that make it hard to breathe, highlighting this as a major safety hazard."}, {"text": "It might damage the surface being cleaned permanently.", "isCorrect": false, "rationale": "While some mixtures can cause surface damage, the most immediate and severe safety risk for the user is the production of dangerous gases."}]}, {"question": "You discover an unlabeled bottle of liquid under the sink, and you are unsure what it contains. According to the safety rules, what is the safest and most responsible course of action?", "options": [{"text": "Open it carefully to smell the contents and try to identify it.", "isCorrect": false, "rationale": "The text explicitly states: 'do not open it, smell it, or touch the contents' without a label, as there's no safe way to know what's inside."}, {"text": "Pour it down the storm drain to dispose of it, assuming it's probably harmless.", "isCorrect": false, "rationale": "Disposing of unknown chemicals, especially without knowing if they harm the environment, by pouring them down a drain is an irresponsible and potentially dangerous act."}, {"text": "Tell a trusted adult immediately and do not touch or attempt to identify the contents.", "isCorrect": true, "rationale": "The 'safetynote' section specifically advises: 'If you ever find a bottle or container without a label, do not open it, smell it, or touch the contents. Tell an adult immediately.'"}, {"text": "Assume it's a common household cleaner and use it cautiously, testing a small amount first.", "isCorrect": false, "rationale": "This is dangerous; without a label, there's no way to know if it's a cleaner, a toxic substance, or something that could react dangerously when used."}]}, {"question": "Percy Julian's work with soybeans had a profound impact on public health primarily because he:", "options": [{"text": "Discovered completely new diseases and their cures from plant compounds.", "isCorrect": false, "rationale": "Julian focused on making existing treatments accessible, not necessarily discovering new diseases."}, {"text": "Made existing, life-saving medicines more affordable and accessible to a wider population.", "isCorrect": true, "rationale": "Julian's key achievement was finding ways to produce previously expensive medicines (like treatments for glaucoma and cortisone for arthritis) from common, inexpensive sources like soybeans, making them affordable for millions."}, {"text": "Developed synthetic chemicals that completely replaced all natural medicines.", "isCorrect": false, "rationale": "Julian extracted useful chemicals from natural sources (soybeans) and then synthesized them, rather than replacing all natural medicines with purely synthetic ones."}, {"text": "Advocated for stricter regulations on chemical manufacturing processes.", "isCorrect": false, "rationale": "While important, advocating for regulations was not the primary impact of his scientific work described in the text."}]}, {"question": "Percy Julian was able to make expensive medicines, like cortisone and glaucoma treatments, more accessible and affordable by:", "options": [{"text": "Lobbying pharmaceutical companies to lower their profit margins on these drugs.", "isCorrect": false, "rationale": "The text highlights his scientific discoveries and methods, not his lobbying efforts."}, {"text": "Developing new surgical techniques that reduced the need for medication.", "isCorrect": false, "rationale": "Julian was a chemist, and his work focused on chemical extraction and synthesis, not surgical techniques."}, {"text": "Finding ways to extract useful chemicals from abundant, inexpensive sources like soybeans and synthesize them into medicines.", "isCorrect": true, "rationale": "The text explicitly states he 'found ways to extract useful chemicals from soybean oil and turn them into medicines,' making previously expensive treatments affordable."}, {"text": "Campaigning for government subsidies to cover the cost of medications for low-income patients.", "isCorrect": false, "rationale": "His contribution was through scientific innovation in production, not through policy advocacy for subsidies."}]}, {"question": "The textbook emphasizes the importance of always reading a product label, 'even one you have used before.' What is the primary safety reason for this continuous vigilance?", "options": [{"text": "To memorize the product's chemical composition for future reference.", "isCorrect": false, "rationale": "While understanding ingredients can be useful, the main reason for re-reading is not memorization but active safety practice."}, {"text": "Product formulations or safety instructions might change over time, and complacency can lead to forgotten details.", "isCorrect": true, "rationale": "Labels can be updated with new information or warnings, and people can forget crucial details or become complacent about familiar products, leading to accidents if labels aren't re-read."}, {"text": "It helps to ensure the product's effectiveness doesn't diminish with repeated use.", "isCorrect": false, "rationale": "Reading a label does not impact a product's effectiveness; its purpose is safety and proper use."}, {"text": "It is a legal requirement in most places to read labels every time a product is used.", "isCorrect": false, "rationale": "While following label instructions is often implied, the text frames it as a personal safety practice rather than a strict legal mandate for every single use."}]}, {"question": "If you see a 'Skull and crossbones' symbol on a household product, what does it primarily indicate about the product?", "options": [{"text": "It is highly flammable and should be kept away from heat.", "isCorrect": false, "rationale": "The Flame symbol indicates flammability, not toxicity."}, {"text": "It is corrosive and can cause severe burns or damage materials.", "isCorrect": false, "rationale": "The Corrosion symbol indicates corrosive properties, not toxicity."}, {"text": "It is toxic (poisonous) and can cause serious harm if swallowed, breathed, or touched.", "isCorrect": true, "rationale": "The Skull and crossbones symbol is the universal indicator for a toxic or poisonous substance, meaning it can make you very sick or cause harm."}, {"text": "It is an environmental hazard and must be disposed of carefully.", "isCorrect": false, "rationale": "The Environment symbol indicates harm to living things in the environment, not direct toxicity to humans upon contact."}]}, {"question": "Why is it important to use strong-smelling cleaners and other chemicals in well-ventilated areas, such as with an open window or a fan?", "options": [{"text": "To prevent the chemical from drying out too quickly.", "isCorrect": false, "rationale": "Ventilation is not primarily about controlling a chemical's drying rate."}, {"text": "To ensure the chemical does not react adversely with the surface it is cleaning.", "isCorrect": false, "rationale": "Ventilation addresses airborne hazards, not chemical reactions with surfaces."}, {"text": "To carry away potentially harmful fumes and ensure you are breathing fresh air.", "isCorrect": true, "rationale": "The text explicitly states: 'Open a window or turn on a fan when using strong-smelling cleaners. Fresh air carries fumes away,' indicating its role in preventing inhalation of harmful fumes."}, {"text": "To keep the chemical at a stable temperature, preventing degradation.", "isCorrect": false, "rationale": "While temperature stability is sometimes important for storage, it's not the primary reason for ventilation during use."}]}, {"question": "A bottle of weed killer in your garage has an 'Environment symbol' on its label. What specific safety instruction does this symbol, combined with the text's general guidance, primarily convey regarding its disposal?", "options": [{"text": "It can be safely poured down the kitchen sink with plenty of water to dilute it.", "isCorrect": false, "rationale": "Pouring chemicals down household drains can introduce them into the water system, which is precisely what the environment symbol warns against if not handled properly."}, {"text": "It can be left out in the garden to evaporate and break down naturally over time.", "isCorrect": false, "rationale": "Leaving chemicals exposed in the environment is not a safe or proper disposal method and can harm local ecosystems."}, {"text": "It should be diluted and used to water other plants to reduce its harmful concentration.", "isCorrect": false, "rationale": "A weed killer, even diluted, is designed to harm plants and would be irresponsible to use for watering other plants."}, {"text": "It must be disposed of properly according to local guidelines, and never poured down a storm drain.", "isCorrect": true, "rationale": "The text states that the Environment symbol means the product 'can harm fish, plants, or other living things if it gets into rivers, lakes, or soil. Dispose of it properly — never pour it down a storm drain.'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
