<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 12, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Approximately what percentage of all Earth's water is freshwater?", "options": [{"text": "About 97%", "isCorrect": false, "rationale": "97% of Earth's water is saltwater, found in oceans, not freshwater."}, {"text": "About 71%", "isCorrect": false, "rationale": "71% refers to the percentage of Earth's surface covered by water, not the percentage of total water that is freshwater."}, {"text": "Less than 3%", "isCorrect": true, "rationale": "According to the summary, freshwater sources (glaciers, groundwater, lakes/rivers, atmosphere) total approximately 2% + 0.7% + 0.03% + 0.001% = ~2.731%, which is less than 3%."}, {"text": "Approximately 0.7%", "isCorrect": false, "rationale": "0.7% specifically refers to the amount of groundwater, which is only one component of Earth's freshwater, not the total freshwater amount."}]}, {"question": "Which of the following holds the largest percentage of Earth's total water?", "options": [{"text": "Glaciers and ice caps", "isCorrect": false, "rationale": "Glaciers and ice caps hold about 2% of Earth's total water, which is a significant amount of freshwater but not the largest overall percentage."}, {"text": "Oceans", "isCorrect": true, "rationale": "Oceans hold about 97% of all the water on Earth, making them the largest reservoir by far."}, {"text": "Groundwater", "isCorrect": false, "rationale": "Groundwater accounts for about 0.7% of Earth's total water, a smaller fraction compared to oceans."}, {"text": "Lakes and rivers", "isCorrect": false, "rationale": "Lakes and rivers hold only about 0.03% of Earth's total water, making them a very small fraction."}]}, {"question": "Based on the provided data, why is water conservation particularly important, even though Earth is called a 'watery planet'?", "options": [{"text": "Most of Earth's water is inaccessible due to being in the atmosphere.", "isCorrect": false, "rationale": "While water vapor is in the atmosphere, it constitutes a tiny fraction (0.001%) of Earth's total water and is not the primary reason for conservation efforts regarding liquid freshwater."}, {"text": "The majority of Earth's surface is covered by land, not water.", "isCorrect": false, "rationale": "The text states that about 71% of Earth's surface is covered by water, making this statement incorrect."}, {"text": "The vast majority of Earth's water is salty or frozen, leaving a very small fraction as accessible liquid freshwater.", "isCorrect": true, "rationale": "The text highlights that 97% is salty oceans and 2% is frozen in glaciers, meaning less than 1% is liquid freshwater accessible for human use, emphasizing the scarcity and importance of conservation."}, {"text": "Freshwater sources like rivers and lakes are rapidly drying up globally.", "isCorrect": false, "rationale": "While some specific bodies of water may be drying, the text does not generalize this as the primary reason for conservation; instead, it focuses on the inherent scarcity of liquid freshwater overall."}]}, {"question": "A 'glacier' is best defined as:", "options": [{"text": "A large body of salt water covering much of Earth's surface.", "isCorrect": false, "rationale": "This describes an ocean, not a glacier."}, {"text": "Water found underground in the spaces between rocks and soil.", "isCorrect": false, "rationale": "This describes groundwater, not a glacier."}, {"text": "A huge mass of ice that forms on land when snow builds up and packs together over many years.", "isCorrect": true, "rationale": "The text explicitly defines a glacier as 'a huge mass of ice that forms on land when snow builds up and packs together over many years.'"}, {"text": "Water in the form of an invisible gas found in the air.", "isCorrect": false, "rationale": "This describes water vapor, not a glacier."}]}, {"question": "Although oceans contain 97% of Earth's water, the text states that glaciers hold 'most of Earth's fresh water.' How can both statements be true?", "options": [{"text": "Glaciers contain saltwater that becomes fresh when frozen.", "isCorrect": false, "rationale": "Glaciers are described as holding freshwater, which doesn't become freshwater simply by freezing; they form from snow (freshwater)."}, {"text": "Oceans contain very little water compared to glaciers.", "isCorrect": false, "rationale": "This is incorrect; oceans contain vastly more water (97%) than glaciers (2%)."}, {"text": "'Most of Earth's fresh water' is a much smaller quantity than '97% of all Earth's water' because nearly all water is saltwater.", "isCorrect": true, "rationale": "The key is understanding the distinction between total water and total *fresh* water. Since 97% of all water is salty, the 'most' of the remaining freshwater (which is only ~3% of total water) will naturally be a much smaller volume than the oceans."}, {"text": "The 97% figure for oceans refers only to the surface, not the total volume.", "isCorrect": false, "rationale": "The 97% figure refers to the total volume of water in the oceans, as indicated by the '100 cups of water' analogy."}]}, {"question": "What makes ocean water taste salty?", "options": [{"text": "It contains dissolved gases like oxygen and nitrogen.", "isCorrect": false, "rationale": "While ocean water contains dissolved gases, these do not contribute to its salty taste."}, {"text": "It is exposed to the atmosphere, causing salt to form.", "isCorrect": false, "rationale": "Exposure to the atmosphere does not cause salt to form in ocean water."}, {"text": "It contains dissolved minerals, particularly sodium chloride.", "isCorrect": true, "rationale": "The text explicitly states: 'Ocean water is salt water. It tastes salty because it contains dissolved minerals, especially a mineral called sodium chloride.'"}, {"text": "Marine organisms release salts into the water.", "isCorrect": false, "rationale": "The text attributes the saltiness to dissolved minerals, not directly to marine organisms."}]}, {"question": "If a community relies heavily on wells for its drinking water, which type of water source is most crucial for that community?", "options": [{"text": "Oceans", "isCorrect": false, "rationale": "Oceans are saltwater and not directly used as a source for drinking water via wells."}, {"text": "Glaciers", "isCorrect": false, "rationale": "While glaciers are a source of freshwater, communities typically access drinking water from wells that tap into underground sources, not directly from glaciers."}, {"text": "Lakes and rivers", "isCorrect": false, "rationale": "Lakes and rivers are surface water sources. Wells draw water from underground, not directly from lakes or rivers."}, {"text": "Groundwater", "isCorrect": true, "rationale": "The text states, 'Many people get their drinking water from wells that pump groundwater to the surface.' Therefore, groundwater is the crucial source for communities relying on wells."}]}, {"question": "Which of the following is a characteristic of water vapor as described in the text?", "options": [{"text": "It is always visible as clouds or fog.", "isCorrect": false, "rationale": "The text states water vapor is an 'invisible gas' and that clouds/fog form when water vapor cools and turns into visible droplets/crystals, meaning vapor itself is not visible."}, {"text": "It forms when water cools down significantly.", "isCorrect": false, "rationale": "The text explains water vapor forms 'When water heats up,' not cools down."}, {"text": "It is an invisible gas that can make the air feel humid.", "isCorrect": true, "rationale": "The text states, 'Water vapor (water in the form of an invisible gas found in the air). You cannot see water vapor, but you can sometimes feel it on a humid day when the air feels thick and sticky.'"}, {"text": "It primarily forms underground in rock crevices.", "isCorrect": false, "rationale": "Water vapor forms in the air when water heats up, not primarily underground."}]}, {"question": "Which of the following represents the correct order from the largest to the smallest percentage of Earth's *freshwater* sources, as mentioned in the summary table?", "options": [{"text": "Glaciers and ice > Groundwater > Lakes and rivers > Atmosphere", "isCorrect": true, "rationale": "According to the summary table: Glaciers and ice (2%), Groundwater (0.7%), Lakes and rivers (0.03%), Atmosphere (0.001%). This sequence correctly ranks them from largest to smallest."}, {"text": "Groundwater > Glaciers and ice > Lakes and rivers > Atmosphere", "isCorrect": false, "rationale": "This order incorrectly places groundwater before glaciers and ice."}, {"text": "Lakes and rivers > Groundwater > Glaciers and ice > Atmosphere", "isCorrect": false, "rationale": "This order incorrectly places lakes and rivers as the largest freshwater source after oceans, and misranks others."}, {"text": "Atmosphere > Lakes and rivers > Groundwater > Glaciers and ice", "isCorrect": false, "rationale": "This order incorrectly places the atmosphere as the largest freshwater source and reverses the correct ranking."}]}, {"question": "The text states, 'If all the glaciers melted, sea levels would rise dramatically.' This is primarily due to:", "options": [{"text": "The sudden increase in the Earth's average temperature.", "isCorrect": false, "rationale": "While melting glaciers are linked to increased temperatures, the statement asks about the *cause* of sea level rise, which is the addition of water, not the temperature itself."}, {"text": "Glaciers holding a significant amount of the planet's freshwater that would flow into the oceans.", "isCorrect": true, "rationale": "Glaciers hold about 2% of Earth's total water, and most of Earth's freshwater. If this large volume of frozen water melted and flowed into the oceans, it would significantly increase the total volume of ocean water, leading to dramatic sea level rise."}, {"text": "The decrease in the amount of salt in the ocean water.", "isCorrect": false, "rationale": "While a massive influx of freshwater might slightly dilute ocean salinity, this effect is not the primary reason for a dramatic sea level rise."}, {"text": "The displacement of land currently occupied by glaciers.", "isCorrect": false, "rationale": "The land beneath glaciers is already displacing water if it were below sea level or is above sea level. The rise in sea level comes from the *addition of water volume* into the ocean basin, not primarily from land displacement."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
