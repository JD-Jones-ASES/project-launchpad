    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 8, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the defining characteristic of a mixture, according to the textbook?", "options": [{"text": "A new substance with entirely different properties is formed from the combined ingredients.", "isCorrect": false, "rationale": "This describes a chemical change, where new substances are created and original properties are lost, rather than a mixture."}, {"text": "Two or more substances are combined, but each substance retains its original properties.", "isCorrect": true, "rationale": "The text explicitly states that in a mixture, 'two or more substances combined together, where each substance keeps its own properties.'"}, {"text": "The ingredients chemically react to form a new, homogenous solution.", "isCorrect": false, "rationale": "While some mixtures can be solutions, a chemical reaction signifies a chemical change, not just a mixture, and mixtures aren't always homogeneous."}, {"text": "It can only be made by combining solids that are insoluble in each other.", "isCorrect": false, "rationale": "The text provides examples of mixtures involving liquids and gases (e.g., air, oil and vinegar), not just insoluble solids."}]}, {"question": "Which of the following scenarios best represents a mixture as described in the text?", "options": [{"text": "Baking a cake from flour, eggs, and sugar, resulting in a single new food item.", "isCorrect": false, "rationale": "Baking a cake is used as an example of a chemical change because the ingredients transform into something completely new, and you cannot easily separate them."}, {"text": "Stirring together different types of pasta shapes in a bowl before cooking.", "isCorrect": true, "rationale": "Each pasta shape retains its original properties (shape, texture, taste) and can be distinguished and separated, fitting the definition of a mixture."}, {"text": "Dissolving a sugar cube completely in a glass of hot water to create a sweet liquid.", "isCorrect": false, "rationale": "While a solution is a type of mixture, the text primarily emphasizes mixtures where you can 'still see, taste, or pick out the separate parts,' which is less obvious with a fully dissolved sugar solution for this introductory context."}, {"text": "Burning a log in a fireplace, which produces ash and smoke.", "isCorrect": false, "rationale": "Burning is a chemical change, as the wood transforms into new substances (ash and smoke) with different properties."}]}, {"question": "A key difference between a mixture and a chemical change, according to the provided text and table, is that in a mixture:", "options": [{"text": "The process is usually irreversible, making it difficult to return to the original substances.", "isCorrect": false, "rationale": "The table indicates that substances formed by a chemical change are 'Usually not' easy to separate, implying irreversibility, whereas mixtures are 'Usually' easy to separate."}, {"text": "New substances with new properties are always created, signifying a transformation.", "isCorrect": false, "rationale": "The text explicitly states that in a mixture, 'the ingredients do not turn into a different substance' and 'Nothing new has been created,' which is characteristic of a chemical change."}, {"text": "The original ingredients maintain their individual properties, such as taste and appearance.", "isCorrect": true, "rationale": "The text highlights that 'in a mixture, every ingredient keeps its own properties,' directly contrasting it with chemical changes where properties are altered to form new substances."}, {"text": "Energy is always absorbed or released significantly during the combination process.", "isCorrect": false, "rationale": "Significant energy changes are more typically associated with chemical reactions, not the simple combination of substances in a mixture."}]}, {"question": "Imagine you have a bowl of red and blue marbles. You stir them together thoroughly. Based on the principles discussed in the 'Think About It' section, what type of combination have you made?", "options": [{"text": "A chemical compound, because the marbles are now thoroughly combined and inseparable.", "isCorrect": false, "rationale": "Marbles do not chemically bond to form a compound, and they remain separable, as indicated by the 'Hint' in the 'Think About It' section."}, {"text": "A new substance, because the colors are now mixed and cannot be distinguished.", "isCorrect": false, "rationale": "The colors are still distinct, and the marbles are still individual marbles. No new substance has been formed."}, {"text": "A mixture, because each marble retains its original color and shape, and they can still be picked out.", "isCorrect": true, "rationale": "This scenario directly parallels the 'Think About It' example, where the marbles keep their properties and can be separated, which defines a mixture."}, {"text": "A solution, because the marbles are evenly dispersed throughout the bowl.", "isCorrect": false, "rationale": "A solution typically involves one substance dissolving into another, becoming homogeneous at a molecular level. Marbles do not dissolve."}]}, {"question": "What happens to the distinct properties (like taste, color, or texture) of individual ingredients when they are combined to form a mixture?", "options": [{"text": "They are completely lost as new properties emerge for the overall substance.", "isCorrect": false, "rationale": "The loss of original properties and emergence of new ones is characteristic of a chemical change, not a mixture."}, {"text": "They are temporarily altered but can be restored with a chemical reaction.", "isCorrect": false, "rationale": "The text states properties are *kept*, not altered. Also, restoring them via chemical reaction isn't described for mixtures."}, {"text": "They remain unchanged and can still be observed or identified.", "isCorrect": true, "rationale": "The text explicitly states, 'In a mixture, every ingredient keeps its own properties' and 'You can still see, taste, or pick out the separate parts.'"}, {"text": "They blend together to form an entirely new, uniform set of properties.", "isCorrect": false, "rationale": "While properties might blend in some solutions, the core definition of a mixture in the text emphasizes that individual parts retain their properties, meaning a 'new, uniform set' is not characteristic of all mixtures or the primary definition."}]}, {"question": "According to the provided table comparing mixtures and chemical changes, which statement accurately describes their ease of separation?", "options": [{"text": "Substances formed by a chemical change are usually easy to separate back into their original parts.", "isCorrect": false, "rationale": "The table clearly states that for a chemical change, separation is 'Usually not' easy."}, {"text": "Mixtures are always easy to separate, while chemical changes are never easy to separate.", "isCorrect": false, "rationale": "The table uses the term 'Usually' for mixtures and 'Usually not' for chemical changes, implying there might be exceptions rather than absolute 'always' or 'never'."}, {"text": "Separating a mixture back into its components is generally easier than separating substances formed by a chemical change.", "isCorrect": true, "rationale": "The table shows 'Usually' for mixtures and 'Usually not' for chemical changes under the 'Easy to separate?' property, indicating that mixtures are typically easier to separate."}, {"text": "The ease of separation is identical for both mixtures and chemical changes, depending on the specific materials.", "isCorrect": false, "rationale": "The table explicitly differentiates between mixtures and chemical changes regarding ease of separation, indicating they are not identical."}]}, {"question": "Which of the following examples involves a process that is *not* a mixture, according to the distinctions made in the text?", "options": [{"text": "Filling a jar with different colored candies, where each candy type maintains its individual wrapper and flavor.", "isCorrect": false, "rationale": "This is a classic example of a mixture, as the individual candies retain their properties and can be separated."}, {"text": "Combining sand and gravel on a playground, where the individual grains and pebbles remain distinct.", "isCorrect": false, "rationale": "This is a mixture; sand and gravel particles retain their properties and are not chemically changed."}, {"text": "Burning wood in a campfire, where the wood transforms into ash, smoke, and heat.", "isCorrect": true, "rationale": "Burning wood is presented as an analogy to baking a cake, where new substances (ash, smoke) with new properties are formed, indicating a chemical change rather than a mixture."}, {"text": "Mixing different types of beads together to create a varied collection for jewelry making.", "isCorrect": false, "rationale": "This is a mixture, as each bead retains its color, shape, and material properties within the collection."}]}, {"question": "The 'Cross-Connection' section notes that mixtures can involve various states of matter. Given the examples of solids+solids, liquids+liquids, and gases+gases, which additional combination of states of matter *could also* form a mixture consistent with the text's definition?", "options": [{"text": "A solid and a gas (e.g., dust particles suspended in air).", "isCorrect": true, "rationale": "This combination (solid particles in a gaseous medium) fits the definition of a mixture, where each substance (dust and air) retains its properties. It logically extends from the provided examples of states of matter in mixtures."}, {"text": "A pure element transforming into another element through radioactive decay.", "isCorrect": false, "rationale": "This describes a nuclear change, not a mixture of two or more substances, and involves the transformation of identity, not retention of properties."}, {"text": "A single substance changing its state from liquid to gas (e.g., boiling water).", "isCorrect": false, "rationale": "This is a phase change of a single substance, not a mixture of two distinct substances combining."}, {"text": "Two gases undergoing a chemical reaction to form a new liquid compound.", "isCorrect": false, "rationale": "This describes a chemical change where new substances are formed, not a simple mixture where original properties are retained."}]}, {"question": "What is the primary pedagogical benefit of introducing 'tricky cases' (like milk going sour) that are hard to distinguish between a mixture and a chemical change, as mentioned in the 'teachernote'?", "options": [{"text": "To suggest that mixtures and chemical changes are often interchangeable in real-world scenarios.", "isCorrect": false, "rationale": "The unit's purpose is to differentiate them; tricky cases highlight complexity, not interchangeability."}, {"text": "To simplify the concept by demonstrating that a clear distinction is not always necessary.", "isCorrect": false, "rationale": "Introducing 'tricky cases' adds complexity and challenges, rather than simplifying the concept."}, {"text": "To challenge students' understanding and develop their critical thinking skills.", "isCorrect": true, "rationale": "The teacher note explicitly states, 'These “tricky cases” build critical thinking,' indicating the primary educational goal."}, {"text": "To prepare students for memorizing a list of exceptions in a later unit.", "isCorrect": false, "rationale": "While they will be revisited, the focus is on 'critical thinking,' not mere memorization of exceptions."}]}, {"question": "Which statement accurately reflects how the 'Property' table characterizes a mixture compared to a chemical change?", "options": [{"text": "Mixtures always form new substances, whereas chemical changes only combine existing substances.", "isCorrect": false, "rationale": "The table indicates 'New substance formed? Mixture: No, Chemical Change: Yes,' so this statement is reversed."}, {"text": "In a mixture, parts keep their properties, but in a chemical change, new substances are formed.", "isCorrect": true, "rationale": "The table shows 'Parts keep their properties? Mixture: Yes, Chemical Change: No' and 'New substance formed? Mixture: No, Chemical Change: Yes,' which aligns perfectly with this statement."}, {"text": "Both mixtures and chemical changes usually result in substances that are difficult to separate.", "isCorrect": false, "rationale": "The table states 'Easy to separate? Mixture: Usually, Chemical Change: Usually not,' indicating a difference, not similarity in difficulty."}, {"text": "Chemical changes are always easy to separate, while mixtures rarely retain original properties.", "isCorrect": false, "rationale": "This statement is entirely incorrect. Chemical changes are 'Usually not' easy to separate, and mixtures 'Yes' keep their properties."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
