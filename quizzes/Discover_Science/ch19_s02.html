        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 19, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental way all six simple machines change force?", "options": [{"text": "They always multiply the applied force, making it stronger.", "isCorrect": false, "rationale": "Simple machines do not always multiply force; sometimes they reduce the required force by increasing the distance, or they only change the direction of the force."}, {"text": "They always change the direction of the applied force.", "isCorrect": false, "rationale": "While some simple machines, like a simple pulley, change the direction of force, this is not true for ALL of them (e.g., a ramp doesn't primarily change direction)."}, {"text": "They always decrease the distance over which force is applied.", "isCorrect": false, "rationale": "Simple machines often increase the distance over which force is applied in order to reduce the amount of force needed, as seen with inclined planes or screws."}, {"text": "They change the amount of force needed, the direction of the force, or the distance over which a force acts.", "isCorrect": true, "rationale": "This statement accurately encompasses the various ways simple machines alter force application, either by reducing the force, changing its direction, or trading force for distance."}]}, {"question": "A construction worker needs to lift a very heavy stone with a lever. Based on the principle of the lever, what strategy would be most effective to reduce the force required?", "options": [{"text": "Place the fulcrum as close as possible to the point where the worker pushes down.", "isCorrect": false, "rationale": "Placing the fulcrum close to the effort (where the worker pushes) would increase the force needed, as the distance from the fulcrum would be shorter."}, {"text": "Use a lever that has the shortest possible length to concentrate the force.", "isCorrect": false, "rationale": "A shorter lever might limit the distance from the fulcrum, thus requiring more force to move the load. Longer levers allow for greater distances from the fulcrum."}, {"text": "Position the fulcrum close to the heavy stone, allowing the worker to push down far from it.", "isCorrect": true, "rationale": "The text states, 'the farther you are from the fulcrum, the less force you need to push down.' Placing the fulcrum close to the load and pushing far from it maximizes the mechanical advantage."}, {"text": "Apply force quickly and with short, powerful pushes, regardless of fulcrum placement.", "isCorrect": false, "rationale": "While technique can be important, the mechanical advantage gained by proper fulcrum placement is the primary factor in reducing the required force for a lever, not just the manner of applying force."}]}, {"question": "Why is a doorknob, which is a wheel and axle, significantly easier to turn than trying to grip and twist the small rod (axle) directly with your fingers?", "options": [{"text": "The doorknob provides a smoother surface for friction, reducing the effort needed.", "isCorrect": false, "rationale": "While a smooth surface can reduce friction, the primary mechanical advantage of a wheel and axle isn't about surface friction but about the difference in circumference."}, {"text": "The larger diameter of the wheel (knob) allows you to apply force over a greater distance, requiring less force to turn the smaller axle.", "isCorrect": true, "rationale": "The text explains, 'The bigger the wheel compared to the axle, the less force you need.' By turning the larger wheel, you apply less force over a greater distance, which translates to a greater force on the smaller axle."}, {"text": "The axle itself has a special lubricant inside that reduces the force required for rotation.", "isCorrect": false, "rationale": "This is not a principle of how a wheel and axle works as a simple machine; it refers to a specific design element not universally present or relevant to the mechanical advantage."}, {"text": "Turning the doorknob changes the direction of the force, making it feel easier.", "isCorrect": false, "rationale": "The wheel and axle primarily reduces the force required to turn something, rather than fundamentally changing the direction of the force like a simple pulley does."}]}, {"question": "A simple pulley with a single wheel is primarily used to achieve what?", "options": [{"text": "Significantly reduce the amount of force needed to lift a heavy load.", "isCorrect": false, "rationale": "While multiple pulleys working together can significantly reduce force, a single-wheel pulley's primary benefit is not force reduction but changing direction."}, {"text": "Convert rotary motion into linear motion.", "isCorrect": false, "rationale": "Converting rotary motion to linear motion is characteristic of a screw, not a simple pulley."}, {"text": "Change the direction of the applied force, making it more convenient to lift an object.", "isCorrect": true, "rationale": "The text states, 'A simple pulley changes the direction of your force. Instead of pushing up to raise a flag, you pull the rope down, and the flag goes up.'"}, {"text": "Increase the speed at which a load can be lifted.", "isCorrect": false, "rationale": "Increasing speed is not the primary function or benefit of a simple pulley; its main advantage is changing the direction of force or, with multiple pulleys, reducing force."}]}, {"question": "A long, gently sloped ramp (inclined plane) is chosen instead of a short, steep ramp to move a heavy box. What is the main trade-off made by choosing the longer, gentler ramp?", "options": [{"text": "The total work done on the box is significantly reduced.", "isCorrect": false, "rationale": "The total work done (force x distance against gravity) to lift the box to a certain height remains theoretically the same. The inclined plane simply changes how that work is distributed."}, {"text": "Less force is required to move the box, but it must be moved over a greater distance.", "isCorrect": true, "rationale": "The text explicitly states this trade-off: 'Lifting a heavy wheelchair straight up a step takes a lot of force. But rolling it up a long ramp takes less force — you just have to travel a longer distance. That is the trade-off.'"}, {"text": "The box will reach its destination faster, despite the increased distance.", "isCorrect": false, "rationale": "Choosing a longer ramp does not inherently guarantee faster movement; in fact, moving over a greater distance with less force might take more time."}, {"text": "The friction between the box and the ramp is completely eliminated.", "isCorrect": false, "rationale": "Friction is still present, and moving an object over a longer surface might even increase the total friction encountered, though the force needed at any given moment is less."}]}, {"question": "Which of the following best describes the primary action of a wedge?", "options": [{"text": "It provides a fixed point around which a bar can pivot to lift objects.", "isCorrect": false, "rationale": "This describes the function of a fulcrum in a lever, not a wedge."}, {"text": "It wraps an inclined plane around a cylinder to join materials together.", "isCorrect": false, "rationale": "This describes a screw, which is an inclined plane wrapped around a rod, used to hold things together."}, {"text": "It uses a sharp edge formed by two inclined planes to split or push materials apart.", "isCorrect": true, "rationale": "The text states, 'A wedge pushes things apart. ...When you push a wedge into something, the sideways force splits the material apart.'"}, {"text": "It reduces the force needed to move an object by supporting it on a rotating rod.", "isCorrect": false, "rationale": "This describes a wheel and axle, where a rotating rod (axle) is turned by a larger wheel."}]}, {"question": "A screw is described as an 'inclined plane wrapped around a cylinder.' How does this structure allow a screw to function effectively in holding things together or lifting?", "options": [{"text": "The cylindrical shape of the screw creates a vacuum, pulling materials together as it rotates.", "isCorrect": false, "rationale": "Screws do not create a vacuum; their holding power comes from the threads engaging with the material."}, {"text": "The spiral thread allows a small turning force applied over a long circular distance to create a strong pushing or pulling force along its length.", "isCorrect": true, "rationale": "The text explains, 'Because the inclined plane spirals around many times, you use much less force — but you have to turn the screw many times.' This demonstrates the trade-off of less force over a greater distance (circular path) to generate a strong linear force."}, {"text": "The flat top of the screw acts as a lever, reducing the force needed to embed it.", "isCorrect": false, "rationale": "While the head of a screw is where force is applied, the primary mechanical advantage of the screw itself comes from its threaded design, not the leverage of its head."}, {"text": "The smooth surface of the cylinder reduces friction, making it easier to insert.", "isCorrect": false, "rationale": "The threads of a screw are designed to create friction and grip, not reduce it, which is essential for its holding power."}]}, {"question": "A person uses a baseball bat to hit a ball. In this action, how is the baseball bat functioning as a simple machine?", "options": [{"text": "As an inclined plane, because it moves the ball along a sloped path.", "isCorrect": false, "rationale": "A baseball bat is not an inclined plane; it does not provide a sloped surface for moving objects up or down with reduced force."}, {"text": "As a lever, with the hands acting as the fulcrum and the hitting end moving the ball with increased speed.", "isCorrect": true, "rationale": "The text lists 'baseball bat' as an example of a lever. The hands act as the fulcrum, the effort is applied by the batter's arms, and the end of the bat applies force to the ball."}, {"text": "As a wedge, splitting the air around the ball to propel it faster.", "isCorrect": false, "rationale": "A baseball bat does not function as a wedge; its purpose is to strike, not to split material by pushing its V-shape into it."}, {"text": "As a wheel and axle, transferring rotational motion to the ball.", "isCorrect": false, "rationale": "A baseball bat does not consist of a wheel and axle structure; its primary action is a swinging motion around a pivot point (the hands)."}]}, {"question": "According to the 'Connecting the Three' note, what is the hierarchical relationship between an inclined plane, a wedge, and a screw?", "options": [{"text": "The wedge is the simplest form, from which the inclined plane and screw are derived.", "isCorrect": false, "rationale": "The note explicitly states that the inclined plane is the simplest form, not the wedge."}, {"text": "All three are independent simple machines with no direct structural relationship.", "isCorrect": false, "rationale": "The 'Connecting the Three' note specifically highlights their family relationship and how they are structurally related."}, {"text": "An inclined plane is the basic form, a wedge is two inclined planes combined, and a screw is an inclined plane wrapped around a rod.", "isCorrect": true, "rationale": "This accurately reflects the information in the 'Connecting the Three' teacher note: 'an inclined plane is the simplest form, a wedge is two inclined planes combined, and a screw is an inclined plane wrapped around a rod.'"}, {"text": "The screw is the most complex, combining elements of both levers and pulleys.", "isCorrect": false, "rationale": "The screw combines elements of an inclined plane, not levers and pulleys."}]}, {"question": "Imagine you need to raise a heavy banner to the top of a flagpole. Which simple machine would be most appropriate for this task and why?", "options": [{"text": "An inclined plane, because you could simply roll the banner up a long ramp to the top.", "isCorrect": false, "rationale": "An inclined plane would be impractical and inefficient for raising a banner up a vertical flagpole; you cannot 'roll' a banner up a ramp to a significant height in this context."}, {"text": "A wedge, because it could split the air to make the banner go higher with less resistance.", "isCorrect": false, "rationale": "A wedge is designed to split or push materials apart, not to lift objects by reducing air resistance. This is an incorrect application of a wedge's function."}, {"text": "A pulley, because it allows you to pull down on a rope to lift the banner up, changing the direction of force and using your body weight.", "isCorrect": true, "rationale": "The text specifically uses a flagpole as an example for a pulley, explaining, 'Instead of pushing up to raise a flag, you pull the rope down, and the flag goes up. That feels much easier because you can use your body weight to help.'"}, {"text": "A lever, because you could use a long pole to push the banner up from the base.", "isCorrect": false, "rationale": "While a pole could be used, directly pushing a banner up a tall flagpole with a lever would be awkward and inefficient compared to the specialized design of a pulley system for this task."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
