<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 12, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic that defines the water cycle?", "options": [{"text": "It primarily involves water changing from a liquid to a solid form.", "isCorrect": false, "rationale": "While water can become solid (ice), the primary and continuous movement in the water cycle involves changes between liquid and gas, and back to liquid. Solidification is a specific condition for forms like snow or hail, not the overall defining characteristic."}, {"text": "It is the continuous movement of water from Earth's surface to the atmosphere and back again.", "isCorrect": true, "rationale": "This option provides the exact definition of the water cycle as stated in the text: 'the continuous movement of water from Earth's surface to the atmosphere and back again.'"}, {"text": "It describes how water is created and destroyed in nature.", "isCorrect": false, "rationale": "The text explicitly states in the 'thinkaboutit' section that 'Water is never created or destroyed — it just keeps cycling.'"}, {"text": "It only occurs in oceans and large bodies of water.", "isCorrect": false, "rationale": "The text mentions oceans, lakes, rivers, and even puddles as sources for evaporation, indicating it occurs broadly across Earth's surface, not exclusively in large bodies of water."}], "id": "q01"}, {"question": "On a hot summer day, you notice that a wet towel left outside quickly becomes dry. Which stage of the water cycle is primarily responsible for the towel drying?", "options": [{"text": "Condensation", "isCorrect": false, "rationale": "Condensation is the process where water vapor cools and changes back into liquid water droplets (like forming clouds or dew), not the process of drying liquid water."}, {"text": "Precipitation", "isCorrect": false, "rationale": "Precipitation is water falling from clouds to Earth's surface (rain, snow, etc.), which is the opposite of a towel drying."}, {"text": "Evaporation", "isCorrect": true, "rationale": "Evaporation is the process where liquid water changes into water vapor (a gas), usually when heated by the Sun. The Sun's heat causes the water in the towel to evaporate, turning it into an invisible gas and making the towel dry."}, {"text": "Collection", "isCorrect": false, "rationale": "Collection is when precipitation gathers in bodies of water or soaks into the ground. It describes where water goes after falling, not how a wet item dries."}], "id": "q02"}, {"question": "When you breathe out on a cold day, you can sometimes see a tiny 'cloud' form in front of your mouth. This visible 'cloud' is an example of which stage of the water cycle?", "options": [{"text": "Evaporation", "isCorrect": false, "rationale": "Evaporation turns liquid water into invisible water vapor; the 'cloud' you see is visible water droplets, not invisible vapor."}, {"text": "Condensation", "isCorrect": true, "rationale": "This is an example of condensation. The warm, moist water vapor from your breath cools rapidly in the cold air, changing back into tiny liquid water droplets, which become visible as a 'cloud,' similar to how clouds form in the atmosphere."}, {"text": "Precipitation", "isCorrect": false, "rationale": "Precipitation involves water falling from clouds to the Earth's surface in various forms (rain, snow, etc.), which is not what is happening when you breathe out."}, {"text": "Collection", "isCorrect": false, "rationale": "Collection is the gathering of water after it has fallen as precipitation, which is unrelated to seeing your breath on a cold day."}], "id": "q03"}, {"question": "Which sequence correctly represents the typical order of the main stages in the water cycle, starting from water already on Earth's surface?", "options": [{"text": "Precipitation → Evaporation → Condensation → Collection", "isCorrect": false, "rationale": "This order is incorrect. Precipitation is typically followed by collection, and evaporation initiates the movement from the surface to the atmosphere."}, {"text": "Collection → Evaporation → Condensation → Precipitation", "isCorrect": true, "rationale": "This sequence accurately reflects the stages described: water collects, then evaporates, forms clouds through condensation, and eventually falls back as precipitation, returning to collection points. The text and diagram support this cyclical order."}, {"text": "Condensation → Precipitation → Evaporation → Collection", "isCorrect": false, "rationale": "This order is incorrect. Condensation occurs high in the atmosphere after evaporation, not as an initial stage from surface water, and evaporation generally precedes precipitation."}, {"text": "Evaporation → Precipitation → Collection → Condensation", "isCorrect": false, "rationale": "This order is incorrect. Condensation must occur before precipitation, and collection is generally the stage after precipitation, leading back to evaporation."}], "id": "q04"}, {"question": "What is the crucial role of the Sun in initiating the water cycle?", "options": [{"text": "The Sun causes water vapor to cool and form clouds.", "isCorrect": false, "rationale": "The cooling of water vapor occurs as it rises higher into the colder atmosphere, not directly caused by the Sun's heating, which does the opposite."}, {"text": "The Sun's energy is used to break down water into its constituent elements.", "isCorrect": false, "rationale": "The water cycle involves changes in the state of water (liquid, gas), not its chemical composition. Water is not broken down into hydrogen and oxygen during the cycle."}, {"text": "The Sun heats liquid water, causing it to change into water vapor.", "isCorrect": true, "rationale": "The text clearly states under Stage 1: Evaporation that 'The Sun heats water in oceans, lakes, rivers, and puddles. When water gets warm enough, it changes from a liquid into an invisible gas called water vapor.' This is how the cycle begins."}, {"text": "The Sun helps tiny water droplets combine to form precipitation.", "isCorrect": false, "rationale": "Water droplets combine inside clouds due to collisions and gravity. While the Sun's energy ultimately drives the cycle, it doesn't directly cause droplets to combine for precipitation."}], "id": "q05"}, {"question": "A student observes a puddle disappearing on a sunny day and states, 'The water in the puddle just vanished.' Based on the textbook section, why is this statement inaccurate?", "options": [{"text": "The water actually soaked into the ground and became groundwater.", "isCorrect": false, "rationale": "While some water does soak into the ground (collection), the text specifically addresses the misconception of water 'vanishing' by explaining evaporation, not solely absorption into the ground."}, {"text": "The water changed into an invisible gas called water vapor, but it is still present in the atmosphere.", "isCorrect": true, "rationale": "The 'teachernote' explicitly corrects this misconception: 'Gently redirect: the water did not vanish — it changed into a gas they cannot see. The water is still there, just in a different form.'"}, {"text": "The water was collected by animals for drinking.", "isCorrect": false, "rationale": "This is not a primary mechanism described in the water cycle for the disappearance of an entire puddle."}, {"text": "The water was destroyed by the Sun's heat.", "isCorrect": false, "rationale": "The text emphasizes that water is never destroyed; it only changes form and location."}], "id": "q06"}, {"question": "Which form of precipitation is characterized by rain that freezes as it falls through a layer of cold air near the ground?", "options": [{"text": "Hail", "isCorrect": false, "rationale": "Hail consists of balls of ice that form in strong thunderstorms, typically growing larger as they are carried up and down by updrafts, not freezing rain as it falls."}, {"text": "Snow", "isCorrect": false, "rationale": "Snow forms as ice crystals directly from water vapor in very cold conditions throughout the cloud and atmosphere, without first being liquid rain."}, {"text": "Sleet", "isCorrect": true, "rationale": "The text defines sleet as 'rain that freezes as it falls,' precisely matching the description in the question."}, {"text": "Rain", "isCorrect": false, "rationale": "Rain is liquid water drops and does not involve freezing as it falls to the ground."}], "id": "q07"}, {"question": "Clouds are primarily formed during the condensation stage because:", "options": [{"text": "Water vapor collects dust particles, making them visible.", "isCorrect": false, "rationale": "Water vapor condenses *around* tiny bits of dust, but the dust itself doesn't become visible as a cloud. It's the water droplets that become visible."}, {"text": "Water vapor gets so hot it becomes visible as a cloud.", "isCorrect": false, "rationale": "Clouds form when water vapor cools down, not when it gets hot. Cooling causes the phase change from gas to liquid droplets."}, {"text": "Billions of tiny water droplets (formed from cooled water vapor) clump together around dust particles.", "isCorrect": true, "rationale": "The text states, 'As water vapor rises higher and higher, the air gets colder. When the vapor cools enough, it changes back into tiny water droplets. ... Billions of these tiny droplets clump together around tiny bits of dust in the air. What do they form? Clouds!'"}, {"text": "The oxygen and hydrogen in the air combine to create new water.", "isCorrect": false, "rationale": "Clouds are formed from existing water changing state, not from the creation of new water molecules from atmospheric gases. Water is neither created nor destroyed."}], "id": "q08"}, {"question": "The 'Think About It' section mentions that the water you drank today might have once been part of a dinosaur's lake. This statement emphasizes which key characteristic of the water cycle?", "options": [{"text": "Water can change its chemical composition over time.", "isCorrect": false, "rationale": "The water cycle involves changes in the physical state (liquid, gas, solid) and location of water, but not its chemical composition. Water (H2O) remains H2O."}, {"text": "The total amount of water on Earth remains constant and is continually recycled.", "isCorrect": true, "rationale": "The 'thinkaboutit' box concludes with, 'Water is never created or destroyed — it just keeps cycling.' This highlights the conservation and recycling aspect of water over vast periods, meaning ancient water is still present today."}, {"text": "Water only cycles through living organisms.", "isCorrect": false, "rationale": "The text clearly describes water cycling through the atmosphere, oceans, lakes, rivers, and ground, not just living organisms."}, {"text": "Water always returns to the exact same location after completing a cycle.", "isCorrect": false, "rationale": "The water cycle describes continuous movement globally. Water from a puddle can evaporate, condense into a cloud, and precipitate thousands of miles away, not necessarily returning to the exact same puddle."}], "id": "q09"}, {"question": "After a heavy rainfall, a significant amount of water flows into a river, which eventually carries it to a large lake. This entire process is an example of which stage of the water cycle?", "options": [{"text": "Evaporation", "isCorrect": false, "rationale": "Evaporation is the process of liquid water changing into water vapor and rising into the air, which is not what is described here."}, {"text": "Condensation", "isCorrect": false, "rationale": "Condensation is the process of water vapor cooling and changing back into tiny liquid water droplets, typically forming clouds."}, {"text": "Precipitation", "isCorrect": false, "rationale": "Precipitation refers to water falling from clouds to Earth's surface. While rain started this process, the question focuses on what happens to the water *after* it falls."}, {"text": "Collection", "isCorrect": true, "rationale": "Collection is defined as 'the process in which precipitation gathers in oceans, lakes, rivers, or soaks into the ground.' The scenario perfectly describes water gathering in a river and flowing to a lake after rainfall."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
