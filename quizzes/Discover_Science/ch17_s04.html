    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 17, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary distinction between 'weather' and 'climate' according to the text?", "options": [{"text": "Weather refers to precipitation patterns, while climate refers to temperature averages.", "isCorrect": false, "rationale": "While weather includes precipitation and climate includes temperature averages, this option provides an incomplete and somewhat misleading distinction. The core difference is time scale, not the type of atmospheric data considered."}, {"text": "Weather describes atmospheric conditions at a specific place and time, changing quickly, while climate is the average weather pattern over many years.", "isCorrect": true, "rationale": "The text clearly states, 'Weather describes what the atmosphere is doing at a particular place and time. Weather changes quickly...' and 'Climate is the average weather pattern of a place over a long period of time, usually 30 years or more.'"}, {"text": "Climate is influenced by human activities, whereas weather is purely natural.", "isCorrect": false, "rationale": "The text does not discuss human influence on climate or weather, and this statement is not presented as the primary distinction between the two terms."}, {"text": "Weather is studied by meteorologists, and climate is studied by geologists.", "isCorrect": false, "rationale": "While meteorologists study weather, climatologists (not geologists, primarily) study climate. The distinction between weather and climate is based on time scale and scope, not solely the profession of the scientist studying it."}], "id": "q01"}, {"question": "A student visiting a desert reports, 'It's surprisingly cool and cloudy today!' This statement primarily describes which aspect of the desert's atmospheric conditions?", "options": [{"text": "The long-term climate trend of the desert.", "isCorrect": false, "rationale": "A single day's conditions, even if unusual, do not represent the long-term climate. The text states, 'One cool day does not change the climate.'"}, {"text": "The typical climate zone of the desert.", "isCorrect": false, "rationale": "The 'typical' climate is the average over many years (hot and dry for a desert), not a single day's 'surprisingly cool and cloudy' conditions."}, {"text": "The current weather of the desert.", "isCorrect": true, "rationale": "The text explains that 'Weather describes what the atmosphere is doing at a particular place and time.' A report about a specific day's 'cool and cloudy' conditions directly refers to the weather."}, {"text": "The seasonal average for the desert's region.", "isCorrect": false, "rationale": "A single day's observation is not an average for a season. Seasonal averages contribute to climate but are not what a 'surprisingly cool and cloudy today' statement directly describes."}], "id": "q02"}, {"question": "Which of the following descriptions accurately characterizes the Temperate climate zone?", "options": [{"text": "Experiences warm temperatures year-round with abundant rainfall, fostering lush rainforests.", "isCorrect": false, "rationale": "This description matches the Tropical zone, not the Temperate zone, which has distinct seasons."}, {"text": "Has four distinct seasons, including a warm summer, cool autumn, cold winter, and mild spring, with significant temperature changes.", "isCorrect": true, "rationale": "The text states: 'Temperate climates have four seasons: a warm summer, a cool autumn, a cold winter, and a mild spring. Temperatures change a lot from season to season.'"}, {"text": "Is very cold for most of the year, even in summer, with temperatures often staying below 10°C.", "isCorrect": false, "rationale": "This description aligns with the Polar zone, not the Temperate zone."}, {"text": "Is found near the equator and is the primary location for arid deserts.", "isCorrect": false, "rationale": "While the Tropical zone is near the equator, it is known for warmth and often rain, leading to rainforests, not primarily arid deserts. Deserts can occur in various zones due to other factors."}], "id": "q03"}, {"question": "A coastal city in a temperate zone experiences less extreme temperatures (milder summers, less cold winters) compared to an inland city at the same latitude. What is the most significant factor explaining this difference?", "options": [{"text": "The difference in altitude between the two cities.", "isCorrect": false, "rationale": "While altitude affects temperature, the question specifies 'coastal' versus 'inland' at the 'same latitude,' highlighting the ocean's influence, not necessarily altitude differences."}, {"text": "The directness of the Sun's rays hitting each city.", "isCorrect": false, "rationale": "The question specifies 'at the same latitude,' implying similar directness of the Sun's rays, which would not explain temperature differences between coastal and inland areas."}, {"text": "The moderating effect of the ocean, which heats and cools more slowly than land.", "isCorrect": true, "rationale": "The text explains: 'Distance from the ocean — Water heats up and cools down more slowly than land. Places near the ocean usually have milder temperatures — not too hot in summer and not too cold in winter.'"}, {"text": "The presence of distinct climate zones.", "isCorrect": false, "rationale": "Both cities are stated to be in a temperate zone. The question asks about differences *within* that zone, which is explained by specific climate factors, not just the existence of zones."}], "id": "q04"}, {"question": "If you were to plan a research expedition to a Polar climate zone, what would be the most critical aspect of your wardrobe planning?", "options": [{"text": "Packing light, loose clothing to stay cool in the sun.", "isCorrect": false, "rationale": "Light, loose clothing is suitable for tropical climates, not polar ones, which are very cold year-round."}, {"text": "Bringing a variety of outfits for four distinct seasons.", "isCorrect": false, "rationale": "Four distinct seasons are characteristic of the temperate zone, not the polar zone, which is consistently cold."}, {"text": "Focusing on many layers and thick, insulated jackets to withstand extremely cold temperatures.", "isCorrect": true, "rationale": "The text states: 'People in polar climates wear many layers and thick, insulated jackets' due to 'very cold for most of the year' temperatures."}, {"text": "Preparing for frequent heavy rainfall and high humidity.", "isCorrect": false, "rationale": "Polar regions get 'little precipitation, but what falls is usually snow,' not frequent heavy rainfall or high humidity."}], "id": "q05"}, {"question": "Which statement best describes why Earth has three major climate zones?", "options": [{"text": "The varying altitude of landforms across the globe.", "isCorrect": false, "rationale": "While altitude affects local climate, the text states the *main reason* for the *three broad climate zones* is 'The Sun's rays hit Earth most directly near the equator and least directly near the poles.'"}, {"text": "The rotation of Earth on its axis, creating day and night cycles.", "isCorrect": false, "rationale": "Earth's rotation causes day and night and influences weather patterns, but it's not the primary reason for the distinct, broad climate zones based on temperature averages over years."}, {"text": "The uneven distribution of the Sun's rays, which hit the equator most directly and the poles least directly.", "isCorrect": true, "rationale": "The text explicitly states: 'The main reason is the Sun. The Sun's rays hit Earth most directly near the equator and least directly near the poles. This creates three broad climate zones.'"}, {"text": "The presence of large oceans and continents.", "isCorrect": false, "rationale": "The distribution of land and water influences local climates, but the fundamental *zoning* into tropical, temperate, and polar is due to the angle of sunlight, not the land/water distribution itself."}], "id": "q06"}, {"question": "A village is located high in the Andes Mountains near the equator. Despite its proximity to the equator, the village experiences consistently cool temperatures throughout the year. Which factor is the primary reason for this characteristic?", "options": [{"text": "Its distance from the ocean, leading to less moderated temperatures.", "isCorrect": false, "rationale": "While distance from the ocean affects temperature, the primary reason for consistent coolness in a high mountain village near the equator is altitude. Being far from the ocean would typically lead to more extreme (hotter) temperatures in a tropical area, not consistently cool."}, {"text": "The influence of cold ocean currents in the nearby Pacific Ocean.", "isCorrect": false, "rationale": "Ocean currents primarily affect coastal areas. While relevant for some regions, the question highlights a *mountain* village, making altitude the more direct and significant factor for its cool temperatures."}, {"text": "Its high altitude, as air gets cooler the higher one goes.", "isCorrect": true, "rationale": "The text states: 'Altitude — High places like mountaintops are colder than low places like valleys, even if they are at the same distance from the equator. Air gets cooler as you go higher.' This directly explains the cool temperatures in a high mountain village near the equator."}, {"text": "The directness of the Sun's rays at the equator.", "isCorrect": false, "rationale": "Direct sunlight at the equator would typically make places warm. The question describes an exception (cool temperatures), which is explained by altitude overriding the equatorial warmth."}], "id": "q07"}, {"question": "What was Tetsuya 'Ted' Fujita's most significant contribution to the study of weather phenomena?", "options": [{"text": "He developed a scale for classifying global climate zones.", "isCorrect": false, "rationale": "Fujita's work focused on severe storms and tornadoes, not global climate zones. The text details his creation of the Fujita Scale for tornadoes."}, {"text": "He discovered microbursts and created a scale for rating tornado damage based on his observations of destruction patterns.", "isCorrect": true, "rationale": "The text explicitly states: 'Based on these observations, he created the Fujita Scale in 1971. The scale rates tornadoes... based on the destruction they cause.' It also notes he 'discovered microbursts'."}, {"text": "He was the first to differentiate between weather and climate.", "isCorrect": false, "rationale": "The distinction between weather and climate predates Fujita's work, which focused specifically on severe weather events like tornadoes."}, {"text": "He developed models to predict long-term climate change.", "isCorrect": false, "rationale": "Fujita was a meteorologist who studied severe *storms* and their immediate effects, not long-term climate change prediction."}], "id": "q08"}, {"question": "Which analogy best captures the relationship between weather and climate, as described in the text?", "options": [{"text": "A single raindrop versus an entire ocean.", "isCorrect": false, "rationale": "While one is smaller than the other, this analogy doesn't fully capture the 'right now' vs. 'over many years' aspect as effectively as the clothing analogy given in the text."}, {"text": "A daily outfit versus all the clothes you own in your closet.", "isCorrect": true, "rationale": "The text directly uses this analogy: 'Think of it this way: weather tells you what to wear today; climate tells you what kinds of clothes to keep in your closet all year long.' This clearly represents the 'right now' vs. 'big picture/many years' distinction."}, {"text": "A single tree versus an entire forest.", "isCorrect": false, "rationale": "This analogy highlights individual vs. collection but misses the crucial temporal difference between weather (short-term) and climate (long-term averages)."}, {"text": "A single musical note versus a complete symphony.", "isCorrect": false, "rationale": "Similar to other distractors, this conveys part-to-whole but doesn't effectively illustrate the distinct time scales and averaging process inherent in the climate vs. weather definition."}], "id": "q09"}, {"question": "A landlocked city in a temperate zone experiences unusually hot summers and very cold winters. Which factor is most likely contributing to these extreme seasonal temperatures?", "options": [{"text": "Its proximity to the equator, causing more direct sunlight.", "isCorrect": false, "rationale": "Proximity to the equator would lead to warmth but wouldn't typically cause *very cold winters* in a temperate zone, nor would it be the primary factor for extremes in a landlocked city versus a coastal one at the same latitude."}, {"text": "Its high altitude, leading to cooler temperatures overall.", "isCorrect": false, "rationale": "High altitude causes cooler temperatures, but it wouldn't necessarily explain *unusually hot summers* alongside very cold winters; rather, it would generally temper the heat."}, {"text": "Its distance from large bodies of water, which causes land to heat and cool more quickly.", "isCorrect": true, "rationale": "The text states: 'Distance from the ocean — Water heats up and cools down more slowly than land... Places far from the ocean can have very hot summers and very cold winters.' This directly explains the extreme seasonal temperatures in a landlocked city."}, {"text": "The presence of warm ocean currents flowing nearby.", "isCorrect": false, "rationale": "Warm ocean currents would moderate temperatures and generally make a place warmer and less extreme, contradicting the scenario of very hot summers and very cold winters, especially for a 'landlocked' city."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
