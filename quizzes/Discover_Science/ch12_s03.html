    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 12, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which sequence correctly represents the initial stages of Dewdrop's journey from the Pacific Ocean, as described in her story?", "options": [{"text": "Condensation, Evaporation, Precipitation", "isCorrect": false, "rationale": "This sequence is incorrect. Evaporation must occur before condensation, and both precede precipitation in the formation of a cloud."}, {"text": "Evaporation, Condensation, Precipitation", "isCorrect": true, "rationale": "Dewdrop first evaporates from the ocean, then condenses into a cloud, and finally falls as precipitation."}, {"text": "Precipitation, Evaporation, Condensation", "isCorrect": false, "rationale": "This sequence begins with precipitation, which occurs much later in Dewdrop's initial journey after she has already evaporated and condensed."}, {"text": "Evaporation, Precipitation, Condensation", "isCorrect": false, "rationale": "This sequence is incorrect. Condensation (forming a cloud) happens before precipitation (falling as rain or snow)."}], "id": "q01"}, {"question": "After falling as rain, Dewdrop could have taken a different route than flowing into a puddle and river system. Which of the following describes an alternative path mentioned for a raindrop?", "options": [{"text": "It could become part of a glacier on a mountain for thousands of years.", "isCorrect": false, "rationale": "While a snowflake can become part of a glacier, the question asks about a raindrop's alternative path, and a raindrop wouldn't typically become a glacier directly unless it froze immediately upon impact."}, {"text": "It could be taken up by the roots of a plant and released through leaves.", "isCorrect": false, "rationale": "This is a valid alternative path (transpiration), but the text specifically mentions a raindrop soaking into the soil as groundwater as a distinct route."}, {"text": "It could soak into the soil and become groundwater for a long period.", "isCorrect": true, "rationale": "The text explicitly states: 'A raindrop soaks into the soil and becomes groundwater. It might stay underground for weeks, years, or even centuries.'"}, {"text": "It could immediately evaporate back into the atmosphere upon hitting the ground.", "isCorrect": false, "rationale": "While evaporation can happen from the ground, the question asks for an alternative 'path' with a longer stay, and direct immediate evaporation isn't described as a distinct 'route' in the same way as groundwater or glaciers."}], "id": "q02"}, {"question": "The section 'Water Is a Traveler' emphasizes which fundamental characteristic of Earth's water?", "options": [{"text": "Water frequently changes its chemical composition.", "isCorrect": false, "rationale": "The text emphasizes the physical state and location changes of water, not changes in its chemical composition."}, {"text": "The total amount of water on Earth remains constant over vast periods.", "isCorrect": true, "rationale": "The text states: 'No new water is being made. No old water is being lost. Every glass of water you drink has been recycled by nature countless times,' highlighting the conservation of water."}, {"text": "New water is continuously being formed deep within the Earth's crust.", "isCorrect": false, "rationale": "The text explicitly contradicts this, stating 'No new water is being made.'"}, {"text": "Water can only exist in liquid form for short durations.", "isCorrect": false, "rationale": "The text describes water existing in liquid form for long durations (oceans, lakes, rivers, groundwater for centuries, glaciers for thousands of years), contradicting this statement."}], "id": "q03"}, {"question": "If Dewdrop landed on a large forest canopy instead of a single leaf and was absorbed by the trees, how might she return to the atmosphere without directly evaporating from a surface?", "options": [{"text": "She would remain indefinitely stored within the tree's wood.", "isCorrect": false, "rationale": "Plants use water for growth but also release it, so water doesn't stay indefinitely stored."}, {"text": "She would be released as water vapor through the process of transpiration.", "isCorrect": true, "rationale": "The text defines transpiration as 'the process in which plants release water vapor through tiny openings in their leaves,' providing a specific mechanism for water to return to the atmosphere via plants."}, {"text": "She would seep through the tree roots into an underground river.", "isCorrect": false, "rationale": "While water can become groundwater, it would typically move from the soil to roots, not from inside the tree back into an underground river system this way."}, {"text": "She would be chemically altered by the plant into oxygen.", "isCorrect": false, "rationale": "Plants release oxygen during photosynthesis, but the water itself is released as water vapor, not chemically transformed into oxygen by the process described for water return."}], "id": "q04"}, {"question": "When Dewdrop 'cools down and changes back into a tiny liquid droplet' high in the sky, what water cycle process is she undergoing?", "options": [{"text": "Evaporation", "isCorrect": false, "rationale": "Evaporation is the process of changing from liquid to vapor, driven by heat, not cooling down and changing back into liquid."}, {"text": "Precipitation", "isCorrect": false, "rationale": "Precipitation is when water falls from the atmosphere to Earth's surface, not the formation of liquid droplets in the sky."}, {"text": "Condensation", "isCorrect": true, "rationale": "Condensation is the process where water vapor cools and changes back into liquid water droplets, forming clouds, as described for Dewdrop."}, {"text": "Collection", "isCorrect": false, "rationale": "Collection refers to water gathering in bodies like oceans, lakes, or groundwater, not the formation of droplets in the sky."}], "id": "q05"}, {"question": "Which of Dewdrop's alternative paths could potentially keep her in one state or location for the longest period, possibly 'thousands of years' or 'centuries'?", "options": [{"text": "Flowing in a river towards a lake.", "isCorrect": false, "rationale": "Water in rivers and lakes is constantly moving and subject to evaporation, meaning it would not stay in one place for thousands of years."}, {"text": "Residing in a small puddle on the forest floor.", "isCorrect": false, "rationale": "Puddles are temporary and quickly evaporate or seep into the ground, not lasting for centuries or millennia."}, {"text": "Being frozen in a glacier or stored as groundwater.", "isCorrect": true, "rationale": "The text explicitly states a snowflake in a glacier 'could stay frozen for thousands of years' and groundwater 'might stay underground for weeks, years, or even centuries,' indicating these as the longest-duration paths."}, {"text": "Floating as water vapor in a cloud.", "isCorrect": false, "rationale": "Clouds are transient and constantly forming, moving, and precipitating, so water vapor would not remain in a cloud for extended periods like thousands of years."}], "id": "q06"}, {"question": "Dewdrop's journey from the Pacific Ocean, through the atmosphere, landing as rain, flowing through various bodies of water, and then evaporating from a lake, best illustrates which characteristic of the water cycle?", "options": [{"text": "Water can only exist as liquid in warm climates.", "isCorrect": false, "rationale": "The text mentions water forming glaciers (solid) and vapor (gas), and describes Dewdrop in cold air, showing water exists in various states and climates."}, {"text": "The water cycle is a continuous, closed system where water is constantly recycled.", "isCorrect": true, "rationale": "Dewdrop's story, ending with her ready to 'start the whole cycle again,' and the 'Every Drop Has a Story' section, emphasize that 'water is never used up. It just keeps moving,' indicating a continuous, recycling system."}, {"text": "Water's primary role is to erode landforms.", "isCorrect": false, "rationale": "While water can erode, the primary focus of Dewdrop's story and the chapter is on the movement and transformation of water through the cycle, not its geological impact."}, {"text": "Most water eventually disappears into space.", "isCorrect": false, "rationale": "The text states 'No old water is being lost,' directly contradicting the idea that water disappears into space."}], "id": "q07"}, {"question": "What is the initial event that causes Dewdrop to begin her journey from the Pacific Ocean?", "options": [{"text": "The wind pushing her towards the shore.", "isCorrect": false, "rationale": "The wind pushes the cloud inland later in the journey, but it's not what initiates Dewdrop's departure from the ocean surface."}, {"text": "The cold air causing her to solidify.", "isCorrect": false, "rationale": "Cold air causes condensation later, but Dewdrop starts in the warm ocean and evaporates due to heat."}, {"text": "The warm afternoon sun heating the water's surface.", "isCorrect": true, "rationale": "The story explicitly states: 'The warm afternoon sun beats down on the water's surface. Slowly, Dewdrop heats up... She is evaporating!'"}, {"text": "Her being absorbed by marine plants.", "isCorrect": false, "rationale": "While transpiration involves plants taking up water, this occurs on land, not as the initial event for Dewdrop leaving the ocean."}], "id": "q08"}, {"question": "When Dewdrop becomes 'too heavy to stay in the cloud' and 'falls!', what stage of the water cycle is she performing?", "options": [{"text": "Evaporation", "isCorrect": false, "rationale": "Evaporation is the process of turning into vapor and rising, not falling from a cloud."}, {"text": "Condensation", "isCorrect": false, "rationale": "Condensation is the formation of liquid droplets in the cloud, not the act of falling from it."}, {"text": "Collection", "isCorrect": false, "rationale": "Collection refers to water gathering on the ground or in bodies of water, not the process of falling from the sky."}, {"text": "Precipitation", "isCorrect": true, "rationale": "The text states: 'Dewdrop falls! She is now precipitation — a raindrop tumbling through the sky,' which directly defines this stage."}], "id": "q09"}, {"question": "The 'sciencelife' box describes the journey of water coming from a kitchen faucet. Which of the following is *not* explicitly mentioned as a possible part of its journey before reaching your home?", "options": [{"text": "Evaporation from a faraway ocean.", "isCorrect": false, "rationale": "The text states: 'It may have evaporated from a faraway ocean,' indicating this is a possible part of the journey."}, {"text": "Travel through the sky as a cloud.", "isCorrect": false, "rationale": "The text states: 'traveled through the sky as a cloud,' indicating this is a possible part of the journey."}, {"text": "Being created at a municipal water purification plant.", "isCorrect": true, "rationale": "The text states water is 'cleaned at a water treatment plant,' implying purification of existing water, not its creation. The section 'Water Is a Traveler' also reinforces that 'No new water is being made.'"}, {"text": "Flowing through underground pipes.", "isCorrect": false, "rationale": "The text states: 'flowing through underground pipes to your home,' indicating this is a possible part of the journey."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
