        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

</div>

<script>
var QUESTIONS = [{"question": "According to the initial description of the skeletal system, what would be the most immediate consequence of not having bones, as compared to a 'jellyfish on land'?", "options": [{"text": "The body would be unable to produce new blood cells.", "isCorrect": false, "rationale": "While bone marrow produces blood cells, the introductory description focuses on the physical structure and immediate consequence, not a long-term physiological process. The text compares a boneless body to a 'soft, floppy heap'."}, {"text": "The body would lack a rigid framework, making movement and maintaining shape impossible.", "isCorrect": true, "rationale": "The text states, 'Without bones, you would be a soft, floppy heap on the floor — kind of like a jellyfish on land!' This highlights the loss of framework, shape, and the ability to move or stand, which is the primary role introduced."}, {"text": "The delicate internal organs would be exposed to the outside environment.", "isCorrect": false, "rationale": "While bones do protect organs, the direct comparison to a 'soft, floppy heap' emphasizes the lack of structural integrity and shape, rather than direct exposure of organs."}, {"text": "Muscles would have nothing to pull on, causing them to atrophy rapidly.", "isCorrect": false, "rationale": "This is a consequence of lacking bones for movement, but the introductory analogy primarily focuses on the immediate physical state of being a 'soft, floppy heap' due to lack of shape and support, rather than muscle atrophy."}]}, {"question": "A newborn baby has approximately 270 bones, while an adult human typically has 206. What is the main reason for this difference in bone count?", "options": [{"text": "Adults lose some bones due to natural wear and tear over time.", "isCorrect": false, "rationale": "The text does not state that adults lose bones; rather, it explains a process of fusion."}, {"text": "As a person grows, several smaller bones fuse together to form larger, single bones.", "isCorrect": true, "rationale": "The text explicitly states: 'As you grow, some of those small bones fuse (join) together to form larger bones.'"}, {"text": "Babies have more cartilage, which is counted as bones, but then ossifies into fewer, denser bones.", "isCorrect": false, "rationale": "While cartilage is involved in bone development, the text specifically attributes the change in number to the fusion of existing small bones, not a reclassification of cartilage."}, {"text": "Some bones in babies are replaced by stronger, synthetic materials in adults.", "isCorrect": false, "rationale": "This statement is incorrect and not supported by the text or biological facts."}]}, {"question": "A person suffers a severe spinal cord injury, impacting the main 'highway' of nerves connecting the brain to the rest of the body. Based on the skeletal system's 'Three Big Jobs,' which job was the spine primarily performing before the injury occurred?", "options": [{"text": "Movement, as the spine allows bending and twisting.", "isCorrect": false, "rationale": "While movement is a function of the spine ('lets you bend and twist'), the question specifically refers to the spinal cord's protection. The 'highway of nerves' points to the protective function of the spine over the delicate spinal cord."}, {"text": "Support, as the spine helps hold up the body.", "isCorrect": false, "rationale": "Support is a major job of the spine, but the question's emphasis on the 'spinal cord' and its description as a 'highway of nerves' points more directly to the protective function."}, {"text": "Protection, as the spine shields the delicate spinal cord.", "isCorrect": true, "rationale": "The text states: 'Your spine (backbone) protects the spinal cord, the main “highway” of nerves that connects your brain to the rest of your body.' This directly aligns with the 'Protection' job."}, {"text": "Blood cell production, as the spine contains bone marrow.", "isCorrect": false, "rationale": "Bone marrow produces blood cells, but this is not listed as one of the 'Three Big Jobs' of the skeletal system overall, nor is it the primary function of the spine highlighted in the context of the spinal cord."}]}, {"question": "Which statement accurately describes a major bone and its specific function as detailed in the 'A Look at Your Major Bones' section?", "options": [{"text": "The Tibia is the longest and strongest bone, found in the upper leg.", "isCorrect": false, "rationale": "The Tibia is the shinbone in the lower leg. The Femur is the longest and strongest bone in the upper leg."}, {"text": "The Pelvis is the large bone at your hips that supports your upper body and connects to your legs.", "isCorrect": true, "rationale": "The text states: 'Pelvis — The large bone at your hips that supports your upper body and connects to your legs.'"}, {"text": "The Ribs are a column of 33 small bones called vertebrae that protect the spinal cord.", "isCorrect": false, "rationale": "This describes the Spine (backbone), not the Ribs. Ribs form a cage around the heart and lungs."}, {"text": "The Skull is a single, rigid bone that supports the brain.", "isCorrect": false, "rationale": "The text notes the Skull 'is actually made of several bones fused together,' and its primary function is protection, not solely support."}]}, {"question": "A dancer performs a complex move involving rotating their leg at the hip in a wide circle. Which type of joint primarily allows this range of motion?", "options": [{"text": "A hinge joint, similar to the knee, enabling bending and straightening.", "isCorrect": false, "rationale": "Hinge joints only allow movement in one plane (bending and straightening), not wide circular rotation."}, {"text": "A fixed joint, providing stability without movement.", "isCorrect": false, "rationale": "Fixed joints allow no movement, which would prevent the dancer's action."}, {"text": "A ball-and-socket joint, like the shoulder, allowing movement in many directions.", "isCorrect": true, "rationale": "The text explains: 'Ball-and-socket joints let you move in many directions — forward, backward, and around in a circle. Your shoulders and hips are ball-and-socket joints.' The hip joint enables this type of rotational movement."}, {"text": "A pivot joint, allowing limited side-to-side rotation.", "isCorrect": false, "rationale": "Pivot joints are not discussed in the text, and ball-and-socket joints offer a much wider range of motion than implied by 'limited side-to-side rotation.'"}]}, {"question": "The text emphasizes that 'Bones Are Alive!' Which of the following details best supports this claim?", "options": [{"text": "Bones are hard and rigid, providing the body with shape and support.", "isCorrect": false, "rationale": "While true, hardness and rigidity describe structural properties, not necessarily aliveness. The 'Three Big Jobs' section covers this."}, {"text": "Bones work with muscles to help the body move like levers.", "isCorrect": false, "rationale": "This describes the mechanical function of bones in movement, but not their biological characteristic of being 'alive.'"}, {"text": "Bones contain blood vessels, bone marrow for blood cell production, and are constantly rebuilding themselves.", "isCorrect": true, "rationale": "The text explicitly states: 'Inside your bones, blood vessels carry nutrients and oxygen. A soft material called bone marrow fills the center of many bones... Your bones are also constantly rebuilding themselves, replacing old bone with new bone.' These are all characteristics of living tissue."}, {"text": "Bones fuse together as a person grows from infancy to adulthood.", "isCorrect": false, "rationale": "This describes a developmental process involving bones, but it's not the primary evidence presented for bones being 'alive' in their ongoing biological functions as living tissue."}]}, {"question": "What critical function does bone marrow perform within the skeletal system?", "options": [{"text": "It stores excess calcium and other minerals.", "isCorrect": false, "rationale": "While bones do store minerals, the text highlights a different 'incredibly important job' for bone marrow specifically."}, {"text": "It makes new blood cells for the body.", "isCorrect": true, "rationale": "The text clearly states: 'Bone marrow has an incredibly important job — it makes new blood cells for your body.'"}, {"text": "It acts as a flexible cushion between bones at joints.", "isCorrect": false, "rationale": "This function is performed by cartilage and synovial fluid, not bone marrow."}, {"text": "It helps in the transmission of sound vibrations in the ear.", "isCorrect": false, "rationale": "This is the function of the stirrup bone, not bone marrow."}]}, {"question": "A student is asked to locate the longest and smallest bones in a human skeleton model. Based on the information provided, which bones should they identify?", "options": [{"text": "The skull bones as the smallest and the spine as the longest.", "isCorrect": false, "rationale": "The skull is composed of fused bones, and the spine is a column, but neither holds the record for smallest or longest overall bone."}, {"text": "The stirrup bone (in the ear) as the smallest and the femur (thigh bone) as the longest.", "isCorrect": true, "rationale": "The text states: 'The longest bone in your body is the femur, the big bone in your upper leg. The smallest bone is the stirrup bone deep inside your ear.'"}, {"text": "The ribs as the smallest and the pelvis as the longest.", "isCorrect": false, "rationale": "Ribs are not the smallest, and the pelvis is a large, complex bone but not the longest single bone."}, {"text": "A vertebra (in the spine) as the smallest and the tibia (shinbone) as the longest.", "isCorrect": false, "rationale": "A single vertebra is small but not the smallest, and the tibia is not the longest bone."}]}, {"question": "Why does the text recommend eating foods rich in calcium, such as milk and leafy green vegetables?", "options": [{"text": "To provide energy for muscles to pull on bones, facilitating movement.", "isCorrect": false, "rationale": "While healthy eating supports overall energy, the text specifically links calcium to bone strength, not direct muscle energy for movement."}, {"text": "To ensure bones remain healthy and strong by providing essential nutrients.", "isCorrect": true, "rationale": "The text explicitly states: 'Eating foods rich in calcium — like milk, cheese, yogurt, and leafy green vegetables — helps keep your bones healthy and strong.'"}, {"text": "To lubricate joints, allowing for smoother and more flexible motion.", "isCorrect": false, "rationale": "Calcium's role is not described as joint lubrication. Joint lubrication involves other biological mechanisms."}, {"text": "To increase the production of bone marrow, which then produces more blood cells.", "isCorrect": false, "rationale": "Calcium is for bone strength, not directly linked to increasing bone marrow production or blood cell count in the text."}]}, {"question": "The text describes the skull as 'like a helmet for your brain' and the skeleton as the 'frame of a building.' What overarching function of the skeletal system do these two analogies most effectively illustrate?", "options": [{"text": "Movement, as both helmets and building frames are designed to allow flexibility.", "isCorrect": false, "rationale": "Neither a helmet nor a building frame's primary function is flexibility; in fact, they provide rigidity. This analogy does not relate to movement."}, {"text": "Blood cell production, as both protect vital internal processes.", "isCorrect": false, "rationale": "While the skeleton helps with blood cell production, the analogies specifically refer to external structures (helmet, frame) that provide physical safeguarding or structure, not internal processes like blood cell production."}, {"text": "Support and Protection, by providing shape to the body and safeguarding delicate organs.", "isCorrect": true, "rationale": "The 'frame of a building' directly illustrates 'Support' (giving shape and holding up), and 'a helmet for your brain' directly illustrates 'Protection' (safeguarding delicate organs). These are two of the 'Three Big Jobs' identified in the text."}, {"text": "Nutrient storage, as both can contain important elements.", "isCorrect": false, "rationale": "The analogies do not relate to nutrient storage. The primary purpose of a helmet and a building frame is structural integrity and safety."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
