<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 24, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why do you typically see a lightning flash before you hear the thunder?", "options": [{"text": "Lightning is produced higher in the sky, so its light reaches us faster.", "isCorrect": false, "rationale": "The altitude of lightning does not significantly affect the arrival time of light compared to sound over typical observation distances, and both light and sound are produced simultaneously."}, {"text": "Light travels significantly faster than sound.", "isCorrect": true, "rationale": "This is the core concept explained in the text. Light travels at 300,000 km/s, while sound in air travels at about 340 m/s, causing a noticeable delay for sound over distance."}, {"text": "Thunder is a delayed reaction caused by the friction of air after the lightning strike.", "isCorrect": false, "rationale": "Thunder is the sound produced at the same instant as the lightning flash, not a delayed reaction. It's caused by the rapid expansion of air along the lightning bolt."}, {"text": "Our eyes are more sensitive to rapid changes than our ears.", "isCorrect": false, "rationale": "While our sensory perception plays a role in how we interpret events, the fundamental reason for the delay is the vastly different speeds at which light and sound propagate through the air."}], "id": "q01"}, {"question": "According to the text, approximately how fast does light travel?", "options": [{"text": "About 340 meters per second", "isCorrect": false, "rationale": "340 meters per second is the approximate speed of sound in air, not light."}, {"text": "About 1,500 meters per second", "isCorrect": false, "rationale": "1,500 meters per second is the approximate speed of sound in water, not light."}, {"text": "About 5,000 meters per second", "isCorrect": false, "rationale": "5,000 meters per second is the approximate speed of sound in steel, not light."}, {"text": "About 300,000 kilometers per second", "isCorrect": true, "rationale": "The text states that light travels at about 300,000 kilometers per second, making it the fastest thing in the universe."}], "id": "q02"}, {"question": "Which material allows sound to travel fastest, and why?", "options": [{"text": "Air, because its particles are spread far apart, allowing sound to move freely.", "isCorrect": false, "rationale": "Sound travels slowest in air because its particles are far apart, making it take longer for vibrations to pass between them."}, {"text": "Water, because it is a liquid and denser than air, but less dense than solids.", "isCorrect": false, "rationale": "While sound travels faster in water than in air, it travels even faster in solids. The primary reason for speed variation is particle packing, not just general density."}, {"text": "Steel, because its particles are packed closer together, allowing vibrations to pass quickly.", "isCorrect": true, "rationale": "The text explains that in solids like steel, particles are packed closer together, enabling vibrations to transfer from one particle to the next more quickly, resulting in faster sound travel."}, {"text": "A vacuum, because there is no resistance to slow the sound waves down.", "isCorrect": false, "rationale": "A vacuum has no particles, and sound requires a medium (particles) to travel. Therefore, sound cannot travel in a vacuum."}], "id": "q03"}, {"question": "You see a lightning flash and count 12 seconds before you hear the thunder. Based on the rule of thumb provided, how far away is the thunderstorm?", "options": [{"text": "4 kilometers", "isCorrect": true, "rationale": "The rule of thumb states to divide the number of seconds by 3 to get the distance in kilometers. 12 seconds / 3 = 4 kilometers."}, {"text": "6 kilometers", "isCorrect": false, "rationale": "This calculation would result from dividing by 2, which is not the rule provided in the text."}, {"text": "9 kilometers", "isCorrect": false, "rationale": "This would be the result if each second represented 0.75 km, which is incorrect based on the text's rule."}, {"text": "12 kilometers", "isCorrect": false, "rationale": "This would imply that sound travels 1 km per second, which contradicts the text's explanation that sound takes about 3 seconds to travel 1 km."}], "id": "q04"}, {"question": "Which of the following scenarios best demonstrates the principle that sound takes time to travel?", "options": [{"text": "Hearing your name clearly when someone whispers it right next to you.", "isCorrect": false, "rationale": "This demonstrates sound transmission and clarity over a short distance, but not the noticeable delay due to its finite travel time over a significant distance."}, {"text": "Seeing the batter hit a baseball before hearing the crack of the bat at a distant game.", "isCorrect": true, "rationale": "This is a direct example given in the text illustrating the light-sound speed difference, where the sound's slower speed causes a delay in its arrival compared to the light of the event."}, {"text": "Feeling vibrations through the ground when a heavy truck drives by.", "isCorrect": false, "rationale": "This demonstrates sound traveling through a solid medium (the ground) but doesn't specifically highlight the time delay of sound travel over a significant distance."}, {"text": "The change in pitch of a siren as an ambulance passes you.", "isCorrect": false, "rationale": "This phenomenon is related to the Doppler effect, which describes changes in frequency due to relative motion, not primarily the finite speed of sound causing a delay in perception."}], "id": "q05"}, {"question": "Ibn al-Haytham, 'the father of optics,' made a groundbreaking discovery about human vision. What was it?", "options": [{"text": "He discovered that the eye itself emits invisible beams to detect objects, similar to a flashlight.", "isCorrect": false, "rationale": "This was the common belief before Ibn al-Haytham, which he proved incorrect."}, {"text": "He proved that we see because light enters our eyes after reflecting off objects.", "isCorrect": true, "rationale": "The text states that Ibn al-Haytham proved this idea through careful experiments, overturning the previous belief and establishing the correct understanding of vision."}, {"text": "He invented the first telescope, allowing humans to see distant objects clearly.", "isCorrect": false, "rationale": "While he was a key figure in optics, the invention of the telescope is attributed to later scientists."}, {"text": "He was the first to accurately measure the exact speed of light.", "isCorrect": false, "rationale": "Measuring the speed of light accurately came much later in scientific history. Ibn al-Haytham focused on the nature of light and vision."}], "id": "q06"}, {"question": "If an astronaut were floating a few meters away from a friend outside the International Space Station, why would they be unable to have a normal spoken conversation?", "options": [{"text": "The extreme temperatures in space would distort sound waves.", "isCorrect": false, "rationale": "While temperatures in space are extreme, the primary reason for the inability to hear is the lack of a medium for sound, not temperature distortion."}, {"text": "Sound cannot travel in the vacuum of space because there are no particles to transmit vibrations.", "isCorrect": true, "rationale": "Sound requires a medium (like air, water, or solid) to propagate. Space is largely a vacuum, meaning there are virtually no particles for sound vibrations to travel through."}, {"text": "The strong magnetic fields around the Earth block sound transmission.", "isCorrect": false, "rationale": "Magnetic fields do not block sound waves; sound is a mechanical wave, not an electromagnetic one."}, {"text": "Their voices would be too muffled by their helmets to be heard.", "isCorrect": false, "rationale": "While helmets affect sound inside, the fundamental issue outside in space is the absence of a medium for sound to travel between the helmets."}], "id": "q07"}, {"question": "Which example from the text best illustrates that sound can reflect off surfaces?", "options": [{"text": "Seeing the flash of a firework before hearing its boom.", "isCorrect": false, "rationale": "This example highlights the difference in speed between light and sound, not sound reflection."}, {"text": "Hearing an echo when you shout towards a cliff.", "isCorrect": true, "rationale": "The text defines an echo as 'a reflected sound' that happens when sound bounces off a hard surface and returns to your ears, directly illustrating sound reflection."}, {"text": "The increasing volume of a train horn as it approaches.", "isCorrect": false, "rationale": "This relates to sound intensity and the Doppler effect, not reflection."}, {"text": "The ability to hear conversations in an adjacent room through a wall.", "isCorrect": false, "rationale": "This demonstrates sound transmission through a solid, not reflection back to the source."}], "id": "q08"}, {"question": "According to the 'Misconception Alert' in the teacher's notes, what is the actual cause of thunder?", "options": [{"text": "Clouds bumping into each other during a storm.", "isCorrect": false, "rationale": "This is identified as a common misconception about thunder in the text."}, {"text": "The rapid expansion of extremely hot air along a lightning bolt.", "isCorrect": true, "rationale": "The text clarifies that thunder is the sound produced by the extremely hot air along the lightning bolt expanding rapidly."}, {"text": "The sound produced by strong winds colliding during a storm.", "isCorrect": false, "rationale": "While strong winds accompany storms, they are not the cause of thunder."}, {"text": "The ground vibrating from the force of the lightning strike.", "isCorrect": false, "rationale": "Ground vibrations can occur, but the primary cause of the audible thunder sound is atmospheric, specifically related to the lightning channel."}], "id": "q09"}, {"question": "Based on the information provided, which statement most accurately describes the relative speeds of light and sound?", "options": [{"text": "Sound is consistently faster than light in any medium.", "isCorrect": false, "rationale": "The entire section emphasizes that light is 'incredibly faster' than sound, making this statement incorrect."}, {"text": "Light is much faster than sound, and sound speed varies significantly depending on the medium.", "isCorrect": true, "rationale": "The text clearly states light is the 'fastest thing in the universe' and 'incredibly faster than sound', and provides specific examples of how sound speed changes dramatically in air, water, and steel."}, {"text": "Both light and sound travel at roughly the same speed, but light is perceived instantly by the human eye.", "isCorrect": false, "rationale": "This contradicts the fundamental premise of the section, which highlights the vast difference in their actual travel speeds."}, {"text": "Light and sound both travel fastest in a vacuum and slowest in dense solids.", "isCorrect": false, "rationale": "Light travels fastest in a vacuum, but sound cannot travel in a vacuum at all. Sound generally travels fastest in dense solids, not slowest."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
