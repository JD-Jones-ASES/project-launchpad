<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following statements accurately describes a living thing according to the provided text?", "options": [{"text": "It was once alive but is no longer.", "isCorrect": false, "rationale": "This describes an 'once-living' thing, not a currently living one."}, {"text": "It has all five characteristics of life right now.", "isCorrect": true, "rationale": "The text explicitly states, 'A living thing has all five characteristics of life right now.'"}, {"text": "It has never been alive and never will be.", "isCorrect": false, "rationale": "This defines a 'nonliving' thing."}, {"text": "It is made from parts of something that was once alive.", "isCorrect": false, "rationale": "While true for some living things (e.g., eating), this is not the fundamental definition of a living thing itself, and it also applies to 'once-living' objects."}], "id": "q01"}, {"question": "According to the text, what is the defining characteristic of a nonliving thing?", "options": [{"text": "It was alive in the past but is not anymore.", "isCorrect": false, "rationale": "This describes an 'once-living' thing."}, {"text": "It does not grow, reproduce, or need energy, and never did.", "isCorrect": true, "rationale": "The text states, 'Nonliving things do not grow, reproduce, need energy, respond, or have cells. They never did, and they never will.'"}, {"text": "It is made of components from a living organism.", "isCorrect": false, "rationale": "This describes some 'once-living' things (like a wooden table) or food, but not 'nonliving' things."}, {"text": "It currently possesses some, but not all, characteristics of life.", "isCorrect": false, "rationale": "The text implies that if something has any characteristics of life, it would be considered living or once-living. Nonliving things never had any."}], "id": "q02"}, {"question": "What is the key question one should ask to distinguish between a nonliving thing and an once-living thing?", "options": [{"text": "Does it currently show any signs of life?", "isCorrect": false, "rationale": "Both nonliving and once-living things do not currently show signs of life, so this question doesn't distinguish between them."}, {"text": "Is it composed of organic materials?", "isCorrect": false, "rationale": "While many once-living things are organic, some nonliving things can contain organic compounds or be made of inorganic materials like rocks, so this isn't the primary distinguishing factor emphasized."}, {"text": "Was it ever alive?", "isCorrect": true, "rationale": "The text explicitly states, 'The key question is: Was it ever alive? If yes, but it is not alive now, it is once-living. If it was never alive at all, it is nonliving.'"}, {"text": "Can it decompose over time?", "isCorrect": false, "rationale": "Many once-living things decompose, but decomposition is a process that can involve living organisms and doesn't define the initial state of 'nonliving' vs. 'once-living.'"}], "id": "q03"}, {"question": "Fossil fuels like coal, oil, and natural gas are categorized as 'once-living' things. Why?", "options": [{"text": "They are mined from the earth, which is not alive.", "isCorrect": false, "rationale": "While they are mined from the earth, their origin is what makes them once-living, not the mining process."}, {"text": "They are used by living things to produce energy.", "isCorrect": false, "rationale": "Their use by living things doesn't define their classification as once-living; it's about their origin."}, {"text": "They formed from organisms that were alive millions of years ago.", "isCorrect": true, "rationale": "The text states, 'Fossil fuels (coal, oil, natural gas) formed from organisms that lived millions of years ago,' which fits the definition of once-living."}, {"text": "They do not possess any characteristics of life now.", "isCorrect": false, "rationale": "This is true, but it applies to both nonliving and once-living things. The 'why' they are once-living is their past state."}], "id": "q04"}, {"question": "A leather shoe is best classified as an 'once-living' thing. Why?", "options": [{"text": "It is a manufactured product and therefore nonliving.", "isCorrect": false, "rationale": "Being manufactured doesn't automatically make something nonliving if its raw material was once alive (e.g., a wooden table)."}, {"text": "Leather is a natural material that can decay over time.", "isCorrect": false, "rationale": "While true, decay is a characteristic often associated with once-living things but not the primary reason for classification. The origin is key."}, {"text": "It was made from an animal's hide, and the animal was once alive.", "isCorrect": true, "rationale": "The text implies this principle with examples like a feather from a bird. A leather shoe comes from an animal (e.g., cow) that was once a living organism."}, {"text": "It does not move or reproduce on its own.", "isCorrect": false, "rationale": "This is true for both nonliving and once-living objects. It doesn't explain why it's 'once-living' specifically."}], "id": "q05"}, {"question": "A fallen leaf and a rock are both inanimate, but one is once-living and the other is nonliving. What is the fundamental difference in their classification according to the text?", "options": [{"text": "The leaf will eventually decompose, while the rock will not.", "isCorrect": false, "rationale": "While generally true, decomposition is a process, not the defining characteristic for initial classification between once-living and nonliving based on the text's core principle."}, {"text": "The leaf was once part of a living tree, whereas the rock was never alive.", "isCorrect": true, "rationale": "The text directly states, 'A fallen leaf was part of a living tree, but once it falls and dries up, it is no longer alive,' classifying it as once-living. It also states, 'A rock has never been alive,' making it nonliving. This highlights the 'was it ever alive?' distinction."}, {"text": "The rock is a natural formation, while the leaf is an organic material.", "isCorrect": false, "rationale": "Both are natural formations. The distinction isn't just about 'organic' versus 'inorganic' but about the history of being alive."}, {"text": "The leaf is lighter than the rock.", "isCorrect": false, "rationale": "Physical properties like weight are irrelevant to the biological classification in the text."}], "id": "q06"}, {"question": "A student's lunch consists of a cheese sandwich with lettuce and a glass of water. According to the text, how many 'once-living' components are likely in this lunch?", "options": [{"text": "One (the lettuce).", "isCorrect": false, "rationale": "This misses other once-living components mentioned or implied."}, {"text": "Two (the bread and the lettuce).", "isCorrect": false, "rationale": "This misses the cheese, which comes from a living cow."}, {"text": "Three (the bread, the cheese, and the lettuce).", "isCorrect": true, "rationale": "The 'sciencelife' box states, 'A sandwich has bread (from wheat — once-living), maybe cheese (from milk — from a living cow), lettuce (once part of a living plant).' Water is nonliving."}, {"text": "Four (the bread, the cheese, the lettuce, and the water).", "isCorrect": false, "rationale": "Water is explicitly stated as a nonliving thing."}], "id": "q07"}, {"question": "A seashell is often found on a beach, appearing inanimate. Based on the text, why is it classified as 'once-living' rather than 'nonliving'?", "options": [{"text": "Seashells are made of calcium carbonate, an organic compound.", "isCorrect": false, "rationale": "While calcium carbonate is a component, its organic nature isn't the primary reason for classification. The origin is key."}, {"text": "They are found in nature, similar to rocks.", "isCorrect": false, "rationale": "Being found in nature does not distinguish between nonliving (rock) and once-living (seashell)."}, {"text": "The shell was created by a sea creature that was once alive.", "isCorrect": true, "rationale": "The text specifically lists, 'A seashell was made by a living sea creature, but the creature is gone and the shell remains,' making it once-living."}, {"text": "Seashells can sometimes be home to new living creatures.", "isCorrect": false, "rationale": "While true, this refers to the current use of the shell, not its origin or classification."}], "id": "q08"}, {"question": "In a classroom sorting activity, a teacher provides a potted plant, a coin, and a dried leaf. Which of these objects would the students classify as 'living'?", "options": [{"text": "Only the coin.", "isCorrect": false, "rationale": "A coin is a manufactured metal object and is nonliving."}, {"text": "Only the dried leaf.", "isCorrect": false, "rationale": "The text states 'a fallen leaf... is no longer alive' making it once-living."}, {"text": "Only the potted plant.", "isCorrect": true, "rationale": "The text lists 'flower in a pot' (analogous to potted plant) as living, as it possesses all five characteristics of life right now."}, {"text": "The potted plant and the dried leaf.", "isCorrect": false, "rationale": "The dried leaf is once-living, not currently living."}], "id": "q09"}, {"question": "Which statement best captures the main principle for classifying something as 'once-living' instead of 'nonliving'?", "options": [{"text": "If an object is natural and not man-made, it must be either living or once-living.", "isCorrect": false, "rationale": "This is incorrect because rocks and water are natural but nonliving."}, {"text": "The crucial factor is whether the object currently shows any of the five characteristics of life.", "isCorrect": false, "rationale": "Both once-living and nonliving things do not currently show characteristics of life. This factor distinguishes living from nonliving/once-living, but not between nonliving and once-living."}, {"text": "The key determinant is whether the object originated from something that was alive at any point in its history.", "isCorrect": true, "rationale": "The text emphasizes, 'The key question is: Was it ever alive?' to differentiate between once-living (yes, in the past) and nonliving (never)."}, {"text": "'Once-living' items are generally those that decompose, while 'nonliving' items do not.", "isCorrect": false, "rationale": "While many once-living things decompose, this is a consequence of their origin, not the primary distinguishing principle in the text. Some nonliving things can also break down or weather."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
