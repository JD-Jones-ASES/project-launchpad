<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 23, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following characteristics is typically associated with a base?", "options": [{"text": "Tastes sour", "isCorrect": false, "rationale": "Sour taste is a characteristic of acids, not bases. The text states acids taste sour."}, {"text": "Has a pH below 7", "isCorrect": false, "rationale": "A pH below 7 indicates an acid. Bases have a pH above 7."}, {"text": "Dissolves some metals", "isCorrect": false, "rationale": "The ability to dissolve some metals is a characteristic of acids."}, {"text": "Feels slippery to the touch", "isCorrect": true, "rationale": "The text explicitly states that bases feel slippery, using soap as an everyday example."}]}, {"question": "A student is testing various household substances. Which of the following, if safely tasted (knowing it's safe), would most likely confirm it is an acid?", "options": [{"text": "Baking soda dissolved in water", "isCorrect": false, "rationale": "Baking soda dissolved in water is described as a mild base in the text."}, {"text": "Antacid tablets", "isCorrect": false, "rationale": "Antacid tablets are stated to contain a base to neutralize stomach acid."}, {"text": "Lemon juice", "isCorrect": true, "rationale": "The text begins by describing lemon juice's sour taste as coming from an acid and lists it as an everyday example of an acid due to citric acid."}, {"text": "Soap", "isCorrect": false, "rationale": "Soap is explicitly mentioned as a mild base that feels slippery."}]}, {"question": "If you observe a substance that causes fizzing when mixed with baking soda and has a tangy taste, what can you infer about this substance?", "options": [{"text": "It is a strong base with a pH above 10.", "isCorrect": false, "rationale": "Fizzing with baking soda (a base) suggests it's an acid undergoing neutralization, not a strong base. Tangy taste also indicates an acid."}, {"text": "It is a neutral substance like pure water.", "isCorrect": false, "rationale": "Neutral substances do not typically react with a base like baking soda to produce fizzing, and they are not described as tangy."}, {"text": "It is an acid, likely with a pH below 7.", "isCorrect": true, "rationale": "The text mentions that mixing vinegar (an acid) and baking soda (a base) causes fizzing. A tangy taste is also characteristic of acids. Acids have a pH below 7."}, {"text": "It is a base, designed to neutralize other acids.", "isCorrect": false, "rationale": "The substance reacts *with* baking soda (a base), implying it is the opposite – an acid. Bases taste bitter, not tangy."}]}, {"question": "Based on the pH scale, which of the following substances would be considered the strongest acid?", "options": [{"text": "Substance A with a pH of 7", "isCorrect": false, "rationale": "A pH of 7 indicates a neutral substance, which is neither an acid nor a base."}, {"text": "Substance B with a pH of 9", "isCorrect": false, "rationale": "A pH of 9 indicates a base, not an acid."}, {"text": "Substance C with a pH of 2", "isCorrect": true, "rationale": "The text states that for acids (pH 0-6), the lower the number, the stronger the acid. Among the options, pH 2 is the lowest acidic pH."}, {"text": "Substance D with a pH of 6", "isCorrect": false, "rationale": "A pH of 6 indicates an acid, but it is weaker than an acid with a pH of 2."}]}, {"question": "Pure water is described as having a pH of 7. What does this mean in terms of its chemical properties?", "options": [{"text": "It is a strong acid, capable of dissolving many substances.", "isCorrect": false, "rationale": "A pH of 7 indicates a neutral substance, not a strong acid. Strong acids have a very low pH (e.g., 0-2)."}, {"text": "It is a mild base, useful for cleaning.", "isCorrect": false, "rationale": "A pH of 7 indicates a neutral substance, not a base. Bases have a pH above 7."}, {"text": "It is neither an acid nor a base.", "isCorrect": true, "rationale": "The text explicitly defines a substance with a pH of 7 as neutral, meaning it is neither an acid nor a base."}, {"text": "It is a weak acid, but not strong enough to be harmful.", "isCorrect": false, "rationale": "A pH of 7 is neutral, not a weak acid. Weak acids would have a pH slightly below 7 (e.g., 5-6)."}]}, {"question": "Which statement accurately describes what happens during a neutralization reaction?", "options": [{"text": "An acid becomes stronger, and a base becomes weaker.", "isCorrect": false, "rationale": "During neutralization, both the acid becomes less acidic and the base becomes less basic, moving towards a neutral state. Neither becomes stronger."}, {"text": "A base becomes stronger, and an acid becomes weaker.", "isCorrect": false, "rationale": "During neutralization, both the acid and base become less potent, not stronger."}, {"text": "An acid and a base combine to produce a substance closer to neutral.", "isCorrect": true, "rationale": "The text defines neutralization as a chemical reaction where an acid and a base combine to produce a substance that is closer to neutral (pH 7), effectively canceling each other out."}, {"text": "A substance's pH becomes extremely low (closer to 0) as it reacts.", "isCorrect": false, "rationale": "This would indicate it's becoming a stronger acid, not moving towards neutral, which is the opposite of neutralization."}]}, {"question": "A person has an upset stomach due to excess stomach acid. According to the text, what common household item could provide relief by acting as a base?", "options": [{"text": "Vinegar", "isCorrect": false, "rationale": "Vinegar contains acetic acid, which would worsen a stomach upset caused by excess acid, not relieve it."}, {"text": "Orange juice", "isCorrect": false, "rationale": "Orange juice contains citric acid and would increase the acidity in the stomach."}, {"text": "Baking soda dissolved in water", "isCorrect": true, "rationale": "The text states that baking soda, when dissolved in water, is a mild base and that antacid tablets (which contain bases) are used to neutralize stomach acid. Baking soda can serve a similar function."}, {"text": "Lemon juice", "isCorrect": false, "rationale": "Lemon juice contains citric acid and would add more acid to an already upset stomach."}]}, {"question": "Considering the 'thinkaboutit' section, why might applying a baking soda paste help alleviate the pain of a bee sting?", "options": [{"text": "Baking soda is a strong acid that can burn away the bee venom.", "isCorrect": false, "rationale": "Baking soda is a base, not a strong acid, and its purpose is not to burn away venom but to neutralize it."}, {"text": "Bee stings are basic, and baking soda (an acid) neutralizes them.", "isCorrect": false, "rationale": "The text states bee stings are slightly acidic, and baking soda is a base, making this statement incorrect about their natures."}, {"text": "Baking soda (a base) neutralizes the acidic compounds in the bee sting.", "isCorrect": true, "rationale": "The 'thinkaboutit' section explicitly states bee stings are slightly acidic and asks why baking soda (a base) might help, hinting at neutralization. The text confirms bases neutralize acids."}, {"text": "The slippery feel of baking soda helps to lubricate the sting area.", "isCorrect": false, "rationale": "While bases feel slippery, this property does not explain pain relief from a bee sting. The relief comes from the chemical reaction of neutralization."}]}, {"question": "What is the most crucial safety advice provided in the section regarding acids and bases?", "options": [{"text": "Always mix acids and bases to make them safer.", "isCorrect": false, "rationale": "While neutralization occurs, mixing unknown or strong acids and bases can be dangerous and is not the primary safety advice. The text cautions against tasting/touching unknown chemicals."}, {"text": "Taste all household chemicals to identify if they are an acid or base.", "isCorrect": false, "rationale": "The text explicitly states, 'never taste or touch an unknown chemical' because many strong acids and bases can burn skin."}, {"text": "Wear safety goggles and follow teacher's instructions when working with chemicals.", "isCorrect": true, "rationale": "The safety note emphasizes always wearing safety goggles and following teacher's instructions when working with chemicals in science class, alongside the warning against tasting/touching unknowns."}, {"text": "Only use acids and bases that have a pH close to 7.", "isCorrect": false, "rationale": "While less extreme pH values are generally safer, this is not the most crucial or universally applicable safety advice given. Many useful strong acids and bases exist and require proper handling."}]}, {"question": "A scientist observes two unknown solutions. Solution X has a pH of 13, and Solution Y has a pH of 9. Which conclusion about these solutions is correct?", "options": [{"text": "Solution X is a stronger acid than Solution Y.", "isCorrect": false, "rationale": "Both solutions have a pH above 7, meaning they are bases, not acids. Higher pH indicates a stronger base, not acid."}, {"text": "Solution Y is a stronger base than Solution X.", "isCorrect": false, "rationale": "For bases (pH 8-14), the higher the number, the stronger the base. Therefore, Solution X (pH 13) is a stronger base than Solution Y (pH 9)."}, {"text": "Solution X is a stronger base than Solution Y.", "isCorrect": true, "rationale": "The text states that for bases (pH 8-14), 'The higher the number, the stronger the base.' A pH of 13 is higher than a pH of 9, making Solution X the stronger base."}, {"text": "Both solutions are neutral, similar to pure water.", "isCorrect": false, "rationale": "Neutral substances have a pH of 7. Both pH 13 and pH 9 are above 7, indicating they are basic, not neutral."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
