<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 0, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary reason scientists use special tools like rulers and thermometers instead of just relying on their natural senses?", "options": [{"text": "To make scientific experiments seem more complex and professional.", "isCorrect": false, "rationale": "The primary goal of using tools is not to increase complexity or professionalism, but to improve accuracy and reliability in scientific investigation."}, {"text": "To perform measurements and observations with greater accuracy.", "isCorrect": true, "rationale": "The text explicitly states that scientists use special tools 'to measure, observe, and record things more accurately than they could with their senses alone.'"}, {"text": "To avoid any physical contact with the objects being studied.", "isCorrect": false, "rationale": "While some tools do provide separation, it is not the universal primary reason for all essential science tools listed (e.g., using a ruler still involves contact)."}, {"text": "To complete experiments much faster than manual methods.", "isCorrect": false, "rationale": "While some tools might expedite certain tasks, the main benefit emphasized is accuracy, not necessarily speed."}]}, {"question": "Which scientific tool is specifically designed to measure the amount of matter an object contains, and what is its standard metric unit?", "options": [{"text": "Graduated cylinder; milliliters (mL)", "isCorrect": false, "rationale": "A graduated cylinder measures volume (how much space a liquid takes up) in milliliters, not mass (amount of matter)."}, {"text": "Balance; grams (g)", "isCorrect": true, "rationale": "The text states: 'Balance — Measures mass (the amount of matter in an object). Scientists measure mass in grams (g).'"}, {"text": "Ruler; centimeters (cm)", "isCorrect": false, "rationale": "A ruler measures length in centimeters, not mass."}, {"text": "Thermometer; degrees Celsius (°C)", "isCorrect": false, "rationale": "A thermometer measures temperature in degrees Celsius, not mass."}]}, {"question": "Imagine you need to determine the temperature at which a new chemical compound melts. Which tool and corresponding unit would you use?", "options": [{"text": "Stopwatch; seconds (s)", "isCorrect": false, "rationale": "A stopwatch measures time, not temperature."}, {"text": "Balance; grams (g)", "isCorrect": false, "rationale": "A balance measures mass, not temperature."}, {"text": "Thermometer; degrees Celsius (°C)", "isCorrect": true, "rationale": "The text identifies the thermometer as the tool for measuring temperature, and degrees Celsius as the unit used by scientists."}, {"text": "Graduated cylinder; milliliters (mL)", "isCorrect": false, "rationale": "A graduated cylinder measures volume, not temperature."}]}, {"question": "The textbook emphasizes that scientists around the world use the metric system. What is the primary benefit of this global standardization?", "options": [{"text": "It makes scientific research exclusive to countries that use the metric system.", "isCorrect": false, "rationale": "The goal of standardization is inclusivity and clarity, not exclusivity."}, {"text": "Metric units are inherently more accurate than other measurement systems.", "isCorrect": false, "rationale": "Accuracy is determined by the precision of the tool and proper technique, not the measurement system itself. The benefit lies in understanding."}, {"text": "It ensures that scientists can easily understand and share their measurement data with peers internationally.", "isCorrect": true, "rationale": "The text states: 'Scientists around the world use the metric system so they can understand each other's measurements.' This facilitates global communication and collaboration."}, {"text": "Metric tools are universally cheaper and easier to manufacture.", "isCorrect": false, "rationale": "The text does not mention cost or ease of manufacturing as the primary benefit of the metric system's adoption."}]}, {"question": "A student needs to precisely measure the length of a small insect's leg and then observe its intricate details. Which two tools would be most appropriate for this task?", "options": [{"text": "Ruler and Magnifying glass", "isCorrect": true, "rationale": "A ruler measures length ('how long or wide something is'), and a magnifying glass 'makes small things look bigger so you can see details,' which would be perfect for an insect's leg."}, {"text": "Balance and Thermometer", "isCorrect": false, "rationale": "A balance measures mass and a thermometer measures temperature, neither of which is relevant to measuring leg length or observing details."}, {"text": "Graduated cylinder and Stopwatch", "isCorrect": false, "rationale": "A graduated cylinder measures liquid volume and a stopwatch measures time, neither is relevant to the task described."}, {"text": "Thermometer and Magnifying glass", "isCorrect": false, "rationale": "While a magnifying glass is useful for details, a thermometer is for temperature, not length."}]}, {"question": "Based on the examples provided, if a recipe calls for 500 grams of flour, which common household item would have a similar mass?", "options": [{"text": "A pinky fingernail", "isCorrect": false, "rationale": "A pinky fingernail is about 1 cm wide, a measure of length, not mass, and its mass would be much less than 500g."}, {"text": "A paperclip", "isCorrect": false, "rationale": "A paperclip has a mass of about 1 g, significantly less than 500 g."}, {"text": "A baseball bat", "isCorrect": false, "rationale": "A baseball bat is about 1 m long, a measure of length, and while it has mass, its specific value isn't given in grams for comparison to 500g directly."}, {"text": "A textbook", "isCorrect": true, "rationale": "The text states: 'A textbook has a mass of about 500 g,' which directly matches the requested amount of flour."}]}, {"question": "The 'Common Misconceptions' section clarifies that while mass and weight can be treated similarly at this level, they are fundamentally different. How does the text describe mass?", "options": [{"text": "Mass is the pull of gravity on an object.", "isCorrect": false, "rationale": "This definition is given for 'weight' in the text, not mass."}, {"text": "Mass is how much space an object takes up.", "isCorrect": false, "rationale": "This describes 'volume,' which is measured by a graduated cylinder."}, {"text": "Mass is the amount of 'stuff' or matter in an object.", "isCorrect": true, "rationale": "The text defines mass as 'the amount of “stuff” in an object,' directly contrasting it with weight."}, {"text": "Mass is a measure of an object's length or width.", "isCorrect": false, "rationale": "Length is measured by a ruler and is distinct from mass."}]}, {"question": "According to the 'Science in Life' section, a kitchen measuring cup used for liquids is functionally similar to which scientific tool?", "options": [{"text": "A balance", "isCorrect": false, "rationale": "A balance measures mass, whereas a measuring cup measures volume."}, {"text": "A thermometer", "isCorrect": false, "rationale": "A thermometer measures temperature, whereas a measuring cup measures volume."}, {"text": "A graduated cylinder", "isCorrect": true, "rationale": "The text states: 'A measuring cup is just a graduated cylinder for cooking.' Both measure liquid volume."}, {"text": "A ruler", "isCorrect": false, "rationale": "A ruler measures length, not liquid volume."}]}, {"question": "If a scientist observes that a specific liquid freezes at 0°C and boils at 100°C, what two pieces of information about the liquid have they likely determined?", "options": [{"text": "Its mass and volume", "isCorrect": false, "rationale": "Freezing and boiling points are related to temperature, not mass or volume."}, {"text": "Its length and time to react", "isCorrect": false, "rationale": "Freezing and boiling points are related to temperature, not length or time."}, {"text": "Its temperature characteristics", "isCorrect": true, "rationale": "Both 0°C and 100°C are temperature measurements, specifically defining the liquid's freezing and boiling points, which are key temperature characteristics."}, {"text": "Its density and solubility", "isCorrect": false, "rationale": "While related properties, the observed values (0°C, 100°C) directly indicate temperature points, not density or solubility, which would require further calculations or observations."}]}, {"question": "The teacher's note warns that students may read a ruler starting from the edge instead of the 0 mark. If a ruler has a small blank space before the 0 mark, what kind of error would this common misconception lead to in length measurements?", "options": [{"text": "The measurements would be consistently shorter than the actual length.", "isCorrect": false, "rationale": "If there's a blank space *before* the 0 mark and one starts at the physical edge, the measurement would be *longer* than actual, as the blank space is added."}, {"text": "The measurements would be consistently longer than the actual length.", "isCorrect": true, "rationale": "If the 0 mark is set inward from the physical edge of the ruler, starting at the edge means adding the length of that blank space to every measurement, making it consistently longer than the true value."}, {"text": "The measurements would be random and highly variable.", "isCorrect": false, "rationale": "This would be a systematic error, consistently adding the same incorrect amount, rather than a random variation."}, {"text": "The measurements would be perfectly accurate but require more effort.", "isCorrect": false, "rationale": "Starting from the wrong point introduces a systematic error, making the measurements inaccurate, not more accurate or just more effortful."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
