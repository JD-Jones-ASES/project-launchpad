<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 15, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The text states, \"Without animals to spread seeds, pollinate flowers, and recycle nutrients, the food chain would collapse.\" What does this statement primarily suggest about the role of animals in an ecosystem?", "options": [{"text": "Animals are the ultimate source of energy for plants.", "isCorrect": false, "rationale": "The text identifies the sun as the original source of energy, and plants as producers that capture this energy, not animals."}, {"text": "Animals solely act as consumers, obtaining energy from plants.", "isCorrect": false, "rationale": "While animals are consumers, the statement highlights additional crucial roles beyond just eating, such as spreading seeds, pollinating, and nutrient recycling."}, {"text": "Animals contribute essential services that maintain the productivity and structure of plant populations.", "isCorrect": true, "rationale": "The mentioned roles (spreading seeds, pollinating flowers, recycling nutrients) are all vital ecosystem services that support plant life and, by extension, the entire food chain."}, {"text": "Animals are only important as food sources for other animals.", "isCorrect": false, "rationale": "This option is too narrow; the text specifically lists other critical functions of animals that support the ecosystem, not just being food."}], "id": "q01"}, {"question": "If a water molecule from the ocean eventually ends up in your glass of milk, which sequence of Earth Science processes must it have undergone to become part of the cow's intake?", "options": [{"text": "Condensation, evaporation, precipitation, collection.", "isCorrect": false, "rationale": "Evaporation must occur before condensation for water to rise from the ocean and form clouds."}, {"text": "Evaporation, condensation, precipitation, collection, absorption.", "isCorrect": true, "rationale": "Water evaporates from the ocean, condenses into clouds, falls as precipitation (rain), collects in a pond, and is then absorbed by the cow (or by grass the cow eats)."}, {"text": "Precipitation, collection, evaporation, condensation.", "isCorrect": false, "rationale": "This sequence is incorrect; precipitation follows condensation, and evaporation initiates the cycle from a body of water."}, {"text": "Collection, absorption, evaporation, precipitation.", "isCorrect": false, "rationale": "Collection and absorption occur later in the cycle, after evaporation, condensation, and precipitation have already taken place."}], "id": "q02"}, {"question": "The text emphasizes that atoms are never created or destroyed, only rearranged. How does this principle apply to the glucose molecule (C6H12O6) formed by an apple tree?", "options": [{"text": "The tree produces entirely new carbon, hydrogen, and oxygen atoms from sunlight.", "isCorrect": false, "rationale": "The principle states atoms are not created; sunlight provides energy for rearrangement, not for atom creation."}, {"text": "The atoms in glucose existed previously in carbon dioxide and water molecules.", "isCorrect": true, "rationale": "Photosynthesis rearranges existing carbon atoms from CO2 and hydrogen and oxygen atoms from H2O into glucose, demonstrating the conservation of atoms."}, {"text": "The glucose molecule spontaneously generates its constituent atoms from atmospheric energy.", "isCorrect": false, "rationale": "Atoms are physical entities and are not spontaneously generated from energy; energy is used to rearrange existing atoms."}, {"text": "When you eat the apple, the glucose atoms are permanently destroyed and released as heat.", "isCorrect": false, "rationale": "Atoms are conserved; when glucose is broken down, its atoms are rearranged to form other molecules or become part of the body, they are not destroyed."}], "id": "q03"}, {"question": "When a turkey eats grain, the stored chemical energy from the grain is converted into various forms within the turkey. Which of the following statements best describes an inevitable consequence of this energy transfer?", "options": [{"text": "All the chemical energy is perfectly converted into kinetic energy for movement.", "isCorrect": false, "rationale": "The text states that some energy becomes heat and some is stored, implying it's not all converted to kinetic energy, and there are losses."}, {"text": "Some energy is always lost as heat, limiting the number of links in a food chain.", "isCorrect": true, "rationale": "The text explicitly states, 'Some energy is always lost as heat, which is why food chains rarely have more than four or five links.'"}, {"text": "The turkey creates new energy to power its muscles and maintain body heat.", "isCorrect": false, "rationale": "Energy is transformed, not created, according to the principle of conservation of energy mentioned in the text."}, {"text": "The total amount of energy available for the next consumer increases.", "isCorrect": false, "rationale": "Due to energy loss as heat at each step, the total energy available for the next consumer actually decreases."}], "id": "q04"}, {"question": "Consider the scenario where an apple tree absorbs water and uses carbon dioxide from the air to grow, then a person eats the apple. Which sequence correctly identifies the primary science branches involved in these specific actions?", "options": [{"text": "Physics (tree absorbs water), Earth Science (CO2 use), Life Science (eating apple).", "isCorrect": false, "rationale": "Water absorption is an Earth Science connection (water cycle), CO2 use for growth is Chemistry (photosynthesis rearranging atoms), and eating is Life Science."}, {"text": "Earth Science (water absorption), Chemistry (CO2 use for growth), Life Science (eating apple).", "isCorrect": true, "rationale": "Water absorption relates to the water cycle (Earth Science); using CO2 to build molecules like glucose is Chemistry; and the act of a person eating is a biological process (Life Science)."}, {"text": "Life Science (tree absorbs water), Physics (CO2 use), Chemistry (eating apple).", "isCorrect": false, "rationale": "The branch connections are incorrect for each action described."}, {"text": "Chemistry (water absorption), Earth Science (CO2 use), Physics (eating apple).", "isCorrect": false, "rationale": "The branch connections are incorrect for each action described."}], "id": "q05"}, {"question": "In the context of the food chain described, what defines an organism as a \"producer\"?", "options": [{"text": "It eats other animals for energy.", "isCorrect": false, "rationale": "This describes a type of consumer (carnivore)."}, {"text": "It makes its own food using an external energy source like sunlight.", "isCorrect": true, "rationale": "The text states, 'The tree is a producer — it made its own food using sunlight,' which is the definition of a producer (autotroph)."}, {"text": "It breaks down dead organic matter.", "isCorrect": false, "rationale": "This describes a decomposer, which the text mentions earthworms assist with."}, {"text": "It consumes plants to gain energy.", "isCorrect": false, "rationale": "This describes a primary consumer (herbivore)."}], "id": "q06"}, {"question": "The text states that \"the water cycle connects every link in the food chain to Earth's hydrosphere.\" This highlights the idea that:", "options": [{"text": "The amount of water on Earth is constantly increasing due to evaporation.", "isCorrect": false, "rationale": "The text explains water cycles, meaning its amount is conserved, not constantly increasing. Evaporation is part of the cycle, not a source of new water."}, {"text": "Water is a non-essential component for the survival of most organisms.", "isCorrect": false, "rationale": "The text explicitly states, 'Every living thing in the food chain needs water,' making it essential."}, {"text": "All living components of the food chain are directly or indirectly reliant on the continuous movement of water through the environment.", "isCorrect": true, "rationale": "The examples (apple tree roots absorbing, turkey drinking, cow drinking, you drinking) show direct reliance, and the cycle ensures continuous availability, connecting all links."}, {"text": "Only aquatic animals are truly connected to the hydrosphere.", "isCorrect": false, "rationale": "The examples clearly show terrestrial organisms (trees, turkeys, cows, humans) are also connected to and rely on the water cycle and hydrosphere."}], "id": "q07"}, {"question": "If a carbon atom that was once part of atmospheric carbon dioxide (CO2) is now found in the glucose of an apple, and later in your body's cells, what does this demonstrate about atoms?", "options": [{"text": "Atoms are continuously created and destroyed as they move through different organisms.", "isCorrect": false, "rationale": "The text explicitly states, 'Atoms are never created or destroyed.'"}, {"text": "Atoms are static and remain within the original source once incorporated.", "isCorrect": false, "rationale": "The example shows the carbon atom moving from air to plant to human, demonstrating they are not static."}, {"text": "Atoms are endlessly recycled and rearranged in different forms throughout the environment and living things.", "isCorrect": true, "rationale": "The passage states, 'Atoms are never created or destroyed — they just move from one thing to another,' perfectly illustrated by this journey."}, {"text": "Atoms undergo nuclear fusion to change their elemental identity within biological processes.", "isCorrect": false, "rationale": "Biological processes involve chemical rearrangements, not nuclear fusion, which changes the element's identity."}], "id": "q08"}, {"question": "The text explains that \"some energy is always lost as heat, which is why food chains rarely have more than four or five links.\" What is the most accurate conclusion drawn from this statement?", "options": [{"text": "Energy is completely destroyed at each trophic level beyond five links.", "isCorrect": false, "rationale": "Energy is transformed (e.g., to heat), not destroyed, according to the conservation of energy."}, {"text": "The efficiency of energy transfer between trophic levels is generally very high.", "isCorrect": false, "rationale": "If 'some energy is always lost as heat,' then the efficiency of transfer cannot be 'very high.'"}, {"text": "Insufficient energy remains to support additional consumer levels after several transfers.", "isCorrect": true, "rationale": "The loss of energy as heat at each step means that progressively less energy is available for higher trophic levels, eventually becoming too little to sustain another link."}, {"text": "Organisms in longer food chains produce more heat energy than those in shorter ones.", "isCorrect": false, "rationale": "The length limitation is due to the *loss* of energy as heat, not an increased production of heat by longer chains. All chains lose energy as heat."}], "id": "q09"}, {"question": "The chapter begins by asking, \"But every single item on that tray got its energy from the same place — the sun. How? Follow the chain!\" Which of the following best summarizes the overall connection between sunlight and the \"turkey sandwich\" on a lunch tray?", "options": [{"text": "Sunlight directly energizes the turkey, allowing it to grow.", "isCorrect": false, "rationale": "Sunlight directly energizes plants (producers), not the turkey (a consumer)."}, {"text": "Sunlight provides the heat necessary for the water cycle, which then hydrates the turkey.", "isCorrect": false, "rationale": "While sunlight powers the water cycle, this is an indirect effect. The primary energy for the turkey's growth and life processes comes from the chemical energy in its food."}, {"text": "Sunlight enables plants (like grain) to produce chemical energy through photosynthesis, which is then transferred to the turkey, and subsequently to the person.", "isCorrect": true, "rationale": "This accurately describes the energy flow: sun -> plant (chemical energy) -> turkey (ingests chemical energy) -> person (ingests chemical energy), as explained in the Physics section."}, {"text": "Sunlight primarily causes atoms to bond together to form molecules in the turkey's cells.", "isCorrect": false, "rationale": "Sunlight provides the energy for photosynthesis in plants to form molecules. In the turkey, chemical energy from food is used for cellular processes, not direct sunlight for atomic bonding within its cells."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
