<script>
var QUESTIONS = [{"question": "Which of the following statements accurately describes the poles of a magnet?", "options": [{"text": "A magnet can sometimes have only a north pole, especially if it's very small.", "isCorrect": false, "rationale": "The text explicitly states, 'Every magnet — no matter its size or shape — has exactly two poles: a north pole and a south pole. You can never have a magnet with just one pole!'"}, {"text": "The pulling power of a magnet is evenly distributed across its entire surface.", "isCorrect": false, "rationale": "The text states, 'you will notice that its pulling power is strongest at two spots — usually at the ends. These spots are called poles.'"}, {"text": "If a magnet is broken in half, one piece will have a north pole and the other a south pole.", "isCorrect": false, "rationale": "The text clarifies that 'Even if you break a magnet in half, each piece will have its own north and south pole,' meaning each piece will possess both poles."}, {"text": "Every magnet, regardless of how it's divided, will always possess both a north pole and a south pole.", "isCorrect": true, "rationale": "This statement is directly supported by the text: 'Every magnet — no matter its size or shape — has exactly two poles: a north pole and a south pole. Even if you break a magnet in half, each piece will have its own north and south pole.'"}]}, {"question": "Two students are conducting an experiment with bar magnets. Student A brings the north pole of one magnet near the north pole of another. Student B brings the north pole of one magnet near the south pole of another. What will likely happen in each case?", "options": [{"text": "Both pairs of magnets will attract each other.", "isCorrect": false, "rationale": "This is incorrect because like poles repel, and opposite poles attract. Student A's magnets (N-N) will repel."}, {"text": "Both pairs of magnets will repel each other.", "isCorrect": false, "rationale": "This is incorrect because opposite poles attract. Student B's magnets (N-S) will attract."}, {"text": "Student A's magnets will repel, while Student B's magnets will attract.", "isCorrect": true, "rationale": "The text states, 'Opposite poles attract. Like poles repel.' Therefore, two north poles (like poles) will repel, and a north and a south pole (opposite poles) will attract."}, {"text": "Student A's magnets will attract, while Student B's magnets will repel.", "isCorrect": false, "rationale": "This reverses the correct rule. Like poles repel, and opposite poles attract."}]}, {"question": "A student performs a demonstration using iron filings sprinkled on a piece of paper placed over a magnet. What is the primary purpose of this demonstration?", "options": [{"text": "To show that magnets can heat up certain metals.", "isCorrect": false, "rationale": "The demonstration with iron filings is not related to heat. It's used to visualize the invisible magnetic field."}, {"text": "To measure the exact strength of the magnet's force.", "isCorrect": false, "rationale": "While it shows the presence of force, it doesn't provide a precise quantitative measurement of strength."}, {"text": "To make the invisible magnetic field visible by showing the pattern of field lines.", "isCorrect": true, "rationale": "The text explains, 'You cannot see a magnetic field with your eyes, but you can reveal it with a simple trick. Sprinkle iron filings... The filings line up in a pattern of curved lines that spread out from one pole to the other. These lines show you the shape of the magnetic field.'"}, {"text": "To prove that only iron is attracted to magnets, not other materials.", "isCorrect": false, "rationale": "While iron is magnetic, the purpose of this demonstration is to visualize the field, not to test all magnetic materials. The text also mentions nickel and cobalt as magnetic."}]}, {"question": "Which of the following items would a magnet most likely attract?", "options": [{"text": "An aluminum can", "isCorrect": false, "rationale": "The text specifically lists 'Aluminum can' as 'Not Magnetic' in the table and states 'Aluminum cans... are all made of metal, but a magnet will not stick to any of them.'"}, {"text": "A gold ring", "isCorrect": false, "rationale": "The text specifically lists 'Gold ring' as 'Not Magnetic' in the table and states 'gold rings are all made of metal, but a magnet will not stick to any of them.'"}, {"text": "A steel paper clip", "isCorrect": true, "rationale": "The text states that 'Iron — used in nails, paper clips, and steel (steel is mostly iron)' is a magnetic material, and lists 'Steel paper clip' as 'Magnetic' in the table."}, {"text": "A copper penny", "isCorrect": false, "rationale": "The text specifically lists 'Copper penny' as 'Not Magnetic' in the table and states 'copper pennies... are all made of metal, but a magnet will not stick to any of them.'"}]}, {"question": "A student is surprised to learn that not all metals are magnetic. Based on the text, which of the following statements best explains this common misconception?", "options": [{"text": "Only metals found deep within the Earth are magnetic, not surface metals.", "isCorrect": false, "rationale": "The text does not mention depth as a factor for magnetism in materials. It specifies types of metals."}, {"text": "Metals only become magnetic when they are combined with non-metal elements.", "isCorrect": false, "rationale": "This is incorrect. The text states steel (mostly iron) is magnetic, which is an alloy of metals, not necessarily with non-metals making it magnetic. It's the presence of iron, nickel, or cobalt that makes it magnetic."}, {"text": "Only specific metals like iron, nickel, and cobalt, and mixtures containing them, exhibit magnetic properties.", "isCorrect": true, "rationale": "The text explicitly addresses this misconception: 'Here is a surprise: not all metals are magnetic!... Only iron, nickel, and cobalt (and mixtures containing them) are magnetic.' It even provides a demonstration tip to correct this very misconception."}, {"text": "The magnetic properties of metals depend on their color and texture.", "isCorrect": false, "rationale": "Magnetic properties are inherent to the atomic structure of certain elements, not their color or texture."}]}, {"question": "The Earth is described as a 'giant magnet.' What is the primary cause of Earth's magnetic field?", "options": [{"text": "Static electric charges accumulating in the atmosphere.", "isCorrect": false, "rationale": "The text attributes Earth's magnetism to its core, not atmospheric electric charges."}, {"text": "The gravitational pull of the moon on Earth's crust.", "isCorrect": false, "rationale": "While the moon's gravity affects tides, it's not the cause of Earth's magnetic field according to the text."}, {"text": "The movement and flow of molten iron deep inside the planet.", "isCorrect": true, "rationale": "The text explicitly states, 'Deep inside our planet, molten iron moves and flows, creating a magnetic field that surrounds the entire Earth.'"}, {"text": "Large deposits of permanent magnets in Earth's mantle.", "isCorrect": false, "rationale": "The text does not mention permanent magnets in the mantle, but rather the dynamic movement of molten iron in the core."}]}, {"question": "A student uses a compass to navigate. According to the text, why does the compass needle consistently point roughly north?", "options": [{"text": "The compass needle is attracted to the Sun's magnetic field, which is strongest in the northern sky.", "isCorrect": false, "rationale": "The text attributes the compass's function to Earth's magnetic field, not the Sun's."}, {"text": "The compass needle is itself a magnet whose north pole is attracted to Earth's magnetic south pole, located near Earth's geographic North Pole.", "isCorrect": true, "rationale": "The text explains, 'Because opposite poles attract, the north pole of the compass needle is pulled toward Earth's magnetic south pole — which happens to be near Earth's geographic North Pole. So the needle always points roughly north...'"}, {"text": "The compass needle aligns with Earth's gravitational pull, which is stronger at the North Pole.", "isCorrect": false, "rationale": "The compass works due to magnetism, not gravity."}, {"text": "The compass needle is designed to detect and point towards the nearest magnetic material.", "isCorrect": false, "rationale": "While a compass needle is a magnet and can be affected by other magnets, its primary function in navigation is to align with Earth's overall magnetic field."}]}, {"question": "Imagine you are holding a strong bar magnet and slowly move it closer to a compass. What observation would you expect, and why?", "options": [{"text": "The compass needle would continue to point north, as Earth's magnetic field is always dominant.", "isCorrect": false, "rationale": "The 'fun experiment' section explicitly states, 'hold a bar magnet near a compass. The compass needle will swing toward the magnet instead of toward north. The magnet's field is stronger than Earth's field when you are close to it.'"}, {"text": "The compass needle would spin rapidly and then stop, unable to align with any field.", "isCorrect": false, "rationale": "The compass needle will align with the stronger local magnetic field, not spin randomly and stop indefinitely."}, {"text": "The compass needle would point toward the bar magnet because the magnet's field is stronger at close range than Earth's field.", "isCorrect": true, "rationale": "As described in the 'fun experiment' box, 'The compass needle will swing toward the magnet instead of toward north. The magnet's field is stronger than Earth's field when you are close to it.'"}, {"text": "The compass needle would point away from the bar magnet, showing repulsion.", "isCorrect": false, "rationale": "Depending on the pole presented, it could attract or repel, but the key point is that the local field of the bar magnet dominates Earth's field, causing it to align with the bar magnet, typically attracting one of its poles."}]}, {"question": "A magnetic field is described as an 'invisible area of force.' How does this invisible force manifest itself in practical terms?", "options": [{"text": "It allows magnets to generate light without direct contact.", "isCorrect": false, "rationale": "Magnetic fields do not generate light directly. They exert a force."}, {"text": "It causes magnets to physically touch and instantly bond with all surrounding objects.", "isCorrect": false, "rationale": "A magnetic field exerts a force, but it does not cause bonding with 'all' surrounding objects, only magnetic materials, and the force acts without needing to touch."}, {"text": "It enables a magnet to attract or repel other magnets or magnetic materials without physical contact.", "isCorrect": true, "rationale": "The text states, 'A magnet does not have to touch something to pull on it... That is because every magnet is surrounded by an invisible area of force called a magnetic field.' The definition further clarifies it's an 'invisible area around a magnet where its force can attract or repel other magnets or magnetic materials.'"}, {"text": "It creates a noticeable sound when magnets are brought close to non-magnetic objects.", "isCorrect": false, "rationale": "Magnetic fields are not associated with creating sound. The 'click' mentioned in the intro is when magnets physically snap together."}]}, {"question": "The text mentions that 'electricity and magnetism are deeply connected.' Although the specifics are in the next section, what concept from this section hints at this connection?", "options": [{"text": "The fact that molten iron creates Earth's magnetic field, which is a form of electrical current.", "isCorrect": false, "rationale": "While molten iron generates the field, the text doesn't explicitly link this to 'electrical current' in this section; it simply states molten iron moves and flows. The explicit connection highlighted is about poles and charges."}, {"text": "The invisible nature of magnetic fields, similar to how electric fields are invisible.", "isCorrect": false, "rationale": "While true, the text points to a more direct functional similarity, not just invisibility."}, {"text": "The rule 'Opposite poles attract. Like poles repel,' which is similar to the rule for electric charges.", "isCorrect": true, "rationale": "The text explicitly states, 'Magnets follow a rule that might sound familiar from our study of electric charges: Opposite poles attract. Like poles repel. This is very similar to the rule for electric charges! In fact, as we will see in the next section, electricity and magnetism are deeply connected.'"}, {"text": "The use of iron filings to visualize magnetic fields, which also react to electric fields.", "isCorrect": false, "rationale": "Iron filings are used for magnetic fields; the text doesn't state they react to electric fields, and this isn't the primary hint provided about the connection."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
