<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 13, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the defining characteristic of an element, as described in the text?", "options": [{"text": "It is a substance that reacts easily with most other chemicals.", "isCorrect": false, "rationale": "While some elements are reactive, the text defines an element by its atomic composition, not its reactivity. For example, helium is an element but is noted for almost never reacting."}, {"text": "It is a pure substance made of only one kind of atom and cannot be broken down into simpler substances.", "isCorrect": true, "rationale": "The text explicitly states: 'Element: a pure substance made of only one kind of atom. It cannot be broken down into simpler substances.'"}, {"text": "It is always found as a gas at room temperature.", "isCorrect": false, "rationale": "The text lists many elements that are solids at room temperature, such as Carbon, Iron, Gold, and Aluminum."}, {"text": "It is a mixture of two or more closely related substances.", "isCorrect": false, "rationale": "The text defines an element as a 'pure substance' made of 'only one kind of atom,' which contradicts the idea of it being a mixture."}]}, {"question": "According to the rules for chemical symbols, which of the following is a correctly written symbol for an element?", "options": [{"text": "co", "isCorrect": false, "rationale": "The first letter of an element's symbol must always be capitalized. 'co' is incorrect as 'c' is lowercase."}, {"text": "NA", "isCorrect": false, "rationale": "If a symbol has a second letter, it must always be lowercase. 'NA' is incorrect as 'A' is capitalized."}, {"text": "hY", "isCorrect": false, "rationale": "The first letter of an element's symbol must always be capitalized, and the second letter (if present) must be lowercase. 'hY' violates both rules."}, {"text": "Mg", "isCorrect": true, "rationale": "The text states: 'The first letter is always a capital letter. If there is a second letter, it is always lowercase.' 'Mg' follows this rule correctly."}]}, {"question": "Approximately how many different elements have scientists discovered in the entire universe?", "options": [{"text": "Around 20-30, which are commonly encountered.", "isCorrect": false, "rationale": "20-30 is the number of elements commonly encountered in everyday life, not the total number discovered."}, {"text": "Exactly 100.", "isCorrect": false, "rationale": "The text states 'about 118 elements,' not exactly 100."}, {"text": "About 118.", "isCorrect": true, "rationale": "The text explicitly states: 'Scientists have discovered about 118 elements.'"}, {"text": "Over 1,000, with new ones being discovered frequently.", "isCorrect": false, "rationale": "The text specifies a number much lower than 1,000 and implies the number is relatively stable at 'about 118'."}]}, {"question": "What was the primary reason scientists created the periodic table?", "options": [{"text": "To list all elements alphabetically for easy reference.", "isCorrect": false, "rationale": "While organization is a goal, the primary principle is based on properties, not alphabetical order. Elements are arranged by atomic number and grouped by properties."}, {"text": "To predict the existence and properties of undiscovered elements.", "isCorrect": false, "rationale": "While the periodic table is indeed used for this in advanced chemistry, the provided text focuses on its role in organizing *known* elements by their properties."}, {"text": "To organize all known elements based on their properties, grouping similar ones together.", "isCorrect": true, "rationale": "The text states: 'Scientists needed a way to organize all 118 elements, so they created a chart called the periodic table... It organizes all known elements by their properties. Elements with similar properties are grouped together.'"}, {"text": "To display the atomic weight of each element.", "isCorrect": false, "rationale": "The text mentions the atomic number, which tells how many protons are in an atom, not specifically the atomic weight, as a key piece of information in each square."}]}, {"question": "What information does the atomic number primarily provide about an element?", "options": [{"text": "Its typical physical state (solid, liquid, or gas) at room temperature.", "isCorrect": false, "rationale": "The atomic number identifies the element and tells the number of protons, not its typical physical state, which can vary."}, {"text": "The number of protons in the center of each atom of that element.", "isCorrect": true, "rationale": "The text explicitly defines: 'Atomic number: the number that identifies each element. It tells how many protons are in the center of each atom of that element.'"}, {"text": "How many electrons are orbiting the nucleus of the atom.", "isCorrect": false, "rationale": "The text specifies 'protons' for the atomic number, not electrons."}, {"text": "The year the element was discovered.", "isCorrect": false, "rationale": "The atomic number is an intrinsic property of the atom, not related to its discovery date."}]}, {"question": "A key principle for the arrangement of elements in the periodic table is that elements are placed in the same column if they:", "options": [{"text": "Were discovered around the same time period.", "isCorrect": false, "rationale": "The arrangement is based on properties and atomic number, not discovery date."}, {"text": "Have similar densities and boiling points.", "isCorrect": false, "rationale": "While these can be properties, the text highlights 'similar properties' and 'behave in similar ways' more broadly, using the example of gases that 'almost never react'."}, {"text": "Possess similar chemical properties and behaviors.", "isCorrect": true, "rationale": "The text states: 'Elements that behave in similar ways are placed in the same column. For example, helium, neon, and argon are all in the same column because they are all gases that almost never react with other elements.'"}, {"text": "Are all radioactive or unstable.", "isCorrect": false, "rationale": "This is a specific property not applicable to all elements in a column, and not the general rule for grouping described in the text."}]}, {"question": "Based on the 'Sciencelife' section, which element is specifically mentioned as being found in the battery of a modern cell phone?", "options": [{"text": "Gold (Au)", "isCorrect": false, "rationale": "Gold is found in phones (in electronics), but the text does not specify it in the battery."}, {"text": "Silicon (Si)", "isCorrect": false, "rationale": "Silicon is mentioned as being in the computer chip of a phone, not the battery."}, {"text": "Lithium (Li)", "isCorrect": true, "rationale": "The text explicitly states: 'A phone has... lithium (Li) in the battery...'"}, {"text": "Copper (Cu)", "isCorrect": false, "rationale": "Copper is found in phones, but the text does not specify it in the battery."}]}, {"question": "Why do some element symbols like 'Fe' for Iron or 'Au' for Gold not seem to match their English names?", "options": [{"text": "These symbols were chosen randomly for elements found in obscure locations.", "isCorrect": false, "rationale": "The text provides a specific, systematic reason for these symbols."}, {"text": "They were named after the scientists who discovered them.", "isCorrect": false, "rationale": "The text attributes these symbols to older languages, not scientists' names."}, {"text": "They are derived from older languages like Latin to provide a universal naming system for scientists worldwide.", "isCorrect": true, "rationale": "The text explains: 'Iron's symbol is Fe (from the Latin word ferrum). Gold's symbol is Au (from the Latin word aurum). These symbols come from older languages because scientists from many countries needed a way to communicate about the same elements.'"}, {"text": "They are simplified abbreviations of complex chemical formulas that involve these elements.", "isCorrect": false, "rationale": "Element symbols represent single elements, not complex chemical formulas."}]}, {"question": "The 'Think About It' section poses a question about how millions of different substances can exist with only about 118 elements. What is the implied answer, using the analogy of alphabet letters forming words?", "options": [{"text": "Elements can undergo nuclear changes to become entirely new elements, expanding the total count.", "isCorrect": false, "rationale": "The text defines elements as unchangeable into simpler substances, and this option suggests a change into different elements, which isn't the core concept here."}, {"text": "Different elements can combine in countless unique ways to form a vast array of compounds and mixtures.", "isCorrect": true, "rationale": "The analogy of 26 letters making thousands of words directly implies that a relatively small number of elements can combine in countless permutations to form a vast number of different substances."}, {"text": "Scientists have actually discovered many more than 118 elements, but only a few are publicly known.", "isCorrect": false, "rationale": "The text explicitly states 'about 118 elements' and does not suggest a hidden number."}, {"text": "Many substances are simply pure elements that appear different due to varying manufacturing processes.", "isCorrect": false, "rationale": "This option contradicts the idea of 'millions of different substances' implying they are distinct, often compounds, not just varied forms of pure elements."}]}, {"question": "Based on the 'teachernote' guidance for introductory level students, which concept about a periodic table square would *not* typically be introduced?", "options": [{"text": "The letters in the square represent the element's symbol.", "isCorrect": false, "rationale": "The teacher note explicitly states students 'should understand that: Letters are the element's symbol.'"}, {"text": "The square represents one unique element.", "isCorrect": false, "rationale": "The teacher note explicitly states students 'should understand that: Each square represents one element.'"}, {"text": "The number in the square is the atomic number.", "isCorrect": false, "rationale": "The teacher note explicitly states students 'should understand that: The number in each square is the atomic number.'"}, {"text": "The electron configuration or valence electrons of the element.", "isCorrect": true, "rationale": "The teacher note explicitly states: 'Do not introduce electron shells, valence electrons, or detailed group/period properties at this level.' This concept is deemed too advanced for introductory students."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
