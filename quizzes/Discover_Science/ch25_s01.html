<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 25, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the example of a forest demonstrate the interconnectedness of the four branches of science (Life, Earth, Chemistry, Physics)?", "options": [{"text": "It shows that each branch operates independently within the forest, with no significant overlap.", "isCorrect": false, "rationale": "The text explicitly states that 'every branch of science you studied in Cycle 5 is happening right here' and provides examples of how they are intertwined, not independent."}, {"text": "It highlights how the forest's living components depend on nonliving factors, chemical reactions, and energy transfers.", "isCorrect": true, "rationale": "The text details how life depends on soil (Earth), photosynthesis is a chemical process (Chemistry), and light energy powers the forest (Physics), all connected within the ecosystem (Life Science)."}, {"text": "It illustrates how physical processes like light and sound are separate from the biological and chemical cycles.", "isCorrect": false, "rationale": "The text connects light to photosynthesis (Chemistry/Life Science) and sound to animal behavior (Life Science), showing their integration rather than separation."}, {"text": "It suggests that only life science is truly essential to understanding a forest ecosystem.", "isCorrect": false, "rationale": "The entire purpose of the section is to show that all four branches are crucial and interdependent for understanding a forest, not just life science."}]}, {"question": "If a severe disease suddenly eliminated all the mushrooms, earthworms, and bacteria from a forest ecosystem, what would be the most immediate and significant consequence?", "options": [{"text": "Trees would immediately stop performing photosynthesis due to a lack of CO2.", "isCorrect": false, "rationale": "While decomposers contribute to the carbon cycle, their absence would not immediately halt photosynthesis, and their primary role discussed is nutrient recycling, not CO2 supply for photosynthesis."}, {"text": "The forest floor would accumulate an increasing amount of dead organic material, and nutrient cycling to the soil would halt.", "isCorrect": true, "rationale": "The text identifies mushrooms, earthworms, and bacteria as 'decomposers' whose role is to 'break down fallen leaves, dead animals, and rotting wood' and 'return nutrients to the soil,' making their absence result in accumulation and halted cycling."}, {"text": "Carnivores would suffer a population decline due to a shortage of primary consumers.", "isCorrect": false, "rationale": "Decomposers do not directly provide food for primary consumers; their absence would indirectly affect the entire food web over time by disrupting nutrient availability, but not immediately impact primary consumers' food supply."}, {"text": "The pH of the soil would become excessively acidic, killing most plants.", "isCorrect": false, "rationale": "The text states decomposing leaves produce 'weak acids,' so the absence of decomposers might lead to a less acidic (or more alkaline) soil in the short term, not more acidic. The primary effect is on nutrient cycling."}]}, {"question": "Wangari Maathai's work in planting millions of trees in Kenya directly addressed which critical ecological issue described in the text?", "options": [{"text": "Reducing sound pollution in urban environments.", "isCorrect": false, "rationale": "The text mentions sound absorption by trees but does not connect this to Wangari Maathai's work."}, {"text": "Preventing soil erosion and providing essential resources for communities.", "isCorrect": true, "rationale": "The text explicitly states: 'Wangari Maathai understood this connection. That is why she planted millions of trees in Kenya — to protect the soil and the communities that depend on it.'"}, {"text": "Increasing the reflection of green light for better plant growth.", "isCorrect": false, "rationale": "Light reflection is a physics concept explained in the text, but it is not linked to Maathai's primary motivation for planting trees."}, {"text": "Facilitating complex chemical reactions within forest soil.", "isCorrect": false, "rationale": "While trees do contribute to soil chemistry, Maathai's primary stated reason in the text was soil protection and community support, not direct chemical facilitation."}]}, {"question": "What is the primary role of photosynthesis in the forest, according to the Chemistry section?", "options": [{"text": "To release oxygen for animal respiration and remove excess water from the soil.", "isCorrect": false, "rationale": "Oxygen is a byproduct of photosynthesis, and water is consumed, not just removed. The primary role is not to remove water or provide oxygen for animals, but for the plant itself."}, {"text": "To break down glucose and oxygen to release energy for plant growth.", "isCorrect": false, "rationale": "This describes cellular respiration, the reverse reaction of photosynthesis, which is how plants and animals get energy from glucose."}, {"text": "To convert light energy into chemical energy stored in glucose, using carbon dioxide and water.", "isCorrect": true, "rationale": "The text states: 'During photosynthesis, trees pull carbon dioxide (CO2) from the air and water (H2O) from the soil. Using light energy, they rearrange the atoms into glucose (C6H12O6) and release oxygen (O2) as a byproduct.'"}, {"text": "To produce weak acids that help break down minerals in the soil.", "isCorrect": false, "rationale": "This is a function of decomposing leaves, not photosynthesis itself."}]}, {"question": "Why do plants on the forest floor often have very large leaves, according to the text?", "options": [{"text": "To better absorb sound waves and create a quieter environment.", "isCorrect": false, "rationale": "Sound absorption is primarily attributed to tree trunks, not a function of large leaves for light capture."}, {"text": "To reflect more green light, making them more visible to pollinators.", "isCorrect": false, "rationale": "While leaves reflect green light, the text states large leaves are for capturing limited light, not for visibility to pollinators."}, {"text": "To maximize the absorption of the limited light energy that reaches the ground.", "isCorrect": true, "rationale": "The text states: 'On the forest floor, less light reaches the ground. That is why forest-floor plants tend to have very large leaves — they need to catch every bit of light they can.'"}, {"text": "To provide more surface area for water evaporation, cooling the plant.", "isCorrect": false, "rationale": "This concept is not mentioned in the text as the reason for large leaves on the forest floor; in fact, large leaves can sometimes increase water loss, which might be detrimental in some conditions."}]}, {"question": "Which of the following best describes the process of weathering in a forest, as explained in the text?", "options": [{"text": "The process by which tree roots absorb nutrients from bedrock.", "isCorrect": false, "rationale": "Roots primarily absorb nutrients from the soil, not directly from bedrock, and weathering is about breaking down rock, not absorption."}, {"text": "The gradual breakdown of solid rock into soil over time due to natural forces like freezing water and growing roots.", "isCorrect": true, "rationale": "The text states: 'Tree roots grow into cracks in rocks and slowly split them apart. Water seeps into tiny openings, freezes, and expands. Over hundreds of years, these forces turn solid rock into the soil...'"}, {"text": "The accumulation of humus in the topsoil layer from decomposed organic matter.", "isCorrect": false, "rationale": "This describes the formation of humus, which is part of soil composition, but not the process of weathering solid rock into soil."}, {"text": "The erosion of topsoil caused by heavy rainfall in an exposed area.", "isCorrect": false, "rationale": "Erosion is the transport of weathered material, while weathering is the breakdown of rock. The text distinguishes between the two."}]}, {"question": "The text states that 'The pH of the soil affects which plants can grow.' What can be inferred about the chemical role of decomposers in shaping the forest environment?", "options": [{"text": "Decomposers are essential for increasing the amount of oxygen in the soil, which raises the pH.", "isCorrect": false, "rationale": "Decomposers consume oxygen during their metabolic processes, and the text links them to producing weak acids, not increasing oxygen to raise pH."}, {"text": "Decomposers directly produce glucose for plants, making the soil more fertile regardless of pH.", "isCorrect": false, "rationale": "Producers (plants) make glucose; decomposers recycle nutrients, but not directly glucose, and their impact on soil fertility is tied to nutrient release and pH."}, {"text": "Decomposing leaves produce weak acids that contribute to the soil's pH, thus influencing which plant species thrive.", "isCorrect": true, "rationale": "The text explicitly states: 'Decomposing leaves produce weak acids that help break down minerals. Some forest soils are slightly acidic, which is why certain plants (like blueberries) thrive there while others do not.'"}, {"text": "Decomposers release chemicals that neutralize all soil acids, ensuring a consistent pH for all plants.", "isCorrect": false, "rationale": "The text states they produce weak acids, implying they contribute to acidity, not neutralize it to ensure consistent pH."}]}, {"question": "How does the behavior of sound waves differ in a dense forest compared to an open field, and what is the consequence?", "options": [{"text": "Sound travels faster in a forest due to the vibrations of tree trunks, making it seem louder.", "isCorrect": false, "rationale": "Sound speed is not significantly faster in a forest, and the text states forests feel quieter, not louder."}, {"text": "Tree trunks absorb and scatter sound waves, resulting in a quieter environment within the forest.", "isCorrect": true, "rationale": "The text states: 'Tree trunks absorb and scatter sound waves, which is why forests feel quieter than cities.'"}, {"text": "Light waves in a forest interfere with sound waves, causing them to dissipate more quickly.", "isCorrect": false, "rationale": "Light and sound are distinct wave types and are not described as directly interfering with each other in this manner within the text."}, {"text": "Forests reflect all sound waves back to the source, creating echoes that make it difficult for animals to hear.", "isCorrect": false, "rationale": "The text states absorption and scattering, not complete reflection, and animals like owls are noted to have adapted to hunt using sound in this environment, not find it difficult to hear."}]}, {"question": "In the forest ecosystem described, which of the following organisms would be classified as a primary consumer?", "options": [{"text": "A mushroom breaking down a fallen log.", "isCorrect": false, "rationale": "Mushrooms are identified as decomposers, which break down dead organic matter, not consume living producers."}, {"text": "An oak tree using sunlight to make food.", "isCorrect": false, "rationale": "Oak trees are producers; they make their own food through photosynthesis."}, {"text": "A squirrel eating acorns from an oak tree.", "isCorrect": true, "rationale": "The text states: 'The squirrels and deer that eat acorns and leaves are herbivores (primary consumers).' Acorns come from oak trees (producers)."}, {"text": "A hawk catching a mouse.", "isCorrect": false, "rationale": "Hawks catching mice would make them carnivores (secondary consumers) since mice are likely primary or secondary consumers."}]}, {"question": "Considering all four branches of science discussed, which statement best summarizes the 'cycle' mentioned multiple times in the text (e.g., nutrient cycle, atom cycle)?", "options": [{"text": "It refers to the daily variation in light and sound levels as the sun moves across the sky.", "isCorrect": false, "rationale": "This refers only to a daily physical phenomenon, too narrow to encompass the broader cycles discussed, which involve matter and energy across all science branches."}, {"text": "It describes the continuous movement and transformation of matter and energy through the living and nonliving components of the forest.", "isCorrect": true, "rationale": "The text describes atoms cycling (Chemistry) between air, soil, water, and living things (Life/Earth), and light energy powering the forest (Physics). This option synthesizes these interconnected cycles."}, {"text": "It refers only to the life cycle of individual organisms from birth to death.", "isCorrect": false, "rationale": "While 'life cycle' is mentioned, the text also details nutrient cycles, atom cycles, and the continuous processes of weathering and decomposition, which are broader than individual organism life cycles."}, {"text": "It primarily concerns the geological processes that slowly form soil from bedrock over thousands of years.", "isCorrect": false, "rationale": "This is a component of the Earth Science aspect but does not encompass the biological, chemical, and energy cycles described as continuously happening in the forest."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
