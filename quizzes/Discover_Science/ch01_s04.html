<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 1, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "When observing animals in their natural habitat, what is the most effective approach to ensure you see more?", "options": [{"text": "Making loud noises to attract their attention.", "isCorrect": false, "rationale": "Loud noises are likely to scare shy animals away, making observation difficult."}, {"text": "Moving quickly to cover more ground.", "isCorrect": false, "rationale": "Rapid movement can also startle animals and makes careful, detailed observation challenging."}, {"text": "Remaining quiet and still.", "isCorrect": true, "rationale": "The text explicitly states, 'Be quiet and patient. Animals are shy. If you are still and quiet, you will see more,' which allows shy animals to feel safe enough to appear."}, {"text": "Bringing snacks to leave for them.", "isCorrect": false, "rationale": "Leaving food can alter natural animal behavior, attract unwanted pests, or potentially be harmful to the animals."}]}, {"question": "While on a nature walk, you discover a small, intricate pattern on a leaf that is difficult to see with the naked eye. Which tool would be most helpful for a detailed observation?", "options": [{"text": "Binoculars.", "isCorrect": false, "rationale": "Binoculars are used for observing distant objects, not for close-up details of something in hand."}, {"text": "A ruler.", "isCorrect": false, "rationale": "A ruler is used for measuring length or size, not for magnifying small features."}, {"text": "A magnifying glass.", "isCorrect": true, "rationale": "The text advises, 'Use a magnifying glass to see tiny details on leaves, bark, or insects,' making it the ideal tool for this situation."}, {"text": "A compass.", "isCorrect": false, "rationale": "A compass is used for navigation and determining direction, not for visual magnification."}]}, {"question": "What do scientists typically call the notebook where they record their observations, drawings, and notes during fieldwork?", "options": [{"text": "A daily planner.", "isCorrect": false, "rationale": "A daily planner is generally used for scheduling appointments and tasks, not detailed scientific observations."}, {"text": "A research log.", "isCorrect": false, "rationale": "While related, 'research log' is a more general term. The text specifies a more precise term for field observations."}, {"text": "A field journal.", "isCorrect": true, "rationale": "The section explicitly states, 'Scientists call these notes a field journal,' which is the correct and specific term."}, {"text": "An experiment report.", "isCorrect": false, "rationale": "An experiment report is a formal document written after an experiment, summarizing methods, results, and conclusions, not the raw notes taken during observation."}]}, {"question": "During a nature walk, a student observes a plant's leaves turning towards the sun over several hours. Which characteristic of life is best exemplified by this observation?", "options": [{"text": "Growth and Development.", "isCorrect": false, "rationale": "While plants grow, the observation describes a short-term change in orientation, not a permanent increase in size or complexity over time."}, {"text": "Reproduction.", "isCorrect": false, "rationale": "Reproduction is the process of creating new organisms; the leaves turning towards the sun is unrelated to this process."}, {"text": "Responds to the environment.", "isCorrect": true, "rationale": "The plant's leaves moving towards the sun is a direct reaction to an external stimulus (light), which is a classic example of responding to the environment, as illustrated by the ant example in the text."}, {"text": "Obtaining and Using Energy.", "isCorrect": false, "rationale": "While plants obtain energy from the sun, the *turning* itself is a response to the stimulus of sunlight, not the process of energy conversion itself."}]}, {"question": "Before taking students on a nature walk, a teacher scouts the planned route. What is the primary reason for this preliminary scouting?", "options": [{"text": "To identify the most interesting animals.", "isCorrect": false, "rationale": "While a benefit, identifying interesting animals is not the primary purpose of scouting mentioned in the 'setupguide'."}, {"text": "To determine the best photo opportunities.", "isCorrect": false, "rationale": "This is a minor consideration and not the main reason for scouting a route for students."}, {"text": "To ensure student safety by identifying hazards.", "isCorrect": true, "rationale": "The 'setupguide' explicitly states, 'Scout the outdoor area beforehand for safety hazards (poison ivy, uneven ground, traffic),' highlighting safety as the primary concern."}, {"text": "To count the number of trees in the area.", "isCorrect": false, "rationale": "Counting trees is irrelevant to the initial setup and safety considerations for a nature walk."}]}, {"question": "What groundbreaking discovery did Jane Goodall make regarding chimpanzees that challenged prevailing scientific beliefs?", "options": [{"text": "Chimpanzees could communicate with humans using sign language.", "isCorrect": false, "rationale": "While some primates have been taught sign language, this was not Jane Goodall's groundbreaking discovery mentioned in the text."}, {"text": "Chimpanzees were capable of using tools.", "isCorrect": true, "rationale": "The text states that 'most people thought only humans used tools,' but Jane observed chimps stripping leaves from twigs to 'fish' for termites, proving they used tools."}, {"text": "Chimpanzees migrated long distances seasonally.", "isCorrect": false, "rationale": "The text does not mention chimpanzee migration as her discovery."}, {"text": "Chimpanzees lived in much larger social groups than previously thought.", "isCorrect": false, "rationale": "While she studied their social lives, the specific groundbreaking discovery highlighted was tool use, which challenged a more fundamental belief about human uniqueness."}]}, {"question": "Jane Goodall's observations fundamentally altered how humans viewed the animal kingdom. Which of the following best describes the core impact of her work?", "options": [{"text": "It proved that all animals are capable of abstract thought.", "isCorrect": false, "rationale": "Her work focused on chimpanzees' tool use and social behaviors, not making a universal claim about abstract thought in all animals."}, {"text": "It demonstrated that humans are biologically superior to all other species.", "isCorrect": false, "rationale": "Her work actually challenged the idea of human uniqueness by showing complex behaviors in animals, suggesting a more connected view."}, {"text": "It revealed that animals possess intelligence, emotions, and complex behaviors previously attributed only to humans.", "isCorrect": true, "rationale": "The text states, 'She proved that animals have personalities, emotions, and complex social lives,' challenging the notion that these traits were exclusive to humans."}, {"text": "It highlighted the importance of captive breeding programs for endangered species.", "isCorrect": false, "rationale": "While environmental conservation became part of her later work, the core scientific impact described was about understanding animal behavior in the wild, not captive breeding."}]}, {"question": "Imagine you are a scientist studying a new species of bird and want to understand its social hierarchy and communication patterns. Which of Jane Goodall's primary scientific methods would be most directly applicable to your research?", "options": [{"text": "Conducting controlled laboratory experiments on their intelligence.", "isCorrect": false, "rationale": "Goodall's work primarily involved fieldwork and observation in natural habitats, not lab experiments."}, {"text": "Performing genetic analysis to trace their evolutionary lineage.", "isCorrect": false, "rationale": "Genetic analysis is a different scientific discipline and was not Goodall's primary method for studying behavior."}, {"text": "Implementing careful, patient, and long-term observation in their natural habitat.", "isCorrect": true, "rationale": "Goodall's success was rooted in 'careful, patient observation — just watching and writing down what you see,' over decades, which is ideal for understanding complex social behaviors."}, {"text": "Tagging and tracking individuals using GPS for migration studies.", "isCorrect": false, "rationale": "While tagging involves observation, Goodall's method emphasized direct, close-range, prolonged observation of behavior, not solely tracking movement over vast distances."}]}, {"question": "Based on the entire section 'Observing Living Things,' what is the most encompassing message about scientific inquiry and our relationship with nature?", "options": [{"text": "Scientific discoveries primarily rely on advanced technology and specialized laboratories.", "isCorrect": false, "rationale": "The section emphasizes simple observation and a notebook, contrasting with a focus on advanced technology."}, {"text": "Only trained scientists with decades of experience can make meaningful contributions to understanding living things.", "isCorrect": false, "rationale": "The text encourages 'you can do the same thing' and quotes Jane Goodall's message, 'every person can make a difference,' promoting accessibility to scientific observation."}, {"text": "Direct, patient observation in natural environments is a fundamental and powerful method for understanding living things, and anyone can participate.", "isCorrect": true, "rationale": "This option synthesizes the entire section's message, combining 'How to Be a Good Observer,' the example of Jane Goodall, and the call for everyone to engage in observation and make a difference."}, {"text": "The classification of living, nonliving, and once-living things is the most important skill for young scientists.", "isCorrect": false, "rationale": "While classification is a mentioned activity, it is a specific skill rather than the overarching message about the nature of scientific inquiry and engagement with the natural world."}]}, {"question": "The section encourages using most senses for observation but specifically warns against tasting things in nature. What is the most significant reason for this particular warning?", "options": [{"text": "Tasting can alter the natural behavior of animals.", "isCorrect": false, "rationale": "While true that human interaction can alter animal behavior, the warning about tasting is primarily for the safety of the human observer, not about altering animal behavior."}, {"text": "Many natural items have an unpleasant taste.", "isCorrect": false, "rationale": "While some natural items may taste unpleasant, this is not the primary safety concern for the explicit warning."}, {"text": "It is impossible to accurately record taste observations in a field journal.", "isCorrect": false, "rationale": "Taste can be described, even if subjectively. This is not the main reason for the explicit safety warning."}, {"text": "Many plants and substances in nature can be poisonous or harmful if ingested.", "isCorrect": true, "rationale": "The text's warning 'never taste anything in nature unless an adult says it is safe!' directly implies a significant health risk, as many natural substances are toxic."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
