<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 19, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the scientific definition provided, which of the following scenarios describes \"work\" being done?", "options": [{"text": "A student studying for an exam at their desk.", "isCorrect": false, "rationale": "While 'studying' can be considered work in everyday language, in science, it does not involve applying a force to move an object over a distance."}, {"text": "A person pushing a heavy car that does not budge despite great effort.", "isCorrect": false, "rationale": "Work requires both force and movement. If the car does not move, no work is done on the car, regardless of how much force is applied."}, {"text": "A weightlifter holding a barbell steady above their head for several seconds.", "isCorrect": false, "rationale": "Once the barbell is held steady, there is no movement over a distance. Therefore, in scientific terms, no work is being done on the barbell at that moment."}, {"text": "A child pulling a toy wagon across the living room floor.", "isCorrect": true, "rationale": "This scenario involves a force (the pull) being applied to an object (the wagon) and that object moving over a distance. This perfectly fits the scientific definition of work."}]}, {"question": "What is the fundamental way a machine helps make a task 'easier' for a human user, according to the text?", "options": [{"text": "It creates extra energy to perform the task more efficiently.", "isCorrect": false, "rationale": "The text explicitly states that 'machines do not create energy out of nothing.' They only change how existing energy/force is used."}, {"text": "It reduces the total amount of scientific work that needs to be done on an object.", "isCorrect": false, "rationale": "The text clarifies that 'The total amount of work stays the same!' when using a machine; machines only change the *way* work is done."}, {"text": "It changes the way force is applied to accomplish the task.", "isCorrect": true, "rationale": "The text states, 'What machines can do is change the way you use your force,' which is their primary function in making work easier."}, {"text": "It allows the user to completely avoid applying any force to the object.", "isCorrect": false, "rationale": "Machines 'cannot do the work for you.' Users still need to apply force, albeit often less or in a different direction."}]}, {"question": "The conceptual equation Work = Force × Distance implies that to increase the amount of work done on an object, you must:", "options": [{"text": "Increase the speed at which the object moves, regardless of force or distance.", "isCorrect": false, "rationale": "While speed is related to energy, it is not a direct component of the scientific definition of work in this context, which focuses on force and distance."}, {"text": "Increase the magnitude of the force applied OR increase the distance the object moves.", "isCorrect": true, "rationale": "Since work is a product of force and distance, increasing either (or both) of these factors will result in a greater amount of work done, assuming the other factor is non-zero."}, {"text": "Decrease the force applied AND decrease the distance the object moves.", "isCorrect": false, "rationale": "Decreasing both force and distance would result in less work being done, not more."}, {"text": "Change the direction of the force without changing its magnitude or the distance.", "isCorrect": false, "rationale": "Changing the direction of force can be a way a machine helps, but if magnitude and distance remain constant, the total work done does not necessarily increase."}]}, {"question": "A common trade-off when using a machine to make work easier is that it allows you to use:", "options": [{"text": "More force over a shorter distance, while keeping the total work constant.", "isCorrect": false, "rationale": "This is the opposite of the most common trade-off described. Machines usually aim to reduce the required force."}, {"text": "Less force over a longer distance, while keeping the total work constant.", "isCorrect": true, "rationale": "The text explicitly states, 'The most common trade-off is this: a machine lets you use less force, but you have to apply that force over a longer distance. The total amount of work stays the same!'"}, {"text": "Less force over a shorter distance, which reduces the total amount of work done.", "isCorrect": false, "rationale": "Machines cannot reduce the total amount of work required, and this option suggests a reduction in both force and distance, which would reduce total work if it were possible."}, {"text": "More force over a longer distance, which increases the total work done.", "isCorrect": false, "rationale": "This would make the task harder, not easier, and would suggest an increase in total work, which machines do not do."}]}, {"question": "Based on the text, which statement accurately describes a limitation of machines?", "options": [{"text": "Machines can create energy to perform work without human input.", "isCorrect": false, "rationale": "The text clearly states, 'machines do not create energy out of nothing.'"}, {"text": "Machines always require more force to operate than performing the task directly.", "isCorrect": false, "rationale": "This is incorrect; one of the primary ways machines help is by allowing the use of less force."}, {"text": "Machines can change the total amount of work that needs to be accomplished.", "isCorrect": false, "rationale": "The text explicitly states, 'The total amount of work stays the same!' when using a machine."}, {"text": "Machines cannot do the work for you, but they can make the process easier.", "isCorrect": true, "rationale": "The text states, 'They cannot do the work for you. What machines can do is change the way you use your force.'"}]}, {"question": "A pair of scissors is described in the text as an example of a machine made of two or more simple machines working together. This type of machine is called a:", "options": [{"text": "Simple machine.", "isCorrect": false, "rationale": "Simple machines have few or no moving parts. Scissors are more complex, being made of multiple simple machines (levers)."}, {"text": "Primary machine.", "isCorrect": false, "rationale": "The term 'primary machine' is not used in the text to describe a type of machine."}, {"text": "Compound machine.", "isCorrect": true, "rationale": "The text defines a compound machine as one 'made of two or more simple machines working together,' and lists scissors as an example."}, {"text": "Basic tool.", "isCorrect": false, "rationale": "While scissors are a tool, 'basic tool' is too general and doesn't capture the specific scientific classification given in the text."}]}, {"question": "All of the following are ways a machine can help make work easier, according to the text, EXCEPT:", "options": [{"text": "Changing the direction of the force you need to apply.", "isCorrect": false, "rationale": "This is listed as one of the three ways machines can help."}, {"text": "Changing the amount of force you need to apply.", "isCorrect": false, "rationale": "This is listed as one of the three ways machines can help (specifically, using less force over more distance)."}, {"text": "Changing the speed of the movement.", "isCorrect": false, "rationale": "This is listed as one of the three ways machines can help."}, {"text": "Eliminating the need for any applied force by the user.", "isCorrect": true, "rationale": "The text states, 'They cannot do the work for you,' implying a user still needs to apply force, even if changed."}]}, {"question": "When comparing lifting a heavy backpack straight up to a table versus sliding it up a ramp (as in the 'thinkaboutit' example), the ramp primarily demonstrates how a machine can:", "options": [{"text": "Increase the total amount of work required to move the backpack.", "isCorrect": false, "rationale": "The text states that the total amount of work stays the same when using a machine."}, {"text": "Change the direction of the force applied.", "isCorrect": false, "rationale": "While a ramp does involve a change in direction compared to lifting, the primary point of the ramp example given in the introduction is the trade-off between force and distance."}, {"text": "Reduce the force needed by applying it over a longer distance.", "isCorrect": true, "rationale": "The initial ramp example and the 'thinkaboutit' section both highlight that the ramp allows you to use 'less force' by moving the object over a 'longer path,' demonstrating this fundamental trade-off."}, {"text": "Create additional energy to make the task completely effortless.", "isCorrect": false, "rationale": "Machines do not create energy, and the task still requires effort (force applied by the user)."}]}, {"question": "Which of the following best defines a simple machine according to the textbook?", "options": [{"text": "A tool with many complex moving parts designed for highly specialized tasks.", "isCorrect": false, "rationale": "This describes a complex or compound machine, not a simple machine, which has 'few or no moving parts.'"}, {"text": "A basic tool with few or no moving parts that makes work easier by changing the size or direction of a force.", "isCorrect": true, "rationale": "This is the direct definition provided in the text for a simple machine."}, {"text": "Any device that performs work without requiring human intervention or force.", "isCorrect": false, "rationale": "Machines cannot do the work for you; they only change how you apply force, still requiring human intervention."}, {"text": "A machine that creates energy to perform a task more efficiently.", "isCorrect": false, "rationale": "The text explicitly states that machines do not create energy."}]}, {"question": "A student attempts to push a large, immovable boulder with all their might for five minutes. Even though they are exhausted afterward, in a scientific sense, how much work was done on the boulder?", "options": [{"text": "A significant amount of work, proportional to their physical effort.", "isCorrect": false, "rationale": "Scientific work is not measured by personal effort or fatigue, but by force causing movement over a distance."}, {"text": "No work was done, because the boulder did not move from its position.", "isCorrect": true, "rationale": "The text explicitly states: 'If the object does not move, no work is done — no matter how hard you push!' This applies directly to an immovable boulder."}, {"text": "A small amount of work, because some force was applied over a period of time.", "isCorrect": false, "rationale": "Time is not a factor in the scientific definition of work (Work = Force × Distance). Movement is essential."}, {"text": "Work was done only if the student felt tired afterward, indicating energy expenditure.", "isCorrect": false, "rationale": "Personal fatigue is an indicator of energy used by the body, but it does not equate to scientific work being done on an external object if that object does not move."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
