<body>

        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 8, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the term \"concentration\" primarily refer to in the context of solutions?", "options": [{"text": "The total volume of a solution.", "isCorrect": false, "rationale": "The total volume is a measure of space occupied by the solution, not specifically how much solute is within it."}, {"text": "The amount of solvent present in a mixture.", "isCorrect": false, "rationale": "While solvent is a component, concentration specifically focuses on the *solute* relative to the solvent or total solution, not just the solvent amount alone."}, {"text": "How much solute is dissolved in a certain amount of solvent.", "isCorrect": true, "rationale": "The text defines concentration as 'how much solute is dissolved in a certain amount of solvent,' making this the direct and correct definition."}, {"text": "The density of a substance before it's mixed.", "isCorrect": false, "rationale": "Density is a different physical property (mass per unit volume) and concentration refers to the ratio of solute to solvent after mixing."}], "id": "q01"}, {"question": "A chef prepares two batches of soup. Batch X has one packet of seasoning per liter of water, while Batch Y has three packets of the same seasoning per liter of water. How would a scientist describe Batch X compared to Batch Y?", "options": [{"text": "Batch X is more concentrated than Batch Y.", "isCorrect": false, "rationale": "Batch X has less solute (seasoning) for the same amount of solvent (water), so it would be less concentrated, not more."}, {"text": "Batch X is a solution, but Batch Y is a mixture.", "isCorrect": false, "rationale": "Both batches, with dissolved seasoning, are considered solutions (a type of mixture), differing only in their concentration."}, {"text": "Batch X is dilute, while Batch Y is concentrated.", "isCorrect": true, "rationale": "Batch X has less solute (one packet) in the same amount of solvent as Batch Y (three packets), making Batch X dilute and Batch Y concentrated."}, {"text": "Batch X has a higher density than Batch Y.", "isCorrect": false, "rationale": "Batch Y, with more dissolved solute, would generally have a higher density than Batch X, not the other way around."}], "id": "q02"}, {"question": "If you are making lemonade and find it too sweet, what adjustment would effectively make it more dilute?", "options": [{"text": "Adding more sugar to the lemonade.", "isCorrect": false, "rationale": "Adding more sugar (solute) would make the lemonade even more concentrated and sweeter."}, {"text": "Removing some of the water from the lemonade.", "isCorrect": false, "rationale": "Removing water (solvent) would increase the proportion of sugar relative to the remaining water, making the lemonade more concentrated."}, {"text": "Adding more water to the lemonade.", "isCorrect": true, "rationale": "Adding more water (solvent) without adding more sugar (solute) increases the amount of solvent relative to the solute, thereby making the solution more dilute and less sweet."}, {"text": "Heating the lemonade to evaporate the sugar.", "isCorrect": false, "rationale": "Heating lemonade would primarily evaporate water, making the solution more concentrated, not less. Sugar does not easily evaporate."}], "id": "q03"}, {"question": "The \"Super Mixture Challenge\" activity is designed to help students understand which key concept?", "options": [{"text": "How to create new chemical compounds through reactions.", "isCorrect": false, "rationale": "The activity focuses on separating existing substances in a mixture, not on creating new chemical compounds through reactions."}, {"text": "The physical properties of individual pure substances.", "isCorrect": false, "rationale": "While the activity uses physical properties, its primary goal is to demonstrate how to use these properties for *separation* of a complex mixture, not just identifying properties of pure substances."}, {"text": "How to use a series of separation methods to separate a complex mixture.", "isCorrect": true, "rationale": "The text explicitly states the activity's goal: 'you will use three separation methods — one after another — to pull apart a tricky mixture of sand, salt, iron filings, and water.'"}, {"text": "The differences between concentrated and dilute solutions.", "isCorrect": false, "rationale": "Understanding concentration is a preceding topic in the section, but the Super Mixture Challenge itself focuses on separating a mixture's components, not varying concentrations."}], "id": "q04"}, {"question": "In the Super Mixture Challenge, why is a magnet used as the first step to separate iron filings from the mixture?", "options": [{"text": "Iron filings are the only solid component in the mixture.", "isCorrect": false, "rationale": "Sand and salt are also solids in the mixture, so iron filings are not the only solid."}, {"text": "Magnetism is the only physical property that can separate iron.", "isCorrect": false, "rationale": "While magnetism is a key property for iron, other methods like careful sifting or density separation could theoretically separate it under different conditions, but magnetism is the most efficient here."}, {"text": "Iron filings are magnetic, allowing them to be easily attracted and removed by a magnet, unlike the other components.", "isCorrect": true, "rationale": "The text states, 'The iron filings will jump up and stick to the magnet,' indicating their magnetic property is used for separation, a property not shared by sand, salt, or water."}, {"text": "The magnet helps to dissolve the salt faster in the water.", "isCorrect": false, "rationale": "A magnet has no effect on the dissolution rate of salt in water."}], "id": "q05"}, {"question": "According to the \"Think about it\" prompt in the Super Mixture Challenge, what would be the primary issue if you tried to filter the mixture *before* using the magnet?", "options": [{"text": "The salt would not dissolve properly in the water.", "isCorrect": false, "rationale": "The order of magnetism and filtering would not affect the salt's ability to dissolve in water."}, {"text": "The magnet would not work effectively after filtering.", "isCorrect": false, "rationale": "The magnet would still work on iron filings, but the issue is what happens *during* filtering if it's done first."}, {"text": "The iron filings, being solids, would also get trapped in the coffee filter along with the sand, making their separation from sand difficult.", "isCorrect": true, "rationale": "If filtered first, both insoluble solids (sand and iron filings) would be caught by the filter, making it much harder to then separate the iron filings from the sand using a magnet."}, {"text": "The water would evaporate too quickly, preventing proper separation.", "isCorrect": false, "rationale": "Evaporation is the final step and its timing is not directly affected by whether magnetism or filtering occurs first."}], "id": "q06"}, {"question": "What was Alice Ball's significant contribution to medicine?", "options": [{"text": "She discovered a new type of antibiotic to treat bacterial infections.", "isCorrect": false, "rationale": "Alice Ball's work focused on modifying chaulmoogra oil to treat Hansen's disease, which is not an antibiotic discovery."}, {"text": "She developed a way to make chaulmoogra oil water-soluble for effective injection, treating Hansen's disease.", "isCorrect": true, "rationale": "The text explicitly states she 'developed a way to make oil from the chaulmoogra tree dissolve in water so that it could be injected into the body' as a treatment for Hansen's disease."}, {"text": "She invented the process of evaporation to separate salt from water.", "isCorrect": false, "rationale": "Evaporation is a long-established separation method, not an invention by Alice Ball."}, {"text": "She was the first person to identify the cause of Hansen's disease.", "isCorrect": false, "rationale": "Her contribution was developing an effective treatment, not identifying the underlying cause of the disease."}], "id": "q07"}, {"question": "Alice Ball's story is used in the text to emphasize which broader scientific principle?", "options": [{"text": "The importance of publishing one's research immediately to gain credit.", "isCorrect": false, "rationale": "While her story tragically shows the consequences of not publishing, the text frames the takeaway as the scientific impact itself, concluding that 'understanding how substances mix and separate can change — and save — lives.'"}, {"text": "The critical role of understanding how substances mix and separate in solving real-world problems.", "isCorrect": true, "rationale": "The concluding sentence of her biography directly states, 'Her story reminds us that understanding how substances mix and separate can change — and save — lives,' which connects her work to the core topic of the chapter."}, {"text": "The challenges faced by women and minorities in scientific careers.", "isCorrect": false, "rationale": "While her story highlights these challenges, the text explicitly draws a conclusion about the scientific principles, stating that her story 'reminds us that understanding how substances mix and separate can change — and save — lives,' linking it to the content of the unit rather than solely social issues."}, {"text": "The necessity of using advanced laboratory equipment for scientific breakthroughs.", "isCorrect": false, "rationale": "The text does not focus on the equipment she used, but rather her innovative approach to altering molecular structure for solubility."}], "id": "q08"}, {"question": "During the Super Mixture Challenge, a student finishes separating the iron filings and wants to dispose of them. Based on the safety and cleanup guidelines, what is the best way to handle the iron filings?", "options": [{"text": "Rinse them down the sink drain with plenty of water.", "isCorrect": false, "rationale": "The 'setupguide' explicitly states: 'Do not pour sand or filings down the drain,' as they can clog plumbing."}, {"text": "Pour them into the general trash bin without special handling.", "isCorrect": false, "rationale": "The 'setupguide' advises 'Collect iron filings with the magnet before disposing of sand,' implying they should be specifically collected, not just casually discarded in a general bin where they could contaminate other materials."}, {"text": "Keep the magnet in a plastic bag during separation, then wipe the filings into a separate pile for proper disposal.", "isCorrect": true, "rationale": "Both the 'safetynote' and 'setupguide' emphasize keeping the magnet in a plastic bag for easy removal of filings, which implies collecting them separately for proper disposal, not down the drain."}, {"text": "Store them in a sealed container for future use in another experiment.", "isCorrect": false, "rationale": "While possible in some labs, the instructions provided focus on disposal and safety, not on reuse. The primary concern here is proper and safe cleanup as outlined."}], "id": "q09"}, {"question": "A student is challenged to separate a mixture of small plastic beads, salt, and water. Which sequence of methods, based on the principles demonstrated in the Super Mixture Challenge, would be most effective?", "options": [{"text": "Evaporation, then magnetism, then filtering.", "isCorrect": false, "rationale": "Evaporation would leave both plastic beads and salt behind, still mixed. Magnetism is not applicable to plastic beads or salt."}, {"text": "Magnetism, then evaporation, then filtering.", "isCorrect": false, "rationale": "Magnetism is not applicable. Filtering is needed early to remove the insoluble beads."}, {"text": "Filtering, then evaporation.", "isCorrect": true, "rationale": "Filtering would separate the insoluble plastic beads from the salty water. Evaporation would then separate the dissolved salt from the water, leaving pure salt crystals."}, {"text": "Filtering, then magnetism.", "isCorrect": false, "rationale": "Filtering would separate beads from salty water, but magnetism is not relevant for separating salt from water, or for separating the beads themselves."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
