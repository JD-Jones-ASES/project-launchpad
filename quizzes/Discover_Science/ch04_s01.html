<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best defines a force according to the provided text?", "options": [{"text": "A type of energy that makes objects glow.", "isCorrect": false, "rationale": "The text defines force as a push or a pull, not a type of energy or something that makes objects glow."}, {"text": "A push or a pull that can change an object's motion.", "isCorrect": true, "rationale": "This is the direct definition provided in the text: 'Force: a push or a pull that can change an object's motion — making it start, stop, speed up, slow down, or change direction.'"}, {"text": "The inherent ability of an object to move on its own.", "isCorrect": false, "rationale": "The text implies objects need a force to start moving ('A ball sitting still on the ground will not move until something pushes it'), not that they move inherently."}, {"text": "The mass of an object multiplied by its acceleration.", "isCorrect": false, "rationale": "While related to Newton's Second Law (F=ma), this is not the fundamental definition of force given in this introductory section."}]}, {"question": "A soccer ball is sitting motionless on the grass. According to the text, what is required for the ball to start moving?", "options": [{"text": "It needs to be warmed by the sun to reduce friction.", "isCorrect": false, "rationale": "The text states that a ball will not move until something pushes it, not that environmental factors like sun exposure are required to initiate motion."}, {"text": "An external push or pull must be applied to it.", "isCorrect": true, "rationale": "The text explicitly states: 'Start it moving. A ball sitting still on the ground will not move until something pushes it.' A push or pull is a force."}, {"text": "Its internal energy must spontaneously convert to kinetic energy.", "isCorrect": false, "rationale": "The text does not describe internal energy conversions as the cause of motion; it emphasizes external pushes or pulls (forces)."}, {"text": "The grass around it must be completely flat and smooth.", "isCorrect": false, "rationale": "While surface conditions affect motion, the text identifies a 'push' as the necessary action to *start* movement from rest."}]}, {"question": "Which of the following scenarios best demonstrates a force causing an object to 'stop it'?", "options": [{"text": "A person pushing a swing to make it go higher.", "isCorrect": false, "rationale": "This scenario demonstrates speeding up or changing direction/height, not stopping motion."}, {"text": "A car's brakes being applied, bringing it to a halt.", "isCorrect": true, "rationale": "The text states that forces 'stop it,' and gives an example of friction slowing a rolling ball. Car brakes apply a force (friction) to stop the car."}, {"text": "A child kicking a stationary ball to send it flying.", "isCorrect": false, "rationale": "This scenario demonstrates a force causing an object to 'start it moving.'"}, {"text": "A cyclist steering their bike around a corner.", "isCorrect": false, "rationale": "This scenario demonstrates a force causing an object to 'change its direction.'"}]}, {"question": "According to the section, which of the following is NOT one of the four specific ways forces can change an object's motion?", "options": [{"text": "Starting it moving.", "isCorrect": false, "rationale": "The text explicitly lists 'Start it moving' as one of the four things forces can do."}, {"text": "Changing its color.", "isCorrect": true, "rationale": "The text lists starting, stopping, speeding up, and changing direction as effects of forces on motion. Changing an object's color is not an effect on its motion."}, {"text": "Stopping it.", "isCorrect": false, "rationale": "The text explicitly lists 'Stop it' as one of the four things forces can do."}, {"text": "Speeding it up.", "isCorrect": false, "rationale": "The text explicitly lists 'Speed it up' as one of the four things forces can do."}]}, {"question": "A student pushes a toy car very gently, and it moves slowly. If the student wants the car to move much faster, what principle from the text should they apply?", "options": [{"text": "They should ensure the car is completely balanced on its wheels.", "isCorrect": false, "rationale": "While balance can affect motion, the text emphasizes the size of the force applied for changes in speed."}, {"text": "They should apply a bigger force to the car.", "isCorrect": true, "rationale": "The text states: 'The bigger the force, the bigger the change in motion.' Applying a harder push (bigger force) will make it go faster."}, {"text": "They should wait for the car to gather momentum naturally.", "isCorrect": false, "rationale": "The text focuses on external forces changing motion, not natural momentum gain without interaction."}, {"text": "They should make the car lighter by removing parts.", "isCorrect": false, "rationale": "While reducing mass affects acceleration, the text specifically links the *size of the force* to the size of the change in motion, not altering the object's mass."}]}, {"question": "When a tennis player hits a ball with a racket, sending it in a different direction across the court, which primary effect of a force is being demonstrated?", "options": [{"text": "Stopping the ball's motion.", "isCorrect": false, "rationale": "The ball is typically already in motion and continues to move, albeit in a different direction, so it's not being stopped."}, {"text": "Starting the ball's motion from rest.", "isCorrect": false, "rationale": "Hitting a tennis ball usually occurs when it's already in motion; this is not about initiating movement from a standstill."}, {"text": "Changing the ball's direction.", "isCorrect": true, "rationale": "The text directly uses 'Hitting a tennis ball with a racket sends it the other way' as an example of forces changing direction."}, {"text": "Increasing the ball's mass.", "isCorrect": false, "rationale": "Forces do not increase an object's mass; they affect its motion."}]}, {"question": "The 'thinkaboutit' box asks: 'What happens if you give it [a soccer ball] a soft kick? A hard kick? How does the size of the force change the ball's motion?' This question primarily encourages reflection on:", "options": [{"text": "The chemical composition of a soccer ball.", "isCorrect": false, "rationale": "The question is about the 'size of the force' and 'change in motion,' not the ball's material properties."}, {"text": "The relationship between the magnitude of a force and the resulting change in motion.", "isCorrect": true, "rationale": "This question directly addresses how 'soft' versus 'hard' kicks (different magnitudes of force) lead to different outcomes in the ball's motion, linking to 'Bigger and Smaller Forces.'"}, {"text": "The effect of gravity on objects of different masses.", "isCorrect": false, "rationale": "While gravity is a force, the specific comparison is between 'soft kick' and 'hard kick,' which refers to the applied force, not differences in mass or gravity's consistent pull."}, {"text": "How friction slows down a rolling object over time.", "isCorrect": false, "rationale": "The question is about the initial kick and its immediate effect on motion, not the eventual slowing down due to friction."}]}, {"question": "Which of the following actions involves applying a force as defined in the text?", "options": [{"text": "Observing a cloud drifting across the sky.", "isCorrect": false, "rationale": "Observation is a passive action; it does not involve a push or pull that changes an object's motion."}, {"text": "Imagining a heavy box being lifted.", "isCorrect": false, "rationale": "Imagining is a mental act; a force requires a physical push or pull."}, {"text": "Pulling a wagon along a sidewalk.", "isCorrect": true, "rationale": "The text explicitly states, 'When you pull a wagon, you apply a force,' which fits the definition of a push or pull changing motion."}, {"text": "Listening to the sound of ocean waves.", "isCorrect": false, "rationale": "Listening is an auditory activity; it does not involve a physical push or pull to change an object's motion."}]}, {"question": "The text emphasizes that 'Not all forces are the same size. A gentle push on a door opens it slowly. A hard push swings it open fast.' This highlights that:", "options": [{"text": "Only large forces are capable of changing an object's motion.", "isCorrect": false, "rationale": "A 'gentle push' also changes motion, demonstrating that forces of any size can cause change, but the *amount* of change depends on the size of the force."}, {"text": "The direction of a force is more important than its magnitude.", "isCorrect": false, "rationale": "The example directly compares a 'gentle push' vs. 'hard push,' focusing on the magnitude (size) of the force and its impact on speed, not primarily direction."}, {"text": "The magnitude of a force directly influences the degree of change in an object's motion.", "isCorrect": true, "rationale": "This directly aligns with the statement 'The bigger the force, the bigger the change in motion,' which is exemplified by the door pushing scenario."}, {"text": "Forces only act on objects that are already in motion.", "isCorrect": false, "rationale": "The door example, while showing speeding up, doesn't negate the ability of a force to start motion from rest, as stated elsewhere in the text."}]}, {"question": "Based on the section, what is the primary overarching consequence of applying a force to an object?", "options": [{"text": "It causes the object to change its color or texture.", "isCorrect": false, "rationale": "The text focuses on changes to motion, not aesthetic properties like color or texture."}, {"text": "It determines the object's weight relative to its size.", "isCorrect": false, "rationale": "While weight is a force, the primary impact described in the text is on an object's *motion*, not determining its weight itself."}, {"text": "It always brings the object to a complete stop.", "isCorrect": false, "rationale": "Forces can also start motion, speed it up, or change its direction, not just stop it."}, {"text": "It initiates or alters the object's state of motion.", "isCorrect": true, "rationale": "This option encompasses all four effects listed: starting, stopping, speeding up, slowing down, or changing direction, all of which describe alterations to an object's motion."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
