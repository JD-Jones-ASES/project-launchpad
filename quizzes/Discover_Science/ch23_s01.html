<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 23, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the textbook section, what is the precise definition of a chemical?", "options": [{"text": "A substance that is artificial or man-made.", "isCorrect": false, "rationale": "The text clarifies that the word 'chemical' does not mean 'artificial'; natural substances like water and oxygen are also chemicals."}, {"text": "Any substance that has a definite composition — a specific set of atoms arranged in a specific way.", "isCorrect": true, "rationale": "This is the direct definition provided in the text: 'Chemical—any substance that has a definite composition — a specific set of atoms arranged in a specific way.'"}, {"text": "A substance that is inherently dangerous or harmful.", "isCorrect": false, "rationale": "The text explicitly states, 'The word does not mean “dangerous” or “artificial.” It just means “a substance.”'"}, {"text": "A mixture of many different substances combined randomly.", "isCorrect": false, "rationale": "A chemical has a 'definite makeup' and 'specific set of atoms arranged in a specific way,' implying order, not randomness, and specific composition rather than just any mixture."}]}, {"question": "Based on the information presented, which of the following is *least likely* to be considered a chemical or a mixture of chemicals?", "options": [{"text": "The air you breathe.", "isCorrect": false, "rationale": "The text states, 'air — that is a mixture of chemicals, mostly nitrogen (N2) and oxygen (O2).'"}, {"text": "The water you drink.", "isCorrect": false, "rationale": "The text explicitly states, 'Water is a chemical.'"}, {"text": "The minerals in soil.", "isCorrect": false, "rationale": "The text mentions, 'Soil contains minerals and water,' indicating minerals are chemicals."}, {"text": "The concept of gravity.", "isCorrect": true, "rationale": "Gravity is a fundamental force, not a substance made of atoms or having a definite composition. The text emphasizes that 'everything around you is made of chemicals,' referring to matter."}]}, {"question": "The textbook addresses a common misconception about chemicals. What is this misconception?", "options": [{"text": "That chemicals are exclusively found in scientific laboratories.", "isCorrect": false, "rationale": "The text counters this by stating, 'Chemistry is not something far away in a scientist's lab. It is right in your home, every single day.'"}, {"text": "That all chemicals are beneficial and completely safe to use.", "isCorrect": false, "rationale": "While some chemicals are beneficial, the text doesn't claim all are completely safe, but rather clarifies the neutrality of the word 'chemical' itself, not its inherent safety."}, {"text": "That the word 'chemical' implies something is dangerous or artificial.", "isCorrect": true, "rationale": "The text directly states, 'The word does not mean “dangerous” or “artificial.”' and discusses how people say 'That food is full of chemicals!' as though it's bad."}, {"text": "That chemicals cannot undergo changes.", "isCorrect": false, "rationale": "The text explicitly discusses 'chemical changes — reactions that create new substances.'"}]}, {"question": "Which of the following chemicals is specifically mentioned as being used in the kitchen to help make cakes rise?", "options": [{"text": "Salt (NaCl)", "isCorrect": false, "rationale": "Salt is mentioned for seasoning food."}, {"text": "Baking soda (NaHCO3)", "isCorrect": true, "rationale": "The text states, 'Baking soda (NaHCO3) makes cakes rise.'"}, {"text": "Vinegar", "isCorrect": false, "rationale": "Vinegar is mentioned for adding sour flavor to salad dressing."}, {"text": "Cooking oil", "isCorrect": false, "rationale": "Cooking oil is mentioned for coating pans."}]}, {"question": "A primary function of both soap and detergent, as described in the text, is to:", "options": [{"text": "Act as a disinfectant to kill all germs instantly.", "isCorrect": false, "rationale": "Bleach is mentioned for killing germs, but for soap and detergent, the focus is on removing dirt and oils."}, {"text": "Help remove oils and dirt by allowing them to wash away in water.", "isCorrect": true, "rationale": "The text states, 'Soap and shampoo help oils and dirt wash away in water' and 'Detergent breaks up stains in your clothes,' which implies removing dirt and grease."}, {"text": "Add a pleasant scent to household items.", "isCorrect": false, "rationale": "While some products do this, it's not described as the primary function in the text."}, {"text": "Make surfaces appear shiny and new.", "isCorrect": false, "rationale": "This is not mentioned as a primary function for either substance."}]}, {"question": "How does the definition of a 'chemical' in this section build upon concepts learned in Unit 13 about atoms?", "options": [{"text": "It explains that atoms are the smallest chemicals.", "isCorrect": false, "rationale": "The text states that atoms 'join together to form molecules' and a chemical 'is just a substance made of specific atoms arranged in a specific way,' indicating atoms are components of chemicals, not chemicals themselves in this context."}, {"text": "It clarifies that chemicals are substances made of specific atoms arranged in a specific way.", "isCorrect": true, "rationale": "The text directly connects these ideas: 'In Unit 13, you learned that everything is made of tiny particles called atoms. Atoms join together to form molecules. A chemical is just a substance made of specific atoms arranged in a specific way.'"}, {"text": "It introduces the idea that atoms can be dangerous.", "isCorrect": false, "rationale": "The text does not discuss the danger of atoms themselves in this context."}, {"text": "It suggests that atoms are only found in artificial chemicals.", "isCorrect": false, "rationale": "This contradicts the idea that 'everything is made of chemicals,' including natural substances."}]}, {"question": "The reaction between baking soda and vinegar, which creates new substances, is an example of what broader concept introduced in Unit 18?", "options": [{"text": "Physical change.", "isCorrect": false, "rationale": "Physical changes do not create new substances. The text specifically mentions 'new substances form' in this reaction."}, {"text": "Chemical change.", "isCorrect": true, "rationale": "The text states, 'In Unit 18, you learned about chemical changes — reactions that create new substances.' The baking soda and vinegar example is given immediately after this explanation."}, {"text": "Dissolution.", "isCorrect": false, "rationale": "While some dissolution may occur, the key characteristic highlighted in the text is the 'creation of new substances,' which points to a chemical change, not just a substance dissolving."}, {"text": "Evaporation.", "isCorrect": false, "rationale": "Evaporation is a physical change, and not the primary event described in the baking soda and vinegar reaction that forms new substances."}]}, {"question": "The text challenges the common idea that 'chemicals are something bad.' What is the main point the author makes to counter this idea?", "options": [{"text": "Chemicals are primarily used in scientific research for good.", "isCorrect": false, "rationale": "While often true, the text's main point to counter the misconception is about the definition and ubiquity of chemicals, not primarily their research applications."}, {"text": "The word 'chemical' simply means a substance with a definite makeup and is a neutral term.", "isCorrect": true, "rationale": "The text explicitly states: 'The word chemical simply means a substance that has a definite makeup... The word does not mean “dangerous” or “artificial.” It just means “a substance.”'"}, {"text": "Only artificial chemicals are dangerous; natural ones are always safe.", "isCorrect": false, "rationale": "The text does not make this distinction or claim; it emphasizes that the word 'chemical' itself is neutral."}, {"text": "Dangerous chemicals are rarely found in everyday life.", "isCorrect": false, "rationale": "The text focuses on clarifying the meaning of the word 'chemical,' not on the frequency of dangerous substances, though it implies context and amount matter for safety."}]}, {"question": "A student states, 'I only use natural products because they don't contain any chemicals, unlike processed foods.' Based on the section 'Chemistry Is Everywhere,' how would you best explain why this statement is flawed?", "options": [{"text": "Natural products often contain *more* dangerous chemicals than processed foods.", "isCorrect": false, "rationale": "The text does not make a comparative judgment about the danger levels between natural and processed products. It focuses on the definition of a chemical."}, {"text": "The statement is flawed because everything, including natural products like water, air, and food, is made of chemicals.", "isCorrect": true, "rationale": "The core message of the section is that 'everything around you is made of chemicals,' directly addressing the misconception that 'natural' implies 'chemical-free.'"}, {"text": "Only highly purified substances are considered chemicals, not natural mixtures.", "isCorrect": false, "rationale": "This contradicts the text's definition and examples, which include mixtures like air and substances like water, salt, and soil minerals as chemicals."}, {"text": "Chemicals are only present if they are listed on an ingredients label.", "isCorrect": false, "rationale": "The presence of chemicals is fundamental to matter, regardless of whether they are explicitly labeled or if they are naturally occurring."}]}, {"question": "What specific groups of chemicals are introduced at the end of the section as the focus for further study?", "options": [{"text": "Solids, liquids, and gases.", "isCorrect": false, "rationale": "While these are states of matter, the text specifies different chemical groups for future study."}, {"text": "Metals and non-metals.", "isCorrect": false, "rationale": "These are categories of elements, but not the specific groups mentioned for the next section."}, {"text": "Acids and bases.", "isCorrect": true, "rationale": "The text concludes by stating, 'Now we are going to take a closer look at the chemicals in your everyday life, starting with two important groups: acids and bases.'"}, {"text": "Organic and inorganic compounds.", "isCorrect": false, "rationale": "These are broad categories of compounds, but the text specifically names 'acids and bases' as the next topic."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
