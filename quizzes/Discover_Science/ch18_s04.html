        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 18, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following processes in the kitchen is an example of a chemical change where sugar molecules break apart and recombine into new molecules, resulting in a distinct color and smell?", "options": [{"text": "Melting butter in a pan.", "isCorrect": false, "rationale": "Melting butter is a physical change, as the butter molecules remain butter; only their state changes from solid to liquid."}, {"text": "Caramelizing sugar for a dessert.", "isCorrect": true, "rationale": "Caramelization involves the sugar molecules breaking apart and recombining into new molecules, which is a chemical change evidenced by the golden-brown color and rich, sweet smell."}, {"text": "Dissolving salt in water to make a brine.", "isCorrect": false, "rationale": "Dissolving salt is a physical change. The salt molecules are still salt molecules, just dispersed in water; they have not formed new substances."}, {"text": "Freezing water to make ice cubes.", "isCorrect": false, "rationale": "Freezing water is a physical change, as water molecules remain water molecules, only changing from liquid to solid state."}]}, {"question": "Antoine Lavoisier's Law of Conservation of Matter explains what happens to the atoms during a chemical change. If you burn a log in a sealed container, what would Lavoisier predict about the total mass of all substances involved?", "options": [{"text": "The total mass would decrease because the log appears to disappear, and some matter is lost as smoke and gases.", "isCorrect": false, "rationale": "This contradicts Lavoisier's discovery. While the log visibly changes, matter is not lost; it is simply transformed into new substances."}, {"text": "The total mass would increase because new ash and gases are created during the burning process.", "isCorrect": false, "rationale": "Lavoisier found that new matter is not created. The mass of the reactants (log and oxygen) equals the mass of the products (ash, smoke, gases)."}, {"text": "The total mass of the log, plus the oxygen consumed, would be equal to the total mass of the ash, smoke, and gases produced.", "isCorrect": true, "rationale": "This is the essence of the Law of Conservation of Matter. Lavoisier's experiments showed that atoms are only rearranged, meaning the total mass before and after a chemical change remains constant."}, {"text": "The total mass would vary depending on the type of wood and the efficiency of the burning process, making it unpredictable.", "isCorrect": false, "rationale": "The Law of Conservation of Matter holds true for all chemical changes, regardless of the specific reactants or efficiency, assuming a closed system where all products are measured."}]}, {"question": "Consider the chemical change involved in photosynthesis. Which of the following statements best describes the relationship between photosynthesis and breathing in terms of chemical reactions?", "options": [{"text": "Photosynthesis and breathing are unrelated chemical processes, occurring in different organisms.", "isCorrect": false, "rationale": "The text explicitly states that 'In a way, breathing is the opposite of photosynthesis,' indicating a direct relationship between the two processes."}, {"text": "Both photosynthesis and breathing primarily aim to build complex sugar molecules from simpler ones.", "isCorrect": false, "rationale": "Photosynthesis builds sugar, but breathing breaks down sugar to release energy, making this statement incorrect for breathing."}, {"text": "Photosynthesis uses carbon dioxide and water to produce sugar and oxygen, while breathing uses oxygen and sugar to produce carbon dioxide and water.", "isCorrect": true, "rationale": "This statement accurately describes the reactants and products of both processes, highlighting their inverse relationship as mentioned in the text."}, {"text": "Breathing is a physical change, whereas photosynthesis is a chemical change.", "isCorrect": false, "rationale": "Both breathing and photosynthesis are complex chemical changes involving the rearrangement of atoms and the formation of new substances."}]}, {"question": "A student observes a forgotten metal tool left outside for several weeks. It now has a flaky, reddish-brown coating. Based on the textbook, what chemical change has occurred, and what are the primary reactants?", "options": [{"text": "Decomposition; the tool's molecules are breaking down due to microorganisms.", "isCorrect": false, "rationale": "Decomposition typically refers to organic matter breaking down. Rusting is a specific reaction of metal with its environment, not decomposition by microorganisms."}, {"text": "Photosynthesis; the tool is absorbing sunlight to change its surface.", "isCorrect": false, "rationale": "Photosynthesis is a process unique to plants and some other organisms, not inanimate metal objects. It also has a different set of reactants and products."}, {"text": "Rusting; iron in the tool is reacting with oxygen and water from the air.", "isCorrect": true, "rationale": "The text describes rust as a 'flaky reddish-brown coating' formed when 'Iron reacts with oxygen and water in the air to form iron oxide,' which perfectly matches the observation."}, {"text": "Caramelization; the metal's surface is undergoing a heat-induced transformation.", "isCorrect": false, "rationale": "Caramelization applies to sugars undergoing heat-induced chemical changes, not to metals reacting with environmental factors."}]}, {"question": "When an egg is cooked, its proteins change shape permanently, transforming from a clear, runny substance to a white, firm solid. This is an example of a chemical change because:", "options": [{"text": "The egg's temperature has increased significantly.", "isCorrect": false, "rationale": "While heat is involved, the temperature change itself is not the reason it's a chemical change. The chemical change refers to the new substances formed or rearranged structure, not just the energy input."}, {"text": "The water content of the egg has evaporated, making it firmer.", "isCorrect": false, "rationale": "While some water might evaporate, the primary reason for the transformation of the egg's texture and appearance is the permanent change in protein structure, not just water loss."}, {"text": "New bonds have formed within the proteins, creating new substances with different properties.", "isCorrect": true, "rationale": "The text states that 'Heat causes the proteins in meat and eggs to change shape permanently...The proteins have formed new bonds — a chemical change you can see and taste.' This indicates the formation of new substances/structures."}, {"text": "The egg has simply changed its physical state from liquid to solid.", "isCorrect": false, "rationale": "This is more than a simple physical state change. The proteins themselves have undergone irreversible structural changes, meaning new substances (denatured proteins) have formed, making it a chemical change."}]}, {"question": "You are making bread, and you add baking soda and buttermilk to the dough. You notice the dough starts to rise. What is the primary chemical change responsible for the dough rising?", "options": [{"text": "Proteins in the flour are reacting with heat, causing the dough to expand.", "isCorrect": false, "rationale": "While proteins do react with heat in the oven, the initial rising of the dough from baking soda and buttermilk is due to gas production, not protein changes."}, {"text": "The mixing action incorporates air bubbles, which cause the dough to expand.", "isCorrect": false, "rationale": "While mixing does incorporate some air, the significant rising from leavening agents like baking soda is due to chemically produced gas, not just trapped air."}, {"text": "Baking soda reacts with the acid in buttermilk to produce carbon dioxide gas, which gets trapped in the dough.", "isCorrect": true, "rationale": "The text explains, 'When you mix baking soda with an acid like vinegar or buttermilk, carbon dioxide gas (CO2) forms. Those tiny gas bubbles get trapped in the dough or batter and make it rise.'"}, {"text": "Sugar molecules are caramelizing and creating a sticky network that traps steam.", "isCorrect": false, "rationale": "Caramelization occurs with direct heat and sugar, not as the primary leavening action of baking soda and buttermilk in dough."}]}, {"question": "Which of the following scenarios describes a chemical change that returns nutrients to the soil, creating new substances from existing organic matter?", "options": [{"text": "A rock breaking into smaller pieces due to weathering by wind and rain.", "isCorrect": false, "rationale": "This is a physical change (erosion/weathering), where the rock material remains the same, only its size and shape change."}, {"text": "Water evaporating from a puddle on a hot day.", "isCorrect": false, "rationale": "This is a physical change, as water changes from liquid to gas but remains H2O molecules."}, {"text": "A fallen leaf decomposing on the forest floor.", "isCorrect": true, "rationale": "The text states that in 'Decomposition: ...tiny living things called decomposers break the leaf's molecules apart. New substances form and return nutrients to the soil. The leaf does not just get smaller — it changes into different materials. That is a chemical change.'"}, {"text": "The growth of a plant from a seed.", "isCorrect": false, "rationale": "While plant growth involves many chemical changes, the question asks about returning nutrients to the soil from existing organic matter, which is decomposition, not growth itself."}]}, {"question": "Imagine you eat a sandwich for lunch. The process of digestion in your body is a complex chemical change. What key indicator mentioned in the text confirms that digestion is indeed a chemical change and not merely a physical one?", "options": [{"text": "The sandwich gets smaller as it moves through the digestive tract.", "isCorrect": false, "rationale": "Getting smaller is a physical change (mechanical breakdown). A chemical change involves the formation of new substances, not just a reduction in size."}, {"text": "Your body produces heat during the process of breaking down food.", "isCorrect": false, "rationale": "While heat is released, it is one of the 'clues' for a chemical change, but not the most definitive confirmation that new substances are formed. Many physical processes also involve heat transfer."}, {"text": "Special chemicals called enzymes help speed up the reactions.", "isCorrect": false, "rationale": "Enzymes are catalysts for chemical reactions, confirming that chemical reactions are occurring, but the definitive indicator for *why* it's a chemical change is the resulting new substances."}, {"text": "You cannot put the sandwich back together because it has been broken down into simpler substances for your body to use.", "isCorrect": true, "rationale": "The text explicitly uses this as an example: 'The sandwich you ate at lunch is being turned into energy and building materials for your cells. You cannot put the sandwich back together — that is a sure sign of a chemical change!'"}]}, {"question": "Which of the following sets of observations would most strongly indicate that a chemical change, rather than a physical change, has occurred?", "options": [{"text": "A substance changes from a liquid to a gas, and then back to a liquid when cooled.", "isCorrect": false, "rationale": "This describes a phase change (physical change) which is typically reversible, as the substance remains chemically the same."}, {"text": "A solid dissolves in water, and the original solid can be recovered by evaporating the water.", "isCorrect": false, "rationale": "Dissolving and evaporation are physical changes, as the original substance can be retrieved, indicating no new chemical compounds were formed."}, {"text": "Two clear liquids are mixed, resulting in an immediate color change, the release of gas bubbles, and the container becoming warm.", "isCorrect": true, "rationale": "The text lists 'color changes, gas bubbles, heat or light, new smells, and permanence' as clues for chemical changes. This option presents multiple strong indicators of a chemical reaction and the formation of new substances."}, {"text": "A metal object bends out of shape, but its surface remains shiny and unchanged.", "isCorrect": false, "rationale": "Bending is a physical deformation. As long as the metal itself isn't corroding or otherwise reacting, its chemical composition remains the same."}]}, {"question": "Which statement accurately describes a key similarity between fire and the process of growing new bone, muscle, and skin in the human body?", "options": [{"text": "Both processes primarily involve the breaking down of complex molecules into simpler ones to release energy.", "isCorrect": false, "rationale": "Fire does break down wood to release energy. However, growing involves *building* new complex molecules from simpler ones, which is the opposite."}, {"text": "Both are examples of rapid, uncontrolled chemical changes that release significant heat and light.", "isCorrect": false, "rationale": "Fire is rapid and releases heat/light. Growing is a slow, controlled process, not rapid or primarily heat/light releasing in the dramatic way fire is."}, {"text": "Both are chemical changes that result in the formation of entirely new substances.", "isCorrect": true, "rationale": "Fire transforms wood into ash and gases (new substances). Growing involves the body 'Building new molecules from smaller ones' (new substances like bone, muscle, skin), which the text states 'is a chemical change, too.' Both fundamentally involve the creation of new substances."}, {"text": "Both rely on external energy sources (sunlight for fire, food for growth) to initiate the chemical changes.", "isCorrect": false, "rationale": "Fire is initiated by heat/ignition, not directly by sunlight in the same way plants use it. While growth uses energy from food, the primary similarity is the chemical transformation, not the specific energy source initiation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
