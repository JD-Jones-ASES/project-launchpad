    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 31, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of the 'What's Next? A Preview of Middle School Science' section for students?", "options": [{"text": "To teach detailed new scientific concepts that will be covered in middle school.", "isCorrect": false, "rationale": "The section explicitly states its purpose is 'not to teach new concepts' but rather to build anticipation."}, {"text": "To build excitement and anticipation for the advanced science topics awaiting them in middle school.", "isCorrect": true, "rationale": "The 'teachernote' highlights the goal 'to build anticipation, not to teach new concepts. Keep the tone light and enthusiastic.'"}, {"text": "To test students' foundational knowledge in preparation for middle school science.", "isCorrect": false, "rationale": "While it mentions foundational knowledge, the primary goal is not to test it, but to preview and excite."}, {"text": "To assign preliminary homework for the upcoming middle school science curriculum.", "isCorrect": false, "rationale": "The section does not mention assigning homework; its focus is on previewing content."}]}, {"question": "If a student is particularly interested in understanding how characteristics are passed down from parents to their offspring, which specific area of Life Science will they delve into in middle school?", "options": [{"text": "The detailed study of the Earth's atmosphere.", "isCorrect": false, "rationale": "This topic falls under Earth Science, not Life Science, and concerns Earth's climate and layers."}, {"text": "The science of genetics and the structure of DNA.", "isCorrect": true, "rationale": "The text states, 'You will study genetics — the science of how traits are passed from parents to offspring. You will learn about DNA...'"}, {"text": "The principles of balancing chemical equations.", "isCorrect": false, "rationale": "Balancing chemical equations is a topic covered in Chemistry, not Life Science."}, {"text": "Newton's three laws of motion in mathematical detail.", "isCorrect": false, "rationale": "Newton's laws of motion are a core topic in Physics, not Life Science."}]}, {"question": "A student observes a volcanic eruption and wonders about the forces causing such dramatic geological events. Which Earth Science topic will provide a deeper understanding of this phenomenon in middle school?", "options": [{"text": "The conservation of matter in chemical reactions.", "isCorrect": false, "rationale": "Conservation of matter is a Chemistry concept, not directly related to volcanic activity."}, {"text": "The study of simple electrical circuits.", "isCorrect": false, "rationale": "Simple electrical circuits are a Physics topic."}, {"text": "Plate tectonics and the layers deep inside the Earth.", "isCorrect": true, "rationale": "The text states, 'You will study plate tectonics... You will explore the layers deep inside the Earth and learn how volcanoes form.'"}, {"text": "How ecosystems respond to change over long periods of time.", "isCorrect": false, "rationale": "This is a Life Science topic focused on biological systems, not geological events like volcanoes."}]}, {"question": "Having already learned about atoms and elements, what new, specific aspect of atomic structure will students investigate in more detail in middle school Chemistry?", "options": [{"text": "The basic concept of an atom as the smallest unit of matter.", "isCorrect": false, "rationale": "Students 'already understand atoms,' implying this foundational concept is prior knowledge."}, {"text": "The arrangement of the periodic table by increasing atomic number.", "isCorrect": false, "rationale": "While the periodic table is revisited, the 'much more detail' refers to 'why elements are arranged the way they are and how their properties follow patterns,' not just basic arrangement."}, {"text": "The roles and properties of protons, neutrons, and electrons within an atom.", "isCorrect": true, "rationale": "The text explicitly states, 'You will study the structure of atoms (protons, neutrons, electrons).'"}, {"text": "How different elements combine to form various chemical compounds.", "isCorrect": false, "rationale": "Students 'already understand... molecules, compounds, chemical formulas,' indicating this is foundational knowledge."}]}, {"question": "How will the study of Newton's three laws of motion evolve in middle school Physics compared to earlier learning?", "options": [{"text": "Students will learn about these laws for the first time.", "isCorrect": false, "rationale": "Students 'already understand forces, motion,' implying they have foundational knowledge of these concepts."}, {"text": "They will explore these laws exclusively through qualitative observations.", "isCorrect": false, "rationale": "The text specifies 'in mathematical detail,' which is a quantitative approach, not just qualitative."}, {"text": "They will delve into the mathematical details of these laws.", "isCorrect": true, "rationale": "The text clearly states, 'You will study Newton's three laws of motion in mathematical detail.'"}, {"text": "The focus will be solely on the historical context of Newton's discoveries.", "isCorrect": false, "rationale": "While historical context might be touched upon, the 'mathematical detail' indicates a deeper scientific exploration, not just history."}]}, {"question": "Based on the preview, which of the following is *not* explicitly mentioned as a new, deeper topic for middle school science?", "options": [{"text": "Learning about nuclear energy and the energy stored in an atom's nucleus.", "isCorrect": false, "rationale": "This is mentioned under Physics: 'You will learn about nuclear energy — the energy stored inside the nucleus of an atom.'"}, {"text": "Understanding how the periodic table's arrangement reflects element properties.", "isCorrect": false, "rationale": "This is mentioned under Chemistry: 'You will learn about the periodic table in much more detail — why elements are arranged the way they are and how their properties follow patterns.'"}, {"text": "Investigating the process of photosynthesis and cellular respiration in detail.", "isCorrect": true, "rationale": "While related to Life Science, the specific topics mentioned for deeper dives are cells, genetics, DNA, and ecosystem response to change. Photosynthesis and cellular respiration are not explicitly listed as new deeper topics."}, {"text": "Exploring how Earth's climate has changed over millions of years.", "isCorrect": false, "rationale": "This is mentioned under Earth Science: 'You will study the atmosphere in detail and learn how climate has changed over millions of years.'"}]}, {"question": "A team of environmental scientists is using satellite imagery to track deforestation and its impact on local animal populations over several decades. Which two branches of science from the preview are most directly involved in their work?", "options": [{"text": "Physics (electricity) and Chemistry (reaction rates).", "isCorrect": false, "rationale": "These topics are not directly related to satellite imagery, deforestation, or animal populations."}, {"text": "Earth Science (satellite data, climate) and Life Science (ecosystems, adaptation).", "isCorrect": true, "rationale": "Earth Science involves 'studying satellite data and maps' and 'how climate has changed.' Life Science includes 'how ecosystems respond to change over long periods of time' and 'adaptation,' which applies to animal populations."}, {"text": "Chemistry (atomic structure) and Physics (Newton's laws of motion).", "isCorrect": false, "rationale": "These topics are not directly related to environmental monitoring or ecological impacts."}, {"text": "Life Science (cell division) and Earth Science (the rock cycle).", "isCorrect": false, "rationale": "Cell division and the rock cycle are less directly relevant to tracking deforestation and its impact on animal populations than ecosystem response and satellite data."}]}, {"question": "A student is intrigued by how different elements combine to form new substances and wants to learn how to represent these transformations symbolically. Which specific skill will they develop in middle school Chemistry?", "options": [{"text": "Measuring the energy carried by different types of waves.", "isCorrect": false, "rationale": "This is a topic in Physics, not Chemistry, focusing on energy transfer via waves."}, {"text": "Balancing chemical equations to show conservation of matter.", "isCorrect": true, "rationale": "The text states, 'You will balance chemical equations,' which directly addresses representing chemical transformations symbolically while maintaining conservation of matter."}, {"text": "Analyzing satellite data to understand global weather patterns.", "isCorrect": false, "rationale": "This is an Earth Science topic related to atmosphere and climate."}, {"text": "Observing cell division under a microscope.", "isCorrect": false, "rationale": "This is a Life Science topic focused on biology, not chemical reactions."}]}, {"question": "In middle school Physics, students will expand their understanding of how energy travels through different mediums, moving beyond just sound and light to include all types of waves. Which concept does this deeper dive focus on?", "options": [{"text": "The detailed study of chemical bonds.", "isCorrect": false, "rationale": "Chemical bonds are a Chemistry topic, focusing on atomic interactions, not general energy transfer via waves."}, {"text": "The process of genetic inheritance.", "isCorrect": false, "rationale": "Genetic inheritance is a Life Science topic, concerning biological traits."}, {"text": "Waves and how they carry energy.", "isCorrect": true, "rationale": "The text states, 'You will learn about waves — not just sound and light, but all types of waves and how they carry energy.'"}, {"text": "The long-term effects of erosion on landforms.", "isCorrect": false, "rationale": "Erosion is an Earth Science topic, focusing on geological processes."}]}, {"question": "The preview mentions that in middle school Life Science, students will 'explore how ecosystems respond to change over long periods of time.' Which foundational concept, listed as something students 'already understand,' would be *most essential* for grasping this deeper topic?", "options": [{"text": "The rock cycle.", "isCorrect": false, "rationale": "The rock cycle is an Earth Science concept and not directly related to how living systems within an ecosystem respond to change."}, {"text": "Chemical formulas.", "isCorrect": false, "rationale": "Chemical formulas are a Chemistry concept and not directly relevant to ecosystem response over time."}, {"text": "Adaptation.", "isCorrect": true, "rationale": "The text states students 'already understand... adaptation.' Understanding how organisms adapt is fundamental to comprehending how entire ecosystems, composed of these organisms, respond and change over long periods."}, {"text": "Newton's laws of motion.", "isCorrect": false, "rationale": "Newton's laws of motion are a Physics concept and not directly applicable to ecosystem dynamics."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
