    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 17, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary process that leads to the formation of a cloud?", "options": [{"text": "Warm, dry air descends and expands, releasing moisture.", "isCorrect": false, "rationale": "Cloud formation requires moist air to rise and cool, not dry air to descend and expand."}, {"text": "Cold, moist air rises, heats up, and evaporates.", "isCorrect": false, "rationale": "While moist air is involved, it cools as it rises, and water vapor condenses, rather than heats up and evaporates."}, {"text": "Warm, moist air rises, cools, and its water vapor condenses into tiny droplets or ice crystals.", "isCorrect": true, "rationale": "This accurately describes the process: warm, moist air rises, cools as it gains altitude, and the water vapor condenses into visible water droplets or ice crystals, forming a cloud."}, {"text": "Cold air pushes warm air down, causing water to freeze.", "isCorrect": false, "rationale": "This describes a frontal system, not the general process of cloud formation, which involves rising air."}]}, {"question": "A student observes small, puffy white clouds with flat bottoms in the morning. By late afternoon, these clouds have grown very tall and dark. What weather change should the student anticipate?", "options": [{"text": "Continued fair weather throughout the evening.", "isCorrect": false, "rationale": "While small cumulus clouds indicate fair weather, their growth into tall, dark clouds signals a significant change."}, {"text": "A long period of light drizzle and overcast skies.", "isCorrect": false, "rationale": "This description typically matches stratus clouds, not rapidly growing cumulus clouds."}, {"text": "Thunderstorms, heavy rain, and possibly hail.", "isCorrect": true, "rationale": "The text states that if cumulus clouds grow very tall, they can turn into cumulonimbus clouds, which are towering storm clouds that bring thunderstorms, heavy rain, and sometimes hail."}, {"text": "Clear skies and dropping temperatures as a cold front passes.", "isCorrect": false, "rationale": "Tall, dark clouds are indicative of active weather, not clear skies."}]}, {"question": "If the sky is covered entirely by a flat, gray, blanket-like cloud formation from which light rain or drizzle is falling, what type of cloud is most likely present?", "options": [{"text": "Cumulus cloud", "isCorrect": false, "rationale": "Cumulus clouds are puffy and white, typically associated with fair weather or heavy thunderstorms if they grow tall, not flat, gray, and drizzly."}, {"text": "Cirrus cloud", "isCorrect": false, "rationale": "Cirrus clouds are thin, wispy, high-altitude, and made of ice crystals, not flat, gray, or rain-bearing in this manner."}, {"text": "Stratus cloud", "isCorrect": true, "rationale": "The text describes stratus clouds as flat, gray, forming in layers like a blanket, covering the sky, and capable of producing light rain or drizzle."}, {"text": "Cumulonimbus cloud", "isCorrect": false, "rationale": "Cumulonimbus clouds bring heavy thunderstorms and hail, and are towering, not flat and gray with light drizzle."}]}, {"question": "Why are cirrus clouds described as thin, wispy, and feathery, and made entirely of ice crystals?", "options": [{"text": "They form at very low altitudes where temperatures are below freezing.", "isCorrect": false, "rationale": "Cirrus clouds form at very high altitudes, not low altitudes."}, {"text": "They are made of a mix of water droplets and ice crystals due to fluctuating temperatures.", "isCorrect": false, "rationale": "The text explicitly states cirrus clouds are made 'entirely of ice crystals' because of the extreme cold at their altitude."}, {"text": "They form very high in the atmosphere where the air is extremely cold.", "isCorrect": true, "rationale": "Cirrus clouds are the highest of the three types and form where the air is extremely cold, causing water vapor to freeze into ice crystals, which explains their thin, wispy appearance."}, {"text": "They are composed of dust particles and pollutants, not water.", "isCorrect": false, "rationale": "Clouds are primarily composed of water droplets or ice crystals, not dust and pollutants."}]}, {"question": "Based on the information about cloud heights, which statement accurately compares the typical altitudes of different cloud types?", "options": [{"text": "Cumulus clouds are generally found higher than cirrus clouds.", "isCorrect": false, "rationale": "The text states cirrus clouds are high altitude (above 6 km), while cumulus are low to middle altitude (1–6 km), making cirrus higher."}, {"text": "Stratus clouds always form at ground level.", "isCorrect": false, "rationale": "While fog is ground-level stratus, stratus clouds can form up to about 2 km, not exclusively at ground level."}, {"text": "Cirrus clouds form in the highest part of the atmosphere mentioned, above both stratus and cumulus.", "isCorrect": true, "rationale": "The text specifies Cirrus: High altitude (above 6 km), Cumulus: Low to middle altitude (1–6 km), and Stratus: Low altitude (ground level to about 2 km), confirming cirrus as the highest."}, {"text": "Cumulus clouds are exclusively low-altitude clouds, never reaching middle altitudes.", "isCorrect": false, "rationale": "The text states cumulus clouds are low to middle altitude (about 1–6 km), so they can reach middle altitudes."}]}, {"question": "A farmer sees cirrus clouds in the sky first thing in the morning. Later in the day, she notices these clouds becoming thicker and covering more of the sky. What should the farmer infer about the upcoming weather?", "options": [{"text": "The fair weather will continue without any changes.", "isCorrect": false, "rationale": "While cirrus clouds initially mean fair weather, their thickening and spreading suggest a change is coming, as noted in the text."}, {"text": "Heavy thunderstorms are imminent.", "isCorrect": false, "rationale": "Thickening cirrus suggests a change, but not necessarily immediate heavy thunderstorms, which are linked to cumulonimbus clouds."}, {"text": "Fair weather is present now, but a change in weather may be on the way.", "isCorrect": true, "rationale": "The text's 'What Clouds Tell Us' guide states: 'Cirrus (wispy, high) — Fair weather now, but a change may be coming', especially if they thicken."}, {"text": "Overcast skies with drizzle will likely occur all day.", "isCorrect": false, "rationale": "Overcast skies with drizzle are characteristic of stratus clouds, not thickening cirrus clouds."}]}, {"question": "During the 'Be a Meteorologist for a Week' activity, a student diligently records observations. On Day 3, they note 'tall cumulonimbus' in the 'Clouds' column and 'heavy rain, thunder, and lightning' in the 'Precipitation' column. What pattern is this observation most directly illustrating?", "options": [{"text": "The presence of cirrus clouds often precedes clear skies.", "isCorrect": false, "rationale": "This observation is about cumulonimbus clouds and heavy storms, not cirrus clouds or clear skies."}, {"text": "Fog is a type of stratus cloud that forms at ground level.", "isCorrect": false, "rationale": "This observation is about cumulonimbus clouds and heavy storms, not fog or stratus clouds."}, {"text": "Rapidly growing cumulus clouds can develop into storm-producing cumulonimbus clouds.", "isCorrect": true, "rationale": "The text explains that if cumulus clouds grow very tall during the day, they can turn into cumulonimbus clouds, which bring thunderstorms, heavy rain, and hail. The student's observation directly exemplifies this transformation and its associated weather."}, {"text": "Stratus clouds typically bring light drizzle and overcast conditions.", "isCorrect": false, "rationale": "This describes stratus clouds, which are different from the tall, storm-producing cumulonimbus clouds observed."}]}, {"question": "If you are walking through dense fog on a cool morning, which statement accurately describes what you are experiencing?", "options": [{"text": "You are experiencing precipitation from a high-altitude cloud.", "isCorrect": false, "rationale": "Fog is a cloud at ground level, not precipitation from a high-altitude cloud."}, {"text": "You are walking through a stratus cloud that has formed at ground level.", "isCorrect": true, "rationale": "The text explicitly states: 'Fog is actually a stratus cloud that forms right at ground level. If you have ever walked through fog, you were walking through a cloud!'"}, {"text": "You are inside a cumulus cloud that has descended to the ground.", "isCorrect": false, "rationale": "Cumulus clouds are distinct puffy clouds and do not descend to ground level as fog."}, {"text": "You are observing a collection of ice crystals forming near the ground.", "isCorrect": false, "rationale": "Fog typically consists of tiny water droplets, not ice crystals, unless temperatures are well below freezing, forming freezing fog."}]}, {"question": "A meteorologist observes two types of clouds: a flat, gray layer close to the ground, and thin, wispy streaks very high in the sky. Which conclusion about their composition is most likely correct?", "options": [{"text": "Both clouds are made primarily of ice crystals.", "isCorrect": false, "rationale": "The flat, gray layer (stratus) close to the ground is generally made of water droplets, while only the high, wispy streaks (cirrus) are made of ice crystals."}, {"text": "The flat, gray cloud is made of ice crystals, while the wispy streaks are water droplets.", "isCorrect": false, "rationale": "This is the opposite of what the text describes. Low-altitude stratus clouds are water droplets, and high-altitude cirrus clouds are ice crystals."}, {"text": "The flat, gray cloud consists mainly of water droplets, and the wispy streaks are made of ice crystals.", "isCorrect": true, "rationale": "The flat, gray layer close to the ground is a stratus cloud, which forms at low altitudes and is made of water droplets. The thin, wispy streaks very high in the sky are cirrus clouds, which form in extremely cold conditions and are made of ice crystals."}, {"text": "Both clouds are composed of a mixture of water droplets and dust particles.", "isCorrect": false, "rationale": "While dust can be present as condensation nuclei, clouds are primarily water droplets or ice crystals. Also, cirrus clouds are entirely ice crystals, not a mixture of water and dust."}]}, {"question": "An advanced student, using the 'nimbo-' prefix rule, learns that 'Nimbostratus' clouds bring steady rain. Given this, what would be the most logical inference about the difference between a regular stratus cloud and a nimbostratus cloud?", "options": [{"text": "Nimbostratus clouds are higher in altitude than regular stratus clouds.", "isCorrect": false, "rationale": "The 'nimbo-' prefix indicates rain-bearing, not necessarily a change in altitude. Nimbostratus clouds are typically mid-to-low level, similar to stratus in general height."}, {"text": "Regular stratus clouds indicate clear weather, while nimbostratus clouds bring fair weather.", "isCorrect": false, "rationale": "Regular stratus clouds already bring gloomy weather with light rain/drizzle, not clear weather. Nimbostratus brings heavier, steady rain, not fair weather."}, {"text": "Nimbostratus clouds are a type of stratus cloud that is actively producing significant precipitation.", "isCorrect": true, "rationale": "The teacher note explains that 'nimbo-' or '-nimbus' means 'rain-bearing'. Therefore, a nimbostratus cloud is a stratus cloud that is producing more substantial or steady rain, beyond the light drizzle of a typical stratus cloud."}, {"text": "The 'nimbo-' prefix indicates that the cloud is made of ice crystals, unlike stratus clouds.", "isCorrect": false, "rationale": "The 'nimbo-' prefix denotes rain-bearing, not a change in composition from water droplets to ice crystals, which is primarily determined by altitude and temperature."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
