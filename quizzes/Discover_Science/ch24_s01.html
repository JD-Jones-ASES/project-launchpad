<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 24, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is light and what is its fundamental role according to the text?", "options": [{"text": "A form of energy that primarily heats objects and creates sound.", "isCorrect": false, "rationale": "The text states light is a form of energy that allows us to see, not primarily to heat or create sound."}, {"text": "A form of energy that travels in straight lines and enables vision.", "isCorrect": true, "rationale": "The text explicitly defines light as 'a form of energy that travels in straight lines and allows us to see things.'"}, {"text": "A type of magnetic wave that pulls objects closer or pushes them away.", "isCorrect": false, "rationale": "The text describes light in terms of vision and energy, not as a magnetic wave with attractive/repulsive forces."}, {"text": "A chemical reaction within the eye that generates colors and shapes.", "isCorrect": false, "rationale": "The text clarifies that light is what our eyes 'work with' to see, implying it comes from an external source, not generated by the eye itself."}]}, {"question": "Which everyday observation is presented in the text as proof that light travels in straight lines?", "options": [{"text": "The fact that a calm lake can show a clear reflection of the sky.", "isCorrect": false, "rationale": "A clear reflection demonstrates orderly reflection, not necessarily that light travels in straight lines initially."}, {"text": "The appearance of a straw looking bent when placed in a glass of water.", "isCorrect": false, "rationale": "This phenomenon is an example of refraction, where light bends as it changes material, which is distinct from it traveling in straight lines within a single medium."}, {"text": "The formation of a shadow when an object blocks a beam of sunlight.", "isCorrect": true, "rationale": "The text states, 'If you hold your hand in the path of the beam, you create a shadow because the light cannot bend around your hand. Shadows prove that light travels in straight lines!'"}, {"text": "The way eyeglasses are used to help people see clearly.", "isCorrect": false, "rationale": "Eyeglasses use refraction to bend light, which is not direct proof of light traveling in straight lines, but rather how it behaves when changing media."}]}, {"question": "When light hits a smooth, shiny mirror at a certain angle, how does it bounce off?", "options": [{"text": "It scatters in many different directions, regardless of the angle it arrived.", "isCorrect": false, "rationale": "Scattering occurs on rough surfaces, not smooth, shiny mirrors, which reflect light in an orderly way."}, {"text": "It always bounces straight back along the same path, regardless of the incoming angle.", "isCorrect": false, "rationale": "Light only bounces straight back if it hits the surface at a 90-degree angle. If it arrives at an angle, it bounces away at the same angle."}, {"text": "It bounces off at an angle that is exactly the same as the angle it arrived.", "isCorrect": true, "rationale": "The text states, 'Here is the important rule: light bounces off a mirror at the same angle it arrives.'"}, {"text": "It changes speed and bends as it leaves the mirror surface.", "isCorrect": false, "rationale": "Changing speed and bending (refraction) happens when light passes *through* different materials, not when it bounces *off* a mirror."}]}, {"question": "A person looks at a pond. In a calm section, they see a clear reflection of the trees. In a section with ripples, the reflection is blurry and scattered. What explains this difference?", "options": [{"text": "The calm water absorbs more light, making the reflection clearer.", "isCorrect": false, "rationale": "The clarity of reflection depends on how light bounces off the surface, not on absorption. Smooth surfaces reflect orderly, rough surfaces scatter."}, {"text": "Calm water causes light to bend more significantly, leading to a clearer image.", "isCorrect": false, "rationale": "Bending of light (refraction) is not the primary reason for a clear reflection from the surface itself; orderly reflection is key."}, {"text": "The smooth surface of the calm water reflects light in an orderly way, while the rough surface of the rippled water scatters the light in many directions.", "isCorrect": true, "rationale": "The text explains, 'Smooth, shiny surfaces like mirrors reflect light in a very orderly way... Rough surfaces reflect light too, but the tiny bumps scatter it in many directions.'"}, {"text": "Rippled water reflects light at a different speed, making the image appear blurry.", "isCorrect": false, "rationale": "The speed of light changes when passing *through* different materials, not when reflecting off a surface in this context. The issue is scattering, not speed change during reflection."}]}, {"question": "What is the primary reason why light 'bends' when it passes from one material into another, such as from air into water?", "options": [{"text": "The light waves get tangled with the molecules of the new material.", "isCorrect": false, "rationale": "While light interacts with molecules, the explanation given in the text is simpler: it changes speed."}, {"text": "The light suddenly changes its direction of reflection.", "isCorrect": false, "rationale": "Reflection is bouncing off a surface; refraction is bending while passing *through* a material. They are distinct phenomena."}, {"text": "The light changes its speed as it moves from one material to another.", "isCorrect": true, "rationale": "The text explicitly states, 'Refraction happens because light changes speed when it moves from one material to another. ...When light slows down, it bends slightly...'"}, {"text": "The new material absorbs some of the light's energy, causing it to shrink.", "isCorrect": false, "rationale": "While some energy might be absorbed, the text attributes the bending directly to the change in speed, not energy loss or shrinking."}]}, {"question": "Which of the following scenarios is an example of refraction?", "options": [{"text": "Seeing your clear image in a highly polished stainless steel surface.", "isCorrect": false, "rationale": "Seeing a clear image in a shiny surface is an example of reflection."}, {"text": "The shadow of a bird flying directly overhead on a sunny day.", "isCorrect": false, "rationale": "Shadow formation is evidence of light traveling in straight lines, not refraction."}, {"text": "A swimming pool appearing shallower than its actual depth.", "isCorrect": true, "rationale": "The text lists 'A swimming pool looks shallower than it really is' as an everyday example of refraction."}, {"text": "The way a mirror makes your left hand appear as your right hand in the reflection.", "isCorrect": false, "rationale": "This is a property of reflection from a mirror, not refraction."}]}, {"question": "According to the 'How Mirrors Work' section, what is the essential component of a mirror that enables reflection?", "options": [{"text": "The perfectly smooth surface of the glass itself.", "isCorrect": false, "rationale": "While smooth glass is used, the text specifies the metal coating is what reflects light. Plain glass is not a mirror."}, {"text": "A thin layer of shiny metal, usually aluminum or silver, coated on one side of the glass.", "isCorrect": true, "rationale": "The 'sciencelife' box states, 'A mirror is made by coating one side of very smooth glass with a thin layer of shiny metal — usually aluminum or silver. This metal layer is what reflects the light.'"}, {"text": "Special pigments within the glass that absorb all light except the reflected image.", "isCorrect": false, "rationale": "The text does not mention pigments; it highlights the metal coating's reflective properties."}, {"text": "The ability of the glass to bend light and create an image.", "isCorrect": false, "rationale": "Bending light is refraction; mirrors work by reflection. While glass can refract, that's not its role in a mirror's reflective function."}]}, {"question": "Why do scientists call a narrow beam of light a 'ray'?", "options": [{"text": "Because it indicates light can spread out in multiple directions simultaneously.", "isCorrect": false, "rationale": "A ray specifically represents a *narrow* beam traveling in a straight line, not spreading out."}, {"text": "To emphasize that light travels in a perfectly straight line.", "isCorrect": true, "rationale": "The text defines 'Ray' as 'a narrow beam of light that travels in a straight line,' directly linking the term to its straight-line propagation."}, {"text": "Because light often appears in a spectrum of colors, like a rainbow.", "isCorrect": false, "rationale": "The term 'ray' does not refer to the color spectrum; it describes the path of light."}, {"text": "To distinguish it from other forms of energy that travel in curves.", "isCorrect": false, "rationale": "While light travels straight, the definition provided focuses on a narrow beam's straight path, not a comparison to other energy forms' paths."}]}, {"question": "Which of the following objects or phenomena primarily utilizes the principle of reflection to function or occur?", "options": [{"text": "A magnifying glass making small text appear larger.", "isCorrect": false, "rationale": "Magnifying glasses use specially shaped lenses to bend light, which is an application of refraction, not reflection."}, {"text": "A periscope allowing someone to see over obstacles using mirrors.", "isCorrect": true, "rationale": "Periscopes use mirrors to bounce light from the scene to the viewer's eye, which is a direct application of reflection."}, {"text": "The way a lens in a camera focuses an image onto film or a sensor.", "isCorrect": false, "rationale": "Camera lenses work by bending (refracting) light to bring it to a focal point."}, {"text": "The shimmering heat visible above a hot road surface on a summer day.", "isCorrect": false, "rationale": "This phenomenon is caused by light bending due to varying air densities (a form of refraction), not reflection."}]}, {"question": "According to the 'Teacher Note', what is a helpful mnemonic to distinguish 'reflection' from 'refraction'?", "options": [{"text": "Reflection has an 'A' for 'angle change', while refraction has an 'L' for 'looking'.", "isCorrect": false, "rationale": "This reverses the mnemonic provided in the text, which is designed to help distinguish the terms correctly."}, {"text": "Reflection has an 'L' for 'looking' (like in a mirror), and refraction has an 'A' for 'angle change' (light bends at a new angle).", "isCorrect": true, "rationale": "The 'teachernote' states: 'A helpful mnemonic: reflection has an L for 'looking' (like looking in a mirror), and refraction has an A for 'angle change' (light bends at a new angle).'"}, {"text": "Reflection involves light traveling through materials, while refraction involves light bouncing off surfaces.", "isCorrect": false, "rationale": "This description reverses the actual definitions of reflection and refraction."}, {"text": "Both terms describe light bouncing off a surface, but 'refraction' specifically refers to mirrors.", "isCorrect": false, "rationale": "This statement is incorrect; reflection is bouncing off, refraction is bending through materials. Also, refraction is not specific to mirrors."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
