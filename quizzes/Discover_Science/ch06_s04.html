<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 6, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The word \"photosynthesis\" literally means \"putting together with light.\" Based on the process described, which statement best explains why this name is fitting?", "options": [{"text": "Plants gather light to store it as a physical ingredient for later use.", "isCorrect": false, "rationale": "Light is a form of energy used in photosynthesis, not a physical ingredient that is stored in its original form as a component of the new substances."}, {"text": "Plants combine water and carbon dioxide using energy from sunlight to create new substances like sugar and oxygen.", "isCorrect": true, "rationale": "This statement accurately reflects the definition: 'synthesis' (putting together) refers to combining water and carbon dioxide, while 'photo' (light) indicates that sunlight energy is essential for this combination to occur and form new products."}, {"text": "Plants primarily produce light and oxygen as their main byproducts through a complex synthesis process.", "isCorrect": false, "rationale": "Plants use light as an input for energy, they do not produce it. Oxygen is a byproduct, but light is not."}, {"text": "Plants synthesize various light-colored pigments in their leaves, giving them their color.", "isCorrect": false, "rationale": "While plants have pigments like chlorophyll, the term 'photosynthesis' describes the entire food-making process, not just pigment production. Chlorophyll is green, not light-colored."}]}, {"question": "A plant is placed in a sealed container without access to carbon dioxide. Assuming it has sufficient water and sunlight, what will be the immediate impact on its ability to perform photosynthesis?", "options": [{"text": "The plant will produce excess oxygen but will be unable to make sugar.", "isCorrect": false, "rationale": "Without carbon dioxide, the plant cannot complete the process to make sugar, but it also won't produce oxygen, as oxygen is a byproduct of sugar production."}, {"text": "The plant will continue to grow normally for a short period by using stored energy reserves.", "isCorrect": false, "rationale": "While plants have some stored energy, without carbon dioxide, the core process of photosynthesis (making new food) cannot occur, leading to a quick cessation of normal growth."}, {"text": "Photosynthesis will stop because carbon dioxide is a necessary ingredient for combining with water to make glucose (sugar).", "isCorrect": true, "rationale": "The 'recipe' for photosynthesis explicitly states that carbon dioxide is one of the three essential inputs, along with water and sunlight. Without it, the plant cannot 'put together' its food."}, {"text": "The plant will begin to absorb nitrogen from the air instead, as a substitute for carbon dioxide.", "isCorrect": false, "rationale": "Nitrogen is absorbed by plants primarily through their roots for growth, but it is not a substitute for carbon dioxide in the photosynthesis process."}]}, {"question": "If you observed a plant during the day, actively performing photosynthesis, and measured the gases it was releasing into the air, what gas would you expect to find in the highest concentration as a product of this process?", "options": [{"text": "Carbon dioxide", "isCorrect": false, "rationale": "Carbon dioxide is absorbed by the plant for photosynthesis, not released as a product."}, {"text": "Water vapor", "isCorrect": false, "rationale": "While plants release water vapor through transpiration, it is not listed as a primary product of the photosynthesis process itself; water is an input."}, {"text": "Oxygen", "isCorrect": true, "rationale": "The 'recipe' for photosynthesis clearly states that sugar and oxygen are the results (products) of the process. Oxygen is released into the air."}, {"text": "Glucose", "isCorrect": false, "rationale": "Glucose (sugar) is the food the plant makes and uses for energy and growth. It is kept by the plant and is not released as a gas into the air."}]}, {"question": "Chlorophyll, the green substance in leaves, is vital for photosynthesis. Without functioning chlorophyll, what specific part of the 'recipe' would a plant be unable to perform effectively?", "options": [{"text": "Transporting water from the roots to the leaves.", "isCorrect": false, "rationale": "Water transport is handled by the plant's vascular system, not directly by chlorophyll."}, {"text": "Absorbing carbon dioxide from the air through tiny pores.", "isCorrect": false, "rationale": "Carbon dioxide absorption occurs through stomata on the leaf surface, which is a structural function, not directly controlled by chlorophyll."}, {"text": "Capturing light energy from the sun to power the process.", "isCorrect": true, "rationale": "The text states, 'Chlorophyll in the leaves captures the light energy.' This is chlorophyll's primary role in photosynthesis, acting as the 'solar panel' for the plant."}, {"text": "Releasing oxygen into the air as a waste product.", "isCorrect": false, "rationale": "Oxygen release is a consequence of the photosynthesis process, which chlorophyll enables, but chlorophyll itself is not directly responsible for the act of releasing the gas."}]}, {"question": "The text compares photosynthesis to 'baking a cake,' where you combine ingredients, add energy, and get something new. In this analogy, which components of baking a cake are most comparable to the water and carbon dioxide in photosynthesis?", "options": [{"text": "The oven's heat, which provides the necessary energy.", "isCorrect": false, "rationale": "The oven's heat is comparable to sunlight (energy), not the ingredients."}, {"text": "The cake batter after it has been mixed but before baking.", "isCorrect": false, "rationale": "The batter would be more like the initial mixture of inputs and energy, not the individual inputs themselves."}, {"text": "The main ingredients like flour, sugar, and eggs.", "isCorrect": true, "rationale": "Water and carbon dioxide are the 'ingredients' a plant combines. Similarly, flour, sugar, and eggs are the main ingredients combined in baking to make something new."}, {"text": "The finished cake, ready to be eaten.", "isCorrect": false, "rationale": "The finished cake is comparable to the sugar and oxygen produced by the plant, which are the outputs, not the inputs."}]}, {"question": "Consider a hypothetical scenario where all plants on Earth suddenly disappeared. Based on the information provided, what would be the MOST immediate and widespread consequence for animal life?", "options": [{"text": "Animals would lose places to build nests and find shelter.", "isCorrect": false, "rationale": "While plants provide shelter, the text emphasizes more fundamental necessities for all animals."}, {"text": "The soil would quickly erode, leading to significant environmental changes.", "isCorrect": false, "rationale": "Soil erosion is an important consequence but primarily affects the environment rather than directly causing immediate, widespread death for animals."}, {"text": "Animals would quickly run out of oxygen to breathe and food to eat, leading to widespread collapse of ecosystems.", "isCorrect": true, "rationale": "The text states, 'Plants make oxygen. Every breath you take contains oxygen that plants produced... Without plants, animals — including people — could not survive.' It also says, 'Plants are the start of almost every food chain.' These are the most critical and immediate impacts on animal survival."}, {"text": "People would no longer have access to wood, cotton, and medicines for materials.", "isCorrect": false, "rationale": "This consequence affects human civilization and comfort but is not the most immediate and widespread threat to the very existence of 'animal life' generally, as framed by the question."}]}, {"question": "A farmer observes that heavy rains are causing a significant amount of valuable topsoil to wash away from their fields, making it difficult for new crops to grow. Based on the 'Why Do Plants Matter?' section, what solution would plants offer to this problem?", "options": [{"text": "Plants would absorb the excess rainwater, preventing floods on the fields.", "isCorrect": false, "rationale": "While plants absorb some water, their primary role mentioned in the text for preventing soil loss is different."}, {"text": "Plants' roots would grip the earth and hold the soil in place, preventing erosion.", "isCorrect": true, "rationale": "The text explicitly states, 'Plants hold soil in place. Roots grip the earth and prevent it from washing or blowing away.' This directly addresses the problem of soil erosion due to rain."}, {"text": "Plants would release special chemicals that bind soil particles together, strengthening the soil.", "isCorrect": false, "rationale": "The text does not mention plants releasing chemicals for soil binding; it focuses on the physical action of roots."}, {"text": "Plants would decompose rapidly to create new topsoil, replacing what was lost.", "isCorrect": false, "rationale": "While decomposition contributes to soil over time, it's not an immediate solution to prevent active erosion, and the text focuses on roots holding soil."}]}, {"question": "In the 'Grow a Bean in a Clear Cup' activity, the 'Think about it' question asks where the seed gets energy to start growing before its leaves can make food. What is the best answer to this question, applying concepts from the entire section?", "options": [{"text": "It absorbs energy directly from the sun through its stem as it emerges.", "isCorrect": false, "rationale": "While sunlight is for photosynthesis, the question specifically asks about energy *before* leaves can make food. The initial stem is not primarily for photosynthesis."}, {"text": "It gets energy from the water and paper towel provided in the cup.", "isCorrect": false, "rationale": "Water is crucial for germination, and the paper towel provides moisture, but neither is an energy source for the seed's growth."}, {"text": "It uses stored glucose (sugar) or other food reserves within the seed itself.", "isCorrect": true, "rationale": "The hint provided in the activity states, 'Remember what is stored inside every seed!' Seeds contain stored food (like glucose or starch) that provides the initial energy for germination and early growth until the plant can photosynthesize."}, {"text": "It pulls energy directly from the surrounding soil as the roots develop.", "isCorrect": false, "rationale": "Soil provides nutrients and support, but it does not provide direct energy for a seed's initial growth. The seed relies on its own stored food."}]}, {"question": "George Washington Carver encouraged farmers to plant peanuts and sweet potatoes instead of continuously growing only cotton. What was the primary scientific reason for his recommendation, according to the text?", "options": [{"text": "Peanuts and sweet potatoes were easier to grow and required less water than cotton.", "isCorrect": false, "rationale": "While this might be true in some cases, the text emphasizes a different, primary scientific reason related to soil health."}, {"text": "These plants could be used to create hundreds of new products, making them more profitable.", "isCorrect": false, "rationale": "Carver did invent many uses, which made them worth growing, but the primary *scientific reason* for rotating crops, as stated, was for soil health."}, {"text": "Peanuts and sweet potatoes added essential nutrients back into the soil, improving its fertility and health.", "isCorrect": true, "rationale": "The text states, 'Carver encouraged them to plant peanuts and sweet potatoes instead, because these plants add nutrients back into the soil.' This was his primary scientific justification for crop rotation."}, {"text": "Cotton was becoming less popular in the market, and farmers needed new cash crops.", "isCorrect": false, "rationale": "The text mentions cotton wore out the soil, implying a problem with continuous cotton farming, but the solution Carver offered was scientifically based on soil replenishment, not just market trends."}]}, {"question": "The text concludes by stating, 'Without plants, life as we know it could not exist.' Which of the following statements provides the strongest comprehensive evidence from the entire section to support this claim?", "options": [{"text": "Plants are used for building materials, clothing, and medicines, which are essential for human comfort and development.", "isCorrect": false, "rationale": "While these are important human uses, they don't cover the fundamental *existence* of life for all organisms, as 'life as we know it' implies."}, {"text": "Plants allowed humans to settle in one place and form communities, fundamentally changing human history.", "isCorrect": false, "rationale": "This highlights the historical impact on human civilization but not the core biological requirements for *all* life to exist."}, {"text": "Plants produce the oxygen all animals breathe and form the base of almost all food chains, supplying energy for ecosystems.", "isCorrect": true, "rationale": "This statement synthesizes the two most critical reasons provided in the text for why plants are essential for the survival of life on Earth: they produce the oxygen necessary for respiration and they are the primary producers of food, upon which nearly all other life depends."}, {"text": "Plants provide shelter for many animals and help prevent crucial soil erosion, maintaining stable habitats.", "isCorrect": false, "rationale": "These are important ecological roles, but the oxygen production and position at the base of the food chain are more fundamental to the *existence* of life itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
