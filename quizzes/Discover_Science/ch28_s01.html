    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 28, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately describes an atom based on the provided text?", "options": [{"text": "An atom is the smallest visible particle of matter.", "isCorrect": false, "rationale": "The text explicitly states that atoms are 'so tiny that you cannot see them, even with a powerful microscope'."}, {"text": "An atom is the largest fundamental building block of matter.", "isCorrect": false, "rationale": "The text describes atoms as 'the smallest particle of matter' and 'tiny building blocks', not the largest."}, {"text": "An atom is the tiny building block from which all solids, liquids, and gases are made.", "isCorrect": true, "rationale": "The text states, 'An atom is the smallest particle of matter.' and 'Every solid, every liquid, and every gas is built from these tiny building blocks.'"}, {"text": "An atom is a substance made of only one kind of element.", "isCorrect": false, "rationale": "An atom is the fundamental particle, while an element is a substance made of only one kind of atom. This option reverses the definition."}], "id": "q01"}, {"question": "According to the text, what is the defining characteristic of an element?", "options": [{"text": "It is a substance that can be seen only with powerful microscopes.", "isCorrect": false, "rationale": "The text states atoms are too tiny to see, not elements themselves, and elements can be macroscopic (e.g., gold)."}, {"text": "It is a substance made of exactly two different kinds of atoms.", "isCorrect": false, "rationale": "An element is defined as 'a pure substance made of only one kind of atom'."}, {"text": "It is a pure substance composed of only one type of atom.", "isCorrect": true, "rationale": "The text clearly states, 'A substance made of only one kind of atom is called an element.' and 'Element a pure substance made of only one kind of atom.'"}, {"text": "It is any substance found in nature, regardless of its atomic composition.", "isCorrect": false, "rationale": "The text specifies 'pure substance' and 'only one kind of atom,' which contradicts a 'regardless of composition' definition."}], "id": "q02"}, {"question": "Which of the following chemical symbols is written correctly according to the rules outlined in the text?", "options": [{"text": "o", "isCorrect": false, "rationale": "The text states, 'The first letter is always a capital letter.' The symbol for Oxygen is 'O'."}, {"text": "NA", "isCorrect": false, "rationale": "The text states, 'If there is a second letter, it is always lowercase.' The symbol for Sodium is 'Na'."}, {"text": "Cl", "isCorrect": true, "rationale": "The text states, 'The first letter is always a capital letter. If there is a second letter, it is always lowercase.' 'Cl' (Chlorine) follows these rules."}, {"text": "fe", "isCorrect": false, "rationale": "The text states, 'The first letter is always a capital letter.' The symbol for Iron is 'Fe'."}], "id": "q03"}, {"question": "The text mentions that scientists worldwide use the same chemical symbols. What is the primary benefit of this standardization?", "options": [{"text": "It ensures that all scientists memorize the symbols quickly.", "isCorrect": false, "rationale": "While standardization might aid memorization, the text explicitly highlights communication: 'so a chemist in Japan and a chemist in Brazil can read each other's work.'"}, {"text": "It prevents the discovery of new elements by non-approved scientists.", "isCorrect": false, "rationale": "The text does not mention any regulatory or restrictive purpose; rather, it emphasizes universal understanding."}, {"text": "It allows scientists from different countries to understand and share each other's research.", "isCorrect": true, "rationale": "The text directly states, 'Scientists all around the world use these same symbols, so a chemist in Japan and a chemist in Brazil can read each other's work,' emphasizing global communication and collaboration."}, {"text": "It makes the periodic table easier to print in different languages.", "isCorrect": false, "rationale": "The symbols themselves are language-independent, which is the point, but the benefit is in reading scientific work, not printing ease."}], "id": "q04"}, {"question": "What is the primary purpose of the Periodic Table as described in the text?", "options": [{"text": "To list all known compounds and mixtures.", "isCorrect": false, "rationale": "The text specifies that 'All 118 elements are organized' on the periodic table, not compounds or mixtures."}, {"text": "To serve as a directory for all 118 elements, showing their name, symbol, and atomic number.", "isCorrect": true, "rationale": "The text describes it as 'a giant address book for atoms. Each element has its own square, showing its name, symbol, and atomic number.'"}, {"text": "To provide a complete history of atomic theory.", "isCorrect": false, "rationale": "The text refers to it as an organizational chart for elements, not a historical document."}, {"text": "To predict the future uses of newly discovered elements.", "isCorrect": false, "rationale": "The text states its use is for organizing known elements and their basic information, not for predicting future uses."}], "id": "q05"}, {"question": "The 'think about it' section poses a question: 'If there are only 118 kinds of building blocks, how can there be so many different materials?' What does this question imply about elements?", "options": [{"text": "Most substances in the world are not actually made of atoms.", "isCorrect": false, "rationale": "The section explicitly states 'everything you can see, touch, and smell... is made of atoms,' contradicting this option."}, {"text": "The 118 elements can combine in countless ways to form a vast array of substances.", "isCorrect": true, "rationale": "The question challenges the reader to consider how a limited number of 'building blocks' can create immense diversity, implicitly suggesting combination as the mechanism for different materials."}, {"text": "Scientists have not yet discovered the majority of existing elements.", "isCorrect": false, "rationale": "The text states 'All 118 elements are organized,' implying the known elements are the primary focus, not undiscovered ones as the solution to the diversity paradox."}, {"text": "The number 118 is an approximation, and there are actually millions of different kinds of atoms.", "isCorrect": false, "rationale": "The text clearly states 'about 118 different kinds of atoms' and refers to 'All 118 elements,' suggesting this number is established, not an underestimate."}], "id": "q06"}, {"question": "A student wants to find out the chemical symbol and atomic number of a newly encountered element. Which resource mentioned in the text would be most appropriate for this task?", "options": [{"text": "A powerful microscope", "isCorrect": false, "rationale": "Microscopes are for viewing tiny objects, not for looking up element information."}, {"text": "A standard dictionary", "isCorrect": false, "rationale": "A dictionary is for word definitions, not chemical element data. The text explicitly compares the periodic table's use to a dictionary for words you don't know, implying the periodic table for elements."}, {"text": "The Periodic Table", "isCorrect": true, "rationale": "The text states the periodic table 'shows its name, symbol, and atomic number' for each element, making it the ideal resource."}, {"text": "A list of common elements found in water and air", "isCorrect": false, "rationale": "While useful for some elements, this would not be comprehensive for 'a newly encountered element' as the periodic table is."}], "id": "q07"}, {"question": "Based on the provided table, which element is described as the most common element in the universe and also found in water?", "options": [{"text": "Oxygen", "isCorrect": false, "rationale": "The table states Oxygen is 'In the air you breathe,' not 'the most common element in the universe'."}, {"text": "Carbon", "isCorrect": false, "rationale": "The table states Carbon is 'In pencil lead, diamonds, and all living things,' not the most common in the universe or primarily in water."}, {"text": "Hydrogen", "isCorrect": true, "rationale": "The table explicitly states Hydrogen (H) is 'In water; the most common element in the universe'."}, {"text": "Sodium", "isCorrect": false, "rationale": "The table states Sodium is 'In table salt,' not the most common element in the universe or in water."}], "id": "q08"}, {"question": "The 'teachernote' section suggests using this review to 'activate prior knowledge from Unit 13.' What does this imply about the content of this section?", "options": [{"text": "It introduces completely new and advanced chemical concepts.", "isCorrect": false, "rationale": "The note explicitly calls it a 'review' and aims to 'activate prior knowledge,' indicating it's not new content but a refresher."}, {"text": "It serves as an introductory primer for students with no prior exposure to chemistry.", "isCorrect": false, "rationale": "The note specifies 'prior knowledge from Unit 13,' meaning students should have some background, not 'no prior exposure.'"}, {"text": "It is designed to refresh and reinforce concepts students have previously learned.", "isCorrect": true, "rationale": "To 'activate prior knowledge' means to bring existing knowledge to the forefront and reinforce it, which aligns with a review strategy."}, {"text": "It provides a comprehensive, in-depth study of atomic structure.", "isCorrect": false, "rationale": "The note says it's 'intentionally a quick review' and to 'spend no more than one class period here,' indicating it's not in-depth."}], "id": "q09"}, {"question": "If you observe any physical object, such as a rock or a cloud, what fundamental principle from this text would apply to its composition?", "options": [{"text": "It is exclusively composed of one of the 118 elements.", "isCorrect": false, "rationale": "While made of elements, most objects are compounds or mixtures, not just a single element. The text indicates 118 elements make up millions of substances."}, {"text": "It is too large to be made of atoms.", "isCorrect": false, "rationale": "The text clearly states that 'everything you can see, touch, and smell' is made of atoms, regardless of its size."}, {"text": "It is ultimately made up of tiny, invisible atoms.", "isCorrect": true, "rationale": "The text repeatedly emphasizes that 'Even though atoms are tiny, they make up everything you can see, touch, and smell. Your desk, the air around you, the water you drink, and your own body — all of it is made of atoms.'"}, {"text": "It is a new element not yet listed on the periodic table.", "isCorrect": false, "rationale": "Observing a common object like a rock or cloud doesn't imply it's a new element; it's made of existing elements in combination."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
