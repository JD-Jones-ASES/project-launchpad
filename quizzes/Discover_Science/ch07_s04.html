        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary role of a geologist as described in the text?", "options": [{"text": "Creating artistic sculptures from rocks for public display.", "isCorrect": false, "rationale": "While rocks are used for art, the text defines a geologist as 'a scientist who studies rocks' and focuses on their methods for identifying rocks."}, {"text": "Identifying rocks and studying their various properties and formation processes.", "isCorrect": true, "rationale": "The text explicitly states that a geologist 'studies rocks' and details how they 'figure out what it is' by looking at properties and formation clues."}, {"text": "Mining precious minerals and rocks for commercial and industrial use.", "isCorrect": false, "rationale": "Mining is related to minerals, but the text defines a geologist's role as studying and identifying rocks, not primarily mining them."}, {"text": "Designing and constructing buildings and monuments using different types of stone.", "isCorrect": false, "rationale": "The text mentions rocks are used for buildings, but this is an application of rocks, not the primary role of a geologist who studies them."}]}, {"question": "Which property of a rock describes the way its surface reflects light, and can be categorized as glassy, waxy, metallic, or earthy?", "options": [{"text": "Texture", "isCorrect": false, "rationale": "Texture refers to how a rock feels or looks regarding its grains (rough, smooth, glassy), not how it reflects light."}, {"text": "Hardness", "isCorrect": false, "rationale": "Hardness measures a rock's resistance to scratching, not how it reflects light."}, {"text": "Luster", "isCorrect": true, "rationale": "The text defines luster as 'the way a rock's surface reflects light' and lists examples like glassy, waxy, metallic, or earthy."}, {"text": "Color", "isCorrect": false, "rationale": "Color refers to the visual hue of the rock, not specifically how its surface reflects light."}]}, {"question": "A student performs a scratch test on an unknown rock. They find that a copper penny scratches the rock, but their fingernail does not leave a mark. According to the provided Mohs hardness scale approximations, what is the most accurate conclusion about the rock's hardness?", "options": [{"text": "The rock has a hardness greater than 3.5.", "isCorrect": false, "rationale": "If a copper penny (3.5) scratches the rock, the rock must be softer than the penny, meaning its hardness is less than 3.5."}, {"text": "The rock has a hardness exactly 2.5.", "isCorrect": false, "rationale": "If the hardness were exactly 2.5 or less, the fingernail (2.5) would scratch it, but the text states the fingernail does not leave a mark."}, {"text": "The rock has a hardness between 2.5 and 3.5.", "isCorrect": true, "rationale": "Since the fingernail (2.5) cannot scratch the rock, the rock is harder than 2.5. Since the copper penny (3.5) can scratch the rock, the rock is softer than 3.5. Therefore, its hardness is between 2.5 and 3.5."}, {"text": "The rock has a hardness less than 2.5.", "isCorrect": false, "rationale": "If the rock's hardness were less than 2.5, the fingernail (2.5) would be able to scratch it, which contradicts the observation."}]}, {"question": "A geologist is testing a rock sample. They find that a steel nail *cannot* scratch the rock, but a glass plate *can*. Based on the Mohs hardness approximations provided, what is the most precise range for this rock's hardness?", "options": [{"text": "Less than 3.5.", "isCorrect": false, "rationale": "If the rock were less than 3.5, a steel nail (5.5) would easily scratch it, which contradicts the observation that the nail *cannot* scratch it."}, {"text": "Between 3.5 and 5.5.", "isCorrect": false, "rationale": "If the rock's hardness were in this range, the steel nail (5.5) would scratch it. However, the steel nail *cannot* scratch the rock, meaning the rock is harder than 5.5."}, {"text": "Between 5.5 and 6.5.", "isCorrect": true, "rationale": "Since the steel nail (5.5) cannot scratch the rock, the rock is harder than 5.5. Since the glass plate (6.5) *can* scratch the rock, the rock is softer than 6.5. Therefore, the rock's hardness is between 5.5 and 6.5."}, {"text": "Greater than 6.5.", "isCorrect": false, "rationale": "If the rock's hardness were greater than 6.5, a glass plate (6.5) would not be able to scratch it, which contradicts the observation."}]}, {"question": "What mineral is used to make the 'lead' in pencils, as stated in the text?", "options": [{"text": "Halite", "isCorrect": false, "rationale": "Halite is the mineral used for table salt, not pencil 'lead'."}, {"text": "Quartz", "isCorrect": false, "rationale": "Quartz, in the form of sand, is used to make glass, not pencil 'lead'."}, {"text": "Graphite", "isCorrect": true, "rationale": "The text explicitly states: 'The “lead” in your pencil is actually graphite, a mineral made of carbon.'"}, {"text": "Gypsum", "isCorrect": false, "rationale": "Gypsum is a mineral used to make classroom chalk, not pencil 'lead'."}]}, {"question": "During the 'Rock Collection and Classification' activity, a student observes a rock with distinct flat layers. Based on this observation, what type of rock is it most likely to be?", "options": [{"text": "Igneous rock", "isCorrect": false, "rationale": "Igneous rocks are typically characterized by crystals, not distinct flat layers, as they form from cooled magma or lava."}, {"text": "Metamorphic rock", "isCorrect": false, "rationale": "While some metamorphic rocks can show foliation (layers), the text specifically states, 'Can you see layers? That suggests sedimentary rock,' making it the most direct and likely answer based on the provided content."}, {"text": "Sedimentary rock", "isCorrect": true, "rationale": "The text directly links the observation of layers to sedimentary rocks: 'Can you see layers? That suggests sedimentary rock.'"}, {"text": "Mineral", "isCorrect": false, "rationale": "A mineral is a naturally occurring solid with a definite chemical composition and crystal structure. Distinct flat layers are a characteristic of a rock *type* (sedimentary), not a mineral itself."}]}, {"question": "Besides being the first woman to earn a Ph.D. in geology from an American university, what specialized skill made Florence Bascom a renowned expert among other geologists?", "options": [{"text": "Her ability to identify minerals using only their color and texture in the field.", "isCorrect": false, "rationale": "While she identified minerals, her expertise involved advanced microscopic techniques, not just field observations of color and texture."}, {"text": "Her expertise in microscopic analysis of thin rock slices to identify minerals and understand rock formation.", "isCorrect": true, "rationale": "The text highlights that 'She became an expert at looking at thin slices of rock under a microscope. By studying how light passed through those tiny slices, she could identify the minerals inside and figure out how the rock had formed.'"}, {"text": "Her talent for discovering new, economically valuable mineral deposits for mining companies.", "isCorrect": false, "rationale": "The text focuses on her scientific analysis of existing rock samples, not on discovering new deposits."}, {"text": "Her skill in categorizing rocks based solely on their luster and hardness properties.", "isCorrect": false, "rationale": "These are basic identification methods; her advanced skill involved microscopic analysis, which is far more detailed."}]}, {"question": "In the 'Try It: Rock Collection and Classification' activity, what is the primary purpose of using a magnifying glass when observing your collected rocks?", "options": [{"text": "To perform the scratch test more accurately by seeing the scratch marks better.", "isCorrect": false, "rationale": "The scratch test involves physically scratching with tools like a nail or penny, and while a magnifying glass might help *see* marks, its primary purpose in observation is for other details."}, {"text": "To determine the rock's luster by intensifying how light reflects off its surface.", "isCorrect": false, "rationale": "Luster is observed by how the surface reflects light, and a magnifying glass isn't primarily for intensifying this, but rather for seeing small details."}, {"text": "To better observe fine details such as grain size, specific textures, and the presence of small crystals.", "isCorrect": true, "rationale": "The activity steps include observing 'Grain size: Can you see individual grains? Are they big or small?' and 'Layers or crystals: Do you see flat layers? Visible crystals? Neither?' A magnifying glass is essential for clearly seeing these small features."}, {"text": "To measure the rock's approximate hardness more precisely on the Mohs scale.", "isCorrect": false, "rationale": "Hardness is measured by comparing resistance to scratching from known materials, not by using a magnifying glass."}]}, {"question": "A city planner needs to select a durable, long-lasting material for a new public monument. Based on the 'Rocks All Around Us' section, which of the following rock types would be the most suitable and commonly used for such a purpose?", "options": [{"text": "Halite, because it's easily mined and abundant.", "isCorrect": false, "rationale": "Halite is table salt and would dissolve easily, making it unsuitable for an outdoor monument requiring durability."}, {"text": "Gypsum, because it's used for chalk and can be carved easily.", "isCorrect": false, "rationale": "Gypsum is very soft (used for chalk) and would not be durable or long-lasting for a public monument."}, {"text": "Granite, limestone, or marble, as they are specifically mentioned for buildings and monuments.", "isCorrect": true, "rationale": "The text states: 'Many buildings are made of granite, limestone, or marble. The walls of some famous buildings are carved from solid rock.' These materials are known for their durability and use in such structures."}, {"text": "Crushed rock used in concrete, because it is inexpensive and widely available for roads.", "isCorrect": false, "rationale": "While crushed rock is used in concrete for roads and sidewalks, it is not typically chosen as the primary aesthetic and durable material for a standalone monument compared to solid blocks of granite or marble."}]}, {"question": "According to the text, which specific property of a rock provides geologists with direct clues about how the rock formed?", "options": [{"text": "Color", "isCorrect": false, "rationale": "Color is described as being influenced by specific minerals (e.g., iron, feldspar), but not directly as an indicator of the rock's formation process."}, {"text": "Hardness", "isCorrect": false, "rationale": "Hardness indicates a mineral's resistance to scratching, but not directly how the rock itself formed."}, {"text": "Texture", "isCorrect": true, "rationale": "The text explicitly states: 'Texture tells geologists how the rock formed.' It discusses whether it's rough, smooth, glassy, or if individual grains are visible."}, {"text": "Luster", "isCorrect": false, "rationale": "Luster describes how a rock's surface reflects light and does not directly indicate the rock's formation process."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
