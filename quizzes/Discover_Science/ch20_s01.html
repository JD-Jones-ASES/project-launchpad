    };

<body>

        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 20, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the main purpose of the \"Making Connections: Your Body as a Machine\" section?", "options": [{"text": "To detail the specific functions of each human body system.", "isCorrect": false, "rationale": "While body systems are mentioned, the primary goal is not to detail individual functions but rather to show how they connect to broader scientific principles."}, {"text": "To illustrate how the human body exemplifies principles from all four branches of science studied in Cycle 4.", "isCorrect": true, "rationale": "The section explicitly states its purpose is to tie all four branches of science (Life, Earth, Chemistry, Physics) to the human body as a real-world example, emphasizing 'making connections'."}, {"text": "To explain the evolution of human body adaptations to different climates.", "isCorrect": false, "rationale": "Adaptation to climate is a supporting point under Earth Science, but it's not the main overarching purpose of the entire section."}, {"text": "To compare the human body's energy production to the burning of wood.", "isCorrect": false, "rationale": "This comparison is used to explain a specific chemical process in the body, but it is a small part of the larger discussion about scientific connections."}]}, {"question": "When you decide to raise your hand in class, multiple body systems work together instantaneously. Which of the following sets of systems is *most directly* involved in executing this action according to the text's explanation?", "options": [{"text": "Digestive, Circulatory, Skeletal, Integumentary", "isCorrect": false, "rationale": "While the digestive system provides energy eventually and the integumentary system (skin) is part of the body, they are not directly and immediately involved in the physical act of raising a hand as the core systems listed in the example."}, {"text": "Nervous, Muscular, Skeletal, Circulatory", "isCorrect": true, "rationale": "The text explicitly states: 'your brain sends a signal [Nervous], your muscles pull on your bones [Muscular/Skeletal], and your blood delivers the energy those muscles need [Circulatory].' This directly involves these four systems."}, {"text": "Respiratory, Excretory, Endocrine, Lymphatic", "isCorrect": false, "rationale": "These systems have vital roles in the body, but they are not the primary systems immediately activated and described in the text's example of raising a hand."}, {"text": "Immune, Reproductive, Urinary, Lymphatic", "isCorrect": false, "rationale": "These systems are not described as being directly involved in the immediate action of raising a hand, nor are they mentioned in the text's specific example."}]}, {"question": "The human body maintains a stable internal temperature regardless of external weather conditions. This ability is most closely analogous to which concept from Earth Science, as described in the text?", "options": [{"text": "The movement of tectonic plates causing earthquakes.", "isCorrect": false, "rationale": "Tectonic plate movement is an Earth Science concept, but it has no direct analogy to the body's temperature regulation system."}, {"text": "The Earth's climate zones dictating local vegetation.", "isCorrect": false, "rationale": "While the body adapts to climate, the *regulation* of internal temperature is a more immediate 'weather system' within the body, not a long-term adaptation to climate zones."}, {"text": "The water cycle, particularly the process of evaporation for cooling.", "isCorrect": true, "rationale": "The text explicitly states that 'sweat evaporates from your skin and cools you down — just like evaporation in the water cycle!' This directly connects body temperature regulation to the water cycle."}, {"text": "The formation of different types of clouds in the atmosphere.", "isCorrect": false, "rationale": "Cloud formation is a part of Earth Science (weather), but it doesn't serve as an analogy for the body's internal temperature regulation system in the text."}]}, {"question": "When you chew a piece of bread, what is the initial chemical change that begins the digestion process, as described in the text?", "options": [{"text": "Teeth breaking the bread into smaller pieces.", "isCorrect": false, "rationale": "This is a physical change, not a chemical change, as it alters the size and shape but not the chemical composition of the bread."}, {"text": "Stomach acids dissolving the bread completely.", "isCorrect": false, "rationale": "Stomach acids cause further chemical changes, but the *initial* chemical change described in the mouth is different."}, {"text": "Saliva breaking down starch into sugar.", "isCorrect": true, "rationale": "The text states, 'your saliva starts breaking down the starch into sugar — that is a chemical change!' This is the first chemical change mentioned."}, {"text": "Nutrients reaching the small intestine for absorption.", "isCorrect": false, "rationale": "Nutrient absorption happens much later in the digestive process, after multiple chemical and physical changes have already occurred."}]}, {"question": "Antoine Lavoisier's discovery about chemical reactions is directly applied to the human body in which of the following statements from the text?", "options": [{"text": "Your body performs chemical changes slowly and carefully at 37°C.", "isCorrect": false, "rationale": "This describes the *conditions* of chemical reactions in the body but not the principle of matter conservation that Lavoisier discovered."}, {"text": "The atoms in your breakfast cereal become part of your muscles, bones, and blood; nothing is lost—it just changes form.", "isCorrect": true, "rationale": "The text directly links this statement to Lavoisier's discovery: 'He discovered that matter is never created or destroyed in a chemical reaction. The same is true in your body. The atoms in your breakfast cereal become part of your muscles, bones, and blood. Nothing is lost — it just changes form.'"}, {"text": "Your cells combine glucose with oxygen to release energy.", "isCorrect": false, "rationale": "This describes a specific chemical reaction (cellular respiration) for energy release, but it doesn't directly state the principle of matter conservation."}, {"text": "Digestion transforms original food into new molecules.", "isCorrect": false, "rationale": "This describes a chemical change, but it doesn't explicitly refer to the conservation of matter, which is Lavoisier's specific contribution mentioned."}]}, {"question": "Which body part is explicitly identified as a 'wedge' simple machine in the text, and what is its primary function in that role?", "options": [{"text": "The elbow, acting as a fulcrum to move the arm.", "isCorrect": false, "rationale": "The elbow is identified as a fulcrum for a lever, not a wedge."}, {"text": "Some tendons, changing the direction of muscle force.", "isCorrect": false, "rationale": "Tendons are described as working like pulleys, not wedges."}, {"text": "The bicep muscle, providing force to lift a load.", "isCorrect": false, "rationale": "The bicep muscle provides force for a lever system, but it is not itself a wedge."}, {"text": "Your front teeth (incisors), designed to cut through food.", "isCorrect": true, "rationale": "The text states: 'Wedges: Your front teeth (incisors) are wedges. They are sharp and thin, designed to cut through food — just like an axe splits wood.'"}]}, {"question": "Applying the concepts from the text, if a person living in a hot desert climate over thousands of years developed traits that help them release heat more easily, which branch of science does this adaptation primarily fall under?", "options": [{"text": "Physics, as it involves the transfer of heat energy.", "isCorrect": false, "rationale": "While heat transfer involves physics, the concept of long-term adaptation of an organism's body to its environment is primarily a biological, evolutionary concept."}, {"text": "Chemistry, due to the chemical processes of sweating.", "isCorrect": false, "rationale": "Sweating involves chemical processes, but the *adaptation* of the body's overall structure and function over generations to a climate is not primarily a chemical study."}, {"text": "Earth Science, specifically related to how bodies adapt to climate patterns.", "isCorrect": true, "rationale": "The text states under Earth Science: 'People who live in cold climates tend to have bodies that conserve heat. People in hot climates have bodies that release heat more easily. Over thousands of years, human bodies have adapted to their local weather patterns — just like animals adapt to their habitats.'"}, {"text": "Life Science, concerning the organization of body systems.", "isCorrect": false, "rationale": "Life Science covers body systems, but the specific aspect of long-term adaptation to environmental climate is highlighted under Earth Science in this context."}]}, {"question": "The text describes cellular respiration as a chemical change where cells combine glucose with oxygen to release energy. What are the waste products of this process, and to what familiar process does the text compare it?", "options": [{"text": "Methane and water; compared to a campfire.", "isCorrect": false, "rationale": "Methane is not mentioned as a waste product, and while a campfire releases heat, the specific comparison is to burning wood for energy and waste products."}, {"text": "Carbon dioxide and oxygen; compared to photosynthesis.", "isCorrect": false, "rationale": "Oxygen is a reactant, not a waste product, and cellular respiration is the inverse of photosynthesis, not compared to it here."}, {"text": "Carbon dioxide and water; compared to burning wood.", "isCorrect": true, "rationale": "The text states: 'This reaction produces carbon dioxide (CO2) and water (H2O) as waste products — just like burning wood produces heat and gas.'"}, {"text": "Lactic acid and heat; compared to a car engine.", "isCorrect": false, "rationale": "Lactic acid is a product of anaerobic respiration, not the primary waste product of aerobic cellular respiration described here, and a car engine isn't the comparison used."}]}, {"question": "When you nod your head, your neck acts as a lever. Which component of this lever system would the neck joints represent?", "options": [{"text": "The load, as the head's weight is being moved.", "isCorrect": false, "rationale": "The head's weight is the load, not the joint itself."}, {"text": "The force, provided by the neck muscles.", "isCorrect": false, "rationale": "The neck muscles provide the force, not the joint."}, {"text": "The fulcrum, as the pivot point for the movement.", "isCorrect": true, "rationale": "In a lever system, the fulcrum is the pivot point around which the lever moves. The neck joints serve this role when nodding the head, similar to how the elbow is the fulcrum for the arm lever."}, {"text": "The lever arm itself, as the structure that moves.", "isCorrect": false, "rationale": "The neck (bones/vertebrae) acts as the lever arm, but the joint is the specific pivot point (fulcrum)."}]}, {"question": "Consider the activity of eating an apple and then going outside to play soccer. Which of the following statements correctly connects *all four* branches of science (Life, Earth, Chemistry, Physics) to this single activity, as implied by the text?", "options": [{"text": "The apple's growth is Life Science, its digestion is Chemistry, the energy used in soccer is Physics, and the weather affects how the soccer ball bounces (Earth Science).", "isCorrect": false, "rationale": "While parts are correct, the 'weather affecting how the soccer ball bounces' is a weak and less direct connection to Earth Science compared to how the body interacts with the weather."}, {"text": "The apple provides energy (Chemistry), your body systems (Life Science) move to play soccer, your body adapts to the outdoor temperature (Earth Science), and your bones and muscles act as levers (Physics) during play.", "isCorrect": true, "rationale": "This option accurately connects all four branches as described in the text: Chemistry (digestion/energy from apple), Life Science (body systems working together for movement), Earth Science (body regulating temperature/responding to weather), and Physics (bones/muscles as simple machines like levers during physical activity)."}, {"text": "Eating the apple is a physical change (Physics), the apple's nutrients are absorbed (Chemistry), playing soccer burns calories (Life Science), and the sun shines on the field (Earth Science).", "isCorrect": false, "rationale": "Eating the apple involves chemical changes, burning calories is linked to chemistry/life science, and while the sun shining is Earth Science, it's not directly related to the body's internal 'weather system' or adaptation."}, {"text": "The apple contains water from the water cycle (Earth Science), its breakdown in the body is chemical (Chemistry), the growth of grass on the field is Life Science, and the force of kicking the ball is Physics.", "isCorrect": false, "rationale": "While 'force of kicking' is physics and 'chemical breakdown' is chemistry, 'grass growth' is less direct for Life Science in relation to the human body's systems, and 'water from the water cycle' is a component of the apple's growth, not directly the body's interaction with Earth Science as emphasized."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
