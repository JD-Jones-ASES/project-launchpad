<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 0, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the correct order of the first three steps in the scientific method?", "options": [{"text": "Question, Observe, Hypothesize", "isCorrect": false, "rationale": "The first step is to observe, then ask a question based on that observation, followed by forming a hypothesis."}, {"text": "Observe, Question, Hypothesize", "isCorrect": true, "rationale": "The scientific method begins with observing something interesting, then formulating a question about it, and finally making a testable prediction (hypothesis)."}, {"text": "Hypothesize, Observe, Question", "isCorrect": false, "rationale": "Hypothesizing comes after observing and asking a question, not before or as the first step."}, {"text": "Observe, Hypothesize, Question", "isCorrect": false, "rationale": "After observing, a question is formed before a hypothesis can be made, as the hypothesis is a prediction to answer the question."}]}, {"question": "A student notices that plants near a broken window in the greenhouse grow taller than plants far from it. Which step of the scientific method is this student performing?", "options": [{"text": "Testing it", "isCorrect": false, "rationale": "Testing involves designing and conducting an experiment, which comes after making an observation and forming a hypothesis."}, {"text": "Observing", "isCorrect": true, "rationale": "Observing is using your senses to notice something interesting, such as differences in plant growth based on location relative to a window."}, {"text": "Making a hypothesis", "isCorrect": false, "rationale": "Making a hypothesis means forming a testable prediction, which happens after an observation and question have been made."}, {"text": "Drawing a conclusion", "isCorrect": false, "rationale": "Drawing a conclusion involves analyzing results from an experiment, which is a later step in the scientific method."}]}, {"question": "Following the observation that a ball rolls farther on a smooth floor than on carpet, a student asks, 'Does the type of surface affect how far a ball rolls?' Which of the following is the best hypothesis for this question?", "options": [{"text": "The ball will roll farther on a smooth floor.", "isCorrect": false, "rationale": "While this is a prediction, a strong hypothesis in science often includes a 'because' statement explaining the reasoning, making it more complete."}, {"text": "I will roll the ball on three different surfaces.", "isCorrect": false, "rationale": "This describes a part of the 'Test It!' step (experiment design), not the hypothesis itself, which is a prediction."}, {"text": "Smooth surfaces are less rough than carpet.", "isCorrect": false, "rationale": "This is a statement of fact or an observation, not a testable prediction about the outcome of the specific question being asked."}, {"text": "The ball will roll farther on a smooth floor because there is less friction.", "isCorrect": true, "rationale": "A hypothesis is a testable prediction, and this statement provides both the prediction (farther on smooth floor) and the reasoning (less friction), making it a complete and strong hypothesis."}]}, {"question": "The 'Test It!' step of the scientific method primarily involves:", "options": [{"text": "Discussing your prediction with others.", "isCorrect": false, "rationale": "While discussion can happen, the core of 'Test It!' is not discussion but active experimentation."}, {"text": "Reading about similar experiments online.", "isCorrect": false, "rationale": "Research might precede or inform experiment design, but it is not the 'Test It!' step itself, which is hands-on experimentation."}, {"text": "Designing and conducting an experiment to gather data.", "isCorrect": true, "rationale": "The 'Test It!' step (also called 'Experiment') is where a test is designed and performed to answer a scientific question by carefully changing one thing and observing what happens."}, {"text": "Deciding if your observation was interesting enough.", "isCorrect": false, "rationale": "Deciding if an observation is interesting happens at the very beginning when choosing what to investigate, not during the 'Test It!' phase."}]}, {"question": "Why is the step 'Record Results' crucial in the scientific method?", "options": [{"text": "To ensure the experiment is 'fun.'", "isCorrect": false, "rationale": "While experiments can be fun, recording results serves a much more fundamental scientific purpose than enjoyment."}, {"text": "To prevent forgetting details and allow for analysis.", "isCorrect": true, "rationale": "Recording results accurately and carefully ensures that all data is preserved for later analysis, preventing important details from being lost and enabling valid conclusions."}, {"text": "To impress other scientists with neat handwriting.", "isCorrect": false, "rationale": "Neatness is helpful but not the primary scientific reason for recording; the content and accuracy are paramount."}, {"text": "To quickly determine if the hypothesis was correct without further study.", "isCorrect": false, "rationale": "Recording data is a prerequisite for drawing a conclusion, not an instant way to determine correctness. Analysis is still required."}]}, {"question": "When a scientist draws a conclusion and finds their hypothesis was incorrect, what is the appropriate scientific response according to the text?", "options": [{"text": "Discard all data and start over with a new observation.", "isCorrect": false, "rationale": "Discarding data would be counterproductive; even data from an incorrect hypothesis is valuable for learning."}, {"text": "Consider the experiment a failure and stop the investigation.", "isCorrect": false, "rationale": "The text explicitly states that a wrong hypothesis 'teaches you something new' and that science never really ends, encouraging continued investigation."}, {"text": "Learn something new from the results and potentially ask a new question.", "isCorrect": true, "rationale": "The text states, 'It is perfectly okay if your hypothesis was wrong — that is how scientists learn! A wrong hypothesis teaches you something new,' and that a conclusion can lead to a new question."}, {"text": "Change the hypothesis to match the results obtained.", "isCorrect": false, "rationale": "Changing the hypothesis after seeing the results is unethical and undermines the scientific process of testing a prediction."}]}, {"question": "The dashed orange arrow in the scientific method diagram, leading from 'Conclude' back to 'Question,' signifies that:", "options": [{"text": "Scientists often make mistakes and have to repeat the entire process from the beginning.", "isCorrect": false, "rationale": "While mistakes can happen, the arrow represents the iterative nature of science, not necessarily a mistake. It signifies new learning leading to new questions."}, {"text": "A conclusion can inspire new inquiries, making science a continuous process of discovery.", "isCorrect": true, "rationale": "The text explains, 'Sometimes, your conclusion leads to a new question. That is great! You can go back to Step 2 and start again. Science never really ends — there are always more questions to explore.'"}, {"text": "It's perfectly acceptable to skip steps if your initial conclusion is strong enough.", "isCorrect": false, "rationale": "The scientific method is a step-by-step process; skipping steps compromises the validity and rigor of the investigation."}, {"text": "The scientific method is only useful for simple, one-time questions.", "isCorrect": false, "rationale": "The iterative nature shown by the arrow indicates that the method is for complex and ongoing investigations, not just simple, one-off questions."}]}, {"question": "If you lost your house key and decide to use the scientific method to find it, which action would best represent the 'Test It!' step?", "options": [{"text": "Thinking, 'I bet it's in my backpack because that's where I usually put it.'", "isCorrect": false, "rationale": "This is an example of forming a hypothesis (a prediction with reasoning), not testing it."}, {"text": "Noticing that your keys are often missing right after you get home.", "isCorrect": false, "rationale": "This is an observation, the first step of the scientific method."}, {"text": "Looking specifically in your backpack, then checking your coat pockets, then the kitchen counter.", "isCorrect": true, "rationale": "This action involves actively carrying out a search based on a prediction (testing your hypothesis by looking in specific places), analogous to designing and conducting an experiment."}, {"text": "Realizing your keys are not where they should be and asking, 'Where are my keys?'", "isCorrect": false, "rationale": "This represents the 'Ask a Question' step, which follows an observation."}]}, {"question": "In the 'Paper Airplane Experiment,' what is the 'one thing' being carefully changed to answer the question, 'Does the shape of a paper airplane affect how far it flies?'", "options": [{"text": "The person throwing the airplane.", "isCorrect": false, "rationale": "The experiment suggests 'Throw each one three times from the same spot with the same force,' implying the thrower should ideally remain consistent, not be the variable."}, {"text": "The force with which the airplane is thrown.", "isCorrect": false, "rationale": "The instructions explicitly state 'with the same force,' indicating this is a controlled variable, kept constant to ensure a fair test."}, {"text": "The measurement tool (ruler or tape measure).", "isCorrect": false, "rationale": "The measurement tool is part of recording results; its type is not the independent variable being changed to test the hypothesis."}, {"text": "The design/shape of the paper airplanes.", "isCorrect": true, "rationale": "The question is 'Does the shape of a paper airplane affect how far it flies?' and the test involves folding 'three different airplane designs,' making the shape the independent variable being changed."}]}, {"question": "Why is 'Share What You Learned' an important step in the scientific method?", "options": [{"text": "To show off how clever the scientist is.", "isCorrect": false, "rationale": "While scientists might be proud of their work, the primary purpose of sharing is collaboration and knowledge dissemination, not personal boasting."}, {"text": "So other people can learn from the discoveries and potentially verify the work.", "isCorrect": true, "rationale": "The text states, 'Scientists share their work so other people can learn from it — and maybe test it again to make sure,' highlighting knowledge sharing and reproducibility."}, {"text": "To get credit for being the first to observe something.", "isCorrect": false, "rationale": "While recognition can be a byproduct, the core scientific reason for sharing is to advance collective knowledge and allow for verification, not just credit."}, {"text": "It's mainly for personal satisfaction and doesn't affect the scientific community.", "isCorrect": false, "rationale": "Sharing results is fundamental to the scientific community, allowing for peer review, replication, and the building of new knowledge, making it far more than just personal satisfaction."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
