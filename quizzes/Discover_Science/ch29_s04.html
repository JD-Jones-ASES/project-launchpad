    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 29, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the textbook best summarize the fundamental relationship between electricity and magnetism?", "options": [{"text": "Electricity and magnetism are entirely separate phenomena that occasionally interact.", "isCorrect": false, "rationale": "The text explicitly states that electricity and magnetism are 'deeply connected' and that 'Each one can create the other!', contradicting the idea of them being entirely separate."}, {"text": "Each phenomenon can create the other, demonstrating a deep, interconnected relationship.", "isCorrect": true, "rationale": "The section's core message, highlighted at the beginning, is that 'Electricity and magnetism are deeply connected. Each one can create the other!'"}, {"text": "Magnetism is a byproduct of electricity, but electricity cannot be created by magnetism.", "isCorrect": false, "rationale": "This is incorrect. The section 'Magnetism Makes Electricity: The Generator' clearly explains how magnetism can create electricity through electromagnetic induction."}, {"text": "Both are forms of energy, but they originate from distinct, unrelated forces in nature.", "isCorrect": false, "rationale": "While both are related to energy, the text emphasizes their direct connection and ability to produce each other, rather than distinct, unrelated origins."}]}, {"question": "A key advantage of an electromagnet over a permanent magnet, as described in the text, is its ability to:", "options": [{"text": "Attract only specific types of metal with greater force.", "isCorrect": false, "rationale": "Both permanent magnets and electromagnets attract magnetic materials. The text highlights a different, more practical advantage of electromagnets."}, {"text": "Generate a magnetic field that never weakens over time.", "isCorrect": false, "rationale": "Electromagnets only produce a magnetic field when current flows; if the current stops, the field disappears, which is the opposite of never weakening."}, {"text": "Be easily turned on and off, allowing for precise control.", "isCorrect": true, "rationale": "The text states, 'But here is the best part: you can turn it off by disconnecting the battery! When the current stops, the magnetic field disappears. That makes electromagnets incredibly useful.'"}, {"text": "Maintain its magnetic properties even without an electric current.", "isCorrect": false, "rationale": "This describes a permanent magnet. An electromagnet's magnetic field disappears when the current stops, as explained in the text."}]}, {"question": "Which of the following everyday devices relies on an electromagnet's ability to be precisely controlled by turning its magnetic field on and off?", "options": [{"text": "A simple refrigerator magnet holding a note.", "isCorrect": false, "rationale": "Refrigerator magnets are permanent magnets and do not use electricity or the ability to be turned on and off."}, {"text": "A compass needle pointing towards magnetic north.", "isCorrect": false, "rationale": "A compass uses a small permanent magnet that aligns with Earth's magnetic field, not a controlled electromagnet."}, {"text": "A crane in a junkyard picking up and then dropping old cars.", "isCorrect": true, "rationale": "The text specifically mentions, 'Junkyards — a giant electromagnet on a crane picks up old cars. Turn off the current and the car drops,' directly illustrating its on/off control."}, {"text": "A bar magnet used for science experiments.", "isCorrect": false, "rationale": "A bar magnet is a type of permanent magnet and its magnetic field cannot be turned on or off."}]}, {"question": "What is the fundamental principle behind how a generator produces electric current?", "options": [{"text": "Applying an electric current to a coil of wire to create a rotational force.", "isCorrect": false, "rationale": "This describes the principle of an electric motor, where electricity creates motion, not a generator."}, {"text": "Moving an electric current through a magnetic field to induce a magnetic force.", "isCorrect": false, "rationale": "While related to electromagnetism, this is not the mechanism for *generating* electric current; rather, it describes how a force is exerted on a current-carrying wire in a magnetic field."}, {"text": "Moving a magnet near a coil of wire (or vice versa) to push electric charges.", "isCorrect": true, "rationale": "The text states, 'If you move a magnet near a coil of wire (or move the coil near a magnet), you can push electric charges through the wire and create an electric current. This is called electromagnetic induction, and the machine that does it is called a generator.'"}, {"text": "Converting chemical energy directly into electrical energy through a chemical reaction.", "isCorrect": false, "rationale": "This describes how a battery works. A generator converts motion energy into electrical energy."}]}, {"question": "In a hydroelectric dam, falling water spins a turbine connected to a generator. What is the correct sequence of energy transformations from the water's motion to electricity in a home, as described in the text?", "options": [{"text": "Electrical energy → Motion energy → Magnetic energy → Electrical energy.", "isCorrect": false, "rationale": "This sequence starts with electrical energy and involves a circular conversion, which doesn't accurately represent the initial generation process."}, {"text": "Motion energy → Magnetic field interaction → Movement of charges → Electrical energy.", "isCorrect": true, "rationale": "The text explains that spinning motion (from water, wind, or steam) causes magnets and coils to move past each other, which creates a magnetic force that pushes electric charges through the wire, generating electric current. This accurately describes the steps of a generator."}, {"text": "Chemical energy → Heat energy → Motion energy → Electrical energy.", "isCorrect": false, "rationale": "This sequence describes the process in a coal or natural gas power plant, not a hydroelectric dam, and it also oversimplifies the generator's internal mechanism."}, {"text": "Magnetic energy → Motion energy → Electrical energy.", "isCorrect": false, "rationale": "The primary input for a generator is motion energy, not magnetic energy directly. Magnetic energy is involved in the conversion, not as the initial input."}]}, {"question": "The text describes an electric motor as 'like a generator running backwards.' What is the most accurate implication of this statement regarding their primary functions?", "options": [{"text": "Motors use magnets to produce motion from a generator's output, making them less efficient.", "isCorrect": false, "rationale": "While motors use magnets, the statement refers to the reversal of energy conversion, not necessarily efficiency. The 'less efficient' part is not mentioned."}, {"text": "Motors convert motion into electricity, just like generators, but in a less powerful way.", "isCorrect": false, "rationale": "This describes a generator. Motors perform the opposite function of converting electricity into motion."}, {"text": "Motors convert electrical energy into motion, whereas generators convert motion into electrical energy.", "isCorrect": true, "rationale": "The text explicitly states, 'Instead of motion making electricity, electricity makes motion! A motor uses electric current and magnets to spin a shaft,' directly defining the reverse process compared to a generator."}, {"text": "Motors are powered by generators, creating a cycle where electricity is recycled back into motion.", "isCorrect": false, "rationale": "While motors are powered by electricity often from generators, the 'running backwards' refers to the *energy transformation* within the device itself, not a literal recycling of power."}]}, {"question": "According to the 'Electrical Safety' section, why is it particularly dangerous to touch electrical outlets with wet hands?", "options": [{"text": "Water can cause the voltage in the outlet to temporarily increase, leading to a stronger shock.", "isCorrect": false, "rationale": "Water does not increase the voltage of the current coming from an outlet."}, {"text": "Wet hands make your body a better conductor of electricity, allowing current to flow through you more easily.", "isCorrect": true, "rationale": "The text states, 'Water is a conductor. Wet skin lets current flow through your body much more easily,' which significantly increases the danger."}, {"text": "The moisture can cause the outlet to overheat and immediately start a fire.", "isCorrect": false, "rationale": "While electrical issues can cause fires, the primary and immediate danger with wet hands is the current flowing through your body, not necessarily a fire in the outlet itself."}, {"text": "The friction from wet hands can generate dangerous static electricity.", "isCorrect": false, "rationale": "Touching a live outlet involves dynamic current, not static electricity generated by friction."}]}, {"question": "Michael Faraday's pivotal discovery of electromagnetic induction directly paved the way for the invention of which two technologies that are fundamental to our modern electrical world?", "options": [{"text": "The electromagnet and the doorbell.", "isCorrect": false, "rationale": "While electromagnets are important, Faraday's key contribution related to *induction* led to different primary inventions. Doorbells are an application of electromagnets."}, {"text": "The battery and the power line.", "isCorrect": false, "rationale": "Batteries predated Faraday's work on induction, and power lines are for transmission, not the core devices resulting from induction."}, {"text": "The electric generator and the electric motor.", "isCorrect": true, "rationale": "The 'Famous Scientist' section clearly states, 'Through years of careful experiments, Faraday discovered electromagnetic induction... This discovery led to the invention of the electric generator and the electric motor.'"}, {"text": "The transformer and the light bulb.", "isCorrect": false, "rationale": "Faraday did build the first transformer, but the light bulb was not a direct invention stemming from his work on electromagnetic induction; generators and motors are the key devices mentioned."}]}, {"question": "A student observes a fan spinning in their room and later hears the distinct sound of a doorbell ringing. Based on the textbook, what is the common underlying principle enabling these two actions?", "options": [{"text": "Both devices convert motion energy into electrical energy.", "isCorrect": false, "rationale": "This describes a generator, which produces electricity. Both fans and doorbells *use* electricity for their actions."}, {"text": "Both rely on an electric motor to convert electrical energy into motion.", "isCorrect": true, "rationale": "The text lists 'Fans spin because of a motor' and explains that a doorbell's electromagnet pulls a striker to hit the bell, which is a form of motion initiated by electricity, thus applying the principle of a motor or an electromagnet creating motion from electricity."}, {"text": "Both employ a permanent magnet interacting with a metallic component to create sound.", "isCorrect": false, "rationale": "Neither a fan nor a doorbell primarily uses *permanent* magnets for their main function; they rely on electric current."}, {"text": "Both generate electricity by moving a coil of wire near a magnet.", "isCorrect": false, "rationale": "This describes a generator. Fans and doorbells are devices that *use* electricity to create motion or sound, not generate electricity."}]}, {"question": "In the context of large-scale electricity generation at hydroelectric dams, wind farms, and coal/natural gas power plants, what common device is universally responsible for transforming motion into electrical energy?", "options": [{"text": "A turbine", "isCorrect": false, "rationale": "A turbine captures the motion energy (from water, wind, or steam) and spins, but it is connected *to* the generator, which performs the actual electrical conversion."}, {"text": "A transformer", "isCorrect": false, "rationale": "A transformer is used to change the voltage of electricity for transmission, but it does not generate electricity from motion."}, {"text": "A generator", "isCorrect": true, "rationale": "The text states, 'Almost all the electricity you use at home comes from generators!' and explains how generators are used in hydroelectric, wind, and thermal power plants to turn motion into electricity."}, {"text": "A battery", "isCorrect": false, "rationale": "A battery stores and provides electricity through chemical reactions, but it does not convert large-scale motion into electricity in power plants."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
