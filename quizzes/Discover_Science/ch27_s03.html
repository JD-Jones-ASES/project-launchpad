<head>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 27, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A student is researching the origin of materials used to construct a modern skyscraper, specifically focusing on the steel frame, glass windows, and concrete foundation. From which of Earth's main parts are the primary resources for these materials most likely extracted?", "options": [{"text": "Primarily from the atmosphere, with some contribution from the hydrosphere.", "isCorrect": false, "rationale": "The atmosphere provides air and wind energy, but not the raw materials for steel, glass, or concrete, which are solid structural components. The hydrosphere provides water and minerals from the sea floor, but not the primary bulk materials for a skyscraper."}, {"text": "Primarily from the lithosphere, with some processing requiring resources from the atmosphere and hydrosphere.", "isCorrect": true, "rationale": "Steel comes from iron ore (mined from lithosphere), glass from sand (lithosphere), and concrete from rock and minerals (lithosphere). While processing these materials may use water (hydrosphere) and energy from fossil fuels (lithosphere) which interact with the atmosphere, the primary raw materials are from the lithosphere."}, {"text": "Exclusively from the hydrosphere, given the vast amount of water used in construction.", "isCorrect": false, "rationale": "While water is essential in construction, the bulk materials for steel, glass, and concrete are not extracted from the hydrosphere. The hydrosphere primarily provides fresh water, fish, salt, and some minerals from the sea floor."}, {"text": "Equally from all three parts: atmosphere, hydrosphere, and lithosphere.", "isCorrect": false, "rationale": "While all three parts provide important resources for human life in general, the specific primary raw materials for a skyscraper (steel, glass, concrete) are predominantly sourced from the lithosphere, not equally from all three."}]}, {"question": "Which of the following scenarios best illustrates an application of 'responsible logging' as described in the text?", "options": [{"text": "A logging company clear-cuts a section of an old-growth forest to maximize timber yield, then moves to a new area without further action.", "isCorrect": false, "rationale": "This scenario describes unsustainable logging practices, as it involves clear-cutting without replanting, which does not allow the forest to grow back over time, contradicting the definition of responsible logging."}, {"text": "A logging company selectively harvests mature trees from a forest and immediately plants an equivalent number of saplings in their place to ensure regrowth.", "isCorrect": true, "rationale": "The text states that 'Responsible logging companies replant new trees after cutting, so the forest can grow back over time.' This option directly reflects that practice, ensuring sustainability."}, {"text": "A construction company only uses wood from trees that have naturally fallen due to storms or old age, avoiding any active cutting.", "isCorrect": false, "rationale": "While environmentally conscious, this is not what the text describes as 'logging.' Logging specifically refers to 'cutting down trees to use the wood as a resource,' which implies active harvesting, not just collecting naturally fallen timber."}, {"text": "A paper mill recycles old paper products to reduce the demand for new wood pulp, thereby eliminating the need for logging.", "isCorrect": false, "rationale": "Recycling is an important environmental practice, but it is a processing step that occurs after logging and does not describe 'responsible logging' itself. It reduces demand, but logging (even responsible logging) would still occur for new material."}]}, {"question": "When following the journey of iron ore to become a bicycle, what critical transformation occurs in a very hot furnace to make the iron usable for steel, and what is the term for this process?", "options": [{"text": "The ore is crushed and mixed with water to form a pulp, then spread into sheets. This is called pulping.", "isCorrect": false, "rationale": "This describes the process of making paper from wood logs, not the transformation of iron ore into a usable metal for steel. Pulping is specifically mentioned for paper production."}, {"text": "The ore is heated to extremely high temperatures to separate the iron from the rock. This is called smelting.", "isCorrect": true, "rationale": "The text explicitly states: 'Smelt (heat) the ore in a very hot furnace to separate the iron from the rock.' This is the correct term and description for processing iron ore."}, {"text": "The ore is drilled from deep underground wells and flows up through pipes. This is called drilling.", "isCorrect": false, "rationale": "Drilling is the method used to extract oil and natural gas, not to separate iron from iron ore. Iron ore is obtained through mining."}, {"text": "The ore is ground into a fine powder and then molded into shapes. This is called shaping.", "isCorrect": false, "rationale": "While shaping occurs later (e.g., shaping steel into bicycle frames), the initial critical transformation in a furnace involves separating the metal from the rock through heat, which is smelting, not just grinding and molding."}]}, {"question": "Which of the following extraction methods is most likely to cause significant habitat destruction due to the removal of entire forests and hilltops?", "options": [{"text": "Drilling for oil and natural gas.", "isCorrect": false, "rationale": "While drilling can disturb ocean ecosystems, it does not typically involve the removal of entire forests and hilltops to the same extent as surface mining. Drilling creates wells, not massive open pits or clear-cut land areas."}, {"text": "Underground mining for coal.", "isCorrect": false, "rationale": "Underground mining involves digging tunnels and shafts deep into the Earth, which has different environmental impacts (e.g., cave-ins, water pollution) but generally does not remove entire surface ecosystems like forests or hilltops."}, {"text": "Surface mining for metals like iron and copper.", "isCorrect": true, "rationale": "The text explicitly states under 'Environmental Cost' that 'Surface mining removes entire forests and hilltops,' directly linking this method to significant habitat destruction."}, {"text": "Farming for crops like corn and cotton.", "isCorrect": false, "rationale": "Farming involves cultivating land, which can alter natural habitats, but it is a different process than mining and does not typically involve the 'removal of entire forests and hilltops' as a direct extraction method. Farming itself creates an agricultural habitat."}]}, {"question": "Considering the 'From Raw Resource to Finished Product' examples, what overarching principle applies to every step in transforming a natural resource into a usable product?", "options": [{"text": "Every step primarily relies on manual labor to minimize environmental impact.", "isCorrect": false, "rationale": "The text emphasizes the use of machinery and industrial processes (trucks, furnaces, mills) rather than manual labor for every step. While manual labor is involved, it's not the primary reliance."}, {"text": "The process always generates more useful byproducts than waste materials.", "isCorrect": false, "rationale": "The text states: 'For every useful product we make, there is leftover material that must go somewhere,' implying significant waste generation, not necessarily more useful byproducts."}, {"text": "Each transformation step consumes energy, often requiring other resources.", "isCorrect": true, "rationale": "The text explicitly states: 'Every step uses energy. The trucks that carry ore use gasoline (oil). The furnaces that melt metal use coal or natural gas. The paper mill uses electricity. Turning a raw resource into a finished product always uses other resources along the way.'"}, {"text": "The raw resource rarely changes its physical form until the final assembly stage.", "isCorrect": false, "rationale": "The examples show significant physical transformations at each stage (ore to iron, logs to pulp, pulp to paper) long before final assembly."}]}, {"question": "A community is experiencing unusually high rates of respiratory illnesses, and local environmental monitors detect elevated levels of airborne pollutants. Based on the text, which resource extraction or processing activity is the most likely contributor to this issue?", "options": [{"text": "Logging operations in nearby forests.", "isCorrect": false, "rationale": "Logging primarily causes habitat destruction and erosion, but it is not directly identified as a major source of airborne pollutants leading to respiratory illnesses in the text."}, {"text": "Farming activities, particularly those involving crop rotation.", "isCorrect": false, "rationale": "Farming uses soil, water, and sunlight, and while it can have environmental impacts (like soil erosion if not managed), it is not cited as a primary source of airborne pollutants causing respiratory illnesses."}, {"text": "Underground mining operations.", "isCorrect": false, "rationale": "Underground mining is associated with releasing chemicals into rivers and streams and soil/water damage, but the text does not directly link it to widespread airborne pollutants causing respiratory issues in the same way as fossil fuel burning."}, {"text": "Burning fossil fuels at power plants or factories.", "isCorrect": true, "rationale": "The text states under 'Pollution': 'Burning fossil fuels releases gases into the air that can make it harder to breathe.' This directly correlates with respiratory illnesses and airborne pollutants."}]}, {"question": "Which statement accurately differentiates between surface mining and underground mining?", "options": [{"text": "Surface mining primarily extracts oil and natural gas, while underground mining extracts solid minerals.", "isCorrect": false, "rationale": "Oil and natural gas are extracted through drilling, not surface or underground mining for the most part. Both surface and underground mining extract solid rocks, minerals, and fossil fuels like coal."}, {"text": "Surface mining involves removing soil and rock layers to access resources near the surface, while underground mining creates tunnels to reach resources deep below.", "isCorrect": true, "rationale": "The text clearly states: 'Surface mining — Workers remove the soil and rock on top to reach resources near the surface. This creates huge open pits.' And 'Underground mining — Workers dig tunnels and shafts deep into the Earth to reach resources that are far below the surface.'"}, {"text": "Surface mining is considered more environmentally friendly than underground mining due to easier reclamation.", "isCorrect": false, "rationale": "The text implies surface mining has significant environmental costs ('removes entire forests and hilltops') and does not suggest it's more environmentally friendly. The text doesn't compare the environmental impact in this way."}, {"text": "Underground mining is used for wood and agricultural products, whereas surface mining is for metals.", "isCorrect": false, "rationale": "Wood is obtained through logging, and agricultural products through farming. Neither is extracted via underground or surface mining. Both types of mining are for rocks, minerals, metals, or fossil fuels."}]}, {"question": "A company is planning to extract a resource that is 'trapped in rock layers deep underground' and will 'flow up through pipes to the surface.' What resource is being extracted, and what method will be used?", "options": [{"text": "Iron ore, extracted by surface mining.", "isCorrect": false, "rationale": "Iron ore is a solid mineral extracted by mining, and it does not flow up through pipes. It is primarily found near the surface or requires underground tunnels."}, {"text": "Wood for paper, extracted by logging.", "isCorrect": false, "rationale": "Wood comes from trees through logging, which involves cutting them down, not extracting them from deep underground rock layers via pipes."}, {"text": "Oil and natural gas, extracted by drilling.", "isCorrect": true, "rationale": "The text states: 'Oil and natural gas are trapped in rock layers deep underground. To reach them, workers drill wells — sometimes thousands of meters deep. The oil or gas flows up through pipes to the surface...'"}, {"text": "Coal, extracted by underground mining.", "isCorrect": false, "rationale": "Coal is extracted by underground mining and is a solid fossil fuel that needs to be dug out, not a fluid that flows up through pipes."}]}, {"question": "The process of turning raw iron ore into a bicycle involves multiple steps, including smelting, mixing with carbon, shaping, and assembly. Which of the following environmental impacts is NOT directly described as a consequence of such manufacturing and resource use in the text?", "options": [{"text": "Pollution from gases released by burning fossil fuels in furnaces.", "isCorrect": false, "rationale": "The text states: 'The furnaces that melt metal use coal or natural gas,' and under 'Pollution': 'Burning fossil fuels releases gases into the air that can make it harder to breathe.' This is a direct consequence."}, {"text": "Habitat destruction caused by surface mining for the iron ore.", "isCorrect": false, "rationale": "The text mentions 'Mine iron ore... from the ground' and links 'Surface mining' to 'removes entire forests and hilltops' and 'Habitat destruction.' This is a direct consequence."}, {"text": "Waste generated from leftover materials and old products ending up in landfills.", "isCorrect": false, "rationale": "The text states: 'For every useful product we make, there is leftover material that must go somewhere. Old products that are thrown away end up in landfills.' This is a direct consequence."}, {"text": "Stratospheric ozone depletion due to chlorofluorocarbon emissions.", "isCorrect": true, "rationale": "The text discusses pollution from burning fossil fuels, harmful chemicals from mining, and waste. However, it does not mention stratospheric ozone depletion or chlorofluorocarbon emissions as an environmental cost."}]}, {"question": "Given the overall discussion of where resources come from and their environmental costs, what is the most appropriate concluding lesson for individuals regarding their use of resources?", "options": [{"text": "All resource extraction should cease immediately to prevent further environmental damage.", "isCorrect": false, "rationale": "The text explicitly states: 'Does this mean we should stop using resources? No — people need resources to live.' Therefore, ceasing all extraction is not the recommended approach."}, {"text": "The environmental costs are unavoidable and should be accepted as a necessary trade-off for progress.", "isCorrect": false, "rationale": "While some costs are inherent, the text encourages finding 'ways to reduce them' and using resources 'carefully and wisely,' implying that costs should not simply be accepted but mitigated."}, {"text": "Individuals should strive to use resources carefully and wisely to mitigate environmental harm, as they are essential for life.", "isCorrect": true, "rationale": "The final sentence of the section states: 'But it does mean we should use them carefully and wisely. In the next section, we will learn how.' This directly reflects the recommended conclusion."}, {"text": "Focus should solely be on finding new resources, as current ones are rapidly depleting.", "isCorrect": false, "rationale": "The text does not focus on finding new resources as the primary solution but rather on responsible use of existing ones and mitigating environmental impacts, suggesting a more holistic approach."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
