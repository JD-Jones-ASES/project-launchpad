<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 21, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary difference between a food chain and a food web?", "options": [{"text": "A food chain includes decomposers, while a food web does not.", "isCorrect": false, "rationale": "Both food chains and food webs involve the concept of decomposers breaking down dead material, though food chains often simplify to producers and consumers. The text explicitly mentions drawing arrows to decomposers in the food web activity."}, {"text": "A food chain shows a single path of energy, while a food web shows many connected paths.", "isCorrect": true, "rationale": "The text defines a food chain as 'a diagram that shows a single path of energy' and a food web as 'a diagram that shows many connected food chains in an ecosystem', making this the most accurate distinction."}, {"text": "A food chain starts with a consumer, but a food web starts with a producer.", "isCorrect": false, "rationale": "Both food chains and food webs start with energy from the Sun captured by a producer, not a consumer."}, {"text": "A food chain only includes animals, while a food web includes plants and animals.", "isCorrect": false, "rationale": "Both food chains and food webs begin with producers (plants) and include various types of consumers (animals)."}]}, {"question": "In the grassland food chain 'Sun → Grass → Rabbit → Hawk', which organism is classified as the secondary consumer?", "options": [{"text": "Sun", "isCorrect": false, "rationale": "The Sun is the ultimate energy source, not an organism within the food chain itself."}, {"text": "Grass", "isCorrect": false, "rationale": "Grass is the producer, as it captures energy from the Sun through photosynthesis."}, {"text": "Rabbit", "isCorrect": false, "rationale": "The rabbit eats the grass (producer), making it the primary consumer."}, {"text": "Hawk", "isCorrect": true, "rationale": "The hawk eats the rabbit, which is the primary consumer. Therefore, the hawk is the secondary consumer."}]}, {"question": "What do the arrows in a food chain or food web diagram primarily represent?", "options": [{"text": "The direction the predator hunts its prey.", "isCorrect": false, "rationale": "While predators hunt prey, the arrows' meaning is more fundamental: they show the transfer of energy. The text explicitly states, 'The arrows mean “gives energy to.”'"}, {"text": "The flow of energy from one organism to another.", "isCorrect": true, "rationale": "The text clearly states, 'The arrows mean “gives energy to.”' and 'Arrows point in the direction energy moves.' This represents the transfer of energy through consumption."}, {"text": "The movement of organisms within an ecosystem.", "isCorrect": false, "rationale": "The arrows do not directly show physical movement or migration of organisms, but rather the path of energy transfer."}, {"text": "The growth rate of different populations.", "isCorrect": false, "rationale": "Food chain/web diagrams illustrate energy flow, not population dynamics or growth rates."}]}, {"question": "Why are food chains usually short, typically having only three, four, or five links?", "options": [{"text": "Organisms at higher trophic levels are too large to be eaten by many predators.", "isCorrect": false, "rationale": "While size can play a role, it is not the primary reason for short food chains. The main limiting factor is energy transfer."}, {"text": "The Sun's energy is not strong enough to support more links in the chain.", "isCorrect": false, "rationale": "The issue is not the Sun's initial energy strength, but the inefficient transfer of energy at each step along the chain."}, {"text": "Most of the energy is used up by each organism for living, leaving only a small part to pass on.", "isCorrect": true, "rationale": "The text explains, 'at every link in the chain, some energy is used up. Each organism uses most of the energy it gets just to live… Only a small part of the energy is passed to the next link. That is why food chains are usually short'."}, {"text": "There are not enough different types of organisms to create longer chains.", "isCorrect": false, "rationale": "Ecosystems are diverse, and the variety of organisms is not the limiting factor for chain length; energy availability is."}]}, {"question": "A deer eats acorns, grass, and berries. A fox eats rabbits and squirrels. Based on this information and the definitions in the text, which statement is true?", "options": [{"text": "The deer is a secondary consumer, and the fox is a primary consumer.", "isCorrect": false, "rationale": "The deer eats producers (acorns, grass, berries), making it a primary consumer, not a secondary. The fox eats consumers (rabbits, squirrels), making it a secondary consumer or higher, not primary."}, {"text": "Both the deer and the fox are producers.", "isCorrect": false, "rationale": "Producers create their own food; deer and foxes are consumers, as they eat other organisms."}, {"text": "The deer is a primary consumer, and the fox is likely a secondary consumer.", "isCorrect": true, "rationale": "The deer eats plants (producers), making it a primary consumer (herbivore). The fox eats rabbits and squirrels (which are consumers), thus making the fox a secondary consumer. (Note: Rabbits are primary consumers; squirrels can be primary/secondary depending on diet, but foxes eating them generally places them as secondary or tertiary consumers.)"}, {"text": "The fox is a decomposer, and the deer is a top predator.", "isCorrect": false, "rationale": "Foxes are consumers (predators), not decomposers. Deer are prey animals, not top predators."}]}, {"question": "In the 'Build a Food Web' activity, the organism cards listed 'Grasshopper (herbivore)'. How would the grasshopper be classified in a food chain?", "options": [{"text": "Producer", "isCorrect": false, "rationale": "Producers, like grass, make their own food. The grasshopper is an herbivore, meaning it eats producers."}, {"text": "Primary consumer", "isCorrect": true, "rationale": "A primary consumer is an animal that eats producers (plants). As an herbivore, the grasshopper eats plants like grass, making it a primary consumer."}, {"text": "Secondary consumer", "isCorrect": false, "rationale": "A secondary consumer eats primary consumers. The grasshopper eats plants, not other animals."}, {"text": "Decomposer", "isCorrect": false, "rationale": "Decomposers break down dead organic material. The grasshopper is a living animal that consumes plants."}]}, {"question": "If a disease drastically reduced the population of rabbits in an ecosystem where rabbits are a primary food source for both foxes and hawks, what would be the most likely immediate consequence for the foxes and hawks?", "options": [{"text": "Their populations would likely increase due to less competition for other prey.", "isCorrect": false, "rationale": "A reduction in a primary food source would likely lead to a decrease, not an increase, in their populations unless other food sources became immediately abundant, which is not implied."}, {"text": "They would switch their diet entirely to decomposers.", "isCorrect": false, "rationale": "Foxes and hawks are carnivores/omnivores and do not typically eat decomposers."}, {"text": "Their populations would likely decrease due to a significant reduction in their food supply.", "isCorrect": true, "rationale": "As predators relying on rabbits as a primary food source, a sharp decline in the rabbit population would directly lead to less food availability, causing their own populations to decline due to starvation or reduced reproductive success."}, {"text": "They would become producers and start making their own food.", "isCorrect": false, "rationale": "Foxes and hawks are consumers and cannot photosynthesize to become producers."}]}, {"question": "According to the 'Build a Food Web' steps, what crucial role do decomposers play in an ecosystem?", "options": [{"text": "They convert light energy into chemical energy through photosynthesis.", "isCorrect": false, "rationale": "This is the role of producers (plants), not decomposers."}, {"text": "They hunt and eat other animals as top predators.", "isCorrect": false, "rationale": "This describes carnivores and top predators, not decomposers."}, {"text": "They break down dead organisms and return essential nutrients to the soil.", "isCorrect": true, "rationale": "The steps explicitly state, 'Draw arrows from dead organisms to the decomposers. Decomposers break down all types of dead material.' and 'Draw an arrow from the decomposers back to the soil, and from the soil to the producers (nutrients cycle back!).'"}, {"text": "They are the primary consumers, eating only plants.", "isCorrect": false, "rationale": "This describes herbivores or primary consumers, which are distinct from decomposers."}]}, {"question": "Where does the initial energy for almost all food chains on Earth ultimately originate?", "options": [{"text": "Decomposers", "isCorrect": false, "rationale": "Decomposers recycle nutrients but do not provide the initial energy input for the ecosystem."}, {"text": "Primary consumers", "isCorrect": false, "rationale": "Primary consumers obtain their energy by eating producers; they do not originate the energy."}, {"text": "The Sun", "isCorrect": true, "rationale": "The text states, 'Every food chain starts with energy from the Sun, which a producer captures through photosynthesis.' This is the ultimate source of energy for most ecosystems."}, {"text": "Chemical energy stored in rocks", "isCorrect": false, "rationale": "While some deep-sea ecosystems derive energy from chemical reactions (chemosynthesis), the text emphasizes the Sun as the source for 'every food chain' in the context of typical ecosystems."}]}, {"question": "A mouse in a forest ecosystem eats grass and seeds, and is, in turn, eaten by snakes, hawks, and foxes. Based on the text's definitions, how is the mouse best classified in this food web?", "options": [{"text": "Carnivore and top predator", "isCorrect": false, "rationale": "The mouse eats plants (grass and seeds), so it is not purely a carnivore. It is also eaten by other animals, so it is not a top predator."}, {"text": "Producer and predator", "isCorrect": false, "rationale": "The mouse consumes other organisms, so it is not a producer. It is prey, not a primary predator in this context."}, {"text": "Primary consumer and prey", "isCorrect": true, "rationale": "Since the mouse eats grass and seeds (producers), it acts as a primary consumer. Because it is eaten by snakes, hawks, and foxes, it is also considered prey."}, {"text": "Decomposer and secondary consumer", "isCorrect": false, "rationale": "The mouse is a living organism consuming plants, not a decomposer. While mice can be omnivores and act as secondary consumers (e.g., eating insects), its role eating grass and seeds defines its primary consumer aspect, and its role as prey is clear. It is not a decomposer."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
