<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 14, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary way the Sun contributes to Earth's energy budget, as described in the text?", "options": [{"text": "It directly converts its mass into electricity for human use.", "isCorrect": false, "rationale": "The text states the Sun sends out light and heat energy, not that it directly converts its mass into electricity for Earth's use."}, {"text": "It provides light and heat energy that powers almost everything that happens on our planet.", "isCorrect": true, "rationale": "The section explicitly states, 'Every second, it sends an enormous amount of light energy and heat energy streaming out in all directions. Some of that energy reaches Earth, and it powers almost everything that happens on our planet.'"}, {"text": "It acts as a gravitational anchor, keeping Earth in orbit but providing no energy.", "isCorrect": false, "rationale": "While the Sun does have a gravitational role, the text focuses on its immense energy output that reaches Earth and powers our planet."}, {"text": "It primarily generates geothermal energy through its core interactions with Earth.", "isCorrect": false, "rationale": "Geothermal energy is heat from deep inside Earth itself, not primarily generated by the Sun's direct interaction with Earth's core in the way described."}]}, {"question": "If you eat a slice of bread made from wheat, how does the energy you gain ultimately trace back to the Sun?", "options": [{"text": "The bread was baked using solar-powered ovens, directly transferring sunlight.", "isCorrect": false, "rationale": "While solar ovens use sunlight, the energy stored *within* the bread itself from the wheat comes from a different process, not the baking method."}, {"text": "The wheat plant used sunlight to produce chemical energy stored in its grains through photosynthesis.", "isCorrect": true, "rationale": "The text explains, 'Plants capture light energy from the Sun and store it as chemical energy inside their leaves, stems, fruits, and seeds.' Wheat grains are seeds."}, {"text": "The bread contains geothermal energy from the soil where the wheat grew.", "isCorrect": false, "rationale": "Geothermal energy is from deep within the Earth and is not the source of energy stored in plants for food."}, {"text": "The Sun's gravity helped the wheat grow taller, increasing its potential energy.", "isCorrect": false, "rationale": "The Sun's gravity does not directly provide the chemical energy stored in the plant for food; that comes from photosynthesis."}]}, {"question": "According to the text, which statement best defines chemical energy?", "options": [{"text": "Energy created by the friction of two substances rubbing together.", "isCorrect": false, "rationale": "Energy from friction is typically transformed into heat or sound energy, not defined as chemical energy."}, {"text": "Energy stored inside a substance, such as food or fuels, that can be released.", "isCorrect": true, "rationale": "The text explicitly defines chemical energy as 'energy stored inside a substance. Food, batteries, and fuels all contain chemical energy that can be released.'"}, {"text": "Energy from the movement of objects, like a rolling ball or a person walking.", "isCorrect": false, "rationale": "This describes kinetic energy, not chemical energy."}, {"text": "Energy derived from the heat deep inside Earth's core.", "isCorrect": false, "rationale": "This describes geothermal energy, not chemical energy."}]}, {"question": "While the Sun is the main energy source, the text identifies some 'other energy sources.' Which of the following is truly *not* ultimately derived from the Sun, according to the passage?", "options": [{"text": "Coal, oil, and natural gas.", "isCorrect": false, "rationale": "The text states that 'even fuels like coal, oil, and natural gas got their energy from the Sun long ago. They formed from ancient plants and animals that once captured sunlight.'"}, {"text": "Wind energy.", "isCorrect": false, "rationale": "The text explains, 'The Sun heats different parts of Earth unevenly, and the moving air is what we call wind,' directly linking wind to solar energy."}, {"text": "Tidal energy.", "isCorrect": true, "rationale": "The text identifies tidal energy as stemming from 'The Moon's gravity pulls on Earth's oceans,' making it independent of the Sun as its primary source."}, {"text": "Energy used by plants for photosynthesis.", "isCorrect": false, "rationale": "Photosynthesis is the process by which plants specifically use the Sun's light energy."}]}, {"question": "The text states that the Sun creates wind. Which of the following mechanisms best explains this process?", "options": [{"text": "The Sun's electromagnetic waves directly push air molecules.", "isCorrect": false, "rationale": "While the Sun emits electromagnetic waves, the text specifies a different mechanism for wind creation."}, {"text": "The Sun's gravitational pull on Earth's atmosphere causes large-scale air movements.", "isCorrect": false, "rationale": "The text attributes wind to uneven heating, not primarily the Sun's gravity."}, {"text": "The Sun heats different parts of Earth unevenly, causing air to move.", "isCorrect": true, "rationale": "The text clearly states, 'The Sun heats different parts of Earth unevenly, and the moving air is what we call wind.'"}, {"text": "The Sun's light energy converts directly into kinetic energy in the air.", "isCorrect": false, "rationale": "The conversion is indirect, through uneven heating which then causes air movement, rather than direct conversion of light to kinetic energy of air molecules."}]}, {"question": "When a battery powers a flashlight, which energy transformation is primarily occurring, and where would its original energy likely be traced back to according to the text?", "options": [{"text": "Chemical energy to light energy; ultimately from the Sun.", "isCorrect": true, "rationale": "The text defines batteries as containing 'chemical energy that can be released' (transformed into light and heat in a flashlight). It also concludes that 'the Sun really is behind almost all the energy we use!'"}, {"text": "Kinetic energy to sound energy; ultimately from geothermal sources.", "isCorrect": false, "rationale": "Batteries do not primarily store kinetic energy, a flashlight's main output is not sound, and geothermal energy is not the typical source for battery power."}, {"text": "Heat energy to potential energy; ultimately from tidal forces.", "isCorrect": false, "rationale": "This transformation is incorrect for a battery powering a flashlight, and tidal forces are not a typical energy source for batteries."}, {"text": "Mechanical energy to electrical energy; ultimately from nuclear reactions.", "isCorrect": false, "rationale": "While electricity is involved, the primary transformation in the battery is chemical, and nuclear reactions are a separate, distinct energy source from the 'almost all' covered by the Sun."}]}, {"question": "What was James Prescott Joule's most significant discovery about heat, as highlighted in the text?", "options": [{"text": "That heat is a separate, invisible substance that flows between objects.", "isCorrect": false, "rationale": "The text states he disproved this belief, showing 'that heat is a form of energy — not a separate substance, as many people believed at the time.'"}, {"text": "That heat is a form of energy and can be converted from mechanical energy.", "isCorrect": true, "rationale": "Joule 'showed that heat is a form of energy' and his experiments 'proved that mechanical energy (motion) could be converted into heat energy in a predictable way.'"}, {"text": "That heat is caused by the absence of cold and has no relation to energy.", "isCorrect": false, "rationale": "This is a fundamental misunderstanding of heat, which Joule's work directly contradicted."}, {"text": "That heat only exists in living organisms and is vital for their survival.", "isCorrect": false, "rationale": "Heat exists in many forms and contexts, not just living organisms. Joule's work was about the nature of heat as energy generally."}]}, {"question": "The unit of energy, the joule (J), is defined in the text as approximately the energy needed to perform what action?", "options": [{"text": "Boil one liter of water for one minute.", "isCorrect": false, "rationale": "This action requires significantly more energy than a single joule, and is not the example given."}, {"text": "Lift a small apple one meter off the ground.", "isCorrect": true, "rationale": "The text states, 'A single joule is about the energy needed to lift a small apple one meter off the ground.'"}, {"text": "Power a small light bulb for one hour.", "isCorrect": false, "rationale": "Powering a light bulb for an hour involves a much larger amount of energy than a single joule."}, {"text": "Walk one kilometer on a flat surface.", "isCorrect": false, "rationale": "Walking a kilometer involves a variable but much larger amount of energy than a single joule."}]}, {"question": "A student is asked to find an energy source that does *not* ultimately originate from the Sun. Based on the 'Other Energy Sources' section, which option would be a correct example?", "options": [{"text": "A hydroelectric dam generating power from river flow.", "isCorrect": false, "rationale": "The water cycle, which drives river flow and thus hydroelectric power, is powered by the Sun heating water and causing evaporation."}, {"text": "A plant growing in a garden using sunlight.", "isCorrect": false, "rationale": "Plants directly use the Sun's light energy for photosynthesis, as explained in the text."}, {"text": "A nuclear power plant generating electricity.", "isCorrect": true, "rationale": "The text explicitly lists nuclear energy as 'Energy locked inside the centers of atoms' and doesn't trace its origin back to the Sun, unlike fossil fuels."}, {"text": "A campfire burning wood for warmth.", "isCorrect": false, "rationale": "The wood for the campfire came from a plant, which captured sunlight to store chemical energy, tracing its energy back to the Sun."}]}, {"question": "During the 'Energy Scavenger Hunt,' a student observes a clock with a ticking second hand and hears their classmates talking. Which two energy forms are best represented by these observations, respectively?", "options": [{"text": "Light energy (clock) and potential energy (classmates).", "isCorrect": false, "rationale": "A ticking clock hand is kinetic energy, not light. Talking involves sound energy, not potential energy."}, {"text": "Kinetic energy (clock) and sound energy (classmates).", "isCorrect": true, "rationale": "The movement of the clock's second hand is an example of kinetic energy. Voices and talking produce sound energy, as indicated in the 'Expected answers' for the scavenger hunt."}, {"text": "Heat energy (clock) and light energy (classmates).", "isCorrect": false, "rationale": "Neither option is the primary energy form being observed in these examples."}, {"text": "Potential energy (clock) and kinetic energy (classmates).", "isCorrect": false, "rationale": "A ticking clock hand is kinetic energy, not potential. While classmates might be moving (kinetic), the act of 'talking' primarily produces sound energy."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
