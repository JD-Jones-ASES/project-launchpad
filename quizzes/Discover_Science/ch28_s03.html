<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 28, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary function of a subscript in a chemical formula?", "options": [{"text": "It indicates the number of molecules.", "isCorrect": false, "rationale": "A coefficient (the large number in front of a formula) indicates the number of molecules, not the subscript."}, {"text": "It identifies the element type.", "isCorrect": false, "rationale": "The element symbol (the letter or pair of letters) identifies the element type."}, {"text": "It shows how many atoms of that specific element are in one molecule.", "isCorrect": true, "rationale": "As stated in the text, a subscript is 'a small number written to the lower right of an element symbol. It tells how many of that atom are in the molecule.'"}, {"text": "It tells the total number of atoms in the entire molecule.", "isCorrect": false, "rationale": "To find the total number of atoms, you must sum all the subscripts for each element in the molecule, not simply read one subscript."}]}, {"question": "How many hydrogen atoms are present in one molecule of citric acid, C6H8O7?", "options": [{"text": "6", "isCorrect": false, "rationale": "The subscript '6' refers to the number of carbon atoms (C), not hydrogen."}, {"text": "7", "isCorrect": false, "rationale": "The subscript '7' refers to the number of oxygen atoms (O), not hydrogen."}, {"text": "8", "isCorrect": true, "rationale": "The formula C6H8O7 shows the symbol 'H' for hydrogen followed by the subscript '8', indicating eight hydrogen atoms."}, {"text": "21", "isCorrect": false, "rationale": "21 is the total number of atoms in the molecule (6 carbon + 8 hydrogen + 7 oxygen), not just the number of hydrogen atoms."}]}, {"question": "In the chemical formula for table salt, NaCl, what does the absence of a subscript next to 'Na' or 'Cl' signify?", "options": [{"text": "The element is not essential for the molecule's function.", "isCorrect": false, "rationale": "The formula represents the complete composition; all listed elements are essential. The absence of a subscript has a specific quantitative meaning."}, {"text": "There is only one atom of that element in the molecule.", "isCorrect": true, "rationale": "The text explicitly states: 'If there is no number after a symbol, it means there is just one of that atom.'"}, {"text": "The element is a gas at room temperature.", "isCorrect": false, "rationale": "The physical state of an element is not indicated by the absence of a subscript in a chemical formula."}, {"text": "The atom is unstable and will quickly react with other substances.", "isCorrect": false, "rationale": "Chemical stability is a property of the substance, not indicated by the presence or absence of a subscript '1'."}]}, {"question": "Based on its chemical formula, which statement accurately describes a molecule of carbon dioxide (CO2)?", "options": [{"text": "It contains two carbon atoms and one oxygen atom.", "isCorrect": false, "rationale": "The formula CO2 indicates one carbon atom (C) and two oxygen atoms (O), not the other way around."}, {"text": "It contains one carbon atom and two oxygen atoms.", "isCorrect": true, "rationale": "The formula CO2 shows 'C' (implied 1 carbon atom) and 'O2' (two oxygen atoms), which is correctly stated in the 'Reading Common Formulas' table."}, {"text": "It is composed of a total of four atoms.", "isCorrect": false, "rationale": "A molecule of CO2 contains 1 carbon atom + 2 oxygen atoms, totaling 3 atoms."}, {"text": "It is made up of carbon, oxygen, and an unknown third element.", "isCorrect": false, "rationale": "The formula CO2 clearly indicates only two elements: Carbon (C) and Oxygen (O)."}]}, {"question": "A chemical formula acts like a 'recipe' for a molecule because it primarily tells you:", "options": [{"text": "How the atoms are arranged in a three-dimensional structure.", "isCorrect": false, "rationale": "While structural formulas show arrangement, a basic chemical formula like H2O primarily conveys the types and counts of atoms, not their spatial arrangement."}, {"text": "The temperature at which the molecule was formed.", "isCorrect": false, "rationale": "Chemical formulas do not provide information about the formation conditions like temperature."}, {"text": "Which atoms are present and how many of each.", "isCorrect": true, "rationale": "The text explicitly states, 'A chemical formula is like a recipe for a molecule. It tells you exactly which atoms you need and how many of each.'"}, {"text": "The weight of the entire molecule.", "isCorrect": false, "rationale": "While a molecule's weight can be calculated from its formula, the formula itself directly provides the constituent atoms and their counts, not the weight itself as a 'recipe' ingredient."}]}, {"question": "The section states that 'When a chemical reaction happens, atoms are rearranged — they change partners. But the total number of each kind of atom stays exactly the same before and after the reaction.' What fundamental principle of chemistry does this statement describe?", "options": [{"text": "The law of definite proportions.", "isCorrect": false, "rationale": "The law of definite proportions relates to the constant ratio of elements in a compound, not the conservation of atoms in a reaction."}, {"text": "The law of conservation of mass.", "isCorrect": true, "rationale": "The conservation of atoms means that no mass is gained or lost during a chemical reaction, which is the definition of the law of conservation of mass."}, {"text": "The law of increasing entropy.", "isCorrect": false, "rationale": "The law of increasing entropy is a concept from thermodynamics, not directly about the conservation of atoms in this context."}, {"text": "The law of chemical equilibrium.", "isCorrect": false, "rationale": "The law of chemical equilibrium describes the state where forward and reverse reaction rates are equal, not the conservation of atoms during a reaction."}]}, {"question": "In the reaction 2 H2 + O2 -> 2 H2O, how many total hydrogen atoms are present on the *reactant* side (before the arrow)?", "options": [{"text": "2", "isCorrect": false, "rationale": "This number refers to the coefficient for H2, indicating two H2 molecules, not the total number of hydrogen atoms."}, {"text": "4", "isCorrect": true, "rationale": "The coefficient '2' in front of H2 means there are two H2 molecules. Each H2 molecule contains 2 hydrogen atoms. So, 2 molecules * 2 atoms/molecule = 4 hydrogen atoms total, as shown in the 'Counting Atoms in a Reaction' table."}, {"text": "1", "isCorrect": false, "rationale": "This number (implied) refers to the coefficient for O2, indicating one O2 molecule, which contains oxygen atoms, not hydrogen."}, {"text": "6", "isCorrect": false, "rationale": "This would be the total number of atoms on the reactant side (4 H + 2 O), not just the hydrogen atoms."}]}, {"question": "The 'Atomic Accounting with Colored Beads' activity directly demonstrates which of the following concepts?", "options": [{"text": "How atoms change their identity during a chemical reaction.", "isCorrect": false, "rationale": "The activity, and the text, explicitly state that atoms rearrange but do not change their identity (e.g., white beads remain white beads)."}, {"text": "The rearrangement of atoms and their conservation during a chemical reaction.", "isCorrect": true, "rationale": "The activity involves taking apart 'before' molecules and rebuilding them into 'after' molecules using the same beads, demonstrating that atoms are rearranged but not lost or gained, thus conserved."}, {"text": "The physical properties of hydrogen and oxygen.", "isCorrect": false, "rationale": "Colored beads are a model; they do not represent or demonstrate the physical properties (like state or reactivity) of actual hydrogen and oxygen."}, {"text": "The creation of new atoms from existing ones.", "isCorrect": false, "rationale": "The core lesson of the activity and section is that atoms are conserved, meaning they are neither created nor destroyed."}]}, {"question": "The 'Chemical Formulas Are Everywhere' section mentions that bakers use 'sodium bicarbonate' (NaHCO3) as baking soda. Based on its formula, how many *different kinds* of atoms are in one molecule of baking soda?", "options": [{"text": "Two", "isCorrect": false, "rationale": "The formula NaHCO3 clearly shows four distinct element symbols: Na, H, C, and O."}, {"text": "Three", "isCorrect": false, "rationale": "The formula NaHCO3 clearly shows four distinct element symbols: Na, H, C, and O."}, {"text": "Four", "isCorrect": true, "rationale": "The formula NaHCO3 contains four different element symbols: Na (sodium), H (hydrogen), C (carbon), and O (oxygen)."}, {"text": "Six", "isCorrect": false, "rationale": "Six is the sum of some of the subscripts or a miscount of elements and atoms. There are 1 Na + 1 H + 1 C + 3 O = 6 total atoms, but only 4 *kinds* of atoms."}]}, {"question": "The 'teachernote' links this section to Unit 18, which discussed chemical changes like color change or gas bubbles. How does understanding chemical formulas and reactions help explain these observations?", "options": [{"text": "It shows that atoms disappear to cause color changes.", "isCorrect": false, "rationale": "The text explicitly states that atoms are conserved; they do not disappear in chemical reactions."}, {"text": "It reveals that atoms are simply rearranging to form new substances with different properties.", "isCorrect": true, "rationale": "The 'teachernote' explains that 'atoms are rearranging into new molecules' and that these new molecules result in observable 'chemical changes' like color change or gas bubbles."}, {"text": "It demonstrates how elements transform into completely new elements during a reaction.", "isCorrect": false, "rationale": "Chemical reactions involve the rearrangement of atoms, not the transformation of one element into another (which is a nuclear reaction)."}, {"text": "It proves that all chemical changes release heat and light.", "isCorrect": false, "rationale": "While some chemical changes release heat and light, this is not true for all, and the primary explanation for *why* changes occur is atom rearrangement."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
