<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 2, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "From space, what accounts for the beautiful blue appearance of Earth, as described in the text?", "options": [{"text": "Large landmasses reflecting sunlight", "isCorrect": false, "rationale": "The text states that 'the green and brown parts are land,' not blue."}, {"text": "The vast amount of water covering its surface", "isCorrect": true, "rationale": "The text explicitly states, 'The blue parts are water.'"}, {"text": "The layer of clouds in the atmosphere", "isCorrect": false, "rationale": "While clouds exist in the air, the primary blue color from space is attributed to water, not clouds."}, {"text": "The invisible mixture of gases surrounding the planet", "isCorrect": false, "rationale": "The text describes air as 'invisible' and 'wrapped around everything,' not as the source of Earth's blue color from space."}]}, {"question": "Approximately what percentage of Earth's surface is covered by water, according to the provided section?", "options": [{"text": "29%", "isCorrect": false, "rationale": "The text specifies a much higher percentage for water coverage."}, {"text": "50%", "isCorrect": false, "rationale": "This percentage is significantly lower than what the text indicates for water coverage."}, {"text": "71%", "isCorrect": true, "rationale": "The text clearly states, 'About 71% of Earth is covered by water!'"}, {"text": "90%", "isCorrect": false, "rationale": "This percentage is higher than the figure provided in the text for water coverage."}]}, {"question": "The text describes 'rock' as the solid ground beneath your feet. Which of the following is explicitly mentioned as sitting *on top* of rock, rather than being rock itself?", "options": [{"text": "Mountains", "isCorrect": false, "rationale": "The text states that 'Mountains... are all made of rock,' not sitting on top of it."}, {"text": "The ocean floor", "isCorrect": false, "rationale": "The text includes 'the ocean floor' as being 'made of rock.'"}, {"text": "Soil", "isCorrect": true, "rationale": "The text explicitly notes, 'Even the soil in your garden sits on top of rock.'"}, {"text": "Hills", "isCorrect": false, "rationale": "The text states that 'hills... are all made of rock,' not sitting on top of it."}]}, {"question": "If you are standing in a field, breathing deeply, and drinking from a bottle of spring water, you are directly interacting with which of Earth's main parts?", "options": [{"text": "Only water and air", "isCorrect": false, "rationale": "Standing in a field implies interaction with 'rock' (or the soil that sits on rock), making this option incomplete."}, {"text": "Only rock and water", "isCorrect": false, "rationale": "Breathing deeply indicates interaction with 'air,' making this option incomplete."}, {"text": "Only air and rock", "isCorrect": false, "rationale": "Drinking spring water signifies interaction with 'water,' making this option incomplete."}, {"text": "Rock, water, and air", "isCorrect": true, "rationale": "Standing on a field (rock/soil), breathing (air), and drinking water (water) all indicate interaction with the three main components of Earth."}]}, {"question": "Among Earth's three main components, which one is specifically mentioned as performing the crucial function of protecting you from the Sun's harmful rays?", "options": [{"text": "Rock", "isCorrect": false, "rationale": "Rock provides solid ground and forms landforms, but it is not described as protecting from the Sun's rays in this text."}, {"text": "Water", "isCorrect": false, "rationale": "Water covers much of the Earth and is essential for life, but the text does not attribute the protection from the Sun's harmful rays to water directly."}, {"text": "Air", "isCorrect": true, "rationale": "The text explicitly states that air 'protects you from the Sun's harmful rays.'"}, {"text": "The Earth's inner core", "isCorrect": false, "rationale": "The Earth's inner core is not mentioned in this section, nor is it responsible for protection from the Sun's harmful rays as described here."}]}, {"question": "The text emphasizes that rock, water, and air 'work together.' What is the primary outcome of this cooperation highlighted in the section?", "options": [{"text": "The creation of diverse geological formations and landscapes", "isCorrect": false, "rationale": "While these components contribute to landscapes, the text focuses on a broader outcome for the planet and life."}, {"text": "The distribution of weather patterns and climates across the globe", "isCorrect": false, "rationale": "These components influence weather, but the central theme of their cooperation relates more fundamentally to life itself."}, {"text": "Making Earth an amazing planet where life as we know it can exist", "isCorrect": true, "rationale": "The text states, 'These three things — rock, water, and air — work together to make Earth the amazing planet it is. Without any one of them, life as we know it could not exist.'"}, {"text": "The continuous cycle of water evaporation and precipitation", "isCorrect": false, "rationale": "This describes a specific process involving water and air, but not the overarching outcome of all three components working together for the existence of life."}]}, {"question": "Based on the text's description of Earth's components, what would be an immediate and significant consequence for life 'as we know it' if Earth suddenly lost its air?", "options": [{"text": "Mountains would rapidly erode due to increased exposure.", "isCorrect": false, "rationale": "While erosion might change, the text highlights more critical, immediate consequences for life itself related to air's specific functions."}, {"text": "The ability to breathe and protection from harmful solar radiation would cease.", "isCorrect": true, "rationale": "The text states, 'Air is what you breathe. It also... protects you from the Sun's harmful rays.' Losing air would immediately eliminate these vital functions for life."}, {"text": "The planet's surface would become significantly colder.", "isCorrect": false, "rationale": "While air traps heat, the text emphasizes breathing and protection from rays as the immediate life-sustaining roles."}, {"text": "All bodies of water would quickly evaporate into space.", "isCorrect": false, "rationale": "Evaporation would occur, but the text's direct functions of air for 'life as we know it' are breathing and solar protection."}]}, {"question": "Which statement accurately describes a key difference between water and air, as presented in the text?", "options": [{"text": "Water is primarily for breathing, while air is primarily for drinking.", "isCorrect": false, "rationale": "This statement reverses the primary uses described; air is for breathing, and water for drinking/covering the surface."}, {"text": "Water covers most of Earth's surface, while air is an invisible mixture of gases surrounding it.", "isCorrect": true, "rationale": "The text describes water as covering 71% of Earth's surface and air as 'the invisible mixture of gases that surrounds Earth,' accurately contrasting their properties and locations."}, {"text": "Water protects from harmful rays, while air carries clouds.", "isCorrect": false, "rationale": "The text states that air protects from harmful rays, not water. Both can interact with clouds (air carries them, water forms them)."}, {"text": "Water is the solid ground beneath your feet, while air forms lakes and rivers.", "isCorrect": false, "rationale": "This statement incorrectly attributes properties; rock is the solid ground, and water forms lakes and rivers."}]}, {"question": "The 'sciencelife' box provides examples of how Earth's main parts are encountered daily. Which example correctly connects a daily experience to one of Earth's main parts?", "options": [{"text": "The clouds you see come from underground sources of rock.", "isCorrect": false, "rationale": "The text states 'Air... carries clouds,' and water forms them; clouds do not come from underground rock."}, {"text": "The ground under your building is made of water.", "isCorrect": false, "rationale": "The text states 'The ground under your building is rock,' not water."}, {"text": "The air you breathe keeps you alive.", "isCorrect": true, "rationale": "The text states, 'And the air you are breathing right now keeps you alive with every breath,' which is a direct connection."}, {"text": "The mountains you see are made of air.", "isCorrect": false, "rationale": "The text states 'Mountains... are all made of rock,' not air."}]}, {"question": "A new planet is discovered with vast oceans and towering mountains, along with fertile soil. However, detailed scans reveal no detectable atmosphere. Based on the principles in the text, what critical element for 'life as we know it' is missing on this planet?", "options": [{"text": "Rock", "isCorrect": false, "rationale": "The presence of 'towering mountains' and 'fertile soil' implies that rock is present on the planet."}, {"text": "Water", "isCorrect": false, "rationale": "The description mentions 'vast oceans,' indicating the presence of water."}, {"text": "Air", "isCorrect": true, "rationale": "The text states, 'Without any one of them [rock, water, and air], life as we know it could not exist.' A 'no detectable atmosphere' means no air, which is essential for breathing and protection from the sun as described."}, {"text": "Ice", "isCorrect": false, "rationale": "Ice is a form of water, and 'vast oceans' already confirm water's presence, even if not in ice form."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
