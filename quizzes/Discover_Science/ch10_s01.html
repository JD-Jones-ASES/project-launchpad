<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 10, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The narrative emphasizes that the school garden demonstrates the interconnectedness of all four branches of science. Which statement best illustrates this central theme?", "options": [{"text": "Plants use photosynthesis to grow, showing only the principles of Life Science.", "isCorrect": false, "rationale": "While photosynthesis is a key Life Science concept, this statement narrows the focus to only one branch and fails to show the interconnectedness highlighted in the text."}, {"text": "Plants absorb dissolved minerals from the soil through their roots, requiring an understanding of Earth, Chemistry, and Life Sciences.", "isCorrect": true, "rationale": "This statement correctly links Earth Science (minerals from soil), Chemistry (minerals dissolving to form solutions), and Life Science (plants absorbing nutrients), exemplifying the interconnectedness."}, {"text": "Students measure plant height in centimeters, which is exclusively a Physics concept.", "isCorrect": false, "rationale": "Measuring height is a Physics concept, but the context (measuring plant growth) links it to Life Science, and its application for understanding how plants respond to soil and water involves other branches, so it's not exclusively Physics in isolation."}, {"text": "The soil contains minerals from broken rocks, highlighting the independent roles of Earth and Chemistry.", "isCorrect": false, "rationale": "This statement describes a connection between Earth Science (rocks, minerals) and Chemistry (minerals), but it incorrectly implies independence rather than integration, and also omits the connection to Life Science (plants needing these minerals)."}], "id": "q01"}, {"question": "According to the text, what is the primary role of plants in the garden ecosystem?", "options": [{"text": "They break down rocks to form new soil.", "isCorrect": false, "rationale": "While plants can contribute to weathering, the primary role of forming soil from rocks is an Earth Science process that takes thousands of years, not primarily driven by the plants themselves in their ecosystem role."}, {"text": "They produce oxygen and food, forming the foundation of the ecosystem.", "isCorrect": true, "rationale": "The text explicitly states, 'Plants are the foundation of this little ecosystem. They produce the oxygen we breathe and the food we eat,' making this the correct answer."}, {"text": "They absorb carbon dioxide and release nitrogen into the atmosphere.", "isCorrect": false, "rationale": "Plants absorb carbon dioxide, but they primarily release oxygen, not nitrogen. Nitrogen fixation is done by certain bacteria, not typically by plants as their primary ecosystem role."}, {"text": "They dissolve minerals in water to make them available for other organisms.", "isCorrect": false, "rationale": "Minerals dissolve in water, which plants then absorb. Plants don't actively dissolve minerals for other organisms; rather, the water acts as the solvent, and plants utilize the solution."}], "id": "q02"}, {"question": "How long does the text suggest it takes for the garden soil to form?", "options": [{"text": "A few weeks, after plants decompose.", "isCorrect": false, "rationale": "A few weeks is far too short for soil formation, which involves rock breakdown and decomposition over much longer periods."}, {"text": "Thousands of years, through rock breakdown and decomposition.", "isCorrect": true, "rationale": "The text states, 'This soil was not always here. It took thousands of years to form,' making this the correct answer."}, {"text": "Several months, as seasons change.", "isCorrect": false, "rationale": "While seasonal changes impact soil, several months is insufficient for the fundamental formation processes described."}, {"text": "Many decades, depending on human intervention.", "isCorrect": false, "rationale": "While human intervention can influence soil quality, the natural formation process of soil from rocks and organic matter is a geological timescale, not just decades."}], "id": "q03"}, {"question": "If a gardener adds a new type of mineral supplement to the soil, what must happen for the plants to be able to use these minerals?", "options": [{"text": "The plants must physically break down the mineral supplement with their roots.", "isCorrect": false, "rationale": "Plant roots absorb substances in solution; they do not physically break down solid mineral supplements."}, {"text": "The minerals must dissolve in water to form a solution that roots can absorb.", "isCorrect": true, "rationale": "The text explains, 'The minerals in the soil dissolve in the water, forming a solution. The plant's roots absorb it... Without water to dissolve the minerals, the plants could not use them.'"}, {"text": "The soil temperature must be high enough to chemically react with the minerals.", "isCorrect": false, "rationale": "While temperature can influence reaction rates, the fundamental requirement for nutrient uptake is for the minerals to dissolve in water, not necessarily to react chemically with the soil itself."}, {"text": "Microorganisms in the soil must first convert the minerals into a gas.", "isCorrect": false, "rationale": "The text does not mention minerals being converted into a gas for plant uptake; it specifies absorption of dissolved minerals in solution."}], "id": "q04"}, {"question": "A student wants to determine if a specific variety of tomato plant grows taller when given more water. Which of the following measurements would be most crucial for answering this question?", "options": [{"text": "The mass of harvested tomatoes in grams.", "isCorrect": false, "rationale": "Measuring the mass of tomatoes would assess yield, not the specific question about plant height."}, {"text": "The temperature of the soil in degrees Celsius.", "isCorrect": false, "rationale": "Soil temperature is an environmental factor, but not a direct measurement of plant height or water given, which are central to the student's question."}, {"text": "The height of the plant in centimeters and the volume of water in milliliters.", "isCorrect": true, "rationale": "To determine if a plant grows taller with more water, one must measure the plant's height (using centimeters) and the amount of water provided (using milliliters). This directly addresses both variables in the question."}, {"text": "The concentration of minerals in the soil solution.", "isCorrect": false, "rationale": "While important for plant health, measuring mineral concentration doesn't directly answer the question about the relationship between water *volume* and plant *height*."}], "id": "q05"}, {"question": "From where do the essential minerals like calcium, iron, and potassium in the soil originally come?", "options": [{"text": "They are produced by plants through photosynthesis.", "isCorrect": false, "rationale": "Plants use minerals, they do not produce them. Photosynthesis is the process by which plants make their food (sugars), not minerals."}, {"text": "They originate from rocks that break down through the rock cycle.", "isCorrect": true, "rationale": "The text states, 'The minerals in the soil — like calcium, iron, and potassium — originally came from rocks. As rocks break down through the rock cycle, their minerals become part of the soil.'"}, {"text": "They are added directly by rainwater.", "isCorrect": false, "rationale": "While rainwater can carry some dissolved substances, it is not the original source of the bulk of soil minerals; the primary source is the breakdown of rocks."}, {"text": "They are synthesized by decomposers in the soil.", "isCorrect": false, "rationale": "Decomposers break down organic matter, releasing nutrients already present, but they do not synthesize new minerals like calcium or iron from their basic elements."}], "id": "q06"}, {"question": "A gardener, eager for a lush harvest, decides to double the amount of fertilizer recommended for their tomato plants. Based on the text, what is the most likely outcome?", "options": [{"text": "The plants will grow much faster and produce larger fruit due to the increased nutrients.", "isCorrect": false, "rationale": "The text specifically warns, 'But be careful — too much fertilizer makes the solution too concentrated and can harm the plants!'"}, {"text": "The solution of nutrients in the soil will become too concentrated, potentially harming the plants.", "isCorrect": true, "rationale": "The text directly states that 'too much fertilizer makes the solution too concentrated and can harm the plants!'"}, {"text": "The soil will become more fertile, but the plants will not show any significant change in growth.", "isCorrect": false, "rationale": "This contradicts the text's warning that excessive fertilizer can harm plants, implying a significant negative change."}, {"text": "The fertilizer will not dissolve properly, rendering it ineffective for the plants.", "isCorrect": false, "rationale": "The issue with too much fertilizer isn't that it won't dissolve, but that it dissolves to create an *overly concentrated* solution."}], "id": "q07"}, {"question": "Which part of a plant is responsible for absorbing the mineral-rich solution from the soil and transporting it upwards?", "options": [{"text": "The flowers, which attract pollinators and produce seeds.", "isCorrect": false, "rationale": "Flowers are primarily involved in reproduction and attracting pollinators, not in absorbing nutrients from the soil."}, {"text": "The roots, which absorb the solution and the xylem, which transports it.", "isCorrect": true, "rationale": "The text explains, 'The plant's roots absorb it and carry the dissolved nutrients up through the xylem to every leaf and stem,' making this the correct answer."}, {"text": "The leaves, which capture sunlight for photosynthesis.", "isCorrect": false, "rationale": "Leaves are responsible for photosynthesis (food production) and gas exchange, but they do not absorb water and minerals from the soil."}, {"text": "The fruit, which protects the seeds.", "isCorrect": false, "rationale": "Fruit's primary function is to protect and disperse seeds, not to absorb or transport nutrients from the soil."}], "id": "q08"}, {"question": "A student is using a balance to weigh the tomatoes harvested from the garden. Which type of measurement is the student performing, and what unit would be appropriate?", "options": [{"text": "Length, in centimeters.", "isCorrect": false, "rationale": "Length is measured with a ruler, not a balance, and refers to distance, not weight."}, {"text": "Mass, in grams.", "isCorrect": true, "rationale": "The text explicitly states under 'Physics: Measuring the Garden' that 'They weigh harvested tomatoes on a balance, recording the mass in grams.'"}, {"text": "Volume, in milliliters.", "isCorrect": false, "rationale": "Volume is measured with a graduated cylinder, not a balance, and refers to the amount of space occupied."}, {"text": "Temperature, in degrees Celsius.", "isCorrect": false, "rationale": "Temperature is measured with a thermometer, not a balance, and refers to the degree of heat or cold."}], "id": "q09"}, {"question": "The 'thinkaboutit' section asks to imagine planning a school garden. If you were choosing the best soil for drainage and nutrient retention, and also considering how much water to give each plant to ensure optimal nutrient uptake without causing harm, which branches of science would you primarily be integrating?", "options": [{"text": "Physics (for water volume) and Life Science (for plant needs).", "isCorrect": false, "rationale": "While these are involved, this option omits Earth Science (for soil composition/drainage) and Chemistry (for nutrient solutions/uptake and potential harm from over-fertilization), which are crucial to the scenario."}, {"text": "Earth Science (for soil composition), Chemistry (for nutrient solutions), and Physics (for water volume).", "isCorrect": true, "rationale": "This option correctly integrates Earth Science for soil type/drainage, Chemistry for understanding nutrient solutions and uptake, and Physics for measuring water volume to ensure optimal conditions. These are all critical for the described planning scenario, and Life Science aspects (plant needs) are inherent in the goal of 'optimal nutrient uptake' and 'without causing harm.'"}, {"text": "Life Science (for plant growth) and Earth Science (for soil type), excluding measurement.", "isCorrect": false, "rationale": "This option misses Chemistry (for nutrient solutions/uptake) and Physics (for accurate measurement of water), both of which are central to the scenario."}, {"text": "Chemistry (for fertilizer concentration) and Life Science (for plant health), ignoring soil structure.", "isCorrect": false, "rationale": "This option correctly identifies Chemistry and Life Science, but neglects Earth Science, which is essential for understanding soil structure, drainage, and nutrient retention, as well as Physics for water measurement."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
