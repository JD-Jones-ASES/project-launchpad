    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the scientific definition provided, what is the minimum number of characteristics an object must possess to be classified as a living thing?", "options": [{"text": "One, as long as it's the ability to grow.", "isCorrect": false, "rationale": "The text clearly states that an object must possess ALL five characteristics, not just one, to be considered alive."}, {"text": "Three, as long as they are related to energy, growth, and reproduction.", "isCorrect": false, "rationale": "The text specifies that ALL five characteristics are required; possessing only three is insufficient."}, {"text": "Five, specifically the five listed characteristics.", "isCorrect": true, "rationale": "The text states, 'If something has all five characteristics, it is alive. If it is missing even one, it is not a living thing.' This confirms that all five specified characteristics are necessary."}, {"text": "Any number, as long as scientists are still studying it.", "isCorrect": false, "rationale": "The definition is strict: all five characteristics must be present. Lack of certainty does not change the criteria."}]}, {"question": "A robot is programmed to move, clean a house, and even 'learn' from its environment. Based on the textbook's definition, which of the following is the most fundamental reason why scientists would classify this robot as non-living?", "options": [{"text": "It requires electricity to function.", "isCorrect": false, "rationale": "While true, needing energy in various forms (like electricity) is not the characteristic a robot primarily lacks that would make it non-living. Living things also need energy."}, {"text": "It is not made of cells and cannot reproduce on its own.", "isCorrect": true, "rationale": "The text defines living things as 'made of cells' and able to 'reproduce.' A robot does not have a cellular structure and cannot biologically reproduce, missing two critical characteristics."}, {"text": "It does not grow from a small form into a larger one.", "isCorrect": false, "rationale": "While a robot does not grow in the biological sense, this is only one characteristic. The most fundamental reason for being non-living lies in missing multiple core characteristics, particularly cells and reproduction."}, {"text": "Its actions are programmed, not spontaneous.", "isCorrect": false, "rationale": "The text does not include 'spontaneous action' as a defining characteristic. 'Responds to its environment' refers to reactions, which can be programmed or biological."}]}, {"question": "A scientist discovers a new entity. It expands in size over time, reacts by recoiling when touched, and is composed of microscopic structures. To confirm it is a living thing, which crucial characteristic still needs to be observed?", "options": [{"text": "It must be able to move independently.", "isCorrect": false, "rationale": "Independent movement is not explicitly listed as a universal characteristic; some living things like plants do not move independently but are alive."}, {"text": "It must be able to make more of its own kind.", "isCorrect": true, "rationale": "The entity exhibits growth ('expands in size'), responds to its environment ('recoiling when touched'), and is made of cells ('microscopic structures'). The missing characteristic from the five listed is 'reproduce,' meaning 'make more of its own kind.'"}, {"text": "It must have a complex nervous system.", "isCorrect": false, "rationale": "While many living things have nervous systems, single-celled organisms or simple multicellular organisms may not, yet are still alive."}, {"text": "It must consume other organisms for food.", "isCorrect": false, "rationale": "The text states 'Living things need energy,' and gives examples like plants using sunlight, not necessarily consuming other organisms. This option is too specific for the 'needs energy' characteristic."}]}, {"question": "The observation that 'A kitten grows into a cat' is a direct illustration of which characteristic of living things?", "options": [{"text": "Living things reproduce.", "isCorrect": false, "rationale": "Reproduction refers to making new living things of the same kind, not the development of an individual over time."}, {"text": "Living things need energy.", "isCorrect": false, "rationale": "While kittens need energy to grow, the statement itself focuses on the change in size and form, not the acquisition of energy."}, {"text": "Living things grow and develop.", "isCorrect": true, "rationale": "The example 'A kitten grows into a cat' directly demonstrates the characteristic that 'All living things start small and get bigger or change as they get older,' which is the definition of growing and developing."}, {"text": "Living things respond to their environment.", "isCorrect": false, "rationale": "Responding to the environment involves reacting to changes around them, not the process of growing larger and changing over time."}]}, {"question": "The 'Think about it' section poses a question about fire. Although fire 'grows' and 'responds to wind,' why do scientists conclude it is not alive based on the provided criteria?", "options": [{"text": "Fire does not produce its own heat.", "isCorrect": false, "rationale": "The production of heat is not listed as a characteristic of living things, and fire certainly does produce heat."}, {"text": "Fire requires oxygen to exist.", "isCorrect": false, "rationale": "While true, requiring a specific gas like oxygen is not one of the five defining characteristics for life, nor is it exclusive to non-living things."}, {"text": "Fire is not made of cells and does not reproduce.", "isCorrect": true, "rationale": "The 'Think about it' section specifically asks: 'But does fire reproduce? Is fire made of cells?' These are two of the five critical characteristics of living things that fire lacks, making it non-living."}, {"text": "Fire consumes wood, which is not considered 'food' for living things.", "isCorrect": false, "rationale": "The text states 'Living things need energy' and gives examples like 'eating food' or 'plants use sunlight.' The form of energy acquisition is varied, but consuming wood for energy is not the primary reason for fire being non-living; rather, it's the lack of cellular structure and reproduction."}]}, {"question": "Which statement accurately describes the 'cells' characteristic of living things?", "options": [{"text": "Cells are large structures visible to the naked eye in all living things.", "isCorrect": false, "rationale": "The text states, 'Cells are the tiny building blocks of life. They are so small that you need a microscope to see most of them.'"}, {"text": "Cells are required for reproduction, but not for growth.", "isCorrect": false, "rationale": "Cells are fundamental to all life processes, including growth, development, and energy use, not just reproduction."}, {"text": "All living things are made of these tiny building blocks, visible only with a microscope.", "isCorrect": true, "rationale": "This statement directly reflects the text: 'Cells are the tiny building blocks of life. They are so small that you need a microscope to see most of them.' and 'Living things are made of cells.'"}, {"text": "Only complex organisms like humans are made of cells.", "isCorrect": false, "rationale": "The text states 'Every living thing on Earth — from the tiniest bacterium to the biggest blue whale — has these five characteristics,' which includes being made of cells."}]}, {"question": "Which of the following scenarios best demonstrates the characteristic that 'Living things need energy'?", "options": [{"text": "A plant bending its stem towards a window to capture more sunlight.", "isCorrect": false, "rationale": "This describes responding to the environment (light) rather than the direct acquisition or use of energy."}, {"text": "A single-celled organism dividing into two identical organisms.", "isCorrect": false, "rationale": "This is an example of reproduction, though energy would be needed to perform it, the act itself demonstrates reproduction."}, {"text": "A bird searching for and consuming seeds from the ground.", "isCorrect": true, "rationale": "Eating food (seeds) is explicitly given as an example of how living things 'get energy' to 'stay alive and do what it does.'"}, {"text": "A human body maintaining a constant internal temperature.", "isCorrect": false, "rationale": "While maintaining body temperature requires energy, the act itself is a form of responding to the environment or homeostasis, not the direct need for energy as presented in the examples (eating food, using sunlight)."}]}, {"question": "A biologist observes a colony of bacteria. Over time, the colony's population rapidly increases as individual bacteria split into two. This observation primarily exemplifies which characteristic of living things?", "options": [{"text": "Living things respond to their environment.", "isCorrect": false, "rationale": "Responding to the environment involves reacting to stimuli, not creating new individuals."}, {"text": "Living things grow and develop.", "isCorrect": false, "rationale": "While the individual bacteria grow before splitting, the observation focuses on the increase in population, not the growth of a single bacterium over its lifespan."}, {"text": "Living things reproduce.", "isCorrect": true, "rationale": "The splitting of bacteria to increase the population is a direct example of 'making new living things of the same kind,' which is the definition of reproduction."}, {"text": "Living things are made of cells.", "isCorrect": false, "rationale": "While bacteria are made of cells, the observation describes an action (splitting), not the structural composition itself."}]}, {"question": "Your dog turns its head when you call its name. This action is an example of which characteristic of living things?", "options": [{"text": "Living things grow and develop.", "isCorrect": false, "rationale": "Growing and developing refers to changes in size and form over time, not an immediate reaction to a stimulus."}, {"text": "Living things reproduce.", "isCorrect": false, "rationale": "Reproduction is about making new living things, not an individual reacting to its surroundings."}, {"text": "Living things respond to their environment.", "isCorrect": true, "rationale": "The text states, 'Call a dog's name, and it turns its head. Living things react to changes around them.' This directly illustrates 'responding to their environment.'"}, {"text": "Living things need energy.", "isCorrect": false, "rationale": "While energy is needed for the action, the act itself demonstrates a reaction to an external stimulus, not the acquisition or use of energy."}]}, {"question": "An unknown specimen is observed to grow in size, consume nutrients for energy, and react to light. However, despite extensive microscopic analysis, no cellular structure can be detected. Based on the textbook's criteria, how should this specimen be classified?", "options": [{"text": "It is a living thing, as it possesses most of the characteristics of life.", "isCorrect": false, "rationale": "The text explicitly states, 'If it is missing even one, it is not a living thing.' Possessing 'most' is not sufficient."}, {"text": "It is a non-living thing, because it is missing a fundamental characteristic.", "isCorrect": true, "rationale": "The specimen exhibits growth, needs energy, and responds to its environment. However, it lacks cellular structure, which is one of the five essential characteristics. The text states that missing even one characteristic means it is not a living thing."}, {"text": "It is a new, undefined category of life that requires further study.", "isCorrect": false, "rationale": "The definition provided is absolute: all five characteristics are necessary. There is no provision for 'undefined categories' based on these criteria."}, {"text": "It is likely a living thing, but a very primitive one.", "isCorrect": false, "rationale": "Even primitive living things, like bacteria, are made of cells. Lacking cellular structure is a disqualifying factor."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
