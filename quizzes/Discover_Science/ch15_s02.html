    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 15, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A scientist discovers a new animal that lives in cold ocean waters, breathes through gills, has scales, and its body temperature matches the surrounding water. Based on the provided definitions, what classification best describes this animal?", "options": [{"text": "Amphibian", "isCorrect": false, "rationale": "Amphibians start life in water but often move to land as adults, and typically do not have scales. While cold-blooded, other features do not align."}, {"text": "Fish", "isCorrect": true, "rationale": "The description (cold-blooded, lives in water, breathes through gills, has scales, body temperature changes with surroundings) perfectly matches the definition of a Fish."}, {"text": "Reptile", "isCorrect": false, "rationale": "Reptiles have dry, scaly skin and lay eggs on land, and do not breathe through gills as adults, which contradicts parts of the description."}, {"text": "Mammal", "isCorrect": false, "rationale": "Mammals are warm-blooded, have hair or fur, and feed their young with milk, none of which fit the animal's description."}]}, {"question": "Which sequence correctly outlines the main stages of the water cycle, starting from the process where liquid water turns into vapor due to heat?", "options": [{"text": "Condensation, evaporation, precipitation, collection", "isCorrect": false, "rationale": "Condensation follows evaporation, turning vapor back into liquid, not initiating the cycle from liquid turning to vapor."}, {"text": "Evaporation, condensation, precipitation, collection", "isCorrect": true, "rationale": "The water cycle begins with evaporation (liquid to vapor), followed by condensation (vapor to liquid, forming clouds), then precipitation (water falling from clouds), and finally collection (gathering in bodies of water)."}, {"text": "Precipitation, collection, evaporation, condensation", "isCorrect": false, "rationale": "Precipitation occurs much later in the cycle, after condensation, not as an early stage after evaporation."}, {"text": "Collection, evaporation, condensation, precipitation", "isCorrect": false, "rationale": "Collection is the final stage where water gathers, not an initial stage after evaporation."}]}, {"question": "You are examining a sample of pure oxygen gas (O2). According to the definitions provided, how would you classify this substance?", "options": [{"text": "It is an element and a molecule.", "isCorrect": true, "rationale": "Oxygen is an element because it is made of only one kind of atom. O2 is a molecule because it consists of two or more atoms (two oxygen atoms) bonded together."}, {"text": "It is a compound and an atom.", "isCorrect": false, "rationale": "A compound is made of two or more different elements, not just one. O2 is a molecule, not a single atom."}, {"text": "It is an element but not a molecule.", "isCorrect": false, "rationale": "While it is an element, O2 is specifically a molecule because it involves two oxygen atoms bonded together, fitting the definition of a molecule."}, {"text": "It is a compound but not an element.", "isCorrect": false, "rationale": "It is an element, as it's composed of only one type of atom. It's not a compound because a compound requires two or more *different* elements."}]}, {"question": "A roller coaster car has just been pulled to the highest point on its track and momentarily stops before dropping down. What type of energy is predominantly stored in the car at this moment, and what energy transformation will occur as it begins its descent?", "options": [{"text": "Kinetic energy, then Potential energy", "isCorrect": false, "rationale": "Kinetic energy is the energy of motion, which is minimal or zero when stopped at the top. It converts to kinetic, not from it in this scenario."}, {"text": "Potential energy, then Kinetic energy", "isCorrect": true, "rationale": "Stored energy due to position (at the top of a hill) is potential energy. As the car moves down, this potential energy is transformed into kinetic energy (energy of motion)."}, {"text": "Heat energy, then Light energy", "isCorrect": false, "rationale": "Heat and light energy are not the primary forms of energy relevant to the car's position and subsequent motion in this context."}, {"text": "Sound energy, then Heat energy", "isCorrect": false, "rationale": "Sound and heat energy are not the primary energies involved in the roller coaster's position and subsequent motion."}]}, {"question": "A student observes a garden snail moving slowly across a leaf and a frog leaping into a pond. Based on the provided definitions, what fundamental skeletal difference distinguishes these two animals?", "options": [{"text": "Both have internal backbones, but the snail's is softer and less defined.", "isCorrect": false, "rationale": "Snails do not have internal backbones; they are invertebrates."}, {"text": "The snail has an external skeleton (shell), and the frog has an internal backbone.", "isCorrect": false, "rationale": "While snails have shells, the most fundamental skeletal distinction highlighted by the text is the presence or absence of a backbone, classifying the snail as an invertebrate."}, {"text": "The frog is a vertebrate with an internal backbone, while the snail is an invertebrate without a backbone.", "isCorrect": true, "rationale": "Frogs are amphibians, which are classified as vertebrates (animals with a backbone). Snails are invertebrates, explicitly defined as animals without a backbone."}, {"text": "Neither animal has a backbone, they are both invertebrates.", "isCorrect": false, "rationale": "Frogs are vertebrates, possessing a backbone."}]}, {"question": "Earth's population relies heavily on freshwater resources for survival. Given the information about 'fresh water' and 'salt water,' why is the concept of 'conservation' particularly critical for these resources?", "options": [{"text": "Because most fresh water is easily polluted by salt from oceans.", "isCorrect": false, "rationale": "While pollution is an issue, the text does not state that fresh water is easily polluted by ocean salt as the primary reason for conservation."}, {"text": "Because the water cycle is not efficient enough to replenish water quickly.", "isCorrect": false, "rationale": "The water cycle is a continuous process; its efficiency is not cited in the text as the reason for freshwater conservation, but rather the limited quantity of fresh water itself."}, {"text": "Because only about 3% of Earth's water is fresh water, making it a limited resource.", "isCorrect": true, "rationale": "The text explicitly states that only about 3% of Earth's water is fresh, emphasizing its scarcity and the critical need for conservation to ensure its availability for the future."}, {"text": "Because all water on Earth eventually evaporates, leading to loss.", "isCorrect": false, "rationale": "Evaporation is a stage of the water cycle, not a process that leads to the ultimate loss of water from Earth's system; it merely changes form."}]}, {"question": "What is the main purpose of the 'Periodic table' in the field of chemistry, as described in the text?", "options": [{"text": "To list all possible chemical formulas for compounds.", "isCorrect": false, "rationale": "Chemical formulas are specific to compounds, but the Periodic table's primary role is to organize elements, not list formulas."}, {"text": "To organize all known elements by their properties.", "isCorrect": true, "rationale": "The definition explicitly states the Periodic table is 'A chart that organizes all known elements by their properties,' which is its main purpose."}, {"text": "To illustrate how atoms bond together to form molecules.", "isCorrect": false, "rationale": "While related to the study of atoms and molecules, the Periodic table's primary function is the organization of elements, not illustrating bonding mechanics."}, {"text": "To show the different forms of energy transformation.", "isCorrect": false, "rationale": "Energy transformation is a concept from Physics, not Chemistry, and is unrelated to the Periodic table."}]}, {"question": "When a person strikes a drum, vibrations are created that travel through the air, allowing us to hear the sound. Which energy transformation best describes this phenomenon?", "options": [{"text": "Light energy from the surroundings converts into sound energy.", "isCorrect": false, "rationale": "Light energy is unrelated to the direct production of sound by striking an object."}, {"text": "Kinetic energy from the strike converts into sound energy.", "isCorrect": true, "rationale": "The act of striking involves motion, which is kinetic energy. This motion causes vibrations that produce sound energy, demonstrating a conversion from kinetic to sound energy."}, {"text": "Heat energy from friction converts into sound energy.", "isCorrect": false, "rationale": "While striking might generate some heat, it is not the primary energy transformation for producing the sound from a drum."}, {"text": "Potential energy stored in the drum converts into heat energy.", "isCorrect": false, "rationale": "Potential energy is not the primary form of energy being converted when striking a drum to produce sound."}]}, {"question": "Among the various vertebrate classes described (fish, amphibians, reptiles, birds, mammals), which *combination* of characteristics is uniquely descriptive of mammals according to the provided text?", "options": [{"text": "Cold-blooded, with scales, and living in water.", "isCorrect": false, "rationale": "This combination of characteristics describes fish, not mammals."}, {"text": "Warm-blooded, with feathers, and laying hard-shelled eggs.", "isCorrect": false, "rationale": "This combination of characteristics describes birds, not mammals."}, {"text": "Warm-blooded, with hair or fur, and feeding young with milk.", "isCorrect": true, "rationale": "While birds are also warm-blooded, the combination of having 'hair or fur' and 'feeding their young with milk' is specifically and uniquely attributed to mammals in the provided definitions."}, {"text": "Cold-blooded, starting life in water, and moving to land.", "isCorrect": false, "rationale": "This combination of characteristics describes amphibians, not mammals."}]}, {"question": "The chemical formula H2O is commonly used to represent water. Based on the provided definitions of 'chemical formula,' 'atom,' 'molecule,' and 'compound,' what accurate information does H2O convey?", "options": [{"text": "It is an element consisting of hydrogen and oxygen molecules.", "isCorrect": false, "rationale": "Water is a compound, not an element, and it's made of atoms, not molecules of hydrogen and oxygen."}, {"text": "It is a molecule with two oxygen atoms and one hydrogen atom.", "isCorrect": false, "rationale": "The chemical formula H2O correctly indicates two hydrogen atoms and one oxygen atom, not the other way around."}, {"text": "It is a compound made of two hydrogen atoms and one oxygen atom.", "isCorrect": true, "rationale": "The definition of 'chemical formula' explicitly uses H2O as an example, stating it means 'two hydrogen atoms and one oxygen atom.' Additionally, water is a 'compound' because it's made of two different elements (hydrogen and oxygen) bonded together."}, {"text": "It is a type of atom that can bond with other elements.", "isCorrect": false, "rationale": "H2O represents a molecule or a compound, not a single atom."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
