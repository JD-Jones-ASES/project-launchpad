        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<body>

        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 0, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the Golden Rules of Science Safety, what is the primary reason for wearing safety goggles?", "options": [{"text": "To look like a professional scientist.", "isCorrect": false, "rationale": "While goggles are part of a scientist's attire, their primary purpose is safety, not appearance. This option does not reflect the safety rationale provided in the text."}, {"text": "To protect your eyes from splashes and flying objects.", "isCorrect": true, "rationale": "The text explicitly states: 'Wear safety goggles when your teacher tells you to. They protect your eyes from splashes and flying objects.' This is the direct and primary safety reason."}, {"text": "To keep your hands free for other tasks.", "isCorrect": false, "rationale": "Safety goggles are worn on the eyes and do not directly relate to keeping hands free. This option is incorrect."}, {"text": "To prevent you from rubbing your eyes during an experiment.", "isCorrect": false, "rationale": "While goggles can indirectly prevent rubbing, their main function is to create a physical barrier against hazards. The text focuses on protection from splashes and flying objects."}]}, {"question": "A student is working on an experiment and accidentally spills an unknown liquid on their workstation. What is the *first* and most important action they should take according to the safety guidelines?", "options": [{"text": "Try to clean it up quickly with paper towels before anyone notices.", "isCorrect": false, "rationale": "The text explicitly states: 'Tell your teacher right away. Do not try to clean up chemicals on your own.' Attempting to clean an unknown spill independently is unsafe and goes against the guidelines."}, {"text": "Tell their teacher immediately about the spill.", "isCorrect": true, "rationale": "The text advises for spills: 'Tell your teacher right away.' This is the correct first step to ensure proper and safe handling by an adult."}, {"text": "Smell the liquid to identify what it is.", "isCorrect": false, "rationale": "The text warns: 'Never taste or smell chemicals unless your teacher says it is safe.' Smelling an unknown liquid is a dangerous action that could lead to illness."}, {"text": "Wash their hands immediately, then proceed with the cleanup.", "isCorrect": false, "rationale": "While washing hands is important, it's not the *first* step after a spill. The immediate action is to inform the teacher, especially for an unknown liquid, as they will direct the cleanup."}]}, {"question": "Why is keeping your work area neat considered a crucial safety rule in science activities?", "options": [{"text": "It helps your experiment look more professional for presentations.", "isCorrect": false, "rationale": "While neatness can improve appearance, the text emphasizes safety, not presentation. The primary reason is directly linked to preventing accidents."}, {"text": "A messy table increases the risk of tripping, knocking things over, or misplacing hazardous materials.", "isCorrect": true, "rationale": "The text states: 'Keep your work area neat. A messy table is an unsafe table.' A cluttered space makes accidents more likely, such as knocking over equipment, spills, or cuts from hidden sharp objects."}, {"text": "It ensures that you have enough space to spread out all your materials.", "isCorrect": false, "rationale": "Neatness helps manage space, but the core safety implication is preventing hazards, not just making room for materials. The text's focus is on 'unsafe table'."}, {"text": "It allows you to finish your activity faster.", "isCorrect": false, "rationale": "While an organized space can improve efficiency, the text highlights neatness as a safety measure, directly linking it to an 'unsafe table,' not speed."}]}, {"question": "When conducting science activities at home, which of the following actions is the *most* important for ensuring safety?", "options": [{"text": "Only use materials that are commonly found in the kitchen.", "isCorrect": false, "rationale": "While using common household items can be safer, the text doesn't restrict home experiments to only kitchen materials. The most important rule involves adult supervision and permission."}, {"text": "Ask a parent or guardian for permission before starting.", "isCorrect": true, "rationale": "The text explicitly states as the first rule for home safety: 'Ask a parent or guardian for permission before starting.' This ensures adult awareness and supervision, which is paramount for safety."}, {"text": "Work in your bedroom so you don't disturb others.", "isCorrect": false, "rationale": "The text suggests working in a place that is easy to clean, like a kitchen table. A bedroom might not be ideal for cleanup and could expose personal belongings to spills."}, {"text": "Invite friends over to help with the experiment.", "isCorrect": false, "rationale": "While collaboration can be fun, adding more people, especially children, without proper supervision can increase safety risks. The focus should be on individual safety and adult permission."}]}, {"question": "You are performing an experiment and are unsure if a particular step is safe. What is the 'most important safety rule of all' in this situation?", "options": [{"text": "Proceed cautiously, as overthinking can slow down the experiment.", "isCorrect": false, "rationale": "The text strongly discourages proceeding when unsure. Prioritizing caution over asking for help is a dangerous approach in science."}, {"text": "Look up the answer on your phone without disturbing anyone.", "isCorrect": false, "rationale": "While seeking information is good, the text emphasizes asking an adult for help directly, as they can provide immediate, context-specific guidance and intervention."}, {"text": "Ask an adult for help, as there is no such thing as a silly safety question.", "isCorrect": true, "rationale": "The text explicitly states: 'The most important safety rule of all? Ask an adult for help whenever you are unsure. There is no such thing as a silly safety question.' This empowers students to seek guidance."}, {"text": "Observe what other students are doing and follow their lead.", "isCorrect": false, "rationale": "Relying on peers might lead to following incorrect or unsafe procedures. The text directs students to an adult for guidance when unsure."}]}, {"question": "If you accidentally get a small cut or scrape during a science activity, what is the correct procedure?", "options": [{"text": "Ignore it if it's not bleeding much and continue working.", "isCorrect": false, "rationale": "The text states: 'Even small cuts should be washed and bandaged.' Ignoring an injury, no matter how small, is unsafe and can lead to infection."}, {"text": "Wash it with soap and water yourself, then cover it with a tissue.", "isCorrect": false, "rationale": "While washing is part of the process, the text instructs students to 'Tell your teacher' first. The teacher will then ensure proper cleaning and bandaging, potentially seeking medical attention if needed."}, {"text": "Tell your teacher so it can be washed and bandaged properly.", "isCorrect": true, "rationale": "The text advises: 'Cut or scrape: Tell your teacher. Even small cuts should be washed and bandaged.' Informing the teacher ensures that the injury is handled correctly and safely."}, {"text": "Apply a homemade remedy to stop the bleeding.", "isCorrect": false, "rationale": "Using a 'homemade remedy' is not mentioned or endorsed in safety guidelines and could be unhygienic or ineffective. Professional first aid is required."}]}, {"question": "Why is it important to wash your hands 'before and after every activity' in science?", "options": [{"text": "To keep your materials from getting wet during the experiment.", "isCorrect": false, "rationale": "Washing hands can make them wet, which might be inconvenient for some materials. The text's rationale for handwashing is explicitly about cleanliness and germ prevention, not keeping materials dry."}, {"text": "To remove any strong smells from your hands.", "isCorrect": false, "rationale": "While handwashing can remove smells, the primary safety reason given in the text is about preventing germ spread and maintaining cleanliness."}, {"text": "To keep yourself clean and prevent spreading germs.", "isCorrect": true, "rationale": "The text clearly states: 'Wash your hands before and after every activity. This keeps you clean and prevents spreading germs.' This is the direct safety and hygiene rationale."}, {"text": "To make sure you are fully awake and focused.", "isCorrect": false, "rationale": "Washing hands does not directly serve the purpose of increasing alertness or focus. This is an incorrect association."}]}, {"question": "If broken glass is found during a science activity, what is the *only* action a student should take?", "options": [{"text": "Carefully pick up the large pieces and place them in a wastebasket.", "isCorrect": false, "rationale": "The text explicitly states: 'Broken glass: Do not pick it up with your hands! Tell your teacher, who will clean it up safely.' Picking up broken glass by hand is extremely dangerous."}, {"text": "Cover the glass with a piece of paper and continue working.", "isCorrect": false, "rationale": "Covering broken glass does not remove the hazard; it merely hides it, potentially leading to another accident. The teacher must be informed for safe removal."}, {"text": "Tell your teacher immediately.", "isCorrect": true, "rationale": "The text instructs: 'Broken glass: Do not pick it up with your hands! Tell your teacher, who will clean it up safely.' Informing the teacher is the sole responsibility of the student to ensure safe cleanup."}, {"text": "Sweep it into a dustpan with a broom.", "isCorrect": false, "rationale": "While a broom and dustpan might be used for cleanup, the student's *first* and *only* direct action should be to inform the teacher. Students should not attempt cleanup themselves, especially of broken glass."}]}, {"question": "Which of the following describes an unsafe behavior during a science activity, according to the 'Golden Rules'?", "options": [{"text": "Wearing safety goggles when instructed by the teacher.", "isCorrect": false, "rationale": "Wearing safety goggles when instructed is a required safety rule, not an unsafe behavior. This option is incorrect."}, {"text": "Listening carefully to instructions before starting.", "isCorrect": false, "rationale": "Listening carefully is the first golden rule and essential for safety. This is a safe and required behavior."}, {"text": "Running around the classroom to get materials.", "isCorrect": true, "rationale": "The text states: 'Never run or play around during a science activity. Walk carefully and pay attention to what you are doing.' Running is explicitly identified as unsafe behavior."}, {"text": "Putting materials back where they belong after use.", "isCorrect": false, "rationale": "Putting materials away properly contributes to a neat and safe work area, as mentioned in the text ('Put materials back where they belong'). This is a safe practice."}]}, {"question": "A key takeaway from the 'Staying Safe in Science' section is that safety is a continuous responsibility. Which recommendation for teachers best reflects this principle?", "options": [{"text": "Only review safety rules at the beginning of the school year.", "isCorrect": false, "rationale": "The 'teachernote' explicitly states: 'Review safety rules at the beginning of every hands-on activity throughout the year, not just in this unit,' making this option incorrect as it contradicts the continuous responsibility principle."}, {"text": "Allow students to decide when they need safety goggles.", "isCorrect": false, "rationale": "The text states to wear goggles 'when your teacher tells you to,' implying teacher discretion and instruction, not student decision for safety equipment. This would undermine the continuous responsibility of the teacher."}, {"text": "Review safety rules at the beginning of every hands-on activity throughout the year.", "isCorrect": true, "rationale": "The 'teachernote' directly supports this by stating: 'Review safety rules at the beginning of every hands-on activity throughout the year, not just in this unit.' This reinforces safety as an ongoing focus."}, {"text": "Focus only on major accidents, as small incidents are less critical.", "isCorrect": false, "rationale": "The text emphasizes addressing 'Even small cuts' and spills immediately. Neglecting minor incidents goes against the comprehensive safety approach advocated."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
