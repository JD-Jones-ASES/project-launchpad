        <div class="subtitle">Discover Science &mdash; Chapter 9, Section 4</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Why do scientists use temperature as a measurement instead of simply describing something as 'hot' or 'cold'?", "options": [{"text": "Because 'hot' and 'cold' are too difficult for scientific instruments to detect.", "isCorrect": false, "rationale": "Scientific instruments like thermometers are designed to measure temperature, which quantifies 'hot' or 'cold.' The difficulty isn't in detection but in the subjectivity of the descriptive terms."}, {"text": "Because 'hot' and 'cold' are subjective feelings that can vary from person to person.", "isCorrect": true, "rationale": "The text explicitly states: 'But “cold” and “warm” are just feelings — and different people feel things differently. That is why scientists do not rely on feelings.' Temperature provides an objective, standardized measurement."}, {"text": "Because temperature is only relevant for extreme conditions like boiling water or ice.", "isCorrect": false, "rationale": "Temperature is a universal measurement used across all ranges, not just extremes. For example, it's used for comfortable room temperature (20°C) or body temperature (37°C)."}, {"text": "Because scientific experiments always require numerical data rather than descriptive words.", "isCorrect": false, "rationale": "While numerical data is a characteristic of scientific measurement, the core reason provided in the text for preferring temperature over 'hot'/'cold' is the subjectivity of those descriptive words, not just the general need for numbers."}], "id": "q01"}, {"question": "What are the two primary, easy-to-remember reference points used to build the Celsius temperature scale, as described in the text?", "options": [{"text": "0°C for normal human body temperature and 100°C for a very hot summer day.", "isCorrect": false, "rationale": "Normal human body temperature is 37°C, and 100°C is the boiling point of water, not just 'a very hot summer day.'"}, {"text": "0°C for when water boils and 100°C for when water freezes.", "isCorrect": false, "rationale": "This describes an inverted scale, which was a historical curiosity mentioned in the teacher's notes, but not the standard Celsius scale as built for everyday and scientific use (0°C freezing, 100°C boiling)."}, {"text": "0°C for when water freezes and turns into ice, and 100°C for when water boils and turns into steam.", "isCorrect": true, "rationale": "The text clearly states, 'The Celsius scale is built around two numbers that are easy to remember: 0 — the temperature at which water freezes and turns into ice. 100 — the temperature at which water boils and turns into steam.'"}, {"text": "10°C for a cool autumn morning and 30°C for a hot summer day.", "isCorrect": false, "rationale": "These are examples of temperatures and what they mean, not the fundamental reference points used to construct the scale itself."}], "id": "q02"}, {"question": "A student places a thermometer into an unknown liquid, and the colored liquid inside the thermometer tube begins to rise. What can the student infer about the liquid's temperature?", "options": [{"text": "The liquid is contracting and therefore getting colder.", "isCorrect": false, "rationale": "When the liquid contracts, it sinks, indicating it's getting cooler. Rising liquid indicates expansion."}, {"text": "The liquid's temperature is decreasing, causing the thermometer's liquid to sink.", "isCorrect": false, "rationale": "A decreasing temperature would cause the liquid to contract and sink, not rise."}, {"text": "The liquid's temperature is increasing, causing the thermometer's liquid to expand.", "isCorrect": true, "rationale": "The text explains: 'When the liquid gets warmer, it expands (takes up more space) and rises up the tube.' This direct relationship means rising liquid indicates an increase in temperature."}, {"text": "The thermometer is faulty because the liquid should only rise when it's boiling.", "isCorrect": false, "rationale": "The liquid rises as the temperature increases, not just at boiling point. This is the normal operation of a thermometer."}], "id": "q03"}, {"question": "According to the provided table of Celsius temperatures and their meanings, what is considered the normal temperature for the human body?", "options": [{"text": "0°C, similar to water freezing.", "isCorrect": false, "rationale": "0°C is the freezing point of water, which is far too cold for normal human body temperature."}, {"text": "20°C, like a comfortable room.", "isCorrect": false, "rationale": "20°C is described as a comfortable room temperature, not normal human body temperature."}, {"text": "37°C.", "isCorrect": true, "rationale": "The table explicitly lists '37' as 'Normal human body temperature' in Celsius."}, {"text": "100°C, the boiling point of water.", "isCorrect": false, "rationale": "100°C is the boiling point of water and is dangerously hot, not normal human body temperature."}], "id": "q04"}, {"question": "If you are conducting an experiment to observe the phase change of water from a solid (ice) to a liquid, at approximately what temperature on the Celsius scale would you expect this transition to primarily occur?", "options": [{"text": "10°C, which is a cool autumn morning.", "isCorrect": false, "rationale": "10°C is above freezing; at this temperature, water would already be liquid."}, {"text": "20°C, representing a comfortable room temperature.", "isCorrect": false, "rationale": "20°C is significantly above freezing, so ice would have already melted."}, {"text": "0°C, where water freezes and turns into ice.", "isCorrect": true, "rationale": "The text states 0°C is 'the temperature at which water freezes and turns into ice.' Conversely, this is also the temperature at which ice melts and turns back into liquid water."}, {"text": "37°C, typical human body temperature.", "isCorrect": false, "rationale": "37°C is well above freezing, and water would certainly be liquid at this temperature."}], "id": "q05"}, {"question": "Which fundamental scientific principle best explains why the colored liquid in a thermometer tube moves up when heated and down when cooled?", "options": [{"text": "The conduction of heat through the glass walls of the thermometer.", "isCorrect": false, "rationale": "Conduction describes how heat transfers, but not why the liquid inside changes volume and moves."}, {"text": "The expansion and contraction of liquids in response to temperature changes.", "isCorrect": true, "rationale": "The text explicitly states: 'When the liquid gets warmer, it expands (takes up more space) and rises up the tube. When it gets cooler, it contracts (takes up less space) and sinks down.' This is the principle of thermal expansion and contraction."}, {"text": "Differences in density between hot and cold water, causing convection.", "isCorrect": false, "rationale": "While temperature affects density and can cause convection in a larger body of water, the direct reason for the liquid's movement within the thermometer tube is its own volume change due to temperature."}, {"text": "The effect of atmospheric pressure pushing the liquid up or down.", "isCorrect": false, "rationale": "While atmospheric pressure can have minor effects, the primary mechanism for thermometer liquid movement is thermal expansion/contraction, not pressure changes."}], "id": "q06"}, {"question": "Based on the 'Why Temperature Matters in Science' section, which of the following scenarios does NOT directly illustrate an application of temperature in the specific science fields mentioned?", "options": [{"text": "Polar bears having thick fur to survive in their cold habitat.", "isCorrect": false, "rationale": "This is a direct example of 'In Life Science, temperature affects where animals and plants can live.'"}, {"text": "Water evaporating from an ocean to form clouds, part of the water cycle.", "isCorrect": false, "rationale": "This is a direct example of 'In Earth Science, temperature drives weather and the water cycle... When water gets warm enough, it evaporates.'"}, {"text": "Measuring the brightness of a star based on its emitted light spectrum.", "isCorrect": true, "rationale": "This relates to astronomy or physics of light, but is not one of the specific examples of temperature's impact in Life Science, Earth Science, Chemistry, or Physics as described in the provided text section."}, {"text": "Heating ice to observe its transformation into liquid water.", "isCorrect": false, "rationale": "This is a direct example of 'In Chemistry, temperature tells us whether matter will be a solid, liquid, or gas... Heating ice past 0°C turns it to liquid water.'"}], "id": "q07"}, {"question": "The 'Putting It All Together' section summarizes various measurements. If a scientist has already measured an object's length, mass, and volume, what unique question does a temperature measurement allow them to answer about that object?", "options": [{"text": "How long is the object?", "isCorrect": false, "rationale": "Length measurement answers 'How long?'"}, {"text": "How much space does the object occupy?", "isCorrect": false, "rationale": "Volume measurement answers 'How much space?'"}, {"text": "How hot or cold is the object?", "isCorrect": true, "rationale": "The text explicitly states for temperature: 'Each type answers a different question: How long? How much stuff? How much space? How hot or cold?'"}, {"text": "How much matter is contained within the object?", "isCorrect": false, "rationale": "Mass measurement answers 'How much stuff?'"}], "id": "q08"}, {"question": "According to the 'Famous Scientist' box, what was a significant problem that Anders Celsius's development of a standardized temperature scale helped to resolve for scientists?", "options": [{"text": "He discovered the exact temperatures at which water freezes and boils, which were previously unknown.", "isCorrect": false, "rationale": "These phenomena were known; Celsius used them as fixed points for his scale, but he did not discover them."}, {"text": "He invented the first device capable of measuring temperature accurately.", "isCorrect": false, "rationale": "Thermometers existed before Celsius; his contribution was standardizing the scale, not inventing the tool."}, {"text": "He provided a consistent and universally understood way for scientists to compare temperature readings.", "isCorrect": true, "rationale": "The text states: 'Before Celsius, different scientists used different scales, and comparing temperatures was confusing. His scale solved that problem.' This highlights the importance of standardization for comparison."}, {"text": "He proved that temperature is connected to the energy of tiny particles, revolutionizing physics.", "isCorrect": false, "rationale": "While true that temperature is connected to energy, this connection was more developed later in physics; Celsius's primary contribution was the scale itself."}], "id": "q09"}, {"question": "When reading a thermometer, the instructions state to 'wait two minutes for the liquid to stop moving.' What is the most important reason for this waiting period?", "options": [{"text": "To prevent the liquid from expanding too quickly and breaking the glass tube.", "isCorrect": false, "rationale": "The liquid's expansion rate is determined by the temperature change, not the waiting period. Waiting ensures an accurate reading, not prevents breakage."}, {"text": "To allow the thermometer to reach the same temperature as the substance being measured.", "isCorrect": true, "rationale": "This period allows the thermometer's liquid to fully respond to and equilibrate with the temperature of the surrounding substance, ensuring an accurate and stable reading. It needs time to either expand or contract fully."}, {"text": "To give the student enough time to record previous measurements before moving on.", "isCorrect": false, "rationale": "While good practice, the two-minute wait is specifically for the thermometer's physical response, not student recording time."}, {"text": "To make sure no air bubbles are trapped within the colored liquid column.", "isCorrect": false, "rationale": "Air bubbles are usually a manufacturing or handling issue and not resolved by a two-minute wait after placement."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
