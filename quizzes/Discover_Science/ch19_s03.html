    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 19, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which simple machine is a common jar lid an example of?", "options": [{"text": "A lever", "isCorrect": false, "rationale": "A jar lid does not pivot around a fulcrum like a lever. Levers are typically used for lifting or prying."}, {"text": "A screw", "isCorrect": true, "rationale": "The text explicitly states, 'A jar lid is a screw — you twist it along spiral threads,' which is the defining characteristic of a screw."}, {"text": "A wheel and axle", "isCorrect": false, "rationale": "While you twist a jar lid, it doesn't involve a wheel rotating around a central axle in the same way a faucet handle or doorknob does. The primary mechanism is the spiral thread."}, {"text": "An inclined plane", "isCorrect": false, "rationale": "An inclined plane is a flat surface tilted at an angle, like a ramp. A jar lid's function is not to move objects up or down a slope."}], "id": "q01"}, {"question": "If you are trying to split a piece of wood for a campfire, which simple machine would be most effective for pushing the wood apart, and why?", "options": [{"text": "A pulley, because it changes the direction of force.", "isCorrect": false, "rationale": "A pulley is useful for lifting objects or changing the direction of a force, but not for splitting material by pushing it apart."}, {"text": "A wedge, because its sharp edge can separate materials.", "isCorrect": true, "rationale": "The text describes wedges like knives and front teeth as having 'a thin, sharp edge that bites into food and splits it apart,' which is exactly how a wedge splits wood."}, {"text": "A lever, because it multiplies force around a fulcrum.", "isCorrect": false, "rationale": "While a lever multiplies force, its primary action is to pivot an object or lift it, not to split material by forcing it apart through a sharp edge."}, {"text": "A wheel and axle, because it allows for rotation.", "isCorrect": false, "rationale": "A wheel and axle system is designed for rotation and moving objects efficiently, not for splitting solid materials."}], "id": "q02"}, {"question": "When your arm functions as a lever to lift a load, as described in the text, what specific body part acts as the fulcrum?", "options": [{"text": "The bicep muscle", "isCorrect": false, "rationale": "The bicep muscle provides the effort (force) to lift the load, it is not the fixed pivot point (fulcrum)."}, {"text": "The hand", "isCorrect": false, "rationale": "The hand is typically where the load is held when the arm acts as a lever, not the fulcrum."}, {"text": "The elbow", "isCorrect": true, "rationale": "The text explicitly states, 'Your arm is a lever. Your elbow is the fulcrum,' identifying the elbow as the pivot point."}, {"text": "The shoulder", "isCorrect": false, "rationale": "While the shoulder is a joint, the text specifically identifies the elbow as the fulcrum for the arm acting as a lever in this context."}], "id": "q03"}, {"question": "Which of the following playground items is correctly matched with the simple machine it represents, according to the text?", "options": [{"text": "Slide — Lever", "isCorrect": false, "rationale": "The text identifies a slide as an 'inclined plane,' not a lever."}, {"text": "Seesaw — Inclined plane", "isCorrect": false, "rationale": "The text identifies a seesaw as a 'lever,' not an inclined plane."}, {"text": "Flagpole rope — Pulley", "isCorrect": true, "rationale": "The text correctly identifies a 'Flagpole rope' as a 'pulley,' used for lifting the flag."}, {"text": "Merry-go-round — Screw", "isCorrect": false, "rationale": "The text identifies a merry-go-round as a 'wheel and axle,' not a screw."}], "id": "q04"}, {"question": "According to the 'Simple Machines Built the Ancient World' section, for what primary purpose did Ancient Romans use screws?", "options": [{"text": "To construct large temples", "isCorrect": false, "rationale": "The text mentions Greeks using pulleys and levers for temples, not Romans using screws for this purpose."}, {"text": "To cut stone for roads and buildings", "isCorrect": false, "rationale": "Romans used wedges to cut stone for roads and buildings, not screws."}, {"text": "To press olives for oil and grapes for juice", "isCorrect": true, "rationale": "The text states, 'They used screws to press olives for oil and grapes for juice,' indicating this was a primary use."}, {"text": "To move heavy stone blocks for pyramids", "isCorrect": false, "rationale": "Ancient Egyptians, not Romans, used inclined planes and levers to build pyramids."}], "id": "q05"}, {"question": "A student turns a doorknob to open a door. Based on the examples provided in the text, which simple machine is primarily at work in this action, and how does it make opening the door easier?", "options": [{"text": "A lever, by changing the direction of force.", "isCorrect": false, "rationale": "While some doorknobs might incorporate lever action, the primary mechanism of turning a knob to open a door is rotation around a central point, not a lever's pivot."}, {"text": "A pulley, by lifting the door with less effort.", "isCorrect": false, "rationale": "A pulley is used for lifting, and a doorknob does not involve lifting the door with ropes or cables."}, {"text": "A wheel and axle, by allowing a small force on the knob to turn a larger axle (the spindle) inside the door.", "isCorrect": true, "rationale": "The text mentions 'Drawer handles work like wheel-and-axle systems' and 'Your wrist is like a wheel and axle. It lets your hand rotate to turn objects like doorknobs.' This illustrates how the larger knob (wheel) allows for more leverage to turn the smaller spindle (axle) inside the door mechanism, making it easier to open."}, {"text": "An inclined plane, by gradually moving the door upwards.", "isCorrect": false, "rationale": "An inclined plane is a ramp, which is not how a doorknob functions to open a door."}], "id": "q06"}, {"question": "Which part of the human body is specifically described as a wedge in the section, and what is its function?", "options": [{"text": "The wrist, allowing the hand to rotate.", "isCorrect": false, "rationale": "The text identifies the wrist as a wheel and axle, enabling rotation, not as a wedge for splitting."}, {"text": "The elbow, acting as a fulcrum for the arm.", "isCorrect": false, "rationale": "The text identifies the elbow as the fulcrum of the arm-lever system, not a wedge."}, {"text": "The front teeth, having a sharp edge to bite and split food.", "isCorrect": true, "rationale": "The text explicitly states, 'Your front teeth are wedges. They have a thin, sharp edge that bites into food and splits it apart,' directly matching the description and function."}, {"text": "The bicep muscle, providing force for lifting.", "isCorrect": false, "rationale": "The bicep muscle provides the force in the arm-lever system, it is not a simple machine itself, nor a wedge."}], "id": "q07"}, {"question": "During the 'Simple Machine Hunt' activity, what information are students NOT instructed to record for each simple machine they find?", "options": [{"text": "The name of the object", "isCorrect": false, "rationale": "Students are explicitly instructed to 'Write down: The name of the object (e.g., “scissors”).'"}, {"text": "Which type of simple machine it is", "isCorrect": false, "rationale": "Students are explicitly instructed to 'Write down: Which type of simple machine it is (e.g., “lever + wedge”).'"}, {"text": "The material the object is made from", "isCorrect": true, "rationale": "The instructions for recording findings include the object's name, type, and how it helps (makes work easier), but not the material it's made from."}, {"text": "How it makes work easier", "isCorrect": false, "rationale": "Students are explicitly instructed to 'Write down: How it makes work easier (e.g., “cuts paper with less force”).'"}], "id": "q08"}, {"question": "The 'teachernote' section highlights a cross-connection between the example of the arm as a lever and what other unit's content?", "options": [{"text": "Unit 17: Energy Transformations", "isCorrect": false, "rationale": "While physics concepts like energy transformation are related, the specific cross-connection mentioned in the teachernote is not about energy transformations."}, {"text": "Unit 16: Skeletal and Muscular Systems", "isCorrect": true, "rationale": "The 'teachernote' explicitly states, 'Cross-Connection to Unit 16: This is a great moment to remind students about the skeletal and muscular systems they learned in Unit 16,' linking bones, joints, and muscles to the arm-as-lever example."}, {"text": "Unit 18: Forces and Motion", "isCorrect": false, "rationale": "Forces and motion are fundamental to simple machines, but Unit 16, focusing on biological systems, is the specific cross-connection highlighted."}, {"text": "Unit 20: Integrated Review", "isCorrect": false, "rationale": "Unit 20 is where this connection will be tested in the Integrated Review, but the cross-connection itself is to content from Unit 16."}], "id": "q09"}, {"question": "What is the overarching message about the use of simple machines conveyed in the 'Simple Machines Built the Ancient World' section?", "options": [{"text": "Simple machines are modern inventions that greatly advanced technology in the last few centuries.", "isCorrect": false, "rationale": "The section explicitly states that people used simple machines for 'thousands of years' and details their use in ancient civilizations, contradicting the idea of them being modern inventions."}, {"text": "Ancient civilizations primarily used only one or two types of simple machines for their construction.", "isCorrect": false, "rationale": "The text lists various simple machines (inclined planes, levers, wedges, screws, pulleys) used by ancient Egyptians, Romans, and Greeks, showing a diverse application."}, {"text": "Simple machines were essential tools in ancient times but have largely been replaced by complex machines today.", "isCorrect": false, "rationale": "The section concludes with 'And we still use every single one of today!', indicating their continued relevance, not replacement."}, {"text": "Simple machines have been fundamental human tools for thousands of years and remain indispensable even today.", "isCorrect": true, "rationale": "The section highlights the ancient use by Egyptians, Romans, and Greeks over millennia and concludes with, 'Simple machines are some of the oldest technology in human history. And we still use every single one today!', accurately reflecting their enduring importance."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
