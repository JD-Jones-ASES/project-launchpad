<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 5, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A scientist discovers a fossilized imprint of an ancient fern in a rock. Based on the vocabulary, how would this fern best be classified now?", "options": [{"text": "A living thing", "isCorrect": false, "rationale": "A living thing grows, reproduces, needs energy, responds to its environment, and is made of cells. The fossilized fern no longer exhibits these characteristics."}, {"text": "A nonliving thing", "isCorrect": false, "rationale": "A nonliving thing is something that was never alive. The fern was alive in the past, so this classification is incorrect."}, {"text": "An once-living thing", "isCorrect": true, "rationale": "An once-living thing is something that was alive in the past but is no longer alive. A fossilized fern perfectly fits this description as it was a living organism that is now deceased and preserved."}, {"text": "A habitat", "isCorrect": false, "rationale": "A habitat is the natural home of a living thing, not the organism itself."}], "id": "q01"}, {"question": "Which characteristic is unique to a 'living thing' and differentiates it from an 'once-living thing' in their current states, according to the provided definitions?", "options": [{"text": "Being made of cells", "isCorrect": false, "rationale": "Both living and once-living things would have been made of cells when they were alive. The cellular structure would still be present (though perhaps decayed) in an once-living thing, making this not a differentiator in their current states as living vs. no longer living."}, {"text": "Reproducing", "isCorrect": true, "rationale": "A living thing 'reproduces' (makes new living things of the same kind). An once-living thing, by definition, is no longer alive and therefore cannot reproduce. This is a key differentiating characteristic between a currently living organism and one that was alive but isn't now."}, {"text": "Responding to its environment", "isCorrect": false, "rationale": "While a living thing responds to its environment, an once-living thing does not anymore. This is a true distinction, but 'reproducing' is a more fundamental and active process uniquely characteristic of a currently living organism that 'once-living' items lack."}, {"text": "Needing energy", "isCorrect": false, "rationale": "While a living thing needs energy, an once-living thing does not anymore. Similar to 'responding,' this is a valid distinction, but 'reproducing' highlights a continuous active process of life."}], "id": "q02"}, {"question": "What term refers to the layer of air that surrounds Earth?", "options": [{"text": "Lithosphere", "isCorrect": false, "rationale": "The Lithosphere is Earth's rocky outer layer."}, {"text": "Hydrosphere", "isCorrect": false, "rationale": "The Hydrosphere refers to all the water on Earth."}, {"text": "Atmosphere", "isCorrect": true, "rationale": "The Atmosphere is correctly defined as the layer of air around Earth."}, {"text": "Continent", "isCorrect": false, "rationale": "A Continent is a very large area of land."}], "id": "q03"}, {"question": "If you were exploring a massive body of salt water that covers a significant portion of the planet, which term would best describe your location?", "options": [{"text": "Lithosphere", "isCorrect": false, "rationale": "The Lithosphere is Earth's rocky outer layer, not a body of water."}, {"text": "Atmosphere", "isCorrect": false, "rationale": "The Atmosphere is the layer of air around Earth, not a body of water."}, {"text": "Continent", "isCorrect": false, "rationale": "A Continent is a very large area of land, not water."}, {"text": "Ocean", "isCorrect": true, "rationale": "An Ocean is defined as a huge body of salt water, accurately describing the location."}], "id": "q04"}, {"question": "A student measures the amount of space a specific rock occupies. Which property is the student measuring?", "options": [{"text": "Mass", "isCorrect": false, "rationale": "Mass is the amount of matter in an object, not the space it occupies."}, {"text": "Volume", "isCorrect": true, "rationale": "Volume is defined as the amount of space something takes up, which is what the student is measuring."}, {"text": "Property", "isCorrect": false, "rationale": "Property is a general term for a characteristic; volume is a specific type of property being measured."}, {"text": "Matter", "isCorrect": false, "rationale": "Matter is anything that has mass and takes up space, not the specific measurement of space itself."}], "id": "q05"}, {"question": "Imagine a substance that takes the shape of any container it is poured into, but always fills the same amount of space. Which state of matter does this describe?", "options": [{"text": "Solid", "isCorrect": false, "rationale": "A solid has a definite shape and volume, meaning it would not take the shape of its container."}, {"text": "Liquid", "isCorrect": true, "rationale": "A liquid has a definite volume but no definite shape, so it will take the shape of its container while occupying a constant amount of space."}, {"text": "Gas", "isCorrect": false, "rationale": "A gas has no definite shape or volume; it would expand to fill the entire container, not just the same amount of space."}, {"text": "Property", "isCorrect": false, "rationale": "This describes a state of matter, not a general characteristic or property."}], "id": "q06"}, {"question": "A scientist observes that a newly discovered element is shiny, conducts electricity, and melts at a high temperature. These observable and measurable characteristics are collectively known as its:", "options": [{"text": "Mass", "isCorrect": false, "rationale": "Mass is the amount of matter, a specific property, not a collection of diverse characteristics like shininess or conductivity."}, {"text": "Volume", "isCorrect": false, "rationale": "Volume is the amount of space something takes up, a specific property, not a collective description of various traits."}, {"text": "Properties", "isCorrect": true, "rationale": "Properties are defined as characteristics you can observe or measure. Shininess, conductivity, and melting point are all examples of properties."}, {"text": "State of matter", "isCorrect": false, "rationale": "While melting at a high temperature relates to a change in state, shininess and electrical conductivity are general characteristics (properties) that can be observed regardless of state, and not 'state of matter' itself."}], "id": "q07"}, {"question": "What is the term for any push or a pull exerted on an object?", "options": [{"text": "Gravity", "isCorrect": false, "rationale": "Gravity is a specific type of force (a pull towards Earth), not the general definition of any push or pull."}, {"text": "Friction", "isCorrect": false, "rationale": "Friction is a specific type of force that slows objects when surfaces rub together, not the general definition of any push or pull."}, {"text": "Force", "isCorrect": true, "rationale": "Force is explicitly defined as a push or a pull."}, {"text": "Motion", "isCorrect": false, "rationale": "Motion is a change in position over time, which can be *caused* by a force, but motion itself is not a push or a pull."}], "id": "q08"}, {"question": "When you drop a ball, it accelerates downwards towards the ground. Which force is primarily responsible for this action?", "options": [{"text": "Friction", "isCorrect": false, "rationale": "Friction is a force that slows objects when surfaces rub together, it does not primarily pull objects downwards in freefall."}, {"text": "Motion", "isCorrect": false, "rationale": "Motion is a change in position over time; it is the *result* of a force, not a force itself."}, {"text": "Speed", "isCorrect": false, "rationale": "Speed is how fast an object moves, not a force that causes movement."}, {"text": "Gravity", "isCorrect": true, "rationale": "Gravity is defined as the force that pulls objects toward Earth, which is the primary reason a dropped ball falls downwards."}], "id": "q09"}, {"question": "A bicycle rider applies their brakes, causing the wheels to slow down as they rub against the brake pads. What force is at play in slowing the bicycle?", "options": [{"text": "Gravity", "isCorrect": false, "rationale": "Gravity pulls the bicycle downwards, but it is not the force responsible for slowing it due to the application of brakes."}, {"text": "Motion", "isCorrect": false, "rationale": "Motion is a change in position; the bicycle's motion is changing (slowing down), but motion itself is not a force."}, {"text": "Speed", "isCorrect": false, "rationale": "Speed is a measure of how fast the bicycle is moving, not a force acting upon it."}, {"text": "Friction", "isCorrect": true, "rationale": "Friction is defined as a force that slows objects when surfaces rub together. The rubbing of brake pads against the wheels creates friction, which slows the bicycle."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
