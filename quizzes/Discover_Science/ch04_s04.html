<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 4, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the primary role of friction?", "options": [{"text": "To increase the speed of moving objects.", "isCorrect": false, "rationale": "The definition states that friction is a force that 'slows down or stops moving objects,' not increases their speed."}, {"text": "To slow down or stop moving objects when two surfaces rub against each other.", "isCorrect": true, "rationale": "The text defines friction as 'a force that slows down or stops moving objects when two surfaces rub against each other.'"}, {"text": "To create heat, regardless of motion.", "isCorrect": false, "rationale": "While friction can create heat, its primary role as defined in the text is to slow down or stop objects. Heat generation is a consequence, not the definition of its primary role."}, {"text": "To cause objects to stick together permanently.", "isCorrect": false, "rationale": "Friction causes resistance to motion between surfaces, but not necessarily permanent adhesion."}]}, {"question": "Which characteristic of surfaces directly affects the amount of friction between them?", "options": [{"text": "The color of the surfaces.", "isCorrect": false, "rationale": "The text makes no mention of surface color influencing friction."}, {"text": "The temperature of the surfaces.", "isCorrect": false, "rationale": "While temperature can indirectly affect material properties, the text explicitly states surface 'roughness' as the direct factor."}, {"text": "The roughness or smoothness of the surfaces.", "isCorrect": true, "rationale": "The text explicitly states: 'The rougher the surfaces, the more friction. The smoother the surfaces, the less friction.'"}, {"text": "The age of the surfaces.", "isCorrect": false, "rationale": "The text does not mention the age of surfaces as a factor in friction."}]}, {"question": "Based on the examples provided, which of the following scenarios would demonstrate a high amount of friction?", "options": [{"text": "A hockey puck sliding on ice.", "isCorrect": false, "rationale": "The table lists 'A hockey puck on ice' as having 'Less Friction (smooth).'"}, {"text": "Sliding on a polished floor.", "isCorrect": false, "rationale": "The table lists 'Sliding on a polished floor' as having 'Less Friction (smooth).'"}, {"text": "Car brakes gripping a wheel.", "isCorrect": true, "rationale": "The table lists 'Car brakes gripping a wheel' as an example of 'More Friction (rough),' which is essential for stopping."}, {"text": "Ice skating on ice.", "isCorrect": false, "rationale": "The table lists 'Ice skating on ice' as having 'Less Friction (smooth).'"}]}, {"question": "Which of the following activities relies on friction being a 'best friend' according to the text?", "options": [{"text": "A squeaky door hinge.", "isCorrect": false, "rationale": "A squeaky door hinge is listed under 'Unhelpful Friction' because it indicates unwanted resistance and wear."}, {"text": "Wearing out your shoe soles.", "isCorrect": false, "rationale": "Wearing out shoe soles is listed under 'Unhelpful Friction' as it represents material degradation due to friction."}, {"text": "Walking on the ground.", "isCorrect": true, "rationale": "The text states 'Walking — Friction between your shoes and the ground keeps you from slipping,' classifying it as 'Helpful Friction.'"}, {"text": "Rubbing your hands together to create warmth.", "isCorrect": false, "rationale": "Making hands warm is listed under 'Unhelpful Friction' as it's an undesirable energy conversion, not a primary benefit."}]}, {"question": "If there were absolutely no friction, what critical everyday action would become impossible?", "options": [{"text": "Turning on a light switch.", "isCorrect": false, "rationale": "While some friction might be involved in the mechanics, the primary issue of no friction is related to movement, gripping, and stopping, as highlighted in the 'thinkaboutit' section."}, {"text": "Walking across a room.", "isCorrect": true, "rationale": "The 'thinkaboutit' section asks: 'What would happen if there were no friction at all? Could you walk?' The hint suggests everything would be impossibly slippery, making walking impossible."}, {"text": "Reading a book.", "isCorrect": false, "rationale": "Reading a book does not inherently rely on friction for the act itself, though holding the book might."}, {"text": "Breathing normally.", "isCorrect": false, "rationale": "Breathing is a biological process and does not directly rely on external friction."}]}, {"question": "According to the text, what is an example of friction working 'against you'?", "options": [{"text": "Bicycle brakes slowing the wheel.", "isCorrect": false, "rationale": "Bicycle brakes are listed under 'Helpful Friction' as they use friction constructively to stop motion."}, {"text": "Friction between a pencil and paper leaving a mark.", "isCorrect": false, "rationale": "Writing is listed under 'Helpful Friction' as it allows for the transfer of graphite or ink to paper."}, {"text": "The wearing out of your shoe soles.", "isCorrect": true, "rationale": "The text lists 'Wearing out your shoe soles (friction rubs the rubber away)' under 'Unhelpful Friction,' as it leads to material degradation."}, {"text": "Friction allowing you to hold a glass without dropping it.", "isCorrect": false, "rationale": "Gripping is listed under 'Helpful Friction' because it prevents objects from slipping from your grasp."}]}, {"question": "Sir Isaac Newton is credited with what significant contribution to science, according to the text?", "options": [{"text": "Discovering electricity.", "isCorrect": false, "rationale": "The text focuses on Newton's work with forces and motion, not electricity."}, {"text": "Inventing the first telescope.", "isCorrect": false, "rationale": "While Newton made advancements in optics, the text highlights his laws of motion and understanding of forces."}, {"text": "Figuring out the rules that govern how forces and motion work.", "isCorrect": true, "rationale": "The 'famousscientist' section states that Newton 'figured out the rules that govern how forces and motion work.'"}, {"text": "Developing the theory of relativity.", "isCorrect": false, "rationale": "The theory of relativity was developed much later by Albert Einstein, not Isaac Newton."}]}, {"question": "Newton's First Law of Motion, as described in the text, implies what about an object at rest?", "options": [{"text": "It will spontaneously start moving if left alone for too long.", "isCorrect": false, "rationale": "Newton's First Law states an object at rest stays at rest 'unless a force acts on it,' implying it will not move spontaneously."}, {"text": "It will remain at rest unless an external force acts upon it.", "isCorrect": true, "rationale": "The text explains Newton's First Law: 'an object at rest stays at rest... unless a force acts on it.'"}, {"text": "It will always have a slight, imperceptible motion.", "isCorrect": false, "rationale": "Newton's First Law describes a state of true rest without external forces, not imperceptible motion."}, {"text": "It will eventually be pulled towards the Moon by gravity.", "isCorrect": false, "rationale": "While gravity is a force, the law specifies remaining at rest unless *a* force acts on it, not a specific destination, and the moon's pull on objects at rest on Earth is negligible in this context."}]}, {"question": "How does the concept of friction relate to Newton's First Law of Motion for an object like a rolling soccer ball?", "options": [{"text": "Friction is the force that initially makes the soccer ball move faster.", "isCorrect": false, "rationale": "Friction generally opposes motion, it does not initiate or speed up the ball's movement; kicking the ball does that."}, {"text": "Friction is the external force that eventually causes the moving soccer ball to stop.", "isCorrect": true, "rationale": "Newton's First Law states an object in motion stays in motion unless a force acts on it. The 'teachernote' connects this by stating a 'ball rolling until friction stops it,' meaning friction is that external stopping force."}, {"text": "Friction causes the soccer ball to stay at rest indefinitely.", "isCorrect": false, "rationale": "Newton's First Law refers to an object staying at rest, but friction's role for a *moving* ball is to slow and stop it, not keep it at rest."}, {"text": "Friction allows the soccer ball to continue moving without any force.", "isCorrect": false, "rationale": "This contradicts both the definition of friction (a slowing force) and Newton's First Law, which states motion *requires* an absence of external forces to continue indefinitely."}]}, {"question": "The 'teachernote' section suggests that forces and friction connect to 'simple machines.' What does this cross-connection imply about simple machines?", "options": [{"text": "Simple machines are primarily designed to generate more friction.", "isCorrect": false, "rationale": "The text states simple machines 'change the direction or size of forces,' not that they are primarily for generating more friction. While friction can be present, it's not their main purpose."}, {"text": "Simple machines are tools that can modify forces, including overcoming or utilizing friction.", "isCorrect": true, "rationale": "The 'teachernote' states that simple machines 'are tools that change the direction or size of forces.' This implies they can manipulate forces like friction (e.g., reducing it to make work easier or increasing it for grip)."}, {"text": "Simple machines eliminate friction entirely.", "isCorrect": false, "rationale": "While some simple machines might reduce friction, the text does not state they eliminate it entirely, nor is that their primary function."}, {"text": "Simple machines only work in environments with zero friction.", "isCorrect": false, "rationale": "Simple machines operate in the real world where friction is always present, and often designed to work with or against it, not only in its absence."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
