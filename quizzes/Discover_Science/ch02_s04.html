<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 2, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following continents is unique for also being a country and is known for its marsupials and coral reefs?", "options": [{"text": "Africa", "isCorrect": false, "rationale": "Africa is the second-largest continent and is known for the Sahara Desert and unique animals, but it is not also a single country."}, {"text": "Australia", "isCorrect": true, "rationale": "The text states that Australia is 'the smallest continent, also a country. Known for kangaroos, koalas, and coral reefs.'"}, {"text": "Europe", "isCorrect": false, "rationale": "Europe is a diverse continent with many countries and languages, but it is not a single country itself."}, {"text": "South America", "isCorrect": false, "rationale": "South America is home to the Amazon Rainforest and many countries, but it is not also a single country."}]}, {"question": "An explorer is planning an expedition to the coldest continent, which is largely covered in ice and home to penguins. Which continent is their destination?", "options": [{"text": "Asia", "isCorrect": false, "rationale": "Asia is the largest continent and home to Mount Everest, but it is not described as the coldest or covered in ice with penguins."}, {"text": "North America", "isCorrect": false, "rationale": "North America is home to Canada, the United States, and Mexico, but it is not the coldest, ice-covered continent."}, {"text": "Antarctica", "isCorrect": true, "rationale": "The text describes Antarctica as 'the coldest continent, covered in ice. Very few people live there, but penguins love it!'"}, {"text": "Europe", "isCorrect": false, "rationale": "Europe is a diverse continent but is not the coldest or covered in ice in the manner described."}]}, {"question": "Which ocean is noted as the largest and deepest, covering more area than all the land on Earth combined?", "options": [{"text": "Atlantic Ocean", "isCorrect": false, "rationale": "The Atlantic Ocean is the second-largest ocean, not the largest and deepest."}, {"text": "Indian Ocean", "isCorrect": false, "rationale": "The Indian Ocean is described as the warmest ocean, not the largest and deepest."}, {"text": "Pacific Ocean", "isCorrect": true, "rationale": "The text explicitly states: 'Pacific Ocean — the largest and deepest ocean. It covers more area than all the land on Earth combined!'"}, {"text": "Arctic Ocean", "isCorrect": false, "rationale": "The Arctic Ocean is the smallest and coldest ocean, not the largest and deepest."}]}, {"question": "A research vessel is sailing between the Americas and Europe/Africa. In which ocean are they most likely located?", "options": [{"text": "Southern Ocean", "isCorrect": false, "rationale": "The Southern Ocean surrounds Antarctica, not located between the Americas and Europe/Africa."}, {"text": "Indian Ocean", "isCorrect": false, "rationale": "The Indian Ocean is south of Asia, not between the Americas and Europe/Africa."}, {"text": "Pacific Ocean", "isCorrect": false, "rationale": "The Pacific Ocean is west of the Americas and east of Asia/Australia, not between the Americas and Europe/Africa."}, {"text": "Atlantic Ocean", "isCorrect": true, "rationale": "The text states: 'Atlantic Ocean — the second-largest ocean, between the Americas and Europe/Africa.'"}]}, {"question": "What is the primary reason both the North and South Poles are extremely cold?", "options": [{"text": "They are located at high altitudes.", "isCorrect": false, "rationale": "While some polar regions have elevated land, the text does not mention altitude as the primary reason for their coldness. It focuses on solar radiation."}, {"text": "They receive very little direct sunlight.", "isCorrect": true, "rationale": "The text explicitly states: 'Both poles are extremely cold because they get very little direct sunlight.'"}, {"text": "They are constantly surrounded by cold ocean currents.", "isCorrect": false, "rationale": "While ocean currents do play a role in global climate, the text identifies 'very little direct sunlight' as the primary reason for the poles' extreme cold."}, {"text": "They are far away from human activity and its warming effects.", "isCorrect": false, "rationale": "Human activity's warming effects are not discussed as a primary factor for the poles' natural coldness in the text."}]}, {"question": "In the 'Model Earth's Three Spheres' activity, if a student waves cardboard or turns on a fan above the bowl, what part of Earth is this action primarily intended to represent?", "options": [{"text": "The hydrosphere (water)", "isCorrect": false, "rationale": "The water in the bowl represents the hydrosphere. Waving cardboard or a fan represents moving air."}, {"text": "The lithosphere (rock and land)", "isCorrect": false, "rationale": "The sand or dirt in the bowl represents the lithosphere. Waving cardboard or a fan represents moving air."}, {"text": "The atmosphere (moving air)", "isCorrect": true, "rationale": "The steps explicitly state: 'Wave the cardboard or turn on the fan above the bowl. This represents the atmosphere (moving air).'"}, {"text": "The biosphere (living things)", "isCorrect": false, "rationale": "The biosphere is mentioned as an optional extension (toy trees/animals), not represented by waving cardboard or a fan."}]}, {"question": "Marie Tharp's groundbreaking work profoundly changed the scientific understanding of Earth by:", "options": [{"text": "Proving that the highest mountains are formed by volcanic activity.", "isCorrect": false, "rationale": "Marie Tharp's work focused on the ocean floor and plate tectonics, not specifically the formation of the highest mountains by volcanoes."}, {"text": "Discovering the composition of the Earth's core through seismic waves.", "isCorrect": false, "rationale": "Marie Tharp was a geologist and mapmaker focused on the ocean floor, not the Earth's core composition using seismic waves."}, {"text": "Creating the first detailed map of the ocean floor, revealing underwater mountain ranges.", "isCorrect": true, "rationale": "The text states she 'created the first detailed map of the ocean floor' and 'discovered an enormous underwater mountain range... the Mid-Atlantic Ridge.'"}, {"text": "Developing a new theory for how continents were formed from supercontinents.", "isCorrect": false, "rationale": "While her work supported continental movement, her primary contribution was mapping the ocean floor and identifying features like the Mid-Atlantic Ridge, which provided evidence for plate tectonics, rather than a new theory of supercontinent formation."}]}, {"question": "Which of Marie Tharp's discoveries provided crucial evidence for the theory of plate tectonics?", "options": [{"text": "The existence of deep-sea trenches around volcanic islands.", "isCorrect": false, "rationale": "While deep-sea trenches are relevant to plate tectonics, the text specifically highlights the Mid-Atlantic Ridge as her key discovery supporting the theory."}, {"text": "The uniform flatness of the ocean bottom.", "isCorrect": false, "rationale": "Marie Tharp *disproved* the belief that the ocean bottom was flat and featureless."}, {"text": "The Mid-Atlantic Ridge, an enormous underwater mountain range.", "isCorrect": true, "rationale": "The text states: 'By studying data from ocean-floor measurements, Marie discovered an enormous underwater mountain range running down the middle of the Atlantic Ocean — the Mid-Atlantic Ridge. Her maps helped prove that the continents are slowly moving, an idea called plate tectonics.'"}, {"text": "The presence of ancient fossils on the ocean floor.", "isCorrect": false, "rationale": "Her work focused on mapping geological features, not on fossil evidence."}]}, {"question": "Based on the geography tip provided, if you were to randomly point at a globe, what is the approximate probability that your finger would land on water?", "options": [{"text": "Around 29%", "isCorrect": false, "rationale": "29% would be the approximate probability of landing on land, as 71% is water."}, {"text": "Around 50%", "isCorrect": false, "rationale": "The text provides a specific percentage that indicates a disproportionate amount of water compared to land."}, {"text": "Around 71%", "isCorrect": true, "rationale": "The teacher note states: '(Water — 71% chance!)'"}, {"text": "Around 85%", "isCorrect": false, "rationale": "85% is higher than the percentage given in the text."}]}, {"question": "Considering the information about Earth's continents and oceans, why might a scientist hypothesize that marine biodiversity is generally greater than terrestrial biodiversity, even without direct evidence?", "options": [{"text": "The presence of poles suggests more extreme conditions for terrestrial life.", "isCorrect": false, "rationale": "While poles are extreme, their presence alone doesn't directly imply overall lower terrestrial biodiversity compared to marine. Many terrestrial environments are also extreme."}, {"text": "The largest continent, Asia, is home to more than half of all people, implying less space for wild terrestrial life.", "isCorrect": false, "rationale": "Population density on one continent doesn't directly prove lower overall terrestrial biodiversity compared to marine biodiversity. It speaks to human impact, not natural carrying capacity."}, {"text": "The planet's surface is predominantly covered by oceans, providing a vast habitat for marine life.", "isCorrect": true, "rationale": "The text indicates that 71% of Earth's surface is water. A larger habitat area generally correlates with greater potential for biodiversity, making this a reasonable hypothesis."}, {"text": "Continents have a greater variety of climates, leading to more specialized terrestrial species.", "isCorrect": false, "rationale": "While diverse climates on land lead to specialization, the sheer volume and continuous nature of ocean habitats often support greater overall biodiversity across a different range of conditions."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
