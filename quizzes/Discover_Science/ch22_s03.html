    };

<body>
<div class="quiz-container">

        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 22, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best summarizes the primary reason soil is considered one of Earth's most important natural resources according to the text?", "options": [{"text": "It is a crowded habitat for billions of organisms.", "isCorrect": false, "rationale": "While soil is indeed a crowded habitat, this is a specific characteristic and a reason for its importance, but not the overarching primary reason for its global significance as presented in the text."}, {"text": "It serves as the foundation for almost all food chains and cleans our water supply.", "isCorrect": true, "rationale": "The text highlights soil's critical roles in feeding the world (supporting food chains) and cleaning water as fundamental to life, making this the most comprehensive summary of its primary importance."}, {"text": "It forms very slowly, requiring protection.", "isCorrect": false, "rationale": "The slow formation of soil is a crucial aspect that emphasizes the need for protection, but it is a characteristic and a reason for human action, not the primary reason for soil's inherent importance to life itself."}, {"text": "It is found everywhere, under our feet, and is easy to forget.", "isCorrect": false, "rationale": "This statement describes soil's common presence and how it's often overlooked, but it does not explain why it is an 'important natural resource.'"}]}, {"question": "How do the decomposer organisms living in soil (like bacteria and fungi) primarily contribute to the growth of new plants?", "options": [{"text": "Earthworms eat dead leaves, directly providing nutrients to living plants.", "isCorrect": false, "rationale": "Earthworms create humus by processing dead leaves, which then releases nutrients, but they don't directly feed nutrients to living plants in an immediate way. Bacteria and fungi are the primary decomposers for nutrient release."}, {"text": "Bacteria and fungi break down dead organic matter, returning essential nutrients to the soil for plants to absorb.", "isCorrect": true, "rationale": "The text explicitly states that 'Bacteria and fungi break down dead plants and animals into nutrients that new plants can use,' emphasizing their role in nutrient cycling."}, {"text": "Protozoa and nematodes aerate the soil, making it easier for plants to grow.", "isCorrect": false, "rationale": "While some organisms contribute to aeration, the question specifically asks about the primary contribution of decomposers to *plant growth* related to nutrients, which is breakdown of dead matter."}, {"text": "Larger creatures like moles and ants bring new soil minerals to the surface for plants.", "isCorrect": false, "rationale": "Larger creatures like moles and ants tunnel and mix soil, but they are not described as the primary mechanism for bringing new *minerals* as a nutrient source for plants; minerals come from broken rock."}]}, {"question": "A student is eating a fish sandwich for lunch. According to the text, how does the fish in their sandwich ultimately depend on soil?", "options": [{"text": "Fish directly eat plants that grow in the soil surrounding the pond.", "isCorrect": false, "rationale": "Most fish do not directly eat terrestrial plants. The text describes a different pathway for aquatic life."}, {"text": "Tiny organisms in the mud, fed by soil, become food for smaller creatures, which then feed the larger fish.", "isCorrect": true, "rationale": "The text states, 'Even fish in a pond depend on soil — tiny organisms in the mud feed the smallest creatures, which feed the larger ones,' establishing a food chain link starting in soil."}, {"text": "The water the fish live in is cleaned by soil, making it safe for them to thrive.", "isCorrect": false, "rationale": "While soil does clean water, this describes a condition for thriving, not the direct food dependence of the fish on soil as explained by the food chain example."}, {"text": "Soil provides the minerals that dissolve in water, which fish then absorb for growth.", "isCorrect": false, "rationale": "Minerals are present in soil, but the text emphasizes the food chain aspect for how fish *depend on soil* for their sustenance, rather than direct mineral absorption from water originating in soil."}]}, {"question": "Imagine a scenario where all decomposers (like bacteria, fungi, and earthworms) in an ecosystem suddenly disappeared. Based on the text, what would be the most significant long-term consequence for plant life?", "options": [{"text": "Plants would be unable to absorb water due to compacted soil.", "isCorrect": false, "rationale": "While some decomposers like earthworms help aerate soil, their primary role as *decomposers* is nutrient cycling. Lack of aeration would be a consequence, but not the *most significant long-term consequence for plant life* related to their core function."}, {"text": "Dead organic matter would accumulate indefinitely, and plants would eventually run out of essential nutrients.", "isCorrect": true, "rationale": "The text explicitly states, 'Without these soil organisms, dead leaves and branches would pile up forever, and nutrients would never return to the soil,' directly linking their absence to nutrient depletion for new plants."}, {"text": "Soil would become too clean, lacking the necessary 'dirt' for plants to anchor their roots.", "isCorrect": false, "rationale": "Decomposers create humus, which is rich organic matter, not just 'dirt.' Their absence would lead to nutrient scarcity, not necessarily a lack of anchoring material in the sense implied."}, {"text": "The soil would become too hot, preventing seeds from germinating.", "isCorrect": false, "rationale": "The text does not mention temperature regulation as a primary function of decomposers or a consequence of their absence."}]}, {"question": "Which of the following best describes the process by which soil 'cleans our water'?", "options": [{"text": "Soil chemically neutralizes harmful toxins in rainwater before it reaches underground.", "isCorrect": false, "rationale": "The text focuses on physical filtration, stating that soil 'traps dirt, germs, and other unwanted materials,' not necessarily chemical neutralization of toxins."}, {"text": "Tiny particles of sand, silt, and clay in the soil physically trap unwanted materials as water filters through them.", "isCorrect": true, "rationale": "The text clearly explains, 'Tiny particles of sand, silt, and clay trap dirt, germs, and other unwanted materials,' describing a physical filtration process."}, {"text": "Soil organisms consume impurities in the water, making it safe to drink.", "isCorrect": false, "rationale": "While soil organisms might play a minor role, the text attributes the primary cleaning action to the physical filtering by soil particles, not directly to organisms consuming impurities."}, {"text": "The sheer volume of soil absorbs all pollutants, preventing them from reaching deep water sources.", "isCorrect": false, "rationale": "While absorption can occur, the text specifically highlights the 'trap' function of the tiny particles as the primary cleaning mechanism, rather than just bulk absorption."}]}, {"question": "Given that it can take 500 to 1,000 years to form just one inch of new topsoil, what is the most logical implication for human activities related to land use?", "options": [{"text": "Humans should focus on developing synthetic nutrients to reduce reliance on natural soil formation.", "isCorrect": false, "rationale": "While synthetic nutrients exist, the text emphasizes *protecting* natural soil due to its slow formation, not replacing it with artificial alternatives as the primary implication."}, {"text": "We must implement sustainable practices to prevent erosion and loss of existing topsoil.", "isCorrect": true, "rationale": "The text states, 'Because soil forms so slowly, we must take care of it. Once topsoil is washed or blown away, it can take hundreds of years to replace,' directly implying the need for protection and sustainable practices."}, {"text": "It is impractical to protect soil, as its formation rate is beyond human control.", "isCorrect": false, "rationale": "This contradicts the text's explicit instruction that 'we must take care of it' and that farmers, gardeners, and scientists 'work to protect soil.'"}, {"text": "Farming and gardening should be abandoned to allow natural soil formation processes to occur undisturbed.", "isCorrect": false, "rationale": "This is an extreme and impractical measure, contradicting the text's emphasis on soil's role in feeding the world and the efforts of farmers to protect it."}]}, {"question": "The text defines 'nutrients' as substances living things need to grow and stay healthy. Which of the following is NOT described as a source of these essential nutrients for plants in the soil?", "options": [{"text": "Minerals in broken rock.", "isCorrect": false, "rationale": "The text explicitly lists 'the minerals in broken rock' as one of the two sources of nutrients for plants."}, {"text": "Humus from decomposed organisms.", "isCorrect": false, "rationale": "The text explicitly lists 'the humus from decomposed organisms' as one of the two sources of nutrients for plants."}, {"text": "Photosynthesis performed by the plants themselves.", "isCorrect": true, "rationale": "Photosynthesis is the process by which plants create their *food* (sugars) using sunlight, water, and carbon dioxide. It is not a source of the *nutrients* (like nitrogen, phosphorus, potassium) that the soil provides to the plant."}, {"text": "Dead plants and animals broken down by bacteria and fungi.", "isCorrect": false, "rationale": "This describes the process that creates humus, which is a key source of nutrients in the soil. Therefore, it is indirectly a source."}]}, {"question": "Earthworms are described as tunneling through soil, mixing layers, and creating spaces for air and water. What broader impact do these activities have on soil health and the ecosystem, according to the text?", "options": [{"text": "It helps to compact the soil, making it more stable for plant roots.", "isCorrect": false, "rationale": "Creating spaces for air and water works against compaction, making the soil less dense and more porous, which is beneficial."}, {"text": "It prevents water from soaking into the ground, leading to runoff.", "isCorrect": false, "rationale": "Creating spaces improves the soil's ability to absorb water, reducing runoff and promoting infiltration."}, {"text": "It contributes to the overall process of soil building and improves conditions for plant growth.", "isCorrect": true, "rationale": "The text states that these organisms 'are not just living in the soil — they are building it.' By mixing layers and creating spaces, earthworms improve soil structure, aeration, and water penetration, all of which are vital for healthy soil and plant growth."}, {"text": "It primarily serves to transport small organisms to different parts of the soil.", "isCorrect": false, "rationale": "While some incidental transport might occur, the text emphasizes their role in mixing layers and creating spaces for air/water as their primary contribution to soil health."}]}, {"question": "The text states, 'Almost everything you eat depends on soil.' Which of the following food items would represent the most *indirect* or *least direct* dependence on soil, based on the general principles discussed?", "options": [{"text": "A freshly picked apple.", "isCorrect": false, "rationale": "Apples grow on trees rooted directly in soil, representing direct dependence."}, {"text": "A glass of cow's milk.", "isCorrect": false, "rationale": "Cows eat grass that grows in soil, representing a direct chain of dependence on soil."}, {"text": "Wild-caught salmon from the open ocean.", "isCorrect": true, "rationale": "While the text mentions fish in a pond depending on soil (via mud organisms), wild-caught open ocean salmon primarily rely on marine food chains (e.g., phytoplankton, smaller fish) that are generally less directly linked to terrestrial soil as a primary nutrient source compared to land-based agriculture or pond ecosystems mentioned."}, {"text": "A loaf of bread made from wheat.", "isCorrect": false, "rationale": "Wheat grows directly in soil, representing direct dependence."}]}, {"question": "Considering all the reasons presented in the text ('Soil Feeds the World,' 'Soil Cleans Our Water,' 'Soil Is Home to Billions,' 'Soil Takes a Very Long Time to Form'), what is the most comprehensive reason why protecting soil is a critical global priority?", "options": [{"text": "To ensure a continuous supply of clean drinking water for human populations.", "isCorrect": false, "rationale": "While this is a crucial reason, it only covers one aspect of soil's importance and is not the most comprehensive reason presented in the text."}, {"text": "To preserve biodiversity, as soil is one of the most crowded habitats on Earth.", "isCorrect": false, "rationale": "Preserving biodiversity is important, but it is one of several reasons and does not encompass the full breadth of soil's critical roles as described in the text."}, {"text": "To maintain the fundamental support system for most life on Earth, encompassing food production, water purification, and ecosystem stability, especially given its slow formation.", "isCorrect": true, "rationale": "This option synthesizes all the major points made in the text: soil's role in food, water, housing organisms, and the challenge of its slow formation, making it the most comprehensive reason for its protection."}, {"text": "To allow scientists more time to study soil formation processes and composition.", "isCorrect": false, "rationale": "Scientific study is valuable, but it is a research goal, not the overarching critical global priority for protecting soil's fundamental functions for life."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
