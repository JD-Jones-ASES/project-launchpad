        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>

        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 19, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the defining characteristic of a compound machine?", "options": [{"text": "It is a machine that significantly reduces friction during operation.", "isCorrect": false, "rationale": "While reducing friction is a desirable quality for any machine, it is not the defining characteristic of a compound machine. The text states that compound machines are defined by their composition."}, {"text": "It is made of exactly three simple machines working together in a specific order.", "isCorrect": false, "rationale": "The text specifies 'two or more' simple machines, not strictly 'exactly three'."}, {"text": "It is a device made of two or more simple machines combined into one.", "isCorrect": true, "rationale": "The text explicitly defines a compound machine as 'a device made of two or more simple machines working together' or 'combined into one device'."}, {"text": "It is any machine that requires an external power source like electricity to function.", "isCorrect": false, "rationale": "The definition of a compound machine is based on its internal structure (simple machines working together), not its power source."}], "id": "q01"}, {"question": "Based on the examples provided in the text, which of the following is most clearly an example of a compound machine?", "options": [{"text": "A single lever used to pry open a lid.", "isCorrect": false, "rationale": "A single lever is a simple machine, not a combination of two or more simple machines."}, {"text": "A bicycle, utilizing wheels and axles, levers, pulleys, and screws.", "isCorrect": true, "rationale": "The text explicitly lists a bicycle as an example of a compound machine, detailing its various simple machine components (wheels and axles, levers, pulleys, and screws)."}, {"text": "An inclined plane (ramp) used to move an object to a higher elevation.", "isCorrect": false, "rationale": "An inclined plane is one of the six simple machines, not a combination of multiple simple machines."}, {"text": "A simple screw used to fasten two pieces of wood together.", "isCorrect": false, "rationale": "A screw is one of the six simple machines, not a compound machine on its own."}], "id": "q02"}, {"question": "A student needs to lift a heavy box onto a shelf. According to 'The Big Trade-Off,' if the student chooses to use a long ramp instead of lifting the box straight up, what will be the most likely outcome?", "options": [{"text": "The student will need to apply more force, but over a shorter distance.", "isCorrect": false, "rationale": "This contradicts 'The Big Trade-Off,' which states that less force requires more distance, and vice-versa."}, {"text": "The total amount of work done on the box will increase due to the longer path.", "isCorrect": false, "rationale": "The text explicitly states, 'The total amount of work stays the same!' regardless of the path taken or machine used (ignoring friction for ideal cases)."}, {"text": "The student will apply less force, but they will have to apply it over a longer distance.", "isCorrect": true, "rationale": "This directly applies 'The Big Trade-Off': 'Less force = more distance.' Using a ramp allows for less force over a greater distance to achieve the same vertical displacement."}, {"text": "The box will gain more potential energy than if it were lifted straight up.", "isCorrect": false, "rationale": "The potential energy gained depends only on the mass, gravity, and final height, which would be the same in both scenarios. Machines don't change the final energy state."}], "id": "q03"}, {"question": "The text emphasizes that 'The total amount of work stays the same!' when using a simple machine. What is the key implication of this statement regarding how machines function?", "options": [{"text": "Machines are fundamentally inefficient and waste energy.", "isCorrect": false, "rationale": "While real machines have inefficiencies due to friction, the statement about work staying the same refers to the ideal mechanical advantage, not inefficiency. It implies they are effective at changing *how* work is done."}, {"text": "Machines reduce the overall amount of energy required to complete a task.", "isCorrect": false, "rationale": "The text explicitly states that 'Machines Do Not Create Energy' and that 'energy cannot be created or destroyed'. Therefore, they do not reduce the total energy required (though they make it feel easier)."}, {"text": "Machines merely change the way work is done, by trading off force for distance or vice versa, rather than 'saving' work.", "isCorrect": true, "rationale": "This accurately reflects 'The Big Trade-Off' and the idea that 'the machine just changed how you did the work,' not the amount of work itself."}, {"text": "Machines are capable of creating energy if designed perfectly, overcoming the laws of physics.", "isCorrect": false, "rationale": "The text clearly states, 'Machines Do Not Create Energy' and 'A machine cannot give you something for nothing.' This option contradicts fundamental principles."}], "id": "q04"}, {"question": "Why does oiling a squeaky wheel or greasing a bolt make a machine 'work better,' according to the text?", "options": [{"text": "It adds more energy to the system, increasing the machine's overall power output.", "isCorrect": false, "rationale": "Machines do not create energy; oil/grease cannot add energy to the system."}, {"text": "It helps to reduce friction, meaning less effort is wasted and more force goes towards moving the load.", "isCorrect": true, "rationale": "The text explains that 'oiling a squeaky wheel or greasing a bolt makes the machine work better — it reduces friction,' allowing more applied force to go towards the intended work."}, {"text": "It changes the mechanical advantage of the simple machines within the compound machine.", "isCorrect": false, "rationale": "Lubrication reduces friction, it does not alter the fundamental geometry or lever arms that determine a machine's mechanical advantage."}, {"text": "It converts chemical energy into kinetic energy, making the machine move faster.", "isCorrect": false, "rationale": "Oiling/greasing does not involve chemical energy conversion for movement; its role is mechanical."}], "id": "q05"}, {"question": "The text mentions Archimedes' statement that he could move the entire world if he had a lever long enough and a place to stand. This statement highlights his profound understanding of which principle?", "options": [{"text": "The conservation of energy in all mechanical systems.", "isCorrect": false, "rationale": "While Archimedes understood mechanics, his quote specifically addresses the power of the lever and the force/distance trade-off, not general energy conservation."}, {"text": "The ability of a simple machine, like a lever, to multiply force dramatically by trading it for distance.", "isCorrect": true, "rationale": "The text notes that Archimedes 'understood that a longer lever arm means less force is needed,' which is the core principle of force multiplication through distance in a lever, making his statement about moving the world a theoretical extreme of this concept."}, {"text": "The importance of friction in preventing objects from moving too easily.", "isCorrect": false, "rationale": "His statement is about overcoming immense resistance, not about the role of friction in preventing movement."}, {"text": "The concept that work can be created if enough force is applied.", "isCorrect": false, "rationale": "This contradicts the fundamental principle that work cannot be created, only changed in how it is done."}], "id": "q06"}, {"question": "What was the primary function of the Archimedes screw when it was originally invented, as described in the text?", "options": [{"text": "To generate rotational energy for mills and factories.", "isCorrect": false, "rationale": "The text does not mention this purpose for the Archimedes screw; it was primarily for moving substances."}, {"text": "To lift water from a lower elevation to a higher one, for purposes like irrigation.", "isCorrect": true, "rationale": "The text states, 'Archimedes also invented the Archimedes screw, a device that lifts water from a low place to a high place by turning a large screw inside a tube. Farmers used it to move water from rivers to their fields.'"}, {"text": "To provide a more efficient method for constructing large stone buildings.", "isCorrect": false, "rationale": "The text does not associate the Archimedes screw with building construction."}, {"text": "To measure the depth of the ocean using its turning mechanism.", "isCorrect": false, "rationale": "This is not mentioned as a function of the Archimedes screw."}], "id": "q07"}, {"question": "Imagine you are analyzing a can opener. The text states it includes a wedge (cutting blade), a lever (handle), a wheel and axle (turning knob), and a gear. If the turning knob (wheel and axle with a gear) were somehow removed, what function would the can opener lose?", "options": [{"text": "The ability to cut the can's lid.", "isCorrect": false, "rationale": "The cutting blade is identified as a wedge, which would still be present. The turning knob (wheel and axle, gear) primarily aids in moving the cutting blade around the can, not the initial cut."}, {"text": "The mechanical advantage provided by the squeezing handle.", "isCorrect": false, "rationale": "The handle operates as a separate lever, and its function would not be directly lost by removing the turning knob."}, {"text": "The mechanism that allows the cutting blade to advance around the rim of the can.", "isCorrect": true, "rationale": "The turning knob, described as a wheel and axle with a gear, is responsible for engaging with the can's rim and advancing the cutting mechanism around it. Without it, the can opener cannot effectively traverse the can."}, {"text": "The leverage needed to open the can with less effort.", "isCorrect": false, "rationale": "The leverage often comes from the handle you squeeze (a lever), which is distinct from the turning knob's function."}], "id": "q08"}, {"question": "The 'teachernote' warns against a common error: students thinking machines 'save' work or 'create' energy. Why is it important to reinforce that machines only change how work is done, and not the total work or energy?", "options": [{"text": "Because it explains why machines always generate excess heat, proving energy is lost.", "isCorrect": false, "rationale": "While machines do generate heat due to friction (energy transformation), the core reason for the warning is to correct the misunderstanding that work/energy can be 'saved' or 'created,' which violates the conservation of energy principle."}, {"text": "To ensure students understand the fundamental law of conservation of energy, which states energy cannot be created or destroyed.", "isCorrect": true, "rationale": "The text explicitly states, 'Remember from Unit 14 that energy cannot be created or destroyed — it only changes form. Simple machines follow the same rule.' This directly addresses the conservation of energy."}, {"text": "To prepare students for calculating complex mechanical advantage formulas.", "isCorrect": false, "rationale": "The teachernote specifically states, 'At this level, students do not need to calculate mechanical advantage.' The focus is conceptual understanding."}, {"text": "To emphasize that machines are primarily used for entertainment rather than practical tasks.", "isCorrect": false, "rationale": "This contradicts the entire context of the section, which discusses the practical utility of machines for everyday tasks."}], "id": "q09"}, {"question": "Considering the 'Big Idea' and the nature of simple and compound machines, what is the most profound reason a bicycle is considered a 'great invention' (as posed in the 'thinkaboutit' section)?", "options": [{"text": "It is made of only very lightweight materials, making it easy to carry.", "isCorrect": false, "rationale": "While weight is a factor in design, the greatness of a bicycle, as a machine, primarily stems from its mechanical efficiency and function, not just its material composition."}, {"text": "It demonstrates how multiple simple machines can be combined to effectively transform human effort (force over distance) into efficient, directed motion.", "isCorrect": true, "rationale": "A bicycle is a quintessential compound machine that uses various simple machines (levers, wheels/axles, pulleys/gears, screws) to take a relatively small, repeated human input of force over a distance (pedaling) and convert it into much faster and more efficient travel, embodying the 'Big Trade-Off' and the power of compound machines."}, {"text": "It proves that some machines can create energy, allowing humans to travel faster than their own physical limits.", "isCorrect": false, "rationale": "This contradicts the core principle that machines do not create energy. Bicycles transform and apply energy efficiently, but do not create it."}, {"text": "It requires no maintenance or lubrication, making it an ideal frictionless machine.", "isCorrect": false, "rationale": "All real machines, including bicycles, experience friction and require maintenance/lubrication to perform optimally, as discussed in the text."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
