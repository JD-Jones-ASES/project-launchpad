    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 16, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a fundamental principle governing how muscles cause movement in the body?", "options": [{"text": "Muscles expand to push bones away from a joint.", "isCorrect": false, "rationale": "The text explicitly states, 'muscles can only pull — they cannot push.' Muscles contract, getting shorter, to produce movement, not expand."}, {"text": "Muscles contract, getting shorter, to pull bones closer to a joint.", "isCorrect": true, "rationale": "The text states, 'When a muscle contracts (gets shorter), it pulls on a bone and makes it move.' This is the core mechanism of muscle action described."}, {"text": "Muscles produce movement primarily by generating heat, which causes bones to shift.", "isCorrect": false, "rationale": "While muscle activity generates heat, its primary role in movement is contraction and pulling on bones, not using heat to shift them."}, {"text": "Muscles can both push and pull bones, depending on the specific type of muscle.", "isCorrect": false, "rationale": "The text clearly states, 'muscles can only pull — they cannot push,' emphasizing this as an important rule for all muscles."}], "id": "q01"}, {"question": "Which of the following actions is solely controlled by involuntary muscles, as defined in the text?", "options": [{"text": "Chewing food to break it down.", "isCorrect": false, "rationale": "Chewing involves muscles in the jaw and tongue that you consciously control, making them voluntary."}, {"text": "Lifting your arm to wave hello.", "isCorrect": false, "rationale": "Lifting your arm is a deliberate action, directly controlled by voluntary muscles in your arm and shoulder."}, {"text": "Pumping blood continuously through your body.", "isCorrect": true, "rationale": "The heart is explicitly identified as the 'hardest-working involuntary muscle' that 'beats about 100,000 times every single day, pumping blood to every part of you. It never takes a break!'"}, {"text": "Kicking a ball across a field.", "isCorrect": false, "rationale": "Kicking a ball is a conscious decision and action, executed by voluntary muscles in the legs."}], "id": "q02"}, {"question": "The overall purpose of the digestive system, as described in the text, is best summarized as:", "options": [{"text": "To produce muscle movement for the body's physical activities.", "isCorrect": false, "rationale": "Producing muscle movement is the function of the muscular system, not the digestive system."}, {"text": "To break down food into usable nutrients that the body can use for energy, growth, and repair.", "isCorrect": true, "rationale": "The text states, 'The digestive system breaks food down into tiny pieces that your body can use for energy, growth, and repair.' This is its primary function."}, {"text": "To filter waste products from the blood and maintain fluid balance.", "isCorrect": false, "rationale": "Filtering waste from blood is primarily the function of the excretory system (kidneys), not the digestive system."}, {"text": "To circulate blood and oxygen throughout the body to all cells.", "isCorrect": false, "rationale": "Circulating blood and oxygen is the role of the circulatory system, not the digestive system."}], "id": "q03"}, {"question": "Beyond the mechanical action of teeth, what significant chemical digestion process begins in the mouth?", "options": [{"text": "Proteins are broken down into amino acids by gastric enzymes.", "isCorrect": false, "rationale": "Protein digestion primarily begins in the stomach with digestive juices, not in the mouth."}, {"text": "Fats are emulsified by bile to prepare for breakdown.", "isCorrect": false, "rationale": "Fat emulsification by bile occurs in the small intestine, not the mouth."}, {"text": "Starches are broken down into sugars by enzymes in saliva.", "isCorrect": true, "rationale": "The text explains, 'Your tongue mixes the food with saliva (spit), which begins to break down starches. Try chewing a plain cracker... it starts to taste sweet! That is saliva breaking starch into sugar.'"}, {"text": "Water is absorbed from food particles into the bloodstream.", "isCorrect": false, "rationale": "Water absorption from food occurs mainly in the large intestine."}], "id": "q04"}, {"question": "Astronauts can eat upside down in space. This is primarily due to the action of which digestive organ?", "options": [{"text": "The stomach, which has strong suction capabilities that pull food down.", "isCorrect": false, "rationale": "The stomach churns food but does not use suction to move it from the esophagus. The ability to eat upside down relies on the muscular action of the esophagus."}, {"text": "The mouth, which can forcefully propel food in any direction.", "isCorrect": false, "rationale": "While the tongue helps push food to be swallowed, the primary force for moving food through the esophagus against gravity comes from esophageal muscles, not the mouth itself."}, {"text": "The esophagus, which uses rhythmic muscular contractions to squeeze food downward.", "isCorrect": true, "rationale": "The text states, 'Muscles in the esophagus squeeze the food downward, like squeezing toothpaste out of a tube. This squeezing is so strong that astronauts can eat upside down in space!'"}, {"text": "The small intestine, where gravity is not needed for nutrient absorption.", "isCorrect": false, "rationale": "The small intestine's function of nutrient absorption is not directly related to the initial movement of food during swallowing in the esophagus."}], "id": "q05"}, {"question": "Despite its name, the small intestine is where the 'real magic happens' in digestion. This refers to its primary role in:", "options": [{"text": "Storing large quantities of undigested food for extended periods before elimination.", "isCorrect": false, "rationale": "The stomach performs temporary storage and initial breakdown, but the small intestine's 'magic' is not storage."}, {"text": "Mechanically churning food into a thick, soupy mixture.", "isCorrect": false, "rationale": "The mechanical churning of food into a soupy mixture is primarily the function of the stomach."}, {"text": "Absorbing nutrients from the digested food into the bloodstream.", "isCorrect": true, "rationale": "The text clearly states regarding the small intestine, 'This is where the real magic happens: nutrients from your food pass through the walls of the small intestine and into your blood.'"}, {"text": "Absorbing water from leftover material to form solid waste.", "isCorrect": false, "rationale": "Absorbing water from leftover material is the primary function of the large intestine."}], "id": "q06"}, {"question": "When you straighten your arm after bending it, what is the coordinated action of the biceps and triceps muscles?", "options": [{"text": "Both the biceps and triceps contract simultaneously to provide strength.", "isCorrect": false, "rationale": "Muscles work in pairs because they can only pull; if both contracted, the arm would not straighten effectively or smoothly. One must relax while the other contracts."}, {"text": "The biceps contracts while the triceps relaxes.", "isCorrect": false, "rationale": "This describes the action of bending the arm, where the biceps pulls the forearm up. To straighten, the opposite action is needed."}, {"text": "The triceps contracts while the biceps relaxes.", "isCorrect": true, "rationale": "The text explains, 'When you straighten your arm, the triceps contracts and the biceps relaxes. The two muscles take turns!'"}, {"text": "Both muscles relax, relying on gravity to straighten the arm.", "isCorrect": false, "rationale": "Straightening the arm is an active movement requiring muscle contraction (of the triceps), not just relaxation and gravity."}], "id": "q07"}, {"question": "Which sequence accurately represents the path food takes through the primary organs of the digestive system, as described in the text?", "options": [{"text": "Mouth → Stomach → Esophagus → Small Intestine → Large Intestine.", "isCorrect": false, "rationale": "The esophagus comes before the stomach in the digestive path."}, {"text": "Mouth → Esophagus → Stomach → Small Intestine → Large Intestine.", "isCorrect": true, "rationale": "This sequence correctly follows the 'path food follows' as enumerated in the text: Mouth, Esophagus, Stomach, Small intestine, Large intestine."}, {"text": "Mouth → Esophagus → Large Intestine → Small Intestine → Stomach.", "isCorrect": false, "rationale": "This sequence is incorrect as the large intestine is near the end, and the stomach comes much earlier."}, {"text": "Mouth → Small Intestine → Stomach → Large Intestine → Esophagus.", "isCorrect": false, "rationale": "This sequence is highly incorrect, mixing up the order of several organs, particularly the small intestine and esophagus."}], "id": "q08"}, {"question": "A student claims that when they push a heavy door open, their arm muscles are 'pushing' the door directly. Based on the textbook's explanation and the 'Common Question' in the teacher's note, what is the most accurate correction to this statement?", "options": [{"text": "All muscles in the arm contract simultaneously to create a pushing force.", "isCorrect": false, "rationale": "Muscles work in pairs with one contracting while the other relaxes; they do not all contract simultaneously for a single action, and muscles cannot 'push' themselves."}, {"text": "The triceps muscle actually contracts and pulls the forearm straight, which then pushes against the door.", "isCorrect": true, "rationale": "The 'teachernote' explicitly addresses this common question: 'Explain that pushing a door uses the triceps muscle, which pulls the forearm straight, which then pushes against the door. The muscle itself is still pulling on the bone.'"}, {"text": "The pushing action is primarily due to the momentum of the body, not direct muscle effort.", "isCorrect": false, "rationale": "While momentum can assist, the initial and sustained force for pushing comes from muscle contraction, not solely momentum."}, {"text": "Pushing a door is an exception to the rule where muscles temporarily gain the ability to push.", "isCorrect": false, "rationale": "The text states the 'important rule about muscles: muscles can only pull — they cannot push' as a fundamental principle, with no exceptions mentioned for pushing actions."}], "id": "q09"}, {"question": "If a person finishes eating lunch at 12:00 PM on Tuesday, based on the provided information, what is the *earliest* and *latest* a significant portion of the undigested waste from that meal would typically be ready to leave their body?", "options": [{"text": "Wednesday 12:00 AM to Thursday 12:00 PM.", "isCorrect": false, "rationale": "This range starts too early (12 hours) and ends too early (48 hours), not matching the 24-72 hour window."}, {"text": "Wednesday 12:00 PM to Friday 12:00 PM.", "isCorrect": true, "rationale": "The text states the whole journey takes 'about 24 to 72 hours.' Starting from Tuesday 12:00 PM, 24 hours later is Wednesday 12:00 PM, and 72 hours later is Friday 12:00 PM. This range perfectly aligns with the given timeline."}, {"text": "Thursday 12:00 AM to Saturday 12:00 AM.", "isCorrect": false, "rationale": "This range starts too late (36 hours) and ends too late (60 hours) compared to the 'earliest' and 'latest' within the 24-72 hour window."}, {"text": "Wednesday 6:00 AM to Thursday 6:00 PM.", "isCorrect": false, "rationale": "This range starts too early (18 hours) and ends too early (54 hours), not fitting the specified 24-72 hour duration."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
