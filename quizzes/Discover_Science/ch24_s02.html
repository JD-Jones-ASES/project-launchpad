    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 24, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental requirement for us to see non-luminous objects like a chair in a room?", "options": [{"text": "Our eyes must emit light to scan the object, similar to a flashlight.", "isCorrect": false, "rationale": "The text explicitly states this is a common misconception, and that our eyes do not emit light. If they did, we could see in total darkness."}, {"text": "An external light source must illuminate the object, and its reflected light must enter our eyes.", "isCorrect": true, "rationale": "The text explains step-by-step that a light source sends out rays, which reflect off objects and then enter our eyes, allowing our brain to create an image. Without a light source, nothing can be seen."}, {"text": "The object itself must produce its own light, even if it's faint.", "isCorrect": false, "rationale": "Most objects do not make their own light; only luminous sources like the Sun or a light bulb do. We see most things because they reflect light."}, {"text": "Our brain autonomously creates an image once the eye registers the object's presence, regardless of light.", "isCorrect": false, "rationale": "While the brain processes the image, it requires light to enter the eyes first. Without light, no message is sent to the brain for visual processing."}], "id": "q01"}, {"question": "A student argues that our eyes act like flashlights, sending out beams of light to 'scan' objects. Based on the text, which statement provides the most direct and practical refutation of this claim?", "options": [{"text": "This idea dates back to ancient Greece and was proven wrong about 1,000 years ago by Ibn al-Haytham.", "isCorrect": false, "rationale": "While historically accurate, this rationale doesn't explain *why* the idea is wrong in a practical sense based on observation, which is what the text's 'Misconception Alert' focuses on for students."}, {"text": "If our eyes emitted light, we would be able to see in a completely dark room, which is not possible.", "isCorrect": true, "rationale": "The 'Misconception Alert' directly uses this reasoning to help students understand why the eye does not send out light. The inability to see in total darkness proves light must come from an external source."}, {"text": "Light rays always travel in straight lines and cannot be 'scanned' by the eye.", "isCorrect": false, "rationale": "Light rays do travel in straight lines, but this statement doesn't directly address the misconception about the *eye* emitting light. The issue isn't how light travels, but its source."}, {"text": "Only objects like the Sun or a lamp produce their own light, not living organisms.", "isCorrect": false, "rationale": "This statement is true for most non-bioluminescent organisms, but it's a general fact about light sources rather than a direct, observable refutation specific to the eye's function as presented in the 'Misconception Alert'."}], "id": "q02"}, {"question": "When white light passes through a prism, what phenomenon causes it to separate into a spectrum of colors?", "options": [{"text": "Absorption, where the prism selectively soaks up certain colors of light and only lets others pass through.", "isCorrect": false, "rationale": "Absorption is when an object takes in light energy, but a prism's function in creating a spectrum is not primarily through selective absorption; it's about bending light."}, {"text": "Reflection, where different colors of light bounce off the prism's surfaces at varying angles.", "isCorrect": false, "rationale": "While reflection is involved in how we see objects, the separation of white light into a spectrum by a prism is not due to reflection but rather a different process."}, {"text": "Refraction, where each color of light bends by a slightly different amount as it passes through the prism.", "isCorrect": true, "rationale": "The text clearly states that 'when white light enters a prism, each color bends by a slightly different amount,' creating the spectrum. This bending of light as it passes from one medium to another is called refraction."}, {"text": "Emission, where the prism itself generates new colors from the white light it receives.", "isCorrect": false, "rationale": "The prism does not generate new colors; it separates the existing colors that are already present within white light."}], "id": "q03"}, {"question": "Which of the following accurately describes the behavior of colors when white light forms a spectrum, according to the text?", "options": [{"text": "Violet light bends the least, appearing at one end of the spectrum, while red light bends the most.", "isCorrect": false, "rationale": "The text states the opposite: 'Red light bends the least, and violet light bends the most.'"}, {"text": "Red light bends the least, followed by orange, yellow, green, blue, indigo, and finally violet, which bends the most.", "isCorrect": true, "rationale": "The text explicitly states: 'Red light bends the least, and violet light bends the most.' It also provides the order of colors as ROY G. BIV, starting with Red and ending with Violet."}, {"text": "The colors appear in a random order depending on the light source and the prism's material.", "isCorrect": false, "rationale": "The colors in a spectrum always appear in a specific, predictable order (ROY G. BIV) regardless of the specific prism or light source (as long as it's white light)."}, {"text": "Green light is central, bending an average amount, with red and violet light bending equally in opposite directions.", "isCorrect": false, "rationale": "The bending is not symmetrical, and red and violet bend by different amounts, not equally in opposite directions."}], "id": "q04"}, {"question": "A red apple looks red because when white light strikes it, the apple primarily:", "options": [{"text": "Emits red light and absorbs all other colors.", "isCorrect": false, "rationale": "Objects like an apple do not emit their own light unless they are luminous. They interact with external light."}, {"text": "Reflects red light back to your eyes and absorbs most of the other colors of the spectrum.", "isCorrect": true, "rationale": "The text clearly explains that 'when white light hits a red apple, the apple absorbs orange, yellow, green, blue, indigo, and violet light. It reflects only red light back to your eyes. So you see red!'"}, {"text": "Absorbs only red light and reflects all other colors, making red the dominant perception.", "isCorrect": false, "rationale": "If an apple absorbed only red light and reflected all other colors, it would appear a mix of the reflected colors (e.g., cyan/magenta-ish), not red."}, {"text": "Scatters all colors equally, but our eyes are most sensitive to the red end of the spectrum.", "isCorrect": false, "rationale": "The appearance of color is due to selective reflection and absorption, not just scattering or eye sensitivity to a particular color."}], "id": "q05"}, {"question": "On a hot, sunny day, you would likely feel cooler wearing a white shirt than a black shirt. Why is this, according to the principles discussed in the text?", "options": [{"text": "A white shirt absorbs all colors of light, converting them into heat, which a black shirt does not.", "isCorrect": false, "rationale": "A white shirt reflects all colors, while a black shirt absorbs all colors. The premise of this option is incorrect."}, {"text": "A white shirt reflects all colors of light, thereby absorbing less light energy and converting less into heat.", "isCorrect": true, "rationale": "The text explains that a 'white shirt reflects all colors, so it looks white' and that 'when an object absorbs light, it absorbs energy. That is why dark-colored objects feel warmer in the sun than light-colored objects.'"}, {"text": "A white shirt is typically made of materials that naturally stay cooler, regardless of its color.", "isCorrect": false, "rationale": "While material can play a role, the text specifically attributes the temperature difference to the shirt's color and its interaction with light energy (absorption/reflection), not just the material type."}, {"text": "A white shirt actively emits more heat away from the wearer, causing a cooling effect.", "isCorrect": false, "rationale": "White objects reflect incoming light, which means less energy is absorbed to convert to heat. They don't actively 'emit' more heat in this context to cool the wearer compared to a black shirt."}], "id": "q06"}, {"question": "The text states that 'Light is a form of energy!' Which piece of evidence from the section best supports this claim?", "options": [{"text": "We see objects because light bounces off them and enters our eyes.", "isCorrect": false, "rationale": "This describes the mechanism of sight, not necessarily light's property as energy, though energy is involved in all light interactions."}, {"text": "Sunlight travels 150 million kilometers to Earth, warms our planet, and powers plants through photosynthesis.", "isCorrect": true, "rationale": "The text explicitly connects these actions ('warms our planet, powers plants') to light being a form of energy, as energy is the 'ability to make things happen.'"}, {"text": "A prism can separate white light into a spectrum of different colors.", "isCorrect": false, "rationale": "This demonstrates light's composition and behavior, but doesn't directly explain its nature as energy."}, {"text": "Dark-colored objects appear black because they absorb all colors of light.", "isCorrect": false, "rationale": "This explains color perception and absorption, which is related to energy, but the direct evidence for light *being* energy is its capacity to perform work (warmth, photosynthesis)."}], "id": "q07"}, {"question": "Consider a black backpack and a white shirt left under direct sunlight. Based on the concept that 'Light Is a Form of Energy,' what would you predict about their temperatures after a while, and why?", "options": [{"text": "The white shirt would feel warmer because it reflects more light directly back into the air.", "isCorrect": false, "rationale": "Reflection means less absorption. If it reflects more, it absorbs less energy and would therefore be cooler, not warmer."}, {"text": "The black backpack would feel warmer because it absorbs more light energy and converts it into heat.", "isCorrect": true, "rationale": "The text states, 'When an object absorbs light, it absorbs energy. That is why dark-colored objects feel warmer in the sun than light-colored objects. The dark object absorbs more light energy and converts it to heat.'"}, {"text": "Both the black backpack and the white shirt would feel the same temperature because sunlight warms everything equally.", "isCorrect": false, "rationale": "This ignores the differential absorption and reflection properties of different colors, which directly impact how much energy is converted to heat."}, {"text": "The black backpack would feel cooler because black objects radiate heat more efficiently.", "isCorrect": false, "rationale": "While black objects can radiate heat efficiently, their primary interaction with incoming sunlight is absorption, leading to heating, as explained in the text."}], "id": "q08"}, {"question": "How is a rainbow formed in the sky when sunlight interacts with water droplets?", "options": [{"text": "The water droplets reflect all colors of light equally back to our eyes, creating a shimmering band.", "isCorrect": false, "rationale": "While reflection is involved, it's not simply reflecting 'all colors equally' that creates the *separation* into a spectrum."}, {"text": "Each tiny water droplet acts like a prism, separating sunlight into its different colors through refraction, and then reflecting these colors back toward your eyes.", "isCorrect": true, "rationale": "The text explicitly states: 'Tiny water droplets in the air act like millions of tiny prisms. Sunlight enters each droplet, separates into colors, and bounces back toward your eyes.'"}, {"text": "The water droplets absorb certain colors of light and only allow others to pass through, which then combine to form a rainbow.", "isCorrect": false, "rationale": "Absorption is not the primary mechanism for the formation of a rainbow's spectrum. It's the bending (refraction) and internal reflection that causes the effect."}, {"text": "The water droplets emit their own colored light, which is then amplified by the sunlight.", "isCorrect": false, "rationale": "Water droplets do not emit their own light; they interact with existing sunlight to produce the rainbow effect."}], "id": "q09"}, {"question": "If you view a red apple through a blue colored filter, what would you most likely observe, and why?", "options": [{"text": "The apple would still appear red because it reflects red light, which is its inherent color.", "isCorrect": false, "rationale": "The filter changes how light interacts with the apple before reaching your eye. The reflected red light would be blocked."}, {"text": "The apple would appear blue because the filter adds blue light to the apple's surface.", "isCorrect": false, "rationale": "Filters generally work by subtracting or blocking colors, not adding them. A blue filter primarily allows blue light to pass through."}, {"text": "The apple would appear nearly black because the blue filter blocks the red light that the apple reflects.", "isCorrect": true, "rationale": "As described in the 'Extension Idea,' a red apple reflects red light. A blue filter allows blue light to pass but blocks other colors, including red. Therefore, if no red light can pass through the filter to your eye, and the apple isn't reflecting blue, it will appear dark or nearly black."}, {"text": "The apple would appear white because the blue filter allows all colors to pass through, creating a neutral background.", "isCorrect": false, "rationale": "A blue filter does not allow all colors to pass through; it primarily allows blue light to pass and blocks most other colors."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
