<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 25, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A forest experiences a major storm, leading to many fallen trees and dead animals. Which organisms are primarily responsible for breaking down this dead material and returning essential nutrients to the soil, ensuring future plant growth?", "options": [{"text": "Producers", "isCorrect": false, "rationale": "Producers are living things that make their own food, typically through photosynthesis, not break down dead material."}, {"text": "Decomposers", "isCorrect": true, "rationale": "Decomposers are organisms that break down dead material and return nutrients to the soil, which is their essential role in an ecosystem following events like a storm."}, {"text": "Consumers", "isCorrect": false, "rationale": "Consumers get energy by eating other organisms, but they do not primarily break down dead material to return nutrients to the soil in the way decomposers do."}, {"text": "Herbivores", "isCorrect": false, "rationale": "Herbivores are a specific type of consumer that eats only plants; they do not break down dead animals or trees."}], "id": "q01"}, {"question": "A specific species of bird builds its nest in pine trees, eats only particular insects found on the bark, and is active during dusk. Which term best describes the bird's *role* in its environment, including its feeding habits and activity patterns?", "options": [{"text": "Habitat", "isCorrect": false, "rationale": "A habitat is the place where an organism lives (e.g., the pine trees), not its role or job within that place."}, {"text": "Niche", "isCorrect": true, "rationale": "A niche describes an organism's role or job in its ecosystem, encompassing its feeding habits, activity, and how it interacts with its environment."}, {"text": "Ecosystem", "isCorrect": false, "rationale": "An ecosystem refers to all the living and nonliving things in an area interacting with each other, not the specific role of a single organism."}, {"text": "Biotic factor", "isCorrect": false, "rationale": "A biotic factor is simply a living part of an ecosystem. While the bird is a biotic factor, this term does not describe its specific role or job."}], "id": "q02"}, {"question": "Over many years, strong winds continuously blow sand against a large rock formation, slowly chipping away small pieces of rock. These loosened rock fragments are then carried away by a flowing river to a new location downstream. Which two processes are described, in order, by this scenario?", "options": [{"text": "Erosion, Weathering", "isCorrect": false, "rationale": "Weathering is the process of breaking rocks, and erosion is the movement of those broken pieces. The scenario describes breaking first, then moving."}, {"text": "Weathering, Erosion", "isCorrect": true, "rationale": "The wind chipping away at the rock is an example of weathering (breaking rocks into smaller pieces), and the river carrying the fragments away is an example of erosion (movement of soil and rock from one place to another)."}, {"text": "Humus formation, Soil compaction", "isCorrect": false, "rationale": "Humus formation and soil compaction are processes related to soil composition, not the breaking down and movement of rock formations."}, {"text": "Neutralization, Absorption", "isCorrect": false, "rationale": "Neutralization is a chemical reaction involving acids and bases, and absorption is the taking in of light or energy; these terms are unrelated to the physical processes described."}], "id": "q03"}, {"question": "A farmer wants to plant a garden that will support a wide variety of vegetables and flowers. Based on the characteristics described in the text, which type of soil is specifically identified as ideal for growing plants due to its balanced mix of sand, silt, and clay?", "options": [{"text": "Subsoil", "isCorrect": false, "rationale": "Subsoil is the layer below topsoil, typically lighter in color with more rock fragments and less organic matter, making it less ideal for plant growth than other types."}, {"text": "Bedrock", "isCorrect": false, "rationale": "Bedrock is the solid layer of rock beneath all the soil layers and is not suitable for growing plants."}, {"text": "Loam", "isCorrect": true, "rationale": "Loam is defined as a type of soil with a balanced mix of sand, silt, and clay, making it ideal for growing plants."}, {"text": "Topsoil", "isCorrect": false, "rationale": "Topsoil is the top layer of soil, rich in humus and nutrients, where most plants grow. While good for plants, 'loam' specifically describes the ideal *composition* (balanced mix) for plant growth."}], "id": "q04"}, {"question": "You are testing a new cleaning solution. When you touch it, it feels slippery, and when you test its pH, you expect the reading to be:", "options": [{"text": "Exactly 7", "isCorrect": false, "rationale": "A pH of 7 is neutral; neutral substances, like pure water, do not typically feel slippery."}, {"text": "Below 7", "isCorrect": false, "rationale": "A pH below 7 indicates an acid, which tastes sour but does not typically feel slippery."}, {"text": "Above 7", "isCorrect": true, "rationale": "The text states that a base has a pH above 7 and feels slippery. Therefore, a slippery cleaning solution would have a pH above 7."}, {"text": "Variable, depending on the temperature", "isCorrect": false, "rationale": "While temperature can slightly influence pH, the primary characteristic of feeling slippery directly points to a substance being a base, which has a pH above 7, regardless of minor temperature variations."}], "id": "q05"}, {"question": "If you accidentally spill a strong acid in the lab, a common safety procedure is to carefully add a base to it. What is the primary purpose of this action?", "options": [{"text": "To make the solution more toxic", "isCorrect": false, "rationale": "The purpose of adding a base to an acid is to reduce its harmful properties, not to increase toxicity."}, {"text": "To cause a corrosive reaction", "isCorrect": false, "rationale": "Both strong acids and bases can be corrosive. The goal of neutralization is to lessen corrosiveness, not to cause it."}, {"text": "To produce a substance closer to neutral, reducing its acidity", "isCorrect": true, "rationale": "The process described is neutralization, where an acid and a base combine to produce a substance closer to neutral, thereby reducing the extreme acidity (or basicity) and making it safer."}, {"text": "To separate the acid into its component chemicals", "isCorrect": false, "rationale": "Neutralization is a reaction that combines substances, not separates them into components."}], "id": "q06"}, {"question": "When you look into a still pond, you see an image of the trees above the water. However, if you stick a spoon into the water, it appears bent or broken at the water's surface. What two light phenomena are demonstrated by these observations, respectively?", "options": [{"text": "Refraction, Reflection", "isCorrect": false, "rationale": "Seeing an image in the pond is reflection, and the bent spoon is refraction; this option has the order reversed."}, {"text": "Reflection, Refraction", "isCorrect": true, "rationale": "Seeing an image in the pond is an example of reflection (the bouncing of light off a surface). The bent appearance of the spoon in water is an example of refraction (the bending of light as it passes from one material to another)."}, {"text": "Absorption, Spectrum", "isCorrect": false, "rationale": "Absorption is taking in light, and a spectrum is the band of colors when light is separated; these do not describe the observed phenomena."}, {"text": "Vibration, Pitch", "isCorrect": false, "rationale": "Vibration and pitch are concepts related to sound, not light phenomena."}], "id": "q07"}, {"question": "A musician wants to change the characteristics of the sound produced by their guitar. If they pluck a string more forcefully, and then later tighten the string significantly before plucking it again, how would the sound change in terms of volume and pitch, respectively?", "options": [{"text": "Louder, Lower pitch", "isCorrect": false, "rationale": "Plucking more forcefully increases volume (louder), but tightening a string increases the speed of vibrations, leading to a higher pitch, not lower."}, {"text": "Softer, Higher pitch", "isCorrect": false, "rationale": "Plucking more forcefully makes the sound louder, not softer. Tightening the string does result in a higher pitch."}, {"text": "Louder, Higher pitch", "isCorrect": true, "rationale": "Plucking a string more forcefully increases the size of vibrations, resulting in a louder sound (volume). Tightening a string increases the speed of vibrations, resulting in a higher pitch."}, {"text": "Softer, Lower pitch", "isCorrect": false, "rationale": "This option is incorrect for both volume (should be louder) and pitch (should be higher)."}], "id": "q08"}, {"question": "In a desert ecosystem, the amount of rainfall directly impacts the growth of cacti and other succulents, which in turn affects the animals that feed on them. Which term best describes rainfall in this context, and how does it relate to the living organisms?", "options": [{"text": "Biotic factor; it is a living component of the ecosystem.", "isCorrect": false, "rationale": "Rainfall (water) is a nonliving component of an ecosystem, making it an abiotic factor, not a biotic factor."}, {"text": "Producer; it helps plants make food.", "isCorrect": false, "rationale": "Rainfall is not a living organism that produces its own food; it is a nonliving resource essential for producers."}, {"text": "Abiotic factor; it is a nonliving component influencing biotic factors.", "isCorrect": true, "rationale": "Rainfall is a nonliving part of the ecosystem (abiotic factor), and its availability directly influences the growth of living organisms (biotic factors like plants and animals)."}, {"text": "Niche; it defines the role of water in the ecosystem.", "isCorrect": false, "rationale": "A niche describes an organism's role or job, not the role of a nonliving component like rainfall."}], "id": "q09"}, {"question": "Imagine a scientist is using a prism to analyze a beam of light. They observe a full spectrum of colors. If they were to place a black velvet cloth in the path of the *separated* red light, what would happen to that specific color of light?", "options": [{"text": "The red light would reflect off the cloth, appearing brighter.", "isCorrect": false, "rationale": "Black objects are known to absorb light rather than reflect it, meaning the light would not appear brighter due to reflection."}, {"text": "The red light would refract through the cloth, changing direction.", "isCorrect": false, "rationale": "Refraction occurs when light passes through a transparent material and bends. A black velvet cloth is opaque and will not refract light."}, {"text": "The red light would be absorbed by the cloth, making it appear dark.", "isCorrect": true, "rationale": "Black objects absorb light rather than reflecting or transmitting it. Therefore, the red light would be absorbed by the black velvet cloth, making that area appear dark as the light energy is taken in."}, {"text": "The red light would cause the cloth to vibrate, producing a sound.", "isCorrect": false, "rationale": "Light energy is not directly converted into sound vibrations in this manner. Sound is caused by vibrations, but light's interaction with a cloth would primarily be absorption or reflection."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
