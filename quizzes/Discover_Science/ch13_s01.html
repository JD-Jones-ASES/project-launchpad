<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 13, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the most fundamental characteristic of an atom?", "options": [{"text": "It can be seen with a powerful microscope.", "isCorrect": false, "rationale": "The text explicitly states, 'You cannot even see them with a regular magnifying glass or a classroom microscope,' indicating atoms are too small to be viewed even with advanced microscopes."}, {"text": "It is the smallest particle of matter that retains the properties of that kind of matter.", "isCorrect": true, "rationale": "The definition provided in the text states, 'Atom the smallest particle of matter that still has the properties of that kind of matter. Atoms are the building blocks of everything.'"}, {"text": "It is the largest individual piece of matter in the universe.", "isCorrect": false, "rationale": "The text emphasizes that atoms are 'incredibly small' and 'tiniest pieces of matter,' directly contradicting this statement."}, {"text": "It is a form of energy, rather than physical matter.", "isCorrect": false, "rationale": "The text refers to atoms as 'pieces of matter' and 'building blocks of everything,' confirming they are material particles, not energy."}]}, {"question": "The text uses the analogy of an orange blown up to the size of Earth, with its atoms becoming the size of blueberries. What concept does this analogy primarily illustrate?", "options": [{"text": "The different kinds of atoms that can be found within an orange.", "isCorrect": false, "rationale": "While an orange contains different atoms, the analogy's focus is on scaling down size, not enumerating types of atoms."}, {"text": "The incredibly small scale of individual atoms.", "isCorrect": true, "rationale": "The purpose of this analogy, as the text states, is to 'picture just how small atoms are,' emphasizing their minuscule size relative to everyday objects."}, {"text": "How easily atoms can be rearranged to form new substances.", "isCorrect": false, "rationale": "This analogy does not discuss the rearrangement or combination of atoms, but rather their absolute size."}, {"text": "The constant movement of atoms within a solid object.", "isCorrect": false, "rationale": "The analogy is about size comparison, not the motion or state of matter of atoms."}]}, {"question": "Based on the information provided in the section, which of the following statements is most accurate regarding the composition of objects?", "options": [{"text": "Only living things, such as humans and animals, are made of atoms.", "isCorrect": false, "rationale": "The text explicitly states, 'Everything around you is made of atoms — your desk, the chair you sit on, the book in your hands, the air you breathe, and even you!'"}, {"text": "The air we breathe is made of atoms, but solid objects like desks are not.", "isCorrect": false, "rationale": "The text lists both 'the air you breathe' and 'your desk' as examples of things made of atoms, indicating both gases and solids are composed of them."}, {"text": "All matter, from the air we breathe to the desk we use, is composed of atoms.", "isCorrect": true, "rationale": "The section title 'Everything Is Made of Atoms' and the statement 'Everything around you is made of atoms' directly support this conclusion, encompassing all examples given."}, {"text": "Atoms are primarily found in liquids and gases, but not in solids.", "isCorrect": false, "rationale": "The text specifically mentions that atoms are in solids, liquids, and gases, and even discusses atom movement 'Even in a solid — like your desk.'"}]}, {"question": "The text states that 'The atoms in a piece of iron are different from the atoms in a piece of gold.' What does this imply about different kinds of atoms?", "options": [{"text": "They are physically interchangeable, but chemically distinct.", "isCorrect": false, "rationale": "Different kinds of atoms are not interchangeable; they are fundamentally distinct entities with unique properties."}, {"text": "They each possess their own unique set of special properties.", "isCorrect": true, "rationale": "The text directly follows this statement by explaining, 'Each kind of atom has its own special properties,' which explains why iron atoms are different from gold atoms."}, {"text": "Only a few specific types of atoms are naturally found in the universe.", "isCorrect": false, "rationale": "The text mentions 'about 118 different kinds of atoms,' indicating a significant variety, not just 'a few specific types.'"}, {"text": "They are all identical except for their color.", "isCorrect": false, "rationale": "The text refers to 'special properties' which are much broader than just color and define the distinct nature of each atom type."}]}, {"question": "The 'thinkaboutit' section compares using 26 letter blocks to spell thousands of words to the approximately 118 kinds of atoms. What is the main point of this comparison?", "options": [{"text": "To suggest that atoms, like letters, are constantly moving and rearranging.", "isCorrect": false, "rationale": "The analogy focuses on the *combination* and *diversity* created, not the movement of the blocks or atoms."}, {"text": "To illustrate how a limited number of atom types can combine in different ways to create a vast diversity of substances.", "isCorrect": true, "rationale": "The text explicitly states, 'In a similar way, about 118 kinds of atoms combine in different ways to make millions of different substances,' which is the core message of the analogy."}, {"text": "To explain why atoms are so incredibly small and difficult to observe.", "isCorrect": false, "rationale": "The analogy is about the number of types and their combinatorial power, not their size or visibility."}, {"text": "To demonstrate that atoms can be broken down into even smaller particles, just like words can be broken into letters.", "isCorrect": false, "rationale": "The analogy is about building up (letters to words, atoms to substances), not breaking down atoms into smaller components."}]}, {"question": "If you examine a solid object like a block of ice at a very low temperature, what can you infer about the atoms within it based on the text?", "options": [{"text": "The atoms are completely motionless and frozen in place.", "isCorrect": false, "rationale": "The text states, 'Even in a solid — like your desk — the atoms are vibrating back and forth. They never stop moving!'"}, {"text": "The atoms are moving freely and spreading out, similar to a gas.", "isCorrect": false, "rationale": "This describes the behavior of atoms in a gas, not a solid, where atoms are 'packed close together and vibrate in place.'"}, {"text": "The atoms are vibrating in fixed positions, but are still in motion.", "isCorrect": true, "rationale": "The text explains that 'In a solid, atoms are packed close together and vibrate in place,' and 'They never stop moving!'"}, {"text": "The atoms are sliding past one another, similar to a liquid.", "isCorrect": false, "rationale": "This describes the behavior of atoms in a liquid, not a solid, where atoms maintain fixed relative positions while vibrating."}]}, {"question": "Considering the descriptions of atom movement in different states of matter, what is the primary distinction between atoms in a liquid and atoms in a gas?", "options": [{"text": "Liquid atoms are completely motionless, while gas atoms vibrate in fixed positions.", "isCorrect": false, "rationale": "Both liquid and gas atoms are in motion. Gas atoms do not vibrate in fixed positions; they zoom freely."}, {"text": "Liquid atoms slide past one another, whereas gas atoms zoom around freely and spread out.", "isCorrect": true, "rationale": "The text explicitly states, 'In a liquid, atoms slide past one another. In a gas, atoms zoom around freely and spread out,' highlighting this key distinction."}, {"text": "Gas atoms are packed close together, but liquid atoms are spread far apart.", "isCorrect": false, "rationale": "This is incorrect; gas atoms are spread far apart, while liquid atoms are still relatively close together compared to gases, but not packed as tightly as solids."}, {"text": "Both liquid and gas atoms vibrate in fixed positions.", "isCorrect": false, "rationale": "Vibrating in fixed positions is characteristic of solids, not liquids or gases."}]}, {"question": "Imagine you are observing a substance that is currently a solid. If you continuously add heat to this substance, eventually turning it into a liquid and then a gas, what change is happening at the atomic level?", "options": [{"text": "The atoms are becoming larger in size.", "isCorrect": false, "rationale": "The size of individual atoms does not change when a substance is heated; their movement and arrangement do."}, {"text": "The atoms are slowing down their movement.", "isCorrect": false, "rationale": "The text states, 'If you heat something up, the atoms move faster,' directly contradicting this option."}, {"text": "The atoms are increasing their speed and changing their arrangement/interaction.", "isCorrect": true, "rationale": "Heating causes atoms to 'move faster' which leads to the changes in arrangement characteristic of transitions from solid (vibrating in place) to liquid (sliding) to gas (zooming freely)."}, {"text": "The atoms are changing into different kinds of atoms.", "isCorrect": false, "rationale": "Heating causes a change in state of matter, not a change in the identity ('kind') of the atoms themselves. For example, heating water just changes it from liquid to steam, not into a different substance."}]}, {"question": "The 'Hands-On Tip' mentions that a tiny grain of salt contains about 1.2 quintillion atoms. What is the most likely reason the author included this specific detail?", "options": [{"text": "To suggest that individual atoms can be seen with a powerful magnifying glass.", "isCorrect": false, "rationale": "The text explicitly states that atoms 'cannot even see them with a regular magnifying glass or a classroom microscope,' making this option incorrect."}, {"text": "To provide an example of how atoms combine to form molecules.", "isCorrect": false, "rationale": "The focus of this statement is on the *number* of atoms, not their combination into molecules (which is mentioned as a future topic for students)."}, {"text": "To emphasize the astonishingly vast number of atoms even in seemingly small objects.", "isCorrect": true, "rationale": "The note's purpose is to 'impress the scale' by showing how many atoms are packed into something as small as a grain of salt, reinforcing the concept of atoms being incredibly tiny and numerous."}, {"text": "To highlight the difference in properties between salt atoms and water atoms.", "isCorrect": false, "rationale": "The statement focuses on the quantity of atoms in salt, not a comparison of properties between different types of atoms."}]}, {"question": "Which statement best encapsulates the main message of the section 'Everything Is Made of Atoms'?", "options": [{"text": "Atoms are complex structures that are difficult for scientists to study.", "isCorrect": false, "rationale": "While atoms are complex, the main message is about their fundamental role as building blocks and their universal presence, not the difficulty of scientific study."}, {"text": "The diversity of matter in the universe arises from the unique properties and arrangements of a relatively small number of atom types.", "isCorrect": true, "rationale": "This statement synthesizes the core concepts: atoms as building blocks, their diversity (118 kinds), their unique properties, and how their combinations ('combine in different ways') create everything."}, {"text": "The primary characteristic of atoms is their constant, unpredictable movement.", "isCorrect": false, "rationale": "Atom movement is an important characteristic discussed, but it's one aspect within the broader message of atoms being the universal building blocks of matter."}, {"text": "Atoms are primarily important because they can be broken down into even smaller particles.", "isCorrect": false, "rationale": "The text defines atoms as the 'tiniest pieces of matter' and 'building blocks,' not as particles meant to be broken down further within this context."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
