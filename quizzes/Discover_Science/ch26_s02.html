<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Science &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Discover_Science.html">&larr; Back to Discover Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Discover Science &mdash; Chapter 26, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is a defining characteristic of a mammal's life cycle as described in the text?", "options": [{"text": "Undergoing a major change in body form called metamorphosis.", "isCorrect": false, "rationale": "Metamorphosis is characteristic of animals like frogs and butterflies, not mammals, which exhibit gradual growth."}, {"text": "Being born alive and fed milk by the mother.", "isCorrect": true, "rationale": "The text states that mammals are 'born alive' and 'feed their babies milk,' making this a defining characteristic of their life cycle."}, {"text": "Hatching from jelly-coated eggs laid in water.", "isCorrect": false, "rationale": "This describes the beginning of a frog's life cycle, not a mammal's."}, {"text": "Forming a chrysalis to transform into an adult.", "isCorrect": false, "rationale": "The formation of a chrysalis is part of a butterfly's complete metamorphosis."}]}, {"question": "The text uses a kitten and a caterpillar to illustrate different types of life cycles. Which statement best describes the fundamental difference between their developmental paths?", "options": [{"text": "Kittens are born on land, while caterpillars develop underwater.", "isCorrect": false, "rationale": "While location can differ, the core distinction highlighted in the text is about the change in body form, not just habitat."}, {"text": "Kittens show gradual growth, whereas caterpillars undergo a complete metamorphosis.", "isCorrect": true, "rationale": "The text explicitly contrasts the kitten's appearance 'like a small version of an adult cat' with the caterpillar's transformation into a butterfly through 'complete metamorphosis.'"}, {"text": "Caterpillars feed their young milk, while kittens eat plant leaves.", "isCorrect": false, "rationale": "This statement contains factual inaccuracies regarding both animals' feeding habits and parental care."}, {"text": "Kittens breathe with gills, and caterpillars breathe with lungs.", "isCorrect": false, "rationale": "This describes the respiratory changes in a frog's life cycle and is incorrect for kittens and caterpillars."}]}, {"question": "A scientist observes a young amphibian that has recently grown hind legs, but still possesses a long tail and breathes through gills. Based on the text, what stage of the frog's life cycle is this amphibian in?", "options": [{"text": "Egg stage.", "isCorrect": false, "rationale": "The organism has already hatched and grown legs, so it is past the egg stage."}, {"text": "Early tadpole stage.", "isCorrect": false, "rationale": "An early tadpole has a tail and gills but 'no legs' yet, according to the text."}, {"text": "Tadpole with legs stage.", "isCorrect": true, "rationale": "The description matches the 'Tadpole with legs' stage, where the tadpole 'begins to grow back legs, then front legs. Its tail starts to shrink' and still breathes through gills."}, {"text": "Froglet stage.", "isCorrect": false, "rationale": "A froglet has 'all four legs and a short stub of a tail' and 'begins to breathe air with lungs instead of gills,' which doesn't match the description of gills and a long tail."}]}, {"question": "The transition from breathing with gills to breathing with lungs is a critical step in a frog's life cycle. What does this transformation primarily enable the frog to do?", "options": [{"text": "To grow a long, powerful tail for swimming.", "isCorrect": false, "rationale": "The tail shrinks during metamorphosis, and lung development is unrelated to tail growth."}, {"text": "To begin making its own food through photosynthesis.", "isCorrect": false, "rationale": "Frogs are animals and do not perform photosynthesis; that is a process used by plants."}, {"text": "To develop a hard, protective chrysalis.", "isCorrect": false, "rationale": "Chrysalis formation is part of a butterfly's life cycle, not a frog's."}, {"text": "To survive on land as well as in water.", "isCorrect": true, "rationale": "The text states that in the adult frog stage, after developing lungs, 'The adult frog can live on land and in water,' signifying the importance of this respiratory change for a terrestrial lifestyle."}]}, {"question": "Which sequence correctly orders the stages of a butterfly's complete metamorphosis?", "options": [{"text": "Egg → Pupa → Larva → Adult.", "isCorrect": false, "rationale": "This sequence is incorrect; the larva stage precedes the pupa stage."}, {"text": "Egg → Larva → Pupa → Adult.", "isCorrect": true, "rationale": "The text clearly outlines these four distinct stages in this exact order: Egg, Larva (caterpillar), Pupa (chrysalis), Adult (butterfly)."}, {"text": "Larva → Egg → Adult → Pupa.", "isCorrect": false, "rationale": "This sequence is incorrect; the egg stage begins the cycle, and the pupa precedes the adult."}, {"text": "Adult → Pupa → Larva → Egg.", "isCorrect": false, "rationale": "This sequence is incorrect and reverses the natural progression of the life cycle."}]}, {"question": "A caterpillar's primary job is to eat and grow, but the pupa stage is described as a period where its 'body breaks down and rebuilds into a completely new form.' What is the main implication of this statement about the pupa stage?", "options": [{"text": "It is a resting period where the caterpillar stores energy.", "isCorrect": false, "rationale": "While there might be some resting, the description 'body breaks down and rebuilds' implies a much more active and fundamental transformation, not just energy storage."}, {"text": "It is a stage of rapid external growth before the adult emerges.", "isCorrect": false, "rationale": "The growth is internal reorganization, not external growth, and the form changes drastically, not just grows bigger."}, {"text": "It represents a fundamental internal reorganization, leading to a drastically different adult.", "isCorrect": true, "rationale": "The phrase 'body breaks down and rebuilds into a completely new form' precisely describes a profound internal transformation that results in an adult with a wholly different body plan from the larva."}, {"text": "It's when the animal learns to fly and find nectar.", "isCorrect": false, "rationale": "These activities occur in the adult butterfly stage, after emerging from the pupa."}]}, {"question": "According to the text, what is the primary role of a mature plant in its life cycle?", "options": [{"text": "To absorb water and crack open.", "isCorrect": false, "rationale": "This describes the germination stage of a seed, not the role of a mature plant."}, {"text": "To grow its first leaves and begin photosynthesis.", "isCorrect": false, "rationale": "This describes the seedling stage of the plant, before it reaches full maturity."}, {"text": "To produce flowers for pollination and eventually fruit with seeds.", "isCorrect": true, "rationale": "The text states that the 'Mature plant' stage is followed by 'Flowering and pollination,' which then leads to 'Fruit and seeds,' indicating its primary role in reproduction."}, {"text": "To be dispersed by wind, water, or animals.", "isCorrect": false, "rationale": "This describes the dispersal of seeds, which occurs after the mature plant has produced them."}]}, {"question": "The text mentions that 'wind, insects, or birds carry pollen from one flower to another.' This process is crucial because it directly leads to which of the following?", "options": [{"text": "The absorption of water by the seed.", "isCorrect": false, "rationale": "Water absorption by the seed occurs during germination, a much later stage, and is not a direct result of pollination."}, {"text": "The development of fruit containing seeds.", "isCorrect": true, "rationale": "The text explicitly states, 'After pollination, the flower develops into a fruit containing seeds,' making this the direct outcome."}, {"text": "The plant growing its first leaves above the soil.", "isCorrect": false, "rationale": "This is characteristic of the seedling stage, which occurs much earlier in the life cycle, initiated by germination, not pollination."}, {"text": "The shedding of skin by the seedling.", "isCorrect": false, "rationale": "Plants do not shed skin; this is a process seen in animals like caterpillars."}]}, {"question": "The text describes 'complete metamorphosis' as when an animal changes form completely. Which of the following animals, as mentioned in the 'Metamorphosis in Everyday Life' box, undergoes this type of development?", "options": [{"text": "Dragonflies, which start as nymphs.", "isCorrect": false, "rationale": "While dragonflies undergo metamorphosis, the text describes their nymph stage and doesn't explicitly categorize it as 'complete metamorphosis' in the same way it does for the other listed examples."}, {"text": "Ladybugs, transforming from spiky larvae.", "isCorrect": true, "rationale": "The text specifically states, 'Beetles, flies, ants, and bees all go through complete metamorphosis. Even ladybugs start out as tiny, spiky-looking larvae...'"}, {"text": "Humans, growing from babies to adults.", "isCorrect": false, "rationale": "Humans are mammals and exhibit gradual growth, not complete metamorphosis."}, {"text": "Whales, developing from calves to adults.", "isCorrect": false, "rationale": "Whales are mammals and, like humans, undergo gradual growth rather than complete metamorphosis."}]}, {"question": "A key distinction highlighted in the text is between life cycles with gradual growth and those involving metamorphosis. If an animal is born resembling a smaller version of its parents and grows steadily larger over time, its life cycle most closely resembles that of a:", "options": [{"text": "Frog.", "isCorrect": false, "rationale": "Frogs undergo dramatic metamorphosis, starting as tadpoles that look very different from adult frogs."}, {"text": "Butterfly.", "isCorrect": false, "rationale": "Butterflies undergo complete metamorphosis, with larvae (caterpillars) looking nothing like adult butterflies."}, {"text": "Human.", "isCorrect": true, "rationale": "Humans are mammals, and the text describes mammal life cycles as 'most straightforward' where young are born 'looking like a small version of an adult' and grow steadily."}, {"text": "Beetle larva.", "isCorrect": false, "rationale": "Beetles, like butterflies, undergo complete metamorphosis, meaning their larval stage (larva) looks very different from the adult beetle."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
