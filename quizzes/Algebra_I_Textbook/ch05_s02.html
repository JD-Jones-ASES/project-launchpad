<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 5, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Solve the following system of equations by substitution: $\\begin{cases} x - 2y = -1 \\\\ 4x - 3y = 6 \\end{cases}$", "options": [{"text": "$(3, 2)$", "isCorrect": true, "rationale": "By isolating $x = 2y - 1$ and substituting it into the second equation, we find $4(2y - 1) - 3y = 6$, which simplifies to $5y = 10$, giving $y = 2$ and $x = 3$."}, {"text": "$(2, 3)$", "isCorrect": false, "rationale": "This error often occurs when the values for $x$ and $y$ are accidentally swapped after solving."}, {"text": "$(-3, -2)$", "isCorrect": false, "rationale": "This result might be reached if the sign is not changed correctly when moving the $2y$ term to the other side of the equation during isolation."}, {"text": "$(1, 1)$", "isCorrect": false, "rationale": "This result does not satisfy either of the original equations and may stem from basic arithmetic errors in the distribution step."}], "id": "q01"}, {"question": "When solving the system $\\begin{cases} 2x - y = 4 \\\\ 6x - 3y = 12 \\end{cases}$ using substitution, what is the resulting algebraic statement?", "options": [{"text": "$12 = 12$", "isCorrect": true, "rationale": "Substituting $y = 2x - 4$ into the second equation results in $6x - 3(2x - 4) = 12$, which simplifies to $12 = 12$, indicating an identity."}, {"text": "$0 = 12$", "isCorrect": false, "rationale": "This contradiction would suggest no solution, but it only occurs if the constant term in the substitution is handled incorrectly."}, {"text": "$12x = 24$", "isCorrect": false, "rationale": "This result suggests a unique solution, but the $x$ terms in this specific system actually cancel out during substitution."}, {"text": "$-12 = 12$", "isCorrect": false, "rationale": "This is a false contradiction caused by a sign error when distributing the $-3$ across the parentheses."}], "id": "q02"}, {"question": "Which variable and equation would be the most efficient to start with for the substitution method in this system? $\\begin{cases} 4x + 7y = 11 \\\\ x - 5y = 2 \\end{cases}$", "options": [{"text": "$x$ in the second equation", "isCorrect": true, "rationale": "Isolating a variable with a coefficient of $1$ avoids the need for fractions in the early steps of the substitution process."}, {"text": "$y$ in the second equation", "isCorrect": false, "rationale": "While possible, isolating $y$ would involve dividing by $-5$, introducing fractions that make calculations more complex."}, {"text": "$x$ in the first equation", "isCorrect": false, "rationale": "Isolating $x$ here requires dividing the entire equation by $4$, which is less efficient than choosing a variable with a coefficient of $1$."}, {"text": "$y$ in the first equation", "isCorrect": false, "rationale": "Isolating $y$ in the first equation requires division by $7$, leading to cumbersome fractions during substitution."}], "id": "q03"}, {"question": "If the substitution method leads to the statement $0 = 4$, what does this indicate about the system of equations?", "options": [{"text": "The system has no solution and the lines are parallel.", "isCorrect": true, "rationale": "A contradiction, which is a false statement without variables, indicates that the equations describe two parallel lines that never intersect."}, {"text": "The system has infinitely many solutions and the lines are the same.", "isCorrect": false, "rationale": "Infinite solutions occur when an identity is reached (e.g., $4 = 4$), not a contradiction."}, {"text": "The solution to the system is the ordered pair $(0, 4)$.", "isCorrect": false, "rationale": "A contradiction indicates a lack of intersection points, whereas $(0, 4)$ would be a specific point of intersection."}, {"text": "An error was made because variables should never disappear.", "isCorrect": false, "rationale": "Variables disappearing is a standard algebraic result for systems that are either inconsistent (no solution) or dependent (infinite solutions)."}], "id": "q04"}, {"question": "Solve the system: $\\begin{cases} 3x + y = 1 \\\\ 10x + 3y = 5 \\end{cases}$", "options": [{"text": "$(2, -5)$", "isCorrect": true, "rationale": "Isolating $y = 1 - 3x$ and substituting into the second equation gives $10x + 3(1 - 3x) = 5$, which simplifies to $x = 2$ and subsequently $y = -5$."}, {"text": "$(-2, 7)$", "isCorrect": false, "rationale": "This result may occur if there is a sign error when calculating $x$ or when substituting $x$ back into the first equation."}, {"text": "$(2, 5)$", "isCorrect": false, "rationale": "This error stems from failing to distribute the negative sign correctly when solving for $y$ using $x=2$."}, {"text": "$(8, -23)$", "isCorrect": false, "rationale": "This could result from failing to distribute the coefficient $3$ to both terms in the expression $(1 - 3x)$."}], "id": "q05"}, {"question": "In the system $\\begin{cases} x = 2y - 3 \\\\ 5x + y = 7 \\end{cases}$, a student writes $5 \\cdot 2y - 3 + y = 7$ as the second step. Why is this incorrect?", "options": [{"text": "The expression for $x$ must be enclosed in parentheses to ensure the coefficient is distributed to both terms.", "isCorrect": true, "rationale": "Substituting without parentheses leads to only multiplying the first term of the expression by the coefficient, which is a common procedural error."}, {"text": "The student should have solved for $y$ in the first equation instead of using the given $x$.", "isCorrect": false, "rationale": "While possible, it is perfectly valid to use the already isolated $x$ variable; the error is in the execution of the substitution, not the choice of variable."}, {"text": "The $5x$ and $y$ should have been subtracted from both sides before substituting.", "isCorrect": false, "rationale": "Rearranging the second equation is unnecessary for the substitution method if one variable is already isolated."}, {"text": "Substitution is only valid if both equations are solved for the same variable.", "isCorrect": false, "rationale": "The substitution method only requires one equation to be solved for one variable."}], "id": "q06"}, {"question": "Solve the system: $\\begin{cases} x = y + 4 \\\\ 3x + 2y = 7 \\end{cases}$", "options": [{"text": "$(3, -1)$", "isCorrect": true, "rationale": "Substituting $y + 4$ for $x$ yields $3(y + 4) + 2y = 7$, which simplifies to $5y = -5$, so $y = -1$ and $x = 3$."}, {"text": "$(5, 1)$", "isCorrect": false, "rationale": "This result is obtained if $3y + 4 + 2y = 7$ is used instead of distributing the $3$ to the constant $4$."}, {"text": "$(-1, 3)$", "isCorrect": false, "rationale": "This error occurs when the solved $y$-value is incorrectly identified as the $x$-value in the final ordered pair."}, {"text": "$(1, -3)$", "isCorrect": false, "rationale": "This incorrect solution results from arithmetic errors during the simplification of the $y$ terms or the constant terms."}], "id": "q07"}, {"question": "What geometric relationship exists between the lines in a system where substitution leads to an identity such as $18 = 18$?", "options": [{"text": "The lines are coincident (they are the same line).", "isCorrect": true, "rationale": "An identity indicates that every point that satisfies the first equation also satisfies the second, meaning they represent the same line."}, {"text": "The lines are parallel and never intersect.", "isCorrect": false, "rationale": "Parallel lines lead to a contradiction, not an identity, because they share no common points."}, {"text": "The lines intersect at exactly one point.", "isCorrect": false, "rationale": "A single intersection point is associated with a specific value for $x$ and $y$, not a universal identity where the variables cancel out."}, {"text": "The lines are perpendicular to each other.", "isCorrect": false, "rationale": "Perpendicularity relates to the slopes of the lines and still results in a single point of intersection, not an identity."}], "id": "q08"}, {"question": "Solve the system: $\\begin{cases} 4x - y = 7 \\\\ 2x + 3y = -7 \\end{cases}$", "options": [{"text": "$(1, -3)$", "isCorrect": true, "rationale": "Isolating $y = 4x - 7$ and substituting gives $2x + 3(4x - 7) = -7$, resulting in $14x = 14$. Thus $x = 1$ and $y = -3$."}, {"text": "$(1, 3)$", "isCorrect": false, "rationale": "This reflects a sign error when calculating the final $y$-value from the $x$-value."}, {"text": "$(0, -7)$", "isCorrect": false, "rationale": "This coordinate satisfies the first equation but fails the second, often resulting from an incomplete substitution process."}, {"text": "$(-1, -11)$", "isCorrect": false, "rationale": "This error occurs if the $14x$ is mistakenly set equal to $-28$ due to a calculation error with the constant terms."}], "id": "q09"}, {"question": "True or False: To properly check a solution obtained by substitution, you only need to plug the $(x, y)$ values into the equation that was solved for a variable in Step 1.", "options": [{"text": "False — the solution must be checked in both original equations.", "isCorrect": true, "rationale": "A solution must satisfy both original equations to be considered correct for the system."}, {"text": "True — checking in one equation is sufficient since the other was derived from it.", "isCorrect": false, "rationale": "Checking in only one equation is insufficient because it doesn't verify that the solution works for the entire system."}, {"text": "True — but only if the equation you check is the one with the larger coefficients.", "isCorrect": false, "rationale": "The size of coefficients does not determine which equation to check; the solution must satisfy both equations regardless of their coefficients."}, {"text": "False — the solution should only be checked in the equation that was NOT used for isolation.", "isCorrect": false, "rationale": "While checking in the unused equation is important, the solution must be verified in both original equations to confirm it is correct for the entire system."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
