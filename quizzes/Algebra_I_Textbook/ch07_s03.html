</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the *first* step when applying the $ac$ method to factor a trinomial $ax^2 + bx + c$?", "options": [{"text": "Find two integers $m$ and $n$ such that $m n = ac$ and $m + n = b$.", "isCorrect": false, "rationale": "This is the second step in the $ac$ method, after computing the product $ac$."}, {"text": "Rewrite the middle term $bx$ as $mx + nx$.", "isCorrect": false, "rationale": "This is the third step in the $ac$ method, performed after identifying $m$ and $n$."}, {"text": "Compute the product $ac$.", "isCorrect": true, "rationale": "According to 'The $ac$ Method' property, the very first step is to 'Compute the product $ac$'."}, {"text": "Factor by grouping.", "isCorrect": false, "rationale": "This is the final step in the $ac$ method, performed after rewriting the middle term."}]}, {"question": "Factor the trinomial $5x^2 + 13x + 6$ using the $ac$ method.", "options": [{"text": "$(5x + 2)(x + 3)$", "isCorrect": false, "rationale": "Multiplying these factors gives $5x^2 + 15x + 2x + 6 = 5x^2 + 17x + 6$, which is incorrect."}, {"text": "$(5x + 6)(x + 1)$", "isCorrect": false, "rationale": "Multiplying these factors gives $5x^2 + 5x + 6x + 6 = 5x^2 + 11x + 6$, which is incorrect."}, {"text": "$(5x + 3)(x + 2)$", "isCorrect": true, "rationale": "For $5x^2 + 13x + 6$, $ac = 5 \\times 6 = 30$ and $b = 13$. The two numbers $m, n$ are $3$ and $10$. Rewriting $13x$ as $3x + 10x$ gives $5x^2 + 3x + 10x + 6 = x(5x+3) + 2(5x+3) = (5x+3)(x+2)$."}, {"text": "$(5x + 1)(x + 6)$", "isCorrect": false, "rationale": "Multiplying these factors gives $5x^2 + 30x + x + 6 = 5x^2 + 31x + 6$, which is incorrect."}]}, {"question": "When factoring $3x^2 + x - 10$ using the $ac$ method, what are the correct values for $m$ and $n$ used to rewrite the middle term $x$?", "options": [{"text": "$5$ and $-6$", "isCorrect": false, "rationale": "The product $mn = 5 \\times (-6) = -30$, which is correct for $ac$. However, the sum $m+n = 5 + (-6) = -1$, which does not match $b=1$."}, {"text": "$-5$ and $6$", "isCorrect": true, "rationale": "For $3x^2 + x - 10$, $a=3$, $c=-10$, so $ac = -30$. The middle term coefficient is $b=1$. We need two numbers $m, n$ such that $mn = -30$ and $m+n = 1$. The numbers $6$ and $-5$ satisfy both conditions ($6 \\times -5 = -30$ and $6 + (-5) = 1$). The order does not affect the correctness of the pair."}, {"text": "$10$ and $-3$", "isCorrect": false, "rationale": "The product $mn = 10 \\times (-3) = -30$, which is correct for $ac$. However, the sum $m+n = 10 + (-3) = 7$, which does not match $b=1$."}, {"text": "$-10$ and $3$", "isCorrect": false, "rationale": "The product $mn = -10 \\times 3 = -30$, which is correct for $ac$. However, the sum $m+n = -10 + 3 = -7$, which does not match $b=1$."}]}, {"question": "Factor the trinomial $6x^2 - 11x + 4$.", "options": [{"text": "$(3x - 1)(2x - 4)$", "isCorrect": false, "rationale": "Multiplying these factors gives $6x^2 - 12x - 2x + 4 = 6x^2 - 14x + 4$, which is incorrect. Also, $2x-4$ has a common factor of 2, suggesting the factorization might not be complete if it were correct."}, {"text": "$(6x - 1)(x - 4)$", "isCorrect": false, "rationale": "Multiplying these factors gives $6x^2 - 24x - x + 4 = 6x^2 - 25x + 4$, which is incorrect."}, {"text": "$(2x - 1)(3x - 4)$", "isCorrect": true, "rationale": "For $6x^2 - 11x + 4$, $ac = 6 \\times 4 = 24$ and $b = -11$. The two numbers $m, n$ are $-3$ and $-8$. Rewriting $-11x$ as $-3x - 8x$ gives $6x^2 - 3x - 8x + 4 = 3x(2x-1) - 4(2x-1) = (2x-1)(3x-4)$."}, {"text": "$(2x + 1)(3x + 4)$", "isCorrect": false, "rationale": "Multiplying these factors gives $6x^2 + 8x + 3x + 4 = 6x^2 + 11x + 4$, which has the wrong sign for the middle term."}]}, {"question": "Under what condition is a trinomial $ax^2 + bx + c$ considered prime over the integers according to the $ac$ method?", "options": [{"text": "If $a=1$.", "isCorrect": false, "rationale": "Trinomials with $a=1$ can often be factored (e.g., $x^2 + 5x + 6 = (x+2)(x+3)$). This condition does not imply primality."}, {"text": "If $b=0$.", "isCorrect": false, "rationale": "If $b=0$, the trinomial is of the form $ax^2 + c$. This can sometimes be factored (e.g., $4x^2 - 9 = (2x-3)(2x+3)$)."}, {"text": "If no two integers $m$ and $n$ exist such that $mn=ac$ and $m+n=b$.", "isCorrect": true, "rationale": "The text explicitly states: 'If no such pair $m$, $n$ exists, the trinomial is prime over the integers.' This means it cannot be factored into binomials with integer coefficients."}, {"text": "If $c=0$.", "isCorrect": false, "rationale": "If $c=0$, the trinomial is of the form $ax^2 + bx = x(ax+b)$, which is easily factored by pulling out the GCF. This does not imply primality."}]}, {"question": "Consider the trinomial $4x^2 + 14x + 6$. Before applying the $ac$ method, what is the most appropriate first step?", "options": [{"text": "Immediately compute $ac = 4 \\times 6 = 24$.", "isCorrect": false, "rationale": "While this is a step in the $ac$ method, the 'caution' note advises a preliminary step to simplify the problem."}, {"text": "Divide the entire trinomial by 2.", "isCorrect": false, "rationale": "Dividing the trinomial changes its value. You can factor out a GCF, but not simply divide unless solving an equation."}, {"text": "Factor out the greatest common factor (GCF) of 2.", "isCorrect": true, "rationale": "The 'caution' note states: 'Before applying the $ac$ method, always check whether you can factor out a GCF first.' The GCF of $4x^2, 14x, 6$ is 2."}, {"text": "Try to find $m$ and $n$ such that $mn=6$ and $m+n=14$.", "isCorrect": false, "rationale": "Finding $m$ and $n$ is part of the $ac$ method, but this specific calculation ($mn=c$) is for trinomials where $a=1$, not $a=4$. Also, factoring out the GCF should precede this step."}]}, {"question": "In the $ac$ method, after rewriting the middle term $bx$ as $mx + nx$, the next step is 'Factor by grouping.' Why is factoring by grouping essential to the $ac$ method?", "options": [{"text": "It allows you to check your answer by multiplying the factors.", "isCorrect": false, "rationale": "Checking is done after factoring is complete, not as part of the factoring process itself."}, {"text": "It directly transforms the four-term expression into a product of two binomials.", "isCorrect": true, "rationale": "Factoring by grouping is the technique used to convert the four-term expression ($ax^2 + mx + nx + c$) into its factored form as a product of two binomials (e.g., $x(Ax+B) + D(Ax+B) = (Ax+B)(x+D)$)."}, {"text": "It helps in finding the values of $m$ and $n$.", "isCorrect": false, "rationale": "Finding $m$ and $n$ occurs before rewriting the middle term and factoring by grouping."}, {"text": "It is a preliminary step to compute the product $ac$.", "isCorrect": false, "rationale": "Computing $ac$ is the very first step, occurring before any rewriting or grouping."}]}, {"question": "How does factoring $ax^2 + bx + c$ where $a \\neq 1$ primarily differ from factoring $x^2 + bx + c$ (where $a=1$)?", "options": [{"text": "For $a \\neq 1$, you need to find two numbers whose product is $c$ and sum is $b$.", "isCorrect": false, "rationale": "This describes the method for factoring when $a=1$. When $a \\neq 1$, the product must be $ac$, not just $c$."}, {"text": "For $a \\neq 1$, you first multiply $a$ and $c$ to get the target product for $m$ and $n$.", "isCorrect": true, "rationale": "The defining characteristic of the $ac$ method for $a \\neq 1$ is the initial calculation of $ac$ to find the target product for the integers $m$ and $n$, whereas for $a=1$, the target product is simply $c$."}, {"text": "For $a \\neq 1$, you only need to factor by grouping.", "isCorrect": false, "rationale": "Factoring by grouping is part of the process, but it's not the *only* step, nor is it the primary difference. The prior steps of finding $m$ and $n$ are crucial."}, {"text": "For $a \\neq 1$, the trinomial cannot be factored into two binomials.", "isCorrect": false, "rationale": "This is incorrect; the section provides a method (the $ac$ method) specifically for factoring such trinomials."}]}, {"question": "Imagine you are factoring $ax^2 + bx + c$. You find $m$ and $n$ and rewrite $bx$ as $mx + nx$. Does the order in which you write $mx$ and $nx$ matter for the final factored form?", "options": [{"text": "Yes, it will result in different binomial factors.", "isCorrect": false, "rationale": "The final product of binomials will be the same, even if the order of the binomials themselves is swapped. For example, $(X+Y)(A+B)$ is the same as $(A+B)(X+Y)$."}, {"text": "No, the final factored form will be the same regardless of the order.", "isCorrect": true, "rationale": "The commutative property of addition allows for $mx + nx$ or $nx + mx$. When factoring by grouping, both orders will lead to the same set of binomial factors, though the grouping might appear slightly different in the intermediate step. For instance, $2x^2 + x + 6x + 3 = x(2x+1) + 3(2x+1) = (2x+1)(x+3)$, and $2x^2 + 6x + x + 3 = 2x(x+3) + 1(x+3) = (x+3)(2x+1)$. The final factors are equivalent."}, {"text": "It depends on the signs of $m$ and $n$.", "isCorrect": false, "rationale": "The commutative property applies to both positive and negative terms. The order of terms in addition does not affect the sum."}, {"text": "It only matters if $a$ or $c$ is negative.", "isCorrect": false, "rationale": "The principle of commutative addition applies regardless of the signs of the coefficients."}]}, {"question": "Factor completely: $10x^2 - 35x + 15$.", "options": [{"text": "$5(2x - 1)(x - 3)$", "isCorrect": true, "rationale": "First, factor out the GCF: $10x^2 - 35x + 15 = 5(2x^2 - 7x + 3)$. Then, factor the trinomial $2x^2 - 7x + 3$. For this trinomial, $ac = 2 \\times 3 = 6$ and $b = -7$. The numbers $m, n$ are $-1$ and $-6$. Rewriting $-7x$ as $-x - 6x$ gives $2x^2 - x - 6x + 3 = x(2x-1) - 3(2x-1) = (2x-1)(x-3)$. So, the complete factorization is $5(2x-1)(x-3)$."}, {"text": "$5(2x + 1)(x + 3)$", "isCorrect": false, "rationale": "This would result in positive middle terms ($10x^2 + 35x + 15$), which does not match the original trinomial's negative middle term."}, {"text": "$5(2x - 3)(x - 1)$", "isCorrect": false, "rationale": "Multiplying this out gives $5(2x^2 - 2x - 3x + 3) = 5(2x^2 - 5x + 3) = 10x^2 - 25x + 15$, which does not match the original trinomial."}, {"text": "$5(2x + 3)(x + 1)$", "isCorrect": false, "rationale": "This would result in positive middle terms ($10x^2 + 25x + 15$), which does not match the original trinomial's negative middle term."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
