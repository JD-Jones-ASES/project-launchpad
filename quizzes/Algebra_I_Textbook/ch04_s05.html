<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 4, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the slope relationship between two parallel non-vertical lines?", "options": [{"text": "Their slopes are negative reciprocals (product equals -1).", "isCorrect": false, "rationale": "Slopes that are negative reciprocals describe perpendicular lines, not parallel lines."}, {"text": "One slope is twice the other.", "isCorrect": false, "rationale": "There is no such relationship for parallel lines. Parallel non-vertical lines have exactly equal slopes."}, {"text": "Their slopes are equal.", "isCorrect": true, "rationale": "Two non-vertical lines are parallel if and only if they have the same slope."}, {"text": "Their slopes sum to zero.", "isCorrect": false, "rationale": "Slopes summing to zero (e.g., 3 and -3) would mean they are reflections about the x-axis, not parallel lines."}]}, {"question": "What is the slope relationship between two perpendicular non-vertical lines?", "options": [{"text": "Their slopes are equal.", "isCorrect": false, "rationale": "Equal slopes describe parallel lines. Perpendicular lines have slopes that are negative reciprocals of each other."}, {"text": "Their slopes are negative reciprocals; the product of the slopes equals -1.", "isCorrect": true, "rationale": "Two non-vertical lines are perpendicular if and only if m1 * m2 = -1, i.e., their slopes are negative reciprocals."}, {"text": "Their slopes sum to 1.", "isCorrect": false, "rationale": "Slopes summing to 1 has no special geometric meaning. The product of perpendicular slopes equals -1."}, {"text": "One slope is the square of the other.", "isCorrect": false, "rationale": "Perpendicular lines have slopes that are negative reciprocals. There is no squaring relationship."}]}, {"question": "Are the lines y = 2x + 5 and y = 2x - 3 parallel, perpendicular, or neither?", "options": [{"text": "Perpendicular, because one slope is positive and the other is negative.", "isCorrect": false, "rationale": "Both slopes are +2, which are equal, not negative reciprocals. Equal slopes mean the lines are parallel."}, {"text": "Parallel, because they have the same slope.", "isCorrect": true, "rationale": "Both lines have slope m = 2. Since their slopes are equal, the lines are parallel (they never intersect)."}, {"text": "Neither, because they have different y-intercepts.", "isCorrect": false, "rationale": "Different y-intercepts simply confirm the lines are not the same line. Since their slopes are equal, they are parallel."}, {"text": "Neither, because parallel lines must be identical.", "isCorrect": false, "rationale": "Parallel lines are distinct lines with the same slope. They do not need to be identical."}]}, {"question": "Determine whether y = 3x + 1 and y = -(1/3)x + 4 are parallel, perpendicular, or neither.", "options": [{"text": "Parallel, because both equations have a positive term.", "isCorrect": false, "rationale": "The slopes are 3 and -1/3. Their product is 3 * (-1/3) = -1, which means the lines are perpendicular."}, {"text": "Perpendicular, because the product of their slopes equals -1.", "isCorrect": true, "rationale": "Slopes are m1 = 3 and m2 = -1/3. Checking: 3 * (-1/3) = -1, confirming the lines are perpendicular."}, {"text": "Neither, because the slopes are not equal and do not sum to zero.", "isCorrect": false, "rationale": "The criterion is whether the product of slopes equals -1, not whether they sum to zero. Here 3 * (-1/3) = -1, so the lines are perpendicular."}, {"text": "Parallel, because one slope is the reciprocal of the other.", "isCorrect": false, "rationale": "The negative reciprocal (not just reciprocal) of a slope characterizes perpendicular lines. Since m2 = -1/3 is the negative reciprocal of m1 = 3, the lines are perpendicular."}]}, {"question": "Are the lines y = 2x + 1 and y = -2x + 7 parallel, perpendicular, or neither?", "options": [{"text": "Parallel, because the slopes have the same absolute value.", "isCorrect": false, "rationale": "Parallel lines require equal slopes (not just equal absolute values). Here m1 = 2 and m2 = -2, so the slopes are not equal."}, {"text": "Perpendicular, because the slopes are opposite in sign.", "isCorrect": false, "rationale": "The slopes are m1 = 2 and m2 = -2, and 2 * (-2) = -4, which is not -1. The lines are neither parallel nor perpendicular."}, {"text": "Neither, because the slopes are not equal and their product is not -1.", "isCorrect": true, "rationale": "m1 = 2 and m2 = -2 are not equal (not parallel), and 2 * (-2) = -4, which is not -1 (not perpendicular). The lines are neither."}, {"text": "Parallel, because opposite slopes always indicate parallel lines.", "isCorrect": false, "rationale": "Opposite signs do not make lines parallel. Parallel lines require identical slopes. These lines are neither parallel nor perpendicular."}]}, {"question": "Write the equation of the line parallel to y = -3x + 2 through (4, 1) in slope-intercept form.", "options": [{"text": "y = 3x - 11", "isCorrect": false, "rationale": "A parallel line keeps the same slope as the original, which is -3, not +3."}, {"text": "y = -3x + 13", "isCorrect": true, "rationale": "Parallel lines share the same slope, so m = -3. Using point-slope: y - 1 = -3(x - 4) gives y = -3x + 12 + 1 = -3x + 13."}, {"text": "y = -3x + 2", "isCorrect": false, "rationale": "This is the original line, not a parallel line through (4, 1). The y-intercept must be recalculated using the given point."}, {"text": "y = (1/3)x - 1/3", "isCorrect": false, "rationale": "That uses the negative reciprocal slope, which would give a perpendicular line, not a parallel one."}]}, {"question": "What is the slope of any line perpendicular to a line with slope 2/5?", "options": [{"text": "2/5", "isCorrect": false, "rationale": "A line with the same slope would be parallel, not perpendicular."}, {"text": "-2/5", "isCorrect": false, "rationale": "This is the negative of the slope but not the negative reciprocal. The negative reciprocal of 2/5 is -5/2."}, {"text": "-5/2", "isCorrect": true, "rationale": "The negative reciprocal of 2/5 is -5/2. Check: (2/5) * (-5/2) = -1, confirming perpendicularity."}, {"text": "5/2", "isCorrect": false, "rationale": "This is the reciprocal but not the negative reciprocal. The perpendicular slope must be -5/2 so that the product equals -1."}]}, {"question": "Write the equation of the line perpendicular to y = (2/5)x - 1 through (2, -3) in slope-intercept form.", "options": [{"text": "y = (2/5)x - 4", "isCorrect": false, "rationale": "This uses the original slope, which would give a parallel line. The perpendicular slope is -5/2."}, {"text": "y = -(5/2)x + 2", "isCorrect": true, "rationale": "The negative reciprocal of 2/5 is -5/2. Using point-slope: y + 3 = -(5/2)(x - 2) gives y = -(5/2)x + 5 - 3 = -(5/2)x + 2."}, {"text": "y = -(5/2)x - 8", "isCorrect": false, "rationale": "The y-intercept is wrong. Expanding y + 3 = -(5/2)(x - 2) gives y = -(5/2)x + 5 - 3 = -(5/2)x + 2."}, {"text": "y = (5/2)x + 2", "isCorrect": false, "rationale": "The perpendicular slope must be negative (-5/2), not positive (5/2)."}]}, {"question": "Two vertical lines are related to each other in which way?", "options": [{"text": "They are perpendicular.", "isCorrect": false, "rationale": "Two vertical lines run in the same direction (straight up) and never intersect, so they are parallel, not perpendicular."}, {"text": "They are parallel.", "isCorrect": true, "rationale": "Two vertical lines are parallel to each other; they both have undefined slope and never intersect."}, {"text": "They are neither parallel nor perpendicular.", "isCorrect": false, "rationale": "Two vertical lines do have a defined relationship: they are parallel."}, {"text": "They intersect at exactly one point.", "isCorrect": false, "rationale": "Two distinct vertical lines never intersect; they run in the same direction and are therefore parallel."}]}, {"question": "Write the equation of the line parallel to y = (1/2)x + 3 through (-4, 5) in slope-intercept form.", "options": [{"text": "y = -(1/2)x + 5", "isCorrect": false, "rationale": "A parallel line keeps the same slope 1/2, not the negated slope. Using m = 1/2 and (-4, 5): y = (1/2)x + 7."}, {"text": "y = (1/2)x + 7", "isCorrect": true, "rationale": "Parallel slope is m = 1/2. Using point-slope: y - 5 = (1/2)(x + 4) gives y = (1/2)x + 2 + 5 = (1/2)x + 7."}, {"text": "y = (1/2)x + 3", "isCorrect": false, "rationale": "This is the original line. The y-intercept must be recalculated using the given point (-4, 5)."}, {"text": "y = (1/2)x - 2", "isCorrect": false, "rationale": "The y-intercept is wrong. Expanding y - 5 = (1/2)(x + 4) gives y = (1/2)x + 2 + 5 = (1/2)x + 7."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
