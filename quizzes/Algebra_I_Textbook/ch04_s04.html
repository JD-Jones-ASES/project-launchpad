<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 4, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the slope-intercept form of a linear equation?", "options": [{"text": "Ax + By = C", "isCorrect": false, "rationale": "That is the standard form of a linear equation, not slope-intercept form."}, {"text": "y - y1 = m(x - x1)", "isCorrect": false, "rationale": "That is the point-slope form, which uses a known point (x1, y1) and the slope m."}, {"text": "y = mx + b", "isCorrect": true, "rationale": "Slope-intercept form is y = mx + b, where m is the slope and b is the y-intercept."}, {"text": "y = ax^2 + bx + c", "isCorrect": false, "rationale": "That is standard form for a quadratic function, not a linear equation."}]}, {"question": "In the slope-intercept form y = mx + b, what does b represent?", "options": [{"text": "The slope of the line.", "isCorrect": false, "rationale": "The slope is represented by m. The value b represents the y-intercept."}, {"text": "The x-intercept of the line.", "isCorrect": false, "rationale": "The y-intercept (where the line crosses the y-axis) is b. The x-intercept is found by setting y = 0."}, {"text": "The y-intercept of the line.", "isCorrect": true, "rationale": "In y = mx + b, b is the y-intercept, the y-coordinate of the point where the line crosses the y-axis."}, {"text": "The horizontal change between two points.", "isCorrect": false, "rationale": "Horizontal change (run) is part of how slope is calculated. The y-intercept b is where the line crosses the y-axis."}]}, {"question": "Write the equation of the line with slope 3 and y-intercept -4.", "options": [{"text": "y = -4x + 3", "isCorrect": false, "rationale": "The values of m and b are swapped here. m = 3 is the slope and b = -4 is the y-intercept, giving y = 3x - 4."}, {"text": "y = 3x - 4", "isCorrect": true, "rationale": "Substituting m = 3 and b = -4 into y = mx + b gives y = 3x + (-4) = 3x - 4."}, {"text": "y = 3x + 4", "isCorrect": false, "rationale": "The y-intercept is -4, not +4. The correct equation is y = 3x - 4."}, {"text": "y = -3x + 4", "isCorrect": false, "rationale": "Both the slope sign and y-intercept sign are wrong. The correct equation is y = 3x - 4."}]}, {"question": "What is the point-slope form of a linear equation?", "options": [{"text": "y = mx + b", "isCorrect": false, "rationale": "That is slope-intercept form. Point-slope form uses a specific point (x1, y1) on the line."}, {"text": "y - y1 = m(x - x1)", "isCorrect": true, "rationale": "Point-slope form is y - y1 = m(x - x1), where m is the slope and (x1, y1) is any known point on the line."}, {"text": "Ax + By = C", "isCorrect": false, "rationale": "That is standard form. Point-slope form explicitly includes a known point and the slope."}, {"text": "y = (y2 - y1)/(x2 - x1) * x", "isCorrect": false, "rationale": "This partial expression shows the slope formula used as a multiplier, but it is not the standard form of point-slope form."}]}, {"question": "Write the equation of the line with slope -2 through (3, 1) in slope-intercept form.", "options": [{"text": "y = -2x + 5", "isCorrect": false, "rationale": "Using point-slope form: y - 1 = -2(x - 3), so y = -2x + 6 + 1 = -2x + 7. The y-intercept is 7, not 5."}, {"text": "y = 2x - 7", "isCorrect": false, "rationale": "The slope should be -2, not +2. Starting from point-slope form gives y = -2x + 7."}, {"text": "y = -2x + 7", "isCorrect": true, "rationale": "Using point-slope: y - 1 = -2(x - 3) gives y - 1 = -2x + 6, so y = -2x + 7."}, {"text": "y = -2x - 5", "isCorrect": false, "rationale": "The y-intercept calculation is wrong. Expanding y - 1 = -2(x - 3) gives y = -2x + 7, not y = -2x - 5."}]}, {"question": "To write the equation of a line through two given points, what must you find first?", "options": [{"text": "The y-intercept by substituting one point into y = mx + b.", "isCorrect": false, "rationale": "You need the slope m before you can use y = mx + b. The slope must be calculated from the two points first."}, {"text": "The slope using the slope formula m = (y2 - y1)/(x2 - x1).", "isCorrect": true, "rationale": "When two points are given, the first step is always to calculate the slope using the slope formula, then use point-slope form."}, {"text": "The midpoint of the two given points.", "isCorrect": false, "rationale": "The midpoint is not needed to write the equation of the line. The slope must be found first."}, {"text": "The distance between the two points.", "isCorrect": false, "rationale": "Distance between points is not used to write a line equation. The slope is what is needed first."}]}, {"question": "Write the equation of the line through (2, 5) and (6, -3) in slope-intercept form.", "options": [{"text": "y = -2x + 9", "isCorrect": true, "rationale": "Slope: m = (-3 - 5)/(6 - 2) = -8/4 = -2. Using (2, 5): y - 5 = -2(x - 2) gives y = -2x + 9."}, {"text": "y = 2x - 1", "isCorrect": false, "rationale": "The slope is -2, not +2. With m = -2 and point (2, 5), the equation is y = -2x + 9."}, {"text": "y = -2x + 1", "isCorrect": false, "rationale": "The y-intercept is wrong. Using point (2, 5): y - 5 = -2(x - 2) gives y = -2x + 4 + 5 = -2x + 9."}, {"text": "y = -2x - 9", "isCorrect": false, "rationale": "The sign of the y-intercept is wrong. The correct equation through (2, 5) and (6, -3) is y = -2x + 9."}]}, {"question": "What is the standard form of a linear equation?", "options": [{"text": "y = mx + b", "isCorrect": false, "rationale": "That is slope-intercept form. Standard form places both variable terms on the left and the constant on the right."}, {"text": "y - y1 = m(x - x1)", "isCorrect": false, "rationale": "That is point-slope form. Standard form is Ax + By = C with integer coefficients."}, {"text": "Ax + By = C, where A, B, C are integers and A >= 0.", "isCorrect": true, "rationale": "Standard form is Ax + By = C with integer coefficients, A not negative, and A and B not both zero."}, {"text": "x/a + y/b = 1", "isCorrect": false, "rationale": "That is the intercept form of a line equation, not the standard form Ax + By = C."}]}, {"question": "Write the equation of the line through (-1, 2) with slope 4 in slope-intercept form.", "options": [{"text": "y = 4x - 2", "isCorrect": false, "rationale": "Using point-slope: y - 2 = 4(x - (-1)) gives y - 2 = 4x + 4, so y = 4x + 6, not y = 4x - 2."}, {"text": "y = 4x + 2", "isCorrect": false, "rationale": "Expanding y - 2 = 4(x + 1) gives y = 4x + 4 + 2 = 4x + 6, not y = 4x + 2."}, {"text": "y = 4x + 6", "isCorrect": true, "rationale": "Using point-slope with m = 4 and (-1, 2): y - 2 = 4(x + 1) gives y - 2 = 4x + 4, so y = 4x + 6."}, {"text": "y = -4x + 6", "isCorrect": false, "rationale": "The slope is given as 4 (positive), not -4. The correct equation is y = 4x + 6."}]}, {"question": "Which form of a linear equation is most useful when you know the slope and a point that is NOT the y-intercept?", "options": [{"text": "Standard form: Ax + By = C", "isCorrect": false, "rationale": "Standard form does not directly use slope and a specific point; it is useful for finding intercepts and solving systems."}, {"text": "Slope-intercept form: y = mx + b", "isCorrect": false, "rationale": "Slope-intercept form is most direct when the y-intercept is known. If the given point is not the y-intercept, point-slope form is more convenient."}, {"text": "Point-slope form: y - y1 = m(x - x1)", "isCorrect": true, "rationale": "Point-slope form is especially handy when you know the slope and one point on the line but that point is not the y-intercept."}, {"text": "Quadratic form: y = ax^2 + bx + c", "isCorrect": false, "rationale": "Quadratic form is for parabolas, not lines. Any of the three linear forms applies to a straight line."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
