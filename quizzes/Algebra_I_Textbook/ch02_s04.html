<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 2, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the defining characteristic of a literal equation?", "options": [{"text": "It always contains at least one fraction.", "isCorrect": false, "rationale": "While some literal equations may contain fractions, this is not their defining characteristic. The key is the number of variables."}, {"text": "It involves only one variable that needs to be solved.", "isCorrect": false, "rationale": "This describes a standard one-variable equation, not a literal equation. Literal equations involve multiple variables."}, {"text": "It contains two or more variables.", "isCorrect": true, "rationale": "The text explicitly states, 'A literal equation is an equation that contains two or more variables.'"}, {"text": "Its solution requires advanced calculus.", "isCorrect": false, "rationale": "Solving literal equations primarily uses fundamental algebraic manipulation, not advanced calculus."}]}, {"question": "When solving a literal equation for a specific variable, how should other variables be treated?", "options": [{"text": "As if they were always zero.", "isCorrect": false, "rationale": "Treating other variables as zero would change the equation's properties and lead to incorrect solutions unless they are actual zeros in the equation."}, {"text": "As if they were numbers.", "isCorrect": true, "rationale": "The text instructs to 'treat every other variable as if it were a number,' meaning they act as constants during the algebraic manipulation to isolate the target variable."}, {"text": "As if they were complex mathematical operators.", "isCorrect": false, "rationale": "Variables are not treated as operators; they represent unknown numerical values that participate in arithmetic operations."}, {"text": "As if they cancel out automatically.", "isCorrect": false, "rationale": "Variables only cancel out under specific algebraic conditions (e.g., division by itself), not automatically."}]}, {"question": "The area of a triangle is given by $A = \\frac{1}{2}bh$. Solve this formula for $b$.", "options": [{"text": "$b = \\frac{A}{2h}$", "isCorrect": false, "rationale": "To solve for $b$, you first multiply both sides by 2 ($2A = bh$), then divide both sides by $h$, resulting in $b = \\frac{2A}{h}$."}, {"text": "$b = 2Ah$", "isCorrect": false, "rationale": "This would result from multiplying $2A$ by $h$, which is an incorrect operation for isolating $b$ when $h$ is multiplied by $b$."}, {"text": "$b = \\frac{2A}{h}$", "isCorrect": true, "rationale": "Start with $A = \\frac{1}{2}bh$. Multiply both sides by 2 to get $2A = bh$. Then, divide both sides by $h$ to isolate $b$, yielding $b = \\frac{2A}{h}$."}, {"text": "$b = A - \\frac{1}{2}h$", "isCorrect": false, "rationale": "This incorrectly uses subtraction instead of multiplication and division to undo the operations involving $b$."}]}, {"question": "The perimeter of a rectangle is $P = 2l + 2w$. Solve this formula for $l$.", "options": [{"text": "$l = P - 2w - 2$", "isCorrect": false, "rationale": "This incorrectly uses subtraction for the factor of 2 multiplying $l$ and does not isolate $l$ correctly."}, {"text": "$l = \\frac{P - 2w}{2}$", "isCorrect": true, "rationale": "First, subtract $2w$ from both sides: $P - 2w = 2l$. Then, divide both sides by 2 to isolate $l$: $l = \\frac{P - 2w}{2}$."}, {"text": "$l = \\frac{P}{2} - 2w$", "isCorrect": false, "rationale": "This incorrectly applies the division by 2 only to $P$, rather than the entire term $(P - 2w)$."}, {"text": "$l = 2P - w$", "isCorrect": false, "rationale": "This involves incorrect inverse operations and does not properly isolate $l$."}]}, {"question": "The distance formula is $d = rt$. Solve this formula for $r$.", "options": [{"text": "$r = d - t$", "isCorrect": false, "rationale": "To undo multiplication ($rt$), you must use division, not subtraction."}, {"text": "$r = dt$", "isCorrect": false, "rationale": "This would result from multiplying both sides by $t$, which is incorrect for isolating $r$ when $r$ is multiplied by $t$."}, {"text": "$r = \\frac{t}{d}$", "isCorrect": false, "rationale": "This shows an incorrect order of division. To isolate $r$, you divide $d$ by $t$, not $t$ by $d$."}, {"text": "$r = \\frac{d}{t}$", "isCorrect": true, "rationale": "To isolate $r$ in the equation $d = rt$, divide both sides by $t$. This yields $r = \\frac{d}{t}$."}]}, {"question": "The formula for the circumference of a circle is $C = 2\\pi r$. Solve for $\\pi$.", "options": [{"text": "$\\pi = \\frac{C}{2r}$", "isCorrect": true, "rationale": "To isolate $\\pi$ in $C = 2\\pi r$, divide both sides by the product of the other terms, $2r$. This gives $\\pi = \\frac{C}{2r}$."}, {"text": "$\\pi = C - 2r$", "isCorrect": false, "rationale": "This incorrectly uses subtraction instead of division to undo the multiplication involving $\\pi$."}, {"text": "$\\pi = 2Cr$", "isCorrect": false, "rationale": "This incorrectly multiplies all terms, rather than dividing to isolate $\\pi$."}, {"text": "$\\pi = \\frac{2r}{C}$", "isCorrect": false, "rationale": "This shows an incorrect order of division, placing $2r$ in the numerator instead of $C$."}]}, {"question": "In physics, the formula for force is $F = ma$. If you are asked to solve for acceleration ($a$), what is the first and correct algebraic step?", "options": [{"text": "Add $m$ to both sides.", "isCorrect": false, "rationale": "Adding $m$ is incorrect because $m$ is multiplied by $a$, not added to it."}, {"text": "Subtract $m$ from both sides.", "isCorrect": false, "rationale": "Subtracting $m$ is incorrect for the same reason as adding; the operation linking $m$ and $a$ is multiplication."}, {"text": "Divide both sides by $m$.", "isCorrect": true, "rationale": "To isolate $a$ when it is multiplied by $m$, you must perform the inverse operation, which is to divide both sides by $m$. This yields $a = F/m$."}, {"text": "Multiply both sides by $m$.", "isCorrect": false, "rationale": "Multiplying both sides by $m$ would result in $Fm = m^2a$, moving further from isolating $a$."}]}, {"question": "According to the text, why is solving literal equations considered an essential skill, particularly in science courses?", "options": [{"text": "It helps in memorizing complex formulas.", "isCorrect": false, "rationale": "While familiarity might aid recall, the primary benefit highlighted is the ability to manipulate, not just memorize, formulas."}, {"text": "It simplifies calculations by always yielding integer solutions.", "isCorrect": false, "rationale": "Solving literal equations does not guarantee integer solutions, and this is not its stated primary purpose."}, {"text": "It allows rearrangement of formulas to find unknown variables.", "isCorrect": true, "rationale": "The 'note' section states that 'you may rearrange $PV = nRT$ to solve for $T$' and 'find $a$' from $F=ma$, highlighting the ability to isolate different variables."}, {"text": "It reduces the number of variables in an equation to one.", "isCorrect": false, "rationale": "The process isolates one variable, but the literal equation itself still contains multiple variables; it doesn't reduce their total count."}]}, {"question": "When solving the literal equation $A = \\frac{1}{2}bh$ for $h$, which of the following expressions represents the *most simplified* and preferred final answer as per the text's caution?", "options": [{"text": "$h = \\frac{A}{\\frac{1}{2}b}$", "isCorrect": false, "rationale": "While mathematically equivalent, this form has a fraction in the denominator, which is not considered fully simplified. The caution emphasizes full simplification."}, {"text": "$h = A \\div (\\frac{1}{2}b)$", "isCorrect": false, "rationale": "This uses division notation and has a fraction in the divisor, which is not the most simplified algebraic form."}, {"text": "$h = \\frac{2A}{b}$", "isCorrect": true, "rationale": "This is the fully simplified form. To solve $A = \\frac{1}{2}bh$ for $h$, you multiply both sides by 2 ($2A = bh$) and then divide by $b$, resulting in $h = \\frac{2A}{b}$. The caution specifically mentions this as the preferred simplified form over $h = A / (\\frac{1}{2}b)$."}, {"text": "$h = A \\cdot 2 \\cdot \\frac{1}{b}$", "isCorrect": false, "rationale": "Although algebraically correct, this is not presented in the most concise and simplified form typically expected for a final answer."}]}, {"question": "The formula for simple interest is $I = PRT$, where $I$ is interest, $P$ is principal, $R$ is rate, and $T$ is time. Solve this formula for $P$.", "options": [{"text": "$P = I - RT$", "isCorrect": false, "rationale": "This incorrectly uses subtraction to undo the multiplication of $P$ by $R$ and $T$."}, {"text": "$P = \\frac{I}{RT}$", "isCorrect": true, "rationale": "To isolate $P$, which is multiplied by $R$ and $T$, you must divide both sides of the equation by the product $RT$. This results in $P = \\frac{I}{RT}$."}, {"text": "$P = IRT$", "isCorrect": false, "rationale": "This would result from multiplying $I$ by $R$ and $T$, which is the opposite of what is needed to isolate $P$."}, {"text": "$P = \\frac{RT}{I}$", "isCorrect": false, "rationale": "This shows an incorrect order of division, placing $RT$ in the numerator instead of $I$."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
