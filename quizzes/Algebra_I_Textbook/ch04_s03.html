        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the slope of a non-vertical line primarily measure?", "options": [{"text": "The total length of the line segment between two points.", "isCorrect": false, "rationale": "The slope measures steepness and direction, not the physical length of a segment."}, {"text": "The steepness of the line and the rate at which y-values change relative to x-values.", "isCorrect": true, "rationale": "As stated in the text, 'the slope of a line measures exactly this kind of steepness' and 'tells you how fast the y-values change relative to the x-values'."}, {"text": "The area enclosed by the line and the axes.", "isCorrect": false, "rationale": "The slope is a measure of the line's inclination, not an area calculation."}, {"text": "The point where the line intersects the y-axis.", "isCorrect": false, "rationale": "The y-intercept indicates where the line crosses the y-axis, which is a different property than slope."}]}, {"question": "Calculate the slope of the line passing through the points $(-2, 7)$ and $(4, -5)$.", "options": [{"text": "$m = 2$", "isCorrect": false, "rationale": "This result would occur if the change in y was positive 12 and change in x was 6, or if there was an error in signs."}, {"text": "$m = -2$", "isCorrect": true, "rationale": "Using the slope formula $m = (y_2 - y_1) / (x_2 - x_1)$, we get $m = (-5 - 7) / (4 - (-2)) = -12 / (4 + 2) = -12 / 6 = -2$."}, {"text": "$m = 1/2$", "isCorrect": false, "rationale": "This result would occur if the change in y was 6 and change in x was 12, or if the order of subtraction was inconsistent and inverted."}, {"text": "$m = -1/2$", "isCorrect": false, "rationale": "This result would occur if the change in y was -6 and change in x was 12."}]}, {"question": "A student calculates the slope of a line to be $5/0$. Which of the following statements correctly describes this line?", "options": [{"text": "The line has a slope of $0$, indicating it is horizontal.", "isCorrect": false, "rationale": "A slope of 0 means the numerator (change in y) is 0, not the denominator (change in x). This describes a horizontal line ($0/k = 0$). Dividing by zero leads to an undefined slope."}, {"text": "The line has a positive slope, indicating it rises from left to right.", "isCorrect": false, "rationale": "A positive slope means both numerator and denominator are non-zero and have the same sign. Division by zero results in an undefined slope, not a positive one."}, {"text": "The line is vertical, meaning its slope is undefined.", "isCorrect": true, "rationale": "When the denominator ($x_2 - x_1$) of the slope formula is $0$, it means the run is $0$. This indicates a vertical line, and division by zero makes the slope undefined, as stated in the 'caution' section."}, {"text": "The line has a negative slope, indicating it falls from left to right.", "isCorrect": false, "rationale": "A negative slope occurs when the numerator and denominator have opposite signs. Division by zero results in an undefined slope, not a negative one."}]}, {"question": "A linear model for a car's gas tank shows the amount of gas remaining in gallons ($y$) after driving $x$ miles. If the slope of this line is $-0.05$, what does this mean in practical terms?", "options": [{"text": "The car can drive $0.05$ miles for every gallon of gas.", "isCorrect": false, "rationale": "This would be the inverse of the slope (miles per gallon), not the slope itself (gallons per mile). The units are 'gallons per mile'."}, {"text": "The car consumes $0.05$ gallons of gas for every mile driven.", "isCorrect": true, "rationale": "The slope represents the rate of change of y with respect to x. A slope of $-0.05$ (gallons/mile) means the amount of gas ($y$) decreases by $0.05$ gallons for every $1$ mile driven ($x$). This signifies consumption."}, {"text": "The car's gas tank has a capacity of $0.05$ gallons.", "isCorrect": false, "rationale": "The slope describes the rate of change, not the initial capacity or a fixed amount in the tank."}, {"text": "The gas tank is being filled with $0.05$ gallons of gas per mile driven.", "isCorrect": false, "rationale": "A negative slope indicates a decrease, not an increase (filling). A positive slope would suggest filling."}]}, {"question": "The slope formula $m = (y_2 - y_1) / (x_2 - x_1)$ is only valid under a specific condition. What is that condition?", "options": [{"text": "$y_1  eq y_2$, to ensure the line is not horizontal.", "isCorrect": false, "rationale": "If $y_1 = y_2$, the slope is $0$, which is a valid slope for a horizontal line. The formula works in this case."}, {"text": "$x_1  eq x_2$, to prevent division by zero and ensure the line is not vertical.", "isCorrect": true, "rationale": "The text explicitly states the slope is for a 'non-vertical line' and shows that $x_2 - x_1 = 0$ leads to an undefined slope. Division by zero is mathematically undefined."}, {"text": "Both $x_1$ and $y_1$ must be $0$, meaning one point is the origin.", "isCorrect": false, "rationale": "The slope formula works for any two distinct points on a non-vertical line, regardless of whether they include the origin."}, {"text": "The line must pass through the origin $(0,0)$.", "isCorrect": false, "rationale": "This is a specific condition for a line, but not a general requirement for the slope formula itself."}]}, {"question": "When using the slope formula with two points, $(x_1, y_1)$ and $(x_2, y_2)$, why is it important to subtract the coordinates in the same order in both the numerator and the denominator?", "options": [{"text": "To ensure the calculated slope is always a positive value.", "isCorrect": false, "rationale": "The slope can be negative, and consistent subtraction correctly reflects this. Inconsistent subtraction would alter the sign incorrectly if only one part was reversed."}, {"text": "To correctly determine both the sign and magnitude of the slope (rise over run).", "isCorrect": true, "rationale": "The text states, 'as long as you subtract the coordinates in the same order in both the numerator and the denominator.' Reversing the order in only one part (e.g., $(y_2-y_1)/(x_1-x_2)$) would invert the sign of the slope, leading to an incorrect result. Consistent order maintains the correct direction and magnitude of the change."}, {"text": "To guarantee that the line is not a vertical line.", "isCorrect": false, "rationale": "The condition for a non-vertical line is $x_1  eq x_2$, which is independent of the order of subtraction (as long as it's consistent)."}, {"text": "It only affects the units of the slope, not its numerical value.", "isCorrect": false, "rationale": "The units of slope are determined by the units of y and x, not the order of subtraction. The order of subtraction directly impacts the numerical value and sign of the slope."}]}, {"question": "A line passes through the points $(5, -3)$ and $(5, 8)$. What type of slope does this line have?", "options": [{"text": "Positive slope", "isCorrect": false, "rationale": "A positive slope occurs when the x-values and y-values both increase (or both decrease) together. Here, the x-values are constant."}, {"text": "Negative slope", "isCorrect": false, "rationale": "A negative slope occurs when one coordinate increases while the other decreases. Here, the x-values are constant."}, {"text": "Zero slope", "isCorrect": false, "rationale": "A zero slope means the change in y is zero ($y_2 - y_1 = 0$), indicating a horizontal line. In this case, the change in x is zero."}, {"text": "Undefined slope", "isCorrect": true, "rationale": "Using the slope formula, $m = (8 - (-3)) / (5 - 5) = 11 / 0$. Since division by zero is undefined, the slope is undefined, indicating a vertical line, as demonstrated in the 'Slope of Horizontal and Vertical Lines' example."}]}, {"question": "If a line has a positive slope, how would it typically appear on a coordinate plane when viewed from left to right?", "options": [{"text": "It would descend downwards.", "isCorrect": false, "rationale": "A line that descends from left to right has a negative slope."}, {"text": "It would be a perfectly horizontal line.", "isCorrect": false, "rationale": "A horizontal line has a slope of $0$."}, {"text": "It would ascend upwards.", "isCorrect": true, "rationale": "A positive slope means that as the x-values increase (moving right), the y-values also increase (moving up). Thus, the line ascends from left to right, as implied by 'rises 2 units for every 1 unit it moves to the right' in an example."}, {"text": "It would be a perfectly vertical line.", "isCorrect": false, "rationale": "A vertical line has an undefined slope."}]}, {"question": "A plant is $10$ cm tall when first measured. After $2$ weeks, it is $16$ cm tall. After $5$ weeks from the initial measurement, it is $25$ cm tall. Assuming linear growth, what is the plant's average growth rate (slope) in cm per week over the entire 5-week period?", "options": [{"text": "$3$ cm/week", "isCorrect": true, "rationale": "To find the average growth rate over the entire period, use the initial point $(0, 10)$ and the final point $(5, 25)$. The slope is $m = (25 - 10) / (5 - 0) = 15 / 5 = 3$ cm/week."}, {"text": "$3.33$ cm/week", "isCorrect": false, "rationale": "This would be an incorrect calculation for the average growth rate over the given 5-week period."}, {"text": "$3.5$ cm/week", "isCorrect": false, "rationale": "This would be an incorrect calculation for the average growth rate over the given 5-week period."}, {"text": "$2$ cm/week", "isCorrect": false, "rationale": "This is incorrect. The plant grew from 16 cm to 25 cm (9 cm) over 3 weeks (from week 2 to week 5), which is 3 cm/week. However, the overall average considers the full 5-week span."}]}, {"question": "A line has a slope of $-3$. If it passes through the points $(1, k)$ and $(3, -7)$, what is the value of $k$?", "options": [{"text": "$k = -1$", "isCorrect": true, "rationale": "Using the slope formula: $m = (y_2 - y_1) / (x_2 - x_1)$. We have $-3 = (-7 - k) / (3 - 1)$. This simplifies to $-3 = (-7 - k) / 2$. Multiplying both sides by 2 gives $-6 = -7 - k$. Adding 7 to both sides yields $1 = -k$, so $k = -1$."}, {"text": "$k = 1$", "isCorrect": false, "rationale": "If $k=1$, the slope would be $(-7 - 1) / (3 - 1) = -8 / 2 = -4$, not $-3$."}, {"text": "$k = -13$", "isCorrect": false, "rationale": "If $k=-13$, the slope would be $(-7 - (-13)) / (3 - 1) = ( -7 + 13 ) / 2 = 6 / 2 = 3$, not $-3$."}, {"text": "$k = 5$", "isCorrect": false, "rationale": "If $k=5$, the slope would be $(-7 - 5) / (3 - 1) = -12 / 2 = -6$, not $-3$."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
