    };

<div class="quiz-container">

        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 7, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the textbook, which of the following expressions correctly represents the factorization of a difference of squares?", "options": [{"text": "a^2 - b^2 = (a - b)^2", "isCorrect": false, "rationale": "This expression is the factorization pattern for a perfect square trinomial with a negative middle term, not a difference of squares. The expansion would be a^2 - 2ab + b^2."}, {"text": "a^2 - b^2 = (a + b)(a - b)", "isCorrect": true, "rationale": "This is the correct factoring pattern for a difference of squares, as stated in the 'Difference of Squares' property. It reverses the product of a sum and a difference."}, {"text": "a^2 - b^2 = a^2 - 2ab + b^2", "isCorrect": false, "rationale": "This is the expanded form of (a - b)^2, which is a perfect square trinomial, not the factored form of a^2 - b^2."}, {"text": "a^2 - b^2 = (a + b)^2", "isCorrect": false, "rationale": "This expression is the factorization pattern for a perfect square trinomial with a positive middle term. The expansion would be a^2 + 2ab + b^2."}], "id": "q01"}, {"question": "Factor the expression x^2 - 81 using the difference of squares pattern.", "options": [{"text": "(x - 9)^2", "isCorrect": false, "rationale": "This would expand to x^2 - 18x + 81, which is not equivalent to x^2 - 81. It is a perfect square trinomial form."}, {"text": "(x + 9)(x - 9)", "isCorrect": true, "rationale": "Recognizing x^2 as (x)^2 and 81 as (9)^2, and applying the difference of squares pattern (a + b)(a - b), where a = x and b = 9, yields (x + 9)(x - 9)."}, {"text": "(x + 9)^2", "isCorrect": false, "rationale": "This would expand to x^2 + 18x + 81, which is not equivalent to x^2 - 81. It is a perfect square trinomial form."}, {"text": "Prime", "isCorrect": false, "rationale": "The expression x^2 - 81 is a difference of squares, which is factorable, not prime."}], "id": "q02"}, {"question": "Which of the following expressions is considered prime over the real numbers according to the textbook's caution note?", "options": [{"text": "m^2 - 16", "isCorrect": false, "rationale": "This is a difference of squares (m)^2 - (4)^2, which factors as (m + 4)(m - 4). Thus, it is not prime."}, {"text": "4y^2 - 25", "isCorrect": false, "rationale": "This is a difference of squares (2y)^2 - (5)^2, which factors as (2y + 5)(2y - 5). Thus, it is not prime."}, {"text": "z^2 + 36", "isCorrect": true, "rationale": "As explicitly stated in the caution note, a sum of squares (a^2 + b^2) does not factor over the real numbers and is considered prime."}, {"text": "x^2 + 8x + 16", "isCorrect": false, "rationale": "This is a perfect square trinomial (x)^2 + 2(x)(4) + (4)^2, which factors as (x + 4)^2. Thus, it is not prime."}], "id": "q03"}, {"question": "Factor the expression 49a^2 - 64b^2.", "options": [{"text": "(7a - 8b)^2", "isCorrect": false, "rationale": "This would expand to 49a^2 - 112ab + 64b^2, which is not equivalent to the given expression."}, {"text": "(7a + 8b)(7a - 8b)", "isCorrect": true, "rationale": "Recognizing 49a^2 as (7a)^2 and 64b^2 as (8b)^2, and applying the difference of squares pattern (a + b)(a - b), where a = 7a and b = 8b, yields (7a + 8b)(7a - 8b)."}, {"text": "(49a + 64b)(a - b)", "isCorrect": false, "rationale": "This factorization is incorrect and does not result in the original expression when multiplied out."}, {"text": "Prime", "isCorrect": false, "rationale": "The expression is a difference of two perfect squares, so it is factorable, not prime."}], "id": "q04"}, {"question": "Which condition must be met for a trinomial to be classified as a perfect square trinomial?", "options": [{"text": "The first and last terms are perfect squares, and the middle term is simply the product of the square roots of the first and last terms.", "isCorrect": false, "rationale": "The middle term must be *twice* the product of the square roots, not just the product. Missing the factor of 2 makes this incorrect."}, {"text": "The first and last terms are perfect squares, and the middle term equals 2 (square root of the first term) (square root of the last term).", "isCorrect": true, "rationale": "This statement accurately reflects the definition provided in the 'Perfect Square Trinomials' property, ensuring the middle term matches either +2ab or -2ab."}, {"text": "The first and last terms are perfect squares, and the middle term is always negative.", "isCorrect": false, "rationale": "The middle term can be positive (for (a+b)^2) or negative (for (a-b)^2). Therefore, it is not 'always negative'."}, {"text": "Only the first term needs to be a perfect square, and the middle term is half the last term.", "isCorrect": false, "rationale": "Both the first and last terms must be perfect squares. The relationship between the middle and last terms is also incorrectly described."}], "id": "q05"}, {"question": "Factor the perfect square trinomial x^2 + 12x + 36.", "options": [{"text": "(x - 6)^2", "isCorrect": false, "rationale": "This would result in x^2 - 12x + 36, which has a negative middle term, unlike the given expression."}, {"text": "(x + 12)(x + 3)", "isCorrect": false, "rationale": "Multiplying this out yields x^2 + 15x + 36, which is not equivalent to the given expression."}, {"text": "(x + 6)^2", "isCorrect": true, "rationale": "Here, a = x and b = 6. The first term is (x)^2, the last term is (6)^2, and the middle term is 2(x)(6) = 12x. This matches the a^2 + 2ab + b^2 = (a + b)^2 pattern."}, {"text": "Prime", "isCorrect": false, "rationale": "The expression is a perfect square trinomial, which is factorable, not prime."}], "id": "q06"}, {"question": "Factor the expression 9k^2 - 30k + 25.", "options": [{"text": "(3k + 5)^2", "isCorrect": false, "rationale": "This would result in 9k^2 + 30k + 25, which has a positive middle term, unlike the given expression."}, {"text": "(9k - 5)(k - 5)", "isCorrect": false, "rationale": "Multiplying this out yields 9k^2 - 50k + 25, which is not equivalent to the given expression."}, {"text": "(3k - 5)^2", "isCorrect": true, "rationale": "Here, a = 3k and b = 5. The first term is (3k)^2 = 9k^2, the last term is (5)^2 = 25, and the middle term is 2(3k)(-5) = -30k. This matches the a^2 - 2ab + b^2 = (a - b)^2 pattern."}, {"text": "(3k - 25)(3k - 1)", "isCorrect": false, "rationale": "This factorization is incorrect and does not result in the original expression when multiplied out."}], "id": "q07"}, {"question": "Which of the following trinomials is a perfect square trinomial?", "options": [{"text": "p^2 - 10p + 100", "isCorrect": false, "rationale": "For p^2 - 10p + 100, (p)^2 is the first term and (10)^2 is the last. The middle term should be 2(p)(10) = 20p or -20p, not -10p."}, {"text": "4q^2 + 14q + 9", "isCorrect": false, "rationale": "For 4q^2 + 14q + 9, (2q)^2 is the first term and (3)^2 is the last. The middle term should be 2(2q)(3) = 12q, not 14q."}, {"text": "16r^2 - 40r + 25", "isCorrect": true, "rationale": "For 16r^2 - 40r + 25, (4r)^2 is the first term and (5)^2 is the last. The middle term is 2(4r)(-5) = -40r, which matches the required condition for a perfect square trinomial (a - b)^2."}, {"text": "s^2 + 8s + 64", "isCorrect": false, "rationale": "For s^2 + 8s + 64, (s)^2 is the first term and (8)^2 is the last. The middle term should be 2(s)(8) = 16s, not 8s."}], "id": "q08"}, {"question": "Which of the following polynomials CANNOT be factored using one of the 'special forms' (difference of squares or perfect square trinomials) discussed in this section?", "options": [{"text": "100x^2 - 1", "isCorrect": false, "rationale": "This is a difference of squares: (10x)^2 - (1)^2, which factors as (10x + 1)(10x - 1). Thus, it can be factored using a special form."}, {"text": "y^2 - 16y + 64", "isCorrect": false, "rationale": "This is a perfect square trinomial: (y)^2 - 2(y)(8) + (8)^2, which factors as (y - 8)^2. Thus, it can be factored using a special form."}, {"text": "z^2 + 7z + 12", "isCorrect": true, "rationale": "This trinomial is not a difference of squares nor a sum of squares. For it to be a perfect square trinomial, the middle term would need to be 2(z)(sqrt(12)), which is not 7z. This trinomial factors as (z + 3)(z + 4), but not using the special forms presented."}, {"text": "9m^2 + 24m + 16", "isCorrect": false, "rationale": "This is a perfect square trinomial: (3m)^2 + 2(3m)(4) + (4)^2, which factors as (3m + 4)^2. Thus, it can be factored using a special form."}], "id": "q09"}, {"question": "If you have an expression in the form A^2 - B^2, and A = 5x and B = 2y, what is its correctly factored form?", "options": [{"text": "(5x - 2y)^2", "isCorrect": false, "rationale": "This would expand to 25x^2 - 20xy + 4y^2, which is a perfect square trinomial and not the difference of squares of A and B."}, {"text": "25x^2 + 4y^2", "isCorrect": false, "rationale": "This is the sum of squares, not the factored form of the difference of squares, and it is considered prime over real numbers."}, {"text": "(5x + 2y)(5x - 2y)", "isCorrect": true, "rationale": "Applying the difference of squares pattern (A + B)(A - B) directly with A = 5x and B = 2y results in (5x + 2y)(5x - 2y)."}, {"text": "(5x + 2y)^2", "isCorrect": false, "rationale": "This would expand to 25x^2 + 20xy + 4y^2, which is a perfect square trinomial and not the difference of squares of A and B."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
