    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 5, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary objective of using the elimination method to solve a system of two linear equations?", "options": [{"text": "To graphically determine the intersection point of the lines.", "isCorrect": false, "rationale": "The elimination method is an algebraic technique, not a graphical one. Graphing is a separate method for solving systems."}, {"text": "To transform the equations into slope-intercept form.", "isCorrect": false, "rationale": "While equations might be rewritten, the core objective of elimination is to remove a variable, not specifically to convert to slope-intercept form."}, {"text": "To add or subtract the equations so that one variable is removed.", "isCorrect": true, "rationale": "The text explicitly states that the elimination method 'solves a system by adding or subtracting the equations so that one variable drops out.'"}, {"text": "To substitute an expression from one equation into the other.", "isCorrect": false, "rationale": "Substituting an expression is the defining characteristic of the substitution method, not the elimination method."}], "id": "q01"}, {"question": "According to the 'Elimination Method' property, what is the *first* step when applying this method to a system of two equations?", "options": [{"text": "Multiply one or both equations by constants.", "isCorrect": false, "rationale": "Multiplying equations is a subsequent step, necessary if coefficients are not already opposites. The very first step is about formatting the equations."}, {"text": "Solve the resulting equation for the remaining variable.", "isCorrect": false, "rationale": "Solving for a variable comes much later, after the elimination step has been performed."}, {"text": "Write both equations in standard form ($Ax + By = C$).", "isCorrect": true, "rationale": "The text states this explicitly as the first step: 'Write both equations in standard form ($Ax + By = C$).'"}, {"text": "Substitute back into either original equation.", "isCorrect": false, "rationale": "Substitution is a step taken after one variable has been solved for, to find the value of the second variable."}], "id": "q02"}, {"question": "Consider the system: $2x + 5y = 1$ and $3x + 2y = -4$. To eliminate the $x$ variable, what is a correct set of constants to multiply the equations by?", "options": [{"text": "Multiply the first equation by 2 and the second equation by 3.", "isCorrect": false, "rationale": "Multiplying by these constants would result in $4x$ and $9x$, which are not opposites and would not eliminate $x$ upon addition."}, {"text": "Multiply the first equation by 3 and the second equation by -2.", "isCorrect": true, "rationale": "As demonstrated in the example, multiplying the first equation by 3 yields $6x$, and multiplying the second equation by -2 yields $-6x$. These are opposites and will eliminate $x$ when added."}, {"text": "Multiply the first equation by -5 and the second equation by 2.", "isCorrect": false, "rationale": "This combination would aim to eliminate the $y$ variable, not the $x$ variable, resulting in $-25y$ and $4y$, which are not opposites."}, {"text": "Multiply the first equation by -3 and the second equation by -2.", "isCorrect": false, "rationale": "This would result in $-6x$ and $-6x$. Adding these would result in $-12x$, not an elimination of the variable."}], "id": "q03"}, {"question": "Under what condition is the elimination method described as 'especially efficient'?", "options": [{"text": "When one of the equations is already solved for a variable (e.g., $y = 2x + 7$).", "isCorrect": false, "rationale": "When an equation is already solved for a variable, the substitution method is typically more efficient."}, {"text": "When both equations are already in slope-intercept form.", "isCorrect": false, "rationale": "Slope-intercept form is often preferred for graphing. While useful, it doesn't inherently make elimination more efficient than other methods unless the coefficients are easily made opposite."}, {"text": "When the coefficients of a variable are already the same or opposites.", "isCorrect": true, "rationale": "The text implies this efficiency, especially when stating, 'It is especially efficient when neither equation is already solved for a variable.' The examples further illustrate that having opposite coefficients (or easily made opposite) makes the method quick."}, {"text": "When the system consists of three equations and three variables.", "isCorrect": false, "rationale": "The text mentions extending to larger systems in Algebra II, but for *two* equations, this condition is not applicable, and it's not the reason for efficiency in the context of the provided section."}], "id": "q04"}, {"question": "In the example of 'Elimination by Addition' given: $3x + 2y = 16$ and $3x - 2y = 8$. What is the resulting simplified equation after adding the two equations?", "options": [{"text": "$6x + 4y = 24$", "isCorrect": false, "rationale": "This result implies that the $y$ terms were not eliminated and were incorrectly added. The $2y$ and $-2y$ should sum to zero."}, {"text": "$4y = 8$", "isCorrect": false, "rationale": "This implies that the $x$ terms were eliminated, which is incorrect. The $x$ terms were added, and the $y$ terms were eliminated."}, {"text": "$6x = 24$", "isCorrect": true, "rationale": "When $3x + 2y = 16$ and $3x - 2y = 8$ are added, the $x$ terms combine to $6x$, and the $y$ terms ($2y$ and $-2y$) cancel out, while the constants add to $24$, resulting in $6x = 24$."}, {"text": "$0 = 24$", "isCorrect": false, "rationale": "This result would indicate no solution, but in this specific example, a solution exists, and the $x$ terms do not cancel out."}], "id": "q05"}, {"question": "What happens if, during the elimination process, the equations combine to form a contradiction like $0 = 22$?", "options": [{"text": "It means the system has infinitely many solutions.", "isCorrect": false, "rationale": "Infinitely many solutions occur when the equations are dependent and result in an identity (e.g., $0 = 0$), not a contradiction."}, {"text": "It indicates a calculation error and the process should be restarted.", "isCorrect": false, "rationale": "While calculation errors are possible, this specific outcome ($0 = \text{non-zero number}$) is a meaningful result in itself, not necessarily an error."}, {"text": "It means the system has no solution, and the lines are parallel.", "isCorrect": true, "rationale": "The text explicitly states: 'The contradiction $0 = 22$ tells us the system has no solution. The lines are parallel.'"}, {"text": "It implies that one of the variables has a value of zero.", "isCorrect": false, "rationale": "This outcome does not provide a specific value for any variable; instead, it indicates the absence of a solution that satisfies both equations simultaneously."}], "id": "q06"}, {"question": "After successfully eliminating a variable and solving for the remaining one, what is the *next* step in the elimination method?", "options": [{"text": "Check the solution in both original equations.", "isCorrect": false, "rationale": "Checking the solution is the final step, performed after both variables have been found. This question asks for the step immediately after solving for the first variable."}, {"text": "Graph the original equations to find the intersection.", "isCorrect": false, "rationale": "Graphing is a different method and not a step within the algebraic elimination process."}, {"text": "Substitute the value found back into either original equation.", "isCorrect": true, "rationale": "The steps clearly state: 'Solve the resulting equation for the remaining variable. Substitute back into either original equation to find the other variable.'"}, {"text": "Multiply the equations by new constants to eliminate the other variable.", "isCorrect": false, "rationale": "Multiplying equations for elimination is done at the beginning to remove one variable, not after one variable has already been solved for."}], "id": "q07"}, {"question": "If you have a system where the coefficients of one variable are *identical* (e.g., $5x$ and $5x$) rather than opposites, what algebraic operation would you use to eliminate that variable?", "options": [{"text": "Add the two equations.", "isCorrect": false, "rationale": "Adding identical terms (e.g., $5x + 5x = 10x$) would result in a combined term, not an elimination."}, {"text": "Subtract one equation from the other.", "isCorrect": true, "rationale": "If coefficients are identical (e.g., $5x$ and $5x$), subtracting one equation from the other ($5x - 5x = 0$) will eliminate that variable."}, {"text": "Multiply one equation by a constant.", "isCorrect": false, "rationale": "While multiplication can *create* opposites, if they are already identical, direct subtraction is the most efficient operation for elimination."}, {"text": "Divide both equations by the common coefficient.", "isCorrect": false, "rationale": "Dividing might simplify equations, but it wouldn't directly eliminate a variable by combining the two equations."}], "id": "q08"}, {"question": "Which statement best describes the 'Choosing a Method' key concept for solving systems of equations?", "options": [{"text": "The elimination method is always the most superior method.", "isCorrect": false, "rationale": "The text states that 'All three methods give the same answer' and suggests choosing based on efficiency, not universal superiority."}, {"text": "One should always use the method learned most recently to reinforce it.", "isCorrect": false, "rationale": "The recommendation is based on efficiency for the given system, not on pedagogical reinforcement."}, {"text": "The choice of method should be based on which is most efficient for the system at hand.", "isCorrect": true, "rationale": "The text explicitly states: 'Choose whichever is most efficient for the system at hand.'"}, {"text": "Substitution should be avoided as it often leads to fractions.", "isCorrect": false, "rationale": "The text makes no such qualitative judgment or recommendation to avoid any specific method."}], "id": "q09"}, {"question": "After finding values for both $x$ and $y$ using the elimination method, what is the final, crucial step to verify the solution?", "options": [{"text": "Substitute the values into an equation that was modified during the process (e.g., after multiplication).", "isCorrect": false, "rationale": "It's best practice to check the solution in the *original* equations to catch any errors made during modification or multiplication."}, {"text": "Check the solution in both original equations.", "isCorrect": true, "rationale": "The final step in the Elimination Method property is 'Check the solution in both original equations' to ensure it satisfies both initial conditions."}, {"text": "Write the solution as an ordered pair and move to the next problem.", "isCorrect": false, "rationale": "While writing the ordered pair is correct, it's not the 'final, crucial step to verify the solution' described in the text."}, {"text": "Graph the two original lines to visually confirm they intersect at the calculated point.", "isCorrect": false, "rationale": "Graphing is a separate method and while it can confirm, the prescribed final step within the elimination method is an algebraic check."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
