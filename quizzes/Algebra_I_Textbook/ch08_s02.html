<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "If the equation $x^2 = k$ has no real solutions, what must be true about the value of $k$?", "options": [{"text": "$k < 0$", "isCorrect": true, "rationale": "According to the Square Root Property, if $k$ is negative, there is no real number whose square is $k$."}, {"text": "$k = 0$", "isCorrect": false, "rationale": "When $k = 0$, the equation $x^2 = 0$ has exactly one real solution, which is $x = 0$."}, {"text": "$k > 0$", "isCorrect": false, "rationale": "If $k$ is positive, the equation will have two real solutions: one positive and one negative."}, {"text": "$k$ is not a perfect square", "isCorrect": false, "rationale": "Even if $k$ is not a perfect square, as long as it is positive, the equation has real irrational solutions."}]}, {"question": "Solve the quadratic equation $x^2 = 72$ and express the answer in simplified radical form.", "options": [{"text": "$x = \\pm 6\\sqrt{2}$", "isCorrect": true, "rationale": "Taking the square root of both sides gives $x = \\pm \\sqrt{72}$, which simplifies to $\\pm \\sqrt{36 \\cdot 2} = \\pm 6\\sqrt{2}$."}, {"text": "$x = 6\\sqrt{2}$", "isCorrect": false, "rationale": "This answer is incomplete because it omits the negative root required by the Square Root Property."}, {"text": "$x = \\pm 2\\sqrt{6}$", "isCorrect": false, "rationale": "This reflects an error in factoring $72$; the largest perfect square factor of $72$ is $36$, not $4$."}, {"text": "$x = \\pm 36\\sqrt{2}$", "isCorrect": false, "rationale": "This suggests the perfect square factor was not correctly rooted during the simplification process."}]}, {"question": "Which of the following expressions is NOT in simplified radical form?", "options": [{"text": "$\\sqrt{\\frac{3}{5}}$", "isCorrect": true, "rationale": "One of the rules for simplified radical form is that no fractions may appear under the radical."}, {"text": "$2\\sqrt{11}$", "isCorrect": false, "rationale": "This is simplified because $11$ has no perfect square factors other than $1$ and there are no fractions or denominators."}, {"text": "$5\\sqrt{3}$", "isCorrect": false, "rationale": "This is simplified because $3$ is prime and there are no radicals in the denominator or fractions under the radical."}, {"text": "$\\frac{\\sqrt{7}}{2}$", "isCorrect": false, "rationale": "This is simplified because the radical is in the numerator and $7$ has no perfect square factors."}]}, {"question": "Solve the equation $(x - 5)^2 = 18$ for $x$.", "options": [{"text": "$x = 5 \\pm 3\\sqrt{2}$", "isCorrect": true, "rationale": "Applying the Square Root Property gives $x - 5 = \\pm \\sqrt{18} = \\pm 3\\sqrt{2}$, and adding $5$ to both sides yields the final result."}, {"text": "$x = -5 \\pm 3\\sqrt{2}$", "isCorrect": false, "rationale": "This error occurs if the sign is not flipped when moving the constant $-5$ to the other side of the equation."}, {"text": "$x = 5 \\pm 9\\sqrt{2}$", "isCorrect": false, "rationale": "This indicates an error in simplifying $\\sqrt{18}$, where $9$ was treated as the square root rather than its root, $3$."}, {"text": "$x = 23$ or $x = -13$", "isCorrect": false, "rationale": "This result stems from failing to take the square root of $18$ and instead treating the equation as $x - 5 = \\pm 18$."}]}, {"question": "Solve the quadratic equation $3x^2 - 150 = 0$.", "options": [{"text": "$x = \\pm 5\\sqrt{2}$", "isCorrect": true, "rationale": "First, isolate $x^2$ to get $x^2 = 50$, then apply the square root property to get $x = \\pm \\sqrt{50} = \\pm 5\\sqrt{2}$."}, {"text": "$x = \\pm 50$", "isCorrect": false, "rationale": "This answer fails to apply the square root to the isolated constant after dividing by $3$."}, {"text": "$x = \\pm 10\\sqrt{3}$", "isCorrect": false, "rationale": "This error suggests the square root was applied to the initial constant $300$ or a similar miscalculation before division."}, {"text": "No real solution", "isCorrect": false, "rationale": "While the equation involves a negative constant, once $150$ is moved to the other side, the equation $x^2 = 50$ has real solutions."}]}, {"question": "What are the solutions to the equation $(2x + 1)^2 = 49$?", "options": [{"text": "$x = 3$ and $x = -4$", "isCorrect": true, "rationale": "Setting $2x + 1 = 7$ gives $x = 3$, and setting $2x + 1 = -7$ gives $x = -4$."}, {"text": "$x = \\pm 3$", "isCorrect": false, "rationale": "This assumes the binomial structure results in symmetric solutions, which is only true if the linear constant is zero."}, {"text": "$x = 4$ and $x = -3$", "isCorrect": false, "rationale": "This typically results from a sign error when solving the two linear equations $2x + 1 = 7$ and $2x + 1 = -7$."}, {"text": "$x = \\pm 7$", "isCorrect": false, "rationale": "This reflects the roots of $49$ but fails to solve for $x$ by accounting for the operations inside the parentheses."}]}, {"question": "Solve the equation $x^2 + 25 = 0$ in the real number system.", "options": [{"text": "No real solution", "isCorrect": true, "rationale": "Isolating $x^2$ results in $x^2 = -25$; since $k < 0$, there is no real number that satisfies the equation."}, {"text": "$x = \\pm 5$", "isCorrect": false, "rationale": "This would be the solution for $x^2 - 25 = 0$; here, squaring any real number cannot result in a negative $25$."}, {"text": "$x = -5$", "isCorrect": false, "rationale": "While $(-5)^2$ is $25$, $25 + 25$ does not equal $0$."}, {"text": "$x = \\pm 5i$", "isCorrect": false, "rationale": "While technically correct in the complex number system, the material specifies that in this course, we work only with real numbers."}]}, {"question": "Solve for $x$: $(x + 4)^2 = 7$.", "options": [{"text": "$x = -4 \\pm \\sqrt{7}$", "isCorrect": true, "rationale": "Applying the Square Root Property gives $x + 4 = \\pm \\sqrt{7}$, and subtracting $4$ from both sides provides the roots."}, {"text": "$x = 4 \\pm \\sqrt{7}$", "isCorrect": false, "rationale": "This error occurs if the sign of the constant term is not changed when isolating $x$."}, {"text": "$x = \\pm \\sqrt{11}$", "isCorrect": false, "rationale": "This represents a misunderstanding of how to isolate $x$, attempting to combine the terms under the radical incorrectly."}, {"text": "$x = -4 \\pm 7$", "isCorrect": false, "rationale": "This mistake happens if the square root is not applied to the right side of the equation."}]}, {"question": "True or False: The equation $x^2 = 100$ is completely solved by stating $x = 10$.", "options": [{"text": "False — the complete solution is $x = \\pm 10$.", "isCorrect": true, "rationale": "The Square Root Property states that $x^2 = k$ has two solutions, $\\pm \\sqrt{k}$, so $x = -10$ is also a valid solution."}, {"text": "True — because $10^2 = 100$ confirms the solution.", "isCorrect": false, "rationale": "While $10$ is a solution, it is incomplete because squaring $-10$ also results in $100$."}, {"text": "True — because the principal square root of $100$ is $10$, which is the only real answer.", "isCorrect": false, "rationale": "The principal square root gives only the positive root, but the equation $x^2 = 100$ requires both the positive and negative roots."}, {"text": "False — because $x^2 = 100$ has no real solutions.", "isCorrect": false, "rationale": "The equation does have real solutions since $100$ is positive. The Square Root Property guarantees two real solutions: $x = 10$ and $x = -10$."}]}, {"question": "Solve the equation $x^2 = \\frac{3}{4}$ and express the solution in simplified radical form.", "options": [{"text": "$x = \\pm \\frac{\\sqrt{3}}{2}$", "isCorrect": true, "rationale": "Taking the square root gives $\\pm \\sqrt{\\frac{3}{4}}$, which simplifies to $\\frac{\\pm \\sqrt{3}}{\\sqrt{4}} = \\pm \\frac{\\sqrt{3}}{2}$."}, {"text": "$x = \\pm \\frac{3}{2}$", "isCorrect": false, "rationale": "This error occurs if the numerator is treated as a perfect square during the rooting process."}, {"text": "$x = \\frac{\\sqrt{3}}{2}$", "isCorrect": false, "rationale": "This answer is incomplete as it lacks the negative root provided by the Square Root Property."}, {"text": "$x = \\pm \\sqrt{0.75}$", "isCorrect": false, "rationale": "While numerically equivalent, this is not in simplified radical form because it contains a decimal/fraction under the radical."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
