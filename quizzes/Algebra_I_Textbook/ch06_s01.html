<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the expression a^n, what does the exponent n tell you?", "options": [{"text": "The value to which the base is added.", "isCorrect": false, "rationale": "The exponent describes multiplication, not addition. a^n means a is used as a factor n times."}, {"text": "How many times the base a appears as a factor.", "isCorrect": true, "rationale": "By definition, a^n = a * a * ... * a (n factors). The exponent counts the number of times the base is multiplied."}, {"text": "How many times you add the base to itself.", "isCorrect": false, "rationale": "Exponentiation is repeated multiplication, not repeated addition. a^n is a multiplied by itself n times."}, {"text": "The reciprocal of the base.", "isCorrect": false, "rationale": "The reciprocal of a is 1/a. The exponent simply counts how many times a appears as a factor."}]}, {"question": "Simplify x^3 * x^5 using the Product of Powers rule.", "options": [{"text": "x^15", "isCorrect": false, "rationale": "x^15 would result from multiplying the exponents (Power of a Power rule). The Product of Powers rule says to ADD exponents: x^(3+5) = x^8."}, {"text": "x^8", "isCorrect": true, "rationale": "The Product of Powers rule states a^m * a^n = a^(m+n). So x^3 * x^5 = x^(3+5) = x^8."}, {"text": "x^2", "isCorrect": false, "rationale": "Subtracting exponents (5 - 3 = 2) is the Quotient of Powers rule for division, not multiplication."}, {"text": "2x^8", "isCorrect": false, "rationale": "There is no coefficient to multiply here; the Product of Powers rule gives x^(3+5) = x^8, not 2x^8."}]}, {"question": "What is the Product of Powers rule?", "options": [{"text": "a^m * a^n = a^(m*n)", "isCorrect": false, "rationale": "Multiplying exponents is the Power of a Power rule: (a^m)^n = a^(mn). The Product of Powers rule adds exponents."}, {"text": "a^m * a^n = a^(m+n)", "isCorrect": true, "rationale": "To multiply powers with the same base, keep the base and add the exponents: a^m * a^n = a^(m+n)."}, {"text": "a^m * a^n = (a*a)^(m+n)", "isCorrect": false, "rationale": "The base stays the same; it does not get squared. The rule is a^m * a^n = a^(m+n)."}, {"text": "a^m * a^n = a^(m-n)", "isCorrect": false, "rationale": "Subtracting exponents is the Quotient of Powers rule for division. Multiplying uses addition: a^(m+n)."}]}, {"question": "Simplify (x^4)^3 using the Power of a Power rule.", "options": [{"text": "x^7", "isCorrect": false, "rationale": "Adding exponents (4 + 3 = 7) is the Product of Powers rule for multiplication. The Power of a Power rule multiplies exponents."}, {"text": "x^64", "isCorrect": false, "rationale": "x^64 would come from computing 4^3 = 64, which misapplies the rule. The rule multiplies the exponents: 4 * 3 = 12."}, {"text": "x^12", "isCorrect": true, "rationale": "The Power of a Power rule states (a^m)^n = a^(m*n). So (x^4)^3 = x^(4*3) = x^12."}, {"text": "x^1", "isCorrect": false, "rationale": "x^1 = x. The Power of a Power rule multiplies exponents: (x^4)^3 = x^(4*3) = x^12."}]}, {"question": "Simplify 3y^2 * 5y^6.", "options": [{"text": "8y^8", "isCorrect": false, "rationale": "The numerical coefficients must be multiplied, not added: 3 * 5 = 15, not 8. The result is 15y^8."}, {"text": "15y^12", "isCorrect": false, "rationale": "The exponents should be added (Product of Powers), not multiplied. The correct result is 15y^(2+6) = 15y^8."}, {"text": "15y^8", "isCorrect": true, "rationale": "Multiply coefficients: 3 * 5 = 15. Apply Product of Powers to y: y^2 * y^6 = y^(2+6) = y^8. Result: 15y^8."}, {"text": "8y^12", "isCorrect": false, "rationale": "Both operations are wrong here: 3 + 5 = 8 (should multiply to get 15) and 2 * 6 = 12 (should add to get 8)."}]}, {"question": "What does the Power of a Product rule state?", "options": [{"text": "(ab)^n = a^n + b^n", "isCorrect": false, "rationale": "Exponents do not distribute over addition. The Power of a Product rule uses multiplication: (ab)^n = a^n * b^n."}, {"text": "(ab)^n = a^n * b^n", "isCorrect": true, "rationale": "To raise a product to a power, raise each factor to that power: (ab)^n = a^n * b^n."}, {"text": "(ab)^n = (a+b)^n", "isCorrect": false, "rationale": "This incorrectly converts multiplication inside the base to addition, which changes the expression entirely."}, {"text": "(ab)^n = a^(nb)", "isCorrect": false, "rationale": "The exponent n applies to both a and b separately: (ab)^n = a^n * b^n. It does not multiply only the a exponent by b."}]}, {"question": "Simplify (2a^3)^5.", "options": [{"text": "2a^15", "isCorrect": false, "rationale": "The coefficient 2 must also be raised to the 5th power: 2^5 = 32. The result is 32a^15."}, {"text": "10a^8", "isCorrect": false, "rationale": "This incorrectly multiplies 2 by 5 and adds exponents instead of multiplying. The correct result is 2^5 * a^(3*5) = 32a^15."}, {"text": "32a^15", "isCorrect": true, "rationale": "Apply Power of a Product: (2a^3)^5 = 2^5 * (a^3)^5 = 32 * a^(3*5) = 32a^15."}, {"text": "32a^8", "isCorrect": false, "rationale": "The exponents should be multiplied by the Power of a Power rule: 3 * 5 = 15, not 3 + 5 = 8."}]}, {"question": "Simplify (4x^2 y)^3.", "options": [{"text": "12x^6 y^3", "isCorrect": false, "rationale": "The coefficient 4 must be cubed: 4^3 = 64, not 4 * 3 = 12. The result is 64x^6 y^3."}, {"text": "64x^6 y^3", "isCorrect": true, "rationale": "Apply Power of a Product: 4^3 = 64, (x^2)^3 = x^(2*3) = x^6, y^3 = y^3. Result: 64x^6 y^3."}, {"text": "64x^5 y^3", "isCorrect": false, "rationale": "The exponent of x: (x^2)^3 = x^(2*3) = x^6, not x^(2+3) = x^5."}, {"text": "64x^6 y", "isCorrect": false, "rationale": "The y factor must also be raised to the 3rd power: y^1 raised to the 3rd power gives y^3, not y^1."}]}, {"question": "A student writes x^3 * x^5 = x^15. What error did they make?", "options": [{"text": "They used the wrong base.", "isCorrect": false, "rationale": "The base x is correct. The error is in the operation applied to the exponents."}, {"text": "They multiplied the exponents instead of adding them.", "isCorrect": true, "rationale": "The Product of Powers rule requires ADDING exponents: x^3 * x^5 = x^(3+5) = x^8, not x^(3*5) = x^15."}, {"text": "They subtracted the exponents instead of adding them.", "isCorrect": false, "rationale": "Subtracting would give x^2, not x^15. The actual error was multiplying the exponents to get 15."}, {"text": "They divided the exponents instead of adding them.", "isCorrect": false, "rationale": "Division would not give 15 from 3 and 5. The error was multiplying the exponents (3 * 5 = 15) instead of adding (3 + 5 = 8)."}]}, {"question": "Simplify (-2x^3)^4.", "options": [{"text": "-16x^12", "isCorrect": false, "rationale": "(-2)^4 = 16 (positive), because a negative number raised to an even power is positive. The result is 16x^12."}, {"text": "16x^7", "isCorrect": false, "rationale": "The exponent of x should be multiplied: (x^3)^4 = x^(3*4) = x^12, not x^(3+4) = x^7."}, {"text": "16x^12", "isCorrect": true, "rationale": "(-2)^4 = 16 (even power makes positive) and (x^3)^4 = x^(3*4) = x^12. Result: 16x^12."}, {"text": "-16x^7", "isCorrect": false, "rationale": "Both the sign and the exponent are wrong. (-2)^4 = 16 (positive) and (x^3)^4 = x^12."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
