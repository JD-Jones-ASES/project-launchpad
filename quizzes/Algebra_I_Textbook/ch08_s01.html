<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 8, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "To solve the equation $x^2 - 9x + 20 = 0$ by factoring, which set of solutions is correct?", "options": [{"text": "$x = 4$ or $x = 5$", "isCorrect": true, "rationale": "Factoring the trinomial results in $(x - 4)(x - 5) = 0$, and setting each factor to zero provides the roots $4$ and $5$."}, {"text": "$x = -4$ or $x = -5$", "isCorrect": false, "rationale": "This result stems from correctly identifying the numbers that multiply to $20$ and add to $-9$, but failing to apply the Zero Product Property correctly to solve for $x$."}, {"text": "$x = 2$ or $x = 10$", "isCorrect": false, "rationale": "While these numbers multiply to $20$, their sum is $12$ rather than the required $-9$ for the middle term."}, {"text": "$x = -4$ or $x = 5$", "isCorrect": false, "rationale": "This is a common sign error occurring when one factor's sign is correctly handled while the other is not."}], "id": "q01"}, {"question": "Which of the following represents the correct standard form of the equation $x^2 - 4x = 12$?", "options": [{"text": "$x^2 - 4x - 12 = 0$", "isCorrect": true, "rationale": "Standard form requires all terms to be on one side, typically the left, equal to zero, which is achieved here by subtracting $12$ from both sides."}, {"text": "$x^2 - 4x + 12 = 0$", "isCorrect": false, "rationale": "This error occurs if the constant is moved to the left side without changing its sign from positive to negative."}, {"text": "$x(x - 4) = 12$", "isCorrect": false, "rationale": "This is a factored form of the left side but does not satisfy the definition of standard form, which requires the equation to equal zero."}, {"text": "$-x^2 + 4x + 12 = 0$", "isCorrect": false, "rationale": "While this is technically an equivalent equation, it results from moving all terms to the right side and doesn't match the traditional $ax^2 + bx + c = 0$ format for the given problem."}], "id": "q02"}, {"question": "When solving $4x^2 + 20x = 0$ using the method of factoring out the Greatest Common Factor (GCF), what are the solutions?", "options": [{"text": "$x = 0$ or $x = -5$", "isCorrect": true, "rationale": "Factoring out $4x$ gives $4x(x + 5) = 0$; setting $4x = 0$ yields $0$ and setting $x + 5 = 0$ yields $-5$."}, {"text": "$x = -5$ only", "isCorrect": false, "rationale": "This occurs if one incorrectly divides both sides by $4x$, thereby losing the solution where the variable expression equals zero."}, {"text": "$x = 0$ or $x = 5$", "isCorrect": false, "rationale": "This is a result of a sign error when solving the linear equation $x + 5 = 0$."}, {"text": "$x = 4$ or $x = -5$", "isCorrect": false, "rationale": "This mistake treats the coefficient of the GCF as a solution rather than setting the entire factor $4x$ equal to zero."}], "id": "q03"}, {"question": "What is the primary reason the source material cautions against dividing both sides of an equation by a variable expression?", "options": [{"text": "It can cause the loss of a valid solution, specifically when the variable equals zero.", "isCorrect": true, "rationale": "Dividing by a variable assumes the variable is non-zero; if the variable is zero, you are effectively dividing by zero and removing that solution from the set."}, {"text": "It changes the degree of the equation from quadratic to linear.", "isCorrect": false, "rationale": "While the degree is reduced, the primary mathematical danger is the loss of a solution that satisfies the original quadratic equation."}, {"text": "Division is not a valid algebraic operation for quadratic equations.", "isCorrect": false, "rationale": "Division is valid for constants, but dividing by variable expressions is problematic due to the potential for losing roots."}, {"text": "It makes the resulting equation impossible to factor.", "isCorrect": false, "rationale": "Dividing usually makes the equation simpler to factor (or even solves it), but it risks providing an incomplete solution set."}], "id": "q04"}, {"question": "Which set of values for $x$ satisfies the factored equation $(x - 7)(2x + 3) = 0$?", "options": [{"text": "$x = 7$ or $x = -\\frac{3}{2}$", "isCorrect": true, "rationale": "Applying the Zero Product Property, $x - 7 = 0$ gives $x = 7$, and $2x + 3 = 0$ leads to $2x = -3$, which simplifies to $x = -\\frac{3}{2}$."}, {"text": "$x = -7$ or $x = \\frac{3}{2}$", "isCorrect": false, "rationale": "This set of answers results from incorrect sign changes when solving the linear equations derived from the factors."}, {"text": "$x = 7$ or $x = -3$", "isCorrect": false, "rationale": "This error involves forgetting to divide by the coefficient $2$ when solving the linear equation $2x + 3 = 0$."}, {"text": "$x = 7$ or $x = 3$", "isCorrect": false, "rationale": "This reflects a combination of ignoring the coefficient $2$ and failing to change the sign of the constant when solving for $x$."}], "id": "q05"}, {"question": "Solve the equation $x^2 + x - 12 = 0$ by factoring.", "options": [{"text": "$x = -4$ or $x = 3$", "isCorrect": true, "rationale": "The trinomial factors into $(x + 4)(x - 3) = 0$, leading to solutions of $-4$ and $3$ via the Zero Product Property."}, {"text": "$x = 4$ or $x = -3$", "isCorrect": false, "rationale": "This result occurs if the signs in the factored form are swapped, such as using $(x - 4)(x + 3)$."}, {"text": "$x = -6$ or $x = 2$", "isCorrect": false, "rationale": "These numbers have a product of $-12$ but their sum is $-4$, which does not match the middle coefficient of $1$."}, {"text": "$x = 4$ or $x = 3$", "isCorrect": false, "rationale": "This indicates a misunderstanding of how the signs of the roots relate to the signs within the binomial factors."}], "id": "q06"}, {"question": "If a quadratic equation is written as $ax^2 + bx + c = 0$, what is the essential condition for it to remain a quadratic equation?", "options": [{"text": "$a \\ne 0$", "isCorrect": true, "rationale": "A quadratic equation must have a squared term; if $a = 0$, the $x^2$ term disappears, leaving a linear or constant equation."}, {"text": "$c \\ne 0$", "isCorrect": false, "rationale": "The constant term $c$ can be zero (e.g., $x^2 + x = 0$), and the equation will still be quadratic because the highest power remains $2$."}, {"text": "$b \\ne 0$", "isCorrect": false, "rationale": "The linear coefficient $b$ can be zero (e.g., $x^2 - 4 = 0$), and the equation is still quadratic as long as the squared term exists."}, {"text": "$a, b, c > 0$", "isCorrect": false, "rationale": "The coefficients $a, b,$ and $c$ can be any real numbers; they do not have to be positive for the equation to be quadratic."}], "id": "q07"}, {"question": "Solve the equation $x^2 = 64$ by rearranging it into standard form and factoring.", "options": [{"text": "$x = 8$ or $x = -8$", "isCorrect": true, "rationale": "Subtracting $64$ gives $x^2 - 64 = 0$, which factors as $(x - 8)(x + 8) = 0$, providing both positive and negative roots."}, {"text": "$x = 8$ only", "isCorrect": false, "rationale": "This common mistake overlooks the negative root that, when squared, also equals $64$."}, {"text": "$x = 32$ or $x = -32$", "isCorrect": false, "rationale": "This error stems from dividing the constant by $2$ instead of finding the square root during the factoring process."}, {"text": "$x = 0$ or $x = 64$", "isCorrect": false, "rationale": "This reflects a misunderstanding of how to transition a quadratic equation into standard form and identify factors."}], "id": "q08"}, {"question": "In the equation $x^2 + 10x + 25 = 0$, which property or pattern is most useful for factoring?", "options": [{"text": "Perfect Square Trinomial", "isCorrect": true, "rationale": "The expression $x^2 + 10x + 25$ follows the pattern $(x + 5)^2$, where the middle term is twice the product of the square roots of the first and last terms."}, {"text": "Difference of Squares", "isCorrect": false, "rationale": "Difference of squares requires two terms and a subtraction sign, whereas this is a three-term addition expression."}, {"text": "Greatest Common Factor (GCF)", "isCorrect": false, "rationale": "There is no common factor across all three terms besides $1$, so GCF factoring is not applicable here."}, {"text": "Zero Product Property", "isCorrect": false, "rationale": "While this property is used to *solve* the equation after factoring, it is not a technique used to *factor* the expression itself."}], "id": "q09"}, {"question": "According to the Zero Product Property, if $(x - a)(x - b) = 0$, what must be true about the relationship between the factors?", "options": [{"text": "At least one of the factors must be equal to zero.", "isCorrect": true, "rationale": "The property states that if the product of real numbers is zero, then one or more of the individual numbers must be zero."}, {"text": "Both factors must always be equal to zero simultaneously.", "isCorrect": false, "rationale": "While both *can* be zero (if $a = b$), the property only requires that *at least one* is zero to satisfy the equation."}, {"text": "The sum of the factors must also be zero.", "isCorrect": false, "rationale": "There is no requirement that the sum of the factors equals zero; only their product is relevant to this property."}, {"text": "One factor must be the negative of the other.", "isCorrect": false, "rationale": "This is not required; the factors can be entirely independent as long as their product results in zero."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
