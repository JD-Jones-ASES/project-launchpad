<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 3, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following describes the set of all real numbers $x$ such that $|x| < 8$?", "options": [{"text": "Every number between $-8$ and $8$.", "isCorrect": true, "rationale": "The absolute value inequality $|x| < c$ represents all numbers whose distance from zero is less than $c$ units."}, {"text": "Every number less than $-8$ or greater than $8$.", "isCorrect": false, "rationale": "This describes a 'greater than' inequality, where the values are more than a certain distance from zero."}, {"text": "Only the numbers $0, 1, 2, 3, 4, 5, 6,$ and $7$.", "isCorrect": false, "rationale": "This set excludes negative numbers and non-integers that also satisfy the distance requirement."}, {"text": "Every number less than $8$.", "isCorrect": false, "rationale": "This fails to account for the lower bound; for example, $-10$ is less than $8$ but its absolute value is not less than $8$."}], "id": "q01"}, {"question": "Solve the inequality $|3x + 1| \\le 10$ and express the result in interval notation.", "options": [{"text": "$[-\\frac{11}{3}, 3]$", "isCorrect": true, "rationale": "Solving the compound inequality $-10 \\le 3x + 1 \\le 10$ involves subtracting $1$ and then dividing by $3$ across all parts."}, {"text": "($-\\infty, -\\frac{11}{3}] \\cup [3, \\infty)$", "isCorrect": false, "rationale": "This represents an 'or' compound inequality, which is used for 'greater than' absolute value problems."}, {"text": "$[-\\frac{11}{3}, \\frac{11}{3}]$", "isCorrect": false, "rationale": "This incorrectly assumes the solution is symmetric around zero without accounting for the $+1$ inside the absolute value."}, {"text": "($-\\infty, 3]$", "isCorrect": false, "rationale": "This only provides the upper bound and neglects the restriction imposed by the lower bound of the absolute value."}], "id": "q02"}, {"question": "What is the solution set for the inequality $|5x - 2| > -3$?", "options": [{"text": "All real numbers, $(-\\infty, \\infty)$", "isCorrect": true, "rationale": "Since an absolute value is always zero or positive, it will always be greater than any negative number."}, {"text": "No solution", "isCorrect": false, "rationale": "This would be the case if the absolute value were required to be less than a negative number."}, {"text": "($-\\infty, -\\frac{1}{5}) \\cup (1, \\infty)$", "isCorrect": false, "rationale": "This result comes from incorrectly attempting to solve the inequality as if the constant were positive $3$."}, {"text": "$x > 1$", "isCorrect": false, "rationale": "This is only a partial solution based on one direction and ignores the fundamental property of absolute values regarding negative constants."}], "id": "q03"}, {"question": "Solve the inequality $|4x + 7| < -2$.", "options": [{"text": "No solution", "isCorrect": true, "rationale": "An absolute value cannot be less than zero, so it can never be less than a negative number like $-2$."}, {"text": "All real numbers, $(-\\infty, \\infty)$", "isCorrect": false, "rationale": "This would be true if the inequality symbol were 'greater than' rather than 'less than'."}, {"text": "$-2.25 < x < -1.25$", "isCorrect": false, "rationale": "This is the result of procedurally solving the inequality without considering that the constant is negative."}, {"text": "$x < -2.25$", "isCorrect": false, "rationale": "This represents an incorrect procedural split that ignores the impossibility of the original statement."}], "id": "q04"}, {"question": "To solve $2|x - 5| + 4 \\ge 12$, what is the first logical step?", "options": [{"text": "Subtract $4$ from both sides and then divide by $2$ to isolate the absolute value.", "isCorrect": true, "rationale": "The absolute value expression must be isolated on one side before it can be rewritten as a compound inequality."}, {"text": "Rewrite as $2(x - 5) + 4 \\le -12$ or $2(x - 5) + 4 \\ge 12$.", "isCorrect": false, "rationale": "Splitting the inequality before isolation leads to incorrect boundaries and complex arithmetic errors."}, {"text": "Distribute the $2$ into the absolute value to get $|2x - 10| + 4 \\ge 12$.", "isCorrect": false, "rationale": "While mathematically possible for positive coefficients, isolation is the standard and less error-prone procedure."}, {"text": "Subtract $12$ from both sides to set the inequality to zero.", "isCorrect": false, "rationale": "Setting the inequality to zero is a technique for quadratics, but absolute value inequalities are typically solved by isolation and splitting."}], "id": "q05"}, {"question": "When solving $|ax + b| > c$ (where $c > 0$), which mnemonic aid helps remember the structure of the compound inequality?", "options": [{"text": "greatOR", "isCorrect": true, "rationale": "The text suggests 'greatOR' to remember that 'greater than' symbols result in 'or' compound inequalities."}, {"text": "less thAND", "isCorrect": false, "rationale": "This mnemonic refers to 'less than' inequalities, which result in 'and' compound inequalities."}, {"text": "FOIL", "isCorrect": false, "rationale": "FOIL is a method used for multiplying binomials, not for solving absolute value inequalities."}, {"text": "PEMDAS", "isCorrect": false, "rationale": "PEMDAS is the order of operations and does not specifically dictate the structure of compound inequalities."}], "id": "q06"}, {"question": "Which of the following represents the correct interval notation for the solution to $|x + 2| < 4$?", "options": [{"text": "$(-6, 2)$", "isCorrect": true, "rationale": "Rewriting as $-4 < x + 2 < 4$ and subtracting $2$ from all parts yields $-6 < x < 2$."}, {"text": "$[-6, 2]$", "isCorrect": false, "rationale": "Square brackets indicate inclusion, but the original inequality symbol is strictly 'less than'."}, {"text": "$(-\\infty, -6) \\cup (2, \\infty)$", "isCorrect": false, "rationale": "This notation is used for 'greater than' inequalities where the solution points away from the center."}, {"text": "$(-2, 6)$", "isCorrect": false, "rationale": "This error occurs if the signs are flipped incorrectly or if the constants are applied to the wrong side of the equation."}], "id": "q07"}, {"question": "Solve the inequality $|-2x + 4| < 6$ and identify the correct solution set.", "options": [{"text": "$-1 < x < 5$", "isCorrect": true, "rationale": "Solving $-6 < -2x + 4 < 6$ results in $-10 < -2x < 2$; dividing by $-2$ flips the inequality signs to $5 > x > -1$."}, {"text": "$x < -1$ or $x > 5$", "isCorrect": false, "rationale": "This would be the solution for a 'greater than' inequality, but the original problem is 'less than'."}, {"text": "$x < 5$", "isCorrect": false, "rationale": "This is only half of the solution and fails to capture the lower bound created by the absolute value property."}, {"text": "$-5 < x < 1$", "isCorrect": false, "rationale": "This error typically results from failing to reverse the inequality signs when dividing by the negative coefficient $-2$."}], "id": "q08"}, {"question": "Determine the solution for $\\frac{|x - 1|}{3} - 2 > 1$.", "options": [{"text": "($-\\infty, -8) \\cup (10, \\infty)$", "isCorrect": true, "rationale": "Isolating gives $|x - 1| > 9$, which splits into $x - 1 < -9$ (so $x < -8$) or $x - 1 > 9$ (so $x > 10$)."}, {"text": "$(-8, 10)$", "isCorrect": false, "rationale": "This describes an 'and' inequality, but the isolated inequality uses a 'greater than' symbol."}, {"text": "$x > 10$", "isCorrect": false, "rationale": "This is only one part of the 'or' compound inequality and misses the values less than $-8$."}, {"text": "($-\\infty, -2) \\cup (4, \\infty)$", "isCorrect": false, "rationale": "This mistake occurs if one forgets to multiply the isolated constant by $3$ after adding $2$ to both sides."}], "id": "q09"}, {"question": "What is the solution to the inequality $|x + 5| \\le 0$?", "options": [{"text": "$x = -5$", "isCorrect": true, "rationale": "An absolute value cannot be negative, so the only solution is when the expression inside equals zero."}, {"text": "No solution", "isCorrect": false, "rationale": "While the 'less than' part has no solution, the 'equal to' part of $\\le$ allows for a single point."}, {"text": "$(-\\infty, -5]$", "isCorrect": false, "rationale": "This would imply the absolute value could be positive for values much smaller than $-5$, which is true, but they wouldn't satisfy being $\\le 0$."}, {"text": "All real numbers", "isCorrect": false, "rationale": "This is incorrect because absolute values are usually greater than zero for most inputs."}], "id": "q10"}, {"question": "Solve the inequality $10 - |2x + 3| \\ge 7$.", "options": [{"text": "$[-3, 0]$", "isCorrect": true, "rationale": "Subtracting $10$ gives $-|2x + 3| \\ge -3$. Multiplying by $-1$ flips the sign to $|2x + 3| \\le 3$, leading to $-3 \\le 2x + 3 \\le 3$."}, {"text": "$(-\\infty, -3] \\cup [0, \\infty)$", "isCorrect": false, "rationale": "This would be the solution if the inequality sign was not flipped when dividing by $-1$ during isolation."}, {"text": "$[0, 3]$", "isCorrect": false, "rationale": "This set is the result of applying the correct boundaries to the wrong side of the origin."}, {"text": "$[-6, 0]$", "isCorrect": false, "rationale": "This mistake occurs if the final division by $2$ is not applied to the lower bound of the compound inequality."}], "id": "q11"}, {"question": "Which inequality represents the statement: 'The distance between $x$ and $3$ is more than $5$ units'?", "options": [{"text": "$|x - 3| > 5$", "isCorrect": true, "rationale": "The expression $|x - a|$ represents the distance between $x$ and $a$, and 'more than' corresponds to the 'greater than' symbol."}, {"text": "$|x + 3| > 5$", "isCorrect": false, "rationale": "This represents the distance between $x$ and $-3$, not positive $3$."}, {"text": "$|x - 5| > 3$", "isCorrect": false, "rationale": "This represents the distance between $x$ and $5$ being more than $3$ units, swapping the target and the distance."}, {"text": "$|x - 3| < 5$", "isCorrect": false, "rationale": "This represents the distance being 'less than' $5$ units rather than 'more than'."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
