<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the name of the point where the x-axis and y-axis intersect on the coordinate plane?", "options": [{"text": "Quadrant I", "isCorrect": false, "rationale": "Quadrant I is one of the four regions of the plane, not the intersection point of the axes."}, {"text": "The origin", "isCorrect": true, "rationale": "The text states, 'Their intersection is the origin, located at (0, 0).'"}, {"text": "The midpoint", "isCorrect": false, "rationale": "A midpoint is a point exactly halfway between two endpoints of a segment, not the intersection of the axes."}, {"text": "The x-intercept", "isCorrect": false, "rationale": "An x-intercept is a point where a graph crosses the x-axis. While the origin is an x-intercept, it's not the specific term for the intersection of both axes."}]}, {"question": "In what order are the quadrants typically numbered in the coordinate plane?", "options": [{"text": "Clockwise, starting from the upper left", "isCorrect": false, "rationale": "Quadrants are numbered counter-clockwise, and Quadrant I starts in the upper right."}, {"text": "Counter-clockwise, starting from the upper right", "isCorrect": true, "rationale": "The text explicitly states, 'quadrants, numbered I through IV counter-clockwise starting from the upper right.'"}, {"text": "Clockwise, starting from the lower right", "isCorrect": false, "rationale": "Quadrants are numbered counter-clockwise, and Quadrant I is in the upper right, not the lower right."}, {"text": "Counter-clockwise, starting from the lower left", "isCorrect": false, "rationale": "Quadrants are numbered counter-clockwise, but Quadrant I starts in the upper right, not the lower left."}]}, {"question": "If you plot the point $(5, -3)$ on the coordinate plane, what does the number '5' represent?", "options": [{"text": "The vertical distance from the origin.", "isCorrect": false, "rationale": "The vertical distance is represented by the y-coordinate, which is -3 in this case."}, {"text": "The y-coordinate of the point.", "isCorrect": false, "rationale": "The y-coordinate is the second number in an ordered pair, which is -3."}, {"text": "The horizontal distance from the origin.", "isCorrect": true, "rationale": "The text defines the x-coordinate as the 'horizontal distance from the origin'. The first number '5' is the x-coordinate."}, {"text": "The quadrant in which the point lies.", "isCorrect": false, "rationale": "The numbers in an ordered pair indicate the position, not directly the quadrant. The signs of both coordinates determine the quadrant (positive x, negative y means Quadrant IV)."}]}, {"question": "To plot the point $(-4, 2)$ from the origin, what sequence of movements would you make?", "options": [{"text": "Move 4 units right, then 2 units up.", "isCorrect": false, "rationale": "Moving right corresponds to a positive x-coordinate, not negative."}, {"text": "Move 4 units left, then 2 units down.", "isCorrect": false, "rationale": "Moving down corresponds to a negative y-coordinate, not positive."}, {"text": "Move 4 units left, then 2 units up.", "isCorrect": true, "rationale": "The text states, 'Move $a$ units horizontally (right if $a > 0$, left if $a < 0$), then $b$ units vertically (up if $b > 0$, down if $b < 0$).' For $(-4, 2)$, $a = -4$ (left) and $b = 2$ (up)."}, {"text": "Move 4 units right, then 2 units down.", "isCorrect": false, "rationale": "Moving right corresponds to a positive x-coordinate, and moving down corresponds to a negative y-coordinate."}]}, {"question": "A point with an $x$-coordinate of $0$ and a negative $y$-coordinate (e.g., $(0, -5)$) would lie on which part of the coordinate plane?", "options": [{"text": "Quadrant III", "isCorrect": false, "rationale": "Quadrant III has both x and y coordinates negative, not x=0."}, {"text": "The x-axis", "isCorrect": false, "rationale": "Points on the x-axis have a y-coordinate of 0. Here, the y-coordinate is negative."}, {"text": "Quadrant IV", "isCorrect": false, "rationale": "Quadrant IV has a positive x-coordinate and a negative y-coordinate. This point has x=0."}, {"text": "The y-axis", "isCorrect": true, "rationale": "The text and example D confirm that if the x-coordinate is 0, the point lies on the y-axis, regardless of the y-coordinate's sign (unless y is also 0, which is the origin)."}]}, {"question": "What is the distance between the points $(3, 8)$ and $(10, 8)$?", "options": [{"text": "7 units", "isCorrect": true, "rationale": "Since the y-coordinates are the same, the points lie on a horizontal line. The distance is the absolute difference of the x-coordinates: $|10 - 3| = |7| = 7$ units. The text shows this as $x_2 - x_1$ when the result is positive, such as $9 - 2 = 7$ in the example."}, {"text": "13 units", "isCorrect": false, "rationale": "This would be the sum of the x-coordinates, which is not how horizontal distance is calculated."}, {"text": "8 units", "isCorrect": false, "rationale": "8 is the common y-coordinate, not the distance between the points."}, {"text": "18 units", "isCorrect": false, "rationale": "This value does not correspond to the correct calculation for distance between these points."}]}, {"question": "Find the distance between the points $(-5, 2)$ and $(-5, -6)$.", "options": [{"text": "-8 units", "isCorrect": false, "rationale": "Distance is always a non-negative value. While the calculation $-6-2$ results in $-8$, the distance is the absolute value of this difference."}, {"text": "8 units", "isCorrect": true, "rationale": "Since the x-coordinates are the same, the points lie on a vertical line. The distance is the absolute difference of the y-coordinates: $|-6 - 2| = |-8| = 8$ units. Alternatively, using the text's method for distance ($y_2 - y_1$), we get $-6 - 2 = -8$, and the example shows the distance is the absolute value of this result, so $9$ for example (b), hence $8$ here."}, {"text": "4 units", "isCorrect": false, "rationale": "This value is not obtained by correctly calculating the distance between the y-coordinates."}, {"text": "11 units", "isCorrect": false, "rationale": "This value does not correspond to the correct calculation for distance between these points."}]}, {"question": "The midpoint formula is used to find what characteristic of a line segment?", "options": [{"text": "The total length of the segment.", "isCorrect": false, "rationale": "The distance formula (not covered in this section for general points) is used to find the length of a segment. The midpoint formula finds a specific point."}, {"text": "The point exactly halfway between its endpoints.", "isCorrect": true, "rationale": "The text explicitly states, 'The midpoint of a segment is the point exactly halfway between its endpoints.'"}, {"text": "The slope of the segment.", "isCorrect": false, "rationale": "The slope of a segment describes its steepness and direction, calculated as the change in y divided by the change in x, which is not what the midpoint formula calculates."}, {"text": "The quadrant where the segment's starting point lies.", "isCorrect": false, "rationale": "Identifying quadrants is done by examining the coordinates of a point, not by using the midpoint formula."}]}, {"question": "Calculate the midpoint of the segment with endpoints $(1, -4)$ and $(7, 10)$.", "options": [{"text": "$(4, 3)$", "isCorrect": true, "rationale": "Applying the midpoint formula $M = (\\frac{x_1 + x_2}{2}, \\frac{y_1 + y_2}{2})$: $M = (\\frac{1 + 7}{2}, \\frac{-4 + 10}{2}) = (\\frac{8}{2}, \\frac{6}{2}) = (4, 3)$. The given example in the text shows this calculation process."}, {"text": "$(8, 6)$", "isCorrect": false, "rationale": "This result comes from adding the coordinates without dividing by 2."}, {"text": "$(6, 14)$", "isCorrect": false, "rationale": "This result comes from subtracting x-coordinates and adding y-coordinates without dividing by 2, which is incorrect."}, {"text": "$(3, -7)$", "isCorrect": false, "rationale": "This result is incorrect due to miscalculation in averaging the coordinates."}]}, {"question": "Which statement accurately describes a point that lies on one of the axes?", "options": [{"text": "Both its $x$ and $y$ coordinates must be non-zero.", "isCorrect": false, "rationale": "If both coordinates are non-zero, the point lies within a quadrant, not on an axis. For a point to be on an axis, at least one coordinate must be zero."}, {"text": "Its $x$-coordinate is always positive if on the $x$-axis.", "isCorrect": false, "rationale": "Points on the x-axis can have positive or negative x-coordinates (e.g., $(-3, 0)$ is on the x-axis), or an x-coordinate of zero (the origin)."}, {"text": "Exactly one of its coordinates must be zero.", "isCorrect": false, "rationale": "This statement is true for points on an axis *except* for the origin $(0,0)$, where both coordinates are zero. Since the origin is on both axes, this statement is not universally true for *any* point on an axis."}, {"text": "It cannot be in Quadrant I, II, III, or IV.", "isCorrect": true, "rationale": "The text states, 'The axes divide the plane into four regions called quadrants'. This implies that points on the dividing lines (the axes) themselves are not considered to be 'in' a quadrant. Example D also illustrates this, stating 'Point D lies on the y-axis' rather than assigning it to a quadrant."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
