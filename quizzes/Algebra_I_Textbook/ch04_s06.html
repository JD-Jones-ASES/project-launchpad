<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 4, Section 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a scatter plot?", "options": [{"text": "A bar chart that compares categories.", "isCorrect": false, "rationale": "A bar chart uses rectangular bars to compare categories. A scatter plot graphs individual ordered pairs in the coordinate plane."}, {"text": "A graph of data points (x, y) in the coordinate plane, where each point represents one observation of two related variables.", "isCorrect": true, "rationale": "A scatter plot places each data pair as a point in the coordinate plane to reveal patterns or trends between two variables."}, {"text": "A line graph that shows a continuous trend over time.", "isCorrect": false, "rationale": "A line graph connects data points with line segments. A scatter plot plots individual data points without connecting them."}, {"text": "A graph showing the frequency of individual data values.", "isCorrect": false, "rationale": "Frequency graphs (like histograms) show how often values occur. A scatter plot shows the relationship between two variables."}], "id": "q01"}, {"question": "A scatter plot shows that as x increases, y also tends to increase. What type of correlation is this?", "options": [{"text": "Negative correlation", "isCorrect": false, "rationale": "Negative correlation means as x increases, y decreases. When both increase together the correlation is positive."}, {"text": "No correlation", "isCorrect": false, "rationale": "No correlation means there is no clear trend. When y increases as x increases, that is a positive correlation."}, {"text": "Positive correlation", "isCorrect": true, "rationale": "Positive correlation means both variables tend to increase together. The data points trend upward from left to right."}, {"text": "Zero correlation", "isCorrect": false, "rationale": "Zero (no) correlation describes data with no clear trend. When y increases as x increases, the correlation is positive."}], "id": "q02"}, {"question": "What is a trend line (line of best fit)?", "options": [{"text": "A line connecting the first and last data points.", "isCorrect": false, "rationale": "A trend line is not drawn through only two specific points; it is drawn to best represent all the data with roughly equal numbers of points above and below."}, {"text": "A straight line drawn through the data to follow the general direction, with roughly equal numbers of points above and below it.", "isCorrect": true, "rationale": "A trend line (line of best fit) represents the overall linear pattern of the data, positioned so about the same number of points lie above and below it."}, {"text": "A line that passes through every data point.", "isCorrect": false, "rationale": "In real-world data it is almost never possible for a single straight line to pass through every point. The trend line approximates the data."}, {"text": "A horizontal line drawn at the average y-value.", "isCorrect": false, "rationale": "A horizontal line would show no trend at all. A trend line follows the directional pattern of the data."}], "id": "q03"}, {"question": "Using the trend line y = 6.25x + 48.75, what score is predicted for a student who studies 8 hours?", "options": [{"text": "75", "isCorrect": false, "rationale": "y = 6.25(8) + 48.75 = 50 + 48.75 = 98.75, not 75."}, {"text": "98.75 (approximately 99)", "isCorrect": true, "rationale": "Substituting x = 8: y = 6.25(8) + 48.75 = 50 + 48.75 = 98.75. The trend line predicts a score of about 99."}, {"text": "55", "isCorrect": false, "rationale": "y = 6.25(8) + 48.75 = 98.75. A score of 55 corresponds to only 1 hour of study in this trend line."}, {"text": "105.75", "isCorrect": false, "rationale": "y = 6.25(8) + 48.75 = 50 + 48.75 = 98.75, not 105.75. Make sure to multiply 6.25 by 8 first."}], "id": "q04"}, {"question": "What is interpolation when using a trend line?", "options": [{"text": "Estimating a value beyond the range of the observed data.", "isCorrect": false, "rationale": "Estimating beyond the data range is called extrapolation, not interpolation."}, {"text": "Using the trend line to estimate a value within the range of existing data points.", "isCorrect": true, "rationale": "Interpolation estimates values between existing data points, staying within the observed data range."}, {"text": "Drawing the trend line by connecting all data points.", "isCorrect": false, "rationale": "Connecting all points creates a line graph, not a trend line. Interpolation is about using an existing trend line to estimate interior values."}, {"text": "Converting a scatter plot into a bar chart.", "isCorrect": false, "rationale": "That is a different type of data display, unrelated to interpolation with a trend line."}], "id": "q05"}, {"question": "Why is extrapolation generally considered less reliable than interpolation?", "options": [{"text": "Because extrapolation uses more data points than interpolation.", "isCorrect": false, "rationale": "Extrapolation uses the same trend line but extends it beyond the data. The concern is that the trend may not continue outside the observed range."}, {"text": "Because extrapolation estimates values outside the data range, where the linear trend may not hold.", "isCorrect": true, "rationale": "Extrapolation can be risky because the trend observed in the data may not continue beyond that range. The example of predicting 123.75 for 12 hours of study illustrates this, as scores cannot exceed 100."}, {"text": "Because interpolation uses more data points.", "isCorrect": false, "rationale": "Both interpolation and extrapolation use the same trend line. The difference is whether the estimate falls inside or outside the data range."}, {"text": "Because extrapolation only works for negative correlations.", "isCorrect": false, "rationale": "Extrapolation can be applied regardless of the direction of correlation. Its unreliability comes from going beyond the observed data range."}], "id": "q06"}, {"question": "Using the trend line y = 6.25x + 48.75, predict the score for 3.5 hours of study. Is this interpolation or extrapolation?", "options": [{"text": "Score 71; this is extrapolation because 3.5 is between the data points.", "isCorrect": false, "rationale": "Estimating within the data range is interpolation, not extrapolation. The estimate is approximately 71."}, {"text": "Score 70.625 (about 71); this is interpolation because 3.5 is within the data range.", "isCorrect": true, "rationale": "y = 6.25(3.5) + 48.75 = 21.875 + 48.75 = 70.625, approximately 71. Since 3.5 is between the observed x-values (1 to 6), this is interpolation."}, {"text": "Score 71; this is extrapolation because fractions are not in the original data.", "isCorrect": false, "rationale": "Extrapolation is about going beyond the data range, not about using non-integer x-values. Here 3.5 is inside the range 1 to 6, so it is interpolation."}, {"text": "Score 123.75; this is interpolation because 3.5 is small.", "isCorrect": false, "rationale": "y = 6.25(3.5) + 48.75 = 70.625, not 123.75. The score of 123.75 would result from x = 12, which is extrapolation."}], "id": "q07"}, {"question": "What does it mean if a scatter plot shows no correlation?", "options": [{"text": "The data points all lie exactly on a line.", "isCorrect": false, "rationale": "Data lying exactly on a line shows perfect correlation (positive or negative), not no correlation."}, {"text": "There is no clear upward or downward trend in the data points.", "isCorrect": true, "rationale": "No correlation means the points are scattered with no obvious pattern; there is no clear relationship between the two variables."}, {"text": "All y-values are equal for any x.", "isCorrect": false, "rationale": "All equal y-values would create a horizontal line, which is actually a specific pattern, not no correlation."}, {"text": "As x increases, y decreases at the same rate.", "isCorrect": false, "rationale": "That describes a negative correlation. No correlation means there is no discernible trend at all."}], "id": "q08"}, {"question": "A trend line for temperature (x, in degrees F) vs. park visitors (y) has equation y = 8x - 200. Predict visitors when temperature is 85 degrees F.", "options": [{"text": "280 visitors", "isCorrect": false, "rationale": "y = 8(85) - 200 = 680 - 200 = 480 visitors, not 280."}, {"text": "480 visitors", "isCorrect": true, "rationale": "Substituting x = 85: y = 8(85) - 200 = 680 - 200 = 480 visitors."}, {"text": "880 visitors", "isCorrect": false, "rationale": "y = 8(85) - 200 = 680 - 200 = 480. Adding instead of subtracting 200 gives 880, which is an error."}, {"text": "200 visitors", "isCorrect": false, "rationale": "y = 8(85) - 200 = 480. Getting 200 ignores the 8(85) term entirely."}], "id": "q09"}, {"question": "Which statement best reflects the caution about correlation and causation?", "options": [{"text": "A strong positive correlation between two variables always means one causes the other.", "isCorrect": false, "rationale": "Correlation does not imply causation. Two variables can be correlated because of a third variable or coincidence, not because one causes the other."}, {"text": "Correlation does not imply causation; a third variable or coincidence may explain a relationship.", "isCorrect": true, "rationale": "Just because two variables are correlated does not mean one causes the other. For example, ice cream sales and drowning incidents both correlate with hot weather."}, {"text": "Negative correlation always indicates a causal relationship.", "isCorrect": false, "rationale": "Neither positive nor negative correlation implies causation. The direction of correlation has nothing to do with whether one variable causes the other."}, {"text": "If correlation exists, experimentation is unnecessary.", "isCorrect": false, "rationale": "Experiments are needed precisely to test causation, which cannot be established from correlation alone."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
