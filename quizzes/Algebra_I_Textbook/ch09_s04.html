    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 9, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement correctly defines the principal square root of a non-negative number $a$?", "options": [{"text": "It is any number $b$ such that $b^2 = a$.", "isCorrect": false, "rationale": "This definition does not specify that $b$ must be non-negative. For example, both $5$ and $-5$ squared equal $25$, but only $5$ is the principal square root."}, {"text": "It is the non-negative number $b$ such that $b^2 = a$.", "isCorrect": true, "rationale": "This is the precise definition provided in the text for the principal square root, emphasizing that $b$ must be non-negative and its square must equal $a$."}, {"text": "It is the number $b$ such that $b = a/2$.", "isCorrect": false, "rationale": "This statement describes division, not the concept of a square root. For example, $25/2 = 12.5$, which is not $\\sqrt{25}$."}, {"text": "It is always a positive number $b$ such that $b^2 = a$.", "isCorrect": false, "rationale": "While principal square roots are often positive, the definition states 'non-negative' which includes $0$. For example, $\\sqrt{0}=0$."}]}, {"question": "In the radical expression $\\sqrt{5x - 2} + 9$, what is the radicand?", "options": [{"text": "$5x$", "isCorrect": false, "rationale": "The radicand is the entire expression under the radical sign, not just a part of it."}, {"text": "$5x - 2$", "isCorrect": true, "rationale": "The radicand is defined as the expression directly under the radical sign, which in this case is $5x - 2$."}, {"text": "$5x - 2 + 9$", "isCorrect": false, "rationale": "The term $9$ is outside the radical sign and therefore not part of the radicand."}, {"text": "$9$", "isCorrect": false, "rationale": "The number $9$ is a term added to the radical expression, not the radicand itself."}]}, {"question": "Based on the information provided in this section, why must the radicand in a square root expression (like $\\sqrt{a}$) always be non-negative ($a \\ge 0$)?", "options": [{"text": "To ensure that the radical expression is in its simplest form.", "isCorrect": false, "rationale": "The rules for simplest form deal with factors, fractions, and denominators, not the fundamental existence of the real number value of the radical expression itself."}, {"text": "Because square roots of negative numbers result in imaginary numbers, and this course focuses on real numbers.", "isCorrect": true, "rationale": "The text explicitly states: 'Because $a$ is defined only when $a \\ge 0$ (we work only with real numbers in this course), the radicand must be non-negative.'"}, {"text": "To allow for the application of the Product Property of Square Roots.", "isCorrect": false, "rationale": "The Product Property *assumes* the radicands are non-negative; it does not explain *why* they must be non-negative in the first place for real numbers."}, {"text": "It is a mathematical convention established for ease of calculation and historical reasons.", "isCorrect": false, "rationale": "While conventions exist, this is a fundamental mathematical constraint for defining real square roots, not merely a convention."}]}, {"question": "Simplify the radical expression $\\sqrt{48}$.", "options": [{"text": "$4\\sqrt{3}$", "isCorrect": true, "rationale": "To simplify $\\sqrt{48}$, find the largest perfect square factor of $48$. $48 = 16 \\times 3$. Using the Product Property, $\\sqrt{48} = \\sqrt{16 \\times 3} = \\sqrt{16} \\times \\sqrt{3} = 4\\sqrt{3}$."}, {"text": "$2\\sqrt{12}$", "isCorrect": false, "rationale": "While $48 = 4 \\times 12$, $12$ still contains a perfect square factor ($4$), so this is not in simplest form. $2\\sqrt{12} = 2\\sqrt{4\\times3} = 2\\times2\\sqrt{3} = 4\\sqrt{3}$."}, {"text": "$16\\sqrt{3}$", "isCorrect": false, "rationale": "The perfect square factor $16$ comes out of the radical as $4$, not $16$. If it were $16\\sqrt{3}$, it would be $\\sqrt{16^2 \\times 3} = \\sqrt{256 \\times 3} = \\sqrt{768}$."}, {"text": "$3\\sqrt{16}$", "isCorrect": false, "rationale": "This correctly identifies $16$ as a factor, but places $3$ outside the radical incorrectly. $\\sqrt{16}=4$, so this would be $3 \\times 4 = 12$, which is not $\\sqrt{48}$."}]}, {"question": "Simplify the expression $\\sqrt{\\frac{90}{10}}$.", "options": [{"text": "$\\frac{\\sqrt{90}}{\\sqrt{10}}$", "isCorrect": false, "rationale": "This is an application of the Quotient Property, but it's not the simplest form. The expression under the radical can be simplified first."}, {"text": "$3$", "isCorrect": true, "rationale": "First, simplify the fraction inside the radical: $\\sqrt{\\frac{90}{10}} = \\sqrt{9}$. Then, calculate the square root: $\\sqrt{9} = 3$."}, {"text": "$9$", "isCorrect": false, "rationale": "The square root of $9$ is $3$, not $9$."}, {"text": "$\\sqrt{90} - \\sqrt{10}$", "isCorrect": false, "rationale": "There is no property that allows subtraction of radicands or separates a quotient this way. The operation is division inside the radical."}]}, {"question": "According to the text, which of the following is NOT a characteristic of a radical expression in simplest form?", "options": [{"text": "The radicand has no perfect square factor (other than $1$).", "isCorrect": false, "rationale": "This is one of the three explicitly stated rules for a radical expression to be in simplest form."}, {"text": "The radicand contains no fractions.", "isCorrect": false, "rationale": "This is one of the three explicitly stated rules for a radical expression to be in simplest form."}, {"text": "No radical appears in a denominator.", "isCorrect": false, "rationale": "This is one of the three explicitly stated rules for a radical expression to be in simplest form."}, {"text": "The expression uses rational (fractional) exponents instead of radical signs.", "isCorrect": true, "rationale": "The text mentions rational exponents as an 'alternative notation for working with roots' that will be learned in Algebra II, but it is not listed as a requirement for 'simplest form' within this current section."}]}, {"question": "Simplify the expression $\\sqrt{108x^3y^6}$, assuming all variables are non-negative.", "options": [{"text": "$6xy^3\\sqrt{3x}$", "isCorrect": true, "rationale": "Break down the radicand: $108 = 36 \\times 3$, $x^3 = x^2 \\times x$, $y^6 = (y^3)^2$. Apply the Product Property: $\\sqrt{36 \\times 3 \\times x^2 \\times x \\times (y^3)^2} = \\sqrt{36}\\sqrt{x^2}\\sqrt{(y^3)^2}\\sqrt{3}\\sqrt{x} = 6xy^3\\sqrt{3x}$. (Assuming $x$ and $y$ are non-negative, $|x|=x$ and $|y^3|=y^3$)"}, {"text": "$36xy^3\\sqrt{3x}$", "isCorrect": false, "rationale": "The square root of $36$ is $6$, not $36$. The $x^2$ term correctly comes out as $x$, but the numeric coefficient is wrong."}, {"text": "$6x\\sqrt{3xy^6}$", "isCorrect": false, "rationale": "The term $y^6$ is a perfect square ($y^6 = (y^3)^2$) and should be extracted from the radical as $y^3$."}, {"text": "$108xy^3\\sqrt{x}$", "isCorrect": false, "rationale": "The numerical part $108$ still contains a perfect square factor ($36$) and needs to be simplified. $108$ does not simply come out of the radical."}]}, {"question": "Simplify the expression $\\frac{7}{\\sqrt{2}}$ by rationalizing the denominator.", "options": [{"text": "$\\frac{7\\sqrt{2}}{4}$", "isCorrect": false, "rationale": "When multiplying by $\\sqrt{2}/\\sqrt{2}$, the denominator becomes $\\sqrt{2}\\times\\sqrt{2} = 2$, not $4$."}, {"text": "$\\frac{7\\sqrt{2}}{2}$", "isCorrect": true, "rationale": "To rationalize the denominator, multiply the numerator and denominator by $\\sqrt{2}$: $\\frac{7}{\\sqrt{2}} \\times \\frac{\\sqrt{2}}{\\sqrt{2}} = \\frac{7\\sqrt{2}}{2}$."}, {"text": "$7\\sqrt{2}$", "isCorrect": false, "rationale": "This expression still has a radical in the numerator if the original denominator was $1$. The denominator must be rationalized to a whole number, not simply removed."}, {"text": "$\\frac{\\sqrt{14}}{2}$", "isCorrect": false, "rationale": "The numerator is $7 \\times \\sqrt{2}$, which is $7\\sqrt{2}$, not $\\sqrt{14}$ (which would be $\\sqrt{7 \\times 2}$). The numbers cannot be combined under one radical like that unless both are under a radical."}]}, {"question": "Simplify the expression $\\frac{10}{\\sqrt{8}}$.", "options": [{"text": "$\\frac{10\\sqrt{8}}{8}$", "isCorrect": false, "rationale": "This step rationalizes the denominator, but the radical in the numerator can still be simplified ($\\sqrt{8} = 2\\sqrt{2}$), and the fraction can be reduced."}, {"text": "$\\frac{5\\sqrt{2}}{2}$", "isCorrect": true, "rationale": "First, simplify the denominator: $\\sqrt{8} = \\sqrt{4 \\times 2} = 2\\sqrt{2}$. So the expression becomes $\\frac{10}{2\\sqrt{2}} = \\frac{5}{\\sqrt{2}}$. Then rationalize: $\\frac{5}{\\sqrt{2}} \\times \\frac{\\sqrt{2}}{\\sqrt{2}} = \\frac{5\\sqrt{2}}{2}$."}, {"text": "$\\frac{10\\sqrt{2}}{8}$", "isCorrect": false, "rationale": "This correctly rationalizes and simplifies the radical to $\\sqrt{2}$, but the fraction $\\frac{10}{8}$ can be reduced to $\\frac{5}{4}$."}, {"text": "$\\frac{5}{\\sqrt{2}}$", "isCorrect": false, "rationale": "This is a correct intermediate step after simplifying the denominator, but the denominator still contains a radical, so it is not in simplest form."}]}, {"question": "Which of the following expressions correctly uses the properties of square roots as described in this section to achieve a simplified form (or a valid step towards it)?", "options": [{"text": "$\\sqrt{-4} \\times \\sqrt{-9} = \\sqrt{36} = 6$", "isCorrect": false, "rationale": "The Product Property of Square Roots ($\\sqrt{ab} = \\sqrt{a}\\sqrt{b}$) applies only when $a \\ge 0$ and $b \\ge 0$. Here, the radicands are negative, which leads to imaginary numbers, not real number simplification as described in this section."}, {"text": "$\\sqrt{18} + \\sqrt{8} = \\sqrt{26}$", "isCorrect": false, "rationale": "There is no property that allows for the addition of numbers under a radical sign in this manner. Radicals can only be added if they have the same radicand and index (after simplification)."}, {"text": "$\\sqrt{12x^2} = 2x\\sqrt{3}$ (assuming $x \\ge 0$)", "isCorrect": true, "rationale": "This correctly applies the Product Property. $12x^2 = 4 \\times 3 \\times x^2$. So $\\sqrt{12x^2} = \\sqrt{4}\\sqrt{x^2}\\sqrt{3} = 2x\\sqrt{3}$. The assumption $x \\ge 0$ avoids the need for an absolute value on $x$ as per the text's guidance."}, {"text": "$\\frac{\\sqrt{15}}{\\sqrt{5}} = \\sqrt{3}$ only if $15$ is a perfect square.", "isCorrect": false, "rationale": "The Quotient Property ($\\sqrt{a/b} = \\sqrt{a}/\\sqrt{b}$) applies when $a \\ge 0$ and $b > 0$, regardless of whether $a$ or $b$ are perfect squares. $\\frac{\\sqrt{15}}{\\sqrt{5}} = \\sqrt{\\frac{15}{5}} = \\sqrt{3}$ is a valid application of the property."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
