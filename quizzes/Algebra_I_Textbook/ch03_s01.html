<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of an inequality in mathematics, as described in the provided text?", "options": [{"text": "To state that two expressions are precisely equal.", "isCorrect": false, "rationale": "This describes an equation, not an inequality. The text states that equations are about equality, whereas inequalities are for situations where quantities are not equal."}, {"text": "To find the domain and range of a function.", "isCorrect": false, "rationale": "While inequalities are used for domain and range, this is a specific application mentioned for a later chapter, not their primary definition as introduced in this section."}, {"text": "To compare two expressions using symbols such as <, >, ≤, or ≥.", "isCorrect": true, "rationale": "The text defines an inequality as 'a mathematical sentence that compares two expressions using one of the symbols < (less than), > (greater than), ≤ (less than or equal to), ≥ (greater than or equal to).'"}, {"text": "To solve for a single, specific numerical value of a variable.", "isCorrect": false, "rationale": "Solving for a single value is typically associated with equations, not inequalities, which usually have a solution set of multiple values."}]}, {"question": "The 'solution set' of an inequality refers to:", "options": [{"text": "The single numerical value that satisfies the inequality.", "isCorrect": false, "rationale": "Inequalities often have many values that satisfy them, forming a set, not just a single value."}, {"text": "The first value of the variable that makes the inequality true.", "isCorrect": false, "rationale": "The solution set includes *all* values, not just the first one, and 'first' isn't well-defined for continuous sets."}, {"text": "The set of all values of the variable that make the inequality true.", "isCorrect": true, "rationale": "The text explicitly defines the solution set as 'the set of all values of the variable that make the inequality true.'"}, {"text": "The boundary point where the inequality begins or ends.", "isCorrect": false, "rationale": "The boundary point is part of defining the solution set, but it is not the solution set itself. The solution set includes the boundary point only if the inequality is non-strict (≤ or ≥)."}]}, {"question": "When graphing an inequality on a number line, what does an open circle (o) at a boundary point indicate?", "options": [{"text": "The boundary value is included in the solution set.", "isCorrect": false, "rationale": "A closed circle (●) signifies that the boundary value is included, corresponding to ≤ or ≥."}, {"text": "The inequality uses either ≤ or ≥.", "isCorrect": false, "rationale": "Inequalities using ≤ or ≥ require a closed circle at the boundary point."}, {"text": "The boundary value is not included in the solution set.", "isCorrect": true, "rationale": "According to the text, 'An open circle (o) means the boundary value is not included (< or >).'"}, {"text": "The solution set extends indefinitely in both directions from the boundary.", "isCorrect": false, "rationale": "The shading direction indicates whether the solution set extends to the left or right, not the type of circle."}]}, {"question": "Which choice correctly describes how to graph the inequality x ≥ -5 on a number line?", "options": [{"text": "Place an open circle at -5 and shade to the right.", "isCorrect": false, "rationale": "An open circle indicates that -5 is not included, which is incorrect for x ≥ -5. Shading right is correct."}, {"text": "Place a closed circle at -5 and shade to the left.", "isCorrect": false, "rationale": "Shading to the left would represent values less than or equal to -5 (x ≤ -5), which is incorrect."}, {"text": "Place a closed circle at -5 and shade to the right.", "isCorrect": true, "rationale": "The symbol '≥' means 'greater than or equal to,' so the boundary value -5 is included (closed circle), and values greater than -5 are to its right (shade right)."}, {"text": "Place an open circle at -5 and shade to the left.", "isCorrect": false, "rationale": "Both the open circle and shading to the left are incorrect for x ≥ -5."}]}, {"question": "A number line graph shows an open circle at 3 and shading extending to the left. Which inequality does this graph represent?", "options": [{"text": "x > 3", "isCorrect": false, "rationale": "This would be an open circle at 3, but shading to the right."}, {"text": "x ≥ 3", "isCorrect": false, "rationale": "This would be a closed circle at 3, shading to the right."}, {"text": "x < 3", "isCorrect": true, "rationale": "An open circle at 3 signifies that 3 is not included, and shading to the left indicates all numbers less than 3."}, {"text": "x ≤ 3", "isCorrect": false, "rationale": "This would be a closed circle at 3, shading to the left."}]}, {"question": "How would the solution set for x < 7 be written in set-builder notation?", "options": [{"text": "{x | x > 7}", "isCorrect": false, "rationale": "This notation represents 'x is greater than 7', which is the opposite of the given inequality."}, {"text": "{x | x < 7}", "isCorrect": true, "rationale": "Set-builder notation describes the solution set by stating the condition, which in this case is 'the set of all x such that x is less than 7'."}, {"text": "(−∞, 7)", "isCorrect": false, "rationale": "This is interval notation, not set-builder notation."}, {"text": "{x | x ≤ 7}", "isCorrect": false, "rationale": "This notation includes 7, whereas the original inequality x < 7 does not."}]}, {"question": "Which interval notation correctly represents the inequality x > -4?", "options": [{"text": "[-4, ∞)", "isCorrect": false, "rationale": "The bracket indicates that -4 is included, but the '>' symbol means -4 is not included. This notation represents x ≥ -4."}, {"text": "(-∞, -4]", "isCorrect": false, "rationale": "This notation represents x ≤ -4, shading to the left and including -4."}, {"text": "(-4, ∞)", "isCorrect": true, "rationale": "The parenthesis indicates that -4 is not included, and ∞ (infinity) always uses a parenthesis. Shading to the right (greater than) corresponds to extending to positive infinity."}, {"text": "(-∞, -4)", "isCorrect": false, "rationale": "This notation represents x < -4, shading to the left and not including -4."}]}, {"question": "The inequality x ≤ 10 can be written in interval notation as:", "options": [{"text": "(10, ∞)", "isCorrect": false, "rationale": "This interval represents x > 10, meaning values strictly greater than 10."}, {"text": "[10, ∞)", "isCorrect": false, "rationale": "This interval represents x ≥ 10, meaning values greater than or equal to 10."}, {"text": "(-∞, 10]", "isCorrect": true, "rationale": "The parenthesis for negative infinity indicates no lower bound, and the bracket at 10 indicates that 10 is included in the solution set, which is correct for x ≤ 10."}, {"text": "(-∞, 10)", "isCorrect": false, "rationale": "This interval represents x < 10, meaning values strictly less than 10, not including 10."}]}, {"question": "Based on the conventions described, which statement about interval notation is always true?", "options": [{"text": "Brackets [ ] are used when the endpoint is not included.", "isCorrect": false, "rationale": "Brackets are used when the endpoint *is* included. Parentheses are used when the endpoint is not included."}, {"text": "Parentheses ( ) are always paired with finite numbers.", "isCorrect": false, "rationale": "Parentheses are paired with finite numbers when the endpoint is not included, but they are also *always* paired with infinity, which is not a finite number."}, {"text": "The symbol ∞ (infinity) or -∞ (negative infinity) is always paired with a parenthesis.", "isCorrect": true, "rationale": "The text explicitly states: 'The symbol ∞ (infinity) or -∞ is always paired with a parenthesis, because infinity is not a real number.'"}, {"text": "A number line graph with a closed circle always corresponds to an interval notation using parentheses.", "isCorrect": false, "rationale": "A closed circle corresponds to an included endpoint, which uses a bracket, not a parenthesis."}]}, {"question": "An inequality's solution set is represented by the interval [-1, ∞). How would this be expressed as an inequality and graphed on a number line?", "options": [{"text": "x > -1; an open circle at -1 and shade right.", "isCorrect": false, "rationale": "An open circle implies -1 is not included, and 'x > -1' corresponds to (-1, ∞), not [-1, ∞)."}, {"text": "x ≤ -1; a closed circle at -1 and shade left.", "isCorrect": false, "rationale": "Shading left represents values less than the boundary, and this would correspond to (-∞, -1]."}, {"text": "x ≥ -1; a closed circle at -1 and shade right.", "isCorrect": true, "rationale": "The bracket '[' indicates that -1 is included, meaning 'greater than or equal to' (x ≥ -1). The '∞)' indicates shading to the right towards positive infinity. This correctly translates to a closed circle at -1 and shading to the right."}, {"text": "x < -1; an open circle at -1 and shade left.", "isCorrect": false, "rationale": "Both the inequality symbol and the shading direction are incorrect. This would correspond to (-∞, -1)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
