<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the key technique used to multiply polynomials?", "options": [{"text": "Combine like terms first, then multiply.", "isCorrect": false, "rationale": "You combine like terms after multiplying, not before. The multiplication step uses the distributive property."}, {"text": "Apply the distributive property to multiply each term of one polynomial by every term of the other, then combine like terms.", "isCorrect": true, "rationale": "Multiplying polynomials requires distributing each term of one polynomial across all terms of the other, then simplifying by combining like terms."}, {"text": "Add the exponents of all matching variables.", "isCorrect": false, "rationale": "Adding exponents applies to the Product of Powers rule for multiplying powers of the same base, not to the general process of multiplying polynomials."}, {"text": "Multiply corresponding terms by position.", "isCorrect": false, "rationale": "There is no positional correspondence in polynomial multiplication. Every term of one polynomial multiplies every term of the other."}], "id": "q01"}, {"question": "Multiply -3x^2(4x^3 - 2x + 5).", "options": [{"text": "-12x^5 + 6x^3 - 15x^2", "isCorrect": true, "rationale": "Distribute -3x^2 to each term: (-3x^2)(4x^3) = -12x^5, (-3x^2)(-2x) = +6x^3, (-3x^2)(5) = -15x^2."}, {"text": "-12x^5 - 6x^3 - 15x^2", "isCorrect": false, "rationale": "The middle term should be positive: (-3x^2)(-2x) = +6x^3 because a negative times a negative is positive."}, {"text": "-12x^6 + 6x^3 - 15x^2", "isCorrect": false, "rationale": "(-3x^2)(4x^3): add exponents 2 + 3 = 5, giving -12x^5, not -12x^6."}, {"text": "12x^5 - 6x^3 + 15x^2", "isCorrect": false, "rationale": "Distributing the negative monomial -3x^2 should produce negative leading terms. The first and third terms should be negative."}], "id": "q02"}, {"question": "What does FOIL stand for when multiplying two binomials?", "options": [{"text": "Factor, Operate, Integrate, List", "isCorrect": false, "rationale": "FOIL is a mnemonic for the four products when multiplying two binomials: First, Outer, Inner, Last."}, {"text": "First, Outer, Inner, Last", "isCorrect": true, "rationale": "FOIL describes the four pairs of terms multiplied when using (a + b)(c + d): First (ac), Outer (ad), Inner (bc), Last (bd)."}, {"text": "Factors, Operations, Inputs, Limits", "isCorrect": false, "rationale": "FOIL stands for First, Outer, Inner, Last, not the terms listed here."}, {"text": "First, Outside, Inside, Left", "isCorrect": false, "rationale": "The correct mnemonic is First, Outer, Inner, Last, not Outside or Left."}], "id": "q03"}, {"question": "Multiply (2x + 3)(x - 5) using FOIL.", "options": [{"text": "2x^2 - 7x - 15", "isCorrect": true, "rationale": "FOIL: First = (2x)(x) = 2x^2; Outer = (2x)(-5) = -10x; Inner = (3)(x) = 3x; Last = (3)(-5) = -15. Sum: 2x^2 - 10x + 3x - 15 = 2x^2 - 7x - 15."}, {"text": "2x^2 + 7x - 15", "isCorrect": false, "rationale": "The middle term is -10x + 3x = -7x, not +7x. Check the signs from the Outer and Inner products."}, {"text": "2x^2 - 7x + 15", "isCorrect": false, "rationale": "The Last product is (3)(-5) = -15, not +15. The constant term is negative."}, {"text": "2x^2 + 13x - 15", "isCorrect": false, "rationale": "Outer + Inner = -10x + 3x = -7x, not +13x. Check that both signs in the binomials are applied correctly."}], "id": "q04"}, {"question": "Multiply (x + 4)(x - 6).", "options": [{"text": "x^2 - 24", "isCorrect": false, "rationale": "The middle term is missing. FOIL gives Outer + Inner = -6x + 4x = -2x, so the result is x^2 - 2x - 24."}, {"text": "x^2 + 2x - 24", "isCorrect": false, "rationale": "The sign of the middle term is wrong. Outer = -6x and Inner = +4x; their sum is -2x, not +2x."}, {"text": "x^2 - 2x - 24", "isCorrect": true, "rationale": "FOIL: First = x^2; Outer = -6x; Inner = +4x; Last = -24. Combining: x^2 + (-6x + 4x) - 24 = x^2 - 2x - 24."}, {"text": "x^2 - 10x + 24", "isCorrect": false, "rationale": "The Last product is (4)(-6) = -24, not +24. And -6x + 4x = -2x, not -10x."}], "id": "q05"}, {"question": "When can the FOIL method be directly applied?", "options": [{"text": "Only when multiplying a monomial by a polynomial.", "isCorrect": false, "rationale": "Multiplying a monomial by a polynomial uses simple distribution. FOIL applies specifically to two binomials."}, {"text": "When multiplying any two polynomials.", "isCorrect": false, "rationale": "FOIL works only for two binomials (each with exactly two terms). For polynomials with three or more terms, a full distribution is required."}, {"text": "Only when multiplying two binomials.", "isCorrect": true, "rationale": "FOIL is a shortcut for multiplying exactly two binomials. For larger polynomials, each term of one polynomial must be distributed to every term of the other."}, {"text": "When multiplying any polynomial by a constant.", "isCorrect": false, "rationale": "Multiplying by a constant uses simple distribution, not FOIL. FOIL applies to two binomials."}], "id": "q06"}, {"question": "Multiply (x + 3)(x^2 - 2x + 4).", "options": [{"text": "x^3 + x^2 - 2x + 12", "isCorrect": true, "rationale": "Distribute x: x^3 - 2x^2 + 4x. Distribute 3: 3x^2 - 6x + 12. Combine: x^3 + (-2x^2 + 3x^2) + (4x - 6x) + 12 = x^3 + x^2 - 2x + 12."}, {"text": "x^3 - x^2 + 2x + 12", "isCorrect": false, "rationale": "Combining the x^2 terms: -2x^2 + 3x^2 = +x^2 (positive), and x terms: 4x - 6x = -2x. The correct result is x^3 + x^2 - 2x + 12."}, {"text": "x^3 + x^2 + 2x + 12", "isCorrect": false, "rationale": "The x terms: 4x + (-6x) = -2x, not +2x. The correct answer is x^3 + x^2 - 2x + 12."}, {"text": "x^3 - x^2 - 2x + 12", "isCorrect": false, "rationale": "The x^2 terms: -2x^2 + 3x^2 = +x^2 (positive, not negative). The correct answer is x^3 + x^2 - 2x + 12."}], "id": "q07"}, {"question": "Multiply (2x - 1)(x^2 + 3x - 2).", "options": [{"text": "2x^3 + 5x^2 - 7x + 2", "isCorrect": true, "rationale": "Distribute 2x: 2x^3 + 6x^2 - 4x. Distribute -1: -x^2 - 3x + 2. Combine: 2x^3 + (6x^2 - x^2) + (-4x - 3x) + 2 = 2x^3 + 5x^2 - 7x + 2."}, {"text": "2x^3 - 5x^2 - 7x + 2", "isCorrect": false, "rationale": "The x^2 terms are 6x^2 - x^2 = +5x^2 (positive). The correct answer is 2x^3 + 5x^2 - 7x + 2."}, {"text": "2x^3 + 5x^2 + 7x + 2", "isCorrect": false, "rationale": "The x terms: -4x - 3x = -7x (negative). The correct answer is 2x^3 + 5x^2 - 7x + 2."}, {"text": "2x^3 + 5x^2 - 7x - 2", "isCorrect": false, "rationale": "The constant term: (-1)(-2) = +2. The correct answer is 2x^3 + 5x^2 - 7x + 2."}], "id": "q08"}, {"question": "What is the degree of the product of a degree-2 polynomial and a degree-3 polynomial?", "options": [{"text": "2", "isCorrect": false, "rationale": "The degree of a product equals the SUM of the degrees of the factors: 2 + 3 = 5."}, {"text": "3", "isCorrect": false, "rationale": "The degree of the product is the sum of the degrees: 2 + 3 = 5, not the larger of the two degrees."}, {"text": "5", "isCorrect": true, "rationale": "The degree of the product equals the sum of the degrees of the factors: 2 + 3 = 5."}, {"text": "6", "isCorrect": false, "rationale": "Multiplying the degrees (2 * 3 = 6) is incorrect. The degree of the product is the SUM: 2 + 3 = 5."}], "id": "q09"}, {"question": "Which of the following correctly applies the distributive property to multiply the monomial 5x by (2x^2 - x + 3)?", "options": [{"text": "10x^3 - 5x^2 + 15x", "isCorrect": true, "rationale": "Distribute 5x: (5x)(2x^2) = 10x^3, (5x)(-x) = -5x^2, (5x)(3) = 15x. Result: 10x^3 - 5x^2 + 15x."}, {"text": "10x^2 - 5x + 15", "isCorrect": false, "rationale": "The exponents are wrong. Multiplying 5x by each term: 5x * 2x^2 = 10x^3 (not 10x^2) and 5x * (-x) = -5x^2 (not -5x)."}, {"text": "10x^3 + 5x^2 + 15x", "isCorrect": false, "rationale": "The second term is wrong: (5x)(-x) = -5x^2 (negative), not +5x^2."}, {"text": "7x^2 - 4x + 8", "isCorrect": false, "rationale": "This looks like addition, not multiplication. Each term in the trinomial must be multiplied by 5x."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
