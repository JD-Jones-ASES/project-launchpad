<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "To factor the trinomial $x^2 + bx + c$, which of the following conditions must the integers $p$ and $q$ satisfy?", "options": [{"text": "$p + q = b$ and $pq = c$", "isCorrect": true, "rationale": "The sum of the two integers must equal the coefficient of the linear term, while their product must equal the constant term."}, {"text": "$pq = b$ and $p + q = c$", "isCorrect": false, "rationale": "This incorrectly swaps the roles of the sum and the product in the factoring process."}, {"text": "$p - q = b$ and $pq = c$", "isCorrect": false, "rationale": "While the difference might be used when signs differ, the standard property is defined by the sum of the integers."}, {"text": "$p + q = -b$ and $pq = c$", "isCorrect": false, "rationale": "The sum must be exactly equal to $b$, not its opposite sign."}], "id": "q01"}, {"question": "Which of the following describes the signs of $p$ and $q$ when factoring $x^2 - 13x + 36$?", "options": [{"text": "Both $p$ and $q$ must be negative.", "isCorrect": true, "rationale": "Because the constant term is positive and the middle coefficient is negative, only two negative numbers can produce a positive product and a negative sum."}, {"text": "Both $p$ and $q$ must be positive.", "isCorrect": false, "rationale": "Two positive numbers would result in a positive middle term, but $b$ is negative here."}, {"text": "The signs of $p$ and $q$ must be different.", "isCorrect": false, "rationale": "Different signs would result in a negative constant term, but $c$ is positive in this trinomial."}, {"text": "The signs depend on which integer has the larger absolute value.", "isCorrect": false, "rationale": "The absolute value comparison only applies when the constant term $c$ is negative."}], "id": "q02"}, {"question": "Factor the trinomial: $x^2 - 13x + 42$.", "options": [{"text": "$(x - 6)(x - 7)$", "isCorrect": true, "rationale": "The product of $-6$ and $-7$ is $42$, and their sum is $-13$."}, {"text": "$(x - 3)(x - 14)$", "isCorrect": false, "rationale": "While the product is $42$, the sum of these integers is $-17$."}, {"text": "$(x + 6)(x + 7)$", "isCorrect": false, "rationale": "This results in a positive middle term of $+13x$ instead of $-13x$."}, {"text": "$(x - 21)(x - 2)$", "isCorrect": false, "rationale": "The product is $42$, but the sum of these integers is $-23$."}], "id": "q03"}, {"question": "What is the factored form of $x^2 + 4x - 60$?", "options": [{"text": "$(x + 10)(x - 6)$", "isCorrect": true, "rationale": "The integers $10$ and $-6$ multiply to $-60$ and add to $4$."}, {"text": "$(x - 10)(x + 6)$", "isCorrect": false, "rationale": "This would result in a middle term of $-4x$ because the larger absolute value should be positive."}, {"text": "$(x + 12)(x - 5)$", "isCorrect": false, "rationale": "The product is $-60$, but the sum of $12$ and $-5$ is $7$."}, {"text": "$(x + 15)(x - 4)$", "isCorrect": false, "rationale": "The product is $-60$, but the sum of $15$ and $-4$ is $11$."}], "id": "q04"}, {"question": "Which of these trinomials is considered 'prime' or irreducible over the integers?", "options": [{"text": "$x^2 + 4x + 5$", "isCorrect": true, "rationale": "There are no integer factors of $5$ (1, 5) that sum to $4$."}, {"text": "$x^2 - x - 2$", "isCorrect": false, "rationale": "This can be factored into $(x - 2)(x + 1)$."}, {"text": "$x^2 + 5x + 6$", "isCorrect": false, "rationale": "This can be factored into $(x + 2)(x + 3)$."}, {"text": "$x^2 - 6x + 9$", "isCorrect": false, "rationale": "This can be factored into $(x - 3)(x - 3)$."}], "id": "q05"}, {"question": "Factor the trinomial: $x^2 - 10x - 24$.", "options": [{"text": "$(x - 12)(x + 2)$", "isCorrect": true, "rationale": "The product $-12 \\times 2 = -24$ and the sum $-12 + 2 = -10$."}, {"text": "$(x - 6)(x - 4)$", "isCorrect": false, "rationale": "While the sum is $-10$, the product of these integers is $+24$ instead of $-24$."}, {"text": "$(x - 8)(x - 3)$", "isCorrect": false, "rationale": "This pair does not satisfy either the product $(-24)$ or the sum $(-10)$ requirements correctly."}, {"text": "$(x + 12)(x - 2)$", "isCorrect": false, "rationale": "This would result in a middle term of $+10x$."}], "id": "q06"}, {"question": "When factoring $x^2 + bx + c$ where $c < 0$, which rule applies to the signs and values of $p$ and $q$?", "options": [{"text": "The numbers have different signs, and the one with the larger absolute value has the same sign as $b$.", "isCorrect": true, "rationale": "A negative constant requires different signs, and the sign of the sum depends on the larger magnitude."}, {"text": "Both numbers must have the same sign as $b$.", "isCorrect": false, "rationale": "This would only be true if the constant term $c$ were positive."}, {"text": "Both numbers must be negative regardless of the sign of $b$.", "isCorrect": false, "rationale": "This only happens if $c$ is positive and $b$ is negative."}, {"text": "The numbers have different signs, and the negative number always has the larger absolute value.", "isCorrect": false, "rationale": "This is only true if the middle coefficient $b$ is also negative."}], "id": "q07"}, {"question": "Factor the trinomial: $x^2 + 11x - 126$.", "options": [{"text": "$(x + 18)(x - 7)$", "isCorrect": true, "rationale": "The product of $18$ and $-7$ is $-126$, and their sum is $11$."}, {"text": "$(x - 18)(x + 7)$", "isCorrect": false, "rationale": "This results in a middle term of $-11x$ instead of $+11x$."}, {"text": "$(x + 14)(x - 9)$", "isCorrect": false, "rationale": "The product is correct, but the sum of these integers is $5$."}, {"text": "$(x + 21)(x - 6)$", "isCorrect": false, "rationale": "The product is correct, but the sum of these integers is $15$."}], "id": "q08"}, {"question": "Factor the trinomial: $x^2 - 25x + 150$.", "options": [{"text": "$(x - 10)(x - 15)$", "isCorrect": true, "rationale": "The integers $-10$ and $-15$ multiply to $150$ and add to $-25$."}, {"text": "$(x - 5)(x - 30)$", "isCorrect": false, "rationale": "The product is $150$, but the sum is $-35$."}, {"text": "$(x + 10)(x + 15)$", "isCorrect": false, "rationale": "This would result in a middle term of $+25x$."}, {"text": "$(x - 6)(x - 25)$", "isCorrect": false, "rationale": "The product of $6$ and $25$ is $150$, but their sum is $-31$."}], "id": "q09"}, {"question": "What is the correct factorization of $x^2 - 19x + 84$?", "options": [{"text": "$(x - 7)(x - 12)$", "isCorrect": true, "rationale": "The product of $-7$ and $-12$ is $84$, and their sum is $-19$."}, {"text": "$(x - 6)(x - 14)$", "isCorrect": false, "rationale": "The sum of these factors is $-20$, not $-19$."}, {"text": "$(x - 4)(x - 21)$", "isCorrect": false, "rationale": "The sum of these factors is $-25$, not $-19$."}, {"text": "$(x - 3)(x - 28)$", "isCorrect": false, "rationale": "The sum of these factors is $-31$, not $-19$."}], "id": "q10"}, {"question": "Factor the trinomial: $x^2 + 22x + 121$.", "options": [{"text": "$(x + 11)(x + 11)$", "isCorrect": true, "rationale": "$11 \\times 11 = 121$ and $11 + 11 = 22$."}, {"text": "$(x - 11)(x - 11)$", "isCorrect": false, "rationale": "This would produce a middle term of $-22x$."}, {"text": "$(x + 1)(x + 121)$", "isCorrect": false, "rationale": "The sum of these factors is $122$."}, {"text": "$(x + 11)(x - 11)$", "isCorrect": false, "rationale": "This is the difference of squares, resulting in no middle term ($x^2 - 121$)."}], "id": "q11"}, {"question": "According to the source material, what is the best habit to build when factoring trinomials to avoid errors?", "options": [{"text": "Always check your factoring by multiplying the binomials using FOIL.", "isCorrect": true, "rationale": "Checking by multiplication ensures the factored form is equivalent to the original trinomial."}, {"text": "Memorize all factor pairs for every number up to 100.", "isCorrect": false, "rationale": "While helpful, the text specifically emphasizes verification via multiplication."}, {"text": "Identify if the trinomial is prime before attempting to factor.", "isCorrect": false, "rationale": "One usually discovers a trinomial is prime after failing to find integer factors, not before."}, {"text": "Use a calculator to find the sum and product.", "isCorrect": false, "rationale": "The text suggests mental math and the FOIL check rather than calculator use."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
