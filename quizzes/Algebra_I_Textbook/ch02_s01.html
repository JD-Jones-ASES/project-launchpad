<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 2, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best defines an equation according to the provided text?", "options": [{"text": "An expression that includes a variable.", "isCorrect": false, "rationale": "While an equation often includes a variable, this definition is incomplete as it misses the crucial element of equality between two expressions."}, {"text": "A mathematical statement that declares two expressions are equal.", "isCorrect": true, "rationale": "The text explicitly defines an equation as 'a mathematical statement that two expressions are equal' and always contains an equals sign."}, {"text": "A numerical calculation that produces a single value.", "isCorrect": false, "rationale": "This describes an arithmetic expression or calculation, not an equation, which involves a statement of equality."}, {"text": "A sequence of operations applied to a set of numbers.", "isCorrect": false, "rationale": "This describes an expression or a process, but not specifically an equation, which is characterized by the equality of two expressions."}]}, {"question": "What is the primary purpose of finding a 'solution' to an equation?", "options": [{"text": "To simplify the expressions on both sides of the equals sign.", "isCorrect": false, "rationale": "Simplifying expressions is a step in solving an equation, but it is not the definition of a solution itself. The solution is the outcome, not the process of simplification."}, {"text": "To identify the specific mathematical operation used to set up the equation.", "isCorrect": false, "rationale": "Identifying the original operation is not the purpose of a solution; a solution is the value that makes the equation true, regardless of how it was formed."}, {"text": "To determine the value of the variable that makes the mathematical statement true.", "isCorrect": true, "rationale": "The text states, 'A solution of an equation is a value of the variable that makes the equation true.'"}, {"text": "To transform the equation into a more complex, challenging form.", "isCorrect": false, "rationale": "The goal of solving is to simplify the equation to isolate the variable, not to make it more complex."}]}, {"question": "To solve the equation $z + 18 = -5$, which operation should be applied to both sides?", "options": [{"text": "Add 18", "isCorrect": false, "rationale": "Adding 18 to both sides would result in $z + 36 = 13$, which does not isolate $z$ and makes the equation incorrect."}, {"text": "Subtract 18", "isCorrect": true, "rationale": "To undo the addition of 18 on the left side, you must subtract 18 from both sides, according to the Subtraction Property of Equality. This results in $z = -5 - 18$, so $z = -23$."}, {"text": "Multiply by 18", "isCorrect": false, "rationale": "Multiplying by 18 is not the inverse operation for addition and would incorrectly transform the equation."}, {"text": "Divide by 18", "isCorrect": false, "rationale": "Dividing by 18 is not the inverse operation for addition and would incorrectly transform the equation."}]}, {"question": "Solve the equation $k - 15 = 25$.", "options": [{"text": "$k = 10$", "isCorrect": false, "rationale": "Subtracting 15 from 25 results in 10, which is incorrect. To solve, you must add 15 to both sides."}, {"text": "$k = 40$", "isCorrect": true, "rationale": "To isolate $k$, you must undo the subtraction of 15 by adding 15 to both sides of the equation. $k - 15 + 15 = 25 + 15$, which simplifies to $k = 40$."}, {"text": "$k = -10$", "isCorrect": false, "rationale": "This would result from doing 15 - 25 or incorrectly handling the signs. The correct operation is to add 15 to both sides."}, {"text": "$k = 375$", "isCorrect": false, "rationale": "This would be the result of multiplication, which is not the correct operation to solve this equation."}]}, {"question": "If $-5m = 35$, what is the value of $m$?", "options": [{"text": "$m = 7$", "isCorrect": false, "rationale": "Dividing 35 by 5 yields 7, but the coefficient is -5. You must divide by -5."}, {"text": "$m = -7$", "isCorrect": true, "rationale": "To isolate $m$, you must undo the multiplication by -5 by dividing both sides of the equation by -5, according to the Division Property of Equality. $35 / -5 = -7$."}, {"text": "$m = 40$", "isCorrect": false, "rationale": "This would be the result of addition, which is not the correct operation for solving a multiplication equation."}, {"text": "$m = -30$", "isCorrect": false, "rationale": "This would be the result of subtraction, which is not the correct operation for solving a multiplication equation."}]}, {"question": "To solve the equation $\frac{x}{8} = -4$, what operation is required?", "options": [{"text": "Divide both sides by 8.", "isCorrect": false, "rationale": "Dividing by 8 would result in $\\frac{x}{64} = -\\frac{4}{8}$, which does not isolate $x$."}, {"text": "Multiply both sides by -4.", "isCorrect": false, "rationale": "Multiplying by -4 would result in $-\\frac{4x}{8} = 16$, which does not isolate $x$ correctly."}, {"text": "Multiply both sides by 8.", "isCorrect": true, "rationale": "To undo the division by 8 on the left side, you must multiply both sides by 8, according to the Multiplication Property of Equality. This results in $x = -4 \\times 8$, so $x = -32$."}, {"text": "Subtract 8 from both sides.", "isCorrect": false, "rationale": "Subtracting 8 is not the inverse operation for division and would incorrectly transform the equation."}]}, {"question": "Which pair of equations are NOT equivalent?", "options": [{"text": "$x + 5 = 12$ and $x = 7$", "isCorrect": false, "rationale": "Both equations have $x=7$ as their solution ($7+5=12$ and $x=7$ are true statements), making them equivalent."}, {"text": "$y - 3 = 10$ and $y = 13$", "isCorrect": false, "rationale": "Both equations have $y=13$ as their solution ($13-3=10$ and $y=13$ are true statements), making them equivalent."}, {"text": "$2z = 14$ and $z = 7$", "isCorrect": false, "rationale": "Both equations have $z=7$ as their solution ($2 \\times 7=14$ and $z=7$ are true statements), making them equivalent."}, {"text": "$w + 6 = 15$ and $w - 2 = 5$", "isCorrect": true, "rationale": "For $w + 6 = 15$, the solution is $w=9$. For $w - 2 = 5$, the solution is $w=7$. Since they have different solutions, they are not equivalent equations."}]}, {"question": "The primary reason for performing the same operation on both sides of an equation is to:", "options": [{"text": "Simplify only one side of the equation.", "isCorrect": false, "rationale": "Applying an operation to only one side of an equation would change its value and make the new equation no longer equivalent to the original."}, {"text": "Introduce new variables to create a more complex problem.", "isCorrect": false, "rationale": "The goal of solving equations is to isolate the existing variable, not to introduce new ones or increase complexity."}, {"text": "Ensure the resulting equation remains equivalent to the original equation.", "isCorrect": true, "rationale": "The text states that performing the same operation on both sides 'produces an equivalent equation.' This is fundamental to transforming equations while preserving their solution set."}, {"text": "Change the algebraic properties of the equation to make it easier to guess the solution.", "isCorrect": false, "rationale": "The properties maintain the algebraic integrity, leading to an exact solution rather than a guess, and do not change the fundamental type of equation."}]}, {"question": "An equation is transformed from $A = B$ to $A + c = B + c$. This transformation is guaranteed to produce an equivalent equation by which property?", "options": [{"text": "Subtraction Property of Equality", "isCorrect": false, "rationale": "The Subtraction Property involves subtracting the same number from both sides, not adding."}, {"text": "Multiplication Property of Equality", "isCorrect": false, "rationale": "The Multiplication Property involves multiplying both sides by the same nonzero number, not adding."}, {"text": "Division Property of Equality", "isCorrect": false, "rationale": "The Division Property involves dividing both sides by the same nonzero number, not adding."}, {"text": "Addition Property of Equality", "isCorrect": true, "rationale": "The text explicitly states: 'If a = b, then a + c = b + c' is the Addition Property, which ensures equivalence when adding the same number to both sides."}]}, {"question": "According to the text, the four Properties of Equality are significant because they:", "options": [{"text": "Are exclusively used for evaluating expressions, not solving equations.", "isCorrect": false, "rationale": "The text states these properties are 'the foundation for solving every equation' and are used 'to solve more complex equations,' not just for evaluating expressions."}, {"text": "Allow for the estimation of solutions when exact values are difficult to find.", "isCorrect": false, "rationale": "The properties are used to find exact solutions by transforming equations into simpler equivalent forms, not for estimation."}, {"text": "Are foundational for solving every type of equation, from one-step to more complex ones.", "isCorrect": true, "rationale": "The text highlights their importance by stating, 'The four Properties of Equality are the foundation for solving every equation in this course. In Algebra II you will use these same properties to solve more complex equations.'"}, {"text": "Make it unnecessary to check solutions by substituting them back into the original equation.", "isCorrect": false, "rationale": "The text explicitly suggests checking solutions ('You can always check a solution by substituting it back into the original equation'), indicating the properties do not eliminate this step."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
