    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which property is illustrated by the statement: $7 \\times 11 = 11 \\times 7$?", "options": [{"text": "Associative Property of Multiplication", "isCorrect": false, "rationale": "The Associative Property of Multiplication deals with changing the grouping of factors, such as $(ab)c = a(bc)$, not just their order."}, {"text": "Commutative Property of Multiplication", "isCorrect": true, "rationale": "The Commutative Property of Multiplication states that the order in which two real numbers are multiplied does not affect their product ($a \\cdot b = b \\cdot a$). The statement $7 \\times 11 = 11 \\times 7$ directly demonstrates this by changing the order of the factors."}, {"text": "Distributive Property", "isCorrect": false, "rationale": "The Distributive Property involves multiplying a factor across a sum or difference, like $a(b+c) = ab + ac$, which is not what the given statement shows."}, {"text": "Multiplicative Identity Property", "isCorrect": false, "rationale": "The Multiplicative Identity Property states that any real number multiplied by 1 remains unchanged ($a \\cdot 1 = a$). The given statement does not involve the number 1."}], "id": "q01"}, {"question": "Which expression is equivalent to $5(y + 8) - 3y$ after applying the properties of real numbers?", "options": [{"text": "$5y + 8 - 3y = 2y + 8$", "isCorrect": false, "rationale": "This option incorrectly applies the Distributive Property by only multiplying 5 by $y$ and not by 8."}, {"text": "$5y + 40 - 3y = 2y + 40$", "isCorrect": true, "rationale": "First, apply the Distributive Property: $5(y + 8) = 5y + 5(8) = 5y + 40$. The expression becomes $5y + 40 - 3y$. Then, combine the like terms: $(5y - 3y) + 40 = 2y + 40$."}, {"text": "$5y + 40 + 3y = 8y + 40$", "isCorrect": false, "rationale": "This option correctly applies the Distributive Property but incorrectly adds $3y$ instead of subtracting it from the original expression."}, {"text": "$5(y + 8 - 3y) = 5(8 - 2y) = 40 - 10y$", "isCorrect": false, "rationale": "This option incorrectly applies the Distributive Property to include the $-3y$ term inside the parentheses, even though it was originally outside."}], "id": "q02"}, {"question": "The Additive Inverse Property states that for every real number $a$, $a + (-a) = 0$. What is the primary conceptual outcome of this property?", "options": [{"text": "It changes the sign of the number.", "isCorrect": false, "rationale": "While $-a$ is the opposite sign of $a$, the property itself describes the result of combining a number with its opposite, not merely changing a sign."}, {"text": "It results in the multiplicative identity.", "isCorrect": false, "rationale": "The multiplicative identity is 1. The additive inverse property results in 0, which is the additive identity."}, {"text": "It brings the number back to zero.", "isCorrect": true, "rationale": "The Additive Inverse Property ($a + (-a) = 0$) demonstrates that when a number is added to its opposite (its additive inverse), the sum is the additive identity, which is zero. This effectively 'cancels out' the number to zero."}, {"text": "It allows rearrangement of terms in an expression.", "isCorrect": false, "rationale": "The ability to rearrange terms is described by the Commutative Properties."}], "id": "q03"}, {"question": "Which statement best describes the role of '0' in the context of the Identity Properties for real numbers?", "options": [{"text": "It is the multiplicative inverse for any number.", "isCorrect": false, "rationale": "The multiplicative inverse of a number $a$ (where $a \\neq 0$) is $1/a$. The number 0 does not have a multiplicative inverse."}, {"text": "It acts as the additive identity, meaning adding 0 to any number does not change its value.", "isCorrect": true, "rationale": "The Additive Identity Property states that for every real number $a$, $a + 0 = a$. This means 0 is the additive identity because adding it to any number leaves the number unchanged."}, {"text": "It is used to distribute across terms in an expression.", "isCorrect": false, "rationale": "The number 0 is not primarily described as a factor for distribution; the Distributive Property involves factors like $a(b+c) = ab+ac$ where $a$ is a non-zero number in most applied contexts."}, {"text": "It represents the product when applying the Multiplicative Inverse Property.", "isCorrect": false, "rationale": "The Multiplicative Inverse Property states $a \\cdot (1/a) = 1$. The product is 1, not 0."}], "id": "q04"}, {"question": "Simplify $4(m + 2) + 3(m - 1)$, using the properties of real numbers. Which of the following shows the correct simplification?", "options": [{"text": "$4m + 2 + 3m - 1 = 7m + 1$", "isCorrect": false, "rationale": "This option incorrectly applies the Distributive Property, failing to multiply 4 by 2 and 3 by -1."}, {"text": "$4m + 8 + 3m - 3 = (4m + 3m) + (8 - 3) = 7m + 5$", "isCorrect": true, "rationale": "First, apply the Distributive Property: $4(m+2) = 4m+8$ and $3(m-1) = 3m-3$. The expression becomes $4m+8+3m-3$. Then, use Commutative and Associative Properties to group like terms: $(4m+3m) + (8-3)$. Finally, combine like terms: $7m+5$."}, {"text": "$4m + 8 + 3m - 3 = 12m^2 + 5$", "isCorrect": false, "rationale": "This option incorrectly multiplies the 'm' terms ($4m \\cdot 3m$) instead of adding them, and incorrectly combines the constants."}, {"text": "$(m + 2) + (m - 1) = 2m + 1$", "isCorrect": false, "rationale": "This option completely ignores the multiplying factors of 4 and 3, making the initial step incorrect."}], "id": "q05"}, {"question": "The textbook states that subtraction and division are not commutative. Which pair of expressions correctly demonstrates that division is not commutative?", "options": [{"text": "$10 \\div 5 = 2$ and $5 \\div 10 = 0.5$", "isCorrect": true, "rationale": "The Commutative Property would imply that changing the order of the numbers does not change the result. Here, $10 \\div 5 = 2$ but $5 \\div 10 = 0.5$. Since $2 \\neq 0.5$, this demonstrates that division is not commutative."}, {"text": "$10 - 5 = 5$ and $5 - 10 = -5$", "isCorrect": false, "rationale": "This pair correctly demonstrates that subtraction is not commutative, but the question specifically asks to demonstrate this for division."}, {"text": "$10 \\times 5 = 50$ and $5 \\times 10 = 50$", "isCorrect": false, "rationale": "This pair demonstrates the Commutative Property of Multiplication, showing that multiplication *is* commutative, which is contrary to what the question asks to demonstrate."}, {"text": "$(10 \\div 5) \\div 2 = 1$ and $10 \\div (5 \\div 2) = 4$", "isCorrect": false, "rationale": "This pair demonstrates that division is not associative, as changing the grouping changes the result. The question asks about commutativity (order), not associativity (grouping)."}], "id": "q06"}, {"question": "Identify the property illustrated by the statement: $(15 + 8) + 2 = 15 + (8 + 2)$.", "options": [{"text": "Commutative Property of Addition", "isCorrect": false, "rationale": "The Commutative Property of Addition changes the order of terms (e.g., $a+b = b+a$), but not their grouping when there are more than two terms."}, {"text": "Distributive Property", "isCorrect": false, "rationale": "The Distributive Property involves multiplication over addition or subtraction, which is not present in this statement."}, {"text": "Associative Property of Addition", "isCorrect": true, "rationale": "The Associative Property of Addition states that when adding three or more real numbers, the way the numbers are grouped does not affect their sum ($ (a + b) + c = a + (b + c) $). The statement $(15 + 8) + 2 = 15 + (8 + 2)$ perfectly illustrates a change in grouping."}, {"text": "Additive Identity Property", "isCorrect": false, "rationale": "The Additive Identity Property involves adding zero ($a+0=a$), which is not shown here."}], "id": "q07"}, {"question": "If $a = 7$, what value of $b$ satisfies the Multiplicative Inverse Property $a \\cdot b = 1$?", "options": [{"text": "$0$", "isCorrect": false, "rationale": "If $a=7$ and $b=0$, then $7 \\cdot 0 = 0$, which is not equal to 1. Zero is involved with the Additive Identity property."}, {"text": "$7$", "isCorrect": false, "rationale": "If $a=7$ and $b=7$, then $7 \\cdot 7 = 49$, which is not equal to 1."}, {"text": "$-7$", "isCorrect": false, "rationale": "If $a=7$ and $b=-7$, then $7 \\cdot (-7) = -49$, which is not equal to 1. This is the additive inverse, not multiplicative."}, {"text": "$1/7$", "isCorrect": true, "rationale": "The Multiplicative Inverse Property states that for every non-zero real number $a$, there exists a unique real number $1/a$ such that $a \\cdot (1/a) = 1$. If $a=7$, then $b$ must be $1/7$ to satisfy the property $7 \\cdot (1/7) = 1$."}], "id": "q08"}, {"question": "According to the textbook, what is the primary reason for knowing the names of the properties of real numbers?", "options": [{"text": "To make algebraic expressions appear more complex.", "isCorrect": false, "rationale": "Knowing properties helps simplify expressions, not complicate them."}, {"text": "To avoid the need to simplify expressions or solve equations.", "isCorrect": false, "rationale": "The properties are tools for simplification and equation solving, not a way to bypass them."}, {"text": "To justify each step of your work when simplifying an expression or solving an equation.", "isCorrect": true, "rationale": "The textbook explicitly states: 'Knowing these properties by name helps you justify each step of your work.' This allows for logical and clear algebraic manipulation."}, {"text": "To replace variables with specific numbers in an equation.", "isCorrect": false, "rationale": "While substitution is part of algebra, the core purpose of knowing property *names* is for justification, not the act of substitution itself."}], "id": "q09"}, {"question": "Consider the expression $(x + 0) \\cdot (1/x)$ where $x \\neq 0$. Which sequence of properties correctly simplifies this expression to its final value?", "options": [{"text": "Additive Identity, Multiplicative Inverse", "isCorrect": true, "rationale": "First, apply the Additive Identity Property to $(x + 0)$, which simplifies to $x$ (since $a+0=a$). The expression then becomes $x \\cdot (1/x)$. Next, apply the Multiplicative Inverse Property to $x \\cdot (1/x)$, which simplifies to $1$ (since $a \\cdot 1/a = 1$). This correctly describes the sequence of simplification."}, {"text": "Commutative Property of Addition, Multiplicative Identity", "isCorrect": false, "rationale": "The Commutative Property of Addition ($x+0=0+x$) is an unnecessary step for simplification. The Multiplicative Identity ($a \\cdot 1 = a$) is not directly used to achieve the final value of 1."}, {"text": "Additive Inverse, Multiplicative Inverse", "isCorrect": false, "rationale": "The Additive Inverse Property deals with $a+(-a)=0$, which is not directly applied to $(x+0)$. While Multiplicative Inverse is used, Additive Inverse is not."}, {"text": "Distributive Property, Additive Identity", "isCorrect": false, "rationale": "The Distributive Property is not applicable here as there is no factor being distributed over a sum within parentheses in a way that leads to this simplification. While Additive Identity is used, it's not the only property."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
