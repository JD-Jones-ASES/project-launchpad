<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the value of any nonzero base raised to the zero power?", "options": [{"text": "0", "isCorrect": false, "rationale": "A nonzero base raised to the zero power equals 1, not 0. The expression 0^0 is undefined."}, {"text": "The base itself.", "isCorrect": false, "rationale": "Any nonzero base raised to the power 1 equals itself. Raised to the power 0, the result is 1."}, {"text": "1", "isCorrect": true, "rationale": "For any nonzero real number a, a^0 = 1. This is consistent with the Product of Powers rule: a^m * a^0 = a^m requires a^0 = 1."}, {"text": "Undefined for all values.", "isCorrect": false, "rationale": "a^0 = 1 for all nonzero a. Only 0^0 is considered undefined."}], "id": "q01"}, {"question": "Evaluate 5^0.", "options": [{"text": "0", "isCorrect": false, "rationale": "A nonzero base raised to the zero power is 1, not 0."}, {"text": "5", "isCorrect": false, "rationale": "Any base raised to the first power equals itself, but 5 raised to the ZERO power is 1."}, {"text": "1", "isCorrect": true, "rationale": "By the Zero Exponent rule, 5^0 = 1 because any nonzero base to the zero power equals 1."}, {"text": "Undefined", "isCorrect": false, "rationale": "The zero exponent is undefined only for a base of 0. Since the base is 5 (nonzero), 5^0 = 1."}], "id": "q02"}, {"question": "What does a negative exponent mean?", "options": [{"text": "The result is a negative number.", "isCorrect": false, "rationale": "A negative exponent does not make the result negative. It creates the reciprocal of the base raised to the corresponding positive exponent."}, {"text": "The base raised to a negative exponent equals the reciprocal of the base raised to the positive exponent: a^(-n) = 1/a^n.", "isCorrect": true, "rationale": "By definition, a^(-n) = 1/a^n for any nonzero a. For example, 4^(-2) = 1/4^2 = 1/16."}, {"text": "You subtract the exponent from the base.", "isCorrect": false, "rationale": "There is no subtraction involved. A negative exponent means taking the reciprocal: a^(-n) = 1/a^n."}, {"text": "The base becomes negative.", "isCorrect": false, "rationale": "The base does not change sign. The negative exponent means taking the reciprocal of the expression with a positive exponent."}], "id": "q03"}, {"question": "Evaluate 4^(-2).", "options": [{"text": "-8", "isCorrect": false, "rationale": "4^(-2) = 1/4^2 = 1/16. The negative exponent creates a reciprocal, not a negative product."}, {"text": "1/8", "isCorrect": false, "rationale": "4^(-2) = 1/4^2 = 1/16. Note that 4^2 = 16, not 8."}, {"text": "1/16", "isCorrect": true, "rationale": "4^(-2) = 1/4^2 = 1/16. The negative exponent creates the reciprocal of 4^2 = 16."}, {"text": "-16", "isCorrect": false, "rationale": "4^(-2) = 1/16, which is positive. A negative exponent does not make the result negative."}], "id": "q04"}, {"question": "Evaluate 2^(-5).", "options": [{"text": "-10", "isCorrect": false, "rationale": "2^(-5) = 1/2^5 = 1/32. A negative exponent does not multiply 2 by 5."}, {"text": "1/32", "isCorrect": true, "rationale": "2^(-5) = 1/2^5 = 1/32."}, {"text": "-32", "isCorrect": false, "rationale": "2^(-5) = 1/32, which is a positive fraction. The negative exponent means reciprocal, not a negative value."}, {"text": "1/10", "isCorrect": false, "rationale": "2^5 = 32, not 10. Therefore 2^(-5) = 1/32."}], "id": "q05"}, {"question": "What is the Quotient of Powers rule?", "options": [{"text": "a^m / a^n = a^(m+n)", "isCorrect": false, "rationale": "Adding exponents is the Product of Powers rule (for multiplication). Division uses subtraction: a^m / a^n = a^(m-n)."}, {"text": "a^m / a^n = a^(m-n)", "isCorrect": true, "rationale": "To divide powers with the same base, keep the base and subtract the exponents: a^m / a^n = a^(m-n)."}, {"text": "a^m / a^n = a^(m*n)", "isCorrect": false, "rationale": "Multiplying exponents is the Power of a Power rule. Division uses subtraction: a^m / a^n = a^(m-n)."}, {"text": "a^m / a^n = (a/a)^(m-n)", "isCorrect": false, "rationale": "a/a = 1, so (a/a)^(m-n) = 1, which is wrong. The correct rule is a^m / a^n = a^(m-n)."}], "id": "q06"}, {"question": "Simplify x^7 / x^3. Write the answer with positive exponents.", "options": [{"text": "x^10", "isCorrect": false, "rationale": "x^10 would result from adding the exponents (7 + 3). Division uses subtraction: x^(7-3) = x^4."}, {"text": "x^4", "isCorrect": true, "rationale": "Quotient of Powers: x^7 / x^3 = x^(7-3) = x^4."}, {"text": "x^21", "isCorrect": false, "rationale": "x^21 would result from multiplying exponents (7 * 3), which is not the rule for division."}, {"text": "1/x^4", "isCorrect": false, "rationale": "Since 7 > 3, the result has a positive exponent: x^(7-3) = x^4, not 1/x^4."}], "id": "q07"}, {"question": "Simplify m^3 / m^8. Write the answer with positive exponents.", "options": [{"text": "m^5", "isCorrect": false, "rationale": "m^(3-8) = m^(-5), and a negative exponent means reciprocal: m^(-5) = 1/m^5."}, {"text": "1/m^5", "isCorrect": true, "rationale": "m^3 / m^8 = m^(3-8) = m^(-5) = 1/m^5. The negative exponent is converted to a positive exponent in the denominator."}, {"text": "-m^5", "isCorrect": false, "rationale": "A negative exponent does not make the expression negative. m^(-5) = 1/m^5, which is a positive fraction."}, {"text": "m^24", "isCorrect": false, "rationale": "m^24 would result from multiplying exponents (3 * 8 = 24), not from dividing with the Quotient rule."}], "id": "q08"}, {"question": "Why is 0^0 undefined?", "options": [{"text": "Because 0 raised to any power is always 0, but the Zero Exponent rule says any base to the zero is 1.", "isCorrect": true, "rationale": "The expression 0^0 creates a conflict: 0^n = 0 for positive n suggests 0^0 = 0, but the Zero Exponent rule (a^0 = 1) suggests 0^0 = 1. Because the two approaches disagree, 0^0 is left undefined."}, {"text": "Because 0 has no reciprocal.", "isCorrect": false, "rationale": "While it is true that 0 has no reciprocal (relevant for negative exponents), that is not the direct reason 0^0 is undefined."}, {"text": "Because zero cannot be an exponent.", "isCorrect": false, "rationale": "Zero can be an exponent for nonzero bases (a^0 = 1). The issue is specifically with base 0."}, {"text": "Because the rule a^0 = 1 only applies to negative bases.", "isCorrect": false, "rationale": "The rule a^0 = 1 applies to all nonzero bases, not just negative ones. 0^0 is undefined because of the conflict between 0^n = 0 and the zero exponent rule."}], "id": "q09"}, {"question": "Simplify (x^3 y^2)^4.", "options": [{"text": "x^12 y^8", "isCorrect": true, "rationale": "Apply Power of a Product: (x^3)^4 = x^(3*4) = x^12 and (y^2)^4 = y^(2*4) = y^8. Result: x^12 y^8."}, {"text": "x^7 y^6", "isCorrect": false, "rationale": "The exponents should be multiplied (Power of a Power), not added: x^(3*4) = x^12 and y^(2*4) = y^8."}, {"text": "x^12 y^6", "isCorrect": false, "rationale": "While x^12 is correct, y should be y^(2*4) = y^8, not y^(2+4) = y^6."}, {"text": "x^7 y^8", "isCorrect": false, "rationale": "The x exponent should be x^(3*4) = x^12, not x^(3+4) = x^7."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
