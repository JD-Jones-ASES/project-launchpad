    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines a rational equation?", "options": [{"text": "An equation where all terms are integers.", "isCorrect": false, "rationale": "This definition is too narrow; rational equations contain rational expressions, which are not limited to integer terms."}, {"text": "An equation that contains one or more rational expressions.", "isCorrect": true, "rationale": "As stated in the text, a rational equation is defined as an equation that contains one or more rational expressions."}, {"text": "An equation that always results in an integer solution.", "isCorrect": false, "rationale": "The nature of the solution (integer, fraction, etc.) does not define the type of equation."}, {"text": "An equation involving only polynomials.", "isCorrect": false, "rationale": "While rational expressions are ratios of polynomials, an equation with rational expressions is distinct from an equation containing only polynomials because of the presence of variables in denominators."}], "id": "q01"}, {"question": "According to the provided steps, what is the *initial* action required to solve a rational equation?", "options": [{"text": "Solve the resulting polynomial equation.", "isCorrect": false, "rationale": "Solving the polynomial equation is a later step, after clearing fractions."}, {"text": "Multiply every term on both sides by the least common denominator (LCD).", "isCorrect": false, "rationale": "Multiplying by the LCD is the second step; finding the LCD comes first."}, {"text": "Find the LCD of all rational expressions in the equation.", "isCorrect": true, "rationale": "The text explicitly lists 'Find the LCD of all rational expressions in the equation' as the first step in solving a rational equation."}, {"text": "Check each solution in the original equation.", "isCorrect": false, "rationale": "Checking solutions is the final step to identify and discard extraneous solutions."}], "id": "q02"}, {"question": "The primary purpose of multiplying every term in a rational equation by its Least Common Denominator (LCD) is to:", "options": [{"text": "Simplify the numerical coefficients of the terms.", "isCorrect": false, "rationale": "While simplification might occur, it's not the primary goal. The main purpose is to eliminate fractions entirely."}, {"text": "Introduce potential extraneous solutions for later filtering.", "isCorrect": false, "rationale": "Introducing extraneous solutions is a possible *consequence* of this step, not its intended purpose."}, {"text": "Transform the equation into a polynomial equation, eliminating fractions.", "isCorrect": true, "rationale": "The text states that multiplying by the LCD 'transforms the equation into a polynomial equation that you already know how to solve' by clearing the fractions."}, {"text": "Convert all expressions into rational expressions for easier manipulation.", "isCorrect": false, "rationale": "The expressions are already rational; the goal is to remove the denominators (fractions), not to convert them."}], "id": "q03"}, {"question": "An extraneous solution for a rational equation is correctly described as:", "options": [{"text": "A solution that is very large or very small.", "isCorrect": false, "rationale": "The magnitude of a solution is irrelevant to whether it is extraneous."}, {"text": "A value that appears when solving the transformed equation but does not satisfy the original equation.", "isCorrect": true, "rationale": "The caution note defines an extraneous solution as 'a value that appears when you solve the transformed equation but does not satisfy the original equation.'"}, {"text": "A solution that results in a zero in the numerator of any term.", "isCorrect": false, "rationale": "A zero in the numerator is generally acceptable and results in the term equaling zero, which is a defined value."}, {"text": "A solution that simplifies to zero.", "isCorrect": false, "rationale": "The value of the solution itself (zero or non-zero) does not determine if it is extraneous."}], "id": "q04"}, {"question": "Extraneous solutions in rational equations typically arise because:", "options": [{"text": "The initial finding of the LCD is often incorrect.", "isCorrect": false, "rationale": "This assumes an error in the process rather than a systemic cause inherent in the method."}, {"text": "Solving polynomial equations inherently produces extra, invalid solutions.", "isCorrect": false, "rationale": "Polynomial equations produce valid solutions for the polynomial itself; the issue arises when these solutions are checked against the original rational form."}, {"text": "Multiplying both sides by an expression containing a variable can introduce solutions that make a denominator zero in the original equation.", "isCorrect": true, "rationale": "The caution note explicitly states, 'Extraneous solutions arise because multiplying both sides by an expression containing a variable can introduce solutions that make a denominator zero.'"}, {"text": "The process of checking solutions is sometimes flawed.", "isCorrect": false, "rationale": "This implies an error in the checking process, not a reason for extraneous solutions to exist in the first place."}], "id": "q05"}, {"question": "Why is it essential to check all solutions by substituting them back into the *original* rational equation?", "options": [{"text": "To ensure the solution is an integer, as rational equations only have integer solutions.", "isCorrect": false, "rationale": "Rational equations can have non-integer solutions (e.g., fractions), and ensuring an integer is not the purpose of checking."}, {"text": "To verify that no denominators in the original equation become zero, thus identifying extraneous solutions.", "isCorrect": true, "rationale": "The text states, 'Check each solution in the original equation. Discard any solution that makes a denominator equal to zero.' This is crucial for identifying extraneous solutions."}, {"text": "To confirm that the solution makes the numerators equal to zero.", "isCorrect": false, "rationale": "Making numerators zero is generally not a problem; the critical issue is denominators being zero."}, {"text": "To simplify the solution process by avoiding complex algebraic steps.", "isCorrect": false, "rationale": "Checking solutions is a final validation step, not a simplification of the solving process itself."}], "id": "q06"}, {"question": "The text states that solving a proportion by cross-multiplying is a special case of clearing fractions with the LCD. This implies that:", "options": [{"text": "Cross-multiplication is only valid for simple numerical fractions without variables.", "isCorrect": false, "rationale": "The example shows cross-multiplication with expressions containing variables (x+1 and 2x-5)."}, {"text": "The process of cross-multiplying effectively achieves the same outcome as multiplying by the LCD for two equivalent ratios.", "isCorrect": true, "rationale": "For a proportion a/b = c/d, the LCD is bd. Multiplying by bd yields ad = bc, which is precisely what cross-multiplication does, demonstrating it's a special case of the general LCD method."}, {"text": "Proportions should never be solved using the general LCD method.", "isCorrect": false, "rationale": "It is stated as a 'special case' of the general method, implying the general method would also work, though cross-multiplication is more efficient for proportions."}, {"text": "Cross-multiplication always introduces extraneous solutions.", "isCorrect": false, "rationale": "Cross-multiplication itself doesn't inherently introduce extraneous solutions any more than multiplying by the LCD does; extraneous solutions depend on whether the initial denominators could be zero."}], "id": "q07"}, {"question": "Based on the provided content, cross-multiplication is a valid and efficient strategy for solving rational equations specifically when:", "options": [{"text": "The equation contains more than two rational expressions.", "isCorrect": false, "rationale": "Cross-multiplication is applicable to equations with exactly two ratios (a proportion)."}, {"text": "The equation can be expressed as an equality between two ratios (a proportion).", "isCorrect": true, "rationale": "The text explicitly connects cross-multiplication to solving proportions, which are 'an equation stating that two ratios are equal: a/b = c/d'."}, {"text": "All denominators are constants (numbers) without variables.", "isCorrect": false, "rationale": "The example of solving a proportion ($x+1/3 = 2x-5/7$) clearly shows variables in the numerators, but cross-multiplication is still applied effectively because the equation is a proportion."}, {"text": "The resulting polynomial equation is quadratic.", "isCorrect": false, "rationale": "The type of resulting polynomial equation (linear or quadratic) does not dictate when cross-multiplication can be used; it depends on the form of the rational equation itself."}], "id": "q08"}, {"question": "Consider the rational equation $\\frac{2}{x+3} + \\frac{1}{x-3} = \\frac{12}{x^2-9}$. What is the least common denominator (LCD) for this equation?", "options": [{"text": "$x+3$", "isCorrect": false, "rationale": "This is only one of the denominators and does not contain the factors of $x-3$ or $x^2-9$."}, {"text": "$x-3$", "isCorrect": false, "rationale": "This is only one of the denominators and does not contain the factors of $x+3$ or $x^2-9$."}, {"text": "$x^2-9$", "isCorrect": true, "rationale": "The denominators are $(x+3)$, $(x-3)$, and $(x^2-9)$. Since $x^2-9$ factors as $(x+3)(x-3)$, it is the least common multiple of all denominators."}, {"text": "$(x+3)(x-3)(x^2-9)$", "isCorrect": false, "rationale": "This expression is a common denominator, but it is not the *least* common denominator, as $x^2-9$ already contains $(x+3)(x-3)$."}], "id": "q09"}, {"question": "In the example $\\frac{x}{x-2} - \\frac{3}{x+1} = \\frac{6}{(x-2)(x+1)}$, the solutions $x=0$ and $x=2$ were found after clearing fractions. Why was $x=2$ discarded as an extraneous solution?", "options": [{"text": "It did not satisfy the simplified polynomial equation $x^2 - 2x = 0$.", "isCorrect": false, "rationale": "Substituting $x=2$ into $x^2 - 2x = 0$ gives $2^2 - 2(2) = 4 - 4 = 0$, so it *does* satisfy the polynomial equation."}, {"text": "Substituting $x=2$ into the original equation makes a denominator equal to zero.", "isCorrect": true, "rationale": "As explained in the example's check, for $x=2$, the term $x/(x-2)$ becomes $2/0$, which is undefined. This is the definition of an extraneous solution in this context."}, {"text": "The value $x=2$ is an even number, which is generally not preferred in rational equations.", "isCorrect": false, "rationale": "The parity of a number (even or odd) has no bearing on whether it is a valid solution to a rational equation."}, {"text": "It was a negative solution, and rational equations cannot have negative solutions.", "isCorrect": false, "rationale": "The value $x=2$ is positive. Also, rational equations can indeed have negative solutions, as seen in the proportion example where $x=-22$ was a valid solution."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
