    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 9, Section 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following sets of side lengths does NOT form a right triangle?", "options": [{"text": "$9, 12, 16$", "isCorrect": true, "rationale": "Applying the converse of the Pythagorean Theorem, $9^2 + 12^2 = 81 + 144 = 225$, which does not equal $16^2 = 256$."}, {"text": "$8, 15, 17$", "isCorrect": false, "rationale": "This set satisfies $8^2 + 15^2 = 64 + 225 = 289$, which equals $17^2$."}, {"text": "$7, 24, 25$", "isCorrect": false, "rationale": "This set satisfies $7^2 + 24^2 = 49 + 576 = 625$, which equals $25^2$."}, {"text": "$\\sqrt{7}, 3, 4$", "isCorrect": false, "rationale": "This set satisfies $(\\sqrt{7})^2 + 3^2 = 7 + 9 = 16$, which equals $4^2$."}]}, {"question": "What is the distance between the points $(-7, 4)$ and $(5, -1)$ in the coordinate plane?", "options": [{"text": "$13$", "isCorrect": true, "rationale": "Using the distance formula, $d = \\sqrt{(5 - (-7))^2 + (-1 - 4)^2} = \\sqrt{12^2 + (-5)^2} = \\sqrt{144 + 25} = 13$."}, {"text": "$\\sqrt{13}$", "isCorrect": false, "rationale": "This result might occur if one forgets to square the differences or performs the square root too early in the process."}, {"text": "$17$", "isCorrect": false, "rationale": "This error often occurs from adding the absolute values of the coordinates ($12 + 5$) instead of applying the Pythagorean Theorem."}, {"text": "$\\sqrt{37}$", "isCorrect": false, "rationale": "This is a result of subtracting the coordinates incorrectly, such as calculating $(5 - 7)^2 + (-1 - 4)^2$."}]}, {"question": "Calculate the distance between the points $(1, 2, 3)$ and $(3, 4, 2)$ in a three-dimensional coordinate system.", "options": [{"text": "$3$", "isCorrect": true, "rationale": "The 3D distance formula is $d = \\sqrt{(3-1)^2 + (4-2)^2 + (2-3)^2} = \\sqrt{4 + 4 + 1} = \\sqrt{9} = 3$."}, {"text": "$\\sqrt{5}$", "isCorrect": false, "rationale": "This answer ignores the $z$-coordinate and only calculates the distance in the $xy$-plane."}, {"text": "$9$", "isCorrect": false, "rationale": "This is the square of the distance; the final step of taking the square root was omitted."}, {"text": "$\\sqrt{33}$", "isCorrect": false, "rationale": "This might result from adding the squared coordinates themselves rather than the squared differences."}]}, {"question": "If the midpoint of a line segment is $(3, -2)$ and one endpoint is $(1, 4)$, what are the coordinates of the other endpoint?", "options": [{"text": "$(5, -8)$", "isCorrect": true, "rationale": "Using the midpoint formula $\\frac{x_1 + x_2}{2} = x_m$, we solve $1 + x_2 = 6$ and $4 + y_2 = -4$."}, {"text": "$(2, 1)$", "isCorrect": false, "rationale": "This is the midpoint of the segment between the given endpoint and the origin, or an incorrect average of $(1, 4)$ and $(3, -2)$."}, {"text": "$(4, -6)$", "isCorrect": false, "rationale": "This result stems from adding the midpoint to the endpoint rather than using the midpoint formula to find the missing extreme."}, {"text": "$(7, -10)$", "isCorrect": false, "rationale": "This error occurs if the coordinates are doubled incorrectly or if the formula is misapplied during the algebraic isolation."}]}, {"question": "A right triangle has a hypotenuse of length $10\\sqrt{5}$ and one leg of length $6\\sqrt{5}$. Find the length of the other leg.", "options": [{"text": "$8\\sqrt{5}$", "isCorrect": true, "rationale": "Applying $a^2 + b^2 = c^2$, we have $(6\\sqrt{5})^2 + b^2 = (10\\sqrt{5})^2$, which simplifies to $180 + b^2 = 500$, so $b^2 = 320$ and $b = 8\\sqrt{5}$."}, {"text": "$4\\sqrt{5}$", "isCorrect": false, "rationale": "This is a common subtraction error when dealing with squared terms ($10-6$ before squaring)."}, {"text": "$160$", "isCorrect": false, "rationale": "This represents half of the value of $b^2$ rather than the square root of $b^2$."}, {"text": "$4\\sqrt{10}$", "isCorrect": false, "rationale": "This results from a procedural error in simplifying the radical $\\sqrt{320}$."}]}, {"question": "When deriving the distance formula between $A(x_1, y_1)$ and $B(x_2, y_2)$, a right triangle is formed by a horizontal and a vertical segment. At what point do these segments meet to form the right angle?", "options": [{"text": "$(x_2, y_1)$", "isCorrect": true, "rationale": "A horizontal line from $A$ has the equation $y = y_1$ and a vertical line from $B$ has the equation $x = x_2$; they intersect at $(x_2, y_1)$."}, {"text": "$(x_1, y_2)$", "isCorrect": false, "rationale": "While this point also forms a right triangle, the standard derivation described in the text uses the horizontal segment from $A$ and vertical from $B$."}, {"text": "$(x_1 + x_2, y_1 + y_2)$", "isCorrect": false, "rationale": "This point is unrelated to the vertices of the right triangle used in the distance formula proof."}, {"text": "$(\\frac{x_1+x_2}{2}, \\frac{y_1+y_2}{2})$", "isCorrect": false, "rationale": "This is the midpoint of the segment $AB$, which lies on the hypotenuse, not at the right angle vertex."}]}, {"question": "Find the distance between the points $(-2\\sqrt{3}, 5)$ and $(\\sqrt{3}, 2)$.", "options": [{"text": "$6$", "isCorrect": true, "rationale": "The difference in $x$ is $3\\sqrt{3}$ and the difference in $y$ is $-3$. $d = \\sqrt{(3\\sqrt{3})^2 + (-3)^2} = \\sqrt{27 + 9} = \\sqrt{36} = 6$."}, {"text": "$3\\sqrt{2}$", "isCorrect": false, "rationale": "This results from incorrectly subtracting the $x$-coordinates as $\\sqrt{3} - 2\\sqrt{3}$ instead of considering the negative sign."}, {"text": "$\\sqrt{12}$", "isCorrect": false, "rationale": "This calculation ignores the squaring process or fails to account for the radical magnitude correctly."}, {"text": "$\\sqrt{30}$", "isCorrect": false, "rationale": "This error occurs if one squares $3\\sqrt{3}$ as $9$ or $21$ instead of $27$."}]}, {"question": "If the distance between $(3, y)$ and $(7, 2)$ is $2\\sqrt{5}$, which of the following are possible values for $y$?", "options": [{"text": "$0$ or $4$", "isCorrect": true, "rationale": "Setting up $(2\\sqrt{5})^2 = (7-3)^2 + (y-2)^2$ leads to $20 = 16 + (y-2)^2$, so $(y-2)^2 = 4$, making $y-2 = \\pm 2$."}, {"text": "$2$ or $6$", "isCorrect": false, "rationale": "This reflects an error in solving the quadratic equation $(y-2)^2 = 4$ or a sign error during isolation."}, {"text": "$-2$ or $2$", "isCorrect": false, "rationale": "This assumes the $y$-difference must be $0$, failing to account for the squared difference requirements of the formula."}, {"text": "$4$ only", "isCorrect": false, "rationale": "This misses the second possible solution that arises from the square root of the squared difference."}]}, {"question": "Find the midpoint of the segment with endpoints $(\\frac{1}{2}, \\frac{3}{4})$ and $(\\frac{3}{2}, -\\frac{1}{4})$.", "options": [{"text": "$(1, \\frac{1}{4})$", "isCorrect": true, "rationale": "The $x$-midpoint is $\\frac{0.5+1.5}{2} = 1$ and the $y$-midpoint is $\\frac{0.75-0.25}{2} = \\frac{0.5}{2} = 0.25$."}, {"text": "$(2, \\frac{1}{2})$", "isCorrect": false, "rationale": "This error occurs if the sum of the coordinates is not divided by two as required by the midpoint formula."}, {"text": "$(1, \\frac{1}{2})$", "isCorrect": false, "rationale": "This is a common calculation error when combining the fractions in the $y$-coordinate numerator."}, {"text": "$(\\frac{1}{2}, \\frac{1}{4})$", "isCorrect": false, "rationale": "This result might occur from subtracting the $x$-coordinates rather than averaging them."}]}, {"question": "Calculate the area of a right triangle that has a hypotenuse of $25$ and one leg of $7$.", "options": [{"text": "$84$", "isCorrect": true, "rationale": "First, find the other leg: $b = \\sqrt{25^2 - 7^2} = \\sqrt{576} = 24$. Then, Area $= \\frac{1}{2} \\times 7 \\times 24 = 84$."}, {"text": "$300$", "isCorrect": false, "rationale": "This is the result of using the hypotenuse and the given leg as the two legs for the area formula ($0.5 \\times 25 \\times 24$)."}, {"text": "$168$", "isCorrect": false, "rationale": "This is the product of the two legs ($7 \\times 24$) without multiplying by $\\frac{1}{2}$ as required for triangle area."}, {"text": "$87.5$", "isCorrect": false, "rationale": "This results from using the hypotenuse and the leg given in the prompt ($0.5 \\times 7 \\times 25$) instead of finding the missing leg."}]}, {"question": "In any right triangle where the side lengths are $a, b,$ and $c$, which statement is always true according to the Pythagorean Theorem properties?", "options": [{"text": "The hypotenuse $c$ is the side opposite the right angle.", "isCorrect": true, "rationale": "By definition, the hypotenuse is the side across from the $90^{\\circ}$ angle and is always the longest side of the triangle."}, {"text": "The sum of the lengths of the legs is equal to the length of the hypotenuse.", "isCorrect": false, "rationale": "This contradicts the triangle inequality theorem; only the sum of the squares is equal."}, {"text": "The hypotenuse is always shorter than the sum of the squares of the legs.", "isCorrect": false, "rationale": "The theorem states the hypotenuse squared is exactly equal to the sum of the squares of the legs."}, {"text": "The right angle is formed by the hypotenuse and the shortest leg.", "isCorrect": false, "rationale": "The right angle is exclusively formed by the intersection of the two legs ($a$ and $b$)."}]}, {"question": "What is the distance from the origin $(0, 0, 0)$ to the point $(-2, 4, 4)$?", "options": [{"text": "$6$", "isCorrect": true, "rationale": "The distance is $\\sqrt{(-2)^2 + 4^2 + 4^2} = \\sqrt{4 + 16 + 16} = \\sqrt{36} = 6$."}, {"text": "$36$", "isCorrect": false, "rationale": "This is the sum of the squares of the coordinates, but the final square root was not taken."}, {"text": "$\\sqrt{10}$", "isCorrect": false, "rationale": "This calculation error results from adding the raw coordinate values $(-2+4+4)$ and then taking a square root."}, {"text": "$10$", "isCorrect": false, "rationale": "This is simply the sum of the absolute values of the coordinates, which does not represent the Euclidean distance."}]}, {"question": "A right triangle has a leg of length $\\sqrt{11}$ and a hypotenuse of length $6$. What is the length of the other leg?", "options": [{"text": "$5$", "isCorrect": true, "rationale": "Using $a^2 + b^2 = c^2$, we get $(\\sqrt{11})^2 + b^2 = 6^2$, which is $11 + b^2 = 36$, so $b^2 = 25$ and $b = 5$."}, {"text": "$\\sqrt{47}$", "isCorrect": false, "rationale": "This error occurs if the squares of the sides are added ($36 + 11$) instead of subtracted."}, {"text": "$\\sqrt{25}$", "isCorrect": false, "rationale": "While numerically equivalent to $5$, standard convention is to simplify perfect squares, and this choice often indicates an incomplete calculation."}, {"text": "$25$", "isCorrect": false, "rationale": "This value represents the square of the leg length ($b^2$) rather than the leg length itself ($b$)."}]}, {"question": "Find the midpoint of the segment connecting the origin $(0, 0)$ and the point that is the midpoint of $(4, 8)$ and $(12, 16)$.", "options": [{"text": "$(4, 6)$", "isCorrect": true, "rationale": "The midpoint of $(4, 8)$ and $(12, 16)$ is $(8, 12)$. The midpoint between $(0, 0)$ and $(8, 12)$ is $(4, 6)$."}, {"text": "$(8, 12)$", "isCorrect": false, "rationale": "This is the first midpoint calculated, but it ignores the second part of the question requiring the midpoint relative to the origin."}, {"text": "$(2, 3)$", "isCorrect": false, "rationale": "This results from dividing the coordinates of the first midpoint by $4$ instead of $2$."}, {"text": "$(6, 10)$", "isCorrect": false, "rationale": "This is an average of the first midpoint coordinates and the original segment endpoints $(4+8)/2$, which is mathematically irrelevant here."}]}, {"question": "If the midpoint of the segment joining the points $(2x, 4)$ and $(6, 2y)$ is the point $(7, 5)$, what is the value of $x + y$?", "options": [{"text": "$7$", "isCorrect": true, "rationale": "From the midpoint formula: $\\frac{2x+6}{2} = 7 \\rightarrow 2x = 8 \\rightarrow x = 4$, and $\\frac{4+2y}{2} = 5 \\rightarrow 2y = 6 \\rightarrow y = 3$. Thus $4 + 3 = 7$."}, {"text": "$12$", "isCorrect": false, "rationale": "This error results if one forgets to divide the sum of the coordinates by $2$ when setting up the midpoint equation."}, {"text": "$10$", "isCorrect": false, "rationale": "This value might be reached through arithmetic errors when solving for the variables $x$ and $y$ independently."}, {"text": "$5$", "isCorrect": false, "rationale": "This might occur from incorrectly setting the coordinate sums equal to the midpoint values directly."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
