<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following numbers is NOT correctly written in scientific notation?", "options": [{"text": "1.0 × 10^5", "isCorrect": false, "rationale": "This number is correctly written in scientific notation because its coefficient (1.0) is between 1 and 10 (inclusive of 1) and the exponent (5) is an integer."}, {"text": "0.5 × 10^-3", "isCorrect": true, "rationale": "This number is not correctly written in scientific notation because its coefficient (0.5) is less than 1. For scientific notation, the coefficient 'a' must satisfy 1 ≤ a < 10."}, {"text": "9.9 × 10^2", "isCorrect": false, "rationale": "This number is correctly written in scientific notation because its coefficient (9.9) is between 1 and 10, and the exponent (2) is an integer."}, {"text": "7 × 10^0", "isCorrect": false, "rationale": "This number is correctly written in scientific notation because its coefficient (7) is between 1 and 10, and the exponent (0) is an integer."}], "id": "q01"}, {"question": "The distance from Earth to the Sun is approximately 93,000,000 miles. How is this number expressed in scientific notation?", "options": [{"text": "93 × 10^6", "isCorrect": false, "rationale": "This is incorrect because the coefficient (93) is not between 1 and 10. It needs to be adjusted further."}, {"text": "9.3 × 10^7", "isCorrect": true, "rationale": "To convert 93,000,000 to scientific notation, move the decimal point 7 places to the left to get 9.3. Since the decimal was moved to the left, the exponent is positive 7."}, {"text": "0.93 × 10^8", "isCorrect": false, "rationale": "This is incorrect because the coefficient (0.93) is not between 1 and 10."}, {"text": "9.3 × 10^-7", "isCorrect": false, "rationale": "This is incorrect because moving the decimal to the left results in a positive exponent, not a negative one."}], "id": "q02"}, {"question": "A red blood cell is about 0.000007 meters across. Write this measurement in scientific notation.", "options": [{"text": "7.0 × 10^6", "isCorrect": false, "rationale": "This is incorrect. Moving the decimal to the right results in a negative exponent, not a positive one."}, {"text": "0.7 × 10^-5", "isCorrect": false, "rationale": "This is incorrect because the coefficient (0.7) is not between 1 and 10."}, {"text": "7.0 × 10^-6", "isCorrect": true, "rationale": "To convert 0.000007 to scientific notation, move the decimal point 6 places to the right to get 7.0. Since the decimal was moved to the right, the exponent is negative 6."}, {"text": "70 × 10^-7", "isCorrect": false, "rationale": "This is incorrect because the coefficient (70) is not between 1 and 10."}], "id": "q03"}, {"question": "What is 4.15 × 10^5 in standard form?", "options": [{"text": "415,000", "isCorrect": true, "rationale": "To convert 4.15 × 10^5 to standard form, move the decimal point 5 places to the right (since the exponent is positive 5). This results in 415,000."}, {"text": "41,500", "isCorrect": false, "rationale": "This is incorrect; the decimal point was moved only 4 places to the right instead of 5."}, {"text": "0.0000415", "isCorrect": false, "rationale": "This is incorrect; a positive exponent means moving the decimal to the right, making the number larger, not smaller."}, {"text": "4,150,000", "isCorrect": false, "rationale": "This is incorrect; the decimal point was moved 6 places to the right instead of 5."}], "id": "q04"}, {"question": "Convert 8.9 × 10^-3 to standard form.", "options": [{"text": "8900", "isCorrect": false, "rationale": "This is incorrect; a negative exponent means moving the decimal to the left, making the number smaller, not larger."}, {"text": "0.0089", "isCorrect": true, "rationale": "To convert 8.9 × 10^-3 to standard form, move the decimal point 3 places to the left (since the exponent is negative 3). This results in 0.0089."}, {"text": "0.00089", "isCorrect": false, "rationale": "This is incorrect; the decimal point was moved 4 places to the left instead of 3."}, {"text": "0.890", "isCorrect": false, "rationale": "This is incorrect; the decimal point was moved only 1 place to the left instead of 3."}], "id": "q05"}, {"question": "Evaluate (2.5 × 10^3)(3 × 10^6) and express the answer in scientific notation.", "options": [{"text": "7.5 × 10^9", "isCorrect": true, "rationale": "To multiply numbers in scientific notation, multiply the coefficients (2.5 × 3 = 7.5) and add the exponents (3 + 6 = 9). The result is 7.5 × 10^9, which is already in correct scientific notation."}, {"text": "7.5 × 10^18", "isCorrect": false, "rationale": "This is incorrect; when multiplying powers of 10, the exponents should be added, not multiplied."}, {"text": "75 × 10^9", "isCorrect": false, "rationale": "This is incorrect; the coefficient (75) is not between 1 and 10."}, {"text": "7.5 × 10^36", "isCorrect": false, "rationale": "This is incorrect; the exponents should be added (3+6=9), not multiplied in this manner."}], "id": "q06"}, {"question": "Calculate (9.6 × 10^8) / (3.2 × 10^2) and write the result in scientific notation.", "options": [{"text": "3.0 × 10^4", "isCorrect": false, "rationale": "This is incorrect; when dividing powers of 10, the exponents should be subtracted (8-2=6), not 4."}, {"text": "3.0 × 10^6", "isCorrect": true, "rationale": "To divide numbers in scientific notation, divide the coefficients (9.6 ÷ 3.2 = 3.0) and subtract the exponents (8 - 2 = 6). The result is 3.0 × 10^6, which is in correct scientific notation."}, {"text": "30 × 10^6", "isCorrect": false, "rationale": "This is incorrect; the coefficient (30) is not between 1 and 10."}, {"text": "3.0 × 10^10", "isCorrect": false, "rationale": "This is incorrect; when dividing powers of 10, the exponents should be subtracted, not added."}], "id": "q07"}, {"question": "Simplify (4 × 10^6)(5 × 10^4) and write the answer in scientific notation.", "options": [{"text": "20 × 10^10", "isCorrect": false, "rationale": "This is an intermediate step. The coefficient (20) is not between 1 and 10, so further adjustment is needed."}, {"text": "2.0 × 10^11", "isCorrect": true, "rationale": "First, multiply the coefficients (4 × 5 = 20) and add the exponents (6 + 4 = 10), resulting in 20 × 10^10. Since 20 is not between 1 and 10, rewrite 20 as 2.0 × 10^1. Then, combine the powers of 10: 2.0 × 10^1 × 10^10 = 2.0 × 10^(1+10) = 2.0 × 10^11."}, {"text": "2.0 × 10^10", "isCorrect": false, "rationale": "This is incorrect. The coefficient (20) was correctly adjusted to 2.0, but the exponent was not adjusted by adding 1."}, {"text": "2.0 × 10^24", "isCorrect": false, "rationale": "This is incorrect; the exponents should be added, not multiplied, and the adjustment for the coefficient was not correctly applied."}], "id": "q08"}, {"question": "When multiplying (6 × 10^7) by (3 × 10^2), the initial product of the coefficients is 18. What is the correct next step to write the answer in proper scientific notation?", "options": [{"text": "Change 18 to 1.8 × 10^1 and add 1 to the exponent of 10.", "isCorrect": true, "rationale": "Since 18 is not between 1 and 10, it must be rewritten as 1.8 × 10^1. This means the overall exponent for 10 will increase by 1, reflecting the leftward decimal shift in the coefficient."}, {"text": "Change 18 to 1.8 × 10^-1 and subtract 1 from the exponent of 10.", "isCorrect": false, "rationale": "This is incorrect. Changing 18 to 1.8 means moving the decimal to the left, which corresponds to a positive power of 10, not negative, and therefore the main exponent should increase, not decrease."}, {"text": "Leave 18 as is, as it's a whole number.", "isCorrect": false, "rationale": "This is incorrect. For a number to be in scientific notation, the coefficient 'a' must be between 1 and 10 (1 ≤ a < 10), and 18 does not meet this criterion."}, {"text": "Divide 18 by 10 and subtract 1 from the exponent of 10.", "isCorrect": false, "rationale": "Dividing the coefficient by 10 (making it 1.8) means you've made the 'a' part smaller, so to keep the number equivalent, the power of 10 must increase, not decrease, to compensate."}], "id": "q09"}, {"question": "On a scientific calculator, a number is displayed as 6.17E+09. How would this number be written in standard scientific notation?", "options": [{"text": "6.17 × 10^-9", "isCorrect": false, "rationale": "The 'E+09' indicates a positive exponent of 9, not negative. So, this option is incorrect."}, {"text": "6.17 × 10^9", "isCorrect": true, "rationale": "The 'E' or 'EXP' notation on calculators stands for 'times ten to the power of'. Therefore, 6.17E+09 means 6.17 × 10^9."}, {"text": "617 × 10^7", "isCorrect": false, "rationale": "While numerically equivalent, this is not correct scientific notation because the coefficient (617) is not between 1 and 10."}, {"text": "0.00000000617", "isCorrect": false, "rationale": "This is incorrect. A positive exponent of 9 indicates a very large number, not a very small one. This would be equivalent to 6.17 × 10^-9."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
