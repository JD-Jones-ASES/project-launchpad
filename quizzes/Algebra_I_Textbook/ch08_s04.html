<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 8, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Given the quadratic equation $3x^2 - 5x + 1 = 0$, which of the following best describes the nature of its solutions?", "options": [{"text": "Two distinct irrational solutions", "isCorrect": true, "rationale": "The discriminant is calculated as $(-5)^2 - 4(3)(1) = 13$; since $13$ is positive but not a perfect square, there are two distinct real solutions that are irrational."}, {"text": "Two distinct rational solutions", "isCorrect": false, "rationale": "This would require the discriminant to be a positive perfect square, but $13$ is not a perfect square."}, {"text": "Exactly one real solution", "isCorrect": false, "rationale": "One real solution occurs only when the discriminant equals zero, which is not the case here."}, {"text": "No real solutions", "isCorrect": false, "rationale": "This occurs only when the discriminant is less than zero, but here it is $13$."}]}, {"question": "For what values of $k$ will the equation $x^2 + kx + 25 = 0$ have exactly one real solution?", "options": [{"text": "$k = 10$ or $k = -10$", "isCorrect": true, "rationale": "For one real solution, the discriminant $k^2 - 4(1)(25)$ must equal zero, leading to $k^2 = 100$."}, {"text": "$k = 5$ or $k = -5$", "isCorrect": false, "rationale": "This assumes the constant term $c$ is squared in the discriminant formula rather than being multiplied by $4a$."}, {"text": "$k = 100$", "isCorrect": false, "rationale": "This value would make the discriminant $10000 - 100$, which does not equal zero."}, {"text": "$k = 0$", "isCorrect": false, "rationale": "If $k=0$, the discriminant would be $-100$, resulting in no real solutions."}]}, {"question": "If the discriminant of a quadratic equation with integer coefficients is $24$, which method is most likely the most efficient to solve the equation?", "options": [{"text": "Quadratic Formula", "isCorrect": true, "rationale": "Since $24$ is not a perfect square, the solutions involve radicals, making factoring impossible over the integers."}, {"text": "Factoring", "isCorrect": false, "rationale": "Factoring over the integers requires the discriminant to be a perfect square, which $24$ is not."}, {"text": "Square Root Property", "isCorrect": false, "rationale": "This method is only most efficient if the linear term $b$ is zero or the equation is already in a squared binomial form."}, {"text": "Completing the Square", "isCorrect": false, "rationale": "While possible, the source material notes the Quadratic Formula is the standard choice when factoring is difficult or impossible."}]}, {"question": "Determine the discriminant of the equation $-2x^2 + 4x - 5 = 0$.", "options": [{"text": "$-24$", "isCorrect": true, "rationale": "Substituting into $b^2 - 4ac$ gives $4^2 - 4(-2)(-5) = 16 - 40 = -24$."}, {"text": "$56$", "isCorrect": false, "rationale": "This results from a sign error, incorrectly adding $40$ to $16$ instead of subtracting it."}, {"text": "$-56$", "isCorrect": false, "rationale": "This error often occurs if $b^2$ is incorrectly calculated as $-16$ and then $40$ is subtracted."}, {"text": "$24$", "isCorrect": false, "rationale": "This error occurs if the negative sign of the leading coefficient $a$ is ignored in the subtraction."}]}, {"question": "Which of the following conditions on the discriminant $D$ ensures that a quadratic equation can be solved by factoring over the integers?", "options": [{"text": "$D$ is a positive perfect square", "isCorrect": true, "rationale": "A perfect square discriminant ensures the square root in the quadratic formula results in a rational number, indicating the quadratic is factorable over integers."}, {"text": "$D > 0$", "isCorrect": false, "rationale": "While $D > 0$ ensures real solutions, they may be irrational (involving radicals) if $D$ is not a perfect square."}, {"text": "$D = 0$", "isCorrect": false, "rationale": "While an equation with $D = 0$ is technically factorable as a perfect square trinomial, the general condition for factorability includes all positive perfect squares."}, {"text": "$D < 0$", "isCorrect": false, "rationale": "A negative discriminant means there are no real solutions, which implies it cannot be factored over the integers."}]}, {"question": "If the coefficients $a$ and $c$ of the quadratic equation $ax^2 + bx + c = 0$ have opposite signs (one positive, one negative), what can be concluded about the solutions?", "options": [{"text": "There are always two distinct real solutions.", "isCorrect": true, "rationale": "If $a$ and $c$ have opposite signs, the product $ac$ is negative, making $-4ac$ positive; thus $b^2 - 4ac$ is the sum of two non-negative numbers, one of which is strictly positive."}, {"text": "There are no real solutions.", "isCorrect": false, "rationale": "This would require $b^2 - 4ac < 0$, which is impossible if $-4ac$ is positive."}, {"text": "There is exactly one real solution.", "isCorrect": false, "rationale": "This would require the discriminant to be zero, which cannot happen if $ac$ is negative because $b^2 - 4ac$ would be strictly greater than zero."}, {"text": "The solutions must be rational.", "isCorrect": false, "rationale": "While there are two real solutions, they are only rational if the resulting positive discriminant is also a perfect square."}]}, {"question": "Using the 'Choosing a Solution Method' guide, which equation is best solved using the Square Root Property?", "options": [{"text": "$3(x - 2)^2 = 27$", "isCorrect": true, "rationale": "The equation is already in the form $(ax + b)^2 = k$, which is the specific criteria for using the Square Root Property efficiently."}, {"text": "$x^2 - 5x + 6 = 0$", "isCorrect": false, "rationale": "This equation has a linear term and factors easily, so factoring is more efficient."}, {"text": "$2x^2 + 7x - 1 = 0$", "isCorrect": false, "rationale": "This equation is best solved with the Quadratic Formula as it does not factor easily and contains a linear term."}, {"text": "$x^2 + 4x + 4 = 0$", "isCorrect": false, "rationale": "This is a perfect square trinomial $(x+2)^2 = 0$, but factoring is generally the first check for this form."}]}, {"question": "In the equation $2x^2 - 8x + 8 = 0$, what does the discriminant reveal about the graph of the corresponding parabola?", "options": [{"text": "The parabola touches the $x$-axis at exactly one point.", "isCorrect": true, "rationale": "The discriminant is $(-8)^2 - 4(2)(8) = 64 - 64 = 0$, which indicates exactly one real solution (one $x$-intercept)."}, {"text": "The parabola crosses the $x$-axis at two distinct points.", "isCorrect": false, "rationale": "This would occur only if the discriminant were greater than zero."}, {"text": "The parabola does not intersect the $x$-axis.", "isCorrect": false, "rationale": "This would occur only if the discriminant were less than zero."}, {"text": "The parabola is a straight line.", "isCorrect": false, "rationale": "A quadratic equation always represents a parabola as long as $a \\ne 0$."}]}, {"question": "Find the discriminant of $x^2 - x + 1 = 0$ and state the number of real solutions.", "options": [{"text": "$-3$; no real solutions", "isCorrect": true, "rationale": "The discriminant is $(-1)^2 - 4(1)(1) = 1 - 4 = -3$. Since it is negative, there are no real solutions."}, {"text": "$-3$; one real solution", "isCorrect": false, "rationale": "A negative discriminant never results in exactly one real solution."}, {"text": "$5$; two real solutions", "isCorrect": false, "rationale": "This error occurs if the formula is mistaken for $b^2 + 4ac$ instead of $b^2 - 4ac$."}, {"text": "$0$; one real solution", "isCorrect": false, "rationale": "This error occurs if $b^2$ is correctly identified but the $4ac$ term is incorrectly calculated as $1$."}]}, {"question": "What is the nature of the solutions for a quadratic equation where the discriminant is calculated to be $49$?", "options": [{"text": "Two distinct rational solutions", "isCorrect": true, "rationale": "Because $49$ is a positive perfect square ($7^2$), the solutions will be rational and distinct."}, {"text": "Two distinct irrational solutions", "isCorrect": false, "rationale": "Irrational solutions occur when the discriminant is positive but not a perfect square."}, {"text": "Exactly one rational solution", "isCorrect": false, "rationale": "One solution only occurs when the discriminant is zero."}, {"text": "No real solutions", "isCorrect": false, "rationale": "No real solutions occur when the discriminant is negative."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
