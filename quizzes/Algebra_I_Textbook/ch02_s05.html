    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 2, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the fundamental difference between a ratio and a proportion, as defined in the text?", "options": [{"text": "A ratio compares quantities using addition, while a proportion compares them using division.", "isCorrect": false, "rationale": "The text states that a ratio is a comparison of two quantities by division, not addition. This option incorrectly defines a ratio."}, {"text": "A ratio is a comparison of two quantities by division, whereas a proportion is an equation stating that two ratios are equal.", "isCorrect": true, "rationale": "The text explicitly defines a ratio as 'a comparison of two quantities by division' and a proportion as 'an equation stating that two ratios are equal'. This option correctly captures both definitions and their distinction."}, {"text": "A ratio involves cross-multiplication, but a proportion does not.", "isCorrect": false, "rationale": "Cross-multiplication is a method used to solve proportions (equations involving two equal ratios), not ratios themselves. This statement is incorrect."}, {"text": "A ratio can only be written as a fraction, while a proportion can be written with a colon or 'to'.", "isCorrect": false, "rationale": "The text shows that a ratio can be written as a fraction (a/b), with a colon (a:b), or with 'to' (a to b). A proportion is specifically an equation of two equal ratios, often written with an equals sign between two fractions."}], "id": "q01"}, {"question": "The Cross-Multiplication Property states that if a/b = c/d (where b ≠ 0, d ≠ 0), then which of the following is true?", "options": [{"text": "a + d = b + c", "isCorrect": false, "rationale": "This represents an incorrect algebraic manipulation and is not related to the Cross-Multiplication Property."}, {"text": "ad = bc", "isCorrect": true, "rationale": "The Cross-Multiplication Property, as stated in the text, is 'If a/b = c/d and b ≠ 0, d ≠ 0, then ad = bc.' This is the correct form."}, {"text": "a/c = b/d", "isCorrect": false, "rationale": "While this can be derived from the original proportion, it is not the direct statement of the Cross-Multiplication Property as presented, which focuses on products of the 'cross' terms."}, {"text": "ac = bd", "isCorrect": false, "rationale": "This would be the result of multiplying numerators and denominators across, which is not the Cross-Multiplication Property used for solving proportions."}], "id": "q02"}, {"question": "Solve the proportion: x/6 = 5/9", "options": [{"text": "x = 30", "isCorrect": false, "rationale": "If x = 30, then 30/6 = 5, which is not equal to 5/9. This is an incorrect calculation."}, {"text": "x = 10/3", "isCorrect": true, "rationale": "Applying cross-multiplication: 9x = 6 * 5. So, 9x = 30. Dividing by 9 gives x = 30/9, which simplifies to 10/3. This matches the example in the text."}, {"text": "x = 54/5", "isCorrect": false, "rationale": "This would imply 5x = 9 * 6, which is an incorrect application of cross-multiplication. The correct cross-multiplication is 9x = 6 * 5."}, {"text": "x = 15/2", "isCorrect": false, "rationale": "This result suggests an incorrect calculation, possibly from dividing 30 by 4 or another error in simplification or initial setup."}], "id": "q03"}, {"question": "A recipe calls for 3 cups of flour for every 2 cups of sugar. If you want to use 5 cups of sugar, how much flour (f) would you need, assuming you maintain the same ratio?", "options": [{"text": "f = 2.5 cups", "isCorrect": false, "rationale": "This would result from an incorrect setup such as 2/3 = f/5, leading to 3f=10, so f=10/3 (approx 3.33), not 2.5. Or it might be an error in calculation or setting up the proportion (e.g., 3/2 = 5/f leads to 3f=10, so f=10/3)."}, {"text": "f = 7.5 cups", "isCorrect": true, "rationale": "Setting up the proportion as flour/sugar = flour/sugar: 3/2 = f/5. Cross-multiplying yields 3 * 5 = 2 * f, which simplifies to 15 = 2f. Solving for f gives f = 15/2 = 7.5 cups."}, {"text": "f = 10 cups", "isCorrect": false, "rationale": "This would mean 3/2 = 10/5, which simplifies to 1.5 = 2, an incorrect equality. This is not the correct amount of flour."}, {"text": "f = 15 cups", "isCorrect": false, "rationale": "This would mean 3/2 = 15/5, which simplifies to 1.5 = 3, an incorrect equality. This is not the correct amount of flour."}], "id": "q04"}, {"question": "Solve the proportion 3/n = 12/20.", "options": [{"text": "n = 5", "isCorrect": true, "rationale": "Using cross-multiplication: 3 * 20 = 12 * n. This simplifies to 60 = 12n. Dividing both sides by 12 gives n = 5. This matches the example in the text."}, {"text": "n = 60", "isCorrect": false, "rationale": "If n = 60, then 3/60 = 1/20, which is not equal to 12/20. This indicates an incorrect calculation, possibly failing to divide by 12."}, {"text": "n = 3/5", "isCorrect": false, "rationale": "This would mean 3/(3/5) = 5, which is not equal to 12/20. This indicates an inversion or division error."}, {"text": "n = 12/3", "isCorrect": false, "rationale": "This calculation 12/3 = 4, but 3/4 is not equal to 12/20. This option incorrectly isolates n."}], "id": "q05"}, {"question": "What does it mean for 'corresponding sides of similar figures' to be proportional?", "options": [{"text": "The corresponding sides must all have the same length.", "isCorrect": false, "rationale": "Similar figures have the same shape but not necessarily the same size, so their corresponding sides are usually not all the same length. This describes congruent figures, not similar ones."}, {"text": "The ratio of any pair of corresponding sides in the figures is constant.", "isCorrect": true, "rationale": "The text states that 'corresponding sides of similar figures are proportional,' meaning that the ratio of the length of a side in one figure to its corresponding side in the other figure is the same for all such pairs. This maintains the 'same shape' aspect despite different sizes."}, {"text": "The corresponding sides must be parallel to each other.", "isCorrect": false, "rationale": "While corresponding sides can sometimes be parallel in certain orientations (e.g., in nested similar triangles), this is a geometric property, not the definition of proportionality for side lengths, and it's not universally true for all similar figures."}, {"text": "The sum of the corresponding sides in one figure is equal to the sum of the corresponding sides in the other.", "isCorrect": false, "rationale": "This implies that the perimeters are equal, which is generally not true for similar figures of different sizes. Proportionality refers to ratios of individual corresponding sides, not their sums."}], "id": "q06"}, {"question": "Two similar triangles have corresponding sides in the ratio 2:7. If the longest side of the larger triangle is 28 cm, what is the length of the corresponding longest side of the smaller triangle?", "options": [{"text": "x = 4 cm", "isCorrect": false, "rationale": "This result might occur from an incorrect setup like 7/2 = x/28 leading to 7x = 56, so x = 8. Or perhaps a miscalculation after setting up the proportion correctly."}, {"text": "x = 8 cm", "isCorrect": true, "rationale": "Set up the proportion with the given ratio (smaller:larger) and the known side of the larger triangle: 2/7 = x/28. Cross-multiplying gives 2 * 28 = 7 * x. So, 56 = 7x. Dividing by 7 yields x = 8 cm."}, {"text": "x = 14 cm", "isCorrect": false, "rationale": "This would imply a 1:2 ratio, not 2:7 (28/2 = 14). An incorrect calculation or setup was used."}, {"text": "x = 98 cm", "isCorrect": false, "rationale": "This value is larger than the corresponding side of the larger triangle, which is impossible for a 'smaller triangle.' It suggests an inversion or multiplication error, such as 7/2 = 28/x, leading to x = (2 * 28) / 7 = 8, not 98."}], "id": "q07"}, {"question": "A map has a scale of 1 inch : 50 miles. If two cities are 3.5 inches apart on the map, what is the actual distance between them?", "options": [{"text": "17.5 miles", "isCorrect": false, "rationale": "This would be the result of dividing 50 by 3.5, or some other incorrect calculation. The map distance should be multiplied by the scale factor, not divided."}, {"text": "175 miles", "isCorrect": true, "rationale": "Set up a proportion: 1 inch / 50 miles = 3.5 inches / x miles. Cross-multiplying gives 1 * x = 50 * 3.5. Therefore, x = 175 miles. This correctly applies the scale drawing concept."}, {"text": "50 miles", "isCorrect": false, "rationale": "This would only be correct if the map distance was 1 inch. The map distance is 3.5 inches, so the actual distance must be greater than 50 miles."}, {"text": "1750 miles", "isCorrect": false, "rationale": "This would imply a multiplication by 500, not 50. It's an order of magnitude error in calculation."}], "id": "q08"}, {"question": "Consider the equation (y + 1)/4 = (2y - 3)/7. Which mathematical tool from the section 'Ratios and Proportions' is the most efficient way to solve for y?", "options": [{"text": "Finding a common denominator for both sides.", "isCorrect": false, "rationale": "While finding a common denominator is a valid algebraic technique, especially for adding or subtracting fractions, the text specifically highlights cross-multiplication as 'the most efficient way to solve a proportion'."}, {"text": "Cross-multiplication.", "isCorrect": true, "rationale": "The equation is a proportion (two ratios set equal), and the text explicitly states, 'The most efficient way to solve a proportion is to cross-multiply.' This method directly leads to a linear equation without dealing with common denominators for the entire expression."}, {"text": "Subtracting (2y - 3)/7 from both sides.", "isCorrect": false, "rationale": "Subtracting one ratio from the other would result in (y+1)/4 - (2y-3)/7 = 0. While mathematically correct, solving this would still require finding a common denominator or isolating terms differently, which is less efficient than cross-multiplication for a direct solution."}, {"text": "Simplifying the ratios individually first.", "isCorrect": false, "rationale": "The ratios (y+1)/4 and (2y-3)/7 cannot be simplified individually as they contain variables in the numerator. This option is not applicable or helpful for solving."}], "id": "q09"}, {"question": "A chef is scaling a recipe for a party. The original recipe calls for 2 eggs for every 3 cups of milk. If the chef uses 12 eggs, how many cups of milk (m) are needed? This scenario is an example of what mathematical concept from the text?", "options": [{"text": "Calculating a common factor.", "isCorrect": false, "rationale": "While scaling might involve factors, the core mathematical concept being applied here to find the unknown quantity is the equivalence of ratios, not just finding a common factor."}, {"text": "Finding the product of two quantities.", "isCorrect": false, "rationale": "This scenario involves comparison by division (ratios) and setting them equal, not simply multiplying two quantities. The product of eggs and milk doesn't directly solve the scaling problem."}, {"text": "Solving a proportion.", "isCorrect": true, "rationale": "The problem describes a fixed relationship (ratio) between eggs and milk that needs to be maintained when scaling up. This is precisely the definition of a proportion: an equation stating that two ratios are equal (2 eggs / 3 cups milk = 12 eggs / m cups milk). Solving for 'm' involves solving a proportion."}, {"text": "Determining the area of a figure.", "isCorrect": false, "rationale": "This problem involves quantities and scaling, not two-dimensional space. Area calculation is unrelated to this type of recipe scaling problem."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
