<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following numbers belongs to the set of whole numbers but not the set of natural numbers?", "options": [{"text": "A. -5", "isCorrect": false, "rationale": "-5 is an integer, but not a whole number because whole numbers do not include negative values."}, {"text": "B. 0", "isCorrect": true, "rationale": "The whole numbers are defined as the natural numbers together with zero ($0, 1, 2, 3, ...$). The natural numbers (or counting numbers) start from 1 ($1, 2, 3, 4, 5, ...$). Therefore, 0 is a whole number but not a natural number."}, {"text": "C. 1", "isCorrect": false, "rationale": "1 is both a natural number and a whole number."}, {"text": "D. 0.5", "isCorrect": false, "rationale": "0.5 is a rational number, but not a whole number because whole numbers do not include fractions or decimals."}], "id": "q01"}, {"question": "A number whose decimal representation is $0.12122122212222...$ (where the pattern of increasing '2's continues) would be classified as what type of number?", "options": [{"text": "A. Rational, because it has a pattern.", "isCorrect": false, "rationale": "While it has a pattern, it is not a *repeating* pattern of a fixed block of digits (e.g., 0.121212... or 0.123123...). For a number to be rational, its decimal must terminate or repeat a fixed block. This number's pattern of '2's expanding means it never truly repeats a fixed sequence."}, {"text": "B. Irrational, because it neither terminates nor repeats with a fixed block.", "isCorrect": true, "rationale": "An irrational number is a real number whose decimal form neither terminates nor repeats a fixed block of digits. The given decimal clearly does not terminate, and while it has a recognizable pattern, it's not a *repeating* pattern in the mathematical sense (e.g., 0.121212...). The number of '2's between '1's increases, preventing a fixed repeating block."}, {"text": "C. Integer, because it is positive.", "isCorrect": false, "rationale": "Integers are whole numbers and their opposites (...-2, -1, 0, 1, 2...). Decimals, unless they are equivalent to an integer (like 2.0), are not integers."}, {"text": "D. Natural, because it is counting.", "isCorrect": false, "rationale": "Natural numbers are counting numbers (1, 2, 3...). Decimals are not natural numbers."}], "id": "q02"}, {"question": "Consider the number $\\sqrt{7}$. To which of the following sets does it belong?", "options": [{"text": "A. Natural numbers only", "isCorrect": false, "rationale": "Natural numbers are 1, 2, 3, ... $\\sqrt{7}$ is approximately 2.64, which is not a natural number."}, {"text": "B. Integers and Rational numbers", "isCorrect": false, "rationale": "Integers include whole numbers and their opposites. Rational numbers can be written as a fraction $a/b$. Since 7 is not a perfect square, $\\sqrt{7}$ is an irrational number and therefore not an integer or a rational number."}, {"text": "C. Irrational numbers and Real numbers", "isCorrect": true, "rationale": "Since 7 is not a perfect square, $\\sqrt{7}$ cannot be written as a simple fraction of integers and its decimal form neither terminates nor repeats, making it an irrational number. All rational and irrational numbers collectively form the set of real numbers."}, {"text": "D. Rational numbers only", "isCorrect": false, "rationale": "Rational numbers can be written as a fraction $a/b$. $\\sqrt{7}$ cannot be expressed in this form, meaning it is not rational."}], "id": "q03"}, {"question": "Which statement accurately describes the relationship between integers and rational numbers?", "options": [{"text": "A. All rational numbers are integers.", "isCorrect": false, "rationale": "This is incorrect. For example, 0.5 is a rational number (can be written as 1/2) but it is not an integer."}, {"text": "B. All integers are rational numbers.", "isCorrect": true, "rationale": "This is correct. The text states that 'Every integer is rational'. An integer $a$ can always be written as the fraction $a/1$, fulfilling the definition of a rational number."}, {"text": "C. Integers and rational numbers are mutually exclusive.", "isCorrect": false, "rationale": "This is incorrect. Integers are a subset of rational numbers, meaning they are not mutually exclusive; they share elements."}, {"text": "D. Some integers are rational, but some rational numbers are not integers.", "isCorrect": false, "rationale": "While it's true that some rational numbers are not integers (e.g., 1/2), the first part 'some integers are rational' is an understatement. *All* integers are rational, making statement B more accurate."}], "id": "q04"}, {"question": "Evaluate the expression $|-15| - |7|$.", "options": [{"text": "A. -22", "isCorrect": false, "rationale": "This would be the result if it were $|-15 + 7|$ or if absolute values were not applied correctly."}, {"text": "B. -8", "isCorrect": false, "rationale": "This would be the result if $|-15|$ was treated as -15 or if the operation was $7 - |-15|$. Absolute value always results in a non-negative number."}, {"text": "C. 8", "isCorrect": true, "rationale": "The absolute value of -15, $|-15|$, is 15 (its distance from 0). The absolute value of 7, $|7|$, is 7. So, the expression becomes $15 - 7 = 8$."}, {"text": "D. 22", "isCorrect": false, "rationale": "This would be the result if the operation was $|-15| + |7|$."}], "id": "q05"}, {"question": "If $x$ is a non-zero real number, which of the following statements about $|x|$ is always true?", "options": [{"text": "A. $|x|$ is always equal to $x$.", "isCorrect": false, "rationale": "This is only true if $x \\ge 0$. If $x = -5$, then $|x| = 5$, which is not equal to $x$ (-5)."}, {"text": "B. $|x|$ is always a positive number.", "isCorrect": true, "rationale": "The definition of absolute value states that it is the distance from $a$ to $0$ on the number line, and distance is always non-negative. Since $x$ is specified as a *non-zero* real number, its distance from 0 must be greater than 0, meaning $|x|$ is always positive."}, {"text": "C. $|x|$ is always less than $x$.", "isCorrect": false, "rationale": "This is incorrect. If $x$ is negative, $|x|$ will be positive and thus greater than $x$. For example, if $x = -3$, then $|x| = 3$, which is greater than -3."}, {"text": "D. $|x|$ is always equal to $-x$.", "isCorrect": false, "rationale": "This is only true if $x \\le 0$. If $x = 5$, then $|x| = 5$, which is not equal to $-x$ (-5)."}], "id": "q06"}, {"question": "Order the following numbers from least to greatest: $-1.8, \\frac{5}{3}, -2, \\sqrt{2}$.", "options": [{"text": "A. $-2, -1.8, \\sqrt{2}, \\frac{5}{3}$", "isCorrect": true, "rationale": "To order, convert to decimals: $-1.8$, $\\frac{5}{3} \\approx 1.67$, $-2$, $\\sqrt{2} \\approx 1.41$. Ordering these decimals from least to greatest gives: $-2, -1.8, 1.41, 1.67$. So, $-2, -1.8, \\sqrt{2}, \\frac{5}{3}$."}, {"text": "B. $-1.8, -2, \\frac{5}{3}, \\sqrt{2}$", "isCorrect": false, "rationale": "This order incorrectly places $-1.8$ before $-2$ and $\\sqrt{2}$ after $\\frac{5}{3}$."}, {"text": "C. $-2, \\sqrt{2}, -1.8, \\frac{5}{3}$", "isCorrect": false, "rationale": "This order incorrectly places $\\sqrt{2}$ (approx 1.41) before $-1.8$ and $-1.8$ (a negative number) before $\\sqrt{2}$."}, {"text": "D. $\\frac{5}{3}, \\sqrt{2}, -1.8, -2$", "isCorrect": false, "rationale": "This order is from greatest to least, not least to greatest, and has other ordering errors among the negative numbers."}], "id": "q07"}, {"question": "The opposite of a number $a$ is $-a$. If $a$ is located at point $P$ on the number line, where would $-a$ be located?", "options": [{"text": "A. At point $P$ itself.", "isCorrect": false, "rationale": "The opposite of a number is only itself if the number is 0. For any other number, its opposite is a different point."}, {"text": "B. At the same distance from 0 as $P$, but on the opposite side.", "isCorrect": true, "rationale": "The definition of an opposite states that it 'is the same distance from $0$ on the number line but on the other side.' This is a direct application of that definition."}, {"text": "C. To the left of $P$ if $P$ is positive.", "isCorrect": false, "rationale": "While true for positive $P$, this statement doesn't cover all cases. If $P$ is negative, $-a$ would be to the right of $P$. The definition in option B is more comprehensive."}, {"text": "D. Always to the right of 0.", "isCorrect": false, "rationale": "This is incorrect. If $a$ is positive (e.g., 3), then $-a$ is negative (-3), which is to the left of 0."}], "id": "q08"}, {"question": "Based on the definition of real numbers, which of the following would *not* be considered a real number?", "options": [{"text": "A. A number that can be written as $a/b$ where $b \\neq 0$.", "isCorrect": false, "rationale": "This describes a rational number, which is a subset of real numbers."}, {"text": "B. A number whose decimal form never terminates and never repeats.", "isCorrect": false, "rationale": "This describes an irrational number, which is a subset of real numbers."}, {"text": "C. A number that represents a point on the number line.", "isCorrect": false, "rationale": "The text explicitly states: 'Every point on the number line corresponds to exactly one real number,' making this a characteristic of real numbers."}, {"text": "D. The square root of a negative number, such as $\\sqrt{-4}$.", "isCorrect": true, "rationale": "The 'note' section mentions that complex numbers are 'introduced to handle square roots of negative numbers' in Algebra II. This implies that square roots of negative numbers are not part of the 'real numbers' discussed in this section, as they belong to a different, broader set of numbers."}], "id": "q09"}, {"question": "Which of the following numbers is NOT a rational number?", "options": [{"text": "A. $0.666...$", "isCorrect": false, "rationale": "This is a repeating decimal, which can be written as the fraction 2/3. Therefore, it is a rational number."}, {"text": "B. $\\frac{17}{3}$", "isCorrect": false, "rationale": "This is already in the form of a fraction $a/b$ where $a$ and $b$ are integers and $b \\neq 0$. Therefore, it is a rational number."}, {"text": "C. $\\sqrt{9}$", "isCorrect": false, "rationale": "$\\sqrt{9}$ simplifies to 3. Since 3 can be written as 3/1, it is an integer and thus a rational number."}, {"text": "D. $\\sqrt{10}$", "isCorrect": true, "rationale": "Since 10 is not a perfect square, $\\sqrt{10}$ cannot be expressed as a simple fraction of integers ($a/b$) and its decimal form neither terminates nor repeats. Therefore, it is an irrational number, not a rational number."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
