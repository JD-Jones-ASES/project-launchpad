<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 1, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Simplify the expression: (-14) + (-9).", "options": [{"text": "5", "isCorrect": false, "rationale": "This option incorrectly subtracts the absolute values and uses a positive sign."}, {"text": "-5", "isCorrect": false, "rationale": "This option incorrectly subtracts the absolute values instead of adding them when signs are the same."}, {"text": "23", "isCorrect": false, "rationale": "This option correctly adds the absolute values but incorrectly applies a positive sign instead of keeping the common negative sign."}, {"text": "-23", "isCorrect": true, "rationale": "To add two numbers with the same sign, add their absolute values (14 + 9 = 23) and keep the common negative sign."}]}, {"question": "Evaluate the expression: 21 + (-30).", "options": [{"text": "51", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values, which is only done when signs are the same."}, {"text": "-51", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values and applies a negative sign."}, {"text": "9", "isCorrect": false, "rationale": "This option correctly subtracts the absolute values (30 - 21 = 9) but incorrectly keeps the sign of the number with the smaller absolute value."}, {"text": "-9", "isCorrect": true, "rationale": "To add two numbers with different signs, subtract the smaller absolute value (21) from the larger (30), which gives 9. Then, keep the sign of the number with the larger absolute value, which is -30, so the result is -9."}]}, {"question": "Simplify: 12 - 19.", "options": [{"text": "7", "isCorrect": false, "rationale": "This option incorrectly subtracts in the wrong order and applies a positive sign."}, {"text": "-7", "isCorrect": true, "rationale": "Using the subtraction rule, 12 - 19 is rewritten as 12 + (-19). Since the signs are different, subtract the smaller absolute value (12) from the larger (19), which gives 7. Keep the sign of the number with the larger absolute value (-19), so the result is -7."}, {"text": "31", "isCorrect": false, "rationale": "This option incorrectly adds the numbers as if they had the same sign."}, {"text": "-31", "isCorrect": false, "rationale": "This option incorrectly adds the numbers as if they had the same sign and applies a negative sign."}]}, {"question": "What is the result of -6 - 11?", "options": [{"text": "5", "isCorrect": false, "rationale": "This option incorrectly subtracts the absolute values and applies a positive sign."}, {"text": "-5", "isCorrect": false, "rationale": "This option incorrectly subtracts the absolute values."}, {"text": "17", "isCorrect": false, "rationale": "This option correctly adds the absolute values but incorrectly applies a positive sign."}, {"text": "-17", "isCorrect": true, "rationale": "Using the subtraction rule, -6 - 11 is rewritten as -6 + (-11). Since both numbers have the same sign (negative), add their absolute values (6 + 11 = 17) and keep the common negative sign."}]}, {"question": "Calculate: -8 - (-13).", "options": [{"text": "-21", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values and keeps the negative sign, treating it as same-sign addition rather than subtraction of a negative."}, {"text": "21", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values and applies a positive sign."}, {"text": "5", "isCorrect": true, "rationale": "Applying the subtraction rule, -8 - (-13) becomes -8 + 13. Since the numbers have different signs, subtract the smaller absolute value (8) from the larger (13), which gives 5. Keep the sign of the number with the larger absolute value (13), so the result is positive 5."}, {"text": "-5", "isCorrect": false, "rationale": "This option correctly subtracts the absolute values but incorrectly applies a negative sign."}]}, {"question": "Simplify the expression: -4 + 7 - 3 + (-2) - (-5).", "options": [{"text": "-1", "isCorrect": false, "rationale": "This result indicates an error in applying the rules for signed number arithmetic or a calculation mistake."}, {"text": "3", "isCorrect": true, "rationale": "First, rewrite all subtractions as additions of opposites: -4 + 7 + (-3) + (-2) + 5. Next, group numbers with the same sign: (-4 + (-3) + (-2)) + (7 + 5). This simplifies to -9 + 12. Finally, add these numbers with different signs: subtract absolute values (12 - 9 = 3) and keep the sign of the larger absolute value (12), which is positive. So the result is 3."}, {"text": "17", "isCorrect": false, "rationale": "This result indicates errors in handling the signs during addition or subtraction, leading to an incorrect sum."}, {"text": "-17", "isCorrect": false, "rationale": "This result indicates errors in handling the signs during addition or subtraction, leading to an incorrect sum."}]}, {"question": "The rule a - b = a + (-b) fundamentally transforms a subtraction problem into an addition problem. What is the primary benefit of this transformation in simplifying expressions?", "options": [{"text": "It eliminates the need to consider absolute values when subtracting.", "isCorrect": false, "rationale": "Absolute values are still crucial when adding numbers with different signs after the transformation, so this statement is incorrect."}, {"text": "It allows all operations to be treated as additions, simplifying the application of sign rules.", "isCorrect": true, "rationale": "By converting subtraction to addition of the opposite, all operations become additions, allowing a consistent application of the rules for adding numbers with the same sign or different signs. This simplifies expressions, especially those with multiple operations."}, {"text": "It ensures the result is always positive.", "isCorrect": false, "rationale": "The sign of the result depends on the values of 'a' and 'b', so this transformation does not guarantee a positive result."}, {"text": "It only applies when 'a' is a positive number.", "isCorrect": false, "rationale": "The rule a - b = a + (-b) applies to any real numbers 'a' and 'b', regardless of whether they are positive or negative."}]}, {"question": "The temperature in a town was 3°C in the morning. By evening, it dropped by 8°C. What is the temperature in the evening?", "options": [{"text": "11°C", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values (3 + 8), which would represent a temperature increase."}, {"text": "5°C", "isCorrect": false, "rationale": "This option incorrectly subtracts 3 from 8 (8 - 3) and keeps a positive sign, which does not reflect a drop from 3°C."}, {"text": "-5°C", "isCorrect": true, "rationale": "This problem can be represented as 3 - 8. Using the subtraction rule, this becomes 3 + (-8). For numbers with different signs, subtract the smaller absolute value (3) from the larger (8), which gives 5. Keep the sign of the number with the larger absolute value (-8), resulting in -5°C."}, {"text": "-11°C", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values and applies a negative sign."}]}, {"question": "A submarine is at an elevation of -120 feet (120 feet below sea level). It then ascends 50 feet. What is its new elevation?", "options": [{"text": "170 feet", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values, which would represent descending further."}, {"text": "-170 feet", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values and keeps the negative sign, indicating a further descent."}, {"text": "70 feet", "isCorrect": false, "rationale": "This option correctly subtracts the absolute values but incorrectly applies a positive sign, suggesting it is above sea level."}, {"text": "-70 feet", "isCorrect": true, "rationale": "The problem is an addition: -120 + 50. These are numbers with different signs. Subtract the smaller absolute value (50) from the larger (120), which gives 70. Keep the sign of the number with the larger absolute value (-120), resulting in -70 feet."}]}, {"question": "Which of the following is the correct first step when simplifying the expression -10 - (-6) + 3?", "options": [{"text": "-10 + 6 + 3", "isCorrect": true, "rationale": "According to the subtraction rule, subtracting a negative number is equivalent to adding its positive counterpart. Therefore, -10 - (-6) becomes -10 + 6. The rest of the expression, + 3, remains unchanged, making the full expression -10 + 6 + 3."}, {"text": "10 - 6 + 3", "isCorrect": false, "rationale": "This option incorrectly changes the sign of the first term and handles the subtraction of a negative incorrectly."}, {"text": "-10 - 6 + 3", "isCorrect": false, "rationale": "This option incorrectly only removes the parentheses without changing the sign of the number being subtracted, which is incorrect for subtracting a negative."}, {"text": "-10 + (-6) + 3", "isCorrect": false, "rationale": "This option incorrectly changes the subtraction of a negative into the addition of a negative. Subtracting a negative is equivalent to adding a positive."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
