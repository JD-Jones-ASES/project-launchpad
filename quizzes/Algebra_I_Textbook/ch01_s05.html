<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 1, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Simplify the expression: (-12) * (-5)", "options": [{"text": "-60", "isCorrect": false, "rationale": "The product of two numbers with the same sign (both negative) is positive, not negative."}, {"text": "60", "isCorrect": true, "rationale": "According to the rule for multiplying signed numbers, the product of two numbers with the same sign is positive. Therefore, (-12) * (-5) = 60."}, {"text": "-17", "isCorrect": false, "rationale": "This answer suggests addition or subtraction, not multiplication."}, {"text": "17", "isCorrect": false, "rationale": "This answer suggests addition or subtraction, not multiplication, and incorrectly applies a sign rule for multiplication."}]}, {"question": "Which of the following expressions is undefined?", "options": [{"text": "0 / 7", "isCorrect": false, "rationale": "Zero divided by any non-zero number is 0. This expression is defined and equals 0."}, {"text": "7 * 0", "isCorrect": false, "rationale": "Any number multiplied by zero is zero. This expression is defined and equals 0."}, {"text": "7 / 0", "isCorrect": true, "rationale": "Division by zero is never allowed. For every real number 'a', 'a/0' is undefined."}, {"text": "0 / 0", "isCorrect": false, "rationale": "The expression 0/0 is specifically called an indeterminate form, rather than simply 'undefined' in the same way 'a/0' (for non-zero 'a') is described."}]}, {"question": "Simplify the expression: -72 / 8", "options": [{"text": "9", "isCorrect": false, "rationale": "The quotient of two numbers with different signs (negative and positive) is negative, not positive."}, {"text": "-9", "isCorrect": true, "rationale": "According to the rule for dividing signed numbers, the quotient of two numbers with different signs is negative. Therefore, -72 / 8 = -9."}, {"text": "8", "isCorrect": false, "rationale": "This is an incorrect calculation and an incorrect sign application."}, {"text": "-8", "isCorrect": false, "rationale": "This is an incorrect calculation, though the sign is correct for different signs."}]}, {"question": "Evaluate the expression: 4 * (-3) * (-2)", "options": [{"text": "-24", "isCorrect": false, "rationale": "Multiplying from left to right: 4 * (-3) = -12. Then (-12) * (-2). The product of two numbers with the same sign (both negative) is positive, not negative."}, {"text": "24", "isCorrect": true, "rationale": "Multiply from left to right: 4 * (-3) = -12 (different signs, negative product). Then (-12) * (-2) = 24 (same signs, positive product)."}, {"text": "-1", "isCorrect": false, "rationale": "This indicates an incorrect calculation and understanding of multiplication of signed numbers."}, {"text": "1", "isCorrect": false, "rationale": "This indicates an incorrect calculation and understanding of multiplication of signed numbers."}]}, {"question": "Simplify the expression by distributing the negative factor: -4(5x - 2)", "options": [{"text": "-20x - 8", "isCorrect": false, "rationale": "When distributing -4, both terms inside the parentheses must be multiplied. -4 * 5x = -20x. -4 * -2 = +8, not -8."}, {"text": "20x + 8", "isCorrect": false, "rationale": "The product of a negative number (-4) and a positive number (5x) should be negative, not positive. Also, -4 * -2 should be positive."}, {"text": "-20x + 8", "isCorrect": true, "rationale": "According to the distributive property, multiply -4 by each term inside the parentheses: -4 * 5x = -20x and -4 * (-2) = +8. So, the simplified expression is -20x + 8."}, {"text": "20x - 8", "isCorrect": false, "rationale": "The product of a negative number (-4) and a positive number (5x) should be negative, not positive. Also, the sign of the constant term is incorrect."}]}, {"question": "Combine like terms to simplify the expression: 6m - 4n + 3m + 7n", "options": [{"text": "9m + 3n", "isCorrect": true, "rationale": "Combine the 'm' terms: 6m + 3m = 9m. Combine the 'n' terms: -4n + 7n = 3n. So, the simplified expression is 9m + 3n."}, {"text": "9m - 3n", "isCorrect": false, "rationale": "The 'n' terms were combined incorrectly; -4n + 7n results in +3n, not -3n."}, {"text": "3m + 3n", "isCorrect": false, "rationale": "The 'm' terms were combined incorrectly; 6m + 3m = 9m, not 3m."}, {"text": "10mn", "isCorrect": false, "rationale": "Terms with different variables cannot be combined into a single term like 10mn. This is a misunderstanding of combining like terms."}]}, {"question": "Which statement accurately describes the expression 0/0?", "options": [{"text": "It equals 0.", "isCorrect": false, "rationale": "The expression 0/0 is an indeterminate form, not equal to 0. Only 0 divided by a non-zero number is 0."}, {"text": "It equals 1.", "isCorrect": false, "rationale": "The expression 0/0 is an indeterminate form, not equal to 1. Only a non-zero number divided by itself is 1."}, {"text": "It is undefined, similar to a/0 for a ≠ 0.", "isCorrect": false, "rationale": "While 0/0 cannot be evaluated, the text specifically refers to '0/0' as an indeterminate form, making a distinction from 'a/0' which is simply 'undefined'. It's a more specific classification."}, {"text": "It is an indeterminate form.", "isCorrect": true, "rationale": "The text explicitly states that 'The expression 0/0 is called an indeterminate form, not 0 or 1.' This is the most accurate description provided in the context."}]}, {"question": "Simplify the expression: - (3x - 6) + 5x - 1", "options": [{"text": "-3x - 6 + 5x - 1", "isCorrect": false, "rationale": "The negative sign outside the parentheses must be distributed, changing the sign of each term inside. This option fails to distribute correctly."}, {"text": "2x - 7", "isCorrect": false, "rationale": "When distributing the negative, -(3x - 6) becomes -3x + 6. Then combining like terms: -3x + 5x = 2x and +6 - 1 = +5, not -7."}, {"text": "2x + 5", "isCorrect": true, "rationale": "First, distribute the negative (which is equivalent to multiplying by -1): -1 * (3x - 6) = -3x + 6. Then combine like terms: (-3x + 5x) + (6 - 1) = 2x + 5."}, {"text": "8x - 7", "isCorrect": false, "rationale": "This incorrectly adds -3x and 5x, and also incorrectly combines constants after an incorrect distribution."}]}, {"question": "If a real number 'a' is multiplied by zero, what is the result?", "options": [{"text": "a", "isCorrect": false, "rationale": "Multiplying any real number 'a' by zero results in zero, not 'a' itself (unless a is 0)."}, {"text": "Undefined", "isCorrect": false, "rationale": "Multiplication by zero is always defined and results in zero; division by zero is undefined."}, {"text": "Zero", "isCorrect": true, "rationale": "The text explicitly states: 'For every real number a: a * 0 = 0' and '0 * a = 0'. Therefore, the result is always zero."}, {"text": "One", "isCorrect": false, "rationale": "Multiplying any real number by zero results in zero, not one."}]}, {"question": "Simplify the expression: 7 - 3(2x - 4) + x", "options": [{"text": "x - 5", "isCorrect": false, "rationale": "First, distribute -3: -3(2x - 4) = -6x + 12. Then combine terms: 7 - 6x + 12 + x = (-6x + x) + (7 + 12) = -5x + 19. This option has incorrect coefficients and constants."}, {"text": "-5x + 19", "isCorrect": true, "rationale": "First, apply the distributive property: -3(2x - 4) = -6x + 12 (distributing a negative changes the sign of each term inside). Then, combine like terms: 7 - 6x + 12 + x = (-6x + x) + (7 + 12) = -5x + 19."}, {"text": "x + 1", "isCorrect": false, "rationale": "This option results from incorrect distribution and incorrect combining of like terms."}, {"text": "-x + 19", "isCorrect": false, "rationale": "While the constant term is correct, the 'x' terms are combined incorrectly. -6x + x = -5x, not -x."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
