    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of factoring polynomials in algebra, as described in the text?", "options": [{"text": "To simplify terms by combining like terms.", "isCorrect": false, "rationale": "Combining like terms is a simplification process, but factoring specifically involves rewriting a product as a multiplication of simpler expressions, not merely reducing the number of terms."}, {"text": "To reverse the process of multiplying polynomials.", "isCorrect": true, "rationale": "The text explicitly states: 'Factoring is the reverse process: given a product, you write it as a multiplication of simpler expressions.'"}, {"text": "To convert expressions into single numerical values.", "isCorrect": false, "rationale": "Factoring maintains the algebraic structure, often keeping variables, rather than reducing expressions to numerical values."}, {"text": "To always obtain prime numbers as factors.", "isCorrect": false, "rationale": "While integers can be factored into prime numbers, polynomial factors are generally simpler polynomial expressions, not necessarily prime numbers."}], "id": "q01"}, {"question": "According to the provided steps for finding the GCF of a set of monomials, which rule applies to the variable components?", "options": [{"text": "For each variable that appears, use the largest exponent that appears.", "isCorrect": false, "rationale": "The rule states to use the *smallest* exponent, not the largest, for variables that appear in all monomials."}, {"text": "For each variable that appears in all monomials, use the smallest exponent that appears.", "isCorrect": true, "rationale": "Step 2 of finding the GCF of monomials clearly states: 'For each variable that appears in all of the monomials, use the smallest exponent that appears.'"}, {"text": "For each variable, include it only if its exponent is 1 in all monomials.", "isCorrect": false, "rationale": "Variables with any common positive integer exponent should be included, not just those with an exponent of 1."}, {"text": "Only include variables that have different exponents in each monomial.", "isCorrect": false, "rationale": "Variables can have the same exponent in each monomial and still be part of the GCF (e.g., if both terms have x^2, then x^2 is part of the GCF)."}], "id": "q02"}, {"question": "What is the first step when determining the GCF of the monomials $24x^4y^3$ and $36x^2y^5$?", "options": [{"text": "Identify the smallest exponent for $x$ and $y$.", "isCorrect": false, "rationale": "Identifying the smallest exponent for variables is the second step in the process, not the first."}, {"text": "Find the GCF of the numerical coefficients, $24$ and $36$.", "isCorrect": true, "rationale": "The first step listed for finding the GCF of monomials is 'Find the GCF of the numerical coefficients.'"}, {"text": "Multiply $24$ and $36$.", "isCorrect": false, "rationale": "Multiplying the coefficients is not part of finding the GCF; it would be used in finding the product, not the factor."}, {"text": "Group the terms.", "isCorrect": false, "rationale": "Grouping terms is a technique used for factoring polynomials with four terms, not for finding the GCF of two monomials."}], "id": "q03"}, {"question": "Given the monomials $15a^5b^3c$ and $20a^2b^4$, what is the variable part of their GCF?", "options": [{"text": "$a^5b^4c$", "isCorrect": false, "rationale": "This option uses the largest exponents and includes 'c' which is not common to both monomials."}, {"text": "$a^2b^3$", "isCorrect": true, "rationale": "For 'a', the smallest exponent is 2 ($a^2$). For 'b', the smallest exponent is 3 ($b^3$). 'c' does not appear in both monomials, so it is not included in the GCF."}, {"text": "$a^2b^3c$", "isCorrect": false, "rationale": "This option incorrectly includes 'c', which is not a common variable to both monomials."}, {"text": "$a^7b^7$", "isCorrect": false, "rationale": "This option sums the exponents, which is incorrect for finding the GCF."}], "id": "q04"}, {"question": "What is the greatest common factor (GCF) of $20m^4n^3p^2$ and $30m^2n^5p$?", "options": [{"text": "$10m^2n^3p$", "isCorrect": true, "rationale": "The GCF of 20 and 30 is 10. For 'm', the smallest exponent is 2 ($m^2$). For 'n', the smallest exponent is 3 ($n^3$). For 'p', the smallest exponent is 1 ($p$). Multiplying these gives $10m^2n^3p$."}, {"text": "$10m^4n^5p^2$", "isCorrect": false, "rationale": "This option correctly identifies the GCF of the coefficients but uses the highest exponents for the variables, not the smallest."}, {"text": "$5m^2n^3p$", "isCorrect": false, "rationale": "This option incorrectly identifies the GCF of the coefficients as 5; the correct GCF of 20 and 30 is 10."}, {"text": "$60m^2n^3p$", "isCorrect": false, "rationale": "This option incorrectly uses 60 (the LCM of the coefficients) instead of the GCF (10) for the numerical part."}], "id": "q05"}, {"question": "Factor the polynomial $16y^4 - 24y^3 + 8y^2$ by removing the GCF.", "options": [{"text": "$8y^2(2y^2 - 3y + 1)$", "isCorrect": true, "rationale": "The GCF of 16, 24, and 8 is 8. The smallest power of 'y' is $y^2$. So, the GCF is $8y^2$. Dividing each term by $8y^2$ yields: $16y^4/8y^2 = 2y^2$, $-24y^3/8y^2 = -3y$, and $8y^2/8y^2 = 1$. Thus, the factored form is $8y^2(2y^2 - 3y + 1)$."}, {"text": "$8y(2y^3 - 3y^2 + y)$", "isCorrect": false, "rationale": "This option uses $8y$ as the GCF, but $8y^2$ is the greatest common factor since $y^2$ is common to all terms."}, {"text": "$4y^2(4y^2 - 6y + 2)$", "isCorrect": false, "rationale": "This option uses $4y^2$ as a common factor, but it is not the *greatest* common factor, as 4 is not the GCF of 16, 24, and 8 (which is 8)."}, {"text": "$16y^2(y^2 - \\frac{3}{2}y + \\frac{1}{2})$", "isCorrect": false, "rationale": "This option uses $16y^2$ as the GCF, which is incorrect because 16 is not a factor of 24 or 8 in a way that allows integer coefficients inside the parentheses."}], "id": "q06"}, {"question": "When factoring $-10x^2 - 15x + 5$, why is it often useful to factor out a negative GCF?", "options": [{"text": "To ensure all exponents within the parentheses are positive.", "isCorrect": false, "rationale": "The exponents in the original expression are already positive; factoring out a negative GCF doesn't change the sign of the exponents."}, {"text": "To make the leading coefficient inside the parentheses positive.", "isCorrect": true, "rationale": "The text states: 'When the leading coefficient of a polynomial is negative, it is often useful to factor out a negative GCF so that the leading term inside the parentheses is positive.'"}, {"text": "To simplify the process of finding the GCF.", "isCorrect": false, "rationale": "The process of finding the GCF is the same whether it's positive or negative; choosing to factor out a negative GCF is a stylistic choice for the result."}, {"text": "To avoid dealing with any negative signs in the expression.", "isCorrect": false, "rationale": "Factoring out a negative GCF simply redistributes the negative signs; they do not disappear entirely from the expression."}], "id": "q07"}, {"question": "What is a necessary condition for a polynomial to be factorable by grouping as described in the text?", "options": [{"text": "It must have exactly three terms.", "isCorrect": false, "rationale": "Factoring by grouping is specifically introduced for 'Some polynomials with four terms'."}, {"text": "It must have a common binomial factor after grouping and factoring GCFs from pairs.", "isCorrect": true, "rationale": "The text states that after factoring the GCF from each pair, you 'then factor out the common binomial factor.' This common binomial factor is crucial for successful grouping."}, {"text": "All its terms must share a single monomial GCF.", "isCorrect": false, "rationale": "While a polynomial might have a monomial GCF, it's not a requirement for factoring by grouping. Grouping is used when there isn't an overall monomial GCF for the entire polynomial."}, {"text": "The leading coefficient must be negative.", "isCorrect": false, "rationale": "The sign of the leading coefficient is relevant for factoring out a negative GCF in general, but not a specific requirement for factoring by grouping."}], "id": "q08"}, {"question": "Factor the polynomial $ab + 3a + 2b + 6$ by grouping.", "options": [{"text": "$(a + 2)(b + 3)$", "isCorrect": true, "rationale": "Group the terms: $(ab + 3a) + (2b + 6)$. Factor out the GCF from each group: $a(b + 3) + 2(b + 3)$. Factor out the common binomial $(b + 3)$: $(b + 3)(a + 2)$. This matches the option."}, {"text": "$(a + b)(2 + 3)$", "isCorrect": false, "rationale": "This option incorrectly combines terms and factors without applying the GCF steps for grouping."}, {"text": "$(ab + 2)(3a + 6)$", "isCorrect": false, "rationale": "This option groups terms incorrectly and does not fully factor out the GCF from each group to find a common binomial factor."}, {"text": "$a(b + 3) + 2(b + 3) + 6$", "isCorrect": false, "rationale": "This is an intermediate step in factoring by grouping, not the final factored form."}], "id": "q09"}, {"question": "A student attempts to factor $x^3 + 2x^2 - 3x - 6$ by grouping and gets $x^2(x + 2) - 3(x - 2)$. What should be their next step or conclusion based on the 'caution' note?", "options": [{"text": "Combine the terms to get $x^2(x+2) - 3(x-2)$.", "isCorrect": false, "rationale": "Combining these terms would reverse the factoring process or make it impossible to factor further; the goal is to find a common binomial."}, {"text": "Conclude that the polynomial cannot be factored by grouping because the binomial factors are different.", "isCorrect": false, "rationale": "The caution note advises trying rearrangements or factoring out a -1 *before* concluding that it cannot be factored by grouping."}, {"text": "Try rearranging the terms or factoring out a $-1$ from one of the groups to see if a common binomial factor can be found.", "isCorrect": true, "rationale": "The 'caution' note explicitly states: 'If the binomial factors are different, try rearranging the terms or factoring out a $-1$ from one group.'"}, {"text": "Multiply the current factors to check the answer.", "isCorrect": false, "rationale": "Multiplying the current factors would not help in completing the factoring process; the factoring is not complete because there isn't a common binomial to factor out."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
