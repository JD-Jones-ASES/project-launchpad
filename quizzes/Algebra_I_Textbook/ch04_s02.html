<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a relation in mathematics?", "options": [{"text": "Any equation that produces a straight-line graph.", "isCorrect": false, "rationale": "A relation can be described by ordered pairs, a table, a graph, or an equation, and is not limited to linear equations."}, {"text": "Any set of ordered pairs.", "isCorrect": true, "rationale": "By definition, a relation is any set of ordered pairs. It may be described by a list, table, graph, or equation."}, {"text": "A set of numbers where no value repeats.", "isCorrect": false, "rationale": "This describes a set with unique elements, but a relation is specifically a set of ordered pairs."}, {"text": "A rule that assigns each output to exactly one input.", "isCorrect": false, "rationale": "That is the definition of a function, which is a special type of relation, not the definition of a relation in general."}]}, {"question": "For the relation {(-3, 2), (0, 5), (1, -1), (4, 5)}, what is the domain?", "options": [{"text": "{-1, 2, 5}", "isCorrect": false, "rationale": "These are the y-values (range). The domain consists of the x-values (first coordinates)."}, {"text": "{-3, 0, 1, 4}", "isCorrect": true, "rationale": "The domain is the set of all first coordinates (x-values): -3, 0, 1, and 4, each listed without repeats."}, {"text": "{-3, 0, 1, 4, 5}", "isCorrect": false, "rationale": "The value 5 is a y-value (range element). The domain contains only the first coordinates."}, {"text": "{-3, -1, 0, 1, 2, 4, 5}", "isCorrect": false, "rationale": "This lists both domain and range values together. The domain is only the set of first coordinates: {-3, 0, 1, 4}."}]}, {"question": "For the relation {(-3, 2), (0, 5), (1, -1), (4, 5)}, what is the range?", "options": [{"text": "{-3, 0, 1, 4}", "isCorrect": false, "rationale": "These are the x-values (domain), not the range."}, {"text": "{2, 5, -1, 5}", "isCorrect": false, "rationale": "Although these are the y-values, 5 appears twice but should be listed only once in the range."}, {"text": "{-1, 2, 5}", "isCorrect": true, "rationale": "The range is the set of all second coordinates (y-values) without repeats: -1, 2, and 5 (5 appears twice but is listed once)."}, {"text": "{0, 1, 2, 3, 4, 5}", "isCorrect": false, "rationale": "This is not the range. The range contains only the actual y-values: -1, 2, and 5."}]}, {"question": "Which of the following is the definition of a function?", "options": [{"text": "A relation where every element of the range is paired with exactly one element of the domain.", "isCorrect": false, "rationale": "This describes an onto (surjective) mapping. The standard definition requires each domain element to have exactly one range element, not the reverse."}, {"text": "A relation in which every element of the domain is paired with exactly one element of the range.", "isCorrect": true, "rationale": "A function pairs each x-value (domain element) with exactly one y-value (range element). No x-value is repeated with a different y-value."}, {"text": "Any set of ordered pairs with no repeated values at all.", "isCorrect": false, "rationale": "A function can have repeated y-values. What it cannot have is the same x-value paired with two different y-values."}, {"text": "A relation whose graph is a straight line.", "isCorrect": false, "rationale": "Many functions have graphs that are not straight lines. A function is defined by the one-output-per-input rule, not by shape."}]}, {"question": "What does the Vertical Line Test determine?", "options": [{"text": "Whether a graph has a positive or negative slope.", "isCorrect": false, "rationale": "The Vertical Line Test determines whether a graph represents a function, not the direction of slope."}, {"text": "Whether a graph in the coordinate plane represents a function.", "isCorrect": true, "rationale": "If every vertical line intersects the graph in at most one point, the graph represents a function. If any vertical line crosses it twice or more, it is not a function."}, {"text": "Whether the graph passes through the origin.", "isCorrect": false, "rationale": "The Vertical Line Test does not check for any specific point; it checks whether any vertical line meets the graph more than once."}, {"text": "Whether two graphs are parallel to each other.", "isCorrect": false, "rationale": "Parallel lines share the same slope; that is unrelated to the Vertical Line Test."}]}, {"question": "Is the relation {(2, 4), (3, -1), (2, 6)} a function?", "options": [{"text": "Yes, because it has three ordered pairs.", "isCorrect": false, "rationale": "The number of ordered pairs does not determine whether a relation is a function."}, {"text": "Yes, because none of the y-values repeat.", "isCorrect": false, "rationale": "The y-values 4, -1, and 6 do not repeat, but x = 2 is paired with both 4 and 6, violating the function definition."}, {"text": "No, because the x-value 2 is paired with both 4 and 6.", "isCorrect": true, "rationale": "A function requires each x-value to have exactly one y-value. Here x = 2 maps to both 4 and 6, so it is not a function."}, {"text": "No, because one of the y-values is negative.", "isCorrect": false, "rationale": "Negative y-values are perfectly allowed in a function. The issue is the repeated x-value 2 mapping to two different outputs."}]}, {"question": "Is the relation {(0, 1), (1, 1), (2, 1)} a function?", "options": [{"text": "No, because the y-value 1 repeats three times.", "isCorrect": false, "rationale": "Repeated y-values do not violate the definition of a function. Each x-value (0, 1, 2) still maps to exactly one y-value."}, {"text": "Yes, because each x-value appears exactly once.", "isCorrect": true, "rationale": "Each x-value (0, 1, 2) appears only once, paired with y = 1. Every input has exactly one output, so it is a function."}, {"text": "No, because all y-values are the same.", "isCorrect": false, "rationale": "Having all y-values the same is acceptable; this is a constant function. The rule is about inputs, not outputs repeating."}, {"text": "Yes, because all three points lie on a horizontal line.", "isCorrect": false, "rationale": "While true, the reason it is a function is that each x-value has exactly one y-value, not the collinearity of the points."}]}, {"question": "What does the notation f(x) mean in function notation?", "options": [{"text": "f multiplied by x.", "isCorrect": false, "rationale": "f(x) does not mean f times x. This is one of the most common misreadings of function notation."}, {"text": "The output of function f when the input is x.", "isCorrect": true, "rationale": "f(x) is read as f of x and represents the value the function f produces when given input x."}, {"text": "x divided by f.", "isCorrect": false, "rationale": "f(x) has nothing to do with division. It represents the function f evaluated at x."}, {"text": "The x-coordinate of the function.", "isCorrect": false, "rationale": "x is the input (domain value), not a coordinate label. f(x) names the output corresponding to that input."}]}, {"question": "Let f(x) = 3x - 2. What is f(-1)?", "options": [{"text": "-1", "isCorrect": false, "rationale": "Substituting x = -1 gives 3(-1) - 2 = -3 - 2 = -5, not -1."}, {"text": "1", "isCorrect": false, "rationale": "A common error is computing -3 + 2 = -1 or similar. The correct calculation is 3(-1) - 2 = -3 - 2 = -5."}, {"text": "-5", "isCorrect": true, "rationale": "Substituting x = -1 into f(x) = 3x - 2 gives f(-1) = 3(-1) - 2 = -3 - 2 = -5."}, {"text": "5", "isCorrect": false, "rationale": "This would result from ignoring the negative signs. f(-1) = 3(-1) - 2 = -3 - 2 = -5."}]}, {"question": "Let g(x) = x^2 + 4x. What is g(3)?", "options": [{"text": "15", "isCorrect": false, "rationale": "g(3) = 9 + 12 = 21. A common error is using 3 instead of 3^2 = 9 for the first term, giving 3 + 12 = 15."}, {"text": "21", "isCorrect": true, "rationale": "Substituting x = 3: g(3) = 3^2 + 4(3) = 9 + 12 = 21."}, {"text": "39", "isCorrect": false, "rationale": "This could come from computing (3 + 4) times 3 incorrectly. The correct value is g(3) = 9 + 12 = 21."}, {"text": "13", "isCorrect": false, "rationale": "g(3) = 9 + 12 = 21. Getting 13 likely involves the error 9 + 4 = 13 instead of 9 + 4(3) = 9 + 12."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
