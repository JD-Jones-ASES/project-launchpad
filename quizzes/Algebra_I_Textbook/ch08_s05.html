<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 8, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Given the quadratic function $f(x) = -2(x + 4)^2 + 7$, what is the vertex of the parabola?", "options": [{"text": "$(-4, 7)$", "isCorrect": true, "rationale": "In vertex form $f(x) = a(x - h)^2 + k$, the vertex is $(h, k)$, so for $x + 4$, $h$ must be $-4$."}, {"text": "$(4, 7)$", "isCorrect": false, "rationale": "This error occurs if the sign of $h$ inside the parentheses is not reversed when identifying the $x$-coordinate."}, {"text": "$(-4, -7)$", "isCorrect": false, "rationale": "This distractor assumes the sign of the constant $k$ outside the parentheses must be reversed, which is incorrect for vertex form."}, {"text": "$(4, -7)$", "isCorrect": false, "rationale": "This reflects a double error in sign convention for both the $h$ and $k$ values in the vertex form."}]}, {"question": "What is the range of the function $f(x) = 3x^2 - 12x + 14$?", "options": [{"text": "$[2, \\infty)$", "isCorrect": true, "rationale": "The vertex $y$-coordinate is $f(2) = 3(2)^2 - 12(2) + 14 = 2$, and since $a > 0$, the parabola opens upward from that point."}, {"text": "$(-\\infty, 2]$", "isCorrect": false, "rationale": "This would be the range if the leading coefficient were negative, causing the parabola to open downward."}, {"text": "$[14, \\infty)$", "isCorrect": false, "rationale": "This mistakenly uses the $y$-intercept as the starting point for the range instead of the vertex $y$-coordinate."}, {"text": "$(-\\infty, \\infty)$", "isCorrect": false, "rationale": "This is the domain of all quadratic functions, but the range is restricted by the vertex and the direction of opening."}]}, {"question": "A parabola has $x$-intercepts at $(-5, 0)$ and $(3, 0)$. What is the equation of its axis of symmetry?", "options": [{"text": "$x = -1$", "isCorrect": true, "rationale": "The axis of symmetry is the vertical line passing through the midpoint of the $x$-intercepts, calculated as $\\frac{-5 + 3}{2} = -1$."}, {"text": "$x = 1$", "isCorrect": false, "rationale": "This result stems from a calculation error when averaging the roots, perhaps failing to account for the negative sign of the first intercept."}, {"text": "$x = -2$", "isCorrect": false, "rationale": "This value might be reached if one incorrectly subtracts the values or fails to divide by 2 correctly when finding the center."}, {"text": "$y = -1$", "isCorrect": false, "rationale": "The axis of symmetry must be a vertical line ($x = c$), not a horizontal line ($y = c$)."}]}, {"question": "Determine the vertex of the function $f(x) = -x^2 + 6x - 5$.", "options": [{"text": "$(3, 4)$", "isCorrect": true, "rationale": "The axis of symmetry is $x = -\\frac{6}{2(-1)} = 3$, and evaluating $f(3)$ gives $-(3)^2 + 6(3) - 5 = -9 + 18 - 5 = 4$."}, {"text": "$(-3, -32)$", "isCorrect": false, "rationale": "This error occurs if the sign is not reversed in the axis of symmetry formula, resulting in an incorrect $x$-coordinate of $-3$."}, {"text": "$(3, 22)$", "isCorrect": false, "rationale": "This result might occur if one forgets to square the negative sign or incorrectly applies the order of operations when calculating $f(3)$."}, {"text": "$(6, -5)$", "isCorrect": false, "rationale": "This option incorrectly identifies the $b$ value as the $x$-coordinate and the $c$ value as the $y$-coordinate."}]}, {"question": "Which of the following functions has no real $x$-intercepts?", "options": [{"text": "$f(x) = 2x^2 - 4x + 5$", "isCorrect": true, "rationale": "The discriminant $b^2 - 4ac$ is $(-4)^2 - 4(2)(5) = 16 - 40 = -24$, which is less than zero, indicating no real roots."}, {"text": "$f(x) = -x^2 + 2x + 8$", "isCorrect": false, "rationale": "This function has a positive discriminant ($4 - 4(-1)(8) = 36$), meaning it crosses the $x$-axis twice."}, {"text": "$f(x) = x^2 - 4x + 3$", "isCorrect": false, "rationale": "The discriminant is $16 - 12 = 4$, which is positive, resulting in two real $x$-intercepts."}, {"text": "$f(x) = x^2 + 6x + 9$", "isCorrect": false, "rationale": "The discriminant is $36 - 36 = 0$, meaning the parabola touches the $x$-axis at exactly one point (the vertex)."}]}, {"question": "For the function $f(x) = x^2 - 8x + 12$, the $y$-intercept is $(0, 12)$. What is the coordinates of its symmetric 'mirror' point on the other side of the axis of symmetry?", "options": [{"text": "$(8, 12)$", "isCorrect": true, "rationale": "The axis of symmetry is $x = 4$. Since $(0, 12)$ is 4 units left of the axis, its mirror point must be 4 units right of the axis at $x = 8$."}, {"text": "$(4, 12)$", "isCorrect": false, "rationale": "This point lies on the axis of symmetry itself; the mirror point must be reflected across the axis, not located on it."}, {"text": "$(16, 12)$", "isCorrect": false, "rationale": "This suggests the mirror point is twice the distance from the axis than it actually is."}, {"text": "$(8, 0)$", "isCorrect": false, "rationale": "This confuses the mirror point's $y$-coordinate with an $x$-intercept."}]}, {"question": "If the vertex of a parabola is $(2, -5)$ and the leading coefficient $a$ is negative, what is the maximum value of the function?", "options": [{"text": "$-5$", "isCorrect": true, "rationale": "When $a < 0$, the parabola opens downward, making the $y$-coordinate of the vertex the highest point (maximum) of the graph."}, {"text": "$2$", "isCorrect": false, "rationale": "This is the $x$-coordinate of the vertex, which indicates where the maximum occurs, not the maximum value itself."}, {"text": "$5$", "isCorrect": false, "rationale": "This error involves taking the absolute value of the $y$-coordinate instead of using the actual value at the vertex."}, {"text": "There is no maximum.", "isCorrect": false, "rationale": "A maximum always exists if the parabola opens downward ($a < 0$)."}]}, {"question": "In the function $f(x) = a(x - h)^2 + k$, if $a = 1/2$, $h = -3$, and $k = -4$, what is the $y$-intercept of the graph?", "options": [{"text": "$(0, 0.5)$", "isCorrect": true, "rationale": "Set $x = 0$ to get $f(0) = \\frac{1}{2}(0 - (-3))^2 - 4 = \\frac{1}{2}(9) - 4 = 4.5 - 4 = 0.5$."}, {"text": "$(0, -4)$", "isCorrect": false, "rationale": "This assumes the $k$ value in vertex form is the $y$-intercept, which is only true if $h = 0$."}, {"text": "$(0, 5)$", "isCorrect": false, "rationale": "This might result from a sign error when calculating $(0 - (-3))^2$, possibly treating it as $(0-3)^2$ but then adding 4 instead of subtracting."}, {"text": "$(0, -8.5)$", "isCorrect": false, "rationale": "This calculation error might occur if the squaring is done incorrectly or if $a$ is subtracted rather than multiplied."}]}, {"question": "What is the equation of the axis of symmetry for the function $f(x) = \\frac{1}{4}x^2 + 2x - 3$?", "options": [{"text": "$x = -4$", "isCorrect": true, "rationale": "Using $x = -\\frac{b}{2a}$, we get $x = -\\frac{2}{2(1/4)} = -\\frac{2}{1/2} = -4$."}, {"text": "$x = -8$", "isCorrect": false, "rationale": "This result occurs if the division by $2a$ is calculated as $x = -\\frac{2}{1/4}$, forgetting to multiply $a$ by 2."}, {"text": "$x = 4$", "isCorrect": false, "rationale": "This is a sign error where the negative in the formula $x = -\\frac{b}{2a}$ is ignored."}, {"text": "$x = -1$", "isCorrect": false, "rationale": "This error occurs if one treats $2a$ as $2 + 1/4$ or makes an arithmetic mistake in the denominator."}]}, {"question": "True or False: The domain of a quadratic function is restricted to values greater than or equal to the $x$-coordinate of the vertex.", "options": [{"text": "False — the domain of every quadratic function is all real numbers.", "isCorrect": true, "rationale": "The domain of every quadratic function is $(-\\infty, \\infty)$, meaning it includes all real numbers, regardless of the vertex."}, {"text": "True — because the parabola only exists to the right of its vertex.", "isCorrect": false, "rationale": "This is a misconception likely confusing the domain (inputs) with the range (outputs), or restricted domains in specific real-world contexts."}, {"text": "True — but only when the leading coefficient $a$ is positive.", "isCorrect": false, "rationale": "The sign of $a$ determines whether the parabola opens upward or downward and affects the range, but the domain remains all real numbers regardless."}, {"text": "False — but the domain is restricted to values between the $x$-intercepts.", "isCorrect": false, "rationale": "While $x$-intercepts are important features of the graph, they do not limit the domain. The function is defined for all real $x$ values, including those beyond any intercepts."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
