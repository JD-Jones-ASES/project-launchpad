<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 2, Section 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what does the term \"percent\" fundamentally mean?", "options": [{"text": "A value multiplied by one hundred.", "isCorrect": false, "rationale": "The term 'percent' does not mean a value multiplied by one hundred; rather, it relates to a division by one hundred."}, {"text": "A value per hundred.", "isCorrect": true, "rationale": "The text explicitly states, \"Recall that 'percent' means 'per hundred.'\""}, {"text": "A fraction where the numerator is 100.", "isCorrect": false, "rationale": "Percent implies a fraction where the denominator is 100, not the numerator."}, {"text": "A decimal value always less than one.", "isCorrect": false, "rationale": "While many percents convert to decimals less than one, percents like 150% convert to decimals greater than one (1.5), so this statement is not always true."}]}, {"question": "A local bakery sells 120 muffins on a particular day. If 40% of these muffins were blueberry, how many blueberry muffins were sold?", "options": [{"text": "4 muffins", "isCorrect": false, "rationale": "This answer would be incorrect as 0.40 * 120 is not 4. It might result from a miscalculation or incorrect decimal placement."}, {"text": "40 muffins", "isCorrect": false, "rationale": "This would be 40/100 of the total, which is not 40% of 120. It incorrectly assumes the percent is the direct number."}, {"text": "48 muffins", "isCorrect": true, "rationale": "To find the part, convert the percent to a decimal (0.40) and multiply by the whole (120): 0.40 * 120 = 48."}, {"text": "120 muffins", "isCorrect": false, "rationale": "This would mean 100% of the muffins were blueberry, which contradicts the given 40%."}]}, {"question": "Out of 75 students who tried out for the school play, 15 were selected. What percentage of the students who tried out were selected?", "options": [{"text": "5%", "isCorrect": false, "rationale": "This would be the result of dividing 75 by 15, not 15 by 75, or a miscalculation."}, {"text": "15%", "isCorrect": false, "rationale": "This incorrectly assumes the number selected is the percentage."}, {"text": "20%", "isCorrect": true, "rationale": "To find the percent, divide the part (15) by the whole (75): 15 / 75 = 0.20. Convert the decimal to a percent: 0.20 = 20%."}, {"text": "75%", "isCorrect": false, "rationale": "This would imply 75 students out of 100, or a misinterpretation of the whole."}]}, {"question": "A survey revealed that 35% of residents in a town prefer public transportation. If 105 residents stated they prefer public transportation, what is the total number of residents surveyed?", "options": [{"text": "300 residents", "isCorrect": true, "rationale": "Using the percent equation 'part = percent * whole', we have 105 = 0.35 * whole. Divide 105 by 0.35 to find the whole: 105 / 0.35 = 300."}, {"text": "350 residents", "isCorrect": false, "rationale": "This would be the result of 105 + 35% of 105, or a miscalculation of the inverse operation."}, {"text": "35 residents", "isCorrect": false, "rationale": "This incorrectly assumes the percent is the total amount surveyed."}, {"text": "3000 residents", "isCorrect": false, "rationale": "This is a miscalculation, possibly due to an extra zero or incorrect decimal placement."}]}, {"question": "An antique vase was purchased for $240 and later appraised for $300. What is the percent increase in the vase's value?", "options": [{"text": "20%", "isCorrect": false, "rationale": "This would be the result if the original amount was $300 and the change was $60, or a miscalculation of the original amount."}, {"text": "25%", "isCorrect": true, "rationale": "First, find the change: $300 - $240 = $60. Then, divide the change by the original amount: $60 / $240 = 0.25. Convert to a percent: 25%."}, {"text": "60%", "isCorrect": false, "rationale": "This would be the result if the change ($60) was mistakenly taken as the percent, or if the calculation was flawed."}, {"text": "75%", "isCorrect": false, "rationale": "This is a miscalculation; it might result from dividing the original amount by the change, or other incorrect operations."}]}, {"question": "A clothing store advertises a sale where all items are 30% off. If a sweater originally priced at $70 is on sale, what is its sale price?", "options": [{"text": "$21", "isCorrect": false, "rationale": "This is the amount of the discount (30% of $70), not the sale price."}, {"text": "$49", "isCorrect": true, "rationale": "First, find the amount of the discount: 0.30 * $70 = $21. Then, subtract the discount from the original price: $70 - $21 = $49."}, {"text": "$70", "isCorrect": false, "rationale": "This is the original price, implying no discount was applied."}, {"text": "$91", "isCorrect": false, "rationale": "This would be the price if it was a 30% increase, not a decrease."}]}, {"question": "In the simple interest formula $I = Prt$, which component must always be expressed as a decimal?", "options": [{"text": "$I$ (Interest earned)", "isCorrect": false, "rationale": "Interest earned ($I$) is a monetary value, not a rate, and does not need to be expressed as a decimal from a percent."}, {"text": "$P$ (Principal)", "isCorrect": false, "rationale": "Principal ($P$) is the starting amount of money and is expressed as a monetary value, not a decimal form of a percent."}, {"text": "$r$ (Annual interest rate)", "isCorrect": true, "rationale": "The text explicitly states under 'caution': 'Always convert the interest rate from a percent to a decimal before substituting into the formula.'"}, {"text": "$t$ (Time in years)", "isCorrect": false, "rationale": "Time ($t$) is expressed in years and does not need to be converted from a percent to a decimal."}]}, {"question": "Sarah invests $5,000 in a certificate of deposit (CD) that offers a simple annual interest rate of 2.5%. How much interest will she earn after 4 years?", "options": [{"text": "$50", "isCorrect": false, "rationale": "This would be the result of using 0.0025 for 'r' or some other miscalculation."}, {"text": "$500", "isCorrect": true, "rationale": "Using the formula I = Prt: I = $5000 * 0.025 * 4. This calculates to $5000 * 0.10 = $500."}, {"text": "$5,000", "isCorrect": false, "rationale": "This would mean the interest earned equals the principal, which is incorrect for a 2.5% rate over 4 years."}, {"text": "$250", "isCorrect": false, "rationale": "This would be the interest for 2 years, or the principal multiplied by the rate only once (5000 * 0.025)."}]}, {"question": "A bank offers a loan where a customer borrowed $1,000. After 3 years, the total simple interest paid on the loan was $150. What was the annual interest rate of the loan?", "options": [{"text": "1.5%", "isCorrect": false, "rationale": "This would be the result if the time was 10 years, or a division by a larger number."}, {"text": "3%", "isCorrect": false, "rationale": "This would be the annual rate if the total interest was $90, or a miscalculation."}, {"text": "5%", "isCorrect": true, "rationale": "Using I = Prt: $150 = $1000 * r * 3. This simplifies to $150 = $3000r. Divide both sides by $3000: r = 150/3000 = 0.05, which is 5%."}, {"text": "15%", "isCorrect": false, "rationale": "This would be the result if the time was 1 year, or if $150 was directly considered the rate without dividing by principal."}]}, {"question": "Based on the information provided, what is the key difference between simple interest and compound interest?", "options": [{"text": "Simple interest is always calculated annually, while compound interest can be calculated monthly.", "isCorrect": false, "rationale": "While simple interest typically uses an annual rate, the text does not specify calculation frequency as the key distinction. Compound interest's defining feature is not its calculation frequency but how it's applied."}, {"text": "Simple interest is modeled by an exponential function, whereas compound interest is linear.", "isCorrect": false, "rationale": "The text states the opposite: Compound interest is modeled by an exponential function, while simple interest is linear."}, {"text": "Simple interest only applies to savings accounts, while compound interest applies to loans.", "isCorrect": false, "rationale": "Both types of interest can apply to various financial instruments, not exclusively tied to savings or loans as described."}, {"text": "Simple interest is calculated only on the principal amount, while compound interest earns interest on interest.", "isCorrect": true, "rationale": "The text notes: 'In this course we use simple interest only. Compound interest, where interest earns interest, is studied in Algebra II...'"}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
