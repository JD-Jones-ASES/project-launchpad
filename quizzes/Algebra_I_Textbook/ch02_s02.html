<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the *first* general step when solving multi-step equations?", "options": [{"text": "Use inverse operations to isolate the variable.", "isCorrect": false, "rationale": "Using inverse operations comes after simplifying each side, as stated in the general strategy and detailed steps."}, {"text": "Simplify each side (distribute, combine like terms).", "isCorrect": true, "rationale": "The general strategy explicitly states: 'simplify each side of the equation first,' and the detailed steps begin with 'Simplify each side (distribute, combine like terms).'."}, {"text": "Check by substituting into the original equation.", "isCorrect": false, "rationale": "Checking the solution is the final step in the solving strategy, not the first."}, {"text": "Collect the variable term on one side.", "isCorrect": false, "rationale": "Collecting variable terms is a step that follows simplification, utilizing addition or subtraction."}]}, {"question": "Solve the equation: $5y - 8 = 17$.", "options": [{"text": "$y = 3$", "isCorrect": false, "rationale": "If $y=3$, $5(3) - 8 = 15 - 8 = 7 \\neq 17$. The calculation is incorrect."}, {"text": "$y = 5$", "isCorrect": true, "rationale": "To solve, first add 8 to both sides: $5y = 17 + 8 \\implies 5y = 25$. Then, divide both sides by 5: $y = 25 / 5 \\implies y = 5$."}, {"text": "$y = 1$", "isCorrect": false, "rationale": "If $y=1$, $5(1) - 8 = 5 - 8 = -3 \\neq 17$. The calculation is incorrect."}, {"text": "$y = 25$", "isCorrect": false, "rationale": "This would be the value of $5y$ after adding 8 to both sides, not the value of $y$ itself."}]}, {"question": "Which of the following equations correctly demonstrates the first two steps (distributing and combining like terms) in solving $3(x + 2) - 5 = 13$?", "options": [{"text": "$3x + 6 - 5 = 13 \\implies 3x + 1 = 13$", "isCorrect": true, "rationale": "First, distribute the 3 to both terms inside the parenthesis: $3 \\times x = 3x$ and $3 \\times 2 = 6$, resulting in $3x + 6 - 5 = 13$. Then, combine the constant like terms $6 - 5 = 1$, leading to $3x + 1 = 13$."}, {"text": "$3x + 2 - 5 = 13 \\implies 3x - 3 = 13$", "isCorrect": false, "rationale": "The 3 was not correctly distributed to the 2 inside the parenthesis ($3 \\times 2 \\neq 2$)."}, {"text": "$3x + 6 + 5 = 13 \\implies 3x + 11 = 13$", "isCorrect": false, "rationale": "The sign of the 5 was incorrectly changed from subtraction to addition when combining like terms."}, {"text": "$x + 2 - 5 = 13 \\implies x - 3 = 13$", "isCorrect": false, "rationale": "The 3 was not distributed to any terms inside the parenthesis; it was effectively ignored or divided out incorrectly."}]}, {"question": "When distributing a negative number in the expression $-4(2x - 5)$, which of the following is the correct result?", "options": [{"text": "$-8x - 20$", "isCorrect": false, "rationale": "When multiplying $-4$ by $-5$, the product of two negative numbers should be positive, not negative."}, {"text": "$-8x + 20$", "isCorrect": true, "rationale": "Distribute $-4$ to each term inside the parenthesis: $-4 \\times 2x = -8x$ and $-4 \\times -5 = +20$. So, the correct result is $-8x + 20$."}, {"text": "$-8x - 5$", "isCorrect": false, "rationale": "The $-4$ was correctly distributed to $2x$ but not to $-5$. The term $-5$ should also be multiplied by $-4$."}, {"text": "$8x + 20$", "isCorrect": false, "rationale": "The signs of both terms are incorrect; $-4 \\times 2x$ should be negative, and the product of $-4 \\times -5$ should be positive."}]}, {"question": "To clear fractions from the equation $\\frac{x}{4} + \\frac{x}{6} = 5$, what is the smallest number you should multiply every term by?", "options": [{"text": "2", "isCorrect": false, "rationale": "2 is a common factor of 4 and 6, but it is not a common multiple that would clear both denominators when multiplied."}, {"text": "10", "isCorrect": false, "rationale": "10 is not a common multiple of both 4 and 6, so it would not clear both fractions."}, {"text": "12", "isCorrect": true, "rationale": "To clear fractions, multiply by the least common denominator (LCD). The multiples of 4 are 4, 8, 12, 16... The multiples of 6 are 6, 12, 18... The LCD of 4 and 6 is 12. Multiplying all terms by 12 will clear both fractions."}, {"text": "24", "isCorrect": false, "rationale": "24 is a common multiple of 4 and 6, and would clear the fractions, but it is not the *least* common denominator. The question asks for the smallest number."}]}, {"question": "What is the first step to solve the equation $0.05x - 1.2 = 0.35$ by clearing decimals?", "options": [{"text": "Add $1.2$ to both sides.", "isCorrect": false, "rationale": "Adding $1.2$ to both sides is a valid step in solving the equation, but it does not 'clear decimals' from the equation as described in the text. It only moves a decimal term."}, {"text": "Divide all terms by $0.05$.", "isCorrect": false, "rationale": "Dividing by $0.05$ would be a step towards isolating $x$, but it is not the method for 'clearing decimals' as the initial step to work with integers."}, {"text": "Multiply every term by $10$.", "isCorrect": false, "rationale": "Multiplying by $10$ would clear terms with tenths (like $1.2$), but it would not clear terms with hundredths (like $0.05$ and $0.35$), leaving decimals in the equation."}, {"text": "Multiply every term by $100$.", "isCorrect": true, "rationale": "To clear decimals, you multiply every term by a power of 10 that corresponds to the smallest decimal place value present. Since $0.05$ and $0.35$ involve hundredths (two decimal places), multiplying by $10^2$ or $100$ will convert all terms to integers."}]}, {"question": "According to the text, what is the primary benefit of clearing fractions or decimals from an equation?", "options": [{"text": "It is a mandatory step for all equations involving fractions or decimals.", "isCorrect": false, "rationale": "The text explicitly states that clearing fractions and decimals is an 'optional technique' ('You can always solve without clearing')."}, {"text": "It isolates the variable faster.", "isCorrect": false, "rationale": "While it can streamline the process, its main benefit is related to simplifying calculations rather than necessarily making the isolation of the variable faster."}, {"text": "It produces an equivalent equation with integer coefficients, making arithmetic simpler and reducing errors.", "isCorrect": true, "rationale": "The text explains that clearing fractions 'produces an equivalent equation with integer coefficients' and notes that 'clearing often makes the arithmetic simpler and reduces opportunities for errors.'"}, {"text": "It eliminates the need for checking the solution.", "isCorrect": false, "rationale": "Checking the solution is always an important final step to verify correctness, regardless of the method used to solve the equation."}]}, {"question": "Which sequence of operations correctly solves the equation $4(y - 3) + 2 = 18$?", "options": [{"text": "Add 3, subtract 2, divide by 4.", "isCorrect": false, "rationale": "This sequence incorrectly applies inverse operations out of order, especially missing the initial distribution."}, {"text": "Distribute 4, combine like terms, add 10 to both sides, divide by 4.", "isCorrect": true, "rationale": "Following the strategy: 1. Distribute 4: $4y - 12 + 2 = 18$. 2. Combine like terms: $4y - 10 = 18$. 3. Add 10 to both sides: $4y = 28$. 4. Divide by 4: $y = 7$. This is the correct sequence of steps."}, {"text": "Subtract 2, divide by 4, add 3.", "isCorrect": false, "rationale": "This sequence attempts to undo operations without first distributing and simplifying terms on the left side of the equation."}, {"text": "Combine like terms, distribute 4, then solve.", "isCorrect": false, "rationale": "According to the order of operations for solving, you must distribute the 4 before combining it with other constant terms outside the parenthesis."}]}, {"question": "When solving the equation $\\frac{x}{5} - 0.7 = 1.3$, what is the result if you choose to first clear the decimal terms by multiplying every term by 10, and then solve?", "options": [{"text": "$2x - 7 = 13 \\implies x = 10$", "isCorrect": true, "rationale": "To clear decimals (0.7 and 1.3), multiply *every* term by 10: $10 \\times \\frac{x}{5} - 10 \\times 0.7 = 10 \\times 1.3$. This simplifies to $2x - 7 = 13$. Next, add 7 to both sides ($2x = 20$) and finally divide by 2 ($x = 10$)."}, {"text": "$\\frac{x}{5} - 7 = 13 \\implies x = 100$", "isCorrect": false, "rationale": "Only the decimal terms were multiplied by 10, not the fractional term ($\\frac{x}{5}$), which is an inconsistent application of multiplying *every* term."}, {"text": "$x - 7 = 13 \\implies x = 20$", "isCorrect": false, "rationale": "Multiplying $\\frac{x}{5}$ by 10 would yield $2x$, not $x$. This shows an error in multiplying the fractional term by 10."}, {"text": "$x/5 - 0.7 = 13 \\implies x/5 = 13.7 \\implies x = 68.5$", "isCorrect": false, "rationale": "This option shows adding $0.7$ to $1.3$ without first multiplying by 10, meaning decimals were not cleared as specified in the question."}]}, {"question": "What is the final step in the strategy for solving multi-step equations, and why is it important?", "options": [{"text": "Isolate the variable; it shows the final answer.", "isCorrect": false, "rationale": "Isolating the variable is a crucial step towards finding the solution, but it is not the *final* step in the comprehensive strategy outlined in the text."}, {"text": "Simplify each side; it makes the equation easier to read.", "isCorrect": false, "rationale": "Simplifying each side is the *first* step in the strategy, setting up the equation for further solving, not the final one."}, {"text": "Check by substituting into the original equation; it verifies the solution's correctness.", "isCorrect": true, "rationale": "The strategy explicitly lists 'Check by substituting into the original equation' as the final step. This step is important because it confirms that the solution found actually satisfies the original equation and helps catch any computational errors."}, {"text": "Clear fractions/decimals; it always simplifies arithmetic.", "isCorrect": false, "rationale": "Clearing fractions/decimals is an optional intermediate technique to simplify calculations, not the final step, and its primary purpose is not verification."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
