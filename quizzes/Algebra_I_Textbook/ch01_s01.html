<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following statements correctly differentiates a variable from a constant in algebra?", "options": [{"text": "A variable is always a letter, while a constant is always a number.", "isCorrect": false, "rationale": "Variables can be symbols, not just letters. Constants are quantities whose value does not change, but the statement implies they cannot be represented by symbols in certain contexts, which is not the primary distinction. The core difference is fixed vs. changing value."}, {"text": "A variable represents a quantity that can take on different values, whereas a constant represents a fixed numerical value.", "isCorrect": true, "rationale": "According to the text, a variable 'represents one or more numbers' (meaning its value can change or be assigned), while a constant is 'a quantity whose value does not change,' representing a fixed numerical value."}, {"text": "Variables are used only in arithmetic, while constants are primarily used in algebra.", "isCorrect": false, "rationale": "The text states that in arithmetic, you work with specific numbers (constants), and in algebra, you introduce variables to generalize. Both concepts are fundamental to algebra, and arithmetic primarily deals with constants."}, {"text": "A constant can be negative, but a variable must always represent a positive number.", "isCorrect": false, "rationale": "Both constants and variables can represent negative numbers. The text lists -7 as an example of a constant, and variables can take on any real number value, including negative ones."}], "id": "q01"}, {"question": "Which of the following is an algebraic expression?", "options": [{"text": "3 + 5 = 8", "isCorrect": false, "rationale": "This is an arithmetic equation, involving only specific numbers and an equality sign, not variables."}, {"text": "x = 10", "isCorrect": false, "rationale": "This is an equation because it contains an equality sign, rather than just a combination of variables, constants, and operations."}, {"text": "4y^2 - 7z + 2", "isCorrect": true, "rationale": "This is an algebraic expression as it combines variables (y, z), constants (4, -7, 2), and operations (multiplication, exponentiation, subtraction, addition)."}, {"text": "PEMDAS", "isCorrect": false, "rationale": "PEMDAS is an acronym for the order of operations, not an algebraic expression itself."}], "id": "q02"}, {"question": "How many terms are there in the algebraic expression 5xy - x + 12?", "options": [{"text": "One", "isCorrect": false, "rationale": "A single term would not have addition or subtraction signs separating parts."}, {"text": "Two", "isCorrect": false, "rationale": "This expression has three parts separated by addition or subtraction signs."}, {"text": "Three", "isCorrect": true, "rationale": "The terms are 5xy, -x, and 12. Terms are parts of an expression separated by addition or subtraction signs."}, {"text": "Four", "isCorrect": false, "rationale": "There are only three distinct parts separated by the operations."}], "id": "q03"}, {"question": "What is the coefficient of the term -ab in the expression 7a^2 + 5b - ab + 1?", "options": [{"text": "ab", "isCorrect": false, "rationale": "ab represents the variables, not the numerical factor multiplied by them."}, {"text": "1", "isCorrect": false, "rationale": "The coefficient includes the sign. If no number is explicitly written, it's assumed to be 1, but here a negative sign is present."}, {"text": "-1", "isCorrect": true, "rationale": "The coefficient is the numerical factor, including its sign, multiplied by the variables. For -ab, it's equivalent to -1 * ab, so the coefficient is -1."}, {"text": "0", "isCorrect": false, "rationale": "A coefficient of 0 would mean the term is 0 and effectively absent from the expression."}], "id": "q04"}, {"question": "Evaluate the expression 5y + 9 when y = 6.", "options": [{"text": "14", "isCorrect": false, "rationale": "This results from adding 5 and 9 first (14), then multiplying by 6 (84), which violates the order of operations."}, {"text": "39", "isCorrect": true, "rationale": "Substitute y=6: 5(6) + 9. According to the order of operations, multiplication comes before addition: 30 + 9 = 39."}, {"text": "65", "isCorrect": false, "rationale": "This results from adding 6 and 9 (15), then multiplying by 5 (75), which violates the order of operations. Or perhaps (5+9)*6 = 14*6 = 84."}, {"text": "59", "isCorrect": false, "rationale": "This would result from treating 5y as 59, which is incorrect; it represents 5 multiplied by y."}], "id": "q05"}, {"question": "Evaluate the expression 3x^2 - 4x + 7 when x = 2.", "options": [{"text": "11", "isCorrect": true, "rationale": "Substitute x=2: 3(2)^2 - 4(2) + 7. Following PEMDAS: 3(4) - 8 + 7 = 12 - 8 + 7 = 4 + 7 = 11."}, {"text": "3", "isCorrect": false, "rationale": "This might result from errors like (3x)^2 - 4x + 7 = (6)^2 - 8 + 7 = 36 - 8 + 7 = 28 + 7 = 35, or other calculation errors."}, {"text": "17", "isCorrect": false, "rationale": "This might result from calculation errors, such as 3(4) + 4(2) + 7 = 12 + 8 + 7 = 27 (incorrect operations), or similar."}, {"text": "27", "isCorrect": false, "rationale": "This might result if addition/subtraction were done incorrectly or if the negative sign was ignored, e.g., 12 + 8 + 7 = 27."}], "id": "q06"}, {"question": "When evaluating the expression 10 - 2 * (3 + 1)^2, why is it crucial to perform the operation inside the parentheses (3 + 1) before applying the exponent?", "options": [{"text": "Because addition always comes before exponentiation in the order of operations.", "isCorrect": false, "rationale": "This is incorrect. Exponentiation generally comes before addition, but operations within parentheses take absolute precedence."}, {"text": "The Order of Operations (PEMDAS) dictates that operations within parentheses or other grouping symbols must be completed first.", "isCorrect": true, "rationale": "According to PEMDAS, 'Parentheses (and other grouping symbols)' are the first step, meaning any operations inside them must be simplified before proceeding to exponents, multiplication, or division outside of them."}, {"text": "Subtraction is performed before multiplication in this specific expression.", "isCorrect": false, "rationale": "This is incorrect. Multiplication comes before subtraction in PEMDAS. The order of operations inside the parentheses is the primary reason here."}, {"text": "Working from left to right requires performing the addition first.", "isCorrect": false, "rationale": "While parts of PEMDAS are evaluated left-to-right (Multiplication/Division, Addition/Subtraction), the overall order is not simply left-to-right. Parentheses take precedence regardless of their position."}], "id": "q07"}, {"question": "Which algebraic expression correctly translates the verbal phrase 'five more than the product of a number and seven'?", "options": [{"text": "5 + n + 7", "isCorrect": false, "rationale": "This translates to 'five plus a number plus seven', missing the 'product' operation."}, {"text": "7n + 5", "isCorrect": true, "rationale": "The 'product of a number and seven' is 7n. 'Five more than' means to add 5 to that product, resulting in 7n + 5."}, {"text": "5n + 7", "isCorrect": false, "rationale": "This translates to 'seven more than the product of five and a number', reversing the roles of 5 and 7."}, {"text": "7(n + 5)", "isCorrect": false, "rationale": "This translates to 'seven times the sum of a number and five', where the sum is taken before multiplication, which is not what the phrase describes."}], "id": "q08"}, {"question": "A student needs to write an algebraic expression for 'twelve less than twice a number'. Which of the following is the correct expression?", "options": [{"text": "12 - 2n", "isCorrect": false, "rationale": "This translates to 'twelve minus twice a number'. The phrase 'less than' reverses the order of subtraction, so '12 less than' means something minus 12."}, {"text": "2n - 12", "isCorrect": true, "rationale": "According to the 'caution' note, 'less than' reverses the order of subtraction. 'Twice a number' is 2n, and 'twelve less than' means to subtract 12 from 2n."}, {"text": "2(n - 12)", "isCorrect": false, "rationale": "This translates to 'twice the difference of a number and twelve', which implies the subtraction happens first, then the multiplication."}, {"text": "12 / 2n", "isCorrect": false, "rationale": "This translates to 'twelve divided by twice a number', which uses division instead of subtraction."}], "id": "q09"}, {"question": "According to the introductory paragraph, what is the fundamental advantage of using variables in algebra compared to working solely with specific numbers in arithmetic?", "options": [{"text": "Variables make arithmetic problems easier and faster to solve.", "isCorrect": false, "rationale": "While algebra can simplify complex problems, the text emphasizes generalization, not necessarily faster solving of *specific* arithmetic problems."}, {"text": "Variables allow mathematical ideas to be expressed generally, applying to any numbers, not just specific ones.", "isCorrect": true, "rationale": "The text states, 'In algebra, you can write a + b = c to describe the same idea for any numbers. This ability to work with general quantities is what makes algebra so useful.'"}, {"text": "Variables are solely used to represent unknown quantities in equations.", "isCorrect": false, "rationale": "While variables often represent unknowns, their primary advantage is the ability to represent *any* quantity, enabling generalization, not just to solve for a single unknown."}, {"text": "Variables introduce complexity to challenge advanced students.", "isCorrect": false, "rationale": "Increased complexity is a side effect, not the primary 'useful' advantage highlighted in the text. The utility is in generalization and pattern description."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
