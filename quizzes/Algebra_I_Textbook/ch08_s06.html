<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 8, Section 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A projectile is launched from the roof of a $96$-foot tall building with an initial upward velocity of $80$ ft/s. According to the model $h(t) = -16t^2 + v_0 t + h_0$, at what time $t$ does the object hit the ground?", "options": [{"text": "6 seconds", "isCorrect": true, "rationale": "By setting $h(t) = 0$ and solving the quadratic equation $-16t^2 + 80t + 96 = 0$, we find the positive root is $6$."}, {"text": "2.5 seconds", "isCorrect": false, "rationale": "This value represents the time at which the object reaches its maximum height, which occurs at the vertex $t = \\frac{-b}{2a}$."}, {"text": "5 seconds", "isCorrect": false, "rationale": "This time results from solving $-16t^2 + 80t = 0$, which incorrectly assumes the initial height is zero."}, {"text": "1 second", "isCorrect": false, "rationale": "This is the negative root $t = -1$ from the factored equation, but time must be non-negative in this context."}]}, {"question": "A farmer is using $240$ feet of fencing to create a rectangular enclosure against a straight river, meaning only three sides require fencing. What is the maximum area possible for this enclosure?", "options": [{"text": "$7200$ ft$^2$", "isCorrect": true, "rationale": "With two sides of length $x$ and one side $240 - 2x$, the area function $A(x) = x(240 - 2x)$ reaches its maximum at the vertex where $x = 60$."}, {"text": "$3600$ ft$^2$", "isCorrect": false, "rationale": "This area assumes a square enclosure using all four sides, which does not maximize area when one side is already provided by a river."}, {"text": "$4800$ ft$^2$", "isCorrect": false, "rationale": "This value might occur if the side parallel to the river was incorrectly assumed to be the same length as the perpendicular sides."}, {"text": "$14400$ ft$^2$", "isCorrect": false, "rationale": "This value assumes a square with $60$ foot sides but miscalculates the relationship between the perimeter constraint and area."}]}, {"question": "A local theater currently sells $500$ tickets per show at a price of $40$ dollars each. A survey shows that for every $2$ dollar increase in price, $10$ fewer tickets will be sold. What ticket price will maximize the theater's revenue?", "options": [{"text": "$70$ dollars", "isCorrect": true, "rationale": "The revenue function $R(x) = (40 + 2x)(500 - 10x)$ reaches its maximum when $x = 15$, leading to a price of $40 + 2(15)$."}, {"text": "$55$ dollars", "isCorrect": false, "rationale": "This price would be correct if each $1$ dollar increase resulted in $10$ fewer sales, rather than each $2$ dollar increase."}, {"text": "$15$ dollars", "isCorrect": false, "rationale": "This is the value of $x$ (the number of price increases), not the final price of the ticket."}, {"text": "$30$ dollars", "isCorrect": false, "rationale": "This value represents the total amount added to the original price, but it is not the final price itself."}]}, {"question": "In the projectile motion formula $h(t) = -16t^2 + v_0 t + h_0$, why is the lead coefficient $-16$?", "options": [{"text": "It is half of the acceleration due to gravity in ft/s$^2$", "isCorrect": true, "rationale": "The formula $h = \\frac{1}{2}gt^2$ uses half of the gravitational constant $g \\approx 32$ ft/s$^2$ acting downward."}, {"text": "It represents the average initial velocity of a standard projectile", "isCorrect": false, "rationale": "The initial velocity is represented by the coefficient $v_0$, not the quadratic term's coefficient."}, {"text": "It is the constant for air resistance in a vacuum", "isCorrect": false, "rationale": "This model typically ignores air resistance, and $-16$ is derived strictly from gravitational acceleration."}, {"text": "It is the result of converting meters to feet in the metric model", "isCorrect": false, "rationale": "While the metric coefficient is $-4.9$, $-16$ is derived independently using feet as the unit of measure."}]}, {"question": "A ball is launched with a height function $h(t) = -16t^2 + 96t + 10$. What is the maximum height reached by the ball?", "options": [{"text": "$154$ feet", "isCorrect": true, "rationale": "The maximum occurs at $t = 3$ seconds; substituting this into the function gives $-16(9) + 96(3) + 10 = 154$."}, {"text": "$144$ feet", "isCorrect": false, "rationale": "This value neglects the initial height $h_0 = 10$ and only calculates the height gained from the launch."}, {"text": "$3$ feet", "isCorrect": false, "rationale": "This is the time $t$ at which the maximum height occurs, rather than the height itself."}, {"text": "$106$ feet", "isCorrect": false, "rationale": "This is a result of a common arithmetic error when evaluating the quadratic term $-16t^2$."}]}, {"question": "If a quadratic function $f(x) = ax^2 + bx + c$ has a positive lead coefficient ($a > 0$), what does the vertex represent in an optimization problem?", "options": [{"text": "The minimum value of the function", "isCorrect": true, "rationale": "When $a > 0$, the parabola opens upward, meaning the vertex is the lowest point on the graph."}, {"text": "The maximum value of the function", "isCorrect": false, "rationale": "A maximum only occurs at the vertex if the parabola opens downward ($a < 0$)."}, {"text": "The $x$-intercept of the function", "isCorrect": false, "rationale": "The vertex is only an $x$-intercept if the minimum or maximum value of the function is zero."}, {"text": "The initial starting value of the quantity", "isCorrect": false, "rationale": "The initial value is usually represented by the $y$-intercept ($c$), not the vertex."}]}, {"question": "A shop sells $200$ hats per month at $15$ dollars each. They find that for every $1$ dollar decrease in price, they sell $20$ more hats. Which equation models the monthly revenue $R$ based on the number of $1$ dollar price decreases $x$?", "options": [{"text": "$R(x) = -20x^2 + 100x + 3000$", "isCorrect": true, "rationale": "Expanding $(15 - x)(200 + 20x)$ results in $3000 + 300x - 200x - 20x^2$, which simplifies to $-20x^2 + 100x + 3000$."}, {"text": "$R(x) = 20x^2 - 100x + 3000$", "isCorrect": false, "rationale": "This incorrectly assigns a positive sign to the quadratic term, which would imply revenue decreases and then increases infinitely."}, {"text": "$R(x) = -20x^2 + 3000$", "isCorrect": false, "rationale": "This ignores the middle terms created by the price change and quantity change during expansion."}, {"text": "$R(x) = (15+x)(200-20x)$", "isCorrect": false, "rationale": "This models a price increase and a sales decrease, which is the opposite of the scenario described."}]}, {"question": "A rectangular garden is built using $120$ feet of fencing for three sides (one side is a house wall). To maximize the area, what should be the length of the two sides perpendicular to the house?", "options": [{"text": "$30$ feet", "isCorrect": true, "rationale": "In the area function $A(x) = x(120 - 2x) = -2x^2 + 120x$, the vertex occurs at $x = \\frac{-120}{2(-2)} = 30$."}, {"text": "$60$ feet", "isCorrect": false, "rationale": "This is the length of the single side parallel to the house, not the two perpendicular sides."}, {"text": "$40$ feet", "isCorrect": false, "rationale": "This assumes all three fenced sides are equal in length, which does not maximize the area."}, {"text": "$20$ feet", "isCorrect": false, "rationale": "This is a common error resulting from miscalculating the vertex formula or the perimeter constraint."}]}, {"question": "How many items are sold when revenue is maximized if the revenue function is $R(x) = (10 + x)(100 - 5x)$, where $x$ is the number of $\\$1$ price increases?", "options": [{"text": "75 items", "isCorrect": true, "rationale": "The vertex occurs at $x = 5$. Substituting this into the quantity expression $(100 - 5x)$ gives $100 - 25 = 75$."}, {"text": "5 items", "isCorrect": false, "rationale": "This is the number of price increases required, not the number of items sold."}, {"text": "100 items", "isCorrect": false, "rationale": "This is the original quantity sold before any price changes were applied."}, {"text": "50 items", "isCorrect": false, "rationale": "This represents a miscalculation of the vertex or a misunderstanding of how the price increase affects quantity."}]}, {"question": "A ball is launched from ground level ($h_0 = 0$) with an initial upward velocity of $64$ ft/s. How long is the ball in the air before it returns to the ground?", "options": [{"text": "4 seconds", "isCorrect": true, "rationale": "Solving $-16t^2 + 64t = 0$ by factoring gives $-16t(t - 4) = 0$, resulting in $t = 0$ and $t = 4$."}, {"text": "2 seconds", "isCorrect": false, "rationale": "This is the time the ball takes to reach its maximum height, which is exactly half of the total flight time for ground-to-ground launches."}, {"text": "8 seconds", "isCorrect": false, "rationale": "This occurs if one neglects the factor of $2$ in the denominator of the quadratic formula or vertex calculation."}, {"text": "16 seconds", "isCorrect": false, "rationale": "This is a common error resulting from confusing the gravitational constant with the total time calculation."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
