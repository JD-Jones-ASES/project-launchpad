<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 3, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What does the absolute value of a real number primarily represent?", "options": [{"text": "Its value multiplied by -1.", "isCorrect": false, "rationale": "While the absolute value of a negative number is found by multiplying by -1, this is not the universal definition. For positive numbers, it's just the number itself."}, {"text": "Its distance from zero on the number line.", "isCorrect": true, "rationale": "The definition of absolute value states that it is the distance of a number from zero on the number line. Distance is always non-negative."}, {"text": "Its position on the number line relative to other numbers.", "isCorrect": false, "rationale": "Absolute value indicates distance from zero, not relative position to other arbitrary numbers on the number line."}, {"text": "Its reciprocal value.", "isCorrect": false, "rationale": "The reciprocal of a number is 1 divided by that number, which is unrelated to its absolute value."}], "id": "q01"}, {"question": "Which of the following absolute value equations has no solution?", "options": [{"text": "$|x - 5| = 10$", "isCorrect": false, "rationale": "This equation has two solutions because the absolute value expression is set equal to a positive number ($10 > 0$)."}, {"text": "$|2x + 1| = 0$", "isCorrect": false, "rationale": "This equation has exactly one solution because the absolute value expression is set equal to zero."}, {"text": "$|3x - 2| = -7$", "isCorrect": true, "rationale": "An absolute value represents a distance from zero, which can never be negative. Therefore, an absolute value expression cannot equal -7, meaning there is no solution."}, {"text": "$|x| = 4$", "isCorrect": false, "rationale": "This equation has two solutions ($x=4$ and $x=-4$) because the absolute value expression is set equal to a positive number ($4 > 0$)."}], "id": "q02"}, {"question": "If $|x| = 8$, what are the possible values for $x$?", "options": [{"text": "Only $x = 8$.", "isCorrect": false, "rationale": "This only accounts for one of the two numbers whose distance from zero is 8."}, {"text": "Only $x = -8$.", "isCorrect": false, "rationale": "This only accounts for one of the two numbers whose distance from zero is 8."}, {"text": "$x = 8$ or $x = -8$.", "isCorrect": true, "rationale": "The definition of absolute value states that if $|x|=c$ and $c>0$, then $x=c$ or $x=-c$. Both 8 and -8 are exactly 8 units from zero."}, {"text": "$x = 0$.", "isCorrect": false, "rationale": "The absolute value of 0 is 0, not 8."}], "id": "q03"}, {"question": "Solve the equation $|x + 2| = 9$.", "options": [{"text": "$x = 7$ only.", "isCorrect": false, "rationale": "This solution only considers the positive case. The negative case must also be solved."}, {"text": "$x = 7$ or $x = -11$.", "isCorrect": true, "rationale": "Splitting into two cases: $x+2 = 9 \\Rightarrow x=7$, and $x+2 = -9 \\Rightarrow x=-11$. Both solutions satisfy the original equation."}, {"text": "$x = -7$ or $x = 11$.", "isCorrect": false, "rationale": "This involves sign errors in setting up or solving the cases."}, {"text": "$x = 11$ only.", "isCorrect": false, "rationale": "This is an incorrect solution for both cases."}], "id": "q04"}, {"question": "What is the first correct step to solve the equation $4|x - 1| + 3 = 15$?", "options": [{"text": "Split into two equations: $4(x-1) + 3 = 15$ and $4(-(x-1)) + 3 = 15$.", "isCorrect": false, "rationale": "The absolute value expression must be isolated on one side of the equation before splitting into cases. Here, $4|x-1|$ is not isolated."}, {"text": "Divide both sides by 4: $|x - 1| + \\frac{3}{4} = \\frac{15}{4}$.", "isCorrect": false, "rationale": "Before dividing by 4, the term added to $4|x-1|$ (which is 3) should be moved to the other side. This ensures the absolute value term is truly isolated."}, {"text": "Subtract 3 from both sides.", "isCorrect": true, "rationale": "The 'caution' states to always isolate the absolute value expression first. To do this, operations outside the absolute value, such as addition or subtraction, must be undone first. Subtracting 3 is the correct first step to begin isolating $4|x-1|$."}, {"text": "Distribute 4 into $(x-1)$: $|4x - 4| + 3 = 15$.", "isCorrect": false, "rationale": "You cannot distribute a number into an absolute value expression. The absolute value acts like a grouping symbol that prevents distribution in this manner until the cases are split."}], "id": "q05"}, {"question": "How many distinct solutions does the equation $|5x - 10| = 0$ have?", "options": [{"text": "Zero solutions.", "isCorrect": false, "rationale": "An absolute value equation equal to zero always has exactly one solution, as the expression inside must be zero."}, {"text": "One solution.", "isCorrect": true, "rationale": "According to the property for solving $|ax + b| = c$, if $c = 0$, then there is exactly one solution ($ax + b = 0$). In this case, $5x - 10 = 0 \\Rightarrow 5x = 10 \\Rightarrow x = 2$ is the single solution."}, {"text": "Two solutions.", "isCorrect": false, "rationale": "Two solutions occur only when the absolute value expression is equal to a positive number ($c > 0$)."}, {"text": "Infinitely many solutions.", "isCorrect": false, "rationale": "Absolute value equations typically have a finite number of solutions (zero, one, or two)."}], "id": "q06"}, {"question": "Solve the equation $3|2x - 4| - 6 = 12$.", "options": [{"text": "$x = 5$ or $x = -1$.", "isCorrect": true, "rationale": "First, isolate the absolute value: $3|2x-4| = 18 \\Rightarrow |2x-4|=6$. Then split into two cases: $2x-4=6 \\Rightarrow 2x=10 \\Rightarrow x=5$, and $2x-4=-6 \\Rightarrow 2x=-2 \\Rightarrow x=-1$."}, {"text": "$x = 5$ only.", "isCorrect": false, "rationale": "This only represents one of the two possible solutions after correctly isolating and splitting the equation."}, {"text": "$x = 2$ or $x = -2$.", "isCorrect": false, "rationale": "This results from errors in algebraic manipulation or solving the linear equations."}, {"text": "No solution.", "isCorrect": false, "rationale": "The absolute value expression is ultimately set equal to a positive number (6), so there will be solutions, not no solution."}], "id": "q07"}, {"question": "Consider the equation $|ax + b| = c$. Which of the following statements is always true regarding the number of solutions?", "options": [{"text": "There are always exactly two solutions.", "isCorrect": false, "rationale": "This is false. There can be zero solutions (if $c < 0$) or one solution (if $c = 0$). Two solutions only occur if $c > 0$."}, {"text": "There is exactly one solution if $c = 0$.", "isCorrect": true, "rationale": "As stated in the 'Solving $ax + b = c$' property, if $c = 0$, the equation simplifies to $ax + b = 0$, which yields exactly one solution."}, {"text": "There are no solutions if $c > 0$.", "isCorrect": false, "rationale": "This is false. If $c > 0$, there are exactly two solutions to the equation."}, {"text": "There are always solutions, regardless of the value of $c$.", "isCorrect": false, "rationale": "This is false. If $c < 0$, there are no solutions because an absolute value cannot be negative."}], "id": "q08"}, {"question": "A student attempts to solve $2|x+1| + 4 = 6$. Their first step is to write $2(x+1) + 4 = 6$ and $2(-(x+1)) + 4 = 6$. What mistake did the student make?", "options": [{"text": "They should have divided by 2 first.", "isCorrect": false, "rationale": "While dividing by 2 is a valid step after subtracting 4, the primary mistake here is not isolating the absolute value expression before splitting cases, not the order of division vs. subtraction."}, {"text": "They did not isolate the absolute value expression before splitting into cases.", "isCorrect": true, "rationale": "The 'caution' box explicitly states, 'Always isolate the absolute value expression before splitting into two cases.' The student failed to subtract 4 from both sides before splitting, which would have resulted in $2|x+1| = 2 \\Rightarrow |x+1|=1$."}, {"text": "They incorrectly applied the negative sign to $(x+1)$.", "isCorrect": false, "rationale": "Applying the negative sign to the expression inside the absolute value for the second case is the correct procedure, once the absolute value is isolated."}, {"text": "They should have added 4 to both sides first.", "isCorrect": false, "rationale": "They should have *subtracted* 4 from both sides. Adding 4 would lead to $2|x+1| + 8 = 6$, moving further from isolating the absolute value."}], "id": "q09"}, {"question": "Which of the following is NOT a valid method for checking the solution(s) of an absolute value equation?", "options": [{"text": "Substitute each proposed solution back into the original equation and verify both sides are equal.", "isCorrect": false, "rationale": "This is the standard and most reliable method for checking any equation's solutions. If the left side equals the right side, the solution is correct."}, {"text": "Verify that for each solution, the expression inside the absolute value bars evaluates to a positive number.", "isCorrect": true, "rationale": "This is not a valid check. For example, in $|x-3|=7$, the solution $x=-4$ makes $x-3 = -7$, which is negative. However, $|-7|=7$, so $x=-4$ is a correct solution. The sign of the expression inside the absolute value can be positive or negative, as long as its absolute value equals the right side of the equation."}, {"text": "Ensure that if the equation had a positive constant on the right side, two solutions were found.", "isCorrect": false, "rationale": "While it's true that a positive constant on the right side generally implies two solutions, this is a property used to determine the *expected number* of solutions, not a method to *verify* if specific numerical solutions are correct once found. A solution must still be substituted and checked directly."}, {"text": "Confirm that all solutions obtained are real numbers.", "isCorrect": false, "rationale": "In this context (Algebra I/real numbers), all solutions are expected to be real numbers. This is a characteristic of the domain, not a 'check' of the calculation for a specific solution."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
