<div class="quiz-container">

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the fundamental characteristic that defines an ordered pair (x, y) as a solution of a system of linear inequalities?", "options": [{"text": "It must lie on the boundary line of at least one inequality.", "isCorrect": false, "rationale": "Lying on a boundary line is not sufficient; it must satisfy *all* inequalities. If a boundary is dashed, points on it are not solutions for that inequality."}, {"text": "It must make at least one inequality in the system true.", "isCorrect": false, "rationale": "A solution must make *every* inequality in the system true, not just one."}, {"text": "It must be located within the half-plane of the first inequality.", "isCorrect": false, "rationale": "This only addresses one inequality. A solution must be in the overlap of *all* half-planes."}, {"text": "It must satisfy every inequality in the system simultaneously.", "isCorrect": true, "rationale": "According to the definition, a solution of a system of linear inequalities is an ordered pair (x, y) that satisfies *every* inequality in the system."}], "id": "q01"}, {"question": "When graphing the linear inequality y > -3x + 2, which statement correctly describes the boundary line and shading?", "options": [{"text": "A solid line y = -3x + 2 shaded below.", "isCorrect": false, "rationale": "The '>' symbol indicates a dashed line and shading above, not a solid line shaded below."}, {"text": "A dashed line y = -3x + 2 shaded above.", "isCorrect": true, "rationale": "The '>' symbol indicates that the boundary line is *not* included, so it must be dashed. A test point like (0,0) (0 > 2 is false) would indicate shading the half-plane *not* containing the origin, which is above the line y = -3x + 2 for a positive y-intercept."}, {"text": "A solid line y = -3x + 2 shaded above.", "isCorrect": false, "rationale": "The '>' symbol indicates a dashed line, not a solid line."}, {"text": "A dashed line y = -3x + 2 shaded below.", "isCorrect": false, "rationale": "While '>' indicates a dashed line, shading below would mean the test point (0,0) (0 > 2) would be true, which is false. Thus, shading should be above."}], "id": "q02"}, {"question": "Consider a system of two linear inequalities where the solution region has a vertex formed by the intersection of a solid boundary line and a dashed boundary line. What can be said about this vertex point?", "options": [{"text": "It is always included in the solution region because it lies on the solid line.", "isCorrect": false, "rationale": "While it lies on the solid line, it also lies on the dashed line, meaning it does not satisfy the strict inequality associated with the dashed line. Thus, it cannot be a solution to the system."}, {"text": "It is never included in the solution region because it lies on the dashed line.", "isCorrect": true, "rationale": "If a point lies on a dashed boundary line, it means it satisfies the equality portion of that inequality but not the strict inequality itself. Since a solution must satisfy *every* inequality, and it fails the strict inequality, it is not included in the solution region."}, {"text": "It is included only if it satisfies the strict inequality.", "isCorrect": false, "rationale": "This statement is contradictory. If it satisfies the strict inequality, then it would not be on the boundary line at all. Since it's on the dashed boundary, it satisfies the equality, but not the strict inequality, thus it's excluded."}, {"text": "It is always included if it satisfies both original inequalities.", "isCorrect": false, "rationale": "It cannot satisfy the strict inequality if it lies *on* the dashed boundary line, as points on a dashed line are explicitly excluded from the solution set of that inequality."}], "id": "q03"}, {"question": "To determine the correct shading for the inequality 2x - y ≥ 4, a student uses the test point (0, 0). What is the correct conclusion based on this test point?", "options": [{"text": "The inequality becomes 0 ≥ 4, which is false; therefore, shade the half-plane containing (0, 0).", "isCorrect": false, "rationale": "If the inequality is false for the test point, you shade the half-plane *not* containing the test point."}, {"text": "The inequality becomes 0 ≥ 4, which is false; therefore, shade the half-plane *not* containing (0, 0).", "isCorrect": true, "rationale": "Substituting (0, 0) into 2x - y ≥ 4 yields 2(0) - 0 ≥ 4, which simplifies to 0 ≥ 4. This statement is false. Therefore, the shaded region is the half-plane that does *not* contain the test point (0, 0)."}, {"text": "The inequality becomes 0 ≥ 4, which is true; therefore, shade the half-plane containing (0, 0).", "isCorrect": false, "rationale": "The statement 0 ≥ 4 is false, not true."}, {"text": "The inequality becomes 0 ≥ 4, which is true; therefore, shade the half-plane *not* containing (0, 0).", "isCorrect": false, "rationale": "The statement 0 ≥ 4 is false, not true. Also, if it were true, you would shade the half-plane *containing* the test point."}], "id": "q04"}, {"question": "Is the point (1, 3) a solution to the system: y ≥ -x + 4 y < 2x + 1", "options": [{"text": "Yes, because it satisfies the first inequality but not the second.", "isCorrect": false, "rationale": "A point must satisfy *both* inequalities to be a solution. This statement also incorrectly implies it satisfies the first but not the second."}, {"text": "No, because it does not satisfy the first inequality.", "isCorrect": false, "rationale": "Testing (1,3) in the first inequality: 3 ≥ -1 + 4 ⇒ 3 ≥ 3, which is true. So it *does* satisfy the first inequality."}, {"text": "Yes, because it satisfies both inequalities.", "isCorrect": false, "rationale": "Testing (1,3) in the first inequality: 3 ≥ -1 + 4 ⇒ 3 ≥ 3 (True). Testing (1,3) in the second inequality: 3 < 2(1) + 1 ⇒ 3 < 3 (False). Since it does not satisfy the second inequality, it is not a solution to the system."}, {"text": "No, because it satisfies the equality for the second inequality, but the inequality is strict.", "isCorrect": true, "rationale": "For the first inequality: 3 ≥ -(1) + 4 ⇒ 3 ≥ 3 (True). For the second inequality: 3 < 2(1) + 1 ⇒ 3 < 3 (False). Because (1, 3) does not satisfy the second (strict) inequality, it is not a solution to the system."}], "id": "q05"}, {"question": "A student graphs the system: y > x - 2 y ≤ -x + 4 Which statement accurately describes the resulting solution region?", "options": [{"text": "The solution region includes points on both boundary lines.", "isCorrect": false, "rationale": "The inequality y > x - 2 uses a strict inequality, meaning points on its boundary line y = x - 2 are not included."}, {"text": "The solution region includes points on y = x - 2 but not on y = -x + 4.", "isCorrect": false, "rationale": "Points on y = x - 2 are *not* included due to the '>' symbol. Points on y = -x + 4 *are* included due to the '≤' symbol, provided they also satisfy the first inequality."}, {"text": "The solution region includes points on y = -x + 4 but not on y = x - 2.", "isCorrect": true, "rationale": "The first inequality (y > x - 2) requires a dashed line, meaning points on that boundary are excluded. The second inequality (y ≤ -x + 4) requires a solid line, meaning points on that boundary *are* included, provided they also satisfy the first inequality. Therefore, points on y = -x + 4 (within the overlap) are part of the solution, but points on y = x - 2 are not."}, {"text": "The solution region does not include any points on either boundary line.", "isCorrect": false, "rationale": "The inequality y ≤ -x + 4 uses '≤', indicating that points on its boundary line (where they satisfy the other inequality) *are* included."}], "id": "q06"}, {"question": "For the system: y > x - 2 y ≤ -x + 4 What are the coordinates of the intersection point of the boundary lines, and is this point included in the solution region?", "options": [{"text": "(3, 1), and it is included.", "isCorrect": false, "rationale": "The intersection point is (3,1), but it is not included because it lies on the dashed boundary line (y = x - 2), failing the strict inequality y > x - 2."}, {"text": "(3, 1), and it is not included.", "isCorrect": true, "rationale": "To find the intersection, set x - 2 = -x + 4. This gives 2x = 6, so x = 3. Substitute x=3 into either equation: y = 3 - 2 = 1. So the intersection is (3, 1). This point satisfies y ≤ -x + 4 (1 ≤ -3 + 4 ⇒ 1 ≤ 1, true) but does not satisfy y > x - 2 (1 > 3 - 2 ⇒ 1 > 1, false). Thus, it is not included in the solution region."}, {"text": "(1, 3), and it is included.", "isCorrect": false, "rationale": "The intersection point calculation is incorrect. The point (1,3) is the intersection from a previous example, not this system. Even if it were (1,3), the inclusion reasoning would be incorrect based on the inequalities provided."}, {"text": "(1, 3), and it is not included.", "isCorrect": false, "rationale": "The intersection point calculation is incorrect. The point (1,3) is the intersection from a previous example, not this system."}], "id": "q07"}, {"question": "A system of linear inequalities is given as: y > 2x + 3 y < 2x - 1 Without graphing, what can be concluded about the solution to this system?", "options": [{"text": "The solution region is an unbounded area between two non-parallel lines.", "isCorrect": false, "rationale": "The lines have the same slope (2), so they are parallel. Also, there is no overlapping region."}, {"text": "The solution region is a single point where the boundary lines intersect.", "isCorrect": false, "rationale": "Parallel lines never intersect, so there cannot be a single intersection point, and a solution region for inequalities is typically an area, not a point (unless it's an edge case)."}, {"text": "The system has no solution because the half-planes are parallel and do not overlap.", "isCorrect": true, "rationale": "Both inequalities have boundary lines with the same slope (2), making them parallel. The first inequality shades above y = 2x + 3, while the second shades below y = 2x - 1. Since 2x + 3 is always greater than 2x - 1, the region above the higher line cannot overlap with the region below the lower line. Therefore, there is no common solution region, meaning no solution."}, {"text": "The system has an infinite number of solutions forming a narrow strip.", "isCorrect": false, "rationale": "This would be true if the inequalities were, for example, y < 2x + 3 and y > 2x - 1, shading *between* the parallel lines. However, the given inequalities shade outwards from the parallel lines, resulting in no overlap."}], "id": "q08"}, {"question": "A student needs to graph the solution region for the system: y ≤ -2x + 5 x ≥ 1 Which steps correctly lead to the solution region?", "options": [{"text": "Graph y = -2x + 5 with a dashed line, shade above. Graph x = 1 with a solid line, shade right. The overlap is the solution.", "isCorrect": false, "rationale": "The first inequality '≤' requires a solid line and shading below. The second inequality is correct."}, {"text": "Graph y = -2x + 5 with a solid line, shade below. Graph x = 1 with a dashed line, shade right. The overlap is the solution.", "isCorrect": false, "rationale": "The second inequality '≥' requires a solid line, not a dashed line."}, {"text": "Graph y = -2x + 5 with a solid line, shade below. Graph x = 1 with a solid line, shade right. The overlap is the solution.", "isCorrect": true, "rationale": "For y ≤ -2x + 5, the '≤' symbol indicates a solid line and shading below (e.g., test (0,0): 0 ≤ 5 is true, so shade towards origin). For x ≥ 1, the '≥' symbol indicates a solid line and shading to the right (e.g., test (0,0): 0 ≥ 1 is false, so shade away from origin, which is to the right). The intersection of these two shaded regions is the solution region."}, {"text": "Graph y = -2x + 5 with a dashed line, shade below. Graph x = 1 with a solid line, shade left. The overlap is the solution.", "isCorrect": false, "rationale": "The first inequality '≤' requires a solid line, not a dashed line. The second inequality '≥' requires shading to the right, not left."}], "id": "q09"}, {"question": "The graph of a system of linear inequalities shows a shaded region. A specific point lies on a dashed boundary line of one of the inequalities, but not on any other boundary lines. What can be definitively stated about this point?", "options": [{"text": "The point is a solution to the system.", "isCorrect": false, "rationale": "Points on a dashed boundary line are not included in the solution set for that specific inequality due to the strict nature of the inequality (> or <). Therefore, it cannot be a solution to the entire system."}, {"text": "The point is not a solution to the system.", "isCorrect": true, "rationale": "A solution to a system of inequalities must satisfy *every* inequality. If a point lies on a dashed boundary line, it means it makes the associated inequality an equality (e.g., y = mx + b for y < mx + b), which does not satisfy the strict inequality. Therefore, it cannot be a solution to the system."}, {"text": "The point could be a solution if it satisfies the other inequalities.", "isCorrect": false, "rationale": "Even if it satisfies all other inequalities, failing *one* inequality (the one with the dashed boundary) means it cannot be a solution to the *system*."}, {"text": "The point is a solution if the dashed line inequality is y > mx+b.", "isCorrect": false, "rationale": "Regardless of the direction of the strict inequality ('>' or '<'), points lying *on* the dashed line itself are never included in the solution set of that inequality, and thus cannot be a solution to the system."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
