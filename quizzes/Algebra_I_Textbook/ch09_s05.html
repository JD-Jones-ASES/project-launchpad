    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 9, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately describes when two radical expressions can be combined through addition or subtraction?", "options": [{"text": "When their coefficients are the same.", "isCorrect": false, "rationale": "While coefficients are combined during addition/subtraction, the primary condition for combining radical expressions is that their radicands must be identical, not their coefficients."}, {"text": "When their radicands are the same.", "isCorrect": true, "rationale": "As stated in the text, you can add or subtract radical expressions only when they have the same radicand. These are called 'like radicals,' similar to combining 'like terms' in algebra."}, {"text": "When they are both square roots.", "isCorrect": false, "rationale": "Having the same index (e.g., both square roots) is necessary but not sufficient. They must also have the same radicand to be combined directly."}, {"text": "When they are conjugates of each other.", "isCorrect": false, "rationale": "Conjugates are used for multiplication to rationalize binomial denominators, not for direct addition or subtraction."}]}, {"question": "Simplify the expression $2\\sqrt{8} + 3\\sqrt{18} - \\sqrt{50}$.", "options": [{"text": "$10\\sqrt{2}$", "isCorrect": false, "rationale": "This result might occur from incorrect simplification or addition of the coefficients after simplification. Let's re-evaluate: $2\\sqrt{8} = 4\\sqrt{2}$, $3\\sqrt{18} = 9\\sqrt{2}$, $\\sqrt{50} = 5\\sqrt{2}$. Summing these gives $(4+9-5)\\sqrt{2} = 8\\sqrt{2}$."}, {"text": "$8\\sqrt{2}$", "isCorrect": true, "rationale": "First, simplify each radical: $2\\sqrt{8} = 2\\sqrt{4\\cdot 2} = 2 \\cdot 2\\sqrt{2} = 4\\sqrt{2}$. Next, $3\\sqrt{18} = 3\\sqrt{9\\cdot 2} = 3 \\cdot 3\\sqrt{2} = 9\\sqrt{2}$. Finally, $\\sqrt{50} = \\sqrt{25\\cdot 2} = 5\\sqrt{2}$. Now combine the like radicals: $4\\sqrt{2} + 9\\sqrt{2} - 5\\sqrt{2} = (4 + 9 - 5)\\sqrt{2} = 8\\sqrt{2}$."}, {"text": "$6\\sqrt{2}$", "isCorrect": false, "rationale": "This result suggests an error in simplifying or combining the coefficients. For example, if $9\\sqrt{2} - 5\\sqrt{2}$ was calculated as $4\\sqrt{2}$, and added to $2\\sqrt{2}$ instead of $4\\sqrt{2}$."}, {"text": "$12\\sqrt{2}$", "isCorrect": false, "rationale": "This result might occur from adding all coefficients instead of performing subtraction: $(4+9+5)\\sqrt{2} = 18\\sqrt{2}$ or other calculation errors."}]}, {"question": "Multiply and simplify $ \\sqrt{3}( \\sqrt{12} - 2\\sqrt{3}) $.", "options": [{"text": "$6 - 2\\sqrt{3}$", "isCorrect": false, "rationale": "This would be the result if the second term was $2\\sqrt{3}$ but the first term was not $\\sqrt{36}$ (e.g., just $6$). The $2\\sqrt{3} \\cdot \\sqrt{3}$ part is $2 \\cdot 3 = 6$, and $\\sqrt{3} \\cdot \\sqrt{12} = \\sqrt{36} = 6$. So $6 - 6 = 0$."}, {"text": "$0$", "isCorrect": true, "rationale": "Use the distributive property: $ \\sqrt{3} \\cdot \\sqrt{12} - \\sqrt{3} \\cdot (2\\sqrt{3}) $. This simplifies to $ \\sqrt{36} - 2(\\sqrt{3})^2 $. Which further simplifies to $ 6 - 2(3) = 6 - 6 = 0 $."}, {"text": "$2\\sqrt{3} - 6$", "isCorrect": false, "rationale": "This suggests an incorrect simplification or ordering of terms. The product is $6 - 6$, not involving $\\sqrt{3}$ terms."}, {"text": "$3\\sqrt{6}$", "isCorrect": false, "rationale": "This indicates an error in applying the distributive property or simplifying the radicals, possibly by trying to combine the terms under a single radical."}]}, {"question": "What is the primary purpose of multiplying a binomial radical expression by its conjugate?", "options": [{"text": "To find the square of the expression.", "isCorrect": false, "rationale": "Multiplying an expression by itself finds its square. Multiplying by a conjugate utilizes the difference-of-squares pattern."}, {"text": "To eliminate the radical terms from the product.", "isCorrect": true, "rationale": "As explained in the text, multiplying an expression by its conjugate (e.g., $(a + b\\sqrt{c})(a - b\\sqrt{c})$) results in $a^2 - b^2c$, which contains no radical terms, thus 'rationalizing' the expression."}, {"text": "To simplify the expression's radicands.", "isCorrect": false, "rationale": "Simplifying radicands involves factoring out perfect squares, not multiplying by a conjugate."}, {"text": "To change the sign of the radical term.", "isCorrect": false, "rationale": "While the conjugate itself has the opposite sign for the radical term, the primary purpose of the multiplication is the elimination of the radical from the overall product, not merely changing a sign."}]}, {"question": "What is the conjugate of the expression $5 - \\sqrt{7}$?", "options": [{"text": "$\\sqrt{7} - 5$", "isCorrect": false, "rationale": "This expression is the negative of the original, reordered, not its conjugate. The conjugate only changes the sign between the two terms."}, {"text": "$5 + \\sqrt{7}$", "isCorrect": true, "rationale": "The conjugate of $a - b\\sqrt{c}$ is $a + b\\sqrt{c}$. Therefore, the conjugate of $5 - \\sqrt{7}$ is $5 + \\sqrt{7}$."}, {"text": "$-5 - \\sqrt{7}$", "isCorrect": false, "rationale": "This changes the sign of both terms, which is not the definition of a conjugate. A conjugate only flips the sign of the radical term (or the second term in general)."}, {"text": "$7 - \\sqrt{5}$", "isCorrect": false, "rationale": "This changes both the radicand and the order of the terms, which is incorrect. The conjugate only changes the sign between the two terms."}]}, {"question": "If you multiply $(a + b\\sqrt{c})$ by its conjugate $(a - b\\sqrt{c})$, what is the general form of the simplified result?", "options": [{"text": "$a^2 + b^2c$", "isCorrect": false, "rationale": "This would be the result if the middle terms did not cancel out and the square of the radical was added, not subtracted, or if there was an error in the sign of $b^2c$."}, {"text": "$a^2 - bc$", "isCorrect": false, "rationale": "This result omits the square of the coefficient 'b' from the radical term. The term would be $(b\\sqrt{c})^2 = b^2c$."}, {"text": "$a^2 - b^2c$", "isCorrect": true, "rationale": "As explained in the text, $(a + b\\sqrt{c})(a - b\\sqrt{c})$ follows the difference-of-squares pattern, resulting in $a^2 - (b\\sqrt{c})^2$, which simplifies to $a^2 - b^2c$. The radical terms cancel out."}, {"text": "$a^2 - b^2\\sqrt{c}$", "isCorrect": false, "rationale": "This result leaves a radical term ($\\sqrt{c}$) in the product, which is contrary to the purpose of multiplying by a conjugate to eliminate radicals."}]}, {"question": "Rationalize the denominator of $\\frac{4}{2 + \\sqrt{3}}$.", "options": [{"text": "$4(2 - \\sqrt{3})$", "isCorrect": false, "rationale": "This implies the denominator somehow became 1 directly without showing the multiplication by the conjugate and calculation, or assumes the answer is just the numerator times the conjugate. The denominator should be rationalized as $(2)^2 - (\\sqrt{3})^2 = 4-3=1$."}, {"text": "$8 - 4\\sqrt{3}$", "isCorrect": true, "rationale": "To rationalize, multiply the numerator and denominator by the conjugate of the denominator, which is $2 - \\sqrt{3}$. So, $\\frac{4}{2 + \\sqrt{3}} \\cdot \\frac{2 - \\sqrt{3}}{2 - \\sqrt{3}} = \\frac{4(2 - \\sqrt{3})}{(2)^2 - (\\sqrt{3})^2} = \\frac{8 - 4\\sqrt{3}}{4 - 3} = \\frac{8 - 4\\sqrt{3}}{1} = 8 - 4\\sqrt{3}$."}, {"text": "$\\frac{4(2 + \\sqrt{3})}{7}$", "isCorrect": false, "rationale": "This result would occur if the denominator was incorrectly calculated (e.g., $2^2 + (\\sqrt{3})^2 = 4+3=7$) or if the wrong conjugate ($2+\\sqrt{3}$) was used in the numerator during multiplication."}, {"text": "$\\frac{8 + 4\\sqrt{3}}{7}$", "isCorrect": false, "rationale": "This indicates using the original denominator, $2 + \\sqrt{3}$, as the conjugate for multiplication, which would not rationalize the denominator."}]}, {"question": "Which pair of expressions *cannot* be combined by addition or subtraction in their current form, even after simplification?", "options": [{"text": "$5\\sqrt{2}$ and $3\\sqrt{8}$", "isCorrect": false, "rationale": "These can be combined. $3\\sqrt{8} = 3\\sqrt{4\\cdot 2} = 3\\cdot 2\\sqrt{2} = 6\\sqrt{2}$. Now both are like radicals ($5\\sqrt{2}$ and $6\\sqrt{2}$), so they can be added to get $11\\sqrt{2}$."}, {"text": "$7\\sqrt{3}$ and $2\\sqrt{27}$", "isCorrect": false, "rationale": "These can be combined. $2\\sqrt{27} = 2\\sqrt{9\\cdot 3} = 2\\cdot 3\\sqrt{3} = 6\\sqrt{3}$. Now both are like radicals ($7\\sqrt{3}$ and $6\\sqrt{3}$), so they can be added to get $13\\sqrt{3}$."}, {"text": "$4\\sqrt{5}$ and $3\\sqrt{10}$", "isCorrect": true, "rationale": "Neither $\\sqrt{5}$ nor $\\sqrt{10}$ can be simplified further to have the same radicand. $\\sqrt{10}$ contains factors of 2 and 5, neither of which is a perfect square. Therefore, they are not like radicals and cannot be combined by addition or subtraction."}, {"text": "$6\\sqrt{12}$ and $\\sqrt{3}$", "isCorrect": false, "rationale": "These can be combined. $6\\sqrt{12} = 6\\sqrt{4\\cdot 3} = 6\\cdot 2\\sqrt{3} = 12\\sqrt{3}$. Now both are like radicals ($12\\sqrt{3}$ and $\\sqrt{3}$), so they can be added to get $13\\sqrt{3}$."}]}, {"question": "Simplify the expression $(\\sqrt{3} + 1)(\\sqrt{3} - 2) + \\sqrt{3}$.", "options": [{"text": "$3 - \\sqrt{3}$", "isCorrect": false, "rationale": "This result might be obtained if the final $\\sqrt{3}$ term was subtracted instead of added, or if there was an error in the initial FOIL multiplication."}, {"text": "$1$", "isCorrect": true, "rationale": "First, multiply the binomials: $(\\sqrt{3} + 1)(\\sqrt{3} - 2) = (\\sqrt{3})^2 - 2\\sqrt{3} + 1\\sqrt{3} - 2 = 3 - \\sqrt{3} - 2 = 1 - \\sqrt{3}$. Now, add the remaining term: $(1 - \\sqrt{3}) + \\sqrt{3} = 1$."}, {"text": "$2\\sqrt{3} - 2$", "isCorrect": false, "rationale": "This might result from incorrect combination of terms or errors in the multiplication step (e.g., if $(1 - \\sqrt{3}) + \\sqrt{3}$ was incorrectly calculated)."}, {"text": "$\\sqrt{3} + 1$", "isCorrect": false, "rationale": "This result suggests an incomplete or incorrect simplification, possibly by not fully expanding the binomials or incorrectly combining the final terms."}]}, {"question": "To rationalize the denominator of an expression like $\\frac{1}{\\sqrt{7}}$, which method is most appropriate?", "options": [{"text": "Multiply the numerator and denominator by the conjugate ($1 - \\sqrt{7}$).", "isCorrect": false, "rationale": "Multiplying by the conjugate is used when the denominator is a binomial containing a radical (e.g., $1+\\sqrt{7}$), not for a single radical term."}, {"text": "Simplify the radical in the denominator by factoring.", "isCorrect": false, "rationale": "While simplification is a first step, $\\sqrt{7}$ cannot be simplified further by factoring. The goal here is to remove the radical from the denominator completely, which requires multiplication."}, {"text": "Multiply the numerator and denominator by $\\frac{\\sqrt{7}}{\\sqrt{7}}$.", "isCorrect": true, "rationale": "As per the 'Working with Radicals' key concept, to rationalize a single-term radical in the denominator, you multiply both the numerator and denominator by the radical itself (in this case, $\\frac{\\sqrt{7}}{\\sqrt{7}}$). This results in $\\frac{\\sqrt{7}}{7}$, which has no radical in the denominator."}, {"text": "Distribute the numerator across the terms in the denominator.", "isCorrect": false, "rationale": "There are no multiple terms in the denominator to distribute across, and this operation would not rationalize the denominator even if there were."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
