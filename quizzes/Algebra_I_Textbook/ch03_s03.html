<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a compound inequality?", "options": [{"text": "An inequality that contains a fraction or decimal.", "isCorrect": false, "rationale": "A compound inequality is defined by how many conditions it joins, not by the type of numbers it contains."}, {"text": "A sentence formed by joining two inequalities with the word and or the word or.", "isCorrect": true, "rationale": "This is the precise definition: a compound inequality joins two inequalities using and or or."}, {"text": "An inequality with a variable on both sides.", "isCorrect": false, "rationale": "Having a variable on both sides describes a type of single inequality, not a compound inequality."}, {"text": "Any inequality that requires more than two steps to solve.", "isCorrect": false, "rationale": "The number of solving steps is unrelated to whether an inequality is compound; the defining feature is the use of and or or."}], "id": "q01"}, {"question": "When is a compound inequality joined by and true?", "options": [{"text": "When at least one of the two parts is true.", "isCorrect": false, "rationale": "Requiring at least one part to be true is the rule for or compound inequalities, not and."}, {"text": "When neither part is true.", "isCorrect": false, "rationale": "If neither part is true the compound inequality is false; and requires both parts to be true."}, {"text": "When both parts are true simultaneously.", "isCorrect": true, "rationale": "An and compound inequality is true only when both inequalities are satisfied at the same time, giving the intersection of the two solution sets."}, {"text": "Only when the solution set contains exactly one value.", "isCorrect": false, "rationale": "The and rule is about both conditions being true simultaneously; it has nothing to do with the size of the solution set."}], "id": "q02"}, {"question": "What is the first step to solve -3 < 2x + 1 <= 7?", "options": [{"text": "Divide all three parts by 2.", "isCorrect": false, "rationale": "The +1 must be removed before dividing. The first step is subtracting 1 from all three parts."}, {"text": "Subtract 1 from all three parts.", "isCorrect": true, "rationale": "Subtracting 1 from -3, from 2x + 1, and from 7 isolates the 2x term: -4 < 2x <= 6."}, {"text": "Add 3 to all three parts.", "isCorrect": false, "rationale": "Adding 3 does not help isolate x. The constant attached to x is +1, so subtracting 1 is the correct first step."}, {"text": "Multiply all three parts by -1.", "isCorrect": false, "rationale": "Multiplying by -1 would reverse both inequality symbols. Subtracting 1 is the proper first step."}], "id": "q03"}, {"question": "What is the solution to -3 < 2x + 1 <= 7 in interval notation?", "options": [{"text": "[-2, 3]", "isCorrect": false, "rationale": "The left boundary -2 is not included because the original inequality on that side is strict (<), so a parenthesis is needed there, not a bracket."}, {"text": "(-2, 3]", "isCorrect": true, "rationale": "Subtracting 1 and dividing by 2 gives -2 < x <= 3. The parenthesis at -2 reflects the strict inequality; the bracket at 3 reflects the non-strict inequality."}, {"text": "(-2, 3)", "isCorrect": false, "rationale": "The right boundary 3 is included because the original inequality on that side is <= (non-strict), so a bracket is needed at 3."}, {"text": "[-2, 3)", "isCorrect": false, "rationale": "The bracket at -2 is wrong because the inequality on the left side is strict (<), so -2 is not part of the solution."}], "id": "q04"}, {"question": "For the compound inequality 3x + 2 < -4 or 2x - 1 > 5, what is the solution?", "options": [{"text": "x < -2 or x > 3", "isCorrect": true, "rationale": "From 3x + 2 < -4: 3x < -6 so x < -2. From 2x - 1 > 5: 2x > 6 so x > 3. The union is x < -2 or x > 3."}, {"text": "-2 < x < 3", "isCorrect": false, "rationale": "This is an intersection (the and result), not a union. The or solution accepts either condition."}, {"text": "x > -2 or x < 3", "isCorrect": false, "rationale": "The directions are reversed. Solving correctly gives x < -2 or x > 3."}, {"text": "x < 2 or x > -3", "isCorrect": false, "rationale": "The boundary numbers are incorrect. Solving each part correctly yields x < -2 or x > 3."}], "id": "q05"}, {"question": "What is the intersection of two sets A and B?", "options": [{"text": "The set of all elements that belong to either A or B (or both).", "isCorrect": false, "rationale": "That describes the union (A union B), not the intersection."}, {"text": "The set of elements that belong to both A and B.", "isCorrect": true, "rationale": "The intersection contains only the elements shared by both sets, corresponding to the and condition in compound inequalities."}, {"text": "The set of all elements that belong to A but not B.", "isCorrect": false, "rationale": "That describes the set difference A minus B, not the intersection."}, {"text": "The set of elements that belong to A or B, but not both.", "isCorrect": false, "rationale": "That describes the symmetric difference, not the intersection."}], "id": "q06"}, {"question": "Which compact notation correctly represents x > 1 and x <= 5?", "options": [{"text": "5 < x <= 1", "isCorrect": false, "rationale": "This notation is written in the wrong direction and describes an empty set (no number is both > 5 and <= 1)."}, {"text": "1 < x <= 5", "isCorrect": true, "rationale": "The compact notation 1 < x <= 5 captures both conditions: x must be greater than 1 (strict) and at most 5 (non-strict)."}, {"text": "1 <= x < 5", "isCorrect": false, "rationale": "This means x >= 1 and x < 5, but the original conditions are x > 1 (strict at 1) and x <= 5 (non-strict at 5)."}, {"text": "1 < x < 5", "isCorrect": false, "rationale": "This excludes 5, but x <= 5 means 5 should be included, so a <= is needed at the right end."}], "id": "q07"}, {"question": "What is the solution to the compound inequality x > 4 and x < 1?", "options": [{"text": "1 < x < 4", "isCorrect": false, "rationale": "That represents x > 1 and x < 4. The given conditions x > 4 AND x < 1 cannot be satisfied simultaneously."}, {"text": "x < 1 or x > 4", "isCorrect": false, "rationale": "That is the union (the or condition), not the and condition, which requires both to hold at once."}, {"text": "No solution (empty set).", "isCorrect": true, "rationale": "No real number can be simultaneously greater than 4 and less than 1. The conditions have no overlap, so the solution set is empty."}, {"text": "All real numbers.", "isCorrect": false, "rationale": "The and condition here has no overlap at all, so the solution is the empty set, not all real numbers."}], "id": "q08"}, {"question": "Solve -1 <= 3x + 2 < 14. What is the solution in interval notation?", "options": [{"text": "(-1, 4)", "isCorrect": false, "rationale": "The left boundary -1 is included (<=), so a bracket is needed there; the correct interval is [-1, 4)."}, {"text": "[-1, 4)", "isCorrect": true, "rationale": "Subtracting 2 from all parts: -3 <= 3x < 12; dividing by 3: -1 <= x < 4. The bracket at -1 (included) and parenthesis at 4 (excluded) give [-1, 4)."}, {"text": "[-1, 4]", "isCorrect": false, "rationale": "The bracket at 4 would include 4, but the original right inequality is strict (<), so 4 must be excluded."}, {"text": "(-3, 4)", "isCorrect": false, "rationale": "After dividing by 3, the left boundary is -1, not -3."}], "id": "q09"}, {"question": "Which statement best describes the graphical difference between an and compound inequality and an or compound inequality on a number line?", "options": [{"text": "And solutions always form two separate rays; or solutions always form one connected segment.", "isCorrect": false, "rationale": "These descriptions are reversed. And (intersection) typically produces a bounded segment, while or (union) can produce two separate rays."}, {"text": "And solutions form the overlap (intersection) of the two individual solution sets; or solutions form the combined (union) set.", "isCorrect": true, "rationale": "An and inequality requires both conditions at once, giving the overlapping region. An or inequality accepts either condition, giving the combined region."}, {"text": "Both and and or always produce solutions covering the entire number line.", "isCorrect": false, "rationale": "Neither type always covers the entire number line; the solution depends on the specific conditions given."}, {"text": "And and or always produce the same solution set because both involve two inequalities.", "isCorrect": false, "rationale": "The solution sets are generally different: and requires overlap while or requires union."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
