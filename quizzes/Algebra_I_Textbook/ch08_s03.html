<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "During the derivation of the Quadratic Formula, what is the specific term added to both sides of the equation $x^2 + \\frac{b}{a}x = -\\frac{c}{a}$ to complete the square?", "options": [{"text": "$\\frac{b^2}{4a^2}$", "isCorrect": true, "rationale": "Completing the square requires adding the square of half the linear coefficient, which is $(\\frac{1}{2} \\cdot \\frac{b}{a})^2$."}, {"text": "$\\frac{b^2}{2a^2}$", "isCorrect": false, "rationale": "This error occurs if one forgets to square the denominator 2 during the squaring process."}, {"text": "$\\frac{b}{2a}$", "isCorrect": false, "rationale": "This is the term to be squared, but the square must be added to both sides to maintain equality and complete the trinomial."}, {"text": "$\\frac{b^2}{a^2}$", "isCorrect": false, "rationale": "This ignores the requirement to take half of the linear coefficient before squaring it."}]}, {"question": "When solving the quadratic equation $5 - 3x + 2x^2 = 0$ using the Quadratic Formula, what are the correct values for $a$, $b$, and $c$?", "options": [{"text": "$a = 5$, $b = -3$, $c = 2$", "isCorrect": false, "rationale": "This incorrectly assigns values based on the order they appear rather than their association with the $x^2$, $x$, and constant terms."}, {"text": "$a = 2$, $b = -3$, $c = 5$", "isCorrect": true, "rationale": "The standard form $ax^2 + bx + c = 0$ dictates that $a$ is the coefficient of the squared term, $b$ the linear term, and $c$ the constant."}, {"text": "$a = 2$, $b = 3$, $c = 5$", "isCorrect": false, "rationale": "This fails to account for the negative sign attached to the linear term coefficient."}, {"text": "$a = 1$, $b = -3$, $c = 5$", "isCorrect": false, "rationale": "This incorrectly assumes the leading coefficient is 1 despite a 2 being present with the $x^2$ term."}]}, {"question": "Solve $x^2 - 6x + 7 = 0$ using the Quadratic Formula and simplify the result.", "options": [{"text": "$x = 3 \\pm \\sqrt{2}$", "isCorrect": true, "rationale": "Applying the formula gives $x = \\frac{6 \\pm \\sqrt{36 - 28}}{2}$, which simplifies to $\\frac{6 \\pm \\sqrt{8}}{2}$ and then to $3 \\pm \\sqrt{2}$."}, {"text": "$x = 6 \\pm \\sqrt{8}$", "isCorrect": false, "rationale": "This result fails to divide the entire numerator by the denominator $2a$."}, {"text": "$x = 3 \\pm \\sqrt{8}$", "isCorrect": false, "rationale": "This error occurs when only the first term of the numerator is divided by the denominator."}, {"text": "$x = -3 \\pm \\sqrt{2}$", "isCorrect": false, "rationale": "This suggests an error in the sign of $-b$, where the negative of $-6$ should be positive $6$."}]}, {"question": "Based on the source material, which solving method is most appropriate for a quadratic equation that has no linear term ($b = 0$)?", "options": [{"text": "Factoring over the integers", "isCorrect": false, "rationale": "While possible, this method is specifically noted for when expressions factor neatly, not specifically for missing linear terms."}, {"text": "The Square Root Property", "isCorrect": true, "rationale": "The text explicitly states that the Square Root Property works best when there is no linear term."}, {"text": "Vertex Form conversion", "isCorrect": false, "rationale": "The material mentions vertex form as a topic for future study in Algebra II rather than a primary solving method for this case."}, {"text": "The Quadratic Formula", "isCorrect": false, "rationale": "Although it works for every equation, it is often more complex than the Square Root Property for equations where $b = 0$."}]}, {"question": "To solve the equation $4x^2 = 2x + 1$ using the Quadratic Formula, what must be the first step according to the procedure for applying the formula?", "options": [{"text": "Divide every term by 4 to isolate $x^2$.", "isCorrect": false, "rationale": "While useful for completing the square, the Quadratic Formula procedure begins with identifying coefficients from standard form."}, {"text": "Rewrite the equation as $4x^2 - 2x - 1 = 0$.", "isCorrect": true, "rationale": "Coefficients $a$, $b$, and $c$ must be identified from the standard form $ax^2 + bx + c = 0$ before substitution."}, {"text": "Identify $a=4$, $b=2$, and $c=1$.", "isCorrect": false, "rationale": "This is incorrect because $b$ and $c$ must be identified after the equation is set to zero, changing their signs."}, {"text": "Apply the Square Root Property to $4x^2$.", "isCorrect": false, "rationale": "The Square Root Property cannot be directly applied here because of the linear term $2x$."}]}, {"question": "Evaluate the denominator of the Quadratic Formula if the equation being solved is $\\frac{1}{2}x^2 + 5x - 3 = 0$.", "options": [{"text": "$1$", "isCorrect": true, "rationale": "The denominator is $2a$, so $2 \\cdot (1/2) = 1$."}, {"text": "$2$", "isCorrect": false, "rationale": "This assumes $a=1$, which is a common mistake when a fraction is present."}, {"text": "$\\frac{1}{2}$", "isCorrect": false, "rationale": "This is the value of $a$, not $2a$ as required by the formula."}, {"text": "$4$", "isCorrect": false, "rationale": "This might result from mistakenly squaring the denominator $2$ or doubling a different coefficient."}]}, {"question": "Solve $3x^2 - 2x - 1 = 0$ using the Quadratic Formula and identify the two solutions.", "options": [{"text": "$x = 1$ and $x = -\\frac{1}{3}$", "isCorrect": true, "rationale": "Substituting into the formula gives $x = \\frac{2 \\pm \\sqrt{4 - 4(3)(-1)}}{6} = \\frac{2 \\pm \\sqrt{16}}{6}$, leading to $\\frac{2+4}{6}=1$ and $\\frac{2-4}{6}=-\\frac{1}{3}$."}, {"text": "$x = \\frac{2 \\pm \\sqrt{10}}{6}$", "isCorrect": false, "rationale": "This error involves adding the terms inside the radical ($4 + 6$) rather than correctly multiplying $-4(3)(-1)$."}, {"text": "$x = -1$ and $x = \\frac{1}{3}$", "isCorrect": false, "rationale": "This occurs if the sign of $-b$ is handled incorrectly, treating it as $-2$ instead of $+2$."}, {"text": "$x = 1$ and $x = -1$", "isCorrect": false, "rationale": "This is a common guess that does not follow from the calculated values of the formula for this specific equation."}]}, {"question": "In the derivation of the Quadratic Formula, which property allows for the transition from $(x + \\frac{b}{2a})^2 = \\frac{b^2 - 4ac}{4a^2}$ to $x + \\frac{b}{2a} = \\frac{\\pm \\sqrt{b^2 - 4ac}}{2a}$?", "options": [{"text": "The Square Root Property", "isCorrect": true, "rationale": "The Square Root Property allows taking the square root of both sides of an equation to solve for the squared term."}, {"text": "The Distributive Property", "isCorrect": false, "rationale": "The distributive property involves multiplication over addition, not taking square roots."}, {"text": "Completing the Square", "isCorrect": false, "rationale": "Completing the square is the process that leads to the squared binomial, but the Square Root Property is what removes the square."}, {"text": "The Zero Product Property", "isCorrect": false, "rationale": "The Zero Product Property is used for factored equations set to zero, not for equations with a squared term on one side."}]}, {"question": "What is the primary reason the Quadratic Formula is used instead of factoring?", "options": [{"text": "The Quadratic Formula is always faster to calculate.", "isCorrect": false, "rationale": "Factoring is often much faster if the expression is easily recognizable; the formula is more labor-intensive."}, {"text": "Factoring only works if the expression factors neatly over the integers.", "isCorrect": true, "rationale": "As the text states, many quadratic equations cannot be solved easily by factoring, but the formula works for all."}, {"text": "The Quadratic Formula avoids the use of square roots.", "isCorrect": false, "rationale": "The Quadratic Formula fundamentally relies on a square root to solve for $x$."}, {"text": "Factoring is only used in Algebra II, while the formula is used in Algebra I.", "isCorrect": false, "rationale": "Both methods are standard tools used throughout various levels of algebra."}]}, {"question": "Simplify the solutions for $x^2 + 2x - 4 = 0$.", "options": [{"text": "$x = -1 \\pm \\sqrt{5}$", "isCorrect": true, "rationale": "The formula yields $x = \\frac{-2 \\pm \\sqrt{4 - 4(1)(-4)}}{2} = \\frac{-2 \\pm \\sqrt{20}}{2}$, which simplifies to $\\frac{-2 \\pm 2\\sqrt{5}}{2} = -1 \\pm \\sqrt{5}$."}, {"text": "$x = -2 \\pm \\sqrt{20}$", "isCorrect": false, "rationale": "This forgets to divide the entire expression by the denominator $2a$."}, {"text": "$x = -1 \\pm \\sqrt{20}$", "isCorrect": false, "rationale": "This only divides the first term of the numerator by the denominator, leaving the radical unsimplified."}, {"text": "$x = 1 \\pm \\sqrt{5}$", "isCorrect": false, "rationale": "This indicates a sign error in the $-b$ term of the formula."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
