    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the pattern for the square of a binomial sum (a + b)^2?", "options": [{"text": "a^2 + b^2", "isCorrect": false, "rationale": "This is the most common error with squaring a binomial sum. The middle term 2ab is missing. (a + b)^2 = a^2 + 2ab + b^2."}, {"text": "a^2 - 2ab + b^2", "isCorrect": false, "rationale": "That is the pattern for (a - b)^2. The sum (a + b)^2 produces a positive middle term: a^2 + 2ab + b^2."}, {"text": "a^2 + 2ab + b^2", "isCorrect": true, "rationale": "Squaring (a + b) using FOIL: (a + b)(a + b) = a^2 + ab + ab + b^2 = a^2 + 2ab + b^2."}, {"text": "2a^2 + 2ab + 2b^2", "isCorrect": false, "rationale": "There is no factor of 2 on the squared terms. The correct expansion is a^2 + 2ab + b^2."}], "id": "q01"}, {"question": "Expand (3x + 4)^2.", "options": [{"text": "9x^2 + 16", "isCorrect": false, "rationale": "The middle term 2(3x)(4) = 24x is missing. (3x + 4)^2 = (3x)^2 + 2(3x)(4) + 4^2 = 9x^2 + 24x + 16."}, {"text": "9x^2 + 12x + 16", "isCorrect": false, "rationale": "The middle term is wrong. 2(3x)(4) = 24x, not 12x. The correct expansion is 9x^2 + 24x + 16."}, {"text": "9x^2 + 24x + 16", "isCorrect": true, "rationale": "Using (a + b)^2 = a^2 + 2ab + b^2 with a = 3x, b = 4: (3x)^2 + 2(3x)(4) + 4^2 = 9x^2 + 24x + 16."}, {"text": "9x^2 - 24x + 16", "isCorrect": false, "rationale": "The middle term should be positive because this is a sum binomial squared. The negative middle term applies to (a - b)^2."}], "id": "q02"}, {"question": "What is the pattern for the square of a binomial difference (a - b)^2?", "options": [{"text": "a^2 + 2ab + b^2", "isCorrect": false, "rationale": "That is the pattern for (a + b)^2. When the binomial is a difference, the middle term is -2ab: (a - b)^2 = a^2 - 2ab + b^2."}, {"text": "a^2 - b^2", "isCorrect": false, "rationale": "That is the Difference of Squares pattern (a + b)(a - b). The square (a - b)^2 has three terms: a^2 - 2ab + b^2."}, {"text": "a^2 - 2ab + b^2", "isCorrect": true, "rationale": "The square of a binomial difference: (a - b)^2 = (a - b)(a - b) = a^2 - ab - ab + b^2 = a^2 - 2ab + b^2."}, {"text": "a^2 + b^2", "isCorrect": false, "rationale": "This omits the middle term. (a - b)^2 = a^2 - 2ab + b^2, not just a^2 + b^2."}], "id": "q03"}, {"question": "Expand (2x - 7)^2.", "options": [{"text": "4x^2 + 28x + 49", "isCorrect": false, "rationale": "The sign of the middle term is wrong. For (a - b)^2 the middle term is -2ab = -2(2x)(7) = -28x."}, {"text": "4x^2 - 14x + 49", "isCorrect": false, "rationale": "The middle term is wrong. -2(2x)(7) = -28x, not -14x."}, {"text": "4x^2 - 28x + 49", "isCorrect": true, "rationale": "Using (a - b)^2 = a^2 - 2ab + b^2 with a = 2x, b = 7: (2x)^2 - 2(2x)(7) + 7^2 = 4x^2 - 28x + 49."}, {"text": "4x^2 - 28x - 49", "isCorrect": false, "rationale": "The last term should be +b^2 = 7^2 = +49, not -49. The pattern for (a - b)^2 ends with a positive b^2."}], "id": "q04"}, {"question": "What is the Difference of Squares pattern?", "options": [{"text": "(a + b)(a + b) = a^2 + 2ab + b^2", "isCorrect": false, "rationale": "That is the perfect square trinomial pattern for (a + b)^2. The Difference of Squares involves (a + b)(a - b)."}, {"text": "(a + b)(a - b) = a^2 - b^2", "isCorrect": true, "rationale": "The product of a sum and a difference of the same two terms equals the difference of their squares. The middle terms cancel: ab - ab = 0."}, {"text": "(a - b)(a - b) = a^2 - b^2", "isCorrect": false, "rationale": "That is (a - b)^2 = a^2 - 2ab + b^2. The Difference of Squares specifically requires one sum and one difference: (a + b)(a - b)."}, {"text": "(a + b)(a - b) = a^2 + b^2", "isCorrect": false, "rationale": "The middle terms cancel: (a + b)(a - b) = a^2 - ab + ab - b^2 = a^2 - b^2. The result has a minus sign, not a plus."}], "id": "q05"}, {"question": "Multiply (x + 6)(x - 6).", "options": [{"text": "x^2 + 36", "isCorrect": false, "rationale": "This is the common error of forgetting the minus sign. Using Difference of Squares: (x + 6)(x - 6) = x^2 - 6^2 = x^2 - 36."}, {"text": "x^2 - 12x - 36", "isCorrect": false, "rationale": "The middle terms cancel in (a + b)(a - b), so there is no -12x term. The result is simply x^2 - 36."}, {"text": "x^2 - 36", "isCorrect": true, "rationale": "Applying the Difference of Squares pattern: (x + 6)(x - 6) = x^2 - 6^2 = x^2 - 36."}, {"text": "x^2 + 12x - 36", "isCorrect": false, "rationale": "The Outer and Inner terms cancel in this special product: +6x - 6x = 0. There is no middle term."}], "id": "q06"}, {"question": "Multiply (3n + 5)(3n - 5).", "options": [{"text": "9n^2 - 25", "isCorrect": true, "rationale": "Difference of Squares: (3n)^2 - 5^2 = 9n^2 - 25."}, {"text": "9n^2 + 25", "isCorrect": false, "rationale": "The Difference of Squares pattern gives a minus sign: (3n + 5)(3n - 5) = 9n^2 - 25, not 9n^2 + 25."}, {"text": "9n^2 - 30n - 25", "isCorrect": false, "rationale": "The middle terms cancel in the Difference of Squares pattern. The result is 9n^2 - 25 with no middle term."}, {"text": "3n^2 - 25", "isCorrect": false, "rationale": "(3n)^2 = 9n^2, not 3n^2. The first term must be squared: 3^2 * n^2 = 9n^2."}], "id": "q07"}, {"question": "Why does (a + b)^2 not equal a^2 + b^2?", "options": [{"text": "Because squaring distributes over subtraction but not over addition.", "isCorrect": false, "rationale": "Squaring does not distribute over either addition or subtraction. Both (a + b)^2 and (a - b)^2 produce three-term trinomials."}, {"text": "Because the FOIL method produces a middle term 2ab that must be included.", "isCorrect": true, "rationale": "Expanding (a + b)(a + b) via FOIL gives a^2 + ab + ab + b^2 = a^2 + 2ab + b^2. The middle term 2ab is not zero and cannot be dropped."}, {"text": "Because a and b must always be positive.", "isCorrect": false, "rationale": "The values of a and b can be any real numbers. The issue is the missing middle term 2ab, not the signs of a and b."}, {"text": "Because (a + b)^2 produces four terms, not two.", "isCorrect": false, "rationale": "(a + b)^2 produces three terms after combining like terms, not four. The reason a^2 + b^2 is wrong is the missing middle term 2ab."}], "id": "q08"}, {"question": "Multiply (5x + 3)(5x - 3).", "options": [{"text": "25x^2 + 9", "isCorrect": false, "rationale": "The Difference of Squares pattern gives a minus sign: (5x + 3)(5x - 3) = (5x)^2 - 3^2 = 25x^2 - 9."}, {"text": "25x^2 - 30x - 9", "isCorrect": false, "rationale": "The middle terms cancel in this special product pattern. The result is 25x^2 - 9 with no middle term."}, {"text": "25x^2 - 9", "isCorrect": true, "rationale": "Difference of Squares: (5x + 3)(5x - 3) = (5x)^2 - 3^2 = 25x^2 - 9."}, {"text": "5x^2 - 9", "isCorrect": false, "rationale": "(5x)^2 = 25x^2, not 5x^2. The coefficient 5 must also be squared: 5^2 = 25."}], "id": "q09"}, {"question": "Which of the following describes the connection between special product patterns and factoring in Chapter 7?", "options": [{"text": "Special product patterns are used only for multiplication and cannot be reversed.", "isCorrect": false, "rationale": "Special product patterns can be read in reverse for factoring. For example, recognizing a^2 - b^2 as a Difference of Squares allows it to be factored as (a + b)(a - b)."}, {"text": "The special product patterns can be used in reverse to factor polynomials such as perfect square trinomials and differences of squares.", "isCorrect": true, "rationale": "In Chapter 7, these patterns are applied in reverse: a^2 + 2ab + b^2 is factored as (a + b)^2, and a^2 - b^2 is factored as (a + b)(a - b)."}, {"text": "Factoring in Chapter 7 uses different formulas that are unrelated to special products.", "isCorrect": false, "rationale": "Factoring special polynomials uses the exact same patterns in reverse. Recognizing perfect square trinomials and differences of squares is a core factoring skill."}, {"text": "Special products only apply to binomials with integer coefficients.", "isCorrect": false, "rationale": "Special product patterns apply to any binomials a and b, regardless of whether the coefficients are integers, fractions, or other real numbers."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
