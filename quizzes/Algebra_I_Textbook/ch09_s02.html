        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 9, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the fundamental first step when performing any operation (multiplication, division, addition, or subtraction) with rational expressions?", "options": [{"text": "Combine numerators or denominators as appropriate for the operation.", "isCorrect": false, "rationale": "Combining is a later step, usually after factoring and simplifying, or after finding a common denominator for addition/subtraction. It is not the very first step for *all* operations."}, {"text": "Find a common denominator.", "isCorrect": false, "rationale": "Finding a common denominator is specific to addition and subtraction with unlike denominators. It is not the first step for multiplication or division."}, {"text": "Factor all numerators and denominators completely.", "isCorrect": true, "rationale": "As stated in the text, 'The key idea is the same: factor first, then simplify.' This applies to all four operations as it reveals common factors for simplification and helps in finding LCDs."}, {"text": "Multiply by the reciprocal of the divisor.", "isCorrect": false, "rationale": "Multiplying by the reciprocal is a specific step for division, used to convert it into a multiplication problem. It is not the general first step for all operations."}], "id": "q01"}, {"question": "Multiply the following rational expressions and simplify: (2x + 4)/(x^2 - 1) * (x - 1)/(x + 2).", "options": [{"text": "2/(x + 1)", "isCorrect": true, "rationale": "First, factor all numerators and denominators: (2(x+2))/((x-1)(x+1)) * (x-1)/(x+2). Then, divide out common factors (x+2) and (x-1). The remaining expression is 2/(x+1)."}, {"text": "(2(x + 2)(x - 1))/((x - 1)(x + 1)(x + 2))", "isCorrect": false, "rationale": "This represents the factored form before simplification. The problem asks to multiply and simplify, meaning common factors should be divided out."}, {"text": "2(x + 2)/(x^2 + x - 2)", "isCorrect": false, "rationale": "This option results from incorrect factoring or failure to simplify common factors from both the numerator and denominator after multiplication."}, {"text": "1/(x + 1)", "isCorrect": false, "rationale": "This would be the result if the factor of 2 in the first numerator was omitted or incorrectly simplified."}], "id": "q02"}, {"question": "Simplify the following rational expression: (x^2 - 9)/(x + 1) ÷ (x - 3)/(x^2 + 2x + 1).", "options": [{"text": "(x + 3)(x + 1)", "isCorrect": true, "rationale": "To divide, multiply by the reciprocal of the divisor: (x^2 - 9)/(x + 1) * (x^2 + 2x + 1)/(x - 3). Factor everything: ((x - 3)(x + 3))/(x + 1) * ((x + 1)^2)/(x - 3). Divide out common factors (x - 3) and (x + 1). The result is (x + 3)(x + 1)."}, {"text": "(x^2 - 9)(x^2 + 2x + 1) / ((x + 1)(x - 3))", "isCorrect": false, "rationale": "This shows the step of multiplying by the reciprocal, but without factoring and simplifying the common terms, which is crucial for full simplification."}, {"text": "(x - 3)(x + 1)", "isCorrect": false, "rationale": "This would be incorrect as it loses the (x+3) factor from the original x^2-9 and incorrectly assumes another (x-3) in the numerator."}, {"text": "(x + 3)(x - 3)^2 / (x + 1)^2", "isCorrect": false, "rationale": "This shows an incorrect simplification or factoring step, not correctly canceling the common factors."}], "id": "q03"}, {"question": "Subtract the following rational expressions: (5x - 1)/(x - 2) - (x + 7)/(x - 2).", "options": [{"text": "(4x - 8)/(x - 2)", "isCorrect": false, "rationale": "This is the correct result of subtracting the numerators, but the expression can be simplified further by factoring the numerator."}, {"text": "4x - 8", "isCorrect": false, "rationale": "This option is incorrect because the denominator (x-2) cannot be entirely removed unless it cancels out with a factor in the numerator, which it does when factored, but the expression simplifies to a constant, not 4x-8."}, {"text": "4", "isCorrect": true, "rationale": "Since the denominators are the same, subtract the numerators: (5x - 1 - (x + 7))/(x - 2) = (5x - 1 - x - 7)/(x - 2) = (4x - 8)/(x - 2). Factor the numerator: 4(x - 2)/(x - 2). Divide out the common factor (x - 2) to get 4."}, {"text": "(6x + 6)/(x - 2)", "isCorrect": false, "rationale": "This result would occur if the two numerators were added instead of subtracted, or if the subtraction was applied incorrectly."}], "id": "q04"}, {"question": "What is the least common denominator (LCD) for the rational expressions (2x)/(x^2 - 4) and (x + 1)/(x^2 + x - 2)?", "options": [{"text": "(x - 2)(x + 2)", "isCorrect": false, "rationale": "This LCD only covers the factors from x^2 - 4. It does not include the (x-1) factor from the second denominator."}, {"text": "(x - 2)(x + 2)(x + 2)", "isCorrect": false, "rationale": "This option incorrectly duplicates the (x+2) factor beyond its highest power in any single denominator, and also misses the (x-1) factor."}, {"text": "(x - 2)(x + 2)(x - 1)", "isCorrect": true, "rationale": "First, factor each denominator: x^2 - 4 = (x - 2)(x + 2) and x^2 + x - 2 = (x + 2)(x - 1). The distinct factors are (x - 2), (x + 2), and (x - 1). Each appears with a highest power of 1. Therefore, the LCD is (x - 2)(x + 2)(x - 1)."}, {"text": "(x^2 - 4)(x^2 + x - 2)", "isCorrect": false, "rationale": "This is the product of the original denominators, not the least common denominator. It includes redundant factors."}], "id": "q05"}, {"question": "Add the following rational expressions: 1/x + 2/(x + 1).", "options": [{"text": "(3x + 1)/(x(x + 1))", "isCorrect": true, "rationale": "The LCD is x(x + 1). Rewrite each fraction with the LCD: 1/x = (x + 1)/(x(x + 1)) and 2/(x + 1) = 2x/(x(x + 1)). Add the numerators: (x + 1 + 2x)/(x(x + 1)) = (3x + 1)/(x(x + 1))."}, {"text": "3x/(x(x + 1))", "isCorrect": false, "rationale": "This option incorrectly simplifies the numerator, possibly by dropping the '+1' term after combining."}, {"text": "(2x + 1)/(x + 1)", "isCorrect": false, "rationale": "This option seems to have incorrectly combined the numerators and denominators without properly using the LCD."}, {"text": "(1 + 2x)/(x + 1)", "isCorrect": false, "rationale": "This option is missing the x factor in the denominator and suggests an incorrect combination of terms."}], "id": "q06"}, {"question": "When simplifying the expression (x^2 - 9)/(x - 3) * (x + 2)/(x + 1), which values of x must be excluded from the domain *before* simplification, and why?", "options": [{"text": "x = 3 and x = -1, because these values would make a denominator zero in the original expressions.", "isCorrect": true, "rationale": "The domain of a rational expression is restricted by any value of the variable that makes any denominator zero in the *original* expression. Here, x - 3 = 0 implies x = 3, and x + 1 = 0 implies x = -1. These are the restrictions regardless of whether factors cancel out later."}, {"text": "x = 3, because it makes the first denominator zero.", "isCorrect": false, "rationale": "While x=3 is a restriction, x=-1 is also a restriction from the second denominator. Both must be excluded."}, {"text": "x = -3, because it would make the numerator zero.", "isCorrect": false, "rationale": "Values that make only the numerator zero do not restrict the domain of a rational expression. They are simply roots of the numerator."}, {"text": "x = 3, x = -1, and x = -2, because x + 2 could be zero.", "isCorrect": false, "rationale": "x = -2 is not a restriction for the *original* expression because (x+2) is in a numerator. Only denominators dictate domain restrictions."}], "id": "q07"}, {"question": "Why is 'factor all numerators and denominators completely' the critical first step for *all* operations with rational expressions?", "options": [{"text": "It ensures that the expressions are in their most complex form before combining.", "isCorrect": false, "rationale": "Factoring aims to reveal simpler components, not to increase complexity. Its purpose is to prepare for simplification."}, {"text": "It allows for the identification and division of common factors, which simplifies the expression.", "isCorrect": true, "rationale": "Factoring reveals the individual components of the polynomials, making it possible to identify factors common to both numerator and denominator that can be 'divided out' (canceled), leading to a simpler, equivalent expression. This is key for all operations."}, {"text": "It directly leads to finding the least common multiple of the numerators.", "isCorrect": false, "rationale": "Factoring helps find the least common *denominator* (LCD), which is relevant for addition and subtraction, not the least common multiple of numerators."}, {"text": "It is only necessary for addition and subtraction, not multiplication or division.", "isCorrect": false, "rationale": "The text explicitly states that 'factor first, then simplify' is the 'key idea' for *all* four arithmetic operations, including multiplication and division."}], "id": "q08"}, {"question": "The rule for dividing rational expressions states that you must multiply by the reciprocal of the divisor. How does this rule essentially transform a division problem?", "options": [{"text": "It converts it into an addition problem with unlike denominators.", "isCorrect": false, "rationale": "Multiplying by the reciprocal converts division into a multiplication problem, not an addition problem."}, {"text": "It allows the problem to be solved using the same simplification steps as multiplication of rational expressions.", "isCorrect": true, "rationale": "By converting division to multiplication, all the subsequent steps — factoring, dividing out common factors, and multiplying remaining factors — are identical to those used for multiplication, streamlining the process."}, {"text": "It reduces the number of terms, making the expression simpler to factor.", "isCorrect": false, "rationale": "While simplifying is the goal, merely taking the reciprocal does not inherently reduce the number of terms; it changes the operation."}, {"text": "It ensures that all denominators become identical, eliminating the need for an LCD.", "isCorrect": false, "rationale": "Multiplying by the reciprocal does not guarantee identical denominators, nor does it eliminate the need for an LCD if the problem was an addition/subtraction, but this rule applies to division."}], "id": "q09"}, {"question": "Determine the LCD for the expressions 7/((x + 2)^2) and 3/(x^2 - 4).", "options": [{"text": "(x + 2)^2 (x - 2)", "isCorrect": true, "rationale": "First, factor each denominator completely: (x + 2)^2 is already factored. x^2 - 4 factors to (x - 2)(x + 2). The distinct factors are (x + 2) and (x - 2). The highest power of (x + 2) is 2 (from the first denominator), and the highest power of (x - 2) is 1 (from the second denominator). The LCD is the product of these: (x + 2)^2 (x - 2)."}, {"text": "(x + 2)^2 (x - 2)^2", "isCorrect": false, "rationale": "This option incorrectly raises the (x - 2) factor to the power of 2; its highest power in any denominator is 1."}, {"text": "(x + 2)(x - 2)", "isCorrect": false, "rationale": "This LCD does not account for the highest power of (x + 2), which is 2, missing a factor of (x + 2)."}, {"text": "(x + 2)^2 (x^2 - 4)", "isCorrect": false, "rationale": "This option includes the unfactored form of the second denominator, which would result in redundant factors."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
