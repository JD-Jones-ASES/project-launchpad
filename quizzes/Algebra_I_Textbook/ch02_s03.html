    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    };

<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Solve $7n + 4 = 3n + 20$.", "options": [{"text": "n = 6", "isCorrect": false, "rationale": "Subtracting 3n from both sides gives $4n + 4 = 20$. Subtracting 4 from both sides gives $4n = 16$. Dividing by 4 gives $n = 4$, not 6."}, {"text": "n = 4", "isCorrect": true, "rationale": "To solve, first subtract $3n$ from both sides: $7n - 3n + 4 = 3n - 3n + 20$, which simplifies to $4n + 4 = 20$. Next, subtract 4 from both sides: $4n + 4 - 4 = 20 - 4$, which simplifies to $4n = 16$. Finally, divide both sides by 4: $n = 16 / 4$, so $n = 4$."}, {"text": "n = -4", "isCorrect": false, "rationale": "Subtracting 3n from both sides gives $4n + 4 = 20$. Subtracting 4 from both sides gives $4n = 16$. Dividing by 4 gives $n = 4$, not -4."}, {"text": "n = -6", "isCorrect": false, "rationale": "This result typically comes from sign errors or incorrect operations during the solving process. The correct solution is $n = 4$."}], "id": "q01"}, {"question": "According to the text, what is the initial strategy when solving an equation with variables on both sides?", "options": [{"text": "Add all terms together.", "isCorrect": false, "rationale": "Adding all terms together is not a standard or effective first step for solving equations with variables on both sides, as it would combine unlike terms and not isolate the variable."}, {"text": "Distribute any numbers outside parentheses.", "isCorrect": false, "rationale": "While distribution might be a necessary step if parentheses are present, the general initial strategy stated for equations with variables on both sides is to collect terms. The example of distributing 2 is shown in an identity example, not as the primary first step for 'variables on both sides' generally."}, {"text": "Collect all variable terms on one side and all constant terms on the other.", "isCorrect": true, "rationale": "The text explicitly states: 'When both sides contain variable terms, you need to collect all variable terms on one side and all constant terms on the other.'"}, {"text": "Check the solution by substituting a random value.", "isCorrect": false, "rationale": "Checking a solution is done *after* solving the equation, not as an initial step to solve it."}], "id": "q02"}, {"question": "Which of the following equations, if solved, would be classified as an identity?", "options": [{"text": "$3x + 5 = 3x - 5$", "isCorrect": false, "rationale": "Subtracting $3x$ from both sides results in $5 = -5$, which is an always false statement. This indicates a contradiction, not an identity."}, {"text": "$2(x + 4) = 2x + 8$", "isCorrect": true, "rationale": "Distributing the 2 on the left side gives $2x + 8 = 2x + 8$. Subtracting $2x$ from both sides results in $8 = 8$, an always true statement. According to the text, this means the equation is an identity, true for every value of the variable."}, {"text": "$5x - 1 = 4x + 2$", "isCorrect": false, "rationale": "Subtracting $4x$ from both sides gives $x - 1 = 2$. Adding 1 to both sides gives $x = 3$. This is a conditional equation with a single solution, not an identity."}, {"text": "$y + 7 = y$", "isCorrect": false, "rationale": "Subtracting $y$ from both sides results in $7 = 0$, which is an always false statement. This indicates a contradiction, not an identity."}], "id": "q03"}, {"question": "A conditional equation is best described as an equation that:", "options": [{"text": "Is always true, regardless of the variable's value.", "isCorrect": false, "rationale": "This describes an identity, not a conditional equation. Identities are true for every value of the variable."}, {"text": "Is true for no value of the variable.", "isCorrect": false, "rationale": "This describes a contradiction, not a conditional equation. Contradictions are never true for any value of the variable."}, {"text": "Is true for only certain values of the variable.", "isCorrect": true, "rationale": "The text defines a conditional equation as 'an equation that is true for only certain values of the variable.' This typically results in a single solution, like $x=3$."}, {"text": "Requires a calculator to solve.", "isCorrect": false, "rationale": "The method of solving an equation does not define its type. Many conditional equations can be solved without a calculator."}], "id": "q04"}, {"question": "Solve the equation $4x + 7 = 4x - 3$ and classify it.", "options": [{"text": "$x = 10$, Conditional equation.", "isCorrect": false, "rationale": "Subtracting $4x$ from both sides results in $7 = -3$, not $x = 10$. Therefore, it is not a conditional equation with this solution."}, {"text": "No solution, Contradiction.", "isCorrect": true, "rationale": "Subtracting $4x$ from both sides of the equation $4x + 7 = 4x - 3$ yields $7 = -3$. This statement is always false. According to the text, an equation that results in an always false statement is a contradiction and has no solution."}, {"text": "All real numbers, Identity.", "isCorrect": false, "rationale": "An identity results in an always true statement (e.g., $0=0$), not an always false one like $7 = -3$. This equation has no solution, not all real numbers."}, {"text": "$x = -10$, Conditional equation.", "isCorrect": false, "rationale": "Subtracting $4x$ from both sides results in $7 = -3$, not $x = -10$. Therefore, it is not a conditional equation with this solution."}], "id": "q05"}, {"question": "If, during the process of solving an equation, you obtain the statement $5 = -2$, what type of equation are you solving?", "options": [{"text": "An identity.", "isCorrect": false, "rationale": "An identity results in a statement that is always true, such as $0 = 0$ or $5 = 5$, not a false statement like $5 = -2$."}, {"text": "A conditional equation.", "isCorrect": false, "rationale": "A conditional equation results in a single value for the variable, such as $x = 3$, not an always false numerical statement."}, {"text": "A contradiction.", "isCorrect": true, "rationale": "The text states that when you solve a contradiction, 'you obtain a statement that is always false, such as $0 = 7$ or $3 = -1$.' The statement $5 = -2$ is always false, thus indicating a contradiction."}, {"text": "An equation with a single, negative solution.", "isCorrect": false, "rationale": "Obtaining a false statement means there is no solution, not a single negative solution. This describes a contradiction."}], "id": "q06"}, {"question": "Consider the equation $6p - 2 = 3p + 7$. What is the *first* logical step to collect variable terms on one side, following the method described?", "options": [{"text": "Add 2 to both sides.", "isCorrect": false, "rationale": "Adding 2 to both sides would move the constant term from the left, but the primary goal for 'variables on both sides' is to collect variable terms first. While a valid operation, it doesn't prioritize collecting variable terms as the first step."}, {"text": "Subtract 7 from both sides.", "isCorrect": false, "rationale": "Subtracting 7 from both sides would move the constant term from the right, but the primary goal for 'variables on both sides' is to collect variable terms first."}, {"text": "Subtract 3p from both sides.", "isCorrect": true, "rationale": "The text states the need to 'collect all variable terms on one side.' Subtracting $3p$ from both sides ($6p - 3p - 2 = 3p - 3p + 7$) would result in $3p - 2 = 7$, effectively moving all variable terms to the left side and initiating their collection."}, {"text": "Divide both sides by 6.", "isCorrect": false, "rationale": "Dividing by 6 at this stage would not effectively collect variable terms and would introduce fractions, complicating the initial steps without first isolating the variable terms."}], "id": "q07"}, {"question": "What is the key difference between an identity and a conditional equation?", "options": [{"text": "Identities have variables, while conditional equations do not.", "isCorrect": false, "rationale": "Both identities and conditional equations contain variables. The presence or absence of a variable is not the distinguishing factor."}, {"text": "Identities are always true for every real number, while conditional equations are true for only specific values.", "isCorrect": true, "rationale": "The text defines an identity as 'true for every value of the variable' and a conditional equation as 'true for only certain values of the variable.' This is the fundamental distinction between the two types of equations."}, {"text": "Conditional equations always result in $0=0$, while identities always result in a single value for the variable.", "isCorrect": false, "rationale": "This statement is reversed and incorrect. Identities result in a true statement like $0=0$ (or $6=6$), while conditional equations result in a single value for the variable (e.g., $x=3$). "}, {"text": "Identities have no solution, while conditional equations have infinite solutions.", "isCorrect": false, "rationale": "This statement is incorrect. Identities have infinitely many solutions (every real number), while conditional equations have exactly one solution. Equations with no solution are contradictions."}], "id": "q08"}, {"question": "If solving an equation results in a true statement like $6 = 6$, what does this imply about the solutions to the equation?", "options": [{"text": "There is exactly one solution.", "isCorrect": false, "rationale": "A single value for the variable (e.g., $x=3$) indicates one solution, which is characteristic of a conditional equation, not an always true statement."}, {"text": "There is no solution.", "isCorrect": false, "rationale": "No solution occurs when solving results in an always false statement (e.g., $0=5$), characteristic of a contradiction."}, {"text": "Every real number is a solution.", "isCorrect": true, "rationale": "The text states that if you obtain a true statement such as $0 = 0$ or $5 = 5$ when solving, 'the equation is an identity — every real number is a solution.'"}, {"text": "The equation is unsolvable.", "isCorrect": false, "rationale": "An equation that leads to a true statement like $6=6$ is solvable and has an infinite number of solutions (all real numbers), indicating it's an identity, not unsolvable."}], "id": "q09"}, {"question": "Solve $2(x + 3) = 2x + 6$.", "options": [{"text": "$x = 0$", "isCorrect": false, "rationale": "Substituting $x=0$ would give $2(3) = 0 + 6$, so $6=6$. While true for $x=0$, this equation is true for all values of x, not just $x=0$. It is an identity."}, {"text": "$x = -3$", "isCorrect": false, "rationale": "Substituting $x=-3$ would give $2(0) = 2(-3) + 6$, so $0 = -6 + 6$, which simplifies to $0=0$. While true for $x=-3$, this equation is true for all values of x, not just $x=-3$. It is an identity."}, {"text": "All real numbers.", "isCorrect": true, "rationale": "Distributing the 2 on the left side gives $2x + 6 = 2x + 6$. Subtracting $2x$ from both sides results in $6 = 6$, which is an always true statement. As per the text, an equation that results in an always true statement is an identity, and every real number is a solution."}, {"text": "No solution.", "isCorrect": false, "rationale": "An equation with no solution (a contradiction) would result in an always false statement (e.g., $5=-2$). This equation results in an always true statement, meaning it has infinitely many solutions, not no solution."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
