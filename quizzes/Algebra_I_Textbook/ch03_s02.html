<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the key difference between solving a multi-step inequality and solving a multi-step equation?", "options": [{"text": "You must always flip the inequality symbol when adding or subtracting.", "isCorrect": false, "rationale": "Adding or subtracting the same number on both sides does not change the direction of the inequality symbol."}, {"text": "You must reverse the inequality symbol when multiplying or dividing by a negative number.", "isCorrect": true, "rationale": "This is the one crucial difference: multiplying or dividing both sides by a negative number reverses the inequality direction."}, {"text": "You cannot use inverse operations with inequalities.", "isCorrect": false, "rationale": "Inverse operations are used in exactly the same way as with equations; the only extra rule is reversing when dividing or multiplying by a negative."}, {"text": "The variable must always end up on the left side.", "isCorrect": false, "rationale": "There is no requirement about which side the variable is on; the sign-reversal rule is the key distinction."}]}, {"question": "Which property states that adding or subtracting the same number on both sides of an inequality preserves the inequality direction?", "options": [{"text": "Multiplication and Division Properties of Inequality", "isCorrect": false, "rationale": "These properties apply to multiplying or dividing both sides, not adding or subtracting."}, {"text": "Distributive Property", "isCorrect": false, "rationale": "The distributive property expands expressions such as 2(3x - 1); it does not describe inequality direction."}, {"text": "Addition and Subtraction Properties of Inequality", "isCorrect": true, "rationale": "These properties state that adding or subtracting the same number on both sides preserves the direction of the inequality."}, {"text": "Transitive Property of Inequality", "isCorrect": false, "rationale": "The transitive property relates inequalities among three values, not to operations performed on both sides."}]}, {"question": "Solve 3x - 7 > 5. What is the solution?", "options": [{"text": "x > 12", "isCorrect": false, "rationale": "Adding 7 gives 3x > 12, then dividing by 3 gives x > 4, not x > 12."}, {"text": "x < 4", "isCorrect": false, "rationale": "Dividing by positive 3 does not flip the inequality. The correct solution is x > 4."}, {"text": "x > 4", "isCorrect": true, "rationale": "Adding 7 to both sides gives 3x > 12, then dividing by 3 (positive, no flip) gives x > 4."}, {"text": "x < -4", "isCorrect": false, "rationale": "This has both the wrong sign and the wrong direction. The correct solution is x > 4."}]}, {"question": "When solving -4x + 3 >= 19, what is the correct solution?", "options": [{"text": "x >= -4", "isCorrect": false, "rationale": "Dividing by -4 requires reversing the inequality symbol. The correct answer is x <= -4."}, {"text": "x <= -4", "isCorrect": true, "rationale": "Subtracting 3 gives -4x >= 16; dividing by -4 and reversing the symbol gives x <= -4."}, {"text": "x <= 4", "isCorrect": false, "rationale": "Dividing -4x >= 16 by -4 gives x <= -4, not x <= 4."}, {"text": "x >= 4", "isCorrect": false, "rationale": "Both the sign of the answer and the direction of the inequality are wrong here."}]}, {"question": "What is the correct interval notation for the solution x > 4?", "options": [{"text": "[4, +inf)", "isCorrect": false, "rationale": "A square bracket at 4 would include 4 in the solution, but x > 4 is strict and excludes 4."}, {"text": "(-inf, 4)", "isCorrect": false, "rationale": "This represents x < 4, which is the opposite direction from x > 4."}, {"text": "(4, +inf)", "isCorrect": true, "rationale": "A parenthesis at 4 shows 4 is not included (strict inequality), and infinity is always paired with a parenthesis."}, {"text": "[4, +inf]", "isCorrect": false, "rationale": "Infinity is never enclosed with a bracket because it is not a real number."}]}, {"question": "What is the first step when solving 2(3x - 1) - 4x <= 10?", "options": [{"text": "Divide both sides by 2.", "isCorrect": false, "rationale": "The left side must be simplified first by applying the distributive property."}, {"text": "Apply the distributive property to expand 2(3x - 1).", "isCorrect": true, "rationale": "Distributing gives 6x - 2 - 4x, which combines to 2x - 2 before inverse operations are applied."}, {"text": "Add 1 to both sides.", "isCorrect": false, "rationale": "Adding 1 does not simplify the grouped expression; distribution must come first."}, {"text": "Subtract 4x from both sides.", "isCorrect": false, "rationale": "The 4x cannot be combined with 2(3x - 1) until the parentheses are opened by distributing."}]}, {"question": "After fully solving 2(3x - 1) - 4x <= 10, what is the solution?", "options": [{"text": "x <= 5", "isCorrect": false, "rationale": "After distributing, combining, adding 2, and dividing by 2, the answer is x <= 6, not x <= 5."}, {"text": "x <= 6", "isCorrect": true, "rationale": "Distributing gives 6x - 2 - 4x <= 10; combining gives 2x - 2 <= 10; adding 2 gives 2x <= 12; dividing by 2 gives x <= 6."}, {"text": "x <= 8", "isCorrect": false, "rationale": "Dividing 2x <= 12 by 2 gives x <= 6, not x <= 8."}, {"text": "x >= 6", "isCorrect": false, "rationale": "Dividing by positive 2 does not flip the symbol. The solution is x <= 6."}]}, {"question": "Solve -2x + 5 > 13. Which answer is correct?", "options": [{"text": "x > -4", "isCorrect": false, "rationale": "Subtracting 5 gives -2x > 8; dividing by -2 and reversing gives x < -4, not x > -4."}, {"text": "x < 4", "isCorrect": false, "rationale": "Dividing -2x > 8 by -2 with a flip gives x < -4, not x < 4."}, {"text": "x < -4", "isCorrect": true, "rationale": "Subtracting 5 gives -2x > 8; dividing by -2 and reversing the inequality gives x < -4."}, {"text": "x > 4", "isCorrect": false, "rationale": "Both the sign and direction are incorrect. The correct answer is x < -4."}]}, {"question": "What is the interval notation for the solution x < -4?", "options": [{"text": "(-4, +inf)", "isCorrect": false, "rationale": "This represents x > -4, the opposite direction from x < -4."}, {"text": "(-inf, -4)", "isCorrect": true, "rationale": "x < -4 means all values less than -4. In interval notation: (-inf, -4) with parentheses since -4 is excluded by the strict inequality."}, {"text": "[-4, +inf)", "isCorrect": false, "rationale": "This represents x >= -4, which is the wrong direction and wrongly includes -4."}, {"text": "(-inf, -4]", "isCorrect": false, "rationale": "A square bracket at -4 would include -4, but x < -4 is strict so -4 is excluded."}]}, {"question": "Which statement correctly describes when you must reverse the inequality symbol?", "options": [{"text": "Whenever you subtract a positive number from both sides.", "isCorrect": false, "rationale": "Subtraction preserves the direction of the inequality. No reversal is needed for addition or subtraction."}, {"text": "Whenever you multiply or divide both sides by a negative number.", "isCorrect": true, "rationale": "The Multiplication and Division Properties of Inequality require reversing the symbol only when multiplying or dividing by a negative number."}, {"text": "Whenever the solution is a negative number.", "isCorrect": false, "rationale": "The sign of the solution has nothing to do with whether to flip the symbol."}, {"text": "Whenever you move the variable from the right side to the left side.", "isCorrect": false, "rationale": "Rearranging terms does not require flipping; only multiplying or dividing by a negative number does."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
