<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following expressions does NOT meet the definition of a rational expression as defined in the text?", "options": [{"text": "$\\frac{x^2 - 5x + 6}{x + 1}$", "isCorrect": false, "rationale": "This expression is a ratio of two polynomials, which fits the standard definition."}, {"text": "$\\frac{\\sqrt{x} + 4}{x^2 - 9}$", "isCorrect": true, "rationale": "A rational expression must have polynomials in both the numerator and denominator; since $\\sqrt{x}$ is not a polynomial, this does not qualify."}, {"text": "$\\frac{12}{x^2 + 1}$", "isCorrect": false, "rationale": "A constant like 12 is considered a polynomial of degree zero, so this ratio is a valid rational expression."}, {"text": "$x - 5$", "isCorrect": false, "rationale": "Any polynomial can be written as a rational expression with a denominator of 1, which is a polynomial."}]}, {"question": "What are the excluded values for the rational expression $\\frac{x^2 - 1}{x^2 - 3x + 2}$?", "options": [{"text": "$x \\ne 2$ and $x \\ne 1$", "isCorrect": true, "rationale": "Setting the denominator $x^2 - 3x + 2 = 0$ and factoring gives $(x-2)(x-1) = 0$, identifying these values as making the expression undefined."}, {"text": "$x \\ne 2$", "isCorrect": false, "rationale": "While 2 is an excluded value, this option overlooks the second root of the quadratic denominator."}, {"text": "$x \\ne 1$ and $x \\ne -1$", "isCorrect": false, "rationale": "These are the roots of the numerator, but excluded values are determined solely by the denominator being zero."}, {"text": "$x \\ne -2$ and $x \\ne -1$", "isCorrect": false, "rationale": "This results from a sign error when factoring the trinomial $x^2 - 3x + 2$."}]}, {"question": "Simplify the expression $\\frac{x^2 - 4x + 4}{x^2 - 4}$.", "options": [{"text": "$\\frac{x - 2}{x + 2}$, where $x \\ne 2, -2$", "isCorrect": true, "rationale": "Factoring the numerator as $(x-2)^2$ and the denominator as $(x-2)(x+2)$ allows the common factor $(x-2)$ to be divided out."}, {"text": "$\\frac{x + 2}{x - 2}$, where $x \\ne 2, -2$", "isCorrect": false, "rationale": "This suggests an error in identifying which factors are in the numerator versus the denominator after cancellation."}, {"text": "$x + 1$, where $x \\ne 2, -2$", "isCorrect": false, "rationale": "This would result from incorrectly 'canceling' terms like $x^2$ and $-4$ individually instead of dividing common factors."}, {"text": "$\\frac{x - 2}{x + 2}$, where $x \\ne -2$", "isCorrect": false, "rationale": "While the simplified form is correct, excluded values must represent the restrictions of the original expression, not just the final one."}]}, {"question": "Why is the expression $\\frac{x + 7}{x + 14}$ already in simplest form?", "options": [{"text": "Because $x$ and $7$ are terms, not factors, and the numerator and denominator share no common factors.", "isCorrect": true, "rationale": "Simplification requires dividing out common factors; individual terms separated by addition cannot be cancelled."}, {"text": "Because the denominator is exactly double the numerator.", "isCorrect": false, "rationale": "Being a multiple does not allow for simplification unless the entire expression is a common factor."}, {"text": "Because it simplifies to $\\frac{1}{2}$ by dividing the $x$'s and the constants.", "isCorrect": false, "rationale": "This is a common misconception where terms are treated as factors; variables and constants cannot be cancelled across addition."}, {"text": "Because the expression has no excluded values.", "isCorrect": false, "rationale": "Whether an expression can be simplified is independent of whether it has excluded values (in this case, $x \\ne -14$)."}]}, {"question": "Which set of values represents the excluded values for the expression $\\frac{3x - 15}{2x^2 - 10x}$?", "options": [{"text": "$x \\ne 0, 5$", "isCorrect": true, "rationale": "Factoring the denominator as $2x(x - 5)$ reveals that the expression is undefined when either $x = 0$ or $x = 5$."}, {"text": "$x \\ne 5$", "isCorrect": false, "rationale": "This identifies the root of the binomial factor but misses the restriction caused by the monomial factor $x$ in the denominator."}, {"text": "$x \\ne 0, -5$", "isCorrect": false, "rationale": "This would occur if the denominator was incorrectly factored as $2x(x + 5)$."}, {"text": "$x \\ne 5, \\frac{1}{3}$", "isCorrect": false, "rationale": "This incorrectly includes a root from the numerator, which does not affect the domain of the expression."}]}, {"question": "Simplify the rational expression $\\frac{2x^2 - 50}{x^2 + 10x + 25}$.", "options": [{"text": "$\\frac{2(x - 5)}{x + 5}$, where $x \\ne -5$", "isCorrect": true, "rationale": "The numerator factors into $2(x-5)(x+5)$ and the denominator into $(x+5)^2$; dividing the common factor $(x+5)$ yields this result."}, {"text": "$2(x - 5)$, where $x \\ne -5$", "isCorrect": false, "rationale": "This error occurs if you cancel both $(x+5)$ factors in the denominator using only one $(x+5)$ factor from the numerator."}, {"text": "$\\frac{2(x + 5)}{x - 5}$, where $x \\ne 5$", "isCorrect": false, "rationale": "This reflects a factoring error in either the difference of squares or the perfect square trinomial."}, {"text": "$\\frac{x - 5}{x + 5}$, where $x \\ne -5$", "isCorrect": false, "rationale": "This answer is missing the constant factor of 2 extracted as a GCF from the numerator."}]}, {"question": "Evaluate the simplified form of $\\frac{4 - x}{x^2 - 16}$.", "options": [{"text": "$-\\frac{1}{x + 4}$, where $x \\ne 4, -4$", "isCorrect": true, "rationale": "Since $(4 - x) = -(x - 4)$, the factor $(x - 4)$ cancels with the denominator $(x - 4)(x + 4)$, leaving a negative sign in the numerator."}, {"text": "$\\frac{1}{x + 4}$, where $x \\ne 4, -4$", "isCorrect": false, "rationale": "This ignores the sign difference between $(4-x)$ and $(x-4)$, treating them as identical factors."}, {"text": "$-\\frac{1}{x - 4}$, where $x \\ne 4, -4$", "isCorrect": false, "rationale": "This indicates an error in which factor was cancelled from the difference of squares in the denominator."}, {"text": "$x - 4$, where $x \\ne 4, -4$", "isCorrect": false, "rationale": "This suggests the numerator and denominator were flipped or that the reciprocal was taken incorrectly."}]}, {"question": "Simplify $\\frac{3x^3 - 12x}{x^2 + 2x}$ and state the excluded values.", "options": [{"text": "$3x - 6$, where $x \\ne 0, -2$", "isCorrect": true, "rationale": "Factoring the numerator as $3x(x-2)(x+2)$ and the denominator as $x(x+2)$ allows $x$ and $(x+2)$ to cancel, leaving $3(x-2)$."}, {"text": "$3x^2 - 6x$, where $x \\ne 0, -2$", "isCorrect": false, "rationale": "This error occurs if the factor $x$ is not cancelled from the numerator during the simplification process."}, {"text": "$3x - 6$, where $x \\ne -2$", "isCorrect": false, "rationale": "This provides the correct simplified form but fails to include $x=0$ as an excluded value from the original denominator."}, {"text": "$3x + 6$, where $x \\ne 0, -2$", "isCorrect": false, "rationale": "This reflects a sign error when factoring the difference of squares $x^2 - 4$ in the numerator."}]}, {"question": "If a rational expression is simplified to $\\frac{x + 2}{x - 3}$ and the original expression had a denominator of $x^2 - 9$, what were the original excluded values?", "options": [{"text": "$x \\ne 3, -3$", "isCorrect": true, "rationale": "Excluded values are determined by the original denominator; $x^2 - 9 = 0$ solves to $x = 3$ and $x = -3$."}, {"text": "$x \\ne 3$", "isCorrect": false, "rationale": "This only identifies the restriction visible in the final simplified form, ignoring the factor that was cancelled."}, {"text": "$x \\ne -3$", "isCorrect": false, "rationale": "This misses the root of the denominator factor that remains in the simplified version of the expression."}, {"text": "$x \\ne 3, -2$", "isCorrect": false, "rationale": "This incorrectly includes a root from the numerator as an excluded value."}]}, {"question": "Simplify the expression $\\frac{4x^2 + 8x}{2x^2 - 8}$.", "options": [{"text": "$\\frac{2x}{x - 2}$, where $x \\ne 2, -2$", "isCorrect": true, "rationale": "The numerator factors to $4x(x+2)$ and the denominator to $2(x-2)(x+2)$; dividing out $2(x+2)$ leaves $\\frac{2x}{x-2}$."}, {"text": "$\\frac{2x}{x + 2}$, where $x \\ne 2, -2$", "isCorrect": false, "rationale": "This implies the factor $(x-2)$ was cancelled instead of the common factor $(x+2)$."}, {"text": "$\\frac{x}{x - 2}$, where $x \\ne 2, -2$", "isCorrect": false, "rationale": "This indicates an error in simplifying the numerical coefficients 4 and 2."}, {"text": "$\\frac{2(x + 2)}{x - 2}$, where $x \\ne 2, -2$", "isCorrect": false, "rationale": "This result would happen if the variable $x$ in the numerator's GCF was somehow omitted or mismanaged."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
