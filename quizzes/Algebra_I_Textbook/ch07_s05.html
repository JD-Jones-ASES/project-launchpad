<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 7, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following expressions represents the completely factored form of $4x^3 - 4x^2 - 24x$?", "options": [{"text": "$4x(x - 3)(x + 2)$", "isCorrect": true, "rationale": "After factoring out the GCF of $4x$, the remaining trinomial $x^2 - x - 6$ factors into $(x - 3)(x + 2)$ because $-3$ and $2$ sum to $-1$ and multiply to $-6$."}, {"text": "$4(x^2 - x - 6)x$", "isCorrect": false, "rationale": "While the GCF is correct, the trinomial inside the parentheses is not prime and must be factored further to meet the definition of 'factored completely'."}, {"text": "$4x(x + 3)(x - 2)$", "isCorrect": false, "rationale": "This choice uses the incorrect signs for the binomial factors, resulting in a middle term of $+x$ instead of $-x$ when multiplied out."}, {"text": "$(4x^2 - 12x)(x + 2)$", "isCorrect": false, "rationale": "The first factor still contains a common factor of $4x$, meaning the expression is not yet factored into prime factors."}], "id": "q01"}, {"question": "Factor the polynomial $3x^3 - 27x$ completely.", "options": [{"text": "$3x(x - 3)(x + 3)$", "isCorrect": true, "rationale": "First, factor out the GCF $3x$ to get $3x(x^2 - 9)$, then recognize $x^2 - 9$ as a difference of squares that factors into $(x - 3)(x + 3)$."}, {"text": "$3x(x^2 - 9)$", "isCorrect": false, "rationale": "This is a partially factored form; the binomial $x^2 - 9$ is not prime because it can be further factored as a difference of squares."}, {"text": "$3(x^3 - 9x)$", "isCorrect": false, "rationale": "The GCF for the original terms includes a variable $x$, and the remaining terms in the parentheses are not factored."}, {"text": "$(3x^2 + 9x)(x - 3)$", "isCorrect": false, "rationale": "This expression is not completely factored because the first binomial still contains a common factor of $3x$."}], "id": "q02"}, {"question": "Solve the equation $3x^2 - 12x = 0$ using factoring and the Zero Product Property.", "options": [{"text": "$x = 0$ or $x = 4$", "isCorrect": true, "rationale": "Factoring the GCF gives $3x(x - 4) = 0$; setting each factor to zero results in $3x = 0$ (so $x = 0$) and $x - 4 = 0$ (so $x = 4$)."}, {"text": "$x = 4$ only", "isCorrect": false, "rationale": "This ignores the variable factor $x$ in the GCF, which also provides a valid solution when set to zero."}, {"text": "$x = 2$ or $x = -2$", "isCorrect": false, "rationale": "This error often occurs if the equation is mistaken for a difference of squares like $x^2 - 4 = 0$ instead of factoring out the GCF."}, {"text": "$x = 0$ or $x = -4$", "isCorrect": false, "rationale": "The solution $x = -4$ would come from a factor of $(x + 4)$, but factoring $3x^2 - 12x$ yields $(x - 4)$."}], "id": "q03"}, {"question": "Which statement accurately describes the polynomial $x^2 + 25$ in the context of factoring over the integers?", "options": [{"text": "It is a sum of squares and cannot be factored using integers.", "isCorrect": true, "rationale": "The source material explicitly states that while a difference of squares factors, a sum of squares like $a^2 + b^2$ does not factor over the integers."}, {"text": "It factors into $(x + 5)(x - 5)$. ", "isCorrect": false, "rationale": "This is the factorization for $x^2 - 25$; multiplying $(x + 5)(x - 5)$ results in a negative constant term."}, {"text": "It factors into $(x + 5)^2$.", "isCorrect": false, "rationale": "The square of a binomial $(x + 5)^2$ results in $x^2 + 10x + 25$, which contains a middle term not present in the original binomial."}, {"text": "It can be factored by grouping.", "isCorrect": false, "rationale": "Factoring by grouping requires four or more terms, whereas this expression is a binomial with only two terms."}], "id": "q04"}, {"question": "Factor the four-term polynomial $x^3 + 2x^2 - 9x - 18$ completely.", "options": [{"text": "$(x + 2)(x - 3)(x + 3)$", "isCorrect": true, "rationale": "Grouping as $(x^3 + 2x^2) - (9x + 18)$ leads to $x^2(x + 2) - 9(x + 2)$, which simplifies to $(x^2 - 9)(x + 2)$ and finally $(x - 3)(x + 3)(x + 2)$."}, {"text": "$(x^2 - 9)(x + 2)$", "isCorrect": false, "rationale": "This is only partially factored; the term $(x^2 - 9)$ is a difference of squares that must be broken down further to be considered completely factored."}, {"text": "$x^2(x + 2) - 9(x + 2)$", "isCorrect": false, "rationale": "This represents an intermediate step in the grouping process, not a product of prime factors."}, {"text": "$(x - 2)(x^2 + 9)$", "isCorrect": false, "rationale": "This choice results from incorrect sign handling during grouping and assumes a sum of squares that cannot be factored."}], "id": "q05"}, {"question": "What is the completely factored form of $-5x^2 + 20x + 60$?", "options": [{"text": "$-5(x - 6)(x + 2)$", "isCorrect": true, "rationale": "Factoring out the negative GCF $-5$ leaves $x^2 - 4x - 12$, which factors into $(x - 6)(x + 2)$ based on the sum and product of the coefficients."}, {"text": "$(-5x + 30)(x + 2)$", "isCorrect": false, "rationale": "The first factor still contains a common factor of $-5$, which means the polynomial is not factored completely."}, {"text": "$5(-x^2 + 4x + 12)$", "isCorrect": false, "rationale": "The strategy suggests factoring out a negative GCF if the leading coefficient is negative, and the trinomial is still not factored."}, {"text": "$-5(x + 6)(x - 2)$", "isCorrect": false, "rationale": "This uses the wrong signs for the integers; $(6) + (-2)$ equals $+4$, whereas the target middle coefficient after taking out $-5$ is $-4$."}], "id": "q06"}, {"question": "Factor the expression $2x^4 - 32$ completely.", "options": [{"text": "$2(x - 2)(x + 2)(x^2 + 4)$", "isCorrect": true, "rationale": "After factoring out the GCF $2$, we get $(x^4 - 16)$, which is a difference of squares $(x^2 - 4)(x^2 + 4)$, where $(x^2 - 4)$ factors again into $(x - 2)(x + 2)$."}, {"text": "$2(x^2 - 4)(x^2 + 4)$", "isCorrect": false, "rationale": "One of the factors, $(x^2 - 4)$, is a difference of squares and can be factored further into prime binomials."}, {"text": "$2(x - 2)(x + 2)(x - 2)(x + 2)$", "isCorrect": false, "rationale": "This incorrectly attempts to factor the sum of squares $(x^2 + 4)$, which is prime and cannot be broken down using integers."}, {"text": "$(2x^2 - 8)(x^2 + 4)$", "isCorrect": false, "rationale": "The first factor $(2x^2 - 8)$ contains a GCF of $2$ and is also a difference of squares, so it is not factored completely."}], "id": "q07"}, {"question": "Solve the quadratic equation $x^2 - x - 20 = 0$.", "options": [{"text": "$x = 5$ or $x = -4$", "isCorrect": true, "rationale": "The trinomial factors into $(x - 5)(x + 4) = 0$. Applying the Zero Product Property gives $x - 5 = 0$ or $x + 4 = 0$, leading to $5$ and $-4$."}, {"text": "$x = -5$ or $x = 4$", "isCorrect": false, "rationale": "These solutions would arise from factors of $(x + 5)$ and $(x - 4)$, but those would produce a middle term of $+x$ instead of $-x$."}, {"text": "$x = 10$ or $x = -2$", "isCorrect": false, "rationale": "While $-10$ and $2$ (or vice-versa) multiply to $-20$, their sum is not $-1$, so they are not the correct factors for this trinomial."}, {"text": "$x = 5$ or $x = 4$", "isCorrect": false, "rationale": "Multiplying $(x - 5)(x - 4)$ would result in a positive constant term $+20$, whereas the equation has $-20$."}], "id": "q08"}, {"question": "According to the Zero Product Property, if $(x + 3)(2x - 1)(x - 7) = 0$, which of the following must be true?", "options": [{"text": "At least one of the factors must equal zero.", "isCorrect": true, "rationale": "The property states that if a product of any number of factors is zero, then at least one individual factor must be zero to satisfy the equation."}, {"text": "All three factors must be zero simultaneously.", "isCorrect": false, "rationale": "Only one factor needs to be zero to make the entire product zero; it is not necessary for all of them to be zero at once."}, {"text": "The variable $x$ must be zero.", "isCorrect": false, "rationale": "If $x$ were zero, the product would be $(3)(-1)(-7) = 21$, not zero."}, {"text": "The sum of the factors must be zero.", "isCorrect": false, "rationale": "The Zero Product Property specifically concerns the product of factors, not their sum."}], "id": "q09"}, {"question": "Which of these is a perfect square trinomial, and how does it factor?", "options": [{"text": "$16x^2 - 40x + 25$ factors into $(4x - 5)^2$.", "isCorrect": true, "rationale": "This is a perfect square trinomial because $16x^2$ is $(4x)^2$, $25$ is $(-5)^2$, and the middle term is $2(4x)(-5) = -40x$."}, {"text": "$x^2 + 6x - 9$ factors into $(x + 3)^2$.", "isCorrect": false, "rationale": "The square of $(x + 3)$ is $x^2 + 6x + 9$; the negative constant in the original expression prevents it from being a perfect square trinomial."}, {"text": "$4x^2 + 10x + 25$ factors into $(2x + 5)^2$.", "isCorrect": false, "rationale": "While the first and last terms are perfect squares, the middle term for $(2x + 5)^2$ should be $2(2x)(5) = 20x$, not $10x$."}, {"text": "$9x^2 - 12x - 4$ factors into $(3x - 2)^2$.", "isCorrect": false, "rationale": "The square of $(3x - 2)$ must end in a positive constant $(+4)$ because a negative number squared is always positive."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
