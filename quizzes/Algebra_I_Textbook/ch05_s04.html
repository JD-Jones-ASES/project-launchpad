<script>
var QUESTIONS = [{"question": "According to the general strategy for setting up a system from a word problem, what is the crucial first step after reading the problem carefully?", "options": [{"text": "Solve the system using substitution or elimination.", "isCorrect": false, "rationale": "Solving the system is a later step, after the equations have been formulated. It is not the very first step."}, {"text": "Identify the two unknowns and assign a variable to each.", "isCorrect": true, "rationale": "The first step outlined in the strategy is to 'Read the problem carefully and identify the two unknowns. Assign a variable to each.' This establishes what you are trying to find."}, {"text": "Find two relationships (conditions) that connect the unknowns.", "isCorrect": false, "rationale": "Finding the relationships is the second step. You must first identify what the unknowns are before you can find conditions that connect them."}, {"text": "Check that your answer makes sense in the context of the problem.", "isCorrect": false, "rationale": "Checking the answer is the final step in the strategy, performed only after the system has been solved."}]}, {"question": "A baker is making two types of cookies, chocolate chip (C) and oatmeal (O). She bakes a total of 75 cookies. Each chocolate chip cookie requires 3 oz of dough, and each oatmeal cookie requires 2 oz of dough. If she uses a total of 190 oz of dough, which system of equations correctly represents this situation?", "options": [{"text": "C + O = 75; 2C + 3O = 190", "isCorrect": false, "rationale": "The coefficients for the dough amounts are swapped for chocolate chip and oatmeal cookies. Chocolate chip cookies require 3 oz, so it should be 3C, and oatmeal cookies require 2 oz, so it should be 2O."}, {"text": "C + O = 190; 3C + 2O = 75", "isCorrect": false, "rationale": "The total number of cookies (75) and the total dough amount (190 oz) are incorrectly assigned to the equations. The first equation should represent the total number of cookies, and the second the total dough."}, {"text": "C + O = 75; 3C + 2O = 190", "isCorrect": true, "rationale": "The first equation correctly represents the total number of cookies (C + O = 75). The second equation correctly represents the total dough used, with 3 oz per chocolate chip cookie (3C) and 2 oz per oatmeal cookie (2O), summing to 190 oz."}, {"text": "3C + 2O = 75; C + O = 190", "isCorrect": false, "rationale": "The total number of cookies (75) and the total dough amount (190 oz) are incorrectly assigned to the equations. The first equation should represent the total number of cookies, and the second the total dough."}]}, {"question": "In the 'Mixture Problem' example involving nickels and dimes, the equation '5n + 10d = 135' specifically represents what aspect of the coins?", "options": [{"text": "The total number of coins in the jar.", "isCorrect": false, "rationale": "The equation 'n + d = 20' represents the total number of coins. '5n + 10d = 135' involves the monetary value of each coin."}, {"text": "The total value of the coins in cents.", "isCorrect": true, "rationale": "Nickels are worth 5 cents, so '5n' is the value of 'n' nickels. Dimes are worth 10 cents, so '10d' is the value of 'd' dimes. Their sum, '5n + 10d', represents the total value of all coins in cents, which is 135 cents ($1.35)."}, {"text": "The difference between the number of nickels and dimes.", "isCorrect": false, "rationale": "This equation represents a sum of values, not a difference in quantity. A difference would be expressed as 'n - d' or 'd - n'."}, {"text": "The ratio of nickels to dimes.", "isCorrect": false, "rationale": "A ratio would typically be expressed as a fraction or using a colon (e.g., n/d or n:d), not as a sum of values."}]}, {"question": "A piggy bank contains only pennies and nickels. There are 30 coins in total, and their combined value is $0.94. How many nickels are in the piggy bank?", "options": [{"text": "8 nickels", "isCorrect": false, "rationale": "If there were 8 nickels, their value would be 40 cents. With 22 pennies (30-8), the total value would be 40 + 22 = 62 cents, which is incorrect."}, {"text": "10 nickels", "isCorrect": false, "rationale": "If there were 10 nickels, their value would be 50 cents. With 20 pennies (30-10), the total value would be 50 + 20 = 70 cents, which is incorrect."}, {"text": "16 nickels", "isCorrect": true, "rationale": "Let 'p' be the number of pennies and 'k' be the number of nickels. The system is p + k = 30 and 1p + 5k = 94. From the first, p = 30 - k. Substitute: 1(30 - k) + 5k = 94 => 30 - k + 5k = 94 => 4k = 64 => k = 16. So there are 16 nickels."}, {"text": "18 nickels", "isCorrect": false, "rationale": "If there were 18 nickels, their value would be 90 cents. With 12 pennies (30-18), the total value would be 90 + 12 = 102 cents, which is incorrect."}]}, {"question": "In the Distance-Rate-Time problem, two cyclists move in opposite directions, and their individual distances add up to the total distance apart. Which statement accurately describes the underlying principle for this setup?", "options": [{"text": "The cyclists' speeds must be equal for their distances to add.", "isCorrect": false, "rationale": "The problem explicitly states different speeds (12 mph and 8 mph), yet their distances still add to find the total separation. Equal speeds are not a prerequisite for distances to add when moving apart."}, {"text": "The total distance between them is the sum of the distances each cyclist covers individually during the same time period.", "isCorrect": true, "rationale": "When objects move in opposite directions, each object contributes to increasing the separation. Therefore, the total distance they are apart is the sum of the distance covered by the first object and the distance covered by the second object during the same duration."}, {"text": "One cyclist's distance is subtracted from the other's to find the separation.", "isCorrect": false, "rationale": "Subtracting distances would be appropriate if they were moving in the same direction and we wanted to find how far one was ahead of the other. For opposite directions, distances add."}, {"text": "This principle applies only if the starting point is fixed and they are returning to it.", "isCorrect": false, "rationale": "The problem states they start from the same point and ride in opposite directions, not that they are returning. The principle of adding distances for objects moving apart is general."}]}, {"question": "Two trains leave the same station at the same time and travel in opposite directions. One train travels at 70 mph, and the other travels at 80 mph. How many hours will it take for them to be 450 miles apart?", "options": [{"text": "2 hours", "isCorrect": false, "rationale": "In 2 hours, the first train travels 70*2 = 140 miles, and the second 80*2 = 160 miles. Total distance = 140 + 160 = 300 miles, which is not 450."}, {"text": "2.5 hours", "isCorrect": false, "rationale": "In 2.5 hours, the first train travels 70*2.5 = 175 miles, and the second 80*2.5 = 200 miles. Total distance = 175 + 200 = 375 miles, which is not 450."}, {"text": "3 hours", "isCorrect": true, "rationale": "Let 't' be the time in hours. The distance covered by the first train is 70t, and by the second is 80t. Since they are moving in opposite directions, their distances add: 70t + 80t = 450. This simplifies to 150t = 450, so t = 3 hours."}, {"text": "3.5 hours", "isCorrect": false, "rationale": "In 3.5 hours, the first train travels 70*3.5 = 245 miles, and the second 80*3.5 = 280 miles. Total distance = 245 + 280 = 525 miles, which is not 450."}]}, {"question": "A community center is planning an event and comparing two catering companies. Company P charges a fixed fee of $150 plus $15 per plate. Company Q charges a fixed fee of $50 plus $20 per plate. If 'p' represents the number of plates and 'C' represents the total cost, which system of equations models this situation?", "options": [{"text": "C = 15p + 150; C = 20p + 50", "isCorrect": true, "rationale": "For Company P, the cost 'C' is the fixed fee ($150) plus $15 per plate (15p), so C = 150 + 15p. For Company Q, the cost 'C' is the fixed fee ($50) plus $20 per plate (20p), so C = 50 + 20p. This system accurately reflects the given charges."}, {"text": "p = 15C + 150; p = 20C + 50", "isCorrect": false, "rationale": "The variables are swapped. 'p' represents the number of plates, which is the independent variable affecting cost, and 'C' is the total cost, the dependent variable."}, {"text": "C = 150p + 15; C = 50p + 20", "isCorrect": false, "rationale": "The coefficients for 'p' and the fixed fees are swapped. The fixed fee should be added, and the per-plate charge should multiply 'p'."}, {"text": "C + p = 150; C + p = 50", "isCorrect": false, "rationale": "This system incorrectly sums costs and plates to fixed values, which does not represent the cost structure of the catering companies. There should be a separate equation for each company's cost."}]}, {"question": "Using the catering company information (Company P: C = 150 + 15p; Company Q: C = 50 + 20p), for what number of plates will Company P charge less than Company Q?", "options": [{"text": "For exactly 20 plates.", "isCorrect": false, "rationale": "At 20 plates, Company P: 150 + 15(20) = 150 + 300 = $450. Company Q: 50 + 20(20) = 50 + 400 = $450. They charge the same amount, it's the break-even point."}, {"text": "For more than 20 plates.", "isCorrect": true, "rationale": "First, find the break-even point by setting the costs equal: 150 + 15p = 50 + 20p. Subtract 15p from both sides: 150 = 50 + 5p. Subtract 50 from both sides: 100 = 5p. Divide by 5: p = 20. At 20 plates, the costs are equal. For more than 20 plates (e.g., 21), Company P (150 + 15*21 = $465) will be cheaper than Company Q (50 + 20*21 = $470), because Company P has a lower per-plate charge."}, {"text": "For less than 20 plates.", "isCorrect": false, "rationale": "For less than 20 plates (e.g., 10), Company P: 150 + 15(10) = $300. Company Q: 50 + 20(10) = $250. In this range, Company Q is cheaper due to its lower fixed fee."}, {"text": "Company P always charges less.", "isCorrect": false, "rationale": "This is incorrect. As shown by the calculation, Company Q is cheaper for fewer than 20 plates, and they are equal at 20 plates."}]}, {"question": "The checkpoint problem (q + d = 20 and 25q + 10d = 350) was solved using substitution. Why might substitution be a particularly efficient method for this specific system?", "options": [{"text": "Substitution is always faster than elimination for any system of equations.", "isCorrect": false, "rationale": "The efficiency of substitution versus elimination depends on the specific equations. Neither method is universally faster for all systems."}, {"text": "One of the equations (q + d = 20) can be easily rearranged to isolate a variable with a coefficient of 1, simplifying the first step of substitution.", "isCorrect": true, "rationale": "In the equation q + d = 20, both 'q' and 'd' have a coefficient of 1. This makes it very easy to express one variable in terms of the other (e.g., q = 20 - d) without introducing fractions, which is ideal for substitution."}, {"text": "The large coefficients in the second equation (25q + 10d = 350) make elimination too complicated.", "isCorrect": false, "rationale": "While the coefficients are larger, elimination would still be a viable method (e.g., multiply the first equation by -10 to eliminate 'd'). Large coefficients do not automatically render elimination too complicated."}, {"text": "Elimination requires all equations to have variables with opposite signs.", "isCorrect": false, "rationale": "Elimination does not require variables to have opposite signs initially. You can multiply one or both equations by constants (including negative numbers) to create coefficients that are opposites, allowing for elimination."}]}, {"question": "After solving a system of equations derived from a word problem, the final step in the general strategy is to 'Check that your answer makes sense in the context of the problem.' What is the primary purpose of this context-specific check?", "options": [{"text": "To ensure that the mathematical calculations were performed correctly, irrespective of the problem's context.", "isCorrect": false, "rationale": "While checking calculations is part of verifying the answer, the instruction specifically mentions 'in the context of the problem,' which goes beyond just numerical accuracy. For example, getting a negative number of coins would be numerically correct for the system, but not sensical in context."}, {"text": "To confirm that the variables chosen in the first step were the most appropriate ones.", "isCorrect": false, "rationale": "The check step evaluates the final numerical answer, not the initial choice of variables. Variable choice is part of the setup, not the validation of the result."}, {"text": "To verify that the numerical solution is not only mathematically correct but also logical and realistic within the constraints of the real-world scenario.", "isCorrect": true, "rationale": "This step ensures that the answer makes practical sense. For instance, you can't have half a person, a negative number of hours, or a cost that doesn't align with the problem's conditions. It's about evaluating the solution's realism in the real-world context."}, {"text": "To decide whether substitution or elimination was the most efficient method for solving the problem.", "isCorrect": false, "rationale": "The check step is about validating the solution itself, not about evaluating the efficiency of the method used to obtain it. Method selection happens before solving."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
