    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 6, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following expressions is NOT a monomial?", "options": [{"text": "7", "isCorrect": false, "rationale": "A number (constant) is considered a monomial, as it's a product of a number (itself) and variables raised to an exponent of 0 (e.g., 7x^0)."}, {"text": "4a^2b^3", "isCorrect": false, "rationale": "This is a product of a number and variables raised to whole-number exponents, which fits the definition of a monomial."}, {"text": "-3x", "isCorrect": false, "rationale": "This is a product of a number and a variable raised to a whole-number exponent (x^1), making it a monomial."}, {"text": "5/x", "isCorrect": true, "rationale": "This expression can be written as 5x^(-1). For an expression to be a monomial, all variables must be raised to whole-number (non-negative integer) exponents. Here, 'x' has a negative exponent, so it is not a monomial."}]}, {"question": "What is the degree of the monomial -5x^2y^4z?", "options": [{"text": "2", "isCorrect": false, "rationale": "The degree of a monomial is the sum of the exponents of *all* its variables, not just the exponent of 'x'."}, {"text": "4", "isCorrect": false, "rationale": "The degree of a monomial is the sum of the exponents of *all* its variables, not just the exponent of 'y'."}, {"text": "7", "isCorrect": true, "rationale": "The exponents of the variables are 2 for x, 4 for y, and 1 for z (since z = z^1). The sum of these exponents is 2 + 4 + 1 = 7. Thus, the degree of the monomial is 7."}, {"text": "11", "isCorrect": false, "rationale": "The sum of the exponents is 2 + 4 + 1 = 7, not 11."}]}, {"question": "Which of the following polynomials is written in standard form?", "options": [{"text": "3x - 7 + 2x^4 - x^2", "isCorrect": false, "rationale": "The terms are not ordered from greatest degree to least degree. For example, 2x^4 (degree 4) should come before 3x (degree 1)."}, {"text": "-5x^2 + 8x^3 - 4x + 1", "isCorrect": false, "rationale": "The terms are not ordered from greatest degree to least degree. 8x^3 (degree 3) should come before -5x^2 (degree 2)."}, {"text": "2x^4 - x^2 + 3x - 7", "isCorrect": true, "rationale": "The terms are correctly ordered from greatest degree (4 for 2x^4) to least degree (0 for -7), which is the definition of standard form."}, {"text": "x - 5x^2 + 2x^3 - 9", "isCorrect": false, "rationale": "The terms are not ordered from greatest degree to least degree. 2x^3 (degree 3) should be the leading term, followed by -5x^2 (degree 2)."}]}, {"question": "Identify the degree and classify the polynomial 6x^3 - 2x + 7 by the number of terms.", "options": [{"text": "Degree 3 (cubic); 2 terms (binomial)", "isCorrect": false, "rationale": "The polynomial has 3 terms (6x^3, -2x, 7), not 2 terms."}, {"text": "Degree 3 (cubic); 3 terms (trinomial)", "isCorrect": true, "rationale": "The highest degree among its terms is 3 (from 6x^3), classifying it as cubic. It has three terms (6x^3, -2x, 7), classifying it as a trinomial."}, {"text": "Degree 1 (linear); 3 terms (trinomial)", "isCorrect": false, "rationale": "The highest degree is 3, not 1. It is cubic, not linear."}, {"text": "Degree 3 (cubic); 1 term (monomial)", "isCorrect": false, "rationale": "The polynomial has 3 terms, not 1 term. It is a trinomial, not a monomial."}]}, {"question": "What is the result of adding the polynomials (4x^2 - 3x + 1) + (x^2 + 5x - 6)?", "options": [{"text": "5x^2 + 8x - 7", "isCorrect": false, "rationale": "The x terms were added incorrectly (-3x + 5x = 2x, not 8x). The constant terms were also added incorrectly (1 - 6 = -5, not -7)."}, {"text": "5x^2 + 2x - 5", "isCorrect": true, "rationale": "To add polynomials, combine like terms: (4x^2 + x^2) = 5x^2; (-3x + 5x) = 2x; (1 - 6) = -5. So, the sum is 5x^2 + 2x - 5."}, {"text": "4x^2 + 2x - 5", "isCorrect": false, "rationale": "The x^2 terms were not combined correctly (4x^2 + x^2 = 5x^2, not 4x^2)."}, {"text": "5x^2 - 2x - 5", "isCorrect": false, "rationale": "The x terms were combined incorrectly (-3x + 5x = 2x, not -2x)."}]}, {"question": "Subtract the polynomials: (7y^3 + 2y - 4) - (3y^3 - y + 5).", "options": [{"text": "4y^3 + y - 9", "isCorrect": false, "rationale": "The negative sign was not distributed correctly to -y (it should become +y) and +5 (it should become -5). Thus, (2y + y) should be 3y."}, {"text": "4y^3 + 3y - 9", "isCorrect": true, "rationale": "First, distribute the negative sign to the second polynomial: 7y^3 + 2y - 4 - 3y^3 + y - 5. Then combine like terms: (7y^3 - 3y^3) = 4y^3; (2y + y) = 3y; (-4 - 5) = -9. The result is 4y^3 + 3y - 9."}, {"text": "10y^3 + y - 9", "isCorrect": false, "rationale": "The y^3 terms were subtracted, not added (7y^3 - 3y^3 = 4y^3, not 10y^3)."}, {"text": "4y^3 + 3y + 1", "isCorrect": false, "rationale": "The constant terms were combined incorrectly (-4 - 5 = -9, not +1)."}]}, {"question": "A polynomial is in standard form when its terms are arranged in which order?", "options": [{"text": "Alphabetical order of variables", "isCorrect": false, "rationale": "Standard form for polynomials is based on the degree of the terms, not the alphabetical order of variables."}, {"text": "From least degree to greatest degree", "isCorrect": false, "rationale": "Standard form requires terms to be ordered from greatest degree to least degree, not the other way around."}, {"text": "From greatest degree to least degree", "isCorrect": true, "rationale": "The text states, 'A polynomial is in standard form when its terms are written in order from greatest degree to least degree.'"}, {"text": "By the number of variables in each term", "isCorrect": false, "rationale": "Standard form is determined by the degree of the terms, which is the sum of exponents of variables, not just the count of variables."}]}, {"question": "Consider the expression x^3 - 2x^2 + 5x - 1. What is its classification based on degree and number of terms?", "options": [{"text": "Linear polynomial", "isCorrect": false, "rationale": "The highest degree is 3, making it cubic, not linear (degree 1)."}, {"text": "Quadratic trinomial", "isCorrect": false, "rationale": "The highest degree is 3, making it cubic, not quadratic (degree 2). It also has 4 terms, not 3."}, {"text": "Cubic polynomial", "isCorrect": true, "rationale": "The highest degree among its terms is 3 (from x^3), classifying it as cubic. It has 4 terms (x^3, -2x^2, 5x, -1), for which there is no special name beyond 'polynomial'."}, {"text": "Cubic monomial", "isCorrect": false, "rationale": "The expression has 4 terms, not 1 term, so it is not a monomial."}]}, {"question": "Simplify: (4a^2b - 3ab + 7) - (a^2b + 5ab - 2).", "options": [{"text": "3a^2b + 2ab + 5", "isCorrect": false, "rationale": "When distributing the negative sign, -3ab - (+5ab) should be -3ab - 5ab = -8ab, not +2ab. Also, 7 - (-2) should be 7 + 2 = 9, not 5."}, {"text": "3a^2b - 8ab + 9", "isCorrect": true, "rationale": "First, distribute the negative sign: 4a^2b - 3ab + 7 - a^2b - 5ab + 2. Then combine like terms: (4a^2b - a^2b) = 3a^2b; (-3ab - 5ab) = -8ab; (7 + 2) = 9. The simplified expression is 3a^2b - 8ab + 9."}, {"text": "5a^2b + 2ab + 5", "isCorrect": false, "rationale": "The a^2b terms were subtracted incorrectly (4a^2b - a^2b = 3a^2b, not 5a^2b). The ab terms and constants were also incorrect."}, {"text": "3a^2b + 8ab + 5", "isCorrect": false, "rationale": "The ab terms were combined incorrectly (-3ab - 5ab = -8ab, not +8ab). The constant terms were also incorrect."}]}, {"question": "What does it mean for polynomials to be 'closed under addition and subtraction'?", "options": [{"text": "The sum or difference of two polynomials can sometimes be a constant, but not always a polynomial.", "isCorrect": false, "rationale": "Closure means that the result is *always* another polynomial. Constants are polynomials of degree 0."}, {"text": "The sum or difference of two polynomials is always another polynomial.", "isCorrect": true, "rationale": "The note explicitly states, 'Polynomials are closed under addition and subtraction. This means that the sum or difference of two polynomials is always another polynomial.'"}, {"text": "The sum or difference of two polynomials will always have the same degree as the highest degree polynomial involved.", "isCorrect": false, "rationale": "While often true, this is not the definition of closure. For example, (x^2+1) - (x^2-1) = 2, which has a different (lower) degree. Closure refers to the type of expression."}, {"text": "Adding or subtracting polynomials results in an expression that cannot be further simplified.", "isCorrect": false, "rationale": "This describes simplification, not the mathematical property of closure."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
