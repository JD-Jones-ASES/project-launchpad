<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra: The First Year &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Algebra_I_Textbook.html">&larr; Back to Algebra: The First Year</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Algebra: The First Year &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic of a solution to a system of two linear equations in two variables?", "options": [{"text": "It is a single numerical value that satisfies the first equation.", "isCorrect": false, "rationale": "A solution is an ordered pair, not a single value, and must satisfy both equations, not just the first."}, {"text": "It is an ordered pair (x, y) that makes both equations in the system true simultaneously.", "isCorrect": true, "rationale": "According to the text, a solution is an ordered pair (x, y) that makes both equations true. Graphically, it is the point where the two lines intersect."}, {"text": "It represents the y-intercept of the second equation.", "isCorrect": false, "rationale": "The y-intercept of one equation does not necessarily satisfy both equations or represent the system's solution."}, {"text": "It is the point where one line crosses the x-axis.", "isCorrect": false, "rationale": "The point where one line crosses the x-axis (its x-intercept) is generally not the solution to the system unless both lines happen to intersect there."}], "id": "q01"}, {"question": "Graphically, what does the solution to a system of two linear equations represent?", "options": [{"text": "The x-intercept of the first line.", "isCorrect": false, "rationale": "The x-intercept of the first line is only a solution if it also lies on the second line, which is not generally true."}, {"text": "The point where the two lines intersect on the coordinate plane.", "isCorrect": true, "rationale": "The text explicitly states that 'Graphically, [a solution] is the point where the two lines intersect.'"}, {"text": "The sum of the slopes of the two lines.", "isCorrect": false, "rationale": "The sum of the slopes is a numerical value, not a point, and does not represent the solution."}, {"text": "The midpoint between the two y-intercepts.", "isCorrect": false, "rationale": "The midpoint between y-intercepts has no direct relationship to the solution of a system."}], "id": "q02"}, {"question": "A system of linear equations is classified as 'consistent and independent' when:", "options": [{"text": "The lines are parallel and never intersect.", "isCorrect": false, "rationale": "Parallel lines represent an 'inconsistent' system with no solution."}, {"text": "The lines are the same line, overlapping at every point.", "isCorrect": false, "rationale": "This describes a 'consistent and dependent' system with infinitely many solutions."}, {"text": "The lines intersect at exactly one unique point.", "isCorrect": true, "rationale": "The text defines 'One solution' systems, where 'the lines intersect at exactly one point,' as 'consistent and independent.'"}, {"text": "The lines have the same slope but different y-intercepts.", "isCorrect": false, "rationale": "This describes parallel lines, which form an 'inconsistent' system."}], "id": "q03"}, {"question": "Which scenario describes an inconsistent system of linear equations?", "options": [{"text": "The two lines have different slopes and different y-intercepts.", "isCorrect": false, "rationale": "Different slopes and different y-intercepts indicate intersecting lines, which form a 'consistent and independent' system."}, {"text": "The equations represent the same line.", "isCorrect": false, "rationale": "This describes a 'consistent and dependent' system."}, {"text": "The lines are parallel, having the same slope but different y-intercepts.", "isCorrect": true, "rationale": "The text states that 'No solution' occurs when 'the lines are parallel (same slope, different y-intercepts),' and that 'The system is inconsistent.'"}, {"text": "The lines intersect at two distinct points.", "isCorrect": false, "rationale": "Two distinct linear equations can intersect at most at one point, not two."}], "id": "q04"}, {"question": "If two linear equations in a system are graphed and they turn out to be the exact same line, how is the system classified?", "options": [{"text": "Inconsistent", "isCorrect": false, "rationale": "An inconsistent system has no solution, meaning parallel lines that never intersect."}, {"text": "Consistent and independent", "isCorrect": false, "rationale": "A consistent and independent system has exactly one solution, meaning the lines intersect at a single point."}, {"text": "Consistent and dependent", "isCorrect": true, "rationale": "The text states that when 'the lines are the same line,' the system has 'Infinitely many solutions' and is 'consistent and dependent.'"}, {"text": "No solution", "isCorrect": false, "rationale": "A system with 'no solution' consists of parallel lines that do not intersect."}], "id": "q05"}, {"question": "Consider the system: y = 3x - 5 and y = 3x + 1. Without graphing, how would you classify this system?", "options": [{"text": "Consistent and independent, with one solution.", "isCorrect": false, "rationale": "For one solution, the slopes must be different. Here, both slopes are 3."}, {"text": "Inconsistent, with no solution.", "isCorrect": true, "rationale": "Both equations have a slope of 3, indicating they are parallel. However, their y-intercepts are different (-5 and 1), meaning they are distinct parallel lines that will never intersect, leading to no solution and an inconsistent system."}, {"text": "Consistent and dependent, with infinitely many solutions.", "isCorrect": false, "rationale": "For infinitely many solutions, both the slope and the y-intercepts must be identical for both equations. Here, the y-intercepts are different."}, {"text": "It cannot be classified without graphing them.", "isCorrect": false, "rationale": "By comparing the slope-intercept form (y = mx + b) of both equations, we can determine their relationship (slopes, y-intercepts) and thus classify the system algebraically without needing to graph."}], "id": "q06"}, {"question": "The textbook states, 'When you estimate a solution from a graph, always check the answer by substituting into both original equations.' Why is this step crucial?", "options": [{"text": "To ensure the y-intercepts of the lines were plotted correctly.", "isCorrect": false, "rationale": "While correct plotting is important, checking the solution directly verifies the intersection point, not the individual intercepts."}, {"text": "To determine if the system is consistent or inconsistent before drawing the graph.", "isCorrect": false, "rationale": "The check is performed *after* estimating a solution from a graph, not before drawing it, and helps verify the specific point, not the general system type before graphing."}, {"text": "To confirm that the estimated graphical solution satisfies both equations and is exact, especially if coordinates are fractional.", "isCorrect": true, "rationale": "The note explicitly mentions that 'Graphing can give approximate answers, especially when the intersection point has fractional coordinates,' making checking essential for exact confirmation."}, {"text": "To prepare for learning algebraic methods in later sections.", "isCorrect": false, "rationale": "While true that algebraic methods are coming, the immediate reason for checking is to validate the graphical solution, not to prepare for future topics."}], "id": "q07"}, {"question": "What is a known limitation of solving a system of linear equations solely by graphing?", "options": [{"text": "It cannot be used for systems with parallel lines.", "isCorrect": false, "rationale": "Graphing clearly shows parallel lines, indicating no solution, so it can be used for such systems."}, {"text": "It only works if both equations are initially in slope-intercept form.", "isCorrect": false, "rationale": "Equations can be rewritten into slope-intercept form or graphed using other methods (e.g., intercepts), so this is not a fundamental limitation of the graphing method itself."}, {"text": "It may provide approximate answers, especially when the intersection point has fractional coordinates.", "isCorrect": true, "rationale": "The 'note' section explicitly states that 'Graphing can give approximate answers, especially when the intersection point has fractional coordinates.'"}, {"text": "It is impossible to check the solution once found using this method.", "isCorrect": false, "rationale": "The text specifically advises to 'always check the answer by substituting into both original equations' after estimating a solution from a graph."}], "id": "q08"}, {"question": "Is the ordered pair (1, 4) a solution to the system: y = x + 3 and y = -2x + 6?", "options": [{"text": "No, because it only satisfies the first equation.", "isCorrect": false, "rationale": "A solution must satisfy both equations. If it only satisfies one, it is not a solution to the system."}, {"text": "Yes, because substituting (1, 4) into both equations results in true statements (4 = 1 + 3 and 4 = -2(1) + 6).", "isCorrect": true, "rationale": "Substituting x=1, y=4 into the first equation: 4 = 1 + 3 (True). Substituting x=1, y=4 into the second equation: 4 = -2(1) + 6 => 4 = -2 + 6 => 4 = 4 (True). Since it satisfies both, it is a solution."}, {"text": "No, because the slopes of the lines are different, so there is no solution.", "isCorrect": false, "rationale": "Different slopes indicate there *is* one unique solution. This option incorrectly assumes no solution and does not check the given point."}, {"text": "Yes, because it is the y-intercept of the second equation.", "isCorrect": false, "rationale": "The y-intercept of the second equation is (0, 6). The point (1, 4) is not a y-intercept, and a y-intercept is not necessarily the system's solution."}], "id": "q09"}, {"question": "If a system of linear equations has 'no solution,' what must be true about the lines when graphed?", "options": [{"text": "They intersect at the origin (0, 0).", "isCorrect": false, "rationale": "Intersecting at the origin would mean one solution, which is (0, 0)."}, {"text": "They are perpendicular to each other.", "isCorrect": false, "rationale": "Perpendicular lines intersect at one point, meaning one solution."}, {"text": "They are parallel and never intersect.", "isCorrect": true, "rationale": "The text explicitly states that 'No solution' occurs when 'the lines are parallel (same slope, different y-intercepts)' and therefore 'never intersect.'"}, {"text": "They coincide, meaning they are the exact same line.", "isCorrect": false, "rationale": "Coinciding lines represent a system with infinitely many solutions, not no solution."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
