        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which statement best explains why heavier atomic nuclei generally require more neutrons than protons to remain stable?", "options": [{"text": "Neutrons increase the overall mass, which directly contributes to stability regardless of charge.", "isCorrect": false, "rationale": "While neutrons add mass, their primary role in stability for heavier elements is to increase the attractive strong nuclear force without adding to the electrical repulsion, not simply to increase mass."}, {"text": "Neutrons provide additional strong nuclear force attraction without adding electrical repulsion, helping to counteract the growing repulsion between multiple protons.", "isCorrect": true, "rationale": "For heavier elements, the increasing number of protons leads to stronger electrical repulsion. Neutrons are crucial because they contribute to the attractive strong nuclear force (proton-neutron and neutron-neutron) without introducing any additional repulsive electrical force, thus stabilizing the nucleus."}, {"text": "Neutrons absorb excess energy from protons, preventing them from destabilizing the nucleus.", "isCorrect": false, "rationale": "Neutrons don't 'absorb' energy from protons in this manner to prevent instability. Their role is structural, contributing to the strong nuclear force."}, {"text": "Neutrons decrease the overall density of the nucleus, making it less prone to breaking apart.", "isCorrect": false, "rationale": "Nuclear stability is governed by the balance of forces within the tiny nuclear volume, not primarily by changes in overall density of the nucleus."}]}, {"question": "An atom undergoes radioactive decay, emitting a beta particle. Which of the following accurately describes the change in the atom's nucleus?", "options": [{"text": "The atomic number decreases by 1, and the mass number remains the same.", "isCorrect": false, "rationale": "During beta decay, a neutron converts into a proton, increasing the atomic number, not decreasing it. The mass number remains largely unchanged as a neutron is replaced by a proton of similar mass."}, {"text": "The atomic number increases by 1, and the mass number decreases by 4.", "isCorrect": false, "rationale": "The atomic number does increase by 1, but the mass number remains essentially the same, as the total number of nucleons (protons + neutrons) does not change significantly. A decrease in mass number by 4 is characteristic of alpha decay."}, {"text": "The atomic number increases by 1, and the mass number remains the same.", "isCorrect": true, "rationale": "When a nucleus emits a beta particle, a neutron transforms into a proton and an electron. The electron is ejected, but the new proton stays in the nucleus. This increases the atomic number (number of protons) by 1, while the total number of nucleons (mass number) remains constant."}, {"text": "The atomic number decreases by 2, and the mass number decreases by 4.", "isCorrect": false, "rationale": "This description matches the changes that occur during alpha decay, where 2 protons and 2 neutrons (a helium nucleus) are emitted."}]}, {"question": "Which type of radiation listed below consists of high-energy electromagnetic waves and has the highest penetrating power?", "options": [{"text": "Alpha particle", "isCorrect": false, "rationale": "Alpha particles are composed of 2 protons and 2 neutrons, have a +2 charge, and have the lowest penetrating power, easily stopped by paper."}, {"text": "Beta particle", "isCorrect": false, "rationale": "Beta particles are high-speed electrons with a -1 charge and moderate penetrating power, stopped by thin aluminum."}, {"text": "Gamma ray", "isCorrect": true, "rationale": "Gamma rays are high-energy electromagnetic waves (photons) with no charge and no mass. They have the highest penetrating power and require thick lead or concrete for shielding."}, {"text": "Neutron radiation", "isCorrect": false, "rationale": "Neutron radiation is not one of the three main types of radiation discussed in this section (alpha, beta, gamma), although it exists. Gamma rays are explicitly described as high-energy electromagnetic waves with very high penetrating power."}]}, {"question": "A medical facility is preparing to dispose of a sample of Technetium-99m, which has a half-life of 6 hours. If the initial sample has an activity of 100 MBq (MegaBecquerel), how much Technetium-99m activity will remain after 24 hours?", "options": [{"text": "50 MBq", "isCorrect": false, "rationale": "50 MBq would remain after only 1 half-life (6 hours), not 24 hours."}, {"text": "25 MBq", "isCorrect": false, "rationale": "25 MBq would remain after 2 half-lives (12 hours), not 24 hours."}, {"text": "12.5 MBq", "isCorrect": false, "rationale": "12.5 MBq would remain after 3 half-lives (18 hours), not 24 hours."}, {"text": "6.25 MBq", "isCorrect": true, "rationale": "First, calculate the number of half-lives: 24 hours / 6 hours/half-life = 4 half-lives. Starting with 100 MBq: After 1st half-life (6 hrs): 100/2 = 50 MBq. After 2nd half-life (12 hrs): 50/2 = 25 MBq. After 3rd half-life (18 hrs): 25/2 = 12.5 MBq. After 4th half-life (24 hrs): 12.5/2 = 6.25 MBq."}]}, {"question": "Radiocarbon dating is an effective method for determining the age of ancient organic materials up to about 50,000 years old. This limitation primarily stems from which characteristic of carbon-14?", "options": [{"text": "The continuous production of carbon-14 in the atmosphere, which complicates initial concentration estimates.", "isCorrect": false, "rationale": "While carbon-14 is continuously produced, living organisms reach an equilibrium with atmospheric levels. The limitation comes from the decay over time, not primarily the production mechanism."}, {"text": "Carbon-14's relatively short half-life of 5,730 years, leading to very little remaining C-14 after many half-lives.", "isCorrect": true, "rationale": "After approximately 50,000 years (roughly 9 half-lives of C-14), the amount of remaining carbon-14 becomes extremely small, making it very difficult to measure accurately. This short half-life limits its useful dating range."}, {"text": "The interference from other radioactive isotopes in the fossil, masking the carbon-14 signal.", "isCorrect": false, "rationale": "While other isotopes may be present, the primary limitation for carbon dating specifically is the diminishing amount of carbon-14 itself, not interference from other isotopes."}, {"text": "The absorption of carbon-14 by organisms ceasing immediately upon death, which is hard to pinpoint precisely.", "isCorrect": false, "rationale": "The 'stopping' point is assumed to be death, which is a reasonable approximation. The limitation is about how much C-14 is left to measure accurately after extended decay, not the initial moment of cessation."}]}, {"question": "A scientist is working with a highly radioactive gamma-emitting source. To minimize personal exposure, which of the following combined strategies would be most effective?", "options": [{"text": "Working quickly and using thick plastic gloves.", "isCorrect": false, "rationale": "Working quickly ('time' principle) is good, but thick plastic gloves are insufficient shielding for gamma rays. Gamma rays require much denser materials like lead or concrete."}, {"text": "Maintaining a maximum distance from the source and using a thin aluminum sheet as a barrier.", "isCorrect": false, "rationale": "Maintaining distance ('distance' principle) is effective, but a thin aluminum sheet is only sufficient for beta particles, not gamma rays."}, {"text": "Minimizing the time spent near the source, maximizing the distance from it, and using a thick lead shield.", "isCorrect": true, "rationale": "This option incorporates all three key principles of radiation safety: 'Time' (minimize exposure duration), 'Distance' (radiation intensity decreases with distance), and 'Shielding' (thick lead is effective for blocking gamma rays)."}, {"text": "Only handling the source with a robotic arm and wearing a full-body radiation suit made of synthetic fibers.", "isCorrect": false, "rationale": "A robotic arm implies distance, which is good. However, a 'full-body radiation suit made of synthetic fibers' offers minimal to no protection against penetrating gamma radiation; specialized shielding is required."}]}, {"question": "Which of the following scenarios is an example of radioactivity being applied for medical treatment rather than diagnosis?", "options": [{"text": "Using Technetium-99m to image bone structures and detect fractures.", "isCorrect": false, "rationale": "Technetium-99m is used for diagnostic imaging, where its emitted radiation helps visualize internal structures, not directly treat a disease."}, {"text": "Administering Iodine-131 to a patient with an overactive thyroid gland to destroy specific thyroid cells.", "isCorrect": true, "rationale": "Iodine-131 is used to treat thyroid cancer or hyperthyroidism by targeting and destroying thyroid cells with its emitted radiation, making it a therapeutic application."}, {"text": "Injecting a radioisotope that travels through the bloodstream to monitor blood flow in the heart.", "isCorrect": false, "rationale": "Monitoring blood flow is a diagnostic procedure, providing information about a condition rather than directly treating it."}, {"text": "Using an alpha emitter in a smoke detector to create an electric current for alarm activation.", "isCorrect": false, "rationale": "Smoke detectors are an industrial application, not a medical treatment or diagnosis."}]}, {"question": "What fundamental principle explains why most atoms are stable, despite the strong electrical repulsion between positively charged protons packed closely together in the nucleus?", "options": [{"text": "The gravitational force within the nucleus is strong enough to overcome the electrical repulsion.", "isCorrect": false, "rationale": "Gravity is far too weak at the nuclear scale to counteract the immense electrical repulsion between protons."}, {"text": "The strong nuclear force, which is the most powerful force in nature, binds protons and neutrons together over short distances.", "isCorrect": true, "rationale": "The strong nuclear force is indeed the most powerful force in nature, acting specifically over the tiny distances within the nucleus to attract protons to protons, protons to neutrons, and neutrons to neutrons, effectively overcoming the electrical repulsion between protons."}, {"text": "The presence of electrons within the nucleus neutralizes the positive charge of the protons.", "isCorrect": false, "rationale": "Electrons exist outside the nucleus; they are not found within the nucleus neutralizing proton charges. Beta decay involves a neutron transforming into a proton and an electron, but electrons are not inherent nuclear components in a stabilizing role."}, {"text": "The rapid movement of protons within the nucleus prevents them from experiencing sustained repulsion.", "isCorrect": false, "rationale": "While particles in the nucleus are in motion, their kinetic energy does not inherently 'prevent' repulsion. The stability comes from a stronger attractive force."}]}, {"question": "A scientist finds an ancient wooden artifact and wants to determine its age. Which radioactive isotope would be most appropriate for dating this material, and why?", "options": [{"text": "Uranium-238, because its very long half-life allows dating of extremely old objects.", "isCorrect": false, "rationale": "Uranium-238 is used for dating geological formations (rocks) due to its extremely long half-life, but it's not present in organic materials in measurable quantities for carbon dating."}, {"text": "Iodine-131, because its short half-life makes it decay quickly, indicating recent activity.", "isCorrect": false, "rationale": "Iodine-131 has a very short half-life (8 days) and is used in medicine; it would have decayed almost entirely within a few months, making it useless for dating ancient artifacts."}, {"text": "Carbon-14, because living organisms absorb it, and its decay rate allows dating of organic matter up to ~50,000 years.", "isCorrect": true, "rationale": "Carbon-14 is continuously produced and absorbed by living organisms. Upon death, absorption stops, and the remaining C-14 decays with a half-life of 5,730 years, making it ideal for dating organic materials like wood within its effective range."}, {"text": "Cobalt-60, because it emits gamma rays that can penetrate thick materials.", "isCorrect": false, "rationale": "Cobalt-60 is used in radiation therapy for its gamma emissions but is not suitable for dating organic artifacts, as it's not incorporated into living tissues in a way that allows for chronological measurement."}]}, {"question": "Radioactive decay is described as a 'random process' at the individual atomic level, yet the half-life of a sample is constant and predictable. What does this statement imply about radioactive decay?", "options": [{"text": "Individual atoms decay predictably, but the overall sample behavior is random.", "isCorrect": false, "rationale": "The text explicitly states that 'you cannot predict which individual atom in a sample will decay next,' contradicting the idea of predictable individual decay."}, {"text": "The rate of decay for a specific isotope is constant for a large collection of atoms, even though the decay of any single atom is probabilistic.", "isCorrect": true, "rationale": "This accurately reflects the concept: while the exact moment a single atom decays is random and unpredictable, for a sufficiently large sample, the statistical average (the time it takes for half the sample to decay) is a fixed and reliable constant for that isotope."}, {"text": "The half-life changes significantly with environmental factors like temperature and pressure, making individual decay random.", "isCorrect": false, "rationale": "The text states that half-life 'is constant and unaffected by temperature, pressure, or chemical reactions,' directly refuting this option."}, {"text": "All radioactive atoms in a sample decay simultaneously after exactly one half-life.", "isCorrect": false, "rationale": "This is incorrect. Only half of the radioactive atoms decay after one half-life, and the decay is continuous and exponential, not simultaneous."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
