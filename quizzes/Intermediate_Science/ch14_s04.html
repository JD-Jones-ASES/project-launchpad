    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 14, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What fundamental physical concept does 'power' quantify?", "options": [{"text": "The total amount of energy an object possesses.", "isCorrect": false, "rationale": "This describes energy itself, not the rate at which it's used or transferred."}, {"text": "The rate at which work is done or energy is transferred.", "isCorrect": true, "rationale": "The text defines power precisely as 'The rate at which work is done or energy is transferred,' emphasizing how quickly energy is used or delivered."}, {"text": "The force applied to an object over a certain distance.", "isCorrect": false, "rationale": "This describes the definition of work (W = Fd), not power."}, {"text": "The ability of an object to do work.", "isCorrect": false, "rationale": "This is a common definition for energy, not power."}], "id": "q01"}, {"question": "A crane lifts a 500 kg beam to a height of 20 m in 25 s. Assuming g = 9.8 m/s², what is the power output of the crane?", "options": [{"text": "1000 W", "isCorrect": false, "rationale": "This calculation is incorrect. The work done is (500 kg)(9.8 m/s²)(20 m) = 98000 J. Power is work divided by time: 98000 J / 25 s = 3920 W."}, {"text": "3920 W", "isCorrect": true, "rationale": "First, calculate the work done: W = Fd = mgd = (500 kg)(9.8 m/s²)(20 m) = 98000 J. Then, calculate power: P = W/t = 98000 J / 25 s = 3920 W."}, {"text": "98000 W", "isCorrect": false, "rationale": "This value represents the work done in Joules, not the power output in Watts."}, {"text": "490000 W", "isCorrect": false, "rationale": "This calculation is incorrect. The work done is (500 kg)(9.8 m/s²)(20 m) = 98000 J. Power is work divided by time: 98000 J / 25 s = 3920 W."}], "id": "q02"}, {"question": "An engine applies a constant force of 1500 N to move a vehicle at a steady speed of 20 m/s. What is the power output of the engine?", "options": [{"text": "75 W", "isCorrect": false, "rationale": "This would be the result of dividing force by speed, not multiplying them. Power in this context is P = Fv."}, {"text": "30000 W", "isCorrect": true, "rationale": "The text provides the formula P = Fv, where F is force and v is speed. So, P = (1500 N)(20 m/s) = 30000 W."}, {"text": "1500 J", "isCorrect": false, "rationale": "This value represents the force, not the power, and the unit is incorrect for power."}, {"text": "300000 W", "isCorrect": false, "rationale": "This calculation is incorrect. Power is the product of force and speed: (1500 N)(20 m/s) = 30000 W."}], "id": "q03"}, {"question": "Which of the following units, commonly found on electricity bills, is a measure of energy, not power?", "options": [{"text": "Watt (W)", "isCorrect": false, "rationale": "The watt is the SI unit of power, representing one joule per second."}, {"text": "Kilowatt (kW)", "isCorrect": false, "rationale": "A kilowatt is 1000 watts, making it a larger unit of power, not energy."}, {"text": "Horsepower (hp)", "isCorrect": false, "rationale": "Horsepower is an older unit of power, equivalent to approximately 746 watts."}, {"text": "Kilowatt-hour (kWh)", "isCorrect": true, "rationale": "The text explicitly states that 'Kilowatt-hour (kWh): a unit of energy (not power) used on electricity bills' and shows its conversion to Joules (energy)."}], "id": "q04"}, {"question": "A high-power electric oven uses 3000 W when cooking. If you use the oven for 2 hours, and electricity costs $0.10 per kWh, how much does it cost?", "options": [{"text": "$0.60", "isCorrect": true, "rationale": "First, convert power to kilowatts: 3000 W = 3 kW. Then calculate total energy consumed: 3 kW * 2 hours = 6 kWh. Finally, calculate the cost: 6 kWh * $0.10/kWh = $0.60."}, {"text": "$0.30", "isCorrect": false, "rationale": "This calculation is incorrect. (3 kW * 2 hr * $0.10/kWh = $0.60)."}, {"text": "$3.00", "isCorrect": false, "rationale": "This calculation is incorrect. (3 kW * 2 hr * $0.10/kWh = $0.60)."}, {"text": "$6.00", "isCorrect": false, "rationale": "This value represents the total kWh consumed if the cost was $1.00/kWh, not the actual cost."}], "id": "q05"}, {"question": "According to Noether's theorem, as described in the text, what conserved quantity is directly linked to the fact that the laws of physics are the same at every location in space?", "options": [{"text": "Energy", "isCorrect": false, "rationale": "The text states that the conservation of energy is a consequence of the laws of physics being the same at every point in time (time symmetry)."}, {"text": "Momentum", "isCorrect": true, "rationale": "Noether's theorem states that 'The laws of physics are the same at every location in space => momentum is conserved.'"}, {"text": "Angular momentum", "isCorrect": false, "rationale": "The text states that the conservation of angular momentum is a consequence of the laws of physics being the same regardless of orientation (rotational symmetry)."}, {"text": "Power", "isCorrect": false, "rationale": "Power is a rate of energy transfer, not a conserved quantity described by Noether's theorem in relation to spatial symmetry."}], "id": "q06"}, {"question": "The 'Roller Coaster Energy' investigation described in the text is primarily designed to explore:", "options": [{"text": "Methods for building frictionless tracks for optimal marble speed.", "isCorrect": false, "rationale": "The investigation explicitly focuses on identifying and quantifying energy 'lost' to friction, not eliminating it completely."}, {"text": "The relationship between a marble's mass and its acceleration on an incline.", "isCorrect": false, "rationale": "While related to motion, the primary focus is on energy transformations and conservation, not specifically mass-acceleration relationships on inclines."}, {"text": "The principle of conservation of energy and the effects of non-conservative forces.", "isCorrect": true, "rationale": "The investigation's goal is to compare predicted maximum height (from energy conservation with no friction) to the actual maximum height reached, and to calculate energy 'lost' to friction."}, {"text": "How to measure the exact velocity of a rolling object at various points on a complex track.", "isCorrect": false, "rationale": "Measuring speed is mentioned as an optional advanced step, but it's not the central purpose of the investigation; the focus is on energy conservation and losses."}], "id": "q07"}, {"question": "In the 'Roller Coaster Energy' investigation, if a marble is released from rest at the top of a hill, why does it never reach the exact same starting height on a subsequent hill, even with a well-constructed track?", "options": [{"text": "The gravitational potential energy changes unpredictably as the marble moves.", "isCorrect": false, "rationale": "Gravitational potential energy is predictable (PE=mgh) and consistent at a given height."}, {"text": "Some of the marble's mechanical energy is converted into thermal energy (heat) and sound due to friction.", "isCorrect": true, "rationale": "The text explicitly states that 'friction converts some energy to heat' and the analysis section asks to 'Calculate the energy 'lost' to friction' and 'Where did this energy go?'."}, {"text": "The marble's mass increases as it travels, requiring more energy to ascend.", "isCorrect": false, "rationale": "The marble's mass remains constant throughout the experiment."}, {"text": "The elastic potential energy stored in the track prevents it from reaching the full height.", "isCorrect": false, "rationale": "The track material is not described as storing significant elastic potential energy in a way that would prevent the marble from reaching its initial height."}], "id": "q08"}, {"question": "Electric cars use 'regenerative braking' to convert kinetic energy back into electrical energy. According to the 'Think Deeper' section, why can't 100% of the car's kinetic energy be recovered this way?", "options": [{"text": "The electric motor can only function as a generator at specific, high speeds.", "isCorrect": false, "rationale": "The text does not specify speed limitations but rather inherent inefficiencies in the conversion process."}, {"text": "Some energy is invariably lost as heat due to electrical resistance and mechanical friction within the system.", "isCorrect": true, "rationale": "The 'Think Deeper Guidance' states that 'some energy is inevitably lost as heat in the motor's wires (electrical resistance), mechanical friction in the drive train, and sound,' making 100% recovery impossible."}, {"text": "The converted electrical energy is incompatible with the battery's storage capacity.", "isCorrect": false, "rationale": "The system is designed to convert kinetic energy into electrical energy that can be stored in the battery, so incompatibility is not the reason for inefficiency."}, {"text": "The law of conservation of energy dictates that some energy must always be destroyed during conversion.", "isCorrect": false, "rationale": "The law of conservation of energy states that energy cannot be destroyed, only transformed. The 'loss' is due to conversion into unusable forms like heat, not destruction."}], "id": "q09"}, {"question": "Student A sprints up a flight of stairs in 5 seconds, while Student B walks up the same stairs in 15 seconds. Both students carry identical 10 kg backpacks. How do their work done and power output compare?", "options": [{"text": "Student A does more work and has a higher power output.", "isCorrect": false, "rationale": "Both students do the same amount of work because they apply the same force (to lift themselves and the backpack) over the same height."}, {"text": "Both students do the same amount of work, but Student A has three times the power output.", "isCorrect": true, "rationale": "The text explicitly states: 'Both do the same amount of work (same force, same height), but Student A does it three times faster.' Since power is work/time, doing the same work in 1/3 the time means 3 times the power (P_A = W/5s; P_B = W/15s; P_A = 3 * P_B)."}, {"text": "Student B does less work but has a higher power output.", "isCorrect": false, "rationale": "Both students do the same amount of work. Student B takes longer, so their power output is lower."}, {"text": "Both students have the same power output, but Student B does more work.", "isCorrect": false, "rationale": "Neither statement is correct. Power output is different, and work done is the same."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
