    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    <div class="quiz-footer">

<script>
var QUESTIONS = [{"question": "Which statement best describes the complementary relationship between photosynthesis and cellular respiration?", "options": [{"text": "Photosynthesis consumes O2 and produces CO2, while respiration consumes CO2 and produces O2.", "isCorrect": false, "rationale": "This statement incorrectly swaps the reactants and products for both processes. Photosynthesis consumes CO2 and produces O2, while respiration consumes O2 and produces CO2."}, {"text": "The products of photosynthesis serve as the reactants for cellular respiration, forming a continuous cycle.", "isCorrect": true, "rationale": "The text explicitly states: 'The products of photosynthesis — glucose and oxygen — are exactly the reactants of cellular respiration. And the products of respiration — carbon dioxide and water — are the reactants of photosynthesis. The two processes form a continuous loop.'"}, {"text": "Both processes primarily store energy in organic molecules, but respiration occurs only in animals.", "isCorrect": false, "rationale": "While photosynthesis stores energy, respiration releases it. Also, the text notes that plants perform cellular respiration, especially in the dark."}, {"text": "Cellular respiration directly uses light energy to create ATP, which then powers photosynthesis.", "isCorrect": false, "rationale": "Photosynthesis uses light energy, not cellular respiration. Cellular respiration breaks down organic molecules to produce ATP, and photosynthesis uses light energy to build organic molecules."}]}, {"question": "How have photosynthetic organisms significantly influenced Earth's atmospheric composition over geological time?", "options": [{"text": "They continuously absorb oxygen from the atmosphere, leading to its depletion.", "isCorrect": false, "rationale": "Photosynthetic organisms produce oxygen, they do not deplete it from the atmosphere."}, {"text": "Their activity has dramatically increased atmospheric CO2, causing global warming.", "isCorrect": false, "rationale": "Photosynthesis removes CO2 from the atmosphere, thus reducing CO2 levels, not increasing them."}, {"text": "They are responsible for building up atmospheric oxygen from near zero to its current level of 21%.", "isCorrect": true, "rationale": "The text states: 'Over billions of years, photosynthetic organisms have built up the oxygen in our atmosphere from nearly zero to the current 21%, making aerobic life — including human life — possible.'"}, {"text": "They convert nitrogen gas into usable forms for other organisms, altering atmospheric nitrogen levels.", "isCorrect": false, "rationale": "While some organisms fix nitrogen, the text focuses on the role of photosynthesis in cycling carbon and oxygen, not nitrogen."}]}, {"question": "In the context of the 'Energy Flow: From Sun to Cells' described in the text, what happens to the energy that flows through living systems?", "options": [{"text": "It is continuously recycled between producers and consumers within the ecosystem.", "isCorrect": false, "rationale": "The text explicitly states: 'the energy that flows through living systems is not recycled; only the matter (carbon, oxygen, hydrogen) is recycled.'"}, {"text": "It is converted into matter and stored indefinitely within organisms, forming fossil fuels.", "isCorrect": false, "rationale": "Energy is not converted into matter. While some organic matter can form fossil fuels, the energy within living systems is not indefinitely stored but rather used and dissipated."}, {"text": "It eventually dissipates as thermal energy (heat), requiring a continuous input from the Sun.", "isCorrect": true, "rationale": "The text states: 'At every step of this chain, some energy is lost as thermal energy (heat). This is why ecosystems require a continuous input of energy from the Sun — the energy that flows through living systems is not recycled.'"}, {"text": "It is primarily used to break down water molecules, releasing hydrogen for cellular fuel.", "isCorrect": false, "rationale": "While water is a reactant in photosynthesis, the primary use of the released energy from glucose breakdown (respiration) is to produce ATP, which powers cellular activities, not primarily to break down water for hydrogen fuel."}]}, {"question": "A critical difference between the cycling of matter (like carbon) and the flow of energy in an ecosystem, as highlighted in the text, is that:", "options": [{"text": "Energy is recycled indefinitely, while matter is continuously lost from the system.", "isCorrect": false, "rationale": "This statement is incorrect. The text clearly states that energy is NOT recycled, but rather flows through and is lost, while matter IS recycled."}, {"text": "Both matter and energy are completely recycled, maintaining a perfect ecological balance.", "isCorrect": false, "rationale": "This is incorrect. The text explicitly differentiates, stating energy is not recycled, only matter is."}, {"text": "Matter flows in one direction and is eventually lost, whereas energy is constantly recycled.", "isCorrect": false, "rationale": "This reverses the roles of energy and matter described in the text. Matter cycles, energy flows and is lost."}, {"text": "Matter is recycled through biogeochemical cycles, while energy flows directionally and is largely lost as heat.", "isCorrect": true, "rationale": "The text emphasizes: 'the energy that flows through living systems is not recycled; only the matter (carbon, oxygen, hydrogen) is recycled.' It also notes that energy is lost as thermal energy (heat)."}]}, {"question": "Beyond photosynthesis and cellular respiration, which of the following is NOT described as a major player in the carbon cycle within the provided text?", "options": [{"text": "Decomposition by bacteria and fungi.", "isCorrect": false, "rationale": "The text explicitly mentions: 'Decomposition: When organisms die, decomposers (bacteria and fungi) break down their organic matter through cellular respiration, releasing CO2.'"}, {"text": "Formation and combustion of fossil fuels.", "isCorrect": false, "rationale": "The text explicitly mentions: 'Fossil fuels: Over millions of years, some organic matter was buried... When humans burn these fuels, the stored carbon is released as CO2.'"}, {"text": "Absorption and release of CO2 by oceans.", "isCorrect": false, "rationale": "The text explicitly mentions: 'Oceans: The ocean absorbs and releases CO2 at its surface, acting as a major carbon reservoir.'"}, {"text": "Nitrogen fixation by soil microbes.", "isCorrect": true, "rationale": "The text details various players in the carbon cycle (decomposition, fossil fuels, oceans) but does not mention nitrogen fixation as part of the carbon cycle."}]}, {"question": "Jan Ingenhousz's experiments with aquatic plants in 1779 fundamentally demonstrated what key aspect of plant biology?", "options": [{"text": "Plants only consume oxygen and release carbon dioxide, similar to animals, under all conditions.", "isCorrect": false, "rationale": "Ingenhousz showed that plants consume oxygen in the dark but produce it in sunlight. This statement incorrectly generalizes their activity."}, {"text": "The 'purifying' effect of plants on air (oxygen production) is entirely dependent on the presence of sunlight.", "isCorrect": true, "rationale": "The text states: 'Ingenhousz showed that plants produce oxygen only in the presence of sunlight... His careful experiments demonstrated that the 'purifying' effect of plants on air... was due to light.'"}, {"text": "Plants produce carbon dioxide through photosynthesis, which is then used by animals.", "isCorrect": false, "rationale": "Plants consume carbon dioxide during photosynthesis and produce oxygen. Animals use oxygen and produce carbon dioxide."}, {"text": "Aquatic plants are unique in their ability to produce oxygen, unlike terrestrial plants.", "isCorrect": false, "rationale": "The text describes Ingenhousz's work with aquatic plants as a model, but does not suggest that only aquatic plants perform photosynthesis or produce oxygen."}]}, {"question": "Based on the understanding that plants perform both photosynthesis and cellular respiration, and considering Ingenhousz's findings, at what time of day would you expect the CO2 concentration inside a sealed greenhouse to be highest, and why?", "options": [{"text": "At noon, because intense sunlight maximizes photosynthesis, leading to CO2 release.", "isCorrect": false, "rationale": "At noon, photosynthesis would be maximal, meaning CO2 consumption would be highest, leading to lower CO2 concentration, not higher. Photosynthesis consumes CO2, it doesn't release it."}, {"text": "At dawn, because plants have been respiring all night without photosynthesis to consume CO2.", "isCorrect": true, "rationale": "The 'thinkdeeper' section explains: 'At night, with no light for photosynthesis, the plant only respires — consuming O2 and releasing CO2.' Therefore, CO2 would accumulate overnight, reaching its peak just before dawn when photosynthesis begins again."}, {"text": "At dusk, because photosynthesis slows down, and respiration begins to dominate CO2 production.", "isCorrect": false, "rationale": "While photosynthesis does slow down at dusk, CO2 would not yet be at its highest. The CO2 concentration would continue to rise throughout the night as respiration continues without photosynthesis."}, {"text": "In the middle of the night, as both processes are completely inactive, leading to stable CO2 levels.", "isCorrect": false, "rationale": "Cellular respiration is always active in living plants, consuming O2 and releasing CO2, even in the middle of the night when photosynthesis is inactive."}]}, {"question": "In the 'Measuring Photosynthesis Rate' investigation using Elodea, what is the primary purpose of adding sodium bicarbonate (NaHCO3) to the water?", "options": [{"text": "To provide essential mineral nutrients for the Elodea plant's growth.", "isCorrect": false, "rationale": "While plants need nutrients, the text specifically states the purpose of NaHCO3 is 'to ensure adequate CO2 supply' for photosynthesis, not as a general nutrient source."}, {"text": "To act as a buffer, maintaining a stable pH for optimal enzyme activity.", "isCorrect": false, "rationale": "Sodium bicarbonate can act as a buffer, but the described purpose in the procedure is explicitly 'This provides a steady supply of dissolved CO2.'"}, {"text": "To ensure an adequate supply of dissolved carbon dioxide for photosynthesis.", "isCorrect": true, "rationale": "The procedure states: 'Dissolve 5g of NaHCO3 in 1L of water... This provides a steady supply of dissolved CO2.'"}, {"text": "To increase the density of the water, allowing the Elodea sprigs to float better.", "isCorrect": false, "rationale": "This is not the purpose; increasing density would have negligible effect on buoyancy of the plant and is not relevant to photosynthesis."}]}, {"question": "In the Elodea experiment described, which of the following correctly identifies the independent, dependent, and at least one controlled variable?", "options": [{"text": "Independent: Amount of NaHCO3; Dependent: Light distance; Controlled: Bubble count.", "isCorrect": false, "rationale": "The amount of NaHCO3 is a controlled variable (kept constant), light distance is the independent variable, and bubble count is the dependent variable. This option scrambles the roles."}, {"text": "Independent: Distance from Light (cm); Dependent: Bubbles per Minute; Controlled: CO2 concentration.", "isCorrect": true, "rationale": "The procedure specifies varying the lamp's distance (independent variable) and counting bubbles (dependent variable). The concentration of NaHCO3 (and thus CO2) is kept constant as a controlled variable."}, {"text": "Independent: Type of plant; Dependent: Time of day; Controlled: Lamp wattage.", "isCorrect": false, "rationale": "The type of plant and time of day are not varied in this specific experiment. Lamp wattage is a controlled variable, but the other variables are incorrect."}, {"text": "Independent: Volume of water; Dependent: Plant health; Controlled: Ruler type.", "isCorrect": false, "rationale": "Volume of water, plant health, and ruler type are not the primary variables being tested or controlled in the manner described."}]}, {"question": "If a scientist wanted to modify the Elodea experiment to investigate the effect of *temperature* on the rate of photosynthesis, what would be the most appropriate change to the procedure?", "options": [{"text": "Vary the concentration of sodium bicarbonate while keeping light distance and temperature constant.", "isCorrect": false, "rationale": "Varying sodium bicarbonate concentration would test the effect of CO2, not temperature."}, {"text": "Change the type of light source (e.g., LED vs. incandescent) while keeping temperature constant.", "isCorrect": false, "rationale": "Changing the light source type would test the effect of light quality or different light intensity characteristics, not primarily temperature."}, {"text": "Conduct the experiment at different, controlled water temperatures while keeping light distance and CO2 constant.", "isCorrect": true, "rationale": "To test the effect of temperature, temperature must be the independent variable, while all other factors (like light distance and CO2 supply) are kept constant as controlled variables."}, {"text": "Increase the length of the counting period from 3 minutes to 10 minutes at various light distances.", "isCorrect": false, "rationale": "This would change the method of measurement and potentially improve data accuracy, but it would still be testing the effect of light distance, not temperature."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
