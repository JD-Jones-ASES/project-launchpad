        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<body>
<div class="quiz-container">

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 27, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The textbook states that scientists have identified two complementary approaches to addressing climate change: mitigation and adaptation. Which of the following best describes the fundamental difference between these two strategies?", "options": [{"text": "Mitigation involves immediate actions, while adaptation focuses on long-term planning.", "isCorrect": false, "rationale": "Both mitigation and adaptation can involve immediate and long-term actions. The distinction lies in their purpose, not their timeframe."}, {"text": "Mitigation aims to reduce greenhouse gas emissions, whereas adaptation seeks to adjust to climate change impacts.", "isCorrect": true, "rationale": "The text explicitly defines mitigation as 'actions taken to reduce or prevent greenhouse gas emissions' and adaptation as 'actions taken to prepare for and adjust to the current and future effects of climate change'."}, {"text": "Mitigation is primarily a governmental responsibility, while adaptation is an individual's role.", "isCorrect": false, "rationale": "Both mitigation and adaptation require actions from individuals, communities, governments, and industries. The text discusses a range of actors for both."}, {"text": "Mitigation uses technological solutions, while adaptation relies on natural processes.", "isCorrect": false, "rationale": "Both mitigation and adaptation can utilize technological solutions (e.g., solar panels for mitigation, desalination for adaptation) and natural processes (e.g., reforestation for mitigation, coastal wetland restoration for adaptation)."}]}, {"question": "Why does the textbook emphasize that both mitigation and adaptation are necessary, rather than focusing solely on one approach?", "options": [{"text": "Mitigation is only effective for past emissions, while adaptation addresses future warming.", "isCorrect": false, "rationale": "Mitigation primarily targets future greenhouse gas emissions, though its benefits reduce the overall warming from accumulated past emissions. Adaptation addresses current and future impacts."}, {"text": "Adaptation is a short-term fix, but mitigation provides long-term solutions.", "isCorrect": false, "rationale": "Adaptation strategies can be both short-term (e.g., early warning systems) and long-term (e.g., sea wall construction). Mitigation aims for long-term reduction in the root cause of warming."}, {"text": "Some degree of warming is unavoidable due to existing atmospheric CO2, making adaptation essential even as mitigation limits further warming.", "isCorrect": true, "rationale": "The text explicitly states: 'Both are necessary because some warming is already locked in, but limiting further warming makes adaptation far more manageable.' This highlights the dual necessity due to committed warming."}, {"text": "International agreements only cover mitigation, leaving adaptation to national policies.", "isCorrect": false, "rationale": "The Paris Agreement, for instance, includes provisions for adaptation, and the text emphasizes global cooperation for both."}]}, {"question": "Hydroelectric energy is highlighted as an excellent complement to intermittent solar and wind power. What unique advantage of hydroelectric energy makes it particularly suitable for this role?", "options": [{"text": "It has no environmental impact on river ecosystems.", "isCorrect": false, "rationale": "The text explicitly lists 'environmental impact of dams on river ecosystems, fish migration, and downstream water flow' as limitations of hydroelectric energy."}, {"text": "It can be reliably dispatched on demand by regulating water flow.", "isCorrect": true, "rationale": "The text states that hydroelectric energy 'is reliable and can be dispatched on demand (by opening dam gates), making it an excellent complement to intermittent solar and wind,' which produce power inconsistently."}, {"text": "It utilizes heat from Earth's interior, providing continuous baseload power.", "isCorrect": false, "rationale": "This describes geothermal energy, not hydroelectric."}, {"text": "Its construction costs are significantly lower than other renewable sources.", "isCorrect": false, "rationale": "The text does not discuss the comparative construction costs in a way that suggests this is its unique advantage for complementing intermittent sources. Dams can be very expensive to build."}]}, {"question": "While solar and wind energy have seen significant cost reductions, they share a common limitation that often necessitates the development of energy storage solutions. What is this limitation?", "options": [{"text": "High visual and noise impacts.", "isCorrect": false, "rationale": "Visual and noise impacts are primarily associated with wind turbines, not solar panels, and are not the core reason for energy storage."}, {"text": "Dependency on specific geological features.", "isCorrect": false, "rationale": "This describes geothermal energy, which relies on hot spots within Earth's crust."}, {"text": "Intermittency, meaning they do not produce power constantly.", "isCorrect": true, "rationale": "The text states both solar ('the sun does not shine at night or on cloudy days') and wind ('Limitations include intermittency') are intermittent, requiring 'the need for energy storage (batteries)' to ensure continuous supply."}, {"text": "Creation of hazardous waste byproducts.", "isCorrect": false, "rationale": "Hazardous waste byproducts are a concern with nuclear energy, not typically solar or wind power generation."}]}, {"question": "Nuclear energy is described as having a 'role to play in reducing emissions' despite not being renewable. Which characteristic primarily supports its inclusion in climate change mitigation discussions?", "options": [{"text": "Its reliance on uranium fuel makes it globally accessible.", "isCorrect": false, "rationale": "While uranium is a global resource, its accessibility isn't the primary reason cited for nuclear's mitigation role; the text does not directly state this."}, {"text": "It produces electricity with very low greenhouse gas emissions during operation.", "isCorrect": true, "rationale": "The text explicitly states: 'Nuclear energy... produces electricity with very low greenhouse gas emissions during operation,' making it a candidate for reducing overall emissions despite its non-renewable fuel source."}, {"text": "The challenges of nuclear waste management have been entirely resolved.", "isCorrect": false, "rationale": "The text lists 'nuclear waste management' as a continuing concern, indicating it has not been entirely resolved."}, {"text": "Its high construction costs stimulate economic growth.", "isCorrect": false, "rationale": "High construction costs are mentioned as a 'concern,' not a reason for its inclusion in mitigation discussions."}]}, {"question": "The concept of 'energy efficiency' is summarized by the statement, 'The cheapest unit of energy is the one you never use.' Which of the following scenarios best exemplifies an energy efficiency improvement as described in the text?", "options": [{"text": "Building a new solar farm to generate clean electricity.", "isCorrect": false, "rationale": "This is a renewable energy generation strategy (mitigation), not an improvement in how much energy is needed to perform a task."}, {"text": "Capturing CO2 emissions from a power plant before they enter the atmosphere.", "isCorrect": false, "rationale": "This is a carbon capture and storage strategy (mitigation), not energy efficiency."}, {"text": "Installing LED lighting in a home to use less electricity for the same amount of light.", "isCorrect": true, "rationale": "The text defines energy efficiency as 'using less energy to accomplish the same task' and specifically cites 'LED lighting uses about 75% less electricity than incandescent bulbs for the same amount of light' as an example."}, {"text": "Switching from driving a gasoline car to an electric vehicle, where the electricity comes from a coal-fired power plant.", "isCorrect": false, "rationale": "While electric vehicles are more efficient in converting energy to motion, if the electricity source is not clean, the overall emission reduction benefit is compromised. The core of efficiency is 'using less energy for the same task,' which in this case, would be reducing the energy needed for transportation, but the scenario implies a change in energy source rather than a pure efficiency gain in the context of emissions without clean power."}]}, {"question": "Carbon capture and storage (CCS) technologies are designed to prevent CO2 from reaching the atmosphere. What is a key distinction between point-source capture and direct air capture (DAC)?", "options": [{"text": "Point-source capture removes CO2 from the atmosphere, while DAC targets industrial emissions.", "isCorrect": false, "rationale": "This statement reverses the definitions. Point-source targets industrial emissions, and DAC targets CO2 already in the ambient air."}, {"text": "Point-source capture focuses on emissions from specific industrial facilities, whereas DAC extracts CO2 directly from ambient air.", "isCorrect": true, "rationale": "The text defines point-source capture as 'Capturing CO2 from the exhaust of power plants or industrial facilities' and direct air capture (DAC) as 'Using chemical processes to extract CO2 directly from ambient air.'"}, {"text": "DAC is a proven, widely implemented technology, while point-source capture is still experimental.", "isCorrect": false, "rationale": "The text indicates that DAC 'is currently expensive but is being developed and scaled up,' implying it is not yet widely implemented, while point-source capture is a more established, though still developing, technology."}, {"text": "Only point-source capture stores CO2 underground, while DAC uses biological sequestration.", "isCorrect": false, "rationale": "Both point-source and DAC aim to store captured CO2 'underground in geological formations' as described in the text. Biological sequestration (e.g., reforestation) is a separate natural carbon capture method."}]}, {"question": "Beyond energy systems, the text identifies several 'Other Mitigation Strategies.' Which of the following represents a mitigation strategy related to agricultural practices?", "options": [{"text": "Developing heat-tolerant and drought-resistant crop varieties.", "isCorrect": false, "rationale": "This is listed under 'Agricultural adaptation' as a way to adjust to changing climate conditions, not to reduce emissions."}, {"text": "Improving irrigation efficiency to ensure water supply in drier conditions.", "isCorrect": false, "rationale": "This is listed under 'Water management' as an adaptation strategy."}, {"text": "Reducing fertilizer use to lower N2O emissions from fields.", "isCorrect": true, "rationale": "The text states 'Sustainable agriculture — reducing fertilizer use (lowering N2O emissions)' as an 'Other Mitigation Strategy' to reduce greenhouse gas emissions."}, {"text": "Establishing early warning systems for extreme weather events impacting harvests.", "isCorrect": false, "rationale": "This is listed under 'Early warning systems' as an adaptation strategy to prepare for climate impacts."}]}, {"question": "A coastal city frequently experiences storm surges and rising sea levels. Based on the adaptation strategies outlined in the text, which action would be most effective for this city to implement?", "options": [{"text": "Investing in direct air capture technology to remove CO2 from the atmosphere.", "isCorrect": false, "rationale": "Direct air capture is a mitigation strategy aimed at reducing atmospheric CO2 globally, not a direct action for a city to adapt to immediate coastal impacts."}, {"text": "Developing new, highly efficient public transportation systems.", "isCorrect": false, "rationale": "Improving public transportation efficiency is a mitigation strategy (reducing emissions), not a direct adaptation to coastal threats like storm surges."}, {"text": "Constructing sea walls and restoring coastal wetlands to buffer against wave energy.", "isCorrect": true, "rationale": "The text lists 'Coastal defenses: Sea walls, levees, storm surge barriers, and restored coastal wetlands (which absorb wave energy and reduce flooding)' as key adaptation strategies for coastal communities."}, {"text": "Switching all municipal buildings to solar power to reduce their carbon footprint.", "isCorrect": false, "rationale": "Switching to solar power is a mitigation strategy (reducing emissions), not a direct adaptation to protect against physical coastal impacts."}]}, {"question": "The Paris Agreement (2015) marked a significant shift in international climate cooperation compared to its predecessor, the Kyoto Protocol. What was a key distinguishing feature of the Paris Agreement?", "options": [{"text": "It established binding emission reduction targets primarily for developing nations.", "isCorrect": false, "rationale": "The Kyoto Protocol focused on developed nations, and the Paris Agreement shifted to a more inclusive approach where all nations contribute."}, {"text": "It required every signatory nation to adopt a global carbon tax.", "isCorrect": false, "rationale": "The text does not mention a global carbon tax as a requirement of the Paris Agreement."}, {"text": "It allowed each country to set its own Nationally Determined Contributions (NDCs) for emission reduction.", "isCorrect": true, "rationale": "The text states: 'Each country sets its own emission reduction targets (called Nationally Determined Contributions) and reports progress,' which was a key departure from the Kyoto Protocol's top-down approach to targets."}, {"text": "It legally mandated a global cap-and-trade system for carbon emissions.", "isCorrect": false, "rationale": "The Paris Agreement does not legally mandate a global cap-and-trade system, though it provides a framework for voluntary cooperation mechanisms."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
