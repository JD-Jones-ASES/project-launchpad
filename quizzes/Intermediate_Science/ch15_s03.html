    <meta charset="UTF-8">

    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 15, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary stated purpose of the 'Vocabulary Review' section?", "options": [{"text": "To introduce new vocabulary terms for the current chapter (Chapter 15).", "isCorrect": false, "rationale": "The text states it 'collects the key vocabulary terms from all four units in Cycle 3' and to 'Use it as a study guide and self-check,' indicating it's for review, not introduction of new terms for the current chapter."}, {"text": "To serve as a study guide and self-check for key vocabulary terms from previous units in Cycle 3.", "isCorrect": true, "rationale": "The text explicitly states, 'Use it as a study guide and self-check' for 'the key vocabulary terms from all four units in Cycle 3,' directly aligning with this option."}, {"text": "To provide a complete dictionary of all scientific terms covered throughout the entire textbook.", "isCorrect": false, "rationale": "While it reviews vocabulary, it specifically focuses on 'four units in Cycle 3,' not the entire textbook, and is presented as a 'study guide' rather than a comprehensive dictionary."}, {"text": "To summarize the main concepts and definitions of Chapter 15, Section 3.", "isCorrect": false, "rationale": "The review covers terms from Units 11-14 (Cycle 3), not just the current chapter or section, which is Chapter 15, Section 3."}], "id": "q01"}, {"question": "The 'Vocabulary Review' section covers key terms from how many different scientific units within Cycle 3?", "options": [{"text": "One unit: Unit 15.", "isCorrect": false, "rationale": "The text clearly states 'all four units in Cycle 3' and lists Units 11, 12, 13, and 14."}, {"text": "Two units: Life Science and Earth Science.", "isCorrect": false, "rationale": "While these two branches are covered, the text specifies 'all four units' and lists Chemistry and Physics as well."}, {"text": "Three units: Life Science, Earth Science, and Chemistry.", "isCorrect": false, "rationale": "This option omits Physics (Unit 14), which is explicitly included in the review's scope."}, {"text": "Four units: Life Science, Earth Science, Chemistry, and Physics.", "isCorrect": true, "rationale": "The text explicitly lists 'Life Science — Unit 11,' 'Earth Science — Unit 12,' 'Chemistry — Unit 13,' and 'Physics — Unit 14' as the sources of vocabulary for review."}], "id": "q02"}, {"question": "Which of the following study strategies is NOT explicitly suggested for using the 'Vocabulary Review'?", "options": [{"text": "Defining each term in your own words.", "isCorrect": false, "rationale": "The text asks, 'Can you define each term in your own words?,' indicating this is a suggested strategy."}, {"text": "Giving an example for each term.", "isCorrect": false, "rationale": "The text asks, 'Can you give an example?,' indicating this is a suggested strategy."}, {"text": "Connecting terms from different branches using the theme 'energy flow through systems'.", "isCorrect": false, "rationale": "The text asks, 'Can you connect a term from one branch to a term from another using the theme “energy flow through systems”?', indicating this is a suggested strategy."}, {"text": "Memorizing terms by creating flashcards and quizlets.", "isCorrect": true, "rationale": "While flashcards and quizlets can be useful study tools, the text does not explicitly suggest them. It focuses on conceptual understanding, exemplification, and interdisciplinary connection."}], "id": "q03"}, {"question": "The 'thinkdeeper' challenge asks students to relate terms from different branches under what specific condition regarding the connection?", "options": [{"text": "The connection must be based on historical scientific discoveries.", "isCorrect": false, "rationale": "The text does not mention historical discoveries; it focuses on 'a meaningful way' to use the terms together, exemplified by a 'real-world scenario.'"}, {"text": "The connection must be immediately obvious and easily recognizable.", "isCorrect": false, "rationale": "The text explicitly states, 'The connection does not have to be obvious — part of the challenge is finding one that works.'"}, {"text": "The connection should be a well-established scientific principle.", "isCorrect": false, "rationale": "While such principles might be used, the emphasis is on the challenge of *finding* a connection, even if not obvious, rather than strictly adhering to established ones."}, {"text": "The connection does not have to be obvious, as part of the challenge is finding one that works.", "isCorrect": true, "rationale": "The text directly states, 'The connection does not have to be obvious — part of the challenge is finding one that works,' making this the correct condition."}], "id": "q04"}, {"question": "What is the overarching theme suggested for connecting vocabulary terms from different scientific branches (Life Science, Earth Science, Chemistry, Physics)?", "options": [{"text": "The impact of human activities on natural systems.", "isCorrect": false, "rationale": "While a relevant scientific theme, it is not the specific theme suggested in the text for inter-branch connections."}, {"text": "Energy flow through systems.", "isCorrect": true, "rationale": "The text explicitly asks, 'Can you connect a term from one branch to a term from another using the theme “energy flow through systems”?'"}, {"text": "The conservation of matter in chemical reactions.", "isCorrect": false, "rationale": "This is a concept relevant to Chemistry, but not the overarching theme given for *all* branches."}, {"text": "The development of scientific models and theories.", "isCorrect": false, "rationale": "This is a concept about scientific methodology, not the thematic connection between the specific content areas listed."}], "id": "q05"}, {"question": "The 'thinkdeeper' exercise encourages which level of cognitive engagement with the vocabulary?", "options": [{"text": "Primarily recall and memorization of definitions.", "isCorrect": false, "rationale": "The exercise requires 'writing a single paragraph that uses all four terms together in a meaningful way,' which goes beyond simple recall to application and synthesis."}, {"text": "Analysis and synthesis of concepts across different scientific disciplines.", "isCorrect": true, "rationale": "By requiring students to 'choose one term from each of the four branches' and 'write a single paragraph that uses all four terms together in a meaningful way,' the activity demands analysis of relationships and synthesis of ideas across disciplines."}, {"text": "Understanding the etymology (origin) of scientific terms.", "isCorrect": false, "rationale": "The exercise focuses on the conceptual connection and usage of terms, not their linguistic origins."}, {"text": "Identifying antonyms and synonyms for each term.", "isCorrect": false, "rationale": "This is a basic vocabulary exercise, not what the 'thinkdeeper' challenge describes, which is about interdisciplinary application."}], "id": "q06"}, {"question": "Which of the following is NOT one of the scientific branches from which terms are collected for review in Cycle 3?", "options": [{"text": "Life Science", "isCorrect": false, "rationale": "Life Science (Unit 11) is explicitly listed."}, {"text": "Geology", "isCorrect": true, "rationale": "While related to Earth Science, 'Geology' is not listed as a distinct branch. 'Earth Science — Unit 12: The Atmosphere and Weather Systems' is the listed branch."}, {"text": "Chemistry", "isCorrect": false, "rationale": "Chemistry (Unit 13) is explicitly listed."}, {"text": "Physics", "isCorrect": false, "rationale": "Physics (Unit 14) is explicitly listed."}], "id": "q07"}, {"question": "The example terms 'ATP,' 'greenhouse effect,' 'hydrogen bond,' and 'efficiency' are used in the 'thinkdeeper' section to illustrate what?", "options": [{"text": "The exact terms students must use for their paragraph.", "isCorrect": false, "rationale": "The text states 'For example,' indicating these are illustrative, not mandatory, terms."}, {"text": "A list of the most difficult terms from each unit.", "isCorrect": false, "rationale": "They are given as an example of how to connect terms, not a ranking of difficulty."}, {"text": "How terms from different scientific branches can be meaningfully connected in a real-world scenario.", "isCorrect": true, "rationale": "The text states, 'For example, how might 'ATP,' 'greenhouse effect,' 'hydrogen bond,' and 'efficiency' all relate to a single real-world scenario?' This shows how to connect diverse terms meaningfully."}, {"text": "A pre-test of vocabulary knowledge before beginning the review.", "isCorrect": false, "rationale": "These terms are part of an instructional example for an activity, not a test."}], "id": "q08"}, {"question": "How does the 'Vocabulary Review' section encourage students to demonstrate true comprehension beyond simple recall?", "options": [{"text": "By requiring them to only identify the correct spelling of each term.", "isCorrect": false, "rationale": "The instructions go far beyond spelling, asking for definitions 'in your own words,' examples, and connections."}, {"text": "By asking them to define terms in their own words, provide examples, and connect terms across different scientific branches.", "isCorrect": true, "rationale": "These three actions (define in own words, give examples, connect terms) are explicitly posed as questions in the text, indicating a deeper comprehension goal than mere recall."}, {"text": "By providing a list of multiple-choice questions for self-assessment.", "isCorrect": false, "rationale": "The section does not provide multiple-choice questions; it provides prompts for deeper engagement."}, {"text": "By suggesting they work in groups to memorize definitions together.", "isCorrect": false, "rationale": "The text frames the review as a 'self-check' and does not mention group work or simple memorization."}], "id": "q09"}, {"question": "In what specific location within the textbook structure is this 'Vocabulary Review' section found?", "options": [{"text": "Within Unit 11, as part of the Life Science curriculum.", "isCorrect": false, "rationale": "Unit 11 is one of the *sources* of vocabulary, not the location of this review section itself."}, {"text": "As an introductory section for Cycle 3, before any units begin.", "isCorrect": false, "rationale": "The section is clearly labeled 'CHAPTER 15, SECTION 3,' indicating its position much later in the textbook structure."}, {"text": "In Chapter 15, Section 3.", "isCorrect": true, "rationale": "The very top of the section explicitly states 'CHAPTER 15, SECTION 3: VOCABULARY REVIEW'."}, {"text": "At the very end of Cycle 3, following all four units.", "isCorrect": false, "rationale": "While it reviews terms from Cycle 3, its specific chapter and section placement ('CHAPTER 15, SECTION 3') is stated, which implies a specific location rather than just 'the end of Cycle 3'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
