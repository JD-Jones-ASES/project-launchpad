    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 14, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In physics, what is the primary mechanism by which energy is transferred to an object?", "options": [{"text": "Force", "isCorrect": false, "rationale": "Force is a push or pull that can cause a change in motion, but work is the specific mechanism for energy transfer as stated in the text."}, {"text": "Work", "isCorrect": true, "rationale": "The text explicitly states, 'work is the mechanism by which energy is transferred. When you do work on an object, you transfer energy to it.'"}, {"text": "Power", "isCorrect": false, "rationale": "Power is the rate at which work is done or energy is transferred, not the mechanism of transfer itself."}, {"text": "Acceleration", "isCorrect": false, "rationale": "Acceleration is a change in velocity, often a result of energy transfer (work) but not the mechanism of transfer itself."}]}, {"question": "Which statement accurately describes energy as a physical quantity based on the provided text?", "options": [{"text": "Energy always has an associated direction.", "isCorrect": false, "rationale": "The text states, 'Energy is a scalar quantity (no direction),' meaning it does not have a direction."}, {"text": "Energy is measured in Newtons.", "isCorrect": false, "rationale": "The text states that energy is 'measured in joules (J) — the same unit as work.' Newtons are units of force."}, {"text": "Energy is the ability to cause change and is a scalar quantity.", "isCorrect": true, "rationale": "The text defines energy as 'the ability to cause change' and explicitly states it is 'a scalar quantity (no direction).'"}, {"text": "Energy can only be transferred through thermal processes.", "isCorrect": false, "rationale": "The text mentions work as a mechanism for energy transfer and lists various forms of energy (kinetic, potential, chemical, electrical, etc.), indicating transfers are not solely thermal."}]}, {"question": "An object's kinetic energy is determined by which two fundamental factors, according to the kinetic energy formula?", "options": [{"text": "Its mass and its height above a reference point.", "isCorrect": false, "rationale": "Height above a reference point is a factor for gravitational potential energy, not kinetic energy."}, {"text": "Its speed and the acceleration due to gravity.", "isCorrect": false, "rationale": "The acceleration due to gravity is a factor for gravitational potential energy, not kinetic energy."}, {"text": "Its mass and its speed.", "isCorrect": true, "rationale": "The text states, 'The kinetic energy of an object depends on two factors: its mass and its speed' and provides the formula $KE = 1/2mv^2$."}, {"text": "The force applied to it and the distance it travels.", "isCorrect": false, "rationale": "These factors relate to the work done on an object, which transfers energy, but are not the direct determinants of its kinetic energy once it is already in motion."}]}, {"question": "A car is traveling at a certain speed. If the car's speed is doubled, how will its kinetic energy change?", "options": [{"text": "Its kinetic energy will also double.", "isCorrect": false, "rationale": "Kinetic energy depends on the square of the speed ($KE = 1/2mv^2$), so doubling speed does not merely double KE."}, {"text": "Its kinetic energy will be halved.", "isCorrect": false, "rationale": "Doubling speed will increase, not decrease, the kinetic energy."}, {"text": "Its kinetic energy will quadruple.", "isCorrect": true, "rationale": "The text explicitly states, 'Notice that kinetic energy depends on the square of the speed. If you double the speed, the kinetic energy quadruples ($2^2 = 4$).'"}, {"text": "Its kinetic energy will remain unchanged.", "isCorrect": false, "rationale": "A change in speed directly affects kinetic energy, so it will not remain unchanged."}]}, {"question": "Gravitational potential energy is best described as the energy an object possesses because of its:", "options": [{"text": "Active motion and velocity.", "isCorrect": false, "rationale": "This describes kinetic energy, which is energy due to motion."}, {"text": "Internal temperature and heat content.", "isCorrect": false, "rationale": "This describes thermal energy, not gravitational potential energy."}, {"text": "Height above a chosen reference point.", "isCorrect": true, "rationale": "The text defines gravitational potential energy as 'the energy stored in an object because of its height above a reference point.'"}, {"text": "Chemical composition and atomic structure.", "isCorrect": false, "rationale": "This describes chemical potential energy, as discussed in the 'Life Science Connection' section."}]}, {"question": "When calculating gravitational potential energy ($PE = mgh$), the textbook states that the choice of reference level (where $h=0$) is arbitrary. What is the most significant implication of this arbitrariness?", "options": [{"text": "The mass of the object can be ignored if the reference level is chosen carefully.", "isCorrect": false, "rationale": "Mass ($m$) is always a critical factor in the PE formula and cannot be ignored."}, {"text": "The acceleration due to gravity ($g$) varies significantly with different reference levels.", "isCorrect": false, "rationale": "For calculations within typical height ranges, $g$ is considered a constant ($9.8m/s^2$) and does not vary significantly with the reference level."}, {"text": "What truly matters is the change in height between two positions, not the absolute height from a fixed point.", "isCorrect": true, "rationale": "The text explicitly states, 'The choice of reference level is arbitrary — you can set $h = 0$ at the floor, the ground, sea level, or any convenient point. What matters is the change in height between two positions.'"}, {"text": "Gravitational potential energy itself is an arbitrary concept with no real physical significance.", "isCorrect": false, "rationale": "Gravitational potential energy is a very significant physical concept; it's only the *zero point* for measuring height that is arbitrary, not the concept itself."}]}, {"question": "Which of the following scenarios primarily involves elastic potential energy?", "options": [{"text": "A book resting on a high shelf.", "isCorrect": false, "rationale": "This is an example of gravitational potential energy."}, {"text": "A ball rolling down a ramp.", "isCorrect": false, "rationale": "This involves the conversion of gravitational potential energy to kinetic energy."}, {"text": "A stretched rubber band ready to be released.", "isCorrect": true, "rationale": "The text states, 'A compressed spring, a stretched rubber band, and a drawn bow all store elastic potential energy.'"}, {"text": "The chemical bonds within a glucose molecule.", "isCorrect": false, "rationale": "This is an example of chemical potential energy."}]}, {"question": "A $0.145kg$ baseball is pitched at $40m/s$, having a kinetic energy of $116J$. If a second object with twice the mass ($0.290kg$) were thrown at half the speed ($20m/s$), how would its kinetic energy compare to the baseball's?", "options": [{"text": "Its kinetic energy would be $116J$, the same as the baseball.", "isCorrect": false, "rationale": "Using $KE = 1/2mv^2$ for the second object: $KE = 1/2 (0.290kg)(20m/s)^2 = 1/2 (0.290)(400) = 0.145 \times 400 = 58J$. This is not the same as the baseball's KE."}, {"text": "Its kinetic energy would be $58J$, half of the baseball's kinetic energy.", "isCorrect": true, "rationale": "For the second object: $m_2 = 2m_1$ and $v_2 = v_1/2$. So, $KE_2 = 1/2 m_2 v_2^2 = 1/2 (2m_1) (v_1/2)^2 = 1/2 (2m_1) (v_1^2/4) = 1/4 (1/2 m_1 v_1^2) = 1/4 KE_1$. No, this is $1/2 (2m_1) (v_1^2/4) = (1/2) (1/2 m_1 v_1^2) = 1/2 KE_1$. Thus, $KE_2 = 1/2 \times 116J = 58J$. The calculation confirms it's half."}, {"text": "Its kinetic energy would be $232J$, twice the baseball's kinetic energy.", "isCorrect": false, "rationale": "Doubling the mass would double KE, but halving the speed (and squaring it) would quarter the KE. The net effect is not a doubling."}, {"text": "Its kinetic energy would be $29J$, one-fourth of the baseball's kinetic energy.", "isCorrect": false, "rationale": "One-fourth would imply that $KE_2 = 1/4 KE_1$. Our calculation shows it is $1/2 KE_1$."}]}, {"question": "Consider two objects at the same height: a $1kg$ ball and a $5kg$ brick. Which object has more gravitational potential energy, and why?", "options": [{"text": "The $1kg$ ball, because lighter objects have less inertia.", "isCorrect": false, "rationale": "Gravitational potential energy increases with mass, so a lighter object would have less PE, not more. Inertia is related to mass but not directly to the amount of potential energy."}, {"text": "The $5kg$ brick, because gravitational potential energy is directly proportional to mass.", "isCorrect": true, "rationale": "The formula $PE = mgh$ shows that for the same acceleration due to gravity ($g$) and height ($h$), the object with greater mass ($m$) will have more gravitational potential energy. This is also explained in the 'Think Deeper' guidance."}, {"text": "Both have the same gravitational potential energy, because they are at the same height.", "isCorrect": false, "rationale": "While height is a factor, mass is also directly proportional to gravitational potential energy. Since the masses are different, their PE values will be different."}, {"text": "It depends on which object has a higher speed.", "isCorrect": false, "rationale": "Gravitational potential energy depends on position (height) and mass, not the object's speed. Speed is a factor for kinetic energy."}]}, {"question": "The 'Life Science Connection' section states that chemical energy stored in glucose is a form of potential energy. What is the fundamental reason for this classification?", "options": [{"text": "Because it can be converted into kinetic energy during muscle movement.", "isCorrect": false, "rationale": "While chemical energy can be converted to kinetic energy, this is a property of potential energy (it can convert to kinetic), not its defining characteristic for why *chemical* energy *is* potential energy."}, {"text": "Because it is released during the process of photosynthesis.", "isCorrect": false, "rationale": "Photosynthesis is the process that *stores* light energy as chemical energy in glucose; cellular respiration *releases* this stored energy. The storage mechanism is key."}, {"text": "Because it is stored in the bonds between atoms and can be released when these bonds are broken or formed.", "isCorrect": true, "rationale": "The text explicitly states, 'Chemical energy is a form of potential energy — it is stored in the bonds between atoms. When a chemical bond is broken or formed, energy is released or absorbed.'"}, {"text": "Because it is a scalar quantity, like all other forms of potential energy.", "isCorrect": false, "rationale": "While energy is a scalar quantity, this is a general property of energy and not the specific reason *chemical* energy is categorized as *potential* energy. Potential energy refers to stored energy."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
