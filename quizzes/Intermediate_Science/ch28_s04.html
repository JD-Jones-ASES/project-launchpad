<body>

        <div class="subtitle">Intermediate Science &mdash; Chapter 28, Section 4</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How do pharmaceutical chemists primarily design drugs to achieve specific effects in the human body?", "options": [{"text": "By increasing the drug's overall molecular weight to ensure stability.", "isCorrect": false, "rationale": "While molecular stability is important, the primary design principle for specific interaction with biological targets is based on molecular shape and functional groups, not just weight."}, {"text": "By creating molecules with functional groups that fit into specific biological active sites, like a key fitting a lock.", "isCorrect": true, "rationale": "The text states, 'Pharmaceutical chemists use their knowledge of functional groups to design molecules that fit into the active sites of target enzymes or receptors, like a key fitting a lock.'"}, {"text": "By ensuring the drug molecule can dissolve universally in any body fluid.", "isCorrect": false, "rationale": "Solubility is a critical property for drug delivery, but it is not the primary mechanism by which drugs achieve specific interactions with biological targets."}, {"text": "By designing molecules that block all enzyme activity indiscriminately.", "isCorrect": false, "rationale": "Effective drugs are designed to be selective, targeting specific enzymes or receptors to minimize side effects, rather than blocking all activity indiscriminately."}]}, {"question": "A pharmaceutical company is developing a new pain reliever. They use computer simulations to predict how a candidate molecule will bind to its target receptor before synthesizing it. What is the most significant advantage of this approach?", "options": [{"text": "It guarantees the drug will be effective in all patients, eliminating the need for clinical trials.", "isCorrect": false, "rationale": "Computer modeling speeds up development and reduces initial animal testing, but it cannot guarantee universal effectiveness or eliminate the need for extensive clinical trials in humans."}, {"text": "It allows for the production of a much larger quantity of the drug in the initial stages.", "isCorrect": false, "rationale": "Computer modeling is a design and prediction tool, not a method for mass production of a drug substance."}, {"text": "It speeds up drug development and reduces the necessity for extensive animal testing.", "isCorrect": true, "rationale": "The text explicitly states, 'Modern drug design increasingly uses computer modeling to predict how a new molecule will interact with its biological target before the molecule is ever synthesized in a laboratory. This approach speeds up development and reduces the number of animals needed for testing.'"}, {"text": "It eliminates all potential side effects, making the drug completely safe for consumption.", "isCorrect": false, "rationale": "While computer modeling helps in designing more targeted drugs, no drug can be guaranteed to be completely free of all potential side effects."}]}, {"question": "According to the text, what defines a 'plastic' material?", "options": [{"text": "Any naturally occurring polymer that is flexible at room temperature.", "isCorrect": false, "rationale": "The text specifies that plastics are 'synthetic polymers' and does not restrict them to being flexible at room temperature."}, {"text": "A synthetic polymer derived solely from plant-based materials.", "isCorrect": false, "rationale": "The text states that 'Most plastics are derived from petroleum hydrocarbons,' though some modern plastics can be plant-based."}, {"text": "A synthetic polymer that can be molded into shape when heated and retains that shape when cooled.", "isCorrect": true, "rationale": "The text defines plastic as 'A synthetic polymer that can be molded into shape when heated and retains that shape when cooled.'"}, {"text": "A material composed exclusively of carbon and hydrogen atoms in a repeating chain.", "isCorrect": false, "rationale": "While many polymers are hydrocarbons, this definition does not capture the key characteristic of moldability and shape retention, and some polymers contain other elements."}]}, {"question": "A chemist wants to create a new plastic film that is both very strong and rigid for a heavy-duty packaging application. Based on the principles of polymer structure, which modification would best achieve this?", "options": [{"text": "Introducing significant branching into the polymer chains.", "isCorrect": false, "rationale": "The text states that 'Branched chains cannot pack tightly, producing softer, more flexible plastics (low-density polyethylene, LDPE).'"}, {"text": "Shortening the average chain length of the polymer.", "isCorrect": false, "rationale": "The text indicates that 'Longer chains produce stronger, more rigid materials.'"}, {"text": "Increasing the degree of cross-linking between polymer chains.", "isCorrect": true, "rationale": "The text explains that 'Cross-linking: Covalent bonds between chains create a rigid network (thermoset plastics like epoxy or vulcanized rubber) that cannot be remelted,' making them strong and rigid."}, {"text": "Reducing the density of the polymer material.", "isCorrect": false, "rationale": "Lower density typically correlates with softer, more flexible materials (e.g., LDPE) rather than stronger and more rigid ones."}]}, {"question": "The widespread accumulation of synthetic plastic waste in oceans and landfills is primarily due to which characteristic of most synthetic polymers?", "options": [{"text": "Their ability to absorb excessive amounts of water, leading to bulkiness.", "isCorrect": false, "rationale": "While some plastics can absorb water, this is not the primary reason for their long-term accumulation and persistence in the environment."}, {"text": "Their rapid fragmentation into harmless microparticles.", "isCorrect": false, "rationale": "Plastics do fragment into microplastics, but these are explicitly stated to 'enter food chains and harm wildlife,' meaning they are not harmless."}, {"text": "The lack of enzymes in microorganisms to break down their synthetic bonds.", "isCorrect": true, "rationale": "The text states, 'Most synthetic polymers do not biodegrade — microorganisms lack the enzymes to break the synthetic bonds.'"}, {"text": "Their high electrical conductivity, which interferes with natural processes.", "isCorrect": false, "rationale": "Electrical conductivity is not identified in the text as the primary reason for plastic waste accumulation or environmental harm."}]}, {"question": "When fossil fuels are burned, energy is released. What is the fundamental chemical process responsible for this energy release?", "options": [{"text": "The absorption of heat from the surrounding environment by the fuel molecules.", "isCorrect": false, "rationale": "Combustion is an exothermic reaction, meaning it releases energy (heat), rather than absorbing it."}, {"text": "The formation of complex, larger hydrocarbon molecules from smaller ones.", "isCorrect": false, "rationale": "Combustion involves the breakdown of larger hydrocarbon molecules into simpler compounds like CO2 and H2O, not the formation of more complex ones."}, {"text": "The breaking of carbon-hydrogen and carbon-carbon bonds and formation of new, more stable bonds.", "isCorrect": true, "rationale": "The text explains that combustion 'releases the energy stored in carbon-hydrogen and carbon-carbon bonds' when they react to form new products."}, {"text": "The conversion of hydrogen atoms into helium atoms through nuclear fusion.", "isCorrect": false, "rationale": "Nuclear fusion is a nuclear reaction involving atomic nuclei, entirely different from the chemical combustion of fossil fuels."}]}, {"question": "What is the overarching goal of green chemistry, as described in the text?", "options": [{"text": "To develop new synthetic materials that are completely impervious to degradation.", "isCorrect": false, "rationale": "Green chemistry actually advocates for 'Design for degradation' to avoid persistent pollutants, rather than impervious materials."}, {"text": "To maximize the use of hazardous substances in industrial processes for efficiency.", "isCorrect": false, "rationale": "Green chemistry explicitly aims to 'reduce or eliminate the use and generation of hazardous substances.'"}, {"text": "To design chemical products and processes that reduce or eliminate the use and generation of hazardous substances.", "isCorrect": true, "rationale": "The text defines green chemistry as 'The design of chemical products and processes that reduce or eliminate the use and generation of hazardous substances.'"}, {"text": "To strictly limit chemical research to biological applications, avoiding industrial processes.", "isCorrect": false, "rationale": "Green chemistry applies to all chemical processes and products, including industrial ones, to make them safer and more sustainable."}]}, {"question": "A chemical engineer redesigns a manufacturing process to ensure that nearly all atoms from the starting materials are incorporated into the final product, minimizing the generation of unwanted side products. Which principle of green chemistry is this engineer primarily applying?", "options": [{"text": "Prevention.", "isCorrect": false, "rationale": "While minimizing waste contributes to 'Prevention,' 'Atom economy' is the more specific green chemistry principle that directly addresses maximizing material incorporation into the product."}, {"text": "Atom economy.", "isCorrect": true, "rationale": "The text states, 'Atom economy: Design reactions so that the maximum proportion of starting materials ends up in the final product, not in waste by-products.'"}, {"text": "Renewable feedstocks.", "isCorrect": false, "rationale": "Renewable feedstocks refers to using raw materials from renewable sources, not the efficiency of atom incorporation in a reaction."}, {"text": "Design for degradation.", "isCorrect": false, "rationale": "Design for degradation focuses on how products break down after use, not on the efficiency of the synthesis reaction itself."}]}, {"question": "The Maillard reaction is a key chemical process in food preparation. What characterizes this reaction?", "options": [{"text": "It involves the breakdown of fats into simpler fatty acids under high heat.", "isCorrect": false, "rationale": "The Maillard reaction does not involve the breakdown of fats, but rather interactions between amino acids and sugars."}, {"text": "It is a reaction between amino acids and sugars that produces browning and complex flavors when food is heated.", "isCorrect": true, "rationale": "The text describes the Maillard reaction as 'a chemical reaction between amino acids and sugars that occurs when food is heated — produces the brown crust and complex flavors of toasted bread, grilled meat, and roasted coffee.'"}, {"text": "It is the anaerobic process used in fermentation to produce ethanol and other compounds.", "isCorrect": false, "rationale": "This describes fermentation, which is distinct from the Maillard reaction."}, {"text": "It relies on low pH conditions to inhibit microbial enzyme activity and prevent spoilage.", "isCorrect": false, "rationale": "This describes the mechanism of some food preservatives, not the Maillard reaction."}]}, {"question": "The 'Life Science Connection' and 'Think Deeper' sections highlight the role of organic chemistry in the carbon cycle and sustainability challenges. Considering the trade-offs discussed regarding polyethylene vs. PLA bags, which statement best reflects a key challenge in achieving true sustainability in materials science?", "options": [{"text": "Renewable feedstocks always result in lower overall environmental impact compared to fossil fuel-derived materials.", "isCorrect": false, "rationale": "The 'Think Deeper' section notes that PLA (from renewable sources) 'require significantly more energy and farmland to produce' than polyethylene, illustrating that renewable doesn't automatically mean lower overall impact."}, {"text": "Focusing solely on biodegradability is sufficient to solve all plastic waste problems.", "isCorrect": false, "rationale": "The text indicates PLA 'is not a perfect solution (it requires specific composting conditions)' and the 'Think Deeper' guidance notes most PLA bags end up in landfills, showing biodegradability alone isn't a complete solution."}, {"text": "Environmental solutions often involve complex trade-offs, where reducing one negative impact might increase another.", "isCorrect": true, "rationale": "The 'Think Deeper' section directly asks to 'Consider energy use, land use, greenhouse gas emissions, ocean pollution, and end-of-life disposal in your analysis' when comparing PLA and polyethylene, emphasizing the complex trade-offs involved in environmental choices."}, {"text": "All synthetic materials are inherently harmful and should be replaced by natural, unprocessed alternatives.", "isCorrect": false, "rationale": "The text discusses the transformative nature of synthetic materials and explores ways to make them more sustainable through green chemistry, rather than advocating for their complete replacement by unprocessed alternatives."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
