    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 13, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental reason atoms form chemical bonds?", "options": [{"text": "To increase their total kinetic energy.", "isCorrect": false, "rationale": "Chemical bonds form because the bonded arrangement is lower in energy, not higher kinetic energy. Lower total potential energy is the goal."}, {"text": "To achieve a lower total energy state, thereby increasing stability.", "isCorrect": true, "rationale": "The text explicitly states: 'Atoms bond because the resulting arrangement has lower total energy than the separated atoms. Lower energy means greater stability, and nature always tends toward the most stable state.'"}, {"text": "To solely transfer all their valence electrons to another atom.", "isCorrect": false, "rationale": "Transferring electrons is only one type of bonding (ionic). Atoms also share or pool electrons, and the overarching reason is stability, not just electron transfer."}, {"text": "To become electrically neutral by gaining positive charges.", "isCorrect": false, "rationale": "Atoms are already electrically neutral. Bonding involves the rearrangement of electrons, leading to stable configurations, not the gain of positive charges."}], "id": "q01"}, {"question": "When two hydrogen atoms approach each other and form a bond, what is the most accurate description of the energy change in the system?", "options": [{"text": "The total energy of the system increases due to repulsions between electrons.", "isCorrect": false, "rationale": "While there are electron-electron repulsions, the overall effect when a bond forms is a decrease in total energy, as attractions outweigh repulsions."}, {"text": "The total energy of the system drops to a minimum, as attractions outweigh repulsions.", "isCorrect": true, "rationale": "The text states: 'At a certain distance, the combined electron–nucleus attractions outweigh the nucleus–nucleus and electron–electron repulsions, and the total energy of the system drops below that of the two separate atoms. A bond forms at this minimum-energy distance.'"}, {"text": "The energy remains constant, as it's an isolated system.", "isCorrect": false, "rationale": "The process of bond formation involves a significant change in the system's energy, which is released or absorbed, leading to a more stable state."}, {"text": "The energy is released, but the atoms immediately separate again.", "isCorrect": false, "rationale": "Energy is released when bonds form, but the new arrangement is more stable, meaning the atoms remain bonded, not immediately separate."}], "id": "q02"}, {"question": "The octet rule primarily states that atoms tend to form bonds to achieve what specific electron configuration?", "options": [{"text": "Exactly two electrons in their innermost energy level.", "isCorrect": false, "rationale": "The octet rule refers to the outermost (valence) energy level, not the innermost, and primarily to eight electrons (with hydrogen being an exception for two)."}, {"text": "Eight electrons in their outermost energy level, mirroring noble gas stability.", "isCorrect": true, "rationale": "The definition states: 'atoms tend to form bonds so that each atom ends up with eight electrons in its outermost energy level (or two for hydrogen and helium).'"}, {"text": "An equal number of protons and neutrons in their nucleus.", "isCorrect": false, "rationale": "This describes isotopic stability or nuclear composition, which is unrelated to the octet rule or chemical bonding of electrons."}, {"text": "A completely empty outermost energy level.", "isCorrect": false, "rationale": "Atoms seek a *full* outermost energy level, not an empty one, to achieve the stable configuration of a noble gas."}], "id": "q03"}, {"question": "Which of the following elements is explicitly mentioned as an exception to the general 'eight electrons' aspect of the octet rule, achieving stability with a different number of valence electrons?", "options": [{"text": "Carbon", "isCorrect": false, "rationale": "Carbon follows the octet rule, typically forming four bonds to achieve eight valence electrons."}, {"text": "Neon", "isCorrect": false, "rationale": "Neon already has eight valence electrons and is stable, serving as the model for the octet rule, not an exception to it."}, {"text": "Hydrogen", "isCorrect": true, "rationale": "The text states: 'Hydrogen is an exception: it is stable with two electrons (a duet).'"}, {"text": "Oxygen", "isCorrect": false, "rationale": "Oxygen follows the octet rule, typically forming bonds to achieve eight valence electrons."}], "id": "q04"}, {"question": "How does the difference in electronegativity between two atoms primarily determine the type of chemical bond they will form?", "options": [{"text": "A large difference leads to covalent bonding, while a small difference leads to ionic bonding.", "isCorrect": false, "rationale": "This statement is the opposite of what the text describes."}, {"text": "A large difference leads to ionic bonding, while a small difference leads to covalent bonding.", "isCorrect": true, "rationale": "The text explains: 'When two atoms with very different electronegativities interact, the more electronegative atom pulls electrons away entirely, forming an ionic bond. When two atoms with similar electronegativities interact, they share electrons, forming a covalent bond.'"}, {"text": "Electronegativity only affects bond strength, not bond type.", "isCorrect": false, "rationale": "Electronegativity difference is a primary determinant of bond *type* (ionic vs. covalent) as well as bond polarity (which relates to strength for polar covalent bonds)."}, {"text": "Only atoms with identical electronegativities can form bonds.", "isCorrect": false, "rationale": "Atoms with varying electronegativities form bonds, leading to different bond types. If only identical ones bonded, many compounds wouldn't exist."}], "id": "q05"}, {"question": "What is the specific role of valence electrons in the formation of chemical bonds?", "options": [{"text": "They determine the atom's atomic number.", "isCorrect": false, "rationale": "Protons determine an atom's atomic number."}, {"text": "They are the innermost electrons that shield the nucleus.", "isCorrect": false, "rationale": "Valence electrons are the *outermost* electrons, not the innermost."}, {"text": "They are the electrons located in the outermost energy level and directly participate in bonding.", "isCorrect": true, "rationale": "The text states: 'Recall from Unit 8 that valence electrons are the electrons in an atom's outermost energy level. These are the electrons that participate in bonding.'"}, {"text": "They are always transferred completely from one atom to another during bond formation.", "isCorrect": false, "rationale": "Valence electrons can be transferred (ionic), shared (covalent), or pooled (metallic), not always transferred completely."}], "id": "q06"}, {"question": "The textbook states that carbon's versatility makes it the 'backbone of organic chemistry and biochemistry.' What characteristic of carbon, discussed in the section, best explains this versatility?", "options": [{"text": "Its extremely high electronegativity, allowing it to attract electrons from many sources.", "isCorrect": false, "rationale": "Carbon has a moderate electronegativity, not extremely high, which allows it to share electrons readily rather than pull them away entirely."}, {"text": "Its ability to exclusively form metallic bonds with other carbon atoms.", "isCorrect": false, "rationale": "Carbon typically forms covalent bonds, not metallic bonds, with other carbon atoms or other nonmetals."}, {"text": "Its four valence electrons, enabling it to form four covalent bonds by sharing electrons.", "isCorrect": true, "rationale": "The text explains: 'Carbon, with four valence electrons, sits right in the middle: it neither gains nor loses electrons easily but instead forms four covalent bonds. This versatility makes carbon the backbone of organic chemistry and biochemistry...'"}, {"text": "Its tendency to easily gain or lose all four of its valence electrons.", "isCorrect": false, "rationale": "The text states carbon 'neither gains nor loses electrons easily,' preferring to share them."}], "id": "q07"}, {"question": "Based on the 'Think Deeper' guidance, why is xenon (Xe) more likely than helium (He) or neon (Ne) to form compounds, despite all being noble gases?", "options": [{"text": "Xenon has a smaller atomic radius, holding its electrons more tightly.", "isCorrect": false, "rationale": "Xenon has a *larger* atomic radius than helium or neon, meaning its outer electrons are *less* tightly held."}, {"text": "Xenon has its valence electrons in a higher energy level, making them less tightly held and thus more available for bonding.", "isCorrect": true, "rationale": "The 'Teacher Note' explains: 'Xenon is at the bottom of Group 18, so its valence electrons are in a high energy level, far from the nucleus, and held less tightly.'"}, {"text": "Xenon has a much higher electronegativity than helium or neon.", "isCorrect": false, "rationale": "Noble gases generally have very low electronegativities. The key factor is the *ease of removing* electrons (low ionization energy for Xe due to size), not high electronegativity."}, {"text": "Xenon violates the octet rule more frequently than lighter noble gases.", "isCorrect": false, "rationale": "While xenon can form compounds that appear to exceed an octet, the fundamental reason for its reactivity is the less tightly held valence electrons, making bond formation possible, not a 'violation frequency'."}], "id": "q08"}, {"question": "Which statement provides the most complete and accurate definition of a chemical bond, as presented in the text?", "options": [{"text": "A chemical bond is solely the sharing of electrons between two atoms.", "isCorrect": false, "rationale": "This only describes covalent bonding; it does not encompass ionic or metallic bonding, nor the underlying energetic reason."}, {"text": "A chemical bond is a force of attraction that holds atoms together, forming because the bonded arrangement has lower total energy and greater stability.", "isCorrect": true, "rationale": "This combines the definition ('A force of attraction that holds two or more atoms together') with the fundamental reason ('Chemical bonds form because the bonded arrangement is lower in energy — and therefore more stable — than the separated atoms')."}, {"text": "A chemical bond is any interaction where atoms transfer electrons to achieve electrical neutrality.", "isCorrect": false, "rationale": "This definition is too narrow (only covers electron transfer, not sharing/pooling) and focuses on electrical neutrality as the primary goal, rather than lower energy and greater stability."}, {"text": "A chemical bond is the strong repulsion between nuclei that keeps atoms apart at a certain distance.", "isCorrect": false, "rationale": "A chemical bond is based on *attraction* between electrons and nuclei, overcoming repulsion, not repulsion itself. It holds atoms *together*."}], "id": "q09"}, {"question": "The 'Life Science Connection' highlights that 'Structure determines function, and bonds determine structure.' How does this principle apply to biological molecules like enzymes?", "options": [{"text": "Enzymes are made of individual atoms that interact randomly, determining their function.", "isCorrect": false, "rationale": "Enzymes are complex molecules with highly specific, non-random structures essential for their function."}, {"text": "The specific three-dimensional shape of an enzyme, dictated by its chemical bonds, allows it to precisely fit and act on other molecules.", "isCorrect": true, "rationale": "The text states: 'The proteins that catalyze your metabolic reactions (enzymes) work because their three-dimensional shape, determined by the bonds between atoms, fits precisely around the molecules they act on.'"}, {"text": "Chemical bonds only affect the weight of biological molecules, not their functional shape.", "isCorrect": false, "rationale": "Chemical bonds are fundamental in determining the molecular structure and, consequently, the shape of biological molecules."}, {"text": "Biological molecules avoid forming bonds to maintain their inertness and stability.", "isCorrect": false, "rationale": "Biological molecules are formed *through* chemical bonds, and these bonds are crucial for their active functions, not for inertness."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
