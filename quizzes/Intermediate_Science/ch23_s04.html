    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 23, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best explains why the pH scale is logarithmic?", "options": [{"text": "It ensures that pH values are always positive numbers.", "isCorrect": false, "rationale": "While the negative sign in the pH formula ensures positive values, the use of a logarithm is primarily to compress a wide range of H+ concentrations, not merely to guarantee positivity."}, {"text": "It allows for the direct measurement of hydrogen ion concentration without complex equipment.", "isCorrect": false, "rationale": "The logarithmic nature of pH defines the scale, but it doesn't directly simplify the measurement process; specialized pH meters or indicators are still needed."}, {"text": "It compresses the enormous range of hydrogen ion concentrations (10^0 to 10^-14 mol/L) into a manageable scale.", "isCorrect": true, "rationale": "The text explicitly states that 'The logarithm compresses this enormous range into the tidy 0–14 pH scale,' which is the primary reason for its use."}, {"text": "It establishes a linear relationship between acid strength and pH value.", "isCorrect": false, "rationale": "The pH scale is logarithmic, not linear. A linear relationship would mean a pH of 2 is twice as acidic as pH 4, which is incorrect. Each unit represents a tenfold change."}], "id": "q01"}, {"question": "If Solution X has a pH of 3 and Solution Y has a pH of 6, how does the hydrogen ion concentration of Solution X compare to that of Solution Y?", "options": [{"text": "Solution X has 3 times more H+ ions than Solution Y.", "isCorrect": false, "rationale": "The pH scale is logarithmic, not linear. A difference of 3 pH units represents a much larger concentration difference than just three times."}, {"text": "Solution X has 30 times more H+ ions than Solution Y.", "isCorrect": false, "rationale": "Each pH unit represents a tenfold change. A difference of 3 pH units means 10 x 10 x 10 = 1000 times the concentration, not 30."}, {"text": "Solution X has 100 times more H+ ions than Solution Y.", "isCorrect": false, "rationale": "This would be true for a 2-unit pH difference (e.g., pH 3 vs. pH 5). For a 3-unit difference, it's 1000 times."}, {"text": "Solution X has 1000 times more H+ ions than Solution Y.", "isCorrect": true, "rationale": "The text states that 'Each decrease of 1 pH unit means the H+ concentration is multiplied by 10.' A decrease from pH 6 to pH 3 is 3 pH units, so 10^3 = 1000 times more H+."}], "id": "q02"}, {"question": "Which statement accurately describes how a buffer system, such as the carbonic acid-bicarbonate system in human blood, resists changes in pH?", "options": [{"text": "It contains a strong acid and a strong base that completely neutralize any added H+ or OH-.", "isCorrect": false, "rationale": "Buffers work by containing a weak acid and its conjugate base (or a weak base and its conjugate acid), not strong acids or bases, because strong acids/bases would drastically change pH upon addition."}, {"text": "It continuously produces new H+ or OH- ions to maintain a constant pH.", "isCorrect": false, "rationale": "Buffers do not produce new ions but rather absorb or release existing components to counteract changes caused by added H+ or OH-."}, {"text": "It absorbs added H+ ions with its conjugate base and releases H+ ions from its weak acid to neutralize added OH-.", "isCorrect": true, "rationale": "The text explains this mechanism: 'If H+ ions are added (making the blood more acidic), bicarbonate ions (HCO3-) absorb them... If OH- ions are added, carbonic acid releases H+ to neutralize them.'"}, {"text": "It precipitates excess H+ or OH- ions as solids, removing them from the solution.", "isCorrect": false, "rationale": "Buffer systems typically involve soluble components and reversible reactions, not precipitation, to maintain pH balance."}], "id": "q03"}, {"question": "What is the primary reason that 'normal rain' is slightly acidic, with a pH of approximately 5.6?", "options": [{"text": "It contains dissolved sulfur dioxide (SO2) from industrial pollution.", "isCorrect": false, "rationale": "Sulfur dioxide is a major contributor to acid rain (pH < 5.6), but it's not the cause of the slight acidity of *normal* rain."}, {"text": "It naturally contains dissolved oxygen, which forms weak acids.", "isCorrect": false, "rationale": "Dissolved oxygen does not form weak acids that account for the normal acidity of rain."}, {"text": "Atmospheric carbon dioxide (CO2) dissolves in rainwater to form carbonic acid.", "isCorrect": true, "rationale": "The text clearly states: 'Normal rain is slightly acidic (pH ≈ 5.6) because atmospheric CO2 dissolves in rainwater to form carbonic acid.'"}, {"text": "It picks up nitrogen oxides (NO_x) from lightning strikes.", "isCorrect": false, "rationale": "Nitrogen oxides contribute to acid rain, but the general slight acidity of normal rain is due to carbonic acid from atmospheric CO2."}], "id": "q04"}, {"question": "According to the 'Scientist Spot' feature, Robert Boyle's most significant contribution to the philosophy of science was his insistence on what principle?", "options": [{"text": "The development of Boyle's Law, describing gas pressure and volume.", "isCorrect": false, "rationale": "While Boyle's Law is a famous scientific contribution, the text highlights his 'most important contribution to the philosophy of science' as something different."}, {"text": "The classification of elements into metals and non-metals.", "isCorrect": false, "rationale": "The text does not mention Boyle's work on the classification of elements."}, {"text": "The use of indicators to distinguish between acids and bases.", "isCorrect": false, "rationale": "Boyle did discover this, but the text specifies 'most important contribution to the philosophy of science' as a broader principle, not a specific chemical discovery."}, {"text": "That theories must be supported by experimental evidence rather than ancient authority.", "isCorrect": true, "rationale": "The text explicitly states: 'His most important contribution to the philosophy of science was insisting that theories must be supported by experiments — a principle that seems obvious today but was revolutionary in the 17th century...'"}], "id": "q05"}, {"question": "Which of the following is NOT listed as an effect of acid rain in the provided text?", "options": [{"text": "Damage to forests by leaching nutrients from soil.", "isCorrect": false, "rationale": "This is listed: 'Damage to forests (leaching nutrients from soil, damaging leaves).'"}, {"text": "Acidification of lakes and streams, harming aquatic organisms.", "isCorrect": false, "rationale": "This is listed: 'Acidification of lakes and streams, harming fish and aquatic organisms.'"}, {"text": "Increased agricultural yields due to higher nitrogen content in soil.", "isCorrect": true, "rationale": "The text lists negative effects of acid rain, not positive ones like increased agricultural yields. Acid rain is generally detrimental to plant health and soil quality."}, {"text": "Erosion of limestone buildings and release of toxic metals from soil.", "isCorrect": false, "rationale": "Both 'Erosion of limestone buildings, monuments, and statues' and 'Release of toxic metals (aluminum) from soil into waterways' are listed as effects."}], "id": "q06"}, {"question": "In the 'pH Titration Lab', what is the expected general shape of the graph plotting pH versus the volume of baking soda solution added to vinegar?", "options": [{"text": "A straight line with a constant slope, indicating a steady pH increase.", "isCorrect": false, "rationale": "The pH change is not linear; it's gradual at first and then steepens. A constant slope would imply a linear relationship, which is not the case for titration curves."}, {"text": "A gradual rise in pH that steepens significantly near the equivalence point (around pH 7).", "isCorrect": true, "rationale": "The 'Expected Results' section explicitly states: 'The curve should show a gradual rise that steepens near the equivalence point (around pH 7).'"}, {"text": "A rapid increase in pH at the very beginning, then a slow plateau.", "isCorrect": false, "rationale": "The initial pH change is gradual, not rapid, due to the buffer-like behavior of the weak acid before the equivalence point."}, {"text": "A decrease in pH as more baking soda solution is added.", "isCorrect": false, "rationale": "Adding a basic solution (baking soda) to an acidic solution (vinegar) will always cause the pH to increase, not decrease."}], "id": "q07"}, {"question": "Based on the applications listed, which pair of substances could be used to adjust soil pH for different agricultural needs?", "options": [{"text": "Sulfuric acid (H2SO4) and hydrochloric acid (HCl).", "isCorrect": false, "rationale": "While these are strong acids, the text mentions specific substances for agriculture: lime to raise pH and sulfur to lower pH, not these strong industrial acids."}, {"text": "Citric acid and phosphoric acid.", "isCorrect": false, "rationale": "These are food additives, not typically used for large-scale soil pH management. The text specifies lime and sulfur for agriculture."}, {"text": "Lime (CaCO3) and sulfur.", "isCorrect": true, "rationale": "The text states under 'Agriculture': 'lime (CaCO3) added to raise pH of acidic soil; sulfur added to lower pH of basic soil.' This pair directly addresses soil pH adjustment."}, {"text": "Sodium hydroxide (NaOH) and aspirin.", "isCorrect": false, "rationale": "Sodium hydroxide is an industrial base, and aspirin is a medicine. Neither is mentioned for soil pH adjustment in the text."}], "id": "q08"}, {"question": "During the 'Neutralization Titration' (Part B) in the lab, students are instructed to note any fizzing when adding baking soda solution to vinegar. What does this fizzing indicate?", "options": [{"text": "The vinegar solution is at its boiling point.", "isCorrect": false, "rationale": "Fizzing is gas production, not boiling, especially when simply mixing solutions at room temperature. The text mentions 'production of CO2 gas'."}, {"text": "A chemical reaction is occurring, producing carbon dioxide gas.", "isCorrect": true, "rationale": "The analysis question asks students to 'Note any fizzing (production of CO2 gas)' and 'What evidence of a chemical reaction did you observe?' linking fizzing to chemical reaction and CO2."}, {"text": "The baking soda is not fully dissolving in the vinegar.", "isCorrect": false, "rationale": "Fizzing indicates a reaction, not incomplete dissolution, especially with a solution of baking soda being added."}, {"text": "The pH of the solution is becoming more acidic.", "isCorrect": false, "rationale": "Adding baking soda (a base) to vinegar (an acid) causes the pH to increase (become less acidic/more basic), not more acidic."}], "id": "q09"}, {"question": "Given the expected pH ranges for household substances in the lab, which substance would be classified as the strongest base among the options provided?", "options": [{"text": "Lemon juice (pH ~2-3)", "isCorrect": false, "rationale": "Lemon juice has a low pH, indicating it is a strong acid, not a base."}, {"text": "Milk (pH ~6.5)", "isCorrect": false, "rationale": "Milk is slightly acidic, close to neutral, not a strong base."}, {"text": "Distilled water (pH ~7)", "isCorrect": false, "rationale": "Distilled water is neutral (pH 7), not a base."}, {"text": "Antacid solution (pH ~9-10)", "isCorrect": true, "rationale": "Among the options listed, an antacid solution with a pH of 9-10 is the highest pH and thus the strongest base, as higher pH values indicate stronger bases."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
