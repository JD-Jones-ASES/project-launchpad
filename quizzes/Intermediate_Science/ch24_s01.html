<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 24, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental property of matter that causes it to experience a force in the presence of other charged matter, and what are its two types?", "options": [{"text": "Magnetism; North and South poles", "isCorrect": false, "rationale": "Magnetism is a distinct fundamental force, not electric charge."}, {"text": "Gravity; Up and Down", "isCorrect": false, "rationale": "Gravity is another fundamental force related to mass, not electric charge."}, {"text": "Electric charge; Positive and Negative", "isCorrect": true, "rationale": "The text defines electric charge as 'A fundamental property of matter that causes it to experience a force in the presence of other charged matter' and identifies its two types as positive (protons) and negative (electrons)."}, {"text": "Mass; Heavy and Light", "isCorrect": false, "rationale": "Mass is a property of matter, but it's associated with gravity, not the electric force described."}]}, {"question": "A negatively charged comb is brought near a small, neutral piece of paper. Which of the following best describes what happens?", "options": [{"text": "The comb repels the paper because like charges repel.", "isCorrect": false, "rationale": "The paper is initially neutral, so it will not be repelled outright by like charges. The interaction involves charge redistribution."}, {"text": "The comb attracts the paper because the comb's negative charge repels electrons in the paper, leaving the nearest surface with a net positive charge that attracts the comb.", "isCorrect": true, "rationale": "This describes electrostatic induction, as explained by the balloon-to-wall example. The negatively charged comb repels the mobile electrons in the neutral paper, leaving the side of the paper closest to the comb slightly positive, leading to attraction."}, {"text": "The comb has no effect on the paper because the paper is neutral.", "isCorrect": false, "rationale": "The text's example of a charged balloon sticking to a neutral wall demonstrates that charged objects can interact with neutral objects."}, {"text": "The comb transfers electrons to the paper, making the paper negatively charged and causing repulsion.", "isCorrect": false, "rationale": "While charge transfer can occur, the immediate sticking effect (attraction) is due to induction, not full charge transfer leading to repulsion."}]}, {"question": "If a device operates with a current of 2.5 A for 10 seconds, how much electric charge has flowed through it?", "options": [{"text": "0.25 C", "isCorrect": false, "rationale": "This calculation is incorrect. The formula is Q = I × t."}, {"text": "2.5 C", "isCorrect": false, "rationale": "This calculation is incorrect. The formula is Q = I × t."}, {"text": "25 C", "isCorrect": true, "rationale": "Using the formula I = Q/t, we can rearrange to Q = I × t. Therefore, Q = 2.5 A × 10 s = 25 C."}, {"text": "250 C", "isCorrect": false, "rationale": "This calculation is incorrect. The formula is Q = I × t."}]}, {"question": "What is the primary difference between static electricity and electric current?", "options": [{"text": "Static electricity involves protons, while electric current involves electrons.", "isCorrect": false, "rationale": "Both phenomena involve electric charge, which can originate from protons or electrons, though electron movement is key to current in metals."}, {"text": "Static electricity is a flow of charge, while electric current is charge accumulating on an object.", "isCorrect": false, "rationale": "This statement swaps the definitions of static electricity and electric current."}, {"text": "Static electricity is charge that stays in place, while electric current is charge that flows continuously.", "isCorrect": true, "rationale": "The text defines static electricity as 'charge that accumulates on an object and stays in place rather than flowing' and electric current as 'When charge flows continuously through a material'."}, {"text": "Static electricity only occurs with insulators, while electric current only occurs with conductors.", "isCorrect": false, "rationale": "Static electricity can accumulate on conductors if isolated, and while current typically flows through conductors, this option is too restrictive and not the primary difference."}]}, {"question": "A physics student is setting up a circuit diagram. Following the standard convention used in this textbook, in which direction should the student indicate the flow of current?", "options": [{"text": "From the negative terminal to the positive terminal, following the actual path of electrons.", "isCorrect": false, "rationale": "This describes electron flow, which is the physical reality but not the conventional current used in this textbook's diagrams."}, {"text": "From the positive terminal to the negative terminal, representing the historical 'conventional current.'", "isCorrect": true, "rationale": "The text states, 'Throughout this textbook we use conventional current (positive to negative), which is the standard in most physics courses and engineering.'"}, {"text": "It doesn't matter, as both conventions yield the same calculation results.", "isCorrect": false, "rationale": "While both conventions yield the same calculation results, the question asks for the direction to be *indicated* following the textbook's standard, implying a specific choice must be made."}, {"text": "From ground to the voltage source.", "isCorrect": false, "rationale": "Grounding is a concept related to potential and safety, but it does not define the standard direction of current flow in a general circuit diagram."}]}, {"question": "Metals are excellent electrical conductors. What is the key characteristic of their atomic structure that explains this property?", "options": [{"text": "They have a highly organized crystalline lattice structure.", "isCorrect": false, "rationale": "While metals often have crystalline structures, this is not the primary reason for their high electrical conductivity."}, {"text": "Their atoms are very large, allowing more space for charge to move.", "isCorrect": false, "rationale": "Atom size is not the determining factor for a material's conductivity."}, {"text": "They possess 'free electrons' that are not tightly bound to individual atoms and can move easily.", "isCorrect": true, "rationale": "The text explains that metals are 'excellent conductors because they contain free electrons — electrons that are not tightly bound to any particular atom and can move through the material when a voltage is applied.'"}, {"text": "They form strong covalent bonds, which facilitate electron transfer.", "isCorrect": false, "rationale": "Covalent bonds typically lock electrons in place, making materials insulators, not good conductors."}]}, {"question": "Why is rubber often used as a coating for electrical wires?", "options": [{"text": "Rubber attracts positive charges, neutralizing any stray negative charges.", "isCorrect": false, "rationale": "Rubber is not primarily used for charge neutralization; its role is to prevent charge movement."}, {"text": "Rubber is a semiconductor, allowing controlled flow of electricity.", "isCorrect": false, "rationale": "Rubber is classified as an insulator, not a semiconductor. Semiconductors have variable conductivity, while insulators strongly resist current flow."}, {"text": "Rubber is an insulator, meaning its electrons are tightly bound and resist the flow of electric charge.", "isCorrect": true, "rationale": "The text defines an insulator as 'A material that strongly resists the flow of electric charge. In insulators, electrons are tightly bound to their atoms and cannot move freely.' This property makes rubber suitable for coating wires to prevent current from escaping."}, {"text": "Rubber can absorb excess electrons, preventing electrical shocks.", "isCorrect": false, "rationale": "Rubber's function is to resist electron flow, not to absorb excess electrons."}]}, {"question": "What unique property of semiconductors makes them fundamental to modern electronics like computer chips?", "options": [{"text": "They are the best conductors of electricity, surpassing even metals.", "isCorrect": false, "rationale": "While they conduct, metals like copper and silver are generally superior conductors under normal conditions."}, {"text": "They completely block the flow of charge, acting as perfect insulators.", "isCorrect": false, "rationale": "Semiconductors conduct under certain conditions; they are not perfect insulators."}, {"text": "Their conductivity can be precisely controlled by adding impurities (doping).", "isCorrect": true, "rationale": "The text states, 'By adding tiny amounts of other elements (a process called doping), scientists can control exactly how well a semiconductor conducts. This controllability is the foundation of modern electronics.'"}, {"text": "They generate their own electric charge, eliminating the need for external power sources.", "isCorrect": false, "rationale": "Semiconductors control the flow of charge; they do not generate it themselves."}]}, {"question": "According to the Law of Charges and the explanation of electrostatic force, if two negatively charged objects are moved closer to each other, what will happen to the electrostatic force between them?", "options": [{"text": "The force will become attractive and decrease in strength.", "isCorrect": false, "rationale": "Like charges repel, so the force will remain repulsive, and moving them closer increases strength."}, {"text": "The force will remain repulsive and decrease in strength.", "isCorrect": false, "rationale": "Moving charged objects closer together increases the electrostatic force, it does not decrease it."}, {"text": "The force will remain repulsive and increase in strength.", "isCorrect": true, "rationale": "The Law of Charges states 'Like charges repel,' meaning two negative charges will push each other apart. The text also notes that the electrostatic force 'grows stronger as the charges get closer together.'"}, {"text": "The force will become attractive and increase in strength.", "isCorrect": false, "rationale": "Like charges repel, so the force will not become attractive."}]}, {"question": "A construction worker claims that wearing standard rubber gloves provides absolute protection against electric shock, even from a lightning strike. Based on the 'Think Deeper' section, what is the most significant flaw in this claim?", "options": [{"text": "Lightning strikes involve static electricity, not current, so gloves are irrelevant.", "isCorrect": false, "rationale": "Lightning involves massive current flow; it's not simply static charge in the context of electrical safety."}, {"text": "Rubber gloves can become conductors if they are made wet or are subjected to extremely high voltages, such as from lightning.", "isCorrect": true, "rationale": "The 'Think Deeper' guidance explains that 'Very high voltages (such as lightning — millions of volts) can force current through rubber by breaking down its molecular structure (dielectric breakdown). Wet or dirty rubber conducts better because water with dissolved salts is a conductor.' Thus, no insulator is perfect."}, {"text": "Rubber only insulates against low voltages; high voltages always pass through.", "isCorrect": false, "rationale": "While high voltages are a factor, it's about the breakdown of the insulator's resistance, not that high voltages *always* pass through without resistance; the statement oversimplifies the physics of dielectric breakdown."}, {"text": "Rubber gloves are designed to protect against chemical exposure, not electrical shock.", "isCorrect": false, "rationale": "While some rubber gloves have chemical resistance, electrical safety gloves are specifically designed for electrical insulation, but they have limits, as discussed."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
