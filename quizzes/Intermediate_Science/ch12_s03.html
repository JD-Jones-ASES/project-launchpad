<script>
var QUESTIONS = [{"question": "What is the primary driver of all wind systems on Earth?", "options": [{"text": "The rotation of Earth, which creates the Coriolis effect.", "isCorrect": false, "rationale": "The Coriolis effect deflects wind paths but does not create the initial movement of air; pressure differences do that."}, {"text": "Differences in atmospheric pressure, generated by the unequal heating of Earth's surface by the Sun.", "isCorrect": true, "rationale": "The text states that wind is 'driven by differences in atmospheric pressure, which in turn are created by the unequal heating of Earth's surface by the Sun.' This is the fundamental cause."}, {"text": "The interaction between warm ocean currents and cold landmasses.", "isCorrect": false, "rationale": "While ocean and land temperature differences can contribute to local winds, they are not the primary, global driver of all wind systems, which is rooted in solar heating and pressure gradients."}, {"text": "The friction between the atmosphere and Earth's surface.", "isCorrect": false, "rationale": "Friction can slow down or alter wind speed near the surface, but it is not the force that initiates wind movement."}], "id": "q01"}, {"question": "Why do equatorial regions tend to have lower atmospheric pressure at the surface compared to polar regions?", "options": [{"text": "The Coriolis effect is weakest at the equator, allowing air to escape more easily into space.", "isCorrect": false, "rationale": "The Coriolis effect influences deflection, not the initial pressure differences, and air does not 'escape' into space due to weak Coriolis."}, {"text": "Warm air at the equator is denser and sinks, creating a region of lower pressure.", "isCorrect": false, "rationale": "Warm air is less dense and rises, not sinks. Sinking air creates high pressure, not low pressure."}, {"text": "Direct solar heating at the equator causes air to warm, become less dense, and rise, resulting in lower surface pressure.", "isCorrect": true, "rationale": "The text explains that warm air at the equator rises because it is less dense, leaving a region of low pressure at the surface. This is directly linked to the more direct sunlight received at the equator."}, {"text": "Polar regions have more landmass, which radiates heat more efficiently, drawing air from the equator.", "isCorrect": false, "rationale": "Polar regions are characterized by ice and ocean, and they receive less direct sunlight, making them cooler. Landmass distribution isn't the primary reason for global pressure differences."}], "id": "q02"}, {"question": "Imagine a parcel of air moving northward from the South Pole towards the equator. Due to the Coriolis effect, in which direction would an observer on Earth perceive the parcel of air to be deflected?", "options": [{"text": "To the right of its direction of travel.", "isCorrect": false, "rationale": "Deflection to the right occurs in the Northern Hemisphere. The air parcel originates in the Southern Hemisphere."}, {"text": "To the left of its direction of travel.", "isCorrect": true, "rationale": "The text explicitly states, 'In the Southern Hemisphere, moving objects are deflected to the left' of their direction of travel."}, {"text": "Straight along the pressure gradient, as Coriolis effect is negligible at the poles.", "isCorrect": false, "rationale": "The Coriolis effect is strongest at the poles, not negligible. Air would only move in a straight line if Earth did not rotate."}, {"text": "It would not be deflected, as it is moving directly along a line of longitude.", "isCorrect": false, "rationale": "Any moving object (including wind) on a rotating Earth is subject to the Coriolis effect, regardless of its initial direction relative to longitude."}], "id": "q03"}, {"question": "Which statement accurately describes the characteristics and formation of the prevailing westerlies in the Northern Hemisphere?", "options": [{"text": "They are steady easterly winds that blow from about 30° latitude toward the equator.", "isCorrect": false, "rationale": "This description refers to the Trade winds, not the westerlies. Trade winds are easterly and blow towards the equator."}, {"text": "They result from cold, dense air sinking at the poles and flowing towards 60° latitude, deflected to the east.", "isCorrect": false, "rationale": "This describes the Polar Easterlies, which originate from cold air at the poles."}, {"text": "They blow predominantly from the southwest, formed by surface air flowing poleward from 30° latitude and deflecting to the right by the Coriolis effect.", "isCorrect": true, "rationale": "The text states that surface air from the sinking zone at 30° latitude flows poleward, and the Coriolis effect deflects these winds to the right in the Northern Hemisphere, causing them to blow predominantly from the southwest."}, {"text": "They are found near the equator and were crucial for European sailors during the Age of Exploration.", "isCorrect": false, "rationale": "This describes the Trade winds, specifically mentioning their historical importance to sailors, and their location is between 0°-30° latitude."}], "id": "q04"}, {"question": "A commercial airline pilot plans a flight from Los Angeles to New York. The pilot anticipates a faster travel time and less fuel consumption for this eastbound journey compared to the return westbound flight. What is the most likely meteorological factor contributing to this difference?", "options": [{"text": "The influence of local land breezes pushing the plane eastward.", "isCorrect": false, "rationale": "Land breezes are local, surface-level phenomena and would not significantly impact high-altitude, transcontinental flight times."}, {"text": "Flying with the prevailing flow of the polar jet stream, which generally moves west to east across continents.", "isCorrect": true, "rationale": "The text explains that jet streams 'steer large-scale weather systems' and 'Airplanes flying with the jet stream (west to east) travel faster and burn less fuel; flights against it are slower.' The continental United States lies within the general path of the polar jet stream."}, {"text": "Encountering stronger sea breezes over the Atlantic Ocean on the eastbound leg.", "isCorrect": false, "rationale": "Sea breezes are local coastal phenomena and would not affect a flight across the entire continent at high altitudes."}, {"text": "The global trade winds are stronger and consistently easterly at higher altitudes.", "isCorrect": false, "rationale": "Trade winds are located at lower latitudes (0°-30°) and are easterly, but the primary factor for high-altitude transcontinental travel in the U.S. is the jet stream."}], "id": "q05"}, {"question": "A person living along the coast notices a consistent, refreshing breeze blowing from the sea towards the land every afternoon. What is the underlying cause of this local wind pattern?", "options": [{"text": "The Coriolis effect deflecting prevailing offshore winds towards the coast.", "isCorrect": false, "rationale": "The Coriolis effect is too weak to significantly influence small-scale local winds like sea breezes, and it deflects, it doesn't cause the initial movement."}, {"text": "During the day, land heats up faster than the ocean, creating a low-pressure area over land that draws cooler air from the sea.", "isCorrect": true, "rationale": "The text describes a sea breeze: 'During the day, land heats up faster than the ocean. Warm air over the land rises (low pressure), and cooler air from over the ocean flows inland to replace it.'"}, {"text": "Cool air over the land sinking and flowing towards the warmer ocean at night.", "isCorrect": false, "rationale": "This describes a land breeze, which occurs at night when the land cools faster than the ocean, reversing the pressure gradient."}, {"text": "The subtropical jet stream dipping southward, pulling in marine air currents.", "isCorrect": false, "rationale": "The jet stream is a high-altitude, large-scale phenomenon and does not directly cause local surface-level sea breezes."}], "id": "q06"}, {"question": "According to the text, at which location would the Coriolis effect have the LEAST observable influence on the deflection of large-scale winds?", "options": [{"text": "Near the South Pole.", "isCorrect": false, "rationale": "The text states the Coriolis effect is strongest at the poles, not weakest."}, {"text": "Along the 30° latitude lines (where trade winds originate).", "isCorrect": false, "rationale": "While not the strongest, the Coriolis effect is still significant at 30° latitude, clearly deflecting the trade winds."}, {"text": "At the North Pole.", "isCorrect": false, "rationale": "The text states the Coriolis effect is strongest at the poles, not weakest."}, {"text": "Directly at the equator.", "isCorrect": true, "rationale": "The text explicitly states, 'The Coriolis effect is strongest at the poles and weakest at the equator.'"}], "id": "q07"}, {"question": "The 'polar front' is characterized by frequent storm activity. What is the primary cause of the formation of this atmospheric boundary?", "options": [{"text": "The meeting of warm trade winds and cold westerlies at the equator.", "isCorrect": false, "rationale": "The polar front forms at about 60° latitude, not the equator, and involves polar easterlies and westerlies, not trade winds."}, {"text": "The convergence of cold polar easterlies flowing from the poles and warmer westerlies flowing poleward from mid-latitudes, typically around 60° latitude.", "isCorrect": true, "rationale": "The text states, 'Where the cold polar easterlies meet the warmer westerlies, a boundary called the polar front forms — a zone of frequent storm activity' near 60° latitude."}, {"text": "The interaction between the subtropical jet stream and local sea breezes, intensifying frontal systems.", "isCorrect": false, "rationale": "While jet streams influence weather systems, the polar front is primarily defined by the meeting of two major surface wind belts, not by jet stream-local wind interaction."}, {"text": "Unequal heating at the equator causing air to rise and creating a zone of constant low pressure.", "isCorrect": false, "rationale": "This is the initial driver of global circulation but does not directly describe the formation of the specific polar front boundary."}], "id": "q08"}, {"question": "The 'thinkdeeper' section highlights that the Coriolis effect is too weak to influence small-scale phenomena like water draining in a bathtub. Based on this information and the broader context, what key principle explains why the Coriolis effect is critical for global winds but not for a bathtub?", "options": [{"text": "Bathtub drains are not affected by atmospheric pressure differences, unlike global winds.", "isCorrect": false, "rationale": "While true, this doesn't address the scale at which the Coriolis effect operates; the question is specifically about the Coriolis effect's relevance."}, {"text": "The Coriolis effect only impacts objects moving in perfectly straight lines, not swirling water.", "isCorrect": false, "rationale": "The Coriolis effect deflects the *path* of moving objects, whether straight or already curving. The key factor is the scale of the movement."}, {"text": "The Coriolis effect is a large-scale force that requires significant distances and durations of movement to become apparent, which are absent in a bathtub.", "isCorrect": true, "rationale": "The text explicitly states, 'the Coriolis effect is far too weak to influence small-scale phenomena like bathtub drains.' This implies it is a force that only becomes significant over large spatial and temporal scales, such as global wind systems."}, {"text": "Water in a bathtub moves too slowly for the Coriolis effect to take hold, unlike fast-moving jet streams.", "isCorrect": false, "rationale": "While speed can affect the *magnitude* of deflection, the primary reason given for the bathtub drain is the 'small-scale phenomenon,' implying distance and duration are more critical than instantaneous speed for the effect to manifest visibly."}], "id": "q09"}, {"question": "If Earth suddenly stopped rotating but continued to receive unequal heating from the Sun, what would be the most direct consequence for global wind patterns?", "options": [{"text": "The jet streams would become significantly stronger and more stable, as there would be no rotational forces to disrupt them.", "isCorrect": false, "rationale": "Jet streams are a product of the Coriolis effect and the boundaries between wind belts, so they would likely cease to exist or drastically change without Earth's rotation."}, {"text": "Global winds would blow in straight lines from the poles directly towards the equator, following the pressure gradient.", "isCorrect": true, "rationale": "The text states, 'If Earth did not rotate, wind would blow in straight lines from the poles toward the equator (following the pressure gradient).' Without rotation, the Coriolis effect would be absent, and wind would purely follow pressure differences."}, {"text": "Sea breezes would become more widespread and intense globally due to the lack of rotational interference.", "isCorrect": false, "rationale": "Sea breezes are local phenomena caused by differential heating of land and sea, and while rotation affects global winds, its absence wouldn't inherently intensify local breezes globally."}, {"text": "Atmospheric pressure would equalize across the globe, eliminating all wind.", "isCorrect": false, "rationale": "The unequal heating from the Sun would still create temperature and thus pressure differences (warm equator, cold poles), which would still drive air movement from high to low pressure."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
