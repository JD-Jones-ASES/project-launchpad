    };

<body>
<div class="quiz-container">

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 14, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In physics, which of the following activities *definitely* involves work being done on an object?", "options": [{"text": "A student studying for a test while sitting still.", "isCorrect": false, "rationale": "Studying involves mental effort but no physical force causing displacement of an object, so no physics work is done."}, {"text": "A person holding a heavy backpack motionless on their shoulders.", "isCorrect": false, "rationale": "Although a force is exerted, there is no displacement of the backpack, therefore no physics work is done."}, {"text": "A construction worker pushing a wheelbarrow full of bricks across a construction site.", "isCorrect": true, "rationale": "A force is applied to the wheelbarrow, and it moves a certain distance in the direction of the force (or at least a component of the force is in the direction of motion), thus satisfying the physics definition of work."}, {"text": "A child pushing against a wall that does not move.", "isCorrect": false, "rationale": "A force is applied, but the wall does not move (zero displacement), so no physics work is done."}]}, {"question": "Which of the following expressions is *not* an equivalent unit for work in the SI system?", "options": [{"text": "Joule (J)", "isCorrect": false, "rationale": "The Joule is the standard SI unit of work and energy."}, {"text": "Newton-meter (N m)", "isCorrect": false, "rationale": "The definition of a Joule is one Newton-meter (1 J = 1 N m), making this an equivalent unit."}, {"text": "Kilogram-meter squared per second squared (kg m²/s²)", "isCorrect": false, "rationale": "Since 1 N = 1 kg m/s², then 1 N m = (1 kg m/s²) m = 1 kg m²/s², making this an equivalent unit."}, {"text": "Newton per meter (N/m)", "isCorrect": true, "rationale": "Newton per meter is a unit of force constant (like a spring constant), not work. Work is a product of force and displacement (N m), not a ratio."}]}, {"question": "A waiter carries a tray of food horizontally across a restaurant at a constant speed. The waiter exerts an upward force on the tray to support it against gravity. How much physics work does the waiter do *on the tray*?", "options": [{"text": "A positive amount of work, as the waiter is exerting effort.", "isCorrect": false, "rationale": "While the waiter exerts metabolic effort, physics work is not solely defined by effort. The direction of force relative to displacement is crucial."}, {"text": "A negative amount of work, because the tray's speed is constant.", "isCorrect": false, "rationale": "Constant speed means net force is zero, but it doesn't automatically mean negative work from a specific force. The key is the angle."}, {"text": "Zero work, because the force exerted is perpendicular to the direction of motion.", "isCorrect": true, "rationale": "The waiter exerts an upward force (vertical), but the tray moves horizontally. Since the force is perpendicular to the displacement (angle = 90 degrees), the cosine of the angle is 0, meaning W = Fd cos(90°) = 0 J. No energy is transferred to the tray in the vertical direction to change its kinetic energy."}, {"text": "A positive amount of work, equal to the force times the distance carried.", "isCorrect": false, "rationale": "This calculation (W = Fd) is only valid if the force is in the same direction as the displacement. Here, the force and displacement are perpendicular."}]}, {"question": "In the general work equation, W = Fd cos(theta), what does the term 'cos(theta)' fundamentally represent?", "options": [{"text": "The total magnitude of the applied force.", "isCorrect": false, "rationale": "The total magnitude of the applied force is represented by 'F', not 'cos(theta)'."}, {"text": "The angle between the force and the displacement.", "isCorrect": false, "rationale": "The Greek letter 'theta' represents the angle itself; 'cos(theta)' is the cosine function applied to that angle."}, {"text": "The fraction of the force that acts in the direction of motion.", "isCorrect": true, "rationale": "The text states, 'Only the part of the force that acts along the direction of motion does work. The function cos(theta) gives us the fraction of the force that acts in the direction of motion.' Thus, F cos(theta) represents the effective force component in the direction of displacement."}, {"text": "The component of the force that acts perpendicular to the direction of motion.", "isCorrect": false, "rationale": "The component of the force perpendicular to the direction of motion would be related to 'sin(theta)', not 'cos(theta)'."}]}, {"question": "A student pulls a sled with a force of 75 N along a rope that makes a 45° angle with the horizontal ground. If the sled moves 15 m along the ground, how much work does the student do? (Assume cos 45° ≈ 0.707)", "options": [{"text": "1125 J", "isCorrect": false, "rationale": "This result (75 N * 15 m = 1125 J) would be correct if the force was entirely in the direction of motion (i.e., angle = 0 degrees), but it ignores the angle."}, {"text": "530.25 J", "isCorrect": false, "rationale": "This calculation (75 * 15 * sin 45°) uses the sine function, which represents the vertical component of the force, not the horizontal component that does work."}, {"text": "795.38 J", "isCorrect": true, "rationale": "Using the work equation W = Fd cos(theta): W = (75 N)(15 m)(cos 45°) = (75)(15)(0.707) = 1125 * 0.707 ≈ 795.38 J."}, {"text": "0 J", "isCorrect": false, "rationale": "Zero work would imply the force is perpendicular to displacement, or there is no displacement, neither of which is true here."}]}, {"question": "What is the consequence when a force does negative work on an object?", "options": [{"text": "The force is perpendicular to the direction of motion, and no energy is transferred.", "isCorrect": false, "rationale": "This describes zero work (angle = 90 degrees), not negative work."}, {"text": "The force has a component in the direction of motion, and energy is transferred to the object.", "isCorrect": false, "rationale": "This describes positive work, which increases the object's kinetic energy."}, {"text": "The force has a component opposite to the direction of motion, and energy is transferred from the object.", "isCorrect": true, "rationale": "Negative work occurs when the force opposes motion (e.g., friction). This results in energy being transferred from the object, typically decreasing its kinetic energy, as stated in the 'Positive, Negative, and Zero Work' section."}, {"text": "The object's speed increases, but its kinetic energy remains constant.", "isCorrect": false, "rationale": "If an object's speed increases, its kinetic energy also increases. Negative work causes a decrease in kinetic energy."}]}, {"question": "An astronaut exerts a force to push a satellite into a new orbit. If the astronaut remains stationary relative to their spaceship, how much work does the astronaut do *on the spaceship* through their tether?", "options": [{"text": "Positive work, because the astronaut is applying a force.", "isCorrect": false, "rationale": "Applying a force alone is not sufficient for physics work. Displacement is also required."}, {"text": "Negative work, due to the reaction force from pushing the satellite.", "isCorrect": false, "rationale": "While there is a reaction force, if there is no displacement of the spaceship (or the astronaut relative to it), no work is done."}, {"text": "Zero work, because there is no displacement of the astronaut relative to the spaceship.", "isCorrect": true, "rationale": "Work requires both a force and a displacement in the direction of that force. Since the astronaut (and thus the tether attached to the spaceship) experiences no displacement, the work done on the spaceship is zero, as clarified in the 'Zero work' section."}, {"text": "The amount of work depends on the magnitude of the force applied to the satellite.", "isCorrect": false, "rationale": "The force applied to the satellite is relevant for the work done on the satellite, but not for the work done on the spaceship if the spaceship itself is not displaced."}]}, {"question": "If the angle (theta) between the applied force and the direction of displacement is 180 degrees, what type of work is done, and what is its effect on the object's kinetic energy?", "options": [{"text": "Positive work; kinetic energy increases.", "isCorrect": false, "rationale": "An angle of 180 degrees means the force opposes motion, leading to negative work, not positive work, and decreases kinetic energy."}, {"text": "Zero work; kinetic energy remains constant.", "isCorrect": false, "rationale": "Zero work occurs when the angle is 90 degrees. An angle of 180 degrees results in negative work and a change in kinetic energy."}, {"text": "Negative work; kinetic energy decreases.", "isCorrect": true, "rationale": "As per the 'Key values to remember' table, cos(180°) = -1. This results in negative work (W = Fd * -1), indicating that energy is transferred from the object, thus decreasing its kinetic energy, as exemplified by friction."}, {"text": "Maximum positive work; kinetic energy significantly increases.", "isCorrect": false, "rationale": "Maximum positive work occurs when the angle is 0 degrees (cos(0°) = 1), meaning force and displacement are in the same direction."}]}, {"question": "A block slides across a flat, frictionless surface. A constant normal force acts upward on the block, and gravity acts downward. Which statement accurately describes the work done by the normal force and gravity on the block?", "options": [{"text": "Both the normal force and gravity do positive work, contributing to the block's motion.", "isCorrect": false, "rationale": "Both forces are perpendicular to horizontal motion, so they do no work. Also, gravity acts opposite to the normal force."}, {"text": "The normal force does positive work, and gravity does negative work.", "isCorrect": false, "rationale": "Both forces are perpendicular to the horizontal displacement, so neither does positive nor negative work."}, {"text": "Both the normal force and gravity do zero work on the block.", "isCorrect": true, "rationale": "The normal force acts vertically upward, and gravity acts vertically downward. Since the block's displacement is horizontal, both forces are perpendicular to the direction of motion (angle = 90 degrees). Therefore, as per the 'Zero work' definition, W = Fd cos(90°) = 0 J for both forces."}, {"text": "The normal force does zero work, but gravity does work equal to the block's weight times the distance.", "isCorrect": false, "rationale": "Gravity would only do work if there was a vertical displacement. With horizontal motion, both forces do zero work."}]}, {"question": "When considering the work done by an applied force, why is only the component of the force that acts in the direction of motion relevant?", "options": [{"text": "Forces perpendicular to motion always result in friction, which cancels out work.", "isCorrect": false, "rationale": "Perpendicular forces do not necessarily cause friction, nor do they cancel out work in this manner. They simply do no work themselves."}, {"text": "Work is a scalar quantity, so only magnitudes are considered, not directions.", "isCorrect": false, "rationale": "While work is a scalar, its calculation depends on the vector directions of force and displacement. This statement is misleading."}, {"text": "The definition of work (W = Fd cos(theta)) mathematically accounts for only the effective force component contributing to displacement.", "isCorrect": true, "rationale": "The general work equation, W = Fd cos(theta), is constructed precisely to use only the component of the force (F cos(theta)) that is parallel to the displacement (d). Any force component perpendicular to the displacement does not contribute to the work done, as cos(90°) = 0."}, {"text": "Any force component not aligned with motion causes the object to rotate rather than translate.", "isCorrect": false, "rationale": "This is incorrect. A force component perpendicular to motion does not necessarily cause rotation, and it definitively does no translational work."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
