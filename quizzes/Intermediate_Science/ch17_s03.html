<body>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Which of the following best describes the fundamental nature of an ocean wave as it travels through water?", "options": [{"text": "It involves a permanent displacement of water particles, causing them to move forward with the wave.", "isCorrect": false, "rationale": "Waves transfer energy, not water. Water particles move in circular orbits and return approximately to their original positions, they do not permanently displace or travel forward with the wave."}, {"text": "It is a disturbance that transfers energy through the water medium without permanently displacing the water itself.", "isCorrect": true, "rationale": "The text explicitly states that a wave is 'A disturbance that transfers energy through a medium (such as water) without permanently displacing the medium itself.' Floating objects bob up and down but do not travel forward with the wave."}, {"text": "It is a continuous flow of water from the open ocean towards the shore, driven by wind.", "isCorrect": false, "rationale": "This describes a current or stream, not the oscillatory motion of a wave. Waves are primarily about energy transfer, not mass transport."}, {"text": "It represents the direct movement of water from the crest to the trough, creating a void that pulls the water forward.", "isCorrect": false, "rationale": "Water particles move in circular orbits; there isn't a direct flow from crest to trough that propels the wave forward in this manner. This option misrepresents the physics of wave motion."}], "id": "q01"}, {"question": "An ocean wave has a wave height of 6 meters. What is its amplitude and what does this property relate to?", "options": [{"text": "Its amplitude is 6 meters, and it relates to the wave's speed.", "isCorrect": false, "rationale": "Amplitude is half the wave height (3 meters in this case), not equal to it. Amplitude primarily relates to the energy carried by the wave, not its speed directly."}, {"text": "Its amplitude is 3 meters, and it relates to the energy carried by the wave.", "isCorrect": true, "rationale": "The text defines amplitude as 'Half the wave height; the distance from the undisturbed water level (the “rest position”) to either a crest or a trough.' It also states that 'Amplitude relates to the energy carried by the wave — larger amplitude means more energy.'"}, {"text": "Its amplitude is 12 meters, and it relates to the number of waves passing a point per second.", "isCorrect": false, "rationale": "Amplitude is half the wave height, so it would be 3 meters, not 12 meters. The number of waves passing a point per second is the frequency, not directly related to amplitude."}, {"text": "Its amplitude is 3 meters, and it relates to the time it takes for one wave to pass a fixed point.", "isCorrect": false, "rationale": "While the amplitude is indeed 3 meters, the time it takes for one wave to pass a fixed point is the period, which is not what amplitude primarily relates to. Amplitude relates to energy."}], "id": "q02"}, {"question": "A scientist observes an ocean wave passing a fixed buoy. She measures the time for one complete wave to pass as 5 seconds. If the wave's frequency is 0.2 Hz, what is its wavelength?", "options": [{"text": "10 meters", "isCorrect": false, "rationale": "This answer might come from multiplying period by frequency, or an incorrect application of the wave speed formula. The period (5s) correctly implies a frequency of 1/5 = 0.2 Hz. To find wavelength, we need speed. Speed isn't given directly, so we can't calculate wavelength this way."}, {"text": "25 meters", "isCorrect": false, "rationale": "This value does not result from the correct application of the given information. The information provided (period and frequency) confirms their reciprocal relationship, but is insufficient to directly calculate wavelength without wave speed."}, {"text": "The wavelength cannot be determined from the information provided.", "isCorrect": true, "rationale": "The problem gives the period (T = 5s) and the frequency (f = 0.2 Hz). These two values are reciprocals (T = 1/f), which means they are consistent with each other. However, to calculate the wavelength (λ) using the wave speed equation (v = λf), one needs the wave speed (v) or an additional piece of information that allows for its calculation. Without wave speed, wavelength cannot be determined."}, {"text": "1 meter", "isCorrect": false, "rationale": "This value does not result from the correct application of the given information. The information provided (period and frequency) confirms their reciprocal relationship, but is insufficient to directly calculate wavelength without wave speed."}], "id": "q03"}, {"question": "Which of the following scenarios describes a wave that is considered to be in 'deep water' according to the text?", "options": [{"text": "A wave with a wavelength of 10 meters in water that is 3 meters deep.", "isCorrect": false, "rationale": "For deep water, the depth must be greater than half the wavelength. Here, half the wavelength is 5 meters (10m / 2), and the depth (3m) is less than 5 meters, so this is shallow water."}, {"text": "A wave with a wavelength of 20 meters in water that is 12 meters deep.", "isCorrect": true, "rationale": "The text states that in deep water, 'the water depth is greater than half the wavelength.' Here, half the wavelength is 10 meters (20m / 2), and the water depth (12m) is greater than 10 meters, classifying it as deep water."}, {"text": "A wave with a wavelength of 5 meters in water that is 2 meters deep.", "isCorrect": false, "rationale": "Half the wavelength is 2.5 meters (5m / 2). The depth (2m) is less than 2.5 meters, so this is shallow water."}, {"text": "A wave of any wavelength, as long as the water is at least 10 meters deep.", "isCorrect": false, "rationale": "The definition of deep or shallow water is relative to the wave's wavelength, not an absolute depth. A 10-meter depth might be deep for a 1-meter wavelength but shallow for a 30-meter wavelength."}], "id": "q04"}, {"question": "As an ocean wave approaches the shoreline and the water depth decreases significantly, what is the most accurate sequence of changes that occur to the wave?", "options": [{"text": "The wave speeds up, its wavelength increases, and its height decreases.", "isCorrect": false, "rationale": "As waves approach shore, they slow down, their wavelength decreases (they bunch together), and their height increases, eventually breaking. This option describes the opposite changes for speed, wavelength, and height."}, {"text": "The wave slows down, its wavelength decreases, and its height increases.", "isCorrect": true, "rationale": "The text explicitly states that as a wave approaches shore and 'feels' the bottom: 'The wave slows down. The wavelength decreases (waves bunch together). The wave height increases (the wave grows taller).'"}, {"text": "The wave's speed remains constant, its wavelength increases, and its height decreases.", "isCorrect": false, "rationale": "The wave's speed does not remain constant; it slows down. Also, its wavelength decreases, and its height increases, contradicting this option."}, {"text": "The wave speeds up, its wavelength decreases, and its height remains constant.", "isCorrect": false, "rationale": "The wave speeds down, not up. Its wavelength decreases (correct), but its height increases, it does not remain constant."}], "id": "q05"}, {"question": "Why do waves consistently break parallel to the shoreline, regardless of their initial direction in the open ocean?", "options": [{"text": "The gravitational pull of the Moon redirects the waves as they get closer to land.", "isCorrect": false, "rationale": "The Moon's gravity primarily causes tides, not the refraction and breaking of individual wind waves parallel to shore. This is an incorrect attribution of cause."}, {"text": "Wind currents near the shore always align waves to be parallel to the coastline.", "isCorrect": false, "rationale": "While local winds can influence waves, the primary reason for waves breaking parallel to shore is their interaction with the seafloor, not always wind alignment."}, {"text": "As waves enter shallower water, the part of the wave closest to shore slows down first, causing the wave to bend and align.", "isCorrect": true, "rationale": "The text explains, 'As a wave approaches shore and the water becomes shallower... The wave slows down.' This differential slowing (refraction) causes the wave front to bend and align parallel to the contours of the seabed, and thus, the shoreline, before it breaks."}, {"text": "The decrease in water depth causes the wave to dissipate all its energy before it reaches the shore, creating a uniform breaking line.", "isCorrect": false, "rationale": "The wave does not dissipate all its energy; rather, its energy is concentrated into a smaller area as its height increases, leading to breaking. The uniformity of the breaking line is due to refraction, not dissipation."}], "id": "q06"}, {"question": "What is the primary cause of tides, and how often do most coastlines experience them?", "options": [{"text": "Tides are caused by Earth's rotation, resulting in two high tides and two low tides each month.", "isCorrect": false, "rationale": "Earth's rotation contributes to the daily cycle of tides but is not the primary cause. Tides occur approximately twice daily, not monthly."}, {"text": "Tides are primarily caused by wind pushing water towards and away from the shore, resulting in one high tide and one low tide daily.", "isCorrect": false, "rationale": "Wind can cause storm surges or local water level changes, but it is not the primary cause of the predictable, global tides. Also, most coastlines experience two high and two low tides daily."}, {"text": "Tides are primarily caused by the gravitational pull of the Moon and Sun, resulting in two high tides and two low tides each day.", "isCorrect": true, "rationale": "The text explicitly states: 'Tides are the daily rise and fall of the ocean surface caused by the gravitational attraction between Earth and the Moon (and, to a lesser extent, the Sun).' It also mentions, 'Most coastlines experience two high tides and two low tides each day.'"}, {"text": "Tides are caused by changes in atmospheric pressure, leading to unpredictable fluctuations in sea level.", "isCorrect": false, "rationale": "While atmospheric pressure can affect sea level slightly, it is not the primary cause of the regular, periodic rise and fall of the tides. Tides are highly predictable based on astronomical alignments."}], "id": "q07"}, {"question": "A student wonders why there are two high tides on opposite sides of the Earth at the same time, given that the Moon's gravity pulls water towards it. Which explanation is most accurate?", "options": [{"text": "The Moon's gravity pulls all water towards it, creating one bulge, and the second bulge is an optical illusion.", "isCorrect": false, "rationale": "The existence of two bulges is a real physical phenomenon, not an illusion. The explanation for the second bulge is critical."}, {"text": "One bulge forms on the side of Earth facing the Moon due to direct gravitational pull, and a second bulge forms on the opposite side because the Moon's gravity pulls Earth away from the water there.", "isCorrect": true, "rationale": "The text explains: 'The Moon's gravity pulls on the ocean, creating a tidal bulge on the side of Earth facing the Moon. A second bulge forms on the opposite side of Earth because the Moon's gravity pulls Earth (the solid planet) slightly away from the water on the far side.'"}, {"text": "The first bulge is caused by the Moon's gravity, and the second is caused by the Sun's gravity, which is always 12 hours out of phase.", "isCorrect": false, "rationale": "While the Sun influences tides, the second bulge opposite the Moon is primarily explained by the Moon's differential gravitational pull on Earth and its water, not solely by the Sun's separate influence or a fixed phase difference."}, {"text": "The two bulges are a result of Earth's centrifugal force throwing water outwards on both sides.", "isCorrect": false, "rationale": "While a simplified explanation might involve centrifugal force, the text's explanation focuses more accurately on the differential gravitational pull of the Moon on the solid Earth versus the ocean water on the far side."}], "id": "q08"}, {"question": "During which celestial alignment would a coastal town experience the most significant difference between high and low tides, and what is this phenomenon called?", "options": [{"text": "When the Moon is at its first quarter, resulting in neap tides.", "isCorrect": false, "rationale": "First quarter moon corresponds to neap tides, where the Sun and Moon are at right angles, partially canceling their effects and producing the smallest tidal range (lower high tides, higher low tides), not the most significant difference."}, {"text": "When the Sun, Moon, and Earth are aligned, resulting in spring tides.", "isCorrect": true, "rationale": "The text states: 'Spring tides occur when the Sun, Moon, and Earth are aligned (during full moon and new moon). The gravitational pulls of the Sun and Moon combine, producing extra-high high tides and extra-low low tides — the greatest tidal range.'"}, {"text": "When the Moon is at its third quarter, resulting in neap tides.", "isCorrect": false, "rationale": "Third quarter moon also results in neap tides, characterized by the smallest tidal range, not the greatest. The Sun and Moon are at right angles relative to Earth."}, {"text": "When the Moon is at its greatest distance from Earth, resulting in apogee tides.", "isCorrect": false, "rationale": "While the Moon's distance from Earth does affect tidal strength, the alignment of the Sun, Moon, and Earth (spring/neap) is the primary factor determining the greatest tidal range, as described in the text. 'Apogee tides' is not the term for the largest tidal range caused by alignment."}], "id": "q09"}, {"question": "A ship captain planning to navigate a large vessel into a shallow harbor needs to ensure sufficient water depth. Based on the provided text, during which lunar phases would it be most advisable for the captain to plan their entry to maximize depth?", "options": [{"text": "During a first quarter moon, to benefit from higher high tides of neap tides.", "isCorrect": false, "rationale": "First quarter moons result in neap tides, which have 'lower high tides' and 'higher low tides' compared to spring tides. This would not maximize the high tide depth for navigation."}, {"text": "During a full moon or new moon, to benefit from the extra-high high tides of spring tides.", "isCorrect": true, "rationale": "The text states that 'Spring tides occur when the Sun, Moon, and Earth are aligned (during full moon and new moon)' and they produce 'extra-high high tides.' These extra-high high tides would provide the maximum water depth for a large vessel needing to navigate a shallow harbor."}, {"text": "During a third quarter moon, as this phase brings the highest overall water levels.", "isCorrect": false, "rationale": "Third quarter moons correspond to neap tides, which have lower high tides and a smaller tidal range, not the highest overall water levels needed for maximum depth."}, {"text": "During any quarter moon, as tidal range is minimal, ensuring consistent depth.", "isCorrect": false, "rationale": "Quarter moons (first and third) result in neap tides, which have the smallest tidal range, meaning lower high tides. While consistent, this consistency is at a lower maximum depth compared to spring tides, which are better for maximizing depth."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
