<script>
var QUESTIONS = [{"question": "What is the primary purpose of the 'Vocabulary Review' section for students?", "options": [{"text": "To introduce new vocabulary terms for the upcoming cycle.", "isCorrect": false, "rationale": "The text states the section 'collects the key vocabulary terms from all four units in Cycle 4,' indicating it's for review, not introduction of new terms."}, {"text": "To help students review and self-assess their understanding of key terms across different science branches.", "isCorrect": true, "rationale": "The text explicitly states, 'Use it as a study guide and self-check. Can you define each term in your own words? Can you give an example? Can you connect a term from one branch to a term from another...?' This covers review, self-assessment, and cross-branch understanding."}, {"text": "To provide detailed explanations of complex scientific theories.", "isCorrect": false, "rationale": "While vocabulary is foundational to theory, the section focuses on terms, definitions, examples, and connections, not in-depth theoretical explanations."}, {"text": "To prepare students for a specific final exam in a single science branch.", "isCorrect": false, "rationale": "The review covers 'all four units in Cycle 4' (Life, Earth, Chemistry, Physics), indicating a broad review across multiple branches, not a single one."}]}, {"question": "How many distinct science units are covered in the vocabulary review table presented in this section?", "options": [{"text": "Two", "isCorrect": false, "rationale": "The text clearly lists four units: Life Science, Earth Science, Chemistry, and Physics."}, {"text": "Three", "isCorrect": false, "rationale": "The text clearly lists four units: Life Science, Earth Science, Chemistry, and Physics."}, {"text": "Four", "isCorrect": true, "rationale": "The section explicitly lists four units: 'Life Science — Unit 16,' 'Earth Science — Unit 17,' 'Chemistry — Unit 18,' and 'Physics — Unit 19.'"}, {"text": "Five", "isCorrect": false, "rationale": "The text clearly lists four units: Life Science, Earth Science, Chemistry, and Physics."}]}, {"question": "The suggested 'Cross-Branch Connection Activity' encourages students to link terms from different branches using what overarching theme?", "options": [{"text": "'The interconnectedness of energy and matter'.", "isCorrect": false, "rationale": "While a valid scientific theme, it is not the specific theme mentioned in the text for connecting terms in this activity."}, {"text": "'Information flows in structured ways'.", "isCorrect": true, "rationale": "The text directly asks, 'Can you connect a term from one branch to a term from another using the theme “information flows in structured ways”?'"}, {"text": "'The evolution of scientific thought'.", "isCorrect": false, "rationale": "This theme is not mentioned in the context of connecting vocabulary terms across branches in the provided text."}, {"text": "'Universal laws governing natural phenomena'.", "isCorrect": false, "rationale": "This is a broad scientific concept, but not the specific theme provided for the cross-branch connection activity."}]}, {"question": "A teacher wants to use the 'Four-Branch Bingo' game as described. If a student's bingo card has 'gene' (Life Science), 'tectonic plate' (Earth Science), 'electron' (Chemistry), and 'wavelength' (Physics) in a row, what would the teacher most likely do to allow the student to mark these terms for a bingo?", "options": [{"text": "Ask the student to define each term in their own words.", "isCorrect": false, "rationale": "Defining terms in one's own words is a self-check activity, not the method for marking terms in the Bingo game, where definitions are read aloud by the teacher."}, {"text": "Read out the definitions corresponding to each of these four terms.", "isCorrect": true, "rationale": "The instructions for 'Four-Branch Bingo' state: 'Read definitions aloud (or show them on a projector) and have students mark the matching term.'"}, {"text": "Ask the student to connect 'electron' and 'wavelength' conceptually.", "isCorrect": false, "rationale": "Connecting terms is part of the 'Cross-Branch Connection Activity,' not the 'Four-Branch Bingo' game mechanics."}, {"text": "Show examples of each concept on a projector without giving definitions.", "isCorrect": false, "rationale": "While a projector can be used, the text specifies 'Read definitions aloud (or show them on a projector),' indicating that the definition is the key element for marking, not just a visual example."}]}, {"question": "Which statement best describes why the 'Four-Branch Bingo' game is considered an 'effective and engaging way to review vocabulary across branches'?", "options": [{"text": "It ensures that students memorize definitions by requiring them to write each term multiple times.", "isCorrect": false, "rationale": "The game involves marking terms based on read definitions, not writing them multiple times. While it aids memorization, the 'engaging' aspect comes from the game format, not rote writing."}, {"text": "It primarily tests students' ability to connect abstract concepts without memorizing definitions.", "isCorrect": false, "rationale": "The Bingo game is about matching terms to definitions, which relies on definition recall, rather than abstract concept connection which is for the other activity."}, {"text": "It provides a gamified, interactive way for students to practice matching terms to definitions from various science disciplines.", "isCorrect": true, "rationale": "The text describes it as a 'game' where students 'mark the matching term' to a definition, covering 'vocabulary terms from all four branches.' This perfectly aligns with being an 'effective and engaging' way to review 'across branches.'"}, {"text": "It focuses on deep analytical application of terms in complex problem-solving scenarios.", "isCorrect": false, "rationale": "Bingo is a vocabulary review game, not designed for deep analytical problem-solving, which requires a different type of activity."}]}, {"question": "Following the example of 'frequency' connecting to 'codon' because both involve a specific, structured unit that carries information, which of the following hypothetical connections best exemplifies the theme 'information flows in structured ways' within the given science branches?", "options": [{"text": "'Genetic code' (Life Science) and 'chemical formula' (Chemistry).", "isCorrect": true, "rationale": "The genetic code is a highly structured system that dictates the flow of information (from DNA to protein). A chemical formula (e.g., H2O) is a structured representation that carries information about the composition and ratios of elements in a compound, which dictates how substances interact."}, {"text": "'Plate tectonics' (Earth Science) and 'sound intensity' (Physics).", "isCorrect": false, "rationale": "Plate tectonics describes large-scale geological processes, and sound intensity measures loudness. While both are scientific concepts, they do not directly represent 'structured units carrying information' in the same way as genetic code or chemical formulas."}, {"text": "'Acid-base reaction' (Chemistry) and 'ecosystem biodiversity' (Life Science).", "isCorrect": false, "rationale": "Acid-base reactions are chemical processes, and ecosystem biodiversity describes species variety. Neither directly aligns with the idea of 'structured units carrying information' in the specific way the theme is applied."}, {"text": "'Wave amplitude' (Physics) and 'ocean salinity' (Earth Science).", "isCorrect": false, "rationale": "Wave amplitude is a property of a wave, and ocean salinity is a property of water. These are measurements or characteristics, not 'structured units that carry information' in the conceptual sense of the guiding theme."}]}, {"question": "When the text connects 'frequency' (Physics) to 'codon' (Life Science), what is the fundamental shared concept being highlighted between them?", "options": [{"text": "Both describe the rate at which a process occurs.", "isCorrect": false, "rationale": "While frequency describes a rate, a codon is a unit of genetic information, not a rate. This option only partially applies."}, {"text": "Both represent a specific, structured unit that conveys a distinct type of information or instruction.", "isCorrect": true, "rationale": "The text explicitly states: 'both involve a specific, structured unit that carries information — frequency determines the type of EM wave, and a codon determines the amino acid.' This option directly rephrases that explanation."}, {"text": "Both are related to the transfer of energy through a medium.", "isCorrect": false, "rationale": "Frequency relates to energy in waves, but a codon's primary role is information transfer for protein synthesis, not energy transfer through a medium."}, {"text": "Both are determined by random chance rather than specific rules.", "isCorrect": false, "rationale": "Both frequency and codons are governed by specific scientific laws and rules, making them highly predictable and non-random in their function."}]}, {"question": "What primary cognitive skill is the 'Cross-Branch Connection Activity' designed to develop in students?", "options": [{"text": "Rote memorization of scientific definitions.", "isCorrect": false, "rationale": "While knowing definitions is a prerequisite, the activity goes beyond simple recall to making conceptual links between terms from different fields."}, {"text": "The ability to synthesize knowledge and identify conceptual parallels across different scientific disciplines.", "isCorrect": true, "rationale": "The activity asks students to 'draw lines between terms from different branches that share a conceptual connection,' which directly aims to develop the ability to synthesize knowledge and recognize parallels."}, {"text": "Precise experimental design and data analysis.", "isCorrect": false, "rationale": "This activity is a conceptual and analytical exercise, not one that involves designing or conducting experiments."}, {"text": "Detailed historical understanding of scientific discoveries.", "isCorrect": false, "rationale": "The activity focuses on the conceptual relationships between terms, not the historical context of their discovery."}]}, {"question": "A student wants to use the 'Vocabulary Review' section for effective self-study beyond simply memorizing definitions. Based on the introductory questions provided in the text, what would be the most comprehensive approach?", "options": [{"text": "Primarily use flashcards for quick recall without focusing on deeper connections.", "isCorrect": false, "rationale": "While flashcards aid recall, the text encourages going 'beyond' simple definition recall by asking for examples and cross-branch connections."}, {"text": "Only focus on terms from the Life Science and Chemistry units, as they are most complex.", "isCorrect": false, "rationale": "This approach ignores the full breadth of 'all four units' covered and the cross-branch connection theme."}, {"text": "Define each term in their own words, provide an example, and then attempt to connect terms from different branches using the 'information flows in structured ways' theme.", "isCorrect": true, "rationale": "The text explicitly asks students: 'Can you define each term in your own words? Can you give an example? Can you connect a term from one branch to a term from another using the theme “information flows in structured ways”?' This option combines all three suggested self-check activities for comprehensive review."}, {"text": "Create a list of all terms and categorize them by their difficulty level.", "isCorrect": false, "rationale": "While categorizing can be helpful, it's not one of the specific self-study activities suggested in the provided text."}]}, {"question": "The 'Cross-Branch Connection Activity' provides specific examples of connections. Which of the four science branches covered in the review is NOT explicitly featured in either of the specific examples provided ('frequency' to 'codon,' or 'balanced equation' to 'conservation of mass/energy')?", "options": [{"text": "Life Science — Unit 16: Genetics and Heredity.", "isCorrect": false, "rationale": "'Codon' is explicitly given as an example from Life Science."}, {"text": "Earth Science — Unit 17: The Ocean and Water Systems.", "isCorrect": true, "rationale": "The examples given are 'frequency' (Physics) connecting to 'codon' (Life Science), and 'balanced equation' (Chemistry) connecting to 'conservation of mass.' Earth Science is not mentioned in either of these specific examples."}, {"text": "Chemistry — Unit 18: Chemical Reactions and Equations.", "isCorrect": false, "rationale": "'Balanced equation' is explicitly given as an example from Chemistry."}, {"text": "Physics — Unit 19: Waves — Sound and Light.", "isCorrect": false, "rationale": "'Frequency' is explicitly given as an example from Physics."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
