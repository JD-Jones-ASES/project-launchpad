<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the primary challenge every living cell faces that the cell membrane helps to address?", "options": [{"text": "To produce sufficient energy for metabolic processes.", "isCorrect": false, "rationale": "While energy production is vital, the cell membrane's primary role as described is not energy generation itself, but rather maintaining the environment where those processes can occur effectively."}, {"text": "To maintain a specific internal environment despite a different external environment.", "isCorrect": true, "rationale": "The text clearly states the cell membrane's role in maintaining a 'very specific internal environment — the right concentrations of water, ions, nutrients, and waste products — while surrounded by an external environment that is often quite different.'"}, {"text": "To store genetic material securely within its boundaries.", "isCorrect": false, "rationale": "The nucleus (in eukaryotes) is primarily responsible for storing genetic material, not the cell membrane. The membrane's role is boundary and transport regulation."}, {"text": "To facilitate communication with other cells through direct contact.", "isCorrect": false, "rationale": "While cell membranes are involved in communication (e.g., via receptors), its 'remarkable balancing act' is first and foremost about internal environmental stability, as introduced in the text."}], "id": "q01"}, {"question": "How do phospholipids arrange themselves to form the cell membrane's bilayer structure when placed in water?", "options": [{"text": "The hydrophobic tails face outward toward the watery environments, and the hydrophilic heads face inward.", "isCorrect": false, "rationale": "This arrangement would be energetically unfavorable, as the water-fearing tails would be exposed to water, and the water-loving heads would be shielded from it."}, {"text": "The hydrophilic heads face outward toward the watery environments, and the hydrophobic tails face inward, shielded from water.", "isCorrect": true, "rationale": "The text states: 'The hydrophilic heads point outward, toward the watery fluid inside and outside the cell, while the hydrophobic tails point inward, sandwiched between the two layers of heads. This arrangement is energetically favorable.'"}, {"text": "They alternate randomly, with heads and tails facing in all directions.", "isCorrect": false, "rationale": "The arrangement is not random but highly ordered and spontaneous, driven by the hydrophobic and hydrophilic properties of the molecules."}, {"text": "They form a single layer with hydrophilic heads embedded in a protein matrix.", "isCorrect": false, "rationale": "The cell membrane is explicitly described as a 'double-layered sheet' or 'bilayer' of phospholipids, not a single layer."}], "id": "q02"}, {"question": "The 'fluid mosaic model' describes the cell membrane. What does the term 'mosaic' primarily refer to in this model?", "options": [{"text": "The dynamic movement of the phospholipid molecules within the bilayer.", "isCorrect": false, "rationale": "The 'fluid' aspect of the model refers to the movement of lipids, not the 'mosaic' aspect."}, {"text": "The patchwork pattern formed by the scattered proteins embedded within the lipid bilayer.", "isCorrect": true, "rationale": "The text explains: 'fluid mosaic model: 'fluid' because the lipids flow past one another, and 'mosaic' because the scattered proteins form a patchwork pattern like tiles in a mosaic artwork.'"}, {"text": "The ability of the membrane to change its overall shape and volume.", "isCorrect": false, "rationale": "While the membrane is flexible, 'mosaic' specifically refers to the arrangement of its protein components, not its overall shape change."}, {"text": "The varied types of lipids that compose the membrane's core structure.", "isCorrect": false, "rationale": "The 'mosaic' refers to proteins, not the different types of lipids. The core is primarily phospholipids."}], "id": "q03"}, {"question": "Based on its selective permeability, which substance is most likely to pass directly through the hydrophobic interior of the cell membrane without assistance?", "options": [{"text": "Glucose, a relatively large polar molecule.", "isCorrect": false, "rationale": "Glucose is a large polar molecule and requires facilitated diffusion, not direct passage through the hydrophobic core."}, {"text": "Sodium ions (Na+), which are charged particles.", "isCorrect": false, "rationale": "Charged particles like ions cannot cross the hydrophobic core without assistance due to their charge and typically require channel or carrier proteins."}, {"text": "Oxygen (O2), a small nonpolar molecule.", "isCorrect": true, "rationale": "The text explicitly states: 'Small, nonpolar molecules — such as oxygen (O2) and carbon dioxide (CO2) — can slip directly through the hydrophobic interior of the bilayer without any help.'"}, {"text": "A large protein molecule, essential for cell structure.", "isCorrect": false, "rationale": "Large molecules cannot cross the hydrophobic core without assistance; they often require bulk transport mechanisms like endocytosis or exocytosis."}], "id": "q04"}, {"question": "A cell is placed in a solution, and over time, it swells and eventually bursts (lyses). This observation indicates that the cell was placed in which type of solution, and what process caused the bursting?", "options": [{"text": "Hypertonic solution; plasmolysis.", "isCorrect": false, "rationale": "A hypertonic solution would cause water to leave the cell, leading to shrinking (crenation in animal cells, plasmolysis in plant cells), not swelling and bursting."}, {"text": "Isotonic solution; facilitated diffusion.", "isCorrect": false, "rationale": "An isotonic solution would result in no net change in cell volume, and facilitated diffusion is a type of transport, not the direct cause of bursting from water imbalance."}, {"text": "Hypotonic solution; osmosis.", "isCorrect": true, "rationale": "The text states: 'In a hypotonic solution, water enters the cell faster than it leaves. An animal cell in a hypotonic solution will swell and may burst (a process called lysis).' This is due to osmosis, the diffusion of water."}, {"text": "Isotonic solution; active transport.", "isCorrect": false, "rationale": "An isotonic solution would maintain cell volume, and active transport moves substances against a gradient, not causing passive swelling or bursting."}], "id": "q05"}, {"question": "A plant cell is placed in a concentrated saltwater solution. What immediate effect would you expect to observe in the plant cell, and what is the underlying process?", "options": [{"text": "The cell will swell and become turgid due to water entering the cell by diffusion.", "isCorrect": false, "rationale": "Swelling and turgidity occur in hypotonic solutions. A concentrated saltwater solution is hypertonic, causing water to leave the cell."}, {"text": "The cell will shrink and undergo crenation as solutes leave the cell.", "isCorrect": false, "rationale": "Crenation describes the shrinking of animal cells. While the cell will shrink, it will undergo plasmolysis (membrane pulling away from the wall), and water is leaving, not solutes."}, {"text": "The cell membrane will pull away from the cell wall, a process called plasmolysis, as water leaves the cell by osmosis.", "isCorrect": true, "rationale": "The text states: 'In a hypertonic solution, water leaves the cell faster than it enters... A plant cell in a hypertonic solution loses water from its central vacuole, and the cell membrane pulls away from the cell wall — a process called plasmolysis.'"}, {"text": "The cell will maintain its normal shape and volume, as the solution is isotonic.", "isCorrect": false, "rationale": "A concentrated saltwater solution is hypertonic, not isotonic, meaning there will be a net movement of water out of the cell, altering its shape and volume."}], "id": "q06"}, {"question": "Both diffusion and facilitated diffusion are types of passive transport. What key characteristic do they share that defines them as passive?", "options": [{"text": "They both require the cell to expend ATP energy.", "isCorrect": false, "rationale": "Passive transport, by definition, does not require the cell to expend energy (ATP). Energy expenditure is characteristic of active transport."}, {"text": "They both involve the movement of substances from a region of lower concentration to a region of higher concentration.", "isCorrect": false, "rationale": "This describes movement against a concentration gradient, which characterizes active transport, not passive transport."}, {"text": "They both move substances down their concentration gradient without the input of cellular energy.", "isCorrect": true, "rationale": "The text defines passive transport as movement 'without the cell spending any energy' and states that both diffusion and facilitated diffusion involve molecules moving 'down their concentration gradient.'"}, {"text": "They both primarily transport large proteins and charged ions across the membrane.", "isCorrect": false, "rationale": "While facilitated diffusion can transport ions, and proteins are moved by bulk transport, simple diffusion primarily handles small, nonpolar molecules. The defining shared characteristic is the lack of energy input and movement down the gradient, not the types of molecules exclusively transported."}], "id": "q07"}, {"question": "Active transport is critical for maintaining specific ion concentrations inside and outside the cell. What is the defining characteristic that distinguishes active transport from passive transport mechanisms?", "options": [{"text": "It always involves the movement of water molecules.", "isCorrect": false, "rationale": "The movement of water is specifically osmosis, a passive process. Active transport primarily moves solutes, not just water."}, {"text": "It moves substances down their concentration gradient, requiring no energy.", "isCorrect": false, "rationale": "This describes passive transport (diffusion, facilitated diffusion), not active transport."}, {"text": "It requires the cell to expend energy, usually ATP, to move substances against their concentration gradient.", "isCorrect": true, "rationale": "The text explicitly defines active transport as 'The movement of molecules or ions across a cell membrane from a region of lower concentration to a region of higher concentration, requiring the cell to expend energy (ATP).'"}, {"text": "It utilizes channel proteins to form tunnels for molecules to pass freely.", "isCorrect": false, "rationale": "Channel proteins are primarily associated with facilitated diffusion (passive transport). While active transport uses 'pumps,' they differ significantly in their energy requirement and direction of movement."}], "id": "q08"}, {"question": "The sodium-potassium pump is vital for nerve function and muscle contraction. What is its mechanism of action?", "options": [{"text": "It passively diffuses sodium ions into the cell and potassium ions out of the cell.", "isCorrect": false, "rationale": "The sodium-potassium pump is an active transport mechanism, meaning it requires energy and moves ions against their concentration gradients, not by passive diffusion."}, {"text": "It uses facilitated diffusion to move sodium ions out of the cell and potassium ions into the cell, down their respective gradients.", "isCorrect": false, "rationale": "While facilitated diffusion uses proteins, the sodium-potassium pump moves ions *against* their concentration gradients, which requires energy and defines active transport, not facilitated diffusion."}, {"text": "It actively transports sodium ions out of the cell and potassium ions into the cell, both against their concentration gradients, by expending ATP.", "isCorrect": true, "rationale": "The text states: 'One of the most important is the sodium-potassium pump, which moves sodium ions (Na+) out of the cell and potassium ions (K+) into the cell, both against their concentration gradients. This pump is essential... consuming about 20–25% of the ATP your body produces at rest.'"}, {"text": "It performs bulk transport, engulfing sodium and potassium ions simultaneously.", "isCorrect": false, "rationale": "Bulk transport (endocytosis/exocytosis) involves moving much larger cargo (like proteins or bacteria) using vesicles, not individual ions via a pump."}], "id": "q09"}, {"question": "A white blood cell engulfs a bacterium by forming a vesicle that brings the bacterium into the cell. This process is an example of what type of cellular transport?", "options": [{"text": "Exocytosis, releasing substances from the cell.", "isCorrect": false, "rationale": "Exocytosis is the process of releasing contents *out* of the cell, not bringing them in."}, {"text": "Facilitated diffusion, moving substances down a concentration gradient.", "isCorrect": false, "rationale": "Facilitated diffusion moves individual molecules down a gradient and does not involve the formation of vesicles to engulf large particles."}, {"text": "Endocytosis, taking material into the cell by forming a vesicle.", "isCorrect": true, "rationale": "The text describes endocytosis as: 'The cell membrane folds inward and engulfs material from outside, forming a vesicle that carries it into the cell. White blood cells use endocytosis to engulf and destroy bacteria.'"}, {"text": "Active transport, using pumps to move individual ions.", "isCorrect": false, "rationale": "Active transport by pumps moves individual ions or small molecules, typically against a gradient, but does not involve engulfing large particles via vesicles. Engulfing larger items is 'bulk transport.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
