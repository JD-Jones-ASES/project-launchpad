<script>
var QUESTIONS = [{"question": "The distinction between Earth's lithosphere and asthenosphere is based primarily on which characteristic?", "options": [{"text": "Chemical composition, with the lithosphere being crustal and the asthenosphere being entirely mantle.", "isCorrect": false, "rationale": "The text states that plate tectonics introduces a way of dividing Earth's outer layers 'based not on composition, but on mechanical behavior.' The lithosphere includes both crust and uppermost mantle."}, {"text": "Mechanical behavior, with the lithosphere being rigid and brittle, and the asthenosphere being partially molten and plastically deforming.", "isCorrect": true, "rationale": "The section explicitly states that 'Plate tectonics introduces a different way of dividing Earth's outer layers — based not on composition, but on mechanical behavior.' It defines the lithosphere as 'rigid outer shell' that 'cracks and breaks,' and the asthenosphere as 'partially molten, plastically deforming layer' that 'deforms and flows slowly over time.'"}, {"text": "Temperature, with the lithosphere being extremely hot and the asthenosphere being much cooler.", "isCorrect": false, "rationale": "While temperature plays a role in mechanical behavior (hotter asthenosphere is more plastic), the primary distinction is mechanical behavior, not a simple temperature gradient that makes the asthenosphere cooler. The asthenosphere is hot enough to behave plastically."}, {"text": "Depth from the surface, with the lithosphere being surface-level and the asthenosphere being the core.", "isCorrect": false, "rationale": "Both layers are outer layers of Earth, with the asthenosphere beneath the lithosphere. The asthenosphere is part of the upper mantle, not the core."}]}, {"question": "A geologist studying a region observes extensive deep ocean trenches, a chain of active volcanic islands, and frequent powerful earthquakes. This geological setting is most characteristic of which type of plate boundary?", "options": [{"text": "Divergent boundary between two oceanic plates.", "isCorrect": false, "rationale": "Divergent boundaries create mid-ocean ridges and new crust, not deep trenches or volcanic island chains formed by subduction."}, {"text": "Convergent boundary between two continental plates.", "isCorrect": false, "rationale": "Continental-continental convergence forms towering mountain ranges due to crumpling, but typically does not involve deep trenches or significant volcanic activity because neither plate subducts."}, {"text": "Transform boundary between an oceanic and continental plate.", "isCorrect": false, "rationale": "Transform boundaries involve plates sliding horizontally past each other, causing earthquakes but generally not creating trenches, volcanoes, or significant crustal deformation."}, {"text": "Convergent boundary between two oceanic plates.", "isCorrect": true, "rationale": "The text states that 'When two oceanic plates converge, the older, cooler, and therefore denser plate subducts beneath the younger one. The result is similar to oceanic–continental convergence: a deep trench forms at the boundary, and volcanic eruptions on the overriding plate build a chain of volcanic islands called an island arc.' This matches all the observed features."}]}, {"question": "Which statement accurately describes the creation or destruction of crust at a transform plate boundary?", "options": [{"text": "New crust is created as magma rises to fill the gap between the sliding plates.", "isCorrect": false, "rationale": "Crust creation occurs at divergent boundaries, where plates move apart and magma fills the gap."}, {"text": "Crust is destroyed as one plate subducts beneath another along the fault.", "isCorrect": false, "rationale": "Crust is destroyed at convergent boundaries through subduction, where one plate is forced into the mantle. Transform boundaries do not involve subduction."}, {"text": "Crust is neither created nor destroyed, as plates slide horizontally past each other.", "isCorrect": true, "rationale": "The text explicitly states for transform boundaries: 'No crust is created or destroyed. Instead, the plates grind against each other along a large fracture called a fault.'"}, {"text": "Both creation and destruction occur rapidly due to the intense friction between plates.", "isCorrect": false, "rationale": "While there is intense friction, this boundary type is characterized by conservative motion (neither creation nor destruction)."}]}, {"question": "The East African Rift Valley is an example of a continental divergent boundary. If rifting continues for millions of years, what is the most likely long-term geological outcome?", "options": [{"text": "The formation of a towering, non-volcanic mountain range.", "isCorrect": false, "rationale": "Towering mountain ranges are typical of continental-continental convergence, not divergence."}, {"text": "The development of a deep ocean trench.", "isCorrect": false, "rationale": "Deep ocean trenches are formed at convergent boundaries where subduction occurs."}, {"text": "The continent splitting apart, flooding with ocean water, and forming a new ocean basin.", "isCorrect": true, "rationale": "The text states, 'If rifting continues for millions of years, the continent will eventually split apart, the rift will flood with ocean water, and a new ocean basin will form — just as the Atlantic Ocean formed when Pangaea broke apart.'"}, {"text": "The conversion of the rift into a transform fault, with plates sliding horizontally.", "isCorrect": false, "rationale": "While transform faults can occur along rifts, the primary long-term outcome of sustained continental rifting is the formation of a new ocean basin, not a mere transformation into a transform fault."}]}, {"question": "Which of the following scenarios best illustrates the concept of 'slab pull' as a driving force for plate tectonics?", "options": [{"text": "Hot mantle material rising at a mid-ocean ridge, pushing the plates away from the ridge.", "isCorrect": false, "rationale": "This describes 'ridge push,' where elevated crust slides downward and outward, pushing the plate."}, {"text": "The slow circulation of mantle rock beneath the lithosphere exerting drag on the base of the plates.", "isCorrect": false, "rationale": "This describes 'mantle convection,' a general driving force, but not specifically slab pull."}, {"text": "A cold, dense oceanic plate sinking into the mantle at a subduction zone, pulling the rest of the plate with it.", "isCorrect": true, "rationale": "The text defines 'slab pull' as: 'At subduction zones, the cold, dense edge of a subducting plate sinks into the mantle under its own weight, pulling the rest of the plate behind it.' This is also identified as the dominant force."}, {"text": "Buoyant continental crust resisting subduction and crumpling to form mountains.", "isCorrect": false, "rationale": "This describes a characteristic of continental-continental convergence, not a driving force of plate motion."}]}, {"question": "Why are the Andes Mountains, characterized by volcanic activity, fundamentally different in their formation from the Himalayan Mountains, which are largely non-volcanic?", "options": [{"text": "The Andes formed at a divergent boundary, while the Himalayas formed at a transform boundary.", "isCorrect": false, "rationale": "Both are formed at convergent boundaries. The Andes are oceanic-continental convergence, and the Himalayas are continental-continental convergence."}, {"text": "The Andes formed from oceanic-oceanic convergence, while the Himalayas formed from oceanic-continental convergence.", "isCorrect": false, "rationale": "The Andes formed from oceanic-continental convergence (Nazca Plate subducting beneath South American Plate). The Himalayas formed from continental-continental convergence (Indian Plate into Eurasian Plate)."}, {"text": "The Andes formed from the subduction of an oceanic plate beneath a continental plate, allowing volcanism, while the Himalayas formed from the collision of two continental plates, which are too buoyant to subduct.", "isCorrect": true, "rationale": "The text explains: 'The Andes Mountains of South America formed through this process as the Nazca Plate subducts beneath the South American Plate' (oceanic-continental convergence leading to volcanic mountains). For the Himalayas, it states: 'When two continental plates collide, neither can subduct because both are too buoyant (too low in density) to sink into the mantle. Instead, the crust crumples, folds, and thickens, pushing rock upward to form towering mountain ranges.'"}, {"text": "The Andes are primarily shaped by erosion, while the Himalayas are solely formed by tectonic uplift.", "isCorrect": false, "rationale": "Both are subject to erosion and tectonic uplift, but the primary difference in their formation mechanism and associated volcanism lies in the types of crust involved in their respective convergent collisions."}]}, {"question": "The lithosphere's brittle nature and its interaction with the asthenosphere are key to understanding plate tectonics. Which statement accurately describes a consequence of the lithosphere's characteristics?", "options": [{"text": "Its plasticity allows it to flow readily, preventing the buildup of stress.", "isCorrect": false, "rationale": "The lithosphere is rigid and brittle, not plastic. It is the asthenosphere beneath it that behaves plastically."}, {"text": "Its rigidity allows stress to build up, leading to cracking and earthquakes when it breaks.", "isCorrect": true, "rationale": "The text states: 'The lithosphere is solid and brittle; when stress builds up, it cracks and breaks, producing earthquakes.' This is a direct consequence of its rigidity."}, {"text": "Its continuous, unbroken nature prevents the formation of distinct tectonic plates.", "isCorrect": false, "rationale": "The text clearly states Earth's outer shell 'is cracked into roughly fifteen major pieces... These pieces are called tectonic plates.'"}, {"text": "Its partially molten state enables it to readily subduct beneath other plates.", "isCorrect": false, "rationale": "The lithosphere is solid, though parts of the asthenosphere below it are partially molten. Subduction is a process where a denser, solid lithospheric plate descends."}]}, {"question": "Considering the various forces driving plate motion, why might the Pacific Plate move relatively quickly (6–10 cm/year) compared to the African Plate (about 2 cm/year)?", "options": [{"text": "The Pacific Plate experiences stronger ridge push due to its older, colder oceanic crust.", "isCorrect": false, "rationale": "Ridge push is stronger for newly formed, elevated crust. Older, colder crust would be lower and less prone to ridge push. Also, slab pull is the dominant force mentioned for fast plates."}, {"text": "The Pacific Plate is surrounded by many subduction zones, maximizing the effect of slab pull.", "isCorrect": true, "rationale": "The text explains: 'The Pacific Plate, for example, is surrounded by subduction zones on several sides and moves relatively quickly (6–10 cm/year).' This is consistent with slab pull being the dominant driving force."}, {"text": "The African Plate is primarily driven by mantle convection, which is a slower mechanism.", "isCorrect": false, "rationale": "All plates are influenced by mantle convection. The reason for the African Plate's slower movement is fewer subducting edges, not that it's exclusively driven by convection."}, {"text": "The Pacific Plate is mostly continental crust, which is more easily moved than oceanic crust.", "isCorrect": false, "rationale": "The Pacific Plate is primarily oceanic crust. Continental crust is generally considered more resistant to subduction due to buoyancy."}]}, {"question": "Australia's unique wildlife, such as kangaroos and platypuses, is presented as an example of the long-term impact of plate tectonics on biological systems. What is the fundamental process described?", "options": [{"text": "Tectonic uplift creates new mountain ranges, directly stimulating species diversification.", "isCorrect": false, "rationale": "While uplift can create new habitats, the text specifically highlights the role of continental separation and isolation for Australia's unique species."}, {"text": "Volcanic eruptions at plate boundaries enrich soils, leading to unique plant adaptations and subsequent animal evolution.", "isCorrect": false, "rationale": "Volcanism's effect on soil is not the primary mechanism explained for Australia's unique wildlife in the provided text."}, {"text": "The separation of continents creates physical barriers, isolating populations and allowing them to evolve independently into new species.", "isCorrect": true, "rationale": "The 'sciconnection' box states: 'When continents drift apart, populations of organisms that were once connected become separated by oceans they cannot cross. Over millions of years, these isolated populations evolve independently, producing new species found nowhere else. Australia’s unique wildlife... exists because the continent separated from Antarctica and other landmasses... allowing marsupial mammals to evolve in isolation.'"}, {"text": "Earthquakes at plate boundaries cause rapid genetic mutations, accelerating evolutionary change.", "isCorrect": false, "rationale": "Earthquakes are sudden releases of energy and do not directly cause targeted genetic mutations leading to new species in the manner described."}]}, {"question": "Which of the following geological features is formed by the process of new lithosphere being created from rising mantle material?", "options": [{"text": "The Andes Mountains.", "isCorrect": false, "rationale": "The Andes Mountains are formed at an oceanic-continental convergent boundary through subduction and volcanism, not new lithosphere creation."}, {"text": "The Mariana Trench.", "isCorrect": false, "rationale": "The Mariana Trench is a deep ocean trench formed at a convergent boundary where oceanic crust subducts, destroying lithosphere."}, {"text": "The Mid-Atlantic Ridge.", "isCorrect": true, "rationale": "The text states for divergent boundaries: 'As they separate, hot mantle material rises to fill the gap. This rising material partially melts, and the resulting magma solidifies to form new crust.' It then gives 'mid-ocean ridge' as an example, specifically mentioning 'The Mid-Atlantic Ridge.'"}, {"text": "The San Andreas Fault.", "isCorrect": false, "rationale": "The San Andreas Fault is a transform boundary where crust is neither created nor destroyed, but slides horizontally."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
