<script>
var QUESTIONS = [{"question": "What fundamental relationship does a solubility curve primarily illustrate?", "options": [{"text": "The relationship between pressure and the rate at which a substance dissolves.", "isCorrect": false, "rationale": "Solubility curves do not typically show the rate of dissolution or the effect of pressure on solid solutes. While pressure affects gas solubility, it's not the primary relationship shown on a standard solubility curve for solids."}, {"text": "The maximum amount of solute that can dissolve in a given solvent at varying temperatures.", "isCorrect": true, "rationale": "A solubility curve is defined as a graph that shows 'the relationship between temperature and the maximum amount of solute that can dissolve in a given amount of solvent'."}, {"text": "The amount of energy released or absorbed during the dissolution process.", "isCorrect": false, "rationale": "While dissolution can be an endothermic or exothermic process, solubility curves do not directly display the energy changes involved."}, {"text": "The change in the solvent's volume as different amounts of solute are added.", "isCorrect": false, "rationale": "Solubility curves focus on the mass of solute dissolved per 100g of solvent, not changes in solvent volume."}], "id": "q01"}, {"question": "A substance with a steep solubility curve, such as potassium nitrate (KNO3), compared to one with a nearly flat curve, like sodium chloride (NaCl), suggests what about its solubility?", "options": [{"text": "It dissolves more slowly at all temperatures.", "isCorrect": false, "rationale": "The steepness of a solubility curve relates to how solubility changes with temperature, not the rate of dissolution."}, {"text": "Its solubility is highly dependent on temperature changes.", "isCorrect": true, "rationale": "The text states that 'Substances with steep curves (like potassium nitrate, KNO3) become dramatically more soluble as temperature increases,' indicating a strong dependence on temperature."}, {"text": "It is generally less soluble in water at higher temperatures.", "isCorrect": false, "rationale": "For most solids, including those with steep curves like KNO3, solubility *increases* with temperature, not decreases."}, {"text": "It forms supersaturated solutions more easily than substances with flat curves.", "isCorrect": false, "rationale": "The steepness of the curve describes how solubility changes, not the ease of forming supersaturated solutions, although a large drop in solubility over a temperature range can lead to significant supersaturation."}], "id": "q02"}, {"question": "If a solution contains 70g of solute dissolved in 100g of water at a temperature where the solubility curve for that substance shows a maximum of 50g/100g H2O, what type of solution is it?", "options": [{"text": "Saturated", "isCorrect": false, "rationale": "A saturated solution contains the *maximum* amount of solute, which in this case would be 50g. Since 70g is present, it's not merely saturated."}, {"text": "Unsaturated", "isCorrect": false, "rationale": "An unsaturated solution contains *less* than the maximum amount of solute. Here, 70g is more than the maximum of 50g."}, {"text": "Supersaturated", "isCorrect": true, "rationale": "A point above the curve (meaning more solute dissolved than the maximum predicted by the curve) represents a supersaturated solution, which contains more dissolved solute than a saturated solution at the same temperature."}, {"text": "Dilute", "isCorrect": false, "rationale": "Dilute refers to the relative concentration of solute, not the saturation state relative to the solubility limit. A supersaturated solution is generally concentrated."}], "id": "q03"}, {"question": "A student dissolves 120g of a salt in 100g of water at 80°C. The solubility of this salt at 80°C is 150g/100g H2O. If the solution is cooled to 30°C, and the solubility at 30°C is 40g/100g H2O, how much salt will crystallize out of the solution?", "options": [{"text": "150 g", "isCorrect": false, "rationale": "150g is the maximum solubility at 80°C, not the amount that crystallizes."}, {"text": "80 g", "isCorrect": true, "rationale": "The amount crystallized is calculated as 'Mass dissolved at T_high - Solubility at T_low'. In this case, 120g (initially dissolved) - 40g (remaining dissolved at 30°C) = 80g."}, {"text": "40 g", "isCorrect": false, "rationale": "40g is the amount of salt that remains dissolved in the solution at 30°C, not the amount that crystallizes out."}, {"text": "120 g", "isCorrect": false, "rationale": "120g is the initial amount dissolved, but not all of it will crystallize out; 40g will remain dissolved."}], "id": "q04"}, {"question": "Why does a carbonated soft drink go 'flat' more quickly when left at room temperature compared to being kept refrigerated?", "options": [{"text": "Higher temperature increases the viscosity of the liquid, trapping the gas.", "isCorrect": false, "rationale": "Temperature does not significantly affect liquid viscosity in a way that explains gas escape, and higher temperatures generally decrease viscosity for liquids. This is not the primary reason for gas escaping."}, {"text": "Gases are more soluble at higher temperatures, causing them to remain in solution.", "isCorrect": false, "rationale": "This statement is incorrect. The text explicitly states, 'Gases become less soluble as temperature increases.'"}, {"text": "The increased temperature causes the dissolved gas to become less soluble and escape from the solution.", "isCorrect": true, "rationale": "The text explains, 'Gases become less soluble as temperature increases. This is why a warm can of soda is fizzier when opened (the CO2 escapes more readily).'"}, {"text": "The cooler temperature prevents the carbonic acid from forming, thus reducing fizz.", "isCorrect": false, "rationale": "Carbonic acid forms readily from dissolved CO2 and water. The fizziness relates to the CO2 gas itself escaping, not preventing acid formation."}], "id": "q05"}, {"question": "According to the principles of gas solubility, what happens to the amount of dissolved gas in a liquid when the pressure above the liquid is decreased?", "options": [{"text": "The gas becomes more soluble, increasing its concentration in the liquid.", "isCorrect": false, "rationale": "This is the opposite of what happens. Gas solubility *increases* with pressure, so it *decreases* with a drop in pressure."}, {"text": "The gas becomes less soluble, causing it to escape from the liquid.", "isCorrect": true, "rationale": "The text states, 'Pressure: Gas solubility increases with pressure (Henry's law). When you open the bottle, the pressure drops and the gas escapes as bubbles,' implying decreased solubility."}, {"text": "The solubility of the gas remains unchanged, but its diffusion rate increases.", "isCorrect": false, "rationale": "Gas solubility is directly affected by pressure changes. Diffusion rate is a separate concept."}, {"text": "The liquid's temperature increases, which further decreases gas solubility.", "isCorrect": false, "rationale": "While temperature affects gas solubility, a decrease in pressure does not inherently cause a temperature increase in this context. The pressure change itself directly impacts solubility."}], "id": "q06"}, {"question": "How do rising ocean temperatures contribute to the phenomenon of ocean acidification and the greenhouse effect?", "options": [{"text": "Warmer oceans increase CO2 solubility, leading to more carbonic acid formation.", "isCorrect": false, "rationale": "The text explicitly states that 'The solubility of CO2 in ocean water decreases as the ocean warms.'"}, {"text": "Warmer oceans decrease CO2 solubility, causing less CO2 absorption from the atmosphere and higher atmospheric CO2 levels, while also forming carbonic acid from dissolved CO2.", "isCorrect": true, "rationale": "The text explains: 'The solubility of CO2 in ocean water decreases as the ocean warms... warmer oceans absorb less CO2 from the atmosphere, potentially accelerating the greenhouse effect. At the same time, the CO2 that does dissolve reacts with water to form carbonic acid (H2CO3), lowering the ocean's pH — a process called ocean acidification.'"}, {"text": "Warmer oceans cause carbonic acid to decompose, increasing ocean pH and releasing CO2.", "isCorrect": false, "rationale": "Warmer oceans lead to *less* CO2 absorption and the CO2 that *is* absorbed forms carbonic acid, which *lowers* pH, not increases it."}, {"text": "Rising temperatures have no direct impact on CO2 absorption, only on the rate of gas escape.", "isCorrect": false, "rationale": "The text clearly states that warmer oceans 'absorb less CO2 from the atmosphere,' demonstrating a direct impact on solubility and absorption."}], "id": "q07"}, {"question": "A chemist carefully prepares a supersaturated solution. Which of the following statements accurately describes this solution?", "options": [{"text": "It is extremely stable and can hold the excess solute indefinitely without disturbance.", "isCorrect": false, "rationale": "The text describes supersaturated solutions as 'unstable'."}, {"text": "It contains less dissolved solute than a saturated solution at the same temperature.", "isCorrect": false, "rationale": "A supersaturated solution contains *more* dissolved solute than a saturated solution at the same temperature."}, {"text": "Adding a seed crystal will likely cause rapid crystallization of the excess solute.", "isCorrect": true, "rationale": "The text states, 'Supersaturated solutions are unstable — adding a seed crystal or disturbing the solution can cause the excess solute to crystallize rapidly.'"}, {"text": "It represents the maximum amount of solute that can dissolve at that specific temperature.", "isCorrect": false, "rationale": "This describes a saturated solution. A supersaturated solution contains *more* than the maximum."}], "id": "q08"}, {"question": "A point plotted *below* the solubility curve for a given substance at a specific temperature indicates what about the solution?", "options": [{"text": "The solution is saturated, meaning no more solute can dissolve.", "isCorrect": false, "rationale": "A saturated solution is represented by a point *on* the curve."}, {"text": "The solution is supersaturated and unstable.", "isCorrect": false, "rationale": "A supersaturated solution is represented by a point *above* the curve."}, {"text": "The solution is unsaturated, and more solute could be dissolved.", "isCorrect": true, "rationale": "The text clearly states, 'A point below the curve represents an unsaturated solution (more solute could dissolve).'"}, {"text": "The substance is insoluble at that temperature.", "isCorrect": false, "rationale": "If a point is below the curve, it means some solute *has* dissolved, but not yet to the maximum capacity."}], "id": "q09"}, {"question": "Based on the information provided about solubility curves for solids and the solubility of gases, what is the most accurate general statement regarding the effect of temperature on solubility?", "options": [{"text": "Increasing temperature always increases the solubility of all substances.", "isCorrect": false, "rationale": "This is incorrect. While it's generally true for most solids, the text explicitly states that 'Gases become less soluble as temperature increases.'"}, {"text": "Increasing temperature always decreases the solubility of all substances.", "isCorrect": false, "rationale": "This is incorrect. For most solids, increasing temperature *increases* solubility."}, {"text": "The effect of temperature on solubility depends on whether the solute is a solid or a gas.", "isCorrect": true, "rationale": "The text describes how solubility of solids generally increases with temperature (implied by the curves and precipitation examples) but states that 'Gases become less soluble as temperature increases,' showing a clear distinction based on the state of the solute."}, {"text": "Temperature primarily affects the speed of dissolution, not the maximum amount that can dissolve.", "isCorrect": false, "rationale": "Solubility curves directly show the 'maximum amount of solute that can dissolve' at different temperatures, indicating temperature's effect on solubility limits, not just speed."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
