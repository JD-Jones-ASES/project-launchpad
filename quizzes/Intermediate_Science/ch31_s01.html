    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "A research team aims to create a bacterium that can produce a novel, complex human protein for therapeutic use. Which core principle of synthetic biology are they primarily applying?", "options": [{"text": "Reading the organism's existing genetic code to understand its functions.", "isCorrect": false, "rationale": "While understanding existing genetic code is foundational, synthetic biology goes beyond reading; it focuses on designing and constructing new biological systems."}, {"text": "Designing and inserting new genetic instructions into the bacterium's DNA.", "isCorrect": true, "rationale": "Synthetic biology's core principle, as described, is learning to 'write' the genetic code, which involves designing and constructing new biological systems or re-engineering existing ones with novel genetic instructions."}, {"text": "Identifying beneficial mutations that naturally occur in bacteria.", "isCorrect": false, "rationale": "Identifying natural mutations falls more under traditional genetics or evolutionary biology, whereas synthetic biology involves deliberate, designed genetic modification."}, {"text": "Observing how different bacteria interact in a natural ecosystem.", "isCorrect": false, "rationale": "This describes an ecological study, which is not the primary focus or application of synthetic biology as defined in the text."}]}, {"question": "The text states that gold nanoparticles can appear red, purple, or blue, unlike bulk gold which is yellow. This phenomenon is best explained by which characteristic of nanotechnology?", "options": [{"text": "Nanoparticles are more chemically reactive than larger particles of the same material.", "isCorrect": false, "rationale": "While increased reactivity can be a property of nanoparticles, the text specifically attributes the color change of gold to 'they interact with light differently at the nanoscale,' not primarily to chemical reactivity."}, {"text": "Materials at the nanoscale interact with light differently due to their size and quantum properties.", "isCorrect": true, "rationale": "The text explicitly states that gold nanoparticles 'interact with light differently at the nanoscale' depending on their size, linking to the wave behavior of light, which is a key aspect of how material properties change at this scale."}, {"text": "The purity of gold is significantly enhanced when reduced to nanoparticles.", "isCorrect": false, "rationale": "The text does not mention purity as a factor for the observed color change of gold nanoparticles; it focuses on their size and interaction with light."}, {"text": "Gold atoms rearrange into a different crystal structure at the nanoscale.", "isCorrect": false, "rationale": "While structural changes can occur at the nanoscale, the text specifically identifies the *interaction with light* as the reason for the color variation in gold nanoparticles, connecting to Unit 19's wave behavior of light."}]}, {"question": "What fundamental concept distinguishes a quantum computer's processing capability from a classical computer's?", "options": [{"text": "Quantum computers use physical switches that are significantly smaller than those in classical computers.", "isCorrect": false, "rationale": "While quantum computing often involves very small components, the fundamental distinction is not merely size but the quantum mechanical principles they exploit, not just physical switches."}, {"text": "Qubits can exist in multiple states (0 and 1) simultaneously, allowing them to explore many solutions at once.", "isCorrect": true, "rationale": "The text clearly states that 'qubits (quantum bits), which can exist in a superposition of 0 and 1 simultaneously,' enable quantum computers to 'explore many possible solutions at once,' which is their defining advantage."}, {"text": "Quantum computers operate at much lower temperatures to reduce computational errors.", "isCorrect": false, "rationale": "Low temperatures are often necessary for quantum computers to maintain quantum states, but this is a practical engineering requirement, not the fundamental concept of their processing capability."}, {"text": "They rely on faster electronic signals to transmit data between processors at nearly the speed of light.", "isCorrect": false, "rationale": "The speed of electronic signals is relevant to classical computing performance, but quantum computing's power comes from parallel processing enabled by superposition and entanglement, not simply faster signal transmission."}]}, {"question": "A major challenge for human missions to Mars is ensuring astronauts have a continuous supply of breathable air. According to the text, which scientific discipline would be most crucial for developing a system to produce breathable air from the Martian atmosphere?", "options": [{"text": "Physics, for calculating trajectories and propulsion.", "isCorrect": false, "rationale": "Physics is crucial for many aspects of space travel, but the text specifically links producing breathable air from Martian atmosphere (CO2 decomposition) to chemistry."}, {"text": "Chemistry, for CO2 decomposition and recycling water.", "isCorrect": true, "rationale": "The text directly states that 'Chemistry' is needed for 'Producing breathable air from the Martian atmosphere (CO2 decomposition)' and 'recycling water.'"}, {"text": "Life Science, for protecting astronauts from radiation and microgravity.", "isCorrect": false, "rationale": "Life Science is vital for astronaut health, but its specific applications listed do not include the direct production of breathable air from the atmosphere."}, {"text": "Earth Science, for comparative planetology and identifying resources.", "isCorrect": false, "rationale": "Earth Science helps understand Mars, but it's more about geology and resource identification than the chemical process of generating breathable air."}]}, {"question": "The text states that 'AI does not replace scientists — it amplifies their abilities.' Which scenario best exemplifies this statement?", "options": [{"text": "An AI system autonomously designs and executes a groundbreaking scientific experiment without human input.", "isCorrect": false, "rationale": "This scenario describes AI replacing the scientist's role in experiment design and execution, rather than amplifying human abilities through collaboration."}, {"text": "A scientist uses an AI system to analyze vast datasets from a telescope, allowing them to quickly identify exoplanet candidates.", "isCorrect": true, "rationale": "This scenario demonstrates AI amplifying a scientist's ability to process and find patterns in data, making discovery faster and more efficient, as described by AI 'spotting patterns that human eyes might miss.'"}, {"text": "An AI algorithm develops a new scientific theory that a human scientist would have never considered.", "isCorrect": false, "rationale": "While impressive, this suggests AI generating entirely new, independent insights, which is closer to replacing or surpassing certain human cognitive functions rather than amplifying existing ones."}, {"text": "An AI-powered robot performs all the routine lab work, freeing scientists to pursue non-research activities.", "isCorrect": false, "rationale": "This describes AI automating tasks, which frees up human time, but the text emphasizes AI amplifying *abilities* related to scientific inquiry and discovery, not just managing labor."}]}, {"question": "A patient undergoes genetic testing and it is found they possess a genetic variant causing them to metabolize a particular medication very quickly. How would personalized medicine likely adjust their treatment plan?", "options": [{"text": "Recommend the standard dose, as genetics have little impact on drug metabolism.", "isCorrect": false, "rationale": "This contradicts the core premise of personalized medicine, which states that 'people's genes affect how they respond to medications,' including metabolism rates."}, {"text": "Prescribe a higher dose of the medication to ensure effective treatment.", "isCorrect": true, "rationale": "The text directly states that if 'one person may metabolize a drug quickly (requiring a higher dose),' personalized medicine would 'choose the right drug at the right dose for each individual.'"}, {"text": "Suggest a different medication entirely, regardless of its efficacy for the condition.", "isCorrect": false, "rationale": "While a different drug might be considered, the immediate and most direct adjustment described for a fast metabolizer is a dose increase, not necessarily a complete drug change without further cause."}, {"text": "Advise against any medication for this condition due to the metabolic variant.", "isCorrect": false, "rationale": "This is an overly extreme response; personalized medicine aims to optimize treatment for genetic variations, not abandon it, unless the risk-benefit analysis strongly suggests otherwise."}]}, {"question": "What is the primary objective of 'solar radiation management' as a climate engineering strategy?", "options": [{"text": "To chemically remove carbon dioxide directly from the atmosphere.", "isCorrect": false, "rationale": "This describes 'carbon dioxide removal,' a different category of climate engineering."}, {"text": "To enhance the ocean's natural ability to absorb greenhouse gases.", "isCorrect": false, "rationale": "This is an 'ocean-based approach,' another distinct category of climate engineering."}, {"text": "To reflect a portion of incoming sunlight back into space, thereby cooling the planet.", "isCorrect": true, "rationale": "The text explicitly defines solar radiation management as 'Reflecting a small fraction of incoming sunlight back into space — for example, by injecting reflective particles into the stratosphere.'"}, {"text": "To genetically engineer microorganisms to consume atmospheric pollutants.", "isCorrect": false, "rationale": "While theoretically possible, this is an application of synthetic biology and not directly categorized under 'solar radiation management' as defined by the text."}]}, {"question": "Which of the following science frontiers *most directly* leverages the quantum properties of subatomic particles for its core function?", "options": [{"text": "Synthetic Biology, by reprogramming genetic code.", "isCorrect": false, "rationale": "Synthetic biology operates at the molecular and cellular level, focusing on genetic manipulation, biochemistry, and cell biology, rather than directly harnessing subatomic quantum properties for its core function."}, {"text": "Nanotechnology, by building structures at the atomic scale.", "isCorrect": false, "rationale": "Nanotechnology deals with the properties of materials at the nanoscale, which can involve quantum effects (like for efficient solar cells), but its core function is about building and designing at the atomic scale, not necessarily *leveraging* quantum properties as its primary processing mechanism."}, {"text": "Quantum Computing, by using superposition and entanglement of qubits.", "isCorrect": true, "rationale": "The text directly states that quantum computing uses 'qubits... which can exist in a superposition of 0 and 1 simultaneously, thanks to the strange rules of quantum mechanics,' and that it 'harnesses these same quantum properties (superposition and entanglement) to process information.'"}, {"text": "Personalized Medicine, by analyzing an individual's DNA.", "isCorrect": false, "rationale": "Personalized medicine focuses on macro-molecular genetics (DNA, genes) and biochemistry, not the quantum properties of subatomic particles for its core methodology."}]}, {"question": "Based on the introductory paragraph, what characteristic fundamentally defines 'Science Frontiers'?", "options": [{"text": "They represent scientific knowledge that is completely finished and established.", "isCorrect": false, "rationale": "The text explicitly states, 'Science is not a finished product — it is a living, evolving process of discovery' and that current knowledge 'is far from complete,' contradicting this option."}, {"text": "They involve problems that previous generations could easily have imagined but lacked tools to solve.", "isCorrect": false, "rationale": "The text indicates that scientists are 'tackling problems that previous generations could not even have imagined,' making this option incorrect."}, {"text": "They are areas where scientists are actively pushing boundaries and discovering new knowledge beyond current understanding.", "isCorrect": true, "rationale": "The introduction defines science frontiers as areas where 'scientists around the world are pushing the boundaries of what we know, developing new tools, and tackling problems that previous generations could not even have imagined.'"}, {"text": "They are primarily focused on revisiting and confirming centuries-old scientific theories.", "isCorrect": false, "rationale": "While validating existing theories is part of science, the focus of frontiers is on 'new tools' and 'new discoveries,' building on accumulated understanding rather than just confirming it."}]}, {"question": "A future project aims to develop self-replicating nanobots that can travel through the bloodstream, identify cancerous cells based on unique surface markers, and locally deliver a highly specific drug payload. This endeavor would require significant advancements in which *two* science frontiers discussed?", "options": [{"text": "Quantum Computing and Climate Engineering", "isCorrect": false, "rationale": "Quantum computing is about processing, and climate engineering addresses global climate issues; neither directly relates to medical nanobots for targeted drug delivery."}, {"text": "Space Exploration and Artificial Intelligence", "isCorrect": false, "rationale": "While AI could assist in design, Space Exploration is unrelated to the core function of medical nanobots in the bloodstream."}, {"text": "Nanotechnology and Personalized Medicine", "isCorrect": true, "rationale": "Nanotechnology is crucial for 'tiny capsule[s] that navigates through your bloodstream' and 'deliver drugs directly to cancer cells,' while personalized medicine involves 'recognizes a tumor cell by its surface proteins' and 'tailor medical treatments specifically to them' based on unique markers."}, {"text": "Synthetic Biology and Quantum Computing", "isCorrect": false, "rationale": "Synthetic biology engineers organisms or biological systems, but nanobots (especially 'self-replicating' ones at that scale) fall more squarely under nanotechnology. Quantum computing is a processing method, not a direct technology for building such a system."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
