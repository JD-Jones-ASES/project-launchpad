    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 24, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best defines electrical power and its standard unit?", "options": [{"text": "Electrical power is the total amount of electrical energy consumed over time, measured in joules (J).", "isCorrect": false, "rationale": "This describes electrical energy, not power. Power is the rate of energy conversion, and joules are a unit of energy, not power."}, {"text": "Electrical power is the rate at which electrical energy is converted into other forms of energy, measured in watts (W), where 1W = 1J/s.", "isCorrect": true, "rationale": "The text explicitly states, 'Electrical power is the rate at which electrical energy is converted into other forms of energy (light, heat, motion, sound).' It also defines the watt as '1W = 1J/s'."}, {"text": "Electrical power is the amount of work done by an electrical circuit, measured in volts (V).", "isCorrect": false, "rationale": "Volts measure voltage (electrical potential difference), not power. Power is related to the rate of doing work, but volts are not its unit."}, {"text": "Electrical power is the resistance to the flow of current, measured in ohms (Ω).", "isCorrect": false, "rationale": "This definition describes electrical resistance, which is measured in ohms, not electrical power."}], "id": "q01"}, {"question": "A device operates with a current of 2.0 A and a voltage of 120 V. What is the electrical power consumed by the device?", "options": [{"text": "60 W", "isCorrect": false, "rationale": "This would be the result of V/I (120V / 2.0A), which is resistance, not power."}, {"text": "240 W", "isCorrect": true, "rationale": "The formula for electrical power is P = IV. So, P = (2.0 A)(120 V) = 240 W."}, {"text": "122 W", "isCorrect": false, "rationale": "This calculation (120+2) is incorrect for power."}, {"text": "0.0167 W", "isCorrect": false, "rationale": "This would be the result of I/V (2.0A / 120V), which is not power."}], "id": "q02"}, {"question": "An electric heater has a resistance of 10 Ω and draws a current of 5.0 A. What is the power consumed by the heater?", "options": [{"text": "50 W", "isCorrect": false, "rationale": "This would be the result of I * R, which is voltage (V=IR), not power."}, {"text": "250 W", "isCorrect": true, "rationale": "Using the power formula P = I^2R, where I = 5.0 A and R = 10 Ω: P = (5.0 A)^2 * (10 Ω) = 25 * 10 = 250 W."}, {"text": "2.0 W", "isCorrect": false, "rationale": "This would be the result of R/I (10Ω / 5A), which is incorrect."}, {"text": "0.5 W", "isCorrect": false, "rationale": "This would be the result of I/R (5A / 10Ω), which is incorrect."}], "id": "q03"}, {"question": "A television uses 200 W of power. If it is left on for 5 hours, how much electrical energy does it consume in kilowatt-hours (kWh)?", "options": [{"text": "1000 kWh", "isCorrect": false, "rationale": "This would be 200W * 5h = 1000 Wh, but not in kWh. A conversion error was made."}, {"text": "1.0 kWh", "isCorrect": true, "rationale": "First, convert power to kilowatts: 200 W = 0.200 kW. Then use E = Pt: E = (0.200 kW)(5 h) = 1.0 kWh."}, {"text": "10 kWh", "isCorrect": false, "rationale": "This would happen if 200W was mistakenly treated as 2kW, or 5 hours was mistakenly treated as 50 hours."}, {"text": "205 kWh", "isCorrect": false, "rationale": "This calculation (200+5) is incorrect for energy consumption."}], "id": "q04"}, {"question": "Following the 'Electricity Cost' example, if an LED bulb consumes 15W and is left on for 8 hours a day for 30 days, with electricity costing $0.12 per kWh, what would be the cost for one month?", "options": [{"text": "$0.04", "isCorrect": false, "rationale": "This would be the result of a significant calculation error, perhaps missing a decimal point or an order of magnitude error."}, {"text": "$0.43", "isCorrect": true, "rationale": "Step 1: Convert power to kilowatts: 15 W = 0.015 kW. Step 2: Calculate total time: 8 h/day * 30 days = 240 h. Step 3: Calculate energy consumed: E = Pt = (0.015 kW)(240 h) = 3.6 kWh. Step 4: Calculate cost: Cost = E * rate = (3.6 kWh)($0.12/kWh) = $0.432, which rounds to $0.43."}, {"text": "$2.88", "isCorrect": false, "rationale": "This is the cost for a 100W bulb, not a 15W LED bulb, as calculated in the example."}, {"text": "$43.20", "isCorrect": false, "rationale": "This would be the result of an incorrect conversion or multiplication, perhaps by missing the kilowatt conversion or a decimal error."}], "id": "q05"}, {"question": "What is the primary difference between a fuse and a circuit breaker, despite both serving to protect circuits from excessive current?", "options": [{"text": "Fuses protect against voltage fluctuations, while circuit breakers protect against current overloads.", "isCorrect": false, "rationale": "Both fuses and circuit breakers protect against current overloads, not primarily voltage fluctuations."}, {"text": "A fuse must be replaced after it 'blows,' whereas a circuit breaker can be reset.", "isCorrect": true, "rationale": "The text states, 'A blown fuse must be replaced,' and 'Unlike a fuse, a circuit breaker can be reset by flipping the switch back to the “on” position.'"}, {"text": "Fuses are used in modern homes for larger appliances, while circuit breakers are for smaller devices.", "isCorrect": false, "rationale": "The text indicates that 'Most modern homes use circuit breakers rather than fuses' generally, and their application isn't strictly tied to appliance size in this manner."}, {"text": "Circuit breakers melt a metal strip to break the circuit, while fuses use an electromagnetic switch.", "isCorrect": false, "rationale": "This statement reverses the functions. Fuses melt a metal strip, and circuit breakers use an electromagnetic switch."}], "id": "q06"}, {"question": "What is the purpose of grounding in electrical safety, as indicated by the third prong on a three-prong plug?", "options": [{"text": "To increase the appliance's resistance, thereby reducing current flow and preventing overheating.", "isCorrect": false, "rationale": "Grounding provides a path for current in case of a fault, it does not increase the appliance's operating resistance."}, {"text": "To provide an alternative, high-resistance path for current to prevent electrocution.", "isCorrect": false, "rationale": "Grounding provides a *low-resistance* path, not a high-resistance path, to safely divert current."}, {"text": "To ensure the appliance receives a consistent and stable voltage supply.", "isCorrect": false, "rationale": "Voltage regulation is typically handled by other components or the power grid, not primarily by the grounding wire."}, {"text": "To provide a low-resistance path for fault current to safely flow into the Earth, preventing electric shock.", "isCorrect": true, "rationale": "The text states, 'Grounding provides a low-resistance path for current to flow safely into the Earth in case of a fault.' This protects users if a live wire touches the appliance's metal case."}], "id": "q07"}, {"question": "Which of the following actions represents an unsafe electrical practice according to the provided safety notes?", "options": [{"text": "Ensuring all electrical devices are plugged into surge protectors.", "isCorrect": false, "rationale": "While not explicitly mentioned, surge protectors are a beneficial safety measure and not an unsafe practice."}, {"text": "Using a damaged electrical cord that has exposed wires, as long as it's not sparking.", "isCorrect": true, "rationale": "The safety notes explicitly state, 'Never use damaged cords or plugs.' Exposed wires present a significant shock and fire hazard."}, {"text": "Having a teacher check a lab circuit before connecting the battery.", "isCorrect": false, "rationale": "This is a recommended safety practice in the lab, as stated in the safety notes."}, {"text": "Unplugging unused appliances to save energy.", "isCorrect": false, "rationale": "This is a good practice for energy conservation and also reduces potential hazards, not an unsafe one."}], "id": "q08"}, {"question": "Based on the 'Building Series and Parallel Circuits' investigation, what happens to the other bulb in a series circuit if one bulb is unscrewed?", "options": [{"text": "The other bulb remains lit with increased brightness.", "isCorrect": false, "rationale": "Unscrewing one bulb in a series circuit breaks the entire circuit, stopping current flow to all components. The remaining bulb would go out, not get brighter."}, {"text": "The other bulb remains lit with unchanged brightness.", "isCorrect": false, "rationale": "This is characteristic of a parallel circuit, not a series circuit. In a series circuit, removing one component breaks the circuit."}, {"text": "The other bulb goes out because the circuit is broken.", "isCorrect": true, "rationale": "In a series circuit, current flows through all components consecutively. If one bulb is removed, the circuit becomes open, stopping current flow to all other components, causing the other bulb to go out."}, {"text": "The other bulb flickers briefly then goes out, indicating a short circuit.", "isCorrect": false, "rationale": "Unscrewing a bulb creates an open circuit, not a short circuit. The bulb would simply go out, without flickering due to a short."}], "id": "q09"}, {"question": "According to the 'Building Series and Parallel Circuits' investigation, which characteristic is true for a parallel circuit when comparing voltage and current across branches?", "options": [{"text": "The current is the same through each branch, but the voltage drops add up to the battery voltage.", "isCorrect": false, "rationale": "This describes characteristics of a series circuit, not a parallel circuit. In parallel, voltage is the same, and currents add up."}, {"text": "The voltage is the same across each branch, and the branch currents add up to the total current from the battery.", "isCorrect": true, "rationale": "The analysis questions for Part B ask: 'In the parallel circuit, was the voltage the same across each branch?' and 'Did the branch currents in the parallel circuit add up to the total current?' The expected results also confirm V1=V2=3.0V and IT = I1+I2 for parallel circuits."}, {"text": "Both the voltage and the current are different across each branch.", "isCorrect": false, "rationale": "In a parallel circuit, the voltage across each parallel branch is the same (equal to the source voltage)."}, {"text": "The voltage across each branch is proportional to its resistance, while the current is constant.", "isCorrect": false, "rationale": "This describes a series circuit (voltage drops proportionally across resistors), not a parallel circuit where voltage is constant across branches."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
