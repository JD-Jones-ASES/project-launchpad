    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 18, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which observation provides the strongest evidence that a chemical reaction has occurred, rather than just a physical change?", "options": [{"text": "Water boiling and turning into steam.", "isCorrect": false, "rationale": "Water boiling and turning into steam is a change of state, which is a physical change. The chemical identity of water remains the same."}, {"text": "A clear liquid solution turning cloudy and forming a solid at the bottom.", "isCorrect": true, "rationale": "The formation of a solid (precipitate) when two solutions are mixed is one of the four key signs of a chemical reaction, indicating new substances with different properties have formed."}, {"text": "Sugar dissolving in hot tea.", "isCorrect": false, "rationale": "Dissolving is a physical change where a substance disperses into a solvent but retains its chemical identity."}, {"text": "Crushing a rock into smaller pieces.", "isCorrect": false, "rationale": "Crushing a rock changes its size and shape, but not its chemical composition, making it a physical change."}]}, {"question": "A student observes that a reaction mixture becomes noticeably colder to the touch. Based on this observation, what type of reaction is most likely occurring?", "options": [{"text": "An exothermic reaction, releasing heat.", "isCorrect": false, "rationale": "Exothermic reactions release energy, typically as heat, making the surroundings warmer, not colder."}, {"text": "An endothermic reaction, absorbing heat.", "isCorrect": true, "rationale": "Endothermic reactions absorb energy, usually as heat, from their surroundings, causing the surroundings to become cooler."}, {"text": "A combustion reaction, requiring a spark.", "isCorrect": false, "rationale": "Combustion is a type of exothermic reaction, which would release heat and make the surroundings warmer, not colder."}, {"text": "A precipitation reaction, forming a solid.", "isCorrect": false, "rationale": "While a precipitate might form, temperature change is a separate indicator. A precipitation reaction can be either endothermic or exothermic, or show no significant temperature change."}]}, {"question": "What is the fundamental difference between a chemical change and a physical change, as described in the text?", "options": [{"text": "A physical change involves a change in state, while a chemical change involves a color change.", "isCorrect": false, "rationale": "While a change of state is physical and a color change can be chemical, this statement is an oversimplification and not universally true for all chemical changes. The fundamental difference lies in the formation of new substances."}, {"text": "A physical change alters the substance's appearance, while a chemical change forms new substances with different chemical properties.", "isCorrect": true, "rationale": "The text defines a chemical reaction as a process where substances are transformed into new substances with different chemical properties. Physical changes only alter appearance or state without changing the substance's chemical identity."}, {"text": "A physical change requires activation energy, while a chemical change does not.", "isCorrect": false, "rationale": "Both physical and chemical changes can require energy input. The text explicitly states that even exothermic chemical reactions require activation energy to start."}, {"text": "A physical change always produces a gas, while a chemical change always produces a precipitate.", "isCorrect": false, "rationale": "These are specific types of evidence, not universal characteristics. Many physical changes don't produce gas, and many chemical changes don't produce precipitates."}]}, {"question": "According to the text, why does a pile of leaves not spontaneously burst into flames on a warm day, even though combustion is an exothermic reaction?", "options": [{"text": "The reaction is endothermic and requires constant heat input.", "isCorrect": false, "rationale": "Combustion is explicitly stated as an exothermic reaction, meaning it releases energy, not constantly requires it once started."}, {"text": "The leaves contain catalysts that prevent the reaction from starting without intervention.", "isCorrect": false, "rationale": "The text does not mention catalysts inhibiting combustion in leaves; rather, it discusses catalysts lowering activation energy."}, {"text": "The activation energy barrier has not been overcome by the ambient temperature.", "isCorrect": true, "rationale": "The text explains that even exothermic reactions need a 'push' or activation energy to start. A warm day's temperature is typically insufficient to provide the necessary activation energy to break bonds in the leaves and initiate combustion."}, {"text": "Combustion only occurs in the presence of a strong acid or base.", "isCorrect": false, "rationale": "This statement is incorrect. Combustion is typically an oxidation reaction and does not require acids or bases."}]}, {"question": "Imagine you mix two clear, colorless solutions, and the mixture immediately starts bubbling vigorously and feels warm to the touch. Which two pieces of evidence for a chemical reaction are present?", "options": [{"text": "Color change and precipitate formation.", "isCorrect": false, "rationale": "No color change or precipitate formation is described; the solutions were clear and colorless, and no solid formed."}, {"text": "Gas production and temperature decrease.", "isCorrect": false, "rationale": "Bubbling indicates gas production, but the mixture feeling warm indicates a temperature increase, not a decrease."}, {"text": "Gas production and temperature increase.", "isCorrect": true, "rationale": "Bubbling vigorously indicates gas production, and feeling warm to the touch indicates a temperature increase, both strong signs of a chemical reaction."}, {"text": "Precipitate formation and temperature decrease.", "isCorrect": false, "rationale": "No precipitate formation is mentioned, and the temperature increased, not decreased."}]}, {"question": "In an exothermic reaction, how does the chemical energy of the products compare to the chemical energy of the reactants?", "options": [{"text": "Products have more chemical energy because energy was absorbed.", "isCorrect": false, "rationale": "This describes an endothermic reaction, where energy is absorbed and stored in the products, giving them higher chemical energy."}, {"text": "Products have less chemical energy because energy was released.", "isCorrect": true, "rationale": "The text states that in an exothermic reaction, the products have less chemical energy than the reactants, and the difference is released as heat, light, or sound."}, {"text": "Products have the same chemical energy, only the physical state changes.", "isCorrect": false, "rationale": "If the chemical energy were the same, no net energy would be released or absorbed, and a chemical reaction (formation of new substances) implies changes in energy stored in bonds."}, {"text": "The comparison depends on whether a catalyst is present.", "isCorrect": false, "rationale": "A catalyst affects the reaction rate by lowering activation energy, but it does not change the overall energy difference between reactants and products."}]}, {"question": "What is the primary role of a catalyst in a chemical reaction?", "options": [{"text": "To supply the energy needed to form new bonds.", "isCorrect": false, "rationale": "Catalysts do not supply energy; they facilitate the reaction pathway, often by lowering the energy required for the reactants to transform."}, {"text": "To be consumed during the reaction and become part of the products.", "isCorrect": false, "rationale": "The text explicitly states that catalysts lower activation energy 'without being consumed' in the reaction."}, {"text": "To lower the activation energy barrier, making the reaction easier to start.", "isCorrect": true, "rationale": "The text defines activation energy as the minimum energy required to start a reaction and states that catalysts lower this barrier."}, {"text": "To change an endothermic reaction into an exothermic one.", "isCorrect": false, "rationale": "Catalysts do not change the overall energy profile or whether a reaction is endothermic or exothermic; they only change the path to get there."}]}, {"question": "Photosynthesis is described as an endothermic reaction powered by light energy, while cellular respiration is an exothermic reaction that releases energy. What does this imply about their energy requirements and outputs?", "options": [{"text": "Both reactions require activation energy to begin.", "isCorrect": false, "rationale": "While true that both need activation energy, this does not directly address the implication of being endothermic vs. exothermic regarding energy requirements/outputs for the overall process."}, {"text": "Photosynthesis requires energy input from the environment, while cellular respiration releases energy to the environment.", "isCorrect": true, "rationale": "Endothermic reactions absorb energy (like photosynthesis absorbing light energy), and exothermic reactions release energy (like cellular respiration releasing energy for life processes)."}, {"text": "Photosynthesis releases energy for the plant, while cellular respiration absorbs energy from food.", "isCorrect": false, "rationale": "This reverses the roles. Photosynthesis stores energy, and cellular respiration releases it."}, {"text": "Both reactions lead to products with higher chemical energy than their reactants.", "isCorrect": false, "rationale": "Only endothermic reactions (like photosynthesis) lead to products with higher chemical energy. Exothermic reactions (like cellular respiration) lead to products with lower chemical energy."}]}, {"question": "When silver nitrate solution is mixed with sodium chloride solution, a white solid called silver chloride appears. This observation is an example of what type of chemical reaction evidence?", "options": [{"text": "Gas production, because a new substance is formed.", "isCorrect": false, "rationale": "Gas production involves bubbles or fizzing. The description specifies a 'white solid' forming, not a gas."}, {"text": "Color change, as the clear solutions form a white solid.", "isCorrect": false, "rationale": "While a visible change in appearance occurs, the specific and most accurate description for a solid forming from mixed solutions is precipitate formation."}, {"text": "Precipitate formation, where an insoluble solid settles out of solution.", "isCorrect": true, "rationale": "The text explicitly uses this example (silver nitrate and sodium chloride forming silver chloride) to define precipitate formation as a sign of a chemical reaction."}, {"text": "Temperature change, indicating an exothermic reaction.", "isCorrect": false, "rationale": "No mention of temperature change is made in the description of this specific reaction; precipitate formation is the primary evidence highlighted."}]}, {"question": "Which of the following scenarios is an example of an exothermic reaction?", "options": [{"text": "A cold pack becoming chilly when activated.", "isCorrect": false, "rationale": "A cold pack becoming chilly indicates it is absorbing heat from its surroundings, making it an endothermic reaction."}, {"text": "Cooking an egg on a stove.", "isCorrect": false, "rationale": "Cooking an egg requires heat input to change its chemical structure, making it an endothermic process."}, {"text": "Wood burning in a campfire.", "isCorrect": true, "rationale": "Combustion (burning wood, gasoline) is listed as an example of an exothermic reaction, releasing energy as heat and light."}, {"text": "Photosynthesis in a leaf.", "isCorrect": false, "rationale": "Photosynthesis is explicitly described as an endothermic reaction that absorbs light energy."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
