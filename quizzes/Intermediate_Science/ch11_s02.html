    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 11, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does a significant portion of a large tree's dry mass originate, according to the text?", "options": [{"text": "From minerals absorbed from the soil.", "isCorrect": false, "rationale": "The text states that soil provides water and minerals, but 'most of the tree's mass does not come from the ground' and is a small part of the dry weight."}, {"text": "From water molecules taken up by roots.", "isCorrect": false, "rationale": "Water contributes significantly to a tree's total mass, but the 'bulk of a tree's dry weight' refers specifically to carbon-based organic matter, not just water."}, {"text": "From carbon dioxide gas assimilated from the atmosphere.", "isCorrect": true, "rationale": "The text explicitly states: 'the bulk of a tree's dry weight comes from a gas — carbon dioxide pulled from the air,' converted into organic compounds through photosynthesis."}, {"text": "From light energy converted directly into mass.", "isCorrect": false, "rationale": "Light energy is converted into chemical energy stored in glucose bonds, not directly into mass. Mass is gained from the atoms of CO2 and H2O."}]}, {"question": "Which structural component of the chloroplast is directly involved in the light reactions, and where does the Calvin cycle primarily take place?", "options": [{"text": "Thylakoids for light reactions; grana for the Calvin cycle.", "isCorrect": false, "rationale": "Grana are stacks of thylakoids, but the Calvin cycle occurs in the stroma, not the grana specifically."}, {"text": "Stroma for light reactions; thylakoids for the Calvin cycle.", "isCorrect": false, "rationale": "This option reverses the correct locations; light reactions occur in thylakoids, and the Calvin cycle in the stroma."}, {"text": "Thylakoid membranes for light reactions; stroma for the Calvin cycle.", "isCorrect": true, "rationale": "The text clearly states, 'The light reactions take place in the thylakoid membranes' and 'The Calvin cycle takes place in the stroma of the chloroplast.'"}, {"text": "Outer membrane for light reactions; inner membrane for the Calvin cycle.", "isCorrect": false, "rationale": "The outer and inner membranes enclose the chloroplast but are not the primary sites for these specific stages of photosynthesis."}]}, {"question": "A plant appears green to the human eye primarily because its chlorophyll:", "options": [{"text": "Absorbs all wavelengths of visible light equally.", "isCorrect": false, "rationale": "The text specifies that 'Chlorophyll absorbs red and blue wavelengths of visible light most efficiently,' indicating unequal absorption."}, {"text": "Reflects green wavelengths while absorbing red and blue light.", "isCorrect": true, "rationale": "The text states: 'Chlorophyll absorbs red and blue wavelengths... and reflects green wavelengths — which is why plants appear green to our eyes.'"}, {"text": "Emits green light through a process called fluorescence.", "isCorrect": false, "rationale": "While some fluorescence can occur, the primary reason for green appearance is the reflection of green light, not its emission."}, {"text": "Converts green light into chemical energy.", "isCorrect": false, "rationale": "Chlorophyll primarily uses absorbed red and blue light energy for photosynthesis, reflecting most green light rather than converting it efficiently."}]}, {"question": "The oxygen gas (O2) released during photosynthesis is a direct product of:", "options": [{"text": "The breakdown of carbon dioxide molecules in the Calvin cycle.", "isCorrect": false, "rationale": "Carbon dioxide provides carbon atoms for sugar synthesis, but it is not broken down to release oxygen. Its oxygen atoms become part of glucose and water."}, {"text": "The splitting of water molecules during the light reactions.", "isCorrect": true, "rationale": "The text explicitly states under 'Water splitting': 'Water molecules are split (2H2O -> 4H+ + 4e- + O2). The oxygen is released as a gas — this is the source of the oxygen you breathe.'"}, {"text": "The regeneration of G3P in the Calvin cycle.", "isCorrect": false, "rationale": "The regeneration of G3P (or RuBP) involves reorganizing carbon compounds and does not directly produce oxygen gas."}, {"text": "The production of ATP and NADPH by the electron transport chain.", "isCorrect": false, "rationale": "ATP and NADPH are energy carriers produced using energy from energized electrons, but their formation does not directly involve the release of oxygen gas."}]}, {"question": "What is the primary role of the ATP and NADPH molecules produced during the light reactions?", "options": [{"text": "To be released as waste products after energy conversion.", "isCorrect": false, "rationale": "ATP and NADPH are essential energy carriers, not waste products. They are recycled after their energy is used."}, {"text": "To provide the light energy directly for the Calvin cycle.", "isCorrect": false, "rationale": "ATP and NADPH provide chemical energy and electrons, not light energy, to the Calvin cycle. The Calvin cycle does not directly require light."}, {"text": "To carry chemical energy and electrons to power the Calvin cycle.", "isCorrect": true, "rationale": "The text states: 'The light reactions convert light energy into the chemical energy of ATP and NADPH. These two molecules then carry that energy to the second stage of photosynthesis (the Calvin cycle).'"}, {"text": "To become incorporated into the structure of glucose.", "isCorrect": false, "rationale": "While their energy is used to build glucose, ATP and NADPH themselves are not incorporated into the glucose molecule; they are regenerated into ADP and NADP+."}]}, {"question": "Which statement accurately describes the initial step of carbon fixation in the Calvin cycle?", "options": [{"text": "Glucose is broken down into smaller carbon compounds by RuBisCO.", "isCorrect": false, "rationale": "The Calvin cycle builds sugars, it does not break down glucose. Glucose is the final product, not the starting material for carbon fixation."}, {"text": "Light energy directly converts CO2 into organic molecules.", "isCorrect": false, "rationale": "Light energy is indirectly involved via ATP and NADPH. The direct conversion of CO2 into organic molecules is catalyzed by an enzyme, not by light itself."}, {"text": "RuBisCO attaches CO2 to a five-carbon molecule, forming two three-carbon molecules.", "isCorrect": true, "rationale": "The text describes this directly: 'An enzyme called RuBisCO attaches CO2 to a five-carbon molecule, producing two three-carbon molecules.'"}, {"text": "Water molecules donate carbon atoms to form glucose.", "isCorrect": false, "rationale": "Carbon dioxide (CO2) is the source of carbon atoms for glucose synthesis, not water molecules."}]}, {"question": "A scientist observes that increasing the light intensity beyond a certain point no longer increases the rate of photosynthesis in a plant. Which of the following is the most likely explanation, according to the text?", "options": [{"text": "The plant has run out of chlorophyll to absorb more light.", "isCorrect": false, "rationale": "While possible in extreme cases, the text emphasizes that 'beyond a certain intensity, the rate levels off because other factors become limiting,' not necessarily a lack of chlorophyll itself."}, {"text": "The Calvin cycle has become saturated with CO2, preventing further increases.", "isCorrect": false, "rationale": "If CO2 were saturated, the rate would continue to increase with light. The problem describes a situation where light is no longer the limiting factor, meaning another factor *like* CO2 is limiting."}, {"text": "Another factor, such as CO2 concentration or temperature, has become limiting.", "isCorrect": true, "rationale": "The text, particularly the 'worked example,' explains that 'another factor — most likely CO2 concentration or temperature — has become the limiting factor,' preventing the rate from increasing further with more light."}, {"text": "The plant is producing too much oxygen, which inhibits the light reactions.", "isCorrect": false, "rationale": "The text does not mention oxygen inhibition as a primary limiting factor for the rate of photosynthesis in this context."}]}, {"question": "Considering the overall equation and stages of photosynthesis, what is the ultimate goal of converting carbon dioxide and water into glucose and oxygen for the autotroph?", "options": [{"text": "To produce oxygen for atmospheric respiration.", "isCorrect": false, "rationale": "While oxygen is a vital byproduct for aerobic life, the primary purpose for the plant (autotroph) is to produce its own food, not to supply oxygen for others."}, {"text": "To store excess light energy in a stable chemical form for the autotroph.", "isCorrect": true, "rationale": "The text states the light energy 'is converted into chemical energy stored in the bonds of the glucose molecule,' which serves as the plant's primary energy storage."}, {"text": "To release water molecules to help maintain turgor pressure in plant cells.", "isCorrect": false, "rationale": "Water is a reactant in photosynthesis; it is consumed, not released as a primary goal of the process for turgor."}, {"text": "To break down complex sugars for immediate energy release.", "isCorrect": false, "rationale": "Photosynthesis is the process of building sugars, not breaking them down. Breaking down sugars for energy is cellular respiration."}]}, {"question": "If a plant is exposed to temperatures significantly outside its optimal range (e.g., too cold or too hot), how would this primarily affect the rate of photosynthesis?", "options": [{"text": "It would directly cause chlorophyll to denature, reducing light absorption.", "isCorrect": false, "rationale": "Chlorophyll is generally stable across a wider temperature range than enzymes. Enzymes are the primary components sensitive to temperature changes in photosynthesis."}, {"text": "It would speed up the light reactions but slow down the Calvin cycle.", "isCorrect": false, "rationale": "Both stages involve enzyme-catalyzed reactions, and extreme temperatures would likely inhibit both, though the Calvin cycle is particularly enzyme-dependent."}, {"text": "It would inhibit the function of enzymes crucial for both stages, especially the Calvin cycle.", "isCorrect": true, "rationale": "The text states: 'Photosynthesis relies on enzymes, which work best within an optimal temperature range... Too cold, and the enzymes slow down. Too hot, and the enzymes denature (lose their shape and stop working).'"}, {"text": "It would increase water loss through stomata, thus increasing CO2 intake.", "isCorrect": false, "rationale": "Extremely high temperatures increase water loss, which often leads to stomata closing to conserve water, thereby *limiting* CO2 intake and slowing photosynthesis."}]}, {"question": "The text states that 'it takes six turns of the Calvin cycle... to produce enough G3P to assemble one molecule of glucose.' This implies that G3P is:", "options": [{"text": "A waste product that needs to be recycled by the light reactions.", "isCorrect": false, "rationale": "G3P is a crucial product of the Calvin cycle, used to build sugars, and is not a waste product. It's also not recycled by the light reactions."}, {"text": "The direct, stable end-product of the Calvin cycle that plants immediately store.", "isCorrect": false, "rationale": "G3P is a high-energy intermediate. While some is used to regenerate the cycle, other G3P molecules are used to *build* glucose, meaning glucose is the stable end-product, not G3P itself."}, {"text": "A three-carbon sugar phosphate that serves as the building block for glucose and other organic compounds.", "isCorrect": true, "rationale": "The text explains that CO2 is converted into three-carbon molecules (implied to be G3P or similar), and 'Other G3P molecules exit the cycle and are used to build glucose and other organic compounds.' Glucose is a six-carbon sugar, consistent with two G3P molecules (3+3 carbons) forming one."}, {"text": "The molecule responsible for absorbing light energy in the thylakoid membranes.", "isCorrect": false, "rationale": "Chlorophyll is the pigment responsible for absorbing light energy in the thylakoid membranes, not G3P."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
