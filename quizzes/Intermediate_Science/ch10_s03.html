<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 10, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary instructional purpose of the 'Vocabulary Review' section?", "options": [{"text": "To introduce entirely new scientific vocabulary concepts to students.", "isCorrect": false, "rationale": "The section explicitly states it 'collects the key vocabulary terms,' implying these are terms previously encountered and are now being reviewed, not introduced for the first time."}, {"text": "To provide a definitive list of definitions for rote memorization before an examination.", "isCorrect": false, "rationale": "While it serves as a study guide, the section encourages active learning ('define in your own words,' 'give an example,' 'connect terms') rather than passive memorization of provided definitions (which are not actually included in this section)."}, {"text": "To serve as a self-assessment tool for students to evaluate and deepen their understanding of previously learned vocabulary.", "isCorrect": true, "rationale": "The section explicitly states 'Use it as a study guide and self-check' and provides prompts that encourage active recall, application, and synthesis, all geared towards a deeper understanding and self-assessment."}, {"text": "To present a comprehensive glossary of all scientific terms covered throughout the entire textbook series.", "isCorrect": false, "rationale": "The section specifies that it 'collects the key vocabulary terms from all four units in Cycle 2,' not the entire textbook series, making its scope narrower than a comprehensive glossary."}], "id": "q01"}, {"question": "Which of the self-check prompts in the 'Vocabulary Review' section demands the highest level of analytical and synthetic thinking from a student?", "options": [{"text": "Can you define each term in your own words?", "isCorrect": false, "rationale": "Defining terms in one's own words demonstrates comprehension and recall, but it doesn't necessarily require the same level of analytical or synthetic thinking as connecting disparate concepts."}, {"text": "Can you give an example?", "isCorrect": false, "rationale": "Providing an example demonstrates application and understanding, but it is typically a direct application of a single concept, not a synthesis across multiple disciplines."}, {"text": "Can you connect a term from one branch to a term from another using the theme 'structure determines function'?", "isCorrect": true, "rationale": "This prompt requires students to analyze the relationships between terms from different scientific disciplines and synthesize their understanding under a unifying theme, demonstrating higher-order thinking beyond simple recall or application."}, {"text": "Can you recall the unit each term belongs to?", "isCorrect": false, "rationale": "This prompt is not explicitly mentioned in the section's self-check questions and would primarily test simple recall or recognition, which is a lower-level cognitive skill."}], "id": "q02"}, {"question": "What overarching scientific theme is explicitly suggested as a method for students to connect vocabulary terms across different scientific branches?", "options": [{"text": "The theme of 'energy transfer and transformation.'", "isCorrect": false, "rationale": "While energy transfer is a fundamental scientific theme, it is not the specific theme mentioned in this section for connecting vocabulary terms."}, {"text": "The theme of 'matter conservation and cycling.'", "isCorrect": false, "rationale": "Matter conservation is an important scientific principle, but it is not the explicit theme provided in this section for linking diverse vocabulary."}, {"text": "The theme of 'evolution and adaptation.'", "isCorrect": false, "rationale": "Evolution and adaptation are key concepts in life science, but they are not presented in this section as the overarching theme for interdisciplinary vocabulary connections."}, {"text": "The theme of 'structure determines function.'", "isCorrect": true, "rationale": "The section directly asks, 'Can you connect a term from one branch to a term from another using the theme 'structure determines function'?', clearly stating this as the unifying concept."}], "id": "q03"}, {"question": "Based on the provided list of units, how many distinct branches of science are represented in the vocabulary covered by this review section?", "options": [{"text": "Two branches.", "isCorrect": false, "rationale": "The section lists 'Life Science,' 'Earth Science,' 'Chemistry,' and 'Physics,' which are four distinct branches."}, {"text": "Three branches.", "isCorrect": false, "rationale": "The section lists 'Life Science,' 'Earth Science,' 'Chemistry,' and 'Physics,' clearly indicating four different branches."}, {"text": "Four branches.", "isCorrect": true, "rationale": "The section explicitly lists four units, each corresponding to a distinct branch of science: Life Science (Unit 6), Earth Science (Unit 7), Chemistry (Unit 8), and Physics (Unit 9)."}, {"text": "Five branches.", "isCorrect": false, "rationale": "Only four specific branches of science are mentioned in the context of the units covered in Cycle 2."}], "id": "q04"}, {"question": "A student utilizing *only* the content provided in *this specific 'Vocabulary Review' section* would *not* be able to directly complete which of the following tasks without external resources?", "options": [{"text": "Understand the overall purpose and suggested usage of the review section.", "isCorrect": false, "rationale": "The purpose ('study guide and self-check') and usage instructions ('define in your own words,' etc.) are explicitly stated within the section."}, {"text": "Identify the specific units and scientific branches from which vocabulary terms are drawn.", "isCorrect": false, "rationale": "The section clearly lists the four units (6-9) and their corresponding scientific branches."}, {"text": "Locate the explicit, pre-written definitions of individual vocabulary terms.", "isCorrect": true, "rationale": "The section *asks* students if they 'Can you define each term in your own words?' but does not *provide* a table of terms or their definitions. This implies students are expected to bring that knowledge from previous units or external resources."}, {"text": "Recognize the suggested overarching theme for connecting scientific terms.", "isCorrect": false, "rationale": "The theme 'structure determines function' is clearly stated as a way to connect terms."}], "id": "q05"}, {"question": "The 'thinkdeeper' exercise, which challenges students to choose terms from different branches and use them in a 'meaningful way' in a single paragraph, primarily aims to develop which of the following skills?", "options": [{"text": "Rote memorization of scientific definitions across multiple fields.", "isCorrect": false, "rationale": "The exercise goes beyond memorization by requiring students to synthesize concepts in a meaningful context, rather than just recalling definitions."}, {"text": "The ability to accurately categorize and identify isolated facts from different disciplines.", "isCorrect": false, "rationale": "While categorizing is part of understanding, the 'thinkdeeper' exercise emphasizes *connecting* and *integrating* facts, not keeping them isolated."}, {"text": "Interdisciplinary synthesis, creative problem-solving, and the construction of coherent arguments.", "isCorrect": true, "rationale": "By requiring students to find a 'meaningful way' to relate diverse terms, even if the connection is 'not obvious,' the exercise fosters creative thinking, synthesis of knowledge from different fields, and the ability to articulate complex relationships."}, {"text": "Speed and accuracy in recalling vocabulary terms from various units.", "isCorrect": false, "rationale": "The exercise focuses on the quality and depth of understanding and connection, not the speed or simple accuracy of recall."}], "id": "q06"}, {"question": "By providing an example for the 'thinkdeeper' exercise that combines 'homeostasis,' 'subduction,' 'electronegativity,' and 'inertia,' the textbook primarily intends to illustrate:", "options": [{"text": "That all scientific concepts are fundamentally interchangeable and can be used in any context.", "isCorrect": false, "rationale": "The concepts are distinct and have specific meanings; the goal is to find meaningful *connections*, not to treat them as interchangeable."}, {"text": "The necessity of limiting scientific inquiry to a single, specialized discipline.", "isCorrect": false, "rationale": "The example explicitly combines terms from different branches (Life Science, Earth Science, Chemistry, Physics), directly encouraging an interdisciplinary approach."}, {"text": "The potential for complexity and interconnectedness of real-world phenomena across seemingly disparate scientific fields.", "isCorrect": true, "rationale": "The selection of highly diverse terms from different branches for a single real-world scenario highlights that even seemingly unrelated scientific concepts can interact and contribute to a holistic understanding of complex natural systems."}, {"text": "A specific, definitive correct answer for how these four terms should always relate.", "isCorrect": false, "rationale": "The prompt states 'how might' they relate and that 'The connection does not have to be obvious,' indicating it's an open-ended challenge to find *a* connection, not to discover *the* single correct one."}], "id": "q07"}, {"question": "The vocabulary terms targeted by this review section are specifically drawn from which particular group of units?", "options": [{"text": "All units from the entire textbook series, as a comprehensive final review.", "isCorrect": false, "rationale": "The section specifies 'all four units in Cycle 2,' which is a subset, not the entire textbook series."}, {"text": "Units 1-5, which cover foundational and introductory scientific concepts.", "isCorrect": false, "rationale": "The listed units are 6, 7, 8, and 9, not 1-5."}, {"text": "Cycle 2, specifically Units 6 through 9.", "isCorrect": true, "rationale": "The section clearly states 'key vocabulary terms from all four units in Cycle 2' and then explicitly lists Units 6, 7, 8, and 9."}, {"text": "Only the units related to life science and chemistry, as indicated by the examples.", "isCorrect": false, "rationale": "While Life Science and Chemistry are included, Earth Science and Physics are also explicitly listed as sources for terms, making this option incomplete."}], "id": "q08"}, {"question": "Why does the 'Vocabulary Review' section instruct students to define terms 'in your own words' and 'give an example,' rather than just providing a space to match terms with given definitions?", "options": [{"text": "To encourage students to simply copy definitions from their previous notes or the textbook.", "isCorrect": false, "rationale": "'In your own words' actively discourages direct copying and instead promotes processing and rephrasing."}, {"text": "To ensure only a superficial familiarity with the terms is achieved, saving study time.", "isCorrect": false, "rationale": "Defining in one's own words and providing examples demands a deeper cognitive engagement than superficial familiarity, and likely requires more study time for genuine understanding."}, {"text": "To promote active recall, deeper conceptual understanding, and the ability to apply terms in context.", "isCorrect": true, "rationale": "Defining in one's own words demonstrates comprehension and ability to articulate, while providing examples shows application and contextual understanding, both indicating a deeper level of learning than mere recognition or memorization."}, {"text": "To simplify the review process by eliminating the need for complex analytical thought.", "isCorrect": false, "rationale": "These prompts require more active and complex thought than simple matching or passive reading of definitions, thus not simplifying the analytical process but deepening it."}], "id": "q09"}, {"question": "If a student successfully completes the 'thinkdeeper' exercise by integrating terms from different scientific branches into a coherent and meaningful paragraph, what broader scientific understanding have they most likely demonstrated?", "options": [{"text": "The ability to categorize and isolate scientific information into distinct, independent compartments.", "isCorrect": false, "rationale": "The exercise's core goal is to *connect* and *integrate* diverse terms, which is the opposite of isolating them into independent compartments."}, {"text": "An advanced, highly specialized understanding within a single scientific discipline.", "isCorrect": false, "rationale": "The exercise specifically requires using terms from *different* branches, thus focusing on interdisciplinary understanding rather than specialized knowledge within one field."}, {"text": "The capacity to synthesize knowledge from multiple domains to construct a holistic understanding of complex systems and phenomena.", "isCorrect": true, "rationale": "Successfully connecting diverse terms in a 'meaningful way' across different branches demonstrates the ability to see the bigger picture, integrate information from various fields, and build a cohesive understanding of complex real-world systems."}, {"text": "Proficiency in memorizing and reproducing scientific jargon without necessarily comprehending its meaning or application.", "isCorrect": false, "rationale": "To connect terms in a 'meaningful way' requires a deep understanding of their individual meanings and potential relationships, going far beyond mere reproduction of jargon."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
