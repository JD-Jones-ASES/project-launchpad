        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 8, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which early chemist proposed the \"Law of Octaves\" and what was its central claim about elemental properties?", "options": [{"text": "Johann Döbereiner; elements could be grouped in triads where the middle element's mass was an average.", "isCorrect": false, "rationale": "This describes Döbereiner's work with triads, not Newlands' Law of Octaves."}, {"text": "John Newlands; every eighth element shared similar properties, resembling notes in a musical scale.", "isCorrect": true, "rationale": "John Newlands proposed the 'Law of Octaves,' noting that every eighth element exhibited similar properties, akin to musical notes."}, {"text": "Dmitri Mendeleev; properties of elements repeat periodically when arranged by atomic mass.", "isCorrect": false, "rationale": "Mendeleev made a breakthrough in periodic organization, but the 'Law of Octaves' was proposed by Newlands prior to Mendeleev's full table."}, {"text": "Henry Moseley; elements should be ordered by their atomic number, not atomic mass.", "isCorrect": false, "rationale": "Moseley's work came much later and established atomic number as the organizing principle, but he did not propose the 'Law of Octaves'."}], "id": "q01"}, {"question": "Mendeleev's greatest insight that most convinced the scientific community of the validity of his periodic table was:", "options": [{"text": "His meticulous organization of all sixty-three known elements into rows and columns.", "isCorrect": false, "rationale": "While he did this, other chemists also attempted organization. His unique genius lay elsewhere."}, {"text": "His discovery of new elements like gallium and germanium.", "isCorrect": false, "rationale": "Mendeleev predicted these elements, but he did not discover them himself. They were discovered by other scientists years later."}, {"text": "His ability to predict the properties of undiscovered elements and leave gaps for them.", "isCorrect": true, "rationale": "Mendeleev's genius lay in his confidence to leave gaps for hypothetical elements and accurately predict their properties, which were later confirmed by discoveries like gallium and germanium. This convinced the scientific community of a deeper underlying order."}, {"text": "His use of atomic number as the primary organizing principle.", "isCorrect": false, "rationale": "Mendeleev organized elements by atomic mass. Atomic number was identified as the true organizing principle by Moseley much later."}], "id": "q02"}, {"question": "What specific anomaly did Mendeleev encounter when organizing elements strictly by atomic mass, which later hinted at a deeper organizing principle?", "options": [{"text": "The existence of elements like lithium, sodium, and potassium, which formed triads with averaged atomic masses.", "isCorrect": false, "rationale": "This describes Döbereiner's earlier observations, not a problem specific to Mendeleev's ordering that challenged his fundamental principle."}, {"text": "The fact that nonmetals were brittle while metals were malleable.", "isCorrect": false, "rationale": "This is a general distinction between types of elements, not an anomaly that posed a problem for ordering by mass."}, {"text": "The irregular spacing of atomic masses between consecutive elements.", "isCorrect": false, "rationale": "While atomic masses do not increase uniformly, this specific characteristic was not highlighted as the *anomaly* that challenged the mass-based ordering principle directly."}, {"text": "The need to swap the positions of tellurium and iodine based on their chemical properties, despite their atomic masses.", "isCorrect": true, "rationale": "Mendeleev had to place tellurium (atomic mass 127.6) before iodine (atomic mass 126.9) to group it with elements of similar chemical properties, despite the mass order. This was a direct contradiction to his mass-based ordering and a key problem."}], "id": "q03"}, {"question": "How did Henry Moseley's research fundamentally refine the organization of the periodic table compared to Mendeleev's method?", "options": [{"text": "Moseley created the first full periodic table, whereas Mendeleev only organized some elements.", "isCorrect": false, "rationale": "Mendeleev created the first widely accepted periodic table of all known elements at the time. Moseley's contribution was a refinement of its organizing principle."}, {"text": "Moseley discovered new elements that filled Mendeleev's predicted gaps, proving his theory.", "isCorrect": false, "rationale": "Other scientists discovered elements like gallium and germanium, confirming Mendeleev's predictions. Moseley's work was on the fundamental property for ordering elements."}, {"text": "Moseley established that the periodic table should be ordered by atomic number, not atomic mass, resolving previous inconsistencies.", "isCorrect": true, "rationale": "Moseley's experiments with X-ray frequencies showed that elements are best organized by their atomic number (number of protons), which solved the tellurium-iodine anomaly and became the basis for the modern periodic table."}, {"text": "Moseley introduced the concept of groups and periods, which Mendeleev had not yet defined.", "isCorrect": false, "rationale": "Mendeleev's table implicitly had rows (periods) and columns (groups) based on similar properties, even if the terminology wasn't fully developed or understood in the modern sense."}], "id": "q04"}, {"question": "In the modern periodic table, what is the primary reason elements within the same *group* (column) exhibit similar chemical properties?", "options": [{"text": "They share the same number of electron energy levels.", "isCorrect": false, "rationale": "Elements in the same *period* (row) share the same number of electron energy levels, not elements in the same group."}, {"text": "They have the same total number of protons and neutrons.", "isCorrect": false, "rationale": "Atomic mass (protons + neutrons) increases down a group, so this is incorrect."}, {"text": "They possess the same number of valence electrons.", "isCorrect": true, "rationale": "The text states that 'Elements in the same group share similar chemical properties because they have the same number of valence electrons.'"}, {"text": "They have similar atomic masses, leading to similar reactivities.", "isCorrect": false, "rationale": "Atomic masses increase down a group, and while chemical properties are similar, it's due to valence electrons, not similar atomic mass."}], "id": "q05"}, {"question": "Which statement best describes the fundamental difference between Mendeleev's initial organization of the periodic table and the modern periodic table?", "options": [{"text": "Mendeleev's table had no gaps, while the modern table includes gaps for undiscovered elements.", "isCorrect": false, "rationale": "Mendeleev famously left gaps for undiscovered elements, which was a key aspect of his genius."}, {"text": "Mendeleev primarily used atomic mass, whereas the modern table uses atomic number as the organizing principle.", "isCorrect": true, "rationale": "Mendeleev organized elements by increasing atomic mass, while the modern periodic table, following Moseley's discovery, organizes elements by increasing atomic number."}, {"text": "Mendeleev included only metals, while the modern table includes metals, nonmetals, and metalloids.", "isCorrect": false, "rationale": "Mendeleev's table included all known elements at the time, which encompassed various types of elements, not just metals."}, {"text": "Mendeleev arranged elements in periods, but the modern table introduced groups.", "isCorrect": false, "rationale": "Mendeleev's table inherently had both rows (periods) and columns (groups) based on similar chemical properties."}], "id": "q06"}, {"question": "A newly discovered element is found to be a semiconductor, capable of conducting electricity under specific conditions but not others. Based on its properties, this element would most likely be classified as a:", "options": [{"text": "Metal, because metals are good conductors of electricity.", "isCorrect": false, "rationale": "Metals are generally excellent conductors under most conditions, whereas semiconductors have conditional conductivity."}, {"text": "Nonmetal, due to its diverse appearance and brittle nature as a solid.", "isCorrect": false, "rationale": "Nonmetals are generally poor conductors of electricity."}, {"text": "Metalloid, as they exhibit properties intermediate between metals and nonmetals, including semiconductivity.", "isCorrect": true, "rationale": "The text defines metalloids (semimetals) as having properties intermediate between metals and nonmetals, specifically mentioning silicon as a semiconductor."}, {"text": "Noble gas, because it might be unreactive and therefore only conduct under specific conditions.", "isCorrect": false, "rationale": "Noble gases are nonmetals and are generally poor conductors, and their unreactivity is a chemical property distinct from semiconductivity."}], "id": "q07"}, {"question": "A team of scientists synthesizes a new element. To accurately place this element within the modern periodic table, which characteristic would be the *most* crucial to determine?", "options": [{"text": "Its average atomic mass.", "isCorrect": false, "rationale": "While atomic mass is important, the text explicitly states that the modern periodic table is ordered by atomic number because it is a more reliable and fundamental property."}, {"text": "Its physical state at room temperature (solid, liquid, or gas).", "isCorrect": false, "rationale": "This is a physical property useful for general categorization, but not the primary factor for its precise numerical placement in the table."}, {"text": "The number of protons in its nucleus.", "isCorrect": true, "rationale": "The number of protons defines the atomic number, which is the fundamental organizing principle of the modern periodic table. Determining this allows for accurate placement."}, {"text": "Its ability to conduct heat and electricity.", "isCorrect": false, "rationale": "This property helps classify it as a metal, nonmetal, or metalloid, but does not give the precise position within that category or resolve ordering issues."}], "id": "q08"}, {"question": "The 'Think Deeper' section explains why atomic number is a more accurate organizing principle than atomic mass. Considering what you learned about isotopes, why is atomic mass a less reliable criterion for ordering elements?", "options": [{"text": "Atomic mass does not account for the reactivity of an element with water.", "isCorrect": false, "rationale": "Reactivity is a chemical property influenced by electron configuration, not a direct problem with atomic mass as an ordering criterion."}, {"text": "The average atomic mass of an element can vary slightly depending on the abundance of its isotopes, potentially causing ordering anomalies.", "isCorrect": true, "rationale": "The 'Think Deeper' section and 'Discussion Guidance' explain that average atomic mass is a weighted average of isotopes, which can sometimes lead to an element having a slightly higher average mass than the next element, despite having fewer protons. Atomic number (protons) always increases by one."}, {"text": "Atomic mass only considers protons and electrons, neglecting the role of neutrons.", "isCorrect": false, "rationale": "Atomic mass accounts for both protons and neutrons (and electrons, though their mass contribution is negligible). Isotopes are variations in neutron count."}, {"text": "Atomic mass only applies to solid elements, not gases or liquids.", "isCorrect": false, "rationale": "Atomic mass is a property of all elements regardless of their physical state."}], "id": "q09"}, {"question": "According to the text, what defines a 'period' in the modern periodic table?", "options": [{"text": "A vertical column containing elements with similar chemical properties.", "isCorrect": false, "rationale": "This describes a 'group' (or family), not a 'period'."}, {"text": "A horizontal row where elements have the same number of electron energy levels.", "isCorrect": true, "rationale": "The text explicitly defines a 'Period' as 'A horizontal row in the periodic table. Elements in the same period have the same number of electron energy levels.'"}, {"text": "A set of three elements with the middle element's mass being the average of the other two.", "isCorrect": false, "rationale": "This describes Döbereiner's 'triads', an early attempt at organization, not a modern periodic table period."}, {"text": "A series of eight elements where properties repeat, like notes in a musical scale.", "isCorrect": false, "rationale": "This refers to Newlands' 'Law of Octaves', an early organization attempt, not a modern period's definition."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
