<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following statements best defines acceleration in physics?", "options": [{"text": "The total distance an object covers in a given time.", "isCorrect": false, "rationale": "This definition refers to speed, not acceleration. Acceleration describes how velocity changes."}, {"text": "The rate at which an object's position changes over time.", "isCorrect": false, "rationale": "This definition refers to velocity, not acceleration. Acceleration is the rate of change of velocity."}, {"text": "The rate at which an object's velocity changes over time.", "isCorrect": true, "rationale": "According to the text, acceleration is precisely defined as 'The rate at which an object's velocity changes over time.'"}, {"text": "The force applied to an object causing it to move.", "isCorrect": false, "rationale": "Force causes acceleration, but acceleration is the resulting change in velocity, not the force itself."}]}, {"question": "What is the standard SI unit for acceleration?", "options": [{"text": "meters per second (m/s)", "isCorrect": false, "rationale": "Meters per second is the SI unit for velocity or speed."}, {"text": "meters per second squared (m/s²)", "isCorrect": true, "rationale": "The text states that the SI unit of acceleration is 'meters per second per second, written as m/s²'."}, {"text": "meters per second per hour (m/s/hr)", "isCorrect": false, "rationale": "This is a non-standard and mixed unit for acceleration, not the SI unit."}, {"text": "kilometers per hour per second (km/hr/s)", "isCorrect": false, "rationale": "This is a non-standard and mixed unit for acceleration, not the SI unit."}]}, {"question": "A car accelerates from an initial velocity of 10 m/s to a final velocity of 30 m/s in 4 seconds. What is the car's acceleration?", "options": [{"text": "2.5 m/s²", "isCorrect": false, "rationale": "This would result from an incorrect calculation, such as (30-10)/8 or 10/4."}, {"text": "5 m/s²", "isCorrect": true, "rationale": "Using the formula a = (v_f - v_i) / t, we get a = (30 m/s - 10 m/s) / 4 s = 20 m/s / 4 s = 5 m/s²."}, {"text": "10 m/s²", "isCorrect": false, "rationale": "This would result from an incorrect calculation, such as 30-10 without dividing by time."}, {"text": "40 m/s²", "isCorrect": false, "rationale": "This would result from an incorrect calculation, such as adding the velocities and not dividing by time."}]}, {"question": "An object is moving to the right (defined as the positive direction) and has a positive acceleration. What is happening to the object's motion?", "options": [{"text": "It is slowing down while moving to the right.", "isCorrect": false, "rationale": "Slowing down in the positive direction occurs when velocity is positive and acceleration is negative (opposite signs)."}, {"text": "It is speeding up while moving to the right.", "isCorrect": true, "rationale": "When velocity and acceleration have the same sign (both positive in this case), the object speeds up. Positive velocity and positive acceleration mean velocity is becoming more positive, i.e., speeding up to the right."}, {"text": "It is slowing down and about to reverse direction.", "isCorrect": false, "rationale": "This implies a negative acceleration to reduce positive velocity to zero, then become negative. A positive acceleration would not lead to slowing down or reversal while moving right."}, {"text": "It is moving at a constant velocity to the right.", "isCorrect": false, "rationale": "Constant velocity implies zero acceleration, not positive acceleration."}]}, {"question": "A car is traveling eastward (defined as the positive direction) at a high speed. The driver then applies the brakes, causing the car to have a negative acceleration. What is the car's motion?", "options": [{"text": "It is speeding up while moving eastward.", "isCorrect": false, "rationale": "Speeding up occurs when velocity and acceleration have the same sign. Here, they have opposite signs (positive velocity, negative acceleration)."}, {"text": "It is maintaining a constant speed eastward.", "isCorrect": false, "rationale": "A non-zero acceleration means the velocity is changing, not remaining constant."}, {"text": "It is slowing down while continuing to move eastward.", "isCorrect": true, "rationale": "When velocity is positive and acceleration is negative (opposite signs), the object slows down. The car is still moving eastward but its speed is decreasing."}, {"text": "It has changed direction and is now moving westward.", "isCorrect": false, "rationale": "The car is slowing down, but has not necessarily reversed direction. Reversal would mean its velocity passed through zero and became negative."}]}, {"question": "A soccer ball is kicked towards the left, which is defined as the negative direction. If the ball experiences a constant negative acceleration, what will happen to its speed?", "options": [{"text": "The ball will slow down.", "isCorrect": false, "rationale": "Slowing down occurs when velocity and acceleration have opposite signs. In this case, both are negative, meaning the ball is speeding up."}, {"text": "The ball will speed up.", "isCorrect": true, "rationale": "The text states, 'when acceleration and velocity have the same sign, the object speeds up.' Here, the velocity is negative (moving left) and the acceleration is negative, so the ball will speed up in the negative direction."}, {"text": "The ball's speed will remain constant.", "isCorrect": false, "rationale": "A non-zero acceleration means the velocity and thus the speed is changing."}, {"text": "The ball will reverse direction and move to the right.", "isCorrect": false, "rationale": "A negative acceleration while moving in the negative direction will cause the ball to speed up, not reverse direction."}]}, {"question": "In physics, how is the term 'deceleration' primarily understood?", "options": [{"text": "It is a distinct physical quantity from acceleration, describing only slowing down.", "isCorrect": false, "rationale": "The text clarifies that 'In physics, deceleration is simply acceleration with a sign opposite to the velocity.' It is not a distinct quantity."}, {"text": "It refers to acceleration that causes an object to speed up in the negative direction.", "isCorrect": false, "rationale": "While this is a form of negative acceleration, 'deceleration' specifically implies slowing down by opposing the direction of motion."}, {"text": "It is simply acceleration with a sign opposite to the velocity, meaning the object is slowing down.", "isCorrect": true, "rationale": "The text explicitly states, 'In physics, deceleration is simply acceleration with a sign opposite to the velocity.'"}, {"text": "It means an object's acceleration is decreasing over time.", "isCorrect": false, "rationale": "Deceleration describes the effect of acceleration on speed (slowing down), not the rate of change of acceleration itself."}]}, {"question": "On a velocity-time graph, what does a horizontal line indicate about the object's acceleration?", "options": [{"text": "The object is at rest.", "isCorrect": false, "rationale": "A horizontal line means constant velocity, which could be a non-zero constant velocity (e.g., moving at a steady speed), not necessarily at rest."}, {"text": "The object is experiencing uniform acceleration.", "isCorrect": false, "rationale": "Uniform acceleration (non-zero) would be represented by a straight line with a non-zero slope."}, {"text": "The object has zero acceleration.", "isCorrect": true, "rationale": "The text states, 'A zero slope (horizontal line) indicates zero acceleration — the velocity is constant.' If velocity is constant, there is no change, hence no acceleration."}, {"text": "The object is rapidly changing direction.", "isCorrect": false, "rationale": "A rapid change in direction would involve a significant change in velocity, likely crossing the time axis, and thus a steep slope, not a horizontal line."}]}, {"question": "Consider two velocity-time graphs. Graph X shows a line with a constant slope of +2 m/s², and Graph Y shows a line with a constant slope of +5 m/s². What can be concluded about the acceleration?", "options": [{"text": "The object represented by Graph X is speeding up faster than the object in Graph Y.", "isCorrect": false, "rationale": "A steeper slope indicates a greater magnitude of acceleration. Graph Y has a larger slope, meaning greater acceleration."}, {"text": "The object represented by Graph Y is experiencing a greater change in velocity per unit time.", "isCorrect": true, "rationale": "The text states, 'A steeper slope indicates a greater magnitude of acceleration — the velocity is changing more rapidly.' A slope of +5 m/s² (Graph Y) means the velocity changes by 5 m/s each second, which is a greater change than 2 m/s each second (Graph X)."}, {"text": "Both objects have zero acceleration, as they are both straight lines.", "isCorrect": false, "rationale": "Straight lines on a v-t graph indicate uniform (constant) acceleration, but only a horizontal line (zero slope) indicates zero acceleration."}, {"text": "Graph X indicates negative acceleration, while Graph Y indicates positive acceleration.", "isCorrect": false, "rationale": "Both graphs have positive slopes (+2 and +5 m/s²), indicating positive acceleration."}]}, {"question": "A ball is thrown vertically upward. At the highest point of its trajectory, its instantaneous velocity is zero. What is its acceleration at this exact moment (ignoring air resistance)?", "options": [{"text": "Zero, because its velocity is momentarily zero.", "isCorrect": false, "rationale": "The acceleration due to gravity is constant and acts throughout the flight, even at the peak where velocity is momentarily zero. If acceleration were zero, the ball would stop and hang in the air."}, {"text": "Positive (or upward), as it is about to start moving downward.", "isCorrect": false, "rationale": "Gravity always pulls downward. If upward is positive, then acceleration due to gravity is negative."}, {"text": "Negative (or downward), due to the constant force of gravity.", "isCorrect": true, "rationale": "Even at the peak of its flight, the ball is under the influence of gravity, which causes a constant downward acceleration. Its velocity is changing from positive to negative, and this change is driven by the constant acceleration of gravity."}, {"text": "Increasing, as it prepares to fall back to Earth.", "isCorrect": false, "rationale": "The acceleration due to gravity is constant, not increasing or decreasing, throughout the flight (ignoring air resistance)."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
