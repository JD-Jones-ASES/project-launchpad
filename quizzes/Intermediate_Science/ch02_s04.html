<body>

        <div class="subtitle">Intermediate Science &mdash; Chapter 2, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary mechanism responsible for generating Earth's magnetic field?", "options": [{"text": "The residual magnetism from a giant bar magnet buried in the planet's core.", "isCorrect": false, "rationale": "The text explicitly states this is a common misconception and not the true source of Earth's magnetic field."}, {"text": "The churning motion of liquid iron and nickel in the outer core, acting as a natural dynamo.", "isCorrect": true, "rationale": "The section clearly explains that the Earth's magnetic field is produced by the convective motion of electrically conducting liquid iron in the outer core, described as a natural dynamo."}, {"text": "Static electric charges accumulated in the Earth's solid inner core.", "isCorrect": false, "rationale": "The magnetic field is generated by moving, electrically conducting fluid in the outer core, not static charges in the solid inner core."}, {"text": "The gravitational pull of the Moon on Earth's molten interior.", "isCorrect": false, "rationale": "While the Moon's gravity affects tides, the text attributes the magnetic field generation to internal heat-driven convection and Earth's rotation, not lunar gravitational influence on the core."}]}, {"question": "The text states that 'Without this magnetic shield, life on Earth's surface might never have flourished.' What is the most significant reason provided for this assertion?", "options": [{"text": "The magnetic field helps regulate Earth's atmospheric temperature, preventing extreme heat or cold.", "isCorrect": false, "rationale": "The text does not primarily attribute temperature regulation to the magnetic field. Its protective role is against particles."}, {"text": "It deflects a relentless stream of charged particles from the Sun, protecting the atmosphere and surface from harmful radiation.", "isCorrect": true, "rationale": "The text explicitly states that the magnetic field deflects the solar wind, a stream of charged particles, which prevents the atmosphere from being stripped away and the surface from being bombarded with damaging radiation, thus allowing life to flourish."}, {"text": "The magnetic field stabilizes the planet's rotation, which is essential for consistent day-night cycles.", "isCorrect": false, "rationale": "The magnetic field does not primarily stabilize Earth's rotation; the Earth's mass and angular momentum govern its rotation."}, {"text": "It prevents meteors and asteroids from impacting the Earth's surface by altering their trajectories.", "isCorrect": false, "rationale": "The magnetic field primarily interacts with charged particles, not larger, mostly uncharged celestial bodies like meteors and asteroids."}]}, {"question": "According to the dynamo theory, which of the following is NOT one of the three key ingredients required to generate Earth's magnetic field?", "options": [{"text": "An electrically conducting fluid, such as liquid iron and nickel in the outer core.", "isCorrect": false, "rationale": "This is one of the three essential ingredients listed in the dynamo theory: an electrically conducting fluid."}, {"text": "Convection currents driven by heat from the inner core and radioactive decay.", "isCorrect": false, "rationale": "This is one of the three essential ingredients listed in the dynamo theory: convection."}, {"text": "The continuous emission of infrared radiation from Earth's core into space.", "isCorrect": true, "rationale": "The three key ingredients are an electrically conducting fluid, convection, and rotation. Continuous emission of infrared radiation is not listed as an ingredient for the dynamo effect."}, {"text": "Earth's rotation, which twists convection currents via the Coriolis effect.", "isCorrect": false, "rationale": "This is one of the three essential ingredients listed in the dynamo theory: rotation."}]}, {"question": "How do scientists use paleomagnetism to reconstruct Earth's past magnetic field, including instances of polarity reversal?", "options": [{"text": "By directly observing the migration patterns of Earth's current magnetic poles over decades.", "isCorrect": false, "rationale": "Observing current pole migration shows present-day changes, but paleomagnetism looks at the past through rock records."}, {"text": "By analyzing the alignment of magnetic minerals frozen within ancient igneous and sedimentary rocks.", "isCorrect": true, "rationale": "The text explains that magnetic minerals in cooling magma or forming sedimentary rocks align with Earth's field, locking in a permanent record of its direction and strength at that time."}, {"text": "By measuring the electrical conductivity of various rock types found deep within the Earth's mantle.", "isCorrect": false, "rationale": "While conductivity is relevant to the dynamo, measuring rock conductivity does not directly record past magnetic field direction or polarity."}, {"text": "By studying the gravitational anomalies caused by large underground magnetic deposits.", "isCorrect": false, "rationale": "Gravitational anomalies relate to mass distribution, not directly to the past direction and polarity of the magnetic field preserved in rocks."}]}, {"question": "Which statement accurately describes the relationship between Earth's magnetic poles and its geographic poles?", "options": [{"text": "They always coincide perfectly, meaning a compass points directly to true geographic north.", "isCorrect": false, "rationale": "The text explicitly states that Earth's magnetic poles do not coincide exactly with its geographic poles, and magnetic declination refers to the angle between them."}, {"text": "Magnetic poles are fixed points, while geographic poles wander across the Earth's surface.", "isCorrect": false, "rationale": "This is incorrect; the text states that magnetic poles wander, while geographic poles are defined by the Earth's rotation axis."}, {"text": "Magnetic poles are defined by where field lines are vertical and wander, differing from the fixed geographic poles defined by the rotation axis.", "isCorrect": true, "rationale": "The text defines magnetic poles as locations where field lines are vertical, notes their wandering, and contrasts them with geographic poles (where the rotation axis meets the surface) which are fixed points for practical purposes of navigation."}, {"text": "Geographic poles are responsible for generating the magnetic field, while magnetic poles are simply a result of this field.", "isCorrect": false, "rationale": "The geographic poles are points on the rotation axis; the magnetic field is generated in the outer core, not directly by the geographic poles."}]}, {"question": "The text mentions that Earth's magnetic north pole has been migrating toward Siberia at an accelerating rate. What is a direct practical consequence of this wandering for human activities?", "options": [{"text": "It significantly alters the timing of seasonal changes and weather patterns globally.", "isCorrect": false, "rationale": "Magnetic pole wandering does not directly cause significant changes in seasons or global weather patterns."}, {"text": "It causes a gradual decrease in the overall strength of Earth's gravitational field.", "isCorrect": false, "rationale": "Magnetic field changes do not impact Earth's gravitational field, which is determined by mass."}, {"text": "Navigational charts and GPS systems that rely on magnetic north must be regularly updated.", "isCorrect": true, "rationale": "The text explicitly states that 'magnetic declination also changes, which is why navigational charts must be regularly updated' due to the wandering of the magnetic poles."}, {"text": "The Earth's axis of rotation shifts, leading to changes in the length of a day.", "isCorrect": false, "rationale": "The wandering of magnetic poles reflects changes in the outer core, not a direct shift in the Earth's axis of rotation that would significantly alter day length."}]}, {"question": "What is the primary role of Earth's magnetosphere in protecting the planet?", "options": [{"text": "It creates a protective layer that reflects excessive sunlight, regulating surface temperature.", "isCorrect": false, "rationale": "The magnetosphere primarily deflects charged particles, not sunlight, and is not a primary regulator of surface temperature in this manner."}, {"text": "It absorbs harmful ultraviolet (UV) radiation from the Sun, similar to the ozone layer.", "isCorrect": false, "rationale": "The ozone layer absorbs UV radiation; the magnetosphere deflects charged particles."}, {"text": "It deflects the solar wind, a stream of charged particles, preventing them from stripping the atmosphere and bombarding the surface.", "isCorrect": true, "rationale": "The text clearly defines the magnetosphere's role as deflecting most of the solar wind to protect the atmosphere and surface from high-energy charged particles and damaging radiation."}, {"text": "It maintains a stable atmospheric pressure, crucial for supporting liquid water on the surface.", "isCorrect": false, "rationale": "While protecting the atmosphere is related to maintaining pressure, its direct action is deflecting particles, not directly stabilizing atmospheric pressure through a distinct mechanism."}]}, {"question": "How did paleomagnetic evidence, particularly the study of magnetic reversals, contribute to the confirmation of the theory of seafloor spreading?", "options": [{"text": "It showed that Earth's magnetic field has remained constant over geologic time, indicating a stable crust.", "isCorrect": false, "rationale": "This is incorrect; paleomagnetic data showed repeated reversals, indicating a dynamic, not stable, crust."}, {"text": "Scientists discovered symmetrical stripes of alternating normal and reversed magnetism on either side of mid-ocean ridges.", "isCorrect": true, "rationale": "The text states that 'symmetrical stripes of alternating normal and reversed magnetism on either side of mid-ocean ridges' provided powerful evidence that new ocean crust is created at ridges and spreads outward."}, {"text": "It proved that the magnetic north pole has always been located near the geographic North Pole.", "isCorrect": false, "rationale": "Paleomagnetic evidence revealed reversals where the magnetic north pole would have been near the geographic South Pole."}, {"text": "It demonstrated that the Earth's magnetic field is much older than the oceans themselves.", "isCorrect": false, "rationale": "While the field is ancient, the key evidence for seafloor spreading was the pattern of reversals relative to mid-ocean ridges, not just the field's age."}]}, {"question": "Based on the 'Thinkdeeper' section about Mars, what can be inferred as a long-term consequence for a planet that loses its global magnetic field, assuming it once had one?", "options": [{"text": "Its core would rapidly expand, leading to increased volcanic activity globally.", "isCorrect": false, "rationale": "The text suggests Mars's core cooled, implying contraction and reduced, not increased, volcanic activity associated with convection."}, {"text": "Its atmosphere would likely be stripped away by the solar wind, resulting in a cold, dry, and potentially lifeless surface.", "isCorrect": true, "rationale": "The text explains that Mars's atmosphere was likely stripped away by the solar wind after losing its magnetic field, leading to its current cold, dry, and apparently lifeless state."}, {"text": "The planet's gravitational pull would significantly weaken, causing it to lose orbiting moons.", "isCorrect": false, "rationale": "The loss of a magnetic field does not affect a planet's gravitational pull, which is determined by its mass."}, {"text": "It would develop stronger, localized magnetic fields in certain regions of its crust.", "isCorrect": false, "rationale": "Mars has weak, patchy magnetic fields, but this is a residual effect, not a long-term *consequence* of losing a *global* field that makes it fundamentally different from its original state."}]}, {"question": "The aurora borealis and australis are visible evidence of the interaction between the solar wind and Earth's magnetic field. How are these light displays produced?", "options": [{"text": "They are reflections of sunlight off vast sheets of ice in the polar stratospheres.", "isCorrect": false, "rationale": "Auroras are not reflections of sunlight off ice; they are emissions from atmospheric gases."}, {"text": "Electrical discharges from powerful thunderstorms occurring at extremely high altitudes.", "isCorrect": false, "rationale": "Auroras are not caused by thunderstorms; they result from solar wind particles."}, {"text": "Charged particles from the solar wind funneling along magnetic field lines and colliding with atmospheric gas molecules, causing them to emit light.", "isCorrect": true, "rationale": "The text states that some solar wind particles enter the magnetosphere, are funneled toward the poles, and collide with gas molecules in the upper atmosphere, exciting them to emit light."}, {"text": "Geomagnetic storms generating intense lightning strikes in the mesosphere.", "isCorrect": false, "rationale": "Geomagnetic storms can intensify auroras and push them to lower latitudes, but they are not the direct cause of the lightning-like phenomenon itself; the mechanism is particle collision."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
