<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 29, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the primary mechanism by which an electric motor produces rotational motion?", "options": [{"text": "A changing magnetic field induces a current in the coil, causing it to move.", "isCorrect": false, "rationale": "This describes the principle of a generator (electromagnetic induction), not an electric motor which converts electrical energy to mechanical motion."}, {"text": "Current flowing through a coil in a magnetic field experiences a force, creating torque.", "isCorrect": true, "rationale": "This correctly describes the motor effect: current in a magnetic field experiences a force (magnetic force on a current-carrying wire), which creates torque and causes the coil to spin."}, {"text": "The coil's inherent magnetism attracts it to the poles of a stationary magnet.", "isCorrect": false, "rationale": "The coil's 'inherent magnetism' is not the primary mechanism; it needs current flowing through it to create a magnetic field that interacts with the external magnet, leading to rotation."}, {"text": "Static charges build up on the coil, repelling it from the magnetic field.", "isCorrect": false, "rationale": "Electric motors operate on the principles of electromagnetism (current and magnetic fields), not static electricity."}]}, {"question": "An electric motor converts ________ energy into ________ energy, while a generator performs the reverse conversion.", "options": [{"text": "mechanical; electrical", "isCorrect": false, "rationale": "This describes the energy conversion of a generator (mechanical to electrical), not a motor."}, {"text": "electrical; mechanical", "isCorrect": true, "rationale": "According to the text, an electric motor converts electrical energy into mechanical energy (rotational motion)."}, {"text": "chemical; thermal", "isCorrect": false, "rationale": "This describes energy conversion in processes like combustion or a battery discharging heat, not the primary function of a motor or generator."}, {"text": "potential; kinetic", "isCorrect": false, "rationale": "While motors and generators involve motion, this general conversion between potential and kinetic energy is not specific enough to describe their primary energy transformations."}]}, {"question": "The primary reason alternating current (AC) was chosen over direct current (DC) for large-scale power distribution, as highlighted in the 'War of Currents,' is AC's compatibility with which essential device?", "options": [{"text": "Rectifiers", "isCorrect": false, "rationale": "Rectifiers convert AC to DC, but their existence is not why AC was preferred for grid distribution. AC's advantage lies in its ability to be easily transformed."}, {"text": "Capacitors", "isCorrect": false, "rationale": "While capacitors are components in AC circuits, they are not the 'essential device' that led to AC winning the 'War of Currents' for power distribution."}, {"text": "Transformers", "isCorrect": true, "rationale": "The text states, 'Why do power companies use AC instead of DC? The answer is transformers. Transformers only work with AC because they rely on a changing magnetic field.' Transformers are crucial for stepping voltage up for efficient transmission and down for safe household use."}, {"text": "Commutators", "isCorrect": false, "rationale": "Commutators are components in DC motors and generators, reversing current direction. They are not the reason AC was chosen for large-scale power distribution."}]}, {"question": "What fundamental condition is necessary for the creation of an electromagnetic wave?", "options": [{"text": "A stationary electric charge producing a constant electric field.", "isCorrect": false, "rationale": "A stationary charge creates a static electric field, but not a changing field, which is necessary for EM wave generation."}, {"text": "A steady magnetic field creating a constant magnetic force.", "isCorrect": false, "rationale": "A steady magnetic field does not produce changing electric fields necessary for propagating EM waves."}, {"text": "An electric charge undergoing acceleration.", "isCorrect": true, "rationale": "The text explicitly states: 'When an electric charge accelerates — vibrates, oscillates, or changes direction — it creates a changing electric field. That changing electric field creates a changing magnetic field... The result is a self-sustaining wave...'"}, {"text": "Two magnets moving relative to each other at a constant speed.", "isCorrect": false, "rationale": "While this scenario involves changing magnetic fields (and could induce currents), it doesn't describe the fundamental origin of a self-sustaining electromagnetic wave from an accelerating charge."}]}, {"question": "What was James Clerk Maxwell's most significant contribution to the understanding of physics, as described in the text?", "options": [{"text": "Proving that gravity and electromagnetism are two aspects of the same force.", "isCorrect": false, "rationale": "Maxwell's work focused on unifying electricity, magnetism, and light, not gravity."}, {"text": "Developing the first practical electric motor based on Faraday's principles.", "isCorrect": false, "rationale": "While his work was foundational to electromagnetism, Maxwell was a theoretician, and the development of practical motors involved many engineers and inventors over time."}, {"text": "Unifying electricity, magnetism, and light into a single theoretical framework.", "isCorrect": true, "rationale": "The text highlights this as his 'greatest intellectual triumph,' combining existing discoveries and his own insights into a set of equations that described all electromagnetic phenomena and predicted light as an EM wave."}, {"text": "Discovering the process of electromagnetic induction.", "isCorrect": false, "rationale": "Electromagnetic induction was discovered by Michael Faraday."}]}, {"question": "In an electric vehicle, when regenerative braking is activated, what is the primary energy conversion that occurs, and what is its benefit?", "options": [{"text": "Chemical energy is converted to thermal energy, cooling the brakes.", "isCorrect": false, "rationale": "This describes traditional friction braking, where kinetic energy is converted to heat, not regenerative braking."}, {"text": "Kinetic energy is converted to electrical energy and stored in the battery, improving efficiency.", "isCorrect": true, "rationale": "The text explains that during regenerative braking, 'the motor runs in reverse as a generator, converting the car's kinetic energy back into electrical energy and recharging the battery,' thereby recovering energy and improving efficiency."}, {"text": "Electrical energy is converted to mechanical energy, assisting the engine.", "isCorrect": false, "rationale": "This describes the motor's function during acceleration, not braking."}, {"text": "Mechanical energy is converted to chemical energy, creating fuel.", "isCorrect": false, "rationale": "This is an incorrect description of energy conversion in a vehicle; batteries store electrical energy, not create fuel."}]}, {"question": "What is the crucial role of a commutator in a simple electric motor?", "options": [{"text": "To generate the magnetic field required for rotation.", "isCorrect": false, "rationale": "The magnetic field is generated by the permanent magnets or electromagnets surrounding the coil, not the commutator."}, {"text": "To provide a path for the current to flow into the coil from the power supply.", "isCorrect": false, "rationale": "While it is part of the electrical connection, its 'crucial role' for continuous rotation is specific to current reversal, not just conduction."}, {"text": "To reverse the direction of current in the coil every half-turn, ensuring continuous rotation in one direction.", "isCorrect": true, "rationale": "The text states, 'A device called a commutator reverses the current direction every half-turn, ensuring that the torque always pushes the coil in the same rotational direction. Without the commutator, the coil would rotate halfway and stop.'"}, {"text": "To step up the voltage supplied to the motor for greater power.", "isCorrect": false, "rationale": "Voltage transformation is the function of a transformer, not a commutator."}]}, {"question": "Maxwell's unification of electricity, magnetism, and light led to the profound conclusion that different forms of electromagnetic radiation, such as radio waves, visible light, and X-rays, are fundamentally:", "options": [{"text": "Distinct phenomena with unrelated physical origins.", "isCorrect": false, "rationale": "This contradicts Maxwell's core achievement of unification, which showed their common origin."}, {"text": "Different types of waves requiring different mediums to propagate.", "isCorrect": false, "rationale": "The text explicitly states electromagnetic waves 'do not need a medium — it can travel through the vacuum of space.'"}, {"text": "The same phenomenon, differing only in their wavelength and frequency.", "isCorrect": true, "rationale": "The text concludes that after Maxwell, these were 'all the same phenomenon — electromagnetic waves differing only in wavelength and frequency.'"}, {"text": "Particles that travel at varying speeds depending on their energy.", "isCorrect": false, "rationale": "Electromagnetic radiation is described as waves, and in a vacuum, all electromagnetic waves travel at the speed of light, regardless of their energy."}]}, {"question": "Many modern electronic devices like smartphones and laptops operate internally on direct current (DC). If they plug into a wall outlet, which supplies alternating current (AC), what component is essential in their power adapter or charger to enable their function?", "options": [{"text": "A generator to convert mechanical energy to electrical energy.", "isCorrect": false, "rationale": "A charger does not involve mechanical energy conversion; its purpose is to condition electrical power."}, {"text": "A commutator to reverse current direction for continuous operation.", "isCorrect": false, "rationale": "Commutators are for motors/generators, not for converting AC to DC in power adapters."}, {"text": "A rectifier to convert AC to DC.", "isCorrect": true, "rationale": "The text states, 'The charger or power adapter that plugs into the wall contains a transformer (to step down the voltage) and a rectifier (to convert AC to DC).' The rectifier is essential for converting the AC from the wall to the DC needed by the device."}, {"text": "A high-voltage capacitor to store excess charge.", "isCorrect": false, "rationale": "While capacitors are present in power supplies, their primary role in this context is not the AC-DC conversion itself, but rather smoothing the DC output or other circuit functions."}]}, {"question": "Regenerative braking in an electric vehicle is more energy efficient than traditional friction brakes, but it can never recover 100% of the kinetic energy. According to the 'Think Deeper Guidance,' which of the following is *not* a reason for this less-than-perfect efficiency?", "options": [{"text": "Energy losses due to heat in the generator's coil wires.", "isCorrect": false, "rationale": "The 'Think Deeper Guidance' mentions that 'some energy is lost as heat in the coil wires (I^2R losses),' making this a valid reason for inefficiency."}, {"text": "Inefficiency in the battery charging process itself.", "isCorrect": false, "rationale": "The 'Think Deeper Guidance' states, 'The battery charging process is not 100% efficient — some energy is lost as heat in the battery's internal resistance,' making this a valid reason for inefficiency."}, {"text": "The motor's inability to function as a generator at very low speeds.", "isCorrect": false, "rationale": "The 'Think Deeper Guidance' notes, 'At very low speeds, regenerative braking becomes ineffective and friction brakes must be used,' meaning some energy cannot be recovered regeneratively, contributing to less than 100% recovery."}, {"text": "The conversion of kinetic energy into potential energy during braking.", "isCorrect": true, "rationale": "During regenerative braking, kinetic energy is converted into *electrical* energy, not potential energy. This statement describes an incorrect energy conversion and is not a reason for the inefficiency of regenerative braking mentioned in the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
