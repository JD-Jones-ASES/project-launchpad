<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 0, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is NOT an essential feature of a well-constructed data table?", "options": [{"text": "A descriptive title that tells the reader what data the table contains.", "isCorrect": false, "rationale": "A descriptive title is explicitly stated as an essential feature for clarity."}, {"text": "The independent variable listed in the rightmost column.", "isCorrect": true, "rationale": "The text states, 'The independent variable listed in the leftmost column, with the dependent variable(s) in the columns to the right.' Listing it in the rightmost column is incorrect."}, {"text": "Consistent precision across all measurements of the same quantity.", "isCorrect": false, "rationale": "Consistent precision is an essential feature to avoid misrepresenting the accuracy of measurements."}, {"text": "Clearly labeled columns with the variable name and its unit of measurement.", "isCorrect": false, "rationale": "Clearly labeled columns with units are crucial for understanding the data and are listed as an essential feature."}]}, {"question": "A scientist wants to visualize how the average speed of a chemical reaction changes as temperature (in degrees Celsius) increases continuously. Which type of graph is most appropriate for this purpose?", "options": [{"text": "Bar graph", "isCorrect": false, "rationale": "Bar graphs are used when the independent variable is categorical, not continuous, making it unsuitable for showing change as temperature increases continuously."}, {"text": "Scatter plot", "isCorrect": false, "rationale": "While a scatter plot could show individual data points, a line graph is more appropriate when both variables are continuous and the goal is to show how one changes as the other increases or decreases, often including a best-fit line to highlight the trend."}, {"text": "Line graph", "isCorrect": true, "rationale": "Line graphs are used when both independent (temperature) and dependent (speed) variables are continuous and you want to show how one changes as the other increases or decreases, which perfectly matches the scenario."}, {"text": "Pie chart", "isCorrect": false, "rationale": "Pie charts are used to show parts of a whole, not relationships between two variables, making them inappropriate for this data."}]}, {"question": "According to the text, all of the following are essential elements of any properly constructed graph, EXCEPT:", "options": [{"text": "Clearly plotted data points.", "isCorrect": false, "rationale": "Clearly plotted data points are an essential element for any graph to convey information accurately."}, {"text": "Labeled axes with variable names and units.", "isCorrect": false, "rationale": "Labeled axes with units are crucial for understanding what the graph represents and are listed as an essential element."}, {"text": "A best-fit line or curve.", "isCorrect": true, "rationale": "The text states that a best-fit line or curve should be included 'if appropriate,' implying it's not universally essential for *every* graph (e.g., a simple bar graph or a scatter plot without a clear correlation might not require one)."}, {"text": "A descriptive title.", "isCorrect": false, "rationale": "A descriptive title is an essential element, providing context for the graph's content."}]}, {"question": "A line on a graph passes through the points (10 seconds, 50 meters) and (20 seconds, 100 meters). What is the slope of this line, and what does it represent in scientific terms?", "options": [{"text": "5 meters; the total change in distance.", "isCorrect": false, "rationale": "5 meters is only the change in the dependent variable for one unit of independent variable in the next option, and 'total change' is not the definition of slope. Slope is a rate of change."}, {"text": "0.2 s/m; the time increases by 0.2 seconds for every meter.", "isCorrect": false, "rationale": "This calculation is incorrect (it's the inverse slope), and the units are also inverted from the standard representation of speed."}, {"text": "5 m/s; the distance increases by 5 meters for every second.", "isCorrect": true, "rationale": "Using the slope formula: (100-50)/(20-10) = 50/10 = 5. The units are meters/second (m/s). A positive slope means the dependent variable (distance) increases as the independent variable (time) increases, which represents speed."}, {"text": "500 m·s; the product of distance and time.", "isCorrect": false, "rationale": "This value represents the product of total distance and total time, which is not the slope, and the units (m·s) are not typical for a slope in this context."}]}, {"question": "A student measures the time (in seconds) for a ball to roll down a ramp five times: 2.1, 2.3, 2.0, 2.2, 5.8. Which measure of central tendency would be more appropriate for describing the 'typical' time, and why?", "options": [{"text": "Mean, because it utilizes all data points for the calculation.", "isCorrect": false, "rationale": "While the mean uses all data points, it is highly sensitive to extreme values (outliers), making it less representative of the 'typical' value when an outlier is present."}, {"text": "Median, because the data set contains an extreme outlier.", "isCorrect": true, "rationale": "The value 5.8 seconds is an extreme outlier compared to the other measurements. The text states, 'if one value is much larger or smaller than the rest, the mean gets pulled toward that outlier, giving a misleading picture of the “typical” value. In such cases, the median is a better choice'."}, {"text": "Mean, because the range is small.", "isCorrect": false, "rationale": "The range is not small (5.8 - 2.0 = 3.8), and a large range often indicates the presence of outliers, which makes the mean less reliable."}, {"text": "Median, because there is an odd number of data points.", "isCorrect": false, "rationale": "Although having an odd number of data points simplifies finding the median, it is not the primary reason to choose the median over the mean in this scenario. The presence of the outlier is the key factor."}]}, {"question": "A student records the following temperatures in degrees Celsius: 24.5, 24.1, 24.8, 24.2, 24.4. Calculate the mean and range of this data set.", "options": [{"text": "Mean = 24.4 °C, Range = 0.7 °C", "isCorrect": true, "rationale": "Mean: (24.5 + 24.1 + 24.8 + 24.2 + 24.4) / 5 = 122.0 / 5 = 24.4 °C. Range: Maximum value (24.8 °C) - Minimum value (24.1 °C) = 0.7 °C."}, {"text": "Mean = 24.2 °C, Range = 0.6 °C", "isCorrect": false, "rationale": "This calculation for mean and range is incorrect."}, {"text": "Mean = 24.4 °C, Range = 24.8 °C", "isCorrect": false, "rationale": "The mean is correct, but the range is the difference between the maximum and minimum, not just the maximum value."}, {"text": "Mean = 122.0 °C, Range = 0.7 °C", "isCorrect": false, "rationale": "The mean is an average, not the sum of values. The range calculation is correct."}]}, {"question": "When analyzing data on a graph, the primary purpose of drawing a best-fit line (or curve) rather than simply connecting individual data points with straight segments is to:", "options": [{"text": "Ensure the line passes through every single data point, proving the precision of the experiment.", "isCorrect": false, "rationale": "The text explicitly states, 'A best-fit line does not necessarily pass through every point'; its purpose is to show the overall trend, not necessarily individual point precision or to connect every point."}, {"text": "Smooth out random variations and reveal the underlying general pattern or trend of the data.", "isCorrect": true, "rationale": "A best-fit line helps 'see the trend more clearly than connecting individual data points with straight segments' and 'follows the general direction of the data, with roughly equal numbers of points above and below the line,' which implies smoothing out random variations."}, {"text": "Identify and eliminate any data points that do not fall directly on the line.", "isCorrect": false, "rationale": "Drawing a best-fit line helps identify outliers, but its primary purpose is not to eliminate them. Outliers should be investigated, not simply removed."}, {"text": "Highlight the exact value of each individual measurement for detailed analysis.", "isCorrect": false, "rationale": "While individual points are important, the best-fit line emphasizes the overall trend, not necessarily the exactness of each individual point, especially if there's variability."}]}, {"question": "How many significant figures are in the measurement 0.003080 kilograms?", "options": [{"text": "3", "isCorrect": false, "rationale": "This counts only the non-zero digits and the zero between them, but misses the trailing zero after the decimal point."}, {"text": "4", "isCorrect": true, "rationale": "The leading zeros (0.00) are not significant. The '3' and '8' are significant. The '0' between '3' and '8' is significant. The trailing '0' after the decimal point (at the end) is also significant. Thus, 3, 0, 8, 0 are significant, making 4 significant figures."}, {"text": "5", "isCorrect": false, "rationale": "This incorrectly includes one of the leading zeros."}, {"text": "7", "isCorrect": false, "rationale": "This incorrectly includes all leading zeros."}]}, {"question": "A student measures the length of a rectangular block as 15.6 cm and its width as 3.2 cm. What is the area of the block, reported with the correct number of significant figures?", "options": [{"text": "49.92 cm²", "isCorrect": false, "rationale": "This is the raw calculated product but has too many significant figures based on the precision of the measurements."}, {"text": "50 cm²", "isCorrect": true, "rationale": "The calculation is 15.6 cm × 3.2 cm = 49.92 cm². For multiplication, the answer should have the same number of significant figures as the least precise measurement. 15.6 cm has 3 significant figures. 3.2 cm has 2 significant figures. Therefore, the answer should be rounded to 2 significant figures. 49.92 rounded to two significant figures is 50."}, {"text": "49.9 cm²", "isCorrect": false, "rationale": "This is rounded to three significant figures, but the least precise measurement (3.2 cm) only has two significant figures."}, {"text": "49 cm²", "isCorrect": false, "rationale": "While this has two significant figures, it is an incorrect rounding of 49.92. Rounding 49.92 to two significant figures should result in 50 (the 9 causes the 49 to round up)."}]}, {"question": "A laboratory balance is known to consistently read 0.02 grams less than the actual mass of any object placed on it. This consistent deviation in measurements is an example of what type of error?", "options": [{"text": "Random error", "isCorrect": false, "rationale": "Random error causes unpredictable scattering of measurements above and below the true value. This scenario describes a consistent, predictable shift."}, {"text": "Human error", "isCorrect": false, "rationale": "In science, 'error' refers to uncertainty, not a mistake. While human mistakes can cause deviations, this consistent under-reading is a specific type of measurement error, not just a general 'human error'."}, {"text": "Percent error", "isCorrect": false, "rationale": "Percent error is a calculation that quantifies the difference between an experimental and accepted value; it is not a *type* of error itself."}, {"text": "Systematic error", "isCorrect": true, "rationale": "Systematic error 'pushes all measurements consistently in one direction.' The balance consistently reading 0.02 grams too low is a classic example of systematic error, which cannot be reduced by averaging and requires identifying and correcting the source."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
