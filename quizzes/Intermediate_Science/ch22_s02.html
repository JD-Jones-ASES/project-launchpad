    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Which of the following best explains why the Moon appears to change shape throughout the month, creating lunar phases?", "options": [{"text": "Earth's shadow periodically covers different parts of the Moon.", "isCorrect": false, "rationale": "This describes a lunar eclipse, which is a separate phenomenon from the regular lunar phases. Phases are not caused by Earth's shadow."}, {"text": "The Moon produces varying amounts of light depending on its orbital position.", "isCorrect": false, "rationale": "The Moon does not produce its own light; it reflects sunlight consistently. Its appearance changes due to which portion of its sunlit side is visible from Earth."}, {"text": "The angle of sunlight illuminating the Moon's surface changes as it orbits Earth, showing us different amounts of its sunlit side.", "isCorrect": true, "rationale": "As the Moon orbits Earth, the geometric relationship between the Sun, Moon, and Earth changes, causing different amounts of the Moon's sunlit surface to be visible from Earth. This is the correct explanation for lunar phases."}, {"text": "Atmospheric conditions on Earth distort the Moon's appearance, making it seem to change shape.", "isCorrect": false, "rationale": "While Earth's atmosphere can affect the clarity and color of the Moon, it does not cause the fundamental cyclical changes in the illuminated portion we observe as phases."}], "id": "q01"}, {"question": "During which lunar phase is the Moon typically invisible or nearly so from Earth, because its sunlit side faces entirely away from us?", "options": [{"text": "Full Moon", "isCorrect": false, "rationale": "During a Full Moon, the entire face visible from Earth is illuminated, making it brightly visible."}, {"text": "First Quarter", "isCorrect": false, "rationale": "During a First Quarter Moon, half of the Moon's face (the right half in the Northern Hemisphere) is illuminated and visible."}, {"text": "New Moon", "isCorrect": true, "rationale": "The text states that during a New Moon, the Moon is between the Sun and Earth, and its sunlit side faces away from us, making it invisible or nearly so."}, {"text": "Waning Gibbous", "isCorrect": false, "rationale": "During a Waning Gibbous Moon, more than half of the Moon's face is illuminated, though the illuminated area is decreasing."}], "id": "q02"}, {"question": "What is the key astronomical distinction between a solar eclipse and a lunar eclipse?", "options": [{"text": "A solar eclipse occurs during a Full Moon, while a lunar eclipse occurs during a New Moon.", "isCorrect": false, "rationale": "This is incorrect. A solar eclipse occurs during a New Moon, and a lunar eclipse occurs during a Full Moon."}, {"text": "A solar eclipse involves Earth's shadow falling on the Moon, while a lunar eclipse involves the Moon's shadow falling on Earth.", "isCorrect": false, "rationale": "This description reverses the events. A solar eclipse is the Moon's shadow on Earth, and a lunar eclipse is Earth's shadow on the Moon."}, {"text": "A solar eclipse happens when the Moon is between the Sun and Earth, and a lunar eclipse happens when Earth is between the Sun and Moon.", "isCorrect": true, "rationale": "This correctly differentiates the two types of eclipses based on the alignment of the three celestial bodies. The Moon blocks the Sun for a solar eclipse, and Earth blocks the Sun's light from reaching the Moon for a lunar eclipse."}, {"text": "Solar eclipses are visible from the entire night side of Earth, while lunar eclipses are only visible from specific, narrow paths.", "isCorrect": false, "rationale": "This is incorrect. Lunar eclipses are visible from the entire night side of Earth, while total solar eclipses are visible only from a narrow path due to the Moon's smaller shadow."}], "id": "q03"}, {"question": "Eclipses are relatively rare events at any given location and do not occur every month. What is the primary reason for this infrequency?", "options": [{"text": "The Moon's orbital speed fluctuates significantly, preventing consistent alignment.", "isCorrect": false, "rationale": "While orbital speed can vary slightly, it is not the primary reason for the rarity of eclipses."}, {"text": "Earth's atmosphere typically blocks the necessary light for an eclipse to be visible.", "isCorrect": false, "rationale": "Earth's atmosphere plays a role in the reddish appearance of a lunar eclipse but does not prevent the occurrence of eclipses."}, {"text": "The Moon's orbit is tilted about 5° relative to Earth's orbit around the Sun, preventing precise alignment most of the time.", "isCorrect": true, "rationale": "The text explicitly states that eclipses do not occur every month because the Moon's orbit is tilted relative to Earth's orbit, meaning precise alignment for an eclipse is infrequent."}, {"text": "The Sun's gravitational pull often subtly shifts the Moon out of the precise alignment required for an eclipse.", "isCorrect": false, "rationale": "While the Sun's gravity influences the Moon's orbit, the tilt of the Moon's orbit is the direct cause of why eclipses are not monthly occurrences."}], "id": "q04"}, {"question": "During a total lunar eclipse, the Moon often takes on a distinct reddish hue. What is the scientific reason for this phenomenon?", "options": [{"text": "The Moon's surface reflects red light emitted by Earth's volcanic activity during alignment.", "isCorrect": false, "rationale": "Earth's volcanic activity does not emit light that illuminates the Moon during an eclipse."}, {"text": "Dust and pollutants in Earth's atmosphere filter out all light except for red light, which then reaches the Moon.", "isCorrect": false, "rationale": "While dust and pollutants can contribute to the appearance, the primary mechanism is the bending of light, not merely filtering."}, {"text": "Earth's atmosphere bends (refracts) red light into the shadow zone, allowing it to illuminate the Moon even during an eclipse.", "isCorrect": true, "rationale": "The text explains that during a total lunar eclipse, Earth's atmosphere refracts red light, scattering blue light more effectively, allowing the red light to reach and illuminate the Moon."}, {"text": "The Sun emits more red light when it is in the specific alignment required to cause a lunar eclipse.", "isCorrect": false, "rationale": "The Sun's light emission does not change based on planetary alignments for eclipses."}], "id": "q05"}, {"question": "The Moon's gravitational pull creates a tidal bulge on the side of Earth facing the Moon. What is the correct explanation for the second tidal bulge that forms on the opposite side of Earth?", "options": [{"text": "The Sun's gravitational pull on the far side of Earth combines with the Moon's, creating a second bulge.", "isCorrect": false, "rationale": "While the Sun does exert tidal forces, the second bulge is primarily due to the Moon's differential gravity across Earth, not a direct combination with the Sun's pull on that specific side."}, {"text": "The Moon's gravity pulls Earth's solid body away from the water on the far side, leaving the water to bulge outwards.", "isCorrect": true, "rationale": "The text explains that the Moon's gravity pulls more strongly on Earth's center than on the far-side water, effectively pulling Earth away from that water, which then bulges outwards due to inertia."}, {"text": "Centrifugal force, caused by Earth's rotation, pushes water outwards on the far side, creating a bulge.", "isCorrect": false, "rationale": "While centrifugal force is often part of simplified explanations, the text provides a more accurate gravitational explanation where Earth is pulled away from the water on the far side."}, {"text": "The water on the far side is pulled towards the Moon, but less strongly than the near side, creating a weaker, opposite bulge.", "isCorrect": false, "rationale": "The water on the far side is pulled *less* strongly than the solid Earth itself, leading to the bulge, rather than being pulled towards the Moon to create it."}], "id": "q06"}, {"question": "Spring tides, characterized by extra-high high tides and extra-low low tides, occur under which specific alignment of celestial bodies?", "options": [{"text": "When the Sun and Moon are at right angles relative to Earth (First and Third Quarter Moon).", "isCorrect": false, "rationale": "This alignment describes the conditions for neap tides, which result in smaller tidal ranges."}, {"text": "When the Moon is at its closest point to Earth (perigee), regardless of its phase.", "isCorrect": false, "rationale": "While the Moon's distance affects tide height, spring tides are specifically defined by the alignment of the Sun, Moon, and Earth, not solely by the Moon's perigee."}, {"text": "When the Sun, Moon, and Earth are aligned in a straight line (New Moon and Full Moon).", "isCorrect": true, "rationale": "The text states that spring tides occur when the Sun, Moon, and Earth are aligned (during New Moon and Full Moon), causing their tidal forces to combine and create more extreme tides."}, {"text": "When the Earth is at its closest point to the Sun (perihelion), enhancing the Sun's tidal pull.", "isCorrect": false, "rationale": "Perihelion affects the overall solar tidal force but is not the defining condition for the regular occurrence of spring tides every two weeks."}], "id": "q07"}, {"question": "Considering the 'Think Deeper' guidance regarding gravitational force and distance, what would be the likely effect on Earth's tides if the Moon were significantly farther away than its current average distance?", "options": [{"text": "Tides would become stronger and more extreme, with higher highs and lower lows.", "isCorrect": false, "rationale": "Gravitational force, and thus tidal force, decreases with increasing distance. Therefore, greater distance would lead to weaker tides."}, {"text": "Tides would become weaker and less pronounced, with smaller differences between high and low tides.", "isCorrect": true, "rationale": "The 'Think Deeper' section (and fundamental physics) explains that tidal force decreases significantly with increased distance (roughly as the cube of the distance). If the Moon were farther away, its tidal influence would be much weaker, resulting in smaller tides."}, {"text": "The number of high and low tides per day would increase due to the Moon's reduced gravitational drag.", "isCorrect": false, "rationale": "The frequency of tides is primarily determined by Earth's rotation relative to the Moon, not by the Moon's distance."}, {"text": "Only the near-side tidal bulge would be affected, with the far-side bulge remaining largely unchanged.", "isCorrect": false, "rationale": "Both tidal bulges are a result of the differential gravitational force across Earth, which would be uniformly weakened if the Moon were farther away."}], "id": "q08"}, {"question": "What is the leading scientific hypothesis for the formation of the Moon?", "options": [{"text": "The Moon was a rogue planet that formed elsewhere in the solar system and was later captured by Earth's gravity.", "isCorrect": false, "rationale": "While a past hypothesis, the capture theory does not fully explain the Moon's composition or orbital characteristics as well as the leading hypothesis."}, {"text": "The Moon formed simultaneously with Earth from the same primordial disk of material.", "isCorrect": false, "rationale": "This 'co-formation' hypothesis is challenged by the Moon's relatively small iron core and lack of volatile elements compared to Earth."}, {"text": "A Mars-sized body collided with the young Earth, ejecting a cloud of molten rock and debris that eventually coalesced to form the Moon.", "isCorrect": true, "rationale": "This describes the giant impact hypothesis, which is the leading scientific explanation for the Moon's origin, as detailed in the text."}, {"text": "The Moon is a piece of Earth's crust that broke off due to Earth's extremely rapid rotation shortly after its formation.", "isCorrect": false, "rationale": "This 'fission' hypothesis is largely disproven, as it requires Earth to have spun much faster than is plausible and doesn't fully account for compositional differences."}], "id": "q09"}, {"question": "Which of the following provides evidence supporting the giant impact hypothesis for the Moon's formation?", "options": [{"text": "The Moon's exact alignment with Earth's orbital plane around the Sun, indicating a shared origin.", "isCorrect": false, "rationale": "The Moon's orbit is actually tilted relative to Earth's orbit, not exactly aligned, which contradicts this statement."}, {"text": "The Moon possessing a large, dense iron core that is proportionally similar to Earth's core.", "isCorrect": false, "rationale": "The text states the Moon has a *relatively small* iron core, which is key evidence, as the impacting body's and Earth's cores are thought to have merged with Earth."}, {"text": "The Moon's composition being similar to Earth's mantle and its noticeable lack of volatile elements.", "isCorrect": true, "rationale": "The text explicitly lists these as evidence: similar composition to Earth's mantle, a relatively small iron core (indicating core merging), and the lack of volatile elements (suggesting they boiled away during the high-energy impact)."}, {"text": "The presence of a strong, active magnetic field on the Moon, similar to Earth's.", "isCorrect": false, "rationale": "The text does not mention the Moon's magnetic field as evidence, and the Moon's magnetic field is much weaker and largely inactive today compared to Earth's."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
