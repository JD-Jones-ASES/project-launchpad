    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 17, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What two primary factors combine to form the large circular patterns of surface currents known as gyres?", "options": [{"text": "Differences in water temperature and salinity.", "isCorrect": false, "rationale": "Differences in water temperature and salinity primarily drive deep ocean currents (thermohaline circulation), not surface gyres."}, {"text": "Prevailing winds and global warming.", "isCorrect": false, "rationale": "Prevailing winds drive surface currents, but global warming is not a primary factor in the formation of gyres themselves. The full explanation for gyres involves deflection."}, {"text": "The Coriolis effect and continental boundaries.", "isCorrect": true, "rationale": "The text explicitly states: 'This deflection [Coriolis effect], combined with the shapes of the continents, causes surface currents to flow in large circular patterns called gyres.'"}, {"text": "Upwelling and downwelling processes.", "isCorrect": false, "rationale": "Upwelling and downwelling are vertical movements of water, not the primary forces that create the horizontal circular patterns of gyres."}]}, {"question": "If a surface current is observed moving from the equator towards the North Pole in the Atlantic Ocean, in which direction would the Coriolis effect deflect it?", "options": [{"text": "Towards the west, making it turn left.", "isCorrect": false, "rationale": "In the Northern Hemisphere, the Coriolis effect deflects moving water to the right, not the left."}, {"text": "Towards the west, making it turn right.", "isCorrect": false, "rationale": "A northward moving current deflected to the right would turn eastward, not westward."}, {"text": "Towards the east, making it turn right.", "isCorrect": true, "rationale": "The text states the Coriolis effect deflects moving water to the right in the Northern Hemisphere. A current moving northward (towards the North Pole) would be deflected to its right, which is eastward."}, {"text": "Towards the east, making it turn left.", "isCorrect": false, "rationale": "In the Northern Hemisphere, the Coriolis effect deflects moving water to the right, not the left."}]}, {"question": "What are the primary drivers of thermohaline circulation?", "options": [{"text": "Global wind patterns.", "isCorrect": false, "rationale": "Global wind patterns are the primary drivers of surface currents, not deep thermohaline circulation."}, {"text": "Earth's rotation and continental shapes.", "isCorrect": false, "rationale": "Earth's rotation (Coriolis effect) and continental shapes contribute to the formation of surface gyres, not primarily thermohaline circulation."}, {"text": "Differences in water temperature and salinity.", "isCorrect": true, "rationale": "The text defines thermohaline circulation as 'driven by differences in water density, which depends on temperature (thermo) and salinity (haline).'"}, {"text": "Tidal forces from the Moon and Sun.", "isCorrect": false, "rationale": "Tidal forces are responsible for tides, but they are not the primary drivers of the long-term, global thermohaline circulation."}]}, {"question": "The deep water current 'conveyor belt' begins with cold, salty water sinking to the ocean floor. What two processes primarily contribute to the increased density of this water in the North Atlantic?", "options": [{"text": "Evaporation and warming from sunlight.", "isCorrect": false, "rationale": "Warming water would decrease its density, and while evaporation increases salinity (and thus density), it's not the primary mechanism described alongside cooling in the North Atlantic."}, {"text": "Cooling by polar winds and increased salinity from sea ice formation.", "isCorrect": true, "rationale": "The text states, 'Cold polar winds cool the surface water, making it denser' and 'When sea ice forms, salt is excluded, increasing the salinity (and therefore the density) of the remaining water.'"}, {"text": "Upwelling of deep, dense water and volcanic activity.", "isCorrect": false, "rationale": "Upwelling is the rising of deep water, not its sinking, and volcanic activity is not mentioned as a primary contributor to density increase for thermohaline circulation."}, {"text": "High rainfall and melting glaciers.", "isCorrect": false, "rationale": "Both high rainfall and melting glaciers would introduce freshwater, which would decrease salinity and thus decrease water density, making it less likely to sink."}]}, {"question": "The Gulf Stream is an example of a western boundary current. Based on the text, which set of characteristics accurately describes such a current?", "options": [{"text": "Broad, shallow, and slow, carrying cold water.", "isCorrect": false, "rationale": "This description aligns with eastern boundary currents, and the Gulf Stream carries warm water."}, {"text": "Narrow, deep, and fast, carrying warm water.", "isCorrect": true, "rationale": "The text states, 'Currents on the western side of ocean basins (e.g., the Gulf Stream in the North Atlantic) tend to be narrow, deep, and fast,' and specifically notes the Gulf Stream 'carries warm water.'"}, {"text": "Driven primarily by thermohaline circulation, affecting deep ocean layers.", "isCorrect": false, "rationale": "The Gulf Stream is a surface current, driven primarily by wind and the Coriolis effect, not thermohaline circulation."}, {"text": "Causes significant upwelling along continental coasts.", "isCorrect": false, "rationale": "While some currents cause upwelling, the Gulf Stream is primarily known for transporting warm water horizontally and influencing climate, rather than being a primary upwelling driver."}]}, {"question": "Why are upwelling zones considered among the most biologically productive areas in the ocean?", "options": [{"text": "They bring warm, oxygen-rich water to the surface, supporting diverse species.", "isCorrect": false, "rationale": "Upwelling brings *cold*, not warm, water to the surface. While surface water is oxygen-rich, the key to productivity in upwelling zones is nutrients from the deep."}, {"text": "The strong currents in these zones increase mixing, which disperses marine life.", "isCorrect": false, "rationale": "While mixing occurs, the primary reason for high biological productivity is the influx of nutrients, not merely the dispersion of marine life."}, {"text": "They transport deep-sea organisms to the surface, where food is more abundant.", "isCorrect": false, "rationale": "Upwelling brings nutrient-rich *water* to the surface, which then fuels the growth of phytoplankton, the base of the food web. It does not primarily transport deep-sea organisms themselves."}, {"text": "They bring nutrient-rich deep water to the surface, fueling phytoplankton growth.", "isCorrect": true, "rationale": "The text states, 'The deep water that rises to the surface carries dissolved nutrients (nitrates, phosphates) that fuel the growth of phytoplankton, which form the base of marine food webs.'"}]}, {"question": "How do conditions during an El Niño event primarily differ from normal conditions in the tropical Pacific?", "options": [{"text": "Trade winds strengthen, and upwelling intensifies along South America.", "isCorrect": false, "rationale": "This describes La Niña conditions, the opposite of El Niño."}, {"text": "Warm surface water spreads eastward, and upwelling along South America decreases.", "isCorrect": true, "rationale": "The text states that during an El Niño, 'the trade winds weaken, warm water spreads eastward, upwelling decreases, and fish populations decline.'"}, {"text": "Cold water spreads westward, leading to increased fish populations globally.", "isCorrect": false, "rationale": "During El Niño, warm water spreads eastward, and fish populations along the South American coast decline due to suppressed upwelling."}, {"text": "Deep water currents reverse direction, causing global sea level rise.", "isCorrect": false, "rationale": "The text does not describe deep water current reversal or direct global sea level rise as a primary characteristic of El Niño."}]}, {"question": "The 'Climate Connection' section suggests a potential consequence of weakened North Atlantic thermohaline circulation due to global warming. What is this potential effect on Europe?", "options": [{"text": "A significant increase in overall temperatures, exacerbating heatwaves.", "isCorrect": false, "rationale": "The text suggests the opposite effect for Europe under this specific scenario."}, {"text": "A potential cooling trend, despite rising global average temperatures.", "isCorrect": true, "rationale": "The text states, 'If the North Atlantic thermohaline circulation weakens because melting ice reduces salinity, Europe could actually experience cooling even as the global average temperature rises.'"}, {"text": "More frequent and intense El Niño events across the Atlantic.", "isCorrect": false, "rationale": "El Niño is a Pacific phenomenon, and its link to North Atlantic thermohaline circulation weakening in this manner is not indicated."}, {"text": "A shift in the path of the Gulf Stream, causing desertification.", "isCorrect": false, "rationale": "While the Gulf Stream is a component of Atlantic circulation, the specific consequence mentioned is cooling, not desertification, and the underlying cause is weakening thermohaline circulation impacting heat distribution."}]}, {"question": "Marie Tharp made a groundbreaking discovery that provided crucial evidence for seafloor spreading and plate tectonics. What was this discovery?", "options": [{"text": "The identification of widespread hydrothermal vents in the deep ocean.", "isCorrect": false, "rationale": "While important, the identification of hydrothermal vents is not listed as her primary discovery providing evidence for seafloor spreading in this text."}, {"text": "The first comprehensive mapping of global ocean currents and gyres.", "isCorrect": false, "rationale": "Marie Tharp mapped the *ocean floor*, not ocean currents themselves."}, {"text": "The discovery of a rift valley along the Mid-Atlantic Ridge.", "isCorrect": true, "rationale": "The text states, 'In 1952, Tharp identified a rift valley running down the center of the Mid-Atlantic Ridge — a feature that provided crucial evidence for seafloor spreading and plate tectonics.'"}, {"text": "Confirmation that the ocean floor was a flat, featureless plain.", "isCorrect": false, "rationale": "Her work actually disproved this long-held assumption, showing the ocean floor was 'a dynamic landscape.'"}]}, {"question": "Considering both surface and deep-water currents, what is the most comprehensive role ocean currents play in the global system?", "options": [{"text": "They primarily contribute to the erosion and deposition of seafloor sediments.", "isCorrect": false, "rationale": "While currents do contribute to these geological processes, the text highlights their broader and more significant roles in climate and ecosystems."}, {"text": "They are responsible for the constant mixing of freshwater and saltwater, maintaining ocean salinity.", "isCorrect": false, "rationale": "Ocean currents distribute salinity differences, but they are not the primary mechanism for maintaining global ocean salinity through freshwater-saltwater mixing."}, {"text": "They redistribute heat, nutrients, and gases, profoundly influencing climate, weather, and marine ecosystems.", "isCorrect": true, "rationale": "The opening paragraph explicitly states, 'Massive rivers of water flow through the ocean basins, carrying heat, nutrients, and dissolved gases around the globe. These ocean currents have a powerful influence on climate, weather, and marine ecosystems.' This comprehensively covers their roles."}, {"text": "Their main function is to generate tidal patterns along coastlines worldwide.", "isCorrect": false, "rationale": "Tidal patterns are primarily generated by the gravitational pull of the Moon and Sun, not by ocean currents themselves."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
