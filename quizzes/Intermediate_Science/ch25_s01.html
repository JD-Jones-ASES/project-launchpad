        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<body>
<div class="quiz-container">

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 25, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The text describes various phenomena changing over different timescales. Which of the following events represents the *fastest* timescale of change discussed in the section?", "options": [{"text": "A chemical reaction in a test tube completing in minutes.", "isCorrect": false, "rationale": "Chemical reactions can be fast, but minutes are significantly slower than electrical signal propagation or lightning bolts, which are described as instantaneous or thousandths of a second."}, {"text": "An electric signal traveling through a wire.", "isCorrect": true, "rationale": "The text states electrical change operates at the fastest timescales, with signals traveling at close to the speed of light, effectively 'almost instantly'."}, {"text": "The sun fusing hydrogen for billions of years.", "isCorrect": false, "rationale": "This represents astronomical change, operating on the longest timescales of billions of years, making it one of the slowest changes described."}, {"text": "A mountain range rising over millions of years.", "isCorrect": false, "rationale": "The formation of a mountain range occurs over tens of millions of years, placing it on a geological timescale, which is much slower than electrical changes."}], "id": "q01"}, {"question": "A new bacterial species develops resistance to an antibiotic within months, while a new species of mammal emerges over millions of years. This significant difference in the speed of evolution is primarily attributed to which factor, according to the text?", "options": [{"text": "The complexity of the organism's genome.", "isCorrect": false, "rationale": "While genome complexity can influence evolutionary pathways, the text emphasizes generation time, population size, and selection pressure as primary determinants of the speed of change, not complexity directly in this context."}, {"text": "The strength of the selective pressure.", "isCorrect": false, "rationale": "Strong selective pressure (like antibiotics) can accelerate evolution, but for the fundamental difference between bacteria and mammals, the text highlights generation time as the most impactful factor for speed."}, {"text": "The organism's generation time.", "isCorrect": true, "rationale": "The text explicitly states that 'the speed of change depends on generation time,' highlighting bacteria's rapid reproduction (every 20 minutes) as key to their fast evolution compared to longer-lived organisms like whales."}, {"text": "The total population size.", "isCorrect": false, "rationale": "Population size is a factor, but generation time is presented as a more direct and fundamental reason for the difference in evolutionary speed between fast-reproducing bacteria and slow-reproducing mammals."}], "id": "q02"}, {"question": "What is the fundamental process that powers the Sun and other stars, enabling their long-term astronomical change and sustaining them for billions of years?", "options": [{"text": "Gravitational collapse of gas and dust.", "isCorrect": false, "rationale": "Gravitational collapse is the initial process that leads to star formation, but it is not the ongoing energy source that powers a star for billions of years once it has ignited."}, {"text": "Chemical reactions in their atmosphere.", "isCorrect": false, "rationale": "Chemical reactions do not generate sufficient energy to power stars for astronomical timescales; nuclear processes are required."}, {"text": "Nuclear fusion of hydrogen into helium.", "isCorrect": true, "rationale": "The text explicitly states that 'The sun itself has been fusing hydrogen into helium in its core for 4.6 billion years,' identifying nuclear fusion as its primary power source."}, {"text": "Electrical currents in their cores.", "isCorrect": false, "rationale": "While stars have complex electromagnetic fields, electrical currents are not the primary energy generation mechanism for their sustained luminosity and heat."}], "id": "q03"}, {"question": "When an antacid tablet fizzes in a glass of water, what is the *most direct* observable evidence, as described in the text, that a chemical change is occurring?", "options": [{"text": "The tablet dissolving.", "isCorrect": false, "rationale": "Dissolving is a physical change, where a substance disperses into a solvent but retains its chemical identity. It does not directly indicate the formation of new substances."}, {"text": "The temperature of the water changing.", "isCorrect": false, "rationale": "Temperature changes can accompany both physical and chemical processes; it's not the most direct evidence of a *new substance* being formed."}, {"text": "The production of a new gas (CO2).", "isCorrect": true, "rationale": "The text states, 'The fizzing you see is CO2 gas escaping — visible evidence of chemical change happening in real time.' The formation of a new substance (CO2 gas) is direct evidence of a chemical reaction."}, {"text": "The solution becoming cloudy.", "isCorrect": false, "rationale": "Cloudiness can indicate precipitation, which is a chemical change, but it can also be due to undissolved particles (a physical phenomenon). The specific fizzing due to gas is more explicitly linked to chemical change in the text."}], "id": "q04"}, {"question": "Electrical signals in a wire propagate near the speed of light, even though the individual electrons themselves drift very slowly. The text explains this phenomenon using which analogy?", "options": [{"text": "A marathon runner covering a long distance at a steady pace.", "isCorrect": false, "rationale": "This analogy focuses on the speed of an individual entity, which contradicts the slow drift speed of electrons. The text emphasizes the *signal* speed versus the individual particle speed."}, {"text": "A line of dominoes falling, where the wave travels fast but each domino only moves a short distance.", "isCorrect": true, "rationale": "The text explicitly states, 'each electron pushes the next, like a chain of dominoes,' perfectly illustrating how the impulse (signal) can travel rapidly even if individual components move little."}, {"text": "Water flowing rapidly through a narrow pipe.", "isCorrect": false, "rationale": "This analogy implies that the individual water molecules are moving quickly, which would be analogous to electrons moving quickly, contradicting the slow drift speed of electrons."}, {"text": "Sound waves traveling through a solid object.", "isCorrect": false, "rationale": "While sound waves involve particle displacement, the 'dominoes' analogy is the specific one used in the text to explain the distinct speeds of signal propagation versus electron drift."}], "id": "q05"}, {"question": "The text identifies 'Change requires energy' as a universal pattern across scientific disciplines. Which of the following examples *least* directly illustrates this specific principle as described?", "options": [{"text": "A star shining brightly due to nuclear fusion in its core.", "isCorrect": false, "rationale": "This directly illustrates 'Change requires energy,' as nuclear fusion provides the energy for stellar change."}, {"text": "An ecosystem evolving and thriving under the influence of solar energy.", "isCorrect": false, "rationale": "This directly illustrates 'Change requires energy,' as solar energy powers ecosystems and drives evolution."}, {"text": "A scientist using a cladogram to map evolutionary relationships between species.", "isCorrect": true, "rationale": "Using a cladogram primarily demonstrates the principle that 'Change can be modeled and predicted,' rather than the principle that 'Change requires energy' itself. It's a tool for understanding past changes, not an energy requirement for change."}, {"text": "An electrical circuit operating successfully with power supplied from a voltage source.", "isCorrect": false, "rationale": "This directly illustrates 'Change requires energy,' as a voltage source provides the necessary energy to drive current in a circuit."}], "id": "q06"}, {"question": "A research team is using an H-R diagram to determine the probable future stages of a newly discovered star's life cycle. This action exemplifies which universal pattern of change highlighted in the text?", "options": [{"text": "Change requires energy.", "isCorrect": false, "rationale": "While stellar evolution requires energy, using an H-R diagram for prediction directly relates to modeling, not the energy requirement itself."}, {"text": "Change follows natural laws.", "isCorrect": false, "rationale": "Stellar evolution does follow natural laws, but the *act* of using a diagram to foresee outcomes specifically points to the predictability aspect, not just the existence of laws."}, {"text": "Change can be modeled and predicted.", "isCorrect": true, "rationale": "The text states, 'Scientists use... H-R diagrams to predict stellar life cycles,' directly linking this tool to the principle that 'Change can be modeled and predicted.'"}, {"text": "Change depends on generation time.", "isCorrect": false, "rationale": "Generation time is relevant to biological change, not directly to the life cycle of a star or the use of an H-R diagram."}], "id": "q07"}, {"question": "Which of the following lists correctly orders phenomena from the *shortest* to the *longest* timescale of change as described in the text?", "options": [{"text": "Lightning bolt, chemical reaction, formation of a mountain range.", "isCorrect": true, "rationale": "Lightning occurs in thousandths of a second, chemical reactions in minutes, and mountain ranges rise over tens of millions of years. This accurately reflects the progression from shortest to longest timescales."}, {"text": "Evolution of antibiotic resistance, star burning hydrogen, formation of a stalactite.", "isCorrect": false, "rationale": "Antibiotic resistance (days/weeks) is shorter than stalactite formation (thousands of years), which is vastly shorter than a star burning hydrogen (billions of years). The order is incorrect."}, {"text": "Formation of the solar system, Big Bang, whale evolution.", "isCorrect": false, "rationale": "Whale evolution (millions of years) is shorter than the formation of the solar system (100 million years), which is shorter than the Big Bang (13.8 billion years). The order given is incorrect."}, {"text": "Computer processor switching, iron rusting, human lifespan.", "isCorrect": false, "rationale": "Computer processor switching (nanoseconds) is shortest, followed by iron rusting (days/weeks). While a human lifespan is a long timescale, it is not explicitly compared in the same manner as the other phenomena in the text."}], "id": "q08"}, {"question": "The text states that 'Every atom in your body was forged inside a star that exploded long before our solar system existed. You are, quite literally, made of stardust.' This concept primarily connects your existence to which branch of science and its associated timescale?", "options": [{"text": "Biological change, across millions of years of evolution.", "isCorrect": false, "rationale": "While human existence involves biological evolution, this statement specifically refers to the origin of the fundamental *atoms* that constitute the body, not the biological processes themselves."}, {"text": "Astronomical change, across billions of years of cosmic history.", "isCorrect": true, "rationale": "The forging of atoms in stars and their dispersal by supernovae occurred over billions of years of astronomical processes (cosmic change, deep time), directly linking to this branch and timescale."}, {"text": "Chemical change, across seconds and minutes of reactions.", "isCorrect": false, "rationale": "The formation of elements in stars is a nuclear process, not a chemical reaction operating on familiar laboratory timescales. Chemical change refers to how elements interact."}, {"text": "Electrical change, across nanoseconds of signal propagation.", "isCorrect": false, "rationale": "Electrical change relates to the movement of charge in circuits at very fast timescales, which is entirely distinct from the cosmic origin of atoms."}], "id": "q09"}, {"question": "The 'Think Deeper' section encourages connecting a copper wire's story across all branches of science. Which of the following aspects of a copper wire's story, as discussed in the 'Teacher Note' section, primarily falls under the domain of **biological change**?", "options": [{"text": "The concentration of copper in Earth's crust by hydrothermal processes.", "isCorrect": false, "rationale": "This process relates to geology and chemistry, describing how minerals form and concentrate in the Earth's crust over geological timescales."}, {"text": "The transport of an electric current through the wire.", "isCorrect": false, "rationale": "This aspect falls under electrical change (physics), dealing with how electricity flows through conductors."}, {"text": "The role of copper as an essential trace element in cellular enzymes.", "isCorrect": true, "rationale": "The 'Teacher Note' explicitly mentions, 'Copper is an essential trace element in some enzymes (e.g., cytochrome c oxidase in the electron transport chain of cellular respiration) — biology,' making this the biological aspect."}, {"text": "The creation of copper atoms inside ancient massive stars.", "isCorrect": false, "rationale": "This refers to the astronomical origin of elements, a process of nuclear fusion and stellar evolution, not biological change."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
