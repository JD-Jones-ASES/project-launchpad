<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 1, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A scientist discovers a new single-celled organism that lacks a membrane-bound nucleus and any other internal compartments. Based on this information, which of the following classifications is most appropriate for this organism?", "options": [{"text": "Eukaryotic cell", "isCorrect": false, "rationale": "Eukaryotic cells are defined by the presence of a membrane-bound nucleus and other membrane-bound organelles, which this organism lacks."}, {"text": "Plant cell", "isCorrect": false, "rationale": "Plant cells are a type of eukaryotic cell and would therefore possess a nucleus and other membrane-bound organelles."}, {"text": "Prokaryotic cell", "isCorrect": true, "rationale": "Prokaryotic cells are characterized by the absence of a membrane-bound nucleus and other membrane-bound organelles, fitting the description of the discovered organism."}, {"text": "Animal cell", "isCorrect": false, "rationale": "Animal cells are a type of eukaryotic cell and would possess a nucleus and other membrane-bound organelles."}], "id": "q01"}, {"question": "Which of the following cellular components is found in a typical plant cell but is absent in an animal cell?", "options": [{"text": "Mitochondria", "isCorrect": false, "rationale": "Mitochondria are present in both plant and animal cells, as both require them to convert sugar into usable energy (ATP)."}, {"text": "Nucleus", "isCorrect": false, "rationale": "Both plant and animal cells are eukaryotic and possess a membrane-bound nucleus."}, {"text": "Cell wall", "isCorrect": true, "rationale": "Plant cells are surrounded by a rigid cell wall made of cellulose, which is absent in animal cells."}, {"text": "Ribosomes", "isCorrect": false, "rationale": "Ribosomes are essential for protein synthesis and are found in both plant and animal cells."}], "id": "q02"}, {"question": "The presence of their own circular DNA and ribosomes similar to those of bacteria within certain organelles provides strong evidence for the endosymbiotic theory. Which two organelles primarily support this theory?", "options": [{"text": "Nucleus and Endoplasmic Reticulum", "isCorrect": false, "rationale": "While critical to cell function, the nucleus and ER are part of the cell's internal membrane system and do not possess their own independent bacterial-like DNA or ribosomes in the same manner."}, {"text": "Mitochondria and Chloroplasts", "isCorrect": true, "rationale": "Both mitochondria and chloroplasts have their own circular DNA and ribosomes resembling those of bacteria, which are key pieces of evidence supporting the endosymbiotic theory."}, {"text": "Golgi apparatus and Lysosomes", "isCorrect": false, "rationale": "The Golgi apparatus and lysosomes are membrane-bound organelles but do not possess their own distinct bacterial-like DNA or ribosomes."}, {"text": "Vacuoles and Ribosomes", "isCorrect": false, "rationale": "Vacuoles are storage sacs, and ribosomes are protein synthesis machines; neither possesses the specific characteristics (own DNA, bacterial-like ribosomes) that support the endosymbiotic theory for independent organelles."}], "id": "q03"}, {"question": "A highly active liver cell, specialized in detoxifying harmful substances and synthesizing various lipids, would likely have an unusually high concentration of which organelle?", "options": [{"text": "Rough Endoplasmic Reticulum", "isCorrect": false, "rationale": "The rough ER is primarily involved in synthesizing and modifying proteins destined for secretion or insertion into membranes, not directly in lipid synthesis or detoxification."}, {"text": "Lysosomes", "isCorrect": false, "rationale": "Lysosomes are important for breaking down waste and cellular debris, but they are not the primary organelles for lipid synthesis or chemical detoxification."}, {"text": "Smooth Endoplasmic Reticulum", "isCorrect": true, "rationale": "The smooth ER is specifically responsible for synthesizing lipids and detoxifying harmful chemicals, functions that are highly active in liver cells."}, {"text": "Chloroplasts", "isCorrect": false, "rationale": "Chloroplasts are found in plant cells and some protists for photosynthesis; they are not present in animal liver cells."}], "id": "q04"}, {"question": "A protein destined to be secreted outside the cell is synthesized on ribosomes attached to the endoplasmic reticulum. What is the correct sequence of organelles it would typically pass through *after* leaving the ER before exiting the cell?", "options": [{"text": "Golgi apparatus -> Vesicle -> Cell membrane", "isCorrect": true, "rationale": "After synthesis and initial modification in the ER, proteins are transported via vesicles to the Golgi apparatus for further processing, sorting, and packaging. They are then shipped in new vesicles that fuse with the cell membrane to release their contents outside."}, {"text": "Nucleus -> Mitochondrion -> Lysosome", "isCorrect": false, "rationale": "This pathway involves organelles (nucleus, mitochondrion, lysosome) with functions unrelated to the secretion of proteins outside the cell."}, {"text": "Ribosome -> Cytoplasm -> Vacuole", "isCorrect": false, "rationale": "Ribosomes initiate synthesis, but for secreted proteins, they must enter the ER system. The cytoplasm and vacuoles are not part of the direct pathway for protein secretion to the exterior of the cell in this context."}, {"text": "Chloroplast -> Cell wall -> Cell membrane", "isCorrect": false, "rationale": "Chloroplasts are plant-specific, and the cell wall is a structural component of plants, neither of which is involved in the direct secretion of proteins from an animal cell."}], "id": "q05"}, {"question": "A student states that plant cells perform photosynthesis in chloroplasts and therefore do not require mitochondria because they produce their own energy. What is the fundamental error in this statement?", "options": [{"text": "Plant cells only perform photosynthesis at night.", "isCorrect": false, "rationale": "Photosynthesis requires light and primarily occurs during the day."}, {"text": "Mitochondria are only found in animal cells.", "isCorrect": false, "rationale": "The text explicitly states that plant cells have both chloroplasts and mitochondria."}, {"text": "Plant cells need mitochondria to break down sugars for usable energy (ATP).", "isCorrect": true, "rationale": "Chloroplasts convert light energy into chemical energy in the form of sugar. Mitochondria are then required in plant cells (just as in animal cells) to break down that sugar through cellular respiration to produce ATP, the direct energy currency for most cellular processes."}, {"text": "Chloroplasts are responsible for both photosynthesis and cellular respiration.", "isCorrect": false, "rationale": "Chloroplasts perform photosynthesis, but mitochondria perform cellular respiration."}], "id": "q06"}, {"question": "Which statement best describes the primary role of the nucleus in a eukaryotic cell?", "options": [{"text": "It generates all the cell's ATP through cellular respiration.", "isCorrect": false, "rationale": "ATP generation through cellular respiration is the primary function of mitochondria."}, {"text": "It synthesizes lipids and detoxifies harmful chemicals.", "isCorrect": false, "rationale": "These functions are primarily carried out by the smooth endoplasmic reticulum."}, {"text": "It stores the cell's genetic instructions (DNA) and controls cell activities.", "isCorrect": true, "rationale": "The nucleus is often called the 'control center' because it houses the cell's DNA and directs cell processes."}, {"text": "It packages and sorts proteins and lipids for transport.", "isCorrect": false, "rationale": "This is the primary function of the Golgi apparatus."}], "id": "q07"}, {"question": "The primary difference between rough endoplasmic reticulum (RER) and smooth endoplasmic reticulum (SER) lies in their associated structures and main functions. Which of the following accurately distinguishes RER from SER?", "options": [{"text": "RER synthesizes lipids, while SER detoxifies chemicals.", "isCorrect": false, "rationale": "The smooth ER synthesizes lipids and detoxifies chemicals; the rough ER is not primarily involved in these functions."}, {"text": "RER is involved in protein folding and modification, while SER synthesizes lipids and detoxifies.", "isCorrect": true, "rationale": "Rough ER is studded with ribosomes and processes proteins, while smooth ER lacks ribosomes and is involved in lipid synthesis and detoxification."}, {"text": "RER stores calcium ions, while SER assembles ribosomes.", "isCorrect": false, "rationale": "Smooth ER stores calcium ions, and the nucleolus (within the nucleus) assembles ribosome components, not the SER."}, {"text": "RER is found only in animal cells, while SER is found only in plant cells.", "isCorrect": false, "rationale": "Both rough and smooth ER are found in most eukaryotic cells, including both animal and plant cells."}], "id": "q08"}, {"question": "Lysosomes contain powerful digestive enzymes. The text emphasizes the critical importance of the lysosomal membrane. Why is this membrane so crucial for cell survival?", "options": [{"text": "It provides a surface for ATP production.", "isCorrect": false, "rationale": "ATP production occurs primarily in mitochondria, not on the lysosomal membrane."}, {"text": "It prevents the digestive enzymes from leaking into the cytoplasm and damaging the cell.", "isCorrect": true, "rationale": "The lysosomal membrane safely contains potent digestive enzymes, preventing them from digesting the cell's own components, which would be fatal."}, {"text": "It allows for the selective passage of genetic material into the nucleus.", "isCorrect": false, "rationale": "The nuclear envelope with its nuclear pores regulates the passage of molecules into and out of the nucleus, not the lysosomal membrane."}, {"text": "It supports the rigid structure of the cell wall.", "isCorrect": false, "rationale": "Lysosomes are not involved with the cell wall; animal cells (where lysosomes are common) do not even have cell walls."}], "id": "q09"}, {"question": "A plant begins to wilt severely. Based on the functions described, which organelle is most directly responsible for maintaining turgor pressure and its loss would lead to wilting?", "options": [{"text": "Chloroplasts", "isCorrect": false, "rationale": "Chloroplasts are responsible for photosynthesis, not directly for maintaining cell rigidity or turgor pressure."}, {"text": "Mitochondria", "isCorrect": false, "rationale": "Mitochondria produce ATP for energy, but are not directly involved in the physical maintenance of turgor pressure."}, {"text": "Central vacuole", "isCorrect": true, "rationale": "The large central vacuole in plant cells stores water and, when full, presses against the cell wall, creating turgor pressure that keeps the plant firm. Loss of water from this vacuole directly causes wilting."}, {"text": "Nucleus", "isCorrect": false, "rationale": "The nucleus controls cell activities, but it does not directly maintain the physical turgor pressure of the cell."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
