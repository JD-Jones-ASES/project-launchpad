<body>
<div class="quiz-container">

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>

    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 30, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the introduction, why is an interdisciplinary approach crucial for solving humanity's most significant challenges, such as climate change and disease?", "options": [{"text": "It allows each scientific branch to work independently on a specific part of the problem, streamlining the process.", "isCorrect": false, "rationale": "The text states the opposite; problems 'do not fit neatly into a single branch' and require collaboration across traditional boundaries, not independent work."}, {"text": "It enables scientists from various fields to collaborate, sharing tools, data, and ideas to tackle complex problems.", "isCorrect": true, "rationale": "The introduction explicitly states that solving these problems 'requires scientists from many fields to collaborate, sharing tools, data, and ideas across traditional boundaries.'"}, {"text": "It focuses primarily on theoretical research, deferring practical solutions to engineering disciplines.", "isCorrect": false, "rationale": "The text emphasizes real-world problem-solving and application of scientific concepts, not a theoretical-only focus."}, {"text": "It simplifies problems by breaking them down into components that can be solved by a single, specialized expert.", "isCorrect": false, "rationale": "The text highlights that these problems 'do not fit neatly into a single branch' and are inherently complex, requiring multiple perspectives rather than simplification into single-expert tasks."}]}, {"question": "The greenhouse effect is described as fundamentally a chemical phenomenon. Which specific chemical concept primarily explains why certain molecules like CO2 and CH4 absorb infrared radiation?", "options": [{"text": "The occurrence of combustion reactions that release these gases.", "isCorrect": false, "rationale": "Combustion explains the source of some greenhouse gases, but not the mechanism by which they absorb infrared radiation."}, {"text": "The formation of carbonic acid when carbon dioxide dissolves in oceans.", "isCorrect": false, "rationale": "This explains ocean acidification, another chemical aspect of climate change, but not the absorption of infrared radiation by atmospheric greenhouse gases."}, {"text": "The molecular structure, including covalent bonds and molecular geometry, of the greenhouse gas molecules.", "isCorrect": true, "rationale": "The text explicitly states: 'covalent bonds and molecular geometry — the very features that determine whether a molecule can absorb infrared light.'"}, {"text": "The precise atomic mass and isotopic composition of the elements within the molecules.", "isCorrect": false, "rationale": "While related to molecular properties, the text highlights molecular structure, bonds, and geometry as the primary features for infrared absorption, not primarily atomic mass or isotopic composition."}]}, {"question": "A politician argues, 'Climate change is solely an Earth Science problem, as it deals with Earth's atmosphere and oceans.' Based on the 'Climate Change' case study, why is this view insufficient for developing a comprehensive solution?", "options": [{"text": "Earth Science contributions are limited to historical data and do not offer insights into future climate scenarios.", "isCorrect": false, "rationale": "Earth Science provides current data (Keeling Curve) and understanding of ongoing processes (ocean currents) crucial for future projections, not just historical context."}, {"text": "Solving climate change requires understanding chemical reactions (e.g., combustion, ocean acidification), physical principles (e.g., energy balance, radiation), and biological processes (e.g., photosynthesis, ecosystem response).", "isCorrect": true, "rationale": "The text explicitly details contributions from Chemistry, Physics, and Life Science, demonstrating that Earth Science alone cannot cover the full scope of the problem or its solutions."}, {"text": "Only political science can effectively address the global scale and policy implications of climate change.", "isCorrect": false, "rationale": "While policy is crucial, this option shifts away from the scientific disciplines discussed in the text and does not explain why a single *science* branch is insufficient."}, {"text": "The primary challenge in climate change is economic, not scientific, focusing on the cost of renewable energy technologies.", "isCorrect": false, "rationale": "The text frames climate change as a complex scientific problem with significant scientific contributions required across all branches, even when discussing energy solutions."}]}, {"question": "Modern medical imaging technologies like X-rays, MRI, and ultrasound significantly advance diagnostics. Which fundamental physics concept unifies their operation, despite their different energy sources?", "options": [{"text": "The principle of electromagnetic induction for generating powerful electrical currents.", "isCorrect": false, "rationale": "Electromagnetic induction is relevant for MRI magnets' power supplies but not the direct imaging principle for X-rays or ultrasound."}, {"text": "The conversion of chemical energy into usable electrical signals within the body.", "isCorrect": false, "rationale": "This describes biological processes or drug action, not the physical basis of imaging techniques."}, {"text": "The interaction of various types of waves (electromagnetic or sound) with biological tissues.", "isCorrect": true, "rationale": "X-rays and MRI use electromagnetic waves, while ultrasound uses sound waves, all of which interact with tissues in distinct ways to form images. This is the unifying principle."}, {"text": "The genetic sequencing of cells to identify disease markers.", "isCorrect": false, "rationale": "Genetic sequencing is a life science contribution to medicine, distinct from the physics principles of medical imaging."}]}, {"question": "Which statement best describes an often-overlooked but significant contribution of Earth Science to medical technology?", "options": [{"text": "Predicting the precise binding affinity of pharmaceuticals to protein receptors.", "isCorrect": false, "rationale": "This is primarily a contribution from Chemistry, focusing on molecular interactions."}, {"text": "Understanding the evolutionary pathways of drug-resistant pathogens.", "isCorrect": false, "rationale": "This falls under Life Science, specifically evolutionary biology."}, {"text": "Identifying new pharmaceutical compounds in unique geological environments and monitoring environmental factors affecting public health.", "isCorrect": true, "rationale": "The text states: 'Many pharmaceutical compounds were originally discovered in organisms from specific geological environments' and discusses 'water quality' and 'atmospheric science' for public health."}, {"text": "Designing the intricate electrical circuits for advanced medical diagnostic devices.", "isCorrect": false, "rationale": "This is a contribution from Physics and engineering, dealing with electrical signals and device design."}]}, {"question": "The transition to sustainable energy involves various technologies like solar, wind, and hydroelectric power. Which overarching physics concept is fundamental to understanding how all these systems generate electricity?", "options": [{"text": "The quantum mechanical properties of semiconductors used in solar panels.", "isCorrect": false, "rationale": "While relevant for solar panels, this is not a universal concept for wind or hydroelectric power."}, {"text": "The conservation of energy, where energy is transformed from one form to another but not created or destroyed.", "isCorrect": true, "rationale": "The text states: 'Conservation of energy (Unit 14) dictates that we can transform energy from one form to another but cannot create or destroy it,' identifying it as a core physics concept for energy."}, {"text": "The specific chemical reactions involved in battery energy storage.", "isCorrect": false, "rationale": "This is a chemistry concept related to energy storage, not the fundamental generation principle for all renewable systems."}, {"text": "The geological processes that form rare-earth elements necessary for magnets.", "isCorrect": false, "rationale": "This is an Earth Science contribution related to materials, not the physics principle of energy transformation common to all listed systems."}]}, {"question": "A significant chemistry challenge for the widespread adoption of sustainable energy, according to the text, lies in which area?", "options": [{"text": "Calculating the kinetic energy of moving air for wind power generation.", "isCorrect": false, "rationale": "This is a physics calculation, as detailed in the worked example."}, {"text": "Assessing the ecological impact of large-scale solar installations on biodiversity.", "isCorrect": false, "rationale": "This falls under Life Science, specifically ecology and biodiversity science."}, {"text": "Developing new materials for efficient energy storage in batteries and fuel cells.", "isCorrect": true, "rationale": "The text highlights 'Battery technology is a chemistry problem' and 'Developing new materials for solar cells, battery electrodes, and fuel cell membranes requires understanding periodic trends, bonding, and the properties of solutions and electrolytes.'"}, {"text": "Understanding global wind patterns and atmospheric conditions for site selection.", "isCorrect": false, "rationale": "This is an Earth Science contribution related to resource availability."}]}, {"question": "Which scenario best illustrates the interdisciplinary nature of sustainable energy planning, combining Earth Science and Life Science contributions?", "options": [{"text": "Calculating the power output of a solar panel and designing its electrical grid connections.", "isCorrect": false, "rationale": "This primarily involves Physics contributions."}, {"text": "Analyzing global wind patterns to select optimal locations for offshore wind farms while evaluating their potential impact on marine ecosystems and bird migration.", "isCorrect": true, "rationale": "This combines Earth Science (global wind patterns, ocean currents for offshore farms) and Life Science (ecology for impact on bird populations and fish migration)."}, {"text": "Synthesizing new chemical compounds for battery electrodes and predicting their long-term stability.", "isCorrect": false, "rationale": "This is a chemistry contribution to sustainable energy."}, {"text": "Studying the geological formation of fossil fuels to understand their energy density and combustion properties.", "isCorrect": false, "rationale": "This is a historical Earth Science and Chemistry analysis of existing fuels, not directly planning for *sustainable* energy projects in an interdisciplinary way."}]}, {"question": "The 'Physics in the Hospital' SciConnection box describes how devices like ECGs, pulse oximeters, and automatic doors utilize physics principles. This section's broader context on Medical Technology supports which conclusion about patient care?", "options": [{"text": "Medical care is becoming increasingly reliant on purely biological solutions, reducing the need for physics-based instruments.", "isCorrect": false, "rationale": "The SciConnection box and the Physics contributions to Medical Technology indicate the opposite; physics is integral to many diagnostic and treatment tools."}, {"text": "Advanced medical technology, underpinning modern patient care, is a direct result of applying diverse physics principles.", "isCorrect": true, "rationale": "The section on Medical Technology and the SciConnection box detail how numerous medical devices (MRI, X-rays, ultrasound, ECG, pulse oximeters) directly employ various physics principles (electromagnetic waves, sound waves, electricity, light absorption)."}, {"text": "The primary role of physics in hospitals is limited to the structural integrity of the building and basic utility systems.", "isCorrect": false, "rationale": "The text clearly illustrates physics' role in diagnostic and therapeutic devices, extending far beyond building infrastructure."}, {"text": "Patient safety protocols are largely independent of the physical properties of medical equipment.", "isCorrect": false, "rationale": "The safe and effective operation of medical equipment, which is physics-based, is intrinsically linked to patient safety."}]}, {"question": "The worked example calculates the kinetic energy of air flowing through a wind turbine. This problem is explicitly highlighted as combining which scientific branches?", "options": [{"text": "Life Science (ecosystem dynamics) and Chemistry (combustion reactions).", "isCorrect": false, "rationale": "These branches are relevant to sustainable energy but are not the primary ones combined in this specific kinetic energy calculation."}, {"text": "Physics (kinetic energy, power), Earth Science (wind patterns), and Chemistry (density and composition of air).", "isCorrect": true, "rationale": "The worked example's concluding sentence explicitly states: 'This problem combines physics (kinetic energy, power) with earth science (wind patterns) and chemistry (the density and composition of air).'"}, {"text": "Mathematics (geometry) and Engineering (turbine design).", "isCorrect": false, "rationale": "While geometry is used in the calculation, and engineering in design, the text specifically emphasizes the combination of scientific branches for this problem."}, {"text": "Earth Science (geological formations) and Physics (electromagnetic induction).", "isCorrect": false, "rationale": "Geological formations are less central to the kinetic energy calculation itself, and electromagnetic induction is for conversion, not the initial kinetic energy."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
