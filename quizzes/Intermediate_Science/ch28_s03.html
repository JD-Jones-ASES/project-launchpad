    };

<body>

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 28, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the foundational role of biochemistry within the broader scientific disciplines?", "options": [{"text": "Biochemistry primarily focuses on the physical properties of inert organic compounds found in the environment.", "isCorrect": false, "rationale": "Biochemistry specifically studies molecules found in *living* organisms and their interactions, not inert compounds in general."}, {"text": "Biochemistry is an independent field that does not significantly interact with biology or chemistry.", "isCorrect": false, "rationale": "The text explicitly states that 'Biochemistry bridges chemistry (bonding, reactions) and biology (cell function, genetics, metabolism),' indicating a strong interdisciplinary role."}, {"text": "Biochemistry investigates the structure, function, and interactions of molecules essential to life, thus linking the principles of chemistry to biological processes.", "isCorrect": true, "rationale": "This option accurately captures the definition provided in the text: 'The branch of chemistry that studies the structure, function, and interactions of the molecules found in living organisms,' and its bridging role between chemistry and biology."}, {"text": "Biochemistry is solely concerned with the macroscopic aspects of organismal physiology, ignoring molecular details.", "isCorrect": false, "rationale": "Biochemistry focuses on the *molecular* level (structure, function, interactions of molecules), which underpins macroscopic physiological processes."}], "id": "q01"}, {"question": "A cell needs to assemble a new enzyme from its amino acid building blocks. Simultaneously, the digestive system is breaking down starch from a meal into simple sugars. Which pair of reactions accurately describes these two processes?", "options": [{"text": "Both processes are examples of hydrolysis, as both involve the addition of water.", "isCorrect": false, "rationale": "Assembling a new enzyme is a building-up process (synthesis), which involves dehydration synthesis, not hydrolysis. Breaking down starch is hydrolysis."}, {"text": "The cell uses dehydration synthesis to build the enzyme, while the digestive system uses hydrolysis to break down starch.", "isCorrect": true, "rationale": "Building polymers (like an enzyme from amino acids) occurs via dehydration synthesis (removal of water). Breaking down polymers (like starch into simple sugars) occurs via hydrolysis (addition of water), as stated in the text regarding the digestive system."}, {"text": "The cell uses hydrolysis to build the enzyme, and the digestive system uses dehydration synthesis to break down starch.", "isCorrect": false, "rationale": "This reverses the correct application. Hydrolysis breaks bonds, and dehydration synthesis forms them."}, {"text": "Both processes are examples of dehydration synthesis, as both involve creating larger molecules.", "isCorrect": false, "rationale": "Breaking down starch into simple sugars involves making *smaller* molecules, which is hydrolysis, not dehydration synthesis."}], "id": "q02"}, {"question": "Glucose, fructose, and galactose are all monosaccharides with the molecular formula C6H12O6. Despite having the same chemical formula, they have different biological roles and properties. What is the term for molecules that share the same molecular formula but differ in their structural arrangement?", "options": [{"text": "Polymers", "isCorrect": false, "rationale": "Polymers are large molecules made of repeating monomer units, not different structural arrangements of the same formula."}, {"text": "Monomers", "isCorrect": false, "rationale": "Monomers are single building blocks. While glucose, fructose, and galactose are monomers, the term doesn't describe their relationship of having the same formula but different structure."}, {"text": "Isomers", "isCorrect": true, "rationale": "The text defines isomers as having the 'same formula, different structures,' specifically mentioning fructose and galactose as isomers of glucose."}, {"text": "Disaccharides", "isCorrect": false, "rationale": "Disaccharides are formed from two monosaccharides joined together, not a description of different structural arrangements of a single monosaccharide formula."}], "id": "q03"}, {"question": "Cellulose and starch are both polysaccharides composed entirely of glucose monomers. Yet, humans can digest starch but not cellulose. What is the most accurate reason for this difference?", "options": [{"text": "Cellulose contains different types of glucose monomers than starch.", "isCorrect": false, "rationale": "The text states that 'All three polysaccharides are made entirely of glucose monomers,' meaning the type of monomer is the same."}, {"text": "Starch has a simpler chemical formula than cellulose, making it easier to break down.", "isCorrect": false, "rationale": "As both are polymers of glucose, their empirical formulas are identical (Cn(H2O)n). The complexity relates to the bonding, not the basic formula."}, {"text": "The glucose units in cellulose are linked in different geometric arrangements, preventing human enzymes from recognizing and breaking the bonds.", "isCorrect": true, "rationale": "The text states, 'All three polysaccharides are made entirely of glucose monomers, yet they have very different properties because the glucose units are linked in different geometric arrangements. Structure determines function.' It also explicitly mentions, 'Humans cannot digest cellulose (we lack the enzyme).'"}, {"text": "Cellulose is an inorganic compound, while starch is an organic compound.", "isCorrect": false, "rationale": "Both cellulose and starch are organic compounds (carbohydrates) found in living organisms."}], "id": "q04"}, {"question": "A scientist is analyzing a newly discovered biological molecule. It is found to be largely nonpolar and insoluble in water, and when broken down, yields glycerol and fatty acids. Based on this information, into which class of biomolecules would this compound most likely be categorized?", "options": [{"text": "Carbohydrate", "isCorrect": false, "rationale": "Carbohydrates are typically soluble in water and are composed of carbon, hydrogen, and oxygen in a 1:2:1 ratio, not glycerol and fatty acids."}, {"text": "Protein", "isCorrect": false, "rationale": "Proteins are polymers of amino acids and generally have diverse solubilities depending on their R-groups, but their breakdown products are amino acids, not glycerol and fatty acids."}, {"text": "Lipid", "isCorrect": true, "rationale": "The description 'largely nonpolar and therefore insoluble in water' directly matches the definition of lipids. Additionally, the breakdown into glycerol and fatty acids is characteristic of fats and oils, which are types of lipids."}, {"text": "Nucleic Acid", "isCorrect": false, "rationale": "Nucleic acids are polymers of nucleotides and store genetic information; they are not composed of glycerol and fatty acids."}], "id": "q05"}, {"question": "Which of the following statements accurately highlights a key distinction between lipids and the other three major classes of biomolecules (carbohydrates, proteins, and nucleic acids)?", "options": [{"text": "Lipids are the only class that contains carbon, hydrogen, and oxygen atoms.", "isCorrect": false, "rationale": "Carbohydrates also contain carbon, hydrogen, and oxygen, and proteins and nucleic acids contain these elements plus others."}, {"text": "Lipids are unique in being hydrophilic and readily dissolving in water.", "isCorrect": false, "rationale": "Lipids are defined as 'largely nonpolar and therefore insoluble in water' (hydrophobic), making this statement incorrect."}, {"text": "Lipids are not true polymers built from linking identical or similar monomer subunits.", "isCorrect": true, "rationale": "The text explicitly states: 'Unlike carbohydrates, proteins, and nucleic acids, lipids are not true polymers — they are not built by linking identical monomers.'"}, {"text": "Lipids primarily serve as structural components, while the other classes are mainly for energy storage.", "isCorrect": false, "rationale": "Lipids serve as long-term energy storage, as well as structural components. Carbohydrates are primary energy sources, and proteins have vast functional roles including structural support. This statement misrepresents their primary roles."}], "id": "q06"}, {"question": "A person eats a high-fat meal. Why might their body prioritize storing this fat rather than immediately breaking it down for energy, especially if carbohydrate stores are also available?", "options": [{"text": "Fats are harder to digest and convert into ATP, so they are saved for emergencies.", "isCorrect": false, "rationale": "While fat metabolism is more complex than simple sugars, the text emphasizes fat's efficiency as 'long-term energy storage,' not necessarily as an emergency-only fuel."}, {"text": "Fats provide twice as much energy per gram compared to carbohydrates, making them ideal for long-term, compact energy reserves.", "isCorrect": true, "rationale": "The text states: 'Lipids store about twice as much energy per gram as carbohydrates, which is why your body uses fat for long-term energy storage. A gram of fat provides about 9 calories of energy, compared to about 4 calories per gram of carbohydrate.'"}, {"text": "Fats are exclusively used for structural components like cell membranes, not for energy.", "isCorrect": false, "rationale": "While phospholipids are structural, fats and oils are primarily for energy storage, as explicitly stated."}, {"text": "Fat molecules are much smaller than carbohydrate molecules, allowing for easier storage in cells.", "isCorrect": false, "rationale": "Fats (triglycerides) are generally larger and more complex than simple sugars (monosaccharides). Their advantage is energy density, not molecular size for storage ease."}], "id": "q07"}, {"question": "Which statement accurately describes how the unique properties of amino acids contribute to the diverse functions of proteins?", "options": [{"text": "All amino acids have identical R groups, leading to a consistent protein structure and function across all proteins.", "isCorrect": false, "rationale": "The text states that 'the R group differs among the 20 amino acids, giving each one unique chemical properties,' which directly contradicts this option."}, {"text": "The sequence of amino acids in a polypeptide determines its specific three-dimensional shape, which is critical for its function.", "isCorrect": true, "rationale": "The text explains: 'The specific sequence of amino acids in a polypeptide determines how it folds into a three-dimensional shape, and that shape determines the protein's function.' This is a core concept of protein biology."}, {"text": "Proteins primarily function as genetic information storage, with their amino acid sequence having minimal impact on their catalytic activity.", "isCorrect": false, "rationale": "Proteins perform a 'vast array of functions,' including catalyzing reactions (enzymes), but nucleic acids (DNA/RNA) store genetic information. The amino acid sequence is crucial for function."}, {"text": "Denaturation enhances a protein's function by exposing more active sites.", "isCorrect": false, "rationale": "The text states that 'If a protein loses its three-dimensional shape — a process called denaturation — it usually loses its function.'"}], "id": "q08"}, {"question": "A research team synthesizes a short polypeptide chain by linking four amino acids together. If each amino acid has the molecular formula C4H8NO2, what would be the molecular formula of the resulting tetrapeptide, assuming standard dehydration synthesis?", "options": [{"text": "C16H32N4O8", "isCorrect": false, "rationale": "This formula represents four individual amino acids without considering the water molecules removed during dehydration synthesis."}, {"text": "C16H26N4O5", "isCorrect": true, "rationale": "Four amino acids (C4H8NO2 each) would initially total C16H32N4O8. To form a tetrapeptide, three peptide bonds are formed (one between each adjacent pair of amino acids). Each peptide bond releases one H2O molecule. Therefore, 3 H2O molecules (H6O3) are removed. C16H32N4O8 - H6O3 = C16H26N4O5. This applies the concept from the 'Counting Atoms in a Molecular Formula' worked example."}, {"text": "C16H28N4O6", "isCorrect": false, "rationale": "This formula would result if only two water molecules were removed, but a tetrapeptide (4 monomers) requires 3 peptide bonds and thus 3 water molecules removed."}, {"text": "C16H30N4O7", "isCorrect": false, "rationale": "This formula would result if only one water molecule was removed, but a tetrapeptide requires 3 water molecules removed."}], "id": "q09"}, {"question": "A biology student performs a test on an unknown sample using Benedict's solution, requiring a hot-water bath. A color change from blue to orange is observed. Based on the provided 'investigation' section, what does this result indicate?", "options": [{"text": "The sample contains a high concentration of starch.", "isCorrect": false, "rationale": "The iodine test (blue-black color) indicates starch, not Benedict's solution."}, {"text": "The sample contains a significant amount of simple sugars.", "isCorrect": true, "rationale": "The text states under 'Simple sugar test (Benedict's)': 'A color change from blue to green, yellow, orange, or red indicates simple sugars (the warmer the color, the more sugar present).' Orange indicates a significant amount."}, {"text": "The sample is rich in proteins.", "isCorrect": false, "rationale": "The Biuret test (purple or violet color) indicates protein, not Benedict's solution."}, {"text": "The sample contains a large quantity of lipids.", "isCorrect": false, "rationale": "The brown paper test (translucent spot) indicates lipids, not Benedict's solution."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
