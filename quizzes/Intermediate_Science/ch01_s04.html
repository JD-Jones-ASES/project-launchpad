    };

<body>

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 1, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A scientist observes a large, spherical cell that has stopped growing and is struggling to absorb nutrients and expel waste efficiently. Based on the principles of cell division, what is the most likely reason for this inefficiency?", "options": [{"text": "The cell's genetic material has become too complex to manage.", "isCorrect": false, "rationale": "While genetic complexity is a factor in cell function, the primary reason for a large cell's inefficiency in nutrient/waste exchange is not genetic complexity itself, but rather the physical limitations related to its size."}, {"text": "Its increased volume has outpaced its surface area, limiting transport across the membrane.", "isCorrect": true, "rationale": "As a cell grows, its volume increases much faster than its surface area (cell membrane). The surface area becomes insufficient to supply the larger volume with nutrients or remove waste quickly enough, making division necessary to restore a favorable surface-area-to-volume ratio."}, {"text": "The cell has reached its maximum capacity for organelle production.", "isCorrect": false, "rationale": "The text does not state that reaching a maximum capacity for organelle production is the direct cause of a large cell's transport inefficiency. The core issue is the surface area to volume ratio."}, {"text": "It lacks the necessary enzymes to synthesize new membrane components.", "isCorrect": false, "rationale": "While the cell needs enzymes for membrane synthesis, the problem described is a consequence of the cell's physical dimensions (surface area to volume ratio) rather than a specific enzyme deficiency."}]}, {"question": "Which statement accurately describes the main activities occurring during the two primary stages of the cell cycle?", "options": [{"text": "Interphase is when the cell rests and performs no functions, while the mitotic phase is when it grows.", "isCorrect": false, "rationale": "Interphase is described as the longest and most active part of the cell cycle, where the cell grows and performs its specialized functions, not rests. The mitotic phase is for division, not growth."}, {"text": "Interphase involves cell growth and preparation for division, whereas the mitotic phase is when the cell's nucleus and cytoplasm actually divide.", "isCorrect": true, "rationale": "The text clearly states that the cell cycle has two main stages: interphase, 'when the cell grows and prepares for division,' and the mitotic phase, 'when the cell actually divides.'"}, {"text": "Both interphase and the mitotic phase are solely dedicated to DNA replication and chromosome separation.", "isCorrect": false, "rationale": "DNA replication occurs during the S phase of interphase, and chromosome separation occurs during the mitotic phase. However, interphase also includes G1 and G2 phases for growth and preparation, and the mitotic phase includes cytoplasm division (cytokinesis) in addition to nuclear division."}, {"text": "The mitotic phase is always longer than interphase, as it involves complex chromosome movements.", "isCorrect": false, "rationale": "The text states that 'Interphase is by far the longest part of the cell cycle — a typical human cell spends about 90% of its time in interphase.'"}]}, {"question": "A cell is observed to be actively growing in size and synthesizing numerous proteins and organelles, but its DNA content has not yet doubled. In which sub-phase of interphase is this cell most likely found?", "options": [{"text": "S phase", "isCorrect": false, "rationale": "S phase is when DNA replication occurs, meaning the DNA content would have doubled after this phase, not before or during the initial growth."}, {"text": "G1 phase", "isCorrect": true, "rationale": "The G1 phase is characterized by cell growth, production of new proteins and organelles, and carrying out normal functions, all before DNA replication occurs in the S phase."}, {"text": "G2 phase", "isCorrect": false, "rationale": "In the G2 phase, DNA replication has already been completed (in S phase), and the cell is preparing for mitosis, having doubled its DNA content."}, {"text": "Mitotic phase", "isCorrect": false, "rationale": "The mitotic phase is when the cell divides, not a phase of growth and preparation prior to DNA doubling. It occurs after all of interphase."}]}, {"question": "Why is the condensation of chromatin into visible chromosomes essential before a cell begins the process of mitosis?", "options": [{"text": "Condensed chromosomes allow for efficient nutrient absorption during division.", "isCorrect": false, "rationale": "Chromosome condensation is about organizing genetic material for division, not directly related to nutrient absorption efficiency."}, {"text": "It ensures that the genetic information remains unexpressed during cell division.", "isCorrect": false, "rationale": "While gene expression might be altered during division, the primary reason for condensation is not to prevent gene expression, but to facilitate accurate distribution."}, {"text": "Compacting the DNA prevents tangling and ensures accurate and equal distribution to daughter cells.", "isCorrect": true, "rationale": "The text explains that condensation is essential because 'trying to divide loosely coiled DNA between two cells would be like trying to divide a tangled pile of yarn into two equal halves without cutting it,' highlighting the need for organized distribution."}, {"text": "Chromosome condensation signals the cell to begin replicating its DNA.", "isCorrect": false, "rationale": "DNA replication (S phase) occurs *before* chromosome condensation (prophase). Condensation is a preparation for physically separating the already replicated DNA."}]}, {"question": "During which specific phase of mitosis do the chromatin condense into visible chromosomes, the nuclear envelope begin to break down, and the mitotic spindle start to form?", "options": [{"text": "Metaphase", "isCorrect": false, "rationale": "In metaphase, chromosomes are already condensed and align at the metaphase plate; the nuclear envelope has largely broken down, and the spindle is fully formed and attached to chromosomes."}, {"text": "Anaphase", "isCorrect": false, "rationale": "Anaphase is when sister chromatids separate and move to opposite poles of the cell, well after condensation and spindle formation."}, {"text": "Prophase", "isCorrect": true, "rationale": "The text states that in prophase, 'Chromatin condenses into tightly coiled, visible chromosomes,' 'The mitotic spindle...begins to form,' and 'The nuclear envelope begins to break down.'"}, {"text": "Telophase", "isCorrect": false, "rationale": "Telophase is essentially the reverse of prophase, where chromosomes uncoil, new nuclear envelopes form, and the spindle disassembles."}]}, {"question": "A drug is developed that prevents spindle fibers from attaching to the centromeres of chromosomes. Which mitotic phase would be directly disrupted, and what would be the immediate consequence for the daughter cells?", "options": [{"text": "Prophase; Chromatin would fail to condense.", "isCorrect": false, "rationale": "Chromosome condensation occurs in prophase, before spindle fibers attach to centromeres. This drug would affect a later stage."}, {"text": "Metaphase; Chromosomes would not align properly at the metaphase plate.", "isCorrect": true, "rationale": "During metaphase, 'Spindle fibers from opposite poles attach to the centromere of each chromosome.' If this attachment is prevented, chromosomes cannot align correctly, directly disrupting metaphase and leading to uneven chromosome distribution in daughter cells."}, {"text": "Anaphase; Sister chromatids would separate prematurely.", "isCorrect": false, "rationale": "Spindle fibers pull sister chromatids apart in anaphase. If they cannot attach, separation would not occur at all, or would be disorganized, not premature."}, {"text": "Telophase; New nuclear envelopes would fail to form.", "isCorrect": false, "rationale": "The formation of new nuclear envelopes in telophase occurs after chromosomes have been separated, so this drug would disrupt an earlier event, preventing telophase from proceeding normally."}]}, {"question": "Which of the following statements accurately compares and contrasts cytokinesis in animal and plant cells?", "options": [{"text": "Both animal and plant cells form a cleavage furrow to divide the cytoplasm.", "isCorrect": false, "rationale": "Only animal cells form a cleavage furrow. Plant cells, due to their rigid cell wall, divide using a cell plate."}, {"text": "Animal cells form a cell plate, while plant cells pinch inward with a cleavage furrow.", "isCorrect": false, "rationale": "This statement reverses the mechanisms: animal cells form a cleavage furrow, and plant cells form a cell plate."}, {"text": "Plant cells form a cell plate from Golgi vesicles, whereas animal cells use a contractile ring of microfilaments to create a cleavage furrow.", "isCorrect": true, "rationale": "The text explicitly states: 'In animal cells, cytokinesis occurs when a ring of microfilaments...contracts, pinching the cell inward...called the cleavage furrow.' For plant cells: 'vesicles from the Golgi apparatus gather...and fuse to form a structure called the cell plate.'"}, {"text": "Cytokinesis in plant cells typically occurs much earlier in mitosis than in animal cells.", "isCorrect": false, "rationale": "The timing of cytokinesis is generally similar in both, usually beginning during telophase."}]}, {"question": "What is the ultimate outcome of mitosis followed by cytokinesis?", "options": [{"text": "Two daughter cells, each with half the number of chromosomes as the parent cell.", "isCorrect": false, "rationale": "This describes the outcome of meiosis, not mitosis. Mitosis produces genetically identical cells with the same chromosome number as the parent."}, {"text": "Two genetically identical daughter cells, each with a complete set of chromosomes and organelles.", "isCorrect": true, "rationale": "The text states: 'The result of mitosis followed by cytokinesis is two daughter cells that are genetically identical to each other and to the original parent cell. Each has the same number of chromosomes, the same DNA sequences, and a share of the original cell's organelles and cytoplasm.'"}, {"text": "Four daughter cells, each with varying genetic information due to crossing over.", "isCorrect": false, "rationale": "This describes the outcome of meiosis with genetic recombination, not mitosis."}, {"text": "A single, larger cell that has doubled its DNA content but not divided.", "isCorrect": false, "rationale": "This describes a cell that has completed S phase but has not yet undergone mitosis and cytokinesis."}]}, {"question": "A new experimental drug aims to treat cancer by inhibiting the function of cell cycle checkpoints. Based on the provided text, what would be the most likely undesirable consequence of such a drug on normal, healthy cells?", "options": [{"text": "It would cause normal cells to stop dividing completely, leading to tissue degradation.", "isCorrect": false, "rationale": "Inhibiting checkpoints removes regulatory stops; it would likely lead to uncontrolled division, not complete cessation."}, {"text": "It would allow normal cells with DNA damage or incomplete replication to proceed with division.", "isCorrect": true, "rationale": "The text explains that checkpoints 'tell the cell when to proceed and when to stop' and check for 'DNA damage, verifies that DNA replication is complete.' Inhibiting them would remove these safeguards, allowing damaged cells to divide."}, {"text": "It would force normal cells into apoptosis prematurely, reducing healthy cell populations.", "isCorrect": false, "rationale": "Checkpoints, when detecting severe problems, *trigger* apoptosis. Inhibiting them would prevent this crucial self-destruct mechanism, not cause premature apoptosis."}, {"text": "It would enhance the normal cells' ability to repair DNA, making them more resilient.", "isCorrect": false, "rationale": "Inhibiting checkpoints would *remove* the verification step for DNA integrity and the pause for repair, making cells less resilient and more prone to errors."}]}, {"question": "The 'Think Deeper' section suggests that rapidly dividing cancer cells are more vulnerable to radiation damage than normal cells. Which of the following best explains why?", "options": [{"text": "Cancer cells have weaker cell membranes that are more easily penetrated by radiation.", "isCorrect": false, "rationale": "The text does not discuss membrane strength or penetration as the reason for differential radiation vulnerability related to cell cycle. The vulnerability comes from DNA handling."}, {"text": "They spend a greater proportion of their time in the S and M phases, where DNA is exposed or actively being manipulated, making it more susceptible to damage and less amenable to repair.", "isCorrect": true, "rationale": "The 'Think Deeper' guidance explains that cancer cells 'spend a larger fraction of their time in the S and M phases.' During S phase, DNA is unwound and vulnerable. During mitosis (M phase), DNA is being separated, making repair difficult. This makes them more susceptible to damage during these critical times compared to slowly dividing normal cells."}, {"text": "Normal cells have evolved specific proteins that actively block radiation from entering the cell.", "isCorrect": false, "rationale": "The text does not mention such specific radiation-blocking proteins in normal cells as the reason for differential vulnerability related to the cell cycle."}, {"text": "Rapid division allows cancer cells to quickly repair any radiation damage before it becomes critical.", "isCorrect": false, "rationale": "This is incorrect. Rapid division, especially in the absence of proper checkpoints, means damaged DNA is more likely to be replicated or passed on without repair, leading to the accumulation of damage or cell death, which is why radiation is effective against them."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
