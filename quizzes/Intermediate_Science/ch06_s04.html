        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 6, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines homeostasis?", "options": [{"text": "The process by which organisms adapt to environmental changes over generations.", "isCorrect": false, "rationale": "This describes evolution, not homeostasis, which refers to an individual organism's internal stability."}, {"text": "The maintenance of a completely unchanging internal state within an organism.", "isCorrect": false, "rationale": "Homeostasis is described as a 'dynamic equilibrium,' meaning conditions fluctuate within a normal range, rather than remaining perfectly static."}, {"text": "The process by which an organism maintains a relatively stable internal environment despite changes in external conditions.", "isCorrect": true, "rationale": "This accurately reflects the textbook's definition of homeostasis, emphasizing stability despite constant internal and external changes."}, {"text": "The rapid increase in a physiological response to an initial stimulus.", "isCorrect": false, "rationale": "This describes positive feedback, which is a mechanism of homeostasis but not the definition of homeostasis itself."}], "id": "q01"}, {"question": "The textbook describes homeostasis as a 'dynamic equilibrium.' What does this imply about the body's internal conditions?", "options": [{"text": "The body achieves a perfectly static internal state, eliminating all fluctuations.", "isCorrect": false, "rationale": "A 'static state' implies no movement, which contradicts the 'dynamic' nature of homeostasis where constant adjustments are made."}, {"text": "Internal conditions constantly change in response to external conditions without any regulation.", "isCorrect": false, "rationale": "This would lead to instability and disease, contradicting the purpose of homeostasis, which is active regulation."}, {"text": "The body continuously makes adjustments to keep internal conditions fluctuating within a narrow, normal range.", "isCorrect": true, "rationale": "Dynamic equilibrium means internal conditions are not static but are constantly monitored and adjusted to remain within an acceptable, healthy range, much like a tightrope walker."}, {"text": "All internal conditions are always at their maximum or minimum set points.", "isCorrect": false, "rationale": "Internal conditions are maintained around a set point, not constantly at extreme maximum or minimum values."}], "id": "q02"}, {"question": "According to the text, why is maintaining a stable internal environment (homeostasis) critical for cells?", "options": [{"text": "It prevents the body from expending unnecessary energy.", "isCorrect": false, "rationale": "While efficiency is a factor, the primary reason given is not energy expenditure but rather the functionality of cellular processes."}, {"text": "It ensures that cells have enough space to grow and divide.", "isCorrect": false, "rationale": "Space for cell growth and division is not the primary reason highlighted in the text for the importance of homeostasis."}, {"text": "It keeps conditions like temperature, pH, and ion concentration within narrow limits necessary for enzyme function and energy production.", "isCorrect": true, "rationale": "The text explicitly states that enzyme reactions depend on these conditions, and deviations can lead to enzymes denaturing or slowing down, impairing energy production."}, {"text": "It allows the body to rapidly adapt its genetic makeup to changing external conditions.", "isCorrect": false, "rationale": "Adapting genetic makeup refers to evolutionary processes, not the immediate physiological adjustments of homeostasis."}], "id": "q03"}, {"question": "A person's core body temperature begins to drop below the normal set point. Which of the following responses would constitute a negative feedback loop to restore temperature, as described in the text?", "options": [{"text": "Blood vessels near the skin surface dilate, and sweat glands produce perspiration.", "isCorrect": false, "rationale": "These responses occur when body temperature rises, to cool the body down. They would further lower temperature if it were already dropping."}, {"text": "The hypothalamus triggers vasodilation to increase heat loss, causing temperature to drop further.", "isCorrect": false, "rationale": "Vasodilation increases heat loss, which would amplify the drop in temperature, making it a positive, not negative, response to a falling temperature."}, {"text": "The hypothalamus triggers blood vessels near the skin to constrict, and skeletal muscles begin to shiver.", "isCorrect": true, "rationale": "Constriction of blood vessels reduces heat loss, and shivering generates heat, both of which work to raise body temperature back to the set point, thus reversing the initial drop."}, {"text": "The body increases its metabolic rate to produce more heat, causing internal temperature to rise uncontrollably.", "isCorrect": false, "rationale": "While increased metabolism generates heat, an 'uncontrollable' rise would imply a failure of the feedback loop to regulate, not a successful negative feedback mechanism."}], "id": "q04"}, {"question": "Which of the following scenarios is an example of a positive feedback loop, as described in the text?", "options": [{"text": "Your body sweats when it's hot to cool down to a normal temperature.", "isCorrect": false, "rationale": "Sweating is a response that reverses the initial change (heat), making it a negative feedback loop."}, {"text": "Insulin is released when blood sugar rises, causing cells to absorb glucose and lower blood sugar.", "isCorrect": false, "rationale": "This response brings blood sugar back down toward the set point, reversing the initial rise, which is characteristic of negative feedback."}, {"text": "During childbirth, uterine contractions intensify, leading to more oxytocin release and even stronger contractions until the baby is delivered.", "isCorrect": true, "rationale": "This is a classic example of positive feedback, where the initial stimulus (contractions/pressure) leads to a response (oxytocin release) that amplifies the original stimulus, pushing the process to completion."}, {"text": "When you are dehydrated, ADH causes kidneys to reabsorb more water, reducing the concentration of dissolved substances in the blood.", "isCorrect": false, "rationale": "ADH release reverses the dehydration by increasing water retention, making it a negative feedback loop."}], "id": "q05"}, {"question": "A key distinction between negative and positive feedback loops is that negative feedback loops __________, while positive feedback loops __________.", "options": [{"text": "are always beneficial; are always harmful.", "isCorrect": false, "rationale": "The terms 'negative' and 'positive' refer to the direction of the response relative to the stimulus, not their inherent benefit or harm. Both types are essential for bodily functions."}, {"text": "reverse the original change; amplify the original change.", "isCorrect": true, "rationale": "Negative feedback works to oppose and reduce the initial change, bringing the system back to a set point, while positive feedback enhances and intensifies the original change."}, {"text": "involve hormones; only involve nerve signals.", "isCorrect": false, "rationale": "Both types of feedback can involve hormones, nerve signals, or a combination of both for communication."}, {"text": "always have an endpoint; continue indefinitely.", "isCorrect": false, "rationale": "Positive feedback loops typically drive processes that need to be completed rapidly and always have an endpoint; if they continued indefinitely, they would be destructive. Negative feedback maintains a range, but also ceases when the set point is reached."}], "id": "q06"}, {"question": "After eating a large meal, a person's blood glucose levels rise. According to the text, what is the body's immediate homeostatic response to bring glucose levels back to normal?", "options": [{"text": "The pancreas releases glucagon, signaling the liver to break down glycogen.", "isCorrect": false, "rationale": "Glucagon is released when blood sugar is too low, and its function is to raise blood sugar, not lower it after a meal."}, {"text": "The liver converts more glucose into lipids for long-term storage.", "isCorrect": false, "rationale": "While the liver does store energy, the immediate response for excess glucose is to convert it into glycogen, signaled by insulin."}, {"text": "The pancreas releases insulin, signaling cells to absorb glucose from the blood and the liver to store it as glycogen.", "isCorrect": true, "rationale": "This correctly describes the negative feedback loop for high blood sugar: insulin lowers glucose by promoting cellular uptake and liver storage."}, {"text": "The hypothalamus triggers the sensation of thirst to dilute the blood glucose.", "isCorrect": false, "rationale": "Thirst is part of water balance (osmoregulation), not the primary response to high blood glucose after a meal."}], "id": "q07"}, {"question": "When you are dehydrated, the concentration of dissolved substances in your blood increases. Which hormone, described in the text, plays a key role in the body's homeostatic response to this change?", "options": [{"text": "Insulin", "isCorrect": false, "rationale": "Insulin is involved in blood sugar regulation, not water balance."}, {"text": "Oxytocin", "isCorrect": false, "rationale": "Oxytocin is involved in childbirth, a positive feedback loop, not water balance."}, {"text": "Glucagon", "isCorrect": false, "rationale": "Glucagon is involved in raising low blood sugar, not water balance."}, {"text": "Antidiuretic hormone (ADH)", "isCorrect": true, "rationale": "The text states that ADH is released from the pituitary gland in response to dehydration, causing kidneys to reabsorb more water and produce concentrated urine."}], "id": "q08"}, {"question": "Santiago Ramón y Cajal's work on the neuron doctrine, establishing neurons as individual units, is significant to understanding homeostasis because:", "options": [{"text": "His staining techniques directly showed how hormones like insulin regulate blood sugar.", "isCorrect": false, "rationale": "While significant, his work focused on the structure and function of the nervous system, not the direct action of hormones like insulin."}, {"text": "The nervous system, built of individual neurons, plays a crucial role in detecting changes and coordinating rapid homeostatic responses.", "isCorrect": true, "rationale": "The neuron doctrine provided the cellular foundation for understanding how the nervous system, a major control system, detects stimuli and coordinates responses for homeostasis."}, {"text": "He discovered the specific enzymes responsible for maintaining pH balance within cells.", "isCorrect": false, "rationale": "His research was centered on the nervous system's cellular structure, not enzyme chemistry for pH balance."}, {"text": "His research proved that a static internal environment is impossible to achieve.", "isCorrect": false, "rationale": "While relevant to the concept of dynamic equilibrium, Cajal's specific contribution was about the cellular basis of nervous system control, not directly on the 'static vs. dynamic' debate."}], "id": "q09"}, {"question": "The textbook mentions Diabetes Mellitus as an example of homeostasis failure. Which statement accurately describes *why* diabetes represents a failure of homeostasis in the context of the provided text?", "options": [{"text": "The body overproduces glucose, leading to excessive energy levels that cannot be stored.", "isCorrect": false, "rationale": "The problem isn't necessarily overproduction of glucose but rather the body's inability to regulate existing glucose levels effectively due to insulin issues."}, {"text": "The immune system mistakenly attacks and destroys healthy cells in the pancreas (Type 1) or body cells fail to respond to insulin (Type 2), leading to dangerously high blood sugar.", "isCorrect": true, "rationale": "This accurately describes the two main types of diabetes as presented in the text, highlighting the failure of insulin signaling to regulate blood sugar, causing a breakdown in glucose homeostasis."}, {"text": "Blood clotting mechanisms become overactive, leading to excessive clot formation and blocked vessels.", "isCorrect": false, "rationale": "This describes a failure in blood clotting homeostasis, which is a different system than blood sugar regulation and diabetes."}, {"text": "The hypothalamus loses its ability to regulate body temperature, causing constant fevers or hypothermia.", "isCorrect": false, "rationale": "This describes a failure in thermoregulation, not blood sugar regulation or diabetes."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
