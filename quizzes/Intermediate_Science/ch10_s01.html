    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is the core unifying principle presented in the text as one of the most powerful ideas in all of science?", "options": [{"text": "Energy can neither be created nor destroyed.", "isCorrect": false, "rationale": "While a powerful principle in science (Law of Conservation of Energy), this is not the specific core idea highlighted in the provided text."}, {"text": "Structure determines function.", "isCorrect": true, "rationale": "The text explicitly states this as 'One of the most powerful ideas in all of science can be stated in just three words: structure determines function.'"}, {"text": "The universe is constantly expanding.", "isCorrect": false, "rationale": "This is a significant cosmological concept, but it is not the unifying principle discussed in the context of biology, geology, chemistry, and physics in this section."}, {"text": "All living organisms are composed of cells.", "isCorrect": false, "rationale": "This is a fundamental concept in biology (Cell Theory), but the text presents a broader, interdisciplinary principle as the core idea."}], "id": "q01"}, {"question": "A scientist discovers a new type of muscle cell with significantly more protein filaments packed into its structure compared to typical muscle cells. Based on the principle of structure determines function, what might the scientist infer about this new cell's capability?", "options": [{"text": "It is likely specialized for faster electrical signal transmission.", "isCorrect": false, "rationale": "Faster electrical signal transmission is characteristic of nerve cells (axons), not typically enhanced by more protein filaments in muscle cells."}, {"text": "It probably has an enhanced capacity to generate contractile force.", "isCorrect": true, "rationale": "The text states, 'A muscle cell is packed with protein filaments that slide past each other to generate the force of contraction.' More filaments would imply a greater capacity for force generation."}, {"text": "It is designed to maximize surface area for nutrient absorption.", "isCorrect": false, "rationale": "Maximizing surface area for absorption is a function related to structures like villi in the small intestine or alveoli in the lungs, not specifically increased protein filaments in muscle cells."}, {"text": "It functions primarily in the production and secretion of hormones.", "isCorrect": false, "rationale": "Hormone production and secretion are functions of endocrine cells, which have different structural specializations like extensive endoplasmic reticulum and Golgi apparatus."}], "id": "q02"}, {"question": "The text describes a red blood cell as a flattened, biconcave disc with no nucleus. How do these structural features primarily contribute to its function?", "options": [{"text": "The biconcave shape prevents the cell from rupturing under pressure.", "isCorrect": false, "rationale": "While red blood cells are robust, the biconcave shape's primary functional advantage, as stated, relates to surface area for gas exchange, not solely pressure resistance."}, {"text": "The absence of a nucleus allows more room for hemoglobin, and the biconcave shape maximizes surface area for gas exchange.", "isCorrect": true, "rationale": "The text explicitly states that the biconcave shape 'maximizes the surface area available for oxygen to diffuse in and out,' and 'the absence of a nucleus leaves more room for hemoglobin, the oxygen-carrying protein.'"}, {"text": "The flattened disc shape enables the cell to produce its own energy more efficiently.", "isCorrect": false, "rationale": "Red blood cells primarily rely on anaerobic respiration for energy, and their shape is not directly linked to energy production efficiency in this way."}, {"text": "The biconcave shape and lack of nucleus make the cell less visible to pathogens.", "isCorrect": false, "rationale": "This is not the described functional advantage of these structural features; their primary role is related to oxygen transport."}], "id": "q03"}, {"question": "Which geological feature is typically associated with a convergent plate boundary where oceanic crust subducts beneath continental crust, as described in the text?", "options": [{"text": "Mid-ocean ridge and new crust formation.", "isCorrect": false, "rationale": "Mid-ocean ridges and new crust formation occur at divergent plate boundaries where plates pull apart."}, {"text": "Rift valleys on land.", "isCorrect": false, "rationale": "Rift valleys are characteristic of divergent boundaries on land."}, {"text": "Trenches, volcanic arcs, and mountain ranges.", "isCorrect": true, "rationale": "The text states, 'At a convergent boundary where oceanic crust meets continental crust... this subduction zone produces a trench, a volcanic arc, and eventually a mountain range like the Andes.'"}, {"text": "Extensive fault systems and frequent earthquakes without volcanism.", "isCorrect": false, "rationale": "This description aligns with a transform plate boundary, where plates slide horizontally past each other."}], "id": "q04"}, {"question": "Imagine a newly discovered planetary body where geologists observe vast canyons similar to rift valleys and signs of new crust forming. Applying the structure determines function principle from Earth Science, what type of plate movement would they infer is occurring?", "options": [{"text": "Plates are sliding horizontally past each other.", "isCorrect": false, "rationale": "Horizontal sliding occurs at transform boundaries, which cause faults and earthquakes, not rift valleys or new crust formation."}, {"text": "One plate is subducting beneath another.", "isCorrect": false, "rationale": "Subduction occurs at convergent boundaries, leading to trenches, volcanic arcs, and mountain ranges, not rift valleys or new crust formation."}, {"text": "Plates are pulling apart from each other.", "isCorrect": true, "rationale": "The text states, 'At a divergent boundary, plates pull apart. The structural result is a rift valley on land or a mid-ocean ridge underwater, where new crust forms as magma rises from the mantle.' This directly matches the observed features."}, {"text": "Two continental plates are colliding, forming a large mountain range.", "isCorrect": false, "rationale": "Continental-continental collision at convergent boundaries forms large mountain ranges, but not rift valleys or new crust formation in the same manner as divergent boundaries."}], "id": "q05"}, {"question": "Sodium (Na) is described as having one valence electron, which makes it a highly reactive metal. Chlorine (Cl) has seven valence electrons, making it readily gain one electron. How does the 'structure determines function' principle explain their interaction?", "options": [{"text": "Their similar atomic masses cause them to repel each other.", "isCorrect": false, "rationale": "Atomic mass is not the primary structural feature determining chemical reactivity or bonding as described in the text. Similar masses would not cause repulsion."}, {"text": "The structural complementarity of their electron configurations drives them to react, forming an ionic compound.", "isCorrect": true, "rationale": "The text states, 'When sodium and chlorine meet, the structural complementarity of their electron configurations drives them to react, forming the ionic compound NaCl.' Sodium readily loses one, chlorine readily gains one, fulfilling their valence shell needs."}, {"text": "Their identical number of protons leads to a strong covalent bond.", "isCorrect": false, "rationale": "Sodium and chlorine have different numbers of protons. Also, they form an ionic, not covalent, bond due to electron transfer."}, {"text": "Their large atomic radii facilitate the formation of a metallic lattice.", "isCorrect": false, "rationale": "Sodium is a metal, but chlorine is a nonmetal, so they don't form a metallic lattice together. Also, their specific atomic radii are not the primary drivers of this specific reaction type as explained."}], "id": "q06"}, {"question": "According to the text, what structural feature of an atom is the most direct determinant of its chemical behavior, such as reactivity and bonding preferences?", "options": [{"text": "The total number of protons in its nucleus (atomic number).", "isCorrect": false, "rationale": "The atomic number defines the element, but the text specifies that chemical behavior is determined by electron configuration, particularly valence electrons, which are a consequence of the atomic number but the direct cause of chemical behavior."}, {"text": "The number of neutrons in its nucleus (isotope).", "isCorrect": false, "rationale": "The number of neutrons primarily affects an atom's mass and nuclear stability (isotopes), but generally not its chemical reactivity or bonding preferences."}, {"text": "Its electron configuration, specifically the number of valence electrons.", "isCorrect": true, "rationale": "The text explicitly states: 'But the chemical behavior of an element — its reactivity, its bonding preferences, the types of compounds it forms — is determined by another structural feature: its electron configuration, and specifically the number of valence electrons.'"}, {"text": "Its overall atomic mass.", "isCorrect": false, "rationale": "Atomic mass is a result of protons, neutrons, and electrons, but it's not the direct structural feature that dictates chemical behavior in the same way valence electrons do."}], "id": "q07"}, {"question": "A free-body diagram for a car shows a large forward force from the engine and a smaller backward force from air resistance, with no other horizontal forces. Applying the principle of 'structure determines function' to forces and motion, what 'function' (motion) would you expect for the car?", "options": [{"text": "The car will remain at rest.", "isCorrect": false, "rationale": "The car would only remain at rest if the net force were zero, which is not the case here (forward force > backward force)."}, {"text": "The car will accelerate in the backward direction.", "isCorrect": false, "rationale": "Acceleration occurs in the direction of the net force. Since the forward force is larger, the net force is forward."}, {"text": "The car will move at a constant velocity.", "isCorrect": false, "rationale": "Constant velocity implies zero net force. Here, there is a net forward force, so the car will accelerate."}, {"text": "The car will accelerate in the forward direction.", "isCorrect": true, "rationale": "The text states, 'The directions and magnitudes of the forces in the diagram determine whether the object accelerates, decelerates, moves in a circle, or remains at rest.' With a larger forward force than backward, there is a net forward force, causing acceleration in the forward direction according to Newton's Second Law (F_net = ma)."}], "id": "q08"}, {"question": "A car designer arranges the structure of crumple zones within a vehicle. How does this decision exemplify the 'structure determines function' principle in physics?", "options": [{"text": "The crumple zones are designed to remain rigid, preventing any deformation of the car's exterior.", "isCorrect": false, "rationale": "Crumple zones are designed to deform (crumple) in a controlled way, not to remain rigid. Rigidity would transmit more force to passengers."}, {"text": "The crumple zones' structure is arranged so that in a collision, the forces function to protect passengers by absorbing and dissipating energy.", "isCorrect": true, "rationale": "The text directly states: 'A car designer arranges the structure of crumple zones so that in a collision, the forces function to protect passengers.' This protection is achieved by the zones deforming and absorbing kinetic energy, thereby reducing the force on the occupants."}, {"text": "The crumple zones ensure the car maintains its aesthetic appeal after a minor impact.", "isCorrect": false, "rationale": "While aesthetics might be a consideration, the primary function of crumple zones is safety, not maintaining appearance after a collision."}, {"text": "The structural arrangement of crumple zones is primarily for reducing the car's overall weight.", "isCorrect": false, "rationale": "Reducing weight is a goal in car design, but the specific purpose of crumple zone structure is to manage crash forces for passenger safety, not primarily weight reduction."}], "id": "q09"}, {"question": "The 'Think Deeper' section connects the lungs (many alveoli for gas exchange) to a catalytic converter (honeycomb structure for chemical reactions). What is the overarching concept that makes these two examples, from different scientific branches, analogous?", "options": [{"text": "Both involve the efficient transfer of heat through convection.", "isCorrect": false, "rationale": "While heat transfer might occur, the analogy specifically highlighted in the text and teacher note is about maximizing surface area for their respective functions, not heat convection."}, {"text": "They both demonstrate the importance of biological evolution in optimizing natural structures.", "isCorrect": false, "rationale": "Biological evolution applies to the lungs, but a catalytic converter is an engineered device, not a product of biological evolution. The connection is broader than just biology."}, {"text": "They both illustrate how increasing surface area through a specific structure can enhance a particular function.", "isCorrect": true, "rationale": "The teacher note specifically mentions 'the lungs (many alveoli create a large surface area for gas exchange) to a catalytic converter (a honeycomb structure creates a large surface area for chemical reactions).' This directly illustrates how a specific structure (large surface area) determines a particular function (gas exchange/chemical reactions)."}, {"text": "The examples show how organisms and machines can achieve perfect efficiency in their operations.", "isCorrect": false, "rationale": "The examples illustrate functional optimization, not necessarily 'perfect efficiency,' and the core principle is about structure's role, not efficiency itself as the primary analogy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
