<script>
var QUESTIONS = [{"question": "Which piece of information found in a typical periodic table entry is *most critical* for defining an element's unique identity?", "options": [{"text": "Element symbol", "isCorrect": false, "rationale": "While unique to an element, the symbol is merely a representation; the atomic number is the fundamental identifier. Different elements can have similar symbols (e.g., Co for Cobalt, Cu for Copper)."}, {"text": "Atomic number", "isCorrect": true, "rationale": "The text states, 'Atomic number — the number of protons in the nucleus. This defines the element. All carbon atoms have 6 protons; all iron atoms have 26.' This explicitly identifies the atomic number as the defining characteristic."}, {"text": "Average atomic mass", "isCorrect": false, "rationale": "Average atomic mass accounts for isotopes, meaning atoms of the same element can have different masses. Therefore, mass does not uniquely define an element; atomic number does."}, {"text": "Element name", "isCorrect": false, "rationale": "The element name is a common label for the element, but it is not the fundamental property that defines its identity at the atomic level. The atomic number dictates the name."}]}, {"question": "An element is located in Period 4 and Group 2 of the periodic table. Which of the following statements about this element is correct?", "options": [{"text": "It has 4 valence electrons and occupies 2 electron energy levels.", "isCorrect": false, "rationale": "Group 2 indicates 2 valence electrons, and Period 4 indicates 4 occupied electron energy levels. This option reverses those properties."}, {"text": "It has 2 valence electrons and occupies 4 electron energy levels.", "isCorrect": true, "rationale": "The text states, 'Its group number (column) tells you how many valence electrons it has (for main-group elements: Group 2 has 2).' It also states, 'Its period number (row) tells you how many electron energy levels it has.' Thus, Period 4 means 4 energy levels, and Group 2 means 2 valence electrons."}, {"text": "It is a nonmetal that forms a -2 ion.", "isCorrect": false, "rationale": "Group 2 elements are metals and tend to lose 2 electrons, forming a +2 ion, not a -2 ion. Nonmetals are typically found on the right side of the periodic table."}, {"text": "It is a metalloid with an unstable electron configuration.", "isCorrect": false, "rationale": "Group 2 elements are typically metals, not metalloids, which are found along the staircase line. All elements strive for a stable configuration, and while Group 2 elements are reactive, they achieve stability by forming ions."}]}, {"question": "Based on the octet rule for main-group elements, which of the following elements would typically form an ion with a -1 charge?", "options": [{"text": "An element in Group 1", "isCorrect": false, "rationale": "Group 1 metals lose 1 electron to achieve stability, forming a +1 ion."}, {"text": "An element in Group 13", "isCorrect": false, "rationale": "Group 13 metals lose 3 electrons to achieve stability, forming a +3 ion."}, {"text": "An element in Group 17", "isCorrect": true, "rationale": "The text states, 'Group 17 nonmetals gain 1 electron $$ charge $-1$ (e.g., Cl-).' They do this to achieve a stable octet, matching the noble gas configuration."}, {"text": "An element in Group 18", "isCorrect": false, "rationale": "Group 18 noble gases are already stable with a full octet and neither gain nor lose electrons, meaning they typically do not form ions with a charge."}]}, {"question": "A main-group element has an electron configuration of 2, 8, 3. Based on this information and the text, where would you locate this element on the periodic table?", "options": [{"text": "Period 2, Group 13", "isCorrect": false, "rationale": "An electron configuration of 2, 8, 3 indicates three electron energy levels (shells), placing it in Period 3, not Period 2. Group 13 is correct for 3 valence electrons."}, {"text": "Period 3, Group 3", "isCorrect": false, "rationale": "While Period 3 is correct (three energy levels), Group 3 is typically where transition metals begin. For main-group elements, 3 valence electrons correspond to Group 13, not Group 3."}, {"text": "Period 3, Group 13", "isCorrect": true, "rationale": "The electron configuration 2, 8, 3 indicates three occupied energy levels (2 in the first, 8 in the second, 3 in the third), which means the element is in Period 3. The 3 valence electrons in the outermost shell correspond to Group 13 for main-group elements (Groups 13–18 have 3–8 valence electrons)."}, {"text": "Period 8, Group 3", "isCorrect": false, "rationale": "An electron configuration of 2, 8, 3 only has three energy levels, not eight. Also, 3 valence electrons would be Group 13, not Group 3, for a main-group element."}]}, {"question": "An element has two stable isotopes: Isotope A with a mass of 69 amu and Isotope B with a mass of 71 amu. If the average atomic mass listed on the periodic table is 69.723 amu, what can be inferred about the natural abundance of these isotopes?", "options": [{"text": "Isotope A and Isotope B are present in approximately equal amounts.", "isCorrect": false, "rationale": "If the isotopes were present in equal amounts, the average atomic mass would be exactly (69+71)/2 = 70 amu. The actual average is closer to 69."}, {"text": "Isotope B is significantly more abundant than Isotope A.", "isCorrect": false, "rationale": "If Isotope B (71 amu) were significantly more abundant, the average atomic mass would be closer to 71 amu, not 69.723 amu."}, {"text": "The average atomic mass calculation is flawed because it should be an integer.", "isCorrect": false, "rationale": "The text clearly states that average atomic mass is a 'weighted average of the masses of all naturally occurring isotopes' and is measured in amu, often resulting in non-integer values due to the averaging and different isotope masses."}, {"text": "Isotope A is significantly more abundant than Isotope B.", "isCorrect": true, "rationale": "The average atomic mass (69.723 amu) is much closer to 69 amu (Isotope A) than to 71 amu (Isotope B). This indicates that Isotope A, with the lower mass, makes up a larger percentage of the naturally occurring atoms of that element, pulling the weighted average closer to its mass. This directly relates to the 'Common Error' discussed in the text regarding weighted averages."}]}, {"question": "According to Henry Moseley's work, which of the following statements best describes his fundamental contribution to the organization of the periodic table?", "options": [{"text": "He discovered the existence of isotopes, explaining variations in atomic mass.", "isCorrect": false, "rationale": "While isotopes are important, Moseley's work focused on atomic number. The concept of isotopes was developed earlier by Frederick Soddy."}, {"text": "He accurately predicted the chemical properties of undiscovered elements based on their position.", "isCorrect": false, "rationale": "Mendeleev did this with his initial periodic table. Moseley's work confirmed the underlying principle that enabled such predictions, but this wasn't his primary contribution."}, {"text": "He established that atomic number, not atomic mass, is the fundamental property determining an element's identity and periodic table position.", "isCorrect": true, "rationale": "The 'Henry Moseley' section explicitly states, 'His results proved that atomic number, not atomic mass, is the fundamental property that determines an element's identity and position in the periodic table,' and that his work 'resolved several long-standing puzzles, including the tellurium–iodine reversal' which arose from organizing by mass."}, {"text": "He created the first periodic table arranged by increasing atomic mass.", "isCorrect": false, "rationale": "Dmitri Mendeleev is credited with creating the first widely accepted periodic table, which was primarily arranged by increasing atomic mass."}]}, {"question": "Understanding an element's common oxidation states is described as essential for future topics. Which of the following is *not* listed as a future application of oxidation states in the text?", "options": [{"text": "Balancing chemical equations", "isCorrect": false, "rationale": "The text states, 'in Unit 18, where you will use them to balance chemical equations.'"}, {"text": "Predicting how atoms bond together", "isCorrect": false, "rationale": "The text states, 'in Unit 13, where you will use them to predict how atoms bond together.'"}, {"text": "Determining an element's exact atomic mass", "isCorrect": true, "rationale": "Oxidation states describe charges in compounds, not the exact atomic mass, which is determined by isotopes and their abundances. The text does not mention this as an application."}, {"text": "Predicting ion charges for main-group elements", "isCorrect": false, "rationale": "The section explicitly links oxidation states to 'the charge it takes on when it forms compounds,' which directly relates to predicting ion charges for main-group elements based on the octet rule."}]}, {"question": "Which statement accurately describes the difference between an element's average atomic mass and its atomic number, as presented in the text?", "options": [{"text": "Atomic number represents the number of electrons, while average atomic mass represents the sum of protons and neutrons.", "isCorrect": false, "rationale": "Atomic number is the number of protons, not electrons (in neutral atoms they are equal, but protons define the element). Average atomic mass is a weighted average of isotope masses, not simply a sum of protons and neutrons for a single atom."}, {"text": "Atomic number defines the element's identity, whereas average atomic mass is a weighted average of its isotopes' masses.", "isCorrect": true, "rationale": "The text clearly states, 'Atomic number — the number of protons in the nucleus. This defines the element.' It also defines average atomic mass as 'the weighted average of the masses of all naturally occurring isotopes.' This option correctly distinguishes between the two."}, {"text": "Average atomic mass determines an element's position on the periodic table, while atomic number indicates its reactivity.", "isCorrect": false, "rationale": "Henry Moseley's work proved that atomic number, not mass, determines position. Atomic number does not directly indicate reactivity; group and period position are better indicators."}, {"text": "Atomic number is always a whole number, but average atomic mass is always a fractional number.", "isCorrect": false, "rationale": "While atomic number is always a whole number, average atomic mass is usually a fractional number due to weighting. However, the 'always' for fractional numbers isn't universally true (e.g., if an element only has one isotope or if the average happens to be an integer), and this statement focuses on numerical form rather than fundamental definition."}]}, {"question": "A hypothetical element, 'Mysterium' (My), is a nonmetal located in Period 2. It typically gains 3 electrons to achieve a stable octet. Based on the provided section, what is its most likely group number?", "options": [{"text": "Group 1", "isCorrect": false, "rationale": "Group 1 elements are metals and lose 1 electron, forming a +1 ion, not gaining 3."}, {"text": "Group 13", "isCorrect": false, "rationale": "Group 13 elements are metals (or metalloids like Boron) and typically lose 3 electrons, forming a +3 ion, not gaining 3."}, {"text": "Group 15", "isCorrect": true, "rationale": "The text states, 'Group 15 nonmetals gain 3 electrons $$ charge $-3$.' Since Mysterium is a nonmetal in Period 2 and gains 3 electrons, Group 15 is the correct placement."}, {"text": "Group 17", "isCorrect": false, "rationale": "Group 17 nonmetals gain 1 electron to achieve stability, forming a -1 ion, not gaining 3."}]}, {"question": "The 'Periodic Table Scavenger Hunt' activity provided a clue: 'I have 20 protons and form a +2 ion. I am essential for building strong bones.' Based on the information presented in the section, what information from the periodic table square and its position would allow you to identify this element?", "options": [{"text": "The element's symbol and average atomic mass.", "isCorrect": false, "rationale": "The number of protons (atomic number) is directly given, which defines the element. While symbol and atomic mass are present, they are not the primary identifiers here. Forming a +2 ion implies Group 2, but the atomic number is more direct."}, {"text": "Its period number and whether it is a metal or nonmetal.", "isCorrect": false, "rationale": "While forming a +2 ion suggests it's a metal, and its period could be deduced from electron configuration, the most direct piece of information given (20 protons) is the atomic number, which uniquely identifies the element."}, {"text": "Its atomic number and its predicted ion charge based on its group.", "isCorrect": true, "rationale": "The clue explicitly states '20 protons,' which is the atomic number, directly identifying the element (Calcium). The fact that it forms a '+2 ion' is consistent with its position in Group 2, confirming the identification and demonstrating knowledge of predicting ion charges from the periodic table."}, {"text": "Its electron configuration (e.g., 2, 8, 8, 2) and its element name.", "isCorrect": false, "rationale": "While the electron configuration (2, 8, 8, 2 for Calcium) and element name are properties of the element, the clue '20 protons' directly provides the atomic number, which is the most efficient and fundamental way to identify it from the periodic table as described in the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
