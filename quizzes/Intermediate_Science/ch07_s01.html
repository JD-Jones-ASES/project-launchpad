        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the core idea of Alfred Wegener's hypothesis of continental drift?", "options": [{"text": "That Earth's climate has remained constant over geological time.", "isCorrect": false, "rationale": "Wegener's hypothesis dealt with the movement of continents, not the constancy of Earth's climate. In fact, his glacial evidence implied past climate shifts."}, {"text": "That Earth's continents are not fixed in place but have moved slowly across the planet's surface over hundreds of millions of years.", "isCorrect": true, "rationale": "This accurately defines continental drift as stated in the text: 'the idea that Earth's continents are not fixed in place but have moved slowly across the planet's surface over hundreds of millions of years.'"}, {"text": "That all landmasses are gradually sinking into the oceans due to erosion.", "isCorrect": false, "rationale": "Wegener's hypothesis was about horizontal movement of continents, not sinking due to erosion."}, {"text": "That Earth's magnetic poles have frequently reversed their positions.", "isCorrect": false, "rationale": "Magnetic pole reversals are a separate geological phenomenon related to plate tectonics, but not the core idea of Wegener's original continental drift hypothesis."}], "id": "q01"}, {"question": "Wegener theorized that all continents were once part of a single supercontinent. What did he name this landmass?", "options": [{"text": "Gondwanaland", "isCorrect": false, "rationale": "Gondwanaland was a southern supercontinent formed later in geological history, but Pangaea was the original, all-encompassing supercontinent Wegener proposed."}, {"text": "Laurasia", "isCorrect": false, "rationale": "Laurasia was a northern supercontinent that formed after Pangaea began to break apart."}, {"text": "Atlantis", "isCorrect": false, "rationale": "Atlantis is a mythical island, not a scientific name for a supercontinent proposed by Wegener."}, {"text": "Pangaea", "isCorrect": true, "rationale": "The text explicitly states: 'Wegener proposed that all the continents were once united in a single supercontinent he called Pangaea (from the Greek for “all lands”).'"}], "id": "q02"}, {"question": "The discovery of identical fossils of freshwater reptiles like Mesosaurus on continents now separated by vast oceans is significant because it:", "options": [{"text": "Proved that these animals could swim across entire oceans.", "isCorrect": false, "rationale": "The text explicitly states that Mesosaurus was a 'freshwater animal that could not have swum across the salty Atlantic Ocean,' making this option incorrect."}, {"text": "Suggested that continents currently separated were once connected, providing a land bridge for species.", "isCorrect": true, "rationale": "The text uses this evidence to argue that 'the simplest explanation was that these continents were once connected,' allowing land-dwelling or freshwater species to spread before separation."}, {"text": "Indicated a uniform global climate during the time Mesosaurus lived.", "isCorrect": false, "rationale": "While fossil distribution can sometimes provide climate clues, the primary significance of Mesosaurus fossils in this context is evidence for continental connection, not global climate uniformity."}, {"text": "Provided evidence for deep-ocean currents facilitating species migration.", "isCorrect": false, "rationale": "The text states the animal could not have swum across the salty ocean, ruling out migration via ocean currents for this specific freshwater species."}], "id": "q03"}, {"question": "The primary reason the scientific community initially rejected Wegener's hypothesis was that he:", "options": [{"text": "Lacked sufficient observational evidence for continental movement.", "isCorrect": false, "rationale": "The text states Wegener compiled 'a wide range of evidence' and had 'impressive evidence,' making this incorrect. The issue was not a lack of evidence that it happened, but how it happened."}, {"text": "Could not provide a plausible mechanism to explain how continents moved.", "isCorrect": true, "rationale": "The text clearly states, 'Wegener could not explain how continents moved. What force could possibly push enormous landmasses through the solid rock of the ocean floor? Without a plausible mechanism, most scientists dismissed the idea.'"}, {"text": "Was not a trained geologist, leading to professional bias against his ideas.", "isCorrect": false, "rationale": "While the 'Teacher Note' mentions professional bias as a possible factor, the primary stated reason in the main text for rejection was the lack of a mechanism."}, {"text": "Proposed a supercontinent that contradicted existing geological maps.", "isCorrect": false, "rationale": "The idea of Pangaea was revolutionary but did not contradict existing maps; rather, it reinterpreted the relationships shown on them."}], "id": "q04"}, {"question": "How has modern technology improved upon Wegener's original observation of continental fit?", "options": [{"text": "By confirming that current coastlines provide the most accurate fit.", "isCorrect": false, "rationale": "The text states that modern analyses use 'the edges of the continental shelves rather than the current coastlines,' implying current coastlines are not the best fit."}, {"text": "By demonstrating that the continents have not actually moved over time.", "isCorrect": false, "rationale": "Modern technology has strengthened the evidence for movement, not disproven it."}, {"text": "By using the edges of the continental shelves, rather than current coastlines, to show an even better fit.", "isCorrect": true, "rationale": "The text specifically mentions, 'Modern computer analyses, using the edges of the continental shelves rather than the current coastlines, show an even better fit.'"}, {"text": "By revealing that the best fit occurs when continents are rotated 180 degrees from their present positions.", "isCorrect": false, "rationale": "There is no information in the text to support rotation by 180 degrees. The fit is based on reassembling them more directly."}], "id": "q05"}, {"question": "The alignment of mountain ranges and matching rock formations across continents, such as the Appalachians and Caledonian Mountains, provides evidence for continental drift by suggesting:", "options": [{"text": "These mountains formed independently but coincidently at the same time.", "isCorrect": false, "rationale": "The precise matching of 'rock types, ages, and structural features' makes coincidence highly improbable; Wegener's hypothesis offers a simpler explanation."}, {"text": "They were once parts of a single, continuous mountain chain that was later split apart.", "isCorrect": true, "rationale": "The text explicitly states: 'The rock types, ages, and structural features on both sides match so closely that geologists believe they were once parts of a single continuous mountain chain that was split apart when the continents separated.'"}, {"text": "Similar climatic conditions led to similar mountain-building processes globally.", "isCorrect": false, "rationale": "Mountain formation is primarily driven by tectonic forces, not climate, and similar climate would not explain the precise geological matches."}, {"text": "Erosion patterns caused by ancient super-rivers created the matching features.", "isCorrect": false, "rationale": "Erosion shapes landforms but does not create matching deep geological structures and rock types over vast distances on separate continents in the way mountain-building processes do."}], "id": "q06"}, {"question": "Imagine a geologist discovers distinctive rock formations and striations indicative of past glacial activity in a region currently experiencing a tropical climate. This discovery would primarily support which aspect of Wegener's hypothesis?", "options": [{"text": "The idea that Earth's overall climate has significantly cooled over geological time.", "isCorrect": false, "rationale": "While Earth's climate has changed, the specific evidence of glaciation in a now-tropical zone is more directly explained by continental movement than a general global cooling, especially when other continents show similar evidence for a unified polar ice sheet."}, {"text": "The existence of Pangaea, with these continents once positioned closer to a pole.", "isCorrect": true, "rationale": "The text explains: 'But if these continents were once assembled near the South Pole as part of Pangaea, the glacial evidence makes perfect sense.' This directly links ancient glaciation in present-day warm areas to their past positions in Pangaea."}, {"text": "The theory that meteor impacts can drastically alter local climates.", "isCorrect": false, "rationale": "The text does not mention meteor impacts, and this would not explain widespread ancient glacial features across multiple continents."}, {"text": "The hypothesis that glaciers can form in tropical regions under extreme conditions.", "isCorrect": false, "rationale": "While high-altitude glaciers exist in tropics, the evidence discussed by Wegener (massive ice sheets, polished bedrock, till) implies a significant, widespread glacial period consistent with polar proximity, not just localized extreme conditions."}], "id": "q07"}, {"question": "Which forces did Wegener incorrectly propose as the driving mechanisms for continental movement?", "options": [{"text": "Volcanic eruptions and earthquake activity.", "isCorrect": false, "rationale": "While volcanic eruptions and earthquakes are associated with plate tectonics, Wegener did not propose them as the primary driving forces for continental drift."}, {"text": "Convection currents in Earth's mantle.", "isCorrect": false, "rationale": "Convection currents in the mantle are the *actual* mechanism, discovered decades later as part of seafloor spreading, which Wegener was missing."}, {"text": "Tidal forces and the centrifugal effect of Earth's rotation.", "isCorrect": true, "rationale": "The text states: 'Wegener suggested that continents plowed through the oceanic crust like icebreakers through sea ice, driven by tidal forces and the centrifugal effect of Earth's rotation. But physicists quickly showed that these forces were far too weak to move continents.'"}, {"text": "Gravitational pull from the moon and sun.", "isCorrect": false, "rationale": "While the moon and sun exert gravitational pull, Wegener specifically cited 'tidal forces' (which are related to gravity) and the centrifugal effect, not just general gravitational pull."}], "id": "q08"}, {"question": "Wegener's story, where a hypothesis with strong evidence was initially rejected due to a lack of mechanism, illustrates a key principle about the nature of science. What does this principle emphasize?", "options": [{"text": "That scientific theories are rarely challenged once established.", "isCorrect": false, "rationale": "Wegener's hypothesis *was* challenged and rejected, demonstrating that even established ideas can be questioned, and new ones face scrutiny. This option contradicts the lesson of his story."}, {"text": "The importance of a credible and testable mechanism in addition to observational evidence for scientific acceptance.", "isCorrect": true, "rationale": "The text states: 'This episode illustrates an important principle in the nature of science: a hypothesis can have strong observational evidence and still be rejected if it lacks a credible mechanism. Scientists do not accept ideas simply because the evidence is suggestive — they require a testable, physically plausible explanation for how something happens.'"}, {"text": "That personal biases always prevent new scientific ideas from being accepted.", "isCorrect": false, "rationale": "While the 'Teacher Note' mentions professional biases, the primary lesson highlighted in the main text is about the *need for a mechanism*, and science eventually self-corrected, implying biases aren't always a permanent barrier."}, {"text": "The superiority of qualitative observations over quantitative measurements in geology.", "isCorrect": false, "rationale": "The text does not make a judgment on qualitative vs. quantitative methods; rather, it highlights the necessity of a 'physically plausible explanation' regardless of the evidence type."}], "id": "q09"}, {"question": "What crucial scientific discovery, made decades after Wegener's death, provided the missing mechanism for continental movement and ultimately led to the acceptance of his core idea within the theory of plate tectonics?", "options": [{"text": "The accurate mapping of ocean currents.", "isCorrect": false, "rationale": "While understanding ocean currents is important for oceanography, it did not provide the mechanism for large-scale continental movement."}, {"text": "The measurement of Earth's exact circumference.", "isCorrect": false, "rationale": "Earth's circumference was known long before Wegener, and its precise measurement does not explain continental movement."}, {"text": "The discovery of seafloor spreading.", "isCorrect": true, "rationale": "The text explicitly states: 'It was not until the 1960s, more than three decades after his death, that the discovery of seafloor spreading provided the mechanism Wegener had been missing, and the theory of plate tectonics transformed his rejected hypothesis into the foundation of modern earth science.'"}, {"text": "Evidence of widespread ancient volcanic super-eruptions.", "isCorrect": false, "rationale": "Volcanic activity is a consequence of plate tectonics, but the specific *mechanism* for continental movement was seafloor spreading, which explains *how* new crust is generated and continents move."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
