        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 9, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following equations correctly represents Newton's Second Law of Motion?", "options": [{"text": "F_net = m/a", "isCorrect": false, "rationale": "This formula incorrectly divides mass by acceleration, which is not Newton's Second Law. The net force is directly proportional to mass and acceleration."}, {"text": "F_net = ma", "isCorrect": true, "rationale": "The text explicitly states: 'Newton's second law... In equation form: F_net = ma'."}, {"text": "a = F_net ⋅ m", "isCorrect": false, "rationale": "This formula incorrectly multiplies force by mass to find acceleration; the correct relationship derived from Newton's Second Law is a = F_net / m."}, {"text": "m = F_net ⋅ a", "isCorrect": false, "rationale": "This formula incorrectly multiplies force by acceleration to find mass; the correct relationship derived from Newton's Second Law is m = F_net / a."}]}, {"question": "If the net force acting on an object is doubled while its mass is kept constant, what happens to its acceleration?", "options": [{"text": "It is halved.", "isCorrect": false, "rationale": "Acceleration is directly proportional to net force. Halving would occur if the force were halved, or if the mass were doubled while force remained constant."}, {"text": "It remains the same.", "isCorrect": false, "rationale": "A change in net force (with constant mass) will always result in a change in acceleration, as per F_net = ma."}, {"text": "It doubles.", "isCorrect": true, "rationale": "The text states: 'Direct proportionality between force and acceleration. If you double the net force on an object (keeping mass constant), the acceleration doubles.'"}, {"text": "It quadruples.", "isCorrect": false, "rationale": "Quadrupling would occur if the net force was quadrupled, not doubled."}]}, {"question": "According to Newton's Second Law, the direction of an object's acceleration is always:", "options": [{"text": "Opposite to the direction of its velocity.", "isCorrect": false, "rationale": "Acceleration can be in the same direction as velocity (speeding up) or opposite (slowing down), but its direction is fundamentally determined by the net force, not solely by velocity."}, {"text": "The same as the direction of the net force acting on it.", "isCorrect": true, "rationale": "The text explicitly states: 'The direction of the acceleration is the same as the direction of the net force.'"}, {"text": "Perpendicular to the direction of its motion.", "isCorrect": false, "rationale": "Acceleration perpendicular to motion causes a change in direction (like in circular motion), but Newton's Second Law directly relates acceleration to the net force, which can be in any direction relative to motion."}, {"text": "Dependent on whether the object is speeding up or slowing down.", "isCorrect": false, "rationale": "While speeding up or slowing down implies a relationship between acceleration and velocity, the source and direction of acceleration are governed by the net force, regardless of whether the object is speeding up or slowing down."}]}, {"question": "A 2.5 kg object accelerates at 4.0 m/s^2 to the right. What is the net force acting on the object?", "options": [{"text": "1.6 N to the left", "isCorrect": false, "rationale": "This value is calculated by dividing mass by acceleration (2.5/4.0), which is an incorrect application of Newton's Second Law, and the direction is incorrect."}, {"text": "10.0 N to the right", "isCorrect": true, "rationale": "Using Newton's Second Law, F_net = ma = (2.5 kg)(4.0 m/s^2) = 10.0 N. The direction of acceleration is to the right, so the net force is also to the right."}, {"text": "10.0 N to the left", "isCorrect": false, "rationale": "The magnitude is correct, but the direction is incorrect. The direction of acceleration is the same as the direction of the net force."}, {"text": "6.5 N to the right", "isCorrect": false, "rationale": "This value is the sum of mass and acceleration, which is not a physical quantity or correct application of the formula."}]}, {"question": "A 5.0 kg box is pushed to the right with a 30 N force. A friction force of 10 N acts to the left, and air resistance of 5 N also acts to the left. What is the acceleration of the box?", "options": [{"text": "7.0 m/s^2 to the right", "isCorrect": false, "rationale": "This would result if the net force were 35 N to the right (35 N / 5 kg = 7 m/s^2), implying an incorrect calculation of net force."}, {"text": "3.0 m/s^2 to the right", "isCorrect": true, "rationale": "First, calculate the net force. Taking right as positive: F_net = (+30 N) + (-10 N) + (-5 N) = +15 N. Then, apply a = F_net / m = 15 N / 5.0 kg = 3.0 m/s^2. Since F_net is positive, acceleration is to the right."}, {"text": "4.0 m/s^2 to the left", "isCorrect": false, "rationale": "This would result if the net force were 20 N to the left (20 N / 5 kg = 4 m/s^2), implying an incorrect calculation of net force and direction."}, {"text": "3.0 m/s^2 to the left", "isCorrect": false, "rationale": "The magnitude is correct, but the direction is incorrect. The net force is to the right, so the acceleration must also be to the right."}]}, {"question": "Which statement accurately describes the difference between mass and weight?", "options": [{"text": "Both mass and weight are measures of the amount of matter in an object and remain constant regardless of location.", "isCorrect": false, "rationale": "While mass is a measure of matter and remains constant, weight is a force that changes with the local gravitational field."}, {"text": "Mass is the gravitational force on an object and changes with location, while weight is the amount of matter and is constant.", "isCorrect": false, "rationale": "This statement incorrectly reverses the definitions of mass and weight. Mass is the amount of matter, and weight is the gravitational force."}, {"text": "Mass is a scalar quantity measuring inertia, constant with location, while weight is a vector quantity (gravitational force) measured in Newtons, which changes with location.", "isCorrect": true, "rationale": "The text clarifies: 'Mass is a scalar quantity measured in kilograms (kg) and does not change with location.' and 'Weight is a vector quantity measured in newtons (N) and depends on both the object's mass and the local gravitational field strength.'"}, {"text": "Mass and weight are two different terms for the same physical quantity.", "isCorrect": false, "rationale": "The text explicitly addresses this as 'One of the most common confusions in physics is the difference between mass and weight. They are related but fundamentally different quantities.'"}]}, {"question": "An astronaut has a mass of 75 kg. If they land on a celestial body where the acceleration due to gravity is 3.5 m/s^2, what would be their weight on that body?", "options": [{"text": "75 kg", "isCorrect": false, "rationale": "75 kg is the astronaut's mass, not their weight. Weight is a force, measured in Newtons."}, {"text": "262.5 N", "isCorrect": true, "rationale": "Weight is calculated using W = mg. So, W = (75 kg)(3.5 m/s^2) = 262.5 N."}, {"text": "735 N", "isCorrect": false, "rationale": "This would be the astronaut's approximate weight on Earth (75 kg * 9.8 m/s^2), not on the specified celestial body."}, {"text": "21.4 kg", "isCorrect": false, "rationale": "This value would result from dividing mass by gravity (75/3.5), which is an incorrect calculation and unit for weight."}]}, {"question": "Which of the following is the correct sequence of problem-solving steps when applying Newton's second law, after identifying the object of interest?", "options": [{"text": "Calculate the net force, choose a positive direction, draw a free-body diagram, then use a = F_net / m.", "isCorrect": false, "rationale": "This order is incorrect. Drawing the FBD and choosing a direction usually precede calculating the net force."}, {"text": "Draw a free-body diagram, calculate the net force, choose a positive direction, then use a = F_net / m.", "isCorrect": false, "rationale": "While drawing an FBD is first, choosing a positive direction must occur before calculating the net force by algebraically adding forces."}, {"text": "Use a = F_net / m, draw a free-body diagram, choose a positive direction, then calculate the net force.", "isCorrect": false, "rationale": "This order is incorrect. You cannot use a = F_net / m effectively without first defining forces, directions, and the net force."}, {"text": "Draw a free-body diagram, choose a positive direction, calculate the net force, then use a = F_net / m.", "isCorrect": true, "rationale": "The text outlines these steps: '1. Draw a free-body diagram... 2. Choose a positive direction... 3. Calculate the net force... 4. Use a = F_net / m...'"}]}, {"question": "A rocket accelerates as it burns fuel and expels exhaust gases. According to the 'From Apples to Rockets' connection, what best explains why the rocket's acceleration increases over time, assuming the thrust force from the engines remains constant?", "options": [{"text": "The net force on the rocket increases as it moves faster.", "isCorrect": false, "rationale": "The problem states thrust force remains constant. While air resistance decreases with altitude, the primary reason for increasing acceleration highlighted in the text's 'Sci-connection' is mass reduction."}, {"text": "The mass of the rocket increases, requiring more force to accelerate.", "isCorrect": false, "rationale": "This is incorrect; the rocket's mass decreases as it burns fuel. If mass increased, acceleration would decrease for a constant force."}, {"text": "The mass of the rocket decreases, leading to greater acceleration for the same thrust.", "isCorrect": true, "rationale": "The text states: 'As the rocket burns fuel, its mass decreases, so the same thrust produces greater acceleration — the rocket speeds up faster and faster as it gets lighter.' This directly applies the inverse proportionality between mass and acceleration (a = F_net / m)."}, {"text": "The acceleration due to gravity decreases as the rocket gains altitude, reducing the opposing force.", "isCorrect": false, "rationale": "While true that gravity decreases with altitude, the 'Sci-connection' primarily focuses on the effect of changing mass due to fuel consumption as the reason for increasing acceleration with constant thrust."}]}, {"question": "One Newton (N), the SI unit of force, is defined as the force required to accelerate a one-kilogram mass at what rate?", "options": [{"text": "1 kg⋅m/s", "isCorrect": false, "rationale": "This unit is incorrect. The definition of a Newton relates to acceleration in meters per second squared, not meters per second, and includes a kg unit."}, {"text": "1 m/s", "isCorrect": false, "rationale": "This unit is incorrect. A Newton is defined as kg⋅m/s^2, not just m/s, which is a unit of velocity."}, {"text": "1 m/s^2", "isCorrect": true, "rationale": "The text defines: 'One newton is the force required to accelerate a one-kilogram mass at one meter per second squared: 1N = 1kg m/s^2.'"}, {"text": "9.8 m/s^2", "isCorrect": false, "rationale": "9.8 m/s^2 is the approximate acceleration due to gravity near Earth's surface, not the defining acceleration for a 1 N force on a 1 kg mass."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
