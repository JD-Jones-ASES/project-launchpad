    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which of the following substances would NOT be classified as a mineral according to the precise scientific definition provided in the text?", "options": [{"text": "A naturally formed crystal of quartz (SiO2).", "isCorrect": false, "rationale": "Quartz is explicitly given as an example of a mineral and meets all four criteria: naturally occurring, inorganic, solid, definite chemical composition, and crystal structure."}, {"text": "Salt (halite) precipitated from evaporating seawater.", "isCorrect": false, "rationale": "Halite (table salt) is a mineral. While precipitated from water, it is naturally occurring, inorganic, a solid with a definite chemical composition, and has a cubic crystal structure as mentioned in the text."}, {"text": "A piece of volcanic glass (obsidian) formed from rapidly cooled lava.", "isCorrect": true, "rationale": "Obsidian is volcanic glass. Although naturally occurring, inorganic, and a solid, it cools so rapidly that 'no crystals form at all,' meaning it lacks the orderly internal arrangement of atoms (crystal structure) required for a substance to be defined as a mineral."}, {"text": "Calcite (CaCO3) found in marine organism shells.", "isCorrect": false, "rationale": "The text notes that calcite in shells is one of 'a few traditional exceptions' to the 'inorganic' criterion, acknowledging its common classification as a mineral despite biological origin, due to its crystal structure and consistent composition."}]}, {"question": "A geologist observes a mineral that formed within a crowded rock, preventing it from developing distinct external faces. What can still be inferred about this mineral based on its internal structure?", "options": [{"text": "It lacks a definite chemical composition, as its growth was inhibited.", "isCorrect": false, "rationale": "A mineral's definite chemical composition is an inherent property, independent of its growth environment or external shape. Crowded conditions affect external form, not internal chemistry."}, {"text": "It does not possess an orderly internal arrangement of atoms (crystal structure) due to the lack of space.", "isCorrect": false, "rationale": "The text states, 'When minerals grow in crowded conditions, they cannot develop these ideal shapes, but the internal atomic order remains the same.' The crystal structure is internal and inherent, not dependent on external growth conditions."}, {"text": "Its internal atomic arrangement is still regular and repeating, even without ideal external crystal shapes.", "isCorrect": true, "rationale": "The text clearly states that even in crowded conditions where ideal external shapes don't form, 'the internal atomic order remains the same.' This orderly arrangement is the definition of a crystal structure."}, {"text": "It will have a lower Mohs hardness compared to the same mineral grown freely.", "isCorrect": false, "rationale": "Mohs hardness is an intrinsic property determined by atomic bonding and crystal structure, not by the external shape or crowded growth conditions of the mineral. The chemical composition and internal structure define its hardness."}]}, {"question": "A mineral sample can scratch a copper penny (hardness 3.5) but cannot scratch a steel nail (hardness 5.5). Which of the following Mohs hardness values is most plausible for this mineral?", "options": [{"text": "2.5", "isCorrect": false, "rationale": "A mineral with hardness 2.5 (fingernail) would be scratched by a copper penny (3.5), not scratch it. The problem states the mineral scratches a penny."}, {"text": "4.0", "isCorrect": true, "rationale": "If the mineral scratches a copper penny (3.5) but is scratched by a steel nail (5.5), its hardness must be between 3.5 and 5.5. A hardness of 4.0 falls within this range."}, {"text": "5.5", "isCorrect": false, "rationale": "A mineral with hardness 5.5 (like a steel nail) would be able to scratch a steel nail or be scratched by it if they are the same hardness, but the problem states the mineral *cannot* scratch the steel nail. It implies the nail scratches the mineral."}, {"text": "6.0", "isCorrect": false, "rationale": "A mineral with hardness 6.0 (like a glass plate) would be able to scratch a steel nail (5.5), which contradicts the given information that the mineral *cannot* scratch the steel nail."}]}, {"question": "Why is 'streak' considered a more reliable property than 'surface color' for identifying certain minerals, such as hematite?", "options": [{"text": "Streak is always white, making it a universal identification marker.", "isCorrect": false, "rationale": "Streak is not always white; it is the color of the mineral's powder, which can vary. For example, hematite's streak is reddish-brown, not white."}, {"text": "Surface color is only visible under specific lighting conditions, while streak is constant.", "isCorrect": false, "rationale": "While lighting can affect how surface color appears, the primary reason for streak's reliability is not merely lighting dependence. Surface color can genuinely vary due to weathering or impurities, whereas streak is more consistent."}, {"text": "Streak is unaffected by weathering or impurities that can alter a mineral's surface color.", "isCorrect": true, "rationale": "The text explicitly states, 'Streak is often more reliable than the color of the mineral's surface... because it is not affected by weathering or impurities.' This makes it a more consistent diagnostic property."}, {"text": "Only minerals with metallic luster have a reliable streak color.", "isCorrect": false, "rationale": "Streak is a property used for both metallic and nonmetallic minerals, as long as they are softer than the streak plate. The reliability of streak is due to its consistency, not just the type of luster."}]}, {"question": "A geologist discovers a rock that fizzes when a drop of dilute hydrochloric acid is applied. This rock is likely composed primarily of which mineral and what type of rock could it be?", "options": [{"text": "Quartz, a clastic sedimentary rock like sandstone.", "isCorrect": false, "rationale": "Quartz does not fizz with acid. Sandstone is a clastic sedimentary rock, but its primary mineral (quartz) lacks this special property."}, {"text": "Feldspar, an igneous rock like granite.", "isCorrect": false, "rationale": "Feldspar does not fizz with acid. Granite is an igneous rock but does not react this way to acid."}, {"text": "Calcite, a chemical/biochemical sedimentary rock like limestone, or a metamorphic rock like marble.", "isCorrect": true, "rationale": "The text explicitly states that 'calcite fizzes in dilute hydrochloric acid.' Limestone is often formed from calcite (biochemical sedimentary), and marble is metamorphosed limestone, thus also primarily composed of calcite. This makes it a correct link between the mineral, its property, and potential rock types."}, {"text": "Olivine, a fine-grained igneous rock like basalt.", "isCorrect": false, "rationale": "Olivine does not fizz with acid. Basalt is a fine-grained igneous rock, but its main minerals, including olivine, do not exhibit this reaction."}]}, {"question": "A geologist examines two igneous rock samples. Sample A has very large, visible mineral crystals, while Sample B has microscopic crystals that are difficult to see without magnification. What can be inferred about the formation of these two samples?", "options": [{"text": "Sample A formed from lava that cooled rapidly at the Earth's surface, and Sample B formed from magma that cooled slowly underground.", "isCorrect": false, "rationale": "This statement reverses the correct relationship. Rapid cooling at the surface (lava) leads to tiny crystals (like Sample B), while slow cooling underground (magma) leads to large crystals (like Sample A)."}, {"text": "Both samples cooled at the same rate but from different types of molten rock (magma vs. lava).", "isCorrect": false, "rationale": "The crystal size directly indicates the cooling rate, not necessarily a different *type* of molten rock (magma and lava are both molten rock, just in different locations). Magma and lava are the same material in different environments. The cooling rate is the key differentiator for crystal size."}, {"text": "Sample A is a coarse-grained rock that cooled slowly underground, and Sample B is a fine-grained rock that cooled rapidly at or near the surface.", "isCorrect": true, "rationale": "The text explains that 'slow' cooling underground allows 'large mineral crystals' (coarse-grained, like Sample A) to grow, while 'rapid' cooling at the surface (lava) results in 'tiny crystals' (fine-grained, like Sample B)."}, {"text": "Sample A is likely obsidian, and Sample B is likely granite.", "isCorrect": false, "rationale": "Obsidian forms when lava cools so fast that *no* crystals form, which contradicts Sample A's large crystals. Granite is a coarse-grained rock (like Sample A), but Sample B is fine-grained, not granite."}]}, {"question": "Which characteristic is unique to sedimentary rocks among the three major rock types and is crucial for understanding Earth's past life?", "options": [{"text": "They are formed by heat and pressure without melting.", "isCorrect": false, "rationale": "This describes the formation of metamorphic rocks, not sedimentary rocks."}, {"text": "They often contain fossils, preserving traces of ancient organisms.", "isCorrect": true, "rationale": "The text explicitly states that 'Sedimentary rocks are especially important because they often contain fossils — preserved remains or traces of ancient organisms.' This is a distinguishing feature crucial for paleontological studies."}, {"text": "They form from the cooling and solidification of molten rock.", "isCorrect": false, "rationale": "This describes the formation of igneous rocks, not sedimentary rocks."}, {"text": "They exhibit distinctive metallic or nonmetallic luster.", "isCorrect": false, "rationale": "Luster is a property of individual minerals, which make up rocks. It is not a distinguishing characteristic of an entire rock type, nor is it unique to sedimentary rocks."}]}, {"question": "If a sample of shale (a clastic sedimentary rock) undergoes intense heat and pressure deep within the Earth but does not fully melt, what sequence of metamorphic rocks could it potentially become?", "options": [{"text": "Granite, then basalt.", "isCorrect": false, "rationale": "Granite and basalt are igneous rocks, formed from cooling magma or lava. Metamorphism transforms existing rocks without melting them into igneous rocks."}, {"text": "Limestone, then marble.", "isCorrect": false, "rationale": "Limestone is a sedimentary rock formed from calcium carbonate, which when metamorphosed becomes marble. However, shale is made of clay-sized particles and metamorphoses into different rock types."}, {"text": "Slate, then phyllite, schist, and eventually gneiss.", "isCorrect": true, "rationale": "The text specifically states: 'When shale is metamorphosed, it becomes slate (and with further metamorphism, phyllite, schist, and eventually gneiss).' This sequence directly matches the process described."}, {"text": "Sandstone, then quartzite.", "isCorrect": false, "rationale": "Sandstone is a clastic sedimentary rock, which when metamorphosed becomes quartzite. However, the question asks about the metamorphism of shale, not sandstone."}]}, {"question": "The continuous process of the rock cycle, transforming rocks through creation, destruction, and re-creation, is primarily driven by which two fundamental energy sources?", "options": [{"text": "Atmospheric currents and lunar gravitational forces.", "isCorrect": false, "rationale": "While atmospheric currents relate to surface processes, and lunar gravity affects tides, neither is identified in the text as the primary drivers of the entire rock cycle. Atmospheric currents are a consequence of solar energy, not a fundamental driver of the rock cycle mentioned."}, {"text": "Chemical reactions and biological activity.", "isCorrect": false, "rationale": "Chemical reactions and biological activity play roles in specific parts of rock formation (e.g., chemical sedimentary rocks), but they are not the overarching energy drivers for the entire rock cycle as defined in the text."}, {"text": "Internal heat of the Earth and solar energy.", "isCorrect": true, "rationale": "The text clearly states: 'It is driven by two sources of energy: internal heat (the same convection discussed in Section 2, which drives volcanism, mountain building, and metamorphism) and solar energy (which drives weathering, erosion, and the water cycle at the surface).'"}, {"text": "Magnetic fields and tectonic plate movement.", "isCorrect": false, "rationale": "Tectonic plate movement is a *process* driven by Earth's internal heat, not a fundamental energy source itself. Magnetic fields are related to the Earth's core but are not identified as a primary driver of the rock cycle in the context of rock transformations."}]}, {"question": "Consider an atom of silicon that starts in a quartz crystal within a granite mountain. It then undergoes weathering, erosion, deposition as sand, lithification into sandstone, and finally metamorphism into quartzite. At which stage(s) in this journey does the silicon atom change what mineral it belongs to?", "options": [{"text": "It changes from quartz to sand during weathering and then back to quartz during metamorphism into quartzite.", "isCorrect": false, "rationale": "Sand, in this context, refers to the clastic particles of quartz. The silicon atom remains part of a quartz crystal during weathering, erosion, and deposition. Quartzite is also made of quartz. So, it never changes mineral type in this specific scenario."}, {"text": "It changes mineral type only when the sandstone is transformed into quartzite.", "isCorrect": false, "rationale": "When sandstone (composed of quartz sand grains) is metamorphosed into quartzite, the quartz recrystallizes but remains quartz. The silicon atom stays within the quartz mineral throughout this specific transformation."}, {"text": "The silicon atom does not change the mineral it belongs to during this entire sequence, remaining part of quartz.", "isCorrect": true, "rationale": "The 'thinkdeeper' example specifies that the silicon atom starts in a quartz crystal in granite. Weathering breaks granite into sand grains, which are still quartz. Sandstone is formed from sand (quartz). When sandstone is metamorphosed into quartzite, the original quartz grains recrystallize but remain the mineral quartz. Therefore, the silicon atom stays within the quartz mineral throughout this specific journey."}, {"text": "It changes mineral type when it goes from granite to sand, and again from sandstone to quartzite.", "isCorrect": false, "rationale": "Granite contains quartz, and sand grains derived from granite would still be quartz. Sandstone is primarily cemented quartz grains. Quartzite is a metamorphic rock formed from sandstone, where the quartz recrystallizes. The mineral type (quartz) does not change in this sequence."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
