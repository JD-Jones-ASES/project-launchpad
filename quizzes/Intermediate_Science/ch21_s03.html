    };

<body>
<div class="quiz-container">

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 21, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "At its most fundamental level, what defines evolution in a population?", "options": [{"text": "An individual organism developing new traits during its lifetime.", "isCorrect": false, "rationale": "Evolution does not occur at the individual level; traits acquired during an individual's lifetime are not typically passed to offspring unless they are genetic changes. The text states, 'Evolution does not happen to individuals.'"}, {"text": "A change in the proportion of specific alleles in a population's gene pool over generations.", "isCorrect": true, "rationale": "The text explicitly defines evolution as 'a change in allele frequencies in a population over time,' which means a change in the proportion of specific alleles in the gene pool across generations."}, {"text": "An increase in the survival rate of the strongest individuals in a population.", "isCorrect": false, "rationale": "This describes a potential outcome or mechanism of natural selection, but not the fundamental definition of evolution itself, which is about changes in allele frequencies."}, {"text": "The migration of a new species into an existing ecosystem.", "isCorrect": false, "rationale": "This describes gene flow if individuals of the *same* species migrate, but it's not the fundamental definition of evolution. If it's a new species, it's an ecological event, not evolution of the existing population."}], "id": "q01"}, {"question": "In a population of moths, individuals with medium-sized wings are more easily caught by predators than those with very small or very large wings. Which pattern of natural selection is most likely operating?", "options": [{"text": "Directional selection", "isCorrect": false, "rationale": "Directional selection favors one extreme phenotype, shifting the population mean in that direction, not both extremes."}, {"text": "Stabilizing selection", "isCorrect": false, "rationale": "Stabilizing selection favors the average phenotype and selects against both extremes, which is the opposite of the scenario described."}, {"text": "Disruptive selection", "isCorrect": true, "rationale": "Disruptive selection favors both extreme phenotypes over intermediate phenotypes, as seen in the scenario where medium-sized wings are disadvantaged while small and large wings are favored."}, {"text": "Sexual selection", "isCorrect": false, "rationale": "Sexual selection relates to traits that enhance mating success, not directly to survival rates due to predation, though there can be interplay."}], "id": "q02"}, {"question": "Why does genetic drift have a more significant impact on allele frequencies in small populations compared to large populations?", "options": [{"text": "Small populations experience more mutations, increasing genetic variation.", "isCorrect": false, "rationale": "Mutation rates are generally independent of population size, and genetic drift primarily reduces, rather than increases, variation in small populations."}, {"text": "In small populations, random chance events are more likely to significantly alter the proportion of alleles.", "isCorrect": true, "rationale": "The text states that genetic drift is 'a random change in allele frequencies that occurs by chance, especially in small populations.' Random sampling error has a much greater proportional effect on allele frequencies in a small gene pool than in a large one."}, {"text": "Larger populations are more susceptible to the bottleneck effect.", "isCorrect": false, "rationale": "The bottleneck effect *reduces* a large population to a small one, after which genetic drift then impacts the resulting small population. The *effect* of drift is strongest in the small population."}, {"text": "Small populations have more opportunities for gene flow to introduce new alleles.", "isCorrect": false, "rationale": "While gene flow might introduce new alleles, it typically *counteracts* the effects of genetic drift by adding diversity, rather than making drift more significant."}], "id": "q03"}, {"question": "A rare bird species living on a remote island is threatened by a sudden volcanic eruption, which kills 90% of the population. The few surviving birds manage to reproduce, leading to a recovery in population size over several generations. What is the most likely long-term consequence for the genetic diversity of this bird species?", "options": [{"text": "Genetic diversity will significantly increase due to new mutations in the surviving population.", "isCorrect": false, "rationale": "While mutations are the ultimate source of new variation, a catastrophic event like this causes an immediate and significant *reduction* in genetic diversity. New mutations occur slowly and would not immediately compensate for the loss."}, {"text": "Genetic diversity will remain largely unchanged because the population eventually recovers its numbers.", "isCorrect": false, "rationale": "Even if numbers recover, the genetic diversity often remains low for many generations because all future individuals descend from the limited gene pool of the survivors."}, {"text": "Genetic diversity will be severely reduced, as the new population is descended from a small, random sample of the original gene pool.", "isCorrect": true, "rationale": "This scenario precisely describes the bottleneck effect, a form of genetic drift. A large portion of the gene pool is lost, leading to significantly reduced genetic diversity in the surviving and subsequent generations."}, {"text": "The population will experience strong directional selection, favoring traits that help escape volcanic eruptions.", "isCorrect": false, "rationale": "While there might be some selection for traits related to survival, the primary genetic impact of the event on diversity, as described, is the random loss of alleles, characteristic of genetic drift via a bottleneck."}], "id": "q04"}, {"question": "A population of deer lives in a forest adjacent to a fragmented habitat where another, smaller deer population resides. If a few deer from the larger population regularly migrate to and breed with the smaller population, what is the most likely effect on the smaller population's genetic makeup?", "options": [{"text": "Increased susceptibility to genetic drift due to the introduction of new alleles.", "isCorrect": false, "rationale": "Gene flow, the movement of alleles, actually tends to *counteract* the effects of genetic drift by introducing new alleles and increasing population size, making random fluctuations less impactful."}, {"text": "A decrease in overall genetic variation, leading to increased specialization.", "isCorrect": false, "rationale": "Gene flow typically *increases* genetic variation in the recipient population by introducing new alleles from the donor population."}, {"text": "Greater genetic similarity with the larger population and an increase in its genetic diversity.", "isCorrect": true, "rationale": "The text states that 'gene flow tends to make populations more genetically similar to each other' and 'can introduce beneficial alleles (increasing variation).' Migration from a larger, likely more diverse population would increase the genetic diversity of the smaller population and make it more like the larger one."}, {"text": "Rapid speciation due to the mixing of distinct gene pools.", "isCorrect": false, "rationale": "Gene flow *prevents* populations from diverging and evolving independently, thus working against speciation by homogenizing gene pools."}], "id": "q05"}, {"question": "Which of the following mechanisms is considered the ultimate source of new genetic variation in a population?", "options": [{"text": "Natural selection", "isCorrect": false, "rationale": "Natural selection acts on existing variation, it does not create new alleles or genetic variants."}, {"text": "Genetic drift", "isCorrect": false, "rationale": "Genetic drift changes the frequencies of existing alleles by chance, but it does not create new alleles."}, {"text": "Gene flow", "isCorrect": false, "rationale": "Gene flow moves existing alleles between populations, increasing diversity in a recipient population but not generating fundamentally new alleles."}, {"text": "Mutation", "isCorrect": true, "rationale": "The text clearly states, 'Mutations are random changes in DNA that create new alleles... Mutation is the ultimate source of all genetic variation.'"}], "id": "q06"}, {"question": "A male bowerbird constructs an elaborate nest (bower) decorated with colorful objects to attract a mate. This behavior does not directly aid in survival or foraging, but females strongly prefer males with the most impressive bowers. This is an example of which evolutionary mechanism?", "options": [{"text": "Stabilizing selection", "isCorrect": false, "rationale": "Stabilizing selection favors average traits. Here, an extreme, elaborate trait is being favored for mating success."}, {"text": "Directional selection", "isCorrect": false, "rationale": "While the preference for more elaborate bowers does exert a directional pressure on the trait, the specific context of mate choice makes 'sexual selection' a more precise and correct answer."}, {"text": "Sexual selection", "isCorrect": true, "rationale": "The scenario describes a trait (elaborate bower) that enhances an individual's success at attracting mates, even if it might not improve survival. This is the definition of sexual selection, a 'special form of natural selection in which individuals with certain traits are more successful at attracting mates.'"}, {"text": "Genetic drift", "isCorrect": false, "rationale": "Genetic drift involves random changes in allele frequencies, not a consistent preference for a specific trait related to mating success."}], "id": "q07"}, {"question": "According to the Hardy-Weinberg Principle, which of the following conditions must be met for allele frequencies in a population to remain constant from generation to generation?", "options": [{"text": "Significant genetic drift", "isCorrect": false, "rationale": "The Hardy-Weinberg principle requires *no genetic drift* (infinitely large population) for allele frequencies to remain constant."}, {"text": "Non-random mating", "isCorrect": false, "rationale": "The Hardy-Weinberg principle requires *random mating* (no sexual selection or mate preference) for equilibrium."}, {"text": "Presence of gene flow", "isCorrect": false, "rationale": "The Hardy-Weinberg principle requires *no gene flow* (no immigration or emigration) for allele frequencies to remain constant."}, {"text": "Absence of natural selection", "isCorrect": true, "rationale": "One of the five conditions for Hardy-Weinberg equilibrium is 'No natural selection (all genotypes have equal fitness),' meaning allele frequencies will not change due to differential survival or reproduction."}], "id": "q08"}, {"question": "The Hardy-Weinberg principle is described as a 'null model' for evolution. What does this mean in the context of studying natural populations?", "options": [{"text": "It predicts the exact allele frequencies in any given population over time.", "isCorrect": false, "rationale": "The Hardy-Weinberg principle describes a theoretical state of *no change* in allele frequencies, which is rarely met in natural populations. It does not predict the exact frequencies if evolution *is* occurring."}, {"text": "It serves as a baseline to determine if and how a population is evolving by comparing observed changes to its equilibrium state.", "isCorrect": true, "rationale": "As stated in the text, the Hardy-Weinberg principle is a 'useful null model — a baseline for comparison. If scientists measure allele frequencies in a population and find that they are changing, they know evolution is occurring.'"}, {"text": "It suggests that most natural populations are always in equilibrium and therefore not evolving.", "isCorrect": false, "rationale": "The text explicitly states, 'In reality, no natural population meets all five conditions,' meaning natural populations are almost always evolving."}, {"text": "It primarily helps in identifying new mutations within a gene pool.", "isCorrect": false, "rationale": "While mutation is one of the forces it identifies, the principle's primary role as a null model is to detect *any* deviation from equilibrium caused by *any* evolutionary force, not just mutation."}], "id": "q09"}, {"question": "A weightlifter trains extensively and develops significantly stronger muscles during their lifetime. Their children, however, do not inherit this increased muscle strength. Why does this scenario illustrate that the weightlifter's increased muscle strength is not an example of evolution?", "options": [{"text": "The trait was developed through environmental influence, not genetic mutation.", "isCorrect": false, "rationale": "While true that the trait is environmentally influenced, the core reason it's not evolution is about the level at which evolution occurs, not just the cause of the trait."}, {"text": "Evolution refers to changes in the genetic makeup of a population over generations, not changes in an individual during their lifetime.", "isCorrect": true, "rationale": "The text clearly states, 'Evolution does not happen to individuals. A single gazelle does not evolve longer legs during its lifetime. Evolution is a change in the genetic composition of a population...' Individual acquired traits are not evolution."}, {"text": "Stronger muscles do not provide a survival advantage in modern human society.", "isCorrect": false, "rationale": "Whether the trait confers a survival advantage or not is irrelevant to the definition of evolution as a population-level genetic change over generations."}, {"text": "The weightlifter's chosen profession is a cultural behavior, not a biological one.", "isCorrect": false, "rationale": "The context of the activity (cultural vs. biological) is not the fundamental reason why individual lifetime changes are not considered evolution. The key is whether the change is genetic and heritable across generations in a population."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
