    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 4, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The text states that kinematic equations are needed when you want to find how far an object travels or its final velocity \"after accelerating for a certain time.\" What is the primary condition under which these specific kinematic equations (v_f = v_i + at and d = v_i t + 1/2 at^2) are applicable?", "options": [{"text": "When the object is moving at a constant speed.", "isCorrect": false, "rationale": "The equation $v=d/t$ is used for constant-speed motion, not the kinematic equations for acceleration."}, {"text": "When the object experiences uniform (constant) acceleration.", "isCorrect": true, "rationale": "The definition of a kinematic equation explicitly states it relates variables for an object undergoing 'uniform (constant) acceleration'."}, {"text": "When the object is in free fall near Earth's surface.", "isCorrect": false, "rationale": "Free fall is a specific *example* of constant acceleration, but the kinematic equations are applicable to *any* situation involving constant acceleration, not just free fall."}, {"text": "When the object's velocity is changing but its position remains constant.", "isCorrect": false, "rationale": "If an object's velocity is changing, its position cannot remain constant; it must be moving."}], "id": "q01"}, {"question": "An object starts from rest and accelerates uniformly at $4.0\\,\\text{m/s}^2$. What is its velocity after $5.0\\,\\text{s}$?", "options": [{"text": "$0\\,\\text{m/s}$.", "isCorrect": false, "rationale": "The object is accelerating, so its velocity will increase from rest, not remain zero."}, {"text": "$20.0\\,\\text{m/s}$.", "isCorrect": true, "rationale": "Using Equation 1, $v_f = v_i + at$. Given $v_i = 0\\,\\text{m/s}$ (starts from rest), $a = 4.0\\,\\text{m/s}^2$, and $t = 5.0\\,\\text{s}$, then $v_f = 0 + (4.0\\,\\text{m/s}^2)(5.0\\,\\text{s}) = 20.0\\,\\text{m/s}$."}, {"text": "$10.0\\,\\text{m/s}$.", "isCorrect": false, "rationale": "This value would result from an incorrect calculation, such as $a \\times t / 2$ or a misunderstanding of the formula."}, {"text": "$40.0\\,\\text{m/s}$.", "isCorrect": false, "rationale": "This value would result from an incorrect calculation, such as $a \\times t \\times 2$ or $a \\times t^2$ without the $1/2$ factor."}], "id": "q02"}, {"question": "A ball is dropped from a height, meaning its initial velocity is $0\\,\\text{m/s}$. If it accelerates due to gravity at $9.8\\,\\text{m/s}^2$, how far does it fall in $2.0\\,\\text{s}$?", "options": [{"text": "$9.8\\,\\text{m}$.", "isCorrect": false, "rationale": "This value represents the velocity after 1 second, not the distance fallen in 2 seconds."}, {"text": "$19.6\\,\\text{m}$.", "isCorrect": true, "rationale": "Using the simplified Equation 2 for an object starting from rest: $d = 1/2 at^2$. Given $a = 9.8\\,\\text{m/s}^2$ and $t = 2.0\\,\\text{s}$, then $d = 1/2 (9.8\\,\\text{m/s}^2)(2.0\\,\\text{s})^2 = 1/2 (9.8)(4.0) = 19.6\\,\\text{m}$."}, {"text": "$39.2\\,\\text{m}$.", "isCorrect": false, "rationale": "This value would result from calculating $at^2$ instead of $1/2 at^2$."}, {"text": "$4.9\\,\\text{m}$.", "isCorrect": false, "rationale": "This value would result from an incorrect calculation, such as $1/2 g (t/2)^2$ or $1/2 g (t/\\sqrt{2})^2$."}], "id": "q03"}, {"question": "The equation $d = v_i t + 1/2 at^2$ describes displacement with constant acceleration. Which of the following statements about its simplification or components is FALSE?", "options": [{"text": "If an object starts from rest ($v_i = 0$), the equation simplifies to $d = 1/2 at^2$.", "isCorrect": false, "rationale": "This statement is TRUE. The text explicitly states this simplification when $v_i = 0$."}, {"text": "If an object has constant velocity ($a = 0$), the equation simplifies to $d = vt$.", "isCorrect": false, "rationale": "This statement is TRUE. The text explicitly states this simplification when $a = 0$."}, {"text": "If an object's final velocity is zero ($v_f = 0$), the equation simplifies to $d = v_i t$.", "isCorrect": true, "rationale": "This statement is FALSE. If $v_f=0$ due to acceleration, acceleration must be non-zero (unless $t=0$). Therefore, the $1/2 at^2$ term is still necessary to calculate the displacement for $t>0$."}, {"text": "The term $v_i t$ is the distance the object would cover at its initial velocity alone.", "isCorrect": false, "rationale": "This statement is TRUE. The text explains that the first term ($v_i t$) is the distance the object would cover at its initial velocity alone."}], "id": "q04"}, {"question": "According to the text, which characteristic is TRUE for an object undergoing free fall near Earth's surface?", "options": [{"text": "It experiences an acceleration that depends on its mass.", "isCorrect": false, "rationale": "The text states that 'All objects in free fall near Earth's surface experience the same acceleration regardless of their mass'."}, {"text": "It is primarily influenced by air resistance.", "isCorrect": false, "rationale": "Free fall is defined as 'motion of an object under the influence of gravity alone, with no air resistance or other forces acting'."}, {"text": "Its acceleration is approximately $9.8\\,\\text{m/s}^2$, directed downward.", "isCorrect": true, "rationale": "The text explicitly defines acceleration due to gravity ($g$) as approximately $9.8\\,\\text{m/s}^2$, directed downward."}, {"text": "Its velocity remains constant throughout the fall.", "isCorrect": false, "rationale": "The text explains that 'every second an object falls, its downward velocity increases by $9.8\\,\\text{m/s}$', meaning its velocity is constantly changing."}], "id": "q05"}, {"question": "Galileo Galilei's experiments with falling objects and inclined planes challenged existing beliefs. What was his revolutionary finding that significantly contributed to the scientific revolution?", "options": [{"text": "That heavier objects fall faster than lighter ones.", "isCorrect": false, "rationale": "This was Aristotle's belief that Galileo disproved with his experiments."}, {"text": "That all objects accelerate at the same rate regardless of their mass.", "isCorrect": true, "rationale": "The text states that Galileo 'found that all objects accelerate at the same rate regardless of mass,' a discovery that was revolutionary at the time."}, {"text": "That air resistance is the primary force influencing all falling objects.", "isCorrect": false, "rationale": "Galileo's experiments aimed to minimize or account for air resistance to observe the true effect of gravity, not to highlight air resistance as primary."}, {"text": "That the speed of light is constant.", "isCorrect": false, "rationale": "While an important discovery in physics, this finding is attributed to later scientists and is unrelated to Galileo's work on gravity and motion."}], "id": "q06"}, {"question": "A stone dropped from rest falls $44.1\\,\\text{m}$ in $3.0\\,\\text{s}$ (as per the worked example). If the stone were allowed to fall for $4.0\\,\\text{s}$ instead, the teacher note states it would fall $78.4\\,\\text{m}$. This significant increase in distance over just one additional second is a direct consequence of which aspect of the kinematic equations for free fall?", "options": [{"text": "The constant value of acceleration due to gravity ($g$).", "isCorrect": false, "rationale": "While $g$ is constant, the rapid increase in distance is not solely due to $g$'s constant value, but how it interacts with time in the displacement formula."}, {"text": "The linear relationship between final velocity and time ($v_f = gt$).", "isCorrect": false, "rationale": "The linear increase in velocity explains why the object gets faster, but the dramatic increase in *distance* covered is explained by a different aspect of the equation."}, {"text": "The $t^2$ dependence in the displacement equation ($d = 1/2 gt^2$).", "isCorrect": true, "rationale": "The teacher note explicitly states this: 'The extra second of fall nearly doubles the distance — a direct consequence of the $t^2$ dependence'."}, {"text": "The fact that the stone was dropped from rest ($v_i=0$).", "isCorrect": false, "rationale": "Starting from rest simplifies the equation, but the non-linear increase in distance over time is fundamentally due to the $t^2$ term, not just the initial condition."}], "id": "q07"}, {"question": "In the \"Motion Detector Lab,\" Part B describes a walker starting from rest and gradually increasing speed. What characteristic would the position-time graph for this motion typically exhibit?", "options": [{"text": "A straight line with a constant positive slope.", "isCorrect": false, "rationale": "A straight line with a constant slope on a position-time graph indicates constant velocity, not increasing speed (acceleration)."}, {"text": "A curve that starts shallow and becomes steeper (concave up).", "isCorrect": true, "rationale": "The expected results for Part B state this explicitly: 'Part B should produce a curve that starts shallow and becomes steeper (concave up) — the hallmark of positive acceleration on an $x$-$t$ graph'."}, {"text": "A curve that starts steep and becomes shallower (concave down).", "isCorrect": false, "rationale": "This type of curve on a position-time graph indicates slowing down (deceleration), as described for Part C."}, {"text": "A horizontal straight line.", "isCorrect": false, "rationale": "A horizontal line on a position-time graph indicates that the object's position is not changing, meaning it is at rest."}], "id": "q08"}, {"question": "If a position-time graph shows a curve that starts steep and becomes shallower (concave down), representing an object slowing down (as in Part C of the Motion Detector Lab), what would the corresponding velocity-time graph look like?", "options": [{"text": "A horizontal line above the x-axis.", "isCorrect": false, "rationale": "A horizontal line on a velocity-time graph represents constant velocity, but the object is slowing down, meaning velocity is changing."}, {"text": "A straight line with a positive slope.", "isCorrect": false, "rationale": "A straight line with a positive slope on a velocity-time graph indicates constant positive acceleration (speeding up in the positive direction)."}, {"text": "A straight line with a negative slope, starting from a positive velocity and approaching zero.", "isCorrect": true, "rationale": "Slowing down from a brisk pace means the object has a positive initial velocity, and a negative acceleration causes this velocity to decrease, thus a negative slope on a v-t graph that moves towards the time axis (zero velocity)."}, {"text": "A straight line with a negative slope, starting from zero and going into negative velocity.", "isCorrect": false, "rationale": "This would represent an object accelerating in the negative direction, starting from rest. The object in Part C starts with a brisk pace (positive velocity) and slows down."}], "id": "q09"}, {"question": "The \"Physics and Car Safety\" section highlights how kinematic equations are used to calculate stopping distances. A car traveling at $30\\,\\text{m/s}$ with a braking acceleration of $-8\\,\\text{m/s}^2$ takes $3.75\\,\\text{s}$ to stop and covers $56\\,\\text{m}$. Which kinematic equation is most directly applied to determine the *distance covered* during this braking scenario, given the initial velocity, acceleration, and time to stop?", "options": [{"text": "$v_f = v_i + at$.", "isCorrect": false, "rationale": "This equation is used to find the final velocity, not the distance covered."}, {"text": "$d = v_i t + 1/2 at^2$.", "isCorrect": true, "rationale": "This equation directly relates displacement ($d$) to initial velocity ($v_i$), time ($t$), and acceleration ($a$), which are all given or implied in the problem statement for calculating stopping distance."}, {"text": "$a = v/t$.", "isCorrect": false, "rationale": "This is a basic definition for average acceleration, not a primary kinematic equation for displacement."}, {"text": "$v = d/t$.", "isCorrect": false, "rationale": "This equation is for constant speed, but the car is undergoing acceleration (braking)."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
