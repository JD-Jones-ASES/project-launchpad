    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 12, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary reason Earth's atmosphere is described as \"indispensable\" for life?", "options": [{"text": "It prevents the planet from spinning too fast, stabilizing its rotation.", "isCorrect": false, "rationale": "The text does not mention the atmosphere's role in regulating Earth's rotational speed. This is a geophysical characteristic unrelated to the atmosphere's primary functions for life."}, {"text": "It serves as the main driver for geological processes like plate tectonics.", "isCorrect": false, "rationale": "Geological processes like plate tectonics are driven by Earth's internal heat, not directly by the atmosphere. The text does not link the atmosphere to these processes."}, {"text": "It provides breathable air, regulates temperature, protects against harmful radiation, and drives weather.", "isCorrect": true, "rationale": "The introductory paragraph and definition explicitly state that the atmosphere 'provides the air we breathe, regulates temperature, protects against harmful radiation, and drives weather and climate,' making it indispensable."}, {"text": "It acts as a solid outer shell, protecting the planet from asteroid impacts.", "isCorrect": false, "rationale": "The atmosphere is a 'thin blanket of gas,' not a solid shell. While it causes most meteors to burn up (mesosphere), describing it as a 'solid outer shell' is incorrect."}], "id": "q01"}, {"question": "Which pair of gases makes up approximately 99% of Earth's atmosphere by volume?", "options": [{"text": "Carbon Dioxide and Water Vapor", "isCorrect": false, "rationale": "Carbon dioxide and water vapor are trace gases, collectively making up a very small percentage of the atmosphere, far less than 99%."}, {"text": "Nitrogen and Oxygen", "isCorrect": true, "rationale": "The text states that nitrogen makes up approximately 78% and oxygen approximately 21% of the atmosphere, totaling around 99%."}, {"text": "Methane and Ozone", "isCorrect": false, "rationale": "Methane and ozone are trace gases, present in very small quantities and not significant contributors to the bulk volume of the atmosphere."}, {"text": "Argon and Helium", "isCorrect": false, "rationale": "Argon accounts for about 0.93%, and helium is a trace gas. Together, they do not constitute 99% of the atmosphere."}], "id": "q02"}, {"question": "Despite making up only a tiny fraction of the atmosphere, gases like CO2, CH4, and water vapor are described as having \"an enormous influence\" on Earth's temperature. This is primarily due to their role in:", "options": [{"text": "Generating atmospheric pressure at sea level.", "isCorrect": false, "rationale": "Atmospheric pressure is created by the weight of all atmospheric gases, not specifically by trace greenhouse gases. Their influence on temperature is through a different mechanism."}, {"text": "Forming the ozone layer that absorbs UV radiation.", "isCorrect": false, "rationale": "The ozone layer is formed by ozone (O3) molecules, not primarily by CO2, CH4, or water vapor. While these gases contribute to overall climate, their direct role in the ozone layer's formation is not mentioned."}, {"text": "Contributing to the greenhouse effect by trapping heat.", "isCorrect": true, "rationale": "The text explicitly states that these trace gases 'have an enormous influence on Earth's temperature through the greenhouse effect (Section 2),' indicating their heat-trapping ability."}, {"text": "Driving the nitrogen cycle essential for biological processes.", "isCorrect": false, "rationale": "The nitrogen cycle is driven by nitrogen (N2), not by carbon dioxide, methane, or water vapor. Nitrogen is primarily unreactive in the atmosphere itself."}], "id": "q03"}, {"question": "Which statement accurately describes water vapor's role in Earth's atmosphere?", "options": [{"text": "Its concentration is consistently high across all geographical regions.", "isCorrect": false, "rationale": "The text states that water vapor's 'concentration varies widely — from nearly 0% in arid deserts to about 4% in humid tropical air,' contradicting uniform distribution."}, {"text": "It is the least abundant greenhouse gas but crucial for the ozone layer.", "isCorrect": false, "rationale": "Water vapor is identified as 'the most abundant greenhouse gas' and is not primarily crucial for the ozone layer (O3) itself."}, {"text": "It is a variable trace gas crucial for weather patterns and regulating temperature as the most abundant greenhouse gas.", "isCorrect": true, "rationale": "The text highlights water vapor's variable concentration ('nearly 0% to about 4%'), its role in weather ('forming clouds and precipitation'), and its status as 'the most abundant greenhouse gas,' all contributing to temperature regulation."}, {"text": "It primarily absorbs harmful ultraviolet radiation, protecting the surface.", "isCorrect": false, "rationale": "The ozone layer (O3) in the stratosphere is primarily responsible for absorbing harmful UV radiation, not water vapor."}], "id": "q04"}, {"question": "A mountain climber experiences decreasing temperatures as they ascend. In which atmospheric layer is this phenomenon most characteristic, and what is the approximate rate of decrease?", "options": [{"text": "Stratosphere; temperature decreases by approximately 6.5°C per kilometer.", "isCorrect": false, "rationale": "Temperature in the stratosphere generally increases with altitude, and this rate of decrease is characteristic of a different layer."}, {"text": "Mesosphere; temperature decreases rapidly to the coldest in the atmosphere.", "isCorrect": false, "rationale": "While the mesosphere experiences decreasing temperatures and reaches the coldest point, the *steady decrease from Earth's surface* for a climber is characteristic of the troposphere, not the mesosphere, which is much higher."}, {"text": "Troposphere; temperature decreases steadily, roughly 6.5°C per kilometer.", "isCorrect": true, "rationale": "The text states, 'Temperature decreases steadily with altitude in the troposphere — roughly 6.5 per kilometer — which is why mountaintops are colder than valleys.'"}, {"text": "Thermosphere; temperature decreases due to extremely low air density.", "isCorrect": false, "rationale": "Temperature in the thermosphere actually increases with altitude due to absorption of solar radiation, although the air density is very low."}], "id": "q05"}, {"question": "The temperature in the stratosphere increases with altitude, a pattern opposite to that in the troposphere. What is the primary reason for this unique temperature profile in the stratosphere?", "options": [{"text": "Heat convection from the denser air below the tropopause.", "isCorrect": false, "rationale": "Convection primarily occurs in the troposphere. Heat transfer from below would typically lead to a decrease in temperature with altitude, not an increase."}, {"text": "The absorption of infrared radiation by water vapor and carbon dioxide.", "isCorrect": false, "rationale": "While water vapor and carbon dioxide are greenhouse gases, their primary warming effect is mostly in the troposphere. The specific warming in the stratosphere is due to UV absorption."}, {"text": "The absorption of ultraviolet (UV) radiation by the ozone layer.", "isCorrect": true, "rationale": "The text explicitly states: 'This warming is caused by the ozone layer... where ozone molecules (O3) absorb ultraviolet (UV) radiation from the Sun. The absorbed UV energy heats the surrounding air.'"}, {"text": "Frictional heating caused by meteors burning up upon entry.", "isCorrect": false, "rationale": "Most meteors burn up in the mesosphere, not the stratosphere, and this is not the primary reason for the overall temperature profile of the entire stratosphere."}], "id": "q06"}, {"question": "Which of the following phenomena occurs in the mesosphere, distinct from other atmospheric layers?", "options": [{"text": "The formation of the aurora (Northern and Southern Lights).", "isCorrect": false, "rationale": "The aurora occurs in the thermosphere, not the mesosphere."}, {"text": "The absorption of harmful UV radiation by a concentrated ozone layer.", "isCorrect": false, "rationale": "The ozone layer and its UV absorption occur in the stratosphere, not the mesosphere."}, {"text": "Most meteors burning up, creating 'shooting stars'.", "isCorrect": true, "rationale": "The text states: 'Most meteors burn up in the mesosphere, producing the “shooting stars” visible on clear nights.'"}, {"text": "Nearly all weather events and cloud formation.", "isCorrect": false, "rationale": "Nearly all weather events and cloud formation occur in the troposphere, the lowest layer."}], "id": "q07"}, {"question": "Atmospheric pressure decreases with altitude. Considering this, where would you expect to find approximately half of the atmosphere's total mass?", "options": [{"text": "Above 30 km altitude.", "isCorrect": false, "rationale": "The text states that '99% lies below 30 km,' meaning only 1% of the mass is above 30 km."}, {"text": "Between 12 km and 50 km altitude (the stratosphere).", "isCorrect": false, "rationale": "The stratosphere contains only a fraction of the atmosphere's mass; the majority is much lower. Half of the atmosphere's mass is below 5.5 km."}, {"text": "Below 5.5 km altitude.", "isCorrect": true, "rationale": "The text explicitly states: 'About half of the atmosphere's mass lies below 5.5 km.'"}, {"text": "Near the top of the thermosphere (around 600 km).", "isCorrect": false, "rationale": "The air density in the thermosphere is extremely low, meaning very little atmospheric mass is found at such high altitudes."}], "id": "q08"}, {"question": "Based on the characteristics of atmospheric layers, why might airline pilots prefer to cruise in the lower stratosphere (around 10-12 km altitude) rather than the upper troposphere?", "options": [{"text": "The air in the stratosphere is denser, providing more lift and less drag.", "isCorrect": false, "rationale": "Air density decreases with altitude, so the stratosphere would have thinner, less dense air than the troposphere, providing less lift. The text mentions air 'growing thinner' with altitude."}, {"text": "The stratosphere offers higher oxygen concentrations for more efficient engine combustion.", "isCorrect": false, "rationale": "Oxygen concentration, like total air density, decreases with altitude. Therefore, there would be less oxygen available for jet engines in the stratosphere."}, {"text": "The stratosphere is generally more stable and experiences significantly less weather activity.", "isCorrect": true, "rationale": "The text states that 'Nearly all weather occurs in the troposphere.' Cruising in the stratosphere would therefore avoid most turbulence and adverse weather conditions associated with the troposphere, leading to a smoother flight as implied by the 'thinkdeeper' question."}, {"text": "Temperatures are consistently warmer in the stratosphere, reducing the risk of icing and improving comfort.", "isCorrect": false, "rationale": "While temperature eventually increases in the stratosphere, the lower stratosphere (10-12 km) is still very cold, and the overall 'warmth' in the upper stratosphere is due to high kinetic energy of few molecules, not feeling warm. Also, the primary benefit is stability, not necessarily warmth."}], "id": "q09"}, {"question": "Which of the following is NOT listed as a major function or characteristic of Earth's atmosphere?", "options": [{"text": "Driving plate tectonics and volcanic activity through atmospheric pressure differentials.", "isCorrect": true, "rationale": "The text defines the atmosphere's roles as providing air, regulating temperature, protecting from radiation, and driving weather/climate. Plate tectonics and volcanic activity are geological processes driven by Earth's internal forces, not the atmosphere."}, {"text": "Shielding life on Earth's surface from most of the Sun's harmful UV radiation.", "isCorrect": false, "rationale": "The text explicitly states that the 'ozone layer is critically important: it shields life on Earth's surface from most of the Sun's harmful UV radiation.'"}, {"text": "Regulating global temperatures through the greenhouse effect.", "isCorrect": false, "rationale": "The text mentions the atmosphere 'regulates temperature' and that trace gases 'have an enormous influence on Earth's temperature through the greenhouse effect.'"}, {"text": "Containing gases essential for aerobic respiration and the nitrogen cycle.", "isCorrect": false, "rationale": "Oxygen is essential for aerobic respiration, and nitrogen plays a critical role in the nitrogen cycle, both of which are components of the atmosphere."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
