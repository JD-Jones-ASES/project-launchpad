    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 13, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following conditions is most likely to lead to the formation of a covalent bond between two atoms?", "options": [{"text": "Two metal atoms with vastly different electronegativities.", "isCorrect": false, "rationale": "Metal atoms typically form metallic bonds with each other, or if paired with a nonmetal, they tend to form ionic bonds through electron transfer."}, {"text": "A nonmetal atom and a metal atom with a large electronegativity difference.", "isCorrect": false, "rationale": "This scenario typically leads to the formation of an ionic bond, where electrons are transferred, not shared."}, {"text": "Two nonmetal atoms with similar electronegativities.", "isCorrect": true, "rationale": "Covalent bonds form when two nonmetal atoms with similar electronegativities share electrons because neither can pull electrons away from the other completely."}, {"text": "Two atoms, one of which has a full outer electron shell, and the other has an empty outer shell.", "isCorrect": false, "rationale": "An atom with a full outer shell is already stable and generally does not form bonds, while an atom with an empty outer shell would readily gain electrons, potentially forming an ionic bond, but not typically a covalent one under these specific circumstances."}], "id": "q01"}, {"question": "When two hydrogen atoms form a single covalent bond, how does each atom achieve a stable electron configuration?", "options": [{"text": "One hydrogen atom completely transfers its electron to the other, creating ions.", "isCorrect": false, "rationale": "This describes ionic bonding, not covalent bonding, where electrons are shared, not transferred."}, {"text": "Each hydrogen atom effectively 'sees' two electrons around its nucleus by sharing a pair of electrons.", "isCorrect": true, "rationale": "By sharing a pair of electrons, each hydrogen atom fulfills the duet rule, effectively having two electrons in its first energy level, which is a stable configuration."}, {"text": "The atoms develop partial positive and negative charges, attracting each other.", "isCorrect": false, "rationale": "While polar covalent bonds involve partial charges, the primary mechanism for stability in H-H (a nonpolar bond) is the sharing of electrons to complete the duet."}, {"text": "Each hydrogen atom reduces its electron count to zero, achieving stability.", "isCorrect": false, "rationale": "Atoms aim to achieve a full outer shell, not an empty one, to gain stability."}], "id": "q02"}, {"question": "Which statement accurately compares the properties of different types of covalent bonds?", "options": [{"text": "A single bond is generally shorter and stronger than a double bond.", "isCorrect": false, "rationale": "The opposite is true; a double bond is shorter and stronger than a single bond due to sharing more electron pairs."}, {"text": "A triple bond involves two shared electron pairs and is weaker than a single bond.", "isCorrect": false, "rationale": "A triple bond involves three shared electron pairs (6 electrons) and is stronger, not weaker, than a single bond."}, {"text": "As the number of shared electron pairs between two atoms increases, the bond becomes shorter and stronger.", "isCorrect": true, "rationale": "The text explicitly states that 'the more electron pairs shared, the shorter and stronger the bond.' Triple bonds are shorter and stronger than double, which are shorter and stronger than single."}, {"text": "Nitrogen gas (N2) is extremely stable because its triple bond is unusually long and weak.", "isCorrect": false, "rationale": "Nitrogen gas is extremely stable precisely because its triple bond is very strong and short, making it difficult to break."}], "id": "q03"}, {"question": "What is the primary purpose of drawing a Lewis structure for a molecule?", "options": [{"text": "To calculate the precise bond angles and molecular geometry of the molecule.", "isCorrect": false, "rationale": "While Lewis structures are a basis, the VSEPR model is used to predict precise molecular geometry and bond angles, not the Lewis structure itself."}, {"text": "To determine whether the molecule will be soluble in water.", "isCorrect": false, "rationale": "Solubility in water depends on the molecule's overall polarity, which can be inferred from a Lewis structure and molecular shape, but it's not the primary purpose of drawing it."}, {"text": "To visualize the arrangement of all valence electrons, including bonding and non-bonding pairs.", "isCorrect": true, "rationale": "Lewis structures are diagrams that show all valence electrons in a molecule, representing bonding pairs as lines and lone pairs as dots, helping to predict bonding and electron location."}, {"text": "To identify if the molecule contains any metallic bonds.", "isCorrect": false, "rationale": "Lewis structures are used for covalent and ionic compounds; metallic bonding is a different type of interaction not typically represented by Lewis structures."}], "id": "q04"}, {"question": "Following the steps for drawing a Lewis structure, which atom would typically be placed in the center for a molecule like CO2 (Carbon Dioxide)?", "options": [{"text": "Oxygen, because it is more electronegative.", "isCorrect": false, "rationale": "The rule states to place the least electronegative atom in the center (excluding hydrogen). Oxygen is more electronegative than carbon."}, {"text": "Carbon, because it is the least electronegative atom (excluding hydrogen).", "isCorrect": true, "rationale": "According to the rules, the least electronegative atom (other than hydrogen, which is always on the outside) is placed in the center. Carbon is less electronegative than oxygen."}, {"text": "Either carbon or oxygen, as the choice does not affect the final structure.", "isCorrect": false, "rationale": "The central atom placement is a crucial step that determines the connectivity and can significantly impact the resulting Lewis structure and subsequent molecular shape."}, {"text": "The atom that requires the most electrons to complete its octet.", "isCorrect": false, "rationale": "While an atom requiring more bonds might be central, the primary rule for placement is based on electronegativity, not directly on the number of electrons needed."}], "id": "q05"}, {"question": "A covalent bond formed between two different atoms where one atom has a significantly higher electronegativity than the other would be classified as what type of bond?", "options": [{"text": "Nonpolar covalent bond.", "isCorrect": false, "rationale": "Nonpolar covalent bonds involve equal or nearly equal sharing of electrons, typically between identical atoms or atoms with very similar electronegativities."}, {"text": "Ionic bond.", "isCorrect": false, "rationale": "While a large electronegativity difference can lead to an ionic bond (complete transfer), a 'significantly higher' electronegativity, particularly between two nonmetals, usually results in unequal sharing, which is a polar covalent bond."}, {"text": "Polar covalent bond.", "isCorrect": true, "rationale": "A polar covalent bond forms when electrons are shared unequally due to a difference in electronegativity between the bonded atoms, leading to partial positive and negative charges."}, {"text": "Metallic bond.", "isCorrect": false, "rationale": "Metallic bonds occur between metal atoms, characterized by a 'sea' of delocalized electrons, not unequal sharing between specific atoms."}], "id": "q06"}, {"question": "Which of the following elements has the highest electronegativity according to periodic trends?", "options": [{"text": "Cesium (Cs), located in Group 1, Period 6.", "isCorrect": false, "rationale": "Electronegativity increases from bottom to top within a group, so Cs, being at the bottom, would have low electronegativity."}, {"text": "Fluorine (F), located in Group 17, Period 2.", "isCorrect": true, "rationale": "Electronegativity increases from left to right across a period and from bottom to top within a group. Fluorine is in the top right of the periodic table (excluding noble gases) and is stated as 'the most electronegative element'."}, {"text": "Carbon (C), located in Group 14, Period 2.", "isCorrect": false, "rationale": "While carbon has moderate electronegativity, it is significantly less electronegative than fluorine, which is to its right and higher on the periodic table."}, {"text": "Lithium (Li), located in Group 1, Period 2.", "isCorrect": false, "rationale": "Lithium is a metal in Group 1, making it one of the least electronegative elements."}], "id": "q07"}, {"question": "According to the VSEPR model, what is the fundamental principle that determines the shape of a molecule?", "options": [{"text": "The strongest bond determines the overall linear arrangement of atoms.", "isCorrect": false, "rationale": "The VSEPR model does not solely rely on bond strength to determine shape, and not all molecules are linear."}, {"text": "Only bonding electron pairs influence the molecular geometry; lone pairs are negligible.", "isCorrect": false, "rationale": "The text explicitly states, 'lone pairs count as electron groups and affect the shape,' making this statement incorrect."}, {"text": "Electron pairs around a central atom repel each other and arrange themselves as far apart as possible.", "isCorrect": true, "rationale": "This is the core principle of the VSEPR model, which minimizes repulsion between electron groups (bonding and lone pairs) to determine molecular shape."}, {"text": "The atom with the highest electronegativity dictates the molecular shape.", "isCorrect": false, "rationale": "Electronegativity influences bond polarity but is not the direct principle by which VSEPR predicts shape; electron pair repulsion is the key."}], "id": "q08"}, {"question": "Water (H2O) has a bent molecular shape, while carbon dioxide (CO2) is linear. How does the presence of lone pairs of electrons on the central atom explain water's bent shape?", "options": [{"text": "The lone pairs on oxygen pull the hydrogen atoms closer, making the molecule more compact.", "isCorrect": false, "rationale": "Lone pairs are electron groups that repel other electron groups, including bonding pairs, pushing them away, not pulling them closer."}, {"text": "Lone pairs are attracted to the hydrogen atoms, causing the molecule to bend.", "isCorrect": false, "rationale": "Lone pairs are associated with the central atom and repel other electron groups, they are not specifically attracted to outer atoms in this way to cause bending."}, {"text": "The two lone pairs on the central oxygen atom count as electron groups that repel the two bonding pairs, forcing a bent arrangement.", "isCorrect": true, "rationale": "Water's oxygen has two bonding pairs and two lone pairs (total four electron groups). These four groups repel each other, arranging in a tetrahedral electron geometry, which results in a bent molecular geometry due to the lone pairs occupying space."}, {"text": "The polarity of the O-H bonds naturally causes the molecule to adopt a bent shape.", "isCorrect": false, "rationale": "While O-H bonds are polar, the polarity itself doesn't dictate the geometry directly. The arrangement of electron groups around the central atom, including lone pairs, determines the shape, which then influences overall molecular polarity."}], "id": "q09"}, {"question": "Carbon dioxide (CO2) contains polar C=O bonds but is a nonpolar molecule overall, whereas water (H2O) contains polar O-H bonds and is a polar molecule. What is the fundamental reason for this difference in overall molecular polarity?", "options": [{"text": "Oxygen is significantly more electronegative in H2O than in CO2.", "isCorrect": false, "rationale": "The electronegativity of oxygen is an intrinsic property and does not change between molecules."}, {"text": "CO2 has a linear molecular shape, causing its polar bond dipoles to cancel out, while H2O has a bent shape, preventing cancellation.", "isCorrect": true, "rationale": "As explained in the 'Think Deeper' section, CO2's linear shape means the two opposing C=O bond polarities cancel. H2O's bent shape means the O-H bond polarities do not point in opposite directions and thus do not cancel, resulting in a net molecular dipole."}, {"text": "CO2 forms double bonds, making it nonpolar, while H2O forms single bonds, making it polar.", "isCorrect": false, "rationale": "Bond order (single vs. double) does not directly determine the overall molecular polarity; molecular shape and bond polarity are the key factors."}, {"text": "H2O is capable of forming hydrogen bonds, which inherently makes it a polar molecule.", "isCorrect": false, "rationale": "Hydrogen bonding is a consequence of water's polarity and molecular structure, not the cause of its polarity."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
