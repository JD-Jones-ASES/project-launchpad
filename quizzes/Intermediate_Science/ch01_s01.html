<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which scientist was the first to observe *living* microorganisms under a microscope?", "options": [{"text": "Robert Hooke", "isCorrect": false, "rationale": "Robert Hooke observed the air-filled walls of dead plant cells (cork cells) in 1665, which he named 'cells'."}, {"text": "Antonie van Leeuwenhoek", "isCorrect": true, "rationale": "Antonie van Leeuwenhoek, in the 1670s, used more powerful lenses to observe living 'animalcules' (which we now know as bacteria and protists) in various water samples and from his own body."}, {"text": "Matthias Schleiden", "isCorrect": false, "rationale": "Matthias Schleiden concluded in 1838 that all plants are made of cells, a significant contribution to cell theory, but not the first observation of living microorganisms."}, {"text": "Rudolf Virchow", "isCorrect": false, "rationale": "Rudolf Virchow contributed the principle in 1855 that all cells arise from pre-existing cells, but he was not among the earliest observers of cells or microorganisms."}], "id": "q01"}, {"question": "Which statement accurately represents one of the three foundational principles of cell theory?", "options": [{"text": "All cells spontaneously generate from nonliving matter.", "isCorrect": false, "rationale": "This statement describes 'spontaneous generation,' an old idea that cell theory, particularly Virchow's principle, directly refuted by stating all cells arise from pre-existing cells."}, {"text": "Cells are exclusively found in complex, multicellular organisms.", "isCorrect": false, "rationale": "Cell theory states that all living things are made of one or more cells, including single-celled organisms like bacteria and protists, not exclusively complex multicellular ones."}, {"text": "The cell is the basic unit of structure and function in living things.", "isCorrect": true, "rationale": "This is one of the three core principles of cell theory, emphasizing that all life processes occur at the cellular level."}, {"text": "All organelles arise from pre-existing organelles.", "isCorrect": false, "rationale": "While true for some organelles, the cell theory principle states that 'All cells arise from pre-existing cells,' not specifically organelles from organelles."}], "id": "q02"}, {"question": "A scientist observes a bacterial colony growing larger on a petri dish. Which principle of cell theory best explains the increase in the number of bacteria?", "options": [{"text": "All living things are made of one or more cells.", "isCorrect": false, "rationale": "While bacteria are living things made of cells, this principle describes the composition of life, not the mechanism of population growth."}, {"text": "The cell is the basic unit of structure and function.", "isCorrect": false, "rationale": "This principle describes the fundamental nature of a cell, but not how new cells are produced to increase the colony size."}, {"text": "All cells arise from pre-existing cells.", "isCorrect": true, "rationale": "The increase in a bacterial colony's size is due to existing bacteria dividing to produce new cells, directly illustrating the principle that new cells come only from pre-existing cells."}, {"text": "Cells contain the genetic information needed to reproduce.", "isCorrect": false, "rationale": "This is a true statement about cells, but it describes what allows them to reproduce, rather than the principle that explains the generation of new cells for growth."}], "id": "q03"}, {"question": "A biologist wants to observe the dynamic process of chromosomes separating during cell division in a living cell. Which type of microscope would be most appropriate for this investigation?", "options": [{"text": "Transmission electron microscope (TEM)", "isCorrect": false, "rationale": "TEMs provide high-resolution images of internal structures but require specimens to be dead, preserved, and placed in a vacuum, making them unsuitable for observing live processes."}, {"text": "Scanning electron microscope (SEM)", "isCorrect": false, "rationale": "SEMs create 3D images of cell surfaces and also require dead, preserved specimens in a vacuum, making them unsuitable for observing live processes."}, {"text": "Compound light microscope", "isCorrect": true, "rationale": "Light microscopes are ideal for observing living cells, watching cell division in real time, and examining stained tissue samples, despite their lower resolution compared to electron microscopes."}, {"text": "X-ray microscope", "isCorrect": false, "rationale": "X-ray microscopes are not mentioned in the text as a primary tool for observing live cell division and are not a standard type discussed for this purpose in introductory biology."}], "id": "q04"}, {"question": "What is the primary advantage of an electron microscope over a light microscope when examining cellular structures?", "options": [{"text": "It allows for the observation of living cells in real-time.", "isCorrect": false, "rationale": "This is a characteristic of light microscopes; electron microscopes require dead and preserved specimens."}, {"text": "It uses glass lenses, which are cheaper to produce.", "isCorrect": false, "rationale": "Electron microscopes use electromagnetic lenses to focus beams of electrons, not glass lenses, and are generally more expensive."}, {"text": "It provides significantly higher resolution and magnification.", "isCorrect": true, "rationale": "Due to the much shorter wavelength of electrons compared to visible light, electron microscopes achieve far greater resolution (up to 2000x better) and magnification (up to 2,000,000x)."}, {"text": "It can resolve structures smaller than 200 nanometers using visible light.", "isCorrect": false, "rationale": "Light microscopes cannot resolve structures smaller than about 200 nm because of the wavelength of visible light. Electron microscopes can, but they do not use visible light."}], "id": "q05"}, {"question": "Despite Robert Hooke's observation of cells in 1665 and Antonie van Leeuwenhoek's discovery of living microorganisms in the 1670s, the full cell theory wasn't formally established until the mid-1800s. Which factor was *least* likely to contribute to this 160+ year delay?", "options": [{"text": "Limitations in the resolving power of early microscopes.", "isCorrect": false, "rationale": "Early microscopes had limited resolution, making it difficult to observe cells clearly in all tissue types, which contributed significantly to the delay."}, {"text": "The slow and difficult communication among scientists across different regions.", "isCorrect": false, "rationale": "Communication was indeed slow (letters took weeks or months), hindering the rapid dissemination and synthesis of observations, contributing to the delay."}, {"text": "The prevailing belief in spontaneous generation for many life forms.", "isCorrect": false, "rationale": "The widespread acceptance of spontaneous generation was a major conceptual barrier that needed to be overcome before Virchow's principle of 'cells from cells' could be accepted, thus contributing to the delay."}, {"text": "A lack of scientific curiosity among researchers during the intervening period.", "isCorrect": true, "rationale": "The text implies ongoing observations and study ('scientists continued to observe cells in many different organisms') even if a grand conclusion wasn't immediately drawn. A general lack of curiosity is unlikely to be the primary reason for such a long delay; rather, it was the difficulty of synthesizing diverse observations and overcoming existing paradigms."}], "id": "q06"}, {"question": "A scientist wants to investigate the detailed internal structure of a mitochondrion, including its inner folds. Which type of microscope would be most suitable?", "options": [{"text": "Scanning electron microscope (SEM)", "isCorrect": false, "rationale": "An SEM is used to produce dramatic three-dimensional images of *surfaces* of specimens, not detailed internal structures like mitochondrial folds."}, {"text": "Compound light microscope", "isCorrect": false, "rationale": "A compound light microscope has insufficient resolution to reveal the detailed internal structures of organelles like the inner folds of mitochondria, which are smaller than its resolution limit of approximately 200 nm."}, {"text": "Transmission electron microscope (TEM)", "isCorrect": true, "rationale": "A TEM sends electrons *through* an ultra-thin specimen, producing detailed images of *internal cell structures*. This makes it ideal for visualizing the double membrane and folds inside mitochondria."}, {"text": "Dissecting microscope", "isCorrect": false, "rationale": "A dissecting microscope (stereomicroscope) provides low magnification and is used for observing larger, macroscopic specimens, not microscopic cellular organelles."}], "id": "q07"}, {"question": "The combined work of Matthias Schleiden and Theodor Schwann was revolutionary because it proposed what unifying principle for all living organisms?", "options": [{"text": "All living things reproduce sexually.", "isCorrect": false, "rationale": "Schleiden and Schwann's work focused on cellular composition, not reproductive mechanisms, and many organisms reproduce asexually."}, {"text": "All living organisms are composed of one or more cells.", "isCorrect": true, "rationale": "Schleiden concluded all plants are made of cells (1838), and Schwann concluded all animals are made of cells (1839). Together, they proposed this principle, unifying all life under a single structural concept."}, {"text": "All cells contain a nucleus and other organelles.", "isCorrect": false, "rationale": "While many cells do, this is not the unifying principle they proposed. Bacteria, for instance, are cells but lack a nucleus. Their contribution was about *all* organisms being made of cells, not the specific internal components."}, {"text": "All life spontaneously generates from nonliving matter.", "isCorrect": false, "rationale": "This idea was later overturned by Rudolf Virchow's contribution to cell theory, stating cells arise from pre-existing cells, completely contrary to spontaneous generation."}], "id": "q08"}, {"question": "The statement 'Every life process — obtaining energy, removing waste, responding to the environment, reproducing — happens at the cellular level' directly supports which principle of cell theory?", "options": [{"text": "All living things are made of one or more cells.", "isCorrect": false, "rationale": "This principle describes the composition of organisms, not the functional role of the cell in carrying out life processes."}, {"text": "The cell is the basic unit of structure and function in living things.", "isCorrect": true, "rationale": "This principle explicitly states that the cell is the 'basic unit of structure and function,' meaning that all fundamental life processes occur within or by cells."}, {"text": "All cells arise from pre-existing cells.", "isCorrect": false, "rationale": "This principle explains the origin of new cells, not the execution of life processes within existing cells."}, {"text": "Cells require organelles to perform their functions.", "isCorrect": false, "rationale": "While true, this is a more detailed statement about cellular components. The principle directly supported is the overarching idea that the cell itself is the fundamental unit of function."}], "id": "q09"}, {"question": "How does the cell theory fundamentally change our understanding of the diversity of life on Earth?", "options": [{"text": "It explains that genetic information is transferred through DNA.", "isCorrect": false, "rationale": "While a fundamental biological concept, the mechanism of genetic information transfer (DNA) is a separate discovery from the core tenets of cell theory."}, {"text": "It reveals that all organisms, regardless of their outward appearance, share a common fundamental organizational plan.", "isCorrect": true, "rationale": "The cell theory provides a unifying principle, stating that from a sunflower to a shark, all life is built from cells and those cells perform the same essential functions, thus revealing a common organizational plan despite outward diversity."}, {"text": "It classifies organisms based on their evolutionary relationships and shared ancestry.", "isCorrect": false, "rationale": "This is a key aspect of evolutionary theory and taxonomy, not the primary impact of cell theory itself on understanding diversity."}, {"text": "It provides a detailed account of how complex organisms develop from a single fertilized egg.", "isCorrect": false, "rationale": "This describes developmental biology. While cell division (part of cell theory) is crucial to development, the cell theory's primary impact is broader: unifying all life at the cellular level."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
