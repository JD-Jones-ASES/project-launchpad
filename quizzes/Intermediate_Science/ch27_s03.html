<script>
var QUESTIONS = [{"question": "How is the scientific case for human-caused climate change primarily characterized in the text?", "options": [{"text": "It comes from a single, conclusive study published recently by NASA.", "isCorrect": false, "rationale": "The text explicitly states that 'The evidence for human-caused climate change does not come from a single measurement or a single study.'"}, {"text": "It is built upon thousands of independent observations made over decades by scientists worldwide, all pointing in the same direction.", "isCorrect": true, "rationale": "The text states, 'It comes from thousands of independent observations made by scientists around the world over many decades. These lines of evidence all point in the same direction, forming a scientific case as strong as any in modern science.'"}, {"text": "It relies solely on instrumental temperature records, as other forms of evidence are less reliable.", "isCorrect": false, "rationale": "While temperature records are a key line of evidence, the text emphasizes 'multiple independent lines of evidence' and discusses many other factors like ice melt, sea level rise, and ocean acidification."}, {"text": "It is predominantly based on climate models and future projections, rather than past observations.", "isCorrect": false, "rationale": "The text focuses on 'independent observations' and 'reliable instrumental temperature records extend back to about 1850,' indicating a basis in past and current data, not just future projections."}]}, {"question": "If the global temperature anomaly was +0.4°C in 1990 and +1.3°C in 2030 (relative to the 1850–1900 baseline), what is the average rate of warming per year over this 40-year period?", "options": [{"text": "0.0125°C/year", "isCorrect": false, "rationale": "This calculation is incorrect. The temperature change is 1.3 - 0.4 = 0.9°C. The time interval is 2030 - 1990 = 40 years. The rate is 0.9 / 40 = 0.0225°C/year."}, {"text": "0.0225°C/year", "isCorrect": true, "rationale": "Following the method in Worked Example 1, the change in temperature anomaly is 1.3°C - 0.4°C = 0.9°C. The time interval is 2030 - 1990 = 40 years. The average rate of warming is 0.9°C / 40 years = 0.0225°C/year."}, {"text": "0.0325°C/year", "isCorrect": false, "rationale": "This calculation is incorrect. The temperature change is 1.3 - 0.4 = 0.9°C. The time interval is 2030 - 1990 = 40 years. The rate is 0.9 / 40 = 0.0225°C/year."}, {"text": "0.0425°C/year", "isCorrect": false, "rationale": "This calculation is incorrect. The temperature change is 1.3 - 0.4 = 0.9°C. The time interval is 2030 - 1990 = 40 years. The rate is 0.9 / 40 = 0.0225°C/year."}]}, {"question": "Which statement best explains the phenomenon of Arctic amplification and its primary driver?", "options": [{"text": "Arctic amplification is caused by increased solar radiation directly impacting the North Pole, unrelated to local ice cover.", "isCorrect": false, "rationale": "While solar radiation is the ultimate energy source, Arctic amplification is specifically described as 'driven primarily by the ice-albedo feedback,' not just direct radiation."}, {"text": "The Arctic warms two to three times faster than the global average due to the ice-albedo feedback, where melting ice exposes darker ocean water that absorbs more solar radiation, leading to further warming.", "isCorrect": true, "rationale": "The text defines Arctic amplification as 'the observed trend in which the Arctic region warms at a rate two to three times faster than the global average, driven primarily by the ice-albedo feedback — as ice melts, darker ocean water absorbs more solar radiation, which causes more warming and more ice melt.'"}, {"text": "Arctic amplification refers to a cooling trend in the Arctic, as increased melting ice reflects more sunlight.", "isCorrect": false, "rationale": "Arctic amplification describes a warming trend, not a cooling one. The ice-albedo feedback actually leads to *more* heat absorption, not reflection, as ice melts."}, {"text": "It is mainly a result of shifts in atmospheric circulation patterns that bring colder air masses to the Arctic, slowing warming.", "isCorrect": false, "rationale": "Arctic amplification describes accelerated warming, not a slowing of warming. The mechanism described is the ice-albedo feedback, not primarily shifts in atmospheric circulation."}]}, {"question": "According to the text, what is currently the largest contributor to global sea level rise?", "options": [{"text": "Melting of Arctic sea ice, which adds significant volume to the ocean.", "isCorrect": false, "rationale": "The text explicitly states: '(Note: melting sea ice, such as Arctic ice, does not significantly raise sea level because it is already floating in the ocean — just as a melting ice cube in a glass does not cause the glass to overflow.)'"}, {"text": "Thermal expansion of warming ocean water.", "isCorrect": true, "rationale": "The text states, 'Thermal expansion: As ocean water warms, it expands... This is currently the largest contributor to sea level rise.'"}, {"text": "Water flowing into oceans from thawing permafrost in Arctic regions.", "isCorrect": false, "rationale": "While permafrost thaw is discussed as an impact releasing greenhouse gases, it is not listed as a primary contributor to sea level rise. Melting land ice (glaciers and ice sheets) is, but thermal expansion is larger."}, {"text": "Increased rainfall directly over the oceans due to a warmer atmosphere.", "isCorrect": false, "rationale": "While increased precipitation is mentioned as an extreme weather event, the text does not identify it as a primary driver of global mean sea level rise compared to thermal expansion and melting land ice."}]}, {"question": "How does the ocean's absorption of excess atmospheric CO2 lead to ocean acidification?", "options": [{"text": "CO2 directly displaces oxygen in the water, causing an imbalance that lowers pH.", "isCorrect": false, "rationale": "While CO2 affects ocean chemistry, the primary mechanism of acidification is its reaction with water, not direct oxygen displacement."}, {"text": "CO2 reacts with water to form carbonic acid (H2CO3), which then dissociates to release hydrogen ions (H+), thereby lowering the ocean's pH.", "isCorrect": true, "rationale": "The text explains, 'When CO2 dissolves in seawater, it reacts to form carbonic acid... carbonic acid dissociates to release hydrogen ions (H^+), lowering the pH and causing ocean acidification.'"}, {"text": "CO2 in the atmosphere blocks sunlight from reaching the ocean, altering its chemical composition.", "isCorrect": false, "rationale": "This describes a potential effect on light, but not the chemical mechanism of ocean acidification as detailed in the text."}, {"text": "The increase in CO2 causes the ocean to warm, and warmer water inherently has a lower pH.", "isCorrect": false, "rationale": "While ocean warming is occurring, ocean acidification is a direct chemical process of CO2 dissolving in water, independent of temperature's direct effect on pH, though both are related to CO2."}]}, {"question": "The text states the ocean's pH dropped from about 8.2 to 8.1, representing a 26% increase in acidity (hydrogen ion concentration). If the pH were to drop by another 0.1 (from 8.1 to 8.0), what would be the approximate cumulative percentage increase in acidity compared to the pre-industrial pH of 8.2?", "options": [{"text": "26%", "isCorrect": false, "rationale": "A 26% increase is for a 0.1 pH unit drop. A cumulative drop of 0.2 pH units (from 8.2 to 8.0) would be a greater percentage increase due to the logarithmic nature of the pH scale."}, {"text": "39%", "isCorrect": false, "rationale": "This calculation is incorrect. A 26% increase from 8.2 to 8.1 means H+ concentration is 1.26 times the original. Another 26% increase from 8.1 to 8.0 means the new H+ concentration is 1.26 * 1.26 = 1.5876 times the original. This is a 58.76% cumulative increase."}, {"text": "52%", "isCorrect": false, "rationale": "This assumes a linear addition (26% + 26%), but the pH scale is logarithmic. A 26% increase in H+ concentration for each 0.1 pH unit drop means the effect is multiplicative, not additive."}, {"text": "59%", "isCorrect": true, "rationale": "A drop of 0.1 pH unit represents a roughly 26% increase in hydrogen ion concentration (1.26x). A cumulative drop of 0.2 pH units (from 8.2 to 8.0) would mean the hydrogen ion concentration increased by a factor of 1.26 * 1.26 = 1.5876. This is a (1.5876 - 1) * 100% = 58.76%, or approximately 59% increase in acidity from the original pH of 8.2."}]}, {"question": "Why are organisms that build shells or skeletons from calcium carbonate (CaCO3) particularly vulnerable to ocean acidification?", "options": [{"text": "Increased acidity causes the water to become too dense, making it difficult for them to move.", "isCorrect": false, "rationale": "The text does not mention water density as a factor. The primary impact is on the chemical processes related to calcium carbonate."}, {"text": "Acidic conditions make the chemical reaction to form CaCO3 less favorable and can cause existing shells to dissolve.", "isCorrect": true, "rationale": "The text states, 'In more acidic water, the chemical reaction that forms CaCO3 becomes less favorable, and existing shells can dissolve.' It also lists corals, shellfish, and plankton as vulnerable due to their reliance on CaCO3."}, {"text": "These organisms are sensitive to warmer water temperatures, which always accompany acidification.", "isCorrect": false, "rationale": "While warming is also a threat ('Combined with warming and coral bleaching'), the question specifically asks about ocean acidification. The direct impact of acidification is on calcium carbonate chemistry, not solely temperature sensitivity."}, {"text": "The formation of carbonic acid in the ocean consumes all available calcium, leaving none for shell formation.", "isCorrect": false, "rationale": "The issue is not the consumption of all calcium, but rather the change in chemical equilibrium that makes it harder for organisms to combine calcium and carbonate ions into calcium carbonate and can even cause existing shells to dissolve."}]}, {"question": "Which of the following is NOT described in the text as an observed response of ecosystems to climate change?", "options": [{"text": "Species shifting their geographical ranges toward the poles or to higher elevations.", "isCorrect": false, "rationale": "The text states: 'Species are shifting their ranges toward the poles and to higher elevations, tracking suitable temperatures.'"}, {"text": "Earlier occurrence of spring events, such as flowering and bird migration, leading to phenological mismatch.", "isCorrect": false, "rationale": "The text states: 'Spring events (flowering, bird migration, insect emergence) are occurring earlier, disrupting ecological timing (phenological mismatch).'"}, {"text": "An increase in the overall biodiversity and health of coral reefs due to warmer ocean temperatures.", "isCorrect": true, "rationale": "The text describes 'coral bleaching' due to warmer water temperatures, which 'kills them,' and ocean acidification, which threatens coral reef survival. This is the opposite of an increase in biodiversity and health."}, {"text": "Thawing permafrost in Arctic ecosystems, releasing stored greenhouse gases.", "isCorrect": false, "rationale": "The text states: 'Arctic ecosystems are changing rapidly: permafrost is thawing, releasing stored CO2 and CH4, which creates a positive feedback loop.'"}]}, {"question": "The melting of permafrost is described as a positive feedback loop. Which of the following best explains why?", "options": [{"text": "Melting permafrost creates more surface water, which then absorbs atmospheric CO2, thereby reducing global warming.", "isCorrect": false, "rationale": "This describes a negative feedback (reducing warming), which is contrary to the text's explanation of permafrost thaw as a positive feedback."}, {"text": "Thawing permafrost releases stored greenhouse gases like CO2 and CH4, which further enhance the greenhouse effect, leading to more warming and more permafrost melt.", "isCorrect": true, "rationale": "The text states: 'permafrost is thawing, releasing stored CO2 and CH4, which creates a positive feedback loop — in the case of permafrost thaw, warming causes permafrost to melt, releasing greenhouse gases that cause further warming, which causes more permafrost to melt that accelerates warming.'"}, {"text": "Permafrost thaw makes the ground unstable, which triggers seismic activity that releases heat from Earth's interior, cooling the surface.", "isCorrect": false, "rationale": "This is an unsubstantiated claim not mentioned in the text and does not align with the concept of a positive feedback loop for warming."}, {"text": "Melting permafrost exposes darker soil, but this newly exposed soil has a higher albedo than ice, reflecting more sunlight and slowing warming.", "isCorrect": false, "rationale": "Darker soil would absorb more sunlight, not reflect more. The ice-albedo feedback is a positive feedback where darker surfaces absorb more heat. This option reverses the effect and mischaracterizes the albedo of soil compared to ice."}]}, {"question": "Considering the impacts on human systems discussed in the text, which scenario best illustrates a concern related to environmental justice?", "options": [{"text": "A large, wealthy coastal city invests heavily in advanced sea walls and drainage systems to protect its infrastructure from rising sea levels.", "isCorrect": false, "rationale": "This scenario describes a community with significant resources successfully adapting, which does not highlight the unequal distribution of burdens or benefits."}, {"text": "Farmers in a temperate zone experience a slightly longer growing season due to warmer temperatures, leading to increased crop yields and economic benefits.", "isCorrect": false, "rationale": "This scenario describes a benefit of climate change for a specific group, not an environmental justice concern, which focuses on disproportionate burdens."}, {"text": "A low-lying island nation, with limited economic resources and infrastructure, faces the potential displacement of its entire population due to accelerating sea level rise and intensified storms.", "isCorrect": true, "rationale": "The text explicitly mentions: 'The impacts of climate change are not distributed equally. Communities in developing nations, indigenous populations, and low-income communities in wealthy nations often face the greatest risks because they have fewer resources to adapt. This raises important questions of environmental justice.' This scenario directly exemplifies a low-resource community facing existential threats."}, {"text": "A nation with a highly developed healthcare system effectively manages an increase in heat-related illnesses among its elderly population through advanced warning systems and cooling centers.", "isCorrect": false, "rationale": "Similar to the wealthy city example, this shows a well-resourced nation effectively mitigating an impact, rather than highlighting an injustice or unequal burden."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
