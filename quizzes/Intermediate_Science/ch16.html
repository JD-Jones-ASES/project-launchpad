    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 16</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary role of DNA within a living organism, as described in the text?", "options": [{"text": "To produce energy for cellular processes by converting glucose.", "isCorrect": false, "rationale": "This describes the role of mitochondria, not DNA. DNA's primary role is genetic instruction."}, {"text": "To carry the genetic instructions for the development, functioning, and reproduction of all known living organisms.", "isCorrect": true, "rationale": "The text explicitly states DNA carries 'the genetic instructions for the development, functioning, and reproduction of all known living organisms.'"}, {"text": "To form the structural components of cell membranes and walls.", "isCorrect": false, "rationale": "Cell membranes are primarily composed of lipids and proteins, while cell walls (in plants/bacteria) are made of other materials, not DNA."}, {"text": "To break down waste products and old organelles within the cell.", "isCorrect": false, "rationale": "This describes the function of lysosomes, which are involved in waste degradation, not the primary role of DNA."}], "id": "q01"}, {"question": "Which scientists are primarily credited with building the first accurate three-dimensional model of DNA's structure in 1953?", "options": [{"text": "Rosalind Franklin and Maurice Wilkins", "isCorrect": false, "rationale": "Franklin and Wilkins produced crucial X-ray crystallography images that Watson and Crick used, but they did not build the model themselves."}, {"text": "James Watson and Francis Crick", "isCorrect": true, "rationale": "The text clearly states, 'James Watson and Francis Crick...built the first accurate model of DNA's three-dimensional structure in 1953.'"}, {"text": "Gregor Mendel and Thomas Hunt Morgan", "isCorrect": false, "rationale": "Mendel and Morgan were foundational figures in genetics, studying heredity, but their work predates and is separate from the discovery of DNA's molecular structure."}, {"text": "Erwin Chargaff and Linus Pauling", "isCorrect": false, "rationale": "Chargaff discovered the base pairing rules (A=T, G=C), which were vital for Watson and Crick, and Pauling proposed an incorrect triple helix model; neither built the correct double helix model."}], "id": "q02"}, {"question": "Which of the following correctly describes the three essential components of a single DNA nucleotide?", "options": [{"text": "A sugar molecule, a nitrogen-containing base, and an amino acid.", "isCorrect": false, "rationale": "Amino acids are the building blocks of proteins, not DNA nucleotides. DNA nucleotides contain a phosphate group instead of an amino acid."}, {"text": "A phosphate group, a deoxyribose sugar molecule, and a nitrogen-containing base.", "isCorrect": true, "rationale": "The text defines a nucleotide as consisting of 'a sugar molecule (deoxyribose in DNA), a phosphate group, and a nitrogen-containing base.'"}, {"text": "Two phosphate groups, a ribose sugar, and a lipid molecule.", "isCorrect": false, "rationale": "DNA contains deoxyribose, not ribose, only one phosphate group per nucleotide, and no lipid molecule as part of its structure."}, {"text": "A protein, a lipid, and a carbohydrate.", "isCorrect": false, "rationale": "These are classes of macromolecules, not the specific components of a DNA nucleotide."}], "id": "q03"}, {"question": "If a segment of one DNA strand has the sequence A-G-C-T-T-A, what would be the sequence of its complementary strand?", "options": [{"text": "A-G-C-T-T-A", "isCorrect": false, "rationale": "This is the identical sequence, not the complementary one. The complementary strand would have different bases paired according to the rules."}, {"text": "T-C-G-A-A-T", "isCorrect": true, "rationale": "According to complementary base pairing rules, Adenine (A) pairs with Thymine (T), and Guanine (G) pairs with Cytosine (C). Therefore, A-G-C-T-T-A complements to T-C-G-A-A-T."}, {"text": "G-A-T-C-C-G", "isCorrect": false, "rationale": "This sequence does not follow the correct complementary base pairing rules (e.g., A does not pair with G)."}, {"text": "C-T-A-G-G-C", "isCorrect": false, "rationale": "This sequence incorrectly pairs C with T and A with G, violating the complementary base pairing rules."}], "id": "q04"}, {"question": "According to the text, what is a 'gene' primarily defined as?", "options": [{"text": "The entire DNA molecule within a human cell, containing all genetic information.", "isCorrect": false, "rationale": "A gene is a specific segment of DNA, not the entire molecule. The complete DNA molecule contains many genes."}, {"text": "A segment of DNA that contains the instructions for building a specific protein (or set of proteins).", "isCorrect": true, "rationale": "The text defines a gene as 'A segment of DNA that contains the instructions for building a specific protein (or set of proteins).'"}, {"text": "The alternating sugar and phosphate molecules that form the backbone of a DNA strand.", "isCorrect": false, "rationale": "The sugar-phosphate backbone is a structural component of DNA, not a gene itself."}, {"text": "A complete set of chromosomes found in the nucleus of a cell.", "isCorrect": false, "rationale": "A complete set of chromosomes refers to a cell's karyotype or genome, which contains many genes, but is not the definition of a single gene."}], "id": "q05"}, {"question": "The 'Chemistry Connection' box highlights that guanine (G) and cytosine (C) pairs are held by three hydrogen bonds, while adenine (A) and thymine (T) pairs are held by two. What is the practical implication of this difference?", "options": [{"text": "DNA with a higher percentage of A-T pairs is more stable and heat-resistant.", "isCorrect": false, "rationale": "The text states the opposite: G-C pairs are stronger due to three hydrogen bonds, making G-C rich DNA more resistant to heat."}, {"text": "This difference in bond strength dictates the speed of DNA replication, favoring G-C rich regions.", "isCorrect": false, "rationale": "While bond strength can affect unzipping, the text doesn't specify this as the primary practical implication or impact on replication speed in this way."}, {"text": "DNA with a higher percentage of G-C pairs is more resistant to heat.", "isCorrect": true, "rationale": "The text explicitly states, 'The G–C pair is slightly stronger, which is why DNA with a higher percentage of G–C pairs is more resistant to heat.'"}, {"text": "The number of hydrogen bonds determines whether a gene is 'turned on' or 'turned off'.", "isCorrect": false, "rationale": "Gene regulation ('turning on and off') involves complex interactions with regulatory proteins and other DNA segments, not directly the number of hydrogen bonds in a base pair."}], "id": "q06"}, {"question": "Why is DNA replication an essential process for a cell, particularly before cell division (mitosis)?", "options": [{"text": "To create new genes to allow for species evolution and adaptation.", "isCorrect": false, "rationale": "Replication copies existing genes accurately; new genes arise from mutations or other genetic events, not directly from replication's primary purpose."}, {"text": "To produce RNA molecules that will be translated into proteins.", "isCorrect": false, "rationale": "The process of producing RNA from DNA is called transcription, not replication. Replication's purpose is DNA copying."}, {"text": "To ensure that each daughter cell receives a complete and identical set of genetic instructions.", "isCorrect": true, "rationale": "The text states that before cell division, DNA must be copied 'so that each daughter cell receives a complete set of genetic instructions.'"}, {"text": "To repair any damage that has occurred to the DNA molecule during normal cell function.", "isCorrect": false, "rationale": "DNA repair mechanisms exist, but the primary purpose of replication is copying the entire genome, not just repairing damage."}], "id": "q07"}, {"question": "During DNA replication, what are the distinct roles of the enzymes helicase and DNA polymerase?", "options": [{"text": "Helicase synthesizes new DNA strands, while DNA polymerase unwinds the double helix.", "isCorrect": false, "rationale": "This statement swaps the roles of the two enzymes. Helicase unwinds, and DNA polymerase synthesizes."}, {"text": "Helicase breaks the hydrogen bonds to separate the two DNA strands, while DNA polymerase links new nucleotides together to form a new strand.", "isCorrect": true, "rationale": "The text describes helicases as breaking 'the hydrogen bonds between base pairs, separating the two strands' and DNA polymerase as linking 'the new nucleotides together, forming a continuous new strand.'"}, {"text": "Both enzymes work together to repair errors in DNA sequencing before cell division.", "isCorrect": false, "rationale": "While DNA polymerase has proofreading capabilities, their primary distinct roles described here are unwinding and synthesizing, not just error repair."}, {"text": "Helicase forms the sugar-phosphate backbone, and DNA polymerase adds the nitrogenous bases.", "isCorrect": false, "rationale": "Helicase unwinds; DNA polymerase builds the new strand, including both backbone and bases, by linking nucleotides, not just adding bases."}], "id": "q08"}, {"question": "The process of DNA replication is described as 'semiconservative.' What does this term mean in the context of the resulting DNA molecules?", "options": [{"text": "Each new DNA molecule is entirely composed of newly synthesized genetic material, with no part of the original molecule.", "isCorrect": false, "rationale": "This would be 'conservative' replication, which is not how DNA replicates."}, {"text": "Each new DNA molecule consists of one original (parental) strand and one newly synthesized (daughter) strand.", "isCorrect": true, "rationale": "The text states, 'This is called semiconservative replication because each new molecule “conserves” (keeps) one half of the original.'"}, {"text": "Only half of the original DNA molecule is copied during the process, resulting in one complete new molecule and one original molecule.", "isCorrect": false, "rationale": "Two complete and identical new molecules are produced, each containing half of the original DNA."}, {"text": "The original DNA molecule remains completely intact, and a brand new, identical copy is formed alongside it.", "isCorrect": false, "rationale": "This is also a description of 'conservative' replication, which is incorrect. The original molecule separates."}], "id": "q09"}, {"question": "The 'rails' of the DNA ladder are described as alternating sugar and phosphate molecules, while the 'rungs' are formed by base pairs. How does this structural arrangement primarily contribute to DNA's function as a stable information carrier?", "options": [{"text": "The sugar-phosphate backbone provides a strong, protective outer framework for the molecule, safeguarding the genetic information encoded in the sequence of bases within the rungs.", "isCorrect": true, "rationale": "The sugar-phosphate backbone forms the robust structural support of DNA, protecting the more chemically reactive and information-rich nitrogenous bases tucked inside the helix."}, {"text": "The flexible sugar-phosphate backbone allows the base pairs to easily reconfigure, facilitating rapid genetic mutation and evolution.", "isCorrect": false, "rationale": "The backbone is structurally stable, providing integrity. While mutations occur, the backbone's primary role isn't to facilitate them through flexibility."}, {"text": "The alternating sugar and phosphate arrangement aids in the quick dismantling of DNA when a cell no longer requires its genetic information.", "isCorrect": false, "rationale": "DNA is designed for stability and long-term information storage, not rapid dismantling. Its structure promotes stability."}, {"text": "The base pairs on the rungs are solely responsible for the overall helical shape, not the storage of genetic instructions.", "isCorrect": false, "rationale": "The base pairs are crucial for genetic information storage via their sequence and pairing. The double helix shape is influenced by both backbone and base pairing."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
