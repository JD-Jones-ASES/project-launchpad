    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Before Newton's First Law, what common misconception did Aristotle's teachings reinforce about motion?", "options": [{"text": "Objects naturally accelerate in the absence of a force.", "isCorrect": false, "rationale": "This is incorrect. Aristotle's view was that objects naturally come to rest, not accelerate, in the absence of a force."}, {"text": "Motion requires a constant force to be maintained.", "isCorrect": true, "rationale": "The text states: 'Common sense might suggest that objects naturally come to rest — that motion requires a constant force to maintain. For nearly two thousand years, this was the accepted view, taught by the ancient Greek philosopher Aristotle.'"}, {"text": "All objects possess an inherent tendency to resist changes in motion.", "isCorrect": false, "rationale": "This statement describes inertia, which is a concept introduced by Galileo and formalized by Newton, directly contradicting Aristotle's view."}, {"text": "Gravity is the sole force responsible for all changes in an object's velocity.", "isCorrect": false, "rationale": "While gravity is a force, Aristotle's primary misconception related to the general maintenance of motion, not specifically gravity's role in changing velocity."}]}, {"question": "Which statement best describes inertia as defined in Newton's First Law?", "options": [{"text": "Inertia is a force that causes objects to slow down.", "isCorrect": false, "rationale": "Inertia is a property of matter, not a force. It causes objects to resist changes in motion, including slowing down, but it doesn't 'cause' the slowing itself."}, {"text": "Inertia is the tendency of an object to resist changes in its state of motion, and it depends on the object's mass.", "isCorrect": true, "rationale": "The text defines inertia as 'The tendency of an object to resist changes in its state of motion... Inertia depends on mass: more massive objects have greater inertia.'"}, {"text": "Inertia is a measure of an object's velocity in deep space.", "isCorrect": false, "rationale": "Inertia is not a measure of velocity; it is a property that resists changes in velocity. It applies everywhere, not just deep space."}, {"text": "Inertia is the force required to bring a moving object to rest.", "isCorrect": false, "rationale": "Inertia is a property, not a force. An external force is required to bring an object to rest by overcoming its inertia."}]}, {"question": "A car suddenly brakes, and a passenger without a seatbelt is thrown forward. This phenomenon is best explained by:", "options": [{"text": "The sudden increase in the car's kinetic energy.", "isCorrect": false, "rationale": "When a car brakes, its kinetic energy decreases, it does not increase."}, {"text": "The car's tires losing traction with the road.", "isCorrect": false, "rationale": "While braking involves tire traction, the reason the passenger moves forward relates to their own state of motion, not the car's traction directly."}, {"text": "The passenger's inertia, which causes them to resist the change in motion.", "isCorrect": true, "rationale": "The text explains: 'When a car stops suddenly, your body's inertia keeps it moving forward at the car's original speed. Without a seatbelt, you would continue forward and collide with the dashboard or windshield.'"}, {"text": "A temporary malfunction of the car's braking system.", "isCorrect": false, "rationale": "This is a mechanical explanation, not a physical principle explaining the passenger's motion in accordance with Newton's First Law."}]}, {"question": "Imagine a hockey puck is given a push on a perfectly frictionless, horizontal surface in a vacuum. According to Newton's First Law, what will be the puck's subsequent motion?", "options": [{"text": "It will gradually slow down and eventually stop due to its inertia.", "isCorrect": false, "rationale": "Inertia causes an object to resist slowing down. Without friction or air resistance, there's no unbalanced force to slow it."}, {"text": "It will continue to move at a constant speed in a straight line indefinitely.", "isCorrect": true, "rationale": "Newton's First Law states an object in motion stays in motion at constant velocity unless acted upon by a net external force. In this ideal scenario, friction and air resistance are absent, so there's no net external force to change its motion."}, {"text": "It will immediately stop once the pushing force is removed.", "isCorrect": false, "rationale": "This aligns with the Aristotelian view, which Newton's First Law explicitly refutes, stating force is needed to *change* motion, not maintain it."}, {"text": "It will accelerate uniformly in the direction of the initial push.", "isCorrect": false, "rationale": "Acceleration requires a continuous net force. Once the push is removed, if there are no other forces, there is no acceleration."}]}, {"question": "Which statement correctly distinguishes between inertia and force based on the provided text?", "options": [{"text": "Inertia is a type of internal force, while external forces cause changes in motion.", "isCorrect": false, "rationale": "The text explicitly states: 'Inertia is not a force — it is a property of matter.'"}, {"text": "Inertia is a property of matter that resists changes in motion, whereas force is an interaction that causes changes in motion.", "isCorrect": true, "rationale": "The text clearly states, 'Inertia is not a force — it is a property of matter.' and 'force is needed to change motion.'"}, {"text": "Force is a universal property of all objects, but inertia only applies to objects in motion.", "isCorrect": false, "rationale": "Inertia applies to objects at rest as well; 'An object at rest tends to stay at rest...'"}, {"text": "Force is proportional to an object's mass, while inertia is inversely proportional to mass.", "isCorrect": false, "rationale": "Inertia is directly proportional to mass; 'more massive objects have greater inertia.'"}]}, {"question": "In the classic 'tablecloth trick,' a magician quickly pulls a tablecloth from under dishes, leaving them mostly in place. This works primarily because:", "options": [{"text": "The dishes are much lighter than the tablecloth.", "isCorrect": false, "rationale": "While mass is related to inertia, the trick works because of the *briefness* of the interaction relative to the dishes' inertia, not simply their lightness. More massive dishes would resist even more."}, {"text": "The brief, horizontal force applied by the cloth is not strong enough to overcome the dishes' inertia.", "isCorrect": true, "rationale": "The text explains: 'The dishes remain nearly stationary because their inertia resists the brief horizontal force of the cloth sliding beneath them. The pull is fast enough that friction between cloth and dishes does not have time to significantly accelerate the dishes.'"}, {"text": "The tablecloth exerts an upward buoyant force on the dishes.", "isCorrect": false, "rationale": "There is no buoyant force relevant in this scenario; buoyancy relates to fluids."}, {"text": "Static electricity between the dishes and the table holds them down.", "isCorrect": false, "rationale": "Static electricity is not mentioned and is not the primary physical principle at play in the tablecloth trick according to the text."}]}, {"question": "When a bus makes a sharp left turn, passengers often feel like they are being pushed towards the right side of the bus. From the perspective of Newton's First Law, what is actually happening to the passengers?", "options": [{"text": "A centrifugal force is actively pushing them to the right.", "isCorrect": false, "rationale": "Centrifugal force is a 'fictitious force' observed in a non-inertial (accelerating) reference frame. Newton's First Law explains this phenomenon as inertia in an inertial frame."}, {"text": "Their bodies are attempting to continue moving in a straight line while the bus turns beneath them.", "isCorrect": true, "rationale": "The text states: 'When a bus turns left, passengers feel pushed to the right. In reality, their bodies are obeying Newton's first law — trying to continue in a straight line — while the bus turns underneath them.'"}, {"text": "The friction between the passengers and their seats pulls them to the right.", "isCorrect": false, "rationale": "Friction between the passengers and the seats would tend to pull them *with* the bus, not push them in the opposite direction of the turn."}, {"text": "The bus's acceleration is creating an unbalanced force that pushes them to the right.", "isCorrect": false, "rationale": "The bus accelerates (changes direction), but the *passenger's* perceived push to the right is due to their own inertia maintaining their original straight-line motion."}]}, {"question": "According to Newton's First Law, if the net external force acting on an object is zero, what can be concluded about the object's velocity?", "options": [{"text": "The object must be at rest.", "isCorrect": false, "rationale": "A net force of zero means constant velocity, which includes being at rest but also includes moving at a constant speed in a straight line."}, {"text": "The object's velocity must be changing, meaning it is accelerating.", "isCorrect": false, "rationale": "A net force of zero specifically means *no* acceleration and *no* change in velocity."}, {"text": "The object's speed will increase, but its direction will remain constant.", "isCorrect": false, "rationale": "Neither speed nor direction will change if the net force is zero."}, {"text": "The object's velocity will remain constant, meaning it will either stay at rest or continue moving at a constant speed in a straight line.", "isCorrect": true, "rationale": "The text states: 'If the net force on an object is zero (forces are balanced), the object's velocity does not change. It remains at rest or continues at constant velocity.'"}]}, {"question": "A student states, 'If I stop pushing a box, it stops moving. This proves that a force is needed to keep an object moving.' How would a physicist use Newton's First Law to explain the flaw in this reasoning?", "options": [{"text": "The student is correct; objects naturally come to rest without an applied force, which aligns with Newton's First Law.", "isCorrect": false, "rationale": "This statement reflects the Aristotelian view, which Newton's First Law directly refutes. Newton's law states force is needed to *change* motion, not maintain it."}, {"text": "The box stops because the net external force on it is no longer zero; specifically, friction acts as an unbalanced force to decelerate it.", "isCorrect": true, "rationale": "This directly addresses the 'Think Deeper' section: 'When the student stops pushing, friction continues to act on the box. This unbalanced friction force decelerates the box until it stops.' The box stops due to an *opposing* force, not the *absence* of the pushing force alone."}, {"text": "Newton's First Law only applies to objects in space, not on Earth where gravity is present.", "isCorrect": false, "rationale": "Newton's laws are universal and apply on Earth, provided all forces (including gravity and friction) are accounted for."}, {"text": "The student should have pushed harder; with enough initial force, the box would move indefinitely.", "isCorrect": false, "rationale": "While a harder push would make it move further, it would still eventually stop due to friction unless friction was completely absent. The amount of initial force doesn't negate the presence of friction."}]}, {"question": "How did Galileo Galilei's observations and thought experiments primarily contribute to the development of Newton's First Law?", "options": [{"text": "Galileo proved that Earth revolves around the Sun, which is a prerequisite for understanding orbital inertia.", "isCorrect": false, "rationale": "While Galileo supported heliocentrism, his contribution to the *concept of inertia* for Newton's First Law as described in the text was distinct from his astronomical observations related to orbits."}, {"text": "Galileo conducted experiments showing that objects fall at the same rate regardless of mass, thus establishing gravity as a universal force.", "isCorrect": false, "rationale": "This was a significant discovery by Galileo, but the text specifically highlights his work with inclined planes as the foundation for inertia, not his falling object experiments."}, {"text": "Galileo deduced that on a perfectly flat, frictionless surface, an object would roll forever, thereby introducing the concept of inertia.", "isCorrect": true, "rationale": "The 'Galileo and Inertia' section states: 'Galileo performed thought experiments with inclined planes... On a perfectly flat, frictionless surface, the ball would neither speed up nor slow down — it would roll forever. Galileo called this tendency inertia, and Newton incorporated it into his first law of motion.'"}, {"text": "Galileo invented the telescope, allowing Newton to observe celestial bodies and understand their motion.", "isCorrect": false, "rationale": "Galileo invented the telescope, but this invention itself is not the primary way his work contributed to the *concept of inertia* for Newton's First Law as explained in the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
