<script>
var QUESTIONS = [{"question": "What was Charles Darwin's most significant breakthrough regarding the concept of evolution?", "options": [{"text": "He was the first scientist to propose that species could change over time.", "isCorrect": false, "rationale": "The text states, 'Darwin did not invent the idea that species change over time; other scientists had proposed similar ideas before him.'"}, {"text": "He provided a mechanism, natural selection, to explain how species change over time.", "isCorrect": true, "rationale": "The text highlights, 'His breakthrough was explaining how they change: through a mechanism he called natural selection.'"}, {"text": "He discovered the process of genetic mutation as the primary source of variation.", "isCorrect": false, "rationale": "While variation was central to his theory, his core breakthrough was explaining the *mechanism* of change, not the origin of variation itself (which genetic mutation would later explain)."}, {"text": "He proved that all species on Earth originated from a single common ancestor on the Galápagos Islands.", "isCorrect": false, "rationale": "Darwin observed changes on the Galápagos Islands that informed his theory, but his theory did not claim all life originated there."}]}, {"question": "Which of the following was NOT a pattern Darwin observed during his voyage on HMS Beagle, particularly on the Galápagos Islands?", "options": [{"text": "Significant variation among individuals within the same species.", "isCorrect": false, "rationale": "The text explicitly mentions 'Variation within species,' noting differences in tortoise shells and finch beaks."}, {"text": "Species on the islands being entirely unrelated to species on the South American mainland.", "isCorrect": true, "rationale": "The text states, 'Similarities to mainland species. The Galápagos organisms resembled species on the South American mainland,' indicating a relationship, not complete unrelatedness."}, {"text": "Specific traits in organisms that seemed well-suited to their local environment.", "isCorrect": false, "rationale": "The text describes 'Adaptation to local conditions,' such as finches having beaks adapted to their food sources."}, {"text": "Island species appearing to be modified descendants of mainland ancestors.", "isCorrect": false, "rationale": "The text notes, 'They looked as if mainland ancestors had arrived on the islands and then changed over time,' which was a key inference from his observations."}]}, {"question": "According to Darwin's theory of natural selection, what is the correct sequence of the key observations and the resulting conclusion?", "options": [{"text": "Variation -> Overproduction -> Competition -> Differential survival and reproduction -> Adaptation", "isCorrect": true, "rationale": "The text outlines these steps in exact order: 'Variation. ... Overproduction. ... Competition. ... Differential survival and reproduction. ... Conclusion: Adaptation.'"}, {"text": "Overproduction -> Variation -> Differential survival and reproduction -> Competition -> Adaptation", "isCorrect": false, "rationale": "This sequence incorrectly places variation after overproduction and competition after differential survival."}, {"text": "Competition -> Variation -> Overproduction -> Adaptation -> Differential survival and reproduction", "isCorrect": false, "rationale": "This sequence places competition and adaptation too early, and differential survival too late."}, {"text": "Adaptation -> Variation -> Competition -> Overproduction -> Differential survival and reproduction", "isCorrect": false, "rationale": "Adaptation is the *conclusion* of the process, not the initial step or observation."}]}, {"question": "Which statement best describes an 'adaptation' in the context of evolutionary biology?", "options": [{"text": "Any change an organism makes to its behavior during its lifetime to better suit its environment.", "isCorrect": false, "rationale": "Adaptations are heritable traits, meaning they are passed from parent to offspring, not behavioral changes made by an individual during its life."}, {"text": "A heritable trait that increases an organism's ability to survive and reproduce in its specific environment.", "isCorrect": true, "rationale": "The text defines Adaptation as 'A heritable trait that increases an organism's ability to survive and reproduce in its specific environment.'"}, {"text": "The process by which an entire population becomes stronger and healthier over many generations.", "isCorrect": false, "rationale": "While adaptation can lead to a more 'fit' population, the definition of adaptation focuses on the heritable trait itself that confers advantage, not simply 'stronger and healthier.'"}, {"text": "The act of an organism intentionally altering its physical characteristics to match its surroundings.", "isCorrect": false, "rationale": "Evolutionary adaptations occur through natural selection acting on existing variation, not through intentional alteration by an individual."}]}, {"question": "In evolutionary biology, how is 'fitness' precisely defined, distinguishing it from its everyday meaning?", "options": [{"text": "An organism's physical strength and overall health.", "isCorrect": false, "rationale": "The text clarifies, 'In everyday language, 'fitness' means being strong and healthy. In evolutionary biology, fitness has a precise and different meaning.'"}, {"text": "An organism's ability to survive and produce the most surviving offspring in its specific environment.", "isCorrect": true, "rationale": "The text states, 'Fitness: An organism's ability to survive and reproduce in its specific environment. The “fittest” organism is not necessarily the strongest or fastest — it is the one that produces the most surviving offspring.'"}, {"text": "The speed at which an organism can adapt to new environmental conditions.", "isCorrect": false, "rationale": "Fitness is about current reproductive success relative to an environment, not the speed of adaptation."}, {"text": "The total number of different habitats an organism can successfully inhabit.", "isCorrect": false, "rationale": "While adaptability to different habitats can contribute to survival, evolutionary fitness is specifically tied to reproductive output in a *specific* environment."}]}, {"question": "A population of rabbits lives in an area where foxes are common predators. Rabbits with a particular fur color pattern that provides better camouflage against the local terrain are less likely to be caught by foxes and therefore produce more offspring. Based on the concept of evolutionary fitness, what can be concluded?", "options": [{"text": "The rabbits with better camouflage have lower fitness because their trait requires more energy to maintain.", "isCorrect": false, "rationale": "Higher fitness means higher survival and reproduction. If they are producing more offspring, their fitness is higher, regardless of energy cost."}, {"text": "The rabbits with better camouflage have higher fitness because their advantageous trait increases their survival and reproductive success in that environment.", "isCorrect": true, "rationale": "This directly aligns with the definition of fitness: an advantageous heritable trait leading to higher survival and more surviving offspring in a given environment."}, {"text": "Fitness is not applicable here, as rabbit survival is primarily determined by random chance and luck.", "isCorrect": false, "rationale": "Fitness is directly applicable as the camouflage trait provides a clear, non-random advantage in survival against predators."}, {"text": "All rabbits in the population have equal fitness, as they are all subject to the same predatory pressures.", "isCorrect": false, "rationale": "Fitness is differential; individuals with advantageous traits will have higher fitness than those without, even under the same environmental pressures."}]}, {"question": "The case of the peppered moths, where populations shifted from light to dark coloration and back again in response to industrial pollution, is a classic example of natural selection in action. What is the primary lesson illustrated by this example?", "options": [{"text": "Individual organisms can change their coloration during their lifetime to adapt to environmental changes.", "isCorrect": false, "rationale": "Natural selection acts on populations over generations, not on individuals changing their inherited traits within a lifetime."}, {"text": "Environmental changes can alter which pre-existing traits are advantageous, leading to a shift in the genetic makeup of a population.", "isCorrect": true, "rationale": "The text explains how 'As pollution darkened the bark, dark-colored moths had better camouflage and higher survival rates. ... After pollution controls cleaned the air, the light form became dominant again,' directly demonstrating how environment influences advantageous traits."}, {"text": "Pollution directly causes mutations that result in advantageous traits in affected populations.", "isCorrect": false, "rationale": "Pollution changed the environment, making existing dark mutations advantageous. It didn't necessarily cause the mutations themselves."}, {"text": "Species must become extinct if they cannot adapt quickly enough to rapid environmental shifts.", "isCorrect": false, "rationale": "The peppered moths adapted through a shift in population traits, demonstrating adaptation rather than extinction."}]}, {"question": "The 'Think Deeper' section discusses why antibiotic resistance in bacteria is sometimes called 'evolution in fast forward.' What are the main factors contributing to this rapid evolution?", "options": [{"text": "Bacteria have a more complex genetic code than larger organisms, allowing for more extensive genetic variation.", "isCorrect": false, "rationale": "The text does not mention a more complex genetic code; rather, it points to other factors for rapid evolution."}, {"text": "Bacteria can consciously choose to develop resistance when exposed to antibiotics, demonstrating a unique form of directed evolution.", "isCorrect": false, "rationale": "Evolution is not a conscious or directed process; it results from natural selection acting on random variation."}, {"text": "Bacteria have extremely short generation times and enormous population sizes, increasing the likelihood of advantageous mutations spreading quickly.", "isCorrect": true, "rationale": "The 'Think Deeper Guidance' states: 'Key factors: (1) Bacteria reproduce extremely quickly... (2) Bacterial populations are enormous... so even rare mutations are likely to occur.'"}, {"text": "Bacteria can acquire entire genes from other species through horizontal gene transfer, allowing them to rapidly gain new resistances.", "isCorrect": false, "rationale": "While true, the 'Think Deeper Guidance' notes this is 'beyond the scope of this course' for this section, making the other options more appropriate based on the provided text's emphasis."}]}, {"question": "Researchers Peter and Rosemary Grant's long-term study on Galápagos finches provided direct evidence for natural selection by observing what during a severe drought?", "options": [{"text": "Individual finches actively modifying their beak shapes to crack harder seeds.", "isCorrect": false, "rationale": "Natural selection causes changes in populations over generations, not individuals modifying their inherited traits during their lifetime."}, {"text": "An increase in the average beak size within the finch population in the generation following the drought.", "isCorrect": true, "rationale": "The text states: 'During a severe drought, seeds became scarce and only the hardest seeds remained. Finches with larger, stronger beaks survived at higher rates. In the next generation, average beak size in the population had increased.'"}, {"text": "The migration of finch populations to islands with softer seeds, avoiding the need for beak adaptation.", "isCorrect": false, "rationale": "The study focused on evolutionary changes within a population on an island, not large-scale migrations as the primary evidence."}, {"text": "The complete extinction of finch species that lacked large, strong beaks.", "isCorrect": false, "rationale": "The study demonstrated measurable evolution in beak size within a single generation, indicating adaptation, not necessarily extinction of entire species within the observed period."}]}, {"question": "What significant event prompted Charles Darwin to finally publish his landmark work, 'On the Origin of Species,' in 1859, after decades of research?", "options": [{"text": "He completed his final experiment, which provided conclusive and irrefutable proof for his theory.", "isCorrect": false, "rationale": "While he gathered extensive evidence, the publication was triggered by an external event, not the completion of a single 'final experiment'."}, {"text": "He faced financial hardship and needed to publish to secure an income from his scientific work.", "isCorrect": false, "rationale": "The 'scientistspot' indicates Darwin was 'Born into a wealthy family,' suggesting financial need was not a motivator."}, {"text": "Alfred Russel Wallace independently developed and communicated the same theory of natural selection.", "isCorrect": true, "rationale": "The 'scientistspot' explicitly states: 'He was finally prompted to publish in 1858 when Alfred Russel Wallace independently arrived at the same theory.'"}, {"text": "A public outcry and demand for answers regarding the diversity of life on Earth compelled him to release his findings.", "isCorrect": false, "rationale": "The text makes no mention of public outcry or demand driving his publication."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
