        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<body>
<div class="quiz-container">

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 9, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental statement of Newton's Third Law of Motion?", "options": [{"text": "An object at rest stays at rest, and an object in motion stays in motion with the same speed and in the same direction unless acted upon by an unbalanced force.", "isCorrect": false, "rationale": "This statement describes Newton's First Law of Motion, which deals with inertia and the absence of net force, not the interaction between objects."}, {"text": "The acceleration of an object is directly proportional to the net force acting on it and inversely proportional to its mass.", "isCorrect": false, "rationale": "This statement defines Newton's Second Law of Motion ($F=ma$), which relates force, mass, and acceleration, but not the interaction pair itself."}, {"text": "For every action, there is an equal and opposite reaction.", "isCorrect": true, "rationale": "This is the precise statement of Newton's Third Law of Motion, explaining that forces always occur in pairs with equal magnitude and opposite direction."}, {"text": "The total momentum of an isolated system remains constant.", "isCorrect": false, "rationale": "This describes the Law of Conservation of Momentum, which is a consequence of Newton's Third Law but not the law itself."}]}, {"question": "When you push against a wall with your hand, which of the following accurately describes the action-reaction pair according to Newton's Third Law?", "options": [{"text": "The force of your hand on the wall and the force of friction between your feet and the floor.", "isCorrect": false, "rationale": "These are two separate forces acting on different objects (wall and your feet), but they do not constitute a single action-reaction pair in this context."}, {"text": "The force of your hand on the wall and the force of the wall on your hand.", "isCorrect": true, "rationale": "This is the correct action-reaction pair. Your hand exerts a force on the wall (action), and the wall simultaneously exerts an equal and opposite force on your hand (reaction)."}, {"text": "The force of your hand on the wall and the force of gravity on your body.", "isCorrect": false, "rationale": "These are entirely unrelated forces acting on different objects, and gravity on your body is not a reaction to your hand pushing the wall."}, {"text": "The force of your hand pushing the wall and the wall's internal resistance preventing it from moving.", "isCorrect": false, "rationale": "While the wall has internal resistance, the Third Law specifically refers to the force the wall exerts *back on your hand*, not just its internal resistance."}]}, {"question": "If action and reaction forces are always equal in magnitude and opposite in direction, why do they not cancel each other out, allowing motion to occur?", "options": [{"text": "They only cancel out if the interacting objects have equal mass.", "isCorrect": false, "rationale": "The masses of the objects do not determine whether action-reaction forces cancel. The principle of cancellation depends on where the forces act."}, {"text": "They act sequentially, with one force occurring slightly before the other.", "isCorrect": false, "rationale": "Action and reaction forces occur simultaneously; you cannot have one without the other."}, {"text": "They act on different objects.", "isCorrect": true, "rationale": "Forces can only cancel when they act on the *same* object. Since an action force acts on one object and its reaction force acts on a *different* object, they cannot cancel each other out."}, {"text": "They are fundamentally different types of forces, so they cannot cancel.", "isCorrect": false, "rationale": "Action-reaction pairs are forces of the same type (e.g., both gravitational or both contact forces) resulting from a single interaction; their inability to cancel is due to acting on different objects."}]}, {"question": "How does Newton's Third Law primarily explain how a person walks forward?", "options": [{"text": "The person's leg muscles contract, internally pulling the body forward.", "isCorrect": false, "rationale": "Muscle contraction is an internal force, but it does not explain the external propulsion that moves the entire person forward relative to the ground."}, {"text": "The ground pushes the person's foot forward in response to the foot pushing backward on the ground.", "isCorrect": true, "rationale": "When a person's foot pushes backward on the ground (action), the ground, due to friction, pushes the foot forward with an equal and opposite force (reaction), propelling the person forward."}, {"text": "The person's arms swing forward, shifting the center of mass and causing forward movement.", "isCorrect": false, "rationale": "Arm swinging helps with balance and momentum transfer but is not the primary mechanism of forward propulsion based on the Third Law."}, {"text": "Gravity pulls the person forward along the Earth's curved surface.", "isCorrect": false, "rationale": "Gravity pulls downward and does not explain horizontal propulsion for walking on a flat surface."}]}, {"question": "A rocket accelerates through the vacuum of space. Which statement best describes the action-reaction pair responsible for its propulsion?", "options": [{"text": "The rocket pushes against the vacuum of space, and the vacuum pushes the rocket forward.", "isCorrect": false, "rationale": "There is no physical medium (like air) in a vacuum for the rocket to push against."}, {"text": "The rocket's engine pushes against cosmic dust particles, and the dust pushes the rocket forward.", "isCorrect": false, "rationale": "While cosmic dust exists, it is too sparse to provide significant propulsion for a rocket."}, {"text": "The rocket expels hot exhaust gases backward, and these gases push the rocket forward.", "isCorrect": true, "rationale": "The rocket pushes its exhaust gases backward (action), and by Newton's Third Law, the exhaust gases push the rocket forward (reaction), causing propulsion even in space."}, {"text": "The rocket generates a powerful magnetic field that pulls it along the Earth's magnetic lines.", "isCorrect": false, "rationale": "Rocket propulsion is based on expelling mass, not magnetic fields, and is effective far beyond Earth's magnetic influence."}]}, {"question": "Which of the following is NOT a characteristic of an action-reaction pair as described by Newton's Third Law?", "options": [{"text": "They are always equal in magnitude and opposite in direction.", "isCorrect": false, "rationale": "This is a core characteristic of action-reaction pairs."}, {"text": "They always act on two different objects.", "isCorrect": false, "rationale": "This is a core characteristic, explaining why these forces do not cancel each other out."}, {"text": "They exist simultaneously.", "isCorrect": false, "rationale": "This is a core characteristic; an action cannot occur without its reaction."}, {"text": "They can cancel each other out if the objects are moving at constant velocity.", "isCorrect": true, "rationale": "Action-reaction forces never cancel each other out, regardless of the objects' motion, because they always act on different objects. Forces can only cancel if they act on the same object."}]}, {"question": "Consider a book resting on a table. According to the text, which pair of forces constitutes a true action-reaction pair based on Newton's Third Law?", "options": [{"text": "The force of gravity pulling the book down and the normal force of the table pushing the book up.", "isCorrect": false, "rationale": "These two forces act on the *same* object (the book) and are not a Third Law pair. They balance each other, preventing the book from accelerating vertically."}, {"text": "The force of the Earth pulling the book downward and the force of the book pulling the Earth upward.", "isCorrect": true, "rationale": "This is the action-reaction pair for gravitational attraction. The Earth pulls the book (action), and the book pulls the Earth (reaction) with equal magnitude and opposite direction. They act on different objects (book and Earth)."}, {"text": "The normal force of the table pushing the book up and the force of the book pushing the table down.", "isCorrect": false, "rationale": "While this is *an* action-reaction pair (contact forces between book and table), the question refers to the specific example from the text distinguishing gravity from normal force, which uses the Earth-book gravitational pair."}, {"text": "The force of friction between the book and the table and the weight of the book.", "isCorrect": false, "rationale": "These are unrelated forces acting in different directions and are not an action-reaction pair."}]}, {"question": "In the 'horse and cart' paradox, if the horse pulls the cart forward, and the cart pulls the horse backward with an equal and opposite force, how can the horse-cart system ever accelerate?", "options": [{"text": "The horse's muscles are stronger than the backward pull from the cart.", "isCorrect": false, "rationale": "The internal forces within the horse or between horse and cart do not explain the acceleration of the *system* as a whole. The action-reaction pair between horse and cart is still equal and opposite."}, {"text": "The action-reaction forces between the horse and cart effectively cancel out for the entire system, allowing other forces to act.", "isCorrect": false, "rationale": "The action-reaction forces between horse and cart act on *different* objects within the system, so they don't cancel each other out for the system's net acceleration. Instead, we look at external forces on the system."}, {"text": "The horse's hooves push backward on the ground, and the ground pushes the horse forward with a force greater than the cart's backward pull on the horse.", "isCorrect": true, "rationale": "The system accelerates because of an external force: the ground pushing the horse forward. As long as this forward force on the horse is greater than the backward force exerted by the cart *on the horse*, the horse (and thus the cart it pulls) will accelerate."}, {"text": "The cart's wheels provide less friction than the horse's hooves, making the cart inherently easier to move.", "isCorrect": false, "rationale": "While friction is involved, this explanation focuses on individual components rather than resolving the paradox of the horse-cart interaction itself and the external force needed for acceleration."}]}, {"question": "According to the section, what is the fundamental connection between Newton's Third Law and momentum?", "options": [{"text": "Newton's Third Law states that momentum is directly proportional to mass and velocity ($p=mv$).", "isCorrect": false, "rationale": "This equation defines momentum, but it is not a statement of Newton's Third Law or its direct connection to momentum in this context."}, {"text": "Newton's Third Law implies that when objects interact, their individual momentums are always equal.", "isCorrect": false, "rationale": "Individual momentums can change during an interaction; it is the *total* momentum of the system that remains constant."}, {"text": "Newton's Third Law guarantees that the total momentum of a system is conserved during an interaction.", "isCorrect": true, "rationale": "The text explicitly states that Newton's Third Law guarantees the conservation of total momentum in a system during an interaction."}, {"text": "Momentum is a vector quantity, which directly explains why action-reaction forces are opposite in direction.", "isCorrect": false, "rationale": "While both are vector quantities, the vector nature of momentum does not directly explain the opposite directionality of action-reaction forces; that comes from the definition of the Third Law itself."}]}, {"question": "Why is walking on ice significantly more difficult than walking on a paved sidewalk, according to Newton's Third Law?", "options": [{"text": "Ice is a colder surface, which makes muscle contractions less efficient.", "isCorrect": false, "rationale": "This is a biological factor, not the primary physics explanation provided by Newton's Third Law for the difficulty of walking on ice."}, {"text": "The ice surface provides very little friction, so when the foot pushes backward, the reaction force from the ground is insufficient to propel the person forward.", "isCorrect": true, "rationale": "When a person pushes backward on ice (action), the low friction means the ice cannot provide a sufficiently large forward reaction force to propel the person forward effectively, leading to slipping."}, {"text": "Ice has a smoother surface, which reduces the magnitude of the action force a person can exert.", "isCorrect": false, "rationale": "The action force a person exerts isn't necessarily reduced; rather, the *reaction* force from the ground is inadequate due to low friction."}, {"text": "The gravitational force is weaker on ice due to its lower density compared to concrete.", "isCorrect": false, "rationale": "The force of gravity on a person is essentially the same whether on ice or a sidewalk; density of the surface is irrelevant to the walking mechanism."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
