<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 0, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines an independent variable in an experiment?", "options": [{"text": "The factor that is measured to see if it responds to changes.", "isCorrect": false, "rationale": "This describes the dependent variable, which is observed or measured for changes."}, {"text": "The factor that the experimenter deliberately changes or manipulates.", "isCorrect": true, "rationale": "The text defines the independent variable as 'The factor that the experimenter deliberately changes or manipulates' to observe its effect."}, {"text": "Any factor that is kept the same throughout the experiment.", "isCorrect": false, "rationale": "This describes a controlled variable, which is held constant to prevent it from influencing results."}, {"text": "A characteristic or quality that cannot be easily reduced to numbers.", "isCorrect": false, "rationale": "This describes qualitative data, not a type of variable."}], "id": "q01"}, {"question": "A scientist wants to determine if the type of soil affects the height of sunflower plants. They plant identical sunflower seeds in three different types of soil (sandy, clay, loam), give them the same amount of water and sunlight, and measure their height after six weeks. In this experiment, what is the independent variable?", "options": [{"text": "The height of the sunflower plants.", "isCorrect": false, "rationale": "The height of the plants is what the scientist measures as a result of the soil type, making it the dependent variable."}, {"text": "The amount of water and sunlight.", "isCorrect": false, "rationale": "The amount of water and sunlight are kept constant, making them controlled variables."}, {"text": "The type of soil.", "isCorrect": true, "rationale": "The scientist deliberately changes the type of soil to see its effect, which by definition makes it the independent variable."}, {"text": "The identical sunflower seeds.", "isCorrect": false, "rationale": "The seeds are kept identical to ensure consistency, serving as a controlled variable to avoid initial differences influencing the outcome."}], "id": "q02"}, {"question": "Why is it crucial to keep controlled variables constant in an experiment?", "options": [{"text": "To ensure that the independent variable is the only factor being measured.", "isCorrect": false, "rationale": "The independent variable is changed, not measured as a constant. Controlled variables ensure the *effect* observed is due to the independent variable."}, {"text": "To eliminate alternative explanations for observed changes, ensuring the independent variable caused the results.", "isCorrect": true, "rationale": "The text states, 'Without them, you cannot be sure that the independent variable caused the changes you observed.' Controlled variables isolate the effect of the independent variable."}, {"text": "To make the experiment easier and less complex to set up.", "isCorrect": false, "rationale": "While it can simplify analysis, the primary reason is scientific validity, not ease of setup."}, {"text": "To increase the sample size and improve the reliability of the data.", "isCorrect": false, "rationale": "Sample size is a different principle, related to the number of trials or subjects, not the consistency of factors."}], "id": "q03"}, {"question": "What is the primary purpose of a control group in an experiment?", "options": [{"text": "To receive the treatment being tested and show its effect.", "isCorrect": false, "rationale": "This describes the experimental group, which receives the treatment or change."}, {"text": "To reduce observer bias by blinding researchers to experimental conditions.", "isCorrect": false, "rationale": "Reducing observer bias is achieved through blinding, not by the existence of a control group itself, though control groups are part of blinded designs."}, {"text": "To provide a baseline for comparison, showing what happens under normal or standard conditions without the treatment.", "isCorrect": true, "rationale": "The text clearly states, 'It serves as a baseline for comparison, showing what happens under normal or standard conditions.'"}, {"text": "To increase the total number of subjects, thereby improving statistical power.", "isCorrect": false, "rationale": "While a control group contributes to the overall sample size, its primary purpose is comparison, not just increasing numbers."}], "id": "q04"}, {"question": "According to the text, what is the main benefit of using a larger sample size in an experiment?", "options": [{"text": "It guarantees that no bias will be present in the results.", "isCorrect": false, "rationale": "While a large sample size helps with random assignment, it does not guarantee the absence of all forms of bias (e.g., observer bias or confirmation bias still need other strategies)."}, {"text": "It ensures all variables except the independent variable are perfectly controlled.", "isCorrect": false, "rationale": "Controlling variables is about consistent conditions, not sample size."}, {"text": "It produces more reliable results by reducing the influence of random variation.", "isCorrect": true, "rationale": "The text explicitly states, 'Larger sample sizes produce more reliable results because they reduce the influence of random variation.'"}, {"text": "It allows for the collection of more qualitative data, enriching the study.", "isCorrect": false, "rationale": "Sample size primarily impacts the reliability of quantitative data analysis and doesn't inherently prioritize qualitative data."}], "id": "q05"}, {"question": "A researcher is studying the effectiveness of a new teaching method. They assign the students with the highest previous test scores to the group receiving the new method, and students with lower scores to the group using the old method. This experimental design is most susceptible to which type of bias?", "options": [{"text": "Observer bias.", "isCorrect": false, "rationale": "Observer bias relates to the person collecting data unconsciously favoring an outcome, not the initial assignment of subjects."}, {"text": "Confirmation bias.", "isCorrect": false, "rationale": "Confirmation bias relates to interpreting results to fit a hypothesis, not the initial setup of groups."}, {"text": "Selection bias.", "isCorrect": true, "rationale": "The text defines selection bias as occurring 'when the groups in an experiment are not comparable from the start.' By assigning students based on prior scores, the groups are not comparable."}, {"text": "Placebo effect.", "isCorrect": false, "rationale": "The placebo effect is a patient's belief in treatment, which isn't directly related to how groups are initially formed in this scenario."}], "id": "q06"}, {"question": "To minimize observer bias in an experiment, which technique should researchers employ?", "options": [{"text": "Using a larger sample size for each group.", "isCorrect": false, "rationale": "A larger sample size reduces random variation and increases reliability but doesn't specifically target observer bias."}, {"text": "Keeping all controlled variables constant.", "isCorrect": false, "rationale": "Constant controlled variables ensure the independent variable's effect is isolated, but don't prevent an observer's unconscious favoring."}, {"text": "Randomly assigning subjects to experimental and control groups.", "isCorrect": false, "rationale": "Random assignment primarily helps prevent selection bias by making groups comparable from the start."}, {"text": "Blinding, where the person measuring the outcome does not know which group each subject belongs to.", "isCorrect": true, "rationale": "The text states, 'Blinding — where the person measuring the outcome does not know which group each subject belongs to — reduces observer bias.'"}], "id": "q07"}, {"question": "Which of the following is an example of quantitative data?", "options": [{"text": "The solution changed from clear to bright yellow.", "isCorrect": false, "rationale": "This describes a quality (color) and is an example of qualitative data."}, {"text": "A sharp odor was detected from the chemical reaction.", "isCorrect": false, "rationale": "This describes a quality (smell) and is an example of qualitative data."}, {"text": "The plant grew an average of 4.2 cm per week.", "isCorrect": true, "rationale": "This expresses data as a number with a unit (cm) and can be measured, making it quantitative data according to the definition."}, {"text": "The texture of the fabric felt rough.", "isCorrect": false, "rationale": "This describes a quality (texture) and is an example of qualitative data."}], "id": "q08"}, {"question": "In a double-blind randomized controlled trial (RCT) for a new medicine, why is it important that neither the patients nor the doctors measuring outcomes know who receives the drug versus the placebo?", "options": [{"text": "To ensure that all data collected is purely qualitative and descriptive.", "isCorrect": false, "rationale": "RCTs often rely heavily on quantitative data, and blinding isn't about data type, but bias reduction."}, {"text": "To prevent selection bias by ensuring groups are comparable.", "isCorrect": false, "rationale": "Random assignment prevents selection bias; blinding prevents observer bias and the placebo effect."}, {"text": "To eliminate the need for a control group, simplifying the experiment.", "isCorrect": false, "rationale": "A control group (receiving placebo) is fundamental to an RCT; blinding works alongside it."}, {"text": "To minimize observer bias from the doctors and the placebo effect from the patients.", "isCorrect": true, "rationale": "The 'sciconnection' section explicitly states that this 'double-blind' design 'minimizes both observer bias and the placebo effect.'"}], "id": "q09"}, {"question": "A student conducts an experiment to determine if a new brand of energy drink improves focus during studying. They give 5 of their friends, who regularly use energy drinks, a can of the new brand before they study and then ask them to rate their focus on a scale of 1-10. What is the most significant flaw in this experiment design, based on the principles discussed in the section?", "options": [{"text": "The use of quantitative data (1-10 scale) instead of qualitative observations.", "isCorrect": false, "rationale": "A numerical rating scale is a form of quantitative data, which the text highlights as being 'far more useful for drawing conclusions.'"}, {"text": "The absence of a control group to compare against, and a very small sample size.", "isCorrect": true, "rationale": "The experiment lacks a control group (friends not receiving the drink or receiving a placebo) to provide a baseline for comparison. Additionally, a sample size of only 5 friends is too small to produce reliable results due to random variation, as discussed in the section on sample size."}, {"text": "The potential for selection bias because the friends already use energy drinks.", "isCorrect": false, "rationale": "While existing energy drink use could be a factor, the lack of a control group and small sample size are more fundamental design flaws given the principles covered."}, {"text": "The lack of diverse types of energy drinks being tested.", "isCorrect": false, "rationale": "The experiment aims to test *one* new brand, so testing multiple brands would be a different question. This isn't a flaw in testing *this* specific brand's effect."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
