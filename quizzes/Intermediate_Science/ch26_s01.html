    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<body>
<div class="quiz-container">

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 26, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A scientist observes a specific area of a desert, documenting all the cactus plants, desert tortoises, and roadrunners, as well as the soil composition, daily temperature fluctuations, and amount of annual rainfall. Which ecological concept best describes the *entire scope* of what the scientist is studying?", "options": [{"text": "Population", "isCorrect": false, "rationale": "A population refers to all individuals of *one* species in a defined area. The scientist is studying multiple species and their environment."}, {"text": "Community", "isCorrect": false, "rationale": "A community includes all the *living organisms* (biotic components) in an area. The scientist is also documenting nonliving environmental factors like soil, temperature, and rainfall."}, {"text": "Habitat", "isCorrect": false, "rationale": "A habitat describes the *physical environment* in which a species lives. While the scientist is studying the physical environment, they are also studying the interactions among all living organisms."}, {"text": "Ecosystem", "isCorrect": true, "rationale": "An ecosystem encompasses both the community of living organisms (biotic components) and their interactions with the nonliving environment (abiotic components) like soil, water, air, sunlight, and temperature. This term best describes the full scope of the scientist's study."}], "id": "q01"}, {"question": "In a forest ecosystem, a deer consumes leaves and twigs, a wolf hunts and eats deer, and a mushroom breaks down a fallen log. Which statement accurately describes the trophic roles of these organisms?", "options": [{"text": "The deer is a tertiary consumer, the wolf is a secondary consumer, and the mushroom is a primary consumer.", "isCorrect": false, "rationale": "The deer, eating plants, is a primary consumer. The wolf, eating a primary consumer, is a secondary consumer. The mushroom, breaking down dead matter, is a decomposer, not a primary consumer."}, {"text": "The deer is a primary consumer, the wolf is a secondary consumer, and the mushroom is a decomposer.", "isCorrect": true, "rationale": "Producers (plants) form the first trophic level. Deer are herbivores that feed directly on producers, making them primary consumers (second trophic level). Wolves eat primary consumers (deer), making them secondary consumers (third trophic level). Mushrooms break down dead organic matter, returning nutrients, thus classifying them as decomposers."}, {"text": "The deer is a producer, the wolf is an apex predator, and the mushroom is a tertiary consumer.", "isCorrect": false, "rationale": "The deer is a consumer (herbivore), not a producer. While the wolf might be an apex predator, the mushroom is a decomposer, not a tertiary consumer."}, {"text": "The deer is a secondary consumer, the wolf is an apex predator, and the mushroom is a producer.", "isCorrect": false, "rationale": "The deer is a primary consumer. The mushroom is a decomposer, not a producer."}], "id": "q02"}, {"question": "If a certain producer population in an aquatic ecosystem captures 5000 units of energy from sunlight, how much of that energy would typically be available to the tertiary consumers in that same ecosystem?", "options": [{"text": "500 units", "isCorrect": false, "rationale": "This amount (10% of 5000) would be available to primary consumers, not tertiary consumers."}, {"text": "50 units", "isCorrect": false, "rationale": "This amount (10% of 500) would be available to secondary consumers, not tertiary consumers."}, {"text": "5 units", "isCorrect": true, "rationale": "According to the 10% rule: Producers (first trophic level) start with 5000 units. Primary consumers (second trophic level) receive 10% of 5000 = 500 units. Secondary consumers (third trophic level) receive 10% of 500 = 50 units. Tertiary consumers (fourth trophic level) receive 10% of 50 = 5 units."}, {"text": "0.5 units", "isCorrect": false, "rationale": "This amount would be available to quaternary consumers, one trophic level higher than tertiary consumers."}], "id": "q03"}, {"question": "The text describes how the near extinction of sea otters led to the collapse of kelp forest ecosystems due to an explosion in sea urchin populations. This scenario best illustrates which ecological principle?", "options": [{"text": "The 10% rule, as energy flow was disrupted at the top trophic levels.", "isCorrect": false, "rationale": "While energy flow is implicitly affected, the primary lesson from this example is not about the general energy transfer rule but about the disproportionate impact of a specific species."}, {"text": "The concept of net primary productivity, which decreased significantly after the otters disappeared.", "isCorrect": false, "rationale": "Net primary productivity refers to the energy remaining after producers use some for respiration. While kelp (producers) were affected, the example highlights the impact of a predator on the community structure, not directly a change in the producers' energy capture efficiency."}, {"text": "The critical role of keystone species in maintaining the structure and health of a food web.", "isCorrect": true, "rationale": "Keystone species are those whose impact on their ecosystem is disproportionately large relative to their abundance. Sea otters kept sea urchin populations in check; without them, the urchins overgrazed kelp, leading to ecosystem collapse. This is a classic example of a keystone species' importance."}, {"text": "The importance of decomposers, whose efficiency was reduced due to the lack of otter carcasses.", "isCorrect": false, "rationale": "Decomposers are vital, but this example focuses on a living predator's control over a herbivore population and its cascading effects on primary producers and the entire ecosystem structure, not a disruption of decomposition."}], "id": "q04"}, {"question": "A botanist is measuring the total amount of glucose produced by all the plants in a rainforest over a year. After calculating this value, they then subtract the amount of glucose the plants used for their own growth, respiration, and reproduction. What ecological metric does the final, subtracted value represent?", "options": [{"text": "Gross Primary Productivity (GPP)", "isCorrect": false, "rationale": "Gross Primary Productivity (GPP) is the total amount of energy or biomass produced by producers through photosynthesis over a given time period, *before* any energy is used by the producers themselves."}, {"text": "Net Primary Productivity (NPP)", "isCorrect": true, "rationale": "Net Primary Productivity (NPP) is the energy or biomass remaining after producers have used some of the gross primary productivity for their own cellular respiration and other life processes (NPP = GPP - Respiration). This is the energy available to consumers."}, {"text": "Biomass", "isCorrect": false, "rationale": "Biomass is the total mass of living organic matter in a given area or trophic level, a measurement of quantity at a point in time, not a rate of energy production or transfer."}, {"text": "Assimilation rate", "isCorrect": false, "rationale": "Assimilation refers to the process by which organisms incorporate nutrients from their food into their own tissues. While related to energy, it's not the term for the overall energy remaining after producer's own use."}], "id": "q05"}, {"question": "Which of the following processes in the carbon cycle directly removes carbon dioxide from the atmosphere and incorporates it into organic molecules?", "options": [{"text": "Cellular respiration", "isCorrect": false, "rationale": "Cellular respiration is the process by which organisms release energy from organic molecules, returning carbon dioxide to the atmosphere."}, {"text": "Decomposition", "isCorrect": false, "rationale": "Decomposition breaks down dead organic matter, releasing carbon into the soil and atmosphere, often as carbon dioxide or methane."}, {"text": "Photosynthesis", "isCorrect": true, "rationale": "Photosynthesis is the process by which producers (plants, algae, cyanobacteria) capture solar energy and use carbon dioxide from the atmosphere to create glucose (organic molecules)."}, {"text": "Combustion of fossil fuels", "isCorrect": false, "rationale": "Combustion of fossil fuels releases stored carbon into the atmosphere as carbon dioxide, it does not remove it."}], "id": "q06"}, {"question": "Despite nitrogen gas (N2) making up 78% of Earth's atmosphere, most organisms cannot directly use it. What is the primary reason for this, and what process addresses this limitation?", "options": [{"text": "Nitrogen gas is toxic to most life forms, and denitrification converts it to usable nitrates.", "isCorrect": false, "rationale": "Atmospheric N2 is not generally toxic. Denitrification converts nitrates back into N2, returning it to the atmosphere, which is the opposite of making it usable."}, {"text": "The triple bond in N2 is very strong, requiring specialized bacteria to perform nitrogen fixation.", "isCorrect": true, "rationale": "The strong triple bond in N2 makes it chemically unreactive and inaccessible to most organisms. Nitrogen fixation, carried out by specialized bacteria (and lightning), converts N2 into usable forms like ammonia or ammonium."}, {"text": "Atmospheric nitrogen exists as a gas, which cannot be absorbed by plant roots, necessitating assimilation.", "isCorrect": false, "rationale": "While it's a gas, the issue is its chemical inertness, not merely its physical state. Assimilation is when plants incorporate *fixed* nitrogen, not the process that makes it available initially."}, {"text": "Nitrogen primarily cycles through geological processes, and volcanic eruptions make it available.", "isCorrect": false, "rationale": "Geological processes are a minor part of the nitrogen cycle compared to biological processes. This description is more characteristic of the phosphorus cycle."}], "id": "q07"}, {"question": "Unlike the carbon and nitrogen cycles, the phosphorus cycle is distinct because:", "options": [{"text": "It primarily involves atmospheric gases and rapid biological exchange.", "isCorrect": false, "rationale": "The carbon and nitrogen cycles have significant atmospheric phases; phosphorus does not. The exchange is generally slower than carbon or nitrogen."}, {"text": "It is largely driven by combustion and industrial processes.", "isCorrect": false, "rationale": "Combustion is a major factor in the carbon cycle. While human activities impact the phosphorus cycle, it's not primarily driven by combustion in nature."}, {"text": "It does not have a significant atmospheric phase and is often a limiting nutrient.", "isCorrect": true, "rationale": "The text explicitly states that phosphorus does not have a significant atmospheric phase and is often a limiting nutrient in freshwater ecosystems due to its slow cycling and scarcity."}, {"text": "Its primary reservoir is living organisms, which then release it through respiration.", "isCorrect": false, "rationale": "The primary natural reservoir of phosphorus is rocks. Respiration is a key process for carbon, not phosphorus."}], "id": "q08"}, {"question": "A 'think deeper' prompt asks about the consequences of excess fertilizer (containing nitrogen and phosphorus) washing into a nearby lake. Based on the section's discussion of nutrient cycles, what is the most likely initial ecological effect of such an event in a freshwater ecosystem where phosphorus is often a limiting nutrient?", "options": [{"text": "A decrease in fish populations due to reduced oxygen levels.", "isCorrect": false, "rationale": "This is a *secondary* effect: increased producer growth leads to decomposition, which consumes oxygen, harming fish. The initial effect is on the producers."}, {"text": "An increase in the growth of producers like algae and aquatic plants.", "isCorrect": true, "rationale": "If phosphorus (or nitrogen) is a limiting nutrient, its increased availability from fertilizer runoff will directly stimulate the growth of producers, such as algae and aquatic plants, leading to an 'algal bloom' or excessive plant growth."}, {"text": "Enhanced denitrification by bacteria, leading to more atmospheric nitrogen.", "isCorrect": false, "rationale": "While increased nitrates could lead to more denitrification, the *initial* and most prominent ecological effect described in the context of limiting nutrients is the stimulation of producer growth."}, {"text": "A significant increase in primary consumer populations due to abundant food.", "isCorrect": false, "rationale": "Primary consumers would increase *after* the producers have grown significantly. The *initial* ecological effect of excess limiting nutrients is on the producers themselves."}], "id": "q09"}, {"question": "The most crucial distinction in ecosystem science is that energy flows through an ecosystem, while matter cycles. This means that:", "options": [{"text": "Energy is conserved at each trophic level, whereas matter is lost.", "isCorrect": false, "rationale": "Energy is *not* conserved at each trophic level; about 90% is lost as heat. Matter is conserved and recycled, not lost."}, {"text": "Ecosystems require a continuous input of energy, but matter is continuously reused.", "isCorrect": true, "rationale": "Energy flows one way, dissipating as heat at each transfer, thus requiring constant replenishment from the sun. Matter (atoms) is recycled within the ecosystem, changing forms but not being created or destroyed, hence continuously reused."}, {"text": "Matter is degraded at each transfer, similar to how energy dissipates as heat.", "isCorrect": false, "rationale": "Matter is conserved and recycled, not degraded in the same way energy dissipates. Its form may change, but the atoms themselves are reused."}, {"text": "Both energy and matter are eventually lost from the ecosystem and must be replenished externally.", "isCorrect": false, "rationale": "Only energy is continuously lost and requires external replenishment. Matter is recycled within the ecosystem, though some may enter or leave over long geological timescales, the fundamental principle is cycling."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
