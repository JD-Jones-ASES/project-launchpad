    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 19, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes a fundamental characteristic of sound waves?", "options": [{"text": "They can travel through a vacuum.", "isCorrect": false, "rationale": "Sound waves are mechanical waves, meaning they require a material medium (like air, water, or solids) to propagate. They cannot travel through the emptiness of a vacuum."}, {"text": "They are electromagnetic waves.", "isCorrect": false, "rationale": "Sound waves are mechanical waves, characterized by the vibration of particles in a medium. Electromagnetic waves (like light or radio waves) do not require a medium and are fundamentally different."}, {"text": "They require a medium for propagation.", "isCorrect": true, "rationale": "The text explicitly states that 'Sound is a mechanical wave: it needs a medium to travel through.' This is a defining characteristic of sound waves."}, {"text": "They are transverse waves.", "isCorrect": false, "rationale": "Sound waves are described as longitudinal waves, where the particles of the medium vibrate parallel to the direction of wave propagation (creating compressions and rarefactions)."}]}, {"question": "A person observes a lightning flash and counts 9 seconds before hearing the thunder. Given the speed of sound in air is approximately 343 m/s, what is the estimated distance to the lightning strike?", "options": [{"text": "38 m", "isCorrect": false, "rationale": "This value would be obtained by dividing speed by time (343/9), which is incorrect for calculating distance."}, {"text": "343 m", "isCorrect": false, "rationale": "This value represents the distance sound travels in 1 second, not 9 seconds."}, {"text": "3.1 km", "isCorrect": true, "rationale": "Distance is calculated by multiplying speed by time (d = v * t). So, 343 m/s * 9 s = 3087 meters, which is approximately 3.1 kilometers. The travel time of light is negligible."}, {"text": "9 km", "isCorrect": false, "rationale": "This value is significantly higher than the actual distance and does not correspond to the given speed of sound."}]}, {"question": "If a sound wave travels from air into a solid material like steel, what would you expect to happen to its speed, and why?", "options": [{"text": "It would slow down because steel is denser and absorbs more energy.", "isCorrect": false, "rationale": "While steel is denser, the text indicates that sound travels faster, not slower, through denser, stiffer materials."}, {"text": "It would speed up because the particles in steel are closer together, allowing more efficient compression transmission.", "isCorrect": true, "rationale": "The text states: 'Sound travels faster through denser, stiffer materials because the particles are closer together and transmit compressions more efficiently.' Steel is a denser, stiffer medium than air."}, {"text": "Its speed would remain the same because the speed of sound is constant.", "isCorrect": false, "rationale": "The speed of sound is not constant; it depends on the medium and its temperature."}, {"text": "It would speed up, but only if the steel is at a higher temperature than the air.", "isCorrect": false, "rationale": "While temperature affects the speed of sound, the primary reason for a speed change when moving from air to steel is the change in the medium's density and stiffness, not solely temperature difference."}]}, {"question": "A musician plays a piccolo and then a bass drum. Which statement accurately describes the relationship between the sound waves produced by these instruments and their perceived characteristics?", "options": [{"text": "The piccolo produces sounds with lower amplitude, resulting in a higher pitch.", "isCorrect": false, "rationale": "Amplitude is related to loudness, not pitch. A piccolo's high pitch is due to high frequency, not low amplitude."}, {"text": "The bass drum produces sounds with a higher frequency, resulting in a lower pitch.", "isCorrect": false, "rationale": "A higher frequency results in a higher pitch. A bass drum produces low-pitched sounds, meaning it has a lower frequency."}, {"text": "The piccolo produces sounds with a higher frequency, which the brain interprets as a higher pitch.", "isCorrect": true, "rationale": "The text defines pitch as determined by frequency: 'Higher frequency produces a higher pitch.' The piccolo is explicitly mentioned as playing 'high-pitched notes with frequencies above 1000 Hz'."}, {"text": "Both instruments produce sounds within the infrasound range, which humans can barely hear.", "isCorrect": false, "rationale": "Infrasound is below 20 Hz, while both a piccolo (>1000 Hz) and a bass drum (<100 Hz) produce sounds well within the human hearing range (20 Hz to 20,000 Hz)."}]}, {"question": "What is the primary physical characteristic of a sound wave that determines its perceived loudness?", "options": [{"text": "Its frequency.", "isCorrect": false, "rationale": "Frequency primarily determines the pitch (highness or lowness) of a sound, not its loudness."}, {"text": "Its wavelength.", "isCorrect": false, "rationale": "Wavelength is inversely related to frequency and directly related to the speed of the wave, but it does not directly determine loudness."}, {"text": "Its amplitude.", "isCorrect": true, "rationale": "The text states: 'The loudness of a sound is related to the amplitude of the sound wave — the maximum pressure variation from normal. A louder sound has greater amplitude...'"}, {"text": "Its speed.", "isCorrect": false, "rationale": "The speed of sound depends on the medium and temperature, not directly on the perceived loudness of the sound."}]}, {"question": "If a rock concert measures 100 dB and a busy street measures 80 dB, how much more intense is the sound from the rock concert compared to the busy street?", "options": [{"text": "2 times more intense.", "isCorrect": false, "rationale": "The decibel scale is logarithmic, not linear. A 20 dB difference does not mean 2 times the intensity."}, {"text": "10 times more intense.", "isCorrect": false, "rationale": "A 10 dB difference represents a tenfold increase in intensity. Here, the difference is 20 dB."}, {"text": "100 times more intense.", "isCorrect": true, "rationale": "The difference is 20 dB. Since every 10 dB represents a tenfold increase in intensity, a 20 dB difference means 10 * 10 = 100 times greater intensity."}, {"text": "200 times more intense.", "isCorrect": false, "rationale": "This calculation incorrectly applies the logarithmic scale, assuming a direct multiplication of 10 times the difference."}]}, {"question": "As a police car with its siren on speeds towards an observer and then passes them, which of the following changes in the siren's sound will the observer experience due to the Doppler effect?", "options": [{"text": "The siren will sound louder as it approaches and then quieter as it moves away, but its pitch will remain constant.", "isCorrect": false, "rationale": "Loudness changes due to proximity, but the Doppler effect specifically refers to a change in pitch. This option incorrectly states constant pitch."}, {"text": "The siren's pitch will continuously get lower as it approaches and then higher as it moves away.", "isCorrect": false, "rationale": "This describes the opposite of the Doppler effect. The pitch increases when approaching and decreases when moving away."}, {"text": "The siren's pitch will sound higher as it approaches and then drop to a lower pitch as it moves away.", "isCorrect": true, "rationale": "This correctly describes the Doppler effect: 'When the source approaches, the observed frequency increases (higher pitch); when the source moves away, the observed frequency decreases (lower pitch).'"}, {"text": "The siren's pitch and loudness will both remain constant, only its perceived location will shift.", "isCorrect": false, "rationale": "Both pitch (Doppler effect) and loudness (due to changing distance) will change for the observer."}]}, {"question": "A singer hits a specific note that causes a nearby wine glass to vibrate intensely and eventually shatter. This phenomenon is an example of what concept?", "options": [{"text": "The Doppler Effect.", "isCorrect": false, "rationale": "The Doppler effect is about changes in perceived frequency due to relative motion, not the amplification of vibrations in an object."}, {"text": "Infrasound.", "isCorrect": false, "rationale": "Infrasound refers to sound frequencies below human hearing; it is not a phenomenon of amplified vibration."}, {"text": "Resonance.", "isCorrect": true, "rationale": "The text describes resonance as 'The dramatic increase in amplitude that occurs when a vibrating force is applied at an object's natural frequency,' and directly uses the example of a singer shattering a wine glass."}, {"text": "Ultrasound.", "isCorrect": false, "rationale": "Ultrasound refers to sound frequencies above human hearing; it is not a phenomenon of amplified vibration."}]}, {"question": "How do musical instruments like a guitar or a flute primarily use the principle of resonance to function?", "options": [{"text": "They use resonance to increase the speed at which sound waves travel through the instrument.", "isCorrect": false, "rationale": "Resonance amplifies sound intensity (amplitude), but it does not change the speed of sound, which is determined by the medium of the instrument itself (wood, air, etc.)."}, {"text": "They employ resonance to change the amplitude of the initial vibration, thereby altering the pitch.", "isCorrect": false, "rationale": "Resonance amplifies amplitude, but the initial pitch is set by the vibrating string or air column. Pitch is determined by frequency, not directly by amplitude."}, {"text": "They are designed so that parts of the instrument (like a guitar body or air column) vibrate at a natural frequency, amplifying the sound and sometimes allowing for pitch changes.", "isCorrect": true, "rationale": "The text states: 'A guitar string vibrates at a specific frequency when plucked, and the hollow body of the guitar resonates to amplify the sound.' For a flute, 'opening and closing holes that change the effective length of the resonating air column — shorter columns resonate at higher frequencies (higher pitch).'"}, {"text": "They rely on resonance to create infrasound or ultrasound waves that are then converted into audible sound.", "isCorrect": false, "rationale": "Musical instruments produce sound directly within the human audible range, not by converting infrasound or ultrasound."}]}, {"question": "Medical ultrasound technology relies on which of the following properties of sound waves to create images of internal body structures?", "options": [{"text": "The Doppler effect, by measuring changes in the frequency of sound waves reflecting off moving organs.", "isCorrect": false, "rationale": "While the Doppler effect is used in some specialized ultrasound applications (like measuring blood flow), the primary method described for *imaging structures* is the reflection of waves off tissue boundaries, not Doppler shifts for structural imaging."}, {"text": "The ability of high-frequency sound waves to reflect off boundaries between different tissue types and create echoes.", "isCorrect": true, "rationale": "The text explains: 'When the waves encounter a boundary between different tissues... some of the wave energy reflects back. A computer measures the time delay and intensity of these echoes to construct an image.'"}, {"text": "The principle of resonance, causing internal organs to vibrate at their natural frequencies to produce a diagnostic sound.", "isCorrect": false, "rationale": "Medical ultrasound does not rely on resonance of organs to produce diagnostic sounds; it uses reflected waves to form images."}, {"text": "The interaction of infrasound waves with cellular structures, generating heat that can be detected.", "isCorrect": false, "rationale": "Ultrasound uses *ultrasound* (high-frequency) waves, not infrasound. While sound can generate heat, imaging is primarily based on echoes, not heat detection."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
