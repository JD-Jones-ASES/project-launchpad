<script>
var QUESTIONS = [{"question": "For thousands of years, most people believed the Sun moved around a stationary Earth. What is the reality of Earth's motion?", "options": [{"text": "Earth orbits the Sun, and the Sun also orbits Earth.", "isCorrect": false, "rationale": "While Earth orbits the Sun, the Sun does not orbit Earth; the Sun is the center of our solar system."}, {"text": "Earth spins on its axis and simultaneously orbits the Sun.", "isCorrect": true, "rationale": "The text states, 'Our planet spins on its axis like a top while simultaneously orbiting the Sun in a vast elliptical path,' confirming both rotation and revolution."}, {"text": "Earth is stationary, and the entire solar system orbits a larger celestial body.", "isCorrect": false, "rationale": "The text explicitly states, 'In reality, it is Earth that moves,' directly contradicting the idea of a stationary Earth."}, {"text": "Earth only spins on its axis, and the Sun's apparent movement is an illusion.", "isCorrect": false, "rationale": "Earth does spin on its axis, but it also orbits the Sun, a motion crucial for defining a year."}]}, {"question": "Earth's rotation is responsible for day and night. Which statement accurately describes the characteristics and effects of this rotation?", "options": [{"text": "Earth rotates from east to west, causing the Sun to appear to rise in the west, and the boundary between day and night is a sharp line.", "isCorrect": false, "rationale": "Earth rotates from west to east, causing the Sun to appear to rise in the east, and the boundary (terminator) is a gradual transition, not a sharp line."}, {"text": "Earth rotates from west to east in approximately 24 hours, and the 'terminator' is the gradual transition between day and night.", "isCorrect": true, "rationale": "The text states, 'Earth rotates from west to east,' completes 'one full rotation approximately every 24 hours,' and defines the 'terminator' as 'a gradual transition that produces dawn and dusk.'"}, {"text": "Earth rotates around the Sun, which causes day and night, and the terminator is the point on Earth farthest from the Sun.", "isCorrect": false, "rationale": "Rotation on its axis, not revolution around the Sun, causes day and night. The terminator is the day-night boundary, not a specific point of distance from the Sun."}, {"text": "Earth's rotation speed at the equator is unfelt due to the planet's slow speed, and defines a year.", "isCorrect": false, "rationale": "Earth's rotation speed is significant (1670 km/hr), but unfelt due to Newton's first law. Rotation defines a day, not a year."}]}, {"question": "Earth's orbit around the Sun is an ellipse, causing its distance from the Sun to vary. Based on this, what can be inferred about Earth's position in January?", "options": [{"text": "Earth is at aphelion (farthest from the Sun), which contributes to colder temperatures in the Northern Hemisphere.", "isCorrect": false, "rationale": "The text states Earth is farthest (aphelion) in July. Also, distance from the Sun does not cause the seasons."}, {"text": "Earth is at perihelion (closest to the Sun), which demonstrates that distance from the Sun does not directly cause the seasons.", "isCorrect": true, "rationale": "The text explicitly states Earth is closest to the Sun (perihelion) in January and notes that this 'proves that distance from the Sun does not cause the seasons.'"}, {"text": "Earth is at an equinox, meaning it is exactly equidistant from the Sun, signaling the start of spring in the Northern Hemisphere.", "isCorrect": false, "rationale": "Equinoxes refer to equal day and night lengths, not equal distance from the Sun. Earth's orbit is elliptical, so it's rarely 'equidistant'."}, {"text": "Earth is transitioning from its slowest orbital speed to its fastest, impacting the length of the year.", "isCorrect": false, "rationale": "While orbital speed does vary, the text does not link January to a specific speed transition or its impact on the length of the year beyond the general 365.25 days."}]}, {"question": "The primary cause of Earth's seasons is often misunderstood. Which of the following best explains why Earth experiences distinct seasons?", "options": [{"text": "The changing distance of Earth from the Sun as it follows an elliptical orbit, with warmer temperatures occurring when Earth is closer.", "isCorrect": false, "rationale": "The text explicitly states that varying distance from the Sun 'does not cause the seasons,' noting perihelion in January and aphelion in July."}, {"text": "The change in the direction of Earth's axial tilt throughout the year, with the North Pole sometimes pointing towards, and sometimes away from, Polaris.", "isCorrect": false, "rationale": "The text states, 'This tilt does not change direction as Earth orbits the Sun — the North Pole always points toward the star Polaris.'"}, {"text": "The constant tilt of Earth's axis relative to its orbital plane, causing different parts of Earth to receive varying amounts of direct sunlight.", "isCorrect": true, "rationale": "The text explains, 'Earth's axis is tilted at approximately 23.5 relative to the plane of its orbit. ... As a result, different parts of Earth receive different amounts of direct sunlight at different times of the year, producing the seasons.'"}, {"text": "The varying speed of Earth's rotation on its axis, which leads to longer days in summer and shorter days in winter.", "isCorrect": false, "rationale": "Earth's rotation speed is relatively constant and defines the length of a day; it is not the primary cause of seasonal temperature changes or day length variations throughout the year in the manner described."}]}, {"question": "A student in the Northern Hemisphere experiences the vernal equinox around March 20. What conditions would a student in the Southern Hemisphere typically observe on this same date?", "options": [{"text": "The summer solstice, with the longest day of the year.", "isCorrect": false, "rationale": "The vernal equinox in the Northern Hemisphere corresponds to the autumnal equinox in the Southern Hemisphere, not the summer solstice."}, {"text": "The winter solstice, with the shortest day of the year.", "isCorrect": false, "rationale": "The vernal equinox marks equal day and night, not the shortest day of the year for any hemisphere."}, {"text": "The autumnal equinox, with approximately equal day and night length.", "isCorrect": true, "rationale": "The text defines an equinox as when 'day and night are approximately equal in length everywhere on Earth.' If it's the vernal (spring) equinox in the Northern Hemisphere, it's the autumnal (fall) equinox in the Southern Hemisphere, but day/night length remains equal globally."}, {"text": "Their longest day, as the North Pole being tilted towards the Sun implies more direct sunlight for all parts of Earth.", "isCorrect": false, "rationale": "During an equinox, the tilt is neither directly towards nor away from the Sun. When the North Pole is tilted towards the Sun, the Northern Hemisphere has summer and the Southern Hemisphere has winter."}]}, {"question": "The text describes solstices and equinoxes. If a particular day is characterized by the longest period of daylight in the Northern Hemisphere, what would simultaneously be true for the Southern Hemisphere and the Earth's position relative to the Sun?", "options": [{"text": "It is the summer solstice in the Northern Hemisphere, and the Southern Hemisphere experiences its shortest day, with the North Pole tilted towards the Sun.", "isCorrect": true, "rationale": "The text states, 'The summer solstice (around June 21 in the Northern Hemisphere) is the longest day,' and 'When the Northern Hemisphere has summer, the Southern Hemisphere has winter,' meaning its shortest day. This occurs when the North Pole is tilted toward the Sun."}, {"text": "It is the winter solstice in the Northern Hemisphere, and the Southern Hemisphere experiences its longest day, with the North Pole tilted away from the Sun.", "isCorrect": false, "rationale": "The longest day in the Northern Hemisphere is the summer solstice, not winter. This also means the North Pole is tilted towards, not away from, the Sun."}, {"text": "It is an equinox for both hemispheres, with equal day and night lengths, and Earth is neither closest nor farthest from the Sun.", "isCorrect": false, "rationale": "The longest day signifies a solstice, not an equinox, which has equal day and night. Earth's distance from the Sun does not determine solstices."}, {"text": "It is perihelion, when Earth is closest to the Sun, causing longer days globally.", "isCorrect": false, "rationale": "Perihelion (closest to the Sun) occurs in January, not typically coinciding with the longest day in the Northern Hemisphere, and doesn't cause universally longer days."}]}, {"question": "The 'Physics Connection' highlights that the amount of solar energy reaching a surface depends on the angle of sunlight. An architect designing a passive solar building wants to maximize heat gain from the sun during winter. What principle should they apply?", "options": [{"text": "Design windows to receive sunlight at an oblique angle to spread the energy over a larger area, reducing intensity.", "isCorrect": false, "rationale": "The text states an oblique angle 'spread over a larger area, reducing the intensity,' which would not maximize heat gain."}, {"text": "Orient the building so windows receive sunlight at an angle as close to 90 degrees as possible to concentrate energy.", "isCorrect": true, "rationale": "The text explains, 'When sunlight strikes at a direct angle (close to 90), the energy is concentrated over a small area,' thus maximizing the energy per square meter for heat gain."}, {"text": "Ensure windows face only the east or west to capture both rising and setting sun, regardless of angle.", "isCorrect": false, "rationale": "While direction is important, the text specifically emphasizes the angle of incidence, not just general exposure, for maximizing energy concentration."}, {"text": "Utilize reflective surfaces to redirect sunlight, as the angle of incidence only matters for absorption, not reflection.", "isCorrect": false, "rationale": "The text focuses on direct absorption of energy based on angle, not reflection. Maximizing heat gain from direct sunlight means maximizing the initial absorption based on angle."}]}, {"question": "Earth rotates 360 degrees in 24 hours. A person travels west from a city at 30° East longitude to a city at 60° West longitude. How many time zones would they cross, and in which direction should they adjust their watch?", "options": [{"text": "9 time zones, adjusting their watch forward by 9 hours.", "isCorrect": false, "rationale": "Traveling west means adjusting clocks back, not forward. The calculation for time zones is also incorrect (30 + 60 = 90 degrees, 90/15 = 6 hours)."}, {"text": "6 time zones, adjusting their watch backward by 6 hours.", "isCorrect": true, "rationale": "The total longitude change is 30° E + 60° W = 90°. Since Earth rotates 15° per hour (360°/24), 90° is 6 hours (90/15). Traveling west means clocks 'fall back'."}, {"text": "3 time zones, adjusting their watch backward by 3 hours.", "isCorrect": false, "rationale": "The calculation (60 - 30 = 30 degrees, 30/15 = 2 hours) is incorrect for crossing the prime meridian. Also, 3 hours is incorrect."}, {"text": "90 time zones, adjusting their watch backward by 90 hours.", "isCorrect": false, "rationale": "There are 24 time zones in total, not 90. The calculation is incorrect as it equates degrees to hours directly without dividing by 15."}]}, {"question": "The 'Think Deeper' section asks about the impact of Earth's axis having no tilt (0° tilt). If this were the case, what would be the most accurate consequence?", "options": [{"text": "The cycle of day and night would cease, leading to perpetual twilight everywhere.", "isCorrect": false, "rationale": "Rotation causes day and night. A lack of axial tilt would not stop Earth's rotation, so day and night cycles would continue."}, {"text": "Seasons would disappear, and the equator would no longer be significantly warmer than the poles.", "isCorrect": false, "rationale": "While seasons would disappear, the equator would still be warmer because sunlight strikes it at a more direct angle (closer to 90 degrees) than the poles, regardless of tilt, as explained in the 'Teacher Note'."}, {"text": "There would be no seasons, but the equator would still receive more concentrated solar energy than the poles.", "isCorrect": true, "rationale": "The 'Teacher Note' explicitly states, 'With no axial tilt, there would be no seasons... The equator would still be warmer than the poles because sunlight strikes the equator at a more direct angle... The poles would still receive sunlight at an oblique angle.'"}, {"text": "Earth would no longer revolve around the Sun, as axial tilt is essential for orbital mechanics.", "isCorrect": false, "rationale": "Axial tilt is not necessary for Earth's revolution around the Sun; gravity governs orbital mechanics."}]}, {"question": "Which two of Earth's motions are primarily responsible for the length of a 'day' and a 'year,' respectively, and what is the key characteristic of each motion?", "options": [{"text": "A 'day' is defined by Earth's revolution around the Sun, and a 'year' by its rotation on its axis.", "isCorrect": false, "rationale": "This statement reverses the definitions: rotation defines a day, and revolution defines a year."}, {"text": "A 'day' is defined by Earth's rotation on its axis, and a 'year' by its revolution around the Sun.", "isCorrect": true, "rationale": "The text states, 'Earth completes one full rotation approximately every 24 hours, producing the cycle of day and night' and 'Earth completes one revolution around the Sun in approximately 365.25 days, defining one year.'"}, {"text": "Both a 'day' and a 'year' are defined by Earth's axial tilt, affecting how much sunlight hits the planet.", "isCorrect": false, "rationale": "Axial tilt is primarily responsible for seasons, not the fundamental definitions of a day or a year."}, {"text": "A 'day' is defined by the terminator line, and a 'year' by the occurrence of perihelion.", "isCorrect": false, "rationale": "The terminator is the boundary between day and night, not the definition of a day itself. Perihelion is a point in Earth's elliptical orbit, not the definition of a year."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
