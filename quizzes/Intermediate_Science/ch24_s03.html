    };

<body>

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 24, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately describes a key characteristic of a series circuit?", "options": [{"text": "Current splits among multiple paths.", "isCorrect": false, "rationale": "This describes a parallel circuit, where current divides to flow through different branches."}, {"text": "The total resistance is always less than the smallest individual resistance.", "isCorrect": false, "rationale": "This is a characteristic of a parallel circuit. In a series circuit, total resistance is the sum of individual resistances and thus always greater than any single resistance."}, {"text": "If one component breaks, the entire circuit is interrupted.", "isCorrect": true, "rationale": "In a series circuit, there is only one path for current. If any component breaks or is removed, that single path is interrupted, and current stops flowing through the entire circuit."}, {"text": "Each component experiences the full battery voltage.", "isCorrect": false, "rationale": "This is a characteristic of a parallel circuit. In a series circuit, the total voltage divides among the components."}], "id": "q01"}, {"question": "Two resistors, R1 = 15 Ω and R2 = 25 Ω, are connected in series to a 10V battery. What is the current flowing through R1?", "options": [{"text": "0.40A", "isCorrect": false, "rationale": "This would be the current if the total resistance was 25Ω. The total resistance in series is R1 + R2 = 15 + 25 = 40Ω. The total current is V/R_T = 10V / 40Ω = 0.25A."}, {"text": "0.25A", "isCorrect": true, "rationale": "In a series circuit, the current is the same everywhere. First, calculate the total resistance: R_T = R1 + R2 = 15Ω + 25Ω = 40Ω. Then, use Ohm's law to find the total current: I_total = V_total / R_T = 10V / 40Ω = 0.25A. Since current is the same everywhere in a series circuit, the current through R1 is also 0.25A."}, {"text": "0.67A", "isCorrect": false, "rationale": "This value does not correspond to the correct calculation for current in this series circuit. It might be a result of incorrect resistance addition or an incorrect Ohm's law application."}, {"text": "1.00A", "isCorrect": false, "rationale": "This would be the current if the total resistance was 10Ω. The total resistance in series is 40Ω."}], "id": "q02"}, {"question": "An engineer wants to reduce the total current in a simple series circuit while keeping the battery voltage constant. What action would achieve this?", "options": [{"text": "Replacing one resistor with a resistor of lower resistance.", "isCorrect": false, "rationale": "Replacing a resistor with a lower resistance one would decrease the total resistance (R_T = R1 + R2 + ...) and, according to Ohm's law (I = V/R_T), would increase the total current, which is the opposite of the goal."}, {"text": "Adding another resistor in parallel to the existing ones.", "isCorrect": false, "rationale": "Adding a resistor in parallel would decrease the overall equivalent resistance of that section, and if done to the entire circuit, it would generally increase total current, especially if combined with series elements. The question specifies a 'simple series circuit' for the *initial* state."}, {"text": "Adding another resistor in series to the existing ones.", "isCorrect": true, "rationale": "In a series circuit, adding more resistors increases the total resistance (R_T = R1 + R2 + ...). Since current is inversely proportional to resistance (I = V/R_T) for a constant voltage, increasing the total resistance will decrease the total current."}, {"text": "Increasing the battery voltage.", "isCorrect": false, "rationale": "Increasing the battery voltage would, according to Ohm's law (I = V/R_T), directly increase the total current, which is the opposite of the goal."}], "id": "q03"}, {"question": "In a parallel circuit, what is the fundamental behavior of voltage across its branches?", "options": [{"text": "Voltage adds up across each branch.", "isCorrect": false, "rationale": "Voltage adds up across components in a series circuit, not across branches in a parallel circuit."}, {"text": "Voltage is the same across each branch.", "isCorrect": true, "rationale": "In a parallel circuit, every branch is connected directly across the same two points (e.g., the battery terminals), meaning each branch experiences the full battery voltage. Therefore, the voltage is the same across each branch."}, {"text": "Voltage divides in inverse proportion to resistance.", "isCorrect": false, "rationale": "This describes how current divides in a parallel circuit. Voltage does not divide in this manner in parallel circuits; it is constant across branches."}, {"text": "The sum of voltages across branches equals the total current.", "isCorrect": false, "rationale": "This statement incorrectly mixes units (voltage and current) and principles. Voltage across branches in parallel is equal, not additive to total current."}], "id": "q04"}, {"question": "Three resistors, R1 = 10 Ω, R2 = 15 Ω, and R3 = 30 Ω, are connected in parallel to a battery. What is the total equivalent resistance of this circuit?", "options": [{"text": "5 Ω", "isCorrect": true, "rationale": "For parallel resistors, the total resistance is found using the reciprocal formula: 1/R_T = 1/R1 + 1/R2 + 1/R3. So, 1/R_T = 1/10 + 1/15 + 1/30. Finding a common denominator (30): 1/R_T = 3/30 + 2/30 + 1/30 = 6/30. Therefore, R_T = 30/6 = 5Ω."}, {"text": "12.5 Ω", "isCorrect": false, "rationale": "This value is incorrect for parallel resistance calculation. It might be an average or an incorrect application of the reciprocal formula."}, {"text": "55 Ω", "isCorrect": false, "rationale": "This is the sum of the resistances, which would be the total resistance if they were connected in series, not parallel."}, {"text": "7.5 Ω", "isCorrect": false, "rationale": "This value is incorrect for parallel resistance calculation. Remember that the total resistance in parallel must be less than the smallest individual resistance (10Ω in this case)."}], "id": "q05"}, {"question": "Considering a parallel circuit connected to a constant voltage source, what happens to the total resistance if an additional resistor is added in parallel?", "options": [{"text": "It increases.", "isCorrect": false, "rationale": "Adding a resistor in parallel provides an additional path for current, which makes it easier for charge to flow, effectively decreasing the total resistance, not increasing it."}, {"text": "It decreases.", "isCorrect": true, "rationale": "The total resistance of a parallel circuit is always less than the smallest individual resistance. Adding another path for current (another parallel resistor) makes it even easier for charge to move through the circuit, thus decreasing the overall total resistance."}, {"text": "It remains the same.", "isCorrect": false, "rationale": "Adding any resistor, whether in series or parallel, will change the total equivalent resistance of the circuit."}, {"text": "It depends on the resistance value of the added resistor.", "isCorrect": false, "rationale": "While the *exact* new resistance value depends on the added resistor, the *direction* of change (decrease) is universal for adding any resistive element in parallel, regardless of its specific value."}], "id": "q06"}, {"question": "Which statement accurately compares how voltage and current behave in series vs. parallel circuits?", "options": [{"text": "In series, current is the same, and voltage is the same.", "isCorrect": false, "rationale": "In series, current is the same, but voltage adds up across components, meaning it is not the same across each component."}, {"text": "In parallel, current is the same, and voltage adds up.", "isCorrect": false, "rationale": "In parallel, voltage is the same across each branch, but current adds up and splits among the branches. Neither part of this statement is fully correct for parallel."}, {"text": "In series, voltage divides, and in parallel, current divides.", "isCorrect": true, "rationale": "The text states that in a series circuit, 'voltages add up to the battery voltage. Each resistor “uses” a share of the total voltage,' meaning voltage divides. For parallel circuits, it states 'currents add up to the total current. At each junction, current splits among the branches,' meaning current divides."}, {"text": "In parallel, voltage divides, and in series, current adds up.", "isCorrect": false, "rationale": "This statement is incorrect. In parallel, voltage is the same, not divided, and in series, current is the same, not added up (total current is equal to current through each component)."}], "id": "q07"}, {"question": "When analyzing a complex combination circuit, what is the recommended first step according to the text?", "options": [{"text": "Calculate the total current using Ohm's law.", "isCorrect": false, "rationale": "Calculating total current is a later step, after the circuit has been reduced to a single equivalent resistance."}, {"text": "Identify which resistors are in parallel and replace them with a single equivalent resistance.", "isCorrect": true, "rationale": "The text explicitly states the first step in analyzing combination circuits: 'Identify which resistors are in parallel and replace them with a single equivalent resistance using the reciprocal formula.'"}, {"text": "Work backward through each step to find individual component values.", "isCorrect": false, "rationale": "Working backward is the final step in the analysis process, done after the total current and equivalent resistance are found."}, {"text": "Identify which resistors are in series and replace them by adding their resistances.", "isCorrect": false, "rationale": "While this is a valid step in simplifying combination circuits, the text explicitly lists identifying and simplifying parallel resistors as the *first* step, followed by series simplification."}], "id": "q08"}, {"question": "Household electrical circuits are wired in parallel rather than in series. Which of the following is NOT an advantage of parallel household wiring?", "options": [{"text": "Each appliance receives the full circuit voltage.", "isCorrect": false, "rationale": "This is a key advantage of parallel wiring. Each device is connected directly across the main voltage supply, ensuring it receives the full 120V it's designed for."}, {"text": "Turning off one appliance does not affect others.", "isCorrect": false, "rationale": "This is a key advantage. Due to multiple paths, if one appliance is turned off or breaks, the other branches continue to receive current and operate independently."}, {"text": "Adding more appliances reduces the total current drawn from the source.", "isCorrect": true, "rationale": "This statement is incorrect and therefore NOT an advantage. In a parallel circuit, adding more appliances (which are essentially more parallel resistors) decreases the total equivalent resistance, which in turn *increases* the total current drawn from the source (I_total = V_total / R_T). This increased current draw can lead to circuit overloading if not managed by fuses/breakers."}, {"text": "Devices operate independently of each other.", "isCorrect": false, "rationale": "This is a key advantage. Each device has its own path for current, allowing it to function without being affected by the operation or failure of other devices."}], "id": "q09"}, {"question": "The 'Circuits in the Body' section compares the nervous system to a parallel circuit. What key characteristic of parallel circuits does this analogy highlight regarding nerve pathways?", "options": [{"text": "Nerve impulses experience a shared voltage across all pathways.", "isCorrect": false, "rationale": "While voltage is constant across parallel branches, the analogy primarily focuses on the structural and functional redundancy, not electrical potential sharing in this context."}, {"text": "The total resistance of the nervous system decreases as more pathways are used.", "isCorrect": false, "rationale": "While true for electrical parallel circuits, the text's analogy specifically emphasizes the functional benefit related to injury and recovery, not the resistance calculation."}, {"text": "Damage to one nerve pathway can often be compensated by other pathways.", "isCorrect": true, "rationale": "The text explicitly states: 'The branching structure of the nervous system resembles a parallel circuit: if one nerve pathway is damaged, other pathways can often still carry signals. This redundancy is why the body can sometimes recover function after an injury.' This highlights the multiple path advantage of parallel circuits."}, {"text": "The current is the same through every nerve pathway.", "isCorrect": false, "rationale": "In a parallel circuit, current divides among branches; it is not the same through every branch. This statement is incorrect for parallel circuits and therefore not what the analogy highlights."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
