<script>
var QUESTIONS = [{"question": "If the locations of major earthquakes and volcanic eruptions from the past century are plotted on a world map, a striking pattern emerges. What fundamental geological theory is most strongly supported by this non-random distribution?", "options": [{"text": "The theory of continental drift, explaining how continents move over time.", "isCorrect": false, "rationale": "While continental drift is related to plate tectonics, the text specifically states that the observed pattern of earthquakes and volcanoes was a key observation that led to the theory of plate tectonics, which explains the mechanism and location of these events."}, {"text": "The theory of plate tectonics, indicating that these events occur along plate boundaries.", "isCorrect": true, "rationale": "The first paragraph explicitly states: 'This pattern was one of the key observations that led to the theory of plate tectonics, and it allows scientists to identify where future earthquakes and eruptions are most likely to occur.'"}, {"text": "The theory of seafloor spreading, showing where new oceanic crust is formed.", "isCorrect": false, "rationale": "Seafloor spreading is a component of plate tectonics, but the overarching theory that explains the global distribution of both earthquakes and volcanoes along narrow belts is plate tectonics."}, {"text": "The theory of isostasy, explaining the buoyant equilibrium of Earth's crust.", "isCorrect": false, "rationale": "Isostasy explains how Earth's crust 'floats' on the mantle, but it does not directly explain the concentrated distribution of seismic and volcanic activity along linear belts."}]}, {"question": "When an earthquake occurs, stress is suddenly released, sending waves of energy through the Earth. What is the difference between the 'focus' and the 'epicenter' of an earthquake?", "options": [{"text": "The focus is the point on the Earth's surface where the most damage occurs, while the epicenter is the point inside the Earth where the rock first breaks.", "isCorrect": false, "rationale": "This statement reverses the definitions. The focus is inside the Earth, and the epicenter is on the surface above it."}, {"text": "The focus is the point on Earth's surface directly above where the rock breaks, and the epicenter is the point inside the Earth where the rupture originates.", "isCorrect": false, "rationale": "This statement reverses the definitions of focus and epicenter."}, {"text": "The focus is the point inside the Earth where the rock first breaks, and the epicenter is the point on Earth's surface directly above the focus.", "isCorrect": true, "rationale": "The text states: 'The point inside the Earth where the rock first breaks is called the focus (or hypocenter). The point on Earth's surface directly above the focus is called the epicenter.'"}, {"text": "The focus refers to the magnitude of the earthquake, while the epicenter refers to its depth.", "isCorrect": false, "rationale": "Neither term refers to magnitude or depth in this way. Focus and epicenter describe specific locations relative to the earthquake's origin."}]}, {"question": "A seismograph station records the arrival of seismic waves from a distant earthquake. Which of the following statements accurately compares P-waves and S-waves?", "options": [{"text": "P-waves are slower than S-waves and arrive later at the station, causing more significant damage.", "isCorrect": false, "rationale": "P-waves are faster than S-waves and arrive first ('primary'). Surface waves, not S-waves, typically cause the most damage."}, {"text": "S-waves are compressional waves that can travel through solids, liquids, and gases, similar to sound waves.", "isCorrect": false, "rationale": "S-waves are shear (transverse) waves and can only travel through solids. P-waves are the compressional waves that travel through all states of matter."}, {"text": "P-waves are shear waves that move rock side to side, while S-waves are compressional waves that stretch and compress material.", "isCorrect": false, "rationale": "This statement reverses the characteristics. P-waves are compressional, and S-waves are shear."}, {"text": "P-waves are faster than S-waves and can travel through solids, liquids, and gases, whereas S-waves can only travel through solids.", "isCorrect": true, "rationale": "The text states: 'P-waves... are the fastest seismic waves... They can pass through solids, liquids, and gases.' It also states: 'S-waves are slower than P-waves... They can travel only through solids — they cannot pass through liquids.'"}]}, {"question": "The moment magnitude scale is logarithmic, meaning each whole-number increase represents roughly 32 times more energy released. If an earthquake has a magnitude of 7.0, how much more energy does it release compared to an earthquake of magnitude 5.0?", "options": [{"text": "Approximately 32 times more energy.", "isCorrect": false, "rationale": "32 times more energy represents a single whole-number increase (e.g., 5.0 to 6.0), not two steps."}, {"text": "Approximately 64 times more energy.", "isCorrect": false, "rationale": "This would be 2 x 32, not 32 x 32, which is needed for two magnitude steps."}, {"text": "Approximately 1,024 times more energy.", "isCorrect": true, "rationale": "Moving from magnitude 5.0 to 7.0 is two whole-number steps (5.0 to 6.0, then 6.0 to 7.0). Each step represents 32 times more energy, so the total increase is 32 × 32 = 1,024 times more energy."}, {"text": "Approximately 32,000 times more energy.", "isCorrect": false, "rationale": "This number is too high and does not align with the logarithmic scale described for two magnitude steps."}]}, {"question": "Scientists often need to locate the epicenter of an earthquake quickly after it occurs. Which of the following best describes the method used to pinpoint an earthquake's epicenter?", "options": [{"text": "By measuring the depth of the focus directly from a single seismograph reading.", "isCorrect": false, "rationale": "The depth of the focus is not directly measured by a single reading for epicenter location, and the epicenter is on the surface."}, {"text": "By calculating the exact time of the S-wave arrival at one station and converting it to a distance.", "isCorrect": false, "rationale": "The S-P time interval is used to calculate distance from a station, not just the S-wave arrival time. Furthermore, one station is not enough to pinpoint an epicenter."}, {"text": "By comparing the arrival times of P-waves and S-waves at a minimum of three seismograph stations and using triangulation.", "isCorrect": true, "rationale": "The text clearly states: 'Because P-waves travel faster than S-waves, the farther a station is from the epicenter, the greater the time gap between the arrival of the P-wave and the arrival of the S-wave. This time difference... can be converted into a distance... To pinpoint the epicenter, scientists need data from at least three stations... The point where all three circles intersect is the epicenter. This method is called triangulation.'"}, {"text": "By observing the visible damage pattern on the Earth's surface and tracing it back to the origin.", "isCorrect": false, "rationale": "While damage patterns provide clues, this is not the precise scientific method used to locate an epicenter. Seismic waves are used for accuracy."}]}, {"question": "A seismograph station records the first P-wave arriving at 3:05:00 PM and the first S-wave arriving at 3:06:00 PM. Using the simplified conversion factor that each second of S–P time interval corresponds to approximately 8 km of distance from the epicenter, how far is the station from the epicenter?", "options": [{"text": "8 km", "isCorrect": false, "rationale": "This would only be true for a 1-second S-P interval. The interval here is 60 seconds."}, {"text": "60 km", "isCorrect": false, "rationale": "This would be the S-P time interval, not the distance. The conversion factor must be applied."}, {"text": "480 km", "isCorrect": true, "rationale": "The S–P time interval is 3:06:00 PM - 3:05:00 PM = 60 seconds. Using the conversion factor, distance = 60 seconds * 8 km/second = 480 km. This applies the concept from the worked example."}, {"text": "800 km", "isCorrect": false, "rationale": "This would result from a 100-second S-P interval, not 60 seconds."}]}, {"question": "Volcanoes form in various geological settings. The Hawaiian Islands are a notable example of volcanism occurring far from active plate boundaries. What is the geological explanation for the formation of the Hawaiian Islands?", "options": [{"text": "They formed at a divergent plate boundary where new oceanic crust is being created.", "isCorrect": false, "rationale": "Divergent boundaries form volcanoes like mid-ocean ridges, but Hawaii is not at such a boundary; it's in the middle of a plate."}, {"text": "They are a chain of composite volcanoes formed by the subduction of an oceanic plate beneath another.", "isCorrect": false, "rationale": "Subduction zones form composite volcanoes (like the Ring of Fire), but Hawaii is not a subduction zone, nor are its main volcanoes composite (they are shield volcanoes)."}, {"text": "They developed over a hot spot, an area of unusually hot mantle material that rises independently of plate boundaries.", "isCorrect": true, "rationale": "The text states: 'A smaller number form over hot spots — plumes of unusually hot mantle material that rise independently of plate boundaries (the Hawaiian Islands are the most famous example).'"}, {"text": "They are cinder cone volcanoes that erupted explosively from a shallow magma chamber.", "isCorrect": false, "rationale": "While there may be cinder cones on Hawaii, the islands as a whole are primarily formed by shield volcanoes over a hot spot, not just small cinder cones from shallow magma chambers."}]}, {"question": "A geologist observes a volcano that is broad, gently sloping, and built from many layers of very fluid, low-viscosity lava. This volcano also produces relatively gentle, effusive eruptions. Which type of volcano is the geologist most likely observing?", "options": [{"text": "Cinder cone volcano", "isCorrect": false, "rationale": "Cinder cones are small, steep, and built from explosive fragments, not broad and gently sloping from fluid lava."}, {"text": "Composite volcano (stratovolcano)", "isCorrect": false, "rationale": "Composite volcanoes are tall, steep, and symmetrical, built from alternating layers of lava and explosive debris, and produce dangerous, violent eruptions."}, {"text": "Shield volcano", "isCorrect": true, "rationale": "The description 'broad, gently sloping structures built from many thin layers of low-viscosity (runny) basaltic lava' and 'relatively gentle eruptions' directly matches the definition of a shield volcano."}, {"text": "Subduction zone volcano", "isCorrect": false, "rationale": "This refers to the tectonic setting, not a specific volcano type. Subduction zones typically produce composite volcanoes, which do not match the description."}]}, {"question": "The Ring of Fire is known for hosting about 75 percent of the world's active volcanoes and 90 percent of its earthquakes. This intense geological activity along the borders of the Pacific Ocean is primarily attributed to:", "options": [{"text": "The presence of a massive hot spot beneath the Pacific Plate causing widespread melting and seismic tremors.", "isCorrect": false, "rationale": "While hot spots cause volcanism (like Hawaii), the Ring of Fire's activity is specifically linked to plate boundaries, not a single massive hot spot across the entire region."}, {"text": "A high concentration of divergent plate boundaries where new crust is rapidly forming and pulling apart.", "isCorrect": false, "rationale": "Divergent boundaries do cause earthquakes and volcanism, but the Ring of Fire is predominantly characterized by subduction zones, not primarily divergent boundaries."}, {"text": "The collision and grinding of numerous transform plate boundaries, creating extensive fault lines.", "isCorrect": false, "rationale": "Transform boundaries (like the San Andreas Fault) cause many earthquakes but very few volcanoes, which contradicts the observation of both in the Ring of Fire."}, {"text": "The prevalence of subduction zones where oceanic plates converge and descend beneath other plates, causing intense volcanic and seismic activity.", "isCorrect": true, "rationale": "The text states: 'This belt coincides with the edges of the Pacific Plate and several smaller plates, where subduction zones produce intense volcanic and seismic activity.'"}]}, {"question": "Regarding preparedness and prediction for geological hazards, which statement accurately reflects the current scientific capabilities mentioned in the text?", "options": [{"text": "Both earthquakes and volcanic eruptions can be predicted with precision days or weeks in advance, allowing for timely evacuations.", "isCorrect": false, "rationale": "The text explicitly states that 'earthquake prediction remains much more limited' than volcano prediction."}, {"text": "Scientists can forecast the exact time and magnitude of upcoming earthquakes much more reliably than volcanic eruptions.", "isCorrect": false, "rationale": "This statement is the opposite of what the text says. Volcanic prediction has more success than earthquake prediction."}, {"text": "Volcanic eruptions can often be predicted with some advance notice by monitoring precursors, while earthquake prediction remains much more challenging.", "isCorrect": true, "rationale": "The text states: 'Early warning systems can give communities hours to days of advance notice for volcanic eruptions, though earthquake prediction remains much more limited.' This directly supports the option."}, {"text": "Neither earthquakes nor volcanic eruptions can be predicted at all, only monitored after they begin.", "isCorrect": false, "rationale": "This is incorrect. While earthquake prediction is limited, volcanic eruptions can often be predicted with advance notice."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
