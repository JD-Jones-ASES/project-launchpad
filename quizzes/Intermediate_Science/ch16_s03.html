    };

        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 16, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Mendel crossed true-breeding purple-flowered pea plants with true-breeding white-flowered pea plants. What did he observe in the first filial (F1) generation?", "options": [{"text": "All offspring had white flowers.", "isCorrect": false, "rationale": "White flowers are a recessive trait; when crossed with a dominant true-breeding parent, the recessive trait would be masked in the F1 generation."}, {"text": "All offspring had purple flowers.", "isCorrect": true, "rationale": "Mendel's experiments showed that in the F1 generation from a cross of two true-breeding parents with contrasting traits, all offspring displayed the dominant trait (purple flowers in this case)."}, {"text": "Offspring had a mix of purple and white flowers in a 1:1 ratio.", "isCorrect": false, "rationale": "A 1:1 ratio of phenotypes would typically result from a test cross (heterozygous x homozygous recessive), not the F1 generation of two true-breeding parents with contrasting traits."}, {"text": "Offspring had a mix of purple and white flowers in a 3:1 ratio.", "isCorrect": false, "rationale": "A 3:1 ratio of phenotypes is characteristic of the F2 generation, resulting from a cross between two F1 heterozygous individuals."}], "id": "q01"}, {"question": "Which statement accurately defines a recessive allele according to Mendelian genetics?", "options": [{"text": "An allele that always expresses its trait, even if only one copy is inherited.", "isCorrect": false, "rationale": "This describes a dominant allele, which expresses its trait whenever it is present."}, {"text": "An allele that requires two copies to be present in order to express its trait.", "isCorrect": true, "rationale": "A recessive allele expresses its trait only when two copies are present (homozygous recessive) and no dominant allele is masking it."}, {"text": "An allele that determines the organism's appearance when paired with a different allele.", "isCorrect": false, "rationale": "This describes a dominant allele, as it masks the recessive allele in a heterozygous individual."}, {"text": "An allele that is always less common in a population than its dominant counterpart.", "isCorrect": false, "rationale": "While sometimes true, this is not part of the definition of a recessive allele; allele frequency is distinct from dominance/recessiveness."}], "id": "q02"}, {"question": "A pea plant has the genotype $Pp$ for flower color, where $P$ represents the allele for purple flowers and $p$ represents the allele for white flowers. What is the observable physical characteristic (phenotype) of this plant?", "options": [{"text": "White flowers", "isCorrect": false, "rationale": "White flowers would only occur if the genotype was homozygous recessive ($pp$). The presence of the dominant allele $P$ in $Pp$ results in purple flowers."}, {"text": "Purple flowers", "isCorrect": true, "rationale": "In a heterozygous individual ($Pp$), the dominant allele ($P$) expresses its trait, masking the presence of the recessive allele ($p$), resulting in purple flowers."}, {"text": "A mix of purple and white flowers on the same plant", "isCorrect": false, "rationale": "Alleles determine the overall flower color of the plant, not a mosaic pattern in simple Mendelian inheritance."}, {"text": "It depends on the environment, as phenotype is not solely determined by genotype.", "isCorrect": false, "rationale": "While environment can influence some phenotypes, for simple Mendelian traits like pea flower color, the genotype $Pp$ reliably results in purple flowers regardless of typical environmental variation."}], "id": "q03"}, {"question": "A plant breeder aims to produce only white-flowered pea plants. Knowing that white flowers are a recessive trait ($pp$), what must be the genotypes of the two parent plants chosen for the cross?", "options": [{"text": "Both parents must be heterozygous ($Pp$).", "isCorrect": false, "rationale": "If both parents are $Pp$, a Punnett square predicts a 3:1 phenotypic ratio (3 purple:1 white), meaning 25% of offspring would have white flowers, not all."}, {"text": "At least one parent must be homozygous dominant ($PP$).", "isCorrect": false, "rationale": "If any parent is $PP$, all offspring will inherit at least one $P$ allele and thus have purple flowers, as $P$ is dominant."}, {"text": "Both parents must be homozygous recessive ($pp$).", "isCorrect": true, "rationale": "To ensure all offspring have the recessive white-flower phenotype, both parents must contribute only $p$ alleles. This means both must be $pp$."}, {"text": "One parent is homozygous dominant ($PP$) and the other is homozygous recessive ($pp$).", "isCorrect": false, "rationale": "A cross between $PP$ and $pp$ would result in all heterozygous ($Pp$) offspring, which would all have purple flowers due to dominance."}], "id": "q04"}, {"question": "When two pea plants, both heterozygous for flower color ($Pp$), are crossed, what is the expected genotypic ratio of their offspring?", "options": [{"text": "3 $PP$ : 1 $pp$", "isCorrect": false, "rationale": "This ratio is incorrect; it misses the heterozygous genotype and incorrectly counts the homozygous dominant and recessive proportions."}, {"text": "1 $PP$ : 2 $Pp$ : 1 $pp$", "isCorrect": true, "rationale": "A Punnett square for a monohybrid cross ($Pp \times Pp$) shows that the offspring genotypes will be 1/4 $PP$, 1/2 $Pp$, and 1/4 $pp$, leading to a 1:2:1 genotypic ratio."}, {"text": "1 $Pp$ : 3 $pp$", "isCorrect": false, "rationale": "This ratio is incorrect; it misrepresents the expected proportions of genotypes from a heterozygous cross."}, {"text": "3 purple : 1 white", "isCorrect": false, "rationale": "This is the expected phenotypic ratio for this cross, not the genotypic ratio."}], "id": "q05"}, {"question": "In a cross between two pea plants that are both heterozygous for purple flowers ($Pp \times Pp$), what fraction of the offspring are expected to exhibit the dominant phenotype (purple flowers)?", "options": [{"text": "1/4", "isCorrect": false, "rationale": "1/4 of the offspring are expected to be homozygous dominant ($PP$), which is purple, but this does not account for the heterozygous purple offspring."}, {"text": "1/2", "isCorrect": false, "rationale": "1/2 of the offspring are expected to be heterozygous ($Pp$), which is purple, but this does not account for the homozygous dominant purple offspring."}, {"text": "3/4", "isCorrect": true, "rationale": "From a $Pp \times Pp$ cross, 1/4 of offspring are $PP$ (purple) and 1/2 are $Pp$ (purple). Together, 1/4 + 1/2 = 3/4 of the offspring are expected to have the dominant purple flower phenotype."}, {"text": "All of them", "isCorrect": false, "rationale": "While the dominant phenotype is more common, 1/4 of the offspring from this cross are expected to be homozygous recessive ($pp$), resulting in white flowers."}], "id": "q06"}, {"question": "Mendel's choice of garden peas ($Pisum sativum$) was key to the success of his experiments. Which of the following characteristics was LEAST important for his genetic studies?", "options": [{"text": "They produce many offspring.", "isCorrect": false, "rationale": "Producing many offspring is crucial for observing statistically significant genetic ratios across generations."}, {"text": "They grow quickly.", "isCorrect": false, "rationale": "A short generation time allows for conducting multiple crosses and observing several generations within a reasonable timeframe."}, {"text": "They have traits that come in clearly distinct forms.", "isCorrect": false, "rationale": "Distinct traits (like purple or white flowers) simplify categorization and analysis of inheritance patterns."}, {"text": "They are a common food source for humans.", "isCorrect": true, "rationale": "The edibility or nutritional value of pea plants is irrelevant to their suitability for genetic experiments; it does not impact inheritance patterns or ease of study."}], "id": "q07"}, {"question": "A couple who are both heterozygous for a recessive genetic condition ($Rr$) have already had three children, all of whom do not express the condition ($RR$ or $Rr$). What is the probability that their next (fourth) child will express the recessive condition ($rr$)?", "options": [{"text": "0%", "isCorrect": false, "rationale": "Each birth is an independent event; past outcomes do not influence future probabilities in Mendelian inheritance."}, {"text": "25%", "isCorrect": true, "rationale": "For two heterozygous parents ($Rr \times Rr$), a Punnett square shows that there is a 1/4 (25%) chance of producing homozygous recessive ($rr$) offspring. This probability is constant for each independent child."}, {"text": "50%", "isCorrect": false, "rationale": "The probability of expressing the recessive condition is 1/4, not 1/2, from a heterozygous cross."}, {"text": "75%", "isCorrect": false, "rationale": "75% is the probability of *not* expressing the recessive condition (i.e., having $RR$ or $Rr$ genotype)."}], "id": "q08"}, {"question": "A plant breeder crosses a purple-flowered pea plant with a white-flowered pea plant. All of the offspring produced from this cross have purple flowers. Based on Mendelian principles, what are the most likely genotypes of the original parent plants?", "options": [{"text": "Purple parent: $Pp$, White parent: $pp$", "isCorrect": false, "rationale": "If the purple parent were $Pp$, approximately half of the offspring would be $pp$ (white), which contradicts the observation that all offspring were purple."}, {"text": "Purple parent: $PP$, White parent: $pp$", "isCorrect": true, "rationale": "The white-flowered parent must be $pp$. For all offspring to be purple, they must all receive a dominant $P$ allele. This can only happen if the purple parent is homozygous dominant ($PP$), resulting in all $Pp$ (purple) offspring."}, {"text": "Both parents: $Pp$", "isCorrect": false, "rationale": "If both parents were $Pp$, a 3:1 phenotypic ratio (3 purple:1 white) would be expected, meaning some white-flowered offspring would be produced."}, {"text": "Both parents: $PP$", "isCorrect": false, "rationale": "One of the parent plants is stated to be white-flowered, which corresponds to the $pp$ genotype, not $PP$."}], "id": "q09"}, {"question": "What is the primary function of a Punnett square in the study of genetics?", "options": [{"text": "To illustrate the complex structure of DNA molecules within a cell.", "isCorrect": false, "rationale": "Punnett squares are used for predicting inheritance patterns of alleles, not for illustrating DNA structure."}, {"text": "To determine the exact number of offspring that will inherit specific traits in a small-scale genetic cross.", "isCorrect": false, "rationale": "Punnett squares predict probabilities and ratios, not exact counts for a small number of offspring, as genetic inheritance is probabilistic."}, {"text": "To predict the possible genotypes and phenotypes of offspring and their probabilities from a genetic cross.", "isCorrect": true, "rationale": "The Punnett square is a diagrammatic tool specifically designed to calculate and visualize the probabilities of different offspring genotypes and phenotypes resulting from a cross."}, {"text": "To identify newly occurring mutations in an organism's genetic code.", "isCorrect": false, "rationale": "Punnett squares model the inheritance of existing alleles; they are not used to identify or predict new mutations."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
