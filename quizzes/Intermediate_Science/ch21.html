        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 21</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, which statement best encapsulates the core conclusion drawn from all lines of evidence for evolution?", "options": [{"text": "All species on Earth are completely unique and unrelated, forming distinct evolutionary paths.", "isCorrect": false, "rationale": "This contradicts the central theme of common ancestry and shared family history presented in the text."}, {"text": "Life on Earth has changed over time, and every species alive today descended from earlier forms.", "isCorrect": true, "rationale": "The text states: 'all of it points to the same conclusion: life on Earth has changed over time, and every species alive today descended from earlier forms.'"}, {"text": "Evolution primarily explains the deep similarities shared by all living organisms, not their diversity.", "isCorrect": false, "rationale": "The definition of evolution states it 'explains both the diversity of life and the deep similarities shared by all living organisms.'"}, {"text": "The primary evidence for evolution comes solely from DNA analysis, as it is the most modern technique.", "isCorrect": false, "rationale": "The text explicitly mentions evidence is 'drawn from many independent fields of science,' including fossils, anatomy, and biogeography, not solely DNA."}], "id": "q01"}, {"question": "The discovery of Tiktaalik, with its features of both fish and land-dwelling amphibians, is particularly significant because it exemplifies which key pattern in the fossil record?", "options": [{"text": "The consistent increase in organism complexity over geological time.", "isCorrect": false, "rationale": "While related to complexity, the primary significance of Tiktaalik is its role as a bridge, not just general complexity increase."}, {"text": "The prevalence of extinction events throughout Earth's history.", "isCorrect": false, "rationale": "Tiktaalik is an example of transition between groups, not an extinction event."}, {"text": "The existence of transitional fossils that bridge evolutionary gaps between major taxonomic groups.", "isCorrect": true, "rationale": "The text states Tiktaalik 'represents a transition from water to land' and 'bridges gaps between groups' with features of both fish and amphibians."}, {"text": "The utility of Carbon-14 dating for very ancient organisms, like those from 375 million years ago.", "isCorrect": false, "rationale": "Carbon-14 dating is only effective for organisms up to about 50,000 years old; potassium-argon dating is used for millions of years."}], "id": "q02"}, {"question": "A geologist discovers a fossilized dinosaur bone embedded in rock layers estimated to be 150 million years old. Which dating method would be most appropriate for determining the age of this fossil and its surrounding rock?", "options": [{"text": "Carbon-14 dating", "isCorrect": false, "rationale": "Carbon-14 dating is suitable for organisms up to about 50,000 years old, not 150 million years."}, {"text": "Potassium-argon dating", "isCorrect": true, "rationale": "The text states 'potassium-argon dating is used for rocks millions to billions of years old,' which would be appropriate for a 150-million-year-old fossil."}, {"text": "DNA sequencing comparison", "isCorrect": false, "rationale": "DNA sequencing compares genetic relationships between living or recently deceased species, not directly dates ancient fossils or rocks."}, {"text": "Analyzing homologous structures", "isCorrect": false, "rationale": "Analyzing homologous structures provides evidence of common ancestry but does not directly date fossils or rock layers."}], "id": "q03"}, {"question": "A bird's wing and a butterfly's wing both allow for flight, but they have completely different internal structures and developmental origins. This is an example of what type of structures, and what evolutionary process does it demonstrate?", "options": [{"text": "Homologous structures; divergent evolution", "isCorrect": false, "rationale": "Homologous structures share a common ancestor's body plan, which is not the case for bird and butterfly wings for flight."}, {"text": "Vestigial structures; reduced function", "isCorrect": false, "rationale": "Both types of wings are fully functional for flight, not reduced or non-functional."}, {"text": "Analogous structures; convergent evolution", "isCorrect": true, "rationale": "The text defines analogous structures as performing similar functions but evolving independently in unrelated organisms, resulting from convergent evolution."}, {"text": "Embryonic structures; shared developmental program", "isCorrect": false, "rationale": "This scenario describes developed structures in unrelated organisms, not shared embryonic features."}], "id": "q04"}, {"question": "The human appendix is identified as a vestigial structure. Which of the following statements best explains why the appendix is considered evidence for evolution?", "options": [{"text": "It performs a vital, though often underestimated, digestive function in modern humans.", "isCorrect": false, "rationale": "The text describes vestigial structures as 'reduced in size or function compared to the same structure in an ancestral species,' implying it does not perform a vital function in its current state."}, {"text": "It is similar in structure to the functional digestive organs found in fish and amphibians, showing common ancestry.", "isCorrect": false, "rationale": "While common ancestry is implied, the definition of a vestigial structure focuses on its reduced function in the current species compared to an ancestor, not its similarity to functional organs in other existing species."}, {"text": "It indicates that humans once had a much larger and more complex digestive system that has since been simplified.", "isCorrect": false, "rationale": "The text states vestigial structures provide evidence 'that organisms have changed over time,' suggesting a more functional role in an ancestral species, not necessarily just a 'larger and more complex' *system*."}, {"text": "It is a body structure that is reduced in size or function compared to its role in an ancestral species, indicating change over time.", "isCorrect": true, "rationale": "This directly matches the definition of a vestigial structure provided in the text: 'A body structure that is reduced in size or function compared to the same structure in an ancestral species. Vestigial structures provide evidence that organisms have changed over time.'"}], "id": "q05"}, {"question": "The observation that early vertebrate embryos, such as those of fish, birds, and mammals, all develop pharyngeal pouches and tails before birth primarily suggests what about their evolutionary history?", "options": [{"text": "That all vertebrates eventually develop gills and fully functional tails as adults.", "isCorrect": false, "rationale": "The text states these features 'become gills in fish but ear structures and glands in mammals' and tails 'shrink or disappear in humans before birth,' indicating they do not always persist in the adult form."}, {"text": "That these vertebrates share a common developmental program inherited from a shared ancestor.", "isCorrect": true, "rationale": "The text explicitly states: 'These shared embryonic features suggest that vertebrates inherited a common developmental program from a shared ancestor.'"}, {"text": "That environmental factors during gestation cause similar embryonic development across diverse species.", "isCorrect": false, "rationale": "The text attributes these similarities to inherited developmental programs and common ancestry, not external environmental factors."}, {"text": "That only the most complex vertebrates retain these features into adulthood.", "isCorrect": false, "rationale": "The text indicates these features are modified or disappear in more complex vertebrates like humans, not retained."}], "id": "q06"}, {"question": "If scientists find that two species, Species X and Species Y, have a 95% similarity in their mitochondrial DNA sequences, while Species X and Species Z have only a 40% similarity, what can be most accurately inferred about their evolutionary relationships?", "options": [{"text": "Species X and Y are completely unrelated, and the high similarity is coincidental.", "isCorrect": false, "rationale": "High DNA similarity (like 95%) strongly indicates a close evolutionary relationship and common ancestry, not coincidence."}, {"text": "Species X and Y share a more recent common ancestor with each other than either does with Species Z.", "isCorrect": true, "rationale": "The text states, 'The more similar the sequences, the more recently the two species shared a common ancestor.' A 95% similarity indicates a much more recent common ancestor than a 40% similarity."}, {"text": "Species X and Z are more evolved than Species Y due to their greater genetic divergence.", "isCorrect": false, "rationale": "Evolution does not imply a hierarchy of 'more' or 'less' evolved; genetic divergence reflects time since common ancestry, not superiority."}, {"text": "Species Y has undergone more rapid evolutionary changes than Species Z.", "isCorrect": false, "rationale": "While different rates of evolution can occur, DNA similarity primarily indicates relatedness and time since divergence, not directly the rate of change for one species over another without more context."}], "id": "q07"}, {"question": "Australia's unique marsupial population, such as kangaroos and koalas, which fill ecological roles occupied by placental mammals on other continents, provides strong evidence for evolution through which specific field of study?", "options": [{"text": "The fossil record", "isCorrect": false, "rationale": "While fossils exist, the primary evidence here relates to the geographic distribution and isolation of unique living species, not solely ancient remains."}, {"text": "Comparative anatomy", "isCorrect": false, "rationale": "While anatomical comparisons could be made, the core of this example is about where these organisms live and why they are unique to that location, not just their physical structures."}, {"text": "Molecular biology", "isCorrect": false, "rationale": "Molecular biology would confirm their relationships, but the observation of unique species on an isolated continent is a biogeographical finding."}, {"text": "Biogeography", "isCorrect": true, "rationale": "The text explicitly uses Australia's marsupials as an example under 'Biogeography,' stating, 'Isolated continents develop unique species.'"}], "id": "q08"}, {"question": "Which of the following scenarios best illustrates how distinct species can evolve similar features due to similar environmental pressures, despite not sharing a recent common ancestor for that specific trait?", "options": [{"text": "The identical basic bone structure in the forelimbs of a human, a bat, and a whale.", "isCorrect": false, "rationale": "This describes homologous structures, which are similar due to common ancestry (divergent evolution), not independent evolution due to similar pressures."}, {"text": "The presence of pharyngeal pouches in the early embryos of both fish and humans.", "isCorrect": false, "rationale": "This points to shared embryonic features from a common ancestor, not independent evolution of similar traits."}, {"text": "The similar appearance and function of cacti in the Americas and euphorbia in Africa, both adapted to desert environments.", "isCorrect": true, "rationale": "The text uses this exact example to illustrate analogous structures resulting from convergent evolution, where unrelated species evolve similar features due to similar environmental challenges."}, {"text": "The discovery of Tiktaalik as a transitional fossil bridging the gap between fish and amphibians.", "isCorrect": false, "rationale": "Tiktaalik demonstrates common ancestry and divergence, not independent evolution of similar traits in unrelated lineages."}], "id": "q09"}, {"question": "A scientist observes a population of bacteria that, after several generations, has developed resistance to an antibiotic. According to the definition provided in the text, this change best represents what aspect of evolution?", "options": [{"text": "The process of speciation, leading to a new bacterial species.", "isCorrect": false, "rationale": "While antibiotic resistance is an evolutionary change, the text's definition of evolution focuses on changes within a population, and this observation doesn't necessarily mean a new species has formed yet."}, {"text": "A change in the inherited characteristics of a population over successive generations.", "isCorrect": true, "rationale": "The text defines evolution as 'The change in the inherited characteristics of a population over successive generations,' which perfectly describes the development of antibiotic resistance in a bacterial population."}, {"text": "Evidence of a vestigial structure appearing in the bacteria due to environmental pressure.", "isCorrect": false, "rationale": "Antibiotic resistance is an acquired function, not a reduced or non-functional structure."}, {"text": "The initial stages of homologous structure development in response to an environmental challenge.", "isCorrect": false, "rationale": "Homologous structures relate to shared body plans from common ancestors, not a new functional adaptation within a single population like antibiotic resistance."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
