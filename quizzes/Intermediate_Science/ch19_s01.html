<script>
var QUESTIONS = [{"question": "What is the fundamental characteristic that defines a wave according to the textbook?", "options": [{"text": "It is a disturbance that transports matter from one place to another.", "isCorrect": false, "rationale": "The textbook explicitly states that a wave transfers energy without transporting matter. Particles of the medium oscillate in place."}, {"text": "It is a disturbance that transfers energy from one place to another without transporting matter.", "isCorrect": true, "rationale": "This is the precise definition of a wave provided in the textbook: 'A disturbance that transfers energy from one place to another without transporting matter.'"}, {"text": "It is any oscillation of particles that requires a solid medium to propagate.", "isCorrect": false, "rationale": "Waves do not always require a solid medium (e.g., sound in air, water waves, electromagnetic waves in a vacuum), and not all oscillations are waves in this context."}, {"text": "It causes particles to move in a continuous, circular path along the direction of travel.", "isCorrect": false, "rationale": "While some water waves exhibit roughly circular particle motion, this is not a universal defining characteristic of all waves, and the core idea is oscillation in place, not continuous forward motion of matter."}], "id": "q01"}, {"question": "A student pushes and pulls one end of a Slinky coil along its length, creating regions where the coils are bunched together and regions where they are spread apart. What type of wave is being demonstrated, and how do the coils vibrate relative to the wave's direction?", "options": [{"text": "Transverse wave; the coils vibrate perpendicular to the wave's direction.", "isCorrect": false, "rationale": "Transverse waves involve perpendicular vibration. The description of Slinky coils bunching and spreading indicates parallel vibration."}, {"text": "Longitudinal wave; the coils vibrate parallel to the wave's direction.", "isCorrect": true, "rationale": "The textbook describes pushing and pulling a Slinky along its length as creating a longitudinal wave, where particles (coils) vibrate parallel to the direction of wave travel, forming compressions and rarefactions."}, {"text": "Electromagnetic wave; the coils oscillate in all directions simultaneously.", "isCorrect": false, "rationale": "Electromagnetic waves do not require a medium like a Slinky, and the description of particle motion does not match this type of wave."}, {"text": "Surface wave; the coils move in small circular paths as the wave passes.", "isCorrect": false, "rationale": "Surface waves typically occur at the boundary between two media (like water and air) and the particle motion is not 'pushing and pulling along its length'."}], "id": "q02"}, {"question": "In the context of a transverse wave on a rope, what do the terms 'crest,' 'trough,' and 'rest position' refer to?", "options": [{"text": "Crest is the lowest point, trough is the highest point, and rest position is the point where the wave is stationary.", "isCorrect": false, "rationale": "This reverses the definitions of crest and trough. The rest position is not where the wave is stationary, but the equilibrium position of the medium."}, {"text": "Crest is a region of compression, trough is a region of rarefaction, and rest position is the average particle density.", "isCorrect": false, "rationale": "Compressions and rarefactions are features of longitudinal waves, not transverse waves. Rest position is not about density here."}, {"text": "Crest is the highest point, trough is the lowest point, and the rest position is the horizontal line representing the medium's equilibrium.", "isCorrect": true, "rationale": "The textbook defines the crest as the highest point, the trough as the lowest point, and the rest position as the horizontal line through the middle (equilibrium) of the medium for a transverse wave."}, {"text": "Crest, trough, and rest position all relate to the wavelength of the wave.", "isCorrect": false, "rationale": "While these terms are part of wave anatomy, they are distinct from wavelength, which is a distance measure between corresponding points."}], "id": "q03"}, {"question": "A sound wave travels through air, creating regions of higher and lower pressure. If the pressure at a certain point is significantly lower than normal, what wave feature is present there, and what property determines the distance to the next identical feature?", "options": [{"text": "A compression, and the distance to the next compression is the amplitude.", "isCorrect": false, "rationale": "A region of significantly lower pressure is a rarefaction, not a compression. Amplitude is the maximum displacement, not a distance between compressions."}, {"text": "A rarefaction, and the distance to the next rarefaction is the wavelength.", "isCorrect": true, "rationale": "The textbook defines a rarefaction as where particles are spread apart and pressure is lower than normal. The wavelength of a longitudinal wave is the distance from one rarefaction to the next (or compression to compression)."}, {"text": "A crest, and the distance to the next crest is the period.", "isCorrect": false, "rationale": "Crests are features of transverse waves, not longitudinal. Period is a measure of time, not distance."}, {"text": "An amplitude, and the distance to the next amplitude is the frequency.", "isCorrect": false, "rationale": "Amplitude is a measure of displacement, not a point in the wave analogous to compression. Frequency is the number of cycles per unit time, not a distance."}], "id": "q04"}, {"question": "If a wave has a frequency of 250 Hz, what is its period, and what does this value represent?", "options": [{"text": "The period is 250 seconds, representing the number of cycles completed in one second.", "isCorrect": false, "rationale": "Frequency is the number of cycles per second (250 Hz). Period is the reciprocal of frequency, and represents time per cycle, not cycles per second."}, {"text": "The period is 0.004 seconds, representing the time required for one complete wave cycle to pass a given point.", "isCorrect": true, "rationale": "Period (T) is the reciprocal of frequency (f), so T = 1/f = 1/250 Hz = 0.004 s. This value represents the time for one complete cycle, as stated in the textbook definition of Period."}, {"text": "The period is 4 seconds, representing the time it takes for 250 waves to travel one meter.", "isCorrect": false, "rationale": "This calculation is incorrect (1/250 is 0.004, not 4), and the definition of period is also incorrect."}, {"text": "The period is 0.0025 seconds, representing the speed at which the wave travels.", "isCorrect": false, "rationale": "The calculation (1/250 is 0.004, not 0.0025) and the definition of period are both incorrect. Period is time per cycle, not wave speed."}], "id": "q05"}, {"question": "A marine biologist observes an ocean wave with a wavelength of 15 meters. If the wave's frequency is 0.2 Hz, what is the speed at which the wave is traveling?", "options": [{"text": "75 m/s", "isCorrect": false, "rationale": "This would be wavelength divided by frequency (15 / 0.2), which is incorrect for wave speed."}, {"text": "0.013 m/s", "isCorrect": false, "rationale": "This would be the period (1/0.2 = 5s) divided by the wavelength, or 1/(f*λ), which is incorrect."}, {"text": "3.0 m/s", "isCorrect": true, "rationale": "The wave speed is calculated using the formula v = fλ. Given f = 0.2 Hz and λ = 15 m, v = (0.2 Hz)(15 m) = 3.0 m/s."}, {"text": "15.2 m/s", "isCorrect": false, "rationale": "This value does not result from the correct application of the wave speed formula."}], "id": "q06"}, {"question": "A light wave passes from air into water. Which of the following statements accurately describes how its properties change?", "options": [{"text": "Its frequency and wavelength both change, but its speed remains constant.", "isCorrect": false, "rationale": "When a wave changes medium, its speed changes. The frequency remains constant, and a change in speed with constant frequency means the wavelength must also change."}, {"text": "Its speed and wavelength change, but its frequency remains constant.", "isCorrect": true, "rationale": "The textbook states: 'When a wave passes from one medium to another, its speed changes, but its frequency stays the same (because the source determines the frequency). Since v = fλ, a change in speed means a change in wavelength.'"}, {"text": "Its speed remains constant, while its frequency changes and its wavelength remains constant.", "isCorrect": false, "rationale": "Both speed and wavelength change, while frequency remains constant. If speed were constant and frequency changed, wavelength would also have to change for v=fλ to hold."}, {"text": "Its amplitude changes, but its speed, frequency, and wavelength all remain constant.", "isCorrect": false, "rationale": "Amplitude can change, but speed and wavelength also change when the medium changes. Frequency remains constant."}], "id": "q07"}, {"question": "A musician plucks a guitar string with varying force. How does the 'amplitude' of the resulting sound wave relate to the musician's action and the wave's properties?", "options": [{"text": "Plucking harder increases the wavelength of the sound wave, making it travel faster.", "isCorrect": false, "rationale": "Plucking harder increases amplitude, which is related to energy. Wavelength and speed are primarily determined by the medium for sound, not the plucking force (amplitude)."}, {"text": "Plucking harder increases the frequency of the sound wave, resulting in a higher pitch.", "isCorrect": false, "rationale": "Plucking harder increases amplitude (loudness), not necessarily frequency (pitch). Pitch is determined by frequency."}, {"text": "Plucking harder increases the amplitude of the sound wave, which means the wave carries more energy.", "isCorrect": true, "rationale": "The textbook states: 'Amplitude is related to the energy carried by the wave — a wave with greater amplitude carries more energy.' Plucking harder translates to a larger displacement of the string, thus greater amplitude for the sound wave."}, {"text": "Amplitude is the time it takes for one complete wave cycle, and it is unrelated to the plucking force.", "isCorrect": false, "rationale": "Amplitude is the maximum displacement, not the time for a cycle (which is period). Amplitude is directly affected by the plucking force."}], "id": "q08"}, {"question": "A student observes a buoy bobbing up and down on water waves. She counts 20 wave crests passing the buoy in 50 seconds and estimates the distance between adjacent crests to be 3 meters. Which conclusion about the wave and the buoy's motion is correct?", "options": [{"text": "The wave's speed is 1.2 m/s, and the buoy is slowly being transported towards the shore by the wave's motion.", "isCorrect": false, "rationale": "First, calculate frequency: 20 crests/50s = 0.4 Hz. Then, wave speed: v = fλ = (0.4 Hz)(3 m) = 1.2 m/s. While the speed is correct, the buoy does NOT move towards shore; waves transfer energy, not matter, meaning the buoy mainly bobs in place."}, {"text": "The wave's frequency is 0.4 Hz, its period is 2.5 seconds, and the buoy primarily oscillates vertically without significant forward movement.", "isCorrect": true, "rationale": "Frequency (f) = 20 crests / 50 s = 0.4 Hz. Period (T) = 1/f = 1/0.4 Hz = 2.5 s. The textbook emphasizes that waves transfer energy, not matter, so the buoy (like water particles) oscillates in place, without being transported forward significantly."}, {"text": "The wave's period is 0.4 seconds, its wavelength is 50 meters, and its speed is 20 m/s.", "isCorrect": false, "rationale": "Period is 2.5s, not 0.4s (that's frequency). Wavelength is given as 3m, not 50m. The speed calculation (v=fλ) would be (0.4)(3) = 1.2 m/s, not 20 m/s."}, {"text": "The wave's speed is 15 m/s, but its frequency cannot be determined without knowing the amplitude.", "isCorrect": false, "rationale": "Speed is 1.2 m/s, not 15 m/s. Frequency (0.4 Hz) can be determined from the given data (crests per time). Amplitude is not needed to calculate frequency, period, or speed."}], "id": "q09"}, {"question": "Which of the following describes the key difference between P-waves (seismic waves) and sound waves, based on their wave type?", "options": [{"text": "P-waves are transverse waves, while sound waves are electromagnetic waves.", "isCorrect": false, "rationale": "P-waves are longitudinal. Sound waves are not electromagnetic; they are mechanical longitudinal waves."}, {"text": "P-waves are longitudinal waves, meaning particles vibrate parallel to the wave direction, similar to sound waves.", "isCorrect": true, "rationale": "The 'Sci-Connection' box states 'P-waves are longitudinal'. The definition of a longitudinal wave is that particles vibrate parallel to the wave's direction, and the text identifies sound waves as the most common example of longitudinal waves."}, {"text": "P-waves are longitudinal waves, but sound waves are transverse waves.", "isCorrect": false, "rationale": "P-waves are longitudinal, but sound waves are also longitudinal, not transverse."}, {"text": "P-waves are transverse waves, and sound waves are also transverse waves.", "isCorrect": false, "rationale": "Both statements are incorrect. P-waves are longitudinal, and sound waves are longitudinal."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
