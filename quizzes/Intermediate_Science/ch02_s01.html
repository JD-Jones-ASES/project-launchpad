<script>
var QUESTIONS = [{"question": "What is a key difference in composition and density between oceanic and continental crust according to the text?", "options": [{"text": "Oceanic crust is thicker and less dense, composed mainly of granite.", "isCorrect": false, "rationale": "This statement is incorrect. The text states oceanic crust is thinner and denser than continental crust, and composed of basalt, not granite."}, {"text": "Continental crust is primarily composed of basalt and is denser than oceanic crust.", "isCorrect": false, "rationale": "This statement is incorrect. The text states continental crust is primarily granite and less dense than oceanic crust, which is basalt."}, {"text": "Oceanic crust is thinner (5–10 km), denser (about 3.0 g/cm³), and made mainly of basalt.", "isCorrect": true, "rationale": "This statement accurately reflects the information in the text: oceanic crust is 5–10 km thick, has an average density of about 3.0 g/cm³, and is composed mainly of basalt."}, {"text": "Continental crust is thinner (5–10 km) and less dense (about 2.7 g/cm³).", "isCorrect": false, "rationale": "This statement is incorrect. Continental crust is thicker (30–70 km), not thinner, although its density (2.7 g/cm³) is correctly stated as less dense than oceanic crust."}]}, {"question": "The mantle, though mostly solid, is described as behaving 'plastically' over long timescales. What does this imply about mantle rock?", "options": [{"text": "It is entirely liquid, allowing for rapid flow like water.", "isCorrect": false, "rationale": "The text explicitly states the mantle is 'mostly solid' and its flow is 'measured in centimeters per year,' indicating it is not entirely liquid or rapidly flowing."}, {"text": "It shatters instantly under any pressure, similar to brittle glass.", "isCorrect": false, "rationale": "The text compares it to silly putty, which 'shatters like a solid' if struck sharply, but 'slowly flows' over time. This option ignores the long-term plastic behavior."}, {"text": "It flows very slowly, even while maintaining a solid structure.", "isCorrect": true, "rationale": "The text explains that despite being mostly solid, the hot rock 'behaves plastically over long timescales,' similar to silly putty that 'slowly flows like a thick liquid,' though at a much slower rate."}, {"text": "It has no rigidity and cannot resist shearing motion, similar to a liquid.", "isCorrect": false, "rationale": "If the mantle had no rigidity, S-waves would not be able to travel through it. S-waves are shear waves and only travel through solids, indicating the mantle has rigidity."}]}, {"question": "Despite extremely high temperatures (exceeding 5,000°C) comparable to the Sun's surface, the inner core remains solid. What is the primary reason for this according to the text?", "options": [{"text": "It is composed of materials with exceptionally high melting points that are unaffected by Earth's internal heat.", "isCorrect": false, "rationale": "While materials have melting points, the text specifies 'pressure' as the key factor, not inherent unaffectedness by heat. The outer core, with similar composition, is liquid due to less pressure."}, {"text": "The immense pressure from overlying layers locks atoms in place, preventing them from flowing.", "isCorrect": true, "rationale": "The text explicitly states: 'The answer is pressure. The weight of all the rock and metal above compresses the iron so intensely that the atoms are locked in place, unable to flow even at extreme temperatures.'"}, {"text": "It is constantly being cooled by convection currents in the liquid outer core.", "isCorrect": false, "rationale": "The text does not mention cooling by the outer core as the reason for its solid state; rather, heat flows outward from the core. The primary reason given is pressure."}, {"text": "Its unique iron-nickel composition is inherently solid at all temperatures found within Earth's core.", "isCorrect": false, "rationale": "This is incorrect because the outer core, also composed of iron and nickel, is liquid. This demonstrates that composition alone doesn't explain the solid state; pressure is the distinguishing factor."}]}, {"question": "Which of the following statements accurately distinguishes between P-waves and S-waves?", "options": [{"text": "P-waves travel only through solids, while S-waves can travel through solids, liquids, and gases.", "isCorrect": false, "rationale": "This is incorrect. P-waves travel through all states of matter, while S-waves travel only through solids."}, {"text": "S-waves are faster than P-waves and cause compression and expansion of material.", "isCorrect": false, "rationale": "This is incorrect. P-waves are the fastest and are compressional; S-waves are slower and are shear waves."}, {"text": "P-waves compress and expand material in the direction of travel, while S-waves shake material perpendicular to travel.", "isCorrect": true, "rationale": "This accurately describes the motion of each wave type as detailed in the text: P-waves 'push and pull material in the same direction the wave moves,' and S-waves 'shake material side to side, perpendicular to the direction of travel.'"}, {"text": "Both P-waves and S-waves stop completely when they encounter a liquid layer.", "isCorrect": false, "rationale": "This is incorrect. P-waves can travel through liquids, although they refract. S-waves are the ones that stop completely in liquids."}]}, {"question": "The existence of an S-wave shadow zone, where no S-waves are detected beyond a certain angle from an earthquake's epicenter, provides the 'single strongest piece of evidence' for which of the following?", "options": [{"text": "The inner core is solid.", "isCorrect": false, "rationale": "While the inner core is solid, the S-wave shadow zone primarily indicates the state of the outer core because S-waves cannot reach the inner core if the outer core is liquid. The solid inner core was inferred from P-wave behavior within the P-wave shadow zone."}, {"text": "The mantle is mostly solid but behaves plastically.", "isCorrect": false, "rationale": "S-waves travel through the mantle, indicating it is solid. The shadow zone occurs because S-waves *stop* when they reach a liquid layer, not because of the mantle's plastic behavior."}, {"text": "The outer core is liquid.", "isCorrect": true, "rationale": "The text explicitly states: 'The explanation is straightforward: the outer core is liquid. When S-waves from an earthquake reach the boundary between the mantle and the outer core, they cannot continue because liquids do not transmit shear waves.'"}, {"text": "Continental crust is less dense than oceanic crust.", "isCorrect": false, "rationale": "This is a correct statement about the crust, but it is unrelated to the S-wave shadow zone, which concerns the deep interior of the Earth."}]}, {"question": "Inge Lehmann proposed the existence of a solid inner core based on what anomalous observation related to seismic waves?", "options": [{"text": "The complete absence of P-waves in the P-wave shadow zone, contrary to expectations.", "isCorrect": false, "rationale": "This is incorrect. The P-wave shadow zone is characterized by an *absence* of direct P-waves, but Lehmann noticed faint P-waves *arriving* in this zone, which was the anomaly."}, {"text": "S-waves arriving in the P-wave shadow zone, indicating a solid medium.", "isCorrect": false, "rationale": "This is incorrect. S-waves cannot pass through the liquid outer core at all, so they would not arrive in any part of the core region."}, {"text": "Faint P-waves arriving in the P-wave shadow zone, suggesting reflection and refraction off a solid inner region.", "isCorrect": true, "rationale": "The text states: 'Lehmann noticed something puzzling: faint P-waves were arriving in the P-wave shadow zone, where no P-waves should have reached.' She proposed that these waves 'would refract through the liquid outer core, but some would also reflect and refract off the solid inner core, redirecting them into the shadow zone.'"}, {"text": "The direct observation of a seismic discontinuity at 5,150 km depth using a borehole.", "isCorrect": false, "rationale": "This is incorrect. Deep boreholes only scratch the surface (12 km), and Lehmann's discovery was based on seismic wave analysis, not direct drilling."}]}, {"question": "The text explains that the density difference between oceanic and continental crust 'matters enormously.' Which phenomenon does this difference directly help explain?", "options": [{"text": "Why continents float higher than ocean floors, resembling wood floating higher than aluminum in water.", "isCorrect": true, "rationale": "The text directly states: 'This difference in density matters enormously — it is one reason why continents float higher than ocean floors, much like a block of wood floats higher in water than a block of aluminum.'"}, {"text": "The generation of Earth's magnetic field by the outer core.", "isCorrect": false, "rationale": "The magnetic field is generated by the flowing liquid outer core, which is unrelated to crustal density differences."}, {"text": "The plastic behavior of the mantle rock over long timescales.", "isCorrect": false, "rationale": "Mantle plasticity is due to high temperatures and pressure, not crustal density differences."}, {"text": "The inability of S-waves to travel through Earth's outer core.", "isCorrect": false, "rationale": "The S-wave shadow zone is due to the liquid state of the outer core, not crustal density."}]}, {"question": "Besides seismic waves, which of the following provides strong evidence for the iron-nickel composition of Earth's core?", "options": [{"text": "The slow, plastic flow observed in the asthenosphere.", "isCorrect": false, "rationale": "The asthenosphere's flow relates to mantle dynamics and plate motion, not the composition of the core."}, {"text": "The existence of Earth's global magnetic field.", "isCorrect": false, "rationale": "While the magnetic field requires an electrically conducting liquid metal, it doesn't specify *iron-nickel* over other potential conductive metals. Meteorites and density provide more direct compositional evidence."}, {"text": "The composition of iron meteorites and the discrepancy between surface rock density and Earth's average density.", "isCorrect": true, "rationale": "The text states: 'Iron meteorites... match what scientists predict for Earth's core,' and 'Earth's average density is about 5.5 g/cm³, but surface rocks average only about 2.7–3.0 g/cm³.' This requires a much denser interior, consistent with an iron-nickel core."}, {"text": "The fact that the inner core is solid despite its extreme temperatures.", "isCorrect": false, "rationale": "This phenomenon is explained by immense pressure, not directly by the specific iron-nickel composition itself, as the outer core is also iron-nickel but liquid."}]}, {"question": "The generation of Earth's magnetic field is attributed to which specific characteristic of a particular layer?", "options": [{"text": "The solid, extremely dense iron and nickel of the inner core.", "isCorrect": false, "rationale": "The inner core is solid, and the text specifies that the magnetic field is generated by *flowing motions* of electrically conducting metal, which requires a liquid state."}, {"text": "The plastic, slowly flowing silicate rocks of the mantle.", "isCorrect": false, "rationale": "The mantle's rock composition is silicate, not electrically conducting metal, and is not responsible for the global magnetic field."}, {"text": "The flowing motions of electrically conducting liquid iron and nickel in the outer core.", "isCorrect": true, "rationale": "The text states: 'The outer core... is composed of liquid iron and nickel... those flowing motions of electrically conducting metal generate Earth's magnetic field.'"}, {"text": "The differential rotation rates between the rigid lithosphere and the asthenosphere.", "isCorrect": false, "rationale": "This relates to plate tectonics but is not identified in the text as the cause of Earth's magnetic field."}]}, {"question": "If Earth's entire core (both outer and inner parts) were solid, what crucial piece of seismic evidence would seismologists likely *not* observe?", "options": [{"text": "P-waves arriving at stations around the world after a major earthquake.", "isCorrect": false, "rationale": "P-waves can travel through solids, so they would still arrive globally, albeit with different refraction patterns."}, {"text": "An S-wave shadow zone.", "isCorrect": true, "rationale": "The S-wave shadow zone exists because S-waves cannot pass through the liquid outer core. If the entire core were solid, S-waves would be able to travel through it, eliminating the distinct S-wave shadow zone."}, {"text": "The refraction of P-waves at the mantle-core boundary.", "isCorrect": false, "rationale": "P-waves would still refract at the boundary due to changes in density and wave speed, even if the core were solid, just in a different pattern than currently observed."}, {"text": "The existence of the Lehmann discontinuity.", "isCorrect": false, "rationale": "The Lehmann discontinuity marks the boundary between the liquid outer core and solid inner core. If the *entire* core were solid, this specific discontinuity as we know it would not exist, but the *absence* of the S-wave shadow zone is a more direct and fundamental consequence of a fully solid core, specifically involving the outer core's state."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
