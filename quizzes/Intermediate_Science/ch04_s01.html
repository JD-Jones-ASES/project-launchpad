<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A passenger is sitting perfectly still in a train moving at a constant velocity. Which of the following statements about their motion is correct?", "options": [{"text": "They are not moving relative to any reference frame.", "isCorrect": false, "rationale": "This is incorrect. While stationary relative to the train, they are in motion relative to the ground or any external reference frame."}, {"text": "They are moving relative to the train seat, but not relative to a person on the platform.", "isCorrect": false, "rationale": "This is incorrect. They are stationary relative to the train seat and moving relative to a person on the platform."}, {"text": "They are moving relative to a person on the platform, but not relative to the train seat.", "isCorrect": true, "rationale": "This statement is correct according to the text's explanation of reference frames. The passenger's position is changing relative to the platform (moving), but not relative to the train seat (stationary)."}, {"text": "Their motion can only be described accurately from an external, stationary reference frame.", "isCorrect": false, "rationale": "This is incorrect. Motion can be described accurately from any chosen reference frame; the description simply changes depending on the frame."}]}, {"question": "If the origin is set at a traffic light, and a car is located at x = -35 m, what does this indicate about the car's position?", "options": [{"text": "The car is 35 m away from the traffic light in the positive direction.", "isCorrect": false, "rationale": "The negative sign explicitly indicates direction in one-dimensional motion, meaning it's in the negative direction, not the positive."}, {"text": "The car is 35 m away from the traffic light in the negative direction.", "isCorrect": true, "rationale": "According to the text, the numerical value (35 m) tells you how far the object is from the origin, and the sign (negative) tells you the direction relative to the chosen positive direction."}, {"text": "The car has traveled a total distance of 35 m.", "isCorrect": false, "rationale": "Position describes where an object is, not necessarily the total distance it has traveled to get there. It could have moved more or less than 35m total."}, {"text": "The car is currently moving at a speed of 35 m/s.", "isCorrect": false, "rationale": "Position (x) is measured in meters and describes location, not speed, which is a rate of motion measured in meters per second."}]}, {"question": "A student walks 50 m north from their dorm to the library, then turns around and walks 30 m south to a coffee shop. What is the total distance the student has traveled?", "options": [{"text": "20 m", "isCorrect": false, "rationale": "20 m represents the magnitude of the student's displacement, not the total distance traveled."}, {"text": "30 m", "isCorrect": false, "rationale": "30 m is only the distance of the second segment of the journey, not the total path length."}, {"text": "50 m", "isCorrect": false, "rationale": "50 m is only the distance of the first segment of the journey, not the total path length."}, {"text": "80 m", "isCorrect": true, "rationale": "Distance is the total length of the path traveled, regardless of direction. The student walked 50 m + 30 m = 80 m."}]}, {"question": "Using the same scenario (student walks 50 m north from dorm to library, then 30 m south to a coffee shop), what is the student's displacement from their starting point (the dorm)? (Assume north is the positive direction).", "options": [{"text": "+20 m", "isCorrect": true, "rationale": "Displacement is the change in position (x_f - x_i). If the dorm is the origin (x_i = 0), walking 50 m north brings the student to +50 m. Walking 30 m south from there means a change of -30 m. So, the final position is +50 m - 30 m = +20 m. Displacement = +20 m - 0 m = +20 m."}, {"text": "-20 m", "isCorrect": false, "rationale": "The displacement is positive because the final position is 20 m north of the starting point, assuming north is the positive direction."}, {"text": "+80 m", "isCorrect": false, "rationale": "80 m is the total distance traveled, not the displacement."}, {"text": "0 m", "isCorrect": false, "rationale": "The displacement would only be 0 m if the student returned to their exact starting point (the dorm)."}]}, {"question": "Which of the following quantities is correctly classified?", "options": [{"text": "Distance: Vector", "isCorrect": false, "rationale": "Distance is a scalar quantity, as it only has magnitude and no direction."}, {"text": "Displacement: Scalar", "isCorrect": false, "rationale": "Displacement is a vector quantity, as it has both magnitude and direction."}, {"text": "Temperature: Vector", "isCorrect": false, "rationale": "Temperature is a scalar quantity, as it only has magnitude."}, {"text": "Mass: Scalar", "isCorrect": true, "rationale": "Mass is a scalar quantity, possessing only magnitude (e.g., 5 kg) without an associated direction."}]}, {"question": "Under what condition will an object's distance traveled be equal to the magnitude of its displacement?", "options": [{"text": "When the object moves in a circular path.", "isCorrect": false, "rationale": "In a circular path, the distance traveled is the arc length, which is always greater than the magnitude of displacement (unless it's a very short segment of the circle approaching a straight line, but not for typical circular motion)."}, {"text": "When the object returns to its starting point.", "isCorrect": false, "rationale": "If an object returns to its starting point, its displacement is zero, while its distance traveled will be greater than zero."}, {"text": "When the object moves in a straight line without changing direction.", "isCorrect": true, "rationale": "The text implies this relationship; if an object moves in a straight line in one continuous direction, its total path length (distance) is exactly the straight-line change from start to end (magnitude of displacement)."}, {"text": "When the object accelerates uniformly.", "isCorrect": false, "rationale": "Uniform acceleration describes how velocity changes, but it doesn't directly determine the relationship between distance and displacement. An object can accelerate while changing direction, in which case distance and displacement magnitude would differ."}]}, {"question": "On a position-time (x-t) graph, what does a horizontal line segment indicate about the object's motion?", "options": [{"text": "The object is moving at a constant speed in the positive direction.", "isCorrect": false, "rationale": "A straight line sloping upward indicates constant speed in the positive direction."}, {"text": "The object is accelerating.", "isCorrect": false, "rationale": "A curved line on a position-time graph indicates acceleration (changing speed)."}, {"text": "The object is stationary.", "isCorrect": true, "rationale": "The text explicitly states that 'A horizontal line means the object is stationary — its position is not changing.'"}, {"text": "The object is moving in the negative direction.", "isCorrect": false, "rationale": "A straight line sloping downward indicates motion in the negative direction."}]}, {"question": "Consider two objects represented on the same position-time graph. Object A's line is less steep than Object B's line. What can be concluded about their motion?", "options": [{"text": "Object A has a greater displacement than Object B.", "isCorrect": false, "rationale": "The steepness of the line indicates speed, not necessarily total displacement, which depends on the start and end positions over the time interval."}, {"text": "Object A is moving faster than Object B.", "isCorrect": false, "rationale": "The text states, 'A steeper line means the object is moving faster.' Therefore, a less steep line means slower motion."}, {"text": "Object B is moving faster than Object A.", "isCorrect": true, "rationale": "As per the text, a steeper line on a position-time graph indicates a faster speed. Since Object B's line is steeper, it is moving faster than Object A."}, {"text": "Both objects are stationary.", "isCorrect": false, "rationale": "Both lines are sloped (not horizontal), indicating that both objects are in motion, not stationary."}]}, {"question": "A position-time graph shows a straight line segment sloping downwards. What does this indicate about the object's motion?", "options": [{"text": "The object is at rest.", "isCorrect": false, "rationale": "A horizontal line segment on an x-t graph indicates an object at rest."}, {"text": "The object is moving in the positive direction.", "isCorrect": false, "rationale": "A straight line sloping upward indicates motion in the positive direction."}, {"text": "The object is moving in the negative direction at a constant rate.", "isCorrect": true, "rationale": "The text explicitly states, 'A straight line sloping downward means the object is moving in the negative direction at a constant rate.'"}, {"text": "The object is slowing down.", "isCorrect": false, "rationale": "A curved line (specifically, one whose slope is decreasing in magnitude) would indicate slowing down or acceleration. A straight line indicates constant rate."}]}, {"question": "When a GPS navigation app calculates 'driving distance' versus 'as the crow flies' distance for a trip, which physics concepts are being compared?", "options": [{"text": "Speed and velocity.", "isCorrect": false, "rationale": "Speed and velocity refer to rates of motion. While related to a journey, they are not the direct comparison made between total path and straight-line distance."}, {"text": "Position and reference frame.", "isCorrect": false, "rationale": "Position and reference frame are fundamental to describing motion, but the specific comparison of 'driving distance' and 'as the crow flies' directly relates to the definitions of distance and displacement."}, {"text": "Distance and displacement.", "isCorrect": true, "rationale": "The 'SciConnection' box explicitly states that 'driving distance' represents the total path length (distance), while 'as the crow flies' distance represents the magnitude of the displacement (straight-line from start to finish)."}, {"text": "Acceleration and force.", "isCorrect": false, "rationale": "Acceleration (change in velocity) and force are different physical concepts not directly represented by these two types of distance measurements."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
