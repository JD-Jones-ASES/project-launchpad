    <div id="score-box" class="score-box">

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "Which of the following scenarios would successfully induce a voltage in a coil of wire, according to Faraday's law of induction?", "options": [{"text": "A stationary magnet placed inside a stationary coil of wire.", "isCorrect": false, "rationale": "A steady magnetic field, regardless of its strength or proximity, does not induce a voltage. The key is change."}, {"text": "A coil of wire rapidly rotating within a uniform, steady magnetic field.", "isCorrect": true, "rationale": "Rotating the coil causes the magnetic field passing through it to continuously change (increasing, decreasing, reversing), which is the fundamental condition for inducing a voltage as per Faraday's law."}, {"text": "A direct current (DC) flowing steadily through a primary coil next to a secondary coil.", "isCorrect": false, "rationale": "A direct current produces a steady magnetic field. A steady field, even if strong, does not induce a voltage in a nearby coil. Only a changing current (and thus a changing magnetic field) will induce a voltage."}, {"text": "A strong, permanent magnet held motionless directly above a copper plate.", "isCorrect": false, "rationale": "Similar to option A, a stationary magnet interacting with a stationary conductor (even a plate) will not induce a voltage because there is no change in the magnetic field passing through the conductor."}], "id": "q01"}, {"question": "According to Lenz's law, if you rapidly pull the north pole of a strong bar magnet out of a coil of wire, what will be the magnetic polarity of the coil's end closest to the retreating magnet?", "options": [{"text": "North pole, attracting the magnet and opposing its motion.", "isCorrect": false, "rationale": "Lenz's law states that the induced current's magnetic field opposes the change that produced it. If a north pole is pulled out, the coil's end should try to 'hold onto' it, meaning it would become a south pole to attract the north pole, not repel it."}, {"text": "North pole, repelling the magnet and aiding its motion.", "isCorrect": false, "rationale": "This scenario would imply the induced field aids the change, which violates Lenz's law and the conservation of energy. It would also mean generating energy from nothing."}, {"text": "South pole, attracting the magnet and opposing its motion.", "isCorrect": true, "rationale": "If a north pole is being pulled out, the coil's induced magnetic field will oppose this change by creating a south pole at the end closest to the magnet. This south pole will attract the retreating north pole, thus opposing its motion and requiring work to pull the magnet away."}, {"text": "South pole, repelling the magnet and aiding its motion.", "isCorrect": false, "rationale": "A south pole would attract a north pole, not repel it. Furthermore, aiding the motion of the magnet would violate the conservation of energy."}], "id": "q02"}, {"question": "A scientist wants to maximize the voltage induced in a coil of wire using electromagnetic induction. Which combination of actions would most effectively achieve this goal?", "options": [{"text": "Use a weaker magnet, fewer turns of wire, and move the magnet slowly.", "isCorrect": false, "rationale": "These actions would all lead to a *smaller* induced voltage, as they reduce the magnetic field strength, the number of turns, and the speed of change, respectively."}, {"text": "Use a stronger magnet, fewer turns of wire, and move the magnet slowly.", "isCorrect": false, "rationale": "While a stronger magnet helps, fewer turns and slower movement would counteract this benefit, resulting in a lower overall induced voltage than optimal."}, {"text": "Use a stronger magnet, more turns of wire, and move the magnet rapidly.", "isCorrect": true, "rationale": "According to Faraday's law, the induced voltage is proportional to the strength of the magnetic field, the number of turns in the coil, and the speed of the change in the magnetic field. Maximizing all three factors will maximize the induced voltage."}, {"text": "Use a weaker magnet, more turns of wire, and move the magnet rapidly.", "isCorrect": false, "rationale": "While more turns and rapid movement increase voltage, using a weaker magnet would reduce the overall induced voltage compared to using a strong magnet."}], "id": "q03"}, {"question": "A transformer has a primary coil with 800 turns and a secondary coil with 50 turns. If the primary voltage is 240 V AC, what is the output voltage from the secondary coil?", "options": [{"text": "3.33 V", "isCorrect": false, "rationale": "This calculation is incorrect. The turns ratio indicates a step-down transformer."}, {"text": "15 V", "isCorrect": true, "rationale": "Using the transformer equation V_s = V_p * (N_s / N_p), V_s = 240 V * (50 / 800) = 240 V * 0.0625 = 15 V. This is a step-down transformer, as expected since N_s < N_p."}, {"text": "3840 V", "isCorrect": false, "rationale": "This would be the result if it were a step-up transformer with the N_p and N_s swapped or if the formula was applied incorrectly as V_s = V_p * (N_p / N_s)."}, {"text": "19200 V", "isCorrect": false, "rationale": "This calculation is incorrect and suggests a large step-up in voltage, which is not the case here."}], "id": "q04"}, {"question": "An ideal step-up transformer is used to double the voltage from its primary coil to its secondary coil. If the primary current is 10 A, what will be the current in the secondary coil?", "options": [{"text": "20 A", "isCorrect": false, "rationale": "An ideal transformer conserves power (P = IV). If voltage doubles, current must halve to keep power constant. This option suggests current also doubles, which would mean power quadruples, violating conservation of energy."}, {"text": "10 A", "isCorrect": false, "rationale": "If current remained the same while voltage doubled, power would also double, violating the conservation of energy in an ideal transformer."}, {"text": "5 A", "isCorrect": true, "rationale": "For an ideal transformer, power is conserved (P_p = P_s, or V_p I_p = V_s I_s). If the voltage is doubled (V_s = 2V_p), then the current must be halved to maintain the power balance (I_s = I_p / 2). So, 10 A / 2 = 5 A."}, {"text": "2.5 A", "isCorrect": false, "rationale": "This would mean the voltage quadrupled, not doubled, or there was a loss of power not accounted for in an 'ideal' transformer."}], "id": "q05"}, {"question": "Why are transformers ineffective for changing the voltage of a direct current (DC) supply?", "options": [{"text": "DC has a constant current, which damages the transformer's coils.", "isCorrect": false, "rationale": "While a constant current can lead to heat, the primary reason for ineffectiveness isn't damage, but the lack of induction. Transformers are designed for AC."}, {"text": "Transformers require a changing magnetic field to induce a voltage, and DC produces a steady magnetic field.", "isCorrect": true, "rationale": "Electromagnetic induction, the principle transformers operate on, requires a *changing* magnetic field. Direct current (DC) produces a steady magnetic field, which does not induce a voltage in the secondary coil."}, {"text": "DC voltage is inherently too low for transformers to step up or down effectively.", "isCorrect": false, "rationale": "The magnitude of DC voltage is irrelevant to the principle of operation; transformers fundamentally cannot work with *any* steady DC voltage because it doesn't create a changing magnetic flux."}, {"text": "The iron core in a transformer only works with alternating magnetic fields.", "isCorrect": false, "rationale": "The iron core can transmit a steady magnetic field; the issue is that a steady field itself (regardless of the core material) doesn't induce voltage."}], "id": "q06"}, {"question": "Which of the following describes the primary energy conversion performed by an electrical generator?", "options": [{"text": "Electrical energy into mechanical energy.", "isCorrect": false, "rationale": "This describes the function of an electric motor, not a generator."}, {"text": "Chemical energy into electrical energy.", "isCorrect": false, "rationale": "This describes the function of a battery or fuel cell."}, {"text": "Thermal energy into electrical energy.", "isCorrect": false, "rationale": "While heat often *drives* the mechanical process (e.g., steam turbines), the direct conversion within the generator itself is from mechanical to electrical."}, {"text": "Mechanical energy into electrical energy.", "isCorrect": true, "rationale": "A generator works by rotating a coil in a magnetic field (or vice versa), which is mechanical energy. This rotation causes a changing magnetic field, inducing a voltage and producing electrical energy. This is a direct application of Faraday's law."}], "id": "q07"}, {"question": "A power plant generates 100 MW of power. If this power is transmitted at 10,000 V over lines with a total resistance of 5 Ω, and then again transmitted at 500,000 V over the same lines, how does increasing the voltage affect power loss due to heat?", "options": [{"text": "Increasing the voltage by 50 times decreases power loss by a factor of 50.", "isCorrect": false, "rationale": "Power loss is proportional to the *square* of the current (P_lost = I^2R). If current decreases by a factor of 50, power loss decreases by 50^2."}, {"text": "Increasing the voltage by 50 times decreases power loss by a factor of 2500.", "isCorrect": true, "rationale": "When voltage increases by a factor of 50 (from 10,000 V to 500,000 V) for the same power, the current decreases by a factor of 50 (since P=IV). Power loss is given by P_lost = I^2R. Therefore, if current (I) decreases by a factor of 50, the power loss (I^2R) decreases by a factor of 50^2, which is 2500."}, {"text": "Increasing the voltage has no effect on power loss because power is conserved.", "isCorrect": false, "rationale": "While total power generated is conserved (ideally), power *lost* due to resistance in the transmission lines is definitely affected by the current and is a key reason for using high-voltage transmission. The P=IV relationship refers to the power delivered, while P_lost=I^2R refers to power dissipated as heat in the wires."}, {"text": "Increasing the voltage increases power loss due to higher potential difference.", "isCorrect": false, "rationale": "Higher voltage transmission is specifically designed to *reduce* power loss by reducing the current, as seen in the formula P_lost = I^2R."}], "id": "q08"}, {"question": "Which statement best summarizes the fundamental principle demonstrated by both Faraday's Law and Lenz's Law regarding electromagnetic induction?", "options": [{"text": "A steady magnetic field can generate a continuous electric current if the conductor is highly efficient.", "isCorrect": false, "rationale": "This contradicts Faraday's Law, which explicitly states that only a *changing* magnetic field generates a voltage."}, {"text": "Electrical energy can be created from nothing, provided there is a strong enough magnetic field.", "isCorrect": false, "rationale": "This violates the conservation of energy, which Lenz's Law explicitly upholds by ensuring induced currents oppose the change that produces them, requiring work input."}, {"text": "A changing magnetic field induces a voltage in a conductor, and the resulting induced current creates a magnetic field that opposes the original change, requiring work to sustain the induction.", "isCorrect": true, "rationale": "This statement accurately combines both laws: Faraday's Law describes the induction of voltage due to a changing field, and Lenz's Law describes the direction of the induced current's field as opposing the change, thereby enforcing the conservation of energy by requiring work input."}, {"text": "The strength of an induced voltage is solely determined by the speed of the magnetic field's change, regardless of coil turns or field strength.", "isCorrect": false, "rationale": "This is incomplete; Faraday's Law also states that the induced voltage depends on the strength of the magnetic field and the number of turns in the coil."}], "id": "q09"}, {"question": "Imagine you are designing a wireless charger. Based on the principles of electromagnetic induction, what is a crucial element required for the charging pad to transfer energy to a device?", "options": [{"text": "A steady direct current (DC) flowing through the charging pad's coil to create a constant magnetic field.", "isCorrect": false, "rationale": "A steady DC creates a constant magnetic field, which will not induce a voltage in the receiving coil of the device. Electromagnetic induction requires a *changing* magnetic field."}, {"text": "A strong permanent magnet embedded in the charging pad, allowing for passive energy transfer.", "isCorrect": false, "rationale": "A strong, stationary permanent magnet will produce a steady magnetic field, which does not induce a voltage. Movement or change is necessary for induction."}, {"text": "An alternating current (AC) flowing through the charging pad's coil to create a continuously changing magnetic field.", "isCorrect": true, "rationale": "An alternating current (AC) in the charging pad's coil will create a continuously changing magnetic field. This changing field will then pass through the coil in the device, inducing an alternating voltage and current, thereby charging the device. This is the operational principle of wireless chargers, which are a form of transformer."}, {"text": "A direct connection of wires from the charging pad to the device for energy transfer.", "isCorrect": false, "rationale": "This describes traditional wired charging, not 'wireless' charging, which relies on electromagnetic induction over a small distance without physical contact."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
