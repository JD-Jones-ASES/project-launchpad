    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 20, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The central unifying theme that connects biology, Earth science, chemistry, and physics, as presented in this section, is:", "options": [{"text": "The conservation of energy in all systems.", "isCorrect": false, "rationale": "While energy conservation is a fundamental scientific principle, the text specifically identifies 'information transfer' as the unifying theme connecting these branches of science."}, {"text": "The concept of information transfer.", "isCorrect": true, "rationale": "The text explicitly states: 'The key insight of this review is that the concept of information transfer is a unifying theme that connects biology, Earth science, chemistry, and physics.'"}, {"text": "The study of matter and its interactions.", "isCorrect": false, "rationale": "The study of matter and its interactions is broad and foundational, but the text emphasizes the flow and processing of 'information' as the core connection across disciplines."}, {"text": "The use of mathematical models in scientific inquiry.", "isCorrect": false, "rationale": "Mathematical models are used across sciences, but the focus of this section is on the underlying concept of how information itself is encoded, transmitted, and decoded, not just the tools used to study it."}]}, {"question": "During the flow of genetic information, if a mutation occurs that changes a single base in a DNA sequence, what is the most direct and immediate consequence described in the text?", "options": [{"text": "The organism's physical traits will immediately change.", "isCorrect": false, "rationale": "While a mutation can eventually affect traits, the text describes a chain of molecular events: 'a change in even a single base — can alter the codon, change the amino acid, and potentially change the protein's function.' The change in physical traits is a downstream effect, not the most direct consequence."}, {"text": "A different mRNA codon will be formed during transcription.", "isCorrect": true, "rationale": "The text states: 'A mutation — a change in even a single base — can alter the codon, change the amino acid, and potentially change the protein's function.' A change in the DNA base directly leads to an altered codon in the mRNA during transcription."}, {"text": "The protein formed during translation will be completely non-functional.", "isCorrect": false, "rationale": "The text says a mutation can 'potentially change the protein's function,' implying it might be altered, reduced, or sometimes even remain unaffected, not necessarily 'completely non-functional.'"}, {"text": "The DNA molecule will cease to replicate.", "isCorrect": false, "rationale": "A single base mutation does not typically cause the entire DNA molecule to stop replicating. It affects the information encoded at that specific site."}]}, {"question": "Which of the following correctly represents the flow of genetic information at the molecular level, as described in the text?", "options": [{"text": "Protein → mRNA → DNA", "isCorrect": false, "rationale": "This sequence is reversed; proteins are the end product of genetic information flow, not the starting point for information storage in this context."}, {"text": "mRNA → DNA → Protein", "isCorrect": false, "rationale": "This sequence incorrectly places mRNA before DNA and then reverses the transcription step."}, {"text": "DNA → mRNA → Protein", "isCorrect": true, "rationale": "The text explicitly states: 'DNA transcription mRNA translation Protein', which accurately describes the central dogma of molecular biology."}, {"text": "DNA → Protein → mRNA", "isCorrect": false, "rationale": "This sequence incorrectly skips the mRNA intermediate step and places protein formation before mRNA."}]}, {"question": "Seismologists deduced that Earth has a liquid outer core based on which observation?", "options": [{"text": "The consistent speed of P-waves through Earth's interior.", "isCorrect": false, "rationale": "While P-waves travel through liquids, their consistent speed alone wouldn't indicate a liquid outer core as clearly as the S-wave behavior."}, {"text": "The reflection of both P-waves and S-waves off the core-mantle boundary.", "isCorrect": false, "rationale": "The text focuses on the *disappearance* of S-waves, not their reflection, to infer the liquid outer core."}, {"text": "The disappearance of S-waves in a shadow zone on the far side of the Earth from an earthquake.", "isCorrect": true, "rationale": "The text states: 'When seismologists noticed that S-waves disappear in a shadow zone on the far side of the Earth from an earthquake, they concluded that Earth has a liquid outer core,' because S-waves cannot pass through liquids."}, {"text": "The analysis of the frequency and wavelength of ocean waves.", "isCorrect": false, "rationale": "Ocean wave analysis provides information about surface phenomena and seafloor mapping, but not about Earth's interior structure."}]}, {"question": "Ocean waves carry various types of information for oceanographers. Which of the following is NOT explicitly mentioned in the text as information derived from ocean waves?", "options": [{"text": "Distant storm activity.", "isCorrect": false, "rationale": "The text states: 'The frequency, wavelength, and direction of ocean waves tell oceanographers about distant storms...'"}, {"text": "The shape of the seafloor.", "isCorrect": false, "rationale": "The text mentions 'sonar — sending sound pulses through water and timing their echoes — was used by Marie Tharp (Unit 17) to map the ocean floor,' which is a way ocean waves (sound waves) carry information about the seafloor shape."}, {"text": "The water temperature at different depths.", "isCorrect": true, "rationale": "The text mentions frequency, wavelength, direction (for storms and wind patterns), and echo timing (for seafloor mapping), but does not mention water temperature at different depths as information derived from ocean waves themselves."}, {"text": "Wind patterns.", "isCorrect": false, "rationale": "The text states: 'The frequency, wavelength, and direction of ocean waves tell oceanographers about... wind patterns...'"}]}, {"question": "Consider the balanced chemical equation $2H_2 + O_2 \rightarrow 2H_2O$. Which piece of information CANNOT be directly inferred from this equation alone, according to the text?", "options": [{"text": "The types of substances reacting and forming.", "isCorrect": false, "rationale": "The equation clearly shows H2 and O2 reacting to form H2O, identifying the substances involved."}, {"text": "The total energy absorbed or released by the reaction.", "isCorrect": true, "rationale": "While a chemist can 'determine whether the reaction releases or absorbs energy' from an equation, this implies additional knowledge or calculation (e.g., using enthalpy of formation), not direct inference from the symbols and coefficients shown in this simple form. The text highlights what the line 'tells you' directly, and energy change isn't listed among them."}, {"text": "The ratio in which reactants combine and products form.", "isCorrect": false, "rationale": "The coefficients (2, 1, 2) directly indicate the molar ratios of reactants and products."}, {"text": "The conservation of atoms during the reaction.", "isCorrect": false, "rationale": "The text explicitly states: 'Conservation of mass: four hydrogen atoms and two oxygen atoms appear on both sides,' demonstrating atom conservation."}]}, {"question": "Lavoisier's significant contribution, as mentioned in the context of chemical equations, was:", "options": [{"text": "Developing the atomic theory of matter.", "isCorrect": false, "rationale": "John Dalton is credited with developing the modern atomic theory, not Lavoisier, though Lavoisier's work laid groundwork."}, {"text": "Establishing that matter is conserved in chemical reactions.", "isCorrect": true, "rationale": "The text explicitly states: 'Lavoisier's great contribution (Unit 18) was establishing that matter is conserved in chemical reactions.'"}, {"text": "Discovering the elements hydrogen and oxygen.", "isCorrect": false, "rationale": "While Lavoisier named oxygen and hydrogen, his 'great contribution' highlighted in the text regarding equations is the conservation of mass."}, {"text": "Creating the periodic table of elements.", "isCorrect": false, "rationale": "Dmitri Mendeleev is credited with creating the periodic table."}]}, {"question": "In AM (amplitude modulation) radio broadcasting, how is sound information encoded onto the carrier wave?", "options": [{"text": "By varying the frequency of the carrier wave.", "isCorrect": false, "rationale": "Varying the frequency describes FM (frequency modulation) radio, not AM radio."}, {"text": "By varying the amplitude of the carrier wave.", "isCorrect": true, "rationale": "The text clearly states: 'In AM (amplitude modulation) radio, the amplitude of the carrier wave is varied to match the sound signal.'"}, {"text": "By changing the wavelength of the carrier wave.", "isCorrect": false, "rationale": "While frequency and wavelength are related, the text specifically identifies amplitude as the modulated property for AM radio."}, {"text": "By altering the speed of the carrier wave.", "isCorrect": false, "rationale": "Electromagnetic waves (like radio waves) travel at a constant speed in a given medium (the speed of light in a vacuum/air); their speed is not altered to encode information."}]}, {"question": "An astronomer observes light from a distant galaxy and notes a significant redshift. This observation allows the astronomer to deduce information about:", "options": [{"text": "The element composition of the galaxy.", "isCorrect": false, "rationale": "While spectral lines can indicate elemental composition, redshift specifically refers to the shift in wavelength, which tells about motion, not just composition."}, {"text": "The galaxy's temperature.", "isCorrect": false, "rationale": "A galaxy's temperature might be inferred from its overall light spectrum, but redshift specifically indicates relative motion."}, {"text": "How fast the galaxy is moving away from Earth.", "isCorrect": true, "rationale": "The text states: 'When astronomers observe redshifted light from a distant galaxy, the shift in wavelength tells them how fast the galaxy is moving away from Earth (the Doppler effect).'"}, {"text": "The galaxy's mass and gravitational pull.", "isCorrect": false, "rationale": "A galaxy's mass and gravitational pull are inferred through other observations (e.g., stellar orbits, gravitational lensing), not directly from redshift."}]}, {"question": "Imagine a weather satellite sending images of cloud formations back to Earth. Which part of the universal information transfer pattern (encoding, transmission, decoding) does the satellite's conversion of raw light observations into digital data represent?", "options": [{"text": "Transmission, because it's sending data.", "isCorrect": false, "rationale": "Transmission is the act of sending the encoded data through a carrier (e.g., radio waves). The conversion itself is not transmission."}, {"text": "Decoding, as it interprets visual information.", "isCorrect": false, "rationale": "Decoding happens at the receiver (e.g., Earth station) when the structured form is converted back into a usable format. The satellite is creating the structured form."}, {"text": "Encoding, as it converts observations into a structured form.", "isCorrect": true, "rationale": "The text defines encoding as 'something is encoded into a structured form.' Converting raw light into digital data (a structured, standardized format) is precisely this step."}, {"text": "Carrier, as it's the medium for information.", "isCorrect": false, "rationale": "The carrier is the medium (e.g., electromagnetic waves) that transmits the encoded information. The conversion process is not the medium itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
