    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 23, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is NOT a characteristic property of an acid?", "options": [{"text": "Has a sour taste.", "isCorrect": false, "rationale": "The text states, 'Acids have a sour taste.'"}, {"text": "Feels slippery to the touch.", "isCorrect": true, "rationale": "The text states that bases 'feel slippery.' Acids do not have this property."}, {"text": "Turns blue litmus paper red.", "isCorrect": false, "rationale": "The text states, 'Acids...turn blue litmus paper red.'"}, {"text": "Reacts with metals to produce hydrogen gas.", "isCorrect": false, "rationale": "The text states, 'Acids...react with metals to produce hydrogen gas.'"}]}, {"question": "A solution has a pH of 3. If its hydrogen ion concentration is decreased by a factor of 100, what will be its new pH?", "options": [{"text": "1", "isCorrect": false, "rationale": "Decreasing H+ concentration by a factor of 100 would increase the pH by 2, not decrease it."}, {"text": "5", "isCorrect": true, "rationale": "The pH scale is logarithmic, where each whole number represents a tenfold change in H+ concentration. Decreasing H+ concentration by a factor of 100 (10 x 10) means the pH increases by 2 units. So, 3 + 2 = 5."}, {"text": "7", "isCorrect": false, "rationale": "A pH of 7 is neutral, which would require a decrease in H+ concentration by a factor of 1000 from pH 3."}, {"text": "13", "isCorrect": false, "rationale": "A pH of 13 is highly basic, requiring a much larger decrease in H+ concentration than described."}]}, {"question": "What is the primary difference between a strong acid and a weak acid, according to the provided text?", "options": [{"text": "Strong acids have a lower pH than weak acids of the same concentration.", "isCorrect": false, "rationale": "While generally true, the text's primary distinction is not pH level itself but the degree of dissociation."}, {"text": "Strong acids completely dissociate into ions in water, while weak acids only partially dissociate.", "isCorrect": true, "rationale": "The text explicitly states, 'A strong acid completely dissociates... A weak acid only partially dissociates.'"}, {"text": "Strong acids are more dangerous to handle than weak acids.", "isCorrect": false, "rationale": "While often true, 'danger' is not the scientific definition provided for distinguishing strong from weak acids; dissociation is."}, {"text": "Strong acids react faster with bases than weak acids do.", "isCorrect": false, "rationale": "Reaction speed is a kinetic property, not the defining characteristic for strength based on the provided text."}]}, {"question": "A student tests an unknown solution with phenolphthalein and observes no color change. When red litmus paper is dipped into the solution, it turns blue. What can be concluded about the unknown solution?", "options": [{"text": "It is a strong acid.", "isCorrect": false, "rationale": "If it were an acid, red litmus would stay red or blue litmus would turn red. A base turns red litmus blue."}, {"text": "It is a neutral solution.", "isCorrect": false, "rationale": "A neutral solution would not turn red litmus blue. It would have no effect on either red or blue litmus."}, {"text": "It is a base with a pH greater than 8.2.", "isCorrect": false, "rationale": "Phenolphthalein turns pink/magenta in basic solutions with pH > 8.2. No color change indicates a pH of 8.2 or less. Since red litmus turned blue, it must be a base, but its pH cannot be > 8.2."}, {"text": "It is a base with a pH less than or equal to 8.2.", "isCorrect": true, "rationale": "Red litmus turning blue confirms it is a base. Phenolphthalein remaining colorless means its pH is not above 8.2, which is the threshold for phenolphthalein to turn pink/magenta. Therefore, it is a base with pH ≤ 8.2."}]}, {"question": "When hydrochloric acid (HCl) reacts with sodium hydroxide (NaOH) in a neutralization reaction, what are the primary products?", "options": [{"text": "Sodium chloride and hydrogen gas.", "isCorrect": false, "rationale": "Hydrogen gas is produced when acids react with metals, not typically in an acid-base neutralization reaction."}, {"text": "Sodium hydroxide and water.", "isCorrect": false, "rationale": "Sodium hydroxide is a reactant, not a product, in this neutralization reaction."}, {"text": "Sodium chloride and water.", "isCorrect": true, "rationale": "The text states, 'acid + base -> salt + water' and gives the specific example: 'HCl(aq) + NaOH(aq) -> NaCl(aq) + H2O(l).' NaCl is the salt, and H2O is water."}, {"text": "Hydrogen ions and hydroxide ions.", "isCorrect": false, "rationale": "These are the ions that combine to form water in the reaction, but they are not the final macroscopic products of the overall neutralization."}]}, {"question": "According to the Arrhenius definition, what defines a base?", "options": [{"text": "A substance that accepts hydrogen ions (H+).", "isCorrect": false, "rationale": "This is the Brønsted-Lowry definition of a base, which is not discussed in the provided text."}, {"text": "A substance that produces hydrogen ions (H+) when dissolved in water.", "isCorrect": false, "rationale": "This is the Arrhenius definition of an acid, not a base."}, {"text": "A substance that increases the concentration of hydroxide ions (OH-) in solution.", "isCorrect": true, "rationale": "The text states, 'Base: A substance that produces hydroxide ions (OH-) when dissolved in water. According to the Arrhenius definition, bases increase the concentration of OH- ions in solution.'"}, {"text": "A substance that turns blue litmus paper red.", "isCorrect": false, "rationale": "This describes an observable property of an acid, not the Arrhenius definition of a base."}]}, {"question": "A person experiencing heartburn takes an antacid tablet. Based on the 'Biology Connection' section, how does the antacid provide relief?", "options": [{"text": "It increases the production of stomach mucus.", "isCorrect": false, "rationale": "The text mentions mucus protects the stomach lining, but antacids work through a different mechanism."}, {"text": "It neutralizes excess stomach acid through a reaction producing salt and water.", "isCorrect": true, "rationale": "The text explicitly states, 'antacid tablets contain a base... that neutralizes excess stomach acid (HCl), relieving heartburn' and 'base meets acid, producing salt and water.'"}, {"text": "It raises the blood pH to a more stable level of 7.4.", "isCorrect": false, "rationale": "Antacids act on stomach acid, not directly on blood pH, which is regulated by buffer systems."}, {"text": "It completely dissociates stomach acid, making it less harmful.", "isCorrect": false, "rationale": "Antacids neutralize acid by reacting with it, rather than causing it to simply dissociate. Stomach acid is already a strong acid that dissociates."}]}, {"question": "A chemist finds an unknown solution that makes red litmus paper turn blue and feels slippery. Which of the following statements about this solution is most likely true based on its observed properties?", "options": [{"text": "It contains a high concentration of H+ ions.", "isCorrect": false, "rationale": "The observed properties (red litmus to blue, slippery feel) are characteristic of a base, which has a low concentration of H+ ions and a high concentration of OH- ions."}, {"text": "It would react with metals to produce hydrogen gas.", "isCorrect": false, "rationale": "Acids react with metals to produce hydrogen gas; bases generally do not."}, {"text": "It has a pH value greater than 7.", "isCorrect": true, "rationale": "The properties described (red litmus turns blue, feels slippery) are characteristic of a base. The text states that 'values above 7 are basic (alkaline).'"}, {"text": "It is likely to have a sour taste.", "isCorrect": false, "rationale": "Sour taste is a characteristic of acids, not bases. Bases typically have a bitter taste."}]}, {"question": "The pH of human stomach acid is typically around 1-2. If a solution has a pH of 1, how much greater is its hydrogen ion concentration compared to a solution with a pH of 4?", "options": [{"text": "3 times greater", "isCorrect": false, "rationale": "The pH scale is logarithmic, not linear. A difference of 1 pH unit is a tenfold change in H+ concentration."}, {"text": "10 times greater", "isCorrect": false, "rationale": "This would be the difference between pH 1 and pH 2 (or pH 3 and pH 4)."}, {"text": "100 times greater", "isCorrect": false, "rationale": "This would be the difference between pH 1 and pH 3 (or pH 2 and pH 4)."}, {"text": "1000 times greater", "isCorrect": true, "rationale": "The text states, 'Each whole number on the pH scale represents a tenfold change in hydrogen ion concentration.' A pH difference of 3 (from pH 4 to pH 1) means the H+ concentration is 10 x 10 x 10 = 1000 times greater."}]}, {"question": "You are given a colorless liquid. You dip blue litmus paper into it, and it turns red. You then add a few drops of phenolphthalein, and it remains colorless. Finally, you drop a small piece of magnesium metal into a separate sample, and you observe fizzing. What type of substance is this liquid?", "options": [{"text": "A strong base.", "isCorrect": false, "rationale": "A base would turn red litmus blue (not blue litmus red), and would not react with metal to produce fizzing (hydrogen gas)."}, {"text": "A weak base.", "isCorrect": false, "rationale": "Similar to a strong base, a weak base would not exhibit the observed properties of turning blue litmus red or reacting with metal to produce hydrogen gas."}, {"text": "A strong acid.", "isCorrect": true, "rationale": "Blue litmus turning red indicates an acid. Phenolphthalein remaining colorless is consistent with an acid. Fizzing upon adding metal indicates a reaction producing hydrogen gas, which is a characteristic of acids. The combination of all these properties strongly points to an acid, and 'strong acid' is a plausible classification given the reactive properties described."}, {"text": "A neutral solution.", "isCorrect": false, "rationale": "A neutral solution would not change litmus color, react with metal to produce gas, or cause phenolphthalein to change color from colorless."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
