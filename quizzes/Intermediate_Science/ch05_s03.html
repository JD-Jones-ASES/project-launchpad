<div class="quiz-container">

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 5, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of Chapter 5, Section 3: Vocabulary Review?", "options": [{"text": "To introduce new vocabulary terms for an upcoming unit.", "isCorrect": false, "rationale": "The section explicitly states it 'collects the key vocabulary terms from all four units in Cycle 1' and is to be used 'as a study guide and self-check,' indicating a review, not an introduction."}, {"text": "To provide a consolidated study guide and self-check for key vocabulary terms from Cycle 1.", "isCorrect": true, "rationale": "The section's introductory paragraph clearly states its function: 'Use it as a study guide and self-check' for 'key vocabulary terms from all four units in Cycle 1.'"}, {"text": "To test students on their knowledge of specific definitions from Unit 3.", "isCorrect": false, "rationale": "While Unit 3 is covered, the section is a 'study guide and self-check' for all four units of Cycle 1, not a test, and not limited to just Unit 3."}, {"text": "To summarize the main concepts of Chapter 5 for students.", "isCorrect": false, "rationale": "The review section is located in Chapter 5, but it covers vocabulary from 'all four units in Cycle 1,' which extend beyond the content of a single chapter."}]}, {"question": "How many distinct scientific branches are covered in the 'Vocabulary Review' section for Cycle 1?", "options": [{"text": "Two: Life Science and Earth Science.", "isCorrect": false, "rationale": "The section lists four branches: Life Science, Earth Science, Chemistry, and Physics, not just two."}, {"text": "Three: Life Science, Chemistry, and Physics.", "isCorrect": false, "rationale": "The section lists four branches, and Earth Science is omitted in this option."}, {"text": "Four: Life Science, Earth Science, Chemistry, and Physics.", "isCorrect": true, "rationale": "The table explicitly lists these four branches: 'Life Science — Unit 1,' 'Earth Science — Unit 2,' 'Chemistry — Unit 3,' and 'Physics — Unit 4.'"}, {"text": "Five, including a general 'Review' category.", "isCorrect": false, "rationale": "The section only specifies four distinct branches, and there is no general 'Review' category listed as a branch."}]}, {"question": "This vocabulary review specifically pertains to which academic cycle?", "options": [{"text": "Cycle 1.", "isCorrect": true, "rationale": "The text explicitly states: 'The table below collects the key vocabulary terms from all four units in Cycle 1.'"}, {"text": "Cycle 2.", "isCorrect": false, "rationale": "The text clearly states 'Cycle 1,' not Cycle 2."}, {"text": "Chapter 5.", "isCorrect": false, "rationale": "Chapter 5 is the location of this review, but it covers content from 'Cycle 1,' which spans multiple units."}, {"text": "Unit 5.", "isCorrect": false, "rationale": "The section is 'From: Unit 5', but it reviews content from Units 1-4, which constitute Cycle 1, not Unit 5 itself."}]}, {"question": "According to the section, which of the following is a recommended self-check method for reviewing vocabulary terms?", "options": [{"text": "Memorizing the exact textbook definition without alteration.", "isCorrect": false, "rationale": "The text asks, 'Can you define each term in your own words?' which suggests understanding over strict memorization."}, {"text": "Reciting the terms and their definitions aloud to a peer.", "isCorrect": false, "rationale": "While a helpful study strategy, this specific method is not explicitly mentioned or recommended in the provided text."}, {"text": "Defining each term in your own words and providing an example.", "isCorrect": true, "rationale": "The section directly poses two questions as study methods: 'Can you define each term in your own words?' and 'Can you give an example?'"}, {"text": "Looking up unfamiliar terms in an external glossary for additional context.", "isCorrect": false, "rationale": "This section is for reviewing already covered terms, implying students should already be familiar with them, rather than looking them up as a primary review method."}]}, {"question": "The 'Vocabulary Review' encourages students to connect terms from different branches of science. What is the most likely educational benefit of this practice?", "options": [{"text": "It helps to reduce the total number of terms a student needs to memorize for an exam.", "isCorrect": false, "rationale": "Connecting terms deepens understanding but does not reduce the number of terms. It might even increase the cognitive load initially."}, {"text": "It demonstrates the interconnectedness of scientific principles across different disciplines.", "isCorrect": true, "rationale": "By asking students to 'connect a term from one branch to a term from another,' the section promotes an understanding that science is not fragmented but integrated, showing how concepts apply across fields."}, {"text": "It primarily serves as a memory aid for students struggling with rote memorization.", "isCorrect": false, "rationale": "While it can aid memory, the primary benefit is deeper conceptual understanding and analysis, moving beyond mere rote memorization."}, {"text": "It prepares students specifically for advanced research careers in interdisciplinary fields.", "isCorrect": false, "rationale": "While interdisciplinary thinking is valuable in research, the immediate benefit for the target audience is a broader understanding of science, not necessarily preparation for a specific career path."}]}, {"question": "The 'thinkdeeper' activity challenges students to write a paragraph using one term from each of the four branches. What is the primary skill this activity aims to develop?", "options": [{"text": "The ability to summarize complex scientific concepts concisely.", "isCorrect": false, "rationale": "While writing a paragraph involves conciseness, the core challenge is making 'meaningful' and potentially 'non-obvious' connections between diverse terms, not just summarizing them."}, {"text": "Creative thinking and the synthesis of knowledge from diverse scientific fields.", "isCorrect": true, "rationale": "The instruction 'The connection does not have to be obvious — part of the challenge is finding one' highlights the need for creative and synthetic thinking to bridge concepts from different branches meaningfully."}, {"text": "Mastery of grammatical rules and paragraph structuring in scientific writing.", "isCorrect": false, "rationale": "Good writing is a medium for the task, but the primary focus of the 'thinkdeeper' challenge is the conceptual connection of scientific terms, not just writing mechanics."}, {"text": "Identifying precise definitions for isolated vocabulary terms.", "isCorrect": false, "rationale": "This activity specifically requires integrating terms, moving beyond isolated definitions to show their relationships and applications."}]}, {"question": "The example provided for the 'thinkdeeper' activity uses 'osmosis,' 'density,' 'valence electrons,' and 'acceleration.' This selection best illustrates the importance of:", "options": [{"text": "Focusing exclusively on terms from a single scientific discipline.", "isCorrect": false, "rationale": "The example terms clearly come from different disciplines (Life Science, Earth Science/Physics, Chemistry, Physics), directly contradicting focusing on a single discipline."}, {"text": "Recognizing that seemingly unrelated scientific concepts can interact in real-world scenarios.", "isCorrect": true, "rationale": "The example combines terms from all four distinct branches ('osmosis' - Life, 'density' - Earth/Physics, 'valence electrons' - Chemistry, 'acceleration' - Physics), and the prompt states 'The connection does not have to be obvious,' emphasizing the interdisciplinary applicability in a single scenario."}, {"text": "Prioritizing physical science terms over life science or earth science terms.", "isCorrect": false, "rationale": "The example includes terms from Life Science ('osmosis'), Chemistry ('valence electrons'), and Physics ('acceleration,' 'density'), demonstrating a balance across disciplines, not a prioritization of physical sciences."}, {"text": "Identifying the most challenging vocabulary terms from each unit.", "isCorrect": false, "rationale": "The selection criteria for the example terms are not based on difficulty but on demonstrating how different concepts can be linked in a meaningful context."}]}, {"question": "Which of the following is NOT listed as a branch of science with vocabulary reviewed in this section?", "options": [{"text": "Life Science.", "isCorrect": false, "rationale": "Life Science is explicitly listed as a branch: 'Life Science — Unit 1: The Cell'."}, {"text": "Earth Science.", "isCorrect": false, "rationale": "Earth Science is explicitly listed as a branch: 'Earth Science — Unit 2: Earth's Dynamic Interior'."}, {"text": "Biology.", "isCorrect": true, "rationale": "While 'Biology' is a field within 'Life Science,' the section explicitly lists 'Life Science' as the branch, not Biology directly. Therefore, Biology is not *listed* as a distinct branch here."}, {"text": "Chemistry.", "isCorrect": false, "rationale": "Chemistry is explicitly listed as a branch: 'Chemistry — Unit 3: Inside the Atom'."}]}, {"question": "A student needs to prepare for an upcoming exam that covers material from Units 1-4. How should they effectively use this 'Vocabulary Review' section?", "options": [{"text": "Read through the section once to get a general idea of the terms.", "isCorrect": false, "rationale": "Simply reading once is a passive approach; the section promotes active engagement through self-checking questions."}, {"text": "Use it as a checklist to ensure they can define each term in their own words, give an example, and find inter-branch connections.", "isCorrect": true, "rationale": "The section explicitly guides students to use it 'as a study guide and self-check' and then asks, 'Can you define each term in your own words? Can you give an example? Can you connect a term from one branch to a term from another?' This aligns directly with a comprehensive, active review strategy."}, {"text": "Skip it if they feel confident about most of the vocabulary terms from each unit.", "isCorrect": false, "rationale": "Even if confident, using it as a self-check or for the 'thinkdeeper' challenge can solidify understanding and identify any gaps, making skipping it an ineffective strategy."}, {"text": "Focus only on the 'thinkdeeper' challenge, as it covers all major units.", "isCorrect": false, "rationale": "The 'thinkdeeper' challenge is an application activity. The core of the review lies in defining terms and giving examples, which prepares students for the challenge, not replaces it."}]}, {"question": "Beyond simple recall of definitions, what overarching learning objective does this 'Vocabulary Review' section implicitly promote for students?", "options": [{"text": "The ability to rote memorize a large volume of scientific terminology.", "isCorrect": false, "rationale": "The section encourages defining 'in your own words' and making connections, which goes beyond mere rote memorization to deeper understanding."}, {"text": "A fragmented understanding of science, where each discipline is viewed in isolation.", "isCorrect": false, "rationale": "The prompt 'Can you connect a term from one branch to a term from another?' and the 'thinkdeeper' activity actively promote an integrated view of science."}, {"text": "The development of critical thinking skills by synthesizing information and making meaningful connections across scientific fields.", "isCorrect": true, "rationale": "The questions 'Can you define each term in your own words? Can you give an example? Can you connect a term from one branch to a term from another?' and especially the 'thinkdeeper' challenge, all emphasize analytical thinking, synthesis, and interdisciplinary connection, promoting a deeper, applied understanding."}, {"text": "Proficiency in using advanced scientific research tools and methodologies.", "isCorrect": false, "rationale": "The scope of this section is vocabulary review and conceptual understanding, not practical training in research tools or methodologies."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
