        <div class="subtitle">Intermediate Science &mdash; Chapter 27, Section 2</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "The natural greenhouse effect is crucial for life on Earth primarily because it:", "options": [{"text": "Filters out harmful ultraviolet radiation from the sun.", "isCorrect": false, "rationale": "While the atmosphere does filter some UV, this is primarily done by the ozone layer, not the greenhouse effect itself. The primary role of the natural greenhouse effect is temperature regulation."}, {"text": "Absorbs and re-emits infrared radiation, warming the planet to support liquid water.", "isCorrect": true, "rationale": "The text explicitly states that the natural greenhouse effect warms Earth's surface by 33°C, from a hypothetical -18°C to an actual 15°C, making it warm enough for liquid water and life by absorbing and re-emitting infrared radiation."}, {"text": "Prevents warm air from rising and escaping into space, similar to a glass greenhouse.", "isCorrect": false, "rationale": "The text clarifies that a glass greenhouse works mainly by preventing warm air from rising (convection), but the atmospheric greenhouse effect works by absorbing and re-emitting infrared radiation, making the analogy imperfect."}, {"text": "Directly controls the concentration of water vapor in the atmosphere.", "isCorrect": false, "rationale": "Water vapor concentration is primarily controlled by temperature, and it acts as a feedback within the greenhouse effect, but the effect itself doesn't directly control water vapor levels."}]}, {"question": "If a significant portion of Earth's polar ice caps were to melt, how would this primarily impact Earth's overall energy balance, considering the concept of albedo?", "options": [{"text": "It would increase the planet's albedo, leading to more solar radiation being reflected.", "isCorrect": false, "rationale": "Melting ice, which has high albedo, would expose darker ocean or land surfaces. Darker surfaces have lower albedo and absorb more solar radiation, rather than reflecting more."}, {"text": "It would decrease the planet's albedo, causing more solar radiation to be absorbed by the darker surface.", "isCorrect": true, "rationale": "The text defines albedo as reflectivity, noting that ice and snow have high albedo (0.6–0.9), while oceans and forests have low albedo (0.05–0.2). Melting ice would replace reflective surfaces with absorptive ones, decreasing albedo and increasing energy absorption."}, {"text": "It would enhance the natural greenhouse effect by directly adding more water vapor to the atmosphere.", "isCorrect": false, "rationale": "While increased temperatures can lead to more water vapor (a feedback), the direct impact related to albedo change from melting ice is about the reflectivity of Earth's surface, not immediate additions of water vapor in this context."}, {"text": "It would have no significant impact on the reflection or absorption of solar radiation.", "isCorrect": false, "rationale": "Given the large difference in albedo between ice/snow and water/land, a significant change in ice cover would undoubtedly have a major impact on solar radiation reflection and absorption."}]}, {"question": "The textbook explains that the analogy between Earth's atmospheric greenhouse effect and a physical glass greenhouse is imperfect. What is the key difference in their primary mechanism of trapping heat?", "options": [{"text": "A glass greenhouse traps heat by absorbing ultraviolet radiation, while the atmosphere traps infrared radiation.", "isCorrect": false, "rationale": "Both primarily deal with thermal energy, but the mechanisms differ. The atmosphere's primary trapping is via IR absorption, not UV absorption by the 'greenhouse effect' gases."}, {"text": "The atmospheric greenhouse effect prevents warm air from rising, while a glass greenhouse absorbs and re-emits infrared radiation.", "isCorrect": false, "rationale": "This reverses the correct mechanisms. The atmosphere primarily works via IR absorption, and a glass greenhouse primarily works by preventing convection."}, {"text": "A glass greenhouse primarily prevents convection (warm air escaping), whereas the atmosphere primarily absorbs and re-emits infrared radiation.", "isCorrect": true, "rationale": "The text explicitly states: 'a glass greenhouse works mainly by preventing warm air from rising and escaping, while the atmospheric greenhouse effect works by absorbing and re-radiating infrared radiation.'"}, {"text": "Both mechanisms are identical, trapping heat by creating a physical barrier to energy transfer.", "isCorrect": false, "rationale": "The text clearly states the analogy is imperfect and the mechanisms are different."}]}, {"question": "Among the major greenhouse gases listed, which one acts primarily as a feedback mechanism, where its concentration is largely controlled by atmospheric temperature rather than direct human emissions?", "options": [{"text": "Carbon dioxide (CO2)", "isCorrect": false, "rationale": "CO2 is directly and significantly influenced by human activities, such as burning fossil fuels and deforestation."}, {"text": "Methane (CH4)", "isCorrect": false, "rationale": "Methane is directly influenced by various human activities like livestock, rice paddies, and landfills, in addition to natural sources."}, {"text": "Water vapor (H2O)", "isCorrect": true, "rationale": "The text states: 'Water vapor (H2O) — the most abundant greenhouse gas. Its concentration is controlled primarily by temperature (warmer air holds more water vapor), so it acts as a feedback: as CO2 warms the atmosphere, more water evaporates, which traps more heat, which causes more evaporation. Humans do not directly control water vapor levels.'"}, {"text": "Nitrous oxide (N2O)", "isCorrect": false, "rationale": "Nitrous oxide is released by human activities such as agricultural fertilization, combustion, and industrial processes."}]}, {"question": "Nitrogen (N2) and oxygen (O2) comprise about 99% of Earth's atmosphere but are not considered greenhouse gases. Based on the 'Chemistry Connection' box, what molecular property prevents them from absorbing infrared radiation?", "options": [{"text": "Their low atmospheric concentration compared to other gases.", "isCorrect": false, "rationale": "This is incorrect; N2 and O2 are the most abundant atmospheric gases."}, {"text": "Their symmetric diatomic structure, which prevents a changing electric dipole during vibration.", "isCorrect": true, "rationale": "The 'Chemistry Connection' states: 'N2 and O2 are symmetric diatomic molecules with no dipole change during vibration, so they cannot absorb infrared radiation.'"}, {"text": "Their high molecular weight, making them less reactive with infrared photons.", "isCorrect": false, "rationale": "The text does not mention molecular weight as the reason for their inability to absorb IR, but rather their molecular structure."}, {"text": "Their ability to reflect, rather than absorb, incoming solar radiation.", "isCorrect": false, "rationale": "The question pertains to the absorption of infrared radiation (heat), not the reflection of incoming solar radiation."}]}, {"question": "Deforestation is described as a significant contributor to the enhanced greenhouse effect. This is primarily because deforestation:", "options": [{"text": "Increases Earth's albedo, leading to less solar energy absorption.", "isCorrect": false, "rationale": "Deforestation often replaces reflective forests with darker soil or developed land, which can actually decrease albedo. The primary impact on the greenhouse effect is related to carbon."}, {"text": "Reduces atmospheric nitrogen, hindering the formation of beneficial aerosols.", "isCorrect": false, "rationale": "The text does not mention this as a primary impact of deforestation on the greenhouse effect. The focus is on carbon."}, {"text": "Releases stored carbon into the atmosphere and eliminates a major carbon sink.", "isCorrect": true, "rationale": "The text explicitly states: 'Deforestation — cutting and burning forests releases their stored carbon and eliminates a major carbon sink.'"}, {"text": "Enhances the natural processes that remove methane from the atmosphere.", "isCorrect": false, "rationale": "Deforestation generally exacerbates the enhanced greenhouse effect by adding CO2 and removing a sink, rather than reducing other GHGs."}]}, {"question": "According to the text, roughly what proportion of human-generated CO2 emissions currently accumulates in the atmosphere, rather than being absorbed by natural sinks?", "options": [{"text": "Approximately 25%", "isCorrect": false, "rationale": "The text states that the ocean absorbs approximately 25% of human CO2 emissions, and terrestrial vegetation absorbs another 25%."}, {"text": "Approximately 33%", "isCorrect": false, "rationale": "The 33% figure refers to the total increase in CO2 concentration from 1958 to today, not the annual accumulation rate."}, {"text": "Approximately 50%", "isCorrect": true, "rationale": "The text states: 'The remaining approximately 50% of human CO2 emissions accumulates in the atmosphere, increasing the concentration year by year.'"}, {"text": "Approximately 75%", "isCorrect": false, "rationale": "This would mean only 25% is absorbed, which contradicts the stated 25% for both ocean and vegetation, totaling 50% absorption."}]}, {"question": "The Keeling Curve displays a long-term upward trend in atmospheric CO2, but it also shows consistent seasonal oscillations. What is the primary cause of these annual fluctuations?", "options": [{"text": "Seasonal changes in ocean absorption rates due to varying water temperatures.", "isCorrect": false, "rationale": "While oceans do absorb CO2, the text attributes the seasonal oscillations primarily to terrestrial vegetation cycles."}, {"text": "Fluctuations in volcanic activity, releasing more CO2 in certain seasons.", "isCorrect": false, "rationale": "Volcanic activity is not seasonal in a way that would produce consistent annual CO2 fluctuations."}, {"text": "The seasonal cycle of photosynthesis and respiration by terrestrial vegetation, particularly in the Northern Hemisphere.", "isCorrect": true, "rationale": "The text explains: 'Seasonal oscillations — CO2 drops slightly each Northern Hemisphere summer (when land plants in the large northern landmasses photosynthesize vigorously) and rises in winter (when photosynthesis slows and decomposition continues). This seasonal “breathing” of the biosphere is superimposed on the long-term rise.'"}, {"text": "Changes in industrial emissions that occur more frequently during colder months.", "isCorrect": false, "rationale": "Although industrial emissions contribute to the overall trend, the text specifically attributes the seasonal oscillations to natural biological processes, not human industrial cycles."}]}, {"question": "Charles David Keeling faced significant funding challenges for his atmospheric CO2 measurements. Why was he so insistent on maintaining continuous, high-precision data collection despite these obstacles?", "options": [{"text": "To prove that the 'greenhouse effect' analogy with glass greenhouses was flawed.", "isCorrect": false, "rationale": "While the text notes his awareness of the imperfect analogy, this was not the primary motivation for his persistent data collection efforts."}, {"text": "To provide undeniable scientific evidence for human-caused increases in atmospheric CO2 and climate change.", "isCorrect": true, "rationale": "The 'Scientist Spotlight' states: 'He insisted that continuous, high-precision measurements were essential, and history proved him right. Without the Keeling Curve, the scientific case for human-caused climate change would have been far harder to make.'"}, {"text": "To monitor the effectiveness of the Montreal Protocol in reducing synthetic greenhouse gases.", "isCorrect": false, "rationale": "The Montreal Protocol focused on ozone-depleting substances, and Keeling's work was primarily on CO2, which is not directly covered by that protocol."}, {"text": "To accurately calculate Earth's average albedo over long periods.", "isCorrect": false, "rationale": "The Keeling Curve measures atmospheric CO2 concentration, not Earth's albedo."}]}, {"question": "Using the method from the 'Math Toolkit,' if the atmospheric CO2 concentration increased from 380 ppm in 2005 to 420 ppm in 2025, what was the average annual rate of change during this period?", "options": [{"text": "1.5 ppm/year", "isCorrect": false, "rationale": "Calculation: (420 - 380) / (2025 - 2005) = 40 ppm / 20 years = 2.0 ppm/year. This option is incorrect."}, {"text": "2.0 ppm/year", "isCorrect": true, "rationale": "According to the 'Math Toolkit,' Rate of change = Change in quantity / Change in time. Here, (420 ppm - 380 ppm) / (2025 years - 2005 years) = 40 ppm / 20 years = 2.0 ppm/year."}, {"text": "2.5 ppm/year", "isCorrect": false, "rationale": "Calculation: (420 - 380) / (2025 - 2005) = 40 ppm / 20 years = 2.0 ppm/year. This option is incorrect."}, {"text": "4.0 ppm/year", "isCorrect": false, "rationale": "Calculation: (420 - 380) / (2025 - 2005) = 40 ppm / 20 years = 2.0 ppm/year. This option is incorrect."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
