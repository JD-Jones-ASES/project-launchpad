    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 29, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is a fundamental distinction between magnetic poles and electric charges?", "options": [{"text": "Magnetic poles cannot exert force at a distance, unlike electric charges.", "isCorrect": false, "rationale": "Both magnetic poles and electric charges exert forces at a distance."}, {"text": "Magnetic poles can be isolated as single north or south entities, while electric charges always exist in pairs.", "isCorrect": false, "rationale": "This statement is the opposite of what is true. Electric charges can be isolated (e.g., a single proton or electron), but magnetic poles cannot; they always appear in pairs."}, {"text": "Breaking a magnet creates two smaller magnets, each with both poles, whereas breaking an electrically charged object could yield separate positive and negative charges.", "isCorrect": true, "rationale": "The text explicitly states that you cannot isolate a single magnetic pole; breaking a magnet results in two smaller magnets. In contrast, electric charges can be isolated."}, {"text": "Magnetic poles only repel each other, while electric charges can both attract and repel.", "isCorrect": false, "rationale": "Magnetic poles, like electric charges, can both attract (opposite poles) and repel (like poles)."}]}, {"question": "Which statement accurately describes the characteristics of magnetic field lines?", "options": [{"text": "Magnetic field lines originate from the south pole and terminate at the north pole outside the magnet.", "isCorrect": false, "rationale": "Magnetic field lines emerge from the north pole and curve around to enter the south pole outside the magnet."}, {"text": "The density of magnetic field lines indicates the direction of the magnetic force, not its strength.", "isCorrect": false, "rationale": "The density of magnetic field lines indicates the strength of the field; where lines are close together, the field is strong."}, {"text": "Magnetic field lines cross each other at points of intense magnetic force.", "isCorrect": false, "rationale": "Magnetic field lines never cross each other."}, {"text": "Inside a magnet, field lines run from the south pole to the north pole, forming continuous closed loops.", "isCorrect": true, "rationale": "The text states that inside the magnet, field lines run from south to north, forming continuous closed loops."}]}, {"question": "A material is classified as ferromagnetic primarily because of which characteristic?", "options": [{"text": "It contains a high concentration of free electrons, allowing it to conduct electricity easily.", "isCorrect": false, "rationale": "While some ferromagnetic materials are good conductors, this characteristic relates to electrical conductivity, not ferromagnetism. Ferromagnetism is about strong attraction to magnets and magnetizability."}, {"text": "Its atoms have electron spins that tend to align in microscopic regions called magnetic domains.", "isCorrect": true, "rationale": "The text explains that in ferromagnetic materials, large groups of atoms align their electron spins in the same direction, creating magnetic domains, which are the basis for their strong magnetic properties."}, {"text": "It loses its magnetic properties instantly when an external magnetic field is removed.", "isCorrect": false, "rationale": "Some ferromagnetic materials exhibit temporary magnetism, but others can become permanently magnetized. This describes a behavior, not the primary reason for being ferromagnetic."}, {"text": "It can be made transparent to magnetic fields under certain conditions.", "isCorrect": false, "rationale": "The text does not mention any such property for ferromagnetic materials."}]}, {"question": "When an unmagnetized piece of iron is brought near a strong magnet, it becomes magnetized because:", "options": [{"text": "The external magnet causes the iron atoms to temporarily lose their electron spins, creating a net magnetic effect.", "isCorrect": false, "rationale": "Electron spins are an inherent quantum-mechanical property of electrons; they are not lost. Instead, their alignment changes."}, {"text": "The strong magnet induces new north and south poles in the iron by changing its atomic structure.", "isCorrect": false, "rationale": "The external magnet does not change the atomic structure of the iron; it reorients existing magnetic domains."}, {"text": "Magnetic domains within the iron that are aligned with the external field grow at the expense of misaligned domains.", "isCorrect": true, "rationale": "The text states that when iron is brought near a strong magnet, domains aligned with the external field grow, causing the iron to become magnetized."}, {"text": "The iron instantly becomes a permanent magnet regardless of the strength or duration of the external field.", "isCorrect": false, "rationale": "Whether the iron becomes temporarily or permanently magnetized depends on the strength of the external field and the material itself; it's not always instant or permanent."}]}, {"question": "Which action would be LEAST effective in demagnetizing a permanent magnet?", "options": [{"text": "Heating the magnet above its Curie temperature.", "isCorrect": false, "rationale": "Heating a magnet above its Curie temperature is an effective method to demagnetize it, as it disrupts domain alignment."}, {"text": "Striking the magnet sharply with a hammer.", "isCorrect": false, "rationale": "Striking a magnet sharply is a described method for demagnetization, as it disrupts domain alignment."}, {"text": "Placing the magnet in a rapidly alternating magnetic field.", "isCorrect": false, "rationale": "Exposing a magnet to a rapidly alternating magnetic field is an effective method for demagnetization, as it disrupts domain alignment."}, {"text": "Placing the magnet near a stronger permanent magnet of the same polarity.", "isCorrect": true, "rationale": "Placing a magnet near another magnet, even of the same polarity, would likely just cause repulsion or potentially re-align its domains, not demagnetize it. The other options are explicitly stated methods for demagnetization that disrupt domain alignment globally."}]}, {"question": "A compass needle's \"north-seeking\" pole points towards Earth's magnetic north. Given the fundamental rule of magnetic interaction (opposite poles attract), what can be inferred about Earth's magnetic north pole?", "options": [{"text": "It is physically a north magnetic pole, hence why the compass's north pole is attracted to it.", "isCorrect": false, "rationale": "The rule of magnetic interaction states that opposite poles attract. If a compass's north pole is attracted to Earth's 'magnetic north,' then Earth's magnetic north must be a physically south magnetic pole."}, {"text": "It is located precisely at the geographic North Pole, indicating no magnetic declination.", "isCorrect": false, "rationale": "The text states that the geographic North Pole and the magnetic north pole are not in the same place, and the angular difference is called magnetic declination."}, {"text": "It is physically a south magnetic pole, attracting the north-seeking pole of the compass.", "isCorrect": true, "rationale": "According to the rule that opposite poles attract, if the 'north-seeking' pole of a compass (which is a north magnetic pole) points towards Earth's magnetic north, then Earth's magnetic north must be a physically south magnetic pole. The text explicitly mentions this confusing naming convention."}, {"text": "Its strength is constant across the globe, ensuring uniform compass readings everywhere.", "isCorrect": false, "rationale": "Earth's magnetic field strength varies, and magnetic declination means compass readings vary in direction depending on location."}]}, {"question": "The magnetosphere plays a crucial role in protecting Earth by:", "options": [{"text": "Generating the heat required for convection currents in the outer core.", "isCorrect": false, "rationale": "The geodynamo (convection currents in the outer core) generates Earth's magnetic field, which in turn creates the magnetosphere. The magnetosphere itself does not generate this heat."}, {"text": "Deflecting harmful solar wind and charged particles from the Sun.", "isCorrect": true, "rationale": "The text explicitly states that the magnetosphere deflects the solar wind, protecting Earth's atmosphere and surface from harmful radiation."}, {"text": "Causing magnetic reversals that are vital for seafloor spreading.", "isCorrect": false, "rationale": "Magnetic reversals are a phenomenon of Earth's magnetic field, and the pattern of these reversals provides evidence for seafloor spreading, but the magnetosphere's primary protective role is not to cause reversals."}, {"text": "Maintaining the tilt of Earth's axis relative to its orbit.", "isCorrect": false, "rationale": "Earth's axial tilt is an astronomical property, not directly maintained by the magnetosphere."}]}, {"question": "During a magnetic reversal event, what is a potential consequence for Earth and its inhabitants, as suggested by the text?", "options": [{"text": "The Earth's rotation would temporarily stop due to the chaotic magnetic fields.", "isCorrect": false, "rationale": "The text does not suggest any impact on Earth's rotation during a magnetic reversal."}, {"text": "The Earth's atmosphere would be instantly stripped away, similar to what happened on Mars.", "isCorrect": false, "rationale": "The text indicates that the field weakens 'during the transition' and 'temporarily reducing the magnetosphere's protection,' implying a gradual process, not an instant stripping of the atmosphere."}, {"text": "The magnetosphere's protection would be temporarily reduced, increasing exposure to solar radiation.", "isCorrect": true, "rationale": "The text states that during a reversal, the field weakens, 'temporarily reducing the magnetosphere's protection,' which would lead to increased exposure to solar radiation."}, {"text": "Homing pigeons and other magnetically sensitive animals would immediately go extinct.", "isCorrect": false, "rationale": "The 'Think Deeper' section implies that while navigation might be disrupted, species could adapt over the thousands of years a reversal takes, suggesting extinction would not be immediate."}]}, {"question": "If a small compass is placed at a point where the magnetic field lines are pointing directly downwards, what would be the orientation of the compass needle's north pole?", "options": [{"text": "The north pole of the compass needle would point upwards.", "isCorrect": false, "rationale": "The direction of the magnetic field at any point is defined as the direction a north compass pole would point if placed there."}, {"text": "The north pole of the compass needle would point downwards.", "isCorrect": true, "rationale": "The text defines the direction of the field as the direction a north compass pole would point. Therefore, if the field lines point downwards, the compass's north pole would point downwards."}, {"text": "The compass needle would spin erratically due to conflicting forces.", "isCorrect": false, "rationale": "A compass needle is a small magnet designed to align with the magnetic field lines, not spin erratically unless the field is rapidly changing or highly chaotic."}, {"text": "The compass needle would not move, indicating a zero magnetic field at that point.", "isCorrect": false, "rationale": "If there were a magnetic field, the compass needle would move to align with it. No movement would indicate a lack of significant field, not a specific downward direction."}]}, {"question": "The introduction states that magnetism is \"intimately connected to electricity.\" Which of the following statements best reflects this underlying connection as implied by the text?", "options": [{"text": "Static electric charges are always accompanied by a magnetic field.", "isCorrect": false, "rationale": "The text (in the definition of a magnetic field) clarifies that a magnetic field is created by a magnet 'or a moving electric charge,' not static charges."}, {"text": "The force exerted by a magnet is a form of electrostatic attraction.", "isCorrect": false, "rationale": "Magnetic force is distinct from electrostatic force, even though both are fundamental forces and related. The text doesn't suggest it's 'a form' of electrostatic attraction."}, {"text": "Every electron acts as a tiny magnet due to its quantum-mechanical spin.", "isCorrect": true, "rationale": "The text explicitly states that 'Every electron acts as a tiny magnet because of a quantum-mechanical property called spin.' Since electrons are fundamental carriers of electric charge, this property directly links the inherent nature of charged particles to the origin of magnetism in materials, thus illustrating the 'intimate connection' mentioned."}, {"text": "All electrical conductors are inherently ferromagnetic materials.", "isCorrect": false, "rationale": "While many conductors (like copper) are not ferromagnetic, the text does not state or imply that all conductors are ferromagnetic. Ferromagnetism is a specific magnetic property, not universal for conductors."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
