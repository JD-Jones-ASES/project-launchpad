    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately distinguishes between speed and velocity?", "options": [{"text": "Speed is measured in meters per second, while velocity is measured in kilometers per hour.", "isCorrect": false, "rationale": "Both speed and velocity can be measured in meters per second (SI unit) or kilometers per hour, depending on the context. This statement does not highlight their fundamental difference."}, {"text": "Speed is a scalar quantity, indicating only magnitude, whereas velocity is a vector quantity, indicating both magnitude and direction.", "isCorrect": true, "rationale": "The text clearly defines speed as a scalar (no direction) and velocity as a vector (magnitude and direction). This is the core difference between the two concepts."}, {"text": "Speed is calculated using displacement, while velocity is calculated using distance.", "isCorrect": false, "rationale": "This statement is incorrect. Speed is calculated using total distance covered, while average velocity is calculated using displacement."}, {"text": "Instantaneous speed refers to average speed, while instantaneous velocity refers to the speed at a specific moment.", "isCorrect": false, "rationale": "Instantaneous speed is the speed at a specific moment in time. Average speed is the total distance divided by total time. Both speed and velocity have instantaneous and average forms."}]}, {"question": "A cyclist rides their bike at a constant speed of 12 m/s for 45 seconds. How far did the cyclist travel?", "options": [{"text": "3.75 meters", "isCorrect": false, "rationale": "This result (45/12) would be obtained if time was divided by speed, which calculates an incorrect distance."}, {"text": "540 meters", "isCorrect": true, "rationale": "To find the distance, the formula d = v × t is used. So, d = 12 m/s × 45 s = 540 meters. The units also correctly cancel out to meters."}, {"text": "0.26 meters", "isCorrect": false, "rationale": "This result (12/45) is incorrect; it would be obtained if speed was divided by time."}, {"text": "57 meters", "isCorrect": false, "rationale": "This result (12 + 45) is obtained by adding speed and time, which is not the correct formula for distance."}]}, {"question": "A car's driver sees a deer and slams on the brakes. The car's speedometer reading rapidly decreases from 80 km/h to 0 km/h in 4 seconds. Which quantity was changing during this braking event?", "options": [{"text": "The car's average speed over the entire trip.", "isCorrect": false, "rationale": "While the braking event contributes to the overall average speed, the question specifically asks what quantity *was changing* during the braking. The average speed of the *entire trip* is calculated over a longer duration and is not what is rapidly decreasing in this instant."}, {"text": "The car's total distance traveled.", "isCorrect": false, "rationale": "The total distance traveled would continue to increase (albeit at a decreasing rate) until the car completely stops. It doesn't decrease to 0 km/h."}, {"text": "The car's instantaneous speed.", "isCorrect": true, "rationale": "The speedometer directly displays the instantaneous speed, which is the speed at a particular moment. When the driver slams on the brakes, this reading rapidly changes from 80 km/h to 0 km/h, indicating a change in instantaneous speed."}, {"text": "The car's average velocity for the 4-second braking period.", "isCorrect": false, "rationale": "While the average velocity would also change during this period, the instantaneous speed is what the speedometer directly shows and is changing rapidly to zero, making it the most direct answer to what is observed decreasing rapidly."}]}, {"question": "If an object travels a distance 'd' at a constant speed 'v', how would you calculate the time 't' it took for the travel?", "options": [{"text": "t = v × d", "isCorrect": false, "rationale": "This formula would yield a result in units of m²/s (if d is in meters and v in m/s), which is not a unit of time. It incorrectly multiplies speed by distance."}, {"text": "t = d / v", "isCorrect": true, "rationale": "Starting with v = d/t, multiplying both sides by t gives v × t = d. Then, dividing both sides by v isolates t, resulting in t = d/v. This formula correctly calculates time."}, {"text": "t = v + d", "isCorrect": false, "rationale": "Adding speed and distance does not give time and would result in mixed units that don't simplify to a unit of time."}, {"text": "t = v - d", "isCorrect": false, "rationale": "Subtracting distance from speed does not yield time and results in mixed units."}]}, {"question": "A student walks 50 meters east from their dorm to a classroom, then immediately walks 50 meters west back to their dorm. The entire round trip takes 200 seconds. What is the student's average velocity for the entire trip?", "options": [{"text": "0 m/s", "isCorrect": true, "rationale": "Average velocity is calculated as total displacement divided by total time. Since the student started at the dorm and ended at the dorm, their net displacement is 0 meters. Therefore, 0 m / 200 s = 0 m/s."}, {"text": "0.5 m/s", "isCorrect": false, "rationale": "This would be the average speed (total distance 100m / total time 200s), but not the average velocity, which considers displacement."}, {"text": "1.0 m/s", "isCorrect": false, "rationale": "This would be the average speed if the total distance was 200m and total time 200s. The total distance is 100m, and the average velocity is based on zero displacement."}, {"text": "50 m/s", "isCorrect": false, "rationale": "This value (50m/1s) is not related to the total time or displacement for the round trip; it might represent a speed for one segment if the time was 1s, which is not the case."}]}, {"question": "On a position-time graph, what does a horizontal line indicate about an object's motion?", "options": [{"text": "The object is moving at a constant positive velocity.", "isCorrect": false, "rationale": "A constant positive velocity would be represented by a straight line with a positive, non-zero slope."}, {"text": "The object is accelerating.", "isCorrect": false, "rationale": "Acceleration would be represented by a curved line or a line with a changing slope on a position-time graph."}, {"text": "The object is at rest.", "isCorrect": true, "rationale": "A horizontal line on a position-time graph signifies that the object's position is not changing over time. Since the slope (which represents velocity) is zero, the object is at rest."}, {"text": "The object is moving with a constant negative velocity.", "isCorrect": false, "rationale": "A constant negative velocity would be represented by a straight line with a negative slope."}]}, {"question": "Two cars, Car A and Car B, are traveling on a highway. Car A is moving north at 70 km/h, and Car B is moving south at 70 km/h. Which statement accurately compares their motion?", "options": [{"text": "Car A and Car B have different speeds but the same velocity.", "isCorrect": false, "rationale": "They have the same speed (magnitude) but different directions, meaning their velocities are different. If speeds were different, velocities would also be different."}, {"text": "Car A and Car B have the same speeds and the same velocities.", "isCorrect": false, "rationale": "While their speeds are the same (70 km/h), their velocities are different because they are moving in opposite directions (north vs. south)."}, {"text": "Car A and Car B have the same speeds but different velocities.", "isCorrect": true, "rationale": "Speed is magnitude only, so both cars have a speed of 70 km/h. Velocity includes direction, and since they are traveling in opposite directions, their velocities are different."}, {"text": "Car A and Car B have different speeds and different velocities.", "isCorrect": false, "rationale": "Their speeds are the same (70 km/h), so this statement is incorrect regarding speed."}]}, {"question": "A velocity-time graph shows a horizontal line at v = -5 m/s. What does this indicate about the object's motion?", "options": [{"text": "The object is at rest.", "isCorrect": false, "rationale": "If the object were at rest, its velocity would be 0 m/s, and the line would be horizontal on the time axis (v=0)."}, {"text": "The object is speeding up in the negative direction.", "isCorrect": false, "rationale": "Speeding up (acceleration) would be represented by a sloping line away from the time axis on a v-t graph. A horizontal line means constant velocity."}, {"text": "The object is moving at a constant speed of 5 m/s in the negative direction.", "isCorrect": true, "rationale": "A horizontal line on a velocity-time graph means constant velocity. The value v = -5 m/s indicates a constant speed of 5 m/s, and the negative sign indicates motion in the negative direction."}, {"text": "The object is changing direction.", "isCorrect": false, "rationale": "A change in direction would be shown by the line crossing the time axis (from positive velocity to negative, or vice versa)."}]}, {"question": "On a velocity-time graph, a rectangular area is formed by a horizontal line at 10 m/s and the time axis, spanning from t=0s to t=5s. What physical quantity does the area of this rectangle represent, and what is its value?", "options": [{"text": "Average velocity; 50 m/s", "isCorrect": false, "rationale": "The area under a velocity-time graph represents displacement, not average velocity. Also, the unit for the area calculation would not be m/s."}, {"text": "Acceleration; 2 m/s²", "isCorrect": false, "rationale": "Acceleration is represented by the slope of a velocity-time graph, not the area. A horizontal line indicates zero acceleration."}, {"text": "Displacement; 50 meters", "isCorrect": true, "rationale": "The area under a velocity-time graph represents the displacement. For a rectangle, Area = base × height = velocity × time = 10 m/s × 5 s = 50 meters. The units correctly yield meters, a unit of displacement."}, {"text": "Total distance traveled; 50 m/s", "isCorrect": false, "rationale": "The area represents displacement. While for constant velocity in one direction, displacement equals distance, the unit 'm/s' is incorrect for distance."}]}, {"question": "Consider a cheetah chasing its prey. The cheetah accelerates from rest to 30 m/s, maintains that speed for a short burst, then rapidly slows down. Which concept is most relevant for a biologist studying the cheetah's hunting effectiveness in terms of covering ground quickly for this specific chase?", "options": [{"text": "The cheetah's average velocity for the entire chase.", "isCorrect": false, "rationale": "Average velocity considers displacement. If the cheetah eventually stops near where it started relative to its prey, or moves in complex paths, its average velocity might be small or zero, which wouldn't reflect how much ground it covered to pursue prey."}, {"text": "The cheetah's instantaneous speed during its top-speed burst.", "isCorrect": false, "rationale": "While instantaneous speed is important to know its maximum capability, the question asks about 'covering ground quickly' for the *entire chase*, which implies an overall measure, not just a specific instant."}, {"text": "The cheetah's total displacement from start to finish.", "isCorrect": false, "rationale": "Displacement only measures the straight-line distance from the start to the end point. It does not account for the total path length covered, which is crucial for 'covering ground quickly' in a dynamic hunt."}, {"text": "The cheetah's average speed over the duration of the chase.", "isCorrect": true, "rationale": "Average speed, calculated as total distance covered divided by total time, best reflects how effectively the cheetah 'covers ground quickly' regardless of changes in direction or momentary stops, providing an overall measure of its pursuit efficiency."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
