    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 6, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A scientist discovers a new species of organism. Upon dissection, she notes that the organism's nutrient absorption organ has a highly folded internal surface, increasing its surface area significantly. This observation best exemplifies which principle described in the Human Body Systems Overview?", "options": [{"text": "Systems interact to maintain homeostasis.", "isCorrect": false, "rationale": "While systems do interact, this specific example of a folded surface directly relates to the concept of design enabling a particular function, not general interaction or homeostasis."}, {"text": "Structure matches function.", "isCorrect": true, "rationale": "The highly folded internal surface is a structural design feature that directly enhances the function of nutrient absorption by increasing surface area, perfectly illustrating the principle that structure matches function."}, {"text": "The nervous system is the body's rapid communication network.", "isCorrect": false, "rationale": "This principle is true for the nervous system, but it is irrelevant to the observation of a folded organ surface and its role in nutrient absorption."}, {"text": "Organ systems work simultaneously without conscious thought.", "isCorrect": false, "rationale": "Many body systems do work involuntarily, but this observation specifically describes a structural adaptation for function, not the conscious control or simultaneity of system operations."}]}, {"question": "Which of the following correctly describes the interaction between the skeletal and muscular systems during a voluntary movement, such as lifting an object?", "options": [{"text": "Ligaments contract to pull on bones, causing movement.", "isCorrect": false, "rationale": "Ligaments are tough connective tissues that hold bones together at joints; they do not contract to produce movement. Muscles contract for movement."}, {"text": "Tendons connect muscles to bones, allowing muscles to pull on the skeleton.", "isCorrect": true, "rationale": "The text states that skeletal muscles are connected to bones by tendons, and when a muscle contracts, it pulls on the bone to produce movement."}, {"text": "Cartilage within joints generates the force needed for muscle contraction.", "isCorrect": false, "rationale": "Cartilage cushions joints between bones; it does not generate force for muscle contraction. Muscles themselves contract to generate force."}, {"text": "Smooth muscle directly controls the movement of skeletal bones.", "isCorrect": false, "rationale": "Smooth muscle controls involuntary movements in internal organs and blood vessels. Voluntary movement of skeletal bones is controlled by skeletal muscles."}]}, {"question": "A person experiences difficulty absorbing nutrients despite adequate food intake. Which organ is most likely impaired, given its primary role in nutrient absorption?", "options": [{"text": "Stomach", "isCorrect": false, "rationale": "The stomach's primary role is to break down proteins with strong acids and enzymes; while some absorption can occur, most nutrient absorption happens elsewhere."}, {"text": "Large intestine", "isCorrect": false, "rationale": "The large intestine primarily absorbs remaining water and minerals, not the bulk of nutrients from digested food."}, {"text": "Small intestine", "isCorrect": true, "rationale": "The text explicitly states that the small intestine is a six-meter tube where 'most chemical digestion and nutrient absorption occur.'"}, {"text": "Esophagus", "isCorrect": false, "rationale": "The esophagus is a tube that transports food from the mouth to the stomach; it does not play a significant role in nutrient absorption."}]}, {"question": "During vigorous exercise, muscle cells rapidly consume oxygen and produce carbon dioxide. How does the circulatory system efficiently facilitate the exchange of these gases at the cellular level?", "options": [{"text": "Arteries actively pump oxygen into cells while veins remove carbon dioxide.", "isCorrect": false, "rationale": "Arteries carry oxygen-rich blood away from the heart, but they are not the direct sites of exchange with individual cells. Veins return oxygen-poor blood to the heart."}, {"text": "Capillaries, due to their thin walls, are the primary sites for gas diffusion between blood and cells.", "isCorrect": true, "rationale": "The text states that 'Capillaries — tiny vessels just one cell thick — connect arteries to veins and are the sites where oxygen, nutrients, and waste products are exchanged between blood and body cells.'"}, {"text": "The heart directly exchanges gases with body cells, bypassing the need for vessels.", "isCorrect": false, "rationale": "The heart is a pump that circulates blood through vessels; it does not directly exchange gases with body cells."}, {"text": "Veins carry oxygen-rich blood to the muscles, and arteries return carbon dioxide-rich blood to the heart.", "isCorrect": false, "rationale": "This statement reverses the roles of arteries and veins. Arteries carry oxygen-rich blood away from the heart, and veins return oxygen-poor blood to the heart."}]}, {"question": "An athlete's lungs are highly efficient at maximizing oxygen uptake. This efficiency is primarily due to the vast number of what structures within the lungs?", "options": [{"text": "Bronchi", "isCorrect": false, "rationale": "Bronchi are air passages leading into the lungs, but the primary site of gas exchange for maximizing oxygen uptake is further down the respiratory tree."}, {"text": "Trachea", "isCorrect": false, "rationale": "The trachea (windpipe) is a main air passage, but it is not the primary site where gas exchange occurs to maximize oxygen uptake."}, {"text": "Alveoli", "isCorrect": true, "rationale": "The text explains that air reaches 'tiny air sacs called alveoli,' and 'There are roughly 300 million alveoli in each lung, providing an enormous surface area for gas exchange' where oxygen diffuses into the blood."}, {"text": "Esophagus", "isCorrect": false, "rationale": "The esophagus is part of the digestive system and is not involved in oxygen uptake or lung function."}]}, {"question": "A sudden, immediate response, like pulling your hand away from a hot stove, is primarily mediated by the nervous system. A longer-term process, such as regulating blood sugar levels over several hours, is primarily regulated by the endocrine system. What fundamental difference in their communication mechanisms accounts for this distinction?", "options": [{"text": "The nervous system uses electrical signals, while the endocrine system uses chemical messengers (hormones) transported by the bloodstream.", "isCorrect": true, "rationale": "The text explains that the nervous system uses 'fast electrical signals' for 'rapid communication,' while the endocrine system uses 'hormones — chemical messengers released into the bloodstream' for 'slow, long-lasting processes.'"}, {"text": "The nervous system only affects target cells, while the endocrine system affects all cells in the body.", "isCorrect": false, "rationale": "Both systems affect specific target cells; hormones from the endocrine system 'affect only target cells that have the appropriate receptors.'"}, {"text": "The nervous system relies on the brain, while the endocrine system functions independently of the brain.", "isCorrect": false, "rationale": "Both systems involve and interact with the brain and other parts of the body; the endocrine system is not entirely independent of the brain's influence."}, {"text": "The nervous system generates energy, while the endocrine system consumes it.", "isCorrect": false, "rationale": "Both systems require energy for their functions; this statement does not accurately describe a fundamental difference in their communication mechanisms."}]}, {"question": "A child receives a vaccine for measles. Based on the description of the immune system, how does this vaccine protect the child from future measles infections?", "options": [{"text": "The vaccine provides white blood cells that immediately destroy any measles pathogens encountered.", "isCorrect": false, "rationale": "Vaccines do not directly provide white blood cells; they stimulate the body's own immune system to produce them and develop memory."}, {"text": "The vaccine stimulates the immune system to 'remember' the pathogen, allowing for a quicker and stronger response upon actual exposure.", "isCorrect": true, "rationale": "The text states that the immune system has a 'memory' and 'after fighting off a particular pathogen, it can respond more quickly if the same pathogen is encountered again. This is the principle behind vaccination.'"}, {"text": "The vaccine creates a physical barrier in the bloodstream, preventing measles viruses from entering cells.", "isCorrect": false, "rationale": "Vaccines do not create physical barriers; they work by priming the immune system to recognize and fight specific pathogens."}, {"text": "The vaccine neutralizes all harmful substances in the body, including disease-causing organisms.", "isCorrect": false, "rationale": "Vaccines are specific to particular pathogens; they do not neutralize all harmful substances or provide broad protection against all disease-causing organisms."}]}, {"question": "Which of the following correctly pairs an excretory organ with the waste product it primarily removes from the body?", "options": [{"text": "Skin: Carbon dioxide", "isCorrect": false, "rationale": "The skin primarily excretes small amounts of urea and salt through sweat. Carbon dioxide is primarily excreted by the lungs."}, {"text": "Lungs: Urea", "isCorrect": false, "rationale": "The lungs excrete carbon dioxide. Urea is a nitrogen-containing waste primarily removed by the kidneys."}, {"text": "Kidneys: Nitrogen-containing waste (urea)", "isCorrect": true, "rationale": "The text explicitly states that 'The kidneys filter the blood, removing excess water, salts, and nitrogen-containing waste (urea) to produce urine.'"}, {"text": "Liver: Excess water", "isCorrect": false, "rationale": "While the liver has many functions, its primary role is not the direct excretion of excess water in the same way the kidneys do. The liver produces bile for digestion."}]}, {"question": "Beyond acting as a physical barrier, what is another crucial function of the integumentary system that helps maintain internal body conditions?", "options": [{"text": "Producing specialized gametes for reproduction.", "isCorrect": false, "rationale": "The production of gametes (sperm and eggs) is the function of the reproductive system, not the integumentary system."}, {"text": "Generating rapid electrical signals for communication.", "isCorrect": false, "rationale": "Generating rapid electrical signals is the primary function of the nervous system."}, {"text": "Regulating body temperature through sweating and blood flow.", "isCorrect": true, "rationale": "The text states that the integumentary system (skin) 'helps regulate body temperature through sweating and changes in blood flow.'"}, {"text": "Pumping blood throughout the body.", "isCorrect": false, "rationale": "Pumping blood is the primary function of the circulatory system, specifically the heart."}]}, {"question": "During the 'Systems Working Together: An Example' scenario (running a race), which of the following is the most direct consequence of the muscular system's increased activity on the excretory system?", "options": [{"text": "Increased production of hormones to regulate metabolism.", "isCorrect": false, "rationale": "This describes a function of the endocrine system in response to stress, not a direct consequence of muscle activity on the excretory system."}, {"text": "Removal of waste products generated by intense muscle activity.", "isCorrect": true, "rationale": "The example explicitly states, 'When the race is over, your excretory system removes waste products generated by intense muscle activity.' Muscle activity produces metabolic wastes that the excretory system eliminates."}, {"text": "Enhanced absorption of nutrients in the small intestine.", "isCorrect": false, "rationale": "Enhanced nutrient absorption is a function of the digestive system and is not a direct consequence of intense muscle activity on the excretory system; in fact, digestion might slow down during a race."}, {"text": "Faster transmission of nerve signals to coordinate movement.", "isCorrect": false, "rationale": "This is a function of the nervous system facilitating movement, not a direct consequence of muscle activity on the excretory system."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
