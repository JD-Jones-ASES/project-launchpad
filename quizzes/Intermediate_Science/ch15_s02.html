        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What fundamental energy transformation is at the core of a hydroelectric dam's operation, and which scientific branches are explicitly stated as being involved in the 'full story'?", "options": [{"text": "Chemical energy to electrical energy; Physics and Chemistry.", "isCorrect": false, "rationale": "The primary transformation is not chemical to electrical, and more than two branches are involved."}, {"text": "Thermal energy to mechanical energy; Earth Science and Life Science.", "isCorrect": false, "rationale": "Thermal energy is a byproduct of inefficiency, not the core transformation, and this omits key branches like Physics and Chemistry."}, {"text": "Gravitational potential energy to electrical energy; Earth Science, Chemistry, Physics, and Life Science.", "isCorrect": true, "rationale": "The text clearly states the dam converts gravitational potential energy to electrical energy, and that the 'full story involves every branch of science you studied in Cycle 3' which includes all four listed."}, {"text": "Kinetic energy to chemical energy; Physics and Life Science.", "isCorrect": false, "rationale": "Kinetic energy is an intermediate step, not the starting point, and the end product is not chemical energy. More branches are also involved."}], "id": "q01"}, {"question": "The text states that 'Solar energy drives the water cycle.' How does this directly contribute to the gravitational potential energy of water, which is essential for a hydroelectric dam?", "options": [{"text": "Solar energy directly heats the water behind the dam, increasing its potential energy through thermal expansion.", "isCorrect": false, "rationale": "While solar energy heats water, its primary role in the water cycle for dams is not directly heating water behind the dam to increase its potential energy. It drives the cycle that lifts water to high elevations."}, {"text": "The sun's radiation powers the turbines directly through photovoltaic cells, enhancing their mechanical output.", "isCorrect": false, "rationale": "This describes solar panel technology, not how solar energy contributes to hydroelectric power through the water cycle."}, {"text": "Solar heating causes ocean water evaporation, which condenses into clouds and falls as precipitation over mountains, thereby lifting water to high elevations.", "isCorrect": true, "rationale": "The text explains that the sun heats ocean water, causing evaporation, leading to precipitation over high ground, which gives water gravitational potential energy."}, {"text": "Solar energy enhances the chemical bonds in water, making it heavier and thus increasing its gravitational potential energy.", "isCorrect": false, "rationale": "Solar energy does not enhance chemical bonds in water to make it heavier or directly increase its gravitational potential energy in this manner."}], "id": "q02"}, {"question": "The unique chemical bonding properties of water are crucial for the water cycle. Which specific property, mentioned in the text, allows oceans to moderate climate and sustain the water cycle effectively?", "options": [{"text": "Water's ability to form strong covalent bonds with atmospheric gases like carbon dioxide.", "isCorrect": false, "rationale": "While water dissolves gases, the text emphasizes its internal bonding for heat capacity and phase changes, not its covalent bonding with atmospheric gases for climate moderation."}, {"text": "The high heat capacity of water, due to hydrogen bonds, enabling slow absorption and release of solar energy.", "isCorrect": true, "rationale": "The text explicitly states that 'The hydrogen bonds between water molecules... give water its high heat capacity, which allows oceans to absorb enormous amounts of solar energy and release it slowly — moderating climate and sustaining the water cycle.'"}, {"text": "Water's low density when frozen, allowing ice to float and insulate marine life.", "isCorrect": false, "rationale": "While a true property of water, the text does not mention this as the reason for climate moderation or sustaining the water cycle in the context of the dam."}, {"text": "The metallic bonding structure of water molecules, facilitating efficient energy transfer.", "isCorrect": false, "rationale": "Water molecules have polar covalent and hydrogen bonds, not metallic bonds. This statement is factually incorrect regarding water's chemistry."}], "id": "q03"}, {"question": "A new dam is proposed where water is held at a height of 100 meters above the turbines. If 750 kg of water flows through the penstocks each second, what is the theoretical maximum gravitational potential energy converted to kinetic energy per second? (Assume g = 9.8 m/s²)", "options": [{"text": "7350 J", "isCorrect": false, "rationale": "This calculation only multiplies mass by gravity (750 kg * 9.8 m/s²), not including the height."}, {"text": "735,000 J", "isCorrect": true, "rationale": "Using the formula PE = mgh = (750 kg)(9.8 m/s²)(100 m) = 735,000 J. Since this is per second, it represents the power converted."}, {"text": "75,000 J", "isCorrect": false, "rationale": "This calculation is incorrect, possibly assuming g=1 or a different height."}, {"text": "73.5 kW", "isCorrect": false, "rationale": "While the numerical part is related to a miscalculation (750*9.8), the unit is also incorrect for potential energy, though it would be a valid unit for power if the calculation was correct (735,000 J/s = 735 kW)."}], "id": "q04"}, {"question": "If a hydroelectric dam generates a maximum theoretical power of 500 kW, but operates with an 85% efficiency, how much power is lost as thermal energy due to friction and other inefficiencies?", "options": [{"text": "75 kW", "isCorrect": true, "rationale": "The efficiency is 85%, meaning 15% of the maximum theoretical power is lost. Lost power = (1 - 0.85) * 500 kW = 0.15 * 500 kW = 75 kW."}, {"text": "425 kW", "isCorrect": false, "rationale": "This is the output power (85% of 500 kW), not the power lost."}, {"text": "500 kW", "isCorrect": false, "rationale": "This is the maximum theoretical power, not the power lost."}, {"text": "15 kW", "isCorrect": false, "rationale": "This value is incorrect; it would be 3% of the maximum power if 15% was the output."}], "id": "q05"}, {"question": "Which of the following is NOT listed in the text as a typical ecological impact of a hydroelectric dam on river ecosystems?", "options": [{"text": "Disruption of fish migration patterns.", "isCorrect": false, "rationale": "The text explicitly states, 'Fish migration patterns are disrupted'."}, {"text": "Starvation of downstream ecosystems due to trapped sediment.", "isCorrect": false, "rationale": "The text states, 'sediment is trapped behind the dam, and downstream ecosystems may be starved of nutrients'."}, {"text": "Introduction of invasive species from foreign waters.", "isCorrect": true, "rationale": "While a potential ecological issue for dams in general, the provided text does not mention the introduction of invasive species."}, {"text": "Changes in water flow, temperature, and oxygen levels.", "isCorrect": false, "rationale": "The text mentions the dam 'changes water flow, temperature, and oxygen levels, which affect the organisms that depend on the river'."}], "id": "q06"}, {"question": "The 'Big Picture' section emphasizes that 'Every real-world problem requires knowledge from multiple branches of science.' Which statement best exemplifies this concept within the context of the hydroelectric dam?", "options": [{"text": "The dam's construction relies solely on principles of mechanical engineering and geology for structural integrity.", "isCorrect": false, "rationale": "This statement ignores the broad interdisciplinary nature highlighted by the text, which emphasizes the water cycle, chemistry, physics of energy, and biological impacts."}, {"text": "The efficiency of energy conversion in the generator is the only factor determining a dam's overall success in providing power.", "isCorrect": false, "rationale": "While efficiency is important, the text makes it clear that success also depends on upstream processes (water cycle, chemistry) and downstream impacts (biology), not just physics of conversion."}, {"text": "Understanding the sun's role in the water cycle, water's chemical properties, physical energy transformations, and ecological impacts is all necessary for a complete analysis.", "isCorrect": true, "rationale": "This statement comprehensively includes all the major scientific branches and their contributions to the hydroelectric dam's function and impact, directly aligning with the 'Big Picture' message."}, {"text": "The primary goal of a dam is to produce electricity, so only physics principles are relevant to its operation and evaluation.", "isCorrect": false, "rationale": "This contradicts the core message of the entire section, which is about cross-branch analysis and the interconnectedness of scientific disciplines."}], "id": "q07"}, {"question": "A proposed dam site would flood a forest that absorbs 20,000 kg of CO2 per year. The dam's clean electricity production is estimated to prevent 30,000 kg of CO2 emissions annually compared to fossil fuel alternatives. Based ONLY on the carbon footprint information given, what is the net effect on CO2 emissions if the dam is built?", "options": [{"text": "A net increase of 10,000 kg of CO2 emissions annually.", "isCorrect": false, "rationale": "This would be the case if the dam caused more emissions than it prevented (e.g., if prevention was 20k and loss was 30k)."}, {"text": "A net decrease of 10,000 kg of CO2 emissions annually.", "isCorrect": true, "rationale": "The dam prevents 30,000 kg of CO2, but the flooded forest no longer absorbs 20,000 kg. The net effect is a reduction of 30,000 kg - 20,000 kg = 10,000 kg of CO2 emissions."}, {"text": "A neutral effect on CO2 emissions.", "isCorrect": false, "rationale": "This would only be true if the prevented emissions exactly equaled the lost absorption."}, {"text": "A net increase of 50,000 kg of CO2 emissions annually.", "isCorrect": false, "rationale": "This would imply adding the prevented emissions to the lost absorption, which is incorrect for a net calculation."}], "id": "q08"}, {"question": "According to the text, what happens to the energy that is 'lost' due to the 85% efficiency of the hydroelectric dam system?", "options": [{"text": "It is destroyed during the energy conversion process, demonstrating that energy is not always conserved.", "isCorrect": false, "rationale": "The text explicitly states that 'The remaining 15%... is converted to thermal energy... consistent with the conservation of energy'."}, {"text": "It is converted into unusable forms of chemical potential energy within the water molecules.", "isCorrect": false, "rationale": "The text does not mention conversion to chemical potential energy for the lost energy."}, {"text": "It is converted into thermal energy by friction in the pipes, turbine, and generator.", "isCorrect": true, "rationale": "The text states, 'The remaining 15%... is converted to thermal energy by friction in the pipes, turbine, and generator'."}, {"text": "It is stored as potential energy in the dam structure itself, increasing its structural integrity.", "isCorrect": false, "rationale": "Energy loss due to inefficiency is not stored in the dam structure; it's dissipated."}], "id": "q09"}, {"question": "Which sequence correctly describes the primary energy transformations in a hydroelectric dam system, starting from the water stored at high elevation?", "options": [{"text": "Chemical energy → Gravitational PE → Electrical energy → Kinetic energy.", "isCorrect": false, "rationale": "This sequence starts with chemical energy and has an incorrect order of kinetic and electrical energy."}, {"text": "Gravitational PE → Kinetic energy → Mechanical energy → Electrical energy.", "isCorrect": true, "rationale": "The text describes water at high elevation having gravitational PE, converting to kinetic energy as it flows, which drives a turbine (mechanical energy), and then a generator converts this to electrical energy."}, {"text": "Thermal energy → Gravitational PE → Mechanical energy → Chemical energy.", "isCorrect": false, "rationale": "This sequence starts with thermal energy and ends with chemical energy, which are incorrect for the primary transformations."}, {"text": "Kinetic energy → Gravitational PE → Electrical energy → Thermal energy.", "isCorrect": false, "rationale": "This sequence incorrectly starts with kinetic energy and reverses the order of gravitational PE and kinetic energy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
