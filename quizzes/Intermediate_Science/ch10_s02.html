        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 10, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The primary reason the 2010 Chile earthquake, despite its higher magnitude, resulted in a much lower death toll than the 2010 Haiti earthquake was due to which of the following?", "options": [{"text": "Stronger natural geological formations in Chile that absorb seismic energy.", "isCorrect": false, "rationale": "While geological formations determine earthquake occurrence, the text explicitly states the primary reason for lower casualties in Chile was the design of its buildings, not inherent geological strength in mitigating building damage."}, {"text": "Buildings in Chile being specifically designed to withstand earthquake forces.", "isCorrect": true, "rationale": "The text directly states, 'One major reason: Chile's buildings were designed to withstand earthquakes,' as the key factor for the lower death toll despite the quake's magnitude."}, {"text": "A lower population density in the affected areas of Chile compared to Haiti.", "isCorrect": false, "rationale": "Population density is not mentioned in the text as a primary reason for the differential death toll related to building survival."}, {"text": "Chile's advanced national disaster response and evacuation systems.", "isCorrect": false, "rationale": "The text focuses on building design as the primary factor for survivability and lower death toll, not post-disaster response efficiency."}], "id": "q01"}, {"question": "An engineer designing a building to withstand an earthquake would be most concerned with surface waves because:", "options": [{"text": "They are the fastest seismic waves, providing the least warning time before impact.", "isCorrect": false, "rationale": "P-waves are the fastest seismic waves; surface waves are slower but cause the most damage."}, {"text": "They primarily compress and stretch the ground in the direction of travel, causing vertical stress.", "isCorrect": false, "rationale": "This describes the motion of P-waves, not surface waves."}, {"text": "They shake the ground side to side, perpendicular to their direction of travel.", "isCorrect": false, "rationale": "This describes the motion of S-waves, not surface waves."}, {"text": "They combine both compressional and shear motions, leading to the most structural damage.", "isCorrect": true, "rationale": "The text states, 'Surface waves combine both motions and cause the most damage,' making them the primary concern for structural engineers."}], "id": "q02"}, {"question": "According to Newton's second law ($F = ma$), which of the following design choices would best reduce the force experienced by a building during ground acceleration caused by an earthquake?", "options": [{"text": "Increasing the building's overall mass to create more inertia and stability.", "isCorrect": false, "rationale": "According to F=ma, increasing mass (m) for the same acceleration (a) would result in a greater force (F), not a reduced one. The text explicitly states, 'A heavier building experiences a greater force for the same ground motion.'"}, {"text": "Using heavier, more rigid materials throughout the structure to prevent deformation.", "isCorrect": false, "rationale": "Heavier materials increase the building's mass, which, as per F=ma, would increase the force experienced during ground acceleration."}, {"text": "Implementing base isolation systems to reduce the acceleration transmitted to the structure.", "isCorrect": true, "rationale": "The text explains that 'base isolation systems... allow the ground to slide beneath the building, reducing the acceleration transmitted to the structure.' Reducing 'a' directly reduces 'F' as per Newton's second law."}, {"text": "Designing taller structures to dissipate energy over a greater height.", "isCorrect": false, "rationale": "While building height affects dynamic response, the text's explanation of F=ma specifically points to reducing mass or acceleration to reduce force, not height directly for this purpose."}], "id": "q03"}, {"question": "Steel is preferred over unreinforced concrete for the primary structural framework of earthquake-resistant buildings because:", "options": [{"text": "Steel has an ionic bonding structure that allows it to resist compression better than concrete.", "isCorrect": false, "rationale": "Steel has metallic bonding, not ionic. Unreinforced concrete is strong in compression, but steel's advantage is ductility."}, {"text": "Steel's metallic bonding allows delocalized electrons to facilitate ductile deformation.", "isCorrect": true, "rationale": "The text states that steel's 'metallic bonding structure... makes steel ductile — it can bend and stretch without breaking,' which is crucial for earthquake resistance."}, {"text": "Unreinforced concrete is too heavy, thereby increasing the forces on the building due to inertia.", "isCorrect": false, "rationale": "While weight is a factor, the primary reason for steel's preference over unreinforced concrete (as discussed in the Chemistry section) is steel's ductility, which concrete lacks."}, {"text": "Steel is a better thermal insulator, protecting occupants from heat during an earthquake.", "isCorrect": false, "rationale": "The text does not mention thermal insulation as a reason for steel's preference in earthquake resistance."}], "id": "q04"}, {"question": "The concept of 'inter-story drift' in building codes, which limits how much one floor can shift relative to another, is directly linked to which life science consideration?", "options": [{"text": "Preventing the collapse of internal organ systems due to excessive twisting of the torso.", "isCorrect": false, "rationale": "While twisting can cause injury, inter-story drift directly addresses the impact of sudden acceleration/deceleration on the body and its organs, not necessarily twisting of the torso itself."}, {"text": "Minimizing the risk of musculoskeletal injuries from falling debris within the building.", "isCorrect": false, "rationale": "Inter-story drift focuses on the building's movement and its direct effect on occupants, not the risk from falling debris."}, {"text": "Reducing the likelihood of concussions and other internal injuries caused by rapid acceleration and deceleration of occupants.", "isCorrect": true, "rationale": "The text explains that 'violent acceleration can cause internal injuries — the brain...can collide with the skull wall during rapid deceleration, causing a concussion.' Limiting inter-story drift directly addresses these forces on the human body."}, {"text": "Ensuring sufficient light and air circulation for survivors trapped inside after a quake.", "isCorrect": false, "rationale": "This relates to post-quake survival conditions, not the immediate injury prevention that inter-story drift limits aim to achieve."}], "id": "q05"}, {"question": "An engineer is designing a critical emergency response center in a highly seismic zone. Considering all four branches of science, which combination of design features would be most effective?", "options": [{"text": "Building on a rigid bedrock foundation (Earth Science) and using brittle materials like unreinforced concrete (Chemistry).", "isCorrect": false, "rationale": "Unreinforced concrete is brittle and would fail in an earthquake, making this an ineffective combination."}, {"text": "Utilizing lighter materials to reduce inertia (Physics) and installing a tuned mass damper (Physics) while ignoring the specific characteristics of seismic wave types (Earth Science).", "isCorrect": false, "rationale": "Ignoring seismic wave types would lead to an incomplete and potentially inadequate design, as different waves cause different forces."}, {"text": "Incorporating base isolation systems (Physics), constructing with steel-reinforced concrete (Chemistry), and ensuring the building can tolerate accelerations within human physiological limits (Life Science).", "isCorrect": true, "rationale": "This option integrates all four branches: Physics (base isolation for reduced acceleration), Chemistry (reinforced concrete for ductility and strength), and Life Science (human physiological limits for safety standards), while implicitly acknowledging Earth Science by being in a 'highly seismic zone.'"}, {"text": "Prioritizing a quick evacuation plan (Life Science) and constructing with the heaviest possible materials to anchor the building (Physics).", "isCorrect": false, "rationale": "Constructing with the heaviest materials would increase the force on the building (F=ma) during an earthquake, making it a poor design choice."}], "id": "q06"}, {"question": "When seismic waves cause the ground to move during an earthquake, the upper floors of a building tend to try and remain in their original position relative to the ground. This phenomenon is best explained by:", "options": [{"text": "Newton's third law of action-reaction.", "isCorrect": false, "rationale": "Newton's third law describes equal and opposite forces between two interacting objects, not a body's resistance to a change in its own motion."}, {"text": "The principle of conservation of momentum.", "isCorrect": false, "rationale": "While related to motion, conservation of momentum explains how total momentum remains constant in a closed system, not the initial resistance to motion itself."}, {"text": "The building's inherent elasticity and flexibility.", "isCorrect": false, "rationale": "Elasticity describes a material's ability to deform and return to its original shape, not the fundamental resistance to a change in motion."}, {"text": "Inertia, as described by Newton's first law.", "isCorrect": true, "rationale": "The text explicitly states, 'the ground moves but the building's mass resists the change in motion — this is inertia (Newton's first law). The base of the building accelerates with the ground, while the upper floors try to stay in place.'"}], "id": "q07"}, {"question": "Reinforced concrete is superior to unreinforced concrete for earthquake-resistant construction because:", "options": [{"text": "The steel rebar chemically bonds with the concrete to form a new, stronger composite material.", "isCorrect": false, "rationale": "The steel rebar is mechanically embedded within the concrete; they do not form a new chemical bond or compound."}, {"text": "Concrete's brittleness is completely eliminated by the addition of steel rebar.", "isCorrect": false, "rationale": "Concrete itself remains brittle in tension/bending, but the steel rebar provides the necessary ductility and tensile strength to compensate for this weakness."}, {"text": "The steel provides ductility and tensile strength, complementing concrete's compressive strength.", "isCorrect": true, "rationale": "The text clearly states, 'The concrete handles compression; the steel handles tension and bending. The combination works because the two materials' structures complement each other.'"}, {"text": "Steel rebar significantly reduces the overall mass of the building, thereby lessening seismic forces.", "isCorrect": false, "rationale": "Steel rebar adds mass to the concrete; its benefit is in providing strength and ductility, not reducing overall mass."}], "id": "q08"}, {"question": "Before an engineer begins designing an earthquake-resistant structure in a particular region, an understanding of plate tectonics and seismology is essential primarily for:", "options": [{"text": "Determining the most aesthetically pleasing architectural styles for the region.", "isCorrect": false, "rationale": "Aesthetics are not the primary engineering concern addressed by plate tectonics and seismology in this context."}, {"text": "Identifying the types of local construction materials available for use in the area.", "isCorrect": false, "rationale": "While practical, this is not the primary input from plate tectonics and seismology, which focus on earthquake characteristics."}, {"text": "Predicting where earthquakes are likely to occur, their potential intensity, and the direction of ground forces.", "isCorrect": true, "rationale": "The text states, 'An engineer designing a building in Chile must understand plate tectonics to know where earthquakes will occur, seismology to know how intensely the ground will shake, and the character of different wave types to know in which directions forces will act on the structure.'"}, {"text": "Calculating the precise geological age of the underlying bedrock for historical analysis.", "isCorrect": false, "rationale": "Geological age is not directly cited as a primary input for engineering design from plate tectonics/seismology in the text."}], "id": "q09"}, {"question": "The 730-ton steel pendulum (tuned mass damper) in Taipei 101 primarily functions to reduce building sway by:", "options": [{"text": "Magnetically stabilizing the building against the Earth's magnetic field during seismic events.", "isCorrect": false, "rationale": "The text does not mention magnetic stabilization; a tuned mass damper works through mechanical counter-motion."}, {"text": "Absorbing seismic wave energy through direct contact with the building's foundation.", "isCorrect": false, "rationale": "The pendulum is near the top of the building and counteracts motion through its swing, not by direct energy absorption at the foundation."}, {"text": "Swinging in the opposite direction of the building's motion, applying a counteracting force.", "isCorrect": true, "rationale": "The text explains, 'When wind or seismic forces push the building in one direction, the pendulum swings the opposite way, reducing the building's overall motion. This is Newton's third law and conservation of momentum applied to architecture.'"}, {"text": "Increasing the building's overall rigidity, making it less susceptible to bending forces.", "isCorrect": false, "rationale": "The pendulum works by counteracting motion, which implies allowing some flexibility, rather than increasing overall rigidity to prevent bending."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
