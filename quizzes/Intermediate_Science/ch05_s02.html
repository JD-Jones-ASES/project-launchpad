<script>
var QUESTIONS = [{"question": "How does the principle of density, as described in the Earth Science Lens, explain why magma moves upwards through Earth's crust?", "options": [{"text": "Magma solidifies rapidly upon heating, creating pressure that pushes it upwards.", "isCorrect": false, "rationale": "Magma is molten rock; it is less dense when molten due to expansion, not solidification."}, {"text": "Magma expands when heated, increasing its volume and thereby becoming less dense than the surrounding solid rock, which creates a buoyant force.", "isCorrect": true, "rationale": "The text explicitly states that heating causes molten rock to expand (increase V), which decreases its density (m/V) compared to solid rock, leading to buoyancy."}, {"text": "Magma is pulled upwards by gravitational forces from the Earth's core, which creates a vacuum effect.", "isCorrect": false, "rationale": "Gravity pulls matter downwards; magma rises due to buoyancy, not a pull from the core or a vacuum effect."}, {"text": "Magma is more massive than the surrounding rock, causing it to displace the less massive crustal material.", "isCorrect": false, "rationale": "While magma displaces rock, it does so because it is less dense, not more massive. More massive usually implies greater density, which would cause sinking."}], "id": "q01"}, {"question": "A newly observed volcano frequently erupts explosively, ejecting large amounts of ash and fragmented rock. Based on the Chemistry Lens, what can be inferred about the lava's composition and behavior?", "options": [{"text": "The lava is rich in iron and magnesium, making it exceptionally dense and difficult to flow.", "isCorrect": false, "rationale": "While iron and magnesium contribute to density, the text links explosive eruptions primarily to silica content, not just general density."}, {"text": "The lava has a high content of silica, making it thick and sticky, which traps gases and leads to explosive eruptions.", "isCorrect": true, "rationale": "The text states that 'Lava rich in silica (SiO2) is thick and sticky, trapping gas bubbles and producing explosive eruptions.'"}, {"text": "The lava primarily consists of water vapor and carbon dioxide, which are highly reactive and cause violent chemical explosions.", "isCorrect": false, "rationale": "Water vapor and carbon dioxide are volcanic gases, not the primary constituents of lava itself, though they contribute to the explosive force when trapped."}, {"text": "The lava has a low silica content, allowing gases to escape easily and resulting in a rapid, fluid eruption.", "isCorrect": false, "rationale": "Low silica lava flows freely, producing gentle eruptions, which contradicts the observation of an explosive eruption."}], "id": "q02"}, {"question": "If a volcanic bomb is launched straight upward, which of the following best describes the physics principle that primarily determines its maximum height?", "options": [{"text": "The buoyant force exerted by the atmosphere, which lifts the bomb higher than its initial momentum.", "isCorrect": false, "rationale": "While air resistance exists, the primary force determining the maximum height of a projectile after launch is gravity, not buoyancy."}, {"text": "The constant force of Earth's gravity accelerating the bomb downwards, opposing its initial upward velocity until it momentarily reaches zero.", "isCorrect": true, "rationale": "The text uses kinematic equations involving acceleration due to gravity (-9.8 m/s^2) to calculate the maximum height reached when the final velocity (vf) is zero."}, {"text": "The conservation of mass, ensuring that the bomb's mass remains constant regardless of its altitude.", "isCorrect": false, "rationale": "Conservation of mass is a principle, but it doesn't directly determine the maximum height of a projectile against gravity."}, {"text": "The density difference between the volcanic bomb and the surrounding air, which dictates its ultimate trajectory.", "isCorrect": false, "rationale": "Density difference is relevant for buoyant objects or how air resistance affects trajectory, but gravity is the dominant force determining maximum height for a solid projectile."}], "id": "q03"}, {"question": "At the cellular level, why are living cells immediately unable to survive the extreme heat of a lava flow, as explained in the Life Science Lens?", "options": [{"text": "The heat causes their DNA to mutate rapidly, leading to immediate genetic collapse and cell death.", "isCorrect": false, "rationale": "While heat can damage DNA, the text highlights the immediate effects on proteins and cell membranes as the primary causes of rapid cell death."}, {"text": "The extreme temperatures denature essential proteins and compromise the structural integrity of cell membranes, leading to a loss of homeostasis.", "isCorrect": true, "rationale": "The text explicitly states that 'Extreme heat denatures proteins' and 'Cell membranes... lose their structure and become leaky,' resulting in the inability to maintain homeostasis and cell death."}, {"text": "The chemical composition of the lava directly poisons the cells, regardless of temperature.", "isCorrect": false, "rationale": "The text emphasizes the physical effect of extreme heat on cellular components rather than a direct chemical poisoning by lava constituents."}, {"text": "The lack of oxygen in the immediate vicinity causes immediate cellular suffocation and energy depletion.", "isCorrect": false, "rationale": "While lack of oxygen is lethal, the text's explanation for immediate cell death near lava focuses on the direct impact of heat on proteins and membranes."}], "id": "q04"}, {"question": "The Earth Science Lens explains that magma forms 'especially near plate boundaries and hotspots' due to convection currents in the mantle. This suggests a crucial connection between these processes and which larger Earth system phenomenon?", "options": [{"text": "The continuous changes in Earth's magnetic field, which influence magma flow.", "isCorrect": false, "rationale": "Earth's magnetic field is related to the core, not directly to mantle convection and magma formation at plate boundaries/hotspots as discussed in the text."}, {"text": "The movement of tectonic plates across Earth's surface, as they are driven by the same mantle convection responsible for heat transfer and rock melting.", "isCorrect": true, "rationale": "Mantle convection is the driving force behind plate tectonics, which is explicitly mentioned as the location for magma formation, indicating a direct link."}, {"text": "The varying composition of Earth's atmosphere, which creates pressure differences influencing magma chambers.", "isCorrect": false, "rationale": "Atmospheric composition is external to the deep Earth processes of magma formation and mantle convection."}, {"text": "The gravitational interaction with the Moon, which directly pulls magma upwards from the mantle.", "isCorrect": false, "rationale": "While the Moon influences tides, it doesn't directly pull magma upwards from the mantle to form volcanoes in the manner described."}], "id": "q05"}, {"question": "A planetary scientist observes a volcanic eruption on an exoplanet that produces very fluid lava flows, forming vast, flat plains. Based on the principles from the Chemistry Lens, which conclusion is most likely true about this exoplanet's lava?", "options": [{"text": "The lava is likely rich in highly volatile compounds, causing it to vaporize quickly upon eruption.", "isCorrect": false, "rationale": "Fluid lava is linked to low viscosity, which in turn is linked to silica content, not necessarily high volatility of other compounds."}, {"text": "The lava has a low silica (SiO2) content, allowing gases to escape easily and resulting in effusive, non-explosive eruptions.", "isCorrect": true, "rationale": "The text states that 'Lava with less silica flows more freely, producing the gentle lava flows of shield volcanoes,' which matches the description of fluid lava forming flat plains."}, {"text": "The lava contains high concentrations of heavy elements like iron, making it extremely dense and causing it to spread rapidly.", "isCorrect": false, "rationale": "While heavier elements contribute to density, the text links fluid flow primarily to low silica content and its effect on viscosity, not just density."}, {"text": "The eruption is powered by an abundance of sulfur dioxide (SO2), which creates a strong propulsive force.", "isCorrect": false, "rationale": "Sulfur dioxide is a volcanic gas, not the primary determinant of lava's viscosity or flow characteristics."}], "id": "q06"}, {"question": "A seismometer located 400 km from a volcanic eruption detects P-waves 50 seconds after the event. What is the average speed of these P-waves, and how does this observation connect to the Earth Science Lens?", "options": [{"text": "10 km/s; this speed is consistent with P-wave travel through Earth's liquid outer core.", "isCorrect": false, "rationale": "The calculation (400km/50s = 8 km/s) is incorrect, and P-waves slow down or are refracted by the liquid outer core, not typically associated with these speeds from a surface event."}, {"text": "8 km/s; this speed is consistent with P-wave travel through Earth's upper mantle, providing insight into Earth's internal structure.", "isCorrect": true, "rationale": "The calculation (400,000 m / 50 s = 8,000 m/s or 8 km/s) is correct, and the text confirms this speed 'is consistent with the P-wave speeds in the upper mantle that you learned about in Unit 2.'"}, {"text": "6 km/s; indicating the eruption occurred at a shallow depth within the crust.", "isCorrect": false, "rationale": "The calculation (400km/50s = 8 km/s) is incorrect. P-wave speeds in the crust are generally lower, but the given speed points to the mantle."}, {"text": "7 km/s; proving the eruption generated unusually slow seismic waves due to its immense power.", "isCorrect": false, "rationale": "The calculation (400km/50s = 8 km/s) is incorrect, and wave speed is primarily determined by the medium, not the power of the source."}], "id": "q07"}, {"question": "Following a major volcanic eruption that devastates an ecosystem, pioneer organisms like bacteria and mosses are among the first to colonize the cooled lava. How do the fundamental cellular processes mentioned in the Life Science Lens enable this recolonization?", "options": [{"text": "They develop entirely new structures, such as thick exoskeletons, to withstand the harsh environment.", "isCorrect": false, "rationale": "The text focuses on existing cellular processes, not the development of entirely new structures like exoskeletons."}, {"text": "Through diffusion and osmosis, they efficiently acquire water and nutrients, and through mitosis/binary fission, they reproduce and spread to establish new populations.", "isCorrect": true, "rationale": "The text specifically mentions these processes: 'diffusion and osmosis move water and nutrients across membranes' and 'cells divide by mitosis to grow and repair tissue' (analogous to binary fission in bacteria)."}, {"text": "They undergo rapid genetic mutations to become resistant to residual heat and toxic gases.", "isCorrect": false, "rationale": "While adaptation can occur, the text emphasizes the role of basic cellular processes like diffusion and division for immediate survival and growth, not primarily rapid mutation for resistance."}, {"text": "They convert the barren volcanic rock directly into ATP without needing cellular respiration.", "isCorrect": false, "rationale": "The text states 'mitochondria generate ATP through cellular respiration,' indicating these organisms still rely on respiration, not direct rock conversion."}], "id": "q08"}, {"question": "The 'sciconnection' section titled 'Four Branches, One Event' concludes that 'No single branch tells the whole story' of a volcanic eruption. What is the overarching message of this statement within the context of the entire section?", "options": [{"text": "Some aspects of volcanic eruptions are still beyond the current scope of scientific understanding.", "isCorrect": false, "rationale": "While true in general, the text's focus is on the integration of existing knowledge from different branches, not the limitations of current understanding."}, {"text": "A comprehensive understanding of complex natural phenomena necessitates the integration of concepts and insights from multiple scientific disciplines.", "isCorrect": true, "rationale": "The entire section demonstrates how each lens offers a partial, yet vital, perspective, and that 'Real scientific understanding requires all four working together.'"}, {"text": "Each scientific branch offers a unique and independent explanation for distinct phases of a volcanic eruption.", "isCorrect": false, "rationale": "The text explicitly counters this, stating 'No single branch tells the whole story,' emphasizing collaboration rather than independent explanations."}, {"text": "Only one or two key scientific branches are truly essential for grasping the fundamental mechanics of a volcano.", "isCorrect": false, "rationale": "The section is structured to show that all four branches are equally important and interconnected for a full understanding."}], "id": "q09"}, {"question": "The teacher's note connects the density argument for rising magma to a 'convection demonstration from Unit 2' where 'heated water rose because it was less dense.' What is the primary pedagogical purpose of drawing this comparison?", "options": [{"text": "To introduce the concept that magma is primarily composed of water, similar to the lab experiment.", "isCorrect": false, "rationale": "The analogy is about the physical principle of density and buoyancy, not the chemical composition of magma."}, {"text": "To suggest that laboratory experiments are inherently more accurate and reliable than observations of natural phenomena.", "isCorrect": false, "rationale": "The purpose is to show a shared principle, not to compare the accuracy of lab vs. real-world observations."}, {"text": "To emphasize that fundamental physical principles observed in simple, everyday systems also govern complex, large-scale planetary processes.", "isCorrect": true, "rationale": "The note explicitly states, 'This is an excellent opportunity to reinforce that the same physical principle operates in a beaker of colored water and inside a planet.'"}, {"text": "To highlight that convection is a unique phenomenon specific to liquids, not solids like Earth's mantle.", "isCorrect": false, "rationale": "The text in the Earth Science Lens clearly describes convection currents in the mantle (hot rock), contradicting this option."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
