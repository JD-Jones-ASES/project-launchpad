<script>
var QUESTIONS = [{"question": "What overarching theme or principle is explicitly stated as common to all medical imaging technologies discussed in the section?", "options": [{"text": "They all rely on the absorption of high-energy radiation.", "isCorrect": false, "rationale": "This is incorrect. While X-rays use high-energy radiation, ultrasound uses sound waves and MRI uses magnetic fields and radio waves, neither of which are high-energy ionizing radiation. The principle of absorption varies greatly."}, {"text": "They all involve the transfer of information.", "isCorrect": true, "rationale": "This is correct. The text explicitly states, 'they all share the theme of Cycle 4 — they all depend on information transfer,' whether it's encoded by EM waves, sound waves, or magnetic signals."}, {"text": "They all produce real-time moving images.", "isCorrect": false, "rationale": "This is incorrect. While ultrasound can produce real-time images, standard X-rays typically produce static 'shadow images' and MRI scans are also typically static cross-sections, not continuous moving images."}, {"text": "They all utilize magnetic fields to generate images.", "isCorrect": false, "rationale": "This is incorrect. Only Magnetic Resonance Imaging (MRI) uses powerful magnetic fields and radio waves. X-rays use electromagnetic waves and ultrasound uses sound waves."}]}, {"question": "In X-ray imaging, why do bones appear white on the resulting image?", "options": [{"text": "Bones emit their own X-rays when stimulated, which are detected as white.", "isCorrect": false, "rationale": "This is incorrect. Bones do not emit X-rays; they primarily absorb them. The X-rays are emitted by the X-ray machine."}, {"text": "Bones are less dense than soft tissues, allowing more X-rays to pass through to the detector.", "isCorrect": false, "rationale": "This is incorrect. Bones are significantly denser than soft tissues. Materials that allow more X-rays to pass through appear darker, not white."}, {"text": "Bones absorb a greater proportion of X-rays due to their higher density and atomic number.", "isCorrect": true, "rationale": "This is correct. The text states, 'dense materials like bone absorb more X-rays than soft tissue does' and 'Calcium in bones has a higher atomic number... so bones absorb more X-rays.' The absorbed X-rays don't reach the detector, making those areas appear white."}, {"text": "The calcium in bones fluoresces when exposed to X-rays, creating a white glow.", "isCorrect": false, "rationale": "This is incorrect. While some materials can fluoresce, this is not the mechanism described or the primary reason for bone's appearance in X-ray imaging. The effect is due to absorption."}]}, {"question": "A doctor is trying to diagnose an injury where a patient has a sprained ankle, and they suspect ligament damage rather than a bone fracture. Which statement best explains why a standard X-ray might not be the most informative initial imaging choice for this specific concern?", "options": [{"text": "X-rays use ionizing radiation, which is harmful for soft tissue evaluation.", "isCorrect": false, "rationale": "While X-rays use ionizing radiation, the primary reason they are not ideal for soft tissue is their limited ability to create contrast, not solely the radiation risk. Other modalities might also carry risks."}, {"text": "Ligaments have a low atomic number and density, making them difficult to differentiate from surrounding soft tissues on an X-ray.", "isCorrect": true, "rationale": "This is correct. X-rays are best for dense structures like bone because they absorb more X-rays. Soft tissues like ligaments, muscles, and organs have similar densities and atomic numbers, resulting in poor contrast and making it hard to visualize them distinctly."}, {"text": "X-rays only produce 2D images, and a sprain requires a 3D view for diagnosis.", "isCorrect": false, "rationale": "This is incorrect as the primary reason. While standard X-rays are 2D, the fundamental limitation for soft tissue is contrast, not merely dimensionality. Advanced X-ray techniques (CT scans) can produce 3D images but still rely on density differences."}, {"text": "The X-ray detector only records transmitted waves, not reflected waves, which are crucial for ligament imaging.", "isCorrect": false, "rationale": "This is incorrect. X-rays operate on absorption and transmission, not reflection for imaging internal structures. Reflection is the principle of ultrasound, which is indeed useful for soft tissues like ligaments."}]}, {"question": "According to the text's \"Information flow\" description for X-ray imaging, what role does the human body's tissues play in the process?", "options": [{"text": "The tissues generate the electromagnetic waves that form the image.", "isCorrect": false, "rationale": "This is incorrect. The X-ray machine is responsible for generating the electromagnetic (EM) waves."}, {"text": "The tissues encode information by sending EM waves to the detector.", "isCorrect": false, "rationale": "This is incorrect. The X-ray machine encodes information by sending the EM waves. The tissues modulate the beam, they don't encode or send the initial information to the detector."}, {"text": "The tissues modulate the X-ray beam by selectively absorbing certain wavelengths.", "isCorrect": true, "rationale": "This is correct. The text states, 'The body's tissues modulate the beam (some wavelengths pass through, others are absorbed),' meaning they alter the characteristics of the X-ray beam as it passes through."}, {"text": "The tissues decode the pattern of transmitted X-rays into an interpretable image.", "isCorrect": false, "rationale": "This is incorrect. The detector and a computer are responsible for decoding the pattern of transmitted and absorbed X-rays into an image."}]}, {"question": "Which physical phenomenon is central to how ultrasound imaging creates an image of internal body structures?", "options": [{"text": "The emission of radio waves from excited hydrogen nuclei.", "isCorrect": false, "rationale": "This phenomenon describes the core principle of Magnetic Resonance Imaging (MRI), not ultrasound."}, {"text": "The differential absorption of high-frequency electromagnetic waves by tissues.", "isCorrect": false, "rationale": "This phenomenon describes the core principle of X-ray imaging, not ultrasound. Ultrasound uses sound waves, not electromagnetic waves."}, {"text": "The reflection of sound waves at boundaries between different tissue types.", "isCorrect": true, "rationale": "This is correct. The text states, 'When the waves encounter a boundary between two different tissues... some of the wave energy reflects back (Unit 19: reflection). The probe detects these echoes...' This is the fundamental mechanism of ultrasound."}, {"text": "The detection of genetic mutations in DNA sequences.", "isCorrect": false, "rationale": "This describes genetic testing, which is not an imaging technology and does not rely on physical wave phenomena in this manner."}]}, {"question": "A key advantage of ultrasound imaging, particularly for monitoring pregnancy, is highlighted in the text. What is this advantage?", "options": [{"text": "It provides higher resolution images of bone structures compared to X-rays.", "isCorrect": false, "rationale": "This is incorrect. X-rays are generally superior for bone imaging due to their strong absorption by dense materials. Ultrasound is primarily used for soft tissues."}, {"text": "It uses ionizing radiation, which is essential for fetal development monitoring.", "isCorrect": false, "rationale": "This is incorrect. The text explicitly states, 'Ultrasound is especially useful for monitoring pregnancy because it does not use ionizing radiation (unlike X-rays).' Ionizing radiation is generally avoided during pregnancy due to potential risks to the fetus."}, {"text": "It allows for real-time visualization of movement and physiological processes without ionizing radiation.", "isCorrect": true, "rationale": "This is correct. The text notes that ultrasound 'does not use ionizing radiation' and 'can show a developing fetus in real time, revealing the heartbeat, movement, and growth,' making it a safe and dynamic imaging tool for pregnancy."}, {"text": "It directly measures chemical composition of tissues, which is crucial for early diagnosis of genetic disorders.", "isCorrect": false, "rationale": "This is incorrect. Ultrasound primarily provides structural and motion information based on sound wave reflection. While MRI can infer chemical environments, ultrasound does not directly measure chemical composition, and genetic testing is used for genetic disorders."}]}, {"question": "The fundamental principle behind Magnetic Resonance Imaging (MRI) relies on which property of atoms within the body?", "options": [{"text": "The ability of calcium to absorb X-rays.", "isCorrect": false, "rationale": "This describes the principle of X-ray imaging, not MRI."}, {"text": "The reflection of high-frequency sound waves.", "isCorrect": false, "rationale": "This describes the principle of ultrasound imaging, not MRI."}, {"text": "The magnetic behavior of hydrogen nuclei in water and fat molecules.", "isCorrect": true, "rationale": "This is correct. The text states, 'MRI uses powerful magnets and radio waves to create detailed images of soft tissues. The process exploits the fact that hydrogen atoms in water and fat molecules behave like tiny magnets.'"}, {"text": "The enzymatic reaction used to copy DNA segments.", "isCorrect": false, "rationale": "This describes a process within genetic testing (PCR), which is not related to MRI."}]}, {"question": "A patient presents with symptoms suggesting a possible brain tumor. Based on the information provided, which imaging technology would be most appropriate for obtaining detailed images of the brain tissue and why?", "options": [{"text": "X-ray, because it effectively images all types of dense and soft tissues.", "isCorrect": false, "rationale": "This is incorrect. X-rays are poor at imaging soft tissues like the brain effectively because they pass through without sufficient absorption to create contrast."}, {"text": "Ultrasound, because it is real-time and uses non-ionizing radiation.", "isCorrect": false, "rationale": "While ultrasound is safe and real-time, its penetration and resolution are generally limited for deep brain structures, making it less ideal than MRI for detailed tumor diagnosis in adults."}, {"text": "MRI, because it excels at creating detailed images of soft tissues like the brain.", "isCorrect": true, "rationale": "This is correct. The text highlights MRI's ability to 'create detailed images of soft tissues' and specifically lists 'brain tissue' as an anatomical structure it reveals. The 'Think Deeper' section also reinforces MRI (or CT) for brain issues."}, {"text": "Genetic testing, because it can identify the presence of a tumor through DNA analysis.", "isCorrect": false, "rationale": "This is incorrect. Genetic testing identifies mutations associated with diseases or predispositions, but it does not provide an image of a physical tumor or its exact location and size within the body in real-time."}]}, {"question": "What is the primary purpose of genetic testing as described in the section?", "options": [{"text": "To create cross-sectional images of internal organs.", "isCorrect": false, "rationale": "This is incorrect. Creating images of organs is the purpose of technologies like X-rays, ultrasound, and MRI, not genetic testing."}, {"text": "To analyze a patient's DNA for mutations associated with diseases.", "isCorrect": true, "rationale": "This is correct. The text explicitly states, 'Genetic testing (Unit 16) analyzes a patient's DNA to detect mutations associated with diseases such as sickle cell anemia, cystic fibrosis, or hereditary cancers.'"}, {"text": "To measure the reflection of sound waves from tissue boundaries.", "isCorrect": false, "rationale": "This is incorrect. This describes the principle of ultrasound imaging."}, {"text": "To detect the alignment and re-emission of radio waves by hydrogen nuclei.", "isCorrect": false, "rationale": "This is incorrect. This describes the principle of Magnetic Resonance Imaging (MRI)."}]}, {"question": "A patient arrives at the emergency room with a severe headache, confusion, and weakness on one side of their body, suggestive of a potential stroke or brain bleed. According to the \"Think Deeper\" guidance, which imaging technology would a doctor most likely order first and why?", "options": [{"text": "A standard X-ray, to quickly check for any bone fractures in the skull.", "isCorrect": false, "rationale": "This is incorrect. While X-rays can check for bone fractures, the patient's symptoms (headache, confusion, weakness) strongly suggest a problem within the brain's soft tissue (like a stroke or bleed), which X-rays cannot effectively image. The 'Think Deeper' guidance dismisses X-rays for this scenario."}, {"text": "An ultrasound, to visualize blood flow in the brain in real-time.", "isCorrect": false, "rationale": "This is incorrect. While ultrasound can assess some blood flow, it typically has limited penetration and resolution for a comprehensive view of deep brain structures in an adult in this acute scenario compared to MRI or CT. The 'Think Deeper' guidance does not suggest ultrasound for this."}, {"text": "An MRI (or CT scan), because it provides detailed images of soft tissues like the brain, revealing potential strokes, tumors, or bleeding.", "isCorrect": true, "rationale": "This is correct. The 'Think Deeper Guidance' states, 'A doctor would likely order an MRI (or CT scan, which is an advanced X-ray technique) because the patient's symptoms suggest a problem in the brain — possibly a stroke, tumor, or bleeding. ...MRI excels at imaging soft tissue...' CT is often faster in emergency settings."}, {"text": "Genetic testing, to determine if there's a hereditary predisposition to strokes or brain tumors.", "isCorrect": false, "rationale": "This is incorrect. Genetic testing identifies predispositions or specific genetic diseases. It is not used for acute diagnosis of a medical emergency like a stroke or brain bleed, which requires immediate visualization of the physical condition."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
