<script>
var QUESTIONS = [{"question": "According to the text, what is the primary benefit of classifying chemical reactions into basic types?", "options": [{"text": "It simplifies the memorization of all possible chemical compounds.", "isCorrect": false, "rationale": "While classification can aid understanding, the text explicitly states the benefit is about predicting products, not simplifying compound memorization."}, {"text": "It helps in predicting the products of reactions, even unfamiliar ones.", "isCorrect": true, "rationale": "The text states, 'Recognizing the pattern of a reaction helps you predict what products will form — even for reactions you have never seen before.'"}, {"text": "It allows chemists to halt unwanted reactions more easily.", "isCorrect": false, "rationale": "The text does not mention this as a primary benefit of classifying reaction types. The focus is on prediction of products."}, {"text": "It ensures that all chemical reactions occur at a predictable rate.", "isCorrect": false, "rationale": "Reaction classification does not directly determine reaction rates. Kinetics, not reaction type, governs reaction speed."}], "id": "q01"}, {"question": "Which of the following balanced chemical equations represents a synthesis (combination) reaction?", "options": [{"text": "2H₂O₂(aq) → 2H₂O(l) + O₂(g)", "isCorrect": false, "rationale": "This reaction shows a single compound breaking down into simpler substances, which is a decomposition reaction."}, {"text": "2Na(s) + Cl₂(g) → 2NaCl(s)", "isCorrect": true, "rationale": "In this reaction, two simpler substances (sodium and chlorine) combine to form a single, more complex product (sodium chloride), fitting the A + B → AB pattern for synthesis."}, {"text": "Zn(s) + CuSO₄(aq) → ZnSO₄(aq) + Cu(s)", "isCorrect": false, "rationale": "This reaction shows one element replacing another in a compound, which is a single replacement reaction."}, {"text": "AgNO₃(aq) + NaCl(aq) → AgCl(s) + NaNO₃(aq)", "isCorrect": false, "rationale": "This reaction involves the positive ions of two compounds switching partners, which is a double replacement reaction."}], "id": "q02"}, {"question": "A student performs an experiment where a single compound, mercury(II) oxide (HgO), is heated, resulting in the formation of liquid mercury (Hg) and oxygen gas (O₂). What type of reaction is this, and what energy input is typically required?", "options": [{"text": "Synthesis reaction; light energy", "isCorrect": false, "rationale": "This is not a synthesis reaction, as it involves a single compound breaking down, not two combining. While light can provide energy, decomposition reactions typically require heat, electricity, or light."}, {"text": "Decomposition reaction; heat energy", "isCorrect": true, "rationale": "The breaking down of a single compound into simpler substances is a decomposition reaction. The text specifically mentions heating mercury(II) oxide as an example of decomposition, indicating heat as the energy input."}, {"text": "Combustion reaction; no energy input required", "isCorrect": false, "rationale": "Combustion reactions involve a substance reacting with oxygen to produce oxides, typically CO₂ and H₂O, and are exothermic. This reaction is the breakdown of a compound, not its burning with O₂."}, {"text": "Single replacement reaction; electrical energy", "isCorrect": false, "rationale": "This is not a single replacement reaction, as no element is replacing another in a compound. While electrolysis uses electrical energy for decomposition, the example cited for HgO uses heat."}], "id": "q03"}, {"question": "Based on the concept of the activity series, which of the following reactions would NOT be expected to occur as a single replacement?", "options": [{"text": "Zn(s) + CuSO₄(aq) → ZnSO₄(aq) + Cu(s)", "isCorrect": false, "rationale": "The text provides this as an example where zinc replaces copper, indicating zinc is more reactive, so this reaction would occur."}, {"text": "Fe(s) + CuSO₄(aq) → FeSO₄(aq) + Cu(s)", "isCorrect": false, "rationale": "The text provides this as an example where iron replaces copper, indicating iron is more reactive, so this reaction would occur."}, {"text": "Mg(s) + 2HCl(aq) → MgCl₂(aq) + H₂(g)", "isCorrect": false, "rationale": "Although not explicitly in the examples, magnesium is generally more reactive than hydrogen, so it would replace hydrogen from an acid. This reaction would occur."}, {"text": "Cu(s) + ZnSO₄(aq) → no reaction", "isCorrect": true, "rationale": "The text explicitly states this reaction results in 'no reaction' because 'copper is less reactive than zinc, so no replacement occurs.' This demonstrates the principle of the activity series."}], "id": "q04"}, {"question": "A solution of silver nitrate is mixed with a solution of sodium chloride, leading to the immediate formation of a white solid precipitate. What type of reaction has occurred, and what is its general pattern?", "options": [{"text": "Synthesis; A + B → AB", "isCorrect": false, "rationale": "Synthesis reactions involve two simpler substances combining into one. This reaction involves two compounds reacting to form two new compounds, one of which precipitates."}, {"text": "Decomposition; AB → A + B", "isCorrect": false, "rationale": "Decomposition reactions involve a single compound breaking down. This reaction involves two compounds reacting."}, {"text": "Single replacement; A + BC → AC + B", "isCorrect": false, "rationale": "Single replacement involves one element replacing another in a compound. This reaction involves ions from two compounds switching partners."}, {"text": "Double replacement; AB + CD → AD + CB", "isCorrect": true, "rationale": "This reaction involves the positive ions of two compounds (AgNO₃ and NaCl) switching partners to form two new compounds (AgCl and NaNO₃), with AgCl forming a precipitate. This matches the general pattern and typical products of a double replacement reaction."}], "id": "q05"}, {"question": "Which of the following reactions is categorized as combustion?", "options": [{"text": "2H₂O(l) → 2H₂(g) + O₂(g)", "isCorrect": false, "rationale": "This is a decomposition reaction, where water breaks down into hydrogen and oxygen."}, {"text": "2Mg(s) + O₂(g) → 2MgO(s)", "isCorrect": false, "rationale": "While magnesium reacts with oxygen, forming an oxide and releasing light, the text specifically defines combustion for fuels (typically hydrocarbons) reacting with O₂ to produce CO₂ and H₂O. This is better classified as a synthesis reaction."}, {"text": "CH₄(g) + 2O₂(g) → CO₂(g) + 2H₂O(g)", "isCorrect": true, "rationale": "This reaction shows a hydrocarbon (methane, the fuel) reacting with oxygen gas to produce carbon dioxide and water, which perfectly matches the definition and general pattern of a combustion reaction provided in the text."}, {"text": "AgNO₃(aq) + NaCl(aq) → AgCl(s) + NaNO₃(aq)", "isCorrect": false, "rationale": "This is a double replacement reaction, producing a precipitate."}], "id": "q06"}, {"question": "Antoine Lavoisier is credited with establishing the law of conservation of mass. How did the decomposition of mercury(II) oxide (HgO) contribute to his understanding of this law?", "options": [{"text": "He showed that the mass of the original HgO was less than the combined mass of the mercury and oxygen produced, indicating mass was created.", "isCorrect": false, "rationale": "This statement contradicts the law of conservation of mass, which Lavoisier established, showing mass is neither created nor destroyed."}, {"text": "By carefully weighing the HgO reactant and the Hg and O₂ products, he demonstrated that the total mass before and after the reaction remained constant.", "isCorrect": true, "rationale": "The text states Lavoisier 'established the law of conservation of mass through meticulous experiments. By carefully weighing reactants and products in sealed containers, he showed that the total mass before a reaction equals the total mass after.' The decomposition of HgO was one such experiment."}, {"text": "He observed that mercury(II) oxide could only decompose with an external energy input, proving that energy and mass are interconvertible.", "isCorrect": false, "rationale": "While decomposition requires energy, Lavoisier's work focused on mass conservation, not energy-mass interconversion (which came much later with Einstein)."}, {"text": "He used this reaction to identify oxygen as the element responsible for combustion, which was unrelated to the conservation of mass.", "isCorrect": false, "rationale": "Lavoisier did identify oxygen's role in combustion using this and other reactions, but the question specifically asks about its contribution to the *law of conservation of mass*, which was demonstrated by weighing reactants and products."}], "id": "q07"}, {"question": "In the 'Five Reaction Types Lab', Station 1 involves burning a magnesium ribbon. Students observe a bright white light and the formation of a white powder. What type of reaction is this, and what is the primary evidence of a chemical change?", "options": [{"text": "Decomposition; production of heat and light", "isCorrect": false, "rationale": "This is not a decomposition reaction; magnesium is combining with oxygen. While heat and light are produced, the key evidence here for this specific reaction is the formation of a new substance."}, {"text": "Single replacement; dissolution of a solid", "isCorrect": false, "rationale": "This is not a single replacement reaction, and magnesium is reacting to form a new solid, not dissolving."}, {"text": "Synthesis; formation of a new substance (white powder) and light emission", "isCorrect": true, "rationale": "The burning of magnesium ribbon combines magnesium with oxygen to form magnesium oxide (a new white powder), which is a synthesis reaction. The bright white light is a clear indicator of energy change and thus a chemical reaction."}, {"text": "Combustion; change in state from solid to gas", "isCorrect": false, "rationale": "While it involves oxygen and light, the text specifically defines combustion for fuels (hydrocarbons) producing CO₂ and H₂O. Also, the product is a solid (MgO), not a gas."}], "id": "q08"}, {"question": "At Station 5 of the 'Five Reaction Types Lab', a candle flame extinguishes when covered by a glass jar. What does this observation tell us about combustion reactions?", "options": [{"text": "Combustion reactions are endothermic and require continuous energy input from the environment to sustain.", "isCorrect": false, "rationale": "Combustion reactions are typically exothermic, releasing energy, not requiring continuous input from the environment to sustain in this manner."}, {"text": "Combustion reactions cease when the fuel source is completely consumed, regardless of oxygen availability.", "isCorrect": false, "rationale": "While fuel consumption is important, the jar limits oxygen. The flame goes out due to lack of oxygen, not necessarily due to complete consumption of the wax."}, {"text": "Combustion reactions require oxygen gas as a reactant, and the limited supply under the jar leads to the reaction stopping.", "isCorrect": true, "rationale": "The text states combustion is a 'reaction in which a substance (the fuel) reacts with oxygen gas (O2).' The analysis question specifically asks to explain why the flame goes out under the jar, and the expected result confirms it's 'when O2 is consumed.'"}, {"text": "The glass jar creates an inert atmosphere that prevents any chemical reactions from occurring.", "isCorrect": false, "rationale": "The jar does not create an inert atmosphere; it simply limits the supply of one of the reactants (oxygen)."}], "id": "q09"}, {"question": "How can a student differentiate between a synthesis reaction and a decomposition reaction based solely on their general patterns?", "options": [{"text": "A synthesis reaction always produces a precipitate, while a decomposition reaction always releases a gas.", "isCorrect": false, "rationale": "Neither type of reaction always produces a precipitate or releases a gas. These are specific outcomes, not general pattern differentiators."}, {"text": "A synthesis reaction involves one complex reactant breaking into simpler products, while a decomposition reaction involves two or more simple reactants forming a complex product.", "isCorrect": false, "rationale": "This statement has the definitions reversed. Synthesis is A+B->AB (simpler to complex), and decomposition is AB->A+B (complex to simpler)."}, {"text": "A synthesis reaction combines two or more simpler substances into a single, more complex product (A + B → AB), while a decomposition reaction breaks a single compound into two or more simpler substances (AB → A + B).", "isCorrect": true, "rationale": "This correctly states the general patterns for both reaction types. Synthesis builds complexity, while decomposition reduces it."}, {"text": "A synthesis reaction requires an activity series, while a decomposition reaction requires an acid-base neutralization.", "isCorrect": false, "rationale": "The activity series is relevant for single replacement reactions, and acid-base neutralization is a type of double replacement reaction. These are not general pattern differentiators for synthesis and decomposition."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
