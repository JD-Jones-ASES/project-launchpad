    };

<body>
<div class="quiz-container">

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 26, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A population of deer is introduced to a new, isolated island habitat with abundant vegetation and no natural predators. Initially, their population would most likely exhibit which growth pattern?", "options": [{"text": "Stabilized growth around carrying capacity.", "isCorrect": false, "rationale": "Stabilized growth occurs after the population has approached its carrying capacity, which would not happen immediately in a new, resource-rich environment."}, {"text": "Logistic growth, showing an S-shaped curve.", "isCorrect": false, "rationale": "Logistic growth occurs when resources become scarce and limiting factors take effect, causing growth to slow. This would happen later, not initially, given abundant resources and no predators."}, {"text": "Exponential growth, characterized by a J-shaped curve.", "isCorrect": true, "rationale": "Exponential growth occurs when a population has unlimited resources, no predators, and no disease, leading to rapid, accelerating growth and a J-shaped curve. This matches the description of a new habitat with abundant resources and no predators."}, {"text": "A decline due to lack of genetic diversity.", "isCorrect": false, "rationale": "While genetic diversity can impact long-term population health, it is not the primary factor determining initial population growth pattern as described in the context of exponential vs. logistic models."}]}, {"question": "In a population exhibiting logistic growth, what does it mean when the population size reaches the carrying capacity (K) of its environment?", "options": [{"text": "The population's death rate significantly exceeds its birth rate.", "isCorrect": false, "rationale": "If the death rate significantly exceeded the birth rate, the population would decline below the carrying capacity, not stabilize at it."}, {"text": "The population's growth rate becomes constant but positive.", "isCorrect": false, "rationale": "As a population approaches carrying capacity, its growth rate slows down and approaches zero, meaning births roughly equal deaths, not that the growth rate remains positive."}, {"text": "The population has exhausted all its resources and is about to crash.", "isCorrect": false, "rationale": "Reaching carrying capacity means the environment can sustain that population size indefinitely, implying resources are sufficient to maintain it, not that they are exhausted to the point of a crash."}, {"text": "The birth rate approximately equals the death rate, leading to stabilization.", "isCorrect": true, "rationale": "The text states that 'At carrying capacity, the birth rate roughly equals the death rate, so the population stabilizes.'"}]}, {"question": "A severe outbreak of a highly contagious disease sweeps through a crowded urban pigeon population, causing a significant decline in numbers. This scenario best illustrates the impact of which type of limiting factor?", "options": [{"text": "Density-independent factor.", "isCorrect": false, "rationale": "Density-independent factors affect populations regardless of their size, such as natural disasters. Disease spread is intensified by density."}, {"text": "Environmental stochasticity.", "isCorrect": false, "rationale": "Environmental stochasticity refers to random fluctuations in environmental conditions. While disease can have random elements, its severity in this context is tied to population density, making it a density-dependent factor."}, {"text": "Density-dependent factor.", "isCorrect": true, "rationale": "The text explicitly lists 'Disease — pathogens spread faster in crowded populations' as a density-dependent factor because its severity increases with population density."}, {"text": "Human activity.", "isCorrect": false, "rationale": "While urban environments are shaped by human activity, the direct cause of the population decline here is the disease outbreak, which acts as a density-dependent limiting factor."}]}, {"question": "Following a sudden, widespread volcanic eruption that blanketed a region in ash, a population of small mammals experienced a drastic reduction in size, regardless of how sparse or dense their population was before the event. This event represents a:", "options": [{"text": "Density-dependent limiting factor, as resources would become scarce.", "isCorrect": false, "rationale": "The initial impact of a volcanic eruption (a natural disaster) affects individuals regardless of how dense the population is, making it density-independent. Resource scarcity might be a secondary, delayed effect, but the eruption itself is primary."}, {"text": "Predation pressure, increasing due to vulnerability.", "isCorrect": false, "rationale": "A volcanic eruption is a natural disaster, not a form of predation."}, {"text": "Density-independent limiting factor, affecting all individuals similarly.", "isCorrect": true, "rationale": "The text defines density-independent factors as those that 'affect populations regardless of their size,' and lists 'Natural disasters — floods, fires, hurricanes, volcanic eruptions' as examples."}, {"text": "Logistic growth phase, leading to population stabilization.", "isCorrect": false, "rationale": "A volcanic eruption causes a drastic reduction in population, which is a limiting factor, not a phase of population growth or stabilization."}]}, {"question": "In a classic predator-prey relationship like that of the snowshoe hare and Canada lynx, what is the typical pattern observed when graphed over time?", "options": [{"text": "Both predator and prey populations increase or decrease simultaneously.", "isCorrect": false, "rationale": "The text specifically mentions a 'time lag' between the changes in predator and prey populations."}, {"text": "The prey population curve lags behind the predator population curve.", "isCorrect": false, "rationale": "The predator population relies on the prey population, so changes in prey numbers precede changes in predator numbers, not vice-versa."}, {"text": "Both populations show stable, non-fluctuating numbers.", "isCorrect": false, "rationale": "The text describes 'two oscillating curves,' indicating fluctuations, not stability."}, {"text": "The predator population curve lags behind the prey population curve.", "isCorrect": true, "rationale": "The text states: 'The result is two oscillating curves, with the predator curve lagging behind the prey curve by one to two years.'"}]}, {"question": "A wildlife biologist captures and tags 60 migratory birds. A month later, she captures 80 birds and finds that 15 of them have tags. What is the estimated total population size of these birds?", "options": [{"text": "115", "isCorrect": false, "rationale": "This calculation is incorrect. It appears to be 60 + 80 - 15."}, {"text": "320", "isCorrect": true, "rationale": "Using the Lincoln-Petersen formula N = (M * C) / R, where M=60, C=80, R=15: N = (60 * 80) / 15 = 4800 / 15 = 320."}, {"text": "4800", "isCorrect": false, "rationale": "This is the product of M * C (originally marked * total captured), but it has not been divided by R (recaptured marked individuals)."}, {"text": "600", "isCorrect": false, "rationale": "This calculation is incorrect."}]}, {"question": "Which of the following is a crucial assumption that must be met for the mark-recapture method to provide an accurate estimate of population size?", "options": [{"text": "The population must be undergoing exponential growth.", "isCorrect": false, "rationale": "The growth pattern of the population (exponential, logistic, or stable) does not affect the validity of the mark-recapture method's assumptions regarding mixing or movement."}, {"text": "Marked individuals must lose their marks between captures.", "isCorrect": false, "rationale": "The method assumes that marks do not fall off or become unidentifiable, otherwise, it would lead to an overestimation of the population size."}, {"text": "No individuals should enter or leave the population between samples.", "isCorrect": true, "rationale": "The worked example notes: 'This method assumes... that no frogs enter or leave the population between samples.' Immigration or emigration would skew the proportion of marked individuals."}, {"text": "The second sample must be smaller than the first sample.", "isCorrect": false, "rationale": "The relative sizes of the samples are not a fundamental assumption for the method's accuracy, as long as both samples are large enough to be representative."}]}, {"question": "To estimate the population density of wild daisies in a meadow, a student places a square frame at several random locations and counts the daisies within each frame. This method is known as:", "options": [{"text": "Mark-recapture.", "isCorrect": false, "rationale": "Mark-recapture is used for mobile animals and involves tagging individuals, which is not practical or described for stationary plants like daisies."}, {"text": "Transect sampling.", "isCorrect": false, "rationale": "Transect sampling involves walking along a line to study distribution across a gradient, not placing random square frames to estimate density in a general area."}, {"text": "Random plot analysis.", "isCorrect": false, "rationale": "While the plots are random, 'quadrat sampling' is the specific and correct ecological term for this method."}, {"text": "Quadrat sampling.", "isCorrect": true, "rationale": "The text defines quadrat sampling as 'placing a square frame (a quadrat) at random locations within a habitat. The organisms inside each quadrat are counted... This method works well for plants and slow-moving organisms.'"}]}, {"question": "A researcher wants to study how the distribution and abundance of specific insect species change as they move from a dry, open field into a humid, forested edge. Which sampling method would be most appropriate for this investigation?", "options": [{"text": "Mark-recapture, to track individual insect movements.", "isCorrect": false, "rationale": "Mark-recapture is primarily for estimating population size, not for studying how species distribution changes across an environmental gradient."}, {"text": "Quadrat sampling, focusing on density in homogeneous areas.", "isCorrect": false, "rationale": "While useful for density, quadrat sampling at random locations might not effectively capture the changes along a clear environmental gradient as efficiently as a transect."}, {"text": "Transect sampling, to observe changes across an environmental gradient.", "isCorrect": true, "rationale": "The text states that transect sampling 'is useful for studying how species distribution changes across environmental gradients — for example, from the shore of a lake into deeper water, or from the edge of a forest into a meadow.'"}, {"text": "Direct counting of every insect, as it's the most accurate.", "isCorrect": false, "rationale": "Directly counting every insect in a large, diverse area is usually impossible and impractical, making sampling methods necessary."}]}, {"question": "The 'thinkdeeper' section asks about eliminating 90% of a lynx population and its effect on the predator-prey cycle. What core ecological principle does this scenario primarily illustrate?", "options": [{"text": "Exponential growth is unsustainable in the long term.", "isCorrect": false, "rationale": "While true, the scenario directly addresses the dynamics of the predator-prey cycle and the interdependence of species, not the general unsustainability of exponential growth."}, {"text": "Carrying capacity is fixed and unchangeable.", "isCorrect": false, "rationale": "The text mentions that carrying capacity often fluctuates due to changing environmental conditions, and this scenario is about disrupting a dynamic cycle, not the stability of K itself."}, {"text": "Populations in a community are interconnected through feeding relationships.", "isCorrect": true, "rationale": "The text explicitly states this principle immediately after describing predator-prey oscillations: 'These oscillations demonstrate an important ecological principle: populations in a community do not exist in isolation. They are linked through feeding relationships, and changes in one population ripple through the food web.'"}, {"text": "Density-independent factors are always more impactful than density-dependent ones.", "isCorrect": false, "rationale": "The scenario involves a drastic, hypothetical reduction of predators, which would dramatically impact the density-dependent predator-prey cycle, demonstrating their interaction rather than the superiority of one factor type."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
