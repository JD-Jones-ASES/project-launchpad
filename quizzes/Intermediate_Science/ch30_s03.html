        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "A scientist observes a single-celled organism under a microscope. It possesses ribosomes and a cell membrane but lacks a membrane-bound nucleus. Based on the provided vocabulary, which of the following statements most accurately describes this organism?", "options": [{"text": "It is a eukaryotic cell because it contains ribosomes.", "isCorrect": false, "rationale": "Ribosomes are present in both prokaryotic and eukaryotic cells. The defining characteristic of a eukaryotic cell is the presence of a membrane-bound nucleus, which this organism lacks according to the description."}, {"text": "It is a prokaryotic cell, and it could perform osmosis.", "isCorrect": true, "rationale": "Prokaryotic cells are defined as cells without a membrane-bound nucleus. All cells, including prokaryotes, have a cell membrane which is selectively permeable and thus capable of osmosis (the diffusion of water across it)."}, {"text": "It violates cell theory because it is single-celled.", "isCorrect": false, "rationale": "Cell theory states that all living things are made of cells, cells are the basic unit of life, and all cells come from pre-existing cells. Being single-celled does not violate cell theory; in fact, single-celled organisms are fundamental examples of life."}, {"text": "It must be an animal cell, as it lacks chloroplasts.", "isCorrect": false, "rationale": "Prokaryotic cells are not classified as animal cells. Furthermore, while animal cells lack chloroplasts, the absence of a nucleus is the primary distinguishing feature for prokaryotes mentioned, and not enough information is given to classify it specifically as an animal cell versus other cell types or domains."}]}, {"question": "Which term from Earth Science in Cycle 1 describes the continuous geological process where rocks are transformed between igneous, sedimentary, and metamorphic types?", "options": [{"text": "Convection current", "isCorrect": false, "rationale": "A convection current is a circular flow of material driven by heating and cooling, typically referring to processes within the Earth's mantle or atmosphere, not the transformation of rock types."}, {"text": "Mantle", "isCorrect": false, "rationale": "The mantle is a thick layer of hot rock within Earth's interior, not a process of rock transformation."}, {"text": "Magnetic field", "isCorrect": false, "rationale": "The magnetic field is a region around Earth where magnetic forces act, unrelated to the transformation of rock types."}, {"text": "Rock cycle", "isCorrect": true, "rationale": "The rock cycle is defined as 'the continuous process by which rocks are transformed between igneous, sedimentary, and metamorphic types,' directly matching the description in the question."}]}, {"question": "An atom of Carbon-14 ($^{14}C$) differs from an atom of Carbon-12 ($^{12}C$) primarily in its mass, with Carbon-14 being heavier. Based on the provided vocabulary from Chemistry Cycle 1, Carbon-14 is an example of what, relative to Carbon-12?", "options": [{"text": "An ion", "isCorrect": false, "rationale": "An ion is an atom that has gained or lost electrons, giving it a net electrical charge. The difference between Carbon-14 and Carbon-12 is in their neutron count, not electron count or charge."}, {"text": "An isotope", "isCorrect": true, "rationale": "Isotopes are defined as 'atoms of the same element with different numbers of neutrons.' Carbon-14 and Carbon-12 are both carbon (same atomic number, hence same number of protons) but have different numbers of neutrons, leading to different masses."}, {"text": "An atom with a different atomic number", "isCorrect": false, "rationale": "The atomic number is the number of protons, which determines the element's identity. Both Carbon-14 and Carbon-12 are carbon, meaning they have the same atomic number (6)."}, {"text": "An atom with different valence electrons", "isCorrect": false, "rationale": "Valence electrons are electrons in the outermost energy level and determine bonding behavior. While isotopes can have slightly different properties, their valence electron configuration is typically the same for the same element, and this is not the primary definition of an isotope."}]}, {"question": "A car is initially at rest. The driver presses the accelerator, and the car begins to move forward, steadily increasing its speed. Which physics concept from Cycle 2 best explains why a constant, forward force is required to keep increasing the car's speed?", "options": [{"text": "Inertia", "isCorrect": false, "rationale": "Inertia is the tendency of an object to resist changes in its state of motion. While inertia must be overcome to start or change motion, it doesn't directly explain why a *continuous force* leads to *continuous acceleration*."}, {"text": "Newton's Third Law", "isCorrect": false, "rationale": "Newton's Third Law describes action-reaction pairs (forces exerted by two objects on each other). It explains the forces involved but not the direct relationship between a net force and the acceleration of a single object."}, {"text": "Newton's Second Law", "isCorrect": true, "rationale": "Newton's Second Law states that 'the acceleration of an object is directly proportional to net force and inversely proportional to mass' ($F_net = ma$). To continuously increase speed (accelerate), a continuous net force in the direction of motion is required, as described by this law."}, {"text": "Momentum", "isCorrect": false, "rationale": "Momentum is the product of an object's mass and velocity ($p = mv$). While the car's momentum increases as its speed increases, momentum itself does not explain the cause-and-effect relationship between force and acceleration."}]}, {"question": "The human body maintains a constant internal temperature of approximately 37°C, despite external temperature fluctuations, by mechanisms like sweating or shivering. This regulation is an example of which fundamental biological principle from Cycle 2?", "options": [{"text": "Cell specialization", "isCorrect": false, "rationale": "Cell specialization is the process by which unspecialized cells develop into cells with specific structures and functions. While specialized cells are involved in temperature regulation, the overarching principle is not specialization itself."}, {"text": "Differentiation", "isCorrect": false, "rationale": "Differentiation is synonymous with cell specialization. It refers to the process of cells becoming specialized, not the maintenance of stable internal conditions."}, {"text": "Homeostasis", "isCorrect": true, "rationale": "Homeostasis is defined as 'the maintenance of stable internal conditions in an organism despite changes in the external environment.' The example of maintaining a stable body temperature perfectly fits this definition."}, {"text": "Positive feedback loop", "isCorrect": false, "rationale": "A negative feedback loop counteracts a change to maintain a set point. A positive feedback loop, in contrast, amplifies a change, moving the system further from the set point, which would be detrimental for temperature regulation in this context."}]}, {"question": "In a water molecule (H₂O), oxygen shares electrons unequally with hydrogen atoms, pulling the shared electrons closer to itself. This results in a slight negative charge on the oxygen atom and slight positive charges on the hydrogen atoms. This unequal sharing of electrons between oxygen and hydrogen primarily leads to what characteristic of the H-O bonds, according to the Chemistry Cycle 3 vocabulary?", "options": [{"text": "They are ionic bonds.", "isCorrect": false, "rationale": "Ionic bonds are formed by the transfer of electrons, not the sharing of them. In water, electrons are shared, albeit unequally."}, {"text": "They are nonpolar covalent bonds.", "isCorrect": false, "rationale": "Nonpolar covalent bonds involve the *even* sharing of electron pairs. The description explicitly states *unequal* sharing."}, {"text": "They are polar covalent bonds.", "isCorrect": true, "rationale": "The description of unequal sharing of electron pairs, leading to an uneven distribution of electrical charge, is the definition of a polar bond, specifically a polar covalent bond, as per the text's 'Polar / Nonpolar' definition."}, {"text": "They are primarily due to intermolecular forces.", "isCorrect": false, "rationale": "Intermolecular forces are attractions *between* molecules. The question describes the nature of the *bonds within* a single water molecule, not forces between different water molecules."}]}, {"question": "A persistent increase in atmospheric carbon dioxide levels is a major concern because carbon dioxide is a gas that effectively traps infrared radiation, preventing it from escaping into space. This leads to a warming of Earth's surface. What phenomenon from Earth Science in Cycle 3 does this scenario directly describe?", "options": [{"text": "The Coriolis effect", "isCorrect": false, "rationale": "The Coriolis effect describes the apparent deflection of moving objects (like wind and ocean currents) due to Earth's rotation, not the trapping of heat by gases."}, {"text": "Formation of a weather front", "isCorrect": false, "rationale": "A front is the boundary between two air masses of different temperatures and humidity, which is a meteorological phenomenon, but not the process of atmospheric warming due to gas properties."}, {"text": "The greenhouse effect", "isCorrect": true, "rationale": "The greenhouse effect is defined as 'the trapping of infrared radiation by atmospheric gases, warming Earth's surface,' which perfectly matches the description in the question."}, {"text": "Troposphere thinning", "isCorrect": false, "rationale": "The troposphere is the lowest atmospheric layer where weather occurs. While related to the atmosphere, 'troposphere thinning' is not a concept explicitly defined in the text, nor does it describe the warming mechanism presented."}]}, {"question": "A scientist observes a change in the nucleotide sequence of an organism's DNA, which, after being passed down, eventually leads to a new observable physical trait in its offspring. The initial alteration in the DNA sequence itself is best described as a:", "options": [{"text": "Gene", "isCorrect": false, "rationale": "A gene is a segment of DNA that codes for a specific protein. While the change occurs within a gene, 'gene' itself is not the term for the alteration."}, {"text": "Allele", "isCorrect": false, "rationale": "An allele is a variant form of a gene. A mutation can *create* a new allele, but the mutation itself is the change in the DNA sequence, not the resulting variant form."}, {"text": "Phenotype", "isCorrect": false, "rationale": "A phenotype is the observable trait of an organism, which is the *result* of the DNA change, not the change in the DNA sequence itself."}, {"text": "Mutation", "isCorrect": true, "rationale": "A mutation is defined as 'a change in the DNA sequence.' This directly matches the description of the initial alteration in the organism's DNA."}]}, {"question": "When light from air enters water, its path changes direction significantly. In a separate phenomenon, if two light waves travel through the same space and their crests align perfectly, they produce a brighter spot than either wave alone. The first phenomenon describes _________, while the second describes _________.", "options": [{"text": "Reflection; destructive interference", "isCorrect": false, "rationale": "Reflection is the bouncing of a wave off a surface, not its bending as it passes through a medium. Destructive interference occurs when waves cancel each other out, leading to a dimmer or dark spot, not a brighter one."}, {"text": "Refraction; constructive interference", "isCorrect": true, "rationale": "Refraction is defined as 'the bending of a wave as it passes from one medium to another,' which describes light changing direction from air to water. Constructive interference is defined as 'the combination of two waves, which can be constructive (amplitudes add),' resulting in a brighter spot when crests align."}, {"text": "Transverse wave; longitudinal wave", "isCorrect": false, "rationale": "These terms describe types of waves based on particle motion relative to wave travel, not the phenomena of bending or combining waves."}, {"text": "Wavelength; frequency", "isCorrect": false, "rationale": "Wavelength and frequency are properties of waves. The question describes interactions and changes in wave behavior, not just wave properties."}]}, {"question": "A population of bacteria is exposed to an antibiotic. Over several generations, a small number of bacteria with a natural genetic resistance to the antibiotic survive and reproduce at higher rates. Consequently, the proportion of resistant bacteria in the population increases significantly. This phenomenon is a prime example of which evolutionary mechanism from Cycle 5?", "options": [{"text": "Speciation", "isCorrect": false, "rationale": "Speciation is the formation of new species. While this process is part of evolution, the scenario describes changes within an existing population, not the creation of a new species."}, {"text": "Adaptation", "isCorrect": false, "rationale": "An adaptation is a *trait* that improves an organism's fitness. While antibiotic resistance is an adaptation, the question asks for the *mechanism* driving its increase, not the trait itself."}, {"text": "Homologous structures", "isCorrect": false, "rationale": "Homologous structures are anatomical features in different species that share a common evolutionary origin, unrelated to changes in population traits due to selective pressure."}, {"text": "Natural selection", "isCorrect": true, "rationale": "Natural selection is defined as 'the mechanism by which individuals with traits better suited to their environment survive and reproduce at higher rates.' The scenario perfectly describes this: resistant bacteria (better suited) survive and reproduce more, increasing their proportion."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
