    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 28, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary role of functional groups in organic chemistry?", "options": [{"text": "To reduce the overall size and complexity of organic molecules.", "isCorrect": false, "rationale": "Functional groups introduce complexity and distinctive properties, rather than reducing size or complexity in a general sense."}, {"text": "To serve as the main carbon backbone onto which hydrogen atoms are attached.", "isCorrect": false, "rationale": "The carbon backbone forms the structural core; functional groups are specific clusters of atoms *attached* to this backbone."}, {"text": "To give each molecule its distinctive chemical personality and determine its chemical properties and reactivity.", "isCorrect": true, "rationale": "The text explicitly states functional groups 'give each molecule its distinctive chemical personality' and 'determine the molecule's chemical properties and reactivity.'"}, {"text": "To ensure all organic molecules remain nonpolar and insoluble in water.", "isCorrect": false, "rationale": "Many functional groups, like hydroxyl and carboxyl, introduce polarity and can increase water solubility."}], "id": "q01"}, {"question": "Which of the following is a direct consequence of the hydroxyl group's polarity in alcohols?", "options": [{"text": "Alcohols typically have lower boiling points than hydrocarbons of similar size.", "isCorrect": false, "rationale": "The polarity of the hydroxyl group enables hydrogen bonding, which leads to *higher* boiling points, not lower."}, {"text": "The oxygen atom in the hydroxyl group readily donates a hydrogen ion, making alcohols strong acids.", "isCorrect": false, "rationale": "The carboxyl group donates H+ ions, making compounds acidic. Alcohols are generally neutral or very weakly acidic; the polarity primarily influences hydrogen bonding and solubility."}, {"text": "Small alcohols can form hydrogen bonds with water, increasing their solubility, and with other alcohol molecules, raising their boiling points.", "isCorrect": true, "rationale": "The text states that 'Alcohols can form hydrogen bonds with water and with other alcohol molecules, giving them higher boiling points... Small alcohols...are soluble in water because their hydroxyl groups interact favorably with water molecules.' This is a direct consequence of the -OH group's polarity."}, {"text": "The nonpolar hydrocarbon portion always dominates, making all alcohols insoluble in water.", "isCorrect": false, "rationale": "This is only true as the carbon chain grows longer; small alcohols are soluble due to the hydroxyl group's interactions with water."}], "id": "q02"}, {"question": "A chemist is analyzing two compounds: pentane (C5H12) and 1-pentanol (C5H11OH). Based on the text, what can be predicted about their properties?", "options": [{"text": "Pentane will have a significantly higher boiling point due to its symmetrical structure.", "isCorrect": false, "rationale": "Pentane is a hydrocarbon and lacks the ability to hydrogen bond, so it would have a lower boiling point than 1-pentanol."}, {"text": "1-pentanol will be completely insoluble in water because its carbon chain is relatively long.", "isCorrect": false, "rationale": "While solubility decreases with chain length, 'completely insoluble' is too strong. The hydroxyl group still allows for some interaction, making it more soluble than pentane."}, {"text": "1-pentanol will exhibit a higher boiling point than pentane due to hydrogen bonding capabilities introduced by the hydroxyl group.", "isCorrect": true, "rationale": "The text explains that the polar hydroxyl group allows alcohols to form hydrogen bonds, leading to 'higher boiling points than hydrocarbons of similar size.'"}, {"text": "Both compounds will have identical solubility characteristics in water since they both contain carbon and hydrogen.", "isCorrect": false, "rationale": "The hydroxyl group in 1-pentanol dramatically alters its solubility compared to the nonpolar pentane, even if that solubility is limited by the carbon chain."}], "id": "q03"}, {"question": "Which statement accurately describes a key characteristic of the carboxyl group (-COOH)?", "options": [{"text": "It consists of a carbon atom single-bonded to two oxygen atoms and a hydrogen atom, making it a strong base.", "isCorrect": false, "rationale": "The carboxyl group has a carbon double-bonded to one oxygen and single-bonded to a hydroxyl group. It acts as a weak acid, not a strong base."}, {"text": "It contains a lone pair of electrons on a nitrogen atom, allowing it to accept H+ ions.", "isCorrect": false, "rationale": "This describes the amino group, not the carboxyl group."}, {"text": "It can donate a hydrogen ion (H+) to a solution, defining the compound as an organic (carboxylic) acid.", "isCorrect": true, "rationale": "The text explicitly states the carboxyl group 'can donate a hydrogen ion (H+) to a solution, making it acidic,' thus characterizing organic acids."}, {"text": "It makes compounds nonpolar and highly resistant to dissolving in water.", "isCorrect": false, "rationale": "The carboxyl group is polar and contributes to water solubility, especially for smaller organic acids."}], "id": "q04"}, {"question": "If a solution containing an unknown organic compound is found to have a pH of 8.5, indicating it is basic, which functional group is most likely present?", "options": [{"text": "A hydroxyl group (-OH), as found in alcohols.", "isCorrect": false, "rationale": "Alcohols containing hydroxyl groups are generally neutral or very weakly acidic, not basic."}, {"text": "A carboxyl group (-COOH), as found in organic acids.", "isCorrect": false, "rationale": "Carboxyl groups make compounds acidic, lowering the pH below 7, not making them basic."}, {"text": "An amino group (-NH2), as found in amines.", "isCorrect": true, "rationale": "The text states that 'Because nitrogen has a lone pair of electrons, amines act as weak bases — they can accept a hydrogen ion from solution,' which would result in a basic pH."}, {"text": "A simple hydrocarbon chain, like in an alkane.", "isCorrect": false, "rationale": "Simple hydrocarbon chains are nonpolar and neutral, having no significant effect on solution pH."}], "id": "q05"}, {"question": "The text mentions that amino groups are 'critically important in biology.' What specific biological role is highlighted for them in conjunction with carboxyl groups?", "options": [{"text": "They form the primary components of complex carbohydrates like starch and cellulose.", "isCorrect": false, "rationale": "Carbohydrates are built from sugar monomers; amino and carboxyl groups are not their defining components."}, {"text": "They enable lipids to store large amounts of energy within biological systems.", "isCorrect": false, "rationale": "Lipids store energy, but their properties are primarily due to long hydrocarbon chains, not amino and carboxyl groups."}, {"text": "They define the structure of amino acids, the building blocks that link together to form proteins.", "isCorrect": true, "rationale": "The text explicitly states: 'Every amino acid has both an amino group (-NH2) and a carboxyl group (-COOH) attached to the same carbon atom — a structural arrangement that allows amino acids to link together in long chains.'"}, {"text": "They are responsible for the genetic information storage capacity of nucleic acids like DNA.", "isCorrect": false, "rationale": "Nucleic acids (DNA/RNA) store genetic information, but their building blocks are nucleotides, not primarily defined by amino and carboxyl groups in this context."}], "id": "q06"}, {"question": "The statement 'The same carbon backbone can produce entirely different substances depending on which functional group is attached' underscores which fundamental principle in organic chemistry?", "options": [{"text": "The dominance of the carbon-hydrogen framework in determining all molecular properties.", "isCorrect": false, "rationale": "This statement highlights the *opposite* – that functional groups, not just the C-H framework, dictate properties."}, {"text": "That organic chemists can easily convert any functional group into another.", "isCorrect": false, "rationale": "While conversions are possible, the principle is about the *impact* of different groups, not the ease of interconversion."}, {"text": "The ability of functional groups to impart distinct and predictable chemical behaviors to molecules.", "isCorrect": true, "rationale": "This directly reflects the text's emphasis: 'each functional group introduces a characteristic set of properties. Organic chemists can predict a molecule's behavior simply by identifying its functional groups.'"}, {"text": "The fact that most organic reactions lead to the breakdown of carbon backbones.", "isCorrect": false, "rationale": "This statement is not supported by the text and is irrelevant to the role of functional groups in determining properties."}], "id": "q07"}, {"question": "Which of the following accurately defines the relationship between a polymer and a monomer?", "options": [{"text": "A polymer is a small molecule that serves as a building block for larger, repeating units called monomers.", "isCorrect": false, "rationale": "This statement reverses the definitions. A monomer is the small building block, and a polymer is the large chain."}, {"text": "A monomer is a large molecule created by linking many smaller polymer units together.", "isCorrect": false, "rationale": "This also reverses the definitions. A polymer is the large molecule, composed of monomer units."}, {"text": "A polymer is a large molecule composed of many repeating smaller units called monomers.", "isCorrect": true, "rationale": "The text defines a 'Polymer [as] A large molecule made of many repeating smaller units (monomers) bonded together in a chain,' and 'Monomer [as] A small molecule that can bond with other identical or similar molecules to form a polymer.'"}, {"text": "Polymers and monomers are two different terms for the same class of large organic molecules.", "isCorrect": false, "rationale": "They are distinct concepts: monomer is the single repeating unit, polymer is the entire chain of many such units."}], "id": "q08"}, {"question": "Based on the examples provided in the text, which statement correctly identifies a polymer and its characteristic monomer unit?", "options": [{"text": "DNA is a polymer made of repeating amino acid units.", "isCorrect": false, "rationale": "DNA is a polymer, but its repeating units are nucleotides, not amino acids. Amino acids are monomers for proteins."}, {"text": "Polyethylene terephthalate (PET) is a polymer made of repeating glucose units.", "isCorrect": false, "rationale": "PET is a polymer, but it's made of repeating ester units, not glucose. Glucose is a monomer for carbohydrates."}, {"text": "Nylon is a polymer composed of repeating amide units.", "isCorrect": true, "rationale": "The text states: 'The nylon in a jacket is a polymer of repeating amide units.'"}, {"text": "Proteins are polymers made of repeating fatty acid units.", "isCorrect": false, "rationale": "Proteins are polymers, but they are made of repeating amino acid units. Fatty acids are components of lipids."}], "id": "q09"}, {"question": "According to the 'Physics Connection' box, what structural arrangement of polymer chains leads to a material being flexible and stretchy, like a rubber band?", "options": [{"text": "The polymer chains are aligned in parallel, forming crystalline regions.", "isCorrect": false, "rationale": "The text states that 'When chains are aligned in parallel (crystalline regions), the material is rigid and strong,' which is the opposite of flexible and stretchy."}, {"text": "The polymer chains are tangled randomly, forming amorphous regions, which can straighten when stretched.", "isCorrect": true, "rationale": "The text explains: 'When chains are tangled randomly (amorphous regions), the material is flexible and stretchy — like a rubber band. ...stretching a rubber band straightens its tangled polymer chains.'"}, {"text": "The material is primarily composed of individual monomers rather than long polymer chains.", "isCorrect": false, "rationale": "Elasticity and strength are properties of polymers (long chains), not individual monomers."}, {"text": "The polymer chains are heavily cross-linked with strong covalent bonds, preventing movement.", "isCorrect": false, "rationale": "While cross-linking can affect properties, the text specifically attributes flexibility and stretchiness to the random entanglement of chains, not heavy cross-linking which would typically increase rigidity."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
