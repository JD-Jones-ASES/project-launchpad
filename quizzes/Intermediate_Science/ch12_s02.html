    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 12, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What percentage of incoming solar energy is immediately reflected back into space upon reaching Earth, and what is the term for this reflective property?", "options": [{"text": "50%; thermal emission", "isCorrect": false, "rationale": "50% is the amount absorbed by the surface, not reflected, and thermal emission is the re-emission of energy, not the reflection of incoming energy."}, {"text": "20%; absorption rate", "isCorrect": false, "rationale": "20% is the amount absorbed by the atmosphere, not reflected, and absorption rate describes energy taken in, not reflected."}, {"text": "30%; albedo", "isCorrect": true, "rationale": "The text states that 'About 30% of incoming solar energy is immediately reflected back into space,' and defines 'albedo' as 'The fraction of incoming solar radiation that is reflected by a surface.'"}, {"text": "70%; radiative balance", "isCorrect": false, "rationale": "70% is the total amount of solar energy absorbed (20% by atmosphere + 50% by surface), not reflected. Radiative balance refers to the equilibrium between incoming and outgoing energy."}]}, {"question": "Considering the concept of albedo, which of the following scenarios would lead to the greatest absorption of solar energy by Earth's surface?", "options": [{"text": "A vast cloud cover reflecting sunlight.", "isCorrect": false, "rationale": "Clouds have a high albedo and reflect significant solar energy, leading to less absorption."}, {"text": "A large area of fresh snow in a mountain range.", "isCorrect": false, "rationale": "Fresh snow has a very high albedo (0.80–0.90), meaning it reflects most incoming sunlight and absorbs very little."}, {"text": "An extensive open ocean surface during a sunny day.", "isCorrect": true, "rationale": "The open ocean has a very low albedo (about 0.06), meaning it absorbs about 94% of the sunlight that strikes it, leading to the greatest absorption among the given options."}, {"text": "A thick layer of polar ice.", "isCorrect": false, "rationale": "Ice, like snow, has a high albedo, reflecting a large fraction of solar energy and absorbing less."}]}, {"question": "The melting of sea ice exposes darker ocean water, which absorbs more solar energy, leading to further warming and more ice melt. This process is best described as an example of a:", "options": [{"text": "Negative feedback loop.", "isCorrect": false, "rationale": "A negative feedback loop would counteract the initial change, moving towards stability, whereas this process amplifies the change."}, {"text": "Thermal equilibrium.", "isCorrect": false, "rationale": "Thermal equilibrium implies a stable state without further change, which is contrary to a process that leads to continuous warming and melting."}, {"text": "Convective current.", "isCorrect": false, "rationale": "A convective current describes heat transfer through fluid movement, not a self-reinforcing cycle of warming and melting."}, {"text": "Positive feedback loop.", "isCorrect": true, "rationale": "The text explicitly states this is 'an example of a positive feedback loop — a cycle in which the effect reinforces its own cause.'"}]}, {"question": "After solar energy is either reflected or absorbed by the atmosphere, the remaining energy absorbed by Earth's surface is primarily re-emitted as what type of radiation?", "options": [{"text": "Visible light.", "isCorrect": false, "rationale": "Visible light is primarily the form in which solar energy arrives; Earth's surface re-emits energy at longer wavelengths due to its temperature."}, {"text": "Ultraviolet (UV) radiation.", "isCorrect": false, "rationale": "UV radiation is a high-energy component of incoming solar radiation, but Earth's surface does not re-emit energy in this form."}, {"text": "Infrared (IR) radiation.", "isCorrect": true, "rationale": "The text states: 'The surface warms and re-emits energy as infrared radiation — invisible thermal energy that we feel as heat.'"}, {"text": "Gamma rays.", "isCorrect": false, "rationale": "Gamma rays are extremely high-energy radiation from nuclear processes, not emitted by Earth's surface as thermal energy."}]}, {"question": "The natural greenhouse effect is crucial for life on Earth because it:", "options": [{"text": "Prevents all solar radiation from reaching the surface.", "isCorrect": false, "rationale": "The greenhouse effect involves the absorption of outgoing infrared radiation, not the prevention of incoming solar radiation, which is mostly visible light."}, {"text": "Cools the Earth's surface to prevent overheating.", "isCorrect": false, "rationale": "The greenhouse effect warms the Earth; without it, Earth would be significantly colder, not cooler."}, {"text": "Traps enough heat to maintain a habitable average surface temperature.", "isCorrect": true, "rationale": "The text states: 'The natural greenhouse effect keeps Earth warm enough for liquid water and life,' and 'Without the greenhouse effect, Earth's average surface temperature would be approximately -18°C instead of the current +15°C.'"}, {"text": "Creates the ozone layer to block harmful UV radiation.", "isCorrect": false, "rationale": "The ozone layer is a separate atmospheric feature that absorbs UV radiation, distinct from the greenhouse effect's warming mechanism involving infrared radiation."}]}, {"question": "Which of the following sequences accurately describes a key step in how the greenhouse effect warms Earth's lower atmosphere?", "options": [{"text": "Sunlight directly heats greenhouse gas molecules, which then radiate heat to the surface.", "isCorrect": false, "rationale": "Sunlight (mostly visible light) primarily warms the surface first, not the greenhouse gases directly, and gases then absorb IR emitted by the surface."}, {"text": "Earth's surface emits visible light, which is absorbed by greenhouse gases and re-emitted as UV radiation.", "isCorrect": false, "rationale": "Earth's surface emits infrared radiation, not visible light, and greenhouse gases re-emit IR, not UV radiation."}, {"text": "Warm surface emits infrared radiation, which is absorbed by greenhouse gases and re-emitted in all directions.", "isCorrect": true, "rationale": "This accurately reflects steps 2, 3, and 4 from the text's explanation: 'The warm surface emits infrared radiation... Greenhouse gases... absorb some of this outgoing infrared radiation. The greenhouse gas molecules re-emit the absorbed energy in all directions, including back toward Earth's surface.'"}, {"text": "Greenhouse gases conduct heat directly from the upper atmosphere to the lower atmosphere.", "isCorrect": false, "rationale": "The greenhouse effect primarily involves radiation absorption and re-emission, not conduction, and conduction is not an efficient way to heat the entire atmosphere."}]}, {"question": "If you feel the warmth radiating from a hot sidewalk without touching it, you are primarily experiencing heat transfer through which mechanism?", "options": [{"text": "Conduction", "isCorrect": false, "rationale": "Conduction requires direct contact. Feeling warmth without touching indicates a different mechanism."}, {"text": "Convection", "isCorrect": false, "rationale": "Convection involves the movement of a fluid. While air near the sidewalk may be rising, the direct feeling of warmth from the surface without direct contact is radiation."}, {"text": "Radiation", "isCorrect": true, "rationale": "The text defines radiation as 'The transfer of energy through electromagnetic waves,' and notes 'Earth's surface emits infrared radiation upward,' which is what you would feel as warmth from a hot surface without direct contact."}, {"text": "Absorption", "isCorrect": false, "rationale": "Absorption is the process of taking in energy, not the mechanism by which energy is transferred from a hot object to a person."}]}, {"question": "What is the dominant mechanism by which thermal energy is transferred throughout the *entire* atmosphere, leading to weather patterns and cloud formation?", "options": [{"text": "Conduction, because air molecules are in direct contact.", "isCorrect": false, "rationale": "The text states that 'Conduction is important near Earth's surface but is not an efficient way to heat the entire atmosphere, because air is a poor conductor.'"}, {"text": "Radiation, as the Sun's energy constantly warms the air.", "isCorrect": false, "rationale": "While the Sun's energy reaches Earth via radiation, and Earth's surface radiates heat, the dominant mechanism for *transfer throughout the atmosphere* (especially vertically) is not radiation directly from the Sun or surface, but the movement of air."}, {"text": "Convection, due to the rising of warm, less dense air and sinking of cooler, denser air.", "isCorrect": true, "rationale": "The text states, 'Convection is the dominant heat transfer mechanism in the atmosphere,' and explains how 'This rising and sinking of air drives weather patterns, cloud formation, and the great wind belts.'"}, {"text": "Absorption of latent heat only, which doesn't involve air movement.", "isCorrect": false, "rationale": "Latent heat release is a component of convection and energy transfer, but it's not the 'dominant mechanism' for overall thermal energy transfer throughout the atmosphere, which is driven by bulk air movement (convection)."}]}, {"question": "The concept of 'radiative balance' in Earth's energy budget implies that:", "options": [{"text": "All incoming solar radiation is immediately reflected back to space.", "isCorrect": false, "rationale": "Only about 30% of incoming solar radiation is immediately reflected; the rest is absorbed."}, {"text": "Earth absorbs more energy from the Sun than it radiates back, leading to continuous warming.", "isCorrect": false, "rationale": "This scenario would lead to continuous warming, which is what radiative balance prevents. Radiative balance means the planet is not continuously heating up or cooling down."}, {"text": "The amount of energy Earth radiates back to space is, on average, equal to the energy it receives from the Sun.", "isCorrect": true, "rationale": "The text defines radiative balance: 'On average, Earth radiates back to space the same amount of energy it receives from the Sun. If it did not, the planet would continuously heat up or cool down.'"}, {"text": "The atmosphere prevents any energy from being lost to space.", "isCorrect": false, "rationale": "The atmosphere absorbs and re-emits energy, but ultimately 70% of the Sun's energy that was absorbed is radiated back to space as infrared radiation."}]}, {"question": "Based on the information about global energy balance, if additional greenhouse gases are added to the atmosphere, what is the most immediate consequence for Earth's energy budget?", "options": [{"text": "A decrease in the total amount of solar radiation absorbed by Earth's surface.", "isCorrect": false, "rationale": "Increased greenhouse gases primarily affect outgoing infrared radiation, not incoming solar radiation absorbed by the surface."}, {"text": "An increase in the amount of outgoing infrared radiation trapped, leading to a temporary warming shift.", "isCorrect": true, "rationale": "The text states: 'If additional greenhouse gases are added to the atmosphere, more outgoing infrared radiation is trapped, and the balance shifts temporarily toward warming — the enhanced greenhouse effect.'"}, {"text": "A significant increase in Earth's albedo, causing more reflection of solar energy.", "isCorrect": false, "rationale": "Increased greenhouse gases do not directly increase Earth's albedo; in some scenarios, warming could even decrease albedo (e.g., melting ice)."}, {"text": "A complete cessation of heat transfer by convection in the atmosphere.", "isCorrect": false, "rationale": "Increased greenhouse gases would not stop convection; in fact, uneven heating can enhance convective activity."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
