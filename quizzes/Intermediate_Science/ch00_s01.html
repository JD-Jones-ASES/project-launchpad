    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 0, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What fundamentally distinguishes science from other fields like history or literature, according to the text?", "options": [{"text": "Its pursuit of important questions about human existence.", "isCorrect": false, "rationale": "While science may touch upon aspects of human existence (e.g., biology, psychology), the text specifically attributes this pursuit to subjects like literature, not as the primary distinguishing factor for science."}, {"text": "Its reliance on empirical evidence gathered through observation and experimentation.", "isCorrect": true, "rationale": "The text explicitly states, 'Science is unique because it relies on empirical evidence — information gathered through observation and experimentation — to answer questions about the natural world.'"}, {"text": "Its focus on building logical structures from foundational axioms.", "isCorrect": false, "rationale": "The text identifies this as a characteristic of mathematics, not the unique distinguishing feature of science."}, {"text": "Its ability to provide definitive, unchanging answers to natural phenomena.", "isCorrect": false, "rationale": "The text clarifies that scientific knowledge is 'always open to revision' and is not definitive or unchanging, which is considered a strength, not a distinguishing feature."}], "id": "q01"}, {"question": "A student observes that their house plants grow poorly when watered with tap water, but thrive when watered with filtered water. Which of the following is the BEST testable scientific question derived from this observation?", "options": [{"text": "Do plants prefer filtered water over tap water?", "isCorrect": false, "rationale": "This question involves 'preference' or 'feelings,' which the text identifies as non-testable in science because feelings cannot be objectively measured in plants."}, {"text": "Is the type of water a plant receives related to its growth rate?", "isCorrect": true, "rationale": "This question is testable because it proposes a relationship between a measurable variable (type of water) and an observable, measurable outcome (growth rate), aligning with the criteria for a good scientific question."}, {"text": "Why do some plants enjoy filtered water more than others?", "isCorrect": false, "rationale": "Similar to option A, this question uses the subjective term 'enjoy,' which cannot be scientifically measured or investigated through observation and experimentation in plants."}, {"text": "What is the ultimate purpose of filtered water for plant health?", "isCorrect": false, "rationale": "This question is more philosophical or teleological, asking about a 'purpose.' Science focuses on 'how' and 'what' rather than ultimate 'why' in this sense, making it less directly testable through experiment."}], "id": "q02"}, {"question": "Which statement best describes the role of a hypothesis in a scientific investigation?", "options": [{"text": "It is a proven fact that scientists aim to confirm through experimentation.", "isCorrect": false, "rationale": "A hypothesis is a proposed explanation or prediction, not a proven fact. Its value lies in being testable, not in being pre-confirmed."}, {"text": "It is a random guess about an observation's cause, designed to be easily disproven.", "isCorrect": false, "rationale": "The text states a hypothesis is 'not a random guess' and should be based on prior knowledge or observations. While it can be disproven, its primary design is to be testable, not just easily disproven."}, {"text": "It is a testable prediction that proposes an explanation for an observation.", "isCorrect": true, "rationale": "The text defines a hypothesis as 'A testable prediction that proposes an explanation for an observation,' often written as an 'if-then' statement connecting cause and effect."}, {"text": "It serves as the final conclusion of an experiment before peer review.", "isCorrect": false, "rationale": "A hypothesis is formed *before* an experiment and tested by it. Conclusions are drawn *after* data collection and analysis, and then reviewed by peers."}], "id": "q03"}, {"question": "According to the text, what is the key difference between a scientific theory and a scientific law?", "options": [{"text": "A law is a guess, while a theory is a proven fact.", "isCorrect": false, "rationale": "Both terms are well-established scientific concepts, neither is a guess, and scientific facts are distinct from theories."}, {"text": "A theory explains *why* something happens, while a law describes *what* happens.", "isCorrect": true, "rationale": "The text explicitly states: 'A theory explains why something happens. A law describes what happens.' This is the fundamental distinction."}, {"text": "A theory is a preliminary idea that eventually graduates into a law with enough evidence.", "isCorrect": false, "rationale": "The text clarifies, 'A theory does not 'graduate' into a law with enough evidence — they are simply different kinds of scientific knowledge.'"}, {"text": "A law is only applicable in laboratory settings, whereas a theory applies to the natural world.", "isCorrect": false, "rationale": "Both scientific theories and laws are applicable to understanding and predicting phenomena in the natural world, not limited to laboratory settings."}], "id": "q04"}, {"question": "A researcher observes that runners who hydrate with electrolyte drinks perform better in long races than those who drink plain water. Which of the following is the most appropriate scientific hypothesis for this observation?", "options": [{"text": "If athletes drink electrolyte beverages, then they will experience a greater sense of well-being during races.", "isCorrect": false, "rationale": "While plausible, 'sense of well-being' is subjective and difficult to quantify or measure objectively in a scientific experiment, making it less suitable for a precise hypothesis."}, {"text": "Electrolyte drinks are inherently superior to plain water for athletic performance.", "isCorrect": false, "rationale": "This is a statement of belief or a conclusion, not a testable prediction. A hypothesis should propose a relationship that can be investigated."}, {"text": "If runners consume an electrolyte drink before and during a long race, then their average race time will be faster compared to those consuming plain water.", "isCorrect": true, "rationale": "This hypothesis follows the 'if-then' structure, proposes a clear cause (electrolyte drink vs. plain water) and a measurable, quantifiable effect (faster average race time), making it highly testable."}, {"text": "The chemical composition of electrolyte drinks makes them more palatable to athletes.", "isCorrect": false, "rationale": "This hypothesis focuses on palatability, which is not directly related to the initial observation of 'performing better.' While palatability could be a factor, it doesn't directly address the observed performance difference and 'palatable' can be subjective."}], "id": "q05"}, {"question": "The text states that scientific knowledge is 'always open to revision' and that this willingness to change is 'one of science's greatest strengths.' Why is this flexibility considered a strength?", "options": [{"text": "It allows scientists to change their minds easily without needing new evidence.", "isCorrect": false, "rationale": "The text emphasizes that revision occurs 'If new evidence contradicts an old idea,' indicating that changes are driven by evidence, not arbitrary decisions."}, {"text": "It prevents scientific findings from ever being definitively proven or accepted.", "isCorrect": false, "rationale": "Scientific findings *are* accepted based on current evidence, even if they remain open to future revision. The flexibility ensures findings are robust, not that they are never accepted."}, {"text": "It ensures that science can correct itself and grow as new evidence emerges.", "isCorrect": true, "rationale": "The text explicitly states, 'A discipline that refuses to correct itself cannot grow.' This willingness to revise based on new evidence allows for continuous improvement and deeper understanding."}, {"text": "It reduces the need for peer review, as all knowledge is temporary anyway.", "isCorrect": false, "rationale": "Peer review remains essential to vet new evidence and ensure quality before any revisions or new knowledge are accepted, regardless of the revisable nature of science."}], "id": "q06"}, {"question": "The scientific method is often presented as a numbered list of steps. How does the text describe the actual practice of the scientific method?", "options": [{"text": "As a rigid, fixed sequence of steps that must be followed precisely to ensure valid results.", "isCorrect": false, "rationale": "The text explicitly states, 'The scientific method is not a rigid recipe with steps that must be followed in exact order.'"}, {"text": "As a flexible and iterative process, guided by habits like careful observation and fair testing.", "isCorrect": true, "rationale": "The text describes it as a 'general process of inquiry' where 'real scientific investigations often loop back on themselves' and it's 'better understood as a set of habits.'"}, {"text": "As a shortcut for proving a scientist's initial hypothesis correct as quickly as possible.", "isCorrect": false, "rationale": "The scientific method is about honest and productive investigation, not about quickly proving a predetermined outcome. It involves remaining 'open to surprise' and accepting results that don't support the hypothesis."}, {"text": "As a method primarily used for simple experiments, but not for complex real-world investigations.", "isCorrect": false, "rationale": "The text implies its application to 'harder questions' and how 'professional scientists think every day,' suggesting its universal relevance in scientific inquiry, not just simple experiments."}], "id": "q07"}, {"question": "A marine biologist is studying a new species of fish. Which of the following observations is quantitative?", "options": [{"text": "The fish's scales shimmer with an iridescent blue and green.", "isCorrect": false, "rationale": "This is a descriptive observation about color and appearance, making it qualitative."}, {"text": "The fish exhibits rapid, darting movements when approached.", "isCorrect": false, "rationale": "This describes the *manner* of movement, which is descriptive and therefore qualitative. While 'rapid' might suggest speed, it lacks a numerical value."}, {"text": "The fish's average length is 15.3 centimeters, and it weighs 85 grams.", "isCorrect": true, "rationale": "Quantitative observations involve numerical values and precise measurements, such as length (15.3 cm) and weight (85 grams), which allow for mathematical relationships and comparisons."}, {"text": "The fish seems to prefer swimming in deeper, darker areas of the tank.", "isCorrect": false, "rationale": "This observation is descriptive ('deeper, darker areas') and uses a subjective term ('prefers'), making it qualitative. To be quantitative, it would need measurable data like 'spends 80% of its time below 30 cm depth.'"}], "id": "q08"}, {"question": "A research team publishes an extraordinary claim about a new material that conducts electricity with zero resistance at room temperature. Based on the 'Peer Review and Replication' section, why would other scientists be cautious about immediately accepting this claim, even after it's peer-reviewed?", "options": [{"text": "Extraordinary claims are almost always fraudulent and should be dismissed.", "isCorrect": false, "rationale": "While caution is warranted for extraordinary claims, the text doesn't suggest they are inherently fraudulent or should be dismissed outright; rather, they require rigorous verification."}, {"text": "Peer review is a flawed system that routinely misses critical errors in groundbreaking research.", "isCorrect": false, "rationale": "The text acknowledges peer review 'is not perfect' but calls it 'the best system scientists have found.' The caution isn't solely due to peer review's flaws but rather the need for further validation beyond it."}, {"text": "The claim must be replicated by independent teams to increase confidence in its validity.", "isCorrect": true, "rationale": "The text states that 'A result only becomes trustworthy when other scientists can examine it and reproduce it' and 'Replication — repeating the experiment to see if the results hold up — is essential.' This is especially true for groundbreaking or extraordinary claims."}, {"text": "Only the original researchers can truly understand and verify their own results.", "isCorrect": false, "rationale": "This contradicts the principle of external verification and reproducibility, which is central to building trust in scientific findings. The text explicitly states, 'A result only becomes trustworthy when other scientists can examine it and reproduce it.'"}], "id": "q09"}, {"question": "The text emphasizes empirical evidence, openness to revision, peer review, and replication. Taken together, what do these elements primarily contribute to in scientific understanding?", "options": [{"text": "They ensure that scientific knowledge remains constant and unchanging over time.", "isCorrect": false, "rationale": "The text explicitly states that scientific knowledge is 'always open to revision,' which implies change, not constancy."}, {"text": "They allow scientists to exclusively focus on questions that confirm existing theories.", "isCorrect": false, "rationale": "Science is open to new evidence, even if it contradicts existing theories, and aims to explore all testable questions, not just those that confirm prior beliefs."}, {"text": "They establish a robust system for building reliable, evidence-based knowledge about the natural world.", "isCorrect": true, "rationale": "These elements collectively form the foundation of scientific trustworthiness and rigor, ensuring that knowledge is based on verifiable evidence, subject to scrutiny, and can be refined over time."}, {"text": "They streamline the research process, allowing for quicker publication of results without extensive checks.", "isCorrect": false, "rationale": "Peer review and replication are processes that *add* checks and rigor, often making the publication process longer and more thorough, rather than streamlining it for speed."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
