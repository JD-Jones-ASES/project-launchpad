<script>
var QUESTIONS = [{"question": "Which of the following best describes Hans Christian Oersted's pivotal discovery in 1820 that launched the field of electromagnetism?", "options": [{"text": "He observed that a stationary magnet could induce an electric current in a nearby wire.", "isCorrect": false, "rationale": "This describes electromagnetic induction, a discovery made later by Faraday, not Oersted's initial finding."}, {"text": "He found that a compass needle would deflect when an electric current flowed through a nearby wire.", "isCorrect": true, "rationale": "The text explicitly states Oersted 'noticed that a compass needle deflected when he switched on an electric current in a nearby wire,' demonstrating that moving electric charges produce magnetism."}, {"text": "He demonstrated that electric charges and magnetic poles always attract each other.", "isCorrect": false, "rationale": "While related to electromagnetism, Oersted's specific discovery was about the magnetic effect of electric current, not a general statement about attraction."}, {"text": "He proved that all materials exhibit magnetic properties when exposed to strong electric fields.", "isCorrect": false, "rationale": "This statement is incorrect; not all materials are magnetic, and it does not represent Oersted's discovery."}]}, {"question": "Imagine a straight wire carrying an electric current flowing directly upwards. If you place a small compass directly to the east of the wire, in which direction would its needle most likely point due to the wire's magnetic field?", "options": [{"text": "Upwards", "isCorrect": false, "rationale": "The magnetic field lines circle around the wire, perpendicular to the current, not parallel to it."}, {"text": "North", "isCorrect": false, "rationale": "While a direction, applying the right-hand rule for a current flowing upwards (thumb pointing up), the fingers curl counter-clockwise (when viewed from above). To the east (right side) of the wire, the field lines would be pointing inwards, which is South."}, {"text": "South", "isCorrect": true, "rationale": "According to the right-hand rule, if your thumb points in the direction of the upward current, your fingers curl counter-clockwise around the wire. Therefore, at a point directly to the east of the wire, the magnetic field direction (and thus the compass needle) would point south."}, {"text": "West", "isCorrect": false, "rationale": "If the compass were to the west of the wire, the needle would point north. To the east, it points south."}]}, {"question": "Why is a solenoid generally preferred over a single, straight wire for producing a strong and useful magnetic field in many applications?", "options": [{"text": "A solenoid can carry current in only one direction, simplifying control.", "isCorrect": false, "rationale": "Solenoids can carry current in either direction, and their utility comes from field strength, not current direction restriction."}, {"text": "The magnetic field inside a solenoid is nearly uniform and significantly stronger due to the summation of fields from many loops.", "isCorrect": true, "rationale": "The text states that 'Inside the solenoid, the fields from adjacent loops add together, producing a strong, nearly uniform field that runs straight through the center of the coil,' which is a key advantage over a weak, circulating field from a single wire."}, {"text": "Solenoids do not produce a magnetic field outside their structure, making them safer.", "isCorrect": false, "rationale": "The text explicitly mentions that 'Outside the solenoid, the field fans out and returns from one end to the other,' indicating a field exists outside."}, {"text": "Straight wires require higher currents to produce any detectable magnetic field.", "isCorrect": false, "rationale": "Straight wires produce a magnetic field with any current, but it is relatively weak compared to a solenoid."}]}, {"question": "What is the fundamental difference that makes an electromagnet significantly more powerful and versatile than a simple solenoid?", "options": [{"text": "An electromagnet uses a superconducting coil, eliminating resistance and increasing current.", "isCorrect": false, "rationale": "While some advanced electromagnets (like in MRI) use superconducting coils, the defining feature of an electromagnet vs. a solenoid is not superconductivity but the core material."}, {"text": "An electromagnet incorporates a ferromagnetic core, which amplifies the magnetic field hundreds of times.", "isCorrect": true, "rationale": "The text defines an electromagnet as 'A solenoid with a ferromagnetic core (usually iron) that greatly strengthens the magnetic field produced by the current,' noting it can be 'hundreds of times stronger than the solenoid alone'."}, {"text": "An electromagnet generates an electric force, whereas a solenoid only generates a magnetic field.", "isCorrect": false, "rationale": "Both solenoids and electromagnets primarily generate magnetic fields. A changing magnetic field can create an electric force, but this isn't the fundamental distinction between the two devices."}, {"text": "An electromagnet's coils are wound in a specific pattern that concentrates the field without a core.", "isCorrect": false, "rationale": "The winding pattern is part of the solenoid's design. The addition of a core is what distinguishes an electromagnet from a simple solenoid and significantly increases its strength."}]}, {"question": "An electromagnet initially has 100 turns of wire and a current of 3.0 A, lifting 20 paper clips. If the number of turns is increased to 300 and the current is reduced to 1.5 A, approximately how many paper clips should it be able to lift, assuming the core does not saturate?", "options": [{"text": "10 paper clips", "isCorrect": false, "rationale": "Initial strength is proportional to 100 * 3.0 = 300. New strength is proportional to 300 * 1.5 = 450. The ratio of new to old strength is 450/300 = 1.5. So, 20 * 1.5 = 30 paper clips."}, {"text": "30 paper clips", "isCorrect": true, "rationale": "The magnetic field strength (B) is proportional to the product of the number of turns (N) and the current (I). \nInitial B ∝ 100 turns * 3.0 A = 300 units.\nNew B ∝ 300 turns * 1.5 A = 450 units.\nThe ratio of new to old strength is 450/300 = 1.5. Therefore, the lifting force will increase by a factor of 1.5: 20 paper clips * 1.5 = 30 paper clips."}, {"text": "40 paper clips", "isCorrect": false, "rationale": "Initial strength is proportional to 100 * 3.0 = 300. New strength is proportional to 300 * 1.5 = 450. The ratio of new to old strength is 450/300 = 1.5. So, 20 * 1.5 = 30 paper clips."}, {"text": "60 paper clips", "isCorrect": false, "rationale": "Initial strength is proportional to 100 * 3.0 = 300. New strength is proportional to 300 * 1.5 = 450. The ratio of new to old strength is 450/300 = 1.5. So, 20 * 1.5 = 30 paper clips."}]}, {"question": "The text states that a ferromagnetic core 'greatly strengthens' the magnetic field of a solenoid. From a microscopic perspective, what is the primary mechanism by which a ferromagnetic core achieves this amplification?", "options": [{"text": "The core acts as a highly efficient conductor, allowing more current to flow through the coil.", "isCorrect": false, "rationale": "The core's role is magnetic, not to conduct electrical current for the coil; it is typically an insulator or poor conductor in this context."}, {"text": "The core's atoms absorb magnetic energy, then re-emit it in a more focused direction.", "isCorrect": false, "rationale": "While there is interaction, the mechanism is not about absorbing and re-emitting energy in this manner for field amplification."}, {"text": "The external magnetic field from the coil aligns the magnetic domains within the core, and the core's own magnetism adds to the coil's field.", "isCorrect": true, "rationale": "The text explains this directly: 'The current's magnetic field aligns the domains in the iron core, and the core's magnetism adds to the solenoid's magnetism, producing a combined field that can be hundreds of times stronger'."}, {"text": "The core material converts some of the electric current into pure magnetic energy, bypassing energy loss.", "isCorrect": false, "rationale": "This is not a physically accurate description of how a ferromagnetic core works; it doesn't convert current directly into magnetic energy but rather responds to and amplifies the existing magnetic field."}]}, {"question": "What is a significant practical advantage of an electromagnet over a permanent magnet in many technological applications?", "options": [{"text": "Electromagnets produce a magnetic field that is inherently stronger than any permanent magnet.", "isCorrect": false, "rationale": "While electromagnets can be very strong, some permanent magnets (e.g., neodymium) are also extremely powerful. The primary advantage of electromagnets is control, not always absolute strength."}, {"text": "Electromagnets can be easily switched on and off, and their strength can be precisely controlled.", "isCorrect": true, "rationale": "The text highlights this as a key advantage: 'Unlike a permanent magnet, an electromagnet can be switched on and off by controlling the current' and 'their strength can be precisely controlled'."}, {"text": "Electromagnets do not interact with other magnetic fields, making them suitable for sensitive equipment.", "isCorrect": false, "rationale": "Electromagnets produce and interact with magnetic fields, just like permanent magnets. Their fields can affect sensitive equipment."}, {"text": "Electromagnets do not require an external power source to maintain their magnetic field.", "isCorrect": false, "rationale": "Electromagnets require a continuous flow of electric current (an external power source) to maintain their magnetic field, unlike permanent magnets."}]}, {"question": "Which of the following applications most critically relies on the ability of an electromagnet to be switched on and off?", "options": [{"text": "The levitation of a Maglev train, where continuous strong fields are needed.", "isCorrect": false, "rationale": "While Maglev trains use electromagnets, the primary need for levitation is a *continuous* strong field, not primarily the on/off function to lift/drop the train. The on/off for propulsion is different."}, {"text": "The creation of detailed internal body images in an MRI machine.", "isCorrect": false, "rationale": "MRI machines require extremely strong, uniform, and *stable* magnetic fields. While they are switched on/off for maintenance or between patients, the critical aspect of their operation is the consistent, strong field, not the ability to frequently switch during an imaging session."}, {"text": "The controlled lifting and releasing of scrap metal in a scrapyard crane.", "isCorrect": true, "rationale": "The text states, 'The ability to switch the magnet off to drop the load is essential' for scrapyard cranes, making the on/off functionality critical for their operation."}, {"text": "The steady vibration of a doorbell striker, which requires a constant magnetic pull.", "isCorrect": false, "rationale": "A doorbell actually *breaks and restores* the circuit rapidly, so the magnet is repeatedly turning on and off to create a buzzing sound. However, the deliberate, manual on/off control for releasing a load (as in a crane) is a more direct and critical reliance on the switchable nature."}]}, {"question": "In the electromagnet investigation, the procedure instructs students to 'Open the switch immediately after testing (to avoid draining the battery and heating the wire).' What additional consequence, not explicitly stated but implied by the experiment's context, could occur if the switch were left closed for extended periods?", "options": [{"text": "The iron nail core could permanently lose its ability to be magnetized.", "isCorrect": false, "rationale": "Iron nails are made of 'soft' magnetic material, which means they are easily magnetized and demagnetized, not prone to permanent loss of ability."}, {"text": "The wire's insulation could melt, causing a short circuit and potential shock.", "isCorrect": true, "rationale": "The text specifically warns about the wire heating up. If heating is prolonged and excessive, the insulated copper wire could indeed melt its insulation, leading to exposed conductors, a short circuit, or a burn/shock hazard."}, {"text": "The paper clips being lifted would lose their magnetic properties instantly.", "isCorrect": false, "rationale": "Paper clips become temporarily magnetized by induction when near the electromagnet. If the circuit is opened, they would lose this induced magnetism, but this is not a *consequence* of leaving the switch closed."}, {"text": "The magnetic field produced would continuously decrease in strength due to battery fatigue.", "isCorrect": false, "rationale": "While battery draining (fatigue) would eventually reduce field strength, the more immediate and direct safety concern highlighted by 'heating the wire' is related to the wire itself and its insulation."}]}, {"question": "According to the 'Chemistry Connection' section, the ferromagnetic properties of materials like iron fundamentally arise from what atomic-level characteristic?", "options": [{"text": "The presence of free electrons that can easily move through the material.", "isCorrect": false, "rationale": "This characteristic relates to electrical conductivity, not specifically ferromagnetism. While electrons are involved, their mobility is not the core reason for ferromagnetism."}, {"text": "Their crystal lattice structure causing atoms to align in perfect rows.", "isCorrect": false, "rationale": "Crystal structure is important, but the underlying magnetic property comes from electron configuration, not merely the atomic arrangement in rows."}, {"text": "Partially filled d orbitals containing unpaired electrons whose magnetic moments align parallel due to exchange interaction.", "isCorrect": true, "rationale": "The text states: 'These transition metals... have partially filled d orbitals with unpaired electrons. Quantum mechanics shows that unpaired electrons create a net magnetic moment, and in ferromagnetic materials, the exchange interaction between neighboring atoms forces these moments to align in parallel'."}, {"text": "The ability of their nuclei to absorb and re-emit magnetic field lines at low temperatures.", "isCorrect": false, "rationale": "Ferromagnetism is a phenomenon primarily related to the electrons in atoms, not the nuclei, and is not defined by absorption/re-emission of field lines."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
