    };

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "Which statement best describes the Law of Conservation of Energy as presented in the text?", "options": [{"text": "Energy is always converted into thermal energy over time within any system.", "isCorrect": false, "rationale": "While energy can convert to thermal energy, this statement is too specific and does not encapsulate the full law, nor does it always happen to 'all' energy."}, {"text": "Energy can be created or destroyed, but only in non-isolated systems where external forces act.", "isCorrect": false, "rationale": "The law explicitly states that energy cannot be created or destroyed under any circumstances."}, {"text": "The total energy of an isolated system remains constant, as energy can only be transformed from one form to another or transferred between objects.", "isCorrect": true, "rationale": "This statement is a direct and accurate summary of the Law of Conservation of Energy provided in the text."}, {"text": "Mechanical energy is always conserved in any system, regardless of the presence of friction.", "isCorrect": false, "rationale": "Mechanical energy is only conserved in the absence of friction and other non-conservative forces; the total energy is conserved, but mechanical energy is not always."}], "id": "q01"}, {"question": "In the context of this section, what does the term 'mechanical energy' primarily represent?", "options": [{"text": "The energy an object possesses due to its chemical bonds and nuclear forces.", "isCorrect": false, "rationale": "The text defines mechanical energy specifically as the sum of kinetic energy and potential energy, not chemical or nuclear energy."}, {"text": "The total kinetic energy and gravitational potential energy within a system.", "isCorrect": true, "rationale": "The text explicitly defines mechanical energy as 'the sum of kinetic energy and potential energy in a system: E = KE + PE'."}, {"text": "Any form of energy that can be directly observed and measured.", "isCorrect": false, "rationale": "This definition is too broad and does not align with the specific definition of mechanical energy given in the text."}, {"text": "Energy that is produced by machines and engines for practical applications.", "isCorrect": false, "rationale": "This refers to a common use of the word 'mechanical' but not its scientific definition as presented in the context of energy conservation."}], "id": "q02"}, {"question": "A $2.0kg$ pendulum bob is released from rest at a height of $0.8m$ above its lowest point. Ignoring air resistance, what is its speed at the lowest point of its swing? (Use $g = 9.8m/s^2$)", "options": [{"text": "$1.96 m/s$", "isCorrect": false, "rationale": "This value would be obtained if the mass was not cancelled or if a step in the calculation was incorrect (e.g., $gh_i$ instead of $2gh_i$ for $v^2$). The correct calculation requires solving for $v_f = \\sqrt{2gh_i}$."}, {"text": "$3.13 m/s$", "isCorrect": false, "rationale": "This value is incorrect. The calculation for the final speed is $v_f = \\sqrt{2gh_i}$."}, {"text": "$3.96 m/s$", "isCorrect": true, "rationale": "Applying the conservation of mechanical energy ($PE_i = KE_f$), we get $mgh_i = \\frac{1}{2}mv_f^2$. The mass $m$ cancels, so $v_f = \\sqrt{2gh_i} = \\sqrt{2 \\times 9.8 m/s^2 \\times 0.8m} = \\sqrt{15.68} \\approx 3.96 m/s$."}, {"text": "$4.43 m/s$", "isCorrect": false, "rationale": "This value is incorrect. The calculation for the final speed is $v_f = \\sqrt{2gh_i}$."}], "id": "q03"}, {"question": "A roller coaster car starts from rest at the top of a 60-meter tall hill. If no energy were lost to friction or air resistance, what is the maximum height the car could reach on any subsequent hill?", "options": [{"text": "Exactly 60 meters.", "isCorrect": true, "rationale": "According to the conservation of mechanical energy, if no energy is lost, the total mechanical energy (potential at the top of the first hill) must remain constant. Therefore, it can only regain the initial potential energy, which corresponds to the initial height."}, {"text": "Slightly less than 60 meters.", "isCorrect": false, "rationale": "This would be true if friction or air resistance were present, but the question specifies 'no energy were lost'."}, {"text": "Slightly more than 60 meters.", "isCorrect": false, "rationale": "Reaching a height greater than 60 meters would require an external energy input, which is not present in this idealized scenario."}, {"text": "There is no theoretical limit to how high it could go if friction is absent.", "isCorrect": false, "rationale": "This contradicts the law of conservation of mechanical energy. The total mechanical energy is fixed by the initial height."}], "id": "q04"}, {"question": "When friction is present in a system, such as a sled sliding to a stop, which of the following statements accurately describes the energy changes according to the text?", "options": [{"text": "Both the total energy and the mechanical energy of the system decrease.", "isCorrect": false, "rationale": "The total energy of the system is always conserved; it does not decrease. Only mechanical energy decreases as it converts to thermal energy."}, {"text": "The total energy of the system remains constant, but some mechanical energy is converted into thermal energy.", "isCorrect": true, "rationale": "The text states that 'The total energy of the system is still conserved, but the mechanical energy decreases because some of it has become thermal energy'."}, {"text": "The mechanical energy increases due to the work done by friction, leading to a hotter sled and snow.", "isCorrect": false, "rationale": "Friction converts mechanical energy into thermal energy, thus *decreasing* the mechanical energy available for useful work, not increasing it."}, {"text": "The total energy is destroyed, which is why the sled eventually stops.", "isCorrect": false, "rationale": "Energy cannot be destroyed; it is transformed into other forms, such as thermal energy, which causes the sled to stop."}], "id": "q05"}, {"question": "According to the text, why is no real machine 100% efficient?", "options": [{"text": "Machines are typically designed with inherent flaws that prevent perfect energy transfer.", "isCorrect": false, "rationale": "While designs can be flawed, the fundamental reason stated in the text is the unavoidable presence of friction."}, {"text": "Some energy is always converted to thermal energy by friction or other non-conservative forces.", "isCorrect": true, "rationale": "The text explicitly states: 'No real machine is 100% efficient because some energy is always converted to thermal energy by friction.'"}, {"text": "The law of conservation of energy dictates that useful energy output can never equal total energy input.", "isCorrect": false, "rationale": "The law of conservation of energy *allows* for 100% transfer in ideal systems; it is the presence of friction in real systems that prevents it."}, {"text": "All real machines require an energy input that exceeds their maximum possible energy output.", "isCorrect": false, "rationale": "This statement is tautological; efficiency describes the ratio. The underlying reason for less than 100% efficiency is energy loss to non-useful forms like heat."}], "id": "q06"}, {"question": "A student pushes a box up a ramp, providing $200J$ of total energy input. If the box gains $150J$ of gravitational potential energy, what is the efficiency of this process?", "options": [{"text": "$25\\%$", "isCorrect": false, "rationale": "This would be the 'lost' percentage (thermal energy), not the efficiency of useful work."}, {"text": "$75\\%$", "isCorrect": true, "rationale": "Efficiency is calculated as (useful energy output / total energy input) * 100%. So, $(150J / 200J) \\times 100\\% = 0.75 \\times 100\\% = 75\\%$."}, {"text": "$133\\%$", "isCorrect": false, "rationale": "This implies more output than input, which is impossible for efficiency and violates conservation principles if it were a useful output."}, {"text": "$200\\%$", "isCorrect": false, "rationale": "This is an incorrect calculation and implies a machine creates energy, which is impossible."}], "id": "q07"}, {"question": "The 'Think Deeper' section describes a roller coaster with a motor. How does the presence of a motor fundamentally change the application of mechanical energy conservation for the roller coaster car compared to an ideal system without a motor?", "options": [{"text": "A motor allows for the creation of new energy within the roller coaster system, increasing total energy.", "isCorrect": false, "rationale": "The Law of Conservation of Energy states energy cannot be created. A motor *transfers* energy into the system, it doesn't create it."}, {"text": "With a motor, the roller coaster system is no longer considered isolated, as external energy is actively added.", "isCorrect": true, "rationale": "The text explains that a motor adds an external energy source, meaning the system is no longer isolated, allowing it to gain mechanical energy beyond what was initially present."}, {"text": "The motor eliminates friction and air resistance, making the system 100% efficient.", "isCorrect": false, "rationale": "A motor adds energy but does not eliminate friction or air resistance; these forces would still convert mechanical energy to thermal energy."}, {"text": "The conservation of mechanical energy equation no longer applies at all when a motor is present.", "isCorrect": false, "rationale": "The principle still applies, but the equation $KE_i + PE_i = KE_f + PE_f$ must be modified to include the work done by the motor as an energy input."}], "id": "q08"}, {"question": "In the worked example of a ball dropped from rest, the mass of the ball cancelled out during the calculation of its final speed. What significant physical principle does this cancellation highlight, as mentioned in the text?", "options": [{"text": "The effect of air resistance is negligible for all falling objects.", "isCorrect": false, "rationale": "The problem explicitly 'ignores air resistance,' implying it could be a factor, but the cancellation of mass is related to the idealized physics of free fall, not the presence or absence of air resistance."}, {"text": "The speed of a falling object, under ideal conditions, does not depend on its mass.", "isCorrect": true, "rationale": "The text states, 'Notice that the mass cancelled out — the speed does not depend on the mass, consistent with what Galileo discovered about free fall (Unit 4).'"}, {"text": "Gravitational potential energy is universally constant for all objects regardless of mass.", "isCorrect": false, "rationale": "Gravitational potential energy ($mgh$) explicitly depends on mass; only the *conversion* to kinetic energy leads to mass cancellation for speed."}, {"text": "The total energy of a system is independent of the objects within it.", "isCorrect": false, "rationale": "The total energy of a system depends on the properties of the objects within it. The cancellation of mass refers to the final velocity, not the total energy itself being mass-independent."}], "id": "q09"}, {"question": "The 'Life Science Connection' mentions that only about 36-38 ATP molecules are produced per glucose molecule during cellular respiration, and only about 10% of energy transfers between trophic levels. These biological examples are primarily used to illustrate which concept from the 'Conservation of Energy' section?", "options": [{"text": "The definition of an isolated system, where total energy remains constant.", "isCorrect": false, "rationale": "While energy is conserved, these examples highlight inefficiency and energy 'loss' from a useful form, rather than the isolated system definition itself."}, {"text": "The application of mechanical energy ($KE + PE$) in biological processes.", "isCorrect": false, "rationale": "The examples discuss chemical energy (glucose, ATP) and general energy transfer, not specifically mechanical energy forms."}, {"text": "The principle that efficiency is never 100% due to energy conversion into less useful forms like thermal energy.", "isCorrect": true, "rationale": "The text explicitly states these examples show how energy is 'lost' as thermal energy, meaning converted to a less useful form, which is the core concept of efficiency being less than 100%."}, {"text": "The idea that energy can be selectively destroyed in biological systems, unlike in physical systems.", "isCorrect": false, "rationale": "The text clarifies that '“Lost” does not mean destroyed — it means converted to a less useful form,' reinforcing that energy is always conserved."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
