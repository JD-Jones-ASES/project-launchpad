    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is the primary attractive force responsible for holding metal atoms together in a solid, according to the electron sea model?", "options": [{"text": "Covalent bonds between individual metal atoms.", "isCorrect": false, "rationale": "Metals do not form discrete covalent bonds between individual atoms like in molecular compounds. Instead, their valence electrons are delocalized."}, {"text": "Electrostatic attraction between positive metal ions and a delocalized 'sea' of electrons.", "isCorrect": true, "rationale": "The electron sea model describes metallic bonding as the attraction between the lattice of positive metal ions (atom cores) and the surrounding, freely moving 'sea' of collectively shared valence electrons."}, {"text": "Repulsive forces between adjacent electron clouds.", "isCorrect": false, "rationale": "Metallic bonding is an attractive force that holds the metal together, not a repulsive one."}, {"text": "Strong intermolecular forces between polar metal atoms.", "isCorrect": false, "rationale": "Metals are typically not described as forming polar molecules with intermolecular forces. The 'electron sea' is a type of chemical bond within the bulk material, not an intermolecular force."}]}, {"question": "A blacksmith hammers a red-hot iron bar into a new shape, demonstrating its malleability. This property is best explained by which aspect of metallic bonding?", "options": [{"text": "The ability of free electrons to absorb and re-emit light, causing luster.", "isCorrect": false, "rationale": "This property explains metallic luster, not malleability or ductility."}, {"text": "The rapid transfer of kinetic energy by free electrons, causing thermal conductivity.", "isCorrect": false, "rationale": "This property explains thermal conductivity, not malleability or ductility."}, {"text": "The flow of the electron sea allowing layers of metal ions to slide past each other without breaking the overall bond.", "isCorrect": true, "rationale": "The delocalized electron sea maintains the attraction between metal ions even when layers slide, allowing metals to be ductile (drawn into wires) and malleable (hammered into sheets) without breaking."}, {"text": "The strong, fixed attractions between individual metal atoms in a rigid lattice.", "isCorrect": false, "rationale": "This description implies rigidity, which contradicts malleability. While attractions are strong, they are not 'fixed' in a way that prevents deformation, due to the electron sea."}]}, {"question": "Imagine you drop a copper pan and a ceramic plate (made of an ionic compound) on the floor. The copper pan dents, but the ceramic plate shatters. This difference in behavior highlights a key distinction between metallic and ionic bonding. Which statement best explains this?", "options": [{"text": "Copper's electrons are localized, while the ceramic's ions are delocalized.", "isCorrect": false, "rationale": "The opposite is true for copper's electrons (delocalized) and the ceramic's ions (localized in a crystal lattice)."}, {"text": "Metallic bonds are weaker than ionic bonds, allowing copper to deform easily.", "isCorrect": false, "rationale": "Metallic bonds are strong. The ability to deform is not due to weakness, but to the nature of the electron sea allowing rearrangement without bond breakage."}, {"text": "The electron sea in copper allows layers of ions to shift without bond breakage, whereas fixed ion positions in the ceramic lead to repulsion and shattering when layers misalign.", "isCorrect": true, "rationale": "This correctly explains that the delocalized electron sea in metals permits deformation without breaking the metallic bond (ductility/malleability), while in ionic crystals, shifting layers brings like-charged ions into repulsion, causing the crystal to shatter (brittleness)."}, {"text": "Ionic compounds conduct electricity when solid, unlike metals, making them brittle.", "isCorrect": false, "rationale": "Ionic compounds generally do not conduct electricity in the solid state because their ions are fixed. Metals conduct in the solid state. This statement incorrectly links conductivity to brittleness and reverses conductivity properties."}]}, {"question": "The primary distinction between an intermolecular force (IMF) and an intramolecular force is:", "options": [{"text": "IMFs determine chemical reactivity, while intramolecular forces determine physical properties.", "isCorrect": false, "rationale": "Intramolecular forces (chemical bonds) determine chemical reactivity, while intermolecular forces primarily determine physical properties like boiling point and melting point."}, {"text": "Intramolecular forces exist between molecules, while IMFs exist within a single molecule.", "isCorrect": false, "rationale": "The definitions are swapped. Intramolecular forces are *within* a molecule, and intermolecular forces are *between* molecules."}, {"text": "IMFs are generally much weaker attractions between molecules, whereas intramolecular forces are stronger bonds within a molecule.", "isCorrect": true, "rationale": "This statement accurately defines and distinguishes intermolecular forces (between molecules, weaker) and intramolecular forces (within molecules, stronger chemical bonds)."}, {"text": "Intramolecular forces are found only in ionic compounds, while IMFs are found only in covalent compounds.", "isCorrect": false, "rationale": "Intramolecular forces include ionic, covalent, and metallic bonds. Intermolecular forces exist between all types of molecules, not just covalent ones."}]}, {"question": "Which of the following pure substances would NOT be expected to form hydrogen bonds with its own molecules?", "options": [{"text": "CH3OH (methanol, contains O-H group)", "isCorrect": false, "rationale": "Methanol contains an O-H bond, allowing its hydrogen atoms to form hydrogen bonds with the oxygen atoms of neighboring methanol molecules."}, {"text": "HF (hydrogen fluoride)", "isCorrect": false, "rationale": "Hydrogen fluoride contains an H-F bond, allowing it to form strong hydrogen bonds."}, {"text": "NH3 (ammonia, contains N-H group)", "isCorrect": false, "rationale": "Ammonia contains N-H bonds, allowing its hydrogen atoms to form hydrogen bonds with the nitrogen atoms of neighboring ammonia molecules."}, {"text": "CH4 (methane, only C-H bonds)", "isCorrect": true, "rationale": "Hydrogen bonds occur when hydrogen is bonded to a highly electronegative atom (N, O, or F). Methane (CH4) only has C-H bonds, so it cannot form hydrogen bonds with itself."}]}, {"question": "Water (H2O) has an unusually high boiling point (100°C) compared to other molecules of similar size, such as hydrogen sulfide (H2S, boiling point -60°C). This significant difference is primarily attributed to:", "options": [{"text": "The bent molecular geometry of water, which makes it nonpolar.", "isCorrect": false, "rationale": "Water's bent geometry makes it a polar molecule, but this alone doesn't explain the extremely high boiling point; it's the *type* of strong intermolecular force enabled by this polarity."}, {"text": "The extensive network of hydrogen bonds formed between water molecules.", "isCorrect": true, "rationale": "Water can form up to four hydrogen bonds per molecule, creating an extensive network that requires significantly more energy to overcome for boiling compared to molecules with weaker intermolecular forces like H2S."}, {"text": "The strong covalent bonds within individual water molecules.", "isCorrect": false, "rationale": "Boiling involves overcoming intermolecular forces (separating molecules), not breaking intramolecular covalent bonds (the atoms within a molecule remain bonded)."}, {"text": "Water's ability to absorb and re-emit light, giving it luster.", "isCorrect": false, "rationale": "Luster is a property of metals due to delocalized electrons, not a factor in water's boiling point."}]}, {"question": "Van der Waals forces (London dispersion forces) are the weakest type of intermolecular force, but they can become significant under certain conditions. These forces are strongest when:", "options": [{"text": "Hydrogen atoms are bonded to highly electronegative atoms like oxygen or nitrogen.", "isCorrect": false, "rationale": "This describes the conditions for hydrogen bonding, which is a stronger type of intermolecular force than van der Waals forces."}, {"text": "Molecules possess a permanent dipole moment due to uneven electron distribution.", "isCorrect": false, "rationale": "This describes dipole-dipole forces, which are present in polar molecules and are generally stronger than London dispersion forces, but not the specific conditions for stronger van der Waals forces themselves."}, {"text": "Molecules are large, with many electrons, and can pack closely together.", "isCorrect": true, "rationale": "The text states that van der Waals forces become significant when molecules are large (more electrons mean stronger temporary charges) or when molecules can pack closely together."}, {"text": "Atoms within a molecule transfer electrons to form ions.", "isCorrect": false, "rationale": "This describes ionic bonding, which is an intramolecular force, not an intermolecular force."}]}, {"question": "Based on the 'Comparing Ionic and Covalent Properties' investigation, which substance would require the most energy to melt (i.e., has the highest melting point) and why?", "options": [{"text": "Paraffin wax, because its large molecules have very strong van der Waals forces.", "isCorrect": false, "rationale": "Wax has the lowest melting point among the substances tested, indicating weaker intermolecular forces compared to sugar or salt, even though its van der Waals forces are significant for its size."}, {"text": "Granulated sugar, because it forms extensive hydrogen bonds.", "isCorrect": false, "rationale": "Sugar does form hydrogen bonds, leading to a moderately high melting point, but it decomposes before reaching the extremely high temperatures required to melt ionic compounds like salt."}, {"text": "Table salt (NaCl), because it is an ionic compound held by strong electrostatic forces throughout a crystal lattice.", "isCorrect": true, "rationale": "Ionic compounds like salt are held together by very strong electrostatic attractions between positive and negative ions in a crystal lattice, requiring a large amount of energy to break, resulting in very high melting points (e.g., NaCl melts at 801°C, far beyond a hot plate)."}, {"text": "Distilled water, due to its strong hydrogen bonding network.", "isCorrect": false, "rationale": "Water is a liquid at room temperature (its melting point is 0°C), so it does not have the highest melting point among the solids considered in the investigation."}]}, {"question": "The investigation shows that a salt solution conducts electricity, but a sugar solution does not, even though both substances dissolve in water. This difference is best explained by:", "options": [{"text": "Salt having stronger hydrogen bonds with water than sugar.", "isCorrect": false, "rationale": "While both interact with water, the strength of their interaction doesn't directly explain conductivity; the *nature* of the dissolved species does."}, {"text": "Salt forming free-moving ions when dissolved, which can carry an electric charge, while sugar dissolves as neutral molecules.", "isCorrect": true, "rationale": "Ionic compounds dissociate into mobile ions in solution, which are charge carriers and allow electricity to flow. Covalent compounds like sugar dissolve as intact, neutral molecules that cannot carry a charge."}, {"text": "Sugar being a polar molecule, while salt is nonpolar.", "isCorrect": false, "rationale": "Salt is an ionic compound, not nonpolar, and sugar is indeed a polar covalent molecule. However, polarity itself doesn't directly confer conductivity to the solution unless ions are formed."}, {"text": "The covalent bonds within sugar molecules being weaker than the ionic bonds within salt.", "isCorrect": false, "rationale": "The strength of intramolecular bonds is not the direct reason for solution conductivity. Conductivity depends on the presence of free charge carriers in the solution."}]}, {"question": "Rubbing alcohol (isopropanol, C3H7OH) evaporates noticeably faster than water (H2O) at room temperature. Applying the concepts of intermolecular forces, what does this observation imply?", "options": [{"text": "Rubbing alcohol molecules are lighter than water molecules, so they move faster.", "isCorrect": false, "rationale": "Isopropanol (C3H7OH, MW ~60 g/mol) is significantly heavier than water (H2O, MW ~18 g/mol). Molecular weight is a factor, but this premise is incorrect."}, {"text": "Water has stronger and/or more extensive intermolecular forces than rubbing alcohol, requiring more energy to overcome them for evaporation.", "isCorrect": true, "rationale": "Faster evaporation indicates that less energy is required to separate molecules from the liquid phase. This means rubbing alcohol has weaker overall intermolecular forces compared to water, which has extensive hydrogen bonding (up to four per molecule) while isopropanol has fewer (one O-H group) plus van der Waals forces."}, {"text": "Both substances primarily experience strong van der Waals forces, but rubbing alcohol has more electrons.", "isCorrect": false, "rationale": "Both substances primarily exhibit hydrogen bonding, though rubbing alcohol also has significant van der Waals forces. However, water's hydrogen bonding is more extensive and dominant for its properties like evaporation rate."}, {"text": "Rubbing alcohol forms ionic bonds, making it easier to separate molecules.", "isCorrect": false, "rationale": "Rubbing alcohol is a molecular covalent compound, not an ionic one, and therefore forms intermolecular forces, not ionic bonds."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
