<script>
var QUESTIONS = [{"question": "What is the primary reason for carbon's unparalleled versatility in forming a vast array of compounds?", "options": [{"text": "It is a highly electronegative element that readily gains electrons to form ionic bonds.", "isCorrect": false, "rationale": "Carbon is not highly electronegative; it forms covalent bonds by sharing electrons, not ionic bonds by gaining them."}, {"text": "It has four valence electrons and readily forms four stable covalent bonds, including single, double, and triple bonds, and can bond to itself and diverse other elements.", "isCorrect": true, "rationale": "The text states carbon sits in Group 14 with four valence electrons, needing four more to complete its octet, and that it forms four covalent bonds with remarkable ease, including single, double, and triple bonds, and bonds readily to other carbon atoms and many other elements. This combination makes it uniquely versatile."}, {"text": "Its large atomic radius allows for a wide variety of orbital overlaps with other large atoms.", "isCorrect": false, "rationale": "The text states that carbon's small atomic radius allows its orbitals to overlap efficiently, producing strong, stable bonds, not a large radius."}, {"text": "It is electropositive enough to lose all four valence electrons, forming stable cations.", "isCorrect": false, "rationale": "Carbon is not electropositive enough to lose four electrons; instead, it shares electrons to form covalent bonds."}]}, {"question": "Which of the following compounds is traditionally classified as inorganic, despite containing carbon?", "options": [{"text": "Ethane (C2H6)", "isCorrect": false, "rationale": "Ethane is a hydrocarbon, containing C-C and C-H bonds, classifying it as an organic compound."}, {"text": "Methane (CH4)", "isCorrect": false, "rationale": "Methane is the smallest hydrocarbon, containing C-H bonds, making it an organic compound."}, {"text": "Carbon dioxide (CO2)", "isCorrect": true, "rationale": "The text explicitly lists CO2 as an exception, traditionally classified as inorganic despite containing carbon, due to its properties and chemistry."}, {"text": "Ethanol (CH3CH2OH)", "isCorrect": false, "rationale": "Ethanol contains carbon-carbon and carbon-hydrogen bonds along with a hydroxyl group, making it an organic compound."}]}, {"question": "If a straight-chain alkane contains 7 carbon atoms, how many hydrogen atoms would it have according to the general formula?", "options": [{"text": "14 hydrogen atoms", "isCorrect": false, "rationale": "This calculation (2n) would be incorrect for an alkane; it represents an alkene."}, {"text": "16 hydrogen atoms", "isCorrect": true, "rationale": "The general formula for a straight-chain alkane is CnH2n+2. For n=7, the number of hydrogen atoms is (2*7) + 2 = 14 + 2 = 16."}, {"text": "12 hydrogen atoms", "isCorrect": false, "rationale": "This calculation (2n-2) would be incorrect for an alkane; it represents an alkyne."}, {"text": "10 hydrogen atoms", "isCorrect": false, "rationale": "This number is too low for an alkane with 7 carbon atoms based on the general formula."}]}, {"question": "A chemist is trying to understand the exact arrangement of atoms and the specific types of bonds (single, double, triple) within a newly synthesized molecule. Which type of formula would provide this specific information?", "options": [{"text": "Molecular formula", "isCorrect": false, "rationale": "A molecular formula only tells you the types and counts of atoms present, not their arrangement or bond types."}, {"text": "Empirical formula", "isCorrect": false, "rationale": "An empirical formula shows the simplest whole-number ratio of atoms, which is even less specific than a molecular formula regarding actual atom counts and provides no structural information."}, {"text": "General formula", "isCorrect": false, "rationale": "A general formula (like CnH2n+2 for alkanes) describes a class of compounds but not the specific structure of an individual molecule."}, {"text": "Structural formula", "isCorrect": true, "rationale": "The text defines a structural formula as a diagram that shows the arrangement of atoms within a molecule, with each covalent bond (single, double, triple) drawn as a line between the bonded atoms, providing the exact information sought."}]}, {"question": "Ethanol (CH3CH2OH) and dimethyl ether (CH3OCH3) both have the molecular formula C2H6O but vastly different boiling points (78°C vs. -24°C). This difference is primarily due to what characteristic?", "options": [{"text": "Ethanol having a larger atomic mass.", "isCorrect": false, "rationale": "Since both molecules have the same molecular formula (C2H6O), they have identical atomic masses, so this cannot be the reason for property differences."}, {"text": "Their differing ability to form intermolecular hydrogen bonds due to their structural arrangements.", "isCorrect": true, "rationale": "The text explains that ethanol can form hydrogen bonds through its -OH group, while dimethyl ether cannot, leading to significantly different physical properties like boiling points, despite having the same molecular formula. This makes them isomers."}, {"text": "The presence of only single bonds in ethanol versus double bonds in dimethyl ether.", "isCorrect": false, "rationale": "Both ethanol and dimethyl ether primarily contain single bonds; the difference is in the arrangement of atoms, not the presence of multiple bonds as a primary differentiator for this property."}, {"text": "Dimethyl ether being a more complex molecule than ethanol.", "isCorrect": false, "rationale": "Both molecules are relatively simple and have the same number and types of atoms; complexity is not the differentiating factor here."}]}, {"question": "According to the text and 'Think Deeper' guidance, which of the following is a key reason carbon is better suited than silicon as the backbone of life's molecules?", "options": [{"text": "Carbon atoms are much larger than silicon atoms, allowing for more diverse arrangements.", "isCorrect": false, "rationale": "The text states carbon's small atomic radius allows for efficient orbital overlap, and silicon atoms are larger, which would hinder diverse arrangements by size."}, {"text": "Silicon forms stronger bonds with oxygen, which is essential for biological respiration.", "isCorrect": false, "rationale": "The guidance points out that carbon forms a gaseous oxide (CO2) which is easy to exchange, while SiO2 is a solid, suggesting carbon's interaction with oxygen is more favorable for life processes like respiration."}, {"text": "Carbon forms stronger, more stable bonds with other carbon atoms and can readily form stable double and triple bonds, unlike silicon.", "isCorrect": true, "rationale": "The text explicitly states C-C bonds are stronger than Si-Si bonds and that silicon does not form stable double or triple bonds under normal conditions, which are critical for the diversity and stability of organic molecules."}, {"text": "Silicon has only two valence electrons, making it less reactive than carbon.", "isCorrect": false, "rationale": "Like carbon, silicon is in Group 14 and has four valence electrons, not two. Its reactivity differences are due to other factors like bond strength and atomic radius."}]}, {"question": "Dorothy Hodgkin's pioneering work in X-ray crystallography was crucial for understanding the function of complex organic molecules because it allowed her to do what?", "options": [{"text": "Synthesize new organic compounds never before seen.", "isCorrect": false, "rationale": "Hodgkin's work focused on determining the structure of existing molecules, not their synthesis."}, {"text": "Analyze the elemental composition of unknown biological samples.", "isCorrect": false, "rationale": "X-ray crystallography determines the 3D arrangement of atoms, not just their elemental composition, which can be found by other analytical methods."}, {"text": "Determine the exact three-dimensional arrangement of atoms within complex molecules like penicillin and insulin.", "isCorrect": true, "rationale": "The 'Scientist Spot' highlights that Hodgkin 'pioneered the use of X-ray crystallography to determine the three-dimensional structures of complex organic molecules' and that 'knowing the exact arrangement of atoms in a molecule is essential for understanding how that molecule functions.'"}, {"text": "Measure the energy released during chemical reactions involving organic compounds.", "isCorrect": false, "rationale": "X-ray crystallography is a structural technique, not one used for measuring reaction energetics."}]}, {"question": "A newly discovered organic compound is found to contain only carbon and hydrogen atoms, with all carbon atoms connected by single bonds. This compound would be classified as what?", "options": [{"text": "An alcohol", "isCorrect": false, "rationale": "Alcohols contain a hydroxyl (-OH) group, which includes oxygen, not just carbon and hydrogen."}, {"text": "An alkene", "isCorrect": false, "rationale": "Alkenes are hydrocarbons that contain at least one carbon-carbon double bond, but this compound has only single bonds."}, {"text": "An alkane", "isCorrect": true, "rationale": "The text defines hydrocarbons with only single bonds between carbon atoms as alkanes. Since this compound contains only carbon and hydrogen and only single bonds, it fits the definition of an alkane."}, {"text": "A carbohydrate", "isCorrect": false, "rationale": "Carbohydrates are complex organic molecules that include carbon, hydrogen, and oxygen, usually in a ratio similar to water, and are not simply composed of only carbon and hydrogen."}]}, {"question": "The 'Earth Science Connection' section highlights that burning fossil fuels contributes to the enhanced greenhouse effect. This is primarily because burning these fuels does what?", "options": [{"text": "Releases large amounts of water vapor, which is a potent greenhouse gas.", "isCorrect": false, "rationale": "While burning fossil fuels does produce water, the primary contribution to the enhanced greenhouse effect discussed in the text is carbon release."}, {"text": "Depletes atmospheric oxygen levels, disrupting the natural balance.", "isCorrect": false, "rationale": "Burning fossil fuels consumes oxygen but the text focuses on the release of carbon into the atmosphere as the cause of the enhanced greenhouse effect."}, {"text": "Releases ancient carbon, stored over millions of years, back into the atmosphere as CO2.", "isCorrect": true, "rationale": "The text explicitly states that 'When we burn fossil fuels, we release that ancient carbon back into the atmosphere, contributing to the enhanced greenhouse effect.' This carbon was originally captured from atmospheric CO2 by photosynthetic organisms."}, {"text": "Forms new, stable hydrocarbons that accumulate in the atmosphere.", "isCorrect": false, "rationale": "Burning fossil fuels breaks down hydrocarbons and oxidizes them, releasing carbon dioxide, not forming new, stable hydrocarbons in the atmosphere."}]}, {"question": "The section 'Carbon — The Backbone of Life' emphasizes carbon's fundamental role in biological molecules. Which of the following statements best encapsulates why carbon is uniquely suited for this role?", "options": [{"text": "Carbon's inert nature prevents unwanted reactions, making molecules stable.", "isCorrect": false, "rationale": "Carbon is highly reactive and versatile, forming many types of bonds, which is far from inert. Its stability comes from strong covalent bonds, not inertness."}, {"text": "Carbon's ability to form exactly four strong covalent bonds with a wide variety of other atoms, including itself, in diverse structural arrangements.", "isCorrect": true, "rationale": "This statement synthesizes multiple points from the text: carbon forms four covalent bonds, can bond to itself (chains, rings) and many other elements (H, O, N, S, P, halogens), and these bonds are strong and stable due to its small atomic radius, leading to an 'enormous diversity of compounds' and 'virtually unlimited length' structures."}, {"text": "Carbon is the only element that can form single, double, and triple bonds.", "isCorrect": false, "rationale": "While carbon readily forms these, it is not the *only* element; for example, nitrogen forms a triple bond in N2. The uniqueness for life's backbone is the *combination* of abilities, including bonding to itself and many other elements, and bond strength."}, {"text": "Its abundance in the Earth's crust makes it readily available for all life forms.", "isCorrect": false, "rationale": "While carbon is present on Earth, its suitability for life's backbone is due to its intrinsic chemical bonding properties, not merely its abundance in the crust."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
