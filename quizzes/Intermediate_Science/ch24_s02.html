<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 24, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes voltage according to the provided text?", "options": [{"text": "It is the rate at which charge flows through a circuit.", "isCorrect": false, "rationale": "This describes current, not voltage. Voltage is the 'push' or potential difference, not the flow rate itself."}, {"text": "It measures how much energy is available to move each coulomb of charge.", "isCorrect": true, "rationale": "The text states, 'Voltage measures how much energy is available to move each coulomb of charge from one point to another,' aligning with the definition 1V = 1J/C."}, {"text": "It is a measure of how strongly a material opposes the flow of electric current.", "isCorrect": false, "rationale": "This describes resistance, not voltage."}, {"text": "It is the total amount of charge present in a circuit.", "isCorrect": false, "rationale": "Voltage is about the energy per unit charge (potential difference), not the total quantity of charge."}]}, {"question": "A student is designing an electrical heating element. Based on the factors determining resistance, which material and dimensions would be most suitable to achieve high resistance?", "options": [{"text": "A short, thick copper wire.", "isCorrect": false, "rationale": "Copper has low resistivity, and short, thick wires have less resistance. This combination would be for low resistance, not high."}, {"text": "A long, thin nichrome wire heated to a high temperature.", "isCorrect": true, "rationale": "The text states Nichrome has high resistivity. Longer wires have more resistance, thinner wires (smaller cross-sectional area) have more resistance, and increasing temperature for metals increases resistance. This combination maximizes resistance."}, {"text": "A short, thin silver wire at room temperature.", "isCorrect": false, "rationale": "Silver has the lowest resistivity, making it a poor choice for high resistance, even if thin and short. Lower temperature also reduces resistance."}, {"text": "A long, thick aluminum wire cooled to a very low temperature.", "isCorrect": false, "rationale": "While long, a thick wire and low temperature would reduce resistance. Aluminum's resistivity is not specified as high for heating elements in the text."}]}, {"question": "If a circuit has a fixed voltage and its resistance is doubled, what happens to the current flowing through the circuit?", "options": [{"text": "The current also doubles.", "isCorrect": false, "rationale": "According to Ohm's Law (I = V/R), current and resistance are inversely proportional when voltage is fixed. If resistance doubles, current halves."}, {"text": "The current remains unchanged.", "isCorrect": false, "rationale": "Changing resistance with a fixed voltage will always affect the current, as they are inversely proportional."}, {"text": "The current is halved.", "isCorrect": true, "rationale": "Ohm's Law states I = V/R. If R doubles and V is constant, then I will be V/(2R), which means the current is halved, demonstrating an inverse proportionality."}, {"text": "The current increases by a factor of four.", "isCorrect": false, "rationale": "This is incorrect. Current and resistance are inversely proportional, not directly proportional or quadratically related in this manner."}]}, {"question": "A standard D-cell battery has a voltage of 1.5V. If this battery is connected to a small light bulb with a resistance of 5.0 ohms, what is the current flowing through the bulb?", "options": [{"text": "7.5 A", "isCorrect": false, "rationale": "This would be V * R, but Ohm's law for current is I = V/R."}, {"text": "0.3 A", "isCorrect": true, "rationale": "Using Ohm's Law, I = V/R. So, I = 1.5V / 5.0Ω = 0.3A."}, {"text": "3.33 A", "isCorrect": false, "rationale": "This would be R/V, which is incorrect for finding current."}, {"text": "5.0 A", "isCorrect": false, "rationale": "This value is the resistance, not the current."}]}, {"question": "The primary reason a conductor offers resistance to current flow is that:", "options": [{"text": "The conductor absorbs electrons, reducing the total charge.", "isCorrect": false, "rationale": "Conductors facilitate electron flow; they don't absorb and reduce total charge in this context."}, {"text": "Electrons collide with atoms in the material, converting electrical energy into thermal energy.", "isCorrect": true, "rationale": "The text explicitly states, 'As electrons move through a conductor, they collide with atoms in the material, transferring kinetic energy to those atoms. These collisions convert electrical energy into thermal energy (heat), and they slow the overall flow of charge.'"}, {"text": "The material creates a strong magnetic field that repels the electrons.", "isCorrect": false, "rationale": "While current can create magnetic fields, this is not the primary mechanism described for resistance in the text."}, {"text": "Positive and negative charges within the material actively block electron movement.", "isCorrect": false, "rationale": "Resistance is due to collisions with atoms, which includes the atomic nuclei and their electrons, but not described as 'actively blocking' in a separate, distinct manner from collisions."}]}, {"question": "Which of the following units is equivalent to 'ohms' (Ω)?", "options": [{"text": "Joule per Coulomb (J/C)", "isCorrect": false, "rationale": "Joule per Coulomb (J/C) is the unit for voltage (Volts)."}, {"text": "Ampere per Volt (A/V)", "isCorrect": false, "rationale": "This would be the inverse of resistance (conductance), not resistance itself. Resistance is V/A."}, {"text": "Volt per Ampere (V/A)", "isCorrect": true, "rationale": "The text defines resistance in ohms (Ω), where '1Ω = 1V/A' (one volt per ampere)."}, {"text": "Coulomb per Second (C/s)", "isCorrect": false, "rationale": "Coulomb per Second (C/s) is the unit for current (Amperes)."}]}, {"question": "Two light bulbs, Bulb A (10Ω) and Bulb B (30Ω), are connected one at a time to the same 6V battery. Which bulb will glow brighter, and why?", "options": [{"text": "Bulb B, because it has higher resistance, leading to more heat and light.", "isCorrect": false, "rationale": "While higher resistance can lead to more heat, with a fixed voltage, higher resistance means less current (I=V/R). Less current means less power dissipated (P=IV), so Bulb B will be dimmer."}, {"text": "Bulb A, because its lower resistance allows more current to flow, dissipating more power.", "isCorrect": true, "rationale": "Using Ohm's Law (I=V/R), Bulb A (6V/10Ω = 0.6A) draws more current than Bulb B (6V/30Ω = 0.2A). More current means more electrical energy converted to light and heat per second (higher power, P=IV), making Bulb A brighter."}, {"text": "Both bulbs will glow with the same brightness, as they are connected to the same voltage source.", "isCorrect": false, "rationale": "Brightness depends on the power dissipated, which is a function of both voltage and current (or resistance). Since their resistances differ, the current through them will differ, leading to different brightnesses."}, {"text": "Bulb B, because it requires more 'push' (voltage) to operate, making it inherently brighter.", "isCorrect": false, "rationale": "The voltage is the same for both. Higher resistance does not mean it 'requires more push' in this context; rather, it *resists* the push more, reducing current."}]}, {"question": "What happens to the resistance of most metals as their temperature increases?", "options": [{"text": "Resistance decreases because electrons move faster.", "isCorrect": false, "rationale": "While electrons move faster, the increased vibration of atoms causes more collisions, increasing resistance, not decreasing it."}, {"text": "Resistance remains constant, as temperature only affects insulators.", "isCorrect": false, "rationale": "Temperature is explicitly listed as a factor affecting the resistance of conductors (metals)."}, {"text": "Resistance increases because atoms vibrate more vigorously, causing more collisions with electrons.", "isCorrect": true, "rationale": "The text states: 'For most metals, resistance increases with temperature because atoms vibrate more vigorously and cause more collisions with electrons.'"}, {"text": "Resistance initially increases then decreases, following a parabolic curve.", "isCorrect": false, "rationale": "The text describes a direct increase for most metals, not a complex parabolic relationship."}]}, {"question": "A resistor in a circuit has a resistance of 25Ω. If the current flowing through it is 0.5 A, what is the voltage across the resistor?", "options": [{"text": "0.02 V", "isCorrect": false, "rationale": "This would be I/R, which is incorrect for voltage."}, {"text": "12.5 V", "isCorrect": true, "rationale": "Using Ohm's Law, V = IR. So, V = (0.5 A) * (25 Ω) = 12.5 V."}, {"text": "50 V", "isCorrect": false, "rationale": "This would be R/I, which is incorrect for voltage."}, {"text": "25.5 V", "isCorrect": false, "rationale": "This would be R+I, which is not an application of Ohm's Law."}]}, {"question": "Which statement accurately reflects Georg Simon Ohm's contribution to electrical science, as described in the text?", "options": [{"text": "He invented the battery, allowing for continuous current flow.", "isCorrect": false, "rationale": "Ohm discovered the relationship between voltage, current, and resistance; he did not invent the battery."}, {"text": "He developed the theory that electricity is made of discrete particles (electrons).", "isCorrect": false, "rationale": "Ohm's work focused on the mathematical relationship of macroscopic electrical quantities, not the particle nature of electricity."}, {"text": "He published the discovery that current is directly proportional to voltage and inversely proportional to resistance.", "isCorrect": true, "rationale": "The text states that Ohm 'published his discovery that the current through a conductor is directly proportional to the voltage across it and inversely proportional to its resistance.'"}, {"text": "He discovered that magnetism and electricity are fundamentally linked.", "isCorrect": false, "rationale": "While other scientists made discoveries linking electricity and magnetism, Ohm's primary contribution detailed here is Ohm's Law."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
