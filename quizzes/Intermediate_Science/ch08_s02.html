        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "Which of the following statements best describes an 'element family' as defined in the context of the periodic table?", "options": [{"text": "A group of elements with similar atomic masses, found in the same row.", "isCorrect": false, "rationale": "An element family is defined by its column (group), not its row (period), and shares chemical behaviors due to valence electrons, not primarily similar atomic masses."}, {"text": "Elements that are all metals, nonmetals, or metalloids.", "isCorrect": false, "rationale": "While elements are classified this way, an 'element family' specifically refers to a column on the periodic table, not these broad categories themselves. Families exist within these categories."}, {"text": "A group of elements in the same column of the periodic table, sharing characteristic chemical behaviors due to having the same number of valence electrons.", "isCorrect": true, "rationale": "This statement accurately defines an element family according to the text: elements in the same column, sharing chemical behaviors due to the same number of valence electrons."}, {"text": "Elements that can react with each other to form stable compounds.", "isCorrect": false, "rationale": "While elements in a family might react with other elements, this definition does not capture the essence of what an 'element family' means in terms of periodic table structure and shared properties."}], "id": "q01"}, {"question": "A scientist discovers a new element. It is soft, highly reactive, forms a +1 ion, and reacts vigorously with water, producing hydrogen gas. Based on these properties, to which family would this new element most likely belong?", "options": [{"text": "Alkaline Earth Metals", "isCorrect": false, "rationale": "Alkaline earth metals are harder, form +2 ions, and are less reactive than described, reacting only slowly with water (e.g., calcium)."}, {"text": "Transition Metals", "isCorrect": false, "rationale": "Transition metals are typically hard, strong, and dense, and often form ions with variable charges, not exclusively +1. They are not known for the described vigorous reaction with water."}, {"text": "Alkali Metals", "isCorrect": true, "rationale": "The description matches all the key characteristics of alkali metals: soft, highly reactive, readily loses one valence electron to form a +1 ion, and reacts vigorously with water to produce hydrogen gas."}, {"text": "Halogens", "isCorrect": false, "rationale": "Halogens are nonmetals, typically gain one electron to form -1 ions, and are gases, liquids, or solids at room temperature, not soft metals."}], "id": "q02"}, {"question": "Which of the following explains why francium (Fr) is more reactive than lithium (Li), despite both being alkali metals?", "options": [{"text": "Francium has more valence electrons than lithium, leading to greater reactivity.", "isCorrect": false, "rationale": "Both lithium and francium, as alkali metals, have exactly one valence electron. The number of valence electrons is the same, not different."}, {"text": "Francium is a nonmetal, while lithium is a metal, making francium inherently more reactive.", "isCorrect": false, "rationale": "Both francium and lithium are metals. Francium is an alkali metal, and all alkali metals (except hydrogen) are metals. This statement is incorrect."}, {"text": "As you move down Group 1, each successive element has more electron energy levels, placing the single valence electron farther from the nucleus, making it easier to remove.", "isCorrect": true, "rationale": "The text explains that reactivity increases down Group 1 because increasing atomic size places the valence electron farther from the nucleus, weakening its attraction and making it easier to lose."}, {"text": "Francium has a higher melting point, indicating stronger metallic bonds and thus greater reactivity.", "isCorrect": false, "rationale": "Alkali metal melting points decrease down the group. Lower melting points actually suggest weaker metallic bonds, but the primary reason for increased reactivity is the ease of losing the valence electron due to atomic size, not melting point directly."}], "id": "q03"}, {"question": "A student is comparing magnesium (Mg) from Group 2 with sodium (Na) from Group 1. Which of the following differences is correct?", "options": [{"text": "Sodium typically forms a +2 ion, while magnesium forms a +1 ion.", "isCorrect": false, "rationale": "Sodium (Group 1) forms a +1 ion, while magnesium (Group 2) forms a +2 ion."}, {"text": "Magnesium is softer and less dense than sodium.", "isCorrect": false, "rationale": "The text states that alkaline earth metals (like magnesium) are harder and denser than alkali metals (like sodium)."}, {"text": "Sodium is less reactive than magnesium because it needs to lose only one electron.", "isCorrect": false, "rationale": "Sodium (alkali metal) is more reactive than magnesium (alkaline earth metal) because losing one electron (Na) requires less energy than losing two electrons (Mg)."}, {"text": "Magnesium is harder, denser, and has a higher melting point than sodium, but is less reactive.", "isCorrect": true, "rationale": "The text explicitly states that alkaline earth metals (Group 2) are harder, denser, and have higher melting points compared to alkali metals (Group 1), and are less reactive because losing two electrons requires more energy than losing one."}], "id": "q04"}, {"question": "Transition metals, found in Groups 3-12, are unique among the metal families described due to which characteristic?", "options": [{"text": "They are typically soft and highly reactive, like alkali metals.", "isCorrect": false, "rationale": "Transition metals are typically hard, strong, and dense, unlike the soft and highly reactive alkali metals."}, {"text": "They are the only metals that can conduct electricity.", "isCorrect": false, "rationale": "All metals (alkali, alkaline earth, transition) are good conductors of electricity. This is not a unique characteristic of transition metals."}, {"text": "They can form ions with different charges and often produce colorful compounds.", "isCorrect": true, "rationale": "The text highlights that transition metals can form ions with multiple oxidation states (e.g., Fe2+, Fe3+) and many form colorful compounds, which distinguishes them from main-group metals like alkali and alkaline earth metals."}, {"text": "They react vigorously with water, producing hydrogen gas and a metal hydroxide.", "isCorrect": false, "rationale": "This describes the reactivity of alkali metals, not transition metals. Transition metals are generally less reactive with water."}], "id": "q05"}, {"question": "Which statement accurately describes the characteristics of halogens?", "options": [{"text": "They are highly unreactive nonmetals with full outer electron shells.", "isCorrect": false, "rationale": "This describes noble gases. Halogens are highly reactive nonmetals with seven valence electrons, needing one more to fill their outer shell."}, {"text": "They are all gases at room temperature and have one valence electron.", "isCorrect": false, "rationale": "Halogens exist in all three states (F, Cl are gases; Br is liquid; I is solid) and have seven valence electrons, not one."}, {"text": "They are the most reactive nonmetals, typically gaining one electron to form -1 ions, and exist in all three common states of matter at room temperature.", "isCorrect": true, "rationale": "This accurately reflects the description: halogens are the most reactive nonmetals, need one electron to achieve a full shell (forming -1 ions), and are found as gases, a liquid, and a solid at room temperature."}, {"text": "They are found in Group 1 of the periodic table, alongside hydrogen.", "isCorrect": false, "rationale": "Halogens are found in Group 17, while Group 1 contains alkali metals and hydrogen."}], "id": "q06"}, {"question": "Consider the reactivity trends for Group 1 (alkali metals) and Group 17 (halogens). Why does reactivity increase down Group 1 but decrease down Group 17?", "options": [{"text": "Both trends are due to a decreasing number of valence electrons down each group, making electron transfer easier.", "isCorrect": false, "rationale": "The number of valence electrons remains constant within a group (1 for alkali metals, 7 for halogens). The trend is related to atomic size, not a change in valence electron count."}, {"text": "Alkali metals become more metallic down the group, while halogens become more nonmetallic.", "isCorrect": false, "rationale": "The metallic character increases down a group, and nonmetallic character decreases. This is a correct trend, but it doesn't directly explain the opposite reactivity trends in terms of electron behavior as thoroughly as other options."}, {"text": "Increasing atomic size down Group 1 makes it easier to lose an electron (increasing metal reactivity), but increasing atomic size down Group 17 makes it harder to gain an electron (decreasing nonmetal reactivity).", "isCorrect": true, "rationale": "The text explains this directly: larger atoms have valence electrons farther from the nucleus, making them easier to lose (more reactive metals) but also weakening the pull on incoming electrons, making them harder to gain (less reactive nonmetals)."}, {"text": "The change in proton count down each group directly dictates these opposite reactivity trends.", "isCorrect": false, "rationale": "While proton count increases down a group, the explanation focuses on the effect of the increasing distance of electrons from the nucleus, not solely the proton count itself as the direct cause of the *opposite* reactivity trends."}], "id": "q07"}, {"question": "Which property or application is characteristic of noble gases?", "options": [{"text": "They readily form colorful compounds with many other elements.", "isCorrect": false, "rationale": "Noble gases are extremely unreactive and form very few compounds, usually only with highly electronegative elements like fluorine, and these are not typically described as 'colorful' as a general characteristic. This describes transition metals more accurately."}, {"text": "They are highly reactive nonmetals, used as chemical weapons.", "isCorrect": false, "rationale": "This describes halogens, particularly chlorine. Noble gases are nearly inert and are not used as chemical weapons."}, {"text": "They are colorless, odorless, and nearly inert due to having full outer electron shells.", "isCorrect": true, "rationale": "The text explicitly states that noble gases are colorless, odorless, nearly inert, and have full outer electron shells, which accounts for their stability."}, {"text": "They are soft metals used in electrical wiring due to high conductivity.", "isCorrect": false, "rationale": "Noble gases are nonmetals and are not soft metals. Conductivity is a property of metals, not typically associated with noble gases for wiring."}], "id": "q08"}, {"question": "Silicon is the most commercially important metalloid. Its key property that makes it the foundation of modern electronics is:", "options": [{"text": "Its extreme hardness and high melting point, making it durable for circuit boards.", "isCorrect": false, "rationale": "While some metals are hard, silicon's commercial importance stems from its electrical properties, not its physical hardness for structural components."}, {"text": "Its ability to form a +4 ion easily, allowing for strong bonding in compounds.", "isCorrect": false, "rationale": "While silicon has four valence electrons, its role in electronics is not primarily due to ion formation, but its semiconducting nature."}, {"text": "Its excellent conductivity, making it an ideal material for electrical wires.", "isCorrect": false, "rationale": "Silicon is a semiconductor, meaning it conducts electricity only under certain conditions, not an 'excellent conductor' like copper for wires. Its controlled conductivity is the key."}, {"text": "Its semiconducting nature, allowing engineers to control its conductivity with precision through doping.", "isCorrect": true, "rationale": "The text explicitly states that silicon is a semiconductor, and its ability to have its conductivity controlled by doping makes it the foundation of modern electronics like computer chips and solar cells."}], "id": "q09"}, {"question": "Imagine you are developing a new type of battery that requires an element which readily loses electrons and reacts vigorously. Based on the provided text, which of the following elements would be the best candidate and why?", "options": [{"text": "Chlorine (Cl) because it is a highly reactive nonmetal and forms -1 ions.", "isCorrect": false, "rationale": "Chlorine is a highly reactive nonmetal, but it readily *gains* electrons (forms -1 ions), not loses them. This makes it unsuitable for an application requiring an element that readily loses electrons."}, {"text": "Calcium (Ca) because it is an alkaline earth metal that is reactive and forms +2 ions.", "isCorrect": false, "rationale": "Calcium is reactive and loses electrons to form +2 ions, but alkali metals lose electrons even more readily and react more vigorously, making them a better choice for an element that 'readily loses electrons and reacts vigorously.'"}, {"text": "Potassium (K) because it is an alkali metal, known for being one of the most reactive metals that readily loses its single valence electron.", "isCorrect": true, "rationale": "Potassium is an alkali metal, which are described as the 'most reactive metals' that readily lose their single valence electron to form a +1 ion and react vigorously. This perfectly matches the requirement."}, {"text": "Xenon (Xe) because it is a noble gas and is very stable, making it safe for batteries.", "isCorrect": false, "rationale": "Xenon is a noble gas and is extremely unreactive, meaning it has no tendency to lose or gain electrons. It would not contribute to vigorous reactions needed for a battery designed to 'readily lose electrons and react vigorously.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
