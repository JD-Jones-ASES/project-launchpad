    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 31, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes the fundamental nature of modern scientific challenges as presented in the text?", "options": [{"text": "They are primarily solved by scientists working in isolation within their specific fields to maintain focus.", "isCorrect": false, "rationale": "The text explicitly states that modern challenges 'cannot be solved by biologists alone, or chemists alone, or physicists alone,' contradicting the idea of isolated work."}, {"text": "They are often complex problems requiring collaboration and combined expertise from multiple scientific disciplines.", "isCorrect": true, "rationale": "The text's core message is that 'the biggest challenges facing humanity today...are inherently interdisciplinary,' necessitating 'teams of scientists from different fields working together.'"}, {"text": "They primarily involve theoretical advancements rather than practical applications.", "isCorrect": false, "rationale": "The examples (pandemics, climate change, energy, food security) are all pressing, real-world problems, not solely theoretical."}, {"text": "They are typically resolved through rapid, compressed research timelines, negating the need for foundational work.", "isCorrect": false, "rationale": "While pandemic response showed rapid work, the 'Science Under Pressure' box clarifies this was 'possible because scientists worldwide...built on decades of prior research,' not negating it."}]}, {"question": "In the development of mRNA vaccines, which scientific discipline was most directly responsible for designing the mRNA molecule, encapsulating it in lipid nanoparticles, and ensuring its stability?", "options": [{"text": "Biology and genetics", "isCorrect": false, "rationale": "Biology and genetics were crucial for understanding the virus and the immune response, but not the specific chemical engineering of the vaccine components."}, {"text": "Chemistry and biochemistry", "isCorrect": true, "rationale": "The text explicitly states: 'Designing the mRNA molecule, encapsulating it in lipid nanoparticles...and stabilizing it for storage and transport all required advanced chemistry.'"}, {"text": "Physics and engineering", "isCorrect": false, "rationale": "Physics and engineering were vital for manufacturing, temperature control, and diagnostics, but not the chemical design of the vaccine itself."}, {"text": "Data science and modeling", "isCorrect": false, "rationale": "Data science focused on predicting disease spread and population dynamics, not vaccine molecular design."}]}, {"question": "During a pandemic response, what specific contribution did data science and mathematical modeling provide, as described in the text?", "options": [{"text": "Designing the molecular structure of new vaccine components.", "isCorrect": false, "rationale": "This task falls under chemistry and biochemistry, not data science."}, {"text": "Predicting the rate and patterns of disease spread.", "isCorrect": true, "rationale": "The text states: 'Epidemiologists used mathematical models to predict the spread of disease...rely on the same mathematical principles of rates of change, exponential growth, and graphing.'"}, {"text": "Optimizing the efficiency of vaccine manufacturing processes.", "isCorrect": false, "rationale": "This relates more to physics and engineering principles, not the primary role of data science mentioned."}, {"text": "Understanding the genetic mutations of the virus over time.", "isCorrect": false, "rationale": "This is a key role of biology and genetics, involving sequencing and evolutionary analysis."}]}, {"question": "The intermittency of renewable energy sources like solar and wind, meaning they don't always generate power, poses a major challenge. Which scientific discipline is primarily focused on developing solutions for *storing* excess energy for later use to address this intermittency?", "options": [{"text": "The physics of energy conversion", "isCorrect": false, "rationale": "Physics focuses on converting energy from one form to another (e.g., solar to electrical), not primarily on long-term storage solutions for intermittency."}, {"text": "The chemistry of energy storage", "isCorrect": true, "rationale": "The text explicitly states, 'Storing excess energy for later use is primarily a chemistry challenge. Lithium-ion batteries store energy in chemical bonds...'"}, {"text": "The earth science of resource location", "isCorrect": false, "rationale": "Earth science determines optimal locations for energy generation (e.g., wind patterns, solar insolation), not energy storage technology."}, {"text": "The ecology of energy infrastructure", "isCorrect": false, "rationale": "Ecology assesses the environmental impact of energy installations, not the technological means of energy storage."}]}, {"question": "A community is considering a new renewable energy project. To make an informed decision about the best location for the installation and to understand its potential effects on local animal populations and habitats, which combination of scientific branches would be most crucial?", "options": [{"text": "Physics and Chemistry", "isCorrect": false, "rationale": "While central to the energy technology itself, physics and chemistry are less directly involved in site selection based on natural resources or ecological impact assessment."}, {"text": "Earth Science and Ecology", "isCorrect": true, "rationale": "The text states Earth science determines 'where you build renewable energy infrastructure depends on geography, climate, and geology,' and ecology assesses 'environmental impacts that must be assessed using ecological science,' including effects on 'bird and bat populations' and 'wildlife habitats.'"}, {"text": "Data Science and Biology", "isCorrect": false, "rationale": "Data science could model outcomes, and biology is foundational for ecology, but Earth science and Ecology are the direct fields for location and specific ecosystem impact."}, {"text": "Engineering and Genetics", "isCorrect": false, "rationale": "Engineering implements the project, and genetics studies hereditary traits, neither of which directly address the location's natural conditions or the broad ecological impact on populations."}]}, {"question": "Neurotransmitters are organic molecules crucial for brain function. How do psychiatric medications, as discussed in the text, typically work by interacting with these molecules, and which scientific discipline is most central to understanding these interactions?", "options": [{"text": "By altering the electrical conductivity of neurons, understood through physics.", "isCorrect": false, "rationale": "While neurons have electrical signals, medications primarily work on the chemical aspects of neurotransmission, not by altering the bulk conductivity in a physics sense."}, {"text": "By physically restructuring neural pathways, understood through biology.", "isCorrect": false, "rationale": "Medications typically influence chemical signaling, not the physical restructuring of brain pathways."}, {"text": "By modifying the chemical interactions of neurotransmitter systems, understood through chemistry.", "isCorrect": true, "rationale": "The text states, 'Psychiatric medications work by altering the chemistry of neurotransmitter systems — blocking receptors, enhancing release, or inhibiting breakdown,' requiring 'knowledge of molecular structure, acid-base chemistry...and biochemistry.'"}, {"text": "By changing the geological composition of the brain, understood through earth science.", "isCorrect": false, "rationale": "Earth science connections to the brain are through paleontology and environmental toxicology (pollutants), not the direct mechanism of psychiatric medications."}]}, {"question": "The text explains that MRI scanners are used to create detailed images of brain structure and function. What fundamental physics principle do these scanners utilize to achieve this, as mentioned in the section on brain science?", "options": [{"text": "Thermal cycling for DNA amplification.", "isCorrect": false, "rationale": "Thermal cycling is used in PCR machines for diagnostics, not MRI scanners."}, {"text": "Electromagnetic induction and radio waves.", "isCorrect": true, "rationale": "The text explicitly states: 'MRI scanners use powerful electromagnets (Unit 29) and radio waves (Unit 19) to create detailed images of brain structure and function.'"}, {"text": "Gravitational potential energy conversion.", "isCorrect": false, "rationale": "This principle is relevant to hydroelectric dams, not MRI technology."}, {"text": "Chemical energy stored in molecular bonds.", "isCorrect": false, "rationale": "This describes how batteries and fuel cells store energy, not how MRI imaging works."}]}, {"question": "According to the introductory part of the section, why has interdisciplinary science become a fundamental feature of how modern science works?", "options": [{"text": "Because traditional scientific fields have exhausted all their individual research opportunities.", "isCorrect": false, "rationale": "The text does not suggest traditional fields are exhausted but rather that new, complex problems transcend single disciplines."}, {"text": "Because the biggest challenges facing humanity are inherently complex and cannot be solved by a single discipline.", "isCorrect": true, "rationale": "The text states: 'The biggest challenges facing humanity today...are inherently interdisciplinary. They cannot be solved by biologists alone...They require teams of scientists from different fields working together.'"}, {"text": "Because government funding agencies now mandate interdisciplinary collaboration for all research projects.", "isCorrect": false, "rationale": "While funding may encourage it, the text presents the fundamental *reason* as the nature of the challenges, not a mandate."}, {"text": "Because scientists have globally agreed to merge all scientific branches into one unified field.", "isCorrect": false, "rationale": "The text mentions 'blurred boundaries' but does not suggest a complete merger into a single unified field."}]}, {"question": "A student pursuing a career in biology understands that they will likely specialize. According to the 'Why Interdisciplinary Thinking Matters' section, what is the most valuable skill for this biologist to develop to make powerful scientific contributions?", "options": [{"text": "The ability to conduct experiments at maximum speed, compressing research timelines.", "isCorrect": false, "rationale": "While rapid work was seen during the pandemic, the text highlights this as a special circumstance and not the 'most valuable skill' for ongoing scientific contribution in general."}, {"text": "The ability to work in complete isolation to ensure unbiased research outcomes.", "isCorrect": false, "rationale": "This directly contradicts the entire theme of interdisciplinary collaboration presented throughout the text."}, {"text": "The ability to see connections between biology and other scientific fields.", "isCorrect": true, "rationale": "The text states: 'the most valuable skill you can develop is the ability to see connections between your specialty and other fields. A biologist who understands chemistry can design better experiments.'"}, {"text": "The ability to master all scientific disciplines simultaneously to become a universal expert.", "isCorrect": false, "rationale": "The text acknowledges specialization but emphasizes connecting one's specialty with other fields, rather than mastering all disciplines simultaneously."}]}, {"question": "The 'Science Under Pressure' callout box explains that the rapid development of mRNA vaccines during the pandemic was possible not because the technology was new, but due to what primary factor?", "options": [{"text": "An unprecedented increase in global scientific funding.", "isCorrect": false, "rationale": "Increased funding may have played a role, but the text emphasizes existing research and collaboration as the primary enablers."}, {"text": "The invention of entirely new scientific methods during the pandemic.", "isCorrect": false, "rationale": "The text explicitly states: 'The mRNA vaccine technology, for example, was not invented during the pandemic — it was the result of over 30 years of foundational research.'"}, {"text": "Decades of foundational research in molecular biology and chemistry, combined with open global collaboration.", "isCorrect": true, "rationale": "The text highlights: 'This was possible because scientists worldwide shared data openly, collaborated across institutions and countries, and built on decades of prior research. The mRNA vaccine technology...was the result of over 30 years of foundational research.'"}, {"text": "The recruitment of non-scientists into research teams to speed up processes.", "isCorrect": false, "rationale": "The text focuses on 'scientists' sharing data and collaborating, not the inclusion of non-scientists as a primary factor for speed."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
