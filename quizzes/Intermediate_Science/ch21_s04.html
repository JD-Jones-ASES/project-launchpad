    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 21, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A new insect species, Insectus novus, is discovered. Scientists observe that it can mate with Insectus communis in a lab setting, but their offspring are always infertile. According to the biological species concept, what is the most accurate classification of Insectus novus and Insectus communis?", "options": [{"text": "They are the same species because they can interbreed.", "isCorrect": false, "rationale": "The biological species concept requires not only interbreeding but also the production of fertile offspring. If the offspring are infertile, they are considered separate species."}, {"text": "They are distinct species because their offspring are infertile.", "isCorrect": true, "rationale": "The biological species concept defines a species as a group of organisms that can interbreed and produce fertile offspring under natural conditions. Since their offspring are infertile, Insectus novus and Insectus communis are separate species."}, {"text": "They are subspecies because they can mate, but not produce fertile offspring.", "isCorrect": false, "rationale": "The inability to produce fertile offspring classifies them as distinct species, not subspecies. Subspecies are typically groups within a species that have distinct traits but can still interbreed and produce fertile offspring."}, {"text": "Their classification depends on their physical appearance, not their reproductive success.", "isCorrect": false, "rationale": "While physical appearance can be a clue, the biological species concept prioritizes reproductive isolation and the ability to produce fertile offspring as the primary determinant for species classification."}], "id": "q01"}, {"question": "A large forest is gradually bisected by a major highway, effectively separating a population of deer into two distinct groups. Over several hundred years, the deer on one side adapt to different foraging patterns due to altered vegetation, while the other side faces different predator pressures. Which of the following is the most likely long-term outcome for these two deer groups, according      to the principles of speciation?", "options": [{"text": "They will remain a single species, as highways are not natural barriers.", "isCorrect": false, "rationale": "Any physical barrier, natural or artificial, can lead to geographic isolation by preventing gene flow between populations, a key step in speciation."}, {"text": "They will experience increased gene flow due to human activity, preventing speciation.", "isCorrect": false, "rationale": "A highway acts as a barrier, effectively stopping gene flow between the two separated deer populations, which is necessary for them to evolve independently."}, {"text": "They will likely undergo allopatric speciation, becoming reproductively isolated over time.", "isCorrect": true, "rationale": "The geographic isolation caused by the highway, coupled with different environmental pressures and genetic drift in each separated group, will lead to the accumulation of genetic differences. Over time, these differences can result in reproductive isolation, a process known as allopatric speciation."}, {"text": "They will become extinct due to the stress of habitat fragmentation.", "isCorrect": false, "rationale": "While habitat fragmentation can contribute to extinction, the direct consequence of geographic isolation and independent evolution in this scenario is speciation, assuming the populations can survive in their respective new conditions."}], "id": "q02"}, {"question": "Following a catastrophic event that cleared vast areas of forest, a single species of ground-dwelling rodent finds abundant new food sources and habitats that were previously unavailable. Over several million years, its descendants evolve into multiple new species, each adapted to different niches, such as tree-dwelling, burrowing, and seed-eating. This scenario best exemplifies which evolutionary process?", "options": [{"text": "Background extinction", "isCorrect": false, "rationale": "Background extinction refers to the normal, ongoing loss of species, not the diversification of existing ones into many new forms."}, {"text": "Geographic isolation", "isCorrect": false, "rationale": "While new environments might involve some level of isolation, the scenario emphasizes the rapid diversification from a single ancestor into many *different niches* within that environment, which is the hallmark of adaptive radiation, not just isolation."}, {"text": "Allopatric speciation", "isCorrect": false, "rationale": "Allopatric speciation involves a population being split by a physical barrier. This scenario describes a single ancestral species diversifying into many species, often within a new or newly available environment, rather than splitting due to a barrier."}, {"text": "Adaptive radiation", "isCorrect": true, "rationale": "Adaptive radiation is defined as the rapid diversification of a single ancestral species into many new species, each adapted to a different ecological niche. The opening of new ecological opportunities after a catastrophic event or colonization of a new environment is a classic trigger for this process."}], "id": "q03"}, {"question": "What is the primary difference between background extinction and a mass extinction event?", "options": [{"text": "Background extinction is caused by human activity, while mass extinction is natural.", "isCorrect": false, "rationale": "Both background and mass extinctions can have natural causes. While human activity has increased extinction rates, the definitions are not solely based on human causation."}, {"text": "Mass extinction involves the loss of a large percentage of species in a geologically short time, whereas background extinction is the normal, ongoing loss.", "isCorrect": true, "rationale": "This accurately defines the distinction. Mass extinctions are characterized by a rapid, widespread loss of many species, while background extinction is the continuous, lower-level loss of species over long periods."}, {"text": "Background extinction only affects small populations, while mass extinction affects large, widespread species.", "isCorrect": false, "rationale": "The scale of species loss, rather than the size or spread of affected populations, is the key differentiator between background and mass extinctions."}, {"text": "Mass extinction leads to adaptive radiation, while background extinction prevents it.", "isCorrect": false, "rationale": "Both types of extinction can open ecological niches, potentially leading to adaptive radiation among surviving species. However, adaptive radiation is more dramatically observed after mass extinctions due to the vast number of empty niches."}], "id": "q04"}, {"question": "In a cladogram, what does a 'node' or branching point primarily represent?", "options": [{"text": "A species that has gone extinct.", "isCorrect": false, "rationale": "Tips or ends of branches usually represent living species or groups. While ancestors at nodes might be extinct, the node itself specifically denotes the common ancestry point."}, {"text": "A common ancestor shared by the groups above that point.", "isCorrect": true, "rationale": "As defined in the text, 'Each node (branching point) represents a common ancestor shared by the groups above it.'"}, {"text": "A shared derived character that evolved in a single species.", "isCorrect": false, "rationale": "Shared derived characters are traits that evolve at some point in an lineage and are then present in all descendants from that point. They are often indicated on the branches leading from a node, but the node itself is the common ancestor."}, {"text": "The most recent species to have evolved in that lineage.", "isCorrect": false, "rationale": "The tips of the branches represent extant (living) species or groups, or the most recent descendants, not the node."}], "id": "q05"}, {"question": "If a cladogram shows that 'presence of mammary glands' is a shared derived character for a group including humans, cats, and whales, but not fish or amphibians, what does this imply about the evolutionary relationship?", "options": [{"text": "Fish and amphibians are not part of the evolutionary tree.", "isCorrect": false, "rationale": "Fish and amphibians are part of the broader tree of life but are more distantly related to mammals, sharing an older common ancestor before mammary glands evolved."}, {"text": "Humans, cats, and whales share a common ancestor that had mammary glands, and this trait distinguishes them from fish and amphibians.", "isCorrect": true, "rationale": "A 'shared derived character' is a trait that evolved in a common ancestor and is present in its descendants. This indicates that the common ancestor of humans, cats, and whales possessed mammary glands, and this distinguishes this group (mammals) from other vertebrates like fish and amphibians that diverged earlier."}, {"text": "Mammary glands evolved independently in humans, cats, and whales.", "isCorrect": false, "rationale": "If mammary glands evolved independently (convergent evolution), they would not be considered a 'shared derived character' in the context of building a single cladogram for this group; rather, the term implies a single evolutionary origin."}, {"text": "Fish and amphibians lost their mammary glands over time.", "isCorrect": false, "rationale": "Fish and amphibians never possessed mammary glands; this trait evolved later in the lineage leading to mammals."}], "id": "q06"}, {"question": "The text states that modern classification relies on evolutionary relationships revealed by DNA analysis and cladistics, not just physical appearance. Given this, why might birds and crocodiles be considered 'close relatives' despite their distinct appearances, while sharks and dolphins, which look similar, are classified far apart?", "options": [{"text": "Birds and crocodiles share similar dietary habits, indicating a close relationship.", "isCorrect": false, "rationale": "While diet can be a factor in niche, it is not the primary basis for establishing deep evolutionary relationships in modern classification. DNA and structural homology are more significant."}, {"text": "Sharks and dolphins have adapted to similar aquatic environments, leading to convergent evolution of appearance, while birds and crocodiles share a more recent common ancestor with specific shared derived traits (e.g., bone structure, DNA).", "isCorrect": true, "rationale": "This option correctly explains both scenarios. Sharks (fish) and dolphins (mammals) have evolved similar streamlined bodies due to adapting to aquatic life (convergent evolution), masking their distant ancestry. Birds and crocodiles, despite outward differences, share a more recent common ancestor supported by DNA and skeletal evidence, placing them as closer relatives."}, {"text": "Physical appearance is entirely irrelevant in modern classification.", "isCorrect": false, "rationale": "Physical appearance can still provide clues and is often the first observation, but it is not the *sole* or *final* determinant when DNA and cladistic analyses reveal deeper evolutionary relationships."}, {"text": "Birds are classified with crocodiles because both lay eggs.", "isCorrect": false, "rationale": "While both lay eggs, this single shared trait is not the exhaustive reason for their close relationship. Many other unrelated animals also lay eggs. Modern classification considers a broader suite of shared derived characters and genetic evidence."}], "id": "q07"}, {"question": "In the 'Simulating Natural Selection' activity, if the experiment were repeated on a brown background instead of a green one, which color of paper square would most likely show the highest survival rate across generations?", "options": [{"text": "Green, because it was successful on the original green background.", "isCorrect": false, "rationale": "The success of a trait (like camouflage) is highly dependent on the environment. What worked on a green background would not be advantageous on a brown one."}, {"text": "Red, as it would stand out most on a brown background, making it less likely to be chosen.", "isCorrect": false, "rationale": "A color that stands out (like red on brown) would be more easily seen by predators and thus would have a lower survival rate."}, {"text": "Brown, because it would now be camouflaged, increasing its survival chances.", "isCorrect": true, "rationale": "The simulation models natural selection for camouflage. On a brown background, brown paper squares would blend in best, making them harder for 'predators' to find and thus increasing their survival rate."}, {"text": "All colors would have similar survival rates, as predators would adapt to the new background.", "isCorrect": false, "rationale": "Predators (students) are looking for prey that *stand out*. Natural selection would still favor the color that best blends with the background, leading to differential survival rates, not similar ones."}], "id": "q08"}, {"question": "Which of the following aspects of real natural selection is *least* accurately represented by the paper square simulation?", "options": [{"text": "The genetic basis of variation and inheritance.", "isCorrect": true, "rationale": "The simulation uses fixed colored squares, which lack a genetic code or mechanism for inheritance beyond simply 'adding more of the same color.' Real natural selection involves genes that are passed down, mutate, and recombine, driving the variation upon which selection acts."}, {"text": "The concept of differential survival.", "isCorrect": false, "rationale": "Differential survival is well represented, as some colors are 'eaten' more than others, directly illustrating that certain traits (camouflage) lead to better survival."}, {"text": "The role of environmental pressure.", "isCorrect": false, "rationale": "The background color (green fabric/grass) directly represents the environmental pressure that determines which 'prey' colors are advantageous for survival."}, {"text": "The increase in population size for successful phenotypes.", "isCorrect": false, "rationale": "The 'reproduce' step, where survivors generate offspring of the same color, directly models how successful phenotypes increase in frequency and population size over generations."}], "id": "q09"}, {"question": "In the 'Simulating Natural Selection' procedure, after counting the survivors of Generation 1, the next step is 'Reproduce: Each surviving prey 'reproduces': add one paper square of the same color for each survivor.' What biological principle does this step directly model?", "options": [{"text": "Geographic isolation", "isCorrect": false, "rationale": "Geographic isolation refers to populations being separated by a physical barrier, which is not what the 'reproduce' step models."}, {"text": "Gene flow", "isCorrect": false, "rationale": "Gene flow is the transfer of genetic material between populations. The reproduction step in the simulation simply increases the number of a specific 'gene' (color) within the same population, not exchange between distinct populations."}, {"text": "Differential reproduction of advantageous traits", "isCorrect": true, "rationale": "This step directly models the 'reproduction' aspect of natural selection, where individuals with advantageous traits (those that survived) are more likely to reproduce and pass on those traits, leading to an increase in their frequency in the next generation."}, {"text": "Random genetic drift", "isCorrect": false, "rationale": "Random genetic drift refers to random fluctuations in allele frequencies, especially in small populations. The reproduction step here is a directed consequence of differential survival, not a random event."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
