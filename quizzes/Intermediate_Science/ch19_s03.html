<script>
var QUESTIONS = [{"question": "Which characteristic primarily distinguishes electromagnetic (EM) waves from sound waves?", "options": [{"text": "EM waves are always longitudinal, while sound waves are transverse.", "isCorrect": false, "rationale": "This statement is incorrect. EM waves are transverse, and sound waves are longitudinal."}, {"text": "EM waves require a medium to propagate, whereas sound waves can travel through a vacuum.", "isCorrect": false, "rationale": "This statement is incorrect. EM waves do NOT require a medium and can travel through a vacuum, unlike sound waves which do require a medium."}, {"text": "EM waves are self-sustaining oscillations of electric and magnetic fields and do not require a medium.", "isCorrect": true, "rationale": "The text defines electromagnetic waves as 'a wave consisting of oscillating electric and magnetic fields that travels through space at the speed of light' and explicitly states they 'do not require a medium — they can propagate through the vacuum of space' and are 'self-sustaining'."}, {"text": "EM waves travel at varying speeds depending on their wavelength, while sound waves have a constant speed.", "isCorrect": false, "rationale": "This statement is incorrect. All EM waves travel at the same constant speed (c) in a vacuum, regardless of their wavelength or frequency."}]}, {"question": "A scientist is comparing two types of electromagnetic radiation: a radio wave used for broadcasting and an X-ray used in medical imaging. Which of the following statements accurately compares these two waves based on the electromagnetic spectrum?", "options": [{"text": "The radio wave has a shorter wavelength and higher energy than the X-ray.", "isCorrect": false, "rationale": "According to the electromagnetic spectrum, radio waves have the longest wavelengths and lowest frequencies/energies, while X-rays have much shorter wavelengths and higher frequencies/energies."}, {"text": "Both waves have the same frequency but different speeds in a vacuum.", "isCorrect": false, "rationale": "This is incorrect. Radio waves and X-rays have vastly different frequencies, but all EM waves travel at the same speed (c) in a vacuum."}, {"text": "The X-ray has a higher frequency and higher energy than the radio wave.", "isCorrect": true, "rationale": "The text states the electromagnetic spectrum goes 'From longest wavelength (lowest frequency) to shortest wavelength (highest frequency): radio waves...X-rays, and gamma rays.' It also explicitly links 'Higher frequency <=> shorter wavelength <=> higher energy.' Therefore, X-rays have higher frequency and energy than radio waves."}, {"text": "The radio wave can damage living tissue, while the X-ray is harmless and passes through the body.", "isCorrect": false, "rationale": "This is incorrect. The text explicitly states that 'Gamma rays can damage living tissue...while radio waves are harmless and pass through your body constantly.' X-rays, being close to gamma rays in the spectrum, also have the potential to cause damage."}]}, {"question": "A local radio station broadcasts at a frequency of 98.7 MHz. What is the approximate wavelength of these radio waves in a vacuum? (Speed of light, c = 3.00e8 m/s)", "options": [{"text": "3.04 meters", "isCorrect": true, "rationale": "To solve, convert frequency to Hertz: 98.7 MHz = 98.7 × 10^6 Hz = 9.87e7 Hz. Using the equation λ = c/f: λ = (3.00e8 m/s) / (9.87e7 Hz) ≈ 3.0395 m, which rounds to 3.04 meters. This calculation mirrors the example provided in the text."}, {"text": "30.4 meters", "isCorrect": false, "rationale": "This result suggests an incorrect conversion or calculation error, such as a decimal place mistake."}, {"text": "0.304 meters", "isCorrect": false, "rationale": "This result suggests an incorrect conversion or calculation error, such as a decimal place mistake."}, {"text": "304 meters", "isCorrect": false, "rationale": "This result suggests an incorrect conversion or calculation error, such as a decimal place mistake."}]}, {"question": "Despite the vastness of the entire electromagnetic spectrum, human eyes have evolved to detect only a very narrow range known as visible light. What is the primary reason for this evolutionary adaptation?", "options": [{"text": "Visible light waves are the only EM waves that can travel through the vacuum of space.", "isCorrect": false, "rationale": "This is incorrect. All electromagnetic waves, including radio waves, X-rays, and gamma rays, can travel through the vacuum of space, as stated in the text."}, {"text": "This range of wavelengths causes the least damage to biological tissues, unlike UV or X-rays.", "isCorrect": false, "rationale": "While true that visible light is generally less harmful than UV or X-rays, the text specifies a more direct primary reason for the evolutionary adaptation."}, {"text": "Visible light corresponds to the wavelengths most strongly emitted by the sun and least absorbed by Earth's atmosphere.", "isCorrect": true, "rationale": "The text explicitly states: 'Yet our eyes evolved to detect exactly this range because it corresponds to the wavelengths of light most strongly emitted by the sun and least absorbed by Earth's atmosphere.'"}, {"text": "These specific wavelengths are the only ones capable of reflecting off objects to create images.", "isCorrect": false, "rationale": "This is incorrect. Other electromagnetic waves also reflect off objects, but our eyes are not adapted to detect them."}]}, {"question": "When you observe a green leaf, it appears green to your eyes. Based on the provided text, what is the most accurate explanation for why the leaf appears green?", "options": [{"text": "The leaf emits green light because of the chemical reactions occurring within its cells.", "isCorrect": false, "rationale": "Objects generally appear colored because they reflect specific wavelengths of light, not because they actively emit light (unless they are a light source)."}, {"text": "The leaf absorbs only green wavelengths of light and reflects all other colors to your eyes.", "isCorrect": false, "rationale": "This statement is the opposite of the correct explanation. An object appears a certain color because it reflects that color."}, {"text": "The leaf reflects green wavelengths of light while absorbing most other wavelengths of visible light.", "isCorrect": true, "rationale": "The text explains: 'Objects appear colored because they absorb some wavelengths and reflect others — a red apple absorbs most wavelengths but reflects red light to your eyes.' Applying this, a green leaf reflects green light and absorbs most other colors."}, {"text": "Green light travels faster through the leaf's structure than other colors, making it the most dominant color.", "isCorrect": false, "rationale": "The speed of light in a medium (like a leaf) does not determine its perceived color. While dispersion can cause different speeds, this is not the mechanism for color appearance."}]}, {"question": "A specific shade of blue light has a wavelength of 475 nm. What is its frequency in hertz? (c = 3.00e8 m/s; 1 nm = 1e-9 m)", "options": [{"text": "6.32 x 10^12 Hz", "isCorrect": false, "rationale": "This answer is too low; it might be the result of an incorrect unit conversion or calculation error, such as not converting nanometers to meters correctly."}, {"text": "6.32 x 10^14 Hz", "isCorrect": true, "rationale": "To solve, convert wavelength to meters: 475 nm = 475 × 10^-9 m = 4.75e-7 m. Using the equation f = c/λ: f = (3.00e8 m/s) / (4.75e-7 m) ≈ 6.3157e14 Hz, which rounds to 6.32 x 10^14 Hz. This follows the 'Using v = λf for EM Waves' example."}, {"text": "1.58 x 10^-3 Hz", "isCorrect": false, "rationale": "This answer is incorrect and suggests a fundamental error in applying the wave speed equation or unit conversion."}, {"text": "1.58 x 10^16 Hz", "isCorrect": false, "rationale": "This answer is too high; it might be the result of an incorrect unit conversion or calculation error."}]}, {"question": "All forms of electromagnetic waves, from radio waves to gamma rays, share which of the following characteristics when traveling through a perfect vacuum?", "options": [{"text": "They all have the same wavelength.", "isCorrect": false, "rationale": "The text clearly states that 'What distinguishes one type from another is wavelength and frequency.' Therefore, they do not all have the same wavelength."}, {"text": "They all possess the same energy per photon.", "isCorrect": false, "rationale": "Energy is directly related to frequency (higher frequency = higher energy). Since different EM waves have different frequencies, they have different energies per photon."}, {"text": "They all travel at the same constant speed, 'c'.", "isCorrect": true, "rationale": "The text explicitly states: 'All electromagnetic waves — radio, microwave, infrared, visible light, ultraviolet, X-ray, and gamma ray — travel at this same speed in a vacuum,' referring to the speed of light, c."}, {"text": "They all have the same frequency.", "isCorrect": false, "rationale": "The text clearly states that 'What distinguishes one type from another is wavelength and frequency.' Therefore, they do not all have the same frequency."}]}, {"question": "The text describes electromagnetic waves as 'self-sustaining.' What mechanism allows an EM wave to regenerate itself as it travels through space without needing a medium?", "options": [{"text": "The wave's particles continually collide with each other, transferring energy forward.", "isCorrect": false, "rationale": "This describes particle-based propagation, not how EM waves, which are fields, sustain themselves without a medium."}, {"text": "A changing electric field generates a changing magnetic field, which in turn generates a changing electric field.", "isCorrect": true, "rationale": "The text explicitly states: 'A changing electric field creates a changing magnetic field, which creates a changing electric field, and so on — the wave regenerates itself as it moves.'"}, {"text": "The wave draws energy from the surrounding vacuum itself to maintain its propagation.", "isCorrect": false, "rationale": "While energy is involved, the mechanism isn't drawing energy from the vacuum in this manner but rather the inter-dependence of electric and magnetic fields."}, {"text": "It relies on quantum fluctuations within the vacuum to create new field components.", "isCorrect": false, "rationale": "This concept is beyond the scope of the provided text and an incorrect explanation for classical EM wave propagation."}]}, {"question": "A student performs an experiment where they shine a red laser and a violet laser simultaneously through a vacuum chamber. What would they observe regarding the speeds of these two colors of light?", "options": [{"text": "Red light travels slightly faster than violet light because it has a longer wavelength.", "isCorrect": false, "rationale": "This is a common misconception directly addressed in the 'Misconception Alert'. In a vacuum, wavelength does not affect speed."}, {"text": "Violet light travels slightly faster than red light because it has a higher frequency.", "isCorrect": false, "rationale": "This is a common misconception directly addressed in the 'Misconception Alert'. In a vacuum, frequency does not affect speed."}, {"text": "Both red and violet light travel at exactly the same speed, c.", "isCorrect": true, "rationale": "The 'Misconception Alert' section clearly states: 'Students may think that different colors of light travel at different speeds. In a vacuum, all EM waves travel at exactly the same speed (c).'"}, {"text": "Their speeds would vary depending on their intensity, not their color.", "isCorrect": false, "rationale": "Intensity affects the amplitude of the wave and the number of photons, but not the speed of light in a vacuum."}]}, {"question": "The text states that 'gamma rays can damage living tissue and are used in cancer treatment, while radio waves are harmless and pass through your body constantly.' This difference in effect is primarily due to which fundamental property of electromagnetic waves?", "options": [{"text": "The ability of gamma rays to be absorbed by denser materials, unlike radio waves.", "isCorrect": false, "rationale": "While there are differences in absorption, the fundamental reason for the damaging effect of gamma rays is not primarily their absorption by dense materials but their high energy."}, {"text": "The difference in their speed of travel, with gamma rays moving significantly faster than radio waves.", "isCorrect": false, "rationale": "This is incorrect. All electromagnetic waves travel at the same speed (c) in a vacuum, as stated in the text."}, {"text": "The higher energy associated with gamma rays due to their extremely high frequency and short wavelength.", "isCorrect": true, "rationale": "The text explains: 'Higher frequency <=> shorter wavelength <=> higher energy. This is why gamma rays (extremely high frequency, very short wavelength) carry far more energy than radio waves (low frequency, long wavelength). Gamma rays can damage living tissue...while radio waves are harmless...'"}, {"text": "The wave-particle duality, which applies only to gamma rays and not to radio waves.", "isCorrect": false, "rationale": "The 'Sci Connection' states that wave-particle duality applies to 'light' in general, implying all EM waves, not just gamma rays. It does not explain the difference in tissue damage."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
