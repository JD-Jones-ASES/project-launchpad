    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 23, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines a solution at the molecular level?", "options": [{"text": "A mixture where particles are large enough to settle out over time.", "isCorrect": false, "rationale": "This describes a suspension, not a solution. Solutions appear uniform and do not separate on standing."}, {"text": "A heterogeneous mixture with distinct layers.", "isCorrect": false, "rationale": "A solution is specifically defined as a homogeneous mixture, meaning it has a uniform composition throughout, without distinct layers."}, {"text": "A homogeneous mixture where one or more substances are uniformly distributed within another substance.", "isCorrect": true, "rationale": "This is the precise definition provided in the text. Solutions are uniform at the molecular level and do not separate."}, {"text": "A mixture where substances chemically bond to form a new compound.", "isCorrect": false, "rationale": "Forming a new compound through chemical bonding describes a chemical reaction, not the physical process of forming a solution, which is a mixture."}], "id": "q01"}, {"question": "In a solution composed of carbon dioxide gas dissolved in water (like soda water), identify the solute and the solvent.", "options": [{"text": "Carbon dioxide is the solvent, water is the solute.", "isCorrect": false, "rationale": "The solute is the substance being dissolved, and the solvent is the substance doing the dissolving. Water is present in a much larger amount and dissolves the carbon dioxide."}, {"text": "Both carbon dioxide and water are solutes.", "isCorrect": false, "rationale": "In a typical solution, there is one solvent and one or more solutes. Carbon dioxide is the solute, and water is the solvent."}, {"text": "Water is the solvent, carbon dioxide is the solute.", "isCorrect": true, "rationale": "Water is the substance that does the dissolving and is typically present in the larger amount, making it the solvent. Carbon dioxide is the substance being dissolved, making it the solute."}, {"text": "Both carbon dioxide and water are solvents.", "isCorrect": false, "rationale": "This is incorrect. A solution has one primary solvent. Water is dissolving the carbon dioxide."}], "id": "q02"}, {"question": "A cleaning product is designed to remove grease from kitchen surfaces. Based on the 'like dissolves like' rule, what type of solvent would most likely be effective in this cleaner?", "options": [{"text": "A highly polar solvent, like pure water.", "isCorrect": false, "rationale": "Grease is a nonpolar substance. Polar solvents like water do not dissolve nonpolar solutes, as explained by 'like dissolves like'."}, {"text": "A nonpolar solvent, such as an oil-based cleaner or hexane.", "isCorrect": true, "rationale": "Grease is a nonpolar substance. According to the 'like dissolves like' rule, nonpolar solvents dissolve nonpolar solutes. The text specifically mentions grease dissolving in oil-based cleaners."}, {"text": "An ionic solvent.", "isCorrect": false, "rationale": "Ionic compounds are typically dissolved by polar solvents (like water) due to hydration, not nonpolar grease."}, {"text": "A solvent that forms strong hydrogen bonds.", "isCorrect": false, "rationale": "Hydrogen bonding is characteristic of polar molecules, which would not effectively dissolve nonpolar grease."}], "id": "q03"}, {"question": "A chef wants to dissolve sugar quickly in water to make a syrup, while a bottler wants to keep as much carbon dioxide gas as possible dissolved in a beverage. How do temperature changes impact these two processes?", "options": [{"text": "Both processes are sped up by decreasing the temperature.", "isCorrect": false, "rationale": "Decreasing temperature would slow down the dissolving of solid sugar. While it increases gas solubility, it has opposite effects on solids."}, {"text": "Both processes are sped up by increasing the temperature.", "isCorrect": false, "rationale": "Increasing temperature speeds up the dissolving of solid sugar, but it decreases the solubility of gases, causing warm soda to go flat faster."}, {"text": "Increasing temperature speeds up sugar dissolving but decreases carbon dioxide solubility.", "isCorrect": true, "rationale": "For most solid solutes like sugar, increasing temperature speeds up dissolving. However, for gases like carbon dioxide, increasing temperature decreases their solubility, as noted in the text ('gases are less soluble in hot liquids')."}, {"text": "Decreasing temperature speeds up sugar dissolving but increases carbon dioxide solubility.", "isCorrect": false, "rationale": "Decreasing temperature would slow down the dissolving of solid sugar, as molecular motion is reduced."}], "id": "q04"}, {"question": "Which action would NOT significantly increase the rate at which a solid solute dissolves in a liquid solvent?", "options": [{"text": "Stirring the solution.", "isCorrect": false, "rationale": "Stirring brings fresh solvent molecules into contact with the solute, thereby speeding up dissolution. This is a listed factor."}, {"text": "Crushing the solid solute into a fine powder.", "isCorrect": false, "rationale": "Crushing increases the surface area of the solute, allowing more solvent molecules to interact with it simultaneously, thus speeding up dissolution. This is a listed factor."}, {"text": "Increasing the pressure above the liquid.", "isCorrect": true, "rationale": "The text states that 'pressure has little effect on the solubility of solids or liquids, but it significantly affects gases.' Therefore, increasing pressure would not significantly increase the rate of dissolving for a solid solute."}, {"text": "Heating the solvent to a higher temperature.", "isCorrect": false, "rationale": "For most solid solutes, increasing the temperature speeds up dissolving due to faster molecular motion. This is a listed factor."}], "id": "q05"}, {"question": "A chemist adds 50 grams of a salt to 100 mL of water at 25°C. All of the salt dissolves. The solubility of this salt at 25°C is 60 grams per 100 mL of water. What type of solution has the chemist created?", "options": [{"text": "A saturated solution.", "isCorrect": false, "rationale": "A saturated solution contains the maximum amount of solute at that temperature. Since 50g dissolved and 60g can dissolve, it is not yet saturated."}, {"text": "A supersaturated solution.", "isCorrect": false, "rationale": "A supersaturated solution contains more solute than the normal maximum, which is not the case here. It can still dissolve more."}, {"text": "An unsaturated solution.", "isCorrect": true, "rationale": "The solution contains 50g of salt, but the maximum solubility is 60g. Since it can still dissolve more solute, it is an unsaturated solution."}, {"text": "An insoluble solution.", "isCorrect": false, "rationale": "This term is incorrect; 'insoluble' refers to a substance that does not dissolve. Since 50g did dissolve, it is not insoluble."}], "id": "q06"}, {"question": "A student dissolves 10 g of a substance in enough water to make 250 mL of solution. What is the concentration of this solution in grams per liter (g/L)?", "options": [{"text": "0.04 g/L", "isCorrect": false, "rationale": "This calculation incorrectly divides volume by mass (0.250 L / 10 g) or has a unit conversion error."}, {"text": "2.5 g/L", "isCorrect": false, "rationale": "This calculation might involve 10g / 4L or a similar incorrect division. The volume must be in liters for the formula."}, {"text": "40 g/L", "isCorrect": true, "rationale": "To calculate concentration in g/L, first convert 250 mL to liters (0.250 L). Then, divide the mass of solute (10 g) by the volume of solution (0.250 L): 10 g / 0.250 L = 40 g/L."}, {"text": "2500 g/L", "isCorrect": false, "rationale": "This calculation would result from dividing 10g by 0.004L, indicating an incorrect unit conversion or division."}], "id": "q07"}, {"question": "What is the primary significance of molarity (M) as a unit of concentration in chemistry?", "options": [{"text": "It measures the density of the solution.", "isCorrect": false, "rationale": "Molarity measures moles of solute per liter of solution, not the overall density (mass per volume) of the solution, although density can be related."}, {"text": "It indicates the mass of the solvent per liter of solution.", "isCorrect": false, "rationale": "Molarity focuses on the solute, specifically the number of moles of solute, not the mass of the solvent."}, {"text": "It directly connects the mass of a substance to the number of particles in solution.", "isCorrect": true, "rationale": "The text states that 'Molarity connects the mass of a substance to the number of particles (atoms, molecules, or ions) in solution.' It quantifies how 'crowded' solute particles are."}, {"text": "It is a measure of how quickly a solute dissolves.", "isCorrect": false, "rationale": "Molarity is a measure of concentration (amount of solute), not the rate or speed of dissolution."}], "id": "q08"}, {"question": "A student dissolves 50g of a salt in 200mL of hot water. The solution is then cooled very carefully to room temperature without disturbing it. If the maximum solubility of the salt at room temperature is 20g per 100mL of water, what type of solution has most likely been formed after cooling?", "options": [{"text": "An unsaturated solution.", "isCorrect": false, "rationale": "An unsaturated solution can dissolve more solute. Here, 50g in 200mL (equivalent to 25g/100mL) is more than the 20g/100mL solubility limit at room temperature, so it's not unsaturated."}, {"text": "A saturated solution, with 10g of undissolved salt at the bottom.", "isCorrect": false, "rationale": "While 10g of salt would be in excess if it were just a saturated solution (20g/100mL * 2 = 40g), the 'cooled carefully without disturbing' suggests a supersaturated state rather than immediate precipitation."}, {"text": "A supersaturated solution.", "isCorrect": true, "rationale": "The student dissolved 50g of salt in 200mL of water, which is equivalent to 25g per 100mL. Since the solubility at room temperature is only 20g per 100mL, and the solution was cooled carefully, it is likely that more solute is dissolved than the normal maximum, creating an unstable supersaturated solution."}, {"text": "A diluted solution.", "isCorrect": false, "rationale": "Diluted refers to a solution with a low concentration. In this case, the concentration (25g/100mL) is above the solubility limit at room temperature, indicating it is not diluted but rather highly concentrated relative to its solubility."}], "id": "q09"}, {"question": "The 'Biology Connection' section highlights the role of the kidneys in maintaining the human body's internal environment. What term describes the body's ability to maintain stable internal conditions, including the concentration of dissolved substances in blood?", "options": [{"text": "Metabolism.", "isCorrect": false, "rationale": "Metabolism refers to all the chemical processes that occur in an organism, not specifically the maintenance of stable internal conditions."}, {"text": "Photosynthesis.", "isCorrect": false, "rationale": "Photosynthesis is the process by which plants convert light energy into chemical energy and is unrelated to maintaining internal body conditions."}, {"text": "Homeostasis.", "isCorrect": true, "rationale": "The text explicitly states that kidneys maintain 'homeostasis' by adjusting the amounts of water and dissolved substances to keep blood within narrow concentration ranges. Homeostasis is the term for maintaining stable internal conditions."}, {"text": "Respiration.", "isCorrect": false, "rationale": "Respiration is the process of gas exchange (breathing) or cellular energy production, not the overall maintenance of stable internal conditions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
