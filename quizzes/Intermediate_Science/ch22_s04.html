    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 22, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately describes how a star's initial mass dictates its ultimate fate?", "options": [{"text": "All stars, regardless of mass, eventually become white dwarfs after exhausting their core hydrogen.", "isCorrect": false, "rationale": "This is incorrect. Only low-to-medium mass stars become white dwarfs. High-mass stars have different, more dramatic final stages."}, {"text": "Low-to-medium mass stars conclude their lives as white dwarfs, while high-mass stars may become neutron stars or black holes after a supernova.", "isCorrect": true, "rationale": "This is correct. The text explicitly states that low-to-medium mass stars form white dwarfs, while high-mass stars undergo supernovae, leaving behind neutron stars or black holes depending on their remaining mass."}, {"text": "High-mass stars quietly shed their outer layers to form planetary nebulae, then cool into white dwarfs.", "isCorrect": false, "rationale": "This is incorrect. Shedding outer layers to form a planetary nebula is characteristic of low-to-medium mass stars, not high-mass stars, which end in supernovae."}, {"text": "Stars with masses similar to the Sun are destined to become black holes, while much more massive stars become red giants.", "isCorrect": false, "rationale": "This is incorrect. The Sun, a medium-sized star, will become a red giant and then a white dwarf, not a black hole. Red giants are an earlier phase for stars like the Sun, not the final fate of high-mass stars."}], "id": "q01"}, {"question": "According to the 'Chemistry Connection' feature, what role do supernovae play in the cosmic cycle of elements?", "options": [{"text": "Supernovae are primarily responsible for fusing hydrogen into helium during a star's main sequence phase.", "isCorrect": false, "rationale": "This is incorrect. Hydrogen fusion into helium occurs during a star's main sequence life, long before a supernova event."}, {"text": "Elements up to iron are formed in supernovae, but lighter elements are created in planetary nebulae.", "isCorrect": false, "rationale": "This is incorrect. Elements up to iron are formed in the later stages of massive stars' lives through fusion, but elements *heavier* than iron are created during supernovae. Planetary nebulae are shells of gas from low-to-medium mass stars."}, {"text": "Supernovae are the primary sites for the creation of elements heavier than iron, which are then dispersed into space.", "isCorrect": true, "rationale": "This is correct. The text states that 'Elements heavier than iron are created during supernovae,' highlighting their role as 'universe's element factories' for the heaviest elements."}, {"text": "The fusion of helium into carbon and oxygen exclusively occurs during a supernova explosion.", "isCorrect": false, "rationale": "This is incorrect. Helium fusion into carbon, and carbon into oxygen, occurs in the later stages of massive stars' lives, but before the supernova explosion itself."}], "id": "q02"}, {"question": "An astronomer identifies a star that is relatively cool in surface temperature but extremely luminous. How would this star most likely be categorized on the Hertzsprung-Russell (H-R) diagram, and what does it suggest about its size?", "options": [{"text": "It would be in the lower left as a white dwarf, indicating a very small and dense star.", "isCorrect": false, "rationale": "This is incorrect. White dwarfs are hot but dim due to their small size. A luminous star cannot be a white dwarf."}, {"text": "It would be in the upper right as a red giant or supergiant, implying an enormous physical size.", "isCorrect": true, "rationale": "This is correct. The H-R diagram places red giants and supergiants in the upper right, characterized by being 'cool but very luminous because of their enormous size.'"}, {"text": "It would be in the upper left on the main sequence, indicating a hot, luminous, and typically blue star.", "isCorrect": false, "rationale": "This is incorrect. Stars in the upper left are hot and luminous, but the question describes a *cool* star."}, {"text": "It would be in the lower right on the main sequence, indicating a cool, dim, and small star.", "isCorrect": false, "rationale": "This is incorrect. Stars in the lower right are cool and dim. The described star is very luminous, not dim."}], "id": "q03"}, {"question": "The nearest star system to the Sun, Alpha Centauri, is about 4.37 light-years away. What does observing Alpha Centauri tonight tell us about its past?", "options": [{"text": "The light we see left Alpha Centauri 4.37 years ago, meaning we are observing the star as it was in the past.", "isCorrect": true, "rationale": "This is correct. A light-year is the distance light travels in one year. Therefore, if Alpha Centauri is 4.37 light-years away, the light reaching us tonight started its journey 4.37 years ago, showing us the star's past state."}, {"text": "Due to the immense distance, the light has changed color, making it appear redder than it actually is.", "isCorrect": false, "rationale": "This is incorrect. While distant objects can appear redder due to the expansion of the universe (redshift), the primary implication of light-years is looking back in time, not color alteration for nearby stars like Alpha Centauri."}, {"text": "The distance in light-years has no bearing on when the light we see actually left the star, only its physical separation.", "isCorrect": false, "rationale": "This is incorrect. The definition of a light-year directly links distance to the travel time of light, meaning it absolutely tells us about when the light departed the source."}, {"text": "We are observing Alpha Centauri in its present moment, as light travels instantaneously across the vacuum of space.", "isCorrect": false, "rationale": "This is incorrect. Light travels at a finite speed, so there is always a time delay for light from distant objects to reach us."}], "id": "q04"}, {"question": "Using the 'Scientific Notation for Astronomical Distances' example, if the speed of light is $3.00 \times 10^5$ km/s and the distance to a hypothetical celestial object is $9.00 \times 10^{10}$ km, how long would it take light to travel from that object to Earth?", "options": [{"text": "Approximately 3 seconds.", "isCorrect": false, "rationale": "This is incorrect. $9.00/3.00 = 3$, but the powers of 10 must also be calculated: $10^{10} / 10^5 = 10^{(10-5)} = 10^5$."}, {"text": "Approximately 300 seconds.", "isCorrect": false, "rationale": "This is incorrect. $3 \times 10^5$ is 300,000, not 300. The calculation is $t = d/v = (9.00 \times 10^{10} \text{ km}) / (3.00 \times 10^5 \text{ km/s}) = (9.00/3.00) \times 10^{(10-5)} \text{ s} = 3.00 \times 10^5 \text{ s}$."}, {"text": "Approximately 30,000 seconds.", "isCorrect": false, "rationale": "This is incorrect. The calculation is $3.00 \times 10^5 \text{ s}$, which is 300,000 seconds."}, {"text": "Approximately 300,000 seconds.", "isCorrect": true, "rationale": "This is correct. Using the formula $t = d/v$, where $d = 9.00 \times 10^{10}$ km and $v = 3.00 \times 10^5$ km/s, $t = (9.00 \times 10^{10}) / (3.00 \times 10^5) = (9.00/3.00) \times 10^{(10-5)} = 3.00 \times 10^5$ seconds, which is 300,000 seconds."}], "id": "q05"}, {"question": "How are spiral galaxies, such as our Milky Way, generally characterized, distinguishing them from other galaxy types?", "options": [{"text": "They are nearly spherical to elongated ovals and contain primarily older stars.", "isCorrect": false, "rationale": "This describes elliptical galaxies, not spiral galaxies."}, {"text": "They have no definite shape and are often rich in gas and young stars.", "isCorrect": false, "rationale": "This describes irregular galaxies, not spiral galaxies."}, {"text": "They have a central bulge and sweeping spiral arms where new stars are actively forming.", "isCorrect": true, "rationale": "This is correct. The text states, 'Spiral galaxies (like the Milky Way) have a central bulge and sweeping spiral arms where new stars form.'"}, {"text": "They are characterized by their extreme density and lack of any observable gas or dust.", "isCorrect": false, "rationale": "This is incorrect. Spiral galaxies are rich in gas and dust, especially in their arms, where star formation occurs."}], "id": "q06"}, {"question": "Edwin Hubble's observation of distant galaxies receding faster the farther away they are provides strong evidence for which fundamental cosmological concept?", "options": [{"text": "The existence of multiple universes within a larger multiverse.", "isCorrect": false, "rationale": "This concept is not discussed in the text, nor is it directly supported by Hubble's law."}, {"text": "The formation of black holes as the ultimate fate of all massive stars.", "isCorrect": false, "rationale": "While black holes are real, Hubble's law primarily relates to the expansion of the universe, not stellar end stages."}, {"text": "The Big Bang theory, implying that the universe is expanding from an initial hot, dense point.", "isCorrect": true, "rationale": "This is correct. The text explicitly states, 'This observation — known as Hubble's law — implies that the universe is expanding. If you mentally 'rewind' the expansion, everything converges to a single, incredibly dense, hot point — the Big Bang.'"}, {"text": "The constant size and unchanging nature of the universe over billions of years.", "isCorrect": false, "rationale": "This is incorrect. Hubble's law directly contradicts a static universe, showing instead that it is expanding."}], "id": "q07"}, {"question": "Vera Rubin's pioneering work on galactic rotation curves provided critical evidence for what mysterious component of the universe?", "options": [{"text": "The Big Bang, by showing that galaxies are moving away from each other.", "isCorrect": false, "rationale": "This refers to Edwin Hubble's work and the expansion of the universe, not Vera Rubin's observations of galactic rotation."}, {"text": "The presence of dark matter, an invisible substance that contributes significantly to a galaxy's mass and gravitational pull.", "isCorrect": true, "rationale": "This is correct. The text states that Rubin's observations of stars orbiting at unexpected speeds 'provided some of the strongest evidence that roughly 85% of the matter in the universe is dark matter.'"}, {"text": "The formation of exoplanets in habitable zones around other stars.", "isCorrect": false, "rationale": "This is an area of modern astronomy, but unrelated to Vera Rubin's specific contributions mentioned in the text."}, {"text": "The process of nuclear fusion in stellar cores, explaining how stars generate energy.", "isCorrect": false, "rationale": "While fundamental to stars, this is not what Vera Rubin's work focused on, according to the provided text."}], "id": "q08"}, {"question": "A star is defined as a massive, luminous sphere of plasma that produces energy through nuclear fusion in its core. What is the crucial event that signifies a protostar has officially become a main sequence star?", "options": [{"text": "Its outer layers begin to expand and cool, turning the star red.", "isCorrect": false, "rationale": "This describes the transition to a red giant phase, which occurs after a star has exhausted its core hydrogen, much later than the main sequence inception."}, {"text": "It collapses violently, leading to a supernova explosion.", "isCorrect": false, "rationale": "This is the final, catastrophic event for high-mass stars, not the beginning of the main sequence."}, {"text": "Gravity causes a cloud of gas and dust to collapse and heat up.", "isCorrect": false, "rationale": "This describes the formation of a protostar from a nebula, which precedes the main sequence phase."}, {"text": "Its core temperature reaches approximately 10 million degrees Celsius, initiating hydrogen fusion into helium.", "isCorrect": true, "rationale": "This is correct. The text states, 'When the core temperature reaches about 10 million , hydrogen nuclei begin fusing into helium nuclei... The star enters the main sequence phase.'"}], "id": "q09"}, {"question": "The 'Scale Model of the Solar System' investigation highlights a key challenge in representing astronomical phenomena. Why do most textbook diagrams of the solar system not show distances to scale?", "options": [{"text": "Planets frequently change their orbital paths, making a fixed scale inaccurate.", "isCorrect": false, "rationale": "This is incorrect. While orbits are elliptical, they are predictable, and this is not the reason for lack of scale in diagrams."}, {"text": "The inner planets would be too large on a scaled diagram to fit on a typical page.", "isCorrect": false, "rationale": "This is incorrect. If distances were scaled, the *sizes* of the planets would become invisibly small, and the inner planets would be minuscule and very close together, not too large."}, {"text": "The immense distances to the outer planets would make the inner solar system appear impossibly small or invisible on the same scaled diagram.", "isCorrect": true, "rationale": "This is correct. The text states, 'Textbook diagrams of the solar system cannot show distances to scale because the outer planets are so far from the Sun that the inner planets would be invisible.'"}, {"text": "It is impossible to accurately measure the distances to all planets in astronomical units (AU).", "isCorrect": false, "rationale": "This is incorrect. Astronomical units are a standard and accurately measured way to represent planetary distances."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
