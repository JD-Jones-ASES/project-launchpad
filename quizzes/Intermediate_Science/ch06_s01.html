    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental process that allows a single fertilized egg to develop into an organism with diverse cell types like nerve cells and muscle cells?", "options": [{"text": "Self-renewal", "isCorrect": false, "rationale": "Self-renewal is a property of stem cells, allowing them to make more stem cells, but it is not the overarching process by which cells become structurally and functionally distinct."}, {"text": "Differentiation", "isCorrect": true, "rationale": "The text explicitly defines 'differentiation' as the process by which an unspecialized cell develops into a cell with a distinct structure and function, leading to cellular diversity."}, {"text": "Specialization", "isCorrect": false, "rationale": "Specialization is the *outcome* or state of a cell having a distinct structure and function, rather than the developmental *process* itself."}, {"text": "Gene replication", "isCorrect": false, "rationale": "Gene replication (DNA replication) is the process of making copies of DNA, essential for cell division, but it does not explain how cells become different from one another."}], "id": "q01"}, {"question": "How do cells become specialized during differentiation, despite all containing the same complete set of DNA?", "options": [{"text": "They selectively delete unnecessary genes.", "isCorrect": false, "rationale": "The text states that 'Every cell in your body contains the same complete set of DNA,' indicating genes are not deleted during differentiation."}, {"text": "They activate a specific subset of their genes to produce particular proteins.", "isCorrect": true, "rationale": "The text explains that 'During differentiation, specific genes within a cell are switched on while others are switched off. The pattern of active and inactive genes determines which proteins the cell produces,' leading to specialization."}, {"text": "They acquire new DNA segments relevant to their function.", "isCorrect": false, "rationale": "Cells retain the same DNA; they do not acquire new DNA segments to specialize."}, {"text": "They change their entire genetic code.", "isCorrect": false, "rationale": "The genetic code remains constant; it is the *expression* of specific genes within that code that changes during differentiation."}], "id": "q02"}, {"question": "A scientist observes a cell that is long and thin with numerous mitochondria and multiple nuclei. Based on this structure, what is the most likely primary function of this cell?", "options": [{"text": "Transmitting electrical signals over long distances.", "isCorrect": false, "rationale": "While neurons are long and thin and transmit signals, they typically have a single nucleus. The presence of multiple nuclei and numerous mitochondria points to a different specialized cell type."}, {"text": "Contracting to produce movement.", "isCorrect": true, "rationale": "The text describes muscle cells (muscle fibers) as 'long, cylindrical fibers packed with protein filaments... These cells contain many nuclei (they are multinucleated) and an unusually high number of mitochondria to supply the ATP needed for repeated contraction,' matching the observed structure and function."}, {"text": "Forming a protective barrier on a surface.", "isCorrect": false, "rationale": "Epithelial cells form barriers and are tightly packed, but are not characterized by being long, thin, multinucleated with exceptionally high numbers of mitochondria for this specific function."}, {"text": "Absorbing nutrients in the intestine.", "isCorrect": false, "rationale": "Intestinal epithelial cells have microvilli for absorption but are not typically described as long, thin, multinucleated, with numerous mitochondria as their primary structural features."}], "id": "q03"}, {"question": "Which of the following best describes the defining characteristics of a stem cell?", "options": [{"text": "A specialized cell that continuously divides to replace worn-out tissues.", "isCorrect": false, "rationale": "Stem cells are *undifferentiated*, not specialized."}, {"text": "An undifferentiated cell capable of self-renewal and differentiating into specialized cell types.", "isCorrect": true, "rationale": "The text defines stem cells as 'undifferentiated cells that retain two remarkable abilities: they can divide to produce more stem cells (a property called self-renewal), and they can differentiate into specialized cell types when the body needs them.'"}, {"text": "A mature cell that has permanently lost its ability to divide.", "isCorrect": false, "rationale": "Stem cells are capable of division (self-renewal) and are undifferentiated, not mature in the sense of being fully specialized and non-dividing."}, {"text": "A cell that only produces placental tissue.", "isCorrect": false, "rationale": "Only totipotent stem cells can produce placental tissue, and they also form all body cells; this is not a defining characteristic of all stem cells."}], "id": "q04"}, {"question": "A pluripotent stem cell is distinct from a totipotent stem cell because a pluripotent stem cell:", "options": [{"text": "Can only differentiate into a few related cell types.", "isCorrect": false, "rationale": "This describes multipotent stem cells, not pluripotent ones."}, {"text": "Can form almost any cell type in the body but cannot form placental tissue.", "isCorrect": true, "rationale": "The text states, 'Pluripotent stem cells can become almost any cell type in the body but cannot form placental tissue.'"}, {"text": "Is fully specialized and cannot differentiate further.", "isCorrect": false, "rationale": "Stem cells, by definition, are undifferentiated and capable of further differentiation."}, {"text": "Can give rise to every cell type in the body, including placental cells.", "isCorrect": false, "rationale": "This describes totipotent stem cells, not pluripotent ones."}], "id": "q05"}, {"question": "What is the primary role of adult stem cells in an organism?", "options": [{"text": "To form the earliest embryonic structures.", "isCorrect": false, "rationale": "Embryonic stem cells, not adult stem cells, are involved in forming early embryonic structures."}, {"text": "To act as a repair and replacement system for damaged or worn-out cells throughout life.", "isCorrect": true, "rationale": "The text explains that adult stem cells 'quietly divide throughout your life, replacing cells that are damaged, worn out, or dead,' serving as a repair and replacement system."}, {"text": "To produce gametes for reproduction.", "isCorrect": false, "rationale": "Gametes (sperm and egg cells) are produced by specialized germline cells, though stem cells contribute to their continuous production in specific reproductive tissues."}, {"text": "To develop into totipotent cells for future differentiation.", "isCorrect": false, "rationale": "Adult stem cells are typically multipotent and do not develop into totipotent cells; their role is to replenish existing tissues."}], "id": "q06"}, {"question": "Mature red blood cells in mammals lack a nucleus and most organelles. This structural adaptation directly supports which of their primary functions?", "options": [{"text": "Enabling rapid cell division for tissue repair.", "isCorrect": false, "rationale": "Mature red blood cells are terminally differentiated and cannot divide; this adaptation is not for reproduction or repair."}, {"text": "Maximizing interior space for oxygen-carrying hemoglobin.", "isCorrect": true, "rationale": "The text states, 'In mammals, mature red blood cells lack a nucleus and most organelles, leaving more interior space for hemoglobin, the iron-containing protein that binds oxygen,' directly linking this structure to their function."}, {"text": "Producing ATP efficiently for muscle contraction.", "isCorrect": false, "rationale": "Efficient ATP production for contraction is a function of muscle cells, which are rich in mitochondria. Red blood cells use anaerobic glycolysis for minimal energy needs."}, {"text": "Transmitting electrical signals throughout the body.", "isCorrect": false, "rationale": "Transmitting electrical signals is the function of nerve cells, which have a distinct structure including a nucleus and numerous organelles."}], "id": "q07"}, {"question": "If you examine the cells lining the small intestine and find finger-like projections called microvilli, what function is primarily enhanced by this specialized structure?", "options": [{"text": "Rapid communication between cells.", "isCorrect": false, "rationale": "While cells communicate, microvilli are primarily involved in increasing surface area, not rapid communication."}, {"text": "Increased surface area for nutrient absorption.", "isCorrect": true, "rationale": "The text explains, 'In the small intestine, epithelial cells have finger-like projections called microvilli that increase the surface area available for absorbing nutrients from digested food.'"}, {"text": "Strong contractile force.", "isCorrect": false, "rationale": "Strong contractile force is a primary function of muscle cells, not epithelial cells with microvilli."}, {"text": "Protection against pathogens by forming a thick barrier.", "isCorrect": false, "rationale": "While epithelial cells do form protective barriers, microvilli specifically enhance absorption rather than barrier thickness."}], "id": "q08"}, {"question": "Based on the discussion of stem cells, which of the following statements best explains a scientific advantage of using embryonic stem cells over adult stem cells in medical research?", "options": [{"text": "Embryonic stem cells are easier to obtain.", "isCorrect": false, "rationale": "The text does not discuss the ease of obtaining them, and adult stem cells can sometimes be harvested from the patient, avoiding ethical concerns and immune rejection."}, {"text": "Embryonic stem cells are generally multipotent, offering a wider range of differentiation.", "isCorrect": false, "rationale": "Embryonic stem cells are pluripotent, not multipotent. Multipotent cells have a more limited differentiation potential compared to pluripotent cells."}, {"text": "Embryonic stem cells are pluripotent, meaning they can differentiate into a broader range of cell types than multipotent adult stem cells.", "isCorrect": true, "rationale": "The 'Discussion Guidance for Think Deeper' explicitly states that 'embryonic stem cells are pluripotent (can become nearly any cell type), making them more versatile for medical research than multipotent adult stem cells.'"}, {"text": "Embryonic stem cells do not raise ethical concerns.", "isCorrect": false, "rationale": "The 'Think Deeper' section explicitly states that 'the use of embryonic stem cells has raised ethical debates.'"}], "id": "q09"}, {"question": "The text uses the analogy of a 'complete recipe book' to describe the DNA in every cell. If a muscle cell 'reads the recipes for proteins that contract,' what does this imply about the genes in that muscle cell?", "options": [{"text": "It has fewer total genes than a nerve cell.", "isCorrect": false, "rationale": "The text explicitly states, 'Every cell in your body contains the same complete set of DNA — the same roughly 20,000 genes...'"}, {"text": "All of its genes are actively producing proteins.", "isCorrect": false, "rationale": "The analogy implies selective reading ('each cell reads only a few selected recipes'), not that all genes are active."}, {"text": "Only the genes necessary for muscle function are activated, while others are silenced.", "isCorrect": true, "rationale": "This aligns with the explanation: 'During differentiation, specific genes within a cell are switched on while others are switched off. The pattern of active and inactive genes determines which proteins the cell produces...'"}, {"text": "It has permanently deleted the 'recipes' for proteins it doesn't need.", "isCorrect": false, "rationale": "Genes are switched off or silenced, not permanently deleted, as all cells retain the complete DNA."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
