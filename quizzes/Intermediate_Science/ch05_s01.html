        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "The central unifying concept that connects the four branches of science (Life, Earth, Chemistry, Physics) in Cycle 1, as described in the text, is the concept of:", "options": [{"text": "Energy transformation.", "isCorrect": false, "rationale": "While energy transformation is a vital concept in science, the text explicitly identifies 'scale' as 'the thread that connects' the different branches introduced in Cycle 1."}, {"text": "Scale.", "isCorrect": true, "rationale": "The text explicitly states: 'But these pieces are not separate. They interlock like gears in a machine, and the concept of scale is the thread that connects them.' It demonstrates this by zooming in from hands to atoms and zooming out from hands to planets."}, {"text": "Chemical bonding.", "isCorrect": false, "rationale": "Chemical bonding is a fundamental concept in Chemistry, but it is not presented as the overarching concept that connects all four branches across all scales in the way 'scale' is."}, {"text": "Biological evolution.", "isCorrect": false, "rationale": "Biological evolution is a key concept within Life Science, but it does not encompass Earth Science, Chemistry, and Physics as a unifying theme across all scales as described in the section."}], "id": "q01"}, {"question": "According to the text, which of the following biological structures is primarily composed of carbon, hydrogen, oxygen, nitrogen, and phosphorus atoms, storing genetic information?", "options": [{"text": "Cell membrane.", "isCorrect": false, "rationale": "The cell membrane is built from phospholipid molecules containing carbon, hydrogen, oxygen, and phosphorus, but the text specifies DNA as the structure that 'stores genetic information' using five particular elements."}, {"text": "Proteins.", "isCorrect": false, "rationale": "Proteins are long chains of amino acids made from carbon, hydrogen, oxygen, nitrogen, and sometimes sulfur. While crucial, they do not primarily store genetic information as specified in the question."}, {"text": "Mitochondria.", "isCorrect": false, "rationale": "Mitochondria are organelles that generate ATP, but the text specifically highlights DNA as the structure storing genetic information with the given elemental composition."}, {"text": "DNA.", "isCorrect": true, "rationale": "The text states: 'DNA stores genetic information using just five elements: carbon, hydrogen, oxygen, nitrogen, and phosphorus.' This directly matches the description."}], "id": "q02"}, {"question": "The text explains that the density differences observed among Earth's layers (crust, mantle, core) are fundamentally linked to:", "options": [{"text": "The interaction of tectonic plates.", "isCorrect": false, "rationale": "Tectonic plate interaction is a consequence of mantle convection and density differences, not the fundamental cause of the density differences themselves, especially during Earth's formation."}, {"text": "Differences in the atomic composition, specifically heavier atoms sinking to the center.", "isCorrect": true, "rationale": "The text explicitly states: 'The density differences among Earth's layers... arise because heavier atoms like iron sank toward the center when Earth was young and molten.'"}, {"text": "The variable speed of seismic waves.", "isCorrect": false, "rationale": "Seismic waves help geologists study and understand Earth's interior structure and density differences, but they are not the cause of these differences."}, {"text": "The planet's magnetic field.", "isCorrect": false, "rationale": "Earth's magnetic field is generated by the movement of the liquid outer core, but the initial density differentiation of the core itself is due to atomic composition and sinking during formation."}], "id": "q03"}, {"question": "How does the text directly connect the physical concept of temperature (Unit 4) to the atomic level (Unit 3)?", "options": [{"text": "Temperature is a measure of the potential energy stored within atomic bonds.", "isCorrect": false, "rationale": "While potential energy is related to atomic bonds, the text specifically links temperature to the *motion* of atoms, not their stored potential energy."}, {"text": "Temperature reflects the rate at which atoms emit radiation.", "isCorrect": false, "rationale": "The text does not discuss atomic radiation in the context of defining temperature."}, {"text": "Temperature is a measure of the average kinetic energy of moving atoms.", "isCorrect": true, "rationale": "The text clearly states: 'Temperature is a measure of the average kinetic energy of those moving atoms.'"}, {"text": "Temperature indicates the number of electrons orbiting an atom's nucleus.", "isCorrect": false, "rationale": "The number of electrons orbiting a nucleus primarily defines an atom's chemical properties and its charge state, not its temperature."}], "id": "q04"}, {"question": "Imagine an exoplanet is discovered that is tectonically active, producing mountains and ocean basins, but lacks a liquid outer core. Based on the text, what critical protective feature for life would this planet likely be missing?", "options": [{"text": "A stable atmosphere for respiration.", "isCorrect": false, "rationale": "While a stable atmosphere is crucial, the text focuses on a different, specific protection provided by the liquid outer core related to solar radiation, not directly the overall atmospheric stability for respiration."}, {"text": "A magnetic field to shield against solar radiation.", "isCorrect": true, "rationale": "The text states: 'Earth's magnetic field, generated by the dynamo in the liquid outer core, shields the surface from harmful solar radiation, protecting the DNA inside every cell from damage.' A planet without a liquid outer core would likely lack this magnetic field."}, {"text": "Sufficient soil for plant growth.", "isCorrect": false, "rationale": "The rock cycle, driven by processes like plate tectonics, produces soil. While plate tectonics is mentioned, the lack of a *liquid outer core* directly impacts the magnetic field, not necessarily the rock cycle's ability to produce soil."}, {"text": "Sufficient gravity to hold organisms on its surface.", "isCorrect": false, "rationale": "Gravity is primarily determined by a planet's mass, not whether its outer core is liquid or solid. A solid outer core would still contribute mass and thus gravity."}], "id": "q05"}, {"question": "The text states a glucose molecule diffuses 10 micrometers in 10^-3 seconds, with an average speed of 0.01 m/s. If another molecule diffused at an average speed of 0.005 m/s, how long would it take to travel the same 10 micrometers?", "options": [{"text": "0.0005 seconds.", "isCorrect": false, "rationale": "This would imply a much faster diffusion speed than given, not slower."}, {"text": "0.002 seconds.", "isCorrect": true, "rationale": "Using the kinematic equation $t = d/v$, where $d = 10 \times 10^{-6}$ m and $v = 0.005$ m/s: $t = (10 \times 10^{-6} \text{ m}) / (0.005 \text{ m/s}) = (10 \times 10^{-6}) / (5 \times 10^{-3}) = 2 \times 10^{-3} \text{ s} = 0.002 \text{ seconds}$."}, {"text": "0.01 seconds.", "isCorrect": false, "rationale": "This time would correspond to a speed of 0.001 m/s, which is 10 times slower than the initial molecule, not half as fast."}, {"text": "0.05 seconds.", "isCorrect": false, "rationale": "This time would correspond to a much slower speed, not half as fast."}], "id": "q06"}, {"question": "The text emphasizes that the kinematic equations ($v=d/t$, etc.) apply to a remarkably wide range of phenomena. Which of the following best represents the diverse scales mentioned where these equations are applicable?", "options": [{"text": "Only macroscopic objects like cars and falling balls.", "isCorrect": false, "rationale": "The text explicitly states that these equations apply 'at scales far larger and far smaller' than everyday objects."}, {"text": "Primarily microscopic entities such as atoms and molecules.", "isCorrect": false, "rationale": "While molecular motion is mentioned, the text also includes planetary motion and seismic waves, indicating a broader range than just microscopic entities."}, {"text": "Objects ranging from individual molecules to entire planets.", "isCorrect": true, "rationale": "The text provides examples of 'Molecular motion,' 'Seismic waves,' and 'Planetary motion,' demonstrating that these equations are applicable across an enormous range of scales, from the microscopic to the cosmic."}, {"text": "Only celestial bodies like Earth and other planets.", "isCorrect": false, "rationale": "This is too narrow; the text also includes molecular motion and seismic waves as examples."}], "id": "q07"}, {"question": "Based on the provided text, if Earth's liquid outer core were to solidify, what would be the most significant long-term consequence for life as we know it?", "options": [{"text": "The slowing down of tectonic plate movement.", "isCorrect": false, "rationale": "Tectonic plate movement is primarily driven by convection currents in the mantle, not directly by the liquidity of the outer core. While there are indirect thermal links, the text emphasizes a different, more immediate consequence for life."}, {"text": "A catastrophic increase in volcanic activity.", "isCorrect": false, "rationale": "The text does not suggest an increase in volcanic activity as a direct consequence of a solidified outer core; in fact, a less active core might lead to less volcanism over time due to reduced heat flow."}, {"text": "The loss of Earth's protective magnetic field, leading to increased solar radiation exposure and DNA damage.", "isCorrect": true, "rationale": "The text explains: 'Earth's magnetic field, generated by the dynamo in the liquid outer core... Think about what would happen without that magnetic shield. High-energy particles from the Sun would strip away the atmosphere and bombard the surface. Cells would suffer far more mutations during DNA replication and cell division.' A solidified outer core would prevent the dynamo action."}, {"text": "A significant decrease in Earth's average surface temperature.", "isCorrect": false, "rationale": "While Earth's core contributes to its overall heat, its solidification would not immediately or solely cause a significant decrease in surface temperature in the way described. The primary and immediate consequence highlighted by the text is the loss of the magnetic field."}], "id": "q08"}, {"question": "What are the four distinct branches of science that were introduced in Cycle 1 and are described as different 'lenses' for viewing the same universe?", "options": [{"text": "Biology, Geology, Chemistry, Astronomy.", "isCorrect": false, "rationale": "While related, 'Biology' and 'Geology' are not the exact terms used; the text specifies 'Life Science' and 'Earth Science'. 'Astronomy' is not mentioned as one of the four branches in Cycle 1."}, {"text": "Life Science, Earth Science, Chemistry, Physics.", "isCorrect": true, "rationale": "The text explicitly states: 'Cycle 1 introduced four branches of science — Life Science, Earth Science, Chemistry, and Physics — and each one illuminated a different piece of the universe.'"}, {"text": "Environmental Science, Materials Science, Thermodynamics, Genetics.", "isCorrect": false, "rationale": "These are either sub-disciplines or distinct fields not listed as the four overarching branches introduced in Cycle 1."}, {"text": "Anatomy, Meteorology, Organic Chemistry, Mechanics.", "isCorrect": false, "rationale": "These are specific sub-disciplines of the broader branches and not the four main branches themselves as identified in the text."}], "id": "q09"}, {"question": "The text states that 'The atom is the common denominator' across the sciences. Which statement best synthesizes *why* this is true according to the section?", "options": [{"text": "Atoms are the smallest units of matter, making them fundamental to understanding everything.", "isCorrect": false, "rationale": "While atoms are fundamental, this statement doesn't fully capture the *breadth* of the text's explanation of how atoms connect the diverse branches of science (Life, Earth, Physics) beyond just being 'smallest units'."}, {"text": "Atoms are the basic building blocks for all structures in living cells, geological formations, and the objects whose motion physics describes.", "isCorrect": true, "rationale": "This option accurately synthesizes the examples provided in the text for each science: atoms build cell membranes, proteins, and DNA (Life Science); they form Earth's crust, mantle, and core (Earth Science); and their motion is described by kinematic equations and determines temperature (Physics)."}, {"text": "The energy levels of electrons in atoms dictate all chemical reactions and physical forces.", "isCorrect": false, "rationale": "This statement is true in chemistry and physics, but the text's explanation of the atom as a 'common denominator' also heavily emphasizes its role in forming large-scale structures in biology and earth science, which this option largely misses."}, {"text": "All scientific experiments ultimately involve manipulating individual atoms to observe their behavior.", "isCorrect": false, "rationale": "Not all scientific experiments directly involve manipulating individual atoms. The text's point about atoms being the 'common denominator' is a conceptual one about composition and underlying principles, not an experimental methodology."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
