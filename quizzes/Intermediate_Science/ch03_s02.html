<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement correctly describes the properties and locations of the three primary subatomic particles?", "options": [{"text": "Protons are negatively charged and found outside the nucleus, while electrons are positively charged and in the nucleus.", "isCorrect": false, "rationale": "This statement incorrectly assigns charges and locations for both protons and electrons. Protons are positive and in the nucleus; electrons are negative and outside the nucleus."}, {"text": "Neutrons are electrically neutral, have a mass of approximately 1 amu, and are located in the nucleus.", "isCorrect": true, "rationale": "Neutrons are defined as having no electric charge, a relative mass of approximately 1 amu, and being located within the atomic nucleus, making this statement correct."}, {"text": "Electrons have a mass of approximately 1 amu, a negative charge, and are found inside the nucleus.", "isCorrect": false, "rationale": "Electrons have an extremely small mass (about 1/1,836 amu) and are found in energy levels outside the nucleus, not inside."}, {"text": "Protons, neutrons, and electrons all have a positive charge and are found in the nucleus.", "isCorrect": false, "rationale": "This statement is incorrect. Only protons are positive, neutrons are neutral, and electrons are negative. Electrons are also found outside the nucleus, not inside with protons and neutrons."}], "id": "q01"}, {"question": "An atom has 15 protons, 16 neutrons, and 15 electrons. What is the atomic number (Z) and what element is it?", "options": [{"text": "Z = 16, Sulfur (S)", "isCorrect": false, "rationale": "The atomic number is determined by the number of protons, which is 15, not 16. Sulfur has an atomic number of 16."}, {"text": "Z = 31, Phosphorus (P)", "isCorrect": false, "rationale": "The atomic number is the number of protons (15), not the sum of protons and neutrons (mass number). Phosphorus does have 15 protons, but Z=31 is incorrect."}, {"text": "Z = 15, Phosphorus (P)", "isCorrect": true, "rationale": "The atomic number (Z) is defined as the number of protons in an atom. With 15 protons, the atomic number is 15, which uniquely identifies the element as Phosphorus (P)."}, {"text": "Z = 15, Sulfur (S)", "isCorrect": false, "rationale": "While the atomic number is 15, this identifies Phosphorus, not Sulfur. Sulfur has an atomic number of 16."}], "id": "q02"}, {"question": "An atom of an unknown element has a mass number of 40 and contains 20 protons. How many neutrons does this atom contain?", "options": [{"text": "40 neutrons", "isCorrect": false, "rationale": "40 is the mass number (protons + neutrons), not the number of neutrons alone."}, {"text": "20 neutrons", "isCorrect": true, "rationale": "The mass number (A) is the sum of protons (Z) and neutrons (N), so N = A - Z. Given A = 40 and Z = 20, N = 40 - 20 = 20 neutrons."}, {"text": "60 neutrons", "isCorrect": false, "rationale": "60 would be the result of adding protons and mass number, which is not the correct calculation for neutrons."}, {"text": "10 neutrons", "isCorrect": false, "rationale": "This value is incorrect; 10 neutrons would result in a mass number of 30 for this element."}], "id": "q03"}, {"question": "Which statement accurately describes the distribution of mass and volume within an atom?", "options": [{"text": "The electron cloud contains most of the atom's mass, while the nucleus occupies most of its volume.", "isCorrect": false, "rationale": "This statement is incorrect. Virtually all of an atom's mass is concentrated in the nucleus, and the electron cloud occupies most of its volume."}, {"text": "The nucleus contains most of the atom's mass, and the electron cloud occupies most of its volume.", "isCorrect": true, "rationale": "Protons and neutrons, which are much more massive than electrons, are found in the nucleus, concentrating almost all the mass there. Electrons, though light, move in a large volume around the nucleus, making the electron cloud responsible for most of the atom's volume."}, {"text": "Both the mass and volume of an atom are almost entirely concentrated within its nucleus.", "isCorrect": false, "rationale": "This is incorrect. While most mass is in the nucleus, the electron cloud accounts for most of the atom's volume."}, {"text": "The mass is evenly distributed between the nucleus and the electron cloud, but the nucleus has more volume.", "isCorrect": false, "rationale": "This statement is incorrect. Mass is not evenly distributed, and the electron cloud, not the nucleus, occupies much more volume."}], "id": "q04"}, {"question": "Two atoms are found to have the same number of protons but different numbers of neutrons. What term best describes their relationship, and how do they primarily differ?", "options": [{"text": "They are different elements, differing in their atomic number.", "isCorrect": false, "rationale": "If they have the same number of protons, they are the same element, by definition of atomic number."}, {"text": "They are ions of the same element, differing in their electric charge.", "isCorrect": false, "rationale": "Ions differ in their number of electrons, leading to different charges. Different numbers of neutrons denote isotopes, not necessarily ions."}, {"text": "They are isotopes of the same element, differing in their mass number.", "isCorrect": true, "rationale": "Isotopes are defined as atoms of the same element (same number of protons) that have different numbers of neutrons. This difference in neutron count leads to different mass numbers."}, {"text": "They are different compounds, differing in their chemical reactivity.", "isCorrect": false, "rationale": "Atoms are not compounds. Isotopes of the same element behave almost identically in chemical reactions because their electron configurations are the same."}], "id": "q05"}, {"question": "An atom of magnesium (Mg) has 12 protons and 12 neutrons. If this atom loses two electrons to form an ion, how many protons, neutrons, and electrons will the resulting ion have, and what will its charge be?", "options": [{"text": "10 protons, 12 neutrons, 12 electrons; charge 2+", "isCorrect": false, "rationale": "The number of protons does not change when an atom forms an ion. Losing electrons affects only the electron count and charge."}, {"text": "12 protons, 12 neutrons, 14 electrons; charge 2-", "isCorrect": false, "rationale": "Losing electrons means the electron count decreases, not increases, and the charge would be positive, not negative."}, {"text": "12 protons, 12 neutrons, 10 electrons; charge 2+", "isCorrect": true, "rationale": "The number of protons and neutrons remains unchanged (12 each). A neutral Mg atom has 12 electrons. Losing two electrons results in 10 electrons. With 12 positive protons and 10 negative electrons, the net charge is +2, forming a cation."}, {"text": "12 protons, 10 neutrons, 12 electrons; charge 2+", "isCorrect": false, "rationale": "The number of neutrons does not change when an atom forms an ion. The mass number is not altered."}], "id": "q06"}, {"question": "Consider a $^35_{17}Cl^-$ ion. How many protons, neutrons, and electrons are present in this ion?", "options": [{"text": "17 protons, 18 neutrons, 17 electrons", "isCorrect": false, "rationale": "This describes a neutral chlorine-35 atom. The charge indicates a change in electron count."}, {"text": "17 protons, 35 neutrons, 18 electrons", "isCorrect": false, "rationale": "The superscript 35 is the mass number (protons + neutrons), not the number of neutrons alone. The number of neutrons is 35 - 17 = 18."}, {"text": "17 protons, 18 neutrons, 18 electrons", "isCorrect": true, "rationale": "The atomic number (subscript 17) indicates 17 protons. The number of neutrons is A - Z = 35 - 17 = 18. The charge of 1- means the atom gained one electron. A neutral chlorine atom has 17 electrons, so a 1- ion has 17 + 1 = 18 electrons."}, {"text": "18 protons, 17 neutrons, 17 electrons", "isCorrect": false, "rationale": "The number of protons is determined by the atomic number (17), not by the mass number or charge. Changing the number of protons would change the element."}], "id": "q07"}, {"question": "What is the fundamental difference between an atom of carbon-12 and an atom of carbon-14?", "options": [{"text": "Carbon-14 has two more protons than carbon-12, making it a different element.", "isCorrect": false, "rationale": "If the number of protons changed, it would no longer be carbon. Both are isotopes of carbon, meaning they have the same number of protons (6)."}, {"text": "Carbon-14 has two more neutrons than carbon-12, resulting in a different mass number.", "isCorrect": true, "rationale": "Carbon-12 has 6 protons and 6 neutrons, while carbon-14 has 6 protons and 8 neutrons. The difference in neutron count (8-6=2) means they are isotopes with different mass numbers but are still the same element."}, {"text": "Carbon-14 has two fewer electrons than carbon-12, making it a positively charged ion.", "isCorrect": false, "rationale": "The numbers '12' and '14' refer to mass numbers, not electron counts. A difference in electrons would create an ion, but not distinguish isotopes in this manner."}, {"text": "Carbon-14 has a different number of energy levels for its electrons compared to carbon-12.", "isCorrect": false, "rationale": "Isotopes of the same element have the same electron configuration and thus the same number of energy levels. The difference lies in the nucleus (neutrons)."}], "id": "q08"}, {"question": "Which change to an atom would *always* result in a change to its elemental identity?", "options": [{"text": "Gaining or losing electrons", "isCorrect": false, "rationale": "Gaining or losing electrons changes the atom into an ion, altering its charge, but its elemental identity (defined by protons) remains the same."}, {"text": "Changing the number of neutrons", "isCorrect": false, "rationale": "Changing the number of neutrons creates an isotope of the same element, altering its mass but not its elemental identity."}, {"text": "Changing the number of protons", "isCorrect": true, "rationale": "The number of protons (atomic number, Z) uniquely defines an element. Changing this number fundamentally changes which element the atom belongs to."}, {"text": "Changing its energy state through absorption or emission of light", "isCorrect": false, "rationale": "Changes in energy state involve electron transitions within the atom but do not alter the number of protons, neutrons, or electrons that define its identity or elemental type."}], "id": "q09"}, {"question": "Despite atoms being mostly 'empty space,' solid objects composed of atoms feel solid. According to the 'Think Deeper' section, what is the primary reason for this phenomenon?", "options": [{"text": "The subatomic particles themselves are physically hard and rigid.", "isCorrect": false, "rationale": "The text explains that atoms are mostly empty space, meaning the subatomic particles are very tiny and widely separated, not that they are inherently hard solid barriers."}, {"text": "Strong nuclear forces between the nuclei of neighboring atoms prevent penetration.", "isCorrect": false, "rationale": "Nuclear forces act within the nucleus; they are not responsible for the macroscopic solidity of materials or repulsion between distinct atoms."}, {"text": "The electron clouds of neighboring atoms repel each other through electromagnetic forces.", "isCorrect": true, "rationale": "The 'Think Deeper' discussion guidance explicitly states that electron clouds repel each other through electromagnetic forces, preventing atoms from passing through one another and creating the sensation of solidity."}, {"text": "Gravity creates a strong attractive force between atoms, making them resist compression.", "isCorrect": false, "rationale": "While gravity acts between objects, it is a very weak force at the atomic scale and is not the primary reason for the solidity or repulsion between atoms in a solid object."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
