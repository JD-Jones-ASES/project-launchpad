    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the primary mechanism of seafloor spreading?", "options": [{"text": "Tectonic plates slide past each other, creating new crust as they move.", "isCorrect": false, "rationale": "This describes transform plate boundaries, not the creation of new crust at divergent boundaries through seafloor spreading."}, {"text": "Magma rises at mid-ocean ridges, solidifies into new oceanic crust, and pushes older crust away from the ridge.", "isCorrect": true, "rationale": "The text explains that hot mantle material rises at mid-ocean ridges, partially melts into magma, solidifies into new oceanic crust (basalt), and then pushes older crust outward like conveyor belts."}, {"text": "Oceanic crust is consumed at mid-ocean ridges as it sinks back into the mantle.", "isCorrect": false, "rationale": "Mid-ocean ridges are where new oceanic crust is created, not consumed. Consumption of oceanic crust occurs elsewhere, such as at subduction zones."}, {"text": "Sediments accumulate rapidly at mid-ocean ridges, building up new landforms.", "isCorrect": false, "rationale": "Sediment thickness is thinnest at mid-ocean ridges because the crust is newly formed and has not had time to accumulate much sediment. Sediment accumulation is not the mechanism for creating new crust."}]}, {"question": "What significant discovery about the ocean floor, aided by sonar technology, was crucial for the development of the seafloor spreading hypothesis?", "options": [{"text": "The discovery of vast, flat abyssal plains covering the entire ocean floor.", "isCorrect": false, "rationale": "While abyssal plains exist, the key 'astonishing' discovery was that the ocean floor was not flat and featureless, but contained mountain chains and trenches. The flat plains were not the most dramatic discovery that changed understanding."}, {"text": "Evidence of ancient civilizations submerged beneath the waves.", "isCorrect": false, "rationale": "The text does not mention any discoveries related to ancient civilizations, focusing instead on geological features."}, {"text": "A globe-encircling system of underwater mountain ranges called mid-ocean ridges.", "isCorrect": true, "rationale": "The text states that 'The most dramatic discovery was a globe-encircling system of underwater mountain ranges called mid-ocean ridges,' which became central to Hess's hypothesis."}, {"text": "Large deposits of oil and natural gas beneath the ocean floor.", "isCorrect": false, "rationale": "While such deposits exist, the text does not cite them as a discovery crucial to the seafloor spreading hypothesis."}]}, {"question": "According to Harry Hess's hypothesis, what happens to the continents during seafloor spreading?", "options": [{"text": "They plow through the oceanic crust, creating trenches as they move.", "isCorrect": false, "rationale": "The text explicitly states that 'Continents do not plow through oceanic crust; they ride on top of plates' - this was the misconception Wegener initially faced."}, {"text": "They remain stationary while the ocean floor moves beneath them.", "isCorrect": false, "rationale": "The hypothesis explains how continents move, stating they are 'carried along as passive passengers' on the moving plates."}, {"text": "They are consumed at mid-ocean ridges and reformed elsewhere.", "isCorrect": false, "rationale": "Continents are not consumed at mid-ocean ridges; new oceanic crust is created there. Continental crust is generally too buoyant to be consumed."}, {"text": "They are carried along as passive passengers embedded in larger plates of crust.", "isCorrect": true, "rationale": "The text clearly states, 'The continents, embedded in the larger plates of crust, are carried along as passive passengers,' explaining how continental drift occurs as a result of seafloor spreading."}]}, {"question": "How did magnetic striping on the ocean floor provide evidence for seafloor spreading?", "options": [{"text": "It showed that the Earth's magnetic field is constant and never reverses.", "isCorrect": false, "rationale": "The text explains that Earth's magnetic field periodically reverses, and it is the recording of these reversals in the rock that forms the magnetic stripes."}, {"text": "The random distribution of magnetic anomalies indicated a chaotic formation process.", "isCorrect": false, "rationale": "The discovery was a *pattern* of alternating magnetic stripes, which was symmetrical and highly ordered, not random or chaotic."}, {"text": "It revealed a symmetrical pattern of alternating normal and reversed polarity parallel to mid-ocean ridges, consistent with new crust forming and moving outward.", "isCorrect": true, "rationale": "The text states that 'The magnetic stripes were symmetrical: the pattern on one side of the ridge was a mirror image of the pattern on the other side. This symmetry was precisely what Hess's model predicted.'"}, {"text": "It demonstrated that only very old rocks contain iron-bearing minerals that record magnetic fields.", "isCorrect": false, "rationale": "All basaltic oceanic crust, regardless of age, contains iron-bearing minerals that align with Earth's magnetic field at the time of solidification, providing a record."}]}, {"question": "Based on the evidence for seafloor spreading, what pattern would scientists expect to find regarding the age of oceanic crust?", "options": [{"text": "The oldest oceanic crust is found at mid-ocean ridges, and the youngest is near continental margins.", "isCorrect": false, "rationale": "This is the opposite of what the hypothesis predicts and what evidence confirmed. New crust forms at the ridges, making it the youngest there."}, {"text": "The age of oceanic crust is random and shows no discernible pattern.", "isCorrect": false, "rationale": "The dating of rock samples revealed a very clear and predictable pattern, confirming the hypothesis."}, {"text": "Oceanic crust near mid-ocean ridges is younger, while crust farther from the ridges (near continental margins) is older.", "isCorrect": true, "rationale": "The text explicitly states: 'The youngest crust should be at the ridge and the oldest crust should be farthest from it. ...oceanic crust near the ridges is young... while crust near the continental margins is much older.'"}, {"text": "All oceanic crust on Earth is approximately the same age, about 200 million years old.", "isCorrect": false, "rationale": "While no oceanic crust older than 200 million years has been found, the age varies significantly, from brand new at the ridges to up to 200 million years old near continental margins."}]}, {"question": "Why is the sediment layer generally thinnest near mid-ocean ridges and thickest near continental margins?", "options": [{"text": "Ocean currents prevent sediment from accumulating at mid-ocean ridges.", "isCorrect": false, "rationale": "While currents can play a role, the primary reason given in the text relates to the age of the crust, not just current activity."}, {"text": "Mid-ocean ridges are too deep for sediment to reach the ocean floor.", "isCorrect": false, "rationale": "Mid-ocean ridges are underwater mountain ranges, and sediment does fall onto them. The thickness is due to time, not depth preventing reach."}, {"text": "The oceanic crust near the ridges is young and has not had much time to accumulate sediment, whereas older crust farther away has accumulated more.", "isCorrect": true, "rationale": "The text explains this directly: 'if the ocean floor near the ridge is young, it has had less time to accumulate sediment. Sediment should therefore be thinnest near the ridge and thickest near the continental margins.'"}, {"text": "Volcanic activity at the ridges constantly removes accumulating sediment.", "isCorrect": false, "rationale": "While volcanic activity creates new crust, it doesn't actively remove sediment in a way that explains the consistent thickness pattern over large areas."}]}, {"question": "The development of the seafloor spreading hypothesis was crucial because it provided the missing mechanism for which earlier idea?", "options": [{"text": "Darwin's theory of evolution", "isCorrect": false, "rationale": "Darwin's theory of evolution explains the diversity of life, not the movement of continents. The text uses Darwin's theory as an analogy for how plate tectonics unified earth science, not as something seafloor spreading explained."}, {"text": "Wegener's continental drift hypothesis", "isCorrect": true, "rationale": "The text explicitly states: 'This was the mechanism Wegener had been missing. Continents do not plow through oceanic crust; they ride on top of plates...' Seafloor spreading provided the 'how' for continental drift."}, {"text": "Newton's laws of physics", "isCorrect": false, "rationale": "Newton's laws explain motion and gravity in the physical world, not the geological movement of continents. Like Darwin's theory, it's used as an analogy for scientific unification."}, {"text": "The Big Bang theory", "isCorrect": false, "rationale": "The Big Bang theory explains the origin of the universe, which is unrelated to the movement of Earth's continents."}]}, {"question": "What is the primary reason why oceanic crust is significantly younger (never older than ~200 million years) than continental crust (which can be over 4 billion years old)?", "options": [{"text": "Continental crust is constantly being created, while oceanic crust is not.", "isCorrect": false, "rationale": "Oceanic crust is constantly being created at mid-ocean ridges, while continental crust forms through various processes but is not 'recycled' in the same way."}, {"text": "Oceanic crust is denser and more easily recycled into the mantle at subduction zones, whereas less dense continental crust resists subduction.", "isCorrect": true, "rationale": "As explained in the 'Think Deeper' section, oceanic crust is denser than continental crust, causing it to subduct and be recycled into the mantle, preventing it from becoming very old. Continental crust's buoyancy allows it to persist at the surface."}, {"text": "Continental crust is protected from erosion by the oceans, preserving its age.", "isCorrect": false, "rationale": "While erosion affects continents, it doesn't explain the fundamental difference in maximum age or the recycling process of oceanic crust."}, {"text": "Oceanic crust experiences more intense volcanic activity, which constantly resurfaces it.", "isCorrect": false, "rationale": "While volcanic activity creates new oceanic crust, the reason for its maximum age limit is its destruction via subduction, not simply resurfacing."}]}, {"question": "What type of rock primarily forms new oceanic crust at mid-ocean ridges?", "options": [{"text": "Granite", "isCorrect": false, "rationale": "Granite is characteristic of continental crust and is less dense than the rock forming oceanic crust."}, {"text": "Limestone", "isCorrect": false, "rationale": "Limestone is a sedimentary rock often formed from marine organisms, not the primary igneous rock of new oceanic crust."}, {"text": "Basalt", "isCorrect": true, "rationale": "The text states that new oceanic crust solidifies into 'primarily a dark, dense rock called basalt.'"}, {"text": "Shale", "isCorrect": false, "rationale": "Shale is a sedimentary rock, not the igneous rock formed directly from magma at mid-ocean ridges."}]}, {"question": "What internal Earth process is connected to the movement of surface plates through seafloor spreading, as explained by Hess?", "options": [{"text": "Earth's rotation", "isCorrect": false, "rationale": "While Earth's rotation has various effects, it is not described in the text as the 'internal engine' driving seafloor spreading and plate movement."}, {"text": "Isostatic adjustment", "isCorrect": false, "rationale": "Isostatic adjustment relates to the vertical movement of Earth's crust due to buoyancy, not the large-scale horizontal movement of plates driven by internal heat."}, {"text": "Mantle convection", "isCorrect": true, "rationale": "The text states: 'Hess's seafloor spreading connected that internal engine to the movement of the surface.' and earlier 'mantle convection drives the slow circulation of rock deep inside the Earth.'"}, {"text": "Gravitational pull of the Moon", "isCorrect": false, "rationale": "The Moon's gravitational pull primarily influences tides, not the deep-seated internal Earth processes driving plate tectonics."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
