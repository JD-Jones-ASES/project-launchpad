<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 25, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary objective of the 'Vocabulary Review: Cycle 5' section?", "options": [{"text": "To introduce entirely new scientific concepts for the first time.", "isCorrect": false, "rationale": "The section is a 'Review' section, indicating it covers previously introduced terms, not new ones."}, {"text": "To provide comprehensive definitions for every single term ever encountered in the textbook.", "isCorrect": false, "rationale": "It focuses specifically on 'key vocabulary terms from each unit in Cycle 5,' not every term in the entire textbook."}, {"text": "To enable students to define each key term from Cycle 5 and use it correctly in context.", "isCorrect": true, "rationale": "The text explicitly states: 'Review these terms carefully — you should be able to define each one and use it correctly in context.' This is the core objective."}, {"text": "To list all the science units covered throughout the entire textbook series.", "isCorrect": false, "rationale": "The section specifically lists units from 'Cycle 5,' not the entire textbook series."}]}, {"question": "Which of the following science branches is explicitly included in Cycle 5 according to this review section?", "options": [{"text": "Computer Science", "isCorrect": false, "rationale": "Computer Science is not mentioned as one of the branches in Cycle 5."}, {"text": "Environmental Science", "isCorrect": false, "rationale": "Environmental Science is not mentioned as one of the branches in Cycle 5."}, {"text": "Physics", "isCorrect": true, "rationale": "The section explicitly lists 'Physics — Unit 24: Electricity and Circuits' as one of the branches in Cycle 5."}, {"text": "Geology", "isCorrect": false, "rationale": "While Earth Science is included, 'Geology' as a separate branch is not specifically listed as part of Cycle 5; Earth Science is a broader category."}]}, {"question": "The section states that 'Being able to use these terms across contexts is a sign of deep scientific understanding.' What does this statement imply about the nature of 'Cross-Cutting Terms'?", "options": [{"text": "They are exclusively relevant to only one scientific discipline.", "isCorrect": false, "rationale": "The phrase 'across contexts' and 'more than one branch' directly contradicts the idea of exclusivity to one discipline."}, {"text": "Their meaning changes entirely when applied to different scientific branches.", "isCorrect": false, "rationale": "While application might differ, the fundamental meaning typically remains consistent, allowing for connection, rather than complete change."}, {"text": "They represent fundamental concepts that are applicable and connect multiple scientific fields.", "isCorrect": true, "rationale": "The ability to use terms 'across contexts' signifies that these terms embody overarching concepts that bridge different scientific disciplines, demonstrating deep understanding of their interconnectedness."}, {"text": "They are considered less important than terms specific to a single branch of science.", "isCorrect": false, "rationale": "The emphasis on 'deep scientific understanding' suggests they are highly important for integrative learning, not less important."}]}, {"question": "According to the 'Vocabulary Review: Cycle 5' section, what does an asterisk ($$) next to a term indicate?", "options": [{"text": "The term is optional and does not need to be reviewed.", "isCorrect": false, "rationale": "The text states terms 'marked with an asterisk ($$) connect to more than one branch,' not that they are optional."}, {"text": "The term is entirely new vocabulary introduced for the first time in Cycle 5.", "isCorrect": false, "rationale": "The asterisk denotes cross-cutting nature, not novelty within the cycle."}, {"text": "The term connects to more than one branch of science.", "isCorrect": true, "rationale": "The text explicitly states: 'Terms marked with an asterisk ($$) connect to more than one branch.'"}, {"text": "The term is advanced and only for students pursuing higher-level science.", "isCorrect": false, "rationale": "The text does not categorize terms by difficulty level but by their interdisciplinary connection."}]}, {"question": "A teacher wants to foster interdisciplinary connections in vocabulary review. Which activity from the 'teachernote' suggestions would best achieve this by directly linking terms from different scientific branches?", "options": [{"text": "Flash card relay, where teams define terms and identify their branch.", "isCorrect": false, "rationale": "Flash card relay focuses on individual definitions and branch identification, not necessarily explicit linking between branches."}, {"text": "Crossword or word search, using terms from all four branches.", "isCorrect": false, "rationale": "While using terms from all branches, a crossword or word search primarily tests recall and recognition, not direct conceptual linking across branches."}, {"text": "Concept mapping, where students create a map linking terms from different branches through a common theme.", "isCorrect": true, "rationale": "The 'teachernote' explicitly suggests 'Concept mapping: Have students create a concept map linking terms from different branches through the 'change across scales' theme,' directly addressing the goal of fostering interdisciplinary connections."}, {"text": "'Odd One Out,' where students identify a term that doesn't belong to a given group.", "isCorrect": false, "rationale": "While 'Odd One Out' challenges students to find a cross-branch connection 'anyway,' its primary initial focus is on identifying differences, not directly linking. Concept mapping is more direct for positive linking."}]}, {"question": "In which unit from Cycle 5 would a student find key vocabulary terms specifically related to 'Evolution and Natural Selection'?", "options": [{"text": "Unit 22: Astronomy and the Solar System", "isCorrect": false, "rationale": "'Evolution and Natural Selection' falls under Life Science, not Earth Science."}, {"text": "Unit 23: Solutions, Acids, and Bases", "isCorrect": false, "rationale": "'Evolution and Natural Selection' is not related to Chemistry topics like solutions, acids, and bases."}, {"text": "Unit 21: Evolution and Natural Selection", "isCorrect": true, "rationale": "The section explicitly lists 'Life Science — Unit 21: Evolution and Natural Selection,' indicating this is the correct unit."}, {"text": "Unit 24: Electricity and Circuits", "isCorrect": false, "rationale": "'Evolution and Natural Selection' is not a topic in Physics related to electricity and circuits."}]}, {"question": "The 'teachernote' suggests an 'Odd One Out' activity, challenging students to find a cross-branch connection even after identifying a term that doesn't belong. What primary analytical skill does this challenge develop in students?", "options": [{"text": "Pure memorization of isolated vocabulary definitions.", "isCorrect": false, "rationale": "The activity goes beyond simple memorization by requiring analysis and justification."}, {"text": "The ability to quickly identify spelling errors in scientific terms.", "isCorrect": false, "rationale": "The focus is on conceptual belonging and connection, not spelling."}, {"text": "Categorization of terms and the ability to identify subtle interdisciplinary relationships.", "isCorrect": true, "rationale": "Students must first categorize to find the 'odd one out' and then apply analytical thinking to find a connection across branches, which highlights interdisciplinary relationships."}, {"text": "Speed of information recall under timed pressure.", "isCorrect": false, "rationale": "While speed might be a factor in some competitive activities, the 'Odd One Out' emphasizes deeper thinking and explanation."}]}, {"question": "What is the expected level of student competency for each key vocabulary term from Cycle 5, beyond simple recognition?", "options": [{"text": "Students should only be able to identify the correct spelling of each term.", "isCorrect": false, "rationale": "Spelling is a basic skill, but the text emphasizes deeper understanding beyond just recognition or spelling."}, {"text": "Students must be able to define each term and apply it accurately in a given context.", "isCorrect": true, "rationale": "The review explicitly states: 'you should be able to define each one and use it correctly in context,' indicating the required level of competency."}, {"text": "Students are expected to conduct original research using the terms.", "isCorrect": false, "rationale": "The section is a vocabulary review for comprehension and application, not original research."}, {"text": "Students need to teach the terms to other students independently.", "isCorrect": false, "rationale": "While teaching can demonstrate mastery, the stated expectation is personal definition and contextual use."}]}, {"question": "If a student is specifically focusing on 'Electricity and Circuits,' which unit from Cycle 5 would be most relevant to their study?", "options": [{"text": "Unit 21: Evolution and Natural Selection", "isCorrect": false, "rationale": "'Electricity and Circuits' is a Physics topic, not Life Science."}, {"text": "Unit 22: Astronomy and the Solar System", "isCorrect": false, "rationale": "'Electricity and Circuits' is a Physics topic, not Earth Science/Astronomy."}, {"text": "Unit 23: Solutions, Acids, and Bases", "isCorrect": false, "rationale": "'Electricity and Circuits' is a Physics topic, not Chemistry."}, {"text": "Unit 24: Electricity and Circuits", "isCorrect": true, "rationale": "The section clearly lists 'Physics — Unit 24: Electricity and Circuits,' directly matching the topic."}]}, {"question": "Considering all the suggested 'teachernote' vocabulary activities, what is their collective overarching purpose?", "options": [{"text": "To replace all traditional textbook readings and lectures with interactive games.", "isCorrect": false, "rationale": "The notes suggest 'activities' as a supplement for review, not a replacement for core instruction."}, {"text": "To provide a variety of engaging methods for students to reinforce vocabulary recall, deepen conceptual understanding, and identify interdisciplinary connections.", "isCorrect": true, "rationale": "The activities cover recall (crossword, flash cards), understanding (defining terms), and interdisciplinary connections (concept mapping, odd one out, cross-cutting terms), using diverse formats."}, {"text": "To exclusively focus on developing vocabulary mastery within single, isolated scientific branches.", "isCorrect": false, "rationale": "Several activities, like concept mapping and cross-cutting terms, explicitly encourage interdisciplinary thinking."}, {"text": "To assess students' ability to work independently without any peer collaboration.", "isCorrect": false, "rationale": "Activities like 'Flash card relay' imply team or group work, and 'Odd One Out' often involves discussion, suggesting collaboration is intended."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
