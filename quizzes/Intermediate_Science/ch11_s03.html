    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 11, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately distinguishes cellular respiration from breathing?", "options": [{"text": "Cellular respiration is a mechanical process of air movement, while breathing is a chemical process within cells.", "isCorrect": false, "rationale": "This statement is incorrect. Breathing (ventilation) is the mechanical process of moving air in and out of lungs, while cellular respiration is a chemical process happening inside individual cells."}, {"text": "Breathing supplies oxygen and removes carbon dioxide for cellular respiration, which is the chemical process of energy extraction from glucose.", "isCorrect": true, "rationale": "This statement is correct. The text clearly states that 'Breathing supplies the oxygen that cellular respiration needs, and it removes the carbon dioxide that cellular respiration produces,' while cellular respiration itself is 'a chemical process that happens inside individual cells' to extract energy from glucose."}, {"text": "Both cellular respiration and breathing are identical chemical processes that occur exclusively in the lungs.", "isCorrect": false, "rationale": "This statement is incorrect. Cellular respiration and breathing are distinct processes. Cellular respiration is chemical and occurs in cells, whereas breathing is mechanical and occurs in the lungs."}, {"text": "Cellular respiration only occurs when oxygen is absent, unlike breathing which always requires oxygen.", "isCorrect": false, "rationale": "This statement is incorrect. The primary form of cellular respiration discussed, aerobic respiration, requires oxygen. Fermentation is an anaerobic pathway that allows glycolysis to continue without oxygen, but it's an alternative to full aerobic respiration, not the definition of cellular respiration itself."}]}, {"question": "An athlete is performing an intense sprint, causing their muscle cells to operate under low oxygen conditions. Which metabolic pathway would still be active to produce ATP, and what is its direct output in this scenario?", "options": [{"text": "Krebs cycle, producing carbon dioxide and ATP.", "isCorrect": false, "rationale": "This is incorrect. The Krebs cycle requires oxygen indirectly because it depends on the electron transport chain, which cannot operate without oxygen. If oxygen is low, the Krebs cycle would slow or shut down."}, {"text": "Electron transport chain, producing the majority of ATP.", "isCorrect": false, "rationale": "This is incorrect. The electron transport chain absolutely requires oxygen to function as the final electron acceptor. In low oxygen conditions, it would cease to operate."}, {"text": "Glycolysis, producing a net of 2 ATP and pyruvate, followed by lactic acid fermentation.", "isCorrect": true, "rationale": "This is correct. Glycolysis does not require oxygen and produces a net of 2 ATP and pyruvate. Under low oxygen, pyruvate is converted to lactic acid through lactic acid fermentation to regenerate NAD+ for glycolysis to continue, as described for muscle cells during intense exercise."}, {"text": "Alcoholic fermentation, producing ethanol and carbon dioxide.", "isCorrect": false, "rationale": "This is incorrect. Alcoholic fermentation produces ethanol and CO2 and is performed by yeast cells, not human muscle cells. Muscle cells perform lactic acid fermentation."}]}, {"question": "Which of the following statements about glycolysis is correct?", "options": [{"text": "It requires oxygen to convert glucose into pyruvate.", "isCorrect": false, "rationale": "This is incorrect. Glycolysis is an anaerobic process, meaning it does not require oxygen."}, {"text": "It takes place in the mitochondria and produces 36-38 ATP.", "isCorrect": false, "rationale": "This is incorrect. Glycolysis takes place in the cytoplasm, and it produces a net of 2 ATP, not 36-38 ATP, which is the total yield from aerobic respiration."}, {"text": "It is the first stage of cellular respiration, occurring in the cytoplasm, and results in a net gain of 2 ATP.", "isCorrect": true, "rationale": "This is correct. The text states, 'Glycolysis is the first stage of cellular respiration...It takes place in the cytoplasm...Output: 2 pyruvate molecules, 4 ATP (net gain of 2 ATP), and 2 NADH'."}, {"text": "Its primary output is acetyl-CoA, which then directly enters the electron transport chain.", "isCorrect": false, "rationale": "This is incorrect. Glycolysis produces pyruvate. Pyruvate is then converted to acetyl-CoA before entering the Krebs cycle, not the electron transport chain directly."}]}, {"question": "Consider a carbon atom from a glucose molecule. At what point(s) during aerobic cellular respiration would this carbon atom be released as carbon dioxide (CO2)?", "options": [{"text": "Only during glycolysis, before pyruvate is formed.", "isCorrect": false, "rationale": "This is incorrect. No carbon dioxide is released during glycolysis; glucose is split into two pyruvate molecules, which are still carbon compounds."}, {"text": "During the conversion of pyruvate to acetyl-CoA, and throughout the Krebs cycle.", "isCorrect": true, "rationale": "This is correct. The text states, 'Before entering the Krebs cycle, each pyruvate molecule is converted into...acetyl-CoA, releasing one CO2' and 'For each turn of the Krebs cycle...2 CO2 molecules are released'."}, {"text": "Only during the electron transport chain, as electrons are accepted by oxygen.", "isCorrect": false, "rationale": "This is incorrect. The electron transport chain produces water (H2O) when oxygen accepts electrons and hydrogen ions; it does not release carbon dioxide."}, {"text": "At the very end of cellular respiration, alongside the formation of water.", "isCorrect": false, "rationale": "This is incorrect. CO2 is released earlier in the process (before and during the Krebs cycle), and water is formed at the end of the electron transport chain."}]}, {"question": "The electron transport chain (ETC) is crucial for aerobic respiration primarily because it:", "options": [{"text": "Directly breaks down glucose into pyruvate, yielding 2 ATP.", "isCorrect": false, "rationale": "This is incorrect. Glycolysis is responsible for breaking down glucose into pyruvate, and the ETC does not directly participate in this step."}, {"text": "Converts pyruvate into acetyl-CoA, which then enters the Krebs cycle.", "isCorrect": false, "rationale": "This is incorrect. The conversion of pyruvate to acetyl-CoA occurs before the Krebs cycle, and it is not part of the electron transport chain."}, {"text": "Uses energy from high-energy electrons to pump hydrogen ions, generating a gradient that powers ATP synthase to produce the majority of ATP.", "isCorrect": true, "rationale": "This is correct. The text states, 'As electrons pass from one protein to the next, they release energy. This energy pumps hydrogen ions (H+) across the membrane, creating a concentration gradient. The H+ ions flow back through a special enzyme called ATP synthase, which uses the flow of ions to generate ATP,' producing the vast majority of ATP."}, {"text": "Is the only stage of cellular respiration that does not require oxygen.", "isCorrect": false, "rationale": "This is incorrect. Glycolysis does not require oxygen, but the ETC absolutely requires oxygen as the final electron acceptor."}]}, {"question": "If oxygen becomes unavailable, what is the most significant consequence for a eukaryotic cell's ability to generate ATP from glucose, beyond glycolysis?", "options": [{"text": "The Krebs cycle would produce more ATP to compensate for the lack of the electron transport chain.", "isCorrect": false, "rationale": "This is incorrect. The Krebs cycle itself produces only a small amount of ATP directly, and it would shut down in the absence of oxygen because its electron carriers (NADH, FADH2) cannot be recycled without the ETC."}, {"text": "Fermentation would begin to produce ethanol, allowing the cell to continue generating 36-38 ATP per glucose.", "isCorrect": false, "rationale": "This is incorrect. Fermentation (lactic acid or alcoholic) is far less efficient, yielding only 2 ATP per glucose, not 36-38 ATP. Also, ethanol is produced by alcoholic fermentation, not lactic acid fermentation, which occurs in most eukaryotic cells when oxygen is absent."}, {"text": "The electron transport chain would stop, leading to the shutdown of the Krebs cycle, and the cell would rely on the much less efficient fermentation pathway for limited ATP production.", "isCorrect": true, "rationale": "This is correct. The text explains that 'Without oxygen to accept the electrons at the end of the chain, the entire ETC backs up and stops, and the cell can no longer produce ATP through this pathway.' It also states that 'When oxygen is absent or in short supply, the electron transport chain cannot operate, and the Krebs cycle shuts down.' Fermentation is then used to recycle electron carriers for glycolysis, but it 'yield only 2 ATP per glucose...compared to 36–38 ATP from aerobic respiration.'"}, {"text": "Glycolysis would also immediately cease due to the buildup of lactic acid.", "isCorrect": false, "rationale": "This is incorrect. Glycolysis can continue through fermentation, which recycles NADH back to NAD+, preventing its immediate cessation due to lactic acid buildup. Lactic acid is a product of fermentation, not a direct cause of glycolysis stopping."}]}, {"question": "Where do the three main stages of aerobic cellular respiration (glycolysis, Krebs cycle, and electron transport chain) occur within a eukaryotic cell?", "options": [{"text": "All three stages occur entirely within the cytoplasm.", "isCorrect": false, "rationale": "This is incorrect. Only glycolysis occurs in the cytoplasm. The Krebs cycle and ETC occur in the mitochondria."}, {"text": "Glycolysis in the cytoplasm, Krebs cycle in the mitochondrial matrix, and electron transport chain in the inner mitochondrial membrane.", "isCorrect": true, "rationale": "This is correct. The text states: 'Glycolysis occurs in the cytoplasm'; the 'Krebs cycle...takes place in the matrix...of the mitochondrion'; and 'The electron transport chain (ETC) is located in the inner membrane of the mitochondria'."}, {"text": "All three stages occur entirely within the nucleus.", "isCorrect": false, "rationale": "This is incorrect. No part of cellular respiration occurs in the nucleus."}, {"text": "Glycolysis in the mitochondria, Krebs cycle in the cytoplasm, and electron transport chain in the nucleus.", "isCorrect": false, "rationale": "This is incorrect. The locations are mismatched and incorrect according to the text."}]}, {"question": "What is the primary role of NADH and FADH2 in cellular respiration?", "options": [{"text": "They serve as direct energy sources, providing ATP for cellular activities.", "isCorrect": false, "rationale": "This is incorrect. NADH and FADH2 are electron carriers, not direct energy sources like ATP."}, {"text": "They transport carbon dioxide out of the cell for exhalation.", "isCorrect": false, "rationale": "This is incorrect. Carbon dioxide is a waste product, but NADH and FADH2 are involved in electron transport, not CO2 transport."}, {"text": "They deliver high-energy electrons to the electron transport chain to power ATP synthesis.", "isCorrect": true, "rationale": "This is correct. The text states: 'NADH and FADH2 (produced during glycolysis and the Krebs cycle) deliver their high-energy electrons to a chain of proteins in the inner mitochondrial membrane,' which then leads to ATP production."}, {"text": "They act as enzymes, catalyzing the breakdown of glucose during glycolysis.", "isCorrect": false, "rationale": "This is incorrect. NADH and FADH2 are coenzymes that carry electrons, not enzymes that catalyze reactions like glycolysis."}]}, {"question": "The approximate net ATP yield from one molecule of glucose through complete aerobic respiration is 36-38 ATP. Which stage contributes the *vast majority* of this ATP?", "options": [{"text": "Glycolysis, with a net gain of 2 ATP.", "isCorrect": false, "rationale": "This is incorrect. Glycolysis only produces a net of 2 ATP, which is a very small fraction of the total."}, {"text": "The conversion of pyruvate to acetyl-CoA, generating 4-6 ATP.", "isCorrect": false, "rationale": "This is incorrect. The conversion of pyruvate to acetyl-CoA does not directly produce ATP; it produces NADH which contributes electrons to the ETC later. Even considering indirect ATP from NADH, it's not the vast majority."}, {"text": "The Krebs cycle, with 2 ATP per glucose molecule.", "isCorrect": false, "rationale": "This is incorrect. The Krebs cycle directly produces 1 ATP per turn, meaning 2 ATP per glucose, which is a small amount of the total."}, {"text": "The electron transport chain, producing about 32-34 ATP.", "isCorrect": true, "rationale": "This is correct. The text explicitly states, 'The electron transport chain (ETC) is where the cell produces most of its ATP — about 32–34 of the total 36–38 ATP molecules from one glucose' and 'the ETC produces the vast majority of ATP — roughly 90% of the cell's total energy yield from glucose'."}]}, {"question": "Which of the following scenarios best exemplifies an application of fermentation as described in the text?", "options": [{"text": "A plant cell producing glucose through photosynthesis in the presence of sunlight.", "isCorrect": false, "rationale": "This describes photosynthesis, a process of energy storage, not fermentation or cellular respiration."}, {"text": "Yeast cells converting sugars into ethanol and carbon dioxide, causing bread to rise.", "isCorrect": true, "rationale": "This is correct. The text mentions 'Yeast cells perform alcoholic fermentation. This is the process used in baking (the CO2 makes bread rise) and in brewing,' which is a direct application of fermentation."}, {"text": "A human body maintaining a stable internal temperature through metabolic heat generation.", "isCorrect": false, "rationale": "This describes thermoregulation, a byproduct of overall metabolism, not a specific application of fermentation."}, {"text": "Bacteria utilizing oxygen to break down complex molecules into simpler forms for energy.", "isCorrect": false, "rationale": "This describes aerobic respiration in bacteria, which requires oxygen, whereas fermentation is an anaerobic pathway."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
