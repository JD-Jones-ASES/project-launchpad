<script>
var QUESTIONS = [{"question": "According to the text, what is the most comprehensive definition of our solar system?", "options": [{"text": "The Sun and the eight major planets that orbit it.", "isCorrect": false, "rationale": "This definition is too narrow as it omits dwarf planets, moons, asteroids, and comets, which are explicitly mentioned as parts of the solar system."}, {"text": "All celestial bodies that orbit the Sun, including eight planets, dwarf planets, moons, asteroids, comets, and meteoroids.", "isCorrect": true, "rationale": "The text defines the solar system as 'The Sun and all the objects that orbit it, including eight planets, dwarf planets, moons, asteroids, comets, and meteoroids,' making this the most comprehensive and accurate definition."}, {"text": "The Milky Way galaxy's central star, the Sun.", "isCorrect": false, "rationale": "This describes only the Sun, not the entire solar system. The Sun is the center of our solar system, but not the solar system itself."}, {"text": "A vast cloud of gas and dust from which the Sun formed 4.6 billion years ago.", "isCorrect": false, "rationale": "This describes a 'solar nebula,' which is the precursor to the solar system, not the solar system itself."}]}, {"question": "Which statement accurately differentiates the inner (terrestrial) planets from the outer (gas/ice giant) planets based on the provided text?", "options": [{"text": "Inner planets are primarily composed of hydrogen and helium, while outer planets have solid, rocky surfaces.", "isCorrect": false, "rationale": "This statement is incorrect. Inner planets have solid, rocky surfaces, and outer planets (gas/ice giants) are primarily composed of hydrogen, helium, and ices."}, {"text": "Outer planets are significantly smaller and have thin or no atmospheres, unlike the inner planets.", "isCorrect": false, "rationale": "This statement is incorrect. Outer planets are much larger than inner planets, and while some inner planets have thin atmospheres, Earth's is the densest, and outer planets have substantial hydrogen-helium atmospheres."}, {"text": "Inner planets generally have few or no moons, whereas outer planets are known for their large size and numerous icy moons and rings.", "isCorrect": true, "rationale": "The text states inner planets have 'Few or no moons' (Mercury: 0, Venus: 0, Earth: 1, Mars: 2) and outer planets are described as 'gas giants' or 'ice giants' that are very large (e.g., Jupiter) and have notable features like Saturn's rings, implying their overall larger scale and associated moons/rings."}, {"text": "Outer planets orbit within the asteroid belt, while inner planets are found beyond it.", "isCorrect": false, "rationale": "This statement is incorrect. The asteroid belt is located between Mars (an inner planet) and Jupiter (an outer planet), meaning inner planets are within it and outer planets are beyond it."}]}, {"question": "The text describes Venus as having the hottest surface of any planet due to an 'extreme greenhouse effect.' If Earth were to experience a similar atmospheric change, which of the following would be the most direct cause of a significant temperature increase, analogous to Venus?", "options": [{"text": "An increase in the planet's orbital speed around the Sun.", "isCorrect": false, "rationale": "While orbital speed can affect average temperature over time, the greenhouse effect specifically refers to atmospheric heat trapping, not orbital dynamics."}, {"text": "A substantial reduction in the amount of carbon dioxide in its atmosphere.", "isCorrect": false, "rationale": "A reduction in CO2 would likely decrease, not increase, the greenhouse effect and planetary temperature."}, {"text": "A significant increase in atmospheric gases that trap outgoing heat, such as carbon dioxide.", "isCorrect": true, "rationale": "The text explicitly states Venus's 'thick CO2 atmosphere traps heat far more efficiently than Earth's atmosphere,' directly linking high CO2 levels and heat trapping to the extreme greenhouse effect."}, {"text": "The development of a much thinner atmosphere, allowing more solar radiation to reach the surface.", "isCorrect": false, "rationale": "A thinner atmosphere typically leads to greater temperature extremes and less efficient heat retention, rather than an extreme, sustained surface heat like Venus's."}]}, {"question": "The asteroid belt is located between Mars and Jupiter. What does the text suggest is the primary reason why these rocky bodies never coalesced into a planet?", "options": [{"text": "The region was too cold for planetary formation to occur.", "isCorrect": false, "rationale": "While temperature gradients existed, the text attributes the lack of planetary formation in the asteroid belt to a different primary factor, not temperature preventing accumulation."}, {"text": "The powerful gravitational influence of Jupiter prevented them from accumulating.", "isCorrect": true, "rationale": "The text states asteroids 'are remnants of the early solar system that never accumulated into a planet, largely because of Jupiter's powerful gravitational influence.'"}, {"text": "They were too far from the Sun to receive enough heat to fuse into a larger body.", "isCorrect": false, "rationale": "Heat is crucial for some processes, but the text specifically points to Jupiter's gravity as the inhibitor for accretion into a full planet."}, {"text": "The asteroid belt is actually remnants of a planet that was destroyed by a collision.", "isCorrect": false, "rationale": "The text explicitly states they 'never accumulated into a planet,' contradicting the idea that they are remnants of a destroyed planet."}]}, {"question": "A scientist observes a newly discovered comet with a very long, highly elliptical orbit. As the comet approaches its perihelion (closest point to the Sun), what visible change would the scientist most likely observe, and why?", "options": [{"text": "The comet would become less luminous as its ices refreeze due to increased solar wind.", "isCorrect": false, "rationale": "The opposite would occur; increased solar radiation would cause ices to vaporize, making the comet brighter, not less luminous."}, {"text": "The comet would develop a glowing coma and tails that point away from the Sun, due to vaporizing ices.", "isCorrect": true, "rationale": "The text states, 'When a comet approaches the Sun, its ices vaporize, producing a glowing coma (head) and one or two tails that always point away from the Sun.'"}, {"text": "The comet would appear to speed up, but its tail would shorten and point directly towards the Sun.", "isCorrect": false, "rationale": "While the comet would speed up (Kepler's Law of Equal Areas), its tail would lengthen and *always point away* from the Sun, not towards it."}, {"text": "The comet's trajectory would become more circular as solar gravity pulls it into a more stable orbit.", "isCorrect": false, "rationale": "Kepler's Law of Ellipses states that planets and comets orbit in ellipses; the orbit does not become circular upon approaching the Sun."}]}, {"question": "Which characteristic is *essential* for a celestial body to be classified as a dwarf planet, according to the International Astronomical Union's reclassification mentioned in the text?", "options": [{"text": "It must be smaller than Earth's Moon.", "isCorrect": false, "rationale": "While many dwarf planets are smaller than Earth's Moon, the text does not specify this as a defining characteristic for classification; some dwarf planets (like Pluto) are larger."}, {"text": "It must have cleared the neighborhood around its orbit.", "isCorrect": false, "rationale": "This is a criterion for a full-fledged planet, not a dwarf planet. Dwarf planets specifically have *not* cleared their orbits."}, {"text": "It must orbit a planet, not the Sun directly.", "isCorrect": false, "rationale": "Dwarf planets, like planets, orbit the Sun directly. Bodies orbiting other planets are typically classified as moons."}, {"text": "It must be roughly spherical but has not cleared its orbital path of other debris.", "isCorrect": true, "rationale": "The text defines dwarf planets as 'bodies that orbit the Sun and are large enough to be roughly spherical but have not “cleared the neighborhood” of their orbits of other debris.'"}]}, {"question": "Imagine two newly discovered exoplanets, Planet X and Planet Y, orbiting the same star. Planet X is much closer to the star than Planet Y. Based on Kepler's Laws of Planetary Motion, which of the following is most likely true?", "options": [{"text": "Planet X will complete its orbit in a longer time than Planet Y.", "isCorrect": false, "rationale": "Kepler's Law of Periods states that planets farther from the Sun (or star) take longer to orbit. Therefore, Planet X, being closer, would take less time."}, {"text": "Planet Y will move faster in its orbit when it is farthest from the star.", "isCorrect": false, "rationale": "Kepler's Law of Equal Areas states that a planet moves *slower* when it is farther away from the Sun (or star)."}, {"text": "Planet X's orbit is perfectly circular, while Planet Y's is elliptical.", "isCorrect": false, "rationale": "Kepler's Law of Ellipses states that all planets orbit in ellipses, not perfect circles, regardless of their distance."}, {"text": "Planet X will have a shorter orbital period than Planet Y.", "isCorrect": true, "rationale": "Kepler's Law of Periods clearly states: 'Planets that are farther from the Sun take longer to complete one orbit.' Conversely, closer planets take less time, meaning Planet X will have a shorter orbital period."}]}, {"question": "According to the solar nebula hypothesis, what was the correct sequence of events that led to the formation of the Sun?", "options": [{"text": "Nuclear fusion ignited in the center, then the cloud began to spin faster, followed by flattening into a disk.", "isCorrect": false, "rationale": "Fusion ignites after the cloud has collapsed, spun, and flattened, making this order incorrect."}, {"text": "A vast cloud of gas and dust flattened into a rotating disk, then collapsed under gravity, and finally fusion began.", "isCorrect": false, "rationale": "The collapse under gravity happens *before* the flattening into a disk, making this order incorrect."}, {"text": "A vast cloud of gas and dust collapsed under gravity, then spun faster and flattened into a disk, and nuclear fusion ignited in the center.", "isCorrect": true, "rationale": "The text describes the sequence: 'a vast cloud of gas and dust (a nebula) began to collapse under its own gravity... As the cloud contracted: It began to spin faster... It flattened into a rotating disk... The center became hot enough for nuclear fusion to ignite — the Sun was born.'"}, {"text": "Particles in the outer disk accreted into planets, then the central region became hot enough for fusion, and finally the cloud collapsed.", "isCorrect": false, "rationale": "Accretion into planets and fusion occur *after* the initial cloud collapse and formation of the central Sun, making this order incorrect."}]}, {"question": "The 'Chemistry Connection' box explains that inner planets are rich in iron and silicates, while outer planets contain large amounts of water ice, methane, and ammonia. This chemical differentiation is a direct result of:", "options": [{"text": "The different types of stars that formed in the inner versus outer parts of the solar nebula.", "isCorrect": false, "rationale": "Only one star, the Sun, formed in the center of the solar nebula; there weren't different types of stars forming in different regions."}, {"text": "The varying melting points of elements and compounds at different distances from the young Sun.", "isCorrect": true, "rationale": "The text states: 'Near the Sun, only metals and rocks survived the heat, forming the rocky inner planets. Farther out, where temperatures were lower, ices could also accumulate, building the giant outer planets.' This directly links temperature (and thus melting points) to the chemical composition of the planets."}, {"text": "The impact of large asteroids preferentially hitting the inner planets.", "isCorrect": false, "rationale": "While impacts occurred, they are not presented as the primary cause for the fundamental chemical differentiation observed between inner and outer planets."}, {"text": "The unique gravitational forces exerted by the Sun on different planetary materials.", "isCorrect": false, "rationale": "While gravity shaped orbits and accretion, the *chemical composition* differentiation is specifically attributed to temperature gradients and the melting points of various materials, not just gravitational differences on materials."}]}, {"question": "The solar system formed approximately 4.6 billion years ago. What event is suggested in the text as a possible trigger for the initial collapse of the solar nebula?", "options": [{"text": "The powerful gravitational pull of the nascent Sun.", "isCorrect": false, "rationale": "The Sun itself formed *from* the collapsing nebula; its gravity could not have been the initial trigger for the nebula's collapse."}, {"text": "A nearby supernova explosion.", "isCorrect": true, "rationale": "The text states that the vast cloud of gas and dust 'began to collapse under its own gravity, possibly triggered by a nearby supernova explosion.'"}, {"text": "The accumulation of ice and dust particles.", "isCorrect": false, "rationale": "The accumulation (accretion) of particles into larger bodies occurred *after* the initial collapse and disk formation, not as a trigger for the collapse."}, {"text": "The ignition of nuclear fusion in the nebula's center.", "isCorrect": false, "rationale": "Nuclear fusion occurred in the center *after* the nebula had already collapsed and condensed sufficiently to form the Sun, not as the trigger for the initial collapse."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
