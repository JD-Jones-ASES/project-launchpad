    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 13, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the fundamental process of ionic bond formation?", "options": [{"text": "Two nonmetal atoms sharing electrons to achieve a stable octet.", "isCorrect": false, "rationale": "This describes covalent bonding, not ionic bonding, which involves electron transfer."}, {"text": "A metal atom transferring one or more electrons to a nonmetal atom, followed by electrostatic attraction between the resulting ions.", "isCorrect": true, "rationale": "Ionic bonds are characterized by the complete transfer of electrons from a metal (low electronegativity) to a nonmetal (high electronegativity), leading to the formation of oppositely charged ions that are then held together by electrostatic forces."}, {"text": "The electrostatic attraction between two neutral atoms without any electron transfer.", "isCorrect": false, "rationale": "Ionic bonds specifically involve the formation of charged ions (cations and anions) through electron transfer, and the attraction is between these charged particles, not neutral atoms."}, {"text": "The sharing of electrons between a positively charged ion (cation) and a negatively charged ion (anion).", "isCorrect": false, "rationale": "While it involves cations and anions, ionic bonds do not involve sharing electrons between them; instead, the bond is due to the electrostatic attraction *after* electron transfer has occurred."}]}, {"question": "During the formation of an ionic bond between a metal and a nonmetal, what is the typical outcome for the metal atom?", "options": [{"text": "It gains electrons and becomes an anion.", "isCorrect": false, "rationale": "The metal atom typically loses electrons, and gaining electrons would make it an anion, which is characteristic of the nonmetal atom."}, {"text": "It shares electrons with the nonmetal atom.", "isCorrect": false, "rationale": "Electron sharing is characteristic of covalent bonds, not ionic bonds, where electrons are transferred."}, {"text": "It loses electrons and becomes a cation.", "isCorrect": true, "rationale": "Metals have low ionization energy and tend to lose valence electrons to achieve a stable electron configuration, thereby becoming positively charged ions (cations)."}, {"text": "It maintains a neutral charge while attracting a nonmetal anion.", "isCorrect": false, "rationale": "For an ionic bond to form, the metal atom must become positively charged by losing electrons to create the electrostatic attraction with a nonmetal anion."}]}, {"question": "Given that Sodium (Na) has an electron configuration of 2, 8, 1, and Chlorine (Cl) has 2, 8, 7, what are the resulting ions and their electron configurations when these two elements form an ionic bond?", "options": [{"text": "Na+ (2, 8) and Cl- (2, 8, 8).", "isCorrect": true, "rationale": "Sodium (Na) loses its one valence electron to achieve a stable octet (like Neon), becoming Na+ with configuration 2, 8. Chlorine (Cl) gains that one electron to complete its octet (like Argon), becoming Cl- with configuration 2, 8, 8."}, {"text": "Na- (2, 8, 2) and Cl+ (2, 8, 6).", "isCorrect": false, "rationale": "This scenario incorrectly suggests sodium gains an electron and chlorine loses one, which is opposite to their electronegativity tendencies and octet rule fulfillment."}, {"text": "Na+ (2, 8) and Cl+ (2, 8, 6).", "isCorrect": false, "rationale": "This is incorrect because chlorine would gain an electron to become an anion, not lose one to become a cation. Both ions cannot be positive for an ionic bond."}, {"text": "Na (neutral) and Cl (neutral) forming a bond without ion formation.", "isCorrect": false, "rationale": "Ionic bonds are defined by the formation of ions through electron transfer and the subsequent attraction between these oppositely charged ions."}]}, {"question": "The term 'formula unit' is used to describe ionic compounds like NaCl instead of 'molecule.' What is the primary reason for this distinction?", "options": [{"text": "Ionic compounds are always found in the gaseous state, whereas molecules refer to liquids or solids.", "isCorrect": false, "rationale": "The state of matter is irrelevant to the definition of a formula unit. Ionic compounds are typically solids at room temperature."}, {"text": "Formula units represent the simplest ratio of ions within a continuous crystal lattice, not discrete, individual particles.", "isCorrect": true, "rationale": "Ionic compounds form extensive crystal lattices where ions are arranged in a repeating pattern, not as isolated, individual molecules. A formula unit simply indicates the lowest whole-number ratio of ions within that lattice."}, {"text": "Molecules can only be formed by covalent bonds, never ionic bonds.", "isCorrect": false, "rationale": "While molecules are indeed associated with covalent bonds, this option doesn't explain *why* ionic compounds specifically use 'formula unit' rather than 'molecule' for their structure."}, {"text": "Formula units indicate that the compound exists primarily as a solution, not a solid.", "isCorrect": false, "rationale": "Formula units describe the composition of ionic compounds whether they are solid, molten, or dissolved, not their primary state of existence."}]}, {"question": "The text states that 'each Na+ ion attracts Cl- ions from every direction, and each Cl- ion attracts Na+ ions from every direction.' This phenomenon is crucial for understanding which structural aspect of ionic compounds?", "options": [{"text": "Their high solubility in water.", "isCorrect": false, "rationale": "While related to properties, this statement primarily describes the forces that build the structure, not the mechanism of dissolution."}, {"text": "Their ability to conduct electricity when melted.", "isCorrect": false, "rationale": "This describes the *mobility* of ions in a melted state, not the fundamental reason why the solid structure forms as it does."}, {"text": "The formation of an enormous, three-dimensional crystal lattice rather than discrete, individual molecules.", "isCorrect": true, "rationale": "The omnidirectional attraction between ions leads to a vast, ordered arrangement of ions (a crystal lattice) where each ion is surrounded by oppositely charged ions, rather than forming small, individual molecular units."}, {"text": "Their characteristic hardness and brittleness.", "isCorrect": false, "rationale": "Hardness and brittleness are consequences of the rigid crystal lattice structure, but the statement itself explains *why* that lattice structure forms, not its mechanical properties directly."}]}, {"question": "Ionic compounds typically exhibit high melting and boiling points. What is the primary reason for this characteristic?", "options": [{"text": "The weak attractive forces between like-charged ions, which are easily overcome by heat.", "isCorrect": false, "rationale": "Ionic bonds are characterized by strong electrostatic attractions, and these attractions are between *oppositely* charged ions, not like-charged ions."}, {"text": "The vast number of covalent bonds that must be broken to allow the compound to melt or boil.", "isCorrect": false, "rationale": "Ionic compounds are formed by ionic bonds, not covalent bonds."}, {"text": "The strong electrostatic attractions between oppositely charged ions in the crystal lattice, which require a significant amount of energy to overcome.", "isCorrect": true, "rationale": "The ions in an ionic crystal lattice are held together by very strong electrostatic forces. A large amount of thermal energy is required to disrupt this extensive lattice structure and allow the ions to move freely in the liquid or gaseous state."}, {"text": "The ability of ions to move freely in the solid state, which facilitates energy absorption.", "isCorrect": false, "rationale": "In the solid state, ions are locked in place and cannot move freely. Their immobility is why they don't conduct electricity as solids."}]}, {"question": "Ionic crystals are described as being hard but brittle. If a strong force shifts one layer of ions, causing the crystal to shatter along clean planes, what is the underlying reason for this brittleness?", "options": [{"text": "The strong ionic bonds within the crystal lattice are easily broken by mechanical stress.", "isCorrect": false, "rationale": "Ionic bonds are very strong; the brittleness is not due to easy bond breakage, but rather to a specific consequence of lattice distortion."}, {"text": "The repulsion between like-charged ions that are brought into alignment by the shift in layers.", "isCorrect": true, "rationale": "When a layer of ions shifts, ions of the same charge can align, leading to strong electrostatic repulsion between these like-charged ions. This repulsion forces the crystal to cleave or shatter along those planes."}, {"text": "The attraction between oppositely charged ions becomes too strong, causing the crystal to fragment.", "isCorrect": false, "rationale": "Strong attraction holds the lattice together; it does not cause fragmentation upon physical stress."}, {"text": "The crystal loses its ability to conduct electricity, leading to structural instability.", "isCorrect": false, "rationale": "Electrical conductivity is a separate property and does not directly explain the mechanical property of brittleness upon impact."}]}, {"question": "Under what conditions would an ionic compound, like solid sodium chloride (table salt), be able to conduct electricity?", "options": [{"text": "Only when it is in its solid, crystalline state.", "isCorrect": false, "rationale": "In the solid state, the ions are locked in fixed positions within the crystal lattice and are not free to move and carry an electric charge."}, {"text": "When it is dissolved in water or melted, allowing the ions to move freely.", "isCorrect": true, "rationale": "For an ionic compound to conduct electricity, its ions must be mobile. This occurs when the compound is dissolved in a solvent like water (where water molecules separate the ions) or when it is heated to its melting point, allowing the ions to move freely in the liquid phase."}, {"text": "When it forms individual molecules in the gaseous state.", "isCorrect": false, "rationale": "Ionic compounds do not typically form individual molecules, and while ions might be free in a gaseous state, the primary conditions for conduction mentioned are dissolved or melted states."}, {"text": "Ionic compounds never conduct electricity because their electrons are tightly held within the ions.", "isCorrect": false, "rationale": "This is incorrect. While electrons are tightly held, the movement of the *ions themselves* is responsible for conductivity when they are free to move."}]}, {"question": "Why are many ionic compounds soluble in water?", "options": [{"text": "Water molecules are nonpolar and can easily slip past the ions in the lattice.", "isCorrect": false, "rationale": "Water molecules are polar, not nonpolar. Their polarity is key to their ability to dissolve ionic compounds."}, {"text": "Water molecules are polar and can surround and separate the individual ions from the crystal lattice.", "isCorrect": true, "rationale": "Polar water molecules are attracted to the charged ions in the crystal lattice. The positive end of water molecules attracts anions, and the negative end attracts cations, effectively pulling the ions out of the lattice and into solution."}, {"text": "Ionic compounds form new covalent bonds with water molecules, leading to dissolution.", "isCorrect": false, "rationale": "Ionic compounds dissolve by dissociating into ions, not by forming new covalent bonds with water molecules."}, {"text": "The high melting point of ionic compounds means they readily mix with water.", "isCorrect": false, "rationale": "Melting point is a measure of the energy required to break the lattice, not a direct cause of solubility in water."}]}, {"question": "The Earth Science Connection highlights that halite (NaCl) forms cubic crystals, while calcite (CaCO3) and fluorite (CaF2) have different crystal shapes. This difference in crystal shape among ionic minerals is primarily determined by:", "options": [{"text": "The varying solubility of these minerals in water.", "isCorrect": false, "rationale": "Solubility is a property influenced by the crystal structure and ion-water interactions, but it is not the primary determinant of the crystal shape itself."}, {"text": "The specific arrangement and packing of their constituent ions within their respective crystal lattices.", "isCorrect": true, "rationale": "The crystal shape is a direct macroscopic manifestation of the microscopic arrangement of ions in the crystal lattice. Different ions (size, charge, polyatomic nature) will pack together in distinct geometric patterns, leading to different overall crystal shapes."}, {"text": "The number of valence electrons shared between the metal and nonmetal atoms.", "isCorrect": false, "rationale": "Ionic bonds involve electron *transfer*, not sharing, and the number transferred forms the ions, but the overall packing of these ions dictates the crystal shape."}, {"text": "Whether the compound conducts electricity in its solid state.", "isCorrect": false, "rationale": "Electrical conductivity is a separate property related to ion mobility and does not determine the crystal's physical shape."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
