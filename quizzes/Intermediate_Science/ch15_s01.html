    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 15, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately describes the relationship between photosynthesis and cellular respiration in terms of energy flow?", "options": [{"text": "Photosynthesis creates new energy, while respiration destroys it.", "isCorrect": false, "rationale": "This statement is incorrect because energy is neither created nor destroyed, only transformed, as per the law of conservation of energy."}, {"text": "Photosynthesis captures solar energy and stores it as chemical energy in glucose, while respiration releases that stored chemical energy to produce ATP.", "isCorrect": true, "rationale": "This is correct. The text explicitly states that photosynthesis stores energy from the sun in glucose, and respiration breaks down glucose to release energy (ATP and heat)."}, {"text": "Both processes directly absorb light energy to form chemical bonds.", "isCorrect": false, "rationale": "This is incorrect. While photosynthesis absorbs light energy, cellular respiration releases energy by breaking bonds and does not directly use light."}, {"text": "Cellular respiration must occur before photosynthesis can begin.", "isCorrect": false, "rationale": "This is incorrect. Photosynthesis produces the glucose and oxygen that cellular respiration utilizes. They are essentially reverse processes in a cycle."}]}, {"question": "When the text states that 'The energy does not vanish inside the glucose molecule — it is stored in the chemical bonds between atoms,' what fundamental scientific principle is being demonstrated?", "options": [{"text": "The principle of atomic stability.", "isCorrect": false, "rationale": "While related to bond formation, the primary principle highlighted is not atomic stability itself, but the fate of energy."}, {"text": "The law of conservation of mass.", "isCorrect": false, "rationale": "The law of conservation of mass deals with matter, not the transformation or storage of energy."}, {"text": "The law of conservation of energy.", "isCorrect": true, "rationale": "This is correct. The statement emphasizes that energy is not destroyed but transformed and stored, which is a core tenet of the law of conservation of energy."}, {"text": "The concept of entropy.", "isCorrect": false, "rationale": "Entropy relates to the measure of disorder or randomness in a system, which is not the main concept being illustrated by energy storage in chemical bonds."}]}, {"question": "What is the primary consequence of the sun's energy heating Earth's surface unevenly, according to the 'Energy in the Atmosphere' section?", "options": [{"text": "It directly causes volcanic eruptions and seismic activity.", "isCorrect": false, "rationale": "Volcanic eruptions are driven by internal Earth processes, not directly by uneven solar heating of the surface."}, {"text": "It creates temperature differences, which lead to pressure differences, ultimately driving wind and weather systems.", "isCorrect": true, "rationale": "This is correct. The text explicitly states that 'unequal heating creates temperature differences, which create pressure differences, which drive wind.'"}, {"text": "It reverses the greenhouse effect, leading to planetary cooling.", "isCorrect": false, "rationale": "Uneven heating drives weather, but it does not reverse the greenhouse effect, which is a separate mechanism for planetary warming."}, {"text": "It causes all global ocean currents to cease movement.", "isCorrect": false, "rationale": "Uneven heating is a driver of ocean currents, but it does not cause them to cease. The statement is the opposite of reality."}]}, {"question": "Water plays a critical role in atmospheric energy transfer, particularly during storms. How does water primarily contribute to powering thunderstorms?", "options": [{"text": "Water vapor acts as a powerful greenhouse gas, trapping solar radiation to build heat.", "isCorrect": false, "rationale": "While water vapor is a greenhouse gas, its role in powering storms is more directly related to latent heat transfer, not just trapping solar radiation."}, {"text": "The friction of falling raindrops generates static electricity that fuels the storm.", "isCorrect": false, "rationale": "This is an incorrect explanation. Electricity in storms is generated through charge separation, not simply friction from falling drops."}, {"text": "Water absorbs energy (latent heat) during evaporation and releases that energy back into the atmosphere during condensation, powering storms.", "isCorrect": true, "rationale": "This is correct. The text states, 'When water evaporates, it absorbs energy (latent heat). When water vapor condenses into clouds and rain, it releases that energy back into the atmosphere, powering storms.'"}, {"text": "Ocean water currents transfer warm energy directly into storm systems.", "isCorrect": false, "rationale": "Ocean currents distribute heat globally, but the direct powering of individual thunderstorms is primarily through latent heat from the local water cycle, not bulk ocean current transfer to the storm itself."}]}, {"question": "From a chemical perspective, what is the primary reason that bond formation typically releases energy?", "options": [{"text": "Atoms always gain electrons during bond formation, increasing their energy.", "isCorrect": false, "rationale": "Atoms can gain, lose, or share electrons, and bond formation leads to a more stable, lower-energy state, not an increase in energy."}, {"text": "The bonded state represents a lower, more stable energy configuration for the atoms compared to their separated state.", "isCorrect": true, "rationale": "This is correct. The text explicitly states, 'the bonded state is lower in energy than the separated atoms' and that ions are 'more stable (lower energy) than the separate Na and Cl atoms.'"}, {"text": "Energy is destroyed during the process of forming chemical bonds.", "isCorrect": false, "rationale": "Energy cannot be destroyed; it is released as the system moves to a lower energy state, typically as heat or light."}, {"text": "Breaking existing bonds requires more energy than forming new ones.", "isCorrect": false, "rationale": "While true in some contexts, this statement does not explain why energy is *released* during bond formation itself. It describes a net energy change in a reaction."}]}, {"question": "In the context of chemical bond energy, how does photosynthesis effectively 'store' energy from the sun?", "options": [{"text": "It converts light energy into thermal energy that is then trapped within plant cells.", "isCorrect": false, "rationale": "Photosynthesis converts light energy into *chemical* energy, not primarily thermal energy for storage."}, {"text": "It creates new, stronger chemical bonds in glucose and oxygen that hold more potential energy than the bonds broken in CO2 and H2O.", "isCorrect": true, "rationale": "This is correct. The text explains that 'light energy breaks the bonds in H2O and CO2, and new bonds form in glucose and O2. The net result is that energy is stored in the glucose bonds.'"}, {"text": "It completely destroys the original bonds of CO2 and H2O, making the system energy-deficient.", "isCorrect": false, "rationale": "Bonds are broken and reformed, not destroyed in a way that makes the system energy-deficient; rather, energy is invested to create higher-energy bonds."}, {"text": "It transforms chemical energy into kinetic energy to power plant growth.", "isCorrect": false, "rationale": "Photosynthesis is about storing light energy as *chemical* energy, which then powers growth via respiration, not directly converting chemical to kinetic."}]}, {"question": "A roller coaster car accelerates down a hill, assuming negligible air resistance and friction. Which statement accurately applies the law of conservation of mechanical energy to this scenario?", "options": [{"text": "The car's kinetic energy is entirely converted into potential energy at the bottom of the hill.", "isCorrect": false, "rationale": "At the bottom of the hill, potential energy is at its minimum, and kinetic energy is at its maximum."}, {"text": "The sum of the car's kinetic and potential energy remains constant throughout its descent.", "isCorrect": true, "rationale": "This is correct. The text states, '$KE_i + PE_i = KE_f + PE_f$ (when no friction is present),' which means total mechanical energy is conserved."}, {"text": "The car's potential energy increases as it moves down the hill.", "isCorrect": false, "rationale": "Potential energy decreases as height decreases, so it would decrease as the car goes down the hill."}, {"text": "The total energy of the car gradually decreases as it moves.", "isCorrect": false, "rationale": "If friction is negligible, total mechanical energy is conserved. Total energy (including thermal) is always conserved, it never decreases overall."}]}, {"question": "When friction is present in a mechanical system, such as a car braking, what is the ultimate fate of the mechanical energy that is 'lost' from the system?", "options": [{"text": "It is completely destroyed, violating the law of conservation of energy.", "isCorrect": false, "rationale": "Energy is never destroyed; this violates the law of conservation of energy."}, {"text": "It is converted into chemical potential energy within the braking components.", "isCorrect": false, "rationale": "Friction primarily converts mechanical energy into thermal energy (heat), not chemical potential energy."}, {"text": "It is transformed into thermal energy (heat), warming the surroundings.", "isCorrect": true, "rationale": "This is correct. The text states, 'When friction is present, mechanical energy decreases but total energy (mechanical + thermal) remains constant. The 'lost' energy becomes heat.'"}, {"text": "It is reabsorbed by the system as gravitational potential energy.", "isCorrect": false, "rationale": "Friction's 'lost' energy becomes heat, it does not convert back into gravitational potential energy."}]}, {"question": "A student eats a sandwich for lunch, then goes for a run. Trace the general flow of energy from the sun to the kinetic energy of the student's running legs, identifying the primary transformation at each step.", "options": [{"text": "Solar radiant energy → Chemical energy (in plants) → Chemical energy (in sandwich) → Kinetic energy (running).", "isCorrect": true, "rationale": "This sequence correctly traces the energy flow: Sun's light energy is captured by plants (photosynthesis), the plant (or what eats it, like a grain in a sandwich) is consumed, and that chemical energy is then used by the body for movement (kinetic energy)."}, {"text": "Solar radiant energy → Thermal energy (atmosphere) → Kinetic energy (wind) → Kinetic energy (running).", "isCorrect": false, "rationale": "This sequence describes atmospheric energy flow, but the runner's energy comes from food, not directly from wind kinetic energy derived from solar heating of the atmosphere."}, {"text": "Chemical energy (in sun) → Light energy (from sun) → Gravitational potential energy (student standing) → Kinetic energy (running).", "isCorrect": false, "rationale": "The sun's primary energy is radiant, not chemical in this context. The student's energy for running comes from food, not directly from their standing potential energy."}, {"text": "Kinetic energy (solar flares) → Electrical energy (on Earth) → Chemical energy (muscles) → Kinetic energy (running).", "isCorrect": false, "rationale": "Solar flares are not the primary energy source for life on Earth in this context, and there is no widespread conversion of solar energy to electrical energy for biological processes."}]}, {"question": "The section emphasizes that 'energy flows like a river through every system in nature' and 'changes form constantly.' What fundamental truth about energy is highlighted as constant across all these transformations?", "options": [{"text": "Its ability to produce heat decreases over time.", "isCorrect": false, "rationale": "Energy transformations often produce heat, but the total energy's ability to produce heat is not diminishing; it's simply changing form."}, {"text": "It is eventually destroyed once it has been fully utilized by a system.", "isCorrect": false, "rationale": "The text explicitly states that energy 'never truly vanishes,' reinforcing the conservation principle."}, {"text": "It is always conserved, never appearing from nothing nor truly vanishing.", "isCorrect": true, "rationale": "This is correct. The text concludes by stating, 'It never appears from nothing, and it never truly vanishes,' which is the essence of energy conservation."}, {"text": "Its total quantity depends on the specific scientific branch through which it is flowing.", "isCorrect": false, "rationale": "The unifying principle is that energy conservation is universal across all branches of science, meaning its total quantity is not dependent on the branch."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
