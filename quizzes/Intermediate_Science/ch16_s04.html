        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 16, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In snapdragons, red flowers ($RR$) crossed with white flowers ($R'R'$) produce pink $F_1$ offspring ($RR'$). If two pink $F_1$ plants are crossed, what is the expected phenotypic ratio in the $F_2$ generation?", "options": [{"text": "3 Red : 1 White", "isCorrect": false, "rationale": "This ratio is typical for a monohybrid cross with complete dominance in the F2 generation, where the dominant phenotype is expressed over the recessive."}, {"text": "1 Red : 2 Pink : 1 White", "isCorrect": true, "rationale": "In incomplete dominance, the heterozygous phenotype is intermediate. Crossing two heterozygotes ($RR' \times RR'$) yields a 1:2:1 phenotypic ratio (1 homozygous dominant, 2 heterozygous, 1 homozygous recessive) which corresponds to 1 Red : 2 Pink : 1 White."}, {"text": "1 Pink : 1 Red", "isCorrect": false, "rationale": "This ratio would result from a test cross or specific crosses, but not from self-pollinating or interbreeding F1 pink snapdragons."}, {"text": "All Pink", "isCorrect": false, "rationale": "All pink offspring would be observed in the F1 generation when a red and a white parent are crossed, assuming incomplete dominance. The F2 generation from two pink parents will show segregation of alleles."}], "id": "q01"}, {"question": "A key difference between incomplete dominance and codominance is how the alleles are expressed in a heterozygote. Which statement accurately describes codominance?", "options": [{"text": "The heterozygous phenotype is an intermediate blend of the two homozygous phenotypes.", "isCorrect": false, "rationale": "This describes incomplete dominance, where the heterozygote shows a blended or intermediate phenotype, like pink snapdragons from red and white parents."}, {"text": "Both alleles are fully and simultaneously expressed, resulting in both phenotypes appearing.", "isCorrect": true, "rationale": "Codominance is characterized by the full and simultaneous expression of both alleles in the heterozygote, such as the AB blood type where both A and B antigens are present."}, {"text": "One allele completely masks the expression of the other allele.", "isCorrect": false, "rationale": "This describes complete dominance, where a dominant allele fully hides the expression of a recessive allele in the heterozygote."}, {"text": "Only one of the two alleles is expressed, and the other remains hidden.", "isCorrect": false, "rationale": "This statement describes complete dominance, where the recessive allele is not expressed in the presence of a dominant allele."}], "id": "q02"}, {"question": "The ABO blood group system in humans is an example of multiple alleles. What does the term 'multiple alleles' mean in this context?", "options": [{"text": "Many different genes contribute to a single phenotype like blood type.", "isCorrect": false, "rationale": "This describes polygenic inheritance, where multiple genes affect one trait, resulting in a continuous range of phenotypes, not discrete categories like blood types."}, {"text": "More than two different forms of an allele exist in the population for a single gene.", "isCorrect": true, "rationale": "Multiple alleles refers to the situation where a single gene has more than two possible allele forms (e.g., I^A, I^B, and i for blood type) within the population, though each individual only carries two."}, {"text": "A single gene can affect multiple, seemingly unrelated phenotypic traits.", "isCorrect": false, "rationale": "This describes pleiotropy, where one gene influences multiple distinct traits."}, {"text": "An individual inherits more than two alleles for a specific gene.", "isCorrect": false, "rationale": "While multiple alleles exist in the population, each diploid individual still inherits only two alleles for any given gene, one from each parent."}], "id": "q03"}, {"question": "Red-green color blindness is a sex-linked recessive disorder. Why are males significantly more likely to express this disorder than females?", "options": [{"text": "Males have a Y chromosome which carries the color blindness allele.", "isCorrect": false, "rationale": "The Y chromosome typically carries very few genes unrelated to sex determination; sex-linked disorders like color blindness are carried on the X chromosome."}, {"text": "Females have a dominant allele on one X chromosome that masks the recessive allele.", "isCorrect": false, "rationale": "While females can be carriers and have a dominant allele mask a recessive one, this statement explains why females *might not* express the trait, not why males *are more likely* to express it."}, {"text": "Males only have one X chromosome, so a single recessive allele on it will be expressed.", "isCorrect": true, "rationale": "Because males (XY) have only one X chromosome, they lack a second X chromosome to carry a dominant allele that could mask a recessive allele present on their single X. Therefore, any recessive allele on their X chromosome will be expressed."}, {"text": "The color blindness gene is activated only in the presence of male hormones.", "isCorrect": false, "rationale": "The expression of sex-linked traits is due to chromosome dosage, specifically the number of X chromosomes, not hormonal activation of the gene itself."}], "id": "q04"}, {"question": "Which of the following human traits is most likely to be an example of polygenic inheritance, based on the description in the text?", "options": [{"text": "ABO blood type, with distinct A, B, AB, and O categories.", "isCorrect": false, "rationale": "ABO blood type is an example of multiple alleles and codominance, controlled by a single gene with multiple forms, leading to distinct categories rather than a continuous range."}, {"text": "The presence or absence of a genetic disorder like cystic fibrosis.", "isCorrect": false, "rationale": "Cystic fibrosis is described as an autosomal recessive disorder caused by a mutation in a single gene (CFTR), not multiple genes."}, {"text": "Height, which shows a wide range of variation among individuals.", "isCorrect": true, "rationale": "The text explicitly states that human height is influenced by hundreds of genes, each contributing a small amount, resulting in a continuous range of phenotypes, which is characteristic of polygenic inheritance."}, {"text": "Red or white flower color in pea plants, following simple dominant/recessive rules.", "isCorrect": false, "rationale": "Pea plant flower color typically follows simple Mendelian inheritance (complete dominance), controlled by a single gene, not many genes working together."}], "id": "q05"}, {"question": "In a pedigree analysis, geneticists observe that two unaffected parents have an affected child. What conclusion can immediately be drawn about the inheritance pattern of the trait?", "options": [{"text": "The trait must be dominant.", "isCorrect": false, "rationale": "If the trait were dominant, at least one of the parents would have to express the trait to pass it on to their child. Unaffected parents cannot have an affected child with a dominant trait."}, {"text": "The trait must be recessive.", "isCorrect": true, "rationale": "This is a hallmark of recessive inheritance. For two unaffected parents to have an affected child, both parents must be heterozygous carriers of the recessive allele, each passing one copy to their child."}, {"text": "The trait is sex-linked dominant.", "isCorrect": false, "rationale": "Similar to autosomal dominant, an affected child with a sex-linked dominant trait would require at least one affected parent (the father for a daughter, or mother for either sex)."}, {"text": "The trait is sex-linked recessive.", "isCorrect": false, "rationale": "While sex-linked recessive traits can show skipping generations, the primary conclusion from 'unaffected parents having an affected child' (regardless of sex-linkage) is that the trait is recessive. The rule given in the text is specific about recessive traits."}], "id": "q06"}, {"question": "Sickle cell disease and cystic fibrosis are both described as genetic disorders. What is a key commonality in their inheritance pattern as presented in the text?", "options": [{"text": "Both are caused by dominant alleles.", "isCorrect": false, "rationale": "The text explicitly states that both sickle cell disease and cystic fibrosis are autosomal recessive disorders, meaning two copies of the mutant allele are needed for the disorder to be expressed."}, {"text": "Both are sex-linked disorders, primarily affecting males.", "isCorrect": false, "rationale": "The text clearly identifies both disorders as autosomal recessive, meaning the genes are located on non-sex chromosomes, and not primarily affecting one sex due to sex linkage."}, {"text": "Both are autosomal recessive disorders, requiring two copies of the mutant allele for expression.", "isCorrect": true, "rationale": "The text explicitly states that both sickle cell disease and cystic fibrosis are autosomal recessive disorders, requiring two copies of the mutant allele to be expressed."}, {"text": "Individuals who are carriers for either disorder exhibit a resistance to malaria.", "isCorrect": false, "rationale": "While carriers of the sickle cell allele have some resistance to malaria, the text does not mention any such resistance for cystic fibrosis carriers."}], "id": "q07"}, {"question": "Rosalind Franklin's 'Photo 51' was crucial for the discovery of the DNA double helix. What specific information did her X-ray diffraction images primarily reveal about DNA?", "options": [{"text": "The precise sequence of nitrogenous bases in the DNA molecule.", "isCorrect": false, "rationale": "X-ray diffraction is used to determine the three-dimensional structure of molecules, not the specific sequence of their constituent units like nitrogenous bases."}, {"text": "The helical structure of DNA.", "isCorrect": true, "rationale": "Rosalind Franklin's X-ray diffraction images, particularly 'Photo 51,' provided clear evidence of DNA's helical shape, which was essential for Watson and Crick to build their double helix model."}, {"text": "That DNA replication occurs semi-conservatively.", "isCorrect": false, "rationale": "The semi-conservative nature of DNA replication was later demonstrated by Meselson and Stahl, using isotopic labeling experiments, not X-ray diffraction."}, {"text": "The existence of genes on chromosomes.", "isCorrect": false, "rationale": "The concept of genes on chromosomes was established well before Franklin's work on DNA structure, through the work of early geneticists like Sutton and Boveri, and later Morgan."}], "id": "q08"}, {"question": "In the simulated genetics lab using coin flips to model a $Bb \times Bb$ cross, why are pooled class results expected to be closer to the predicted Punnett square ratios than the results from a single student group?", "options": [{"text": "Individual groups may intentionally manipulate their coin flips.", "isCorrect": false, "rationale": "The simulation assumes random coin flips, and any intentional manipulation would introduce bias, making results less representative, not more."}, {"text": "A larger sample size reduces the impact of random chance and sampling error.", "isCorrect": true, "rationale": "As explicitly stated in the 'Expected Results' section of the lab, a larger sample size (pooled class data) averages out random variations from individual trials, providing a more accurate approximation of the theoretical probabilities and predicted ratios."}, {"text": "Class results are averaged, which inherently makes them more accurate.", "isCorrect": false, "rationale": "While averaging is part of pooling, the accuracy comes from the *quantity* of data being averaged (the larger sample size), not merely the act of averaging small numbers of trials."}, {"text": "Each coin in the class represents a different allele, leading to more diverse outcomes.", "isCorrect": false, "rationale": "In this specific simulation, all coins (heads for dominant, tails for recessive) represent the same alleles ($B$ and $b$) and the same heterozygous parents ($Bb$). Diversity of outcome comes from random chance, not differing allele representations per coin."}], "id": "q09"}, {"question": "The section 'Beyond Mendel' introduces several inheritance patterns that differ from Mendel's original observations. What is the overarching reason these patterns are considered 'beyond Mendel'?", "options": [{"text": "They only occur in animals, whereas Mendel studied plants.", "isCorrect": false, "rationale": "Many examples discussed, such as snapdragon flower color, occur in plants, and the principles apply across diverse organisms, not exclusively to animals."}, {"text": "They show that traits can be influenced by environmental factors.", "isCorrect": false, "rationale": "While environmental factors are mentioned (e.g., for height), the primary focus of 'Beyond Mendel' is on genetic mechanisms that go beyond simple dominant/recessive allele interactions, not solely environmental influence."}, {"text": "They demonstrate that many traits do not follow simple dominant/recessive patterns.", "isCorrect": true, "rationale": "The introduction explicitly states, 'Many traits do not follow simple dominant/recessive patterns,' which is the core theme of the section, covering incomplete dominance, codominance, polygenic inheritance, and sex-linked traits where the rules are more complex."}, {"text": "They involve genes located on chromosomes other than autosomes.", "isCorrect": false, "rationale": "While sex-linked traits (on sex chromosomes) are discussed, other 'beyond Mendel' patterns like incomplete dominance, codominance, and polygenic inheritance can involve genes on autosomes. The scope is broader than just chromosome location."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
