    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does the text describe the fundamental principle of how specialized cells contribute to the complexity of an organism?", "options": [{"text": "Individual specialized cells perform all necessary functions independently.", "isCorrect": false, "rationale": "The text explicitly states that 'specialized cells do not work alone' and that a 'single cell, no matter how specialized, cannot perform all the functions an organism needs to survive.'"}, {"text": "Cells group together, layer upon layer, into increasingly complex structures, with each level building on the one below it.", "isCorrect": true, "rationale": "This statement directly reflects the 'key idea' presented in the introduction: 'They group together, layer upon layer, into increasingly complex structures, each level building on the one below it.'"}, {"text": "Organisms primarily achieve complexity through increasing the number of unspecialized cells.", "isCorrect": false, "rationale": "The text emphasizes the role of 'specialized cells' and their organization, not an increase in unspecialized cells."}, {"text": "Complexity is achieved by random aggregation of different cell types.", "isCorrect": false, "rationale": "The text describes a highly organized and structured process of cells grouping into tissues, organs, and systems, which is not random aggregation."}], "id": "q01"}, {"question": "A single specialized cell, such as a neuron, cannot perform all functions an organism needs to survive. Based on the text, what is the primary reason for this limitation and how is it overcome?", "options": [{"text": "Cells lack the necessary internal structures to perform diverse tasks; they are overcome by forming organ systems.", "isCorrect": false, "rationale": "The text states that 'each cell type has a structure tailored to a specific function,' implying they *do* have necessary structures for their specific task, but not all tasks. Organ systems are a higher level of organization, not the immediate solution for cells working alone."}, {"text": "Cells are too small to carry out complex processes; this is overcome by increasing cell size.", "isCorrect": false, "rationale": "The text does not mention cell size as the primary limitation for carrying out all functions, nor increasing cell size as the solution."}, {"text": "Each cell type is tailored to a specific function, requiring cells to work together in organized groups to accomplish complex tasks.", "isCorrect": true, "rationale": "The text explains, 'each cell type has a structure tailored to a specific function' and 'To accomplish complex tasks, cells must work together in organized groups.'"}, {"text": "Single cells are too fragile to survive on their own; they overcome this by developing protective outer layers.", "isCorrect": false, "rationale": "While cells do have protective features, the text focuses on the functional limitation of a single specialized cell to perform *all* necessary tasks, rather than mere fragility."}], "id": "q02"}, {"question": "A researcher observes a tissue sample where cells are widely separated by a non-living extracellular matrix that is hard and contains calcium compounds. Which type of tissue is this researcher most likely observing?", "options": [{"text": "Epithelial tissue", "isCorrect": false, "rationale": "Epithelial cells are characterized by being 'tightly packed with very little space between them, forming continuous sheets,' which contradicts the observation of widely separated cells and a matrix."}, {"text": "Muscle tissue", "isCorrect": false, "rationale": "Muscle tissue is specialized for contraction and is not characterized by widely separated cells within a hard, calcium-rich matrix."}, {"text": "Connective tissue", "isCorrect": true, "rationale": "The text describes connective tissue cells as 'often widely separated by a non-living material called the extracellular matrix,' and specifically lists 'bone (hard matrix of calcium compounds)' as an example."}, {"text": "Nervous tissue", "isCorrect": false, "rationale": "Nervous tissue transmits electrical signals and consists of neurons and glial cells; it does not fit the description of cells widely separated by a hard, calcium-rich matrix."}], "id": "q03"}, {"question": "The text describes the heart as an organ composed of all four tissue types working in concert. If the nervous tissue in the heart were to malfunction, which of the following functions would be most directly impaired based on the text's description?", "options": [{"text": "The structural strength of the heart wall.", "isCorrect": false, "rationale": "The text attributes 'structural strength' to connective tissue in the heart."}, {"text": "The smooth inner surface for blood flow.", "isCorrect": false, "rationale": "This function is attributed to epithelial tissue lining the heart."}, {"text": "The ability of the heart muscle to contract and pump blood.", "isCorrect": false, "rationale": "Cardiac muscle tissue is responsible for pumping, but nervous tissue *regulates* this function, it doesn't perform the contraction itself."}, {"text": "The regulation of the rate and rhythm of heart contractions.", "isCorrect": true, "rationale": "The text specifically states that nervous tissue in the heart is 'regulated by nervous tissue (to control the rate and rhythm of contractions).'"}], "id": "q04"}, {"question": "Which of the following statements accurately highlights a key difference between epithelial tissue and connective tissue, as described in the text?", "options": [{"text": "Epithelial tissue is specialized for contraction, while connective tissue transmits electrical signals.", "isCorrect": false, "rationale": "Muscle tissue is specialized for contraction, and nervous tissue transmits electrical signals. This statement incorrectly assigns these functions."}, {"text": "Epithelial tissue cells are tightly packed, forming continuous sheets, whereas connective tissue cells are often widely separated by an extracellular matrix.", "isCorrect": true, "rationale": "The text states 'Epithelial cells are tightly packed with very little space between them, forming continuous sheets' and 'connective tissue cells are often widely separated by a non-living material called the extracellular matrix.'"}, {"text": "Connective tissue primarily forms protective barriers, while epithelial tissue supports and binds other tissues.", "isCorrect": false, "rationale": "This statement reverses the primary functions described: epithelial tissue forms protective barriers, while connective tissue supports and binds."}, {"text": "Connective tissue is always voluntary, while epithelial tissue is always involuntary.", "isCorrect": false, "rationale": "Voluntary/involuntary characteristics apply to muscle tissue, not generally to connective or epithelial tissue."}], "id": "q05"}, {"question": "A biopsy from the wall of a blood vessel reveals involuntary, non-striated muscle cells. Based on this information and the text, what type of muscle tissue is most likely present?", "options": [{"text": "Skeletal muscle", "isCorrect": false, "rationale": "Skeletal muscle is described as 'voluntary, striated,' which contradicts the biopsy findings."}, {"text": "Cardiac muscle", "isCorrect": false, "rationale": "Cardiac muscle is described as 'involuntary, striated,' but the biopsy indicates non-striated."}, {"text": "Smooth muscle", "isCorrect": true, "rationale": "Smooth muscle is described as 'involuntary, found in organ walls like the stomach and blood vessels.' While 'non-striated' isn't explicitly stated for smooth muscle, it's implied by the contrast with the 'striated' descriptions for skeletal and cardiac muscle, and its location matches."}, {"text": "Nervous tissue", "isCorrect": false, "rationale": "Nervous tissue is not a type of muscle tissue."}], "id": "q06"}, {"question": "A student is asked to classify the brain and the entire digestive tract (including stomach, intestines, liver, etc.). How would these be correctly categorized according to the levels of organization described?", "options": [{"text": "Both are organs because they perform specific functions.", "isCorrect": false, "rationale": "While the brain is an organ, the digestive tract, comprising multiple organs working together, is an organ system."}, {"text": "The brain is an organ, while the digestive tract is an organ system.", "isCorrect": true, "rationale": "The text lists 'brain' as an example of an organ and explicitly states the 'digestive system, for example, includes the mouth, esophagus, stomach, small intestine, large intestine, liver, pancreas, and gallbladder — all working in sequence to break down food, absorb nutrients, and eliminate waste,' defining it as an organ system."}, {"text": "Both are organ systems because they involve multiple parts.", "isCorrect": false, "rationale": "The brain is explicitly listed as an 'organ,' which is defined as a structure composed of two or more tissue types, not a group of organs."}, {"text": "The brain is a tissue, and the digestive tract is an organ.", "isCorrect": false, "rationale": "The brain is an organ (made of nervous tissue, among others), not a tissue itself. The digestive tract is an organ system, not a single organ."}], "id": "q07"}, {"question": "The text emphasizes that organ systems do not operate in isolation but constantly interact. Which of the following best exemplifies this interdependence based on the provided examples?", "options": [{"text": "Epithelial cells lining the mouth forming a protective barrier.", "isCorrect": false, "rationale": "This describes a function at the tissue level, not the interaction between different organ systems."}, {"text": "Bone tissue providing a hard matrix for structural support.", "isCorrect": false, "rationale": "This describes a characteristic and function of a specific tissue type, not an interaction between organ systems."}, {"text": "The circulatory system delivering oxygen absorbed by the respiratory system.", "isCorrect": true, "rationale": "This is a direct example given in the text: 'The circulatory system delivers oxygen absorbed by the respiratory system,' illustrating the interdependence of two major organ systems."}, {"text": "A single neuron transmitting an electrical signal.", "isCorrect": false, "rationale": "This describes a function at the cellular/tissue level within the nervous system, not an interaction between different organ systems."}], "id": "q08"}, {"question": "At the level of the complete organism, the text states that 'emergent properties' like consciousness and movement arise. What does this concept primarily imply?", "options": [{"text": "That these properties are inherent to individual specialized cells.", "isCorrect": false, "rationale": "The text explicitly states that emergent properties 'do not exist at the level of individual cells or tissues' but arise from interactions among organ systems."}, {"text": "That these capabilities exist in a single tissue type but are enhanced by others.", "isCorrect": false, "rationale": "Emergent properties are described as arising from the 'interactions among organ systems,' a much higher level than a single tissue type."}, {"text": "That the organism is simply the sum of its individual parts and functions.", "isCorrect": false, "rationale": "The text directly contradicts this by stating 'the organism is more than the sum of its parts' when discussing emergent properties."}, {"text": "That capabilities not present at lower levels of organization appear due to the complex interactions of all organ systems.", "isCorrect": true, "rationale": "The text defines emergent properties as 'capabilities like consciousness, movement, and growth — that do not exist at the level of individual cells or tissues' but are produced by 'The interactions among organ systems.'"}], "id": "q09"}, {"question": "The 'Think Deeper' section discusses advantages and disadvantages of multicellular organization. One disadvantage highlighted is the greater vulnerability to system-wide failure. How does the text explain this vulnerability within the context of the levels of organization?", "options": [{"text": "Individual cells in multicellular organisms lose their ability to survive independently.", "isCorrect": false, "rationale": "While cells in a multicellular organism are highly specialized and interdependent, the text's explanation of 'system-wide failure' focuses on the breakdown of the hierarchical structure, not primarily on individual cell's lost independence."}, {"text": "The efficiency gained by cell specialization makes organisms less adaptable to changing environments.", "isCorrect": false, "rationale": "Efficiency is presented as an advantage, not a disadvantage linked to system-wide failure. Adaptability is not the direct focus of the vulnerability explanation."}, {"text": "If a critical organ system fails, the organism cannot survive because each level depends on the proper functioning of the levels beneath it.", "isCorrect": true, "rationale": "The 'Hierarchy Interdependence' section explicitly states: 'If cells malfunction, tissues fail. If tissues fail, organs stop working. If organs stop working, the organ system breaks down. And if a critical organ system fails, the organism cannot survive.' This directly explains the system-wide vulnerability."}, {"text": "Multicellular organisms require more complex communication systems, which are prone to errors.", "isCorrect": false, "rationale": "While complex communication is a feature, the text's specific explanation for 'system-wide failure' focuses on the breakdown of the established hierarchy itself, rather than communication errors as the primary cause."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
