        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 18, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary advantage of using a chemical equation instead of a word equation to describe a chemical reaction?", "options": [{"text": "It simplifies complex balancing procedures by automatically adjusting coefficients.", "isCorrect": false, "rationale": "Chemical equations require a separate balancing step; they do not automatically adjust coefficients."}, {"text": "It provides a concise and universally understood representation of a chemical reaction.", "isCorrect": true, "rationale": "The text states that chemical equations communicate information 'in a fraction of the space — and it works in every language,' making them concise and universal."}, {"text": "It allows for a detailed narrative description of the experimental setup and conditions.", "isCorrect": false, "rationale": "While experimental conditions are important, they are typically described separately or indicated by specific notations (like temperature), not by the core structure of a chemical equation itself, which focuses on reactants and products."}, {"text": "It automatically predicts the exact quantity of products formed without needing further calculations.", "isCorrect": false, "rationale": "Chemical equations represent the stoichiometry, but predicting exact quantities (yields) often requires additional calculations based on reactant amounts."}]}, {"question": "In the chemical equation $CH4(g) + 2O2(g) \\rightarrow CO2(g) + 2H2O(g)$, which substances represent the reactants?", "options": [{"text": "$CO2(g)$ and $H2O(g)$", "isCorrect": false, "rationale": "The text defines products as substances formed as a result of a chemical reaction, written on the right side of the equation arrow. $CO2(g)$ and $H2O(g)$ are on the right, making them products."}, {"text": "$CH4(g)$ and $O2(g)$", "isCorrect": true, "rationale": "The text defines reactants as substances that enter into and are consumed in a chemical reaction, written on the left side of the equation arrow. $CH4(g)$ and $O2(g)$ are on the left, making them reactants."}, {"text": "Only $CH4(g)$", "isCorrect": false, "rationale": "$CH4(g)$ is a reactant, but $O2(g)$ is also a reactant in this equation, as indicated by the '+' sign separating them on the left side."}, {"text": "Only $H2O(g)$", "isCorrect": false, "rationale": "$H2O(g)$ is a product, not a reactant, as it is found on the right side of the equation arrow."}]}, {"question": "If a chemical equation shows $NaCl(aq)$ as a substance, what does the (aq) symbol specifically indicate about the sodium chloride?", "options": [{"text": "It is in a solid crystalline state.", "isCorrect": false, "rationale": "The symbol (s) indicates a solid state."}, {"text": "It is a gas at room temperature.", "isCorrect": false, "rationale": "The symbol (g) indicates a gaseous state."}, {"text": "It is dissolved in water.", "isCorrect": true, "rationale": "The text explicitly defines (aq) as 'aqueous (dissolved in water).'"}, {"text": "It is a pure liquid.", "isCorrect": false, "rationale": "The symbol (l) indicates a pure liquid state."}]}, {"question": "In the equation $2H2(g) + O2(g) \\rightarrow 2H2O(l)$, what is the meaning of the coefficient '2' placed in front of $H2O(l)$?", "options": [{"text": "It indicates that there are two different types of atoms (hydrogen and oxygen) in the water molecule.", "isCorrect": false, "rationale": "The chemical formula $H2O$ itself indicates the types of atoms present. The coefficient relates to the number of units of that substance."}, {"text": "It specifies that water is a diatomic molecule.", "isCorrect": false, "rationale": "Water ($H2O$) is not a diatomic molecule; it consists of three atoms. Diatomic molecules are elements like $H2$ or $O2$."}, {"text": "It signifies that two units (molecules) of water are produced for every reaction cycle.", "isCorrect": true, "rationale": "The text defines coefficients as 'Numbers placed before a formula to indicate how many units of that substance participate.'"}, {"text": "It refers to the physical state of water, implying it's a gas that has condensed into a liquid.", "isCorrect": false, "rationale": "The physical state is indicated by the parenthetical symbol (l), which means liquid. The coefficient relates to quantity, not state change."}]}, {"question": "Based on the text, what are the correct interpretations of the '$+$' sign and the '$\\rightarrow$' arrow in a chemical equation?", "options": [{"text": "The '$+$' sign means 'combines with,' and the '$\\rightarrow$' arrow means 'is equal to.'", "isCorrect": false, "rationale": "The text explicitly states the arrow means 'yields' or 'produces,' not 'is equal to.'"}, {"text": "The '$+$' sign means 'or,' and the '$\\rightarrow$' arrow means 'changes into.'", "isCorrect": false, "rationale": "The text states the '+' sign is read as 'and,' not 'or.'"}, {"text": "The '$+$' sign means 'and,' and the '$\\rightarrow$' arrow means 'produces.'", "isCorrect": true, "rationale": "The text states the '+' sign 'Separates multiple reactants or multiple products (read as 'and')' and the arrow '$\\rightarrow$' is 'Read as “yields” or “produces.”'"}, {"text": "The '$+$' sign indicates a positive charge, and the '$\\rightarrow$' arrow indicates a reversible reaction.", "isCorrect": false, "rationale": "The '+' sign in a chemical equation indicates combination or separation of substances, not charge. A reversible reaction uses a double-headed arrow, not a single one."}]}, {"question": "Why is it crucial to represent elements like oxygen as $O2$ instead of $O$ when writing a chemical equation for its reaction under standard conditions?", "options": [{"text": "$O$ represents an oxygen ion, which is different from a neutral oxygen atom.", "isCorrect": false, "rationale": "$O$ can represent a neutral oxygen atom. The key issue is its natural molecular form."}, {"text": "$O2$ indicates that oxygen is in its gaseous state, while $O$ could imply a solid form.", "isCorrect": false, "rationale": "The physical state (gas, solid) is indicated by state symbols like (g) or (s), not by the subscript number in the formula."}, {"text": "Oxygen naturally exists as diatomic molecules ($O2$) under standard conditions, and misrepresenting it as $O$ would lead to an incorrect equation and balancing.", "isCorrect": true, "rationale": "The 'Think Deeper' section explains that writing H instead of H2 'would misrepresent the actual reactant and lead to incorrect balancing.' This applies equally to other diatomic elements like oxygen."}, {"text": "The coefficient '2' for $O$ is always implied, so $O2$ is simply a more formal way to write it.", "isCorrect": false, "rationale": "The '2' in $O2$ is a subscript, indicating two atoms bonded together in a molecule, not a coefficient. A coefficient of '1' is implied when not written, but not a '2' for a subscript."}]}, {"question": "A student is writing a chemical equation for a reaction. After identifying the reactants and products and writing them out in words, what is the next logical step according to the three-step process described in the text?", "options": [{"text": "Adjust the coefficients to ensure the number of each type of atom is the same on both sides.", "isCorrect": false, "rationale": "Balancing the equation by adjusting coefficients is the third step in the process."}, {"text": "Replace the words with the correct chemical formulas for each substance, including state symbols.", "isCorrect": true, "rationale": "The text outlines the second step as 'Replace words with formulas,' explicitly stating 'Use the correct chemical formula for each substance' and showing state symbols like (g) and (l) being added."}, {"text": "Perform the experiment to confirm the products formed.", "isCorrect": false, "rationale": "This step is about writing the theoretical equation, not performing the experiment itself."}, {"text": "Draw a diagram of the molecular structure of each substance.", "isCorrect": false, "rationale": "While understanding molecular structure is important in chemistry, it is not listed as a direct step in writing a chemical equation in this section."}]}, {"question": "If you are writing a chemical equation for the reaction of nitrogen gas with hydrogen gas to produce ammonia ($NH3$), what would be the correct initial representation of the reactants before balancing the equation?", "options": [{"text": "$N(g) + H(g)$", "isCorrect": false, "rationale": "Both nitrogen and hydrogen exist as diatomic molecules ($N2$ and $H2$) under standard conditions, so representing them as single atoms is incorrect."}, {"text": "$N2(g) + H2(g)$", "isCorrect": true, "rationale": "The text lists $N2$ and $H2$ as diatomic molecules, meaning they naturally occur as pairs of atoms. The (g) state symbol is also appropriate for gases."}, {"text": "$N2(g) + H(g)$", "isCorrect": false, "rationale": "While $N2(g)$ is correct for nitrogen gas, hydrogen gas also exists as a diatomic molecule, $H2(g)$, not $H(g)$."}, {"text": "$2N(g) + 2H(g)$", "isCorrect": false, "rationale": "The coefficients '2' here would indicate two separate atoms of N and H, which is incorrect for their natural molecular forms. The diatomic nature is indicated by a subscript '2', not a coefficient."}]}, {"question": "An inexperienced chemist writes 'H(g)' instead of 'H2(g)' in a chemical equation involving hydrogen gas. Based on the 'Think Deeper' section, what is the most significant problem this mistake creates?", "options": [{"text": "It incorrectly implies that hydrogen is a noble gas, which does not form molecules.", "isCorrect": false, "rationale": "Hydrogen is not a noble gas, and its natural molecular form is $H2$, not a single atom."}, {"text": "It suggests hydrogen is dissolved in water, which is indicated by the (aq) state symbol.", "isCorrect": false, "rationale": "The (g) symbol indicates a gas, not an aqueous solution. The mistake lies in the chemical formula itself."}, {"text": "It misrepresents the actual form of the reactant and makes accurate balancing of the equation impossible.", "isCorrect": true, "rationale": "The 'Think Deeper' guidance explicitly states, 'Writing H would misrepresent the actual reactant and lead to incorrect balancing,' because hydrogen atoms do not normally exist alone under standard conditions."}, {"text": "It signifies a solid form of hydrogen, rather than its gaseous form.", "isCorrect": false, "rationale": "The (g) symbol correctly indicates a gas. The error is in writing H instead of H2."}]}, {"question": "Consider the following chemical equation: $2Fe(s) + 3Cl2(g) \\rightarrow 2FeCl3(s)$. Which statement accurately identifies components or characteristics of this equation?", "options": [{"text": "$FeCl3$ is a reactant, and the '2' in front of $Fe$ is a subscript indicating two iron atoms.", "isCorrect": false, "rationale": "$FeCl3$ is a product (on the right side), and the '2' in front of $Fe$ is a coefficient, not a subscript."}, {"text": "$Cl2$ is a diatomic molecule reactant, and $(s)$ indicates a solid state for $Fe$.", "isCorrect": true, "rationale": "The text lists $Cl2$ as a diatomic molecule, and $Fe$ is on the left (reactant). The (s) symbol after $Fe$ correctly indicates a solid state."}, {"text": "The arrow '$\\rightarrow$' means 'is equal to,' and $Fe$ is a product.", "isCorrect": false, "rationale": "The arrow means 'yields' or 'produces,' not 'is equal to,' and $Fe$ is a reactant (on the left side)."}, {"text": "The coefficient '3' is understood (not written) for $Cl2$, and $(g)$ indicates an aqueous solution.", "isCorrect": false, "rationale": "The coefficient '3' is explicitly written for $Cl2$, so it is not understood. The symbol (g) indicates a gas, not an aqueous solution (which is (aq))."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
