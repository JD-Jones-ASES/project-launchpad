    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "The opening analogy of trying to describe a wrapped birthday present without opening it serves to illustrate which fundamental aspect of scientific inquiry into atomic structure?", "options": [{"text": "The need for sophisticated mathematical calculations in atomic physics.", "isCorrect": false, "rationale": "While mathematics is crucial, the analogy specifically highlights the challenge of observation, not the tools for calculation."}, {"text": "Scientists' inability to directly observe the internal structure of atoms, necessitating indirect experimental methods.", "isCorrect": true, "rationale": "The analogy directly compares the inability to see inside a wrapped present to the historical inability of scientists to directly 'see' inside atoms, thus requiring ingenious indirect experiments."}, {"text": "The importance of collaboration among scientists from different disciplines.", "isCorrect": false, "rationale": "The analogy focuses on the observational challenge, not on the social or collaborative aspects of science."}, {"text": "The relatively recent development of tools for atomic manipulation.", "isCorrect": false, "rationale": "The analogy describes a long-standing challenge in understanding atoms, which predates advanced atomic manipulation tools."}]}, {"question": "Which of Dalton's key ideas was a significant departure from Democritus's ancient concept of the 'atomos'?", "options": [{"text": "The notion that atoms are the smallest particles of matter.", "isCorrect": false, "rationale": "Democritus also proposed that matter could be cut into un-'cuttable' smallest particles, so this idea wasn't unique to Dalton."}, {"text": "The establishment of a theory based on experimental evidence and quantitative observations of chemical reactions.", "isCorrect": true, "rationale": "Dalton's theory was a modern scientific concept because it was built upon empirical observations of consistent patterns in chemical reactions, unlike Democritus's philosophical speculation."}, {"text": "The proposal that atoms are spherical and solid.", "isCorrect": false, "rationale": "While Dalton's model depicted atoms as solid spheres, the key scientific advancement was the evidence-based foundation, not just the shape."}, {"text": "The idea that different elements have different types of atoms.", "isCorrect": false, "rationale": "This idea is implicit in both ancient and modern atomic concepts but Dalton's contribution was detailing how this manifests in chemical reactions with evidence."}]}, {"question": "Dalton's atomic theory successfully explained the consistent ratios of elements in compounds but was later found to be incomplete because it proposed that atoms are:", "options": [{"text": "Composed of different isotopes.", "isCorrect": false, "rationale": "The concept of isotopes came much later; Dalton's theory was incomplete for a more fundamental reason related to subatomic particles."}, {"text": "Capable of forming chemical bonds.", "isCorrect": false, "rationale": "Dalton's theory implicitly allowed for atoms to combine, which is the basis of chemical bonds. This was not its incompleteness."}, {"text": "Indivisible and indestructible particles.", "isCorrect": true, "rationale": "Thomson's discovery of the electron proved that atoms are indeed divisible into smaller subatomic particles, directly contradicting Dalton's postulate."}, {"text": "Identical in mass and properties for a given element.", "isCorrect": false, "rationale": "This was one of Dalton's core ideas that largely held true (ignoring isotopes for this context) and was not the primary reason for his model's incompleteness as described in the text."}]}, {"question": "J. J. Thomson's discovery of the electron revolutionized atomic theory by demonstrating that:", "options": [{"text": "Atoms are mostly empty space.", "isCorrect": false, "rationale": "This was a key finding from Rutherford's gold foil experiment, not Thomson's cathode ray experiments."}, {"text": "Atoms are not indivisible and contain smaller, negatively charged particles.", "isCorrect": true, "rationale": "Thomson's discovery of the electron, a particle far smaller than any atom, directly contradicted Dalton's idea of indivisible atoms and showed that atoms have internal structure."}, {"text": "Positive charge is concentrated in a dense nucleus.", "isCorrect": false, "rationale": "This was a central conclusion drawn from Rutherford's gold foil experiment, which occurred after Thomson's work."}, {"text": "Electrons orbit the nucleus in fixed energy levels.", "isCorrect": false, "rationale": "This concept was introduced later by Niels Bohr to address the stability issues of Rutherford's model."}]}, {"question": "If Thomson's plum pudding model were an accurate representation of the atom, how would the results of Rutherford's gold foil experiment have differed from what was actually observed?", "options": [{"text": "All alpha particles would have been absorbed by the gold foil, indicating no empty space.", "isCorrect": false, "rationale": "The plum pudding model still allowed for penetration; it proposed diffuse positive charge, not complete absorption."}, {"text": "Most alpha particles would have passed straight through with only very slight deflections, rather than some bouncing back at large angles.", "isCorrect": true, "rationale": "The text states that if the plum pudding model were correct, alpha particles should 'pass straight through with only slight deflections,' because the positive charge would be too diffuse to cause significant repulsion."}, {"text": "Alpha particles would have been attracted to the diffuse positive charge, causing them to clump together.", "isCorrect": false, "rationale": "While the plum pudding model included positive charge, the alpha particles are also positive and would primarily be repelled, albeit weakly due to the diffuse nature."}, {"text": "The gold foil would have heated up significantly due to friction with the alpha particles.", "isCorrect": false, "rationale": "Heating is a physical effect not directly related to the core predictions of atomic structure concerning particle trajectory in the plum pudding model."}]}, {"question": "Rutherford's gold foil experiment led to the conclusion that the atom's positive charge and nearly all its mass are concentrated in a tiny central nucleus because:", "options": [{"text": "The gold foil glowed brightly when struck by alpha particles, indicating strong energy absorption.", "isCorrect": false, "rationale": "The glowing screen was a detector, but the glow itself didn't directly reveal the concentrated mass and charge."}, {"text": "Alpha particles were found to be negatively charged, contradicting earlier assumptions.", "isCorrect": false, "rationale": "Alpha particles are known to be positively charged; this was not a finding of the experiment related to the nucleus."}, {"text": "A small fraction of positively charged alpha particles were deflected at very large angles, some even bouncing straight back.", "isCorrect": true, "rationale": "The unexpected large-angle deflections and backward scattering of the positively charged alpha particles could only be explained by encountering a very small, dense, positively charged region (the nucleus) within the atom."}, {"text": "Most alpha particles passed through the foil completely unobstructed, suggesting the absence of any internal structure.", "isCorrect": false, "rationale": "While most passed through, it was the *rare, strong deflections* that provided evidence for the nucleus, indicating significant internal structure, not its absence."}]}, {"question": "A major theoretical problem with Rutherford's nuclear model, based on the physics known at the time, was its inability to explain why:", "options": [{"text": "Different elements have different numbers of electrons.", "isCorrect": false, "rationale": "Rutherford's model focused on the general structure, and explaining elemental differences was not its primary flaw."}, {"text": "Electrons orbiting the nucleus do not continuously radiate energy and spiral inward, causing the atom to collapse.", "isCorrect": true, "rationale": "According to classical electromagnetism, a charged particle (electron) moving in a circular orbit should continuously lose energy and eventually fall into the positively charged nucleus. Rutherford's model had no explanation for atomic stability."}, {"text": "Atoms are generally electrically neutral.", "isCorrect": false, "rationale": "Rutherford's model could explain neutrality by having the number of orbiting electrons balance the positive charge of the nucleus."}, {"text": "Alpha particles are positively charged.", "isCorrect": false, "rationale": "The nature of alpha particles was a known aspect used in the experiment, not a problem with the resulting atomic model."}]}, {"question": "How did Niels Bohr's model fundamentally resolve the instability issue of Rutherford's nuclear model?", "options": [{"text": "Bohr proposed that the nucleus itself was composed of neutral particles that stabilized the electrons.", "isCorrect": false, "rationale": "The concept of neutrons within the nucleus came later, and their presence doesn't directly address the problem of orbiting electrons radiating energy."}, {"text": "Bohr suggested that electrons gain energy from photons to maintain stable orbits.", "isCorrect": false, "rationale": "Electrons absorb energy to move to *higher* energy levels, but the stability of an electron *within* a given energy level does not rely on continuous energy absorption."}, {"text": "He postulated that electrons exist only in specific, quantized energy levels and do not radiate energy while in these stable orbits.", "isCorrect": true, "rationale": "Bohr introduced the revolutionary idea that electrons occupy discrete, fixed energy levels (orbits) and do not emit or absorb energy while residing in these specific levels, thereby preventing them from spiraling into the nucleus."}, {"text": "Bohr eliminated the concept of orbiting electrons, placing them in a static arrangement around the nucleus.", "isCorrect": false, "rationale": "Bohr retained the concept of electrons orbiting, but he added rules about *which* orbits were allowed and stable."}]}, {"question": "While the Bohr model is useful for understanding energy levels, the modern electron cloud model provides a more accurate description of atoms by stating that electrons:", "options": [{"text": "Are concentrated in a much smaller region than the nucleus.", "isCorrect": false, "rationale": "The electron cloud occupies a much larger region around the nucleus; the nucleus itself is incredibly small but dense."}, {"text": "Travel in perfectly circular, predictable paths around the nucleus.", "isCorrect": false, "rationale": "This is a simplification used in the Bohr model. The electron cloud model, based on quantum mechanics, refutes this idea of neat, predictable orbits."}, {"text": "Exist in three-dimensional regions of probability (orbitals) where their exact position and velocity cannot be simultaneously known.", "isCorrect": true, "rationale": "The modern electron cloud model, founded on quantum mechanics, describes electrons as existing in 'fuzzy regions of probability' (orbitals) where only the likelihood of finding an electron can be determined, adhering to the Heisenberg uncertainty principle."}, {"text": "Are stationary particles located at discrete points outside the nucleus.", "isCorrect": false, "rationale": "Electrons are not stationary; they are in constant motion within their probable regions."}]}, {"question": "The history of atomic models, from Dalton to the electron cloud model, best exemplifies which central principle of scientific progress?", "options": [{"text": "That earlier scientific theories are always completely discarded once a new model emerges.", "isCorrect": false, "rationale": "Older models are often found incomplete or inaccurate but provide foundations, and some aspects may be retained or refined rather than entirely discarded."}, {"text": "The idea that scientific consensus is easily achieved and rarely challenged.", "isCorrect": false, "rationale": "The text clearly shows a continuous process of challenge and revision, indicating that consensus is hard-won and dynamic."}, {"text": "The iterative nature of science, where models are continuously revised and refined based on new experimental evidence and discoveries.", "isCorrect": true, "rationale": "The entire section illustrates how each new experiment or discovery led to a revision of the atomic model, emphasizing the ongoing, evolving process of scientific understanding."}, {"text": "That technological advancements are the sole drivers of scientific understanding.", "isCorrect": false, "rationale": "While technology is important, conceptual breakthroughs (like Bohr's quantization) and theoretical analysis (like Rutherford's interpretation) are equally critical drivers."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
