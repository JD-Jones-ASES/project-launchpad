    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "An air mass originating over the northern Pacific Ocean, near the coast of Alaska, would most likely be classified as which type?", "options": [{"text": "cT (continental tropical)", "isCorrect": false, "rationale": "A cT air mass forms over land and is hot and dry. The northern Pacific Ocean is water (maritime) and near Alaska implies cold (polar)."}, {"text": "mP (maritime polar)", "isCorrect": true, "rationale": "An mP air mass forms over water (maritime) and is cold (polar). The northern Pacific Ocean is a body of water, and Alaska is in a cold, polar region."}, {"text": "cP (continental polar)", "isCorrect": false, "rationale": "A cP air mass forms over land (continental). The northern Pacific Ocean is water."}, {"text": "mT (maritime tropical)", "isCorrect": false, "rationale": "An mT air mass forms over water (maritime) but is warm (tropical). Alaska is in a cold, polar region, not a tropical one."}], "id": "q01"}, {"question": "Which weather condition is LEAST likely to be associated with the passage of a cold front?", "options": [{"text": "Abrupt temperature drop", "isCorrect": false, "rationale": "Cold fronts move quickly, and the cold, dense air rapidly displaces warm air, leading to an abrupt temperature drop. This is a common characteristic."}, {"text": "Tall cumulonimbus clouds and potential thunderstorms", "isCorrect": false, "rationale": "The rapid lifting of warm air by an advancing cold front produces tall cumulonimbus clouds, which are associated with heavy rain, gusty winds, and thunderstorms."}, {"text": "Prolonged, light drizzle over a broad area", "isCorrect": true, "rationale": "This type of precipitation (broad area, light, and prolonged) is characteristic of a warm front, where warm air rises gradually over retreating cold air. Cold fronts typically bring heavy, but short-lived, precipitation."}, {"text": "Gusty winds and heavy rain or snow", "isCorrect": false, "rationale": "The rapid and forceful uplift of air along a cold front frequently results in gusty winds and intense precipitation in the form of heavy rain or snow."}], "id": "q02"}, {"question": "A meteorologist observes cirrus clouds appearing far ahead in the sky, followed by gradually thickening stratus clouds, and expects light, steady rain to begin within the next 12-24 hours. What type of front is most likely approaching?", "options": [{"text": "Cold front", "isCorrect": false, "rationale": "Cold fronts typically bring abrupt weather changes, heavy precipitation, and cumulonimbus clouds, not a gradual progression of cirrus and stratus with light, steady rain."}, {"text": "Warm front", "isCorrect": true, "rationale": "The description matches a warm front, where warm air gradually rises over colder air. This leads to a broad area of steady, lighter precipitation, and cirrus and stratus clouds often appear well ahead of the surface front."}, {"text": "Stationary front", "isCorrect": false, "rationale": "A stationary front occurs when neither air mass advances, leading to prolonged cloudy and rainy weather, but not typically the specific sequence of advancing cirrus/stratus clouds and a broad area of light, steady precipitation associated with an advancing warm air mass."}, {"text": "Occluded front", "isCorrect": false, "rationale": "An occluded front involves complex weather when a cold front catches a warm front, lifting the warm air mass entirely, and often produces a mixture of precipitation types rather than a gradual approach of light, steady rain preceded by cirrus and stratus."}], "id": "q03"}, {"question": "A pilot flying in the Northern Hemisphere reports encountering clear skies, calm winds, and a clockwise spiraling airflow at altitude. This atmospheric condition is characteristic of:", "options": [{"text": "A tropical cyclone", "isCorrect": false, "rationale": "Tropical cyclones are low-pressure systems associated with stormy weather and counterclockwise spiraling winds in the Northern Hemisphere."}, {"text": "An approaching cold front", "isCorrect": false, "rationale": "Cold fronts are associated with unsettled, stormy weather, abrupt temperature drops, and strong winds, not clear skies and calm conditions."}, {"text": "An anticyclone", "isCorrect": true, "rationale": "An anticyclone is a high-pressure system characterized by sinking air, clear skies, calm conditions, and clockwise spiraling winds in the Northern Hemisphere."}, {"text": "A stationary front", "isCorrect": false, "rationale": "Stationary fronts often produce days of cloudy, rainy weather, not clear skies and calm conditions."}], "id": "q04"}, {"question": "The unique conditions that make 'Tornado Alley' in the central United States a global hotspot for tornadoes primarily involve:", "options": [{"text": "The frequent collision of cold cP air from Canada with warm mT air from the Gulf of Mexico, coupled with strong updrafts and wind shear.", "isCorrect": true, "rationale": "The text explicitly states that 'Tornado Alley' is where 'cold cP air from Canada frequently collides with warm mT air from the Gulf of Mexico,' and that tornadoes form when 'wind shear... creates a horizontal tube of spinning air that is tilted vertical by a powerful updraft.' This option combines both key factors."}, {"text": "The consistent presence of maritime polar air masses, which are inherently unstable.", "isCorrect": false, "rationale": "The primary air masses involved in 'Tornado Alley' are continental polar (cP) and maritime tropical (mT), not maritime polar (mP)."}, {"text": "The direct influence of warm tropical ocean water, fueling tornadoes similar to hurricanes.", "isCorrect": false, "rationale": "Tornadoes form over land and are fueled by atmospheric instability, not directly by warm ocean water like hurricanes. While mT air masses originate over warm water, the direct fueling mechanism is atmospheric, not oceanic."}, {"text": "Strong prevailing westerly winds that create a constant state of low pressure across the region.", "isCorrect": false, "rationale": "While wind shear (change in wind speed/direction) is critical, the primary reason for Tornado Alley's activity is the interaction of specific air masses, not a constant state of low pressure due to prevailing westerly winds."}], "id": "q05"}, {"question": "The statement that a hurricane 'feeds on warm ocean water' physically means that:", "options": [{"text": "The warm ocean water provides the mechanical energy for the storm's rotation.", "isCorrect": false, "rationale": "The storm's rotation is driven by the Coriolis effect and pressure gradients within the low-pressure system, not directly by mechanical energy from the water itself."}, {"text": "Evaporation from the warm water releases latent heat as the moist air condenses, continuously powering the storm's updrafts.", "isCorrect": true, "rationale": "Warm ocean water leads to high evaporation, creating warm, moist air. As this air rises and cools, water vapor condenses, releasing a massive amount of latent heat. This heat warms the surrounding air, making it more buoyant, which fuels further uplift and strengthens the storm's low-pressure core."}, {"text": "The ocean water directly transfers its heat content into the storm's eye, increasing its temperature and stability.", "isCorrect": false, "rationale": "The eye of a hurricane is typically calm and relatively clear, a result of sinking air, not direct heat transfer from the ocean that increases its stability. The energy transfer is primarily through latent heat from condensation in the eyewall."}, {"text": "The salinity of warm ocean water acts as a catalyst, accelerating the chemical reactions that drive the storm.", "isCorrect": false, "rationale": "Hurricanes are driven by physical processes involving heat transfer and water phase changes, not by chemical reactions or the salinity of the water."}], "id": "q06"}, {"question": "Evangelista Torricelli's groundbreaking insight, which led to the invention of the barometer, was that:", "options": [{"text": "The vacuum he created was responsible for pulling the mercury up the tube.", "isCorrect": false, "rationale": "The vacuum itself doesn't pull; rather, the absence of air pressure in the vacuum allows the external atmospheric pressure to push the mercury column up into the tube."}, {"text": "Air is a gas and therefore has no measurable weight or pressure.", "isCorrect": false, "rationale": "Torricelli's discovery was precisely the opposite: that the atmosphere *has* weight and exerts measurable pressure."}, {"text": "The atmosphere exerts pressure, and this pressure can be measured by the height of a mercury column it supports.", "isCorrect": true, "rationale": "Torricelli reasoned that the atmospheric pressure pressing down on the mercury in the dish supported the column in the tube, and changes in this pressure caused the column to rise or fall, thus providing a measure of atmospheric pressure."}, {"text": "The density of mercury is directly proportional to temperature changes, making it ideal for measuring heat.", "isCorrect": false, "rationale": "While mercury is used in thermometers due to its expansion properties with temperature, Torricelli's specific discovery with the mercury column was about measuring atmospheric pressure, not temperature."}], "id": "q07"}, {"question": "In the simple aneroid-style barometer described in the 'Building a Barometer' investigation, if the straw pointer tilts *downward* from its initial marked position, what does this indicate about the atmospheric pressure outside the jar?", "options": [{"text": "The atmospheric pressure has increased, pushing the balloon further into the jar.", "isCorrect": false, "rationale": "Increased atmospheric pressure would push down on the balloon, causing the straw pointer to tilt *upward*."}, {"text": "The atmospheric pressure has decreased, allowing the trapped air inside to push the balloon outward.", "isCorrect": true, "rationale": "When external atmospheric pressure decreases, the relatively higher pressure of the trapped air inside the jar pushes the balloon membrane outward (upward), which, due to the lever action, causes the pointer end of the straw to tilt *downward*."}, {"text": "The temperature inside the jar has significantly increased, causing the air to expand and lift the balloon.", "isCorrect": false, "rationale": "While a temperature increase could cause the trapped air to expand and lift the balloon (and thus tilt the pointer downward), the question asks what a downward tilt indicates about *atmospheric pressure* outside the jar, which is a direct pressure-related effect."}, {"text": "The balloon seal has failed, allowing air to escape and reducing internal pressure.", "isCorrect": false, "rationale": "A failed seal would lead to unreliable readings or a collapse of the balloon, not a consistent downward tilt indicating a specific pressure trend."}], "id": "q08"}, {"question": "Based on the expected results from the 'Building a Barometer' investigation, which observation would most strongly suggest an approaching period of unsettled, stormy weather?", "options": [{"text": "The straw pointer consistently remains at its initial marked position for several days.", "isCorrect": false, "rationale": "A stable straw position indicates stable atmospheric pressure, which usually corresponds to stable, often fair, weather, not stormy conditions."}, {"text": "The straw pointer gradually tilts upward over 24 hours.", "isCorrect": false, "rationale": "An upward tilt indicates rising atmospheric pressure, which is generally correlated with clearing skies and fair weather."}, {"text": "The straw pointer rapidly tilts downward, and its lowest point is recorded.", "isCorrect": true, "rationale": "A downward tilt indicates falling atmospheric pressure. The investigation's expected results state that falling pressure is correlated with rainy or stormy weather. A rapid and significant drop suggests a strong storm system approaching."}, {"text": "The straw pointer shows minor, erratic fluctuations throughout the day.", "isCorrect": false, "rationale": "Minor, erratic fluctuations might be due to localized changes, temperature variations, or errors, but do not provide a clear trend indicative of widespread stormy weather."}], "id": "q09"}, {"question": "Considering the typical movement and characteristics of air masses in North America, which scenario is most likely to produce widespread severe weather, such as tornadoes or intense thunderstorms?", "options": [{"text": "An advancement of a large, stable cP air mass over a continental tropical region.", "isCorrect": false, "rationale": "While a cold cP air mass can bring cold weather, if it's described as 'stable,' it's less likely to generate widespread severe storms. The temperature contrast with a cT air mass would exist, but 'stable' conditions typically suppress severe weather."}, {"text": "The interaction of a maritime polar (mP) air mass with a continental polar (cP) air mass over the Great Lakes.", "isCorrect": false, "rationale": "Both mP and cP air masses are cold, meaning there wouldn't be the extreme temperature and moisture contrast needed to fuel widespread severe weather like tornadoes, which often require warm, moist air colliding with cold, dry air."}, {"text": "A powerful maritime tropical (mT) air mass originating from the Gulf of Mexico colliding with a cold continental polar (cP) air mass from Canada.", "isCorrect": true, "rationale": "The text explicitly states that 'Tornado Alley' experiences the most tornadoes because 'cold cP air from Canada frequently collides with warm mT air from the Gulf of Mexico.' This collision creates extreme temperature and moisture differences, leading to strong uplift and severe weather."}, {"text": "A stationary front forming between two equally strong maritime tropical (mT) air masses.", "isCorrect": false, "rationale": "Two mT air masses would have similar warm and moist characteristics, minimizing the temperature and moisture contrast necessary for severe uplift. A stationary front would result in prolonged, but generally less severe, weather than a powerful collision of contrasting air masses."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
