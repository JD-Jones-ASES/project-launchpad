        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>

        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following statements best defines a force according to the textbook section?", "options": [{"text": "A scalar quantity that describes the rate at which an object changes its speed.", "isCorrect": false, "rationale": "Force is a vector quantity, not scalar, and it can change direction, not just speed. This definition describes acceleration or aspects of motion, not force itself."}, {"text": "A push or a pull exerted on an object, characterized by both magnitude and direction, and measured in newtons (N).", "isCorrect": true, "rationale": "This statement accurately captures all key aspects of a force as defined in the text: it's a push or pull, a vector quantity (magnitude and direction), and its SI unit is the newton."}, {"text": "The energy transferred to an object, causing it to move faster or slower.", "isCorrect": false, "rationale": "While forces can affect motion and are related to energy transfer (work), force itself is not energy. Its primary effect is to change motion or deform an object, and it's not a measure of energy."}, {"text": "The resistance an object has to changes in its state of motion, measured in kilograms.", "isCorrect": false, "rationale": "This describes inertia or mass, not force. Mass is measured in kilograms, and inertia is an object's resistance to changes in motion, which is what force overcomes."}]}, {"question": "A person pulls open a door, while a book rests on a table, experiencing the Earth's gravitational pull. Which of these scenarios exclusively involves a non-contact force?", "options": [{"text": "Pulling open the door, which involves an applied force.", "isCorrect": false, "rationale": "Pulling a door requires physical touch, meaning an applied force, which is a contact force."}, {"text": "The book resting on the table, involving a normal force.", "isCorrect": false, "rationale": "The normal force is the support force from the table acting on the book, which requires physical contact, classifying it as a contact force."}, {"text": "The Earth's gravitational pull on the book.", "isCorrect": true, "rationale": "Gravitational force acts over a distance without physical contact between objects (Earth and book), making it a non-contact force."}, {"text": "All of the above scenarios involve a combination of contact and non-contact forces.", "isCorrect": false, "rationale": "While the book on the table experiences both normal force (contact) and gravity (non-contact), the question asks for a scenario exclusively involving a non-contact force, which is specifically the gravitational pull itself."}]}, {"question": "A car is driving on a flat road. Which of the following statements correctly describes the direction and nature of the friction force acting on the car?", "options": [{"text": "It acts perpendicular to the road surface, supporting the car's weight.", "isCorrect": false, "rationale": "This describes the normal force, not friction. Friction acts parallel to the surface."}, {"text": "It is a pulling force transmitted through the car's engine to move it forward.", "isCorrect": false, "rationale": "This describes the engine's applied force, not friction. Friction opposes motion."}, {"text": "It acts parallel to the road surface and opposite to the direction of the car's motion, opposing it.", "isCorrect": true, "rationale": "Friction is explicitly defined as a force that opposes the sliding or rolling of one surface over another, acting parallel to the contact surface and opposite to the direction of motion."}, {"text": "It is an attractive force between the car and the Earth, pulling the car downward.", "isCorrect": false, "rationale": "This describes gravitational force, which is a non-contact force and acts downward, not parallel to the surface opposing motion."}]}, {"question": "Imagine a magnet repelling another magnet without touching it. This interaction is an example of a non-contact force because:", "options": [{"text": "Magnets are always made of different materials that do not allow direct contact.", "isCorrect": false, "rationale": "The material composition is irrelevant to whether the force itself is contact or non-contact; it's about the nature of the interaction."}, {"text": "The force only applies to objects that are in motion relative to each other.", "isCorrect": false, "rationale": "Magnetic forces can act on stationary objects as well. The key characteristic of non-contact forces is acting over a distance without touching."}, {"text": "Magnetic forces are a type of 'field force' that can exert a push or pull over a distance without physical contact.", "isCorrect": true, "rationale": "The text classifies magnetic force as a non-contact (or field) force, explicitly stating that these forces 'act over a distance without the objects touching'."}, {"text": "The strength of the force is always constant, regardless of the distance between the magnets.", "isCorrect": false, "rationale": "The strength of magnetic force, like gravity, typically changes with distance. This statement is incorrect and irrelevant to the definition of a non-contact force."}]}, {"question": "A book is placed on a horizontal table. The book weighs 5 N downward, and the table exerts a normal force of 5 N upward. What can be concluded about the net force on the book and its state of motion?", "options": [{"text": "The net force is 10 N downward, and the book is accelerating downward.", "isCorrect": false, "rationale": "The forces are in opposite directions, so they should be subtracted, not added. This calculation and conclusion are incorrect."}, {"text": "The net force is 0 N, meaning the forces are balanced, and the book is in equilibrium (remaining at rest).", "isCorrect": true, "rationale": "When forces are equal in magnitude and opposite in direction, they cancel out, resulting in a net force of zero. This means the object is in equilibrium and will not accelerate, hence remaining at rest."}, {"text": "The net force is 5 N upward, causing the book to accelerate upward.", "isCorrect": false, "rationale": "Subtracting the forces (5N up - 5N down) results in 0 N, not 5 N upward. Therefore, the conclusion about acceleration is incorrect."}, {"text": "The net force is 5 N downward, causing the book to accelerate downward.", "isCorrect": false, "rationale": "Subtracting the forces (5N up - 5N down) results in 0 N, not 5 N downward. This calculation and conclusion are incorrect."}]}, {"question": "A student pushes a desk to the right with a force of 30 N. Due to friction, a force of 12 N acts to the left. At the same time, another student pulls the desk to the right with a force of 10 N. What is the net force acting on the desk?", "options": [{"text": "52 N to the right", "isCorrect": false, "rationale": "This calculation incorrectly adds all forces together, ignoring their directions."}, {"text": "28 N to the right", "isCorrect": true, "rationale": "Forces in the same direction add: 30 N (right) + 10 N (right) = 40 N (right). The force in the opposite direction subtracts: 40 N (right) - 12 N (left) = 28 N (right). This correctly applies vector addition rules."}, {"text": "8 N to the left", "isCorrect": false, "rationale": "This calculation is incorrect. It suggests the leftward force is dominant or miscalculates the sum of rightward forces."}, {"text": "0 N (The forces are balanced)", "isCorrect": false, "rationale": "The net force is not zero, as the forces acting on the desk do not completely cancel each other out."}]}, {"question": "According to the text, a Free-Body Diagram (FBD) is an essential problem-solving tool because it primarily allows physicists and engineers to:", "options": [{"text": "Calculate an object's velocity and acceleration without considering any forces.", "isCorrect": false, "rationale": "FBDs are specifically for force analysis and are used to determine acceleration based on forces, not to ignore forces or calculate velocity directly."}, {"text": "Visualize all forces acting on an isolated object, thereby simplifying complex scenarios for analysis.", "isCorrect": true, "rationale": "The text states that an FBD 'shows an object isolated from its surroundings, with arrows representing every force acting on it,' making it 'the most important problem-solving tool in physics' for force analysis."}, {"text": "Determine the internal stresses and strains within an object's structure.", "isCorrect": false, "rationale": "FBDs represent external forces acting on an object as a whole, not internal stresses or strains within its structure."}, {"text": "Predict the long-term trajectory of an object based on its initial position only.", "isCorrect": false, "rationale": "FBDs are used for analyzing forces at a given moment to understand motion, but they don't predict long-term trajectories based on initial position alone; force analysis is a step in that process."}]}, {"question": "Which of the following instructions is a correct step to follow when constructing a Free-Body Diagram (FBD)?", "options": [{"text": "Draw arrows representing forces that the object exerts on other surrounding objects.", "isCorrect": false, "rationale": "An FBD should only show forces *acting ON* the object being analyzed, not forces the object exerts on other things."}, {"text": "Represent the object as a detailed, realistic drawing to capture all its features.", "isCorrect": false, "rationale": "The text explicitly states to 'Draw the object as a simple dot or small box' for simplification, not a detailed drawing."}, {"text": "Draw an arrow for each identified force, starting from the object's center and pointing in the force's direction.", "isCorrect": true, "rationale": "This directly matches one of the enumerated steps for drawing an FBD in the textbook: 'Draw an arrow for each force, starting from the center of the object, pointing in the direction the force acts...'"}, {"text": "Only include non-contact forces like gravity and magnetic forces, as contact forces are too complex.", "isCorrect": false, "rationale": "An FBD must include *every* force acting on the object, whether contact or non-contact, as specified in the checklist ('gravity, normal force, friction, tension, applied forces, air resistance')."}]}, {"question": "A skydiver eventually reaches 'terminal velocity,' meaning they fall at a constant speed. At this point, how would a free-body diagram of the skydiver represent the forces, and what does it imply about the net force?", "options": [{"text": "It would show only a downward gravitational force, implying constant acceleration.", "isCorrect": false, "rationale": "If only gravity acted, the skydiver would continuously accelerate. Terminal velocity implies a balance of forces."}, {"text": "It would show an upward air resistance force greater than the downward gravitational force, leading to deceleration.", "isCorrect": false, "rationale": "If air resistance were greater, the skydiver would slow down (decelerate), not maintain a constant speed."}, {"text": "It would show a downward gravitational force and an equal upward air resistance force, resulting in a zero net force.", "isCorrect": true, "rationale": "As per the 'thinkdeeper' and 'teachernote' sections, constant velocity (terminal velocity) means zero acceleration, which in turn means the net force is zero. This occurs when the upward air resistance exactly balances the downward gravitational force."}, {"text": "It would show both forces acting downward, adding to a non-zero net force and constant speed.", "isCorrect": false, "rationale": "Air resistance acts upward, opposing motion, not downward. If both acted downward, there would be acceleration, not constant speed."}]}, {"question": "A person pushes a shopping cart across a supermarket aisle. Which combination of forces is most likely acting on the cart in the horizontal and vertical directions, assuming it's moving at a constant speed?", "options": [{"text": "Horizontal: Applied force and magnetic force; Vertical: Gravitational force only.", "isCorrect": false, "rationale": "Magnetic force is unlikely unless there's a strong magnetic field in a supermarket. The normal force is also missing in the vertical direction, which balances gravity."}, {"text": "Horizontal: Applied force and friction; Vertical: Gravitational force and normal force.", "isCorrect": true, "rationale": "The person applies a force horizontally, and friction opposes it. Vertically, gravity pulls down, and the floor provides a normal force pushing up. For constant speed, these forces would be balanced in each direction."}, {"text": "Horizontal: Tension and air resistance; Vertical: Spring force and electric force.", "isCorrect": false, "rationale": "Tension is typically from ropes/cables, not directly from pushing a cart. Spring and electric forces are not typically relevant to a shopping cart scenario. Air resistance would be minimal in an aisle."}, {"text": "Horizontal: Only applied force; Vertical: Gravitational force and tension.", "isCorrect": false, "rationale": "If only an applied force acts horizontally, the cart would accelerate, not move at constant speed (friction is missing). Tension is not relevant in the vertical direction."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
