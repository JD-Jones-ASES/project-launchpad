    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 31, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best reflects the textbook's description of scientific careers?", "options": [{"text": "Most scientists primarily work alone in isolated laboratories, focusing on theoretical research.", "isCorrect": false, "rationale": "This option contradicts the text, which states, 'The reality is far more diverse' and lists various workplaces beyond just laboratories, emphasizing collaborative and field-based work."}, {"text": "The skills developed in science are valuable in a wide array of professions, extending beyond traditional lab settings.", "isCorrect": true, "rationale": "The text explicitly states, 'The skills you have developed this year — observation, hypothesis testing, data analysis, mathematical reasoning, and clear communication — are valued in an enormous range of careers' and lists diverse workplaces like hospitals, forests, courtrooms, and boardrooms."}, {"text": "Scientific careers are limited to a few traditional fields like biology, chemistry, and physics, with little overlap.", "isCorrect": false, "rationale": "The text provides extensive lists of careers across Life, Earth, Chemistry, Physics, and critically, 'Interdisciplinary careers,' demonstrating significant overlap and a broad scope beyond a few traditional fields."}, {"text": "A scientific career path is generally rigid, requiring a specific set of advanced degrees without much flexibility.", "isCorrect": false, "rationale": "While advanced education is often required, the emphasis on 'diverse' careers and the applicability of scientific thinking to many life situations suggests flexibility rather than rigidity."}]}, {"question": "A patient receives complex genetic test results and needs assistance understanding the implications for their health decisions. Which scientific professional would be best suited to help them?", "options": [{"text": "Epidemiologist", "isCorrect": false, "rationale": "An epidemiologist tracks the spread of diseases in populations and designs public health interventions, which is different from counseling an individual patient on genetic test results."}, {"text": "Biomedical researcher", "isCorrect": false, "rationale": "A biomedical researcher investigates the causes and treatments of diseases at the cellular and molecular level, focusing on research rather than direct patient counseling on results."}, {"text": "Genetic counselor", "isCorrect": true, "rationale": "The text defines a genetic counselor as someone who 'helps patients understand genetic test results and make informed medical decisions,' which directly matches the scenario."}, {"text": "Veterinarian", "isCorrect": false, "rationale": "A veterinarian applies knowledge of animal biology to diagnose and treat animal diseases, which is irrelevant to human genetic counseling."}]}, {"question": "A team is tasked with designing a new, lightweight prosthetic limb that mimics human muscle movement and integrates with nerve signals. Which type of engineer would be most crucial to lead this project, given its requirements?", "options": [{"text": "Aerospace engineer", "isCorrect": false, "rationale": "An aerospace engineer designs aircraft, spacecraft, and propulsion systems, which is not relevant to medical prosthetics."}, {"text": "Electrical engineer", "isCorrect": false, "rationale": "An electrical engineer designs circuits, power systems, and electronic devices. While electronics might be part of a prosthetic, the core design involving biology and human movement falls under a different specialty."}, {"text": "Biomedical engineer", "isCorrect": true, "rationale": "The text describes a biomedical engineer as someone who 'combines biology, chemistry, and physics to design medical devices and prosthetics,' which perfectly aligns with the project's requirements."}, {"text": "Environmental engineer", "isCorrect": false, "rationale": "An environmental engineer applies science and engineering to protect and restore the environment, which is unrelated to prosthetic design."}]}, {"question": "Why does the textbook emphasize that every citizen needs scientific literacy, even if they don't become a professional scientist?", "options": [{"text": "To ensure a sufficient pool of future scientists for national research initiatives.", "isCorrect": false, "rationale": "While important, this is not the primary reason given for *every citizen* needing scientific literacy. The focus is on personal and civic decision-making."}, {"text": "Because scientific careers are becoming increasingly popular and financially rewarding.", "isCorrect": false, "rationale": "The text does not state this as the reason for universal scientific literacy; it focuses on the practical application of scientific understanding in daily life."}, {"text": "To enable individuals to make informed decisions regarding health, environment, technology, and civic participation.", "isCorrect": true, "rationale": "The text explicitly states, 'Scientific literacy means having enough understanding of science to make informed decisions about the issues that affect your life and your community,' listing health, environmental, technology, and civic decisions as examples."}, {"text": "So that citizens can critically evaluate and critique the work of professional scientists.", "isCorrect": false, "rationale": "The emphasis is on making *personal* informed decisions and evaluating claims from various sources, not specifically critiquing the professional work of scientists."}]}, {"question": "A social media post claims a new, all-natural 'superfood' will boost immunity and prevent all common illnesses, citing one person's story about rarely getting sick since trying it. Which of the textbook's 'five questions to ask when you encounter a scientific claim' is *most directly* violated by this information?", "options": [{"text": "What is the source?", "isCorrect": false, "rationale": "While social media can be an unreliable source, the core issue described here is not just the source but the nature of the evidence presented."}, {"text": "What is the evidence? / Is the sample size adequate?", "isCorrect": true, "rationale": "The claim relies on 'one person's story,' which is anecdotal evidence, not data from controlled experiments, and represents an inadequate sample size, directly violating these two crucial questions from the 'Evaluating Claims' section."}, {"text": "Has the work been replicated?", "isCorrect": false, "rationale": "Replication is important, but before replication, there needs to be initial robust evidence from a well-designed study, which is absent in this scenario."}, {"text": "Do the experts agree?", "isCorrect": false, "rationale": "Expert consensus is the 'gold standard,' but the primary problem here is the complete lack of credible evidence and sufficient sample size to even begin forming a consensus."}]}, {"question": "Which of the following activities is NOT suggested by the textbook as a way to continue developing scientific understanding *outside of school*?", "options": [{"text": "Participating in citizen science projects.", "isCorrect": false, "rationale": "The text lists 'Explore citizen science projects' as an 'outside school' activity."}, {"text": "Visiting science museums or planetariums.", "isCorrect": false, "rationale": "The text lists 'Visit science museums, planetariums, botanical gardens, and natural history museums' as an 'outside school' activity."}, {"text": "Enrolling in AP or honors science courses.", "isCorrect": true, "rationale": "The text lists 'Consider taking AP (Advanced Placement) or honors science courses' under the 'In school' section, not 'Outside school'."}, {"text": "Following science news from reputable sources.", "isCorrect": false, "rationale": "The text lists 'Follow science news from reputable sources' as an 'outside school' activity."}]}, {"question": "Sarah is trying to decide which college major to pursue. She researches different fields, talks to professionals, and considers her own interests and strengths. After weighing the pros and cons of several options, she tentatively chooses a major, but remains open to changing her mind if new information emerges. Which aspect of the scientific method is Sarah *demonstrating* by remaining open to new information?", "options": [{"text": "Hypothesizing", "isCorrect": false, "rationale": "Hypothesizing involves generating possible solutions or explanations, which Sarah did when considering different majors. However, remaining open to new information comes after making a decision."}, {"text": "Testing", "isCorrect": false, "rationale": "Testing involves gathering evidence and researching options. Sarah did this by researching and talking to professionals, but it's not about being open to changing her mind post-decision."}, {"text": "Concluding, while remaining open to new information.", "isCorrect": true, "rationale": "The text describes the final step of applying the scientific method to life decisions as 'Conclude: Make your decision based on the evidence, while remaining open to new information that might change your mind.' Sarah's action directly reflects this."}, {"text": "Observing", "isCorrect": false, "rationale": "Observing involves gathering initial information about the situation. Sarah did this, but her openness to future change is part of the concluding phase."}]}, {"question": "A scientist is working to develop a more efficient solar panel material by altering its molecular structure to capture more light energy. In which branch of science careers would this work most likely fall?", "options": [{"text": "Life Science", "isCorrect": false, "rationale": "Life science careers focus on living organisms, diseases, ecosystems, and genetics, which is not directly related to developing solar panel materials."}, {"text": "Earth Science", "isCorrect": false, "rationale": "Earth science careers involve geology, meteorology, oceanography, and climate science, which are about Earth's systems, not material science for energy capture."}, {"text": "Chemistry / Materials Science", "isCorrect": true, "rationale": "The text lists 'Materials scientist' under Chemistry careers, defining it as someone who 'develops new materials with specific properties (stronger alloys, better batteries, advanced polymers).' Altering molecular structure for energy capture fits this description perfectly."}, {"text": "Biomedical Engineering", "isCorrect": false, "rationale": "Biomedical engineering combines fields to design medical devices and prosthetics, which is unrelated to solar panel material development."}]}, {"question": "The concluding section states, 'Science is not a collection of facts to memorize. It is a way of seeing the world...' What does this statement primarily imply about the nature of scientific learning?", "options": [{"text": "That rote memorization is entirely unnecessary for scientific progress.", "isCorrect": false, "rationale": "While emphasizing more than facts, the text does not imply that memorization is 'entirely unnecessary.' Foundational knowledge is important; the statement critiques a *sole* focus on memorization."}, {"text": "That the most valuable outcome of science education is developing a critical, inquisitive mindset.", "isCorrect": true, "rationale": "This option aligns with the text's emphasis on science as 'a way of seeing the world — with curiosity, rigor, humility, and wonder,' and the call to 'Keep asking questions. Keep seeking evidence. Keep learning.' It highlights the process and mindset over just accumulating facts."}, {"text": "That scientific knowledge is constantly changing, making it unreliable for long-term understanding.", "isCorrect": false, "rationale": "While scientific understanding evolves, the text presents this as progress and a reason for continued learning, not as an indication of unreliability. The scientific method is presented as a reliable framework."}, {"text": "That only professional scientists need to engage with scientific concepts critically.", "isCorrect": false, "rationale": "This contradicts the earlier section on 'Scientific Literacy for Every Citizen,' which stresses the importance of critical scientific thinking for everyone in daily life."}]}, {"question": "A government agency is seeking an expert to assess the long-term impact of current industrial emissions on global temperature trends and sea levels, and to advise on potential future scenarios. Which scientific professional would be best suited for this role?", "options": [{"text": "Oceanographer", "isCorrect": false, "rationale": "An oceanographer studies ocean currents, marine geology, and ocean chemistry. While ocean studies are part of climate science, an oceanographer does not have the primary role of analyzing broad global temperature trends and predicting future climate conditions."}, {"text": "Meteorologist", "isCorrect": false, "rationale": "A meteorologist forecasts weather and studies atmospheric phenomena, typically on a shorter-term basis than the long-term climate trends described."}, {"text": "Geologist", "isCorrect": false, "rationale": "A geologist studies Earth's rocks, minerals, and geological processes, which is not the primary focus of analyzing industrial emissions and global climate change."}, {"text": "Climate scientist", "isCorrect": true, "rationale": "The text defines a climate scientist as someone who 'analyzes climate data and develops models to predict future climate conditions,' which perfectly matches the requirements of assessing long-term impacts of emissions on global temperatures and sea levels."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
