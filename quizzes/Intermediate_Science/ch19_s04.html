    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 19, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following accurately lists the four universal behaviors waves exhibit when encountering obstacles, boundaries, or openings?", "options": [{"text": "Absorption, Transmission, Emission, Dispersion", "isCorrect": false, "rationale": "These describe different light interactions or phenomena, but are not the four specific universal wave behaviors introduced in the text."}, {"text": "Reflection, Refraction, Diffraction, Interference", "isCorrect": true, "rationale": "The text explicitly states: 'These behaviors — reflection, refraction, diffraction, and interference — are universal.'"}, {"text": "Polarization, Resonance, Damping, Superposition", "isCorrect": false, "rationale": "While related to wave phenomena (and superposition is a principle behind interference), these are not the four primary universal behaviors listed in the introduction."}, {"text": "Convection, Conduction, Radiation, Confluence", "isCorrect": false, "rationale": "These terms describe modes of heat transfer or fluid dynamics, not the fundamental wave behaviors discussed."}], "id": "q01"}, {"question": "Convex mirrors are commonly used as side mirrors on cars because they:", "options": [{"text": "Focus light to a single point, allowing for magnified images.", "isCorrect": false, "rationale": "This describes the behavior of concave mirrors, not convex mirrors."}, {"text": "Spread reflected light outward, providing a wider field of view.", "isCorrect": true, "rationale": "The text states that a convex mirror 'spreads reflected light outward, giving a wider field of view — this is why convex mirrors are used as side mirrors on cars'."}, {"text": "Produce images that are laterally inverted and the same size as the object.", "isCorrect": false, "rationale": "This describes the properties of images formed by plane (flat) mirrors, not convex mirrors."}, {"text": "Absorb excess light, reducing glare from headlights.", "isCorrect": false, "rationale": "Mirrors reflect light; absorbing light is not their primary function or why they are used as side mirrors."}], "id": "q02"}, {"question": "A wave travels from Medium A into Medium B, striking the boundary at an angle. If the wave bends *away* from the normal as it enters Medium B, what can be concluded about the wave's speed in Medium B compared to Medium A?", "options": [{"text": "The wave travels slower in Medium B than in Medium A.", "isCorrect": false, "rationale": "The text states that 'when a wave enters a medium where it travels more slowly, it bends toward the normal'. Bending away from the normal implies the opposite."}, {"text": "The wave travels faster in Medium B than in Medium A.", "isCorrect": true, "rationale": "The text explains: 'when it enters a medium where it travels faster, it bends away from the normal.' Therefore, bending away from the normal means it sped up."}, {"text": "The frequency of the wave increases in Medium B.", "isCorrect": false, "rationale": "The text explicitly states that during refraction, 'the frequency stays the same'."}, {"text": "The wavelength of the wave decreases in Medium B.", "isCorrect": false, "rationale": "If the wave travels faster (increased speed) and its frequency remains constant, its wavelength must increase (since speed = frequency × wavelength)."}], "id": "q03"}, {"question": "Diffraction, the spreading of a wave, is most noticeably observed when which condition is met?", "options": [{"text": "The wave encounters a surface at a very steep angle.", "isCorrect": false, "rationale": "This condition is related to total internal reflection, not when diffraction is most noticeable."}, {"text": "The size of the opening or obstacle is comparable to the wavelength of the wave.", "isCorrect": true, "rationale": "The text states: 'Diffraction is most noticeable when the opening or obstacle is comparable in size to the wavelength.'"}, {"text": "Two waves with different amplitudes overlap in the same region.", "isCorrect": false, "rationale": "This describes interference, not the condition for noticeable diffraction."}, {"text": "The wave passes from a denser medium into a less dense medium.", "isCorrect": false, "rationale": "This describes a condition for refraction, not for noticeable diffraction."}], "id": "q04"}, {"question": "Noise-canceling headphones function by employing which wave behavior principle?", "options": [{"text": "Constructive interference, amplifying desired sounds while blocking others.", "isCorrect": false, "rationale": "Constructive interference would increase the amplitude, making noise louder, which is the opposite of noise-canceling."}, {"text": "Destructive interference, where an inverse wave is generated to cancel out incoming sound waves.", "isCorrect": true, "rationale": "The text explains: 'Noise-canceling headphones use destructive interference: a microphone detects incoming sound, and a speaker produces the same wave shifted by half a wavelength... The two waves overlap and cancel each other'."}, {"text": "Reflection, bouncing unwanted sound waves away from the ear.", "isCorrect": false, "rationale": "While headphones may have some reflective properties, the primary mechanism for noise cancellation described is active wave interference, not passive reflection."}, {"text": "Diffraction, spreading out noise so it's less focused.", "isCorrect": false, "rationale": "Diffraction causes waves to spread, but it doesn't actively cancel out unwanted sound in the way described for noise-canceling headphones."}], "id": "q05"}, {"question": "Fiber optics technology, essential for high-speed internet and medical imaging, relies on which specific phenomenon?", "options": [{"text": "The focusing properties of convex lenses.", "isCorrect": false, "rationale": "While lenses are used in many optical devices, the core principle of guiding light within a fiber is total internal reflection, not lens focusing."}, {"text": "Total internal reflection, where light in a dense medium at a steep angle cannot exit and reflects back inside.", "isCorrect": true, "rationale": "The text states: 'Total internal reflection is... the basis of fiber optics: thin glass fibers carry light signals over enormous distances with very little loss'."}, {"text": "The ability of light waves to diffract around obstacles.", "isCorrect": false, "rationale": "Diffraction describes spreading, which would cause light to escape the fiber, opposite to the goal of fiber optics."}, {"text": "Constructive interference, amplifying light signals over long distances.", "isCorrect": false, "rationale": "While interference can amplify, the primary mechanism for light transmission *within* fiber optics described is total internal reflection, which prevents loss."}], "id": "q06"}, {"question": "Thomas Young's double-slit experiment, which produced a pattern of bright and dark bands on a screen, provided crucial evidence for:", "options": [{"text": "The particle nature of light, contradicting wave theories.", "isCorrect": false, "rationale": "The text explicitly states Young's experiment 'provided powerful evidence for the wave nature of light at a time when many scientists still favored Isaac Newton's particle theory'."}, {"text": "The wave nature of light, as particles would only produce two bright spots.", "isCorrect": true, "rationale": "The text explains that the observed interference pattern 'could only be explained if light behaved as a wave — particles would have produced just two bright spots behind the slits'."}, {"text": "The law of reflection, explaining why light bounces off surfaces.", "isCorrect": false, "rationale": "Reflection is a distinct wave behavior not directly demonstrated by the double-slit interference pattern."}, {"text": "The principle of total internal reflection, used in fiber optics.", "isCorrect": false, "rationale": "Total internal reflection is a specific case of refraction, unrelated to the double-slit experiment's demonstration of light's wave nature."}], "id": "q07"}, {"question": "A person diagnosed with nearsightedness (myopia) needs corrective lenses that diverge light rays to properly focus images on the retina. Based on this, which type of lens would be prescribed?", "options": [{"text": "A convex lens, which converges light rays.", "isCorrect": false, "rationale": "Convex lenses converge light, making objects appear larger, and are used to correct farsightedness, not nearsightedness."}, {"text": "A concave lens, which is thinner in the middle and diverges light rays.", "isCorrect": true, "rationale": "The text states, 'Concave lenses diverge light and are used to correct nearsightedness.' This aligns with the requirement to diverge light for nearsightedness."}, {"text": "A plane lens, which only laterally inverts images.", "isCorrect": false, "rationale": "Plane lenses do not have the refractive power to correct focal issues like nearsightedness."}, {"text": "A Fresnel lens, used for lighthouse beams.", "isCorrect": false, "rationale": "Fresnel lenses are specialized for specific applications like lighthouses or projectors, not general vision correction for the human eye."}], "id": "q08"}, {"question": "In the 'Refraction Through a Glass Block' lab, students observe that when a laser beam enters the glass block from the air at an angle, it bends *toward* the normal. This observation implies that:", "options": [{"text": "The frequency of the light wave increases in the glass.", "isCorrect": false, "rationale": "The text states that during refraction, the wave's frequency stays the same as it changes medium."}, {"text": "The speed of light is slower in glass than in air.", "isCorrect": true, "rationale": "The text's 'key principle' for refraction states: 'when a wave enters a medium where it travels more slowly, it bends toward the normal'. The lab observation confirms light slows down in glass."}, {"text": "The angle of reflection equals the angle of incidence.", "isCorrect": false, "rationale": "This is the law of reflection, which applies to bouncing waves, not the bending of waves as they pass into a new medium (refraction)."}, {"text": "The wavelength of the light wave increases in the glass.", "isCorrect": false, "rationale": "If the speed of light decreases and its frequency remains constant, its wavelength must also decrease (since speed = frequency × wavelength)."}], "id": "q09"}, {"question": "Why can you easily hear someone talking around a corner, but you cannot see them, even though both sound and light are waves?", "options": [{"text": "Sound waves are capable of total internal reflection, unlike light waves.", "isCorrect": false, "rationale": "Total internal reflection is a phenomenon specific to light (or other electromagnetic waves) passing from a denser to a less dense medium at a steep angle, and it doesn't explain hearing around corners."}, {"text": "Sound waves have wavelengths comparable to everyday openings (like doorways), allowing them to diffract significantly, while visible light's much smaller wavelength means it diffracts less noticeably around such openings.", "isCorrect": true, "rationale": "The text explains: 'Sound waves have wavelengths... comparable to the size of doorways and hallway openings — so they spread around corners easily. Visible light has wavelengths... far smaller than everyday openings, so light appears to travel in straight lines and does not noticeably bend around corners.'"}, {"text": "Light waves are subject to constructive interference, while sound waves are not.", "isCorrect": false, "rationale": "Both sound and light waves exhibit constructive and destructive interference, as described in the text (e.g., noise-canceling headphones for sound, Young's experiment for light)."}, {"text": "The speed of sound is much greater than the speed of light, enabling it to bend more easily.", "isCorrect": false, "rationale": "Light travels significantly faster than sound. Wave speed is not the primary factor explaining why sound diffracts more around everyday objects; wavelength relative to obstacle size is."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
