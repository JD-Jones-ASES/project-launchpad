<body>

        <div class="subtitle">Intermediate Science &mdash; Chapter 25, Section 2</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "The initial discovery of deep-sea hydrothermal vents in 1977 primarily revolutionized our understanding of life by demonstrating that:", "options": [{"text": "The ocean floor contains vast reserves of undiscovered minerals.", "isCorrect": false, "rationale": "While new minerals were found, the primary revolution was related to life, not just mineral reserves."}, {"text": "Complex ecosystems could thrive in extreme environments, completely independent of sunlight as an energy source.", "isCorrect": true, "rationale": "The text explicitly states the discovery 'revolutionized our understanding of where life can exist' by finding 'thriving communities... in total darkness' reliant on chemical energy."}, {"text": "Giant tube worms are the most ancient life forms on Earth.", "isCorrect": false, "rationale": "The text describes tube worms as a 'remarkable example of symbiosis' but does not claim them to be the most ancient life forms."}, {"text": "Plate tectonics operates at a much faster rate than previously believed.", "isCorrect": false, "rationale": "The discovery of vents confirmed plate tectonics' role but did not alter the understanding of its timescale. The primary impact was on the understanding of life's limits."}], "id": "q01"}, {"question": "According to the Earth Science section, which sequence accurately describes the process of hydrothermal vent formation?", "options": [{"text": "Magma rises to the seafloor, cools rapidly, and then seawater is heated and dissolves minerals.", "isCorrect": false, "rationale": "Magma rises, but the process involves seawater seeping down first before being heated by the underlying magma, not the magma cooling rapidly at the surface before heating water."}, {"text": "Cold seawater seeps into fractured oceanic crust, is heated by magma, dissolves minerals, and then rises to precipitate them as chimneys.", "isCorrect": true, "rationale": "This sequence directly matches the description in the 'Earth Science: How Vents Form' section: 'Cold seawater seeps down... is heated by the underlying magma... dissolves minerals... shoots back up through the seafloor... dissolved minerals precipitate out, forming towering chimney structures.'"}, {"text": "Tectonic plates collide, causing seawater to be superheated and form cracks where minerals are dissolved.", "isCorrect": false, "rationale": "Hydrothermal vents form at 'divergent plate boundaries' where plates pull apart, not collide."}, {"text": "Underwater volcanoes erupt, releasing superheated water that reacts directly with cold deep-ocean water to form chimneys.", "isCorrect": false, "rationale": "While related to volcanism, the process involves seawater circulation through cracks, not direct eruption of superheated water from volcanoes as the primary mechanism described."}], "id": "q02"}, {"question": "The Chemistry section explains that hydrothermal vent fluids are dramatically different from normal seawater. This difference is crucial for the vent ecosystem because:", "options": [{"text": "The high salinity of vent fluid prevents the growth of competing marine organisms.", "isCorrect": false, "rationale": "The text highlights acidity and dissolved gases (H2S, CH4) as key differences, not primarily high salinity, and the crucial aspect is energy, not just competition prevention."}, {"text": "The acidic, reduced fluid mixes with oxygen-rich seawater, creating exothermic chemical reactions that provide energy for chemosynthesis.", "isCorrect": true, "rationale": "The text states: 'When this acidic, reduced fluid mixes with the cold, oxygen-rich, slightly basic seawater... a cascade of chemical reactions occurs... These reactions are exothermic — they release energy. And this energy is the key to the biology of the vent ecosystem, because it powers a process called chemosynthesis.'"}, {"text": "The distinct chemical composition allows vent organisms to photosynthesize without sunlight.", "isCorrect": false, "rationale": "Vent organisms perform chemosynthesis, not photosynthesis, as there is no sunlight at that depth."}, {"text": "The low pH of vent fluid is directly absorbed by primary producers to create organic molecules.", "isCorrect": false, "rationale": "Primary producers use chemical energy from the oxidation of compounds like H2S, not direct absorption of low pH, to create organic molecules."}], "id": "q03"}, {"question": "In the deep-sea hydrothermal vent ecosystem, which organisms occupy the ecological role of primary producers, forming the base of the food web?", "options": [{"text": "Giant tube worms (Riftia pachyptila), which host symbiotic bacteria.", "isCorrect": false, "rationale": "Giant tube worms are consumers that host primary producer bacteria; they are not primary producers themselves."}, {"text": "Chemosynthetic bacteria that oxidize hydrogen sulfide (H2S).", "isCorrect": true, "rationale": "The text explicitly states, 'the base of the vent food web is formed by chemosynthetic bacteria that oxidize hydrogen sulfide to obtain energy... they are the primary producers that support the entire community.'"}, {"text": "Deep-sea algae that have adapted to utilize trace amounts of light.", "isCorrect": false, "rationale": "No sunlight penetrates to 2500m depth, making photosynthesis impossible for primary production."}, {"text": "Filter-feeding clams and shrimp that consume dissolved organic particles.", "isCorrect": false, "rationale": "Clams and shrimp are consumers, feeding on the organic matter produced by the chemosynthetic bacteria."}], "id": "q04"}, {"question": "The symbiotic relationship between giant tube worms and chemosynthetic bacteria is a prime example of mutualism because:", "options": [{"text": "The bacteria consume the worm's tissues while providing protection from predators.", "isCorrect": false, "rationale": "This describes a parasitic or commensal relationship, not mutualism, and does not align with the text's description of how they interact."}, {"text": "The worm digests the bacteria, providing nutrients to itself.", "isCorrect": false, "rationale": "The text states the worms have 'no mouth, no stomach, and no digestive system' and instead 'harbor billions of chemosynthetic bacteria inside a specialized organ called the trophosome.'"}, {"text": "The bacteria provide organic molecules to the worm, which in turn delivers H2S and O2 to the bacteria.", "isCorrect": true, "rationale": "The text explains this: 'The worm absorbs H2S and O2 from the water and delivers them to the bacteria, which produce organic molecules that nourish the worm. This is a remarkable example of symbiosis — a mutually beneficial relationship.'"}, {"text": "Both organisms independently exploit the same chemical resources without directly interacting.", "isCorrect": false, "rationale": "They directly interact in a specialized organ; their relationship is not independent exploitation of resources."}], "id": "q05"}, {"question": "Beyond temperature-driven heat transfer, the Physics section highlights that hydrothermal vents generate natural electrical currents. This is primarily due to:", "options": [{"text": "The rapid movement of superheated water causing static electricity.", "isCorrect": false, "rationale": "The text attributes the electrical currents to an electrochemical gradient, not static electricity from water movement."}, {"text": "Geomagnetic fields intensified by the vent structures.", "isCorrect": false, "rationale": "The text does not mention geomagnetic fields as the cause of the electrical currents."}, {"text": "An electrochemical gradient created by chemical reactions between reducing vent fluid and oxidizing seawater, driving electron flow through conductive chimneys.", "isCorrect": true, "rationale": "The text states: 'The chemical reactions between the hot, mineral-rich vent fluid and the cold, oxidizing seawater create an an electrochemical gradient — essentially, a natural battery. Electrons flow through the conductive metal sulfide chimney walls...'"}, {"text": "The direct conversion of heat energy into electrical energy by unique mineral compositions.", "isCorrect": false, "rationale": "While heat is involved in the overall system, the electrical current is specifically due to the *chemical reactions* creating an electrochemical gradient, not a direct heat-to-electricity conversion."}], "id": "q06"}, {"question": "The text emphasizes that different scientific processes at hydrothermal vents operate on various timescales. Which comparison of timescales is accurate?", "options": [{"text": "The geological process of plate motion and the growth of individual chimneys both operate on timescales of thousands to millions of years.", "isCorrect": false, "rationale": "While plate motion operates over thousands to millions of years, individual chimneys grow and collapse over 'periods of years to decades,' a much shorter timescale."}, {"text": "Chemical reactions at the fluid-seawater interface occur over seconds to minutes, whereas the geochemical cycling of elements spans thousands of years.", "isCorrect": true, "rationale": "The text states: 'The chemistry at vents operates on timescales of seconds to minutes as hot fluid meets cold water, but the geochemical cycling of elements through the vent system operates over thousands of years.'"}, {"text": "Biological evolution of vent organisms is a rapid process occurring over decades, adapting quickly to environmental shifts.", "isCorrect": false, "rationale": "Biological evolution, particularly leading to complex symbiosis like that of tube worms, occurs over 'millions of years of co-evolution,' not decades."}, {"text": "The distribution of heat and organisms by convection currents takes place over millions of years, consistent with geological change.", "isCorrect": false, "rationale": "Convection currents are part of the rapid energy transfer and distribution process, occurring much faster than millions of years, which is a geological timescale."}], "id": "q07"}, {"question": "If scientists discover active hydrothermal vents on Europa, Jupiter's icy moon, which combination of measurements, representing different scientific branches, would provide the strongest evidence for or against the presence of life?", "options": [{"text": "Primarily measuring the external temperature of Europa and the depth of its subsurface ocean to confirm liquid water.", "isCorrect": false, "rationale": "While liquid water is essential, these measurements alone would not provide direct evidence for life; they establish potential habitability. More specific chemical and biological indicators are needed."}, {"text": "Analyzing the composition of vent fluid for H2S and methane (Chemistry), mapping vent structures on the ocean floor (Earth Science), and detecting complex organic molecules or metabolic byproducts (Life Science).", "isCorrect": true, "rationale": "As suggested in the 'Think Deeper' section, this interdisciplinary approach covers critical aspects: the chemical conditions for chemosynthesis, the geological context, and direct biological indicators such as organic molecules or metabolic waste."}, {"text": "Focusing solely on measuring electrical currents within the chimney structures (Physics) to indicate energy availability for life.", "isCorrect": false, "rationale": "Measuring electrical currents is a relevant physics measurement, but by itself, it is insufficient to confirm life without chemical and biological context."}, {"text": "Collecting rock samples from the vent chimneys to determine their precise mineral composition and age (Earth Science).", "isCorrect": false, "rationale": "While mineral composition and age are valuable Earth Science data for understanding the vent's formation, they do not directly indicate the *presence* of life without further chemical or biological analysis."}], "id": "q08"}, {"question": "The overarching theme of 'Cross-Branch Analysis' in understanding deep-sea hydrothermal vents suggests that:", "options": [{"text": "Each scientific discipline can fully explain a distinct part of the vent system independently.", "isCorrect": false, "rationale": "The text explicitly argues the opposite, stating that the system 'requires all four branches of science to understand' and that they work 'together' due to interconnections."}, {"text": "The geological, chemical, biological, and physical processes within the vent system are intricately linked and mutually influence one another, necessitating an interdisciplinary approach.", "isCorrect": true, "rationale": "The text repeatedly emphasizes the interconnections (e.g., geology influencing chemistry, chemistry fueling biology, physics driving energy transfer) and concludes that 'Every branch of science contributes to understanding this single system... This is why scientists... include biologists, geologists, chemists, and physicists working together — interdisciplinary science at its finest.'"}, {"text": "Scientists study vents primarily to discover new species, making life science the most important branch.", "isCorrect": false, "rationale": "While discovering new species is part of life science, the text emphasizes the equal contribution and interconnectedness of *all four* branches, not the primacy of one."}, {"text": "The primary challenge in studying vents is the extreme pressure, which mainly requires advanced physics instrumentation.", "isCorrect": false, "rationale": "While pressure is a challenge, the text's main point about cross-branch analysis is the interconnectedness of the *processes*, not just the instrumentation challenges of the environment itself."}], "id": "q09"}, {"question": "The discovery of life at hydrothermal vents expanded scientists' understanding of life's potential significantly by:", "options": [{"text": "Proving that all life ultimately originates from volcanic activity.", "isCorrect": false, "rationale": "While vents are linked to hypotheses about the origin of life, the discovery itself does not *prove* that all life originates from volcanic activity, but rather shows a viable pathway."}, {"text": "Demonstrating that complex life can evolve and thrive in environments with no light, extreme pressure, and toxic chemicals, thereby broadening the search for extraterrestrial life.", "isCorrect": true, "rationale": "The text states: 'The discovery of vent life expanded our understanding of where evolution can produce complex ecosystems. If life can thrive in the extreme conditions of a hydrothermal vent... then perhaps life could exist in similar environments elsewhere in the solar system...'"}, {"text": "Indicating that genetic material can spontaneously form from inorganic vent chemicals without biological precursors.", "isCorrect": false, "rationale": "The text discusses chemosynthesis and symbiosis, but does not claim that the discovery *demonstrated* spontaneous formation of genetic material."}, {"text": "Confirming that large, multicellular organisms can exist at extreme depths, regardless of their energy source.", "isCorrect": false, "rationale": "While it confirmed large organisms at depth, the crucial aspect was their *independence from sunlight* and reliance on a *chemical energy source*, not merely depth itself regardless of energy."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
