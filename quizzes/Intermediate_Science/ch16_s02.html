<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 16, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what fundamental role do proteins play in a cell?", "options": [{"text": "Storing the master blueprint of genetic information.", "isCorrect": false, "rationale": "This describes the primary role of DNA, not proteins. DNA holds the instructions for life, as stated in the text."}, {"text": "Speeding up chemical reactions and building tissues.", "isCorrect": true, "rationale": "The text explicitly states that proteins are 'enzymes that speed up chemical reactions, structural proteins that build tissues, hormones that carry signals, and antibodies that fight infection,' highlighting their diverse functional roles."}, {"text": "Carrying the genetic message from the nucleus to the cytoplasm.", "isCorrect": false, "rationale": "This is the primary function of messenger RNA (mRNA), which is a product of transcription, not proteins themselves."}, {"text": "Copying DNA sequences into RNA molecules.", "isCorrect": false, "rationale": "This process is transcription, which is carried out by the enzyme RNA polymerase, a protein, but this option describes the process, not the general fundamental role of proteins in the cell."}]}, {"question": "Which of the following is a key difference between transcription and DNA replication, as described in the text?", "options": [{"text": "Transcription uses DNA polymerase, while replication uses RNA polymerase.", "isCorrect": false, "rationale": "This is incorrect; transcription uses RNA polymerase, and DNA replication uses DNA polymerase."}, {"text": "Transcription produces a double-stranded molecule, while replication produces single strands.", "isCorrect": false, "rationale": "This is incorrect; transcription produces a single-stranded mRNA molecule, while DNA replication produces two double-stranded DNA molecules."}, {"text": "Transcription incorporates uracil (U) into the new molecule, while replication incorporates thymine (T).", "isCorrect": true, "rationale": "The text states that 'RNA uses the base uracil (U) instead of thymine (T),' which is a distinguishing feature of transcription (producing RNA) compared to DNA replication."}, {"text": "Transcription occurs in the cytoplasm, while replication occurs in the nucleus.", "isCorrect": false, "rationale": "This is incorrect; both transcription and DNA replication occur in the nucleus of eukaryotic cells."}]}, {"question": "If a DNA template strand segment reads T–A–C–G–G–A, what would be the corresponding mRNA sequence produced during transcription?", "options": [{"text": "A–T–G–C–C–T", "isCorrect": false, "rationale": "This sequence shows the DNA complement (A-T, T-A, C-G, G-C, G-C, A-T) and incorrectly uses Thymine (T) instead of Uracil (U) for RNA."}, {"text": "A–U–G–C–C–U", "isCorrect": true, "rationale": "Following the base pairing rules for transcription (A with U, T with A, C with G, G with C), the DNA template T-A-C-G-G-A correctly transcribes to A-U-G-C-C-U in mRNA."}, {"text": "U–A–C–G–G–A", "isCorrect": false, "rationale": "This sequence incorrectly matches the DNA template strand directly (except for changing T to U), rather than forming a complementary sequence."}, {"text": "T–A–C–G–G–A", "isCorrect": false, "rationale": "This is the original DNA template sequence, not the transcribed mRNA sequence."}]}, {"question": "Which of the following best represents the central dogma of molecular biology described in the text?", "options": [{"text": "Protein → mRNA → DNA", "isCorrect": false, "rationale": "This sequence represents a reverse flow of information not supported by the central dogma."}, {"text": "DNA → Transcription → mRNA → Translation → Protein", "isCorrect": true, "rationale": "This sequence accurately reflects the central dogma as stated: 'DNA transcription mRNA translation Protein'."}, {"text": "mRNA → DNA → Protein", "isCorrect": false, "rationale": "This sequence incorrectly starts with mRNA and omits the crucial transcription step from DNA."}, {"text": "DNA → Replication → DNA → Transcription → Protein", "isCorrect": false, "rationale": "While DNA replication is a vital process, it is not part of the direct flow of information *from* a gene *to* a protein as defined by the central dogma, which focuses on expression."}]}, {"question": "During the process of translation, what is the primary function of a transfer RNA (tRNA) molecule?", "options": [{"text": "To read the mRNA sequence and identify codons.", "isCorrect": false, "rationale": "Ribosomes are primarily responsible for reading the mRNA codons during translation."}, {"text": "To carry the correct amino acid to the ribosome.", "isCorrect": true, "rationale": "The text states that 'A transfer RNA (tRNA) molecule carries the correct amino acid to the ribosome,' which is its essential role in building the protein chain."}, {"text": "To form part of the ribosome structure.", "isCorrect": false, "rationale": "This is the role of ribosomal RNA (rRNA), which combines with proteins to form ribosomes, not tRNA."}, {"text": "To copy the DNA sequence into an mRNA molecule.", "isCorrect": false, "rationale": "This is the function of RNA polymerase during transcription, not tRNA during translation."}]}, {"question": "In a eukaryotic cell, where do the processes of transcription and translation predominantly occur?", "options": [{"text": "Both transcription and translation occur in the nucleus.", "isCorrect": false, "rationale": "While transcription occurs in the nucleus, translation takes place in the cytoplasm."}, {"text": "Transcription occurs in the cytoplasm, and translation occurs in the nucleus.", "isCorrect": false, "rationale": "This statement incorrectly reverses the locations; transcription is in the nucleus and translation in the cytoplasm."}, {"text": "Transcription occurs in the nucleus, and translation occurs in the cytoplasm.", "isCorrect": true, "rationale": "The text explicitly states that 'Transcription occurs in the nucleus' and 'Translation occurs at ribosomes in the cytoplasm'."}, {"text": "Both transcription and translation occur at ribosomes.", "isCorrect": false, "rationale": "Only translation occurs at ribosomes; transcription occurs in the nucleus, facilitated by RNA polymerase."}]}, {"question": "The genetic code is described as having 'redundancy.' How does this characteristic help explain why a substitution mutation might sometimes have no effect on the resulting protein?", "options": [{"text": "Redundancy means the cell can easily repair any substitution errors.", "isCorrect": false, "rationale": "While cells have repair mechanisms, redundancy refers to the genetic code itself, not a repair process."}, {"text": "Redundancy implies that multiple codons can specify the same amino acid.", "isCorrect": true, "rationale": "The text states that 'the genetic code has redundancy — multiple codons can code for the same amino acid.' Therefore, a substitution might change a codon to a different one that still codes for the identical amino acid, resulting in no change to the protein."}, {"text": "Redundancy allows the ribosome to skip over problematic codons during translation.", "isCorrect": false, "rationale": "Ribosomes do not skip codons due to redundancy; they read each codon sequentially."}, {"text": "Redundancy refers to the fact that DNA is double-stranded, offering a backup.", "isCorrect": false, "rationale": "The double-stranded nature of DNA is important for replication and stability, but 'redundancy' in this context specifically refers to the genetic code's multiple codons for single amino acids."}]}, {"question": "A segment of a gene originally reads T-A-C-G. Due to an error, it is changed to T-T-C-G. This specific type of mutation is best classified as a:", "options": [{"text": "Deletion", "isCorrect": false, "rationale": "A deletion involves the removal of a base, which did not occur here as the sequence length remains the same."}, {"text": "Insertion", "isCorrect": false, "rationale": "An insertion involves the addition of an extra base, which did not occur here as the sequence length remains the same."}, {"text": "Substitution", "isCorrect": true, "rationale": "The original 'A' has been replaced by a 'T' (T-A-C-G changed to T-T-C-G), which is the definition of a substitution mutation: 'One base is replaced by a different base.'"}, {"text": "Frameshift", "isCorrect": false, "rationale": "A frameshift mutation results from insertions or deletions that alter the reading frame. A substitution, unless it creates a stop codon in a specific location, typically does not cause a frameshift."}]}, {"question": "According to the 'Think Deeper' section, why is a frameshift mutation (insertion or deletion) generally considered more damaging than a substitution mutation?", "options": [{"text": "Frameshift mutations are always caused by harmful chemicals, unlike substitutions.", "isCorrect": false, "rationale": "While chemicals can cause mutations, the text states mutations can also occur spontaneously or during replication, and the cause is not the primary reason for their greater damage."}, {"text": "A frameshift alters only one codon, leading to a minor change in the protein.", "isCorrect": false, "rationale": "This statement describes the potential impact of a substitution mutation; frameshifts alter all subsequent codons."}, {"text": "Frameshift mutations change the amino acid sequence from the point of mutation onward, often creating a nonfunctional protein.", "isCorrect": true, "rationale": "The 'Think Deeper' guidance explains that 'A frameshift mutation shifts every codon downstream of the insertion or deletion point, changing the amino acid sequence for the entire rest of the protein. This almost always produces a completely nonfunctional protein.'"}, {"text": "Substitution mutations cause the ribosome to stop prematurely, while frameshifts do not.", "isCorrect": false, "rationale": "Both types of mutations can potentially lead to premature stop codons, but frameshifts are generally more disruptive because they change the entire 'reading frame' from the point of mutation."}]}, {"question": "If a cell were unable to produce functional ribosomes, which specific process crucial for gene expression would be directly impaired?", "options": [{"text": "DNA replication", "isCorrect": false, "rationale": "DNA replication involves DNA polymerase and other enzymes, not ribosomes, and is about copying DNA itself."}, {"text": "Transcription", "isCorrect": false, "rationale": "Transcription is the synthesis of mRNA from DNA, carried out by RNA polymerase in the nucleus, not by ribosomes."}, {"text": "Translation", "isCorrect": true, "rationale": "The text clearly states that 'Translation occurs at ribosomes in the cytoplasm.' Without functional ribosomes, the cell would be unable to translate mRNA into protein."}, {"text": "DNA repair", "isCorrect": false, "rationale": "DNA repair involves various enzymes that correct errors in DNA, a process separate from ribosome function."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
