    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 26, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following scenarios best illustrates the concept of 'ecosystem diversity'?", "options": [{"text": "A population of deer displaying a wide range of coat colors and antler sizes.", "isCorrect": false, "rationale": "This describes genetic diversity, which is the variation within a single species."}, {"text": "A protected area encompassing a desert, a mountain range, a river, and a forest.", "isCorrect": true, "rationale": "Ecosystem diversity refers to the variety of different ecosystems within a region, such as deserts, mountains, rivers, and forests, all present in one landscape."}, {"text": "A coral reef teeming with hundreds of different fish species, invertebrates, and algae.", "isCorrect": false, "rationale": "This is an example of high species diversity, which measures the number and relative abundance of different species in a specific area."}, {"text": "A scientist discovering a new antibiotic compound from a previously unknown plant species.", "isCorrect": false, "rationale": "This highlights a provisioning ecosystem service (medicines) and underscores the value of species, but does not directly define ecosystem diversity itself."}], "id": "q01"}, {"question": "The process of a wetland naturally filtering pollutants from water, making it safe for other organisms and human consumption, is an example of which type of ecosystem service?", "options": [{"text": "Provisioning service", "isCorrect": false, "rationale": "Provisioning services refer to direct products like food, water (as a product, not purification), timber, or medicines."}, {"text": "Regulating service", "isCorrect": true, "rationale": "Regulating services involve natural processes that regulate environmental conditions, such as water purification, flood control, climate regulation, and pollination."}, {"text": "Supporting service", "isCorrect": false, "rationale": "Supporting services are fundamental processes that underpin all other services, like nutrient cycling, soil formation, and photosynthesis."}, {"text": "Cultural service", "isCorrect": false, "rationale": "Cultural services provide nonmaterial benefits, such as recreation, aesthetic beauty, or spiritual value."}], "id": "q02"}, {"question": "A large forest is cleared to make way for a new agricultural monoculture. This action most directly contributes to which primary threat to biodiversity according to the HIPCO acronym?", "options": [{"text": "Invasive species", "isCorrect": false, "rationale": "While agricultural areas can be susceptible to invasive species, the primary threat described here is the conversion of natural habitat."}, {"text": "Pollution", "isCorrect": false, "rationale": "Agriculture can lead to pollution (e.g., pesticides), but the initial act of clearing the forest specifically targets the physical space."}, {"text": "Climate change", "isCorrect": false, "rationale": "Deforestation contributes to climate change, but the direct impact on biodiversity from clearing the land is not climate change itself."}, {"text": "Habitat loss and degradation", "isCorrect": true, "rationale": "The clearing of a forest for agriculture is a direct example of habitat loss, which is identified as the single greatest threat to biodiversity. It eliminates the physical space and resources that species need to survive."}], "id": "q03"}, {"question": "Which of the following is a key characteristic of the latitudinal diversity gradient?", "options": [{"text": "Species diversity is highest at the poles and decreases towards the equator.", "isCorrect": false, "rationale": "The latitudinal diversity gradient states the opposite: species diversity increases from the poles toward the equator."}, {"text": "Tropical regions, like rainforests and coral reefs, typically have more species per unit area than temperate regions.", "isCorrect": true, "rationale": "The latitudinal diversity gradient describes the trend where species diversity increases from the poles toward the equator, with tropical regions exhibiting significantly higher biodiversity due to factors like more solar energy, warmer temperatures, and stable climates."}, {"text": "Genetic diversity within a species is higher in temperate zones due to seasonal variations.", "isCorrect": false, "rationale": "The gradient specifically refers to species diversity across latitudes, not genetic diversity, and genetic diversity is often linked to the overall health and resilience of populations, not necessarily higher in temperate zones."}, {"text": "Ecosystem diversity is greater in polar regions due to extreme environmental conditions.", "isCorrect": false, "rationale": "Ecosystem diversity, like species diversity, tends to be lower in polar regions compared to tropical ones, which typically exhibit a wider variety of ecosystems."}], "id": "q04"}, {"question": "The construction of a series of vegetated overpasses and underpasses across a major highway, allowing wildlife to safely cross, is an example of which conservation strategy?", "options": [{"text": "Protected areas", "isCorrect": false, "rationale": "Protected areas involve setting aside large tracts of land or ocean with minimal human disturbance; wildlife corridors complement, but are distinct from, establishing new protected areas."}, {"text": "Habitat restoration", "isCorrect": false, "rationale": "Habitat restoration focuses on repairing degraded ecosystems, not necessarily connecting existing fragmented ones, although corridors can be part of a broader restoration effort."}, {"text": "Captive breeding and reintroduction", "isCorrect": false, "rationale": "Captive breeding and reintroduction programs focus on increasing the population of critically endangered species in controlled environments; this strategy deals with connecting wild populations."}, {"text": "Wildlife corridors", "isCorrect": true, "rationale": "Wildlife corridors are designed to connect isolated habitat fragments, allowing animals to move between populations. This helps maintain genetic diversity and enables migration, directly addressing the issue of habitat fragmentation caused by human infrastructure like highways."}], "id": "q05"}, {"question": "Which of the following statements about Edward O. Wilson's contributions is NOT accurate?", "options": [{"text": "He was a leading expert on ants (myrmecology).", "isCorrect": false, "rationale": "Wilson was indeed the world's leading expert on ants, discovering hundreds of species and pioneering their chemical communication."}, {"text": "He co-developed the theory of island biogeography, which describes how species numbers on islands relate to their size and distance from the mainland.", "isCorrect": false, "rationale": "Wilson developed the theory of island biogeography with Robert MacArthur, a finding crucial for habitat conservation."}, {"text": "He proposed that species extinction rates are decreasing due to modern conservation efforts.", "isCorrect": true, "rationale": "Wilson estimated that Earth was losing approximately 30,000 species per year, a rate far exceeding natural background extinction. He passionately advocated for protecting biodiversity and warned against ongoing mass extinction, not claimed a decrease in rates."}, {"text": "He coined the term 'biodiversity' and was a tireless advocate for its protection, proposing the 'Half-Earth' initiative.", "isCorrect": false, "rationale": "Wilson coined 'biodiversity' and advocated for protecting half of Earth's surface for nature, known as the 'Half-Earth' proposal."}], "id": "q06"}, {"question": "A population of a specific plant species has very low genetic diversity. How might this characteristic affect the species' long-term survival?", "options": [{"text": "It makes the species highly adaptable to changing environmental conditions.", "isCorrect": false, "rationale": "High genetic diversity provides a wider range of traits, increasing the likelihood that some individuals will possess advantageous traits for adaptation. Low diversity limits this adaptability."}, {"text": "It ensures the species will be more resistant to new diseases and pests.", "isCorrect": false, "rationale": "Low genetic diversity means fewer different immune responses or resistance traits within the population, making it more vulnerable to a single disease or pest outbreak that could wipe out the entire population."}, {"text": "It increases the species' resilience to disturbances and potential for survival.", "isCorrect": false, "rationale": "Resilience is directly tied to the ability to adapt, which is hindered by low genetic diversity. A population with high genetic diversity is more resilient."}, {"text": "It reduces the species' ability to adapt to new threats like climate change or new pathogens.", "isCorrect": true, "rationale": "Genetic diversity represents the range of genetic variation within a species. A population with low genetic diversity has fewer different traits, making it less likely that some individuals will possess traits necessary to survive changing conditions, new diseases, or environmental stresses, thus reducing its adaptive capacity and resilience."}], "id": "q07"}, {"question": "The brown tree snake was accidentally introduced to Guam, where it had no natural predators. It rapidly spread, causing the extinction of several native bird species. This is a classic example of biodiversity loss due to which threat?", "options": [{"text": "Overexploitation", "isCorrect": false, "rationale": "Overexploitation refers to overhunting, overfishing, or overcollecting, which is not what happened with the brown tree snake."}, {"text": "Pollution", "isCorrect": false, "rationale": "Pollution involves the introduction of harmful substances into the environment; the snake itself is a biological threat, not a pollutant."}, {"text": "Climate change", "isCorrect": false, "rationale": "Climate change involves shifts in global weather patterns and temperatures; the snake's impact is a direct biological interaction, not climate-driven."}, {"text": "Invasive species", "isCorrect": true, "rationale": "An invasive species is a non-native species introduced to a new environment where it lacks natural predators or competitors, allowing it to spread rapidly and harm native species, often leading to extinctions, as seen with the brown tree snake in Guam."}], "id": "q08"}, {"question": "Economists estimate the total value of Earth's ecosystem services to be tens of trillions of dollars per year. What is the primary implication of this economic valuation?", "options": [{"text": "It means that most countries already include these values in their Gross Domestic Product (GDP).", "isCorrect": false, "rationale": "The text states this value 'far exceeding the gross domestic product of any single nation,' implying these services are often taken for granted and not typically fully accounted for in conventional economic metrics like GDP."}, {"text": "It proves that conservation efforts are inherently unprofitable and costly.", "isCorrect": false, "rationale": "Conversely, this valuation suggests that conserving ecosystems provides immense economic benefits, making the costs of conservation potentially far less than the cost of losing or replacing these services."}, {"text": "It highlights that the benefits provided by healthy ecosystems often surpass the economic output of human industries, making their degradation extremely expensive.", "isCorrect": true, "rationale": "The high economic valuation of ecosystem services underscores their immense, often unacknowledged, contribution to human well-being and the global economy. When these services degrade, they must be replaced by expensive human-engineered alternatives or are lost entirely, indicating that degradation is indeed very costly."}, {"text": "It indicates that artificial alternatives to natural processes are usually cheaper to implement.", "isCorrect": false, "rationale": "The text states that when ecosystems degrade, these services 'must be replaced by expensive human-engineered alternatives,' implying that artificial solutions are generally more costly, not cheaper."}], "id": "q09"}, {"question": "An ecosystem with a high degree of species richness and evenness is generally considered more stable and resilient. This implies that:", "options": [{"text": "Such an ecosystem is more likely to experience rapid shifts in its dominant species.", "isCorrect": false, "rationale": "Increased stability and resilience suggest a greater ability to resist significant changes, not to experience rapid shifts in dominant species."}, {"text": "It is less vulnerable to the impact of a single species' decline or an environmental disturbance.", "isCorrect": true, "rationale": "High biodiversity, characterized by many species and their even distribution, provides redundancy and a wider array of functional roles. If one species declines or a disturbance occurs, other species can often compensate, making the overall ecosystem less likely to collapse and more resilient to change."}, {"text": "Its complexity makes it more difficult for new species to establish and thrive.", "isCorrect": false, "rationale": "While highly diverse ecosystems can have complex interactions, stability and resilience don't inherently mean they are difficult for new species to establish, especially if those species can integrate into the existing web of life without being invasive."}, {"text": "The energy flow within the ecosystem is typically slower and less efficient.", "isCorrect": false, "rationale": "Biodiversity often leads to more complex food webs and nutrient cycling, which can be more efficient in utilizing resources, not necessarily slower or less efficient."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
