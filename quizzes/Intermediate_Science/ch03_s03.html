<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, what is the maximum number of electrons that can be held in the third energy level of an atom, considering the simplified rule for the first 20 elements?", "options": [{"text": "2 electrons", "isCorrect": false, "rationale": "2 electrons is the maximum for the first energy level, not the third."}, {"text": "8 electrons", "isCorrect": true, "rationale": "The text states that for the first 20 elements, the third level fills to 8 electrons before the fourth level begins to accept electrons, simplifying the general $2n^2$ rule for this specific context."}, {"text": "18 electrons", "isCorrect": false, "rationale": "18 electrons is the theoretical maximum for the third energy level according to the $2n^2$ formula, but the text specifies a simplified rule of 8 for the first 20 elements relevant to this course."}, {"text": "32 electrons", "isCorrect": false, "rationale": "32 electrons is the theoretical maximum for the fourth energy level, not the third."}], "id": "q01"}, {"question": "What is the correct electron configuration for a neutral sulfur atom ($Z = 16$)?", "options": [{"text": "2–8–6", "isCorrect": true, "rationale": "A neutral sulfur atom has 16 electrons. The first energy level holds 2, the second holds 8, leaving 6 electrons for the third energy level (2 + 8 + 6 = 16)."}, {"text": "2–6–8", "isCorrect": false, "rationale": "Energy levels must be filled in sequential order (1st, then 2nd, then 3rd). This option shows an incorrect order and capacity for the second level."}, {"text": "2–8–8", "isCorrect": false, "rationale": "This configuration represents 18 electrons (2+8+8), which is not the correct number for sulfur (Z=16)."}, {"text": "2–14", "isCorrect": false, "rationale": "This configuration incorrectly combines electrons into the second shell beyond its capacity of 8 and implies only two shells, which is incorrect for 16 electrons."}], "id": "q02"}, {"question": "An atom has 11 protons. Which of the following statements correctly describes its electron configuration and number of valence electrons?", "options": [{"text": "Its electron configuration is 2–8–1, and it has 1 valence electron.", "isCorrect": true, "rationale": "An atom with 11 protons (Sodium) has 11 electrons in its neutral state. Filling the shells gives 2 in the first, 8 in the second, and the remaining 1 in the third (2-8-1). The outermost electron (1) is the valence electron."}, {"text": "Its electron configuration is 2–8–8–1, and it has 1 valence electron.", "isCorrect": false, "rationale": "This configuration represents 19 electrons, which corresponds to an atom with 19 protons (Potassium), not 11."}, {"text": "Its electron configuration is 2–8–3, and it has 3 valence electrons.", "isCorrect": false, "rationale": "This configuration represents 13 electrons (Aluminum), not 11."}, {"text": "Its electron configuration is 2–8–0–1, and it has 1 valence electron.", "isCorrect": false, "rationale": "Electron configurations do not typically use a '0' for an occupied energy level, and this format is incorrect."}], "id": "q03"}, {"question": "Which of the following elements is expected to be the most chemically stable and least reactive based on its electron configuration?", "options": [{"text": "Oxygen (2–6)", "isCorrect": false, "rationale": "Oxygen has 6 valence electrons and tends to gain 2 electrons to achieve a stable octet, making it reactive."}, {"text": "Sodium (2–8–1)", "isCorrect": false, "rationale": "Sodium has 1 valence electron and readily loses it to achieve a stable octet, making it highly reactive."}, {"text": "Chlorine (2–8–7)", "isCorrect": false, "rationale": "Chlorine has 7 valence electrons and readily gains 1 electron to achieve a stable octet, making it highly reactive."}, {"text": "Neon (2–8)", "isCorrect": true, "rationale": "Neon has a completely filled outermost energy level (8 valence electrons), making it a noble gas, which is described as 'the most stable and least reactive elements' due to its full outer shell."}], "id": "q04"}, {"question": "A neutral atom has an electron configuration of 2–8–7. How many valence electrons does it have, and what is its most likely chemical behavior?", "options": [{"text": "2 valence electrons; tends to lose electrons.", "isCorrect": false, "rationale": "The outermost shell has 7 electrons, not 2. An atom with 7 valence electrons tends to gain, not lose."}, {"text": "7 valence electrons; tends to gain one electron.", "isCorrect": true, "rationale": "The outermost energy level is the third, with 7 electrons, so there are 7 valence electrons. Atoms with 7 valence electrons tend to gain one electron to complete their octet (8 electrons) and become stable."}, {"text": "7 valence electrons; tends to lose seven electrons.", "isCorrect": false, "rationale": "While it has 7 valence electrons, losing 7 electrons is energetically much less favorable than gaining 1 electron to achieve an octet."}, {"text": "8 valence electrons; tends to be unreactive.", "isCorrect": false, "rationale": "The atom has 7 valence electrons, not 8. An atom with 8 valence electrons would be a noble gas and unreactive."}], "id": "q05"}, {"question": "Which of the following correctly represents the Lewis dot structure for a neutral boron atom ($Z=5$)?", "options": [{"text": "Boron with 2 dots.", "isCorrect": false, "rationale": "Boron's electron configuration is 2-3, meaning it has 3 valence electrons, not 2."}, {"text": "Boron with 3 dots.", "isCorrect": true, "rationale": "Boron ($Z=5$) has an electron configuration of 2–3. Its outermost energy level contains 3 electrons, which are its valence electrons. A Lewis dot structure shows the element symbol surrounded by dots representing valence electrons, so 3 dots are correct."}, {"text": "Boron with 5 dots.", "isCorrect": false, "rationale": "5 is the total number of electrons for boron, not the number of valence electrons."}, {"text": "Boron with 8 dots.", "isCorrect": false, "rationale": "8 dots would represent a full octet, which boron does not naturally have as a neutral atom."}], "id": "q06"}, {"question": "Why is understanding an element's electron configuration considered 'the key to predicting an element's chemical behavior'?", "options": [{"text": "It determines the number of protons, which dictates atomic identity.", "isCorrect": false, "rationale": "While the number of protons dictates atomic identity, electron configuration, specifically valence electrons, dictates chemical behavior, not proton count directly."}, {"text": "It reveals the total number of subatomic particles in the atom.", "isCorrect": false, "rationale": "Electron configuration focuses on electron arrangement, not the total count of all subatomic particles, which doesn't directly predict chemical behavior in the same way."}, {"text": "It shows the arrangement of electrons, especially valence electrons, which participate in bonding.", "isCorrect": true, "rationale": "The text explicitly states that 'Understanding electron arrangement is the key to predicting an element's chemical behavior' because valence electrons, shown by the configuration, are the ones involved in chemical bonding."}, {"text": "It helps visualize the nucleus and its stability through nuclear forces.", "isCorrect": false, "rationale": "Electron configuration describes the electron cloud, not the nucleus or nuclear forces. Nuclear stability is related to protons and neutrons, not electron configuration."}], "id": "q07"}, {"question": "How does a Bohr diagram primarily differ from an electron configuration notation (e.g., 2–8–1)?", "options": [{"text": "A Bohr diagram only shows valence electrons, while electron configuration shows all.", "isCorrect": false, "rationale": "A Bohr diagram shows all electrons arranged in their respective shells, not just valence electrons."}, {"text": "A Bohr diagram is a visual representation, while electron configuration is a numerical description.", "isCorrect": true, "rationale": "The text defines a Bohr diagram as a 'visual representation' with concentric circles and dots, while electron configuration is a 'description of how electrons are distributed' using numbers (e.g., 2-8-1)."}, {"text": "Electron configuration shows the nucleus's composition, while a Bohr diagram only shows electrons.", "isCorrect": false, "rationale": "A Bohr diagram typically includes the number of protons and neutrons in the nucleus, whereas electron configuration notation only describes electron distribution."}, {"text": "Electron configuration is used only for ions, while Bohr diagrams are for neutral atoms.", "isCorrect": false, "rationale": "Both electron configurations and Bohr diagrams are primarily used for neutral atoms, though configurations can be adapted for ions."}], "id": "q08"}, {"question": "The text mentions that lithium (2–1), sodium (2–8–1), and potassium (2–8–8–1) all have one valence electron. Based on this observation and the principles of electron configuration, what can be inferred about elements in the same vertical column (group) of the periodic table?", "options": [{"text": "They have the same total number of electrons.", "isCorrect": false, "rationale": "Elements in the same group have increasing total numbers of electrons as you move down the column (e.g., Li has 3, Na has 11, K has 19)."}, {"text": "They exhibit similar chemical properties because they have the same number of valence electrons.", "isCorrect": true, "rationale": "The 'Think Deeper' section and teacher's note directly state that elements in the same group have the same number of valence electrons, and since valence electrons determine chemical behavior, these elements behave similarly."}, {"text": "They have identical electron configurations, differing only in atomic mass.", "isCorrect": false, "rationale": "Their electron configurations are not identical; they have different numbers of inner shells, though the outermost shell has the same electron count."}, {"text": "Their inner electrons are primarily responsible for their shared chemical behaviors.", "isCorrect": false, "rationale": "The text emphasizes that valence electrons (outermost electrons) are responsible for chemical bonding and reactivity, not inner electrons."}], "id": "q09"}, {"question": "Sodium (Na) has 1 valence electron, and chlorine (Cl) has 7 valence electrons. According to the octet rule and the tendencies described, what is the most likely outcome when sodium and chlorine react?", "options": [{"text": "Sodium will gain 7 electrons, and chlorine will lose 1 electron.", "isCorrect": false, "rationale": "Sodium (1 valence electron) tends to lose 1, not gain 7. Chlorine (7 valence electrons) tends to gain 1, not lose 1."}, {"text": "Sodium will share its electron with chlorine to achieve a duet.", "isCorrect": false, "rationale": "Sodium tends to lose its electron, and chlorine tends to gain one. This typically results in an ionic bond, not a covalent sharing to form a duet for chlorine."}, {"text": "Sodium will lose its 1 valence electron, and chlorine will gain 1 electron, forming an ionic compound.", "isCorrect": true, "rationale": "The text explains that atoms tend to gain, lose, or share electrons until they achieve a full outer shell (octet). Sodium (1 valence) tends to lose its electron, becoming stable with a +1 charge. Chlorine (7 valence) tends to gain one electron, becoming stable with a -1 charge. This transfer of electrons forms an ionic bond, as explicitly stated for sodium chloride."}, {"text": "Both atoms will lose all their electrons to become stable.", "isCorrect": false, "rationale": "Atoms do not lose all their electrons to become stable. They achieve stability by gaining, losing, or sharing valence electrons to complete their outermost shell (octet rule)."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
