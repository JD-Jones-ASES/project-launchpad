    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 0, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary reason scientists use models to study complex phenomena?", "options": [{"text": "To create exact replicas of observable phenomena for perfect accuracy.", "isCorrect": false, "rationale": "Scientific models are simplified representations, not exact replicas. Their purpose is to manage complexity, not perfectly replicate it."}, {"text": "To simplify complex systems, enabling understanding, explanation, and prediction about the real world.", "isCorrect": true, "rationale": "The text defines models as 'a simplified representation of something complex that helps us understand, explain, and make predictions about the real world.'"}, {"text": "To prove their hypotheses definitively without needing real-world experiments or observations.", "isCorrect": false, "rationale": "Models help test hypotheses, but real-world experiments and data are still crucial for validation and refinement. Models are tools for investigation, not substitutes for empirical evidence."}, {"text": "To ensure every minute detail of a system is represented for complete knowledge.", "isCorrect": false, "rationale": "Models deliberately omit less relevant details to focus on the most important parts, making the system manageable for study."}]}, {"question": "A meteorologist uses a complex set of equations to predict the path and intensity of a hurricane. What type of scientific model is this?", "options": [{"text": "Physical model", "isCorrect": false, "rationale": "A physical model is a three-dimensional representation that can be seen and touched, like a toy airplane or a globe."}, {"text": "Conceptual model", "isCorrect": false, "rationale": "A conceptual model is a description, diagram, or analogy that explains how something works using familiar ideas, such as a food web diagram or the water pipe analogy for electricity."}, {"text": "Mathematical model", "isCorrect": true, "rationale": "A mathematical model uses equations or a set of equations to describe quantitative relationships between variables, allowing for precise, numerical predictions, as in the example of hurricane prediction equations."}, {"text": "Analogical model", "isCorrect": false, "rationale": "An analogical model is a type of conceptual model that compares an unfamiliar process to a familiar one. While prediction involves complex processes, equations directly fall under mathematical models."}]}, {"question": "Which of the following best highlights a key strength of mathematical models compared to physical or conceptual models?", "options": [{"text": "Their ability to be physically manipulated and observed in three dimensions.", "isCorrect": false, "rationale": "This describes a strength of physical models."}, {"text": "Their capacity for precise, numerical predictions that can be rigorously tested against experimental data.", "isCorrect": true, "rationale": "The text states mathematical models 'allow scientists to make precise, numerical predictions' and 'are especially powerful because they make predictions that can be tested against experimental data.'"}, {"text": "Their effectiveness in visually representing abstract relationships or complex structures.", "isCorrect": false, "rationale": "While mathematical models can be visualized, conceptual models (like diagrams) often excel at visually explaining abstract relationships."}, {"text": "Their simplicity in explaining how something works by using familiar ideas or metaphors.", "isCorrect": false, "rationale": "This describes a strength of conceptual models, particularly analogies."}]}, {"question": "The text states that a globe, a physical model of Earth, 'leaves out countless details' such as individual mountains and cities. Despite these omissions, why is it considered a useful scientific model?", "options": [{"text": "Because its small size makes it convenient for storage and transport.", "isCorrect": false, "rationale": "While convenience is a practical benefit, the core scientific utility of simplification is deeper than just physical size."}, {"text": "Its deliberate simplification allows scientists and students to focus on essential features and large-scale relationships without being overwhelmed by unnecessary complexity.", "isCorrect": true, "rationale": "The text explicitly states that simplification in models is 'deliberate' to highlight 'the most important features' and make it 'easier to study than the real planet.'"}, {"text": "It provides an exact, scaled-down replica of Earth's surface for precise measurements of every detail.", "isCorrect": false, "rationale": "The text states it 'leaves out countless details,' so it is not an exact replica for every detail."}, {"text": "It can be easily updated with new geographical discoveries and changes, making it perpetually current.", "isCorrect": false, "rationale": "While globes can be updated, this is not the primary reason for their usefulness as models despite simplification. The main point is how simplification aids understanding."}]}, {"question": "A scientist develops a computer model to simulate the behavior of a new material at extremely high temperatures. The model accurately predicts the material's properties up to 1000°C but becomes unreliable above that temperature. What does this scenario best illustrate about scientific models?", "options": [{"text": "The model is fundamentally flawed and should be discarded, as it cannot explain all conditions.", "isCorrect": false, "rationale": "The text explains that models have 'boundaries beyond which it stops being accurate' and are not necessarily 'perfect.' The model is useful within its defined limits."}, {"text": "The model possesses inherent limitations and 'boundaries' beyond which it may not be accurate, requiring scientists to be aware of and potentially revise them.", "isCorrect": true, "rationale": "The text states, 'Every model has boundaries beyond which it stops being accurate' and 'Knowing where a model breaks down is just as important as knowing where it works.'"}, {"text": "The material itself behaves unpredictably above a certain temperature, making any model impossible.", "isCorrect": false, "rationale": "While materials can have complex behaviors, the scenario specifically focuses on the model's performance, not necessarily the inherent unpredictability of the material preventing any model."}, {"text": "All computer models are inherently limited and cannot fully represent reality due to their digital nature.", "isCorrect": false, "rationale": "While all models have limitations, this statement is too broad and singles out computer models. The issue of 'boundaries' applies to all types of scientific models."}]}, {"question": "The history of atomic models, from Dalton's solid spheres to the quantum mechanical probability clouds, illustrates a fundamental principle about scientific models. What is this principle?", "options": [{"text": "Older models are always completely wrong and are discarded in favor of entirely new, perfect models.", "isCorrect": false, "rationale": "The text states, 'Each successive model was not 'wrong' — it was incomplete.' Old models explained existing evidence before new evidence emerged."}, {"text": "Scientific models are static and, once proposed, remain unchanged as long as they are useful for some purpose.", "isCorrect": false, "rationale": "The text explicitly states, 'One of the most important things to understand about scientific models is that they evolve.'"}, {"text": "Models evolve by incorporating new evidence that the previous models could not explain, making them more comprehensive and accurate.", "isCorrect": true, "rationale": "The text explains, 'When new evidence is discovered that a model cannot explain... they modify it, extend it, or sometimes replace it with a better model that accounts for the new evidence while still explaining everything the old model got right.'"}, {"text": "The most complex models are always the most accurate and useful, regardless of the evidence.", "isCorrect": false, "rationale": "Models aim for simplification, and complexity doesn't inherently guarantee accuracy or usefulness. Usefulness depends on its purpose and explanatory power."}]}, {"question": "John Dalton's early 19th-century atomic model proposed that atoms were tiny, indivisible spheres. How did J. J. Thomson's discovery of the electron challenge this model?", "options": [{"text": "Thomson's experiments proved that atoms were not perfectly spherical in shape.", "isCorrect": false, "rationale": "While later models refined the atom's internal structure, the primary challenge to Dalton was not about the atom's overall shape but its indivisibility."}, {"text": "The discovery of electrons, as charged particles existing *within* the atom, directly contradicted Dalton's concept of atoms being indivisible.", "isCorrect": true, "rationale": "The text states, 'But when J. J. Thomson discovered the electron in 1897, Dalton's model could not account for the existence of charged particles inside the atom.' This made atoms divisible."}, {"text": "Thomson's findings showed that atoms were much larger than Dalton had originally imagined.", "isCorrect": false, "rationale": "The challenge wasn't primarily about the atom's size but its internal composition and indivisibility."}, {"text": "Electrons were found to orbit a central nucleus, a feature not present in Dalton's simple sphere model.", "isCorrect": false, "rationale": "The concept of electrons orbiting a nucleus was proposed later by Rutherford and refined by Bohr, not by Thomson."}]}, {"question": "According to Niels Bohr, as quoted in the 'Scientist Spot,' what is the fundamental purpose of a scientific model?", "options": [{"text": "To provide a photographic, exact replica of nature's reality in all its aspects.", "isCorrect": false, "rationale": "Bohr explicitly stated that scientific models are 'not photographs of reality.'"}, {"text": "To serve as a tool that helps us understand what we can *say* about nature, rather than describing what nature *is*.", "isCorrect": true, "rationale": "Bohr once wrote that 'a model's purpose is not to describe what nature is, but to help us understand what we can say about nature.'"}, {"text": "To confirm pre-existing philosophical ideas about the universe, guiding scientific inquiry.", "isCorrect": false, "rationale": "While philosophy can influence science, Bohr's statement emphasizes understanding based on evidence, not just confirming pre-existing ideas."}, {"text": "To predict the future with 100% certainty across all conditions and contexts.", "isCorrect": false, "rationale": "Models have limitations and boundaries, meaning predictions are not always 100% certain or applicable universally."}]}, {"question": "In the 'Plant Growth Experiment' described, what is identified as the dependent variable?", "options": [{"text": "Type of seed used", "isCorrect": false, "rationale": "The type of seed is listed as a 'Controlled variable' because it is kept the same across all groups to ensure a fair test."}, {"text": "Hours of light per day", "isCorrect": false, "rationale": "The hours of light per day is the 'Independent variable' because it is intentionally changed by the experimenter."}, {"text": "Amount of water given daily", "isCorrect": false, "rationale": "The amount of water is listed as a 'Controlled variable' to ensure consistency across all experimental groups."}, {"text": "Plant height (measured in cm)", "isCorrect": true, "rationale": "The 'Dependent variable' is the outcome that is measured, which in this experiment is 'plant height (measured in cm),' as it is expected to change in response to the independent variable."}]}, {"question": "The 'Plant Growth Experiment' procedure specifies using '5 pots per group instead of just one.' What is the main scientific reason for using multiple pots (replicates) within each group?", "options": [{"text": "To ensure a higher chance that at least one plant will survive in each group for observation.", "isCorrect": false, "rationale": "While survival is important, the primary scientific reason for replication goes beyond simply having a plant. It's about data quality."}, {"text": "To provide enough plants for visually appealing photographs and presentations of the results.", "isCorrect": false, "rationale": "Aesthetic reasons are not the scientific basis for experimental design choices like replication."}, {"text": "To minimize the impact of individual variations or random anomalies among plants and increase the reliability and statistical validity of the overall results.", "isCorrect": true, "rationale": "Using multiple replicates helps to average out random variations inherent in biological systems (e.g., slight differences in seed quality, germination rate, or pot conditions), making the observed trends more robust and reliable. It increases the confidence that any differences between groups are due to the independent variable, not random chance."}, {"text": "To ensure that the experiment takes a longer time, allowing for more detailed daily observations.", "isCorrect": false, "rationale": "Replication does not inherently extend the experiment's duration; the duration is a separate controlled variable. Its purpose is to improve the quality of data collected over the set period."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
