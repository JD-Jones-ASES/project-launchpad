</head>
<body>
<div class="quiz-container">

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>

        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

<script>
var QUESTIONS = [{"question": "Which of the following activities in the human body relies directly or indirectly on energy ultimately derived from the Sun?", "options": [{"text": "The processing of electrical signals by the brain.", "isCorrect": false, "rationale": "While brain activity requires energy, this option is too specific and misses the broader point that *all* listed activities ultimately trace back to the Sun, making another option more comprehensive."}, {"text": "The contraction of muscles when walking or blinking.", "isCorrect": false, "rationale": "Muscle contraction consumes ATP for energy, but this option is too specific and doesn't capture the universality of the Sun as the ultimate energy source for all bodily functions."}, {"text": "The rhythmic beating of the heart.", "isCorrect": false, "rationale": "Heartbeats require continuous energy, but this option, like others, is too specific. The text states that 'Every one of these activities requires energy. ... The answer traces back to a single source: the Sun.'"}, {"text": "All cellular functions, including heartbeats, breathing, brain activity, and muscle contraction.", "isCorrect": true, "rationale": "The introductory paragraph explicitly states that 'Every one of these activities requires energy. ... The answer traces back to a single source: the Sun,' indicating that all bodily functions, down to the cellular level, are ultimately powered by the Sun."}], "id": "q01"}, {"question": "A newly discovered single-celled organism lives in an environment completely devoid of sunlight but thrives by utilizing chemical reactions involving inorganic iron compounds. How would this organism be classified?", "options": [{"text": "As a heterotroph, because it does not use sunlight for energy.", "isCorrect": false, "rationale": "Heterotrophs obtain energy by consuming other organisms. This organism is producing its own food, not consuming others, even without sunlight."}, {"text": "As an autotroph, specifically a chemotroph.", "isCorrect": true, "rationale": "Autotrophs produce their own food from inorganic molecules. Chemotrophs are a type of autotroph that obtains energy from chemical reactions involving inorganic substances, fitting the description of the new organism."}, {"text": "As an autotroph, specifically a phototroph.", "isCorrect": false, "rationale": "Phototrophs (like plants) use sunlight to produce food. This organism does not use sunlight."}, {"text": "As a decomposer, because it breaks down inorganic compounds.", "isCorrect": false, "rationale": "Decomposers are typically heterotrophs that break down organic matter. This organism is producing its own food from inorganic compounds, not decomposing organic material."}], "id": "q02"}, {"question": "According to the 'From Sun to Steak' SciConnection, what is the correct sequence of energy transfer that ultimately provides energy for a human eating a hamburger?", "options": [{"text": "Sun → Cow → Grass → Human", "isCorrect": false, "rationale": "This sequence is incorrect. The cow consumes the grass, so the energy flows from grass to cow, not the other way around."}, {"text": "Sun → Human → Grass → Cow", "isCorrect": false, "rationale": "This sequence is entirely incorrect, as the Sun is the initial source, and humans do not directly provide energy to grass or cows in this context."}, {"text": "Sun → Grass → Cow → Human", "isCorrect": true, "rationale": "This sequence correctly traces the energy flow: The Sun provides energy to the grass (an autotroph), which is eaten by the cow (a heterotroph), and the cow is then eaten by the human (a heterotroph)."}, {"text": "Sun → Hamburger → Human", "isCorrect": false, "rationale": "This sequence skips crucial steps. The hamburger itself is not an initial energy source; its energy content must be traced back further through the food chain."}], "id": "q03"}, {"question": "Why is ATP described as the 'energy currency' of the cell, while food is likened to a 'large-denomination bill'?", "options": [{"text": "Because food molecules are too large to enter the cell, whereas ATP can freely cross the cell membrane.", "isCorrect": false, "rationale": "The analogy is not about molecular size or membrane permeability, but about the direct usability of energy for cellular work."}, {"text": "Because cells can directly use the stored energy in ATP for immediate tasks, but must first convert the energy in food molecules.", "isCorrect": true, "rationale": "The text states that 'cells cannot use sunlight or the chemical energy in food directly. Instead, they must convert energy into a specific molecule that acts as a universal energy carrier. That molecule is adenosine triphosphate, or ATP.' Food contains a lot of energy, but it's not in a readily usable form for small, precise cellular tasks; it must be 'made change' into ATP."}, {"text": "Because ATP contains significantly more total energy than any typical food molecule.", "isCorrect": false, "rationale": "This is incorrect; food molecules (like glucose) contain much more total chemical energy than a single ATP molecule. The analogy is about usability and precision, not total energy content."}, {"text": "Because ATP is produced only by autotrophs, while food is consumed by heterotrophs.", "isCorrect": false, "rationale": "Both autotrophs and heterotrophs produce and use ATP. This option describes the roles of organisms, not the function of ATP or the analogy itself."}], "id": "q04"}, {"question": "What specifically happens to an ATP molecule when energy is released for cellular work?", "options": [{"text": "It gains a phosphate group, forming ADP.", "isCorrect": false, "rationale": "Adding a phosphate group to ADP *stores* energy, forming ATP. This is the reverse of energy release."}, {"text": "The nitrogen-containing base, adenine, is separated from the ribose sugar.", "isCorrect": false, "rationale": "The bond between adenine and ribose is stable and typically not broken to release energy for cellular work."}, {"text": "The bond between the second and third phosphate groups is broken, yielding ADP and a free phosphate group.", "isCorrect": true, "rationale": "The text clearly states, 'When the bond between the second and third phosphate group is broken, energy is released, and ATP becomes ADP (adenosine diphosphate) plus a free phosphate group.'"}, {"text": "It completely decomposes into its individual atoms, releasing all stored energy.", "isCorrect": false, "rationale": "ATP is recycled; it doesn't completely decompose. Such a breakdown would prevent its reuse as an energy carrier."}], "id": "q05"}, {"question": "Imagine a cell needs to synthesize a complex protein. Which molecule would directly provide the immediate energy for this process?", "options": [{"text": "Glucose", "isCorrect": false, "rationale": "Glucose is a primary source of energy, but it's a 'large-denomination bill' that must first be broken down to produce ATP before its energy can be used directly for protein synthesis."}, {"text": "Sunlight", "isCorrect": false, "rationale": "Sunlight is an ultimate energy source for autotrophs, but cells cannot use it directly for tasks like protein synthesis. It must be converted into chemical energy in ATP."}, {"text": "ADP", "isCorrect": false, "rationale": "ADP (adenosine diphosphate) is the 'uncharged' form of the energy currency; it needs to gain a phosphate group and energy to become ATP, which then provides the energy."}, {"text": "ATP", "isCorrect": true, "rationale": "The text identifies ATP as the 'universal energy carrier' and 'energy currency' that 'provides the immediate energy needed for cellular work,' including processes like protein synthesis."}], "id": "q06"}, {"question": "Which statement accurately describes the relationship between photosynthesis and cellular respiration?", "options": [{"text": "Photosynthesis is performed by autotrophs to produce ATP, while cellular respiration is performed by heterotrophs to consume ATP.", "isCorrect": false, "rationale": "Photosynthesis primarily produces glucose, not ATP directly for long-term storage, and both autotrophs and heterotrophs perform cellular respiration to produce ATP."}, {"text": "They are independent processes with no direct connection to each other's inputs or outputs.", "isCorrect": false, "rationale": "The text explicitly states: 'the products of photosynthesis (glucose and oxygen) are the reactants of cellular respiration, and vice versa,' highlighting their interdependence."}, {"text": "Photosynthesis produces glucose and oxygen, which are then used as reactants for cellular respiration.", "isCorrect": true, "rationale": "The text clearly states this relationship: 'the products of photosynthesis (glucose and oxygen) are the reactants of cellular respiration, and vice versa.' This forms a continuous cycle."}, {"text": "Cellular respiration produces glucose and water, which are then used as reactants for photosynthesis.", "isCorrect": false, "rationale": "This statement reverses the roles of glucose and water. Cellular respiration breaks down glucose and produces water, while photosynthesis builds glucose and consumes water."}], "id": "q07"}, {"question": "In the continuous cycle of energy flow on Earth, what role does oxygen (O2) play in the relationship between photosynthesis and cellular respiration?", "options": [{"text": "Oxygen is a byproduct of cellular respiration that is consumed by photosynthesis.", "isCorrect": false, "rationale": "This is incorrect. Carbon dioxide is produced by respiration and consumed by photosynthesis. Oxygen is consumed by respiration and produced by photosynthesis."}, {"text": "Oxygen is produced by photosynthesis and then consumed as a reactant in cellular respiration.", "isCorrect": true, "rationale": "The text states that 'Oxygen (O2) is released as a byproduct' of photosynthesis and that 'the products of photosynthesis (glucose and oxygen) are the reactants of cellular respiration,' indicating oxygen's role as a product that becomes a reactant."}, {"text": "Oxygen is only present in the atmosphere and does not participate in either process.", "isCorrect": false, "rationale": "This is incorrect; oxygen is a crucial molecule exchanged between these two vital processes."}, {"text": "Oxygen is primarily used to build glucose molecules during photosynthesis.", "isCorrect": false, "rationale": "Carbon dioxide (CO2) is used to build glucose, and oxygen (O2) is released as a byproduct, not primarily used for building glucose."}], "id": "q08"}, {"question": "If all green plants on Earth were to suddenly disappear, what would be the long-term impact on atmospheric carbon dioxide (CO2) levels and the survival of most heterotrophs?", "options": [{"text": "CO2 levels would decrease due to lack of photosynthesis, benefiting heterotrophs.", "isCorrect": false, "rationale": "If plants disappeared, photosynthesis (which consumes CO2) would cease, leading to an *increase* in CO2, not a decrease. Also, it would harm heterotrophs due to lack of food and oxygen."}, {"text": "CO2 levels would increase as respiration continues without photosynthetic uptake, threatening heterotrophs due to lack of food and oxygen.", "isCorrect": true, "rationale": "As discussed in the 'thinkdeeper' section, without plants, photosynthesis (CO2 consumption) would stop. Cellular respiration would continue for a while, releasing CO2, leading to increased atmospheric CO2. More critically, heterotrophs would lose their primary food source (plants or organisms that eat plants) and the oxygen produced by plants, leading to widespread collapse."}, {"text": "CO2 levels would remain stable as other organisms compensate, and heterotrophs would find new food sources.", "isCorrect": false, "rationale": "The disappearance of all green plants would have a drastic impact on global CO2 levels and food webs; other organisms could not sufficiently compensate for such a massive loss."}, {"text": "Atmospheric oxygen levels would increase significantly, leading to an imbalance that harms heterotrophs.", "isCorrect": false, "rationale": "Without plants, photosynthesis (which produces oxygen) would cease, causing atmospheric oxygen levels to *decrease*, not increase. This would be detrimental to most heterotrophs."}], "id": "q09"}, {"question": "Which statement best exemplifies the difference in how autotrophs and heterotrophs obtain the organic molecules necessary for their cells?", "options": [{"text": "A lion hunts and consumes a zebra for energy, while a mushroom breaks down a fallen log for nutrients.", "isCorrect": false, "rationale": "Both lions and mushrooms are heterotrophs (consumers). While they obtain food differently, they both get energy by consuming or breaking down existing organic matter, not by producing it from inorganic sources. This option describes two types of heterotrophic behavior, not the core difference between autotrophs and heterotrophs."}, {"text": "A plant uses sunlight to convert carbon dioxide and water into glucose, while a cow eats grass to obtain its energy.", "isCorrect": true, "rationale": "This option clearly distinguishes the two: the plant (autotroph) produces its own food (glucose) from inorganic molecules using light energy, while the cow (heterotroph) obtains its energy by consuming another organism (grass), which contains pre-formed organic molecules. This directly reflects the definitions given in the text."}, {"text": "Both autotrophs and heterotrophs perform cellular respiration to break down glucose and store energy in ATP.", "isCorrect": false, "rationale": "While true that both perform cellular respiration, this statement describes a shared process *after* obtaining organic molecules, not the fundamental difference in how they *obtain* those molecules in the first place."}, {"text": "Autotrophs are found in extreme environments like hydrothermal vents, whereas heterotrophs are found in more temperate climates.", "isCorrect": false, "rationale": "While some autotrophs (chemosynthetic bacteria) thrive in extreme environments, many (like plants and algae) live in temperate climates. Heterotrophs are found globally in all types of environments. This statement does not capture the fundamental difference in energy acquisition."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
