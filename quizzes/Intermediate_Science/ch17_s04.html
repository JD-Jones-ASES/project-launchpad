<script>
var QUESTIONS = [{"question": "Which statement accurately describes the concept of 'residence time' within Earth's water budget?", "options": [{"text": "It is the total volume of water stored in a particular reservoir at any given moment.", "isCorrect": false, "rationale": "Residence time refers to the duration, not the volume, of water in a reservoir. The total volume is part of the Earth's water budget but is distinct from residence time."}, {"text": "It is the rate at which water evaporates from a reservoir into the atmosphere.", "isCorrect": false, "rationale": "While evaporation is part of the water cycle, residence time is the average duration a water molecule spends in a reservoir, not a rate of transfer."}, {"text": "It is the average amount of time a water molecule spends in a particular reservoir before moving to another.", "isCorrect": true, "rationale": "The text explicitly defines residence time as 'the average amount of time a water molecule spends in a particular reservoir before moving to another.'"}, {"text": "It indicates the quality or purity of water in a specific reservoir.", "isCorrect": false, "rationale": "Residence time relates to the movement and storage duration of water, not its quality or purity."}], "id": "q01"}, {"question": "Given that less than 1% of Earth's water is readily available as freshwater for human use, what is the most significant implication for human societies?", "options": [{"text": "The vast majority of Earth's surface will always be covered by saltwater oceans.", "isCorrect": false, "rationale": "While true that most of Earth is covered by oceans, this statement doesn't address the direct implication of limited freshwater availability for human use, which is the core of the question."}, {"text": "Desalination technologies are universally adopted as the primary source of drinking water.", "isCorrect": false, "rationale": "While desalination is an option in some regions, it is not universally adopted due to high energy and infrastructure costs, and the text does not state it is primary. The most significant implication is broader."}, {"text": "Water conservation and effective management strategies become critical for sustainable development.", "isCorrect": true, "rationale": "The text states that 'Less than 1% of Earth's water is readily available as freshwater for human use. This fact makes water conservation and management critical.' This directly addresses the sustainability challenge posed by limited freshwater."}, {"text": "All major human settlements must be located directly adjacent to large freshwater lakes or rivers.", "isCorrect": false, "rationale": "While many settlements are near water sources, this is an overstatement and not a direct consequence of the 1% statistic. Many rely on groundwater or transported water."}], "id": "q02"}, {"question": "A community relies heavily on groundwater for its drinking supply. Over several decades, residents observe that their wells need to be dug progressively deeper to reach water. Which human impact described in the text best explains this observation?", "options": [{"text": "Eutrophication caused by agricultural runoff contaminating the groundwater.", "isCorrect": false, "rationale": "Eutrophication relates to water quality (algal blooms) and doesn't directly explain falling water levels, although agricultural runoff can be a source of contamination."}, {"text": "Urbanization leading to increased impervious surfaces and reduced infiltration.", "isCorrect": false, "rationale": "Urbanization does reduce infiltration, which can contribute to less groundwater recharge, but the primary cause of existing wells needing to be dug deeper points more directly to over-extraction rather than just reduced recharge."}, {"text": "Over-extraction, where groundwater is pumped faster than natural recharge occurs.", "isCorrect": true, "rationale": "The text states that 'Pumping groundwater faster than natural recharge leads to falling water tables, dried-up wells, and even land subsidence.' The need to dig wells deeper directly indicates a falling water table, which is a result of over-extraction."}, {"text": "Climate change altering precipitation patterns, leading to more frequent floods.", "isCorrect": false, "rationale": "While climate change affects precipitation, increased flooding usually means more surface water, not necessarily lower groundwater tables requiring deeper wells for extraction."}], "id": "q03"}, {"question": "How does the construction of extensive impervious surfaces in urban areas impact the local water cycle, according to the text?", "options": [{"text": "It enhances the natural purification of surface water through increased filtration.", "isCorrect": false, "rationale": "Impervious surfaces prevent water from soaking into the ground, thus decreasing natural filtration, not enhancing it."}, {"text": "It decreases runoff, allowing more water to infiltrate and recharge groundwater aquifers.", "isCorrect": false, "rationale": "The text states that urbanization (paving over land with impervious surfaces) 'increases runoff and decreases infiltration,' leading to less groundwater recharge."}, {"text": "It leads to increased runoff during storms and reduced groundwater recharge.", "isCorrect": true, "rationale": "The text explicitly states: 'Paving over land with impervious surfaces increases runoff and decreases infiltration, leading to more flooding during storms and less groundwater recharge.'"}, {"text": "It accelerates evaporation rates, thereby increasing local precipitation.", "isCorrect": false, "rationale": "While impervious surfaces can get hotter and potentially increase some evaporation, the primary impacts described are on runoff and infiltration, not a direct, significant increase in local precipitation."}], "id": "q04"}, {"question": "A river basin is defined as a specific area where all precipitation drains into a common body of water. What is the geological term for the high points of land that separate one such area from another?", "options": [{"text": "Aquifers", "isCorrect": false, "rationale": "Aquifers are porous rock or sediment layers that hold and transmit groundwater, not landforms separating drainage areas."}, {"text": "Water tables", "isCorrect": false, "rationale": "The water table is the upper surface of the saturated zone of groundwater, not a physical divide on the surface."}, {"text": "Divides", "isCorrect": true, "rationale": "The text states: 'Watersheds are separated by high points called divides. The Continental Divide in North America, for example, separates water that flows toward the Pacific Ocean from water that flows toward the Atlantic.'"}, {"text": "Groundwater zones", "isCorrect": false, "rationale": "Groundwater zones refer to the subsurface areas where water fills pore spaces, not surface features separating watersheds."}], "id": "q05"}, {"question": "In the 'Modeling Ocean Currents' investigation, when warm red water was gently poured into room-temperature water (Trial 1), it spread along the surface. This observation demonstrates which fundamental principle?", "options": [{"text": "Warm water has a higher viscosity than cold water.", "isCorrect": false, "rationale": "Viscosity is resistance to flow, not directly related to why it spreads on the surface. The experiment focuses on density differences."}, {"text": "Warm water is less dense than colder water, causing it to float.", "isCorrect": true, "rationale": "The 'Expected Results' section explicitly states for Trial 1: 'Warm red water spreads along the surface (less dense).' This is a direct application of the concept of density."}, {"text": "The surface tension of room-temperature water is stronger than that of warm water.", "isCorrect": false, "rationale": "Surface tension is a property of the water's surface, not the primary reason for a bulk liquid's movement based on temperature difference in this context."}, {"text": "The red food coloring reacts to temperature, making it more buoyant.", "isCorrect": false, "rationale": "Food coloring is used for visualization and does not significantly alter the density properties of the water itself. Its buoyancy effect would be negligible compared to temperature differences."}], "id": "q06"}, {"question": "Imagine Trial 3 of the 'Modeling Ocean Currents' investigation, where warm red water is poured into one end and cold salty blue water into the other. If the pouring is done too quickly, what is the most likely common issue, and why?", "options": [{"text": "The food coloring will react chemically and disappear, making observations impossible.", "isCorrect": false, "rationale": "Food coloring does not disappear due to pouring speed. The 'Common Issues' section describes what happens when poured too quickly, which is physical, not chemical."}, {"text": "The container will overflow, causing a safety hazard.", "isCorrect": false, "rationale": "While spills are a safety concern mentioned, pouring too quickly doesn't inherently cause an overflow unless too much liquid is added, which isn't the direct issue related to 'too quickly' itself in the context of observing currents."}, {"text": "Turbulent mixing will obscure the density effects, making it difficult to observe the circulation.", "isCorrect": true, "rationale": "The 'Common Issues' section states: 'If water is poured too quickly, turbulent mixing obscures the density effects. Instruct students to pour very slowly along the side of the container.'"}, {"text": "The water will quickly reach equilibrium, preventing any observable currents.", "isCorrect": false, "rationale": "Turbulent mixing is the immediate issue; it creates chaotic movement that masks the density-driven currents, rather than reaching equilibrium quickly. Equilibrium would occur over a longer period as the temperature and salinity differences dissipate."}], "id": "q07"}, {"question": "The text describes eutrophication as a human impact on water quality. What is the primary cause and effect of eutrophication as explained?", "options": [{"text": "Industrial discharge leading to chemical spills that directly poison aquatic life.", "isCorrect": false, "rationale": "While industrial discharge is a form of pollution, eutrophication specifically refers to the impact of excess nutrients, not direct chemical poisoning, though both are harmful."}, {"text": "Excess nitrogen and phosphorus from fertilizers causing algal blooms that deplete oxygen.", "isCorrect": true, "rationale": "The text explicitly states: 'Excess nitrogen and phosphorus from fertilizers cause eutrophication — algal blooms that deplete oxygen and create “dead zones” in lakes and coastal waters.'"}, {"text": "Over-extraction of groundwater resulting in land subsidence and dried-up wells.", "isCorrect": false, "rationale": "Over-extraction relates to water quantity and land subsidence, not water quality and eutrophication."}, {"text": "Paving over land with impervious surfaces, increasing runoff and flooding.", "isCorrect": false, "rationale": "This describes the impact of urbanization on water quantity and runoff patterns, not the process of eutrophication."}], "id": "q08"}, {"question": "Based on the description of thermohaline circulation in Trial 3 of the ocean currents model, if polar ice melts significantly due to climate change, adding a large amount of freshwater to the ocean near the poles, how might this impact global ocean currents?", "options": [{"text": "It would strengthen thermohaline circulation by increasing salinity differences.", "isCorrect": false, "rationale": "Thermohaline circulation is driven by density differences from temperature AND salinity. Adding freshwater would decrease salinity, thereby reducing the density of the water and potentially weakening, not strengthening, this circulation."}, {"text": "It would make polar ocean water less dense, potentially weakening the 'sinking' component of thermohaline circulation.", "isCorrect": true, "rationale": "The 'Analysis Questions' section asks how the model helps explain what happens when polar ice melts and adds freshwater. Freshwater is less dense than salty water. Therefore, adding it would decrease the density of the polar water, making it less likely to sink and thus potentially weakening the density-driven thermohaline circulation, which relies on the sinking of dense, cold, salty water."}, {"text": "It would cause all ocean currents to reverse direction globally due to the sudden influx of water.", "isCorrect": false, "rationale": "While changes could be significant, a complete reversal of all global currents is an extreme and unsupported conclusion. The effect is more nuanced, related to density changes."}, {"text": "It would only affect surface currents, leaving deep ocean circulation unchanged.", "isCorrect": false, "rationale": "Thermohaline circulation involves both surface and deep ocean currents. Changes in surface water properties (temperature and salinity) directly impact the density-driven sinking that powers deep ocean circulation."}], "id": "q09"}, {"question": "Which scenario best illustrates the concept of a 'watershed' and its 'divide' in the context of precipitation?", "options": [{"text": "Water percolating through porous rock layers to recharge an underground aquifer.", "isCorrect": false, "rationale": "This describes groundwater infiltration and aquifers, not a watershed or divide, which are surface features related to drainage."}, {"text": "Rain falling on a mountain ridge, with water on one side flowing to a Pacific-bound river and water on the other side flowing to an Atlantic-bound river.", "isCorrect": true, "rationale": "This directly illustrates the definition of a watershed (drainage into a common body) and a divide (the high point, like a mountain ridge, separating these drainage areas), specifically referencing the Continental Divide example."}, {"text": "Evaporation of water from a lake, followed by condensation and precipitation over the lake itself.", "isCorrect": false, "rationale": "This describes a localized part of the water cycle (evaporation, condensation, precipitation) but does not define a watershed or a divide."}, {"text": "The process of a water treatment plant purifying water before it is returned to the environment.", "isCorrect": false, "rationale": "This describes water quality management and infrastructure, which is separate from the geological definition of a watershed and its divides."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
