    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 27, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best distinguishes weather from climate, according to the textbook?", "options": [{"text": "Weather is the average atmospheric condition over 30 years, while climate is the day-to-day state.", "isCorrect": false, "rationale": "This statement incorrectly reverses the definitions. Weather is short-term, day-to-day; climate is the long-term average."}, {"text": "Weather describes short-term atmospheric changes at a specific place and time, whereas climate represents long-term patterns and statistical summaries over decades.", "isCorrect": true, "rationale": "This accurately reflects the definitions provided: weather is 'what happens today' and changes constantly, while climate is the 'long-term average... typically calculated over a period of at least 30 years'."}, {"text": "Climate is primarily influenced by human activities, but weather is purely natural.", "isCorrect": false, "rationale": "Both weather and climate can be influenced by natural processes, and human activities primarily impact climate trends rather than daily weather directly. This is not the fundamental distinction."}, {"text": "Weather only includes temperature and precipitation, while climate includes all atmospheric variables.", "isCorrect": false, "rationale": "Weather includes many variables like temperature, precipitation, wind speed, humidity, cloud cover, and air pressure, not just temperature and precipitation."}], "id": "q01"}, {"question": "A television commentator states, 'It snowed heavily this winter, so global warming must be a hoax.' Using the distinction between weather and climate, what is the fundamental flaw in this argument?", "options": [{"text": "Global warming only refers to summer temperatures, not winter conditions.", "isCorrect": false, "rationale": "Global warming refers to a change in the Earth's average temperature over long periods, affecting all seasons. This option misrepresents the scope of global warming."}, {"text": "Global warming is a long-term climate trend, while a single winter's cold is a short-term weather event.", "isCorrect": true, "rationale": "The textbook's analogy of mood (weather) versus personality (climate) directly addresses this. A single cold winter is a weather event and does not negate a long-term climate trend like global warming."}, {"text": "The commentator fails to account for the impact of Milankovitch cycles on seasonal temperatures.", "isCorrect": false, "rationale": "Milankovitch cycles operate over tens of thousands of years and drive ice ages; they do not explain a single cold winter in the context of a short-term argument against global warming."}, {"text": "Local weather patterns are always opposite to global climate trends.", "isCorrect": false, "rationale": "There is no such general rule. Local weather can vary significantly from global climate trends but is not necessarily always opposite."}], "id": "q02"}, {"question": "Why might a city located near the equator, typically known for its tropical climate, still experience cold temperatures and even snow on nearby mountain peaks?", "options": [{"text": "The city is experiencing a short-term weather anomaly that does not reflect its climate.", "isCorrect": false, "rationale": "While weather anomalies can occur, the question specifically asks about conditions on nearby mountain peaks, which points to a climatic factor, not a temporary weather event for the entire region."}, {"text": "Prevailing winds are carrying cold air masses from polar regions to the equator.", "isCorrect": false, "rationale": "While global winds exist, they do not typically bring air cold enough for snow at equatorial latitudes in the way altitude does. This is not the primary factor mentioned for mountains."}, {"text": "Increased altitude causes a decrease in temperature, allowing for colder conditions at higher elevations.", "isCorrect": true, "rationale": "The text explicitly states, 'Temperature decreases with elevation — roughly 6.5°C for every 1000m of altitude gain. This is why mountains can have snow-capped peaks even near the equator.'"}, {"text": "Ocean currents bring cold water up the mountainside, cooling the air.", "isCorrect": false, "rationale": "Ocean currents primarily affect coastal regions and do not directly cause snow on mountain peaks in this manner. Mountains are typically cooled by elevation, not direct ocean current influence on their slopes."}], "id": "q03"}, {"question": "The Great Basin in the western United States experiences a dry climate despite being relatively close to the Pacific Ocean. Which combination of factors best explains this phenomenon?", "options": [{"text": "High latitude and cold ocean currents.", "isCorrect": false, "rationale": "The Great Basin is at mid-latitudes, and while cold ocean currents exist, they are not the primary cause of the widespread dryness in this specific inland region."}, {"text": "Proximity to the ocean and strong prevailing winds.", "isCorrect": false, "rationale": "Proximity to the ocean typically leads to more moisture, not less, unless a topographic barrier intervenes. Strong winds alone don't explain the dryness without topography."}, {"text": "The rain shadow effect created by the Sierra Nevada mountains and topography.", "isCorrect": true, "rationale": "The text states, 'The Great Basin of the western United States lies in the rain shadow of the Sierra Nevada mountains,' explaining how mountains force air to release moisture on the windward side, leaving the leeward side dry."}, {"text": "Low altitude and lack of solar output variations.", "isCorrect": false, "rationale": "Low altitude would typically be warmer, and solar output variations are a global climate driver, not a regional explanation for the Great Basin's specific dryness."}], "id": "q04"}, {"question": "A region characterized by extremely cold temperatures year-round, with ecosystems like tundra and ice caps, would most likely be classified under which of Köppen's major climate groups?", "options": [{"text": "Temperate (C)", "isCorrect": false, "rationale": "Temperate climates have moderate temperatures with distinct seasons, not extremely cold year-round conditions."}, {"text": "Continental (D)", "isCorrect": false, "rationale": "Continental climates have large temperature ranges between summer and winter, with cold winters, but typically warm to hot summers, not extremely cold year-round."}, {"text": "Polar (E)", "isCorrect": true, "rationale": "The text describes Polar (E) climates as 'Extremely cold year-round. Includes tundra and ice cap climates,' which perfectly matches the description."}, {"text": "Dry (B)", "isCorrect": false, "rationale": "Dry climates are defined by evaporation exceeding precipitation and can be hot or cold deserts, but not necessarily 'extremely cold year-round' like the polar regions."}], "id": "q05"}, {"question": "What is the primary purpose of paleoclimatology, as described in the textbook?", "options": [{"text": "To forecast daily weather patterns with greater accuracy using satellite data.", "isCorrect": false, "rationale": "Paleoclimatology focuses on past climates, not daily weather forecasting, which relies on current atmospheric measurements."}, {"text": "To reconstruct Earth's past climate conditions using indirect natural records.", "isCorrect": true, "rationale": "The text defines paleoclimatology as 'the study of past climates using natural records preserved in ice cores, tree rings, ocean sediments... and other proxy data sources,' precisely for reconstructing past conditions."}, {"text": "To monitor current atmospheric greenhouse gas concentrations using direct measurements.", "isCorrect": false, "rationale": "While ice cores reveal past GHG levels, the field's primary purpose is broader reconstruction of past climates, and current monitoring is done through direct measurements, not paleoclimatology."}, {"text": "To analyze the impact of current human activity on short-term atmospheric events.", "isCorrect": false, "rationale": "Paleoclimatology deals with long-term past climates, not short-term current events or their immediate human impacts."}], "id": "q06"}, {"question": "Scientists analyze air bubbles trapped in ice cores from Antarctica. What specific information do these bubbles primarily provide that is crucial for understanding past climate change?", "options": [{"text": "The annual rate of snowfall and glacial movement over time.", "isCorrect": false, "rationale": "While ice cores provide annual layers, the air bubbles themselves are not the primary source for snowfall rate or glacial movement. These are inferred from ice thickness and layer analysis."}, {"text": "Direct measurements of ancient wind speeds and atmospheric pressure.", "isCorrect": false, "rationale": "Air bubbles preserve gas samples; they do not directly measure dynamic atmospheric properties like wind speed or pressure from the time they were trapped."}, {"text": "Concentrations of greenhouse gases like CO2 and CH4 from past atmospheres.", "isCorrect": true, "rationale": "The text clearly states that 'Trapped air bubbles... preserve samples of the atmosphere at the time the ice formed. Analyzing these bubbles reveals the concentration of CO2, CH4, and other greenhouse gases going back hundreds of thousands of years.'"}, {"text": "The migration patterns of ancient organisms and plant species.", "isCorrect": false, "rationale": "Pollen records preserved in ice (or sediments) provide information on vegetation, not air bubbles."}], "id": "q07"}, {"question": "A paleoclimatologist examines a tree core and observes a series of unusually narrow growth rings for several consecutive years. What can the scientist most likely infer about the climate during those years?", "options": [{"text": "The region experienced a period of unusually warm and wet conditions.", "isCorrect": false, "rationale": "The text states that 'Wide rings indicate favorable growing conditions (warm, wet),' so narrow rings would indicate the opposite."}, {"text": "The tree was likely under stress due to cold, dry conditions or other unfavorable factors.", "isCorrect": true, "rationale": "The text specifies, 'Wide rings indicate favorable growing conditions (warm, wet); narrow rings indicate stress (cold, dry),' making this the correct inference."}, {"text": "Volcanic eruptions significantly increased solar output, enhancing growth.", "isCorrect": false, "rationale": "Volcanic eruptions typically cause short-term cooling by reflecting sunlight, and would hinder, not enhance, growth. Also, they don't increase solar output."}, {"text": "The tree was located in a rain shadow area, leading to consistently high precipitation.", "isCorrect": false, "rationale": "A rain shadow area experiences *less* precipitation, leading to dry conditions, which would result in narrow rings, but 'consistently high precipitation' is incorrect for a rain shadow."}], "id": "q08"}, {"question": "Which natural climate driver primarily accounts for the long-term, cyclical shifts between glacial (ice age) and interglacial periods over tens of thousands of years?", "options": [{"text": "Major volcanic eruptions.", "isCorrect": false, "rationale": "Volcanic eruptions cause short-term (1-3 years) cooling, not long-term, cyclical shifts like ice ages."}, {"text": "Solar output variations.", "isCorrect": false, "rationale": "Small changes in solar output cause minor temperature fluctuations, not the large-scale shifts driving ice ages."}, {"text": "Changes in Earth's orbital parameters, known as Milankovitch cycles.", "isCorrect": true, "rationale": "The text states, 'Milankovitch cycles — slow, periodic changes in Earth's orbit... that alter the distribution of solar energy reaching Earth's surface... are the primary driver of ice ages.'"}, {"text": "El Niño/La Niña events.", "isCorrect": false, "rationale": "El Niño/La Niña are ocean circulation changes that affect regional climates over several years, not the millennia-long cycles of ice ages."}], "id": "q09"}, {"question": "The section states that scientists have evaluated all known natural climate drivers but concluded they cannot explain the rapid warming observed since the mid-twentieth century. What is the key implication of this conclusion?", "options": [{"text": "Earth's climate is more stable than previously thought, and the warming is a natural aberration.", "isCorrect": false, "rationale": "The text describes 'rapid warming' as an observed trend that natural factors cannot explain, implying instability and a non-natural cause, not a natural aberration."}, {"text": "Paleoclimatology data from ice cores and tree rings are unreliable for understanding recent trends.", "isCorrect": false, "rationale": "The text emphasizes the utility of proxy data, showing CO2 and temperature correlation over 800,000 years, and uses this data to highlight the unprecedented nature of recent CO2 levels."}, {"text": "The primary driver of recent rapid warming is likely the increase in greenhouse gases from human activity.", "isCorrect": true, "rationale": "The text explicitly concludes: 'Only the increase in greenhouse gases from human activity matches the pattern and magnitude of the observed warming,' after ruling out natural factors."}, {"text": "Future climate predictions will be based solely on short-term weather forecasts.", "isCorrect": false, "rationale": "This contradicts the fundamental distinction between weather and climate. Climate predictions rely on long-term trends and factors, not short-term weather forecasts."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
