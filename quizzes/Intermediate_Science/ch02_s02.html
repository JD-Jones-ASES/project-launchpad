    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 2, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What are the two primary sources of Earth's internal heat that have been active since its formation?", "options": [{"text": "Solar radiation and geothermal gradient.", "isCorrect": false, "rationale": "Solar radiation is an external heat source, and the geothermal gradient is a result of internal heat, not a source itself."}, {"text": "Radioactive decay and residual heat.", "isCorrect": true, "rationale": "The text explicitly states that radioactive decay and residual heat are the two main sources of Earth's internal heat, both active since the planet's formation."}, {"text": "Volcanic activity and tectonic plate friction.", "isCorrect": false, "rationale": "Volcanic activity and tectonic plate friction are consequences or manifestations of Earth's internal heat and convection, not the primary sources of that heat."}, {"text": "Chemical reactions and meteorite impacts.", "isCorrect": false, "rationale": "While meteorite impacts contributed to residual heat during formation, they are not an ongoing primary source; chemical reactions are not identified as a main heat source in the text."}], "id": "q01"}, {"question": "If the geothermal gradient averages 25°C per kilometer in the crust and the surface temperature is 15°C, what would be the approximate temperature at a depth of 4 kilometers?", "options": [{"text": "40°C", "isCorrect": false, "rationale": "This would be the temperature at 1 kilometer depth (15 + 25)."}, {"text": "100°C", "isCorrect": false, "rationale": "This only accounts for the increase due to depth (25 * 4), but does not add the initial surface temperature."}, {"text": "115°C", "isCorrect": true, "rationale": "The temperature increase is 25°C/km * 4 km = 100°C. Adding this to the surface temperature (15°C) gives 15°C + 100°C = 115°C."}, {"text": "125°C", "isCorrect": false, "rationale": "This would be the temperature if the gradient was 27.5°C/km or if the depth was 4.4km, assuming a 15C surface temp. Or (25*5) ignoring surface temp."}], "id": "q02"}, {"question": "Which statement best describes how radioactive decay contributes to Earth's internal heat?", "options": [{"text": "It involves the spontaneous fusion of light elements, releasing energy.", "isCorrect": false, "rationale": "Fusion involves combining atomic nuclei, typically of light elements, not the breaking apart of unstable nuclei as described for radioactive decay."}, {"text": "Unstable atomic nuclei break apart over time, releasing energy in the form of radiation and heat.", "isCorrect": true, "rationale": "The text defines radioactive decay as the process where unstable atomic nuclei spontaneously break apart, releasing energy as radiation and heat."}, {"text": "Stable isotopes absorb external radiation, causing them to heat up.", "isCorrect": false, "rationale": "Radioactive decay involves unstable isotopes releasing internal energy, not stable isotopes absorbing external radiation."}, {"text": "It is a chemical reaction where atoms combine to form new, hotter compounds.", "isCorrect": false, "rationale": "Radioactive decay is a nuclear process involving changes within the atomic nucleus, not a chemical reaction involving the combination of atoms."}], "id": "q03"}, {"question": "How does 'residual heat' primarily differ from 'radioactive decay' as a source of Earth's internal heat?", "options": [{"text": "Residual heat is generated by ongoing nuclear reactions, while radioactive decay is from gravitational compression.", "isCorrect": false, "rationale": "This statement incorrectly describes both sources; radioactive decay involves nuclear reactions, and residual heat is from formation processes like gravitational compression, not the other way around."}, {"text": "Residual heat is thermal energy leftover from Earth's formation, while radioactive decay is an ongoing process of energy release from unstable isotopes.", "isCorrect": true, "rationale": "The text clearly distinguishes residual heat as 'leftover from Earth's formation' and radioactive decay as 'unstable nuclei spontaneously break apart over time, releasing energy in the process' today."}, {"text": "Residual heat only contributes to heating the crust, whereas radioactive decay heats the mantle.", "isCorrect": false, "rationale": "Both sources contribute to the overall internal heat of Earth, affecting both the mantle and crust, and are essential for keeping the outer core liquid."}, {"text": "Residual heat is a minor source today, while radioactive decay was primarily important in the early Earth.", "isCorrect": false, "rationale": "The text states radioactive decay is 'the first and most important source today,' while residual heat remains significant due to Earth's insulation."}], "id": "q04"}, {"question": "Which of the following scenarios best illustrates the definition of convection as presented in the text?", "options": [{"text": "Heat radiating from a campfire warming a person's hands.", "isCorrect": false, "rationale": "This describes heat transfer by radiation, not convection."}, {"text": "A metal spoon becoming hot after being left in a pot of boiling soup.", "isCorrect": false, "rationale": "This describes heat transfer by conduction (direct contact), not convection."}, {"text": "Warm, less dense air rising from a heater towards the ceiling, while cooler, denser air sinks.", "isCorrect": true, "rationale": "This is a classic example of convection, where a fluid (air) circulates due to density differences caused by heating and cooling, as described in the text for heated rooms and boiling water."}, {"text": "Sunlight warming the surface of a black asphalt road.", "isCorrect": false, "rationale": "This describes the absorption of solar radiation, not the circulation of a fluid due to heating and cooling."}], "id": "q05"}, {"question": "The text states that convection is the dominant mechanism for heat transport in Earth's mantle. What characteristic of mantle rock, despite it being a solid, enables this process to be dominant?", "options": [{"text": "Its extremely high thermal conductivity, allowing rapid heat transfer by contact.", "isCorrect": false, "rationale": "High thermal conductivity would favor conduction, but convection is dominant because the mantle is a fluid (albeit a very slow-moving one), not because of its conductivity."}, {"text": "Its ability to undergo plastic deformation and slowly flow when heated, changing density.", "isCorrect": true, "rationale": "The text explains that mantle rock rises 'not as a liquid stream, but as a plastic solid creeping upward,' emphasizing its ability to flow and change density with temperature, which is essential for convection."}, {"text": "Its transparency to electromagnetic radiation, allowing heat to pass through it rapidly.", "isCorrect": false, "rationale": "Radiation is not the dominant heat transfer mechanism in the mantle; the ability to flow is key for convection."}, {"text": "Its rapid change from solid to liquid phase throughout its depth, creating true fluid currents.", "isCorrect": false, "rationale": "The mantle is described as a 'plastic solid,' not undergoing rapid phase changes to a true liquid, though it can deform and flow very slowly."}], "id": "q06"}, {"question": "Imagine a large volume of mantle rock near Earth's surface cools significantly. Based on the principles of mantle convection, what is the most likely immediate consequence for this cooled rock?", "options": [{"text": "It would become less dense and rise further towards the surface.", "isCorrect": false, "rationale": "Cooling causes material to become denser, not less dense, so it would not rise."}, {"text": "It would melt into a true liquid and rapidly sink.", "isCorrect": false, "rationale": "Mantle rock is a plastic solid and does not typically melt into a true liquid and sink rapidly due to cooling; rather, it becomes denser as a solid and sinks slowly."}, {"text": "It would become denser and slowly begin to sink back into the deeper mantle.", "isCorrect": true, "rationale": "The core principle of convection is that cooler material becomes denser and sinks, completing the circulation pattern. The text describes cool rock near the surface becoming denser and sinking."}, {"text": "It would solidify even further, becoming rigid and stopping all movement.", "isCorrect": false, "rationale": "While it becomes denser, it remains a plastically deforming solid and continues to participate in the convection current, albeit by sinking."}], "id": "q07"}, {"question": "The text emphasizes that mantle rock moves at an 'extraordinarily slow' speed, comparable to fingernail growth. Given this, why is mantle convection still considered the 'engine that drives plate tectonics' with dramatic geological results?", "options": [{"text": "The immense scale of convection cells and the vast amounts of time over which they operate.", "isCorrect": true, "rationale": "The text explicitly states that 'over millions of years, these currents exert enough force to push and pull the rigid plates' and that 'individual convection cells may span hundreds or even thousands of kilometers,' highlighting the importance of scale and geologic time."}, {"text": "The sudden, catastrophic surges of mantle material that occur periodically, overriding the slow creep.", "isCorrect": false, "rationale": "The text describes the process as a 'slow but powerful' motion and a 'continuous cycle,' not sudden catastrophic surges."}, {"text": "The rapid chemical reactions occurring within the mantle that accelerate plate movement.", "isCorrect": false, "rationale": "The text does not mention rapid chemical reactions as a driver for plate tectonics; the driving force is heat-driven density changes."}, {"text": "The extremely high temperatures at which the mantle rock moves, compensating for the slow speed.", "isCorrect": false, "rationale": "While temperatures are high, it's the cumulative effect over vast scales and time, not just temperature, that allows slow movement to have dramatic results."}], "id": "q08"}, {"question": "In the 'Modeling Convection Currents' investigation, the hot plate represents Earth's core (heat source). What do the ice cubes and the circulating water most accurately represent, respectively, in the context of Earth's internal processes?", "options": [{"text": "Ice cubes = volcanic eruptions; Circulating water = magma plumes.", "isCorrect": false, "rationale": "The ice cubes represent cooler regions, and circulating water represents the general mantle flow, not specific geological events like volcanic eruptions or magma plumes, which are effects of convection."}, {"text": "Ice cubes = cooler upper mantle/lithosphere; Circulating water = convecting mantle rock.", "isCorrect": true, "rationale": "The teacher answers section explicitly states these connections: 'Ice cubes = cooler upper mantle / lithosphere' and 'Circulating water = convecting mantle rock'."}, {"text": "Ice cubes = outer core; Circulating water = liquid iron circulation.", "isCorrect": false, "rationale": "The outer core is a heat source, not a cold region represented by ice cubes. The circulating water models mantle convection, not the liquid iron of the outer core."}, {"text": "Ice cubes = ocean trenches; Circulating water = subducting plates.", "isCorrect": false, "rationale": "While subducting plates are cooler, the model represents broader components. Ocean trenches are a surface feature related to plate tectonics, not the direct cooling component."}], "id": "q09"}, {"question": "The SciConnection box highlights that convection operates in both Earth's solid mantle and its gaseous atmosphere. What fundamental driving force is common to both systems, despite their different mediums?", "options": [{"text": "Gravitational pull from the Moon.", "isCorrect": false, "rationale": "Lunar gravity primarily influences tides, not the fundamental driving force for mantle or atmospheric convection as described here."}, {"text": "The spontaneous decay of radioactive isotopes.", "isCorrect": false, "rationale": "Radioactive decay is specific to Earth's interior heat and does not drive atmospheric convection."}, {"text": "Uneven heating, which leads to density differences.", "isCorrect": true, "rationale": "The text states, 'The medium is different, but the driving force — unequal heating — is the same,' directly connecting uneven heating to the density differences that drive convection in both systems."}, {"text": "The friction generated by material moving across different layers.", "isCorrect": false, "rationale": "Friction can be a result or a minor contributor to heat, but it is not the initial fundamental driving force for the convection currents themselves."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
