<script>
var QUESTIONS = [{"question": "According to Antoine Lavoisier's Law of Conservation of Mass, what fundamental principle must be true about atoms in a chemical reaction?", "options": [{"text": "Atoms are converted into energy during the reaction.", "isCorrect": false, "rationale": "The Law of Conservation of Mass states that atoms are neither created nor destroyed, and are not converted into energy in a chemical reaction."}, {"text": "The total number of atoms of each element must be the same on both the reactant and product sides of the equation.", "isCorrect": true, "rationale": "The Law of Conservation of Mass dictates that atoms are simply rearranged, meaning every atom entering a reaction must exit as part of a product, thus maintaining the same count of each element."}, {"text": "New types of atoms can be created if the reaction conditions are extreme enough.", "isCorrect": false, "rationale": "Atoms are strictly rearranged, not created or destroyed, in a chemical reaction according to this law."}, {"text": "The mass of the products must always be greater than the mass of the reactants.", "isCorrect": false, "rationale": "The Law of Conservation of Mass states that the total mass of reactants must equal the total mass of products; mass is conserved, not increased."}], "id": "q01"}, {"question": "Which of the following statements accurately describes the difference between subscripts and coefficients in a chemical equation, and their role in balancing?", "options": [{"text": "Subscripts indicate the number of molecules, while coefficients indicate the number of atoms within a molecule.", "isCorrect": false, "rationale": "This statement incorrectly reverses the roles. Subscripts define the number of atoms within a molecule, and coefficients define the number of molecules."}, {"text": "Subscripts define the identity of a substance and cannot be changed, whereas coefficients are adjusted to balance the number of atoms of each element.", "isCorrect": true, "rationale": "Subscripts are integral to a chemical formula, determining the specific substance (e.g., H2O vs. H2O2). Coefficients are placed before formulas to adjust the quantity of molecules, which is the correct way to balance an equation."}, {"text": "Both subscripts and coefficients can be changed freely to achieve a balanced equation.", "isCorrect": false, "rationale": "Only coefficients can be changed when balancing an equation. Changing a subscript changes the chemical identity of the substance, which is not permitted."}, {"text": "Coefficients indicate the state of matter, while subscripts show the reactivity of a substance.", "isCorrect": false, "rationale": "Coefficients denote quantity (number of molecules), not state of matter. Subscripts denote atom counts within a molecule, not reactivity."}], "id": "q02"}, {"question": "A student is balancing the equation $CH_4(g) + O_2(g) \\rightarrow CO_2(g) + H_2O(g)$. Following the 'balancing by inspection' method, which of these is an appropriate step after identifying methane ($CH_4$) as the most complex molecule?", "options": [{"text": "Change the subscript in O2 to O3 to balance oxygen atoms.", "isCorrect": false, "rationale": "Changing subscripts is never allowed, as it alters the identity of the substance."}, {"text": "Place a coefficient of 2 before H2O to balance the hydrogen atoms originating from CH4.", "isCorrect": true, "rationale": "Methane has 4 hydrogen atoms. Water (H2O) has 2 hydrogen atoms per molecule. Placing a coefficient of 2 before H2O provides 4 hydrogen atoms on the product side, balancing the hydrogen from CH4, which aligns with the strategy of balancing one element at a time from the most complex molecule."}, {"text": "Add a subscript to C in CO2 to make it C2O2 to balance carbon atoms.", "isCorrect": false, "rationale": "Changing subscripts is never allowed, as it alters the identity of the substance."}, {"text": "Remove the subscript from O2 to make it O, as single oxygen atoms are easier to balance.", "isCorrect": false, "rationale": "Changing subscripts is never allowed, and molecular oxygen exists as O2, not O, under typical reaction conditions."}], "id": "q03"}, {"question": "According to the systematic approach for balancing equations by inspection, which type of substance should typically be balanced last?", "options": [{"text": "Compounds that contain carbon and hydrogen.", "isCorrect": false, "rationale": "Complex molecules, often containing carbon and hydrogen, are usually balanced first or early in the process."}, {"text": "Molecules that include a metal and a non-metal.", "isCorrect": false, "rationale": "There is no specific rule to save these for last; they are often part of complex compounds."}, {"text": "Single-element substances, such as O2 or Fe.", "isCorrect": true, "rationale": "Single-element substances are saved for last because their coefficients can be adjusted without affecting the atom counts of other elements in the equation, making them easier to finalize."}, {"text": "Substances with the most complex chemical formulas.", "isCorrect": false, "rationale": "The most complex molecules are typically addressed first, not last, to establish a base for balancing."}], "id": "q04"}, {"question": "Considering the balanced equation for the combustion of propane: $C_3H_8(g) + 5O_2(g) \\rightarrow 3CO_2(g) + 4H_2O(g)$. What does the stoichiometric ratio 1 C3H8 : 5 O2 primarily tell us?", "options": [{"text": "That for every 5 grams of oxygen consumed, 1 gram of propane is burned.", "isCorrect": false, "rationale": "Stoichiometric ratios apply to molecules/moles, not directly to mass ratios without further calculation using molar masses."}, {"text": "That propane will always be the limiting reactant when reacting with oxygen.", "isCorrect": false, "rationale": "The coefficients represent the reacting ratio, not which reactant is limiting. That depends on the actual quantities available."}, {"text": "That exactly 5 molecules of oxygen are required to react completely with 1 molecule of propane.", "isCorrect": true, "rationale": "The coefficients in a balanced equation represent the precise molecular (or molar) ratio in which substances react and are formed."}, {"text": "That oxygen contains 5 atoms per molecule, while propane contains 1 atom.", "isCorrect": false, "rationale": "The coefficient '5' indicates 5 molecules of O2, not 5 atoms within one O2 molecule. O2 has 2 oxygen atoms. The coefficient '1' for C3H8 means one molecule."}], "id": "q05"}, {"question": "Balance the following chemical equation: $N_2(g) + H_2(g) \\rightarrow NH_3(g)$", "options": [{"text": "$N_2(g) + H_2(g) \\rightarrow 2NH_3(g)$", "isCorrect": false, "rationale": "In this option, nitrogen is balanced (2N on each side), but hydrogen is not (2H on the left vs. 6H on the right)."}, {"text": "$2N_2(g) + 3H_2(g) \\rightarrow 4NH_3(g)$", "isCorrect": false, "rationale": "In this option, nitrogen (4N on left vs. 4N on right) and hydrogen (6H on left vs. 12H on right) are not fully balanced."}, {"text": "$N_2(g) + 3H_2(g) \\rightarrow 2NH_3(g)$", "isCorrect": true, "rationale": "This equation is correctly balanced: 2 nitrogen atoms on each side (N2 and 2NH3) and 6 hydrogen atoms on each side (3H2 and 2NH3)."}, {"text": "$N_2(g) + H_3(g) \\rightarrow NH_3(g)$", "isCorrect": false, "rationale": "Changing the subscript of H2 to H3 is forbidden as it changes the identity of the reactant."}], "id": "q06"}, {"question": "In the process of balancing the combustion of propane, the equation has reached $C_3H_8(g) + O_2(g) \\rightarrow 3CO_2(g) + 4H_2O(g)$. What is the next logical step to fully balance this equation according to the systematic approach?", "options": [{"text": "Change the subscript of H2O to H3O to balance hydrogen atoms.", "isCorrect": false, "rationale": "Subscripts cannot be changed as this alters the identity of the substance."}, {"text": "Count the total oxygen atoms on the product side and use that to determine the coefficient for O2 on the reactant side.", "isCorrect": true, "rationale": "At this stage, carbon and hydrogen are balanced. The next step is to balance oxygen. As O2 is a single-element substance, it is balanced last by calculating the total oxygen on the product side (3*2 + 4*1 = 10 O atoms) and then placing the appropriate coefficient (10/2 = 5) in front of O2."}, {"text": "Add a coefficient of 2 to C3H8 to balance the carbon atoms again.", "isCorrect": false, "rationale": "Carbon was already balanced in a previous step (3 C on left, 3 C in 3CO2 on right)."}, {"text": "Simplify the coefficients of CO2 and H2O to their lowest whole-number ratio.", "isCorrect": false, "rationale": "Simplifying coefficients is the very last step, performed only after the entire equation is balanced."}], "id": "q07"}, {"question": "Using the balanced equation for propane combustion ($C_3H_8(g) + 5O_2(g) \\rightarrow 3CO_2(g) + 4H_2O(g)$), if a chemist wanted to produce 12 molecules of carbon dioxide ($CO_2$), how many molecules of propane ($C_3H_8$) would be required?", "options": [{"text": "1 molecule of propane", "isCorrect": false, "rationale": "One molecule of propane produces 3 molecules of CO2, not 12."}, {"text": "3 molecules of propane", "isCorrect": false, "rationale": "Three molecules of propane would produce 9 molecules of CO2 (3*3)."}, {"text": "4 molecules of propane", "isCorrect": true, "rationale": "The stoichiometric ratio is 1 C3H8 : 3 CO2. To produce 12 molecules of CO2 (12 = 4 * 3), you would need 4 times the amount of propane, so 4 molecules."}, {"text": "5 molecules of propane", "isCorrect": false, "rationale": "Five molecules of propane would produce 15 molecules of CO2 (5*3)."}], "id": "q08"}, {"question": "A student attempts to balance the equation $H_2(g) + O_2(g) \\rightarrow H_2O(g)$ by writing $H_2(g) + O_2(g) \\rightarrow H_2O_2(g)$. Why is this approach fundamentally incorrect, even though the atom count for H and O seems balanced on both sides?", "options": [{"text": "It violates the Law of Conservation of Energy, not mass.", "isCorrect": false, "rationale": "The primary issue is not energy conservation but the alteration of chemical identity, which implicitly violates the principle that matter is conserved in its form within the reaction."}, {"text": "The student changed the identity of the product from water ($H_2O$) to hydrogen peroxide ($H_2O_2$).", "isCorrect": true, "rationale": "Changing a subscript (from H2O to H2O2) creates a different chemical substance entirely. Balancing an equation means adjusting quantities of existing substances, not changing their chemical formulas."}, {"text": "Oxygen should always be balanced before hydrogen in combustion reactions.", "isCorrect": false, "rationale": "While there are strategic orders for balancing, this is a procedural guideline, not a fundamental rule violation like changing a chemical formula."}, {"text": "The physical states (g) are incorrect for the substances involved.", "isCorrect": false, "rationale": "The physical states are not the fundamental error; changing the chemical formula itself is the critical mistake."}], "id": "q09"}, {"question": "What is the ultimate goal of balancing a chemical equation?", "options": [{"text": "To determine the speed at which the reaction will occur.", "isCorrect": false, "rationale": "Reaction speed (kinetics) is not determined by balancing; it's influenced by factors like temperature, concentration, and catalysts."}, {"text": "To ensure that the equation is written with the smallest possible coefficients.", "isCorrect": false, "rationale": "While simplifying coefficients is a final step, the ultimate goal is not just simplification but upholding the fundamental law of chemistry."}, {"text": "To satisfy the Law of Conservation of Mass by having an equal number of each type of atom on both sides.", "isCorrect": true, "rationale": "The primary purpose of balancing is to mathematically represent the Law of Conservation of Mass, ensuring that atoms are accounted for and conserved throughout the chemical reaction."}, {"text": "To predict the exact physical properties (e.g., color, density) of the products.", "isCorrect": false, "rationale": "Balancing equations tells us about the quantities and types of substances involved, not their specific physical properties, which require deeper chemical knowledge."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
