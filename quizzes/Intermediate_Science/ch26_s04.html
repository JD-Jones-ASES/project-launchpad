    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 26, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which consequence of large-scale deforestation most directly contributes to a regional decrease in precipitation and local climate disruption?", "options": [{"text": "Carbon release into the atmosphere", "isCorrect": false, "rationale": "While carbon release contributes to global climate change, it does not directly cause a regional decrease in precipitation. This effect is more related to global warming than local water cycles."}, {"text": "Disrupted water cycles due to reduced transpiration", "isCorrect": true, "rationale": "The text states that 'Forests release water vapor through transpiration, which contributes to local rainfall. Removing forests can reduce precipitation in the region.' This directly links deforestation to regional rainfall reduction and local climate disruption."}, {"text": "Increased soil erosion and river sedimentation", "isCorrect": false, "rationale": "Soil erosion is a significant consequence of deforestation, impacting soil fertility and water quality, but it does not directly lead to a decrease in regional precipitation."}, {"text": "Extensive habitat destruction for countless species", "isCorrect": false, "rationale": "Habitat destruction is a major impact on biodiversity, but it is not the direct mechanism by which deforestation reduces regional precipitation or disrupts local climate in terms of rainfall."}], "id": "q01"}, {"question": "While urbanization is often associated with environmental challenges, which statement accurately reflects a potential environmental advantage of well-designed cities mentioned in the text?", "options": [{"text": "Increased impervious surfaces leading to better stormwater filtration.", "isCorrect": false, "rationale": "Impervious surfaces prevent rainwater from soaking into the ground and being filtered, instead leading to runoff that carries pollutants directly into waterways. This is a disadvantage, not an advantage."}, {"text": "Creation of urban heat islands which naturally regulate temperatures in summer.", "isCorrect": false, "rationale": "Urban heat islands cause cities to be significantly warmer than surrounding rural areas, increasing energy demand for cooling and making them less comfortable, not regulating temperatures beneficially in summer."}, {"text": "Lower per-capita carbon emissions due to density, shared infrastructure, and public transit.", "isCorrect": true, "rationale": "The text explicitly states that 'Well-designed cities with public transit, green spaces, and energy-efficient buildings can have lower per-capita carbon emissions than sprawling suburbs' due to dense living, shared infrastructure, and shorter commutes."}, {"text": "Greater reliance on individual vehicle ownership for daily commutes.", "isCorrect": false, "rationale": "Well-designed cities with public transit aim to reduce reliance on individual vehicles to lower emissions and congestion, making greater reliance on individual vehicles an environmental disadvantage."}], "id": "q02"}, {"question": "A chemist studying atmospheric reactions notes an increase in precipitation with a pH value significantly lower than 5.6. Which pair of pollutants is most likely responsible for this phenomenon?", "options": [{"text": "Particulate matter (PM) and carbon monoxide (CO)", "isCorrect": false, "rationale": "Particulate matter causes lung damage and smog, and carbon monoxide reduces blood's oxygen-carrying capacity. Neither directly causes acid rain."}, {"text": "Sulfur dioxide (SO2) and nitrogen oxides (NOx)", "isCorrect": true, "rationale": "The text explicitly states that SO2 and NOx 'react with water in the atmosphere to form acid rain...which damages forests, acidifies lakes, and corrodes stone buildings and monuments.' These gases form sulfuric and nitric acid, lowering pH."}, {"text": "Ground-level ozone (O3) and chlorofluorocarbons (CFCs)", "isCorrect": false, "rationale": "Ground-level ozone irritates lungs and damages crops. CFCs cause stratospheric ozone depletion. Neither is directly responsible for acid rain."}, {"text": "Heavy metals (e.g., lead) and pesticides", "isCorrect": false, "rationale": "Heavy metals and pesticides are significant water and soil pollutants, but they are not primary atmospheric pollutants responsible for acid rain formation."}], "id": "q03"}, {"question": "Which sequence accurately describes the chain of events during eutrophication in an aquatic ecosystem?", "options": [{"text": "Algal bloom → Nutrient input → Decomposition → Dead zone", "isCorrect": false, "rationale": "This sequence is incorrect as nutrient input is the initiating step before an algal bloom occurs."}, {"text": "Nutrient input → Light blockage → Algal bloom → Oxygen depletion", "isCorrect": false, "rationale": "This sequence is incorrect because the algal bloom happens *before* significant light blockage by the bloom and before decomposition leads to oxygen depletion."}, {"text": "Nutrient input → Algal bloom → Light blockage → Oxygen depletion", "isCorrect": true, "rationale": "The text describes the chain as: 'Nutrient input: Excess NO3- and PO4^3- enter the water... Algal bloom: Algae... multiply rapidly... Light blockage: The algal mat prevents sunlight... Oxygen depletion: Dissolved oxygen drops so low...'"}, {"text": "Oxygen depletion → Decomposition → Algal bloom → Nutrient input", "isCorrect": false, "rationale": "This sequence is completely reversed. Oxygen depletion is a final effect, not an initial cause, and nutrient input is the first step."}], "id": "q04"}, {"question": "A scientist discovers high concentrations of mercury in large predatory fish, even though the mercury levels in the surrounding water are very low. This observation is best explained by which ecological process?", "options": [{"text": "Eutrophication, leading to nutrient overload and algal blooms.", "isCorrect": false, "rationale": "Eutrophication relates to nutrient enrichment and subsequent oxygen depletion, not the accumulation of toxins in food chains."}, {"text": "Acid rain formation, which lowers the pH of aquatic environments.", "isCorrect": false, "rationale": "Acid rain affects water pH but does not directly explain the increasing concentration of pollutants like mercury up the food chain."}, {"text": "Bioaccumulation and biomagnification of persistent pollutants.", "isCorrect": true, "rationale": "The text defines 'bioaccumulation' as a substance increasing in an organism's tissues over time, and 'biomagnification' as the increasing concentration in organisms at each successive trophic level. These processes explain why a pollutant like mercury would be found in high concentrations in top predators, even if water levels are low."}, {"text": "Ground-level ozone formation, damaging aquatic plant life.", "isCorrect": false, "rationale": "Ground-level ozone is an air pollutant that affects lungs and crops, not directly causing accumulation of heavy metals in aquatic food webs."}], "id": "q05"}, {"question": "The Montreal Protocol was highly successful in addressing ozone depletion primarily because it targeted substances that:", "options": [{"text": "Directly absorbed all visible light in the stratosphere.", "isCorrect": false, "rationale": "Ozone absorbs UV radiation, not visible light, and CFCs destroy ozone, they don't directly absorb visible light themselves in a way that causes depletion."}, {"text": "Reduced the pH of precipitation, causing acid rain.", "isCorrect": false, "rationale": "Ozone depletion and acid rain are distinct atmospheric issues with different causes. Acid rain is primarily caused by SO2 and NOx, not CFCs."}, {"text": "Competed with oxygen to form ozone molecules, thus preventing ozone regeneration.", "isCorrect": false, "rationale": "CFCs do not compete to form ozone; rather, their breakdown products (chlorine atoms) catalytically destroy existing ozone molecules."}, {"text": "Catalytically destroyed many ozone molecules before being consumed themselves.", "isCorrect": true, "rationale": "The text explains the catalytic cycle: 'A single chlorine atom from a CFC molecule can destroy thousands of ozone molecules in a catalytic chain reaction... The chlorine atom is regenerated at the end, so it can keep destroying ozone molecules over and over.' This potent, self-perpetuating destruction mechanism was the key issue targeted by the Montreal Protocol."}], "id": "q06"}, {"question": "A city council is debating a new housing development project. To ensure the project aligns with the principles of sustainability, which question should be a primary consideration?", "options": [{"text": "Will the project maximize short-term economic profits for developers?", "isCorrect": false, "rationale": "While economic viability is a component, prioritizing only short-term profits without considering long-term environmental or social impacts does not align with sustainability, which balances economic development, social well-being, and environmental protection."}, {"text": "Will the project use the most land possible to accommodate growth?", "isCorrect": false, "rationale": "Maximizing land use often leads to urban sprawl, habitat fragmentation, and increased per-capita land footprints, which are generally unsustainable practices contrary to the benefits of dense urban living."}, {"text": "Can the resources required for this development be provided indefinitely without degrading the local environment or compromising future resource availability?", "isCorrect": true, "rationale": "This question directly reflects the definition of sustainability: 'meeting the needs of the present without compromising the ability of future generations to meet their own needs,' by considering long-term resource availability and environmental impact."}, {"text": "Will the project exclusively benefit the current generation of residents?", "isCorrect": false, "rationale": "Sustainability explicitly focuses on the ability of *future generations* to meet their own needs, not just benefiting the current generation. An exclusive focus on the present contradicts the core principle."}], "id": "q07"}, {"question": "How do scientists primarily contribute to the effectiveness of environmental policy, such as the Clean Air Act or the Montreal Protocol?", "options": [{"text": "By enforcing environmental regulations and imposing fines on polluters.", "isCorrect": false, "rationale": "Enforcement of regulations is typically carried out by government agencies, not directly by scientists. Scientists provide the basis for these regulations."}, {"text": "By lobbying politicians to pass specific environmental laws.", "isCorrect": false, "rationale": "While scientists may advocate for policies based on their findings, their primary contribution outlined in the text is through providing evidence, not direct lobbying as a core role."}, {"text": "By providing scientific evidence through monitoring, modeling, and evaluation of environmental issues and solutions.", "isCorrect": true, "rationale": "The text states scientists contribute by 'Monitoring: Measuring pollution levels... Modeling: Using computer simulations... Communicating: Publishing research, advising policymakers... Evaluating: Assessing whether policies are working.' These actions provide the scientific basis for effective policy."}, {"text": "By directly managing natural resources and ecosystems on behalf of the government.", "isCorrect": false, "rationale": "Resource management is often a role for land managers, conservation organizations, or government agencies, distinct from the primary scientific contributions to policy formulation and assessment."}], "id": "q08"}, {"question": "The introductory section states that 'Humans have transformed more of Earth's surface in the past two centuries than in all of previous history.' This statement best underscores the:", "options": [{"text": "Inevitable nature of environmental degradation.", "isCorrect": false, "rationale": "The statement highlights the scale and speed of transformation, not necessarily its inevitability. The text later discusses sustainability and policy, implying solutions are possible."}, {"text": "Recent acceleration and widespread scope of human-induced environmental changes.", "isCorrect": true, "rationale": "The phrase 'past two centuries than in all of previous history' directly points to a rapid acceleration and the extensive nature ('more of Earth's surface') of human impact in modern times."}, {"text": "Limited ability of natural systems to recover from human disturbance.", "isCorrect": false, "rationale": "While true that some systems have limited recovery, the statement itself focuses on the *scale of human transformation*, not the recovery capacity of nature."}, {"text": "Success of global environmental treaties in reversing historical trends.", "isCorrect": false, "rationale": "The introductory statement describes a historical trend of increasing transformation, not a reversal. Success stories like the Montreal Protocol are discussed later but don't negate the overall historical scale mentioned here."}], "id": "q09"}, {"question": "While both ground-level ozone and stratospheric ozone are discussed, they differ significantly in their environmental roles and causes. Which statement accurately distinguishes stratospheric ozone depletion from the formation of ground-level ozone?", "options": [{"text": "Stratospheric ozone depletion is caused by industrial emissions like SO2 and NOx, while ground-level ozone is formed by CFCs.", "isCorrect": false, "rationale": "This is incorrect. Stratospheric ozone depletion is caused by CFCs, while ground-level ozone is formed from NOx and VOCs, and SO2/NOx cause acid rain."}, {"text": "Stratospheric ozone depletion results in acid rain, whereas ground-level ozone irritates lungs and damages crops.", "isCorrect": false, "rationale": "Stratospheric ozone depletion increases UV radiation reaching Earth; acid rain is caused by SO2 and NOx. Ground-level ozone does irritate lungs and damage crops, but the first part of the statement is wrong."}, {"text": "Stratospheric ozone protects against harmful UV radiation and is destroyed by CFCs, while ground-level ozone is a pollutant formed by sunlight reacting with NOx and VOCs.", "isCorrect": true, "rationale": "This statement accurately distinguishes the two: 'High in the stratosphere, a thin layer of ozone (O3) shields Earth's surface from harmful ultraviolet (UV) radiation... destroyed by... chlorofluorocarbons (CFCs)' and 'Ground-level ozone (O3): Formed when sunlight reacts with NOx and volatile organic compounds. It irritates lungs and damages crops.'"}, {"text": "Stratospheric ozone is a localized phenomenon, while ground-level ozone affects the entire globe.", "isCorrect": false, "rationale": "Stratospheric ozone depletion is a global issue, while ground-level ozone (smog) is typically a localized urban or regional air pollution problem."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
