<body>
<div class="quiz-container">

        <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Intermediate Science &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What two fundamental factors are used to explain all three periodic trends discussed in the section?", "options": [{"text": "Melting point and boiling point.", "isCorrect": false, "rationale": "Melting point and boiling point are physical properties, not the underlying factors explaining atomic radius, ionization energy, or electronegativity trends."}, {"text": "Number of isotopes and electron affinity.", "isCorrect": false, "rationale": "While related to atomic structure, the text explicitly states the two factors are 'the number of energy levels and the effective pull of the nucleus on the outermost electrons,' not isotopes or electron affinity."}, {"text": "Number of energy levels and the effective pull of the nucleus on outermost electrons.", "isCorrect": true, "rationale": "The text explicitly states these are the 'same two factors you studied in Unit 3' that explain each trend."}, {"text": "Covalent bond strength and metallic character.", "isCorrect": false, "rationale": "These are chemical properties or classifications, not the fundamental physical factors used to explain the periodic trends of atomic radius, ionization energy, and electronegativity."}]}, {"question": "Why does atomic radius increase as you move down a group on the periodic table?", "options": [{"text": "The nuclear charge increases, pulling electrons more tightly.", "isCorrect": false, "rationale": "While nuclear charge increases, its effect is offset by the addition of new energy levels; increased nuclear charge primarily explains the decrease across a period when shells are constant."}, {"text": "More protons are added, increasing the repulsive forces between electrons.", "isCorrect": false, "rationale": "Additional protons increase attraction, not repulsion, on electrons. Repulsion exists but is not the primary factor for increasing radius down a group."}, {"text": "Each new period adds another electron energy level, increasing the distance of outermost electrons from the nucleus.", "isCorrect": true, "rationale": "The text explains that 'Each new period adds another electron energy level (shell), so the outermost electrons sit farther from the nucleus,' leading to a larger atomic radius."}, {"text": "Electrons are added to the same energy level, causing greater electron-electron repulsion.", "isCorrect": false, "rationale": "Electrons are added to *new* energy levels down a group, not the same one, and while electron-electron repulsion plays a role, the primary reason for size increase is the additional energy level."}]}, {"question": "Despite adding more electrons, why does atomic radius generally decrease as you move from left to right across a period?", "options": [{"text": "The number of electron shells decreases.", "isCorrect": false, "rationale": "The number of electron shells remains constant as you move across a period; new electrons are added to the same energy level."}, {"text": "The repulsion between electrons in the outer shell increases significantly.", "isCorrect": false, "rationale": "While electron-electron repulsion increases, the stronger nuclear pull from additional protons is the dominant factor that causes the atom to shrink across a period."}, {"text": "Additional protons increase the nuclear charge, pulling all electrons closer to the nucleus within the same energy level.", "isCorrect": true, "rationale": "The text states that 'additional protons increase the nuclear charge, pulling all the electrons closer' because 'the new electrons are added to the same energy level,' making the increased nuclear pull dominant."}, {"text": "The elements become more metallic, leading to smaller atomic structures.", "isCorrect": false, "rationale": "Metallic character decreases across a period, and this is not the direct explanation for the decrease in atomic radius."}]}, {"question": "Based on the periodic trends discussed, which of the following elements would have the largest atomic radius?", "options": [{"text": "Helium (He)", "isCorrect": false, "rationale": "Helium is in the upper-right corner of the periodic table, known for having one of the smallest atomic radii."}, {"text": "Fluorine (F)", "isCorrect": false, "rationale": "Fluorine is also in the upper-right corner, making it one of the smallest atoms, as noted in the text."}, {"text": "Sodium (Na)", "isCorrect": false, "rationale": "Sodium is an alkali metal and larger than elements in the upper-right, but it is not among the very largest; Francium is significantly larger due to being further down the group."}, {"text": "Francium (Fr)", "isCorrect": true, "rationale": "The text explicitly states that 'the largest atoms are in the lower-left corner of the periodic table (francium, cesium),' making Francium the largest among the given options."}]}, {"question": "A student observes that an atom requires a large amount of energy to remove its outermost electron. Based on the provided text, what can be inferred about this atom?", "options": [{"text": "It has a low electronegativity.", "isCorrect": false, "rationale": "High ionization energy often correlates with high electronegativity because both indicate a strong hold on electrons, making this inference incorrect."}, {"text": "It holds its electrons loosely.", "isCorrect": false, "rationale": "The text states that 'An atom that holds its electrons tightly has a high ionization energy; one that holds them loosely has a low ionization energy.' Therefore, a high energy requirement means the electrons are held tightly."}, {"text": "It likely has a full outer shell or a strong nuclear pull on its outer electrons.", "isCorrect": true, "rationale": "High ionization energy indicates that electrons are held tightly. This is characteristic of atoms with strong nuclear pulls (e.g., across a period) or stable, full outer shells (e.g., noble gases), as mentioned in the text."}, {"text": "It has a large atomic radius.", "isCorrect": false, "rationale": "A large atomic radius generally corresponds to electrons being held more loosely and thus having a low ionization energy, making this inference incorrect."}]}, {"question": "The ionization energy increases as you move from left to right across a period primarily because:", "options": [{"text": "The electron shielding effect increases significantly.", "isCorrect": false, "rationale": "Electron shielding stays roughly constant across a period because electrons are added to the same energy level."}, {"text": "The number of electron shells decreases.", "isCorrect": false, "rationale": "The number of electron shells remains the same as you move across a period."}, {"text": "The nuclear charge increases while outer electrons are in the same energy level, strengthening the pull.", "isCorrect": true, "rationale": "The text explains that 'As you move across a period, the nuclear charge increases while the electrons remain in the same shell. The stronger nuclear pull makes it harder to remove an electron, so more energy is required.'"}, {"text": "The atoms become less stable due to incomplete outer shells.", "isCorrect": false, "rationale": "While stability plays a role, the primary reason for increasing ionization energy across a period is the increasing effective nuclear charge, which is explicitly stated in the text."}]}, {"question": "Considering the trends, which of the following elements would require the *least* amount of energy to remove an outer electron?", "options": [{"text": "Neon (Ne)", "isCorrect": false, "rationale": "Neon is a noble gas, which the text states have 'the highest ionization energies in each period because their full outer shells are exceptionally stable.'"}, {"text": "Potassium (K)", "isCorrect": true, "rationale": "Potassium is an alkali metal. The text states that 'Alkali metals have the lowest ionization energies because they have just one loosely held valence electron,' making it easy to remove."}, {"text": "Chlorine (Cl)", "isCorrect": false, "rationale": "Chlorine is a halogen, located in the upper-right region of the periodic table, and thus has a relatively high ionization energy compared to alkali metals."}, {"text": "Oxygen (O)", "isCorrect": false, "rationale": "Oxygen is a nonmetal in the upper-right region, indicating a relatively high ionization energy, not the least."}]}, {"question": "Which statement accurately describes electronegativity and its general trend across a period?", "options": [{"text": "Electronegativity measures an atom's size and decreases across a period.", "isCorrect": false, "rationale": "Electronegativity measures attraction for shared electrons, not atomic size (atomic radius), and it increases, not decreases, across a period."}, {"text": "Electronegativity measures the energy to remove an electron and decreases across a period.", "isCorrect": false, "rationale": "The energy to remove an electron is ionization energy, not electronegativity, and ionization energy increases, not decreases, across a period."}, {"text": "Electronegativity measures an atom's attraction for shared electrons in a bond and increases across a period.", "isCorrect": true, "rationale": "The text defines electronegativity as 'how strongly an atom pulls on shared electrons when it is part of a chemical bond' and states it 'increases across a period.'"}, {"text": "Electronegativity measures the stability of an atom's outer shell and remains constant across a period.", "isCorrect": false, "rationale": "Electronegativity is about attraction in a bond, not directly stability of the outer shell, and it does not remain constant across a period; it increases."}]}, {"question": "How do the factors of nuclear charge and electron shielding/distance collectively explain why atoms get larger and hold electrons less tightly as you move down a group?", "options": [{"text": "Nuclear charge increases, but electrons are in the same shell, so shielding is constant.", "isCorrect": false, "rationale": "This explanation describes the trend across a period, where atoms get smaller and hold electrons more tightly, not down a group."}, {"text": "Both nuclear charge and shielding decrease, making electrons easier to remove.", "isCorrect": false, "rationale": "Nuclear charge increases down a group, not decreases, making this statement incorrect."}, {"text": "A new electron shell is added, increasing both shielding and distance, which weakens the effective nuclear pull on outer electrons.", "isCorrect": true, "rationale": "The summary section states, 'Down a group, a new shell is added each period, increasing both shielding and distance, so the nuclear pull weakens — atoms get larger and hold electrons less tightly.'"}, {"text": "The metallic character of elements increases, causing atoms to expand.", "isCorrect": false, "rationale": "While metallic character does increase down a group, the direct explanation for size and electron affinity lies in the interplay of nuclear charge and electron shielding/distance, as detailed in the text."}]}, {"question": "The section states that 'atomic radius follows the opposite direction from ionization energy and electronegativity.' Which of the following best explains this inverse relationship?", "options": [{"text": "Elements with a larger atomic radius naturally have more electrons, making them more attractive to shared electrons.", "isCorrect": false, "rationale": "Larger atoms (larger radius) hold their outer electrons less tightly, making them less attractive to shared electrons (lower electronegativity) and easier to remove (lower ionization energy)."}, {"text": "Small atoms hold their electrons tightly due to a closer nucleus and less shielding, leading to high ionization energy and strong attraction for shared electrons.", "isCorrect": true, "rationale": "The text summarizes this directly: 'small atoms hold their electrons tightly (high ionization energy, high electronegativity), while large atoms hold them loosely (low ionization energy, low electronegativity).'"}, {"text": "Large atoms have more energy levels, which always increases their desire to gain electrons.", "isCorrect": false, "rationale": "Large atoms with more energy levels hold their outer electrons less tightly, meaning less desire to gain electrons (lower electronegativity) and easier to lose (lower ionization energy)."}, {"text": "Ionization energy and electronegativity are directly related to the number of neutrons, which decreases as atomic radius increases.", "isCorrect": false, "rationale": "Periodic trends, ionization energy, and electronegativity are primarily determined by nuclear charge (protons) and electron configuration, not the number of neutrons."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
