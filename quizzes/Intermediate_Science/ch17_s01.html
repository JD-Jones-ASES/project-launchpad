<script>
var QUESTIONS = [{"question": "Which of the following seafloor features is characterized by being the most biologically productive part of the ocean, primarily due to sunlight penetration?", "options": [{"text": "Abyssal plain", "isCorrect": false, "rationale": "Abyssal plains are vast, flat regions of the deep ocean floor, typically 3000-6000m deep, far beyond the reach of significant sunlight for photosynthesis, thus not the most biologically productive in terms of photosynthetic organisms."}, {"text": "Mid-ocean ridge", "isCorrect": false, "rationale": "Mid-ocean ridges are underwater mountain chains formed at divergent plate boundaries. While they can host unique chemosynthetic ecosystems, their overall productivity is not primarily driven by sunlight reaching the bottom across their vast extent."}, {"text": "Continental shelf", "isCorrect": true, "rationale": "The continental shelf is described as the most biologically productive part of the ocean because it is relatively shallow (up to about 200m deep), allowing sufficient sunlight to penetrate to the bottom and support photosynthetic organisms."}, {"text": "Ocean trench", "isCorrect": false, "rationale": "Ocean trenches are extremely deep valleys, reaching nearly 11000m. Sunlight cannot penetrate to these depths, making them unproductive in terms of surface-driven photosynthetic activity."}]}, {"question": "A scientist discovers an extensive underwater mountain range exhibiting significant volcanic activity and evidence of new crust formation. This feature is most likely a direct result of which tectonic process?", "options": [{"text": "Subduction at a convergent plate boundary", "isCorrect": false, "rationale": "Subduction at convergent plate boundaries leads to the formation of ocean trenches, where one plate slides beneath another, not extensive underwater mountain ranges with widespread new crust formation."}, {"text": "Erosion by deep ocean currents", "isCorrect": false, "rationale": "While deep ocean currents can influence seafloor topography through erosion and deposition, they do not create extensive underwater mountain ranges with volcanic activity and new crust formation."}, {"text": "Rifting at a divergent plate boundary", "isCorrect": true, "rationale": "Mid-ocean ridges, which are extensive underwater mountain chains formed by volcanic activity and the creation of new oceanic crust, are explicitly stated to form at divergent plate boundaries where tectonic plates pull apart (rift)."}, {"text": "Isostatic adjustment of continental crust", "isCorrect": false, "rationale": "Isostatic adjustment refers to the vertical movement of Earth's crust due to buoyancy, often associated with changes in overlying loads. It does not directly cause the formation of volcanic underwater mountain ranges with new oceanic crust."}]}, {"question": "Which of the following scenarios would most likely result in a localized increase in ocean salinity significantly above the global average of 35ppt?", "options": [{"text": "The mouth of a large river, such as the Amazon, during a period of high flow.", "isCorrect": false, "rationale": "River input adds freshwater to the ocean, diluting the dissolved salts and thus decreasing salinity, as exemplified by the Amazon River mouth having well-below-average surface salinity."}, {"text": "A region experiencing intense evaporation with minimal freshwater input.", "isCorrect": true, "rationale": "Evaporation removes water but leaves salts behind, concentrating them and increasing salinity. The Red Sea is given as an example where intense evaporation and little freshwater input result in salinity above 40ppt."}, {"text": "An area where large amounts of sea ice are rapidly melting.", "isCorrect": false, "rationale": "Melting sea ice adds freshwater to the ocean, which would dilute the salts and decrease the local salinity."}, {"text": "A polar region during the spring thaw, experiencing heavy rainfall.", "isCorrect": false, "rationale": "Both melting ice (spring thaw) and heavy rainfall add freshwater to the ocean, which would decrease salinity in the surface layer."}]}, {"question": "A research submarine is descending into the tropical Pacific Ocean. At what approximate depth range would the submarine's temperature sensors record the most dramatic and rapid decrease in water temperature?", "options": [{"text": "0m to 200m (Surface layer)", "isCorrect": false, "rationale": "The surface layer (0-200m) is characterized by relatively uniform temperature due to warming by sunlight and mixing by wind and waves, so no dramatic temperature decrease typically occurs within this layer."}, {"text": "200m to 1000m (Thermocline)", "isCorrect": true, "rationale": "The thermocline (200-1000m) is explicitly defined as 'a zone of rapid temperature decrease with depth.' This is where the most dramatic change would occur, especially in tropical regions where surface waters are warm."}, {"text": "1000m to 2000m (Deep zone)", "isCorrect": false, "rationale": "The deep zone (below 1000m) is characterized by cold, dark, and relatively uniform temperature, typically 1-4°C, with only a slow decrease, not a dramatic or rapid one."}, {"text": "Below 2000m (Abyssal plain depths)", "isCorrect": false, "rationale": "Depths below 2000m are well within the deep zone, where temperatures are stable and cold, showing no dramatic changes from 1000m downwards."}]}, {"question": "What is the primary characteristic that differentiates a seamount from a volcanic island?", "options": [{"text": "Seamounts are formed by divergent plate boundaries, while volcanic islands are formed by convergent plate boundaries.", "isCorrect": false, "rationale": "Both seamounts and volcanic islands are typically formed by volcanic activity, which can occur at various tectonic settings (e.g., hotspots, subduction zones), but their tectonic origin is not the primary differentiator mentioned in the text."}, {"text": "Seamounts are composed of sedimentary rock, whereas volcanic islands are igneous.", "isCorrect": false, "rationale": "Seamounts are described as 'underwater volcanic mountains,' implying an igneous (volcanic) origin, similar to volcanic islands. Sedimentary rock is not their primary composition."}, {"text": "A seamount remains submerged beneath the ocean surface, while a volcanic island extends above it.", "isCorrect": true, "rationale": "The text states that seamounts are 'underwater volcanic mountains that rise from the ocean floor but do not reach the surface.' It further clarifies, 'If a seamount breaks the surface, it forms a volcanic island.' This distinction by surface presence is key."}, {"text": "Volcanic islands are typically found in polar regions, while seamounts are found in tropical regions.", "isCorrect": false, "rationale": "The text does not specify geographical limitations for seamounts or volcanic islands based on latitude; their presence is dictated by volcanic activity, which can occur globally."}]}, {"question": "Which ocean basin is explicitly identified as both the largest and deepest among the five major basins?", "options": [{"text": "Atlantic Ocean", "isCorrect": false, "rationale": "The Atlantic Ocean is one of the five major basins but is not described as the largest and deepest in the text."}, {"text": "Indian Ocean", "isCorrect": false, "rationale": "The Indian Ocean is one of the five major basins but is not described as the largest and deepest in the text."}, {"text": "Arctic Ocean", "isCorrect": false, "rationale": "The Arctic Ocean is one of the five major basins but is not described as the largest and deepest. It is generally the shallowest of the major oceans."}, {"text": "Pacific Ocean", "isCorrect": true, "rationale": "The text explicitly states: 'The ocean is divided into five major basins: the Pacific (largest and deepest), Atlantic, Indian, Southern (Antarctic), and Arctic.'"}]}, {"question": "Why is the thermocline typically weak or absent in polar regions, despite being a prominent feature in tropical and temperate oceans?", "options": [{"text": "Polar regions experience more intense solar radiation, leading to a uniform warm surface layer.", "isCorrect": false, "rationale": "Polar regions receive less intense solar radiation, which leads to colder surface waters, not warmer uniform ones."}, {"text": "Deep ocean currents are stronger in polar regions, preventing distinct temperature layering.", "isCorrect": false, "rationale": "While deep ocean circulation is active in polar regions, the primary reason for a weak thermocline is related to the initial temperature difference (or lack thereof) between surface and deep water, not directly current strength preventing layering."}, {"text": "The surface water in polar regions is already cold, so there is little temperature difference with depth.", "isCorrect": true, "rationale": "The text states: 'In polar regions, surface water is already cold, so there is little temperature difference with depth and the thermocline is weak or absent.' This lack of a significant temperature gradient is the direct cause."}, {"text": "Increased precipitation in polar regions dilutes the surface water, affecting its thermal properties.", "isCorrect": false, "rationale": "Increased precipitation would primarily affect salinity by adding freshwater, not directly cause the absence of a thermocline based on its thermal properties. The key factor is the ambient cold surface temperature."}]}, {"question": "Which of the following statements best describes the overall nature of the ocean floor, according to the provided text?", "options": [{"text": "It is predominantly a flat, featureless plain covered uniformly by fine sediment.", "isCorrect": false, "rationale": "While abyssal plains are vast and flat, the text explicitly states, 'The ocean floor is not flat; it has been shaped by the same tectonic forces you studied in Unit 7,' and describes a diverse landscape."}, {"text": "It is a dynamic landscape with varied features, including mountain ranges, plains, and deep trenches, shaped by tectonic forces.", "isCorrect": true, "rationale": "The introduction states, 'If you could drain the ocean, you would find a landscape as dramatic as anything on the surface — vast plains, towering mountain ranges, and trenches so deep...' It also attributes its shape to 'tectonic forces,' indicating a dynamic and varied nature."}, {"text": "Its topography is solely determined by the accumulation of marine sediment over geological time.", "isCorrect": false, "rationale": "While sediment covers some features like abyssal plains, the text emphasizes that the ocean floor is primarily shaped by 'tectonic forces,' which create the major structural features like ridges and trenches, not just sediment accumulation."}, {"text": "It is a largely unexplored and unknown realm, with only a few major features identified.", "isCorrect": false, "rationale": "The text clearly describes numerous specific features (continental shelf, slope, abyssal plain, ridges, trenches, seamounts) and their formation, indicating a significant scientific understanding of its structure, not that it is 'largely unexplored and unknown'."}]}, {"question": "Imagine you are an oceanographer taking water samples at varying depths. You record an average ocean salinity of 35ppt. If you were to take a surface water sample directly over an area where seawater is actively freezing to form sea ice, what would you expect the salinity of the remaining unfrozen water to be?", "options": [{"text": "Significantly lower than 35ppt, due to freshwater input from freezing.", "isCorrect": false, "rationale": "When seawater freezes, salt is excluded from the ice, meaning the remaining unfrozen water becomes saltier, not less salty. Freshwater is effectively removed from the liquid phase."}, {"text": "Approximately 35ppt, as freezing does not significantly alter the salinity of the surrounding water.", "isCorrect": false, "rationale": "Freezing seawater does significantly alter the salinity of the remaining water because the salt is largely excluded from the ice structure."}, {"text": "Significantly higher than 35ppt, as salt is excluded from the forming ice.", "isCorrect": true, "rationale": "The text states: 'when seawater freezes, salt is excluded from the ice, increasing the salinity of the remaining water.' Therefore, the remaining unfrozen water would have a higher salinity."}, {"text": "Variable, depending entirely on the speed of ice formation, but generally stable.", "isCorrect": false, "rationale": "While the speed of formation might influence the degree of salt exclusion, the fundamental process ensures that salt is concentrated in the remaining water, leading to an increase in salinity, not a generally stable outcome."}]}, {"question": "The Mid-Atlantic Ridge is described as the longest mountain range on Earth, stretching over 16000km. This immense underwater feature is a prime example of a geological structure formed at which type of plate boundary?", "options": [{"text": "Convergent boundary with oceanic-continental subduction", "isCorrect": false, "rationale": "Oceanic-continental subduction typically forms volcanic mountain ranges on the continent and deep ocean trenches offshore, not extensive mid-ocean ridges."}, {"text": "Transform boundary, characterized by plates sliding past each other horizontally", "isCorrect": false, "rationale": "Transform boundaries are associated with large fault systems and earthquakes as plates slide past each other, not the creation of extensive volcanic mountain ranges like the Mid-Atlantic Ridge."}, {"text": "Divergent boundary, where plates move apart and new oceanic crust is created", "isCorrect": true, "rationale": "The text explicitly states that 'Mid-ocean ridges — Underwater mountain chains formed at divergent plate boundaries, where new oceanic crust is created by volcanic activity.' The Mid-Atlantic Ridge is then given as an example of such a feature."}, {"text": "Passive continental margin, characterized by a lack of tectonic activity", "isCorrect": false, "rationale": "Passive continental margins are tectonically stable areas far from plate boundaries, and thus would not be the site of active mountain building and volcanic new crust formation like the Mid-Atlantic Ridge."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
