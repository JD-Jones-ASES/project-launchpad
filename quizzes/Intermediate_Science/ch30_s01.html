<script>
var QUESTIONS = [{"question": "The introduction uses the example of understanding a forest to illustrate the main idea of the section. What core principle does this analogy emphasize?", "options": [{"text": "Specialized scientists can fully understand their specific domains independently.", "isCorrect": false, "rationale": "The text explicitly states, 'No single branch can explain the forest by itself.' This option contradicts the central argument for interdisciplinary collaboration."}, {"text": "The most effective scientific research focuses on a single discipline to achieve deep understanding.", "isCorrect": false, "rationale": "While deep understanding within a discipline is valuable, the section argues that true comprehension of natural systems requires integrating multiple disciplines, not isolating them."}, {"text": "Natural systems are too complex for any human to fully comprehend, even with interdisciplinary efforts.", "isCorrect": false, "rationale": "The text implies that a 'true understanding' is possible through the combined efforts of the four branches, not that it's impossible."}, {"text": "A comprehensive understanding of any natural system requires the integrated knowledge from multiple scientific branches.", "isCorrect": true, "rationale": "The forest analogy is used to demonstrate that biologists, chemists, earth scientists, and physicists all contribute essential, distinct pieces of understanding that are necessary 'to truly understand any natural system.'"}]}, {"question": "In the Life Science journey, which two cycles are most directly linked by the principle that 'You could not understand evolution without genetics'?", "options": [{"text": "Cycle 1 (The Cell) and Cycle 3 (Photosynthesis and Cellular Respiration)", "isCorrect": false, "rationale": "While both are fundamental to life, their direct relationship to 'evolution without genetics' is not the primary link highlighted in the text's 'Life Science Thread.'"}, {"text": "Cycle 2 (From Cells to Organisms) and Cycle 6 (Ecology and Human Impact)", "isCorrect": false, "rationale": "These cycles deal with organizational hierarchy and ecosystem interactions, respectively, but do not directly address the genetic basis of evolution mentioned in the thread."}, {"text": "Cycle 4 (Genetics and Heredity) and Cycle 5 (Evolution and Natural Selection)", "isCorrect": true, "rationale": "The 'Life Science Thread' specifically states, 'You could not understand evolution without genetics.' Cycle 4 introduced genetics and heredity, and Cycle 5 explained how genetic variation drives evolution and natural selection."}, {"text": "Cycle 3 (Photosynthesis and Cellular Respiration) and Cycle 5 (Evolution and Natural Selection)", "isCorrect": false, "rationale": "Energy transformation is crucial for life, but the explicit connection between understanding evolution and a prerequisite of genetics is a more direct link than the energy cycles."}]}, {"question": "A scientist is studying the long-term changes in the Earth's average global temperature and how human activities contribute to these changes. Which cycle from the Earth Science journey would be most relevant to their primary research focus?", "options": [{"text": "Cycle 2 — Plate Tectonics and Earth's Surface", "isCorrect": false, "rationale": "Plate tectonics explains geological processes like earthquakes and mountains, but not directly global temperature changes due to human impact."}, {"text": "Cycle 4 — The Ocean and Water Systems", "isCorrect": false, "rationale": "While oceans influence climate, Cycle 4 focuses on ocean currents, waves, and tides, not the broader anthropogenic climate change directly."}, {"text": "Cycle 6 — Climate Science and Earth's Future", "isCorrect": true, "rationale": "This cycle explicitly deals with 'The difference between climate and weather, the enhanced greenhouse effect, evidence for anthropogenic climate change, and strategies for mitigation and adaptation,' which directly matches the research focus described."}, {"text": "Cycle 5 — Astronomy and the Solar System", "isCorrect": false, "rationale": "Astronomy deals with celestial bodies and the solar system's formation, not Earth's climate change caused by human activities."}]}, {"question": "The Chemistry journey progresses structurally, building knowledge from simple to complex. According to the text, which concept is foundational to understanding why atoms bond?", "options": [{"text": "The law of conservation of energy in chemical reactions.", "isCorrect": false, "rationale": "The law of conservation of energy is covered in Cycle 4 (Chemical Reactions) but is not described as foundational to *why* atoms bond, which precedes reactions."}, {"text": "The organization of elements in the Periodic Table.", "isCorrect": false, "rationale": "While the Periodic Table (Cycle 2) organizes elements based on their properties, the direct reason for bonding is explained in terms of electron configurations."}, {"text": "Achieving stable electron configurations in atoms.", "isCorrect": true, "rationale": "Cycle 3 (Chemical Bonds and Compounds) states, 'You learned why atoms bond: to achieve stable electron configurations,' making this the foundational concept for bonding."}, {"text": "The pH scale and buffer chemistry.", "isCorrect": false, "rationale": "The pH scale (Cycle 5) relates to acid-base chemistry in solutions, a more advanced topic than the fundamental reason for atomic bonding."}]}, {"question": "A biologist studying the movement of glucose molecules across a cell membrane into a cell, against its concentration gradient, would be applying concepts learned in which two scientific branches most directly?", "options": [{"text": "Life Science (Cycle 1: The Cell) and Earth Science (Cycle 4: The Ocean and Water Systems)", "isCorrect": false, "rationale": "While Life Science is relevant, Earth Science's ocean systems are not directly related to molecular transport across a cell membrane."}, {"text": "Chemistry (Cycle 5: Solutions, Acids, and Bases) and Physics (Cycle 1: Describing Motion)", "isCorrect": false, "rationale": "Solutions are relevant, and motion is a general physics concept, but the specific biological context of active transport and cell membrane function is missed in this pairing."}, {"text": "Life Science (Cycle 1: The Cell) and Chemistry (Cycle 6: Carbon Chemistry and Biochemistry)", "isCorrect": true, "rationale": "Cycle 1 of Life Science covers the cell membrane and active transport of molecules like glucose. Cycle 6 of Chemistry focuses on organic molecules and biochemistry, including glucose (a carbohydrate), which explains its chemical nature and interaction with cellular machinery."}, {"text": "Earth Science (Cycle 1: Earth's Dynamic Interior) and Physics (Cycle 3: Work, Energy, and Power)", "isCorrect": false, "rationale": "Neither Earth's interior nor general physics concepts of work/energy directly explain glucose transport across a cell membrane in a biological context."}]}, {"question": "Which statement accurately reflects the 'sciconnection' description of the Earth Science journey's progression?", "options": [{"text": "It follows a temporal progression, from ancient geological events to modern climate change.", "isCorrect": false, "rationale": "The 'sciconnection' describes the progression as 'geographic: interior $$ surface $$ atmosphere $$ ocean $$ space $$ climate (integration),' not primarily temporal."}, {"text": "It moves from the smallest geological particles to the largest celestial bodies.", "isCorrect": false, "rationale": "The progression is geographic (interior to space), not particle size-based, and integrates these systems to understand climate."}, {"text": "It starts with Earth's internal processes and expands outward to encompass space, culminating in an integrated understanding of climate.", "isCorrect": true, "rationale": "The 'sciconnection' states the progression is 'geographic: interior $$ surface $$ atmosphere $$ ocean $$ space $$ climate (integration)' and emphasizes how 'Climate science pulls all of these systems together into a unified Earth system model.'"}, {"text": "It focuses primarily on the influence of space on Earth's systems, from the sun to distant galaxies.", "isCorrect": false, "rationale": "While space is a component, the journey begins internally and integrates *all* systems, not just focusing on external influences."}]}, {"question": "A student is asked to determine the number of protons, neutrons, and electrons in a specific isotope of an element, and then use that information to predict its likely reactivity with other elements. Which two Chemistry cycles are most central to this task?", "options": [{"text": "Cycle 4 (Chemical Reactions) and Cycle 5 (Solutions, Acids, and Bases)", "isCorrect": false, "rationale": "These cycles deal with reactions and solution chemistry but do not provide the foundational knowledge of atomic structure or how it predicts reactivity."}, {"text": "Cycle 1 (Inside the Atom) and Cycle 2 (The Periodic Table)", "isCorrect": true, "rationale": "Cycle 1 covers protons, neutrons, and electrons, isotopes, and electron configurations. Cycle 2 explains how elements are organized and uses periodic trends (like ionization energy and electronegativity, which relate to reactivity) to understand element behavior, building on atomic structure."}, {"text": "Cycle 3 (Chemical Bonds and Compounds) and Cycle 6 (Carbon Chemistry and Biochemistry)", "isCorrect": false, "rationale": "While bonding is related to reactivity, the initial determination of subatomic particles and using the periodic table for prediction comes before bonding. Biochemistry is too specific for general reactivity prediction."}, {"text": "Cycle 1 (Inside the Atom) and Cycle 3 (Chemical Bonds and Compounds)", "isCorrect": false, "rationale": "Cycle 1 provides the atomic structure, but Cycle 2 (The Periodic Table) is crucial for predicting *likely reactivity with other elements* based on its position and trends, which then informs bonding (Cycle 3)."}]}, {"question": "The Physics journey began with 'Describing Motion.' Which of the following examples best demonstrates an application of a concept from this initial cycle?", "options": [{"text": "Calculating the force required to accelerate a car given its mass.", "isCorrect": false, "rationale": "This involves force and mass (F=ma), which is part of Cycle 2 (Forces and Newton's Laws), not solely describing motion (kinematics)."}, {"text": "Analyzing how a sound wave's frequency changes as it moves through different mediums.", "isCorrect": false, "rationale": "This involves waves, frequency, and mediums, which are covered in Cycle 4 (Waves: Sound and Light)."}, {"text": "Determining the power generated by an engine over a certain period.", "isCorrect": false, "rationale": "Power (P=W/t) is introduced in Cycle 3 (Work, Energy, and Power)."}, {"text": "Plotting a graph of a runner's speed over time during a race to show acceleration.", "isCorrect": true, "rationale": "Cycle 1 (Describing Motion) explicitly covers 'speed, velocity, and acceleration' and learning 'to read and create position-time and velocity-time graphs.' Plotting speed over time to show acceleration directly applies these concepts."}]}, {"question": "When the text describes the complementary relationship between photosynthesis and cellular respiration, stating 'the products of one are the reactants of the other,' it highlights a fundamental connection between which two concepts?", "options": [{"text": "Genetic information transfer and protein synthesis.", "isCorrect": false, "rationale": "These concepts relate to genetics (Life Science Cycle 4) and are not the focus of photosynthesis and cellular respiration."}, {"text": "Energy transformation and matter cycling within an ecosystem.", "isCorrect": true, "rationale": "Photosynthesis captures solar energy and stores it in glucose, while cellular respiration releases that energy. The complementary nature means that matter (CO2, H2O, O2, C6H12O6) is continuously cycled, representing both energy transformation and matter cycling."}, {"text": "Plate tectonics and the rock cycle.", "isCorrect": false, "rationale": "These are concepts from Earth Science (Cycles 1 and 2), unrelated to biological energy processes."}, {"text": "Atomic structure and chemical bonding.", "isCorrect": false, "rationale": "These are foundational Chemistry concepts (Cycles 1 and 3), but not the direct emphasis of the complementary nature of photosynthesis and respiration as described."}]}, {"question": "The section concludes each disciplinary journey with a 'sciconnection' that emphasizes how each cycle built on the previous one. This progressive learning structure primarily aims to achieve what?", "options": [{"text": "To ensure students memorize isolated facts from each scientific topic efficiently.", "isCorrect": false, "rationale": "The emphasis is on building complexity and connection, not just memorization of isolated facts. The sciconnection explicitly states, 'Each cycle built on the one before it.'"}, {"text": "To simplify complex scientific concepts by breaking them into independent, smaller units.", "isCorrect": false, "rationale": "While breaking down concepts into cycles happens, the goal is not to keep them independent, but to show how they connect and build a deeper, more complex understanding."}, {"text": "To demonstrate the increasing complexity and interconnectedness of scientific knowledge within each discipline.", "isCorrect": true, "rationale": "Each 'sciconnection' explicitly highlights how 'Each cycle built on the one before it' and how understanding earlier concepts is prerequisite for later ones, leading to 'increasing complexity and connection' (Life Science) or 'integration' (Earth Science)."}, {"text": "To encourage students to specialize in a single scientific field early in their studies.", "isCorrect": false, "rationale": "The entire chapter is about 'Interdisciplinary Frontiers,' advocating for integrated understanding across fields, not early specialization in one."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
