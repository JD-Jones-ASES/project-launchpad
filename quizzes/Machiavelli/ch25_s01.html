        <div class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 25, Section 1</div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the primary reason Italian princes lost their states?", "options": [{"text": "Overwhelming power of foreign invaders.", "isCorrect": false, "rationale": "While foreign invaders were the immediate cause, Machiavelli explicitly states that princes should not blame fortune, but rather their own sloth and want of wisdom, implying internal failures were the root cause."}, {"text": "Their own sloth and lack of foresight in times of peace.", "isCorrect": true, "rationale": "Machiavelli states, 'do not let our princes accuse fortune for the loss of their principalities...but rather their own sloth, because in quiet times they never thought there could be a change'."}, {"text": "A series of unfortunate natural disasters and economic downturns.", "isCorrect": false, "rationale": "The text does not mention natural disasters or economic downturns as contributing factors. Machiavelli focuses on leadership failures and military preparedness."}, {"text": "The inherent instability of new principalities compared to hereditary ones.", "isCorrect": false, "rationale": "The text suggests new princes, if they act capably, can become even more secure than hereditary ones, contradicting the idea of inherent instability as the primary cause for *losing* states among the princes discussed."}], "id": "q01"}, {"question": "Machiavelli distinguishes between the observation of new princes and hereditary princes. What is the implication of this distinction?", "options": [{"text": "New princes have an easier time gaining loyalty due to novelty.", "isCorrect": false, "rationale": "The text states new princes are 'more narrowly observed,' implying greater scrutiny, not necessarily an easier time gaining loyalty without effort. Loyalty is earned through 'able' actions."}, {"text": "Hereditary princes can afford to be less attentive to public perception.", "isCorrect": true, "rationale": "The text notes, 'the actions of a new prince are more narrowly observed than those of an hereditary one,' implying hereditary princes might take their position for granted and receive less scrutiny, which can lead to complacency."}, {"text": "Both types of princes face similar challenges in securing their states.", "isCorrect": false, "rationale": "Machiavelli clearly differentiates the level of observation and the means by which each type of prince gains and maintains power, suggesting different challenges."}, {"text": "New princes are inherently more vulnerable to popular discontent.", "isCorrect": false, "rationale": "While new princes are observed more, the text emphasizes that 'when they are seen to be able they gain more men and bind far tighter than ancient blood,' suggesting their vulnerability depends on their actions, not their newness per se."}], "id": "q02"}, {"question": "According to Machiavelli, which combination of factors leads to a 'double disgrace' for a prince?", "options": [{"text": "Being a new prince who fails to establish good laws and arms.", "isCorrect": false, "rationale": "While a new prince failing would be a disgrace, Machiavelli specifically attributes 'double disgrace' to 'him who, born a prince, shall lose his state by want of wisdom,' distinguishing it from a new prince's situation."}, {"text": "Being born a prince and losing the state due to a lack of wisdom.", "isCorrect": true, "rationale": "The text explicitly states: 'so will it be a double disgrace to him who, born a prince, shall lose his state by want of wisdom.' This highlights the greater culpability of hereditary rulers who fail."}, {"text": "Relying on good allies but neglecting the strength of one's own army.", "isCorrect": false, "rationale": "While neglecting one's army is a critical defect, the 'double disgrace' is linked to a prince born into power losing it due to their own lack of wisdom, not just this specific failure."}, {"text": "Failing to secure the nobles while also having the people hostile.", "isCorrect": false, "rationale": "These are common defects leading to loss, but the text specifically defines 'double disgrace' in terms of an hereditary prince's failure due to lack of wisdom."}], "id": "q03"}, {"question": "What common defect did Machiavelli identify among Italian seigniors who lost their states, specifically concerning their military?", "options": [{"text": "They invested too heavily in naval power, neglecting land forces.", "isCorrect": false, "rationale": "The text broadly refers to 'one common defect in regard to arms,' without specifying the type of military neglect. It does not mention naval power."}, {"text": "They lacked sufficient numbers of mercenary soldiers.", "isCorrect": false, "rationale": "While mercenary forces were common, the text uses a general phrase 'defect in regard to arms,' which could imply poor organization, lack of training, or reliance on unreliable forces, but not specifically a lack of numbers of mercenaries."}, {"text": "A fundamental flaw in their overall approach to military strength and organization.", "isCorrect": true, "rationale": "Machiavelli points to 'one common defect in regard to arms from the causes which have been discussed at length.' This implies a systemic issue in their military strategy or setup, not just a specific type of investment."}, {"text": "They relied excessively on foreign military aid.", "isCorrect": false, "rationale": "The text mentions 'good allies' as a strength, but doesn't specifically identify 'excessive reliance on foreign military aid' as the common defect in regard to arms. It's more general."}], "id": "q04"}, {"question": "Consider the example of Philip of Macedon. What key lesson does Machiavelli draw from his ability to retain his kingdom despite powerful enemies?", "options": [{"text": "Even a warlike prince cannot withstand a combined force of Romans and Greeks indefinitely.", "isCorrect": false, "rationale": "Philip *did* sustain the war for many years and retained his kingdom, even if losing some cities, demonstrating resilience rather than inevitable defeat."}, {"text": "Territory size is ultimately irrelevant if a prince possesses great valor.", "isCorrect": false, "rationale": "While valor is important, the text highlights his ability to 'attract the people and secure the nobles' as the primary reason for his success, not solely valor or territory size irrelevance."}, {"text": "Securing internal support from both the people and nobles is crucial for state survival against powerful external threats.", "isCorrect": true, "rationale": "Philip 'knew how to attract the people and secure the nobles,' which enabled him to 'sustain the war against his enemies for many years, and... retained the kingdom.' This demonstrates the critical importance of internal unity."}, {"text": "Strategic alliances are more important than internal stability for long-term survival.", "isCorrect": false, "rationale": "The text emphasizes Philip's internal strategy ('attract the people and secure the nobles') as the key to his survival, rather than external alliances, which are not mentioned in his specific example."}], "id": "q05"}, {"question": "Machiavelli criticizes princes for their 'sloth' during 'quiet times.' What does he suggest is a common 'defect in man' related to this?", "options": [{"text": "An inability to recognize competent advisors during periods of peace.", "isCorrect": false, "rationale": "The text does not mention the inability to recognize competent advisors. The defect is more about proactive preparation."}, {"text": "A tendency to become arrogant and dismissive of potential threats when there is no immediate danger.", "isCorrect": false, "rationale": "While arrogance might contribute, the specific defect mentioned is 'not to make any provision in the calm against the tempest,' focusing on a lack of preparedness."}, {"text": "The failure to prepare for future difficulties during periods of stability and calm.", "isCorrect": true, "rationale": "Machiavelli states, 'it is a common defect in man not to make any provision in the calm against the tempest,' directly addressing the failure to prepare in quiet times."}, {"text": "An over-reliance on the loyalty of the people during times of prosperity.", "isCorrect": false, "rationale": "While princes might misjudge loyalty, the 'common defect' is specifically about not making provisions against future problems, rather than misjudging current loyalty."}], "id": "q06"}, {"question": "Why does Machiavelli deem it 'very bad' for princes to neglect all other expedients and rely solely on the hope of being recalled by the people after losing their state?", "options": [{"text": "Because the people are inherently fickle and cannot be trusted to recall a banished prince.", "isCorrect": false, "rationale": "While Machiavelli often acknowledges human fickleness, his primary reason here is that 'deliverance is of no avail which does not depend upon yourself,' emphasizing self-reliance over external hope, regardless of popular sentiment."}, {"text": "Such deliverance is unreliable and does not guarantee the prince's security, as it doesn't stem from their own valor.", "isCorrect": true, "rationale": "He explicitly states, 'This again either does not happen, or, if it does, it will not be for your security, because that deliverance is of no avail which does not depend upon yourself; those only are reliable, certain, and durable that depend on yourself and your valour.'"}, {"text": "The expenses incurred in regaining a state through popular support are prohibitive.", "isCorrect": false, "rationale": "The text does not mention financial costs associated with a popular recall. The focus is on security and self-reliance."}, {"text": "It implies a prince lacks the necessary ruthlessness to retake power by force.", "isCorrect": false, "rationale": "While a lack of force might be related, the core criticism is about the *source* of the 'deliverance' – it must come from the prince's own 'valour' to be secure, not from others' pity."}], "id": "q07"}, {"question": "A prince rules a state with a well-trained army and a strong economy. However, he is known for being aloof and rarely engaging with either the common people or the powerful nobles. Based on Machiavelli's analysis, what is the most significant risk this prince faces?", "options": [{"text": "His wealth will attract too many foreign mercenaries, making his army less cohesive.", "isCorrect": false, "rationale": "The text focuses on internal support. While military composition is a factor, an aloof prince's primary risk according to Machiavelli's identified defects for lost states is the failure to secure internal factions."}, {"text": "He might lose his state even with a strong army, because he has failed to secure the loyalty of his people or nobles.", "isCorrect": true, "rationale": "The text states that if a prince 'has had the people friendly, he has not known how to secure the nobles.' It emphasizes that without securing both, even states with 'power enough to keep an army in the field cannot be lost.' An aloof prince is unlikely to have secured either."}, {"text": "His strong economy will make his state a target for powerful, envious neighbors.", "isCorrect": false, "rationale": "While economic strength can attract enemies, Machiavelli's primary criticism of princes who lose states is their internal failures and lack of preparation, not external envy of wealth."}, {"text": "He will struggle to form alliances with other states due to his reserved nature.", "isCorrect": false, "rationale": "The text lists 'good allies' as important, but the most direct risk for an aloof prince, given the common defects, is the failure to manage internal factions (people and nobles), which is a prerequisite for a stable state."}], "id": "q08"}, {"question": "Which of the following best summarizes Machiavelli's core message about the Italian princes' loss of their states?", "options": [{"text": "Even the most capable leaders can be overwhelmed by superior external forces.", "isCorrect": false, "rationale": "Machiavelli's entire argument is that the Italian princes brought about their own downfall through internal defects and lack of wisdom, not that external forces were insurmountable for capable leaders (as shown by Philip of Macedon)."}, {"text": "A prince's destiny is largely determined by fortune, making personal efforts secondary.", "isCorrect": false, "rationale": "Machiavelli explicitly tells princes 'do not let our princes accuse fortune... but rather their own sloth,' directly countering the idea that fortune is the primary determinant."}, {"text": "A ruler's ability to maintain power is solely dependent on military might.", "isCorrect": false, "rationale": "While 'good arms' are crucial, the text also stresses 'good laws, good allies, and with a good example,' as well as securing the people and nobles, indicating military might alone is insufficient."}, {"text": "The preservation of a state fundamentally relies on a prince's own wisdom, virtue, and preparedness, not on luck or external saviors.", "isCorrect": true, "rationale": "Machiavelli's verdict is that princes have 'no one to blame but themselves,' due to 'want of wisdom,' 'sloth,' and neglecting to prepare. He emphasizes that reliable deliverance 'depends on yourself and your valour.'"}], "id": "q09"}, {"question": "A newly appointed governor in a volatile region wants to establish himself securely. Applying Machiavelli's advice for a 'new prince,' what would be his most effective strategy?", "options": [{"text": "Maintain a low profile and avoid making any significant changes to prevent stirring discontent.", "isCorrect": false, "rationale": "Machiavelli advises a new prince's 'actions are more narrowly observed,' and when 'seen to be able they gain more men.' A low profile contradicts this need for visible, capable leadership."}, {"text": "Quickly implement strong laws, build up local defenses, forge alliances, and lead by good example to bind the people.", "isCorrect": true, "rationale": "Machiavelli states it is 'a double glory for him to have established a new principality, and adorned and strengthened it with good laws, good arms, good allies, and with a good example,' which directly aligns with this strategy."}, {"text": "Focus primarily on securing the loyalty of the elite, as their support is more stable than that of the general populace.", "isCorrect": false, "rationale": "While securing nobles is important, Machiavelli also highlights attracting 'the people' and their defense of a prince 'if he fails them not in other things.' A balanced approach is needed, not exclusive focus on elites."}, {"text": "Immediately appeal to a powerful foreign patron for military and financial backing to deter local opposition.", "isCorrect": false, "rationale": "While 'good allies' are mentioned, Machiavelli heavily emphasizes self-reliance and internal strength (good laws, good arms, good example) over dependency on external forces, especially for 'security' and 'durability.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
