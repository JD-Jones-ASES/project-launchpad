<script>
var QUESTIONS = [{"question": "According to Machiavelli, what made Cesare Borgia 'the closest thing to his ideal prince,' despite the ultimate failure of his state?", "options": [{"text": "His unwavering loyalty to his father, Pope Alexander VI, which ensured papal support.", "isCorrect": false, "rationale": "Machiavelli emphasizes self-reliance and the prince's own capabilities, not unwavering loyalty to a patron, especially one whose death spelled doom. Cesare's ultimate goal was independence."}, {"text": "His exceptional skill and ruthlessness in building a strong state from a position of inherited fortune, laying solid foundations for future power.", "isCorrect": true, "rationale": "The text states, 'in Cesare Borgia, Machiavelli found the closest thing to his ideal prince—a man who inherited nothing but his father's position and used it to build, through extraordinary skill and controlled ruthlessness, a state that might have lasted generations.' This highlights his ability to lay foundations despite initial reliance on fortune."}, {"text": "The fact that he possessed a hereditary right to the territories he acquired, which guaranteed long-term stability.", "isCorrect": false, "rationale": "Cesare did not have a hereditary right to most of the territories he acquired; they were gained through his father's influence and his own actions. The text stresses his *acquired* skill, not birthright."}, {"text": "His ability to maintain stable alliances with powerful foreign states, such as France, throughout his campaigns.", "isCorrect": false, "rationale": "Cesare actively sought to become independent of foreign powers, particularly France, due to their fickle nature and the limitations they imposed on his ambitions, as evidenced when the King made him desist from attacking Tuscany."}]}, {"question": "Machiavelli states that princes who rise 'solely by good fortune' face a primary challenge. What is this challenge?", "options": [{"text": "Overcoming the initial resistance and resentment from the populace they come to rule.", "isCorrect": false, "rationale": "The text states they 'have little trouble in rising,' indicating easy initial acceptance or lack of resistance, as they 'fly' to power."}, {"text": "Acquiring sufficient financial resources to maintain their newly gained state and military.", "isCorrect": false, "rationale": "While finances are always a concern, Machiavelli primarily focuses on the instability of their power, their lack of knowledge, and their inability to secure faithful forces, rather than specific financial difficulties."}, {"text": "Establishing stable foundations and retaining power, as they lack the necessary knowledge and independent forces.", "isCorrect": true, "rationale": "The text says they 'have little trouble in rising, but much in keeping atop,' and they 'cannot hold it because they have not forces which they can keep friendly and faithful.' It also notes they 'have not the knowledge requisite for the position'."}, {"text": "Dealing with immediate and aggressive foreign invasions upon their ascent to power.", "isCorrect": false, "rationale": "The text emphasizes internal instability and dependence on others as the core problem, not necessarily immediate foreign invasions as the primary challenge for those who rise by fortune."}]}, {"question": "After acquiring the Romagna, Cesare Borgia was initially hindered by two main factors in his ambition to advance further. What were they?", "options": [{"text": "The widespread famine in his newly acquired territories and a lack of popular support among the Romagna people.", "isCorrect": false, "rationale": "Famine is not mentioned as a hindrance. The Romagna yielded to him on the reputation of the king, and later he gained the people's favor through his governance."}, {"text": "The perceived disloyalty of his mercenary forces (specifically the Orsini) and the conditional goodwill of France.", "isCorrect": true, "rationale": "The text explicitly states he 'was hindered by two things: the one, his forces did not appear loyal to him, the other, the goodwill of France.' He feared the Orsini might seize what he won, and the king might do the same."}, {"text": "Direct military opposition from the Duke of Milan and the Republic of Venice.", "isCorrect": false, "rationale": "While the Duke of Milan and Venetians were mentioned earlier as being against the Pope's aggrandizement plans, they are not listed as the immediate hindrances to Cesare's advancement *after* acquiring Romagna."}, {"text": "His father Alexander VI's declining health and a lack of clear succession plan for the papacy.", "isCorrect": false, "rationale": "Alexander VI's death becomes a *future* concern that he planned for, but it was not an *immediate hindrance* during his expansion following the acquisition of Romagna."}]}, {"question": "What was Cesare Borgia's initial, strategic method for weakening the powerful Orsini and Colonnesi factions in Rome?", "options": [{"text": "He directly attacked their strongholds with French military assistance, defeating them in open battle.", "isCorrect": false, "rationale": "While he did later engage them militarily, his *initial* strategy for weakening them involved internal subversion rather than direct military confrontation."}, {"text": "He sought a diplomatic reconciliation, forming a new alliance with them against external threats.", "isCorrect": false, "rationale": "He sought to eliminate their influence, not reconcile in a way that would preserve their power. He later used deceit for a 'reconciliation' to trap them."}, {"text": "He recruited their gentlemen adherents by offering them good pay, offices, and commands, thereby transferring their loyalty to himself.", "isCorrect": true, "rationale": "The text states, 'he weakened the Orsini and Colonnesi parties in Rome, by gaining to himself all their adherents who were gentlemen, making them his gentlemen, giving them good pay, and, according to their rank, honouring them with office and command'."}, {"text": "He publicly exposed their corruption and abuses of power, inciting a popular revolt against them.", "isCorrect": false, "rationale": "This method is not mentioned in the text; his strategy was more direct in subverting their internal support structure."}]}, {"question": "What was Cesare Borgia's strategic purpose behind the public execution of Messer Ramiro d'Orco in Cesena?", "options": [{"text": "To demonstrate his absolute power to foreign rulers and deter future rebellions.", "isCorrect": false, "rationale": "While it certainly demonstrated power, the primary stated reason was to manage the perception of the *local populace*."}, {"text": "To fulfill a personal vendetta against Ramiro for insubordination and suspected treachery.", "isCorrect": false, "rationale": "The text portrays it as a calculated political move to appease the populace, not a personal vendetta or punishment for treachery."}, {"text": "To centralize authority further by eliminating a powerful regional governor who had become too popular.", "isCorrect": false, "rationale": "Ramiro was described as 'odious' due to his cruelty, not popular, and his excessive authority was a problem, but eliminating him was specifically to gain popular favor, not because he was a popular rival."}, {"text": "To gain the favor of the Romagna people by blaming past cruelties on his minister, thereby distancing himself from the negative reputation.", "isCorrect": true, "rationale": "The text explains: 'because he knew that the past severity had caused some hatred against himself, so, to clear himself in the minds of the people, and gain them entirely to himself, he desired to show that, if any cruelty had been practised, it had not originated with him, but in the natural sternness of the minister.'"}]}, {"question": "Which of the following was NOT one of Cesare Borgia's four stated strategies to secure his power against a potentially hostile new Pope after his father's death?", "options": [{"text": "Exterminating the families of the lords whom he had dispossessed.", "isCorrect": false, "rationale": "This was explicitly one of his four strategies: 'Firstly, by exterminating the families of those lords whom he had despoiled'."}, {"text": "Forging a strong, lasting alliance with the Kingdom of Naples to gain military support.", "isCorrect": true, "rationale": "Cesare's actions indicated a desire to become independent of others' forces, including those involved in the struggle for Naples (French and Spaniards). He sought 'new alliances' and to 'temporize with France' but not a 'strong, lasting alliance with the Kingdom of Naples' as a specific strategy for the future Pope."}, {"text": "Winning over the Roman gentlemen to his cause, to use their aid to curb the Pope.", "isCorrect": false, "rationale": "This was explicitly one of his four strategies: 'Secondly, by winning to himself all the gentlemen of Rome, so as to be able to curb the Pope with their aid'."}, {"text": "Converting the College of Cardinals more to his will, to influence papal elections.", "isCorrect": false, "rationale": "This was explicitly one of his four strategies: 'Thirdly, by converting the college more to himself'."}]}, {"question": "According to Machiavelli, what was the most significant consequence of Pope Alexander VI's death for Cesare Borgia?", "options": [{"text": "It allowed Cesare to finally step out of his father's shadow and consolidate his power independently.", "isCorrect": false, "rationale": "The text depicts Alexander's death as a catastrophic event for Cesare's ambitions, not an opportunity for greater independence."}, {"text": "It left Cesare with only the Romagna consolidated, surrounded by hostile armies, and severely ill, undermining his planned future acquisitions.", "isCorrect": true, "rationale": "The text states: 'He left the duke with the state of Romagna alone consolidated, with the rest in the air, between two most powerful hostile armies, and sick unto death.' This highlights the sudden and severe reversal of his fortunes."}, {"text": "It immediately granted him the Duchy of Urbino and Perugia without further military conquest.", "isCorrect": false, "rationale": "He had already acquired these territories before Alexander's death. The death of his father jeopardized, rather than secured, his holdings."}, {"text": "It forced him to reconcile with the Orsini and Colonnesi families, restoring their influence in Rome.", "isCorrect": false, "rationale": "Cesare had already crushed these families prior to his father's death; he did not need to reconcile with them after."}]}, {"question": "Machiavelli states he discusses Cesare Borgia's actions because 'I do not know what better precepts to give a new prince.' What is the primary lesson a new prince should draw from Cesare's example?", "options": [{"text": "The importance of cultivating strong diplomatic ties with powerful neighboring states for consistent military support.", "isCorrect": false, "rationale": "Cesare's efforts were often focused on reducing his dependence on others, especially foreign powers like France, not on maintaining 'consistent military support' from them."}, {"text": "The necessity of acquiring a state through hereditary right to ensure its longevity and stability.", "isCorrect": false, "rationale": "Cesare did not have hereditary right to his state, and the chapter emphasizes acquired ability and foundations, not birthright."}, {"text": "The crucial importance of laying solid foundations for one's power, even if initially aided by fortune, to be able to resist future shocks.", "isCorrect": true, "rationale": "The text states, 'If, therefore, all the steps taken by the duke be considered, it will be seen that he laid solid foundations for his future power, and I do not consider it superfluous to discuss them, because I do not know what better precepts to give a new prince than the example of his actions'."}, {"text": "The advantage of ruling with absolute leniency to gain the unfailing love of the populace.", "isCorrect": false, "rationale": "Cesare used ruthlessness (like Ramiro d'Orco's execution) and severity when necessary, balancing it with justice, rather than ruling with 'absolute leniency'."}]}, {"question": "How does Machiavelli primarily contrast Francesco Sforza's rise to power with that of Cesare Borgia?", "options": [{"text": "Sforza relied entirely on good fortune, whereas Borgia meticulously built his state on his own skill.", "isCorrect": false, "rationale": "The text states Sforza rose 'by proper means and with great ability,' and Borgia acquired his state 'during the ascendancy of his father,' implying initial reliance on fortune."}, {"text": "Sforza acquired his state through his own ability and kept it with little trouble, while Borgia acquired his through the arms and fortune of others but lost it despite his efforts.", "isCorrect": true, "rationale": "The text states: 'Francesco, by proper means and with great ability, from being a private person rose to be Duke of Milan, and that which he had acquired with a thousand anxieties he kept with little trouble. On the other hand, Cesare Borgia...acquired his state during the ascendancy of his father, and on its decline he lost it, notwithstanding that he had taken every measure...'"}, {"text": "Borgia inherited his entire state, whereas Sforza conquered his territories through military might alone.", "isCorrect": false, "rationale": "Borgia did not inherit a state but 'his father's position' and built his state; Sforza used 'proper means' and 'great ability' to rise, not just military might alone."}, {"text": "Sforza was known for his extreme ruthlessness, while Borgia was primarily known for his diplomatic acumen.", "isCorrect": false, "rationale": "The text implies Sforza used 'proper means', and Borgia is explicitly characterized by 'extraordinary skill and controlled ruthlessness'."}]}, {"question": "According to Machiavelli, what was the ultimate cause of Cesare Borgia's state not lasting, despite his extensive efforts and foresight?", "options": [{"text": "His failure to completely eliminate all the dispossessed lords, allowing them to eventually reclaim their territories.", "isCorrect": false, "rationale": "The text notes he had 'killed as many of the dispossessed lords as he could lay hands on, and few had escaped,' indicating significant success in this area, which was not the ultimate cause of his downfall."}, {"text": "His persistent over-reliance on the French, whose support eventually wavered and led to his downfall.", "isCorrect": false, "rationale": "Cesare actively sought to become independent of France, and by the time of Alexander's death, the French were already driven out of Naples, compelling them to 'buy his goodwill', suggesting he was moving *away* from reliance."}, {"text": "The 'extraordinary and extreme malignity of fortune,' specifically the untimely death of his father and his own severe illness at a critical juncture.", "isCorrect": true, "rationale": "The text explicitly states: 'if his dispositions were of no avail, that was not his fault, but the extraordinary and extreme malignity of fortune.' This refers to Alexander's death and Cesare's concurrent sickness."}, {"text": "The widespread rebellion of the Romagna people, who resented his cruel and authoritarian governance.", "isCorrect": false, "rationale": "After Ramiro d'Orco's execution, the text says the people 'beginning to appreciate their prosperity, he gained them all over to himself,' indicating popular satisfaction rather than rebellion."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
