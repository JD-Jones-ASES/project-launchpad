<script>
var QUESTIONS = [{"question": "According to the text, what is the primary lens through which readers should approach Machiavelli's The Prince?", "options": [{"text": "As a historical narrative recounting events from the Renaissance.", "isCorrect": false, "rationale": "The text explicitly states, 'Machiavelli is not telling stories. He is making claims about how politics works.' Therefore, reading it primarily as a narrative is incorrect."}, {"text": "As a series of arguments supported by evidence, rather than a factual recounting of events.", "isCorrect": true, "rationale": "The text advises readers to 'Read it as argument, not narrative,' emphasizing that Machiavelli 'is making claims about how politics works and backing them up with evidence.'"}, {"text": "As a philosophical treatise on abstract principles of governance.", "isCorrect": false, "rationale": "While it deals with governance, Machiavelli reasons from examples 'rather than from abstract principles,' making this option incorrect."}, {"text": "As a guide to ethical leadership based on traditional moral values.", "isCorrect": false, "rationale": "The text notes Machiavelli 'almost never appeals to God, justice, natural law, or traditional morality,' grounding his advice in effectiveness, not traditional ethics."}], "id": "q01"}, {"question": "Why does Machiavelli primarily rely on historical case studies and examples, like Cesare Borgia or Moses, in The Prince?", "options": [{"text": "To entertain the reader with fascinating stories of powerful figures.", "isCorrect": false, "rationale": "While the examples might be interesting, the text emphasizes their function as evidence for arguments, not mere entertainment."}, {"text": "Because he believes the lessons derived from history are more dependable than abstract philosophical theories.", "isCorrect": true, "rationale": "The text clearly states, 'He believes that the lessons of history are more reliable than philosophical theories,' explaining his deliberate use of historical case studies."}, {"text": "To demonstrate his extensive knowledge of ancient and contemporary history.", "isCorrect": false, "rationale": "While he does demonstrate knowledge, the primary reason given is the reliability of historical lessons, not a display of erudition."}, {"text": "To avoid direct criticisms of contemporary political leaders by using historical parallels.", "isCorrect": false, "rationale": "The text does not mention this as a reason for Machiavelli's method; it focuses on the comparative reliability of historical lessons."}], "id": "q02"}, {"question": "The text highlights Machiavelli's deliberate silence on topics like God, justice, natural law, or traditional morality. What does this silence primarily reveal about his political project?", "options": [{"text": "That Machiavelli was an atheist who rejected all forms of religious and moral doctrine.", "isCorrect": false, "rationale": "The text doesn't comment on Machiavelli's personal beliefs, only that his advice is not grounded in these concepts, but rather effectiveness."}, {"text": "His desire to focus solely on the practical outcomes and effectiveness of political actions.", "isCorrect": true, "rationale": "The text explicitly states, 'Earlier political thinkers grounded their advice in ethics and theology. Machiavelli grounds his in effectiveness,' indicating this silence is a deliberate shift towards pragmatism."}, {"text": "A fear of censorship or reprisal from religious or moral authorities of his time.", "isCorrect": false, "rationale": "The text identifies the silence as 'deliberate and significant,' linking it to his focus on effectiveness, not fear of censorship."}, {"text": "An assumption that his readers were already well-versed in these ethical and theological concepts.", "isCorrect": false, "rationale": "The text implies a deliberate departure from these concepts, not an assumption of prior knowledge that would make their mention redundant."}], "id": "q03"}, {"question": "When reading The Prince, how does the text advise a reader to approach Machiavelli's provocative claims, such as 'it is better to be feared than loved'?", "options": [{"text": "Accept them as definitive truths of political science without question.", "isCorrect": false, "rationale": "The text instructs, 'Do not read The Prince as a collection of answers. Read it as a set of provocations,' and encourages readers to 'push back.'"}, {"text": "Critically evaluate them against personal knowledge and real-world examples, even seeking counterexamples.", "isCorrect": true, "rationale": "The text encourages readers to 'Ask whether he is right,' and asks, 'does that match what you know...?' and 'can you think of counterexamples?' This emphasizes critical engagement and challenging his assertions."}, {"text": "Disregard them if they contradict modern democratic principles.", "isCorrect": false, "rationale": "While critical evaluation is encouraged, the text does not suggest outright disregard. It advocates for active engagement and argument."}, {"text": "Focus on identifying the historical context that led Machiavelli to these conclusions.", "isCorrect": false, "rationale": "While understanding context is generally good, the text's specific advice for 'provocations' is to actively 'argue with him' and 'push back,' rather than just contextualize."}], "id": "q04"}, {"question": "What is a key characteristic of W. K. Marriott's 1908 translation of The Prince, according to the provided text?", "options": [{"text": "It is a highly academic and literal word-for-word translation, making it challenging for modern readers.", "isCorrect": false, "rationale": "The text states it 'is not a word-for-word literal translation' and uses 'clear Edwardian English that remains accessible,' contradicting this option."}, {"text": "It uses clear, readable Edwardian English that has remained accessible to modern readers.", "isCorrect": true, "rationale": "The text describes Marriott's translation as using 'clear Edwardian English that remains accessible to modern readers,' and notes its 'clear, readable English that has stood the test of more than a century.'"}, {"text": "It incorporates modern slang and simplified grammar to appeal to a wider audience.", "isCorrect": false, "rationale": "It uses 'Edwardian English,' which is not modern slang, and footnotes clarify archaic terms, indicating it's not overly simplified."}, {"text": "It is considered the definitive primary source for Renaissance Italian language studies.", "isCorrect": false, "rationale": "It's an English translation, not a primary source for Italian language study. Footnotes explain Italian vocabulary, but the translation itself isn't the primary source for the original language."}], "id": "q05"}, {"question": "The text advises readers to evaluate Machiavelli's examples by asking questions like: 'Is his reading of the historical case accurate? Is it fair? Is a single case sufficient to establish a general rule?' What kind of critical thinking does this instruction primarily encourage?", "options": [{"text": "Memorizing Machiavelli's historical references for future recall.", "isCorrect": false, "rationale": "The questions 'Is it accurate?' and 'Is a single case sufficient?' go beyond mere memorization, prompting analysis of the evidence itself."}, {"text": "Understanding the precise historical context of each example Machiavelli provides.", "isCorrect": false, "rationale": "While understanding context is related to accuracy, the core of the instruction is about evaluating the strength and validity of the example as evidence for a general rule, which goes beyond mere historical background."}, {"text": "Assessing the generalizability and logical validity of Machiavelli's conclusions based on his evidence.", "isCorrect": true, "rationale": "Asking 'Is a single case sufficient to establish a general rule?' directly addresses the generalizability and logical validity of Machiavelli's arguments, moving beyond simple factual recall."}, {"text": "Identifying potential biases Machiavelli might have had when selecting his examples.", "isCorrect": false, "rationale": "While a good critical skill, the text's questions focus more on the accuracy, fairness, and sufficiency of the evidence itself rather than the author's potential biases in selection."}], "id": "q06"}, {"question": "Which of the following best describes the overall recommended approach to reading The Prince, according to the 'How to Read The Prince' section?", "options": [{"text": "A passive absorption of Machiavelli's insights as undisputed political truths.", "isCorrect": false, "rationale": "The text explicitly advocates for 'active, questioning reading' and challenging Machiavelli, contradicting passive absorption."}, {"text": "An active, questioning, and critically analytical engagement with Machiavelli's arguments and evidence.", "isCorrect": true, "rationale": "The section is full of advice like 'active, questioning reading,' 'Ask yourself: what is he arguing here?,' 'evaluate his examples,' and 'Ask whether he is right,' all pointing to a highly critical and active engagement."}, {"text": "A focused study on the historical and cultural context of Renaissance Italy.", "isCorrect": false, "rationale": "While context is important, the text emphasizes interaction with Machiavelli's arguments more than just contextual study."}, {"text": "A comparative analysis of Machiavelli's ideas with modern political theories.", "isCorrect": false, "rationale": "While this can be a valuable extension, the primary instructions focus on how to engage with The Prince itself, not comparative analysis."}], "id": "q07"}, {"question": "How does Machiavelli's fundamental approach to political advice, as presented in the text, differ from that of 'earlier political thinkers'?", "options": [{"text": "Machiavelli rejects all historical examples, while earlier thinkers relied heavily on them.", "isCorrect": false, "rationale": "Machiavelli's 'primary method is historical case study,' directly contradicting this statement."}, {"text": "Machiavelli grounds his advice in practical effectiveness, while earlier thinkers based theirs on ethics and theology.", "isCorrect": true, "rationale": "The text states, 'Earlier political thinkers grounded their advice in ethics and theology. Machiavelli grounds his in effectiveness,' highlighting this core difference."}, {"text": "Machiavelli believes in the inherent goodness of human nature, unlike his pessimistic predecessors.", "isCorrect": false, "rationale": "The text does not discuss Machiavelli's views on human nature or compare them to predecessors in this manner."}, {"text": "Machiavelli offers universally applicable laws of politics, whereas earlier thinkers provided situation-specific guidance.", "isCorrect": false, "rationale": "Machiavelli reasons from specific examples to general rules, and the text encourages questioning the sufficiency of these rules."}], "id": "q08"}, {"question": "A student reads The Prince primarily to extract and memorize Machiavelli's conclusions about how rulers should act. Based on the 'How to Read The Prince' section, what crucial aspect of reading is this student neglecting?", "options": [{"text": "The importance of the W. K. Marriott translation's specific vocabulary.", "isCorrect": false, "rationale": "While vocabulary is mentioned, the core neglect is not about the translation details but about the nature of engaging with Machiavelli's ideas."}, {"text": "The necessity of critical engagement, challenging Machiavelli's ideas, and forming independent judgments.", "isCorrect": true, "rationale": "The text explicitly states, 'Do not read The Prince as a collection of answers. Read it as a set of provocations,' and encourages readers to 'Ask whether he is right' and to 'push back,' which is missed by mere memorization of conclusions."}, {"text": "The role of footnotes in explaining archaic terms and historical references.", "isCorrect": false, "rationale": "Footnotes aid comprehension, but neglecting their use is not the primary omission implied by reading The Prince solely for conclusions."}, {"text": "The distinction between Machiavelli's work and philosophical theories.", "isCorrect": false, "rationale": "While Machiavelli contrasts with abstract principles, the primary neglect is the active critical thinking aspect, not just understanding this distinction."}], "id": "q09"}, {"question": "What is the overarching purpose of the 'How to Read The Prince' section within the textbook?", "options": [{"text": "To provide a brief historical overview of Niccolò Machiavelli's life and times.", "isCorrect": false, "rationale": "The section focuses on how to read the text, not on Machiavelli's biography or historical context, though these might be covered elsewhere in the book."}, {"text": "To endorse Machiavelli's political theories as timeless and universally applicable.", "isCorrect": false, "rationale": "The section encourages readers to 'Ask whether he is right' and 'push back,' which is antithetical to endorsing his theories without question."}, {"text": "To prepare readers for a deep, critical, and analytical engagement with Machiavelli's arguments about power.", "isCorrect": true, "rationale": "The entire section provides strategies for 'getting the most out of it,' emphasizing 'active, questioning reading,' 'critical thinking,' and 'understanding how power works,' all pointing to a deep, critical engagement."}, {"text": "To argue for the superiority of W. K. Marriott's translation over other versions of The Prince.", "isCorrect": false, "rationale": "While it mentions the Marriott translation, the section's purpose is far broader than promoting a specific edition; it's about the method of reading itself."}], "id": "q10"}, {"question": "The text warns readers to notice what Machiavelli does NOT say. What is the significance of examining those deliberate omissions when reading political philosophy?", "options": [{"text": "Omissions reveal only that the author was poorly educated and unfamiliar with certain topics.", "isCorrect": false, "rationale": "The text notes Machiavelli was 'thoroughly educated in the classical and humanist traditions' — his silence on ethics and theology is a deliberate choice, not ignorance."}, {"text": "Deliberate omissions reveal the assumptions and boundaries of an argument — what a thinker chooses to exclude defines the framework of their analysis.", "isCorrect": true, "rationale": "The text says Machiavelli's silence on God, justice, and natural law is 'deliberate and significant,' and asks 'What does it leave out?' — implying that what is not addressed shapes what is argued, and reveals the nature of his project."}, {"text": "Omissions only matter when an author explicitly acknowledges them in their writing.", "isCorrect": false, "rationale": "The point is that Machiavelli's silence is significant precisely because it is unacknowledged — the absence of something familiar forces us to ask why it was excluded."}, {"text": "Noticing omissions is only useful when reading very long texts, not short works like The Prince.", "isCorrect": false, "rationale": "The text applies this strategy specifically to The Prince, despite calling it 'short' — length is irrelevant to the significance of deliberate omissions."}], "id": "q11"}, {"question": "The text concludes: 'Machiavelli wrote for people who were serious about understanding how power works. He assumed his readers were intelligent enough to think hard about difficult things. He was writing for you.' What is the rhetorical purpose of this conclusion?", "options": [{"text": "To warn readers that The Prince is too difficult for average students and requires specialist training.", "isCorrect": false, "rationale": "The message is the opposite — it invites readers in by suggesting Machiavelli expected ordinary intelligent readers, not specialists."}, {"text": "To motivate readers to take the text seriously by positioning them as the intended audience Machiavelli himself had in mind.", "isCorrect": true, "rationale": "By ending with 'He was writing for you,' the text collapses the distance between a 16th-century political thinker and the modern student, framing active, critical reading as a personal invitation — not just an academic exercise."}, {"text": "To suggest that only readers who already agree with Machiavelli will benefit from reading The Prince.", "isCorrect": false, "rationale": "The section specifically encourages readers to challenge and argue with Machiavelli, not to agree with him — the invitation is to think hard, not to accept."}, {"text": "To inform readers that the textbook will provide answers to all difficult passages so they need not struggle independently.", "isCorrect": false, "rationale": "The section emphasizes independent critical thinking and asking your own questions — footnotes help with vocabulary and references, but the intellectual work is the reader's."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
