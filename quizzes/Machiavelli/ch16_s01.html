<script>
var QUESTIONS = [{"question": "What is Machiavelli's primary stated intention for discussing the rules of conduct for a prince in Chapter XV?", "options": [{"text": "To compile a comprehensive list of all virtues a prince should ideally possess.", "isCorrect": false, "rationale": "Machiavelli explicitly states that human conditions do not permit a prince to possess all good qualities and that pursuing them can lead to ruin."}, {"text": "To present an account of the 'real truth' of princely governance, useful to those who apprehend it, by departing from traditional methods.", "isCorrect": true, "rationale": "Machiavelli states, 'it being my intention to write a thing which shall be useful to him who apprehends it, it appears to me more appropriate to follow up the real truth of the matter than the imagination of it,' and notes he will 'depart from the methods of other people.'"}, {"text": "To critique the works of all previous political philosophers who have written on the topic.", "isCorrect": false, "rationale": "While he departs from previous methods, his primary intention is to be 'useful' by presenting 'real truth,' not merely to critique others."}, {"text": "To establish a new, universally applicable moral code for all rulers.", "isCorrect": false, "rationale": "Machiavelli argues against universal moral codes, suggesting actions must be adapted 'according to necessity' rather than fixed principles."}], "id": "q01"}, {"question": "Machiavelli argues that neglecting 'what is done for what ought to be done' leads to a prince's ruin. This assertion primarily highlights his belief in:", "options": [{"text": "The inherent corruption of all human beings, which makes idealism impossible.", "isCorrect": false, "rationale": "While the presence of evil is mentioned, the core of this specific assertion is about the *consequence* of choosing idealism over reality, not just the cause of human corruption itself."}, {"text": "The necessity of basing political action on practical realities and actual human behavior rather than idealistic or imaginary visions.", "isCorrect": true, "rationale": "Machiavelli directly states, 'how one lives is so far distant from how one ought to live,' and emphasizes following 'the real truth of the matter than the imagination of it' to avoid ruin."}, {"text": "The moral superiority of pragmatic decision-making over conventional virtue.", "isCorrect": false, "rationale": "He emphasizes practicality and survival, not necessarily 'moral superiority' in a traditional sense, but rather the *utility* of certain actions regardless of their conventional moral label."}, {"text": "The importance of a prince always appearing virtuous to his subjects, regardless of his true character.", "isCorrect": false, "rationale": "While appearance can be important, this specific statement focuses on the *substance* of action based on reality versus ideals, not solely on public perception."}], "id": "q02"}, {"question": "When Machiavelli advises a prince 'to know how to do wrong, and to make use of it or not according to necessity,' he is advocating for which of the following approaches?", "options": [{"text": "The consistent demonstration of ruthlessness to deter all potential enemies and rivals.", "isCorrect": false, "rationale": "The phrase 'according to necessity' indicates that such actions are not to be consistent or a default, but employed strategically when required."}, {"text": "A strategic flexibility that prioritizes the preservation and security of the state above all conventional moral strictures.", "isCorrect": true, "rationale": "This advice is given in the context of a prince 'wishing to hold his own' and the understanding that something that looks like vice 'brings him security and prosperity,' thereby prioritizing the state's welfare over conventional morality."}, {"text": "The pursuit of malevolence and tyranny as a means to consolidate absolute power.", "isCorrect": false, "rationale": "The emphasis is on 'necessity' for state preservation, not on wanton malevolence or tyranny for its own sake. The text does not endorse evil for evil's sake."}, {"text": "A rejection of all ethical principles in favor of pure self-interest.", "isCorrect": false, "rationale": "Machiavelli acknowledges qualities that bring 'blame or praise' and recognizes the praiseworthiness of good qualities, but places their *application* within the context of state necessity, not a total rejection of ethics."}], "id": "q03"}, {"question": "Machiavelli anticipates being considered 'presumptuous' for discussing the rules of conduct for a prince. What is the primary reason he provides for this expectation?", "options": [{"text": "He believes his own experience as a prince is limited compared to others who have written on the subject.", "isCorrect": false, "rationale": "The text does not mention Machiavelli's personal experience as a prince or his perceived limitations in that regard."}, {"text": "He is challenging the traditional, idealistic views on princely conduct by proposing methods that depart from those of other people.", "isCorrect": true, "rationale": "He states, 'I expect I shall be considered presumptuous in mentioning it again, especially as in discussing it I shall depart from the methods of other people,' by focusing on 'the real truth' rather than 'imagination.'"}, {"text": "He is writing in a language and style that is too blunt and direct for his aristocratic audience.", "isCorrect": false, "rationale": "The text does not refer to the style or language as a source of presumptuousness."}, {"text": "He is revealing state secrets that should remain confidential.", "isCorrect": false, "rationale": "There is no indication that his advice constitutes the revelation of state secrets; rather, it's a new perspective on governance."}], "id": "q04"}, {"question": "A prince is faced with a difficult decision: upholding a promise to an ally that would weaken his own state, or breaking the promise to strengthen his position. Based on Machiavelli's advice in Chapter XV, which action would he most likely endorse?", "options": [{"text": "Upholding the promise, as fidelity is a universally praised virtue that enhances a prince's reputation.", "isCorrect": false, "rationale": "Machiavelli warns that acting 'entirely up to his professions of virtue soon meets with what destroys him among so much that is evil,' implying that adherence to virtue should not lead to ruin."}, {"text": "Breaking the promise if doing so is necessary to preserve and strengthen his state, even if it incurs reproach.", "isCorrect": true, "rationale": "Machiavelli advises that a prince 'need not make himself uneasy at incurring a reproach for those vices without which the state can only be saved with difficulty,' and that 'something which looks like vice, yet followed brings him security and prosperity.'"}, {"text": "Seeking a compromise that partially satisfies both the ally and his own state, regardless of effectiveness.", "isCorrect": false, "rationale": "Machiavelli's advice is driven by necessity and outcome for the state, not compromise for its own sake, especially if it doesn't secure the state."}, {"text": "Consulting oracles or religious figures for divine guidance on the morally correct path.", "isCorrect": false, "rationale": "Machiavelli's method is grounded in 'real truth' and practical necessity, not divine guidance or abstract moral pronouncements."}], "id": "q05"}, {"question": "Machiavelli's clarification of the Tuscan term 'miserly' (who deprives himself too much) versus 'avaricious' (who desires to possess by robbery) primarily serves to illustrate:", "options": [{"text": "The inherent superiority of Tuscan cultural distinctions in moral judgment.", "isCorrect": false, "rationale": "The text uses the example for clarity on princely qualities, not to assert cultural superiority."}, {"text": "The importance of understanding the practical *effects* and *actions* associated with a quality, rather than just its common or superficial label.", "isCorrect": true, "rationale": "This distinction highlights that the *impact* or *behavior* behind a label is crucial. One harms oneself (miserly), the other harms others (avaricious), which has different implications for a prince's rule."}, {"text": "That certain vices are always more harmful than others, regardless of context.", "isCorrect": false, "rationale": "Machiavelli's core argument is that the utility of a quality depends on context and necessity, not that one vice is inherently 'always' more harmful in every situation."}, {"text": "The necessity for princes to have a sophisticated understanding of linguistics and regional dialects.", "isCorrect": false, "rationale": "The linguistic point is a vehicle for a deeper message about the nature and utility of qualities, not a general recommendation for linguistic study."}], "id": "q06"}, {"question": "According to Machiavelli, what is the *overriding* criterion a prudent prince should use when deciding whether to exhibit a quality commonly considered a virtue or a vice?", "options": [{"text": "The long-term moral legacy he wishes to leave for future generations.", "isCorrect": false, "rationale": "Machiavelli's focus is on the immediate preservation and security of the state, not primarily on a historical moral legacy."}, {"text": "The absolute adherence to traditional ethical or religious principles.", "isCorrect": false, "rationale": "He explicitly advises against strict adherence to such principles if they jeopardize the state."}, {"text": "Whether the quality helps him preserve and secure his state, avoiding ruin.", "isCorrect": true, "rationale": "He states a prince must 'know how to avoid the reproach of those vices which would lose him his state' and that something appearing as vice can bring 'security and prosperity' if followed."}, {"text": "The unanimous counsel of his closest advisors and subjects.", "isCorrect": false, "rationale": "The text emphasizes the prince's own prudence and judgment in navigating these choices, not necessarily democratic counsel."}], "id": "q07"}, {"question": "The introductory text describes Chapter XV as the 'hinge of The Prince.' This metaphor suggests that Chapter XV:", "options": [{"text": "Is the most difficult chapter to understand due to its complex philosophical arguments.", "isCorrect": false, "rationale": "The metaphor describes its structural function, not its difficulty level."}, {"text": "Connects the preparatory discussions of earlier chapters to the practical applications and recommendations that follow.", "isCorrect": true, "rationale": "The text states, 'Everything before it has been preparation; everything after it will be application,' directly positioning Chapter XV as the pivot point between these two sections."}, {"text": "Represents Machiavelli's final and definitive statement on political philosophy, concluding his work.", "isCorrect": false, "rationale": "A hinge connects, it does not conclude. It sets the stage for what comes after."}, {"text": "Serves primarily as a historical account of past princely behaviors, justifying future advice.", "isCorrect": false, "rationale": "Chapter XV is about Machiavelli's method and intention, declaring his approach to giving advice, rather than being a historical account itself."}], "id": "q08"}, {"question": "Machiavelli states, 'how one lives is so far distant from how one ought to live, that he who neglects what is done for what ought to be done, sooner effects his ruin than his preservation.' This statement serves as a foundation for his argument that:", "options": [{"text": "Moral perfection is unattainable for any ruler in a practical sense.", "isCorrect": false, "rationale": "While true, this option doesn't fully capture the *consequence* Machiavelli emphasizes, which is the ruin caused by neglecting reality."}, {"text": "A prince must prioritize the *effectual truth* of human nature and political reality over abstract moral ideals.", "isCorrect": true, "rationale": "This directly links to his method of following 'the real truth of the matter' and the danger of ignoring 'what is done' (reality) for 'what ought to be done' (idealism)."}, {"text": "The pursuit of virtue is inherently destructive in politics.", "isCorrect": false, "rationale": "Machiavelli doesn't say virtue is *inherently* destructive, but that *exclusive* or *unrealistic* adherence to all virtues, in a world full of evil, will lead to ruin."}, {"text": "Subjects should lower their expectations of their rulers' morality.", "isCorrect": false, "rationale": "The focus of this statement is on the prince's *actions* and *strategy* for survival, not on the subjects' expectations."}], "id": "q09"}, {"question": "Machiavelli concludes Chapter XV by stating that a prince 'need not make himself uneasy at incurring a reproach for those vices without which the state can only be saved with difficulty.' This implies that the ultimate justification for a prince's actions, even those appearing vicious, is:", "options": [{"text": "The prince's personal moral comfort and freedom from guilt.", "isCorrect": false, "rationale": "The phrase 'need not make himself uneasy' refers to the pragmatic acceptance of necessary actions, not the prince's personal feelings as the ultimate justification."}, {"text": "The preservation and prosperity of the state.", "isCorrect": true, "rationale": "The phrase 'without which the state can only be saved with difficulty' and the earlier statement that a 'vice' can bring 'security and prosperity' explicitly link necessary 'vices' to the state's welfare as the ultimate justification."}, {"text": "The approval of his subjects and allies.", "isCorrect": false, "rationale": "He explicitly mentions 'incurring a reproach,' indicating that gaining approval is not the primary goal or justification for these necessary actions."}, {"text": "The opportunity to demonstrate his cunning and power.", "isCorrect": false, "rationale": "While cunning and power are tools, they are not the ultimate *justification* in themselves; they serve the higher goal of state preservation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
