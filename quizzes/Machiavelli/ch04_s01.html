<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the primary inherent difficulty a new prince faces when acquiring a new principality?", "options": [{"text": "The existing alliances among the neighboring states always lead to immediate military conflict.", "isCorrect": false, "rationale": "While external conflict is a concern, Machiavelli identifies an 'inherent difficulty' rooted in the subjects' perception and the prince's actions, which is more fundamental than pre-existing external alliances."}, {"text": "Subjects willingly change rulers hoping for betterment, but become disillusioned when the new prince imposes hardships, leading to resentment.", "isCorrect": true, "rationale": "Machiavelli states that 'men change their rulers willingly, hoping to better themselves... wherein they are deceived, because they afterwards find by experience they have gone from bad to worse,' and this is compounded by the necessity for the new prince to burden them with soldiery and other hardships."}, {"text": "The prince's own armed forces are typically insufficient to maintain order in a newly conquered territory without significant foreign aid.", "isCorrect": false, "rationale": "Machiavelli acknowledges that one 'may be very strong in armed forces,' but emphasizes the need for 'goodwill of the natives,' indicating that military strength alone is often not the issue, but rather the failure to secure public support."}, {"text": "The former ruling family always maintains a secret army within the new principality that continuously instigates rebellions.", "isCorrect": false, "rationale": "While removing the former ruling family is a strategy Machiavelli suggests, he does not state that they 'always' maintain a secret army or that this is the 'primary' inherent difficulty. The difficulties are more broadly tied to the nature of new rule."}], "id": "q01"}, {"question": "Louis XII's initial rapid loss of Milan serves as a case study for which of Machiavelli's principles regarding acquired territories?", "options": [{"text": "The importance of having a vastly superior military force compared to any local resistance.", "isCorrect": false, "rationale": "Louis XII quickly occupied Milan, suggesting initial military superiority was not the issue. His loss was due to the resentment of those who had opened the gates to him, not an inability to conquer."}, {"text": "The necessity of the prince residing personally in the newly acquired state to observe and remedy disorders quickly.", "isCorrect": false, "rationale": "While residency is a recommended strategy for culturally different states, Louis's initial failure was more specifically attributed to the unmet expectations and ill-treatment of those who initially supported him, rather than merely his absence."}, {"text": "The danger of alienating those who initially supported the invasion by failing to meet their expectations or by imposing new burdens.", "isCorrect": true, "rationale": "The text states that those who 'had opened the gates to him, finding themselves deceived in their hopes of future benefit, would not endure the ill-treatment of the new prince,' leading to Milan's quick loss. This directly supports the principle of satisfying initial supporters."}, {"text": "The critical role of securing alliances with all major foreign powers before attempting any territorial expansion.", "isCorrect": false, "rationale": "The text mentions Louis XII accepting friendships he could get due to prior conduct, but his loss was internal, caused by local resentment, not a lack of sufficient foreign alliances."}], "id": "q02"}, {"question": "When acquiring dominions that are of the 'same country and language' as the ancient state, what two actions does Machiavelli advise for securely holding them?", "options": [{"text": "Establish a new system of governance and significantly increase taxation to fund rapid development.", "isCorrect": false, "rationale": "Machiavelli explicitly advises against altering 'laws nor their taxes' in such dominions, as maintaining old conditions helps them integrate quietly."}, {"text": "Destroy the family of the former prince and maintain the existing laws and taxes.", "isCorrect": true, "rationale": "The text states: 'it is enough to have destroyed the family of the prince who was ruling them; because the two peoples, preserving in other things the old conditions... He who has annexed them, if he wishes to hold them, has only to bear in mind two considerations: the one, that the family of their former lord is extinguished; the other, that neither their laws nor their taxes are altered.'"}, {"text": "Integrate the local nobility into the prince's court and impose the prince's language and customs.", "isCorrect": false, "rationale": "While integrating nobility might be a strategy in some contexts, Machiavelli does not mention it here. He emphasizes maintaining existing customs and laws, rather than imposing new ones, for culturally similar regions."}, {"text": "Disarm the local population and immediately construct new fortresses in key strategic locations.", "isCorrect": false, "rationale": "Machiavelli does not recommend disarming the population or immediately building fortresses as the primary considerations for culturally similar states. His focus is on preserving existing conditions and removing the former princely line."}], "id": "q03"}, {"question": "For a prince acquiring a state 'differing in language, customs, or laws,' Machiavelli suggests residing there personally. Which of the following is NOT a benefit of this strategy?", "options": [{"text": "It makes the prince's position more secure and durable.", "isCorrect": false, "rationale": "The text states this directly: 'This would make his position more secure and durable, as it has made that of the Turk in Greece.'"}, {"text": "It ensures that the entire income from the state is retained by the prince and not spent on a garrison.", "isCorrect": true, "rationale": "While residency is cost-effective compared to garrisons, the text does not claim it retains the 'entire income.' It focuses on effective governance and prompt problem-solving, not explicitly on maximizing income retention compared to other methods."}, {"text": "Disorders can be seen and remedied quickly, preventing them from escalating.", "isCorrect": false, "rationale": "The text highlights this benefit: 'Because, if one is on the spot, disorders are seen as they spring up, and one can quickly remedy them.'"}, {"text": "Subjects have prompt recourse to the prince, leading to greater loyalty or fear.", "isCorrect": false, "rationale": "The text explicitly states: 'the subjects are satisfied by prompt recourse to the prince; thus, wishing to be good, they have more cause to love him, and wishing to be otherwise, to fear him.'"}], "id": "q04"}, {"question": "Machiavelli argues that sending colonies to a newly acquired territory is superior to maintaining a large armed garrison for several reasons. Which of the following accurately describes a key advantage of colonies?", "options": [{"text": "Colonies are more effective in suppressing large-scale revolts because they are composed of experienced soldiers.", "isCorrect": false, "rationale": "The text does not state that colonies are primarily military units or better at suppressing large revolts; it highlights their economic and political advantages."}, {"text": "Colonies are costly to establish but quickly become self-sufficient, generating substantial revenue for the prince.", "isCorrect": false, "rationale": "Machiavelli explicitly says, 'A prince does not spend much on colonies, for with little or no expense he can send them out and keep them there,' contradicting the idea of them being costly to establish."}, {"text": "They are inexpensive, injure only a minority who become too poor and scattered to retaliate, and keep the majority peaceful through fear.", "isCorrect": true, "rationale": "The text states: 'A prince does not spend much on colonies... and he offends a minority only of the citizens from whom he takes lands and houses... and those whom he offends, remaining poor and scattered, are never able to injure him; whilst the rest being uninjured are easily kept quiet, and at the same time are anxious not to err for fear it should happen to them as it has to those who have been despoiled.'"}, {"text": "They foster cultural assimilation by integrating the local population into the customs of the colonizers.", "isCorrect": false, "rationale": "While cultural interaction might occur, Machiavelli's rationale for colonies focuses on their economic efficiency, minimal offense to the populace, and the inability of the injured to retaliate, not primarily on cultural assimilation."}], "id": "q05"}, {"question": "Machiavelli concludes his discussion on colonies with the maxim, 'men ought either to be well treated or crushed.' What is the underlying rationale for this advice?", "options": [{"text": "Treating men well ensures their unwavering loyalty, while crushing them eliminates any potential for resistance entirely.", "isCorrect": false, "rationale": "While treating well can foster love, Machiavelli's realism suggests 'unwavering loyalty' is not guaranteed. The core point is about managing the threat of revenge, not just loyalty or total elimination."}, {"text": "Light injuries provoke revenge, whereas severe injuries incapacitate individuals, making them unable to retaliate.", "isCorrect": true, "rationale": "The text explains: 'because they can avenge themselves of lighter injuries, of more serious ones they cannot; therefore the injury that is to be done to a man ought to be of such a kind that one does not stand in fear of revenge.' This directly supports the rationale."}, {"text": "It is more economical to either satisfy all subjects or to eliminate all opposition, rather than a mixed approach.", "isCorrect": false, "rationale": "Machiavelli's advice is not primarily about economy in this context, but about the political stability and avoiding the danger of revenge from those lightly injured."}, {"text": "This approach promotes a clear public image of the prince as either benevolent or ruthlessly effective, preventing ambiguity.", "isCorrect": false, "rationale": "While a clear image is important, the rationale provided by Machiavelli is specifically about preventing retaliation from injured parties, not primarily about public perception or avoiding ambiguity."}], "id": "q06"}, {"question": "A prince who holds a country differing in respects (language, customs, laws) should primarily aim to manage relations with neighboring states by:", "options": [{"text": "Forming strong military alliances with all neighboring states to deter any potential foreign intervention.", "isCorrect": false, "rationale": "Machiavelli advises against strengthening all neighbors and specifically warns against allowing powerful foreign powers to gain a footing, even if through alliances, if it means empowering rivals."}, {"text": "Making himself the head and defender of less powerful neighbors while weakening the more powerful ones, and preventing strong foreign powers from gaining influence.", "isCorrect": true, "rationale": "The text states: 'the prince who holds a country differing in the above respects ought to make himself the head and defender of his less powerful neighbours, and to weaken the more powerful amongst them, taking care that no foreigner as powerful as himself shall, by any accident, get a footing there.'"}, {"text": "Maintaining strict neutrality with all neighboring states to avoid entanglement in regional conflicts.", "isCorrect": false, "rationale": "Machiavelli advocates for active intervention in regional power dynamics (strengthening weaker, weakening stronger) rather than neutrality."}, {"text": "Encouraging a balance of power among all neighboring states, ensuring none become dominant enough to pose a threat.", "isCorrect": false, "rationale": "Machiavelli's strategy is not to encourage a balance of power among neighbors, but to actively manipulate it to his own advantage: weakening the strong and leading the weak, not allowing them to balance each other."}], "id": "q07"}, {"question": "The Roman Republic's actions in Greece, such as humbling Macedonia and driving out Antiochus, exemplify which key principle of prudent statecraft highlighted by Machiavelli?", "options": [{"text": "Relying on the goodwill and friendship of all minor powers in the annexed territories.", "isCorrect": false, "rationale": "While the Romans maintained friendly relations with minor powers, they did so 'without increasing their strength' and were willing to humble them if necessary, demonstrating a pragmatic rather than purely goodwill-based approach."}, {"text": "Delaying military confrontation until an advantageous moment, even if it allows problems to grow.", "isCorrect": false, "rationale": "The text explicitly states the Romans 'knew that war is not to be avoided, but is only to be put off to the advantage of others' and 'would not let them come to a head' to avoid war, contradicting the idea of letting problems grow."}, {"text": "Addressing potential troubles immediately and proactively, rather than waiting until they become unmanageable.", "isCorrect": true, "rationale": "Machiavelli praises the Romans because they 'foreseeing troubles, dealt with them at once, and, even to avoid a war, would not let them come to a head... because, when foreseen, it is easy to remedy them; but if you wait until they approach, the medicine is no longer in time.'"}, {"text": "Always fighting wars on one's own territory to maximize logistical advantages and defensive strength.", "isCorrect": false, "rationale": "The text states the Romans 'wished to fight with Philip and Antiochus in Greece so as not to have to do it in Italy,' clearly indicating a preference for fighting wars abroad rather than at home."}], "id": "q08"}, {"question": "Machiavelli uses the analogy of a 'hectic fever' to describe what aspect of managing affairs of state?", "options": [{"text": "The difficulty of conquering new territories that are well-defended, much like an illness that is hard to overcome.", "isCorrect": false, "rationale": "The analogy relates to the detection and treatment of problems, not the initial difficulty of conquest."}, {"text": "The tendency of minor diplomatic disputes to escalate rapidly into full-blown international crises without warning.", "isCorrect": false, "rationale": "While escalation can occur, the analogy's focus is on the *foreseeing* and *remedying* of problems, not the speed of escalation itself."}, {"text": "The necessity of detecting and addressing problems in their early stages, as they become much harder to cure once widely apparent.", "isCorrect": true, "rationale": "The text states: 'in the beginning of the malady it is easy to cure but difficult to detect, but in the course of time, not having been either detected or treated in the beginning, it becomes easy to detect but difficult to cure. Thus it happens in affairs of state, for when the evils that arise have been foreseen... they can be quickly redressed, but when... no longer a remedy.'"}, {"text": "The inevitable cyclical nature of political power, where states rise and fall like the periodic symptoms of a fever.", "isCorrect": false, "rationale": "The analogy is about the *management* of problems and the timing of intervention, not a fatalistic view of cyclical power."}], "id": "q09"}, {"question": "Based on Machiavelli's analysis in this section, which action would Louis XII most likely have needed to undertake to secure his hold on Milan after its first recapture, if it differed significantly in language and customs from France?", "options": [{"text": "He should have immediately sought to implement French laws and tax structures to unify the administration.", "isCorrect": false, "rationale": "For differing states, altering laws and taxes is not a primary recommendation; Machiavelli emphasizes residing there or sending colonies, and maintaining stable conditions for the uninjured, which is disrupted by immediate, sweeping legal changes."}, {"text": "He should have consistently avoided engaging with powerful local factions to prevent internal conflicts from arising.", "isCorrect": false, "rationale": "Machiavelli advises making oneself 'head and defender of his less powerful neighbours, and to weaken the more powerful amongst them,' indicating active engagement, not avoidance."}, {"text": "He should have either moved his court to Milan or established colonies, while also managing regional powers by weakening the strong and supporting the weak without empowering them.", "isCorrect": true, "rationale": "For culturally different states, Machiavelli offers residency or colonies as 'greatest and most real helps.' Additionally, managing neighbors by 'mak[ing] himself the head and defender of his less powerful neighbours, and to weaken the more powerful amongst them' is a core strategy for maintaining newly acquired territory."}, {"text": "He should have relied solely on maintaining a large, well-funded mercenary army to intimidate any potential rebels.", "isCorrect": false, "rationale": "Machiavelli explicitly critiques maintaining armed men in place of colonies, calling them 'useless' because they are costly, exasperate the whole state, and turn acquisition into a loss."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
