<script>
var QUESTIONS = [{"question": "How does Machiavelli reconcile the apparent omnipotence of fortune with the value of human wisdom and effort?", "options": [{"text": "He argues that fortune is entirely mythical, and human wisdom can always overcome it.", "isCorrect": false, "rationale": "Machiavelli explicitly states he is 'in some degree inclined to their opinion' regarding fortune's power, and he compares it to a raging river, acknowledging its immense force. He does not claim it is mythical or fully conquerable."}, {"text": "He asserts that fortune governs one-half (or a little less) of human actions, leaving the other half to free will and human direction.", "isCorrect": true, "rationale": "Machiavelli states: 'I hold it to be true that Fortune is the arbiter of one-half of our actions, but that she still leaves us to direct the other half, or perhaps a little less.' This directly addresses the balance between fortune and free will."}, {"text": "He believes that only divine intervention, not human wisdom, can influence the course set by fortune.", "isCorrect": false, "rationale": "While he mentions the opinion that 'affairs of the world are in such wise governed by fortune and by God,' his own argument focuses on human free will and preparation, not solely divine intervention, as the counter to fortune."}, {"text": "He concludes that human wisdom is ultimately futile, and one should simply let chance govern.", "isCorrect": false, "rationale": "Machiavelli explicitly refutes this by stating 'Nevertheless, not to extinguish our free will,' and then detailing how humans can prepare and adapt to fortune."}]}, {"question": "What is the primary message conveyed by Machiavelli's analogy of fortune as a raging river?", "options": [{"text": "That the power of natural forces is absolute and cannot be resisted by human effort.", "isCorrect": false, "rationale": "While the analogy highlights fortune's destructive power, its core message is about human capacity for resistance. The text states, 'without being able in any way to withstand it; and yet, though its nature be such, it does not follow therefore that men, when the weather becomes fair, shall not make provision, both with defences and barriers.'"}, {"text": "That human foresight and preparation can mitigate fortune's destructive impact during periods of calm.", "isCorrect": true, "rationale": "The analogy emphasizes that just as people build 'defences and barriers' when rivers are calm to manage future floods, so too can leaders prepare 'when the weather becomes fair' to constrain fortune's force."}, {"text": "That all human endeavors are eventually swept away by the unpredictable currents of time.", "isCorrect": false, "rationale": "The analogy serves to illustrate how to *counter* being swept away, not that it's inevitable for 'all human endeavors'."}, {"text": "That leaders should avoid taking action during times of great political upheaval.", "isCorrect": false, "rationale": "The analogy encourages proactive preparation, not passive avoidance, during opportune moments to prepare for upheaval."}]}, {"question": "According to Machiavelli, why was Italy particularly susceptible to 'great changes' and 'invasion' during his time?", "options": [{"text": "Its internal political divisions prevented it from forming a unified military force.", "isCorrect": false, "rationale": "While plausible historically, Machiavelli's specific reason in this text is not political division, but a lack of general preparedness."}, {"text": "It was an 'open country' that lacked the 'barriers and defences' and 'proper valour' seen in other nations like Germany, Spain, and France.", "isCorrect": true, "rationale": "Machiavelli explicitly states, 'if you will consider Italy... you will see it to be an open country without barriers and without any defence. For if it had been defended by proper valour, as are Germany, Spain, and France...'"}, {"text": "Its rulers relied too heavily on cautious diplomacy rather than military aggression.", "isCorrect": false, "rationale": "The text points to a general lack of preparedness ('barriers and defences'), not specifically the method of diplomacy versus aggression, as the primary reason for vulnerability."}, {"text": "Divine providence had willed Italy to undergo a period of instability.", "isCorrect": false, "rationale": "Machiavelli acknowledges the belief in God's governance, but his explanation for Italy's vulnerability is rooted in human agency and preparation, not divine will."}]}, {"question": "What does Machiavelli identify as the most crucial factor for a prince's consistent success, rather than a fixed personal characteristic like caution or impetuosity?", "options": [{"text": "The prince's unwavering adherence to a single, proven method of governance.", "isCorrect": false, "rationale": "Machiavelli argues against this, stating that if 'times and affairs change, he is ruined if he does not change his course of action.'"}, {"text": "The ability to accurately predict future political and economic trends.", "isCorrect": false, "rationale": "While foresight is valuable, Machiavelli emphasizes adaptation to *current* conditions, not just prediction, as the key to success. The text focuses on conforming to 'the spirit of the times' as they unfold."}, {"text": "Ensuring that the prince's actions are always aligned with 'the spirit of the times' and changing circumstances.", "isCorrect": true, "rationale": "Machiavelli explicitly states, 'he will be successful who directs his actions according to the spirit of the times, and that he whose actions do not accord with the times will not be successful.'"}, {"text": "Developing a reputation for extreme caution and patience in all matters.", "isCorrect": false, "rationale": "Machiavelli shows examples where caution leads to ruin if the times demand impetuosity, and vice-versa, making flexibility to the times more important than a fixed trait."}]}, {"question": "Why does Machiavelli suggest that it is difficult for individuals, particularly cautious men, to adapt their methods when circumstances change?", "options": [{"text": "They often lack the intelligence or strategic vision to recognize changing times.", "isCorrect": false, "rationale": "Machiavelli attributes the difficulty to ingrained nature and past success, not a lack of intelligence. He states 'he cannot deviate from what nature inclines him to do.'"}, {"text": "They are fundamentally unwilling to take risks, even when necessary for survival.", "isCorrect": false, "rationale": "It's not just an unwillingness to take risks but an inability to 'deviate from what nature inclines him to do' and a reluctance to change methods that have historically brought success."}, {"text": "They are constrained by their natural inclinations and find it hard to abandon methods that have previously led to prosperity.", "isCorrect": true, "rationale": "Machiavelli states, 'But a man is not often found sufficiently circumspect to know how to accommodate himself to the change, both because he cannot deviate from what nature inclines him to do, and also because, having always prospered by acting in one way, he cannot be persuaded that it is well to leave it.'"}, {"text": "They prioritize maintaining public perception of consistency over effective governance.", "isCorrect": false, "rationale": "The text does not mention public perception as a primary reason for this difficulty; it focuses on internal factors of nature and habit."}]}, {"question": "Pope Julius II's successful expedition against Bologna, despite initial resistance from other powers, serves as an example of what Machiavellian principle?", "options": [{"text": "The long-term benefits of patient diplomacy and strategic alliances.", "isCorrect": false, "rationale": "Julius II acted *impetuously* and achieved success *despite* others being 'not agreeable' or needing 'discussion,' not through patient diplomacy or established alliances."}, {"text": "How an impetuous and bold approach, when it aligns with the 'spirit of the times,' can achieve what caution cannot.", "isCorrect": true, "rationale": "Machiavelli uses Julius II to illustrate that 'Pope Julius the Second went to work impetuously in all his affairs, and found the times and circumstances conform so well to that line of action that he always met with success.' He explicitly states that 'Julius with his impetuous action accomplished what no other pontiff with simple human wisdom could have done'."}, {"text": "The inherent superiority of a military solution over any other form of statecraft.", "isCorrect": false, "rationale": "The example is not about military superiority in general, but the success of a *specific approach* (impetuousness) because it *conformed to the times*."}, {"text": "The importance of having powerful external allies to support one's endeavors.", "isCorrect": false, "rationale": "Julius's success was achieved despite a lack of initial agreement from Venice and Spain, and he *drew* the King of France into agreement through his bold action, rather than relying on existing powerful allies."}]}, {"question": "When Machiavelli compares fortune to a woman and suggests it is better to be 'adventurous than cautious' in dealing with her, what is he advocating for?", "options": [{"text": "A literal use of force against women to gain control, as a metaphor for political power.", "isCorrect": false, "rationale": "This interpretation misunderstands the metaphorical nature of Machiavelli's language. He is using a common rhetorical trope of his time to describe how to master abstract forces, not advocating literal violence against women."}, {"text": "That fortune is inherently unpredictable and cannot be influenced by any human action.", "isCorrect": false, "rationale": "This contradicts his earlier argument that humans can direct 'one-half' of their actions and prepare 'defences and barriers' against fortune."}, {"text": "That fortune favors audacious and forceful action over hesitant or calculating approaches.", "isCorrect": true, "rationale": "Machiavelli states, 'she allows herself to be mastered by the adventurous rather than by those who go to work more coldly. She is, therefore, always, woman-like, a lover of young men, because they are less cautious, more violent, and with more audacity command her.' He advocates for boldness to 'master' fortune."}, {"text": "That leaders should adopt a passive stance and allow fortune to dictate events.", "isCorrect": false, "rationale": "This directly contradicts his advice for proactive engagement and 'beating' or 'ill-using' fortune metaphorically to control her."}]}, {"question": "What broader concept does Machiavelli's discussion of 'barriers and defences' and 'valour' against fortune encompass?", "options": [{"text": "Only physical fortifications and military strength.", "isCorrect": false, "rationale": "While physical defenses are part of it, the context of 'valour' and 'preparation' against the metaphorical 'raging river' of fortune suggests a broader scope than just military infrastructure."}, {"text": "The cultivation of moral virtues and ethical conduct in leaders.", "isCorrect": false, "rationale": "Machiavelli's use of 'valour' here is pragmatic and political, referring to effective action and preparedness, not necessarily moral virtue in the traditional sense."}, {"text": "Strategic foresight, institutional preparedness, and leadership capable of adapting to changing circumstances.", "isCorrect": true, "rationale": "The analogy of building defenses 'when the weather becomes fair' for a river, combined with the discussion of Italy's lack of 'proper valour,' points to a comprehensive approach involving preparation, governance, and adaptive leadership that can withstand or channel fortune."}, {"text": "Strict adherence to traditional customs and established laws.", "isCorrect": false, "rationale": "Machiavelli frequently argues for adapting methods to the times, which can mean deviating from tradition if necessary, rather than strict adherence."}]}, {"question": "Machiavelli observes that 'two cautious men the one attain his end, the other fail; and similarly, two men by different observances are equally successful, the one being cautious, the other impetuous.' What is the underlying reason he provides for these seemingly contradictory outcomes?", "options": [{"text": "The inherent inconsistency and irrationality of human nature.", "isCorrect": false, "rationale": "Machiavelli attributes success or failure to a specific external factor, not inherent human irrationality."}, {"text": "Success is ultimately determined by random chance, regardless of a prince's actions.", "isCorrect": false, "rationale": "This contradicts his central argument about free will directing half of actions and the importance of adapting to the times."}, {"text": "The success of any method (cautious or impetuous) depends entirely on its conformity to 'the spirit of the times'.", "isCorrect": true, "rationale": "Machiavelli explicitly states, 'all this arises from nothing else than whether or not they conform in their methods to the spirit of the times.'"}, {"text": "Divine intervention plays a decisive role in rewarding some and punishing others.", "isCorrect": false, "rationale": "While 'God' is mentioned as part of a general opinion, Machiavelli's analytical explanation for these outcomes focuses on the alignment of human actions with the times."}]}, {"question": "A contemporary political leader, known for their meticulous planning and cautious execution, faces an unexpected crisis demanding immediate, bold, and unconventional responses. Based on Machiavelli's analysis in Chapter XXV, what is the most likely outcome if this leader fails to significantly alter their approach?", "options": [{"text": "The leader's cautious nature will eventually bring stability, as fortune favors long-term prudence.", "isCorrect": false, "rationale": "Machiavelli argues that fortune is 'changeful,' and continued success requires adaptation. If the times demand boldness, caution will lead to ruin."}, {"text": "The leader will likely be ruined because their ingrained cautious methods will not conform to the new 'spirit of the times' requiring impetuous action.", "isCorrect": true, "rationale": "Machiavelli explicitly states, 'the cautious man, when it is time to turn adventurous, does not know how to do it, hence he is ruined; but had he changed his conduct with the times fortune would not have changed.' The inability to deviate from one's nature leads to ruin when times change."}, {"text": "The leader will succeed by delegating the bold actions to more impetuous subordinates.", "isCorrect": false, "rationale": "The text focuses on the prince's own actions and inability to change their *own* methods, not on delegation as a solution for personal inflexibility."}, {"text": "Fortune will eventually adjust to the leader's consistent character, leading to success.", "isCorrect": false, "rationale": "Machiavelli states, 'fortune being changeful and mankind steadfast in their ways, so long as the two are in agreement men are successful, but unsuccessful when they fall out.' Fortune does not adjust to man; man must adjust to fortune."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
