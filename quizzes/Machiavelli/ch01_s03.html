<script>
var QUESTIONS = [{"question": "What was Machiavelli's primary personal motivation for dedicating The Prince to Lorenzo di Piero de' Medici?", "options": [{"text": "To express his moral disapproval of the Medici family's rule in Florence.", "isCorrect": false, "rationale": "The text states Machiavelli’s purpose was to demonstrate his knowledge and usefulness, hoping to secure employment from the Medici, not to express disapproval."}, {"text": "To secure a position within the Medici government by demonstrating his political expertise and usefulness.", "isCorrect": true, "rationale": "The dedication was a 'careful performance' with the 'unmistakable subtext': 'I know things that are useful to you. Please give me a job.' This clearly indicates his hope for employment."}, {"text": "To provide a purely academic and detached analysis of principalities for future scholars.", "isCorrect": false, "rationale": "While the book is analytical, its dedication was driven by Machiavelli's immediate personal circumstances and desire for a political role, not solely academic pursuits."}, {"text": "To inspire Lorenzo to liberate Italy from foreign domination, directly appealing to his patriotism.", "isCorrect": false, "rationale": "The passionate call for liberation is in the final chapters of the book, but Machiavelli's *personal motivation* for the dedication was about his own political rehabilitation, not primarily inspiring Lorenzo in that specific way from the outset."}]}, {"question": "Which section of The Prince, as described in the text, directly addresses the ruler's personal qualities and the balance between virtues like generosity and cruelty?", "options": [{"text": "The first eleven chapters, dealing with types of states and how they are acquired.", "isCorrect": false, "rationale": "These chapters focus on the acquisition and holding of different kinds of principalities, not the personal qualities of the prince."}, {"text": "Chapters XV through XXIII, covering what virtues a prince should appear to have and how to balance them.", "isCorrect": true, "rationale": "The text explicitly states that 'The middle section, Chapters XV through XXIII, addresses the prince's personal qualities: What virtues should he appear to have? How should he balance generosity and parsimony, cruelty and mercy, trust and deception?'"}, {"text": "The next three chapters, focusing on military power and the problems with mercenaries.", "isCorrect": false, "rationale": "These chapters specifically deal with military power and the necessity of a prince's own army, not his personal virtues."}, {"text": "The final chapters, addressing Italy's specific situation and calling for liberation.", "isCorrect": false, "rationale": "The final chapters focus on Italy's political state and a call to action, not the individual virtues of a ruler."}]}, {"question": "How does Machiavelli's method in The Prince differ significantly from traditional political writings, such as Plato's Republic, as highlighted in the text?", "options": [{"text": "He frequently cites Scripture and appeals to abstract principles of justice and natural law.", "isCorrect": false, "rationale": "The text explicitly states, 'He does not preach. He does not cite Scripture. He does not appeal to abstract principles of justice or natural law.'"}, {"text": "He reasons from historical examples and observable outcomes of political actions, focusing on 'effectual truth.'", "isCorrect": true, "rationale": "Machiavelli 'reasons from examples' and is committed to studying the 'effectual truth' of political reality, contrasting with 'imaginary' versions found in works like Plato's Republic."}, {"text": "He prioritizes presenting an 'imaginary' ideal of how politics should work, rather than how it actually does.", "isCorrect": false, "rationale": "This is the opposite of Machiavelli's method; he distinguishes himself from those who present 'imaginary' versions of politics."}, {"text": "He writes primarily as a moralist, condemning rulers for their unethical behavior.", "isCorrect": false, "rationale": "The text states, 'Machiavelli writes as a man of experience, not as a moralist. He does not preach.'"}]}, {"question": "The concept of 'the effectual truth' (verità effettuale) is central to Machiavelli's approach. What is its primary significance in the context of political realism?", "options": [{"text": "It advocates for rulers to always prioritize moral and ethical considerations in their statecraft.", "isCorrect": false, "rationale": "The 'effectual truth' focuses on 'what actually works' in politics, often separating it from traditional moral considerations, which is foundational to political realism, not a call for morality."}, {"text": "It emphasizes studying political reality based on what actually happens and works, rather than idealized or imaginary political theories.", "isCorrect": true, "rationale": "The text defines 'effectual truth' as distinguishing 'political reality' from 'imaginary' versions of politics, stating that 'His commitment to studying the effectual truth is the foundation of political realism.'"}, {"text": "It proposes that rulers should present an idealized image to their subjects, regardless of their actual conduct.", "isCorrect": false, "rationale": "While Machiavelli discusses *appearing* virtuous, the 'effectual truth' itself refers to the reality of politics, not merely the presentation of an ideal image."}, {"text": "It asserts that political success is ultimately determined by divine will or natural law.", "isCorrect": false, "rationale": "Machiavelli explicitly avoids appeals to Scripture, divine will, or natural law, focusing instead on empirical observation of human actions and outcomes."}]}, {"question": "What was the immediate, 'surface problem' that caused The Prince to be scandalous upon its posthumous publication and led to its placement on the Index of Forbidden Books?", "options": [{"text": "Its lack of academic rigor and reliance on anecdotal evidence rather than formal philosophical arguments.", "isCorrect": false, "rationale": "While some might debate its academic rigor, the scandal was not due to its methodology but its perceived moral content."}, {"text": "Its apparent advice to rulers to use cruelty, deception, and religious manipulation as legitimate tools of statecraft.", "isCorrect": true, "rationale": "The text states, 'The surface problem was obvious: Machiavelli seemed to be advising princes to use cruelty, deception, and religious manipulation as tools of statecraft.'"}, {"text": "Its advocacy for a democratic form of government, challenging the existing monarchical structures.", "isCorrect": false, "rationale": "The Prince primarily deals with principalities (monarchies/states ruled by a prince) and how to acquire and maintain them, not advocating for democracy."}, {"text": "Its passionate call for Italian liberation from foreign domination, seen as a threat to international stability.", "isCorrect": false, "rationale": "While this call is in the book, the primary scandal was about the advice on *how* a prince should rule, specifically regarding morality, not the specific political goal of unification itself."}]}, {"question": "The text identifies a 'deeper scandal' beyond the surface-level objections to The Prince. What was this deeper scandal?", "options": [{"text": "Machiavelli's personal life and his disgrace as a former civil servant.", "isCorrect": false, "rationale": "Machiavelli's personal life was the context for writing, but not the 'deeper scandal' of the book's content itself."}, {"text": "His argument that all forms of political power are inherently corrupt and should be abolished.", "isCorrect": false, "rationale": "Machiavelli analyzed how power *works*, not that it should be abolished. He provided a 'handbook' for acquiring and maintaining it."}, {"text": "His separation of political analysis from moral evaluation, treating power acquisition as a technical question.", "isCorrect": true, "rationale": "The text explains, 'Machiavelli was describing how rulers actually behave and arguing that this behavior was rational... He was treating the question of how to acquire and maintain power as a technical question... rather than a moral one. This separation of political analysis from moral evaluation was genuinely new.'"}, {"text": "His endorsement of hereditary monarchies over all other forms of government.", "isCorrect": false, "rationale": "The book discusses various types of principalities and their acquisition, but the 'deeper scandal' was about the *method* of analysis, not just the endorsement of one specific form of government."}]}, {"question": "When the text states that Machiavelli is 'diagnosing' rather than 'prescribing' behavior, what does this imply about his intent?", "options": [{"text": "He actively encourages rulers to adopt cruel and deceptive tactics to maintain power.", "isCorrect": false, "rationale": "Diagnosing means explaining how something works, not necessarily encouraging its use. The text clarifies, 'He is not necessarily prescribing the behavior he describes.'"}, {"text": "He seeks to understand and explain the historical effectiveness of certain political actions without necessarily endorsing them morally.", "isCorrect": true, "rationale": "The text draws an analogy to a doctor explaining how poison works: 'He is explaining what the historical record shows actually works—and warning that rulers who ignore this will fail.' His purpose is 'to understand them' not 'to corrupt princes.'"}, {"text": "He believes that rulers are inherently immoral and offers no hope for ethical governance.", "isCorrect": false, "rationale": "His focus is on effective rule, not a moral judgment on the inherent nature of rulers. He separates political effectiveness from morality."}, {"text": "He provides a moral guide for princes, instructing them on how to be good and just rulers.", "isCorrect": false, "rationale": "This contradicts the entire premise of the 'diagnostic approach' and Machiavelli's separation from moralism as described in the text."}]}, {"question": "Based on the text, what was Machiavelli's fundamental purpose in writing The Prince?", "options": [{"text": "To condemn the corrupt political practices of his time and call for a return to traditional morality.", "isCorrect": false, "rationale": "Machiavelli analyzed, rather than condemned from a moral standpoint. He was a 'man of experience, not a moralist.'"}, {"text": "To provide a systematic handbook for new rulers on how to effectively acquire, maintain, and exercise power.", "isCorrect": true, "rationale": "The text states, 'The Prince is... organized as a systematic handbook covering the most important questions a new ruler would face.' It also describes his purpose as demonstrating 'knowledge and usefulness' to the Medici."}, {"text": "To entertain his friend Francesco Vettori with a 'little book' during his confinement.", "isCorrect": false, "rationale": "While he described it to Vettori as a 'little book,' the deeper purpose was political influence and employment, not mere entertainment."}, {"text": "To create a philosophical treatise on ideal governance, similar to Plato's Republic.", "isCorrect": false, "rationale": "Machiavelli deliberately contrasted his work with 'imaginary' versions of politics found in works like Plato's Republic, focusing instead on 'effectual truth.'"}]}, {"question": "A modern political analyst, influenced by Machiavelli's approach, is studying a historical event where a new leader successfully consolidated power. Which of the following best reflects Machiavelli's 'scientific' method, as described in the text?", "options": [{"text": "Consulting ancient religious texts to understand divine favor or disapproval of the leader's actions.", "isCorrect": false, "rationale": "Machiavelli 'does not cite Scripture' and does not appeal to abstract principles of divine will."}, {"text": "Analyzing the leader's actions and their historical consequences to derive practical lessons about effective governance.", "isCorrect": true, "rationale": "The text describes his method as 'almost scientific: here is what this ruler did; here is what happened; here is the lesson.' This aligns with analyzing actions and consequences for practical lessons."}, {"text": "Debating the ethical merits of the leader's decisions based on contemporary moral philosophy.", "isCorrect": false, "rationale": "Machiavelli separated political analysis from moral evaluation, treating it as a technical, not a moral, question."}, {"text": "Focusing solely on the leader's stated intentions and ignoring any negative outcomes.", "isCorrect": false, "rationale": "Machiavelli's focus is on what 'actually works' and 'what happened,' implying an analysis of outcomes regardless of stated intentions, and certainly not ignoring negative ones."}]}, {"question": "The Catholic Church placed The Prince on the Index of Forbidden Books. How did this action reflect the Church's understanding of Machiavelli's challenge to traditional political thought?", "options": [{"text": "It indicated the Church's endorsement of Machiavelli's practical, results-oriented advice for rulers.", "isCorrect": false, "rationale": "The Index was for books 'dangerous to the faith and morals.' Placement on it signifies condemnation, not endorsement."}, {"text": "It demonstrated the Church's belief that Machiavelli's separation of politics from Christian morality was a dangerous and fundamental challenge.", "isCorrect": true, "rationale": "The text states: 'That The Prince was placed on this list reflects how seriously the Church took Machiavelli's challenge to the traditional view that politics and Christian morality were inseparable.'"}, {"text": "It was a political move to protect the Medici family from criticism by Machiavelli.", "isCorrect": false, "rationale": "The Index was established years after Machiavelli's death and dedicated to protecting 'faith and morals,' not a specific political family."}, {"text": "It acknowledged The Prince as a work of historical fiction, rather than a guide for actual statecraft.", "isCorrect": false, "rationale": "The Church's reaction was due to the book's perceived threat as advice for statecraft, not as a harmless work of fiction."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
