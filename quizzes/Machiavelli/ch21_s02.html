<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the primary reason why princes who disarm their subjects make a serious mistake?", "options": [{"text": "It makes the prince dependent on hired soldiers or foreign auxiliaries, whom he cannot fully trust.", "isCorrect": false, "rationale": "While true that disarming leads to dependence on unreliable forces, Machiavelli states the primary mistake is signaling distrust to subjects, which breeds resentment and humiliation, before mentioning dependence on others."}, {"text": "It signals distrust, which breeds resentment and humiliation among the people, making them feel excluded from the state's defense.", "isCorrect": true, "rationale": "Machiavelli explicitly states, 'When a prince disarms his people, he signals that he does not trust them—and distrust breeds resentment. The people feel humiliated and excluded from the defense of their own state.'"}, {"text": "It prevents the state from raising a large enough army to deter foreign invaders effectively.", "isCorrect": false, "rationale": "While a disarmed populace contributes to a weaker state defense, the immediate mistake highlighted is the internal breach of trust and the resulting negative sentiments among subjects."}, {"text": "It leads to increased military spending as the prince must compensate for the lack of citizen soldiers.", "isCorrect": false, "rationale": "Increased military spending due to reliance on mercenaries is a consequence, but not the primary 'mistake' Machiavelli identifies in the act of disarming subjects itself."}], "id": "q01"}, {"question": "Machiavelli includes an important qualification regarding arming subjects. Under what specific circumstance might a prince temporarily disarm the inhabitants of a territory?", "options": [{"text": "When the territory has recently been conquered and its inhabitants are not yet loyal.", "isCorrect": true, "rationale": "The text states: 'when a prince acquires new territory, he may need to disarm that territory's inhabitants during the transition, because they are not yet loyal. But this should be a temporary measure.'"}, {"text": "When the subjects belong to a different ethnic or religious group than the prince.", "isCorrect": false, "rationale": "The text does not mention ethnicity or religion as a qualification, but rather the status of being 'new territory' and 'not yet loyal.'"}, {"text": "When the prince wants to reduce the overall military expenditure of the state.", "isCorrect": false, "rationale": "Reducing military expenditure is not the rationale given for temporary disarmament; Machiavelli advocates for citizen armies as the best kind of troops."}, {"text": "When the state is at peace and there is no immediate threat of invasion.", "isCorrect": false, "rationale": "Machiavelli's advice on arming subjects is a general principle for a strong state, not something to be relaxed during peacetime."}], "id": "q02"}, {"question": "Why is Machiavelli skeptical of the strategy of fostering factions among subjects, even if it seems to prevent them from uniting against the prince?", "options": [{"text": "Factions can become too powerful and eventually overthrow the prince themselves.", "isCorrect": false, "rationale": "While possible, Machiavelli's primary concern is not internal overthrow by factions, but the state's vulnerability during external conflict."}, {"text": "Factional divisions lead to social unrest and economic instability, undermining the state's long-term prosperity.", "isCorrect": false, "rationale": "Machiavelli focuses on the military and defensive weakness, stating factions 'cannot provide the stable tax base that finances military power' as a secondary point to their failure in defense."}, {"text": "Factions weaken a state precisely when it needs to be strong, causing it to collapse when an external enemy arrives.", "isCorrect": true, "rationale": "Machiavelli explicitly states: 'Factions weaken a state precisely when it needs to be strong,' and 'the moment an external enemy arrives, factional cities collapse.'"}, {"text": "The prince might inadvertently empower one faction too much, leading to civil war.", "isCorrect": false, "rationale": "Machiavelli's main point is that factions will side with an invader rather than unite to defend the state, not necessarily a direct civil war amongst them prior to invasion."}], "id": "q03"}, {"question": "A prince attempts to govern by supporting one family against another within his city, believing that internal divisions will prevent a unified uprising against him. Based on Machiavelli's broader principles, what is the most likely long-term outcome of this strategy?", "options": [{"text": "Enhanced stability, as the competing factions will constantly monitor each other, diverting attention from the prince.", "isCorrect": false, "rationale": "Machiavelli explicitly states this belief is misguided, as divisions are an 'invitation to conquest' in the long run."}, {"text": "A robust internal security system, as each faction will report on the activities of the others to the prince.", "isCorrect": false, "rationale": "The text warns against factions for their destabilizing effects, not for creating a security system."}, {"text": "Increased vulnerability to external invasion, as the divided populace will fail to unite in defense.", "isCorrect": true, "rationale": "Machiavelli concludes that 'a divided people cannot resist invasion' and 'one faction will side with the invader against the other' during external conflict."}, {"text": "A more adaptable government, as the prince can switch support between factions depending on political needs.", "isCorrect": false, "rationale": "This strategy is described as dangerous and undermining unity, not making the government more adaptable."}], "id": "q04"}, {"question": "What is Machiavelli's nuanced verdict on the utility of fortresses?", "options": [{"text": "Fortresses are always a wise investment, providing an impenetrable defense against all enemies.", "isCorrect": false, "rationale": "Machiavelli's verdict is explicitly 'nuanced,' and he argues that fortresses alone are not sufficient if the people are hostile."}, {"text": "Fortresses are completely useless and a waste of resources, as they can always be overcome.", "isCorrect": false, "rationale": "He does not condemn them entirely, stating 'sometimes fortresses are useful,' specifically when the prince fears his own subjects more."}, {"text": "Their utility depends primarily on the strategic location and engineering prowess involved in their construction.", "isCorrect": false, "rationale": "While these factors are important, Machiavelli states the 'decisive factor is never the fortress itself but the relationship between the prince and his people.'"}, {"text": "Their effectiveness is entirely dependent on the relationship between the prince and his people, not the fortresses themselves.", "isCorrect": true, "rationale": "Machiavelli states, 'the decisive factor is never the fortress itself but the relationship between the prince and his people.'"}], "id": "q05"}, {"question": "Machiavelli famously states that 'the best fortress a prince can have is not to be hated by the people.' What does this 'key concept' emphasize?", "options": [{"text": "That a prince should prioritize diplomacy over military strength to avoid conflict.", "isCorrect": false, "rationale": "This concept emphasizes internal loyalty as a defense, not a general preference for diplomacy over military strength."}, {"text": "That military hardware, like physical walls, is always inferior to intangible assets like popular loyalty.", "isCorrect": true, "rationale": "The text clearly states, 'Physical walls can be scaled or undermined... But a prince whose people are genuinely loyal... has a defense that no besieging army can overcome,' and 'military hardware is a supplement to popular loyalty, not a substitute for it.'"}, {"text": "That fortresses are only effective if they are built by the prince's loyal subjects.", "isCorrect": false, "rationale": "The focus is on the *outcome* of popular loyalty as a defense, not the method of fortress construction."}, {"text": "That a prince should strive to be loved by his subjects above all else.", "isCorrect": false, "rationale": "The 'thinkdeeper' section notes the distinction between being 'feared rather than loved' and 'not to be hated,' suggesting it's not simply about being loved."}], "id": "q06"}, {"question": "According to Machiavelli, if a prince is so hated by his people that they take up arms against him, what is the fate of even a strong fortress?", "options": [{"text": "It becomes a temporary refuge, allowing the prince time to negotiate with his rebellious subjects.", "isCorrect": false, "rationale": "Machiavelli states that if the people hate the prince, 'no fortress can save him. His external enemies will find allies inside his own territory; the people who surround the fortress will actively help them reduce it.'"}, {"text": "It can still provide a secure stronghold from which to reconquer lost territory, given enough supplies.", "isCorrect": false, "rationale": "The text directly contradicts this, saying it becomes a 'prison' in such a scenario."}, {"text": "It will ultimately fail to protect him, as the hostile populace will aid external enemies in reducing it.", "isCorrect": true, "rationale": "Machiavelli explains, 'His external enemies will find allies inside his own territory; the people who surround the fortress will actively help them reduce it.'"}, {"text": "It forces the prince to rely on foreign mercenaries, leading to further distrust and resentment.", "isCorrect": false, "rationale": "Reliance on mercenaries is a separate issue related to disarming subjects, not the specific consequence of a fortress when the prince is hated."}], "id": "q07"}, {"question": "The historical examples of Guidobaldo da Montefeltro and the Bentivoglio family serve to demonstrate which overarching lesson from Machiavelli?", "options": [{"text": "The importance of military superiority and advanced fortresses in defending a state.", "isCorrect": false, "rationale": "The Bentivoglio family succeeded *without* a great fortress due to popular support, contradicting this option."}, {"text": "That hereditary rule is more stable than acquired principalities.", "isCorrect": false, "rationale": "The examples focus on the role of popular support, not the method of succession."}, {"text": "That popular loyalty is the indispensable foundation for a prince's security, with everything else being secondary.", "isCorrect": true, "rationale": "The text states: 'The lesson is consistent: popular loyalty is the foundation; everything else is secondary.' Guidobaldo failed with a fortress because of lack of support; Bentivoglio succeeded without one because of it."}, {"text": "The danger of alliances with external powers in Italian politics.", "isCorrect": false, "rationale": "While relevant to the historical context, the specific lesson drawn by Machiavelli from these examples is about popular loyalty."}], "id": "q08"}, {"question": "Machiavelli's arguments in this section—about arming subjects, discouraging factions, and the 'best fortress'—collectively underscore which fundamental principle of princely rule?", "options": [{"text": "The necessity for a prince to maintain a complex network of alliances to secure his state.", "isCorrect": false, "rationale": "While alliances can be important, these specific arguments focus on internal strength and the relationship between the prince and his people, not external alliances."}, {"text": "That a prince's most enduring security comes from the unity and genuine support of his own citizens.", "isCorrect": true, "rationale": "Arming subjects creates a bond of dependence; fostering factions is dangerous because it destroys unity; the best fortress is not being hated. All these point to internal unity and popular support as the bedrock of security."}, {"text": "The strategic advantage of offensive military campaigns over defensive fortifications.", "isCorrect": false, "rationale": "The discussion is about internal statecraft and defense, not a general strategy regarding offense vs. defense."}, {"text": "The importance of economic prosperity to ensure a stable tax base for the military.", "isCorrect": false, "rationale": "While 'stable tax base' is mentioned in relation to factions, the overarching principle connecting all three strategies is the internal social cohesion and loyalty."}], "id": "q09"}, {"question": "Machiavelli discusses the distinction between a prince being feared and being hated, stating that a prince must sometimes be severe but also 'not to be hated by the people.' Which of the following actions best illustrates a prince balancing these two ideas?", "options": [{"text": "Executing all political opponents publicly without trial to instill maximum fear and deter dissent.", "isCorrect": false, "rationale": "Executing opponents without trial would likely be perceived as arbitrary cruelty, leading to hatred rather than respect or fear combined with justice."}, {"text": "Implementing strict laws and penalties for crimes while ensuring justice is applied fairly and consistently.", "isCorrect": true, "rationale": "This action demonstrates severity and the capacity to be feared (strict laws, penalties) but, crucially, avoids hatred by upholding justice and consistency, which builds legitimacy rather than resentment."}, {"text": "Avoiding all forms of punishment to cultivate love and affection from the populace.", "isCorrect": false, "rationale": "This would likely undermine the prince's authority, making him neither feared nor respected, and incapable of maintaining order."}, {"text": "Relying heavily on a secret police force to intimidate subjects into submission, without public knowledge.", "isCorrect": false, "rationale": "Such tactics, if discovered, would breed deep fear combined with hatred and distrust, undermining popular support rather than preserving it."}], "id": "q10"}, {"question": "The study guide notes that Machiavelli's verdict on fortresses is 'genuinely nuanced'—neither a blanket endorsement nor a blanket rejection. What key variable determines whether building a fortress is wise or foolish?", "options": [{"text": "Whether the prince has the financial resources to build and garrison a fortress without burdening his subjects.", "isCorrect": false, "rationale": "Machiavelli's judgment on fortresses is political, not financial. The key variable is the source of the primary threat, not the cost of construction."}, {"text": "Whether the greater threat to the prince comes from his own subjects or from foreign powers.", "isCorrect": true, "rationale": "The study guide captures Machiavelli's logic: if a prince fears his people more than foreigners, a fortress provides refuge. If he fears foreigners more, a fortress is useless or harmful because foreign invaders will find allies among a hostile population and the fortress cannot save him."}, {"text": "Whether the fortress is located in a central city or on the frontier where it provides maximum strategic deterrence.", "isCorrect": false, "rationale": "Location is a tactical consideration, but Machiavelli's evaluative framework for whether to build at all is about the political relationship between prince and subjects, not the physical placement of the fortress."}, {"text": "Whether the prince has already secured a strong international alliance that can relieve a siege.", "isCorrect": false, "rationale": "Alliances play a role in Machiavelli's broader strategy, but the criterion for the fortress decision is specifically the internal/external threat balance, not alliance availability."}], "id": "q11"}, {"question": "The study guide presents popular support as 'the best fortress.' What does Machiavelli mean when he says this, and how does it follow logically from his analysis of conspiracies?", "options": [{"text": "Popular support means the people will physically defend the prince's castle walls, making stone fortifications unnecessary.", "isCorrect": false, "rationale": "This is too literal. The claim is about what makes a prince structurally secure, not about the people fighting as castle defenders."}, {"text": "If the people support the prince, conspirators lose both the motivation to act (no popular backing for their cause) and the ability to succeed (no sanctuary or allies after the act), eliminating the primary internal threat more effectively than walls.", "isCorrect": true, "rationale": "Machiavelli's analysis of conspiracies shows they require popular sympathy to succeed. If the people support the prince, a conspirator cannot recruit, cannot escape after the act, and cannot consolidate power. Popular loyalty thus neutralizes the conspiracy threat structurally, not just deterring it."}, {"text": "Popular support is equivalent to military strength, since a prince with loyal subjects can always raise a citizen army.", "isCorrect": false, "rationale": "While popular support does help with military mobilization, the specific claim about 'best fortress' is about security against conspiracies and internal betrayal, not primarily about mobilizing armies."}, {"text": "Machiavelli is using 'fortress' metaphorically to mean any source of strength; popular support is simply one of many equally valid alternatives.", "isCorrect": false, "rationale": "Machiavelli is not saying popular support is merely one option among equals—he is saying it is the *best* fortress, superior to stone walls, because it addresses the fundamental political threat rather than just its physical manifestation."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
