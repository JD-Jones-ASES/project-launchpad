    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "What foundational question does Machiavelli pose in Chapter X regarding the character of principalities?", "options": [{"text": "How can a prince best acquire new territories through conquest?", "isCorrect": false, "rationale": "Chapter X focuses on a prince's ability to defend his existing state, not on acquiring new ones."}, {"text": "Can a prince defend himself, or does he depend on others for defense?", "isCorrect": true, "rationale": "This is the explicit foundational question Machiavelli states at the beginning of Chapter X, determining how a prince should govern."}, {"text": "What is the most effective way to maintain a loyal standing army?", "isCorrect": false, "rationale": "While related, the loyalty and effectiveness of an army is a component of self-sufficiency, not the overarching foundational question itself."}, {"text": "Should a prince prioritize wealth accumulation or the well-being of his subjects?", "isCorrect": false, "rationale": "The text discusses provisioning and employment for subjects, which impacts well-being, but the core question is about self-reliance in defense, not a general ethical dilemma."}]}, {"question": "According to Machiavelli, what primarily defines a prince who is 'able to support themselves by their own resources'?", "options": [{"text": "Possessing strong alliances with neighboring states for mutual defense.", "isCorrect": false, "rationale": "Relying on alliances indicates dependence on others, which is the opposite of self-sufficiency as defined by Machiavelli."}, {"text": "Having sufficient men or money to raise an army capable of engaging the enemy in open battle.", "isCorrect": true, "rationale": "Machiavelli explicitly states that those who can 'raise a sufficient army to join battle against any one who comes to attack them' are self-sufficient."}, {"text": "Maintaining impregnable fortresses and a vast treasury within the city walls.", "isCorrect": false, "rationale": "This describes the strategy for dependent princes who 'cannot show themselves against the enemy in the field' and must defend from behind walls."}, {"text": "Ensuring the unwavering loyalty of his entire populace through benevolent rule.", "isCorrect": false, "rationale": "While popular support is crucial for all princes, Machiavelli's definition of 'supporting themselves by their own resources' focuses specifically on military capacity for open conflict."}]}, {"question": "A prince governs a small, geographically vulnerable state that lacks the population and wealth to raise a large army for open-field combat. Based on Machiavelli's advice, what is his most prudent strategy to ensure his principality's survival against external threats?", "options": [{"text": "Mobilize all able-bodied men for open-field combat, hoping to deter attack through sheer numbers and courage.", "isCorrect": false, "rationale": "This contradicts Machiavelli's advice for dependent princes, who 'cannot show themselves against the enemy in the field'."}, {"text": "Focus entirely on fortifying his towns, provisioning them for a year, and not attempting to defend the outlying countryside.", "isCorrect": true, "rationale": "This is the specific advice given by Machiavelli for princes who 'always have need of others': 'to provision and fortify their towns, and not on any account to defend the country'."}, {"text": "Seek immediate alliances with one of the stronger neighboring states to guarantee protection.", "isCorrect": false, "rationale": "While a practical political move, Machiavelli's specific advice in this section for dependent princes focuses on internal defensive measures and self-reliance within their fortified towns, rather than external alliances."}, {"text": "Invest heavily in intelligence and espionage to anticipate and prevent any potential invasions.", "isCorrect": false, "rationale": "These are general defensive tactics, but not the primary, direct recommendation for dependent princes given in the text, which emphasizes physical fortification and provisioning."}]}, {"question": "Machiavelli notes that 'men are always adverse to enterprises where difficulties can be seen.' How does this observation primarily justify the strategy of a prince fortifying his town and ensuring popular support?", "options": [{"text": "It suggests that appearing strong is more important than actually being strong to deter potential attackers.", "isCorrect": false, "rationale": "Machiavelli emphasizes visible, actual difficulties (strong walls, provisions, non-hated prince) that make an attack genuinely 'tedious and difficult,' not mere appearance."}, {"text": "It explains why a long siege is almost impossible for an attacking army to sustain due to logistical challenges.", "isCorrect": false, "rationale": "While the difficulty of a long siege is mentioned later, the quote directly refers to deterring the *initial enterprise* by making the attack appear difficult from the outset."}, {"text": "It highlights that a well-fortified town, combined with a populace that does not hate the prince, presents a visible and tedious challenge, thus deterring potential aggressors.", "isCorrect": true, "rationale": "Machiavelli explicitly states that 'it will be seen not to be an easy thing to attack one who has his town well fortified, and is not hated by his people,' making potential attackers 'adverse to enterprises where difficulties can be seen'."}, {"text": "It encourages potential attackers to seek alliances and diplomatic solutions rather than direct military confrontation.", "isCorrect": false, "rationale": "The focus of the statement is on deterring the attack itself due to perceived difficulty, not on shifting the attacker's strategy towards diplomacy or alliances."}]}, {"question": "Which of the following is NOT described as a characteristic contributing to the strength and independence of the German cities Machiavelli uses as an example?", "options": [{"text": "They maintain public depots with a year's supply of food, drink, and firing.", "isCorrect": false, "rationale": "The text explicitly states they 'always keep in public depots enough for one year’s eating, drinking, and firing'."}, {"text": "They provide consistent work for the community and uphold military exercises.", "isCorrect": false, "rationale": "The text mentions they 'always have the means of giving work to the community' and 'hold military exercises in repute'."}, {"text": "They have strong walls, ditches, and sufficient artillery.", "isCorrect": false, "rationale": "The text states they 'have proper ditches and walls, they have sufficient artillery'."}, {"text": "They pledge unwavering loyalty to the Emperor and avoid any regional conflicts.", "isCorrect": true, "rationale": "The text notes they 'yield obedience to the emperor when it suits them' and 'nor do they fear this or any other power they may have near them,' indicating independence and selective obedience, not unwavering loyalty or conflict avoidance."}]}, {"question": "A prince's advisors express concern that if the enemy burns property outside the city during a siege, the citizens will lose patience and abandon their prince. How does Machiavelli suggest a 'powerful and courageous prince' should address this challenge?", "options": [{"text": "Compensate citizens for their losses from the royal treasury immediately after the attack.", "isCorrect": false, "rationale": "While a benevolent act, the text does not mention direct compensation as the primary strategy during a siege. Machiavelli focuses on psychological management."}, {"text": "Order a swift counter-attack to drive off the enemy before significant damage occurs.", "isCorrect": false, "rationale": "This contradicts the advice for dependent princes, who should 'not on any account defend the country,' and implies an ability for open-field combat, which these princes lack."}, {"text": "Offer hope that the evil will be short-lived, instill fear of the enemy's cruelty, and adroitly manage bold subjects.", "isCorrect": true, "rationale": "Machiavelli explicitly states that a prince 'will overcome all such difficulties by giving at one time hope to his subjects that the evil will not be for long, at another time fear of the cruelty of the enemy, then preserving himself adroitly from those subjects who seem to him to be too bold'."}, {"text": "Publicly punish any citizens who express discontent or show signs of wavering loyalty.", "isCorrect": false, "rationale": "While 'adroitly preserving himself from those subjects who seem to him to be too bold' is mentioned, the text does not advocate for public punishment as the primary or sole strategy, instead focusing on hope and fear."}]}, {"question": "A prince's counselors propose delaying the destruction of outlying rural properties until the last possible moment during an invasion, hoping the enemy might choose to preserve them. Based on Machiavelli's analysis of human nature and timing, why is this strategy fundamentally flawed?", "options": [{"text": "The delay would give the enemy more time to gather intelligence on the city's defenses and internal morale.", "isCorrect": false, "rationale": "Machiavelli's argument for immediate action is tied to citizen morale and unity, not enemy intelligence gathering."}, {"text": "The enemy would naturally burn and ruin the country immediately upon arrival, and delaying the prince's response would mean the damage is done when citizens' spirits have cooled, making them less ready to unite.", "isCorrect": true, "rationale": "Machiavelli explicitly states the enemy would 'at once burn and ruin the country at the time when the spirits of the people are still hot,' and that a prince should not hesitate, because if he waits, 'when spirits have cooled, the damage is already done, the ills are incurred... and therefore they are so much the more ready to unite with their prince'."}, {"text": "Preserving rural properties would signal weakness to the enemy, encouraging a more aggressive and prolonged siege.", "isCorrect": false, "rationale": "The text does not suggest that preserving rural property signals weakness; rather, the concern is about the timing of its destruction and its impact on citizen unity."}, {"text": "The prince would lose credibility with his people if he failed to protect their external possessions by delaying action.", "isCorrect": false, "rationale": "Machiavelli suggests the opposite: that the shared experience of loss *in defense of the prince* fosters unity and a sense of obligation, if handled wisely."}]}, {"question": "Machiavelli states, 'For it is the nature of men to be bound by the benefits they confer as much as by those they receive.' How does this principle apply to a prince defending a besieged city whose subjects' property outside the walls has been ruined by the enemy?", "options": [{"text": "The prince must compensate his subjects generously for their losses to maintain their loyalty and ensure they feel benefited.", "isCorrect": false, "rationale": "This option focuses on benefits *received* by citizens. The quote emphasizes the binding nature of benefits *they confer*."}, {"text": "The destruction incurred by subjects' property in defense of the prince creates a shared hardship, causing subjects to feel obligated to the prince and unite with him.", "isCorrect": true, "rationale": "Machiavelli explains that after their possessions are ruined 'in his defense,' subjects are 'so much the more ready to unite with their prince, he appearing to be under obligations to them now.' This shared sacrifice (a 'benefit' they 'confer' through their loss) binds them."}, {"text": "The subjects will feel indebted to the prince for providing shelter and safety within the city walls during the attack.", "isCorrect": false, "rationale": "While providing shelter is a benefit the prince confers, the quote specifically highlights the binding nature of benefits *conferred by men*, meaning their actions or sacrifices, not just what they receive."}, {"text": "A wise prince should always avoid any situation where his subjects might incur losses, as this inevitably leads to discontent and rebellion.", "isCorrect": false, "rationale": "Machiavelli outlines a strategy for managing such losses to maintain loyalty, implying they are a potential part of defense that can be leveraged, not always avoided."}]}, {"question": "According to Machiavelli, what are the two essential conditions for a prince with a strong city to avoid attack or ensure an attacker is 'driven off with disgrace'?", "options": [{"text": "Possessing a strong financial treasury and a vast, loyal army.", "isCorrect": false, "rationale": "While important for strength, the text specifically links avoidance of attack or disgrace for a city-based prince to fortification and popular sentiment, not explicitly a vast army or treasury."}, {"text": "Having impenetrable city fortifications and extensive foreign alliances.", "isCorrect": false, "rationale": "Foreign alliances are not mentioned as a primary condition for deterring attack on a fortified city in this section; internal strength and popular support are the focus."}, {"text": "Maintaining a well-fortified city and not being hated by his people.", "isCorrect": true, "rationale": "Machiavelli states, 'Therefore, a prince who has a strong city, and had not made himself odious, will not be attacked, or if any one should attack he will only be driven off with disgrace'."}, {"text": "Ensuring year-round provisions and constant military exercises for his citizens.", "isCorrect": false, "rationale": "These are components of a strong city, as exemplified by German cities, but the text specifically highlights the overarching conditions as fortification and not being hated."}]}, {"question": "Consider a prince who has followed all of Machiavelli's advice for a dependent principality: his city is well-fortified, provisioned for a year, his subjects are employed, and he is not hated. If a powerful enemy army still attempts to besiege his city, what outcome does Machiavelli predict?", "options": [{"text": "The city will eventually fall due to the overwhelming power and resources of the attacking force, as no city can withstand a truly determined siege indefinitely.", "isCorrect": false, "rationale": "Machiavelli's advice is designed to make the city nearly impregnable and the siege untenable for the attacker, not to merely delay the inevitable fall."}, {"text": "The attacking army will be forced to withdraw in disgrace, as it is nearly impossible to keep an army in the field for a whole year without interference.", "isCorrect": true, "rationale": "Machiavelli directly states that if such a prince is attacked, 'he will only be driven off with disgrace; again, because that the affairs of this world are so changeable, it is almost impossible to keep an army a whole year in the field without being interfered with'."}, {"text": "The prince will have to negotiate a peace treaty, surrendering some territory to end the siege and save his remaining principality.", "isCorrect": false, "rationale": "Machiavelli's strategy aims for deterrence or outright victory (driving off the enemy), not for a forced negotiation leading to territorial loss."}, {"text": "The citizens will eventually tire of the siege and force the prince to surrender to save their remaining property outside the walls.", "isCorrect": false, "rationale": "The text explains how a wise prince can keep his citizens steadfast 'from first to last' by managing hope, fear, and recognizing the binding nature of shared sacrifice, even when property is lost."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
