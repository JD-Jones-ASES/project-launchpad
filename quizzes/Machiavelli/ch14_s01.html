<script>
var QUESTIONS = [{"question": "Machiavelli argues that auxiliaries are \"much more hazardous than mercenaries.\" What is the primary reason he gives for this assessment?", "options": [{"text": "Mercenaries are disloyal and easily bribed by enemies.", "isCorrect": false, "rationale": "While true that mercenaries can be disloyal, Machiavelli's text emphasizes dastardy as their main danger. The specific hazard for auxiliaries is different and more immediate."}, {"text": "Auxiliaries are united and obey another ruler, making conquest with them lead to the prince becoming their captive.", "isCorrect": true, "rationale": "Machiavelli states, 'for losing, one is undone, and winning, one is their captive,' and that auxiliaries are 'all united, all yield obedience to others.' This makes them more dangerous because they can turn on the prince who hired them if victorious."}, {"text": "Mercenaries are only dangerous due to their dastardy, while auxiliaries possess valour.", "isCorrect": false, "rationale": "This statement accurately reflects a distinction Machiavelli makes ('in mercenaries dastardy is most dangerous; in auxiliaries, valour'), but it doesn't explain *why* auxiliaries are *more hazardous* due to their valour. Their valour is dangerous because it makes them effective instruments for their *true* master, who is not the prince who hired them."}, {"text": "Auxiliaries are more expensive to employ than mercenaries.", "isCorrect": false, "rationale": "The text does not mention cost as the primary reason for auxiliaries being more hazardous than mercenaries."}]}, {"question": "Pope Julius II's experience with auxiliaries against Ferrara is presented as a cautionary tale. What unique circumstance prevented him from suffering the typical negative consequences Machiavelli associates with using auxiliaries?", "options": [{"text": "His mercenaries proved effective in the end, negating the need for auxiliaries.", "isCorrect": false, "rationale": "The text explicitly states Pope Julius 'had poor proof of his mercenaries' before turning to auxiliaries, so this option is incorrect."}, {"text": "He quickly dismissed the auxiliaries before they could turn against him.", "isCorrect": false, "rationale": "The auxiliaries were 'routed at Ravenna,' not dismissed by the Pope. Their defeat, combined with an unexpected event, saved him."}, {"text": "An unexpected intervention by the Switzers drove out both the conquerors and his routed auxiliaries.", "isCorrect": true, "rationale": "Machiavelli notes that 'his good fortune brought about a third event... because, having his auxiliaries routed at Ravenna, and the Switzers having risen and driven out the conquerors (against all expectation...), it so came to pass that he did not become prisoner to his enemies... nor to his auxiliaries.'"}, {"text": "He managed to secure a peace treaty before the auxiliaries could betray him.", "isCorrect": false, "rationale": "The text does not mention a peace treaty being the saving factor; rather, it was an unexpected military development."}]}, {"question": "Cesare Borgia's progression of military forces (French auxiliaries -> Orsini/Vitelli mercenaries -> his own men) serves as a compelling example in the text. What central principle does Borgia's eventual reliance on his own men underscore?", "options": [{"text": "That auxiliaries are sometimes necessary to achieve initial conquests quickly.", "isCorrect": false, "rationale": "While Borgia did use auxiliaries for initial conquests, the text highlights his ultimate rejection of them and mercenaries as 'unreliable' or 'dangerous,' not their necessity."}, {"text": "That mercenaries, while dangerous, are preferable to auxiliaries for long-term security.", "isCorrect": false, "rationale": "Borgia found mercenaries 'doubtful, unfaithful, and dangerous' and ultimately 'destroyed' them, turning to his own men, indicating they were not preferable for long-term security."}, {"text": "That true power and reputation are founded on the complete mastery and fidelity of one's own forces.", "isCorrect": true, "rationale": "The text states, 'he was never esteemed more highly than when every one saw that he was complete master of his own forces' and could count on their fidelity, directly supporting this principle."}, {"text": "That a wise prince must continuously switch between different types of foreign arms to keep enemies off balance.", "isCorrect": false, "rationale": "Borgia's strategy was to abandon foreign arms entirely for his own, not to continuously rotate them."}]}, {"question": "According to Machiavelli, what is the inevitable outcome for a prince who successfully wins a war using auxiliary forces?", "options": [{"text": "He gains a stronger alliance with the auxiliary's ruler.", "isCorrect": false, "rationale": "While a temporary alliance might be formed, Machiavelli focuses on the disadvantage to the prince, not a stronger alliance for him."}, {"text": "He is undone by the defeat of his forces.", "isCorrect": false, "rationale": "This is the outcome for a prince who *loses* when using auxiliaries ('for losing, one is undone')."}, {"text": "He becomes a captive to the auxiliaries who fought for him.", "isCorrect": true, "rationale": "Machiavelli explicitly warns that when employing auxiliaries, 'winning, one is their captive.' This refers to being dependent on them and subject to their will."}, {"text": "He must pay a higher price for their services in future conflicts.", "isCorrect": false, "rationale": "The text does not highlight increased cost as the primary inevitable outcome of winning with auxiliaries; the danger is the loss of independence and sovereignty."}]}, {"question": "If a prince, following Machiavelli's advice, wishes to establish a secure and independent principality, which of the following actions would be most consistent with his recommendations?", "options": [{"text": "Employing the most skilled and renowned mercenary captains to lead his armies.", "isCorrect": false, "rationale": "Machiavelli argues strongly against mercenaries, considering them unreliable and dangerous due to their dastardy and self-interest."}, {"text": "Seeking alliances with powerful neighboring states to borrow their armies when needed.", "isCorrect": false, "rationale": "This describes the use of auxiliaries, which Machiavelli deems 'much more hazardous than mercenaries' and fundamentally disadvantageous."}, {"text": "Investing in the training and organization of his own subjects, citizens, or dependents into a national army.", "isCorrect": true, "rationale": "Machiavelli concludes that 'one’s own forces are those which are composed either of subjects, citizens, or dependents' and that 'no principality is secure without having its own forces.'"}, {"text": "Maintaining a small, elite guard for personal protection while relying on foreign troops for large-scale conflicts.", "isCorrect": false, "rationale": "Relying on foreign troops for large-scale conflicts contradicts Machiavelli's central argument for military self-reliance and the use of 'one's own arms' for all defense."}]}, {"question": "The example of the Emperor of Constantinople sending Turks into Greece illustrates which specific danger of using auxiliaries?", "options": [{"text": "The auxiliaries' lack of loyalty and potential for betrayal in battle.", "isCorrect": false, "rationale": "While auxiliaries' loyalty is to their own ruler, this specific example doesn't focus on battlefield betrayal but on their post-war actions."}, {"text": "The auxiliaries' refusal to leave after the conflict, leading to the subjugation of the territory.", "isCorrect": true, "rationale": "The text states, 'who, on the war being finished, were not willing to quit; this was the beginning of the servitude of Greece to the infidels,' clearly demonstrating the danger of auxiliaries occupying and taking over land they were meant to defend."}, {"text": "The high financial cost of maintaining foreign troops indefinitely.", "isCorrect": false, "rationale": "The narrative focuses on the political subjugation and loss of sovereignty, not primarily on the financial burden."}, {"text": "The auxiliaries' inherent cowardice leading to defeat.", "isCorrect": false, "rationale": "Machiavelli associates 'dastardy' with mercenaries, while auxiliaries are noted for their 'valour.' The problem here wasn't cowardice, but their strength and will to stay."}]}, {"question": "Machiavelli attributes the decline of the Roman Empire to \"the enlisting of the Goths.\" How does this historical example reinforce his broader argument about military forces?", "options": [{"text": "It shows that even the most powerful empires can be undone by internal corruption rather than external threats.", "isCorrect": false, "rationale": "The text specifically links the decline to the military policy of enlisting Goths, not broad internal corruption."}, {"text": "It highlights how relying on foreign soldiers can gradually erode the native military's vigour and lead to dependence.", "isCorrect": true, "rationale": "Machiavelli explains that 'from that time the vigour of the Roman Empire began to decline, and all that valour which had raised it passed away to others,' directly supporting the idea of erosion and dependence."}, {"text": "It demonstrates the inherent superiority of barbarian fighting styles over traditional Roman legions.", "isCorrect": false, "rationale": "Machiavelli does not praise the Goths' fighting style but laments the transfer of Roman valour to 'others' and the consequent decline of Roman strength."}, {"text": "It suggests that a prince should only enlist foreign soldiers as a last resort in desperate situations.", "isCorrect": false, "rationale": "Machiavelli's entire argument is against using foreign arms, not just reserving them for emergencies. He advocates for 'one's own forces' exclusively."}]}, {"question": "The text differentiates between the primary dangers of mercenaries and auxiliaries. What is Machiavelli's concise summary of these distinct threats?", "options": [{"text": "Mercenaries are dangerous due to their disloyalty; auxiliaries, due to their ambition.", "isCorrect": false, "rationale": "While elements of these are present, this is not Machiavelli's precise phrasing for the summary distinction."}, {"text": "In mercenaries, avarice is most dangerous; in auxiliaries, foreign allegiance.", "isCorrect": false, "rationale": "Again, these are related concepts but not the exact summary Machiavelli provides."}, {"text": "In mercenaries dastardy is most dangerous; in auxiliaries, valour.", "isCorrect": true, "rationale": "Machiavelli directly states, 'In conclusion, in mercenaries dastardy is most dangerous; in auxiliaries, valour.' He explains that the valour of auxiliaries is dangerous because it makes them effective instruments for their true master, not the prince who hires them."}, {"text": "Mercenaries are slow to act; auxiliaries are too quick to betray.", "isCorrect": false, "rationale": "This is an oversimplification and not the specific distinction made in the text."}]}, {"question": "David's rejection of Saul's armor in favor of his own sling and knife serves as a metaphorical example. What aspect of Machiavelli's military philosophy does this story primarily illustrate?", "options": [{"text": "The importance of humility and trust in divine providence in battle.", "isCorrect": false, "rationale": "While David's story has religious connotations, Machiavelli uses it purely to illustrate the practical military principle, not religious or moral ones."}, {"text": "The necessity for a prince to be skilled in various forms of combat.", "isCorrect": false, "rationale": "The example emphasizes David's preference for *his own* familiar weapons, not his versatility with *all* weapons."}, {"text": "That a ruler must use arms that are personally suited to him and which he understands and controls.", "isCorrect": true, "rationale": "Machiavelli concludes from this example that 'the arms of others either fall from your back, or they weigh you down, or they bind you fast,' meaning they are ill-fitting and detrimental compared to one's own familiar and controlled means."}, {"text": "The advantage of surprise tactics over traditional military might.", "isCorrect": false, "rationale": "While David's choice leads to a surprising victory, the core point of the metaphor for Machiavelli is the *source and suitability* of the arms, not the tactic itself."}]}, {"question": "Which statement best encapsulates Machiavelli's overarching conclusion regarding military forces, as presented in this section?", "options": [{"text": "A mixed army of mercenaries and national troops is the most adaptable and secure option for a prince.", "isCorrect": false, "rationale": "Machiavelli critiques King Louis XI's mixed army, calling it 'much inferior to one’s own forces' and a 'source of peril.'"}, {"text": "The most prudent strategy is to alternate between auxiliaries and mercenaries to prevent either from becoming too powerful.", "isCorrect": false, "rationale": "Cesare Borgia's example shows he ultimately abandoned both auxiliaries and mercenaries for his own forces, not that he alternated them for control."}, {"text": "No principality can be truly secure or powerful without developing and relying solely on its own national forces.", "isCorrect": true, "rationale": "Machiavelli's concluding statement is, 'no principality is secure without having its own forces... And one’s own forces are those which are composed either of subjects, citizens, or dependents.' He emphasizes that power not founded on its own strength is 'uncertain or unstable.'"}, {"text": "While dangerous, foreign auxiliary forces can be indispensable for a prince to achieve rapid expansion and conquest.", "isCorrect": false, "rationale": "Machiavelli calls auxiliaries 'useless' and 'always disadvantageous' for the one who calls them in, even if they can achieve initial conquests, as the long-term consequences are disastrous."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
