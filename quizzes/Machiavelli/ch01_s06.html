<script>
var QUESTIONS = [{"question": "At the time of writing The Prince's dedicatory letter, what was Machiavelli's political and professional standing?", "options": [{"text": "He was a prominent political advisor enjoying renewed influence.", "isCorrect": false, "rationale": "The text explicitly states he was 'without political influence, without employment, and without hope of official rehabilitation,' which contradicts this option."}, {"text": "He was a disgraced former official, lacking employment and influence.", "isCorrect": true, "rationale": "The text describes Machiavelli as 'a man without political influence, without employment, and without hope of official rehabilitation,' perfectly aligning with this description."}, {"text": "He held a minor administrative position, hoping for promotion.", "isCorrect": false, "rationale": "The text specifies he was 'without employment,' meaning he did not hold any position, minor or otherwise."}, {"text": "He was a wealthy nobleman seeking to expand his power.", "isCorrect": false, "rationale": "The text implies a lack of wealth and status, focusing on his intellectual gift rather than material offerings, and his aim was rehabilitation, not self-expansion of power as a nobleman."}], "id": "q01"}, {"question": "How does Machiavelli strategically differentiate his gift, The Prince, from typical presents given to rulers?", "options": [{"text": "He emphasizes its aesthetic beauty and elaborate prose.", "isCorrect": false, "rationale": "Machiavelli explicitly states he has 'not embellished with swelling or magnificent words' and wished 'that the truth of the matter and the weightiness of the theme shall make it acceptable,' rejecting aesthetic adornment."}, {"text": "He highlights its inherent practical utility and wisdom over material wealth.", "isCorrect": true, "rationale": "The text notes the gift's value 'lies in its usefulness, not in the wealth or status of the giver,' and he offers 'the knowledge of the actions of great men' as his most precious possession, distinct from horses, arms, or precious stones."}, {"text": "He asserts its superiority because it was created by a man of high status.", "isCorrect": false, "rationale": "Machiavelli describes himself as being of 'low and humble condition,' and his analogy of the landscape specifically argues that a low condition offers a unique, valuable perspective."}, {"text": "He claims it is a symbolic gesture, primarily to demonstrate loyalty without substance.", "isCorrect": false, "rationale": "Machiavelli genuinely believed his experience and analysis were 'more valuable than anything money could buy,' indicating a gift of substantial intellectual substance."}], "id": "q02"}, {"question": "The author describes Machiavelli's tone in the dedicatory letter as 'humble but not servile; frank but calculated.' Which of the following best captures the essence of this description?", "options": [{"text": "Machiavelli adopted a purely submissive stance to avoid offending Lorenzo.", "isCorrect": false, "rationale": "The phrase 'not servile' directly contradicts the idea of a purely submissive stance."}, {"text": "Machiavelli was direct and honest, regardless of the potential consequences.", "isCorrect": false, "rationale": "While 'frank,' the term 'calculated' suggests he was careful about the consequences and strategically chose his words, not acting 'regardless' of them."}, {"text": "Machiavelli balanced respectful deference with a strategic assertion of his unique value.", "isCorrect": true, "rationale": "The 'humble' aspect shows deference, while 'not servile' and 'calculated' paired with 'frank' indicate he still asserted the unique and valuable nature of his gift and perspective in a strategic manner."}, {"text": "Machiavelli used flattery extensively to secure Lorenzo's immediate favor.", "isCorrect": false, "rationale": "The description 'frank' implies directness and truthfulness rather than extensive flattery, though 'calculated' means his presentation was deliberate."}], "id": "q03"}, {"question": "Machiavelli uses the analogy of drawing landscapes to justify his authority to advise princes. What is the central message this analogy conveys about perspective in understanding leadership?", "options": [{"text": "Only those with practical ruling experience can truly understand the complexities of power.", "isCorrect": false, "rationale": "While practical experience is valuable, the analogy specifically argues for the necessity of an external perspective ('to understand that of princes it needs to be of the people')."}, {"text": "A comprehensive understanding of power requires insights from both those who rule and those who are ruled.", "isCorrect": true, "rationale": "The analogy states: 'to understand the nature of the people it needs to be a prince, and to understand that of princes it needs to be of the people,' emphasizing the need for both perspectives for complete understanding."}, {"text": "The most effective advisors are those who maintain a detached, objective viewpoint from afar.", "isCorrect": false, "rationale": "Machiavelli emphasizes the experience of being 'of the people' or 'a prince' for understanding, which is more involved than just a detached viewpoint."}, {"text": "Princes should primarily rely on the advice of their peers rather than commoners.", "isCorrect": false, "rationale": "This contradicts the core message of the analogy, which advocates for the unique perspective of someone 'of the people' to understand princes."}], "id": "q04"}, {"question": "What did Machiavelli genuinely believe was the most valuable aspect of his gift to Lorenzo?", "options": [{"text": "The book's luxurious binding and exquisite craftsmanship.", "isCorrect": false, "rationale": "Machiavelli explicitly states he did not embellish the work, focusing on its content's truth and weight, not its physical presentation."}, {"text": "Its potential to bring Machiavelli financial gain and political rehabilitation.", "isCorrect": false, "rationale": "While he hoped for these outcomes, the text says he believed his 'years of experience and his rigorous analysis of that experience were more valuable than anything money could buy,' referring to the intellectual content itself."}, {"text": "The profound insights derived from his extensive experience and study of history.", "isCorrect": true, "rationale": "The text states he 'genuinely believed that his years of experience and his rigorous analysis of that experience were more valuable than anything money could buy' and refers to 'the knowledge of the actions of great men, acquired by long experience... and a continual study of antiquity.'"}, {"text": "The rare and ancient texts he consulted during his research.", "isCorrect": false, "rationale": "It was his knowledge and analysis derived from studying antiquity and contemporary affairs, not the texts themselves, that he considered most valuable."}], "id": "q05"}, {"question": "Based on the dedicatory letter, which approach did Machiavelli prioritize in the literary style of The Prince?", "options": [{"text": "He aimed for elaborate language and rhetorical flourishes to impress the reader.", "isCorrect": false, "rationale": "He explicitly states he has 'not embellished with swelling or magnificent words, nor stuffed with rounded periods, nor with any extrinsic allurements or adornments whatever.'"}, {"text": "He focused on directness and the inherent weight of the subject matter to convey truth.", "isCorrect": true, "rationale": "Machiavelli states he wished 'either that no honour should be given it, or else that the truth of the matter and the weightiness of the theme shall make it acceptable,' indicating a preference for substance over style."}, {"text": "He adopted a highly academic and obscure style to demonstrate intellectual prowess.", "isCorrect": false, "rationale": "The emphasis on 'truth of the matter' and clarity suggests a desire for direct communication rather than an obscure academic style."}, {"text": "He chose a popular, accessible style to reach the broadest possible audience.", "isCorrect": false, "rationale": "While direct, the primary audience is a prince, and the context doesn't suggest an intent to reach the 'broadest possible audience' in a popular sense."}], "id": "q06"}, {"question": "Beyond merely accepting his book, what subtle plea or hope does Machiavelli express to Lorenzo at the conclusion of his dedicatory letter?", "options": [{"text": "That Lorenzo will publicly endorse The Prince to boost its sales.", "isCorrect": false, "rationale": "Machiavelli's plea is personal, focusing on his own suffering, not the commercial success of the book."}, {"text": "That Lorenzo will reward him with a substantial sum of money.", "isCorrect": false, "rationale": "While he sought rehabilitation, the specific plea is about his 'malignity of fortune,' implying a desire for restored status and a reversal of his suffering, not just money."}, {"text": "That Lorenzo will acknowledge his personal suffering and perhaps offer assistance or rehabilitation.", "isCorrect": true, "rationale": "Machiavelli asks Lorenzo to 'turn your eyes to these lower regions, you will see how unmeritedly I suffer a great and continued malignity of fortune,' which is a clear, if subtle, plea for intervention in his personal misfortune."}, {"text": "That Lorenzo will engage in a scholarly debate about the book's contents.", "isCorrect": false, "rationale": "His primary motivation at this point is his own fate and rehabilitation, not an academic debate with Lorenzo."}], "id": "q07"}, {"question": "How does Machiavelli's use of the term 'Fortune' in the dedication reflect his personal circumstances and the perceived value of his offering?", "options": [{"text": "It implies that his book's success depends entirely on random chance, not its content.", "isCorrect": false, "rationale": "Machiavelli clearly believes in the inherent value and truth of his book's content, regardless of 'Fortune's' influence on his life."}, {"text": "It suggests his present lack of material wealth is due to bad luck, enhancing the unique value of his intellectual gift.", "isCorrect": true, "rationale": "He hopes Lorenzo will 'consider that Fortune has not given him anything more valuable to offer' than his knowledge, and refers to his 'unmeritedly suffer[ing] a great and continued malignity of fortune,' directly linking his unfortunate circumstances to the intellectual value of his unique offering."}, {"text": "It serves as a humble disclaimer that the advice might not always be effective in practice.", "isCorrect": false, "rationale": "His comments about Fortune relate to his personal suffering and the value of his gift, not a disclaimer about the advice itself."}, {"text": "It criticizes Lorenzo for his dependence on luck rather than skill in governance.", "isCorrect": false, "rationale": "Machiavelli's tone is 'humble but not servile,' not critical of the powerful patron he is addressing."}], "id": "q08"}, {"question": "Machiavelli explicitly states that his gift is comprised of what specific type of knowledge?", "options": [{"text": "Theoretical philosophical debates and abstract political theories.", "isCorrect": false, "rationale": "He refers to 'knowledge of the actions of great men,' indicating practical and historical insights rather than purely abstract theory."}, {"text": "Detailed military strategies from current and past conflicts.", "isCorrect": false, "rationale": "While military strategy might be part of 'actions of great men,' the description is broader: 'knowledge of the actions of great men, acquired by long experience in contemporary affairs, and a continual study of antiquity.'"}, {"text": "Insights into the historical deeds of powerful figures, drawn from contemporary experience and ancient studies.", "isCorrect": true, "rationale": "He states his gift is 'the knowledge of the actions of great men, acquired by long experience in contemporary affairs, and a continual study of antiquity,' which this option accurately summarizes."}, {"text": "Secret intelligence gathered from his network of spies and informants.", "isCorrect": false, "rationale": "The text mentions 'long experience in contemporary affairs' but attributes his knowledge to his own rigorous analysis and study, not clandestine intelligence gathering."}], "id": "q09"}, {"question": "Considering Machiavelli's personal circumstances at the time, what is the most significant strategic objective of his dedicatory letter to Lorenzo de' Medici?", "options": [{"text": "To impress Lorenzo with his vast knowledge of classical literature and history.", "isCorrect": false, "rationale": "While demonstrating knowledge is part of it, it's a means to a larger, more personal end given his situation."}, {"text": "To secure a prestigious literary award or academic position.", "isCorrect": false, "rationale": "His core need was political rehabilitation and employment, not a literary award or academic post in the modern sense."}, {"text": "To regain political favor and employment by demonstrating his unique and valuable expertise to a potential patron.", "isCorrect": true, "rationale": "The text states he was 'without political influence, without employment, and without hope of official rehabilitation' and presents his gift 'to the man who holds his fate in his hands,' clearly indicating his primary strategic goal was to win back favor and employment."}, {"text": "To establish his reputation as a groundbreaking political theorist for future generations.", "isCorrect": false, "rationale": "While this became a long-term outcome, his immediate and personal strategic objective was to improve his dire circumstances, which is distinct from establishing a long-term theoretical reputation."}], "id": "q10"}, {"question": "In the dedicatory letter, Machiavelli says he has not 'embellished with swelling or magnificent words.' How does this stylistic choice reflect his broader intellectual project?", "options": [{"text": "It reflects his modesty as a writer who felt unequal to producing beautiful prose.", "isCorrect": false, "rationale": "Machiavelli was a skilled writer — La Mandragola is praised as a Renaissance comedy. His plain style is a deliberate philosophical stance, not a confession of literary inadequacy."}, {"text": "It is consistent with his insistence on effectual truth over appearance — the book should succeed through the weight of reality, not rhetorical decoration.", "isCorrect": true, "rationale": "His rejection of 'swelling words' and 'extrinsic allurements' mirrors his political argument: just as a ruler must deal with reality rather than appearances, so his text must persuade through truth and substance rather than rhetorical ornament."}, {"text": "It was required by the conventions of the dedicatory letter genre, which demanded simplicity.", "isCorrect": false, "rationale": "The text describes his choice as deliberate, not convention-driven — and contemporary dedicatory letters often did use elaborate praise and ornate language."}, {"text": "It signals that the book is a rough draft, not a polished final work.", "isCorrect": false, "rationale": "Machiavelli describes the work as having been 'reflected upon with great and prolonged diligence' — it is a finished, considered product, not a rough draft."}], "id": "q11"}, {"question": "Machiavelli defends himself against the charge that it is 'presumptuous' for a man of low condition to discuss the concerns of princes. What does his defense reveal about his theory of political knowledge?", "options": [{"text": "Political knowledge is hereditary — only those born into ruling families can truly understand governance.", "isCorrect": false, "rationale": "This is precisely the assumption Machiavelli is arguing against. His landscape analogy explicitly claims that an outsider's perspective is necessary for understanding princes."}, {"text": "Political knowledge is produced by positional perspective — the view from below gives access to understanding that those above cannot have.", "isCorrect": true, "rationale": "The landscape analogy argues that 'to understand that of princes it needs to be of the people' — meaning that being outside the circle of power gives Machiavelli a distinctive vantage point unavailable to rulers themselves."}, {"text": "Only those who have personally governed a city can offer valid political advice.", "isCorrect": false, "rationale": "Machiavelli himself served as a secretary, not a ruler — his argument is that the observer's position (being 'of the people') provides unique insight, not that only rulers can advise rulers."}, {"text": "The quality of political advice depends entirely on the rank and social standing of the advisor.", "isCorrect": false, "rationale": "Machiavelli explicitly refutes this by defending the right of someone of 'low and humble condition' to advise princes, grounding authority in perspective and experience, not social rank."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
