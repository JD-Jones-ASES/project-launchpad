<script>
var QUESTIONS = [{"question": "The shift in applying Machiavellian insights in the 20th century primarily involved moving from analyzing individual princes or domestic political elites to what new focus?", "options": [{"text": "The psychological motivations of national leaders in peacetime.", "isCorrect": false, "rationale": "While individual leaders' psychology might be considered in some analyses, the text clearly states the new focus was on 'the relations between nation-states in an anarchic international system,' not primarily on individual psychology."}, {"text": "The relations between nation-states in an anarchic international system.", "isCorrect": true, "rationale": "The text explicitly states that 20th-century political thinkers began applying Machiavellian insights 'to the relations between nation-states in an anarchic international system,' establishing international relations realism."}, {"text": "The internal political structures of authoritarian regimes.", "isCorrect": false, "rationale": "While totalitarianism was a factor shaping the 20th century, the primary shift for Machiavellian insights was towards international relations, not solely internal structures of specific regime types."}, {"text": "The role of international law in preventing conflict.", "isCorrect": false, "rationale": "Realism, which emerged from these insights, often critically views the effectiveness of international law alone, preferring to focus on power dynamics. This option contradicts the core realist perspective highlighted."}]}, {"question": "According to Hans Morgenthau, what is the fundamental drive in international politics and the 'basic concept of political realism'?", "options": [{"text": "The pursuit of global economic equality.", "isCorrect": false, "rationale": "Morgenthau's realism is centered on power and national interest, not global economic equality, which is often an idealist or liberal goal."}, {"text": "The enforcement of international humanitarian law.", "isCorrect": false, "rationale": "Morgenthau argued against prioritizing morality or international law over national interest and power, noting that states would pursue their interests regardless of such appeals."}, {"text": "The pursuit of power, defining national interest in terms of power.", "isCorrect": true, "rationale": "The text states that for Morgenthau, 'the fundamental drive in international politics is the pursuit of power' and that the 'national interest defined in terms of power' is the basic concept of political realism."}, {"text": "The promotion of democratic values worldwide.", "isCorrect": false, "rationale": "Realism, as described, subordinates ideological preferences, such as spreading democracy, to calculations of power and national interest."}]}, {"question": "Hans Morgenthau's framework was significantly shaped by the failure of which international body or approach in the 1930s?", "options": [{"text": "The Concert of Europe, which failed to prevent World War I.", "isCorrect": false, "rationale": "While the Concert of Europe predates Morgenthau's direct observation, the text specifically attributes his framework's shaping to the failures observed in the 1930s related to the League of Nations."}, {"text": "The United Nations Security Council's inability to prevent genocide.", "isCorrect": false, "rationale": "The United Nations was established after World War II, so its failures could not have shaped Morgenthau's views in the 1930s."}, {"text": "The League of Nations, which operated on idealist assumptions about state cooperation.", "isCorrect": true, "rationale": "The text explicitly states that Morgenthau's framework 'was shaped by watching idealist policies fail in the 1930s' and specifically mentions 'The League of Nations had been built on the assumption that states could be persuaded to resolve their differences through international institutions and moral appeal.'"}, {"text": "The Bretton Woods institutions' failure to prevent the Great Depression.", "isCorrect": false, "rationale": "The Bretton Woods institutions primarily deal with economic matters and were established in 1944, after the period mentioned as shaping Morgenthau's views."}]}, {"question": "Henry Kissinger's approach to foreign policy, as described in the text, emphasizes what principle for effective statecraft?", "options": [{"text": "Prioritizing the spread of democratic ideals and human rights globally.", "isCorrect": false, "rationale": "The text states Kissinger argued that allowing foreign policy to be 'governed by moral crusades—by the desire to spread democracy, defeat communism, or punish human rights violators—will exhaust itself in unwinnable conflicts and undermine its actual strategic interests.'"}, {"text": "Subordinating ideological preferences to calculations of power and national interest.", "isCorrect": true, "rationale": "The text highlights Kissinger's 'core argument: effective statecraft requires subordinating ideological preferences to calculations of power and national interest.'"}, {"text": "Building strong international alliances based on shared moral values.", "isCorrect": false, "rationale": "While alliances are part of statecraft, Kissinger's emphasis, as presented, is on power and national interest rather than shared moral values as the primary basis for foreign policy decisions."}, {"text": "Achieving ideological victory over rival political systems.", "isCorrect": false, "rationale": "Kissinger's analysis of the Cold War states the goal was 'not victory in any ideological sense but stability—a stable balance of power.'"}]}, {"question": "George Kennan's 'Long Telegram' and 'X Article' defined the containment strategy during the Cold War. How did his analysis of Soviet behavior align with the Machiavellian realist tradition?", "options": [{"text": "It advocated for a moral crusade against the Soviet Union's communist ideology.", "isCorrect": false, "rationale": "The text explicitly states that Kennan's analysis was 'based not on moral condemnation but on a structural assessment of Soviet interests, ideology, and vulnerabilities,' which is contrary to a moral crusade."}, {"text": "It sought to transform Soviet society through direct military confrontation.", "isCorrect": false, "rationale": "Kennan's policy recommendation was 'containment, not confrontation,' designed to manage reality rather than transform it through force."}, {"text": "It prioritized promoting democracy within the Soviet sphere of influence.", "isCorrect": false, "rationale": "While ultimately desirable for some, Kennan's immediate policy was containment based on a realist assessment, not direct promotion of democracy in the Soviet sphere through intervention."}, {"text": "It was based on a structural assessment of Soviet interests and vulnerabilities, not moral condemnation.", "isCorrect": true, "rationale": "The text states that Kennan's 'analysis of Soviet behavior was based not on moral condemnation but on a structural assessment of Soviet interests, ideology, and vulnerabilities,' directly reflecting a realist perspective."}]}, {"question": "Kenneth Waltz's structural realism (neorealism) argues that the behavior of states is primarily determined by what factor?", "options": [{"text": "The internal political culture and ideology of each state.", "isCorrect": false, "rationale": "Waltz explicitly argued that state behavior is determined 'not by their internal character or ideology but by the structure of the international system.'"}, {"text": "The economic interdependence between states.", "isCorrect": false, "rationale": "While economic factors are relevant in international relations, Waltz's structural realism emphasizes the anarchic nature of the international system as the primary determinant, not interdependence."}, {"text": "The structure of the international system, specifically the absence of a world government.", "isCorrect": true, "rationale": "The text states Waltz argued state behavior is determined 'by the structure of the international system—specifically, by the fact that there is no world government to enforce agreements between states.'"}, {"text": "The ethical commitments and diplomatic skills of national leaders.", "isCorrect": false, "rationale": "Structural realism focuses on systemic factors over individual leaders' qualities, arguing that the system compels certain behaviors regardless of intentions."}]}, {"question": "John Mearsheimer's 'offensive realism' posits that states have a structural incentive to maximize their power relative to rivals. What is the fundamental reason Mearsheimer gives for this behavior?", "options": [{"text": "States are inherently aggressive and seek global domination.", "isCorrect": false, "rationale": "Mearsheimer argues states maximize power 'not because states are inherently aggressive' but due to structural incentives."}, {"text": "The desire to spread their unique political ideology worldwide.", "isCorrect": false, "rationale": "Offensive realism, like other realist theories, subordinates ideology to the pursuit of power and security, which is the core driver."}, {"text": "The absence of any authority that can guarantee their security makes maximal power the only reliable guarantee of survival.", "isCorrect": true, "rationale": "The text explains Mearsheimer's argument: 'because the absence of any authority that can guarantee their security makes maximal power the only reliable guarantee of survival.'"}, {"text": "The moral obligation to protect their citizens from all external threats.", "isCorrect": false, "rationale": "While states aim to protect citizens, Mearsheimer frames this as a consequence of the anarchic structure requiring power maximization, not primarily a moral obligation in the idealist sense."}]}, {"question": "Which contemporary international issue best illustrates the tension between realist and idealist perspectives, as described in the text?", "options": [{"text": "The establishment of new international trade agreements.", "isCorrect": false, "rationale": "While trade agreements involve state interests, they are not presented in the text as a primary illustration of the realist-idealist tension in the same way as military intervention for moral reasons."}, {"text": "The debate over humanitarian intervention and the 'responsibility to protect.'", "isCorrect": true, "rationale": "The text explicitly states: 'The debate over whether powerful states have an obligation to intervene militarily to stop atrocities in other countries is, in part, a debate between realists and idealists.'"}, {"text": "The global effort to combat climate change.", "isCorrect": false, "rationale": "Climate change is mentioned in the 'thinkdeeper' section as a contemporary challenge, but the text does not detail it as a central example of realist vs. idealist debate regarding state action."}, {"text": "The development of international space law.", "isCorrect": false, "rationale": "International space law is not mentioned in the text as an area illustrating the core realist-idealist tension discussed."}]}, {"question": "The text describes 'hybrid warfare and information operations' as modern forms of great-power competition. These tactics are characterized as 'tools of the fox rather than the lion.' This description aligns with Machiavellian logic by emphasizing which aspect?", "options": [{"text": "The necessity for states to display overwhelming military might at all times.", "isCorrect": false, "rationale": "The 'lion' represents open force, while the 'fox' represents cunning. Hybrid warfare, described as 'tools of the fox,' emphasizes cunning, not just overwhelming military might ('lion')."}, {"text": "The importance of moral leadership and transparency in international relations.", "isCorrect": false, "rationale": "Machiavellian logic often involves deception and manipulation ('cunning'), which contradicts moral leadership and transparency."}, {"text": "The use of cunning, deception, and indirect methods alongside or instead of open force.", "isCorrect": true, "rationale": "The text explicitly states these are 'tools of the fox rather than the lion—cunning rather than open force,' aligning perfectly with Machiavelli's analogy for effective statecraft."}, {"text": "The preference for international cooperation over unilateral action.", "isCorrect": false, "rationale": "Hybrid warfare and information operations are typically competitive, state-centric actions, often undertaken unilaterally or through proxies, rather than prioritizing broad international cooperation."}]}, {"question": "What is the 'Enduring Question' that Machiavelli's work continues to pose to political thinkers, which remains deeply controversial and largely unresolved?", "options": [{"text": "How can democratic states best promote human rights globally without compromising sovereignty?", "isCorrect": false, "rationale": "While relevant, this question is specific to democratic states and human rights, whereas Machiavelli's question is broader, concerning the fundamental relationship between morality and political power, regardless of regime type."}, {"text": "Is Machiavelli right that the demands of political life are irreducibly different from the demands of personal morality, or can they be reconciled?", "isCorrect": true, "rationale": "The text directly states: 'Machiavelli's central question—how should we think about the relationship between morality and political power?—has never been answered to general satisfaction. ...Every generation of political thinkers has had to decide: is Machiavelli right that the demands of political life are irreducibly different from the demands of personal morality? Or is there a way to reconcile effective political leadership with the requirements of justice and virtue?'"}, {"text": "What is the optimal balance between military spending and social welfare programs for a state's long-term stability?", "isCorrect": false, "rationale": "This question relates to domestic policy choices, not the core philosophical dilemma of morality and political power that Machiavelli famously addressed."}, {"text": "Can international institutions effectively prevent all forms of interstate conflict in an anarchic system?", "isCorrect": false, "rationale": "This is a question frequently asked by realists and idealists in international relations, but it is a derivative of Machiavelli's broader concern about power and morality, not his central, enduring question itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
