        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Machiavelli.html">&larr; Back to Powers and Principalities (Machiavelli)</a>
    </div>

        <div class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 20, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Machiavelli, what are the two \"truly fatal errors\" a prince can commit?", "options": [{"text": "Being loved and being feared.", "isCorrect": false, "rationale": "Being loved and feared are desired states, not errors. Machiavelli discusses how to manage these, but they are not the 'fatal errors'."}, {"text": "Being hated and being despised.", "isCorrect": true, "rationale": "The text explicitly states: 'The first is to be hated; the second is to be despised.' These are the two truly fatal errors."}, {"text": "Being cruel and being irresolute.", "isCorrect": false, "rationale": "Cruelty and irresoluteness are causes or characteristics that lead to hatred and contempt, but they are not the fatal errors themselves."}, {"text": "Seizing property and interfering with women.", "isCorrect": false, "rationale": "These are the primary sources of *hatred*, one of the two fatal errors, but not the complete set of both fatal errors."}], "id": "q01"}, {"question": "Machiavelli argues that active fury (hatred) in subjects primarily arises from which two sources?", "options": [{"text": "Appearing effeminate and retreating from opposition.", "isCorrect": false, "rationale": "These characteristics are identified by Machiavelli as leading to *contempt*, not primarily hatred."}, {"text": "Seizing their property and interfering with their women.", "isCorrect": true, "rationale": "The text clearly states: 'Hatred, Machiavelli argues, arises primarily from two sources: seizing the property of subjects and interfering with their women.'"}, {"text": "Being indecisive and failing to enforce decrees.", "isCorrect": false, "rationale": "These are qualities that lead to *contempt*, as they signify weakness or irresolution."}, {"text": "Being consistently harsh and severe in general governance.", "isCorrect": false, "rationale": "While harshness can contribute to hatred, the text specifies that a prince can be harsh or severe in other respects and still avoid hatred if he avoids the two primary violations mentioned."}], "id": "q02"}, {"question": "Which princely characteristic is *most likely* to lead to contempt from subjects, according to Machiavelli?", "options": [{"text": "Enforcing decrees with excessive severity.", "isCorrect": false, "rationale": "Excessive severity can lead to *hatred*, particularly if it involves seizing property or interfering with women, but it is not the direct cause of contempt."}, {"text": "Seizing property to fund state initiatives.", "isCorrect": false, "rationale": "This action is explicitly stated as a primary cause of *hatred*."}, {"text": "Being irresolute, cowardly, or weak.", "isCorrect": true, "rationale": "The text defines contempt as arising 'when subjects... conclude that the prince is irresolute, effeminate, cowardly, or weak.'"}, {"text": "Treating the Senate with disrespect.", "isCorrect": false, "rationale": "While disrespecting the Senate could contribute to a perception of weakness or lack of dignity, the core characteristics Machiavelli lists for contempt are irresolution, cowardice, and general weakness."}], "id": "q03"}, {"question": "Machiavelli highlights a significant tension between avoiding hatred and avoiding contempt. What is this tension?", "options": [{"text": "A prince must always choose between being loved or being feared.", "isCorrect": false, "rationale": "While related to princely power, this is a separate Machiavellian concept and not the specific tension described between avoiding hatred and contempt."}, {"text": "The actions needed to avoid contempt (firmness, severity) can cause hatred, while those to avoid hatred (restraint) can be seen as weakness, inviting contempt.", "isCorrect": true, "rationale": "The text explicitly states: 'the measures necessary to prevent contempt (decisive action, firmness, severity) can, if overdone, create hatred. And the measures necessary to prevent hatred (restraint, respecting property and persons) can, if misread as weakness, invite contempt.'"}, {"text": "A prince must either rule by force or by cunning, but never both.", "isCorrect": false, "rationale": "This describes the 'fox-and-lion' method which Machiavelli praises Severus for employing, demonstrating that a prince *can* and *should* use both, not avoid one for the other."}, {"text": "It is impossible for a prince to be both respected by the Senate and loyal to the army.", "isCorrect": false, "rationale": "This is a specific challenge faced by some Roman emperors, but not the universal tension Machiavelli describes between hatred and contempt."}], "id": "q04"}, {"question": "Why does Machiavelli extensively analyze the Roman Emperors in this section?", "options": [{"text": "To prove that only emperors of noble birth can succeed.", "isCorrect": false, "rationale": "This is incorrect. Maximinus, of humble birth, failed, but Severus, from an equestrian family, succeeded, demonstrating that birth alone doesn't guarantee success or failure."}, {"text": "To provide historical evidence for the best forms of legitimate succession.", "isCorrect": false, "rationale": "While Marcus Aurelius's legitimate succession is noted, Severus's military coup also led to success, showing that legitimate succession isn't the sole focus or 'best form' in Machiavelli's view here."}, {"text": "To offer a 'political laboratory' demonstrating what political strategies worked and failed over five centuries.", "isCorrect": true, "rationale": "The text states: 'The Roman Empire was, for Renaissance thinkers, the greatest political laboratory in history—a five-century record of what worked and what did not.' Machiavelli uses these cases to illustrate his principles in practice."}, {"text": "To suggest that cruelty is always necessary for a prince to maintain power.", "isCorrect": false, "rationale": "This is incorrect. Marcus Aurelius succeeded without cruelty, demonstrating it is not always necessary, depending on circumstances."}], "id": "q05"}, {"question": "According to Machiavelli, Marcus Aurelius succeeded as an emperor primarily because of what unique combination?", "options": [{"text": "His unparalleled military genius and ruthless suppression of all rivals.", "isCorrect": false, "rationale": "This describes Septimius Severus's methods, not Marcus Aurelius's."}, {"text": "His cunning use of deception against enemies and generous rewards for his soldiers.", "isCorrect": false, "rationale": "These are characteristics attributed to Septimius Severus, not Marcus Aurelius."}, {"text": "His legitimate succession, virtuous character, and favorable circumstances that allowed him to be both loved and respected without resorting to cruelty.", "isCorrect": true, "rationale": "The text states Marcus 'came to power legitimately,' 'governed with philosophical restraint,' 'never needed to use cruelty because he came to power legitimately and was both loved and respected,' and 'his circumstances permitted this.'"}, {"text": "His ability to appear as a gladiator in the arena, endearing him to the common people.", "isCorrect": false, "rationale": "This behavior was characteristic of Commodus and led to *contempt* from the aristocracy, not success for Marcus Aurelius."}], "id": "q06"}, {"question": "Septimius Severus, despite not being 'virtuous in any traditional sense,' succeeded by employing which key strategies?", "options": [{"text": "Relying solely on popular support and treating the Senate with utmost courtesy.", "isCorrect": false, "rationale": "This describes aspects of Marcus Aurelius's reign, not Severus's, who shifted power from the Senate to the legions."}, {"text": "Governing with philosophical restraint and defending frontiers without needing cruelty.", "isCorrect": false, "rationale": "This describes Marcus Aurelius's approach. Severus was ruthless and calculating."}, {"text": "Superior military skill, ruthless political cunning, and maintaining loyalty through consistent victory and material rewards for his soldiers, ensuring he was feared but not despised.", "isCorrect": true, "rationale": "The text notes Severus 'seized power... defeating rival claimants through superior military skill and ruthless political cunning,' and 'kept their loyalty through consistent victory and material rewards,' while 'he was never despised, because he was clearly capable and decisive.'"}, {"text": "Debasing himself before soldiers to gain their affection and ignoring the Senate.", "isCorrect": false, "rationale": "While Severus shifted power away from the Senate, he maintained military loyalty through fear, victory, and rewards, not by debasing himself. Marcus Aurelius is noted for *not* debasing himself before soldiers."}], "id": "q07"}, {"question": "The contrasting paths to success of Marcus Aurelius (legitimate, virtuous) and Septimius Severus (coup, ruthless) primarily illustrate what Machiavellian principle?", "options": [{"text": "Only legitimate rulers can achieve lasting success.", "isCorrect": false, "rationale": "Severus was not a legitimate ruler in the traditional sense, having seized power through a coup, yet he succeeded, contradicting this statement."}, {"text": "A prince must always prioritize being loved over being feared.", "isCorrect": false, "rationale": "Severus was feared by his soldiers, but not despised, and succeeded. Machiavelli teaches the importance of balancing or choosing depending on circumstances, not always prioritizing love."}, {"text": "Success depends not just on a prince's character, but also on their circumstances and the ability to adapt their methods (e.g., virtù and prudence).", "isCorrect": true, "rationale": "Machiavelli emphasizes that Marcus's circumstances 'permitted this' virtuous reign, while Severus 'faced a far more dangerous situation—and succeeded anyway' through different means. This highlights the adaptability required by 'virtù and prudence' given varying circumstances."}, {"text": "It is impossible to succeed if one must seize power through military force.", "isCorrect": false, "rationale": "Severus explicitly seized power through military force and succeeded, directly refuting this claim."}], "id": "q08"}, {"question": "What common pattern of failure emerges from Machiavelli's analysis of emperors like Commodus, Caracalla, and Maximinus?", "options": [{"text": "All failed due to a lack of military support from their legions.", "isCorrect": false, "rationale": "While some faced mutiny, Caracalla was 'brilliant in battle,' and the text attributes his failure to careless cruelty, not lack of military support per se."}, {"text": "They failed because they were all of humble birth and lacked the respect of the aristocracy.", "isCorrect": false, "rationale": "This applies to Maximinus, but Commodus was Marcus Aurelius's son (imperial aristocracy), and Caracalla was Severus's son. Their failures stemmed from other issues."}, {"text": "They were either actively hated due to cruelty and violation of subjects' rights, or fatally despised due to perceived weakness, indecisiveness, or loss of dignity.", "isCorrect": true, "rationale": "The text concludes: 'the emperors who lost power either aroused active hatred through greed and violation, or invited fatal contempt through weakness and loss of dignity.'"}, {"text": "Their downfall was solely due to external shocks and invasions, rather than internal misgovernance.", "isCorrect": false, "rationale": "The text details their specific personal and governance failures (cruelty, eccentric behavior, loss of dignity) as the causes of their downfall, not solely external factors."}], "id": "q09"}, {"question": "Machiavelli's 'Universal Rule' states a prince must 'never be hated, never be despised.' If a prince consistently avoids seizing property and interfering with women (thus preventing hatred), but is seen by subjects and foreign powers as indecisive, effeminate, and cowardly, what is the most likely outcome based on Machiavelli's principles?", "options": [{"text": "The prince will be universally loved and respected, securing his reign.", "isCorrect": false, "rationale": "Being seen as indecisive and cowardly leads to contempt, not love and respect. Respect is crucial for security."}, {"text": "The prince will be safe from internal conspiracies but vulnerable to external invasion.", "isCorrect": false, "rationale": "The text states that a prince who invites contempt 'invites conspiracies' and is 'vulnerable to every faction and ambitious noble in his state,' meaning he is not safe from internal threats."}, {"text": "The prince will likely invite fatal contempt, making him vulnerable to conspiracies and internal factions, even if not actively hated.", "isCorrect": true, "rationale": "The description perfectly matches the causes and consequences of contempt: 'No one fears a weak prince, and a prince who is not feared is vulnerable to every faction and ambitious noble in his state.'"}, {"text": "The prince's subjects will remain passively resentful but will not take active measures against him.", "isCorrect": false, "rationale": "While avoiding hatred prevents *active fury* born of resentment, contempt itself leads to active threats like conspiracies because 'no one fears a weak prince'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
