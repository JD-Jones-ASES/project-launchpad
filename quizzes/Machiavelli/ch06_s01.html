<script>
var QUESTIONS = [{"question": "According to Machiavelli in Chapter V of The Prince, what are the three courses a conqueror can take to hold states that have been accustomed to living under their own laws and in freedom?", "options": [{"text": "Granting them full autonomy, establishing trade agreements, and offering military protection.", "isCorrect": false, "rationale": "This option is contrary to Machiavelli's advice, as he emphasizes control and suppression rather than benevolence or full autonomy for free cities, which he views as inherently prone to rebellion."}, {"text": "Destroying them, residing there in person, or establishing a friendly oligarchy while drawing tribute.", "isCorrect": true, "rationale": "The text explicitly lists these three courses: 'the first is to ruin them, the next is to reside there in person, the third is to permit them to live under their own laws, drawing a tribute, and establishing within it an oligarchy which will keep it friendly to you.'"}, {"text": "Imposing a new prince, integrating them into the existing empire, or disarming their populace.", "isCorrect": false, "rationale": "While disarming the populace might be a tactic, imposing a new prince or integrating them are not listed as the three primary methods for free cities. Machiavelli's focus is on dealing with their inherent desire for liberty."}, {"text": "Educating the populace in new customs, intermarrying with local nobility, and building new infrastructure.", "isCorrect": false, "rationale": "These are more long-term assimilation strategies that Machiavelli does not mention as the immediate 'courses' for holding conquered free cities. He focuses on more direct and often ruthless methods."}], "id": "q01"}, {"question": "Machiavelli cites the Spartans' failure to hold Athens and Thebes, despite establishing oligarchies. What does this example primarily illustrate about his recommended courses of action?", "options": [{"text": "That establishing an oligarchy is the most effective long-term strategy.", "isCorrect": false, "rationale": "The example shows the opposite; the Spartans failed despite establishing oligarchies, indicating this method's unreliability compared to destruction."}, {"text": "That Spartan military discipline was insufficient for governance.", "isCorrect": false, "rationale": "While Spartan governance might have had issues, Machiavelli's point is specifically about the difficulty of governing free cities, not a general critique of Spartan military or governance style."}, {"text": "That permitting a free city to live under its own laws, even with a friendly oligarchy, is a less reliable method than destruction.", "isCorrect": true, "rationale": "The text states, 'The Spartans held Athens and Thebes, establishing there an oligarchy: nevertheless they lost them.' This directly supports Machiavelli's argument that destroying free cities is the only 'safe way.'"}, {"text": "That free cities can be easily controlled if their economies are integrated.", "isCorrect": false, "rationale": "The text does not discuss economic integration as a primary factor in the Spartan example, focusing instead on the political arrangement and the inherent desire for liberty."}], "id": "q02"}, {"question": "A newly conquered city has a deep-rooted history of self-governance and fiercely values its independence. Based on Machiavelli's reasoning, what is the primary reason this city poses a greater long-term threat to the conqueror compared to a city accustomed to princely rule?", "options": [{"text": "Free cities typically have larger and more organized armies.", "isCorrect": false, "rationale": "Machiavelli does not focus on the military strength of free cities, but rather their psychological and political resistance."}, {"text": "Their citizens are more prone to forget past grievances and accept new rulers.", "isCorrect": false, "rationale": "This is contrary to Machiavelli's argument, as he states they 'never forget that name or their privileges.'"}, {"text": "The memory of liberty and ancient privileges serves as an enduring rallying point for rebellion.", "isCorrect": true, "rationale": "The text explicitly states: 'in rebellion it has always the watchword of liberty and its ancient privileges as a rallying point, which neither time nor benefits will ever cause it to forget.'"}, {"text": "They are less economically productive under foreign rule.", "isCorrect": false, "rationale": "Economic productivity is not the core reason Machiavelli identifies for the threat posed by free cities; it's their political will and memory of liberty."}], "id": "q03"}, {"question": "Consider a scenario where a prince decides not to destroy a newly conquered free city. Which two of Machiavelli's suggested alternatives would he still consider the 'safest' among the non-destruction options?", "options": [{"text": "Integrating their military into his own and imposing heavy taxes.", "isCorrect": false, "rationale": "While these might be actions a prince takes, they are not the specific, overarching 'courses' Machiavelli identifies as alternatives to destruction."}, {"text": "Residing there in person or establishing an oligarchy that depends on his friendship.", "isCorrect": true, "rationale": "The text states the three courses: 'the first is to ruin them, the next is to reside there in person, the third is to permit them to live under their own laws, drawing a tribute, and establishing within it an oligarchy.' These are the direct alternatives to ruin."}, {"text": "Allowing them full autonomy while requiring a symbolic tribute.", "isCorrect": false, "rationale": "Machiavelli emphasizes establishing an oligarchy created by the prince to ensure loyalty, not full autonomy, which would be too risky."}, {"text": "Promoting cultural assimilation and suppressing local traditions.", "isCorrect": false, "rationale": "These are indirect methods that Machiavelli does not highlight as the main 'courses' for dealing with the immediate challenge of governing free cities."}], "id": "q04"}, {"question": "Machiavelli observes that cities accustomed to living under a prince 'do not know how to govern themselves' once the prince's family is exterminated. What is the most significant implication of this observation for a conquering prince?", "options": [{"text": "Such cities will immediately seek out a new, strong leader from within their own ranks.", "isCorrect": false, "rationale": "The text states they 'cannot agree in making one from amongst themselves,' contradicting this option."}, {"text": "They are less likely to rebel and easier for a new prince to secure due to their lack of self-governing capacity.", "isCorrect": true, "rationale": "Machiavelli explains that 'For this reason they are very slow to take up arms, and a prince can gain them to himself and secure them much more easily.'"}, {"text": "They possess a strong desire for vengeance against the new ruler.", "isCorrect": false, "rationale": "This describes free cities/republics, not cities accustomed to princely rule, which are described as 'slow to take up arms.'"}, {"text": "They will quickly adopt the customs and laws of the conqueror.", "isCorrect": false, "rationale": "While a prince might impose customs, the text focuses on their lack of governing ability and slowness to rebel, not their immediate cultural adaptation."}], "id": "q05"}, {"question": "The example of Pisa, held by the Florentines for a hundred years, is used by Machiavelli to illustrate what fundamental characteristic of free cities?", "options": [{"text": "Their strong economic resilience.", "isCorrect": false, "rationale": "The text does not mention Pisa's economic resilience in this context."}, {"text": "Their capacity for quick assimilation under benevolent rule.", "isCorrect": false, "rationale": "The example demonstrates the opposite; Pisa rebelled despite a century of subjugation, showing a lack of assimilation."}, {"text": "Their enduring memory of liberty and willingness to rebel at any opportunity.", "isCorrect": true, "rationale": "Machiavelli states that free cities 'never forget that name or their privileges unless they are disunited or dispersed, but at every chance they immediately rally to them, as Pisa after the hundred years she had been held in bondage by the Florentines.'"}, {"text": "The effectiveness of long-term occupation in quelling dissent.", "isCorrect": false, "rationale": "Pisa's rebellion after a hundred years demonstrates the ineffectiveness of mere occupation in quelling their desire for liberty."}], "id": "q06"}, {"question": "Which of the following best summarizes Machiavelli's uncompromising argument regarding conquered free cities?", "options": [{"text": "They are best governed through democratic means to win their loyalty.", "isCorrect": false, "rationale": "Machiavelli's advice is far from democratic; it's about control and security, often through severe means."}, {"text": "Their inherent desire for liberty makes them almost impossible to govern reliably, with destruction being the most secure solution.", "isCorrect": true, "rationale": "The introductory paragraph states, 'Machiavelli states plainly... that a city accustomed to freedom is almost impossible to govern, and the only truly reliable solution is to destroy it.' The rest of the section elaborates on this difficulty and the preference for ruin."}, {"text": "Establishing strong diplomatic ties and economic benefits is key to their pacification.", "isCorrect": false, "rationale": "While benefits might be offered, Machiavelli states 'neither time nor benefits will ever cause it to forget' its liberty, undermining this approach as a primary solution."}, {"text": "They should be granted extensive self-rule to prevent rebellion.", "isCorrect": false, "rationale": "Granting extensive self-rule would be counter to Machiavelli's emphasis on maintaining control and preventing the 'watchword of liberty' from rallying rebellion."}], "id": "q07"}, {"question": "According to Machiavelli, why might establishing an oligarchy in a conquered free city be initially attractive but ultimately precarious?", "options": [{"text": "The oligarchy quickly gains too much power and challenges the prince.", "isCorrect": false, "rationale": "Machiavelli states the oligarchy 'knows that it cannot stand without his friendship and interest, and does its utmost to support him,' suggesting loyalty, not a challenge."}, {"text": "The oligarchs are easily corrupted and cease to be effective rulers.", "isCorrect": false, "rationale": "The text focuses on the populace's resistance, not the corruption of the oligarchs, as the primary risk."}, {"text": "While the oligarchy may be loyal, the general populace will never forget its liberty, leading to eventual rebellion.", "isCorrect": true, "rationale": "The text notes the oligarchy 'will keep it friendly to you' but then contrasts this with the Romans being 'compelled to dismantle many cities' even after trying methods like the Spartans, implying the populace's memory of liberty makes oligarchy insufficient."}, {"text": "Oligarchies tend to disunite the citizens, making governance impossible.", "isCorrect": false, "rationale": "Disunity might actually serve the prince, but Machiavelli's point is the enduring memory of liberty in the populace as a whole, not issues with the oligarchic structure itself."}], "id": "q08"}, {"question": "The Roman strategy with Capua, Carthage, and Numantia stands in contrast to their initial attempt in Greece. What principle does this contrast highlight?", "options": [{"text": "The importance of cultural understanding in governance.", "isCorrect": false, "rationale": "The text does not discuss cultural understanding as the differentiating factor between the Roman approaches."}, {"text": "The superior military might of the Roman Empire.", "isCorrect": false, "rationale": "While the Romans were militarily strong, Machiavelli's point is about their strategy for holding free cities, not just their military power."}, {"text": "That total destruction is the only truly safe way to hold free cities, a lesson the Romans learned through experience.", "isCorrect": true, "rationale": "The text states the Romans 'dismantled them [Capua, Carthage, Numantia], and did not lose them.' Then, 'They wished to hold Greece as the Spartans held it... and did not succeed. So to hold it they were compelled to dismantle many cities... for in truth there is no safe way to retain them otherwise than by ruining them.'"}, {"text": "The effectiveness of allowing conquered cities to retain their laws under a tribute system.", "isCorrect": false, "rationale": "The Roman failure in Greece using a similar method shows this approach was not effective for free cities, leading them to resort to destruction."}], "id": "q09"}, {"question": "Machiavelli states that republics have 'more vitality, greater hatred, and more desire for vengeance.' How does this characteristic influence his advice on governing them?", "options": [{"text": "It suggests that they are excellent candidates for integration and peaceful assimilation.", "isCorrect": false, "rationale": "These characteristics make peaceful assimilation very difficult, if not impossible, according to Machiavelli."}, {"text": "It makes them ideal for establishing a loyal, dependent oligarchy.", "isCorrect": false, "rationale": "The 'greater hatred' and 'desire for vengeance' of the populace would likely undermine even a loyal oligarchy, as seen with the Spartans."}, {"text": "It reinforces the idea that the safest ways to hold them are destruction or personal residence, due to their inherent resistance.", "isCorrect": true, "rationale": "The text concludes, 'so that the safest way is to destroy them or to reside there,' directly after describing their 'vitality, greater hatred, and more desire for vengeance.'"}, {"text": "It means they will quickly embrace a new princely ruler if given sufficient incentives.", "isCorrect": false, "rationale": "Machiavelli explicitly states their memory of liberty and desire for vengeance will 'never permit them to allow the memory of their former liberty to rest,' making quick acceptance highly unlikely."}], "id": "q10"}, {"question": "Machiavelli says a free city that is 'disunited or dispersed' loses the memory of its privileges. What is the strategic implication of this qualification?", "options": [{"text": "That a conqueror should encourage division among the city's factions to prevent organized resistance.", "isCorrect": true, "rationale": "If disunity or dispersal are the only conditions under which a free city forgets its privileges, then deliberately fostering division among its citizens — or physically scattering its population — is the mechanism by which a conqueror might avoid the need for outright destruction while still neutralizing the city's rebellious potential."}, {"text": "That a free city will forget its privileges naturally as the generations pass.", "isCorrect": false, "rationale": "The hundred-year example of Pisa directly contradicts this — time alone does not cause forgetting. Only disunity or dispersal achieves that effect, and they require active intervention."}, {"text": "That the conqueror should allow the city's factions to resolve their disputes independently.", "isCorrect": false, "rationale": "Allowing disputes to resolve on their own is passive and could lead to the city resolving its disunity and rallying around liberty once more. The strategic point is active intervention to maintain division."}, {"text": "That a dispersed population automatically transfers loyalty to the conqueror.", "isCorrect": false, "rationale": "Dispersal neutralizes organized resistance by preventing the population from acting collectively, but it does not automatically create positive loyalty to the conqueror."}], "id": "q11"}, {"question": "Machiavelli contrasts republics and cities accustomed to princely rule by focusing on what the population 'will never permit' itself to forget. What does this psychological observation reveal about his theory of political memory?", "options": [{"text": "That political memory is shaped entirely by recent events and fades quickly.", "isCorrect": false, "rationale": "Machiavelli argues the opposite — the memory of liberty is extraordinarily durable ('neither time nor benefits will ever cause it to forget'), which is precisely what makes free cities so dangerous."}, {"text": "That political memory is a form of collective identity that functions as a permanent resource for resistance, regardless of material conditions.", "isCorrect": true, "rationale": "By saying 'neither time nor benefits will ever cause it to forget,' Machiavelli is identifying memory of liberty as something deeper than calculation — it persists even when the material advantages of submission are clear. This makes it a permanent structural threat that benefits and time cannot dissolve."}, {"text": "That political memory only matters in wealthy, well-educated populations.", "isCorrect": false, "rationale": "Machiavelli makes no distinction based on wealth or education level. The memory of liberty applies to the city's population broadly, not just its intellectual or economic elite."}, {"text": "That political memory can be gradually replaced by planting new cultural traditions and customs.", "isCorrect": false, "rationale": "While Machiavelli acknowledges dispersal might work, he says 'benefits' (which could include cultural programs) will not cause them to forget. The memory is more deeply embedded than any replacement strategy can address."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
