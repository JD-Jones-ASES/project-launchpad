    };

<body>

        <div class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 1, Section 2</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement best describes the political landscape of Renaissance Italy prior to 1494?", "options": [{"text": "It was a unified nation under a single monarch, maintaining strong alliances with its neighbors.", "isCorrect": false, "rationale": "The text explicitly states, 'Renaissance Italy was not a nation. It was a collection of rival city-states and regional powers.'"}, {"text": "It was a collection of independent city-states and regional powers that had achieved a rough balance of power through diplomacy.", "isCorrect": true, "rationale": "The text describes Italy as a 'collection of rival city-states and regional powers' where 'a rough balance' was maintained through diplomacy, citing the Peace of Lodi and Lorenzo the Magnificent."}, {"text": "It was dominated by the Holy Roman Empire, which ensured peace and stability across the peninsula.", "isCorrect": false, "rationale": "The text states the Holy Roman Empire was one of the 'major European powers' that fought over control of Italy *after* 1494, not a dominant unifying force before then."}, {"text": "It was primarily controlled by the Papal States, which exercised both spiritual and temporal authority over all other regions.", "isCorrect": false, "rationale": "The Papal States were one among several 'rival city-states and regional powers,' not the sole dominant power over all of Italy."}]}, {"question": "What significant event in 1494 fundamentally shattered the existing political balance in Italy?", "options": [{"text": "The signing of the Peace of Lodi, which created new rivalries among city-states.", "isCorrect": false, "rationale": "The Peace of Lodi (1454) is described as having 'stabilized relations among the major Italian powers,' not shattered them."}, {"text": "An invasion by King Charles VIII of France, initiating the prolonged Italian Wars.", "isCorrect": true, "rationale": "The text explicitly states, 'That balance shattered in 1494 when King Charles VIII of France invaded Italy... The Italian Wars that followed lasted for sixty-five years.'"}, {"text": "A widespread peasant revolt that destabilized the governments of several key city-states.", "isCorrect": false, "rationale": "The text does not mention any widespread peasant revolts as the cause of the shattering balance, but rather a foreign invasion."}, {"text": "The internal collapse of the Florentine Republic due to corruption and mismanagement.", "isCorrect": false, "rationale": "Florence was impacted by the wars, but its internal collapse was not the primary event that shattered the broader Italian balance in 1494."}]}, {"question": "Machiavelli's central intellectual problem, stemming from the Italian Wars, concerned which of the following?", "options": [{"text": "How to unify Italy into a single nation to resist foreign powers.", "isCorrect": false, "rationale": "While related, his core question was 'Why had Italy failed?' and 'Why had her rulers... proven so helpless?' implying a deeper issue than just the mechanics of unification."}, {"text": "The failure of Italian rulers, despite their education, to effectively navigate political realities and prevent catastrophe.", "isCorrect": true, "rationale": "The text states, 'For Machiavelli, this was not just a political crisis but an intellectual problem demanding analysis. Why had Italy failed? Why had her rulers—supposedly educated men, some of them patrons of Renaissance humanism—proven so helpless?' This directly addresses the failure of rulers in the face of political reality."}, {"text": "The moral decay of the Catholic Church and its impact on secular governance.", "isCorrect": false, "rationale": "While the Papal States were involved, Machiavelli's primary intellectual problem, as presented, was not about the moral decay of the Church but the ineffectiveness of rulers adhering to traditional advice."}, {"text": "The superiority of mercenary armies over citizen militias in defending city-states.", "isCorrect": false, "rationale": "The text mentions mercenary armies but doesn't frame their superiority as Machiavelli's central intellectual problem; rather, it highlights their use by city-states that ultimately failed."}]}, {"question": "The 'mirror for princes' tradition, which Machiavelli reacted against, primarily advised rulers to:", "options": [{"text": "Prioritize national interests above all else, even if it meant breaking treaties.", "isCorrect": false, "rationale": "This aligns more with Machiavellian realism than the mirror for princes, which focused on virtue."}, {"text": "Cultivate moral virtues like justice, piety, and generosity as the foundation for good governance.", "isCorrect": true, "rationale": "The text states the 'mirror for princes' tradition offered 'rulers advice on how to govern virtuously' and 'typically counseled rulers to be just, pious, merciful, and generous—to cultivate the classical and Christian virtues.'"}, {"text": "Delegate most responsibilities to trusted advisors and focus on ceremonial duties.", "isCorrect": false, "rationale": "The tradition focused on the ruler's personal character and actions, not primarily on delegation."}, {"text": "Engage in proactive military expansion to secure their state's borders.", "isCorrect": false, "rationale": "While military strength might be part of governance, the core focus of 'mirror for princes' was moral virtue, not aggressive expansion."}]}, {"question": "Which two intellectual traditions were the primary sources for the 'mirror for princes' genre?", "options": [{"text": "Platonist philosophy and Epicurean ethics.", "isCorrect": false, "rationale": "The text identifies Aristotle and Christian theology, not Platonism or Epicureanism, as the primary sources."}, {"text": "Aristotle's *Politics* and the Christian tradition of political theology.", "isCorrect": true, "rationale": "The text explicitly states this tradition 'drew on two major intellectual sources. First, Aristotle's Politics... Second, the Christian tradition of political theology.'"}, {"text": "Roman republicanism and early medieval feudal law.", "isCorrect": false, "rationale": "While Machiavelli studied Roman history, these were not the primary sources for the *mirror for princes* tradition itself, which was more focused on ethics and Christian morality."}, {"text": "Stoic philosophy and Machiavellian political realism.", "isCorrect": false, "rationale": "Machiavellian political realism was the tradition *against which* the mirror for princes stood, not a source for it."}]}, {"question": "According to Machiavelli, what was the fundamental flaw in the 'mirror for princes' tradition?", "options": [{"text": "It encouraged rulers to be too aggressive and tyrannical, leading to widespread rebellion.", "isCorrect": false, "rationale": "The 'mirror for princes' tradition advocated for virtuous rule, which would typically prevent rebellion, not cause it."}, {"text": "It described ideal rulers who could not exist in the real world of practical politics.", "isCorrect": true, "rationale": "Machiavelli believed it 'described rulers who did not exist and could not exist' because 'the real world of politics does not allow the luxury of consistent moral virtue.'"}, {"text": "It relied too heavily on historical examples rather than theoretical constructs.", "isCorrect": false, "rationale": "The text implies it relied more on theoretical ideals than practical historical observation, which was Machiavelli's approach."}, {"text": "It was accessible only to highly educated elites, thus excluding most aspiring rulers.", "isCorrect": false, "rationale": "The text does not mention accessibility as a flaw, but rather its impracticality in real-world governance."}]}, {"question": "Machiavelli's concept of *verità effettuale* (effectual truth) primarily advocates for a political analysis grounded in:", "options": [{"text": "Universal moral laws and divine commandments for righteous governance.", "isCorrect": false, "rationale": "This describes the 'mirror for princes' tradition, which Machiavelli explicitly rejected in favor of the 'effectual truth.'"}, {"text": "Theoretical ideals of justice and the conditions for human flourishing.", "isCorrect": false, "rationale": "This also describes the traditional approach, which Machiavelli found detached from reality."}, {"text": "Observation of how power actually operates and what actions lead to success or failure in the real world.", "isCorrect": true, "rationale": "The text states Machiavelli's alternative is to 'study politics as it actually IS, not as it ought to be. Look at what rulers actually do when they succeed, and what they do when they fail.' This is the core of *verità effettuale*."}, {"text": "Philosophical debates about the optimal form of government.", "isCorrect": false, "rationale": "While philosophical, Machiavelli's focus was on practical outcomes and observed reality rather than abstract debates about ideal forms."}]}, {"question": "Machiavelli compares a political theorist who ignores political reality to a doctor who:", "options": [{"text": "Specializes in a single disease and ignores others.", "isCorrect": false, "rationale": "The analogy is not about specialization, but about confronting unpleasant truths."}, {"text": "Refuses to acknowledge what diseases actually do to the body because it is unpleasant.", "isCorrect": true, "rationale": "The text states, 'A doctor who refuses to acknowledge what diseases actually do to the body, because it is unpleasant to think about, cannot heal anyone.' This directly parallels a political theorist ignoring political realities."}, {"text": "Focuses solely on preventative care, neglecting emergency treatments.", "isCorrect": false, "rationale": "The analogy is about acknowledging reality, not the type of care."}, {"text": "Prescribes medicine based on moral virtue rather than scientific evidence.", "isCorrect": false, "rationale": "While closer in spirit, the text uses the specific analogy of refusing to acknowledge unpleasant facts."}]}, {"question": "Despite Cesare Borgia's morally questionable actions, Machiavelli admired him primarily for:", "options": [{"text": "His unwavering commitment to Christian piety and justice.", "isCorrect": false, "rationale": "The text explicitly states Borgia was 'by any traditional moral standard, a monster' and 'used deception and betrayal as routine tools,' contradicting piety and justice."}, {"text": "His strategic thinking, decisiveness, and effective management of force and appearances.", "isCorrect": true, "rationale": "The text states, 'What Machiavelli admires is not Borgia's character but his methods—the clarity of his strategic thinking, his willingness to act decisively, his skill at managing both force and appearances.'"}, {"text": "His ability to maintain peace and stability through alliances and diplomacy.", "isCorrect": false, "rationale": "Borgia's methods involved ruthless action and deception, not primarily diplomatic peace-making in the traditional sense."}, {"text": "His popularity among the common people due to his generous policies.", "isCorrect": false, "rationale": "The text does not mention his popularity or generous policies; it focuses on his effectiveness in power through pragmatic, often ruthless, means."}]}, {"question": "Which statement best encapsulates Machiavelli's 'revolution' in political thought as presented in the text?", "options": [{"text": "A renewed emphasis on the importance of divine right and inherited monarchy for stable governance.", "isCorrect": false, "rationale": "Machiavelli was challenging existing traditions, not reinforcing divine right, and his focus was on effective rule regardless of its source."}, {"text": "The assertion that political analysis must be detached from moral judgment to understand how power truly functions.", "isCorrect": true, "rationale": "The text concludes with 'This is the Machiavellian revolution in miniature: political analysis divorced from moral judgment,' stating his goal is to study 'what actually works,' not 'what morality and justice require.'"}, {"text": "The argument that popular sovereignty and democratic institutions are the only legitimate forms of government.", "isCorrect": false, "rationale": "While relevant to some political thought, Machiavelli's focus in *The Prince* was on the ruler's effectiveness, not necessarily advocating for democracy."}, {"text": "A return to classical Greek ideals of philosophical rulers and utopian states.", "isCorrect": false, "rationale": "Machiavelli rejected 'imaginary, ideal states' and 'fairy tales,' preferring practical reality, which contrasts with utopian ideals."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
