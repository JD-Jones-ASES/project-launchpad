        <div class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 1, Section 1</div>

        <div class="score-pct" id="score-pct"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "During Machiavelli's youth, Florence was primarily characterized by which of the following under Lorenzo de' Medici?", "options": [{"text": "Political instability due to frequent foreign invasions.", "isCorrect": false, "rationale": "While Florence later faced invasions, under Lorenzo the Magnificent, the city held its complex web of alliances together, indicating a period of political stability relative to later crises."}, {"text": "A period of severe economic decline and social unrest.", "isCorrect": false, "rationale": "The text states Florence was supported by the 'immense wealth of the Medici banking empire,' indicating a prosperous period, not one of decline."}, {"text": "Unparalleled cultural brilliance and political prominence in Europe.", "isCorrect": true, "rationale": "The text describes Florence as being 'at the height of its power and cultural brilliance' and the 'intellectual and artistic capital of Europe' under Lorenzo the Magnificent."}, {"text": "Strict religious fundamentalism enforced by the Medici family.", "isCorrect": false, "rationale": "Religious fundamentalism was characteristic of Savonarola's rule, which occurred after Lorenzo's death and the Medici's initial flight, not during Lorenzo's reign when Florence was known for its worldly arts and learning."}]}, {"question": "What crucial political lesson did Machiavelli derive from his observation of Girolamo Savonarola's rise and fall?", "options": [{"text": "That popular religious fervor is the most reliable foundation for political power.", "isCorrect": false, "rationale": "Savonarola commanded enormous popular enthusiasm, but his downfall demonstrated that this alone was not enough to sustain power."}, {"text": "That moral authority, even without military backing, can sustain a ruler indefinitely.", "isCorrect": false, "rationale": "The text explicitly states: 'enthusiasm and moral authority are no substitute for organized force,' directly contradicting this option."}, {"text": "That effective leadership requires a combination of popular support and institutionalized force.", "isCorrect": true, "rationale": "Machiavelli observed that Savonarola, despite popular enthusiasm, 'had no army, no allies, and no institutional base of power,' which led to his collapse, teaching Machiavelli the necessity of organized force alongside popular will."}, {"text": "That a ruler's primary duty is to appease foreign powers to avoid invasion.", "isCorrect": false, "rationale": "While foreign powers were a factor in Florentine politics, the specific lesson from Savonarola's failure focused on the internal mechanisms of power (force, allies, institutions) rather than solely external appeasement."}]}, {"question": "From 1498 to 1512, Machiavelli's primary role in the Florentine republic was best described as:", "options": [{"text": "An elected official responsible for leading the military.", "isCorrect": false, "rationale": "Machiavelli was a 'civil servant, not an elected official,' and his role involved managing military and foreign policy affairs as a secretary, not leading armies as a commander."}, {"text": "A renowned humanist scholar advising the Medici family.", "isCorrect": false, "rationale": "Machiavelli served the Florentine republic after the Medici had fled, and his role was governmental, not primarily as a scholar (though he later became one in retirement)."}, {"text": "An operational civil servant managing diplomatic correspondence and missions.", "isCorrect": true, "rationale": "As Secretary to the Second Chancery and to the Ten of Liberty and Peace, Machiavelli was the 'operational staff officer who drafted dispatches, managed correspondence, and accompanied diplomatic missions.'"}, {"text": "A military commander personally leading Florentine forces in battle.", "isCorrect": false, "rationale": "His role was secretarial and administrative, providing support for military affairs and foreign policy, not direct military command."}]}, {"question": "Machiavelli's diplomatic mission to the court of Emperor Maximilian most likely contributed to his later writings on leadership by illustrating the dangers of a ruler who:", "options": [{"text": "Uses excessive cruelty to establish a new principality.", "isCorrect": false, "rationale": "This observation relates more to Cesare Borgia, whom Machiavelli also encountered, not Emperor Maximilian."}, {"text": "Fails to support cultural patronage and the arts.", "isCorrect": false, "rationale": "The text does not mention cultural patronage in the context of Emperor Maximilian; this was a characteristic of Lorenzo the Magnificent."}, {"text": "Possesses great personal charisma but lacks an institutional power base.", "isCorrect": false, "rationale": "This describes the lesson Machiavelli learned from Savonarola's downfall."}, {"text": "Is indecisive and unable to effectively execute their decisions.", "isCorrect": true, "rationale": "Machiavelli concluded that Emperor Maximilian was 'an irresolute ruler unable to follow through on his decisions,' highlighting the danger of indecisiveness in leadership."}]}, {"question": "How did Machiavelli's direct observations of figures like Cesare Borgia and Pope Julius II fundamentally shape his understanding of practical politics?", "options": [{"text": "They reinforced his belief in the inherent goodness and moral integrity of rulers.", "isCorrect": false, "rationale": "Cesare Borgia was 'ruthless' and used 'calculated cruelty and masterful deception,' while Julius II was the 'Warrior Pope' who 'personally led armies.' These observations would have challenged, not reinforced, a belief in inherent goodness."}, {"text": "They demonstrated that strong leadership often required pragmatic actions, including ruthlessness and deception, beyond conventional morality.", "isCorrect": true, "rationale": "Borgia exemplified 'military skill, calculated cruelty, and masterful deception,' and Julius II demonstrated leadership through 'sheer audacity' and personally leading armies, showing Machiavelli the pragmatic, often morally ambiguous, realities of effective power."}, {"text": "They convinced him that theoretical knowledge from classical texts was superior to real-world experience.", "isCorrect": false, "rationale": "The text states these missions gave Machiavelli 'direct, sustained observation of real political actors under real conditions,' which most political philosophers lacked, emphasizing the value of real-world experience."}, {"text": "They showed him the primary importance of inherited legitimacy and noble birth for a ruler's success.", "isCorrect": false, "rationale": "Cesare Borgia was 'carving out a new principality' through his own actions, demonstrating that skill and force could overcome the absence of inherited legitimacy."}]}, {"question": "The abrupt end to Machiavelli's career in public service in 1512 was primarily caused by:", "options": [{"text": "His voluntary resignation to pursue literary endeavors.", "isCorrect": false, "rationale": "Machiavelli was 'dismissed from his position immediately' and later arrested and tortured, indicating his departure was not voluntary."}, {"text": "The successful invasion of Florence by French forces.", "isCorrect": false, "rationale": "The text specifies that 'a Spanish army supported by Pope Julius II defeated the Florentine forces,' not a French invasion."}, {"text": "The return of the Medici family to power after the collapse of the republican government.", "isCorrect": true, "rationale": "The text states that the 'republican government collapsed, and the Medici family returned to power after eighteen years in exile. Machiavelli was dismissed from his position immediately.'"}, {"text": "His excommunication by Pope Julius II for political offenses.", "isCorrect": false, "rationale": "Machiavelli was dismissed and later falsely implicated in a conspiracy, arrested, and tortured, but there is no mention of excommunication."}]}, {"question": "Machiavelli's forced retirement to his farm after 1512, despite being a personal hardship, proved to be historically significant because it:", "options": [{"text": "Allowed him to finally secure a lucrative patronage deal with the returned Medici family.", "isCorrect": false, "rationale": "He was 'barred from the government offices' and forbidden from leaving Florentine territory, indicating he was in disfavor, not under Medici patronage."}, {"text": "Led to his extensive travel throughout Europe, broadening his political perspective.", "isCorrect": false, "rationale": "He was 'forbidden from leaving Florentine territory,' making extensive travel impossible."}, {"text": "Provided the necessary solitude and time for him to produce his most influential political writings.", "isCorrect": true, "rationale": "The text states that 'Out of this enforced idleness came one of the most remarkable bursts of political writing in history,' referring to works like *The Prince*."}, {"text": "Enabled him to organize a successful counter-rebellion against the Medici.", "isCorrect": false, "rationale": "The text indicates he focused on writing during this period, not on organizing rebellions."}]}, {"question": "All of the following works are attributed to Machiavelli's 'literary years' (1512-1527) *except*:", "options": [{"text": "The Prince", "isCorrect": false, "rationale": "*The Prince* is explicitly listed as written in 1513 during this period."}, {"text": "The Art of War", "isCorrect": false, "rationale": "*The Art of War* is explicitly listed as written in 1521 during this period."}, {"text": "The History of the Peloponnesian War", "isCorrect": true, "rationale": "This work was written by Thucydides, a classical author Machiavelli studied, not by Machiavelli himself."}, {"text": "La Mandragola", "isCorrect": false, "rationale": "*La Mandragola* is explicitly listed as a comedy produced during this period."}]}, {"question": "Machiavelli's unique approach to political theory, emphasizing practical observation over pure idealism, can be best understood as a synthesis of which three major influences?", "options": [{"text": "The theological doctrines of Savonarola, the artistic patronage of Lorenzo, and the military strategies of King Louis XII.", "isCorrect": false, "rationale": "Savonarola's doctrines were a negative lesson, Lorenzo's patronage was a context, and Louis XII's strategies were observed but not the foundational influences on his theoretical approach in this broad sense."}, {"text": "His classical education, direct diplomatic experience, and the harsh lessons of political upheaval and personal suffering.", "isCorrect": true, "rationale": "His 'solid education in Latin and the classical authors' shaped his vision, his 'extraordinary education in practical politics' came from diplomatic missions, and his 'enforced idleness' due to political upheaval and personal suffering led to his writings."}, {"text": "The economic theories of the Medici banking empire, the philosophical schools of ancient Greece, and the legal traditions of the Holy Roman Empire.", "isCorrect": false, "rationale": "While the Medici banking empire provided context, and he read classical authors (some philosophers), the text does not detail economic theories or legal traditions as primary influences on his unique political theory."}, {"text": "His early career as a painter, his later role as a military general, and his studies of contemporary European monarchies.", "isCorrect": false, "rationale": "Machiavelli was a civil servant and diplomat, not a painter or military general, though he wrote about military organization."}]}, {"question": "Machiavelli's death occurring just weeks after the Medici were again expelled from Florence and a new republic briefly restored most strongly suggests:", "options": [{"text": "His lifelong opposition to all forms of republican government.", "isCorrect": false, "rationale": "Machiavelli served the Florentine republic for fourteen years and wrote *Discourses on Livy*, which extensively analyzes and defends republican government, making this option incorrect."}, {"text": "The complete irrelevance of his political ideas to contemporary Florentine events.", "isCorrect": false, "rationale": "Given his deep involvement in Florentine politics and his writings focused on the city's fate, it is highly unlikely his ideas were irrelevant. His death at a pivotal moment suggests ongoing relevance."}, {"text": "His continuing, albeit unfulfilled, hope for a return to public service under a republican government.", "isCorrect": true, "rationale": "The text notes, 'Whether he hoped for a political appointment in those final weeks, we do not know.' This implies a possibility given his history of service to the republic and his dedication to Florentine politics, making this a strong inference."}, {"text": "His ultimate triumph in seeing Florence finally achieve lasting peace and stability.", "isCorrect": false, "rationale": "The phrase 'a new crisis had driven the Medici from Florence once again' implies ongoing instability, not lasting peace and stability."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
