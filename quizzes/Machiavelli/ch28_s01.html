<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Machiavelli.html">&larr; Back to Powers and Principalities (Machiavelli)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 28, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the overarching argument or ultimate goal that unifies the various sections of Machiavelli's \"The Prince\"?", "options": [{"text": "To provide a comprehensive historical account of Italian city-states.", "isCorrect": false, "rationale": "While the book draws on historical examples, its primary aim is not simply to record history but to use it to support a larger political objective."}, {"text": "To inspire a leader to liberate Italy from foreign domination.", "isCorrect": true, "rationale": "The text explicitly states that 'everything has been directed toward the hope that someone will rise to liberate Italy from foreign domination,' especially highlighted in the final chapter."}, {"text": "To offer a moral critique of contemporary political leaders.", "isCorrect": false, "rationale": "Machiavelli’s approach is more descriptive and pragmatic than a moral critique in the traditional sense, focusing on 'the effectual truth' of politics rather than idealized morality."}, {"text": "To establish a universal theory of state acquisition and retention.", "isCorrect": false, "rationale": "Though a significant portion of the book covers how states are acquired and held, this serves as a means to the ultimate goal of Italian liberation, rather than being the sole overarching purpose."}], "id": "q01"}, {"question": "According to Machiavelli in Chapters XII-XIV, what is the fundamental reason a prince must command his own citizen army rather than relying on mercenaries or auxiliaries?", "options": [{"text": "Citizen armies are always more skilled in combat than foreign soldiers.", "isCorrect": false, "rationale": "While a prince's own army might be more dedicated, the text emphasizes sovereignty and security as the core issue, not necessarily superior tactical skill."}, {"text": "Relying on external forces undermines the prince's true sovereignty and security.", "isCorrect": true, "rationale": "The text explicitly states: 'A prince who cannot defend himself through his own resources is not truly sovereign,' linking reliance on external forces directly to a lack of genuine political authority and security."}, {"text": "Mercenaries are too expensive and deplete the state's treasury.", "isCorrect": false, "rationale": "Though cost might be a practical concern, the text focuses on the strategic and sovereign implications of military reliance rather than purely financial ones."}, {"text": "Foreign soldiers are culturally incompatible with the state's citizens.", "isCorrect": false, "rationale": "The text does not mention cultural incompatibility as the primary reason for rejecting mercenaries or auxiliaries; the focus is on their loyalty and the prince's independence."}], "id": "q02"}, {"question": "While Machiavelli's advice on a prince's character often focuses on pragmatic and sometimes ruthless qualities, what crucial element does the text suggest is often overlooked in casual summaries of Chapters XV-XXIII?", "options": [{"text": "The importance of diplomatic relations with neighboring states.", "isCorrect": false, "rationale": "These chapters focus on the prince's personal qualities and internal management of the state, not primarily on external diplomatic relations."}, {"text": "The necessity for the prince to always act morally and virtuously.", "isCorrect": false, "rationale": "This contradicts Machiavelli's famous advice that 'the prince must learn how not to be good' when necessary for state preservation."}, {"text": "The prince's reliance on the people as their most vital political resource.", "isCorrect": true, "rationale": "The text explicitly states that 'these chapters also contain something that casual summaries miss: a consistent emphasis on the people as the prince's most important political resource.'"}, {"text": "The strategic advantage of employing deception in warfare.", "isCorrect": false, "rationale": "While deception is part of the prince's toolkit, the text highlights popular support as the *overlooked* aspect, not the deceptive tactics themselves."}], "id": "q03"}, {"question": "The text identifies \"political realism\" as one of Machiavelli's most enduring insights. How does Machiavelli's approach to politics, as described, exemplify this concept?", "options": [{"text": "By focusing on abstract philosophical principles of justice and ideal governance.", "isCorrect": false, "rationale": "Political realism, as defined, explicitly moves away from 'idealized models of the just state' and 'normative prescription.'"}, {"text": "By advocating for morally upright leaders who prioritize the common good above all else.", "isCorrect": false, "rationale": "Realism prioritizes practical outcomes and stability, even if it means acting in ways that are 'morally uncomfortable,' rather than strictly morally upright."}, {"text": "By analyzing political life empirically, based on how states actually operate and are maintained.", "isCorrect": true, "rationale": "The text states Machiavelli 'studies politics as it actually is, not as it ought to be,' and insisted on 'the effectual truth of the matter,' which aligns with empirical analysis."}, {"text": "By providing prescriptive advice on how rulers should always behave to gain popular love.", "isCorrect": false, "rationale": "Machiavelli specifically advises it is 'better to be feared than loved' under certain circumstances, and his realism is about 'empirical political analysis, rather than normative prescription.'"}], "id": "q04"}, {"question": "Machiavelli's concept of *virtù* and *fortuna* highlights a fundamental tension in political life. Which of the following best describes this tension?", "options": [{"text": "The inherent conflict between a prince's desire for power and his moral obligations to his subjects.", "isCorrect": false, "rationale": "While a prince faces moral dilemmas, the tension of *virtù* and *fortuna* specifically relates to agency versus external circumstances."}, {"text": "The struggle between a leader's strategic planning and the unpredictable influence of external circumstances.", "isCorrect": true, "rationale": "The text defines this as 'the tension between human agency and circumstances beyond human control,' where a prepared leader 'gives himself the best chance—but cannot guarantee the outcome.'"}, {"text": "The opposition between maintaining a strong military and securing financial stability for the state.", "isCorrect": false, "rationale": "This is a practical political challenge, but not the core philosophical tension encapsulated by *virtù* and *fortuna*."}, {"text": "The dilemma of choosing between being loved or feared by the populace.", "isCorrect": false, "rationale": "This is a tactical choice for the prince regarding his reputation and control, distinct from the broader interplay of human action and chance."}], "id": "q05"}, {"question": "How does Machiavelli's emphasis on \"the people as the prince's foundation\" anticipate later democratic political theory, even if \"The Prince\" is not a democratic blueprint?", "options": [{"text": "By arguing that rulers should be elected by popular vote.", "isCorrect": false, "rationale": "Machiavelli's focus in 'The Prince' is on principalities and how a prince gains and maintains power, not on democratic electoral processes."}, {"text": "By highlighting the ultimate power and security derived from popular support and citizen engagement.", "isCorrect": true, "rationale": "The text states Machiavelli 'returns to the people as the ultimate political resource' and emphasizes that 'the best fortress is not to be hated by the people,' which foreshadows the importance of popular legitimacy in democratic thought."}, {"text": "By suggesting that all decisions should be made through direct popular assemblies.", "isCorrect": false, "rationale": "This is a specific form of democratic governance (direct democracy) and goes beyond Machiavelli's general emphasis on popular support as a foundation."}, {"text": "By asserting that economic equality among citizens is the basis of a stable state.", "isCorrect": false, "rationale": "The text does not discuss economic equality in relation to Machiavelli's emphasis on popular support."}], "id": "q06"}, {"question": "The metaphor of the \"fox and the lion\" is used to describe an essential aspect of effective political leadership. What combination of qualities does this metaphor represent?", "options": [{"text": "The ability to inspire unwavering loyalty and fear in equal measure.", "isCorrect": false, "rationale": "While fear and loyalty are relevant to leadership, the fox and lion metaphor specifically denotes distinct types of intelligence and action."}, {"text": "The capacity for both shrewd strategic thinking and decisive, forceful action.", "isCorrect": true, "rationale": "The text explains the metaphor as 'cunning strategist (fox) and forceful actor (lion),' requiring 'intelligence to understand situations and the willingness to act decisively.'"}, {"text": "The skill in forming alliances with powerful states and intimidating weaker rivals.", "isCorrect": false, "rationale": "This focuses on external relations; the metaphor primarily describes the internal qualities a leader must possess."}, {"text": "The commitment to upholding moral principles while also adapting to changing circumstances.", "isCorrect": false, "rationale": "The text notes this leadership may involve actions that are 'morally uncomfortable,' implying a pragmatic rather than strictly moral approach."}], "id": "q07"}, {"question": "The text states that one of Machiavelli's limitations in \"The Prince\" is its \"exclusive focus on principalities.\" What key aspect of his broader political thought is often missed by readers familiar only with \"The Prince\"?", "options": [{"text": "His support for hereditary monarchies as the most stable form of government.", "isCorrect": false, "rationale": "This contradicts the stated point that he argued for republican government as stronger and more durable."}, {"text": "His detailed plans for an international alliance system to prevent foreign domination.", "isCorrect": false, "rationale": "The text highlights his arguments for a specific form of internal governance, not international alliances, as the missed aspect."}, {"text": "His advocacy for republican government as the strongest and most durable political organization.", "isCorrect": true, "rationale": "The text explicitly states that 'Readers who know only The Prince miss the Machiavelli who argued in the Discourses on Livy that republican government...is the strongest and most durable form of political organization.'"}, {"text": "His belief that economic prosperity is the sole determinant of a state's power.", "isCorrect": false, "rationale": "The text does not mention economic prosperity as the missed aspect of his broader thought."}], "id": "q08"}, {"question": "According to the text, what is Machiavelli's \"most powerful legacy\" that continues to shape political thought and statecraft today?", "options": [{"text": "The specific model of a heroic new prince liberating his people.", "isCorrect": false, "rationale": "The text notes that this specific model 'did not match the actual process' of Italian unification, suggesting it was not his most powerful *legacy*, though it was his hope."}, {"text": "His gendered language and attitudes toward women.", "isCorrect": false, "rationale": "This is identified as something Machiavelli 'got wrong' and is 'morally unacceptable and intellectually limiting,' not a powerful legacy."}, {"text": "The tradition of political realism, analyzing politics as it actually is rather than as it ought to be.", "isCorrect": true, "rationale": "The text explicitly states: 'The tradition of political realism—the insistence that politics must be understood as it is, not as we wish it were—is his most powerful legacy.'"}, {"text": "His detailed tactical advice on military campaigns and diplomatic negotiations.", "isCorrect": false, "rationale": "While he offered such advice, the overarching philosophical tradition of realism is identified as his 'most powerful legacy,' encapsulating his broader approach."}], "id": "q09"}, {"question": "The introductory text mentions the Congress of Vienna as an embodiment of \"balance-of-power politics that Machiavelli first analyzed.\" Which of Machiavelli's enduring insights best explains how the Congress of Vienna could be seen through a Machiavellian lens?", "options": [{"text": "The idea that a single, heroic prince is necessary to liberate a nation from foreign domination.", "isCorrect": false, "rationale": "The Congress of Vienna was a multilateral diplomatic effort to stabilize Europe, not about a single prince liberating a specific nation."}, {"text": "The exclusive focus on republican forms of government as the most stable.", "isCorrect": false, "rationale": "The Congress of Vienna largely dealt with monarchical states and their interests, and Machiavelli's arguments for republicanism are from 'Discourses,' not 'The Prince,' which is more relevant to statecraft in the context of balance-of-power."}, {"text": "The principle of political realism, where states prioritize their actual interests and power dynamics over moral ideals.", "isCorrect": true, "rationale": "Balance-of-power politics is a prime example of political realism, where nations make decisions based on strategic interests, security, and power calculations ('politics as it actually is') rather than abstract moral principles."}, {"text": "The advice that a prince should always strive to be loved rather than feared by his subjects.", "isCorrect": false, "rationale": "This is advice for internal governance of a principality; balance-of-power relates to inter-state relations, where external reputation and relative strength are more critical."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
