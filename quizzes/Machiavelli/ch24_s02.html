<script>
var QUESTIONS = [{"question": "According to the text, what is the primary reason flatterers thrive in a prince's court?", "options": [{"text": "They are intrinsically evil and cunning, preying on the prince's weaknesses.", "isCorrect": false, "rationale": "The text explicitly states that the flatterer thrives 'not because he is intrinsically evil' but due to incentives."}, {"text": "The court's incentive structure rewards agreement and punishes dissent, making flattery the easiest path to favor.", "isCorrect": true, "rationale": "The text directly attributes the flatterer's success to 'the incentive structure of court life rewards agreement and punishes dissent'."}, {"text": "Princes naturally prefer optimistic news over critical feedback, irrespective of its truth.", "isCorrect": false, "rationale": "While princes might prefer positive news, the text emphasizes the structural incentives of the court rather than inherent princely preference as the primary driver for flatterers."}, {"text": "Flatterers are generally the most educated and articulate advisors, thus gaining influence easily.", "isCorrect": false, "rationale": "The text does not mention the educational or articulation level of flatterers as the reason for their success; it focuses on the behavioral incentives."}]}, {"question": "The text describes a paradox where a prince surrounded by flatterers 'will feel well-informed... But he will actually be governing in a fog.' What does this paradox primarily highlight?", "options": [{"text": "The prince is consciously aware of the deception but chooses to ignore it for personal comfort.", "isCorrect": false, "rationale": "The paradox suggests the prince is *unaware* of the deception, feeling well-informed while being misinformed, rather than consciously ignoring it."}, {"text": "Advisors provide a deluge of information, making it impossible for the prince to discern truth from falsehood.", "isCorrect": false, "rationale": "The problem isn't too much information, but filtered and biased information, where problems are minimized or hidden, not an overwhelming quantity."}, {"text": "The prince's perception of his informational clarity is directly contradicted by the actual quality and completeness of the information he receives.", "isCorrect": true, "rationale": "This option accurately captures the paradox: the prince *feels* informed, but the reality is that he is misinformed because information is filtered and crucial details are hidden from him."}, {"text": "The flatterers themselves are often ignorant of the true state of affairs, leading to misinformation.", "isCorrect": false, "rationale": "The text implies flatterers *know* the truth but choose to conceal it or praise decisions for self-gain, rather than being ignorant themselves."}]}, {"question": "According to Machiavelli, what is the fundamental danger of a prince allowing unlimited freedom for anyone to speak freely and criticize him openly?", "options": [{"text": "It would lead to a flood of contradictory advice, paralyzing the prince's ability to make decisions.", "isCorrect": false, "rationale": "While contradictory advice could be a consequence, the text emphasizes a more fundamental loss: 'His authority dissolves into a continuous negotiation.'"}, {"text": "It makes the prince appear tentative and subjects his authority to continuous negotiation, ultimately weakening all instruments of governance.", "isCorrect": true, "rationale": "The text explicitly states that a prince 'loses the one thing he cannot afford to lose: authority... His decisions appear tentative, subject to revision by anyone bold enough to challenge them. His authority dissolves into a continuous negotiation.'"}, {"text": "It discourages loyal advisors from offering counsel, as their opinions would be drowned out by public clamor.", "isCorrect": false, "rationale": "The primary concern is not the discouragement of loyal advisors but the erosion of the prince's perceived authority and the weakening of governance itself."}, {"text": "It could incite public rebellion against the prince, as criticisms might reveal his weaknesses to his subjects.", "isCorrect": false, "rationale": "While weakening governance might indirectly lead to unrest, the direct concern stated is the loss of authority and becoming a 'figure of contempt,' not specifically rebellion."}]}, {"question": "Which of the following best describes Machiavelli's proposed 'Structured Honesty' solution for a prince seeking honest counsel?", "options": [{"text": "Encouraging a broad public forum where all citizens can openly debate the prince's policies and decisions.", "isCorrect": false, "rationale": "This contradicts Machiavelli's rejection of 'unlimited freedom' and unsolicited criticism, which would undermine authority."}, {"text": "Selecting a small group of highly capable and loyal advisors, explicitly authorizing them to speak frankly, but only when specifically asked by the prince.", "isCorrect": true, "rationale": "This aligns precisely with the text: 'The prince should select a small number of trusted advisors... He should explicitly authorize these men to speak frankly to him, but only when asked.'"}, {"text": "Establishing a system of anonymous feedback where advisors can submit their true opinions without fear of reprisal.", "isCorrect": false, "rationale": "The solution emphasizes direct, authorized frankness from known, trusted advisors, not anonymous feedback."}, {"text": "Delegating the responsibility for major decisions to a council of wise men, thereby distributing authority.", "isCorrect": false, "rationale": "Machiavelli's solution is about *receiving* counsel, not outsourcing decision-making or distributing the prince's authority."}]}, {"question": "According to the 'keyconcept' section, what is Machiavelli's crucial reversal regarding the relationship between a prince's prudence and good counsel?", "options": [{"text": "A prince's prudence is solely a product of the excellent counsel he receives from his advisors.", "isCorrect": false, "rationale": "This is the opposite of Machiavelli's argument, which states, 'not the prince's prudence from good counsel.'"}, {"text": "Good counsel is only an input, and a prince must possess his own inherent prudence to effectively use and assess that advice.", "isCorrect": true, "rationale": "The text states, 'Good counsel... must arise from the prince's own prudence,' and 'only an already wise prince can make use of good advice... The prince's own judgment is the necessary foundation; good counsel is only an input.'"}, {"text": "The quantity of counsel received is more important than its quality in developing a prince's prudence.", "isCorrect": false, "rationale": "The focus is on the prince's *ability to use* counsel, not the quantity of it."}, {"text": "Prudence is an innate quality that cannot be developed or influenced by external factors like counsel.", "isCorrect": false, "rationale": "While fundamental, the text implies it's a foundation that allows counsel to be used, not that it's entirely static or uninfluenced by *learning to assess* counsel."}]}, {"question": "If a prince, despite being surrounded by highly competent and honest advisors who offer excellent counsel, consistently makes flawed decisions leading to state instability, what would Machiavelli most likely identify as the root cause of his failures?", "options": [{"text": "The advisors are secretly undermining the prince's authority, despite their outward appearance of loyalty.", "isCorrect": false, "rationale": "The premise states they are 'highly competent and honest advisors' offering 'excellent counsel,' so disloyalty is not the issue."}, {"text": "The political environment is inherently unpredictable, making success impossible even with good advice.", "isCorrect": false, "rationale": "While external factors exist, Machiavelli's focus here is on the prince's internal capacity to deal with advice."}, {"text": "The prince lacks the personal prudence necessary to assess, weigh, and make proper use of the excellent advice he receives.", "isCorrect": true, "rationale": "The text states, 'A foolish prince, even surrounded by excellent advisors, will not know how to assess their advice, how to weigh competing recommendations, or how to decide when to follow their counsel and when to override it.' This points to a lack of the prince's own prudence."}, {"text": "The prince is being deliberately misled by external forces outside of his court, rendering his advisors' counsel ineffective.", "isCorrect": false, "rationale": "The problem is attributed to the prince's internal capacity to process counsel, not external misleading forces when his advisors are competent and honest."}]}, {"question": "The chapter connects flattery to a minister 'serving himself... rather than the prince.' Which of the following modern scenarios best exemplifies this principle?", "options": [{"text": "A corporate executive hires a consultant firm known for its critical and objective assessments of company performance.", "isCorrect": false, "rationale": "This scenario represents seeking honest counsel, directly opposite to serving oneself through flattery."}, {"text": "A military commander punishes a subordinate for reporting inconvenient truths about troop morale and equipment readiness.", "isCorrect": false, "rationale": "This exemplifies the punishment of dissent, a *cause* of flattery, rather than a minister *flattering* for self-gain."}, {"text": "A political advisor consistently praises a leader's highly flawed policy decisions in public, knowing it secures their own position and the leader's favor.", "isCorrect": true, "rationale": "This directly parallels a minister flattering a prince by praising flawed decisions to serve their 'own comfort and the prince's momentary pleasure,' rather than the leader's true needs."}, {"text": "An elected official creates a public oversight committee to scrutinize governmental spending and expose waste.", "isCorrect": false, "rationale": "This represents a mechanism for accountability and uncovering truth, which is the opposite of a flattering, self-serving minister."}]}, {"question": "Beyond the dangers of flattery and unlimited criticism, what overarching theme does this chapter contribute to understanding why princes ultimately fail?", "options": [{"text": "The inherent difficulty of maintaining power in a constantly shifting political landscape, regardless of a prince's actions.", "isCorrect": false, "rationale": "While political landscapes are difficult, the chapter focuses on internal factors (counsel, prudence) that a prince can control, rather than external inevitability."}, {"text": "The necessity for a prince to be ruthless and feared by his subjects to maintain control and suppress dissent.", "isCorrect": false, "rationale": "The chapter focuses on the quality of advice and the prince's judgment, not on ruthlessness or fear as the primary solution to preventing failure."}, {"text": "Princes who lack independent prudence and are insulated by flatterers will make systematic errors that lead to the collapse of their plans.", "isCorrect": true, "rationale": "This summarizes the 'Diagnosis: Why Princes Fail' section, linking flatterers, lack of judgment, systematic errors, and ultimate collapse."}, {"text": "The inability to gather enough diverse opinions due to geographical isolation and poor communication channels.", "isCorrect": false, "rationale": "The chapter does not attribute failure to geographical isolation or communication channels, but to internal court dynamics and the prince's own judgment."}]}, {"question": "Machiavelli states that the prince's choice to receive counsel through 'proper channels' is itself an 'act of authority.' What does this imply about the nature of the structured honesty solution?", "options": [{"text": "It implies that the prince is delegating his authority to his chosen advisors, empowering them to make decisions on his behalf.", "isCorrect": false, "rationale": "The solution is about *receiving* counsel, not delegating authority or decision-making. The act of choosing channels *reinforces* his authority, rather than diminishes it."}, {"text": "It means the prince is demonstrating his power by publicly shaming those who offer unsolicited or flattering advice.", "isCorrect": false, "rationale": "The text doesn't suggest public shaming; it states the prince 'is not available for public challenge' and does not 'invite unsolicited criticism' outside the designated circle."}, {"text": "It demonstrates the prince's control over the flow of information and reinforces his leadership, rather than undermining it by open access.", "isCorrect": true, "rationale": "By choosing *how* he receives counsel, the prince asserts control, preventing his authority from dissolving into negotiation and affirming his leadership. This contrasts with the 'unlimited freedom' danger."}, {"text": "It suggests the prince must be visibly humble and open to correction from any subject to earn genuine respect and authority.", "isCorrect": false, "rationale": "This contradicts Machiavelli's warning against becoming a 'figure of contempt' through public correction; authority is maintained through structured access."}]}, {"question": "Considering both the 'Flattery Trap' and 'The Prince's Prudence' concepts, what is the ultimate and most crucial step for a prince to ensure effective governance and avoid failure?", "options": [{"text": "To establish a system of checks and balances where multiple advisors can veto each other's opinions.", "isCorrect": false, "rationale": "While deliberation is involved, the text focuses on the prince's internal capacity to judge, not a systemic veto power among advisors."}, {"text": "To outsource all critical policy analysis to an independent, unbiased third-party commission.", "isCorrect": false, "rationale": "The 'keyconcept' explicitly states, 'Wisdom cannot be outsourced,' and emphasizes the prince's own judgment."}, {"text": "To develop his own independent prudence to assess advice, recognize biases, and make decisions reflecting his own judgment.", "isCorrect": true, "rationale": "The text concludes, 'The solution is for the prince to develop the independent prudence that allows him to assess advice honestly—to know when his advisors are right and when they are wrong, to recognize when he is being told what he wants to hear, and to make decisions that reflect his own judgment.'"}, {"text": "To surround himself with only the most brilliant and morally unassailable advisors, regardless of their loyalty.", "isCorrect": false, "rationale": "While finding good advisors helps, the text clarifies that this is 'necessary but not sufficient'; the prince's own prudence is the 'ultimate' solution."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
