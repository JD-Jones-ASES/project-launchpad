<script>
var QUESTIONS = [{"question": "Why does Machiavelli devote so little space to hereditary principalities in *The Prince*?", "options": [{"text": "He considers them politically uninteresting due to their inherent stability and lack of complex problems.", "isCorrect": true, "rationale": "The text states, 'The brevity of the chapter is itself instructive: the more ordinary and uncomplicated a political situation is, the less Machiavelli finds to say about it. The interesting problems come later, with new princes.' This indicates he finds them uninteresting due to their stability."}, {"text": "He believes their principles are universally understood and do not require elaborate explanation.", "isCorrect": false, "rationale": "While hereditary rule might be familiar, Machiavelli's brevity is not because the principles are 'universally understood' in a theoretical sense, but because their practical application presents few difficulties compared to new principalities, making them less worthy of detailed strategic advice."}, {"text": "He prioritizes the challenges of acquiring and maintaining new principalities, which are more common in his era.", "isCorrect": false, "rationale": "While he does prioritize new principalities, the text explicitly states the reason for brevity on hereditary ones is that 'they present very few problems,' implying their stability makes them less of a focus for strategic counsel, not necessarily because new ones are 'more common.'"}, {"text": "He assumes his readers already possess deep knowledge of hereditary governance.", "isCorrect": false, "rationale": "The text doesn't suggest an assumption of prior knowledge as the primary reason for brevity. Rather, it emphasizes the lack of significant problems to address within this type of state."}], "id": "q01"}, {"question": "Which of the following is NOT one of Machiavelli's primary reasons for the inherent stability of hereditary principalities?", "options": [{"text": "The overwhelming military strength typically possessed by hereditary rulers.", "isCorrect": true, "rationale": "The text lists custom and legitimacy, inertia, and the absence of offense as the three interlocking reasons for stability. It does not mention military strength as a general characteristic contributing to their *inherent* stability, rather focusing on socio-political factors."}, {"text": "The deeply ingrained customs and traditions that lend legitimacy to the ruling family.", "isCorrect": false, "rationale": "The text explicitly states 'custom and legitimacy' as the first reason: 'The dynasty has, over generations, become woven into the fabric of daily life... This is what political theorists call legitimacy.'"}, {"text": "The general reluctance of people to undertake the costly and risky endeavor of revolution.", "isCorrect": false, "rationale": "This aligns with Machiavelli's second reason, 'inertia,' which states, 'People do not rebel against the familiar. Revolution requires energy, coordination, and a reason compelling enough to overcome the risks of failure.'"}, {"text": "The hereditary prince's ability to avoid giving active offense to his subjects with 'ordinary ability.'", "isCorrect": false, "rationale": "This is Machiavelli's third reason, 'the absence of offense,' where 'Ordinary ability is sufficient—provided the prince does not actively give his subjects reason to hate him.'"}], "id": "q02"}, {"question": "According to Machiavelli, the concept of 'legitimacy' in a hereditary principality primarily stems from what?", "options": [{"text": "The active consent of the governed through democratic processes.", "isCorrect": false, "rationale": "Machiavelli's view of legitimacy in hereditary states is based on custom and tradition, not democratic processes or active consent, which are modern concepts not present in his analysis here."}, {"text": "The people's long-standing habituation to the ruling family, making their rule seem natural and unquestionable.", "isCorrect": true, "rationale": "The text states, 'The people of a hereditary principality have grown up under this ruling family. They have never known anything different. ...To question the prince's right to rule is to question a fact of nature. This is what political theorists call legitimacy.'"}, {"text": "The prince's exceptional wisdom and charismatic leadership.", "isCorrect": false, "rationale": "The text explicitly states that 'not exceptional wisdom, not charismatic leadership' is required for a hereditary prince, but rather 'ordinary ability,' for legitimacy in this context."}, {"text": "The divine right of kings, as ordained by religious authority.", "isCorrect": false, "rationale": "While divine right was a concept, Machiavelli grounds legitimacy in practical, observable human behavior and custom ('a fact of nature'), rather than theological doctrine, in this section."}], "id": "q03"}, {"question": "A hereditary prince observes that his kingdom's traditional tax collection system is inefficient compared to a neighboring state's modern system. According to Machiavelli's 'Rule,' what would be the most advisable course of action for this prince?", "options": [{"text": "Immediately implement reforms to modernize the tax system, demonstrating forward-thinking leadership.", "isCorrect": false, "rationale": "Machiavelli advises against change unless forced by circumstance, stating, 'The desire to reform or modernize is often the hereditary prince's greatest enemy.' Improving on what works risks instability."}, {"text": "Gradually introduce minor adjustments to the tax system to improve efficiency without causing disruption.", "isCorrect": false, "rationale": "Even gradual changes can introduce risk. Machiavelli's rule is clear: 'should not change established customs unless forced to by circumstance.' Any intentional change carries risk to stability."}, {"text": "Maintain the existing traditional tax collection system, recognizing its proven stability over generations.", "isCorrect": true, "rationale": "Machiavelli's practical rule is: 'the hereditary prince should not change established customs unless forced to by circumstance.' He states that 'A custom that has survived generations has demonstrated its usefulness. To replace it is to risk instability for no guaranteed gain.'"}, {"text": "Consult with his council of nobles to devise a new system that blends tradition with modern efficiency.", "isCorrect": false, "rationale": "Consulting with nobles for change still goes against Machiavelli's core advice for hereditary princes, which is to 'maintain' the working system and not 'improve upon it,' as reform is risky."}], "id": "q04"}, {"question": "Machiavelli's concept of 'inertia' suggests that subjects of a hereditary principality are 'content' primarily because:", "options": [{"text": "They possess a deep, emotional loyalty to the ruling dynasty.", "isCorrect": false, "rationale": "The text explicitly states, 'Machiavelli is not romantic about this—he understands that stability often rests on nothing more than habit. They are not content out of deep loyalty...'"}, {"text": "They believe the current ruler is exceptionally wise and capable.", "isCorrect": false, "rationale": "Inertia is not about the ruler's exceptional qualities, but the subjects' resistance to change. The text mentions 'ordinary ability' is sufficient for the prince."}, {"text": "The disruption and potential failure of revolution are too costly and risky compared to the known status quo.", "isCorrect": true, "rationale": "The text states, 'Revolution requires energy, coordination, and a reason compelling enough to overcome the risks of failure. ...They are content because disruption is costly and the current arrangement is known.'"}, {"text": "The prince actively suppresses dissent through severe punishment.", "isCorrect": false, "rationale": "While princes might suppress dissent, Machiavelli's 'inertia' explanation focuses on the subjects' disinclination to rebel when not actively oppressed, rather than a system of severe active suppression."}], "id": "q05"}, {"question": "When Machiavelli states that a hereditary prince of 'ordinary ability' can maintain his state, he implies that:", "options": [{"text": "Hereditary rule inherently attracts leaders with moderate talents.", "isCorrect": false, "rationale": "Machiavelli is not describing the qualities attracted to hereditary rule, but the minimum qualities *required* to maintain it, highlighting its ease compared to new principalities."}, {"text": "The stability of a hereditary state primarily relies on deeply entrenched systemic factors rather than exceptional individual leadership.", "isCorrect": true, "rationale": "The text specifies that 'Ordinary ability is sufficient—provided the prince does not actively give his subjects reason to hate him.' This indicates that the established 'system of governance' and 'accumulated weight of habit' (custom, legitimacy, inertia) are the primary stabilizers, not the prince's genius."}, {"text": "Exceptional wisdom or military genius would actually undermine the traditional stability.", "isCorrect": false, "rationale": "The text doesn't suggest exceptional qualities would undermine stability, but rather that they are simply 'not' required for a hereditary prince to maintain his state. The risk comes from changing what works, not necessarily from having exceptional abilities."}, {"text": "Any prince, regardless of ability, can maintain a hereditary state as long as external forces are absent.", "isCorrect": false, "rationale": "The text specifies 'ordinary ability' and the condition that the prince 'does not actively give his subjects reason to hate him.' This implies a minimum level of competence and judgment is still necessary, not 'any prince.'"}], "id": "q06"}, {"question": "The 'Power of Custom' as described in the text suggests that existing institutions are valuable because:", "options": [{"text": "They are divinely ordained and thus beyond human challenge.", "isCorrect": false, "rationale": "Machiavelli's analysis is practical and secular; he values custom for its practical wisdom and proven functionality, not divine origin."}, {"text": "They represent practical wisdom accumulated over time, having demonstrated their utility by surviving generations.", "isCorrect": true, "rationale": "The text states, 'Custom—the accumulated weight of habit, tradition, and established practice—is one of the most powerful forces in political life. ...existing institutions represent practical wisdom accumulated over time. A custom that has survived generations has demonstrated its usefulness.'"}, {"text": "They promote continuous reform and modernization, keeping the state adaptable.", "isCorrect": false, "rationale": "This is the opposite of Machiavelli's view. He argues that 'The desire to reform or modernize is often the hereditary prince's greatest enemy.'"}, {"text": "They simplify governance by requiring minimal effort from the ruling prince.", "isCorrect": false, "rationale": "While they do make governance easier ('maintain it, not improve upon it'), their value primarily comes from representing 'practical wisdom accumulated over time' and their proven 'usefulness,' rather than just being easy."}], "id": "q07"}, {"question": "What does Machiavelli identify as the *greatest danger* to a hereditary prince's rule, assuming no extraordinary external force?", "options": [{"text": "Invasion by a powerful neighboring state.", "isCorrect": false, "rationale": "This is an 'extraordinary external force,' which Machiavelli acknowledges can cause a prince to lose his state, but it is not the *greatest danger* stemming from the prince's own actions or within the state's normal operations."}, {"text": "The rise of a charismatic new political rival.", "isCorrect": false, "rationale": "While a rival could be a threat, Machiavelli's focus for hereditary states is on the prince's actions. The text doesn't highlight rivals as the greatest internal danger."}, {"text": "His own bad judgment, leading to active oppression or unnecessary change.", "isCorrect": true, "rationale": "The text states, 'The hereditary prince's greatest danger is not external enemies but his own bad judgment,' particularly by 'giv[ing] his subjects reason to hate him' or changing 'what works.'"}, {"text": "Economic stagnation and widespread poverty among his subjects.", "isCorrect": false, "rationale": "While economic issues can cause unrest, Machiavelli links the greatest danger specifically to the prince's 'bad judgment' and 'giv[ing] offense,' which encompasses actions that could lead to economic distress but is more broadly about policy choices."}], "id": "q08"}, {"question": "According to the text, what is the unique advantage a hereditary prince has, even if he loses his state to an 'extraordinary external force'?", "options": [{"text": "His established legitimacy with his former subjects, who may rally to him for reconquest.", "isCorrect": true, "rationale": "The text states, 'even if such a prince loses his state to external conquest, 'whatever misfortune may befall the occupier, he will regain it.' The hereditary prince who loses his state to an invader has the legitimacy of the old dynasty working in his favor. Subjects who resent the occupier will rally to the old family.'"}, {"text": "He typically possesses secret alliances with other powerful rulers who will aid his return.", "isCorrect": false, "rationale": "The text does not mention secret alliances as a unique advantage for reconquest; it focuses on the internal dynamic of legitimacy among the subjects."}, {"text": "His superior military training allows him to lead a swift counter-attack.", "isCorrect": false, "rationale": "The text does not attribute superior military training or ability to hereditary princes; in fact, it emphasizes 'ordinary ability' is sufficient for maintenance."}, {"text": "His wealth and resources are usually extensive enough to fund a mercenary army.", "isCorrect": false, "rationale": "While possible, the text highlights legitimacy as the key advantage for reconquest, not a general assumption of immense wealth to hire mercenaries."}], "id": "q09"}, {"question": "How does Chapter II's discussion of hereditary principalities function within the overall structure and purpose of *The Prince*?", "options": [{"text": "It serves as a concluding summary of the ideal form of governance, which Machiavelli believes is hereditary rule.", "isCorrect": false, "rationale": "The text explicitly states it's 'not an end in itself but a baseline,' and that 'Everything that follows is harder,' indicating it's not the ideal form but the simplest starting point."}, {"text": "It establishes a baseline of ease and stability to contrast with the significant challenges faced by 'new princes' discussed later.", "isCorrect": true, "rationale": "The text clearly states: 'This chapter gains its full meaning only when read alongside what follows. Everything Machiavelli says about the ease of the hereditary prince is a setup for the contrast with the new prince... It is not an end in itself but a baseline: this is the easy case.'"}, {"text": "It offers practical strategies for hereditary princes to expand their territories and influence.", "isCorrect": false, "rationale": "The focus of this chapter is on *maintaining* a hereditary state with ease, not on strategies for expansion, which would likely be discussed for new princes."}, {"text": "It provides a historical overview of successful hereditary dynasties across Europe.", "isCorrect": false, "rationale": "While it mentions Ferrara as an example, the primary function of the chapter is analytical, setting up a contrast, rather than providing a broad historical overview of dynasties."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
