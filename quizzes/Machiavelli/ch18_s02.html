<script>
var QUESTIONS = [{"question": "Machiavelli's full argument regarding whether it is better to be loved or feared ultimately concludes that:", "options": [{"text": "A prince must strive to be both loved and feared equally to secure his reign.", "isCorrect": false, "rationale": "While Machiavelli grants it would be best to be both, he insists that when the two conflict, a prince must choose, making equal achievement often impossible."}, {"text": "While being both is ideal, a prince must prioritize being feared because fear is more reliable and under the prince's control.", "isCorrect": true, "rationale": "Machiavelli states that it is safer to be feared because love is conditional and easily broken by self-interest, whereas fear is maintained by the dread of punishment, which the prince controls."}, {"text": "Love is ultimately more powerful than fear, as it inspires loyalty rather than mere obedience.", "isCorrect": false, "rationale": "This directly contradicts Machiavelli's core argument, which asserts love's unreliability due to human baseness and self-interest."}, {"text": "A prince should avoid both love and fear, instead focusing on inspiring respect through justice.", "isCorrect": false, "rationale": "Machiavelli explicitly argues for the necessity of fear, stating it is more reliable, and does not suggest avoiding both in favor of only respect."}], "id": "q01"}, {"question": "According to Machiavelli, what is the fundamental reason why love is less reliable than fear as a foundation for a prince's power?", "options": [{"text": "People are inherently courageous and will challenge a loved ruler more readily.", "isCorrect": false, "rationale": "The text does not attribute love's unreliability to courage but to self-interest and 'baseness' in breaking obligations."}, {"text": "Love is based on obligation which, due to human self-interest, is easily broken for personal advantage.", "isCorrect": true, "rationale": "The text states, 'love is preserved by the link of obligation which, owing to the baseness of men, is broken at every opportunity for their advantage.'"}, {"text": "Fear requires constant demonstration of power, which is unsustainable in the long run.", "isCorrect": false, "rationale": "Machiavelli portrays fear as more robust and less vulnerable to 'vicissitudes of fortune and human calculation' than love."}, {"text": "Love makes a ruler appear weak and vulnerable to external threats.", "isCorrect": false, "rationale": "While a prince's strength is important, the primary reason given for love's unreliability is its conditional nature tied to subjects' self-interest."}], "id": "q02"}, {"question": "The 'keyconcept' box highlights a core difference between love and fear in political psychology. This difference primarily centers on:", "options": [{"text": "The moral implications of inspiring each emotion in subjects.", "isCorrect": false, "rationale": "The focus is less on morality and more on the practical source and control of the emotion in political relationships."}, {"text": "The ease with which a prince can cultivate either sentiment among his people.", "isCorrect": false, "rationale": "The text emphasizes the source of control over the emotion, rather than the ease of cultivation."}, {"text": "Whether the emotion's persistence depends on the prince's actions or the subjects' choices.", "isCorrect": true, "rationale": "The text states, 'Love, he argues, depends on the other person—it is they who choose to love, and they who choose to stop. Fear depends on the prince—it is his capacity to punish that maintains it.'"}, {"text": "The relative intensity of the emotional response each sentiment elicits.", "isCorrect": false, "rationale": "While intensity might play a role, the key distinction highlighted is the locus of control for maintaining the emotion."}], "id": "q03"}, {"question": "Machiavelli's comparison of Cesare Borgia's actions in Romagna with Florence's approach in Pistoia illustrates which key principle?", "options": [{"text": "Merciful rulers always achieve more stable and prosperous states.", "isCorrect": false, "rationale": "Florence's attempt at mercy led to severe civil violence, demonstrating the opposite of this statement."}, {"text": "Targeted acts of severity, though appearing cruel, can prevent greater widespread suffering and disorder.", "isCorrect": true, "rationale": "Machiavelli argues that Borgia's 'cruelty' produced a more humane outcome by preventing greater suffering from disorder, while Florence's 'clemency' led to destruction."}, {"text": "Public executions are always counterproductive, leading to hatred and rebellion.", "isCorrect": false, "rationale": "Borgia used public executions, and Machiavelli praised his methods for their effectiveness, not condemning them as counterproductive when used judiciously."}, {"text": "A prince should always avoid any reputation for cruelty, regardless of the consequences.", "isCorrect": false, "rationale": "This contradicts the lesson drawn from Borgia, where a reputation for cruelty was deemed necessary and ultimately beneficial in preventing worse outcomes."}], "id": "q04"}, {"question": "How does Machiavelli use the example of Hannibal Barca to support his argument about leadership?", "options": [{"text": "To show that military success primarily depends on inspirational leadership and love from soldiers.", "isCorrect": false, "rationale": "Machiavelli explicitly highlights Hannibal's 'inhuman cruelty' and ruthless discipline, not love, as the key to his military success."}, {"text": "To demonstrate that even a diverse army can be held together for extended periods through strict discipline and fear of punishment.", "isCorrect": true, "rationale": "Machiavelli cites Hannibal's severity and willingness to execute soldiers as the quality that held his 'extraordinarily diverse army together through fifteen years of campaign.'"}, {"text": "To argue that a leader's personal virtues are more important than their methods for achieving victory.", "isCorrect": false, "rationale": "Machiavelli contrasts his view with Roman historians who praised Hannibal's virtues, emphasizing his methods over character."}, {"text": "To prove that cruelty is only effective when fighting against superior forces.", "isCorrect": false, "rationale": "The text does not specify this condition for cruelty's effectiveness; it focuses on its role in maintaining army cohesion."}], "id": "q05"}, {"question": "Machiavelli states an 'unambiguous boundary' for a prince's actions: never be hated. What specific actions does he identify as most reliably leading to deep and lasting resentment, which a prince must avoid?", "options": [{"text": "Engaging in frequent warfare or costly public works.", "isCorrect": false, "rationale": "While these might cause discontent, Machiavelli identifies more fundamental violations as leading to hatred."}, {"text": "Displaying excessive luxury or failing to consult with advisors.", "isCorrect": false, "rationale": "These are not the specific actions Machiavelli warns against as reliably leading to fatal hatred."}, {"text": "Seizing the property or violating the women of his subjects.", "isCorrect": true, "rationale": "Machiavelli explicitly states, 'the prince must never seize the property or the women of his subjects. These are the things that most reliably produce deep, lasting resentment.'"}, {"text": "Executing political rivals or imposing high taxes.", "isCorrect": false, "rationale": "Executions are shown as potentially necessary (e.g., Borgia), and while high taxes can be unpopular, they are not singled out in the same way as property and women for producing 'fatal' hatred."}], "id": "q06"}, {"question": "What is the most crucial distinction Machiavelli makes between being feared and being hated, according to the text?", "options": [{"text": "Fear is an emotion, while hatred is a rational calculation.", "isCorrect": false, "rationale": "Machiavelli discusses both emotions in terms of their practical effects, not their cognitive origins."}, {"text": "Fear allows for governance and control, while hatred leads to active rebellion and the downfall of the prince.", "isCorrect": true, "rationale": "Machiavelli states fear is 'useful' and necessary for order, but hatred is 'fatal,' making a ruler 'an enemy of the people’s most fundamental interests,' leading to his ruin."}, {"text": "Fear is easily cultivated, but hatred is difficult to suppress once aroused.", "isCorrect": false, "rationale": "While hatred is indeed difficult to suppress, the text's primary distinction focuses on the *consequences* of each emotion for the prince's power and survival."}, {"text": "Fear can be inspired by justice, but hatred is always a result of injustice.", "isCorrect": false, "rationale": "Machiavelli suggests 'severity with apparent justice and restraint' can inspire fear without hatred, implying that fear is not necessarily unjust, but the core distinction is about the practical outcomes."}], "id": "q07"}, {"question": "The opening paragraph notes that Machiavelli 'explicitly rejects' the idealist tradition. How does his central question, 'what must a ruler do to survive?', embody this rejection compared to the idealist query 'what ought a ruler to be?'", "options": [{"text": "It focuses on the moral purity of the ruler rather than their practical effectiveness.", "isCorrect": false, "rationale": "Machiavelli's question explicitly shifts away from 'what ought to be' (moral purity) towards practical survival and effectiveness."}, {"text": "It shifts the focus from theoretical ethics to pragmatic actions for political preservation.", "isCorrect": true, "rationale": "Machiavelli replaces a question about moral ideals ('what ought') with a question about practical necessity ('what must do to survive'), indicating a move from idealism to pragmatism."}, {"text": "It prioritizes the subjects' happiness over the prince's stability.", "isCorrect": false, "rationale": "Machiavelli's focus is squarely on the prince's survival and the methods required for it, not primarily the subjects' happiness."}, {"text": "It suggests that a ruler's legitimacy comes from divine right, not popular support.", "isCorrect": false, "rationale": "The text does not discuss divine right, and Machiavelli's analysis is based on observable human behavior and political realities, not supernatural claims."}], "id": "q08"}, {"question": "A prince rules a state where two powerful factions are on the verge of civil war, threatening widespread destruction. To prevent this, the prince considers a swift, decisive, and potentially brutal intervention that would quell the conflict but might earn him a reputation for cruelty. Based on Machiavelli's advice, what would be his likely recommendation?", "options": [{"text": "The prince should avoid intervention to maintain a reputation for mercy, even if it risks civil war.", "isCorrect": false, "rationale": "This aligns with the Florentine example, which Machiavelli criticized for allowing 'clemency' to lead to greater suffering and destruction."}, {"text": "The prince should intervene decisively, accepting a temporary reputation for cruelty if it prevents greater suffering and maintains order.", "isCorrect": true, "rationale": "This aligns with Cesare Borgia's lesson: 'a few targeted acts of severity can prevent the widespread suffering that results from disorder,' and a prince who shrinks from necessary harshness is negligent."}, {"text": "The prince should negotiate a peaceful settlement, as any use of force will inevitably lead to hatred.", "isCorrect": false, "rationale": "Machiavelli emphasizes decisive action to prevent disorder and states that fear, not hatred, is the desired outcome, and it can be achieved through disciplined severity."}, {"text": "The prince should seek external military aid to resolve the conflict, thus avoiding personal responsibility.", "isCorrect": false, "rationale": "Machiavelli generally advocates for a prince's self-reliance and control over his own affairs, rather than outsourcing critical state functions."}], "id": "q09"}, {"question": "The 'teachernote' highlights the distinction between Machiavelli's descriptive claim and his normative recommendation. Which of the following statements is an example of a *descriptive claim* from Machiavelli's argument as presented in the text?", "options": [{"text": "Princes should cultivate fear rather than love to secure their power.", "isCorrect": false, "rationale": "This is a normative recommendation or prescription—it tells a prince 'what they should do.'"}, {"text": "Human beings are primarily self-interested and will break obligations for their advantage.", "isCorrect": true, "rationale": "This is a descriptive claim about human nature, a fundamental observation Machiavelli makes as a premise for his argument about why love is unreliable."}, {"text": "A prince who tolerates disorder earns the title of negligent.", "isCorrect": false, "rationale": "This is a judgment or a consequence derived from Machiavelli's principles, making it a normative statement about how a prince's actions are evaluated."}, {"text": "It is safer for a prince to be feared than to be loved.", "isCorrect": false, "rationale": "While this sounds like a statement of fact, within the context of the 'teachernote,' it's presented as a conclusion or practical recommendation derived from his descriptive premises, making it lean towards the normative or prescriptive side of his argument for a ruler's actions."}], "id": "q10"}, {"question": "The study guide notes that Machiavelli draws a sharp line: fear is 'useful,' but hatred is 'fatal.' What political dynamic makes hatred so much more dangerous to a prince than fear?", "options": [{"text": "Hatred spreads by word of mouth faster than fear, making it harder to contain once it starts.", "isCorrect": false, "rationale": "While hatred can spread, Machiavelli's analysis of its danger is structural and political rather than communicative—the key is what hatred motivates subjects to do."}, {"text": "A feared prince controls subjects through predictable dread; a hated prince makes subjects into active enemies willing to take risks to overthrow him.", "isCorrect": true, "rationale": "Fear keeps subjects compliant because they calculate the cost of opposing a powerful punisher. Hatred is different: it motivates subjects to accept personal risk in order to destroy a ruler they regard as a fundamental threat to their interests. The hated prince no longer simply compels obedience—he has created a faction with a personal stake in his destruction."}, {"text": "Fear can be reduced gradually by acts of clemency, while hatred has no remedy once it takes hold.", "isCorrect": false, "rationale": "While this is partly true, Machiavelli's argument about why hatred is fatal is about active opposition rather than about the irreversibility of the emotional state per se."}, {"text": "Hatred makes foreign powers more likely to intervene, since they sense domestic vulnerability.", "isCorrect": false, "rationale": "Machiavelli does connect internal weakness to external danger elsewhere, but in this chapter the argument about hatred's fatality focuses on internal political dynamics—subjects turning against their ruler."}], "id": "q11"}, {"question": "The study guide contrasts Scipio favorably as 'an excellent man' yet uses him as a cautionary tale. What does this apparent paradox reveal about Machiavelli's framework for evaluating leaders?", "options": [{"text": "Machiavelli believes personal excellence and political effectiveness are the same thing.", "isCorrect": false, "rationale": "The Scipio example illustrates exactly the opposite: a man of excellent personal character can fail politically if his virtues are the wrong tools for his context."}, {"text": "Private moral excellence does not guarantee political effectiveness; the relevant standard for a prince is whether his qualities produce the outcomes his role requires.", "isCorrect": true, "rationale": "Scipio was a great man by conventional standards (personally excellent, beloved), but his too-great forbearance caused military disorder in Spain. Machiavelli praises him as a man while criticizing him as a commander—illustrating his core argument that political virtues must be evaluated by their political consequences, not by their moral character."}, {"text": "Machiavelli considers Roman commanders as systematically inferior to Carthaginian ones like Hannibal.", "isCorrect": false, "rationale": "The comparison is not a cultural or national ranking; it is a specific contrast in military management style used to isolate the effect of forbearance versus severity."}, {"text": "The story of Scipio proves that cruelty is always preferable to clemency, regardless of circumstances.", "isCorrect": false, "rationale": "Machiavelli is not advocating constant cruelty; his argument is context-sensitive. Scipio's error was excessive leniency in a military command context—not that clemency is always wrong."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
