</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Machiavelli.html">&larr; Back to Powers and Principalities (Machiavelli)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 22, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the primary method by which a prince gains esteem and respect?", "options": [{"text": "Maintaining strict neutrality in all conflicts to avoid making enemies.", "isCorrect": false, "rationale": "Machiavelli explicitly argues against neutrality, stating it invariably leads to ruin and makes a prince a prey to the conqueror."}, {"text": "Engaging in great enterprises and setting a fine example.", "isCorrect": true, "rationale": "The text begins by stating, 'Nothing makes a prince so much esteemed as great enterprises and setting a fine example,' citing Ferdinand of Aragon as a prime instance."}, {"text": "Avoiding all foreign entanglements to focus solely on internal stability.", "isCorrect": false, "rationale": "Machiavelli details Ferdinand's extensive foreign campaigns (Granada, Africa, Italy, France) as key to his rising renown and power, contradicting this option."}, {"text": "Delegating significant power to barons and nobles to foster loyalty.", "isCorrect": false, "rationale": "Ferdinand of Aragon's example shows him subtly acquiring power and authority over the barons of Castile, not delegating it to them."}], "id": "q01"}, {"question": "Ferdinand of Aragon's campaign against Granada served multiple purposes for his rise to power. Which of the following was NOT a direct outcome of this enterprise as described by Machiavelli?", "options": [{"text": "It diverted the attention of the Castilian barons from internal innovations.", "isCorrect": false, "rationale": "The text states Ferdinand 'held the minds of the barons of Castile occupied in thinking of the war and not anticipating any innovations,' which was a direct outcome."}, {"text": "It laid the foundation for his future military skill and experience.", "isCorrect": false, "rationale": "Machiavelli notes that by the 'long war to lay the foundation for the military skill which has since distinguished him,' making this a direct outcome."}, {"text": "It secured a strategic alliance with the French monarchy.", "isCorrect": true, "rationale": "The text does not mention an alliance with France as an outcome of the Granada campaign; in fact, Ferdinand later 'attacked France,' implying a confrontational relationship."}, {"text": "It allowed him to fund his armies using money from the Church and the people.", "isCorrect": false, "rationale": "The text explicitly states, 'He was able with the money of the Church and of the people to sustain his armies,' connecting this to the war effort."}], "id": "q02"}, {"question": "Machiavelli presents the case of Antiochus urging the Achaeans to remain neutral against the Romans. What argument did the Roman legate use to convince the Achaeans *against* neutrality?", "options": [{"text": "That by remaining neutral, they would be seen as allies of Antiochus.", "isCorrect": false, "rationale": "The Roman legate's argument was not about being seen as an ally of Antiochus, but rather about the negative consequences of neutrality for the Achaeans themselves, regardless of who wins."}, {"text": "That neutrality would leave them vulnerable and without favor from the conqueror.", "isCorrect": true, "rationale": "The Roman legate argued, 'by not interfering you will be left, without favour or consideration, the guerdon of the conqueror,' highlighting the vulnerability and lack of support neutrality would bring."}, {"text": "That taking up arms against Antiochus would guarantee a share of the spoils.", "isCorrect": false, "rationale": "While declaring allegiance is advantageous, the specific argument cited by the Roman legate focused on the dangers of neutrality, not a guaranteed share of spoils."}, {"text": "That their current alliance with Antiochus would be strengthened by their inaction.", "isCorrect": false, "rationale": "The Achaeans were friends of the Romans, not Antiochus, making this option incorrect. The Roman legate was arguing against Antiochus's proposal for neutrality."}], "id": "q03"}, {"question": "Regarding a prince's declaration of allegiance, Machiavelli argues that declaring oneself 'a true friend or a downright enemy' is always more advantageous than standing neutral. What is a key benefit of declaring allegiance if your chosen ally *loses* the conflict?", "options": [{"text": "The prince is guaranteed a safe haven by the victorious party, out of respect for their clear stance.", "isCorrect": false, "rationale": "If a prince's ally loses, the victorious party is unlikely to offer a safe haven, especially if the prince declared against them. Machiavelli states the prince 'may be sheltered by him' (the defeated ally), not the victor."}, {"text": "The prince can then easily switch allegiance to the victorious party without consequence.", "isCorrect": false, "rationale": "Machiavelli implies that taking a clear side creates a bond; switching allegiance easily would undermine the principle of being a 'true friend or a downright enemy' and likely lead to distrust."}, {"text": "The prince may be sheltered and aided by the defeated ally, becoming companions in shared misfortune.", "isCorrect": true, "rationale": "Machiavelli states, 'But if he with whom you ally yourself loses, you may be sheltered by him, and whilst he is able he may aid you, and you become companions on a fortune that may rise again.' This emphasizes the enduring bond with the defeated ally."}, {"text": "The prince will gain admiration from both sides for their courage in choosing a path.", "isCorrect": false, "rationale": "While courage is respected, the text does not suggest the victor would admire a prince who fought against them if their ally loses; the focus is on the practical benefits of declared allegiance."}], "id": "q04"}, {"question": "Machiavelli advises that a prince should 'never make an alliance with one more powerful than himself for the purposes of attacking others, unless necessity compels him.' What is the primary danger associated with such an alliance if the more powerful ally is victorious?", "options": [{"text": "The prince's own military forces will become complacent due to reliance on the stronger ally.", "isCorrect": false, "rationale": "While possible, the text focuses on a more direct political danger. The primary concern is not military complacency but loss of autonomy."}, {"text": "The more powerful ally will likely demand a disproportionately large share of the spoils.", "isCorrect": false, "rationale": "While a larger share is probable, the core danger highlighted by Machiavelli is more fundamental than just the division of spoils."}, {"text": "The prince will be at the discretion of the more powerful ally, losing their independence.", "isCorrect": true, "rationale": "Machiavelli explicitly states, 'because if he conquers you are at his discretion, and princes ought to avoid as much as possible being at the discretion of any one.' This loss of independence is the main risk."}, {"text": "The prince will be perceived as weak by other states for not fighting independently.", "isCorrect": false, "rationale": "While reputation is important, the immediate and most severe danger discussed in this specific context is the loss of political autonomy to the stronger ally."}], "id": "q05"}, {"question": "To gain renown in internal affairs, Machiavelli references Messer Bernabo da Milano. What was Bernabo's exemplary method for influencing public perception?", "options": [{"text": "He consistently lowered taxes to ensure citizen prosperity and gratitude.", "isCorrect": false, "rationale": "The text mentions encouraging commerce and agriculture by avoiding fear of taxes, but Bernabo's example is about extraordinary rewards or punishments, not tax policy."}, {"text": "He ensured equal justice for all citizens, regardless of their social standing.", "isCorrect": false, "rationale": "While justice is important, Bernabo's method was about making a public spectacle of responses to extraordinary deeds, not necessarily consistent equal justice."}, {"text": "He would notably reward or punish extraordinary actions by citizens to generate public discussion.", "isCorrect": true, "rationale": "The text states Bernabo 'would take some method of rewarding or punishing him [for extraordinary things], which would be much spoken about.' This directly aligns with the goal of generating renown through internal actions."}, {"text": "He frequently hosted lavish banquets and festivals to entertain the populace.", "isCorrect": false, "rationale": "While entertaining the people with festivals is mentioned later as a good practice, it is not the specific method attributed to Messer Bernabo da Milano for setting 'unusual examples in internal affairs.'"}], "id": "q06"}, {"question": "Machiavelli's advice that 'prudence consists in knowing how to distinguish the character of troubles, and for choice to take the lesser evil' implies which of the following about a prince's decision-making?", "options": [{"text": "A prince must always seek to avoid any trouble, regardless of the cost.", "isCorrect": false, "rationale": "The text explicitly states, 'one never seeks to avoid one trouble without running into another,' directly contradicting the idea that a prince can or should avoid all trouble."}, {"text": "The ideal course of action is always clear and perfectly safe.", "isCorrect": false, "rationale": "The text warns, 'Never let any Government imagine that it can choose perfectly safe courses; rather let it expect to have to take very doubtful ones,' refuting the idea of always clear and safe options."}, {"text": "Effective leadership often requires making difficult choices between undesirable alternatives.", "isCorrect": true, "rationale": "This aligns perfectly with the 'lesser evil' principle, which acknowledges that trouble is inevitable and a prince's wisdom lies in identifying and choosing the least harmful path among difficult options."}, {"text": "A prince should delegate all risky decisions to his most trusted advisors.", "isCorrect": false, "rationale": "While advisors are important, the text frames this as a personal attribute of prudence for the prince, implying direct engagement with difficult choices."}], "id": "q07"}, {"question": "How did Ferdinand of Aragon utilize the concept of religion in his pursuit of expanded power and authority?", "options": [{"text": "He genuinely promoted religious tolerance to gain the support of diverse populations.", "isCorrect": false, "rationale": "The text describes him using 'pious cruelty to driving out and clearing his kingdom of the Moors,' which contradicts the idea of promoting religious tolerance."}, {"text": "He used religion as a pretext or 'plea' to justify and undertake aggressive military schemes.", "isCorrect": true, "rationale": "Machiavelli states Ferdinand was 'always using religion as a plea, so as to undertake greater schemes,' and under 'this same cloak he assailed Africa, he came down on Italy, he has finally attacked France,' indicating a strategic, political use of religion."}, {"text": "He established a new state religion to consolidate his spiritual authority.", "isCorrect": false, "rationale": "The text does not mention him establishing a new state religion; rather, he leveraged existing religious sentiments for political ends."}, {"text": "He funded religious institutions extensively to gain moral legitimacy from the Church.", "isCorrect": false, "rationale": "While he used 'money of the Church and of the people to sustain his armies,' the primary use of religion mentioned was as a 'plea' for expansion, not solely for funding religious institutions."}], "id": "q08"}, {"question": "Beyond military and political strategies, Machiavelli advises a prince to be a patron of ability and encourage citizens in their callings. What is the fundamental principle behind this economic and social encouragement?", "options": [{"text": "To ensure that the prince directly profits from all commercial and agricultural ventures.", "isCorrect": false, "rationale": "The emphasis is on the citizens' motivation and the state's overall prosperity, not direct personal profit for the prince."}, {"text": "To prevent citizens from being deterred from improving their possessions or opening trade due to fear of seizure or taxes.", "isCorrect": true, "rationale": "The text explicitly states the prince should encourage 'so that the one should not be deterred from improving his possessions for fear lest they be taken away from him or another from opening up trade for fear of taxes,' indicating the removal of disincentives."}, {"text": "To create a strong, loyal merchant class that can fund the prince's future wars.", "isCorrect": false, "rationale": "While a strong economy can fund wars, the immediate stated reason is to foster peaceable practice of callings and encourage city/state honor, not solely war funding."}, {"text": "To allow the prince to abate the majesty of his rank and appear more accessible.", "isCorrect": false, "rationale": "Machiavelli concludes this section by stating the prince must 'always maintaining the majesty of his rank, for this he must never consent to abate in anything,' contradicting this option."}], "id": "q09"}, {"question": "Machiavelli advises a prince to entertain the people with festivals, esteem guilds, and show courtesy and liberality. What crucial aspect must the prince *never* neglect or diminish while engaging in these popular activities?", "options": [{"text": "The collection of taxes from all citizens, regardless of their participation in festivities.", "isCorrect": false, "rationale": "While tax collection is necessary for the state, the text does not mention it as the specific aspect to be maintained alongside liberality and festivals; it focuses on the prince's image."}, {"text": "His personal involvement in the daily administration of the state.", "isCorrect": false, "rationale": "The text does not specify daily administrative involvement but rather the maintenance of his public image and authority."}, {"text": "The majesty and dignity of his rank.", "isCorrect": true, "rationale": "Machiavelli explicitly states, 'nevertheless, always maintaining the majesty of his rank, for this he must never consent to abate in anything.' This is the critical balance for a prince combining liberality with authority."}, {"text": "His alliances with foreign powers, which must remain his top priority.", "isCorrect": false, "rationale": "While foreign alliances are crucial for a prince, this section focuses on internal conduct and the prince's image, not prioritizing foreign policy over domestic actions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
