        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Machiavelli.html">&larr; Back to Powers and Principalities (Machiavelli)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 11, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is Machiavelli's fundamental test for a prince's strength?", "options": [{"text": "His ability to form strong, lasting alliances with neighboring states.", "isCorrect": false, "rationale": "Machiavelli views reliance on allies as a sign of dependency, which is dangerous, rather than a measure of inherent strength."}, {"text": "His capacity to field an army and fight a pitched battle against any attacker in open territory.", "isCorrect": true, "rationale": "The text states Machiavelli's test is 'stark and practical: can the prince fight a pitched battle against any attacker, or must he retreat behind walls?'"}, {"text": "His skill in diplomatic negotiation to avoid all major conflicts.", "isCorrect": false, "rationale": "While diplomacy may be useful, Machiavelli's test focuses on military capacity and self-sufficiency, not conflict avoidance."}, {"text": "The extent of his treasury and financial reserves to fund long-term projects.", "isCorrect": false, "rationale": "Money is a component of strength, but the fundamental test is specifically about the capacity for open battle, which requires both men and money."}]}, {"question": "According to Machiavelli, what defines a militarily self-sufficient prince?", "options": [{"text": "The ability to hire the best mercenary forces available in the region.", "isCorrect": false, "rationale": "Machiavelli explicitly warns against mercenaries, stating they make a prince dependent and therefore more dangerous."}, {"text": "Having enough men and money to face any enemy in open battle.", "isCorrect": true, "rationale": "The key concept 'Military Self-Sufficiency' directly defines a prince as self-sufficient 'when he has enough men and money to face any enemy in open battle.'"}, {"text": "Possession of numerous fortified cities throughout his territory.", "isCorrect": false, "rationale": "Fortifications are a strategy for the *dependent* prince who cannot meet an enemy in open battle, not the defining characteristic of a self-sufficient one."}, {"text": "A formidable reputation for ruthlessness that deters potential attackers.", "isCorrect": false, "rationale": "While reputation can be important, Machiavelli's definition of military self-sufficiency focuses on tangible resources (men and money) and the ability to engage in open battle."}]}, {"question": "A prince who cannot meet an enemy in open battle is advised to rely most heavily on which of the following for long-term security?", "options": [{"text": "Seeking immediate military aid from a stronger neighboring power.", "isCorrect": false, "rationale": "This strategy leads to dependency, which Machiavelli considers precarious and dangerous, as it puts the prince at the mercy of others."}, {"text": "Cultivating the genuine loyalty and endurance of his own people during a siege.", "isCorrect": true, "rationale": "Machiavelli emphasizes that 'The critical factor, however, is the people inside the walls' and that a prince who has won their love can ask them to 'endure great hardship.'"}, {"text": "Concentrating all available resources on offensive military training and weaponry.", "isCorrect": false, "rationale": "For a prince unable to fight in open battle, the strategy is defensive—fortifying cities and enduring sieges—not offensive training."}, {"text": "Engaging in pre-emptive strikes against potential adversaries to avoid full-scale invasion.", "isCorrect": false, "rationale": "The strategy outlined for a weak prince is a defensive one focused on siege endurance, not pre-emptive offensive action."}]}, {"question": "Why does Machiavelli consider dependency on allies or mercenaries dangerous for a prince?", "options": [{"text": "It frequently leads to the prince incurring heavy financial debts that weaken the state.", "isCorrect": false, "rationale": "While financial implications might exist, Machiavelli's primary concern with dependency is the loss of autonomy and control, not just debt."}, {"text": "It diminishes the prince's reputation for ruthlessness and independent power.", "isCorrect": false, "rationale": "The text focuses on the prince's control over his fate, not primarily his reputation in this context."}, {"text": "It makes the prince subject to the will and interests of others, thereby losing control of his own fate.", "isCorrect": true, "rationale": "The text explicitly states: 'The self-sufficient prince controls his own fate; the dependent prince is at the mercy of others.'"}, {"text": "It distracts the prince from developing his own superior military capabilities.", "isCorrect": false, "rationale": "While this could be a consequence, the direct danger highlighted is the loss of control and subservience to external powers."}]}, {"question": "What characteristic of the German Free Cities does Machiavelli primarily admire as a source of their security?", "options": [{"text": "Their nominal allegiance directly to the Holy Roman Emperor, granting them protection.", "isCorrect": false, "rationale": "Their autonomy and self-governance were more crucial than mere allegiance, which could be superficial."}, {"text": "Their strategic geographic location that made them difficult to reach by invading armies.", "isCorrect": false, "rationale": "The text does not highlight their geographic location as a primary factor in their security."}, {"text": "Their immense wealth as trading centers, which allowed them to buy off attackers.", "isCorrect": false, "rationale": "While their wealth helped fund defenses, Machiavelli emphasizes their civic culture and armed citizenry more than just buying off enemies."}, {"text": "Their civic culture where armed citizens are invested in the city's independence and defense.", "isCorrect": true, "rationale": "Machiavelli observes, 'Not just their walls, but their civic culture. The citizens have a stake in the city's independence; they are armed participants in their own defense.'"}]}, {"question": "Machiavelli states that 'a prince besieged in a well-stocked city by a popular uprising has no real fortress at all.' What does this statement reveal about his view of fortifications?", "options": [{"text": "Physical fortifications are inherently unreliable and ultimately useless in any conflict.", "isCorrect": false, "rationale": "Machiavelli recommends fortifications for weak princes, acknowledging their utility, but emphasizes their limits."}, {"text": "The internal political situation and the loyalty of the people are more crucial than physical defenses.", "isCorrect": true, "rationale": "The text states, 'A fortress is only as strong as the political situation it defends' and 'the enemy is already inside' if the people are disloyal."}, {"text": "Stockpiled supplies are only effective when combined with a large professional army.", "isCorrect": false, "rationale": "The statement's focus is on the people's loyalty, not the size of the army in conjunction with supplies."}, {"text": "Sieges are an outdated and ineffective military strategy in most cases.", "isCorrect": false, "rationale": "Machiavelli outlines a strategy for *withstanding* sieges, indicating they are a relevant threat."}]}, {"question": "A new prince inherits a small state with limited military resources but a highly loyal populace. Based on Machiavelli's advice, what would be the most effective initial strategy for this prince to secure his rule?", "options": [{"text": "Immediately seek a powerful foreign patron to guarantee his state's security.", "isCorrect": false, "rationale": "This would lead to dependency, which Machiavelli warns is a dangerous position for a prince."}, {"text": "Prioritize the construction of strong city walls and the accumulation of vast reserves of supplies.", "isCorrect": false, "rationale": "While important, this is only part of the strategy. The 'most effective' strategy would leverage the existing asset of popular loyalty."}, {"text": "Invest in cultivating and maintaining the genuine loyalty of his subjects, alongside defensive preparations like fortifications.", "isCorrect": true, "rationale": "Machiavelli explicitly states that popular loyalty is the 'critical factor' during a siege and that 'the best fortress is not to be hated by the people,' combining this with material preparation for an 'invulnerable position.'"}, {"text": "Recruit a large mercenary army to deter potential invaders, despite the cost.", "isCorrect": false, "rationale": "Machiavelli views mercenaries as making a prince even more dependent and dangerous."}]}, {"question": "How does Machiavelli differentiate between the security offered by strong physical fortifications and the security offered by popular loyalty?", "options": [{"text": "Physical fortifications provide temporary protection, while popular loyalty ensures long-term economic stability.", "isCorrect": false, "rationale": "The text links popular loyalty to enduring hardship and holding out during a siege, not primarily economic stability."}, {"text": "Physical fortifications are essential for a strong prince, while popular loyalty is only relevant for a weak prince.", "isCorrect": false, "rationale": "Popular loyalty is presented as beneficial for any prince, enhancing overall resilience, not just for the weak."}, {"text": "Physical fortifications are external defenses, whereas popular loyalty creates an internal, ultimate 'fortress in every heart.'", "isCorrect": true, "rationale": "The text states, 'The prince who has the people's loyalty, by contrast, has a fortress in every heart' and 'the best fortress is not to be hated by the people.'"}, {"text": "Physical fortifications are expensive and difficult to maintain, making popular loyalty a more cost-effective alternative.", "isCorrect": false, "rationale": "Machiavelli's distinction is based on the nature and efficacy of the defense, not primarily on cost-effectiveness."}]}, {"question": "The modern concept of 'national resilience,' as mentioned in the text, most closely aligns with which of Machiavelli's ideas?", "options": [{"text": "The importance of a large standing professional army and advanced military technology.", "isCorrect": false, "rationale": "National resilience goes beyond professional forces, encompassing the broader society's capacity."}, {"text": "The ability of a state to quickly defeat any attacker in an open, decisive battle.", "isCorrect": false, "rationale": "This describes military might, whereas resilience is about the capacity to *withstand and recover* from adversity."}, {"text": "The capacity of a state and its people to withstand and recover from adversity through civic engagement.", "isCorrect": true, "rationale": "The 'note' explicitly states, 'Machiavelli's analysis here anticipates the modern concept of national resilience: the capacity of a state and its people to withstand and recover from adversity' and links it to 'civic engagement.'"}, {"text": "The necessity of strong international alliances to deter potential aggression.", "isCorrect": false, "rationale": "National resilience focuses on internal strengths and societal commitment, not external alliances which Machiavelli often views as dependency."}]}, {"question": "A prince has invested heavily in constructing impregnable walls and amassing vast reserves, but has alienated his people through oppressive policies. According to Machiavelli, what is the most significant vulnerability of this prince?", "options": [{"text": "His inability to field a professional army capable of open battle against an invader.", "isCorrect": false, "rationale": "While a weakness, the scenario emphasizes his fortifications and reserves. His *most significant* vulnerability here stems from the alienation of his people."}, {"text": "The risk of his own subjects opening the gates from the inside to an invading enemy.", "isCorrect": true, "rationale": "The text warns that a prince 'who has oppressed and alienated his people cannot make this calculation: his walls may hold, but his subjects may open the gates from the inside.'"}, {"text": "The potential for economic collapse due to overspending on fortifications and supplies.", "isCorrect": false, "rationale": "The primary vulnerability highlighted in the text for such a prince is the disloyalty of the people, not economic collapse."}, {"text": "The likelihood of attracting more powerful enemies due to his perceived wealth and resources.", "isCorrect": false, "rationale": "While possible, the immediate and most critical vulnerability described for this specific scenario relates directly to the alienated populace."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
