<script>
var QUESTIONS = [{"question": "What is the most significant change in Machiavelli's writing style and approach observed in Chapter XXVI of The Prince?", "options": [{"text": "A shift from historical analysis to purely theoretical postulates.", "isCorrect": false, "rationale": "While the focus shifts, Machiavelli still grounds his arguments in historical parallels and examples, albeit with a different tone and purpose. He moves from analysis to appeal, not from history to pure theory."}, {"text": "A transition from detached, analytical prose to an impassioned, prophetic appeal for liberation.", "isCorrect": true, "rationale": "The text explicitly states that in Chapter XXVI, 'The analysis gives way to appeal. The case studies give way to prophecy. The cool professional voice gives way to the voice of a man who is desperate for his country's liberation.'"}, {"text": "An increased focus on military strategy over political maneuvering.", "isCorrect": false, "rationale": "Both military strategy and political maneuvering are integral to Machiavelli's overall advice. The primary change in Chapter XXVI is not the subject matter emphasis, but the emotional tone and ultimate purpose of the entire work."}, {"text": "A move from universal principles of statecraft to specific advice for a single ruler.", "isCorrect": false, "rationale": "While the chapter *does* focus on Italy and a potential liberator, the most prominent change is the emotional and rhetorical shift, making the advice a passionate appeal rather than just a description of principles."}]}, {"question": "In Chapter XXVI, Machiavelli describes Italy's condition in 1513 as 'more enslaved than the Hebrews, more oppressed than the Persians, more scattered than the Athenians.' What purpose does this description primarily serve within his argument?", "options": [{"text": "To highlight the unique geopolitical vulnerabilities of the Italian peninsula.", "isCorrect": false, "rationale": "While Italy's vulnerabilities are implied, the primary purpose of these vivid comparisons is to establish the direness of the situation as a precursor to opportunity, not merely to list vulnerabilities."}, {"text": "To present Italy's extreme suffering as a crucial opportunity for a new prince to emerge as a liberator.", "isCorrect": true, "rationale": "The text states: 'But just as the suffering of the Israelites was Moses's opportunity, Italy's suffering is the opportunity of a new prince. The people are ready to follow a liberator.'"}, {"text": "To lament the decline of Italian military prowess compared to ancient civilizations.", "isCorrect": false, "rationale": "Machiavelli is indeed concerned with Italy's military state, but the quote's direct function is to illustrate the *opportunity* for a liberator that arises from severe suffering, not just to lament decline."}, {"text": "To offer a historical comparison demonstrating Italy's consistent state of foreign domination.", "isCorrect": false, "rationale": "The comparisons serve to underscore the depth of current suffering, framing it as a moment ripe for change and liberation, rather than merely stating a historical consistency."}]}, {"question": "According to the text, what is revealed as the 'deepest level' of The Prince's purpose in its final chapter?", "options": [{"text": "A comprehensive guide for maintaining power through any means necessary.", "isCorrect": false, "rationale": "This interpretation aligns with the 'cynical reading' that the final chapter actively refutes. The text clarifies that the book's deeper purpose is not just about power for its own sake."}, {"text": "An academic treatise on the nature of political power.", "isCorrect": false, "rationale": "While the book analyzes political power, the final chapter reveals a passionate, practical, and urgent goal, making it more than a detached academic treatise."}, {"text": "A handbook for tyrants seeking to establish absolute rule.", "isCorrect": false, "rationale": "The text explicitly states: 'The final chapter reveals that The Prince is not, at its deepest level, a handbook for tyrants or a defense of political amorality. It is a plea for Italian national liberation.'"}, {"text": "A fervent plea for the national liberation and unification of Italy.", "isCorrect": true, "rationale": "The keyconcept box directly states: 'The final chapter reveals that The Prince is not, at its deepest level, a handbook for tyrants or a defense of political amorality. It is a plea for Italian national liberation.'"}]}, {"question": "When Machiavelli returns to the examples of Moses, Cyrus, and Theseus in Chapter XXVI, he uses them to illustrate which core idea regarding Italy's situation?", "options": [{"text": "That great leaders are typically born into challenging circumstances.", "isCorrect": false, "rationale": "While this is often true for the figures mentioned, Machiavelli's specific point in Chapter XXVI is how the *people's* suffering creates the opportunity for such a leader, not just the leader's birth circumstances."}, {"text": "That suffering and oppression among a people create the ideal conditions for a liberator to succeed.", "isCorrect": true, "rationale": "The text states: 'Each of these great founders... succeeded because they encountered a people whose suffering had prepared the ground for liberation. Moses found the Israelites enslaved in Egypt; their slavery was the opportunity.'"}, {"text": "The importance of military strength in establishing a new state.", "isCorrect": false, "rationale": "While military strength is crucial to Machiavelli's advice, the *context* of these specific examples in Chapter XXVI is about the 'propitious' moment created by the people's suffering, making way for a founder."}, {"text": "The cyclical nature of empires and their inevitable decline.", "isCorrect": false, "rationale": "Machiavelli is focused on the immediate opportunity for liberation and renewal, not a general theory of imperial cycles in this context."}]}, {"question": "The text argues that all the advice Machiavelli provides earlier in The Prince—such as building one's own army, winning popular support, and even employing ruthlessness—is ultimately directed towards what specific end?", "options": [{"text": "Establishing a personal dynasty that can endure through generations.", "isCorrect": false, "rationale": "While securing a dynasty might be a consequence of successful rule, Machiavelli's ultimate aim, as revealed in Chapter XXVI, is not just the prince's personal power but the national good of Italy."}, {"text": "Creating the political conditions for the liberation and unification of Italy from foreign domination.", "isCorrect": true, "rationale": "The text states: 'Everything Machiavelli has argued... is advice addressed ultimately to an Italian prince who could unite the peninsula and drive out the foreigners who have been devastating it since 1494.'"}, {"text": "Demonstrating the universal principles of effective political leadership.", "isCorrect": false, "rationale": "While the book *does* demonstrate these principles, the final chapter clarifies that these principles are presented with a very specific, urgent political purpose for Italy, not just as abstract universals."}, {"text": "Securing the absolute power of the prince regardless of the people's will.", "isCorrect": false, "rationale": "Machiavelli emphasizes winning popular support and avoiding hatred, indicating that the prince's power is not meant to be absolute and divorced from the people, especially when the goal is liberation."}]}, {"question": "The text notes that Machiavelli invokes Moses in Chapter XXVI 'in a different register' compared to earlier mentions. What is this new significance of Moses?", "options": [{"text": "As an example of a prophet who failed to establish a lasting state.", "isCorrect": false, "rationale": "Moses is presented as a successful founder and liberator, not a failure. His example is used to inspire hope for Italy."}, {"text": "As a strategic model for acquiring and maintaining military power.", "isCorrect": false, "rationale": "Machiavelli cited Moses earlier as an 'armed prophet' for his military force. In Chapter XXVI, the emphasis shifts beyond just military strategy."}, {"text": "As a type, mirroring Italy's situation, representing a liberator leading a suffering people out of bondage.", "isCorrect": true, "rationale": "The text explicitly states: 'Now he invokes Moses in a different register: not as a strategic model but as a type, a figure whose story mirrors Italy's situation.'"}, {"text": "As a figure whose actions justify the use of deception for political gain.", "isCorrect": false, "rationale": "While deception might be a Machiavellian theme, it is not the specific 'different register' in which Moses is invoked in Chapter XXVI. His role as a liberator from suffering is highlighted."}]}, {"question": "How does the emotional intensity of Chapter XXVI primarily serve to 'complicate the cynical reading' of The Prince?", "options": [{"text": "It proves that Machiavelli was fundamentally a moral philosopher, not a political one.", "isCorrect": false, "rationale": "The text does not claim Machiavelli ceased to be a political philosopher; rather, it clarifies the moral and political stakes *within* his political philosophy."}, {"text": "It demonstrates that Machiavelli had personal political stakes and cared deeply about Italy's fate, rather than being a detached observer.", "isCorrect": true, "rationale": "The text states: 'A man who was simply interested in describing how power works... would not end his book with a passionate plea for the liberation of his country... Machiavelli cares. He is not neutral...'"}, {"text": "It suggests that the earlier advice on cruelty and deception was purely hypothetical and not intended for actual application.", "isCorrect": false, "rationale": "The text clarifies that Machiavelli 'still means' his earlier advice, but that its purpose is liberation, not that it was hypothetical."}, {"text": "It reveals Machiavelli's personal regret for the amoral advice given in previous chapters.", "isCorrect": false, "rationale": "There is no indication of regret; instead, the text presents a clarification of the *purpose* behind the advice, which is distinct from regret."}]}, {"question": "The text states that the ruthlessness described in The Prince 'is in the service of the liberation.' Which of the following best captures the ethical dilemma this statement presents, as discussed in the 'thinkdeeper' section?", "options": [{"text": "Whether a prince should prioritize national liberation over personal glory.", "isCorrect": false, "rationale": "While a prince's motivation is important, the 'thinkdeeper' section specifically frames the ethical issue around the *means* employed, not solely the motivation for the goal."}, {"text": "The 'dirty hands' problem: whether a noble goal can justify or explain morally questionable means.", "isCorrect": true, "rationale": "The 'thinkdeeper' section directly asks: 'Does the nobility of the goal not change the character of the means he recommends?' and the 'teachernote' calls this a 'classic “dirty hands” problem in political philosophy.'"}, {"text": "The challenge of balancing popular support with the need for decisive action.", "isCorrect": false, "rationale": "This is a practical challenge for a prince, but the 'dirty hands' dilemma focuses specifically on the *moral justification* of actions that might be considered cruel or deceptive, even for a noble end."}, {"text": "Whether the historical failure of Machiavelli's project diminishes the validity of his arguments.", "isCorrect": false, "rationale": "This is a separate, though related, question raised in the 'thinkdeeper' section. The 'dirty hands' problem is specifically about the ethics of the *means* chosen for the goal."}]}, {"question": "The 'teachernote' section emphasizes that understanding Chapter XXVI changes how students should evaluate the morally troubling advice in earlier chapters. What is the key realization that students should have?", "options": [{"text": "That Machiavelli was a product of his time, and his advice should not be judged by modern moral standards.", "isCorrect": false, "rationale": "While historical context is relevant, the 'teachernote' focuses on the *specific purpose* Machiavelli had for his advice, which is a more direct and impactful realization for evaluating the advice."}, {"text": "That the book is not merely a description of power dynamics for any tyrant, but has a specific, urgent purpose of liberating Italy.", "isCorrect": true, "rationale": "The 'teachernote' states: 'Machiavelli is not simply describing how power works for the benefit of any tyrant who might use the knowledge. He has a specific situation in mind: a peninsula in crisis... and the urgent need for a prince capable of providing the military and political unity that could drive them out.'"}, {"text": "That the advice on cruelty and deception is actually a subtle critique of political power, rather than endorsement.", "isCorrect": false, "rationale": "The text maintains that Machiavelli 'still means it,' meaning he endorses the utility of such means for his stated purpose, rather than subtly critiquing them."}, {"text": "That Machiavelli himself did not fully endorse the ruthless means he described, but included them for completeness.", "isCorrect": false, "rationale": "The text explicitly states: 'The advice about cruelty, deception, and the abandonment of conventional morality is still there, and Machiavelli still means it.'"}]}, {"question": "The 'thinkdeeper' section mentions that Machiavelli's advice was never taken by the Medici, and Italy remained divided until 1861. What does this historical outcome prompt the reader to consider?", "options": [{"text": "The limitations of political philosophy in influencing real-world events.", "isCorrect": false, "rationale": "While a broader philosophical takeaway, the 'thinkdeeper' question is more focused on the *assessment of Machiavelli's arguments* specifically given this failure."}, {"text": "Whether the failure of his project affects the assessment of his arguments.", "isCorrect": true, "rationale": "The 'thinkdeeper' section directly asks: 'Does the failure of his project affect your assessment of his arguments?'"}, {"text": "That Machiavelli's understanding of historical forces was flawed.", "isCorrect": false, "rationale": "The text doesn't suggest his understanding was flawed, but rather asks how the *outcome* impacts the evaluation of his proposals, regardless of his understanding."}, {"text": "The inherent impossibility of national unification in the Italian context.", "isCorrect": false, "rationale": "Unification *did* eventually happen, though much later, so the text does not imply inherent impossibility but rather the failure of *Machiavelli's specific project* at his time."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
