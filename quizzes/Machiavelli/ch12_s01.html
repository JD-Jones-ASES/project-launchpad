<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the most distinctive characteristic of ecclesiastical principalities compared to other forms of states he discusses?", "options": [{"text": "They are always acquired through extraordinary military capacity.", "isCorrect": false, "rationale": "The text states they are acquired either by capacity or good fortune, but the unique aspect is that they can be *held* without either, which contradicts this option."}, {"text": "They are sustained by ancient religious ordinances, making them secure regardless of the prince's conduct.", "isCorrect": true, "rationale": "Machiavelli explicitly states, 'they are sustained by the ancient ordinances of religion, which are so all-powerful... no matter how their princes behave and live.' This makes them uniquely secure and happy, without the usual requirements of defense or rule."}, {"text": "Their rulers are typically chosen through divine intervention rather than election.", "isCorrect": false, "rationale": "The text does not discuss the method of selecting ecclesiastical princes. Its focus is on how the principalities are *held* once acquired, attributing their stability to divine power and religious ordinances, not the selection process."}, {"text": "Their subjects are the most rebellious and require constant military suppression.", "isCorrect": false, "rationale": "The text states the opposite: 'subjects, although not ruled, do not care, and they have neither the desire nor the ability to alienate themselves.' This indicates extreme subject loyalty and contentment, not rebellion."}], "id": "q01"}, {"question": "Machiavelli states he will 'speak no more' of ecclesiastical principalities because:", "options": [{"text": "He lacks sufficient historical examples to analyze their unique governance.", "isCorrect": false, "rationale": "Machiavelli later provides detailed historical examples of popes like Alexander VI and Julius II, showing he does possess such knowledge. His reluctance stems from a different reason."}, {"text": "Their stability is divinely ordained, making human analysis presumptuous.", "isCorrect": true, "rationale": "Machiavelli states, 'But being upheld by powers, to which the human mind cannot reach, I shall speak no more of them, because, being exalted and maintained by God, it would be the act of a presumptuous and rash man to discuss them.' This directly reflects his stated reason."}, {"text": "He considers their influence on Italian politics to be negligible compared to other states.", "isCorrect": false, "rationale": "Machiavelli explicitly notes the significant temporal power of the Church: 'a king of France trembles before it, and it has been able to drive him from Italy, and to ruin the Venetians,' indicating a powerful, not negligible, influence."}, {"text": "He believes they are ultimately unsustainable and will collapse under their own contradictions.", "isCorrect": false, "rationale": "Machiavelli describes them as 'secure and happy,' directly contradicting the idea that he views them as unsustainable or prone to collapse."}], "id": "q02"}, {"question": "Before the rise of Alexander VI, what was a significant factor contributing to the *temporal* weakness of the Papacy in Italy?", "options": [{"text": "A lack of financial resources due to widespread corruption.", "isCorrect": false, "rationale": "While corruption might have existed, the text attributes the weakness primarily to political factors, specifically the Roman barons and the short average lifespan of popes, rather than solely financial woes."}, {"text": "The continuous invasion by foreign powers like France and Spain.", "isCorrect": false, "rationale": "Foreign powers like Charles, King of France, *entered* Italy, but the text focuses on how internal Italian potentates (including the Pope) tried to prevent this, and the Pope's internal weakness was due to Roman factions, not solely foreign invasions being the *primary* cause of papal weakness."}, {"text": "The short average lifespan of popes, which hindered long-term consolidation of power against Roman factions.", "isCorrect": true, "rationale": "The text states, 'And the short life of a pope is also a cause of weakness; for in the ten years, which is the average life of a pope, he can with difficulty lower one of the factions.' This directly links papal lifespan to the inability to suppress factions."}, {"text": "An over-reliance on spiritual authority instead of military strength.", "isCorrect": false, "rationale": "While the popes of that era might have lacked sufficient military strength, the text specifically identifies the Roman factions and the short papal lifespan as the *reasons* for their temporal weakness and inability to consolidate power, not a general philosophical over-reliance."}], "id": "q03"}, {"question": "How did the Orsini and Colonnesi factions primarily undermine the temporal power of the Papacy *before* Alexander VI?", "options": [{"text": "By forming alliances with foreign invaders to depose various popes.", "isCorrect": false, "rationale": "The text indicates that other Italian potentates used these factions to keep down the Pope, implying an internal role in maintaining papal weakness rather than direct foreign alliances to depose popes."}, {"text": "By engaging in constant internal disorder and armed conflict under the Pontiff's eyes, keeping the pontificate weak.", "isCorrect": true, "rationale": "The text explicitly states these factions 'had always a pretext for disorder, and, standing with arms in their hands under the eyes of the Pontiff, kept the pontificate weak and powerless.' This describes their method of undermining papal authority."}, {"text": "By seizing papal territories and establishing independent duchies.", "isCorrect": false, "rationale": "Their role is described as causing internal disorder and weakening the pontificate, not as direct territorial annexation on a large scale to create new duchies."}, {"text": "By converting large numbers of the populace to Protestantism, reducing the Pope's spiritual influence.", "isCorrect": false, "rationale": "This is an anachronism for the period Machiavelli is discussing and is not mentioned in the text. The conflict described is political and territorial, not religious schism."}], "id": "q04"}, {"question": "Alexander VI's actions, though intended to aggrandize his son, Duke Valentino, ultimately led to what *unintended* outcome for the Church?", "options": [{"text": "A permanent alliance between the Papacy and the French monarchy.", "isCorrect": false, "rationale": "While Alexander used the French, Pope Julius II later worked to drive the French out of Italy, indicating no permanent alliance resulted from Alexander's actions."}, {"text": "The Church inheriting the territories and strength gained through Alexander's efforts, making it more powerful.", "isCorrect": true, "rationale": "The text states, 'although his intention was not to aggrandize the Church, but the duke, nevertheless, what he did contributed to the greatness of the Church, which, after his death and the ruin of the duke, became the heir to all his labours.'"}, {"text": "The complete eradication of all noble factions within Rome.", "isCorrect": false, "rationale": "Alexander's 'chastisements' 'wiped out' the factions (meaning reduced their power significantly), but Julius II still found it necessary to keep them 'within the bounds,' implying they were not completely eradicated, but rather brought under control. The main unintended outcome was the Church's overall aggrandizement."}, {"text": "A widespread loss of spiritual authority due to his worldly pursuits.", "isCorrect": false, "rationale": "The text focuses on the *temporal* power and political consequences of Alexander's actions, not a decline in the Church's spiritual authority among the populace."}], "id": "q05"}, {"question": "How did Pope Julius II's approach to strengthening the Church *most significantly* differ from Alexander VI's intentions?", "options": [{"text": "Julius II focused solely on diplomatic negotiations, whereas Alexander VI used military force.", "isCorrect": false, "rationale": "Julius II also actively used military force, engaging in enterprises 'to gain Bologna, to ruin the Venetians, and to drive the French out of Italy,' so he did not rely solely on diplomacy."}, {"text": "Julius II aimed to strengthen the Church itself, while Alexander VI primarily sought to benefit a private person (his son).", "isCorrect": true, "rationale": "The text explicitly highlights this difference: Alexander's 'intention was not to aggrandize the Church, but the duke,' whereas Julius 'did everything to strengthen the Church and not any private person.'"}, {"text": "Julius II avoided accumulating wealth, unlike Alexander VI who amassed vast treasures.", "isCorrect": false, "rationale": "Julius II 'found the way open to accumulate money in a manner such as had never been practised before Alexander’s time' and 'improved upon' this, indicating he also accumulated wealth."}, {"text": "Julius II completely ignored the Roman factions, believing they would fade over time, unlike Alexander VI.", "isCorrect": false, "rationale": "Julius II actively managed the factions, keeping them 'within the bounds in which he found them' and prevented them from having their own cardinals, showing he did not ignore them."}], "id": "q06"}, {"question": "Beyond military conquests and financial accumulation, which strategic measure did Pope Julius II implement to maintain internal control over the Roman barons and secure the Papacy's power?", "options": [{"text": "He established a democratic council of nobles to share power and reduce factionalism.", "isCorrect": false, "rationale": "The text does not mention the establishment of a democratic council. Julius II's actions were aimed at asserting papal control, not sharing it."}, {"text": "He strictly forbade the Orsini and Colonnesi factions from having their own cardinals.", "isCorrect": true, "rationale": "The text states Julius II held 'not allowing them to have their own cardinals, who caused the disorders among them. For whenever these factions have their cardinals they do not remain quiet for long, because cardinals foster the factions in Rome and out of it...'"}, {"text": "He married off members of his own family into the major baronial houses to create lasting alliances.", "isCorrect": false, "rationale": "The text does not mention dynastic marriages as a strategy employed by Julius II. His strategies were more direct control measures."}, {"text": "He relocated the Papal seat outside Rome to escape their influence.", "isCorrect": false, "rationale": "While this occurred historically with the Avignon Papacy, it is not mentioned as a strategy used by Julius II in this text. He consolidated power *within* Rome."}], "id": "q07"}, {"question": "Which statement best describes the evolution of the Papacy's temporal power according to the provided text?", "options": [{"text": "The Papacy consistently maintained strong temporal power throughout Italian history, but its influence waned significantly after Alexander VI.", "isCorrect": false, "rationale": "The text explicitly states that 'from Alexander backwards the Italian potentates... have valued the temporal power very slightly,' indicating a period of weakness, and after Alexander VI, Julius II *further strengthened* the Papacy, leading to Pope Leo finding it 'most powerful.'"}, {"text": "From being largely disregarded by Italian potentates, the Papacy under Alexander VI and Julius II grew into a dominant force feared even by foreign kings.", "isCorrect": true, "rationale": "The text contrasts the 'little esteemed' temporal powers 'from Alexander backwards' with the later period where 'a king of France trembles before it,' directly attributing this rise to Alexander VI's actions and Julius II's improvements, which made the pontificate 'most powerful.'"}, {"text": "The Papacy's temporal power fluctuated unpredictably, never achieving stable control due to constant internal and external threats.", "isCorrect": false, "rationale": "While there were threats, the text describes a clear trajectory of increasing stability and power from Alexander VI through Julius II, culminating in a 'most powerful' pontificate for Leo X."}, {"text": "While popes like Sixtus and Alexander VI achieved temporary gains, their successes were short-lived, leading to a weaker papacy by Leo X's time.", "isCorrect": false, "rationale": "The text notes Sixtus faced 'annoyances' and Alexander's actions contributed to *lasting* greatness for the Church, with Julius II improving upon it, and Leo X finding the pontificate 'most powerful,' directly contradicting a decline by Leo's time."}], "id": "q08"}, {"question": "Considering Machiavelli's broader political philosophy, the 'ancient ordinances of religion' that sustain ecclesiastical principalities represent a deviation from which of his typical prescriptions for maintaining a state?", "options": [{"text": "The necessity for a prince to be perceived as virtuous and morally upright by his subjects.", "isCorrect": false, "rationale": "While Machiavelli advises a prince to *appear* virtuous, the unique aspect of ecclesiastical states is that they are held 'no matter how their princes behave and live,' which goes beyond mere perception. The deviation is more fundamental to the means of holding power."}, {"text": "The crucial role of a prince's capacity (virtù) and reliance on his own arms for security and governance.", "isCorrect": true, "rationale": "Machiavelli consistently emphasizes *virtù* (capacity/skill) and 'one's own arms' as essential for acquiring and holding states. Ecclesiastical principalities are unique because they 'are acquired either by capacity or good fortune, and they can be held without either' and 'have states and do not defend them; and they have subjects and do not rule them,' which directly contradicts his core tenets about princely self-reliance and military strength."}, {"text": "The importance of acquiring new territory to expand one's dominion and influence.", "isCorrect": false, "rationale": "While Machiavelli often discusses expansion, the fundamental deviation for ecclesiastical principalities is *how they are held*, not whether they expand. Their security is intrinsic, not dependent on continuous territorial gain."}, {"text": "The need to maintain alliances with other powerful states to deter aggression.", "isCorrect": false, "rationale": "Machiavelli values alliances, but the text's core point about ecclesiastical states is that they are so secure ('unguarded, are not taken from them') due to divine power that the usual political and military strategies, including alliances, are rendered secondary or unnecessary for their maintenance."}], "id": "q09"}, {"question": "According to the text, how did the ambition of prelates, specifically cardinals associated with factions like the Orsini and Colonnesi, lead to political instability among the Roman barons?", "options": [{"text": "Cardinals directly commanded baronial armies in open rebellion against the Pope.", "isCorrect": false, "rationale": "The text states cardinals 'foster the factions' and compel barons to support them, leading to 'disorders and tumults,' implying influence and instigation rather than direct military command in rebellion."}, {"text": "Their personal financial corruption drained resources, leaving the barons unable to defend their lands.", "isCorrect": false, "rationale": "The text links the 'ambitions of prelates' to disorders, but specifically through fostering factions and compelling support, not primarily through financial corruption depleting baronial resources."}, {"text": "Cardinals fostered and supported the factions both inside and outside Rome, compelling barons to take sides and causing disorders and tumults.", "isCorrect": true, "rationale": "The text clearly states, 'cardinals foster the factions in Rome and out of it, and the barons are compelled to support them, and thus from the ambitions of prelates arise disorders and tumults among the barons.'"}, {"text": "By forming their own independent ecclesiastical principalities, they fragmented the Papal States.", "isCorrect": false, "rationale": "The cardinals fostered existing factions and caused internal disorder within Rome, but there is no mention of them forming independent ecclesiastical principalities that fragmented the Papal States."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
