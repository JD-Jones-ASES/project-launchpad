<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the fundamental difference in governance between a 'prince with servants' state (like the Turk) and a 'prince with barons' state (like France)?", "options": [{"text": "The 'prince with servants' state has a larger army, while the 'prince with barons' state relies on mercenaries.", "isCorrect": false, "rationale": "The text does not discuss the size or type of army, but rather the internal power structure and loyalty. This option introduces an irrelevant detail."}, {"text": "In a 'prince with servants' state, all authority flows directly from the prince, whereas in a 'prince with barons' state, barons hold inherent power by antiquity of blood.", "isCorrect": true, "rationale": "The text explicitly states that in a 'prince with servants' state, servants assist by the prince's favour, while in a 'prince with barons' state, barons hold dignity 'by antiquity of blood and not by the grace of the prince,' recognizing them as independent lords."}, {"text": "A 'prince with servants' state is always a republic, and a 'prince with barons' state is always a monarchy.", "isCorrect": false, "rationale": "Both types are described as principalities or monarchies. The distinction is about internal power distribution, not the form of government itself."}, {"text": "The 'prince with servants' state has a parliament, while the 'prince with barons' state does not.", "isCorrect": false, "rationale": "The text does not mention parliaments. The focus is on whether subordinates hold power by the prince's favor or by independent hereditary right."}], "id": "q01"}, {"question": "Why was Alexander the Great's empire, structured similarly to the 'kingdom of the Turk' and Darius's Persia, relatively easy for his successors to hold after his death?", "options": [{"text": "Alexander had cultivated strong personal relationships with all local rulers, ensuring their loyalty.", "isCorrect": false, "rationale": "The text attributes the ease of holding to the internal structure of the state, not Alexander's personal relationships. The conquered ministers had no popular credit, making their suppression sufficient."}, {"text": "The empire's highly centralized structure meant that once Darius's family was eliminated, there were no other independent powers to rally rebellion.", "isCorrect": true, "rationale": "The text explains that in a Turk-like state, 'if once the Turk has been conquered... there is nothing to fear but the family of this prince, and, this being exterminated, there remains no one to fear, the others having no credit with the people.' Darius's empire was similar."}, {"text": "Alexander's successors were exceptionally skilled military commanders who quickly crushed any dissent.", "isCorrect": false, "rationale": "The text explicitly states that ease of holding 'is not occasioned by the little or abundance of ability in the conqueror, but by the want of uniformity in the subject state.' Successors' ambition caused internal strife, not external rebellion."}, {"text": "The vast geographical expanse of the empire made organized rebellion impossible.", "isCorrect": false, "rationale": "The text does not cite geography as the reason for ease of holding, but rather the centralized nature where all authority derived from the defeated prince, leaving no independent power base for rebellion."}], "id": "q02"}, {"question": "A conqueror planning to invade a state structured like the 'kingdom of the Turk' should primarily focus on which strategy?", "options": [{"text": "Seeking out discontented local barons to aid in opening the way into the state.", "isCorrect": false, "rationale": "This strategy applies to France-like states where barons hold independent power. In a Turk-like state, ministers are servants without popular credit and difficult to corrupt effectively for rebellion."}, {"text": "Relying on their own military strength to defeat the prince's forces, as internal allies or rebellions are unlikely to be effective.", "isCorrect": true, "rationale": "The text states, 'he who attacks the Turk must bear in mind that he will find him united, and he will have to rely more on his own strength than on the revolt of others.' Ministers, being 'slaves and bondmen,' cannot effectively carry the people with them."}, {"text": "Dividing the kingdom into smaller, easily manageable administrative units before invading.", "isCorrect": false, "rationale": "This is a post-conquest administrative strategy, not an invasion strategy. The Turk already divides his kingdom into sanjaks, but this doesn't make invasion easier for an outsider."}, {"text": "Negotiating a peaceful surrender with the prince's ministers by offering them better positions.", "isCorrect": false, "rationale": "The text notes ministers are 'difficult to corrupt' and even if corrupted, 'one can expect little advantage from them... as they cannot carry the people with them,' implying negotiation would be ineffective."}], "id": "q03"}, {"question": "What is the primary reason holding a newly conquered 'France-like' state proves to have 'infinite difficulties' for the conqueror?", "options": [{"text": "The original prince's family is too large to fully exterminate.", "isCorrect": false, "rationale": "The text states that 'Nor is it enough for you to have exterminated the family of the prince,' indicating the problem extends beyond the prince's direct lineage."}, {"text": "The independent barons, even those who assisted the conqueror or were crushed, retain their popular credit and can continuously lead new rebellions.", "isCorrect": true, "rationale": "The text clearly explains that 'the lords that remain make themselves the heads of fresh movements against you, and as you are unable either to satisfy or exterminate them, that state is lost whenever time brings the opportunity.'"}, {"text": "The cultural differences between the conqueror and the subjects are too vast to overcome.", "isCorrect": false, "rationale": "The text focuses on political structure, not cultural differences, as the source of difficulty in holding a state."}, {"text": "Such states typically have an extremely well-organized national military that is hard to suppress long-term.", "isCorrect": false, "rationale": "The difficulty arises from the internal decentralized power structure with autonomous barons, not the strength of a national military."}], "id": "q04"}, {"question": "The historical example of the Romans in Spain, France, and Greece illustrates what principle regarding states like France?", "options": [{"text": "That foreign rule is always inherently unstable, regardless of the state's structure.", "isCorrect": false, "rationale": "The text contrasts this with Alexander's secure holding of a centralized empire, indicating that stability depends on structure, not just foreign rule."}, {"text": "That decentralized states can eventually be securely held if the memory of their former principalities fades over a long period of imperial control.", "isCorrect": true, "rationale": "The text states, 'as long as the memory of them endured, the Romans always held an insecure possession; but with the power and long continuance of the empire the memory of them passed away, and the Romans then became secure possessors.'"}, {"text": "That military might alone is sufficient to suppress all rebellions in decentralized territories.", "isCorrect": false, "rationale": "The text implies a long-term process of memory fading, not just raw military might, was key to Roman security. Initial rebellions were frequent despite Roman power."}, {"text": "That conquering these states requires the extermination of the entire population.", "isCorrect": false, "rationale": "The text refers to the extermination of the 'family of the former lord' and the fading of 'memory' of local principalities, not mass population elimination."}], "id": "q05"}, {"question": "In a 'prince and barons' state, what is the primary source of the barons' dignity and authority over their subjects?", "options": [{"text": "They derive all their power directly from the prince's favor and permission, acting as his appointed ministers.", "isCorrect": false, "rationale": "This describes the 'prince with servants' model. The text explicitly states barons 'hold that dignity by antiquity of blood and not by the grace of the prince.'"}, {"text": "Their authority comes from their accumulated wealth and personal influence within the kingdom.", "isCorrect": false, "rationale": "While wealth might play a role, the text specifically identifies 'antiquity of blood' as the source of their dignity and the reason their subjects recognize them as lords."}, {"text": "Their status is primarily based on their military prowess and control over local armies.", "isCorrect": false, "rationale": "The text emphasizes 'antiquity of blood' and 'natural affection' from their subjects, not solely military strength, as the foundation of their dignity."}, {"text": "Their dignity is rooted in antiquity of blood, granting them inherent prerogatives and recognition by their own subjects.", "isCorrect": true, "rationale": "The text states that barons 'hold that dignity by antiquity of blood and not by the grace of the prince. Such barons have states and their own subjects, who recognize them as lords and hold them in natural affection.'"}], "id": "q06"}, {"question": "How does Machiavelli assess the value of corrupting the prince's ministers in a 'Turk-like' state for a potential conqueror?", "options": [{"text": "It is an easy and highly effective way to gain popular support for an invasion.", "isCorrect": false, "rationale": "The text states that ministers are 'difficult to corrupt' and even if corrupted, 'one can expect little advantage from them... as they cannot carry the people with them' due to their status as slaves/bondmen."}, {"text": "It is difficult to corrupt them, and even if successful, they have little ability to sway the populace to support the conqueror.", "isCorrect": true, "rationale": "The text explains, 'for his ministers, being all slaves and bondmen, can only be corrupted with great difficulty, and one can expect little advantage from them when they have been corrupted, as they cannot carry the people with them.'"}, {"text": "It is a crucial first step, as their defection will immediately destabilize the entire state.", "isCorrect": false, "rationale": "The text argues the opposite, stating they cannot carry the people with them, thus their defection would not destabilize the state significantly from the people's perspective."}, {"text": "It is only effective if the ministers are also of noble blood, which is rare in such a state.", "isCorrect": false, "rationale": "The text characterizes ministers as 'slaves and bondmen,' indicating they are not of noble blood and do not hold independent dignity."}], "id": "q07"}, {"question": "Machiavelli concludes that the ease or difficulty of holding a newly acquired state is primarily determined by:", "options": [{"text": "The military prowess and 'ability in the conqueror.'", "isCorrect": false, "rationale": "The text explicitly states, 'this is not occasioned by the little or abundance of ability in the conqueror, but by the want of uniformity in the subject state.'"}, {"text": "The loyalty of the conquered populace to their previous ruler.", "isCorrect": false, "rationale": "While loyalty plays a role, the text focuses on the structure that generates this loyalty in different states, rather than just the sentiment itself."}, {"text": "The internal structure and uniformity (or lack thereof) of the conquered state.", "isCorrect": true, "rationale": "The text's concluding sentence states: 'this is not occasioned by the little or abundance of ability in the conqueror, but by the want of uniformity in the subject state.'"}, {"text": "The size and geographical location of the conquered territory.", "isCorrect": false, "rationale": "The text does not highlight size or geography as the primary determinants, but rather the political structure of governance."}], "id": "q08"}, {"question": "Imagine a conqueror successfully invades a state similar to France by enlisting the help of several discontented barons. According to Machiavelli, what immediate challenge will the conqueror face after the initial victory?", "options": [{"text": "The inability to find any suitable local administrators, as all skilled individuals were loyal to the former prince.", "isCorrect": false, "rationale": "The text does not mention a lack of administrators. The difficulty lies in the independent power of the barons themselves, not administrative capacity."}, {"text": "Infinite difficulties 'both from those who have assisted you and from those you have crushed,' as the remaining lords will lead new movements.", "isCorrect": true, "rationale": "The text states: 'if you wish to hold it afterwards, you meet with infinite difficulties, both from those who have assisted you and from those you have crushed. Nor is it enough for you to have exterminated the family of the prince, because the lords that remain make themselves the heads of fresh movements against you.'"}, {"text": "The swift and united counter-attack from neighboring centralized empires, wary of the new power.", "isCorrect": false, "rationale": "The text focuses on internal challenges within the conquered state, not external threats from neighbors."}, {"text": "A sudden collapse of the economic infrastructure due to the change in leadership.", "isCorrect": false, "rationale": "The text does not discuss economic implications of conquest; its focus is on political stability and control."}], "id": "q09"}, {"question": "The reference to Pyrrhus and 'many more' who struggled to keep acquisitions, despite potentially having 'abundance of ability,' serves to reinforce which of Machiavelli's arguments?", "options": [{"text": "That even the most skilled conquerors are destined to fail in the long run.", "isCorrect": false, "rationale": "Machiavelli is not arguing for universal failure, but explaining why some succeed (Alexander) and others fail, tying it to state structure."}, {"text": "That a conqueror's personal attributes are secondary to the internal structure of the state being conquered when it comes to long-term retention.", "isCorrect": true, "rationale": "The text concludes by stating, 'this is not occasioned by the little or abundance of ability in the conqueror, but by the want of uniformity in the subject state,' directly referencing Pyrrhus as an example."}, {"text": "That prolonged warfare invariably exhausts the resources of any conqueror.", "isCorrect": false, "rationale": "The text discusses the difficulties in holding due to state structure, not the exhaustion from warfare itself."}, {"text": "That empires built quickly are inherently unstable and prone to collapse.", "isCorrect": false, "rationale": "Alexander's empire was built quickly and held securely, demonstrating that speed of conquest isn't the issue; the state's internal structure is."}], "id": "q10"}, {"question": "Machiavelli says that in a Turk-like state, a usurper 'cannot be called in by the princes of the kingdom.' Why is this the case, and what does it imply about the conquest strategy?", "options": [{"text": "Because the Turk's princes are too loyal to consider treason under any circumstances.", "isCorrect": false, "rationale": "Loyalty is not cited as the reason — the issue is structural. The ministers are not independent princes with their own subjects; they are servants whose authority depends entirely on the sultan."}, {"text": "Because the ministers hold no independent authority and cannot deliver popular defection to the invader's side, making internal invitation useless.", "isCorrect": true, "rationale": "The text explains that ministers are 'slaves and bondmen' with no popular credit of their own. Even if they wished to 'invite in' a conqueror, they cannot carry the people with them — so their invitation is worthless as a conquest tool."}, {"text": "Because the Turk executes any minister who communicates with foreign powers.", "isCorrect": false, "rationale": "While fear of the prince might be a factor, Machiavelli's argument is structural: the ministers simply do not have the independent popular authority that would make their invitation valuable to a conqueror."}, {"text": "Because the ministers speak different languages from the foreign conqueror.", "isCorrect": false, "rationale": "Language barriers are not part of Machiavelli's argument. The issue is entirely about the structure of authority and popular loyalty."}], "id": "q11"}, {"question": "Machiavelli uses the Turkish administrative system of 'sanjaks' as evidence for his argument about centralized states. What does the prince's ability to 'shift and change' administrators illustrate?", "options": [{"text": "That the Turkish system is inefficient because it constantly disrupts local governance.", "isCorrect": false, "rationale": "Machiavelli presents this as a feature supporting centralized authority, not a flaw. The ability to rotate administrators shows that no administrator has time to build an independent power base."}, {"text": "That administrators in a centralized state hold no permanent claim to their positions and therefore cannot accumulate independent authority over time.", "isCorrect": true, "rationale": "The prince's ability to 'shift and change them as he chooses' prevents any administrator from developing the long-standing local loyalty that barons in France possess — their power is purely positional, not personal or hereditary."}, {"text": "That the Turkish empire is geographically too large for any single administrator to manage.", "isCorrect": false, "rationale": "The division into sanjaks is about administrative control, not geographical difficulty. Machiavelli's point is about the structure of authority, not the practicalities of empire management."}, {"text": "That frequent transfers build a corps of experienced administrators who know the whole empire.", "isCorrect": false, "rationale": "Machiavelli's argument is about power, not administrative expertise. The rotation prevents the accumulation of independent local loyalty, which is the key strategic point."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
