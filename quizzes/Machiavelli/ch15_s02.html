<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the fundamental shift in focus in Chapter XIV of The Prince?", "options": [{"text": "From the history of various principalities to predictions about future states.", "isCorrect": false, "rationale": "The text indicates a shift to the prince's internal qualities and actions, not a move to predictions about future states."}, {"text": "From the prince's external conditions and methods of acquisition to his internal qualities and necessary actions.", "isCorrect": true, "rationale": "Chapter XIV marks a structural pivot from 'external conditions a prince must understand and manage' to 'the prince himself: what must he be? What must he do? What qualities must he cultivate?'"}, {"text": "From the roles of military allies to the specific threats posed by foreign enemies.", "isCorrect": false, "rationale": "While military matters are discussed, the primary shift is broader, concerning the prince's personal qualities and duties, not just a change in focus regarding external actors."}, {"text": "From the challenges of acquiring power to the methods of maintaining economic prosperity.", "isCorrect": false, "rationale": "The shift is not about economic prosperity but about the prince's personal virtues and military competence, which are essential for maintaining power, not just economic stability."}]}, {"question": "Machiavelli controversially places the soldier's craft first among a prince's studies. Why does he prioritize military competence over traditional virtues like justice or wisdom?", "options": [{"text": "He believes these other qualities are inherently less important for effective governance in any state.", "isCorrect": false, "rationale": "The text states Machiavelli is 'not indifferent to the other qualities,' implying he values them, but only after military competence."}, {"text": "He asserts that without military competence, a prince cannot defend his state, rendering all other virtues irrelevant to maintaining power.", "isCorrect": true, "rationale": "Machiavelli explicitly states that 'without military competence, all other qualities are irrelevant. A prince who is wise, just, and pious but who cannot defend his state will lose it, along with his wisdom, justice, and piety.'"}, {"text": "He suggests that military skill is the only quality a prince needs to earn the respect of his subjects and foreign powers.", "isCorrect": false, "rationale": "While military skill earns respect, the text emphasizes it as the foundation for *retaining* the state and the relevance of other virtues, not as the *only* necessary quality."}, {"text": "He thinks that war is the natural and constant state of all political entities, making other virtues impractical in practice.", "isCorrect": false, "rationale": "The text emphasizes the necessity of military readiness for survival and power, but it doesn't make a broader philosophical claim about war being the *natural* state of all entities, nor that other virtues are *impractical* in all cases."}]}, {"question": "When Machiavelli claims 'a prince ought to have no other aim or thought, nor select anything else for his study, than war and its rules and discipline,' what is the underlying reason for this extreme emphasis?", "options": [{"text": "He believes that all political conflicts can ultimately be resolved through military might, making other forms of statecraft secondary.", "isCorrect": false, "rationale": "The emphasis is on military skill as the *foundation* of power, not necessarily as the sole means of conflict resolution."}, {"text": "He understands that political power is fundamentally coercive and ultimately depends on the credible threat of organized force.", "isCorrect": true, "rationale": "The text explains, 'Because political power is ultimately coercive, and coercive power depends on the credible threat of organized force.'"}, {"text": "He wants to discourage princes from engaging in diplomacy or economic policies, as these distract from the core duty of warfare.", "isCorrect": false, "rationale": "The text does not suggest discouraging diplomacy or economics, but rather establishing military competence as the prerequisite that allows for effective engagement in these other areas."}, {"text": "He sees military prowess as the sole path to achieving widespread international respect and avoiding alliances.", "isCorrect": false, "rationale": "While military strength earns respect, the primary reason given is the internal stability and coercive power of the state, not solely international reputation or avoiding alliances."}]}, {"question": "A contemporary ruler, seeking to optimize efficiency, decides to fully delegate all military strategy and command to a highly competent general staff, believing his role is solely political and administrative. How would Machiavelli likely evaluate this decision based on his advice?", "options": [{"text": "He would commend the ruler for focusing on his strengths and trusting experts, as long as the general staff is loyal.", "isCorrect": false, "rationale": "Machiavelli explicitly states a prince 'cannot outsource his military expertise to a general any more than he can outsource his political judgment to a minister and remain the actual ruler.'"}, {"text": "He would warn that such delegation undermines the ruler's personal authority and exposes the state to significant strategic vulnerabilities.", "isCorrect": true, "rationale": "Machiavelli emphasizes that 'military expertise is not merely one skill among many for a prince; it is the foundation on which all other authority rests' and warns against outsourcing it, citing risks like being 'despised by soldiers, exploited by generals, and manipulated by allies.'"}, {"text": "He would advise the ruler to closely monitor the general staff but ultimately trust their decisions, given their competence.", "isCorrect": false, "rationale": "Close monitoring is good, but Machiavelli insists on the prince's personal and continuous engagement and understanding, not just oversight."}, {"text": "He would suggest that this approach is acceptable only if the ruler himself possesses a strong personal military background from prior experience.", "isCorrect": false, "rationale": "While a background helps, the text stresses ongoing study and practice, implying past experience alone is insufficient for perpetual delegation."}]}, {"question": "According to Machiavelli, why is hunting a crucial physical training activity for a prince during peacetime?", "options": [{"text": "It provides an opportunity for the prince to display his wealth and prowess to his subjects, garnering popular support.", "isCorrect": false, "rationale": "The text focuses on practical military benefits, not public display or popularity through wealth."}, {"text": "It develops stamina, navigational skills, the ability to read terrain, and endurance vital for military campaigns and territorial knowledge.", "isCorrect": true, "rationale": "The text states hunting 'develops stamina, navigational skill, the ability to read terrain, and the endurance to operate in harsh conditions' and helps a prince 'learns the landscape of his own territory.'"}, {"text": "It allows the prince to practice his marksmanship, which is directly transferable to battlefield combat and personal defense.", "isCorrect": false, "rationale": "While marksmanship might be a byproduct, the text emphasizes broader physical fitness, terrain knowledge, and endurance, not just shooting skill."}, {"text": "It is a traditional noble pastime that maintains the prince's connection to aristocratic customs and traditions.", "isCorrect": false, "rationale": "Machiavelli's reasoning is entirely pragmatic and military-focused, not based on tradition or aristocratic customs."}]}, {"question": "When Machiavelli recommends studying great commanders like Alexander and Caesar, what is his primary objective for the prince's mental training?", "options": [{"text": "To inspire the prince with heroic tales of past military glory and valor.", "isCorrect": false, "rationale": "The text explicitly states these commanders should be studied 'not as exemplars of heroic deeds to be admired and forgotten.'"}, {"text": "To provide case studies for analytical application, helping the prince learn from historical successes and failures and apply those lessons.", "isCorrect": true, "rationale": "Machiavelli advises studying commanders 'as case studies to be analyzed and applied,' asking 'what did this commander do, why did he do it, and what can I learn from his success or failure?'"}, {"text": "To encourage the prince to emulate their exact strategies and tactics, as they are proven methods of warfare.", "isCorrect": false, "rationale": "Direct emulation might be risky given changing contexts; the emphasis is on analysis and learning transferable principles, not copying exact strategies."}, {"text": "To demonstrate the historical continuity of military tactics across different eras, ensuring the prince understands foundational principles.", "isCorrect": false, "rationale": "While understanding foundational principles is part of it, the main thrust is active analysis for application to *current* challenges, not just observing continuity."}]}, {"question": "The example of Francesco Sforza and his descendants is used by Machiavelli to illustrate what key principle?", "options": [{"text": "That military genius is a hereditary trait that guarantees a dynasty's success for generations.", "isCorrect": false, "rationale": "The Sforza descendants *lost* the duchy because they 'abandoned the labors of the military,' directly contradicting the idea of hereditary genius guaranteeing success."}, {"text": "That military skill, or virtù in the military domain, is non-transferable and must be continuously cultivated and renewed by each generation.", "isCorrect": true, "rationale": "The text explicitly states, 'The lesson: virtù in the military domain is non-transferable' and 'military skill cannot be stored. It must be constantly maintained through study and practice.'"}, {"text": "That a strong military foundation makes a state immune to all external threats and challenges.", "isCorrect": false, "rationale": "While a strong military is crucial for defense, the Sforza example highlights the *maintenance* of that strength, not immunity to all threats once achieved."}, {"text": "That a prince should prioritize economic development over military expenditure to secure his state long-term.", "isCorrect": false, "rationale": "The Sforza example is precisely about the *neglect* of military arts leading to loss, contrary to prioritizing economic development over military."}]}, {"question": "The 'Renaissance Military Revolution' historical context highlights the urgency of Machiavelli's advice regarding a prince's personal military understanding. Why was this understanding especially critical during this period?", "options": [{"text": "The advent of new gunpowder weapons, advanced formations, and tactics made traditional military knowledge obsolete and dangerous to rely upon.", "isCorrect": true, "rationale": "The text states that developments like 'Swiss pike formations, French artillery, and Spanish infantry tactics... made the old condottieri style of warfare obsolete almost overnight' and that 'a prince who relied on experienced but outdated commanders risked being blindsided by new methods.'"}, {"text": "The declining importance of cavalry meant princes needed to personally lead infantry formations from the front lines.", "isCorrect": false, "rationale": "While cavalry declined, the core issue was the *transformation* of warfare and the need for a prince to *understand* it, not specifically to lead infantry from the front."}, {"text": "Increased battle lethality required princes to participate directly in combat to inspire their troops and demonstrate bravery.", "isCorrect": false, "rationale": "The text emphasizes the prince's need to *understand* military matters to avoid miscalculations and weakness, not necessarily to engage directly in combat for inspiration."}, {"text": "The rise of mercenary forces (condottieri) meant princes had to personally manage contracts and loyalty to prevent betrayal.", "isCorrect": false, "rationale": "The text states the 'condottieri style of warfare obsolete almost overnight,' indicating their decline, not a new need for managing them personally."}]}, {"question": "Machiavelli states, 'The great founder's qualities must be renewed in each generation, or the inheritance decays.' What does this statement imply about the nature of virtù?", "options": [{"text": "Virtù is primarily a matter of inherited talent, which naturally fades over time if not constantly exercised.", "isCorrect": false, "rationale": "The text states 'virtù in the military domain is non-transferable,' which contradicts the idea of it being an 'inherited talent.' It emphasizes *renewal*, implying active cultivation."}, {"text": "Virtù is an active, cultivated quality that requires continuous effort, study, and practice in each generation, rather than being a static inheritance.", "isCorrect": true, "rationale": "The statement directly implies that *virtù* is not passively inherited ('must be renewed') but requires active maintenance ('stopped working to deserve their position') in each generation, aligning with the Sforza example of lost skill."}, {"text": "Virtù is a temporary state of good fortune that eventually runs out for any dynasty, regardless of their efforts.", "isCorrect": false, "rationale": "Machiavelli distinguishes *virtù* (skill/ability) from *fortune* (luck). The statement links decay to the *lack of renewal* of qualities, not simply the running out of fortune."}, {"text": "Virtù is a collective characteristic of a state's leadership, not tied to any single individual prince.", "isCorrect": false, "rationale": "The text consistently focuses on the *prince's* personal qualities and expertise ('a prince ought to have no other aim or thought... than war'), not a collective leadership trait."}]}, {"question": "Imagine a prince who is known for his profound wisdom, unwavering justice, and deep piety, and is beloved by his people. However, he finds the details of military affairs tedious and relies entirely on his elderly, traditionally-trained generals for defense. Based on Machiavelli's principles in this section, what is the most likely outcome for this prince?", "options": [{"text": "His wisdom and justice will inspire such loyalty that his state will be secure against all threats, despite his military delegation.", "isCorrect": false, "rationale": "Machiavelli explicitly argues that without military competence, 'all other qualities are irrelevant' and a prince will 'lose it, along with his wisdom, justice, and piety.'"}, {"text": "His state is highly vulnerable to external aggression and strategic miscalculations, likely leading to its loss, regardless of his other virtues.", "isCorrect": true, "rationale": "Machiavelli states an ignorant prince will be 'despised by soldiers, exploited by generals, and manipulated by allies,' make 'strategic miscalculations,' and 'the perception of military weakness will invite the aggression it fears.' The 'elderly, traditionally-trained generals' further implies a risk in the 'Renaissance Military Revolution' context."}, {"text": "He will achieve lasting peace through diplomacy and alliances, as his moral character will deter potential enemies.", "isCorrect": false, "rationale": "Machiavelli emphasizes the coercive nature of power and the necessity of force; moral character alone is insufficient deterrence without military backing."}, {"text": "His generals, out of respect for his virtues, will innovate and adapt to ensure the state's security and overcome their traditional training.", "isCorrect": false, "rationale": "The text warns against being 'exploited by generals' and the dangers of 'experienced but outdated commanders' in a changing military landscape, making this outcome highly unlikely."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
