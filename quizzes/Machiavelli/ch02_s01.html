<script>
var QUESTIONS = [{"question": "According to Machiavelli at the outset of The Prince, what are the two fundamental kinds of governments that have held and hold rule over men?", "options": [{"text": "Monarchies and Democracies", "isCorrect": false, "rationale": "Machiavelli's initial classification in this text is more specific, focusing on republics and principalities, rather than the broader terms 'monarchies' or 'democracies'."}, {"text": "Republics and Principalities", "isCorrect": true, "rationale": "The text explicitly states: 'All states, all powers, that have held and hold rule over men have been and are either republics or principalities.'"}, {"text": "Empires and Kingdoms", "isCorrect": false, "rationale": "While empires and kingdoms are types of states, they are not the fundamental, exhaustive division Machiavelli introduces at the beginning of the text."}, {"text": "Feudal states and City-states", "isCorrect": false, "rationale": "These are historical forms of governance but do not represent Machiavelli's primary, overarching classification of 'all states, all powers' mentioned in the text."}], "id": "q01"}, {"question": "What is the defining characteristic that distinguishes a hereditary principality from other forms of principalities?", "options": [{"text": "It was acquired through conquest by the current prince.", "isCorrect": false, "rationale": "Acquisition through conquest describes a 'new' principality, not a 'hereditary' one. Hereditary principalities are those where the family has been long established."}, {"text": "Its ruler is elected by the people.", "isCorrect": false, "rationale": "Election by the people is characteristic of republics, or potentially some forms of new principalities, but not a hereditary principality, which is based on an established ruling family."}, {"text": "The ruling family has been long established.", "isCorrect": true, "rationale": "The text defines hereditary principalities as those 'in which the family has been long established'."}, {"text": "It is a new acquisition added to an existing state.", "isCorrect": false, "rationale": "This describes a 'new principality' that is 'annexed to the hereditary state of the prince who has acquired them,' which is distinct from a hereditary principality itself."}], "id": "q02"}, {"question": "Machiavelli cites Francesco Sforza's acquisition of Milan as an example of which specific type of principality?", "options": [{"text": "A hereditary principality.", "isCorrect": false, "rationale": "Francesco Sforza rose to power from condottiere, indicating a new acquisition, not a long-established hereditary rule."}, {"text": "A new principality that is entirely new.", "isCorrect": true, "rationale": "The text explicitly states: 'The new are either entirely new, as was Milan to Francesco Sforza'."}, {"text": "A principality annexed to an existing state.", "isCorrect": false, "rationale": "Annexed principalities are described as 'members annexed to the hereditary state of the prince who has acquired them,' like the Kingdom of Naples to the King of Spain, which is different from Sforza's independent acquisition of Milan."}, {"text": "A republic transformed into a principality.", "isCorrect": false, "rationale": "While Milan might have been a republic before Sforza, the text specifically uses this example to illustrate an 'entirely new' principality, not the transformation process itself."}], "id": "q03"}, {"question": "The Kingdom of Naples being acquired by the King of Spain is used by Machiavelli as an example of what kind of principality?", "options": [{"text": "An entirely new principality established by conquest.", "isCorrect": false, "rationale": "An 'entirely new' principality, like Milan to Sforza, implies a complete change of sovereignty for the entire state, not an addition to an existing one."}, {"text": "A hereditary principality passed down through generations.", "isCorrect": false, "rationale": "The acquisition implies a change of rule, making it a new dominion for the acquiring prince, not a long-established hereditary state for him."}, {"text": "A new principality annexed to an existing hereditary state.", "isCorrect": true, "rationale": "The text states: 'or they are, as it were, members annexed to the hereditary state of the prince who has acquired them, as was the kingdom of Naples to that of the King of Spain.'"}, {"text": "A state acquired solely through the fortune of the prince.", "isCorrect": false, "rationale": "While fortune might play a role, this example primarily illustrates the structural classification of an annexed principality, rather than the specific method of acquisition."}], "id": "q04"}, {"question": "A prince gains control over a new territory primarily because a powerful neighboring kingdom intervened militarily on his behalf, allowing him to easily take power. According to Machiavelli's classification, how was this dominion primarily acquired?", "options": [{"text": "By the arms of the prince himself.", "isCorrect": false, "rationale": "The scenario specifies that the neighboring kingdom intervened militarily, not the prince's own forces."}, {"text": "By the arms of others.", "isCorrect": true, "rationale": "The text lists methods of acquisition as 'either by the arms of the prince himself, or of others...' In this scenario, the intervention by a neighboring kingdom constitutes 'arms of others'."}, {"text": "By fortune.", "isCorrect": false, "rationale": "While good luck (fortune) might contribute to the success, the direct cause identified is the military intervention of others, which is a more specific category Machiavelli provides."}, {"text": "By ability (virtù).", "isCorrect": false, "rationale": "Ability (virtù) implies the prince's own skill, strength, or wisdom in acquiring the state, which is not the primary factor described in this scenario."}], "id": "q05"}, {"question": "Machiavelli notes that acquired dominions are 'either accustomed to live under a prince, or to live in freedom.' Why is this distinction crucial for a new prince taking control?", "options": [{"text": "It determines the maximum tax rate the new subjects can bear.", "isCorrect": false, "rationale": "The text does not discuss taxation based on this distinction; it relates to the prior political habits of the dominion's people."}, {"text": "It indicates the level of inherent resistance or ease of governance the prince might anticipate.", "isCorrect": true, "rationale": "A people accustomed to living in freedom are likely to resist new princely rule more fiercely than those already accustomed to a prince, making this a crucial factor for a new ruler to consider in maintaining power."}, {"text": "It dictates whether the principality can ever become hereditary or must remain new.", "isCorrect": false, "rationale": "This distinction describes the dominion's past government, not its future classification as hereditary or new. Any new principality could potentially become hereditary over time."}, {"text": "It specifies the type of diplomatic alliances the prince must forge.", "isCorrect": false, "rationale": "While alliances are important, the distinction in the text relates to the internal governance challenges posed by the dominion itself, not external diplomatic needs."}], "id": "q06"}, {"question": "Based on the provided section, what is Machiavelli's primary objective in outlining these classifications of states and principalities?", "options": [{"text": "To advocate for the superiority of republics over principalities.", "isCorrect": false, "rationale": "The text is descriptive, categorizing existing forms of government, rather than advocating for one as superior. The focus of 'The Prince' is on how principalities are acquired and maintained."}, {"text": "To provide a historical account of Italian city-states.", "isCorrect": false, "rationale": "While Italian examples are used, the primary purpose is classification and planning for the book's structure, not a comprehensive historical narrative."}, {"text": "To establish a comprehensive framework for analyzing different types of states and their acquisition.", "isCorrect": true, "rationale": "The text states Machiavelli 'sketches the plan that the rest of the book will follow,' indicating that this chapter lays the foundational categories for his subsequent analysis of how princes can acquire and maintain various types of rule."}, {"text": "To define the moral obligations of a ruler.", "isCorrect": false, "rationale": "This section is about the classification of states and acquisition methods, not the moral duties of a prince, which is a different aspect of Machiavelli's overall work."}], "id": "q07"}, {"question": "Francesco Sforza is described as rising to Duke of Milan through his 'virtù'. In Machiavelli's classification of acquisition methods, 'virtù' is most directly aligned with which term?", "options": [{"text": "Fortune", "isCorrect": false, "rationale": "Fortune refers to luck or circumstance, whereas 'virtù' (ability) refers to the prince's own skill and strength. Machiavelli often contrasts these two."}, {"text": "The arms of others", "isCorrect": false, "rationale": "Acquisition by 'arms of others' implies reliance on external military aid, not the prince's inherent qualities or personal 'virtù'."}, {"text": "Ability", "isCorrect": true, "rationale": "The text explicitly links Francesco Sforza's rise through 'virtù' to an example of a prince who gained everything through his 'own ability,' making these synonymous in this context."}, {"text": "Hereditary right", "isCorrect": false, "rationale": "Hereditary right refers to succession by birth, which is entirely distinct from acquisition through personal 'virtù' or ability."}], "id": "q08"}, {"question": "When Machiavelli declares, 'All states, all powers, that have held and hold rule over men have been and are either republics or principalities,' what does this imply about the comprehensiveness of his political taxonomy?", "options": [{"text": "He only intends to analyze European forms of government.", "isCorrect": false, "rationale": "The phrase 'All states, all powers' suggests a universal scope for his categories, not limited to a specific geographic region."}, {"text": "He believes these two categories encompass every conceivable form of human governance throughout history and the present.", "isCorrect": true, "rationale": "The use of 'All states, all powers' and 'have been and are' indicates a bold claim that his fundamental division covers all forms of government existing or having existed."}, {"text": "He is primarily interested in the moral legitimacy of different political regimes.", "isCorrect": false, "rationale": "This statement focuses on classification, not moral judgment. Machiavelli's work is often seen as pragmatic rather than moralistic in its initial classifications."}, {"text": "He is outlining a temporary classification system for his specific arguments about Italy.", "isCorrect": false, "rationale": "The language 'All states, all powers... have been and are' suggests a foundational and enduring classification, not a temporary or regionally specific one, even if his examples are often Italian."}], "id": "q09"}, {"question": "Which of the following best represents the logical hierarchical flow of Machiavelli's classification of governments as presented in this chapter?", "options": [{"text": "Governments -> Principalities -> Hereditary/New -> Acquired by arms/fortune/ability.", "isCorrect": false, "rationale": "This option misses the initial fundamental division into Republics and Principalities before delving into types of Principalities."}, {"text": "All states/powers -> Republics/Principalities -> Principalities (Hereditary/New) -> New Principalities (Entirely New/Annexed) -> Acquired by (arms of self/others, fortune/ability).", "isCorrect": true, "rationale": "This option accurately reflects the step-by-step breakdown Machiavelli presents: starting with the broadest categories, then subdividing principalities, then further detailing new principalities and their modes of acquisition."}, {"text": "Dominions -> Republics/Principalities -> Milan/Naples -> Accustomed to prince/freedom.", "isCorrect": false, "rationale": "This option jumps to specific examples and misses several intermediate classifications, like the distinction between hereditary and new principalities, and the methods of acquisition."}, {"text": "Principalities -> Hereditary/New -> Acquired by arms/fortune/ability -> Accustomed to prince/freedom.", "isCorrect": false, "rationale": "This option starts too narrowly by omitting republics as a fundamental type of government and also places 'Accustomed to prince/freedom' as a method of acquisition, which it is not; it's a characteristic of acquired dominions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
