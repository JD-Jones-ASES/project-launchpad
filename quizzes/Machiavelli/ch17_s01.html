<script>
var QUESTIONS = [{"question": "What is Machiavelli's central argument regarding liberality and parsimony in Chapter XVI?", "options": [{"text": "Princes should always strive to be genuinely liberal to gain their subjects' love.", "isCorrect": false, "rationale": "Machiavelli argues against unbridled liberality with one's own resources, as it leads to negative consequences for the prince and his state. He advises against seeking a reputation for liberality if it means burdening the people."}, {"text": "Apparent virtues can become genuine vices, and apparent vices genuine virtues in the context of statecraft.", "isCorrect": true, "rationale": "The introductory paragraph explicitly states this: 'His analysis is a perfect illustration of how apparent virtues can become genuine vices, and apparent vices genuine virtues.' This is the core thesis of his examination of liberality and meanness."}, {"text": "Generosity is always a weakness that leads to a prince's downfall.", "isCorrect": false, "rationale": "Machiavelli notes that liberality can be necessary for gaining power or when spending the wealth of others, demonstrating it's not always a weakness but depends on context and source of funds."}, {"text": "A prince's reputation for liberality is paramount, regardless of the cost.", "isCorrect": false, "rationale": "Machiavelli argues that striving for a reputation of liberality, if it comes at the expense of one's own property and burdens the people, is detrimental and leads to a worse reputation (rapacious and hated)."}], "id": "q01"}, {"question": "According to Machiavelli, what is the primary long-term consequence for a prince who strives to maintain a reputation for great liberality by spending his own wealth?", "options": [{"text": "He will earn the lasting admiration and loyalty of all his subjects.", "isCorrect": false, "rationale": "The text states the opposite: 'This will soon make him odious to his subjects, and becoming poor he will be little valued by any one; thus, with his liberality, having offended many and rewarded few, he is affected by the very first trouble and imperilled by whatever may be the first danger.'"}, {"text": "He will quickly exhaust his resources, become poor, and be forced to oppress his people, leading to hatred.", "isCorrect": true, "rationale": "Machiavelli explains that a prince 'thus inclined will consume in such acts all his property, and will be compelled in the end, if he wish to maintain the name of liberal, to unduly weigh down his people, and tax them, and do everything he can to get money. This will soon make him odious to his subjects, and becoming poor he will be little valued by any one.'"}, {"text": "He will inspire other rulers to emulate his generous policies.", "isCorrect": false, "rationale": "The text focuses on the internal consequences for the prince and his subjects, not on inspiring other rulers."}, {"text": "He will only reward a few, but avoid being despised.", "isCorrect": false, "rationale": "The text clearly states he will become 'odious to his subjects' and 'little valued by any one', meaning despised, and he will have 'offended many and rewarded few.'"}], "id": "q02"}, {"question": "Machiavelli advises a wise prince not to fear a reputation for meanness (parsimony) because it allows him to:", "options": [{"text": "Accumulate vast personal wealth for luxurious living.", "isCorrect": false, "rationale": "The purpose of parsimony for a prince is to maintain the state's resources, not personal luxury. His economy allows him to defend the state and undertake enterprises, not hoard for personal gain."}, {"text": "Avoid burdening his people, defend himself, and undertake enterprises effectively.", "isCorrect": true, "rationale": "The text states: 'with his economy his revenues are enough, that he can defend himself against all attacks, and is able to engage in enterprises without burdening his people.'"}, {"text": "Demonstrate his indifference to public opinion.", "isCorrect": false, "rationale": "While he should not fear the *reputation* of being mean, Machiavelli is deeply concerned with how a prince is perceived by his subjects, especially avoiding hatred and being despised."}, {"text": "Impose extraordinary taxes on subjects without resistance.", "isCorrect": false, "rationale": "The text explicitly states that a wise prince 'exercises liberality towards all from whom he does not take' and can engage in enterprises 'without burdening his people,' implying he avoids extraordinary taxation."}], "id": "q03"}, {"question": "Pope Julius II is cited as an example of a ruler who leveraged a reputation for liberality to gain power, but then adopted thriftiness. What Machiavellian principle does his subsequent behavior best illustrate?", "options": [{"text": "That true liberality is always superior to parsimony for maintaining power.", "isCorrect": false, "rationale": "Pope Julius II stopped striving for liberality after gaining power and used thriftiness to fund his wars, contradicting the idea that liberality is always superior for maintenance."}, {"text": "The necessity of adapting one's public persona to the specific demands of gaining versus maintaining power.", "isCorrect": true, "rationale": "Machiavelli explicitly differentiates between 'being a prince in fact, or in a way to become one.' He notes that liberality might be 'very necessary to be considered liberal' for one wishing to become pre-eminent, but 'dangerous' once in power. Pope Julius's actions align perfectly with this distinction."}, {"text": "The inherent instability of any ruler who relies on reputation over actual virtue.", "isCorrect": false, "rationale": "Pope Julius II succeeded because he adopted the 'actual virtue' of thriftiness for maintaining power, not just relying on a reputation he had discarded."}, {"text": "That all princes eventually become miserly out of necessity.", "isCorrect": false, "rationale": "Machiavelli presents this as a *wise choice* for a prince, not an inevitable outcome for all. The choice is made to ensure stability and effective governance."}], "id": "q04"}, {"question": "Under what specific circumstances does Machiavelli suggest a prince *should* be liberal?", "options": [{"text": "When spending his own money to win the affection of his immediate court.", "isCorrect": false, "rationale": "Machiavelli explicitly warns against squandering one's own property, stating 'it is only squandering your own that injures you.'"}, {"text": "When distributing wealth acquired through pillage, sack, and extortion from others.", "isCorrect": true, "rationale": "The text states: 'And to the prince who goes forth with his army, supporting it by pillage, sack, and extortion, handling that which belongs to others, this liberality is necessary, otherwise he would not be followed by soldiers. And of that which is neither yours nor your subjects’ you can be a ready giver... because it does not take away your reputation if you squander that of others, but adds to it.'"}, {"text": "Always, as it builds a strong moral foundation for his rule.", "isCorrect": false, "rationale": "The entire section argues against universal liberality due to its negative consequences on the prince's power and reputation."}, {"text": "Only when preparing to retire from power, to secure a positive legacy.", "isCorrect": false, "rationale": "This specific scenario is not discussed. Machiavelli's advice focuses on gaining and maintaining power, not retirement."}], "id": "q05"}, {"question": "Machiavelli states that 'nothing wastes so rapidly as liberality.' What is the immediate consequence of this rapid waste for a prince?", "options": [{"text": "He loses his ability to engage in military enterprises.", "isCorrect": false, "rationale": "While true that he might lose the ability to undertake enterprises, this is a *subsequent* result. The text describes more immediate personal consequences."}, {"text": "He becomes either poor or despised, or rapacious and hated.", "isCorrect": true, "rationale": "The text directly states: 'for even whilst you exercise it you lose the power to do so, and so become either poor or despised, or else, in avoiding poverty, rapacious and hated.'"}, {"text": "His subjects will demand even more extravagant gifts.", "isCorrect": false, "rationale": "This is not mentioned as a direct or immediate consequence of the 'rapid waste' in the text."}, {"text": "He will be forced to form alliances with weaker states.", "isCorrect": false, "rationale": "This consequence is not discussed in the context of liberality's rapid depletion."}], "id": "q06"}, {"question": "Machiavelli emphasizes that a prince should guard himself 'above all things' against:", "options": [{"text": "Financial insolvency.", "isCorrect": false, "rationale": "While financial solvency is crucial and a direct outcome of wise parsimony, Machiavelli identifies the *ultimate* danger that insolvency contributes to."}, {"text": "Being despised and hated.", "isCorrect": true, "rationale": "The text explicitly states: 'And a prince should guard himself, above all things, against being despised and hated; and liberality leads you to both.'"}, {"text": "Foreign invasion.", "isCorrect": false, "rationale": "While a concern, the text focuses on internal perceptions and the consequences of a prince's financial policies on his relationship with his subjects."}, {"text": "The advice of unreliable counselors.", "isCorrect": false, "rationale": "This topic is not covered in the provided section."}], "id": "q07"}, {"question": "A newly appointed prince inherits a treasury depleted by his predecessor's lavish spending to gain popularity. To stabilize his rule and rebuild the state, Machiavelli would most likely advise him to:", "options": [{"text": "Immediately launch new public works projects funded by loans to demonstrate continued liberality.", "isCorrect": false, "rationale": "This would repeat the predecessor's mistake, further depleting resources and incurring debt, leading to taxation and hatred, which Machiavelli warns against."}, {"text": "Implement strict economic policies, potentially earning a reputation for meanness, but ensuring solvency.", "isCorrect": true, "rationale": "Machiavelli advises a wise prince not to fear a reputation for meanness if it allows him to 'maintain among men the name of liberal' by not taking from them, and to manage his economy so revenues are enough for defense and enterprises 'without burdening his people.' This directly addresses stabilizing a depleted treasury."}, {"text": "Reward only his most loyal supporters with extravagant gifts to secure their allegiance.", "isCorrect": false, "rationale": "Even rewarding a few still contributes to the depletion of resources and leads to resentment from the many who are not rewarded, which Machiavelli identifies as a problem with liberality ('offended many and rewarded few')."}, {"text": "Seek to conquer neighboring territories to acquire new sources of wealth for liberal distribution.", "isCorrect": false, "rationale": "While Machiavelli suggests using others' property, the immediate problem is *internal* stability and rebuilding a depleted treasury. Launching wars immediately could destabilize an already weak state, especially if it cannot defend itself first due to poor finances."}], "id": "q08"}, {"question": "According to Machiavelli, why is a reputation for meanness ultimately wiser than striving for one of liberality?", "options": [{"text": "Meanness incurs hatred, which is a stronger motivator for subjects than love.", "isCorrect": false, "rationale": "Machiavelli explicitly states that meanness brings 'reproach without hatred,' while forced liberality leads to 'rapacity which begets reproach with hatred.' He advises against hatred."}, {"text": "A reputation for meanness brings reproach without hatred, while forced liberality leads to rapacity with hatred.", "isCorrect": true, "rationale": "The final paragraph clearly states: 'Therefore it is wiser to have a reputation for meanness which brings reproach without hatred, than to be compelled through seeking a reputation for liberality to incur a name for rapacity which begets reproach with hatred.'"}, {"text": "Mean princes are naturally more intelligent and strategic.", "isCorrect": false, "rationale": "Machiavelli attributes the choice to be mean to a prince's wisdom, but does not claim meanness itself is an inherent trait of intelligence."}, {"text": "Liberal princes are always eventually overthrown by their subjects.", "isCorrect": false, "rationale": "The text describes the severe dangers and negative consequences of unbridled liberality but does not make an absolute claim about being overthrown."}], "id": "q09"}, {"question": "Machiavelli uses Caesar as an example of someone who gained power through liberality. However, he qualifies this by stating that if Caesar 'had survived after becoming so, and had not moderated his expenses, he would have destroyed his government.' This qualification highlights:", "options": [{"text": "The inherent impossibility of a prince ever truly being liberal without consequence.", "isCorrect": false, "rationale": "Machiavelli identifies specific circumstances (using others' property) where liberality is beneficial and necessary, so it's not universally impossible without consequence."}, {"text": "The critical distinction between the virtues required to *acquire* power and those needed to *maintain* it.", "isCorrect": true, "rationale": "Machiavelli directly addresses this: 'Either you are a prince in fact, or in a way to become one. In the first case this liberality is dangerous, in the second it is very necessary to be considered liberal.' Caesar's example illustrates this need to shift strategies once power is attained."}, {"text": "That Caesar's liberality was ultimately a façade for his ambition.", "isCorrect": false, "rationale": "Machiavelli acknowledges Caesar's liberality as a real factor in his rise but emphasizes its danger for sustaining rule, rather than dismissing it as a facade."}, {"text": "The inevitable decline of all Roman leaders due to their personal vices.", "isCorrect": false, "rationale": "This specific observation about Caesar is used to illustrate a general principle of statecraft, not to make a broad statement about all Roman leaders or their vices."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
