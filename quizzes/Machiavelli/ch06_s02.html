<script>
var QUESTIONS = [{"question": "According to Machiavelli, what are the three options a conqueror has when dealing with a previously self-governing city or principality?", "options": [{"text": "Negotiate a peace treaty, impose heavy taxes, or convert its population.", "isCorrect": false, "rationale": "These are not the three specific options enumerated by Machiavelli in the text. His options are more extreme and pragmatic concerning control."}, {"text": "Destroy it; move there yourself and govern in person; or allow it to continue under its own laws, extracting tribute, and governing through a friendly oligarchy.", "isCorrect": true, "rationale": "The text directly states these three options as Machiavelli's proposed strategies for governing a conquered free city."}, {"text": "Grant it full autonomy, integrate it into the empire, or install a puppet ruler.", "isCorrect": false, "rationale": "While some elements might be present, these are not the exact three options Machiavelli outlines. 'Granting full autonomy' is antithetical to his concerns about control."}, {"text": "Assimilate its culture, relocate its elites, or fortify its defenses.", "isCorrect": false, "rationale": "These are tactics that might be employed, but they are not presented as the three fundamental choices for dealing with a conquered free city."}], "id": "q01"}, {"question": "Machiavelli's most unsettling claim is that destruction is the most reliable strategy. What is his primary rationale for this assertion?", "options": [{"text": "It serves as a strong deterrent to other potential rebellions in neighboring conquered territories.", "isCorrect": false, "rationale": "While destruction might have a deterrent effect, the text emphasizes the internal consequence for the destroyed city itself, not its impact on others, as the primary rationale for reliability."}, {"text": "A destroyed city cannot rebel, as its population is dispersed and its institutions dismantled, eliminating its capacity for resistance.", "isCorrect": true, "rationale": "The text explicitly states: 'A city that has been destroyed cannot rebel. Its population, dispersed and its institutions dismantled, loses the organizational capacity for resistance.'"}, {"text": "It allows the conqueror to immediately seize all valuable resources and wealth without opposition.", "isCorrect": false, "rationale": "The focus of Machiavelli's argument for destruction's reliability is on preventing future rebellion, not immediate resource acquisition."}, {"text": "It demonstrates the conqueror's moral righteousness and unwavering resolve to rule.", "isCorrect": false, "rationale": "Machiavelli explicitly separates the effectiveness of destruction from its moral admirability, stating he does not claim it is 'good' but 'effective.'"}], "id": "q02"}, {"question": "The text notes that Machiavelli's argument for destruction is 'not presented as morally admirable' but as 'effective.' This distinction is highlighted as a defining characteristic of his approach to political analysis. What is this approach called?", "options": [{"text": "Moral absolutism, asserting universal principles of governance.", "isCorrect": false, "rationale": "Moral absolutism would imply a fixed moral code, which Machiavelli is explicitly setting aside in favor of efficacy. His approach is the opposite of seeking morally admirable outcomes."}, {"text": "Idealism, believing in the ultimate triumph of justice and peace.", "isCorrect": false, "rationale": "Machiavelli's focus on brutal effectiveness and 'what actually works' directly contrasts with an idealistic view that prioritizes justice or peace."}, {"text": "Political realism, which separates moral judgment from pragmatic analysis of power and effectiveness.", "isCorrect": true, "rationale": "The text states this 'separation between moral judgment and political analysis that defines his realism,' emphasizing his focus on 'what actually works' regardless of moral implications."}, {"text": "Democratic theory, advocating for the self-determination of all peoples.", "isCorrect": false, "rationale": "Machiavelli's analysis here is about how a prince can *control* conquered peoples, not about promoting their self-determination or democratic rights."}], "id": "q03"}, {"question": "What is identified as the fundamental and ultimately reasserting problem when a prince chooses to govern a conquered free city by living there personally?", "options": [{"text": "The prince's personal presence alienates local leaders who feel their authority is undermined.", "isCorrect": false, "rationale": "The text states that governing in person can 'build personal relationships with local leaders,' implying it doesn't necessarily alienate them."}, {"text": "It is an unsustainable long-term strategy because the effectiveness only lasts as long as the prince remains present.", "isCorrect": true, "rationale": "The text clearly states: 'But it solves the problem only as long as the prince remains. The moment he withdraws, the underlying problem reasserts itself.'"}, {"text": "It requires too many resources and drains the prince's treasury over time.", "isCorrect": false, "rationale": "While it is described as 'demanding,' the text does not cite resource drain as the fundamental limitation or problem of this strategy."}, {"text": "The prince inevitably becomes too assimilated and loses his ability to rule objectively.", "isCorrect": false, "rationale": "This concern is not mentioned in the text as a limitation of governing in person."}], "id": "q04"}, {"question": "Imagine a prince, following Machiavelli's advice, moves to a newly conquered free city and successfully establishes direct rule for several years. If this prince then decides to return to his original capital, what outcome would Machiavelli most likely predict for the conquered city?", "options": [{"text": "The city would remain loyal due to the personal relationships and stability established by the prince.", "isCorrect": false, "rationale": "Machiavelli argues that the effectiveness of governing in person is dependent on the prince's continuous presence; loyalty would likely not endure his departure."}, {"text": "The city would revert to its previous problems, and the underlying desire for self-governance would reassert itself.", "isCorrect": true, "rationale": "The text states: 'The moment he withdraws, the underlying problem reasserts itself,' indicating that the solution is temporary and dependent on the prince's presence."}, {"text": "A new, friendly oligarchy would naturally emerge from the local leaders to maintain control on behalf of the absent prince.", "isCorrect": false, "rationale": "This describes the 'indirect rule' option, which has its own fatal weakness, and is not the predicted outcome if the 'governing in person' prince simply leaves without establishing a new, stable system."}, {"text": "The city's institutions would be permanently dismantled, making future rebellion impossible.", "isCorrect": false, "rationale": "This describes the outcome of the 'destroy it' option, not the 'governing in person' option after the prince's withdrawal."}], "id": "q05"}, {"question": "What does Machiavelli identify as the 'fatal weakness' of governing a conquered city through a friendly oligarchy and allowing it to retain its own laws under tribute?", "options": [{"text": "The collaborating oligarchy often becomes too powerful and eventually overthrows the foreign ruler.", "isCorrect": false, "rationale": "While the oligarchy might lead resistance, the core fatal weakness cited is the people's memory of freedom, not necessarily the oligarchy's ambition for direct overthrow of the prince."}, {"text": "The constant extraction of tribute inevitably leads to economic collapse and widespread famine, sparking unrest.", "isCorrect": false, "rationale": "Tribute is mentioned, but the 'fatal weakness' is not tied to economic collapse, but to the enduring memory of liberty among the population."}, {"text": "The population remembers its past freedom, which eventually becomes a powerful rallying cry for rebellion, potentially even involving the oligarchs.", "isCorrect": true, "rationale": "The text states: 'But the rest of the city's population remembers its freedom. Eventually, the memory of self-governance becomes a rallying cry for rebellion.'"}, {"text": "The foreign ruler cannot effectively monitor the actions of the local oligarchy from a distance.", "isCorrect": false, "rationale": "Lack of oversight might be a practical difficulty, but Machiavelli identifies the 'memory of liberty' as the 'fatal weakness,' not merely logistical challenges."}], "id": "q06"}, {"question": "Machiavelli's 'deepest insight' in Chapter V concerns the 'memory of liberty.' How does he characterize this 'memory'?", "options": [{"text": "As a fleeting sentiment that quickly fades within a generation after conquest.", "isCorrect": false, "rationale": "Machiavelli explicitly states it 'outlasts the generations who originally experienced freedom,' meaning it does not quickly fade."}, {"text": "As a moral imperative that justifies any rebellion against foreign rule.", "isCorrect": false, "rationale": "Machiavelli analyzes it as a political force, not a moral justification. His realism separates moral judgment from political analysis."}, {"text": "As a powerful and enduring political force that resists conquest, suppression, and even the passage of generations, making the idea of freedom politically explosive.", "isCorrect": true, "rationale": "The text states: 'the memory of liberty is a political force that outlasts conquest, outlasts suppression, and outlasts the generations... And that idea is, in Machiavelli's analysis, politically explosive.'"}, {"text": "As a historical record that primarily serves to educate future leaders on past mistakes.", "isCorrect": false, "rationale": "While history plays a role, Machiavelli describes the 'memory of liberty' as an active, persistent political force, not merely an educational tool for leaders."}], "id": "q07"}, {"question": "Considering Machiavelli's analysis of the 'memory of liberty,' which of the following scenarios would he most likely predict to lead to eventual rebellion?", "options": [{"text": "A conqueror destroys a city's historical archives and cultural symbols, renaming all its streets and public places.", "isCorrect": false, "rationale": "While severe, Machiavelli argues the *idea* of liberty persists beyond physical destruction of institutions, making complete eradication of memory difficult, but destruction itself prevents rebellion."}, {"text": "A previously self-governing city is conquered and ruled indirectly by a local council appointed by the conqueror, but permitted to maintain its traditional laws.", "isCorrect": true, "rationale": "This scenario directly aligns with Machiavelli's third option (indirect rule), which he identifies as having a 'fatal weakness' because the population's 'memory of freedom' will eventually lead to rebellion."}, {"text": "A conquering prince moves into a city that had never known self-governance, establishes a new legal code, and integrates his family with local nobility.", "isCorrect": false, "rationale": "The 'memory of liberty' specifically applies to *previously self-governing* cities. A city that never knew self-governance would lack this powerful historical memory."}, {"text": "A conquered free city is fully absorbed into the conqueror's empire, and all its citizens are granted equal rights and representation in the new government.", "isCorrect": false, "rationale": "While the text doesn't explicitly address this, granting full equal rights and representation could be a powerful counter-force to the memory of liberty by offering a new, compelling form of governance. Machiavelli's focus is on preventing rebellion, and this approach is not one of his three."}], "id": "q08"}, {"question": "The text states that Chapter V is 'one of the most important windows into how Machiavelli thinks.' Which statement best summarizes his fundamental approach to political analysis as revealed in this chapter?", "options": [{"text": "He prioritizes ethical considerations and seeks the most just and merciful solutions to political dilemmas.", "isCorrect": false, "rationale": "The text explicitly states: 'He is not asking 'what is the just or merciful thing to do with a conquered free city?'' This contradicts the option."}, {"text": "He focuses on empirical evidence and pragmatic effectiveness, unflinchingly stating uncomfortable truths about how power actually functions.", "isCorrect": true, "rationale": "The text describes this as 'the essence of political realism: the willingness to state uncomfortable truths about how power actually functions,' and that he asks 'what actually works?'"}, {"text": "He attempts to reconcile philosophical ideals of governance with the practical necessities of maintaining power.", "isCorrect": false, "rationale": "While he considers practicalities, he does not attempt to *reconcile* with ideals; rather, he prioritizes the practical over the ideal, often discarding the latter."}, {"text": "He advocates for universal principles of statecraft that apply equally to all types of governments and societies.", "isCorrect": false, "rationale": "Machiavelli's advice is highly contextual, specifically addressing *conquered free cities*, not universal principles applicable to all governments."}], "id": "q09"}, {"question": "The 'teachernote' advises instructors to let Machiavelli's argument for destruction 'sit' and to resist immediately reassuring students. What pedagogical value does the note suggest this initial discomfort serves?", "options": [{"text": "To encourage students to develop their own moral philosophies independently of the textbook's content.", "isCorrect": false, "rationale": "While students might develop moral philosophies, the primary pedagogical purpose mentioned is about confronting the nature of political thought itself, not just independent moral development."}, {"text": "To highlight the historical moral failings of political thinkers and rulers throughout history.", "isCorrect": false, "rationale": "The note's focus is on the *gap between ideals and analysis*, not primarily on highlighting moral failings of historical figures."}, {"text": "To force students to confront the significant gap between political ideals and the blunt realities of political analysis.", "isCorrect": true, "rationale": "The text states: 'it forces students to confront the gap between political ideals and political analysis.'"}, {"text": "To prepare students for future discussions on the ethical implications of modern geopolitical conflicts.", "isCorrect": false, "rationale": "While this could be a broader benefit, the specific pedagogical purpose cited in the note is about understanding Machiavelli's method and the nature of political analysis, not directly modern conflicts."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
