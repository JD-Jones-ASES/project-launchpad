<script>
var QUESTIONS = [{"question": "What is the central philosophical tension addressed in Chapter XXV of The Prince?", "options": [{"text": "The conflict between hereditary rule and elected leadership.", "isCorrect": false, "rationale": "While a topic in political philosophy, this is not identified as the 'central philosophical tension' of Chapter XXV. The chapter focuses on human agency versus external forces."}, {"text": "The relationship between human agency (virtù) and external circumstances (fortuna).", "isCorrect": true, "rationale": "The text explicitly states: 'Chapter XXV takes up the philosophical tension that has run through the entire book: the relationship between virtù (human skill, energy, and decisiveness) and fortuna (fortune, luck, circumstance).'"}, {"text": "The debate over whether a prince should be loved or feared by his subjects.", "isCorrect": false, "rationale": "This is a famous Machiavellian topic discussed elsewhere in The Prince, but not the central tension of Chapter XXV as described in this section."}, {"text": "The struggle between religious doctrine and secular governance.", "isCorrect": false, "rationale": "The section does not identify religious vs. secular governance as the primary tension of Chapter XXV; its focus is on human action in the face of fate."}], "id": "q01"}, {"question": "How does Machiavelli reconcile the power of fortuna with the importance of virtù?", "options": [{"text": "He argues that virtù always triumphs over fortuna, making human effort omnipotent.", "isCorrect": false, "rationale": "Machiavelli explicitly 'refuses to accept that it [fortune] is omnipotent' but also does not claim virtù always triumphs, noting Cesare Borgia's failure. This is an idealist view he refutes."}, {"text": "He concludes that fortuna governs everything, rendering human effort futile.", "isCorrect": false, "rationale": "The text states he 'refuses to accept that it is omnipotent' and that human effort makes a difference. This is a fatalist view he refutes."}, {"text": "He proposes a middle ground, where fortuna controls roughly half of human affairs, and virtù the other half.", "isCorrect": true, "rationale": "The text states: 'He occupies a middle ground: fortune governs roughly half of human affairs and virtù governs the other half.'"}, {"text": "He states that a prince should ignore fortuna entirely and focus solely on developing virtù.", "isCorrect": false, "rationale": "Machiavelli acknowledges fortune is 'powerful' and cannot be ignored; rather, it must be managed with virtù."}], "id": "q02"}, {"question": "In Machiavelli's river metaphor, what does the act of building 'defences and barriers' before a flood primarily represent in political life?", "options": [{"text": "The prince's ability to completely stop the forces of fortune from impacting his state.", "isCorrect": false, "rationale": "The text clarifies that these defenses 'do not stop the flood entirely,' but control and reduce damage. Machiavelli does not claim fortune can be completely stopped."}, {"text": "The prince's passive acceptance of whatever fate befalls him.", "isCorrect": false, "rationale": "Building defenses is an active, preparatory measure, directly contradicting passivity."}, {"text": "The strategic preparation, skill, and political foundations a prince develops to mitigate fortune's damage.", "isCorrect": true, "rationale": "The text states: 'Before the flood comes, men can build dikes, embankments, and channels... The analogy to political life is exact: fortune cannot be stopped, but it can be managed—and the degree to which it can be managed depends on the preparation that was made before it arrived.'"}, {"text": "The reliance on divine intervention to protect the state from harm.", "isCorrect": false, "rationale": "The metaphor emphasizes human action and preparation ('men... make provision'), not reliance on divine intervention."}], "id": "q03"}, {"question": "According to Machiavelli, why is adaptability a crucial quality for a prince when facing fortune?", "options": [{"text": "It ensures the prince can apply a single, unchanging strategy throughout his rule.", "isCorrect": false, "rationale": "This is the opposite of adaptability. Machiavelli criticizes cautious princes for behaving the 'same way regardless of what circumstances require.'"}, {"text": "It allows the prince to avoid all forms of risk and uncertainty in political life.", "isCorrect": false, "rationale": "Machiavelli acknowledges that political life is inherently risky and cannot be fully controlled; adaptability is about managing risk, not eliminating it."}, {"text": "It enables the prince to adjust his character and actions to match the varying demands of different political moments.", "isCorrect": true, "rationale": "The text explains that 'the problem with cautious princes... is that they tend to behave the same way regardless of what circumstances require... A bold prince... his boldness tends to match the demands of most political crises.' Adaptability is the ability to change character/actions with circumstances."}, {"text": "It primarily helps the prince to manipulate public opinion through inconsistent policies.", "isCorrect": false, "rationale": "While a prince might manage public opinion, the text focuses on adaptability as a means to effectively respond to political circumstances and fortune's changes, not primarily for manipulation through inconsistency."}], "id": "q04"}, {"question": "Machiavelli argues that fortune favors bold action. Which of the following best explains his reasoning beyond simply seizing opportunities?", "options": [{"text": "Bold princes are inherently more ethical, which guarantees divine favor and success.", "isCorrect": false, "rationale": "Machiavelli's political philosophy is pragmatic, not primarily ethical or reliant on divine favor. He focuses on effectiveness."}, {"text": "Cautious princes are entirely incapable of achieving any success, regardless of the circumstances.", "isCorrect": false, "rationale": "The text states: 'A cautious prince who happens to live in times that reward caution will succeed.' So, they are not entirely incapable."}, {"text": "Boldness often aligns with the decisiveness required by most political crises, and bold princes are less rigid in character than cautious ones.", "isCorrect": true, "rationale": "The text explains: 'his boldness tends to match the demands of most political crises, which reward decisiveness' and contrasts this with cautious princes who 'tend to behave the same way regardless of what circumstances require,' highlighting rigidity."}, {"text": "Boldness eliminates the need for any form of preparation or strategic planning.", "isCorrect": false, "rationale": "Machiavelli consistently emphasizes the importance of preparation (virtù), even for bold actions. Boldness complements, not replaces, preparation."}], "id": "q05"}, {"question": "What is a key limitation of Machiavelli's answer regarding the relationship between virtù and fortuna?", "options": [{"text": "He claims virtù always overcomes fortune, which is contradicted by Cesare Borgia's fate.", "isCorrect": false, "rationale": "The text explicitly states: 'He does not claim that virtù always overcomes fortune—Cesare Borgia's story...ended in failure.' So, this claim is incorrect."}, {"text": "He asserts that political life is reducible to a precise formula, which is overly simplistic.", "isCorrect": false, "rationale": "The text states the opposite: 'Political life, for Machiavelli, is not reducible to a formula.'"}, {"text": "He does not guarantee that skill and preparation will always triumph, acknowledging that circumstances can still overwhelm a prince.", "isCorrect": true, "rationale": "The text clarifies: 'He does not claim that virtù always overcomes fortune... The greatest skill and the best preparation can still be overwhelmed by circumstances.'"}, {"text": "He advocates for passivity and fatalism when faced with overwhelming fortune.", "isCorrect": false, "rationale": "The text states: 'But the alternative—passivity, fatalism, refusal to act because fortune might undo your work—is worse. The prince who does not try has already lost.'"}], "id": "q06"}, {"question": "Machiavelli uses Cesare Borgia as an example primarily to demonstrate what about the interplay of virtù and fortuna?", "options": [{"text": "That immense virtù can completely nullify the effects of fortuna, ensuring ultimate success.", "isCorrect": false, "rationale": "The text states Borgia 'was ultimately destroyed by events he could not control,' showing that virtù does not completely nullify fortuna."}, {"text": "That even a prince with exceptional virtù can ultimately be undone by uncontrollable events, illustrating fortune's power.", "isCorrect": true, "rationale": "The text asks: 'if Cesare Borgia, the model prince, was ultimately destroyed by events he could not control, what hope does anyone have?' This highlights fortune's ability to overwhelm even a skilled prince."}, {"text": "That cautious political strategies are always superior to bold ones, as Borgia's downfall was due to excessive daring.", "isCorrect": false, "rationale": "Borgia is presented as a 'model prince' with skill, and his failure is attributed to 'events he could not control,' not primarily excessive daring, and Machiavelli advocates for boldness."}, {"text": "That popular support is the most critical element for a prince, overshadowing military strength or personal skill.", "isCorrect": false, "rationale": "While popular support is mentioned as a political foundation, Borgia's example in this context specifically illustrates the limits of virtù against fortuna, not the supremacy of popular support."}], "id": "q07"}, {"question": "How does Machiavelli's approach to fortune, as described in the 'teachernote' section, differ from that of Boethius?", "options": [{"text": "Machiavelli, like Boethius, argues that true goods (like wisdom) are not subject to fortune's power.", "isCorrect": false, "rationale": "The text states Boethius 'argued that true goods (wisdom, virtue) are not subject to fortune’s power,' but Machiavelli's answer 'is more political and less consolatory than Boethius: he is not arguing that fortune cannot touch true goods.'"}, {"text": "Machiavelli rejects the concept of fortune, while Boethius embraces it through the Wheel of Fortune metaphor.", "isCorrect": false, "rationale": "Machiavelli acknowledges fortune's power and even uses a metaphor (the river) for it, he doesn't reject the concept."}, {"text": "Machiavelli offers a more political solution focused on managing fortune through human action, whereas Boethius provides a more consolatory, philosophical perspective on enduring fortune.", "isCorrect": true, "rationale": "The text directly states: 'Machiavelli’s answer is more political and less consolatory than Boethius: he is not arguing that fortune cannot touch true goods but that fortune can be partially managed by the right kind of human action.'"}, {"text": "Boethius emphasizes the importance of virtù in controlling fortune, while Machiavelli stresses determinism.", "isCorrect": false, "rationale": "Machiavelli emphasizes virtù, and he rejects fatalism/determinism. Boethius's view is more about finding goods beyond fortune's reach rather than direct political management."}], "id": "q08"}, {"question": "Considering Machiavelli's problematic metaphor about fortune as a woman, what is the *political claim* that students should understand, distinct from the unacceptable language?", "options": [{"text": "That political power is inherently aggressive and requires the subjugation of others.", "isCorrect": false, "rationale": "While Machiavelli discussed power, the specific political claim derived from this metaphor is about the effectiveness of boldness vs. caution, not a general statement on subjugation."}, {"text": "That a prince's emotional state should always dictate his actions, regardless of circumstances.", "isCorrect": false, "rationale": "The text emphasizes adapting to circumstances and decisiveness, not arbitrary emotional action."}, {"text": "That excessive caution often leads to missed opportunities and inflexibility, while boldness, despite risks, frequently aligns with the demands of political crises.", "isCorrect": true, "rationale": "The text explicitly states: 'The political argument beneath the metaphor—that boldness and decisiveness tend to succeed where excessive caution fails—is separable from the metaphor itself.'"}, {"text": "That women are inherently fickle and must be controlled in political affairs.", "isCorrect": false, "rationale": "This interpretation directly aligns with the 'morally unacceptable' aspect of the metaphor and is not the intended political claim to be learned by students."}], "id": "q09"}, {"question": "The Italian princes who failed in the face of foreign invasion, mentioned in the context of the river metaphor, are compared to people who failed to do what?", "options": [{"text": "Pray for divine intervention to stop the flood.", "isCorrect": false, "rationale": "The metaphor focuses on human preparation and action, not divine intervention."}, {"text": "Accept their fate and surrender to the invading forces.", "isCorrect": false, "rationale": "The text advocates for action and preparation, not passive surrender."}, {"text": "Build embankments and defenses before the flood, signifying a lack of preparation.", "isCorrect": true, "rationale": "The text explicitly states: 'This connects directly back to the previous chapter: the Italian princes who failed in the face of foreign invasion were like people who had never built embankments before the flood.'"}, {"text": "Unite all Italian states under a single, strong leader.", "isCorrect": false, "rationale": "While Italian unity might be a Machiavellian theme, the direct analogy drawn here is to a lack of individual state preparation, not a failure to unite."}], "id": "q10"}, {"question": "The study guide distinguishes Machiavelli's approach to fortune from Boethius's. Boethius argued that true goods—wisdom, virtue—are beyond fortune's reach and should be the object of human striving. Why would Machiavelli reject this as inadequate for a prince?", "options": [{"text": "Because Machiavelli believed wisdom and virtue have no political value and should not be pursued by rulers.", "isCorrect": false, "rationale": "Machiavelli values wisdom and practical skill (virtù) highly. His disagreement with Boethius is not about whether wisdom matters but about whether philosophical detachment from fortune's outcomes is sufficient for a ruler."}, {"text": "Because a prince's practical task is to hold and govern a state—an enterprise fully exposed to fortune—and philosophical consolation about goods beyond fortune cannot substitute for actually managing fortune's political consequences.", "isCorrect": true, "rationale": "Boethius's answer is 'consolatory'—it reframes loss by locating true value beyond fortune's reach. For Machiavelli, this is too passive: a prince who loses his state cannot console himself that his wisdom remains intact. The prince needs a political answer about how to manage fortune's domain, not a philosophical escape from it."}, {"text": "Because Machiavelli was an atheist who rejected any philosophical tradition rooted in religious or spiritual frameworks.", "isCorrect": false, "rationale": "Machiavelli's disagreement with Boethius is practical and political, not rooted in religious skepticism. The text contrasts their approaches as 'political' versus 'consolatory,' not as secular versus religious."}, {"text": "Because Boethius wrote for prisoners awaiting execution, so his approach is only valid in extreme personal crises, not normal political governance.", "isCorrect": false, "rationale": "While contextually accurate, this is not the substantive reason Machiavelli's approach differs. The difference is in what problem each is solving: Boethius addresses personal equanimity, Machiavelli addresses political survival and effectiveness."}], "id": "q11"}, {"question": "The study guide notes that Cesare Borgia, presented throughout The Prince as a model of virtù, 'was ultimately destroyed by events he could not control.' How should a student reconcile this with Machiavelli's overall argument that virtù can manage fortune?", "options": [{"text": "Borgia's failure exposes a contradiction in Machiavelli's argument that virtù and fortuna are equally powerful, suggesting fortune actually dominates.", "isCorrect": false, "rationale": "Machiavelli acknowledges this apparent contradiction but resolves it not by revising the 50/50 claim but by noting that the greatest skill can still be overwhelmed—this is a feature of the argument, not a flaw in it."}, {"text": "Borgia's failure was entirely due to his own lack of virtù at the critical moment, meaning he is not actually a good example of the model prince.", "isCorrect": false, "rationale": "The text presents Borgia as genuinely skilled—it is fortune's domain (circumstances beyond his control) that destroyed him, not a deficiency of virtù. He remains the model because of his skill, even though he ultimately failed."}, {"text": "Borgia's failure confirms that virtù can reduce but not eliminate fortune's domain—even the best-prepared prince remains partially exposed to uncontrollable events, which is why the argument's goal is probability improvement, not guaranteed success.", "isCorrect": true, "rationale": "Machiavelli's argument is probabilistic: virtù shifts the odds in the prince's favor and reduces exposure to fortune's destructive force, but cannot eliminate it. Borgia is the honest case that proves the limits are real. The argument does not promise success; it argues that the prince who does not try 'has already lost' and that effort meaningfully improves the odds—even if imperfect."}, {"text": "Borgia's failure is irrelevant to the argument because he was a historical figure whose specific circumstances cannot be generalized.", "isCorrect": false, "rationale": "Machiavelli uses Borgia extensively as a generalizable model throughout The Prince, and the study guide treats his failure as philosophically significant—it raises the honest question of what hope any prince has, which Machiavelli must answer."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
