<script>
var QUESTIONS = [{"question": "What is Machiavelli's primary warning to princes concerning their relationship with their subjects, as derived from his analysis in Chapter XIX?", "options": [{"text": "A prince must maintain a strong military to suppress any dissent among his subjects.", "isCorrect": false, "rationale": "While a strong military is important for defending against 'external powers,' Machiavelli's primary warning concerning subjects is about avoiding hatred and contempt to prevent internal conspiracies. A well-armed state ensures quiet 'within when they are quiet without, unless they should have been already disturbed by conspiracy,' highlighting the internal threat's distinct nature."}, {"text": "A prince who is hated or despised by his subjects will inevitably face destruction through conspiracies and instability.", "isCorrect": true, "rationale": "The text explicitly states: 'a prince who is hated cannot survive, and a prince who is despised invites the conspiracies that will destroy him.' This is the central, urgent point Machiavelli makes throughout the chapter, using Roman emperors as a 'laboratory' to prove this principle."}, {"text": "A prince should only fear external enemies, as internal discontent is easily managed with swift punishment.", "isCorrect": false, "rationale": "Machiavelli clearly states a prince ought to have two fears: 'one from within, on account of his subjects, the other from without, on account of external powers.' He then devotes significant discussion to securing against internal conspiracies, indicating it is not easily managed without popular goodwill."}, {"text": "A prince must ensure his people are wealthy and prosperous, as poverty is the root of all rebellion.", "isCorrect": false, "rationale": "Machiavelli emphasizes avoiding rapaciousness and violation of property, which affects economic well-being, but the broader focus is on the prince's character and actions that earn or lose the people's 'honor' and 'contentment,' not solely their wealth, and definitely not identified as the singular 'root of all rebellion' in this context."}], "id": "q01"}, {"question": "According to Machiavelli, which set of characteristics primarily leads a prince to be considered 'contemptible' by his subjects?", "options": [{"text": "Rapaciousness and violation of the property and women of his subjects.", "isCorrect": false, "rationale": "These actions are explicitly stated by Machiavelli as making a prince 'hated above all things,' not contemptible. Hatred stems from direct harm or injustice."}, {"text": "Fickleness, frivolity, effeminacy, mean-spiritedness, and irresolution.", "isCorrect": true, "rationale": "The text directly lists these as qualities that make a prince 'contemptible,' contrasting them with the desired traits of greatness, courage, gravity, and fortitude. Contempt arises from perceived weakness or unsuitability for rule."}, {"text": "Excessive cruelty and a disregard for the established laws of the principality.", "isCorrect": false, "rationale": "While cruelty can lead to hatred and instability, and disregarding laws can undermine authority, these are not the specific traits Machiavelli categorizes under 'contemptible' in this section. Contemptible relates more to perceived personal weakness or lack of princely qualities."}, {"text": "Favoring the nobility excessively and neglecting the concerns of the common people.", "isCorrect": false, "rationale": "Favoring nobles can lead to the hatred of the people, as discussed in the French example, but the characteristics listed here are not what Machiavelli defines as making a prince 'contemptible' in terms of his personal bearing and decision-making."}], "id": "q02"}, {"question": "Considering Machiavelli's analysis, what is the most robust defense a prince can cultivate against internal conspiracies?", "options": [{"text": "Maintaining a vast network of spies to uncover plots before they materialize.", "isCorrect": false, "rationale": "While surveillance might be part of a prince's security apparatus, Machiavelli does not highlight it as the *most efficacious remedy*. His focus is on preventing the *desire* to conspire, rather than solely detecting it after it forms."}, {"text": "Executions and harsh punishments for anyone suspected of disloyalty.", "isCorrect": false, "rationale": "Fear of punishment is a deterrent for conspirators, but Machiavelli argues this fear alone is insufficient if the people are hostile. Such actions can also lead to hatred, which then increases the risk of conspiracy, as 'fear, jealousy, prospect of punishment' only address the conspirator's side, not the popular will."}, {"text": "Ensuring the people are satisfied and hold the prince in high esteem, making them unwilling to support conspirators.", "isCorrect": true, "rationale": "Machiavelli states, 'one of the most efficacious remedies that a prince can have against conspiracies is not to be hated and despised by the people, for he who conspires against a prince always expects to please them by his removal.' He provides the Bentivogli example to illustrate the power of popular goodwill, making it 'impossible that any one should be so rash as to conspire.'"}, {"text": "Cultivating strong alliances with neighboring powers to deter internal rebels.", "isCorrect": false, "rationale": "Strong alliances are mentioned as a defense against 'external powers,' not specifically against 'internal conspiracies' or the 'fear from within' on account of subjects. External alliances do not directly address internal popular sentiment."}], "id": "q03"}, {"question": "A modern CEO wants to implement Machiavelli's advice regarding managing internal conflicts among different employee groups (e.g., sales vs. production). Which strategy, inspired by the French kingdom's model, would best apply?", "options": [{"text": "Directly mediate all disputes personally to show leadership and gain loyalty from both sides.", "isCorrect": false, "rationale": "Machiavelli advises princes to 'leave affairs of reproach to the management of others, and keep those of grace in their own hands.' Direct mediation of contentious issues might expose the leader to reproach from one or both sides, contrary to the French model where an arbiter manages such issues."}, {"text": "Delegate the resolution of contentious issues to an independent ombudsman or a neutral committee, while personally handling recognition and rewards.", "isCorrect": true, "rationale": "This strategy mirrors the French king's establishment of the parliament as an arbiter to 'beat down the great and favour the lesser without reproach to the king,' allowing the king to keep 'affairs of grace in his own hands.' The CEO would avoid blame for unpopular decisions while taking credit for positive outcomes."}, {"text": "Implement strict rules and punishments for any employee who causes conflict, regardless of their position.", "isCorrect": false, "rationale": "While order is important, this approach focuses on punishment rather than strategic management of 'humours' and risks creating resentment. The French model is about political wisdom in distributing blame and credit, not just strict enforcement."}, {"text": "Always side with the most numerous employee group to ensure widespread satisfaction.", "isCorrect": false, "rationale": "This strategy might lead to the alienation of other groups and is not what the French model describes. The arbiter's role is to act without reproach to the king, not necessarily to always side with the majority, but to balance interests carefully and neutrally."}], "id": "q04"}, {"question": "What 'third difficulty' did the Roman Emperors face that other principalities did not, significantly complicating their rule?", "options": [{"text": "The constant threat of barbarian invasions requiring continuous military campaigns.", "isCorrect": false, "rationale": "While Roman emperors certainly faced barbarian threats, Machiavelli frames this as an 'external' fear common to all princes. The 'third difficulty' he identifies is specific to the internal dynamics of the Roman Empire, distinct from external pressures."}, {"text": "The ambition of the nobility and the insolence of the people, compounded by the vastness of the empire.", "isCorrect": false, "rationale": "Machiavelli states that the 'ambition of the nobles and the insolence of the people' are difficulties in 'other principalities' as well. The vastness of the empire, while a factor, is not explicitly called out as the 'third difficulty' in this context; rather, it's the addition of another powerful internal group."}, {"text": "The need to satisfy both the peace-loving populace and the cruel, rapacious, warlike soldiers.", "isCorrect": true, "rationale": "The text clearly identifies this as the 'third difficulty': 'having to put up with the cruelty and avarice of their soldiers... it was a hard thing to give satisfaction both to soldiers and people; because the people loved peace... whilst the soldiers loved the warlike prince who was bold, cruel, and rapacious.'"}, {"text": "The political influence of the Senate, which often undermined imperial authority.", "isCorrect": false, "rationale": "The Senate was a political factor, but Machiavelli does not categorize its influence as the 'third difficulty' alongside the nobles and people; he focuses specifically on the conflicting demands of the soldiers versus the people."}], "id": "q05"}, {"question": "Machiavelli uses Marcus Aurelius as an example of a successful emperor despite being 'humane, and benignant.' What was the key factor that allowed Marcus to avoid the fate of other virtuous emperors like Pertinax and Alexander?", "options": [{"text": "He deliberately appeased the soldiers by allowing them to be cruel and rapacious towards the people.", "isCorrect": false, "rationale": "The text describes Marcus as 'lovers of justice, enemies to cruelty, humane, and benignant,' directly contradicting the idea that he actively appeased soldiers through cruelty. He 'kept both orders in their places' through authority, not indulgence."}, {"text": "He ascended to the throne by hereditary title, granting him inherent authority and respect from both soldiers and people.", "isCorrect": true, "rationale": "Machiavelli states Marcus 'had succeeded to the throne by hereditary title, and owed nothing either to the soldiers or the people; and afterwards, being possessed of many virtues which made him respected, he always kept both orders in their places whilst he lived, and was neither hated nor despised.' This inherent legitimacy was crucial for his stability."}, {"text": "He was an exceptionally charismatic leader who could charm both the soldiers and the populace into submission.", "isCorrect": false, "rationale": "While charisma might have played a role, Machiavelli does not highlight it as the *key* factor for Marcus. Instead, he points to his hereditary right and respected virtues, which allowed him to maintain order without relying on gaining favor from specific factions."}, {"text": "He initiated significant reforms to improve the lives of the common people, thereby ensuring their unwavering loyalty.", "isCorrect": false, "rationale": "The text focuses on his established authority and respected virtues, which allowed him to 'keep both orders in their places,' not on specific reforms. Pertinax *tried* reforms and failed because he lacked this foundational authority and angered the soldiers."}], "id": "q06"}, {"question": "Machiavelli states, 'hatred is acquired as much by good works as by bad ones.' What is the underlying condition under which good works can lead to a prince's downfall?", "options": [{"text": "When the 'good works' are perceived as weakness or effeminacy by external powers, inviting invasion.", "isCorrect": false, "rationale": "The text explicitly links this phenomenon to internal dynamics and 'that body is corrupt whom you think you have need of to maintain yourself,' such as soldiers, people, or nobles. It is about misaligning with powerful internal interests, not external perceptions."}, {"text": "When a prince's virtuous actions conflict with the established customs or 'humours' of a corrupt but necessary group whose support he needs.", "isCorrect": true, "rationale": "Machiavelli explains this by saying, 'when that body is corrupt whom you think you have need of to maintain yourself—it may be either the people or the soldiers or the nobles—you have to submit to its humours and to gratify them, and then good works will do you harm.' Pertinax's attempt to reform the licentious soldiers is a direct example of this principle."}, {"text": "When a prince's benevolent acts inadvertently empower a rival faction to conspire against him.", "isCorrect": false, "rationale": "The text focuses on the direct reaction of the powerful group to the 'good works' themselves, causing hatred by frustrating the group's corrupt desires, rather than an indirect empowerment of a rival faction."}, {"text": "When 'good works' are seen as an attempt to garner popular goodwill, thereby alienating the nobility.", "isCorrect": false, "rationale": "While alienating the nobility can be problematic, Machiavelli's specific example for 'good works' causing hatred is Pertinax trying to reform the soldiers, which directly angered the soldiers, not necessarily alienating nobles by favoring the people."}], "id": "q07"}, {"question": "According to Machiavelli, a prince becomes 'hated above all things' by engaging in which actions?", "options": [{"text": "Being perceived as irresolute and fickle, failing to demonstrate greatness and fortitude.", "isCorrect": false, "rationale": "These characteristics are explicitly mentioned as making a prince 'contemptible,' not 'hated above all things.' Contempt arises from perceived weakness or lack of suitable princely qualities."}, {"text": "Violating the property and women of his subjects, and being rapacious.", "isCorrect": true, "rationale": "Machiavelli states, 'It makes him hated above all things... to be rapacious, and to be a violator of the property and women of his subjects, from both of which he must abstain.' These acts are direct assaults on the honor and possessions of the people."}, {"text": "Failing to maintain a strong army and allowing external powers to threaten the state.", "isCorrect": false, "rationale": "While a weak military can lead to instability, Machiavelli associates these issues with external fears and the security of the state, not the specific internal 'hatred' derived from the prince's personal actions towards his subjects' property and honor."}, {"text": "Showing favoritism towards a particular group of nobles or courtiers over others.", "isCorrect": false, "rationale": "Favoritism could cause resentment among other nobles, but Machiavelli specifies 'rapaciousness' and 'violation of property and women' as the paramount causes of hatred from the general populace in this section."}], "id": "q08"}, {"question": "Machiavelli emphasizes the inherent difficulties faced by conspirators. Which of the following best describes the most significant deterrent for a potential conspirator, especially when the prince has popular goodwill?", "options": [{"text": "The prince's network of loyal guards and spies, making it impossible to gather in secret.", "isCorrect": false, "rationale": "While practical difficulties exist, Machiavelli highlights the *psychological* and *social* deterrents more significantly. He lists fear, jealousy, and punishment, but the ultimate difficulty is the lack of public support after the act."}, {"text": "The prince's ability to offer greater rewards to potential conspirators if they denounce the plot.", "isCorrect": false, "rationale": "Machiavelli notes that a malcontent given an opportunity to conspire has 'material with which to content himself' by denouncing, seeing 'the gain from this course to be assured.' This is a significant practical deterrent, but not the *most significant* when considering the overall difficulty, which includes public backlash and the inability to escape."}, {"text": "The overwhelming force of the prince's military, capable of crushing any rebellion.", "isCorrect": false, "rationale": "Military force is a deterrent, but Machiavelli's argument for popular goodwill goes beyond physical force. The text focuses on the public's reaction to the *act* of conspiracy and its aftermath as the critical obstacle."}, {"text": "The fear of popular backlash and becoming an enemy of the people after the crime, making escape impossible.", "isCorrect": true, "rationale": "Machiavelli states, 'For whereas in general the conspirator has to fear before the execution of his plot, in this case he has also to fear the sequel to the crime; because on account of it he has the people for an enemy, and thus cannot hope for any escape.' The Bentivogli example vividly illustrates this point, where the people immediately avenged their prince's murder."}], "id": "q09"}, {"question": "Based on the text, what is the most crucial balancing act a wise prince must perform to secure his state against both internal and external threats, particularly regarding various social classes?", "options": [{"text": "Maintaining a strong professional army while simultaneously disarming his subjects to prevent rebellion.", "isCorrect": false, "rationale": "A strong army is mentioned for external defense, but disarming subjects is not discussed as part of the core balancing act in this section, nor is it the central point regarding managing internal social classes."}, {"text": "Cherishing the nobles to secure their support, but ensuring this does not lead to the hatred of the people.", "isCorrect": true, "rationale": "Machiavelli advises, 'princes ought to leave affairs of reproach to the management of others, and keep those of grace in their own hands. And further, I consider that a prince ought to cherish the nobles, but not so as to make himself hated by the people.' This highlights the delicate balance between the two powerful internal groups – the nobles and the people – as critical for stability."}, {"text": "Aligning himself entirely with the soldiers' desires for war and cruelty, as they are the most powerful internal faction.", "isCorrect": false, "rationale": "The Roman emperors who did this often failed, as it led to the hatred of the people, creating instability. Marcus Aurelius succeeded by keeping 'both orders in their places,' demonstrating the need for balance, not outright alignment with one faction's extreme desires."}, {"text": "Implementing democratic reforms to give the people a voice, thereby pacifying their discontent.", "isCorrect": false, "rationale": "Democratic reforms are not mentioned as a solution by Machiavelli. His focus is on the prince's actions and reputation in relation to securing popular goodwill and managing the 'humours' of different groups within the existing monarchical or principality structure."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
