<body>
<div class="quiz-container">

        <a href="../../courses/Machiavelli.html">&larr; Back to Powers and Principalities (Machiavelli)</a>
    </div>

        <div class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 13, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "What is Machiavelli's primary argument regarding Italy's military weakness in Chapter XII?", "options": [{"text": "Italy's geographical position made it inherently vulnerable to foreign powers.", "isCorrect": false, "rationale": "While geography might play a role, Machiavelli's explicit primary argument is about the type of military forces employed, not geographical vulnerability."}, {"text": "Italian princes lacked sufficient wealth to maintain strong standing armies of their own.", "isCorrect": false, "rationale": "The text does not primarily focus on a lack of wealth, but rather on the choice of military strategy and its inherent flaws."}, {"text": "Italy's direct reliance on mercenary and auxiliary forces directly caused its ruin and weakness.", "isCorrect": true, "rationale": "The introductory paragraph explicitly states this: 'Italy's weakness before France and Spain is directly caused by its reliance on hired soldiers.'"}, {"text": "The internal political divisions among Italian states prevented unified defense.", "isCorrect": false, "rationale": "While internal divisions were a factor in Italy's broader political landscape, Machiavelli specifically frames the *military* weakness as stemming from the nature of the arms used, not just political disunity."}], "id": "q01"}, {"question": "According to Machiavelli, what is the hierarchical relationship between 'good laws' and 'good arms' in establishing a strong state?", "options": [{"text": "Good laws are a prerequisite for good arms, as proper governance enables military strength.", "isCorrect": false, "rationale": "Machiavelli states the inverse: 'as there cannot be good laws where the state is not well armed, it follows that where they are well armed they have good laws,' indicating good arms precede good laws."}, {"text": "Good arms are a natural consequence of good laws, ensuring a disciplined and effective military.", "isCorrect": false, "rationale": "This reverses Machiavelli's stated causality. He argues that the presence of good arms leads to good laws."}, {"text": "Good laws and good arms are equally important and independent foundations for any state.", "isCorrect": false, "rationale": "Machiavelli establishes a dependent relationship, arguing that good laws cannot exist without good arms."}, {"text": "Good arms are fundamental, and good laws necessarily follow from a well-armed state.", "isCorrect": true, "rationale": "Machiavelli clearly states, 'as there cannot be good laws where the state is not well armed, it follows that where they are well armed they have good laws,' placing good arms as the foundational element upon which good laws are built."}], "id": "q02"}, {"question": "Which of the following descriptions *least* accurately reflects Machiavelli's view of mercenary soldiers?", "options": [{"text": "They are disunited and without discipline.", "isCorrect": false, "rationale": "Machiavelli explicitly describes them as 'disunited, ambitious, and without discipline,' making this an accurate reflection of his view."}, {"text": "They are motivated primarily by a strong sense of national loyalty.", "isCorrect": true, "rationale": "Machiavelli states they have 'no other attraction or reason for keeping the field than a trifle of stipend,' and 'neither the fear of God nor fidelity to men,' which directly contradicts the idea of national loyalty."}, {"text": "They are valiant before friends but cowardly before enemies.", "isCorrect": false, "rationale": "This is a direct quote from the text, 'valiant before friends, cowardly before enemies,' making it an accurate reflection."}, {"text": "They are ambitious and may oppress their masters.", "isCorrect": false, "rationale": "Machiavelli warns that mercenary captains 'always aspire to their own greatness, either by oppressing you, who are their master, or others contrary to your intentions,' confirming their ambition and potential for oppression."}], "id": "q03"}, {"question": "Machiavelli cites the example of Francesco Sforza to illustrate what specific danger of employing mercenary captains?", "options": [{"text": "Their inability to achieve decisive victories against foreign invaders.", "isCorrect": false, "rationale": "Sforza *did* overcome an enemy (the Venetians); his danger lay in his subsequent actions, not his initial failure to conquer."}, {"text": "Their tendency to abandon their employers when greater stipends are offered.", "isCorrect": false, "rationale": "While mercenaries are motivated by stipends, Sforza's example demonstrates a more severe betrayal: aligning with the enemy to harm his former masters."}, {"text": "Their potential to betray their masters and seize power or territory for themselves.", "isCorrect": true, "rationale": "Machiavelli states that Sforza, after overcoming the enemy, 'allied himself with them to crush the Milanese, his masters,' clearly demonstrating the danger of a mercenary captain turning against his employer."}, {"text": "Their reluctance to engage in difficult campaigns during winter months.", "isCorrect": false, "rationale": "This is a general mercenary tactic mentioned later in the text, but not the specific point illustrated by the Francesco Sforza example."}], "id": "q04"}, {"question": "A newly formed republic is considering its military strategy. Based on Machiavelli's advice in Chapter XII, what course of action would he most strongly recommend?", "options": [{"text": "Enlist experienced foreign mercenary captains to lead their armies, as they are proven in battle.", "isCorrect": false, "rationale": "This is the opposite of Machiavelli's core advice, as he condemns mercenaries as 'useless and dangerous' and directly links them to Italy's ruin."}, {"text": "Form alliances with powerful neighboring states to provide auxiliary troops for defense.", "isCorrect": false, "rationale": "Machiavelli lumps auxiliaries with mercenaries as 'useless and dangerous,' advising against reliance on either."}, {"text": "Recruit citizens to form its own militia, with the republic maintaining strict control over its commanders through law and recall.", "isCorrect": true, "rationale": "Machiavelli explicitly advises that 'the republic has to send its citizens, and when one is sent who does not turn out satisfactorily, it ought to recall him, and when one is worthy, to hold him by the laws so that he does not leave the command,' emphasizing reliance on its own armed citizens under its direct control."}, {"text": "Prioritize negotiating peace treaties over building a strong military, as conflict is inherently ruinous.", "isCorrect": false, "rationale": "Machiavelli stresses the absolute necessity of 'good arms' as a foundation for any state, not avoidance of military strength."}], "id": "q05"}, {"question": "Machiavelli addresses the apparent success of the Venetians and Florentines in expanding their dominions using mercenary forces. What is his primary explanation for their initial success, and why does he ultimately dismiss it?", "options": [{"text": "They were uniquely skilled in managing mercenary contracts, but this skill was eventually lost.", "isCorrect": false, "rationale": "Machiavelli attributes their initial 'success' to 'chance,' not superior management skills."}, {"text": "Their captains were loyal due to personal relationships, but this system broke down over time.", "isCorrect": false, "rationale": "Machiavelli explicitly states that mercenaries lack 'fidelity to men' and are ambitious, making personal loyalty an unreliable factor."}, {"text": "They were favored by chance because their able captains either failed to conquer, were opposed, or had other ambitions; however, this luck eventually ran out, leading to significant losses.", "isCorrect": true, "rationale": "Machiavelli states that the Florentines were 'favoured by chance, for of the able captains... some have not conquered, some have been opposed, and others have turned their ambitions elsewhere.' He then shows how this 'mistake' (relying on mercenaries) ultimately led to grave losses for the Venetians at Vaila."}, {"text": "They only used mercenaries for offensive wars, not defensive ones, a distinction that later proved unsustainable.", "isCorrect": false, "rationale": "The text does not make this distinction as the reason for their success or failure; it focuses on the inherent nature of mercenary service."}], "id": "q06"}, {"question": "According to Machiavelli, which set of historical developments *most directly* contributed to the widespread reliance on mercenaries in Italy?", "options": [{"text": "The flourishing of Renaissance art and culture, distracting leaders from military affairs.", "isCorrect": false, "rationale": "The text does not mention cultural flourishing as a cause for mercenary reliance."}, {"text": "The decline of the Roman Empire's influence and the rise of local feudal lords.", "isCorrect": false, "rationale": "Machiavelli focuses on more recent events, starting with the 'recent' repudiation of the empire and the Pope's temporal power, not ancient history."}, {"text": "The repudiation of the empire, the Pope's acquisition of temporal power, and the formation of numerous new states (both Church and republics) unaccustomed to arms.", "isCorrect": true, "rationale": "Machiavelli explicitly outlines these causes: 'You must understand that the empire has recently come to be repudiated in Italy, that the Pope has acquired more temporal power, and that Italy has been divided up into more states... the Church consisting of priests and the republic of citizens unaccustomed to arms, both commenced to enlist foreigners.'"}, {"text": "Constant foreign invasions that exhausted local populations, forcing states to outsource defense.", "isCorrect": false, "rationale": "Machiavelli argues that foreign invasions were a *consequence* of Italy's reliance on mercenaries, not the primary cause of their proliferation."}], "id": "q07"}, {"question": "Which of the following was a deliberate tactical practice of mercenary captains in Italy, as described by Machiavelli?", "options": [{"text": "Prioritizing decisive battles to achieve swift victory and minimize campaign costs.", "isCorrect": false, "rationale": "Mercenaries sought to prolong conflicts and avoid decisive engagements to maintain their employment and minimize personal risk, rather than seeking swift victory."}, {"text": "Fortifying encampments extensively to withstand prolonged sieges.", "isCorrect": false, "rationale": "Machiavelli states they 'did not surround the camp either with stockade or ditch,' indicating a lack of fortification to avoid fatigue and danger."}, {"text": "Avoiding night attacks and campaigning during winter to lessen fatigue and danger.", "isCorrect": true, "rationale": "Machiavelli states: 'They did not attack towns at night... nor did they campaign in the winter. All these things were permitted by their military rules, and devised by them to avoid... both fatigue and dangers.'"}, {"text": "Emphasizing infantry over cavalry to ensure a large, easily replenishable force.", "isCorrect": false, "rationale": "Machiavelli notes they 'were led to employ cavalry' and significantly reduced infantry numbers ('in an army of twenty thousand soldiers, there were not to be found two thousand foot soldiers')."}], "id": "q08"}, {"question": "Machiavelli concludes his discussion of mercenary practices by stating they 'have brought Italy to slavery and contempt.' What aspect of mercenary behavior, as detailed in the text, *most directly* supports this severe judgment?", "options": [{"text": "Their high stipends, which drained the treasuries of Italian states.", "isCorrect": false, "rationale": "While stipends are mentioned as their motivation, Machiavelli links 'slavery and contempt' more directly to their military incompetence and deliberate avoidance of decisive action against enemies."}, {"text": "Their internal disunity and lack of discipline, preventing effective military organization.", "isCorrect": false, "rationale": "This is a characteristic, but the ultimate 'slavery and contempt' is attributed to the *consequences* of their overall practices and tactics when facing foreign powers."}, {"text": "Their deliberate strategies to avoid danger, not kill enemies, and prolong conflicts, making them ineffective against serious foreign aggression.", "isCorrect": true, "rationale": "Machiavelli directly follows his description of these self-serving tactics ('to avoid... both fatigue and dangers') with the conclusion: 'thus they have brought Italy to slavery and contempt,' strongly implying this conduct made Italy weak and vulnerable to foreign domination."}, {"text": "Their frequent changes of loyalty, making long-term planning impossible for their employers.", "isCorrect": false, "rationale": "Betrayal is a danger, but the 'slavery and contempt' refers to the state of Italy in the face of foreign invaders, a result of the collective mercenary modus operandi to minimize risk and effort."}], "id": "q09"}, {"question": "Machiavelli identifies four categories of 'arms' a prince might use to defend his state. Which of the following is *not* one of the categories he lists?", "options": [{"text": "His own arms.", "isCorrect": false, "rationale": "Machiavelli explicitly lists 'his own' as one category."}, {"text": "Auxiliary forces.", "isCorrect": false, "rationale": "Machiavelli explicitly lists 'auxiliaries' as one category."}, {"text": "Allied forces.", "isCorrect": true, "rationale": "Machiavelli lists 'his own, or they are mercenaries, auxiliaries, or mixed.' He does not list 'allied forces' as a distinct primary category, though auxiliaries could be seen as a form of allied support."}, {"text": "Mixed forces.", "isCorrect": false, "rationale": "Machiavelli explicitly lists 'mixed' as one category, referring to a combination of his own and foreign forces."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
