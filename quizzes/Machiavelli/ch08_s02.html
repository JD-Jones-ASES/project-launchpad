<script>
var QUESTIONS = [{"question": "What is Machiavelli's general assessment of princes who rise through the fortune and arms of others, and how does Cesare Borgia fit into this assessment?", "options": [{"text": "He views them as inherently stable and Borgia as a typical example.", "isCorrect": false, "rationale": "Machiavelli is explicitly skeptical of such princes, viewing their foundations as insecure, not stable."}, {"text": "He sees them as having insecure foundations, but Borgia is an extraordinary exception due to his strategic capabilities.", "isCorrect": true, "rationale": "The text states Machiavelli is 'skeptical of such princes: their foundations are insecure,' but identifies Borgia as 'one extraordinary exception' because of his ability to execute a strategy."}, {"text": "He considers them incapable and Borgia's success a pure stroke of luck he did not capitalize on.", "isCorrect": false, "rationale": "Machiavelli makes the opposite argument, admiring Borgia's strategic execution of his opportunity despite his initial reliance on fortune."}, {"text": "He believes they always fail, and Borgia's eventual downfall proves this rule.", "isCorrect": false, "rationale": "Machiavelli views Borgia's failure as due to 'fortuna' (bad timing) rather than proving the rule of inherent failure for this category of princes, finding 'no fault with him' otherwise."}]}, {"question": "Machiavelli argues that despite Cesare Borgia's reliance on his father's power, Borgia was not 'merely a lucky nonentity.' What is the primary reason for this assessment?", "options": [{"text": "Borgia was naturally born into power, making his rise less dependent on others.", "isCorrect": false, "rationale": "The text identifies Borgia as the 'illegitimate son of Cardinal Rodrigo Borgia' who became powerful through his father becoming Pope, not through birthright alone."}, {"text": "Borgia possessed immense personal wealth independent of the Church.", "isCorrect": false, "rationale": "The text states his father, the Pope, 'used the resources of the Church—money, political influence' to carve out a state for his son."}, {"text": "Borgia skillfully recognized his opportunities and executed a coherent, ruthless strategy to secure his position.", "isCorrect": true, "rationale": "Machiavelli argues Borgia 'recognized the scale of his opportunity, understood exactly what he needed to do, and executed a strategy of remarkable coherence and ruthlessness.'"}, {"text": "Borgia successfully eliminated his father's influence, allowing him to rule independently from the start.", "isCorrect": false, "rationale": "Borgia's strategy was to build an independent foundation for *after* his father was gone, acknowledging his father's initial influence."}]}, {"question": "Which of the following best describes the primary source of Cesare Borgia's initial rise to power and his ability to carve out a state in central Italy?", "options": [{"text": "His inherent military genius and a strong personal army he built from scratch.", "isCorrect": false, "rationale": "While he became a feared military commander and later built his own army, his initial rise was a direct result of his father's position and resources."}, {"text": "His diplomatic skill in forging alliances with major European powers.", "isCorrect": false, "rationale": "While diplomacy may have played a role, the text explicitly states the primary source was his father's power."}, {"text": "The vast resources, political influence, and spiritual authority of his father, Pope Alexander VI.", "isCorrect": true, "rationale": "The text clearly states, 'The Pope used the resources of the Church—money, political influence, the threat of spiritual sanction—to carve out a state for his son.'"}, {"text": "Popular uprisings in central Italy that supported his leadership.", "isCorrect": false, "rationale": "The text does not mention popular uprisings as the source of his initial power; rather, he imposed order on chaotic lordships, sometimes with cruelty."}]}, {"question": "Cesare Borgia's long-range strategy, admired by Machiavelli, primarily focused on which goal?", "options": [{"text": "Rapidly expanding his territory across the entire Italian peninsula using only his father's troops.", "isCorrect": false, "rationale": "While he expanded territory, his long-range strategy was more about establishing lasting power independent of his father, which meant building his own forces."}, {"text": "Relying solely on the Church's continued support and goodwill indefinitely.", "isCorrect": false, "rationale": "The text explicitly states he 'thought through what he would need to survive after his father was gone,' indicating a desire for independence from the Church's goodwill."}, {"text": "Building an independent foundation to ensure his survival and power after his father's inevitable absence.", "isCorrect": true, "rationale": "Machiavelli admires Borgia for thinking 'through what he would need to survive after his father was gone and worked systematically toward it,' demonstrating a focus on self-sufficiency."}, {"text": "Concentrating all his efforts on securing an alliance with the Holy Roman Emperor.", "isCorrect": false, "rationale": "Securing such an alliance is not mentioned as his primary long-range strategic goal in the text."}]}, {"question": "One of Borgia's precise steps to build a foundation involved weakening families allied to other great powers. Which two families are explicitly mentioned in the text as targets of this strategy?", "options": [{"text": "The Medici and the Sforza.", "isCorrect": false, "rationale": "The Medici and Sforza families are not mentioned as specific targets in the context of Borgia's strategy to weaken rivals in the Romagna."}, {"text": "The Orsini and the Colonna.", "isCorrect": true, "rationale": "The text explicitly states Borgia 'weakened the families allied to other great powers in the Romagna—the Orsini (who had French connections) and the Colonna (who leaned toward Spain).'"}, {"text": "The Visconti and the Este.", "isCorrect": false, "rationale": "The Visconti and Este families are not mentioned as specific targets in the text."}, {"text": "The Gonzaga and the Baglioni.", "isCorrect": false, "rationale": "The Gonzaga and Baglioni families are not mentioned as specific targets in the text."}]}, {"question": "Based on the 'historicalcontext' box, what was Machiavelli's approach to analyzing Pope Alexander VI's actions regarding his family's interests?", "options": [{"text": "He condemned Alexander VI for his immorality and corruption.", "isCorrect": false, "rationale": "The text explicitly states Machiavelli 'analyzes him without moral comment.'"}, {"text": "He primarily focused on Alexander VI's achievements as an administrator and patron of the arts.", "isCorrect": false, "rationale": "While Alexander VI had these achievements, Machiavelli's analysis, as described, focuses on his effectiveness as a 'clever operator' for his family."}, {"text": "He analyzed Alexander VI as a clever operator who effectively served his family's interests, without moral judgment.", "isCorrect": true, "rationale": "The text states, 'Machiavelli analyzes him without moral comment, as simply a clever operator who served his family's interests.'"}, {"text": "He believed Alexander VI's use of Church resources for his family ultimately weakened the papacy.", "isCorrect": false, "rationale": "Machiavelli's analysis, as presented, is not focused on the long-term institutional impact on the papacy, but on Alexander VI's strategic efficacy for his family."}]}, {"question": "What was the immediate political problem Cesare Borgia intended to solve by appointing Remirro de Orco as governor of the Romagna?", "options": [{"text": "To expand his territory into France.", "isCorrect": false, "rationale": "Remirro de Orco's appointment was for internal governance and pacification, not external expansion into France."}, {"text": "To establish alliances with foreign powers.", "isCorrect": false, "rationale": "This act was about imposing internal control and order within the Romagna, not forging foreign alliances."}, {"text": "To impose order and pacify the chaotic petty lordships of the Romagna.", "isCorrect": true, "rationale": "The text states Borgia appointed Remirro 'To impose order' on the Romagna, which 'had long suffered from the private wars and cruelties of its various rulers.'"}, {"text": "To discredit his father, Pope Alexander VI.", "isCorrect": false, "rationale": "Remirro's appointment had no stated purpose of discrediting Borgia's father."}]}, {"question": "Machiavelli's 'coolly admiring' analysis of the Remirro de Orco episode highlights Borgia's ability to:", "options": [{"text": "Demonstrate his personal physical prowess in a public display.", "isCorrect": false, "rationale": "While Borgia was known for physical prowess, the episode's significance, according to Machiavelli, lies in political management and blame shifting, not a display of personal strength."}, {"text": "Shift blame for necessary cruelty onto an agent, thereby satisfying the people and preserving his own image.", "isCorrect": true, "rationale": "Machiavelli's analysis explains that Borgia 'used a man as a tool, let him commit the cruelties that political order required, and then killed him to shift the blame...leaving the impression that the cruelty had been Remirro's fault, not Borgia's.'"}, {"text": "Prove that chaos is preferable to any form of cruel order.", "isCorrect": false, "rationale": "Machiavelli presents this as a brilliant act of political management to achieve order, not to argue against it."}, {"text": "Avoid any use of cruelty in governance, relying solely on diplomacy.", "isCorrect": false, "rationale": "The episode is precisely about the *use* of cruelty for political ends and the clever management of its perception."}]}, {"question": "What was the primary factor that led to the collapse of Cesare Borgia's position in 1503, according to the text?", "options": [{"text": "A military defeat at the hands of a superior Spanish army.", "isCorrect": false, "rationale": "No military defeat is described as the cause of his collapse in the provided text."}, {"text": "A widespread popular rebellion throughout the Romagna.", "isCorrect": false, "rationale": "The Romagna had been pacified; a widespread rebellion is not mentioned as the cause of his downfall."}, {"text": "His father Pope Alexander VI's death and Borgia's simultaneous, debilitating illness.", "isCorrect": true, "rationale": "The text explicitly states, 'His father Pope Alexander VI died...and at precisely the same time, Borgia himself fell dangerously ill. He could not be present for the crucial conclave that elected the new pope.'"}, {"text": "His failure to build a personal army, relying too heavily on mercenaries.", "isCorrect": false, "rationale": "The text states one of his strategic steps was to 'built a military force of his own,' suggesting he did not fail in this regard."}]}, {"question": "Despite Cesare Borgia's ultimate failure, Machiavelli's verdict is largely one of admiration. What is the single mistake Machiavelli attributes to Borgia, allowing for this overall positive assessment?", "options": [{"text": "He was too slow in conquering the petty lordships of central Italy.", "isCorrect": false, "rationale": "Machiavelli admires his 'methodical, long-range quality of his strategy,' suggesting he was not too slow but rather precise."}, {"text": "He was too soft and not ruthless enough in dealing with his enemies.", "isCorrect": false, "rationale": "Borgia was known for his 'utter lack of scruple' and 'ruthlessness,' which Machiavelli admired."}, {"text": "He failed to prevent the election of Julius II, an enemy, as the new pope.", "isCorrect": true, "rationale": "Machiavelli states, 'Borgia made one mistake: he allowed Julius II to be elected, even though Julius was his enemy.'"}, {"text": "He did not adequately strengthen his financial base, leading to bankruptcy.", "isCorrect": false, "rationale": "While finance is important in statecraft, this specific mistake is not cited as Borgia's 'one mistake' by Machiavelli in the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
