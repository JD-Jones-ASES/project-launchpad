<script>
var QUESTIONS = [{"question": "What is Machiavelli's general assessment of princes who rise through the fortune and arms of others, and how does Cesare Borgia fit into this assessment?", "options": [{"text": "He views them as inherently stable and Borgia as a typical example.", "isCorrect": false, "rationale": "Machiavelli is explicitly skeptical of such princes, viewing their foundations as insecure, not stable."}, {"text": "He sees them as having insecure foundations, but Borgia is an extraordinary exception due to his strategic capabilities.", "isCorrect": true, "rationale": "The text states Machiavelli is 'skeptical of such princes: their foundations are insecure,' but identifies Borgia as 'one extraordinary exception' because of his ability to execute a coherent strategy."}, {"text": "He considers them incapable and Borgia's success a pure stroke of luck he did not capitalize on.", "isCorrect": false, "rationale": "Machiavelli makes the opposite argument, admiring Borgia's strategic execution of his opportunity despite his initial reliance on fortune."}, {"text": "He believes they always fail, and Borgia's eventual downfall proves this rule.", "isCorrect": false, "rationale": "Machiavelli views Borgia's failure as due to fortuna (bad timing) rather than proving the rule of inherent failure. He finds 'no fault with him' otherwise."}], "id": "q01"}, {"question": "Machiavelli argues that despite Cesare Borgia's reliance on his father's power, Borgia was not 'merely a lucky nonentity.' What is the primary reason for this assessment?", "options": [{"text": "Borgia was naturally born into power, making his rise less dependent on others.", "isCorrect": false, "rationale": "The text identifies Borgia as the 'illegitimate son of Cardinal Rodrigo Borgia' who became powerful through his father becoming Pope, not through birthright alone."}, {"text": "Borgia possessed immense personal wealth independent of the Church.", "isCorrect": false, "rationale": "The text states his father the Pope 'used the resources of the Church — money, political influence' to carve out a state for his son."}, {"text": "Borgia skillfully recognized his opportunities and executed a coherent, ruthless strategy to secure his position.", "isCorrect": true, "rationale": "Machiavelli argues Borgia 'recognized the scale of his opportunity, understood exactly what he needed to do, and executed a strategy of remarkable coherence and ruthlessness.'"}, {"text": "Borgia successfully eliminated his father's influence, allowing him to rule independently from the start.", "isCorrect": false, "rationale": "Borgia's strategy was to build an independent foundation for after his father was gone, acknowledging his father's initial influence."}], "id": "q02"}, {"question": "Which of the following best describes the primary source of Cesare Borgia's initial rise to power and his ability to carve out a state in central Italy?", "options": [{"text": "His inherent military genius and a strong personal army he built from scratch.", "isCorrect": false, "rationale": "While he became a feared military commander and later built his own army, his initial rise was a direct result of his father's position and resources."}, {"text": "His diplomatic skill in forging alliances with major European powers.", "isCorrect": false, "rationale": "While diplomacy may have played a role, the text explicitly states the primary source was his father's power through the Church."}, {"text": "The vast resources, political influence, and spiritual authority of his father, Pope Alexander VI.", "isCorrect": true, "rationale": "The text clearly states, 'The Pope used the resources of the Church — money, political influence, the threat of spiritual sanction — to carve out a state for his son.'"}, {"text": "Popular uprisings in central Italy that supported his leadership.", "isCorrect": false, "rationale": "The text does not mention popular uprisings as the source of his initial power; rather, he imposed order on chaotic lordships."}], "id": "q03"}, {"question": "Cesare Borgia's long-range strategy, admired by Machiavelli, primarily focused on which goal?", "options": [{"text": "Rapidly expanding his territory across the entire Italian peninsula using only his father's troops.", "isCorrect": false, "rationale": "While he expanded territory, his long-range strategy was more about establishing lasting power independent of his father, which meant building his own forces."}, {"text": "Relying solely on the Church's continued support and goodwill indefinitely.", "isCorrect": false, "rationale": "The text explicitly states he 'thought through what he would need to survive after his father was gone,' indicating a desire for independence from the Church's goodwill."}, {"text": "Building an independent foundation to ensure his survival and power after his father's inevitable absence.", "isCorrect": true, "rationale": "Machiavelli admires Borgia for thinking 'through what he would need to survive after his father was gone and worked systematically toward it,' demonstrating a focus on self-sufficiency."}, {"text": "Concentrating all his efforts on securing an alliance with the Holy Roman Emperor.", "isCorrect": false, "rationale": "Securing such an alliance is not mentioned as his primary long-range strategic goal in the text."}], "id": "q04"}, {"question": "One of Borgia's precise steps to build a foundation involved weakening families allied to other great powers. Which two families are explicitly mentioned in the text as targets of this strategy?", "options": [{"text": "The Medici and the Sforza.", "isCorrect": false, "rationale": "The Medici and Sforza families are not mentioned as specific targets in the context of Borgia's strategy to weaken rivals in the Romagna."}, {"text": "The Orsini and the Colonna.", "isCorrect": true, "rationale": "The text explicitly states Borgia 'weakened the families allied to other great powers in the Romagna — the Orsini (who had French connections) and the Colonna (who leaned toward Spain).'"}, {"text": "The Visconti and the Este.", "isCorrect": false, "rationale": "The Visconti and Este families are not mentioned as specific targets in the text."}, {"text": "The Gonzaga and the Baglioni.", "isCorrect": false, "rationale": "The Gonzaga and Baglioni families are not mentioned as specific targets in the text."}], "id": "q05"}, {"question": "Based on the historical context box, what was Machiavelli's approach to analyzing Pope Alexander VI's actions regarding his family's interests?", "options": [{"text": "He condemned Alexander VI for his immorality and corruption.", "isCorrect": false, "rationale": "The text explicitly states Machiavelli 'analyzes him without moral comment.'"}, {"text": "He primarily focused on Alexander VI's achievements as an administrator and patron of the arts.", "isCorrect": false, "rationale": "While Alexander VI had these achievements, Machiavelli's analysis focuses on his effectiveness as a 'clever operator' for his family, not on his artistic patronage."}, {"text": "He analyzed Alexander VI as a clever operator who effectively served his family's interests, without moral judgment.", "isCorrect": true, "rationale": "The text states, 'Machiavelli analyzes him without moral comment, as simply a clever operator who served his family's interests.'"}, {"text": "He believed Alexander VI's use of Church resources for his family ultimately weakened the papacy.", "isCorrect": false, "rationale": "Machiavelli's analysis is not focused on the long-term institutional impact on the papacy, but on Alexander VI's strategic efficacy for his family."}], "id": "q06"}, {"question": "What was the immediate political problem Cesare Borgia intended to solve by appointing Remirro de Orco as governor of the Romagna?", "options": [{"text": "To expand his territory into France.", "isCorrect": false, "rationale": "Remirro de Orco's appointment was for internal governance and pacification, not external expansion into France."}, {"text": "To establish alliances with foreign powers.", "isCorrect": false, "rationale": "This act was about imposing internal control and order within the Romagna, not forging foreign alliances."}, {"text": "To impose order and pacify the chaotic petty lordships of the Romagna.", "isCorrect": true, "rationale": "The text states Borgia appointed Remirro 'To impose order' on the Romagna, which 'had long suffered from the private wars and cruelties of its various rulers.'"}, {"text": "To discredit his father, Pope Alexander VI.", "isCorrect": false, "rationale": "Remirro's appointment had no stated purpose of discrediting Borgia's father."}], "id": "q07"}, {"question": "Machiavelli's 'coolly admiring' analysis of the Remirro de Orco episode highlights Borgia's ability to:", "options": [{"text": "Demonstrate his personal physical prowess in a public display.", "isCorrect": false, "rationale": "While Borgia was known for physical prowess, the episode's significance lies in political management and blame shifting, not a display of personal strength."}, {"text": "Shift blame for necessary cruelty onto an agent, thereby satisfying the people and preserving his own image.", "isCorrect": true, "rationale": "Machiavelli's analysis explains that Borgia 'used a man as a tool, let him commit the cruelties that political order required, and then killed him to shift the blame...leaving the impression that the cruelty had been Remirro's fault, not Borgia's.'"}, {"text": "Prove that chaos is preferable to any form of cruel order.", "isCorrect": false, "rationale": "Machiavelli presents this as a brilliant act of political management to achieve order, not to argue against it."}, {"text": "Avoid any use of cruelty in governance, relying solely on diplomacy.", "isCorrect": false, "rationale": "The episode is precisely about the use of cruelty for political ends and the clever management of its perception."}], "id": "q08"}, {"question": "What was the primary factor that led to the collapse of Cesare Borgia's position in 1503, according to the text?", "options": [{"text": "A military defeat at the hands of a superior Spanish army.", "isCorrect": false, "rationale": "No military defeat is described as the cause of his collapse in the text."}, {"text": "A widespread popular rebellion throughout the Romagna.", "isCorrect": false, "rationale": "The Romagna had been pacified; a widespread rebellion is not mentioned as the cause of his downfall."}, {"text": "His father Pope Alexander VI's death and Borgia's simultaneous, debilitating illness.", "isCorrect": true, "rationale": "The text explicitly states, 'His father Pope Alexander VI died...and at precisely the same time, Borgia himself fell dangerously ill. He could not be present for the crucial conclave that elected the new pope.'"}, {"text": "His failure to build a personal army, relying too heavily on mercenaries.", "isCorrect": false, "rationale": "The text states one of his strategic steps was to 'built a military force of his own,' suggesting he did not fail in this regard."}], "id": "q09"}, {"question": "Despite Cesare Borgia's ultimate failure, Machiavelli's verdict is largely one of admiration. What is the single mistake Machiavelli attributes to Borgia, allowing for this overall positive assessment?", "options": [{"text": "He was too slow in conquering the petty lordships of central Italy.", "isCorrect": false, "rationale": "Machiavelli admires his 'methodical, long-range quality of his strategy,' suggesting he was not too slow but rather precise."}, {"text": "He was too soft and not ruthless enough in dealing with his enemies.", "isCorrect": false, "rationale": "Borgia was known for his 'utter lack of scruple' and 'ruthlessness,' which Machiavelli admired."}, {"text": "He failed to prevent the election of Julius II, an enemy, as the new pope.", "isCorrect": true, "rationale": "Machiavelli states, 'Borgia made one mistake: he allowed Julius II to be elected, even though Julius was his enemy.'"}, {"text": "He did not adequately strengthen his financial base, leading to bankruptcy.", "isCorrect": false, "rationale": "While finance is important in statecraft, this specific mistake is not cited as Borgia's 'one mistake' by Machiavelli."}], "id": "q10"}, {"question": "The 'thinkdeeper' passage asks whether Borgia's treatment of Remirro was 'genius or simply a more sophisticated form of the same cruelty.' What specific theory about political perception does Machiavelli's admiring analysis imply?", "options": [{"text": "That the spectacle of punishment is inherently cruel and therefore politically counterproductive.", "isCorrect": false, "rationale": "Machiavelli's analysis is 'coolly admiring' of the spectacle's effectiveness — he describes the people as 'satisfied and stupefied,' indicating it worked politically. He does not treat it as counterproductive."}, {"text": "That political violence becomes acceptable when it is sufficiently spectacular and public.", "isCorrect": false, "rationale": "Machiavelli's argument is more specific than a general endorsement of spectacular violence. His point is about the strategic management of political perception — specifically, who the population attributes the cruelty to."}, {"text": "That a prince can manage how subjects assign blame by separating the instrument of cruelty from the beneficiary of order, thereby retaining popular goodwill while achieving necessary goals.", "isCorrect": true, "rationale": "Machiavelli's theory is that political cruelty is most effectively managed when the person who benefits from the order (Cesare) is perceived as distinct from the person who imposed it (Remirro). By eliminating Remirro, Cesare transforms himself from the source of cruelty to the punisher of cruelty — redirecting popular resentment while keeping the order intact."}, {"text": "That brutal efficiency is always preferable to gradual reform when imposing order on a chaotic region.", "isCorrect": false, "rationale": "While Machiavelli does praise Remirro's brutal efficiency as the right tool for the initial pacification, the deeper theory in the episode is about the management of perception and blame, not simply about the superiority of brutal efficiency over gradual reform."}], "id": "q11"}, {"question": "Machiavelli writes that Cesare Borgia's fortune 'created his opportunity' but also 'created his ultimate vulnerability.' How does this paradox illustrate the relationship between fortune and self-reliance in The Prince?", "options": [{"text": "Fortune and self-reliance are opposites and cannot coexist in the same prince's career.", "isCorrect": false, "rationale": "Cesare's career shows they can coexist — he had both fortune (his father's papacy) and self-reliance (his systematic strategy). The paradox is that the very fortune that created his opportunity remained a structural vulnerability because he could not eliminate his dependence on it before it collapsed."}, {"text": "The foundation fortune provides is inherently unstable because it depends on continued external support rather than the prince's own capacities, yet fortune also creates the conditions that allow a capable prince to build something more durable.", "isCorrect": true, "rationale": "Cesare's case demonstrates both sides: fortune (his father's papacy) gave him the opportunity and resources to build a state; but that same fortune meant the state's foundations were still partly dependent on his father's continued life. He was building self-reliance from the raw material of fortune, but ran out of time before he finished the transformation."}, {"text": "Fortune is always stronger than self-reliance, which is why even the greatest princes ultimately fail.", "isCorrect": false, "rationale": "Machiavelli does not conclude that self-reliance is hopeless against fortune. His earlier chapters argue the opposite — that princes who rely least on fortune are strongest. Cesare's case is a tragedy of timing, not a proof of fortune's inevitable dominance."}, {"text": "Princes who rely on fortune should avoid building any independent foundations, as this only creates new vulnerabilities.", "isCorrect": false, "rationale": "Machiavelli explicitly praises Cesare for trying to build independent foundations — his failure was not due to this effort but to the simultaneous collapse of fortune before he could complete it. Building foundations was the right strategy; the timing was simply catastrophic."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
