<script>
var QUESTIONS = [{"question": "According to Machiavelli's opening taxonomy in The Prince, what are the two fundamental categories of all political authority?", "options": [{"text": "Empires and Kingdoms", "isCorrect": false, "rationale": "These are more specific types of political entities, not Machiavelli's initial, broadest classification of 'all states, all powers'."}, {"text": "Republics and Principalities", "isCorrect": true, "rationale": "The text explicitly states: 'All states, all powers, that have held and hold rule over men have been and are either republics or principalities.'"}, {"text": "Monarchies and Democracies", "isCorrect": false, "rationale": "These are modern terms for government forms and do not precisely match Machiavelli's fundamental division in this context."}, {"text": "Hereditary and New States", "isCorrect": false, "rationale": "Hereditary and New are subdivisions within principalities, not the primary overarching categories of all political authority."}], "id": "q01"}, {"question": "Machiavelli's 'blunt opening' that classifies states as either republics or principalities, without middle ground, primarily reveals what about his methodological approach?", "options": [{"text": "His preference for simple political systems over complex ones.", "isCorrect": false, "rationale": "Machiavelli is classifying what is, not expressing a preference for simplicity or complexity in an idealized sense."}, {"text": "His intention to describe states as they are rather than as they ought to be.", "isCorrect": true, "rationale": "The text states, 'He is not describing what states ought to be; he is classifying what states are. From the very first sentence, he is practicing what he will later call the effectual truth of the matter.'"}, {"text": "His belief that all political entities must be inherently flawed.", "isCorrect": false, "rationale": "The opening taxonomy does not convey a judgment on the inherent flaws of states, but rather a descriptive classification."}, {"text": "His interest in ideal constitutional forms, like those of ancient philosophers.", "isCorrect": false, "rationale": "The text directly contradicts this, stating, 'He is not interested in the idealized constitutions of philosophers.'"}], "id": "q02"}, {"question": "Machiavelli explicitly states he will not discuss republics in The Prince. What is the most accurate reason for this decision, according to the text?", "options": [{"text": "He believes republics are inherently unstable and not worth studying.", "isCorrect": false, "rationale": "The text states, 'This is not because Machiavelli has nothing to say about republics—quite the opposite.'"}, {"text": "He intends to analyze republics in a separate, dedicated work, Discourses on Livy.", "isCorrect": true, "rationale": "The text clearly states: 'The Prince is a book about principalities, reserving the study of republics for his other great work, the Discourses on Livy.'"}, {"text": "He lacks sufficient knowledge or examples of republican governance.", "isCorrect": false, "rationale": "The text implies he has much to say about republics, just not in this particular work."}, {"text": "He views principalities as the only legitimate form of government.", "isCorrect": false, "rationale": "This implies a value judgment, which is not the reason given for narrowing the focus; rather, it's a division of labor between his works."}], "id": "q03"}, {"question": "A newly emergent military leader seizes control of a fragmented region, unifies it under his direct rule, and establishes a new dynasty without any prior claims or existing hereditary line. How would Machiavelli classify this new state?", "options": [{"text": "An annexed principality.", "isCorrect": false, "rationale": "An annexed principality is a territory added to an existing hereditary state, which is not the case here."}, {"text": "A hereditary principality.", "isCorrect": false, "rationale": "The leader establishes a new dynasty, meaning it's not 'ruled by a family long established in power'."}, {"text": "An entirely new principality.", "isCorrect": true, "rationale": "The text defines an 'entirely new' state as one 'founded from scratch through his own military genius,' which matches this scenario."}, {"text": "A republican principality.", "isCorrect": false, "rationale": "This term is a contradiction in Machiavelli's taxonomy; republics and principalities are distinct categories."}], "id": "q04"}, {"question": "According to Machiavelli's definition, which of the following scenarios best illustrates a prince demonstrating virtù?", "options": [{"text": "A prince inheriting a stable kingdom and maintaining peace through popular policies.", "isCorrect": false, "rationale": "While maintaining peace is good, virtù emphasizes active 'skill, energy, decisiveness' in seizing opportunity, not merely inheriting stability."}, {"text": "A prince successfully navigating a sudden economic crisis by imposing his strategic will and innovative solutions.", "isCorrect": true, "rationale": "This scenario demonstrates the 'combination of skill, energy, decisiveness, and political cunning that allows a prince to seize opportunity and impose his will on circumstances,' which is Machiavelli's definition of virtù."}, {"text": "A prince gaining power solely because a powerful rival unexpectedly dies, clearing his path to the throne.", "isCorrect": false, "rationale": "This scenario describes acquiring power through 'fortune' (luck, circumstance), not through the prince's own virtù."}, {"text": "A prince known for his moral uprightness and charitable acts among his subjects.", "isCorrect": false, "rationale": "The text explicitly states virtù 'does not mean virtue in the moral sense—goodness, piety, or righteousness.'"}], "id": "q05"}, {"question": "Why does the text emphasize that 'classification is analysis for Machiavelli,' particularly in this introductory chapter?", "options": [{"text": "Because Machiavelli is only interested in categorizing and not in deeper political philosophy.", "isCorrect": false, "rationale": "The classification is the foundation for his deeper political analysis throughout the book, not an end in itself."}, {"text": "To show that by sorting states into types, he is already beginning the work that the entire book will develop.", "isCorrect": true, "rationale": "The text states, 'By sorting states into types and types of acquisition into categories, he is already doing the work that the entire book will develop.'"}, {"text": "To suggest that Machiavelli prefers theoretical models over practical political advice.", "isCorrect": false, "rationale": "Machiavelli's method focuses on 'the effectual truth of the matter,' which is inherently practical, not purely theoretical."}, {"text": "To highlight his academic background as a pure theorist, detached from real-world governance.", "isCorrect": false, "rationale": "Machiavelli was deeply engaged with practical governance and sought to understand 'what states are' in reality."}], "id": "q06"}, {"question": "The text identifies the 'central philosophical problem of The Prince' as the tension between what a ruler can control and what he cannot. Which two Machiavellian concepts represent this fundamental tension?", "options": [{"text": "Hereditary right and popular mandate.", "isCorrect": false, "rationale": "These refer to sources of authority or legitimacy, not the inherent tension between human agency and external circumstances."}, {"text": "Republics and Principalities.", "isCorrect": false, "rationale": "These are categories of political entities, not the internal forces that shape a prince's political outcomes."}, {"text": "Virtù and Fortuna.", "isCorrect": true, "rationale": "The text explicitly defines virtù as what a ruler can control (skill, ability) and fortuna as what he cannot (luck, circumstance), stating, 'The tension between what a ruler can control (virtù) and what he cannot (fortuna) is the central philosophical problem of The Prince.'"}, {"text": "Military strength and economic prosperity.", "isCorrect": false, "rationale": "These are elements of power and state well-being, but not the overarching philosophical struggle between human agency and unpredictable events."}], "id": "q07"}, {"question": "The text warns that a reader who picks up The Prince alone and concludes Machiavelli favors tyranny has 'missed half the picture.' What 'half' has such a reader likely overlooked?", "options": [{"text": "Machiavelli's detailed historical accounts of successful tyrannies.", "isCorrect": false, "rationale": "Focusing on successful tyrannies would likely reinforce, not correct, the misconception that Machiavelli favors tyranny."}, {"text": "His critical analysis of the long-term instability of tyrannical rule.", "isCorrect": false, "rationale": "While he might discuss this, the text points to a more fundamental omission related to his broader body of work."}, {"text": "His extensive writings on republics in Discourses on Livy.", "isCorrect": true, "rationale": "The text states, 'The Prince is a book about principalities, reserving the study of republics for his other great work, the Discourses on Livy. ... A reader who picks up The Prince alone and concludes that Machiavelli favors tyranny has missed half the picture.'"}, {"text": "The advice he gives to hereditary princes, which is inherently less tyrannical.", "isCorrect": false, "rationale": "While hereditary princes face different challenges, this is not the primary reason cited for the 'half picture' warning; the core reason is the absence of his republican thought."}], "id": "q08"}, {"question": "Based on the text's examples, what is the key distinction Machiavelli makes between Francesco Sforza's Duchy of Milan and the Kingdom of Naples after its absorption by the Spanish Crown?", "options": [{"text": "Sforza's Milan was acquired through fortuna, while Naples was acquired through virtù.", "isCorrect": false, "rationale": "The text specifies Sforza founded Milan through his 'military genius,' implying virtù. The mode of Naples' acquisition (beyond being annexed) isn't detailed here regarding virtù or fortuna."}, {"text": "Sforza's Milan was an entirely new principality, whereas Naples became an annexed territory to an existing hereditary state.", "isCorrect": true, "rationale": "The text uses these two examples to illustrate the subdivision of new principalities: 'a state can be entirely new (like the Duchy of Milan under Francesco Sforza)...or it can be a territory annexed to an existing hereditary state (like the kingdom of Naples absorbed into the Spanish crown).'"}, {"text": "Sforza's Milan was a republic that transformed into a principality, while Naples was always a principality.", "isCorrect": false, "rationale": "Sforza founded a new principality, not a transformed republic. The text doesn't classify Naples' prior status as a republic."}, {"text": "Sforza ruled a principality in Italy, while Naples was annexed by a non-Italian power.", "isCorrect": false, "rationale": "While geographically true, this is not the key Machiavellian classification distinction being made regarding the types of new principalities."}], "id": "q09"}, {"question": "Why does Machiavelli immediately subdivide principalities into 'hereditary' and 'new' after establishing them as his focus in The Prince?", "options": [{"text": "To illustrate that hereditary principalities are inherently more stable than new ones.", "isCorrect": false, "rationale": "While stability might be discussed later, the text states the immediate reason for the distinction is practical: differing challenges and solutions."}, {"text": "Because the challenges a prince faces and the solutions available vary significantly by type of state.", "isCorrect": true, "rationale": "The text explicitly states: 'Why does this distinction matter? Because the problems a prince faces—and the solutions available to him—differ dramatically depending on which type of state he rules.'"}, {"text": "To demonstrate his extensive knowledge of European political history.", "isCorrect": false, "rationale": "While his knowledge is evident, the purpose of the subdivision is analytical and prescriptive for the prince, not merely a display of erudition."}, {"text": "To suggest that hereditary rule is a more legitimate form of governance.", "isCorrect": false, "rationale": "Machiavelli's method focuses on classifying 'what states are' and how they function, rather than assigning moral legitimacy at this stage of his taxonomy."}], "id": "q10"}, {"question": "Machiavelli personifies Fortune as 'a powerful, capricious woman.' What does this personification tell us about his view of the relationship between a prince and fortune?", "options": [{"text": "It suggests fortune is fundamentally benevolent and will eventually reward virtuous princes.", "isCorrect": false, "rationale": "A 'capricious' person acts on whim without regard for merit — capriciousness implies fortune rewards and punishes without reference to a prince's virtue or effort."}, {"text": "It implies fortune is an active, unpredictable force that can both elevate and destroy princes, regardless of their merits.", "isCorrect": true, "rationale": "Describing fortune as 'powerful' and 'capricious' (acting on whim) emphasizes that it is both formidable and arbitrary — it 'can sweep a prince to power or dash him to ruin,' independent of his worth or actions."}, {"text": "It indicates Machiavelli believed fortune was an exclusively feminine quality that female rulers possessed.", "isCorrect": false, "rationale": "The personification is a rhetorical device from classical tradition, not a claim about gender and governance. Machiavelli uses the metaphor to capture fortune's arbitrary, powerful nature."}, {"text": "It shows fortune is entirely controllable through the right combination of virtù and military strength.", "isCorrect": false, "rationale": "The central tension of The Prince is that fortune CANNOT be fully controlled — that is precisely the philosophical problem. Virtù can influence fortune, but not eliminate it."}], "id": "q11"}, {"question": "The text notes that Ferdinand of Aragon's conquest of Naples (1503) was 'precisely the kind of event Machiavelli was analyzing.' How does this connect to Machiavelli's broader analytical project?", "options": [{"text": "It shows Machiavelli's personal admiration for Spanish imperialism and its methods.", "isCorrect": false, "rationale": "Machiavelli analyzes Ferdinand as a model of effective princely action — he uses the example instrumentally, not as an endorsement of Spanish imperialism for its own sake."}, {"text": "It illustrates that Machiavelli draws his examples from recent, observable events to test his analytical categories against political reality.", "isCorrect": true, "rationale": "Naples was conquered in 1503 — within Machiavelli's own lifetime and diplomatic experience. Using contemporary examples alongside ancient ones demonstrates his commitment to studying the effectual truth of political reality, not just ancient history."}, {"text": "It indicates that Machiavelli believed only Spanish rulers were capable of effective acquisition of new territories.", "isCorrect": false, "rationale": "Ferdinand appears as one of several model princes Machiavelli uses — others include Cesare Borgia, Francesco Sforza, Moses, and Cyrus. No single nation is privileged as the model."}, {"text": "It proves that Machiavelli's taxonomy was created specifically to analyze the Spanish Empire.", "isCorrect": false, "rationale": "The taxonomy is presented as universal ('All states, all powers') — Spanish examples are one set among many he uses to illustrate categories that apply to all principalities."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
