<script>
var QUESTIONS = [{"question": "According to Machiavelli, what was a primary political motivation behind Ferdinand II of Aragon's expulsion of the Jews from Spain?", "options": [{"text": "To demonstrate his unwavering piety and devotion to the Catholic Church.", "isCorrect": false, "rationale": "Machiavelli was 'notably cool' on Ferdinand's piety, viewing it as a tool rather than a genuine motivation for his actions."}, {"text": "To seize significant wealth and use religion as a political cover for his actions.", "isCorrect": true, "rationale": "The text explicitly states that Ferdinand and Isabella seized significant wealth and that Machiavelli noted this as an example of using religion as a political cover."}, {"text": "To eliminate a competing religious group that directly challenged his dynastic authority.", "isCorrect": false, "rationale": "While the expulsion certainly removed a religious group, the text emphasizes seizing wealth and using religion as a cover, not a direct challenge to dynastic authority as the primary motivation for Machiavelli."}, {"text": "To secure a crucial military alliance with other powerful European Catholic monarchs.", "isCorrect": false, "rationale": "Securing alliances is not mentioned in the text as a primary motivation for the expulsion of the Jews; rather, it focuses on internal political and economic gains."}], "id": "q01"}, {"question": "Machiavelli's concept of the 'Politics of Spectacle' suggests that a prince should primarily focus on:", "options": [{"text": "Quietly building a strong military and treasury to secure the state.", "isCorrect": false, "rationale": "Machiavelli states that a prince should not be 'merely respected in a quiet way,' but actively admired and discussed, which contradicts a quiet approach."}, {"text": "Cultivating an active and visible reputation through grand achievements and decisive actions.", "isCorrect": true, "rationale": "The 'Politics of Spectacle' emphasizes cultivating the quality of 'being talked about' through 'great enterprises, decisive actions, extraordinary patronage' to build a powerful reputation."}, {"text": "Ensuring the fair and just administration of laws to earn his subjects' loyalty.", "isCorrect": false, "rationale": "Machiavelli was 'notably cool' on the prince's piety or justice, prioritizing political effectiveness and renown over moral governance."}, {"text": "Delegating authority to trusted advisors to manage daily affairs efficiently.", "isCorrect": false, "rationale": "While efficient administration is important, the 'Politics of Spectacle' focuses on the prince's direct and visible actions to gain renown, not on delegation as the primary focus."}], "id": "q02"}, {"question": "Based on Machiavelli's advice regarding neutrality, if a small nation is situated between two powerful warring states, what course of action would he most likely recommend?", "options": [{"text": "Remain strictly neutral to avoid making enemies and preserve options.", "isCorrect": false, "rationale": "Machiavelli explicitly calls neutrality a 'delusion,' arguing that it pleases no one and leaves the neutral party vulnerable to the victor without reward."}, {"text": "Declare support for the weaker side to gain gratitude if they win.", "isCorrect": false, "rationale": "Machiavelli advises committing decisively to one side, but does not specifically recommend choosing the 'weaker' side; the emphasis is on the commitment itself and earning a reputation for reliability."}, {"text": "Commit decisively to one side, even if that side is likely to lose, to earn a reputation for courage.", "isCorrect": true, "rationale": "Machiavelli states that 'the prince who commits decisively to one side, even if that side loses, earns a reputation for reliability and courage that pays dividends over time.'"}, {"text": "Form alliances with both sides simultaneously to play them against each other.", "isCorrect": false, "rationale": "This strategy contradicts Machiavelli's advice against neutrality and would likely lead to suspicion from both sides, rather than earning a reputation for reliability."}], "id": "q03"}, {"question": "Machiavelli's admiration for Ferdinand II of Aragon was rooted primarily in which aspect of his rule?", "options": [{"text": "His deep piety and moral leadership as a Catholic Monarch.", "isCorrect": false, "rationale": "The text states Machiavelli was 'notably cool on both' Ferdinand's piety and justice, indicating these were not the basis of his admiration."}, {"text": "His political effectiveness, decisiveness, and skillful use of power as a strategic instrument.", "isCorrect": true, "rationale": "Machiavelli admired Ferdinand 'not his piety or his justice... but his political effectiveness' and his ability to be 'bold, decisive, and skilled at using religion as a political instrument.'"}, {"text": "His commitment to justice and fair treatment of all his subjects.", "isCorrect": false, "rationale": "Machiavelli was 'notably cool on both' Ferdinand's piety and justice, showing he did not admire him for these qualities."}, {"text": "His ability to maintain peace and avoid conflict through diplomacy and negotiation.", "isCorrect": false, "rationale": "Ferdinand's actions were characterized by conquest and decisive military campaigns, not primarily by conflict avoidance through diplomacy."}], "id": "q04"}, {"question": "Machiavelli's recommendations for domestic management, such as honoring artisans and holding festivals, are presented as:", "options": [{"text": "Expressions of the prince's genuine benevolence and care for his people.", "isCorrect": false, "rationale": "The text explicitly states: 'These recommendations are not sentimental. They are, once again, strategic,' rejecting the idea of genuine benevolence as the primary motive."}, {"text": "Strategic tools to build reputation, foster loyalty, and maintain social order within the state.", "isCorrect": true, "rationale": "These actions are described as 'strategic' ways to build 'a reputation as a patron and a protector,' provide 'collective pleasures that bind them to the state,' and create 'networks of loyalty and order.'"}, {"text": "Obligations derived from the prince's divine right to rule over his subjects.", "isCorrect": false, "rationale": "Machiavelli's advice is entirely pragmatic and political, with no mention of divine right as the basis for these actions."}, {"text": "Methods to redistribute wealth and ensure economic equality among all subjects.", "isCorrect": false, "rationale": "The focus of these recommendations is on political strategy, reputation, and social cohesion, not on economic equality or wealth redistribution."}], "id": "q05"}, {"question": "A ruler, following Machiavelli's advice, decides to commit decisively to one side in a conflict between neighboring powers, even risking defeat. What long-term benefit does Machiavelli foresee for this ruler, regardless of the immediate outcome?", "options": [{"text": "An immediate increase in the nation's military power due to wartime experience.", "isCorrect": false, "rationale": "While wartime experience can be beneficial, Machiavelli's primary emphasis for this particular advice is on the reputational gain, not immediate military power."}, {"text": "A reputation for reliability and courage that will attract future allies and build trust.", "isCorrect": true, "rationale": "Machiavelli states that such a prince 'earns a reputation for reliability and courage that pays dividends over time. Potential allies know that your commitments are real.'"}, {"text": "The opportunity to negotiate a favorable peace treaty with the eventual victor.", "isCorrect": false, "rationale": "This outcome is more likely for a neutral party, which Machiavelli advises against. A committed, losing party would not necessarily have leverage for a favorable treaty."}, {"text": "The ability to remain independent and self-sufficient without foreign entanglements.", "isCorrect": false, "rationale": "Committing to one side in a conflict is the opposite of remaining independent and self-sufficient; it involves deep foreign entanglement."}], "id": "q06"}, {"question": "The various enterprises undertaken by Ferdinand II of Aragon, such as the conquest of Granada, the expulsion of the Jews, and campaigns in North Africa and Italy, primarily served to:", "options": [{"text": "Establish a morally upright and just kingdom based on strict religious principles.", "isCorrect": false, "rationale": "Machiavelli explicitly notes his disinterest in Ferdinand's piety or justice, seeing religion as a tool rather than an ultimate guiding principle for these actions."}, {"text": "Secure his personal wealth and that of his immediate family, consolidating dynastic power.", "isCorrect": false, "rationale": "While wealth was sometimes seized, the overarching purpose Machiavelli identifies for these continuous enterprises was to maintain political effectiveness, consolidate state power, and occupy the minds of subjects and rivals."}, {"text": "Expand Spain's territorial claims and acquire new resources through colonial expansion.", "isCorrect": false, "rationale": "While territorial expansion and colonial empire were outcomes, Machiavelli's analysis focuses on the *political utility* of these actions for maintaining renown and control, rather than merely the acquisition of land or resources as the primary driver."}, {"text": "Maintain the continuous engagement of his subjects and rivals, preventing conspiracy and solidifying his renown.", "isCorrect": true, "rationale": "Machiavelli explains that Ferdinand understood 'each enterprise, once completed, had to be followed by a greater one' to 'occupy the minds of his subjects and rivals' and prevent them from plotting against him, thereby sustaining his renown."}], "id": "q07"}, {"question": "The advice Machiavelli gives about neutrality is explicitly linked in the text to which later diplomatic tradition?", "options": [{"text": "Idealism in international relations, emphasizing shared values and cooperation.", "isCorrect": false, "rationale": "Idealism is a contrast to the pragmatic, self-interested approach of realpolitik, which Machiavelli's advice prefigures."}, {"text": "The tradition of realpolitik, focusing on practical considerations of power and self-interest.", "isCorrect": true, "rationale": "The text states: 'This advice about neutrality prefigures the tradition of realpolitik that would come to dominate European diplomacy by the nineteenth century.'"}, {"text": "Multilateralism and collective security, advocating for global cooperation.", "isCorrect": false, "rationale": "Machiavelli's advice on decisive commitment to one side, driven by self-interest and reputation, is distinct from the broader cooperation central to multilateralism."}, {"text": "Pacifism and conflict resolution through non-violent means.", "isCorrect": false, "rationale": "Machiavelli's advice to commit decisively to a side in conflict, even risking loss, is antithetical to pacifism or conflict avoidance."}], "id": "q08"}, {"question": "Imagine a prince has two options: fund an extravagant public festival or invest the same resources into building a new hospital for the poor. Which action would Machiavelli most likely advise to enhance the prince's renown and why?", "options": [{"text": "Fund the hospital, as it demonstrates genuine care for the populace and earns loyalty.", "isCorrect": false, "rationale": "Machiavelli prioritizes visible political strategy over 'sentiment' or 'genuine care' (justice/piety), and a hospital, while beneficial, might be less of a 'spectacle.'"}, {"text": "Fund the festival, as it provides collective pleasures and highly visible spectacle that binds people to the state.", "isCorrect": true, "rationale": "Machiavelli explicitly recommends 'hold festivals and spectacles to entertain the people at appropriate seasons' because they 'provide the population with collective pleasures that bind them to the state,' aligning with the 'Politics of Spectacle.'"}, {"text": "Fund both equally, as a balanced approach ensures both popularity and essential services.", "isCorrect": false, "rationale": "Machiavelli's advice leans towards maximizing political impact and renown. Given the choice, the spectacle provides more immediate, visible political return than a hospital for enhancing renown."}, {"text": "Neither, as resources should primarily be directed towards military expansion and defense.", "isCorrect": false, "rationale": "While military strength is crucial, the text also details the importance of domestic management and spectacle in building renown, showing resources should be allocated beyond just military."}], "id": "q09"}, {"question": "Machiavelli emphasizes that a prince builds renown not through a single act but through 'a sustained pattern of impressive, visible, decisive behavior across every domain of political life.' This implies that the effectiveness of the 'Politics of Spectacle' relies on:", "options": [{"text": "The prince's ability to cultivate a strong network of spies and informants to anticipate threats.", "isCorrect": false, "rationale": "While intelligence gathering is a part of effective rule, this specific quote refers to the *continuous public actions* of the prince, not covert operations."}, {"text": "A continuous series of engaging and attention-commanding achievements that prevent subjects and rivals from plotting.", "isCorrect": true, "rationale": "The text states that 'each enterprise, once completed, had to be followed by a greater one' because a prince 'occupies the minds of his subjects and rivals' with achievements, and 'The moment he stops being impressive, the political space for conspiracy reopens.'"}, {"text": "The consistent application of moral principles and ethical governance to inspire trust and loyalty.", "isCorrect": false, "rationale": "Machiavelli's focus is on political effectiveness and renown, often decoupled from 'moral principles and ethical governance,' as he was 'cool on' piety and justice."}, {"text": "A strong, hereditary claim to the throne that discourages any challenges to his legitimacy.", "isCorrect": false, "rationale": "While a hereditary claim can be advantageous, Machiavelli's discussion here is about how a prince *actively builds and maintains* renown and power through his actions, rather than relying solely on inherited legitimacy."}], "id": "q10"}, {"question": "The study guide describes Ferdinand as understanding that each completed enterprise 'had to be followed by a greater one.' What political logic makes continuous enterprise essential rather than optional for a prince seeking to maintain renown?", "options": [{"text": "Continuous enterprises generate new revenue streams that fund the state, making financial sustainability the main driver.", "isCorrect": false, "rationale": "Financial benefit may be one outcome, but the study guide's explanation of why enterprises must be continuous is political and psychological, not primarily financial."}, {"text": "Idle attention—the moment a prince stops generating impressive, visible achievements—reopens political space for conspiracy and challenges to his authority.", "isCorrect": true, "rationale": "The study guide explains that Ferdinand's enterprises occupied the minds of subjects and rivals, preventing them from plotting. The moment impressive behavior stops, that mental occupation ceases and 'the political space for conspiracy reopens.' Renown requires perpetual performance."}, {"text": "Constant enterprises build the army's combat skill, which is the real source of the prince's security.", "isCorrect": false, "rationale": "Military skill is developed, but the specific function of continuous enterprises in the study guide is occupying public attention and preventing conspiracy, not primarily building army capability."}, {"text": "Completing enterprises creates treaty obligations that compel the prince to begin new ones.", "isCorrect": false, "rationale": "The logic is internal and psychological—about attention and conspiracy—not about treaty chains creating sequential obligations."}], "id": "q11"}, {"question": "The study guide links Machiavelli's advice on neutrality to the tradition of realpolitik. What makes Machiavelli's anti-neutrality argument a proto-realist position rather than an idealist one?", "options": [{"text": "He argues that neutrality is morally wrong because it abandons allies in need.", "isCorrect": false, "rationale": "This would be an idealist argument based on moral obligation. Machiavelli's argument is entirely strategic—neutrality is foolish because of what it does to the prince's interests, not because it is morally wrong."}, {"text": "He grounds the case against neutrality entirely in self-interest and power calculation: neutrality harms the prince's reputation and leaves him without powerful friends, regardless of the moral dimension.", "isCorrect": true, "rationale": "Machiavelli does not appeal to friendship, solidarity, or moral duty when condemning neutrality. He argues purely in terms of outcomes: neutrality leaves the prince friendless and despised by the victor, while commitment builds reputation and alliances. This consequentialist, self-interest-based reasoning is precisely the hallmark of the realpolitik tradition."}, {"text": "He argues that all states are naturally hostile and alliances are always temporary, making commitment strategically necessary.", "isCorrect": false, "rationale": "Machiavelli does not argue that alliances are always temporary or that all states are inherently hostile. His point is more specific: in a given conflict, neutrality is strategically inferior to commitment."}, {"text": "He recommends that a prince always side with the strongest power, which is the defining feature of realism.", "isCorrect": false, "rationale": "Machiavelli does not specifically say to always side with the strongest power; his advice is to commit decisively and earn a reputation for reliability. Siding with the strongest is a different realist prescription."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
