<script>
var QUESTIONS = [{"question": "According to Machiavelli, when a prince cannot be both loved and feared, which state is safer for him to cultivate?", "options": [{"text": "Being loved, as it fosters loyalty and trust among his subjects.", "isCorrect": false, "rationale": "Machiavelli explicitly states that love is preserved by a link of obligation which, owing to the baseness of men, is easily broken for their advantage. Thus, love is not a reliable foundation."}, {"text": "Being feared, as it is a more reliable deterrent sustained by the dread of punishment.", "isCorrect": true, "rationale": "Machiavelli argues that 'it is much safer to be feared than loved, when, of the two, either must be dispensed with' because 'fear preserves you by a dread of punishment which never fails.' He views men as ungrateful and fickle, making love an unreliable bond."}, {"text": "A perfect balance of both, even if difficult to achieve, is the only truly secure position.", "isCorrect": false, "rationale": "While Machiavelli states that one should wish to be both, he immediately follows by acknowledging the difficulty and concludes that it is safer to be feared if a choice must be made."}, {"text": "Neither, as both conditions can lead to popular unrest and eventual downfall if not managed perfectly.", "isCorrect": false, "rationale": "Machiavelli does not suggest neither is viable. Instead, he weighs the risks and benefits of each, concluding that fear is the more secure option."}]}, {"question": "Machiavelli advises a prince to inspire fear in such a way that, if he does not win love, he at least avoids hatred. Which action is most crucial for a prince to prevent his subjects from hating him?", "options": [{"text": "Granting them many freedoms and privileges to ensure their contentment.", "isCorrect": false, "rationale": "While a prince should not be intolerable, granting 'too much mercy' or license can lead to disorders, as seen with Pistoia, which Machiavelli would not endorse as a primary means to avoid hatred."}, {"text": "Abstaining from confiscating their property and violating their women.", "isCorrect": true, "rationale": "Machiavelli explicitly states: 'he can endure very well being feared whilst he is not hated, which will always be as long as he abstains from the property of his citizens and subjects and from their women.' He emphasizes that men forget the death of their father sooner than the loss of their patrimony."}, {"text": "Always being clement and forgiving, even towards those who commit minor offenses.", "isCorrect": false, "rationale": "This contradicts Machiavelli's argument that a prince should not misuse clemency and that sometimes judicious cruelty is more merciful to the whole populace."}, {"text": "Engaging in frequent public displays of his military strength to deter internal dissent.", "isCorrect": false, "rationale": "While displaying strength can inspire fear, it doesn't directly address avoiding hatred, especially if the prince simultaneously infringes upon the property or women of his subjects."}]}, {"question": "Machiavelli contrasts Cesare Borgia's actions with those of the Florentine people regarding Pistoia. What is the central lesson he draws from this comparison?", "options": [{"text": "True clemency involves avoiding any form of violence or execution to maintain a benevolent reputation.", "isCorrect": false, "rationale": "Machiavelli critiques the Florentine people for permitting Pistoia's destruction to avoid a reputation for cruelty, indicating that avoiding violence at all costs is not true clemency if it leads to greater disorder."}, {"text": "A prince's effective cruelty, used strategically, can ultimately be more merciful for the whole populace than excessive leniency.", "isCorrect": true, "rationale": "Machiavelli points out that Cesare Borgia's perceived cruelty reconciled the Romagna, unified it, and restored peace, making him 'much more merciful than the Florentine people, who, to avoid a reputation for cruelty, permitted Pistoia to be destroyed.' This illustrates that calculated harshness can prevent greater suffering."}, {"text": "Public perception of a ruler's qualities (e.g., 'clement') is more important than the actual outcomes of his policies.", "isCorrect": false, "rationale": "Machiavelli prioritizes effective governance and order ('keeping subjects united and loyal') over mere reputation, showing that outcomes matter more than initial perceptions."}, {"text": "Cesare Borgia was an exceptional case whose ruthless methods are not generally applicable to all rulers.", "isCorrect": false, "rationale": "Machiavelli uses Borgia as a direct example to support his general argument about the utility of cruelty, implying his methods offer a valuable lesson for any prince."}]}, {"question": "Machiavelli characterizes men as \"ungrateful, fickle, false, cowardly, covetous.\" How does this view of human nature directly inform his argument that fear is more reliable than love?", "options": [{"text": "Men are inherently good and respond better to positive reinforcement like love, making a ruler beloved in the long run.", "isCorrect": false, "rationale": "This statement directly contradicts Machiavelli's cynical view of human nature presented in the text."}, {"text": "Love is based on obligation which men easily break for their advantage, while fear is sustained by the constant dread of punishment, which never fails.", "isCorrect": true, "rationale": "Machiavelli argues that 'love is preserved by the link of obligation which, owing to the baseness of men, is broken at every opportunity for their advantage; but fear preserves you by a dread of punishment which never fails.' This reflects his belief that self-interest drives men, making fear a more consistent motivator."}, {"text": "Fear motivates men to overthrow a cruel ruler, making love a safer, more stable long-term strategy for governance.", "isCorrect": false, "rationale": "Machiavelli argues that fear, when managed to avoid hatred (e.g., by respecting property), keeps men in line. He does not suggest it leads to inevitable overthrow."}, {"text": "Both love and fear are equally unreliable because men are unpredictable and can turn against a prince regardless of his actions.", "isCorrect": false, "rationale": "Machiavelli explicitly distinguishes between the reliability of love and fear, concluding that fear is 'much safer' due to its consistent enforcement mechanism."}]}, {"question": "Why does Machiavelli state that it is 'impossible for the new prince to avoid the imputation of cruelty'?", "options": [{"text": "New states are inherently dangerous and require decisive, sometimes harsh, actions to consolidate power and maintain order.", "isCorrect": true, "rationale": "The text states, 'it is impossible for the new prince to avoid the imputation of cruelty, owing to new states being full of dangers.' This implies that the volatile nature of new acquisitions necessitates actions that will be perceived as cruel, but are essential for security."}, {"text": "A new prince has not yet had sufficient time to build a reputation for clemency among his subjects.", "isCorrect": false, "rationale": "While a new prince might lack a pre-established reputation, the primary reason given is the inherent dangers of new states, which *compel* certain actions, not merely a lack of prior good deeds."}, {"text": "Older, established princes are expected to be cruel, so new princes must conform to maintain credibility.", "isCorrect": false, "rationale": "The text focuses on the *necessity* arising from the state's condition, not from emulation of other rulers' reputations. Indeed, Machiavelli later suggests a prince should desire to be considered clement initially."}, {"text": "The populace is always suspicious of new leadership and will attribute cruelty regardless of the prince's actual intentions or actions.", "isCorrect": false, "rationale": "Machiavelli's argument centers on the *actions* a new prince *must* take due to dangers, not simply on an unavoidable public perception independent of behavior."}]}, {"question": "Machiavelli advises that when a prince must proceed against a subject, he must 'above all things... keep his hands off the property of others, because men more quickly forget the death of their father than the loss of their patrimony.' What is the underlying psychological insight here?", "options": [{"text": "The emotional bond with family members is generally weaker than the attachment to material wealth and possessions.", "isCorrect": false, "rationale": "The text does not imply a weaker emotional bond to family. Rather, it suggests the *nature* of the grievance and its potential for ongoing resentment. Death, once avenged or mourned, may lapse; property loss is a continuous, tangible deprivation."}, {"text": "Loss of property directly impacts survival and future prospects, leading to more enduring and widespread resentment and a continuous cause for grievance.", "isCorrect": true, "rationale": "Machiavelli explains, 'pretexts for taking away the property are never wanting; for he who has once begun to live by robbery will always find pretexts for seizing what belongs to others; but reasons for taking life, on the contrary, are more difficult to find and sooner lapse.' This indicates that property loss is a persistent threat and grievance that is harder for subjects to forget or forgive, as it fundamentally undermines their security and livelihood."}, {"text": "Death is often perceived as an act of fate or divine will, while loss of property is always seen as a direct, unjust act of the prince.", "isCorrect": false, "rationale": "A prince's execution is also a direct act, but Machiavelli distinguishes it by saying reasons for it are harder to find and lapse. The key is the ongoing nature of property loss."}, {"text": "Property can often be recovered or replaced, while life cannot, making property loss a more manageable grievance for the prince.", "isCorrect": false, "rationale": "Machiavelli states the opposite; the 'loss of their patrimony' is *less* quickly forgotten, implying it is a more dangerous source of hatred for the prince because pretexts for taking it are always present."}]}, {"question": "A newly appointed governor in a volatile province is struggling to maintain order, facing frequent insurrections and banditry. Applying Machiavelli's principles from this chapter, what would be his most pragmatic approach?", "options": [{"text": "Offer generous pardons and clemency to rebels to win their affection and loyalty, thus reducing future conflict.", "isCorrect": false, "rationale": "This mirrors the error of the Florentines who, through 'too much mercy,' allowed disorders to arise, leading to greater harm. Machiavelli would advise against misusing clemency in a dangerous new state."}, {"text": "Establish a reputation for swift and decisive, even harsh, punishment for those who disturb the peace, while scrupulously protecting subjects' property and family.", "isCorrect": true, "rationale": "This approach aligns directly with Machiavelli's advice: inspire fear with a 'few examples' of cruelty (more merciful than widespread disorder), especially in a 'new state full of dangers,' while crucially avoiding hatred by 'keeping hands off the property of others and their women.'"}, {"text": "Delegate all punitive actions to his subordinates to maintain a public image of benevolence and compassion.", "isCorrect": false, "rationale": "A prince, especially a new one, cannot avoid the 'imputation of cruelty' when faced with dangers. Attempting to delegate all 'cruel' acts risks appearing weak or ineffective, and ultimately he is still responsible for the outcomes."}, {"text": "Focus primarily on economic development and prosperity, believing that a wealthy and satisfied populace will be content and loyal.", "isCorrect": false, "rationale": "While economic well-being is beneficial, Machiavelli prioritizes order and security through fear, especially in a volatile context. He views men as 'covetous' and their loyalty unreliable if based solely on good fortune or 'payments' rather than dread of punishment."}]}, {"question": "According to Machiavelli, why is it 'quite necessary' for a prince leading an army to 'disregard the reputation of cruelty'?", "options": [{"text": "Soldiers are inherently more disciplined than civilians and thus respond better to strict, unwavering leadership.", "isCorrect": false, "rationale": "The text emphasizes the *utility* of cruelty for unity and duty, not an inherent discipline of soldiers in general. The focus is on the *effect* of cruelty on the army's cohesion, particularly a diverse one."}, {"text": "Without it, he would never hold his army united or disposed to its duties, especially when composed of diverse races and fighting in foreign lands.", "isCorrect": true, "rationale": "Machiavelli explicitly states this, using Hannibal as the prime example: his 'inhuman cruelty' was what united his 'enormous army, composed of many various races of men,' and made him 'revered and terrible' in their sight, ensuring their duties and unity."}, {"text": "To prevent his soldiers from fearing him too much and thus becoming demoralized or deserting.", "isCorrect": false, "rationale": "Machiavelli argues the opposite; fear (born of cruelty) keeps them in line and united, contrasting it with Scipio's forbearance leading to rebellion."}, {"text": "Soldiers are more tolerant of harshness than civilians, expecting it as part of military life.", "isCorrect": false, "rationale": "While soldiers might expect a degree of harshness, Machiavelli's point is about the *functionality* of cruelty for command and unity, not merely a 'tolerance' level. It's a tool for specific outcomes."}]}, {"question": "The comparison between Hannibal, who used 'inhuman cruelty' to unify his diverse army, and Scipio, whose 'too great forbearance' led to his army's rebellion, serves to illustrate which of Machiavelli's points?", "options": [{"text": "That courage and valor are sufficient qualities for a military leader to inspire loyalty, regardless of other attributes.", "isCorrect": false, "rationale": "Machiavelli states that without Hannibal's cruelty, 'his other virtues were not sufficient to produce this effect,' directly contradicting that valor alone is enough. Scipio, an 'excellent man,' failed due to forbearance."}, {"text": "That excessive forbearance or leniency in a leader can undermine military discipline, leading to license and potentially rebellion.", "isCorrect": true, "rationale": "Machiavelli uses Scipio's case to prove that 'his too great forbearance... gave his soldiers more license than is consistent with military discipline,' which resulted in rebellion. This contrasts with Hannibal's cruelty maintaining order."}, {"text": "That diverse armies are inherently more difficult to control than homogeneous ones, requiring different leadership styles.", "isCorrect": false, "rationale": "While Hannibal led a diverse army, Machiavelli attributes its unity to his cruelty, not to inherent difficulty of diverse armies. Scipio's army was not explicitly described as diverse, yet it rebelled due to his leniency."}, {"text": "That a prince should always prioritize being loved over being feared by his soldiers to ensure their unwavering devotion.", "isCorrect": false, "rationale": "Scipio, a 'most excellent man' (implying he was beloved), experienced rebellion due to forbearance, while Hannibal, known for cruelty, maintained unity. This supports being feared, not loved, by the army."}]}, {"question": "Machiavelli concludes that a wise prince should 'establish himself on that which is in his own control and not in that of others.' Which of the following best reflects what is primarily in the prince's control, according to the text?", "options": [{"text": "The love of his subjects, which he can earn through consistently benevolent and popular actions.", "isCorrect": false, "rationale": "Machiavelli explicitly states that 'men loving according to their own will,' meaning love is not fully in the prince's control, unlike fear."}, {"text": "The dread of punishment, which instills fear and can be managed to avoid hatred by respecting subjects' property and women.", "isCorrect": true, "rationale": "Machiavelli concludes that 'men... fearing according to that of the prince,' meaning fear is within the prince's control. He can establish this by wielding punishment (dread) and ensure it doesn't turn into hatred by safeguarding property and women."}, {"text": "The economic prosperity of his state, which ensures subjects' loyalty through consistent wealth and opportunity.", "isCorrect": false, "rationale": "While economic prosperity is desirable, the text focuses on the *direct* control over subjects' behavior through fear. Economic conditions can be influenced but are also subject to external factors and the 'covetous' nature of men."}, {"text": "The military strength of his allies, which provides external security and reinforces his internal authority.", "isCorrect": false, "rationale": "The chapter focuses on the prince's internal control over his subjects and army. While alliances are important in Machiavelli's broader work, this specific section emphasizes what the prince can control directly within his domain."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
