<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the *primary* reason that an observer's first impression of a prince is formed by 'observing the men he has around him'?", "options": [{"text": "It demonstrates the prince's ability to command respect and obedience from his subordinates.", "isCorrect": false, "rationale": "While a prince's command might be observed, Machiavelli emphasizes that the *first opinion* is formed on the prince's understanding and judgment, reflected by his choice of ministers, rather than their obedience."}, {"text": "It immediately reveals the prince's personal understanding and discernment without prior interaction.", "isCorrect": true, "rationale": "The text states, 'The first opinion which one forms of a prince, and of his understanding, is by observing the men he has around him.' This directly links the quality of ministers to the prince's perceived judgment."}, {"text": "It allows observers to gauge the economic prosperity and power of the prince's court.", "isCorrect": false, "rationale": "The text focuses on the prince's judgment and understanding as the basis for the first impression, not the economic or power status of the court."}, {"text": "It reflects the cultural values and traditions of the prince's regime.", "isCorrect": false, "rationale": "While choices of ministers might indirectly reflect cultural values, Machiavelli's primary point is about the prince's personal judgment and understanding, not broader cultural aspects."}]}, {"question": "Machiavelli asserts that a minister who advances his own interests at the expense of the state is 'actively dangerous.' Which of the following best explains why such a minister is considered dangerous, rather than merely useless?", "options": [{"text": "He will directly conspire with rivals to overthrow the prince.", "isCorrect": false, "rationale": "While a self-interested minister might act against the prince, the text's primary explanation for danger is not direct conspiracy but rather the corruption of information and advice given to the prince."}, {"text": "His self-serving counsel leads the prince to make decisions based on corrupted information and distorted advice.", "isCorrect": true, "rationale": "The text explicitly states, 'Such a minister is worse than useless—he is actively dangerous, because the prince will be making decisions based on corrupted information and distorted advice.'"}, {"text": "He will openly challenge the prince's authority in public forums.", "isCorrect": false, "rationale": "The text does not mention public challenges; the danger lies more in the hidden subversion of counsel from within the prince's inner circle."}, {"text": "He will embezzle funds, weakening the state's financial stability.", "isCorrect": false, "rationale": "While embezzlement is a potential consequence of self-interest, the text highlights the danger specifically through the distortion of counsel and information, leading to bad decisions."}]}, {"question": "According to Machiavelli, what is the *defining* characteristic that distinguishes a good minister from a bad one?", "options": [{"text": "Their level of formal education and intellectual prowess.", "isCorrect": false, "rationale": "The text does not emphasize formal education as a distinguishing factor for Machiavelli; his focus is on loyalty and orientation."}, {"text": "Their unwavering personal virtue and moral integrity.", "isCorrect": false, "rationale": "The text explicitly states Machiavelli's test is 'not virtue, not competence alone,' indicating these are not the defining characteristics."}, {"text": "Their primary orientation towards the prince and the state rather than personal gain.", "isCorrect": true, "rationale": "Machiavelli's test is described as 'orientation. A good minister thinks primarily about the prince and the state; a bad minister thinks primarily about himself.'"}, {"text": "Their ability to execute tasks efficiently and competently.", "isCorrect": false, "rationale": "While competence is valuable, the text notes it is not the *sole* or *defining* characteristic; orientation towards the prince/state is paramount."}]}, {"question": "Why does Machiavelli categorize a flatterer as a 'bad minister by definition,' regardless of their agreeable nature?", "options": [{"text": "Flatterers are inherently disloyal and will always betray the prince.", "isCorrect": false, "rationale": "The text describes flatterers as prioritizing their comfort and the prince's pleasure, which *leads* to bad advice, but it doesn't state they are inherently conspiratorial or guaranteed to betray."}, {"text": "Their counsel is designed to please the prince rather than serve the prince's actual interests, distorting decision-making.", "isCorrect": true, "rationale": "The 'note' section clarifies: 'The flatterer is a minister who has chosen his own comfort and the prince's pleasure over the prince's actual interests.'"}, {"text": "They lack the necessary skills and intelligence to provide effective advice.", "isCorrect": false, "rationale": "The issue with flatterers is their motivation and orientation, not necessarily a lack of skill. They *could* be competent but choose to flatter."}, {"text": "Flattery undermines the prince's reputation among foreign powers.", "isCorrect": false, "rationale": "The text focuses on the internal impact of flattery on the prince's decisions and interests, not primarily on external reputation."}]}, {"question": "What is the fundamental principle behind Machiavelli's 'elegant' solution to the problem of ministerial self-interest, intended to cultivate loyalty?", "options": [{"text": "To instill a strong sense of moral obligation and duty in the ministers.", "isCorrect": false, "rationale": "Machiavelli's approach is described as 'non-idealistic,' replacing moral frameworks with an analysis of incentives, rather than relying on abstract moral duty."}, {"text": "To ensure the minister's personal prosperity and security are directly tied to the prince's success.", "isCorrect": true, "rationale": "The text states Machiavelli's solution is to 'make the minister's interests align with the prince's. If a minister's prosperity depends entirely on the prince's success, his self-interest and the prince's interests point in the same direction.'"}, {"text": "To demand unwavering, unquestioning obedience through fear of punishment.", "isCorrect": false, "rationale": "The text describes this as a 'rational partnership,' not an 'arrangement of blind loyalty or servile obedience' through fear."}, {"text": "To rotate ministers frequently to prevent them from accumulating too much power.", "isCorrect": false, "rationale": "This strategy is not mentioned in the text as part of Machiavelli's solution for aligning interests and fostering loyalty."}]}, {"question": "Which of the following actions by a prince, according to Machiavelli, is *most directly* aimed at creating a minister's 'stake in the prince's success' to prevent loyalty transfer?", "options": [{"text": "Regularly asking the minister to act against his conscience in small matters to test loyalty.", "isCorrect": false, "rationale": "The text explicitly advises the opposite: 'never ask a good minister to act against his conscience in small matters,' as this builds trust, not a stake in success."}, {"text": "Giving the minister honors, wealth, and responsibility sufficient to make him satisfied and dependent on the prince's fortunes.", "isCorrect": true, "rationale": "The text lists this as one of three things a prince must do: 'give him enough of a stake in the prince's success that he cannot easily transfer his loyalty to a rival.'"}, {"text": "Publicly praising the minister's intelligence and competence.", "isCorrect": false, "rationale": "While good for morale, public praise alone doesn't create a material 'stake' that prevents transfer of loyalty as strongly as honors, wealth, and responsibility do."}, {"text": "Maintaining a strict hierarchy where the minister's power is always subordinate to others.", "isCorrect": false, "rationale": "This describes control, not the creation of a personal 'stake' or alignment of interests that would foster loyalty in the Machiavellian sense."}]}, {"question": "The 'note' section discusses Machiavelli's distinctiveness from older 'mirrors for princes' traditions. What is highlighted as *unique* about Machiavelli's approach to choosing counselors?", "options": [{"text": "His emphasis on selecting ministers from a broad social spectrum.", "isCorrect": false, "rationale": "The text does not discuss social background; it focuses on the *criteria* for selection."}, {"text": "His focus on the minister's abstract virtue and moral character.", "isCorrect": false, "rationale": "The text states he is 'entirely non-idealistic' and 'not interested in whether the minister is virtuous in some abstract sense.'"}, {"text": "His analysis of incentives and the alignment of interests, rather than idealistic moral frameworks.", "isCorrect": true, "rationale": "The note explains: 'What is distinctive about Machiavelli's version is that it is entirely non-idealistic... The moral framework is replaced by an analysis of incentives.'"}, {"text": "His preference for ministers with military rather than political experience.", "isCorrect": false, "rationale": "The text does not mention a preference for military over political experience."}]}, {"question": "A newly appointed prince needs to make a critical decision about allocating resources for infrastructure projects. His chief advisor, driven by self-interest, recommends a project that would greatly enrich his own family's business, despite being less beneficial for the state long-term. Applying Machiavelli's 'mirror principle,' what would an observer conclude about the prince if he follows this advice?", "options": [{"text": "The prince demonstrates strong leadership by trusting his advisors implicitly.", "isCorrect": false, "rationale": "According to Machiavelli, implicitly trusting self-serving advisors would reflect poorly on the prince's judgment, not positively on his leadership."}, {"text": "The prince is likely discerning and wise, as he has chosen a minister who makes bold recommendations.", "isCorrect": false, "rationale": "Boldness is not the criterion; the self-serving nature of the advice indicates a bad minister, and following it reflects poorly on the prince."}, {"text": "The prince either lacks judgment to identify the self-serving nature of the advice or is complicit in the corruption.", "isCorrect": true, "rationale": "The text states, 'If they are self-serving, incompetent, or corrupt, observers conclude that either the prince cannot tell the difference—which means he lacks judgment—or that he can tell the difference but does not care—which means he is complicit in the corruption.'"}, {"text": "The prince is demonstrating a pragmatic approach to governance by allowing private enterprise to flourish.", "isCorrect": false, "rationale": "Machiavelli emphasizes the state's interests; allowing private gain at the *expense* of the state would not be seen as pragmatic but as flawed judgment or complicity."}]}, {"question": "The text states, 'For Machiavelli, there is no middle ground here. The quality of the prince's advisors reflects directly on the quality of the prince.' What does this statement primarily imply about the prince's responsibility regarding his ministers?", "options": [{"text": "A prince can delegate all decision-making to his ministers without personal consequence.", "isCorrect": false, "rationale": "The 'no middle ground' principle means the prince bears direct consequences, both in judgment and reputation, for his ministers' quality."}, {"text": "The prince is ultimately held accountable for the character and effectiveness of the individuals he chooses to advise him.", "isCorrect": true, "rationale": "Because the ministers 'mirror' the prince, their quality is a direct reflection of his own understanding and discernment, making him accountable for his choices."}, {"text": "The prince should regularly dismiss ministers to prevent them from becoming too influential.", "isCorrect": false, "rationale": "While a prince might need to manage influence, the 'no middle ground' statement refers to the *judgment* already cast upon the prince by his initial choices, not a prescriptive action like dismissal."}, {"text": "Public perception of the prince is entirely independent of his choice of ministers.", "isCorrect": false, "rationale": "This directly contradicts the opening statement of the section and the 'mirror principle' which states public opinion is *formed* by observing the ministers."}]}, {"question": "How do 'capable and honest advisors' provide a 'structural advantage' to a prince, according      to the text?", "options": [{"text": "They make the prince appear more powerful and intimidating to rivals.", "isCorrect": false, "rationale": "The text focuses on practical advantages in governance and decision-making, not primarily on outward appearance or intimidation."}, {"text": "They allow the prince to avoid making difficult decisions himself.", "isCorrect": false, "rationale": "Good advisors assist in making decisions by providing sound counsel, but they don't absolve the prince of the responsibility to make decisions."}, {"text": "They multiply the prince's own abilities by providing accurate information, pointing out errors, and facilitating learning from mistakes.", "isCorrect": true, "rationale": "The text states such advisors ensure the prince 'is more likely to receive accurate information, more likely to have his errors pointed out before they become disasters, and more likely to learn from his mistakes. The right ministers are not just a practical asset; they are a form of political intelligence that multiplies the prince's own abilities.'"}, {"text": "They reduce the need for the prince to engage directly with the populace.", "isCorrect": false, "rationale": "The text does not connect good advisors with reducing the need for public engagement; their advantage is tied to internal decision quality."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
