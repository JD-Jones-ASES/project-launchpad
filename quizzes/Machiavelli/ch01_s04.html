<script>
var QUESTIONS = [{"question": "What is the primary \"puzzle\" at the center of Machiavelli's legacy, as presented in the text?", "options": [{"text": "His shift from supporting the Medici to opposing them.", "isCorrect": false, "rationale": "The text does not mention Machiavelli shifting support for the Medici; rather, it highlights his call for them to liberate Italy in The Prince."}, {"text": "The contrast between his advocacy for princely rule in The Prince and his preference for republics in Discourses.", "isCorrect": true, "rationale": "The text explicitly states: 'There is a puzzle at the center of Machiavelli's legacy. The Prince argues... how a single ruler can acquire and hold power... And yet, when we read Machiavelli's longer... work, the Discourses..., we discover something surprising: Machiavelli does not actually favor one-man rule. He favors republics.'"}, {"text": "The mysterious disappearance of some of his original manuscripts.", "isCorrect": false, "rationale": "The text makes no mention of disappearing manuscripts by Machiavelli, though it does note that only a quarter of Livy's original books survive."}, {"text": "His use of Roman history to critique contemporary Italian politics.", "isCorrect": false, "rationale": "While true that he used Roman history for political analysis, this is not presented as the central 'puzzle' but rather as a method for his Discourses."}], "id": "q01"}, {"question": "Based on Discourses on Livy, which form of government does Machiavelli argue is superior for stability, power, and human flourishing?", "options": [{"text": "A principality ruled by an autocratic monarch.", "isCorrect": false, "rationale": "The text states that in the Discourses, Machiavelli 'does not actually favor one-man rule' and instead 'favors republics' over 'any princely rule'."}, {"text": "A military dictatorship focused on rapid expansion.", "isCorrect": false, "rationale": "The text indicates Machiavelli admired the Roman Republic for its citizen-soldiers and institutions, not explicitly a military dictatorship."}, {"text": "A republic where citizens participate through strong institutions.", "isCorrect": true, "rationale": "The text clearly states Machiavelli argues in Discourses that 'free republics—states where citizens participate in their own government through strong institutions... are more powerful, more stable, and more lasting than principalities'."}, {"text": "An empire led by a single, powerful emperor.", "isCorrect": false, "rationale": "The text contrasts Machiavelli's preference for republics with 'one-man rule' or 'princely rule,' which would include an emperor."}], "id": "q02"}, {"question": "Machiavelli admired the Roman Republic primarily for which of the following reasons?", "options": [{"text": "Its rapid territorial expansion through conquest.", "isCorrect": false, "rationale": "While Rome did expand, the text emphasizes its internal mechanisms, not just conquest, as the reason for Machiavelli's admiration."}, {"text": "Its ability to channel internal conflicts into productive competition and prevent any single man from seizing permanent power.", "isCorrect": true, "rationale": "The text specifies that Machiavelli admired 'how its institutions channeled the conflict between patricians and plebeians into productive competition; how its constitutional structure prevented any one man from seizing permanent power.'"}, {"text": "Its absolute rule by the patrician class, ensuring stability.", "isCorrect": false, "rationale": "The text explicitly states he admired how conflict between patricians and plebeians was channeled, implying no single class had absolute rule, and he favored citizen participation."}, {"text": "Its reliance on foreign mercenaries for military strength.", "isCorrect": false, "rationale": "The text states Machiavelli admired 'how its citizen-soldiers were more effective than mercenaries,' directly contradicting this option."}], "id": "q03"}, {"question": "According to Machiavelli's diagnosis, what was the primary reason Italy in 1513 was not ready for republican self-governance?", "options": [{"text": "Its climate was not conducive to agricultural self-sufficiency.", "isCorrect": false, "rationale": "The text does not mention climate or agricultural self-sufficiency as factors in Italy's unreadiness for a republic."}, {"text": "It was too corrupt, fragmented, disorganized, and demoralized by foreign invasion and internal faction.", "isCorrect": true, "rationale": "The text explicitly states: 'But the Italy of 1513 was too corrupt—too fragmented, too disorganized, too demoralized by foreign invasion and internal faction—to simply be a republic.'"}, {"text": "It lacked a strong central religious authority to guide its citizens.", "isCorrect": false, "rationale": "The text does not attribute Italy's unreadiness to a lack of religious authority."}, {"text": "Its citizens were inherently uninterested in political participation.", "isCorrect": false, "rationale": "The text suggests citizens needed to be unified and stabilized, implying they were subjects due to crisis, not inherently uninterested."}], "id": "q04"}, {"question": "The text describes The Prince as \"medicine for a sick patient.\" What does this analogy imply about Machiavelli's view of the work's purpose?", "options": [{"text": "It is a universal blueprint for ideal governance in any state.", "isCorrect": false, "rationale": "The text explicitly states, 'Machiavelli was not writing his ideal vision of politics' and 'The Prince is medicine for a crisis, not a description of the healthy state.'"}, {"text": "It is a temporary solution for a specific political crisis, not a permanent ideal.", "isCorrect": true, "rationale": "The analogy of 'medicine for a sick patient' directly implies a temporary, crisis-specific intervention, as confirmed by 'Machiavelli was not writing his ideal vision of politics' and 'The Prince is... what Italy needs now, not for what politics should look like in an ideal world.'"}, {"text": "It advocates for the permanent establishment of autocratic rule.", "isCorrect": false, "rationale": "The text refutes this, stating, 'Machiavelli is not, in the end, advocating for permanent autocracy' and 'The Prince is... a provisional document'."}, {"text": "It prioritizes moral purity above all political considerations.", "isCorrect": false, "rationale": "The text suggests the prince might need to act 'ruthlessly if necessary,' and ends by questioning 'Whether that realism is morally acceptable,' indicating that moral purity is not the sole priority."}], "id": "q05"}, {"question": "The final chapter of The Prince, calling for the Medici to liberate Italy, supports the interpretation that The Prince is:", "options": [{"text": "An endorsement of hereditary monarchies.", "isCorrect": false, "rationale": "The text explicitly states this call is not 'advocating for permanent autocracy' but for action that 'could make republican self-governance possible later'."}, {"text": "A detailed plan for long-term republican constitutional reform.", "isCorrect": false, "rationale": "The text describes it as addressing immediate crisis needs, not long-term constitutional reform, which is associated with Discourses."}, {"text": "A provisional document arguing for strong action to create conditions for future self-governance.", "isCorrect": true, "rationale": "The text states: 'The Prince is, in this reading, a provisional document—an argument for what Italy needs now, not for what politics should look like in an ideal world.'"}, {"text": "A rejection of all forms of citizen participation in government.", "isCorrect": false, "rationale": "The purpose of the strong action is to 'make republican self-governance possible later,' which involves citizen participation."}], "id": "q06"}, {"question": "How does the text suggest The Prince and Discourses should be read together to form a complete political philosophy?", "options": [{"text": "The Prince is a historical account, while Discourses is a theoretical one.", "isCorrect": false, "rationale": "Both works offer political philosophy; The Prince is more prescriptive for crisis, while Discourses uses historical examples for systematic philosophy."}, {"text": "The Prince addresses establishing order in a disordered state, while Discourses addresses maintaining liberty over time.", "isCorrect": true, "rationale": "The text directly states: 'The Prince answers the question: what must a new ruler do to establish order in a disordered state? The Discourses answers the question: what must a free people do to maintain their liberty over time?'"}, {"text": "The Prince details military strategy, and Discourses focuses on economic policy.", "isCorrect": false, "rationale": "While military aspects might be touched upon, their core themes are political order and liberty, not solely military strategy or economic policy."}, {"text": "The Prince represents Machiavelli's youthful errors, and Discourses his mature reflections.", "isCorrect": false, "rationale": "The text indicates both were written 'roughly contemporaneously' and form a 'complete political philosophy,' not a progression from error to maturity."}], "id": "q07"}, {"question": "When the text states that Machiavelli \"is being a realist about what a particular kind of political crisis requires,\" what is it emphasizing about his approach in The Prince?", "options": [{"text": "He prioritizes theoretical ideals over practical necessity.", "isCorrect": false, "rationale": "The opposite is stated; he is not writing his 'ideal vision' but prescribing 'emergency medicine' for 'what Italy needs now'."}, {"text": "He disregards the actual conditions of a state in favor of abstract principles.", "isCorrect": false, "rationale": "His 'diagnosis of Italy in 1513' shows he is focused precisely on the actual conditions and their practical demands."}, {"text": "He focuses on practical, sometimes harsh, actions needed to address immediate political instability, even if they aren't ideal.", "isCorrect": true, "rationale": "The text describes The Prince as prescribing 'emergency medicine' for a crisis, requiring a ruler to 'act decisively, ruthlessly if necessary,' and that it is 'what Italy needs now, not for what politics should look like in an ideal world.' This aligns with a 'realist' approach to crisis."}, {"text": "He believes that moral considerations should always override political expediency.", "isCorrect": false, "rationale": "The text mentions 'ruthlessly if necessary' and prompts the reader to question 'Whether that realism is morally acceptable,' suggesting that moral considerations might be secondary to expediency in a crisis for Machiavelli."}], "id": "q08"}, {"question": "According to Machiavelli, which of the following is NOT a precondition necessary for republican self-government to work effectively?", "options": [{"text": "A population with civic spirit.", "isCorrect": false, "rationale": "The text states 'a society needs certain preconditions: a population with civic spirit'."}, {"text": "Strong and trusted institutions.", "isCorrect": false, "rationale": "The text states 'a society needs certain preconditions: ... strong and trusted institutions'."}, {"text": "A tradition of self-governance.", "isCorrect": false, "rationale": "The text states 'a society needs certain preconditions: ... a tradition of self-governance'."}, {"text": "A powerful standing army composed primarily of foreign mercenaries.", "isCorrect": true, "rationale": "The text states Machiavelli admired how the Roman Republic's 'citizen-soldiers were more effective than mercenaries,' indicating a preference against foreign mercenaries for effective governance."}], "id": "q09"}, {"question": "The \"caution\" box in the text advises readers: \"Do not read The Prince as if it contains all of Machiavelli's political thought.\" What is the main implication of this advice?", "options": [{"text": "The Prince is outdated and no longer relevant to modern politics.", "isCorrect": false, "rationale": "The text does not suggest The Prince is irrelevant but that its purpose needs to be understood in a broader context."}, {"text": "The Prince is only a small part of a broader, more complex philosophy, which includes his preference for republicanism.", "isCorrect": true, "rationale": "The caution states it is 'one half of a larger argument' and that Discourses 'reveals that he actually prefers republican self-government,' indicating a broader, more complex philosophy."}, {"text": "The Prince is primarily a work of fiction and should not be taken seriously.", "isCorrect": false, "rationale": "The text treats The Prince as a serious work of political realism, not fiction."}, {"text": "Readers should prioritize moral judgments of Machiavelli over understanding his political context.", "isCorrect": false, "rationale": "While the text encourages questioning the moral acceptability of realism, the primary advice is about understanding the full breadth of his thought, not prioritizing moral judgment over context."}], "id": "q10"}, {"question": "Titus Livy's history of Rome is central to Machiavelli's Discourses. What does Machiavelli's obsessive reading of Livy reveal about his approach to political philosophy?", "options": [{"text": "He believed ancient Roman religious rituals were the key to political stability and sought to revive them in Italy.", "isCorrect": false, "rationale": "The text does not identify Roman religious rituals as Machiavelli's focus; it highlights institutional and civic features of the Republic as the raw material for his analysis."}, {"text": "He used historical case studies from the Roman Republic as empirical evidence for universal principles of effective governance.", "isCorrect": true, "rationale": "The text says Machiavelli 'read him obsessively and used his accounts of the Roman Republic as raw material for political analysis.' This is consistent with his broader method of deriving principles from observed historical behavior."}, {"text": "He thought Rome's history could be copied exactly to solve Italy's contemporary problems.", "isCorrect": false, "rationale": "Machiavelli recognized that Italy's conditions in 1513 were different from ancient Rome — hence his argument that Italy first needed a prince rather than being ready for immediate republican government."}, {"text": "He was primarily interested in Roman literary style as a model for his own political writing.", "isCorrect": false, "rationale": "The text emphasizes Livy's historical accounts as 'raw material for political analysis,' not as a literary stylistic model."}], "id": "q11"}, {"question": "Why does Machiavelli argue that a republic requires 'free citizens' rather than 'subjects'? What is the distinction he is drawing?", "options": [{"text": "Free citizens pay taxes voluntarily, while subjects must be coerced, making republics more financially stable.", "isCorrect": false, "rationale": "The text does not frame the distinction in terms of taxation; the distinction concerns the preconditions for genuine self-governance — civic spirit, institutions, and tradition."}, {"text": "Citizens under foreign occupation and civil war lack the civic spirit and stable institutions needed for genuine self-governance, making them subjects needing unification first.", "isCorrect": true, "rationale": "The text states: 'A republic requires free citizens; a country under foreign occupation and civil war does not yet have free citizens. It has subjects who need to be unified and stabilized first.' This explains why a prince is needed as a precondition for eventual republican government."}, {"text": "Subjects are ethnically foreign to the land they live in, while citizens are native-born.", "isCorrect": false, "rationale": "The distinction is political and civic, not ethnic — it concerns the political and institutional conditions that enable genuine participation, not the birthplace of individuals."}, {"text": "Free citizens are educated, while subjects are illiterate and cannot participate in governance.", "isCorrect": false, "rationale": "The text ties the citizen/subject distinction to external conditions (occupation, civil war, institutional decay), not to individual education levels."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
