<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the defining characteristic of the princes he most admires in Chapter VI?", "options": [{"text": "They inherited their principalities and had strong external support.", "isCorrect": false, "rationale": "Machiavelli explicitly states he turns from 'relatively easy cases—hereditary princes, mixed principalities, annexed territories—to the hardest case of all: the man who must create a new principality entirely through his own ability, without any inherited advantage or external support.'"}, {"text": "They created a new principality entirely through their own ability (virtù) without inherited advantages or external support.", "isCorrect": true, "rationale": "The text states, 'This is the man Machiavelli most admires, and the figures he invokes here are the highest in his political pantheon: Moses, Cyrus, Romulus, and Theseus' — men who created new principalities entirely through their own ability."}, {"text": "They were primarily religious figures who relied on divine mandate for their political power.", "isCorrect": false, "rationale": "While Moses is one example and had a divine mission, Machiavelli analyzes him primarily as a political actor. The other examples (Cyrus, Romulus, Theseus) were pagan founders. Machiavelli's focus is on their political virtù, not solely their religious authority."}, {"text": "They were skilled diplomats who avoided conflict and relied on alliances to establish their rule.", "isCorrect": false, "rationale": "The text emphasizes that founders 'succeeded because they imposed their will on unfavorable conditions,' not by avoiding conflict. Arms are essential to their model of rule."}], "id": "q01"}, {"question": "Machiavelli states that the great founders like Moses and Cyrus found a 'crisis.' What role does this crisis play in the establishment of a new political order?", "options": [{"text": "It was a temporary setback that the founders had to overcome before they could begin building.", "isCorrect": false, "rationale": "The text explicitly states, 'The crisis was not merely a problem to be solved; it was the raw material from which political order could be built.' It was an essential precondition, not just a hurdle."}, {"text": "It represented a 'maximum opportunity created by maximum suffering,' which made people willing to follow a founder.", "isCorrect": true, "rationale": "The text clearly links crisis with opportunity, stating 'Each faced a crisis—a moment of maximum opportunity created by maximum suffering.' This suffering created the 'demand for a founder.'"}, {"text": "It demonstrated the founder's diplomatic skills in negotiating peace during turbulent times.", "isCorrect": false, "rationale": "While diplomacy might be part of statecraft, the text emphasizes the founder's virtù in seizing the moment and imposing will, often through arms, rather than solely negotiation during a crisis."}, {"text": "It was primarily a test of the founder's moral purity and divine favor.", "isCorrect": false, "rationale": "Machiavelli analyzes founders through a secular political lens. While divine favor might be a context for Moses, it's not the primary factor for the crisis itself, nor for the other pagan founders."}], "id": "q02"}, {"question": "Which of the following scenarios best exemplifies Machiavelli's concept of the interaction between virtù and fortuna?", "options": [{"text": "A charismatic leader emerges during a time of peace and prosperity, gradually convincing people to adopt a new form of government.", "isCorrect": false, "rationale": "This scenario lacks the 'crisis' or 'suffering' that creates the necessary opportunity (fortuna) for a founder to act decisively. Machiavelli's founders emerge from profound societal distress."}, {"text": "A people suffering under oppressive rule is given a detailed blueprint for liberation by a foreign power, but they lack the leadership to implement it.", "isCorrect": false, "rationale": "This scenario presents opportunity (fortuna) but lacks the 'virtù' of a leader to seize it. The text states, 'opportunity alone produces nothing.'"}, {"text": "A leader with exceptional vision and decisiveness arises amidst a societal collapse, uses military force to establish a new order, and endures backlash to secure its permanence.", "isCorrect": true, "rationale": "This option perfectly combines 'fortuna' (societal collapse providing the crisis and opportunity) with 'virtù' (exceptional vision, decisiveness, use of arms, and endurance). This interaction creates 'historical transformation' as described in the text."}, {"text": "A leader inherits a stable and well-governed principality, maintaining its order through established institutions and existing military strength.", "isCorrect": false, "rationale": "This describes a hereditary prince, which Machiavelli considers one of the 'relatively easy cases,' not the hardest case where virtù and fortuna interact most critically."}], "id": "q03"}, {"question": "According to Machiavelli, which of the following is NOT an essential component of 'virtù' for a great founder in Chapter VI?", "options": [{"text": "Vision", "isCorrect": false, "rationale": "The text lists 'Vision—the ability to see what a transformed political order could look like' as a key component of virtù."}, {"text": "Decisiveness", "isCorrect": false, "rationale": "The text lists 'Decisiveness—the willingness to act on that vision immediately, without waiting for perfect conditions' as a key component of virtù."}, {"text": "Charisma", "isCorrect": true, "rationale": "While charisma might be helpful, it is not explicitly listed as one of the four essential components of virtù in action. The text focuses on Vision, Decisiveness, Arms, and Endurance."}, {"text": "Endurance", "isCorrect": false, "rationale": "The text lists 'Endurance—the ability to survive the inevitable backlash and continue building even when the initial enthusiasm of followers fades' as a key component of virtù."}], "id": "q04"}, {"question": "Machiavelli's treatment of Moses is described as 'deliberately ambiguous' and 'provocative.' What is the primary implication of his analysis of Moses alongside pagan founders?", "options": [{"text": "He is unequivocally affirming the divine origin of Moses's mission and distinguishing him from purely political leaders.", "isCorrect": false, "rationale": "The text states his qualification is 'deliberately ambiguous' and that if Moses is analyzed alongside pagan founders, 'then the divine origin of his mission becomes, at most, a context rather than an explanation.'"}, {"text": "He is suggesting that Moses's divine mission made his political actions unnecessary, as God handled everything.", "isCorrect": false, "rationale": "This contradicts Machiavelli's detailed analysis of Moses's actions — leading his people, giving them laws, using armed force — which are crucial political actions, not divine mandates alone."}, {"text": "He is secularizing political analysis, treating even a biblical figure as a political actor whose success can be understood through virtù and fortuna, regardless of theological claims.", "isCorrect": true, "rationale": "The text explains this directly: 'if Moses is analyzed alongside pagan founders as an example of political virtù, then the divine origin of his mission becomes, at most, a context rather than an explanation. Moses did what all great founders do... The fact that God commissioned him does not make the political analysis any different.'"}, {"text": "He is secretly mocking religious belief by placing a prophet next to historical figures, implying Moses was a fraud.", "isCorrect": false, "rationale": "While provocative, the text doesn't suggest mockery or calling Moses a fraud. Scholars debate whether he is 'being cynical about religion, or... making a serious point about how political founders work... regardless of their theological claims.'"}], "id": "q05"}, {"question": "Machiavelli's epigram 'All armed prophets have conquered, and the unarmed ones have been destroyed' suggests a critical lesson about political power. Which of the following best reflects this lesson?", "options": [{"text": "Moral authority and compelling ideas are sufficient to maintain political power in the long run.", "isCorrect": false, "rationale": "This directly contradicts the lesson, which states: 'ideas, prophecy, and moral authority cannot by themselves sustain political power.' Savonarola is the counter-example showing moral authority alone is insufficient."}, {"text": "A leader must combine strong moral principles with a powerful military force to ensure political survival.", "isCorrect": true, "rationale": "The lesson derived from Savonarola's fate is that 'Only military force provides the ultimate guarantee of political survival.' While moral principles might win initial support, arms are essential for endurance against fickle public opinion and enemies."}, {"text": "Prophets should avoid engaging in politics, as their spiritual mission is incompatible with worldly power struggles.", "isCorrect": false, "rationale": "Machiavelli analyzes prophets as political actors, not as figures who should avoid politics. His point is about how they must engage if they wish to succeed politically."}, {"text": "Public support is the most reliable foundation for any political leader, regardless of whether they possess an army.", "isCorrect": false, "rationale": "The text directly states, 'People are fickle — they believe in a prophet when things go well and abandon him when things go wrong,' emphasizing that public support alone is unreliable and requires military backing."}], "id": "q06"}, {"question": "Girolamo Savonarola is presented as Machiavelli's definitive example of an 'unarmed prophet.' What was the ultimate fate of Savonarola and why, according to Machiavelli?", "options": [{"text": "He successfully transformed Florence into a stable theocracy due to his moral authority and popular support.", "isCorrect": false, "rationale": "The text states his 'support collapsed' and he 'made enemies,' leading to his arrest and execution. He did not achieve stable success."}, {"text": "He was exiled from Florence by the Medici, but his ideas continued to inspire political reform.", "isCorrect": false, "rationale": "He was arrested, tortured, hanged, and burned, not merely exiled. Machiavelli focuses on his political failure to sustain power."}, {"text": "He was arrested, tortured, hanged, and burned because he lacked military force to protect himself when his political position became untenable.", "isCorrect": true, "rationale": "The text explicitly states: 'When his political position became untenable, there was no military force to protect him. He was arrested, tortured, hanged, and burned.' This perfectly illustrates the fate of an 'unarmed prophet.'"}, {"text": "He voluntarily stepped down from power after achieving his moral reforms, demonstrating his commitment to spiritual leadership.", "isCorrect": false, "rationale": "His removal from power was forced and violent, not voluntary, and it stemmed from a failure to secure his political position, not from a spiritual renunciation of power."}], "id": "q07"}, {"question": "Machiavelli asserts that instituting a new order is 'more difficult to plan, more doubtful of success, nor more dangerous to manage.' What is the primary reason he gives for this extreme difficulty?", "options": [{"text": "The inherent human resistance to any form of change, regardless of its benefits.", "isCorrect": false, "rationale": "While human nature is a factor, the specific reason given here is not general resistance to change, but the asymmetrical nature of support and opposition."}, {"text": "New orders often lack a clear vision, leading to confusion and internal strife among supporters.", "isCorrect": false, "rationale": "The text implies founders do have vision as part of virtù. The difficulty arises from the external dynamics of opposition and support, not a lack of vision."}, {"text": "Those who benefited from the old order are determined enemies, while those who would benefit from the new are only timid supporters.", "isCorrect": true, "rationale": "This is the exact reason given in the text: 'Because those who benefited from the old order are determined enemies, while those who would benefit from the new one are only timid supporters. Reformers and founders will always face this asymmetry: concentrated opposition and diffuse support.'"}, {"text": "The founder's virtù is rarely strong enough to overcome the initial challenges of establishing a new system.", "isCorrect": false, "rationale": "Machiavelli's admiration for the 'greatest princes' is precisely because their virtù does overcome these challenges. The difficulty lies in the structural imbalance of support and opposition, which only arms can overcome."}], "id": "q08"}, {"question": "Considering Machiavelli's overall argument in Chapter VI, what is the ultimate role of 'arms' or military force for a new prince?", "options": [{"text": "To secure international alliances and prevent invasion from hostile foreign powers.", "isCorrect": false, "rationale": "While military force might be used for this, the text's emphasis for new princes is on establishing and maintaining internal order against domestic resistance and fickle public opinion."}, {"text": "To serve as a last resort, to be used only when all diplomatic efforts have failed.", "isCorrect": false, "rationale": "Machiavelli presents arms as a fundamental and necessary component for a founder's success from the outset, not just a last resort."}, {"text": "To impose the new order, defend against resistance, and provide the ultimate guarantee of political survival against both internal and external threats.", "isCorrect": true, "rationale": "The text repeatedly emphasizes this: 'Arms — the military force to impose the new order and defend it against resistance' and 'Only military force provides the ultimate guarantee of political survival.'"}, {"text": "To demonstrate the prince's moral authority and inspire loyalty among his subjects.", "isCorrect": false, "rationale": "Machiavelli explicitly distinguishes military force from moral authority. He states, 'ideas, prophecy, and moral authority cannot by themselves sustain political power,' implying arms fulfill a different, more decisive role."}], "id": "q09"}, {"question": "A newly appointed leader takes control of a country experiencing severe economic collapse and social unrest. She immediately announces a radical reform program, promising prosperity, but disbands the national army to cut costs and relies solely on popular enthusiasm for support. Based on Machiavelli's principles in Chapter VI, what would he likely predict about her success?", "options": [{"text": "She has a strong chance of success because the crisis provides an excellent opportunity, and her vision will inspire lasting popular support.", "isCorrect": false, "rationale": "Machiavelli would argue that while the crisis offers 'fortuna,' relying solely on 'popular enthusiasm' and disbanding the army neglects the essential 'arms' component of virtù. 'People are fickle,' and ideas alone cannot sustain political power."}, {"text": "Her reforms will be widely accepted, as people suffering maximum distress are eager for any change, making arms unnecessary.", "isCorrect": false, "rationale": "While people might be eager for change (fortuna), Machiavelli emphasizes that without the arms and endurance components of virtù, this enthusiasm is fleeting. 'Opportunity alone produces nothing.'"}, {"text": "She is likely to fail because, despite the opportunity provided by the crisis, she lacks the military force to impose the new order and defend against inevitable opposition and fading popular support.", "isCorrect": true, "rationale": "This aligns perfectly with Machiavelli's core arguments. The leader has fortuna (crisis) and vision, but critically lacks 'arms' and the ability to endure. The 'armed prophets' lesson and the challenge of 'concentrated opposition and diffuse support' without military backing strongly suggest failure."}, {"text": "Her success will depend entirely on whether her economic reforms deliver immediate results, as long-term planning is less important than short-term gains.", "isCorrect": false, "rationale": "Machiavelli emphasizes 'endurance' and the ability to 'continue building even when the initial enthusiasm of followers fades,' implying that long-term stability requires more than just immediate results, especially facing inevitable opposition."}], "id": "q10"}, {"question": "The text notes that Machiavelli's founders 'succeeded because they imposed their will on unfavorable conditions.' Why does Machiavelli frame success this way rather than saying they 'adapted to' favorable conditions?", "options": [{"text": "Because favorable conditions never exist in politics, making adaptation an impossible strategy.", "isCorrect": false, "rationale": "Machiavelli does not argue that favorable conditions never exist — he acknowledges that hereditary princes enjoy them. His point is about the character of the greatest founders, who did not wait for favorable conditions but created order despite unfavorable ones."}, {"text": "Because virtù, at its highest expression, is the capacity to transform reality rather than merely respond to it — making the prince an active shaper of his circumstances rather than a passive product of them.", "isCorrect": true, "rationale": "Machiavelli's highest admiration goes to founders who created political order 'from raw material' — suffering peoples who needed a leader. The word 'impose' captures virtù as active, creative force. Hereditary princes adapt to conditions; the greatest founders shape them. This is what makes the founder the pinnacle of Machiavelli's political ideal."}, {"text": "Because adaptation requires diplomatic skill, which Machiavelli considers inferior to military force.", "isCorrect": false, "rationale": "While Machiavelli does value military force over diplomacy in certain contexts, the distinction here is not about the tool (diplomacy vs. force) but about the character of the relationship between the founder and his circumstances — active shaping vs. passive response."}, {"text": "Because the founders he admires happened to face particularly unfavorable conditions, making their success an accident rather than a model.", "isCorrect": false, "rationale": "Machiavelli explicitly identifies their adverse circumstances as the necessary raw material for their greatness — a pattern, not an accident. The interaction of virtù and fortuna (as adverse conditions) is his model of how the greatest political achievements occur."}], "id": "q11"}, {"question": "Machiavelli says that without Moses's 'powers of mind' the opportunity 'would have come in vain.' What does the phrase 'come in vain' reveal about how Machiavelli views historical opportunity?", "options": [{"text": "That historical opportunities repeat themselves indefinitely, so a missed chance is not a problem.", "isCorrect": false, "rationale": "Machiavelli's framework implies the opposite — the crisis creates a specific window that the founder must seize. There is no indication that the same crisis will recur if missed. The opportunity that 'comes in vain' is lost, not simply postponed."}, {"text": "That opportunity is a neutral resource that exists independently of human agency and has no inherent power to create change.", "isCorrect": true, "rationale": "By saying opportunity 'would have come in vain,' Machiavelli reveals that opportunity is inert without virtù to activate it. The people of Israel were enslaved regardless of whether Moses existed — that suffering was the opportunity. But without Moses's ability, the opportunity would simply have been more suffering, not transformation. Opportunity has no power to change reality on its own."}, {"text": "That Moses was unworthy of the opportunity, which is why divine intervention was necessary.", "isCorrect": false, "rationale": "Machiavelli argues the opposite — Moses was worthy precisely because he had the virtù to recognize and use the opportunity. The argument about 'coming in vain' is about what would have happened without his ability, not a critique of his worthiness."}, {"text": "That Machiavelli believes fortune controls all outcomes, and human ability only slightly modifies what fortune decides.", "isCorrect": false, "rationale": "Machiavelli's statement that 'without those powers the opportunity would have come in vain' places ability (virtù) as equal to fortune in importance. If fortune controlled all outcomes, the presence or absence of ability would be irrelevant — yet Machiavelli says without it, the opportunity means nothing."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
