    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the fundamental prerequisite for any state's political skill and governance to be effective?", "options": [{"text": "Good laws", "isCorrect": false, "rationale": "While good laws are a foundation, Machiavelli explicitly states that 'good laws cannot exist without good arms,' making military strength the prior condition."}, {"text": "A reliable army", "isCorrect": true, "rationale": "The text states, 'Without a reliable army, every other form of political skill is worthless' and that military strength is 'the prior condition for everything else'."}, {"text": "Diplomatic alliances", "isCorrect": false, "rationale": "The text focuses on internal military strength as the primary foundation, not external alliances, though they may be important secondarily."}, {"text": "Economic prosperity", "isCorrect": false, "rationale": "Economic prosperity is not identified as the 'prior condition' for political power; rather, military force is."}], "id": "q01"}, {"question": "Machiavelli states that 'good laws cannot exist without good arms' and that 'Military strength is the prior condition for everything else.' What does this imply about the relationship between military power and legal frameworks?", "options": [{"text": "Good laws inevitably lead to strong armies.", "isCorrect": false, "rationale": "Machiavelli reverses this causality; he argues that force is necessary for law, not that law spontaneously generates force."}, {"text": "A strong military is necessary to establish and enforce laws.", "isCorrect": true, "rationale": "The text explicitly states, 'Law without force is empty; force can survive without fully developed law. Military strength is the prior condition for everything else,' indicating arms provide the foundation for laws."}, {"text": "Laws are always superior to military might.", "isCorrect": false, "rationale": "Machiavelli's argument prioritizes military might, stating law is 'empty' without force."}, {"text": "Military strength is secondary to a well-structured legal system.", "isCorrect": false, "rationale": "This contradicts Machiavelli's central point that military strength is the 'prior condition' and 'material foundation' of political power."}], "id": "q02"}, {"question": "Which of the following best summarizes Machiavelli's central criticism of mercenary forces?", "options": [{"text": "They are too expensive.", "isCorrect": false, "rationale": "While expense is mentioned ('drain the treasury'), Machiavelli's core criticism is about their reliability and commitment, not just cost."}, {"text": "They often refuse to follow orders.", "isCorrect": false, "rationale": "The text doesn't specifically mention refusal to follow orders, but rather their inherent lack of commitment and loyalty due to their motivation."}, {"text": "They lack genuine commitment because their loyalty is to pay.", "isCorrect": true, "rationale": "Machiavelli argues that mercenaries 'fight for money' and 'their loyalty evaporates' when money runs out, making them unreliable and uncommitted compared to citizen soldiers."}, {"text": "They tend to be poorly trained compared to national armies.", "isCorrect": false, "rationale": "The text doesn't focus on their training level, but rather their motivation and inherent conflict of interest."}], "id": "q03"}, {"question": "The text describes an 'inherent perversity' within the condottieri system. Which action exemplifies this perversity from the condottieri's perspective?", "options": [{"text": "Forming alliances with enemy states for a higher fee.", "isCorrect": false, "rationale": "While possible, the text specifically identifies a different 'perversity' related to prolonging conflict, not direct betrayal for a higher fee."}, {"text": "Recruiting soldiers from the ranks of their employers.", "isCorrect": false, "rationale": "The text does not mention condottieri recruiting from their employers' ranks as the 'inherent perversity'."}, {"text": "Intentionally prolonging conflicts through inconclusive battles.", "isCorrect": true, "rationale": "The text states, 'the condottieri had little interest in decisive victories that would end their employment. Battles were sometimes fought with minimal casualties on both sides, producing inconclusive results that kept both armies in the field—and both payrolls flowing.'"}, {"text": "Refusing to fight unless paid in advance.", "isCorrect": false, "rationale": "While mercenaries are motivated by pay, this is a standard term of engagement, not the 'inherent perversity' related to battle outcomes mentioned in the text."}], "id": "q04"}, {"question": "What is the primary characteristic that, according to Machiavelli, motivates soldiers in a citizen army to fight with ultimate commitment?", "options": [{"text": "Their professional training and discipline.", "isCorrect": false, "rationale": "While important, the text emphasizes personal stake over professional training as the core motivator for a citizen army's commitment."}, {"text": "The promise of financial rewards upon victory.", "isCorrect": false, "rationale": "This is a mercenary motivation, the opposite of a citizen army's driving force as described by Machiavelli."}, {"text": "A personal stake in defending their homes, families, and city.", "isCorrect": true, "rationale": "The text explicitly states citizen soldiers 'fight because they have a personal stake in the outcome. Citizens who own property, who have families, who live in the city they are defending—these men will fight to the last.'"}, {"text": "Their superior weaponry compared to mercenaries.", "isCorrect": false, "rationale": "The text does not mention superior weaponry as the primary motivator for commitment."}], "id": "q05"}, {"question": "Machiavelli uses the career of Francesco Sforza to illustrate which specific danger associated with relying on mercenary commanders?", "options": [{"text": "That they would demand excessive pay.", "isCorrect": false, "rationale": "While mercenaries are costly, Sforza's example specifically highlights a different threat."}, {"text": "That they would abandon their employer during a critical battle.", "isCorrect": false, "rationale": "Though a general mercenary trait, Sforza's example focuses on a more extreme form of self-interest."}, {"text": "That they might use their military power to seize political control for themselves.", "isCorrect": true, "rationale": "The text states Sforza's career 'shows that even a highly skilled mercenary commander ultimately served his own ambition, using his army to seize power rather than merely to defend his employer.'"}, {"text": "That they lacked the strategic acumen to win decisive victories.", "isCorrect": false, "rationale": "Sforza is described as 'highly skilled,' indicating his danger was not lack of skill, but ambition."}], "id": "q06"}, {"question": "The text describes France's invasion of Italy in 1494 as leading to the 'collapse almost immediately' of the condottieri system. What was the core reason for this rapid collapse, according to Machiavelli's perspective?", "options": [{"text": "The condottieri system was financially unsustainable.", "isCorrect": false, "rationale": "While costly, the collapse was attributed to a different factor: the nature of the opposing army."}, {"text": "The French army employed superior military tactics.", "isCorrect": false, "rationale": "The text emphasizes the French army's motivation ('real national army motivated by genuine military objectives') rather than just tactical superiority."}, {"text": "The condottieri lacked the motivation and loyalty to resist a truly committed national army.", "isCorrect": true, "rationale": "The text highlights the contrast between the 'real national army motivated by genuine military objectives' of France and the condottieri's self-interested, indecisive approach, leading to their collapse."}, {"text": "The Italian city-states failed to form a unified defense.", "isCorrect": false, "rationale": "The text focuses on the internal flaw of the condottieri system itself, not merely a failure of political unity among city-states, though that might also be true."}], "id": "q07"}, {"question": "The 'teachernote' draws an analogy between Machiavelli's condottieri and modern private military contractors (PMCs). What is the main point of comparison that makes Machiavelli's critique relevant to PMCs?", "options": [{"text": "Both condottieri and PMCs are often involved in covert operations.", "isCorrect": false, "rationale": "The text does not mention covert operations for either group as the main point of comparison for Machiavelli's critique."}, {"text": "Both are composed primarily of foreign nationals.", "isCorrect": false, "rationale": "While often true, the core of Machiavelli's critique is not their nationality, but their motivation and loyalty based on payment."}, {"text": "Both are paid for their services and may lack an intrinsic stake in the conflict's outcome.", "isCorrect": true, "rationale": "The 'teachernote' states, 'They are paid for their services, they have no intrinsic stake in the outcomes they are paid to secure, and their interests do not necessarily align with those of the states that hire them,' directly linking to Machiavelli's structural critique of mercenaries."}, {"text": "Both operate outside the traditional chain of command of national militaries.", "isCorrect": false, "rationale": "While PMCs may operate differently, the key analogy drawn is about their motivation and stake in the outcome, not their command structure."}], "id": "q08"}, {"question": "The 'note' section states that Machiavelli's ideas influenced the American Founders' debates about standing armies versus citizen militias. Which of Machiavelli's core principles resonated most strongly with this republican suspicion of professional armies?", "options": [{"text": "His emphasis on the importance of strong diplomatic ties.", "isCorrect": false, "rationale": "The debate about armies vs. militias is about internal military structure, not external diplomacy."}, {"text": "His belief in the necessity of a large navy for defense.", "isCorrect": false, "rationale": "The text specifically discusses land-based armies and militias, not naval power."}, {"text": "His argument that hired soldiers are inherently unreliable and potentially dangerous to the state's internal stability.", "isCorrect": true, "rationale": "Machiavelli's 'structural critique—that hired soldiers will never be as reliable as those who fight for their own country' directly informs the republican suspicion of professional (hired/standing) armies in favor of citizen militias, who have a personal stake."}, {"text": "His advocacy for centralized imperial power.", "isCorrect": false, "rationale": "Machiavelli's ideas influenced the republican tradition, which often opposed centralized, imperial power in favor of citizen-led governance and defense."}], "id": "q09"}, {"question": "According to Machiavelli's structural critique in the text, which of the following is *NOT* presented as an inherent negative incentive or characteristic of mercenaries?", "options": [{"text": "Their tendency to prolong wars for profit.", "isCorrect": false, "rationale": "The text explicitly states mercenaries have 'every incentive to prolong wars' because 'a long campaign is profitable.'"}, {"text": "Their lack of commitment when money runs out or a better offer arises.", "isCorrect": false, "rationale": "The text states, 'When the money runs out, or when an enemy offers more, their loyalty evaporates.'"}, {"text": "Their focus on minimizing their own casualties.", "isCorrect": false, "rationale": "The text mentions mercenaries have an incentive to 'minimize their own casualties—a long campaign is profitable, and dead soldiers cannot spend their wages.'"}, {"text": "Their strong desire for decisive victories to gain reputation.", "isCorrect": true, "rationale": "The text states condottieri had 'little interest in decisive victories that would end their employment,' directly contradicting a 'strong desire for decisive victories.'"}], "id": "q10"}, {"question": "Machiavelli personally organized a citizen militia for Florence in 1505–06, with 'mixed results.' What does his persisting 'unshaken conviction' despite this practical setback reveal about the nature of his argument?", "options": [{"text": "His argument for the citizen army is fundamentally theoretical and structural, not simply a pragmatic claim that citizen armies always win", "isCorrect": true, "rationale": "The fact that his own experiment had mixed results but he maintained his conviction shows that his argument is about principle — citizens have the right incentive structure, unlike mercenaries — rather than a guarantee that citizen armies always succeed in practice."}, {"text": "It shows Machiavelli was dogmatic and unable to update his views in response to evidence", "isCorrect": false, "rationale": "The text frames his persistence as 'conviction' rather than dogmatism; his structural argument about incentives remains logically sound even if the Florence experiment was imperfect in execution."}, {"text": "It proves that citizen armies are inherently superior in every military situation, validating his conviction", "isCorrect": false, "rationale": "Mixed results would not validate this sweeping claim; the evidence is more nuanced, suggesting his argument is about structural incentives rather than universal victory."}, {"text": "His conviction shows he believed military reform was impossible without first achieving political reform in Florence", "isCorrect": false, "rationale": "The text does not suggest he conditioned his conviction on political reform; he maintained the principle of citizen armies regardless of the Florence experiment's limitations."}], "id": "q11"}, {"question": "The text describes the condottieri's practice of 'not killing in the fray, but taking prisoners and liberating without ransom.' What economic and military logic explains this unusual battlefield behavior?", "options": [{"text": "Taking prisoners rather than killing reduced casualties on both sides, extending the campaign duration and keeping both payrolls flowing while avoiding genuine military resolution", "isCorrect": true, "rationale": "Prisoners taken without ransom means no financial gain from captures — so why do it? Because it demonstrates activity without decisive outcomes, preserving the need for continued military employment. Killing opponents would end campaigns faster; keeping them alive (as prisoners or freed) maintains the fiction of ongoing military activity."}, {"text": "Liberating prisoners without ransom was a form of psychological warfare designed to demoralize the enemy through unpredictable generosity", "isCorrect": false, "rationale": "Machiavelli does not frame this as psychological warfare; it is part of a pattern of avoiding decisive military outcomes to extend employment."}, {"text": "The condottieri followed chivalric codes requiring humane treatment of defeated opponents", "isCorrect": false, "rationale": "Machiavelli is not attributing this behavior to chivalry; he frames it as self-interested avoidance of the effort and danger of real battle."}, {"text": "This practice allowed condottieri to build networks of former opponents who might later hire them", "isCorrect": false, "rationale": "While plausible, Machiavelli's point is about avoiding fatigue and danger and prolonging profitable campaigns, not about building future client networks."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
