        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Machiavelli.html">&larr; Back to Powers and Principalities (Machiavelli)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 3, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the fundamental advantage a hereditary prince holds over a new prince?", "options": [{"text": "Superior military strength inherited from ancestors.", "isCorrect": false, "rationale": "While military strength might be a factor in some cases, the text does not identify it as the fundamental advantage. Machiavelli emphasizes custom and established order."}, {"text": "Governance is largely handled by long-established custom and ancestral order.", "isCorrect": true, "rationale": "The text explicitly states, 'long-established custom does most of the governing for him,' making it the primary advantage."}, {"text": "The automatic loyalty of neighboring states.", "isCorrect": false, "rationale": "The text does not mention the automatic loyalty of neighboring states as an advantage of hereditary rule."}, {"text": "A larger treasury filled by previous generations.", "isCorrect": false, "rationale": "Financial resources are not mentioned as the primary or fundamental advantage of a hereditary prince in this section."}], "id": "q01"}, {"question": "What is the most crucial action a hereditary prince must take to secure his rule, according to the text?", "options": [{"text": "Aggressively expand his territory to demonstrate strength.", "isCorrect": false, "rationale": "Aggressive expansion is not mentioned as a requirement for a hereditary prince; rather, the focus is on maintaining existing order."}, {"text": "Avoid disrupting the established customs and ancestral order.", "isCorrect": true, "rationale": "The text states he 'needs only to avoid disrupting the order his ancestors built' and 'not to transgress the customs of his ancestors,' highlighting this as the most crucial action."}, {"text": "Appoint new advisors and officials to show his authority.", "isCorrect": false, "rationale": "Appointing new officials could be seen as disrupting the established order, which is contrary to Machiavelli's advice for hereditary princes."}, {"text": "Regularly engage in public displays of power and wealth.", "isCorrect": false, "rationale": "Public displays are not identified as the most crucial action for securing a hereditary state."}], "id": "q02"}, {"question": "Machiavelli suggests that hereditary princes are generally 'more loved.' What is the primary reason he provides for this affection?", "options": [{"text": "Their ability to generously distribute wealth among the populace.", "isCorrect": false, "rationale": "While generosity might gain affection, it is not the primary reason Machiavelli provides in this text."}, {"text": "Their strong, innovative leadership that improves the state.", "isCorrect": false, "rationale": "Machiavelli emphasizes not offending and maintaining the status quo, rather than strong, innovative leadership, for hereditary princes."}, {"text": "They have less reason and less need to offend their subjects.", "isCorrect": true, "rationale": "The text explicitly states: 'For the hereditary prince has less cause and less necessity to offend; hence it happens that he will be more loved.'"}, {"text": "The widespread belief in their divine right to rule.", "isCorrect": false, "rationale": "Machiavelli's analysis is pragmatic, not based on theological concepts like divine right."}], "id": "q03"}, {"question": "Imagine a hereditary prince decides to completely overhaul the legal system and replace all traditional holidays with new ones. Based on Machiavelli's advice, what is the most likely consequence of these actions?", "options": [{"text": "The prince will be seen as a progressive leader and gain greater loyalty.", "isCorrect": false, "rationale": "Machiavelli advises hereditary princes to avoid disrupting ancestral order and customs, so such radical changes would likely be viewed negatively, not as progressive."}, {"text": "His actions will likely lead to instability and increased chances of losing his state.", "isCorrect": true, "rationale": "These actions directly violate the principle of not transgressing ancestral customs and avoiding disruption, which Machiavelli states is necessary for maintaining a hereditary state. Such disruption would likely create discontent and instability."}, {"text": "The changes will be easily accepted because subjects are naturally well-disposed.", "isCorrect": false, "rationale": "While subjects might be well-disposed if the prince avoids offending, major disruptions of customs would likely turn this disposition negative."}, {"text": "He will only face opposition if an 'extraordinary and excessive force' acts against him.", "isCorrect": false, "rationale": "This scenario describes the prince causing his own problems through internal disruption, which is different from being overthrown by external 'extraordinary force'."}], "id": "q04"}, {"question": "When Machiavelli states, 'one change always leaves the toothing for another,' what is he primarily implying about the nature of political change in a state?", "options": [{"text": "That change is an inevitable part of political evolution and should be embraced.", "isCorrect": false, "rationale": "Machiavelli advocates for stability in hereditary states and views change as potentially destabilizing, not something to be embraced."}, {"text": "That even minor changes can create further desires or opportunities for more significant disruptions.", "isCorrect": true, "rationale": "This phrase suggests that once the established order is disturbed by any change, it creates openings or precedents for subsequent, potentially larger, changes, thus undermining long-term stability."}, {"text": "That reforms, once initiated, pave the way for a stronger, more organized government.", "isCorrect": false, "rationale": "Machiavelli's context here is about losing 'memories and motives that make for change' through antiquity and duration of rule, implying that change itself is a threat to this stability."}, {"text": "That only radical, sweeping changes are truly effective in a state.", "isCorrect": false, "rationale": "The statement implies the danger of *any* change, regardless of its scale, in leading to further instability."}], "id": "q05"}, {"question": "The text explicitly contrasts hereditary states with new ones. What is the key difference Machiavelli identifies regarding their ease of governance?", "options": [{"text": "New states always have stronger economies, while hereditary states rely on tradition.", "isCorrect": false, "rationale": "Economic strength is not the primary point of contrast mentioned in this section."}, {"text": "Hereditary states face fewer difficulties in being held and maintained compared to new ones.", "isCorrect": true, "rationale": "Machiavelli states, 'there are fewer difficulties in holding hereditary states...than new ones,' clearly identifying this as the key difference."}, {"text": "New states are more adaptable to modern challenges, whereas hereditary states are rigid.", "isCorrect": false, "rationale": "Adaptability to modern challenges is not discussed as the key difference here."}, {"text": "Hereditary states are more prone to external attacks due to their age.", "isCorrect": false, "rationale": "The example of the Duke of Ferrara demonstrates the opposite: long establishment helps withstand attacks."}], "id": "q06"}, {"question": "The example of the Duke of Ferrara is used to illustrate which specific point about hereditary principalities?", "options": [{"text": "That even hereditary princes can be easily overthrown by powerful neighbors.", "isCorrect": false, "rationale": "The Duke of Ferrara *withstood* attacks, suggesting resilience, not easy overthrow."}, {"text": "The importance of forging strong alliances with other rulers.", "isCorrect": false, "rationale": "The text focuses on the Duke's 'long established' status, not his alliances, as the reason for his resilience."}, {"text": "The resilience of a long-established hereditary rule against external attacks.", "isCorrect": true, "rationale": "The example states the Duke 'could not have withstood the attacks...unless he had been long established in his dominions,' directly supporting the idea of resilience due to long rule."}, {"text": "The necessity for a hereditary prince to constantly modernize his army.", "isCorrect": false, "rationale": "Military modernization is not mentioned in relation to the Duke of Ferrara's ability to withstand attacks."}], "id": "q07"}, {"question": "According to Machiavelli, under what specific condition might a hereditary prince temporarily lose his state, and what is the likely outcome?", "options": [{"text": "Through internal rebellions, leading to permanent loss of power.", "isCorrect": false, "rationale": "Internal rebellions are not the specific condition mentioned for loss, and the text suggests regaining power is likely."}, {"text": "If he alienates his subjects with extraordinary vices, resulting in permanent hatred.", "isCorrect": false, "rationale": "Extraordinary vices lead to hatred but not necessarily to the loss of the state, and the text describes conditions for regaining power."}, {"text": "Only if deprived by an 'extraordinary and excessive force,' but he will likely regain it if the usurper faces misfortune.", "isCorrect": true, "rationale": "The text states: 'unless he be deprived of it by some extraordinary and excessive force; and if he should be so deprived of it, whenever anything sinister happens to the usurper, he will regain it.'"}, {"text": "By failing to deal prudently with circumstances, which ensures permanent displacement.", "isCorrect": false, "rationale": "Failing to deal prudently might make maintenance harder, but the text specifies 'extraordinary and excessive force' for loss and mentions the possibility of regaining power."}], "id": "q08"}, {"question": "In this section, Machiavelli explicitly states he will not discuss a certain type of governance. Which type is it?", "options": [{"text": "Monarchies.", "isCorrect": false, "rationale": "Principalities are a form of monarchy, and Machiavelli explicitly states he *will* address himself 'only to principalities.'"}, {"text": "Tyrannies.", "isCorrect": false, "rationale": "A tyranny can be a type of principality, and Machiavelli is focused on principalities."}, {"text": "Republics.", "isCorrect": true, "rationale": "Machiavelli clearly states: 'I will leave out all discussion on republics, inasmuch as in another place I have written of them at length, and will address myself only to principalities.'"}, {"text": "Empires.", "isCorrect": false, "rationale": "Empires are not explicitly excluded from the discussion, whereas republics are."}], "id": "q09"}, {"question": "Which of the following statements best encapsulates Machiavelli's overall argument in this section regarding hereditary principalities?", "options": [{"text": "Hereditary rule is inherently weak and prone to collapse without constant innovation.", "isCorrect": false, "rationale": "Machiavelli presents hereditary rule as the easiest to maintain, emphasizing stability through tradition rather than constant innovation."}, {"text": "The stability and security of a hereditary state primarily depend on the prince's ability to avoid offending subjects and to preserve ancestral customs.", "isCorrect": true, "rationale": "This statement synthesizes the core arguments: the ease of rule stems from custom, the need to avoid disruption, and the resultant love from subjects due to less offense, all contributing to stability."}, {"text": "A hereditary prince's success is determined by his military prowess and willingness to expand his borders.", "isCorrect": false, "rationale": "While military strength is important in general, this section focuses on internal stability derived from customs and the lack of need to offend, not aggressive expansion."}, {"text": "Long-standing traditions, while helpful, are ultimately insufficient to protect a state from determined usurpers.", "isCorrect": false, "rationale": "Machiavelli implies that long-standing traditions are very effective, even allowing a prince to regain power after being deprived by 'extraordinary force,' suggesting they are highly sufficient."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
