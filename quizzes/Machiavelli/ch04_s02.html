<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the fundamental reason why 'mixed principalities' are inherently difficult to govern?", "options": [{"text": "The people in annexed territories are always militarily superior and difficult to subdue.", "isCorrect": false, "rationale": "Machiavelli emphasizes political and governance challenges over persistent military superiority of the conquered. While resistance is possible, the core difficulty isn't superior military might."}, {"text": "Subjects initially welcome new rulers but become disillusioned by the burdens of conquest, leading to resistance.", "isCorrect": true, "rationale": "Machiavelli states, 'Men willingly change their ruler, expecting to better themselves.' However, new taxes, garrisons, and laws bring 'disappointment,' which 'breeds resistance,' making governance challenging."}, {"text": "Princes often lack the necessary military strength to maintain control over diverse populations.", "isCorrect": false, "rationale": "The text focuses on political and strategic errors rather than a prince's inherent lack of military strength. Machiavelli offers strategies assuming a prince has established military control."}, {"text": "The newly conquered territories always have vastly different religious beliefs that cause perpetual conflict.", "isCorrect": false, "rationale": "The text mentions 'different languages, customs, and loyalties' but does not specifically highlight religious differences as the primary or universal difficulty across all mixed principalities."}], "id": "q01"}, {"question": "Machiavelli argues that establishing colonies is a more effective strategy for holding annexed territories than maintaining a large military garrison. Which of the following best explains why?", "options": [{"text": "Garrisons are cheaper to maintain and promote loyalty through fear.", "isCorrect": false, "rationale": "Machiavelli explicitly states colonies 'do not cost much' and garrisons are 'far more expensive.' Garrisons also create 'resentment,' not loyalty."}, {"text": "Colonists scatter rebels and develop a personal stake in the prince's success, unlike costly, resentment-producing garrisons.", "isCorrect": true, "rationale": "Machiavelli identifies colonization as 'cheap,' effective because colonists have a 'personal stake in the prince's success,' and 'demoralizing to potential rebels' who are 'scattered among the prince's own partisans,' contrasting it with expensive and resented garrisons."}, {"text": "Colonization allows the prince to integrate the conquered people into his existing army.", "isCorrect": false, "rationale": "The text does not mention integrating conquered people into the army as a benefit of colonization. Instead, it focuses on the loyalty and dispersion effects of the prince's own people."}, {"text": "Garrisons are only effective in territories with very sparse populations.", "isCorrect": false, "rationale": "The text does not qualify the effectiveness of garrisons based on population density, but rather on their cost and tendency to create resentment versus the benefits of colonies."}], "id": "q02"}, {"question": "A prince has just conquered a new territory. To minimize future resistance and consolidate power, he identifies several powerful local families with established armies and influence. According to Machiavelli's advice to 'weaken the strong, protect the weak,' what action should the prince primarily take regarding these powerful families?", "options": [{"text": "Form alliances with the strongest families by granting them more autonomy and resources.", "isCorrect": false, "rationale": "This contradicts Machiavelli's advice. Strengthening powerful local interests makes them rivals. His advice is to 'destroy the stronger ones,' not empower them further."}, {"text": "Offer protection and support to the less powerful local lords, while neutralizing the strongest ones.", "isCorrect": true, "rationale": "Machiavelli advises to 'protect the weaker parties and destroy the stronger ones.' Weak lords dependent on the prince become loyal allies, while strong lords are potential enemies."}, {"text": "Integrate members of the most powerful families into his central government to gain their loyalty.", "isCorrect": false, "rationale": "While integration might seem appealing, Machiavelli's focus is on power dynamics. Integrating strong rivals without first neutralizing their independent power base risks creating internal challenges, contradicting the principle of weakening the strong."}, {"text": "Disarm all local families, both strong and weak, to ensure no one can challenge his authority.", "isCorrect": false, "rationale": "While disarming might seem like a way to neutralize threats, Machiavelli's specific advice is to 'protect the weaker parties,' implying they can be useful allies if dependent, not necessarily disarmed."}], "id": "q03"}, {"question": "Machiavelli commends the Romans for their approach to emerging political troubles. What is the core principle of 'statecraft' he highlights through the Roman example?", "options": [{"text": "Good governance involves waiting for a crisis to fully develop to assess all options before acting.", "isCorrect": false, "rationale": "This is the opposite of Machiavelli's advice. He states, the Romans 'always responded immediately' and knew 'war is not avoided but only postponed to one's own disadvantage.' Waiting means losing options."}, {"text": "Effective statecraft requires proactive anticipation and immediate response to problems before they escalate.", "isCorrect": true, "rationale": "Machiavelli emphasizes that 'Good governance is not reactive but anticipatory.' The Romans 'saw troubles coming in advance, always responded immediately, and never let them develop.'"}, {"text": "Successful rulers delegate crisis management to trusted advisors to maintain an appearance of stability.", "isCorrect": false, "rationale": "The text focuses on the prince's direct responsibility for anticipatory action, not delegation as a primary principle of statecraft in this context."}, {"text": "The best way to avoid conflict is to continually negotiate and compromise with potential adversaries.", "isCorrect": false, "rationale": "Machiavelli's Roman example directly contradicts this, stating war 'is not avoided but only postponed to one's own disadvantage' if problems are not addressed proactively."}], "id": "q04"}, {"question": "The Italian Wars served as a critical 'lesson' for observers like Machiavelli. What was the primary conclusion he drew regarding the Italian states during these conflicts?", "options": [{"text": "Italian states were too militarily advanced for foreign invaders to conquer them effectively.", "isCorrect": false, "rationale": "The historical context states that foreign powers fought for control of the Italian peninsula, implying they were not too militarily advanced to be conquered."}, {"text": "The strength of individual Italian city-states was sufficient to repel any invasion.", "isCorrect": false, "rationale": "The text clearly states that foreign powers ultimately dominated parts of Italy, and Italian states 'had failed to unite against foreign invaders, and their divisions had destroyed them.'"}, {"text": "Their failure to unite against foreign invaders and internal divisions led to their destruction.", "isCorrect": true, "rationale": "The text explicitly states: 'Italian states had failed to unite against foreign invaders, and their divisions had destroyed them.' This was the key lesson for Machiavelli."}, {"text": "A balanced system of politics among Italian states was easily restored after each conflict.", "isCorrect": false, "rationale": "The text mentions Charles VIII 'sweeping away the carefully balanced system of Italian politics,' and the ultimate dominance of Spain, indicating the balance was not easily restored."}], "id": "q05"}, {"question": "Louis XII of France is presented as Machiavelli's primary example of a capable ruler who failed in holding mixed principalities. What was the fundamental error that defined his Italian policy, according to Machiavelli?", "options": [{"text": "He relied too heavily on diplomacy and failed to engage in military conquest.", "isCorrect": false, "rationale": "Louis XII conquered Milan and pursued French claims with great persistence, indicating he was not averse to military action."}, {"text": "He was personally unpopular in France, leading to a lack of support for his Italian campaigns.", "isCorrect": false, "rationale": "The text states he was 'personally popular in France,' so this was not the cause of his failure in Italy."}, {"text": "He violated the basic principles of holding mixed principalities, despite initial success.", "isCorrect": true, "rationale": "The text explicitly states Louis XII 'failed because he violated the basic principles of holding mixed principalities,' making him a key example of strategic misjudgment."}, {"text": "He prioritized internal French reforms over external conquest in Italy.", "isCorrect": false, "rationale": "While he was genuinely interested in reform, his Italian policy was 'a sequence of self-defeating mistakes,' showing his focus was on external conquest, albeit poorly executed."}], "id": "q06"}, {"question": "Among Louis XII's five errors, which one directly contributed to the creation of a powerful new rival entity within Italy that he had previously influenced or strengthened?", "options": [{"text": "He destroyed the smaller powers.", "isCorrect": false, "rationale": "Destroying smaller powers removed potential allies, but did not directly create a new powerful rival entity; rather it removed existing checks on others."}, {"text": "He brought in Spain.", "isCorrect": false, "rationale": "Bringing in Spain introduced an external powerful competitor, not a previously influenced local entity that became a rival."}, {"text": "He strengthened the Pope.", "isCorrect": true, "rationale": "Machiavelli notes Louis XII 'strengthened the Pope,' allowing the papacy to 'expand its temporal authority,' thereby creating a major rival from an existing Italian power."}, {"text": "He did not establish colonies.", "isCorrect": false, "rationale": "Not establishing colonies led to resentment and reliance on expensive garrisons, but did not directly create a new powerful rival entity."}], "id": "q07"}, {"question": "Machiavelli's analysis of Louis XII's failures underscores a 'broader principle' about state interaction. What is this principle?", "options": [{"text": "Powerful states should always seek to establish absolute hegemony over all neighbors.", "isCorrect": false, "rationale": "Machiavelli warns against strengthening any single power too much, suggesting that allowing one state to dominate is destabilizing, which contradicts seeking absolute hegemony."}, {"text": "A wise prince actively maintains a balance of power to prevent any single state from becoming dominant.", "isCorrect": true, "rationale": "The text states, 'The balance of power — the distribution of strength among multiple states so that no single one dominates — is both a natural political condition and a goal worth maintaining.' Louis XII violated this."}, {"text": "Military alliances are inherently unreliable and should be avoided in statecraft.", "isCorrect": false, "rationale": "While Machiavelli is cynical about allies, the deeper lesson here is about the distribution of power, not the general utility of alliances. Louis XII's error was in empowering certain allies too much."}, {"text": "States should prioritize internal development over external expansion to avoid conflict.", "isCorrect": false, "rationale": "The chapter is entirely about the problems and strategies of external expansion and holding mixed principalities, not about avoiding it altogether."}], "id": "q08"}, {"question": "A newly appointed governor in a recently annexed territory decides to reside in the conquered capital, actively engage with local leaders, and quickly address grievances. Which of Louis XII's errors is this governor explicitly attempting to avoid?", "options": [{"text": "He destroyed the smaller powers.", "isCorrect": false, "rationale": "The governor's actions address a different type of error — that of distant governance — rather than the error of eliminating natural allies among smaller powers."}, {"text": "He brought in Spain.", "isCorrect": false, "rationale": "Bringing in external powers is a macro-level strategic error not directly addressed by a governor's local presence and engagement."}, {"text": "He did not move to Italy himself.", "isCorrect": true, "rationale": "Louis XII's error was governing 'a distant territory from afar,' which meant he 'cannot respond to problems quickly, cannot build local relationships, and cannot prevent the abuses of his governors.' The governor's actions directly counter this."}, {"text": "He strengthened the Pope.", "isCorrect": false, "rationale": "Strengthening a rival power like the Pope is a strategic decision at a higher political level, not a consequence of a governor's presence or absence."}], "id": "q09"}, {"question": "The teacher's note suggests discussing 'the difference between describing a strategy and endorsing it morally' in relation to Machiavelli's approval of colonization. What is the primary implication of this distinction for students studying Machiavelli?", "options": [{"text": "Students should accept all of Machiavelli's advice as universally moral and applicable today.", "isCorrect": false, "rationale": "The note explicitly suggests distinguishing 'describing a strategy' from 'endorsing it morally,' implying that not all of Machiavelli's advice is morally acceptable or universally applicable."}, {"text": "Machiavelli's writings should be interpreted as historical analyses of power, not necessarily as moral prescriptions.", "isCorrect": true, "rationale": "The note encourages students to differentiate between Machiavelli's descriptive analysis of how power works and a modern moral endorsement of those tactics, positioning his work as an analysis of statecraft rather than a moral guide."}, {"text": "The only valuable lesson from Machiavelli is how to effectively colonize new territories.", "isCorrect": false, "rationale": "While colonization is discussed, the note applies to Machiavelli's advice generally, and the text covers a broad range of lessons beyond just colonization, such as balance of power and anticipating problems."}, {"text": "Modern political leaders should avoid studying Machiavelli due to his controversial views.", "isCorrect": false, "rationale": "The note is part of an educational specialist guide, suggesting Machiavelli is still valuable for study, but with critical interpretation, rather than outright avoidance."}], "id": "q10"}, {"question": "Machiavelli observes that the colonists the prince plants in a new territory are 'demoralizing to potential rebels.' Why does the presence of colonists have this demoralizing effect?", "options": [{"text": "Because the colonists form a standing army that suppresses any uprising by force.", "isCorrect": false, "rationale": "Machiavelli distinguishes colonists from garrisons — the colonists' effect is demoralizing precisely because they are civilians with a stake in the prince's success, not soldiers who suppress by force."}, {"text": "Because potential rebels are scattered and dispersed among the prince's own partisans, making organized resistance harder.", "isCorrect": true, "rationale": "The text says rebels are 'scattered among the prince's own partisans' — when colonists are spread through the territory, the indigenous population opposed to the prince is broken into isolated pockets, unable to organize."}, {"text": "Because colonists bring superior technology and wealth that the local population admires.", "isCorrect": false, "rationale": "Machiavelli's argument is entirely about the political and strategic distribution of loyal people, not about admiration for superior resources or technology."}, {"text": "Because the colonists rapidly intermarry with the local population and dilute opposition.", "isCorrect": false, "rationale": "Cultural assimilation through intermarriage is not part of Machiavelli's argument. His point is spatial and political — the distribution of loyal individuals among potential opponents."}], "id": "q11"}, {"question": "Why does Machiavelli say that colonization only requires compensating 'a small number of people'? What does this reveal about his view of the political costs of establishing colonies?", "options": [{"text": "Because most of the existing population will voluntarily relocate without compensation.", "isCorrect": false, "rationale": "Machiavelli does not claim voluntary relocation — the small compensation is because only those directly displaced by the colonists need to be compensated, not the entire territory."}, {"text": "Because only those directly displaced by the colonists need compensation; the rest of the population is not significantly harmed and thus cannot form a dangerous opposition.", "isCorrect": true, "rationale": "Machiavelli's logic is that the displaced group is small and scattered, and thus cannot form organized resistance. The broader population, not directly harmed, has no strong grievance to unite around — keeping political costs minimal."}, {"text": "Because the prince can force the displaced population to work as servants without any compensation.", "isCorrect": false, "rationale": "Machiavelli does recommend compensating the displaced — his point is simply that the number requiring compensation is small, making colonies a cost-effective strategy."}, {"text": "Because money is always the best way to secure loyalty, regardless of the number of people displaced.", "isCorrect": false, "rationale": "The argument is about the smallness of the number displaced, not a general claim about money buying loyalty. Elsewhere Machiavelli is quite skeptical about money as a substitute for genuine loyalty."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
