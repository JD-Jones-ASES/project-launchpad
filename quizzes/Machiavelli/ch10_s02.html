<body>

        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the defining characteristic of a civil principality?", "options": [{"text": "It is established through conquest by a military leader.", "isCorrect": false, "rationale": "The text states that a civil principality 'does not arise through conquest,' distinguishing it from other types of principalities."}, {"text": "Its ruler ascends to power through the favor of either the nobles or the common people.", "isCorrect": true, "rationale": "The text explicitly defines the civil principality as emerging 'when a private citizen rises to power through the favor of his fellow citizens—either the nobles or the common people.'"}, {"text": "It is typically a hereditary domain passed down through generations.", "isCorrect": false, "rationale": "The text contrasts the civil principality with those arising from 'inheritance,' indicating it is not hereditary."}, {"text": "Its formation involves a criminal act or coup d'état.", "isCorrect": false, "rationale": "The text specifies that this type of principality 'does not arise through... crime,' differentiating it from principalities gained through unlawful means."}]}, {"question": "What is the fundamental difference in desires between the nobles and the common people that Machiavelli identifies as key to understanding the civil principality?", "options": [{"text": "Nobles seek economic prosperity, while the people desire cultural enrichment.", "isCorrect": false, "rationale": "This option introduces desires not mentioned in the text as the fundamental opposing 'humors.' Machiavelli focuses on power and oppression."}, {"text": "Nobles aim to govern and oppress, whereas the people merely wish not to be oppressed.", "isCorrect": true, "rationale": "The text states, 'The nobles want to oppress the people. The people want only not to be oppressed.' This asymmetry is presented as 'the key to the entire chapter.'"}, {"text": "Nobles want to expand the principality's territory, while the people prefer internal stability.", "isCorrect": false, "rationale": "While potentially true in some contexts, the text does not identify territorial expansion versus internal stability as the core, irreconcilable desires of these groups in this chapter."}, {"text": "Nobles desire personal glory, and the people seek social equality.", "isCorrect": false, "rationale": "The text's 'keyconcept' box defines the great (nobles) as desiring 'to command and oppress' and the people as desiring 'only not to be commanded and oppressed,' which is more specific than general glory or equality."}]}, {"question": "Machiavelli concludes that it is strategically superior for a prince to secure the support of which group, and why?", "options": [{"text": "The concentrated power of the elite nobles, because they are easier to manage due to their small numbers.", "isCorrect": false, "rationale": "Machiavelli argues the opposite; nobles are difficult to manage because they are 'organized, ambitious, and dangerous' and their desires are 'insatiable.'"}, {"text": "Both the nobles and the people equally, to ensure a balanced power structure.", "isCorrect": false, "rationale": "Machiavelli clearly draws a conclusion that 'it is better to have the people's support,' not an equal balance, due to the inherent conflict between the groups."}, {"text": "The diffuse mass of the common people, because their modest desires make them a more loyal and reliable base.", "isCorrect": true, "rationale": "Machiavelli explicitly states 'it is better to have the people's support' because 'The people's very weakness is what makes them a reliable base of support. They do not scheme against a prince who leaves them in peace.'"}, {"text": "Foreign allies, as internal support is always inherently unstable.", "isCorrect": false, "rationale": "The chapter focuses exclusively on internal support dynamics, not foreign alliances, as the foundation for the civil principality's stability."}]}, {"question": "A prince who is elevated to power by the nobles faces a particularly challenging task. What is Machiavelli's primary advice for such a prince to ensure stability?", "options": [{"text": "To reward his noble patrons generously and consistently to maintain their loyalty.", "isCorrect": false, "rationale": "The text implies this is an unstable path, as nobles 'expect rewards' and their 'desires are insatiable,' making them unreliable even when satisfied."}, {"text": "To maintain strict neutrality between the nobles and the people to avoid alienating either faction.", "isCorrect": false, "rationale": "Machiavelli explicitly warns against neutrality, stating, 'a prince who neither protects the people nor satisfies the nobles will be destroyed by both.'"}, {"text": "To work actively to win over the people, even against the expectations of his noble patrons.", "isCorrect": true, "rationale": "The text advises that such a prince 'must work to win over the people whom the nobles expected him to oppress on their behalf. He must become, in effect, a protector of the people against the very faction that elevated him.'"}, {"text": "To establish a strong personal guard composed of foreign mercenaries, independent of local factions.", "isCorrect": false, "rationale": "While a strong guard might be part of security, the text does not mention this as Machiavelli's primary advice for winning over the people or stabilizing rule for a prince raised by nobles."}]}, {"question": "Machiavelli's description of his preference for popular support as 'one of the most counterintuitive arguments in The Prince' is based on what common expectation about his analysis of power?", "options": [{"text": "That he would prioritize moral governance over strategic advantage.", "isCorrect": false, "rationale": "Machiavelli is known as a 'hard-nosed, unsentimental analyst of power,' suggesting a focus on strategy over morality, so this expectation would make his preference for the people less counterintuitive if it were based on morality."}, {"text": "That he would typically advocate for inherited principalities as the most stable form of rule.", "isCorrect": false, "rationale": "While he discusses inherited principalities, the 'counterintuitive' aspect specifically refers to his preference for popular support over elite support within the context of a civil principality."}, {"text": "That he, as a pragmatic analyst, would favor the concentrated power of the elite over the diffuse mass of commoners.", "isCorrect": true, "rationale": "The text states, 'We might expect Machiavelli—hard-nosed, unsentimental analyst of power—to favor the concentrated power of the elite over the diffuse mass of commoners,' making his actual preference counterintuitive."}, {"text": "That he would emphasize military conquest as the sole legitimate path to power.", "isCorrect": false, "rationale": "The chapter's premise is about principalities 'that does not arise through conquest,' so this expectation is outside the scope of why *this specific argument* is counterintuitive."}]}, {"question": "What deeper insight does Machiavelli offer regarding political power, anticipating centuries of political thought, even when considering it through a 'hardheaded' lens?", "options": [{"text": "That absolute power can only be maintained through the systematic suppression of all dissent.", "isCorrect": false, "rationale": "While Machiavelli might address suppression, his deeper insight in this chapter is that indefinite oppression leads to revolt, implying limits on absolute power, not its systematic maintenance."}, {"text": "That political power ultimately rests on some form of popular consent or acquiescence, even if not formal democratic election.", "isCorrect": true, "rationale": "The text states, 'Machiavelli is arguing, in effect, that political power ultimately rests on popular consent—not in the democratic sense of formal election, but in the practical sense that no prince can govern indefinitely against the will of the majority.'"}, {"text": "That only those born into royalty possess true legitimacy to rule.", "isCorrect": false, "rationale": "The chapter focuses on civil principalities, where a private citizen rises to power, which contradicts the idea of legitimacy solely through birthright."}, {"text": "That the strength of a state is solely determined by its economic prowess.", "isCorrect": false, "rationale": "The text emphasizes the social and political dynamics between the prince, nobles, and people as the foundation of power and stability, not primarily economic factors."}]}, {"question": "The 'keyconcept' box highlights that the desires of the 'great' (grandi) and the 'people' (popolo) are 'irreconcilable.' What does this imply for a wise prince?", "options": [{"text": "The prince must continually mediate between the two groups, seeking compromise.", "isCorrect": false, "rationale": "If the desires are 'irreconcilable,' seeking a continuous compromise is likely futile or unstable. Machiavelli suggests choosing one base of support."}, {"text": "The prince should eliminate one of the groups to achieve total unity.", "isCorrect": false, "rationale": "The text does not advocate for eliminating groups, but rather for navigating their opposing desires and strategically choosing a base of support."}, {"text": "The prince must choose which group's support to prioritize as a durable foundation for power.", "isCorrect": true, "rationale": "Given the irreconcilable desires, the 'wise prince recognizes that popular support... is the more durable foundation for power,' implying a choice of prioritization."}, {"text": "The prince's power will always be temporary due to this inherent conflict.", "isCorrect": false, "rationale": "Machiavelli aims to provide advice for *holding* power, suggesting stability is achievable if the prince acts wisely, not that it's inherently temporary."}]}, {"question": "According to the text, why are the nobles considered less reliable as a foundation for a prince's power compared to the people?", "options": [{"text": "Nobles are typically unorganized and lack collective influence.", "isCorrect": false, "rationale": "The text states nobles are 'organized' and 'powerful,' making this statement incorrect."}, {"text": "Nobles are few in number and thus cannot offer significant military strength.", "isCorrect": false, "rationale": "While nobles are few, the primary reason for their unreliability is their ambition and calculating nature, not just their numbers."}, {"text": "Nobles are always calculating and their support is conditional on their self-interest, making them potential rivals even when satisfied.", "isCorrect": true, "rationale": "The text explains, 'The nobles... will always be calculating. Today they support the prince because it serves their interest; tomorrow they may find it more profitable to undermine him.' Also, 'even when satisfied they remain potential rivals.'"}, {"text": "Nobles are inherently less intelligent and thus make poor advisors.", "isCorrect": false, "rationale": "The text does not discuss the intelligence of nobles; it focuses on their desires and strategic behavior."}]}, {"question": "The 'note' connecting Machiavelli to Italian Realists like Gaetano Mosca and Vilfredo Pareto suggests what shared understanding about elite rule?", "options": [{"text": "That elites should always be overthrown in favor of popular sovereignty.", "isCorrect": false, "rationale": "Italian Realists studied elite rule, not its overthrow. They acknowledged constraints on elite rule, not its complete abolition."}, {"text": "That elites govern, but their stable rule depends on securing some degree of popular acquiescence.", "isCorrect": true, "rationale": "The note explicitly states that Mosca and Pareto 'acknowledged the constraint that Machiavelli identifies here: elites govern, but they can only govern stably if they maintain some degree of popular acquiescence.'"}, {"text": "That all governments, regardless of form, are ultimately democracies.", "isCorrect": false, "rationale": "Italian Realists focused on the reality of elite governance, not the democratic nature of all governments."}, {"text": "That military control is the only truly effective means for elites to maintain power.", "isCorrect": false, "rationale": "While military power can be a factor, the shared understanding emphasized here is the need for popular acquiescence for *stable* governance, not just military control."}]}, {"question": "The 'teachernote' encourages students to consider whether Machiavelli's preference for popular support is 'genuine sympathy, or purely strategic reasoning.' What further question does it suggest pushing students to consider about this distinction?", "options": [{"text": "Whether Machiavelli's advice is relevant outside of Renaissance Italy.", "isCorrect": false, "rationale": "While relevance is an important topic, the 'teachernote' directs students to a different specific follow-up question."}, {"text": "Does the distinction between sympathy and strategy matter if the outcome (a prince who protects the common people) is the same?", "isCorrect": true, "rationale": "The 'teachernote' explicitly asks: 'Then push further: does the distinction matter, if the outcome (a prince who protects the common people) is the same?'"}, {"text": "How a prince can cultivate genuine sympathy for his subjects.", "isCorrect": false, "rationale": "The question is about the *impact* of the distinction, not about the methods of cultivation."}, {"text": "If Machiavelli's true intention was to advocate for republican government.", "isCorrect": false, "rationale": "While Machiavelli wrote about republics, this specific 'teachernote' question is focused on the motive and outcome of a prince's actions regarding the people."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
