<script>
var QUESTIONS = [{"question": "According to Machiavelli in Chapter XVIII, what is a prince's fundamental stance regarding his word and integrity?", "options": [{"text": "A prince should always keep his promises, as it is the most praiseworthy quality and builds lasting trust.", "isCorrect": false, "rationale": "Machiavelli states it is 'praiseworthy' but immediately contrasts this with the reality that successful princes often 'held good faith of little account' and 'known how to circumvent the intellect of men by craft'."}, {"text": "A prince must learn when to break his word, especially when keeping it would be detrimental to his interests or when others are faithless.", "isCorrect": true, "rationale": "The text explicitly states, 'a wise lord cannot, nor ought he to, keep faith when such observance may be turned against him, and when the reasons that caused him to pledge it exist no longer.' It also notes that 'because [men] are bad, and will not keep faith with you, you too are not bound to observe it with them.'"}, {"text": "A prince should only break his word as a last resort, after all other diplomatic options have been exhausted.", "isCorrect": false, "rationale": "Machiavelli's argument is more proactive; a prince 'must in fact learn when to break it,' not merely use it as a last resort, but as a strategic tool when necessary for the state's preservation."}, {"text": "A prince's integrity is a private matter, and his public word holds no political significance.", "isCorrect": false, "rationale": "While a prince's *true* integrity might be private, his *public appearance* of integrity is highly significant, as men 'judge generally more by the eye than by the hand.' He must 'appear to have' good qualities, even if he doesn't observe them."}], "id": "q01"}, {"question": "Machiavelli describes two ways of contesting: 'by the law' and 'by force.' To what does he compare these two methods, and under what circumstances should a prince resort to the latter?", "options": [{"text": "He compares them to diplomacy and warfare; a prince should use warfare when diplomacy fails to achieve desired outcomes.", "isCorrect": false, "rationale": "While related, Machiavelli's specific comparison is to 'men' and 'beasts,' which are more fundamental categories than diplomacy and warfare. The text states 'the first method is proper to men, the second to beasts.'"}, {"text": "He compares them to 'man' and 'beast'; a prince must use force when the method of law is frequently insufficient to secure his objectives.", "isCorrect": true, "rationale": "The text clearly states, 'You must know there are two ways of contesting, the one by the law, the other by force; the first method is proper to men, the second to beasts; but because the first is frequently not sufficient, it is necessary to have recourse to the second.'"}, {"text": "He compares them to reason and emotion; a prince must resort to emotional appeals when logical arguments do not sway his subjects.", "isCorrect": false, "rationale": "This analogy is not present in the text regarding the 'two ways of contesting.' Machiavelli's focus is on the practical means of maintaining power, not on psychological manipulation in this specific context."}, {"text": "He compares them to alliances and conquest; a prince should pursue conquest only when alliances prove unreliable.", "isCorrect": false, "rationale": "The text's primary distinction for the 'two ways of contesting' is 'law' and 'force,' not specifically alliances and conquest, although these might be outcomes or strategies within those broader categories."}], "id": "q02"}, {"question": "Machiavelli advises a prince to adopt the natures of both the 'fox' and the 'lion.' What does each animal metaphorically represent in the context of a prince's necessary skills?", "options": [{"text": "The fox represents political cunning and negotiation, while the lion symbolizes military might and intimidation.", "isCorrect": false, "rationale": "While generally true, Machiavelli provides a more specific and practical meaning for each. His analogy is focused on specific dangers, not general categories."}, {"text": "The fox represents the ability to avoid traps and deceptions, and the lion represents the capacity to overcome direct threats and terrify enemies.", "isCorrect": true, "rationale": "Machiavelli states, 'Therefore, it is necessary to be a fox to discover the snares and a lion to terrify the wolves.' This directly correlates the fox with identifying dangers and the lion with confronting and deterring adversaries."}, {"text": "The fox signifies the capacity for subtle persuasion, and the lion denotes the power of unwavering conviction.", "isCorrect": false, "rationale": "Machiavelli's focus is on practical self-preservation and state maintenance through specific actions, not abstract qualities like conviction or persuasion in this particular analogy."}, {"text": "The fox represents strategic retreat, and the lion symbolizes aggressive expansion.", "isCorrect": false, "rationale": "This interpretation does not align with Machiavelli's specific explanation that the lion 'cannot defend himself against snares' and the fox 'cannot defend himself against wolves,' necessitating their combined use for defensive and offensive maneuvers against specific threats."}], "id": "q03"}, {"question": "What is Machiavelli's explicit reasoning for why a prince is not bound to keep faith with others, even after pledging it?", "options": [{"text": "Keeping faith consistently would make a prince predictable and therefore vulnerable to his rivals.", "isCorrect": false, "rationale": "While unpredictability can be a strategic advantage, Machiavelli's primary justification given in the text is centered on the inherent nature of men."}, {"text": "Men are generally unreliable and faithless, thus absolving a prince from his own obligations to them.", "isCorrect": true, "rationale": "The text states, 'If men were entirely good this precept would not hold, but because they are bad, and will not keep faith with you, you too are not bound to observe it with them.' This is the explicit moral and practical justification provided."}, {"text": "Divine providence often intervenes, making a prince's pledges irrelevant to his ultimate destiny.", "isCorrect": false, "rationale": "Machiavelli's philosophy is pragmatic and human-centered, focusing on the prince's actions and human nature, not divine intervention, as the basis for political conduct."}, {"text": "A prince's word is primarily a tool for gaining temporary advantages, not for long-term commitment.", "isCorrect": false, "rationale": "While a prince's word can be a tool, this option doesn't capture the *justification* for breaking faith, which Machiavelli grounds in the faithlessness of others and the prince's changing circumstances."}], "id": "q04"}, {"question": "Machiavelli describes men as 'so simple, and so subject to present necessities.' How does this characteristic of humanity benefit a prince who wishes to deceive?", "options": [{"text": "It means men are astute enough to detect deception, forcing a prince to be genuinely honest.", "isCorrect": false, "rationale": "This directly contradicts Machiavelli's assertion that 'he who seeks to deceive will always find someone who will allow himself to be deceived' due to human simplicity and focus on immediate needs."}, {"text": "It makes men easily manipulable by appearances and short-term gains, enabling a prince to successfully dissemble.", "isCorrect": true, "rationale": "The text states, 'men are so simple, and so subject to present necessities, that he who seeks to deceive will always find someone who will allow himself to be deceived.' Their focus on the present and their simplicity make them susceptible to a prince's pretenses."}, {"text": "It indicates that men value genuine sincerity above all else, compelling a prince to act virtuously.", "isCorrect": false, "rationale": "Machiavelli argues the opposite, emphasizing that men are swayed by appearances and results, not necessarily genuine sincerity which is hard to discern and often 'injurious' to the prince."}, {"text": "It implies men are easily inspired by a prince's moral leadership, making deception unnecessary.", "isCorrect": false, "rationale": "Machiavelli explicitly promotes deception and dissimulation as necessary tools for a prince, directly countering the idea that moral leadership alone suffices or makes deception unnecessary."}], "id": "q05"}, {"question": "Regarding a prince's possession of 'good qualities' (merciful, faithful, humane, religious, upright), what is Machiavelli's key distinction between *having* these qualities and *appearing* to have them?", "options": [{"text": "A prince must genuinely possess all these qualities, as appearing to have them without substance is unsustainable in the long run.", "isCorrect": false, "rationale": "Machiavelli explicitly states it is 'unnecessary for a prince to have all the good qualities' and 'to have them and always to observe them is injurious.'"}, {"text": "It is unnecessary to truly possess all these qualities, but absolutely vital to appear to have them, because observing them always can be detrimental, while appearing to have them is useful for maintaining power.", "isCorrect": true, "rationale": "The text clearly states, 'it is unnecessary for a prince to have all the good qualities I have enumerated, but it is very necessary to appear to have them. And I shall dare to say this also, that to have them and always to observe them is injurious, and that to appear to have them is useful.'"}, {"text": "The distinction is unimportant, as public perception will always align with a prince's true character.", "isCorrect": false, "rationale": "Machiavelli argues the exact opposite, emphasizing the gap between appearance and reality, and the importance of manipulating perception: 'Every one sees what you appear to be, few really know what you are.'"}, {"text": "Possessing these qualities helps a prince attract loyal subjects, while merely appearing to have them only serves to deceive foreign adversaries.", "isCorrect": false, "rationale": "The text frames the appearance of these qualities as broadly useful for managing both subjects and broader political relationships, not just foreign adversaries, and prioritizes appearance over genuine possession for state maintenance."}], "id": "q06"}, {"question": "The text cites Alexander VI as an example of a prince who consistently succeeded through deception. What does Machiavelli attribute to Alexander VI's success in this regard?", "options": [{"text": "His ability to back up his deceits with overwhelming military force, making his lies irrelevant.", "isCorrect": false, "rationale": "While military force is important for a prince, the text attributes Alexander VI's success directly to his skill in deception and his understanding of human nature, not solely military might."}, {"text": "His rare quality of being both a masterful pretender and dissembler, combined with an understanding of mankind's simplicity.", "isCorrect": true, "rationale": "The text says, 'Alexander the Sixth did nothing else but deceive men... nevertheless his deceits always succeeded according to his wishes, because he well understood this side of mankind.' This highlights his skill in pretense and understanding of human credulity."}, {"text": "His consistent preaching of peace and good faith, which fostered an environment of trust despite his true intentions.", "isCorrect": false, "rationale": "The text states he 'never preaches anything else but peace and good faith, and to both he is most hostile,' implying his success came from *not* keeping them, rather than from their honest propagation."}, {"text": "His moral flexibility, which allowed him to adapt to circumstances without fear of divine retribution.", "isCorrect": false, "rationale": "While he had moral flexibility, the text specifically links his success to his mastery of deception and understanding of human nature, rather than his lack of fear of divine retribution."}], "id": "q07"}, {"question": "Machiavelli emphasizes that a prince, 'especially a new one, cannot observe all those things for which men are esteemed,' often being 'forced...to act contrary to fidelity, friendship, humanity, and religion.' What crucial characteristic does he advocate for a prince's mind in response to these pressures?", "options": [{"text": "Unwavering commitment to his initial moral principles, as deviation leads to ruin.", "isCorrect": false, "rationale": "This directly contradicts Machiavelli's advice that a prince must be ready to act 'contrary to fidelity, friendship, humanity, and religion' when necessary."}, {"text": "A mind framed to be able to change to the opposite of esteemed qualities when required to maintain the state.", "isCorrect": true, "rationale": "The text states, 'to appear merciful, faithful, humane, religious, upright, and to be so, but with a mind so framed that should you require not to be so, you may be able and know how to change to the opposite.'"}, {"text": "Absolute transparency in his actions and intentions, ensuring his subjects understand his every move.", "isCorrect": false, "rationale": "Machiavelli advocates for disguise and dissimulation, not transparency, especially because 'few really know what you are.'"}, {"text": "Reliance on a council of wise advisors to make all critical ethical decisions for him.", "isCorrect": false, "rationale": "Machiavelli's advice is directed at the prince's own agency and ability to adapt, not a reliance on advisors for fundamental ethical shifts."}], "id": "q08"}, {"question": "Why does Machiavelli assert that 'there is nothing more necessary to appear to have than this last quality' (religion), and why do men primarily judge a prince 'by the eye than by the hand'?", "options": [{"text": "Because religious devotion ensures divine favor, which is more powerful than human judgment, and men judge by the eye due to their spiritual intuition.", "isCorrect": false, "rationale": "Machiavelli's perspective is pragmatic, not spiritual. He values the *appearance* of religion for its political utility in influencing public perception, not for divine favor."}, {"text": "Because men are generally more observant of outward appearances than of a prince's true character or actions, and few have direct experience of his true nature.", "isCorrect": true, "rationale": "The text explains, 'men judge generally more by the eye than by the hand, because it belongs to everybody to see you, to few to come in touch with you. Every one sees what you appear to be, few really know what you are.'"}, {"text": "Because religious wars are the most destructive, and appearing religious helps a prince avoid them, while judging by the hand relates to material possessions.", "isCorrect": false, "rationale": "While avoiding conflict is a princely goal, the text's explanation for the importance of appearing religious and judging by the eye is rooted in public perception and lack of direct knowledge, not primarily avoiding religious wars or material possessions."}, {"text": "Because truly religious princes inspire greater loyalty, and men judge by the hand to assess a prince's generosity.", "isCorrect": false, "rationale": "Machiavelli emphasizes the *appearance* of religion for political utility, not the 'truly religious' aspect, and 'by the hand' refers to direct interaction or experience, not necessarily generosity."}], "id": "q09"}, {"question": "Machiavelli claims that 'if a prince have the credit of conquering and holding his state, the means will always be considered honest, and he will be praised by everybody.' What does this statement imply about how 'the vulgar' judge a prince?", "options": [{"text": "The vulgar are inherently discerning and will only praise a prince whose methods align with traditional virtues and ethics.", "isCorrect": false, "rationale": "This directly contradicts the statement that 'the means will always be considered honest' if the outcome is successful, regardless of the actual honesty of those means."}, {"text": "The vulgar are primarily concerned with a prince's personal piety and will judge him based on his religious observance.", "isCorrect": false, "rationale": "While the *appearance* of religion is important, this statement focuses on the outcome ('conquering and holding his state') as the ultimate determinant of judgment for the 'vulgar.'"}, {"text": "The vulgar judge solely by results and outward appearances of success, rationalizing any means that lead to a stable and victorious state.", "isCorrect": true, "rationale": "The text states, 'the vulgar are always taken by what a thing seems to be and by what comes of it; and in the world there are only the vulgar.' This shows they prioritize successful outcomes and appearances over the morality of the means."}, {"text": "The vulgar are easily swayed by powerful rhetoric, regardless of a prince's actual accomplishments.", "isCorrect": false, "rationale": "While rhetoric can be a tool, the statement explicitly emphasizes 'conquering and holding his state' (results) as the basis for the vulgar's praise, not just rhetoric."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
