<script>
var QUESTIONS = [{"question": "What is the primary significance of Chapter XV in Machiavelli's 'The Prince'?", "options": [{"text": "It summarizes the historical context of Renaissance Italy that led to the book's creation.", "isCorrect": false, "rationale": "While historical context is relevant to 'The Prince' overall, Chapter XV is specifically identified as the 'philosophical turning point' where Machiavelli declares his method, not primarily a historical summary."}, {"text": "It serves as the philosophical turning point, declaring Machiavelli's unique method and distancing him from prior political philosophy.", "isCorrect": true, "rationale": "The text explicitly states Chapter XV 'is the philosophical turning point' where Machiavelli 'announces, with unusual directness, what he is doing and why—and to distance himself explicitly from the entire tradition of political philosophy that preceded him.'"}, {"text": "It provides a detailed application of the political strategies Machiavelli introduced in earlier chapters.", "isCorrect": false, "rationale": "The text states that 'everything before it has been preparation; everything after it will be application of the method declared here,' indicating Chapter XV is the declaration, not the application."}, {"text": "It focuses on explaining the moral virtues an ideal prince must cultivate to maintain power.", "isCorrect": false, "rationale": "Machiavelli explicitly rejects the tradition of describing 'how an ideal ruler should behave,' instead focusing on 'the effectual truth' rather than 'imaginary version' of such ideals."}], "id": "q01"}, {"question": "Machiavelli's concept of 'the effectual truth' is a deliberate rejection of which traditional approach to political philosophy?", "options": [{"text": "The analysis of economic systems and their impact on state governance.", "isCorrect": false, "rationale": "The text does not mention economic systems as the subject of Machiavelli's rejection; rather, it focuses on moral and idealist political theories."}, {"text": "The empirical study of historical events to derive political lessons.", "isCorrect": false, "rationale": "Machiavelli's method actually aligns with deriving conclusions from 'successes and failures of real rulers in real situations,' which involves empirical study, not rejecting it."}, {"text": "The description of ideal states and rulers based on moral and theological virtues.", "isCorrect": true, "rationale": "Machiavelli's 'effectual truth' directly contrasts with the 'imaginary version' of political truth, referring to 'the long tradition of philosophers and theologians who described ideal states and ideal rulers that exist nowhere in reality,' such as Plato's philosopher-king or Augustine's City of God."}, {"text": "The focus on international relations and diplomacy as the primary tools of statecraft.", "isCorrect": false, "rationale": "While 'The Prince' touches upon relations between states, the core rejection described in this chapter is of internal political philosophy focused on ideals, not a specific foreign policy approach."}], "id": "q02"}, {"question": "According to Machiavelli, why are the traditional ideals of virtue (like Plato's philosopher-king) useless for an actual prince?", "options": [{"text": "Because they are too complex for most rulers to understand or implement effectively.", "isCorrect": false, "rationale": "The text implies the ideals are understandable but impractical, not necessarily too complex to grasp. The issue is their applicability in a dangerous world."}, {"text": "Because such ideals are inherently contradictory and lead to internal conflict within the state.", "isCorrect": false, "rationale": "The text does not suggest the ideals themselves are contradictory, but rather that attempting to practice them in a world where others do not will lead to ruin."}, {"text": "Because a prince practicing all virtues in a world where rivals do not will be destroyed, rendering the ideals impractical.", "isCorrect": true, "rationale": "The text states, 'A prince who tries to practice all the virtues in a world where his rivals practice none will not become a model of righteousness; he will be destroyed.' This highlights the practical danger of adhering strictly to ideals."}, {"text": "Because they promote a static view of governance that prevents necessary societal evolution.", "isCorrect": false, "rationale": "The text focuses on the immediate survival and maintenance of power for the prince in a dynamic environment, not on the broader societal evolution aspect of these ideals."}], "id": "q03"}, {"question": "Machiavelli lists pairs of opposite qualities (e.g., generous/miserly, cruel/merciful). What is his unsettling advice regarding these qualities?", "options": [{"text": "A prince should always strive to possess all the virtues listed on the left side of each pair.", "isCorrect": false, "rationale": "This is precisely the 'traditional advice' that Machiavelli rejects, stating that 'a prince who tries to possess all these qualities at once will be ruined.'"}, {"text": "A prince should develop a reputation for being consistently on one side of each pair to ensure predictability.", "isCorrect": false, "rationale": "Machiavelli advocates for flexibility 'according to necessity,' not consistent predictability on one side, which would be just as ruinous if circumstances change."}, {"text": "A prince must choose which qualities to display based on political reality and necessity, as attempting to possess all virtues will lead to ruin.", "isCorrect": true, "rationale": "The text explains that 'political reality is too varied, too dangerous, and too unpredictable for any fixed moral code to serve as a reliable guide,' and 'a prince who tries to possess all these qualities at once will be ruined.'"}, {"text": "A prince should prioritize personal moral development over political effectiveness when these qualities conflict.", "isCorrect": false, "rationale": "Machiavelli directly separates political effectiveness from 'fixed moral code' and personal virtue, focusing on what 'maintains' the prince, which often conflicts with traditional moral priorities."}], "id": "q04"}, {"question": "What does Machiavelli's analogy of 'The doctor who tells a patient only what they want to hear is not kind; he is dangerous' illustrate about his methodological commitment to 'the effectual truth'?", "options": [{"text": "That leaders should be universally loved and admired by their subjects.", "isCorrect": false, "rationale": "The analogy is about delivering an unvarnished truth, even if unpleasant, for the ultimate good, not about being loved. Machiavelli often suggests that being feared can be more effective than being loved."}, {"text": "That ignoring unpleasant facts or moralizing reality can lead to detrimental outcomes for the state.", "isCorrect": true, "rationale": "The analogy means that Machiavelli 'refuses to let values distort his observation of facts' and intends to be 'the kind of advisor who tells the truth,' implying that pleasant but untrue advice (like a doctor sugarcoating) is harmful in politics."}, {"text": "That a prince must possess medical knowledge to effectively govern a state.", "isCorrect": false, "rationale": "This is a literal interpretation of an analogy, which is incorrect. The analogy is metaphorical, comparing an advisor's role to a doctor's."}, {"text": "That subjects will always prefer a ruler who prioritizes their comfort and happiness.", "isCorrect": false, "rationale": "The analogy is about the advisor's responsibility to the prince, not about the subjects' preferences, and it implies that 'comfort' (pleasant lies) can be dangerous."}], "id": "q05"}, {"question": "The most famous line, 'It is necessary to a prince, if he wants to maintain himself, to learn how not to be good, and to use this and not use it according to necessity,' means that a prince:", "options": [{"text": "Should always act in a morally reprehensible way to ensure their survival and power.", "isCorrect": false, "rationale": "The text explicitly states, 'He is not saying a prince should always be bad' and cautions against being 'always bad' as it leads to being 'hated and eventually destroyed.'"}, {"text": "Must fully understand when and how to deploy morally questionable actions, and when to refrain, based on circumstances.", "isCorrect": true, "rationale": "The text clarifies, 'He is saying a prince must know HOW to be bad—must have this capacity available, must understand when deploying it is necessary—and then use it or withhold it as circumstances require.'"}, {"text": "Is encouraged to disregard all ethical considerations in pursuit of personal enjoyment or gain.", "isCorrect": false, "rationale": "The 'caution' section explicitly states, 'He is not saying princes should enjoy cruelty, or that deception is a virtue, or that justice is a fiction.' He emphasizes 'necessit\\`a' over convenience or preference."}, {"text": "Should openly admit to their immoral actions to gain the respect of their subjects.", "isCorrect": false, "rationale": "The text does not discuss admitting to immoral actions; rather, it focuses on the strategic deployment of such actions 'according to necessity' for maintenance of power, which often involves appearances."}], "id": "q06"}, {"question": "Machiavelli emphasizes the role of 'necessit\\`a' (necessity) in a prince's actions. What does this term imply about departing from moral norms?", "options": [{"text": "Departing from moral norms is always justified if it benefits the prince in any way.", "isCorrect": false, "rationale": "The 'caution' section clarifies that 'Departing from moral norms is justified only by genuine necessity, not by convenience or preference,' directly refuting the idea of 'any way' of benefit."}, {"text": "Departing from moral norms is an inherent virtue for a strong and effective leader.", "isCorrect": false, "rationale": "Machiavelli is not advocating immorality as a virtue itself but as a tool to be used when compelled by dire circumstances."}, {"text": "Departing from moral norms is only acceptable when compelled by genuine, unavoidable circumstances, not by personal preference or ease.", "isCorrect": true, "rationale": "The 'caution' section explicitly states, 'Departing from moral norms is justified only by genuine necessity, not by convenience or preference.'"}, {"text": "A prince should always act 'badly' proactively to prevent potential threats, regardless of immediate necessity.", "isCorrect": false, "rationale": "Machiavelli advocates using 'necessity' as a guide, not constant proactive 'badness.' An 'always bad' prince would be 'hated and eventually destroyed.'"}], "id": "q07"}, {"question": "How did Chapter XV contribute to a 'moral revolution' in political philosophy?", "options": [{"text": "It advocated for the complete abolition of moral considerations in all aspects of public life.", "isCorrect": false, "rationale": "Machiavelli is not saying morality has no place, but rather that political effectiveness must be analyzed independently of private morality, not that morality is abolished."}, {"text": "It established political science as a discipline independent of ethics, focusing on actual outcomes rather than moral prescriptions.", "isCorrect": true, "rationale": "The text explicitly states this chapter 'marks the birth of political science as a discipline independent of ethics,' asking 'what actually produces stability, security, and power, without presupposing that the answer must be morally pure.'"}, {"text": "It introduced a new ethical framework for rulers based on Christian virtues and divine law.", "isCorrect": false, "rationale": "Machiavelli explicitly distances himself from theological traditions like Augustine's City of God and argues against a fixed moral code based on traditional virtues."}, {"text": "It argued that personal morality is irrelevant for all citizens, not just princes.", "isCorrect": false, "rationale": "The discussion is focused on the unique challenges and requirements of a ruler in the political sphere, not a general statement about all citizens' personal morality."}], "id": "q08"}, {"question": "A modern political leader is faced with a choice: implement a popular policy that is economically unsustainable in the long run, or implement an unpopular but fiscally responsible policy that ensures stability. Which choice aligns most closely with Machiavelli's concept of 'the effectual truth'?", "options": [{"text": "Implement the popular policy to maintain public approval and ensure a strong electoral base.", "isCorrect": false, "rationale": "While popularity might seem immediately expedient, an 'economically unsustainable' policy goes against 'what actually produces stability, security, and power' in the long run, which is the focus of effectual truth. It prioritizes short-term preference over long-term fact."}, {"text": "Implement the unpopular but fiscally responsible policy, prioritizing the actual long-term stability and security of the state.", "isCorrect": true, "rationale": "Machiavelli's 'effectual truth' focuses on 'what actually produces stability, security, and power.' An 'unpopular but fiscally responsible policy that ensures stability' aligns with decisions based on facts and actual outcomes, even if they conflict with immediate public desire or 'what people want to hear,' as per the doctor analogy."}, {"text": "Seek a compromise that partially satisfies both popular demand and fiscal responsibility, even if it's not the most effective.", "isCorrect": false, "rationale": "Machiavelli is less concerned with compromise for its own sake and more with effective action that secures the state. A compromise that isn't 'most effective' might fail the test of 'effectual truth.'"}, {"text": "Consult a panel of moral philosophers to determine the most ethically sound course of action.", "isCorrect": false, "rationale": "Machiavelli explicitly distances himself from moral philosophy as the primary guide for political action, arguing that political analysis should be conducted on its own terms, not presupposing a morally pure answer."}], "id": "q09"}, {"question": "Which of the following best summarizes the 'philosophical problem' Machiavelli poses in this chapter, as suggested in the teacher's note?", "options": [{"text": "The difficulty in convincing the public to accept necessary but unpopular policies.", "isCorrect": false, "rationale": "While a practical challenge, this is a consequence of the problem, not the core philosophical issue Machiavelli raises regarding the nature of political power and morality."}, {"text": "The inherent conflict between a ruler's personal moral virtue and their political effectiveness in maintaining power and order.", "isCorrect": true, "rationale": "The teacher's note asks students: 'is Machiavelli simply wrong that moral virtue and political effectiveness sometimes conflict? Can they think of historical examples where doing the right thing cost a leader power, or where doing the expedient thing preserved order at a moral cost?' This directly points to the conflict between virtue and effectiveness."}, {"text": "The challenge of balancing a ruler's desire for personal wealth with the needs of the state's treasury.", "isCorrect": false, "rationale": "The text discusses generosity/miserliness but frames it within the context of maintaining power, not primarily as a personal wealth vs. state needs conflict, and it's not the 'pivotal' philosophical problem of the chapter."}, {"text": "The historical evolution of political systems from monarchies to republics.", "isCorrect": false, "rationale": "This chapter focuses on the nature of governance for a prince, not the evolution of political systems themselves. The revolution discussed is methodological, not governmental."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
