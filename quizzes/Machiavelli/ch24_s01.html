<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the inherent dilemma a prince faces when trying to secure honest advice?", "options": [{"text": "Princes must choose between having advisors who are wise but disloyal, or loyal but foolish.", "isCorrect": false, "rationale": "The text does not present this as the core dilemma. The issue is less about the inherent quality of advisors and more about the structural problem of encouraging honesty without undermining authority."}, {"text": "If a prince allows everyone to tell the truth, he risks losing respect, but if he doesn't, he is vulnerable to flatterers.", "isCorrect": true, "rationale": "Machiavelli states, 'there is no other way of guarding oneself from flatterers except letting men understand that to tell you the truth does not offend you; but when every one may tell you the truth, respect for you abates.' This highlights the central dilemma."}, {"text": "Hiring too many advisors leads to conflicting counsel, while hiring too few leads to an unoriginal perspective.", "isCorrect": false, "rationale": "While conflicting counsel from many unwise advisors is a problem for an unwise prince, it's not the fundamental dilemma of dealing with flattery versus maintaining respect for a wise prince."}, {"text": "Honest advisors are always secretly plotting to take the prince's state, regardless of the prince's wisdom.", "isCorrect": false, "rationale": "The text suggests this can happen if an unwise prince yields *all* his affairs to one person, but it's not a universal danger posed by all honest advisors, nor the primary dilemma discussed for securing advice."}], "id": "q01"}, {"question": "Which of the following best describes Machiavelli's 'third course' for a prince to obtain honest counsel?", "options": [{"text": "The prince should only listen to advice from a single, trusted prime minister to avoid conflicting opinions.", "isCorrect": false, "rationale": "Machiavelli warns against yielding affairs entirely to one person, as that person may quickly take away the state. He advocates for choosing 'wise men' (plural) and consulting them."}, {"text": "The prince should allow all citizens to offer advice freely, but only consider opinions presented in written form to ensure thoughtfulness.", "isCorrect": false, "rationale": "Machiavelli explicitly states that allowing 'every one' to tell the truth abates respect, and the prince should 'discourage every one from offering advice unless he asks it.'"}, {"text": "The prince should select a few wise men, permit them to speak truthfully *only* when asked, and use their input to form his own conclusions.", "isCorrect": true, "rationale": "This aligns perfectly with Machiavelli's advice: 'choosing the wise men in his state, and giving to them only the liberty of speaking the truth to him, and then only of those things of which he inquires...and afterwards form his own conclusions.'"}, {"text": "The prince should gather a large council of diverse opinions and always follow the majority vote to ensure popular support.", "isCorrect": false, "rationale": "Machiavelli emphasizes the prince forming his *own* conclusions after listening, not simply following a majority vote. He also stresses controlling when and from whom advice is received."}], "id": "q02"}, {"question": "How does Machiavelli suggest a prince should motivate his chosen counselors to speak freely and honestly?", "options": [{"text": "By threatening severe punishment for any counselor found to be withholding information or flattering.", "isCorrect": false, "rationale": "While the prince should let his 'anger be felt' if someone doesn't tell the truth, the primary motivator for free speech is positive reinforcement, not just punishment for dishonesty."}, {"text": "By ensuring that those who speak more freely and honestly are given preference and advancement.", "isCorrect": true, "rationale": "The text states, 'each of them should know that, the more freely he shall speak, the more he shall be preferred.' This directly encourages honesty."}, {"text": "By publicly declaring that all counsel will be kept anonymous to protect advisors from retribution.", "isCorrect": false, "rationale": "Anonymity is not mentioned as a method. Machiavelli emphasizes the prince's direct relationship with his chosen counselors and their knowledge of being preferred for honesty."}, {"text": "By paying his counselors significantly more than other officials, thereby reducing their incentive to flatter for personal gain.", "isCorrect": false, "rationale": "Financial incentives are not mentioned as the primary motivator for honest advice; preference and recognition are highlighted."}], "id": "q03"}, {"question": "The example of Holy Roman Emperor Maximilian I serves to illustrate what specific flaw in princely conduct regarding counsel?", "options": [{"text": "The danger of being too trusting and revealing all plans to everyone, leading to opposition.", "isCorrect": false, "rationale": "Maximilian was secretive, not overly trusting. His flaw was the opposite: not communicating or receiving opinions."}, {"text": "The importance of having a strong military to enforce decisions even without good counsel.", "isCorrect": false, "rationale": "The example focuses on his failure to get things done due to lack of good counsel and irresolution, not military strength."}, {"text": "The consequence of being secretive, not seeking advice, and being irresolute in decisions.", "isCorrect": true, "rationale": "Fra Luca states Maximilian 'consulted with no one, yet never got his own way in anything,' because he was 'a secretive man—he does not communicate his designs to any one, nor does he receive opinions on them...being pliant, is diverted from them.' This demonstrates the negative outcomes of not following Machiavelli's advice."}, {"text": "The necessity of always following the advice of experienced men of affairs like Fra Luca.", "isCorrect": false, "rationale": "Fra Luca is cited as an observer explaining Maximilian's flaws, not as the type of advisor Maximilian should have simply followed without independent judgment."}], "id": "q04"}, {"question": "What is the key difference between a wise prince and an unwise prince regarding counsel, according to Machiavelli's ultimate axiom?", "options": [{"text": "A wise prince only takes advice from one extremely prudent individual, whereas an unwise prince consults many.", "isCorrect": false, "rationale": "The text states an unwise prince *might* be well governed by yielding affairs to one prudent person, but it wouldn't last. A wise prince chooses 'wise men' (plural) and forms his own conclusions."}, {"text": "A wise prince actively seeks out and integrates diverse opinions, while an unwise prince dismisses all advice.", "isCorrect": false, "rationale": "While a wise prince seeks advice, the core distinction is deeper than simply seeking versus dismissing. An unwise prince might seek advice but be unable to use it effectively."}, {"text": "Good counsels are born of the prince's wisdom, not the other way around; an unwise prince cannot benefit from good advice.", "isCorrect": true, "rationale": "Machiavelli explicitly states: 'good counsels, whencesoever they come, are born of the wisdom of the prince, and not the wisdom of the prince from good counsels.' He further explains an unwise prince 'will never take good advice.'"}, {"text": "A wise prince is always surrounded by naturally honest men, while an unwise prince struggles with flatterers.", "isCorrect": false, "rationale": "The text indicates that 'men will always prove untrue to you unless they are kept honest by constraint,' implying that honesty is not natural but must be cultivated by the prince's system, regardless of his initial wisdom."}], "id": "q05"}, {"question": "What happens if a prince allows 'every one' to tell him the truth, despite his willingness to hear it?", "options": [{"text": "He gains a reputation for being open-minded and democratic, strengthening his rule.", "isCorrect": false, "rationale": "Machiavelli suggests the opposite: 'but when every one may tell you the truth, respect for you abates.'"}, {"text": "His decisions become more informed and less prone to error, leading to stable governance.", "isCorrect": false, "rationale": "The text implies this leads to contempt due to varying opinions, not more stable governance."}, {"text": "Respect for the prince abates, potentially leading to contempt.", "isCorrect": true, "rationale": "Machiavelli directly states this: 'when every one may tell you the truth, respect for you abates.' This is a critical component of the dilemma."}, {"text": "He becomes overwhelmed by conflicting advice and is unable to make any decisions.", "isCorrect": false, "rationale": "While conflicting advice is an issue for an unwise prince, the direct consequence of allowing 'everyone' to speak truth is the abatement of respect, not necessarily decision paralysis for a wise prince."}], "id": "q06"}, {"question": "According to the text, under what circumstances should a prince receive advice?", "options": [{"text": "Only when advisors spontaneously offer their insights on matters they deem important.", "isCorrect": false, "rationale": "Machiavelli advises the prince 'ought rather to discourage every one from offering advice unless he asks it.'"}, {"text": "Always, but strictly only when he wishes, and on matters he specifically inquires about.", "isCorrect": true, "rationale": "The text states, 'A prince, therefore, ought always to take counsel, but only when he wishes and not when others wish; he ought rather to discourage every one from offering advice unless he asks it; but, however, he ought to be a constant inquirer, and afterwards a patient listener concerning the things of which he inquired.'"}, {"text": "Only from those who agree with his initial thoughts to ensure unity and swift execution.", "isCorrect": false, "rationale": "This would lead to flattery and prevent true counsel. The purpose is to get truth, not just agreement."}, {"text": "Only in public forums where all citizens can witness the consultation process.", "isCorrect": false, "rationale": "The text suggests a controlled, private system with chosen 'wise men,' not public forums."}], "id": "q07"}, {"question": "What is the primary risk if an unwise prince attempts to take counsel from more than one person?", "options": [{"text": "He will be seen as indecisive and weak, causing his people to lose faith in his leadership.", "isCorrect": false, "rationale": "While indecisiveness can result in contempt, the text highlights a more immediate and internal problem for the unwise prince."}, {"text": "The advisors will unite against him and conspire to overthrow his rule.", "isCorrect": false, "rationale": "The text states advisors will think of 'his own interests' and the prince won't know how to control them, not necessarily that they will unite against him in a plot to overthrow."}, {"text": "He will receive conflicting, self-interested counsels and lack the wisdom to unite them or see through them.", "isCorrect": true, "rationale": "The text clearly states, 'if a prince who is not inexperienced should take counsel from more than one he will never get united counsels, nor will he know how to unite them. Each of the counsellors will think of his own interests, and the prince will not know how to control them or to see through them.'"}, {"text": "He will be perceived as reliant on others, undermining his perceived autonomy and power.", "isCorrect": false, "rationale": "The text emphasizes the internal struggle of integrating diverse advice from self-interested parties, more than external perception of reliance."}], "id": "q08"}, {"question": "Applying Machiavelli's principles, if a prince discovers one of his chosen wise men has intentionally misled him, what action should the prince take?", "options": [{"text": "Gently reprimand the advisor in private and give them a second chance to prove their loyalty.", "isCorrect": false, "rationale": "Machiavelli advises a stronger, more immediate reaction to maintain control and enforce honesty."}, {"text": "Publicly shame and immediately execute the advisor to set an example for others.", "isCorrect": false, "rationale": "While Machiavelli is often associated with harshness, the text specifically says the prince 'should let his anger be felt,' which implies a strong negative consequence but not necessarily immediate execution."}, {"text": "Quietly remove the advisor from his position without explanation to avoid public unrest.", "isCorrect": false, "rationale": "Simply removing them might not be enough to 'let his anger be felt' and ensure constraint among other advisors."}, {"text": "Let his anger be felt, signifying severe disapproval and likely punishment or dismissal, to ensure truthfulness is enforced.", "isCorrect": true, "rationale": "The text explicitly states: 'on learning that any one, on any consideration, has not told him the truth, he should let his anger be felt.' This demonstrates the enforcement mechanism for honesty."}], "id": "q09"}, {"question": "What is the overarching conclusion Machiavelli draws about the origin of good counsel?", "options": [{"text": "Good counsel is a product of a prince's vast experience and extensive historical knowledge.", "isCorrect": false, "rationale": "While experience and knowledge are beneficial, the text focuses on the prince's inherent wisdom as the source of good counsel."}, {"text": "Good counsel primarily stems from the collective wisdom and expertise of a diverse advisory board.", "isCorrect": false, "rationale": "The text concludes the opposite, stating 'good counsels, whencesoever they come, are born of the wisdom of the prince, and not the wisdom of the prince from good counsels.'"}, {"text": "Good counsel is ultimately born from the prince's own wisdom and ability to discern and use advice effectively.", "isCorrect": true, "rationale": "This is the direct quote and central axiom from the final paragraph: 'Therefore it must be inferred that good counsels, whencesoever they come, are born of the wisdom of the prince, and not the wisdom of the prince from good counsels.'"}, {"text": "Good counsel arises from the loyalty and selflessness of devoted subjects who prioritize the state above personal gain.", "isCorrect": false, "rationale": "Machiavelli takes a cynical view, stating 'men will always prove untrue to you unless they are kept honest by constraint,' suggesting selflessness is not the natural source of honesty."}], "id": "q10"}, {"question": "Machiavelli argues that a prince must 'discourage every one from offering advice unless he asks it.' Why does unsolicited advice pose a political danger beyond merely being annoying or distracting?", "options": [{"text": "Unsolicited advice is usually wrong and would lead the prince to make errors.", "isCorrect": false, "rationale": "The problem is not the quality of unsolicited advice per se but what permitting it signals and does to the prince's authority."}, {"text": "When advisors offer unsolicited opinions freely, the prince's decisions appear conditional and reversible, his authority dissolves into negotiation, and he becomes a figure of contempt rather than command.", "isCorrect": true, "rationale": "By allowing anyone to speak freely at any time, the prince signals that his decisions are open to revision by whoever speaks boldly enough. This transforms authority into a continuous negotiation, which is exactly the condition Machiavelli identifies as producing contempt—the second of the two fatal errors."}, {"text": "Unsolicited advice encourages advisors to form factions, threatening internal stability.", "isCorrect": false, "rationale": "While factionalism is a separate concern, the specific danger of unsolicited advice described here is the erosion of the prince's authority through the appearance of decision-making by committee."}, {"text": "Advisors who give unsolicited advice are automatically flatterers seeking favor.", "isCorrect": false, "rationale": "Machiavelli does not classify all unsolicited advice as flattery. His concern is about the structural effect on authority, regardless of whether the unsolicited advisor is a flatterer or an honest critic."}], "id": "q11"}, {"question": "Machiavelli's axiom that 'good counsels are born of the prince's wisdom, not the wisdom of the prince from good counsels' places ultimate responsibility for governance on the prince personally. What does this imply about attempts to reform a government by improving the quality of its advisors without also improving the ruler?", "options": [{"text": "Better advisors will always improve governance, since they provide the information the ruler needs.", "isCorrect": false, "rationale": "Machiavelli explicitly refutes this: an unwise prince cannot properly assess, weigh, or act on even the best advice. The bottleneck is the ruler's judgment, not the supply of good counsel."}, {"text": "Improving advisors without improving the ruler's judgment will not reliably improve governance, because the ruler cannot distinguish good advice from bad, leading to the same systematic errors despite better input.", "isCorrect": true, "rationale": "Machiavelli's axiom identifies the causal direction: wisdom flows from the prince outward, structuring what kind of counsel can be received and used. A foolish prince surrounded by excellent advisors will not know how to assess competing recommendations or decide when to override them—and may even drive the honest advisors away."}, {"text": "Governance can be fully outsourced to skilled advisors, making the ruler's personal wisdom irrelevant as long as he defers to them.", "isCorrect": false, "rationale": "Machiavelli explicitly warns against yielding affairs entirely to one person, noting that a prince who does this will be taken over. Outsourcing wisdom is not a stable solution."}, {"text": "The ruler's wisdom is fixed and cannot be developed, so governance reform must focus entirely on advisor selection.", "isCorrect": false, "rationale": "While the axiom places responsibility on the prince, Machiavelli's broader work implies that princes can develop judgment through study, experience, and good counseling structures—the axiom is not a claim that wisdom is innate and fixed."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
