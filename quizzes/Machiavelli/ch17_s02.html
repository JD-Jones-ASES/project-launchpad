<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the initial step in his method when discussing qualities like liberality and parsimony?", "options": [{"text": "Immediately proposing a counter-intuitive solution to challenge moral intuitions.", "isCorrect": false, "rationale": "Machiavelli first states the conventional wisdom, then reveals the trap, and only then proposes his counter-intuitive solution. He doesn't start with the solution."}, {"text": "Stating the conventional wisdom about the quality, such as a prince should be generous.", "isCorrect": true, "rationale": "The text states: 'First, Machiavelli states the conventional wisdom: of course a prince should be generous.' This is the explicit first step of his recurring argument pattern."}, {"text": "Analyzing historical examples of successful and failed applications of the quality.", "isCorrect": false, "rationale": "While Machiavelli uses historical examples, they typically come after he has laid out the core argument, serving as illustrations rather than the initial step in his structured argument pattern."}, {"text": "Defining the 'effectual truth' of the quality based on empirical observation.", "isCorrect": false, "rationale": "Machiavelli announces his pursuit of 'effectual truth' in Chapter XV as a guiding principle, but the specific 'first step' in the argument's structure for each quality is stating conventional wisdom."}]}, {"question": "What is the primary 'trap concealed in the conventional wisdom' of generosity for a prince, according to Machiavelli?", "options": [{"text": "Generosity alienates foreign allies who perceive it as weakness.", "isCorrect": false, "rationale": "The text focuses on internal consequences: depletion of resources leading to oppression and hatred, not primarily on how foreign allies perceive it."}, {"text": "A genuinely generous prince will inevitably deplete his treasury, forcing him to oppress his subjects or abandon his generosity, leading to hatred and loss of reputation.", "isCorrect": true, "rationale": "The text explicitly states this sequence: 'As his treasury depletes, he has three options: raise taxes, seize property... or curtail his generosity. The first two options make him hated. The third option strips away the very quality for which he was praised. He is now both hated and stingy.'"}, {"text": "Subjects will become dependent on handouts, decreasing their self-reliance and productivity.", "isCorrect": false, "rationale": "This consequence is not mentioned in the provided text as the 'trap.' The focus is on the prince's resources and reputation."}, {"text": "Generosity encourages other rulers to demand similar benefits, leading to unsustainable international obligations.", "isCorrect": false, "rationale": "The text discusses internal financial and reputational dilemmas for the prince, not international demands as the core trap."}]}, {"question": "Machiavelli states that a prince who is 'miserly' (parsimonious) can eventually achieve what looks like a virtue. What is this 'virtue' and how does it manifest?", "options": [{"text": "A reputation for extreme wealth, allowing him to live lavishly without criticism.", "isCorrect": false, "rationale": "The text emphasizes practical benefits for the state and subjects, not merely a reputation for personal wealth or lavish living."}, {"text": "The ability to fund wars of conquest without depleting his own personal resources.", "isCorrect": false, "rationale": "While parsimony helps maintain resources, the specific 'virtue' mentioned is related to the state's internal financial health and the well-being of its subjects."}, {"text": "Fiscal security and low taxation for his subjects, enabling him to be genuinely generous on truly significant occasions.", "isCorrect": true, "rationale": "The 'keyconcept' box directly states: 'The “miserly” prince who husbands his resources carefully can reduce taxes, defend the state effectively, and be genuinely generous on the occasions when it actually matters... What looks like a vice (parsimony) produces what looks like a virtue (fiscal security and low taxation).'"}, {"text": "A strong alliance with other 'miserly' rulers, creating a powerful economic bloc.", "isCorrect": false, "rationale": "The text focuses on the internal benefits for the prince and his state, not external alliances based on shared fiscal policy."}]}, {"question": "In the context of reputation versus reality, Machiavelli suggests that a prince is better off being thought 'miserly' under what specific condition?", "options": [{"text": "If being thought miserly guarantees a larger personal fortune for the prince.", "isCorrect": false, "rationale": "Machiavelli's advice is for the state's stability and the prince's political success, not personal wealth accumulation as the primary goal."}, {"text": "If the alternative is being thought generous while actually being oppressive to his subjects.", "isCorrect": true, "rationale": "The text explicitly states: 'A prince is better off being thought miserly if the alternative is being thought generous while actually being oppressive.'"}, {"text": "If a reputation for miserliness deters neighboring states from attacking.", "isCorrect": false, "rationale": "While fiscal strength can deter enemies, the specific condition mentioned by Machiavelli for preferring a 'miserly' reputation relates to the direct consequences of a 'generous' reputation combined with oppression."}, {"text": "If his subjects are independently wealthy and do not require state assistance.", "isCorrect": false, "rationale": "The condition Machiavelli describes is about the prince's actions and their impact on his subjects (oppression), not the pre-existing wealth of the subjects."}]}, {"question": "Pope Julius II's use of generosity to achieve the papacy, followed by parsimonious governance, illustrates which key Machiavellian concept?", "options": [{"text": "That all forms of generosity are ultimately self-defeating and should be avoided.", "isCorrect": false, "rationale": "Machiavelli distinguishes between types of generosity; Julius II's initial generosity was effective for a specific purpose, showing that it's not universally 'self-defeating' if applied strategically."}, {"text": "The importance of consistently maintaining a single, virtuous reputation throughout a ruler's tenure.", "isCorrect": false, "rationale": "Julius II's actions contradict this, showing a shift in strategy and reputation as appropriate for changing circumstances."}, {"text": "Generosity and parsimony are tools to be employed based on circumstance and necessity, not rigid moral principles.", "isCorrect": true, "rationale": "The text states: 'The initial generosity served a specific purpose—winning the election—and was abandoned once the goal was achieved. This is not hypocrisy in Machiavelli's framework; it is good judgment. Generosity was the right tool for that moment; parsimony was the right tool for the next.'"}, {"text": "That hypocrisy is a necessary evil for any successful political leader.", "isCorrect": false, "rationale": "Machiavelli explicitly reframes this as 'good judgment' and strategic use of tools, not hypocrisy."}]}, {"question": "The generosity attributed to figures like Moses, Cyrus, Romulus, and Scipio is presented as sustainable because:", "options": [{"text": "It was primarily aimed at spiritual rewards rather than material gains.", "isCorrect": false, "rationale": "The text focuses on the material source of their generosity, not its spiritual aims."}, {"text": "It involved distributing wealth acquired through conquest from enemies, thereby costing the prince nothing.", "isCorrect": true, "rationale": "The text states: 'A prince who gives away what he has seized from his enemies is not depleting his own resources; he is circulating the resources of others. This form of “generosity” is sustainable because it costs the prince nothing and benefits his soldiers.'"}, {"text": "These leaders were inherently more charismatic and could inspire loyalty without material rewards.", "isCorrect": false, "rationale": "While charisma is important, the text specifically attributes the sustainability to the source of the wealth distributed."}, {"text": "Their generosity was always limited to their inner circle of advisors and never extended to the general populace.", "isCorrect": false, "rationale": "The text doesn't specify the scope of their generosity in this way, but rather its source."}]}, {"question": "This chapter establishes a 'logical template' for subsequent chapters on other virtues and vices. What is the overarching principle illustrated by this template?", "options": [{"text": "That moral virtues, when applied rigidly, are always detrimental to a ruler's success.", "isCorrect": false, "rationale": "Machiavelli argues that moral categories are less stable and that actions should be guided by circumstance, not that virtues are always detrimental."}, {"text": "Rulers must choose between a consistently virtuous path or a consistently vicious one.", "isCorrect": false, "rationale": "The template demonstrates that rulers must navigate between perceived virtues and vices, using them as tools, rather than committing to one path."}, {"text": "Political rulers must navigate between conventional moral opposites, guided by circumstance and necessity rather than fixed moral principle.", "isCorrect": true, "rationale": "The text explicitly states: 'Machiavelli will take a pair of conventional opposites (virtue and vice), argue that the moral categories are less stable than they appear, and show that the political ruler must navigate between them guided not by moral principle but by circumstance and necessity.'"}, {"text": "The importance of always appearing virtuous, regardless of a ruler's actual actions.", "isCorrect": false, "rationale": "While reputation matters, the template emphasizes the practical outcomes and strategic choice between 'virtues' and 'vices' based on context, not mere appearances."}]}, {"question": "How does Machiavelli's analysis of the 'trap of generosity' relate to what modern economists call 'unsustainable fiscal policy'?", "options": [{"text": "Both highlight how excessive spending without sufficient revenue eventually leads to financial distress and negative consequences.", "isCorrect": true, "rationale": "The 'note' section states: 'Politicians who promise large benefits and low taxes face exactly the dilemma Machiavelli describes... When the bills come due, the “generous” ruler must either become oppressive (raising taxes or cutting services) or simply run out of resources. Machiavelli's analysis... is, in structural terms, a remarkably early statement of what later economists would call the problem of “unsustainable fiscal policy.”'"}, {"text": "Both argue that low taxation is always the best policy for long-term economic stability.", "isCorrect": false, "rationale": "Machiavelli emphasizes balanced fiscal management that allows for low taxes, but the core connection to unsustainable fiscal policy is about the consequences of *excessive* spending without revenue, not just advocating low taxes."}, {"text": "Both suggest that accumulating vast personal wealth is crucial for a leader's political survival.", "isCorrect": false, "rationale": "The focus is on state resources and fiscal policy, not a leader's personal wealth."}, {"text": "Both emphasize the need for international loans to maintain a reputation for generosity.", "isCorrect": false, "rationale": "The connection is about the internal cycle of depletion and extraction, not specifically international borrowing as the primary parallel."}]}, {"question": "Machiavelli's pedagogical intent in structuring his arguments with 'conventional wisdom' followed by a 'trap' and 'counter-intuitive solution' is primarily to:", "options": [{"text": "Confound his readers with complex paradoxes to demonstrate his intellectual superiority.", "isCorrect": false, "rationale": "The text states his purpose is 'pedagogically deliberate' to train readers, not to boast intellectual superiority."}, {"text": "Reinforce existing moral intuitions about leadership qualities.", "isCorrect": false, "rationale": "The text explicitly states the opposite: 'he is training readers to think past their initial moral intuitions.'"}, {"text": "Train readers to think past their initial moral intuitions about political virtues and vices.", "isCorrect": true, "rationale": "The text explicitly states: 'The pattern is pedagogically deliberate: he is training readers to think past their initial moral intuitions.'"}, {"text": "Encourage readers to always choose the counter-intuitive solution, regardless of the situation.", "isCorrect": false, "rationale": "Machiavelli advocates for context-dependent judgment and necessity, not a blanket adoption of 'counter-intuitive' solutions."}]}, {"question": "Considering the Machiavellian distinction between 'reputation' and 'reality' in this chapter, which statement best summarizes his view?", "options": [{"text": "Reality is always irrelevant; only a good reputation matters for a prince.", "isCorrect": false, "rationale": "The text states 'appearances often matter more than reality,' but then immediately qualifies it by saying 'But reputation for the wrong quality, purchased at enormous cost, is worse than no reputation at all.' Reality ultimately underpins sustainable reputation."}, {"text": "A reputation for generosity is always superior to a reputation for parsimony, regardless of actual outcomes.", "isCorrect": false, "rationale": "This contradicts the core argument that a generous reputation leading to oppression is worse than a 'miserly' one leading to effective governance."}, {"text": "While reputation is important, a reputation for a quality that leads to negative real-world outcomes (like oppression from generosity) is ultimately worse than a less flattering reputation tied to positive realities (like fiscal security from parsimony).", "isCorrect": true, "rationale": "The text explains: 'Reputation matters enormously... But reputation for the wrong quality, purchased at enormous cost, is worse than no reputation at all. A prince is better off being thought miserly if the alternative is being thought generous while actually being oppressive.' This directly supports the idea that reality grounds a sustainable and beneficial reputation."}, {"text": "The prince should strive to achieve a reputation that perfectly aligns with conventional moral virtues.", "isCorrect": false, "rationale": "Machiavelli challenges conventional moral virtues, arguing they can be traps, and prioritizes 'effectual truth' and practical outcomes over perfect alignment with conventional morality."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
