<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the most significant distinguishing characteristic of ecclesiastical principalities compared to all other forms of states?", "options": [{"text": "They are typically acquired through the greatest displays of military might.", "isCorrect": false, "rationale": "While military force was used in their consolidation, Machiavelli notes that the acquisition can be by ability or fortune, but their maintenance is what truly sets them apart from other states."}, {"text": "Their rulers must demonstrate exceptional ability and foresight to maintain power.", "isCorrect": false, "rationale": "Machiavelli explicitly states that ecclesiastical principalities 'are maintained without either' ability or fortune, making this option incorrect."}, {"text": "They are sustained by ancient religious ordinances, regardless of the prince's conduct.", "isCorrect": true, "rationale": "This is Machiavelli's core argument: ecclesiastical principalities are 'sustained by the ancient ordinances of religion' and 'may be held no matter how their princes behave and live,' an exception to all his other rules."}, {"text": "They are the only states that truly achieve popular support through legitimate means.", "isCorrect": false, "rationale": "While they achieve a distinct form of legitimacy, Machiavelli doesn't claim they are the 'only' ones, nor is 'popular support' in the conventional sense the primary mechanism compared to the reverence for the institution."}], "id": "q01"}, {"question": "When Machiavelli states it would be 'presumptuous and rash' to analyze how God upholds ecclesiastical principalities, what is the most accurate interpretation of his underlying message?", "options": [{"text": "He genuinely believes these states are divinely ordained and beyond human political analysis.", "isCorrect": false, "rationale": "The text clarifies that 'Machiavelli never stops analyzing anything' and his 'sudden reticence is itself a form of commentary,' implying an ironic rather than literal belief."}, {"text": "He is using irony to subtly suggest that religious claims mask purely political power dynamics.", "isCorrect": true, "rationale": "His 'understated but unmistakable' conclusion and ironic tone indicate he is making a commentary on how religious authority functions politically, rather than accepting a divine explanation at face value for a political treatise."}, {"text": "He is demonstrating respect for the religious beliefs of his contemporaries.", "isCorrect": false, "rationale": "While he avoids being anti-religious, his primary intent here is analytical and ironic, not simply an act of deference."}, {"text": "He lacks sufficient historical data to conduct a thorough analysis of such states.", "isCorrect": false, "rationale": "Machiavelli immediately 'plunges into their actual history' after his ironic statement, showing he has ample historical context for analysis."}], "id": "q02"}, {"question": "How does Machiavelli assert that ecclesiastical principalities are *maintained*, once acquired?", "options": [{"text": "Through the constant application of the prince's military prowess and strategic acumen.", "isCorrect": false, "rationale": "Machiavelli explicitly states they are 'maintained without either' ability or fortune, which would include military prowess and acumen for maintenance."}, {"text": "By securing the unwavering financial support of wealthy patrons and foreign allies.", "isCorrect": false, "rationale": "This is not identified as the primary or unique mechanism for their maintenance; the text emphasizes religious ordinances."}, {"text": "By relying on the ancient ordinances of religion, which possess an all-powerful sustaining quality.", "isCorrect": true, "rationale": "The text directly states these principalities are 'sustained by the ancient ordinances of religion, which are so all-powerful' that they hold regardless of the prince's behavior."}, {"text": "Through the systematic elimination of political rivals and the enforcement of strict loyalty oaths.", "isCorrect": false, "rationale": "These methods were used for *acquiring* and *consolidating* the Papal States (e.g., by Cesare Borgia), but Machiavelli's point is that maintenance for ecclesiastical principalities is distinct and requires less active effort from the ruler."}], "id": "q03"}, {"question": "Machiavelli's discussion of ecclesiastical principalities most significantly challenges which aspect of his own established framework for other types of states?", "options": [{"text": "The idea that all principalities eventually face external threats.", "isCorrect": false, "rationale": "External threats are a universal challenge, and the Papal States certainly faced them; this is not the core challenge to his framework."}, {"text": "The necessity for a prince to have both fortune and ability to acquire a state.", "isCorrect": false, "rationale": "Machiavelli grants that ecclesiastical principalities 'are acquired either by ability or fortune,' so this aspect of his framework holds for their acquisition."}, {"text": "The principle that a state's stability is directly tied to the performance and character of its ruler.", "isCorrect": true, "rationale": "This is the central contradiction: Machiavelli states these principalities 'may be held no matter how their princes behave and live,' directly undermining the usual link between ruler performance and state stability."}, {"text": "The classification of states into hereditary, mixed, new, and civil principalities.", "isCorrect": false, "rationale": "The ecclesiastical principality is simply presented as a *fifth* and exceptional category within his broader classification, not a challenge to the validity of the other categories themselves."}], "id": "q04"}, {"question": "What was the primary impact of Pope Alexander VI, through his son Cesare Borgia, on the Papal States, according to Machiavelli?", "options": [{"text": "They established the Papal States as a spiritual rather than a political entity.", "isCorrect": false, "rationale": "They did the opposite, consolidating the Papal States as a political and military power through force and cunning."}, {"text": "They dramatically expanded and unified the Papal States through military force and political cunning.", "isCorrect": true, "rationale": "The text states Cesare Borgia 'used his son Cesare Borgia...to expand and consolidate the Papal States by force, cunning, and outright treachery,' transforming them 'from a collection of loosely controlled territories to a unified, well-defended state.'"}, {"text": "They implemented widespread religious reforms that strengthened the Church's moral authority.", "isCorrect": false, "rationale": "The focus of Machiavelli's analysis is on their political and military actions, not on religious or moral reforms."}, {"text": "They negotiated a lasting peace treaty with Venice, securing the Papal States' borders.", "isCorrect": false, "rationale": "Julius II later moved *against* Venice; Borgia's actions were primarily focused on internal consolidation and expansion within central Italy."}], "id": "q05"}, {"question": "How did Pope Julius II build upon the foundations laid by Alexander VI and Cesare Borgia to further strengthen the Papal States?", "options": [{"text": "By withdrawing papal authority from secular affairs to focus solely on spiritual leadership.", "isCorrect": false, "rationale": "Julius II, known as the 'Warrior Pope,' actively engaged in secular and military affairs, personally leading armies."}, {"text": "By expanding papal territory through diplomatic marriages and treaties with foreign powers.", "isCorrect": false, "rationale": "Julius II expanded territory by moving 'against Venice, against France,' implying military action rather than solely diplomatic means."}, {"text": "By consolidating internal power and actively leading military campaigns against external threats.", "isCorrect": true, "rationale": "Julius II 'inherited the gains of Alexander and Cesare and enlarged them further,' personally leading armies 'against Venice, against France, and against every power that threatened papal territory.'"}, {"text": "By commissioning great works of art and architecture, enhancing the cultural prestige of the Papacy.", "isCorrect": false, "rationale": "While he did commission art (Sistine Chapel, St. Peter's Basilica), the text emphasizes his military and political actions as the means by which he strengthened the Papal States in terms of power."}], "id": "q06"}, {"question": "Machiavelli's description of Julius II as the 'Warrior Pope' who led armies into the field primarily serves to illustrate which of the following?", "options": [{"text": "The moral decline of the Papacy during the Renaissance era.", "isCorrect": false, "rationale": "Machiavelli is conducting a political analysis, not making a moral judgment on the Papacy's actions."}, {"text": "The unique nature of religious authority being able to command military forces without popular consent.", "isCorrect": false, "rationale": "While partially true, the text highlights that his campaigns showed the Church could project 'real political and military power,' emphasizing the *nature* of the power rather than its origin."}, {"text": "That the Church could project significant political and military power, not merely spiritual authority.", "isCorrect": true, "rationale": "The text explicitly states: 'Julius's military campaigns showed that the Church could project real political and military power, not merely spiritual authority.'"}, {"text": "The importance of a prince being a religious leader to effectively command armies.", "isCorrect": false, "rationale": "It demonstrates a religious leader *could* command armies effectively, but doesn't generalize this as a universal requirement for effective military command."}], "id": "q07"}, {"question": "What is Machiavelli's primary analytical approach to religion in the context of ecclesiastical principalities?", "options": [{"text": "To condemn the Church for its pursuit of temporal power and political corruption.", "isCorrect": false, "rationale": "The text states: 'He is not attacking the Church as an institution, nor is he denying that religious belief is genuine.'"}, {"text": "To advocate for a complete separation of church and state in all forms of governance.", "isCorrect": false, "rationale": "Machiavelli is observing and analyzing the existing political realities, not advocating for a specific governmental structure."}, {"text": "To analyze religion as a political phenomenon that provides legitimacy, authority, and allegiance.", "isCorrect": true, "rationale": "The text states: 'What he is doing is analyzing religion as a political phenomenon—a source of legitimacy, authority, and popular allegiance that operates according to its own logic.'"}, {"text": "To argue that genuine religious belief is inherently incompatible with effective political leadership.", "isCorrect": false, "rationale": "The text clarifies: 'nor is he denying that religious belief is genuine.'"}], "id": "q08"}, {"question": "According to Machiavelli, what makes the legitimacy derived from religious authority particularly 'extraordinary and enviable' for secular princes?", "options": [{"text": "It ensures a ruler's moral uprightness and divine favor.", "isCorrect": false, "rationale": "Machiavelli notes that a pope 'could be incompetent, corrupt, or absent' and the state would still hold, indicating moral uprightness isn't a prerequisite for maintenance."}, {"text": "It allows a prince to rule without needing military force or popular support.", "isCorrect": false, "rationale": "Military force was used for acquisition and consolidation, and while popular support in the conventional sense is replaced, it's the *nature* of obedience that is key, not the complete absence of force."}, {"text": "It ensures that the people's obedience is rooted in reverence for the institution, independent of the prince's performance.", "isCorrect": true, "rationale": "The text states: 'The people's obedience is not conditional on his performance in office; it is rooted in their reverence for the institution he represents.'"}, {"text": "It guarantees that the state will never face internal rebellion or external invasion.", "isCorrect": false, "rationale": "The text describes active military campaigns by popes against external threats, showing that such states are not immune to challenges."}], "id": "q09"}, {"question": "Machiavelli's analysis of ecclesiastical principalities, especially his treatment of Julius II, anticipates later political thinkers who study what concept?", "options": [{"text": "The historical development of international law.", "isCorrect": false, "rationale": "While related to state interactions, international law is not the specific concept highlighted as being anticipated by Machiavelli's analysis of religion's role in power."}, {"text": "How rulers utilize religious symbolism and institutions to legitimize their authority.", "isCorrect": true, "rationale": "The 'note' section explicitly states his analysis 'anticipates later thinkers who study how rulers use religious symbolism, ceremonies, and institutions to legitimize their authority—what political scientists call 'civil religion' or the 'sacred canopy' of the state.'"}, {"text": "The economic benefits of a centralized religious authority.", "isCorrect": false, "rationale": "Machiavelli's focus in this chapter is on political power, legitimacy, and military strength, not economic benefits."}, {"text": "The theological arguments for papal infallibility.", "isCorrect": false, "rationale": "Machiavelli's approach is one of political analysis, not theological debate or justification."}], "id": "q10"}, {"question": "The chapter describes Machiavelli's sudden reticence about analyzing ecclesiastical principalities as 'itself a form of commentary.' What specific political point does this ironic rhetorical move make?", "options": [{"text": "By pretending the Church is beyond analysis, Machiavelli signals that its power rests on a foundation — religious belief — that his usual tools of political analysis cannot touch or advise secular princes to replicate", "isCorrect": true, "rationale": "The irony is precise: Machiavelli always analyzes power, so when he stops, he is highlighting that religious authority operates on a different plane. His very silence implies that no secular prince can follow the same playbook — you cannot manufacture 'ancient ordinances of religion.'"}, {"text": "His reticence proves that he secretly supports the Church's claim to divine authority and believes it should not be questioned", "isCorrect": false, "rationale": "The text explicitly states his tone 'drips with irony' and his reticence is 'a form of commentary,' not genuine religious deference."}, {"text": "He stops analyzing to protect himself from Church censorship, demonstrating the political danger of criticizing the papacy", "isCorrect": false, "rationale": "While censorship was a real concern in Machiavelli's era, the text interprets his move as analytical and ironic commentary, not simply self-censorship from fear."}, {"text": "The reticence signals that he has run out of relevant historical examples to draw on", "isCorrect": false, "rationale": "Machiavelli immediately launches into detailed historical analysis of Alexander VI and Julius II, demonstrating he has ample material — the reticence was not a product of ignorance."}], "id": "q11"}, {"question": "Machiavelli treats religion as a 'political phenomenon' providing legitimacy that 'operates according to its own logic.' What practical lesson does this observation contain for secular princes who study The Prince?", "options": [{"text": "Understanding how religious legitimacy works allows secular princes to identify when their own subjects' loyalty may be conditional and what creates unconditional loyalty", "isCorrect": true, "rationale": "The contrast between religious legitimacy (unconditional, rooted in reverence for an institution) and secular legitimacy (conditional on performance and popular goodwill) teaches secular princes precisely where their own foundations are weaker — and what they must do to compensate for not having institutional reverence on their side."}, {"text": "Secular princes should convert their states to theocracies to obtain the same unconditional loyalty", "isCorrect": false, "rationale": "Machiavelli treats ecclesiastical principalities as a unique and unreplicable category; he does not suggest secular princes can or should convert their states into theocracies."}, {"text": "The lesson is that secular governance is inherently inferior to religious governance and should be avoided", "isCorrect": false, "rationale": "The entire rest of The Prince is addressed to secular princes about how to govern effectively; Machiavelli does not conclude that secular governance is inferior and should be abandoned."}, {"text": "Religion should be suppressed by secular princes to prevent a rival source of legitimacy from threatening their authority", "isCorrect": false, "rationale": "Machiavelli does not advise suppressing religion; he describes its political function with admiration and treats it as a source of insight, not a threat to be eliminated."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
