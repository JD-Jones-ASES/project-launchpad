<script>
var QUESTIONS = [{"question": "What historical event initially puzzled Machiavelli's audience and served as a launching pad for his structural insights?", "options": [{"text": "The sudden collapse of the Roman Empire.", "isCorrect": false, "rationale": "The text does not mention the collapse of the Roman Empire as Machiavelli's initial puzzle for this discussion."}, {"text": "The quiet submission of Persia after Alexander's successors began fighting among themselves.", "isCorrect": true, "rationale": "The section explicitly states that the chapter 'opens with a question... why did Persia remain quiet and obedient after Alexander the Great's successors began fighting among themselves?' This is presented as the historical puzzle."}, {"text": "The difficulty encountered by conquerors in holding decentralized states like France.", "isCorrect": false, "rationale": "While a key part of Machiavelli's analysis, this is a conclusion drawn from his models, not the initial historical puzzle that prompted his inquiry."}, {"text": "The unification of Italy under a single strong ruler.", "isCorrect": false, "rationale": "The text does not discuss the unification of Italy in this context as Machiavelli's historical puzzle."}]}, {"question": "According to the text, what is Machiavelli's most important structural insight derived from the 'historical puzzle'?", "options": [{"text": "That hereditary nobles are always disloyal to their supreme ruler.", "isCorrect": false, "rationale": "While some nobles might be disloyal in decentralized states, Machiavelli's insight is broader and focuses on state structure, not a universal characteristic of nobility."}, {"text": "That the organization of a state dictates both its conquerability and the ease of holding it afterward.", "isCorrect": true, "rationale": "The text states, 'Machiavelli uses this historical puzzle as a launching pad for one of his most important structural insights: the organization of a state determines both how hard it is to conquer and how easy or hard it is to hold after conquest.'"}, {"text": "That military strength is the sole determinant of a state's resilience.", "isCorrect": false, "rationale": "Machiavelli's analysis emphasizes internal structure as a crucial factor, not just military strength in isolation."}, {"text": "That geographical barriers are the primary factor in resisting invasion.", "isCorrect": false, "rationale": "The text focuses on political and social structure, not geographical factors, as the primary determinant for conquest and occupation."}]}, {"question": "Which of the following best describes Machiavelli's 'centralized' model of government?", "options": [{"text": "A system where power is distributed among numerous independent hereditary nobles.", "isCorrect": false, "rationale": "This description matches the 'decentralized' model, not the centralized one, where nobles have independent power."}, {"text": "A state ruled by a supreme leader through appointed officials who lack independent power bases.", "isCorrect": true, "rationale": "The text defines the centralized ('Turkish') model as having 'One supreme ruler governs through appointed servants, officials, and ministers who owe their positions entirely to the ruler's favor. There are no independent hereditary nobles.'"}, {"text": "A confederation of semi-independent city-states united under a ceremonial monarch.", "isCorrect": false, "rationale": "This model is not described in the text as either of Machiavelli's primary examples."}, {"text": "A government where the ruler's authority is primarily derived from ancient customary laws and traditions, limiting their power.", "isCorrect": false, "rationale": "In a centralized state, power flows from the top down, with the supreme ruler's will being paramount, not limited by ancient customs."}]}, {"question": "In Machiavelli's 'decentralized' model, exemplified by France, what is a key feature of the intermediary powers?", "options": [{"text": "They are appointed by the ruler and serve purely at his pleasure.", "isCorrect": false, "rationale": "This describes the appointed servants in a centralized state, not the hereditary barons of a decentralized one."}, {"text": "They possess their own ancient rights, armed retainers, and local loyalties, making them semi-independent.", "isCorrect": true, "rationale": "The text states that in the decentralized ('French') model, 'The king rules through a layer of hereditary barons, lords, and nobles who have their own ancient rights, their own armed retainers, and their own local loyalties. These intermediary powers are semi-independent.'"}, {"text": "They form a unified, loyal front against any external invader.", "isCorrect": false, "rationale": "The text notes that in a decentralized state, a conqueror can 'find one discontented baron willing to open his gates,' indicating a lack of unified loyalty."}, {"text": "Their positions are entirely dependent on their military success against rival factions.", "isCorrect": false, "rationale": "While military might is important, their power is rooted in 'ancient rights' and hereditary status, not solely ongoing military success against rivals."}]}, {"question": "Based on Machiavelli's analysis, what is the primary challenge and subsequent outcome for a conqueror of a centralized state like Persia?", "options": [{"text": "Initial easy conquest due to internal disunity, followed by persistent long-term resistance.", "isCorrect": false, "rationale": "This describes the pattern for a decentralized state, not a centralized one, which resists invasion as a unified whole."}, {"text": "Extremely difficult initial conquest requiring defeat of the ruler, but then relatively easy long-term occupation.", "isCorrect": true, "rationale": "The text states for a centralized state: 'To conquer it, you must defeat the ruler directly and completely... But once the ruler falls, so does everything... The new conqueror simply steps into the old ruler's position.'"}, {"text": "The need to bribe numerous independent nobles to secure entry, leading to a stable new regime.", "isCorrect": false, "rationale": "Centralized states have 'no independent hereditary nobles with their own loyal subjects' to bribe."}, {"text": "Continuous internal rebellions and challenges from regional leaders even after the ruler is defeated.", "isCorrect": false, "rationale": "In a centralized state, 'the conquered population has no natural leaders for resistance,' making subsequent occupation easier."}]}, {"question": "Why is holding a decentralized state, such as France, considered 'a nightmare' for a conqueror according to Machiavelli?", "options": [{"text": "Because the centralized authority of the king is too strong to be easily overthrown.", "isCorrect": false, "rationale": "The text indicates that the French king's authority is 'tangle of overlapping authorities' and he 'cannot easily override' the hereditary barons."}, {"text": "Because even if one baron betrays the kingdom, many other semi-independent power centers remain to resist the new rule.", "isCorrect": true, "rationale": "The text explains: 'But holding France after conquest is a nightmare. Every baron who was not involved in the betrayal still has his castle, his retainers, and his local loyalty... The conqueror who has won through one man's treachery now faces a hundred other centers of resistance.'"}, {"text": "Because the population is accustomed to absolute obedience and will therefore rally against any new master.", "isCorrect": false, "rationale": "This describes the behavior of a population in a centralized state; in a decentralized state, local loyalties are strong."}, {"text": "Because the conqueror would struggle to find any local leaders willing to collaborate.", "isCorrect": false, "rationale": "The text suggests finding *one* discontented baron is easy, providing a beachhead, but the issue is the multitude of *others* who remain loyal to their own lords."}]}, {"question": "How does the historical context of Alexander's conquest of Persia specifically illustrate Machiavelli's structural analysis?", "options": [{"text": "It shows that even a centralized state can resist occupation for generations if its people remain loyal.", "isCorrect": false, "rationale": "The text explicitly states that 'the empire did not rebel' and Persian territories were ruled for generations 'with little organized native resistance,' indicating submission, not resistance."}, {"text": "It demonstrates that Persia, as a centralized state, was hard to conquer initially but easy to hold once Darius fell.", "isCorrect": true, "rationale": "The text notes the 'speed of the conquest astonished the ancient world' but also confirms 'the empire did not rebel' and the Macedonian successors ruled 'with little organized native resistance,' fitting the 'hard to conquer, easy to hold' model for centralized states."}, {"text": "It highlights the importance of bribing local nobles to achieve a quick conquest.", "isCorrect": false, "rationale": "Persia, being a centralized state, had no independent nobles to bribe; its nobility submitted when Darius fell."}, {"text": "It proves that military strength alone, regardless of state structure, determines the outcome of conquest.", "isCorrect": false, "rationale": "The entire section argues that state structure is a crucial determinant, not just military strength."}]}, {"question": "Imagine a modern state structured similarly to Machiavelli's 'decentralized' model, with powerful regional governors who inherited their positions and control significant local resources and militias. A foreign power invades and quickly secures the capital by negotiating with one discontented governor. What outcome would Machiavelli predict for this invading power?", "options": [{"text": "The rapid and complete submission of the entire state, as all power flows from the capital.", "isCorrect": false, "rationale": "This outcome is characteristic of a centralized state, not a decentralized one where power is distributed."}, {"text": "A prolonged and difficult occupation due to widespread, localized resistance from other independent power centers.", "isCorrect": true, "rationale": "This scenario directly applies Machiavelli's analysis for decentralized states: easy to conquer (via one discontented baron/governor), but 'a nightmare' to hold because 'a hundred other centers of resistance' remain."}, {"text": "The immediate adoption of the new ruler by all regional governors, seeking new favor.", "isCorrect": false, "rationale": "In a decentralized state, regional powers have their own loyalties and independent strength, making immediate submission unlikely."}, {"text": "A smooth transition of power, as the population is accustomed to accepting whatever authority controls the capital.", "isCorrect": false, "rationale": "This assumes a centralized structure where the population's obedience transfers easily; in a decentralized state, local loyalties are paramount."}]}, {"question": "What is identified as Machiavelli's 'most enduring contribution to political thought' in this section?", "options": [{"text": "His detailed historical accounts of ancient conquests.", "isCorrect": false, "rationale": "While he uses historical examples, his contribution is the *analysis* and theoretical framework, not just the recounting of history."}, {"text": "His emphasis on the moral failings of hereditary rulers.", "isCorrect": false, "rationale": "This section focuses on state structure and its strategic implications, not moral critiques of rulers."}, {"text": "His structural analysis of how a state's internal organization influences its conquerability and stability after conquest.", "isCorrect": true, "rationale": "The text explicitly states: 'This structural analysis is one of Machiavelli's most enduring contributions to political thought. It has been applied to explain patterns of conquest and occupation across centuries.'"}, {"text": "His arguments for the necessity of a strong, unified military above all else.", "isCorrect": false, "rationale": "While important, a strong military is only one component; Machiavelli's enduring contribution highlighted here is the fundamental role of state *structure*."}]}, {"question": "Which contemporary empire (from Machiavelli's perspective) did he use as an example of a centralized state, characterized by a sultan ruling through appointed pashas?", "options": [{"text": "The Holy Roman Empire.", "isCorrect": false, "rationale": "The note explicitly states that the Holy Roman Empire stood 'in stark contrast' to the centralized Ottoman Empire, implying it was decentralized."}, {"text": "The French Kingdom.", "isCorrect": false, "rationale": "The French Kingdom is used as the prime example of a decentralized state in the text."}, {"text": "The Ottoman Empire.", "isCorrect": true, "rationale": "The 'note' section explicitly states: 'Machiavelli uses the Ottoman Empire (which he calls 'the Turk') as his contemporary example of a centralized state. The Ottoman sultan ruled through appointed pashas and administrators.'"}, {"text": "The Papal States.", "isCorrect": false, "rationale": "The Papal States are not mentioned in this section as an example of either model."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
