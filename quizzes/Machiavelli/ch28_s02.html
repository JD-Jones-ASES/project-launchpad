<script>
var QUESTIONS = [{"question": "What is the primary defining characteristic shared by Gaetano Mosca, Vilfredo Pareto, and Robert Michels, leading them to be known as the Italian school of political realism?", "options": [{"text": "Their shared belief in the inherent superiority of monarchical systems of government.", "isCorrect": false, "rationale": "The Italian Realist School studied various forms of government (democracies, oligarchies, monarchies) but did not advocate for one as inherently superior; their focus was on the underlying reality of power."}, {"text": "Their collective endorsement of direct democracy as the ideal form of governance.", "isCorrect": false, "rationale": "These thinkers were skeptical of democratic ideals, choosing instead to analyze how political power actually functions, rather than how it theoretically should."}, {"text": "Their commitment to studying politics as it actually works, concluding that power is always exercised by an organized minority.", "isCorrect": true, "rationale": "The text explicitly states their shared commitment to 'studying politics as it actually works' and their conclusion that 'power is always exercised by a small organized minority over a large disorganized majority.'"}, {"text": "Their advocacy for a return to Machiavelli's original recommendations for individual princes.", "isCorrect": false, "rationale": "While they are Machiavelli's intellectual descendants, they transformed his practical handbook for individual princes into a general, systematic theory of political power, moving beyond mere advocacy for his original recommendations."}], "id": "q01"}, {"question": "According to Gaetano Mosca, why does a small organized minority consistently govern over a large disorganized majority in any society, regardless of its formal constitution?", "options": [{"text": "The inherent moral superiority and intellectual wisdom of the minority group.", "isCorrect": false, "rationale": "Mosca explicitly states that his observation about power concentration 'is not a moral judgment about the majority or the minority' but an observation about how power functions."}, {"text": "The superior financial resources exclusively available to the minority elite.", "isCorrect": false, "rationale": "While financial resources can play a role, Mosca's primary explanation focuses on organizational capacity, not solely financial advantage."}, {"text": "The organizational advantage of small, coherent groups, which can coordinate more easily and effectively than larger, unorganized ones.", "isCorrect": true, "rationale": "Mosca's answer is explicitly 'organizational.' He argues that 'small groups can coordinate more easily than large ones' and that an organized minority will consistently defeat a disorganized majority."}, {"text": "The widespread apathy and lack of interest in politics among the majority population.", "isCorrect": false, "rationale": "Although apathy might contribute, Mosca's core argument emphasizes the inherent organizational dynamics of groups as the reason for minority rule."}], "id": "q02"}, {"question": "How does Gaetano Mosca's contribution to elite theory fundamentally differ from Machiavelli's original focus, despite their shared intellectual lineage?", "options": [{"text": "Mosca rejects Machiavelli's skepticism about claims of government representing the general will.", "isCorrect": false, "rationale": "The text states that 'Like Machiavelli, he is skeptical of claims that government represents the general will of the people.'"}, {"text": "Mosca provides a systematic theory about the structural inevitability of elite rule in any society, rather than a practical guide for individual princes.", "isCorrect": true, "rationale": "The text highlights this difference: 'Machiavelli wrote about individual princes; Mosca writes about the structural conditions that make elite rule inevitable in any society.'"}, {"text": "Mosca insists on beginning with political ideals, whereas Machiavelli began with observed political reality.", "isCorrect": false, "rationale": "Both Mosca and Machiavelli insist on beginning 'with observed political reality rather than political ideals.'"}, {"text": "Mosca believes that competition for political power can be abolished by constitutional arrangements, contrary to Machiavelli's view.", "isCorrect": false, "rationale": "Mosca, 'Like Machiavelli, he sees the competition for political power as a permanent feature of social life that cannot be abolished by constitutional arrangements.'"}], "id": "q03"}, {"question": "Vilfredo Pareto accepted Mosca's basic observation of elite rule but added a significant dynamic element to the theory. What is this element?", "options": [{"text": "The 'iron law of oligarchy,' which explains elite formation in democratic organizations.", "isCorrect": false, "rationale": "The 'iron law of oligarchy' is a concept developed by Robert Michels, not Pareto."}, {"text": "The concept of the 'ruling class' as distinct from the 'political class'.", "isCorrect": false, "rationale": "The terms 'political class' or 'ruling class' are primarily associated with Gaetano Mosca."}, {"text": "The theory of the 'circulation of elites,' where ruling elites inevitably decay and are replaced by new ones in a continuous cycle.", "isCorrect": true, "rationale": "The text states Pareto 'adds a dynamic theory of how elites change over time' called the 'circulation of elites,' emphasizing that 'history is a 'graveyard of aristocracies'.'"}, {"text": "A focus on the moral justification for elite rule based on their intellectual superiority.", "isCorrect": false, "rationale": "Pareto, like other realists, focuses on the factual operation of power rather than moral justifications for elite rule."}], "id": "q04"}, {"question": "A nation's government, initially known for its shrewd diplomatic negotiations and ability to form complex international alliances, eventually faces internal unrest due to its perceived indecisiveness and reluctance to use strong measures. According to Pareto's theory, what type of elite would most likely emerge to displace the current one?", "options": [{"text": "A 'fox' elite, characterized by even greater cunning and adaptability to resolve the crisis through negotiation.", "isCorrect": false, "rationale": "The description of the initial government (shrewd, diplomatic, coalition-building) aligns with a 'fox' elite. Pareto argues that when a 'fox elite becomes too timid and accommodating,' it is displaced by a 'lion' elite."}, {"text": "A 'lion' elite, characterized by its reliance on force, tradition, and authority, willing to act decisively.", "isCorrect": true, "rationale": "Pareto describes 'lions' as powerful, direct elites who rely on force and authority, and who displace 'foxes' when the latter become 'too timid and accommodating' or indecisive."}, {"text": "A 'political class' that represents the general will of the people.", "isCorrect": false, "rationale": "Pareto's theory focuses on the circulation of elite types (foxes and lions), not on an idealistic concept of a 'political class' representing the general will, which the realist school views skeptically."}, {"text": "An 'oligarchic' leadership group that adheres to an 'iron law' of internal hierarchy.", "isCorrect": false, "rationale": "This option refers to Michels's 'iron law of oligarchy,' which is about the inevitability of hierarchies within organizations, not Pareto's specific types of ruling elites and their circulation."}], "id": "q05"}, {"question": "What is the central assertion of Robert Michels's 'iron law of oligarchy'?", "options": [{"text": "Democratic societies are inherently immune to the concentration of power in a small elite.", "isCorrect": false, "rationale": "Michels's 'iron law' argues the opposite: that even democratic organizations are not immune and inevitably develop internal hierarchies."}, {"text": "All organizations, regardless of their stated commitment to democracy or equality, will inevitably develop internal hierarchies and concentrate power in a small leadership group.", "isCorrect": true, "rationale": "The key concept states: 'Any organization large enough to require coordination will tend, over time, to concentrate power in a small leadership group—regardless of its stated commitment to democracy or equality.'"}, {"text": "Large organizations can only function effectively if power is distributed equally among all members.", "isCorrect": false, "rationale": "Michels argues that large organizations *need leaders* for coordination, leading to power concentration, not equal distribution."}, {"text": "Political leaders, once elected, always prioritize the goals of the organization's membership above their own self-interest.", "isCorrect": false, "rationale": "Michels suggests leaders 'have stronger personal incentives to maintain their positions' and 'develop an interest in the organization's survival that may conflict with the stated goals.'"}], "id": "q06"}, {"question": "Robert Michels uniquely extended the elite theory argument into which specific type of organization to demonstrate the 'iron law of oligarchy'?", "options": [{"text": "Traditional monarchies and aristocratic ruling families.", "isCorrect": false, "rationale": "These organizations are overtly hierarchical; Michels's novel contribution was analyzing organizations that *claimed* to be democratic."}, {"text": "Large multinational corporations and financial institutions.", "isCorrect": false, "rationale": "While these exhibit hierarchies, the text specifically highlights Michels's focus on organizations committed to democratic ideals."}, {"text": "Religious institutions and spiritual leadership bodies.", "isCorrect": false, "rationale": "The text does not mention religious institutions as his primary focus for this theory."}, {"text": "Democratic organizations, such as socialist parties and labor unions, explicitly committed to equality and participation.", "isCorrect": true, "rationale": "The text states Michels 'extends the elite theory argument into a domain that might seem to refute it: democratic organizations that are explicitly committed to equality and participation,' specifically mentioning 'socialist parties, labor unions, and democratic associations.'"}], "id": "q07"}, {"question": "A contemporary political analyst observes that a technologically advanced nation, despite its robust democratic institutions and high voter turnout, consistently sees major policy decisions being shaped and executed by a small, influential group of tech billionaires, industry lobbyists, and senior bureaucratic officials, rather than directly reflecting public opinion. This observation most closely aligns with which shared commitment of the Italian Realist School?", "options": [{"text": "The belief that democracy is the ideal form of government and will eventually triumph over all others.", "isCorrect": false, "rationale": "This is an idealist view, which the Italian Realist School explicitly rejected in favor of observing how power actually works."}, {"text": "The insistence on studying political reality as it actually works, concluding that power tends to concentrate in organized minorities regardless of formal structures.", "isCorrect": true, "rationale": "This scenario directly reflects the Realist School's core tenet: studying actual power dynamics (small influential group making decisions) rather than democratic ideals (robust institutions, high voter turnout), and concluding that power concentrates in organized minorities regardless of constitutional arrangements."}, {"text": "The idea that political competition is a temporary phenomenon that can be eliminated through effective constitutional design.", "isCorrect": false, "rationale": "The Italian Realist School believes that competition for political power is a permanent feature of social life that cannot be eliminated by constitutional arrangements."}, {"text": "The theory that ruling elites perpetually circulate between 'fox' and 'lion' types.", "isCorrect": false, "rationale": "While 'circulation of elites' is a concept from Pareto, the question focuses on the general observation of elite power despite formal democracy, which is a broader common thread of the school rather than a specific dynamic."}], "id": "q08"}, {"question": "The text describes the Italian Realist School's work as a 'transformation of Machiavelli's practical handbook for princes into a general theory of political power.' What does this transformation primarily signify?", "options": [{"text": "The realists provided a moral justification for the actions of individual rulers.", "isCorrect": false, "rationale": "The realists focused on the 'structural laws' governing power from a social scientist's perspective, not on providing moral justifications for individuals."}, {"text": "They shifted the focus from how an individual prince acquires and holds power to understanding the structural laws governing power distribution in any society.", "isCorrect": true, "rationale": "The text explicitly states this transformation: 'What Machiavelli described from the perspective of the prince... these thinkers describe from the perspective of the social scientist: what are the structural laws that govern the distribution and exercise of political power in any society?'"}, {"text": "They argued that constitutional arrangements are the most effective means to abolish the competition for political power.", "isCorrect": false, "rationale": "The realists, like Machiavelli, recognized that competition for political power is a permanent feature that cannot be eliminated by constitutional arrangements."}, {"text": "The realists offered specific advice to democratic leaders on how to maintain popular support.", "isCorrect": false, "rationale": "Their work was a theoretical analysis of power as it *is*, often questioning democratic ideals, rather than a practical guide for maintaining popular support in democracies."}], "id": "q09"}, {"question": "While Robert Michels's 'iron law of oligarchy' suggests the inevitability of power concentration even in democratic organizations, the text also notes a crucial nuance regarding its implications. What is this nuance?", "options": [{"text": "It implies that resistance to oligarchy is futile and that democracy is truly impossible in any form.", "isCorrect": false, "rationale": "The text explicitly states: 'Michels's law does not mean that democracy is impossible or that resistance to oligarchy is futile'."}, {"text": "It suggests that the concentration of power can be consciously resisted through institutional design, regular elections, and the cultivation of civic participation.", "isCorrect": true, "rationale": "The text explains the nuance: 'it means that the concentration of power must be consciously resisted through institutional design, regular elections, and the cultivation of civic participation.'"}, {"text": "It applies only to capitalist institutions and not to socialist parties or labor unions.", "isCorrect": false, "rationale": "Michels specifically applied his law to 'socialist parties, labor unions, and democratic associations' to demonstrate its broad applicability beyond just capitalist structures."}, {"text": "It proves that leaders always prioritize the organization's stated goals over their personal interests.", "isCorrect": false, "rationale": "Michels argued the opposite: leaders often 'develop an interest in the organization's survival that may conflict with the stated goals of the organization.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
