<script>
var QUESTIONS = [{"question": "According to Machiavelli's hierarchy of military forces, which type of military force poses the *greatest* danger to a prince's state?", "options": [{"text": "Mixed forces", "isCorrect": false, "rationale": "Mixed forces are ranked above auxiliaries and mercenaries in Machiavelli's hierarchy, indicating they are less dangerous than the lowest two categories."}, {"text": "Mercenaries", "isCorrect": false, "rationale": "While dangerous, Machiavelli explicitly states that auxiliaries are 'even more dangerous than mercenaries,' placing mercenaries just above auxiliaries in terms of danger."}, {"text": "Auxiliaries", "isCorrect": true, "rationale": "Machiavelli concludes that auxiliaries are 'even more dangerous than mercenaries' and places them at the bottom of the military hierarchy, making them the most dangerous."}, {"text": "A prince's own troops", "isCorrect": false, "rationale": "A prince's own troops are at the top of Machiavelli's hierarchy, considered the most reliable and least dangerous, forming the ideal military foundation."}], "id": "q01"}, {"question": "What is the fundamental difference in danger between mercenaries and auxiliaries, according to Machiavelli?", "options": [{"text": "Mercenaries are more expensive to hire, while auxiliaries are typically a free loan.", "isCorrect": false, "rationale": "While cost might be a factor, Machiavelli emphasizes loyalty, not expense, as the core differentiator in danger. Auxiliaries are not necessarily free, but their cost isn't the primary danger point."}, {"text": "Auxiliaries are typically better trained and equipped, making them more effective but also more threatening.", "isCorrect": false, "rationale": "Machiavelli's text does not suggest a general difference in training or equipment level; instead, it focuses on the political implications of their loyalty."}, {"text": "Auxiliaries maintain loyalty to their original ruler, posing a threat to the inviting prince's sovereignty, whereas mercenaries lack overarching loyalty to any specific ruler beyond their captain.", "isCorrect": true, "rationale": "The text explicitly states: 'The difference in danger between mercenaries and auxiliaries lies in their ultimate loyalty.' Auxiliaries are loyal to their sender, meaning their victories benefit another ruler, and their presence on your territory is a foreign power. Mercenaries fight for money and are dismissed."}, {"text": "Mercenaries are prone to desertion in battle, while auxiliaries are more dependable under fire.", "isCorrect": false, "rationale": "Machiavelli notes mercenaries can be 'unreliably' dismissed, implying they aren't always dependable, but the critical distinction for auxiliaries is their *loyalty to another ruler*, not their battlefield reliability compared to mercenaries."}], "id": "q02"}, {"question": "If a prince successfully uses auxiliary troops to win a conflict, what is the most significant negative consequence Machiavelli identifies for the inviting prince?", "options": [{"text": "The auxiliaries will demand a higher payment or reward than initially agreed upon.", "isCorrect": false, "rationale": "While this might happen with any hired troops, Machiavelli focuses on the political ramifications rather than financial renegotiations specific to auxiliaries."}, {"text": "The inviting prince's own troops will become resentful and mutiny due to being overshadowed.", "isCorrect": false, "rationale": "The text does not mention mutiny among the prince's own troops as a direct consequence of auxiliary victory; the focus is on the power shift towards the lending ruler."}, {"text": "The victory enhances the prestige and power of the ruler who supplied the auxiliaries, potentially leading to foreign domination.", "isCorrect": true, "rationale": "Machiavelli states, 'When auxiliaries win, their victory belongs to the prince who dispatched them.' This 'allows a foreign power to operate its military forces on your territory, demonstrate their effectiveness, and accumulate goodwill among your own population,' ultimately leading to the foreign power gaining prestige and potential dominance, as seen in the case of Pope Julius II."}, {"text": "The auxiliaries will immediately annex the prince's territory, regardless of the agreement.", "isCorrect": false, "rationale": "While foreign domination is a risk, immediate annexation is an extreme and not universally stated consequence. The danger is more subtle and long-term, through increased influence and power of the lending ruler."}], "id": "q03"}, {"question": "According to Machiavelli, if auxiliary troops lose a battle while fighting for a prince, what is the direct outcome for the prince?", "options": [{"text": "The prince can easily dismiss them without further consequence or financial obligation.", "isCorrect": false, "rationale": "Dismissing defeated troops is possible, but Machiavelli highlights the negative consequences for the prince's state, not ease of dismissal."}, {"text": "The prince's state is weakened, and the lending ruler might exploit this vulnerability as an opportunity.", "isCorrect": true, "rationale": "The text explicitly states: 'If the auxiliaries lose, the situation is no better. You have been defeated, your state is weakened, and the prince who loaned you the troops may use your weakness as an opportunity.'"}, {"text": "The lending ruler will immediately declare war on the defeated prince.", "isCorrect": false, "rationale": "While the lending ruler 'may use your weakness as an opportunity,' immediately declaring war is a specific scenario not explicitly stated as the direct outcome."}, {"text": "The auxiliaries will switch loyalty to the victorious enemy and fight against the prince.", "isCorrect": false, "rationale": "The text emphasizes their loyalty to their *original* ruler, not a tendency to switch to the victorious enemy."}], "id": "q04"}, {"question": "Machiavelli uses the example of the late Roman Empire's gradual recruitment of barbarian auxiliaries primarily to illustrate which point?", "options": [{"text": "The effectiveness of integrating diverse fighting styles into a unified military force.", "isCorrect": false, "rationale": "Machiavelli's focus is on the negative consequences of dependency, not the military effectiveness of integration."}, {"text": "The danger of long-term military dependency leading to a loss of sovereignty and internal control.", "isCorrect": true, "rationale": "The text states: 'the \"auxiliaries\" became the real military power—and their commanders became the real rulers. The fall of the Western Roman Empire is, in part, Machiavelli's cautionary tale about the long-term consequences of military dependency.'"}, {"text": "The necessity of adopting new military technologies from foreign powers to remain competitive.", "isCorrect": false, "rationale": "The example concerns military personnel and loyalty, not technology adoption."}, {"text": "The financial burden of maintaining a large standing army of one's own citizens.", "isCorrect": false, "rationale": "While financial burdens can be a factor in military decisions, the Roman example highlights the political and sovereign risks of dependency, not primarily the cost."}], "id": "q05"}, {"question": "What was the primary long-term consequence of Pope Julius II's reliance on Spanish auxiliaries, despite achieving his immediate goal of driving out the French?", "options": [{"text": "It solidified the Papal States' military control over all of Italy for centuries.", "isCorrect": false, "rationale": "The text explicitly states the opposite: it led to Spanish, not Papal, domination of Italy."}, {"text": "It led to the Spanish military becoming the dominant power in Italy for an extended period.", "isCorrect": true, "rationale": "The text states: 'The campaign succeeded—but the success meant that Spain was now the dominant military power in Italy... By relying on Spanish auxiliaries, Julius helped create the very situation that would come to define Italian politics for the next century: Spanish domination of the peninsula.'"}, {"text": "It inspired other Italian rulers to raise their own powerful citizen armies in response to the foreign presence.", "isCorrect": false, "rationale": "The text does not mention this as a consequence; rather, it highlights the creation of a 'Spanish domination' scenario."}, {"text": "It resulted in a lasting diplomatic and military alliance between the Papal States and Spain.", "isCorrect": false, "rationale": "While there was a temporary collaboration, the outcome was Spanish dominance, not a balanced, lasting alliance beneficial to both equally."}], "id": "q06"}, {"question": "Beyond military logistics, what deeper philosophical principle does Machiavelli argue these chapters (XII and XIII) primarily articulate?", "options": [{"text": "The importance of international diplomacy and multi-state alliances for collective security.", "isCorrect": false, "rationale": "While alliances are mentioned in the 'note,' the core philosophical argument of these chapters is self-reliance and the dangers of dependency, not the benefits of diplomacy."}, {"text": "The necessity of cultivating goodwill among neighboring rulers through acts of mutual aid.", "isCorrect": false, "rationale": "Machiavelli often views goodwill as conditional and unreliable, contrasting with the need for a prince's own strength."}, {"text": "The principle of political self-reliance, where a prince must control essential levers of power for his own survival, rather than depending on external benefactors.", "isCorrect": true, "rationale": "The text states: 'Machiavelli is articulating a philosophy of political self-reliance. A prince who depends on others for his military security has surrendered the most fundamental lever of political power. His survival depends not on his own strength but on the continued goodwill of his benefactors.'"}, {"text": "The inherent superiority of a monarchy over other forms of government due to its centralized military command.", "isCorrect": false, "rationale": "The chapters discuss principles applicable to a prince's rule, but the core argument is about self-reliance, not a comparative analysis of government types."}], "id": "q07"}, {"question": "According to the 'thinkdeeper' section, which of the following would best represent a modern equivalent of 'one's own arms' for a nation-state, reflecting Machiavelli's principle of self-reliance?", "options": [{"text": "Entering into a mutual defense pact with a powerful military ally, thereby sharing military burdens.", "isCorrect": false, "rationale": "While alliances can be part of security, relying heavily on an ally for defense would be seen as a form of dependency if the nation lacks its own capacity, akin to auxiliaries."}, {"text": "Relying heavily on foreign powers for the manufacture of all advanced weaponry and military technology.", "isCorrect": false, "rationale": "The text explicitly states Machiavelli would be concerned by 'a state that is entirely dependent on foreign manufacturers for its weapons,' viewing this as a form of strategic dependency."}, {"text": "Maintaining an independent industrial base, a domestic food supply, and control over critical technology, alongside a standing army.", "isCorrect": true, "rationale": "The text directly states: 'For a nation-state today, it might include not just a standing army but an independent industrial base, a domestic food supply, and control over critical technology.'"}, {"text": "Outsourcing all critical technological development to international corporations to ensure access to the latest innovations.", "isCorrect": false, "rationale": "Control over critical technology is identified as an 'own arm,' implying domestic control, not outsourcing to foreign entities."}], "id": "q08"}, {"question": "How would Machiavelli likely view a modern nation's participation in an alliance structure like NATO, based on the provided 'note'?", "options": [{"text": "He would unequivocally condemn all alliances as a dangerous form of military dependency, regardless of context.", "isCorrect": false, "rationale": "The 'note' states: 'Machiavelli would not have opposed alliances per se—he understood that states must cooperate.'"}, {"text": "He would support alliances only if they lead to the complete dissolution of national armies in favor of a unified allied military force.", "isCorrect": false, "rationale": "This contradicts his core principle of maintaining one's own military capacity and sovereignty."}, {"text": "He would accept alliances, provided the nation maintains a strong independent military capacity to be a genuine partner, not merely a dependent client.", "isCorrect": true, "rationale": "The 'note' clarifies: 'But he would have insisted that a state must maintain sufficient independent military capacity to be a genuine partner rather than a dependent client.'"}, {"text": "He would see alliances primarily as a means to export one's own auxiliary troops to other nations for mutual benefit.", "isCorrect": false, "rationale": "Machiavelli's concern is about a nation *receiving* auxiliary-like protection without its own capacity, not primarily about exporting troops."}], "id": "q09"}, {"question": "Which statement best summarizes Machiavelli's overarching message regarding military forces in Chapters XII and XIII?", "options": [{"text": "Alliances are always detrimental and should be avoided at all costs, as they inevitably lead to foreign control.", "isCorrect": false, "rationale": "The 'note' clarifies that Machiavelli would not oppose alliances *per se*, indicating a more nuanced view than outright condemnation."}, {"text": "The most secure foundation for a prince's power is absolute military self-reliance through one's own forces, as dependence on others (especially auxiliaries) leads to vulnerability and loss of political control.", "isCorrect": true, "rationale": "This synthesizes the core arguments: own troops are best, auxiliaries are the worst danger, and military dependency equates to surrendering fundamental political power and risking survival, aligning with his 'philosophy of political self-reliance.'"}, {"text": "Mercenaries are the least dangerous type of borrowed troops because they are easily dismissed and only care about money.", "isCorrect": false, "rationale": "Machiavelli explicitly states auxiliaries are *more* dangerous than mercenaries, and both are at the bottom of the hierarchy, making neither 'least dangerous.'"}, {"text": "A prince should prioritize economic strength over military strength to ensure long-term stability and security.", "isCorrect": false, "rationale": "While economic strength might be important, the chapters' central focus is on military foundations and self-reliance, with military power being the 'most fundamental lever of political power' in this context."}], "id": "q10"}, {"question": "Machiavelli argues that 'goodwill is always conditional and always subject to change.' How does this assessment of goodwill directly reinforce his case against using auxiliaries?", "options": [{"text": "It shows that auxiliaries will demand increasingly generous terms over time as the prince becomes more dependent on their goodwill.", "isCorrect": false, "rationale": "While dependency can increase costs, Machiavelli's point is specifically about sovereignty and political control, not primarily about renegotiated fees."}, {"text": "Because a prince who relies on auxiliary forces for survival has made his continued existence contingent on a foreign ruler's goodwill, which can evaporate without warning.", "isCorrect": true, "rationale": "The text states 'His survival depends not on his own strength but on the continued goodwill of his benefactors — and goodwill, as The Prince has shown repeatedly, is always conditional.' A prince who cannot defend himself without auxiliaries has surrendered the most fundamental form of self-determination."}, {"text": "It means that auxiliary troops themselves are unreliable because their personal goodwill toward the prince depends on continued payment.", "isCorrect": false, "rationale": "That describes mercenaries rather than the specific danger of auxiliaries, whose problem is their loyalty to another ruler, not to money."}, {"text": "It demonstrates that alliances built on goodwill are inherently weaker than those built on formal treaties.", "isCorrect": false, "rationale": "Machiavelli's argument is about structural military dependency, not the relative strength of informal versus formal alliance agreements."}], "id": "q11"}, {"question": "The text suggests Machiavelli would view a state dependent on foreign energy suppliers or foreign weapons manufacturers the same way he viewed a prince who used auxiliary troops. What shared structural feature justifies this analogy?", "options": [{"text": "Both auxiliary dependence and supply-chain dependence involve foreign actors who can demand tribute in exchange for continued support.", "isCorrect": false, "rationale": "While tribute-seeking is possible, the core structural problem Machiavelli identifies is loss of autonomous decision-making, not merely increased costs."}, {"text": "Both involve transferring control over a vital survival resource to an external actor whose interests may diverge from your own at the worst possible moment.", "isCorrect": true, "rationale": "In each case — auxiliary troops, foreign weapons factories, foreign energy — the fundamental structure is the same: a foreign actor controls something you need to survive, and that actor's interests are not guaranteed to align with yours. Machiavelli's logic about auxiliaries applies precisely because the dependency structure is identical."}, {"text": "Both create situations where the foreign partner gains military prestige from the relationship, just as Spain did from Julius II.", "isCorrect": false, "rationale": "Prestige gain is specific to military auxiliaries; a foreign energy supplier does not gain prestige in the same way, though the dependency problem is analogous."}, {"text": "Both are problems that can be solved by forming alliances with additional foreign partners to balance competing dependencies.", "isCorrect": false, "rationale": "Adding more external dependencies does not resolve the structural problem; Machiavelli's solution is to build internal capacity, not to diversify foreign dependencies."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
