        <div class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 21, Section 1</div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>

    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>

<script>
var QUESTIONS = [{"question": "What is Machiavelli's primary method for evaluating various defensive strategies employed by rulers?", "options": [{"text": "Consulting ancient philosophers and historical precedents.", "isCorrect": false, "rationale": "While Machiavelli references historical examples, his primary method is not just 'consulting' but actively testing if strategies 'work in reality,' often contrasting ancient wisdom with contemporary effectiveness."}, {"text": "Determining if the strategy aligns with moral and ethical principles.", "isCorrect": false, "rationale": "Machiavelli is famously pragmatic; his concern is effectiveness and securing the state, not necessarily moral alignment. The text emphasizes what 'works in reality.'"}, {"text": "Subjecting each strategy to a test of its practical effectiveness in reality.", "isCorrect": true, "rationale": "The introductory paragraph explicitly states that Machiavelli 'subjects each to his characteristic test: does it work in reality?' This is his core evaluative principle."}, {"text": "Assessing whether the strategy promotes the general welfare and happiness of the subjects.", "isCorrect": false, "rationale": "Machiavelli's focus is on the prince's ability to 'hold securely the state,' not primarily the general welfare of subjects, although their loyalty can contribute to security."}], "id": "q01"}, {"question": "According to Machiavelli, what is the recommended policy for a *new prince* regarding arming subjects in a *new principality*?", "options": [{"text": "Disarm all subjects immediately to prevent rebellion and rely on mercenary forces.", "isCorrect": false, "rationale": "Machiavelli explicitly states, 'There never was a new prince who has disarmed his subjects,' and warns against disarming as it breeds hatred and necessitates unreliable mercenaries."}, {"text": "Arm all subjects, as it makes them faithful adherents and strengthens the prince's own forces.", "isCorrect": true, "rationale": "Paragraph 2 states that a new prince in a new principality 'has always armed them, because, by arming them, those arms become yours, those men who were distrusted become faithful, and those who were faithful are kept so, and your subjects become your adherents.'"}, {"text": "Arm only a select few who have proven their loyalty, keeping the majority disarmed to maintain control.", "isCorrect": false, "rationale": "While 'all subjects cannot be armed,' Machiavelli advises arming those who can be beneficial, implying a broader policy than just 'a select few' and emphasizing the benefits of extending arms to foster loyalty."}, {"text": "Foster factions among subjects to prevent them from uniting against the prince, regardless of arming.", "isCorrect": false, "rationale": "Fostering factions is a separate strategy discussed later in the text (Paragraph 3) and is generally advised against by Machiavelli for contemporary times."}], "id": "q02"}, {"question": "Why does Machiavelli argue against the strategy of fostering factions in tributary towns, a method once praised by 'forefathers'?", "options": [{"text": "He believes it leads to internal economic instability and decline.", "isCorrect": false, "rationale": "The text does not mention economic instability as a reason. Machiavelli's concern is military weakness and susceptibility to external attack."}, {"text": "He contends that it demonstrates weakness in the prince and makes the state vulnerable during war.", "isCorrect": true, "rationale": "Paragraph 3 states, 'Such methods argue, therefore, weakness in the prince, because these factions will never be permitted in a vigorous principality; such methods for enabling one the more easily to manage subjects are only useful in times of peace, but if war comes this policy proves fallacious.'"}, {"text": "He views it as morally repugnant and unbecoming of a virtuous ruler.", "isCorrect": false, "rationale": "Machiavelli's evaluations are based on practical effectiveness, not moral repugnance. He is concerned with what 'works in reality.'"}, {"text": "He suggests that modern weaponry makes such divisions irrelevant for defense.", "isCorrect": false, "rationale": "The text does not refer to 'modern weaponry.' His argument is based on the strategic vulnerability of divided cities to external enemies, where the weakest party will assist outside forces."}], "id": "q03"}, {"question": "A prince has recently annexed a new territory, adding it as a province to his established old state. What specific advice does Machiavelli offer regarding the arming of subjects in this newly acquired province?", "options": [{"text": "He should arm all the new subjects to gain their loyalty, just like a new prince in a new principality.", "isCorrect": false, "rationale": "This advice applies to a *new prince in a new principality*. For an acquired province, the strategy is different. Paragraph 2 explicitly states, 'But when a prince acquires a new state, which he adds as a province to his old one, then it is necessary to disarm the men of that state.'"}, {"text": "He should disarm all the men of the new state, except for those who were his adherents during the acquisition, and even those should be gradually weakened.", "isCorrect": true, "rationale": "Paragraph 2 details this specific scenario: 'when a prince acquires a new state, which he adds as a province to his old one, then it is necessary to disarm the men of that state, except those who have been his adherents in acquiring it; and these again, with time and opportunity, should be rendered soft and effeminate.'"}, {"text": "He should integrate the new subjects into his old army, treating them equally to prevent resentment.", "isCorrect": false, "rationale": "Machiavelli suggests 'all the armed men in the state shall be your own soldiers who in your old state were living near you,' implying a preference for his original soldiers, not necessarily equal integration of new subjects into the armed forces."}, {"text": "He should encourage the new subjects to form their own militias, but keep them separate from the state's main army.", "isCorrect": false, "rationale": "This contradicts the instruction to disarm, except for specific adherents, and to ensure armed forces are 'your own soldiers.'"}], "id": "q04"}, {"question": "Machiavelli observes that princes, especially new ones, often find more fidelity and assistance from those initially distrusted than from those initially trusted. What is his rationale for this phenomenon?", "options": [{"text": "Distrusted individuals inherently possess superior military and political skills.", "isCorrect": false, "rationale": "Machiavelli's rationale is based on their motivation, not inherent skill. They serve faithfully because they need to overcome a bad impression."}, {"text": "Trusted individuals are more likely to be bribed by foreign powers due to their established position.", "isCorrect": false, "rationale": "The text does not mention bribery by foreign powers for trusted individuals. It attributes their potential unreliability to serving 'in too much security,' leading to neglect."}, {"text": "Distrusted individuals are eager to cancel the bad impression of them and serve with greater diligence, while trusted ones may become complacent.", "isCorrect": true, "rationale": "Paragraph 5 explains: 'those men who at the commencement of a princedom have been hostile... can always be gained over with the greatest ease, and they will be tightly held to serve the prince with fidelity, inasmuch as they know it to be very necessary for them to cancel by deeds the bad impression which he had formed of them; and thus the prince always extracts more profit from them than from those who, serving him in too much security, may neglect his affairs.'"}, {"text": "The prince can easily exploit the weaknesses of distrusted individuals, making them more obedient.", "isCorrect": false, "rationale": "Machiavelli focuses on their *motivation to serve faithfully* to overcome a bad impression, not on exploiting their weaknesses directly."}], "id": "q05"}, {"question": "Which statement best summarizes Machiavelli's nuanced view on building fortresses?", "options": [{"text": "Fortresses are always a wise investment, providing a secure refuge and deterring all enemies.", "isCorrect": false, "rationale": "Machiavelli explicitly states that fortresses 'are useful or not according to circumstances' and provides examples of them being demolished or causing trouble."}, {"text": "They are entirely useless in modern warfare and should always be demolished by a wise prince.", "isCorrect": false, "rationale": "He does not say they are *entirely useless* or *always* to be demolished. He praises 'him who builds fortresses as well as him who does not,' depending on the context."}, {"text": "Their utility depends on whether the prince fears the people more or foreigners more, and the ultimate defense is the people's loyalty.", "isCorrect": true, "rationale": "Paragraph 6 clearly states: 'the prince who has more to fear from the people than from foreigners ought to build fortresses, but he who has more to fear from foreigners than from the people ought to leave them alone.' It then concludes, 'the best possible fortress is—not to be hated by the people.'"}, {"text": "Fortresses should only be built by hereditary princes, as new princes lack the resources for their construction and maintenance.", "isCorrect": false, "rationale": "The text does not differentiate fortress advice based on whether the prince is new or hereditary, nor does it focus on resource constraints."}], "id": "q06"}, {"question": "Under what specific condition might a 'wise prince' craftily foster animosity against himself, according to Machiavelli?", "options": [{"text": "To identify and eliminate all potential enemies within the state covertly.", "isCorrect": false, "rationale": "The text speaks of 'overcoming' them to 'mount higher,' not covert elimination. It's about a public display of strength."}, {"text": "When fortune has not provided him with sufficient external challenges to earn renown.", "isCorrect": true, "rationale": "Paragraph 4 states that 'fortune, especially when she desires to make a new prince great... causes enemies to arise... in order that he may have the opportunity of overcoming them, and by them to mount higher.' It then adds, 'For this reason many consider that a wise prince, when he has the opportunity, ought with craft to foster some animosity against himself, so that, having crushed it, his renown may rise higher.'"}, {"text": "To distract his subjects from internal grievances by creating an external threat.", "isCorrect": false, "rationale": "While a prince might do this, Machiavelli's rationale here is specifically about the prince's opportunity to *overcome difficulties* and *rise higher* through gaining renown, not primarily distraction."}, {"text": "To test the loyalty of his most trusted advisors and generals.", "isCorrect": false, "rationale": "The text does not link fostering animosity to testing loyalty. It is framed as an opportunity for the prince to earn renown by demonstrating strength against opposition."}], "id": "q07"}, {"question": "Machiavelli warns a new prince who acquired his state through 'secret favours' of discontented citizens about a significant challenge. What is this challenge?", "options": [{"text": "These citizens will demand an excessive share of power and resources, leading to quick dissatisfaction.", "isCorrect": false, "rationale": "While they might demand rewards, the core issue is their underlying motivation. The text focuses on their 'discontent' as the sole basis of their favor, making them difficult to satisfy."}, {"text": "They will likely betray him to foreign powers once they realize his true intentions.", "isCorrect": false, "rationale": "The text doesn't suggest betrayal to foreign powers. It's about the internal difficulty in maintaining their loyalty and satisfaction."}, {"text": "It will be difficult to satisfy them and keep them friendly, as their favour stemmed from discontent with the previous government, not natural affection.", "isCorrect": true, "rationale": "Paragraph 5 clearly states: 'if it be not a natural affection towards him, but only discontent with their government, then he will only keep them friendly with great trouble and difficulty, for it will be impossible to satisfy them.'"}, {"text": "They will attempt to establish a republic, undermining his monarchical rule.", "isCorrect": false, "rationale": "The text focuses on their 'discontent' and difficulty to satisfy, not on a specific political system they wish to establish."}], "id": "q08"}, {"question": "The case of the Countess of Forli, who used a fortress to withstand a popular attack after her consort was killed, is presented by Machiavelli as a rare exception. What specific condition made her use of the fortress temporarily effective?", "options": [{"text": "Her fortresses were exceptionally well-designed and impregnable.", "isCorrect": false, "rationale": "The text doesn't mention the structural quality of her fortresses. It highlights the political and military context."}, {"text": "The people attacking her were poorly organized and lacked sufficient military training.", "isCorrect": false, "rationale": "The text attributes her temporary success to the inability of *foreigners* to assist the people, not the people's lack of organization."}, {"text": "Foreign powers were unable to assist the people who had taken arms against her at that specific time.", "isCorrect": true, "rationale": "Paragraph 6 notes: 'the posture of affairs was such at that time that the foreigners could not assist the people.' This unique circumstance allowed her fortress to provide refuge until aid arrived."}, {"text": "She had already gained the loyalty of her subjects, making the fortress a symbolic rather than strategic asset.", "isCorrect": false, "rationale": "The text states she was facing a 'popular attack' and later that the 'people, her enemy, were allied with foreigners,' indicating they did not love her."}], "id": "q09"}, {"question": "Machiavelli contrasts the policy of a new prince in a *new principality* regarding arms with that of a prince acquiring a *new state as a province to his old one*. What is the fundamental difference in his advice?", "options": [{"text": "In a new principality, the prince should disarm, while in a new province, he should arm the local population.", "isCorrect": false, "rationale": "This reverses Machiavelli's advice. A new prince in a new principality *arms*, while a prince acquiring a province *disarms*."}, {"text": "In a new principality, the prince should arm to gain loyalty; in a new province, he should disarm to prevent independent power centers and ensure all armed men are his original soldiers.", "isCorrect": true, "rationale": "Paragraph 2 details this: for a new principality, arming gains loyalty and integrates subjects; for a province, disarming (except adherents, who are then softened) prevents resistance and ensures the prince's 'own soldiers' are the only armed force."}, {"text": "A new prince in a new principality should rely on mercenaries, whereas a prince acquiring a province should establish a citizen militia.", "isCorrect": false, "rationale": "Machiavelli generally advises against mercenaries and encourages arming subjects in a new principality. Neither scenario recommends relying solely on mercenaries or establishing a broad citizen militia in a newly acquired province."}, {"text": "The advice is identical for both situations, as the goal is always to consolidate power through military strength.", "isCorrect": false, "rationale": "The text clearly distinguishes between the two scenarios, providing contrasting advice for each, recognizing their different strategic implications."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
