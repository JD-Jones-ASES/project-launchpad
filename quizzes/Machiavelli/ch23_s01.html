<script>
var QUESTIONS = [{"question": "What is Machiavelli's primary claim regarding how a prince's intelligence is revealed?", "options": [{"text": "It is best judged by his military victories and conquests.", "isCorrect": false, "rationale": "While military success is important to a prince, the text specifically states that a prince's intelligence is revealed 'in the people he chooses to advise him'."}, {"text": "It is most evident in his choice of capable and faithful advisors.", "isCorrect": true, "rationale": "The text explicitly states: 'the prince reveals his own intelligence—or its absence—in the people he chooses to advise him' and 'the first opinion which one forms of a prince, and of his understanding, is by observing the men he has around him'."}, {"text": "It is demonstrated through his ability to manage the state's finances.", "isCorrect": false, "rationale": "Financial management is not mentioned as the primary indicator of a prince's intelligence in this section."}, {"text": "It is determined by his lineage and hereditary right to rule.", "isCorrect": false, "rationale": "The text focuses on personal judgment and choices, not inherent lineage, as the measure of intelligence."}], "id": "q01"}, {"question": "According to Machiavelli, what is the 'prime error' a prince can make concerning his advisors or 'servants'?", "options": [{"text": "Failing to adequately reward loyal servants for their service.", "isCorrect": false, "rationale": "While rewarding servants is crucial for maintaining honesty, the text identifies a prior, fundamental error: 'when they are otherwise [not capable and faithful] one cannot form a good opinion of him, for the prime error which he made was in choosing them'."}, {"text": "Choosing servants who are either incapable or unfaithful.", "isCorrect": true, "rationale": "Machiavelli states that if advisors are 'otherwise' (i.e., not capable and faithful), then the 'prime error' was in choosing them, leading to a poor opinion of the prince."}, {"text": "Not sharing enough of his personal wealth with his close confidants.", "isCorrect": false, "rationale": "Sharing wealth is a method to keep servants honest, but it's not described as the 'prime error' in their selection."}, {"text": "Prioritizing the welfare of his own family over the needs of the state.", "isCorrect": false, "rationale": "This describes a potential misdeed by a prince but is not the 'prime error' related to choosing servants."}], "id": "q02"}, {"question": "Machiavelli categorizes intellects into three classes. Which description accurately defines the 'most excellent' class?", "options": [{"text": "The intellect that excels at persuading others to follow its will.", "isCorrect": false, "rationale": "Persuasion is not the defining characteristic of the 'most excellent' class; independent comprehension is."}, {"text": "The intellect that can comprehend matters entirely by itself, without external input.", "isCorrect": true, "rationale": "The text states: 'one which comprehends by itself;... the first is the most excellent'."}, {"text": "The intellect that is skilled at appreciating what others have already comprehended.", "isCorrect": false, "rationale": "This describes the 'second' class of intellect, which is considered 'good', but not the 'most excellent'."}, {"text": "The intellect that is adept at concealing its true intentions from others.", "isCorrect": false, "rationale": "The classification of intellects is about understanding and judgment, not deception."}], "id": "q03"}, {"question": "The text cites Pandolfo Petrucci as a clever man for his choice of Messer Antonio da Venafro. If Pandolfo did not possess a 'first rank' intellect, how could he still be considered wise in this regard?", "options": [{"text": "Pandolfo simply possessed immense luck in stumbling upon a capable servant.", "isCorrect": false, "rationale": "Machiavelli attributes Pandolfo's wisdom to his judgment and ability to discern, not mere luck."}, {"text": "Pandolfo was of the 'second rank' intellect, enabling him to recognize and correct good and bad in his servant's counsel.", "isCorrect": true, "rationale": "The text explains: 'if Pandolfo was not in the first rank, he was in the second, for whenever one has judgment to know good and bad when it is said and done... he can recognize the good and the bad in his servant, and the one he can praise and the other correct'."}, {"text": "Pandolfo maintained control by severely punishing any disloyalty from Venafro.", "isCorrect": false, "rationale": "The text focuses on discernment and management, not just punitive measures, as the source of his wisdom in choosing well."}, {"text": "Pandolfo ensured Venafro had no other options, making him entirely dependent and thus loyal.", "isCorrect": false, "rationale": "This reasoning is not provided; the text emphasizes Pandolfo's ability to judge his servant's counsel."}], "id": "q04"}, {"question": "What is the 'one test which never fails' for a prince to accurately assess his servant's character and loyalty?", "options": [{"text": "Observing if the servant frequently offers unsolicited advice to the prince.", "isCorrect": false, "rationale": "Offering unsolicited advice is not presented as the 'never failing test' of loyalty; it could even indicate overstepping boundaries."}, {"text": "Determining if the servant consistently prioritizes his own interests and personal profit over the prince's.", "isCorrect": true, "rationale": "The text explicitly states: 'when you see the servant thinking more of his own interests than of yours, and seeking inwardly his own profit in everything, such a man will never make a good servant, nor will you ever be able to trust him'."}, {"text": "Evaluating the servant's ability to maintain a strong network of allies within the court.", "isCorrect": false, "rationale": "Having allies is not identified as the 'never failing test' for loyalty; it could even be a sign of building a personal power base."}, {"text": "Assessing the servant's willingness to perform tasks beneath his station.", "isCorrect": false, "rationale": "While diligence is a good quality, it is not the ultimate test for underlying loyalty and honesty described by Machiavelli."}], "id": "q05"}, {"question": "According to Machiavelli, why can a servant who 'thinks more of his own interests' never be trusted by a prince?", "options": [{"text": "Such a servant is likely to betray the prince for a higher position in another state.", "isCorrect": false, "rationale": "While possible, the rationale focuses more broadly on conflicting loyalties and the inherent nature of self-interest in a servant."}, {"text": "A self-interested servant will inevitably neglect the prince's affairs and potentially deceive him, as their loyalty is divided.", "isCorrect": true, "rationale": "The text explains that such a servant 'ought never to think of himself, but always of his prince, and never pay any attention to matters in which the prince is not concerned. Thus the servant cannot hope to deceive him, and is kept honest,' implying the opposite is true for a self-interested servant."}, {"text": "Self-interested servants tend to be less intelligent and competent in their administrative duties.", "isCorrect": false, "rationale": "The issue is loyalty and honesty, not necessarily a lack of intelligence or competence."}, {"text": "The prince will always find it impossible to satisfy the servant's insatiable desire for wealth and power.", "isCorrect": false, "rationale": "The primary reason for distrust is the division of loyalty, not the impossibility of satisfaction by the prince."}], "id": "q06"}, {"question": "What is a key strategy Machiavelli recommends for a prince to actively keep his servant honest and ensure their loyalty?", "options": [{"text": "Regularly demoting and promoting servants to keep them on edge and competitive.", "isCorrect": false, "rationale": "The text suggests fostering trust and stability, not creating insecurity through constant demotions."}, {"text": "Keeping the servant isolated from other influential court members to prevent conspiracies.", "isCorrect": false, "rationale": "The recommendation involves sharing 'honours and cares,' which implies integration, not isolation."}, {"text": "Honouring, enriching, and sharing responsibilities with the servant, while also making them recognize their essential dependence on the prince.", "isCorrect": true, "rationale": "Machiavelli advises: 'the prince ought to study him, honouring him, enriching him, doing him kindnesses, sharing with him the honours and cares; and at the same time let him see that he cannot stand alone'."}, {"text": "Publicly criticizing the servant's mistakes to deter disloyalty through fear of humiliation.", "isCorrect": false, "rationale": "This approach would likely foster resentment and fear, not the desired mutual trust and honesty."}], "id": "q07"}, {"question": "Machiavelli advises a prince to honour, enrich, and share honours and cares with his servants. What is the crucial *dual* purpose of these actions, according to the text?", "options": [{"text": "To prevent the servant from becoming too comfortable and complacent in their position.", "isCorrect": false, "rationale": "While preventing complacency is important, the text specifies a different dual purpose: preventing the servant from desiring 'more' while simultaneously showing their dependence."}, {"text": "To demonstrate the prince's generosity, while simultaneously intimidating other potential rivals.", "isCorrect": false, "rationale": "The focus is on the servant's perspective and relationship with the prince, not intimidating rivals."}, {"text": "To make the servant content and disinclined to seek more, while also ensuring they understand their inability to succeed without the prince.", "isCorrect": true, "rationale": "The text states: 'so that many honours may not make him desire more, many riches make him wish for more, and that many cares may make him dread chances. When, therefore, servants, and princes towards servants, are thus disposed, they can trust each other'."}, {"text": "To elevate the servant's status among the populace, thereby increasing the prince's popularity.", "isCorrect": false, "rationale": "The primary purpose is maintaining servant honesty and loyalty, not specifically boosting the prince's popularity among the populace."}], "id": "q08"}, {"question": "What is the ultimate consequence Machiavelli predicts when princes and servants are *not* mutually disposed to trust each other?", "options": [{"text": "The prince will be forced to replace his entire court, leading to short-term instability.", "isCorrect": false, "rationale": "While replacing a court is possible, the predicted outcome is far more severe and generalized."}, {"text": "The servant will likely resign and seek employment in a more appreciative court.", "isCorrect": false, "rationale": "The outcome is described as 'disastrous,' which is more severe than simply resigning."}, {"text": "The end will always be disastrous for either the prince or the servant.", "isCorrect": true, "rationale": "Machiavelli concludes: 'When, therefore, servants, and princes towards servants, are thus disposed, they can trust each other, but when it is otherwise, the end will always be disastrous for either one or the other'."}, {"text": "The state will experience a period of stagnation but eventually recover.", "isCorrect": false, "rationale": "The text predicts a 'disastrous' end, not mere stagnation and recovery."}], "id": "q09"}, {"question": "Consider a prince with a 'third class' intellect (neither comprehending by itself nor by the showing of others) who chooses a servant secretly driven by personal profit. Based on Machiavelli's principles, what is the most likely long-term consequence for this prince?", "options": [{"text": "The prince's rule would be successful, as the servant's ambition would drive efficiency.", "isCorrect": false, "rationale": "A self-interested servant is untrustworthy and a prince with a 'useless' intellect cannot discern good from bad, leading to negative outcomes."}, {"text": "The servant would be easily kept honest by the prince's good intentions and generosity.", "isCorrect": false, "rationale": "A 'third class' intellect cannot recognize good or bad in a servant, rendering good intentions insufficient to manage a self-interested individual effectively."}, {"text": "The prince's reign would likely be undermined by the servant's unchecked pursuit of personal gain, potentially leading to the prince's downfall or ruin.", "isCorrect": true, "rationale": "A 'useless' intellect cannot judge a servant, and a self-interested servant will inevitably lead to disaster, especially when unchecked, as 'the end will always be disastrous for either one or the other'."}, {"text": "The prince would eventually learn from his mistakes and improve his judgment of servants.", "isCorrect": false, "rationale": "A 'third class' intellect is defined as one that 'neither comprehends by itself nor by the showing of others,' implying a fundamental inability to learn and improve judgment in this specific area."}], "id": "q10"}, {"question": "Machiavelli identifies three classes of intellect: those who comprehend by themselves, those who comprehend through others' explanations, and those who comprehend neither. How does this classification bear on the choice and management of ministers?", "options": [{"text": "Only the first class should ever rule; the other two are disqualified from princely leadership.", "isCorrect": false, "rationale": "Machiavelli allows that the second class can rule effectively if they surround themselves with the right advisors. His classification is diagnostic, not a disqualification of two-thirds of all rulers."}, {"text": "A prince in the second class can compensate for personal limitations by selecting ministers whose honest counsel he can recognize and act on; a third-class prince cannot even do that.", "isCorrect": true, "rationale": "The classification is practically important because the second-class prince can still govern well—his deficit is in origination, not judgment—as long as he builds a system that delivers honest information to him. The third-class prince cannot benefit from any advisory system because he lacks the judgment to distinguish good counsel from bad."}, {"text": "The three classes apply to ministers, not princes—it describes who is qualified to give advice.", "isCorrect": false, "rationale": "Machiavelli applies the three-class intellect framework to princes themselves, not to advisors. It is a taxonomy of rulers' cognitive-political capacity."}, {"text": "Machiavelli recommends that princes of the third class appoint advisors from the first class to compensate fully for their limitations.", "isCorrect": false, "rationale": "The problem with a third-class prince is that he cannot judge good from bad counsel—so even first-class advisors cannot rescue him, because he cannot correctly identify or act on their good advice."}], "id": "q11"}, {"question": "Machiavelli concludes that a prince 'can never guard himself from a corrupt minister, because it is human nature to serve self-interest when there is no constraint.' What does this imply about the source of ministerial loyalty—virtue or structure?", "options": [{"text": "Ministerial loyalty must be built on the minister's personal virtue, since structural incentives are unreliable in crisis.", "isCorrect": false, "rationale": "Machiavelli is explicitly cynical about relying on personal virtue alone; his solution is structural—aligning interests so that the minister's self-interest and the prince's interest point in the same direction."}, {"text": "Loyalty is a product of structural alignment: when the minister's prosperity depends on the prince's success, self-interest and duty converge and no appeal to virtue is necessary.", "isCorrect": true, "rationale": "Machiavelli's 'elegant solution' is non-idealistic: he replaces the moral framework of older mirrors-for-princes with an incentive analysis. A minister whose advancement, security, and wealth depend entirely on the prince's success will be loyal because his self-interest demands it—making structural design, not moral exhortation, the foundation of reliable ministerial loyalty."}, {"text": "Loyalty cannot be engineered; a prince can only hope that fortune provides him with naturally honest ministers.", "isCorrect": false, "rationale": "Machiavelli explicitly rejects this fatalistic view. His prescriptions for binding ministers through honors, responsibilities, and shared stakes show that loyalty can and must be actively cultivated."}, {"text": "The most reliable ministers are those who fear punishment above all else, making fear the true foundation of loyalty.", "isCorrect": false, "rationale": "Fear is one constraint, but Machiavelli's preferred solution is positive alignment of interests—a 'rational partnership'—not primarily fear-based compliance, which creates obedience without genuine engagement."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
