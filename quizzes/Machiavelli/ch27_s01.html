<script>
var QUESTIONS = [{"question": "What is the primary shift in Machiavelli's writing style and purpose in Chapter XXVI compared to the preceding chapters of The Prince?", "options": [{"text": "He transitions from historical analysis to a more philosophical discussion of ethics.", "isCorrect": false, "rationale": "While the chapter is less analytical, it does not become purely philosophical or ethical in the academic sense; it is a direct call to action."}, {"text": "He moves from an analytical posture describing statecraft to an emotional exhortation for Italy's liberation.", "isCorrect": true, "rationale": "The introductory text explicitly states, 'Now he sets aside the analytical posture entirely and writes as a patriot,' and the chapter serves as an 'exhortation to liberate Italy'."}, {"text": "He shifts from practical advice for a prince to a general treatise on military strategy.", "isCorrect": false, "rationale": "While military strategy is discussed, the core shift is in tone and purpose: from a general guide for a prince to a passionate plea for Italy's redemption, addressed to a specific 'illustrious house'."}, {"text": "He changes from a focus on individual rulers to a broader critique of Italian society.", "isCorrect": false, "rationale": "Although Italy's societal conditions are described, the chapter still focuses on the actions of a 'new prince' from an 'illustrious house' as the solution, rather than a broad societal critique."}], "id": "q01"}, {"question": "Machiavelli uses historical examples like Moses, Cyrus, and Theseus to illustrate what critical point about Italy's current state?", "options": [{"text": "That Italy's leaders are inherently less virtuous than these historical figures.", "isCorrect": false, "rationale": "Machiavelli argues that Italy's extreme suffering is a necessary condition, similar to the circumstances that allowed these past heroes to demonstrate their virtue, implying potential for Italian leaders, not inherent inferiority."}, {"text": "That foreign powers are destined to always dominate weaker nations.", "isCorrect": false, "rationale": "The comparison is made to show that the dire state of the people (Israel, Persia, Athens) was a prerequisite for a great leader to emerge and redeem them, not to suggest inevitable domination."}, {"text": "That periods of extreme distress and oppression are necessary preconditions for a great leader to emerge and manifest their virtue.", "isCorrect": true, "rationale": "Machiavelli states, 'it was necessary that the people of Israel should be captive so as to make manifest the ability of Moses... then at the present time, in order to discover the virtue of an Italian spirit, it was necessary that Italy should be reduced to the extremity that she is now in.'"}, {"text": "That reliance on divine intervention is always more effective than human effort in times of crisis.", "isCorrect": false, "rationale": "While he acknowledges divine favor, he also stresses that 'God is not willing to do everything,' emphasizing the need for human action and free will."}], "id": "q02"}, {"question": "What is Machiavelli's assessment of Italian military virtue when it comes to armies, despite acknowledging individual Italian strength?", "options": [{"text": "He believes Italian soldiers are fundamentally cowardly in large formations.", "isCorrect": false, "rationale": "Machiavelli explicitly praises individual Italian strength, dexterity, and subtlety in duels and hand-to-hand combat, refuting the idea of fundamental cowardice."}, {"text": "He attributes their poor performance to a lack of proper equipment and training.", "isCorrect": false, "rationale": "While equipment and training are factors in military success, Machiavelli specifically blames 'the insufficiency of the leaders' and a lack of unity and obedience as the core problem."}, {"text": "He concludes that Italian armies fail due to insufficient leadership, lack of unity, and individuals refusing to yield to a single distinguished commander.", "isCorrect": true, "rationale": "The text states: 'this springs entirely from the insufficiency of the leaders, since those who are capable are not obedient, and each one seems to himself to know, there having never been any one so distinguished above the rest, either by valour or fortune, that others would yield to him.'"}, {"text": "He argues that Italy's climate and geography are unsuitable for maintaining large, effective armies.", "isCorrect": false, "rationale": "Machiavelli does not mention climate or geography as factors in Italian military weakness; his focus is on leadership and discipline."}], "id": "q03"}, {"question": "Machiavelli advises the 'illustrious house' to be 'provided with your own forces.' What is the primary justification he offers for this necessity?", "options": [{"text": "Foreign mercenaries are too expensive and deplete state treasuries.", "isCorrect": false, "rationale": "While expense might be a factor, Machiavelli's primary concern with mercenary or foreign troops in *The Prince* (and implied here) is their unreliability and potential disloyalty, not just their cost."}, {"text": "Native soldiers are inherently more skilled in combat than foreign infantry.", "isCorrect": false, "rationale": "He argues that 'singly they are good,' and 'altogether they will be much better when they find themselves commanded by their prince,' emphasizing loyalty and command over inherent skill advantage."}, {"text": "Only one's own citizens can provide the most faithful, truest, and best soldiers, defending the country with Italian valour.", "isCorrect": true, "rationale": "The text explicitly states: 'it is necessary before all things, as a true foundation for every enterprise, to be provided with your own forces, because there can be no more faithful, truer, or better soldiers.'"}, {"text": "Recruiting foreign soldiers would provoke other Italian states to unite against the liberator.", "isCorrect": false, "rationale": "Machiavelli's argument for 'own forces' is based on their intrinsic loyalty and effectiveness under a prince's command, not on preventing inter-Italian conflict."}], "id": "q04"}, {"question": "Machiavelli describes defects in both Spanish and Swiss infantry. What innovation does he propose based on these observations?", "options": [{"text": "Developing a cavalry force that combines the speed of the French with the discipline of the Swiss.", "isCorrect": false, "rationale": "Machiavelli's discussion explicitly focuses on infantry defects and the possibility of creating a 'new one' that overcomes these, not on cavalry innovation."}, {"text": "Inventing a new infantry that can resist cavalry and is not afraid of other infantry, thereby surpassing existing foreign models.", "isCorrect": true, "rationale": "He states, 'It is possible, therefore, knowing the defects of both these infantries, to invent a new one, which will resist cavalry and not be afraid of infantry; this need not create a new order of arms, but a variation upon the old.'"}, {"text": "Encouraging Italian soldiers to adopt the exact tactics of the Spanish infantry to exploit the weaknesses of the Swiss.", "isCorrect": false, "rationale": "He suggests a 'new one' based on understanding *both* Spanish and Swiss defects, not simply adopting one over the other."}, {"text": "Fortifying Italian cities to withstand prolonged sieges, rendering foreign infantry less effective.", "isCorrect": false, "rationale": "The text's focus is on offensive and defensive battlefield tactics for infantry, not primarily on siege warfare or fortifications."}], "id": "q05"}, {"question": "Machiavelli explicitly states, 'that war is just which is necessary, and arms are hallowed when there is no other hope but in them.' This statement serves to:", "options": [{"text": "Advocate for aggressive expansionism to secure Italy's future prosperity.", "isCorrect": false, "rationale": "The justification for war here is necessity and lack of other options for liberation, not aggressive expansionism."}, {"text": "Provide a moral and practical justification for the use of force to liberate Italy from its current desperate situation.", "isCorrect": true, "rationale": "This quote directly follows a discussion of Italy's suffering and the need for a liberator, framing the impending conflict as a righteous and unavoidable act of self-preservation and redemption."}, {"text": "Criticize past Italian leaders for their reluctance to engage in necessary warfare.", "isCorrect": false, "rationale": "While he critiques past leadership's military failures, this specific statement is a general principle for justifying the *future* liberation war, not a direct criticism of the past."}, {"text": "Discourage the 'illustrious house' from resorting to violence unless absolutely unavoidable.", "isCorrect": false, "rationale": "Machiavelli is encouraging the 'illustrious house' to take up arms, not dissuading them. He frames war as a 'hallowed' last resort in the face of absolute necessity, implying it is unavoidable in Italy's present circumstances."}], "id": "q06"}, {"question": "Regarding divine intervention, what is the role Machiavelli assigns to God and the liberator, respectively?", "options": [{"text": "God will handle all the difficult tasks, leaving only minor details for the liberator.", "isCorrect": false, "rationale": "Machiavelli explicitly states, 'God is not willing to do everything, and thus take away our free will and that share of glory which belongs to us,' indicating God provides opportunity, but humans must act."}, {"text": "God provides the extraordinary circumstances and opportunities, but the liberator must act decisively to secure the glory and complete the task.", "isCorrect": true, "rationale": "The text mentions extraordinary divine manifestations (divided sea, manna) and then states, 'everything has contributed to your greatness; you ought to do the rest. God is not willing to do everything, and thus take away our free will and that share of glory which belongs to us.'"}, {"text": "God chooses the liberator directly, removing any need for human effort or free will.", "isCorrect": false, "rationale": "Machiavelli emphasizes 'our free will' and 'that share of glory which belongs to us,' demonstrating that human agency is crucial despite divine favor."}, {"text": "Divine intervention is purely symbolic and has no real impact on the outcome of human endeavors.", "isCorrect": false, "rationale": "He lists specific 'ways of God' that 'have been manifested beyond example,' clearly indicating he sees divine intervention as real and impactful, providing opportunities."}], "id": "q07"}, {"question": "How does Machiavelli describe the anticipated reception of a liberator by the Italian people?", "options": [{"text": "Cautious optimism, tempered by skepticism due to past failures.", "isCorrect": false, "rationale": "Machiavelli describes an overwhelming emotional response, not cautious optimism. He predicts profound love, thirst for revenge, stubborn faith, devotion, and tears."}, {"text": "Widespread indifference, as they are weary from continuous conflict.", "isCorrect": false, "rationale": "The text refutes indifference, stating, 'Nor can one express the love with which he would be received... with what thirst for revenge, with what stubborn faith, with what devotion, with what tears.'"}, {"text": "Overwhelming love, enthusiasm, loyalty, and a thirst for revenge against foreign oppressors.", "isCorrect": true, "rationale": "Machiavelli's passionate rhetoric anticipates 'love,' 'thirst for revenge,' 'stubborn faith,' and 'devotion,' questioning, 'What Italian would refuse him homage?'"}, {"text": "Reluctance to obey, due to historical disunity among Italian states.", "isCorrect": false, "rationale": "He asks, 'Who would refuse obedience to him? What envy would hinder him?' implying that the people would readily obey and unite under a liberator."}], "id": "q08"}, {"question": "The inclusion of Petrarch's lines at the end of Chapter XXVI primarily serves what purpose?", "options": [{"text": "To provide a literary flourish that adds poetic beauty to the text without a deeper message.", "isCorrect": false, "rationale": "While poetic, Machiavelli uses the quote purposefully to reinforce his central argument about Italian potential."}, {"text": "To suggest that Italy's problems are too deeply rooted to be solved by military action alone.", "isCorrect": false, "rationale": "The quote's message, 'the old Roman valour is not dead,' supports the call for military action and liberation, not despair."}, {"text": "To emphasize that a new prince must prioritize cultural revival over political and military reforms.", "isCorrect": false, "rationale": "The quote speaks to 'valour' and 'fight,' directly linking to military and political action, not prioritizing cultural revival over other reforms."}, {"text": "To appeal to a sense of ancient Italian glory and inspire confidence that the inherent courage and 'virtue' needed for liberation still exist within the Italian people.", "isCorrect": true, "rationale": "The lines 'For the old Roman valour is not dead, Nor in th’ Italians’ brests extinguished' directly reinforce the idea that Italians possess the inherent virtue to overcome their present 'fury' (foreign oppression)."}], "id": "q09"}, {"question": "Machiavelli states, 'And nothing honours a man more than to establish new laws and new ordinances when he himself was newly risen.' What does this imply about the liberator's role beyond military success?", "options": [{"text": "The liberator's primary goal should be to restore the old order of things that once brought glory to Italy.", "isCorrect": false, "rationale": "The text explicitly states 'the old order of things was not good' and that 'none of us have known how to find a new one,' implying a need for radical change, not restoration of the old."}, {"text": "Military victory is sufficient for a prince's reputation and power; political reform is secondary.", "isCorrect": false, "rationale": "Machiavelli argues that establishing 'new laws and new ordinances' is what 'honours a man more' and will make him 'revered and admired,' indicating it's crucial for lasting reputation, not secondary."}, {"text": "The liberator must also act as a legislator, establishing new and effective political and social structures to ensure lasting stability and honor.", "isCorrect": true, "rationale": "This statement highlights that true honor and reverence come not just from military victory, but from implementing fundamental reforms ('new laws and new ordinances') that create a stable and dignified new order, a characteristic often associated with Machiavelli's ideal prince."}, {"text": "The liberator should delegate all law-making responsibilities to an assembly of citizens.", "isCorrect": false, "rationale": "The passage implies the prince himself ('he himself was newly risen') is responsible for establishing these new laws, not delegating the core task."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
