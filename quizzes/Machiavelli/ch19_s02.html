        <a href="../../courses/Machiavelli.html">&larr; Back to Powers and Principalities (Machiavelli)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 19, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the fundamental reason a prince must know how to fight both “by law” and “by force”?", "options": [{"text": "To impress his subjects with his diverse skills and capabilities.", "isCorrect": false, "rationale": "While a prince's skills might impress, Machiavelli's primary justification is pragmatic survival, not simply impression management."}, {"text": "Because relying solely on law makes a ruler vulnerable to those who use force and manipulation.", "isCorrect": true, "rationale": "The text explicitly states: 'But since law is often insufficient, a prince must know how to use force as well—and this means he must know how to be both man and beast.' and 'A ruler who uses only law will be manipulated by those who use force.'"}, {"text": "To demonstrate his intellectual superiority and strategic foresight over other rulers.", "isCorrect": false, "rationale": "The emphasis is on practical effectiveness and survival, not merely demonstrating intellectual superiority."}, {"text": "To alternate between popular and tyrannical rule based on shifting public opinion.", "isCorrect": false, "rationale": "This misrepresents the 'two ways to fight' concept, which is about combining human and animalistic qualities, not alternating between popularity and tyranny."}], "id": "q01"}, {"question": "The classical allusion to the centaur Chiron, who trained ancient heroes, is used by Machiavelli to emphasize which key aspect of leadership?", "options": [{"text": "The necessity of a prince being physically formidable and skilled in combat.", "isCorrect": false, "rationale": "While physical prowess might be part of force, the Chiron metaphor's deeper meaning encompasses broader qualities than just physical combat skill."}, {"text": "The importance of intellectual pursuits and classical education in a ruler's development.", "isCorrect": false, "rationale": "Chiron represents both man and beast, symbolizing the combination of reason and force, not just intellectual pursuits."}, {"text": "That effective rulers must combine human capacity for law and reason with animal capacity for force.", "isCorrect": true, "rationale": "The text states: 'The ancient educators, he implies, were pointing to a deeper truth about leadership—that the effective ruler must combine the human capacity for law and reason with the animal capacity for force.'"}, {"text": "The historical precedent for alliances between men and mythical creatures to achieve political goals.", "isCorrect": false, "rationale": "This is a literal interpretation that misses the metaphorical and symbolic meaning of the allusion in Machiavelli's argument."}], "id": "q02"}, {"question": "In Machiavelli's animal metaphor, a prince who is 'only a lion' is most vulnerable to what type of political challenge?", "options": [{"text": "Open rebellion and direct confrontation from his own subjects.", "isCorrect": false, "rationale": "A 'lion' is strong and drives off 'wolves' (open enemies), suggesting capability against direct threats like rebellion."}, {"text": "Direct military invasion from a quantitatively superior foreign power.", "isCorrect": false, "rationale": "The lion's strength is against 'wolves,' implying effectiveness against overt military threats, though not necessarily against overwhelming numerical superiority."}, {"text": "Deceptive stratagems and cunning traps set by wily opponents.", "isCorrect": true, "rationale": "The text explicitly states: 'A prince who is only a lion will be caught in traps set by cunning opponents,' as the lion 'cannot detect traps.'"}, {"text": "Loss of popular support due to perceived cruelty or tyranny.", "isCorrect": false, "rationale": "While possible, the specific vulnerability highlighted for a 'lion-only' prince in this context is inability to detect deception, not necessarily a loss of popular support."}], "id": "q03"}, {"question": "The 'Fox and Lion' metaphor primarily serves to illustrate which central idea about effective political leadership?", "options": [{"text": "That a ruler must prioritize military strength over diplomatic skill in all circumstances.", "isCorrect": false, "rationale": "The metaphor emphasizes the necessity of *both* strength (lion) and cunning (fox), not prioritizing one over the other in all situations."}, {"text": "That a prince must be capable of both overt aggression (raw power) and subtle deception (cunning) and know when to deploy each.", "isCorrect": true, "rationale": "The 'keyconcept' box states: 'The successful prince integrates both dispositions, recognizing that different situations call for different instruments.' The lion represents raw power, and the fox represents cunning."}, {"text": "That leaders should alternate between periods of war and periods of peace to maintain control.", "isCorrect": false, "rationale": "The metaphor concerns the *qualities* a leader must embody to respond to different types of challenges (open enemies vs. traps), not a cycle of war and peace."}, {"text": "That only the most ruthless and amoral rulers can survive in the dangerous world of politics.", "isCorrect": false, "rationale": "While the advice can seem ruthless, the core idea is about integrating specific political tools (power and cunning), not simply promoting amorality as an end."}], "id": "q04"}, {"question": "A prince forms an alliance, but a sudden, unforeseen shift in the geopolitical landscape makes upholding his treaty obligations highly detrimental to the survival of his state. Based on Machiavelli's controversial claim, what would he most likely advise the prince to do?", "options": [{"text": "Uphold the treaty at all costs to maintain a reputation for unwavering integrity and trustworthiness.", "isCorrect": false, "rationale": "Machiavelli explicitly warns against such naivety, arguing it leads to self-destruction in a dangerous political world."}, {"text": "Seek a new alliance quickly, but maintain the appearance of upholding the old one to avoid immediate retaliation.", "isCorrect": false, "rationale": "While appearances are important, the primary action Machiavelli advises in such a scenario is breaking faith itself when the circumstances demand it, not just maintaining the appearance of upholding the old one."}, {"text": "Break the promise, as 'the reasons that led him to give his word no longer exist' and his survival is paramount.", "isCorrect": true, "rationale": "Machiavelli states a prince 'should break them when 'such observance works against him and the reasons that led him to give his word no longer exist.'' This is a direct application of his controversial advice."}, {"text": "Resign from power, as he cannot honor his commitments without endangering his people, thus failing his duty.", "isCorrect": false, "rationale": "Machiavelli's entire philosophy is about how a prince can *retain* power and effectively govern in challenging circumstances, not to resign from it."}], "id": "q05"}, {"question": "Which of the following is *not* one of Machiavelli's explicit justifications for a prince breaking faith, as presented in the text?", "options": [{"text": "Great princes throughout history have successfully disregarded their promises through cunning.", "isCorrect": false, "rationale": "The text lists this as the first observation: 'great princes throughout history have 'set little store by their promises' and succeeded through cunning.'"}, {"text": "Other rulers will inevitably break their promises when it suits them, making a prince's absolute observance self-destructive.", "isCorrect": false, "rationale": "This is the second observation provided: 'other rulers will break their promises when it suits them, so naivety is not innocence but self-destruction.'"}, {"text": "Promise-breaking is inherently virtuous and demonstrates a prince's superior moral character.", "isCorrect": true, "rationale": "The text explicitly refutes this: 'Machiavelli is not saying that promise-breaking is good, or that contracts are worthless...' He sees it as a pragmatic necessity, not an inherent virtue."}, {"text": "Upholding promises when it works against a prince's interest is foolish in an anarchic political world.", "isCorrect": false, "rationale": "This is the core pragmatic justification: 'a ruler who treated his promises as absolute obligations regardless of consequences would be a fool, not a saint.'"}], "id": "q06"}, {"question": "Ferdinand of Aragon is presented as a master of 'political management' by Machiavelli primarily because he:", "options": [{"text": "Consolidated power through popular reforms and genuinely democratic processes.", "isCorrect": false, "rationale": "The text indicates Ferdinand used methods like expulsion and 'remorseless energy,' not democratic reforms."}, {"text": "Openly declared his strategic interests and territorial ambitions, regardless of moral implications.", "isCorrect": false, "rationale": "Ferdinand 'appears to act from faith while actually acting from strategic interest,' indicating he did not openly declare his true motivations."}, {"text": "Successfully maintained a reputation for religious devotion while pursuing self-serving territorial ambitions.", "isCorrect": true, "rationale": "The 'personbox' states: 'Ferdinand maintained his reputation for religious devotion while pursuing distinctly undevout ends, a combination that Machiavelli regards as masterful political management.'"}, {"text": "Prioritized ethical governance and the welfare of his subjects above all other strategic considerations.", "isCorrect": false, "rationale": "Ferdinand 'used religion as a justification for wars that primarily served his territorial ambitions,' not solely for the welfare of his subjects."}], "id": "q07"}, {"question": "What is the primary reason Machiavelli states that appearances matter more than reality in politics?", "options": [{"text": "To confuse foreign adversaries and maintain a strategic advantage in international relations.", "isCorrect": false, "rationale": "While appearances can aid in foreign policy, Machiavelli's primary explanation in this section focuses on how a ruler is perceived by his own people."}, {"text": "Because the common people judge a ruler based on what they perceive outwardly, lacking insight into true motivations.", "isCorrect": true, "rationale": "The text states: 'Everyone sees what you appear to be, few experience what you really are.' and 'The people judge by what they see; they cannot penetrate the mask of power...'"}, {"text": "To ensure that advisors and courtiers remain loyal through a combination of admiration and intimidation.", "isCorrect": false, "rationale": "The discussion on appearances focuses on the general populace's perception, not specifically on the loyalty of internal staff."}, {"text": "To cultivate a genuinely virtuous character over time through consistent public performance of virtues.", "isCorrect": false, "rationale": "Machiavelli states a prince 'need not possess all the virtues, but he must appear to possess them,' indicating appearance is distinct from actual possession."}], "id": "q08"}, {"question": "Beyond simply advocating for cynical deception, Machiavelli's 'deeper point' regarding the primacy of appearances is that a skillful prince can:", "options": [{"text": "Manipulate the historical record after his reign to ensure a favorable legacy.", "isCorrect": false, "rationale": "Machiavelli's discussion is about immediate political judgment and governance, not post-mortem historical revision."}, {"text": "Develop genuine virtues over time by consistently pretending to possess them, leading to self-improvement.", "isCorrect": false, "rationale": "The text implies a distinction between appearance and reality, not that appearance eventually creates reality within the ruler's character."}, {"text": "Create a constructed political reality through his public persona that shapes how he is perceived, trusted, and obeyed by his citizens.", "isCorrect": true, "rationale": "The text explicitly states: 'A prince who manages appearances skillfully creates a political reality—not a false one, but a constructed one that shapes how he is perceived, trusted, and obeyed.'"}, {"text": "Encourage absolute transparency and honesty among his subordinates while maintaining a carefully crafted public image himself.", "isCorrect": false, "rationale": "The text does not discuss the transparency of subordinates in this context."}], "id": "q09"}, {"question": "The 'caution' section at the end of the chapter emphasizes that Machiavelli's advice regarding controversial actions should primarily be understood as:", "options": [{"text": "A universal moral philosophy advocating for deception and ruthlessness as inherently good.", "isCorrect": false, "rationale": "The text directly states: 'Machiavelli is not saying that promise-breaking is good...'"}, {"text": "A cynical guide for personal pleasure and the accumulation of wealth and power.", "isCorrect": false, "rationale": "The text clarifies: 'He is not telling the prince to deceive for pleasure or profit.'"}, {"text": "A pragmatic description of what successful rulers actually do to ensure political survival in a dangerous world, rather than a prescriptive moral code.", "isCorrect": true, "rationale": "The text states: 'He is describing what successful rulers actually do, and arguing that political survival in a dangerous world sometimes requires managing appearances carefully.'"}, {"text": "A theoretical exploration of ideal governance, disconnected from practical political realities.", "isCorrect": false, "rationale": "Machiavelli's work is famously grounded in the practical and often harsh realities of 'Renaissance Italian politics.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
