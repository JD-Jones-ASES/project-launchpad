    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Machiavelli.html">&larr; Back to Powers and Principalities (Machiavelli)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 25, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Machiavelli, what was the fundamental reason Italian princes lost their states?", "options": [{"text": "They were victims of an unusually strong and unified foreign invasion.", "isCorrect": false, "rationale": "Machiavelli explicitly dismisses blaming fortune or irresistible forces, arguing that the princes had resources and warning, but chose not to act."}, {"text": "They were inadequate rulers who neglected critical principles of statecraft.", "isCorrect": true, "rationale": "The text states Machiavelli's 'verdict is harsh' and that princes lost their states 'not because they were unlucky but because they were inadequate,' having violated 'every principle that The Prince has been laying out.'"}, {"text": "They lacked access to advanced military technology compared to their invaders.", "isCorrect": false, "rationale": "The text focuses on their failure to build their own armies and reliance on mercenaries, not a technological disparity."}, {"text": "Their subjects were inherently disloyal and preferred foreign rule.", "isCorrect": false, "rationale": "Machiavelli attributes the lack of popular loyalty to the princes' own failure to win genuine support, not an inherent flaw in the subjects."}]}, {"question": "Which of the following did Machiavelli identify as a specific failure contributing to the downfall of Italian princes regarding their military?", "options": [{"text": "They invested too heavily in defensive fortifications instead of offensive campaigns.", "isCorrect": false, "rationale": "The text does not mention over-investment in fortifications. Instead, it highlights their reliance on external forces."}, {"text": "They relied primarily on mercenaries and auxiliaries, failing to build their own national armies.", "isCorrect": true, "rationale": "Machiavelli explicitly states, 'The Italian princes relied on mercenaries and auxiliaries—the very forces Machiavelli condemned in Chapters XII and XIII.'"}, {"text": "They underestimated the importance of naval power in protecting their coastal states.", "isCorrect": false, "rationale": "The text focuses on land armies and general military preparedness, not specifically naval power."}, {"text": "They exhausted their treasuries on elaborate court life, leaving no funds for military spending.", "isCorrect": false, "rationale": "While possibly true, this specific financial misstep is not listed among the 'Specific Failures' Machiavelli identifies in the provided text."}]}, {"question": "Machiavelli's concept of 'No popular loyalty' implies that a prince's subjects:", "options": [{"text": "Are inherently rebellious and difficult to control, regardless of the ruler.", "isCorrect": false, "rationale": "Machiavelli blames the prince for not winning support, implying loyalty is cultivable, not an inherent difficulty."}, {"text": "Will not actively resist an invader if they feel no genuine connection or stake in their ruler's survival.", "isCorrect": true, "rationale": "The text states, 'A prince who has not won the genuine support of his people cannot rely on them to resist an invader. The Italian subjects... offered little active resistance.'"}, {"text": "Are primarily concerned with economic prosperity and will support any ruler who ensures it.", "isCorrect": false, "rationale": "While economic prosperity can contribute to loyalty, Machiavelli emphasizes 'genuine support' and 'stake in the survival of their rulers,' not solely economic factors."}, {"text": "Are more loyal to their local lords and cities than to the overarching prince of the state.", "isCorrect": false, "rationale": "The text discusses general popular loyalty to 'their rulers,' not a specific preference for local lords over princes."}]}, {"question": "What is Machiavelli's primary criticism of the Italian princes' approach to 'preparation for adversity'?", "options": [{"text": "They failed to form strong alliances with other Italian states.", "isCorrect": false, "rationale": "While perhaps a contributing factor, Machiavelli's specific criticism regarding preparedness is not about alliances but about internal readiness."}, {"text": "They did not prepare for potential attacks during periods of peace, assuming good times would last indefinitely.", "isCorrect": true, "rationale": "The text highlights this as 'The great error...they did not prepare during the years of peace... They lived as if the good times would continue indefinitely.'"}, {"text": "They over-prepared for minor internal rebellions, diverting resources from external threats.", "isCorrect": false, "rationale": "The text describes a general lack of preparation, not misdirected over-preparation."}, {"text": "They underestimated the religious fervor of their invading enemies.", "isCorrect": false, "rationale": "Religious fervor is not mentioned as a factor in their lack of preparation."}]}, {"question": "How does Machiavelli view the defeated Italian princes' tendency to 'blame fortune' for their losses?", "options": [{"text": "He acknowledges that fortune plays a significant, often decisive, role in political outcomes.", "isCorrect": false, "rationale": "While he mentions fortune governs 'roughly half,' he 'dismisses this as a comforting delusion' when used as an excuse for failure."}, {"text": "He sees it as a pragmatic acceptance of uncontrollable circumstances.", "isCorrect": false, "rationale": "He views it as a 'comforting delusion,' not a pragmatic acceptance."}, {"text": "He considers it a self-exculpatory delusion that ignores their own failures in areas within human control.", "isCorrect": true, "rationale": "The text states he 'dismisses this as a comforting delusion,' arguing they 'failed not in the domain of fortune but in the domain where their own choices and preparations would have made a difference.'"}, {"text": "He believes it reflects a wise understanding of the limits of human agency.", "isCorrect": false, "rationale": "This contradicts his stance that their failures were in areas within their control, implying a lack of agency rather than understanding its limits."}]}, {"question": "The 'keyconcept Preparedness' section states that Machiavelli's lesson 'applies beyond principalities.' This suggests that:", "options": [{"text": "Only large, complex organizations can truly understand and implement Machiavellian principles.", "isCorrect": false, "rationale": "The text indicates a 'universal feature,' not one limited to large organizations."}, {"text": "His insights on preparing for adversity during peace are relevant to any political or organizational entity.", "isCorrect": true, "rationale": "The text explicitly says it describes a 'universal feature of political and organizational life' and is a 'recurring pattern in political history' beyond 'sixteenth-century Italy.'"}, {"text": "Princes should study the strategies of foreign empires to better protect their own states.", "isCorrect": false, "rationale": "While studying enemies is generally wise, the 'Preparedness' concept's universality refers to the principle itself, not specific foreign strategies."}, {"text": "The principles are only truly applicable in times of extreme crisis, not everyday governance.", "isCorrect": false, "rationale": "The concept emphasizes preparation *during peace* to prevent or mitigate crisis, not just reacting during crisis."}]}, {"question": "Machiavelli's contempt for princes who resorted to flight during crisis stems from his belief that:", "options": [{"text": "Such princes typically become mercenaries themselves, further diminishing their honor.", "isCorrect": false, "rationale": "The text does not mention them becoming mercenaries."}, {"text": "A ruler who abandons his state demonstrates unworthiness and rarely recovers what was lost, as invaders consolidate power.", "isCorrect": true, "rationale": "Machiavelli states, 'A prince who abandons his state... has already demonstrated that he does not deserve to hold it. And the calculation that he can recover it later usually proves wrong: an invader... has time to consolidate, create new loyalties...'"}, {"text": "Flight encourages subjects to rebel against any future attempts at governance.", "isCorrect": false, "rationale": "While a consequence, Machiavelli's primary contempt is for the prince's demonstrated unworthiness and the unlikelihood of recovery."}, {"text": "It is always more honorable to die defending one's state than to flee.", "isCorrect": false, "rationale": "Machiavelli's focus is on practical statecraft and the effectiveness of strategies, not purely on personal honor in death."}]}, {"question": "How does Chapter XXIV connect to the overall purpose and structure of *The Prince*?", "options": [{"text": "It introduces entirely new concepts and arguments not covered in previous chapters.", "isCorrect": false, "rationale": "The text explicitly states it is 'a synthesis' that 'gathers up the specific prescriptions of the earlier chapters.'"}, {"text": "It serves as a synthesis, providing negative case studies to illustrate the consequences of ignoring earlier prescriptions.", "isCorrect": true, "rationale": "The text states Chapter XXIV 'is best read as a synthesis: it gathers up the specific prescriptions... and shows what happens when those prescriptions are ignored. The Italian princes are case studies in negative examples.'"}, {"text": "It primarily functions as a historical chronicle of the Italian wars, separate from Machiavelli's political theory.", "isCorrect": false, "rationale": "It's presented as Machiavelli 'delivering a verdict' and applying his arguments, not just a chronicle."}, {"text": "It marks a definitive shift in Machiavelli's philosophy, moving away from practical advice.", "isCorrect": false, "rationale": "It reinforces practical advice by showing the consequences of ignoring it, and also serves as a 'bridge to what follows' on fortune and free will."}]}, {"question": "The 'note' section about Machiavelli's personal context reveals that his diagnosis of Italian failures was partly a 'self-diagnosis.' This implies that:", "options": [{"text": "Machiavelli himself was a failed prince who lost his state due to similar errors.", "isCorrect": false, "rationale": "Machiavelli served Florence's leaders, he was not a prince himself, though he lost his position when Florence fell."}, {"text": "He recognized that Florence's leaders, whom he served, might also have made similar mistakes.", "isCorrect": true, "rationale": "The text states, 'His diagnosis is therefore also, in part, a self-diagnosis: what did Florence's leaders—including the men Machiavelli served—fail to do?'"}, {"text": "He believed his own military strategies had contributed to the downfall of Italian states.", "isCorrect": false, "rationale": "The text does not mention his military strategies, but his role serving Florence's leaders."}, {"text": "He was attempting to exculpate himself from responsibility for the political catastrophe.", "isCorrect": false, "rationale": "A 'self-diagnosis' suggests an examination of his own context's failures, not an attempt to escape blame."}]}, {"question": "By stating that Italian failures were 'self-inflicted rather than purely a matter of bad luck,' Machiavelli sets the stage for the next chapter which addresses:", "options": [{"text": "The specific military tactics required to repel foreign invaders.", "isCorrect": false, "rationale": "While tactics are important, the text explicitly states the next chapter concerns 'the philosophical question of how much of political life is within human control at all—the problem of fortune and free will.'"}, {"text": "The economic reforms necessary to strengthen a state's finances.", "isCorrect": false, "rationale": "Economic reforms are not mentioned as the topic for the subsequent chapter."}, {"text": "The philosophical debate on the balance between human control (free will) and external circumstances (fortune) in political life.", "isCorrect": true, "rationale": "The text explicitly states this chapter 'serves as a bridge to what follows... Machiavelli turns in the next chapter to the philosophical question of how much of political life is within human control at all—the problem of fortune and free will.'"}, {"text": "The psychological profiles of successful and unsuccessful rulers.", "isCorrect": false, "rationale": "While related to choices, the direct topic mentioned is fortune and free will, not ruler psychology."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
