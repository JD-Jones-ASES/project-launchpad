        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Machiavelli.html">&larr; Back to Powers and Principalities (Machiavelli)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Powers and Principalities (Machiavelli) &mdash; Chapter 15, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the *sole* art that a prince ought to have as his aim or study?", "options": [{"text": "Diplomacy and forming strong alliances.", "isCorrect": false, "rationale": "While important for a prince, Machiavelli explicitly states that war is the *sole* art he should study, implying other pursuits are secondary."}, {"text": "The art of war, its rules, and discipline.", "isCorrect": true, "rationale": "Machiavelli unequivocally declares, 'A prince ought to have no other aim or thought, nor select anything else for his study, than war and its rules and discipline; for this is the sole art that belongs to him who rules.'"}, {"text": "Economic development and increasing state wealth.", "isCorrect": false, "rationale": "Economic strength can support war, but it is not identified as the prince's 'sole art' or primary study."}, {"text": "Cultivating popular support and maintaining social harmony.", "isCorrect": false, "rationale": "These are desirable outcomes for a prince, but Machiavelli frames them as often consequences of strength in arms, not the primary art itself."}]}, {"question": "What does Machiavelli identify as the *first cause* of a prince losing his state, and a primary consequence of being unarmed?", "options": [{"text": "Excessive taxation leading to public unrest.", "isCorrect": false, "rationale": "While public unrest can destabilize a state, Machiavelli directly states that neglecting the art of war is the 'first cause' of losing a state."}, {"text": "Failing to secure advantageous trade agreements.", "isCorrect": false, "rationale": "Trade is not mentioned as a direct cause of losing a state in this passage, nor is it related to being unarmed."}, {"text": "Neglecting the art of war, leading to being despised and unable to rely on soldiers.", "isCorrect": true, "rationale": "The text explicitly states, 'And the first cause of your losing it is to neglect this art; and what enables you to acquire a state is to be master of the art.' It also adds that being unarmed 'causes you to be despised' and prevents reliance on soldiers."}, {"text": "Focusing too much on the welfare of his subjects.", "isCorrect": false, "rationale": "This is not presented as a cause for losing a state; rather, a prince's primary focus should be on military strength."}]}, {"question": "In terms of 'action,' which activity does Machiavelli most strongly recommend a prince undertake during peacetime to accustom his body to hardships and learn about localities?", "options": [{"text": "Participating in elaborate court dances and physical competitions.", "isCorrect": false, "rationale": "Courtly activities do not directly relate to military hardships or geographical knowledge as Machiavelli describes."}, {"text": "Overseeing the construction of new public works projects.", "isCorrect": false, "rationale": "Construction projects are civic, not military training for the prince's body or geographical understanding in a military context."}, {"text": "Incessantly following the chase (hunting) to learn the nature of the country.", "isCorrect": true, "rationale": "Machiavelli states, 'As regards action, he ought above all things to keep his men well organized and drilled, to follow incessantly the chase, by which he accustoms his body to hardships, and learns something of the nature of localities...'"}, {"text": "Engaging in long hours of intellectual study indoors.", "isCorrect": false, "rationale": "While intellectual study is recommended 'by study,' this option refers to 'action' and physical outdoor activity."}]}, {"question": "How does a prince's knowledge of his own country's geography (mountains, valleys, rivers, marshes) prove useful for understanding *other* localities?", "options": [{"text": "It helps him identify new resources for economic exploitation in distant lands.", "isCorrect": false, "rationale": "The passage emphasizes military applications, not economic resource identification in other countries."}, {"text": "It allows him to create universal maps that can be applied to any terrain without further study.", "isCorrect": false, "rationale": "The passage indicates 'resemblance,' not identical duplication, and still requires 'study hereafter' for new localities."}, {"text": "Because the features of one country resemble those of others, enabling easy understanding of new territories for military operations.", "isCorrect": true, "rationale": "The text explains, 'because the hills, valleys, and plains, and rivers and marshes that are, for instance, in Tuscany, have a certain resemblance to those of other countries, so that with a knowledge of the aspect of one country one can easily arrive at a knowledge of others' for purposes like 'surprise his enemy, to select quarters, to lead armies, to array the battle, to besiege towns to advantage.'"}, {"text": "Such detailed knowledge makes him a respected scholar, which aids in diplomatic negotiations.", "isCorrect": false, "rationale": "The benefit described is tactical and strategic military advantage, not diplomatic respect for scholarship."}]}, {"question": "The example of Francesco Sforza, who became Duke of Milan through being martial, versus his sons, who lost their states by avoiding the hardships of arms, best illustrates which of Machiavelli's arguments?", "options": [{"text": "The inherent instability of hereditary rule.", "isCorrect": false, "rationale": "The passage attributes the sons' loss to their neglect of arms, not to hereditary rule itself being unstable."}, {"text": "That military strength is essential not only to acquire a state but also to uphold and maintain it.", "isCorrect": true, "rationale": "Sforza acquired his state through martial prowess, while his sons lost theirs by avoiding military discipline, directly supporting the idea that arms are crucial for both acquisition and maintenance."}, {"text": "The importance of a prince focusing on ease and comfort in peacetime.", "isCorrect": false, "rationale": "This directly contradicts the lesson of the example, as the sons lost their states precisely because they 'thought more of ease than of arms.'"}, {"text": "The inevitable decline of military skills over generations.", "isCorrect": false, "rationale": "The decline was due to choices (avoiding hardships), not an inevitable generational process."}]}, {"question": "How does Machiavelli recommend a prince 'exercise the intellect' in relation to the art of war?", "options": [{"text": "By engaging in frequent public debates on military strategy.", "isCorrect": false, "rationale": "While strategic discussion is beneficial (as with Philopoemen), the primary method for 'exercising the intellect' described here is through historical study and imitation."}, {"text": "By commissioning original military manuals and theories from his advisors.", "isCorrect": false, "rationale": "The text focuses on studying *past* actions and illustrious men, not creating new manuals."}, {"text": "By reading histories and studying the actions of illustrious men, examining causes of victory and defeat.", "isCorrect": true, "rationale": "Machiavelli states, 'But to exercise the intellect the prince should read histories, and study there the actions of illustrious men, to see how they have borne themselves in war, to examine the causes of their victories and defeat, so as to avoid the latter and imitate the former.'"}, {"text": "By practicing strategic board games and simulations.", "isCorrect": false, "rationale": "This is a modern interpretation; the text specifically advises reading histories and studying past figures."}]}, {"question": "What is the primary psychological reason Machiavelli gives for why an armed man will not willingly obey an unarmed man, or why an unarmed man cannot be secure among armed servants?", "options": [{"text": "The armed man is inherently more physically powerful and therefore superior.", "isCorrect": false, "rationale": "While physical power is a factor, Machiavelli emphasizes the relational psychological dynamic more than just raw physical strength."}, {"text": "There is 'disdain' in the armed and 'suspicion' in the unarmed, preventing effective cooperation.", "isCorrect": true, "rationale": "The text directly states: 'Because, there being in the one disdain and in the other suspicion, it is not possible for them to work well together.'"}, {"text": "Unarmed leaders often make irrational decisions under pressure.", "isCorrect": false, "rationale": "This is not the specific reason Machiavelli provides for the power imbalance and lack of respect."}, {"text": "Armed men are naturally more loyal to each other than to an unarmed prince.", "isCorrect": false, "rationale": "The issue is not inherent loyalty among armed men, but the respect (or lack thereof) for an unarmed commander."}]}, {"question": "Philopoemen, Prince of the Achaeans, is praised for constantly discussing hypothetical military scenarios with friends during peacetime. What did Machiavelli believe was the main benefit of this practice?", "options": [{"text": "It allowed him to identify potential traitors within his inner circle.", "isCorrect": false, "rationale": "The text focuses on strategic preparedness, not counter-intelligence in this context."}, {"text": "It developed his ability to deal with any unexpected circumstances that might arise in time of war.", "isCorrect": true, "rationale": "The text states, 'so that by these continual discussions there could never arise, in time of war, any unexpected circumstances that he could not deal with.'"}, {"text": "It demonstrated his humility and willingness to listen to others' opinions.", "isCorrect": false, "rationale": "While he listened, the primary benefit emphasized was practical preparedness for war, not a character trait for its own sake."}, {"text": "It served as a form of entertainment to pass the time during peace.", "isCorrect": false, "rationale": "The discussions were serious intellectual exercises for military preparation, not mere entertainment."}]}, {"question": "Machiavelli emphasizes the imitation of great historical figures (like Alexander imitating Achilles, Scipio imitating Cyrus). What is the core lesson a prince should derive from this practice?", "options": [{"text": "That simply mimicking the tactics of the past will guarantee victory in modern warfare.", "isCorrect": false, "rationale": "The focus is on emulating virtues and understanding causes of success/failure, not blindly copying tactics, which may not be suitable for new contexts."}, {"text": "That a prince must strive to surpass the achievements of all who came before him.", "isCorrect": false, "rationale": "Imitation is about learning and cultivating similar qualities, not necessarily surpassing. Scipio's glory was in *conforming* to Cyrus's virtues."}, {"text": "That by carefully studying and emulating the virtues and actions of illustrious predecessors, a prince can cultivate the qualities necessary for his own success.", "isCorrect": true, "rationale": "The text advises studying their actions to 'avoid the latter and imitate the former' (victories) and notes how Scipio 'conformed to those things which have been written of Cyrus' in virtues like 'chastity, affability, humanity, and liberality.'"}, {"text": "That only those born into royalty are capable of truly great leadership.", "isCorrect": false, "rationale": "The text mentions men rising from private stations, contradicting this idea."}]}, {"question": "Machiavelli concludes by advising a wise prince to 'never in peaceful times stand idle, but increase his resources with industry.' What is the ultimate purpose of this continuous preparation?", "options": [{"text": "To accumulate enough wealth to live a life of comfort and ease.", "isCorrect": false, "rationale": "The passage explicitly warns against princes thinking 'more of ease than of arms.'"}, {"text": "To demonstrate his power and deter all potential enemies from ever attacking.", "isCorrect": false, "rationale": "While deterrence is a benefit, the ultimate goal is more about internal preparedness for inevitable challenges."}, {"text": "So that if fortune chances, it may find him prepared to resist her blows.", "isCorrect": true, "rationale": "This is a direct quote from the concluding sentence, highlighting the ultimate goal of being ready for any adversity that fortune might bring."}, {"text": "To secure his legacy as the most industrious ruler in history.", "isCorrect": false, "rationale": "Personal legacy is not the primary strategic goal Machiavelli outlines for this constant industry; rather, it's about the security and maintenance of the state."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
