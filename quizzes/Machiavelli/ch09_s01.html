<script>
var QUESTIONS = [{"question": "According to Machiavelli, what is the fundamental distinction he draws regarding rulers who acquire power through wicked methods?", "options": [{"text": "Wickedness is always a sign of weakness, whereas virtù indicates true strength.", "isCorrect": false, "rationale": "Machiavelli explicitly states that wicked methods can succeed, and his analysis focuses on how some rulers 'succeed' despite their wickedness, contradicting the idea that it's always a sign of weakness."}, {"text": "There is a difference between effective wickedness that gains empire and the virtù that produces lasting political greatness and glory.", "isCorrect": true, "rationale": "The text states, 'He draws a careful and important distinction between effective wickedness and the kind of virtù that produces lasting political greatness.' This highlights that wickedness can gain power (empire), but lacks the 'glory' and 'greatness' associated with true virtù."}, {"text": "Only rulers who acquire power through the favor of their citizens can achieve true virtù.", "isCorrect": false, "rationale": "While 'favor of his fellow-citizens' is one way to become a prince, the text focuses on 'wicked or nefarious ways' and the distinction is specifically about wickedness versus virtù, not exclusively linking virtù to popular support."}, {"text": "Wickedness is a temporary measure, while virtù ensures immediate and permanent public adoration.", "isCorrect": false, "rationale": "Machiavelli shows examples like Agathocles who maintained power for a long time through wickedness. He also notes that virtù produces 'lasting political greatness,' but 'immediate and permanent public adoration' is too strong and not directly supported."}], "id": "q01"}, {"question": "Which two historical figures does Machiavelli use as primary examples to illustrate how princes may ascend to power through wicked means?", "options": [{"text": "Cesare Borgia and Pagolo Vitelli", "isCorrect": false, "rationale": "While Cesare Borgia and Pagolo Vitelli are mentioned, they are not the primary examples used to illustrate the *acquisition* of power through wickedness in this chapter. Cesare Borgia is mentioned as the one who eventually defeated Oliverotto, and Pagolo Vitelli was Oliverotto's mentor."}, {"text": "Agathocles of Syracuse and Giovanni Fogliani", "isCorrect": false, "rationale": "Giovanni Fogliani was Oliverotto's uncle and victim, not a ruler who ascended to power through wickedness in the context of Machiavelli's examples."}, {"text": "Agathocles of Syracuse and Oliverotto da Fermo", "isCorrect": true, "rationale": "The text explicitly introduces Agathocles as the 'ancient' example and Oliverotto da Fermo as the 'modern' example of rulers who ascended to principality through 'wicked or nefarious ways'."}, {"text": "Amilcar the Carthaginian and Alexander the Sixth", "isCorrect": false, "rationale": "Amilcar was an adversary of Agathocles, and Pope Alexander VI was the contemporary ruler during Oliverotto's time; neither is presented as a primary example of gaining power through wickedness here."}], "id": "q02"}, {"question": "According to Machiavelli, despite Agathocles's 'barbarous cruelty and inhumanity,' what qualities contributed to his ability to successfully defend his city and maintain his princedom for a long time?", "options": [{"text": "His unwavering moral integrity and commitment to justice.", "isCorrect": false, "rationale": "The text explicitly states Agathocles led an 'infamous life' and his methods 'cannot be called talent to slay fellow-citizens, to deceive friends, to be without faith, without mercy, without religion,' directly contradicting any notion of moral integrity."}, {"text": "His reliance on fortune and the favor of foreign allies.", "isCorrect": false, "rationale": "Machiavelli notes that 'nothing, or little, which can be attributed to fortune' and he rose 'not by the favour of any one,' making this option incorrect. He also battled, rather than relied on, the Carthaginians initially."}, {"text": "His ability of mind and body, courage, and greatness of mind in enduring hardships, coupled with the proper use of severities.", "isCorrect": true, "rationale": "The text states he 'accompanied his infamies with so much ability of mind and body' and mentions his 'courage... together with his greatness of mind in enduring and overcoming hardships.' It also later implies his longevity was due to 'properly used' severities ('as Agathocles did')."}, {"text": "His popular support among the citizens of Syracuse due to his benevolent rule.", "isCorrect": false, "rationale": "Agathocles seized power by killing 'all the senators and the richest of the people,' which is contrary to gaining popular support through benevolent rule. His rule was based on fear and calculated cruelty, not benevolence."}], "id": "q03"}, {"question": "How does Machiavelli ultimately evaluate Agathocles's accomplishments, despite his military successes and ability to hold power?", "options": [{"text": "He considers Agathocles an exemplary prince due to his military genius and lasting security.", "isCorrect": false, "rationale": "While acknowledging his military ability, Machiavelli explicitly states, 'his barbarous cruelty and inhumanity with infinite wickedness do not permit him to be celebrated among the most excellent men,' and 'What he achieved cannot be attributed either to fortune or genius,' meaning he is not considered exemplary in the full sense of a great prince."}, {"text": "He concludes that Agathocles's methods gained him empire, but not true glory or the esteem of excellent men, as they lacked virtù.", "isCorrect": true, "rationale": "The text states, 'such methods may gain empire, but not glory. Still, if the courage of Agathocles...be considered... it cannot be seen why he should be esteemed less than the most notable captain. Nevertheless, his barbarous cruelty...do not permit him to be celebrated among the most excellent men.' This perfectly captures the nuance: he achieved power but not honorable glory."}, {"text": "He praises Agathocles for overcoming his humble origins and establishing a just government.", "isCorrect": false, "rationale": "Agathocles's rise was not marked by justice but by murder and treachery. Machiavelli never praises him for establishing a 'just government'."}, {"text": "He dismisses Agathocles's reign as a failure due to constant external warfare and internal rebellion.", "isCorrect": false, "rationale": "Agathocles successfully defended his city and subdued the Carthaginians, and the text notes he was 'never be conspired against by his own citizens,' indicating a secure, rather than failed, reign."}], "id": "q04"}, {"question": "What was the ultimate cause of Oliverotto da Fermo's downfall, as described by Machiavelli?", "options": [{"text": "A widespread rebellion by the citizens of Fermo who were tired of his tyranny.", "isCorrect": false, "rationale": "The text states that Oliverotto 'killed all the malcontents who were able to injure him, and strengthened himself with new civil and military ordinances, in such a way that, in the year during which he held the principality, not only was he secure in the city of Fermo, but he had become formidable to all his neighbours.' This indicates internal security, not rebellion."}, {"text": "His failure to use severities properly, leading to a loss of public trust and increasing instability.", "isCorrect": false, "rationale": "The text implies Oliverotto *did* use severities properly, stating 'his destruction would have been as difficult as that of Agathocles if he had not allowed himself to be overreached by Cesare Borgia,' suggesting his internal management of cruelty was effective."}, {"text": "He was outmaneuvered and captured by Cesare Borgia through a deceptive act.", "isCorrect": true, "rationale": "The text explicitly states: 'his destruction would have been as difficult as that of Agathocles if he had not allowed himself to be overreached by Cesare Borgia, who took him with the Orsini and Vitelli at Sinigalia.'"}, {"text": "He voluntarily abdicated his power due to remorse over his wicked actions.", "isCorrect": false, "rationale": "There is no indication of Oliverotto abdicating or showing remorse; he was 'strangled' after being captured."}], "id": "q05"}, {"question": "According to Machiavelli, what defines 'properly used' severities for a usurper seeking to secure a new state?", "options": [{"text": "They are few in number at first but gradually increase over time to maintain fear.", "isCorrect": false, "rationale": "This describes 'badly employed' severities, which 'multiply with time rather than decrease.' Machiavelli advises against this approach."}, {"text": "They are applied at one blow, are necessary for security, and are not persisted in unless for the subjects' advantage.", "isCorrect": true, "rationale": "The text clearly defines 'properly used' severities as those 'applied at one blow and are necessary to one’s security, and that are not persisted in afterwards unless they can be turned to the advantage of the subjects.'"}, {"text": "They are only employed against foreign enemies, never against one's own citizens.", "isCorrect": false, "rationale": "Both Agathocles and Oliverotto gained power by brutally killing their own citizens/senators/chiefs, which Machiavelli analyzes as a method of securing power, even if wicked. The distinction is in *how* these acts are carried out, not against whom."}, {"text": "They involve constant, visible displays of force to remind subjects of the prince's power.", "isCorrect": false, "rationale": "This contradicts the idea of not persisting in severities and trying to reassure subjects after the initial blow. Constant displays of force would unsettling rather than reassuring."}], "id": "q06"}, {"question": "A newly appointed governor decides to make an example of a few corrupt officials by executing them publicly, then dedicates the next few years to improving infrastructure and providing public services. Based on Machiavelli's advice on severities, what would be the likely outcome for this governor?", "options": [{"text": "The governor will likely face increasing resistance and rebellion as the initial cruel acts are never forgotten.", "isCorrect": false, "rationale": "Machiavelli argues that if severities are 'applied at one blow' and not 'persisted in afterwards unless they can be turned to the advantage of the subjects,' they can actually 'reassure them, and win them to himself by benefits.' This scenario aligns with 'properly used' severities."}, {"text": "The governor's rule will be unstable because benefits given after harsh measures are always seen as forced and ineffective.", "isCorrect": false, "rationale": "Machiavelli warns against changing *due to necessity in troubled times*, but if the harsh measures are done 'at one stroke' and then followed by benefits, the subjects can be 'reassured' and 'won over.' Benefits given 'little by little' are also encouraged."}, {"text": "The governor has a good chance of maintaining power securely because the initial harshness was swift and followed by benefits.", "isCorrect": true, "rationale": "This scenario perfectly illustrates Machiavelli's advice for 'properly used' severities: 'do them all at one stroke so as not to have to repeat them daily; and thus by not unsettling men he will be able to reassure them, and win them to himself by benefits.'"}, {"text": "The governor will only succeed if he continues to use arbitrary executions sporadically to keep the populace in fear.", "isCorrect": false, "rationale": "This describes 'badly employed' severities, which 'multiply with time rather than decrease' and make it 'impossible' to maintain themselves, as subjects cannot attach themselves to a ruler 'owing to their continued and repeated wrongs.'"}], "id": "q07"}, {"question": "Which of the following best summarizes Machiavelli's advice on the timing and distribution of injuries and benefits?", "options": [{"text": "Injuries and benefits should both be applied gradually over time to avoid shocking the populace.", "isCorrect": false, "rationale": "Machiavelli advises against gradual injuries, stating they 'multiply with time rather than decrease' and makes a ruler 'always compelled to keep the knife in his hand.' He advises against giving benefits all at once, preferring 'little by little.'"}, {"text": "Benefits should be given all at once to make a grand impression, while injuries should be spread out to minimize their impact.", "isCorrect": false, "rationale": "This is the inverse of Machiavelli's advice. He suggests 'injuries ought to be done all at one time' and 'benefits ought to be given little by little.'"}, {"text": "Injuries should be inflicted all at one time to be tasted less and offend less, and benefits given little by little so their flavor lasts longer.", "isCorrect": true, "rationale": "This directly quotes Machiavelli's concluding advice: 'For injuries ought to be done all at one time, so that, being tasted less, they offend less; benefits ought to be given little by little, so that the flavour of them may last longer.'"}, {"text": "A prince should avoid both injuries and benefits, striving for a neutral and impartial rule.", "isCorrect": false, "rationale": "Machiavelli clearly believes that both injuries and benefits are tools a prince must use to secure and maintain power, not avoid. His focus is on *how* they are used."}], "id": "q08"}, {"question": "While both Agathocles and Oliverotto seized power through extreme wickedness, a key difference in their ultimate fates illustrates which of the following lessons, according to the text?", "options": [{"text": "Only ancient rulers could truly secure their states through wickedness, as modern times demand more traditional morality.", "isCorrect": false, "rationale": "Machiavelli presents Oliverotto as a 'modern' example, and explicitly states his 'destruction would have been as difficult as that of Agathocles if he had not allowed himself to be overreached by Cesare Borgia,' suggesting modern wickedness could be as effective if not for external factors."}, {"text": "Even a ruler who effectively uses severities can be undone by a more cunning and powerful external adversary.", "isCorrect": true, "rationale": "Agathocles secured his state long-term and defended against external foes, indicating mastery over internal and external threats through his methods. Oliverotto, who also managed his internal state effectively, was ultimately 'overreached by Cesare Borgia,' highlighting that even properly managed wickedness can be vulnerable to a superior external force or deception."}, {"text": "A prince who murders his own family members is always destined for a quicker downfall than one who only targets rivals.", "isCorrect": false, "rationale": "While Oliverotto murdered his uncle, the text attributes his downfall to Cesare Borgia, not specifically to the familial nature of his parricide as the *cause* of a quicker downfall compared to Agathocles's broader killings."}, {"text": "The long-term success of wicked rule depends solely on the ruler's initial military strength, not on political cunning.", "isCorrect": false, "rationale": "Both examples, and Machiavelli's advice on 'properly used severities,' emphasize political cunning, strategy, and management of popular sentiment (even through fear and reassurance) as crucial for maintaining power, not just initial military strength."}], "id": "q09"}, {"question": "What is the broader implication of Machiavelli's analysis of 'principality by wickedness' concerning the nature of political leadership?", "options": [{"text": "Moral rectitude and adherence to traditional virtues are always prerequisites for effective and lasting political power.", "isCorrect": false, "rationale": "Machiavelli explicitly analyzes how rulers like Agathocles, despite infinite treacheries and cruelties, can live long and secure. He distinguishes between virtù (which includes moral aspects) and effective wickedness, showing that the latter can achieve power, challenging the idea that moral rectitude is always a prerequisite."}, {"text": "Political success is primarily a matter of luck and fortune, with a leader's actions having little impact.", "isCorrect": false, "rationale": "The text notes of Agathocles that 'nothing, or little, which can be attributed to fortune' and heavily emphasizes the leader's 'ability of mind and body,' 'courage,' 'greatness of mind,' and the strategic 'proper use of severities,' all indicating a strong impact of the leader's actions."}, {"text": "Political effectiveness and the acquisition of power can sometimes necessitate, and even succeed through, actions traditionally considered immoral, distinct from true glory or virtù.", "isCorrect": true, "rationale": "Machiavelli carefully distinguishes between 'effective wickedness' that gains 'empire' and the 'virtù that produces lasting political greatness and glory.' His analysis accepts that wicked methods 'can succeed' in acquiring and holding power, even if they don't lead to glory or moral esteem, thus separating political effectiveness from traditional morality."}, {"text": "Leaders who employ wicked means will inevitably face popular uprisings and short, unstable reigns.", "isCorrect": false, "rationale": "Agathocles is shown to have lived 'for long secure in his country, and defend himself from external enemies, and never be conspired against by his own citizens,' directly contradicting the idea of inevitable short or unstable reigns if wickedness is managed 'properly.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
