<script>
var QUESTIONS = [{"question": "Machiavelli introduces a third category of acquiring principalities that does not fit neatly into virtù or fortuna. What is this category?", "options": [{"text": "Principalities acquired through diplomatic negotiations.", "isCorrect": false, "rationale": "Machiavelli specifically states that principalities acquired through wickedness do not fit into the categories of virtù (one's own arms) or fortuna (others' arms), making this option incorrect."}, {"text": "Principalities acquired through outright crime or wickedness.", "isCorrect": true, "rationale": "The text explicitly states: 'But there is a third category that does not fit neatly into either: principalities acquired through wickedness—outright crime.'"}, {"text": "Principalities acquired through popular election.", "isCorrect": false, "rationale": "The text focuses on methods outside of traditional political processes like election, specifically highlighting violent and criminal means."}, {"text": "Principalities acquired through strategic alliances.", "isCorrect": false, "rationale": "Strategic alliances might fall under fortuna or virtù depending on the context, but not the distinct category of 'wickedness' as defined by Machiavelli in this section."}], "id": "q01"}, {"question": "Agathocles of Syracuse, a key example in this section, rose to power primarily by what method?", "options": [{"text": "Skillful negotiation and forming powerful alliances with neighboring states.", "isCorrect": false, "rationale": "The text explicitly states Agathocles's method 'was not political genius or military brilliance,' and does not mention alliances as his primary means of seizure."}, {"text": "Inheriting a powerful position through his family's lineage.", "isCorrect": false, "rationale": "Agathocles is described as rising 'from the son of a potter,' indicating he did not inherit his power."}, {"text": "A single act of spectacular mass murder against the city's leading citizens and soldiers.", "isCorrect": true, "rationale": "The text clearly describes his method: 'a single act of spectacular mass murder. He called an assembly... at a signal, his troops killed them all.'"}, {"text": "Gradually building popular support among the populace through benevolent policies.", "isCorrect": false, "rationale": "Agathocles seized power through violence, not by gradually building popular support or implementing benevolent policies before securing power."}], "id": "q02"}, {"question": "Machiavelli explicitly states that Agathocles's actions, despite leading to durable power, 'cannot be called virtù.' What crucial distinction is Machiavelli drawing here?", "options": [{"text": "That Agathocles lacked military prowess, a core component of virtù.", "isCorrect": false, "rationale": "The text implies Agathocles had military control to execute his plot and defend his state, but Machiavelli's critique of him is not about a lack of military skill."}, {"text": "That virtù requires earning genuine admiration and achieving glory, not merely effectiveness in gaining and holding power.", "isCorrect": true, "rationale": "The text clarifies: 'Virtù is not just effectiveness; it is a quality of political achievement that includes, at minimum, the ability to earn genuine admiration. Agathocles was effective—ruthlessly, durably effective—but he was not admirable. He achieved power, but not glory.'"}, {"text": "That only leaders born into nobility can possess true virtù.", "isCorrect": false, "rationale": "The text does not link virtù to noble birth; Agathocles rose from humble origins, and Machiavelli's models (Moses, Cyrus, Romulus) were not necessarily all of noble birth in the typical sense."}, {"text": "That Agathocles's success was due to fortuna rather than his own abilities.", "isCorrect": false, "rationale": "The section categorizes Agathocles under 'wickedness,' distinct from virtù and fortuna. His actions were deliberate, not a stroke of luck."}], "id": "q03"}, {"question": "A prince assumes control of a volatile state. To stabilize his rule, he executes all perceived enemies in a single, swift campaign, then immediately enacts reforms to benefit the populace and establish peace. According to Machiavelli's concept of cruelty, what type of cruelty is this?", "options": [{"text": "Badly-used cruelty, because any violence against citizens is inherently detrimental.", "isCorrect": false, "rationale": "Machiavelli makes a distinction, stating that not all cruelties are 'badly-used.' This option overlooks his nuanced analysis."}, {"text": "Well-used cruelty, as it is committed all at once for security and followed by stability.", "isCorrect": true, "rationale": "The text defines 'well-used cruelty' as 'committed all at once, at the beginning, for the sake of security, and then not repeated. The prince... secures his position, and then shifts to a regime of benefit and stability.'"}, {"text": "Amoral cruelty, as Machiavelli provides no judgment on its effectiveness or morality.", "isCorrect": false, "rationale": "While Machiavelli is a realist, he does distinguish between 'well-used' and 'badly-used' cruelty, implying a judgment based on political durability and outcome."}, {"text": "Ineffective cruelty, as it will inevitably breed more resentment and rebellion.", "isCorrect": false, "rationale": "Machiavelli argues that well-used cruelty, by being concentrated and followed by benefits, can lead to political durability, rather than inevitable rebellion."}], "id": "q04"}, {"question": "Which characteristic best defines 'badly-used cruelty' according to Machiavelli?", "options": [{"text": "It is concentrated at the beginning of a reign, ensuring quick security.", "isCorrect": false, "rationale": "This describes 'well-used cruelty,' not 'badly-used cruelty,' which is characterized by escalation."}, {"text": "It is implemented to secure glory and admiration for the prince.", "isCorrect": false, "rationale": "Neither type of cruelty is described as securing glory or admiration. Wickedness itself cannot lead to glory for Machiavelli."}, {"text": "It begins small and escalates, preventing stability and accumulating resentment.", "isCorrect": true, "rationale": "The text states: 'Badly-used cruelty begins small and escalates. Each new act of violence requires another; the prince never reaches stability because he never achieves the psychological safety... Resentment accumulates, enemies multiply, and the position grows more precarious over time.'"}, {"text": "It involves only necessary violence, avoiding gratuitous acts.", "isCorrect": false, "rationale": "While 'well-used' cruelty might imply necessity for security, 'badly-used' cruelty is defined by its escalating and destabilizing nature, not by its initial necessity."}], "id": "q05"}, {"question": "Why does Machiavelli present Oliverotto da Fermo as a complementary example to Agathocles?", "options": [{"text": "To highlight that only ancient figures could successfully seize power through extreme cruelty.", "isCorrect": false, "rationale": "The text states he adds Oliverotto 'To make sure the reader understands that Agathocles is not merely an ancient curiosity,' directly contradicting this option."}, {"text": "To demonstrate how a prince should avoid using treachery and murder.", "isCorrect": false, "rationale": "Machiavelli is observing patterns, not explicitly recommending avoidance in this context, but rather analyzing outcomes of specific cruelties."}, {"text": "To show that the methods of acquiring power through wickedness are timeless and relevant to contemporary rulers.", "isCorrect": true, "rationale": "The text explains, 'To make sure the reader understands that Agathocles is not merely an ancient curiosity, Machiavelli adds the case of Oliverotto da Fermo—a contemporary, someone Machiavelli's readers would have known about.'"}, {"text": "To argue that modern leaders are more virtuous than ancient ones.", "isCorrect": false, "rationale": "The text provides no basis for such a comparison or argument about relative virtue between eras."}], "id": "q06"}, {"question": "The 'caution' section emphasizes that Machiavelli is 'not simply endorsing political murder.' What is his primary analytical goal in discussing different types of cruelty?", "options": [{"text": "To provide a moral justification for certain acts of violence in politics.", "isCorrect": false, "rationale": "The text states Machiavelli 'does not directly answer the moral question' and is 'not a full moral theory.'"}, {"text": "To distinguish between cruelties that lead to durable political outcomes and those that destabilize a regime.", "isCorrect": true, "rationale": "The text explicitly states: 'he is observing that some cruelties produce durable political outcomes while others do not, and that there is a discernible pattern to which ones are which.'"}, {"text": "To condemn all forms of political violence as counterproductive.", "isCorrect": false, "rationale": "Machiavelli clearly identifies 'well-used cruelty' as potentially leading to stable, durable outcomes, not as always counterproductive."}, {"text": "To celebrate leaders who achieve power through any means, regardless of the method.", "isCorrect": false, "rationale": "Machiavelli's distinction between effectiveness and virtù, and well-used vs. badly-used cruelty, shows he does not celebrate all means indiscriminately."}], "id": "q07"}, {"question": "In the context of the 'Dirty Hands' problem, how does Machiavelli approach the dilemma of a leader doing something morally wrong for a good outcome?", "options": [{"text": "He provides a direct moral justification for the wrong action if the outcome is beneficial.", "isCorrect": false, "rationale": "The text states, 'He does not directly answer the moral question' and 'This is not a full moral theory.'"}, {"text": "He argues that such actions are always impermissible, regardless of the outcome.", "isCorrect": false, "rationale": "Machiavelli's analysis of 'well-used cruelty' implies that certain 'wrong' actions can lead to politically desirable outcomes, which contradicts arguing they are always impermissible."}, {"text": "He describes the actual political outcomes that follow different types of cruelty without resolving the moral question.", "isCorrect": true, "rationale": "The text states: 'He does not directly answer the moral question. Instead, he describes what actually happens when different types of cruelty are used, and what outcomes follow.'"}, {"text": "He advises leaders to always prioritize conventional morality over political necessity.", "isCorrect": false, "rationale": "Machiavelli's realist framework often prioritizes political necessity and outcome over conventional moral philosophy."}], "id": "q08"}, {"question": "Based on Machiavelli's discussion, which statement best captures the distinction between a 'predator who survives by terror' and a 'founder who creates something lasting and worthy of respect'?", "options": [{"text": "The predator uses force, while the founder uses diplomacy.", "isCorrect": false, "rationale": "Both can use force; the distinction is about the nature and outcome of their rule, not just the means of acquiring power."}, {"text": "The predator is amoral, while the founder adheres to Christian ethics.", "isCorrect": false, "rationale": "Machiavelli's standard is described as 'a demanding, non-Christian standard,' so adherence to Christian ethics is not the defining difference for the 'founder.'"}, {"text": "The predator achieves effectiveness and power, while the founder achieves lasting glory and genuine admiration (virtù).", "isCorrect": true, "rationale": "The text states: 'Agathocles was effective—ruthlessly, durably effective—but he was not admirable. He achieved power, but not glory. He held his state, but he cannot be placed alongside Moses, Cyrus, and Romulus as a model. There is a difference between the predator who survives by terror and the founder who creates something lasting and worthy of respect.'"}, {"text": "The predator acquires power through fortuna, while the founder acquires it through virtù.", "isCorrect": false, "rationale": "Both the predator (Agathocles) and founder examples (Moses, Cyrus, Romulus) are described as distinct from fortuna, and Agathocles is explicitly stated as lacking virtù."}], "id": "q09"}, {"question": "What is the paradoxical implication of Machiavelli's distinction between well-used and badly-used cruelty regarding a prince's reputation?", "options": [{"text": "A prince who avoids cruelty altogether will be the most highly regarded.", "isCorrect": false, "rationale": "Machiavelli acknowledges that a prince may need to use cruelty; his focus is on how it's used for durability, not its complete absence."}, {"text": "A prince who commits all necessary cruelties at once will be remembered better than one who commits smaller cruelties repeatedly.", "isCorrect": true, "rationale": "The text explicitly states: 'The paradoxical implication: a prince who commits all his necessary cruelties at once will be remembered better than one who commits smaller cruelties repeatedly. Concentrated violence followed by benevolent governance is more politically durable than ongoing, low-level oppression.'"}, {"text": "A prince who demonstrates continuous, low-level oppression maintains better control.", "isCorrect": false, "rationale": "This describes the outcome of 'badly-used cruelty,' which leads to precariousness, not better control in the long run."}, {"text": "A prince's reputation is solely determined by their initial act of seizing power.", "isCorrect": false, "rationale": "Machiavelli's analysis considers the ongoing governance and the trajectory of the prince's rule after the initial act of cruelty."}], "id": "q10"}, {"question": "Machiavelli describes his standard for political greatness as 'non-Christian.' What does this phrase signal about his evaluative framework compared to the dominant moral tradition of his era?", "options": [{"text": "He uses classical pagan virtues — glory, honor, admirable achievement — rather than Christian virtues like humility, mercy, and salvation as his standard for judging princes", "isCorrect": true, "rationale": "By explicitly calling his standard 'non-Christian,' Machiavelli signals that the categories of the Church — sin, salvation, divine judgment — are not his criteria. He judges rulers by whether they earn lasting admiration and create enduring states, a standard rooted in Roman and Greek political thought."}, {"text": "He simply means that his standard is more secular and neutral, avoiding any strong values at all", "isCorrect": false, "rationale": "Machiavelli's framework is not value-free; the text explicitly notes it is 'a demanding, non-Christian standard' — demanding implies genuine evaluative criteria, just not theological ones."}, {"text": "He adopts Islamic moral philosophy as an alternative to Christian ethics in evaluating rulers", "isCorrect": false, "rationale": "There is no indication Machiavelli draws on Islamic philosophy; his alternative to Christian ethics is the classical Greco-Roman tradition of political glory and honor."}, {"text": "He rejects all moral evaluation of rulers, treating political success as the only valid criterion", "isCorrect": false, "rationale": "If Machiavelli rejected all moral evaluation, he would not refuse to call Agathocles virtuous. His refusal to place Agathocles among the 'most excellent men' is itself a moral judgment — just not a Christian one."}], "id": "q11"}, {"question": "The 'Dirty Hands' problem was named by Michael Walzer in the twentieth century, but Machiavelli is credited with founding the tradition it belongs to. What makes The Prince a foundational text for this problem?", "options": [{"text": "It is the first text to openly acknowledge that political leaders may face situations where effective governance requires actions that ordinary moral philosophy cannot justify", "isCorrect": true, "rationale": "The dirty hands problem arises precisely from Machiavelli's recognition that political necessity sometimes demands acts — concentrated violence, deception, betrayal of allies — that cannot be vindicated by standard moral reasoning, yet are essential to political survival and success."}, {"text": "It provides a complete moral theory that resolves all dilemmas political leaders face, eliminating ambiguity", "isCorrect": false, "rationale": "The text explicitly notes that Machiavelli's approach 'is not a full moral theory' and that he 'does not directly answer the moral question,' leaving the dilemma unresolved."}, {"text": "It argues that political leaders should always choose the morally right action, even at the cost of political failure", "isCorrect": false, "rationale": "This is the opposite of Machiavelli's position; he is famous for arguing that political necessity sometimes requires abandoning conventional moral standards."}, {"text": "It proves that all political violence is justified as long as it serves national interests", "isCorrect": false, "rationale": "Machiavelli does not provide blanket justification for political violence; his distinction between well-used and badly-used cruelty, and his refusal to call wickedness virtù, shows he maintains evaluative distinctions within his realist framework."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
