<script>
var QUESTIONS = [{"question": "What defines a \"civil principality\" according to Machiavelli?", "options": [{"text": "A principality obtained solely through military conquest and the subjugation of existing rulers.", "isCorrect": false, "rationale": "The text states that a civil principality is 'not by wickedness or any intolerable violence,' which includes conquest as a form of violence or external acquisition, distinguishing it from the civil principality's origin."}, {"text": "A principality established through an act of extreme wickedness or intolerable violence by a leading citizen.", "isCorrect": false, "rationale": "Machiavelli explicitly excludes wickedness or intolerable violence as the means of acquiring a civil principality, stating it comes 'by the favour of his fellow citizens.'"}, {"text": "A principality where a leading citizen becomes prince through the favor of fellow citizens, requiring shrewdness rather than pure genius or fortune.", "isCorrect": true, "rationale": "The text defines a civil principality as one where 'a leading citizen becomes the prince of his country... by the favour of his fellow citizens,' noting that 'nor is genius or fortune altogether necessary to attain to it, but rather a happy shrewdness.'"}, {"text": "A principality where the prince inherits power through a long-established dynastic succession.", "isCorrect": false, "rationale": "The concept of a civil principality focuses on a leading citizen gaining power through favor, not inherited succession, which falls under different categories of principalities Machiavelli discusses elsewhere."}]}, {"question": "What fundamental conflict underlies the political dynamics in all cities, according to Machiavelli?", "options": [{"text": "The struggle between different religious factions for control of the state.", "isCorrect": false, "rationale": "While religious divisions can exist, Machiavelli's primary focus in this section on civil principalities is not religion, but the class conflict between the people and the nobles."}, {"text": "The competition between various noble families for wealth and personal glory.", "isCorrect": false, "rationale": "This describes a potential outcome or symptom, but not the fundamental, overarching conflict that gives rise to the options of principality, self-government, or anarchy."}, {"text": "The division between the people, who desire not to be oppressed, and the nobles, who wish to rule and oppress the people.", "isCorrect": true, "rationale": "Machiavelli explicitly states: 'Because in all cities these two distinct parties are found, and from this it arises that the people do not wish to be ruled nor oppressed by the nobles, and the nobles wish to rule and oppress the people.'"}, {"text": "The external threat from neighboring states that forces internal unity or leads to collapse.", "isCorrect": false, "rationale": "This section primarily deals with internal power dynamics and the relationship between a prince and his citizens, not external threats as the fundamental conflict."}]}, {"question": "Why does Machiavelli argue that a prince who obtains sovereignty with the assistance of the nobles maintains himself with more difficulty than one supported by the people?", "options": [{"text": "Nobles are generally less intelligent and harder to govern than common people.", "isCorrect": false, "rationale": "Machiavelli describes nobles as 'far-seeing and astute' later in the text, implying they are not less intelligent. Their difficulty stems from their self-perception and ambitions, not a lack of intellect."}, {"text": "A prince backed by nobles finds himself surrounded by many who consider themselves his equals, limiting his authority and management.", "isCorrect": true, "rationale": "The text states: 'He who obtains sovereignty by the assistance of the nobles maintains himself with more difficulty than he who comes to it by the aid of the people, because the former finds himself with many around him who consider themselves his equals, and because of this he can neither rule nor manage them to his liking.'"}, {"text": "The financial cost of satisfying the numerous demands of the nobles is unsustainable for the prince.", "isCorrect": false, "rationale": "While satisfying nobles is difficult, the text attributes this more to their 'unrighteous' desire to oppress rather than solely financial demands. The primary difficulty cited is their sense of equality."}, {"text": "Nobles are inherently more disloyal and prone to rebellion due to their ambition.", "isCorrect": false, "rationale": "While nobles can be ambitious and treacherous, the *specific difficulty* Machiavelli highlights here is the problem of ruling over equals, rather than just their general disloyalty, which is a separate point he makes later about fearing them."}]}, {"question": "Machiavelli contrasts the fundamental desires of the people and the nobles. Which of the following accurately summarizes this contrast?", "options": [{"text": "The people desire absolute power, while the nobles desire limited governance.", "isCorrect": false, "rationale": "This is an inversion of Machiavelli's argument. The people generally desire not to be oppressed, not to hold absolute power themselves."}, {"text": "The people desire personal enrichment, while the nobles desire collective security.", "isCorrect": false, "rationale": "This does not align with Machiavelli's stated desires. The people's desire is not primarily wealth, and the nobles' desire is for their own power and oppression."}, {"text": "The people desire not to be oppressed, while the nobles desire to rule and oppress.", "isCorrect": true, "rationale": "Machiavelli states: 'one cannot by fair dealing, and without injury to others, satisfy the nobles, but you can satisfy the people, for their object is more righteous than that of the nobles, the latter wishing to oppress, while the former only desire not to be oppressed.'"}, {"text": "The people desire war, while the nobles desire peace.", "isCorrect": false, "rationale": "The text does not discuss the people's or nobles' desires concerning war and peace in this context."}]}, {"question": "According to the text, what is the *primary difference* in the danger a prince faces from a hostile people versus hostile nobles?", "options": [{"text": "A hostile people will actively conspire to assassinate the prince, while nobles will merely withdraw financial support.", "isCorrect": false, "rationale": "The text suggests the opposite regarding active conspiracy: nobles are more likely to rise, while the people are too numerous for effective conspiracy but can abandon the prince."}, {"text": "A hostile people will abandon the prince, making governance impossible, while hostile nobles will rise against him and seek to replace him.", "isCorrect": true, "rationale": "The text clearly states: 'The worst that a prince may expect from a hostile people is to be abandoned by them; but from hostile nobles he has not only to fear abandonment, but also that they will rise against him.'"}, {"text": "A hostile people will incite foreign invasion, whereas nobles will only sabotage internal policies.", "isCorrect": false, "rationale": "Foreign invasion is not presented as the primary danger from either group, nor is sabotaging internal policies the sole threat from nobles."}, {"text": "A hostile people will always seek to establish self-government, while hostile nobles will demand more privileges.", "isCorrect": false, "rationale": "While both elements may be present in a broader context, the text specifically contrasts abandonment versus active rebellion as the distinct dangers in this section."}]}, {"question": "A prince observes that some nobles, for their own ambitious ends, shun binding themselves entirely to his fortune. How should the prince treat these nobles?", "options": [{"text": "He should honor and love them, hoping to win their loyalty over time.", "isCorrect": false, "rationale": "Honoring and loving applies only to those who 'bind themselves, and are not rapacious,' not those who shun binding for ambitious ends."}, {"text": "He should make use of them, especially if they are of good counsel, as they are not to be feared in adversity.", "isCorrect": false, "rationale": "This approach is for nobles who shun binding themselves due to 'pusillanimity and a natural want of courage,' not for those with ambitious motives."}, {"text": "He should guard against them and fear them as if they were open enemies, because they will help to ruin him in adversity.", "isCorrect": true, "rationale": "The text states: 'But when for their own ambitious ends they shun binding themselves, it is a token that they are giving more thought to themselves than to you, and a prince ought to guard against such, and to fear them as if they were open enemies, because in adversity they always help to ruin him.'"}, {"text": "He should immediately imprison or execute them to prevent future betrayal.", "isCorrect": false, "rationale": "Machiavelli advises 'guard against' and 'fear them as if they were open enemies,' which implies caution and defensive measures, not necessarily immediate imprisonment or execution, which can incite further unrest."}]}, {"question": "A prince has been elevated to power by the favor of the nobles, but in opposition to the people. What is Machiavelli's essential advice for such a prince to secure his rule?", "options": [{"text": "He must immediately eliminate all the nobles who supported him to consolidate absolute power.", "isCorrect": false, "rationale": "This is an extreme measure not specifically recommended. The text advises managing nobles, not eliminating them, especially those who brought him to power."}, {"text": "He ought, above everything, to seek to win the people over to himself by taking them under his protection.", "isCorrect": true, "rationale": "Machiavelli states: 'But one who, in opposition to the people, becomes a prince by the favour of the nobles, ought, above everything, to seek to win the people over to himself, and this he may easily do if he takes them under his protection.'"}, {"text": "He should continue to favor the nobles, as their initial support is the bedrock of his authority.", "isCorrect": false, "rationale": "The text implies that relying solely on nobles is a difficult path, and winning over the people is crucial for security, even for a prince initially supported by nobles."}, {"text": "He must implement a strict system of taxation to fund a strong mercenary army, independent of popular or noble support.", "isCorrect": false, "rationale": "This is not the primary advice given for securing loyalty or overcoming the difficulty of ruling against the people; the focus is on winning the people's favor."}]}, {"question": "Machiavelli addresses the proverb, \"He who builds on the people, builds on the mud.\" Under what specific condition does he concede this proverb holds true?", "options": [{"text": "When a prince uses cruelty to maintain power, as exemplified by Nabis.", "isCorrect": false, "rationale": "The Nabis example is used to show that securing against a few (nobles) is easier than a hostile people, but not directly linked to the 'mud' proverb's concession."}, {"text": "When a private citizen makes a foundation there, persuading himself the people will free him when oppressed by enemies or magistrates.", "isCorrect": true, "rationale": "Machiavelli clarifies: 'for this is true when a private citizen makes a foundation there, and persuades himself that the people will free him when he is oppressed by his enemies or by the magistrates; wherein he would find himself very often deceived, as happened to the Gracchi in Rome and to Messer Giorgio Scali in Florence.'"}, {"text": "When the prince fails to equip his state with strong fortresses and a loyal personal guard.", "isCorrect": false, "rationale": "The text does not link the proverb to a prince's military preparations or personal security arrangements."}, {"text": "When the people are accustomed to receiving orders solely from magistrates rather than the prince directly.", "isCorrect": false, "rationale": "This condition relates to the dangers of transitioning from civil to absolute government, not to the specific context of the 'building on mud' proverb."}]}, {"question": "What is a significant danger when a civil principality transitions to an absolute form of government, especially if the prince relies on magistrates?", "options": [{"text": "The magistrates become too powerful and demand succession rights for their families.", "isCorrect": false, "rationale": "While magistrates gaining power is an issue, the text's primary concern is their ability to undermine the government, and the people's lack of direct obedience to the prince."}, {"text": "The citizens, accustomed to magistrates, will not obey the prince directly during tumults, and reliable men will be scarce.", "isCorrect": true, "rationale": "The text states: 'in the latter case [ruling through magistrates] their government is weaker and more insecure... because the citizens and subjects, accustomed to receive orders from magistrates, are not of a mind to obey him amid these confusions, and there will always be in doubtful times a scarcity of men whom he can trust.'"}, {"text": "The prince is compelled to live always with the same magistrates, making them difficult to control.", "isCorrect": false, "rationale": "This contrasts with the prince's ability to 'make and unmake' nobles. The issue with magistrates is the citizens' reliance on them, not the prince's inability to replace the magistrates themselves."}, {"text": "Absolute rule inherently leads to foreign invasion due to perceived tyranny.", "isCorrect": false, "rationale": "The danger described is internal, concerning the loyalty and obedience of the citizens and the reliability of magistrates, not external invasion."}]}, {"question": "Based on Machiavelli's concluding advice in this section, what strategy should a wise prince adopt to ensure his citizens remain faithful in all circumstances?", "options": [{"text": "He should periodically demonstrate his ruthlessness to keep the people in fear of his power.", "isCorrect": false, "rationale": "While fear can be a tool for a prince, Machiavelli's final advice here is about creating a symbiotic relationship, not just fear, to ensure loyalty 'in every sort and kind of circumstance.'"}, {"text": "He should distribute immense wealth and resources to the citizens, ensuring their prosperity.", "isCorrect": false, "rationale": "Machiavelli focuses on the people's desire not to be oppressed, not on their material enrichment, as the primary means to secure their loyalty."}, {"text": "He should adopt such a course that his citizens will always in every sort and kind of circumstance have need of the state and of him.", "isCorrect": true, "rationale": "The text concludes: 'Therefore a wise prince ought to adopt such a course that his citizens will always in every sort and kind of circumstance have need of the state and of him, and then he will always find them faithful.'"}, {"text": "He should constantly introduce new magistrates and officials to prevent any single individual from gaining too much influence.", "isCorrect": false, "rationale": "This strategy relates to controlling subordinates, not to securing the foundational loyalty of the entire citizenry by making them dependent on the state and prince."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
