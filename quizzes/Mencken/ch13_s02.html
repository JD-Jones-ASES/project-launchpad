<script>
var QUESTIONS = [{"question": "Mencken identifies a central paradox concerning the 'one-man-one-vote' principle in American democracy. What is this paradox?", "options": [{"text": "The principle is universally accepted in theory but always fails in practice due to corruption.", "isCorrect": false, "rationale": "Mencken argues that the principle is subverted not just by corruption, but by a deeper, paradoxical expression of democratic will. He doesn't state it universally fails due to corruption, but rather that its subversion is a feature, not a bug, of American democracy."}, {"text": "The subversion of the 'one-man-one-vote' principle is, in fact, an expression of the democratic will itself.", "isCorrect": true, "rationale": "Mencken states, 'The one-man-one-vote principle, he argues, is everywhere subverted — and the subversion, paradoxically, is itself an expression of the democratic will.' This directly reflects the core paradox presented."}, {"text": "While states like Delaware have equal representation, larger states like New York actively campaign to abolish this disproportionality.", "isCorrect": false, "rationale": "The text notes disproportionality in the Senate but does not suggest active campaigns by larger states to abolish it. Instead, it highlights that disproportionality is largely accepted."}, {"text": "Proportional representation is a modern invention, contradicting the original intent of the Founding Fathers.", "isCorrect": false, "rationale": "Mencken does not discuss the historical origins of proportional representation or its relation to the Founding Fathers' intent. His focus is on the contemporary reality and the underlying reasons for disproportionality."}]}, {"question": "According to Mencken, what is the primary underlying reason for the widespread acceptance and deliberate implementation of disproportional representation in the United States?", "options": [{"text": "It is a device intended to nullify democracy and concentrate power in the hands of an elite minority.", "isCorrect": false, "rationale": "Mencken explicitly refutes this, stating, 'The truth is that disproportional representation is not a device to nullify democracy, but simply a device to make it more workable.'"}, {"text": "It allows the sovereign people to sacrifice a part of democratic theory for a more practical, safer, and efficient system.", "isCorrect": true, "rationale": "The text states, 'All it indicates, at least in the United States, is that the sovereign people have voluntarily sacrificed a moiety of the democratic theory in order to attain to a safer and more efficient practice.'"}, {"text": "It ensures that less populated states receive more federal funding and resources than larger states.", "isCorrect": false, "rationale": "While disproportional representation might indirectly affect resource distribution, Mencken does not cite federal funding as the primary reason for its acceptance. His focus is on balancing political influence."}, {"text": "It is a historical relic from monarchical systems that has not yet been fully phased out.", "isCorrect": false, "rationale": "Mencken presents disproportional representation as a current, functional aspect of American democracy, not merely an outdated relic. He argues it serves a specific, ongoing purpose."}]}, {"question": "Based on Mencken's explanation, if a state's legislative districting results in urban residents' votes counting for only two-thirds as much as rural residents' votes in practice, what can be inferred about the urban residents' voting status?", "options": [{"text": "They are likely experiencing a temporary anomaly that will be corrected through immediate reapportionment.", "isCorrect": false, "rationale": "Mencken notes that 'reapportionment always lags behind' population growth, suggesting such disparities are persistent, not temporary, and are part of the system's design rather than a correctable anomaly."}, {"text": "A portion of the urban citizenry is, to every practical intent, unable to vote at all.", "isCorrect": true, "rationale": "Mencken states, 'it must be plain that a community whose votes, man for man, count for only half as much as the votes of another community is one in which half of the citizens are, to every practical intent, unable to vote at all.' The two-thirds scenario implies a similar effective disfranchisement for one-third of the urban voters."}, {"text": "Their votes are being systematically suppressed through illegal means by the state government.", "isCorrect": false, "rationale": "Mencken frames disproportional representation as a 'device to make democracy more workable' and founded upon the people's 'free will,' implying it's a legal, if unequal, arrangement, not an illegal suppression."}, {"text": "This situation is a direct consequence of urban residents being less engaged in the political process.", "isCorrect": false, "rationale": "The text attributes the disproportionality to geographical boundaries and population shifts, not to the engagement levels of urban residents. In fact, he describes urban voters as being more 'promptly and effectively' able to act together."}]}, {"question": "How does Mencken characterize the difference in political efficacy and unity between voters in large urban centers and those in rural regions?", "options": [{"text": "Rural voters are more unified and articulate, easily prevailing over fragmented urban interests.", "isCorrect": false, "rationale": "Mencken states the opposite: rural voters are 'dispersed and largely inarticulate' and 'cannot hope to prevail against' urban voters by ordinary means."}, {"text": "Urban voters, due to their compact living and quick opinion formation, exhibit characteristics of a 'compact mob,' whereas rural voters are dispersed and less articulate.", "isCorrect": true, "rationale": "The text explicitly states: 'The voters of a large urban centre, for example, are able to act together far more promptly and effectively than their colleagues of the wide-flung farms. ... In brief, they show all of the characters of men in a compact mob, and the voters of the rural regions, dispersed and largely inarticulate, cannot hope to prevail against them by ordinary means.'"}, {"text": "Both urban and rural populations are equally prone to forming unified political fronts, negating any need for make-weights.", "isCorrect": false, "rationale": "Mencken's entire argument for disproportional representation is based on the inherent imbalance between these groups, necessitating 'make-weights' for rural voters."}, {"text": "Rural voters are given disproportionately heavy representation because they are more educated and politically sophisticated.", "isCorrect": false, "rationale": "The text does not attribute rural representation to higher education or sophistication, but rather to counterbalance the inherent organizational advantage of urban voters (whom he refers to as 'yokels')."}]}, {"question": "Mencken argues that 'most of the so-called constitutional checks' have yielded to popular pressure. Which institution does he specifically highlight as demonstrating responsiveness to 'popular rages' and shifts in public opinion?", "options": [{"text": "The Office of the President, which frequently ignores constitutional limits in response to public demands.", "isCorrect": false, "rationale": "While the President is a politician, Mencken specifically details the Supreme Court's history of being swayed by public opinion, not the President's disregard for constitutional limits."}, {"text": "The United States Senate, which, despite its disproportional structure, readily abandons its principles under popular pressure.", "isCorrect": false, "rationale": "Mencken mentions the Senate's disproportionality but focuses on the Supreme Court when discussing constitutional checks yielding to popular pressure."}, {"text": "The Supreme Court, whose decisions, even the most celebrated ones, have often reflected popular sentiment and been modified or reversed later.", "isCorrect": true, "rationale": "The text explicitly states: 'No one familiar with the history of the Supreme Court, for example, need be told that its vast and singular power to curb legislation has always been exercised with one eye on the election returns. Practically all of its most celebrated decisions... have reflected popular rages of the hour, and many of them have been modified, or even completely reversed afterward.'"}, {"text": "State Legislatures, which are quick to pass laws that pander to regional prejudices regardless of constitutional legality.", "isCorrect": false, "rationale": "Mencken discusses state legislatures in the context of urban under-representation and rural 'yokels' dodging taxes, but not as the primary example of constitutional checks yielding to broader popular pressure in the sense of the Supreme Court."}]}, {"question": "If a significant popular movement arises demanding the repeal of an unpopular federal law, what would Mencken likely predict about the long-term viability of that law, even if it is currently upheld by the Supreme Court?", "options": [{"text": "The law will likely remain in effect indefinitely, as the Supreme Court's decisions are rarely reversed by popular will.", "isCorrect": false, "rationale": "Mencken explicitly states that Supreme Court decisions 'many of them have been modified, or even completely reversed afterward, as the second thought of the plain people has differed from their first thought.' This contradicts indefinite enforcement."}, {"text": "The law will be overturned only if the President and Congress can agree on a constitutional amendment to nullify the Court's ruling.", "isCorrect": false, "rationale": "While amendments can change laws, Mencken emphasizes the direct power of the sovereign people to effect change, even forcing shifts in judicial interpretation, rather than solely through formal amendments against a resistant court."}, {"text": "The law's survival is precarious because the majority under democracy, once 'its blood is up,' can ultimately get anything it wants, potentially influencing future court decisions or constitutional means.", "isCorrect": true, "rationale": "Mencken states, 'the majority under democracy remains the majority, whatever laws and constitutions may say to the contrary, and when its blood is up it can get anything it wants.' This suggests popular will eventually overrides even established legal precedent."}, {"text": "The law will stand unless a foreign agency intervenes to pressure the American government to change it.", "isCorrect": false, "rationale": "Mencken explicitly denies external influence, stating, 'no exterior agency could make them do any of them unwillingly,' reinforcing the idea of American popular sovereignty."}]}, {"question": "What does Mencken suggest is the main reason for the 'inferior American's' hostility to 'direct action' or revolution, unlike their counterparts in other countries?", "options": [{"text": "They are inherently cowardly and distrust liberty, preferring authoritarian stability.", "isCorrect": false, "rationale": "Mencken mentions this as a possible, but not primary, reason ('not merely because he is a coward and distrusts liberty'), immediately following with what he considers the 'main' reason."}, {"text": "They believe that any reform advocated by a respectable majority, or even a determined minority, can be achieved peacefully and constitutionally in the United States.", "isCorrect": true, "rationale": "The text states: 'He is against it... because he believes that revolution, in the United States, is unnecessary—that any reform advocated by a respectable majority, or even by a determined minority, may be achieved peacefully and by constitutional means. In this belief he is right.'"}, {"text": "They are too ignorant of their constitutional rights to understand the need for direct action.", "isCorrect": false, "rationale": "Mencken does not suggest ignorance as the reason. Instead, he highlights a belief in the efficacy of the existing constitutional system."}, {"text": "The government's rapid responsiveness to public will makes revolutionary action obsolete.", "isCorrect": false, "rationale": "Mencken notes that the governmental process 'perhaps, could be made more quickly responsive,' but states it's 'responsive enough for all practical purposes,' implying it's not 'rapid' but sufficiently effective to preclude revolution."}]}, {"question": "Mencken asserts that the American people, 'keeping strictly within the Constitution,' possess an extraordinary range of powers. Which of the following actions does he *not* suggest they are capable of doing constitutionally?", "options": [{"text": "Abolishing the Federal and State Legislatures, as they have already done with city councils.", "isCorrect": false, "rationale": "Mencken explicitly states they 'could abolish the Federal and State Legislatures, as they have already abolished the city councils in hundreds of municipalities.'"}, {"text": "Converting arson into a laudable act, providing bounties for mayhem, or making it a crime to drink coffee.", "isCorrect": false, "rationale": "Mencken includes these as examples of their power to redefine crimes: 'They could convert arson into a laudable act, provide a bounty for persons skilled at mayhem and make it a crime to drink coffee or eat meat.'"}, {"text": "Unilaterally declaring war on a sovereign nation without any public or congressional debate.", "isCorrect": true, "rationale": "Mencken says they 'could make war without constitutional authority and refuse to engage in it in the face of a constitutional declaration.' He highlights their ability to *make* war without authority, but not 'unilaterally declaring' it without any debate. The emphasis is on *acting* outside authority, not removing debate."}, {"text": "Expropriating all private property, enfranchising animals, or reducing the President's term to one day.", "isCorrect": false, "rationale": "Mencken lists these as possibilities: 'They could, by a simple amendment of that hoary scripture, expropriate all the private property in the land...' 'They could enfranchise aliens if they so desired, or children not taxed, or idiots, or the kine in the byres.' 'They could extend the term of the President to life, or they could reduce it to one year, or even to one day.'"}]}, {"question": "According to Mencken, when an election result does not accurately manifest a 'concrete popular wish,' what is the most frequent explanation?", "options": [{"text": "Widespread electoral fraud or manipulation by political parties.", "isCorrect": false, "rationale": "Mencken does not attribute this to fraud; rather, he focuses on the actual absence of a clear popular will or public indifference."}, {"text": "There was no genuine popular wish on the matters principally at issue, and the populace voted irrelevantly, wantonly, or stayed away from the polls.", "isCorrect": true, "rationale": "The text states: 'The answer, nine times out of ten, is that there was no popular wish. The populace simply passed over the matters principally at issue as incomprehensible or unimportant, and voted irrelevantly or wantonly. Or, in large part, it kept away from the polls.'"}, {"text": "Foreign interference in the electoral process distorted the true will of the people.", "isCorrect": false, "rationale": "Mencken makes no mention of foreign interference as a factor in election results failing to reflect popular wishes."}, {"text": "The public was misinformed by biased media coverage, preventing a coherent popular opinion from forming.", "isCorrect": false, "rationale": "While media influence might be a factor in real-world politics, Mencken's explanation in this text centers on the *absence* of a popular wish or its irrelevant expression, not primarily misinformation."}]}, {"question": "In Mencken's view, what fundamentally constitutes 'the science of politics under democracy,' especially concerning the relationship between politicians and the populace's core desires?", "options": [{"text": "It is the art of educating the public on complex issues to ensure rational decision-making.", "isCorrect": false, "rationale": "Mencken's view is cynical, suggesting politicians capitalize on basic desires rather than elevate public understanding. He describes the populace as valuing 'rough entertainment' and being 'hoodwinked.'"}, {"text": "It is the process of offering genuine solutions to the bugaboos that plague the populace, leading to true safety and security.", "isCorrect": false, "rationale": "Mencken implies that politicians offer 'mellifluous words' and 'heroes to worship,' not necessarily genuine solutions, for safety and security. He frames it as 'trading' and 'hoodwinking.'"}, {"text": "It consists of trading with the people, meaning hoodwinking them by providing what they want most: safety, security, heroes, and simple entertainment, even if it means sacrificing other things.", "isCorrect": true, "rationale": "Mencken concludes: 'The science of politics under democracy consists in trading with them, i.e., in hoodwinking and...' (the text ends here, but the implication is clear). He lists what the people 'want principally': 'safety and security. They want to be delivered from the bugaboos that ride them. They want to be soothed with mellifluous words. They want heroes to worship. They want the rough entertainment suitable to their simple minds. All of these things they want so badly that they are willing to sacrifice everything else in order to get them.'"}, {"text": "It involves strict adherence to constitutional principles to protect individual rights from the whims of the majority.", "isCorrect": false, "rationale": "Mencken actually argues that constitutional checks often yield to popular pressure and that the majority can even redefine rights, suggesting the 'science of politics' is about managing popular will, not strictly adhering to principles against it."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
