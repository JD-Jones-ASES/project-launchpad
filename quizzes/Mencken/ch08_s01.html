    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 8, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary rhetorical inversion Mencken employs to challenge the standard justification for democracy in Section I.7?", "options": [{"text": "Democracy acts as a threat to liberty rather than its primary guardian.", "isCorrect": true, "rationale": "Mencken argues that while democracy is often defended as a provider of freedom, it actually restricts liberty because the masses prioritize security and conformity over freedom."}, {"text": "The common man's intellectual limitations are actually a safeguard for personal freedom.", "isCorrect": false, "rationale": "This contradicts Mencken's view that intellectual limitations lead to manipulability and the eventual erosion of liberty."}, {"text": "Liberty is a natural state that democracy merely attempts to organize.", "isCorrect": false, "rationale": "The text describes liberty as a 'recent and fragile acquisition,' not a natural state or something democracy organizes effectively."}, {"text": "The pursuit of envy by the masses is the only way to achieve true democratic liberty.", "isCorrect": false, "rationale": "Mencken identifies envy as a driver of democratic life that undermines liberty, rather than a means of achieving it."}], "id": "q01"}, {"question": "In the context of Mencken's 'Word Watch,' how does his use of the term 'votaries' contribute to his characterization of liberty?", "options": [{"text": "It frames the love of liberty as a quasi-religious devotion restricted to a small, elite group.", "isCorrect": true, "rationale": "By using a word originally associated with religious cults, Mencken implies that true freedom is a sacred ideal followed only by a 'fanatic few.'"}, {"text": "It suggests that democratic voters are blindly devoted to their political leaders.", "isCorrect": false, "rationale": "Mencken applies the term to lovers of liberty specifically, whereas he uses 'mountebanks' to describe politicians and 'poltroonery' for the electorate."}, {"text": "It implies that liberty is a popular movement accessible to the general proletariat.", "isCorrect": false, "rationale": "The term 'votaries' suggests a specialized, small group, which contrasts with Mencken's view of the 'anthropoid' masses."}, {"text": "It indicates that the desire for liberty is a common instinct shared by all humans.", "isCorrect": false, "rationale": "Mencken explicitly argues that the common man does not want freedom, making it a rare rather than common instinct."}], "id": "q02"}, {"question": "According to the analysis of Mencken's syntax, what is the intended effect of following a long, parallel-structured sentence with a short, blunt one?", "options": [{"text": "To mirror the contrast between democratic pretensions and harsh reality.", "isCorrect": true, "rationale": "The long sentence represents the lofty ideals or 'pretensions' of liberty, while the short sentence delivers the 'brutal' reality of the common man's capabilities."}, {"text": "To demonstrate the 'dreadful loneliness' that a free man must face in his world.", "isCorrect": false, "rationale": "While loneliness is a theme, the specific syntactic strategy of the long-build-up-and-short-punch is used to deflate democratic claims."}, {"text": "To mimic the rhythmic, repetitive physical labor of the 'ox.'", "isCorrect": false, "rationale": "While the 'ox' is a key metaphor, the syntax of build-up and punch is described as an 'ambush' or a 'counterpunch' rather than a mimicry of labor."}, {"text": "To provide a scholarly and measured tone that appeals to scientific inquiry.", "isCorrect": false, "rationale": "A measured, scholarly tone is noted in the final paragraphs, but the specific 'long-short' dynamic is described as 'devastating' and 'brutally direct.'"}], "id": "q03"}, {"question": "Which historical figure does Mencken use to illustrate the paradox that absolute rule can be more protective of liberty than democracy?", "options": [{"text": "Frederick the Great", "isCorrect": true, "rationale": "The text notes that Mencken views Frederick II of Prussia as the ideal example of an absolute monarch who protected free speech and religious tolerance."}, {"text": "Ludwig van Beethoven", "isCorrect": false, "rationale": "Beethoven is used in an analogy regarding the common man's lack of talent for writing symphonies, not as an example of governance."}, {"text": "Friedrich Nietzsche", "isCorrect": false, "rationale": "Nietzsche is cited as a philosophical influence on Mencken's thought, specifically regarding the 'overman' and herd morality, but not as a ruler."}, {"text": "Alexis de Tocqueville", "isCorrect": false, "rationale": "Tocqueville is mentioned as a historical skeptic who warned of the 'tyranny of the majority,' but he was a theorist, not a monarch."}], "id": "q04"}, {"question": "In the analysis of the 'Ox and the Butcher' metaphor, what does the 'licking' gesture signify about the common man's relationship with power?", "options": [{"text": "The citizen's self-deception that their submission to a master is an act of pride or defiance.", "isCorrect": true, "rationale": "The 'licking' represents a pathetic imitation of pride where the 'ox' (common man) treats his own destruction as a chosen act of affection."}, {"text": "The physical violence required by the 'mountebanks' to keep the mob in check.", "isCorrect": false, "rationale": "The butcher represents the master, but the lick suggests a voluntary (if deluded) submission rather than external physical force."}, {"text": "The necessary biological cooperation between different classes in a healthy democracy.", "isCorrect": false, "rationale": "Mencken rejects the idea of a healthy democracy, viewing the relationship as master and slave based on nature, not cooperation."}, {"text": "The common man’s strategic attempt to manipulate political leaders for 'ham and cabbage.'", "isCorrect": false, "rationale": "While the city mobs fight for 'ham and cabbage,' the 'licking' in the metaphor is framed as a grotesque act of total, unthinking submission."}], "id": "q05"}, {"question": "How does Mencken use 'antithesis' as a structural device in this section?", "options": [{"text": "By constantly pairing opposites like liberty versus security and courage versus cowardice.", "isCorrect": true, "rationale": "The analysis states that the pairing of opposites gives the section its 'structural backbone,' reinforcing the divide between the free man and the mob."}, {"text": "By using scientific terminology to contrast with religious metaphors.", "isCorrect": false, "rationale": "While Mencken uses both registers, the primary structural backbone is identified as the pairing of conflicting concepts like liberty and security."}, {"text": "By following every insult to the common man with a scholarly historical citation.", "isCorrect": false, "rationale": "The scholarly tone appears primarily in the final paragraphs, but the core of the argument relies on the pairing of thematic opposites."}, {"text": "By contrasting the 'soft' sounds of liberty with the 'hard' consonants of the barnyard.", "isCorrect": false, "rationale": "Sound analysis is used to highlight specific passages, but antithesis refers to the conceptual pairing of opposites rather than just phonetics."}], "id": "q06"}, {"question": "Mencken's use of the word 'poltroonery' is specifically intended to evoke which of the following?", "options": [{"text": "A clash between the values of the chivalric tradition and the reality of the democratic electorate.", "isCorrect": true, "rationale": "The text explains that 'poltroonery' is a word from the chivalric tradition, and its use creates a collision between a world of knights and a world of cowards."}, {"text": "The scientific classification of humans as a subspecies of primates.", "isCorrect": false, "rationale": "This describes the word 'anthropoid,' not 'poltroonery.'"}, {"text": "The pomposity of politicians who speak in a 'grandiloquent' style.", "isCorrect": false, "rationale": "This refers to the word 'grandiloquently' and 'mountebanks,' while 'poltroonery' refers to the cowardice of the voters."}, {"text": "The sophisticated political strategies used by 'eccentric kings' to maintain power.", "isCorrect": false, "rationale": "The word is applied to the electorate to mock their lack of courage, not to the strategies of monarchs."}], "id": "q07"}, {"question": "What does the text identify as the 'tonal range' of this section, and what is its rhetorical purpose?", "options": [{"text": "From reverence to disgust, showing the height from which the common man is incapable of rising.", "isCorrect": true, "rationale": "The shift from the 'god-like' free man to the 'ox-like' common man illustrates the vast gap Mencken sees between the ideal and the reality."}, {"text": "From clinical detachment to angry rebellion, urging the reader to overthrow democratic moralism.", "isCorrect": false, "rationale": "Mencken's task is described as arming sympathizers with a formulation of shared convictions, not urging an active rebellion."}, {"text": "From scholarly historical analysis to poetic celebration of the American proletariat.", "isCorrect": false, "rationale": "Mencken holds the proletariat in contempt ('anthropoid,' 'ox'), so he does not celebrate them poetically."}, {"text": "From absolute skepticism to a hopeful vision of future democratic reform.", "isCorrect": false, "rationale": "Mencken's tone is consistently pessimistic about democracy; there is no mention of a 'hopeful vision' for reform."}], "id": "q08"}, {"question": "Which specific historical event in the 1920s does the text use to exemplify Mencken's contempt for 'democratic moralism'?", "options": [{"text": "The Eighteenth Amendment (Prohibition)", "isCorrect": true, "rationale": "The text notes that Prohibition restricted personal freedom in the name of majority morality, fueling Mencken's contempt."}, {"text": "The French Revolution", "isCorrect": false, "rationale": "While related to democracy, this is not a 1920s American event mentioned as a source of Mencken's direct observation."}, {"text": "The abolition of torture by Frederick the Great", "isCorrect": false, "rationale": "This occurred in the 18th century and is used as a positive example of absolute rule, not an example of 1920s democratic moralism."}, {"text": "The publication of Plato's Republic", "isCorrect": false, "rationale": "This is a philosophical text from ancient Greece that provides a tradition of skepticism, not a 1920s historical event."}], "id": "q09"}, {"question": "According to Mencken's passage on the requirements of liberty, which of the following is NOT listed as a component of being 'free'?", "options": [{"text": "Popular consensus", "isCorrect": true, "rationale": "Mencken lists self-reliance, resolution, enterprise, and the capacity for doing without, but he explicitly views the majority (consensus) as a threat to liberty."}, {"text": "Self-reliance", "isCorrect": false, "rationale": "This is explicitly listed in the passage beginning with 'Liberty means...'"}, {"text": "The capacity for doing without", "isCorrect": false, "rationale": "This is the final requirement listed in the parallel structure of Mencken's definition of liberty."}, {"text": "Resolution", "isCorrect": false, "rationale": "Resolution is one of the four key traits Mencken identifies as necessary for the 'free man.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
