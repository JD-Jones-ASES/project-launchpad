    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the rhetorical context of Section I.8, what role does Mencken adopt to transition from discussing the character of the 'democratic man' to the consequences of his power?", "options": [{"text": "A prosecutor delivering a closing argument with an accumulation of evidence.", "isCorrect": true, "rationale": "Mencken shifts from establishing 'character' to presenting the 'harm' caused by democracy, using a massive amount of evidence to overwhelm objections."}, {"text": "A detached scientist documenting the biological decay of a species.", "isCorrect": false, "rationale": "While he uses biological analogies, his rhetorical posture is one of active indictment rather than clinical observation."}, {"text": "An impartial historian cataloging the rise and fall of political systems.", "isCorrect": false, "rationale": "The text describes his tone as indignant and contemptuous, which is inconsistent with the neutrality of an impartial historian."}, {"text": "A defense attorney justifying the actions of the 'small minorities.'", "isCorrect": false, "rationale": "Mencken is attacking the 'mob' or 'democratic man' as a prosecutor would a defendant, rather than primarily defending the minorities in a court-like setting."}]}, {"question": "Mencken's use of the term 'Hookworm Belt' serves as a contemptuous reference to which specific historical and geographic context?", "options": [{"text": "The rural South during the era of anti-evolution laws and the Scopes Trial.", "isCorrect": true, "rationale": "The term links endemic disease in the South to what Mencken perceived as intellectual impoverishment and resistance to Enlightenment reason."}, {"text": "The industrial Midwest where labor unions resisted social legislation.", "isCorrect": false, "rationale": "The text specifically links the term to the Scopes Trial and 'anti-evolution acts,' which were centered in the South."}, {"text": "Urban centers like Los Angeles that implemented mandatory vaccination ordinances.", "isCorrect": false, "rationale": "While Los Angeles is mentioned regarding vaccination, it is not associated with the 'Hookworm Belt' label."}, {"text": "New England regions where 'Boston censors' were active in the arts.", "isCorrect": false, "rationale": "The 'Hookworm Belt' is a regional slur specifically targeting the rural South's perceived backwardness."}]}, {"question": "What is the primary function of the 'periodic sentence' in Mencken's prose style?", "options": [{"text": "To delay the main clause and build suspense, delivering the conclusion with the force of a verdict.", "isCorrect": true, "rationale": "By withholding the grammatical completion, Mencken forces the reader to absorb subordinate points before reaching a calculated finality."}, {"text": "To create a sense of urgency through short, rapid-fire independent clauses.", "isCorrect": false, "rationale": "This describes a staccato or telegraphic style, whereas periodic sentences are complex and characterized by delay."}, {"text": "To mimic the chaotic and uneducated speech patterns of the 'yokel.'", "isCorrect": false, "rationale": "Mencken uses polished, disciplined prose to contrast his intellect against what he sees as the chaos of the mob."}, {"text": "To provide a neutral platform for comparing multiple viewpoints of equal merit.", "isCorrect": false, "rationale": "The periodic sentence is described as the 'syntax of authority,' used to deliver indictments rather than neutral comparisons."}]}, {"question": "How does Mencken utilize a 'farrago' when discussing Fundamentalism?", "options": [{"text": "To reduce the theological movement to a confused mixture of intellectual debris.", "isCorrect": true, "rationale": "The word 'farrago' literally means a hodgepodge, which Mencken uses to dismiss the complexity of Fundamentalist thought."}, {"text": "To acknowledge the complex origins of the movement's diverse beliefs.", "isCorrect": false, "rationale": "The use of 'farrago' is a 'systematic degradation' meant to devalue the movement, not to credit it with legitimate complexity."}, {"text": "To suggest that Fundamentalism is a dangerous, highly organized conspiracy.", "isCorrect": false, "rationale": "A 'farrago' implies a lack of organization or a 'confused mixture' rather than a structured conspiracy."}, {"text": "To argue that religious thought is the only valid alternative to scientific cosmogonies.", "isCorrect": false, "rationale": "Mencken contrasts 'farrago' with science to show the intellectual inferiority of the former."}]}, {"question": "What is the intended rhetorical effect of Mencken's 'long catalogue of proper names' such as Homer, Virgil, and Bach?", "options": [{"text": "It acts as a sorting mechanism to separate the 'elect' readers from the 'mob.'", "isCorrect": true, "rationale": "By invoking these names without explanation, Mencken creates an exclusionary barrier that only the educated can cross."}, {"text": "It provides a comprehensive historical bibliography to support his political claims.", "isCorrect": false, "rationale": "These names are invoked like an 'incantation' or 'litany' rather than being cited as specific sources of evidence."}, {"text": "It highlights the democratic origins of the world's greatest artistic achievements.", "isCorrect": false, "rationale": "Mencken argues these achievements are the 'exclusive possession of small minorities' and are often resisted by the democratic mob."}, {"text": "It demonstrates that the 'common man' is gradually learning to appreciate high culture.", "isCorrect": false, "rationale": "Mencken uses these names to illustrate what the mob 'cannot comprehend' and remains indifferent to."}]}, {"question": "In Section I.8, what does Mencken's analogy of the 'barrel of cider' imply about the nature of the common man's thoughts?", "options": [{"text": "That his thinking is merely a mindless biochemical process rather than rational thought.", "isCorrect": true, "rationale": "By comparing thought to fermentation, Mencken reduces consciousness to chemistry, stripping it of political and intellectual validity."}, {"text": "That the common man's ideas improve and mellow over time through tradition.", "isCorrect": false, "rationale": "Mencken is using the metaphor to debase the common man, not to suggest a process of improvement or maturation."}, {"text": "That democratic debate is a volatile and potentially explosive environment.", "isCorrect": false, "rationale": "While 'fermentation' involves pressure, the text specifies the analogy is about the *capacity* for thought, not the social environment."}, {"text": "That rural life provides the essential 'raw materials' for higher civilization.", "isCorrect": false, "rationale": "Mencken views rural life ('Hookworm Belt') as intellectually impoverished and hostile to civilization's fruits."}]}, {"question": "Mencken's discussion of the Department of Agriculture serves as a case study for which rhetorical device?", "options": [{"text": "Structural irony, where the mob resists the very institutions that provide them with tangible benefits.", "isCorrect": true, "rationale": "The irony lies in the fact that the farmers, who benefited from the department's work, were the ones who 'unanimously' opposed it."}, {"text": "Hyperbole, where the efficiency of government agencies is exaggerated for comic effect.", "isCorrect": false, "rationale": "Mencken is not exaggerating the efficiency, but rather the absurdity of the mob's opposition to their own benefit."}, {"text": "Euphemism, where the failures of bureaucracy are masked by scientific jargon.", "isCorrect": false, "rationale": "Mencken uses direct, often harsh language rather than softening it with euphemisms."}, {"text": "Personification, where the government is treated as a sentient being with noble intentions.", "isCorrect": false, "rationale": "The focus is on the illogical behavior of the people (the mob) rather than imbuing the institution with human personality."}]}, {"question": "According to the close reading of Section I.8, why is the phrase 'chiefly unpopular and disreputable' considered ironic in the context of human progress?", "options": [{"text": "Because it shows that democracy's own values of popularity and respectability condemn the very people who drive progress.", "isCorrect": true, "rationale": "The irony is that those holding the 'finest fruits of progress' are rejected by the democratic standards of the majority."}, {"text": "Because Mencken secretly believes that unpopular people are actually hindering societal growth.", "isCorrect": false, "rationale": "The text explicitly states that these 'small minorities' are the ones who possess the 'finest fruits' of progress."}, {"text": "Because those who are 'disreputable' are typically the ones who hold the most political power in a democracy.", "isCorrect": false, "rationale": "Mencken contrasts these 'small minorities' with the 'mob' that wields political power in a democracy."}, {"text": "Because it implies that popularity is a prerequisite for achieving 'nobler virtues.'", "isCorrect": false, "rationale": "Mencken argues the opposite: that nobler virtues are the exclusive possession of those who are often unpopular."}]}, {"question": "Which word does Mencken use to describe the legal act of forbidding or condemning science or art that the mob cannot understand?", "options": [{"text": "Proscribe", "isCorrect": true, "rationale": "Mencken uses this formal legal term to characterize the mob's instinct to outlaw intellectual achievements."}, {"text": "Ameliorating", "isCorrect": false, "rationale": "'Ameliorating' refers to making something better or improving conditions, not forbidding them."}, {"text": "Cosmogonies", "isCorrect": false, "rationale": "'Cosmogonies' refers to theories of the origin of the universe, not the act of forbidding them."}, {"text": "Calaboose", "isCorrect": false, "rationale": "'Calaboose' is the place of punishment (a jail) rather than the legal act of condemnation."}]}, {"question": "How does Mencken's tone change in Section I.8 compared to earlier sections of Part I?", "options": [{"text": "It shifts from sardonic amusement to genuine, passionate indignation regarding the persecution of art and science.", "isCorrect": true, "rationale": "The text notes that Mencken's 'mask slips' and he becomes genuinely angry when defending culture against the mob."}, {"text": "It moves from a tone of anger to a more hopeful and 'ameliorating' outlook on human progress.", "isCorrect": false, "rationale": "Mencken remains pessimistic, and his anger actually increases in this section as he details the harm done by democracy."}, {"text": "It transitions from clinical analysis to a playful, almost whimsical satire of rural life.", "isCorrect": false, "rationale": "The satire is described as 'angry' and 'contemptuous,' not whimsical or light-hearted."}, {"text": "It becomes more academic and dry as he relies heavily on historical lists of names.", "isCorrect": false, "rationale": "Despite the 'encyclopedic' references, the prose 'vibrates with a fury' that prevents it from being dry or merely academic."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
