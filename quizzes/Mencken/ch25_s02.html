    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 25, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Mencken, what is the fundamental reason that democracy is considered the 'most charming' form of government?", "options": [{"text": "It aligns perfectly with the objective and demonstrable truth of human equality.", "isCorrect": false, "rationale": "Mencken argues that democracy is based on propositions that are palpably not true, suggesting that truth is too harsh for the majority of men."}, {"text": "It caters to the incurable romanticism and desire for comforting falsehoods in the majority of men.", "isCorrect": true, "rationale": "The author contends that men prefer fascinating and satisfying lies over the harsh air of finality that accompanies the truth."}, {"text": "It provides a superior moral framework compared to the dominant religious systems of the world.", "isCorrect": false, "rationale": "While Mencken compares democracy to religion, he views both as systems based on false promises rather than superior moral frameworks."}, {"text": "It allows the 'mob man' to achieve genuine and lasting happiness through political participation.", "isCorrect": false, "rationale": "Mencken explicitly states that the forms of happiness found in democracy are illusory and do not last."}]}, {"question": "Mencken compares the foundational 'ancient promise' of democracy to which other system?", "options": [{"text": "Monarchy", "isCorrect": false, "rationale": "The author uses monarchy as a contrast to highlight democratic paradoxes, but not as the parallel for its foundational promise."}, {"text": "Christianity", "isCorrect": true, "rationale": "Mencken links the democratic promise that the 'lowly shall inherit the earth' directly to the dominant religious system of the modern world."}, {"text": "The Scientific Method", "isCorrect": false, "rationale": "Democracy, in Mencken's view, relies on 'grotesque false pretences' and 'imbecilities' rather than scientific inquiry."}, {"text": "Feudalism", "isCorrect": false, "rationale": "Feudalism is not discussed as a parallel system sharing the same 'lowly shall inherit the earth' ideology."}]}, {"question": "What does Mencken identify as the 'seeds of disaster' inherent in the democrat's pursuit of happiness?", "options": [{"text": "The inability to distinguish between religious and political authority.", "isCorrect": false, "rationale": "While he critiques both, the primary disaster is attributed to a specific delusion about the nature of obtaining happiness."}, {"text": "The external threat of foreign despots and autocratic regimes.", "isCorrect": false, "rationale": "Mencken focuses on internal flaws—stupidity and the 'nature of things'—rather than external geopolitical threats."}, {"text": "The naive delusion that happiness is obtained by taking it from others.", "isCorrect": true, "rationale": "Mencken notes that the democrat believes happiness is a finite resource to be seized from 'the other fellow,' leading to inevitable thumps."}, {"text": "The refusal of the mob to be rigorously policed by laws.", "isCorrect": false, "rationale": "Mencken views the policing of the mob as a democratic paradox, but the 'seeds of disaster' are rooted in the democrat's own stupidity."}]}, {"question": "Which historical figures does Mencken cite as 'tribunes of democracy' who converted into despots during national emergencies?", "options": [{"text": "Lincoln, Roosevelt, and Wilson", "isCorrect": true, "rationale": "The text explicitly names these three as leaders who abandoned democratic philosophy for 'fabulous ferocity' during strain."}, {"text": "Jackson, Cleveland, and Bryan", "isCorrect": false, "rationale": "While Jackson and Cleveland are mentioned in the background and Bryan is called a 'prophet,' the primary list of despotic converts is different."}, {"text": "Jefferson, Madison, and Adams", "isCorrect": false, "rationale": "These founding figures are not included in Mencken's specific list of leaders who became despots during crises."}, {"text": "Washington, Grant, and McKinley", "isCorrect": false, "rationale": "These figures are absent from the section discussing democracy's tendency to abandon its philosophy during strain."}]}, {"question": "In Mencken's view, why is the 'spectator' more favored than the actual participant in a democracy?", "options": [{"text": "The spectator gains more political power by remaining objective.", "isCorrect": false, "rationale": "The author suggests the spectator is 'favoured' with amusement, not political power or influence."}, {"text": "Democracy functions best when the majority are passive observers.", "isCorrect": false, "rationale": "Mencken does not claim it 'functions' well; he claims it is a 'welter of fraud' that provides entertainment."}, {"text": "The inherent fraud and absurdities of democracy provide high-quality entertainment.", "isCorrect": true, "rationale": "Mencken argues that the 'true charm' of democracy is the 'heroically absurd' show it puts on for those watching."}, {"text": "Spectators are immune to the 'self-limiting disease' that affects citizens.", "isCorrect": false, "rationale": "While they observe the disease, the text focuses on the 'mirth' and 'exhilaration' of the spectacle rather than personal immunity."}]}, {"question": "Which paradox does Mencken use to illustrate democracy's 'war upon liberty'?", "options": [{"text": "A government of laws requiring men to interpret what those laws are.", "isCorrect": false, "rationale": "This is mentioned as a 'thundering paradox,' but Mencken uses a different example to specifically illustrate the 'war' on the corner-stone of liberty."}, {"text": "The execution of criminals by those who claim to value human life.", "isCorrect": false, "rationale": "The text mentions 'hangmen,' but not as a paradox regarding the philosophical advocacy of liberty."}, {"text": "Americans being jailed for reading the Bill of Rights.", "isCorrect": true, "rationale": "Mencken offers this as a 'gaudily humorous' example of democracy warring against the academic advocacy of its own foundational principles."}, {"text": "The mob being ruled by the very people it elects.", "isCorrect": false, "rationale": "This describes a general democratic function, but not the specific paradox Mencken uses to highlight the absurdity of jailing people for foundational texts."}]}, {"question": "What is Mencken's concluding assessment regarding the role of 'rascality' in human government?", "options": [{"text": "It is a temporary obstacle that true democracy will eventually overcome.", "isCorrect": false, "rationale": "Mencken is cynical about progress, suggesting rascality might actually be a necessary constant."}, {"text": "It may be a necessary component for civilization itself, reflecting a 'colossal swindle'.", "isCorrect": true, "rationale": "Mencken muses that civilization might be a swindle and that rascality is perhaps essential to its survival."}, {"text": "It is unique to democratic systems and absent in monarchies.", "isCorrect": false, "rationale": "The author states that every form of government is 'wasteful, extravagant, dishonest' and an enemy to virtuous men."}, {"text": "It is the primary reason why 'virtuous men' should lead the government.", "isCorrect": false, "rationale": "Mencken claims all governments are enemies to 'laborious and virtuous men,' implying such men are unlikely to thrive in leadership."}]}, {"question": "Mencken describes the 'mob man' as obtaining a sense of power from 'maudlin herding after rogues and mountebanks.' What other figures does he compare to this 'magnifico'?", "options": [{"text": "United States Senators and Young Intellectuals", "isCorrect": false, "rationale": "These groups are specifically associated with the 'conviction that he is somehow wise,' rather than the 'sense of vast and mysterious power'."}, {"text": "Hangmen and husbands", "isCorrect": false, "rationale": "These groups are associated with a 'glowing consciousness of a high duty triumphantly done'."}, {"text": "Archbishops, police sergeants, and grand goblins of the Ku Klux", "isCorrect": true, "rationale": "Mencken groups these figures together as those who enjoy a sense of 'vast and mysterious power' similar to the mob man's feeling of importance."}, {"text": "Fortune-tellers and Presbyterians", "isCorrect": false, "rationale": "Fortune-tellers are linked to wisdom/betters, and Presbyterians appear in an analogy regarding the 'Last Day'."}]}, {"question": "According to the source material, what does Mencken find 'more amusing even... than the fraud of religion'?", "options": [{"text": "The incompetence of the Bill of Rights.", "isCorrect": false, "rationale": "While he finds jailing people for reading it humorous, he identifies the 'fraud of democracy' as the overarching most amusing thing."}, {"text": "The fraud of democracy.", "isCorrect": true, "rationale": "Mencken explicitly contends that the fraud of democracy is 'miles' more amusing than the fraud of religion."}, {"text": "The spectacle of Presbyterians rising from the grave.", "isCorrect": false, "rationale": "This is a humorous imagery used to illustrate how someone would react if they didn't laugh at democratic inventions, not the primary fraud."}, {"text": "The typography of Bodoni type used in the book.", "isCorrect": false, "rationale": "The typography is discussed in the publisher's note, but Mencken's amusement is directed at political systems."}]}, {"question": "What 'depressing mathematical formula' does Mencken refer to in relation to democratic promises?", "options": [{"text": "The ratio of 'dunderheads' to 'virtuous men' in a population.", "isCorrect": false, "rationale": "While he mentions these groups, he does not apply a mathematical formula to their ratio."}, {"text": "The likelihood of a promise being fulfilled, regardless of 'divine revelation'.", "isCorrect": true, "rationale": "Mencken suggests that a promise is just a promise and that the odds against fulfillment are statistically bleak."}, {"text": "The speed at which a democracy converts into a despotism.", "isCorrect": false, "rationale": "He describes this process as being as simple as 'taking a deep breath,' but not as a specific mathematical formula."}, {"text": "The financial waste accumulated since 1776.", "isCorrect": false, "rationale": "He mentions the year 1776 and financial extravagance, but not in the context of a mathematical formula for failure."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
