        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 14, Section 2</div>
    </div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to Mencken, why is the term 'courtier of democracy' an apt description for a politician?", "options": [{"text": "The politician genuinely serves the public will as a courtier serves a monarch.", "isCorrect": false, "rationale": "This view assumes a level of sincere service that the text explicitly denies, viewing the politician instead as a victimizer."}, {"text": "The politician uses flattery to deceive and rule the very people they ostensibly serve.", "isCorrect": true, "rationale": "The essence of the courtier's 'art and mystery,' according to the text, is yielding to an employer in order to ultimately control them."}, {"text": "The politician is restricted by the same rigid protocols and traditions found in a royal court.", "isCorrect": false, "rationale": "The text focuses on the functional deceit of the role rather than the formal or traditional constraints of a court setting."}, {"text": "The politician acts as a noble mediator between the elite and the common populace.", "isCorrect": false, "rationale": "Mencken describes the politician as a 'sturdy rogue' rather than a noble mediator, focusing on self-interest over social harmony."}]}, {"question": "Mencken distinguishes between two specific 'arts' within the democratic process. How does he define the role of the 'demaslave'?", "options": [{"text": "One who preaches doctrines they know to be false to an audience they consider fools.", "isCorrect": false, "rationale": "This definition describes the demagogue, who takes an active role in spreading lies, rather than the reactive role of the demaslave."}, {"text": "One who adopts and pretends to believe the delusions and prejudices of the masses.", "isCorrect": true, "rationale": "The 'demaslave' is characterized by a submissive pretense, listening to the 'idiots' and echoing their beliefs to gain favor."}, {"text": "A political operative who works behind the scenes to control the voting process.", "isCorrect": false, "rationale": "While such a role exists in the 'boss' system, it does not match Mencken's specific linguistic invention of the 'demaslave'."}, {"text": "A voter who is perpetually enslaved to the promises of the majority party.", "isCorrect": false, "rationale": "The term refers to the practitioner of the art of politics (the office-seeker), not the voter themselves."}]}, {"question": "Why does Mencken argue that an educated man stating 'elementary notions' of government is unlikely to be elected?", "options": [{"text": "The complexities of government are beyond the comprehension of even the most educated.", "isCorrect": false, "rationale": "The barrier to election is not the complexity of the task, but the negative reaction of the voters to plain truths."}, {"text": "The educated man typically lacks the 'loud voice' and stamina required for a campaign.", "isCorrect": false, "rationale": "While Mencken mentions a loud voice is necessary, the primary obstacle is the fear and suspicion that frankness would arouse in the mob."}, {"text": "Frankness would arouse fears in the mob that would work against the candidate.", "isCorrect": true, "rationale": "The text states that the business of the politician is to arouse fears that favor them, whereas truth-telling does the opposite."}, {"text": "The democratic system is legally structured to favor professional politicians over intellectuals.", "isCorrect": false, "rationale": "The text focuses on the psychological and social dynamics of the electorate rather than specific legal statutes."}]}, {"question": "In the context of the text, what does Mencken mean by the term $Homo\\ vulgaris$?", "options": [{"text": "A rare species of intellectual who survives in a democratic state.", "isCorrect": false, "rationale": "This is the opposite of Mencken's meaning, as the term refers to the common, or 'vulgar,' man."}, {"text": "The common or vulgar human being who prefers the safety of the herd.", "isCorrect": true, "rationale": "Mencken uses this coinage to describe the masses who lack the capacity for independent action and seek the protection of a 'bell-wether'."}, {"text": "A politician who has successfully transitioned from a boss to a statesman.", "isCorrect": false, "rationale": "The term refers to the electorate (the common people) rather than the political class that exploits them."}, {"text": "The ideal citizen of a civilized state who values liberty above all else.", "isCorrect": false, "rationale": "Mencken argues that this figure actually fears liberty and is incapable of the duties of a civilized citizen."}]}, {"question": "According to Mencken's analysis of the 'boss' system, what was the fundamental error made by American reformers?", "options": [{"text": "They failed to provide enough economic incentives to compete with the boss's coal and jobs.", "isCorrect": false, "rationale": "Economic competition was not the issue; the error was in understanding where the boss's power originated."}, {"text": "They believed the boss was imposed from the outside rather than being a natural product of the people.", "isCorrect": true, "rationale": "Mencken argues that the boss is a reflection of the people's own weaknesses, and removing one only leads to another (like the 'prehensile Methodist parson')."}, {"text": "They focused too heavily on the legislative branch while ignoring the judicial corruption.", "isCorrect": false, "rationale": "While Mencken mentions judicial corruption, his critique of reformers centers on their misunderstanding of the mob's nature."}, {"text": "They underestimated the intelligence and organizational skills of the boss.", "isCorrect": false, "rationale": "The boss's skills are acknowledged, but the focus is on the mob's 'congenital incapacity' for independence."}]}, {"question": "Mencken cites the Anti-Saloon League as an example of how a minority can dominate politics. By what primary method did they achieve this?", "options": [{"text": "By winning a majority of the popular vote in every state.", "isCorrect": false, "rationale": "Mencken explicitly states that the league nowhere includes a majority of voters among its members."}, {"text": "By using a highly efficient technique of intimidation and awakening the mob's envy.", "isCorrect": true, "rationale": "The organization succeeded by intimidating place-seeking politicians and mustering popular support through fear and hatred of 'betters'."}, {"text": "By educating the public on the scientific dangers of alcohol consumption.", "isCorrect": false, "rationale": "Mencken dismisses the idea of rational education in democracy, focusing instead on the 'shrewd understanding' of sentimentalities and fears."}, {"text": "By adhering strictly to democratic methods of leadership selection.", "isCorrect": false, "rationale": "The text notes that the leaders of such organizations are 'nowhere chosen by democratic methods'."}]}, {"question": "What 'commodity' does the democratic politician have for sale, according to the text?", "options": [{"text": "Economic stability.", "isCorrect": false, "rationale": "While economic factors are tools, they are not the central commodity the politician trades in their professional role."}, {"text": "Public honour.", "isCorrect": false, "rationale": "Mencken says public honour 'caresses' the politician, but power is what they actually have for sale."}, {"text": "Power.", "isCorrect": true, "rationale": "The text explicitly states that power is the commodity the politician has for sale, often traded for the purpose of maintaining their place at the 'public trough'."}, {"text": "Truth.", "isCorrect": false, "rationale": "Mencken argues the politician's armamentarium consists of deceits, and they only embrace truth if 'lying peters out'."}]}, {"question": "Mencken uses the analogy of an experienced 'chorus girl' to describe 'old birds' in politics. What is the central point of this comparison?", "options": [{"text": "The necessity of maintaining a youthful and attractive public image.", "isCorrect": false, "rationale": "The analogy is about moral compromise, not physical appearance or public relations."}, {"text": "The resigned and complacent acceptance of having compromised one's honour for a job.", "isCorrect": true, "rationale": "The analogy suggests that survival in politics requires a fundamental loss of dignity that the practitioner eventually views with resignation."}, {"text": "The collaborative nature of working in a large political organization.", "isCorrect": false, "rationale": "The focus of the analogy is the individual's submission to a 'manager' (or the system) rather than teamwork."}, {"text": "The fleeting and temporary nature of political fame and success.", "isCorrect": false, "rationale": "While political life may be unstable, the 'chorus girl' point specifically concerns the price of admission to the profession."}]}, {"question": "How does Mencken characterize the 'moral' code of the professional democratic politician?", "options": [{"text": "A strict adherence to the principles of the Constitution regardless of popular opinion.", "isCorrect": false, "rationale": "Mencken argues that the politician has 'no shadow of principle' and will change convictions overnight."}, {"text": "A commitment to altruism and the whole-hearted service of fellow-men.", "isCorrect": false, "rationale": "This is what the politician 'pretends' to be, whereas his 'actual' nature is that of a 'sturdy rogue'."}, {"text": "Anything is moral if it helps the politician keep their place at the public trough.", "isCorrect": true, "rationale": "Mencken states that getting into office by false pretenses or changing convictions for votes is considered moral under their professional code."}, {"text": "The belief that the ends of social justice always justify the means of political corruption.", "isCorrect": false, "rationale": "The politician's goal is not 'social justice' but personal power and the 'clapper-clawing of the vulgar'."}]}, {"question": "In Mencken's view, what is the 'eternal reductio ad absurdum' of the whole democratic process?", "options": [{"text": "The President of the United States.", "isCorrect": false, "rationale": "While the President is mentioned as an example of the politician, he is not the specific 'reductio ad absurdum' named in this context."}, {"text": "The political boss.", "isCorrect": true, "rationale": "The boss exemplifies the reduction of all ideas to elemental wants and reflects the common man's fear of liberty."}, {"text": "The Anti-Saloon League.", "isCorrect": false, "rationale": "This group is an example of minority intimidation, but not the specific 'reduction to absurdity' of the process itself."}, {"text": "The Methodist parson.", "isCorrect": false, "rationale": "The parson is a successor to the boss, but it is the boss himself who serves as the primary example of the process's failure."}]}, {"question": "Which quality does Mencken claim remains in a politician even after their pride and dignity have vanished?", "options": [{"text": "Honour.", "isCorrect": false, "rationale": "Mencken explicitly states there is no 'shadow of principle or honour' in the politician's professional aspect."}, {"text": "Vanity.", "isCorrect": true, "rationale": "The text notes that while pride is lost in the wastes of the subconscious, 'Vanity remains to him'."}, {"text": "Courage.", "isCorrect": false, "rationale": "The politician is described as a 'coward and a trimmer ex officio'."}, {"text": "Wisdom.", "isCorrect": false, "rationale": "The politician's equipment is described as an 'armamentarium of deceits' rather than wisdom."}]}, {"question": "According to Mencken, what is the 'principal, and often sole aim in life' for the actual (as opposed to the ostensible) politician?", "options": [{"text": "To protect the rights of the minority from the tyranny of the majority.", "isCorrect": false, "rationale": "The politician actually uses the mob's prejudices to prey upon others, rather than protecting rights."}, {"text": "To 'butter his parsnips' (serve his own private interests).", "isCorrect": true, "rationale": "Mencken uses this idiom to describe the politician as a 'sturdy rogue' whose true goal is personal gain."}, {"text": "To achieve a place in history as a great statesman.", "isCorrect": false, "rationale": "While they seek 'public honour' now, their immediate concern is holding their job at all costs through lying or shifting convictions."}, {"text": "To educate the mob so that it may eventually govern itself.", "isCorrect": false, "rationale": "Mencken argues that the mob has a 'congenital incapacity' for such duties, and the politician profits from this incapacity."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
