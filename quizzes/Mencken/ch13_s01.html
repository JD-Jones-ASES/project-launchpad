<script>
var QUESTIONS = [{"question": "What is Mencken's fundamental argument regarding the perceived 'injustice' of disproportional representation in the United States?", "options": [{"text": "It is a voluntary sacrifice of pure democratic theory for the sake of a workable practice.", "isCorrect": true, "rationale": "Mencken argues that the deviation from pure theory is a feature of the democratic will choosing pragmatism over abstract ideals."}, {"text": "It is a historical oversight that the 'sovereign people' have neglected to correct.", "isCorrect": false, "rationale": "This aligns with the 'reformer' view that Mencken explicitly rejects in favor of a more cynical, practical interpretation."}, {"text": "It represents a failure of the Constitution to adapt to the growth of urban centers.", "isCorrect": false, "rationale": "Mencken views the underrepresentation of cities not as a failure, but as an expression of the existing democratic machinery at work."}, {"text": "It is an accidental byproduct of the Senate's unique role as a check on executive power.", "isCorrect": false, "rationale": "The text describes it as a 'voluntary sacrifice' rather than an accident or a specific byproduct of checking the executive."}]}, {"question": "How does the term 'fuglemen' function within Mencken’s rhetorical context?", "options": [{"text": "It reduces democratic reformers to mindless performers who lead others in empty drill movements.", "isCorrect": true, "rationale": "Mencken uses the military origin of the word to suggest that advocates of pure democracy are more interested in 'show' than substance."}, {"text": "It honors the early pioneers of the democratic movement who established the 'one-man-one-vote' formula.", "isCorrect": false, "rationale": "The context is 'sardonic patience' and 'barnyard contempt,' which contradicts the idea of honoring these figures."}, {"text": "It identifies the specific legal experts who draft the 'complicated remedies' Mencken critiques.", "isCorrect": false, "rationale": "The term is used as a metaphor for their role as performers, not as a literal job description for legal drafters."}, {"text": "It suggests that reformers are military-minded individuals seeking to overthrow the government.", "isCorrect": false, "rationale": "While the word has a military origin, Mencken applies it to the theatrical and imitative nature of their advocacy rather than literal militancy."}]}, {"question": "In the context of Mencken's anatomical metaphor, what does the 'limberness' of the $biceps$ $femoris$, $semitendinosus$, and $semimembranosus$ signify?", "options": [{"text": "The practiced ability of Supreme Court justices to bend the knee and genuflect before political powers.", "isCorrect": true, "rationale": "These are the hamstring muscles used for bending the knee, implying the justices are highly skilled in subservience."}, {"text": "The intellectual flexibility required to interpret the Constitution in a modern context.", "isCorrect": false, "rationale": "Mencken is being insulting rather than complimentary; he refers to physical genuflection, not intellectual adaptability."}, {"text": "The physical decline of the judiciary due to the 'senile deterioration' common in the Senate.", "isCorrect": false, "rationale": "The text describes the muscles as 'limber,' which implies a high degree of capability in their specific (subservient) function."}, {"text": "The predatory nature of justices who wait to strike at 'privately profitable' opportunities.", "isCorrect": false, "rationale": "While the profit motive is mentioned, the specific anatomical reference focuses on the act of bending or bowing."}]}, {"question": "What is the primary rhetorical effect of the anaphoric 'They could' catalogue in the second half of the section?", "options": [{"text": "It gives the reasonable and the insane equal syntactic weight to emphasize the absurdity of popular sovereignty.", "isCorrect": true, "rationale": "The parallel structure places constitutional amendments and trivial requirements on the same level, making the power of the people seem farcical."}, {"text": "It provides a comprehensive legal framework for how the sovereign people might reclaim their power.", "isCorrect": false, "rationale": "The items listed, such as requiring the President to sleep in his underclothes, are intended to be ridiculous, not helpful legal advice."}, {"text": "It demonstrates Mencken's belief that the public's power should be expanded to include social regulations.", "isCorrect": false, "rationale": "Mencken uses this list to show the 'worthlessness' of sovereignty by demonstrating how it can be used for absurdity."}, {"text": "It serves to balance the text's earlier focus on the technicalities of the Supreme Court's jurisdiction.", "isCorrect": false, "rationale": "The catalogue is a rhetorical escalation meant to shock and provoke, rather than a neutral stylistic balance."}]}, {"question": "How does Mencken use the phrase 'elevated to the ermine' to complicate the reader's view of the Supreme Court?", "options": [{"text": "It uses ceremonial language to heighten the contrast with the 'desperate struggle' for careerist advancement.", "isCorrect": true, "rationale": "By pairing royal imagery with the gritty reality of political 'struggling,' Mencken mocks the dignity of judicial appointments."}, {"text": "It reinforces the idea that Supreme Court justices are like monarchs who should be beyond public criticism.", "isCorrect": false, "rationale": "Mencken’s goal is to deflate the Court’s dignity, not to protect it from criticism."}, {"text": "It suggests that the justices are literal 'kine in the byres' who have been given human clothing.", "isCorrect": false, "rationale": "The 'kine' metaphor is used for the enfranchised masses, while 'ermine' is specific to the ceremonial robes of judges."}, {"text": "It highlights the financial burden placed on citizens to provide for the luxuries of the judiciary.", "isCorrect": false, "rationale": "The phrase targets the pretension and careerism of the judges themselves, rather than the tax burden on citizens."}]}, {"question": "Which argumentative strategy is most prominent when Mencken suggests legalizing the assassination of public officers?", "options": [{"text": "$Reductio$ $ad$ $absurdum$, extending the logic of popular sovereignty until it collapses into nonsense.", "isCorrect": true, "rationale": "Mencken takes the premise of 'unlimited power' to its most extreme and shocking conclusion to show how ridiculous the premise is."}, {"text": "$Ad$ $hominem$ attacks, targeting the character of public officers rather than their political actions.", "isCorrect": false, "rationale": "While he is insulting, the primary strategy here is to push a specific concept of 'sovereignty' to its breaking point."}, {"text": "Syllogistic reasoning, building a logical proof from the definitions of the Constitution.", "isCorrect": false, "rationale": "Mencken's approach is based on shock and escalation (exhibition) rather than formal logical proofs."}, {"text": "Apeal to authority, using his rights as a 'citizen and patriot' to validate the proposal.", "isCorrect": false, "rationale": "Mencken refers to his rights ironically to adopt a persona; the actual argument is based on the absurdity of the proposal itself."}]}, {"question": "Mencken's use of 'kine in the byres' in a list including 'idiots' and 'aliens' serves to:", "options": [{"text": "Render the concept of universal enfranchisement as a chaotic 'barnyard roll call.'", "isCorrect": true, "rationale": "The inclusion of livestock in a list of potential voters mocks the logic that everyone (or everything) should have a voice in democracy."}, {"text": "Argue for the protection of rural interests against the encroachment of city politics.", "isCorrect": false, "rationale": "Mencken generally uses 'yokels' and 'bucolic imbecilities' to express contempt for rural political power."}, {"text": "Provide a historical account of groups that were previously excluded from the democratic process.", "isCorrect": false, "rationale": "The list is hypothetical and satirical, meant to demonstrate what the sovereign people *could* do, not what has happened."}, {"text": "Explain the biological basis for the 'senile deterioration' he observes in the Senate.", "isCorrect": false, "rationale": "The phrase refers specifically to cattle in stalls as part of a list of potential voters, not to medical conditions."}]}, {"question": "According to the rhetorical analysis, what is the effect of Mencken's 'periodic sentences' in the opening paragraphs?", "options": [{"text": "They withhold the main point until the end of the sentence to ensure the reader first absorbs the full portrait of the subject.", "isCorrect": true, "rationale": "By delaying the 'payload,' Mencken forces the reader to sit with his elaborate descriptions before reaching his final judgment."}, {"text": "They create a sense of frantic urgency that mirrors the 'fevered' state of the romantic reformers.", "isCorrect": false, "rationale": "The tone is described as 'sardonic patience' and the sentences as 'long, qualifying structures,' which suggests control rather than frenzy."}, {"text": "They use simple, direct subject-verb-object patterns to clarify the machinery of government for the reader.", "isCorrect": false, "rationale": "Periodic sentences are complex and withholding, the opposite of the direct clarity found in the later 'They could' clauses."}, {"text": "They mimic the 'limberness' of the hamstrings by allowing the sentence to bend back on itself.", "isCorrect": false, "rationale": "While the metaphor is clever, the analysis states the periodic sentences are used to delay the payload for rhetorical effect."}]}, {"question": "The 'beautiful talent for reconciling the ideally just with the privately profitable' is an example of Mencken's use of:", "options": [{"text": "Antithesis and irony to expose the core corruption of political operators.", "isCorrect": true, "rationale": "The contrast between the high-minded 'ideally just' and the selfish 'privately profitable' highlights the hypocrisy he sees in the system."}, {"text": "Hyperbole to suggest that corruption is actually a rare and 'beautiful' occurrence.", "isCorrect": false, "rationale": "The word 'beautiful' is used ironically to express contempt, not to suggest the rarity or literal beauty of the act."}, {"text": "Euphemism to soften the blow of his criticism against the Supreme Court.", "isCorrect": false, "rationale": "Mencken's intent is to 'cut deeper' with a whisper; his words are chosen for maximum impact, not to soften the blow."}, {"text": "A tricolon that parodies the Court's fondness for enumerating legal precedents.", "isCorrect": false, "rationale": "The anatomical list of muscles is the tricolon; this specific phrase is a balanced antithesis."}]}, {"question": "How does the tone of the section evolve as Mencken moves from the 'concrete machinery' of government to the 'sovereign people'?", "options": [{"text": "It shifts from a mask of sober, patient analysis to a state of reckless, giddy provocation.", "isCorrect": true, "rationale": "The text describes a transition from explaining things to the 'hundredth time' to delighting in 'shocking his audience' with absurdities."}, {"text": "It moves from 'barnyard contempt' to a profound respect for the limitless power of the Constitution.", "isCorrect": false, "rationale": "Mencken’s contempt only grows as he demonstrates the absurdity of the power he is describing."}, {"text": "It transitions from a medical diagnostic style to a medieval ceremonial style.", "isCorrect": false, "rationale": "The medical and ceremonial dictions are used throughout to describe the same subjects (the Court/politicians) rather than representing a shift in section tone."}, {"text": "It begins with 'romantic' ideals and ends with 'practical' solutions for reapportionment.", "isCorrect": false, "rationale": "Mencken mocks the romantic ideals from the start and rejects the very idea of 'remedies' or 'solutions.'"}]}, {"question": "Why does Mencken utilize medical vocabulary, such as 'senile deterioration' and specific muscle names, when describing political institutions?", "options": [{"text": "To treat political and judicial flaws as clinical conditions or biological pathologies rather than mere errors.", "isCorrect": true, "rationale": "This diction 'drags the machinery of government... into the mud of actual politics' by diagnosing it like a physical ailment."}, {"text": "To demonstrate his own expertise in the field of medicine to an 'educated reader.'", "isCorrect": false, "rationale": "While the vocabulary is sophisticated, the purpose is satirical and rhetorical, not a genuine display of medical credentials."}, {"text": "To suggest that the Constitution is a 'living organism' that requires constant surgical adjustment.", "isCorrect": false, "rationale": "Mencken’s medical metaphors are used to insult the individuals and institutions, not to support the 'living Constitution' theory."}, {"text": "To simplify complex legal theories into 'barnyard' terms that a 'yokel' could understand.", "isCorrect": false, "rationale": "The use of Latin anatomical terms is the opposite of simplification; it is an 'insider’s joke' for the educated reader."}]}, {"question": "What is the 'ironic architecture' of Mencken's entire argument in this section?", "options": [{"text": "He proves the people are sovereign only to demonstrate that their sovereignty is worthless or misused.", "isCorrect": true, "rationale": "The more power Mencken attributes to the people, the more contemptible their failure to use that power wisely becomes."}, {"text": "He argues that democracy is the best system of government while simultaneously proposing its replacement by a monarchy.", "isCorrect": false, "rationale": "He mocks the practitioners of democracy but doesn't explicitly propose a return to monarchy in this text."}, {"text": "He uses the logic of 'pure democracy' to prove that the current system of apportionment is mathematically perfect.", "isCorrect": false, "rationale": "Mencken calls the current system an 'apparent injustice' and a sacrifice of 'pure theory,' not a mathematical perfection."}, {"text": "He defends the Supreme Court's dignity by using medical terms to justify their legal decisions.", "isCorrect": false, "rationale": "The medical terms are used to mock the Court's dignity and reveal their political sycophancy."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
