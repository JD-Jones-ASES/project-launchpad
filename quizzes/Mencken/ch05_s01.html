<script>
var QUESTIONS = [{"question": "According to the analysis of Mencken's rhetorical context, what is the primary purpose of his writing in this section of 'Notes on Democracy'?", "options": [{"text": "To entertain readers who already share his cynical view of democratic politics.", "isCorrect": true, "rationale": "The text states his task is not to persuade skeptics but to entertain sympathizers and push them further than expected."}, {"text": "To provide a comprehensive and objective history of American political crises.", "isCorrect": false, "rationale": "While he covers historical ground, the text explicitly notes it is not a history lesson but a 'prosecutorial brief' with selected evidence."}, {"text": "To persuade skeptical readers of the inherent dangers of universal suffrage.", "isCorrect": false, "rationale": "The analysis indicates Mencken's audience is the educated reader who 'already suspects that democratic politics is a swindle.'"}, {"text": "To offer a sociological study of the behavior of the 'inferior man' in power.", "isCorrect": false, "rationale": "Although he previously established the 'inferior man,' this section focuses on the 'disease' of the system itself rather than just the patient."}], "id": "q01"}, {"question": "Mencken's use of the term 'professors of mob psychology' to describe demagogues is cited as a prime example of which rhetorical technique?", "options": [{"text": "Register mixing", "isCorrect": true, "rationale": "This yokes together an elevated academic term ('professors') with a low-register street term ('mob') to create irony and deflation."}, {"text": "Extended metaphor", "isCorrect": false, "rationale": "While it contains metaphorical elements, the text uses this specific example to define the collision of formal and informal language levels."}, {"text": "Litotes", "isCorrect": false, "rationale": "Litotes involves ironic understatement, whereas this phrase relies on the juxtaposition of contrasting social and linguistic spheres."}, {"text": "Anaphora", "isCorrect": false, "rationale": "Anaphora is the repetition of words at the beginning of successive clauses, which is not the primary mechanism of this specific phrase."}], "id": "q02"}, {"question": "How does Mencken's tone shift when transitioning from the general 'bugaboo' catalogue to the discussion of the World War?", "options": [{"text": "The tone becomes darker and more serious as he describes the manufacture of lethal fear.", "isCorrect": true, "rationale": "The analysis notes that while amusement remains, it 'becomes darker' because he is describing fear manufactured to send men to their deaths."}, {"text": "The tone shifts from sardonic amusement to a scholarly, neutral historical register.", "isCorrect": false, "rationale": "The text states Mencken uses clinical language to make the indictment sharper, but his 'satirist's grin' does not disappear; it merely tightens."}, {"text": "The tone moves from weary observation to an explicit, angry moral condemnation.", "isCorrect": false, "rationale": "Mencken avoids announcing a shift to a 'graver matter' or using explicit outrage, instead relying on diction to darken the mood subtly."}, {"text": "The tone becomes more optimistic, suggesting war acts as a catalyst for democratic reform.", "isCorrect": false, "rationale": "The passage describes war as 'government by orgy, almost by orgasm,' suggesting a peak of irrationality rather than reform."}], "id": "q03"}, {"question": "In the analysis of Mencken's syntax, what is the rhetorical effect of his 'long, rolling catalogue sentence followed by a short, sharp verdict'?", "options": [{"text": "The short sentence acts as a rhythmic punchline that suggests the preceding evidence is irrefutable.", "isCorrect": true, "rationale": "The short sentence, such as 'The list might be lengthened indefinitely,' dismisses the need for further proof after an overwhelming accumulation of detail."}, {"text": "The short sentence provides a nuanced qualification that softens the impact of the long list.", "isCorrect": false, "rationale": "Mencken uses the short sentence to punctuate and emphasize his verdict rather than to offer a balanced or cautious counter-perspective."}, {"text": "The long sentence is intended to confuse the reader, while the short sentence clarifies his actual thesis.", "isCorrect": false, "rationale": "The long sentence is a 'cumulative structure' meant to carry the reader along with its momentum, not to cause confusion."}, {"text": "The contrast between the two creates a sense of academic balance between complex evidence and simple conclusions.", "isCorrect": false, "rationale": "Mencken's intent is rhetorical power and 'deflation' rather than maintaining an objective or balanced academic stance."}], "id": "q04"}, {"question": "Which word from Mencken's 'wordwatch' is specifically noted for its 'childish connotation' used to reduce geopolitics to a nursery fright?", "options": [{"text": "Bugaboo", "isCorrect": true, "rationale": "The text explains that this nursery word for an imaginary monster reduces the entire apparatus of governance to a children's game."}, {"text": "Puissant", "isCorrect": false, "rationale": "Puissant is described as an Old French word meaning powerful, used ironically to mock the 'science' of mob psychology."}, {"text": "Venal", "isCorrect": false, "rationale": "Venal is a formal, Latinate word describing corruption, which contrasts with the colloquial energy of the surrounding text."}, {"text": "Ignominiously", "isCorrect": false, "rationale": "This word is highlighted for its length and weight, making the described humiliation seem even heavier."}], "id": "q05"}, {"question": "What does Mencken imply about the nature of the democratic process through his use of antithesis regarding how the 'plain people' vote?", "options": [{"text": "The democratic process is fundamentally driven by negative emotions and the selection of the lesser of two fears.", "isCorrect": true, "rationale": "By stating people 'never vote for anything, but always against something,' Mencken argues that democracy is reducible to a choice between fears."}, {"text": "The public is easily swayed by positive, idealistic rhetoric during election cycles.", "isCorrect": false, "rationale": "Mencken's antithesis specifically argues the opposite—that the 'plain people' are not motivated by voting 'for' things."}, {"text": "Voting is a rational process of weighing the merits of competing legislative platforms.", "isCorrect": false, "rationale": "The text suggests that democratic man is 'incapable of abstract thought' and driven by 'manufactured panic' rather than reason."}, {"text": "Elections are decided by the most charismatic demagogues regardless of their policies.", "isCorrect": false, "rationale": "While demagogues are mentioned, the specific figure of antithesis focused on here highlights the voter's motivation being rooted in 'against' rather than 'for'."}], "id": "q06"}, {"question": "In the 'Close Reading' section, how is the phrase 'government by orgy, almost by orgasm' analyzed?", "options": [{"text": "It suggests that democratic politics is a form of mass physical arousal driven by emotion rather than reason.", "isCorrect": true, "rationale": "The text explains that yoking 'government' with 'orgy' argues that politics is a collective physical excess, with war being its 'climax'."}, {"text": "It serves as a literal description of the sexual decadence found in high-level political circles.", "isCorrect": false, "rationale": "The analysis treats this as register mixing and metaphor used to describe the psychological state of the mob, not a literal report of behavior."}, {"text": "It is an attempt to use 'shock value' to distract the reader from a lack of historical evidence.", "isCorrect": false, "rationale": "The analysis shows the phrase is used with 'exquisite control' to develop a specific argument about the emotional nature of democracy."}, {"text": "It contrasts the 'naked' truth of wartime government with the 'clothed' dignity of peacetime bureaucracy.", "isCorrect": false, "rationale": "While 'naked' is used later, the 'orgy/orgasm' phrase specifically focuses on the escalation of mass emotional arousal."}], "id": "q07"}, {"question": "Mencken's list of American 'bugaboos' (from the Red-coats to Bolshevism) is intended to create what effect through the figure of 'catalogue'?", "options": [{"text": "To level all threats, implying democratic man reacts with the same undiscriminating panic to everything from the Kaiser to the 'rum demon.'", "isCorrect": true, "rationale": "By mixing proper nouns, abstract concepts, and literary characters in one list, Mencken implies an identical pattern of panic regardless of the actual threat level."}, {"text": "To provide a chronological timeline that tracks the increasing severity of American existential threats.", "isCorrect": false, "rationale": "The analysis states the list is 'deliberately exhausting' to show a pattern of behavior, not to distinguish between the severity of the items."}, {"text": "To demonstrate Mencken's expertise in the various fields of military history, theology, and economics.", "isCorrect": false, "rationale": "The analysis views the list as a 'prosecutorial brief' and a 'diction exercise' rather than a display of multi-disciplinary expertise."}, {"text": "To identify which specific historical 'bugaboos' were legitimate threats and which were manufactured.", "isCorrect": false, "rationale": "Mencken frames the entire list as 'monsters' used for 'melodramatic pursuits,' suggesting they are all treated as imaginary frights."}], "id": "q08"}, {"question": "What is the rhetorical function of the dash in the sentence describing State Department reports of submarines during the World War?", "options": [{"text": "It creates a parenthetical escalation that heightens the sense of manufactured alarm.", "isCorrect": true, "rationale": "The text notes that dashes create 'parenthetical escalations' (e.g., 'nay, American infants in their mothers' arms') to mimic the manufacture of fear."}, {"text": "It signals a transition to a more objective and factual register.", "isCorrect": false, "rationale": "The syntax actually grows more complex to mirror the 'elaborate machinery of propaganda' Mencken is critiquing."}, {"text": "It indicates a moment of genuine emotional vulnerability in Mencken's normally sardonic voice.", "isCorrect": false, "rationale": "The use of 'nay' and the specific imagery of 'infants' is presented as part of a calculated rhetorical enactment of propaganda, not personal grief."}, {"text": "It serves to separate Mencken's own observations from the direct quotes of government officials.", "isCorrect": false, "rationale": "The analysis suggests the syntax itself 'enacts the process of fear-manufacture' through its structural layers."}], "id": "q09"}, {"question": "Mencken uses the word 'altruistic' at the end of the section to describe a cowardly citizen's desire for a frontal attack. This is an example of:", "options": [{"text": "Structural irony", "isCorrect": true, "rationale": "The word is used to mean the exact opposite of its dictionary definition, exposing the hypocrisy of those who are 'brave' only when safe from danger."}, {"text": "Hyperbole", "isCorrect": false, "rationale": "While Mencken uses exaggeration elsewhere, this specific instance is noted as a 'devastating ironic reversal' based on the word's meaning."}, {"text": "Synecdoche", "isCorrect": false, "rationale": "Synecdoche involves using a part to represent a whole; here, Mencken is using a specific term to sarcastically label a behavior."}, {"text": "Personification", "isCorrect": false, "rationale": "Personification gives human traits to non-human things; 'altruistic' here is applied to a person, but with a reversed, ironic meaning."}], "id": "q10"}, {"question": "Mencken describes Bryan's 1896 failure as follows: 'It was his cross-of-gold speech that nominated him; it was his cow State political economy that ruined him.' What principle of democratic politics does this antithesis illustrate?", "options": [{"text": "A politician succeeds by manufacturing fear through vivid emotional imagery but fails the moment his program demands technical understanding from the mob.", "isCorrect": true, "rationale": "The cross-of-gold speech worked as fear-arousal and emotional spectacle; the 'constructive program' failed because its technical complexity made the mob suspicious rather than frightened of the right thing."}, {"text": "Bryan failed because his economic policies were substantively wrong and educated voters recognized their flaws.", "isCorrect": false, "rationale": "Mencken does not attribute Bryan's failure to the merits of his policies; he attributes it to the program's unintelligibility to the mob, which caused misplaced fear rather than reasoned rejection."}, {"text": "The cross-of-gold speech alienated the very rural voters Bryan needed, while the economic program attracted city dwellers.", "isCorrect": false, "rationale": "Mencken argues the reverse — the emotional speech nominating Bryan was his strength with the masses, and the technical program lost him that base."}, {"text": "Bryan's defeat proves that demagogues are ultimately ineffective because democratic voters reward competence over emotion.", "isCorrect": false, "rationale": "Mencken's entire argument is that democratic voters reward fear and emotion over competence; Bryan's failure came from introducing competence where fear was expected."}], "id": "q11"}, {"question": "Mencken describes the John Doe / Richard Roe scenario in which a man 'safe from the draft' develops 'an altruistic eagerness for a frontal attack in force.' What deeper structural irony does this scenario expose about democratic wartime courage?", "options": [{"text": "Democratic courage is inversely proportional to personal risk: the safer a man is from danger, the more aggressive his public posture becomes.", "isCorrect": true, "rationale": "By juxtaposing John Doe at home 'with wages high' with Richard Roe in the conscript camps, Mencken shows that democratic heroism is a performance enabled by others' sacrifice."}, {"text": "The draft system successfully converted cowardly citizens into genuine patriots by eliminating the fear of personal loss.", "isCorrect": false, "rationale": "Mencken's irony is that the draft made John Doe bold precisely because it removed his obligation to fight, not because it generated genuine courage."}, {"text": "The division between John Doe and Richard Roe illustrates that the working class willingly sacrifices itself while the middle class profits.", "isCorrect": false, "rationale": "The primary rhetorical point is about the paradox of courage-through-safety, not a class analysis of who bears military sacrifice."}, {"text": "The scenario proves that the demagogue's fear campaign was ultimately successful in creating genuine nationalist sentiment.", "isCorrect": false, "rationale": "Mencken concludes that 'an heroic mood came upon the people, and their fear was concealed by a truculent front' — the heroism is a mask, not a genuine conversion."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
