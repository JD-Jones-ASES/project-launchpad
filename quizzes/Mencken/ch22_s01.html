        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 22, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the analysis of Section III.3, how does Mencken's argument regarding democratic moralism transition from the previous section?", "options": [{"text": "It shifts from a psychological diagnosis of motives to an examination of practical results.", "isCorrect": true, "rationale": "The text states the argument moves from psychology to practice, focusing on how legislation produces hypocrisy and persecution."}, {"text": "It moves from a defense of constitutional law to a critique of religious institutions.", "isCorrect": false, "rationale": "While he critiques religious figures, his primary shift is from the 'why' (motives) to the 'how' (practical outcomes)."}, {"text": "It transitions from a focus on the common man's rights to the elite's responsibilities.", "isCorrect": false, "rationale": "Mencken's focus remains on the degradation of rights and the persecution of the citizen, rather than elite responsibility."}, {"text": "It changes from an objective historical survey to a subjective philosophical inquiry.", "isCorrect": false, "rationale": "The text describes the earlier section as having 'philosophical detachment' and the current section as a prosecutorial examination of evidence."}]}, {"question": "What is the primary rhetorical purpose of Mencken's deliberate echo of the Dred Scott decision?", "options": [{"text": "To suggest that the political dissident occupies a status similar to that of enslaved persons under moralistic law.", "isCorrect": true, "rationale": "Mencken compares the lack of rights for a citizen under democratic moralism to the infamous ruling that Black Americans had no rights the white man was bound to respect."}, {"text": "To highlight the historical progress of civil rights since the mid-$19^{th}$ century.", "isCorrect": false, "rationale": "Mencken uses the reference to highlight current regression and persecution, not historical progress."}, {"text": "To argue that the Supreme Court is the only institution capable of stopping Puritanism.", "isCorrect": false, "rationale": "Mencken is generally critical of the machinery of justice, suggesting it is often perverted for persecution."}, {"text": "To align his legal philosophy with that of Chief Justice Roger B. Taney.", "isCorrect": false, "rationale": "Mencken is using Taney's words ironically to condemn the current state of rights, not to support Taney's original intent."}]}, {"question": "Mencken's writing in this section is described as a 'paradox.' Which of the following best explains this characterization?", "options": [{"text": "The content is fueled by genuine rage, yet the prose remains highly disciplined and architecturally sound.", "isCorrect": true, "rationale": "The text explains that while the reader feels the 'heat' of his fury, the execution remains 'cool' and logically organized."}, {"text": "He uses the language of the common man to argue for the intellectual superiority of the elite.", "isCorrect": false, "rationale": "Mencken actually uses archaic and legalistic registers rather than the simple language of the common man."}, {"text": "He defends the Constitution while simultaneously calling for its total dissolution.", "isCorrect": false, "rationale": "Mencken indicts the practitioners for betraying founding principles, but does not explicitly call for the document's destruction."}, {"text": "His tone is described as both detached and prosecutorial at the same time.", "isCorrect": false, "rationale": "The analysis states that the 'philosophical detachment' of earlier sections is gone, replaced by a combative prosecutorial tone."}]}, {"question": "How does Mencken utilize the word 'specious' in his treatment of Bishop Wilson?", "options": [{"text": "He quotes the Bishop using the word to dismiss constitutional claims, effectively letting the Bishop's own language condemn him.", "isCorrect": true, "rationale": "By quoting the Bishop's dismissive use of 'specious,' Mencken allows the subject to demonstrate his own disregard for free speech."}, {"text": "He uses it to describe the Bishop's theological arguments as superficially plausible but fundamentally flawed.", "isCorrect": false, "rationale": "Mencken lets the Bishop apply the word to constitutional rights, rather than Mencken applying it to the Bishop's theology."}, {"text": "It is used to characterize the evidence provided by the prosecution in the Scopes trial.", "isCorrect": false, "rationale": "The word is specifically highlighted in the context of Bishop Wilson's sermon regarding free speech."}, {"text": "It serves as a legal descriptor for laws that are technically valid but morally bankrupt.", "isCorrect": false, "rationale": "The term is used as a 'wordwatch' item to highlight the Bishop's attempt to delegitimize valid constitutional claims."}]}, {"question": "What is the rhetorical effect of Mencken's 'periodic' sentence structure in this section?", "options": [{"text": "It mirrors the labyrinthine and delayed processes of the legal system he is criticizing.", "isCorrect": true, "rationale": "The long sentences that withhold the main point until the end reflect the thicket of regulations the citizen must navigate."}, {"text": "It creates a sense of rapid, machine-gun-like delivery to overwhelm the reader with facts.", "isCorrect": false, "rationale": "Periodic sentences are long and structured for a final 'verdict,' whereas short, direct sentences would create a rapid delivery."}, {"text": "It allows him to maintain an objective and neutral distance from the subject matter.", "isCorrect": false, "rationale": "The periodic structure is part of his 'prosecutorial' strategy, which is far from neutral."}, {"text": "It simplifies complex legal codes into easily digestible moral truths.", "isCorrect": false, "rationale": "The structure actually forces the reader to hold complex qualifications in mind before receiving the main point."}]}, {"question": "In the 'mill of justice' metaphor, what specific quality of the legal system is Mencken highlighting?", "options": [{"text": "The mechanical and indiscriminate nature of legal persecution.", "isCorrect": true, "rationale": "A mill is a machine that grinds material down; Mencken uses it to suggest the system lacks human judgment and simply destroys."}, {"text": "The slow but inevitable arrival of truth and fairness.", "isCorrect": false, "rationale": "While mills are slow, the context of 'staggering penalties' and 'vague accusations' suggests destruction, not fairness."}, {"text": "The industrial efficiency of modern democratic institutions.", "isCorrect": false, "rationale": "Though 'mill' implies a machine, the focus is on the lack of true justice rather than positive efficiency."}, {"text": "The high cost of maintaining a functioning judiciary.", "isCorrect": false, "rationale": "The 'grinding' refers to the effect on the citizen, not the financial maintenance of the court."}]}, {"question": "Mencken's use of 'invective' is distinguished from 'mere ranting' by which characteristic?", "options": [{"text": "It is documented and organizes evidence into a disciplined, stylistic attack.", "isCorrect": true, "rationale": "Effective invective, per the text, combines facts and examples with contempt, rather than just calling names."}, {"text": "It avoids emotional language in favor of pure logical syllogisms.", "isCorrect": false, "rationale": "Invective is inherently emotional and critical; it relies on 'anger organized by intelligence,' not the absence of emotion."}, {"text": "It is intended only for an audience that already agrees with the author.", "isCorrect": false, "rationale": "Mencken presents himself as a defense attorney arguing before the 'court of educated opinion,' implying a need to persuade."}, {"text": "It relies on subtext and subtlety rather than direct denunciation.", "isCorrect": false, "rationale": "Invective is described as a 'sustained verbal attack' and 'denunciation,' which are direct."}]}, {"question": "What does the word 'knotholes' contribute to the close-reading passage regarding neighbors?", "options": [{"text": "It transforms neighbors from moral guardians into shameful, furtive 'peeping toms.'", "isCorrect": true, "rationale": "The word suggests a shameful and hidden form of spying rather than open or legitimate observation."}, {"text": "It emphasizes the simple, rustic charm of the small-town community.", "isCorrect": false, "rationale": "In the context of surveillance and jail, the 'rustic' imagery is twisted into something sinister."}, {"text": "It represents the technological limitations of 1920s surveillance methods.", "isCorrect": false, "rationale": "Mencken uses the image rhetorically to comment on the nature of the surveillance (furtive), not the technology."}, {"text": "It suggests the transparency and honesty required in a Puritan society.", "isCorrect": false, "rationale": "Knotholes imply hiding and spying, which is the opposite of transparency."}]}, {"question": "In the final paragraph of the section, what syntactic shift occurs to signal a conclusion?", "options": [{"text": "A move from elaborate, periodic constructions to shorter, direct statements of fact.", "isCorrect": true, "rationale": "The text notes that after pages of complex structure, the final sentences are simple and direct, creating a sense of arrival."}, {"text": "The introduction of complex legal jargon to finalize the prosecutorial case.", "isCorrect": false, "rationale": "The legal jargon is more prevalent in the earlier 'prosecutorial' parts; the end focuses on 'common decency'."}, {"text": "A shift to passive voice to emphasize the helplessness of the citizen.", "isCorrect": false, "rationale": "Mencken uses direct, active statements like 'We must trust men' to state his final conclusion."}, {"text": "The use of rhetorical questions to leave the final judgment to the reader.", "isCorrect": false, "rationale": "While he used a rhetorical question in the close-reading passage, the actual *closing* paragraph uses simple, direct declarations."}]}, {"question": "Mencken's treatment of Bishop Wilson's rank—stating he holds a rank 'higher than that attained by Christ Himself'—is an example of:", "options": [{"text": "Structural irony used to make the Bishop's position appear contemptible.", "isCorrect": true, "rationale": "Mencken uses hyperbole and mock respect to contrast the Bishop's self-importance with his 'bloodthirsty' arguments."}, {"text": "A sincere theological critique of Methodist ecclesiastical hierarchy.", "isCorrect": false, "rationale": "Mencken's purpose is rhetorical and social critique; he is not engaged in a genuine theological debate about rank."}, {"text": "An attempt to align Puritanism with ancient Roman political structures.", "isCorrect": false, "rationale": "While he mentions Roman 'proscriptions' elsewhere, this specific comparison is used for ironic deflation of the Bishop."}, {"text": "A literal comparison of the Bishop's political power to historical religious figures.", "isCorrect": false, "rationale": "The comparison is clearly hyperbolic and ironic, meant to mock the Bishop's 'puissance'."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
