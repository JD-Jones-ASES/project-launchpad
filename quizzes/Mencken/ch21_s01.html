<script>
var QUESTIONS = [{"question": "According to the analysis of Mencken's rhetoric, what is the primary psychological driver behind 'democratic moralism'?", "options": [{"text": "A genuine concern for the spiritual salvation of the common man.", "isCorrect": false, "rationale": "The text explicitly states that Mencken views these movements as not motivated by concern for the common good or genuine virtue."}, {"text": "A combination of private resentment, envy, and sadism.", "isCorrect": true, "rationale": "Mencken argues that the Puritan punishes others for pleasures they cannot enjoy, using democracy to translate resentment into law."}, {"text": "The intellectual inferiority and lack of education in the rural mob.", "isCorrect": false, "rationale": "While Mencken views the mob as inferior, this is the machinery of the movement rather than the underlying psychological motive of the moralist."}, {"text": "An altruistic desire to improve public health and social order.", "isCorrect": false, "rationale": "Mencken dismisses claims of altruism as a facade for what he terms 'psychopathological persecution'."}], "id": "q01"}, {"question": "Mencken's prose often employs a 'three-register collision.' Which of the following correctly identifies these three linguistic categories?", "options": [{"text": "Theological, clinical, and colloquial.", "isCorrect": true, "rationale": "Mencken slams these registers together to strip Puritanism of dignity, reduce it to pathology, and dismiss it as a swindle."}, {"text": "Academic, journalistic, and poetic.", "isCorrect": false, "rationale": "The analysis specifies that he uses words like 'evangelical' (theological), 'sadism' (clinical), and 'buncombe' (colloquial)."}, {"text": "Legalistic, scientific, and archaic.", "isCorrect": false, "rationale": "While he mimics legal and scientific formats, the specific vocabulary registers identified are theological, clinical, and colloquial."}, {"text": "Political, satirical, and eulogistic.", "isCorrect": false, "rationale": "Eulogistic language would imply praise, which is entirely absent from Mencken's critique of moralism."}], "id": "q02"}, {"question": "What rhetorical effect does Mencken achieve by using 'accumulation' (or congeries) in Section III.2?", "options": [{"text": "It provides a balanced view by listing both the pros and cons of moral legislation.", "isCorrect": false, "rationale": "Mencken's accumulation is described as 'prosecutorial,' intended to bury the opponent rather than provide balance."}, {"text": "It creates a sense of overwhelming evidence that makes denial of his claims seem impossible.", "isCorrect": true, "rationale": "The piling-up of examples like the Mann Act and Prohibition serves to make the pattern of persecution appear undeniable."}, {"text": "It slows down the pace of the argument to allow the reader time for quiet reflection.", "isCorrect": false, "rationale": "The text describes this technique as having the 'force of denunciation' and building momentum, rather than slowing it down."}, {"text": "It disguises his lack of specific evidence with vague, repetitive generalizations.", "isCorrect": false, "rationale": "The text notes that he uses specific historical examples (Arbuckle, Thaw, the Volstead Act) within his accumulated lists."}], "id": "q03"}, {"question": "Mencken refers to Prohibition as a 'brummagem cure-all.' Based on the 'wordwatch' section, what is the precise connotation of 'brummagem'?", "options": [{"text": "Ancient and well-established, but no longer effective in modern society.", "isCorrect": false, "rationale": "This suggests a respect for the past that Mencken does not afford to the 'manufactured' nature of Prohibition."}, {"text": "A sophisticated and complex solution that is too difficult for the mob to understand.", "isCorrect": false, "rationale": "Mencken views the solution as a cheap swindle, not as something intellectually sophisticated."}, {"text": "Cheap, showy, and counterfeit, manufactured for sale to the gullible.", "isCorrect": true, "rationale": "The term originates from counterfeit coins and cheap goods from Birmingham, signifying a fraudulent remedy."}, {"text": "A radical and dangerous experiment that threatens traditional values.", "isCorrect": false, "rationale": "While he sees it as dangerous, 'brummagem' specifically targets its lack of quality and its counterfeit nature."}], "id": "q04"}, {"question": "In the close reading of Mencken's sentence regarding the Puritan's desire to 'lust to inflict... disgrace,' what is the significance of the word 'lust'?", "options": [{"text": "It suggests that the moralists are actually trying to experience the sins they condemn.", "isCorrect": false, "rationale": "The text states the 'lust' is specifically for inflicting pain/disgrace, not for participating in the forbidden pleasures themselves."}, {"text": "It characterizes the moral crusade as a form of perversion and hypocrisy.", "isCorrect": true, "rationale": "By applying a sexualized term to those who claim to oppose lust, Mencken accuses them of deriving perverted pleasure from persecution."}, {"text": "It serves as a theological term of endearment for the moralists' passion.", "isCorrect": false, "rationale": "The context is 'controlled fury' and sarcasm, making a term of endearment highly improbable."}, {"text": "It is used literally to describe the physical desires of the Prohibition officers.", "isCorrect": false, "rationale": "The text clarifies that Mencken uses the term with its 'full sexual charge' rhetorically to convert moral fervor into pathology."}], "id": "q05"}, {"question": "How does Mencken distinguish his attack on 'Puritanism' from a general attack on 'morality'?", "options": [{"text": "He argues that morality is only for the 'free spirit' and should not exist for the common man.", "isCorrect": false, "rationale": "Mencken's critique is focused on the legal enforcement of private codes, not the exclusion of the common man from morality."}, {"text": "He adopts a libertarian position that objects specifically to using law to enforce private moral codes.", "isCorrect": true, "rationale": "The text notes that Mencken is attacking the hypocrisy of legislated morality, not defending vice or rejecting morality itself."}, {"text": "He claims that genuine morality must be based on the theological principles of the evangelical church.", "isCorrect": false, "rationale": "The text describes these evangelical principles as 'barbarous theological superstitions' from Mencken's perspective."}, {"text": "He suggests that true morality is only found in the 'clinical' study of psychology.", "isCorrect": false, "rationale": "He uses clinical language to diagnose his opponents, but he does not equate morality with psychology."}], "id": "q06"}, {"question": "Mencken describes the army of Prohibition enforcement officers as 'bravos.' In this context, what does the term 'bravos' mean?", "options": [{"text": "Courageous soldiers dedicated to upholding the Constitution.", "isCorrect": false, "rationale": "This would be a literal and positive interpretation, which contradicts Mencken's description of them as 'professional criminals'."}, {"text": "Hired thugs or men of violence employed to intimidate.", "isCorrect": true, "rationale": "The wordwatch defines 'bravos' as men of violence used to intimidate, fitting Mencken's disgusted tone regarding enforcement."}, {"text": "Well-meaning but incompetent government bureaucrats.", "isCorrect": false, "rationale": "Mencken views them as active, criminal persecutors ('army of bravos'), not merely as incompetent officials."}, {"text": "Volunteers from Protestant churches who assisted the police.", "isCorrect": false, "rationale": "The text distinguishes between the 'evangelical' drivers of the movement and the 'professional criminals' who enforce it."}], "id": "q07"}, {"question": "In his characterization of the Puritan as a psychological case study, Mencken uses the adverb 'safely.' What is the rhetorical function of this word?", "options": [{"text": "It emphasizes that the Puritan is protected by the law while he persecutes others.", "isCorrect": false, "rationale": "While true in context, the analysis focuses on the word's ability to reveal the Puritan's internal character rather than his legal status."}, {"text": "It argues that the Puritan's morality is born from cowardice and fear rather than conviction.", "isCorrect": true, "rationale": "The text states the adverb 'tells the whole story,' implying the Puritan only forbids what he fears or is incapable of doing himself."}, {"text": "It suggests that the Puritan's actions are ultimately harmless to society.", "isCorrect": false, "rationale": "Mencken argues the opposite: that democratic moralism produces 'active persecution' and 'tyranny'."}, {"text": "It indicates that Prohibition was a safe and effective way to reduce crime.", "isCorrect": false, "rationale": "The text explicitly mentions that Prohibition was widely acknowledged as a failure that caused crime to explode."}], "id": "q08"}, {"question": "Mencken utilizes 'casuistry' to describe the legal arguments for Prohibition enforcement. What does this term imply about those arguments?", "options": [{"text": "They are based on deep, complex moral truths.", "isCorrect": false, "rationale": "Casuistry typically implies a misuse of reasoning, not an adherence to truth."}, {"text": "They are clever but fundamentally unsound or deceptive.", "isCorrect": true, "rationale": "Wordwatch defines casuistry as the use of clever but unsound reasoning, especially regarding moral questions."}, {"text": "They are outdated but logically consistent with the Constitution.", "isCorrect": false, "rationale": "Mencken's use of the term suggests that the reasoning is inherently flawed and manipulative, not logically consistent."}, {"text": "They are simple, direct appeals to the common man's common sense.", "isCorrect": false, "rationale": "Casuistry involves 'clever' reasoning, which contrasts with the simple appeals of 'buncombe'."}], "id": "q09"}, {"question": "How does Mencken use the structure of his sentences to mirror the subject of 'bureaucratic oppression' in the Prohibition passage?", "options": [{"text": "By using short, staccato sentences that mimic the firing of a gun.", "isCorrect": false, "rationale": "He uses these for his 'verdicts,' but not to mirror the labyrinth of bureaucracy itself."}, {"text": "By piling clause upon clause and qualification upon qualification in complex sentences.", "isCorrect": true, "rationale": "The text explains that his long, complex sentences mirror the 'labyrinthine machinery of persecution' he describes."}, {"text": "By using passive voice to suggest that nobody is responsible for the laws.", "isCorrect": false, "rationale": "Mencken is very direct in assigning blame to the 'Puritan' and the 'mob'; his syntax mirrors the complexity of the system, not a lack of agency."}, {"text": "By repeating the same phrase over and over to simulate bureaucratic boredom.", "isCorrect": false, "rationale": "His strategy is 'accumulation' and complexity rather than simple repetition for the sake of boredom."}], "id": "q10"}, {"question": "Mencken claims that autocracies, despite their tyranny, performed an essential function for civilization. What was that function?", "options": [{"text": "They protected superior men — artists, scientists, philosophers — from the mob's envy, allowing civilized achievement to accumulate.", "isCorrect": true, "rationale": "Mencken argues that every genuine advance in civilization depended on individuals the mob would have destroyed if given democratic power; autocracy shielded those individuals while democracy destroys them."}, {"text": "They created efficient economies that provided material prosperity for all classes.", "isCorrect": false, "rationale": "Mencken's argument is cultural and civilizational, not economic; he focuses on creative and intellectual achievement, not material wealth."}, {"text": "They prevented wars by concentrating military power in the hands of a single rational authority.", "isCorrect": false, "rationale": "Mencken does not credit autocracies with peacemaking; his point is about protection of superior individuals, not foreign policy."}, {"text": "They maintained religious orthodoxy, which provided the moral foundation that democracies erode.", "isCorrect": false, "rationale": "Mencken is deeply skeptical of religious orthodoxy; he associates Puritanism with democratic moralism, not with civilizational achievement."}], "id": "q11"}, {"question": "Mencken mentions Wat Tyler as a historical illustration of a democratic extreme. What action defines Wat Tyler's significance in Mencken's argument?", "options": [{"text": "As leader of the English Peasants' Revolt of 1381, Tyler demanded the abolition of serfdom and equality for all — the democratic impulse taken to its logical, leveling conclusion.", "isCorrect": true, "rationale": "Mencken cites Tyler to show that the democratizing impulse leads ultimately to the demand that no person shall be above another, which is democracy's self-defeating equalization of everything, including excellence."}, {"text": "Tyler was a French revolutionary who stormed the Bastille and abolished the aristocracy in one day.", "isCorrect": false, "rationale": "Wat Tyler led the English Peasants' Revolt in 1381; the Bastille was stormed in 1789 during the French Revolution by a different set of actors."}, {"text": "Tyler was an American labor leader who introduced the concept of workers' rights to the democratic platform.", "isCorrect": false, "rationale": "Wat Tyler was a 14th-century English peasant leader; Mencken uses him as a medieval historical precedent, not a modern labor figure."}, {"text": "Tyler was a Puritan preacher who used democratic rhetoric to enforce moral legislation.", "isCorrect": false, "rationale": "Tyler was a peasant rebel, not a Puritan moralist; Mencken invokes him to illustrate the leveling impulse, not the moralizing impulse."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
