<script>
var QUESTIONS = [{"question": "According to the analysis, how does the final section of 'Notes on Democracy' retroactively transform the reader's understanding of the entire book?", "options": [{"text": "It reframes the preceding chapters from a legalistic indictment into a performance of aesthetic connoisseurship.", "isCorrect": true, "rationale": "Mencken shifts from the role of a prosecutor to that of a spectator, revealing that his previous attacks were actually a way of savoring the spectacle."}, {"text": "It provides the empirical evidence necessary to validate the pseudo-scientific claims made in earlier chapters.", "isCorrect": false, "rationale": "The text states that Mencken moves away from his 'mock-scientific' and 'Latinate medical' terminology in favor of more conversational prose."}, {"text": "It apologizes for the previous chapters' hostility by offering a sincere path toward democratic reform.", "isCorrect": false, "rationale": "The analysis clarifies that Mencken's 'confession' is not an apology but a revelation of his enjoyment of democracy's idiocy."}, {"text": "It shifts the focus from the failures of the democratic state to the inherent virtues of the individual citizen.", "isCorrect": false, "rationale": "Mencken remains contemptuous of the 'democratic man,' describing him using terms like 'dunderheads' and 'suckers.'"}]}, {"question": "The analysis uses the term 'litotes' to describe Mencken's final rhetorical strategy. Which of the following best exemplifies this technique in Section 1?", "options": [{"text": "The use of the phrase 'I report only' to describe the 'spectacle' of democracy's failures.", "isCorrect": true, "rationale": "By using the humble phrase 'I report only,' Mencken uses understatement to imply that the evidence is so overwhelming it requires no further hyperbole."}, {"text": "The categorization of democratic citizens as 'dunderheads, cowards, trimmers, frauds, and cads.'", "isCorrect": false, "rationale": "This is an example of a list or catalogue used for impact, rather than a negation used to express an affirmative."}, {"text": "The comparison of democracy to a building collapsing in slow motion.", "isCorrect": false, "rationale": "This is a metaphor used to illustrate Mencken's ruthless enjoyment, not a form of deliberate understatement through negation."}, {"text": "The description of democracy as 'the most charming form of government ever devised.'", "isCorrect": false, "rationale": "While ironic, this is a form of sarcasm or aesthetic reductionism rather than litotes."}]}, {"question": "Why does Mencken characterize the pedagogical dissent of someone over the age of thirty as 'contumacy'?", "options": [{"text": "To suggest that intellectual independence in a democracy is viewed as a form of criminal disobedience.", "isCorrect": true, "rationale": "Contumacy is a legal term for stubborn refusal to obey, implying that democracy treats non-conformity as a violation of its 'herding' norms."}, {"text": "To emphasize the natural intellectual decline that Mencken believes occurs as citizens reach middle age.", "isCorrect": false, "rationale": "The term relates to a refusal to comply with societal or democratic expectations, not a biological or cognitive assessment."}, {"text": "To highlight the 'maudlin' and sentimental nature of those who refuse to participate in the franchise.", "isCorrect": false, "rationale": "Maudlin refers to sentimentality, whereas contumacy refers specifically to the stubbornness of the pedagogue's dissent."}, {"text": "To argue that educators are the primary 'mountebanks' responsible for democratic corruption.", "isCorrect": false, "rationale": "Mencken uses 'contumacy' to describe the act of dissent itself, not to identify educators as the source of corruption."}]}, {"question": "What is the primary rhetorical function of the 'catechistic rhythm' identified in the final paragraph of Mencken's work?", "options": [{"text": "It creates a sense of acceptance by acknowledging the worst charges against democracy and dismissing them with predetermined answers.", "isCorrect": true, "rationale": "The question-and-answer structure mimics religious instruction where the answers are already known, leading the reader toward Mencken's conclusion of acceptance."}, {"text": "It serves as a final, desperate plea for the reader to provide their own solutions to the failures of the state.", "isCorrect": false, "rationale": "The syntax is described as enactng acceptance and dismissal, rather than inviting a collaborative search for political solutions."}, {"text": "It mimics the 'ratiocination' used in earlier chapters to provide a logical, scientific proof of democracy's collapse.", "isCorrect": false, "rationale": "The analysis states that the scientific terminology is abandoned in this section for a more conversational and informal style."}, {"text": "It highlights the unresolvable tension between Mencken's malice and his purported delight.", "isCorrect": false, "rationale": "While that tension exists, the catechistic rhythm specifically refers to the structural dismissal of democracy's flaws."}]}, {"question": "Mencken's use of the word 'charming' to describe democracy is identified as 'devastating.' According to the text, why is this descriptor so critical of the democratic system?", "options": [{"text": "It reduces a serious political system to the realm of the decorative and aesthetic, stripping it of its rational purpose.", "isCorrect": true, "rationale": "Calling a government 'charming' implies it lacks justice or wisdom, categories that should be central to governance but are here replaced by mere amusement."}, {"text": "It suggests that democracy is a delicate, fragile construct that cannot survive the 'contumacy' of its citizens.", "isCorrect": false, "rationale": "The term is used to diminish democracy's seriousness, not to comment on its structural durability or fragility."}, {"text": "It implies that the 'suckers' are easily swayed by the physical appearance and charisma of their leaders.", "isCorrect": false, "rationale": "The analysis focuses on the word's effect of reducing the entire system from the 'serious' to the 'decorative,' rather than the specific behavior of voters."}, {"text": "It marks a moment of genuine, if 'slightly shameful,' praise for the progress made since 1776.", "isCorrect": false, "rationale": "The text explicitly states that the word is 'conventionally positive' but 'in context it is devastating,' indicating it is not a sincere compliment."}]}, {"question": "In the close reading of the final paragraph, how does the word 'hence' function in the phrase 'It is incomparably idiotic, and hence incomparably amusing'?", "options": [{"text": "It establishes a perverse logical link that dares the reader to reject the idea that tragedy is inherently funny.", "isCorrect": true, "rationale": "The conjunction 'hence' presents amusement as a direct logical consequence of idiocy, defying conventional moralities that view idiocy as tragic."}, {"text": "It acts as a transitional marker to shift the focus from democratic 'frauds' to 'cads.'", "isCorrect": false, "rationale": "The word 'hence' connects 'idiotic' and 'amusing' within a single sentence, rather than transitioning between different types of people in the later list."}, {"text": "It underscores the 'maudlin herding' that Mencken believes characterizes the democratic process.", "isCorrect": false, "rationale": "This word choice is part of Mencken's paradoxical logic regarding his own enjoyment, not a description of voter behavior."}, {"text": "It serves to qualify Mencken's 'confession' by adding a layer of scientific 'ratiocination.'", "isCorrect": false, "rationale": "The analysis notes that this section moves away from scientific terminology, using simpler language to deliver its 'logical' paradoxes."}]}, {"question": "The final sentence of the book—'How can any man be a democrat who is sincerely a democrat?'—is described as having what syntactic effect?", "options": [{"text": "It creates a loop without exit that leaves the reader suspended in an unresolvable puzzle.", "isCorrect": true, "rationale": "By repeating 'democrat' in two different senses, the syntax turns back on itself, avoiding a clear conclusion and prompting further thought."}, {"text": "It provides a clear, 'palpable' resolution to the tension between the spectator and the prosecutor.", "isCorrect": false, "rationale": "The text states that the sentence is a 'genuine paradox' and 'Mencken does not answer it,' indicating a lack of resolution."}, {"text": "It uses 'litotes' to negate the possibility that anyone can ever truly believe in democracy.", "isCorrect": false, "rationale": "While the sentence is a question, litotes specifically involves negating an opposite to express an affirmative, which is not the primary structure here."}, {"text": "It mirrors the 'catechistic' pattern of the previous sentences to offer a final, simple answer.", "isCorrect": false, "rationale": "The catechistic pattern involves a question followed by a declarative answer; this final sentence is a question that remains unanswered."}]}, {"question": "According to the 'Voice and Tone' analysis, what 'darker' element lies beneath Mencken's apparent good humor and enjoyment?", "options": [{"text": "A ruthless form of cruelty comparable to a predator's enjoyment of its prey's suffering.", "isCorrect": true, "rationale": "The text compares Mencken's enjoyment to a man watching a building collapse or a cat with a mouse, suggesting his pleasure is derived from the destruction of others."}, {"text": "A deep-seated fear that the 'suckers' will eventually discover his 'guilty pleasure.'", "isCorrect": false, "rationale": "The 'guilty pleasure' is a rhetorical device for intimacy with the reader, not a source of fear for the author."}, {"text": "An admission that the 'rascality' at the heart of democracy might eventually consume the critic himself.", "isCorrect": false, "rationale": "Mencken suggests that we 'continue to survive' despite the rascality, indicating a sense of detachment rather than existential threat."}, {"text": "A hidden desire to abandon his 'aristocratic detachment' and join the 'maudlin herding.'", "isCorrect": false, "rationale": "Mencken invites the reader to *share* his aristocratic detachment, reinforcing his position on the sidelines rather than moving toward the mob."}]}, {"question": "Mencken's transition from 'prosecutor' to 'spectator' has what specific effect on the reader, according to the 'Figure Analysis'?", "options": [{"text": "It implicates the reader as a fellow audience member who is also not 'innocent' in their enjoyment of the satire.", "isCorrect": true, "rationale": "By revealing his own enjoyment, Mencken suggests that the reader, who has followed his attacks, is also complicit in the 'performance.'"}, {"text": "It encourages the reader to take up the mantle of the prosecutor to finish the work Mencken started.", "isCorrect": false, "rationale": "The transition is described as an invitation to the sidelines to watch the spectacle, not a call to legalistic or political action."}, {"text": "It provides the reader with the moral high ground necessary to reject democratic 'mountebanks.'", "isCorrect": false, "rationale": "The analysis suggests the reader is 'never innocent' if they are enjoying the spectacle, which contradicts the idea of a 'moral high ground.'"}, {"text": "It signals that the author's previous 'contumacy' was merely a stage in his political evolution.", "isCorrect": false, "rationale": "The analysis describes the shift as a 'rhetorical move' and a 'tonal reversal' rather than a personal political evolution."}]}, {"question": "Which of the following descriptions best summarizes the progression of nouns in the list: 'dunderheads, cowards, trimmers, frauds, cads'?", "options": [{"text": "An escalation from cognitive stupidity to moral weakness and finally to irredeemable vulgarity.", "isCorrect": true, "rationale": "The list moves from 'dunderheads' (stupid) to 'cowards/trimmers' (weak) to 'frauds' (dishonest) to 'cads' (vulgar)."}, {"text": "A list of synonymous terms intended to repeat the same core accusation for maximum hyperbole.", "isCorrect": false, "rationale": "The analysis explicitly notes that the nouns cover 'different categories' and 'escalate' through different types of failures."}, {"text": "A 'mock-scientific' catalogue of the psychological profiles common to democratic leaders.", "isCorrect": false, "rationale": "The text states that Mencken has moved away from 'scientific catalogues' in this section, opting for 'simpler, more direct language' like these blunt nouns."}, {"text": "A sequence of legal terms that categorize different forms of democratic 'contumacy.'", "isCorrect": false, "rationale": "While 'frauds' has legal connotations, 'dunderheads' and 'cads' are informal, blunt terms, and 'contumacy' is a separate concept."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
