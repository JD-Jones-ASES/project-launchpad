<script>
var QUESTIONS = [{"question": "Mencken's rhetorical strategy regarding the politician primarily involves transforming him into what?", "options": [{"text": "A figure deserving of public sympathy due to the pressures of democratic systems.", "isCorrect": false, "rationale": "Mencken's strategy is explicitly stated as transforming the politician into an 'object of clinical study,' not a figure of sympathy. He aims to strip away dignity, not evoke pity."}, {"text": "An object of clinical study, allowing the educated reader to observe without engagement.", "isCorrect": true, "rationale": "The text states, 'Mencken's rhetorical strategy here is to transform the politician from a figure of authority into an object of clinical study... The politician is not addressed; he is examined, the way a naturalist examines a specimen.' This allows the reader to feel superior and detached."}, {"text": "A heroic leader whose resilience against mediocrity is highlighted.", "isCorrect": false, "rationale": "Mencken's prior sections focused on democracy's 'structural tendency toward mediocrity,' and this section examines the politician as a 'human product' of that system, not a hero defying it."}, {"text": "An authoritative voice whose opinions shape public discourse.", "isCorrect": false, "rationale": "The strategy is precisely the opposite: to remove the politician from being a 'figure of authority' and instead subject him to scrutiny."}], "id": "q01"}, {"question": "According to the historical context provided, what was Mencken's primary interest in the 'Boss System'?", "options": [{"text": "The extent of its financial corruption and its impact on urban development.", "isCorrect": false, "rationale": "While the boss system was 'genuinely corrupt,' the text explicitly states that 'Mencken, characteristically, is less interested in the corruption' itself."}, {"text": "Its practical effectiveness in delivering services where formal government failed.", "isCorrect": false, "rationale": "The text acknowledges that the system was 'genuinely functional' in providing services. However, Mencken's primary interest is not in the functionality itself, but what it reveals about the public."}, {"text": "What the system revealed about the character and tendencies of the electorate that sustained it.", "isCorrect": true, "rationale": "The text clearly states, 'Mencken, characteristically, is less interested in the corruption than in what the system reveals about the electorate that sustains it.'"}, {"text": "The historical figures who exemplified the power of city bosses, such as William Tweed.", "isCorrect": false, "rationale": "The text mentions figures like Tweed as examples, but Mencken's focus is on the broader implications of the system, not merely cataloging its leaders."}], "id": "q02"}, {"question": "Mencken's tone is described as primarily 'controlled, methodical, and devastating.' What is the effect of the deliberate 'slips' into vernacular, such as 'to butter his parsnips'?", "options": [{"text": "To establish a common ground with the politician, suggesting empathy despite the critique.", "isCorrect": false, "rationale": "Mencken's goal is to tear down the politician, not to establish empathy. The slips are meant to strip away dignity, not build common ground."}, {"text": "To highlight his own lack of formal education, making his arguments more accessible.", "isCorrect": false, "rationale": "Mencken's audience is the 'educated reader,' and he opens with an academic quotation, indicating he is not trying to portray a lack of education. The slips are calculated rhetorical moves."}, {"text": "To inject humor and underscore the politician's unworthiness of sustained dignity.", "isCorrect": true, "rationale": "The text explains these slips are 'deliberate,' comparing the language to 'a vaudeville review' rather than a courtroom, concluding that 'the politician is not worthy of sustained dignity. He deserves the occasional guffaw.'"}, {"text": "To demonstrate the politician's own use of informal language to manipulate the public.", "isCorrect": false, "rationale": "While politicians might use informal language, these slips are Mencken's own authorial choice, used to shape his tone and argument about the politician, not to mimic the politician's speech."}], "id": "q03"}, {"question": "Which of Mencken's three registers of diction primarily aims to expose the politician's self-deception and hypocrisy?", "options": [{"text": "The vernacular and physical register, which uses earthy phrases to drag the politician down.", "isCorrect": false, "rationale": "This register aims to 'drag the politician down from the platform to the mud,' emphasizing 'gutter reality,' which exposes the politician's true nature rather than his self-deception directly."}, {"text": "The zoological and clinical register, classifying the politician as an instinct-driven creature.", "isCorrect": false, "rationale": "This register strips the politician of personhood, presenting him as a 'creature driven by instinct,' but it focuses on his inherent nature, not his self-description."}, {"text": "The legal and political register, which uses the politician's own terms with implied contempt.", "isCorrect": true, "rationale": "The text states this register includes words like 'altruist,' 'public-spirited,' used by the politician about himself. Mencken 'quotes them with invisible quotation marks' to convey his contempt for the politician's 'self-description,' thereby exposing hypocrisy."}, {"text": "The medical terminology, like 'armamentarium,' to give fraud a professional air.", "isCorrect": false, "rationale": "'Armamentarium' is a specific wordwatch example, not a full register. It gives 'fraud the air of professional competence,' which is an exposure, but not directly of self-deception/hypocrisy, more of calculated malice."}], "id": "q04"}, {"question": "Mencken's coined term 'demaslave' is described as 'rhetorical violence.' What specific characteristic of the word itself contributes to this effect?", "options": [{"text": "It uses antiquated Old English roots, making it sound harsh and unfamiliar.", "isCorrect": false, "rationale": "'Demaslave' is a coinage from Latin and Greek, not Old English. Words like 'clapper-clawing' are Old English."}, {"text": "It is a euphemism that subtly implies a negative truth, making it more insidious.", "isCorrect": false, "rationale": "The word is not a euphemism; it is a direct and forceful combination designed to expose a harsh truth, not to soften it."}, {"text": "It is a blend of two incompatible linguistic traditions, mirroring the incompatible roles forced upon the politician.", "isCorrect": true, "rationale": "The text explicitly states 'demaslave' is a 'shot-gun marriage of Latin and Greek,' and then explains, 'it forces two incompatible linguistic traditions together, just as democracy forces incompatible roles onto the same man.'"}, {"text": "It implies a lack of free will, reducing the politician to a mere instrument of the system.", "isCorrect": false, "rationale": "While 'slave' implies lack of free will, the 'rhetorical violence' of the coinage specifically refers to the fusion of linguistic traditions, not just its semantic meaning in isolation."}], "id": "q05"}, {"question": "How does Mencken primarily use the semicolon in this section, according to the text?", "options": [{"text": "To create a sense of rapid-fire, disconnected ideas that overwhelm the reader.", "isCorrect": false, "rationale": "The text states semicolons 'chain parallel clauses together into an increasingly oppressive catalogue,' indicating connection and accumulation, not disconnection."}, {"text": "To introduce surprising shifts in tone, often moving from formal to informal language.", "isCorrect": false, "rationale": "Tonal shifts are achieved through different registers and choice of phrases, not primarily through semicolons, which connect clauses within a sentence."}, {"text": "To build an 'increasingly oppressive catalogue' by chaining parallel clauses, preventing reader objection.", "isCorrect": true, "rationale": "The text explains, 'He uses it to chain parallel clauses together into an increasingly oppressive catalogue... Each in their clause adds weight, and the semicolons prevent any pause long enough for the reader to object.'"}, {"text": "To separate the main clause from a series of subordinate details, delaying the main idea.", "isCorrect": false, "rationale": "This describes a periodic sentence structure, which Mencken uses, but semicolons primarily connect clauses, not typically separate main clauses from subordinate ones in this specific 'accumulation' function."}], "id": "q06"}, {"question": "Which statement accurately describes Zeugma as defined in the text, particularly in Mencken's application?", "options": [{"text": "A rhetorical device where a writer repeats a word or phrase at the beginning of successive clauses.", "isCorrect": false, "rationale": "This describes anaphora, not zeugma. Zeugma involves a single word governing multiple others in different senses."}, {"text": "It uses a single word to govern multiple words in contrasting ways, often forcing incompatible meanings together.", "isCorrect": true, "rationale": "The definition provided is 'a figure of speech in which a single word (usually a verb or adjective) governs or modifies two or more words in different ways — often one literal and one figurative, or one serious and one absurd.' Mencken's use 'yok[es] the metaphorical... to the disgustingly physical.'"}, {"text": "A sentence structure where the main clause is delayed until the very end, building suspense.", "isCorrect": false, "rationale": "This describes a periodic sentence, which is distinct from zeugma."}, {"text": "The use of an understated phrase to introduce a shocking comparison, creating ironic effect.", "isCorrect": false, "rationale": "This describes a rhetorical technique Mencken uses with the chorus girl analogy, but it is not the definition of zeugma."}], "id": "q07"}, {"question": "What is the sharpest distinction Mencken draws using the 'Chorus Girl Analogy' about politicians?", "options": [{"text": "That politicians are driven by genuine moral outrage rather than mere worldly resignation.", "isCorrect": false, "rationale": "The text states the comparison is made 'with an air of worldly resignation rather than moral outrage,' indicating the opposite of this option."}, {"text": "That democratic politics attracts individuals who prioritize public service over personal gain.", "isCorrect": false, "rationale": "The analogy explicitly equates political compromise with 'sexual exploitation' and 'self-degradation,' suggesting a focus on personal gain and degradation, not public service."}, {"text": "The difference between vanity (pleasure in others' regard) and pride (self-respect independent of others).", "isCorrect": true, "rationale": "The text states, 'The final distinction — between vanity (pleasure in others' regard) and pride (self-respect independent of others) — is the analogy's sharpest cut.' It suggests politics selects for exhibitionists, not leaders."}, {"text": "The inevitability of corruption in any system where power is concentrated.", "isCorrect": false, "rationale": "While the analogy touches on moral compromise, its 'sharpest cut' is specifically about the psychological distinction between vanity and pride, and what kind of person democracy selects for."}], "id": "q08"}, {"question": "When Mencken writes, 'I do not describe the democratic politician at his inordinate worst; I describe him as he is encountered in the full sunshine of normalcy,' what rhetorical device is he employing and for what purpose?", "options": [{"text": "Understatement, to subtly suggest that the politician's actions are less severe than they appear.", "isCorrect": false, "rationale": "This is not an understatement; it's a claim to moderation that ironically intensifies the criticism. He is not suggesting the actions are less severe."}, {"text": "Hyperbole, to exaggerate the commonness of political corruption for dramatic effect.", "isCorrect": false, "rationale": "While it amplifies the criticism, it's not hyperbole in the sense of overstating; it's a claim to *normality* that has an intensifying effect, making it a form of irony."}, {"text": "Apparent concession (irony), by claiming moderation to imply the true worst is unimaginable.", "isCorrect": true, "rationale": "The text labels this as 'irony through the device of apparent concession,' explaining, 'The claim to moderation is itself an intensifier — by insisting that this portrait is the normal case, Mencken implies that the worst is unimaginable.'"}, {"text": "Anaphora, to create a rhythmic emphasis on the consistency of the politician's character.", "isCorrect": false, "rationale": "Anaphora is the repetition of a word or phrase at the beginning of successive clauses; this sentence does not exhibit that structure."}], "id": "q09"}, {"question": "In the 'Close Reading' of the 'chorus girl' passage, the text argues that the parallelism in 'They are men who... They are in the position of...' serves what primary function?", "options": [{"text": "To establish a chronological sequence of the politician's moral decline.", "isCorrect": false, "rationale": "The parallelism connects two statements as morally equivalent, not as a temporal sequence of decline."}, {"text": "To soften the impact of the analogy by making it seem a natural extension of the prior statement.", "isCorrect": false, "rationale": "The analogy, despite the understated introduction, is intended to be shocking and damning, not softened. The parallelism equates the politician's actions with a degrading comparison."}, {"text": "To grammatically equate the politician's moral compromise with the chorus girl's indecency, making them morally identical.", "isCorrect": true, "rationale": "The text states, 'Both sentences begin with 'They are' — a parallel structure that equates the two statements, making the second seem as factual and inevitable as the first. The politician's compromise and the chorus girl's compromise are grammatically identical; the parallelism insists that they are morally identical as well.'"}, {"text": "To create a periodic sentence structure, delaying the main impact until the very end.", "isCorrect": false, "rationale": "While Mencken uses periodic sentences, this specific parallel structure ('They are... They are...') is not a periodic sentence. The main clauses are upfront in both statements."}], "id": "q10"}, {"question": "When the people 'look at Thersites and see Ulysses,' what is Mencken's argument about the boss's power over the electorate?", "options": [{"text": "The boss is genuinely heroic, and the electorate correctly perceives his leadership qualities.", "isCorrect": false, "rationale": "Thersites in Homer is the ugliest and most contemptible Greek soldier, the antithesis of the hero Ulysses. The inversion is Mencken's point: the perception is deluded, not accurate."}, {"text": "The electorate's perception of the boss is systematically distorted by sentimental projection, mistaking a scoundrel for a hero.", "isCorrect": true, "rationale": "Mencken's allusion to Thersites (the contemptible) and Ulysses (the heroic) in the Iliad frames the electorate's worship of the boss as pure fantasy — they project heroic qualities onto a figure who holds them by their 'immemorial sentimentalities,' not merit."}, {"text": "The boss deliberately disguises his true identity by adopting heroic symbols and rhetoric.", "isCorrect": false, "rationale": "While the boss exploits sentimentalities, Mencken's emphasis is on the electorate's incapacity for accurate perception — the failure is in them, not just in the boss's disguise."}, {"text": "The classical allusion grants the boss undeserved literary dignity that Mencken then ironically withdraws.", "isCorrect": false, "rationale": "The allusion grants no dignity to the boss — it is the electorate that makes the false identification. Mencken is mocking the voters' perception, not decorating the boss with heroic status."}], "id": "q11"}, {"question": "Mencken writes that when the boss was overthrown by reformers, 'there appeared in his place the prehensile Methodist parson, bawling for Prohibition.' What structural argument does this replacement illustrate?", "options": [{"text": "Reform movements succeed by replacing corrupt leaders with morally superior ones drawn from religious institutions.", "isCorrect": false, "rationale": "Mencken describes the parson's arrival as the same subordination problem in clerical costume — 'prehensile' (grasping, predatory) and 'bawling' are contemptuous, not approving."}, {"text": "The electorate's need for a leader-figure is so fundamental that destroying one boss only produces a new one in a different guise.", "isCorrect": true, "rationale": "Mencken argues the inferior man 'cannot imagine himself save as taking orders — if not from the boss, then from the priest.' Reformers failed because they targeted the individual rather than the electorate's 'congenital fear of liberty' — the structural demand for a bell-wether is constant."}, {"text": "Religious organizations are uniquely positioned to fill the power vacuum left by the collapse of urban machines.", "isCorrect": false, "rationale": "Mencken does not endorse religious organizations as a solution; the parson and the grand goblin are presented as the boss's direct successors in exploiting the same human weakness."}, {"text": "Prohibition demonstrated that democratic reform can succeed when minority pressure groups achieve majority support.", "isCorrect": false, "rationale": "Mencken is deeply hostile to Prohibition, and in the next section he explicitly attacks the Anti-Saloon League as a minority body that intimidated politicians — it is evidence of democracy's failure, not its success."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
