<script>
var QUESTIONS = [{"question": "Which historical factor most directly contributed to the perception of Mencken's 'aristocratic contempt' as cruel rather than clever during the 1930s?", "options": [{"text": "The Great Depression", "isCorrect": true, "rationale": "The widespread suffering of the common man during this economic crisis made elitist mockery appear insensitive and out of touch with reality."}, {"text": "The repeal of Prohibition", "isCorrect": false, "rationale": "While this removed one of his favorite satirical targets, it did not fundamentally change the public's perception of his attitude toward the common person."}, {"text": "The death of William Jennings Bryan", "isCorrect": false, "rationale": "The loss of a primary antagonist actually reduced his immediate relevance rather than making his prose seem cruel."}, {"text": "The Scopes Trial verdict", "isCorrect": false, "rationale": "This event took place in the mid-1920s, during the height of his fame, and preceded the shift in public sentiment."}], "id": "q01"}, {"question": "How did Hunter S. Thompson's 'Gonzo journalism' deviate from the rhetorical stance established by Mencken?", "options": [{"text": "Thompson placed himself inside the spectacle of folly rather than observing it from above.", "isCorrect": true, "rationale": "Mencken maintained an aristocratic distance, whereas Thompson made himself a central, active character in his reporting."}, {"text": "Thompson avoided the use of hyperbole and satire to maintain journalistic objectivity.", "isCorrect": false, "rationale": "Thompson was famous for his use of exaggeration and satire, much like Mencken."}, {"text": "Thompson focused exclusively on high-status individuals rather than common manners.", "isCorrect": false, "rationale": "Both writers explored the madness of American life across various social strata, though through different lenses."}, {"text": "Thompson rejected the idea that journalism could be a form of performance.", "isCorrect": false, "rationale": "The source explicitly states that Thompson inherited Mencken's willingness to blur the line between journalism and performance."}], "id": "q02"}, {"question": "What specific aspect of Tom Wolfe's writing style is identified as a 'clear debt' to Mencken's earlier work?", "options": [{"text": "Satirical portraits of status-seeking behavior", "isCorrect": true, "rationale": "Wolfe's focus on the 'booboisie' and social hierarchy mirrors Mencken's own preoccupation with American manners and status."}, {"text": "The avoidance of elaborate vocabulary in favor of direct prose", "isCorrect": false, "rationale": "Wolfe actually shared Mencken's love for elaborate and sophisticated vocabulary."}, {"text": "A commitment to traditional, objective reporting without personal commentary", "isCorrect": false, "rationale": "Wolfe was a pioneer of New Journalism, which applied fiction techniques and subjective viewpoints to reporting."}, {"text": "A nostalgic and warm tone similar to Mencken's memoirs", "isCorrect": false, "rationale": "While Mencken's memoirs were nostalgic, the influence on Wolfe is linked to Mencken's sharper, satirical social observations."}], "id": "q03"}, {"question": "In the context of Christopher Hitchens' work, what does the text define as a 'form of moral action'?", "options": [{"text": "The construction of a well-turned sentence", "isCorrect": true, "rationale": "Hitchens believed that prose style and intellectual clarity were inherently tied to ethical and moral standing."}, {"text": "The defense of religious orthodoxy in public debate", "isCorrect": false, "rationale": "Hitchens was known for his contempt for religious orthodoxy, not its defense."}, {"text": "The suppression of private bigotry for public reputation", "isCorrect": false, "rationale": "The text discusses this tension in Mencken's life, but it does not characterize it as Hitchens' view of moral action."}, {"text": "The transition from polemic writing to nostalgic memoirs", "isCorrect": false, "rationale": "This transition describes Mencken's later career, not Hitchens' stylistic philosophy."}], "id": "q04"}, {"question": "According to the 'Key Concept' section, why is the study of Mencken's rhetorical craft considered a form of 'intellectual self-defense'?", "options": [{"text": "It enables readers to recognize and resist emotional manipulation and deceptive language.", "isCorrect": true, "rationale": "Analyzing techniques like loaded diction and hyperbole helps a reader understand how persuasion works, making them harder to deceive."}, {"text": "It forces the reader to adopt the same prejudices as the author being studied.", "isCorrect": false, "rationale": "The text explicitly states that studying craft does not require agreeing with the author's views."}, {"text": "It provides a historical record of policies that were repealed in the 20th century.", "isCorrect": false, "rationale": "While Mencken wrote about such policies, the 'self-defense' aspect refers to the analysis of language, not historical facts."}, {"text": "It proves that a writer's private views are always irrelevant to their public work.", "isCorrect": false, "rationale": "The text acknowledges the controversy over Mencken's views as a deep paradox rather than dismissing them as irrelevant."}], "id": "q05"}, {"question": "What paradox was highlighted by the 1989 publication of Mencken's private diary?", "options": [{"text": "The contradiction between his public defense of marginalized groups and his private bigoted sentiments.", "isCorrect": true, "rationale": "The diary revealed harsh language against groups Mencken had publicly defended, such as African Americans and Jews."}, {"text": "The fact that he was unable to read or write during the years he wrote the diary.", "isCorrect": false, "rationale": "His inability to read and write occurred after his stroke in 1948, whereas the diary was written during his active years."}, {"text": "The shift from his earlier nostalgic memoirs to his later combative polemics.", "isCorrect": false, "rationale": "Mencken's career followed the opposite trajectory: combative early work followed by warmer memoirs."}, {"text": "His instruction to publish the diary immediately despite its controversial nature.", "isCorrect": false, "rationale": "Mencken actually left instructions to delay the publication for twenty-five years after his death."}], "id": "q06"}, {"question": "Why does the author of the text argue that Mencken's sentences survived even after the controversies he wrote about faded?", "options": [{"text": "The controversies were merely the occasion for his display of linguistic craft.", "isCorrect": true, "rationale": "The author posits that the substance of the work is the prose style itself—rhythm and word choice—rather than the specific topics."}, {"text": "Mencken was eventually proven correct about the benefits of Prohibition.", "isCorrect": false, "rationale": "Prohibition was repealed, and Mencken's opposition to it is cited as a 'vanished' historical controversy."}, {"text": "His late-life memoirs replaced the need for his earlier satirical work.", "isCorrect": false, "rationale": "The text argues that his sentences across his body of work endure because of their craft, not that one period replaced another."}, {"text": "He successfully predicted the rise of global fascism in his 1926 book.", "isCorrect": false, "rationale": "The text suggests the rise of fascism actually damaged his reputation by making his attacks on democracy look like collaboration."}], "id": "q07"}, {"question": "In what way did Mencken modify the tradition of literary journalism established by Addison and Steele?", "options": [{"text": "He made it louder, cruder, and more willing to offend.", "isCorrect": true, "rationale": "The text explains that while he didn't invent the genre, he gave it a 'distinctively American' character through increased aggression and humor."}, {"text": "He introduced the concept of objective, fact-based reporting to the genre.", "isCorrect": false, "rationale": "Mencken was known for opinion and polemic, not for introducing modern standards of objective reporting."}, {"text": "He shifted the focus from social manners to purely scientific inquiry.", "isCorrect": false, "rationale": "Mencken remained focused on social and democratic life, often using social observation as entertainment."}, {"text": "He removed the element of wit to focus on serious intellectual combat.", "isCorrect": false, "rationale": "Mencken is praised for making contempt 'entertaining,' indicating that wit remained central to his style."}], "id": "q08"}, {"question": "Which set of Mencken's works is described as 'warmer, more nostalgic, and less combative'?", "options": [{"text": "His memoirs: Happy Days, Newspaper Days, and Heathen Days", "isCorrect": true, "rationale": "Written in his last productive decade, these books reflect a softer tone than the polemics of the 1920s."}, {"text": "Notes on Democracy and his early newspaper columns", "isCorrect": false, "rationale": "Notes on Democracy (1926) is cited as work from the height of his combative fame."}, {"text": "The private diaries published posthumously in 1989", "isCorrect": false, "rationale": "The diaries are described as containing language 'far harsher' than his published work, not warmer."}, {"text": "His critiques of the Ku Klux Klan and William Jennings Bryan", "isCorrect": false, "rationale": "These were part of the specific, often harsh controversies of the 1920s."}], "id": "q09"}, {"question": "According to the text, why does Mencken remain relevant in the twenty-first century despite the 'vanished era' of his specific targets?", "options": [{"text": "He addressed permanent tensions in democratic life, such as populism versus expertise.", "isCorrect": true, "rationale": "The rhetorical questions he raised about demagogues and democratic institutions remain relevant features of modern politics."}, {"text": "His predictions about the ultimate failure of democracy have been globally accepted.", "isCorrect": false, "rationale": "The text suggests his techniques and questions remain relevant, not that his specific anti-democratic conclusions are universally accepted."}, {"text": "He is the only writer to successfully blend fiction with factual reporting.", "isCorrect": false, "rationale": "This technique is attributed more to Tom Wolfe and the New Journalists, though they were influenced by him."}, {"text": "His private diaries provided a roadmap for modern civil rights movements.", "isCorrect": false, "rationale": "The private diaries were a source of pain and reassessment due to their bigoted content, not a positive roadmap."}], "id": "q10"}, {"question": "The overview describes the four-part arc of Notes on Democracy as mirroring the classical structure of a legal case. Which part of the book corresponds to the 'emotional appeal' phase of classical oratory?", "options": [{"text": "Part III: Democracy and Liberty — where the satirical mask slips and Mencken's genuine anger over Prohibition, censorship, and the Puritan assault on private life breaks through.", "isCorrect": true, "rationale": "Classical oratory structures the emotional appeal (pathos) after establishing facts and argument; in Notes on Democracy, Part III is where Mencken's detached analysis gives way to passionate indignation — the emotional center of the book."}, {"text": "Part I: Democratic Man — where Mencken establishes the factual basis of his case using mock-scientific vocabulary.", "isCorrect": false, "rationale": "Part I corresponds to the 'statement of facts' phase; the mock-scientific persona is diagnostic and detached, not emotionally charged."}, {"text": "Part IV: Coda — where Mencken confesses his enjoyment and delivers his final verdict.", "isCorrect": false, "rationale": "Part IV corresponds to the peroration — the closing statement — not the emotional appeal; its tone is one of withdrawal and quiet understatement."}, {"text": "Part II: The Democratic State — where Mencken builds his prosecutorial case against democratic institutions.", "isCorrect": false, "rationale": "Part II corresponds to the argument phase; the prosecutor builds a logical case, which is logos-driven, not the emotional appeal (pathos)."}], "id": "q11"}, {"question": "The overview states that understanding the four-part arc 'matters because it reveals that Mencken's power is not confined to the individual sentence.' What dimension of rhetorical power operates at the level of the whole book rather than the single page?", "options": [{"text": "The sequence of tonal shifts — amusement to fury to resignation — is itself a rhetorical technique that shapes the reader's emotional journey across the entire work.", "isCorrect": true, "rationale": "The overview explicitly identifies the 'sequence of tonal shifts' as a book-level rhetorical technique; each shift works because of what preceded it, creating cumulative effects impossible in a single essay."}, {"text": "The accumulation of historical examples across four parts provides an irrefutable statistical case that no single chapter could build.", "isCorrect": false, "rationale": "Mencken does not make statistical arguments; the book-level power is tonal and structural, not quantitative."}, {"text": "The repeated use of Latinate medical vocabulary across all four parts creates a unified scientific authority.", "isCorrect": false, "rationale": "The medical vocabulary is most concentrated in Part IV; the book-level technique is the arc of tonal shifts, not the persistence of a single vocabulary register."}, {"text": "The four-part structure allows Mencken to cover more topics than any single essay could, making the book exhaustive.", "isCorrect": false, "rationale": "The overview's point is about rhetorical power, not about topical coverage; the technique is the emotional arc, not the range of subjects."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
