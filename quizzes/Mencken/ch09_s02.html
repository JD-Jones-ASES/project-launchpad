<script>
var QUESTIONS = [{"question": "According to Mencken, how does the 'inferior man' typically perceive the desire for liberty displayed by those he considers his superiors?", "options": [{"text": "As an appetite for a quality of which he himself is fundamentally incapable.", "isCorrect": true, "rationale": "Mencken posits that because the inferior man is a 'natural slave,' he can only understand the desire for liberty as an enviable good he cannot attain, leading to resentment."}, {"text": "As a shared human instinct that he seeks to emulate through political activism.", "isCorrect": false, "rationale": "This contradicts the source's claim that the inferior man is unable to comprehend the actual desire for liberty in others."}, {"text": "As a threat to the stability of the state that must be regulated for the common good.", "isCorrect": false, "rationale": "While the inferior man may 'put them down,' Mencken suggests the motivation is personal envy rather than a structured concern for state stability."}, {"text": "As a hypocritical mask used by the minority to maintain economic dominance.", "isCorrect": false, "rationale": "Mencken argues the inferior man lacks the capacity to even apprehend the desire properly, let alone analyze it as a tool of economic hegemony."}]}, {"question": "Mencken defines 'social justice' in a democratic context as being primarily designed for what purpose?", "options": [{"text": "To ensure that the laborer receives more than his fair hire.", "isCorrect": true, "rationale": "Mencken distinguishes between genuine justice and a 'false form' of social justice aimed at providing the masses with excess compensation."}, {"text": "To protect heretical minorities from the 'wars of extermination' waged by the majority.", "isCorrect": false, "rationale": "The text states that heretical minorities receive no protection and that justice for them is unpopular in a democracy."}, {"text": "To establish a legal framework where the rights of all citizens are held in equal regard.", "isCorrect": false, "rationale": "Mencken argues that elemental principles of justice are often violated in democratic states without public outrage."}, {"text": "To educate the proletariat on the value of individual liberty over material gain.", "isCorrect": false, "rationale": "Mencken suggests the city workman is more concerned with the loss of 'beer' than the loss of 'liberty,' indicating a rejection of this educational goal."}]}, {"question": "What paradox does Mencken observe in the history of the American Department of Agriculture?", "options": [{"text": "It was almost unanimously opposed by the very farmers it was designed to benefit.", "isCorrect": true, "rationale": "Mencken uses this as an example of the masses opposing progress even when that progress directly ameliorates their own lot."}, {"text": "It was created as a branch of the Patent Office to protect industrial interests over rural ones.", "isCorrect": false, "rationale": "While it began as a bureau of the Patent Office, the paradox lies in the farmers' opposition to its eventual benefits."}, {"text": "Its net effect was to increase the labor of the American farmer while reducing profits.", "isCorrect": false, "rationale": "The source explicitly states the department reduced labor and augmented profits for the farmer."}, {"text": "It was championed by the superior minority but corrupted by the democratic hands of the masses.", "isCorrect": false, "rationale": "The focus of Mencken's point is the masses' initial 'bitter derision' and opposition to the institution itself, not its eventual corruption."}]}, {"question": "According to the text, why did Bismarck have to carry on the German government unconstitutionally to pass social legislation?", "options": [{"text": "The common people and their 'mob-masters' fiercely opposed the reforms designed to help them.", "isCorrect": true, "rationale": "The proletariat and the Reichstag opposed Bismarck's code of legislation, which was intended to restore their rights under Prussian common law."}, {"text": "The German courts were controlled by the aristocracy who refused to grant rights to the industrial workers.", "isCorrect": false, "rationale": "Mencken states the proletariat had control of the Reichstag and would have used the courts to depose Bismarck if they had control there too."}, {"text": "Altruistic heroes from other countries pressured him to adopt a model of despotism instead.", "isCorrect": false, "rationale": "Mencken sarcastically mentions altruistic heroes delivering Germany from despotism later, but not as a reason for Bismarck's unconstitutional actions."}, {"text": "He lacked the support of the Socialist leader Ferdinand Lassalle, who led the opposition.", "isCorrect": false, "rationale": "Lassalle was actually the only 'mob-master' who did not oppose Bismarck, being described as his 'kept Socialist.'"}]}, {"question": "Sir Henry Maine argues that if universal suffrage had been effective in the past, it would have likely prohibited which of the following?", "options": [{"text": "The adoption of the Gregorian Calendar.", "isCorrect": true, "rationale": "Maine contends that the accurate will of the people would have forbidden major scientific and social changes, including calendar reforms."}, {"text": "The restoration of the Stuart monarchy.", "isCorrect": false, "rationale": "Maine actually states that universal suffrage *would have* restored the Stuarts, not prohibited them."}, {"text": "The preservation of the Roman Catholic faith during the riots of $1780$.", "isCorrect": false, "rationale": "Maine suggests that universal suffrage would have 'proscribed' (outlawed/condemned) Roman Catholics, aligning with the mob's actions."}, {"text": "The implementation of anti-evolution acts in the 'Hookworm Belt.'", "isCorrect": false, "rationale": "Mencken uses anti-evolution acts as a modern example of what happens when the 'actual voice' of the state (vox populi) is heard."}]}, {"question": "Mencken attributes the popularity of 'Fundamentalism' and 'quackeries' to which characteristic of the masses?", "options": [{"text": "A preference for simple, easily understood formulas over complex scientific concepts.", "isCorrect": true, "rationale": "The 'dark mind' of the inferior man finds complex ideas alarming and burdensome, leading him to seek 'short cuts' and simple revelations."}, {"text": "A deep-seated yearning for moral perfection through rigorous spiritual discipline.", "isCorrect": false, "rationale": "Mencken explicitly states the common man has no yearning for moral perfection, only a fear of his neighbors."}, {"text": "An innate curiosity about the 'occult' and the 'unknowable' aspects of the physical world.", "isCorrect": false, "rationale": "While he mentions these terms, the text says the masses are 'propelled' into the realm of the unknowable and find it 'alarming,' rather than being curious."}, {"text": "The high level of literacy and civilization in modern democratic states.", "isCorrect": false, "rationale": "Mencken argues that even in literate states, the average human is as ignorant of science as 'horned cattle.'"}]}, {"question": "What does Mencken claim is the primary reason the music of Johann Sebastian Bach remains 'lawful' in the United States?", "options": [{"text": "It lies outside the cognizance and awareness of the mob and demagogues.", "isCorrect": true, "rationale": "Mencken argues that if the mob were aware of the complexity and lack of utilitarian purpose in Bach's music, they would seek to proscribe it."}, {"text": "It has been successfully integrated into the common-school curriculum.", "isCorrect": false, "rationale": "The author warns *against* putting fine arts into the curriculum, as it would alert the mob to their existence."}, {"text": "The Baptist clergy have recognized its spiritual value and endorsed its performance.", "isCorrect": false, "rationale": "Mencken suggests that Baptist clergymen would actually denounce such music if it were brought within their range."}, {"text": "It is perceived by the masses as having a clear utilitarian and patriotic purpose.", "isCorrect": false, "rationale": "Mencken states that the 'lack of utilitarian purpose' would actually affright the mob if they noticed it."}]}, {"question": "How does Mencken describe the relationship between $Homo\\ neandertalensis$ and exact knowledge?", "options": [{"text": "He is hostile to it because its complexity places an unbearable burden on his meager capacity.", "isCorrect": true, "rationale": "Exact knowledge is seen as occult and alarming to the 'dark mind' of the common man, who prefers simple platitudes."}, {"text": "He is eager to acquire it but is prevented by the 'superior minority' who keep it as a secret possession.", "isCorrect": false, "rationale": "Mencken states the common man has 'no curiosity' about things like histology or paleontology."}, {"text": "He views it as a biochemical process comparable to the fermentation in a barrel of cider.", "isCorrect": false, "rationale": "While Mencken says the man's *life* is a biochemical process, he states the man knows no more about chemistry than a cow."}, {"text": "He respects it only when it can be applied directly to the radio or the movies.", "isCorrect": false, "rationale": "The text notes that even applied sciences like physics remain 'dark to him' despite his use of the radio."}]}, {"question": "According to the text, what happened when a vaccination ordinance was submitted to a popular referendum in Los Angeles?", "options": [{"text": "The ordinance was rejected, leading to the spread of smallpox.", "isCorrect": true, "rationale": "Mencken uses this as a typical example of the majority opposing public health measures to their own detriment."}, {"text": "The proletariat embraced the measure but only after it was explained by Christian Scientists.", "isCorrect": false, "rationale": "The proletariat went to Christian Scientists *after* the disease spread as an alternative to the rejected medical ordinance."}, {"text": "It was passed by a small minority of rogues who deceived the mob.", "isCorrect": false, "rationale": "The text states the ordinance was specifically rejected by the referendum, not passed through deception."}, {"text": "The American Legion intervened to enforce the ordinance with clubs.", "isCorrect": false, "rationale": "The American Legion is mentioned in the context of attacking 'Reds' and 'fiddlers,' not enforcing health ordinances in Los Angeles."}]}, {"question": "What metaphor does Mencken use to describe the few genuine believers in liberty and justice who survive in a democratic state?", "options": [{"text": "They are huddled upon a burning deck.", "isCorrect": true, "rationale": "This imagery highlights their precarious and isolated position amidst a civilization Mencken views as hostile to their values."}, {"text": "They are race-horses issuing from a farm mare.", "isCorrect": false, "rationale": "The author explicitly states that a 'race-horse' (or libertarian) may *not* be expected to issue from a 'farm mare.'"}, {"text": "They are horned cattle in the fields.", "isCorrect": false, "rationale": "This metaphor is used to describe the ignorance of the average human being regarding science, not the enlightened minority."}, {"text": "They are alchemists attempting to convert ignorance into good government.", "isCorrect": false, "rationale": "Mencken (quoting Lecky) describes the notion that ignorance can be converted into good government as irrational 'ancient alchemy.'"}]}, {"question": "According to the text, why does beauty 'fever and enrage' the common man?", "options": [{"text": "He cannot comprehend it, yet it somehow challenges and disturbs him.", "isCorrect": true, "rationale": "Mencken argues that the common man finds beauty's lack of utility and its complexity to be a personal affront that keeps him 'awake.'"}, {"text": "He has an intense, suppressed yearning for moral perfection that beauty violates.", "isCorrect": false, "rationale": "Mencken denies that the common man has any such yearning, stating his morals are based on fear of punishment."}, {"text": "It reminds him of the 'superior minority' who historically oppressed his ancestors.", "isCorrect": false, "rationale": "The source focuses on the common man's inability to understand beauty rather than a historical grievance against an elite class."}, {"text": "He is naturally attracted to it but is forbidden from enjoying it by religious censorship.", "isCorrect": false, "rationale": "Mencken claims the mob *supports* the censorship (e.g., in Boston) and that the common man's own nature is hostile to beauty."}]}, {"question": "What is Mencken's view on the breeding of a 'libertarian'?", "options": [{"text": "It is a slow process comparable to the breeding of a thoroughbred race-horse.", "isCorrect": true, "rationale": "Mencken suggests that the capacity for liberty is an inherited or slowly developed trait of the 'higher levels' of humanity."}, {"text": "It is a natural byproduct of universal suffrage and 'more democracy.'", "isCorrect": false, "rationale": "Mencken believes 'more democracy' actually increases the number of acts depriving enlightened minorities of their rights."}, {"text": "It can be achieved by putting the fine arts into the common-school curriculum.", "isCorrect": false, "rationale": "The text warns that school teachers are usually too ignorant to teach art, and doing so only alerts the mob to attack it."}, {"text": "It is an 'ancient alchemy' that converts the least enlightened classes into the best.", "isCorrect": false, "rationale": "This is the 'irrational' notion that Mencken (via Lecky) argues against."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
