<script>
var QUESTIONS = [{"question": "What was a primary motivation behind H.L. Mencken's writing, according to the text?", "options": [{"text": "He sought to expose personal grievances stemming from an unhappy childhood.", "isCorrect": false, "rationale": "The text explicitly states that Mencken's childhood was 'almost absurdly happy' and that he 'did not write out of personal grievance.'"}, {"text": "He was driven by a strong intellectual offense at what he perceived as folly and stupidity in the world.", "isCorrect": true, "rationale": "The text clearly states, 'He wrote because the world offended his intelligence,' indicating his intellectual drive against perceived absurdity."}, {"text": "He aimed to document American history through objective reporting and academic analysis.", "isCorrect": false, "rationale": "Mencken distrusted academics and despised 'professors of English,' and his prose was punchy and opinionated, not strictly objective."}, {"text": "He desired to achieve widespread fame and fortune through sensationalist journalism.", "isCorrect": false, "rationale": "While he became famous, the text attributes his writing to intellectual offense rather than a pursuit of fame or sensationalism for its own sake, although his style was certainly provocative."}], "id": "q01"}, {"question": "Which of the following best describes H.L. Mencken's early career path in journalism?", "options": [{"text": "He initially worked in his father's cigar business before transitioning to literary magazines.", "isCorrect": false, "rationale": "His father wanted him to enter the cigar business, but Mencken wanted to write and immediately sought a job in journalism after his father's death, bypassing the family business entirely."}, {"text": "He started at a local Baltimore paper at a young age and quickly rose to a significant editorial position.", "isCorrect": true, "rationale": "Mencken joined the Baltimore Morning Herald at age eighteen and became city editor within four years, demonstrating a rapid ascent in local journalism."}, {"text": "He began his career as a syndicated columnist for national papers before moving to local news.", "isCorrect": false, "rationale": "He started at the Baltimore Morning Herald, then moved to the Baltimore Sun, becoming known for his 'Monday Articles' much later in his career."}, {"text": "He received formal journalistic training at an institute before securing his first newspaper job.", "isCorrect": false, "rationale": "His formal education ended with his graduation from Baltimore Polytechnic Institute in 1896; he sought a newspaper job directly without specific journalistic training mentioned."}], "id": "q02"}, {"question": "H.L. Mencken strongly opposed the 'genteel tradition' in American letters. What core value did he champion in literature that directly countered this tradition?", "options": [{"text": "Polite discourse and moralistic themes designed to uplift the public.", "isCorrect": false, "rationale": "The genteel tradition itself was characterized by politeness and moralism, which Mencken considered 'lifeless' and a personal enemy. He championed the opposite."}, {"text": "Academic rigor and objective, detached literary analysis.", "isCorrect": false, "rationale": "Mencken distrusted academics and despised what he called 'professors of English,' preferring subjective judgment to academic analysis."}, {"text": "Vitality, honesty, and genuine talent, even if it was crude or offensive to established tastes.", "isCorrect": true, "rationale": "The text states, 'Mencken valued vitality over propriety, honesty over elegance, and genuine talent over approved mediocrity,' which directly contrasts the genteel tradition."}, {"text": "Careful adherence to traditional literary forms and established grammatical rules.", "isCorrect": false, "rationale": "Mencken's own style involved 'register mixing' and deliberate outrageousness, suggesting he did not strictly adhere to traditional literary forms or rules."}], "id": "q03"}, {"question": "Which of the following is considered H.L. Mencken's 'scholarly masterpiece' that demonstrated his genuine erudition and a scholar's patience for detail?", "options": [{"text": "Prejudices", "isCorrect": false, "rationale": "Prejudices collected his essays and criticism, and while significant, it was known for its provocative bias rather than scholarly patience or erudition in the same vein as his language study."}, {"text": "The American Mercury", "isCorrect": false, "rationale": "The American Mercury was a magazine he founded and edited, not a single scholarly work demonstrating his erudition on a specific topic."}, {"text": "Notes on Democracy", "isCorrect": false, "rationale": "Notes on Democracy is listed as a major work but not specifically highlighted as his 'scholarly masterpiece' demonstrating deep erudition in the way the other option is."}, {"text": "The American Language", "isCorrect": true, "rationale": "The text explicitly refers to 'The American Language' as his 'scholarly masterpiece' and notes that it 'demonstrated that beneath Mencken's fireworks lay genuine erudition and a scholar's patience for detail.'"}], "id": "q04"}, {"question": "H.L. Mencken's coverage of the Scopes Trial is highlighted as a significant event in his career. What did his dispatches from the trial primarily reveal about his journalistic approach and personal convictions?", "options": [{"text": "His commitment to unbiased reporting and objective analysis of legal proceedings.", "isCorrect": false, "rationale": "Mencken's dispatches were not unbiased; they 'savaged William Jennings Bryan and the anti-evolution movement with a ferocity that made national headlines,' indicating a highly opinionated approach."}, {"text": "His use of devastating wit and moral outrage to attack what he saw as organized ignorance.", "isCorrect": true, "rationale": "The text states his dispatches 'combined devastating wit with genuine moral outrage against what he considered organized ignorance,' reflecting his characteristic style and convictions against certain societal elements."}, {"text": "His ability to bridge divides between scientific and religious viewpoints through eloquent prose.", "isCorrect": false, "rationale": "His coverage was confrontational, savaging the anti-evolution movement, rather than seeking to bridge divides."}, {"text": "His preference for reporting on high-profile national events over local Baltimore news.", "isCorrect": false, "rationale": "While the Scopes Trial was national, the text also mentions he covered 'national political conventions, presidential campaigns,' but he remained associated with Baltimore papers for most of his career, suggesting he didn't strictly prefer national over local."}], "id": "q05"}, {"question": "If H.L. Mencken were critiquing a politician, and he described the politician's speech as 'a torrent of platitudes so dense it could solidify into a monument to banality,' which stylistic element would he primarily be employing, and why?", "options": [{"text": "Mock-scientific diction, to analyze human folly as a clinical specimen.", "isCorrect": false, "rationale": "While he used mock-scientific diction, this example does not borrow vocabulary from biology, medicine, or psychology, but rather uses extreme exaggeration."}, {"text": "Hyperbole, to deliberately overstate his case and challenge the reader to find the underlying argument.", "isCorrect": true, "rationale": "The description 'torrent of platitudes so dense it could solidify into a monument to banality' is a clear exaggeration, which the text defines as hyperbole Mencken used to overstate his case and challenge the reader."}, {"text": "Register mixing, to deflate pretension by clashing formal and colloquial language.", "isCorrect": false, "rationale": "The phrasing is consistently formal and highly critical, not mixing slang or colloquialisms with formal diction."}, {"text": "Devastating short sentences, to deliver a lethal verdict after a complex argument.", "isCorrect": false, "rationale": "This example is a longer, descriptive phrase, not a short, punchy sentence used to conclude an argument."}], "id": "q06"}, {"question": "The American Mercury, under Mencken's editorship, was designed to appeal to a specific demographic. Which characteristic best defines its target audience?", "options": [{"text": "Rural Americans interested in traditional values and family-oriented content.", "isCorrect": false, "rationale": "The Mercury's audience 'despised the small-town values of his parents' and had 'outgrown Sunday school, Rotary Club meetings, and the pieties of the Saturday Evening Post,' directly opposing rural, traditional values."}, {"text": "Scholars and academics seeking rigorous, peer-reviewed literary criticism.", "isCorrect": false, "rationale": "Mencken distrusted academics and considered most literary criticism a 'species of fraud,' so the magazine was not aimed at this group."}, {"text": "Educated skeptics and young professionals who wished to distinguish themselves from perceived mediocrity.", "isCorrect": true, "rationale": "The text describes the audience as 'the educated skeptic, the college student who wanted to distinguish himself from his classmates, the young professional who despised the small-town values of his parents,' seeking 'permission to feel superior.'"}, {"text": "Working-class individuals advocating for social reform and labor rights.", "isCorrect": false, "rationale": "The magazine's content and Mencken's 'aristocratic scorn for the common man' suggest it was not aimed at the working class or focused on social reform."}], "id": "q07"}, {"question": "H.L. Mencken's cultural influence significantly declined after 1930. What was the primary reason cited for this shift?", "options": [{"text": "His personal scandals and public displays of grief after his wife's death alienated his readership.", "isCorrect": false, "rationale": "The text states Mencken was 'not a man given to public displays of grief' and makes no mention of personal scandals impacting his career."}, {"text": "He suffered a massive stroke that left him unable to write, ending his active career.", "isCorrect": false, "rationale": "His stroke occurred in 1948, well after his influence had already waned sharply after 1930."}, {"text": "His aristocratic scorn for the common man seemed cruel and out of touch during the Great Depression.", "isCorrect": true, "rationale": "The text explicitly states that 'the Great Depression that followed made Mencken's aristocratic scorn for the common man seem not merely provocative but cruel,' leading to his waning influence."}, {"text": "The rise of The American Mercury's competitors led to a loss of readership.", "isCorrect": false, "rationale": "The text mentions the decline of the Mercury's influence but attributes it to larger societal changes (the Depression and New Deal), not competition."}], "id": "q08"}, {"question": "H.L. Mencken was known for championing writers who challenged the literary establishment. Which of the following authors did he specifically promote for their departure from the 'genteel tradition'?", "options": [{"text": "William Jennings Bryan, for his eloquent speeches and moralistic stance.", "isCorrect": false, "rationale": "Mencken savaged William Jennings Bryan at the Scopes Trial, identifying him with the anti-evolution movement and organized ignorance, not as a literary figure he championed."}, {"text": "Theodore Dreiser, for his raw naturalism that respectable critics dismissed as vulgar.", "isCorrect": true, "rationale": "The text states Mencken 'fought for Theodore Dreiser's raw naturalism when respectable critics dismissed it as vulgar,' directly aligning with his fight against the genteel tradition."}, {"text": "Alfred A. Knopf, for his publishing acumen and business leadership.", "isCorrect": false, "rationale": "Alfred A. Knopf published The American Mercury, but he was Mencken's publisher, not a writer Mencken championed for his literary style."}, {"text": "George Santayana, for coining the term 'genteel tradition.'", "isCorrect": false, "rationale": "Santayana coined the term 'genteel tradition,' which Mencken fought against, but Santayana is not mentioned as an author Mencken championed for his writing."}], "id": "q09"}, {"question": "Considering his life, critical stance, and stylistic choices, which statement best encapsulates H.L. Mencken's fundamental approach to his work and the world?", "options": [{"text": "He was a dispassionate observer who sought to present all sides of an argument fairly and objectively.", "isCorrect": false, "rationale": "Mencken's prose was 'flamboyant, aggressive, learned, and deliberately outrageous,' and he 'did not analyze literature so much as pronounce judgment on it — loudly, memorably,' indicating a highly opinionated, not dispassionate, approach."}, {"text": "He was an ardent populist who celebrated the wisdom and common sense of ordinary Americans.", "isCorrect": false, "rationale": "Mencken held 'aristocratic scorn for the common man' and despised 'democratic mediocrity,' which contradicts the idea of him being an ardent populist."}, {"text": "He was an intellectual provocateur who used wit and criticism to challenge hypocrisy, sentimentality, and anything that offended his intelligence.", "isCorrect": true, "rationale": "The text highlights that he 'wrote because the world offended his intelligence,' used 'devastating wit,' attacked 'Puritanism, Prohibition, democratic mediocrity, evangelical religion, censorship, academic pomposity,' and championed 'the independent mind that refused to bow to public opinion.' This aligns perfectly with an intellectual provocateur."}, {"text": "He was a humble scholar dedicated to preserving traditional literary and cultural norms.", "isCorrect": false, "rationale": "Mencken was a critic of the 'genteel tradition' and aimed to demolish 'American provincialism,' making him an opponent of traditional literary and cultural norms rather than a preserver."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
