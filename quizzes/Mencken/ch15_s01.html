<script>
var QUESTIONS = [{"question": "According to the source material, what is Mencken's primary objective in Section 1 of Chapter 15 regarding the 'reformer's perennial hope'?", "options": [{"text": "To illustrate that the democratic system is structurally sound but suffers from poor personnel choices.", "isCorrect": false, "rationale": "This view represents the very 'reformer's hope' that Mencken is attempting to dismantle, rather than his own objective."}, {"text": "To demonstrate that the political system inherently corrupts or eliminates individuals of high integrity.", "isCorrect": true, "rationale": "Mencken's 'demolition' task is to show that the system does not just fail to produce good leaders; it actively destroys them."}, {"text": "To provide a historical roadmap for 'professional Liberals' to successfully navigate the spoils system.", "isCorrect": false, "rationale": "Mencken views the efforts of 'professional Liberals' as futile and absurd, offering a challenge rather than a roadmap."}, {"text": "To argue that the American judiciary serves as the final remaining bastion of the 'gentleman' in public office.", "isCorrect": false, "rationale": "While he mentions the judiciary, his broader thesis is that it has become a 'psychic impossibility' for a gentleman to hold office anywhere in the system."}], "id": "q01"}, {"question": "Mencken utilizes the 'bawdy-house' analogy to specifically critique which aspect of Liberal reform?", "options": [{"text": "The immoral nature of the candidates chosen by reform parties.", "isCorrect": false, "rationale": "The analogy focuses on the systemic environment rather than the initial morality of the candidates themselves."}, {"text": "The inevitable economic collapse of democratic institutions.", "isCorrect": false, "rationale": "The analogy is used to illustrate systemic corruption and behavioral outcomes, not economic theory."}, {"text": "The naivety of believing that placing 'good' individuals into a corrupt system will change the system.", "isCorrect": true, "rationale": "The analogy suggests that either the 'virgins' (reformers) will leave the 'bawdy-house' (politics) or be corrupted by it."}, {"text": "The lack of public interest in the private lives of democratic politicians.", "isCorrect": false, "rationale": "Mencken's focus is on the structural failure of reform, not the public's level of scrutiny or interest."}], "id": "q02"}, {"question": "In the context of Mencken's diction, how does he use the term 'mountebank' to describe the career politician?", "options": [{"text": "As a literal reference to the medical training required for public health officials.", "isCorrect": false, "rationale": "The term is used metaphorically to describe political behavior, not actual medical backgrounds."}, {"text": "As a way to highlight the politician's role as a performer who sells fraudulent solutions to the public.", "isCorrect": true, "rationale": "The term historically refers to a charlatan hawking fake medicine, which Mencken applies to the 'false remedies' of politicians."}, {"text": "To suggest that the politician is a necessary 'physician' for a sick democracy.", "isCorrect": false, "rationale": "Mencken's use is entirely derogatory, implying fraud rather than any helpful 'healing' role."}, {"text": "To emphasize the physical stamina required to maintain a seat in the legislature.", "isCorrect": false, "rationale": "The word highlights performance and fraudulence rather than physical endurance."}], "id": "q03"}, {"question": "Which rhetorical device does Mencken use when he writes that Calvin Coolidge had 'no evidence that he is acquainted with a single intelligent man'?", "options": [{"text": "Hyperbole", "isCorrect": false, "rationale": "While the claim is extreme, the specific phrasing 'no evidence' is a classic form of litotes or understatement."}, {"text": "Litotes", "isCorrect": true, "rationale": "This understatement mimics the language of a fair-minded observer while delivering a devastating critique."}, {"text": "Onomatopoeia", "isCorrect": false, "rationale": "There is no use of sound-mimicking words in this specific sentence about Coolidge."}, {"text": "Personification", "isCorrect": false, "rationale": "The sentence describes Coolidge's social circle directly without attributing human traits to non-human entities."}], "id": "q04"}, {"question": "How does Mencken differentiate between 'satire' and 'polemic' in his writing style?", "options": [{"text": "Satire is used for historical examples, while polemic is reserved for abstract theory.", "isCorrect": false, "rationale": "Mencken uses both styles across historical and theoretical points; the difference lies in the directness of the attack."}, {"text": "Satire attacks the target indirectly through irony, while polemic attacks directly and openly.", "isCorrect": true, "rationale": "The source defines satire as indirect ridicule and polemic as direct assertion without ironic cover."}, {"text": "Polemic is intended to make the reader laugh, whereas satire is intended to incite anger.", "isCorrect": false, "rationale": "Satire often involves humor/ridicule, whereas polemic is usually a serious, direct argument."}, {"text": "Satire uses nursery-room idioms, while polemic uses Latinate vocabulary exclusively.", "isCorrect": false, "rationale": "The text notes Mencken's vocabulary shifts, but these do not strictly define the boundary between satire and polemic."}], "id": "q05"}, {"question": "Mencken's analysis of Theodore Roosevelt's career serves as a 'central exhibit' for which thesis?", "options": [{"text": "That young politicians are more likely to succeed than older, established ones.", "isCorrect": false, "rationale": "Roosevelt's age is secondary to his transformation from a reformer into the thing he once opposed."}, {"text": "That democratic politics inevitably corrupts even those with the best intentions.", "isCorrect": true, "rationale": "Mencken uses TR to show that the system turned a 'sword drawn against demagogy' into a 'shameless demagogue'."}, {"text": "That the spoils system can only be cleaned up by a president with military experience.", "isCorrect": false, "rationale": "Mencken argues that the system itself is the problem, regardless of the individual's background or intentions."}, {"text": "That Roosevelt was a pragmatist who successfully balanced idealism and reality.", "isCorrect": false, "rationale": "This is the view of Roosevelt's defenders, which Mencken explicitly rejects in favor of his 'demagogue' thesis."}], "id": "q06"}, {"question": "According to the 'Syntax and Rhythm' section, what is the effect of Mencken's use of the 'conditional chain'?", "options": [{"text": "It provides the reader with multiple escape routes from his logical conclusions.", "isCorrect": false, "rationale": "The conditional chain is designed to do the opposite—to narrow options and trap the reader."}, {"text": "It creates a sense of 'psychic impossibility' by using overly complex Latinate grammar.", "isCorrect": false, "rationale": "While he uses Latinate words elsewhere, the conditional chain relies on the logic of 'if-then' structures."}, {"text": "It builds a metaphorical 'cage' that suggests the reformer has no choice but to capitulate to the mob.", "isCorrect": true, "rationale": "The syntax narrow's the options until only 'capitulation remains,' effectively trapping the reformer in a logical progression."}, {"text": "It mimics the 'staccato rhythm' of a politician's quick and unprincipled movements.", "isCorrect": false, "rationale": "The staccato rhythm is achieved through short, decisive sentences, whereas the conditional chain uses sequences of clauses."}], "id": "q07"}, {"question": "Mencken's use of the word 'sempiternal' to describe mob prejudice is intended to convey what quality?", "options": [{"text": "The fleeting and temporary nature of political trends.", "isCorrect": false, "rationale": "The word 'sempiternal' means everlasting, which is the opposite of fleeting."}, {"text": "The biological basis of human intelligence in the democratic voter.", "isCorrect": false, "rationale": "While Mencken critiques the mob, 'sempiternal' refers to the duration and permanence of their prejudices, not biology."}, {"text": "A sense of cosmic permanence and inescapable, everlasting endurance.", "isCorrect": true, "rationale": "Mencken uses this Latinate word to elevate the mob's prejudices to a kind of 'cosmic permanence'."}, {"text": "The accidental and unpredictable nature of public opinion.", "isCorrect": false, "rationale": "The term suggests that these prejudices are a constant, predictable fixture of the democratic landscape."}], "id": "q08"}, {"question": "In the close reading of the passage about Theodore Roosevelt, what does Mencken achieve by contrasting the first sentence (a question) with the second (a declarative)?", "options": [{"text": "He suggests that the historical record is still open to debate among scholars.", "isCorrect": false, "rationale": "The quiet, factual nature of the second sentence is presented as final and damning, not open to debate."}, {"text": "He enacts the process of idealism transforming into its opposite through syntactic shift.", "isCorrect": true, "rationale": "The 'noise' of the aggressive accusation gives way to the 'silence' of the historical record, mimicking the transformation described."}, {"text": "He demonstrates that Roosevelt was ultimately more of a storyteller than a prosecutor.", "isCorrect": false, "rationale": "The analysis describes Mencken's role as both prosecutor and storyteller, not Roosevelt's."}, {"text": "He uses hard consonants to prove that Roosevelt was a man of action rather than words.", "isCorrect": false, "rationale": "The hard consonants are used to create a specific soundscape for the prose, not to characterize Roosevelt's physical actions."}], "id": "q09"}, {"question": "Mencken applies the term 'recusant' to reformers who have done what?", "options": [{"text": "Refused to pay taxes to a corrupt democratic government.", "isCorrect": false, "rationale": "Mencken's use of the word is metaphorical and refers to convictions, not literal tax resistance."}, {"text": "Successfully navigated the system without losing their integrity.", "isCorrect": false, "rationale": "The term is used for those who have 'recused' themselves from their convictions, implying a loss of integrity."}, {"text": "Abandoned their own principles to adapt to the political environment.", "isCorrect": true, "rationale": "Mencken uses 'recusant' to describe those who 'recuse' themselves from their convictions once in office."}, {"text": "Refused to enter the political 'arena' due to moral objections.", "isCorrect": false, "rationale": "The term is applied to those already in the system who fail to stick to their original principles."}], "id": "q10"}, {"question": "Mencken describes the Prohibition oath as presenting the officeholder with two options: 'He may say so and do it, which makes him a liar, or he may say so and not do it, which makes him a pig.' What logical structure is this and what does it demonstrate?", "options": [{"text": "A false dilemma — Mencken deliberately ignores the third option of refusing to take the oath.", "isCorrect": false, "rationale": "Refusing the oath means leaving office, which is precisely Mencken's point: the system structurally eliminates the person of integrity rather than offering them a clean path."}, {"text": "A true dilemma in which every available option degrades the officeholder, proving the system itself is the problem.", "isCorrect": true, "rationale": "Mencken constructs a genuine horns-of-a-dilemma argument: the oath forces a choice between lying and cruel heartlessness. Since there is no honorable exit within the system, the system — not the individual — is condemned."}, {"text": "A syllogism in which the minor premise (Prohibition) supplies the moral standard by which the officeholder is judged.", "isCorrect": false, "rationale": "The structure is not syllogistic; it is a fork that presents only degrading options. Mencken does not accept Prohibition's moral standard — he uses the dilemma to satirize it."}, {"text": "An example of reductio ad absurdum in which the logical conclusion of Prohibition law is shown to be an absurdity.", "isCorrect": false, "rationale": "While the oath is absurd, the primary rhetorical structure here is the dilemma (fork), not reductio ad absurdum, which would require taking the premise to its logical extreme to reveal a contradiction."}], "id": "q11"}, {"question": "Mencken contrasts the American and English judiciaries. What specific mechanism does he identify that protects English jurisprudence from the 'duffers and scoundrels' who fill American courts?", "options": [{"text": "England's use of popular elections ensures only the most widely respected lawyers reach the bench.", "isCorrect": false, "rationale": "Mencken's entire critique of American courts is that popular election gives the 'shyster' every advantage. England does not elect its judges."}, {"text": "England's governing oligarchy 'keeps jealous guard' over the judiciary, blocking ignoramuses and guaranteeing minimum competence.", "isCorrect": true, "rationale": "Mencken argues that England's lingering aristocratic oligarchy, acting in class self-interest, inadvertently ensures judicial quality by refusing to elevate incompetents — 'genuine talent may get in, but not imbecility.'"}, {"text": "England's Bar examination is far more rigorous than the American bar, filtering out unqualified candidates.", "isCorrect": false, "rationale": "Mencken does not mention examination standards; his explanation is explicitly political — the oligarchy's class interest, not a professional licensing system."}, {"text": "England's tradition of judicial lifetime tenure insulates judges from political pressure once appointed.", "isCorrect": false, "rationale": "Mencken does not argue that lifetime tenure is England's advantage; the advantage he identifies is in the appointment process itself, controlled by the oligarchy."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
