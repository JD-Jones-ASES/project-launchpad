<script>
var QUESTIONS = [{"question": "According to Mencken, what serves as the 'corner-stone' of the science of mob psychology practiced by demagogues?", "options": [{"text": "The cultivation of national pride", "isCorrect": false, "rationale": "While pride may be a tool, the text explicitly identifies fear as the 'chiefest' tool and the foundational element of democratic politics."}, {"text": "The exploitation of popular fear", "isCorrect": true, "rationale": "Mencken asserts that fear is the primary tool used by demagogues and that democratic politics consists almost entirely of chasing 'bugaboos'."}, {"text": "The promise of economic prosperity", "isCorrect": false, "rationale": "Mencken suggests that constructive or technical programs, like economic reform, often fail because they lack the emotional punch of fear-based rhetoric."}, {"text": "The appeal to reasoned civil discourse", "isCorrect": false, "rationale": "The text defines the demagogue as one who appeals to desires and prejudices rather than reasoned argument."}], "id": "q01"}, {"question": "Why does Mencken argue that democratic states tend to select 'colourless mediocrities' for leadership instead of people of 'genuine imagination'?", "options": [{"text": "Mediocrities are better at navigating complex technical programs.", "isCorrect": false, "rationale": "The text suggests that technical programs are actually a 'capital defect' in democratic politics because they are unintelligible to the mob."}, {"text": "Mediocrities are less likely to be perceived as frightening by the mob.", "isCorrect": true, "rationale": "Mencken explains that imaginative statesmen are 'shining marks' for demagogues, whereas mediocrities are preferred because the mob finds it impossible to fear them."}, {"text": "The mob prefers leaders who share their own lack of intelligence.", "isCorrect": false, "rationale": "While Mencken views the mob as unintelligent, the specific reason given for choosing mediocrities is the absence of fear."}, {"text": "Mediocrities are more skilled at discovering new 'bugaboos' to chase.", "isCorrect": false, "rationale": "The discovery of 'bugaboos' is the work of the demagogue; mediocrities are simply the safe alternatives who escape the mob's suspicion."}], "id": "q02"}, {"question": "According to the text, what was the 'incredible folly' that led to William Jennings Bryan's defeat in the election of 1896?", "options": [{"text": "His reliance on the 'Cross of Gold' speech to gain the nomination.", "isCorrect": false, "rationale": "Mencken notes that the speech was actually what successfully 'nominated him' in the first place."}, {"text": "His decision to focus solely on the 'bugaboo' of plutocracy.", "isCorrect": false, "rationale": "The text suggests that if he had stuck to this 'chase,' he probably would have been elected."}, {"text": "His attempt to advocate for a constructive, technical program.", "isCorrect": true, "rationale": "Mencken argues that the complexity of his program made it seem 'sinister' and unintelligible to the mob, allowing opponents to alarm voters against him."}, {"text": "His lack of understanding regarding mob psychology.", "isCorrect": false, "rationale": "Bryan is described as a 'true son of the mob,' implying he shared their nature, but his mistake was the content of his platform, not a lack of shared psychology."}], "id": "q03"}, {"question": "In Mencken's analysis of the United States' entry into the World War, what was the primary obstacle demagogues faced in 1915?", "options": [{"text": "A widespread sense of moral obligation to remain neutral.", "isCorrect": false, "rationale": "The text focuses on the emotion of fear, not a philosophical or moral commitment to neutrality."}, {"text": "The mob's initial fear of personal danger and being harmed.", "isCorrect": true, "rationale": "The text states the mob was 'eager only to keep out of danger,' as exemplified by the popularity of the song 'I Didn't Raise My Boy to be a Soldier.'"}, {"text": "The overwhelming popularity of German-American 'hyphenates.'", "isCorrect": false, "rationale": "While 'hyphenates' are mentioned as a later 'bugaboo,' they were not the primary obstacle to entering the war."}, {"text": "A lack of official agencies capable of spreading propaganda.", "isCorrect": false, "rationale": "Mencken notes that 'every official agency lent a hand' once the decision to move toward war was made after the 1916 election."}], "id": "q04"}, {"question": "How did the U.S. government effectively 'reconcile the mob' to entering the World War, according to Mencken?", "options": [{"text": "By emphasizing the economic benefits of a prospective victory.", "isCorrect": false, "rationale": "Mencken argues that political success in a democracy comes from fear, not the promise of constructive gain."}, {"text": "By convincing the public that Germany could not possibly win.", "isCorrect": false, "rationale": "The strategy was actually to heighten the fear of a German victory and its subsequent revenge."}, {"text": "By substituting a new, greater fear for the existing fear of danger.", "isCorrect": true, "rationale": "The government replaced the fear of going to war with a more terrifying fear of a vengeful, victorious Germany seeking accounting for violated neutrality."}, {"text": "By appealing to the mob's altruistic desire to spread democracy.", "isCorrect": false, "rationale": "Mencken suggests the 'heroic mood' and 'altruistic eagerness' were later developments, essentially masks for underlying cowardice."}], "id": "q05"}, {"question": "What role does Mencken attribute to the military draft in the psychological shift of the American public during the war?", "options": [{"text": "It instilled a genuine sense of duty and sacrifice in the citizenry.", "isCorrect": false, "rationale": "Mencken is cynical about the public's motives, viewing their 'heroic mood' as a result of being personally safe from service."}, {"text": "It made individuals bold by ensuring that the majority would not have to serve.", "isCorrect": true, "rationale": "The text argues that when 'John Doe' realized he was exempt, he developed an 'altruistic eagerness' for others to attack."}, {"text": "It created a 'state of siege' that forced the people to fight for survival.", "isCorrect": false, "rationale": "Mencken claims the 'state of siege' was a psychological condition of terror, not a physical necessity created by the draft."}, {"text": "It reduced the fear of German agents and industrial accidents.", "isCorrect": false, "rationale": "The draft affected the attitude toward active hostilities, whereas the Department of Justice was responsible for the fear of internal agents."}], "id": "q06"}, {"question": "Mencken describes the statesman in a democracy as a 'glorified smeller and snooper.' What is the primary function of this role?", "options": [{"text": "Detecting and exposing actual threats to national security.", "isCorrect": false, "rationale": "The text argues that the 'monsters' pursued by these statesmen are usually 'imaginary' or 'bugaboos'."}, {"text": "Seeking out and hunting down manufactured social or political 'monsters'.", "isCorrect": true, "rationale": "Mencken posits that the statesman's job is to discover and 'scotch' sources of alarm to keep the mob in a state of pursuit."}, {"text": "Analyzing the complex socioeconomic causes of public unrest.", "isCorrect": false, "rationale": "Mencken believes democratic politics avoids complex analysis in favor of melodramatic emotional manipulation."}, {"text": "Acting as a neutral arbiter between conflicting interest groups.", "isCorrect": false, "rationale": "The text describes the statesman as a 'witch-hunter,' which is a highly active and partisan role based on fear."}], "id": "q07"}, {"question": "Why did Bryan's focus on the 'evolutionary hypothesis' fail to save his reputation in his final days, according to Mencken?", "options": [{"text": "The mob was inherently supportive of scientific advancement.", "isCorrect": false, "rationale": "Mencken describes the mob as unintelligent and the issue as being 'beyond the comprehension' of the people."}, {"text": "He allowed his opponents to seize the offensive and make him the subject of pursuit.", "isCorrect": true, "rationale": "The text notes that even though the issue was well-adapted to fear, Bryan lost the offensive and ended up being laughed at."}, {"text": "The issue was too simple to arouse the necessary amount of fear.", "isCorrect": false, "rationale": "Mencken states the issue was 'well adapted to arousing its [the mob's] fears' precisely because it was incomprehensible."}, {"text": "He attempted to turn the hypothesis into a constructive legislative program.", "isCorrect": false, "rationale": "There is no mention of a legislative program regarding evolution; the failure was a tactical one in the 'battle' of mob psychology."}], "id": "q08"}, {"question": "Mencken observes that the 'plain people' under democracy never vote *for* anything. What do they vote for instead?", "options": [{"text": "They vote for the candidate who promises the most stability.", "isCorrect": false, "rationale": "Stability is a positive goal; Mencken argues that democratic voting is fundamentally reactive and negative."}, {"text": "They always vote against something.", "isCorrect": true, "rationale": "The text explicitly states that people in a democracy vote 'always against something,' which explains the focus on hunting 'monsters'."}, {"text": "They vote to maintain the status quo against any change.", "isCorrect": false, "rationale": "While they might fear change, the act of voting is described as a 'chase' of a bugaboo, which is more active than merely maintaining the status quo."}, {"text": "They vote for the demagogue who most resembles themselves.", "isCorrect": false, "rationale": "While they might prefer mediocrities, the text emphasizes the negative motivation (fear/antagonism) of the vote itself."}], "id": "q09"}, {"question": "Which of the following does Mencken characterize as a 'fraudulent promise' made by Woodrow Wilson?", "options": [{"text": "The promise to reduce the power of Wall Street and the trusts.", "isCorrect": false, "rationale": "While these were 'bugaboos,' they are not the specific fraudulent promise Mencken highlights regarding Wilson's re-election."}, {"text": "The promise to preserve American boys from the harm of war.", "isCorrect": true, "rationale": "Mencken refers to Wilson's 1916 re-election as being based on a 'fraudulent promise to preserve that boy from harm.'"}, {"text": "The promise that the draft would only apply to a small minority.", "isCorrect": false, "rationale": "The draft is described as an 'ingenious device' that followed the election, not a promise made during it."}, {"text": "The promise to achieve a total German surrender through munitions only.", "isCorrect": false, "rationale": "The text states that people *favored* only contributing munitions initially, but Wilson's campaign promise was specifically about keeping soldiers out of the conflict."}], "id": "q10"}, {"question": "The analysis formally defines 'register mixing' as a key concept in this section. When Mencken calls the process of manufacturing war hysteria 'converting reluctant acquiescence into enthusiasm,' what register collision is at work?", "options": [{"text": "Clinical management language ('converting,' 'problem') is applied to the morally outrageous act of engineering mass panic, making the atrocity more damning through understatement.", "isCorrect": true, "rationale": "The analysis notes that the deadpan, managerial register — treating propaganda as a routine administrative 'problem' — makes the indictment sharper than explicit outrage would, because it strips away all moral emotion."}, {"text": "The elevated vocabulary of diplomacy is undercut by a single colloquial insult, producing a comic deflation.", "isCorrect": false, "rationale": "There is no colloquial word inserted here; the register collision is between bureaucratic neutrality and moral horror, not between formal and street-level language."}, {"text": "Scientific terminology from behaviorism is applied to a political event, lending false academic authority to Mencken's argument.", "isCorrect": false, "rationale": "The language here is managerial rather than scientific; the technique is deadpan irony rather than mock-scientific credentialing."}, {"text": "A word from the barnyard is inserted into a sentence of diplomatic prose to ridicule the diplomats involved.", "isCorrect": false, "rationale": "This describes Mencken's typical register-mix technique, but this particular passage operates through administrative neutrality rather than barnyard vocabulary."}], "id": "q11"}, {"question": "The analysis identifies the 'Fe, Fi, Fo, Fum!' allusion as a figure that 'completes the deflation' of democratic statesmanship. What is the precise mechanism by which this fairy-tale reference achieves its effect?", "options": [{"text": "By recasting the nation's most powerful officials as characters from a children's story, it implies that their quarry (political threats) is as imaginary as a fairy-tale giant — and that they are as pre-rational as the audience for such tales.", "isCorrect": true, "rationale": "The allusion to Jack and the Beanstalk reduces both the statesman (to a giant-hunter) and the threat (to a fairy-tale monster), implying that democratic man's political instincts are pre-modern and childlike."}, {"text": "It uses a familiar cultural reference to establish rapport with readers who remember the story from childhood.", "isCorrect": false, "rationale": "While recognition is part of the effect, the primary function is deflation and contempt, not warmth or shared nostalgia."}, {"text": "It introduces the extended metaphor of the 'witch-hunt' as a counterpoint to the scientific register of behaviorism.", "isCorrect": false, "rationale": "The witch-hunt metaphor precedes this allusion; 'Fe, Fi, Fo, Fum!' reinforces it through a specific cultural referent rather than introducing it."}, {"text": "It functions as a rhetorical question, implicitly asking the reader whether democratic politics is really as childish as a nursery rhyme.", "isCorrect": false, "rationale": "It is not a question but a direct quotation placed in the mouth of the statesman — the attribution itself is the insult."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
