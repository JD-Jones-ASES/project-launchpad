    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 22, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Mencken, what underlying maxim governs democratic law when influenced by fanaticism?", "options": [{"text": "Every citizen is inherently a traitor, a libertine, and a scoundrel.", "isCorrect": true, "rationale": "Mencken asserts that under the pressure of fanaticism, the law presumes the citizen's natural state is one of criminality or evil-doing to justify the expansion of police power."}, {"text": "The rights of the individual are paramount to the security of the state.", "isCorrect": false, "rationale": "This reflects an idealist or 'Father of the Constitution' perspective that Mencken argues is ignored in the practical application of democratic law."}, {"text": "Justice is best served through the impartial application of the Common Law.", "isCorrect": false, "rationale": "Mencken explicitly states that the ancient rules of Common Law are suspended in cases of political or religious heresy."}, {"text": "Public safety is secondary to the preservation of the Bill of Rights.", "isCorrect": false, "rationale": "The text suggests that speaking boldly for the Bill of Rights is actually the easiest way to be targeted by the police and the mob."}], "id": "q01"}, {"question": "Why does Mencken characterize the career path of American judges as problematic for the 'mill of justice'?", "options": [{"text": "Judges are often appointed based on their lack of intellectual resilience.", "isCorrect": false, "rationale": "While Mencken mentions 'lack of intellectual resilience,' he applies this specific trait to the jurors, not the judges."}, {"text": "Former prosecuting attorneys carry a bias that assumes the accused is naturally guilty.", "isCorrect": true, "rationale": "Mencken argues that because many judges were once prosecutors, they retain a mindset of ferocity and an assumption of guilt toward defendants."}, {"text": "The judicial branch has become an 'oriental monarchy' immune to legislative oversight.", "isCorrect": false, "rationale": "Mencken compares the 'police power' to oriental monarchies, rather than the career structure or oversight of the judiciary itself."}, {"text": "Judicial promotion is strictly tied to the academic study of constitutional guarantees.", "isCorrect": false, "rationale": "Mencken claims that promotion is actually tied to the 'ferocity' of attack displayed during one's time as a prosecutor."}], "id": "q02"}, {"question": "Which specific constitutional safeguard does Mencken claim is explicitly destroyed by the Volstead Act?", "options": [{"text": "The right to bear arms.", "isCorrect": false, "rationale": "The text does not mention the Second Amendment in relation to the Volstead Act or sumptuary laws."}, {"text": "Protection against cruel and unusual punishment.", "isCorrect": false, "rationale": "While Mencken mentions 'staggering penalties,' he does not link the Volstead Act specifically to the suspension of the Eighth Amendment."}, {"text": "The right to a trial by jury.", "isCorrect": true, "rationale": "Mencken explicitly identifies the Volstead Act as a piece of legislation that destroys the constitutional right to a jury trial in its administration."}, {"text": "The privilege of the writ of habeas corpus.", "isCorrect": false, "rationale": "The text focuses on search and seizure, double jeopardy, and jury trials rather than the suspension of habeas corpus."}], "id": "q03"}, {"question": "How does Mencken distinguish the treatment of 'the man of influence' from that of the 'man in an unpopular minority'?", "options": [{"text": "Influential men are subjected to more rigorous 'inquisitorial' statutes to set a public example.", "isCorrect": false, "rationale": "Mencken argues the opposite: that the 'show' and persecution are reserved for those without political cover."}, {"text": "Hypocrites and political supporters are rarely molested by the expanded police power.", "isCorrect": true, "rationale": "Mencken notes that those who support 'prevailing delusions' or have political influence are exempt from the 'awful powers' used against heretics."}, {"text": "Both groups are equally targeted by the mob to ensure a truly democratic distribution of justice.", "isCorrect": false, "rationale": "The text emphasizes that these powers are not exercised against all citizens, but are weaponized specifically against the unpopular."}, {"text": "The man of influence is protected by his strict adherence to the Common Law.", "isCorrect": false, "rationale": "Mencken suggests their protection comes from hypocrisy and political alignment rather than legal merit."}], "id": "q04"}, {"question": "What was the significance of Bishop Luther B. Wilson’s sermon regarding atheism, according to the text?", "options": [{"text": "It was a rare defense of the Bill of Rights from a religious perspective.", "isCorrect": false, "rationale": "Wilson's sermon actually argued for the suppression of rights for certain groups, which Mencken calls 'bloodthirsty.'"}, {"text": "It argued that atheists should be immune to constitutional protections of free speech.", "isCorrect": true, "rationale": "Wilson claimed atheism is a 'traitor' to the state and does not deserve the defense of constitutional guarantees."}, {"text": "It provided a theological basis for the separation of church and state.", "isCorrect": false, "rationale": "The sermon was a 'passionate plea for the putting down of heresy' regardless of the Constitution, which is the opposite of separation."}, {"text": "It was widely condemned by Liberal weeklies as a violation of the First Amendment.", "isCorrect": false, "rationale": "Mencken notes with irony that even the Liberal weeklies let the 'astounding dictum' pass without challenge."}], "id": "q05"}, {"question": "Mencken defines 'common decency' as which of the following?", "options": [{"text": "Strict adherence to the letter of the law and the Puritan ethic.", "isCorrect": false, "rationale": "Mencken contrasts 'common decency' with the 'harsh Puritan compulsion' to follow the letter of the law."}, {"text": "The habit of viewing the acts and ideas of others with tolerance and charity.", "isCorrect": true, "rationale": "Mencken defines common decency as the individual habit of tolerance that makes one a reliable friend and a good citizen."}, {"text": "The collective effort of the mob to enforce moral purity on the community.", "isCorrect": false, "rationale": "Mencken views the mob's enforcement of purity as the 'disaster' that destroys common decency."}, {"text": "A commitment to distributive justice and the democratic epistemology.", "isCorrect": false, "rationale": "Mencken explicitly states that the 'democrat' falls short of common decency because of their 'democratic epistemology.'"}], "id": "q06"}, {"question": "According to the text, why do regions like New England and parts of the South experience 'cultural collapse'?", "options": [{"text": "Because they lack the material prosperity found in more urbanized centers.", "isCorrect": false, "rationale": "Mencken states that American life is marked by 'great material prosperity,' so economic lack is not the cause he cites."}, {"text": "Because the 'Puritan ethic' is too lenient, leading to a breakdown of social order.", "isCorrect": false, "rationale": "He argues the opposite: the ethic is too violent and oppressive, driving people away."}, {"text": "Because self-respecting men are driven out by the 'depressing violence' and lack of decency from the surrounding 'morons.'", "isCorrect": true, "rationale": "Mencken argues that men of 'sound sense' feel unsafe and harassed by their neighbors, leading them to abandon these regions."}, {"text": "Because they have abandoned the democratic ideals of the Founding Fathers.", "isCorrect": false, "rationale": "The text suggests that it is the 'democratic' impulse of the mob itself that causes the collapse, not a lack of it."}], "id": "q07"}, {"question": "What does Mencken identify as the primary reason Americans are 'the least happy in Christendom'?", "options": [{"text": "A lack of technological advancement and personal mobility.", "isCorrect": false, "rationale": "Mencken notes that Americans have 'a Ford in his garage' and money, suggesting technology and mobility are present."}, {"text": "A pervasive lack of mutual trust caused by neighbors 'watching through knotholes.'", "isCorrect": true, "rationale": "Mencken argues that without trust, there can be no ease or happiness, and Puritanism makes everyone a suspicious guardian of their neighbor's sins."}, {"text": "The excessive influence of 'romantic fanatics' who read the Founding Fathers too literally.", "isCorrect": false, "rationale": "While he mentions these fanatics, he views them as harmless/ineffectual outliers rather than the cause of general unhappiness."}, {"text": "The failure of the American legal system to provide adequate jury trials.", "isCorrect": false, "rationale": "While he critiques the legal system, he traces the root of unhappiness to the social inability to be magnanimous and trusting."}], "id": "q08"}, {"question": "In the case of Eugene Debs, how does Mencken illustrate the failure of the 'perfect Puritan'?", "options": [{"text": "By highlighting the decision to ignore the letter of the law in favor of mercy.", "isCorrect": false, "rationale": "The text states the 'impulse to be magnanimous' was overcome by the compulsion to observe the law's letter."}, {"text": "By showing that Dr. Wilson lacked the legal expertise to interpret the Constitution.", "isCorrect": false, "rationale": "Mencken actually calls every Puritan a 'lawyer,' implying they are overly focused on legalisms."}, {"text": "By demonstrating the inability to be magnanimous or to forgive a 'harmless old man.'", "isCorrect": true, "rationale": "Mencken uses the Debs case to show how Puritanism prioritizes the 'harsh compulsion' of the law over 'common decency' and kindness."}, {"text": "By proving that Debs was a 'traitor' who deserved no constitutional immunity.", "isCorrect": false, "rationale": "Mencken describes Debs as 'poor old silly' and 'misguided,' suggesting the punishment was unnecessary and un-magnanimous."}], "id": "q09"}, {"question": "How does Mencken describe the 'progress' of a prisoner through the 'mill of justice' once they are singled out?", "options": [{"text": "They are immediately charged with high treason to ensure a speedy trial.", "isCorrect": false, "rationale": "Mencken states the process begins with 'vague' accusations rather than immediate high-level charges."}, {"text": "They are typically acquitted due to the 'extravagance of attack' by prosecuting attorneys.", "isCorrect": false, "rationale": "The text says the 'extravagance of attack' leads to the prosecutor's promotion, not the prisoner's acquittal."}, {"text": "They start with vague charges like 'disorderly conduct' and end with crimes carrying 'staggering penalties.'", "isCorrect": true, "rationale": "Mencken describes a process of 'diligent search' for any law to apply, starting small and escalating to heavy charges once a 'heretic' is targeted."}, {"text": "They are protected by the higher courts, which interfere with unconstitutional 'newer statutes.'", "isCorrect": false, "rationale": "Mencken notes that the higher courts have *not* interfered with the execution of these plainly unconstitutional statutes."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
