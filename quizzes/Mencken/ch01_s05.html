<script>
var QUESTIONS = [{"question": "According to the introduction, what is the primary purpose of this book's approach to reading H.L. Mencken's *Notes on Democracy*?", "options": [{"text": "To evaluate the historical accuracy of Mencken's claims about democratic government.", "isCorrect": false, "rationale": "The text explicitly states, 'Our purpose is not to judge whether Mencken is right' regarding his views on democracy, but rather to analyze his writing style."}, {"text": "To understand the techniques and strategies Mencken employs to construct his arguments through language.", "isCorrect": true, "rationale": "The introduction clarifies, 'This book is not primarily about what Mencken thinks. It is about how he writes,' emphasizing the analysis of his linguistic and rhetorical construction."}, {"text": "To memorize Mencken's most famous quotes and apply them in modern political discourse.", "isCorrect": false, "rationale": "While quotes may be used as examples, the book's focus is on analytical skills, not rote memorization for direct application, and the goal is to understand how he writes, not just his content."}, {"text": "To compare Mencken's democratic critique with other historical attacks on democratic systems.", "isCorrect": false, "rationale": "The book focuses exclusively on a close reading of Mencken's *Notes on Democracy* to understand his writing, not to conduct a comparative study of historical critiques."}], "id": "q01"}, {"question": "The skills developed from closely reading Mencken's persuasive prose are primarily transferable to which type of future reading?", "options": [{"text": "Advanced scientific journals and technical manuals.", "isCorrect": false, "rationale": "While valuable, the text specifies the skills are for 'persuasive prose,' which typically does not include scientific journals or technical manuals that focus on factual information rather than persuasion."}, {"text": "Any form of persuasive communication, including editorials, speeches, and advertisements.", "isCorrect": true, "rationale": "The text directly states these skills will make you 'a better reader of any persuasive prose: editorials, speeches, essays, sermons, advertisements, political campaigns, and the daily flood of rhetoric.'"}, {"text": "Classic works of fiction and poetry for literary appreciation.", "isCorrect": false, "rationale": "The focus is on 'persuasive prose' and 'rhetoric,' which differs from the primary analytical goals for most fiction and poetry, although some overlap in literary analysis exists."}, {"text": "Historical documents and archival records for factual research.", "isCorrect": false, "rationale": "The book emphasizes understanding *how* arguments are built through language, which is distinct from the primary goal of extracting factual information from historical records."}], "id": "q02"}, {"question": "Which component of the analytical framework represents the culmination of the analysis, synthesizing all previous elements to examine a specific passage in depth?", "options": [{"text": "Rhetorical Context", "isCorrect": false, "rationale": "Rhetorical Context is an initial step, providing the 'wide-angle context,' not the final synthesis of all elements."}, {"text": "Diction and Vocabulary", "isCorrect": false, "rationale": "Diction and Vocabulary is one specific element of analysis, not the overarching step where all elements are brought together."}, {"text": "Close Reading", "isCorrect": true, "rationale": "The text describes Close Reading as 'One sentence or short paragraph examined in full depth, with all the previous elements working together. This is where the analysis pays off.'"}, {"text": "Figures of Speech", "isCorrect": false, "rationale": "Figures of Speech is another specific analytical element, examining rhetorical devices, but it's not the final, comprehensive synthesis."}], "id": "q03"}, {"question": "Mencken's prose is noted for being 'saturated with verbal irony.' Which of the following statements best illustrates verbal irony as defined in the text?", "options": [{"text": "A fire station burns down due to a faulty electrical system.", "isCorrect": false, "rationale": "This is an example of situational irony, where an unexpected outcome occurs, not verbal irony which involves a gap between what is said and meant."}, {"text": "A student exclaims, 'That exam was a breeze!' after failing it miserably.", "isCorrect": true, "rationale": "This is a clear example of verbal irony, where the student says one thing ('a breeze') but means the opposite (it was difficult and they failed), much like Mencken praising what he despises."}, {"text": "A character is unaware of a crucial piece of information known to the audience.", "isCorrect": false, "rationale": "This describes dramatic irony, where the audience possesses more information than a character, which is distinct from verbal irony."}, {"text": "A speaker uses overly complex vocabulary to impress their audience.", "isCorrect": false, "rationale": "This relates to diction or register but does not inherently involve saying one thing while meaning the opposite; it's a stylistic choice, not irony."}], "id": "q04"}, {"question": "A writer wishes to deliver a powerful, memorable conclusion by building suspense and withholding the main point until the very end. Which rhetorical sentence structure would be most effective for this purpose, according to the text?", "options": [{"text": "Cumulative Sentence", "isCorrect": false, "rationale": "A cumulative sentence states its main idea first, then adds details, which is the opposite of withholding the main idea for suspense."}, {"text": "Antithesis", "isCorrect": false, "rationale": "Antithesis involves placing contrasting ideas in parallel structures to sharpen an argument, not specifically to build suspense by withholding a main idea until the end."}, {"text": "Periodic Sentence", "isCorrect": true, "rationale": "A periodic sentence 'withholds its main idea until the end, building suspense through subordinate clauses and modifying phrases,' making its conclusion hit 'with the force of delayed impact.'"}, {"text": "Simple Sentence", "isCorrect": false, "rationale": "A simple sentence typically contains one independent clause and does not inherently build suspense or delay its main point through elaborate construction."}], "id": "q05"}, {"question": "Mencken is described as a master of 'register mixing.' Which scenario best exemplifies this technique?", "options": [{"text": "Using only highly formal, academic language throughout an entire essay to establish authority.", "isCorrect": false, "rationale": "This demonstrates a consistent, elevated register, but not 'register mixing,' which involves combining different levels of formality."}, {"text": "Writing an entire piece in casual, colloquial language to connect with a broad audience.", "isCorrect": false, "rationale": "Similar to consistently formal language, this represents a consistent, informal register, not the 'mixing' of registers."}, {"text": "Inserting a piece of scholarly Latin into a street-level attack or a slang word into a formal sentence.", "isCorrect": true, "rationale": "The text directly states, 'Mencken's signature technique is register mixing: dropping a slang word into a formal sentence, or inserting a piece of scholarly Latin into a street-level attack.'"}, {"text": "Employing only abstract nouns to discuss philosophical concepts without concrete examples.", "isCorrect": false, "rationale": "This relates to diction (abstract vs. concrete) but not specifically to the mixing of formal and informal levels of language, which is the essence of register mixing."}], "id": "q06"}, {"question": "When the text states that figures of speech 'are not ornaments added to an argument; in skilled hands, they are the argument,' what is it primarily emphasizing about their role?", "options": [{"text": "Figures of speech are primarily used to decorate prose and make it more aesthetically pleasing.", "isCorrect": false, "rationale": "The statement directly contradicts this by saying figures of speech 'are not ornaments,' implying their purpose goes beyond mere decoration."}, {"text": "Their main function is to obscure the literal meaning of a text, making it more challenging for the reader.", "isCorrect": false, "rationale": "While figures of speech depart from literal meaning, their purpose in skilled hands is to serve the argument, not to intentionally confuse or obscure."}, {"text": "They are fundamental to the construction and conveyance of the argument's meaning and force.", "isCorrect": true, "rationale": "By stating 'they are the argument,' the text highlights that figures of speech are integral, essential components that actively shape and deliver the persuasive message, rather than superficial additions."}, {"text": "They serve primarily as mnemonic devices to help readers remember key points.", "isCorrect": false, "rationale": "The text does not mention mnemonic function as their primary role; it focuses on their argumentative and rhetorical power."}], "id": "q07"}, {"question": "A student analyzing Mencken's word choice (diction) would not only identify whether words are formal or informal but also ask what crucial question, according to the text?", "options": [{"text": "How many times each specific word appears in the passage.", "isCorrect": false, "rationale": "While word frequency can be part of textual analysis, the text specifies a deeper question for diction: 'why those words rather than others.'"}, {"text": "If the words are commonly used in modern dictionaries.", "isCorrect": false, "rationale": "This question is irrelevant to the analytical purpose outlined for diction, which focuses on effect and choice, not dictionary inclusion."}, {"text": "Why those particular words were chosen by the writer instead of alternative options.", "isCorrect": true, "rationale": "The definition of diction states, 'Analyzing diction means asking not just what words a writer uses, but why those words rather than others.'"}, {"text": "Whether the words are pronounceable by an average reader.", "isCorrect": false, "rationale": "Pronounceability is not mentioned as a key aspect of diction analysis in the provided text; the focus is on effect and choice."}], "id": "q08"}, {"question": "The words 'childish' and 'youthful' both literally refer to qualities of young people, but 'childish' often implies immaturity, while 'youthful' implies vigor. This difference in implied meaning is best understood as a distinction in their:", "options": [{"text": "Denotation", "isCorrect": false, "rationale": "Denotation refers to the literal, dictionary definition, which for both words is related to youth. The difference lies beyond this literal meaning."}, {"text": "Hyperbole", "isCorrect": false, "rationale": "Hyperbole is deliberate exaggeration for effect. The difference between 'childish' and 'youthful' is about emotional association, not exaggeration."}, {"text": "Connotation", "isCorrect": true, "rationale": "Connotation refers to 'The emotional associations a word carries beyond its literal meaning.' The differing feelings evoked by 'childish' and 'youthful' are precisely these emotional associations."}, {"text": "Antithesis", "isCorrect": false, "rationale": "Antithesis involves contrasting ideas in parallel grammatical structures. This example focuses on the intrinsic meaning of individual words, not structural contrast."}], "id": "q09"}, {"question": "A student analyzing a Mencken passage notes how the author begins a sentence with a clear main idea and then adds a series of descriptive phrases and clauses, piling up details to elaborate on that initial statement. Which element of the analytical framework and which rhetorical term are most directly being observed?", "options": [{"text": "Rhetorical Context; specifically, Irony", "isCorrect": false, "rationale": "Rhetorical Context deals with audience and purpose, not sentence structure. Irony is a figure of speech, not a sentence structure that describes this specific pattern."}, {"text": "Voice and Tone; specifically, Hyperbole", "isCorrect": false, "rationale": "Voice and Tone relate to persona and attitude. Hyperbole is exaggeration, not the specific structural pattern described for sentence building."}, {"text": "Syntax and Rhythm; specifically, Cumulative Sentence", "isCorrect": true, "rationale": "The description perfectly matches 'Syntax and Rhythm' (how sentences are built) and the definition of a 'Cumulative Sentence' (main idea first, then adding detail through modifying phrases and clauses to pile up evidence)."}, {"text": "Diction and Vocabulary; specifically, Register", "isCorrect": false, "rationale": "Diction and Vocabulary deal with word choice. Register refers to formality levels. Neither directly describes the structural pattern of beginning with a main idea and then adding details."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
