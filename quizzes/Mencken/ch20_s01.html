        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to the analysis of Mencken's rhetorical strategy, what is the primary structural function of Part III in 'Notes on Democracy'?", "options": [{"text": "It transitions from a diagnosis of the democratic political system to an examination of its foundational principles.", "isCorrect": true, "rationale": "The source identifies Part III as a 'structural pivot' where Mencken moves from anatomizing the citizen and state to putting democratic ideals like liberty and peace on trial."}, {"text": "It provides a historical account of the evolution of democratic institutions from the time of the Greeks.", "isCorrect": false, "rationale": "While Mencken uses historical references, the text emphasizes a shift from institutional analysis to a critique of ideals."}, {"text": "It shifts the focus from the 'superior man' to a sympathetic portrayal of the common man's struggles.", "isCorrect": false, "rationale": "Mencken remains critical of the common man, characterizing his desire for safety over liberty as a lack of courage."}, {"text": "It moves from a tone of savage amusement to a more objective, academic evaluation of political science.", "isCorrect": false, "rationale": "The text actually notes that the tone shifts toward contempt and 'grotesque comedy' rather than academic objectivity."}]}, {"question": "Mencken's persona in this section is described as a 'weary diagnostician.' What does this imply about his rhetorical stance?", "options": [{"text": "He is an angry reformer seeking to revolutionize the democratic process through active engagement.", "isCorrect": false, "rationale": "The text explicitly states his tone is not angry but resigned, reflecting a person who considers the case already closed."}, {"text": "He approaches the subject with the clinical authority of a physician who is no longer surprised by the symptoms of a terminal disease.", "isCorrect": true, "rationale": "This persona suggests a professional detachment and a sense of resignation toward a predictable and incurable political condition."}, {"text": "He adopts a populist voice to better reach the common man he claims to represent.", "isCorrect": false, "rationale": "Mencken addresses the 'educated skeptic' and seeks to flatter the 'superior' reader rather than the common citizen."}, {"text": "He maintains an optimistic outlook, viewing political failures as minor ailments that are easily cured.", "isCorrect": false, "rationale": "The 'grim professional satisfaction' and description of democracy as liberty's 'most efficient destroyer' contradict an optimistic outlook."}]}, {"question": "How does Mencken utilize the German philosophical concepts of Nietzsche and Schopenhauer in 'The Will to Peace'?", "options": [{"text": "He uses them to construct a complex, high-minded defense of the democratic state's moral foundation.", "isCorrect": false, "rationale": "Mencken uses these concepts to critique democracy, not to defend its moral foundations."}, {"text": "He dismisses these philosophers as irrelevant to the practical realities of American political life.", "isCorrect": false, "rationale": "The analysis states that the influence of Nietzsche and Schopenhauer deeply informed Mencken's thought and provided the philosophical gravity for his opening."}, {"text": "He employs their elevated vocabulary only to immediately deflate it through comparisons to the 'barnyard' and 'circus.'", "isCorrect": true, "rationale": "Mencken juxtaposes the high philosophical register with low, institutional, or animalistic imagery to underscore the undignified nature of democratic reality."}, {"text": "He argues that the common man is the ultimate fulfillment of the Nietzschean 'will to power.'", "isCorrect": false, "rationale": "The text contrasts the 'will-to-power' with the common man's 'will-to-peace,' which is characterized as a desire for safety and herd-like protection."}]}, {"question": "In the 'Penitentiary Analogy,' what specific role does the 'trusty' play in Mencken’s critique of the democratic citizen?", "options": [{"text": "The trusty represents a reformer who maintains his integrity even within a corrupt system.", "isCorrect": false, "rationale": "A trusty is a convict who has given up liberty for privileges, which aligns with Mencken's view of the citizen as a compliant inmate."}, {"text": "The trusty symbolizes a citizen who has achieved true freedom by mastering the rules of society.", "isCorrect": false, "rationale": "The analysis clarifies that the trusty's 'peace' is actually the absence of conflict within confinement, not true freedom."}, {"text": "The trusty signifies a man who has traded his sovereign liberty for safety and small, state-sanctioned privileges.", "isCorrect": true, "rationale": "This comparison illustrates Mencken's point that the common man prefers the 'well-managed' security of a prison over the lonely demands of liberty."}, {"text": "The trusty reflects the 'superior man' who is unjustly imprisoned by the democratic mob.", "isCorrect": false, "rationale": "Mencken applies this analogy to the common man's 'ideal existence,' not the plight of the superior man."}]}, {"question": "Which of the following best describes Mencken's use of 'Apostrophe' as identified in the rhetorical analysis?", "options": [{"text": "He addresses the reader directly to build a sense of camaraderie and shared elitism.", "isCorrect": false, "rationale": "While he targets the 'educated skeptic,' the specific figure of apostrophe mentioned refers to his treatment of liberty."}, {"text": "He treats 'Liberty' as a concrete entity that is cross-examined and found wanting, rather than an abstract ideal.", "isCorrect": true, "rationale": "The analysis explains that Mencken apostrophizes liberty by treating it as a character in a drama or a patient on an examination table."}, {"text": "He invokes the founding fathers as though they were present to witness the decay of their creation.", "isCorrect": false, "rationale": "The text focuses on his address to abstractions like liberty and dignity rather than historical figures."}, {"text": "He uses dramatic invocations such as 'O Liberty!' to show his reverence for the principle.", "isCorrect": false, "rationale": "The analysis explicitly states that Mencken does NOT use the classical 'O Liberty!' but instead maintains clinical detachment."}]}, {"question": "Mencken uses the word **ignominious** to describe the peace craved by the common man. What nuance does this word add to his argument?", "options": [{"text": "It suggests that the peace is rare and highly sought after by those in power.", "isCorrect": false, "rationale": "The word implies shame, which is the opposite of something revered or prestigious."}, {"text": "It implies that safety purchased at the cost of liberty is inherently shameful and degrading.", "isCorrect": true, "rationale": "The 'Wordwatch' section explains that the term carries the weight of public disgrace, emphasizing that the common man's desire is dishonorable."}, {"text": "It indicates that the common man's desire for peace is an inevitable result of democratic laws.", "isCorrect": false, "rationale": "While democracy may facilitate it, the word specifically attacks the *quality* of the peace itself as disgraceful."}, {"text": "It provides a neutral, objective description of the lack of conflict in a state.", "isCorrect": false, "rationale": "Ignominious is a highly evaluative and negative term, inconsistent with neutral description."}]}, {"question": "In the close reading of the sentences: 'The average man doesn't want to be free. He simply wants to be safe,' what is the rhetorical effect of the word **simply**?", "options": [{"text": "It emphasizes the common man's intellectual superiority in choosing safety.", "isCorrect": false, "rationale": "Mencken uses the word to suggest the common man's desire is primitive and modest, which is a critique, not praise."}, {"text": "It acts as a qualifier to suggest that safety is just one of many complex goals the common man pursues.", "isCorrect": false, "rationale": "Mencale uses 'simply' to strip away complexity, framing the desire as singular and intellectually primitive."}, {"text": "It highlights the intellectual modesty and primitive nature of the common man's desires, stripping them of dignity.", "isCorrect": true, "rationale": "The analysis notes the word means both 'merely' and 'in a simple way,' reinforcing Mencken's contempt for the lack of ambition required for freedom."}, {"text": "It suggests that achieving safety is a straightforward process that democracy has perfected.", "isCorrect": false, "rationale": "The focus is on the nature of the *desire* itself being simple/primitive, not the ease of the political process."}]}, {"question": "According to the section on 'Syntax and Rhythm,' what is the purpose of Mencken's use of the **dash** as a mark of enumeration?", "options": [{"text": "To mimic the clinical, objective language of a scientific lab report.", "isCorrect": false, "rationale": "While he is a 'diagnostician,' the dash in enumeration specifically mimics legalistic formatting."}, {"text": "To introduce a humorous anecdote that lightens the mood of his critique.", "isCorrect": false, "rationale": "Mencken's use of the dash is described as building a forensic case or mimicking legal contracts, not for light humor."}, {"text": "To mimic the language of contracts and statutes, reinforcing the idea of liberty as a transactional agreement.", "isCorrect": true, "rationale": "The text explains that the quasi-legal formatting of items (a, b, and c) following a dash reinforces the metaphor of liberty being handled like a commodity."}, {"text": "To represent the fragmented and chaotic thoughts of the democratic mob.", "isCorrect": false, "rationale": "Mencken's syntax is described as 'forensic' and 'balanced,' which is the opposite of chaotic."}]}, {"question": "How does Mencken redefine the term **heresy** in a democratic context?", "options": [{"text": "It refers to an individual's refusal to accept the protection of the state.", "isCorrect": false, "rationale": "While related, the 'Wordwatch' specifically links it to belief and religious-style punishment of dissent."}, {"text": "It is used as a theological defense for the moral authority of the majority.", "isCorrect": false, "rationale": "Mencken uses it to criticize the majority's religious-like intolerance of dissent, not to defend its authority."}, {"text": "It describes political dissent, suggesting that democracy functions as a religion that punishes non-believers.", "isCorrect": true, "rationale": "By borrowing a theological term, Mencken implies that democracy is an orthodox doctrine that views disagreement as a spiritual crime."}, {"text": "It refers to the common man's lack of faith in the 'superior man.'", "isCorrect": false, "rationale": "The term is used for political dissent against the democratic orthodoxy itself."}]}, {"question": "Mencken’s closing paragraph is characterized as a 'grotesque comedy.' What is the primary rhetorical technique used here to achieve this effect?", "options": [{"text": "A series of rapid analogies that deflate dignified offices by equating them with common or buffoonish figures.", "isCorrect": true, "rationale": "The analysis highlights how the King becomes Harding and the Generalissimo becomes Pershing at a Rotary meeting, effectively 'demolishing' democratic dignity."}, {"text": "The use of 'apostrophe' to beg the common man to reconsider his choices.", "isCorrect": false, "rationale": "The closing is described as a 'punchline' of comic deflation, not a sincere plea to the mob."}, {"text": "A return to the sober, philosophical language of Nietzsche to provide a serious conclusion.", "isCorrect": false, "rationale": "The source notes that Mencken shifts *away* from philosophical gravity toward 'grotesque comedy' in the final paragraph."}, {"text": "The use of hyperbole to exaggerate the heroism of the 'superior man' in the face of democracy.", "isCorrect": false, "rationale": "The closing focus is on the deflation of the democratic state's 'buffoons,' not the heroism of the superior man."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
