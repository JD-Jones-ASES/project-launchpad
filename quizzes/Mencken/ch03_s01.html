<script>
var QUESTIONS = [{"question": "According to Mencken, what is his primary contention regarding the 'inferior man' and the theory of democracy?", "options": [{"text": "That the inferior man possesses an innate wisdom and virtue essential for self-government.", "isCorrect": false, "rationale": "Mencken explicitly states that all known facts lie 'flatly against' the idea of the wisdom or virtue of the inferior man, comparing it to believing Friday is unlucky."}, {"text": "That there is no more evidence for the wisdom or virtue of the inferior man than there is for baseless superstitions.", "isCorrect": true, "rationale": "Mencken argues that the belief in the wisdom or virtue of the inferior man is akin to believing in 'phantasms' or the notion that Friday is an unlucky day, indicating a complete lack of empirical support."}, {"text": "That the theory of democracy is sound, but its application is flawed due to societal corruption.", "isCorrect": false, "rationale": "Mencken begins by stating he has 'established democracy's dubious pedigree' and that facts lie against its theory, not just its application."}, {"text": "That while the inferior man lacks wisdom, he makes up for it with inherent benevolence.", "isCorrect": false, "rationale": "Mencken specifically refutes the 'old belief in its congenital intuitions and inherent benevolences,' suggesting the mind is purely physical and chemical."}]}, {"question": "How does Mencken describe the fundamental nature and development of the human mind?", "options": [{"text": "It is primarily shaped by environmental factors and education, allowing for infinite potential in all individuals.", "isCorrect": false, "rationale": "Mencken explicitly states that some minds have 'sharply limited' abilities and that 'no conceivable training can move it beyond a certain point,' contradicting the idea of infinite potential for all."}, {"text": "It is largely a function of physical and chemical phenomena, subject to natural laws, with inherent differences in capacity.", "isCorrect": true, "rationale": "The text states the mind is 'a function, at least mainly, of purely physical and chemical phenomena, and its development and operation are subject to precisely the same natural laws' as other organs, with some minds having 'superior equipment' and others never progressing far."}, {"text": "It possesses congenital intuitions and inherent benevolences that guide its development.", "isCorrect": false, "rationale": "Mencken claims that what we have learned has 'pretty well disposed of the old belief in its congenital intuitions and inherent benevolences.'"}, {"text": "Its development is a mystery beyond human understanding, making it impossible to categorize.", "isCorrect": false, "rationale": "Mencken asserts that 'we know a great deal more about the content and character of the human mind' and that 'we also begin to chart them with more or less accuracy,' refuting the idea of it being an unchartable mystery."}]}, {"question": "What is Mencken's final view on intelligence tests, despite his initial 'brutish passions' against them?", "options": [{"text": "He remains skeptical, viewing them as tools of pedagogues that offer unreliable data.", "isCorrect": false, "rationale": "Mencken states that 'time and experience have won me to them,' and that 'the evidence in favor of them slowly piles up... they actually work.'"}, {"text": "He believes they are valuable, empirically corroborated tools for demonstrating and measuring natural differences in intelligence.", "isCorrect": true, "rationale": "Mencken concludes that 'time and experience have won me to them, for the evidence in favor of them slowly piles up... they actually work. What they teach is borne out by immense accumulations of empiric corroboration.'"}, {"text": "He finds them useful only for identifying the truly gifted, not for assessing the average person.", "isCorrect": false, "rationale": "Mencken discusses their ability to demonstrate differences between 'man and man' and to identify those whose 'progress is arrested at some specific time and place,' implying utility across the spectrum."}, {"text": "He sees them as a necessary evil, but one that ultimately harms the dignity of man.", "isCorrect": false, "rationale": "Mencken dismisses arguments about the 'dignity of man' as metaphysical and sentimental, arguing that intelligence tests provide scientific and rational explanations."}]}, {"question": "According to Mencken, why do Liberals (democrats) vehemently criticize intelligence tests?", "options": [{"text": "They believe the tests are methodologically flawed and scientifically unsound.", "isCorrect": false, "rationale": "Mencken attributes their criticism not to scientific objection but to the tests posing a 'dangerous menace to their vapourings,' implying ideological rather than methodological concerns."}, {"text": "They fear the tests provide a 'scientific means of demonstrating the difference in natural intelligence between man and man,' undermining democratic ideals.", "isCorrect": true, "rationale": "Mencken states that the tests 'provide a more or less scientific means of demonstrating the difference in natural intelligence between man and man' and provide 'a rational scale for measuring it,' which directly threatens democratic beliefs in equality of capacity."}, {"text": "They object to the 'pedagogues' who administer and interpret the test results.", "isCorrect": false, "rationale": "While Mencken initially disliked pedagogues, he states that 'pedagogues or no pedagogues,' the evidence for the tests piled up, and he attributes Liberal criticism to the tests' findings, not just the administrators."}, {"text": "They are concerned that the tests only measure acquired knowledge, not inherent potential.", "isCorrect": false, "rationale": "Mencken emphasizes the tests demonstrate 'natural intelligence' and distinguish between those who 'can learn' and those who 'cannot,' suggesting they gauge inherent capacity, not just learned facts."}]}, {"question": "What does Mencken mean by the 'concept of the unteachable' as revealed by intelligence tests?", "options": [{"text": "That some individuals refuse to learn due to stubbornness or lack of motivation.", "isCorrect": false, "rationale": "The text refers to a natural, inherent limitation, stating some 'stop in childhood, even in infancy,' not a voluntary refusal to learn."}, {"text": "That an individual's capacity for learning can increase almost indefinitely until old age.", "isCorrect": false, "rationale": "This describes the 'intelligent man,' not the 'unteachable.' The unteachable are those whose progress is arrested."}, {"text": "That some individuals reach a fixed mental age (e.g., 10-12) beyond which no training can further develop their cognitive abilities.", "isCorrect": true, "rationale": "Mencken explains that some 'stop in childhood, even in infancy. They reach, say, the mental age of ten or twelve, and then they develop no more,' regardless of physical maturation."}, {"text": "That highly intelligent people eventually become bored with learning, effectively becoming unteachable.", "isCorrect": false, "rationale": "The text describes a limit to capacity, not a psychological disengagement from learning due to boredom for the highly intelligent."}]}, {"question": "How does Mencken characterize the democrats' objections to his claims about differing natural intelligence?", "options": [{"text": "They provide compelling counter-evidence from psychological studies.", "isCorrect": false, "rationale": "Mencken explicitly states, 'The fact here is challenged sharply by the democrats aforesaid, but certainly not with evidence.'"}, {"text": "They rely on empirical data and scientific arguments to disprove the intelligence tests.", "isCorrect": false, "rationale": "Mencken states their objection is 'rather of a metaphysical character' and involves 'gratuitous, transcendental assumptions,' not empirical data."}, {"text": "They are primarily metaphysical, appealing to notions of human dignity and sentiment rather than evidence.", "isCorrect": true, "rationale": "Mencken describes their objection as 'of a metaphysical character, and involves gratuitous, transcendental assumptions as to what ought and what ought not to be true,' often appealing to 'the dignity of man, made in God’s image.'"}, {"text": "They present complex philosophical critiques that Mencken finds difficult to refute.", "isCorrect": false, "rationale": "Mencken dismisses their contentions, comparing them to defenses of 'rubbish of Genesis' and implying they are weak and based on sentiment, not sound philosophy."}]}, {"question": "Mencken uses the term 'Homo sapiens' (wise man) with 'heavy irony.' What is the most likely reason for this irony in the context of the passage?", "options": [{"text": "To suggest that all humans are inherently wise, regardless of their societal role.", "isCorrect": false, "rationale": "Mencken's entire argument is against the inherent wisdom of the average citizen, making this interpretation contrary to his thesis."}, {"text": "To highlight the contrast between humanity's species name and what he perceives as the widespread lack of true wisdom among the populace.", "isCorrect": true, "rationale": "Mencken critiques the 'inferior man' and argues against the 'wisdom of the inferior man,' making the species name 'wise man' ironic when applied to the majority he finds 'wanting' in wisdom."}, {"text": "To imply that wisdom is a universally recognized human trait, even if not always practiced.", "isCorrect": false, "rationale": "Mencken argues that true wisdom is rare and not a universal trait, especially not among the 'inferior man.'"}, {"text": "To emphasize that scientific understanding of human intelligence is still in its infancy.", "isCorrect": false, "rationale": "Mencken contends that 'we know a great deal more about the content and character of the human mind' now, and that intelligence tests provide accurate charting, contradicting the idea of infancy in understanding."}]}, {"question": "According to Mencken, what is a defining characteristic of Charles Richet's 'Homo stultus'?", "options": [{"text": "A natural skepticism towards all forms of authority and established beliefs.", "isCorrect": false, "rationale": "Mencken states Homo stultus 'has a dreadful capacity for embracing and cherishing impostures' and is prone to 'successive victimizations' by authorities, which is the opposite of skepticism."}, {"text": "An exceptional capacity for analytical thinking and rational decision-making.", "isCorrect": false, "rationale": "Mencken describes Homo stultus as being prone to 'palpable nonsense' and unable to grasp 'what such men teach' who work for progress, indicating a lack of analytical capacity."}, {"text": "A strong resistance to new ideas and a preference for established truths.", "isCorrect": false, "rationale": "Mencken notes that 'what is true daunts him, but what is not true finds lodgment in his cranium with so little resistance,' implying a preference for falsehoods over truth."}, {"text": "A dreadful capacity for embracing and cherishing impostures and delusions.", "isCorrect": true, "rationale": "Mencken explicitly states that Homo stultus 'remains capable for a long time thereafter of absorbing delusions' and 'has a dreadful capacity for embracing and cherishing impostures,' with 'thinking... almost entirely in terms of palpable nonsense.'"}]}, {"question": "Mencken argues that 'Democracy, alas, is also a form of theology.' What commonality does he draw between democracy and theology?", "options": [{"text": "Both are based on empirically verifiable facts and rational arguments.", "isCorrect": false, "rationale": "Mencken argues that democracy, like theology, dismisses 'uncomfortable facts' and relies on 'appeals to the highest sentiments,' rather than evidence."}, {"text": "Both offer a clear, logical framework for societal governance and individual morality.", "isCorrect": false, "rationale": "Mencken views democracy's foundations as 'dubious' and based on 'phantasms,' not logical frameworks."}, {"text": "Both tend to dispose of 'uncomfortable facts' by appealing to sentiment and moral outrage, rather than evidence.", "isCorrect": true, "rationale": "Mencken states that democracy, 'Confronted by uncomfortable facts, it invariably tries to dispose of them by appeals to the highest sentiments of the human heart,' which he compares to theological defenses of 'rubbish of Genesis.'"}, {"text": "Both advocate for the inherent equality and dignity of all human beings.", "isCorrect": false, "rationale": "While both might appeal to dignity, Mencken is criticizing this appeal as a way to avoid facts, not as a positive commonality. He is critical of the 'Fundamentalist by instinct' nature of democrats."}]}, {"question": "Based on Mencken's assessment of human intelligence, what educational or political reform might he most likely advocate for?", "options": [{"text": "Universal education designed to bring all citizens to the highest possible level of knowledge and skill.", "isCorrect": false, "rationale": "Mencken argues for the 'concept of the unteachable,' where some individuals have sharply limited capacities that 'no conceivable training can move it beyond a certain point,' making universal high-level education impractical and ineffective for all."}, {"text": "A system that identifies and channels individuals into roles commensurate with their natural intellectual capacities.", "isCorrect": true, "rationale": "Mencken emphasizes that intelligence tests provide 'a rational scale for measuring it' and identify those with 'superior equipment' versus those whose 'abilities are sharply limited,' suggesting a system that leverages these differences rather than ignoring them."}, {"text": "Policies that prioritize the opinions and welfare of the 'inferior man' to ensure democratic equality.", "isCorrect": false, "rationale": "Mencken's entire argument critiques the 'wisdom of the inferior man' and views democratic politics as based on 'palpable nonsense,' making such a policy antithetical to his views."}, {"text": "Eliminating all forms of standardized testing, which he views as biased and inaccurate.", "isCorrect": false, "rationale": "Mencken states that he has been 'won... to them' and that intelligence tests 'actually work' and provide 'immense accumulations of empiric corroboration,' indicating strong support, not opposition."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
