<script>
var QUESTIONS = [{"question": "According to Mencken, why does the 'democratic man' typically tolerate or even admire public thieves?", "options": [{"text": "He recognizes in them a kindred spirit who shares his own corrupt nature.", "isCorrect": true, "rationale": "Mencken argues that the mob sees the politician's self-interest as a mirror of their own desire to take what they can safely get."}, {"text": "He believes that political corruption is a necessary byproduct of rapid economic growth.", "isCorrect": false, "rationale": "While the text links business and politics, it identifies the cause as a shared moral character rather than economic necessity."}, {"text": "He is too poorly educated to distinguish between public service and private gain.", "isCorrect": false, "rationale": "Mencken suggests the mob is not necessarily ignorant of the theft, but rather philosophically accepting of it as natural."}, {"text": "He views corruption as a form of wealth redistribution that eventually benefits the proletariat.", "isCorrect": false, "rationale": "The text states that the mob's indignation, when it exists, arises from envy rather than a desire for redistribution or justice."}], "id": "q01"}, {"question": "Mencken describes the 'cult of Service' promoted by business agents and salesmen as primarily being:", "options": [{"text": "A combination of a sop to their own consciences and a lure to swindle others.", "isCorrect": true, "rationale": "The author characterizes 'Service' as a tool for imposture, allowing practitioners to soothe their guilt while catching 'conies'."}, {"text": "The natural evolution of the Puritan work ethic in a modern capitalist society.", "isCorrect": false, "rationale": "Mencken argues that the modern iteration is a bogus front, whereas the original Puritan was simply 'carnal' and 'sharp' without the pretense."}, {"text": "A genuine attempt to reform the cutthroat nature of private enterprise.", "isCorrect": false, "rationale": "Mencken dismisses such moral pretensions as 'unmitigated swindles' and 'virtuous pretences'."}, {"text": "A byproduct of Freudian complexes that drive men to seek social approval.", "isCorrect": false, "rationale": "Although Mencken mentions that it 'takes no Freudian' to see the swindle, he identifies the motive as greed and imposture, not psychological validation."}], "id": "q02"}, {"question": "What does Mencken identify as the 'history of democracy' in a single sentence analogy?", "options": [{"text": "Buying a jug of contraband whiskey only to find it is a toxic compound of prune juice and wood alcohol.", "isCorrect": true, "rationale": "This analogy illustrates the cycle of great effort and virtuous pretense leading to a fraudulent and disappointing result."}, {"text": "A constant battle between the 'specialists in rectitude' and the 'prehensile minorities'.", "isCorrect": false, "rationale": "While these groups are mentioned, they describe the actors within the system rather than the summary 'history' of the system itself."}, {"text": "The slow but inevitable transition from a government of laws to a government of men.", "isCorrect": false, "rationale": "This is a characteristic Mencken attributes to democratic operations, but he uses the whiskey analogy specifically to summarize its history."}, {"text": "A series of Utopian dreams that are periodically shattered by the realities of capitalism.", "isCorrect": false, "rationale": "Mencken views capitalism as secure under democracy, not as the force that shatters the democratic man's dreams."}], "id": "q03"}, {"question": "According to the text, why is capitalism more secure under democracy than under an absolute monarchy?", "options": [{"text": "Democratic man understands and shares the aims and aspirations of capitalism.", "isCorrect": true, "rationale": "Mencken posits that the common man views the capitalist's goals as a magnified version of his own, making him friendly to the system."}, {"text": "Democracy provides a more stable legal framework for the protection of private property.", "isCorrect": false, "rationale": "Mencken actually argues that democratic governments are 'shady' and frequently ignore or nullify just laws."}, {"text": "The competitive nature of democracy prevents any single capitalist from gaining too much power.", "isCorrect": false, "rationale": "The author suggests the opposite: that capitalists 'run the country' and eventually put 'trusted and reliable men' in power."}, {"text": "The mob is too distracted by religious disputes to challenge the economic status quo.", "isCorrect": false, "rationale": "While religious groups are mentioned as recipients of bribes, the primary security of capitalism is linked to the mob's psychological identification with it."}], "id": "q04"}, {"question": "How did the American government resolve the 'double danger' facing capitalism after World War I, according to Mencken?", "options": [{"text": "By pitting one half of the proletariat against the other half through the use of mob fears.", "isCorrect": true, "rationale": "The government diverted the conscripts' anger away from war profiteers and toward radicals and 'slackers'."}, {"text": "By passing the Bill of Rights to appease those demanding more civil liberties.", "isCorrect": false, "rationale": "Mencken claims the Department of Justice and the government actively work to 'nullify the guarantees of the Bill of Rights'."}, {"text": "By providing a generous 'bonus' to returning soldiers to compensate for lost wages.", "isCorrect": false, "rationale": "The text notes that soldiers demanded such payments, but it identifies the 'diversion of bile' as the successful strategy for securing the system."}, {"text": "By launching a scientific inquiry into the true causes and aims of the war.", "isCorrect": false, "rationale": "Mencken mentions that this was a 'rumour' of what the soldiers might demand, but the government successfully prevented it from happening."}], "id": "q05"}, {"question": "Mencken claims that the 'specialists in rectitude' who protested against the thievings of the Harding administration found themselves:", "options": [{"text": "More unpopular with the public than the thieves themselves.", "isCorrect": true, "rationale": "The text observes that the 'American mob' condoned the thefts and turned its odium upon those who ventured to protest."}, {"text": "Elevated to higher office by a mob eager for reform.", "isCorrect": false, "rationale": "This describes the 'English mob' in the Marconi scandal, but Mencken explicitly states the American specialists in rectitude became unpopular."}, {"text": "Protected by the constitutional checks and balances inherent in the Republic.", "isCorrect": false, "rationale": "Mencken argues that constitutional checks have little effect because the machinery to enforce them is controlled by the rogues."}, {"text": "Silenced by the Department of Justice through the use of 'agents provocateurs'.", "isCorrect": false, "rationale": "While the Department of Justice uses such agents, the specific fate of the Harding-era protesters was public unpopularity."}], "id": "q06"}, {"question": "What does Mencken suggest is the primary reason why business leaders (plutocrats) hold higher status in democratic societies than artists or scholars?", "options": [{"text": "Their achievements are more easily comprehended and imagined by the 'inferior man'.", "isCorrect": true, "rationale": "Mencken argues that the 'nether mob' can understand making money better than they can understand high art or complex learning."}, {"text": "They provide more tangible benefits to the common good through 'Service'.", "isCorrect": false, "rationale": "The author dismisses 'Service' as a fraudulent concept and argues that capitalists seek their own private advantage."}, {"text": "The democratic education system prioritizes vocational training over the liberal arts.", "isCorrect": false, "rationale": "Education is not mentioned as the cause; rather, it is the 'imponderable but powerful force of public opinion' reflecting mob comprehension."}, {"text": "They are the only class capable of resisting the 'tyranny of the majority'.", "isCorrect": false, "rationale": "Capitalists are described as organizing and controlling the minorities that struggle for power, not as a resistance to the majority."}], "id": "q07"}, {"question": "Which of the following best summarizes Mencken’s view of the American Department of Justice?", "options": [{"text": "A fecund source of oppression that has frequently resorted to perjury and illegal espionage.", "isCorrect": true, "rationale": "Mencken describes the department as 'ironically so called' and critiques its long history of sharp practices and civil rights violations."}, {"text": "A necessary institution that maintains the 'government of laws' against the 'vagaries of the mob'.", "isCorrect": false, "rationale": "Mencken explicitly argues that democracy is a 'government of men, not of laws' and that the Department of Justice is a tool of that corruption."}, {"text": "The only government body capable of effectively curbing the excesses of the 'war profiteers'.", "isCorrect": false, "rationale": "The text suggests the department is part of the machinery that protects exploiters and targets radicals instead."}, {"text": "A bastion of 'Puritan' rectitude that eventually collapses under democratic pressure.", "isCorrect": false, "rationale": "The author uses 'Puritan' as a pejorative for hypocrisy and cruelty, which he believes the Department of Justice embodies in its 'sharp practices'."}], "id": "q08"}, {"question": "According to the text, why did Woodrow Wilson's administration ultimately 'blow up'?", "options": [{"text": "Because he attempted to force the United States into the League of Nations.", "isCorrect": true, "rationale": "Mencken argues that Wilson's downfall wasn't the fraud of the Fourteen Points, but his attempt to involve the US in the League to undo that fraud's consequences."}, {"text": "Because the public finally became aware of the 'herculean raids upon the Treasury' that occurred during the war.", "isCorrect": false, "rationale": "The text states that the American mob 'condone[d] almost automatically' these thefts."}, {"text": "Because he appointed William Jennings Bryan as Secretary of State.", "isCorrect": false, "rationale": "Mencken notes this act only brought 'tolerant smiles' and was seen as a necessary fulfillment of a political bribe."}, {"text": "Because he was caught in a scandal involving 'loose women and fiery jugs'.", "isCorrect": false, "rationale": "While the 'Ur-Puritan' is described this way, Wilson's failure is specifically linked to his foreign policy and the League of Nations."}], "id": "q09"}, {"question": "What does Mencken mean by describing 'Public Opinion' as something that is 'piped to central factories' and 'put into cans'?", "options": [{"text": "It is not a spontaneous expression of the people but a manufactured product of the ruling class.", "isCorrect": true, "rationale": "The metaphor suggests that what passes for public opinion is actually manipulated mob fear, processed and distributed by those in power."}, {"text": "It is a valuable natural resource that democratic governments must carefully preserve.", "isCorrect": false, "rationale": "The context is one of deceit and 'cheats and humbugs,' suggesting that 'Public Opinion' is artificial and manipulative, not valuable or natural."}, {"text": "It is the only force capable of checking the 'successive usurpations' of the President.", "isCorrect": false, "rationale": "Mencken states that Walter Lippmann couldn't even find public opinion and that it doesn't exist in a raw, effective state."}, {"text": "It represents the collective wisdom of the 'specialists in rectitude'.", "isCorrect": false, "rationale": "Specialists in rectitude are described as a 'small body' often at odds with the mob, not as the source of mass-produced opinion."}], "id": "q10"}, {"question": "The analysis identifies anaphora as a dominant figure in Mencken's account of democratic trading. How does Mencken use the repeated structure 'one day / next day / the day after' in describing politicians?", "options": [{"text": "The anaphoric sequence enacts the very rhythm of bribery — each parallel clause adds one more layer to the deal, making the accumulation itself feel like the inexorable logic of democratic corruption.", "isCorrect": true, "rationale": "By repeating the temporal marker in parallel structures, Mencken gives the trading sequence a mechanical inevitability; the form mirrors the content, showing that corruption proceeds step by step as naturally as days following one another."}, {"text": "It is a form of bathos because each successive day represents a lower moral descent.", "isCorrect": false, "rationale": "Bathos is a sudden drop in register or dignity; anaphora is the repetition of an opening phrase across clauses. While the moral level may decline, the technique is anaphora, not bathos."}, {"text": "It creates a periodic sentence by withholding the main predicate until the third repeated clause.", "isCorrect": false, "rationale": "A periodic sentence withholds the main clause for suspense; anaphora is repetition at the beginning of successive clauses, not a delay of the main predicate."}, {"text": "It mimics the rhythm of a legal indictment, with each day's action counted as a separate charge.", "isCorrect": false, "rationale": "While Mencken does use legal register elsewhere, the anaphoric 'one day / next day / day after' functions as accumulated illustration, not as formal indictment counts."}], "id": "q11"}, {"question": "The analysis notes that Mencken uses 'conies' — an archaic word for rabbits — to describe the victims of democratic swindlers. What literary tradition does this vocabulary invoke?", "options": [{"text": "Elizabethan rogue literature, where 'cony-catching' meant the swindling of naive victims; Mencken places the democratic political operator in the tradition of Tudor con-men.", "isCorrect": true, "rationale": "In 16th-century English rogue pamphlets, 'cony-catching' described the art of deceiving gullible marks; by using this archaic term, Mencken connects democratic manipulation to a centuries-old tradition of professional swindling."}, {"text": "Biblical pastoral imagery, where conies are humble creatures who build their homes in rocks and trust in God's protection.", "isCorrect": false, "rationale": "While conies appear in Proverbs 30, the Elizabethan con-man tradition is the relevant context for Mencken's satirical use of the term alongside 'cheats and humbugs.'"}, {"text": "Medieval heraldry, where the rabbit symbolized cowardice and was used to brand defeated knights.", "isCorrect": false, "rationale": "This is not the tradition Mencken draws on; the relevant context is the Elizabethan criminal underworld vocabulary of confidence tricksters."}, {"text": "Classical fable tradition, where rabbits represent the common man outfoxed by cleverer aristocrats.", "isCorrect": false, "rationale": "The Aesopian fable tradition does not use 'conies' in this way; the specific word connects to the Elizabethan cony-catching pamphlet tradition."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
