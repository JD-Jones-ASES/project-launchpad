    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 21, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Mencken, what is the 'primal essence' that links both democracy and Puritanism?", "options": [{"text": "A shared commitment to the egalitarian distribution of wealth.", "isCorrect": false, "rationale": "While democracy involves equality, Mencken argues the root is psychological envy rather than a constructive economic theory."}, {"text": "The inferior man's envy and fear of those he perceives as his betters.", "isCorrect": true, "rationale": "The text explicitly identifies the root of both systems as the resentment held by the 'ignoble' toward the 'stronger' and more 'courageous'."}, {"text": "A theological desire to achieve spiritual perfection through suffering.", "isCorrect": false, "rationale": "Mencken dismisses the Puritan's altruistic or spiritual claims as false fronts for more base, punitive motives."}, {"text": "The rational pursuit of a social contract to ensure collective security.", "isCorrect": false, "rationale": "Mencken views these systems as products of 'green fury' and emotion rather than rational social planning."}], "id": "q01"}, {"question": "How does Mencken characterize the historical role of 'old autocracies' in relation to civilization?", "options": [{"text": "They were the primary cause of the 'chaos' that followed the fall of Flavius Honorius.", "isCorrect": false, "rationale": "Mencken suggests the collapse of autocracy, not its existence, led to the subsequent four hundred years of chaos."}, {"text": "They served as a necessary stage in the evolution toward modern democratic freedom.", "isCorrect": false, "rationale": "Mencken does not see democracy as progress; he views it as a liberation of the mob that autocracies correctly suppressed."}, {"text": "They protected the spirit of superior men by suppressing the 'green fury' of the mob.", "isCorrect": true, "rationale": "Mencken argues that by holding the masses in check, autocracies allowed superior individuals to flourish and make the Renaissance possible."}, {"text": "They were solely focused on the preservation of hereditary wealth at the expense of art.", "isCorrect": false, "rationale": "The text claims that while their purposes might have been 'far afield,' their service to civilization was an essential byproduct."}], "id": "q02"}, {"question": "What point is Mencken illustrating by mentioning the execution of Lavoisier during the French Revolution?", "options": [{"text": "The inevitable corruption of scientists who align themselves with the state.", "isCorrect": false, "rationale": "The text focuses on the mob's hatred of superiority, not the political alignment of the victim."}, {"text": "The mob's war against superiority of every kind, including intellectual excellence.", "isCorrect": true, "rationale": "The murder of a scientist like Lavoisier represents the democratic impulse to destroy anyone who stands above the general level."}, {"text": "The efficiency of the Revolutionary Tribunal in removing remnants of the old autocracy.", "isCorrect": false, "rationale": "Mencken argues that the mob targets superiority even when it is in opposition to the original autocracy."}, {"text": "The necessity of violent revolution to cleanse the state of 'unconscionable knaves'.", "isCorrect": false, "rationale": "Mencken identifies the 'knaves' as those who steer the democratic machine, not the victims of the revolution."}], "id": "q03"}, {"question": "Why does Mencken exclude John Milton from his critique of 'Puritan' literature?", "options": [{"text": "Milton's work was strictly secular and avoided moral themes.", "isCorrect": false, "rationale": "Milton wrote on many religious and moral themes, but Mencken classifies him by his political philosophy."}, {"text": "Milton's writing style was too complex for the 'natural democrat' to appreciate.", "isCorrect": false, "rationale": "While true of Milton's style, Mencken's specific reason is based on Milton's status as a 'libertarian'."}, {"text": "He considers Milton a 'libertarian,' which he views as the exact opposite of a Puritan.", "isCorrect": true, "rationale": "Mencken distinguishes between the restrictive nature of Puritanism and the libertarianism he attributes to Milton."}, {"text": "Milton was primarily an artist rather than a moral legislator.", "isCorrect": false, "rationale": "Mencken notes that no Puritan has produced great art, but he specifically separates Milton based on his libertarian stance."}], "id": "q04"}, {"question": "What is the 'psychological aberration' that Mencken identifies as the true motive behind modern Prohibitionist frenzy?", "options": [{"text": "Asceticism, or the genuine desire to renounce worldly pleasures for spiritual gain.", "isCorrect": false, "rationale": "Mencken explicitly states the Puritan is 'no ascetic' and was unable to restrain his own libidinousness even in colonial times."}, {"text": "Altruism, or the evangelical desire to save others from the dangers of alcohol.", "isCorrect": false, "rationale": "Mencken characterizes the claim of altruism as a 'theory' that is 'false' and intended to hide darker motives."}, {"text": "Sadism, or the lust to inflict discomfort and disgrace upon those they hate.", "isCorrect": true, "rationale": "The text argues that the primary mover is the desire to 'badger and annoy' and 'punish and humiliate' those who are happy."}, {"text": "Melancholia, resulting from the failure of their 'millennium' to manifest.", "isCorrect": false, "rationale": "While the millennium failed, their reaction is not sadness but an increased demand for 'worse devices for harassing'."}], "id": "q05"}, {"question": "According to the text, why is democracy the ideal machinery for Puritanism?", "options": [{"text": "It ensures that only the 'Good Man' can attain legislative power.", "isCorrect": false, "rationale": "Mencken views the democratic 'Good Man' as an 'anthropoid' figure who is anything but good in a civilized sense."}, {"text": "It provides a system of checks and balances that prevents hasty law-making.", "isCorrect": false, "rationale": "Mencken argues democracy actually facilitates 'ferocious haste' to avoid 'sober second thought'."}, {"text": "The mob is easily convinced because democratic politics is based on the same envies and fears as Puritan ethics.", "isCorrect": true, "rationale": "Mencken posits that democracy allows Puritanical 'enactments' to be launched quickly by appealing to the mob's shared base instincts."}, {"text": "It relies on 'upper chambers' to refine the raw passions of the majority into virtue.", "isCorrect": false, "rationale": "Mencken laments that the 'upper chambers' have lost their 'prophylactic remoteness' and are now exposed to the mob."}], "id": "q06"}, {"question": "Which historical legal contribution does Mencken cite as the only 'genuinely valuable' one in the modern age?", "options": [{"text": "The Mann Act.", "isCorrect": false, "rationale": "Mencken uses the Mann Act as an example of Puritan legislation that reduces human experience to the 'terms of the barnyard'."}, {"text": "The Code Napoléon.", "isCorrect": true, "rationale": "Mencken praises this code because it was created by anti-Puritans during a reaction against democracy."}, {"text": "The Anti-syndicalist laws of California.", "isCorrect": false, "rationale": "These are cited as examples of 'grotesque' laws used for 'psychopathological persecution'."}, {"text": "The Eighteenth Amendment (Prohibition).", "isCorrect": false, "rationale": "Mencken describes Prohibition as the worst failure in the 'whole history of human law-making'."}], "id": "q07"}, {"question": "What is Mencken's critique of the American District Attorney?", "options": [{"text": "They are typically too lenient toward wealthy defendants like 'Thaw' or 'Fatty Arbuckle'.", "isCorrect": false, "rationale": "Mencken argues the opposite: that rich or conspicuous men face 'very real and very heavy burdens' in court."}, {"text": "They are 'unconscionable knaves' who seek promotion by assaulting and destroying those 'above the general'.", "isCorrect": true, "rationale": "The text claims district attorneys use the prosecution of superior or conspicuous men as a 'facile way' to reach higher office."}, {"text": "They are hamstrung by the 'legal casuistry' of judges who protect the 'Forgotten Man'.", "isCorrect": false, "rationale": "Mencken suggests judges often help their successors (district attorneys) along and participate in the 'fraud'."}, {"text": "They are primarily motivated by a 'Christian yearning' to abolish crime and poverty.", "isCorrect": false, "rationale": "Mencken labels such claims as 'buncombe' and 'hollowness' used to cover for darker motives."}], "id": "q08"}, {"question": "According to Mencken, what is the 'true story' behind the Puritan's supposed moral 'rectitude'?", "options": [{"text": "It is a sign of spiritual eminence and divine grace.", "isCorrect": false, "rationale": "Mencken explicitly states that it is 'not actually a sign of spiritual eminence'."}, {"text": "It is a result of intense self-discipline and an 'ascetic' lifestyle.", "isCorrect": false, "rationale": "The text claims the Puritan's 'triumphs over the flesh' are 'mainly imaginary'."}, {"text": "It is a sign of cowardice, lack of originality, and the inability to experience life on a 'civilized plane'.", "isCorrect": true, "rationale": "Mencken defines Puritan morality as a 'weakness' mistaken for a 'merit' and a sign of 'docility'."}, {"text": "It is a necessary defense mechanism against the 'green fury' of the mob.", "isCorrect": false, "rationale": "The Puritan *is* the 'natural democrat' who comprises the mob, rather than one defending against it."}], "id": "q09"}, {"question": "Mencken claims that Prohibition has had which of the following effects on the 'young of both sexes'?", "options": [{"text": "It has successfully instilled a 'Puritan ethic' regarding temperance.", "isCorrect": false, "rationale": "The text states the 'mob' has turned against Prohibition and the youth have moved in the opposite direction."}, {"text": "It has led them to take to alcohol 'almost unanimously' because it is now 'devilish and even fashionable'.", "isCorrect": true, "rationale": "Mencken observes that making alcohol illegal has vastly augmented the number of users, especially among the youth."}, {"text": "It has reduced crime and disease among them, as promised in 1917.", "isCorrect": false, "rationale": "The text notes that crime, poverty, and disease remain 'undiminished'."}, {"text": "It has forced them to adopt the 'barnyard' sexual ethics of the Mann Act.", "isCorrect": false, "rationale": "The Mann Act refers to sexual experience, while the 'young taking to it unanimously' refers specifically to the 'cup' (alcohol)."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
