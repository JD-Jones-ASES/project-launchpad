        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">

        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 16, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "How does Mencken characterize the presence of a man of 'unquestionable integrity and ability' in high executive or legislative office?", "options": [{"text": "It is an accidental failure of the standard democratic process.", "isCorrect": true, "rationale": "Mencken argues that because the odds are so heavily against such men, their success represents a breakdown of the typical democratic rule rather than its success."}, {"text": "It serves as a model for how the democratic system eventually corrects its own errors.", "isCorrect": false, "rationale": "This view implies a self-correcting optimism that the text explicitly rejects in favor of a cynical 'rule' of squalor."}, {"text": "It demonstrates that the mob occasionally identifies and rewards true merit.", "isCorrect": false, "rationale": "The author suggests these occurrences are rare 'miracles' rather than a deliberate or wise choice by the populace."}, {"text": "It is the primary goal that the Fathers of the Constitution successfully institutionalized.", "isCorrect": false, "rationale": "While Mencken mentions the Fathers' intent, he views the presence of such men in the modern era as a rare exception to a broken system."}], "id": "q01"}, {"question": "According to the text, what is the 'spiritual' cost for a self-respecting candidate who attempts to decrease the odds against his election?", "options": [{"text": "A compromise with complete candor and the sacrifice of personal honor.", "isCorrect": true, "rationale": "The text states that every effort to diminish the odds involves compromise, leading the candidate to treat honor like a commodity to be traded."}, {"text": "The exhaustion of personal financial resources on 'circus' tactics.", "isCorrect": false, "rationale": "While 'circus' arts are mentioned, the focus is on the loss of internal integrity rather than external material wealth."}, {"text": "The development of a genuine empathy for the ideas of the mob.", "isCorrect": false, "rationale": "Mencken suggests that either the politician is already stupid enough to share mob ideas or is a charlatan who merely pretends to."}, {"text": "A permanent alienation from the professional 'job-mongers'.", "isCorrect": false, "rationale": "The text implies that successful politicians must actually learn to 'leap through the hoops' of these groups, not alienate them."}], "id": "q02"}, {"question": "Mencken refers to members of the national House of Representatives as 'male Magdalens.' What is the primary implication of this metaphor?", "options": [{"text": "They have sold their honor in exchange for their political positions.", "isCorrect": true, "rationale": "The metaphor compares the sacrifice of moral integrity for professional gain to the historical associations of the 'Magdalen' figure."}, {"text": "They are martyrs who suffer for the sake of public service.", "isCorrect": false, "rationale": "Mencken's tone is derogatory; he views them as compromised individuals rather than selfless public servants."}, {"text": "They are seeking redemption through legislative action.", "isCorrect": false, "rationale": "The text suggests they have been 'broken to the goose-step' and continue to serve evil causes, showing no path toward redemption."}, {"text": "They are outsiders who have been miraculously 'thrown in' to a corrupt system.", "isCorrect": false, "rationale": "The text distinguishes these established members from the 'occasional mavericks' who only last a single session."}], "id": "q03"}, {"question": "What does Mencken identify as the 'primary aim' of all government, regardless of its form?", "options": [{"text": "To maintain a small group in jobs that are more comfortable than those available in free competition.", "isCorrect": true, "rationale": "The author posits that government is essentially a conspiracy to secure exhilarated and comfortable employment for its members."}, {"text": "To protect the diligent and useful masses from the exploitation of the mob.", "isCorrect": false, "rationale": "Mencken actually argues that government is a conspiracy *against* these diligent and useful men."}, {"text": "To eventually reach right decisions through a long history of trial and error.", "isCorrect": false, "rationale": "This describes a democratic doctrine that Mencken dismisses as 'buncombe' and 'false pretences'."}, {"text": "To institutionalize the concept of honor among the ruling class.", "isCorrect": false, "rationale": "The text suggests that government members are 'always willing to make certain sacrifices of integrity' to keep their jobs."}], "id": "q04"}, {"question": "Why does Mencken argue that a courtier under a monarch deals less damage to his honor than a democratic politician?", "options": [{"text": "He is not forced to pretend to be a worse man than he actually is to please his superior.", "isCorrect": true, "rationale": "The text explains that while a courtier genuflects, he does so before an equal or superior, and need not 'abase himself before swine'."}, {"text": "The monarch is legally bound to protect the courtier's integrity.", "isCorrect": false, "rationale": "Mencken says the monarch has a 'certain respect' for honor, but the primary difference is the nature of the 'abasement' required."}, {"text": "Courtiers are selected based on the same rigorous standards as Frederick the Great's Junker.", "isCorrect": false, "rationale": "Frederick's Junker are cited as an example of honor, but not all courtiers are equated with them; the key is the target of their flattery."}, {"text": "A courtier’s duties are based on 'common sense' rather than political 'favours'.", "isCorrect": false, "rationale": "The text suggests both systems involve job-seeking; the difference lies in the psychological humiliation of the 'master' one serves."}], "id": "q05"}, {"question": "According to the passage, why did Frederick the Great prefer Junker for military commissions?", "options": [{"text": "They possessed a code of honor that prevented them from lying or being bribed.", "isCorrect": true, "rationale": "The text quotes Frederick stating that Junker 'will not lie and they cannot be bought,' which Mencken uses to illustrate a concept of honor."}, {"text": "They were intellectually superior to the democratic 'half-wits'.", "isCorrect": false, "rationale": "Mencken notes that democrats *consider* them half-wits, but Frederick's reason was based on their integrity, not a formal IQ comparison."}, {"text": "They were the only class capable of understanding 'plain English' and military strategy.", "isCorrect": false, "rationale": "While Mencken contrasts mob-leaders with those who understand plain English, Frederick's specific justification focused on incorruptibility."}, {"text": "They represented the 'sovereign princes' who had the right to offer crowns.", "isCorrect": false, "rationale": "The refusal of the crown by Wilhelm I involved sovereign princes; Frederick’s Junker commissions were a separate example regarding army service."}], "id": "q06"}, {"question": "What origin does Mencken attribute to the doctrine that the 'mob' is full of rectitude and wisdom?", "options": [{"text": "It was invented by political leaders to justify their own degradations.", "isCorrect": true, "rationale": "Mencken labels it a face-saving invention by 'mob-masters' to convert their 'swinishness into heroism'."}, {"text": "It is a logical deduction derived from the long history of anti-slavery agitation.", "isCorrect": false, "rationale": "Mencken describes the history of anti-slavery agitation as a record of 'buncombe' and 'imbecility,' not a proof of wisdom."}, {"text": "It was the foundational principle articulated by Washington and Jefferson.", "isCorrect": false, "rationale": "The text explicitly states that Washington had no such chatter and Jefferson had very little."}, {"text": "It is an inherent truth that emerges only 'in the long run'.", "isCorrect": false, "rationale": "The author dismisses this 'long run' argument as having no evidence or reasoning behind it."}], "id": "q07"}, {"question": "In Mencken's view, how does 'best democratic statesmanship' attempt to safeguard the integrity of high-ranking officials?", "options": [{"text": "By shifting offices from being elected by the mob to being appointive.", "isCorrect": true, "rationale": "The text describes taking offices 'out of the gift of the mob' and making them appointive as a way to relieve the official of a 'degrading necessity'."}, {"text": "By strictly enforcing the original language of Article II of the Constitution.", "isCorrect": false, "rationale": "While Mencken mentions Article II as the *intent* of the Fathers, the 'best statesmanship' today is identified with the 'common device' of appointment."}, {"text": "By requiring candidates to pass an examination in 'plain English' and logic.", "isCorrect": false, "rationale": "The text notes that presidents and governors *can* understand plain English, but the safeguard itself is the method of selection (appointment)."}, {"text": "By encouraging politicians to take refuge in intellectual cynicism.", "isCorrect": false, "rationale": "Cynicism is described as a personal psychological refuge for the candidate, not a systemic 'statesmanship' device to safeguard honor."}], "id": "q08"}, {"question": "How does Mencken distinguish the 'essential objection' to feudalism from the 'essential objection' to democracy?", "options": [{"text": "Feudalism degraded the vassal, while democracy degrades the leaders of the state.", "isCorrect": true, "rationale": "The text concludes by stating feudalism imposed degrading acts on the vassal (homage to a suzerain), whereas democracy imposes them on those responsible for the state (homage to constituents)."}, {"text": "Feudalism relied on brute force, while democracy relies on 'bosh-mongers'.", "isCorrect": false, "rationale": "While Mencken mentions brutes and bosh-mongers, the 'essential objection' is defined by *who* is being degraded by the acts of homage."}, {"text": "Feudalism was a conspiracy of the small group, while democracy is a conspiracy of the masses.", "isCorrect": false, "rationale": "Mencken states that *all* government is a conspiracy of a small group against the masses."}, {"text": "Feudalism rejected the concept of honor, while democracy treats honor as contemptible.", "isCorrect": false, "rationale": "The text suggests the suzerain in feudalism could be a brute, but the objection focuses on the 'acts and attitudes' imposed on the vassal."}], "id": "q09"}, {"question": "What distinction does Mencken make between the 'old Congressman' and the 'occasional maverick'?", "options": [{"text": "The maverick is a temporary miracle, while the veteran has either lost his mind or his shame.", "isCorrect": true, "rationale": "The text says mavericks last a session and disappear, while the veterans of power are either too stupid to know better or are conscious charlatans."}, {"text": "The maverick is a 'male Magdalen,' whereas the veteran is a 'charlatan'.", "isCorrect": false, "rationale": "Mencken actually groups the whole body (especially the successful ones) as 'male Magdalens'; 'mavericks' are the rare exceptions."}, {"text": "The maverick represents the 'failure of the rule,' while the veteran represents 'Baptist evangelism'.", "isCorrect": false, "rationale": "The 'failure of the rule' refers generally to any man of integrity reaching office, but the 'Baptist evangelist' refers to the arts used to sway the mob."}, {"text": "The maverick relies on cynicism, while the veteran relies on the 'goose-step'.", "isCorrect": false, "rationale": "Mencken suggests all who stay in the system are 'broken to the goose-step'; cynicism is just one way an individual might cope with it."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
