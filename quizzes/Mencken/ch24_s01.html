    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 24, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Mencken's shift in tone at the start of the Coda is characterized by a transition from a 'satirist's exuberance' to which of the following?", "options": [{"text": "A measured authority delivering a final verdict.", "isCorrect": true, "rationale": "The text describes the shift as moving from the persona of a man enjoying a fight to one delivering a deliberate judicial verdict."}, {"text": "An optimistic plea for democratic reform.", "isCorrect": false, "rationale": "Mencken remains a critic of democracy and explicitly refuses to offer any 'therapeutics' or reforms."}, {"text": "A frantic and aggressive call to immediate political action.", "isCorrect": false, "rationale": "The source material indicates the volume of his rhetoric is actually lowered, becoming more deliberate and less explosive."}, {"text": "A total abandonment of the medical and religious metaphors.", "isCorrect": false, "rationale": "These metaphors actually become dominant in this section to provide the emotional logic of his summation."}]}, {"question": "What is the rhetorical significance of Mencken's admission, 'I don't know,' regarding the future of democracy?", "options": [{"text": "It serves as an implicit rebuke to the absolute certainty of democratic believers.", "isCorrect": true, "rationale": "By admitting ignorance, Mencken contrasts his perceived intellectual honesty with the dogmatic certainty of his opponents."}, {"text": "It indicates that he has lost interest in the subject after two hundred pages.", "isCorrect": false, "rationale": "The text suggests this is a 'rhetorical move' used to signal the final phase of his performance, not a loss of interest."}, {"text": "It suggests a sudden shift toward supporting democratic ideals.", "isCorrect": false, "rationale": "Mencken continues his critique; the admission is part of a clinical, diagnostic stance rather than a change of heart."}, {"text": "It signals that his 'Notes on Democracy' was an incomplete work of fiction.", "isCorrect": false, "rationale": "The admission of ignorance is framed as a mark of the 'diagnostician' who refuses to engage in unfounded prediction."}]}, {"question": "Mencken utilizes the term 'self-limiting' when comparing democracy to a disease like measles. What does this term imply about democracy's ultimate fate?", "options": [{"text": "Democracy contains the internal mechanisms for its own eventual destruction.", "isCorrect": true, "rationale": "The term suggests the disease runs its course based on its own nature, rather than being defeated by an external force."}, {"text": "Democracy is a minor ailment that is easily cured by rational education.", "isCorrect": false, "rationale": "Mencken explicitly rejects the idea of a 'cure' (therapeutics) and views democracy as a fundamental pathology."}, {"text": "Democracy will spread indefinitely unless external political forces intervene.", "isCorrect": false, "rationale": "'Self-limiting' suggests the opposite of indefinite spread; it implies an inherent end-point or boundary."}, {"text": "Democracy is a healthy phase that every civilization must pass through to mature.", "isCorrect": false, "rationale": "Mencken's use of 'disease' and 'pathology' indicates he views it as a negative state, not a healthy developmental phase."}]}, {"question": "In the context of Mencken's vocabulary, which word refers to the legal right to enjoy the advantages of another's property, used here to describe the loss of distinction for the 'democratic man'?", "options": [{"text": "Usufructs", "isCorrect": true, "rationale": "The text defines this technical term from Roman law as what is lost when equality strips achievements of their distinction."}, {"text": "Puissant", "isCorrect": false, "rationale": "This word means powerful or mighty and is used by Mencken with ironic chivalric connotations."}, {"text": "Brummagem", "isCorrect": false, "rationale": "This refers to something cheap or counterfeit, specifically democratic titles and honors."}, {"text": "Ratiocination", "isCorrect": false, "rationale": "This term refers to the process of logical reasoning, which Mencken argues is avoided by the 'mob'."}]}, {"question": "Which of the following describes the change in Mencken's use of the 'dash' in Chapter 24 compared to earlier sections?", "options": [{"text": "It functions as a pause for philosophical reflection rather than a sardonic interruption.", "isCorrect": true, "rationale": "The source material notes the dash becomes a 'breath' or a moment of resignation rather than a 'stage whisper'."}, {"text": "It is used to separate long lists of mock-scientific data.", "isCorrect": false, "rationale": "While he used catalogues earlier, the analysis specifically highlights a shift toward philosophical pauses in the Coda."}, {"text": "It is replaced entirely by the use of semicolons to create judicial weight.", "isCorrect": false, "rationale": "The dash remains his signature mark, but its internal rhetorical function shifts."}, {"text": "It serves to accelerate the pace of the sentences to create a sense of urgency.", "isCorrect": false, "rationale": "The sentences in this section are described as longer and more deliberate, with the dash creating moments of reflection that slow the reader down."}]}, {"question": "Mencken's 'Peroration' is described as unusual because it explicitly refuses to do what?", "options": [{"text": "Propose a solution or remedy for the problems identified.", "isCorrect": true, "rationale": "Mencken argues that the refusal to offer a 'cure' is a mark of intellectual honesty and a rejection of democratic dogma."}, {"text": "Acknowledge any biblical or religious influences.", "isCorrect": false, "rationale": "The section is actually noted for its significant use of biblical allusions and religious metaphors."}, {"text": "Use medical terminology to describe political systems.", "isCorrect": false, "rationale": "He lean heavily into the register of medicine, describing himself specifically as a pathologist."}, {"text": "Conclude the book, instead choosing to leave it open-ended.", "isCorrect": false, "rationale": "While he doesn't offer a 'solution,' he is delivering a 'closing argument' and a 'verdict' that concludes the polemic."}]}, {"question": "What is the primary rhetorical effect of using words like 'diagnosis,' 'pathology,' and 'clinical material'?", "options": [{"text": "To cast the author as an objective scientist rather than a biased polemicist.", "isCorrect": true, "rationale": "This clinical vocabulary provides a 'rhetorical shield' that suggests the author is merely describing facts without personal hatred."}, {"text": "To suggest that the author is a licensed medical professional.", "isCorrect": false, "rationale": "The text calls this a 'rhetorical performance' and notes that Mencken 'casts himself' as a physician for metaphorical effect."}, {"text": "To appeal to a working-class audience familiar with physical labor.", "isCorrect": false, "rationale": "The Latinate and scientific nature of these terms is described as sophisticated and detached, not populist."}, {"text": "To hide the fact that the author has no evidence for his claims.", "isCorrect": false, "rationale": "The tone is used to give 'judicial weight' to the evidence he has already presented over the previous two hundred pages."}]}, {"question": "According to Mencken's religious analogy, what is the democratic 'miracle'?", "options": [{"text": "The belief that voting can solve any human problem.", "isCorrect": true, "rationale": "The text identifies the 'capacity of voting to solve any problem' as the miracle in the systematic mapping of democracy onto religion."}, {"text": "The resurrection of the dead at the Day of Judgment.", "isCorrect": false, "rationale": "While he alludes to biblical resurrection, he uses this as a timeframe for democracy's survival, not as the miracle of democracy itself."}, {"text": "The transformation of the 'democratic man' into an aristocrat.", "isCorrect": false, "rationale": "Mencken suggests democracy actually strips away distinction rather than miraculously granting it."}, {"text": "The sudden disappearance of poverty and crime.", "isCorrect": false, "rationale": "The text focuses on the theological structure of belief (dogmas/miracles) rather than specific socio-economic outcomes."}]}, {"question": "Which word does Mencken use to describe democratic titles and honors, implying they are cheap and counterfeit?", "options": [{"text": "Brummagem", "isCorrect": true, "rationale": "Derived from cheap goods from Birmingham, this word indicates something showy but essentially worthless or fake."}, {"text": "Ratiocination", "isCorrect": false, "rationale": "This relates to the process of logical reasoning, not the quality of titles or honors."}, {"text": "Usufructs", "isCorrect": false, "rationale": "This refers to the right to enjoy the benefits of property, not the counterfeit nature of honors."}, {"text": "Puissant", "isCorrect": false, "rationale": "This means powerful; while Mencken uses it ironically, it does not mean 'counterfeit'."}]}, {"question": "What is the structure of the two sentences: 'My business is not prognosis, but diagnosis. I am not engaged in therapeutics, but in pathology'?", "options": [{"text": "Antithetical and parallel.", "isCorrect": true, "rationale": "Each sentence uses a 'not X, but Y' structure (antithesis) and they mirror each other in rhythm and syntax (parallelism)."}, {"text": "Circular and repetitive.", "isCorrect": false, "rationale": "While the sentences are similar, they move from general (diagnosis) to specific discipline (pathology), showing progression rather than a loop."}, {"text": "Fragmented and colloquial.", "isCorrect": false, "rationale": "The sentences are short and declarative but use highly formal, Latinate medical terminology."}, {"text": "Metaphorical and imprecise.", "isCorrect": false, "rationale": "The text notes that the brevity signals 'confidence' and 'logical inevitability,' making them very precise rhetorical declarations."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
