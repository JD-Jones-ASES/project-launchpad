<script>
var QUESTIONS = [{"question": "Mencken famously stated that daily journalism was the most honest form of writing. What was his primary justification for this belief?", "options": [{"text": "It allowed for the development of elegant, sophisticated literary styles.", "isCorrect": false, "rationale": "Mencken distrusted academics and considered much literary criticism a 'fraud,' valuing clarity and punchiness over elegance. His own criticism was 'punchy, opinionated, entertaining prose,' not elegant."}, {"text": "It demanded clarity, speed, and direct engagement with the actual world.", "isCorrect": true, "rationale": "The text explicitly states Mencken 'believed that daily journalism was the most honest form of writing because it demanded clarity, speed, and contact with the actual world.'"}, {"text": "It provided a platform for extensive, detached academic analysis of events.", "isCorrect": false, "rationale": "Mencken 'distrusted academics' and 'despised what he called \"professors of English,\"' indicating he would not value journalism for facilitating academic analysis, which he saw as detached."}, {"text": "It fostered polite, moralistic discourse among the intellectual elite.", "isCorrect": false, "rationale": "Mencken actively fought against the 'genteel tradition' and its polite, moralistic tone, making this an unlikely justification for his praise of journalism."}], "id": "q01"}, {"question": "How did Mencken's approach to literary criticism fundamentally differ from what he considered the conventional 'literary criticism' of his time?", "options": [{"text": "He meticulously analyzed the structural and thematic elements of texts in a detached manner.", "isCorrect": false, "rationale": "The text states, 'He did not analyze literature so much as pronounce judgment on it,' indicating his approach was not meticulous analysis."}, {"text": "He prioritized bold, personal judgment and entertaining pronouncements over objective scholarly analysis.", "isCorrect": true, "rationale": "The text explains, 'His own criticism was written in the same punchy, opinionated, entertaining prose he brought to everything else. He did not analyze literature so much as pronounce judgment on it — loudly, memorably, and with absolute confidence in his own taste.'"}, {"text": "He consistently sought to uphold the polite, moralistic standards of the 'genteel tradition.'", "isCorrect": false, "rationale": "Mencken 'championed writers who offended the genteel tradition' and 'considered it his personal enemy,' directly contradicting this option."}, {"text": "He focused primarily on introducing classical European literary forms to American readers.", "isCorrect": false, "rationale": "While he introduced European writers like Conrad and Nietzsche, his approach to criticism was not primarily about promoting classical forms but about vital, honest judgment."}], "id": "q02"}, {"question": "Mencken championed writers like Theodore Dreiser and Sinclair Lewis, often against the prevailing critical establishment. What core value did Mencken most consistently advocate for through this support?", "options": [{"text": "The preservation of traditional American literary forms and conventions.", "isCorrect": false, "rationale": "Dreiser's 'raw naturalism' and Lewis's satire actively challenged traditional forms and the 'genteel tradition,' which Mencken celebrated."}, {"text": "The importance of literary elegance and refined prose in American letters.", "isCorrect": false, "rationale": "Mencken valued 'honesty over elegance' and 'vitality over propriety,' explicitly contrasting with a focus on elegance."}, {"text": "The triumph of genuine talent and vitality over conventional propriety and approved mediocrity.", "isCorrect": true, "rationale": "The text states, 'In every case, Mencken valued vitality over propriety, honesty over elegance, and genuine talent over approved mediocrity,' perfectly summarizing his stance."}, {"text": "The universal appeal of moralistic storytelling and polite literary culture.", "isCorrect": false, "rationale": "He fought against the 'moralistic' and 'lifeless' genteel tradition, making this option incorrect."}], "id": "q03"}, {"question": "Mencken's 'Prejudices' series was deliberately titled to be provocative. What message did Mencken intend to convey by openly embracing the label 'Prejudices' for his collected essays?", "options": [{"text": "That his essays offered an unbiased, scientifically objective view of culture.", "isCorrect": false, "rationale": "The text explicitly states Mencken 'considered objectivity a pretension of the mediocre,' meaning he would not claim his work was unbiased."}, {"text": "That he wore his biases openly and considered the pretense of objectivity a weakness.", "isCorrect": true, "rationale": "The note on 'Prejudices' states, 'The title was deliberately provocative: Mencken wore his biases openly and considered objectivity a pretension of the mediocre,' which aligns directly with this option."}, {"text": "That his work was a collection of well-researched, universally accepted truths.", "isCorrect": false, "rationale": "The term 'prejudices' implies personal bias, not universally accepted truths, and Mencken's style was highly opinionated rather than universally agreeable."}, {"text": "That he was acknowledging the unavoidable biases inherent in all forms of academic scholarship.", "isCorrect": false, "rationale": "While he distrusted academics, the primary message was about his own open biases as opposed to a general statement about all scholarship."}], "id": "q04"}, {"question": "Which of the following literary tactics would best exemplify Mencken's 'register mixing' style?", "options": [{"text": "Consistently employing a highly formal, academic tone throughout an entire critical essay.", "isCorrect": false, "rationale": "Register mixing involves clashing formal and informal language, not maintaining a consistent formal tone."}, {"text": "Interspersing sophisticated, scholarly diction with common slang or colloquial expressions.", "isCorrect": true, "rationale": "The 'keyconcept' box on Mencken Style states: 'Register mixing: He drops slang and colloquial language into sentences of otherwise formal, even scholarly, diction. The clash is the point.'"}, {"text": "Writing exclusively in short, declarative sentences to deliver blunt, straightforward judgments.", "isCorrect": false, "rationale": "While he used 'devastating short sentences,' this was a contrast after 'long, elaborate' arguments, not the sole mode of his writing or defining 'register mixing'."}, {"text": "Using only the vocabulary of biology and medicine to discuss cultural topics.", "isCorrect": false, "rationale": "This describes 'mock-scientific diction,' another stylistic element, but not 'register mixing,' which specifically refers to blending formal and informal language."}], "id": "q05"}, {"question": "Mencken's 'scholarly masterpiece,' *The American Language*, provided significant evidence of his underlying erudition. What was the primary focus of this monumental work?", "options": [{"text": "A comprehensive critique of the 'genteel tradition' in American literature.", "isCorrect": false, "rationale": "While he opposed the genteel tradition, The American Language was a linguistic study, not a literary critique."}, {"text": "An argument for the superiority of British English over American English.", "isCorrect": false, "rationale": "The text states it 'demonstrated how American English diverged from British English,' implying a study of distinctiveness, not superiority."}, {"text": "A detailed study of how American English diverged from British English in various linguistic aspects.", "isCorrect": true, "rationale": "The text states, 'It remains a landmark study of how American English diverged from British English in vocabulary, pronunciation, spelling, and idiom.'"}, {"text": "A collection of his most controversial cultural and political essays.", "isCorrect": false, "rationale": "His 'Prejudices' series contained his collected essays, not The American Language."}], "id": "q06"}, {"question": "Mencken's stylistic element of 'hyperbole' was not a sign of carelessness but a deliberate technique. What was its intended effect?", "options": [{"text": "To ensure his arguments were understated and universally accepted by all readers.", "isCorrect": false, "rationale": "Hyperbole is overstatement, directly opposite to understatement. Mencken's aim was provocative, not universal acceptance."}, {"text": "To obscure his real opinions and prevent readers from understanding his critiques.", "isCorrect": false, "rationale": "Hyperbole was used to 'dare the reader to find the real argument underneath,' implying clarity once the exaggeration is understood, not obscuration."}, {"text": "To create an exaggerated case, challenging the reader to discern the underlying argument.", "isCorrect": true, "rationale": "The 'keyconcept' box explains: 'Hyperbole: Mencken routinely overstates his case by a factor of ten. The exaggeration is not carelessness; it is a deliberate technique that dares the reader to find the real argument underneath.'"}, {"text": "To strictly adhere to factual reporting, avoiding any personal embellishment.", "isCorrect": false, "rationale": "Hyperbole is a deliberate overstatement, which is contrary to strict factual reporting."}], "id": "q07"}, {"question": "Considering Mencken's 'heroes' like Friedrich Nietzsche and 'the independent mind,' which of the following actions would Mencken most likely commend?", "options": [{"text": "An academic who meticulously adheres to the long-established doctrines of their field.", "isCorrect": false, "rationale": "Mencken distrusted academics and 'academic pedantry,' and admired independence from 'herd morality,' making adherence to doctrines unlikely to be commended."}, {"text": "A politician who successfully rallies public opinion by conforming to popular sentiment.", "isCorrect": false, "rationale": "Mencken admired Nietzsche's 'contempt for herd morality' and 'the independent mind that refused to bow to public opinion,' directly opposing conformity to popular sentiment."}, {"text": "An artist who challenges prevailing social norms and aesthetic tastes with a unique, provocative vision.", "isCorrect": true, "rationale": "Mencken championed writers who 'offended the genteel tradition,' valued 'vitality over propriety,' and admired 'the independent mind,' all of which align with an artist challenging norms."}, {"text": "A community leader who promotes traditional moralistic values and civic obedience.", "isCorrect": false, "rationale": "Mencken's enemies included 'Puritanism in all its forms,' 'evangelical Christianity,' and 'democratic moralism (the uplift),' making the promotion of traditional moralistic values something he would despise."}], "id": "q08"}, {"question": "The text describes Mencken's use of 'devastating short sentences.' When and how did he typically employ this stylistic device for maximum impact?", "options": [{"text": "He exclusively wrote in short, simple sentences to maintain constant clarity and conciseness.", "isCorrect": false, "rationale": "The text describes it as a contrast: 'After building up a long, elaborate, syntactically complex argument, Mencken drops a two- or three-word sentence that delivers the verdict.'"}, {"text": "He used them as opening statements to immediately shock and engage the reader before developing his argument.", "isCorrect": false, "rationale": "The text indicates these sentences came after building a long argument, not at the beginning."}, {"text": "He inserted them within a complex argument to provide moments of comic relief and lighten the tone.", "isCorrect": false, "rationale": "Their purpose was to 'deliver the verdict' with 'lethal' contrast, indicating judgment and impact, not comic relief."}, {"text": "He placed them strategically after long, elaborate arguments to deliver a concise, definitive verdict.", "isCorrect": true, "rationale": "The 'keyconcept' box explains: 'After building up a long, elaborate, syntactically complex argument, Mencken drops a two- or three-word sentence that delivers the verdict. The contrast is lethal.'"}], "id": "q09"}, {"question": "Based on the descriptions provided, what was a key shared characteristic that made Sinclair Lewis a 'natural ally' of Mencken?", "options": [{"text": "Their mutual admiration for the polite, moralistic literary culture of their era.", "isCorrect": false, "rationale": "Both Mencken and Lewis (through his satirical novels) actively attacked the conformity and cultural poverty associated with this culture."}, {"text": "A shared commitment to academic objectivity and scholarly analysis in their works.", "isCorrect": false, "rationale": "Mencken 'considered objectivity a pretension of the mediocre,' and Lewis's work was satirical, not objective academic analysis."}, {"text": "A common critical stance against the conformity, materialism, and mediocrity of middle-class American life.", "isCorrect": true, "rationale": "Lewis's novels 'attacked the conformity, materialism, and cultural poverty of middle-class American life,' and Mencken's 'Prejudices' were 'a sustained assault on everything he found dishonest, sentimental, or dull in American culture,' making them natural allies against the 'booboisie.'"}, {"text": "Their preference for writing in a consistently formal and scholarly literary style.", "isCorrect": false, "rationale": "Mencken's style was punchy and opinionated, not consistently formal. Lewis's satirical novels were accessible, not necessarily formal and scholarly."}], "id": "q10"}, {"question": "The term 'genteel tradition' is defined in a footnote as 'polite, moralistic, and increasingly lifeless literary culture.' Why did Mencken consider it his 'personal enemy'?", "options": [{"text": "Because it dominated European literary markets and prevented American books from selling abroad.", "isCorrect": false, "rationale": "The genteel tradition is described as a distinctly American cultural phenomenon; Mencken's opposition was grounded in its stifling effect on American letters, not foreign market dynamics."}, {"text": "Because its emphasis on politeness and approved propriety directly opposed the vitality, honesty, and independent talent he prized in literature.", "isCorrect": true, "rationale": "Mencken valued 'vitality over propriety, honesty over elegance, and genuine talent over approved mediocrity' — each of these values is precisely what the 'polite, moralistic, and increasingly lifeless' genteel tradition suppressed."}, {"text": "Because it was founded by academic professors whom he personally disliked.", "isCorrect": false, "rationale": "While Mencken despised academic pedantry, the text presents his opposition to the genteel tradition as an intellectual and aesthetic stance, not a personal grudge against specific founders."}, {"text": "Because it exclusively promoted European literature at the expense of native American writing.", "isCorrect": false, "rationale": "The text describes the genteel tradition as part of American literary culture, not as a promoter of European literature over American writing."}], "id": "q11"}, {"question": "Mencken employed 'mock-scientific diction' by borrowing vocabulary from biology, medicine, and psychology to discuss cultural and political subjects. What rhetorical effect does this technique produce?", "options": [{"text": "It lends genuine scientific authority to his political arguments, suggesting they are empirically proven.", "isCorrect": false, "rationale": "The technique is described as 'mock-scientific,' meaning it mimics scientific authority rather than genuinely claiming it; the effect is satirical, not seriously empirical."}, {"text": "It treats human folly as a clinical specimen, creating an ironic distance that deflates political and cultural pretension.", "isCorrect": true, "rationale": "The key concept box states he uses scientific vocabulary to 'treat human folly as a clinical specimen' — applying detached diagnostic language to politics creates ironic distance and satirical deflation of pretension."}, {"text": "It demonstrates his formal training in the natural sciences and reinforces his credibility as an expert.", "isCorrect": false, "rationale": "Mencken had no formal scientific training; his formal education ended at Baltimore Polytechnic at age sixteen, and the technique is described as mock rather than genuine science."}, {"text": "It limits his audience to readers with advanced scientific literacy, reinforcing his elitist stance.", "isCorrect": false, "rationale": "The technique is described in terms of its rhetorical effect on any reader, not as a barrier requiring scientific expertise. The irony is accessible rather than technically exclusive."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
