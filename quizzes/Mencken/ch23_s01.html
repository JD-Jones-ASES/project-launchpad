<script>
var QUESTIONS = [{"question": "According to the analysis of Mencken's rhetorical strategy, what is the primary function of his shifts between clinical, historical, and satirical registers?", "options": [{"text": "To ensure the reader never settles into a comfortable intellectual distance from the argument.", "isCorrect": true, "rationale": "By moving between academic authority and biting satire, Mencken forces the reader to feel the weight of the argument as well as understand its logic."}, {"text": "To demonstrate his academic superiority over the target audience of democratic moralists.", "isCorrect": false, "rationale": "While Mencken's tone is authoritative, the analysis suggests the shifts are a rhetorical strategy for persuasion, not merely an ego-driven display of intellect."}, {"text": "To disguise the lack of empirical data with various stylistic flourishes.", "isCorrect": false, "rationale": "The text states that Mencken actually 'marshals evidence' from historical figures, suggesting his style supports his evidence rather than hiding a lack of it."}, {"text": "To appeal to different socioeconomic classes of readers simultaneously.", "isCorrect": false, "rationale": "The analysis specifies that the section is addressed to readers who already suspect politics is crooked, rather than attempting to bridge class divides."}]}, {"question": "Mencken uses the word 'tergiversations' to describe political conduct. Based on the 'wordwatch' section, what is the rhetorical effect of this specific word choice?", "options": [{"text": "It elevates the accusation of dishonesty into a scholarly or formal context.", "isCorrect": true, "rationale": "The use of a complex Latinate word serves to frame simple political lying as a subject of intellectual study."}, {"text": "It simplifies complex political maneuvers for the 'mob' to understand.", "isCorrect": false, "rationale": "The text describes this as a word of 'considerable obscurity,' which would hinder rather than help a general audience's understanding."}, {"text": "It functions as a colloquialism that bridges the gap between the journalist and the reader.", "isCorrect": false, "rationale": "The text identifies 'rooked' as colloquial, while 'tergiversations' is categorized as a Latinate, obscure term."}, {"text": "It highlights the physical violence inherent in democratic power shifts.", "isCorrect": false, "rationale": "The word refers to evasions and shifts of allegiance, which are rhetorical and political maneuvers rather than physical acts."}]}, {"question": "In Mencken's 'Whiskey Anecdote,' what do the 'pepper, prune juice and wood alcohol' symbolize in his critique of democracy?", "options": [{"text": "The fraudulent reality of political promises delivered to the citizen.", "isCorrect": true, "rationale": "The anecdote serves as a parable where the 'whiskey' is the promise of self-government and the foul compound is what the citizen actually receives."}, {"text": "The dangerous and unregulated nature of the free market under capitalism.", "isCorrect": false, "rationale": "While Mencken discusses capitalism, the specific parable of the whiskey is tied to the 'democratic experiment' and the citizen's disillusionment with government."}, {"text": "The 'mob's' inability to distinguish between high-quality and low-quality leadership.", "isCorrect": false, "rationale": "The parable emphasizes the fraudulence of the product being sold to the citizen, rather than the citizen's lack of taste."}, {"text": "The moral decay caused by the Puritan influence on American legislation.", "isCorrect": false, "rationale": "Although Mencken attacks Puritans elsewhere, the analysis states this specific parable illustrates the arc of the democratic experiment."}]}, {"question": "What syntactic technique does Mencken utilize in the passage listing labor leaders, manufacturers, and Methodists to suggest that democratic corruption is an endless process?", "options": [{"text": "Anaphora and a rhythm of escalation.", "isCorrect": true, "rationale": "The repetition of 'one day,' 'the next day,' and 'the day after' creates a relentless beat that mimics the non-stop nature of political bargaining."}, {"text": "Short, staccato sentences to mirror the abruptness of political deals.", "isCorrect": false, "rationale": "The analysis highlights the 'long, accumulative sentence' rather than short ones as the signature of this section."}, {"text": "The use of the passive voice to obscure who is responsible for the bribery.", "isCorrect": false, "rationale": "Mencken uses active verbs like 'must be bought' and specific groups as subjects to highlight the agency in the corruption."}, {"text": "Metonymy to substitute groups for their specific corrupt actions.", "isCorrect": false, "rationale": "While he lists groups, the primary technique discussed for this passage is the rhythmic repetition at the start of clauses."}]}, {"question": "How does Mencken's use of the term 'prehensile' characterize the various minorities that constitute the 'mob'?", "options": [{"text": "It suggests an animal-like greed that is constantly reaching and clutching.", "isCorrect": true, "rationale": "By using a word often associated with a monkey's tail, Mencken implies a primitive, grasping nature in the groups he describes."}, {"text": "It implies a highly evolved intellectual capacity for complex political strategy.", "isCorrect": false, "rationale": "The term suggests physical clutching and animalistic instinct, which Mencken uses to diminish, not celebrate, the mob's intelligence."}, {"text": "It describes their vulnerability to being caught by the 'specialists in rectitude.'", "isCorrect": false, "rationale": "Prehensile refers to the ability to grasp things, describing the mob as the aggressor/taker, not the victim/prey."}, {"text": "It highlights the collective strength and unity of the democratic populace.", "isCorrect": false, "rationale": "Mencken uses the term to describe the 'minorities' within the mob, focusing on their individualistic or group-specific greed rather than unity."}]}, {"question": "In the close reading of the final passage, what is the significance of public opinion being 'put into cans'?", "options": [{"text": "It reduces the ideal of self-government to a manufactured, standardized, and artificial industrial product.", "isCorrect": true, "rationale": "The canning metaphor suggests that opinion is no longer organic but is something processed and 'preserved' by external forces."}, {"text": "It suggests that public opinion is being preserved for future generations to study.", "isCorrect": false, "rationale": "The context of 'flavoured and coloured' suggests a fraudulent manufacturing process rather than an archival one."}, {"text": "It represents the democratic attempt to contain and regulate the dangerous 'gushes' of the mob.", "isCorrect": false, "rationale": "While it describes containment, the primary thrust is the loss of agency and the artificial nature of the result."}, {"text": "It highlights the efficiency and technological progress of the American democratic system.", "isCorrect": false, "rationale": "Mencken's tone is satirical; he uses the industrial metaphor to mock the democratic process, not to praise its efficiency."}]}, {"question": "Mencken's analysis of the relationship between capitalism and democracy suggests that:", "options": [{"text": "The plutocracy has manipulated democratic institutions so effectively that revolution has become impossible.", "isCorrect": true, "rationale": "The source material states Mencken views the 'herd' as complicit in its own exploitation by the plutocracy."}, {"text": "Capitalism is naturally incompatible with democracy and will eventually cause its collapse.", "isCorrect": false, "rationale": "Mencken argues that the two work together through corruption, making the system more stable (and unchangeable), not less."}, {"text": "Democratic corruption is a byproduct of capitalist greed that can be regulated away.", "isCorrect": false, "rationale": "Mencken views corruption as the 'operating principle' of democracy itself, not an external capitalist pollutant."}, {"text": "The mob uses democratic power to loot the wealth of the capitalist class.", "isCorrect": false, "rationale": "The text suggests the opposite: that the plutocracy manipulates the system to exploit the herd."}]}, {"question": "What is the rhetorical purpose of the phrase 'specialists in rectitude' in the context of the Harding scandals?", "options": [{"text": "To ironically frame honesty as a social disability or an absurdity in a corrupt system.", "isCorrect": true, "rationale": "By calling them 'specialists,' Mencken treats virtue as a peculiar, perhaps even useless, niche occupation within a naturally crooked world."}, {"text": "To praise the investigative journalists who uncovered the government's 'stealings.'", "isCorrect": false, "rationale": "The text notes that Mencken uses this phrase ironically, suggesting he does not view their 'rectitude' with straightforward admiration."}, {"text": "To suggest that the only way to combat corruption is through professional moral training.", "isCorrect": false, "rationale": "Mencken's argument is that corruption is essential to the system; therefore, specialized moral training would be futile."}, {"text": "To argue that the legal system is finally working to purge democratic corruption.", "isCorrect": false, "rationale": "Mencken's overarching point is that corruption is not a disease to be purged but the system's fundamental operating principle."}]}, {"question": "Which of the following best describes Mencken's use of 'Americano' alongside the word 'rooked'?", "options": [{"text": "A register collision between 'high office' and 'low conduct.'", "isCorrect": true, "rationale": "The juxtaposition of the stylized 'Americano' and the street-level 'rooked' emphasizes the tawdry reality behind official government actions."}, {"text": "An attempt to appeal to Italian-American voters during the 1920s.", "isCorrect": false, "rationale": "The analysis defines 'Americano' as 'Italian-flavored' but describes its use as a stylistic choice to cultivate a Machiavellian persona, not for political pandering."}, {"text": "A way to distinguish between different types of democratic citizens.", "isCorrect": false, "rationale": "The term is used to describe the general American citizen as a victim of official theft, not to categorize different citizen types."}, {"text": "A method of softening his harsh critique with playful, international slang.", "isCorrect": false, "rationale": "The context of 'rooked' and 'rogues' suggests the tone remains sharp and accusatory, rather than playful."}]}, {"question": "According to the analysis, what does Mencken's use of the dash (—) accomplish in his prose?", "options": [{"text": "It functions as a 'stage whisper,' allowing Mencken to deliver judgments as if in confidence to the reader.", "isCorrect": true, "rationale": "Dashes allow Mencken to insert devastating asides that might be too blunt for the main structure of the sentence."}, {"text": "It represents the fragmented and chaotic nature of the 'mob's' thought process.", "isCorrect": false, "rationale": "While the mob is described as chaotic, the analysis attributes the use of the dash to Mencken's 'precision' and 'rhetorical strategy' rather than an imitation of the mob."}, {"text": "It indicates a moment where the author is unsure of his historical evidence.", "isCorrect": false, "rationale": "The text states that Mencken uses the dash with 'precision' to insert judgments, which indicates confidence, not uncertainty."}, {"text": "It signals a transition from the satirical register to the clinical register.", "isCorrect": false, "rationale": "The dash is used for parenthetical asides within a sentence, whereas the register shifts occur across the section's broader structure."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
