<script>
var QUESTIONS = [{"question": "H.L. Mencken and George Jean Nathan transformed The Smart Set into a vehicle for iconoclastic literary criticism and new American fiction. What was The Smart Set's original identity before their co-editorship?", "options": [{"text": "A political journal advocating for progressive reforms.", "isCorrect": false, "rationale": "The text states that The Smart Set was limited by its origins as a 'society magazine,' not a political journal."}, {"text": "A literary magazine exclusively for European authors.", "isCorrect": false, "rationale": "While Mencken and Nathan had a taste for European culture, The Smart Set under their editorship also became a platform for 'new American fiction.'"}, {"text": "A society magazine catering to high society.", "isCorrect": true, "rationale": "The text explicitly states, 'But The Smart Set was always limited by its origins as a society magazine,' indicating its initial focus."}, {"text": "A scientific publication promoting modern theories.", "isCorrect": false, "rationale": "The Smart Set was a 'literary magazine,' not a scientific publication."}]}, {"question": "Despite the significant influence Mencken and Nathan achieved with The Smart Set, Mencken launched The American Mercury in 1924. What was Mencken's primary motivation for this new venture?", "options": [{"text": "To create a politically neutral publication that appealed to a broader, less controversial audience.", "isCorrect": false, "rationale": "The American Mercury was known for its highly opinionated, often provocative content and targeted a specific 'educated skeptic' audience, not a broad neutral one."}, {"text": "To secure a higher salary and greater editorial control for himself, independent of Nathan.", "isCorrect": false, "rationale": "The text emphasizes Mencken's desire for 'something bolder' than The Smart Set, which was 'limited by its origins,' rather than financial or control issues with Nathan."}, {"text": "To establish a magazine that was unconstrained by the previous publication's original identity and allowed for bolder, more iconoclastic content.", "isCorrect": true, "rationale": "The text states, 'But The Smart Set was always limited by its origins as a society magazine. Mencken wanted something bolder,' indicating a desire for a new platform free from previous constraints."}, {"text": "To shift his focus entirely from literary criticism to investigative journalism, which The Smart Set did not cover.", "isCorrect": false, "rationale": "The American Mercury continued to publish 'fiction, poetry, cultural criticism,' and Mencken's editorials, not solely investigative journalism."}]}, {"question": "The American Mercury developed a distinctive readership under Mencken's editorship. Which description best characterizes the typical reader Mencken aimed to attract?", "options": [{"text": "The traditional, religious American seeking moral guidance and community values.", "isCorrect": false, "rationale": "Mencken's readers were described as having 'outgrown Sunday school, Rotary Club meetings, and the pieties of the Saturday Evening Post,' directly contrasting with traditional religious values."}, {"text": "The intellectual who questioned conventional wisdom and sought to differentiate themselves from mainstream American society.", "isCorrect": true, "rationale": "The text describes the audience as 'the educated skeptic, the college student who wanted to distinguish himself from his classmates, the young professional who despised the small-town values of his parents,' all aligning with a desire to challenge norms."}, {"text": "The working-class individual interested in political activism and labor rights.", "isCorrect": false, "rationale": "The magazine's content and Mencken's 'aristocratic scorn for the common man' suggest that this was not the primary target audience."}, {"text": "The established literary critic looking for obscure European avant-garde literature.", "isCorrect": false, "rationale": "While Mencken appreciated European culture, the audience description focuses on Americans seeking intellectual distinction rather than an elite group of literary critics focused solely on avant-garde works."}]}, {"question": "H.L. Mencken's monthly editorials in The American Mercury were renowned for their consistent and often provocative attacks. Which of the following was NOT a recurring target of Mencken's criticism during the magazine's peak?", "options": [{"text": "Puritanism and evangelical religion.", "isCorrect": false, "rationale": "The text explicitly states he 'attacked the same targets — Puritanism, Prohibition, democratic mediocrity, evangelical religion,' making these recurring targets."}, {"text": "Prohibition and censorship.", "isCorrect": false, "rationale": "The text explicitly states he 'attacked the same targets — Puritanism, Prohibition, democratic mediocrity, evangelical religion, censorship,' making these recurring targets."}, {"text": "Democratic mediocrity and academic pomposity.", "isCorrect": false, "rationale": "The text explicitly states he 'attacked the same targets — Puritanism, Prohibition, democratic mediocrity, evangelical religion, censorship, academic pomposity,' making these recurring targets."}, {"text": "The progressive policies of the New Deal liberalism.", "isCorrect": true, "rationale": "New Deal liberalism 'replaced his brand of libertarian skepticism as the dominant intellectual fashion' after his decline, meaning it wasn't a consistent target during his peak with The American Mercury."}]}, {"question": "The American Mercury's influence sharply declined after 1930, leading to Mencken's resignation in 1933. What was the primary reason for this significant shift, as described in the text?", "options": [{"text": "A general shift in public taste towards more optimistic and less critical literature.", "isCorrect": false, "rationale": "While public taste may have shifted, the text provides a more specific and direct cause related to economic conditions."}, {"text": "The emergence of new, more radical intellectual movements that overshadowed Mencken's views.", "isCorrect": false, "rationale": "The text mentions New Deal liberalism replaced his views, but the immediate cause for his *decline* was the impact of the Depression, not just a shift in intellectual fashion."}, {"text": "The widespread economic hardships of the Great Depression made Mencken's cynical and elitist views seem insensitive and out of touch.", "isCorrect": true, "rationale": "The text states, 'When millions of ordinary Americans were losing their homes and standing in bread lines, mocking their intelligence was no longer entertaining — it was obscene.'"}, {"text": "Increased government censorship that limited the magazine's ability to publish controversial content.", "isCorrect": false, "rationale": "The text mentions censorship as one of Mencken's targets, but not as the cause of The American Mercury's decline in the 1930s."}]}, {"question": "Based on the provided text, which statement best encapsulates H.L. Mencken's general philosophical stance or intellectual approach during his peak at The American Mercury?", "options": [{"text": "A strong belief in the inherent wisdom of the common person and the efficacy of democratic institutions.", "isCorrect": false, "rationale": "Mencken notoriously attacked 'democratic mediocrity' and later his 'aristocratic scorn for the common man' was seen as cruel, directly contradicting this statement."}, {"text": "An endorsement of traditional American moral values and a commitment to religious piety.", "isCorrect": false, "rationale": "Mencken regularly attacked 'Puritanism, Prohibition, [and] evangelical religion,' and his readers wanted 'permission to feel superior' to such pieties."}, {"text": "A libertarian skepticism that challenged established norms and provincialism, often expressed with an elitist or superior perspective.", "isCorrect": true, "rationale": "The text mentions his 'brand of libertarian skepticism,' his 'demolition of American provincialism,' and how he gave readers 'permission to feel superior,' which aligns with this description."}, {"text": "A commitment to social justice and advocating for the economically disadvantaged.", "isCorrect": false, "rationale": "During the Great Depression, his 'aristocratic scorn for the common man' made his views seem cruel, indicating he was not an advocate for the economically disadvantaged."}]}, {"question": "The 'historicalcontext' section details the Jazz Age as a 'decade of sharp cultural conflict.' How did this cultural landscape of the 1920s likely influence the impact and reception of Mencken's journalism?", "options": [{"text": "The widespread social stability and consensus of the era allowed Mencken's critiques to be seen as harmless intellectual exercises.", "isCorrect": false, "rationale": "The text describes the 1920s as a 'decade of sharp cultural conflict' and a 'volatile landscape,' directly contradicting widespread stability and consensus."}, {"text": "Mencken's attacks on moralism, democracy, and provincialism resonated strongly with an audience navigating rapid societal changes and culture wars.", "isCorrect": true, "rationale": "The text states Mencken launched his attacks 'into this volatile landscape' and 'was not writing in a vacuum; he was writing in a culture war,' suggesting his critiques found resonance in the midst of societal upheaval."}, {"text": "The rise of fundamentalist religion provided Mencken with an easy target, ensuring a consistent and approving audience among religious conservatives.", "isCorrect": false, "rationale": "Mencken consistently attacked 'evangelical religion' and 'Puritanism,' meaning he alienated, rather than appealed to, religious conservatives."}, {"text": "New technologies like radio and cinema diverted public attention away from print media, thereby reducing the potential impact of Mencken's criticisms.", "isCorrect": false, "rationale": "The text notes that when 'guardians of public morality denounced him,' it 'only increased his circulation,' indicating his impact was not diminished by other media."}]}, {"question": "After resigning from The American Mercury in 1933, Mencken never fully recovered his cultural position. What were his primary activities in his later years, according to the text?", "options": [{"text": "He became a political pundit, advising Franklin Roosevelt's administration on policy.", "isCorrect": false, "rationale": "The text states that New Deal liberalism 'replaced his brand of libertarian skepticism,' implying he was not aligned with or advising Roosevelt's administration."}, {"text": "He focused on writing memoirs and revising his seminal work, The American Language.", "isCorrect": true, "rationale": "The text states, 'Mencken spent his later years writing memoirs and working on revisions of The American Language.'"}, {"text": "He launched a new magazine focused on social reform and economic policy to address the Great Depression.", "isCorrect": false, "rationale": "The text implies a waning influence and different activities, not the launch of a new, socially focused magazine."}, {"text": "He traveled extensively, advocating for international peace and understanding.", "isCorrect": false, "rationale": "The text does not mention any such activities in his later years."}]}, {"question": "Both The Smart Set and The American Mercury were significant under Mencken's editorship. What was a key distinguishing factor that Mencken sought to overcome by launching The American Mercury?", "options": [{"text": "The Smart Set focused exclusively on European literary trends, whereas The American Mercury championed American authors.", "isCorrect": false, "rationale": "The Smart Set was a 'vehicle for iconoclastic literary criticism and new American fiction,' indicating it already championed American authors."}, {"text": "The Smart Set was limited by its original identity as a society magazine, which Mencken found too restrictive for his bolder, more critical vision.", "isCorrect": true, "rationale": "The text explicitly states, 'But The Smart Set was always limited by its origins as a society magazine. Mencken wanted something bolder,' highlighting this as the core reason for the new venture."}, {"text": "The American Mercury was the first publication to feature Mencken's own monthly editorials, which were absent from The Smart Set.", "isCorrect": false, "rationale": "While The American Mercury featured 'Mencken's own monthly editorials,' The Smart Set was also used by Mencken as a 'platform for new writers and as a weapon against the literary establishment,' suggesting he had an editorial voice there, though perhaps less pronouncedly his own consistent column."}, {"text": "The American Mercury was published by Alfred A. Knopf, unlike The Smart Set, which was self-published by Mencken and Nathan.", "isCorrect": false, "rationale": "The text does not state The Smart Set was self-published, and the publisher difference is a detail, not the 'key distinguishing factor' Mencken aimed to overcome regarding the magazine's content and scope."}]}, {"question": "Considering H.L. Mencken's editorial focus in The American Mercury and the historical context of the Jazz Age, which statement best characterizes his overall role during his period of peak influence?", "options": [{"text": "A unifier who sought to bridge the divides between traditional and modern American values through moderate discourse.", "isCorrect": false, "rationale": "Mencken attacked 'Puritanism, Prohibition,' and other traditional values, and was explicitly described as writing 'in a culture war,' indicating a divisive, not unifying, role."}, {"text": "A critical intellectual who provided a voice for educated skeptics, challenging American provincialism and conventional morality amidst significant cultural upheaval.", "isCorrect": true, "rationale": "This aligns with his target audience ('educated skeptic'), his consistent attacks on 'American provincialism' and traditional morality, and his operating within the 'sharp cultural conflict' of the Jazz Age."}, {"text": "A populist journalist who championed the cause of the common man against the perceived elitism of institutions and intellectuals.", "isCorrect": false, "rationale": "Mencken held an 'aristocratic scorn for the common man' and gave his readers 'permission to feel superior,' which contradicts a populist stance."}, {"text": "A detached academic observer who documented the cultural shifts of the 1920s without expressing strong personal opinions or taking sides.", "isCorrect": false, "rationale": "Mencken combined 'extravagant wit with a remarkably consistent worldview' and 'attacked the same targets' month after month, demonstrating a highly opinionated and engaged, rather than detached, approach."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
