<script>
var QUESTIONS = [{"question": "According to Mencken, what is the 'mob's' relationship to human progress and its fruits?", "options": [{"text": "The mob facilitates progress through brute labor, though it cannot understand the end goals.", "isCorrect": false, "rationale": "While the text mentions the mob's labor enters into durable values, it explicitly states that progress passes the mob by and its fruits are beyond their reach."}, {"text": "The mob is the primary beneficiary of progress, eventually catching up to the intellectual elite.", "isCorrect": false, "rationale": "The author argues that the mob has changed very little since earliest times and that change is often for the worse."}, {"text": "The mob remains largely stagnant, only receiving what 'falls from the tree' of progress.", "isCorrect": true, "rationale": "Mencken asserts that progress is unintelligible to the mob and they only share in the incidental scraps, much like animals."}, {"text": "The mob actively sabotages progress because they perceive it as a threat to their religious beliefs.", "isCorrect": false, "rationale": "While the mob opposes those who liberate the spirit, the text emphasizes their inability to reach or understand progress rather than a conscious strategy of sabotage."}]}, {"question": "Mencken claims that when faced with a choice between a sound idea and an unsound one, the mob follows a 'pathological compulsion' to choose which?", "options": [{"text": "The idea that offers the most immediate material gain.", "isCorrect": false, "rationale": "Mencken describes the mob as lazy and improvident, but their specific compulsion in the realm of ideas is defined by the lack of logic or truth."}, {"text": "The unsound idea.", "isCorrect": true, "rationale": "The text states the mob chooses the unsound idea 'almost infallibly' due to a sort of internal, pathological drive."}, {"text": "The idea that most closely aligns with the teachings of Christ.", "isCorrect": false, "rationale": "The author argues that the mob actually turned against Christ because his ideas were too logical and austere."}, {"text": "The most traditional or ancient idea available.", "isCorrect": false, "rationale": "While the mob is described as unchanging, the text focuses on their consistent rejection of 'sound' reasoning regardless of its age."}]}, {"question": "Which historical pairing does Mencken use to illustrate the mob's 'instinct' for supporting tyrants over liberators?", "options": [{"text": "In favor of Galileo; against Nero.", "isCorrect": false, "rationale": "The text states the exact opposite: the mob was instinctively in favor of Nero and against Galileo."}, {"text": "In favor of Danton; against Cagliostro.", "isCorrect": false, "rationale": "Mencken describes the mob rushing from one to the other, but specifically groups Nero and Torquemada as those they favor by instinct."}, {"text": "In favor of Torquemada; against Savonarola.", "isCorrect": true, "rationale": "Mencken argues the mob's instinct leads them to support 'butchers' like Torquemada while opposing those who seek to liberate the human spirit like Savonarola."}, {"text": "In favor of Aristotle; against Paul.", "isCorrect": false, "rationale": "The author claims the mob's 'bogus Christianity' has no relation to Aristotle and that they actually embraced Paul's nonsense."}]}, {"question": "What does Mencken identify as the primary difference between the mob of two thousand years ago and the mob of the modern era?", "options": [{"text": "The modern mob has replaced physical violence with political activism.", "isCorrect": false, "rationale": "Mencken notes that the mob has only shifted its belief in witches to the political sphere, suggesting a change in subject but not in fundamental nature."}, {"text": "The mob has moved from the 'sports of the arena' to the 'lynching-party.'", "isCorrect": true, "rationale": "Mencken uses this 'inch' of movement to argue that the mob's essential character and appetite for cruelty remain virtually unchanged."}, {"text": "The modern mob has finally achieved the dignity of democracy.", "isCorrect": false, "rationale": "The text explicitly states the world owes the mob nothing of worth, 'not even democracy,' implying they did not create it."}, {"text": "The mob has transitioned from believing in ghosts to a rational understanding of science.", "isCorrect": false, "rationale": "The text asserts the mob 'still believes in ghosts' and has merely changed the labels of their superstitions."}]}, {"question": "In Mencken's view, why is modern Christianity considered 'bogus' or unrelated to the 'system of Christ'?", "options": [{"text": "Because Christ’s actual theological ideas were too logical and his ethics too austere for the mob.", "isCorrect": true, "rationale": "The author argues that the mob rejected Christ because they preferred 'comfortable balderdash' and found his requirements for conduct too demanding."}, {"text": "Because the modern church has abandoned the 'metaphysics' established by Paul.", "isCorrect": false, "rationale": "Mencken argues that Paul's metaphysics are exactly what make Christianity bearable to the mob today."}, {"text": "Because it has been overly influenced by the aristocratic and feudal system of the Roman Church.", "isCorrect": false, "rationale": "While Mencken mentions the Roman Church and the feudal age, his primary critique is the mob's preference for Paul’s 'nonsense' over Christ’s system."}, {"text": "Because modern evangelical pastors are too honest and sensible to lead the mob effectively.", "isCorrect": false, "rationale": "Mencken describes evangelical pastors as 'devoid of sense' and 'lamentably indifferent to common honesty,' mirroring Paul."}]}, {"question": "How does Mencken characterize the Apostle Paul in relation to the development of the church?", "options": [{"text": "As a diligent organizer who saved Christ's message from being lost to history.", "isCorrect": false, "rationale": "Mencken views Paul not as a savior of the message, but as the inventor of a 'bogus' system that replaced Christ's message with nonsense."}, {"text": "As the 'Stammvater' of modern mob-masters who provided the mob with 'unintelligible' provender.", "isCorrect": true, "rationale": "The text describes Paul as a 'travelling labour leader' who knew that nonsense was the natural food of the mob, establishing the template for future leaders."}, {"text": "As an aristocratic intellectual who sought to elevate the mob to a higher spiritual plane.", "isCorrect": false, "rationale": "Mencken refers to Paul as the 'prophet of the sewers' and associates him with turgid, witless metaphysics."}, {"text": "As a figure who was eventually replaced by Peter because Peter was more 'evangelical.'", "isCorrect": false, "rationale": "The text says Peter was put in Paul's place to avoid the 'taint of Little Bethel' (evangelicalism) as the church became more organized and aristocratic."}]}, {"question": "Why does Mencken suggest that Peter was promoted to the Papacy over Paul during the feudal age?", "options": [{"text": "Peter was seen as more intellectual and better able to challenge the Greek demonology of Asia Minor.", "isCorrect": false, "rationale": "Mencken does not credit Peter with intellect; rather, he calls Peter a 'blackguard.'"}, {"text": "Paul’s teachings were considered too simple and magnificent for the Roman Church.", "isCorrect": false, "rationale": "Mencken attributes simplicity and magnificence to Christ, not Paul; Paul’s teachings were 'turgid and witless.'"}, {"text": "Peter was 'free from any taint of Little Bethel' and fit the aristocratic reorganization of society.", "isCorrect": true, "rationale": "Mencken argues that as the church became a formal social power, it favored the 'mystical dignity' of Peter over Paul, who remained the 'prophet of the sewers.'"}, {"text": "The Roman Church realized Paul’s theological ideas were too logical for a feudal society.", "isCorrect": false, "rationale": "The author attributes logic to Christ’s system, whereas Paul’s system is described as 'discordant and nonsensical.'"}]}, {"question": "Which set of figures does Mencken identify as the 'incarnations' of Paul appearing centuries later?", "options": [{"text": "Nero, Torquemada, and Danton.", "isCorrect": false, "rationale": "While these figures are associated with the mob, Mencken specifically links the theological legacy of Paul to Protestant reformers."}, {"text": "Galileo, Savonarola, and Aristotle.", "isCorrect": false, "rationale": "These are figures Mencken aligns with the 'spirit of the race' or systems the mob/Pauline church opposes."}, {"text": "Luther, Calvin, and Wesley.", "isCorrect": true, "rationale": "Mencken lists these men as the modern spiritual descendants of Paul, whom he calls the 'arch-theologian of the mob.'"}, {"text": "Barnum, Bryan, and Cagliostro.", "isCorrect": false, "rationale": "Mencken uses these names to illustrate the mob's tendency to rush from one 'mountebank' or 'scoundrel' to another, but they are not the theological heirs of Paul."}]}, {"question": "What is the 'central virtue' of the mob in Christendom that Mencken rhetorically questions before dismissing?", "options": [{"text": "Their tireless brute labor.", "isCorrect": false, "rationale": "Mencken mentions their labor earlier, but the specific 'central virtue' he addresses in the second part of the text is religious in nature."}, {"text": "Their 'simple piety' and 'fidelity to the faith.'", "isCorrect": true, "rationale": "Mencken mocks this perceived virtue by asking 'What faith?', leading into his critique of Pauline Christianity."}, {"text": "Their ability to create 'durable values.'", "isCorrect": false, "rationale": "Mencken actually claims that durable values are created 'against [the mob's] opposition.'"}, {"text": "Their instinct for identifying 'mountebanks.'", "isCorrect": false, "rationale": "The text states that the mob's heroes are 'mainly scoundrels' and the credo they follow is the invention of 'mountebanks.'"}]}, {"question": "How does Mencken describe the ethical system proposed by Christ?", "options": [{"text": "A discordant and nonsensical code borrowed from Asia Minor.", "isCorrect": false, "rationale": "This description is applied by Mencken to the system created by Paul, not Christ."}, {"text": "A reduction of the duties of man to the 'duties of a gentleman.'", "isCorrect": true, "rationale": "Mencken contrasts Christ's 'simple and magnificent' ethical requirements with the 'comfortable balderdash' favored by the mob."}, {"text": "A set of 'insane damnations' used to terrorize the mob.", "isCorrect": false, "rationale": "The author attributes 'insane damnations' to the 'Christian mob-masters' who follow in the footsteps of Paul."}, {"text": "A system of 'preposterous magic' that made the mob tremble.", "isCorrect": false, "rationale": "Mencken associates 'preposterous magic' with the priests to whom the mob is a slave, which he distinguishes from Christ's system."}]}, {"question": "According to the text, what happened to Paul’s status within the church once it emerged from the catacombs?", "options": [{"text": "He was canonized as the first Pope to solidify the church’s political power.", "isCorrect": false, "rationale": "The text states that Peter was promoted to the Papacy post mortem, while Paul was 'thrown overboard' by the formalizing church."}, {"text": "He was 'thrown overboard' in favor of Peter as the church became more organized.", "isCorrect": true, "rationale": "Mencken uses the analogy of Methodists throwing Wesley overboard to describe how the emerging institutional church distanced itself from the 'prophet of the sewers.'"}, {"text": "He was elevated to the mystical dignity of 'Rock' during the feudal age.", "isCorrect": false, "rationale": "Mencken specifically identifies Peter, not Paul, as the one raised to the rank of 'Rock.'"}, {"text": "He became the primary advocate for a 'rational' version of Christianity.", "isCorrect": false, "rationale": "Mencken describes Paul's metaphysics as 'turgid and witless,' the opposite of rational."}]}, {"question": "What does Mencken claim is the mob's level of knowledge regarding 'what is worth knowing'?", "options": [{"text": "They possess an intuitive grasp of truth but lack the language to express it.", "isCorrect": false, "rationale": "The author argues they can 'grasp nothing true' and choose unsound ideas by compulsion."}, {"text": "They don't know it and don't want to know it.", "isCorrect": true, "rationale": "Mencken states plainly that the mob is indifferent to actual knowledge and that 'what [the mob] knows is not true.'"}, {"text": "They learn it slowly through the 'brute labor' they provide to the world.", "isCorrect": false, "rationale": "The text says the mob tries to evade labor and that their knowledge consists of the inventions of mountebanks."}, {"text": "They are taught it in public schools, though it is 'bogus' Christianity.", "isCorrect": false, "rationale": "Mencken suggests if people think modern Christianity is like Christ's system, then there should be 'better teaching' in schools, implying they are not currently taught what is worth knowing."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
