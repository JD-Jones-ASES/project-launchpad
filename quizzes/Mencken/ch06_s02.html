    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Mencken, what is the biological reality behind the 'civic virtue' of the democratic man?", "options": [{"text": "It is a product of glandular secretions and hormones rather than noble sentiment.", "isCorrect": true, "rationale": "The text explicitly states that Mencken reduces civic virtue to animal instinct and 'glandular secretions' or hormones."}, {"text": "It stems from a refined sense of 'Service' to the urban proletariat.", "isCorrect": false, "rationale": "Mencken dismisses 'Service' as a mere trapping used by political mountebanks to hide self-seeking motives."}, {"text": "It is an intellectual development resulting from the study of political theory.", "isCorrect": false, "rationale": "Mencken argues that the democratic man descends from theory into the body, focusing on instincts rather than intellect."}, {"text": "It is a manifestation of the soul as described by traditional poets.", "isCorrect": false, "rationale": "The author explicitly differentiates his view from the 'soul' or the 'thing that poets sing,' favoring an earthly, physiological explanation."}], "id": "q01"}, {"question": "How does Mencken distinguish the 'urban proletariat' from the 'yokel' or peasant?", "options": [{"text": "The urban proletariat includes those with the wit to escape the drudgery of rural life.", "isCorrect": true, "rationale": "Mencken considers the city proletariat 'appreciably superior' because it consists of 'intelligent yokels' who fled the farm."}, {"text": "The urban proletariat has successfully sublimated their anthropoid appetites into high art.", "isCorrect": false, "rationale": "Mencken claims their readers want 'no sublimation' and that their entertainment remains at a 'barnyard' level."}, {"text": "The urban proletariat is entirely immune to the influence of hormones in their middle teens.", "isCorrect": false, "rationale": "Mencken describes the adolescent as a 'vast geyser of hormones' regardless of their specific social class."}, {"text": "The urban proletariat maintains a stronger connection to primitive animism than the peasant.", "isCorrect": false, "rationale": "The text attributes 'primitive animism' and a belief in 'demons, witches and ghosts' specifically to the theology of the peasant."}], "id": "q02"}, {"question": "What does Mencken identify as the 'satirical fact of the first calibre' regarding infant development?", "options": [{"text": "The physiological phenomenon of tumescence can occur at birth.", "isCorrect": true, "rationale": "Mencken cites Dr. Watson's observation of this phenomenon as a satirical fact that reinforces the biological basis of later behavior."}, {"text": "Infants are born with a fully developed capacity for altruism.", "isCorrect": false, "rationale": "Mencken argues that the 'inferior man' never develops altruism, and infants are worthy of suspicion."}, {"text": "The brain reaches its peak development during the first year of life.", "isCorrect": false, "rationale": "The text suggests the brain ceases to develop later, specifically in the first years of the second decade."}, {"text": "Glandular development is dormant until the second decade of life.", "isCorrect": false, "rationale": "While glands 'unfold gloriously' in the teens, the text suggests biological drives exist even in the cradle."}], "id": "q03"}, {"question": "What is the primary motivation Mencken attributes to the 'inferior man's' cruelty toward heretics?", "options": [{"text": "A combination of congenital fear and an incapacity for imagination.", "isCorrect": true, "rationale": "Mencken states that fear is easily translated into cruelty and notes a 'deficiency in imagination' regarding the perspectives of others."}, {"text": "A deep-seated commitment to the principles of 'Service' and justice.", "isCorrect": false, "rationale": "Mencken explicitly claims concepts like justice and decency are 'eternally beyond' the inferior man."}, {"text": "A desire to protect the 'urban proletariat' from rural radicalism.", "isCorrect": false, "rationale": "Mencken notes that the inferior man marches against radicals who are actually trying to help him."}, {"text": "An intellectual need to refine complex metaphysical systems.", "isCorrect": false, "rationale": "Mencken describes the inferior man's mind as one that 'cannot formulate the concept of a good that is not his own good.'"}], "id": "q04"}, {"question": "Mencken views the 'progressivism' emanating from the farm as:", "options": [{"text": "A pursuit of private advantage under the guise of 'Service'.", "isCorrect": true, "rationale": "He describes it as 'bald self-seeking' that is merely 'swathed in the trappings of Service.'"}, {"text": "A noble attempt to establish 'common decency' between men.", "isCorrect": false, "rationale": "He asserts that the yokel's head has room for only one idea: that God regards him fondly while others are abandoned."}, {"text": "A sophisticated political theory intended to benefit the city man.", "isCorrect": false, "rationale": "Mencken claims the yokel rams home his advantage at the city man's expense and expects to be taxed to cover his own losses."}, {"text": "A movement to modernize the 'barnyard theology' of the South.", "isCorrect": false, "rationale": "He argues that peasant theology is intolerant and resistant to change, citing anti-evolution laws as proof."}], "id": "q05"}, {"question": "According to the text, what occurs to the 'inferior man' in the first years of his second decade?", "options": [{"text": "His brain ceases to develop while his glands begin to dominate his organism.", "isCorrect": true, "rationale": "Mencken writes that in his middle teens, the inferior man becomes a 'vast geyser of hormones' as brain development halts."}, {"text": "He begins to understand the 'sublimation' of physical love.", "isCorrect": false, "rationale": "The text states that the readers of tabloid news want 'no sublimation' and that love remains a physical matter."}, {"text": "His 'immortal soul' is finally freed from 'animal instinct'.", "isCorrect": false, "rationale": "Mencken argues that the adolescent yields to irresistible urges and 'loses his immortal soul' to harsh physiological terms."}, {"text": "He develops the capacity to appreciate poetry beyond 'barnyard' themes.", "isCorrect": false, "rationale": "Mencken contends that even the 'lofty' poetry of the inferior man is never far from the level of a rooster."}], "id": "q06"}, {"question": "Mencken describes the peasant as the 'sediment remaining in the filter.' What does this metaphor imply?", "options": [{"text": "They represent the lowest caste that fails to move forward with the stream of progress.", "isCorrect": true, "rationale": "Mencken views them as primeval leftovers who stay behind while more 'intelligent yokels' escape to the city."}, {"text": "They are the essential foundation upon which all social progress is built.", "isCorrect": false, "rationale": "Mencken's tone is critical, viewing them as 'clod-hoppers' rather than a necessary foundation."}, {"text": "They act as a necessary purification system for modern democratic states.", "isCorrect": false, "rationale": "The term 'sediment' in this context is derogatory, implying they are the undesirable waste left behind."}, {"text": "They represent the pure, 'raw human being' fresh from God's hands.", "isCorrect": false, "rationale": "While he mentions 'raw' humans at birth, he associates the peasant with 'dreadful drudgery' and 'barnyard theology'."}], "id": "q07"}, {"question": "According to the text, how does the 'inferior man' view the concept of a 'good'?", "options": [{"text": "He is entirely unable to formulate a concept of good that is not his own private advantage.", "isCorrect": true, "rationale": "Mencken explicitly states that the inferior man 'simply cannot formulate the concept of a good that is not his own good.'"}, {"text": "He defines it through the lens of 'common decency' and 'elemental justice'.", "isCorrect": false, "rationale": "Mencken argues that such concepts are 'eternally beyond him' and belong only to his superiors."}, {"text": "He seeks a communal good that balances city and rural needs.", "isCorrect": false, "rationale": "The text claims he rams home advantages against city men with 'relentless ferocity' and expects them to tax themselves for him."}, {"text": "He bases his idea of good on the 'new child psychology' and Freudian libido.", "isCorrect": false, "rationale": "While Mencken uses these theories to explain the man, the man himself is described as operating on 'elemental yearnings'."}], "id": "q08"}, {"question": "What role does the 'movie' or 'popular song' play in Mencken's analysis of the 'inferior man'?", "options": [{"text": "They reveal that his loftiest 'poetry' is essentially physical and 'barnyard' in nature.", "isCorrect": true, "rationale": "Mencken suggests these media reflect the content of the inferior man's sentiment, which is never far from animal instinct."}, {"text": "They serve as tools to educate the 'yokel' in the concepts of 'honor' and 'liberty'.", "isCorrect": false, "rationale": "Mencken believes these concepts are beyond the inferior man; the media he consumes lacks 'sublimation'."}, {"text": "They provide a necessary 'sublimation' of his anthropoid appetites.", "isCorrect": false, "rationale": "Mencken explicitly states that these readers 'want no sublimation and no symbolism'."}, {"text": "They are created by 'eminent psychologists' to improve civic virtue.", "isCorrect": false, "rationale": "He sarcastically refers to tabloid conductors as 'eminent psychologists' but claims they exploit the physical nature of their readers."}], "id": "q09"}, {"question": "In the context of the Scopes trial, what theory does Mencken say the 'peasant attorney-general' put forward?", "options": [{"text": "Anyone who dissents from rural theology is a scoundrel without civil rights.", "isCorrect": true, "rationale": "Mencken states the trial's theories were based on the idea that dissenters from 'barnyard theology' were scoundrels."}, {"text": "The evolution of the soul is driven by 'glandular secretions'.", "isCorrect": false, "rationale": "This is Mencken's own theory, whereas he describes the trial participants as clinging to 'barnyard theology'."}, {"text": "All men should be treated with 'elemental justice' regardless of belief.", "isCorrect": false, "rationale": "Mencken argues that the peasant mind is 'intolerant of heresy' and seeks to harass heretics."}, {"text": "The urban proletariat should be exempt from anti-evolution laws.", "isCorrect": false, "rationale": "The text focuses on the intolerance the peasant mind has for 'every man who dissents,' regardless of location."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
