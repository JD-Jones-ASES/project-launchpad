<script>
var QUESTIONS = [{"question": "Mencken's primary rhetorical strategy to bolster his argument about human intelligence involves:", "options": [{"text": "Directly quoting scientific studies and statistical data to prove his points.", "isCorrect": false, "rationale": "While Mencken uses the *language* and *methods* of natural science, the text states the 'data' is largely his own opinion dressed in empirical clothing. He does not primarily rely on actual scientific studies or statistical data."}, {"text": "Adopting the tone and vocabulary of natural science to present his conclusions as objective findings rather than opinions.", "isCorrect": true, "rationale": "The text explicitly states Mencken 'borrows the language and methods of natural science, presenting himself as a disinterested observer cataloguing specimens' and that 'by adopting the tone of the laboratory, he implies that his conclusions are not opinions but findings — not prejudice but data.'"}, {"text": "Using highly emotional and informal language to shock and entertain his audience.", "isCorrect": false, "rationale": "Mencken uses a 'detached, clinical' tone, which is the opposite of highly emotional. While he does use contempt, it's often framed within a scientific veneer, not always informal."}, {"text": "Engaging in direct debate with his critics, systematically refuting their arguments point by point.", "isCorrect": false, "rationale": "Mencken identifies his secondary targets but does not engage in a point-by-point refutation within this section; instead, he discredits their views through rhetorical means like calling their faith 'sentimental'."}]}, {"question": "According to the text, what is the rhetorical purpose of Mencken's mock-scientist persona and clinical tone?", "options": [{"text": "To demonstrate his extensive background and expertise in biological sciences.", "isCorrect": false, "rationale": "The text identifies his persona as a 'mock-scientist,' implying it's a stylistic choice rather than a reflection of actual scientific credentials. Its purpose is rhetorical, not to establish factual expertise."}, {"text": "To genuinely explore the biological basis of intelligence through an objective lens.", "isCorrect": false, "rationale": "The text clarifies that his scientific language is a 'rhetorical weapon' and a means to 'treats human beings as objects of study rather than as citizens with rights,' suggesting its primary aim is argumentative rather than genuine scientific exploration."}, {"text": "To objectify human beings, thereby performing 'half the argumentative work' before any explicit claims are made.", "isCorrect": true, "rationale": "The text directly states, 'The clinical tone is itself a rhetorical weapon: it treats human beings as objects of study rather than as citizens with rights, and that shift of register does half the argumentative work before a single claim is made.'"}, {"text": "To express his amusement and detachment from the political discourse of his time.", "isCorrect": false, "rationale": "While he is 'faintly amused by the specimens,' the primary rhetorical purpose of the clinical tone is deeper than mere amusement; it's a strategic argumentative move to objectify and de-legitimize his targets."}]}, {"question": "Which of the following best describes the influence of Friedrich Nietzsche on Mencken's division of humanity?", "options": [{"text": "Nietzsche's ideas led Mencken to advocate for a 'herd morality' where all individuals are equally valued.", "isCorrect": false, "rationale": "Nietzsche critiqued 'herd morality' and 'democratic egalitarianism' as 'slave moralities.' Mencken, influenced by Nietzsche, instead divided humanity into 'superior' and 'inferior' types, opposing egalitarianism."}, {"text": "Mencken adopted Nietzsche's concept of 'master' and 'slave' moralities, applying it to his own categories of 'superior' and 'inferior' human types.", "isCorrect": true, "rationale": "The text explicitly states that Nietzsche's 'critique of 'herd morality' profoundly influenced Mencken's thinking' and that Mencken's 'division of humanity into 'superior' and 'inferior' types echoes Nietzsche's categories.'"}, {"text": "Nietzsche provided Mencken with a scientific framework for classifying human intelligence based on biological markers.", "isCorrect": false, "rationale": "Nietzsche was a philosopher, not a natural scientist providing biological classification frameworks. Mencken borrowed scientific *language* for rhetorical effect, not specific biological science from Nietzsche."}, {"text": "Mencken used Nietzsche's philosophy to argue for the inherent competence of the common man.", "isCorrect": false, "rationale": "Mencken attacked the 'theory of democracy' and the idea that the 'vast majority are too stupid to govern themselves,' directly opposing the notion of inherent competence in the common man. Nietzsche's philosophy reinforced this view, not contradicted it."}]}, {"question": "Mencken's use of mock-Latin terms like 'Homo stultus' and the application of the Linnaean system to political arguments primarily serves to:", "options": [{"text": "Demonstrate his comprehensive classical education and linguistic prowess.", "isCorrect": false, "rationale": "While it shows a certain linguistic awareness, the text emphasizes its *rhetorical* function rather than mere display of education. It's about 'register mixing at its most aggressive,' lending a specific weight to his prejudices."}, {"text": "Create a humorous and satirical effect by deliberately misapplying scientific terminology.", "isCorrect": false, "rationale": "While there's humor and satire in Mencken, the text specifies that this 'lends his prejudices the weight of taxonomy' and gives his contempt 'a veneer of scientific respectability,' which is more about making his arguments seem legitimate than just being funny."}, {"text": "Lend a veneer of scientific objectivity and taxonomic authority to his subjective judgments and prejudices.", "isCorrect": true, "rationale": "The text states, 'Mencken coins or deploys mock-Latin terms... that lend his prejudices the weight of taxonomy' and specifically for 'Homo stultus,' it's 'using it to give his contempt a veneer of scientific respectability.'"}, {"text": "Simplify complex political concepts for a broader, less educated audience.", "isCorrect": false, "rationale": "Using mock-Latin and scientific classification would likely make concepts more obscure, not simpler, for a general audience. His goal is to elevate his opinions, not simplify them."}]}, {"question": "Which statement best characterizes Mencken's typical sentence structure in this section and its rhetorical effect?", "options": [{"text": "He primarily uses short, declarative sentences to deliver blunt, straightforward conclusions.", "isCorrect": false, "rationale": "While Mencken *does* use devastating short sentences, the text notes these often come 'after a long build-up' and are a 'signature move,' implying they are not his *primary* or typical sentence structure, which tends toward 'long and cataloguing.'"}, {"text": "He employs a cumulative style with long sentences and subordinate clauses to mimic scientific argument and marshal 'data' before presenting a verdict.", "isCorrect": true, "rationale": "The text states, 'Mencken's sentences in this section tend toward the long and cataloguing. He piles up evidence, example upon example, in sentences that swell with subordinate clauses... This cumulative style mimics the form of scientific argument.'"}, {"text": "He uses a question-and-answer format to engage the reader in a direct dialogue about democratic theory.", "isCorrect": false, "rationale": "There is no mention of Mencken using a question-and-answer format in this section. His style is characterized by declarations and cumulative arguments."}, {"text": "He prefers simple, compound sentences to ensure clarity and accessibility for all readers.", "isCorrect": false, "rationale": "The description of 'long and cataloguing' sentences 'that swell with subordinate clauses' suggests a style far more complex than simple, compound sentences, and his tone often works against accessibility for those he targets."}]}, {"question": "The text identifies the dominant figure of speech in this section as an extended metaphor. What is this metaphor and its central implication?", "options": [{"text": "Humanity as a complex machine, implying that individuals can be optimized for specific societal functions.", "isCorrect": false, "rationale": "While society might be seen as a machine, the text clearly identifies the metaphor as 'humanity as a zoological collection,' not a machine."}, {"text": "Humanity as a battleground, suggesting an ongoing conflict between different ideological factions.", "isCorrect": false, "rationale": "Conflict is present in Mencken's argument, but the core extended metaphor is not military or combative in its imagery; it's one of scientific classification."}, {"text": "Humanity as a zoological collection, which treats human intelligence as a classification problem and individuals as specimens to be sorted and labeled.", "isCorrect": true, "rationale": "The text explicitly defines the extended metaphor: 'The dominant figure in this section is the extended metaphor of humanity as a zoological collection.' It further explains this involves 'treating human intelligence as a classification problem and the democratic electorate as a set of specimens to be sorted and labelled.'"}, {"text": "Humanity as a theatrical play, where individuals merely act out pre-determined roles.", "isCorrect": false, "rationale": "There is no textual support for a theatrical metaphor. The focus is on scientific observation and classification."}]}, {"question": "In the simile 'a sort of insensate sweating, like that of a kidney,' what is the primary analytical point the text makes about Mencken's rhetorical technique?", "options": [{"text": "It highlights the sophisticated biological understanding Mencken possesses regarding human physiology.", "isCorrect": false, "rationale": "The text emphasizes the rhetorical rather than scientific function, stating it 'reduces human thought to a bodily secretion' and that the progression is 'from clinical to crude,' not demonstrating sophisticated understanding but rather using biological imagery for disparagement."}, {"text": "It underscores the vital, albeit often overlooked, functions of the human body in democratic participation.", "isCorrect": false, "rationale": "The simile's purpose is reductive and dismissive, not to highlight vital functions. It reduces thought to 'mindless work' and 'excretion,' carrying a 'class implication' of inferiority."}, {"text": "It uses register mixing to reduce human thought to a mindless, unconscious biological process, thereby devaluing it.", "isCorrect": true, "rationale": "The text explains, 'The simile reduces human thought to excretion. The word insensate removes consciousness from the equation entirely: this is not thinking but biological process.' It's an example of 'register mixing at its most aggressive' from clinical to crude."}, {"text": "It suggests that deep thought is a strenuous and exhausting activity for all individuals, regardless of their intelligence.", "isCorrect": false, "rationale": "The simile applies to 'minds which never get any further,' implying that for these minds, mental activity is primitive and without consciousness, not merely strenuous."}]}, {"question": "Regarding the sentence, 'There are minds which start out with a superior equipment... like that of a kidney,' what does the close reading reveal about its rhetorical function at its specific placement?", "options": [{"text": "It serves as a logical conclusion to several paragraphs of evidence Mencken has already presented.", "isCorrect": false, "rationale": "The close reading explicitly states, 'It arrives near the beginning of the section, before Mencken has offered any evidence for his claims. The sentence does not conclude an argument; it announces one.'"}, {"text": "It's an example of Mencken's rare moments of objective and balanced judgment.", "isCorrect": false, "rationale": "While the syntax is balanced, the content is 'devastating' and 'announces' an argument rather than offering objective judgment. The teacher's note also stresses distinguishing rhetoric from objectivity."}, {"text": "It functions as a powerful rhetorical announcement of his argument, persuading the reader through vivid language before logical evidence is presented.", "isCorrect": true, "rationale": "The close reading states, 'The sentence does not conclude an argument; it announces one, and it announces it in language so vivid that the reader is half-persuaded before the argument has even begun. This is rhetoric doing the work that logic has not yet started.'"}, {"text": "It highlights Mencken's eventual softening of his stance on human equality through antithesis.", "isCorrect": false, "rationale": "Mencken's stance does not soften; the antithesis serves to starkly contrast his 'superior' and 'inferior' types, reinforcing his argument against equality, not softening it."}]}, {"question": "According to the 'wordwatch' section, Mencken's use of the term 'pedagogue' throughout *Notes on Democracy* is consistently employed with:", "options": [{"text": "Neutrality, as a factual descriptor for the teaching profession.", "isCorrect": false, "rationale": "The wordwatch states 'pedagogue — a teacher, used with consistent contempt throughout Notes on Democracy.'"}, {"text": "Admiration for those dedicated to public education.", "isCorrect": false, "rationale": "The wordwatch states it's used with 'consistent contempt,' directly contradicting admiration."}, {"text": "Contempt, symbolizing the 'democratic delusion' that universal education can overcome inherent inequalities.", "isCorrect": true, "rationale": "The wordwatch explicitly states it's 'used with consistent contempt' and explains, 'For Mencken, the pedagogue represents the democratic delusion that everyone can be educated.'"}, {"text": "Irony, implying that teachers are secretly the true intellectual elites.", "isCorrect": false, "rationale": "Mencken uses the word with 'contempt,' not irony that would elevate teachers. His 'contempt' is genuine for what they represent to him."}]}, {"question": "Based on the 'teachernote,' what is the most crucial critical thinking skill for students to develop when analyzing Mencken's work in this section?", "options": [{"text": "The ability to identify and agree with the logical consistency of Mencken's arguments.", "isCorrect": false, "rationale": "The teachernote asks students to question 'Is Mencken's argument persuasive because it is true, or because his language makes it feel true?' This implies a need to critically evaluate logic, not just agree with it."}, {"text": "Distinguishing between the rhetorical power of an argument and its logical validity or truth.", "isCorrect": true, "rationale": "The teachernote directly poses the question: 'Is Mencken's argument persuasive because it is true, or because his language makes it feel true? What would happen to his case if we stripped away the scientific vocabulary and the vivid similes?' It concludes, 'This question — whether rhetorical power and logical validity are the same thing — is central to the course.'"}, {"text": "Recognizing Mencken's historical importance as a pioneering figure in scientific classification.", "isCorrect": false, "rationale": "The text positions Mencken as using 'mock-scientific' methods for rhetorical purposes, not as a genuine scientific pioneer. The focus is on *how* he argues, not his scientific contributions."}, {"text": "Summarizing Mencken's main arguments about human intelligence in their own words.", "isCorrect": false, "rationale": "While comprehension is important, the teachernote emphasizes a higher-order critical thinking skill: evaluating the *relationship* between rhetoric and truth, not just summarizing the arguments."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
