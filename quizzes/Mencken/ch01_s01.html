<script>
var QUESTIONS = [{"question": "Which of the following best describes the primary motivation behind H.L. Mencken's lifelong commitment to writing, as stated in the text?", "options": [{"text": "To express personal grievances stemming from an unhappy childhood.", "isCorrect": false, "rationale": "The text explicitly states his childhood was 'almost absurdly happy' and that 'He did not write out of personal grievance.'"}, {"text": "To articulate his deep satisfaction with the social norms and political landscape of his era.", "isCorrect": false, "rationale": "Mencken was known for his critical and often 'outrageous' style, and his dispatches savaged figures like William Jennings Bryan, indicating dissatisfaction, not satisfaction, with aspects of his era."}, {"text": "To challenge and critique the world around him because it offended his intellectual sensibilities.", "isCorrect": true, "rationale": "The text clearly states, 'He wrote because the world offended his intelligence,' linking his intellectual perspective to his motivation for writing."}, {"text": "To follow in his father's footsteps, who was also a prominent writer and critic.", "isCorrect": false, "rationale": "His father, August Mencken, was a 'prosperous tobacco merchant,' and wanted his son to enter the cigar business, not journalism."}]}, {"question": "Mencken's early career demonstrated a strong drive and quick ascent in the journalism field. What was the pivotal event that directly enabled him to pursue his desired career path?", "options": [{"text": "He successfully convinced his father to support his writing ambitions immediately after graduating.", "isCorrect": false, "rationale": "His father wanted him to enter the cigar business, not support his writing ambition. Mencken started his career after his father's death."}, {"text": "He was offered a prestigious position at the Baltimore Sun right after completing his formal education.", "isCorrect": false, "rationale": "Mencken first joined the Baltimore Morning Herald and moved to the Baltimore Sun in 1906, ten years after graduating."}, {"text": "The death of his father allowed him to disregard family expectations and seek a job in journalism.", "isCorrect": true, "rationale": "The text states his father wanted him in the cigar business, and 'When August Mencken died in January 1899, his son walked into the offices of the Baltimore Morning Herald the following month and asked for a job,' directly linking his father's death to his career start."}, {"text": "He founded his own newspaper, 'The American Mercury,' which launched his career.", "isCorrect": false, "rationale": "The American Mercury was founded in 1924, long after he began his journalism career in 1899."}]}, {"question": "Mencken's coverage of the Scopes Trial in 1925 is highlighted as his 'most famous piece of reporting.' Which analytical observation best explains why this reporting was so celebrated?", "options": [{"text": "His dispassionate and objective reporting accurately presented both sides of the evolution debate without bias.", "isCorrect": false, "rationale": "The text describes his dispatches as 'savaged William Jennings Bryan and the anti-evolution movement' with 'ferocity,' indicating a highly biased and passionate approach, not dispassionate objectivity."}, {"text": "He managed to secure an exclusive interview with William Jennings Bryan that altered the trial's outcome.", "isCorrect": false, "rationale": "The text does not mention an exclusive interview; it focuses on his critical commentary and 'savaging' Bryan's stance."}, {"text": "His unique blend of sharp humor and profound moral indignation against what he saw as intellectual backwardness resonated widely.", "isCorrect": true, "rationale": "The text states his dispatches 'combined devastating wit with genuine moral outrage against what he considered organized ignorance,' which directly aligns with this option."}, {"text": "He successfully advocated for the conviction of John T. Scopes, upholding traditional values.", "isCorrect": false, "rationale": "Mencken was a critic of the anti-evolution movement, implying he was against the prosecution's stance, not for it. His outrage was 'against what he considered organized ignorance,' referring to the anti-evolution side."}]}, {"question": "According to the 'personbox' description, what aspect of H.L. Mencken's prose style 'set the standard for American cultural criticism'?", "options": [{"text": "Its concise, minimalist approach to complex social issues.", "isCorrect": false, "rationale": "The description uses terms like 'flamboyant,' 'aggressive,' and 'deliberately outrageous,' which contradict a minimalist or concise approach."}, {"text": "Its scholarly, academic tone that avoided any personal opinion or satire.", "isCorrect": false, "rationale": "While 'learned,' his style was also 'satirist' and 'deliberately outrageous,' clearly indicating personal opinion and satire, not avoidance of it."}, {"text": "Its flamboyant, aggressive, learned, and intentionally provocative nature.", "isCorrect": true, "rationale": "The 'personbox' explicitly lists these four adjectives ('flamboyant, aggressive, learned, and deliberately outrageous') as characterizing his prose style."}, {"text": "Its focus on reporting factual events with strict journalistic neutrality.", "isCorrect": false, "rationale": "He was a 'cultural critic' and 'satirist,' known for 'opinion columns,' which are not characterized by strict neutrality."}]}, {"question": "Which of the following roles or achievements is NOT attributed to H.L. Mencken in the provided text?", "options": [{"text": "Founding 'The American Mercury'.", "isCorrect": false, "rationale": "The 'personbox' states he 'founded The American Mercury (1924).'"}, {"text": "Serving as a diplomat for the United States government.", "isCorrect": true, "rationale": "The text mentions his roles as a journalist, editor, satirist, and cultural critic, but there is no mention of him ever serving as a diplomat."}, {"text": "Authoring 'The American Language'.", "isCorrect": false, "rationale": "The 'personbox' lists 'The American Language (1919)' as one of his major works."}, {"text": "Serving as city editor for the Baltimore Morning Herald.", "isCorrect": false, "rationale": "The text states, 'Within four years he was city editor' at the Baltimore Morning Herald after starting there in 1899."}]}, {"question": "How did the death of his wife, Sara Haardt, significantly impact H.L. Mencken, as portrayed in the text?", "options": [{"text": "It caused him to withdraw from public life and cease writing for several years.", "isCorrect": false, "rationale": "The text states he 'continued writing through the 1930s and 1940s,' indicating he did not cease writing, even though his influence waned later."}, {"text": "It deepened his existing sentimentality, leading him to write more emotionally charged pieces.", "isCorrect": false, "rationale": "The text notes his 'lifelong hostility to sentimentality' and that 'Mencken was not a man given to public displays of grief,' making this unlikely."}, {"text": "It marked a profound personal tragedy that noticeably hardened his demeanor, despite his private nature.", "isCorrect": true, "rationale": "The text refers to it as 'the great personal tragedy of Mencken's life' and observes that 'something hardened in him after Sara's death,' recognized by those close to him."}, {"text": "It inspired him to write a series of biographical works about her life.", "isCorrect": false, "rationale": "The text states 'He rarely spoke of it afterward,' suggesting he did not dwell on it publicly through his writing."}]}, {"question": "What profound irony characterized the final years of Mencken's life after his stroke in 1948?", "options": [{"text": "Despite his fame, he died in relative obscurity, having lost all public influence.", "isCorrect": false, "rationale": "While his influence 'had begun to wane,' the primary irony highlighted relates to his physical condition, not just his public influence."}, {"text": "A man whose existence revolved around the written word was rendered unable to read or write.", "isCorrect": true, "rationale": "The text explicitly states his stroke 'left him unable to read or write — a punishment of almost mythic cruelty for a man whose entire existence was built around the written word,' highlighting this central irony."}, {"text": "He became an ardent supporter of the very religious fundamentalism he had once fiercely criticized.", "isCorrect": false, "rationale": "The text does not suggest any such change in his intellectual or political stances after his stroke."}, {"text": "He, a fervent critic of Baltimore, was forced to leave the city he loved in his final years.", "isCorrect": false, "rationale": "The text states he 'refuse[d] to leave' Baltimore and 'lived on for seven more years... in the Hollins Street rowhouse where he had spent most of his life,' meaning he remained in Baltimore."}]}, {"question": "The text mentions Mencken's 'absurdly happy' childhood and his 'lifelong hostility to sentimentality.' How do these two seemingly contradictory aspects of his life connect to his writing motivation?", "options": [{"text": "His happy childhood instilled a sense of entitlement that fueled his critical views.", "isCorrect": false, "rationale": "The text links his writing to the 'world offended his intelligence,' not to a sense of entitlement from his childhood."}, {"text": "His personal happiness meant his critiques stemmed from intellectual objection rather than personal suffering or grievance.", "isCorrect": true, "rationale": "The text directly connects these by stating his happy childhood 'makes his lifelong hostility to sentimentality all the more striking' and clarifies, 'He did not write out of personal grievance. He wrote because the world offended his intelligence.' This shows his intellectual motivation was separate from personal suffering."}, {"text": "He adopted hostility to sentimentality as a defense mechanism to cope with early childhood trauma.", "isCorrect": false, "rationale": "The text describes his childhood as 'absurdly happy,' contradicting any notion of early trauma."}, {"text": "His happy childhood enabled him to overlook the suffering of others, leading to his detached, critical style.", "isCorrect": false, "rationale": "While critical, his outrage at the Scopes Trial was 'genuine moral outrage,' indicating he was not detached from others' suffering when it offended his intelligence."}]}, {"question": "Mencken was known as 'the Sage of Baltimore.' Based on the entire section, what does this epithet primarily signify about his life and career?", "options": [{"text": "His vast personal fortune and philanthropy in his hometown of Baltimore.", "isCorrect": false, "rationale": "The text mentions his father was a 'prosperous tobacco merchant' but does not describe Mencken himself as wealthy or philanthropic; 'Sage' refers to wisdom and influence, not financial status."}, {"text": "His role as a reclusive intellectual who rarely engaged with the public or left his city.", "isCorrect": false, "rationale": "He covered 'national political conventions, presidential campaigns, and the great public controversies' and had 'widely read opinion columns,' indicating extensive public engagement."}, {"text": "His profound intellectual influence, extensive writing, and deep, often critical, connection to his native city.", "isCorrect": true, "rationale": "The text calls him 'the most influential American literary journalist' and highlights his continuous residence in Baltimore, a city he would 'love, mock, defend, and refuse to leave,' signifying both intellectual prowess ('Sage') and a strong local attachment."}, {"text": "His academic career as a professor at a prominent Baltimore university.", "isCorrect": false, "rationale": "Mencken's formal education ended at age 16, and his career was in journalism and criticism, not academia."}]}, {"question": "The Sunpapers provided Mencken with 'a platform and a kind of home base.' How did this relationship contribute significantly to his impact during his most influential period?", "options": [{"text": "It allowed him to exclusively publish his major literary works like 'The American Language' through their publishing arm.", "isCorrect": false, "rationale": "The Sunpapers were newspapers; his major works were separate books. They provided a journalistic platform, not book publishing for his major works."}, {"text": "It gave him a consistent, high-profile outlet to disseminate his opinion columns and critical reporting to a national audience.", "isCorrect": true, "rationale": "The text notes his 'Monday Articles' became 'one of the most widely read opinion columns in America' and that he covered major national events, showing the Sunpapers as a crucial platform for his widespread influence."}, {"text": "It funded his extensive travels abroad, which informed his cultural criticisms.", "isCorrect": false, "rationale": "The text focuses on his coverage of national events and controversies within America, not international travel funded by the papers."}, {"text": "It offered him a secure administrative role, freeing him from the pressures of daily journalism.", "isCorrect": false, "rationale": "He was 'city editor' and covered major events, indicating an active journalistic role, not an administrative one that freed him from daily pressures."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
