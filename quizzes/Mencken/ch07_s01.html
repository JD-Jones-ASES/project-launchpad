        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Mencken's analysis, what is the 'philosophical core' of democracy?", "options": [{"text": "A political system built on universal justice and self-governance.", "isCorrect": false, "rationale": "Mencken explicitly argues that democracy is not a political system but a philosophy of envy."}, {"text": "A philosophy of envy driven by the resentment of the inferior toward the superior.", "isCorrect": true, "rationale": "Mencken posits that democratic moralism is actually the disguised envy of those who want what their 'betters' possess."}, {"text": "A social contract intended to protect the individual liberty of the farmer.", "isCorrect": false, "rationale": "The text states the 'inferior man' does not actually want liberty, but rather what others have."}, {"text": "An American adaptation of Christian asceticism and humility.", "isCorrect": false, "rationale": "While Nietzsche linked Christianity to slave morality, Mencken focuses on democracy as a specific expression of envy rather than pure asceticism."}]}, {"question": "Which Nietzschean concept serves as the intellectual framework for Mencken's critique of the American 'yokel'?", "options": [{"text": "Master morality", "isCorrect": false, "rationale": "Master morality represents the values of the strong, which the subject of Mencken's critique lacks."}, {"text": "The Will to Power", "isCorrect": false, "rationale": "While a Nietzschean concept, the text specifically identifies 'ressentiment' as the core influence here."}, {"text": "Ressentiment", "isCorrect": true, "rationale": "This term describes the disguised envy the weak feel toward the strong, leading them to declare the strong 'evil' and their own deprivation 'virtuous.'"}, {"text": "The Eternal Recurrence", "isCorrect": false, "rationale": "This is a Nietzschean metaphysical concept not discussed in the provided analysis of Mencken's rhetorical context."}]}, {"question": "How does Mencken's use of the word 'glabella' function within his rhetorical strategy?", "options": [{"text": "It serves as a euphemism to soften the harsh description of the farmer's physical labor.", "isCorrect": false, "rationale": "The word is clinical rather than softening; it actually heightens the absurdity of the scene."}, {"text": "It creates a register collision by applying clinical, medical precision to a squalid barnyard scene.", "isCorrect": true, "rationale": "By using an anatomical term for a farmer's headache, Mencken juxtaposes high-level vocabulary with a low-level environment for comic effect."}, {"text": "It is used hyperbolically to suggest the farmer has superhuman intellectual capacity.", "isCorrect": false, "rationale": "The term is used to describe a headache in a comic context, not to elevate the farmer's intellect."}, {"text": "It represents a shift toward a purely journalistic and objective reporting style.", "isCorrect": false, "rationale": "The note in the text clarifies that Mencken's portrait is caricature, not objective journalism."}]}, {"question": "In the 'barn-door' passage, what does the cabaret represent in the metaphor of ressentiment?", "options": [{"text": "A realistic goal that the farmer could achieve through hard work.", "isCorrect": false, "rationale": "The text emphasizes that these pleasures are 'unreachable' for the farmer."}, {"text": "The source of the farmer's genuine religious enlightenment.", "isCorrect": false, "rationale": "The cabaret represents the 'sins' the farmer condemns, but only because he cannot enjoy them."}, {"text": "The unreachable desires that the farmer transforms into 'sin' through democratic moralism.", "isCorrect": true, "rationale": "The cabaret contains the values and pleasures the farmer envies and subsequently declares evil to maintain his own sense of virtue."}, {"text": "A symbol of the 'slave morality' that Mencken wishes to popularize.", "isCorrect": false, "rationale": "The cabaret represents the 'master' or strong values of independence and pleasure that the 'slave' moralist rejects."}]}, {"question": "Mencken utilizes a specific syntactic 'signature move' in the barn-door passage. What is it?", "options": [{"text": "A series of short, choppy fragments that mimic the rhythm of farm labor.", "isCorrect": false, "rationale": "Mencken actually uses long, lyrical build-ups rather than fragments for the build-up."}, {"text": "A long, mock-lyrical build-up followed by a devastatingly flat, short sentence.", "isCorrect": true, "rationale": "The transition from the 'whirling spangles' to the 'heaving of manure' creates a rhythmic crash that underscores the thematic fall."}, {"text": "The use of the passive voice to distance the farmer from his own actions.", "isCorrect": false, "rationale": "Mencken's prose is highly active and energetic, even when describing the farmer's misery."}, {"text": "Consistently avoiding rhetorical questions to maintain a philosophical distance.", "isCorrect": false, "rationale": "The text explicitly highlights Mencken's use of a 'rhetorical question series' as a striking syntactic feature."}]}, {"question": "What is the primary difference in Mencken's characterization of the rural farmer versus the urban proletarian?", "options": [{"text": "The farmer is portrayed as analytical, while the city worker is seen as a comic novelist.", "isCorrect": false, "rationale": "This reverses the text's description of Mencken's own tone shifts when discussing the two groups."}, {"text": "The farmer's envy is raw and violent, whereas the city worker's envy is managed and sublimated.", "isCorrect": true, "rationale": "Mencken argues that the urban welfare state ('panem et circenses') keeps the city worker docile and content, unlike the isolated farmer."}, {"text": "The city worker is a Prohibitionist by conscience, while the farmer is 'antinomian.'", "isCorrect": false, "rationale": "The farmer is the Prohibitionist; 'antinomianism' (rejection of moral law) is associated with the city women."}, {"text": "The farmer is close to luxury, while the city worker is doomed to 'unmitigated monogamy.'", "isCorrect": false, "rationale": "The city worker is close to luxury (the 'frou-frou'), and Mencken applies the 'monogamy' comment specifically to farmers."}]}, {"question": "What does the term 'panem et circenses' suggest about Mencken's view of the American welfare state?", "options": [{"text": "It represents the pinnacle of democratic justice and equality.", "isCorrect": false, "rationale": "Mencken uses the term ironically to describe a method of social control rather than a just system."}, {"text": "It describes a system designed to keep the populace docile through free services.", "isCorrect": true, "rationale": "Translated as 'bread and circuses,' it refers to the Roman practice of providing food and entertainment to prevent rebellion."}, {"text": "It refers to the religious festivals held by the Iowa farmers.", "isCorrect": false, "rationale": "The term is used specifically in the passage regarding the city proletarian, not the rural farmer."}, {"text": "It is a medical term for the 'glabella' headaches suffered by the working class.", "isCorrect": false, "rationale": "This confuses a Latin phrase for social control with a medical term for anatomy."}]}, {"question": "Mencken uses the word 'sackbuts' to achieve what effect in his prose?", "options": [{"text": "To provide a literal description of the instruments played in 1920s Chicago.", "isCorrect": false, "rationale": "Sackbuts are Renaissance instruments; their use here is stylized and archaic, not literal."}, {"text": "To heighten the 'mock-poetic' nature of the farmer's unreachable cabaret dream.", "isCorrect": true, "rationale": "The archaic word adds a layer of absurd romance to the farmer's longing for things he doesn't understand."}, {"text": "To accurately categorize the musical tastes of the 'slatternly wife.'", "isCorrect": false, "rationale": "The wife is rounding up pigs, not engaging with Renaissance brass instruments."}, {"text": "To simplify the philosophical argument for a general American audience.", "isCorrect": false, "rationale": "The use of archaic and rare vocabulary actually complicates the register rather than simplifying it."}]}, {"question": "How is the 'cumulative sentence' used to describe the city proletarian's life?", "options": [{"text": "It piles benefit upon benefit to ironically portray the citizen as a 'hog in a comfortable sty.'", "isCorrect": true, "rationale": "The weight of the enumeration—dentists, oculists, free lunches—suggests that the worker is being managed like livestock."}, {"text": "It lists the farmer's chores to show the physical toll of rural life.", "isCorrect": false, "rationale": "The cumulative sentence is identified specifically as the mode for the 'proletarian passage' rather than the barn scene."}, {"text": "It provides a scientific defense of the statistics regarding Prohibition.", "isCorrect": false, "rationale": "The list is designed for comic and ironic effect, not for scientific accuracy."}, {"text": "It breaks down the complex French quotations into simple English.", "isCorrect": false, "rationale": "The cumulative sentence structure is about listing social services, not translating French literature."}]}, {"question": "What is meant by the phrase 'a Prohibitionist by conscience, doubly-riveted and immovable'?", "options": [{"text": "The farmer is logically convinced that alcohol is medically dangerous.", "isCorrect": false, "rationale": "The text suggests his position is a 'psychological necessity' rather than a logical one."}, {"text": "The farmer's moral conviction is a psychological armor against his own envy.", "isCorrect": true, "rationale": "The conviction is 'riveted' because it is rooted in his need to justify his deprivation as a virtue."}, {"text": "The farmer has literal metal rivets on his barn door to prevent theft.", "isCorrect": false, "rationale": "This is a literal interpretation of a metaphor used to describe the farmer's psychological state."}, {"text": "The city worker's contentment is bolted in place by high wages.", "isCorrect": false, "rationale": "This phrase is used to describe the farmer in the 'barn-door' scene, not the city worker."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
