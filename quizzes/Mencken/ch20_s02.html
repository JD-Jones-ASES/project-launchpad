<body>

        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 20, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In Mencken's critique of Nietzsche, how does he modify the concept of the \"will-to-power\" to better describe the \"common man\"?", "options": [{"text": "He argues it should be viewed as a will-to-peace, specifically the ignominious security of a well-managed prison.", "isCorrect": true, "rationale": "Mencken asserts that on lower levels, the drive is not for power or free function, but for a simple, safe, and subservient peace."}, {"text": "He suggests it is actually a will-to-truth, which the common man pursues through democratic science.", "isCorrect": false, "rationale": "Mencken explicitly states the common man's love of truth is 'almost wholly imaginary' and secondary to the desire for safety."}, {"text": "He claims Nietzsche's will-to-power is accurate but only for the 'small and disreputable minority.'", "isCorrect": false, "rationale": "While Mencken agrees that only a minority understands liberty, he specifically targets Nietzsche's application of the 'will-to-power' to all men, including the common man."}, {"text": "He replaces it with a will-to-equality, where the common man seeks to pull the superior individual down to his level.", "isCorrect": false, "rationale": "Though pulling down the superior individual is a result of democracy, Mencken identifies the primary underlying drive as a 'will-to-peace' rather than equality for its own sake."}]}, {"question": "According to the text, what is the 'average man's' psychological reaction to the prospect of actual liberty?", "options": [{"text": "He feels uncomfortable, alarmed, and lonely, preferring the 'smell of the herd.'", "isCorrect": true, "rationale": "Mencken argues that the average man finds the isolation and responsibility of liberty to be a source of distress rather than happiness."}, {"text": "He views it as an essential tool for achieving social and economic mobility.", "isCorrect": false, "rationale": "This reflects a standard democratic ideal that Mencken explicitly dismisses as a delusion or an imaginary love."}, {"text": "He experiences a 'drug-store sort of yearning' for it that is suppressed by government.", "isCorrect": false, "rationale": "This is the view Mencken attributes to Nietzsche's misunderstanding, which Mencken claims is incorrect regarding the 'lower levels' of humanity."}, {"text": "He regards it as a sacred right that must be defended against the 'herdsman.'", "isCorrect": false, "rationale": "Mencken states the common man is 'willing to take the herdsman' along with the herd to ensure his safety."}]}, {"question": "Mencken identifies three specific protections a policeman offers the common man. Which of these does he claim is most 'esteemed' under a democracy?", "options": [{"text": "Protection from himself.", "isCorrect": true, "rationale": "The text highlights the democratic invention of protecting 'human camels' from their own potential vices, like smoking opium or ruining themselves in night clubs."}, {"text": "Protection from his superiors.", "isCorrect": false, "rationale": "While Mencken lists this as a service, he identifies the 'last service' (protection from self) as the one most esteemed in democracy."}, {"text": "Protection from his equals.", "isCorrect": false, "rationale": "Mencken includes this in the list of services the 'charlatan' policeman offers, but it is not the service he emphasizes as most valued in the U.S. context."}, {"text": "Protection of his private property.", "isCorrect": false, "rationale": "The text focuses on protection from social/personal ruin rather than specific economic protections like property rights."}]}, {"question": "How does Mencken distinguish the democratic dread of heresy from the stability of a traditional despotism?", "options": [{"text": "A despot is secure in his self-belief, whereas democracies are easily demoralized by dissent and must crush the heretic.", "isCorrect": true, "rationale": "Mencken argues that democracy's lack of internal certainty makes it more fearful of and hostile toward 'free spirits' than a ruler like Frederick the Great."}, {"text": "Democracies encourage dissent to foster 'gross dissents,' whereas despots permit no such variety.", "isCorrect": false, "rationale": "The text states the opposite: Frederick the Great (a despot) permitted dissent that would be 'unimaginable' for a democracy to submit to."}, {"text": "Despotism relies on the 'lex de majestate' to protect the state, while democracy abandons such legal protections.", "isCorrect": false, "rationale": "Mencken points out that the 'lex de majestate' was actually an invention of the 'tribune of the people,' making it democratic in origin."}, {"text": "Democracies are safer because the mob is easily 'held' once it is on the loose.", "isCorrect": false, "rationale": "Mencken explicitly warns that 'once the mob is on the loose, there is no holding it,' necessitating the preemptive suppression of the heretic."}]}, {"question": "What is the primary function of the democratic process regarding the 'superior individual,' as described by Mencken?", "options": [{"text": "To break free spirits to the 'common harness' and reduce them to the level of common men.", "isCorrect": true, "rationale": "Mencken views democracy as a mechanism for 'ironing out' exceptional individuals and making them 'docile John Does.'"}, {"text": "To provide the superior individual with a platform to lead the 'have-nots.'", "isCorrect": false, "rationale": "The text suggests democracy aims to 'pump them dry of self-respect' rather than provide them with leadership platforms."}, {"text": "To augment the liberty of the individual to its highest civilizational potential.", "isCorrect": false, "rationale": "Mencken argues that if the goal of government is to preserve liberty, democracy accomplishes it 'less efficiently than any other form.'"}, {"text": "To protect the aristocrat from the 'lex de majestate.'", "isCorrect": false, "rationale": "Mencken claims the 'lex de majestate' was actually used *against* aristocrats to protect the state."}]}, {"question": "Mencken suggests that the 'only sort of liberty that is real under democracy' is which of the following?", "options": [{"text": "The liberty of the 'have-nots' to destroy the liberty of the 'haves.'", "isCorrect": true, "rationale": "The text concludes Section III.1 by stating that democratic liberty is effectively a tool for the masses to erode the freedom of the superior minority."}, {"text": "The liberty to 'be true to your nature' as suggested by Emerson.", "isCorrect": false, "rationale": "Mencken argues that democracy is a history of efforts to force minorities to be *untrue* to their nature."}, {"text": "The liberty to 'denounce Huxley as a quack' without legal repercussions.", "isCorrect": false, "rationale": "While Mencken mentions this, he categorizes it as a 'delusion' or an 'apparent reality' that stems from the underlying loss of dignity, rather than the core 'real' liberty."}, {"text": "The liberty of the superior individual to 'imagine the King’s death.'", "isCorrect": false, "rationale": "Mencken states that democracy constantly invents 'new forms of the old crime' of imagining the King's death, implying this liberty is suppressed."}]}, {"question": "According to Mencken, how does democracy affect the dignity of high-ranking figures like Kings, Popes, and Generals?", "options": [{"text": "It forces them to adopt the common manners of the masses, such as 'jabbering of normalcy' or 'slapping backs.'", "isCorrect": true, "rationale": "The text describes how leaders like Harding, Coolidge, and Pershing are reduced to acting like commoners, losing their rational dignity."}, {"text": "It elevates their dignity by granting them the 'delusion' of being equal to their betters.", "isCorrect": false, "rationale": "The text states that while the 'have-not' might gain dignity from this delusion, the 'King' or superior individual loses it."}, {"text": "It preserves their dignity by keeping them answerable only to their own 'notions.'", "isCorrect": false, "rationale": "Mencken argues democracy tries to break this independence and make them 'docile John Does.'"}, {"text": "It creates a 'mysterious sanctity' in their presence, similar to the veneration of policemen.", "isCorrect": false, "rationale": "The text suggests the opposite: the 'King' becomes a figure like Harding or Coolidge, losing any sense of rational dignity or sanctity."}]}, {"question": "What does Mencken claim is the 'measure of civilization'?", "options": [{"text": "The extent to which free spirits resist being brought down and made common.", "isCorrect": true, "rationale": "The text identifies the survival and resistance of the superior individual against the 'common harness' as the true metric of civilization."}, {"text": "The efficiency with which a government preserves and augments the liberty of the 'have-nots.'", "isCorrect": false, "rationale": "Mencken views the liberty of the have-nots as a destructive force against the liberty of the 'haves,' not a measure of civilization."}, {"text": "The ability of the common man to enjoy liberty rationally and murmuringly.", "isCorrect": false, "rationale": "Mencken explicitly states the common man 'cannot enjoy it rationally himself' and bears outrages with 'little murmuring.'"}, {"text": "The degree to which a society adheres to the 'lex de majestate.'", "isCorrect": false, "rationale": "Mencken uses the 'lex de majestate' as an example of a democratic tool used to break free spirits, which is the antithesis of his measure of civilization."}]}, {"question": "Mencken describes the common man's belief in the 'mysterious sanctity in law' as being primarily rooted in what?", "options": [{"text": "His veneration for policemen as providers of security.", "isCorrect": true, "rationale": "The text attributes the common man's respect for law to his desire for the 'peace of a trusty' and the protection offered by 'policemen in all forms.'"}, {"text": "A rational understanding of 'democratic science.'", "isCorrect": false, "rationale": "Mencken suggests observers are 'unfamiliar with the elements of democratic science,' but the common man acts on instinct for safety rather than science."}, {"text": "The 'Emersonian counsel' to be true to one's own nature.", "isCorrect": false, "rationale": "Mencken says this counsel actually supports the 'droit de seigneur' and is something democracy tries to suppress."}, {"text": "A deep-seated love for justice and truth.", "isCorrect": false, "rationale": "Mencken calls the common man's love for justice and truth 'almost wholly imaginary.'"}]}, {"question": "Why does Mencken argue that the common man views liberty as a 'weapon against him'?", "options": [{"text": "Because it is effectively used by the 'man of superior kidney' to maintain natural dominance.", "isCorrect": true, "rationale": "Mencken states the common man sees liberty as a support for the 'droit de seigneur' when held by his 'enemy,' the superior man."}, {"text": "Because it forces him to face the 'unreadable works of Charles Darwin.'", "isCorrect": false, "rationale": "While Mencken mentions Darwin, he is used to illustrate democracy's dread of heresy, not the common man's view of liberty as a personal weapon."}, {"text": "Because it prevents the government from providing 'ice-wagon drivers' with opium.", "isCorrect": false, "rationale": "Mencken argues that the *lack* of liberty (via the policeman) is what prevents these behaviors, which the common man esteems."}, {"text": "Because it encourages the 'have-not' to sue the 'baron' in court.", "isCorrect": false, "rationale": "The ability to sue is presented as an 'apparent reality' of the delusion of equality, not as a reason the common man fears liberty."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
