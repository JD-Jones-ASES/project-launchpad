<script>
var QUESTIONS = [{"question": "According to Mencken, what is the primary objective of all politics under a democratic system?", "options": [{"text": "The pursuit of the job and its associated rewards.", "isCorrect": true, "rationale": "Mencken asserts that democracy reduces all political questions to dynastic ones where the goal is the office itself rather than any underlying principle."}, {"text": "The advancement of ideological principles.", "isCorrect": false, "rationale": "The text explicitly states that the objective is the job, not the principle, which is often a secondary or neglected concern."}, {"text": "The stabilization of the national economy.", "isCorrect": false, "rationale": "While politicians might claim this, Mencken argues the actual motivation is personal gain and the avoidance of being 'stripped bare' by defeat."}, {"text": "The education of the 'mob' in civic duty.", "isCorrect": false, "rationale": "Mencken views the relationship with the mob as one of manipulation for influence rather than educational altruism."}], "id": "q01"}, {"question": "How does Mencken characterize the career transition of Henry Clay following his multiple presidential defeats?", "options": [{"text": "He became an advocate and attorney for 'the Interests' and centralization.", "isCorrect": true, "rationale": "The text describes Clay as turning his back on democracy to serve industrial interests, including the support of protective tariffs."}, {"text": "He retired to a 'gaudy appointive office' to save his face.", "isCorrect": false, "rationale": "While many lame ducks do this, the text highlights Clay as one of the 'majestic victims' who sought influence elsewhere rather than settling for a minor commission."}, {"text": "He devoted himself to the peaceful preservation of the Union.", "isCorrect": false, "rationale": "Mencken associates Clay with centralization and the interests of the wealthy, which he views as a cynical departure from democratic ideals."}, {"text": "He became a misanthrope who withdrew from public life entirely.", "isCorrect": false, "rationale": "Unlike Burr, who Mencken describes as a misanthrope, Clay remained an active and influential agent for powerful financial figures."}], "id": "q02"}, {"question": "What does Mencken suggest was the underlying cause of John C. Calhoun's devotion to the doctrine of Nullification?", "options": [{"text": "His personal bitterness over failing to reach the White House.", "isCorrect": true, "rationale": "Mencken argues that after his hopes for the presidency were extinguished in 1832, Calhoun turned his strength toward breaking up the Union out of spite."}, {"text": "A deep-seated philosophical commitment to states' rights.", "isCorrect": false, "rationale": "Mencken dismisses principle-based explanations, suggesting Calhoun would have 'sung a far less bellicose tune' had he succeeded Jackson."}, {"text": "Pressure from his Southern constituents to protect the institution of slavery.", "isCorrect": false, "rationale": "While historically relevant, Mencken's specific analysis focuses on the personal psychology of the 'lame duck' rather than regional economic pressures."}, {"text": "An attempt to mitigate the influence of the 'Interests' in Washington.", "isCorrect": false, "rationale": "The text links the 'Interests' to Henry Clay, whereas Calhoun is specifically linked to the path toward the Civil War."}], "id": "q03"}, {"question": "According to the text, why did Theodore Roosevelt change his stance on the 'German scheme of things' in 1914?", "options": [{"text": "To annoy and damage his successful political rival, Woodrow Wilson.", "isCorrect": true, "rationale": "Mencken claims Roosevelt swallowed his lifetime convictions just to take the opposite side of Wilson, whom he viewed as his 'successful enemy.'"}, {"text": "Because he recognized the threat Germany posed to global democracy.", "isCorrect": false, "rationale": "Mencken argues that Roosevelt was actually an ardent exponent of the German system until he saw a political advantage in opposing it."}, {"text": "To secure a position as the chief negotiator for the Allied powers.", "isCorrect": false, "rationale": "The text indicates his primary goal was a 'high military command at the front,' not a diplomatic role."}, {"text": "He was swayed by the public outcry following the outbreak of the World War.", "isCorrect": false, "rationale": "The text portrays Roosevelt as a 'political killer' who moved the mob for his own purposes rather than being moved by them."}], "id": "q04"}, {"question": "What does Mencken identify as the true motivation behind William Jennings Bryan's campaign against the teaching of evolution?", "options": [{"text": "A desire for revenge against the 'intelligent minority' who opposed him.", "isCorrect": true, "rationale": "Mencken asserts that Bryan wanted to punish the minority responsible for his three defeats by attacking their values of sense and intellectual decency."}, {"text": "A profound and unshakable religious fanaticism.", "isCorrect": false, "rationale": "Mencken explicitly states that those who viewed Bryan as a fanatic were 'far in error,' as his theological ideas were actually 'very vague.'"}, {"text": "An effort to unify the divided Democratic party behind a single issue.", "isCorrect": false, "rationale": "The text describes Bryan's actions as a personal 'consecration to reprisals' rather than a strategic party-building effort."}, {"text": "A sincere belief that evolution was a threat to public morality.", "isCorrect": false, "rationale": "Mencken argues that Bryan was an 'ambulant boil' moved by hatred, using theology merely as a weapon to 'hurt' and 'proscribe' his enemies."}], "id": "q05"}, {"question": "How does Mencken describe the physical state of William Jennings Bryan at the end of his life?", "options": [{"text": "He died with a fever of $110$ degrees, fueled by his pathological lust for revenge.", "isCorrect": true, "rationale": "Mencken uses this extreme physiological description to emphasize that Bryan's end was more 'pathological than political,' driven by his hatred of the White House inhabitants."}, {"text": "He passed away in a state of quiet religious ecstasy after the Scopes trial.", "isCorrect": false, "rationale": "This contradicts Mencken's description of Bryan as an 'ambulant boil' full of rage and bitterness."}, {"text": "He suffered a broken heart from being abandoned by the 'mob.'", "isCorrect": false, "rationale": "The text states that the mob 'still admired him' and was used as a weapon in his final campaigns."}, {"text": "He died in the White House, finally achieving his life's ambition.", "isCorrect": false, "rationale": "Mencken notes that Bryan's third defeat convinced him the White House was 'beyond his reach,' and he died looking toward it with bitterness."}], "id": "q06"}, {"question": "What is the primary reason Mencken believes despotic countries escape the 'lamentable exhibitions' seen in democracies?", "options": [{"text": "Unsuccessful aspirants are usually killed or exiled.", "isCorrect": true, "rationale": "The text explains that in non-democracies, losers are 'butchered out of hand' or sent away, preventing them from poisoning public life."}, {"text": "Despotic leaders are more skilled at assuaging the wounds of their rivals.", "isCorrect": false, "rationale": "Mencken suggests the solution in despotism is much more final and violent than the 'gaudy appointive offices' used in democracies."}, {"text": "The people in despotic countries have no 'mob' influence for politicians to use.", "isCorrect": false, "rationale": "While the mob's role differs, the text focuses on the fate of the *aspirant* as the reason for the lack of public nuisance."}, {"text": "The etiquette of the court requires all politicians to be altruistic.", "isCorrect": false, "rationale": "Mencken notes the Crown Prince may have 'homicidal' thoughts, but 'etiquette' simply forces him to keep them private, not to be altruistic."}], "id": "q07"}, {"question": "What role do 'Federal commissions' play in Mencken’s analysis of democracy?", "options": [{"text": "They serve as landing spots for defeated politicians to preserve their livelihoods.", "isCorrect": true, "rationale": "Mencken describes these commissions as being 'full of such lame ducks' who are given jobs to 'save his face' after being 'stripped bare' by defeat."}, {"text": "They act as the primary engines of progressive reform.", "isCorrect": false, "rationale": "The text views these commissions cynically, stating they 'harass the land' rather than improve it."}, {"text": "They are the only parts of government free from the influence of 'lame ducks.'", "isCorrect": false, "rationale": "Mencken explicitly states the opposite: that these commissions and the Federal bench are where such politicians are typically placed."}, {"text": "They are used to investigate and punish the 'warlocks on lower levels.'", "isCorrect": false, "rationale": "The text refers to lower-level politicians as 'familiar in the politics of every American county,' but doesn't suggest commissions are used to punish them."}], "id": "q08"}, {"question": "In the case of Aaron Burr, what does Mencken suggest would have been the outcome had Burr defeated Jefferson in $1800$?", "options": [{"text": "He would have avoided the path of treason and utilized his talents for the Republic.", "isCorrect": true, "rationale": "Mencken argues that success would have prevented the duel, the conspiracy, and the 'venomous repining' that characterized Burr's later years."}, {"text": "He would have been an even more dangerous misanthrope with the power of the presidency.", "isCorrect": false, "rationale": "Mencken implies his misanthropy was a *result* of his failure to succeed, not an inherent trait that power would have amplified."}, {"text": "He would have successfully implemented the 'German scheme of things.'", "isCorrect": false, "rationale": "The 'German scheme' is a concept Mencken associates with Theodore Roosevelt, not Aaron Burr."}, {"text": "The Republic would have reached the 'verge of disaster' much sooner.", "isCorrect": false, "rationale": "Mencken claims Burr's *failure* brought the country to the verge of disaster, whereas his success might have benefited the nation."}], "id": "q09"}, {"question": "According to Mencken, what was James G. Blaine's primary method for causing trouble after his political failures?", "options": [{"text": "Sustaining the hatreds originating from the Civil War.", "isCorrect": true, "rationale": "Blaine is described as waving the 'bloody shirt' recklessly to keep old animosities alive, driven by the 'poison' of his failure to reach the White House."}, {"text": "Conspiring with foreign agents to undermine the Federal bench.", "isCorrect": false, "rationale": "While Burr is linked to 'conspiracy,' Blaine's specific 'anti-social acts' were centered on internal domestic hatreds."}, {"text": "Forming a third party to split the vote of his successful rival.", "isCorrect": false, "rationale": "The 'political killer' who split votes and went on the 'warpath' is how Mencken describes Theodore Roosevelt in $1912$."}, {"text": "Demanding a high military command to prove his fitness.", "isCorrect": false, "rationale": "This specific demand is attributed to Theodore Roosevelt when he attempted to pressure Woodrow Wilson."}], "id": "q10"}, {"question": "The analysis notes that Mencken deploys 'tertiary lues' — a clinical term for late-stage syphilis — when describing a royal figure's medical decline. What rhetorical effect does this clinical vocabulary create in a section about royal politics?", "options": [{"text": "It deflates royal grandeur by reducing the Crown Prince's father to a medical specimen, applying the diagnostician's cold vocabulary to a supposedly exalted life.", "isCorrect": true, "rationale": "Using clinical disease terminology strips the monarch of mystique; where courtly language would speak of 'the king's illness,' Mencken's vocabulary places him in a pathology report alongside any patient."}, {"text": "It demonstrates Mencken's genuine medical expertise and his belief that political failure is literally caused by disease.", "isCorrect": false, "rationale": "The vocabulary is a rhetorical register choice, not an actual medical diagnosis; it serves satirical rather than clinical purposes."}, {"text": "It creates bathos by elevating a sordid disease to the level of high political drama.", "isCorrect": false, "rationale": "Bathos descends from elevated to low; here the movement is the reverse — applying cold clinical precision to what convention treats as elevated royal life."}, {"text": "It shifts the tone from satirical to tragic, inviting sympathy for the Crown Prince's predicament.", "isCorrect": false, "rationale": "The clinical term is deployed within the mock-historical ironic frame; it generates detachment and amusement rather than sympathy."}], "id": "q11"}, {"question": "The analysis describes a structural contrast between Crown Prince ambitions under despotism (suppressed, whispered) and lame-duck ambitions under democracy (public, shouted). What is the term used to describe this figure of contrasting opposites placed in parallel?", "options": [{"text": "Antithesis — the placement of opposing ideas in parallel grammatical structures to highlight their contrast.", "isCorrect": true, "rationale": "The despotism/democracy contrast is a classic antithesis: suppressed vs. bellowed, private vs. public, whisper vs. stump — each pair placed in structural opposition."}, {"text": "Bathos — a deliberate descent from the elevated to the absurd for comic effect.", "isCorrect": false, "rationale": "Bathos involves a sudden drop in register or dignity; the contrast here is a structural opposition of two parallel situations, which is antithesis."}, {"text": "Anaphora — the repetition of the same word or phrase at the beginning of successive clauses.", "isCorrect": false, "rationale": "Anaphora is about repeated beginnings; the despotism/democracy contrast is a paired opposition, not a repetition pattern."}, {"text": "Hyperbole — deliberate exaggeration used to make a satirical point.", "isCorrect": false, "rationale": "Hyperbole involves exaggeration; the contrast between suppressed and public ambition is a logical opposition, not an exaggeration."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
