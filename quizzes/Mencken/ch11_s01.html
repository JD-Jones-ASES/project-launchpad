<script>
var QUESTIONS = [{"question": "What is the primary objective of Mencken’s analogy comparing the New England town-meeting to the composition of folk ballads?", "options": [{"text": "To demonstrate that the creative energy of the masses is the true source of democratic legitimacy.", "isCorrect": false, "rationale": "This reflects the romantic myth that Mencken is attempting to debunk, rather than the purpose of the analogy itself."}, {"text": "To show that the 'folk' merely select from options created by a few dominant individuals.", "isCorrect": true, "rationale": "Mencken uses the analogy to argue that just as poets wrote the ballads, a few leaders direct the 'motions' of democracy."}, {"text": "To argue that representative democracy is a more sophisticated cultural evolution than direct democracy.", "isCorrect": false, "rationale": "Mencken dismisses the distinction between the two forms of democracy as 'simply rhetoric' rather than a cultural evolution."}, {"text": "To illustrate the inherent artistic value found within early American political structures.", "isCorrect": false, "rationale": "Mencken is focused on the power dynamics and the 'pious fraud' of political theory, not the aesthetic value of the structures."}]}, {"question": "According to the analysis of Mencken's diction, what is the effect of using the term 'camorra' to describe democratic political groups?", "options": [{"text": "It suggests that democratic politics is a sacred duty protected by secret societies.", "isCorrect": false, "rationale": "While 'camorra' refers to a secret society, Mencken uses it to imply criminality and conspiracy, not sanctity."}, {"text": "It provides a technical political science term for minority-led coalition governments.", "isCorrect": false, "rationale": "The analysis categorizes 'camorra' under the register of 'contempt' rather than the formal language of political science."}, {"text": "It implies that the groups dominating democratic politics are akin to organized rings of conspirators.", "isCorrect": true, "rationale": "Mencken uses the term to lend an air of 'criminal glamour' and suggest that these groups are self-serving and manipulative."}, {"text": "It highlights the historical connection between Italian republicanism and American democracy.", "isCorrect": false, "rationale": "Mencken uses the Neapolitan origin of the word as a stylistic flourish to insult, not to establish a genuine historical link."}]}, {"question": "How does Mencken’s use of syntax in Part II differ from his approach in Part I of 'Notes on Democracy'?", "options": [{"text": "He moves from long, academic sentences to short, punchy emotional outbursts.", "isCorrect": false, "rationale": "The source material indicates his sentences remain long and cumulative, but the function of specific punctuation shifts."}, {"text": "He utilizes the dash for qualification and measured concession rather than for comic asides.", "isCorrect": true, "rationale": "In Part II, the dash creates a more 'judicial rhythm' suitable for building a sustained argument."}, {"text": "He adopts a more frantic rhythm to mirror the chaotic nature of the democratic state.", "isCorrect": false, "rationale": "The tone is described as conversational but authoritative, suggesting a controlled rather than frantic rhythm."}, {"text": "He avoids the use of the 'tricolon' to ensure his prose does not sound overly theatrical.", "isCorrect": false, "rationale": "The analysis explicitly notes Mencken's fondness for the tricolon in this section to create an exhaustive rhythm."}]}, {"question": "In the close reading of the 'ballads' passage, what is the significance of the term 'concrete poets'?", "options": [{"text": "It refers to poets who only wrote about physical, tangible objects rather than abstract ideals.", "isCorrect": false, "rationale": "The term is used as a contrast to the abstraction of 'the folk,' not as a description of poetic themes."}, {"text": "It suggests that the authors of ballads were working-class laborers or 'concrete' workers.", "isCorrect": false, "rationale": "Mencken specifies that most of these poets were 'not of the folk,' contradicting a working-class origin."}, {"text": "It emphasizes individual, identifiable creators in opposition to the vague concept of collective authorship.", "isCorrect": true, "rationale": "Mencken uses 'concrete' to insist on individual human agency over the romantic 'blur' of the masses."}, {"text": "It is a mock-academic term intended to parody the jargon of 19th-century philologists.", "isCorrect": false, "rationale": "While Mencken parodies scholars elsewhere, 'concrete' here serves the specific purpose of debunking a collective myth."}]}, {"question": "Mencken’s 'irony through concession' works primarily by which of the following mechanisms?", "options": [{"text": "Granting an opponent’s point while adding qualifiers that make the scenario seem virtually impossible.", "isCorrect": true, "rationale": "Phrases like 'by some miracle' or 'under the hand of God' allow the possibility while signaling its extreme improbability."}, {"text": "Pretending to be ignorant of political theory to force the opponent into over-explaining their position.", "isCorrect": false, "rationale": "Mencken adopts the persona of a world-weary realist who knows political theory well enough to dismiss it."}, {"text": "Agreeing with the minority's honesty to contrast it with the majority's 'imbecility.'", "isCorrect": false, "rationale": "Mencken characterizes even the enlightenment of a minority as a 'miracle,' casting doubt on both sides."}, {"text": "Using the language of the 'cow States' to show his hidden sympathy for the common voter.", "isCorrect": false, "rationale": "Mencken’s use of terms like 'stall-fed' indicates contempt, not hidden sympathy."}]}, {"question": "What does Mencken intend to convey with the compound modifier 'stall-fed' in the phrase 'stall-fed Rousseaus'?", "options": [{"text": "That these individuals are robust and physically prepared for the rigors of political life.", "isCorrect": false, "rationale": "Stall-fed implies being fattened for slaughter or being passive, rather than being robust or active."}, {"text": "That democratic idealists are like livestock fattened in a stable, lacking true independence.", "isCorrect": true, "rationale": "The modifier reduces idealists to livestock, suggesting they are pampered, confined, and ultimately mindless."}, {"text": "That the theorists are intellectually nourished by the great traditions of French philosophy.", "isCorrect": false, "rationale": "The context of 'cow States' and 'stall-fed' is derogatory, mocking the environment and the thinkers rather than praising their nourishment."}, {"text": "That the 'Rousseaus' of the American West are more authentic than their European counterparts.", "isCorrect": false, "rationale": "Mencken uses the term to suggest these figures are interchangeable and unimpressive, not authentic."}]}, {"question": "Which of the following best describes the 'triple register' identified in Mencken's diction?", "options": [{"text": "The simultaneous use of English, French, and Latin political terminology.", "isCorrect": false, "rationale": "The registers refer to levels of tone and vocabulary choice (academic, contemptuous, mock-concession), not literal languages."}, {"text": "The mixing of scientific jargon, insulting epithets, and phrases of mock-religious concession.", "isCorrect": true, "rationale": "Mencken moves between the language of political science, the language of contempt, and the language of mock-concession."}, {"text": "The use of three parallel clauses to build a sense of rhythmic inevitability in his arguments.", "isCorrect": false, "rationale": "This describes a tricolon, which is a matter of syntax and rhythm rather than diction and vocabulary register."}, {"text": "A combination of archaic prose, modern slang, and future-oriented predictions.", "isCorrect": false, "rationale": "The source identifies specific registers related to political science, contempt, and mock-concession."}]}, {"question": "What is the rhetorical purpose of the tricolon used when Mencken mentions England, France, and Switzerland?", "options": [{"text": "To highlight the specific constitutional strengths of different democratic models.", "isCorrect": false, "rationale": "Mencken is actually arguing that the differences between these models are superficial or non-existent."}, {"text": "To create a rhythm of exhaustive enumeration that suggests all forms of government are essentially the same.", "isCorrect": true, "rationale": "The three-part structure reinforces his point that no matter the label, the underlying reality of the state remains unchanged."}, {"text": "To provide a balanced, academic overview of global political systems before critiquing them.", "isCorrect": false, "rationale": "While it may look academic, the purpose is to dismiss the distinctions between these systems as 'simply rhetoric.'"}, {"text": "To suggest that only the Swiss cantons have achieved a 'pure' form of democracy.", "isCorrect": false, "rationale": "Mencken includes Switzerland in the list to show that even 'pure' democracy reduces to the same thing as the others."}]}, {"question": "Why does Mencken compare the sovereignty of democratic citizens to that of absolute monarchs?", "options": [{"text": "To warn that democratic citizens are becoming increasingly tyrannical in their demands.", "isCorrect": false, "rationale": "His point is not about the behavior of the citizens, but the constraints placed upon their supposed power."}, {"text": "To argue that both are entirely illusory and have never existed in human history.", "isCorrect": false, "rationale": "Mencken does not say they are illusory, but rather that they are 'constrained and partial.' "}, {"text": "To suggest that all sovereignty, whether in a democracy or autocracy, is limited by advisors and subordinates.", "isCorrect": true, "rationale": "The analogy implies that just as ministers constrained kings, the democratic state's machinery constrains the citizen."}, {"text": "To prove that a single monarch is more efficient at governing than a collective of citizens.", "isCorrect": false, "rationale": "The effect of the analogy is to make the distinction between democracy and autocracy seem 'trivial,' not to favor one's efficiency."}]}, {"question": "In the analysis of Mencken's tone, what does the phrase 'philologues of defective powers of observation' signify?", "options": [{"text": "A precise, mock-academic diagnosis of scholars who fail to see political reality.", "isCorrect": true, "rationale": "The analysis describes this as a phrase that names a discipline and diagnoses a failing, making it both precise and contemptuous."}, {"text": "An acknowledgment that even the best political scientists are limited by their senses.", "isCorrect": false, "rationale": "The phrase is used as a 'mock-academic' insult, not as a genuine acknowledgment of human limitations."}, {"text": "A reference to those who study the evolution of democratic language over time.", "isCorrect": false, "rationale": "While 'philologues' study language, Mencken is using the term to mock scholars' inability to observe reality."}, {"text": "Mencken's self-deprecating admission that he too might be misinterpreting the data.", "isCorrect": false, "rationale": "The analysis notes that Mencken adopts the persona of a world-weary realist who has 'seen through every pious fraud,' not one who admits error."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
