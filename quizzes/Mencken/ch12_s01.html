<script>
var QUESTIONS = [{"question": "According to the analysis, what is the central tension in Mencken's rhetorical strategy regarding the American electorate?", "options": [{"text": "The conflict between the people's legal right to total sovereignty and their practical inability to exercise it wisely.", "isCorrect": true, "rationale": "Mencken begins by conceding the people have total power, only to argue through a series of absurdities that they are too incompetent to use it."}, {"text": "The struggle between the desire for direct democracy and the necessity of representative systems.", "isCorrect": false, "rationale": "The text states that Mencken has already 'collapsed the distinction' between these two forms of democracy before starting this specific critique."}, {"text": "The disparity between the voters' economic interests and the politicians' legislative agendas.", "isCorrect": false, "rationale": "While related to manipulation, the specific rhetorical tension highlighted is about the nature of sovereignty versus the capacity of the sovereign."}, {"text": "The gap between the religious morality of the public and the secular amorality of the ruling class.", "isCorrect": false, "rationale": "Mencken uses religious terms like 'antinomian' to mock the public's application of these categories, rather than to establish a genuine moral conflict."}], "id": "q01"}, {"question": "What meta-rhetorical point does Mencken make by using the term 'goats' and stating he is 'borrowing from their own dialect'?", "options": [{"text": "To suggest that the people are actually more aggressive and stubborn than sheep or donkeys.", "isCorrect": false, "rationale": "While goats can be stubborn, the text emphasizes their role as 'willing victims' and the linguistic choice as a form of class contempt."}, {"text": "To demonstrate his own mastery of common American slang to build rapport with the reader.", "isCorrect": false, "rationale": "Mencken's intended audience is the 'educated skeptic,' and he uses the dialect to mock the subjects, not to build rapport with them."}, {"text": "To imply that even the language of insult must be simplified to be understood by the masses.", "isCorrect": true, "rationale": "The analysis notes that 'borrowing from their own dialect' adds a layer of class contempt, suggesting the targets are too 'dumbed down' for sophisticated abuse."}, {"text": "To create a connection to pastoral literature and the classical roots of democratic thought.", "isCorrect": false, "rationale": "Mencken uses these animal metaphors as 'barnyard contempt' rather than as a nod to classical or pastoral traditions."}], "id": "q02"}, {"question": "Mencken describes politicians as 'prehensile soothsayers.' Which of the following best captures the dual meaning of this phrase?", "options": [{"text": "They are biologically primitive yet highly evolved in their strategic thinking.", "isCorrect": false, "rationale": "This interpretation misses the specific meanings of 'prehensile' (grasping) and 'soothsayers' (fortune-telling) provided in the wordwatch."}, {"text": "They are grasping for power while pretending to possess prophetic or visionary insight.", "isCorrect": true, "rationale": "The analysis defines 'prehensile' as grasping and 'soothsayers' as prophets, creating a hybrid of an opportunistic primate and a deceptive oracle."}, {"text": "They have an instinctive ability to predict future economic trends to benefit the state.", "isCorrect": false, "rationale": "This attributes a positive or useful skill to the politicians, which contradicts Mencken's cynical view of them as predatory swindlers."}, {"text": "They use ancient wisdom to justify modern legislative grabs for property.", "isCorrect": false, "rationale": "The term 'soothsayers' implies a false or fraudulent spiritual authority rather than the application of genuine ancient wisdom."}], "id": "q03"}, {"question": "In Mencken's rhetorical arsenal, what is the primary function of the 'catalogue' (or enumeratio) found in the middle of the section?", "options": [{"text": "To provide a comprehensive list of suggested constitutional reforms for a failing democracy.", "isCorrect": false, "rationale": "The items in the list, such as the President shaving his head, are intended to be absurd rather than serious reform proposals."}, {"text": "To overwhelm the reader with evidence of the legislative branch's inefficiency.", "isCorrect": false, "rationale": "The catalogue focuses on the power of the people to do anything, including abolishing the legislature, rather than the legislature's own failures."}, {"text": "To make the concept of unlimited popular sovereignty appear ridiculous through the sheer accumulation of absurdities.", "isCorrect": true, "rationale": "The analysis states the cumulative effect of the long, absurd list makes the people's 'infinite power' seem terrifyingly ridiculous."}, {"text": "To demonstrate Mencken's encyclopedic knowledge of American legal history and precedent.", "isCorrect": false, "rationale": "While he uses legal terminology, the goal is satire and rhetorical force rather than a display of historical scholarship."}], "id": "q04"}, {"question": "How does Mencken use the term 'antinomian' to critique the behavior of democratic voters?", "options": [{"text": "To praise candidates who reject conventional moral laws in favor of political pragmatism.", "isCorrect": false, "rationale": "Mencken uses the term to mock the voters' reactions, not to offer genuine praise for candidates' behavior."}, {"text": "To satirize voters who incorrectly apply complex theological categories to the private lives of secular politicians.", "isCorrect": true, "rationale": "The text explains that Mencken uses this term to mock voters who viewed a candidate's divorce through the lens of faith vs. moral law."}, {"text": "To suggest that the only way to save democracy is through a rejection of all established religious laws.", "isCorrect": false, "rationale": "Mencken's stance is cynical and diagnostic; he is not proposing a path to 'save' democracy through antinomianism."}, {"text": "To highlight the voters' strict adherence to traditional religious morality when choosing leaders.", "isCorrect": false, "rationale": "The use of 'antinomian' suggests a confusion or misapplication of morality rather than a straightforward adherence to it."}], "id": "q05"}, {"question": "Which phrase from the text describes the rhythmic transition Mencken uses to punctuate his arguments?", "options": [{"text": "The movement from pastoral innocence to barnyard contempt.", "isCorrect": false, "rationale": "This refers to the animal metaphor sequence rather than the syntactic rhythm of his sentences."}, {"text": "The shift from long, sinuous analytical sentences to a flat, monosyllabic verdict.", "isCorrect": true, "rationale": "This is identified as Mencken's 'signature rhythmic move,' landing with particular force at the end of sections."}, {"text": "The use of rhetorical questions to force the reader into a state of agreement.", "isCorrect": false, "rationale": "While Mencken uses rhetorical questions, they are described as embedded challenges rather than his signature rhythmic structure."}, {"text": "The gradual elevation of diction from common dialect to constitutional grandeur.", "isCorrect": false, "rationale": "Mencken typically does the opposite: he uses grand terminology only to undercut it with 'sordid' reality."}], "id": "q06"}, {"question": "What is the symbolic significance of comparing the democratic transaction to the 'sale of a mule'?", "options": [{"text": "It suggests that democratic politics is a noble, if difficult, agrarian pursuit.", "isCorrect": false, "rationale": "The text explicitly calls the transaction 'simple and sordid,' contrasting it with any sense of nobility."}, {"text": "It emphasizes that voters are as strong and resilient as pack animals.", "isCorrect": false, "rationale": "Mencken's use of the mule metaphor is intended to be undignified, focusing on the sterile and stubborn nature of the transaction."}, {"text": "It strips away the 'affecting rhetoric' to reveal a transaction that is essentially simple, sterile, and low-class.", "isCorrect": true, "rationale": "The analysis notes that a mule is 'sterile, stubborn, and associated with rural poverty,' serving to undercut the grandeur of political language."}, {"text": "It implies that politicians are trying to sell something that is highly valuable but difficult to handle.", "isCorrect": false, "rationale": "The focus is on the 'sordid' and 'swindling' nature of the deal, where the 'appearance' of value is often traded for actual power."}], "id": "q07"}, {"question": "In the concluding metaphor 'a combat between jackals and jackasses,' what roles do the two animals represent in Mencken's view of democracy?", "options": [{"text": "Jackals are the predatory politicians; jackasses are the foolish, burdened voters.", "isCorrect": true, "rationale": "The analysis defines politicians as predators (jackals) and voters as beasts of burden (jackasses), bound together in a 'master transaction.'"}, {"text": "Jackals are the 'enterprising minorities'; jackasses are the 'prehensile soothsayers.'", "isCorrect": false, "rationale": "While these groups are mentioned, the final metaphor specifically pits the predator (politician) against the prey (the public)."}, {"text": "Jackals are the foreign agitators; jackasses are the American legislators.", "isCorrect": false, "rationale": "Mencken's critique in this section is focused internally on the relationship between the American people and their own leaders."}, {"text": "Jackals are the critical skeptics; jackasses are the credulous masses.", "isCorrect": false, "rationale": "Mencken identifies with the skeptic/analyst; the 'jackals' in the metaphor represent those actively trading in the political market."}], "id": "q08"}, {"question": "How does Mencken utilize 'i. e.' and scholarly abbreviations in his descriptions of political 'swindling'?", "options": [{"text": "To provide necessary clarity for complex constitutional theories.", "isCorrect": false, "rationale": "The text indicates these are used ironically to describe fraudulent activities rather than for genuine theoretical clarity."}, {"text": "To signal to the reader that he is quoting from an official political science textbook.", "isCorrect": false, "rationale": "Mencken is parodying the style of political science, not quoting directly from established texts."}, {"text": "To create an ironic, scholarly air that treats 'hoodwinking' as if it were a technical, scientific term.", "isCorrect": true, "rationale": "The analysis notes that the use of Latin abbreviations lends a 'scholarly air' to the description of fraudulent political behavior."}, {"text": "To show respect for the 'science of politics' while critiquing its practitioners.", "isCorrect": false, "rationale": "Mencken is mocking the very idea that politics under democracy is a 'science' at all."}], "id": "q09"}, {"question": "Why is Mencken's persona in this section described as 'unstable'?", "options": [{"text": "Because he frequently contradicts his own philosophical arguments from earlier chapters.", "isCorrect": false, "rationale": "The 'instability' refers to his tonal shifts and persona, not a lack of logical consistency in his core argument."}, {"text": "Because he shifts between being a detached observer, a dark humorist, and an angry prophet of doom.", "isCorrect": true, "rationale": "The text describes these shifting voices as 'deliberately productive,' keeping the reader off balance and complicating the tonal picture."}, {"text": "Because his prose becomes chaotic and loses the 'mellifluous' quality of his earlier writing.", "isCorrect": false, "rationale": "Mencken's prose remains highly structured (using devices like the catalogue); it is the 'voice' behind the prose that shifts."}, {"text": "Because he oscillates between supporting the 'popular will' and calling for a monarchy.", "isCorrect": false, "rationale": "Mencken consistently attacks the 'popular will'; his shifts are in tone and rhetorical persona, not his fundamental anti-democratic stance."}], "id": "q10"}, {"question": "Mencken writes that the victims of political swindling 'delight in his ministrations, as an hypochondriacal woman delights in the flayings of the surgeon.' What does this simile add to his argument about democracy?", "options": [{"text": "It reveals that the victimization is self-sustaining — the people's pleasure in being manipulated ensures they will never abolish the very system that exploits them.", "isCorrect": true, "rationale": "By comparing the public to a hypochondriac who enjoys painful medical treatment, Mencken explains why the 'obscenity' of exploitation persists: the victims actively want it, and their delight is what makes political reform structurally impossible."}, {"text": "It shows that while the people enjoy being governed, they will revolt the moment the 'flaying' becomes medically dangerous.", "isCorrect": false, "rationale": "Mencken does note that the people can 'put a stop to it' when it becomes 'intolerable,' but the simile's main thrust is that they enjoy the process, not that they have a built-in threshold of pain."}, {"text": "It draws a sympathetic parallel between the suffering of patients and the suffering of democratic citizens, suggesting both deserve better treatment.", "isCorrect": false, "rationale": "The simile is entirely contemptuous — a hypochondriac who invents her own illnesses to enjoy treatment is not a figure of sympathy but of mockery."}, {"text": "It establishes the medical analogy as the primary framework through which Mencken will analyze the democratic state.", "isCorrect": false, "rationale": "The medical analogy is one tool among many in this section, not the structural framework of the whole argument. The dominant framework is the animal metaphor."}], "id": "q11"}, {"question": "Mencken recounts Henry Lincoln Johnson, a Black politician, chairing the Georgia delegation at the 1920 Republican convention and herding the white delegates 'as if they had been stuffed chemises.' What rhetorical purpose does this anecdote serve?", "options": [{"text": "It provides a concrete example where raw political power overrides racial hierarchy — the mechanics of democratic patronage forced even KKK-district delegates to defer to the man who controlled their jobs.", "isCorrect": true, "rationale": "Mencken uses the Johnson anecdote to demonstrate that the sovereign 'will' he has been analyzing is not abstract but practical: where someone holds patronage power, ideological hatred yields to political necessity, proving that power flows from the machinery of the system, not from public opinion or race."}, {"text": "It expresses admiration for Henry Lincoln Johnson as an exceptional individual who transcended democratic limitations.", "isCorrect": false, "rationale": "Mencken uses Johnson as an illustration of a systemic point, not as a heroic individual. The anecdote is analytical, not celebratory."}, {"text": "It argues that racial disfranchisement is the primary obstacle preventing democracy from fulfilling its potential.", "isCorrect": false, "rationale": "Mencken is using the anecdote to support his claim that the franchise and sovereignty questions are not the central problem — the machinery of patronage and self-interest operates regardless of who formally holds the vote."}, {"text": "It provides historical evidence that the Republican Party was more committed to Black political participation than the Democratic Party.", "isCorrect": false, "rationale": "Mencken is not making a partisan comparison; he uses both parties equally as examples of the same machine politics."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
