    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Mencken, what is the fundamental psychological 'engine' that drives the democratic movement?", "options": [{"text": "A collective yearning for absolute justice and liberty.", "isCorrect": false, "rationale": "Mencken explicitly argues that the 'inferior man' does not actually desire these high-minded ideals."}, {"text": "An inherent sense of altruism and civic duty.", "isCorrect": false, "rationale": "The text suggests that democratic motives are rooted in self-interest and negative emotions rather than selfless service."}, {"text": "Envy of those perceived as superior.", "isCorrect": true, "rationale": "Mencken identifies envy, rather than idealism, as the primary motivation for the 'inferior man' in a democracy."}, {"text": "The pursuit of intellectual enlightenment and reason.", "isCorrect": false, "rationale": "The passage describes democratic man as being moved by primitive emotional reactions rather than rational or intellectual pursuits."}], "id": "q01"}, {"question": "How does Mencken interpret Heine's statement that 'l’envie est une inf'eriorit'e qui s’avoue'?", "options": [{"text": "Envy is a tool used by the superior to maintain their social standing.", "isCorrect": false, "rationale": "This reverses the relationship described by Mencken, where envy is the mark of the inferior."}, {"text": "Envy is a confession of one's own actual inferiority.", "isCorrect": true, "rationale": "Mencken uses this quote to support his claim that the peasant's hatred of the city man is rooted in an 'uncomfortable realization of actual inferiority.'"}, {"text": "Envy is a noble admission of a desire for self-improvement.", "isCorrect": false, "rationale": "Mencken portrays envy as a bitter, destructive force rather than a constructive or noble impulse."}, {"text": "Envy is the inevitable result of genuine social superiority.", "isCorrect": false, "rationale": "Mencken argues that 'genuine superiority' produces disdain, which is 'quite different' from envy."}], "id": "q02"}, {"question": "What does Mencken suggest is the true motivation behind the rural 'yokel's' support for Prohibition?", "options": [{"text": "A sincere religious conviction regarding the sinfulness of alcohol.", "isCorrect": false, "rationale": "While the yokel claims religious reasons, Mencken argues these are a 'pretension' masking deeper motivations."}, {"text": "Personal experience with the devastating effects of the 'drunkard in the gutter'.", "isCorrect": false, "rationale": "Mencken explicitly states it is the 'cabaret' that makes him a Prohibitionist, not the local drunkard."}, {"text": "A desire to protect his family from the influence of city 'speak-easies'.", "isCorrect": false, "rationale": "Mencken characterizes the rural speak-eases as 'sordid' and something the yokel detests because they lack the glamour of city life."}, {"text": "Envy of the sophisticated and social atmosphere in which city dwellers consume alcohol.", "isCorrect": true, "rationale": "The text argues the yokel longs for the 'gay society' and 'music' of the cabaret, and his inability to access them leads him to denounce them as crimes."}], "id": "q03"}, {"question": "Why, according to the text, is the city proletarian less 'dangerous' to the plutocracy than the rural 'hind'?", "options": [{"text": "The city proletarian has achieved a higher level of intellectual maturity.", "isCorrect": false, "rationale": "Mencken refers to the city proletarian as a 'city moron' and 'swinish,' suggesting no intellectual superiority."}, {"text": "His envy is 'sublimated' through constant entertainment and state-provided welfare.", "isCorrect": true, "rationale": "The text explains that 'panem et circenses' and elaborate public charity keep the proletarian content and distracted from 'sober thinking' or revolt."}, {"text": "He is naturally more sympathetic to the economic struggles of the wealthy.", "isCorrect": false, "rationale": "The proletarian still feels envy, but it is 'mitigated and mellowed' by his physical comforts and entertainment."}, {"text": "Urban cynicism prevents him from forming any political opinions at all.", "isCorrect": false, "rationale": "While he is cynical, he is still active in 'politics, drink and the radio'; he is simply not moved to the 'frantic hatreds' of the rural man."}], "id": "q04"}, {"question": "What role do 'yellow-backs' like 'Night Life in Chicago' play in Mencken's analysis of rural 'idealism'?", "options": [{"text": "They provide educational materials that help farmers improve their economic standing.", "isCorrect": false, "rationale": "These books are described as accounts of 'Babylonish revels' rather than practical educational guides."}, {"text": "They expose the genuine corruption within the city's political machines.", "isCorrect": false, "rationale": "Mencken views these works as focusers of envy rather than objective reports on political corruption."}, {"text": "They fuel rural outrage by depicting extravagant urban debaucheries that the yokel cannot participate in.", "isCorrect": true, "rationale": "The text claims these books propagate 'idealism' by convincing the 'corn-and-hog belt' that such 'Babylonish revels' must be suppressed."}, {"text": "They encourage rural families to migrate to the cities for better opportunities.", "isCorrect": false, "rationale": "The effect described is the desire to 'put down' city life through law, not to join it."}], "id": "q05"}, {"question": "Mencken refers to the 'enterprise in the third theological virtue' when discussing city experts. To what concept is he referring?", "options": [{"text": "The promotion of 'Faith' through urban missionary work.", "isCorrect": false, "rationale": "The third theological virtue in Christian tradition is Charity, which aligns with Mencken's discussion of public welfare."}, {"text": "The 'Hope' provided by democratic political systems.", "isCorrect": false, "rationale": "While related to democracy, this doesn't fit the context of the 'experts' managing the proletarian's physical needs."}, {"text": "The expansive system of public 'Charity' in American cities.", "isCorrect": true, "rationale": "Mencken uses this phrase to describe the 'immense development of public charity' that provides for the proletarian from birth to school."}, {"text": "The 'Prudence' required to manage a city's financial surplus.", "isCorrect": false, "rationale": "Mencken focuses on the expenditure of wealth to keep the masses quiet, rather than the virtue of prudence."}], "id": "q06"}, {"question": "According to Mencken, how does the urban tabloid differ from 'yellow journalism' in its effect on the proletarian?", "options": [{"text": "Tabloids incite the proletarian to 'yell at the barricades' more effectively.", "isCorrect": false, "rationale": "Mencken says the plutocracy 'deftly drew its fangs,' making tabloids 'harmless' compared to the threat of yellow journalism."}, {"text": "Tabloids provide a 'vicarious share' in the debaucheries of the rich, easing envy through flattery.", "isCorrect": true, "rationale": "The text explains that reading about the 'levantine joys' of the wealthy allows the city proletarian to feel a 'thrill' and 'civic pride' instead of direct hatred."}, {"text": "Tabloids focus strictly on political reform rather than social scandals.", "isCorrect": false, "rationale": "The text explicitly mentions tabloids reporting on the 'scions of old Knickerbocker families' and their 'beautiful coloured girl' companions."}, {"text": "Yellow journalism was more focused on 'frou-frou of perfumed skirts' than tabloids.", "isCorrect": false, "rationale": "Mencken associates the 'frou-frou' and thrill with the modern tabloids that have replaced the more dangerous yellow journalism."}], "id": "q07"}, {"question": "What is the intended meaning of the analogy regarding the 'sea-sick passenger' and the 'good sailor'?", "options": [{"text": "Physical illness often leads to a distorted view of political reality.", "isCorrect": false, "rationale": "This takes the analogy too literally; Mencken is using it to illustrate a broader social principle of envy."}, {"text": "Democratic man hates those who are visibly enjoying life more than he is.", "isCorrect": true, "rationale": "The 'sea-sick passenger' detests the sailor not for any crime, but because the sailor is 'having a better time of it,' which Mencken identifies as the 'origin of democracy'."}, {"text": "The proximity of different social classes is essential for a healthy democracy.", "isCorrect": false, "rationale": "Mencken's tone is critical of democracy; he views this proximity as a source of 'detestation' rather than health."}, {"text": "Smoking in public is a 'swinish' habit that democracy seeks to regulate.", "isCorrect": false, "rationale": "The cigar is merely a detail in the analogy representing the sailor's enjoyment, not the primary focus of the argument."}], "id": "q08"}, {"question": "How does Mencken characterize the difference between the 'yokel's' and the 'city proletarian's' view of women?", "options": [{"text": "The yokel views his wife as an equal partner, while the city man views his as a burden.", "isCorrect": false, "rationale": "Mencken describes the yokel's wife as 'slatternly' and her company as 'appalling,' hardly an equal partnership."}, {"text": "The city man's wife is strictly religious, whereas the farm-wife is 'antinomian'.", "isCorrect": false, "rationale": "The text states the exact opposite: city women move toward 'antinomianism' while farm-wives remain tied to 'theology'."}, {"text": "The yokel is tortured by 'ruby reflections' of urban carnality, while the city man finds his wife too 'worldly'.", "isCorrect": true, "rationale": "The text contrasts the rural man's envy of urban 'antinomianism' with the city man's complaint that his wife is 'extravagant' and 'worldly'."}, {"text": "Both groups are unified in their desire to save the 'heathen hordes' through missions.", "isCorrect": false, "rationale": "While rural wives have this 'dominant yearning,' Mencken notes that city wives 'emancipate' themselves from such 'demonology'."}], "id": "q09"}, {"question": "What does Mencken claim is the origin of 'Puritanism'?", "options": [{"text": "A deep-seated psychological need to regulate others' pleasure because it is unattainable for oneself.", "isCorrect": true, "rationale": "Mencken links Puritanism to democracy and envy, describing it as the impulse of the 'sea-sick passenger' who hates the 'good sailor'."}, {"text": "The historical traditions of early American settlers and their specific theology.", "isCorrect": false, "rationale": "Mencken defines Puritanism here not by its history, but by the 'impulse to regulate private behavior through legislation' born of envy."}, {"text": "The logical application of Christian principles to public life.", "isCorrect": false, "rationale": "Mencken views Puritanism and 'idealism' as 'pretensions' or 'moralisms' rather than logical applications of faith."}, {"text": "A response to the genuine threat of 'Socialism' in urban centers.", "isCorrect": false, "rationale": "Socialism is mentioned as a 'fallacy' taught in schools, but not as the origin of Puritanism."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
