        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 4, Section 2</div>

        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>

        Scholastica Codex &mdash; Self-Grading Quiz

<script>
var QUESTIONS = [{"question": "According to Mencken's 'greased pole' analogy, what distinguishes the 'superior man' from the 'great majority'?", "options": [{"text": "The superior man possesses a qualitative and quantitative mental difference that allows him to scale the highest levels of independence and intelligence.", "isCorrect": true, "rationale": "Mencken asserts that the difference is not just in degree but in the fundamental nature of mental processes, allowing only a few to reach the 'dizzy heights'."}, {"text": "The superior man is simply born into a higher social class, providing him with better equipment for the climb.", "isCorrect": false, "rationale": "While the text mentions starting from the shoulders of fathers in aristocracies, Mencken primarily emphasizes innate intelligence and independence as the markers of superiority."}, {"text": "The superior man is one who has successfully navigated the complexities of Americanism and Rotary clubs.", "isCorrect": false, "rationale": "The text lists joining Rotary and Americanism as easy alternatives for those who find the 'struggle' for higher levels too agonizing."}, {"text": "The superior man is characterized by his ability to eventually give up the struggle for the sake of mental health.", "isCorrect": false, "rationale": "Giving up the struggle is described as the path of the 'great majority' who find the effort too much to bear."}], "id": "q01"}, {"question": "How does Mencken define 'public opinion' within a democratic society?", "options": [{"text": "A complex of prejudices formed by the interaction of bitterness toward actual superiority and admiration for fraud.", "isCorrect": true, "rationale": "The text describes public opinion as the stable form cast by the interaction of these specific emotions among those low on the pole."}, {"text": "The collective wisdom of the masses reached through rational debate and civic engagement.", "isCorrect": false, "rationale": "Mencken explicitly rejects the idea that the common man is capable of rational thought or logic in a political context."}, {"text": "A set of fluctuating delusions that change daily based on the latest scientific discoveries.", "isCorrect": false, "rationale": "While fresh delusions enter public opinion, the text states it keeps its 'main outlines' of prejudices rather than following science."}, {"text": "The consensus of the most reflective adults who guide the state's moral direction.", "isCorrect": false, "rationale": "Mencken argues that government in democracy is the function of those who have achieved very little upward progress, not the reflective sort."}], "id": "q02"}, {"question": "What is Mencken's primary criticism of 'old-time' introspective psychology in the context of studying the masses?", "options": [{"text": "It incorrectly assumed that children and the 'inferior sort' of adults shared the same reflective mental processes as superior adults.", "isCorrect": true, "rationale": "Mencken argues that the old psychology fell into the 'disastrous fallacy' of viewing the child—and by extension the mob—as simply a 'little man'."}, {"text": "It placed too much emphasis on the physiological responses to external stimuli like loud noises.", "isCorrect": false, "rationale": "This describes the 'new' behaviourist psychology which Mencken champions for its focus on primal responses."}, {"text": "It was too focused on the study of fear, ignoring more complex emotions like joy and curiosity.", "isCorrect": false, "rationale": "Mencken believes fear is the most profound and earliest emotion, suggesting the old psychology failed because it was too 'reflective' and 'moony'."}, {"text": "It failed to acknowledge that all men are fundamentally the same in their mental capacity.", "isCorrect": false, "rationale": "Mencken's entire premise is that men are not alike and have fundamentally different mental processes."}], "id": "q03"}, {"question": "Based on the text, what is the 'massive discovery' made by behaviourists regarding the human infant?", "options": [{"text": "Fear is the earliest and most profound human emotion, manifesting almost immediately after birth.", "isCorrect": true, "rationale": "The text highlights that an infant brings a 'highly complex and sensitive susceptibility to fear' into the world from the first minutes of life."}, {"text": "Infants possess a natural logical sense that is only later corrupted by societal prejudices.", "isCorrect": false, "rationale": "Mencken states infants are 'almost as devoid of intelligence as an oyster' and that most adults never develop a logical sense."}, {"text": "Language acquisition is an instinctive process that begins with primitive appetites.", "isCorrect": false, "rationale": "The text argues that many people never move beyond elemental emotions and that their use of language is merely imitative, like 'trained animals'."}, {"text": "The primary drive of a child is the imitation of superior adults to achieve vertical mobility.", "isCorrect": false, "rationale": "While they are imitative, this is presented as a deceptive trait that masks their lack of actual understanding or intellectual progress."}], "id": "q04"}, {"question": "How does Mencken describe the relationship between Dr. John B. Watson’s theories and the origins of human fear?", "options": [{"text": "Watson relates primal fears, such as the fear of falling, to the inherited race experience of arboreal ancestors.", "isCorrect": true, "rationale": "The text mentions Watson's link between the fear of a 'calamitous plunge' and the daily hazards faced by 'ape-men' in trees."}, {"text": "Watson proves that all fears are learned from the mother and nurse during the first three years of life.", "isCorrect": false, "rationale": "While the child picks up some dreads from caregivers, Mencken notes that the most profound fears have a 'phylogenic origin' and exist from birth."}, {"text": "Watson argues that fear is a rational response to the 'hostile nature' of the modern world.", "isCorrect": false, "rationale": "The text suggests that while some fears are 'profoundly rational,' others quickly depart from rationality and become 'superstitions'."}, {"text": "Watson rejects the idea of instinctive fear, focusing instead on the development of 'adult' logic.", "isCorrect": false, "rationale": "Watson is cited as the head of the behaviourist school which prioritizes the study of instinctive, elemental emotions over 'moony' speculations about logic."}], "id": "q05"}, {"question": "According to the text, what is the central aim of a 'rational system of education'?", "options": [{"text": "To produce individuals who have discarded the immemorial fears of the race and achieved intellectual serenity.", "isCorrect": true, "rationale": "Mencken states the ideal educated man is 'sure of himself,' 'serene,' and no longer ridden by the 'dread of the dark'."}, {"text": "To ensure that all citizens in a democracy achieve a minimum mental age of puberty.", "isCorrect": false, "rationale": "Mencken believes the majority are 'congenitally incapable' of such progress, making the aim of educating the masses futile."}, {"text": "To train the lower orders in the use of articulate speech and abstract ideas.", "isCorrect": false, "rationale": "The text argues that words convey nothing to the lower orders and that they are as impossible to educate as 'trained animals'."}, {"text": "To reinforce the 'public opinion' that maintains the stability of democratic states.", "isCorrect": false, "rationale": "Mencken views public opinion as a 'complex of prejudices,' which is the opposite of the 'serenity' and 'logic' sought in rational education."}], "id": "q06"}, {"question": "What 'contribution' did Dr. Eleanor R. Wembridge make to the psychological profile of the 'lower orders'?", "options": [{"text": "She discovered that their minds cannot grasp abstractions and that their use of speech is merely imitative.", "isCorrect": true, "rationale": "Wembridge’s 'shrewd' observation was that the lower orders deal in words without ideas, much like trained animals."}, {"text": "She proved that the fear of 'strange men' is the only emotion they share with superior men.", "isCorrect": false, "rationale": "While fear is universal, Wembridge's specific contribution cited in the text concerns their linguistic and abstractive limitations."}, {"text": "She developed a technique for the 'school-marm' to successfully teach abstract logic to adolescents.", "isCorrect": false, "rationale": "Mencken uses Wembridge’s work to argue that the school-marm 'wastes her time' because the lower orders are 'impossible to educate'."}, {"text": "She categorized the 'public opinion' of the mob into a series of stable, rational forms.", "isCorrect": false, "rationale": "Wembridge’s focus was on the underlying 'mental baggage' and the inability to process 'bald facts,' not the structure of public opinion."}], "id": "q07"}, {"question": "In Mencken's view of a democratic society, what is the primary source of 'government'?", "options": [{"text": "The collective will of those who have made very little progress up the 'greased pole'.", "isCorrect": true, "rationale": "Mencken argues that in a democracy, government is the function of the majority who remain near the ground level of human achievement."}, {"text": "The 'God's grace' bestowed upon the sons of successful fathers.", "isCorrect": false, "rationale": "This describes government in an 'aristocratic society' according to the text, where prowess or heritage dictates rule."}, {"text": "The rare individuals of genuine intelligence and independence known as 'superior men'.", "isCorrect": false, "rationale": "Mencken asserts that democracy 'inevitably suppresses' the superior man, rather than giving him the function of government."}, {"text": "A rotating group of 'congressmen, ice-wagon drivers, and cinema actors' with identical mental processes.", "isCorrect": false, "rationale": "Mencken uses these examples to show that the mental processes of common men are different from superior men, but he does not claim they rule equally."}], "id": "q08"}, {"question": "Why does Mencken claim that the 'school-marm' wastes her time 'shouting up a rain-spout'?", "options": [{"text": "The pupils are 'congenitally incapable' of taking in bald facts or reasoning free from emotional distraction.", "isCorrect": true, "rationale": "Mencken argues that the lower orders lack the 'logical sense' and the fundamental competence to grasp even simple abstractions."}, {"text": "The educational system is designed to prioritize 'Americanism' over actual intellectual progress.", "isCorrect": false, "rationale": "While Americanism is an easy alternative, Mencken's point is that the *capacity* for education is missing in the students, regardless of the curriculum."}, {"text": "Modern psychology has not yet provided her with the 'new technique' required for pediatric learning.", "isCorrect": false, "rationale": "The text states that behaviorism *did* provide new techniques, but even these reveal that the lower orders are simply 'unscathed' by ideas."}, {"text": "The students are too preoccupied with the 'agonies' of the upward struggle.", "isCorrect": false, "rationale": "The text suggests the majority 'give it up' and choose easier paths like golf or Fundamentalism, rather than struggling."}], "id": "q09"}, {"question": "According to the text, which of the following is true regarding the mob's reaction to 'superiority'?", "options": [{"text": "They feel bitterness toward genuine excellence and admiration for those who are fraudulent.", "isCorrect": true, "rationale": "Mencken claims the mob is bitter toward anything 'rationally describable as actual superiority' and admires what it sees as 'fraud'."}, {"text": "They seek to imitate the 'superior man' in order to escape the 'dread of the dark'.", "isCorrect": false, "rationale": "Imitation is described as a trait of 'trained animals' rather than a conscious effort to reach the 'serenity' of the superior man."}, {"text": "They admire the 'superior man' but are prevented from following him by the 'greased pole'.", "isCorrect": false, "rationale": "The text explicitly states they are bitter toward actual superiority, not admiring of it."}, {"text": "They are largely indifferent to those above them, focusing instead on 'primitive appetites'.", "isCorrect": false, "rationale": "The text states their eyes are 'thrown toward the stars' as they contemplate the 'backsides of those who are above them'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
