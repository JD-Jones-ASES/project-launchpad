    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 12, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Mencken, what is the primary condition that signifies democracy is 'actually in being'?", "options": [{"text": "The continuous and efficient execution of the popular will in all administrative matters.", "isCorrect": false, "rationale": "Mencken argues that the complete execution of the popular will is a theoretical impossibility due to the nature of the 'common mind.'"}, {"text": "The presence of a latent threat that the popular will may suddenly and devastatingly intervene.", "isCorrect": true, "rationale": "Mencken posits that democracy exists as long as there is no 'immovable impediment' to the people asserting power during 'capital cases' if they choose."}, {"text": "The elimination of all self-interested minorities that seek to bamboozle the majority.", "isCorrect": false, "rationale": "Mencken views the presence of these 'small but articulate' groups as a constant reality in the actual practice of democracy."}, {"text": "The strict adherence to constitutional checks that prevent the mob from acting on impulse.", "isCorrect": false, "rationale": "While he mentions checks, he emphasizes that the core of democracy is the people's underlying power to remove those checks if they desire."}], "id": "q01"}, {"question": "Why does Mencken argue that the common people in the United States are more sovereign than ancient absolute monarchs?", "options": [{"text": "Because ancient monarchs were biologically superior and thus had more to lose.", "isCorrect": false, "rationale": "Mencken actually notes that monarchs were 'biologically only a man' with vulnerabilities like any other person."}, {"text": "Because democratic citizens face no external or 'super-legal' power that limits their reach.", "isCorrect": true, "rationale": "He argues that unlike monarchs who feared the Pope or their ministers, the democratic mob recognizes no higher class or foreign alliance that conditions its autonomy."}, {"text": "Because the jury system ensures that the law is always followed to the letter.", "isCorrect": false, "rationale": "He uses the jury system as an example of how the people can actually bypass or ignore the law to protect those who carry out the mob's will."}, {"text": "Because modern technology allows the popular will to be formulated more coherently.", "isCorrect": false, "rationale": "Mencken is cynical about the coherence of the 'common mind,' regardless of technology or form of government."}], "id": "q02"}, {"question": "How does Mencken characterize the relationship between the American public and the minorities that exploit them?", "options": [{"text": "A relationship based on mutual respect and shared national goals.", "isCorrect": false, "rationale": "Mencken describes the public as victims who are 'bamboozled' and exploited for profit by master practitioners."}, {"text": "An unwilling subjection that the public lacks the legal tools to challenge.", "isCorrect": false, "rationale": "The author explicitly states there are no legal bars to the public's will and that they have the means to halt the 'obscenity' at any time."}, {"text": "A transaction where the victims take a perverse delight in being 'flayed' by their exploiters.", "isCorrect": true, "rationale": "Mencken uses the analogy of a 'hypochondriacal woman' to describe how the public enjoys and even thanks those who victimize them."}, {"text": "A temporary arrangement that will be resolved once the public achieves universal education.", "isCorrect": false, "rationale": "Mencken views the traits of the 'common mind' as 'solidly grounded' and unlikely to be changed by education or miracles."}], "id": "q03"}, {"question": "What is Mencken's central critique regarding the extension of the franchise to women?", "options": [{"text": "It led to a radical shift in political priorities that destabilized the economy.", "isCorrect": false, "rationale": "Mencken argues that the extension of the franchise changed virtually nothing about the nature of politics."}, {"text": "It empowered a new class of politicians who are more honest and efficient.", "isCorrect": false, "rationale": "He maintains that offices still go to the 'same old mountebanks' and that the 'political clown-show' remains the same."}, {"text": "It resulted in voting patterns largely dictated by trivial sentimentalities or the influence of male politicians.", "isCorrect": true, "rationale": "He claims women vote without clear purpose, are easily victimized by male politicians, or focus on irrelevant personal details of candidates."}, {"text": "It created a distinct voting bloc that consistently advocates for social welfare.", "isCorrect": false, "rationale": "Mencken asserts that it is 'difficult to discover... any division along anatomical lines' in election returns."}], "id": "q04"}, {"question": "Mencken cites the long survival of the three-class system in Belgium and Prussia as evidence of what?", "options": [{"text": "The overwhelming military force used by the ruling class to suppress the vote.", "isCorrect": false, "rationale": "Menciler argues it wasn't a lack of means to end the system, but rather a lack of interest and competence from the masses."}, {"text": "The political ineptitude and indifference of the masses who were victimized by it.", "isCorrect": true, "rationale": "He suggests the victims made no genuine effort to end the system because they did not value the rights involved."}, {"text": "The inherent fairness of weighted voting systems in industrial societies.", "isCorrect": false, "rationale": "Mencken does not defend the system as fair; he uses its survival to criticize the political character of those it excluded."}, {"text": "The success of early democratic movements in those specific regions.", "isCorrect": false, "rationale": "He uses this as an example of democracy's failure to emerge from the 'beneficiaries' themselves, but rather from 'visionaries' outside the class."}], "id": "q05"}, {"question": "Regarding the disenfranchisement of African Americans in the South, what is Mencken’s primary argument about their 'unfitness for citizenship'?", "options": [{"text": "They lack the legal standing provided by the fundamental law of the Republic.", "isCorrect": false, "rationale": "Mencken notes that the 'theory of the fundamental law' is that they may and do vote."}, {"text": "Their unwillingness to risk personal safety to exercise the franchise.", "isCorrect": true, "rationale": "He argues that according to the 'democratic dogma,' one must be willing to fight for the franchise to be fit to use it."}, {"text": "Their inability to organize effective political parties or delegations.", "isCorrect": false, "rationale": "He provides the counter-example of Henry Lincoln Johnson to show that intelligent individuals within that group can and do exercise power."}, {"text": "The intrinsic biological barriers that prevent them from understanding the ballot.", "isCorrect": false, "rationale": "He frames the issue as one of 'esteeming the ballot' and risk-taking rather than an intrinsic cognitive inability."}], "id": "q06"}, {"question": "In Mencken's view, how does the behavior of politicians change when the 'popular will' takes a coherent form?", "options": [{"text": "They ignore the public and rely on constitutional protections to stay in power.", "isCorrect": false, "rationale": "Mencken claims that Congress 'never fails to leap' when the public growl is in earnest."}, {"text": "They attempt to educate the mob to make their will more 'apposite' and 'rational.'", "isCorrect": false, "rationale": "Mencken portrays politicians as 'yearning for jobs' and 'fawning' rather than educating."}, {"text": "They become highly responsive and 'leap' to execute the public's demands out of fear.", "isCorrect": true, "rationale": "He argues that the threat of the public's 'devastating' intervention makes politicians 'walk a bit warily.'"}, {"text": "They form alliances with foreign powers to suppress the domestic populace.", "isCorrect": false, "rationale": "Mencken explicitly states the US is kept free of foreign alliances that would condition its autonomy."}], "id": "q07"}, {"question": "What point does Mencken illustrate by mentioning Henry Lincoln Johnson's role at the Republican National Convention?", "options": [{"text": "The total exclusion of minority voices from the American political machine.", "isCorrect": false, "rationale": "Johnson's example is used to show the opposite: a minority leader exercising significant control over white politicians."}, {"text": "The fact that political power can be exercised even by those from supposedly 'disfranchised' groups.", "isCorrect": true, "rationale": "Johnson 'herded' his Nordic colleagues 'as if they had been stuffed chemises,' demonstrating that competence and intelligence can overcome social opposition."}, {"text": "The inherent racism that prevents any real cooperation within the Republican party.", "isCorrect": false, "rationale": "While he mentions 'bitter loathing,' his point is that 'yearning for jobs' forced the politicians to be polite and 'fawning' regardless of race."}, {"text": "The insignificance of political conventions in the broader democratic process.", "isCorrect": false, "rationale": "The example is used specifically to show the reality of power dynamics, not the irrelevance of the convention itself."}], "id": "q08"}, {"question": "Mencken compares the 'negligent whites' of the North to the 'disfranchised Negroes' of the South to argue that:", "options": [{"text": "The South is legally distinct from the North in its democratic structure.", "isCorrect": false, "rationale": "Mencken says the difference is 'only superficial' and that both have a 'clear legal right to the ballot.'"}, {"text": "Both groups value their personal 'peace and security' more than the right to vote.", "isCorrect": true, "rationale": "He equates avoiding jury duty with avoiding physical violence as fundamentally identical motives for surrendering the 'boon for which the Fathers bled.'"}, {"text": "The North has successfully implemented a more 'consecrated' form of democracy.", "isCorrect": false, "rationale": "He uses the 'thousands of freeborn Caucasians' who surrender the vote to avoid jury duty as a critique of Northern democratic engagement."}, {"text": "Mass action is the only way to distinguish between the two groups.", "isCorrect": false, "rationale": "He argues that the failure to take mass action is what actually links the groups in their 'unfitness.'"}], "id": "q09"}, {"question": "Why does Mencken dismiss the importance of 'theoretical' democracy that perfectly energizes the popular will?", "options": [{"text": "Because it would require a level of technology that did not exist in the 1920s.", "isCorrect": false, "rationale": "His objections are based on the 'common mind,' not technological limitations."}, {"text": "Because its realization would likely not change the 'main outlines' of how democracy actually works.", "isCorrect": true, "rationale": "He believes that even if a miracle made the theoretical variety possible, the democratic process would remain essentially the same."}, {"text": "Because it has already been achieved in countries north of the Alps.", "isCorrect": false, "rationale": "He says democracy is 'in being' there, but the 'theoretical variety' remains 'purely theoretical for all time.'"}, {"text": "Because 'capital cases' are the only time the popular will is ever coherent.", "isCorrect": false, "rationale": "While he values capital cases, he dismisses the theoretical variety primarily because it is impossible and wouldn't change much anyway."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
