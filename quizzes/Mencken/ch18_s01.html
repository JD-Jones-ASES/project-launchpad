<script>
var QUESTIONS = [{"question": "According to Mencken's analysis in 'The Rewards of Virtue,' what is the primary reason the honest man suffers more under democracy than the actual crook?", "options": [{"text": "The public assumes all public men are corrupt, and the honest man lacks the crook's skill in navigating that assumption.", "isCorrect": true, "rationale": "Mencken argues that because the mob cannot conceive of disinterested service, they attribute sordid motives to everyone, leaving the honest man at a disadvantage compared to the experienced crook."}, {"text": "The honest man is physically barred from office by the 'comstocks' who regulate moral behavior.", "isCorrect": false, "rationale": "While 'comstocks' are mentioned as moralistic censors, they are not cited as the reason the honest man suffers specifically more than a crook within the political system."}, {"text": "The crook is protected by the 'Medical Trust' and the Vatican, while the honest man has no institutional allies.", "isCorrect": false, "rationale": "These institutions are mentioned as entities Mencken was falsely accused of serving, not as actual protective shields for political crooks."}, {"text": "Democratic legislation is specifically designed by 'frauds' to target those who possess private rectitude.", "isCorrect": false, "rationale": "Mencken suggests laws are made by frauds and fanatics, but the 'suffering' of the honest man stems from the public's perception of his motives, not necessarily targeted legislation."}], "id": "q01"}, {"question": "Why does Mencken shift from a third-person satirical analysis to a first-person autobiographical account in this section?", "options": [{"text": "To transform his abstract political theories into the weight of personal witness.", "isCorrect": true, "rationale": "By stepping out from the satirist's mask, Mencken uses his own experiences as a journalist to provide concrete evidence for his claims about public perception."}, {"text": "To express his sincere desire to run for public office alongside Senator James A. Reed.", "isCorrect": false, "rationale": "Mencken explicitly states he is 'not cursed with the itch for public office,' distancing himself from political candidacy."}, {"text": "To apologize for his previous satirical attacks on the democratic legislator.", "isCorrect": false, "rationale": "The tone is described as 'bitter' and filled with 'controlled indignation,' which is the opposite of an apology."}, {"text": "To provide a neutral, objective history of American journalism during the Coolidge era.", "isCorrect": false, "rationale": "Mencken's account is a 'rhetorical construction' and a 'persona,' far from a neutral or objective historical record."}], "id": "q02"}, {"question": "Mencken uses the term 'Katzenjammer' to describe the national mood after World War I. What does this German term signify in this context?", "options": [{"text": "A collective hangover or miserable aftermath resulting from patriotic excess.", "isCorrect": true, "rationale": "The word literally translates to 'cat's wailing' and refers to a hangover, which Mencken uses to describe the post-war state of the country."}, {"text": "A state of extreme fearfulness and timidity among the voting public.", "isCorrect": false, "rationale": "While timidity is discussed via 'timorousness,' Katzenjammer specifically refers to the aftermath of excess, not a general state of fear."}, {"text": "The joyous celebration of democratic values over aristocratic disdain.", "isCorrect": false, "rationale": "Mencken uses the term negatively to describe a 'miserable' state, contradicting any sense of joyous celebration."}, {"text": "The specific legislative process used by the Senate to silence independent voices.", "isCorrect": false, "rationale": "The term is used to describe a national 'mood' rather than a specific procedural or legislative mechanism."}], "id": "q03"}, {"question": "Which rhetorical device is Mencken employing when he describes the typical American editor as one who has written 'a million words in favour of Coolidge and half a million against Darwin'?", "options": [{"text": "Epigram", "isCorrect": true, "rationale": "This is a brief, witty, and memorable statement that compresses a complex critique of journalism into a single sentence."}, {"text": "Litotes", "isCorrect": false, "rationale": "Litotes involves understatement (often using double negatives); this sentence uses hyperbole and sharp contrast, which is characteristic of an epigram."}, {"text": "Periodic sentence", "isCorrect": false, "rationale": "While Mencken uses periodic sentences elsewhere, this specific sentence is a concise epigram that delivers its charge through compression, not a delayed main clause."}, {"text": "Alliteration", "isCorrect": false, "rationale": "While alliteration is a tool Mencken uses in other sentences (like 'frauds and fanatics'), it is not the defining rhetorical structure of this specific observation."}], "id": "q04"}, {"question": "How does Mencken distinguish between the 'inventors' and the 'enactors' of laws in his final verdict on the legislative process?", "options": [{"text": "Laws are invented by frauds and fanatics, and enacted by poltroons and scoundrels.", "isCorrect": true, "rationale": "The text uses parallel structure to assign 'frauds and fanatics' to the invention phase and 'poltroons and scoundrels' to the enactment phase on the statute books."}, {"text": "Laws are invented by disinterested men and enacted by prehensile legislators.", "isCorrect": false, "rationale": "Mencken asserts that the inventors themselves are either dishonest or deluded, not disinterested."}, {"text": "Laws are invented by the mob and enacted by timorous editors.", "isCorrect": false, "rationale": "Mencken identifies specific types of villains (frauds, fanatics, poltroons, scoundrels) rather than the mob or editors as the primary creators of law."}, {"text": "Laws are invented by the Senate and enacted by the Medical Trust.", "isCorrect": false, "rationale": "The 'Medical Trust' is part of a list of absurd accusations against Mencken, not a participant in the legislative enactment described in the conclusion."}], "id": "q05"}, {"question": "Senator James A. Reed is highlighted by Mencken as a rare exception in public life. What specific trait allowed Reed to survive despite defying the 'mob'?", "options": [{"text": "His 'amazing talents as a popular orator' which allowed him to maintain office.", "isCorrect": true, "rationale": "The text notes that Reed's oratorical power was the tool that permitted his survival even as he defied party lines and mob flattery."}, {"text": "His willingness to take money from brewers to fund his independent campaigns.", "isCorrect": false, "rationale": "While Mencken mentions accusations involving brewers, they are directed at himself as a journalist, not cited as a reason for Reed's political survival."}, {"text": "His adherence to the strict rules of civility within the Senate.", "isCorrect": false, "rationale": "The text mentions that Reed 'plainly violated the rules of the Senate' regarding questioning the motives of others."}, {"text": "His public support for the League of Nations and Progressive legislation.", "isCorrect": false, "rationale": "The text explicitly states that Reed opposed the League of Nations and much Progressive-era legislation."}], "id": "q06"}, {"question": "What does the use of the word 'prehensile' suggest about Mencken's view of certain public servants?", "options": [{"text": "They use their positions of power to grasp whatever personal benefits they can.", "isCorrect": true, "rationale": "In context, 'prehensile' refers to the ability to grab or seize, used here to describe the corrupt, self-serving nature of certain politicians."}, {"text": "They have a flexible intellectual capacity to understand evolutionary biology.", "isCorrect": false, "rationale": "While Darwin and evolution are mentioned elsewhere, 'prehensile' is applied as a satirical descriptor for political greed, not intellectual flexibility."}, {"text": "They are physically timid and afraid of the democratic mob.", "isCorrect": false, "rationale": "Timid politicians are described as 'timorous,' whereas 'prehensile' suggests an active, grasping quality."}, {"text": "They are descendants of an aristocratic class that once ruled with 'rectitude.'", "isCorrect": false, "rationale": "Mencken uses 'prehensile' as a critique of modern democratic 'scoundrels,' not as a link to traditional aristocracy."}], "id": "q07"}, {"question": "Mencken's use of a periodic sentence to describe a politician's 'backbone' serves what specific rhetorical purpose?", "options": [{"text": "It builds suspense through parallel metaphors, withholding the final revelation of bribery until the end.", "isCorrect": true, "rationale": "The sentence structure ('His backbone has...; he knows how to...; it is quite impossible...') builds intensity, ending with the point that his actions depend on rewards."}, {"text": "It simplifies the complex nature of political ethics for the 'timorous' reader.", "isCorrect": false, "rationale": "Periodic sentences are characterized by complexity and delayed meaning, which is the opposite of simplification."}, {"text": "It highlights the physical grace and 'sweet resiliency' of the honest legislator.", "isCorrect": false, "rationale": "The 'sweet resiliency' is a metaphorical insult (meaning spineless), and the politician being described is a 'fraud,' not an honest legislator."}, {"text": "It creates a rhythmic 'drumroll' that leads to a praise of democratic flexibility.", "isCorrect": false, "rationale": "While it creates a rhythmic drumroll, the conclusion is a devastating critique of corruption, not a praise of flexibility."}], "id": "q08"}, {"question": "What is the implied meaning behind the 'caution' provided regarding Mencken’s autobiographical passages?", "options": [{"text": "Mencken's self-portrait as a persecuted truth-teller is a carefully crafted rhetorical persona that may not be entirely objective.", "isCorrect": true, "rationale": "The text warns that the 'honest critic' is a persona designed to serve the argument, and its truthfulness is a separate question from its rhetorical effectiveness."}, {"text": "Mencken's accounts of his life are unreliable because they were written during a 'Katzenjammer.'", "isCorrect": false, "rationale": "While Katzenjammer describes the national mood, the text does not suggest Mencken wrote while incapacitated by one."}, {"text": "Mencken's claims are dangerous because they might incite the 'comstocks' to further censorship.", "isCorrect": false, "rationale": "The caution focuses on the rhetorical nature of his self-presentation, not the external consequences of inciting censors."}, {"text": "Mencken’s switch to the first person is a sign that he has abandoned satire for factual reporting.", "isCorrect": false, "rationale": "The text states he 'steps out from behind the satirist's mask,' but the result is still a 'rhetorical construction' rather than a simple abandonment of satire."}], "id": "q09"}, {"question": "In the context of this section, what does the word 'rectitude' represent in the conflict between the individual and the state?", "options": [{"text": "Private moral uprightness that inevitably clashes with the requirements of political survival.", "isCorrect": true, "rationale": "The text places 'rectitude' against 'political necessity,' defining the central tension where personal morality is a liability in public life."}, {"text": "The legal code established by 'frauds and fanatics' to maintain order.", "isCorrect": false, "rationale": "The legal code is described as a product of 'frauds' and 'scoundrels,' which is the opposite of rectitude (uprightness)."}, {"text": "The public flattery used by politicians like Senator Reed to win over the mob.", "isCorrect": false, "rationale": "Reed is praised for *not* flattering the mob; rectitude refers to the honesty that makes such flattery impossible."}, {"text": "A medical term used by Mencken to describe the 'disease' of democratic thinking.", "isCorrect": false, "rationale": "While Mencken uses medical vocabulary satirically, 'rectitude' is a moral term, not a pathological one."}], "id": "q10"}, {"question": "What does Emile Faguet's concept 'The Cult of Incompetence' contribute to Mencken's argument about democratic public service?", "options": [{"text": "It provides a European endorsement of the view that democracy systematically rewards mediocrity and punishes genuine ability.", "isCorrect": true, "rationale": "Mencken invokes Faguet's independent diagnosis to show that democracy's opposition to competence is not a purely American problem but an inherent flaw recognized by foreign observers as well."}, {"text": "It argues that French democracy is superior to American democracy because it tolerates honest men.", "isCorrect": false, "rationale": "Faguet's book is cited to confirm the universality of the incompetence problem, not to praise any particular democracy as superior."}, {"text": "It proposes a meritocratic reform of the civil service that Mencken endorses as a solution.", "isCorrect": false, "rationale": "Mencken uses Faguet's title as a diagnosis, not a reform proposal; he offers no solution and instead emphasizes that the system is 'furiously inimical' to honorable motives."}, {"text": "It documents how French newspaper editors, like American ones, suppressed honest criticism of public figures.", "isCorrect": false, "rationale": "Faguet's contribution is the broader philosophical point about democratic incompetence, not a specific comparison of journalism practices."}], "id": "q11"}, {"question": "Mencken observes that newer or border states occasionally produce men of 'genuine dignity and ability' while established party states like Georgia or Vermont do not. What structural reason does he give for this difference?", "options": [{"text": "Newer states have not yet built the entrenched party loyalties that force every politician to 'trim and fawn,' leaving room for independence.", "isCorrect": true, "rationale": "Mencken's logic is that long-standing party fidelity closes off the pathways for honest men because all advancement depends on conformity; states without that history still allow independent figures to emerge."}, {"text": "Border states attract immigrants who are less susceptible to the mob's cynicism about motives.", "isCorrect": false, "rationale": "Mencken attributes the difference to party structure, not to the demographic or cultural characteristics of the population."}, {"text": "Newer states have stronger newspapers that are willing to challenge fraudulent politicians.", "isCorrect": false, "rationale": "Mencken is deeply critical of newspapers throughout the section; he does not cite better journalism as the explanation for exceptions."}, {"text": "Established states have more wealthy interests that can afford to bribe public officials into conformity.", "isCorrect": false, "rationale": "The barrier Mencken identifies is the social and political requirement to flatter the mob, not the purchasing power of wealthy interests."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
