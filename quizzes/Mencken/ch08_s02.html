    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Mencken, what is the primary motivation behind historical city revolutions involving the 'lower orders'?", "options": [{"text": "The pursuit of intellectual and rational liberty.", "isCorrect": false, "rationale": "Mencken explicitly states he can think of no city revolution that actually had liberty as its object in a rational sense."}, {"text": "The acquisition of basic material needs and sustenance.", "isCorrect": true, "rationale": "The text argues that when the city mob fights, it is for 'ham and cabbage' rather than abstract concepts of freedom."}, {"text": "The establishment of universal manhood suffrage.", "isCorrect": false, "rationale": "Mencken suggests that universal suffrage was a much later development and not the immediate goal of these early mob-led uprisings."}, {"text": "The defense of free speech against absolute monarchs.", "isCorrect": false, "rationale": "The author notes that free speech was often first supported by monarchs like Frederick the Great, rather than by city mobs."}]}, {"question": "Mencken asserts that the 'heritage of freedom' is reserved for which group of people?", "options": [{"text": "The 'Homo boobiens' who have finally escaped the yoke of voodooism.", "isCorrect": false, "rationale": "This term refers to the gullible masses who, according to Mencken, cannot comprehend or handle true liberty."}, {"text": "The descendants of those who once held power as lords or patricians.", "isCorrect": true, "rationale": "The author contends that the concept of liberty must be 'bred in' and belongs to a minority descended from the old ruling classes."}, {"text": "The 'industrial proletariat' who gained economic freedom in the 19th century.", "isCorrect": false, "rationale": "The text describes the proletariat as historically 'anthropoid' and lacking the hereditary background to grasp liberty's realities."}, {"text": "Professional libertarians who advocate for the rights of the common man.", "isCorrect": false, "rationale": "Mencken observes that one of the first acts of a winning mob is to 'butcher all professional libertarians.'"}]}, {"question": "Why does Mencken believe the 'inferior man' finds genuine liberty incomprehensible?", "options": [{"text": "Because he lacks the courage to face the loneliness and responsibility it entails.", "isCorrect": true, "rationale": "True liberty is described as requiring self-reliance and the capacity to face 'dreadful loneliness,' which the author claims the average man lacks."}, {"text": "Because he has been successfully indoctrinated by poets and philosophers.", "isCorrect": false, "rationale": "The text credits poets and philosophers with formulating the ideas of freedom, not with hindering the common man's understanding."}, {"text": "Because he is too preoccupied with choosing between political mountebanks.", "isCorrect": false, "rationale": "While he does this, it is a symptom of his misunderstanding of liberty, not the root cause of his inability to comprehend it."}, {"text": "Because the laws of absolute monarchs like Frederick the Great were too complex.", "isCorrect": false, "rationale": "Frederick the Great is mentioned as a supporter of free speech, but his legal complexity is not cited as a barrier to understanding liberty."}]}, {"question": "What does Mencken claim is the 'last proud, defiant gesture' of the common man (the 'ox') toward his oppressors?", "options": [{"text": "Slitting the throat of the tyrant.", "isCorrect": false, "rationale": "While the author notes the majority has the means to do this, he argues they lack the resolution to actually perform the act."}, {"text": "Emptying 'hallelujahs' upon them and showing affection to the butcher.", "isCorrect": true, "rationale": "Mencken uses the metaphor of an ox licking the butcher behind the ear to illustrate the common man's submissiveness."}, {"text": "Demanding a return to the 'panem et circenses' of old.", "isCorrect": false, "rationale": "The loss of 'panem et circenses' (bread and circuses) leads to grim reality and envy, but the 'gesture' described is one of submissive affection."}, {"text": "Establishing a new nobility in the wilderness.", "isCorrect": false, "rationale": "This ambition is attributed to country gentlemen in the South, not the common 'ox' of the masses."}]}, {"question": "How does Mencken characterize the American Revolution and its participants?", "options": [{"text": "As a grassroots movement for economic freedom led by the Scotch and Irish.", "isCorrect": false, "rationale": "Mencken describes the Irish and Scotch of that era as being under yokes or in states of savagery, not leading the Revolution."}, {"text": "As an uprising of slaves who had escaped from their masters in Germany.", "isCorrect": false, "rationale": "While he mentions America was settled by people in bondage, he argues the Revolution was imposed upon them by their 'betters.'"}, {"text": "As a movement imposed by commercial interests and ambitious country gentlemen.", "isCorrect": true, "rationale": "The text states the Revolution was led by New England 'commercial gents' seeking profit and Southern 'country gentlemen' seeking to found a nobility."}, {"text": "As the first successful implementation of universal manhood suffrage in the West.", "isCorrect": false, "rationale": "Mencken explicitly notes that universal manhood suffrage was only 'dreamed of' until 1867."}]}, {"question": "According to the text, what is the 'natural manure' of liberty?", "options": [{"text": "Self-reliance and enterprise.", "isCorrect": false, "rationale": "These are qualities demanded by liberty, but they are not the specific substance Mencken (quoting Jefferson) refers to as its manure."}, {"text": "Blood.", "isCorrect": true, "rationale": "Mencken quotes Jefferson stating that blood is the natural manure of liberty, emphasizing the violent struggle required to maintain it."}, {"text": "Heredity and good breeding.", "isCorrect": false, "rationale": "Heredity is necessary to grasp the concept, but it is not the 'manure' mentioned in the Jeffersonian quote."}, {"text": "The writings of poets and philosophers.", "isCorrect": false, "rationale": "These figures formulated the ideas, but they do not constitute the 'natural manure' of the concept's survival."}]}, {"question": "What does Mencken suggest is the true longing of the 'lower orders of men' as an alternative to liberty?", "options": [{"text": "The right to free speech.", "isCorrect": false, "rationale": "The author argues that while free speech is valid, it is not what the lower orders actually long for or understand."}, {"text": "Security and protection.", "isCorrect": true, "rationale": "The text states that the common man is afraid of getting hurt and longs for security rather than the 'pangs of liberty.'"}, {"text": "The ability to stand and act alone.", "isCorrect": false, "rationale": "Mencken (and Galton) suggests that the vast majority actually has a natural tendency to shrink from this responsibility."}, {"text": "The overthrow of democratic plutocracy.", "isCorrect": false, "rationale": "The text argues they submit 'supinely' to such systems because they lack the resolution to overthrow them."}]}, {"question": "In Mencken's view, how does a practical politician exploit the nature of a 'theoretically free' people?", "options": [{"text": "By encouraging them to develop the 'talent for writing symphonies.'", "isCorrect": false, "rationale": "This is a sarcastic comparison used by Mencken to show their lack of talent for self-reliance, not a political strategy."}, {"text": "By scaring them and then proposing to save them.", "isCorrect": true, "rationale": "Politics is described as the trade of playing upon the people's 'natural poltroonery' by creating fear and offering salvation."}, {"text": "By educating them on the history of the Holy Roman Empire.", "isCorrect": false, "rationale": "The history of the Empire is used by Mencken as evidence of past slavery, not as a tool for modern politicians."}, {"text": "By granting them immediate economic and social equality.", "isCorrect": false, "rationale": "Mencken claims that politicians use 'altruism only a cloak for more and worse oppressions' rather than granting true equality."}]}, {"question": "According to the passage, why is the French peasant of 1780 compared to the 'fellahin who built Cheops’ pyramid'?", "options": [{"text": "To highlight their shared mastery of architectural engineering.", "isCorrect": false, "rationale": "The comparison is based on legal rights and daily tasks, not on their skills or achievements."}, {"text": "To emphasize how little removed they were from ancient forms of servitude.", "isCorrect": true, "rationale": "Mencken uses this comparison to illustrate that four-fifths of the world was essentially enslaved only a few generations ago."}, {"text": "To suggest that city life in France was as advanced as ancient Egypt.", "isCorrect": false, "rationale": "The text contrasts city life with the 'dispossessed and despairing peasantry' rather than drawing a parallel of advancement."}, {"text": "To argue that the French Revolution was a 'rational' pursuit of liberty.", "isCorrect": false, "rationale": "The author specifically rejects the idea that such revolutions were driven by a rational love for liberty."}]}, {"question": "What does Mencken identify as the 'corner-stone of modern free states' that was only a 'dream' until 1867?", "options": [{"text": "Free speech for all citizens.", "isCorrect": false, "rationale": "Free speech is described as one of the 'most valid' ideas of freedom, but it is not the specific 'corner-stone' tied to the 1867 date."}, {"text": "Universal manhood suffrage.", "isCorrect": true, "rationale": "The text explicitly labels universal manhood suffrage as the corner-stone and notes it was only a dream until 1867."}, {"text": "The abolition of the Industrial System in England.", "isCorrect": false, "rationale": "The Industrial System is discussed in terms of its 'half-starved' proletariat, but its abolition is not the corner-stone mentioned."}, {"text": "The right to choose between two political mountebanks.", "isCorrect": false, "rationale": "This is described as a 'false form' of liberty that the inferior man mistakes for reality, not the corner-stone of the state."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
