<script>
var QUESTIONS = [{"question": "According to the analysis, what is the primary rhetorical purpose of Mencken acknowledging that 'a man of unquestionable integrity' occasionally enters politics?", "options": [{"text": "To demonstrate a genuine change in his critical perspective toward democratic leaders.", "isCorrect": false, "rationale": "The text explicitly states that this concession is tactical rather than genuine, serving to strengthen his argument by addressing objections."}, {"text": "To strengthen his argument by logically testing the rule through the exception.", "isCorrect": true, "rationale": "Mencken uses the exception to 'prove' the rule in the strict logical sense of testing and ultimately confirming his broader thesis."}, {"text": "To provide statistical evidence that democracy is improving over time.", "isCorrect": false, "rationale": "Mencken's focus is on rhetorical strategy and philosophical critique rather than longitudinal statistical data."}, {"text": "To appeal to the 'naïve virgin' reformers he had previously mocked.", "isCorrect": false, "rationale": "The analysis suggests he remains contemptuous of reformers; the concession is a maneuver to gain ground with his audience, not a bridge to reformers."}], "id": "q01"}, {"question": "How does the text define the concept of a 'persona' in the context of Mencken's writing?", "options": [{"text": "A direct and unmediated reflection of the author's personal life and daily habits.", "isCorrect": false, "rationale": "The text distinguishes the persona from the real man, noting that the 'real' Mencken was a journalist who lived in a Baltimore row house."}, {"text": "A constructed voice or character used as a rhetorical instrument to influence an audience.", "isCorrect": true, "rationale": "A persona is a 'mask' that allows the author to adopt a specific stance, such as the aristocratic outsider, for rhetorical effect."}, {"text": "A psychological state of detachment that the author achieved through social isolation.", "isCorrect": false, "rationale": "The text notes Mencken was highly engaged in society and political conventions, suggesting the detachment was a rhetorical choice, not a lifestyle."}, {"text": "A specific literary genre that focuses on the contrast between England and America.", "isCorrect": false, "rationale": "While he uses a persona to discuss these topics, 'persona' refers to the voice itself, not the subject matter or genre."}], "id": "q02"}, {"question": "What is the significance of Mencken's comparison between the American democratic system and the English system?", "options": [{"text": "It provides a rigorous empirical study of 1920s British parliamentary corruption.", "isCorrect": false, "rationale": "The text notes that Mencken's vision was idealized and potentially inaccurate for the 1920s, serving a rhetorical rather than empirical purpose."}, {"text": "It allows him to promote aristocratic values indirectly to an American audience.", "isCorrect": true, "rationale": "The comparison serves as a vehicle for Mencken to smuggle in defenses of scholarship and breeding that his audience might otherwise reject."}, {"text": "It serves to debunk Alexis de Tocqueville's earlier observations in 'Democracy in America'.", "isCorrect": false, "rationale": "The text states that Mencken's comparison actually reflects a tradition similar to Tocqueville's, rather than debunking it."}, {"text": "It is intended to convince Americans to revert to a feudal monarchy.", "isCorrect": false, "rationale": "The 'caution' section clarifies that Mencken is critiquing the cost of democracy to the individual, not advocating for a specific alternative system."}], "id": "q03"}, {"question": "Which term does Mencken use to imply that a politician is defending a cheapened self-image rather than genuine honor?", "options": [{"text": "Amour propre", "isCorrect": true, "rationale": "Mencken chooses the French term because it carries a connotation of vanity and self-regard that 'self-respect' lacks."}, {"text": "Suzerain", "isCorrect": false, "rationale": "Suzerain refers to a feudal lord to whom a vassal owes allegiance, focusing on hierarchy rather than self-image."}, {"text": "Charlatanry", "isCorrect": false, "rationale": "Charlatanry refers to the practice of deception and pretending to possess knowledge one does not have."}, {"text": "Male Magdalen", "isCorrect": false, "rationale": "This term applies the language of sexual shame and repentance to the act of political compromise."}], "id": "q04"}, {"question": "What syntactic technique is used in the phrase: 'They have been broken to the goose-step. They have learned how to leap through the hoops... They have kept silent...'?", "options": [{"text": "Hyperbole", "isCorrect": false, "rationale": "While the imagery is exaggerated, the specific repetition of 'They have' at the start of sentences is a rhythmic syntactic device."}, {"text": "Anaphora", "isCorrect": true, "rationale": "Anaphora is the repetition of a word or phrase at the beginning of successive clauses, used here to create a rhythmic drumbeat of charges."}, {"text": "Antithesis", "isCorrect": false, "rationale": "Antithesis involves contrasting opposing ideas; while Mencken uses it elsewhere, this specific passage relies on repetition rather than contrast."}, {"text": "Parenthetical qualification", "isCorrect": false, "rationale": "This technique involves inserting explanatory side-notes, whereas this passage uses direct, repetitive declarations."}], "id": "q05"}, {"question": "In the anecdote about Frederick the Great, why did he grant army commissions only to Junker?", "options": [{"text": "Because they were the only class with formal university training.", "isCorrect": false, "rationale": "The text emphasizes their character and code of honor over their specific educational background."}, {"text": "Because they were too wealthy to care about the democratic mob.", "isCorrect": false, "rationale": "While they were aristocrats, the specific reason given by Frederick focuses on their integrity, not their wealth."}, {"text": "Because they would not lie and could not be bought.", "isCorrect": true, "rationale": "Frederick's simple answer highlights the aristocratic code of honor as being resistant to the corruption Mencken associates with democracy."}, {"text": "Because they were perceived by the public as 'half-wits' who were easily controlled.", "isCorrect": false, "rationale": "This was the 'democratic theory' mentioned by Mencken as a misreading of why the Junker could not be corrupted."}], "id": "q06"}, {"question": "Mencken's use of the term 'male Magdalens' is described as an analogy for what?", "options": [{"text": "The repentance of politicians who have successfully reformed the system.", "isCorrect": false, "rationale": "The term suggests a 'sin' the politician continues to commit, rather than a successful or genuine reform."}, {"text": "The shame felt by leaders who are forced into a traditionally feminine role of dependence and political compromise.", "isCorrect": true, "rationale": "The term applies the language of sexual shame to political selling-out, casting powerful men in a role of dependence."}, {"text": "The religious devotion required of politicians in a Prohibitionist era.", "isCorrect": false, "rationale": "Mencken uses the religious reference ironically to highlight degradation, not to suggest genuine piety."}, {"text": "The inherent integrity of women in politics compared to men.", "isCorrect": false, "rationale": "The term is used to mock male politicians through a gender reversal, not to comment on the role of women in politics."}], "id": "q07"}, {"question": "What is the 'essential objection' to democracy according to Mencken's closing peroration?", "options": [{"text": "It allows a brute and an ignoramus to become the suzerain of the state.", "isCorrect": false, "rationale": "This is the objection Mencken applies to feudalism, not the core objection he applies to democracy."}, {"text": "It fails to provide the same level of scholarship found at Oxford or Cambridge.", "isCorrect": false, "rationale": "While Mencken values these institutions, his 'essential objection' focuses on the degradation of the people in power."}, {"text": "It imposes degrading acts and attitudes upon those responsible for the state's welfare.", "isCorrect": true, "rationale": "Mencken argues that while feudalism degrades the lowly vassal, democracy degrades the leaders themselves."}, {"text": "It relies too heavily on the occasional exception of men of integrity.", "isCorrect": false, "rationale": "The 'occasional exception' is a rhetorical move at the start, but the final objection concerns the general corruption of the leadership class."}], "id": "q08"}, {"question": "Which of the following best describes the 'tonal complexity' found in this section of Mencken's work?", "options": [{"text": "A shift from prosecutorial satire to a voice of genuine philosophical resignation and admiration.", "isCorrect": true, "rationale": "Mencken moves between his usual mocking persona and a serious defense of the aristocratic code of honor."}, {"text": "A consistent use of hysterical invective that never wavers throughout the chapter.", "isCorrect": false, "rationale": "The analysis notes that a 'second voice' emerges, which is controlled and judicial, unlike the 'relentless prosecution' of earlier sections."}, {"text": "A transition from a scholarly historian to a revolutionary populist leader.", "isCorrect": false, "rationale": "Mencken's persona is that of an aristocratic outsider, which is the opposite of a populist leader."}, {"text": "A move from defending American democracy to advocating for Prussian authoritarianism.", "isCorrect": false, "rationale": "The 'caution' section notes that Mencken is not advocating for a specific system but using comparisons to highlight the costs of democracy."}], "id": "q09"}, {"question": "According to the analysis of Mencken's syntax, what does a dash typically signal in this section?", "options": [{"text": "A sudden break in the logical flow intended to confuse the reader.", "isCorrect": false, "rationale": "The text states the syntax does not break, but rather deepens or extends the thought."}, {"text": "A crucial qualification that extends a personal thought into a political one.", "isCorrect": true, "rationale": "The dash is used sparingly to deepen the argument, transitioning from the individual's honor to the country's welfare."}, {"text": "The beginning of a long catalogue of rhythmic repetitions.", "isCorrect": false, "rationale": "The catalogue of degradation is noted for its anaphora ('They have'), not for its use of dashes."}, {"text": "An ironic reversal where Mencken admits he was joking.", "isCorrect": false, "rationale": "The text suggests the controlled syntax of the final paragraph signals he is *not* joking, or at least wants the reader to think so."}], "id": "q10"}, {"question": "Mencken writes that the doctrine of mob wisdom — 'whatever its transient errors, it always comes to right decisions in the long run' — 'was invented by mob-masters to save their faces.' What does this genealogy of the idea reveal about Mencken's epistemological method?", "options": [{"text": "He treats democratic theory as a branch of social science, evaluating it by empirical evidence rather than its internal logic.", "isCorrect": false, "rationale": "While he cites the anti-slavery record as evidence, his method here is genealogical — he asks who invented the idea and why — rather than empirical comparison."}, {"text": "He exposes the social function of an idea rather than its truth value, arguing that a belief's origin in self-interest disqualifies it as sincere political theory.", "isCorrect": true, "rationale": "By tracing the doctrine to mob-masters protecting their own positions, Mencken deflates it as motivated reasoning. The argument is not 'this is false' but 'this was invented to serve a purpose, and that purpose was not truth.' Washington and Jefferson's silence corroborate the claim by showing no genuine statesman needed it."}, {"text": "He appeals to the authority of Washington and Jefferson as witnesses against the doctrine, using their silence as positive testimony.", "isCorrect": false, "rationale": "Appealing to their silence as evidence is an argumentum ex silentio — a weak form of evidence. Mencken's stronger move is the genealogy, not the appeal to historical silence."}, {"text": "He concedes that the doctrine might be true in the long run while denying its relevance to present political conditions.", "isCorrect": false, "rationale": "Mencken's 'Perhaps—but on what evidence, by what reasoning, and for what motives!' is a dismissal disguised as an open question, not a genuine concession."}], "id": "q11"}, {"question": "Mencken argues that 'we are dependent for whatever good flows out of democracy upon men who do not believe in democracy.' Why is this paradox a structural feature of his argument rather than a logical contradiction?", "options": [{"text": "It is a logical contradiction that Mencken introduces deliberately to undermine his own credibility, inviting the reader to supply the resolution.", "isCorrect": false, "rationale": "The paradox is a conclusion, not an invitation for the reader to correct him. It follows logically from the argument that sincere democrats — the mob-masters and the genuinely credulous — are the system's corrupters."}, {"text": "It shows that democracy, properly understood, contains its own self-correcting mechanism in the cynical intelligence of disbelievers.", "isCorrect": false, "rationale": "Mencken does not argue that the cynics are a 'self-correcting mechanism' — he calls them the occasional 'leaven' in a rotten mass, not a remedy."}, {"text": "It follows from the argument that honesty requires rejecting the mob's self-flattering mythology, so only a man free of democratic sentiment can act honestly within the system.", "isCorrect": true, "rationale": "The structure is: (1) democracy requires flattering the mob's 'wisdom'; (2) believing the mob is wise is false; (3) therefore honest statesmanship requires disbelieving the mob. The 'occasional cynic' who sees through the system is precisely the man who can serve it honestly — not because he loves it, but because he is not deceived by it."}, {"text": "It is a rhetorical device (paradox) deployed to end the section with a memorable epigram, without analytical content.", "isCorrect": false, "rationale": "The paradox is not decorative — it is the logical endpoint of the chapter's argument about the corruption of genuine statesmen by democratic mythology."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
