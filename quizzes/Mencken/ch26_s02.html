<script>
var QUESTIONS = [{"question": "In Mencken's rhetorical toolkit, how is a 'Periodic Sentence' distinguished from a 'Cumulative Sentence' in terms of its structural effect?", "options": [{"text": "A periodic sentence withholds the main clause until the end to build suspense, while a cumulative sentence follows the main clause with a series of details.", "isCorrect": true, "rationale": "The text defines the periodic sentence by its delayed main clause and the cumulative sentence by its trailing details."}, {"text": "A periodic sentence uses parallel structures to contrast ideas, whereas a cumulative sentence uses a list to overwhelm the reader.", "isCorrect": false, "rationale": "This describes antithesis and accumulation or catalogue rather than the structural placement of the main clause."}, {"text": "A periodic sentence is a short, declarative statement used for impact, while a cumulative sentence is long and complex.", "isCorrect": false, "rationale": "While cumulative sentences are often long, the distinction lies in where the primary grammatical unit is placed, not just the length of the sentence."}, {"text": "A periodic sentence repeats words at the start of clauses, while a cumulative sentence repeats them at the end.", "isCorrect": false, "rationale": "This describes anaphora and its counterparts rather than the syntactic arrangement of the main clause."}], "id": "q01"}, {"question": "According to the text, why does Mencken consider exaggeration to be a 'form of precision' rather than a sign of carelessness?", "options": [{"text": "It ensures the reader takes the literal meaning as absolute truth.", "isCorrect": false, "rationale": "The text states the reader is meant to find the truth between the literal claim and its opposite, not in the literal claim itself."}, {"text": "It allows the writer to avoid providing specific evidence for their claims.", "isCorrect": false, "rationale": "The text suggests exaggeration is a tool for sharpening meaning and shifting the frame of reference, not a way to evade evidence."}, {"text": "It forces the reader to locate the truth in the tension between the literal overstatement and its opposite.", "isCorrect": true, "rationale": "Mencken uses hyperbole to shift the reader's frame of reference, requiring them to find the intended point somewhere between the two extremes."}, {"text": "It simplifies complex political issues into easily digestible soundbites.", "isCorrect": false, "rationale": "The text emphasizes that Mencken's prose is 'impossible to skim' and 'erudite,' suggesting it is far more complex than simple soundbites."}], "id": "q02"}, {"question": "Which rhetorical device is specifically defined as one word governing two others in different senses?", "options": [{"text": "Antithesis", "isCorrect": false, "rationale": "Antithesis involves placing opposing ideas in parallel structures, not the shared governance of a single word."}, {"text": "Zeugma", "isCorrect": true, "rationale": "Zeugma is the specific term for a single word that links two different parts of a sentence in distinct ways."}, {"text": "Epigram", "isCorrect": false, "rationale": "An epigram is a compressed, memorable statement, which is a different category of rhetorical device."}, {"text": "Register Mixing", "isCorrect": false, "rationale": "Register mixing refers to the collision of formal and informal language rather than a grammatical link between specific words."}], "id": "q03"}, {"question": "What does the text identify as the 'engine of attention' that prevents a reader from skimming Mencken's prose?", "options": [{"text": "Rhythmic Consistency", "isCorrect": false, "rationale": "While rhythm is important, the text notes that keeping the reader 'off balance' through surprise is what prevents skimming."}, {"text": "Surprise", "isCorrect": true, "rationale": "Surprise—achieved through register mixing, tonal shifts, and structural changes—is what makes the prose impossible to skim."}, {"text": "Logical Deductions", "isCorrect": false, "rationale": "The text focuses on the performance and texture of the language (style) rather than the purely logical progression of the argument."}, {"text": "Objective Neutrality", "isCorrect": false, "rationale": "Mencken's voice is described as contemptuous and individual, which is the opposite of objective neutrality."}], "id": "q04"}, {"question": "In the analysis of the opening of *Notes on Democracy*, what specific sound effect is attributed to the alliteration of the 's' sound in 'sweet, soft music'?", "options": [{"text": "A sibilance that suggests a sinister sense of seduction.", "isCorrect": true, "rationale": "The text states that the alliteration creates a hissing sibilance that sounds sinister, hinting at seduction rather than sincerity."}, {"text": "A soothing melody that reinforces the positive origins of democracy.", "isCorrect": false, "rationale": "The close reading suggests the passage is ironic and that 'every word is poisoned,' making a purely positive interpretation incorrect."}, {"text": "A blunt, heavy eruption that symbolizes the 'harsh bawling' of the mob.", "isCorrect": false, "rationale": "The text associates heavy, blunt sounds (like the 'b' sound) with the 'harsh bawling from below,' not the s-sounds."}, {"text": "A quick, light rhythm that suggests the triviality of songbirds.", "isCorrect": false, "rationale": "Light, quick sounds are attributed to the 't' sounds in 'dulcet twittering,' not the sibilant 's' sounds."}], "id": "q05"}, {"question": "Mencken's 'Voice' is described as a 'construction' rather than a 'natural endowment.' According to the text, how was this construction built?", "options": [{"text": "Through an innate talent discovered in early childhood.", "isCorrect": false, "rationale": "The text explicitly states that voice is not a natural endowment but a result of deliberate effort."}, {"text": "By strictly following the rules of grammar and avoiding experimentation.", "isCorrect": false, "rationale": "Finding a voice is said to require 'deliberate experimentation' and 'writing a great deal of bad prose first.'"}, {"text": "Through decades of journalism, voracious reading, and deliberate experimentation.", "isCorrect": true, "rationale": "The text attributes the construction of Mencken's voice to his long career in journalism, extensive reading, and intentional practice."}, {"text": "By imitating the foundational rhetorical treatises of scholars like Aristotle.", "isCorrect": false, "rationale": "While Aristotle is mentioned as a scholar of rhetoric, the text says imitating Mencken (or others) leads to parody, whereas finding a voice requires personal experimentation."}], "id": "q06"}, {"question": "What is the primary difference between 'Satire' and 'Polemic' as defined in the provided toolkit?", "options": [{"text": "Satire is a direct attack, while polemic is an indirect attack.", "isCorrect": false, "rationale": "The definitions are actually the reverse: satire is indirect, and polemic is direct."}, {"text": "Satire uses irony to attack indirectly, while polemic is a direct, confrontational attack.", "isCorrect": true, "rationale": "The toolkit defines satire as an indirect attack and polemic as a direct attack."}, {"text": "Satire is intended to be funny, while polemic is intended to be educational.", "isCorrect": false, "rationale": "While satire is often funny, the toolkit distinguishes them based on the direction of the attack (indirect vs. direct)."}, {"text": "Satire targets individuals, while polemic targets political systems.", "isCorrect": false, "rationale": "The toolkit does not distinguish them by their target, but by the method and directness of the rhetorical assault."}], "id": "q07"}, {"question": "How does the text define 'Style as Argument'?", "options": [{"text": "The use of decorative language to make an argument more palatable to a general audience.", "isCorrect": false, "rationale": "The text explicitly states style is 'not decoration applied after the argument is built.'"}, {"text": "The idea that the texture of the language itself demonstrates the truth of the claim being made.", "isCorrect": true, "rationale": "The text argues that the medium is the message, and a great stylist performs their argument through the language's texture."}, {"text": "The strategy of using complex vocabulary to distract from weak logical evidence.", "isCorrect": false, "rationale": "The text argues that style communicates intelligence and authority and is an advocate for the argument, not a distraction."}, {"text": "A method of writing where the author's real persona is hidden behind a constructed voice.", "isCorrect": false, "rationale": "This describes 'Persona,' which is a separate tool in the kit, though related to the overall concept of style."}], "id": "q08"}, {"question": "Which rhetorical device involves the 'deliberate descent from the elevated to the absurd'?", "options": [{"text": "Invective", "isCorrect": false, "rationale": "Invective is defined as the 'art of verbal attack,' not necessarily a shift in elevation."}, {"text": "Bathos", "isCorrect": true, "rationale": "Bathos is specifically the move from a high or serious tone to a ridiculous or mundane one."}, {"text": "Litotes", "isCorrect": false, "rationale": "Litotes is a form of understatement, not a tonal descent from the elevated to the absurd."}, {"text": "Apostrophe", "isCorrect": false, "rationale": "Apostrophe is a direct address to an absent person or abstraction."}], "id": "q09"}, {"question": "What is the purpose of a 'Peroration' in a piece of writing or speech?", "options": [{"text": "To introduce the primary thesis of the argument.", "isCorrect": false, "rationale": "The peroration is the closing section, not the introductory one."}, {"text": "To repeat words at the beginning of successive clauses for emphasis.", "isCorrect": false, "rationale": "This is the definition of anaphora."}, {"text": "To serve as the closing section of a speech or argument.", "isCorrect": true, "rationale": "The toolkit identifies the peroration as the final, concluding part of a rhetorical work."}, {"text": "To provide a detailed list of evidence supporting a claim.", "isCorrect": false, "rationale": "This refers more to 'Catalogue' or 'Accumulation' rather than the final section of the structure."}], "id": "q10"}, {"question": "Mencken's use of the term *Homo boobiens* to describe the democratic citizen is an example of which two rhetorical tools used in combination?", "options": [{"text": "Hyperbole and Register Mixing", "isCorrect": true, "rationale": "The text identifies *Homo boobiens* as hyperbole and notes register mixing as 'a Latin term dropped into a barroom sentence.'"}, {"text": "Understatement and Analogy", "isCorrect": false, "rationale": "Calling someone 'boobiens' is an exaggeration, the opposite of understatement, and while it acts as a label, it is primarily hyperbole."}, {"text": "Litotes and Anaphora", "isCorrect": false, "rationale": "Litotes is understatement and anaphora is repetition at the beginning of clauses; neither fits the coinage of *Homo boobiens*."}, {"text": "Parallelism and Epigram", "isCorrect": false, "rationale": "While the term might appear in an epigram, its primary rhetorical mechanism is the blend of Latin and crude insult (register) and exaggeration (hyperbole)."}], "id": "q11"}, {"question": "In the context of Mencken's analysis of democratic origins, why is 'dulcet twittering' considered ironic?", "options": [{"text": "Because it implies that Enlightenment philosophers were harmless songbirds whose ideas lacked weight.", "isCorrect": true, "rationale": "The close reading suggests the phrase reduces philosophers to songbirds, implying their ideas were mere entertainment or trivial 'pretty noise.'"}, {"text": "Because 'twittering' was a literal description of how political debates were conducted in the Western World.", "isCorrect": false, "rationale": "The text treats 'twittering' as a metaphorical and ironic reduction, not a literal description."}, {"text": "Because it sounds pleasant, but refers to the 'harsh bawling' of the common people.", "isCorrect": false, "rationale": "The text contrasts 'twittering' (from above/elites) with 'bawling' (from below/mob); it doesn't say they are the same thing."}, {"text": "Because it is an example of litotes, where Mencken means something much louder than 'twittering.'", "isCorrect": false, "rationale": "The text identifies the passage as ironic and metaphorically poisonous, but specifically links 'twittering' to a reduction of philosophical stature."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
