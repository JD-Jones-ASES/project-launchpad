<script>
var QUESTIONS = [{"question": "What is the primary rhetorical function of Mencken's 'footnote' framing for this section, as described in the text?", "options": [{"text": "To suggest that the content is merely an unimportant addendum to his main argument.", "isCorrect": false, "rationale": "The text states this is 'false modesty' that disguises a 'sustained passage of historical narrative,' indicating it is not truly unimportant."}, {"text": "To imply that the examples of defeated politicians are self-evident and widely known.", "isCorrect": true, "rationale": "The text explicitly states: 'By presenting this material as an afterthought, Mencken suggests that the examples are so obvious they hardly need stating — that any educated reader could supply the list himself.'"}, {"text": "To provide a concise summary of the arguments made in the preceding chapters of Part II.", "isCorrect": false, "rationale": "The text notes Mencken 'steps back from the structural analysis of the preceding chapters' and offers a historical gallery, not a summary of prior arguments."}, {"text": "To establish a serious, academic tone for a historical analysis of political figures.", "isCorrect": false, "rationale": "The tone is described as 'mock-historical' and an 'entertaining postscript,' not strictly serious or academic."}]}, {"question": "While the text defines a 'lame duck' politician, Mencken's primary concern in this section extends beyond the technical definition. What psychological aspect of these figures is he most interested in exploring?", "options": [{"text": "Their ability to pass significant legislation during their remaining term.", "isCorrect": false, "rationale": "The text explicitly states: 'Mencken's concern is not with the constitutional mechanics; it is with the psychological type.'"}, {"text": "The financial struggles and post-office careers of defeated politicians.", "isCorrect": false, "rationale": "The text does not mention Mencken's concern with the financial or career struggles of these politicians."}, {"text": "The transformation of their ambition into destructive rage after electoral failure.", "isCorrect": true, "rationale": "The text clearly states Mencken's real subject is 'the defeated aspirant, the man who sought the presidency and, having failed, turned his energies to sabotage,' and whose 'ambition curdles into destructive rage.'"}, {"text": "The historical evolution of the 'lame duck' period and constitutional reforms.", "isCorrect": false, "rationale": "While the Twentieth Amendment is mentioned, the text clarifies that Mencken's focus is not on 'constitutional mechanics' but on the 'psychological type.'"}]}, {"question": "The text describes the dominant tone of this section as 'mock-historical.' Which of the following best captures the essence of this tone and its accompanying voice?", "options": [{"text": "A detached, academic historian offering objective constitutional analysis.", "isCorrect": false, "rationale": "Mencken's commentary 'slides from analysis into character assassination' and is not objective; he steps back from 'structural analysis'."}, {"text": "An informed and opinionated individual sharing entertaining anecdotes with a comedic flair.", "isCorrect": true, "rationale": "The text states Mencken's commentary 'slides from analysis into character assassination with a fluency that is comic in itself' and the voice is 'that of a man telling anecdotes at a dinner party — informed, opinionated, and thoroughly entertaining.'"}, {"text": "A solemn political commentator lamenting the decay of American democratic ideals.", "isCorrect": false, "rationale": "While critical, the tone is 'comic' and an 'entertaining postscript,' not solemn lamentation."}, {"text": "A clinical reporter presenting facts with precise, unemotional language.", "isCorrect": false, "rationale": "The text highlights Mencken's 'venomous' contempt for Bryan and his 'character assassination,' which are far from unemotional."}]}, {"question": "According to the text, what is the key characteristic that distinguishes Mencken's use of 'bathos' from a simple 'anticlimax'?", "options": [{"text": "Bathos occurs in poetry, while anticlimax is found in prose.", "isCorrect": false, "rationale": "While Pope popularized the term in an essay about poetry, the text applies bathos to Mencken's prose without limiting it to poetry."}, {"text": "Bathos involves an accidental failure to maintain a grand tone, whereas anticlimax is always deliberate.", "isCorrect": false, "rationale": "This statement reverses the definitions; the text defines anticlimax as 'often accidental' and bathos as 'intentional'."}, {"text": "Bathos is a deliberate descent from the elevated to the absurd for comic effect, unlike an often accidental anticlimax.", "isCorrect": true, "rationale": "The text states: 'Bathos: A deliberate descent from the elevated or serious to the trivial or absurd, used for comic effect. Distinguished from anticlimax (which may be accidental) by its intentionality.'"}, {"text": "Bathos uses sophisticated vocabulary, while anticlimax relies on simple language.", "isCorrect": false, "rationale": "The text does not use vocabulary level as the distinguishing factor between bathos and anticlimax."}]}, {"question": "Mencken writes that Bryan 'consecrated himself to reprisals.' What rhetorical effect does the use of the word 'consecrated' achieve in this context?", "options": [{"text": "It emphasizes Bryan's deep religious faith and moral conviction in his political actions.", "isCorrect": false, "rationale": "The text states this creates 'irony so dense it is almost a pun' because Bryan's religious language is applied to 'destruction'."}, {"text": "It suggests that Bryan's political vengeance was a selfless act for the greater good.", "isCorrect": false, "rationale": "The text describes Bryan's actions as driven by 'colossal lust for revenge' and 'baseness of the motive,' not selflessness."}, {"text": "It creates a strong sense of irony by applying a religious term to an act of destructive political revenge.", "isCorrect": true, "rationale": "The text explains: 'the religious verb 'consecrated' applied to the act of political revenge creates an irony so dense it is almost a pun. Bryan, the evangelical crusader, is described in the language of religious devotion, but what he devotes himself to is destruction.'"}, {"text": "It highlights the elevated and sophisticated nature of Bryan's political strategies.", "isCorrect": false, "rationale": "The text uses this diction to mock 'the baseness of the motive,' not to praise sophistication."}]}, {"question": "The text states that the syntax reflects the structure of a series of historical portraits. How does Mencken manipulate the length and detail of these portraits to create a specific effect as the section progresses?", "options": [{"text": "He keeps all portraits uniformly brief to maintain a rapid, conversational pace.", "isCorrect": false, "rationale": "The text explicitly states the portraits 'grow longer and more detailed'."}, {"text": "He starts with detailed portraits and gradually shortens them to build to a concise conclusion.", "isCorrect": false, "rationale": "The text describes the opposite: portraits 'grow longer and more detailed as Mencken moves toward his principal target — Bryan'."}, {"text": "He makes the portraits progressively longer and more detailed, building acceleration towards Bryan as his principal target.", "isCorrect": true, "rationale": "The text states: 'The portraits grow longer and more detailed as Mencken moves toward his principal target — Bryan — creating a sense of acceleration.'"}, {"text": "He uses varying lengths randomly to reflect the chaotic nature of democratic politics.", "isCorrect": false, "rationale": "The text notes this descent from serious to absurd is 'deliberate and precisely controlled'."}]}, {"question": "The text notes that the Bryan portrait is the section's 'emotional peak' where the tone 'darkens.' How does Mencken's description of Bryan, particularly his death, engage the reader emotionally and intellectually?", "options": [{"text": "It evokes profound sympathy for Bryan's suffering and his unfulfilled political ambitions.", "isCorrect": false, "rationale": "Mencken's tone for Bryan is 'venomous,' not sympathetic; he portrays Bryan's death with 'grotesque precision'."}, {"text": "It presents a detached, clinical analysis of Bryan's physiological decline without emotional bias.", "isCorrect": false, "rationale": "The description combines 'clinical reportage and gothic horror' and elicits 'uneasy laughter,' indicating an emotional and biased approach."}, {"text": "It elicits an uneasy laughter, combining clinical reportage with gothic horror to create a grotesque and darkly humorous effect.", "isCorrect": true, "rationale": "The text states the description 'hovers between clinical reportage and gothic horror' and that 'The reader laughs, but uneasily,' capturing the grotesque and darkly humorous effect."}, {"text": "It uses euphemisms to soften the harsh realities of Bryan's political defeat and physical end.", "isCorrect": false, "rationale": "Mencken uses terms like 'ambulent boil' and describes a 'temperature of 110 degrees' with 'eyes rolling horribly,' which are far from euphemistic."}]}, {"question": "Re-examine the sentence describing Bryan's death: 'He passed out of life at last at a temperature of 110 degrees, his eyes rolling horribly toward 1600 Pennsylvania avenue, N.W. and its leaky copper roof.' Which combination of rhetorical devices is most prominently at play in this single sentence?", "options": [{"text": "Alliteration, understatement, and metaphor.", "isCorrect": false, "rationale": "While subtle alliteration might be present, it's not a primary device. The description is not understated, nor is metaphor the most prominent feature."}, {"text": "Personification, paradox, and allegory.", "isCorrect": false, "rationale": "These devices are not the most prominent in this specific sentence; the description is literal in its details, however absurd."}, {"text": "Clinical specificity, gothic horror, and bathos.", "isCorrect": true, "rationale": "The text directly analyzes this sentence: 'A temperature of 110 degrees' is clinical. 'His eyes rolling horribly' is gothic. The '1600 Pennsylvania avenue, N.W. and its leaky copper roof' demonstrates a 'bathetic descent' and 'bathos perfected.'"}, {"text": "Irony, anaphora, and hyperbole.", "isCorrect": false, "rationale": "Irony is present, but anaphora (repetition of a word or phrase at the beginning of successive clauses) is not. Hyperbole is more evident in the *following* sentences, not this one as primarily described."}]}, {"question": "The Crown Prince fantasy, where a prince cannot publicly wish his father would 'come down with endocarditis,' is presented as a 'masterclass' in which specific rhetorical device?", "options": [{"text": "Metaphor, by comparing the prince's murderous thoughts to a hidden illness.", "isCorrect": false, "rationale": "While 'endocarditis' is a medical term, the text highlights the overall structural shift and incongruity, not a sustained comparison as metaphor."}, {"text": "Hyperbole, by exaggerating the severity of royal family disputes.", "isCorrect": false, "rationale": "The focus here is on the deliberate descent to the trivial/absurd, not exaggeration of severity, which would be hyperbole."}, {"text": "Bathos, through the deliberate shift from serious political analysis to an absurd, trivial scenario.", "isCorrect": true, "rationale": "The text states: 'The section's closing paragraph is a masterclass in bathos. . . . The shift from American constitutional history to a comic sketch of royal etiquette is itself bathetic — a deliberate descent from the important to the trivial.'"}, {"text": "Zeugma, by linking 'praying publicly' and 'come down with endocarditis' in a grammatically unexpected way.", "isCorrect": false, "rationale": "While the combination is striking, the text specifically identifies the broader shift in tone and subject matter as an example of bathos, not zeugma."}]}, {"question": "Considering the 'coda' nature of this section and Mencken's focus on 'defeated aspirants' whose ambition 'curdles into destructive rage,' what broader critique of 'democratic politics' is Mencken implicitly making?", "options": [{"text": "Democracy fosters a system where politicians are effectively held accountable for their actions and failures.", "isCorrect": false, "rationale": "Mencken's examples show politicians whose bitterness 'poisoned American public life,' directly contradicting effective accountability."}, {"text": "Democratic processes ultimately lead to the self-correction of political abuses and character flaws.", "isCorrect": false, "rationale": "The text states 'Mencken has made his case against democratic politics,' not for its self-correcting nature."}, {"text": "The democratic system gives a platform to failed aspirants whose personal resentments can dangerously infect public discourse and action.", "isCorrect": true, "rationale": "The text describes Mencken's subject as 'the defeated aspirant...having failed, turned his energies to sabotage' and ends the Crown Prince fantasy by saying, 'Under democracy, they are bellowed from every stump,' highlighting how democracy amplifies these destructive tendencies."}, {"text": "The historical examples show that politicians, regardless of system, gracefully accept defeat and move on.", "isCorrect": false, "rationale": "The entire section focuses on politicians whose 'bitterness poisoned American public life' and whose 'ambition curdles into destructive rage,' directly contradicting graceful acceptance."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
