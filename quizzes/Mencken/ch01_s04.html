<script>
var QUESTIONS = [{"question": "According to the text, what is the most distinctive characteristic of the organization of Mencken's *Notes on Democracy*?", "options": [{"text": "It follows a rigid, logical philosophical structure, systematically dissecting democratic theory.", "isCorrect": false, "rationale": "The text explicitly states that Mencken was not a systematic thinker and that the book's organization is 'more musical than logical,' with themes recurring rather than following a strict philosophical structure."}, {"text": "It is unified by a distinctive voice and musical recurrence of themes, rather than a traditional logical or philosophical structure.", "isCorrect": true, "rationale": "The text notes, 'the organization is more musical than logical: themes recur, arguments circle back on themselves, and the whole performance is unified less by a philosophical structure than by a distinctive voice.'"}, {"text": "It is a journalistic exposé with no discernible organizational pattern, reflecting Mencken's disdain for formal structure.", "isCorrect": false, "rationale": "While Mencken's style was journalistic, the text does describe an organization into four parts and twenty-four sections, implying a structure, albeit one described as 'musical' rather than chaotic."}, {"text": "It presents a clear, step-by-step argument for an alternative form of government to democracy.", "isCorrect": false, "rationale": "The text states that Mencken 'offers no alternative to democracy' and was a 'diagnostician' rather than a prescriber of cures."}], "id": "q01"}, {"question": "Mencken's core argument against democracy hinges on his view of the 'common man.' Which description best encapsulates his perspective on this individual?", "options": [{"text": "Rational, self-governing, and capable of wise collective decisions.", "isCorrect": false, "rationale": "Mencken's view is the direct opposite: he considered the common man 'too stupid, too credulous, and too consumed by envy to govern wisely.'"}, {"text": "Prone to occasional errors but fundamentally seeking the greater good.", "isCorrect": false, "rationale": "Mencken's critique is much harsher, labeling the common man as the 'inferior man' whose inherent flaws lead to bad governance."}, {"text": "Too stupid, too credulous, and too consumed by envy to govern wisely.", "isCorrect": true, "rationale": "The text explicitly states Mencken's view: 'The common man — the “inferior man,” in Mencken's deliberately provocative phrase — is too stupid, too credulous, and too consumed by envy to govern wisely.'"}, {"text": "A potential victim of elite manipulation but inherently virtuous.", "isCorrect": false, "rationale": "While Mencken acknowledges manipulation, his primary criticism focuses on the inherent flaws of the common man himself, not just as a victim."}], "id": "q02"}, {"question": "A political candidate, during a campaign rally, frequently uses highly emotional language to appeal to the audience's fears and promises significant personal benefits to a specific demographic, which then leads to their election. According to Mencken's framework, how would he most likely characterize this politician?", "options": [{"text": "A diligent public servant striving to represent their constituents.", "isCorrect": false, "rationale": "Mencken's view of democratic politicians is highly cynical; he would not see such actions as diligent public service."}, {"text": "A skilled statesman effectively rallying public support.", "isCorrect": false, "rationale": "Mencken would see this as manipulation, not statesmanship, due to the appeal to base emotions and self-interest."}, {"text": "A 'Demagogue' who flatters the mob and exploits its fears for personal gain.", "isCorrect": true, "rationale": "The description perfectly matches Mencken's definition of 'The Demagogue': 'The democratic politician who flatters the mob, exploits its fears, and uses its power for personal gain.'"}, {"text": "A 'Moralist' attempting to instill virtue through political means.", "isCorrect": false, "rationale": "A 'Moralist' imposes private moral codes, while a 'Demagogue' exploits the mob for power and gain. The scenario describes the latter."}], "id": "q03"}, {"question": "Which intellectual figure is cited as influencing Mencken's idea that crowds are irrational, emotional, and easily manipulated?", "options": [{"text": "Friedrich Nietzsche", "isCorrect": false, "rationale": "Nietzsche influenced Mencken's critique of herd morality and the distinction between superior/inferior men, not specifically the irrationality of crowds in general."}, {"text": "Vilfredo Pareto", "isCorrect": false, "rationale": "Pareto influenced Mencken's theory about the circulation of elites and the permanence of elite rule, not the irrationality of crowds."}, {"text": "Gustave Le Bon", "isCorrect": true, "rationale": "The text explicitly states: 'From Gustave Le Bon... he took the idea that crowds are irrational, emotional, and easily manipulated.'"}, {"text": "Bryan and Coolidge", "isCorrect": false, "rationale": "Bryan and Coolidge were politicians Mencken despised, not intellectual influences."}], "id": "q04"}, {"question": "The text explicitly states, 'It is important to be precise about what Mencken is not. He is not a fascist.' What evidence is provided to support this assertion?", "options": [{"text": "He offered a clear philosophical alternative to both democracy and fascism.", "isCorrect": false, "rationale": "The text clarifies that Mencken 'offers no alternative to democracy' and would have considered it beneath him to do so, thus ruling out a philosophical alternative to fascism as well."}, {"text": "He believed in the inherent goodness of the common man, which fascists deny.", "isCorrect": false, "rationale": "Mencken held a very low opinion of the common man, aligning with certain aspects of fascist ideology regarding the masses, but his overall stance was different."}, {"text": "He despised totalitarian leaders like Hitler and Mussolini as thoroughly as he despised American democratic figures like Bryan and Coolidge.", "isCorrect": true, "rationale": "The text states: 'Mencken despised Hitler and Mussolini as thoroughly as he despised Bryan and Coolidge.' This demonstrates his universal contempt for what he perceived as mediocrity and corruption, regardless of political system."}, {"text": "He was a staunch advocate for individual liberty above all forms of government.", "isCorrect": false, "rationale": "While he wrote about 'Democracy and Liberty,' the text states he was 'not an advocate for any particular form of government' and was a 'diagnostician,' not a proponent of solutions."}], "id": "q05"}, {"question": "Mencken describes himself as a 'diagnostician.' What does this self-description imply about his approach to government and society?", "options": [{"text": "He prescribed specific reforms and treatments for the ailments of democracy.", "isCorrect": false, "rationale": "A diagnostician identifies a problem, but doesn't necessarily prescribe a cure. The text states he 'identifies the disease without pretending to have the cure.'"}, {"text": "He objectively analyzed societal issues from a purely scientific, academic standpoint.", "isCorrect": false, "rationale": "The text highlights his rhetorical extravagance and 'demolition' style, which is far from purely objective or scientific."}, {"text": "He identified the flaws and diseases within democratic systems but did not offer alternative forms of government or solutions.", "isCorrect": true, "rationale": "The text clarifies his role: 'one who identifies the disease without pretending to have the cure.' He offered no alternatives to democracy."}, {"text": "He believed in a scientific, systematic approach to political philosophy, which is why his book is so 'systematic.'", "isCorrect": false, "rationale": "The text notes Mencken was 'not a systematic thinker' and used 'systematic' with quotation marks to indicate his unique, non-traditional approach."}], "id": "q06"}, {"question": "A local school board member insists that certain classic literature deemed 'too challenging' or 'controversial' should be removed from the curriculum, advocating for materials that promote 'simpler, more uplifting' messages. How would Mencken most likely categorize this individual based on his 'Targets'?", "options": [{"text": "The Mob, as they are reflecting public opinion on education.", "isCorrect": false, "rationale": "The Mob refers to the general electorate. This individual is actively shaping policy, not just being part of the general populace."}, {"text": "The Demagogue, as they are manipulating public sentiment for personal gain.", "isCorrect": false, "rationale": "While there might be an element of public appeal, the primary action described is imposing a moral/educational code, not explicitly flattering for political power."}, {"text": "The Moralist, by imposing private moral or ideological codes through public policy.", "isCorrect": true, "rationale": "This fits the description of 'The Moralist': 'anyone who uses democratic legislation to impose private moral codes on the public.' Here, it's an ideological/moral code about 'uplifting' messages in education."}, {"text": "The Pedagogue, as they are an 'expert' claiming authority without genuine intelligence.", "isCorrect": false, "rationale": "While the individual might be a 'pedagogue' in a general sense, the specific action of imposing codes makes 'The Moralist' a more direct fit. The 'Pedagogue' target focuses on experts claiming authority without genuine intelligence, not necessarily imposing moral codes."}], "id": "q07"}, {"question": "The text advises caution when reading Mencken, stating that 'Reading Mencken literally is a mistake.' What is the primary reason given for this warning?", "options": [{"text": "His writings contain numerous factual inaccuracies that require careful verification.", "isCorrect": false, "rationale": "The text does not mention factual inaccuracies but focuses on his rhetorical style."}, {"text": "His rhetorical extravagance and exaggeration are deliberate techniques for 'demolition,' not a scientific treatise.", "isCorrect": true, "rationale": "The 'caution' section clearly states: 'His rhetorical extravagance is deliberate — the exaggeration is the technique. When he calls the average voter a member of Homo boobiens, he is not writing a scientific treatise; he is performing a demolition, and the performance is the point.'"}, {"text": "He frequently contradicted himself across different works, making a consistent interpretation difficult.", "isCorrect": false, "rationale": "The text does not mention self-contradictions but rather the internal 'musical' organization of *Notes on Democracy*."}, {"text": "He often used satirical humor that obscured his genuine philosophical positions.", "isCorrect": false, "rationale": "While he used a distinctive voice, the text emphasizes 'exaggeration' and 'demolition' as key techniques, not necessarily obscuring his argument, but rather making it 'land' with rhetorical force."}], "id": "q08"}, {"question": "According to the section, what was Vilfredo Pareto's primary contribution to Mencken's skepticism regarding democratic equality?", "options": [{"text": "The idea that individuals in crowds lose their rational faculties and become suggestible.", "isCorrect": false, "rationale": "This idea came from Gustave Le Bon, not Vilfredo Pareto."}, {"text": "The critique of herd morality and the distinction between 'superior' and 'inferior' men.", "isCorrect": false, "rationale": "This was borrowed from Friedrich Nietzsche, not Vilfredo Pareto."}, {"text": "The theory that societies are always governed by small elites, and democratic revolutions merely replace one elite with another.", "isCorrect": true, "rationale": "The text states: 'From Vilfredo Pareto... he absorbed the theory that elites always rule, regardless of the nominal form of government, and that democratic revolutions merely replace one ruling class with another.'"}, {"text": "The concept that democratic moralism is tyranny dressed in the robes of virtue.", "isCorrect": false, "rationale": "This was a core part of Mencken's own argument, influenced by his general critique, not directly attributed to Pareto."}], "id": "q09"}, {"question": "Mencken criticized 'the whole apparatus of “the uplift”' including Prohibition and censorship. Which of Mencken's 'Targets' would be most closely associated with driving these efforts?", "options": [{"text": "The Mob, as these laws reflect the collective will of the majority.", "isCorrect": false, "rationale": "While the mob might be influenced, the active imposition of these laws comes from specific individuals or groups, not the mob directly implementing them."}, {"text": "The Demagogue, who would use such moral issues to gain political power.", "isCorrect": false, "rationale": "The demagogue exploits fears for personal gain. While related, the primary characteristic of 'uplift' efforts is the imposition of moral codes."}, {"text": "The Moralist, who uses democratic legislation to impose private moral codes on the public.", "isCorrect": true, "rationale": "The description of 'The Moralist' directly matches: 'The reformer, the Prohibitionist, the censor — anyone who uses democratic legislation to impose private moral codes on the public.' Prohibition and censorship are prime examples of this."}, {"text": "The Pedagogue, as 'experts' advocating for social control.", "isCorrect": false, "rationale": "The Pedagogue focuses on 'experts' claiming authority without genuine intelligence. While some might be involved, the core driver of 'the uplift' is the moralistic agenda, aligning with 'The Moralist'."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
