<script>
var QUESTIONS = [{"question": "According to Mencken, how did democracy primarily enter the Western World?", "options": [{"text": "As a spontaneous popular uprising demanding new rights from below.", "isCorrect": false, "rationale": "Mencken explicitly states there was 'no harsh bawling from below,' indicating it was not a spontaneous popular uprising."}, {"text": "As a fashionable ideal promoted by intellectuals to an unengaged populace.", "isCorrect": true, "rationale": "Mencken opens by stating, 'Democracy, he tells us, arrived not as a revolution but as a fashion, imposed from above by intellectuals who had never met the common man they claimed to champion.'"}, {"text": "Through a gradual evolution of philosophical thought among the working classes.", "isCorrect": false, "rationale": "The text describes a 'dulcet twittering from above,' not a bottom-up evolution of thought among the working classes."}, {"text": "After a series of devastating wars that forced societal restructuring.", "isCorrect": false, "rationale": "While wars are mentioned as a context for democratic theory 'seeping down' later, they are not presented as the initial cause for democracy's arrival."}], "id": "q01"}, {"question": "Mencken describes the 'democratic man' as beginning as 'an ideal being, full of ineffable virtues and romantic wrongs.' What historical figure does he most closely associate with originating this idealized concept?", "options": [{"text": "Jean-Jacques Rousseau.", "isCorrect": true, "rationale": "The text directly states, 'Democratic man thus began as an ideal being...in brief, as Rousseau’s noble savage.'"}, {"text": "Karl Marx.", "isCorrect": false, "rationale": "Mencken refers to a 'philosopher out of the gutter' later in the text, who pushed the doctrine to an extreme conclusion, but Rousseau is specifically named as the originator of the 'noble savage' concept."}, {"text": "Sentimental Christian thinkers who predated Modernism.", "isCorrect": false, "rationale": "While Mencken mentions 'stale Christian bilge' influencing later 'saccharine Liberals,' Rousseau is the specific figure linked to the origin of the 'noble savage' ideal."}, {"text": "An unnamed philosopher out of the gutter.", "isCorrect": false, "rationale": "This reference pertains to a later development in democratic thought, not the initial concept of the 'noble savage.'"}], "id": "q02"}, {"question": "What does Mencken mean when he refers to the 'mystical merit, an esoteric and ineradicable rectitude, in the man at the bottom of the scale'?", "options": [{"text": "A scientifically proven inherent moral superiority of the lower classes.", "isCorrect": false, "rationale": "Mencken uses terms like 'mystical merit' and 'strange magic,' implying this is an idealized belief rather than a scientifically proven fact."}, {"text": "The notion that those with less privilege inherently possess greater virtue and wisdom.", "isCorrect": true, "rationale": "The text explains this as 'that inferiority, by some strange magic, becomes a sort of superiority—nay, the superiority of superiorities,' and that 'Down there, one hears, lies a deep, illimitable reservoir of righteousness and wisdom.'"}, {"text": "The idea that religious faith is more prevalent and pure among the common people.", "isCorrect": false, "rationale": "While 'stale Christian bilge' is mentioned, the 'mystical merit' refers specifically to an inherent rectitude and wisdom, not solely religious adherence."}, {"text": "The historical evidence that leaders often emerge from the most humble backgrounds.", "isCorrect": false, "rationale": "This is presented as a 'theory' or 'idea' about inherent qualities, not a historical observation of leadership emergence."}], "id": "q03"}, {"question": "According to Mencken, what was the primary aim of 'early democratic man' when he first encountered the democratic ideal?", "options": [{"text": "To establish a system where his class could competently rule.", "isCorrect": false, "rationale": "Mencken explicitly states, 'He had no apparent belief in the acroamatic virtue of his own class, and certainly none in its capacity to rule.'"}, {"text": "To secure concrete, materialistic improvements in his living conditions.", "isCorrect": true, "rationale": "The text explains, 'What he wanted was something concrete and highly materialistic—more to eat, less work, higher wages, lower taxes.'"}, {"text": "To eliminate the existing aristocracy and seize their wealth.", "isCorrect": false, "rationale": "Mencken clarifies, 'His aim was not to exterminate the baron, but simply to bring the baron back to a proper discharge of baronial business.'"}, {"text": "To embrace the abstract ideals of popular sovereignty and self-governance.", "isCorrect": false, "rationale": "The text notes that 'Early democratic man seems to have given little thought to the democratic ideal, and less veneration.'"}], "id": "q04"}, {"question": "Mencken famously quips, 'The cure for the evils of democracy is more democracy!' In the context of the provided text, how does he primarily intend this statement to be understood?", "options": [{"text": "As a genuine political endorsement of democratic expansion to solve its problems.", "isCorrect": false, "rationale": "Given Mencken's critical tone throughout the entire passage, this statement is presented sarcastically, highlighting a perceived flaw in democratic dogma rather than offering a sincere solution."}, {"text": "As a sarcastic commentary on the inherent circular logic within democratic dogma.", "isCorrect": true, "rationale": "Following his critique of the idealized 'reservoir of righteousness and wisdom' in the lower orders, Mencken presents this as the self-justifying mantra of democratic proponents, implicitly mocking its uncritical application."}, {"text": "As a call for immediate, radical reforms to existing democratic institutions.", "isCorrect": false, "rationale": "He presents this as a prevalent, problematic belief within the democratic framework, not as his own call for specific reforms."}, {"text": "As a historical observation of how democratic movements typically evolve.", "isCorrect": false, "rationale": "The statement is presented as a 'cure' or remedy within democratic thought, not as a neutral historical observation of its evolution."}], "id": "q05"}, {"question": "Mencken uses the aftermath of the French Revolution (1793-1796) to illustrate which of his central arguments about 'the mob'?", "options": [{"text": "The mob's capacity for sustained, organized political action to achieve democratic ideals.", "isCorrect": false, "rationale": "Mencken describes 'wild shooting' and the mob turning on its own leaders, suggesting instability and disorganization rather than sustained, organized action."}, {"text": "The mob's inherent desire for aristocratic rule over self-governance.", "isCorrect": false, "rationale": "While a king was eventually re-established, the core point is the mob's rejection of its own leaders and subsequent chaos, which led to the re-establishment of an old order, not a positive desire for aristocracy."}, {"text": "The mob's tendency to reject its own leaders who adopt 'baronial airs' and revert to prior forms of governance.", "isCorrect": true, "rationale": "The text states that when 'men out of the mob began to take on baronial airs, the mob itself quickly showed its opinion of them by butchering them deliberately...by the middle of 1796 it had another King in fact.'"}, {"text": "The mob's consistent loyalty to its leaders once power is seized.", "isCorrect": false, "rationale": "Mencken's account shows the opposite; the mob 'butchered them deliberately and in earnest' once their own leaders took on power, demonstrating disloyalty."}], "id": "q06"}, {"question": "How does Mencken characterize the spread of democratic theory from intellectuals ('metaphysicians') to the common people ('the mob') over time?", "options": [{"text": "As an immediate and overwhelming transformation due to widespread literacy.", "isCorrect": false, "rationale": "Mencken describes it as 'seeping down...only slowly' and a 'stealthy plague,' implying it was not immediate or overwhelming."}, {"text": "As a 'stealthy plague' that 'seeped down' gradually, often through rhetoric.", "isCorrect": true, "rationale": "The text states, 'there had been a certain seeping down of democratic theory from the metaphysicians to the mob...Rhetoric, like a stealthy plague, was doing its immemorial work.'"}, {"text": "As a direct and forceful imposition through revolutionary decrees.", "isCorrect": false, "rationale": "Mencken contrasts it with revolution and describes a gradual 'seeping,' not a forceful imposition on the general populace."}, {"text": "As a spontaneous realization of inherent rights among the oppressed classes.", "isCorrect": false, "rationale": "He notes it was 'obscured by the uproar' and took time, especially where there was time for oratory, indicating it was not spontaneous."}], "id": "q07"}, {"question": "By 1828 in America and 1848 in Europe, what core doctrine had arisen regarding the 'inferior four-fifths of mankind'?", "options": [{"text": "That they were intellectually incapable of self-governance and required guidance.", "isCorrect": false, "rationale": "The doctrine that arose was the opposite, asserting their inherent wisdom and capacity."}, {"text": "That they possessed inherent moral excellence and unfettered wisdom.", "isCorrect": true, "rationale": "The text states, 'By 1828 in America and by 1848 in Europe the doctrine had arisen that all moral excellence, and with it all pure and unfettered sagacity resided in the inferior four-fifths of mankind.'"}, {"text": "That they were victims of economic exploitation requiring state intervention.", "isCorrect": false, "rationale": "While economic issues might be related, the specific doctrine mentioned is about their inherent moral and intellectual qualities, not primarily their victim status."}, {"text": "That their desires were primarily materialistic and devoid of political ideals.", "isCorrect": false, "rationale": "This describes the 'early democratic man,' but by this later period, the *doctrine* had evolved to idealize their capacity for ideas and governance."}], "id": "q08"}, {"question": "Despite acknowledging the impracticality of the 'dictatorship of the proletariat,' Mencken argues that which two fundamental axioms of democratic dogma remain universally accepted?", "options": [{"text": "That the masses are inherently patriotic and capable of perfect justice.", "isCorrect": false, "rationale": "While 'perfect patriotism' is mentioned, the two core axioms are specifically about the right and competence to govern, not just patriotism or justice."}, {"text": "That the great masses have an inalienable right to govern themselves, and they are competent to do so.", "isCorrect": true, "rationale": "Mencken explicitly lists these as the 'fundamental axioms' that are 'now more prosperous than ever before': '(a) that the great masses of men have an inalienable right...to govern themselves, and (b) that they are competent to do it.'"}, {"text": "That education is the only remedy for democratic failures, and liberation from oppression is paramount.", "isCorrect": false, "rationale": "These are presented as 'remedies' for perceived failures within the democratic dogma, not the fundamental axioms themselves."}, {"text": "That all moral excellence resides in the lower orders, and the superior minority has no rights.", "isCorrect": false, "rationale": "This was an 'extreme position' that Mencken notes has seen a 'considerable recession,' not a universally accepted current dogma."}], "id": "q09"}, {"question": "When Mencken states that a 'good' government 'responds most quickly and accurately to their desires and ideas' and a 'bad' government 'conditions their omnipotence and puts a question mark after their omniscience,' what is he primarily critiquing?", "options": [{"text": "The inefficiency of bureaucratic processes in modern democratic states.", "isCorrect": false, "rationale": "Mencken's critique is philosophical, focusing on the underlying assumptions about popular power and wisdom, rather than the practical efficiency of government administration."}, {"text": "The inherent dangers of unlimited popular power and the uncritical acceptance of popular wisdom.", "isCorrect": true, "rationale": "Mencken uses 'omnipotence' and 'omniscience' ironically to highlight what he sees as the democratic dogma's flawed assumption of the masses' absolute power and infallible wisdom, which he finds problematic."}, {"text": "The failure of democratic leaders to adequately educate the public on complex policy issues.", "isCorrect": false, "rationale": "While education is mentioned as a democratic 'remedy,' Mencken's critique here is deeper, questioning the fundamental premise that the public's desires and ideas should *always* be the ultimate guide, implying a lack of inherent sagacity."}, {"text": "The historical trend of governments becoming increasingly centralized and unresponsive to local needs.", "isCorrect": false, "rationale": "His focus is on the source and nature of perceived authority and wisdom within democratic theory, not on the structure or responsiveness of government centralization."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
