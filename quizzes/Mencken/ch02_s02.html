<script>
var QUESTIONS = [{"question": "What is Mencken's primary rhetorical purpose in the opening section of Notes on Democracy?", "options": [{"text": "To convince readers to change their political votes or support new policies.", "isCorrect": false, "rationale": "The text explicitly states Mencken's purpose 'is not to persuade in the usual sense — he does not expect to change anyone's vote — but to demolish a set of assumptions'."}, {"text": "To provide a balanced and objective historical account of democracy's origins and development.", "isCorrect": false, "rationale": "Mencken's approach to history is described as 'history as rhetorical weapon,' where he 'selects, distorts, and compresses' events, indicating a subjective and manipulative, rather than objective, purpose."}, {"text": "To thoroughly dismantle and undermine readers' pre-existing assumptions about the inherent nobility of democracy.", "isCorrect": true, "rationale": "The text states his purpose is 'to demolish a set of assumptions so thoroughly that his reader can never hold them with quite the same innocence again,' directly aligning with dismantling established beliefs."}, {"text": "To introduce a new philosophical thesis on the ideal form of government.", "isCorrect": false, "rationale": "Mencken opens 'not with a thesis statement or a policy argument,' but with a story, which refutes the idea of introducing a new philosophical thesis."}], "id": "q01"}, {"question": "How does Mencken's adoption of a 'mock-historian' persona contribute to his overall argument?", "options": [{"text": "It establishes him as a neutral academic authority, making his criticisms appear entirely objective and factual.", "isCorrect": false, "rationale": "The persona is 'mock-historian,' meaning he 'appears to be offering a dispassionate survey but whose every sentence drips with contempt,' which is the opposite of neutral objectivity."}, {"text": "It enables him to present a seemingly scholarly survey while subtly injecting his contempt and systematically undermining democratic ideals.", "isCorrect": true, "rationale": "Mencken 'appears to be offering a dispassionate survey but whose every sentence drips with contempt' and 'pretends to take the democratic ideal seriously while systematically undermining it,' which perfectly describes the function of a mock-historian."}, {"text": "It allows him to directly and overtly challenge democratic proponents with straightforward sarcasm.", "isCorrect": false, "rationale": "While ironic, the persona works through a scholarly surface that hides contempt, rather than direct, overt challenges."}, {"text": "It ensures that his readers are entertained, even if they fundamentally disagree with his arguments.", "isCorrect": false, "rationale": "Entertainment might be a byproduct, but the primary contribution of the persona is to the argumentative strategy of systematic undermining, not merely reader amusement."}], "id": "q02"}, {"question": "The text notes Mencken's use of 'theological vocabulary in a secular context.' Which phrase best exemplifies this technique and what it implies?", "options": [{"text": "Describing democracy's arrival 'to the tune of sweet, soft music.'", "isCorrect": false, "rationale": "This phrase illustrates the musical metaphor and alliteration, not theological vocabulary."}, {"text": "Referring to 'the common man full of ineffable virtues and romantic wrongs.'", "isCorrect": true, "rationale": "The word 'ineffable' is typically reserved for the divine. Applying it to the 'common man's virtues' in a secular context implies these virtues are fictional or absurdly overstated, akin to a blind, quasi-religious belief."}, {"text": "Using 'bilge' to describe sentimentalism, contrasting with 'noble rhetoric.'", "isCorrect": false, "rationale": "The word 'bilge' exemplifies Mencken's mixing of elevated and earthy registers, but it is not theological vocabulary."}, {"text": "Characterizing the French Revolution with 'half of France leaped to suicide.'", "isCorrect": false, "rationale": "This is an example of hyperbole, used to convert historical fact into theatrical spectacle, not theological vocabulary."}], "id": "q03"}, {"question": "According to the text, what is the dominant rhetorical figure Mencken employs to dramatize the gap between the democratic ideal and the democratic reality?", "options": [{"text": "Hyperbole, by exaggerating the historical facts related to democracy's spread.", "isCorrect": false, "rationale": "While hyperbole is used, the text explicitly states that 'The dominant figure in this section is antithesis.'"}, {"text": "Alliteration, through the repeated initial sounds in descriptive phrases.", "isCorrect": false, "rationale": "Alliteration (e.g., 'sweet, soft') is present but is not described as the 'dominant figure' for dramatizing the gap between ideal and reality."}, {"text": "Antithesis, by placing opposing ideas in parallel grammatical structures to emphasize their contrast.", "isCorrect": true, "rationale": "The text states, 'The dominant figure in this section is antithesis — the placing of opposing ideas in parallel grammatical structures. Mencken uses it to dramatize the gap between the democratic ideal and the democratic reality.'"}, {"text": "Extended metaphor, comparing democracy to a musical performance.", "isCorrect": false, "rationale": "The musical metaphor is significant and structural, but antithesis is identified as the dominant figure for specifically highlighting the gap between ideal and reality."}], "id": "q04"}, {"question": "Analyze Mencken's use of 'sweet, soft music' in his opening sentence. What rhetorical effect do the alliteration and cadence create, and how does it relate to his underlying message?", "options": [{"text": "It produces a harsh, discordant sound, immediately signaling Mencken's contempt for democratic ideals.", "isCorrect": false, "rationale": "The text describes the sound as 'pleasant,' 'musical,' and having a 'falling cadence,' directly contradicting a harsh or discordant effect."}, {"text": "It creates a pleasing and seductive sound, ironically mirroring the deceptive and appealing nature of democracy's initial presentation.", "isCorrect": true, "rationale": "The text explains, 'The sentence sounds pleasant because it is about pleasantness — and that sonic agreement is itself ironic, because Mencken's point is that the pleasantness was a lie,' tying the seductive sound to the idea of deception."}, {"text": "It establishes a formal and academic tone, reinforcing the objectivity of his historical analysis.", "isCorrect": false, "rationale": "The musicality is linked to irony and deception, not to an objective or formal academic tone."}, {"text": "It functions as a poetic flourish, adding aesthetic beauty without significant argumentative weight.", "isCorrect": false, "rationale": "The figure analysis emphasizes that the metaphor is 'not merely decorative' and does 'three kinds of rhetorical work simultaneously,' carrying significant argumentative weight."}], "id": "q05"}, {"question": "In the sentence 'Democracy came into the Western World to the tune of sweet, soft music,' what does Mencken's choice of the verb 'came' imply about his view of democracy's arrival?", "options": [{"text": "It suggests democracy was a deliberate and hard-won achievement, actively sought by the people.", "isCorrect": false, "rationale": "The text explicitly states it 'does not say that democracy was born, founded, won, or achieved,' negating the idea of an active achievement."}, {"text": "It characterizes democracy as an inevitable and natural progression of human civilization.", "isCorrect": false, "rationale": "The text describes 'came' as a 'verb of passive arrival,' suggesting it 'happened to the Western World' rather than being an inherent, natural progression."}, {"text": "It portrays democracy as a passive event, something that merely happened to the Western World rather than being a conscious choice or struggle.", "isCorrect": true, "rationale": "The close reading states, 'It came — a verb of passive arrival, suggesting something that happened to the Western World rather than something the Western World chose or fought for.'"}, {"text": "It emphasizes the sudden and surprising, almost miraculous, nature of democracy's appearance.", "isCorrect": false, "rationale": "While 'came' can imply arrival, the text focuses on its passivity ('happened to'), not its suddenness or miraculous quality."}], "id": "q06"}, {"question": "Mencken's rhetorical strategy involves selecting, distorting, and compressing two centuries of democratic history. What is the primary goal of this manipulative approach?", "options": [{"text": "To accurately document the complex and nuanced historical evolution of democratic thought.", "isCorrect": false, "rationale": "The text clearly states this is 'history as rhetorical weapon' and he 'selects, distorts, and compresses,' which directly contradicts the goal of accurate documentation."}, {"text": "To present a narrative that makes democracy appear less like a noble achievement and more like a manipulative deception.", "isCorrect": true, "rationale": "The text explicitly states his purpose is 'to make democracy look less like a noble achievement and more like a confidence trick played on the credulous,' which aligns with portraying it as a manipulative deception."}, {"text": "To provide a concise and digestible summary of key events in democratic development.", "isCorrect": false, "rationale": "Conciseness might be a side effect, but the primary goal of distorting is not mere summary; it is to shape perception with a rhetorical weapon."}, {"text": "To demonstrate his superior knowledge of historical facts and philosophical traditions.", "isCorrect": false, "rationale": "While Mencken is learned, his primary rhetorical goal of this particular manipulation is to undermine democracy, not merely display his own erudition."}], "id": "q07"}, {"question": "According to the 'wordwatch' section, why is Mencken's application of the word 'ineffable' to the supposed virtues of the common man considered 'quietly devastating'?", "options": [{"text": "Because it sincerely praises the profound and truly indescribable qualities of ordinary people.", "isCorrect": false, "rationale": "The text indicates Mencken's tone is ironic and contemptuous, and 'the inflated language signals that he considers both the virtues and the wrongs to be fictions,' which contradicts sincere praise."}, {"text": "Because it subtly mocks these virtues by using a word typically reserved for the divine, implying they are either fictional or absurdly exaggerated.", "isCorrect": true, "rationale": "The text explains, 'The word is typically reserved for the divine; applying it to the supposed virtues of the common man is quietly devastating,' as it suggests the virtues are fictions or exaggerated."}, {"text": "Because it highlights the inherent complexity of the common man's character, which defies simple explanation.", "isCorrect": false, "rationale": "The 'devastating' effect comes from the implied mockery and exaggeration, not from an emphasis on complexity."}, {"text": "Because it suggests the common man's virtues are so sacred that they should not be questioned.", "isCorrect": false, "rationale": "Mencken's entire project is to question and demolish assumptions; implying sacredness for the common man would go against his core purpose."}], "id": "q08"}, {"question": "The 'figureanalysis' section describes Mencken's extended metaphor of democracy as a musical performance. How does this metaphor primarily characterize democracy for Mencken's readers?", "options": [{"text": "As a universal and naturally harmonious system that everyone can instinctively appreciate.", "isCorrect": false, "rationale": "The metaphor frames democracy as 'artifice — something composed and rehearsed,' not natural or universally harmonious."}, {"text": "As an inevitable and organic development in human governance that evolved naturally.", "isCorrect": false, "rationale": "The text emphasizes that 'tunes are composed, rehearsed, and played for an audience,' implying artificiality rather than organic evolution."}, {"text": "As an artificial construct or performance, carefully composed and presented to an audience, rather than an inherent right or natural truth.", "isCorrect": true, "rationale": "The analysis states it 'characterizes democracy as a performance rather than a natural right: tunes are composed, rehearsed, and played for an audience,' which is the core implication."}, {"text": "As a beautiful and uplifting ideology that inspires collective action and progress.", "isCorrect": false, "rationale": "While 'sweet, soft music' is initially pleasant, the metaphor's purpose is to suggest deception and artifice, not genuine inspiration or progress."}], "id": "q09"}, {"question": "A student is analyzing Mencken's exclamatory sentence, 'The cure for the evils of democracy is more democracy!' Following the three-step close-reading process (observation, interpretation, evaluation) outlined in the 'teachernote,' which is the most effective sequence of analysis?", "options": [{"text": "Observe the sentence's brevity and exclamation mark; interpret this as Mencken's personal frustration; evaluate it as a weak argumentative point.", "isCorrect": false, "rationale": "Interpreting it as 'personal frustration' is an assumption, and evaluating it as a 'weak argumentative point' misjudges its rhetorical strength within Mencken's ironic framework."}, {"text": "Observe the sentence's structure as a short, exclamatory statement; interpret how it ironically captures the absurdity of a political axiom; evaluate how it punctures the preceding scholarly tone.", "isCorrect": true, "rationale": "This aligns with the text: 'The short ones puncture it' and it 'captur[es] in eight words the absurdity Mencken has spent a page setting up.' This demonstrates the three-step process effectively."}, {"text": "Observe the political statement it makes; interpret it as a genuine call for democratic reform; evaluate its historical accuracy in promoting change.", "isCorrect": false, "rationale": "Mencken's purpose is not reform, and the statement is ironic, not a genuine call. Evaluating its historical accuracy misses the point of rhetorical analysis."}, {"text": "Observe the sarcastic tone of the statement; interpret it as a direct insult to specific democratic leaders; evaluate its impact on a specific historical audience.", "isCorrect": false, "rationale": "While sarcastic, the analysis focuses on the structural effect ('punctures') and 'absurdity,' not primarily on direct insults to leaders or specific audience impact."}], "id": "q10"}, {"question": "The section describes Mencken's tone as operating 'at different intensities,' beginning with 'almost gentle' irony that sharpens into 'open scorn' and eventually becomes 'savage.' What does this tonal progression reveal about his rhetorical control?", "options": [{"text": "It shows Mencken losing control of his argument as his personal anger overwhelms his stylistic discipline.", "isCorrect": false, "rationale": "The text explicitly states 'he never loses control; the savagery is always shaped by syntax and delivered with a stylist's timing,' making loss of control the opposite of what occurs."}, {"text": "It demonstrates deliberate modulation of intensity — building gradually from seduction to demolition to maintain rhetorical momentum without collapsing into a rant.", "isCorrect": true, "rationale": "The text says 'This is not a rant. It is a performance, and the performer knows exactly when to raise and lower his voice,' confirming that the tonal shifts are controlled and strategic rather than emotional outbursts."}, {"text": "It suggests that Mencken was uncertain of his argument at the start and became more confident only as the section progressed.", "isCorrect": false, "rationale": "The tonal modulation is a stylistic and rhetorical strategy, not a sign of initial uncertainty; Mencken enters with a fully formed contemptuous stance from the first sentence."}, {"text": "It reflects the chronological progression of democratic history — gentle at first, savage by the modern era.", "isCorrect": false, "rationale": "While the section is loosely historical, the tonal variation is described in terms of rhetorical timing and performance skill, not as a direct mirror of chronological emotional shifts in historical events."}], "id": "q11"}, {"question": "The antithesis 'no harsh bawling from below; there was only a dulcet twittering from above' does more than describe two sounds. According to the keyconcept box, what deeper contrast does it force the reader to recognize?", "options": [{"text": "A contrast in musical styles between folk music and classical composition.", "isCorrect": false, "rationale": "The keyconcept box states the 'bawling' and 'twittering' represent 'different classes, different motives, and different versions of history,' not a stylistic musical contrast."}, {"text": "A contrast between different classes, different motives, and competing historical narratives about who drove democratic change.", "isCorrect": true, "rationale": "The keyconcept box explicitly states: 'The \"bawling\" and the \"twittering\" are not just different sounds; they represent different classes, different motives, and different versions of history,' showing how antithesis compresses a complex argument into a balanced sentence."}, {"text": "A contrast between the emotional and the rational approaches to political philosophy.", "isCorrect": false, "rationale": "The keyconcept box maps the antithesis onto class, motive, and historical narrative, not onto an emotion-vs.-reason binary."}, {"text": "A contrast between European and American democratic traditions.", "isCorrect": false, "rationale": "The antithesis contrasts 'below' (the common people) and 'above' (the intellectuals), a social/class distinction, not a geographic one between Europe and America."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
