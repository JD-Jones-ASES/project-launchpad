<script>
var QUESTIONS = [{"question": "In the analysis of Mencken's rhetorical strategy, what is the primary purpose of reframing political behavior as a result of 'glandular secretion'?", "options": [{"text": "To provide a scientific foundation for a new theory of democratic governance.", "isCorrect": false, "rationale": "While Mencken uses the language of science, the source material notes this is a 'rhetorical strategy' rather than a literal scientific argument."}, {"text": "To strip the 'democratic man' of his status as a rational agent.", "isCorrect": true, "rationale": "By reducing civic life to biology and hormones, Mencken denies the dignity of rational thought and agency to the common citizen."}, {"text": "To align political science with the emerging medical discoveries of the 1920s.", "isCorrect": false, "rationale": "Mencken adopts the vocabulary of medicine to mock and diminish his subjects, not to advance the field of political science or medicine."}, {"text": "To argue that biological evolution will eventually fix the flaws of democracy.", "isCorrect": false, "rationale": "Mencken's tone is cynical and clinical; he views the biological nature of the 'inferior man' as a fixed specimen to be diagnosed, not an evolving entity."}], "id": "q01"}, {"question": "Mencken utilizes the theories of John B. Watson primarily because they allow him to do which of the following?", "options": [{"text": "Explain the complex inner consciousness of the 'inferior man'.", "isCorrect": false, "rationale": "Watson's behaviorism specifically rejected the relevance of consciousness, focusing instead on observable stimulus and response."}, {"text": "Treat human beings as though they were laboratory specimens.", "isCorrect": true, "rationale": "Behaviorism provides Mencken with a 'vocabulary of reduction' that permits him to analyze humans with the same detachment used for animals."}, {"text": "Support the idea that education can modify behavior in a democratic society.", "isCorrect": false, "rationale": "Mencken's use of behaviorism is cynical and focuses on the unchangeable nature of the 'herd' rather than their potential for educational growth."}, {"text": "Reconcile the differences between Freudian psychology and biological determinism.", "isCorrect": false, "rationale": "Mencken does not aim to reconcile these systems; he selectively borrows their vocabulary for satirical and deflationary purposes."}], "id": "q02"}, {"question": "What is the rhetorical effect of Mencken's use of the term 'tumescence' when describing an infant's behavior?", "options": [{"text": "It provides a clinical justification for infant healthcare reform.", "isCorrect": false, "rationale": "Mencken's goals are satirical and political, not related to actual healthcare or social reform."}, {"text": "It softens the harshness of his psychological critique through medical jargon.", "isCorrect": false, "rationale": "The medical precision actually makes the subject more uncomfortable and shocking, rather than softening the critique."}, {"text": "It uses medical precision to create discomfort and shock in the reader.", "isCorrect": true, "rationale": "Applying cold, clinical language to infant sexuality is a deliberate tactic to maximize the 'comic shock' and discomfort for his audience."}, {"text": "It indicates a genuine shift in Mencken's interest from politics to pediatrics.", "isCorrect": false, "rationale": "The text clarifies that the clinical tone is a persona and the biological language is a weapon of deflation, not a career shift."}], "id": "q03"}, {"question": "According to the analysis, how does Mencken's syntax change when he shifts his focus to the 'peasant farmer'?", "options": [{"text": "The sentences become longer and more flowery to mirror rural tradition.", "isCorrect": false, "rationale": "The text states that the peasant passages move away from the elaborate lecturer style toward a sharper, more aggressive rhythm."}, {"text": "The rhythm becomes more staccato, with shorter and more declarative sentences.", "isCorrect": true, "rationale": "Short, declarative sentences in these passages function like 'verdicts delivered from the bench,' replacing scientific detachment with prosecutorial energy."}, {"text": "The use of colons increases to provide detailed scientific evidence for the farmer's behavior.", "isCorrect": false, "rationale": "While Mencken uses colons elsewhere, the specific shift in the peasant passages is noted as a change to a more 'staccato' and aggressive rhythm."}, {"text": "He adopts a passive voice to maintain clinical neutrality.", "isCorrect": false, "rationale": "The text notes that Mencken 'abandons scientific detachment' for 'prosecutorial energy' in these specific passages."}], "id": "q04"}, {"question": "In the close reading of the passage regarding the 'anthropoid appetite,' what does the construction 'the not true' imply about the 'inferior man'?", "options": [{"text": "It suggests a sophisticated philosophical commitment to nihilism.", "isCorrect": false, "rationale": "While the construction sounds philosophical, it actually describes a base, biological instinct for self-deception."}, {"text": "It implies that self-deception is a biological necessity rather than an intellectual error.", "isCorrect": true, "rationale": "By pairing 'thirst' (a physical need) with 'the not true,' Mencken suggests that illusion is as essential to this creature as water."}, {"text": "It indicates that the common citizen is incapable of understanding any truth at all.", "isCorrect": false, "rationale": "Mencken focuses on the 'thirst' for illusion, implying an active drive toward self-deception rather than a simple lack of understanding."}, {"text": "It shows Mencken's struggle to find the correct English word for 'falsehood'.", "isCorrect": false, "rationale": "The text describes this as a 'characteristically Mencken construction' used for mock-philosophical weight, not a lack of vocabulary."}], "id": "q05"}, {"question": "What is the primary function of the barnyard analogies (e.g., Tom cat, rooster) used throughout the text?", "options": [{"text": "To provide a humorous relief from the dense clinical vocabulary.", "isCorrect": false, "rationale": "The analogies are described as a 'systematic dehumanization' rather than just comic relief."}, {"text": "To suggest that rural life is more 'natural' and therefore superior to urban life.", "isCorrect": false, "rationale": "Mencken uses these analogies to diminish and mock the democratic citizen, viewing rural specimens as the 'purest' forms of inferiority."}, {"text": "To systematically dehumanize the democratic citizen by isolating specific crude traits.", "isCorrect": true, "rationale": "Each animal comparison (the cat's sexuality, the wolf's cruelty) strips away another layer of the pretense of rational humanity."}, {"text": "To illustrate Mencken's deep knowledge of animal husbandry.", "isCorrect": false, "rationale": "The animal language is a rhetorical tool used for social and political satire, not a display of agricultural expertise."}], "id": "q06"}, {"question": "Mencken's use of the phrase 'fresh from God's hands' alongside terms like 'tumescence' is an example of which rhetorical device?", "options": [{"text": "Metonymy, substituting a religious concept for a biological one.", "isCorrect": false, "rationale": "Metonymy involves replacing a word with a closely related term; here, Mencken is using a direct ironic contrast."}, {"text": "Litotes, by understating the complexity of divine creation.", "isCorrect": false, "rationale": "Litotes is an understatement by negating the contrary; this phrase is a direct, ironic invocation of piety."}, {"text": "Irony, by using mock-pious language to describe a creature governed by glands.", "isCorrect": true, "rationale": "Mencken invokes the Creator only to immediately undercut that dignity by describing the creature's base biological functions."}, {"text": "Synecdoche, using a part of the body to represent the whole soul.", "isCorrect": false, "rationale": "While he focuses on glands, the specific phrase 'fresh from God's hands' is identified as an ironic concession to conventional piety."}], "id": "q07"}, {"question": "What does the term 'antinomianism' represent in the context of Mencken's 'pseudo-scientific diction'?", "options": [{"text": "The rejection of established biological laws by the common man.", "isCorrect": false, "rationale": "The term is used in a theological context to describe the rejection of moral laws, not biological ones."}, {"text": "A clinical term for the inability of the 'inferior man' to process fear.", "isCorrect": false, "rationale": "The text identifies the term as theological, though Mencken uses it loosely regarding morality."}, {"text": "The rejection of conventional morality, particularly regarding sexual conduct.", "isCorrect": true, "rationale": "Mencken uses this theological term to describe a disregard for moral laws, fitting his pattern of using high-register words for base behaviors."}, {"text": "The scientific study of hormone-driven religious fanaticism.", "isCorrect": false, "rationale": "While the section discusses hormones and religion, 'antinomianism' specifically refers to the doctrine concerning moral law."}], "id": "q08"}, {"question": "How does Mencken utilize the colon (:) as a 'hinge' in his sentences?", "options": [{"text": "To separate his own opinions from the clinical facts he presents.", "isCorrect": false, "rationale": "The colon is used to create a logical link between an abstract claim and a concrete, often deflating, conclusion."}, {"text": "To transition from an abstract statement to a concrete, deflating specification.", "isCorrect": true, "rationale": "The colon creates a sense of 'logical inevitability,' making the concrete (and often insulting) follow-up seem to flow naturally from the general statement."}, {"text": "To introduce long lists of biological hormones and their functions.", "isCorrect": false, "rationale": "Mencken uses biological language rhetorically; he does not actually provide detailed medical lists of hormones."}, {"text": "To indicate a pause where the reader is meant to provide their own examples.", "isCorrect": false, "rationale": "The colon is used by Mencken to deliver his own specific 'diagnosis' or 'deflation' directly."}], "id": "q09"}, {"question": "The term 'Homo stultus' is coined by Mencken to serve as a specimen label for which group?", "options": [{"text": "The educated readers who believe they are above the herd.", "isCorrect": false, "rationale": "Mencken's audience is the 'educated reader,' but the term 'Homo stultus' describes the objects of their study: the common citizens."}, {"text": "The democratic citizens, whom Mencken views as 'foolish men'.", "isCorrect": true, "rationale": "On the model of 'Homo sapiens', this coinage effectively reduces the citizen to a biological specimen characterized by foolishness."}, {"text": "The scientists and psychologists whose language Mencken borrows.", "isCorrect": false, "rationale": "Mencken uses their language as a weapon against the 'inferior man,' not to label the scientists themselves."}, {"text": "The politicians who attempt to manipulate the 'inferior man'.", "isCorrect": false, "rationale": "While politicians are part of the 'democratic politics' Mencken critiques, the term is specifically a specimen label for the 'democratic citizen' or 'inferior man'."}], "id": "q10"}, {"question": "Mencken describes peasants as 'the sediment remaining in the filter after the stream of progress has gone through.' What does this metaphor imply about the peasant's relationship to civilization?", "options": [{"text": "That peasants are what is left behind after civilization's forward movement — the undissolved residue that progress could not absorb or refine.", "isCorrect": true, "rationale": "The filter metaphor casts progress as a process of purification, and peasants as the insoluble waste that fails to pass through — placing them outside and below the civilizing stream entirely."}, {"text": "That peasants represent a pure, uncorrupted form of humanity untouched by modern decadence.", "isCorrect": false, "rationale": "Mencken views the peasant's proximity to 'primeval man' as degraded rather than noble; 'sediment' is waste, not purity."}, {"text": "That peasants are the foundation of civilization, supporting its higher forms from below.", "isCorrect": false, "rationale": "Sediment sinks to the bottom not as a foundation but as the material that fails to dissolve; the metaphor implies rejection, not support."}, {"text": "That progress has been filtered through the peasant class on its way to producing superior men.", "isCorrect": false, "rationale": "The image reverses this: civilization flows forward and through the filter, leaving the peasant behind as the residue, not producing anything from him."}], "id": "q11"}, {"question": "Mencken closes the section by claiming the yokel has 'room in his head for only one' idea: that God regards him fondly and that all other men are 'abandoned to the devil.' What rhetorical function does this closing claim serve?", "options": [{"text": "It reduces the yokel's entire ideological system to a single act of self-flattery, implying that his religion, politics, and morality are all expressions of the same vanity.", "isCorrect": true, "rationale": "By collapsing the yokel's worldview into one self-serving idea, Mencken makes his entire belief system — theological, political, social — a product of egoism rather than principle."}, {"text": "It credits the yokel with religious sincerity as a counterpoint to the section's otherwise relentless mockery.", "isCorrect": false, "rationale": "Mencken is not offering a counterpoint; reducing the yokel's religion to one vanity-driven idea is the culmination of the attack, not relief from it."}, {"text": "It argues that monotheism is the highest philosophical achievement available to the inferior man.", "isCorrect": false, "rationale": "Having only one idea is presented as a sign of extreme limitation, not philosophical achievement."}, {"text": "It transitions the argument away from the yokel toward the urban proletariat, who have more ideas.", "isCorrect": false, "rationale": "The urban proletarian is mentioned in the preceding sentence as a contrast, but the closing claim is specifically about the yokel as the defining specimen of democratic man."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
