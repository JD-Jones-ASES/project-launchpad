        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>

<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 24, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Mencken distinguishes his work from that of most political commentators by stating he is engaged in which field?", "options": [{"text": "Pathology", "isCorrect": true, "rationale": "The author explicitly states his business is not prognosis or therapeutics, but the diagnostic study of the 'diseases' within the body politic."}, {"text": "Therapeutics", "isCorrect": false, "rationale": "While many commentators seek to provide remedies for political ills, the author specifically rejects this role in favor of a diagnostic approach."}, {"text": "Prognosis", "isCorrect": false, "rationale": "The author claims he does not know if democracy will survive and refuses to venture a hazard of a guess regarding its future."}, {"text": "Theology", "isCorrect": false, "rationale": "Although the author uses theological analogies to describe democracy, he identifies his own inquiry as a secular, clinical examination."}], "id": "q01"}, {"question": "According to the text, what is a primary intellectual characteristic of democracy regarding the concept of 'the insoluble'?", "options": [{"text": "It becomes unfashionable or even infamous to suggest a problem cannot be solved.", "isCorrect": true, "rationale": "The author argues that in a democracy, the license to discuss a disease is dependent upon having a ready-made remedy or cure-all."}, {"text": "It is embraced as a necessary reality of the human condition.", "isCorrect": false, "rationale": "The author suggests that democracy actually rejects the idea of immutable realities, unlike the medieval systems it replaced."}, {"text": "It is relegated to the realm of private faith rather than public policy.", "isCorrect": false, "rationale": "The text asserts that democracy moves every human problem into the range of 'practical politics' to be solved by legislation."}, {"text": "It is used as a justification for the maintenance of the status quo.", "isCorrect": false, "rationale": "The author views democracy as a restless search for 'moral amendments' to natural laws rather than an acceptance of things as they are."}], "id": "q02"}, {"question": "How does Mencken characterize the difference between ancient despotisms and modern democracy regarding human 'sin' and 'poverty'?", "options": [{"text": "Ancient systems accepted these as immutable realities, while democracy views them as curable by law.", "isCorrect": true, "rationale": "The author argues that older systems refrained from attempting to abolish such things, whereas democracy functions as a 'cure-all'."}, {"text": "Ancient systems utilized these evils to maintain power, while democracy seeks to ignore their existence.", "isCorrect": false, "rationale": "The text suggests democracy acknowledges these evils but falsely believes they can be solved through voting and legislation."}, {"text": "Ancient systems viewed these as moral failings, while democracy views them as economic inefficiencies.", "isCorrect": false, "rationale": "The author's focus is on the perceived 'magic' of democracy to enact moral amendments to the laws of nature, not its economic theory."}, {"text": "There is no functional difference; both systems use mystical emanations to control the mob.", "isCorrect": false, "rationale": "The author explicitly contrasts the 'checks and balances' of medieval Christianity with the 'range of practical politics' in modern democracy."}], "id": "q03"}, {"question": "What paradox does Mencken identify in the philosophy of democracy regarding the relationship between 'John Doe' and 'Richard Roe'?", "options": [{"text": "It provides a means to rise above others while simultaneously removing the benefits of doing so by declaring everyone equal.", "isCorrect": true, "rationale": "The author describes this as a 'suicidal smack' in democratic philosophy: the desire to be superior vs. the theoretical insistence on equality."}, {"text": "It forces individuals to join groups for protection while demanding they act as independent agents.", "isCorrect": false, "rationale": "While the author mentions democratic man's fear of loneliness, the specific paradox mentioned involves the conflict between achievement and egalitarianism."}, {"text": "It encourages the pursuit of wealth while morally condemning those who achieve it.", "isCorrect": false, "rationale": "Though the mob may envy the plutocracy, the author argues the mob actually understands and shares the plutocracy's ignoble aspirations."}, {"text": "It creates a government from the mob that then acquires the power to destroy the mob.", "isCorrect": false, "rationale": "The author mentions the state making over its father, but the core paradox cited involves the 'usufructs of rising' and the dilemma of equality."}], "id": "q04"}, {"question": "According to Mencken, what is the 'main character' of the modern plutocracy that has replaced the missing aristocracy?", "options": [{"text": "Incurable timorousness", "isCorrect": true, "rationale": "The author describes the plutocracy as being forever scared of demagogues and 'kittens preparing to upset the Matterhorn'."}, {"text": "Public-spiritedness", "isCorrect": false, "rationale": "The author explicitly lists public spirit as one of the essential characters of a true aristocracy that the plutocracy lacks."}, {"text": "Cultural superiority", "isCorrect": false, "rationale": "The text asserts the plutocracy brings the 'peculiar ignobilities' of the mob from which it recently emerged."}, {"text": "Honesty and honor", "isCorrect": false, "rationale": "The author claims the plutocracy stands as far from the 'honnête homme' as it does from the 'Holy Saints'."}], "id": "q05"}, {"question": "What reason does Mencken provide for why 'pedagogues' or intellectuals often fail to offer a genuine revolt against the plutocracy?", "options": [{"text": "A haunting fear of losing their jobs and economic insecurity.", "isCorrect": true, "rationale": "The author argues that these individuals are policed by the plutocracy and must support families, causing their revolts to 'peter out in metaphysics'."}, {"text": "A deep-seated belief in the divine right of the democratic process.", "isCorrect": false, "rationale": "The text suggests their failure is due to fear and practical constraints rather than a sincere theological or philosophical commitment."}, {"text": "They are fundamentally aristocrats who find the mob too distasteful.", "isCorrect": false, "rationale": "Mencken specifically says they show the virtues of 'Congressmen' or 'butlers,' not those of the aristocrat."}, {"text": "They lack the intellectual capacity to understand the flaws of democracy.", "isCorrect": false, "rationale": "The author doesn't question their intelligence but rather their courage and independence from economic terrors."}], "id": "q06"}, {"question": "Mencken uses James Bryce's 'Modern Democracies' to illustrate which point about democratic exponents?", "options": [{"text": "They often present evidence that democracy doesn't work, yet conclude with a declaration that it does.", "isCorrect": true, "rationale": "The author uses Bryce as an example of the 'appalling gyrations' required to support a system that is not vulnerable to logical attack."}, {"text": "They provide the most rigorous logical defense of democratic principles ever written.", "isCorrect": false, "rationale": "Mencken argues that democracy lies 'outside the range of logical ideas' and that Bryce's conclusion is a 'stout declaration' despite the evidence."}, {"text": "They represent the rare breed of libertarians that democracy occasionally produces.", "isCorrect": false, "rationale": "Bryce is cited as an exponent of democracy's 'hocus-pocus' rather than a libertarian critic or an aristocratic breed."}, {"text": "They successfully bridge the gap between the mob and the plutocracy.", "isCorrect": false, "rationale": "The author views Bryce as someone caught in the 'contortions' of democratic logic, not as a successful bridge between classes."}], "id": "q07"}, {"question": "What does Mencken suggest is the only way the 'manifest defects' of democracy might be addressed?", "options": [{"text": "By examining them realistically and abandoning concepts borrowed from theology.", "isCorrect": true, "rationale": "The author argues that progress requires a realistic view and the removal of the 'cure-all' mystical mindset."}, {"text": "By adopting a new amendment to the Constitution, similar to Prohibition.", "isCorrect": false, "rationale": "The author mocks the idea that a 'full-blown and perfect' system can be put into effect by a simple constitutional amendment."}, {"text": "By returning to the 'ancient and accursed systems of despotism'.", "isCorrect": false, "rationale": "While he critiques democracy, he notes that older systems had their own 'pretensions' and does not explicitly call for their restoration."}, {"text": "By ensuring that 'vox populi' is truly aligned with the divine will.", "isCorrect": false, "rationale": "Mencken expresses doubt that the voice of the people is the voice of God, noting the 'proofs run the other way'."}], "id": "q08"}, {"question": "Mencken argues that democracy is essentially the antithesis of the 'old religion' because it:", "options": [{"text": "Claims to be a substitute for it with its own magical potency.", "isCorrect": true, "rationale": "The text states democracy shows all the 'magical potency of the great systems of faith' and acts as a substitute for religious belief."}, {"text": "Rejects all forms of mysticism in favor of pure ratiocination.", "isCorrect": false, "rationale": "On the contrary, the author says democracy is 'shot through' with a 'delight in the incredible' and 'banal mysticism'."}, {"text": "Abolishes the need for leaders and group belonging.", "isCorrect": false, "rationale": "The author claims democratic man is 'unable to think of himself as a free individual' and must belong to a group with leaders."}, {"text": "Successfully eliminates the 'miracles' used to chink logical holes.", "isCorrect": false, "rationale": "The author suggests democracy simply replaces old miracles with new ones, such as 'hocus-pocus' arguments like the Gettysburg Address."}], "id": "q09"}, {"question": "What is the 'sweet democratic axiom' that Mencken blames for many issues in the United States?", "options": [{"text": "The belief that optimism is a virtue regardless of adverse facts.", "isCorrect": true, "rationale": "Mencken identifies the 'mysterious merit in being hopeful' in the presence of immovable facts as a 'psychopathology' affecting the US."}, {"text": "The idea that every citizen should have an equal vote in every matter.", "isCorrect": false, "rationale": "While critical of the mob, the author focuses on the specific psychological axiom of irrational hope/optimism in this section."}, {"text": "The faith that government should be a mystical emanation from the mob.", "isCorrect": false, "rationale": "Though he mentions this concept, he labels the specific 'sweet democratic axiom' as the merit of the 'man who hopes absurdly'."}, {"text": "The insistence that the North fought the Civil War to save self-government.", "isCorrect": false, "rationale": "He calls this a 'thesis echoed in falsetto', but identifies the broader 'axiom' as the virtuous nature of absurd optimism."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
