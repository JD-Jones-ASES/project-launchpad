        Scholastica Codex &mdash; Self-Grading Quiz

</div>

<script>
var QUESTIONS = [{"question": "Mencken argues that the 'mediocrity' of the American legislator is primarily a result of which structural feature of the U.S. Constitution?", "options": [{"text": "The residency requirement of Article I", "isCorrect": true, "rationale": "Mencken posits that forcing districts to choose from their own local talent pool inherently limits the quality of representatives to the available local 'imbeciles'."}, {"text": "The two-year term limit for the House of Representatives", "isCorrect": false, "rationale": "While Mencken notes the Senate is slightly better due to longer terms, he identifies the residency rule as the foundational cause of parochialism."}, {"text": "The lack of educational prerequisites for candidates", "isCorrect": false, "rationale": "Mencken mocks the specific education legislators receive, such as 'hedge schools,' but blames the legal structure for allowing such men to be the only options."}, {"text": "The direct election of Senators by the populace", "isCorrect": false, "rationale": "Although Mencken is critical of democracy, the text focuses on the geographical restrictions of Article I rather than the method of election."}], "id": "q01"}, {"question": "Which rhetorical device does Mencken employ when he lists a Congressman's progression from a 'hedge school' to 'native swamps' to 'county superintendent'?", "options": [{"text": "Antithesis", "isCorrect": false, "rationale": "Antithesis involves contrasting two opposite ideas, whereas this sequence is a cumulative list of similar levels of mediocrity."}, {"text": "Catalogue", "isCorrect": true, "rationale": "This device, also called enumeration, piles up details to create an overwhelming impression of a character's unremarkable and typical ascent."}, {"text": "Apostrophe", "isCorrect": false, "rationale": "Apostrophe is a direct address to an absent person or personified object, which is not present in this career summary."}, {"text": "Synecdoche", "isCorrect": false, "rationale": "Synecdoche uses a part to represent a whole, while Mencken is listing the literal stages of a career to produce a satirical effect."}], "id": "q02"}, {"question": "What is the strategic purpose behind Mencken's shift from a 'measured, constitutional tone' to 'vocabulary of contempt'?", "options": [{"text": "To suggest that the subject matter is too complex for objective analysis", "isCorrect": false, "rationale": "Mencken does not find the matter complex; rather, he uses the shift to signal that the 'evidence' of incompetence is so clear it warrants anger."}, {"text": "To earn intellectual credibility before launching a satirical attack", "isCorrect": true, "rationale": "By starting with legal citations (Article I), Mencken establishes himself as an analyst before revealing his true persona as a satirist."}, {"text": "To mirror the psychological breakdown of the legislators he describes", "isCorrect": false, "rationale": "The shift in tone is a controlled rhetorical technique of the author, not a reflection of the legislator's mental state."}, {"text": "To appeal to both academic and uneducated audiences simultaneously", "isCorrect": false, "rationale": "The text specifies Mencken is writing for 'educated readers' who already share his suspicions, not a dual audience."}], "id": "q03"}, {"question": "In Mencken's lexicon, what specific connotation does the term 'puerile' carry when applied to a politician?", "options": [{"text": "A lack of moral or ethical standing", "isCorrect": false, "rationale": "While Mencken views them as dishonest, 'puerile' specifically refers to their intellectual and emotional development."}, {"text": "Financial corruption and greed", "isCorrect": false, "rationale": "Mencken uses terms like 'knavish' for dishonesty; 'puerile' focuses on the immature nature of their thinking."}, {"text": "Childishness and an inability to think as an adult", "isCorrect": true, "rationale": "Derived from the Latin for 'boy,' the word suggests that the legislator's mind has not matured beyond a juvenile state."}, {"text": "An obsession with ancient, outdated laws", "isCorrect": false, "rationale": "Mencken uses 'archaic' or other terms for the outdated; 'puerile' is strictly about the maturity of the individual."}], "id": "q04"}, {"question": "Why does Mencken include the 'Knights of Zoroaster' and the title 'grand worthy bow-wow' in his description of a Congressman?", "options": [{"text": "To expose the legislator's secret religious affiliations", "isCorrect": false, "rationale": "These are not actual affiliations but invented, nonsensical titles designed to mock fraternal organizations."}, {"text": "To create a sense of linguistic grandeur that matches the Constitution", "isCorrect": false, "rationale": "The titles are intentionally ridiculous rather than grand, serving to undercut the dignity of the office."}, {"text": "To reduce the legislator to a point on a scale of absurdity", "isCorrect": true, "rationale": "By placing the Congressman between a real sinister group (KKK) and a farcical one, Mencken suggests they are both dangerous and silly."}, {"text": "To document the historical prevalence of occultism in 1920s Washington", "isCorrect": false, "rationale": "Mencken is using these as rhetorical inventions for satire, not as a historical survey of religious practices."}], "id": "q05"}, {"question": "Mencken applies the phrase 'below the salt' to democratic Washington. What is the historical origin and rhetorical implication of this phrase?", "options": [{"text": "It refers to the low wages of public servants", "isCorrect": false, "rationale": "The phrase has a social meaning rather than a financial one regarding salary."}, {"text": "It refers to the medieval dining hierarchy of inferior rank", "isCorrect": true, "rationale": "In medieval times, those of lower social standing sat further from the salt cellar; Mencken uses this to impose a class-based hierarchy on a 'classless' democracy."}, {"text": "It refers to the preservation of laws over time", "isCorrect": false, "rationale": "The phrase is an idiom for social standing, not a metaphor for legal preservation or 'salting' away records."}, {"text": "It refers to the Biblical concept of being the 'salt of the earth'", "isCorrect": false, "rationale": "This would be a compliment; Mencken uses the phrase to suggest the legislators are of a lower, common grade."}], "id": "q06"}, {"question": "How does the syntax of the final sentence, 'It is such vermin who make the laws of the United States,' contribute to its effectiveness?", "options": [{"text": "Its polysyllabic flow softens the previous insults", "isCorrect": false, "rationale": "The sentence is primarily monosyllabic and blunt, which increases rather than softens the force of the insult."}, {"text": "Its use of passive voice avoids direct accusation", "isCorrect": false, "rationale": "The sentence is in the active voice ('who make'), which creates a direct and hammering indictment."}, {"text": "Its brevity and monosyllabic rhythm provide a sense of finality", "isCorrect": true, "rationale": "After the long, complex catalogue of the previous sentences, this short, punchy sentence acts as a final, brutal verdict."}, {"text": "Its complex structure mirrors the complexity of the law-making process", "isCorrect": false, "rationale": "Mencken purposefully avoids complexity here to emphasize that his conclusion is simple and obvious."}], "id": "q07"}, {"question": "According to the analysis, what is the 'rhetorical coup de grâce' Mencken delivers at the end of this section?", "options": [{"text": "A direct appeal to the reader to abolish the House of Representatives", "isCorrect": false, "rationale": "Mencken is a satirist rather than an activist; his 'final blow' is rhetorical rather than a call to legislative action."}, {"text": "The use of a sitting Senator's own words to indict his colleagues", "isCorrect": true, "rationale": "By quoting Senator Reed, Mencken shifts from an external critic's perspective to an internal 'confession,' making the critique feel irrefutable."}, {"text": "The comparison of Congressmen to bootleggers", "isCorrect": false, "rationale": "While he makes this comparison, the text identifies the Reed quotation as the final devastating blow."}, {"text": "An analytical breakdown of the 'swamp' geography", "isCorrect": false, "rationale": "The geographical slurs are part of the setup, not the final concluding piece of evidence."}], "id": "q08"}, {"question": "What is the primary difference Mencken highlights between the American legislative system and the British practice regarding candidate selection?", "options": [{"text": "A constituency can choose a distinguished figure from anywhere in the nation, rather than being limited to local residents.", "isCorrect": true, "rationale": "Mencken contrasts the American 'residency requirement' with the British lack thereof, which he believes leads to a higher talent pool in the UK."}, {"text": "British candidates are required to hold advanced university degrees before standing for election.", "isCorrect": false, "rationale": "While Mencken mentions the influence of Oxford and Cambridge, the British advantage he identifies is geographic freedom of selection, not educational prerequisites."}, {"text": "The British Parliament has a longer term of service, giving members more time to develop competence.", "isCorrect": false, "rationale": "Mencken attributes the advantage of longer terms to the U.S. Senate compared to the House, not to the British system specifically."}, {"text": "British voters are better educated and less susceptible to demagogues than American voters.", "isCorrect": false, "rationale": "Mencken's argument is structural — about the residency rule — not about the relative education levels of British versus American voters."}], "id": "q09"}, {"question": "In the context of Mencken's 'Wordwatch,' why is the term 'vermin' considered the strongest in his catalogue of abuse?", "options": [{"text": "It implies that legislators are intellectually superior but morally bankrupt", "isCorrect": false, "rationale": "Vermin does not imply intellectual superiority; it suggests they are pests of no value."}, {"text": "It suggests they are not just foolish but pestilential and require extermination", "isCorrect": true, "rationale": "Unlike 'jackasses' which suggests stupidity, 'vermin' carries a connotation of being a plague or a dangerous nuisance that needs to be removed."}, {"text": "It is a technical term for those who violate the Constitution", "isCorrect": false, "rationale": "Mencken uses the word as a term of pure abuse and biological metaphor, not as a legal or technical designation."}, {"text": "It links the legislators specifically to the agrarian interests of the South", "isCorrect": false, "rationale": "While he mocks the Southern background, 'vermin' is a general term applied to the whole class of law-makers."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
