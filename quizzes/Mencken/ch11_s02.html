        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 11, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Mencken, what is the primary reason the 'democratic citizen' is often swindled by 'scoundrels'?", "options": [{"text": "The citizen lacks the legal sovereignty to enforce their own desires.", "isCorrect": false, "rationale": "The text states that sovereignty is always actually in the citizen, even if they are misled."}, {"text": "The citizen's simple desires are overshadowed by their extensive credulity and foolishness.", "isCorrect": true, "rationale": "Mencken argues that the citizen's 'imbecility' covers a wider area than their 'simple desires,' making them easy targets for manipulation."}, {"text": "The complex structures of representative government prevent the citizen from acting on their will.", "isCorrect": false, "rationale": "Mencken dismisses the importance of governmental structure, claiming the form of government is of 'small importance.'"}, {"text": "The citizen is fundamentally honest but lacks the specialized education to spot political rogues.", "isCorrect": false, "rationale": "Mencken suggests the citizen is 'congenitally unable' to comprehend problems, regardless of instruction, and characterizes them as part of a 'mob.'"}]}, {"question": "How does Mencken characterize the 'political process' in any form of democracy?", "options": [{"text": "A cooperative effort between the mob and enlightened minorities to find truth.", "isCorrect": false, "rationale": "Mencken views the relationship as one of victimisation and delusion rather than cooperation."}, {"text": "A sophisticated system of checks and balances that filters out demagoguery.", "isCorrect": false, "rationale": "The text describes the process as a 'battle of rival rogues' rather than a system of effective filters."}, {"text": "A battle between rival groups of rogues who attempt to deceive the mob.", "isCorrect": true, "rationale": "The author defines the process as a 'camorra of self-seeking minorities' seeking to 'inflame, delude and victimize' the masses."}, {"text": "A necessary evolution from constitutional monarchy to a pure, direct democracy.", "isCorrect": false, "rationale": "Mencken argues that these forms are 'essentially the same' and does not view the transition as a significant evolution."}]}, {"question": "What is Mencken's critique of the 'Liberal' remedy for the defects of representative government?", "options": [{"text": "It fails because it does not go far enough in converting representatives into clerks.", "isCorrect": false, "rationale": "Mencken believes the entire concept of 'purer democracy' is failed rhetoric, not that it is insufficiently applied."}, {"text": "It is based on the false premise that the voters possess the wisdom and lack of guile required for direct rule.", "isCorrect": true, "rationale": "The author argues that the belief in the wisdom of the 'plain people' is simply rhetoric and fails whenever attempted."}, {"text": "It incorrectly assumes that organizational obstacles are the only thing holding the people back.", "isCorrect": false, "rationale": "While Liberals might argue this, Mencken's point is that the people lack the 'native sagacity' regardless of organization."}, {"text": "It ignores the historical success of New England town meetings as a model for modern policy.", "isCorrect": false, "rationale": "Mencken actually uses the New England town meetings as an example of how direct democracy fails, calling their decisions 'idiotic.'"}]}, {"question": "Mencken uses the example of 'popular ballads' to illustrate which point about democracy?", "options": [{"text": "The folk are the creative engine behind both cultural and political movements.", "isCorrect": false, "rationale": "Mencken specifically denies this, stating the ballads were written by 'concrete poets' rather than 'the folk.'"}, {"text": "Direct participation in creation is less effective than representative creation.", "isCorrect": false, "rationale": "The analogy is not about effectiveness, but about who actually initiates and formulates ideas versus who merely selects them."}, {"text": "The masses do not actually formulate ideas but merely act as referees between ideas presented by others.", "isCorrect": true, "rationale": "He argues that just as the folk only chose which ballads survived, the 'mob' in a town meeting only chooses between ideas presented by leaders."}, {"text": "Cultural outputs like ballads are superior to the 'idiotic decisions' made in political meetings.", "isCorrect": false, "rationale": "The analogy is used to parallel the process of decision-making, not to compare the quality of the outputs."}]}, {"question": "According to the text, why did the citizens in New England town meetings typically follow 'professional theologians'?", "options": [{"text": "They were coerced through legal threats and social ostracization.", "isCorrect": false, "rationale": "The text emphasizes that they were led 'facilely' and by appeals to 'prejudice,' rather than through legal coercion."}, {"text": "They possessed a genuine, high-level understanding of theology that required expert guidance.", "isCorrect": false, "rationale": "Mencken notes that while they were 'ardent amateurs,' they were easily led by 'quacks with something to sell.'"}, {"text": "They were susceptible to demagogues who appealed to their fears and superstitions rather than logic.", "isCorrect": true, "rationale": "Mencken asserts that their 'appetite for logic' was less powerful than their 'fear of hell' and 'prejudice.'"}, {"text": "The theologians were the only ones who had the relevant facts regarding the town's governance.", "isCorrect": false, "rationale": "The author states that citizens made no effort to unearth facts, and implies the theologians were often quacks, not providers of objective facts."}]}, {"question": "What does Mencken claim is the 'truth' regarding the difference between representative and direct democracy?", "options": [{"text": "Direct democracy is the only form where the mob has actual sovereignty.", "isCorrect": false, "rationale": "The text states sovereignty is 'always actually' in the lowly citizen regardless of the form."}, {"text": "The differences are less marked than sentimentalists believe because both rely on agents who manipulate the electors.", "isCorrect": true, "rationale": "Mencken argues that in both forms, agents with their own interests end up influencing and selling their influence to the voters."}, {"text": "Representative democracy is more diseased because it prevents the 'native sagacity' of the people from flourishing.", "isCorrect": false, "rationale": "Mencken explicitly mocks the idea of 'native sagacity' and views the defects as inherent to the people, not the system."}, {"text": "Direct democracy is inherently superior because it eliminates the need for professional politicians.", "isCorrect": false, "rationale": "Mencken refutes this by pointing out that even in 'direct' settings like town meetings, professional 'quacks' and demagogues still lead."}]}, {"question": "How does Mencken explain the US involvement in 'the late war'?", "options": [{"text": "The power of the mob to enforce its isolationist will against the government.", "isCorrect": false, "rationale": "Mencken claims the people were 'against going in' but were shoved into it anyway."}, {"text": "The successful application of the Beatitudes and logic in national policy.", "isCorrect": false, "rationale": "Mencken argues that logic and the Beatitudes rarely move the masses or their leaders."}, {"text": "The manipulation of a resoluteless majority by a competent and determined minority of professional politicians.", "isCorrect": true, "rationale": "The text states that 'the plain people were shoved into the late war' by politicians influenced by small minorities because the people lacked 'sense and resolution.'"}, {"text": "The inherent desire of the democratic citizen to spread their form of government abroad.", "isCorrect": false, "rationale": "Mencken suggests the citizens actually preferred to stay out of the war, contradicting a desire to spread democracy through conflict."}]}, {"question": "Mencken refers to 'stall-fed Rousseaus.' In context, who is he most likely mocking?", "options": [{"text": "Academic philosophers who study the social contract.", "isCorrect": false, "rationale": "While he mentions 'university pundits,' the term 'stall-fed Rousseaus' is linked to political figures from the 'cow States.'"}, {"text": "Populist politicians from rural states who champion the 'purity' of the common man.", "isCorrect": true, "rationale": "He describes them as arising in 'cow States' and penetrating to 'Governors’ mansions' and the 'Senate' to preach about 'purer democracy.'"}, {"text": "The common citizens who believe they are the source of all power.", "isCorrect": false, "rationale": "The common citizens are the 'mob' or 'lowly Christians,' whereas these 'Rousseaus' are the ones misleading them with rhetoric."}, {"text": "The 'concrete poets' who actually write the popular ballads of the folk.", "isCorrect": false, "rationale": "The poets are part of a separate analogy regarding cultural formulation, not the political leaders from rural states."}]}, {"question": "Why does Mencken believe it is often impossible to ascertain the views of voters even 'post hoc'?", "options": [{"text": "Because voters are constantly changing their minds based on the latest news.", "isCorrect": false, "rationale": "While true in some contexts, Mencken’s specific point is about their inherent inability to comprehend the issues at hand."}, {"text": "Because the generality of citizens are congenitally unable to comprehend or consider problems in an unbiased manner.", "isCorrect": true, "rationale": "The text argues that because citizens can't understand the problems, it's impossible to truly know their views on them."}, {"text": "Because professional politicians intentionally obscure the results of elections.", "isCorrect": false, "rationale": "Mencken focuses on the intellectual deficiency of the voters rather than a conspiracy to hide election data."}, {"text": "Because the tools of 'purer democracy,' like the referendum, have not been implemented correctly.", "isCorrect": false, "rationale": "Mencken dismisses these tools as 'rhetoric' and 'failures' that don't address the core issue of voter 'imbecility.'"}]}, {"question": "Which statement best summarizes Mencken’s view on the 'mob' as the 'source of all power'?", "options": [{"text": "It is a legal fiction that has no basis in the actual operations of the state.", "isCorrect": false, "rationale": "Mencken states the mob is 'theoretically and in fact... the source of all power,' but critiques how that power is used."}, {"text": "The mob is a wise referee that ensures only the most honest minorities gain power.", "isCorrect": false, "rationale": "He says the mob usually 'sticks to the thieves' because it understands their words better."}, {"text": "The mob has the power to throw off its exploiters at will but is easily misled by its own prejudices and the words of 'rogues.'", "isCorrect": true, "rationale": "Mencken notes the mob 'has the power to throw them off at will' but often chooses thieves whose ideas they 'cherish.'"}, {"text": "The mob’s power is only effective in 'pure' democracies like the Swiss cantons.", "isCorrect": false, "rationale": "He argues that the power dynamics are 'essentially the same' in all forms of government mentioned."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
