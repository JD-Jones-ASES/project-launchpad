    };

<body>
<div class="quiz-container">

        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 15, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to Mencken, what is the most likely outcome when a 'gentleman'—defined as one not susceptible to open bribery—enters the American political arena?", "options": [{"text": "He successfully purges the system of 'mountebanks' through a brilliant first campaign.", "isCorrect": false, "rationale": "While Mencken admits an amateur might have initial success due to the mob's love of a 'brutal show,' he argues this rectitude is unsustainable if the person wishes to stay in office."}, {"text": "He either leaves the system to maintain his integrity or adopts the 'cologne spirits' of the trade to remain.", "isCorrect": true, "rationale": "Mencken posits a binary choice: the reformer must either jump out of the 'window' (leave) or cease to be a 'virgin' (become corrupted)."}, {"text": "He utilizes his 'sniffish class consciousness' to maintain a distance from the mob's prejudices.", "isCorrect": false, "rationale": "Mencken suggests that those with high class consciousness often become the 'worst of the worst' demagogues once they succumb to the system."}, {"text": "He leverages the 'aristocratic tradition' of American universities to influence policy from within.", "isCorrect": false, "rationale": "The text explicitly states that unlike England, the scholarship of institutions like Harvard has no impact on Capitol Hill."}]}, {"question": "How does Mencken characterize the career of Theodore Roosevelt in the context of democratic 'messiahs'?", "options": [{"text": "As a genuine aristocrat who successfully broke the barriers of professional politics.", "isCorrect": false, "rationale": "Mencken labels Roosevelt an 'imitation aristocrat' and focuses on his ultimate transformation into a demagogue."}, {"text": "As a 'party hack' whose private convictions were indistinguishable from his political dodges.", "isCorrect": false, "rationale": "This description is specifically applied by Mencken to Henry Cabot Lodge, rather than Roosevelt."}, {"text": "As a sword against demagogy who eventually became a violent and shameless demagogue himself.", "isCorrect": true, "rationale": "Mencken identifies Roosevelt as a primary example of a 'recusant' who turned into the very thing he initially fought."}, {"text": "As a tragic figure who lost his office because he refused to 'allay the resentment' of the mob.", "isCorrect": false, "rationale": "Mencken suggests Roosevelt was highly successful at adapting to the mob's tastes, rather than being a victim of them."}]}, {"question": "What does Mencken identify as the primary factor protecting the English judiciary from the 'shysters' who dominate the American bench?", "options": [{"text": "The requirement that all judges be graduates of Oxford or Cambridge.", "isCorrect": false, "rationale": "While Mencken mentions these universities' influence at Westminster, he attributes judicial quality to a different systemic structure."}, {"text": "The persistence of an aristocratic tradition that guards the selection process.", "isCorrect": true, "rationale": "Mencken argues that the 'governing oligarchy' in England maintains high standards to protect its own class interests, preventing 'imbecility' from taking the bench."}, {"text": "A constitutional prohibition against judges participating in party politics.", "isCorrect": false, "rationale": "Mencken focuses on class-based selection and tradition rather than specific legal or constitutional prohibitions."}, {"text": "The higher salaries offered to English judges compared to their American counterparts.", "isCorrect": false, "rationale": "While he mentions American judges 'yearning for the judicial salary,' he identifies the lack of an elite guard as the primary cause of US judicial decay."}]}, {"question": "What 'grim dilemma' does Mencken claim is created for a gentleman taking an oath of office under the Constitution?", "options": [{"text": "He must choose between loyalty to the Federal Union and loyalty to his local constituents.", "isCorrect": false, "rationale": "Mencken's specific example concerns a more personal and moral conflict related to sumptuary laws (Prohibition)."}, {"text": "He must choose between being a 'liar' regarding his oath or a 'pig' regarding his personal honor.", "isCorrect": true, "rationale": "This refers to the oath to uphold the Constitution, which Mencken illustrates with the scenario of bringing wine to a dying relative."}, {"text": "He must reconcile his 'private convictions' with the demands of 'prehensile minorities.'", "isCorrect": false, "rationale": "While this is a general political struggle Mencken describes, it is not the specific 'grim dilemma' linked to the grandmother anecdote."}, {"text": "He must choose between the 'scholarship of Harvard' and the 'prejudices of Westerville, Ohio.'", "isCorrect": false, "rationale": "This contrast is used to describe the isolation of intellectuals, not the specific dilemma of the oath of office."}]}, {"question": "In Mencken's view, why do the Bill of Rights (the First, Second, Fourth, Fifth, and Sixth Amendments) lack protection from the American judiciary?", "options": [{"text": "The amendments are inherently 'imbecilic' and conflict with 'fundamental human rights.'", "isCorrect": false, "rationale": "Mencken actually blames the judges for the 'imbecility' of the system and notes they fail to protect these rights."}, {"text": "The Supreme Court has officially ruled that these amendments are 'anachronisms.'", "isCorrect": false, "rationale": "Mencken suggests the destruction of these rights happened through 'acquiescence' and 'supine connivance,' not formal repeal."}, {"text": "American judges are often 'shysters' or 'duffers' who are content to enforce any law provided by corrupt legislators.", "isCorrect": true, "rationale": "Mencken argues that because judges are chosen for political reasons, they lack the integrity or legal theory to stand against legislative overreach."}, {"text": "The 'mob' has demanded the removal of these protections through popular vote.", "isCorrect": false, "rationale": "While Mencken critiques the mob, he places the specific failure to protect constitutional rights on the 'duffers' on the bench."}]}, {"question": "Mencken uses the term 'prehensile minorities' to describe which group in the political ecosystem?", "options": [{"text": "Intellectuals from universities who attempt to influence the mob.", "isCorrect": false, "rationale": "Mencken claims intellectuals have no influence on Capitol Hill, making them the opposite of this group."}, {"text": "The 'gentlemen' who attempt to remain honest while holding public office.", "isCorrect": false, "rationale": "Gentlemen are described as the victims or 'apostates' of the system, not the 'mob-masters' themselves."}, {"text": "Those who pull the strings of the mob and must be 'made terms with' by aspirants.", "isCorrect": true, "rationale": "Mencken identifies these as the 'mob-masters' that a politician must satisfy to remain in power."}, {"text": "The 'Methodist wowsers' who specifically target the judiciary.", "isCorrect": false, "rationale": "While these groups are related to his critique, 'prehensile minorities' is a broader term for those performing upon the 'spines' of the mob."}]}, {"question": "Which specific comparison does Mencken draw between Presidents Harding and his successor to illustrate the lack of 'interpenetration' on higher levels?", "options": [{"text": "Harding socialized with metaphysicians, while his successor socialized with bootleggers.", "isCorrect": false, "rationale": "Mencken claims Harding spent his time with bootleggers and Elks, *not* metaphysicians."}, {"text": "Harding was an 'imitation aristocrat,' while his successor was a 'party hack.'", "isCorrect": false, "rationale": "Mencken applies the 'imitation aristocrat' label to Theodore Roosevelt, not Harding."}, {"text": "Harding's tastes were those of a small-town Elk, while his successor entertains only party newspaper editors.", "isCorrect": true, "rationale": "Mencken uses this to show that American presidents avoid contact with 'intelligent' men or those outside professional politics."}, {"text": "Harding respected the judiciary, while his successor viewed the Constitution as having no meaning.", "isCorrect": false, "rationale": "Mencken critiques the judiciary as a whole and the tastes of presidents, but does not use this specific comparison for judicial respect."}]}, {"question": "According to Mencken's 'axiom of practical politics,' who are the 'worst enemies of political decency'?", "options": [{"text": "The outright 'shysters' who enter politics for cash bribery.", "isCorrect": false, "rationale": "Mencken suggests these are expected; the 'worst' are those who claimed higher motives."}, {"text": "The 'tired reformers' who initially sought to make the corruptible 'put on incorruption.'", "isCorrect": true, "rationale": "Mencken argues that the most shameful demagogues are those who entered as reformers with a 'sniffish class consciousness.'"}, {"text": "The 'prehensile minorities' who influence the mob from behind the scenes.", "isCorrect": false, "rationale": "While they are part of the problem, Mencken reserves the 'worst' superlative for the 'recusant' reformers."}, {"text": "The 'ignoramuses' who comprise the majority of the House of Commons.", "isCorrect": false, "rationale": "This group is mentioned in his praise of England's ability to check them, rather than as the 'worst enemies of decency' in his axiom."}]}, {"question": "What does Mencken mean by the 'cologne spirits of the trade'?", "options": [{"text": "The actual alcohol involved in bootlegging scandals like Teapot Dome.", "isCorrect": false, "rationale": "While bootlegging is mentioned elsewhere, this phrase is used metaphorically regarding a politician's rectitude."}, {"text": "The sophisticated arguments used by 'Gelehrte' to defend biology.", "isCorrect": false, "rationale": "The 'Gelehrte' (scholars) are portrayed as being ignored or fought against by politicians, not providing them with 'spirits.'"}, {"text": "The moral compromises and 'tricks' a politician must use to mask their integrity and survive.", "isCorrect": true, "rationale": "Mencken uses this metaphor to describe how a 'gentleman' must dilute his rectitude to suit the 'trade' of politics."}, {"text": "The high-quality scholarship that marks the English political system.", "isCorrect": false, "rationale": "Mencken contrasts English scholarship with American 'balderdash'; the 'cologne spirits' are the American adaptation."}]}, {"question": "How does Mencken characterize the American mob's role in the corruption of political leaders?", "options": [{"text": "The mob's 'sempiternal prejudices' and 'crazes' actively force leaders to use 'balderdash' and demagogic tricks to survive.", "isCorrect": true, "rationale": "Mencken views the mob as having 'crazes' and 'resentments' that force a leader to use 'balderdash' and 'mountebank' tricks to stay in power."}, {"text": "The mob is naturally inclined toward 'political decency' and is only corrupted by 'shyster' leaders from above.", "isCorrect": false, "rationale": "Mencken believes the mob's 'sempiternal prejudices' actually favor the less honorable man, and the leader must 'adapt himself to its tastes.'"}, {"text": "The mob is entirely passive and indifferent, allowing 'prehensile minorities' to control the political process unchecked.", "isCorrect": false, "rationale": "While Mencken discusses 'prehensile minorities,' he portrays the mob as actively having tastes, prejudices, and resentments that shape the political landscape."}, {"text": "The mob is capable of reform if exposed to the 'scholarship of Harvard' and the 'Gelehrte' of the universities.", "isCorrect": false, "rationale": "Mencken explicitly states that the scholarship of institutions like Harvard has no influence on Capitol Hill, and the mob remains impervious to intellectual improvement."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
