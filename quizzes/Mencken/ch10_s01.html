<script>
var QUESTIONS = [{"question": "In the context of Mencken's rhetorical strategy in Section I.9, what is the primary function of the 'peroration'?", "options": [{"text": "To introduce new evidence regarding the common man's intellectual failures.", "isCorrect": false, "rationale": "The peroration serves as a conclusion to existing arguments rather than a platform for introducing new evidence or themes."}, {"text": "To gather themes from preceding sections into a final, intensified verdict.", "isCorrect": true, "rationale": "A peroration is defined as a concluding section that gathers up main themes and intensifies them emotionally for a final judgment."}, {"text": "To provide a lighthearted transition that eases the reader into the next part of the book.", "isCorrect": false, "rationale": "The text explicitly states that Section I.9 is darker and more bleak than previous sections, serving as an uncompromising verdict."}, {"text": "To deconstruct the previous eight sections and offer a more hopeful alternative.", "isCorrect": false, "rationale": "Mencken uses this section to reinforce his dark vision, claiming the mob is an eternal condition with no hope for reform."}], "id": "q01"}, {"question": "Mencken utilizes 'absolute terms' such as 'eternally' and 'infallibly' primarily to achieve which rhetorical effect?", "options": [{"text": "To invite the reader to participate in a nuanced debate about democratic reform.", "isCorrect": false, "rationale": "Absolute terms are used to close down debate and signify that reform is futile, not to encourage open discussion."}, {"text": "To establish a world where no exceptions exist, thereby closing off further argument.", "isCorrect": true, "rationale": "The use of 'vocabulary of finality' suggests a world without qualifications, making the mob's nature appear unchangeable and debate pointless."}, {"text": "To scientifically quantify the psychological traits of the common man.", "isCorrect": false, "rationale": "While these terms sound definitive, Mencken uses them as rhetorical weapons of judgment rather than tools for scientific measurement."}, {"text": "To contrast his own uncertainty with the mob's blind confidence.", "isCorrect": false, "rationale": "Mencken's voice is described as that of a prophet pronouncing final judgment, indicating his own absolute certainty."}], "id": "q02"}, {"question": "How does a 'cumulative sentence' differ from a 'periodic sentence' in Mencken's prose?", "options": [{"text": "A cumulative sentence begins with the main idea, while a periodic sentence withholds it until the end.", "isCorrect": true, "rationale": "The text defines cumulative sentences as starting with the main clause and adding detail, whereas periodic sentences build suspense by placing the main idea at the conclusion."}, {"text": "A cumulative sentence relies on logic, while a periodic sentence relies on emotional appeal.", "isCorrect": false, "rationale": "The distinction is structural regarding the placement of the main clause, not based on the mode of appeal (logos vs. pathos)."}, {"text": "A cumulative sentence is always shorter than a periodic sentence.", "isCorrect": false, "rationale": "Length is not the defining characteristic; rather, it is the sequence in which information and the main clause are presented."}, {"text": "A cumulative sentence is used for humor, whereas a periodic sentence is used for serious indictments.", "isCorrect": false, "rationale": "Mencken uses both types of sentences for serious rhetorical purposes, often combining them to overwhelm the reader."}], "id": "q03"}, {"question": "The analysis describes Mencken's use of the word 'nether' as having 'overtones of the underworld.' What does this suggest about his view of the common man?", "options": [{"text": "The common man is a tragic figure destined for religious salvation.", "isCorrect": false, "rationale": "Mencken's view is secular and bleak, viewing the common man's state as a permanent, hellish condition rather than a path to salvation."}, {"text": "The common man lives in a metaphorical hell of his own making.", "isCorrect": true, "rationale": "The word 'nether' implies a lower, subterranean region, suggesting the common man inhabits a debased or infernal state of existence."}, {"text": "The common man is simply at the bottom of a socioeconomic ladder that can be climbed.", "isCorrect": false, "rationale": "Mencken views the 'nether levels' as a permanent feature of human civilization, not a temporary economic position."}, {"text": "The common man is a physical creature of the soil and agriculture.", "isCorrect": false, "rationale": "While Mencken uses bestial imagery, 'nether' specifically evokes the underworld and hell rather than simple farming or soil."}], "id": "q04"}, {"question": "Which rhetorical device is Mencken employing when he states that the common man has 'moved an inch' in two thousand years?", "options": [{"text": "Hyperbole, because an inch is an exaggeration of actual physical movement.", "isCorrect": false, "rationale": "While it is an exaggeration of stagnation, the text specifically identifies this as 'litotes'—understatement through negation or minimization."}, {"text": "Litotes, using understatement to emphasize the lack of real progress.", "isCorrect": true, "rationale": "By describing two millennia of history as 'an inch,' Mencken uses extreme understatement to suggest that no significant moral progress has occurred."}, {"text": "Personification, by treating time as a physical distance.", "isCorrect": false, "rationale": "He is measuring moral stagnation in units of distance, but this does not give human traits to non-human entities."}, {"text": "Metonymy, substituting the part (an inch) for the whole (progress).", "isCorrect": false, "rationale": "The rhetorical weight comes from the intentional understatement of the distance, which is characteristic of litotes."}], "id": "q05"}, {"question": "Mencken pairs figures like Nero and Torquemada against Galileo and Savonarola to demonstrate:", "options": [{"text": "The historical inevitability of political revolution.", "isCorrect": false, "rationale": "Mencken's pairings show the mob's consistent choice of tyranny over excellence, rather than a trend toward revolution."}, {"text": "The mob's 'perverse judgment' in favoring tyrants over truth-seekers.", "isCorrect": true, "rationale": "These 'antithetical couples' serve as shorthand to show that the mob instinctively supports those who oppress and opposes those who liberate the spirit."}, {"text": "The progress of human rights from the Roman era to the Inquisition.", "isCorrect": false, "rationale": "The pairings are used to show stagnation and the mob's eternal nature, not the progress of rights."}, {"text": "The similarities between scientific and religious martyrdom.", "isCorrect": false, "rationale": "While Galileo and Savonarola were both persecuted, the primary rhetorical point is the mob's instinctive hostility toward them."}], "id": "q06"}, {"question": "According to the close reading, what is the effect of the 'tricolon' used in the sentence: 'He is lazy, improvident and unclean'?", "options": [{"text": "It creates a sense of rhythmic balance that suggests the mob is misunderstood.", "isCorrect": false, "rationale": "The tricolon is used as a 'hammering rhythm' of indictment, not to create a sense of balance or sympathy."}, {"text": "It moves from a mundane fault to a sacred/biblical condemnation.", "isCorrect": true, "rationale": "The analysis notes an escalation from 'lazy' (common) to 'unclean' (biblical resonance), transforming a list into a curse."}, {"text": "It uses three synonymous words to slow down the pace of the argument.", "isCorrect": false, "rationale": "The words are not synonyms; they represent different types of judgment (economic, moral, and sacred) that build in severity."}, {"text": "It provides a rare moment of lighthearted alliteration to break the dark tone.", "isCorrect": false, "rationale": "The tone remains devastating and weary; there is no alliteration in this specific phrase, and its effect is heavy, not light."}], "id": "q07"}, {"question": "Why does Mencken use the German word 'Stammvater' when discussing the Apostle Paul?", "options": [{"text": "To suggest that Paul was of German ancestry.", "isCorrect": false, "rationale": "The word is used to signal an intellectual lineage in criticism, not to make a claim about Paul's actual genealogy."}, {"text": "To distance himself from the English-speaking mob and signal his debt to Nietzsche.", "isCorrect": true, "rationale": "Using German terms identifies Mencken with the tradition of German cultural criticism and separates him from the 'mob' he describes."}, {"text": "To provide a direct translation for the biblical term 'Apostle'.", "isCorrect": false, "rationale": "The word means 'ancestor' or 'progenitor' and is used as a specific rhetorical choice, not a direct translation of 'Apostle'."}, {"text": "To appeal to the large German-American population of his time.", "isCorrect": false, "rationale": "The text states the word functions to distance himself from the mob and align with Nietzschean intellectual traditions."}], "id": "q08"}, {"question": "Mencken's description of Paul 'flavoring the stew with remnants of the Greek demonology' is an example of which rhetorical strategy?", "options": [{"text": "A culinary metaphor that reduces complex theology to mere cooking.", "isCorrect": true, "rationale": "The metaphor of 'stew' and 'flavoring' degrades theology by framing it as a physical, common activity, making it seem less divine."}, {"text": "A historical analogy connecting Paul's travels to modern culinary traditions.", "isCorrect": false, "rationale": "The focus is on degrading the theological subject through the frame of the metaphor, not exploring history or actual food."}, {"text": "A litotes that understates the complexity of Greek religious thought.", "isCorrect": false, "rationale": "This is a sustained metaphor, not a form of understatement through negation."}, {"text": "A periodic sentence that builds suspense about the origin of Christianity.", "isCorrect": false, "rationale": "While the diction is important, the strategy is defined by the metaphor rather than the syntactic structure of the sentence."}], "id": "q09"}, {"question": "How does Section I.9 serve as a 'bridge' in the overall structure of Mencken's book?", "options": [{"text": "It transitions from the history of ancient mobs to the history of modern mobs.", "isCorrect": false, "rationale": "The bridge is between the nature of the 'democratic man' (Part I) and the 'democratic state' (Part II)."}, {"text": "It moves from the nature of the democratic individual to the institutions they create.", "isCorrect": true, "rationale": "The text states that I.9 prepares the ground for examining 'The Democratic State'—the institutions built in the image of democratic man."}, {"text": "It provides the solution to the problems of democracy introduced in Part I.", "isCorrect": false, "rationale": "Section I.9 argues that there is no solution, as the mob's nature is eternal and unchangeable."}, {"text": "It connects Mencken's political views with his earlier religious views.", "isCorrect": false, "rationale": "While religion is discussed, the structural purpose of the 'bridge' is the transition from the man to the state."}], "id": "q10"}, {"question": "Mencken writes: 'When a Cagliostro dies he is ready for a Danton; from the funeral of a Barnum he rushes to the triumph of a Bryan.' What rhetorical effect does this rapid-fire succession of paired names produce?", "options": [{"text": "It collapses the distinction between the ancient and the modern, showing that the mob's need for imposters and showmen is a timeless constant across all eras.", "isCorrect": true, "rationale": "By pairing an 18th-century Italian charlatan (Cagliostro) with a French revolutionary demagogue (Danton), then an American circus impresario (Barnum) with a populist politician (Bryan), Mencken shows the mob cycling endlessly through the same pattern regardless of time or place."}, {"text": "It demonstrates that democratic politics requires skilled performers who understand the psychology of entertainment.", "isCorrect": false, "rationale": "Mencken is not praising these figures; the rapid succession is meant to show the mob's pathological gullibility, not to validate political showmanship."}, {"text": "It creates a logical syllogism that the mob's choices follow a rational pattern of selecting the most charismatic leader available.", "isCorrect": false, "rationale": "The opposite is true: Mencken argues this sequence reveals a 'pathological compulsion' toward the unsound rather than any rational selection process."}, {"text": "It provides a historical survey meant to educate readers unfamiliar with the named figures.", "isCorrect": false, "rationale": "Like the catalogue of proper names in earlier sections, these names are deployed as a sorting mechanism and shorthand, not as historical instruction."}], "id": "q11"}, {"question": "Mencken writes that Paul 'knew that nonsense was its [the mob's] natural provender — that the unintelligible soothed it like sweet music.' What does the word 'provender' add to this argument?", "options": [{"text": "It frames the mob's appetite for nonsense as a biological need for fodder — the same instinctual feeding process that drives livestock, not a conscious intellectual preference.", "isCorrect": true, "rationale": "'Provender' means feed for livestock or working animals. By applying it to the mob's consumption of theology, Mencken denies the mob any genuine spiritual or intellectual agency — they consume nonsense the way animals consume hay, because it is what they are built to digest."}, {"text": "It implies that Paul was a gifted farmer who understood how to cultivate religious belief from the soil of human emotion.", "isCorrect": false, "rationale": "The agricultural connotation of 'provender' is not used to praise Paul's cultivation but to demean the mob's appetite, reducing theology to feed."}, {"text": "It places Paul's achievement in an economic context, suggesting he cornered the market on spiritual comfort.", "isCorrect": false, "rationale": "While Mencken satirizes Paul's entrepreneurial skill at crowd management, 'provender' specifically evokes animal feeding, not market economics."}, {"text": "It provides a rare moment of sympathy, acknowledging that the mob cannot help needing spiritual nourishment.", "isCorrect": false, "rationale": "The word is entirely contemptuous; reducing the mob's spiritual life to animal fodder is the opposite of sympathy."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
