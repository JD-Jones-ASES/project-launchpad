    </div>

        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Mencken's rhetorical strategy in Chapter 4, Section 1 is described as an escalation of the 'mock-scientific approach.' How does this section specifically differentiate its authoritative framework from that of Chapter 3?", "options": [{"text": "It shifts from the language of zoological classification to the authority of experimental psychology.", "isCorrect": true, "rationale": "Mencken transitions from using biological/animalistic categorization to citing specific psychologists like Watson to lend a 'literature review' appearance to his polemic."}, {"text": "It moves from a reliance on anecdotal evidence to a strict adherence to peer-reviewed neurological data.", "isCorrect": false, "rationale": "While Mencken cites psychologists, the text notes he uses science selectively and maintains a mock-scientific, entertaining persona rather than a strict peer-review format."}, {"text": "It replaces the previous focus on sociology with a new emphasis on arboreal evolutionary theories.", "isCorrect": false, "rationale": "Although arboreal theories are mentioned, they are dismissed, and the primary shift is from zoological registers to psychological ones."}, {"text": "It abandons the persona of the scientist entirely to adopt the voice of a pure vaudeville entertainer.", "isCorrect": false, "rationale": "Mencken does not abandon the scientist persona; instead, he adds the entertainer dimension to it, creating a complex 'collision of registers.'"}], "id": "q01"}, {"question": "According to the analysis, why does Mencken intentionally use humor and 'vaudeville' set pieces despite his supposedly clinical objective?", "options": [{"text": "To distract the reader from the logical fallacies inherent in his selective use of behaviorism.", "isCorrect": false, "rationale": "While he does use science selectively, the primary rhetorical purpose of the humor is to mirror his argument about human nature."}, {"text": "To prove that even educated readers are governed by emotion rather than logic.", "isCorrect": true, "rationale": "By appealing to the reader's sense of humor—an emotion—Mencken demonstrates his central claim that reason is subordinate to feeling."}, {"text": "To soften the blow of his harsh social critiques for a more sensitive middle-class audience.", "isCorrect": false, "rationale": "Mencken's target audience is the educated reader who already suspects his conclusions; he is not attempting to appease the 'yokels' he critiques."}, {"text": "To provide a rhythmic counterpoint to the 'stately' and complex syntax of his scientific descriptions.", "isCorrect": false, "rationale": "While the prose is rhythmically inventive, the entertainer persona's primary function is thematic rather than purely structural."}], "id": "q02"}, {"question": "Mencken selectively utilizes behaviorism by embracing its focus on observable responses while ignoring which core tenet of John B. Watson’s original theory?", "options": [{"text": "The rejection of introspection as a valid psychological method.", "isCorrect": false, "rationale": "Mencken actually embraces the rejection of introspection, using behaviorism to argue that internal 'reason' is a myth."}, {"text": "The focus on the fear reflex as a primary human stimulus.", "isCorrect": false, "rationale": "Mencken heavily utilizes the fear reflex as the cornerstone of his argument regarding the common man."}, {"text": "The principle of environmentalism and the total malleability of infants.", "isCorrect": true, "rationale": "Watson claimed environment could shape any child regardless of talent, but Mencken ignores this to focus on what he views as innate, inherited stupidity."}, {"text": "The use of 'phylogenic' development to explain modern social anxieties.", "isCorrect": false, "rationale": "This term refers to evolutionary development; Mencken uses this biological concept to bolster his argument rather than ignoring it."}], "id": "q03"}, {"question": "In the 'greased pole' metaphor, what is the rhetorical effect of the word 'gaudy' in the phrase 'flying gaudy and seductive flags'?", "options": [{"text": "It suggests that the intellectual goals humans pursue are cheap, showy, and ultimately tasteless.", "isCorrect": true, "rationale": "The word 'gaudy' carries a negative connotation that devalues the 'flags' (ideas/ambitions), reducing them to fairground prizes."}, {"text": "It highlights the aesthetic beauty of high-level philosophical thought.", "isCorrect": false, "rationale": "Gaudy implies something tasteless or over-the-top, which contradicts the idea of genuine aesthetic beauty."}, {"text": "It provides a scientific descriptor for the 'phylogenic' attraction to bright colors.", "isCorrect": false, "rationale": "In this context, Mencken is using the word as a weaponized connotation rather than a neutral scientific term."}, {"text": "It emphasizes the physical danger and risk involved in the 'ascent' of the human soul.", "isCorrect": false, "rationale": "While 'greased' suggests difficulty, 'gaudy' specifically targets the perceived value of the destination."}], "id": "q04"}, {"question": "The analysis highlights a specific sentence structure: 'Golf is easier; so is joining Rotary; so is Fundamentalism; so is osteopathy; so is Americanism.' What is the primary satirical mechanism at work here?", "options": [{"text": "The use of alliteration to create a mocking, nursery-rhyme rhythm.", "isCorrect": false, "rationale": "The list relies on syntactic parallelism and repetition of 'so is' rather than shared initial consonant sounds."}, {"text": "The syntactic equivalence created by the list, which treats disparate activities as equally mindless.", "isCorrect": true, "rationale": "By using the same structure for a game, a club, a religion, and a political ideology, Mencken implies they are all merely interchangeable substitutes for thought."}, {"text": "The use of the 'abysm' register to elevate mundane activities to the level of epic struggle.", "isCorrect": false, "rationale": "This list does the opposite; it drags 'ambitious' concepts like Americanism down to the level of a leisure activity like golf."}, {"text": "The inversion of normal word order to mimic the physical sensation of climbing a pole.", "isCorrect": false, "rationale": "While the previous sentence uses inversion ('Up each...'), this specific list uses a repetitive, descending structure."}], "id": "q05"}, {"question": "How does Mencken's use of the word 'tabby-cats' function as 'weaponized connotation'?", "options": [{"text": "It serves as a neutral biological comparison to show the shared mammalian ancestry of humans and felines.", "isCorrect": false, "rationale": "The term is used polemically; its 'neutral' dictionary definition is secondary to the emotional associations Mencken intends."}, {"text": "It suggests the common man is predatory and dangerous to the 'educated reader.'", "isCorrect": false, "rationale": "A 'tabby-cat' is specifically a domestic animal, implying harmlessness and lack of independence rather than predatory danger."}, {"text": "It compares people to domestic animals to imply they are soft, dependent, and trivial.", "isCorrect": true, "rationale": "The connotation of 'tabby-cat'—pampered and incapable of independence—does the work of insulting the common man's character without a direct argument."}, {"text": "It refers back to the 'arboreal' theories of human development mentioned earlier in the text.", "isCorrect": false, "rationale": "Arboreal theories relate to tree-dwelling primates, whereas 'tabby-cats' are domestic ground-dwellers; the two images serve different rhetorical functions."}], "id": "q06"}, {"question": "When Mencken hedges his arguments with phrases like 'one need not follow Dr. Watson so far,' what is the tactical purpose of these 'retreats'?", "options": [{"text": "To admit uncertainty in his findings and invite the reader to conduct their own experiments.", "isCorrect": false, "rationale": "Mencken is not genuinely uncertain; he uses these qualifications as a rhetorical tool to eventually reassert his position more strongly."}, {"text": "To create the impression of a fair-minded investigator while dismissing competing views.", "isCorrect": true, "rationale": "Hedged statements make the author appear objective and reasonable, which helps persuade the reader to accept the more extreme claims that follow."}, {"text": "To avoid potential legal action from the psychologists he cites by name.", "isCorrect": false, "rationale": "The analysis suggests these are 'tactical retreats' for rhetorical effect, not for legal protection or fear of the experts."}, {"text": "To transition from the 'scientific' register back to the 'vaudeville' register.", "isCorrect": false, "rationale": "Hedging is a feature of the confidence-and-qualification modulation in his tone, rather than a bridge between registers."}], "id": "q07"}, {"question": "Which term does Mencken use to suggest that fear is an inherited trait, wired into the human species through evolutionary development?", "options": [{"text": "Arboreal", "isCorrect": false, "rationale": "This refers specifically to living in trees, a theory Mencken dismisses rather than adopts as his primary explanation."}, {"text": "Phylogenic", "isCorrect": true, "rationale": "Mencken borrows this biological term to argue that fear is not just personal but is 'wired into the human animal at the deepest level' through evolution."}, {"text": "Abysm", "isCorrect": false, "rationale": "While 'abysm' refers to the deep past, it is used to suggest depths of time rather than the biological process of inheritance."}, {"text": "Insensate", "isCorrect": false, "rationale": "This word describes a lack of consciousness or sensation, rather than the evolutionary mechanism of development."}], "id": "q08"}, {"question": "In the close reading of the 'Sunday-school superintendent' simile, what is the 'smuggled' moral judgment Mencken makes?", "options": [{"text": "That adultery is the natural byproduct of religious fundamentalism.", "isCorrect": false, "rationale": "While Mencken dislikes fundamentalism, the simile's primary point is about the universality of fear, not a causal link to adultery."}, {"text": "That the respectable classes, like infants, are governed by fear—and that their fear is justified by their guilt.", "isCorrect": true, "rationale": "By using 'adultery' and 'taken,' Mencken implies that the superintendent's (and by extension, the middle class's) fear is a deserved response to hypocrisy."}, {"text": "That infants possess an innate understanding of social sin and religious hypocrisy.", "isCorrect": false, "rationale": "Mencken's point is that the *reflex* of fear is the same; the infant is helpless, while the adult is guilty, but both are 'shaking' from the same primitive emotion."}, {"text": "That the scientific observation of infants is inherently superior to moralistic religious teaching.", "isCorrect": false, "rationale": "While he favors science, the simile specifically uses moral failure to argue that civilization's 'higher' emotions are just renamed primitive ones."}], "id": "q09"}, {"question": "The analysis describes Mencken's diction as a 'collision of registers.' Which of the following best exemplifies this technique?", "options": [{"text": "The use of the word 'shinning' to describe the movement of a 'human soul.'", "isCorrect": true, "rationale": "This pairs a colloquial, physical verb ('shinning') with a high-register, philosophical noun ('human soul'), creating a jarring effect."}, {"text": "The mention of Dr. John B. Watson and Dr. Eleanor R. Wembridge in the same paragraph.", "isCorrect": false, "rationale": "This is a consistent use of the scientific/academic register, not a collision with a different one."}, {"text": "The description of the world as a 'vast field' with 'seductive flags.'", "isCorrect": false, "rationale": "These words are relatively consistent in their descriptive, metaphorical register."}, {"text": "Using 'painfully' and 'with many a slip' as adverbs to slow down a sentence.", "isCorrect": false, "rationale": "This is an example of rhythmic control and syntactic slowing, not a collision of different vocabulary levels."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
