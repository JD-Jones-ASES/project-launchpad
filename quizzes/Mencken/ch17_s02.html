<script>
var QUESTIONS = [{"question": "According to Mencken, what is the primary consequence of the constitutional rule requiring legislators to be actual residents of the districts they represent?", "options": [{"text": "It ensures that the unique cultural values of every district are accurately reflected in national policy.", "isCorrect": false, "rationale": "While the text mentions preserving a 'direct and continuous voice' as the rule's aim, Mencken argues the actual result is the opposite of high-quality representation."}, {"text": "It fills legislative bodies with local politicians who often lack the intellectual capacity to handle complex governmental issues.", "isCorrect": true, "rationale": "Mencken asserts that this rule limits the talent pool, leading to the election of 'puerile local politicians' and 'incompetents.'"}, {"text": "It creates a diverse legislative body by preventing the consolidation of power among an urban elite.", "isCorrect": false, "rationale": "Mencken argues the rule actually results in 'monotony' and a 'depressing gang of incompetents' rather than a beneficial form of diversity."}, {"text": "It encourages local citizens to take a more active role in vetting candidates from their own communities.", "isCorrect": false, "rationale": "Mencken suggests the 'rustic mob' is easily swayed by demagogues and local antipathies rather than performing rigorous vetting."}], "id": "q01"}, {"question": "Mencken uses the example of 'Morley' in England to illustrate which of the following points?", "options": [{"text": "The English system allows remote divisions to elect highly competent representatives who do not live in the district.", "isCorrect": true, "rationale": "Mencken contrasts the US system with England, where any district can choose a distinguished figure regardless of their residency."}, {"text": "The rise of the 'mob' in England has led to the same legislative decay seen in the United States.", "isCorrect": false, "rationale": "While he mentions the 'rise of the mob,' his primary use of Morley is to highlight the flexibility of the English electoral system compared to the American one."}, {"text": "English legislators are more susceptible to the 'magic of a great name' than American voters.", "isCorrect": false, "rationale": "Mencken suggests the American 'rustic mob' might succumb to a great name too, if only the law allowed them to vote for outsiders."}, {"text": "The British Parliament is immune to the influence of corrupt agencies like the Anti-Saloon League.", "isCorrect": false, "rationale": "The text focuses on the residency requirement's effect on individual competence rather than the specific immunity of the British Parliament to lobbying."}], "id": "q02"}, {"question": "Why does Mencken believe a figure like Roscoe Pound could not be elected in the Massachusetts district where he resides?", "options": [{"text": "The district is dominated by 'Fundamentalist clergy' who oppose Pound's legal theories.", "isCorrect": false, "rationale": "The influence of the clergy is specifically noted as a barrier in Southern states like Tennessee and Mississippi, not Massachusetts."}, {"text": "Pound's neighbors find his high level of intelligence and personal independence to be offensive.", "isCorrect": true, "rationale": "Mencken argues that local familiarity with a superior man often leads to 'antipathies' and 'offense' among neighbors."}, {"text": "The constitutional rule specifically forbids scholars and academics from serving in the House.", "isCorrect": false, "rationale": "There is no mention of a ban on scholars; the issue is the residency requirement and local voter psychology."}, {"text": "The 'Anti-Saloon League' has successfully blacklisted Pound for his refusal to follow their mandates.", "isCorrect": false, "rationale": "The text suggests a man like Pound (or Morley) would disdain such mandates, but the reason for his local unelectability is his independence and the proximity of his neighbors."}], "id": "q03"}, {"question": "Mencken attributes the passage of the Eighteenth Amendment primarily to which group of people?", "options": [{"text": "Sinister urban lobbyists who used the 'Anti-Saloon League' as a front for their own interests.", "isCorrect": false, "rationale": "While he mentions lobbyists, he places the specific blame for the amendment's passage on the quality of the voters in the legislatures."}, {"text": "High-ranking White House officials who pressured the House of Representatives.", "isCorrect": false, "rationale": "Mencken describes the House as being disdained by officialdom rather than being led by it."}, {"text": "Ignoble and degraded legislators from backward states and backwoods areas.", "isCorrect": true, "rationale": "The text blames 'ignoble fellows' from backward states for the House vote and 'degraded noodles' from the backwoods for the State ratification."}, {"text": "A coalition of 'Fundamentalist clergy' and 'civilized inhabitants' from the South.", "isCorrect": false, "rationale": "Mencken states that 'civilized inhabitants' are actually under the 'ban' of the clergy and politicians."}], "id": "q04"}, {"question": "What does Mencken identify as the 'eternal tragedy of democracy' regarding members of the Senate?", "options": [{"text": "The inevitable shift from serving the country to serving the private interests of 'bootleggers.'", "isCorrect": false, "rationale": "This describes the House more specifically; the 'eternal tragedy' for the Senate involves a conflict between character and job security."}, {"text": "The fact that even genuine statesmen are eventually corrupted by the 'Anti-Saloon League.'", "isCorrect": false, "rationale": "Mencken notes that some Senators show intellectual dignity; the tragedy lies with those who sacrifice their rectitude."}, {"text": "The sacrifice of private rectitude and personal dignity to meet the demands of political necessity.", "isCorrect": true, "rationale": "Mencken refers to Senators whose 'private rectitude had yielded to political necessity' as the core tragedy."}, {"text": "The inability of even the most powerful Senators to escape the influence of local bosses.", "isCorrect": false, "rationale": "Mencken notes that Senators can often forget local bosses for several years, unlike Congressmen."}], "id": "q05"}, {"question": "Based on Mencken's description, what is the 'daily toil' of the average member of the House of Representatives?", "options": [{"text": "Drafting complex legislation to solve the problems of their specific districts.", "isCorrect": false, "rationale": "Mencken argues that most are 'stupid' and 'unable to grasp' the problems government deals with."}, {"text": "Securing employment for relatives and retainers, sometimes through corrupt payroll schemes.", "isCorrect": true, "rationale": "The text states his daily toil is 'getting jobs for relatives' and sometimes collecting 'a dummy's salary himself.'"}, {"text": "Attending high-level diplomatic parties and influencing the White House.", "isCorrect": false, "rationale": "Mencken claims officialdom 'disdains' him and he is kept waiting in anterooms."}, {"text": "Fighting against the influence of the 'Fundamentalist clergy' in their home states.", "isCorrect": false, "rationale": "Mencken describes these members as 'pliant' and 'under the ban' or in league with such forces."}], "id": "q06"}, {"question": "Why, according to Mencken, are Senators 'measurably better' than members of the House?", "options": [{"text": "The Constitution mandates higher educational requirements for the Upper House.", "isCorrect": false, "rationale": "The text does not mention educational requirements; it focuses on the practical effects of their term length."}, {"text": "They represent larger geographical areas, which mitigates the power of 'local Fundamentalist clergy.'", "isCorrect": false, "rationale": "Mencken focuses on the term length and personal political power rather than the geographical size of the constituency."}, {"text": "Their longer terms allow them to occasionally exercise independence without immediate fear of re-election.", "isCorrect": true, "rationale": "Mencken explains that because they serve for six years, they can 'safely forget' the bosses for a few years and show 'intellectual dignity.'"}, {"text": "The Senate is composed of men who have successfully transitioned from 'petty lawyers' to 'genuine statesmen.'", "isCorrect": false, "rationale": "While some show statesmanship, Mencken claims the 'average Senator' remains a 'party hack' without ideas."}], "id": "q07"}, {"question": "In the testimony of Senator Reed of Missouri, who does he claim will vote for the 'infamous proposal' he is debating?", "options": [{"text": "Idealists who have been misled by 'frauds and fanatics.'", "isCorrect": false, "rationale": "Reed's language is much harsher, focusing on the character flaws of his colleagues rather than their lack of information."}, {"text": "Cowards who value their political offices more than their duty to the country or the Constitution.", "isCorrect": true, "rationale": "Reed explicitly calls them 'cowards' who would 'rather hang on to their present offices than serve their country.'"}, {"text": "Intellectual snobs who have become 'the successor to the lamented Henry Cabot Lodge.'", "isCorrect": false, "rationale": "Mencken uses this description for the gentlemen from Pennsylvania, not Reed for his targets."}, {"text": "The 'civilized inhabitants' who have finally managed to win seats in the Senate.", "isCorrect": false, "rationale": "Reed describes the voters as 'poltroon souls' rather than civilized inhabitants."}], "id": "q08"}, {"question": "How does Mencken characterize the career trajectory of the 'average Southern member' of the House?", "options": [{"text": "A progression from elite Northern universities to powerful law firms in Washington.", "isCorrect": false, "rationale": "Mencken describes their education as occurring in 'hedge schools' and 'preposterous' local colleges."}, {"text": "A rise from local schoolteacher and county official to a position of 'ignorant' law-maker.", "isCorrect": true, "rationale": "Mencken outlines a path through 'hedge school,' teaching in 'native swamps,' and county politics leading to Congress."}, {"text": "A series of 'accidental' appointments by local bosses that bypass the electoral process.", "isCorrect": false, "rationale": "The text describes them as having to run for Congress 'three or four' times before finally winning."}, {"text": "A transition from 'civilized inhabitant' to a victim of the 'Fundamentalist clergy.'", "isCorrect": false, "rationale": "Mencken says the civilized inhabitants cannot get elected; the ones who do are the 'pliant' ones."}], "id": "q09"}, {"question": "What was the reaction of the Senate to Senator Reed's 'brutal' and 'blistering' characterization of his colleagues?", "options": [{"text": "They immediately invoked the rules of the Senate to silence him and protect their motives.", "isCorrect": false, "rationale": "Mencken explicitly states that no Senator cared to invoke the rules because they knew he told the truth."}, {"text": "They engaged in a spirited intellectual debate to defend their 'private rectitude.'", "isCorrect": false, "rationale": "The text notes that they did not challenge him or debate the truth of his statements."}, {"text": "They 'slinked' into the cloak-rooms, acknowledging the truth of his words through their silence.", "isCorrect": true, "rationale": "Mencken describes them as slinking into cloak-rooms and leaving Reed to 'roar' at the clerks."}, {"text": "They performed 'dizzy flops' in their voting patterns to align with his uncompromising independence.", "isCorrect": false, "rationale": "The 'dizzy flops' refers to the behavior of the Pennsylvania Senators under pressure, not the reaction to Reed's speech."}], "id": "q10"}, {"question": "When Mencken writes that the Congressman's 'dream is to be chosen to go on a congressional junket, i.e., on a drunken holiday at government expense,' the analysis describes the 'i.e.' as performing 'mock translation.' What is the specific rhetorical effect of using a Latin scholarly abbreviation to introduce an insult?", "options": [{"text": "It signals a shift from satire to polemic, indicating that Mencken is now making a direct factual claim rather than an ironic one.", "isCorrect": false, "rationale": "The irony intensifies rather than disappears — the formal apparatus of scholarship ('i.e.') is the ironic frame within which the insult is delivered."}, {"text": "The formal apparatus of scholarly precision is borrowed to perform a low blow — the abbreviation pretends to clarify a technical term while substituting a contemptuous redefinition.", "isCorrect": true, "rationale": "The analysis identifies this as mock translation: 'i.e.' (id est, 'that is') appears in legal briefs and academic texts to supply the precise meaning of a term. Mencken hijacks this apparatus to substitute 'drunken holiday at government expense' for 'congressional junket,' making the redefinition look like a neutral scholarly gloss while it is actually a devastating exposure."}, {"text": "It establishes Mencken's credentials as a Latin scholar, reinforcing his persona as the aristocratic outsider who is above the democratic fray.", "isCorrect": false, "rationale": "While the Latin abbreviation fits the 'constitutional and legalistic' register, the analysis locates its function specifically in the mock-translation device — the irony between form (scholarly) and content (insult)."}, {"text": "It creates a zeugma by yoking the Latin abbreviation to the informal phrase 'drunken holiday,' forcing incompatible registers together.", "isCorrect": false, "rationale": "The figure is irony (specifically mock-scholarly irony), not zeugma. Zeugma requires a single word governing two incompatible objects; here the device is the formal pretence of translation."}], "id": "q11"}, {"question": "The close reading describes the phrase 'half way between a kleagle of the Ku Klux and a grand worthy bow-wow of the Knights of Zoroaster' as a 'spatial metaphor that reduces the Congressman to a point on a scale of absurdity.' Why is the specific pairing — a real organization and an invented one — essential to this effect?", "options": [{"text": "The real organization supplies historical authority that makes the invented one seem equally real, extending Mencken's critique to all fraternal organizations in the 1920s.", "isCorrect": false, "rationale": "The analysis does not argue the invented organization becomes real through association; rather, the two poles define different modes of the Congressman's ridiculousness."}, {"text": "The real sinister organization (KKK) and the farcical invented one define the two poles of the scale: actual menace and pure nonsense — positioning the Congressman as partaking of both simultaneously.", "isCorrect": true, "rationale": "The analysis states: 'Mencken positions the Congressman between actual menace and pure nonsense, suggesting that democratic legislation partakes of both.' The KKK is genuinely dangerous; the Knights of Zoroaster are genuinely absurd. The Congressman is suspended between them — not cleanly one or the other."}, {"text": "By inventing a second organization, Mencken avoids potential libel claims while achieving the same rhetorical effect as naming two real dangerous groups.", "isCorrect": false, "rationale": "While the legal point may be historically valid, the analysis focuses on the rhetorical function of the pairing, not on legal caution."}, {"text": "The contrast between 'kleagle' (a harsh consonant word) and 'bow-wow' (a soft childish word) is primarily a sound device — the tonal clash mirrors the ideological clash.", "isCorrect": false, "rationale": "The analysis notes that 'bow-wow' is a child's word for a dog, but the primary analytical point is the conceptual pairing (menace/nonsense), not the sound contrast."}], "id": "q12"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
