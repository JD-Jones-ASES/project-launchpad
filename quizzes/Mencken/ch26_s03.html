<body>
<div class="quiz-container">

        <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 26, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the analysis of Part I: Democratic Man, which rhetorical technique does Mencken utilize to give his derogatory views the appearance of scientific objectivity?", "options": [{"text": "The use of taxonomic metaphors and mock-scientific vocabulary.", "isCorrect": true, "rationale": "Mencken employs terms like 'Homo boobiens' and 'Homo vulgaris' within a taxonomic framework to adopt the detached persona of a clinical naturalist."}, {"text": "The implementation of congeries to create a relentless rhythm of accumulation.", "isCorrect": false, "rationale": "While Mencken uses congeries, this technique is specifically associated with the passionate, angry tone of Part III rather than the objective tone of Part I."}, {"text": "The use of zeugma to link disparate political concepts with biological functions.", "isCorrect": false, "rationale": "Zeugma is identified as a tool that emerges in Part II during the 'prosecutorial' phase of the argument."}, {"text": "The reliance on understatements to diminish the importance of the noble citizen myth.", "isCorrect": false, "rationale": "Part I relies heavily on hyperbole and register mixing; understatement is reserved for the 'withdrawal' strategy in Part IV."}], "id": "q01"}, {"question": "How does Mencken's rhetorical persona evolve between Part I and Part II of 'Notes on Democracy'?", "options": [{"text": "He shifts from an amused, detached naturalist to a rigorous prosecuting attorney.", "isCorrect": true, "rationale": "The text describes Part I as a 'diagnosis' by a clinical observer and Part II as a 'prosecution' building a case against democratic institutions."}, {"text": "He moves from a passionate libertarian to a clinical observer of state functions.", "isCorrect": false, "rationale": "The clinical observer persona appears first in Part I, while the libertarian anger surfaces later in Part III."}, {"text": "He transitions from a satirist using irony to a grim forecaster of political doom.", "isCorrect": false, "rationale": "While he is a satirist, the 'grim forecast' is the specific focus of the Coda in Part IV, not Part II."}, {"text": "He changes from an elitist philosopher to a populist critic of legislative incompetence.", "isCorrect": false, "rationale": "Mencken remains consistently critical of the 'mob' and never adopts a populist perspective."}], "id": "q02"}, {"question": "What is the primary rhetorical function of the 'coinage' of terms like 'Homo boobiens' in Part I?", "options": [{"text": "To reduce a political category to a zoological joke, performing the argument through the word itself.", "isCorrect": true, "rationale": "The text states that these coinages are not ornaments but the argument itself, transforming the citizen into a specimen for mockery."}, {"text": "To provide a rigorous biological framework for understanding modern sociological behavior.", "isCorrect": false, "rationale": "Mencken's use of scientific language is 'mock-scientific' and intended for satire, not actual biological research."}, {"text": "To establish a common ground with the reader through the use of shared academic jargon.", "isCorrect": false, "rationale": "The purpose is 'diagnosis' and distancing the reader from the subject, not establishing professional commonality."}, {"text": "To mask Mencken's lack of logical evidence with impressive-sounding linguistic ornaments.", "isCorrect": false, "rationale": "The text argues that these tools are 'not ornaments applied to the argument; they are the argument'."}], "id": "q03"}, {"question": "In Part II: The Democratic State, what principle does Mencken argue governs democratic institutions?", "options": [{"text": "The mandatory selection of mediocrity and the punishment of ability.", "isCorrect": true, "rationale": "Mencken argues that the democratic state requires incompetence and rewards those who flatter the mob while punishing the able."}, {"text": "The gradual dissolution of the rule of law into a state of total individual liberty.", "isCorrect": false, "rationale": "Mencken views democracy as the enemy of liberty, specifically in Part III, and describes its institutions as structured mediocrity."}, {"text": "The efficient management of resources through the will of the self-governing citizen.", "isCorrect": false, "rationale": "Mencken explicitly dismantles the myth of the self-governing citizen in Part I."}, {"text": "The cyclical transition between demagoguery and meritocratic reform.", "isCorrect": false, "rationale": "Mencken suggests that demagoguery is a permanent fixture of democracy, not a temporary cycle."}], "id": "q04"}, {"question": "Why does Mencken's eruption of direct anger in Part III carry 'enormous force' according to the text?", "options": [{"text": "Because the reader has been conditioned by two parts of sustained irony and mockery.", "isCorrect": true, "rationale": "The tonal shift from irony to anger is effective because the preceding detachment makes the sudden sincerity more impactful."}, {"text": "Because it marks the first time Mencken utilizes complex rhetorical devices like congeries.", "isCorrect": false, "rationale": "He has been using complex devices throughout; it is the change in tone, not the introduction of devices, that provides the force."}, {"text": "Because it provides a practical solution to the 'Puritan impulse' mentioned earlier.", "isCorrect": false, "rationale": "Mencken provides a critique and diagnosis of the impulse, but the text does not mention him offering a practical solution."}, {"text": "Because it aligns Mencken with mainstream political parties for the first time in the book.", "isCorrect": false, "rationale": "The text notes that Mencken's libertarianism is a 'temperamental' trait, not an affiliation with a political party."}], "id": "q05"}, {"question": "Mencken's use of 'congeries' in Part III is characterized by which of the following?", "options": [{"text": "The piling up of examples with a relentless rhythm of accumulation.", "isCorrect": true, "rationale": "Congeries is described as the accumulation of examples to reflect Mencken's darkening tone and direct anger."}, {"text": "The use of short, simple sentences to provide a quiet, devastating effect.", "isCorrect": false, "rationale": "Simplified vocabulary and shorter sentences are the hallmarks of the withdrawal in Part IV, not the congeries in Part III."}, {"text": "The pairing of two words in a single sentence that apply to different meanings.", "isCorrect": false, "rationale": "This describes zeugma, which is introduced as a tool in the prosecutorial Part II."}, {"text": "A mock-scientific classification of the Puritan impulse.", "isCorrect": false, "rationale": "Mock-scientific taxonomy is primarily used in Part I to establish detachment."}], "id": "q06"}, {"question": "How does the author of the excerpt define Mencken's 'libertarianism' in the context of Part III?", "options": [{"text": "A temperamental individualism that regards the state as the natural enemy of freedom.", "isCorrect": true, "rationale": "The text clarifies that Mencken is not a member of a party but an individualist opposed to government interference in private life."}, {"text": "A specific adherence to the economic policies of the Libertarian Party of the 1920s.", "isCorrect": false, "rationale": "The text explicitly states he is not a member of any political party."}, {"text": "A belief that the majority should have the liberty to enforce moral codes like Prohibition.", "isCorrect": false, "rationale": "Mencken argues that the 'mob's' attempt to enforce moralism through democracy is the enemy of true liberty."}, {"text": "The philosophical conviction that democracy is the only system capable of protecting personal rights.", "isCorrect": false, "rationale": "Mencken argues the opposite: that democracy is 'liberty's most dangerous enemy'."}], "id": "q07"}, {"question": "What paradox is identified in the rhetorical strategy of Part IV: Coda?", "options": [{"text": "The quietness and simplified style are more devastating than his earlier denunciation.", "isCorrect": true, "rationale": "The text explains that after the 'fireworks' of earlier parts, the withdrawal into quiet understatement creates a powerful, final effect."}, {"text": "Mencken argues for the destruction of democracy while secretly benefiting from it financially.", "isCorrect": false, "rationale": "The text states he enjoys it because it is 'amusing,' but does not mention financial benefit."}, {"text": "The move from prose to poetry serves to heighten the logical clarity of his argument.", "isCorrect": false, "rationale": "Mencken does not switch to poetry; he simplifies his prose style."}, {"text": "He admits that the 'inferior man' he mocked is actually the source of his own humor.", "isCorrect": false, "rationale": "While he finds democracy amusing, this is presented as a confession of his own enjoyment of the idiotic, not a reversal of his view of the 'inferior man'."}], "id": "q08"}, {"question": "The four-part arc of 'Notes on Democracy' is said to mirror which classical structure?", "options": [{"text": "The structure of a legal case: statement of facts, argument, appeal, and peroration.", "isCorrect": true, "rationale": "The text explicitly compares the four-part arc to a classical legal case and the movements of a symphony."}, {"text": "The Socratic method: question, contradiction, elimination, and definition.", "isCorrect": false, "rationale": "Mencken's work is described as a 'sustained performance' and an arc, not a dialectical dialogue."}, {"text": "A Nietzschean tragedy: birth, conflict, catharsis, and rebirth.", "isCorrect": false, "rationale": "While 'Nietzschean' terms are used, the structural comparison provided is to a legal case or a symphony."}, {"text": "A scientific report: abstract, methodology, results, and conclusion.", "isCorrect": false, "rationale": "Mencken only 'mimics' scientific vocabulary for satirical effect; the overall structure is oratorical/rhetorical."}], "id": "q09"}, {"question": "What does Mencken's 'Last Words' reveal about his personal relationship with democracy?", "options": [{"text": "He finds it incomparably amusing due to its sheer idiocy.", "isCorrect": true, "rationale": "Mencken confesses that he enjoys democracy not because it's effective, but as a source of endless entertainment provided by its foolishness."}, {"text": "He believes it is a necessary evil that must be reformed through better education.", "isCorrect": false, "rationale": "Mencken believes the mob's intellectual limitations make genuine self-government impossible, suggesting reform is futile."}, {"text": "He regrets his earlier harshness and admits that democracy is the best of all bad options.", "isCorrect": false, "rationale": "While he forecasts it will persist because alternatives are worse, his 'Last Words' focus on his personal enjoyment of its absurdity."}, {"text": "He hopes that the 'noble citizen' will eventually reclaim the state from demagogues.", "isCorrect": false, "rationale": "Mencken views the 'noble citizen' as a myth and believes the mob will never surrender the illusion of self-government."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
