<script>
var QUESTIONS = [{"question": "According to Mencken, what is the fundamental fate of an honest and intelligent individual who enters democratic politics?", "options": [{"text": "They eventually overcome initial difficulties to achieve lasting reform.", "isCorrect": false, "rationale": "Mencken explicitly states that such success is 'seldom more than transient' and 'his first term is commonly his last,' contrary to achieving lasting reform."}, {"text": "They are rewarded for their virtues by a discerning public.", "isCorrect": false, "rationale": "The opening statement of the text, and a core thesis, is that an honest man 'is punished for his virtues,' not rewarded."}, {"text": "They are punished for their virtues while the dishonest are rewarded for their vices.", "isCorrect": true, "rationale": "This directly reflects Mencken's core argument: 'he is punished for his virtues, while the fraud beside him is rewarded for his vices.'"}, {"text": "They are largely ignored, making little impact on the system.", "isCorrect": false, "rationale": "Mencken argues they are actively opposed, accused, and driven out, making an impact through their absence and the system's reaction, rather than being simply ignored."}]}, {"question": "Mencken argues that 'party fidelity' in certain states makes it impossible for men of 'genuine dignity and ability' to attain public office. What is the primary reason he gives for this phenomenon?", "options": [{"text": "Such states attract only individuals interested in personal gain, not public service.", "isCorrect": false, "rationale": "While such individuals may exist, Mencken's focus is on how the *system* in these states prevents honorable men from emerging, forcing politicians to 'trim and fawn' rather than discussing issues frankly."}, {"text": "The entrenched loyalty to parties forces politicians to 'trim and fawn,' making integrity unsustainable.", "isCorrect": true, "rationale": "Mencken states, 'Where party fidelity has run strong for years they are barred from public life completely... All of them are men who have trimmed and fawned. All of them are forbidden a frank and competent discussion of most of the principal issues facing the nation.'"}, {"text": "These states lack the intellectual capacity to recognize and support honorable leaders.", "isCorrect": false, "rationale": "Mencken attributes the issue to party fidelity and its impact on political behavior, not explicitly a lack of intellectual capacity among the populace in those states."}, {"text": "Dignified individuals naturally avoid states with strong party systems.", "isCorrect": false, "rationale": "Mencken implies they *cannot* emerge ('none could come out of the Georgia of to-day'), rather than simply choosing to avoid such states."}]}, {"question": "What does Mencken identify as 'something yet worse' than the practical difficulties faced by honorable men in public office?", "options": [{"text": "The inherent corruption within all political parties.", "isCorrect": false, "rationale": "While corruption is a factor Mencken discusses, the 'something yet worse' he highlights is the pervasive assumption about motives, not just the existence of corruption itself."}, {"text": "The superior oratorical skills of dishonest politicians.", "isCorrect": false, "rationale": "Mencken mentions a Senator's oratorical skills overcoming odds, but this is presented as a rare exception, not the 'worst' fundamental problem. The 'worst' is more insidious and applies even to successful honorable men."}, {"text": "The public's inability to grasp the concept of honor, leading to assumptions of venality.", "isCorrect": true, "rationale": "Mencken states, 'But there is something yet worse, and that is the assumption of his cowardice and venality that lies upon even the most honourable man... The mob is quite unable to grasp the concept of honour.'"}, {"text": "The media's constant scrutiny of public figures.", "isCorrect": false, "rationale": "The media's role is discussed later as an *amplifier* of the public's assumptions, but the core issue is the underlying assumption of sordid motives by the mob, which the media then reflects."}]}, {"question": "How does the 'battle over the Eighteenth Amendment' (Prohibition) serve as a critical illustration of Mencken's argument about the public's perception of honorable politicians?", "options": [{"text": "It showed that the public eventually recognized the true motives of the Prohibitionist leaders.", "isCorrect": false, "rationale": "While the corruption of Prohibitionists was later revealed, the initial and more pertinent point Mencken makes is how the public *first* reacted to the false accusations against Prohibition's opponents, leading to their downfall."}, {"text": "It demonstrated how the 'plain people' readily believed baseless accusations of corruption against those who opposed popular measures.", "isCorrect": true, "rationale": "Mencken writes, 'The plain people, unable to imagine a man entering public life with any other motive... reacted to the charges as if they had been proved, and so more than one man of relatively high decency... was driven out of office.' This perfectly illustrates the mob's inability to grasp honor."}, {"text": "It proved that a politician's personal integrity was irrelevant when facing a powerful social movement.", "isCorrect": false, "rationale": "Integrity was highly relevant, as it was precisely what was attacked and undermined by false accusations, making it impossible for honest politicians to survive."}, {"text": "It highlighted the difficulty of enforcing unpopular laws in a democratic society.", "isCorrect": false, "rationale": "The focus of Mencken's example is on the *character assassination* of politicians who dared to speak out, and the public's credulity, not on the general difficulties of law enforcement."}]}, {"question": "Mencken recounts his personal experiences with accusations of being in the pay of various interest groups. What is the primary analytical point he aims to demonstrate with these anecdotes?", "options": [{"text": "The constant threat of libel lawsuits faced by journalists.", "isCorrect": false, "rationale": "While he mentions newspapers being 'forced into elaborate explanations afterward to purge themselves of libel,' the broader and more significant point is the underlying belief that drives such accusations and their acceptance."}, {"text": "The difficulty of maintaining journalistic independence in a corrupt society.", "isCorrect": false, "rationale": "Mencken himself maintained independence, even declining payments. The point isn't his difficulty, but society's *inability to conceive* of his disinterestedness."}, {"text": "The pervasive societal inability to believe that anyone could act out of disinterested public duty.", "isCorrect": true, "rationale": "Mencken explicitly states after describing the brewers' offer, 'It was simply impossible for them, as low-caste Americans, to imagine a man attempting to discharge a public duty disinterestedly; they believed that I had to be paid...'"}, {"text": "The financial temptations that journalists face from powerful organizations.", "isCorrect": false, "rationale": "He describes being offered money but declining it, indicating the point is not the temptation itself, but the 'impossibility' of understanding his refusal to be corrupted."}]}, {"question": "Mencken characterizes the typical American newspaper editor under democracy. Which statement best encapsulates his view of their role and influence?", "options": [{"text": "They serve as a crucial check on political corruption and promote informed public discourse.", "isCorrect": false, "rationale": "This directly contradicts Mencken's description, as he states their influence is 'generally evil' and 'thrown against the public man of dignity and courage'."}, {"text": "Their lack of sound knowledge and obtuseness to honor makes them effective at swaying the 'mob' towards fraudulent ideas.", "isCorrect": true, "rationale": "Mencken states, 'Their very lack of sound knowledge and genuine intelligence gives them a special fitness for influencing the mob, and it is augmented by their happy obtuseness to notions of honour. Their daily toil consists in part of praising men and ideas that are obviously fraudulent...'"}, {"text": "They are generally unbiased reporters who reflect the diverse opinions of the populace.", "isCorrect": false, "rationale": "Mencken describes them as 'adept trimmer and flatterer' who 'voice the ideas of the mob,' indicating a clear bias against integrity."}, {"text": "They are independent thinkers who often challenge the status quo, even if it makes them unpopular.", "isCorrect": false, "rationale": "Mencken claims they 'praise men and ideas that are obviously fraudulent' and 'denounce men and ideas that are respected by their betters,' acting as conformists to the mob's low standards."}]}, {"question": "According to Mencken, what are the two principal 'ideas of the mob' that are voiced by democratic institutions like newspapers, and how do they collectively impact public life?", "options": [{"text": "That competence should be rewarded, and incompetence should be punished, leading to efficient governance.", "isCorrect": false, "rationale": "Mencken explicitly argues the opposite, concluding the section by stating democracy is 'opposed to mere competence' and leading to 'The Cult of Incompetence.'"}, {"text": "That public service is a noble calling, and independent thought is vital, fostering integrity.", "isCorrect": false, "rationale": "This statement represents the antithesis of Mencken's observations, which highlight the mob's inability to comprehend honor or disinterested service."}, {"text": "That a fraud is charming and reassuring, and an honest man is dangerous or nonexistent, thereby eliminating sense and decency from public life.", "isCorrect": true, "rationale": "Mencken states, 'The first of those ideas is that a fraud is somehow charming and reassuring... The second is that an honest and candid man is dangerous—or, perhaps more accurately, that there is no such animal. Thus they give their aid to the sublime democratic process of eliminating all sense and decency from public life.'"}, {"text": "That public figures must be financially disinterested, and personal gain is unacceptable, promoting altruism.", "isCorrect": false, "rationale": "Mencken argues that the mob *assumes* personal gain is the only motive, making it impossible for them to believe in disinterestedness, thus not promoting altruism."}]}, {"question": "When Mencken describes the brewers' surprise at his refusal to accept payment, what deeper aspect of American society is he criticizing?", "options": [{"text": "The inefficiency of the American legal system in prosecuting corruption.", "isCorrect": false, "rationale": "The anecdote is focused on public perception and belief systems, not the legal system's effectiveness."}, {"text": "The cynical belief that all public actions, even journalistic ones, must be motivated by personal financial gain.", "isCorrect": true, "rationale": "He explicitly states, 'It was simply impossible for them, as low-caste Americans, to imagine a man attempting to discharge a public duty disinterestedly; they believed that I had to be paid...'"}, {"text": "The lack of respect for the journalistic profession among business leaders.", "isCorrect": false, "rationale": "While perhaps implied, the central criticism is the inability to conceive of a non-financial motive for public-facing work, which transcends mere 'lack of respect.'"}, {"text": "The widespread financial struggles of American journalists, forcing them to seek outside income.", "isCorrect": false, "rationale": "Mencken is not discussing financial hardship; he is illustrating a societal inability to understand integrity and disinterested public service."}]}, {"question": "Mencken concludes by referencing Emile Faguet's 'The Cult of Incompetence.' What is the central observation about democratic public service that this reference reinforces?", "options": [{"text": "Democracy naturally elevates individuals with exceptional technical skills to positions of power.", "isCorrect": false, "rationale": "Mencken argues precisely the opposite: 'The democratic process, indeed, is furiously inimical to all honourable motives. It favors the man who is without them... Going further, it is even opposed to mere competence.'"}, {"text": "The public service becomes a haven for individuals lacking ability, where self-interest supersedes effective governance.", "isCorrect": true, "rationale": "Mencken quotes Faguet: 'Under democracy... the public service becomes a mere refuge for prehensile morons—get yours, and run.' This aligns with the idea of incompetence and self-interest dominating."}, {"text": "Democratic systems are inherently designed to prevent the rise of highly competent, but potentially autocratic, leaders.", "isCorrect": false, "rationale": "The text focuses on the system's opposition to competence due to internal dynamics (fellows becoming enemies, suspicion from democrats), not as a deliberate design to prevent autocracy."}, {"text": "Competence is highly valued in public servants, but often misunderstood by the electorate.", "isCorrect": false, "rationale": "Mencken states that competence creates 'implacable enemies' and leads to being 'viewed with suspicion by the great mass of democrats,' indicating it is actively *not* valued."}]}, {"question": "Based on Mencken's overall critique, if a politician were to propose a policy based solely on rigorous factual analysis and long-term public benefit, how would he likely predict the public and media response?", "options": [{"text": "Such a policy would be universally lauded for its intellectual rigor and foresight.", "isCorrect": false, "rationale": "This contradicts Mencken's entire thesis, which suggests that the public and media are largely incapable of appreciating intellectual rigor or disinterested motives."}, {"text": "The policy would be evaluated fairly on its merits, leading to an informed public debate.", "isCorrect": false, "rationale": "Mencken portrays the media as lacking 'sound knowledge and genuine intelligence' and the mob as unable to grasp honor, making a fair evaluation unlikely."}, {"text": "The politician would likely be accused of having hidden, self-serving motives or being manipulated by special interests, with the media potentially amplifying such accusations.", "isCorrect": true, "rationale": "Mencken repeatedly states that 'acts of a public man of genuine rectitude are almost always ascribed, under democracy, to sordid and degrading motives.' He also describes the media's role in praising fraud and denouncing integrity, reinforcing such accusations."}, {"text": "The proposal would only succeed if the politician was also an exceptionally charismatic orator, regardless of its content.", "isCorrect": false, "rationale": "While oratory might provide a temporary advantage in rare cases (like the Senator in Missouri), Mencken argues that the underlying societal cynicism about motives is a 'more potent' barrier, even for talented individuals, making success based 'solely' on oratory improbable and transient."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
