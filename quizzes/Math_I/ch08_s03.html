<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 8, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which algebraic expression correctly represents \"the sum of a number $x$ and $8$\"?", "options": [{"text": "$x - 8$", "isCorrect": false, "rationale": "The phrase 'sum of' indicates addition, not subtraction."}, {"text": "$x + 8$", "isCorrect": true, "rationale": "The phrase 'the sum of' correctly translates to addition, combining the number $x$ and $8$."}, {"text": "$8x$", "isCorrect": false, "rationale": "This expression represents '8 times a number x' or 'the product of 8 and x', not their sum."}, {"text": "$x/8$", "isCorrect": false, "rationale": "This expression represents 'a number x divided by 8', not their sum."}]}, {"question": "Translate \"a number $y$ divided by $7$\" into an algebraic expression.", "options": [{"text": "$7 - y$", "isCorrect": false, "rationale": "This expression represents '7 less than a number y' or 'y subtracted from 7', not division."}, {"text": "$7y$", "isCorrect": false, "rationale": "This expression represents '7 times a number y' or 'the product of 7 and y', not division."}, {"text": "$y/7$", "isCorrect": true, "rationale": "The phrase 'divided by' correctly translates to a division operation, with $y$ being the dividend and $7$ the divisor."}, {"text": "$y + 7$", "isCorrect": false, "rationale": "This expression represents 'y more than 7' or 'the sum of y and 7', not division."}]}, {"question": "Select the correct algebraic expression for \"$12$ less than a number $m$\".", "options": [{"text": "$12 - m$", "isCorrect": false, "rationale": "According to the section, phrases like 'less than' reverse the order. This expression would translate to 'm less than 12'."}, {"text": "$m - 12$", "isCorrect": true, "rationale": "The section explicitly states that 'less than' reverses the order, so '12 less than m' means $m$ is reduced by $12$."}, {"text": "$12m$", "isCorrect": false, "rationale": "This expression represents '12 times a number m', not subtraction."}, {"text": "$m/12$", "isCorrect": false, "rationale": "This expression represents 'a number m divided by 12', not subtraction."}]}, {"question": "Which of the following phrases typically signals the operation of multiplication in an algebraic expression?", "options": [{"text": "More than", "isCorrect": false, "rationale": "'More than' signals addition."}, {"text": "Less than", "isCorrect": false, "rationale": "'Less than' signals subtraction."}, {"text": "Times", "isCorrect": true, "rationale": "The example '6 times a number n' clearly shows 'times' signals multiplication."}, {"text": "Divided by", "isCorrect": false, "rationale": "'Divided by' signals division."}]}, {"question": "Write an algebraic expression for \"four more than three times a number $k$\".", "options": [{"text": "$4k + 3$", "isCorrect": false, "rationale": "This expression means 'three more than four times a number k', reversing the roles of 3 and 4."}, {"text": "$3(k + 4)$", "isCorrect": false, "rationale": "This expression means 'three times the sum of k and 4', which is different from 'four more than three times k'."}, {"text": "$3k + 4$", "isCorrect": true, "rationale": "First, 'three times a number k' translates to $3k$. Then, 'four more than' indicates adding $4$ to that product, resulting in $3k + 4$."}, {"text": "$k + 3 + 4$", "isCorrect": false, "rationale": "This expression represents 'a number k plus three plus four', which does not reflect 'three times' or 'four more than' appropriately."}]}, {"question": "Which expression represents \"$9$ less than half of a number $p$\"?", "options": [{"text": "$9 - (p/2)$", "isCorrect": false, "rationale": "The phrase 'less than' reverses the order. This expression translates to 'half of a number p less than 9'."}, {"text": "$(p/2) - 9$", "isCorrect": true, "rationale": "First, 'half of a number p' translates to $p/2$. Then, '9 less than' means subtracting $9$ from that quantity, respecting the order reversal rule."}, {"text": "$9p/2$", "isCorrect": false, "rationale": "This expression represents 'nine times half of a number p' or 'nine p divided by two', which involves multiplication and division, not subtraction as indicated by 'less than'."}, {"text": "$2p - 9$", "isCorrect": false, "rationale": "This expression represents '9 less than twice a number p', incorrectly translating 'half of' as 'twice'."}]}, {"question": "A cell phone plan costs a base fee of $20 per month plus an additional $0.05 for each text message sent. If $t$ represents the number of text messages, which expression correctly represents the total monthly cost?", "options": [{"text": "$20t + 0.05$", "isCorrect": false, "rationale": "This incorrectly applies the variable $t$ to the base fee instead of the cost per text message."}, {"text": "$0.05t + 20$", "isCorrect": true, "rationale": "'$0.05$ for each text message' implies $0.05$ multiplied by $t$, and 'plus a base fee of $20$' indicates addition of $20$ to that product, similar to the Rosa earnings example."}, {"text": "$(20 + 0.05)t$", "isCorrect": false, "rationale": "This expression would imply that both the base fee and the per-text cost are multiplied by the number of texts, which is incorrect."}, {"text": "$20 - 0.05t$", "isCorrect": false, "rationale": "This expression incorrectly represents a reduction from the base fee, rather than an additional charge."}]}, {"question": "Following the previous scenario, if a customer's total monthly bill was $28.50, which equation correctly represents this situation to find the number of text messages ($t$) sent?", "options": [{"text": "$0.05t - 20 = 28.50$", "isCorrect": false, "rationale": "This equation incorrectly subtracts the base fee and implies the per-text cost is less than the total."}, {"text": "$20t + 0.05 = 28.50$", "isCorrect": false, "rationale": "This equation incorrectly applies the variable $t$ to the base fee instead of the cost per text message."}, {"text": "$0.05t + 20 = 28.50$", "isCorrect": true, "rationale": "Based on the expression for total cost ($0.05t + 20$), setting it equal to the known total bill ($28.50$) forms the correct equation, mirroring the example of setting up an equation for Rosa's earnings."}, {"text": "$t/0.05 + 20 = 28.50$", "isCorrect": false, "rationale": "This equation incorrectly uses division instead of multiplication for the cost per text message."}]}, {"question": "Consider the phrases \"a number $x$ less than $10$\" and \"$10$ less than a number $x$\". How do their algebraic expressions differ?", "options": [{"text": "They are both $x - 10$.", "isCorrect": false, "rationale": "This is incorrect. The order reversal rule for 'less than' means these phrases translate differently."}, {"text": "They are both $10 - x$.", "isCorrect": false, "rationale": "This is incorrect. The order reversal rule applies differently to each phrase."}, {"text": "The first is $10 - x$, and the second is $x - 10$.", "isCorrect": true, "rationale": "The section clearly explains the order reversal for 'less than' with examples: 'n less than 4' is $4 - n$ and '4 less than n' is $n - 4$. Applying this, 'x less than 10' means $10 - x$, and '10 less than x' means $x - 10$."}, {"text": "The first is $x - 10$, and the second is $10 - x$.", "isCorrect": false, "rationale": "This option incorrectly swaps the expressions. The phrase 'A less than B' means $B - A$."}]}, {"question": "What is the primary purpose of learning to translate words into algebraic expressions, as described in this section?", "options": [{"text": "To memorize mathematical vocabulary.", "isCorrect": false, "rationale": "While vocabulary is involved, the primary goal is not just memorization but application."}, {"text": "To simplify complex English sentences.", "isCorrect": false, "rationale": "The goal is to translate to a mathematical language, not necessarily to simplify the English itself."}, {"text": "To convert real-world situations into a mathematical language for analysis and problem-solving.", "isCorrect": true, "rationale": "The section introduces algebra as a language for translation and provides an example of setting up an equation from a word problem, directly supporting the idea of using algebra for problem-solving."}, {"text": "To practice identifying synonyms for mathematical operations.", "isCorrect": false, "rationale": "Identifying keywords is a step, but not the ultimate purpose. The purpose extends to forming solvable expressions and equations."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
