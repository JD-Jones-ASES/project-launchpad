<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 5, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the key idea emphasized in the section for successfully dividing decimals?", "options": [{"text": "To always round decimals before dividing to simplify the calculation.", "isCorrect": false, "rationale": "The text does not mention rounding decimals as a key idea for dividing. The focus is on making the divisor a whole number."}, {"text": "To convert both the dividend and divisor into fractions before performing division.", "isCorrect": false, "rationale": "The section describes a process of moving decimal points, not converting to fractions, to divide decimals."}, {"text": "To make the divisor a whole number by moving the decimal point.", "isCorrect": true, "rationale": "The section explicitly states, 'The key idea is to make the divisor a whole number by moving the decimal point.'"}, {"text": "To ensure the dividend is always larger than the divisor.", "isCorrect": false, "rationale": "While often true, this is not the key procedural idea for dividing decimals as outlined in the text. The process works regardless of the initial relative size of the numbers."}]}, {"question": "In the division problem $6.4 \\div 2 = 3.2$, identify the dividend, divisor, and quotient.", "options": [{"text": "Dividend: 2, Divisor: 6.4, Quotient: 3.2", "isCorrect": false, "rationale": "This swaps the dividend and divisor. The dividend is the number being divided, and the divisor is the number you divide by."}, {"text": "Dividend: 6.4, Divisor: 2, Quotient: 3.2", "isCorrect": true, "rationale": "According to the keyterm definitions, the dividend is the number being divided (6.4), the divisor is the number you divide by (2), and the quotient is the result (3.2)."}, {"text": "Dividend: 3.2, Divisor: 6.4, Quotient: 2", "isCorrect": false, "rationale": "This misidentifies all three terms relative to their positions in the original problem."}, {"text": "Dividend: 6.4, Divisor: 3.2, Quotient: 2", "isCorrect": false, "rationale": "This misidentifies the divisor and quotient. The divisor is the number used to divide, and the quotient is the result."}]}, {"question": "When dividing a decimal by a whole number, what is the correct placement for the decimal point in the quotient?", "options": [{"text": "It is placed after the last digit of the quotient.", "isCorrect": false, "rationale": "This is incorrect; the decimal point's position is critical and is not arbitrarily placed at the end."}, {"text": "It is placed directly above the decimal point in the dividend.", "isCorrect": true, "rationale": "The property 'Dividing a Decimal by a Whole Number' states: 'Place the decimal point in the quotient directly above the decimal point in the dividend.'"}, {"text": "It is moved to the left one place for each digit in the whole number divisor.", "isCorrect": false, "rationale": "This rule applies to dividing by powers of 10, not generally for dividing by any whole number."}, {"text": "It is moved to the right until the quotient is a whole number.", "isCorrect": false, "rationale": "This would change the value of the quotient and is not a step in the division process."}]}, {"question": "To correctly find the quotient of $7.56 \\div 0.6$, what equivalent division problem should be solved?", "options": [{"text": "$0.756 \\div 6$", "isCorrect": false, "rationale": "This moves the decimal point in the dividend to the left, which is incorrect. Both must move right."}, {"text": "$75.6 \\div 6$", "isCorrect": true, "rationale": "The divisor $0.6$ has one decimal place. Moving the decimal point one place to the right in both the divisor (to $6$) and the dividend (to $75.6$) creates an equivalent problem, as shown in the example."}, {"text": "$756 \\div 6$", "isCorrect": false, "rationale": "This moves the decimal point two places to the right in the dividend, while only one in the divisor, thus changing the value of the quotient."}, {"text": "$7.56 \\div 6$", "isCorrect": false, "rationale": "This only moves the decimal point in the divisor, not in the dividend, which is explicitly warned against in the caution section."}]}, {"question": "A student calculated $9.6 \\div 0.3$ by first changing the divisor to a whole number, resulting in $3$. They then performed $9.6 \\div 3$, getting an incorrect answer of $3.2$. What crucial step did they miss, according to the textbook's caution?", "options": [{"text": "They forgot to annex zeros in the dividend if needed to continue dividing.", "isCorrect": false, "rationale": "Annexing zeros is for extending division, not for setting up the problem when dividing by a decimal, nor would it fix this specific error."}, {"text": "They did not place the decimal point in the quotient directly above the dividend.", "isCorrect": false, "rationale": "The issue here is the setup of the numbers for division, not the placement of the decimal in the quotient relative to an unadjusted dividend."}, {"text": "They failed to move the decimal point in the dividend the same number of places to the right as in the divisor.", "isCorrect": true, "rationale": "The caution states: 'When you move the decimal point in the divisor, you must move it the same number of places in the dividend.' The student moved $0.3$ to $3$ (one place right), but failed to move $9.6$ to $96$, leading to the wrong problem $9.6 \\div 3$ instead of $96 \\div 3$."}, {"text": "They moved the decimal point in the divisor too many places to the right.", "isCorrect": false, "rationale": "Moving the decimal point one place to the right in $0.3$ to make it $3$ is the correct action for the divisor."}]}, {"question": "What is the result of dividing $45.2$ by $1,000$?", "options": [{"text": "$452$", "isCorrect": false, "rationale": "This would be the result of multiplying by 10, not dividing by 1,000."}, {"text": "$0.452$", "isCorrect": false, "rationale": "This is the result of dividing by 100, moving the decimal two places left."}, {"text": "$0.0452$", "isCorrect": true, "rationale": "When dividing by $1,000$, the decimal point moves three places to the left. $45.2 \\rightarrow 0.0452$."}, {"text": "$4.52$", "isCorrect": false, "rationale": "This is the result of dividing by 10, moving the decimal one place left."}]}, {"question": "Four friends share a restaurant bill of $53.80 equally. How much does each person pay?", "options": [{"text": "$1.345", "isCorrect": false, "rationale": "This would imply dividing by 40, or making an error in decimal placement."}, {"text": "$134.50", "isCorrect": false, "rationale": "This would be the result of multiplying, not dividing."}, {"text": "$13.45", "isCorrect": true, "rationale": "This is an application of dividing a decimal by a whole number: $53.80 \\div 4 = 13.45$, as shown in the 'Splitting a Cost' example."}, {"text": "$53.80", "isCorrect": false, "rationale": "This would mean no division occurred, and each person pays the full bill."}]}, {"question": "Which of the following statements about checking a division answer is correct according to the summary?", "options": [{"text": "Add the quotient and the divisor to see if it equals the dividend.", "isCorrect": false, "rationale": "Addition is not the inverse operation for division; this method would not reliably check the answer."}, {"text": "Subtract the quotient from the dividend to see if it equals the divisor.", "isCorrect": false, "rationale": "Subtraction is not the inverse operation for division; this method would not reliably check the answer."}, {"text": "Divide the dividend by the quotient to see if it equals the divisor.", "isCorrect": false, "rationale": "While true, this is a rearrangement of the division problem itself, not the standard method taught to 'check your answer' after finding a quotient."}, {"text": "Multiply the quotient by the divisor to check if it equals the dividend.", "isCorrect": true, "rationale": "The 'Dividing Decimals Summary' states: 'Multiply the quotient by the divisor to check your answer.'"}]}, {"question": "A recipe calls for $3.225$ kilograms of flour. If you want to make batches that each use $0.25$ kilograms, how many batches can you make?", "options": [{"text": "$1.29$ batches", "isCorrect": false, "rationale": "This result would occur if the decimal point in the dividend was moved one place left instead of two places right ($3.225 \\div 2.5$). The correct answer should be 12.9."}, {"text": "$12.9$ batches", "isCorrect": true, "rationale": "This is the solution to $3.225 \\div 0.25$. To solve, move the decimal two places right in both numbers: $322.5 \\div 25 = 12.9$, as confirmed by the checkpoint example."}, {"text": "$0.129$ batches", "isCorrect": false, "rationale": "This implies a significant error in decimal placement or calculation (e.g., $32.25 \\div 250$). The result should be larger than 1."}, {"text": "$129$ batches", "isCorrect": false, "rationale": "This result would occur if there was an error in moving the decimal for the dividend, such as $3225 \\div 25$ instead of $322.5 \\div 25$."}]}, {"question": "Which of the following divisions would result in the decimal point being moved 2 places to the left in the dividend?", "options": [{"text": "Dividing by 10", "isCorrect": false, "rationale": "Dividing by 10 moves the decimal point 1 place to the left."}, {"text": "Dividing by 100", "isCorrect": true, "rationale": "The property 'Dividing by Powers of 10' states: 'When you divide a decimal by a power of 10, move the decimal point to the left one place for each zero in the power of ten.' 100 has two zeros, so the decimal moves 2 places left."}, {"text": "Dividing by 1,000", "isCorrect": false, "rationale": "Dividing by 1,000 moves the decimal point 3 places to the left."}, {"text": "Dividing by a decimal, such as 0.01", "isCorrect": false, "rationale": "When dividing by a decimal, the decimal points are moved to the right in both the divisor and dividend to make the divisor a whole number."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
