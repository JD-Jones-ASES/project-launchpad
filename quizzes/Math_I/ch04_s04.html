<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 4, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the *first* essential step when dividing mixed numbers?", "options": [{"text": "Find the reciprocal of the divisor.", "isCorrect": false, "rationale": "Finding the reciprocal is a later step, performed only after converting to improper fractions. Attempting to find the reciprocal of a mixed number directly is a common error."}, {"text": "Convert all mixed numbers to improper fractions.", "isCorrect": true, "rationale": "According to the 'Dividing Mixed Numbers' property and 'Key Concept' summary, converting all mixed numbers to improper fractions is the very first and crucial step before proceeding with the division as multiplication."}, {"text": "Cross cancel common factors.", "isCorrect": false, "rationale": "Cross-cancellation occurs after converting to improper fractions and rewriting the division as multiplication by the reciprocal."}, {"text": "Multiply the numerators and denominators.", "isCorrect": false, "rationale": "Multiplying numerators and denominators is one of the final steps, done after converting, taking the reciprocal, and cross-canceling."}]}, {"question": "Why does the 'Caution' note explicitly state, 'Always convert to improper fractions before flipping. Do not try to find the reciprocal of a mixed number directly'?", "options": [{"text": "Because mixed numbers cannot be multiplied by fractions.", "isCorrect": false, "rationale": "Mixed numbers can be multiplied after conversion, but this is not the reason for the caution about reciprocals."}, {"text": "Because there is no shortcut or direct method to correctly find the reciprocal of a mixed number in its mixed form.", "isCorrect": true, "rationale": "The text explicitly states 'there is no shortcut for that,' meaning you must first convert the mixed number to an improper fraction before finding its reciprocal to ensure mathematical correctness."}, {"text": "Because improper fractions are always smaller than mixed numbers, making calculations easier.", "isCorrect": false, "rationale": "Improper fractions are numerically equivalent to mixed numbers, not smaller. This statement is factually incorrect and not the reason for the caution."}, {"text": "Because cross-cancellation is only possible with improper fractions, not mixed numbers.", "isCorrect": false, "rationale": "While cross-cancellation is performed with improper fractions, the primary reason for the caution is the incorrectness of directly flipping a mixed number, not solely about cross-cancellation."}]}, {"question": "Divide: \\(2\\,13 \\div 79\\)", "options": [{"text": "3", "isCorrect": true, "rationale": "Convert \\(2\\,13\\) to an improper fraction: \\(73\\). The problem becomes \\(73 \\div 79\\). Multiply by the reciprocal of the divisor: \\(73 \\times 97\\). Cross-cancel the 7s and cross-cancel 3 and 9 (to 1 and 3). This results in \\(11 \\times 31 = 3\\)."}, {"text": "\\(2\\,13\\)", "isCorrect": false, "rationale": "This is the original dividend, not the result of the division."}, {"text": "\\(4\\,13\\)", "isCorrect": false, "rationale": "This result suggests an error in calculation, likely with cross-cancellation or multiplication."}, {"text": "\\(1\\,17\\)", "isCorrect": false, "rationale": "This result suggests an error in calculation, possibly by not taking the reciprocal correctly or by incorrect simplification."}]}, {"question": "Divide: \\(3\\,34 \\div 1\\,18\\)", "options": [{"text": "\\(3\\,13\\)", "isCorrect": true, "rationale": "Convert both mixed numbers to improper fractions: \\(3\\,34 = 154\\) and \\(1\\,18 = 98\\). The problem becomes \\(154 \\div 98\\). Multiply by the reciprocal of the divisor: \\(154 \\times 89\\). Cross-cancel 4 and 8 (to 1 and 2) and cross-cancel 15 and 9 (to 5 and 3). This results in \\(51 \\times 23 = 103\\), which simplifies to \\(3\\,13\\)."}, {"text": "3", "isCorrect": false, "rationale": "This indicates an error in calculation, likely during cross-cancellation or final simplification."}, {"text": "\\(2\\,12\\)", "isCorrect": false, "rationale": "This indicates an error in calculation, possibly with the reciprocal or cross-cancellation."}, {"text": "4", "isCorrect": false, "rationale": "This indicates a significant error in the division process."}]}, {"question": "Consider the division: \\(5\\,15 \\div 1\\,13\\). After converting to improper fractions and rewriting as multiplication by the reciprocal, which expression correctly shows the setup for further calculation?", "options": [{"text": "\\(265 \\times 34\\)", "isCorrect": true, "rationale": "First, convert \\(5\\,15\\) to \\(265\\) and \\(1\\,13\\) to \\(43\\). Then, rewrite the division \\(265 \\div 43\\) as multiplication by the reciprocal of the divisor: \\(265 \\times 34\\)."}, {"text": "\\(265 \\times 43\\)", "isCorrect": false, "rationale": "This option incorrectly multiplies by the divisor itself, rather than its reciprocal."}, {"text": "\\(245 \\times 43\\)", "isCorrect": false, "rationale": "This option contains an incorrect conversion of \\(5\\,15\\) to \\(245\\) and incorrectly multiplies by the divisor instead of its reciprocal."}, {"text": "\\(265 \\times 32\\)", "isCorrect": false, "rationale": "This option correctly converts the dividend and takes the reciprocal of the divisor, but the reciprocal is incorrect (it should be 3/4, not 3/2)."}]}, {"question": "A baker has \\(7\\,12\\) pounds of dough. If each loaf of bread requires \\(1\\,14\\) pounds of dough, which expression correctly represents the number of loaves that can be made?", "options": [{"text": "\\(7\\,12 \\times 1\\,14\\)", "isCorrect": false, "rationale": "Multiplying these values would not give the number of loaves; it would result in a much larger, irrelevant quantity."}, {"text": "\\(7\\,12 - 1\\,14\\)", "isCorrect": false, "rationale": "Subtracting would tell you how much dough is left after making one loaf, not the total number of loaves that can be made."}, {"text": "\\(7\\,12 \\div 1\\,14\\)", "isCorrect": true, "rationale": "To find out how many times a smaller quantity (dough per loaf) fits into a larger quantity (total dough), you must divide the total quantity by the amount per unit."}, {"text": "\\(1\\,14 \\div 7\\,12\\)", "isCorrect": false, "rationale": "This expression would tell you what fraction of a loaf is made from 1 pound of dough, which is the inverse of what the question asks."}]}, {"question": "A rope is \\(10\\,12\\) feet long. If it is cut into pieces that are each \\(1\\,13\\) feet long, how many *full* pieces can be cut?", "options": [{"text": "7", "isCorrect": true, "rationale": "First, set up the division: \\(10\\,12 \\div 1\\,13\\). Convert to improper fractions: \\(212 \\div 43\\). Multiply by the reciprocal: \\(212 \\times 34\\). This equals \\(638\\). As a mixed number, this is \\(7\\,78\\). Since the question asks for 'full pieces,' we round down to the nearest whole number, which is 7."}, {"text": "8", "isCorrect": false, "rationale": "This would be an incorrect rounding up, as there isn't enough rope for an 8th full piece. \\(7\\,78\\) is closer to 8, but the problem specifies 'full pieces'."}, {"text": "\\(7\\,34\\)", "isCorrect": false, "rationale": "This is not the correct exact answer, nor is it the correct number of full pieces. The exact answer is \\(7\\,78\\)."}, {"text": "\\(8\\,14\\)", "isCorrect": false, "rationale": "This is an incorrect calculation and an incorrect interpretation of 'full pieces'."}]}, {"question": "After performing the division of mixed numbers and obtaining an improper fraction as the result, what is the best practice for the final answer?", "options": [{"text": "Always leave it as an improper fraction.", "isCorrect": false, "rationale": "While mathematically correct, it's generally good practice to convert improper fractions to mixed numbers for clarity, especially in context."}, {"text": "Always convert it back to a mixed number.", "isCorrect": false, "rationale": "While often preferred, the text specifies that in word problems, the context might require rounding or a whole number, not always an exact mixed number."}, {"text": "Simplify the fraction if possible, then decide whether to convert to a mixed number or round based on the problem's context.", "isCorrect": true, "rationale": "The 'Key Concept' summary states, 'In word problems, decide whether to round or keep the exact answer based on the context,' and simplifying is always a necessary step. Converting to a mixed number is often done for clarity if not rounding."}, {"text": "Multiply by the original divisor to check the answer.", "isCorrect": false, "rationale": "Multiplying to check is a good habit for verification, but it is not the final step for presenting the answer."}]}, {"question": "A student wants to divide \\(3\\,12\\) by \\(1\\,34\\). They correctly convert \\(3\\,12\\) to \\(72\\) but then write the expression as \\(72 \\times 43\\). What mistake did the student make?", "options": [{"text": "They incorrectly converted \\(1\\,34\\) to an improper fraction.", "isCorrect": false, "rationale": "The improper fraction for \\(1\\,34\\) is \\(74\\), so \\(43\\) would be the incorrect reciprocal. Their error isn't in converting to improper fraction itself, but in deriving the reciprocal."}, {"text": "They forgot to cross cancel before multiplying.", "isCorrect": false, "rationale": "Cross-cancellation happens *after* setting up the multiplication by the reciprocal, not before. The error is in the setup of the reciprocal itself."}, {"text": "They incorrectly took the reciprocal of \\(1\\,34\\).", "isCorrect": true, "rationale": "The improper fraction for \\(1\\,34\\) is \\(74\\). The reciprocal of \\(74\\) should be \\(47\\). The student used \\(43\\), indicating an error in finding the reciprocal of the improper fraction."}, {"text": "They should have multiplied by \\(1\\,34\\) directly, not its reciprocal.", "isCorrect": false, "rationale": "Division is performed by multiplying by the reciprocal of the divisor, so this statement is incorrect."}]}, {"question": "Which of the following scenarios best demonstrates the application of dividing mixed numbers as outlined in the section?", "options": [{"text": "Calculating the total amount of ingredients needed for multiple batches of a recipe.", "isCorrect": false, "rationale": "This scenario typically involves multiplication, not division, to find a total from unit amounts."}, {"text": "Determining how many equal smaller portions can be made from a larger quantity of material.", "isCorrect": true, "rationale": "This is a classic 'sharing equally' or 'measurement division' problem, directly aligning with the word problems presented in the section (e.g., sharing trail mix, cutting ribbon)."}, {"text": "Finding the difference between two quantities of different sizes.", "isCorrect": false, "rationale": "Finding the difference between quantities involves subtraction."}, {"text": "Combining several different fractional quantities into a single total.", "isCorrect": false, "rationale": "Combining quantities typically involves addition, not division."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
