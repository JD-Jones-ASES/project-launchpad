    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 3, Section 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Add $3\\,1/2 + 1\\,2/5$.", "options": [{"text": "$4\\,3/7$", "isCorrect": false, "rationale": "This option incorrectly adds the numerators and denominators without first finding a common denominator for the fractions."}, {"text": "$4\\,9/10$", "isCorrect": true, "rationale": "To add $3\\,1/2 + 1\\,2/5$, first find the LCD of $2$ and $5$, which is $10$. Rewrite the fractions as $3\\,5/10 + 1\\,4/10$. Add the whole numbers $(3+1=4)$ and the fractions $(5/10+4/10=9/10)$. The result is $4\\,9/10$. The fraction part is proper and simplified."}, {"text": "$5\\,1/10$", "isCorrect": false, "rationale": "This option likely resulted from an error in converting an improper fraction or an addition error in the whole numbers, possibly if the sum of fractions was incorrectly carried over."}, {"text": "$4\\,9/7$", "isCorrect": false, "rationale": "This option incorrectly adds the numerators and denominators without finding a common denominator, and does not simplify an improper fraction part."}]}, {"question": "When subtracting mixed numbers, why is borrowing sometimes necessary?", "options": [{"text": "To make the denominators common.", "isCorrect": false, "rationale": "Finding a common denominator is done regardless of borrowing needs, to allow subtraction of fraction parts, not to enable borrowing itself."}, {"text": "To ensure the fraction part being subtracted is smaller than or equal to the fraction part it's subtracted from.", "isCorrect": true, "rationale": "Borrowing is necessary when the fraction part of the number you are subtracting from is smaller than the fraction part being subtracted. By borrowing '1' from the whole number and adding it to the fraction, you increase the first fraction's value, making the subtraction possible without resulting in a negative fraction."}, {"text": "To convert the mixed numbers into improper fractions.", "isCorrect": false, "rationale": "Converting to improper fractions is an alternative method to adding/subtracting mixed numbers; it's not the reason for borrowing in the standard mixed number subtraction method."}, {"text": "To simplify the final fraction.", "isCorrect": false, "rationale": "Simplification is the final step after the subtraction is complete, and is unrelated to the need for borrowing during the process."}]}, {"question": "Evaluate $7\\,1/4 - 3\\,2/3$.", "options": [{"text": "$4\\,7/12$", "isCorrect": false, "rationale": "This option suggests a calculation error, possibly in borrowing or subtracting the fraction parts after borrowing."}, {"text": "$3\\,7/12$", "isCorrect": true, "rationale": "First, find the LCD of $4$ and $3$, which is $12$. Rewrite as $7\\,3/12 - 3\\,8/12$. Since $3/12 < 8/12$, borrow $1$ from $7$, making it $6$. Add the borrowed $1$ (as $12/12$) to $3/12$, resulting in $6\\,15/12$. Now subtract: $6\\,15/12 - 3\\,8/12 = (6-3)\\,(15/12 - 8/12) = 3\\,7/12$. The fraction $7/12$ is proper and simplified."}, {"text": "$4\\,5/12$", "isCorrect": false, "rationale": "This option indicates a likely error in the whole number subtraction or an incorrect borrowing step. For example, if borrowing was correctly performed, $6-3=3$, not $4$ for the whole number part."}, {"text": "$3\\,1/12$", "isCorrect": false, "rationale": "This option results from a significant error in the subtraction of the fraction parts after borrowing. $15/12 - 8/12 = 7/12$, not $1/12$."}]}, {"question": "After adding the fraction parts of two mixed numbers, if the resulting fraction is $17/12$, what is the next step according to the procedure for adding mixed numbers?", "options": [{"text": "Simplify $17/12$ to $1\\,5/12$ and add $1$ to the whole number sum.", "isCorrect": true, "rationale": "The procedure states that if the fraction part is improper, you must convert it to a mixed number ($17/12 = 1\\,5/12$) and add the extra whole number (the '1') to the sum of the whole number parts."}, {"text": "Leave $17/12$ as is and combine it with the whole number sum.", "isCorrect": false, "rationale": "A mixed number must always have a proper fraction part. Leaving $17/12$ as an improper fraction is incorrect for the final answer."}, {"text": "Convert both original mixed numbers to improper fractions before adding.", "isCorrect": false, "rationale": "This is an alternative method for adding mixed numbers, not the next step when you already have an improper fraction as the sum of the fraction parts using the standard method."}, {"text": "Subtract $12/12$ from $17/12$ and add $1$ to the whole number, but then don't add the remaining $5/12$.", "isCorrect": false, "rationale": "This would incorrectly discard the remaining fraction part, leading to an incorrect total. The entire mixed number resulting from the improper fraction must be incorporated."}]}, {"question": "How would you correctly rewrite $8$ to subtract $3\\,5/8$?", "options": [{"text": "$7\\,1/8$", "isCorrect": false, "rationale": "This is incorrect. $7\\,1/8$ equals $7 + 1/8$, not $8$. When borrowing from a whole number, you replace the whole number with one less and the fraction with the common denominator over itself (representing the borrowed '1')."}, {"text": "$8\\,8/8$", "isCorrect": false, "rationale": "This expression equals $8+1=9$, not $8$. You need to 'borrow' from the whole number, reducing its value by one."}, {"text": "$7\\,8/8$", "isCorrect": true, "rationale": "To subtract a mixed number from a whole number, you 'borrow' $1$ from the whole number, reducing it by one (e.g., $8$ becomes $7$). That borrowed $1$ is then written as a fraction with the common denominator over itself (e.g., $8/8$). So, $8 = 7 + 8/8 = 7\\,8/8$."}, {"text": "$6\\,16/8$", "isCorrect": false, "rationale": "This expression equals $6+2=8$, but it's an unnecessarily complex way to rewrite the number $8$ for subtraction and not the standard method shown in the text. It also implies borrowing '2' which is not standard when only one whole is needed to form a fraction part."}]}, {"question": "What is the primary purpose of finding the Least Common Denominator (LCD) when adding or subtracting mixed numbers?", "options": [{"text": "To simplify the final fraction part.", "isCorrect": false, "rationale": "Simplification is a separate step performed at the end. While using the LCD can make the final fraction easier to simplify, it's not the primary purpose of finding it."}, {"text": "To allow the whole number parts to be added or subtracted easily.", "isCorrect": false, "rationale": "Whole number parts are added or subtracted independently and do not require the LCD for their operation."}, {"text": "To ensure the fraction parts can be combined directly by adding or subtracting numerators.", "isCorrect": true, "rationale": "Fractions can only be added or subtracted directly if they have the same denominator. The LCD provides the smallest common denominator, allowing the numerators to be combined accurately."}, {"text": "To determine if borrowing is necessary.", "isCorrect": false, "rationale": "Borrowing is determined by comparing the sizes of the fraction parts *after* they have been rewritten with a common denominator, not by the act of finding the LCD itself."}]}, {"question": "Which of the following is a step unique to *subtracting* mixed numbers, as compared to adding them?", "options": [{"text": "Finding the Least Common Denominator (LCD).", "isCorrect": false, "rationale": "Finding the LCD is a necessary first step for both adding and subtracting fractions or mixed numbers with unlike denominators."}, {"text": "Simplifying the fraction part of the result.", "isCorrect": false, "rationale": "Simplifying the fraction part is the final step for both addition and subtraction of mixed numbers."}, {"text": "Converting an improper fraction part to a mixed number and carrying over the whole number.", "isCorrect": false, "rationale": "This step is specific to adding mixed numbers when the sum of the fraction parts results in an improper fraction."}, {"text": "Borrowing from the whole number part to increase the fraction part.", "isCorrect": true, "rationale": "Borrowing is a unique step to subtraction. It's required when the fraction part being subtracted is larger than the fraction part of the number it's being subtracted from."}]}, {"question": "A student is performing the subtraction $6\\,1/4 - 2\\,3/8$. After finding the LCD of $8$, they have $6\\,2/8 - 2\\,3/8$. They decide to borrow from the $6$. Which of the following represents the *correct* way to rewrite $6\\,2/8$ after borrowing?", "options": [{"text": "$5\\,3/8$", "isCorrect": false, "rationale": "This incorrectly adds only $1/8$ to the original $2/8$ after borrowing. When borrowing $1$ from the whole number, you add $8/8$ (the common denominator over itself) to the fraction part, not just $1/8$."}, {"text": "$5\\,10/8$", "isCorrect": true, "rationale": "To borrow from $6\\,2/8$, you take $1$ from the whole number $6$, making it $5$. The borrowed $1$ is added to the fraction as $8/8$ (since the common denominator is $8$). So, $6\\,2/8 = 5 + (8/8 + 2/8) = 5\\,10/8$."}, {"text": "$5\\,1/2$", "isCorrect": false, "rationale": "This simplification is incorrect and doesn't represent the correct value after borrowing. $10/8$ simplifies to $1\\,2/8$ or $1\\,1/4$, so $5\\,10/8$ would be $5+1\\,1/4 = 6\\,1/4$, which is the original value, not the rewritten value for subtraction."}, {"text": "$6\\,10/8$", "isCorrect": false, "rationale": "This option adds the borrowed $1$ (as $8/8$) to the fraction part but fails to reduce the whole number part from which the $1$ was borrowed. The whole number must decrease by $1$."}]}, {"question": "A recipe calls for $5\\,1/2$ cups of flour. If you have $2\\,3/4$ cups of flour already, how much more flour do you need?", "options": [{"text": "$3\\,1/4$ cups", "isCorrect": false, "rationale": "This answer might result from an incorrect calculation, possibly not borrowing correctly or making an error in subtracting the fraction parts ($6/4 - 3/4 = 3/4$, not $1/4$). If you had $5\\,1/2 - 2\\,1/4$, the answer would be $3\\,1/4$, but the problem is $5\\,1/2 - 2\\,3/4$."}, {"text": "$2\\,3/4$ cups", "isCorrect": true, "rationale": "To find out how much more flour is needed, subtract the amount you have from the amount needed: $5\\,1/2 - 2\\,3/4$. First, find the LCD, which is $4$. Rewrite as $5\\,2/4 - 2\\,3/4$. Since $2/4 < 3/4$, borrow $1$ from $5$, making it $4$. Add $4/4$ to $2/4$, resulting in $4\\,6/4$. Now subtract: $4\\,6/4 - 2\\,3/4 = (4-2)\\,(6/4 - 3/4) = 2\\,3/4$ cups."}, {"text": "$2\\,1/4$ cups", "isCorrect": false, "rationale": "This answer likely results from a subtraction error in the fraction part. After borrowing, the fraction part is $6/4$, and $6/4 - 3/4 = 3/4$, not $1/4$."}, {"text": "$3\\,1/2$ cups", "isCorrect": false, "rationale": "This answer incorrectly subtracts the whole numbers as $5-2=3$ and then assumes $1/2 - 3/4 = 1/2$ or similar, ignoring the need for a common denominator and borrowing."}]}, {"question": "What is an alternative method for adding or subtracting mixed numbers described in the summary?", "options": [{"text": "Always convert the mixed numbers to decimals before performing the operation.", "isCorrect": false, "rationale": "Converting to decimals is not mentioned in the provided text as an alternative method for adding or subtracting mixed numbers."}, {"text": "Convert both mixed numbers into improper fractions, perform the addition or subtraction, and then convert the result back to a mixed number.", "isCorrect": true, "rationale": "The summary section explicitly states: 'An alternative method: convert both mixed numbers to improper fractions, add or subtract, then convert back.'"}, {"text": "Only add or subtract the whole number parts, ignoring the fraction parts.", "isCorrect": false, "rationale": "Ignoring the fraction parts would lead to an incorrect answer and is not a valid method for adding or subtracting mixed numbers."}, {"text": "Find the product of the denominators and use that as the common denominator.", "isCorrect": false, "rationale": "While multiplying denominators sometimes yields a common denominator, it's not always the LCD, and this describes a step within the standard method, not an alternative overall method."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
