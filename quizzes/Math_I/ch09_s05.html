<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 9, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of a data display according to the provided text?", "options": [{"text": "To make the process of collecting data more efficient.", "isCorrect": false, "rationale": "Data displays are used after data has been collected, not for the collection process itself."}, {"text": "To visually organize and present data to enhance readability and understanding.", "isCorrect": true, "rationale": "The text explicitly states: 'A data display is a visual way to organize and present data so that it is easier to read and understand.'"}, {"text": "To replace raw data with summarized statistics, eliminating the need for original data sets.", "isCorrect": false, "rationale": "Data displays summarize but do not entirely replace raw data; they serve as a visual aid for comprehension."}, {"text": "To exclusively show how data changes over time, highlighting trends.", "isCorrect": false, "rationale": "While line graphs show trends over time, this is not the universal primary purpose of all data displays as a whole."}]}, {"question": "A research team wants to compare the total number of votes received by each of the five candidates in a recent local election. Which type of data display would be most appropriate for this comparison?", "options": [{"text": "Circle Graph", "isCorrect": false, "rationale": "A circle graph is best for showing parts of a whole (percentages of a total), not direct comparisons of independent categories."}, {"text": "Line Graph", "isCorrect": false, "rationale": "A line graph is used to show changes or trends over time, which is not the objective here."}, {"text": "Bar Graph", "isCorrect": true, "rationale": "The text states: 'Use a bar graph to compare amounts across categories.' Comparing votes for different candidates fits this purpose perfectly."}, {"text": "Dot Plot", "isCorrect": false, "rationale": "A dot plot shows individual data values and their frequency on a number line, which is not suitable for comparing categorical totals like votes for candidates."}]}, {"question": "A financial analyst wants to illustrate how a company's total annual revenue is divided among its various operational expenses (e.g., salaries, marketing, R&D, manufacturing, administration) as percentages of the total. Which display is best suited for this purpose?", "options": [{"text": "Dot Plot", "isCorrect": false, "rationale": "A dot plot is used to show the frequency of individual data values on a number line, not the proportion of parts to a whole."}, {"text": "Line Graph", "isCorrect": false, "rationale": "A line graph shows changes over time, which is not relevant for showing parts of a total at one point in time."}, {"text": "Bar Graph", "isCorrect": false, "rationale": "While a bar graph could compare expense amounts, a circle graph is superior for explicitly showing each expense as a percentage of the total revenue."}, {"text": "Circle Graph (Pie Chart)", "isCorrect": true, "rationale": "The text specifies: 'Use a circle graph to show parts of a whole (percentages of a total).' Showing how total revenue is divided into expense categories perfectly aligns with this use case."}]}, {"question": "A climate scientist is tracking the average global temperature measured monthly over the past decade to observe long-term warming patterns. What type of data display would be the most effective choice?", "options": [{"text": "Bar Graph", "isCorrect": false, "rationale": "A bar graph compares distinct amounts across categories, not continuous changes over time."}, {"text": "Line Graph", "isCorrect": true, "rationale": "The text states: 'Use a line graph to show change over time (trends).' Tracking monthly average temperatures over a decade directly relates to showing change over time."}, {"text": "Dot Plot", "isCorrect": false, "rationale": "A dot plot shows individual data values and their frequency, which would not effectively visualize a continuous trend over a long period."}, {"text": "Circle Graph", "isCorrect": false, "rationale": "A circle graph shows parts of a whole, which is entirely inappropriate for displaying temperature changes over time."}]}, {"question": "A librarian wants to display the number of times each book from a specific genre was checked out last month, showing the exact frequency for each unique book title. Which display would best achieve this?", "options": [{"text": "Circle Graph", "isCorrect": false, "rationale": "A circle graph shows parts of a whole, not the frequency of individual items."}, {"text": "Line Graph", "isCorrect": false, "rationale": "A line graph shows change over time, which is not applicable to displaying checkout frequencies for individual titles."}, {"text": "Bar Graph", "isCorrect": false, "rationale": "While a bar graph could show checkout counts, a dot plot is specifically designed to show individual data values (book titles treated as distinct points on a scale) and how often each occurs (stacked dots)."}, {"text": "Dot Plot", "isCorrect": true, "rationale": "The text states: 'Use a dot plot to show individual data values and how often each occurs.' This method is ideal for showing the frequency of each unique book title's checkouts."}]}, {"question": "Based on the 'Reading a Bar Graph' example, if 5 more students chose Basketball as their favorite sport (making it 15 total for Basketball), and the other sports remained the same (Soccer=12, Baseball=10, Swimming=8), what percentage of the *new total* students would have chosen Baseball?", "options": [{"text": "20%", "isCorrect": false, "rationale": "20% would be 10 out of 50 students, not 10 out of the new total of 45 students."}, {"text": "25%", "isCorrect": false, "rationale": "25% was the original percentage for Baseball (10 out of 40), but the total number of students changed."}, {"text": "Approximately 22.2%", "isCorrect": true, "rationale": "Original total students = 12 (Soccer) + 10 (Basketball) + 10 (Baseball) + 8 (Swimming) = 40. New Basketball students = 10 + 5 = 15. New total students = 12 + 15 + 10 + 8 = 45. The number of students who chose Baseball remains 10. So, 10/45 ≈ 0.2222, which is approximately 22.2%."}, {"text": "Approximately 27.8%", "isCorrect": false, "rationale": "27.8% would be 12.5 students out of 45, which is incorrect for Baseball."}]}, {"question": "Using the family's monthly budget from the 'Reading a Circle Graph' example, if the family decided to cut their 'Rent' budget by 5% (of their total budget) and reallocate half of that saved amount to 'Food' and the other half to 'Transportation', how much would they then spend on Food?", "options": [{"text": "$500", "isCorrect": false, "rationale": "This is the original amount spent on Food."}, {"text": "$535", "isCorrect": false, "rationale": "This calculation is incorrect. The saved amount from rent is 0.05 * $2,000 = $100. Half of this is $50. Original Food is $500. So, $500 + $50 = $550."}, {"text": "$550", "isCorrect": true, "rationale": "Original total budget = $2,000. Original Rent = 35% of $2,000 = $700. If Rent is cut by 5% of the total budget, the saved amount is 0.05 * $2,000 = $100. Half of this saved amount ($50) is reallocated to Food. Original Food = 25% of $2,000 = $500. New Food spending = $500 + $50 = $550."}, {"text": "$575", "isCorrect": false, "rationale": "This calculation is incorrect. $575 would represent 28.75% of the total budget."}]}, {"question": "The 'Analyzing a Line Graph' example shows a store's monthly sales from January to June with a clear increasing trend. Based on the principles of analyzing line graphs, what would be the most reasonable *general inference* about the store's sales outlook for the coming months if no external factors change?", "options": [{"text": "Sales will inevitably stop increasing and begin to decline in the next month due to market saturation.", "isCorrect": false, "rationale": "The text presents no information to suggest an inevitable decline; the trend shown is consistently increasing."}, {"text": "The store is likely experiencing a positive growth period, and sales are expected to continue their upward trend.", "isCorrect": true, "rationale": "The example explicitly states and demonstrates 'The trend is increasing sales.' Inferences about outlook based on trends assume continuation unless contrary information is provided."}, {"text": "Sales will stabilize and remain constant, as rapid growth phases are typically short-lived.", "isCorrect": false, "rationale": "There is no information in the provided text to support an inference of stabilization; the observed trend is one of growth."}, {"text": "No inference can be made about future sales without data for at least another six months.", "isCorrect": false, "rationale": "While exact predictions are difficult, line graphs are specifically used to show trends, from which general inferences about future direction can be made based on past performance."}]}, {"question": "Referring to the 'Reading a Dot Plot' example, if another student read 7 books, and two more students each read 9 books, how many students would have read *more than* 8 books?", "options": [{"text": "3 students", "isCorrect": false, "rationale": "The original dot plot shows 2 students read 9 or 10 books. Adding 1 student who read 7 books doesn't change this, but adding two students who read 9 books does. The new count for 'more than 8' would be 2 (original 9 and 10) + 2 (new 9s) = 4."}, {"text": "4 students", "isCorrect": true, "rationale": "Original data: (7: 1 dot), (8: 3 dots), (9: 1 dot), (10: 1 dot). New data: +1 student at 7 books, +2 students at 9 books. Updated counts: (7: 2 dots), (8: 3 dots), (9: 3 dots), (10: 1 dot). Students reading 'more than 8 books' are those who read 9 or 10 books. This would be 3 (for 9 books) + 1 (for 10 books) = 4 students."}, {"text": "5 students", "isCorrect": false, "rationale": "This would mean 5 students read 9 or 10 books, which is incorrect based on the updated counts."}, {"text": "6 students", "isCorrect": false, "rationale": "This is the original total number of students, not the count of those who read more than 8 books."}]}, {"question": "The 'Caution' section warns that a bar graph can be misleading if its vertical axis does not start at zero. What is the primary reason given for this being a misleading practice?", "options": [{"text": "It makes the graph take up too much space on a page or screen.", "isCorrect": false, "rationale": "While it might save space, the caution's primary concern is about misrepresentation, not space efficiency."}, {"text": "It can make small differences between bars appear significantly larger than they actually are.", "isCorrect": true, "rationale": "The text directly states: 'When the axis starts above zero, small differences between bars look much larger than they really are.' This exaggerates perceived differences."}, {"text": "It prevents the accurate calculation of percentages for each category.", "isCorrect": false, "rationale": "The actual values are usually still readable from the axis, so percentages can be calculated, but the visual comparison is distorted."}, {"text": "It makes it difficult to compare the data with other bar graphs that do start at zero.", "isCorrect": false, "rationale": "While true that it makes comparison difficult, the text's specific warning focuses on the internal distortion of differences within the misleading graph itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
