    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 5, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is the initial and most crucial step when performing addition or subtraction with decimal numbers?", "options": [{"text": "Adding or subtracting the whole number parts first.", "isCorrect": false, "rationale": "While the whole number parts are eventually added or subtracted, this is not the first step. The first step involves setting up the problem correctly."}, {"text": "Lining up the decimal points vertically.", "isCorrect": true, "rationale": "The text explicitly states: 'You must line up the decimal points so that digits in the same place value are aligned.' This is the foundational step before any arithmetic begins."}, {"text": "Annexing zeros to ensure all numbers have the same number of decimal places.", "isCorrect": false, "rationale": "Annexing zeros is the second step, performed after the decimal points have been lined up. It prepares the numbers for column-by-column addition or subtraction."}, {"text": "Estimating the answer to check for reasonableness.", "isCorrect": false, "rationale": "Estimating is a useful step to check the final answer, but it is not part of the initial calculation procedure for adding or subtracting decimals."}], "id": "q01"}, {"question": "Why is it crucial to line up the decimal points when adding or subtracting decimals, as opposed to simply aligning the rightmost digits?", "options": [{"text": "To ensure that the sum or difference is always greater than the original numbers.", "isCorrect": false, "rationale": "This statement is incorrect; a sum might be greater, but a difference is usually smaller. The purpose of lining up decimals is not related to the magnitude of the result in this way."}, {"text": "To simplify the process of borrowing and carrying.", "isCorrect": false, "rationale": "While proper alignment facilitates borrowing and carrying, the primary reason for lining up decimals is more fundamental: ensuring correct place value addition/subtraction."}, {"text": "To guarantee that digits of the same place value are added or subtracted together.", "isCorrect": true, "rationale": "Lining up decimal points ensures that tenths are added to tenths, hundredths to hundredths, ones to ones, and so on. This is essential for the arithmetic to be mathematically correct, as stated in the text regarding aligning 'digits in the same place value'."}, {"text": "To ensure the answer always has the same number of decimal places as the number with the most decimal places.", "isCorrect": false, "rationale": "This is related to annexing zeros, which happens after decimal points are lined up, not the reason for the initial alignment itself. The number of decimal places in the answer is a consequence, not the reason for alignment."}], "id": "q02"}, {"question": "Calculate $15.6 + 9.78$.", "options": [{"text": "$25.38$", "isCorrect": true, "rationale": "To solve, line up the decimal points and annex a zero: $15.60 + 9.78$. Adding column by column from right to left: $0+8=8$; $6+7=13$ (write 3, carry 1); $5+9+1=15$ (write 5, carry 1); $1+0+1=2$. The result is $25.38$."}, {"text": "$24.14$", "isCorrect": false, "rationale": "This result indicates a miscalculation, possibly an incorrect carry or misaligned digits in the tenths and hundredths places. The sum of the tenths digits (6+7) is 13, so the tenths place in the sum should be 3, not 1."}, {"text": "$25.14$", "isCorrect": false, "rationale": "This result suggests an error in adding the tenths or ones columns. The sum of the tenths digits (6+7) is 13, which means a 3 in the tenths place and a 1 carried over to the ones place, resulting in $25.38$, not $25.14$."}, {"text": "$24.38$", "isCorrect": false, "rationale": "This answer correctly identifies the decimal part but incorrectly adds the whole number parts. $15+9=24$, and $0.60+0.78=1.38$. Therefore, $24+1.38=25.38$, not $24.38$."}], "id": "q03"}, {"question": "Find the difference: $15.6 - 9.78$.", "options": [{"text": "$6.18$", "isCorrect": false, "rationale": "This answer suggests an error in borrowing or subtraction. Specifically, $15.60 - 9.78$. In the tenths column, $5 - 7$ (after borrowing from the ones place) would be $15-7=8$, not $1-7$ if 6 was incorrectly treated as 16, or 6-7 if no borrowing. Also, $14-9=5$ in the ones place."}, {"text": "$5.82$", "isCorrect": true, "rationale": "To solve, line up the decimal points and annex a zero: $15.60 - 9.78$. Subtracting column by column with borrowing: $0-8$ becomes $10-8=2$ (after borrowing from 6, making it 5). $5-7$ becomes $15-7=8$ (after borrowing from 5, making it 4). $4-9$ becomes $14-9=5$ (after borrowing from 1, making it 0). The result is $5.82$."}, {"text": "$5.92$", "isCorrect": false, "rationale": "This answer indicates a miscalculation in the tenths place. After borrowing, the tenths column involves $15-7=8$, not $9$. ($15.60 \rightarrow 15.5^{10} \rightarrow 14.^{15}6^{10}$)"}, {"text": "$6.82$", "isCorrect": false, "rationale": "This answer is incorrect in the whole number part. After necessary borrowing from the whole number 15, the final subtraction in the ones column should be $14-9=5$, not $6$ ($15-9=6$ is if there was no borrowing across the decimal point from 15)."}], "id": "q04"}, {"question": "A baker uses $2.75$ pounds of flour for a cake and $1.5$ pounds for cookies. If she started with $5$ pounds of flour, what mathematical operations would represent the amount of flour *remaining* after baking both?", "options": [{"text": "Finding the sum of $2.75$ and $1.5$.", "isCorrect": false, "rationale": "This operation would give the total amount of flour used, not the amount remaining."}, {"text": "Finding the difference between $5$ and the sum of $2.75$ and $1.5$.", "isCorrect": true, "rationale": "To find the amount remaining, first calculate the total flour used (sum: $2.75 + 1.5$), and then subtract that total from the initial amount (difference: $5 - \text{total used}$). This correctly applies the definitions of 'sum' and 'difference'."}, {"text": "Finding the difference between $5$ and $2.75$, then adding $1.5$.", "isCorrect": false, "rationale": "This sequence of operations would calculate the remaining flour after the cake, and then add back the flour for cookies, which doesn't make sense for finding the final remaining amount."}, {"text": "Finding the sum of $5$ and the difference between $2.75$ and $1.5$.", "isCorrect": false, "rationale": "This operation combines adding the initial amount with the difference between the two usage amounts, which does not correctly represent the remaining flour."}], "id": "q05"}, {"question": "A scientist combines three liquid samples with volumes of $4.2$ mL, $0.85$ mL, and $13.007$ mL. What is the total volume of the combined samples?", "options": [{"text": "$18.57$ mL", "isCorrect": false, "rationale": "This answer suggests an error in place value alignment or carrying. For example, if $4.2 + 0.85$ was $5.05$, then $5.05 + 13.007 = 18.057$, not $18.57$."}, {"text": "$18.057$ mL", "isCorrect": true, "rationale": "To find the total volume, align the decimal points and annex zeros: $4.200 + 0.850 + 13.007$. Adding column by column results in $18.057$."}, {"text": "$17.077$ mL", "isCorrect": false, "rationale": "This answer indicates an error in addition, possibly by not carrying over or by miscalculating a sum in one of the columns (e.g., $4+8=12$, not $0$ in the tenths place)."}, {"text": "$17.857$ mL", "isCorrect": false, "rationale": "This answer suggests an error in the ones or tenths place calculation. The sum of the tenths column ($2+8+0$) is 10, so a 0 in the tenths place and a 1 carried over, leading to $18.057$."}], "id": "q06"}, {"question": "Sarah bought a coffee for $4.25 and a pastry for $2.80. She paid with a $10 bill. How much change should she receive?", "options": [{"text": "$3.95$", "isCorrect": false, "rationale": "This is incorrect. The total cost is $4.25 + 2.80 = $7.05. Change would be $10.00 - 7.05 = $2.95."}, {"text": "$7.05$", "isCorrect": false, "rationale": "This is the total amount Sarah spent, not the change she should receive."}, {"text": "$2.95$", "isCorrect": true, "rationale": "First, calculate the total cost: $4.25 + 2.80 = 7.05$. Then, subtract the total cost from the amount paid: $10.00 - 7.05 = 2.95$. Sarah should receive $2.95 in change."}, {"text": "$3.05$", "isCorrect": false, "rationale": "This answer is off by 10 cents, likely due to a minor arithmetic error in the subtraction step. The correct change is $2.95."}], "id": "q07"}, {"question": "A recipe calls for $3.5$ cups of water. If you have already added $1.75$ cups, how much more water do you need to add?", "options": [{"text": "$2.25$ cups", "isCorrect": false, "rationale": "This answer suggests a calculation error. $3.50 - 1.75$. Subtracting the hundredths column: $10-5=5$. Subtracting the tenths column: $4-7$ (after borrowing from the ones place) would be $14-7=7$. Subtracting the ones column: $2-1=1$. The correct answer is $1.75$."}, {"text": "$1.75$ cups", "isCorrect": true, "rationale": "To find out how much more water is needed, subtract the amount already added from the total amount required: $3.5 - 1.75$. Line up the decimals and annex a zero: $3.50 - 1.75 = 1.75$ cups."}, {"text": "$1.25$ cups", "isCorrect": false, "rationale": "This answer suggests a significant calculation error in the subtraction process, particularly in the tenths place. The correct difference is $1.75$."}, {"text": "$5.25$ cups", "isCorrect": false, "rationale": "This answer would be the result if the two amounts were added instead of subtracted, which is incorrect for finding the remaining amount needed."}], "id": "q08"}, {"question": "In the subtraction problem $20.3 - 8.47$, why is it necessary to annex a zero to $20.3$ to make it $20.30$ *before* subtracting?", "options": [{"text": "To ensure the final answer has two decimal places.", "isCorrect": false, "rationale": "While the answer will have two decimal places, this is not the primary reason for annexing the zero. The main purpose is to facilitate the subtraction process itself."}, {"text": "To make borrowing easier and prevent errors when subtracting digits in different place values.", "isCorrect": true, "rationale": "Annexing a zero to $20.3$ to make it $20.30$ ensures that there is a digit in the hundredths place to subtract from. This allows for proper column alignment and the correct application of borrowing when $0$ is less than $7$, preventing calculation errors."}, {"text": "To avoid having a negative result in any of the columns.", "isCorrect": false, "rationale": "Annexing zeros helps prepare for borrowing, which is the mechanism to handle situations where a top digit is smaller than a bottom digit. It doesn't inherently prevent negative results; rather, it sets up the problem so borrowing can be performed correctly."}, {"text": "To convert $20.3$ into a whole number before subtraction.", "isCorrect": false, "rationale": "Annexing zeros after a decimal point does not convert a decimal into a whole number; $20.30$ is still a decimal number. It only changes its representation to match the number of decimal places of the other operand without changing its value."}], "id": "q09"}, {"question": "According to the text, how does adding and subtracting decimals *primarily* differ from adding and subtracting whole numbers?", "options": [{"text": "Decimals require adding from left to right, while whole numbers are right to left.", "isCorrect": false, "rationale": "Both whole numbers and decimals are added and subtracted from right to left, starting with the smallest place value."}, {"text": "Decimals often involve borrowing, which is not present in whole number operations.", "isCorrect": false, "rationale": "Borrowing is a common and necessary operation in subtracting whole numbers as well as decimals when a digit in the minuend is smaller than the corresponding digit in the subtrahend."}, {"text": "Decimals introduce the critical extra step of lining up the decimal points to align place values.", "isCorrect": true, "rationale": "The text explicitly states that adding and subtracting decimals 'works just like adding and subtracting whole numbers—with one extra step. You must line up the decimal points...'. This is the key distinguishing factor."}, {"text": "Decimals always result in a smaller number, whereas whole numbers always result in a larger number.", "isCorrect": false, "rationale": "This statement is incorrect. Addition of decimals can result in a larger number, and subtraction can result in a smaller number, just as with whole numbers. The magnitude of the result depends on the specific numbers and operation."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
