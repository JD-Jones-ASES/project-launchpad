<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 4, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the product of 2/5 and 3/7?", "options": [{"text": "5/12", "isCorrect": false, "rationale": "This option results from adding the numerators (2+3=5) and adding the denominators (5+7=12), which is incorrect for multiplication."}, {"text": "6/35", "isCorrect": true, "rationale": "According to the multiplying fractions property, you multiply the numerators (2 * 3 = 6) and multiply the denominators (5 * 7 = 35), resulting in 6/35. This fraction is already in simplest form."}, {"text": "6/12", "isCorrect": false, "rationale": "This option incorrectly multiplies the numerators (2*3=6) but then adds the denominators (5+7=12), which is an incorrect procedure for multiplication."}, {"text": "21/10", "isCorrect": false, "rationale": "This option incorrectly multiplies 3*7 (numerator of second fraction by denominator of first) and 5*2 (denominator of first by numerator of second), or involves an incorrect reciprocal operation."}]}, {"question": "What is the primary advantage of using cross canceling before multiplying fractions?", "options": [{"text": "It eliminates the need for a common denominator.", "isCorrect": false, "rationale": "A common denominator is not needed for multiplying fractions, regardless of whether cross canceling is used. This is a property of multiplication itself, not an advantage of cross canceling."}, {"text": "It keeps the numbers small and saves you from simplifying at the end.", "isCorrect": true, "rationale": "As stated in the 'Cross Canceling' keyterm, this shortcut divides common factors early, which keeps the numbers in the calculation smaller and reduces the work of simplifying the final product."}, {"text": "It ensures the answer will always be an improper fraction.", "isCorrect": false, "rationale": "Cross canceling does not guarantee an improper fraction; the nature of the final fraction depends on the specific fractions being multiplied. Its purpose is simplification, not to change the type of fraction."}, {"text": "It converts the fractions into decimals, making them easier to multiply.", "isCorrect": false, "rationale": "Cross canceling is a technique for simplifying fractions themselves before multiplication, not for converting them to decimals. The text does not mention converting to decimals."}]}, {"question": "Multiply 5/12 * 9/10 using cross canceling. What is the result in simplest form?", "options": [{"text": "45/120", "isCorrect": false, "rationale": "This is the product without cross canceling, but it is not in simplest form (it simplifies to 3/8)."}, {"text": "1/2", "isCorrect": false, "rationale": "This indicates an error in the cross canceling process, such as incorrectly dividing factors or making a calculation mistake during the canceling."}, {"text": "3/8", "isCorrect": true, "rationale": "To cross cancel: 5 and 10 share a factor of 5 (5÷5=1, 10÷5=2). 9 and 12 share a factor of 3 (9÷3=3, 12÷3=4). The new multiplication becomes 1/4 * 3/2, which equals (1*3)/(4*2) = 3/8."}, {"text": "15/24", "isCorrect": false, "rationale": "This implies partial or incorrect cross canceling, leading to a fraction that is not fully simplified or is numerically incorrect."}]}, {"question": "A baker needs 2/3 cup of sugar for one batch of cookies. If they want to make 6 batches, how much sugar do they need in total?", "options": [{"text": "12/18 cups", "isCorrect": false, "rationale": "This option incorrectly multiplies both the numerator and denominator by the whole number, and is not in simplest form."}, {"text": "4 cups", "isCorrect": true, "rationale": "To solve, write 6 as 6/1. Then multiply 6/1 * 2/3. Cross cancel 6 and 3 (6÷3=2, 3÷3=1). This leaves 2/1 * 2/1 = 4/1 = 4 cups."}, {"text": "6 and 2/3 cups", "isCorrect": false, "rationale": "This option incorrectly adds the whole number to the fraction, rather than multiplying."}, {"text": "12 cups", "isCorrect": false, "rationale": "This option only multiplies the whole number by the numerator, ignoring the denominator of the fraction."}]}, {"question": "When multiplying a whole number by a fraction, such as 7 * 3/5, what is the *correct* initial step according to the 'Caution' note in the text?", "options": [{"text": "Find a common denominator for 7 and 3/5.", "isCorrect": false, "rationale": "The text explicitly states that a common denominator is not needed for multiplying fractions."}, {"text": "Write the whole number 7 as 7/1.", "isCorrect": true, "rationale": "The 'Caution' note advises, 'always write the whole number over 1 first' to correctly set up the multiplication problem."}, {"text": "Convert 3/5 into a decimal first.", "isCorrect": false, "rationale": "The text does not mention converting fractions to decimals as a recommended step for fraction multiplication."}, {"text": "Multiply the whole number 7 by the denominator 5.", "isCorrect": false, "rationale": "This would be an incorrect step, as it misapplies the whole number and could lead to errors, as the caution explicitly warns against putting the whole number in a denominator by mistake."}]}, {"question": "A rectangular patio measures 5/6 yard long and 3/4 yard wide. What is the area of the patio in square yards?", "options": [{"text": "15/24 square yards", "isCorrect": false, "rationale": "This is the result of multiplying without cross canceling and without simplifying. The final answer should be in simplest form."}, {"text": "8/10 square yards", "isCorrect": false, "rationale": "This is the result of incorrectly adding the numerators (5+3=8) and denominators (6+4=10), which is not the method for finding area."}, {"text": "5/8 square yards", "isCorrect": true, "rationale": "To find the area, multiply length by width: 5/6 * 3/4. Cross cancel 3 and 6 (3÷3=1, 6÷3=2). The multiplication becomes 5/2 * 1/4 = (5*1)/(2*4) = 5/8 square yards."}, {"text": "1/2 square yard", "isCorrect": false, "rationale": "This result indicates an error in the calculation or cross-canceling process, leading to an incorrect area."}]}, {"question": "You have 4/5 of a pie left. If your friend eats 1/2 of what's left, how much of the *original* whole pie did your friend eat?", "options": [{"text": "2/5 of the pie", "isCorrect": true, "rationale": "This is an application problem similar to the introductory example. To find a fraction of a fraction, you multiply: 4/5 * 1/2. You can cross cancel 4 and 2 (4÷2=2, 2÷2=1). The result is 2/5 * 1/1 = 2/5 of the pie."}, {"text": "5/7 of the pie", "isCorrect": false, "rationale": "This option results from incorrectly adding the fractions (4+1=5, 5+2=7), which is not how to find a fraction of a fraction."}, {"text": "4/10 of the pie", "isCorrect": false, "rationale": "This is the result of multiplying the fractions without simplifying. The answer 4/10 is equivalent to 2/5, but not in simplest form."}, {"text": "3/5 of the pie", "isCorrect": false, "rationale": "This suggests an incorrect calculation, possibly subtracting 1/2 from 4/5, which is not the correct operation for 'of what's left'."}]}, {"question": "Which statement describes the most efficient approach to multiplying 6/25 * 5/12?", "options": [{"text": "Multiply 6 by 5 and 25 by 12, then simplify the resulting fraction.", "isCorrect": false, "rationale": "While this method works, it involves larger numbers (30/300) and more complex simplification at the end. The text emphasizes cross canceling for efficiency."}, {"text": "Cross-cancel 6 and 12 by 6, and 5 and 25 by 5, then multiply the remaining numbers.", "isCorrect": true, "rationale": "This is the most efficient method described. 6 and 12 share a factor of 6 (6÷6=1, 12÷6=2). 5 and 25 share a factor of 5 (5÷5=1, 25÷5=5). The problem simplifies to 1/5 * 1/2 = 1/10."}, {"text": "Convert both fractions to decimals and then multiply them.", "isCorrect": false, "rationale": "The text focuses on fraction multiplication techniques without converting to decimals, which can sometimes introduce rounding issues or be less efficient for exact fractional answers."}, {"text": "Find a common denominator for 25 and 12, then multiply the numerators.", "isCorrect": false, "rationale": "Finding a common denominator is unnecessary for fraction multiplication. This is a step for adding or subtracting fractions."}]}, {"question": "Unlike adding or subtracting fractions, what is *not* required when multiplying fractions?", "options": [{"text": "Having numerators.", "isCorrect": false, "rationale": "All fractions, by definition, must have a numerator. This is always required."}, {"text": "Simplifying the final answer.", "isCorrect": false, "rationale": "The text advises to 'Always simplify the final answer' for both addition/subtraction and multiplication, making this a common best practice, not something 'not required'."}, {"text": "A common denominator.", "isCorrect": true, "rationale": "The text explicitly states, 'Multiplying fractions is, in many ways, simpler than adding or subtracting them—you do not need a common denominator.'"}, {"text": "Having denominators.", "isCorrect": false, "rationale": "All fractions, by definition, must have a non-zero denominator. This is always required."}]}, {"question": "The text notes that 'You can multiply the numerators and denominators in any order—the commutative property of multiplication applies to the factors inside the fraction, too.' What does the Commutative Property of Multiplication state?", "options": [{"text": "The way factors are grouped does not change the product.", "isCorrect": false, "rationale": "This describes the Associative Property of Multiplication, not the Commutative Property."}, {"text": "Multiplying a sum by a number is the same as multiplying each addend by the number and then adding the products.", "isCorrect": false, "rationale": "This describes the Distributive Property, not the Commutative Property."}, {"text": "The order in which numbers are multiplied does not change the product.", "isCorrect": true, "rationale": "The Commutative Property of Multiplication states that changing the order of the factors does not change the product (e.g., a * b = b * a). This allows flexibility in multiplying numerators and denominators in any order."}, {"text": "Any number multiplied by one is that number.", "isCorrect": false, "rationale": "This describes the Identity Property of Multiplication, not the Commutative Property."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
