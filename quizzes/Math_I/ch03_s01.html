<body>
<div class="quiz-container">

        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>

        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 3, Section 1</div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the definition provided in the text, which of the following statements accurately describes a 'multiple' of a whole number?", "options": [{"text": "It is a whole number that divides the given number evenly.", "isCorrect": false, "rationale": "This describes a 'factor' of a whole number, not a multiple. Factors divide a number, while multiples are produced by multiplying a number."}, {"text": "It is the product of the given number and any whole number (0, 1, 2, 3...).", "isCorrect": true, "rationale": "The text defines a multiple as 'the product of that number and any whole number (0, 1, 2, 3...)'. This option perfectly matches that definition."}, {"text": "It is the largest number that divides into two or more numbers.", "isCorrect": false, "rationale": "This describes the 'Greatest Common Factor (GCF)', not a multiple of a single number."}, {"text": "It is the smallest positive number shared by two or more numbers.", "isCorrect": false, "rationale": "This describes the 'Least Common Multiple (LCM)' when applied to two or more numbers, not the general definition of a multiple of a single number."}], "id": "q01"}, {"question": "Which statement best distinguishes the Greatest Common Factor (GCF) from the Least Common Multiple (LCM) based on their definitions?", "options": [{"text": "The GCF is the largest factor two numbers share, while the LCM is the smallest positive multiple they share.", "isCorrect": true, "rationale": "The text defines GCF as 'the largest factor that all of the numbers share' and LCM as 'the smallest positive number that is a multiple of each number'. This option correctly captures both definitions."}, {"text": "The GCF is always greater than or equal to the largest number, while the LCM is always less than or equal to the smallest number.", "isCorrect": false, "rationale": "This statement is incorrect. The text's 'caution' note states that 'The GCF is always less than or equal to the smallest number. The LCM is always greater than or equal to the largest number.'"}, {"text": "Both GCF and LCM are found by listing factors, then identifying commonalities.", "isCorrect": false, "rationale": "GCF can be found by listing factors, but LCM is found by listing multiples. Both can also be found using prime factorization."}, {"text": "The GCF is used for combining different-sized parts, and the LCM is used for dividing into equal parts.", "isCorrect": false, "rationale": "This is reversed. The 'note' states 'The GCF is used when you simplify (divide into equal parts). The LCM is used when you need a common denominator (combine different-sized parts).'"}], "id": "q02"}, {"question": "Using the 'Listing Factors' method, what is the Greatest Common Factor (GCF) of 30 and 42?", "options": [{"text": "3", "isCorrect": false, "rationale": "3 is a common factor of 30 and 42, but it is not the *greatest* common factor."}, {"text": "6", "isCorrect": true, "rationale": "Factors of 30: 1, 2, 3, 5, 6, 10, 15, 30. Factors of 42: 1, 2, 3, 6, 7, 14, 21, 42. The common factors are 1, 2, 3, 6. The greatest among these is 6."}, {"text": "12", "isCorrect": false, "rationale": "12 is not a factor of 30 (30 / 12 = 2.5, not an even division), so it cannot be the GCF."}, {"text": "30", "isCorrect": false, "rationale": "While 30 is a factor of itself, it is not a factor of 42 (42 / 30 is not an even division), so it cannot be a common factor."}], "id": "q03"}, {"question": "Using the 'Listing Multiples' method, what is the Least Common Multiple (LCM) of 6 and 10?", "options": [{"text": "2", "isCorrect": false, "rationale": "2 is a common factor of 6 and 10, not a multiple. The LCM must be greater than or equal to the largest number."}, {"text": "30", "isCorrect": true, "rationale": "Multiples of 6: 6, 12, 18, 24, 30, 36... Multiples of 10: 10, 20, 30, 40... The smallest positive number that appears in both lists is 30."}, {"text": "60", "isCorrect": false, "rationale": "60 is a common multiple of 6 and 10, but it is not the *least* common multiple. 30 is smaller."}, {"text": "600", "isCorrect": false, "rationale": "600 is a common multiple, but it is much larger than the least common multiple, which is 30."}], "id": "q04"}, {"question": "Using prime factorization, find the GCF of 72 and 108.", "options": [{"text": "18", "isCorrect": false, "rationale": "18 = 2 * 3^2. While 18 is a common factor, it's not the greatest. For 72=2^3 * 3^2 and 108=2^2 * 3^3, we take the smallest exponent for shared primes: 2^2 * 3^2 = 4 * 9 = 36."}, {"text": "36", "isCorrect": true, "rationale": "Prime factorization of 72 = 2^3 * 3^2. Prime factorization of 108 = 2^2 * 3^3. To find the GCF, identify shared prime factors (2 and 3) and take the smallest exponent for each: 2^2 * 3^2 = 4 * 9 = 36."}, {"text": "72", "isCorrect": false, "rationale": "72 is a factor of itself, but not a factor of 108 (108/72 is not an even division), so it cannot be the GCF."}, {"text": "216", "isCorrect": false, "rationale": "216 is the LCM of 72 and 108, not the GCF. The GCF must be less than or equal to the smallest number."}], "id": "q05"}, {"question": "Using prime factorization, find the LCM of 12 and 18.", "options": [{"text": "6", "isCorrect": false, "rationale": "6 is the GCF of 12 and 18, not the LCM. The LCM must be greater than or equal to the largest number."}, {"text": "18", "isCorrect": false, "rationale": "18 is a multiple of 6 and 9 (if 9 was one of the numbers), but 18 is not a multiple of 12 (12*1=12, 12*2=24). So it cannot be the LCM of 12 and 18."}, {"text": "36", "isCorrect": true, "rationale": "Prime factorization of 12 = 2^2 * 3^1. Prime factorization of 18 = 2^1 * 3^2. To find the LCM, identify all prime factors (2 and 3) and take the largest exponent for each: 2^2 * 3^2 = 4 * 9 = 36."}, {"text": "72", "isCorrect": false, "rationale": "72 is a common multiple of 12 and 18, but it is not the *least* common multiple. 36 is smaller."}], "id": "q06"}, {"question": "A gardener has 48 rose bushes and 60 tulip bulbs. She wants to arrange them into identical garden beds, each with the same number of rose bushes and tulip bulbs, using all the plants. What is the maximum number of identical garden beds she can create?", "options": [{"text": "4", "isCorrect": false, "rationale": "4 is a common factor, but not the greatest. The problem requires the 'maximum' number of identical beds, indicating a GCF calculation."}, {"text": "6", "isCorrect": false, "rationale": "6 is a common factor, but not the greatest. The problem requires the 'maximum' number of identical beds, indicating a GCF calculation."}, {"text": "12", "isCorrect": true, "rationale": "This problem asks for the greatest number of identical groups, which is an application of the GCF. GCF(48, 60) can be found by prime factorization: 48 = 2^4 * 3, 60 = 2^2 * 3 * 5. The shared primes with the smallest exponents are 2^2 * 3^1 = 4 * 3 = 12."}, {"text": "240", "isCorrect": false, "rationale": "240 is the LCM of 48 and 60, not the GCF. The GCF must be less than or equal to the smallest number (48)."}], "id": "q07"}, {"question": "Two friends start running laps around a track at the same time. Sarah completes a lap in 4 minutes, and John completes a lap in 5 minutes. If they start together, how many minutes will it be before they both cross the starting line together again?", "options": [{"text": "1 minute", "isCorrect": false, "rationale": "This is incorrect. For them to cross together, the time must be a common multiple of their individual lap times. 1 minute is not a multiple of either 4 or 5."}, {"text": "9 minutes", "isCorrect": false, "rationale": "9 minutes is the sum of their lap times, but not a common multiple. John would be at 9 minutes (not a multiple of 5), and Sarah at 8 minutes."}, {"text": "20 minutes", "isCorrect": true, "rationale": "This problem asks for the earliest time both events occur simultaneously, which is an application of the LCM. LCM(4, 5) = 20. Multiples of 4: 4, 8, 12, 16, 20... Multiples of 5: 5, 10, 15, 20... The smallest common multiple is 20."}, {"text": "40 minutes", "isCorrect": false, "rationale": "40 minutes is a common multiple of 4 and 5, but it is not the *least* common multiple. They will meet earlier at 20 minutes."}], "id": "q08"}, {"question": "The 'caution' box in the text warns against confusing GCF and LCM. Which of the following statements correctly applies the magnitude principle from this caution?", "options": [{"text": "For any two positive numbers, the GCF is always greater than the numbers, and the LCM is always smaller.", "isCorrect": false, "rationale": "This statement contradicts the 'caution' box. The GCF is always less than or equal to the smallest number, and the LCM is always greater than or equal to the largest number."}, {"text": "The GCF is always less than or equal to the largest of the numbers, and the LCM is always greater than or equal to the smallest.", "isCorrect": false, "rationale": "This statement is partially incorrect. The GCF is less than or equal to the *smallest* number, and the LCM is greater than or equal to the *largest* number. The largest/smallest positions are swapped for one part of the statement."}, {"text": "The GCF is always less than or equal to the smallest number, and the LCM is always greater than or equal to the largest number.", "isCorrect": true, "rationale": "This statement directly reflects the guidance in the 'caution' box: 'The GCF is always less than or equal to the smallest number. The LCM is always greater than or equal to the largest number.'"}, {"text": "The GCF and LCM are always equal for any given pair of numbers.", "isCorrect": false, "rationale": "This is incorrect. GCF and LCM are rarely equal unless the numbers themselves are identical (e.g., GCF(5,5)=5, LCM(5,5)=5), or for specific cases like GCF(1,X)=1, LCM(1,X)=X. Generally, they are distinct values."}], "id": "q09"}, {"question": "The text states a property: 'For any two numbers $a$ and $b$: $(a,b) (a,b) = a b$'. If the GCF of 16 and 24 is 8, what is their LCM?", "options": [{"text": "8", "isCorrect": false, "rationale": "8 is the GCF. The LCM must be greater than or equal to 24 (the larger number), and the product of GCF and LCM should equal the product of the numbers."}, {"text": "32", "isCorrect": false, "rationale": "If LCM were 32, then GCF * LCM = 8 * 32 = 256. The product of the numbers is 16 * 24 = 384. Since 256 != 384, 32 is incorrect."}, {"text": "48", "isCorrect": true, "rationale": "Using the property (GCF)(LCM) = a * b: (8)(LCM) = (16)(24). 8 * LCM = 384. Divide both sides by 8: LCM = 384 / 8 = 48."}, {"text": "192", "isCorrect": false, "rationale": "192 is larger than the actual LCM. If LCM were 192, GCF * LCM = 8 * 192 = 1536, which is not equal to 16 * 24 = 384."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
