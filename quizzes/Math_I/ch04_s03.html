<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 4, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following correctly defines the reciprocal of a non-zero fraction $a/b$?", "options": [{"text": "It is the fraction $a/b$ itself.", "isCorrect": false, "rationale": "The reciprocal is a different fraction, not the original one."}, {"text": "It is the fraction $b/a$, obtained by flipping the original fraction.", "isCorrect": true, "rationale": "The text states, 'The reciprocal (also called the multiplicative inverse) of a fraction $a/b$ is $b/a$. You “flip” the fraction.'"}, {"text": "It is $1 - a/b$.", "isCorrect": false, "rationale": "The reciprocal is not found by subtracting the fraction from 1."}, {"text": "It is the product of $a$ and $b$, or $a \\times b$.", "isCorrect": false, "rationale": "The reciprocal is a fraction, not the product of its numerator and denominator."}]}, {"question": "What is the reciprocal of the whole number 9?", "options": [{"text": "9", "isCorrect": false, "rationale": "The reciprocal of a number is not the number itself."}, {"text": "1/9", "isCorrect": true, "rationale": "To find the reciprocal of a whole number, write it as a fraction over 1 (9/1) and then flip it to get 1/9, as shown in the example for 5."}, {"text": "-9", "isCorrect": false, "rationale": "The reciprocal is not the negative of the number; it's the multiplicative inverse."}, {"text": "9/1", "isCorrect": false, "rationale": "9/1 is equivalent to 9, not its reciprocal."}]}, {"question": "According to the text, what is always the result when a non-zero number is multiplied by its reciprocal?", "options": [{"text": "0", "isCorrect": false, "rationale": "Multiplying by the reciprocal is intended to yield 1, not 0."}, {"text": "1", "isCorrect": true, "rationale": "The text explicitly states: 'A number times its reciprocal always equals 1: $ab ba = 1$'."}, {"text": "The original number", "isCorrect": false, "rationale": "Multiplying by the reciprocal changes the number, it does not return the original number unless the number is 1."}, {"text": "The reciprocal itself", "isCorrect": false, "rationale": "Multiplying a number by its reciprocal yields 1, not the reciprocal itself."}]}, {"question": "The text explains that zero does not have a reciprocal. What is the fundamental reason for this?", "options": [{"text": "Zero is an even number, which prevents it from having a reciprocal.", "isCorrect": false, "rationale": "The parity of a number is irrelevant to its reciprocal property."}, {"text": "If zero had a reciprocal, it would require division by zero, which is undefined.", "isCorrect": true, "rationale": "The text states, 'You cannot flip $0/1$ to get $1/0$ because division by zero is undefined.' This is the core mathematical reason."}, {"text": "Zero cannot be expressed as a fraction.", "isCorrect": false, "rationale": "Zero can be expressed as a fraction, for example, 0/1."}, {"text": "Its reciprocal would be a negative number.", "isCorrect": false, "rationale": "The sign of a number's reciprocal is the same as the number itself (if non-zero)."}]}, {"question": "Calculate the quotient: $5/6 \\div 10/3$.", "options": [{"text": "50/18", "isCorrect": false, "rationale": "This is the result of multiplying the fractions without flipping the second one."}, {"text": "1/4", "isCorrect": true, "rationale": "To divide, 'keep' the first fraction, 'change' division to multiplication, and 'flip' the second fraction: $5/6 \\times 3/10$. Cross-canceling 5 and 10, and 3 and 6, yields $1/2 \\times 1/2 = 1/4$."}, {"text": "18/50", "isCorrect": false, "rationale": "This results from flipping the first fraction instead of the second."}, {"text": "25/9", "isCorrect": false, "rationale": "This result does not come from correctly applying the division rule."}]}, {"question": "Divide: $12 \\div 3/4$.", "options": [{"text": "9", "isCorrect": false, "rationale": "This is the result of multiplying 12 by 3/4, not dividing."}, {"text": "16", "isCorrect": true, "rationale": "Write 12 as 12/1. Then, multiply by the reciprocal of 3/4, which is 4/3: $12/1 \\times 4/3 = (12 \\times 4) / (1 \\times 3) = 48/3 = 16$."}, {"text": "3/48", "isCorrect": false, "rationale": "This error likely involves incorrectly flipping the first number or inverting the division operation."}, {"text": "4/36", "isCorrect": false, "rationale": "This result does not come from correctly applying the division rule."}]}, {"question": "Calculate $7/8 \\div 4$.", "options": [{"text": "7/32", "isCorrect": true, "rationale": "Write 4 as 4/1. Then, multiply 7/8 by the reciprocal of 4/1, which is 1/4: $7/8 \\times 1/4 = (7 \\times 1) / (8 \\times 4) = 7/32$."}, {"text": "28/8", "isCorrect": false, "rationale": "This is the result of multiplying 7/8 by 4, not dividing."}, {"text": "32/7", "isCorrect": false, "rationale": "This error likely involves flipping the first fraction instead of the divisor and then multiplying."}, {"text": "7/2", "isCorrect": false, "rationale": "This would be the result if 7/8 were multiplied by 4 and then simplified, which is incorrect for division."}]}, {"question": "When applying the 'keep, change, flip' method to divide $a/b \\div c/d$, what is the final operation performed?", "options": [{"text": "Keeping the first fraction $a/b$.", "isCorrect": false, "rationale": "Keeping the first fraction is the first step, not the final operation."}, {"text": "Changing the division sign to multiplication.", "isCorrect": false, "rationale": "Changing the sign is the second step, enabling the final operation."}, {"text": "Flipping the second fraction $c/d$ to $d/c$.", "isCorrect": false, "rationale": "Flipping the second fraction is the third step, setting up the final operation."}, {"text": "Multiplying the first fraction by the reciprocal of the second fraction.", "isCorrect": true, "rationale": "After 'keeping' the first fraction, 'changing' the operation, and 'flipping' the second fraction, the final step is to perform the multiplication, as indicated by 'To divide by a fraction, multiply by its reciprocal.'"}]}, {"question": "A painter has $7/2$ gallons of paint. If each wall requires $1/3$ gallon of paint, how many walls can the painter paint completely?", "options": [{"text": "$7/6$ walls", "isCorrect": false, "rationale": "This would be the result of multiplying the fractions without flipping the second one."}, {"text": "10 walls", "isCorrect": true, "rationale": "To find out how many walls can be painted, divide the total paint by the paint per wall: $7/2 \\div 1/3$. This becomes $7/2 \\times 3/1 = 21/2 = 10 \\, 1/2$. Since walls must be painted completely, the painter can paint 10 walls."}, {"text": "$2/21$ walls", "isCorrect": false, "rationale": "This results from flipping the first fraction instead of the second."}, {"text": "21 walls", "isCorrect": false, "rationale": "This is the result if 7/2 were divided by 1/6 (by multiplying 7/2 by 3/1, but not considering the remainder for 'completely')."}]}, {"question": "The caution in the text states: 'When dividing a fraction by a whole number, flip the whole number (write its reciprocal). Do not flip the fraction you started with.' Which of the following calculations demonstrates a violation of this caution?", "options": [{"text": "$5/9 \\div 3/1 = 5/9 \\times 1/3$", "isCorrect": false, "rationale": "This calculation correctly keeps the first fraction and flips the whole number (3/1 to 1/3)."}, {"text": "$2/7 \\div 4 = 7/2 \\times 1/4$", "isCorrect": true, "rationale": "This calculation incorrectly flips the first fraction (2/7 to 7/2) instead of only flipping the divisor (4/1 to 1/4), which directly violates the caution."}, {"text": "$10 \\div 2/3 = 10/1 \\times 3/2$", "isCorrect": false, "rationale": "This calculation correctly writes the whole number as a fraction and flips the divisor."}, {"text": "$1/5 \\div 2 = 1/5 \\times 2/1$", "isCorrect": false, "rationale": "This calculation incorrectly multiplies by the whole number instead of its reciprocal, but it does not involve flipping the first fraction itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
