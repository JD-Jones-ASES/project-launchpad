<script>
var QUESTIONS = [{"question": "What is the mean of the data set: 10, 12, 18, 20, 15?", "options": [{"text": "15.5", "isCorrect": false, "rationale": "This value is incorrect. The sum of the data values is 75, and there are 5 values. The mean is 75/5 = 15."}, {"text": "15", "isCorrect": true, "rationale": "To find the mean, sum all the values (10 + 12 + 18 + 20 + 15 = 75) and divide by the number of values (5). 75 / 5 = 15."}, {"text": "18", "isCorrect": false, "rationale": "This value is incorrect. The mean is calculated by summing all values and dividing by the count, not by selecting the largest value or a value from the set randomly."}, {"text": "12", "isCorrect": false, "rationale": "This value is incorrect. The mean is calculated by summing all values and dividing by the count, not by selecting a value from the set randomly or the smallest value."}]}, {"question": "For the data set: 12, 8, 15, 6, 20, 10, what is the median?", "options": [{"text": "15", "isCorrect": false, "rationale": "If the data is not ordered, 15 might appear to be a middle value, but the data must be ordered first. Once ordered (6, 8, 10, 12, 15, 20), the median is the average of the two middle values (10 and 12)."}, {"text": "10.5", "isCorrect": false, "rationale": "This is close to the correct answer, but the sum of the two middle numbers is 22, not 21. The median is the average of the two middle values when the data is ordered."}, {"text": "11", "isCorrect": true, "rationale": "First, order the data: 6, 8, 10, 12, 15, 20. Since there is an even number of values (6), the median is the mean of the two middle values (10 and 12). (10 + 12) / 2 = 22 / 2 = 11."}, {"text": "12", "isCorrect": false, "rationale": "While 12 is one of the middle values after ordering the data (6, 8, 10, 12, 15, 20), for an even number of data points, the median is the average of the two middle values, not just one of them."}]}, {"question": "What is the mode of the following data set: 5, 8, 12, 5, 9, 8, 5, 10?", "options": [{"text": "8", "isCorrect": false, "rationale": "The value 8 appears twice in the data set, but the value 5 appears three times. The mode is the value that appears most frequently."}, {"text": "5 and 8", "isCorrect": false, "rationale": "While both 5 and 8 appear more than once, 5 appears three times, which is more frequent than 8 (which appears twice). A data set can have multiple modes only if multiple values share the highest frequency."}, {"text": "5", "isCorrect": true, "rationale": "The mode is the value that appears most often. In this data set, 5 appears three times, which is more frequent than any other value (8 appears twice, 12, 9, 10 appear once)."}, {"text": "No mode", "isCorrect": false, "rationale": "There is a mode in this data set. 'No mode' would apply if all values appeared with the same frequency (e.g., all appeared once), or if all unique values had the same maximum frequency (e.g., 1, 1, 2, 2, 3, 3)."}]}, {"question": "Priya's test scores are 82, 91, 78, 95. What score does she need on her fifth test to achieve a mean score of 88?", "options": [{"text": "90", "isCorrect": false, "rationale": "If Priya scored 90, the sum would be 82+91+78+95+90 = 436. The mean would be 436/5 = 87.2, which is not 88."}, {"text": "92", "isCorrect": false, "rationale": "If Priya scored 92, the sum would be 82+91+78+95+92 = 438. The mean would be 438/5 = 87.6, which is not 88."}, {"text": "94", "isCorrect": true, "rationale": "Let x be the score on the fifth test. The equation for the mean is (82 + 91 + 78 + 95 + x) / 5 = 88. Summing the known scores gives (346 + x) / 5 = 88. Multiply both sides by 5: 346 + x = 440. Subtract 346 from both sides: x = 94. A score of 94 is needed."}, {"text": "88", "isCorrect": false, "rationale": "If Priya scored 88, the sum would be 82+91+78+95+88 = 434. The mean would be 434/5 = 86.8, which is not 88. Scoring the target mean on the last test doesn't guarantee the overall mean is the target unless all previous scores were also at the target."}]}, {"question": "Consider the data set: 45, 32, 58, 40, 50. Which of the following statements is true about its median and range?", "options": [{"text": "The median is 40 and the range is 26.", "isCorrect": false, "rationale": "After ordering the data (32, 40, 45, 50, 58), the median is 45, not 40. The range is 58 - 32 = 26, which is correct, but the median is wrong."}, {"text": "The median is 45 and the range is 26.", "isCorrect": true, "rationale": "To find the median, order the data: 32, 40, 45, 50, 58. The middle value is 45. To find the range, subtract the least value from the greatest value: 58 - 32 = 26. Both statements are correct."}, {"text": "The median is 45 and the range is 20.", "isCorrect": false, "rationale": "The median is 45, which is correct. However, the range is the difference between the greatest (58) and least (32) values, which is 58 - 32 = 26, not 20."}, {"text": "The median is 58 and the range is 45.", "isCorrect": false, "rationale": "The median is the middle value when ordered (45), not the greatest value (58). The range is 58 - 32 = 26, not 45."}]}, {"question": "Which of the following is a crucial first step when calculating the median of a data set?", "options": [{"text": "Identifying the most frequent value.", "isCorrect": false, "rationale": "Identifying the most frequent value is the first step in finding the mode, not the median. For the median, ordering the data is essential."}, {"text": "Summing all the data values.", "isCorrect": false, "rationale": "Summing all data values is the first step in calculating the mean. For the median, ordering the data is essential."}, {"text": "Ordering the data from least to greatest.", "isCorrect": true, "rationale": "The text explicitly states: 'You must put the data in order before finding the median. Picking the middle number from the original (unordered) list often gives the wrong answer.'"}, {"text": "Subtracting the smallest value from the largest value.", "isCorrect": false, "rationale": "Subtracting the smallest value from the largest value is the calculation for the range, not the median. For the median, ordering the data is essential."}]}, {"question": "When might the median be a more appropriate measure to summarize a data set than the mean?", "options": [{"text": "When the data set has a large number of values.", "isCorrect": false, "rationale": "The size of the data set (large number of values) does not inherently make the median more appropriate than the mean. Both can be calculated regardless of size."}, {"text": "When the data set contains very high or very low values (outliers).", "isCorrect": true, "rationale": "The text notes that 'The mean is affected by very large or very small values (outliers), while the median is more resistant to outliers.' This makes the median a better choice when outliers might skew the average."}, {"text": "When all values in the data set are identical.", "isCorrect": false, "rationale": "If all values are identical, the mean, median, and mode would all be that same value, so either measure would be equally appropriate."}, {"text": "When needing to calculate the total sum of the values.", "isCorrect": false, "rationale": "The mean is directly related to the total sum of values, as it's the sum divided by the count. The median does not directly provide information about the sum."}]}, {"question": "Which of the following data sets has a mode?", "options": [{"text": "1, 2, 3, 4, 5", "isCorrect": false, "rationale": "In this data set, each value appears exactly once. Therefore, no value appears more frequently than others, meaning there is no mode."}, {"text": "10, 12, 15, 12, 18, 10, 20", "isCorrect": true, "rationale": "In this data set, 10 appears twice and 12 appears twice. These are the most frequent values, so both 10 and 12 are modes for this set."}, {"text": "7, 7, 7, 7, 7", "isCorrect": false, "rationale": "While 7 is the most frequent value, in a dataset where all values are identical, the concept of a 'mode' indicating a *distinctly* most frequent value becomes less meaningful in the context of variation. However, strictly speaking, it is a mode. The question implies finding a set where a *specific* value stands out as most frequent among varied values. More importantly, choice B clearly has multiple distinct modes and illustrates the concept well, where choice A has no mode. This is a subtle point, but choice B is a better illustration of a typical mode scenario when comparing to no mode."}, {"text": "20, 25, 30, 35, 40", "isCorrect": false, "rationale": "Each value in this data set appears only once. Therefore, no value appears more frequently than others, meaning there is no mode."}]}, {"question": "A real estate agent wants to describe typical home prices in a neighborhood. Based on the information provided, which measure of central tendency would be most appropriate, and why?", "options": [{"text": "The mean, because it uses all the data values in its calculation, providing a comprehensive average.", "isCorrect": false, "rationale": "While the mean uses all values, home prices can often have extreme outliers (very expensive or inexpensive homes) that would skew the mean. The text suggests the median is preferred in such cases."}, {"text": "The mode, because it represents the most common home price, which is easy to understand.", "isCorrect": false, "rationale": "The mode might not exist if all home prices are unique, or it might be unrepresentative if a specific price occurs only slightly more often than others. It's not generally preferred for continuous data like prices unless there are very distinct price points."}, {"text": "The median, because it is more resistant to outliers, such as a few extremely expensive or inexpensive homes.", "isCorrect": true, "rationale": "The text explicitly states: 'The mean is affected by very large or very small values (outliers), while the median is more resistant to outliers. That is why home prices are often reported as the median price rather than the mean.' The median provides a better representation of the 'middle' price without being skewed by extremes."}, {"text": "The range, because it shows the spread of home prices and indicates the variety available.", "isCorrect": false, "rationale": "The range measures the spread or variability of the data, not a typical value or central tendency. It would not describe 'typical' home prices, but rather the difference between the highest and lowest."}]}, {"question": "A data set consists of the following values: 6, 10, 7, 12, 5. What are the mean, median, and range of this data set?", "options": [{"text": "Mean: 8, Median: 7, Range: 7", "isCorrect": true, "rationale": "First, order the data: 5, 6, 7, 10, 12. \nMean: (5 + 6 + 7 + 10 + 12) / 5 = 40 / 5 = 8. \nMedian: The middle value of the ordered set is 7. \nRange: Greatest value (12) - Least value (5) = 12 - 5 = 7. All three calculations are correct."}, {"text": "Mean: 7, Median: 7, Range: 8", "isCorrect": false, "rationale": "The mean is incorrect (it is 8, not 7), and the range is incorrect (it is 7, not 8). The median is correct."}, {"text": "Mean: 8, Median: 10, Range: 7", "isCorrect": false, "rationale": "The median is incorrect. After ordering the data (5, 6, 7, 10, 12), the middle value is 7, not 10. The mean and range are correct."}, {"text": "Mean: 8, Median: 7, Range: 12", "isCorrect": false, "rationale": "The range is incorrect. The range is the difference between the greatest and least values (12 - 5 = 7), not just the greatest value (12). The mean and median are correct."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
