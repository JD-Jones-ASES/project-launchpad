<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 7, Section 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following is defined as a reduction in the original price of an item?", "options": [{"text": "Sales Tax", "isCorrect": false, "rationale": "Sales tax is an extra amount charged by the government on purchases, increasing the total cost, not reducing the original price."}, {"text": "Tip", "isCorrect": false, "rationale": "A tip (or gratuity) is an extra amount of money given for a service, which is added to the bill, not a reduction in price."}, {"text": "Discount", "isCorrect": true, "rationale": "A discount is explicitly defined as a reduction in the original price of an item."}, {"text": "Simple Interest", "isCorrect": false, "rationale": "Simple interest is money earned or paid on an original amount (principal), typically increasing the total amount over time, not a reduction in a purchase price."}], "id": "q01"}, {"question": "A book costs $24.00. The sales tax rate is 7%. What is the total cost including tax?", "options": [{"text": "$1.68", "isCorrect": false, "rationale": "This is only the sales tax amount ($24.00 \times 0.07 = $1.68$), not the total cost including tax."}, {"text": "$22.32", "isCorrect": false, "rationale": "This would be the price if there was a 7% discount ($24.00 - 1.68 = $22.32$), not sales tax."}, {"text": "$25.68", "isCorrect": true, "rationale": "First, calculate the tax amount: $24.00 \times 0.07 = $1.68$. Then, add the tax to the original price: $24.00 + $1.68 = $25.68$."}, {"text": "$31.00", "isCorrect": false, "rationale": "This calculation is incorrect. It might be adding 7 directly to the price, or another miscalculation."}], "id": "q02"}, {"question": "A family's restaurant bill is $52.00. They want to leave a 15% tip. How much is the tip, and what is the total amount paid?", "options": [{"text": "Tip = $7.80; Total = $52.00", "isCorrect": false, "rationale": "While the tip amount is correct, the total amount paid must include the tip."}, {"text": "Tip = $7.80; Total = $59.80", "isCorrect": true, "rationale": "First, calculate the tip amount: $52.00 \times 0.15 = $7.80$. Then, add the tip to the bill to find the total: $52.00 + $7.80 = $59.80$."}, {"text": "Tip = $5.20; Total = $57.20", "isCorrect": false, "rationale": "This calculation incorrectly assumes a 10% tip or another miscalculation."}, {"text": "Tip = $15.00; Total = $67.00", "isCorrect": false, "rationale": "This incorrectly assumes a $15 tip rather than 15%."}], "id": "q03"}, {"question": "A backpack has an original price of $55.00 and is on sale for 20% off. What is the sale price?", "options": [{"text": "$11.00", "isCorrect": false, "rationale": "This is the discount amount ($55.00 \times 0.20 = $11.00$), not the sale price."}, {"text": "$44.00", "isCorrect": true, "rationale": "First, find the discount amount: $55.00 \times 0.20 = $11.00$. Then, subtract the discount from the original price: $55.00 - $11.00 = $44.00$. Alternatively, if it's 20% off, you pay 80% of the original price: $55.00 \times 0.80 = $44.00$."}, {"text": "$66.00", "isCorrect": false, "rationale": "This would be the price if 20% were added, which is a markup, not a discount."}, {"text": "$35.00", "isCorrect": false, "rationale": "This calculation is incorrect. It might be $55 - 20 = $35, incorrectly subtracting a dollar amount instead of a percentage."}], "id": "q04"}, {"question": "Which of the following scenarios always results in a final amount that is *less* than the original value?", "options": [{"text": "Calculating total cost with sales tax", "isCorrect": false, "rationale": "Sales tax is added to the original price, resulting in a higher total."}, {"text": "Calculating total bill with a tip", "isCorrect": false, "rationale": "A tip is added to the original bill, resulting in a higher total."}, {"text": "Calculating the sale price of an item with a discount", "isCorrect": true, "rationale": "A discount is a reduction in the original price, meaning the sale price will always be less than the original price."}, {"text": "Calculating the total amount in an account with simple interest", "isCorrect": false, "rationale": "Simple interest is typically earned and added to the principal, resulting in a higher total amount in the account over time (unless it's interest paid on a loan, where it's an additional cost)."}], "id": "q05"}, {"question": "Rosa deposits $500 in a savings account that earns 4% simple interest per year. How much interest does she earn after 3 years?", "options": [{"text": "$20.00", "isCorrect": false, "rationale": "This is the interest earned for only one year ($500 \times 0.04 = $20$), not three years."}, {"text": "$60.00", "isCorrect": true, "rationale": "Using the simple interest formula $I = Prt$: $P = $500$, $r = 0.04$ (as a decimal), and $t = 3$ years. So, $I = 500 \times 0.04 \times 3 = $60.00$."}, {"text": "$560.00", "isCorrect": false, "rationale": "This is the total amount in the account (principal + interest), not just the interest earned."}, {"text": "$1500.00", "isCorrect": false, "rationale": "This is the principal amount, without any interest earned."}], "id": "q06"}, {"question": "What is the total amount in Rosa's savings account after 3 years, given her initial deposit of $500 at 4% simple interest per year?", "options": [{"text": "$500.00", "isCorrect": false, "rationale": "This is the principal amount, without any interest added."}, {"text": "$60.00", "isCorrect": false, "rationale": "This is only the interest earned, not the total amount in the account."}, {"text": "$560.00", "isCorrect": true, "rationale": "The total amount is the principal plus the interest. From the previous calculation, the interest earned is $60.00. So, the total amount is $500.00 (principal) + $60.00 (interest) = $560.00$."}, {"text": "$520.00", "isCorrect": false, "rationale": "This would be the total amount after only one year of interest ($500 + (500 \times 0.04) = $520$)."}], "id": "q07"}, {"question": "In the simple interest formula $I = Prt$, which units are required for the annual interest rate ($r$) and the time ($t$)?", "options": [{"text": "The rate $r$ must be a percentage, and time $t$ can be in any unit.", "isCorrect": false, "rationale": "The text explicitly states that 'the rate $r$ must be written as a decimal, not a percent,' and 'time $t$ must be in years.'"}, {"text": "The rate $r$ must be a decimal, and time $t$ must be in years.", "isCorrect": true, "rationale": "The caution note clearly states, 'In the formula $I = Prt$, the rate $r$ must be written as a decimal, not a percent. Also, time $t$ must be in years.'"}, {"text": "The rate $r$ can be a percentage or decimal, and time $t$ must be in months.", "isCorrect": false, "rationale": "The rate $r$ must be a decimal, not a percentage, and time $t$ must be in years, not months."}, {"text": "The rate $r$ must be an integer, and time $t$ must be in days.", "isCorrect": false, "rationale": "The rate $r$ is derived from a percentage and expressed as a decimal, not an integer, and time $t$ must be in years, not days."}], "id": "q08"}, {"question": "James borrows $1,000 at 5% simple interest for 6 months. How much interest does he owe?", "options": [{"text": "$50.00", "isCorrect": false, "rationale": "This is the interest for a full year ($1,000 \times 0.05 \times 1 = $50.00$), not 6 months."}, {"text": "$25.00", "isCorrect": true, "rationale": "First, convert 6 months to years: $6/12 = 0.5$ years. Then, use $I = Prt$: $I = 1,000 \times 0.05 \times 0.5 = $25.00$."}, {"text": "$300.00", "isCorrect": false, "rationale": "This calculation is incorrect. It might be $1,000 \times 0.05 \times 6$, incorrectly treating months as years."}, {"text": "$1,025.00", "isCorrect": false, "rationale": "This is the total amount (principal + interest), not just the interest owed."}], "id": "q09"}, {"question": "A refrigerator is on sale for 15% off its original price of $800.00. After the discount, a 6% sales tax is applied to the sale price. What is the final total cost?", "options": [{"text": "$680.00", "isCorrect": false, "rationale": "This is only the discounted price ($800 \times 0.85 = $680$), without the sales tax added."}, {"text": "$720.80", "isCorrect": true, "rationale": "First, calculate the discounted price: $800.00 \times (1 - 0.15) = 800.00 \times 0.85 = $680.00$. Next, calculate the sales tax on the discounted price: $680.00 \times 0.06 = $40.80$. Finally, add the tax to the discounted price: $680.00 + $40.80 = $720.80$."}, {"text": "$848.00", "isCorrect": false, "rationale": "This calculation is incorrect. It might apply the tax to the original price, or other calculation errors."}, {"text": "$728.00", "isCorrect": false, "rationale": "This calculation might be $800 \times (1 - 0.15 + 0.06)$, which incorrectly applies the percentages directly to the original price."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
