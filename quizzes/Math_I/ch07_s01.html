<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 7, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental meaning of the word \"percent\"?", "options": [{"text": "per item", "isCorrect": false, "rationale": "The Latin root 'centum' refers to one hundred, not an individual item."}, {"text": "per hundred", "isCorrect": true, "rationale": "The text explicitly states, \"The word percent comes from the Latin per centum, meaning 'per hundred.'\""}, {"text": "part of a whole", "isCorrect": false, "rationale": "While a percent often represents a part of a whole, this is not the direct meaning of the word's etymology."}, {"text": "out of many", "isCorrect": false, "rationale": "This definition is too vague and does not align with the specific meaning derived from the word's origin."}], "id": "q01"}, {"question": "If a 10 x 10 grid has 60 squares shaded, what percent does this represent?", "options": [{"text": "6%", "isCorrect": false, "rationale": "Each small square represents 1%, so 60 squares represent 60%, not 6%."}, {"text": "0.6%", "isCorrect": false, "rationale": "0.6% would be less than one square, or a fraction of a percent."}, {"text": "60%", "isCorrect": true, "rationale": "The text states that 'Each small square represents 1%' and demonstrates that 'Shading 45 squares shows 45%.' Therefore, 60 shaded squares represent 60%."}, {"text": "100%", "isCorrect": false, "rationale": "100% would mean all 100 squares of the grid are shaded."}], "id": "q02"}, {"question": "According to the Percent Grid Model property, shading all 100 squares on a 10 x 10 grid signifies what?", "options": [{"text": "An incomplete representation of the total.", "isCorrect": false, "rationale": "Shading all 100 squares represents the total, which is a complete, not incomplete, representation."}, {"text": "The absence of any percentage.", "isCorrect": false, "rationale": "Shading all 100 squares represents 100%, not the absence of a percentage. 0% represents absence."}, {"text": "Half of the total possible percentage.", "isCorrect": false, "rationale": "Half of the total would be 50 squares, representing 50%."}, {"text": "The entirety of something, or 100%.", "isCorrect": true, "rationale": "The Percent Grid Model property states, 'Shading all 100 squares shows 100%,' and the note further clarifies that '100% means all of something.'"}], "id": "q03"}, {"question": "A fraction is given as 87/100. What is this equivalent to as a percent?", "options": [{"text": "870%", "isCorrect": false, "rationale": "This would be equivalent to 870/100 or 8.7, not 87%."}, {"text": "8.7%", "isCorrect": false, "rationale": "This would imply 8.7 out of 100."}, {"text": "87%", "isCorrect": true, "rationale": "The property 'Fraction to Percent (Denominator of 100)' states, 'If the denominator of a fraction is 100, the numerator is the percent: n/100 = n%.' Therefore, 87/100 equals 87%."}, {"text": "100%", "isCorrect": false, "rationale": "100% would be represented by 100/100."}], "id": "q04"}, {"question": "Write the fraction 4/5 as a percent.", "options": [{"text": "45%", "isCorrect": false, "rationale": "This incorrectly treats the numerator as the percent without finding an equivalent fraction with a denominator of 100."}, {"text": "80%", "isCorrect": true, "rationale": "To write 4/5 as a percent, find an equivalent fraction with a denominator of 100. Multiply both the numerator and denominator by 20: (4 * 20) / (5 * 20) = 80/100, which is 80%. This method is shown in the 'Writing a Fraction as a Percent' example."}, {"text": "54%", "isCorrect": false, "rationale": "This option reverses the numerator and denominator and does not correctly convert the fraction to a percent."}, {"text": "20%", "isCorrect": false, "rationale": "20% is equivalent to 1/5, not 4/5."}], "id": "q05"}, {"question": "The symbol \"%\" in mathematics directly translates to what phrase?", "options": [{"text": "divided by", "isCorrect": false, "rationale": "While percents are related to division, the symbol itself does not mean 'divided by.'"}, {"text": "times ten", "isCorrect": false, "rationale": "There is no direct relation to 'times ten' in the definition of the percent symbol."}, {"text": "out of 100", "isCorrect": true, "rationale": "The text explicitly states, 'The symbol % means 'out of 100.''"}, {"text": "equal to", "isCorrect": false, "rationale": "The symbol represents a relationship to 100, not general equality."}], "id": "q06"}, {"question": "On a test with 25 questions, Sarah answered 22 questions correctly. What percent of the questions did she answer correctly?", "options": [{"text": "22%", "isCorrect": false, "rationale": "22 is the number of correct answers, not the percentage. To find the percentage, you need to compare it to the total number of questions."}, {"text": "88%", "isCorrect": true, "rationale": "Sarah answered 22 out of 25 correctly, which can be written as the fraction 22/25. To convert this to a percent, find an equivalent fraction with a denominator of 100: (22 * 4) / (25 * 4) = 88/100, which equals 88%. This process is demonstrated in the 'Test Score as a Percent' example."}, {"text": "25%", "isCorrect": false, "rationale": "25 is the total number of questions, not the percentage of correct answers."}, {"text": "78%", "isCorrect": false, "rationale": "This percentage is not derived from the given information. The percentage of incorrect answers would be 3/25, or 12%."}], "id": "q07"}, {"question": "The text mentions that a percent greater than 100% is possible. Which scenario best illustrates this concept?", "options": [{"text": "A store offering a 50% discount on an item.", "isCorrect": false, "rationale": "A 50% discount means the price is reduced to 50% of the original, which is less than 100%."}, {"text": "A student scoring 95% on a quiz.", "isCorrect": false, "rationale": "95% is less than 100% and represents a portion of a whole."}, {"text": "A plant growing to 250% of its original height.", "isCorrect": true, "rationale": "The 'caution' note provides this exact example: 'if a plant grew from 20 cm to 50 cm, the new height is 50/20 = 250/100 = 250% of the original height.' This clearly illustrates a quantity exceeding its original value in percentage terms."}, {"text": "A battery level indicating 0%.", "isCorrect": false, "rationale": "0% represents the complete absence of something, which is far less than 100%."}], "id": "q08"}, {"question": "If each small square in a 10 x 10 grid represents 1%, how many squares would need to be shaded to represent 7%?", "options": [{"text": "1 square", "isCorrect": false, "rationale": "One square represents 1%, not 7%."}, {"text": "7 squares", "isCorrect": true, "rationale": "The Percent Grid Model property states, 'Each small square represents 1%.' Therefore, to represent 7%, 7 small squares would need to be shaded."}, {"text": "10 squares", "isCorrect": false, "rationale": "10 squares would represent 10%."}, {"text": "70 squares", "isCorrect": false, "rationale": "70 squares would represent 70%."}], "id": "q09"}, {"question": "Based on the \"Understanding Percents Summary,\" which of the following statements is TRUE?", "options": [{"text": "A percent can only be less than or exactly 100%.", "isCorrect": false, "rationale": "The summary states, 'Percents can be less than 1%, exactly 100%, or greater than 100%.'"}, {"text": "The symbol \"%\" means \"per thousand.\"", "isCorrect": false, "rationale": "The summary states, 'The symbol % means 'per hundred.''"}, {"text": "A 10 x 10 grid models percents where each small square is 1%.", "isCorrect": true, "rationale": "The summary explicitly states, 'A 10 x 10 grid models percents: each small square is 1%.'"}, {"text": "To write a fraction as a percent, you always divide the numerator by 100.", "isCorrect": false, "rationale": "The summary states, 'To write a fraction as a percent, rewrite it with a denominator of 100.' You then take the numerator as the percent, not divide it by 100."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
