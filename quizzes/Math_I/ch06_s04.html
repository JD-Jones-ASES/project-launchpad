<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 6, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary purpose of a \"scale\" in the context of drawings and maps?", "options": [{"text": "To define the drawing's artistic style.", "isCorrect": false, "rationale": "While drawings may have style, the scale's purpose is not artistic but mathematical, relating measurements to reality."}, {"text": "To measure the exact weight of the object being drawn.", "isCorrect": false, "rationale": "A scale compares lengths, not weight."}, {"text": "To compare a length in a drawing to the corresponding actual length.", "isCorrect": true, "rationale": "The text explicitly defines a scale as 'a ratio that compares a length in a drawing or model to the corresponding actual length.'"}, {"text": "To convert metric units to imperial units.", "isCorrect": false, "rationale": "Scales can involve different units, but their primary purpose isn't unit conversion itself; it's relating sizes, which might necessitate conversion if the scale factor is required."}], "id": "q01"}, {"question": "If a scale drawing has a scale of $1 cm : 20 m$, what is the scale factor?", "options": [{"text": "$1/20$", "isCorrect": false, "rationale": "This ratio incorrectly mixes units. To find the scale factor, both measurements must be in the same unit."}, {"text": "$1/2000$", "isCorrect": true, "rationale": "The scale factor is the ratio with consistent units. $1 cm : 20 m$ means $1 cm : (20 \\times 100) cm = 1 cm : 2000 cm$. The scale factor is $1/2000$."}, {"text": "$20/1$", "isCorrect": false, "rationale": "This inverts the ratio and also incorrectly mixes units."}, {"text": "$2000/1$", "isCorrect": false, "rationale": "This inverts the ratio and represents the actual length to the drawing length, not the scale factor (drawing to actual)."}], "id": "q02"}, {"question": "A map uses the scale $1 inch : 50 miles$. If you measure $2.5$ inches between two cities on this map, what is the actual distance between them?", "options": [{"text": "$50$ miles", "isCorrect": false, "rationale": "This would be the distance for 1 inch on the map, not 2.5 inches."}, {"text": "$25$ miles", "isCorrect": false, "rationale": "This would be the distance for 0.5 inches on the map, not 2.5 inches."}, {"text": "$125$ miles", "isCorrect": true, "rationale": "Set up a proportion: $\\frac{1 \\text{ inch}}{50 \\text{ miles}} = \\frac{2.5 \\text{ inches}}{d \\text{ miles}}$. Cross-multiplying gives $1 \\times d = 50 \\times 2.5$, so $d = 125$ miles."}, {"text": "$20$ miles", "isCorrect": false, "rationale": "This value is derived from an incorrect calculation, possibly dividing 50 by 2.5."}], "id": "q03"}, {"question": "An engineer is designing a model bridge with an actual length of $300$ feet. If the model uses a scale of $1 inch : 25 feet$, what should be the length of the bridge in the model?", "options": [{"text": "$12$ inches", "isCorrect": true, "rationale": "Set up a proportion: $\\frac{1 \\text{ inch}}{25 \\text{ feet}} = \\frac{d \\text{ inches}}{300 \\text{ feet}}$. Cross-multiplying gives $25d = 300 \\times 1$, so $d = \\frac{300}{25} = 12$ inches."}, {"text": "$7500$ inches", "isCorrect": false, "rationale": "This would be the result of multiplying the actual length by the scale's 'feet' component ($300 \\times 25$), which is incorrect."}, {"text": "$30$ inches", "isCorrect": false, "rationale": "This is a plausible incorrect answer, possibly from dividing 300 by 10 instead of 25."}, {"text": "$1.2$ inches", "isCorrect": false, "rationale": "This is a plausible incorrect answer, possibly from dividing 30 by 25 or a similar error."}], "id": "q04"}, {"question": "A scale drawing has a scale of $1 cm : 5 m$. If a student incorrectly sets up a proportion as $\\frac{1 cm}{5 cm} = \\frac{\\text{drawing length}}{\\text{actual length}}$, what fundamental mistake are they making according to the text's caution?", "options": [{"text": "They are confusing the drawing length with the actual length.", "isCorrect": false, "rationale": "While potential for confusion exists, the primary mistake in the given setup is unit inconsistency in the ratio itself."}, {"text": "They are mixing up different units in the ratio, which violates the principle of consistency and leads to incorrect results.", "isCorrect": true, "rationale": "The 'caution' box explicitly warns: 'Always check the units... Do not mix up the units when you set up your proportion.' The setup $\\frac{1 cm}{5 cm}$ implies 5 cm is the actual length, not 5 meters, thus mixing units in the original scale expression."}, {"text": "They are not cross-multiplying correctly.", "isCorrect": false, "rationale": "The error is in setting up the initial proportion, not in the method of solving it."}, {"text": "They are using an inappropriate scale for the drawing.", "isCorrect": false, "rationale": "The scale itself might be appropriate; the error lies in how it's used in the proportion, specifically regarding unit consistency."}], "id": "q05"}, {"question": "A blueprint for a rectangular garden uses a scale of $1$ inch : $4$ feet. On the blueprint, the garden measures $6$ inches by $10$ inches. What are the actual dimensions of the garden?", "options": [{"text": "$1.5$ feet by $2.5$ feet", "isCorrect": false, "rationale": "This would be the result if the scale was 4 inches : 1 foot, not 1 inch : 4 feet."}, {"text": "$24$ feet by $40$ feet", "isCorrect": true, "rationale": "For the length: $\\frac{1 \\text{ inch}}{4 \\text{ feet}} = \\frac{6 \\text{ inches}}{L \\text{ feet}} \\Rightarrow L = 6 \\times 4 = 24$ feet. For the width: $\\frac{1 \\text{ inch}}{4 \\text{ feet}} = \\frac{10 \\text{ inches}}{W \\text{ feet}} \\Rightarrow W = 10 \\times 4 = 40$ feet. So, 24 feet by 40 feet."}, {"text": "$6$ feet by $10$ feet", "isCorrect": false, "rationale": "This assumes the blueprint measurements are already the actual measurements, ignoring the scale."}, {"text": "$40$ feet by $24$ feet", "isCorrect": false, "rationale": "While the correct numbers, the order of dimensions (length by width or width by length) should typically follow the given blueprint order for clarity, or state explicitly 'width by length'."}], "id": "q06"}, {"question": "Why do architects, engineers, and mapmakers use scale drawings instead of drawing objects at their actual size?", "options": [{"text": "To make the drawings more aesthetically pleasing.", "isCorrect": false, "rationale": "While scale drawings can be well-designed, their primary purpose is not aesthetic but practical for representing real-world sizes."}, {"text": "To create a precise representation of large objects or distances on a manageable surface.", "isCorrect": true, "rationale": "The text states scale drawings 'represent large objects or distances on a smaller piece of paper' and are used by professionals for this purpose."}, {"text": "To reduce the cost of drawing materials.", "isCorrect": false, "rationale": "The cost of materials is a minor factor compared to the functional necessity of representing large objects on paper."}, {"text": "To simplify the mathematical calculations involved in design.", "isCorrect": false, "rationale": "Scale drawings introduce calculations (proportions) that wouldn't exist if drawing actual size. They facilitate design, but don't simplify the math of *scaling* itself."}], "id": "q07"}, {"question": "A model car has a scale factor of $1/50$. If the actual car is $4.5$ meters long, how long is the model car in centimeters?", "options": [{"text": "$9$ cm", "isCorrect": true, "rationale": "The scale factor is $\\frac{\\text{model length}}{\\text{actual length}} = \\frac{1}{50}$. First, convert the actual length to centimeters: $4.5 \\text{ meters} = 4.5 \\times 100 = 450 \\text{ cm}$. Then, model length = $\\frac{1}{50} \\times 450 \\text{ cm} = 9 \\text{ cm}$."}, {"text": "$225$ cm", "isCorrect": false, "rationale": "This would be the result of multiplying the actual length (in meters) by 50, which is incorrect."}, {"text": "$90$ cm", "isCorrect": false, "rationale": "This would be the result of a calculation error, perhaps if the actual length was 4500 cm or a division error."}, {"text": "$0.09$ cm", "isCorrect": false, "rationale": "This would be the result if the actual length was in cm and divided by 500 or similar error."}], "id": "q08"}, {"question": "Which of the following statements correctly distinguishes between a \"scale\" and a \"scale factor\"?", "options": [{"text": "A scale factor is always a larger number than a scale.", "isCorrect": false, "rationale": "A scale factor is the scale expressed as a single number (a fraction or decimal), so its magnitude depends on the specific scale."}, {"text": "A scale is a ratio that may use different units (e.g., cm:km), while a scale factor is the same ratio expressed as a single number with consistent units.", "isCorrect": true, "rationale": "The text states, 'A scale is a ratio that compares a length in a drawing... to the corresponding actual length.' It notes scales can use different units (e.g., 1 cm : 50 km). It defines 'scale factor' as 'the ratio... expressed as a single number,' implying unit consistency for a true ratio."}, {"text": "A scale is used for maps, while a scale factor is used for blueprints.", "isCorrect": false, "rationale": "Both terms apply to all scale drawings like maps and blueprints; their usage is not restricted by the type of drawing."}, {"text": "A scale factor is only applicable for enlarging objects, whereas a scale can be for both enlarging and reducing.", "isCorrect": false, "rationale": "Both scale and scale factor can be used for reducing (e.g., map) or enlarging (e.g., drawing of a microchip) objects."}], "id": "q09"}, {"question": "A large mural has an actual height of $15$ feet. On a contractor's rendering, the mural is depicted with a height of $3$ inches. What scale did the contractor use for the rendering?", "options": [{"text": "$1$ inch : $5$ feet", "isCorrect": true, "rationale": "The scale is the ratio of drawing length to actual length. Scale = $\\frac{3 \\text{ inches}}{15 \\text{ feet}}$. Dividing both parts of the ratio by 3 gives $\\frac{1 \\text{ inch}}{5 \\text{ feet}}$, or $1 \\text{ inch} : 5 \\text{ feet}$."}, {"text": "$1$ inch : $45$ feet", "isCorrect": false, "rationale": "This would be the result if the actual height was $3 \\times 15 = 45$ feet for 1 inch, which is incorrect."}, {"text": "$1$ inch : $0.2$ feet", "isCorrect": false, "rationale": "This inverts the ratio and also converts the actual length incorrectly ($15/3 = 5$, not $0.2$)."}, {"text": "$1$ inch : $15$ feet", "isCorrect": false, "rationale": "This would be the scale if the rendering was 1 inch for 15 feet, but it's 3 inches for 15 feet."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
