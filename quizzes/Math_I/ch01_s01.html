<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 1, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary factor that determines the place value of a digit in our number system?", "options": [{"text": "The numerical value of the digit itself, regardless of its position.", "isCorrect": false, "rationale": "Place value is not determined solely by the digit's intrinsic value, but by its position."}, {"text": "Its position within the number, where each place is ten times the value of the place to its right.", "isCorrect": true, "rationale": "The text states that 'Place value is the value of a digit based on its position in a number. Each place is ten times the place to its right,' which is the fundamental definition."}, {"text": "The number of digits preceding it in the sequence.", "isCorrect": false, "rationale": "While related to position, this description is not the formal definition of place value or its underlying mathematical principle."}, {"text": "Whether the digit is an even or an odd number.", "isCorrect": false, "rationale": "The parity (even or odd) of a digit does not influence its place value."}]}, {"question": "In the number $6,145,923$, what is the place value of the digit $1$?", "options": [{"text": "Thousands place", "isCorrect": false, "rationale": "The digit 5 is in the thousands place."}, {"text": "Hundred thousands place", "isCorrect": true, "rationale": "Starting from the right, the places are ones, tens, hundreds, thousands, ten thousands, and then hundred thousands. The digit 1 occupies the hundred thousands place."}, {"text": "Millions place", "isCorrect": false, "rationale": "The digit 6 is in the millions place."}, {"text": "Ten thousands place", "isCorrect": false, "rationale": "The digit 4 is in the ten thousands place."}]}, {"question": "Which of the following correctly represents the number $7,025$ in expanded form?", "options": [{"text": "$7 + 0 + 2 + 5$", "isCorrect": false, "rationale": "This represents the sum of the digits, not their values based on place."}, {"text": "$7,000 + 20 + 5$", "isCorrect": true, "rationale": "Expanded form shows the value of each digit based on its position: 7 thousands ($7,000$), 0 hundreds (not written), 2 tens ($20$), and 5 ones ($5$). Therefore, $7,000 + 20 + 5$ is correct."}, {"text": "$700 + 20 + 5$", "isCorrect": false, "rationale": "This form incorrectly represents the thousands digit as hundreds."}, {"text": "$7,000 + 200 + 50$", "isCorrect": false, "rationale": "This form incorrectly represents the tens and ones digits."}]}, {"question": "Round $18,349$ to the nearest thousand.", "options": [{"text": "$18,000$", "isCorrect": true, "rationale": "The digit in the thousands place is 8. The digit to its right is 3. Since 3 is less than 5, we keep the rounding digit (8) the same and replace all digits to its right with zeros, resulting in $18,000$."}, {"text": "$19,000$", "isCorrect": false, "rationale": "This would be the result if the digit to the right of the thousands place (the hundreds digit) were 5 or greater."}, {"text": "$18,300$", "isCorrect": false, "rationale": "This shows rounding to the nearest hundred, not the nearest thousand."}, {"text": "$20,000$", "isCorrect": false, "rationale": "This shows rounding to the nearest ten thousand."}]}, {"question": "When rounding $5,429$ to the nearest hundred, what is the correct rounded number?", "options": [{"text": "$5,000$", "isCorrect": false, "rationale": "This would be rounding to the nearest thousand, not hundred."}, {"text": "$5,400$", "isCorrect": true, "rationale": "The digit in the hundreds place is 4. The digit to its right (the tens place) is 2. Since 2 is less than 5, we keep the rounding digit (4) the same and replace all digits to its right with zeros, resulting in $5,400$."}, {"text": "$5,500$", "isCorrect": false, "rationale": "This would be the result if the digit in the tens place were 5 or greater, causing the 4 to round up to 5."}, {"text": "$5,430$", "isCorrect": false, "rationale": "This shows rounding to the nearest ten, not the nearest hundred."}]}, {"question": "Round $4,981$ to the nearest hundred. What is the result, considering the special case for the digit 9?", "options": [{"text": "$4,900$", "isCorrect": false, "rationale": "The digit 8 in the tens place is 5 or greater, so the rounding digit (9) must be rounded up."}, {"text": "$5,000$", "isCorrect": true, "rationale": "The digit in the hundreds place is 9. The digit to its right (the tens place) is 8. Since 8 is 5 or greater, we round up the 9. When 9 rounds up, it becomes 10, so we write 0 in the hundreds place and carry 1 to the thousands place. The thousands digit (4) becomes 5, and all digits to the right become zeros, resulting in $5,000$."}, {"text": "$4,000$", "isCorrect": false, "rationale": "This would be rounding to the nearest thousand and incorrectly rounding down."}, {"text": "$4,980$", "isCorrect": false, "rationale": "This shows rounding to the nearest ten, not the nearest hundred."}]}, {"question": "A business owner needs to quickly verify if the total of three large invoice amounts ($1,875, $3,210, $945$) is reasonable before a detailed calculation. Which method would be most effective for this quick check?", "options": [{"text": "Calculating the exact sum using a calculator.", "isCorrect": false, "rationale": "While accurate, this doesn't constitute an 'estimation' or 'quick check' and defeats the purpose of verifying reasonableness *before* detailed calculation."}, {"text": "Converting each number to expanded form.", "isCorrect": false, "rationale": "Expanded form helps understand place value but is not a method for quickly estimating a sum."}, {"text": "Rounding each amount to the nearest thousand and then summing them.", "isCorrect": true, "rationale": "Rounding each number to a convenient place (like the leading digit or nearest thousand here) and then performing the operation is the definition of estimating. This provides a quick, approximate answer to check reasonableness."}, {"text": "Writing each number in word form to identify potential errors.", "isCorrect": false, "rationale": "Word form is a way to write numbers but is not a method for estimation or quick verification of a sum."}]}, {"question": "Estimate the sum of $367 + 512$ by rounding each number to the nearest hundred.", "options": [{"text": "$800$", "isCorrect": false, "rationale": "Rounding $367$ to the nearest hundred gives $400$. Rounding $512$ to the nearest hundred gives $500$. The sum is $400 + 500 = 900$."}, {"text": "$879$", "isCorrect": false, "rationale": "This is the exact sum, not an estimate obtained by rounding."}, {"text": "$900$", "isCorrect": true, "rationale": "To round $367$ to the nearest hundred, look at the tens digit (6). Since 6 is 5 or greater, round up: $367$ becomes $400$. To round $512$ to the nearest hundred, look at the tens digit (1). Since 1 is less than 5, keep the hundreds digit the same: $512$ becomes $500$. The estimated sum is $400 + 500 = 900$."}, {"text": "$1,000$", "isCorrect": false, "rationale": "This would be an overestimate, possibly from incorrect rounding or rounding to a different place."}]}, {"question": "A small business orders $28$ cases of paper, with each case costing $19$. Estimate the total cost by rounding each number to the nearest ten.", "options": [{"text": "$400$", "isCorrect": false, "rationale": "Rounding $28$ to $30$ and $19$ to $20$, the product is $30 \times 20 = 600$."}, {"text": "$500$", "isCorrect": false, "rationale": "Rounding $28$ to $30$ and $19$ to $20$, the product is $30 \times 20 = 600$."}, {"text": "$532$", "isCorrect": false, "rationale": "This is the exact product ($28 \times 19 = 532$), not an estimate."}, {"text": "$600$", "isCorrect": true, "rationale": "To round $28$ to the nearest ten, look at the ones digit (8). Since 8 is 5 or greater, round up: $28$ becomes $30$. To round $19$ to the nearest ten, look at the ones digit (9). Since 9 is 5 or greater, round up: $19$ becomes $20$. The estimated total cost is $30 \times 20 = 600$."}]}, {"question": "According to the text, when choosing a rounding place for estimation, what is the key consideration to achieve the most useful estimate?", "options": [{"text": "Always rounding to the smallest possible place value to ensure maximum accuracy.", "isCorrect": false, "rationale": "The text states that 'rounding to a smaller place gives a more accurate estimate but harder arithmetic,' indicating that simply maximizing accuracy isn't always the goal for *useful* estimation."}, {"text": "Always rounding to the largest possible place value for the easiest arithmetic.", "isCorrect": false, "rationale": "While this makes arithmetic easier, it can lead to a less accurate estimate. The goal is a balance, not just ease."}, {"text": "Choosing the place that balances between accuracy and convenience for the arithmetic.", "isCorrect": true, "rationale": "The text explicitly states: 'Choose the place that balances accuracy and convenience.' This means finding a middle ground where the estimate is close enough to the exact answer but simple enough to calculate mentally or quickly."}, {"text": "Using only front-end estimation, as it is always the quickest method.", "isCorrect": false, "rationale": "Front-end estimation is quick, but the text advises choosing the place that balances accuracy and convenience, implying that front-end estimation might not always be the best balance for all situations."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
