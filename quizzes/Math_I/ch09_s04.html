<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 9, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines a circle according to the textbook?", "options": [{"text": "A shape with all points equidistant from its perimeter.", "isCorrect": false, "rationale": "This definition is incorrect. Points are equidistant from the center, not the perimeter."}, {"text": "A polygon with an infinite number of sides.", "isCorrect": false, "rationale": "While a circle can be thought of as a limit of polygons, the textbook defines it more fundamentally as a set of points."}, {"text": "The set of all points in a plane that are the same distance from a fixed center point.", "isCorrect": true, "rationale": "This is the precise definition provided in the 'keyterm[Circle]' section of the textbook."}, {"text": "Any closed curve that has a constant radius.", "isCorrect": false, "rationale": "While a circle is a closed curve with a constant radius, the definition in the text emphasizes the 'set of all points' from a 'fixed center point'."}], "id": "q01"}, {"question": "A bicycle wheel has a diameter of 28 inches. What is the radius of the wheel?", "options": [{"text": "56 inches", "isCorrect": false, "rationale": "56 inches would be twice the diameter, not the radius. The diameter is twice the radius, so the radius is half the diameter."}, {"text": "14 inches", "isCorrect": true, "rationale": "The diameter (d) is twice the radius (r), so r = d/2. For a diameter of 28 inches, the radius is 28/2 = 14 inches."}, {"text": "7 inches", "isCorrect": false, "rationale": "7 inches would be one-fourth of the diameter, or half the radius. The radius is half the diameter."}, {"text": "28 inches", "isCorrect": false, "rationale": "28 inches is the diameter itself, not the radius. The radius is half the diameter."}], "id": "q02"}, {"question": "A circular rug has a radius of 5 feet. Using $\\pi \\approx 3.14$, what is the circumference of the rug?", "options": [{"text": "15.7 feet", "isCorrect": false, "rationale": "This would be the circumference if the diameter was 5 feet (C = 3.14 * 5). However, 5 feet is the radius, so the diameter is 10 feet."}, {"text": "31.4 feet", "isCorrect": true, "rationale": "The circumference formula is C = 2$\\pi$r. Given a radius (r) of 5 feet and $\\pi \\approx 3.14$, C = 2 * 3.14 * 5 = 31.4 feet."}, {"text": "78.5 square feet", "isCorrect": false, "rationale": "This is the area of the rug (A = 3.14 * 5^2 = 78.5), not its circumference, and the units are incorrect for circumference."}, {"text": "25.12 feet", "isCorrect": false, "rationale": "This calculation (3.14 * 8) does not correspond to a radius of 5 feet. It's likely a miscalculation or confusion with diameter."}], "id": "q03"}, {"question": "A circular garden has a diameter of 14 meters. Using $\\pi \\approx \\frac{22}{7}$, what is the area of the garden?", "options": [{"text": "44 m$^2$", "isCorrect": false, "rationale": "This would be the circumference (C = $\\pi$d = (22/7)*14 = 44 m), not the area."}, {"text": "154 m$^2$", "isCorrect": true, "rationale": "First, find the radius: r = d/2 = 14/2 = 7 m. Then, use the area formula A = $\\pi$r$^2$. A = (22/7) * 7$^2$ = (22/7) * 49 = 22 * 7 = 154 m$^2$. This matches the 'Finding the Area Given the Diameter' example."}, {"text": "616 m$^2$", "isCorrect": false, "rationale": "This would be the result of using the diameter as the radius (A = (22/7) * 14$^2$ = 22/7 * 196 = 22 * 28 = 616 m$^2$), which is a common mistake."}, {"text": "28 m$^2$", "isCorrect": false, "rationale": "This value does not result from the correct area calculation. It might be related to 2 * diameter or similar miscalculation."}], "id": "q04"}, {"question": "Which of the following statements about Pi ($\\pi$) is most accurate based on the text?", "options": [{"text": "Pi is a constant value of approximately 3.14 that represents the area of a unit circle.", "isCorrect": false, "rationale": "Pi is a constant, but it's defined as the ratio of circumference to diameter, not the area of a unit circle (which would be $\\pi \\cdot 1^2 = \\pi$). The definition is key."}, {"text": "Pi is the distance across a circle through its center divided by the distance around it.", "isCorrect": false, "rationale": "This is the inverse ratio. Pi is defined as the circumference divided by the diameter (C/d)."}, {"text": "Pi is the ratio of a circle's circumference to its diameter, and it is the same for every circle.", "isCorrect": true, "rationale": "This precisely matches the definition given in the 'keyterm[Pi ($\\pi$)]' section of the textbook."}, {"text": "Pi is a numerical value that only applies to circles with a radius that is a multiple of 7.", "isCorrect": false, "rationale": "Pi applies to all circles. The note about 22/7 simply suggests it simplifies nicely when the radius or diameter is a multiple of 7, but Pi itself is universal."}], "id": "q05"}, {"question": "When calculating the area of a circle using the formula $A = \\pi r^2$, what is the correct order of operations?", "options": [{"text": "Multiply $\\pi$ by the radius, then square the result.", "isCorrect": false, "rationale": "This is a common mistake explicitly warned against in the 'caution' note. It leads to an incorrect answer as it would calculate $(\\pi r)^2 = \\pi^2 r^2$."}, {"text": "Square $\\pi$, then multiply by the radius.", "isCorrect": false, "rationale": "This is an incorrect interpretation of the formula. The formula specifies $r^2$, not $\\pi^2$."}, {"text": "Square the radius first, then multiply by $\\pi$.", "isCorrect": true, "rationale": "As stated in the 'caution' note and the 'keyconcept[Circumference and Area of Circles Summary]', the radius must be squared first, and then multiplied by $\\pi$. This follows the standard order of operations (PEMDAS/BODMAS) where exponents are calculated before multiplication."}, {"text": "Multiply $\\pi$ by the radius, then multiply by 2.", "isCorrect": false, "rationale": "This would calculate the circumference (C = $2\\pi r$), not the area."}], "id": "q06"}, {"question": "A circular pond has a radius of 10 feet. If a fence is to be built around its edge, what is the length of the fence needed? Use $\\pi \\approx 3.14$.", "options": [{"text": "314 square feet", "isCorrect": false, "rationale": "This is the area of the pond (A = 3.14 * 10^2 = 314), not the length of the fence, and the units are incorrect for length."}, {"text": "62.8 feet", "isCorrect": true, "rationale": "The length of the fence around the edge of the pond is its circumference. The formula for circumference given the radius is C = $2\\pi r$. So, C = 2 * 3.14 * 10 = 62.8 feet."}, {"text": "31.4 feet", "isCorrect": false, "rationale": "This would be the circumference if the radius was 5 feet, or if the formula C = $\\pi r$ (which is incorrect) was used."}, {"text": "100 feet", "isCorrect": false, "rationale": "This value does not relate to the circumference calculation for a radius of 10 feet using Pi."}], "id": "q07"}, {"question": "A circular clock face has a diameter of 20 cm. What is the area of the clock face? Use $\\pi \\approx 3.14$.", "options": [{"text": "62.8 cm$^2$", "isCorrect": false, "rationale": "This is the circumference (C = $\\pi$d = 3.14 * 20 = 62.8 cm), not the area."}, {"text": "125.6 cm$^2$", "isCorrect": false, "rationale": "This would be 2 * circumference, or similar miscalculation. The radius is 10 cm."}, {"text": "314 cm$^2$", "isCorrect": true, "rationale": "First, find the radius: r = d/2 = 20/2 = 10 cm. Then, use the area formula A = $\\pi r^2$. A = 3.14 * 10$^2$ = 3.14 * 100 = 314 cm$^2$."}, {"text": "400 cm$^2$", "isCorrect": false, "rationale": "This would be d squared, not $\\pi r^2$. This calculation (20^2) is incorrect for the area formula."}], "id": "q08"}, {"question": "A circular dartboard has a diameter of 18 inches. If it is divided into 9 equal sectors, what is the area of one sector? Use $\\pi \\approx 3.14$.", "options": [{"text": "28.26 in.$^2$", "isCorrect": true, "rationale": "First, find the radius: r = d/2 = 18/2 = 9 inches. Calculate the total area: A = $\\pi r^2$ = 3.14 * 9$^2$ = 3.14 * 81 = 254.34 in.$^2$. To find the area of one sector, divide the total area by 9: 254.34 / 9 = 28.26 in.$^2$."}, {"text": "25.43 in.$^2$", "isCorrect": false, "rationale": "This value does not result from the correct calculation. The total area is 254.34 in.$^2$, and dividing by 9 sectors gives 28.26 in.$^2$, not 25.43."}, {"text": "81 in.$^2$", "isCorrect": false, "rationale": "81 in.$^2$ is the radius squared (r$^2$), not the area of one sector."}, {"text": "254.34 in.$^2$", "isCorrect": false, "rationale": "This is the total area of the dartboard, not the area of a single sector."}], "id": "q09"}, {"question": "When is it generally recommended to use $\\pi \\approx \\frac{22}{7}$ instead of $\\pi \\approx 3.14$ for calculations?", "options": [{"text": "Always, as $\\frac{22}{7}$ is a more precise approximation.", "isCorrect": false, "rationale": "Both are approximations, and 3.14 is often sufficient. The textbook's note suggests a practical reason for choosing 22/7, not universal superiority in precision."}, {"text": "When the problem explicitly states to use $\\frac{22}{7}$, or when the radius or diameter is a multiple of 7, to simplify calculations.", "isCorrect": true, "rationale": "The 'note' section explicitly states that when a problem says 'use $\\pi \\approx \\frac{22}{7}$', or when the radius or diameter is a multiple of 7, the fraction often simplifies nicely. Otherwise, 3.14 is used."}, {"text": "Only when calculating circumference, never for area.", "isCorrect": false, "rationale": "The choice of Pi approximation is independent of whether you're calculating circumference or area; it depends on the given values or instruction."}, {"text": "Only for very large circles where 3.14 would be too inaccurate.", "isCorrect": false, "rationale": "The scale of the circle does not solely determine which approximation to use. The context of calculation simplification or explicit instruction is more relevant as per the text."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
