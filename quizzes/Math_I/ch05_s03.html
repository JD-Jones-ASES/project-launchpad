<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 5, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the 'Multiplying Decimals' property, what is the *first* step when multiplying decimals?", "options": [{"text": "Line up the decimal points.", "isCorrect": false, "rationale": "The text explicitly states in the 'caution' box that you do not need to line up decimal points when multiplying. This is done for addition and subtraction."}, {"text": "Multiply the numbers as if they were whole numbers.", "isCorrect": true, "rationale": "The 'Multiplying Decimals' property lists 'Multiply the numbers as if they were whole numbers (ignore the decimal points)' as the first step."}, {"text": "Count the total number of decimal places in all factors.", "isCorrect": false, "rationale": "Counting decimal places is the second step, not the first, according to the 'Multiplying Decimals' property."}, {"text": "Place the decimal point in the product so that it has the total number of decimal places.", "isCorrect": false, "rationale": "Placing the decimal point in the product is the third and final step, not the first, according to the 'Multiplying Decimals' property."}]}, {"question": "Find the product of $2.4 \times 0.13$.", "options": [{"text": "3.12", "isCorrect": false, "rationale": "Multiplying 24 by 13 gives 312. The first factor (2.4) has 1 decimal place, and the second factor (0.13) has 2 decimal places, totaling 1+2=3 decimal places. Placing 3 decimal places in 312 results in 0.312, not 3.12 (which would imply 2 decimal places)."}, {"text": "0.0312", "isCorrect": false, "rationale": "Multiplying 24 by 13 gives 312. The first factor (2.4) has 1 decimal place, and the second factor (0.13) has 2 decimal places, totaling 1+2=3 decimal places. Placing 3 decimal places in 312 results in 0.312, not 0.0312 (which would imply 4 decimal places)."}, {"text": "0.312", "isCorrect": true, "rationale": "First, multiply 24 by 13 to get 312. Next, count the decimal places: 2.4 has 1 place and 0.13 has 2 places, for a total of 1 + 2 = 3 decimal places. Finally, place the decimal point in 312 so there are 3 decimal places, resulting in 0.312."}, {"text": "31.2", "isCorrect": false, "rationale": "Multiplying 24 by 13 gives 312. The first factor (2.4) has 1 decimal place, and the second factor (0.13) has 2 decimal places, totaling 1+2=3 decimal places. Placing 3 decimal places in 312 results in 0.312, not 31.2 (which would imply 1 decimal place)."}]}, {"question": "What is the result of $6 \times 3.75$?", "options": [{"text": "225", "isCorrect": false, "rationale": "Multiplying 6 by 375 gives 2250. The whole number 6 has 0 decimal places, and 3.75 has 2 decimal places, for a total of 2 decimal places. Placing 2 decimal places in 2250 results in 22.50, which simplifies to 22.5."}, {"text": "2.25", "isCorrect": false, "rationale": "Multiplying 6 by 375 gives 2250. The total number of decimal places is 2. Placing the decimal point two places from the right in 2250 yields 22.50, not 2.25 (which would imply 3 decimal places from 2250, or a calculation error)."}, {"text": "22.50", "isCorrect": true, "rationale": "First, multiply 6 by 375 as whole numbers, which gives 2250. Then, count the decimal places: 6 has 0 places, and 3.75 has 2 places, for a total of 0 + 2 = 2 decimal places. Place the decimal point in 2250 so there are 2 decimal places, resulting in 22.50 (which can also be written as 22.5)."}, {"text": "2250", "isCorrect": false, "rationale": "Multiplying 6 by 375 as whole numbers gives 2250. However, the factor 3.75 has 2 decimal places, which must be included in the product. The answer 2250 ignores the decimal places completely."}]}, {"question": "Calculate $3.045 \times 100$.", "options": [{"text": "30.45", "isCorrect": false, "rationale": "Multiplying by 100 means moving the decimal point 2 places to the right, not 1 place."}, {"text": "304.5", "isCorrect": true, "rationale": "When multiplying a decimal by 100 (a power of 10 with two zeros), you move the decimal point two places to the right. Starting with 3.045, moving the decimal two places right gives 304.5."}, {"text": "3045", "isCorrect": false, "rationale": "Multiplying by 100 means moving the decimal point 2 places to the right, not 3 places (which would be for multiplying by 1,000)."}, {"text": "0.03045", "isCorrect": false, "rationale": "Multiplying by a power of 10 always moves the decimal point to the right, making the number larger, not to the left (which would make it smaller)."}]}, {"question": "What is the product of $0.072 \times 1,000$?", "options": [{"text": "0.000072", "isCorrect": false, "rationale": "Multiplying by a power of 10 moves the decimal point to the right, making the number larger, not to the left."}, {"text": "7.2", "isCorrect": false, "rationale": "Multiplying by 1,000 means moving the decimal point 3 places to the right, not 2 places (which would be for multiplying by 100)."}, {"text": "72", "isCorrect": true, "rationale": "When multiplying a decimal by 1,000 (a power of 10 with three zeros), you move the decimal point three places to the right. Starting with 0.072, moving the decimal three places right results in 72.0, or simply 72."}, {"text": "720", "isCorrect": false, "rationale": "Multiplying by 1,000 means moving the decimal point 3 places to the right, not 4 places."}]}, {"question": "If you are multiplying $12.34 \times 5.678$, how many decimal places will the final product have?", "options": [{"text": "2", "isCorrect": false, "rationale": "The number of decimal places in the product is the *sum* of the decimal places in all factors, not just the first factor's count."}, {"text": "3", "isCorrect": false, "rationale": "The number of decimal places in the product is the *sum* of the decimal places in all factors, not just the second factor's count."}, {"text": "5", "isCorrect": true, "rationale": "The rule for multiplying decimals states that the number of decimal places in the product equals the total number of decimal places in the factors. $12.34$ has 2 decimal places and $5.678$ has 3 decimal places, so the product will have $2 + 3 = 5$ decimal places."}, {"text": "6", "isCorrect": false, "rationale": "The number of decimal places is the sum of the decimal places in the factors (2 + 3 = 5), not simply an arbitrary higher number like 6."}]}, {"question": "In the expression $0.3 \times 1.2 = 0.36$, which number is the 'product'?", "options": [{"text": "0.3", "isCorrect": false, "rationale": "According to the keyterm definition, 0.3 is a factor, as it is one of the numbers being multiplied."}, {"text": "1.2", "isCorrect": false, "rationale": "According to the keyterm definition, 1.2 is a factor, as it is one of the numbers being multiplied."}, {"text": "0.36", "isCorrect": true, "rationale": "The keyterm 'Product' is defined as 'The result of multiplying two or more numbers.' In this equation, 0.36 is the result of multiplying 0.3 and 1.2."}, {"text": "All three numbers are products.", "isCorrect": false, "rationale": "Only the result of the multiplication (0.36) is the product. The numbers being multiplied (0.3 and 1.2) are called factors."}]}, {"question": "The 'caution' box explicitly states *not* to line up decimal points when multiplying. In which other operations *is* it necessary to line up decimal points?", "options": [{"text": "Division", "isCorrect": false, "rationale": "While division of decimals has specific rules, lining up decimal points is not the primary method for performing decimal division, nor is it mentioned in the text in this context."}, {"text": "Exponentiation", "isCorrect": false, "rationale": "Exponentiation (raising a number to a power) is not discussed in the context of lining up decimal points, nor is it a primary operation where this rule applies."}, {"text": "Addition and Subtraction", "isCorrect": true, "rationale": "The 'caution' box states, 'Only line up the decimal points for addition and subtraction.' This directly answers the question."}, {"text": "All operations", "isCorrect": false, "rationale": "The text specifically states that you *don't* line up decimal points for multiplication, making 'all operations' incorrect."}]}, {"question": "Apples cost $1.29 per pound. How much do $3.5$ pounds of apples cost, rounded to the nearest cent?", "options": [{"text": "$4.51", "isCorrect": false, "rationale": "The exact product of 1.29 and 3.5 is 4.515. When rounding to the nearest cent (hundredths place), the '5' in the thousandths place rounds up the '1' in the hundredths place to a '2', making the correct answer $4.52."}, {"text": "$4.52", "isCorrect": true, "rationale": "To find the total cost, multiply $1.29 \times 3.5$. Multiplying as whole numbers (129 x 35) gives 4515. Count decimal places: 1.29 has 2, and 3.5 has 1, for a total of 3 decimal places. So, the product is 4.515. Since problems involving money should be rounded to the nearest cent (hundredths place) unless otherwise stated, 4.515 rounds up to $4.52."}, {"text": "$4.515", "isCorrect": false, "rationale": "While 4.515 is the exact product, the 'note' section specifies that problems involving money should be rounded to the nearest cent (hundredths place), which means the answer should have only two decimal places."}, {"text": "$4.50", "isCorrect": false, "rationale": "The exact product is 4.515. Rounding to $4.50 would be incorrect as it ignores the '15' after the 4. This would be a significant rounding error."}]}, {"question": "According to the 'Multiplying Decimals Summary', what is a recommended strategy to check your answer after multiplying decimals?", "options": [{"text": "Recalculate the problem using a calculator.", "isCorrect": false, "rationale": "While using a calculator is a way to check, the 'keyconcept' summary specifically mentions using estimation, not simply recalculating with a different tool."}, {"text": "Reverse the order of the factors and multiply again.", "isCorrect": false, "rationale": "Multiplying in reverse order can confirm calculation accuracy but is not the specific checking strategy recommended in the 'keyconcept' summary for decimal multiplication."}, {"text": "Use estimation.", "isCorrect": true, "rationale": "The 'Multiplying Decimals Summary' explicitly lists 'Use estimation to check your answer' as one of the key points."}, {"text": "Divide the product by one of the factors.", "isCorrect": false, "rationale": "Dividing the product by a factor is an inverse operation that can check the multiplication, but it is not the specific checking strategy (estimation) highlighted in the provided summary."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
