<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 7, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is 48% written as a decimal?", "options": [{"text": "4.8", "isCorrect": false, "rationale": "This results from moving the decimal point one place to the left, or dividing by 10, not 100."}, {"text": "0.48", "isCorrect": true, "rationale": "To convert a percent to a decimal, divide by 100, which means moving the decimal point two places to the left. So, 48% becomes 0.48."}, {"text": "480", "isCorrect": false, "rationale": "This results from multiplying by 10, not dividing by 100. It makes the number larger instead of smaller."}, {"text": "0.048", "isCorrect": false, "rationale": "This results from moving the decimal point three places to the left, not two."}]}, {"question": "Convert 0.725 to a percent.", "options": [{"text": "7.25%", "isCorrect": false, "rationale": "This results from moving the decimal point one place to the right, or multiplying by 10, not 100."}, {"text": "0.0725%", "isCorrect": false, "rationale": "This results from moving the decimal point two places to the left, which is incorrect for converting a decimal to a percent."}, {"text": "72.5%", "isCorrect": true, "rationale": "To convert a decimal to a percent, multiply by 100 and attach the % symbol. This means moving the decimal point two places to the right. So, 0.725 becomes 72.5%."}, {"text": "725%", "isCorrect": false, "rationale": "This results from moving the decimal point three places to the right, which is incorrect."}]}, {"question": "Express 75% as a simplified fraction.", "options": [{"text": "7/5", "isCorrect": false, "rationale": "This fraction (1.4) is significantly larger than 75% (0.75). It's a common error to incorrectly simplify or use incorrect numbers."}, {"text": "3/4", "isCorrect": true, "rationale": "To convert a percent to a fraction, write the percent over 100 and simplify: 75/100. Both 75 and 100 are divisible by 25, so 75 ÷ 25 = 3 and 100 ÷ 25 = 4, resulting in 3/4."}, {"text": "75/1000", "isCorrect": false, "rationale": "While 75/100 is the correct initial step, dividing by 1000 is incorrect, and the fraction is not simplified correctly."}, {"text": "1/75", "isCorrect": false, "rationale": "This is an incorrect inversion or misrepresentation of the conversion process."}]}, {"question": "Convert 2/5 to a percent.", "options": [{"text": "25%", "isCorrect": false, "rationale": "This is incorrect. 1/4 is 25%, not 2/5."}, {"text": "40%", "isCorrect": true, "rationale": "To convert a fraction to a percent, first divide the numerator by the denominator to get a decimal: 2 ÷ 5 = 0.4. Then, convert the decimal to a percent by multiplying by 100 (moving the decimal two places to the right): 0.4 = 40%."}, {"text": "0.4%", "isCorrect": false, "rationale": "This decimal 0.4 needs to be multiplied by 100 to become a percent, not just have a percent sign added directly."}, {"text": "52%", "isCorrect": false, "rationale": "This is incorrect and doesn't follow the rules for converting fractions to percents."}]}, {"question": "When converting a decimal to a percent, moving the decimal point two places to the right is a shortcut for which mathematical operation?", "options": [{"text": "Dividing by 100", "isCorrect": false, "rationale": "Dividing by 100 moves the decimal point two places to the left, making the number smaller."}, {"text": "Multiplying by 10", "isCorrect": false, "rationale": "Multiplying by 10 moves the decimal point one place to the right, not two."}, {"text": "Multiplying by 100", "isCorrect": true, "rationale": "The text states that moving the decimal point two places to the right is a shortcut for multiplying by 100, which is how a decimal is converted to a percent."}, {"text": "Dividing by 10", "isCorrect": false, "rationale": "Dividing by 10 moves the decimal point one place to the left, making the number smaller."}]}, {"question": "A recipe calls for 0.35 of a cup of sugar. What percentage of a full cup is this amount?", "options": [{"text": "3.5%", "isCorrect": false, "rationale": "This would result from moving the decimal point one place to the right, not two."}, {"text": "0.35%", "isCorrect": false, "rationale": "This would incorrectly imply the number is much smaller, as if no conversion was done."}, {"text": "35%", "isCorrect": true, "rationale": "To convert the decimal 0.35 to a percent, multiply by 100 (move the decimal point two places to the right) and add the percent symbol. So, 0.35 becomes 35%."}, {"text": "350%", "isCorrect": false, "rationale": "This would result from moving the decimal point three places to the right, making the amount ten times larger than it should be."}]}, {"question": "Which of the following correctly represents 240% as both a decimal and a mixed number?", "options": [{"text": "2.4 and 2 2/5", "isCorrect": true, "rationale": "To convert 240% to a decimal, divide by 100 (move decimal two places left) to get 2.4. To convert 240% to a fraction, write it as 240/100, which simplifies to 24/10 or 12/5. As a mixed number, 12/5 is 2 2/5."}, {"text": "24.0 and 2 4/10", "isCorrect": false, "rationale": "24.0 is incorrect as the decimal conversion, and while 2 4/10 is equivalent to 2 2/5, the decimal part is wrong."}, {"text": "0.24 and 1/24", "isCorrect": false, "rationale": "Both the decimal and the fraction conversions are incorrect. 0.24 would be 24%, not 240%."}, {"text": "240.0 and 240/1", "isCorrect": false, "rationale": "240.0 is incorrect for the decimal conversion, and 240/1 is 240, not 240%."}]}, {"question": "How would you correctly write 0.7% as a decimal?", "options": [{"text": "0.7", "isCorrect": false, "rationale": "This is the original number without converting it from a percent to a decimal. To convert, the decimal point must be moved two places to the left."}, {"text": "0.07", "isCorrect": false, "rationale": "This would be the decimal for 7%, not 0.7%. One zero is missing after the decimal point."}, {"text": "0.007", "isCorrect": true, "rationale": "To convert a percent to a decimal, divide by 100 (move the decimal point two places to the left). Starting with 0.7, moving the decimal two places left gives 0.007. The caution note specifically addresses this type of conversion for percents less than 1%."}, {"text": "7.0", "isCorrect": false, "rationale": "This results from multiplying by 10, not dividing by 100, and is much larger than the original percent."}]}, {"question": "Which of the following represents a value different from the others?", "options": [{"text": "0.6", "isCorrect": false, "rationale": "This value is equal to 3/5 and 60%. (0.6)"}, {"text": "3/5", "isCorrect": false, "rationale": "This value is equal to 0.6 and 60%. (3 ÷ 5 = 0.6)"}, {"text": "60%", "isCorrect": false, "rationale": "This value is equal to 0.6 and 3/5. (60 ÷ 100 = 0.6)"}, {"text": "0.06", "isCorrect": true, "rationale": "While 0.6, 3/5, and 60% all represent the same value (0.6), 0.06 is a different, smaller value (equivalent to 6%)."}]}, {"question": "A survey found that 1/8 of respondents preferred brand X. What is this fraction expressed as a percent?", "options": [{"text": "1.25%", "isCorrect": false, "rationale": "This would be the result if 1/8 was 0.0125, which is incorrect, or if the decimal was only multiplied by 10."}, {"text": "12.5%", "isCorrect": true, "rationale": "To convert the fraction 1/8 to a percent, first divide 1 by 8 to get the decimal 0.125. Then, multiply the decimal by 100 (move the decimal point two places to the right) and add the percent symbol: 0.125 = 12.5%."}, {"text": "80%", "isCorrect": false, "rationale": "This is incorrect. 1/8 is much smaller than 80%. It's a common mistake to confuse the inverse or incorrectly manipulate the numbers."}, {"text": "0.125%", "isCorrect": false, "rationale": "This is the decimal value with a percent sign incorrectly added without multiplying by 100."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
