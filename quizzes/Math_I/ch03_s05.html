    <meta charset="UTF-8">

    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 3, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, why must fractions have the same denominator before they can be added or subtracted?", "options": [{"text": "To make the calculation easier.", "isCorrect": false, "rationale": "While a common denominator can simplify the process, the text explains a fundamental conceptual reason beyond just ease of calculation."}, {"text": "To ensure the numerators are also equal.", "isCorrect": false, "rationale": "The numerators do not need to be equal; they are simply added or subtracted once the denominators are the same. This is not mentioned as a requirement in the text."}, {"text": "Because the denominator represents the size of the pieces, and only pieces of the same size can be combined.", "isCorrect": true, "rationale": "The text states, 'Think of the denominator as the name of the pieces: you can only combine pieces that are the same size,' clearly explaining this conceptual requirement."}, {"text": "It is a mathematical convention, but not strictly necessary.", "isCorrect": false, "rationale": "The text emphasizes that fractions *must* have the same denominator, indicating it is a strict mathematical requirement, not just a convention."}]}, {"question": "What is the sum of $2/7 + 3/7$?", "options": [{"text": "$5/14$", "isCorrect": false, "rationale": "This option incorrectly adds the denominators. When fractions have like denominators, you add only the numerators and keep the denominator."}, {"text": "$5/7$", "isCorrect": true, "rationale": "As per the 'Adding and Subtracting Like Denominators' property, when denominators are the same, you add the numerators ($2+3=5$) and keep the denominator (7). The example $2/7 + 3/7 = 5/7$ confirms this directly."}, {"text": "$6/49$", "isCorrect": false, "rationale": "This option incorrectly multiplies both numerators and denominators, which is not the process for adding fractions."}, {"text": "$1/7$", "isCorrect": false, "rationale": "This result would occur if one numerator was subtracted from the other or if the operation was misunderstood. This is not the correct sum."}]}, {"question": "Subtract $5/9 - 2/9$. Simplify your answer if possible.", "options": [{"text": "$3/9$", "isCorrect": false, "rationale": "This is the correct result of the subtraction, but it has not been fully simplified as required by the problem and the text's instructions."}, {"text": "$1/3$", "isCorrect": true, "rationale": "Following the 'Adding and Subtracting Like Denominators' property, $5/9 - 2/9 = (5-2)/9 = 3/9$. The text then instructs to 'Always simplify the result if possible,' and $3/9$ simplifies to $1/3$ by dividing both numerator and denominator by 3. This is shown in the example $5/9 - 2/9 = 3/9 = 1/3$."}, {"text": "$7/9$", "isCorrect": false, "rationale": "This option incorrectly adds the numerators instead of subtracting them."}, {"text": "$3/0$", "isCorrect": false, "rationale": "This option incorrectly subtracts the denominators, leading to an undefined expression. Denominators are never added or subtracted."}]}, {"question": "Which of the following is the *first* step when adding or subtracting fractions with unlike denominators?", "options": [{"text": "Add or subtract the numerators.", "isCorrect": false, "rationale": "This step occurs only after finding the LCD and rewriting the fractions. It is not the first step for unlike denominators."}, {"text": "Simplify the result.", "isCorrect": false, "rationale": "Simplification is the final step after the addition or subtraction has been performed. It is not the first step."}, {"text": "Rewrite each fraction with the least common denominator.", "isCorrect": false, "rationale": "This is the second step in the process. The LCD must be found before fractions can be rewritten with it."}, {"text": "Find the least common denominator (LCD).", "isCorrect": true, "rationale": "The 'Adding and Subtracting Unlike Denominators' property clearly lists 'Find the least common denominator ($$)' as the first step."}]}, {"question": "Add $3/5 + 1/4$. Simplify your answer.", "options": [{"text": "$4/9$", "isCorrect": false, "rationale": "This option incorrectly adds both numerators and denominators, which is a common error and explicitly cautioned against in the text."}, {"text": "$17/20$", "isCorrect": true, "rationale": "To add $3/5 + 1/4$, first find the LCD, which is 20. Rewrite $3/5$ as $12/20$ and $1/4$ as $5/20$. Then, add the numerators: $12/20 + 5/20 = 17/20$. This matches the checkpoint example provided in the text."}, {"text": "$7/20$", "isCorrect": false, "rationale": "This option incorrectly adds the numerators of the original fractions while finding the correct common denominator, but without rewriting the fractions first."}, {"text": "$12/20$", "isCorrect": false, "rationale": "This is the rewritten form of $3/5$, but it does not include the addition of $1/4$."}]}, {"question": "Subtract $7/10 - 2/15$. Simplify your answer.", "options": [{"text": "$5/30$", "isCorrect": false, "rationale": "This option incorrectly subtracts the original numerators ($7-2=5$) while finding the correct common denominator, but without rewriting the fractions first."}, {"text": "$1/6$", "isCorrect": false, "rationale": "This option would result from $5/30$ simplified, which is an incorrect intermediate step."}, {"text": "$17/30$", "isCorrect": true, "rationale": "To subtract $7/10 - 2/15$, first find the LCD, which is 30. Rewrite $7/10$ as $21/30$ and $2/15$ as $4/30$. Then, subtract the numerators: $21/30 - 4/30 = 17/30$. This matches the checkpoint example provided in the text."}, {"text": "$25/30$", "isCorrect": false, "rationale": "This option is obtained by incorrectly adding the numerators of the rewritten fractions ($21+4=25$) instead of subtracting them."}]}, {"question": "A muffin recipe calls for $2/3$ cup of white flour and $1/4$ cup of wheat flour. How much flour is needed in all?", "options": [{"text": "$3/7$ cup", "isCorrect": false, "rationale": "This option incorrectly adds both the numerators and denominators, which is a fundamental error in fraction addition."}, {"text": "$11/12$ cup", "isCorrect": true, "rationale": "This is an application problem directly from the text. To find the total, you add the two amounts: $2/3 + 1/4$. The LCD is 12. Rewriting gives $8/12 + 3/12 = 11/12$ cup."}, {"text": "$2/12$ cup", "isCorrect": false, "rationale": "This might result from multiplying the fractions or an incomplete calculation, neither of which is correct for finding the total amount."}, {"text": "$1$ cup", "isCorrect": false, "rationale": "The sum $11/12$ is less than 1, so 1 cup is an overestimation and not the precise mathematical answer."}]}, {"question": "When adding $2/3 + 1/4$, why is 12 chosen as the common denominator?", "options": [{"text": "Because it is the product of 3 and 4, which is always the correct common denominator.", "isCorrect": false, "rationale": "While 12 is the product in this case, the text specifies finding the *least* common denominator (LCD), not just any product. For numbers like 6 and 8, the product (48) is not the LCD (24)."}, {"text": "Because 12 is the smallest number that both 3 and 4 divide into evenly, allowing fractions to be rewritten without changing their value.", "isCorrect": true, "rationale": "The text instructs to 'Find the least common denominator ($$),' which by definition is the smallest common multiple that allows each fraction to be equivalently rewritten with that denominator."}, {"text": "Because it is the largest common multiple of 3 and 4.", "isCorrect": false, "rationale": "The term used is 'least common denominator' (LCD), not largest. There is no largest common multiple."}, {"text": "Any common multiple would work just as well as 12.", "isCorrect": false, "rationale": "While any common multiple *can* be used, the text specifically instructs to find the *least* common denominator ($$), implying it's the most efficient or preferred choice, and larger common denominators would require more simplification later."}]}, {"question": "Consider the incorrect statement: $1/3 + 1/4 = 2/7$. What fundamental rule of adding fractions does this mistake violate?", "options": [{"text": "The rule that fractions must always be simplified.", "isCorrect": false, "rationale": "While simplification is important, the error occurs *before* any simplification would be needed. The primary mistake is in the addition process itself."}, {"text": "The rule that an improper fraction should be converted to a mixed number.", "isCorrect": false, "rationale": "The result $2/7$ is not an improper fraction, so this rule is not relevant to this specific error."}, {"text": "The rule that you must find a common denominator *before* adding the numerators.", "isCorrect": true, "rationale": "The 'caution' box explicitly states, '$1/3 + 1/4 \\ne 2/7$. You must find a common denominator first,' highlighting that adding numerators and denominators without a common denominator is a critical error."}, {"text": "The rule that you cannot add fractions with prime number denominators.", "isCorrect": false, "rationale": "The primality of denominators is irrelevant to the rules of addition; fractions with prime denominators can certainly be added after finding a common denominator."}]}, {"question": "After performing addition or subtraction on fractions, what is the final essential step mentioned in the text?", "options": [{"text": "Convert the answer to a decimal.", "isCorrect": false, "rationale": "The text focuses exclusively on fraction arithmetic and does not mention converting to decimals as a required final step."}, {"text": "Check if the answer is an improper fraction and convert it to a mixed number if the context allows.", "isCorrect": false, "rationale": "While the 'note' section mentions this, it qualifies it with 'depending on the context' and it's secondary to the instruction to simplify. The primary, unconditional final step is simplification."}, {"text": "Always simplify the result.", "isCorrect": true, "rationale": "Both the 'Adding and Subtracting Like Denominators' and 'Adding and Subtracting Unlike Denominators' properties, as well as the 'Adding and Subtracting Fractions Summary', explicitly state, 'Always simplify the result if possible' or 'Always simplify the answer.'"}, {"text": "Verify the original problem using subtraction or addition.", "isCorrect": false, "rationale": "Checking your work is a good general practice, but it's not listed as an 'essential step' in the fraction addition/subtraction process within the text."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
