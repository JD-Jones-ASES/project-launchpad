<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 6, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary mathematical concept introduced by the term 'ratio'?", "options": [{"text": "The sum of two quantities.", "isCorrect": false, "rationale": "A ratio is a comparison, not a summation, of two quantities."}, {"text": "A comparison of two quantities by division.", "isCorrect": true, "rationale": "The text defines a ratio as 'a comparison of two quantities by division'."}, {"text": "A measure of the total amount of a substance.", "isCorrect": false, "rationale": "While ratios can be used in measurements, their fundamental purpose is comparison, not total quantification."}, {"text": "The product of two numerical values.", "isCorrect": false, "rationale": "A ratio involves division for comparison, not multiplication to find a product."}]}, {"question": "A recipe calls for 3 cups of flour and 2 cups of milk. Which of the following correctly represents the ratio of milk to flour?", "options": [{"text": "3 : 2", "isCorrect": false, "rationale": "This represents the ratio of flour to milk, not milk to flour. The order of terms in a ratio matters."}, {"text": "3 to 2", "isCorrect": false, "rationale": "This represents the ratio of flour to milk. The order of terms in a ratio matters."}, {"text": "2/3", "isCorrect": true, "rationale": "The question asks for the ratio of milk to flour. Since there are 2 cups of milk and 3 cups of flour, the ratio is 2 to 3, or 2:3, or 2/3."}, {"text": "5", "isCorrect": false, "rationale": "This is the sum of the quantities, not their ratio."}]}, {"question": "Which statement accurately describes the relationship between a ratio and a fraction, as explained in the text?", "options": [{"text": "A ratio is always a fraction, and a fraction is always a ratio.", "isCorrect": false, "rationale": "The text explicitly states: 'A ratio is not the same as a fraction, even though it can be written in fraction form.'"}, {"text": "A fraction compares any two quantities, while a ratio names a part of a whole.", "isCorrect": false, "rationale": "This statement reverses the definitions. A ratio compares two quantities, and a fraction names part of a whole."}, {"text": "A ratio compares any two quantities, while a fraction names part of a whole.", "isCorrect": true, "rationale": "The text explains, 'A fraction names part of a whole, while a ratio compares any two quantities—they do not need to be parts of the same whole.'"}, {"text": "Ratios can only use whole numbers, while fractions can include decimals.", "isCorrect": false, "rationale": "The text does not state this limitation for ratios, and it's not the fundamental difference highlighted."}]}, {"question": "You have a bag with 12 red marbles and 18 blue marbles. Which of the following is an equivalent ratio of red marbles to blue marbles?", "options": [{"text": "6:12", "isCorrect": false, "rationale": "The original ratio is 12:18. Dividing by 2 gives 6:9, not 6:12."}, {"text": "2:3", "isCorrect": true, "rationale": "The original ratio is 12:18. Dividing both terms by their greatest common factor, 6, yields 2:3. This is an equivalent ratio."}, {"text": "12:6", "isCorrect": false, "rationale": "This ratio inverts the original comparison (blue to red if the original was red to blue) and also simplifies differently (2:1)."}, {"text": "3:4", "isCorrect": false, "rationale": "The ratio 3:4 is not equivalent to 12:18. To get 12 from 3, you multiply by 4, but 4 times 4 is 16, not 18."}]}, {"question": "To find an equivalent ratio for 7:9, which operation must be performed?", "options": [{"text": "Add the same nonzero number to both terms.", "isCorrect": false, "rationale": "Adding to both terms does not generally produce an equivalent ratio. Equivalent ratios are found by multiplying or dividing both terms by the same nonzero number."}, {"text": "Subtract the same nonzero number from both terms.", "isCorrect": false, "rationale": "Subtracting from both terms does not generally produce an equivalent ratio. Equivalent ratios are found by multiplying or dividing both terms by the same nonzero number."}, {"text": "Multiply only one term by a nonzero number.", "isCorrect": false, "rationale": "To find an equivalent ratio, both terms must be multiplied or divided by the same nonzero number, not just one term."}, {"text": "Multiply both terms by the same nonzero number.", "isCorrect": true, "rationale": "The text states, 'You can find an equivalent ratio by multiplying or dividing both terms of the ratio by the same nonzero number.'"}]}, {"question": "A garden has 25 tomato plants and 15 pepper plants. What is the ratio of tomato plants to pepper plants in simplest form?", "options": [{"text": "25:15", "isCorrect": false, "rationale": "This is the original ratio, but it is not in simplest form because 25 and 15 share a common factor greater than 1 (which is 5)."}, {"text": "5:3", "isCorrect": true, "rationale": "To simplify 25:15, find the GCF of 25 and 15, which is 5. Divide both terms by 5: 25/5 = 5 and 15/5 = 3. The simplest form is 5:3."}, {"text": "3:5", "isCorrect": false, "rationale": "This represents the ratio of pepper plants to tomato plants, not tomato plants to pepper plants. The order of terms matters."}, {"text": "1:1", "isCorrect": false, "rationale": "This ratio is incorrect; it implies an equal number of plants, which is not the case here."}]}, {"question": "If a cleaning solution requires 2 cups of concentrate for every 5 cups of water, how much concentrate is needed if you use 20 cups of water?", "options": [{"text": "4 cups of concentrate.", "isCorrect": false, "rationale": "This would be the amount if the water was 10 cups (20/2=10, 2*2=4, 5*2=10)."}, {"text": "8 cups of concentrate.", "isCorrect": true, "rationale": "The original ratio of concentrate to water is 2:5. To find how many times 20 cups of water is greater than 5 cups, calculate 20/5 = 4. Multiply the concentrate term by the same factor: 2 * 4 = 8 cups."}, {"text": "10 cups of concentrate.", "isCorrect": false, "rationale": "This would be the amount if the ratio was 1:2, or if you had 25 cups of water for a 2:5 ratio."}, {"text": "20 cups of concentrate.", "isCorrect": false, "rationale": "This would imply a 1:1 ratio, which is incorrect for the given solution."}]}, {"question": "What is the condition for a ratio to be in its simplest form?", "options": [{"text": "Both terms are prime numbers.", "isCorrect": false, "rationale": "While terms might be prime, the definition of simplest form is based on their common factors, not their primality."}, {"text": "The greatest common factor (GCF) of its terms is 1.", "isCorrect": true, "rationale": "The text states, 'A ratio is in simplest form when the two terms have no common factor other than 1,' which means their GCF is 1."}, {"text": "The terms are written as $a:b$ instead of $a/b$.", "isCorrect": false, "rationale": "This refers to the form of writing a ratio, not its simplicity. All three forms can represent a ratio in simplest form."}, {"text": "The ratio has been multiplied by the largest possible number.", "isCorrect": false, "rationale": "Simplifying a ratio involves dividing by the GCF, not multiplying, to reach its simplest form."}]}, {"question": "Which of the following properties is NOT true for ratios?", "options": [{"text": "The order in which quantities are compared does not affect the ratio.", "isCorrect": true, "rationale": "The text explicitly states, 'The order of the terms matters: the ratio of $a$ to $b$ is not the same as the ratio of $b$ to $a$ (unless $a = b$).' Therefore, this statement is false."}, {"text": "Ratios can be expressed using colons, words, or fractions.", "isCorrect": false, "rationale": "This is a true property, as ratios can be written in 'Word form: a to b', 'Colon form: a : b', and 'Fraction form: ab'."}, {"text": "Equivalent ratios represent the same comparison.", "isCorrect": false, "rationale": "This is a true property, as 'Equivalent ratios are ratios that express the same comparison.'"}, {"text": "Dividing both terms of a ratio by the same nonzero number results in an equivalent ratio.", "isCorrect": false, "rationale": "This is a true property, as 'You can find an equivalent ratio by multiplying or dividing both terms of the ratio by the same nonzero number.'"}]}, {"question": "A basketball team's record is 10 wins to 6 losses. Which of the following represents a situation where the team maintained the same win-loss ratio after playing more games?", "options": [{"text": "15 wins and 9 losses.", "isCorrect": true, "rationale": "The original ratio 10:6 simplifies to 5:3 (dividing both by 2). The ratio 15:9 also simplifies to 5:3 (dividing both by 3). Since they simplify to the same simplest form, they are equivalent ratios."}, {"text": "12 wins and 8 losses.", "isCorrect": false, "rationale": "The original ratio 10:6 simplifies to 5:3. The ratio 12:8 simplifies to 3:2 (dividing both by 4), which is not equivalent to 5:3."}, {"text": "20 wins and 10 losses.", "isCorrect": false, "rationale": "The original ratio 10:6 simplifies to 5:3. The ratio 20:10 simplifies to 2:1 (dividing both by 10), which is not equivalent to 5:3."}, {"text": "5 wins and 4 losses.", "isCorrect": false, "rationale": "The original ratio 10:6 simplifies to 5:3. The ratio 5:4 is not equivalent to 5:3."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
