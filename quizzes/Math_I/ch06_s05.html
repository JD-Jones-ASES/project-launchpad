        <h2>Results</h2>

        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

</div>

<script>
var QUESTIONS = [{"question": "What is the defining characteristic of a conversion factor as described in the text?", "options": [{"text": "It is a ratio of two different units that always results in a larger number.", "isCorrect": false, "rationale": "A conversion factor is a ratio of equivalent measurements, and while it changes units, it doesn't necessarily result in a larger number; it simply converts the value. The measurements must be equivalent, not just different."}, {"text": "It is a ratio of two equivalent measurements that, by definition, equals 1.", "isCorrect": true, "rationale": "The text explicitly states that 'a conversion factor is a ratio of two equivalent measurements, such as $12 in.1 ft$ or $1 km1,000 m$. Because the two measurements are equal, a conversion factor equals $1$.'"}, {"text": "It is a ratio used exclusively for currency exchange between different countries.", "isCorrect": false, "rationale": "While currency exchange uses proportional reasoning and ratios, a conversion factor is a broader concept applicable to any equivalent measurement (e.g., inches to feet, kilometers to meters), not just currency."}, {"text": "It represents the difference between two measurements, expressed as a ratio.", "isCorrect": false, "rationale": "A conversion factor is a ratio of equivalent measurements, not their difference. The concept relies on equivalence, not subtraction."}], "id": "q01"}, {"question": "The exchange rate is $1 US dollar = 0.92 British Pounds. How many British Pounds would you receive for $75 US dollars?", "options": [{"text": "69 British Pounds", "isCorrect": true, "rationale": "Set up the proportion: $1 dollar / 0.92 pounds = 75 dollars / x pounds$. Cross-multiply: $1 * x = 0.92 * 75$. Solving for x: $x = 69$ British Pounds."}, {"text": "81.52 British Pounds", "isCorrect": false, "rationale": "This would be the result if you incorrectly divided 75 by 0.92. The proportion should be set up to multiply 75 by the pound equivalent of one dollar."}, {"text": "75 British Pounds", "isCorrect": false, "rationale": "This implies a 1:1 exchange rate, which is not what the problem states. The US dollar and British Pound are not equivalent in value in this scenario."}, {"text": "0.92 British Pounds", "isCorrect": false, "rationale": "This is the exchange rate for a single dollar, not for 75 dollars. You need to scale up this amount proportionally."}], "id": "q02"}, {"question": "A recipe for 18 cookies requires 0.75 cups of flour. If you want to make 42 cookies, how much flour do you need?", "options": [{"text": "1.75 cups", "isCorrect": true, "rationale": "Set up the proportion: $0.75 cups / 18 cookies = x cups / 42 cookies$. Cross-multiply: $18x = 0.75 * 42$. This simplifies to $18x = 31.5$. Solving for x: $x = 31.5 / 18 = 1.75$ cups."}, {"text": "1.25 cups", "isCorrect": false, "rationale": "This answer is too low, indicating an incorrect calculation or proportion setup. It might come from an error like dividing 42 by 0.75 or 18 by 0.75."}, {"text": "2.5 cups", "isCorrect": false, "rationale": "This answer is too high, suggesting a miscalculation in the ratio or cross-multiplication. For example, multiplying 0.75 by a number larger than the scaling factor."}, {"text": "0.32 cups", "isCorrect": false, "rationale": "This answer is far too low, possibly resulting from an inverse proportion or incorrect division, implying you need less flour for more cookies, which is illogical."}], "id": "q03"}, {"question": "Which statement accurately describes two similar figures, according to the text?", "options": [{"text": "They must have the exact same size and shape, meaning they are congruent.", "isCorrect": false, "rationale": "The text states 'Two figures are similar if they have the same shape but not necessarily the same size.' Congruent figures have both the same size and shape."}, {"text": "Their corresponding angles are equal, and their corresponding sides are proportional.", "isCorrect": true, "rationale": "The text defines similar figures by stating: 'Corresponding angles are equal, and corresponding sides are proportional.'"}, {"text": "Their corresponding sides are equal, and their corresponding angles are proportional.", "isCorrect": false, "rationale": "This statement incorrectly reverses the properties; corresponding sides are proportional, not necessarily equal, and corresponding angles are equal, not proportional."}, {"text": "They are always mirror images of each other, regardless of size.", "isCorrect": false, "rationale": "Mirror images (reflections) are a type of transformation, but similarity describes a relationship where one figure is an enlargement or reduction of the other, maintaining shape and angle measure, not necessarily a reflection."}], "id": "q04"}, {"question": "Triangle PQR is similar to Triangle XYZ. If PQ = 10 cm, QR = 15 cm, and XY = 8 cm, what is the length of YZ?", "options": [{"text": "12 cm", "isCorrect": true, "rationale": "Since the triangles are similar, their corresponding sides are proportional. Set up the proportion: $PQ / XY = QR / YZ$. Substitute the given values: $10 / 8 = 15 / YZ$. Cross-multiply: $10 * YZ = 8 * 15$. So, $10 * YZ = 120$. Divide by 10: $YZ = 12$ cm."}, {"text": "18.75 cm", "isCorrect": false, "rationale": "This would be the result if the proportion was set up incorrectly, for example, as $10 / 15 = 8 / YZ$, which implies a different correspondence or an error in calculation."}, {"text": "7.5 cm", "isCorrect": false, "rationale": "This is incorrect. It might result from an inverted ratio or an incorrect scaling down, rather than scaling based on the given sides."}, {"text": "10 cm", "isCorrect": false, "rationale": "This would imply that QR and YZ are equal, which is not necessarily true for similar triangles unless they are also congruent. The sides are proportional, not necessarily equal."}], "id": "q05"}, {"question": "According to the text, how should a percent problem be correctly set up as a proportion?", "options": [{"text": "part / whole = percent / 100", "isCorrect": true, "rationale": "The text explicitly states: 'A percent problem can be written as the proportion $partwhole = percent100$, where the percent is the number before the $%$ sign.'"}, {"text": "whole / part = 100 / percent", "isCorrect": false, "rationale": "This proportion is an inversion of the correct setup on both sides, which would lead to incorrect results unless manipulated back to the correct form."}, {"text": "percent / part = whole / 100", "isCorrect": false, "rationale": "This setup incorrectly places 'percent' and 'whole' in the proportion. The percent should be over 100, and the part should be over the whole."}, {"text": "100 / percent = part / whole", "isCorrect": false, "rationale": "This option inverts only the 'percent' side of the proportion, leading to an incorrect relationship between the quantities."}], "id": "q06"}, {"question": "A student scored 85% on a test with a total of 60 questions. How many questions did the student answer correctly?", "options": [{"text": "51 questions", "isCorrect": true, "rationale": "Using the proportion $part / whole = percent / 100$: $x / 60 = 85 / 100$. Cross-multiply: $100x = 85 * 60$. So, $100x = 5100$. Divide by 100: $x = 51$ questions."}, {"text": "14 questions", "isCorrect": false, "rationale": "This is incorrect. It might be the result of miscalculating 15% of 60 (the incorrect answers), or a division error."}, {"text": "70.5 questions", "isCorrect": false, "rationale": "This answer is greater than the total number of questions, which is impossible. It likely stems from an incorrect multiplication or division."}, {"text": "85 questions", "isCorrect": false, "rationale": "85 is the percentage, not the absolute number of questions. The total number of questions is 60, so 85 correct is impossible."}], "id": "q07"}, {"question": "The note in the text states that 'percent means “per hundred.”' How does this concept directly relate to setting up a proportion for percent problems?", "options": [{"text": "It implies that percentages must always be converted to decimals before use in any calculation.", "isCorrect": false, "rationale": "While converting to decimals is common, the note directly explains the ratio aspect ($p/100$) rather than requiring decimal conversion for a proportion setup."}, {"text": "It directly shows why any percent 'p' can be written as the ratio $p/100$ in a proportion.", "isCorrect": true, "rationale": "The text clearly states: 'The word percent means “per hundred.” Writing $p100$ makes a percent into a ratio that you can use in a proportion.' This directly links the meaning to the proportion setup."}, {"text": "It means that the 'whole' quantity in any percent problem must always be 100 units.", "isCorrect": false, "rationale": "The 'whole' in the proportion ($partwhole = percent100$) refers to the total quantity being considered, which can be any number, not necessarily 100."}, {"text": "It suggests that all percent problems involve multiplication by 100 at some point.", "isCorrect": false, "rationale": "While multiplication by 100 might occur during cross-multiplication, the fundamental meaning of 'per hundred' refers to the ratio itself, not an obligatory operation."}], "id": "q08"}, {"question": "A clothing store offers a 25% discount on all items. If a jacket originally costs $80, and the sales tax is 5% of the discounted price, what is the final price a customer pays?", "options": [{"text": "$63.00", "isCorrect": true, "rationale": "First, find the discounted price: $80 * (1 - 0.25) = $80 * 0.75 = $60$. Next, calculate the sales tax on the discounted price: $60 * 0.05 = $3.00$. Finally, add the tax to the discounted price: $60 + $3.00 = $63.00$."}, {"text": "$60.00", "isCorrect": false, "rationale": "This is the discounted price before sales tax. The problem asks for the final price, which includes tax."}, {"text": "$66.00", "isCorrect": false, "rationale": "This would be the price if the sales tax was calculated on the original price ($80 * 0.05 = $4, $80 - $20 + $4 = $64$), or if there was an error in discount calculation or tax application."}, {"text": "$57.00", "isCorrect": false, "rationale": "This answer suggests an incorrect calculation, possibly by subtracting the tax instead of adding it, or an error in the discount calculation."}], "id": "q09"}, {"question": "When solving multi-step proportional reasoning problems, the 'Caution' note advises which of the following?", "options": [{"text": "Always use the original quantities for every step to avoid compounding errors.", "isCorrect": false, "rationale": "The caution note implies using intermediate results is necessary ('keep track of what each proportion is solving'), as seen in the multi-step example where the discounted price is used for the next step. Using original quantities for every step is often incorrect for multi-step problems."}, {"text": "Prioritize solving all percentage calculations before moving on to unit conversions or scaling.", "isCorrect": false, "rationale": "The order of operations depends entirely on the problem's specific steps, not a fixed rule to do percentages first. The multi-step example applies discount first, then divides to find pounds."}, {"text": "Keep track of what each proportion is solving, label your variables clearly, and do not skip the checking step.", "isCorrect": true, "rationale": "The 'Caution' note explicitly states: 'In multi-step problems, keep track of what each proportion is solving. Label your variables clearly, and do not skip the checking step—it is easy to set up a proportion with the wrong quantities in the wrong positions.'"}, {"text": "It is generally safe to skip the checking step if you are confident in your initial setup.", "isCorrect": false, "rationale": "The caution note directly advises against this, stating 'do not skip the checking step—it is easy to set up a proportion with the wrong quantities in the wrong positions.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
