<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 2, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the definition provided, what constitutes the set of integers?", "options": [{"text": "All numbers greater than zero.", "isCorrect": false, "rationale": "This describes positive integers, excluding zero and negative integers."}, {"text": "The set of whole numbers and their opposites.", "isCorrect": true, "rationale": "The text explicitly states: 'The integers are the set of whole numbers and their opposites: ..., -4, -3, -2, -1, 0, 1, 2, 3, 4, ...'."}, {"text": "Only numbers that can be written as fractions.", "isCorrect": false, "rationale": "Fractions, unless they simplify to whole numbers, are generally not integers. The definition focuses on whole numbers and their negative counterparts."}, {"text": "All counting numbers including zero, but no negative values.", "isCorrect": false, "rationale": "This describes whole numbers, which is a subset of integers but does not include negative integers."}], "id": "q01"}, {"question": "Which statement accurately describes the integer zero based on the provided text?", "options": [{"text": "Zero is considered a positive integer because it is greater than negative numbers.", "isCorrect": false, "rationale": "The text clearly states, 'Zero is neither positive nor negative.'"}, {"text": "Zero is considered a negative integer as it is less than positive numbers.", "isCorrect": false, "rationale": "The text clearly states, 'Zero is neither positive nor negative.'"}, {"text": "Zero is neither a positive nor a negative integer.", "isCorrect": true, "rationale": "The text explicitly mentions, 'Zero is neither positive nor negative,' distinguishing it from both positive and negative integers."}, {"text": "Zero is both positive and negative, serving as the neutral point on the number line.", "isCorrect": false, "rationale": "While zero is a neutral point, it is explicitly defined as neither positive nor negative, not both."}], "id": "q02"}, {"question": "On a number line, if integer 'a' is located to the left of integer 'b', what can be definitively concluded about their values?", "options": [{"text": "'a' is greater than 'b' ($a > b$).", "isCorrect": false, "rationale": "The property states that the number farther to the left is less, meaning 'a' would be less than 'b'."}, {"text": "'a' is equal to 'b' ($a = b$).", "isCorrect": false, "rationale": "If 'a' is to the left of 'b', they occupy different positions, meaning they cannot be equal."}, {"text": "'a' is less than 'b' ($a < b$).", "isCorrect": true, "rationale": "The text states: 'On a number line, the number farther to the right is greater. The number farther to the left is less. a < b a is to the left of b.'"}, {"text": "The relationship cannot be determined without knowing if 'a' and 'b' are positive or negative.", "isCorrect": false, "rationale": "The relative position on the number line (left or right) is sufficient to determine the relationship, regardless of whether they are positive or negative."}], "id": "q03"}, {"question": "Which of the following sets of integers is correctly ordered from least to greatest?", "options": [{"text": "$0, -3, 2, -5, 1$", "isCorrect": false, "rationale": "This set is not ordered from least to greatest; for example, -3 is less than 0, but listed after it."}, {"text": "$-5, -3, 0, 1, 2$", "isCorrect": true, "rationale": "When plotted mentally on a number line, -5 is farthest left, followed by -3, then 0, 1, and 2, matching the 'reading from left to right' rule for ordering from least to greatest."}, {"text": "$2, 1, 0, -3, -5$", "isCorrect": false, "rationale": "This set is ordered from greatest to least, not least to greatest."}, {"text": "$-3, -5, 0, 1, 2$", "isCorrect": false, "rationale": "This set is not correctly ordered; for example, -5 is less than -3 but listed after it."}], "id": "q04"}, {"question": "A business reports a net loss of $1,500 for the quarter. How would this situation be best represented by an integer?", "options": [{"text": "$1500$", "isCorrect": false, "rationale": "A positive integer represents a gain or a value above zero. A 'loss' signifies a reduction, requiring a negative integer."}, {"text": "$0$", "isCorrect": false, "rationale": "Zero represents no change, no gain, and no loss. A net loss of $1,500 is a specific change."}, {"text": "$-1500$", "isCorrect": true, "rationale": "The text states that 'Real-world losses, depths, and drops below zero are represented by negative integers.' A 'net loss' fits this description."}, {"text": "It cannot be represented by a single integer because it's a financial transaction.", "isCorrect": false, "rationale": "The text explicitly mentions 'bank balances' and 'yards gained or lost' as real-world quantities describable by integers, indicating financial losses are also included."}], "id": "q05"}, {"question": "Consider the integers $-6$ and $-2$. Which comparison is correct, and why?", "options": [{"text": "$-6 > -2$ because 6 is a larger number than 2.", "isCorrect": false, "rationale": "When comparing negative integers, the one with the smaller absolute value is greater. Also, $-6$ is to the left of $-2$ on the number line, making it smaller."}, {"text": "$-6 < -2$ because $-6$ is farther to the left on the number line.", "isCorrect": true, "rationale": "The text states: 'On a number line, the number farther to the left is less.' Since $-6$ is to the left of $-2$, it is indeed less."}, {"text": "$-6 = -2$ because both are negative integers.", "isCorrect": false, "rationale": "These are distinct integers occupying different positions on the number line, therefore they cannot be equal."}, {"text": "The comparison depends on whether we are considering absolute values.", "isCorrect": false, "rationale": "The question asks for a direct comparison of the integers themselves, not their absolute values. The rule for comparing integers on a number line is always applicable."}], "id": "q06"}, {"question": "When the integer $-4$ appears alone in a mathematical expression, how does the provided caution suggest it should be read?", "options": [{"text": "As 'minus four,' indicating a subtraction.", "isCorrect": false, "rationale": "The caution note explicitly states, 'Read -4 as 'negative four,' not 'minus four,' when it stands alone.'"}, {"text": "As 'negative four,' referring to the number's value.", "isCorrect": true, "rationale": "The caution note explicitly states, 'Read -4 as 'negative four,' not 'minus four,' when it stands alone.' This emphasizes that the sign is part of the number's identity."}, {"text": "As 'the opposite of four,' which is interchangeable with 'minus four.'", "isCorrect": false, "rationale": "While it is the opposite of four, the caution specifically addresses the reading 'minus four' as incorrect in this context."}, {"text": "Its reading depends on the operation it's involved in.", "isCorrect": false, "rationale": "The caution specifies 'when it stands alone,' meaning its reading is fixed as 'negative four' in this context, independent of operations."}], "id": "q07"}, {"question": "A student is asked to plot the integers $0, -3,$ and $2$ on a number line. Which describes the correct relative placement of these points?", "options": [{"text": "From left to right: $0, -3, 2$.", "isCorrect": false, "rationale": "On a number line, negative numbers are to the left of zero, and positive numbers are to the right. So -3 would be to the left of 0."}, {"text": "From left to right: $2, 0, -3$.", "isCorrect": false, "rationale": "This order places positive numbers to the left of zero and negative numbers to the right, which is incorrect."}, {"text": "From left to right: $-3, 0, 2$.", "isCorrect": true, "rationale": "Negative integers are to the left of zero, and positive integers are to the right of zero. Therefore, -3 is farthest left, followed by 0, and then 2."}, {"text": "All points are to the right of zero, ordered from smallest to largest.", "isCorrect": false, "rationale": "This is incorrect because -3 is a negative integer and thus to the left of zero."}], "id": "q08"}, {"question": "Which of the following scenarios would be represented by a positive integer?", "options": [{"text": "A diver descending 30 meters below the surface.", "isCorrect": false, "rationale": "Descending 'below' implies a negative change in elevation or depth."}, {"text": "A withdrawal of $50 from a bank account.", "isCorrect": false, "rationale": "A 'withdrawal' represents a loss or decrease in balance, hence a negative value."}, {"text": "A temperature drop of 5 degrees Celsius.", "isCorrect": false, "rationale": "A 'drop' in temperature signifies a negative change."}, {"text": "An airplane flying at an altitude of 10,000 feet above sea level.", "isCorrect": true, "rationale": "The phrase 'above sea level' indicates a value greater than zero, consistent with a positive integer. The text mentions 'elevations' can be described by integers, with 'above' implying positive."}], "id": "q09"}, {"question": "Based on the 'Integers and the Number Line Summary,' what is a key characteristic of numbers on a number line?", "options": [{"text": "Numbers decrease from right to left.", "isCorrect": false, "rationale": "This statement is true, but the summary explicitly states the inverse: 'On a number line, numbers increase from left to right.'"}, {"text": "All integers are either positive or negative.", "isCorrect": false, "rationale": "This is incorrect because the summary, as well as earlier text, explicitly states that zero is neither positive nor negative."}, {"text": "Numbers increase from left to right.", "isCorrect": true, "rationale": "The 'Integers and the Number Line Summary' explicitly states: 'On a number line, numbers increase from left to right.'"}, {"text": "Negative integers are always to the right of positive integers.", "isCorrect": false, "rationale": "This is incorrect. The summary (and other parts of the text) states that 'Positive integers are to the right of zero; negative integers are to the left of zero on a number line.'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
