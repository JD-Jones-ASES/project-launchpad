<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 8, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best defines a variable in algebra?", "options": [{"text": "A number whose value never changes.", "isCorrect": false, "rationale": "This describes a constant, not a variable. A variable's value can change or is unknown."}, {"text": "A letter or symbol that represents an unknown or changeable value.", "isCorrect": true, "rationale": "According to the text, 'A variable is a letter or symbol that represents an unknown or changeable value.'"}, {"text": "A numerical factor multiplied by a variable.", "isCorrect": false, "rationale": "This describes a coefficient, not a variable itself."}, {"text": "A combination of numbers, variables, and operations with an equal sign.", "isCorrect": false, "rationale": "This describes an equation. An algebraic expression is a combination without an equal sign, and a variable is just one component of it."}]}, {"question": "Which statement correctly distinguishes between an algebraic expression and an equation?", "options": [{"text": "An algebraic expression always contains an equal sign, while an equation never does.", "isCorrect": false, "rationale": "This statement is incorrect. An expression does not have an equal sign, and an equation does."}, {"text": "An algebraic expression is a combination of numbers and variables, whereas an equation shows that two expressions are equal.", "isCorrect": true, "rationale": "The text states an expression 'does not have an equal sign' and an equation 'does have an equal sign,' making this option the most accurate distinction."}, {"text": "An algebraic expression must contain variables, but an equation may only contain numbers.", "isCorrect": false, "rationale": "An expression can be just a number (a constant), and equations also typically involve variables to be algebraic equations."}, {"text": "An equation is like a phrase, and an expression is like a sentence.", "isCorrect": false, "rationale": "The text uses the analogy in reverse: 'An expression is like a phrase; an equation is like a sentence.'"}]}, {"question": "Identify all the terms in the algebraic expression $7y - 2x + 15$.", "options": [{"text": "$7y$ and $2x$", "isCorrect": false, "rationale": "This misses the constant term. Terms are separated by plus or minus signs."}, {"text": "$7y$, $2x$, and $15$", "isCorrect": false, "rationale": "This incorrectly treats $2x$ as a positive term. The subtraction sign indicates a term of $-2x$."}, {"text": "$7y$, $-2x$, and $15$", "isCorrect": true, "rationale": "Terms are separated by plus or minus signs. In this expression, $7y$ is a term, $-2x$ (including its sign) is a term, and $15$ is a term."}, {"text": "$7$, $-2$, and $15$", "isCorrect": false, "rationale": "These are coefficients and a constant, not the complete terms. Terms include variables where present."}]}, {"question": "In the term $m$, what is its coefficient?", "options": [{"text": "$0$", "isCorrect": false, "rationale": "A coefficient of 0 would mean the term is 0, eliminating the variable. This is incorrect."}, {"text": "$m$", "isCorrect": false, "rationale": "The coefficient is the numerical factor, not the variable itself."}, {"text": "$1$", "isCorrect": true, "rationale": "The text states: 'If a variable has no number written in front of it (like $x$), the coefficient is understood to be $1$.'"}, {"text": "It has no coefficient.", "isCorrect": false, "rationale": "Every variable term has a coefficient; if not explicitly written, it is 1."}]}, {"question": "For the expression $12 - 5k + 3p$, which component is considered a constant?", "options": [{"text": "$5k$", "isCorrect": false, "rationale": "This is a variable term because it includes the variable $k$."}, {"text": "$12$", "isCorrect": true, "rationale": "The text defines a constant as 'a term that has no variable.' In this expression, $12$ is a term without a variable."}, {"text": "$3p$", "isCorrect": false, "rationale": "This is a variable term because it includes the variable $p$."}, {"text": "$-5$", "isCorrect": false, "rationale": "$-5$ is the coefficient of $k$, not a constant term in itself (the term is $-5k$)."}]}, {"question": "A painter charges a flat fee of $50 for a consultation, plus $30 per hour for labor. If $h$ represents the number of hours worked, which algebraic expression represents the total cost?", "options": [{"text": "$50h + 30$", "isCorrect": false, "rationale": "This expression incorrectly applies the hourly rate to the flat fee and the flat fee to the hours."}, {"text": "$30h + 50$", "isCorrect": true, "rationale": "The cost for labor is $30 per hour ($30h$), and the flat fee of $50 is added to that. This correctly models the total cost."}, {"text": "$80h$", "isCorrect": false, "rationale": "This implies a combined hourly rate but misses the distinction between a flat fee and hourly charge."}, {"text": "$50 - 30h$", "isCorrect": false, "rationale": "This expression suggests the painter subtracts labor costs from the consultation fee, which is illogical for calculating total cost."}]}, {"question": "Which of the following is NOT an algebraic expression?", "options": [{"text": "$4x - 7y$", "isCorrect": false, "rationale": "This is an algebraic expression because it combines numbers, variables, and operations without an equal sign."}, {"text": "$10 + n / 2$", "isCorrect": false, "rationale": "This is an algebraic expression because it combines numbers, variables, and operations without an equal sign."}, {"text": "$5x = 20$", "isCorrect": true, "rationale": "This is an equation because it contains an equal sign, indicating that two expressions are equal. The text explicitly states, 'An expression does not have an equal sign. An equation does have an equal sign.'"}, {"text": "$p - q + r$", "isCorrect": false, "rationale": "This is an algebraic expression because it combines variables and operations without an equal sign."}]}, {"question": "A student wrote $n3$ to represent '3 times a number $n$'. What convention did they violate, and what is the preferred way to write it?", "options": [{"text": "They violated the rule that variables come before numbers; it should be $3+n$.", "isCorrect": false, "rationale": "The convention is that the number comes before the variable, and $3+n$ represents addition, not multiplication."}, {"text": "They violated the convention that numbers are written before variables; it should be $3n$.", "isCorrect": true, "rationale": "The 'note' section states: 'When a number is multiplied by a variable, the number is written first: write $5x$, not $x5$.' So $n3$ should be $3n$."}, {"text": "They made a common mistake confusing multiplication with addition; it should be $n+3$.", "isCorrect": false, "rationale": "While $n+3$ is for addition, the error described ($n3$) is a violation of writing convention, not confusion with addition."}, {"text": "They should have used a multiplication symbol; it should be $n \times 3$.", "isCorrect": false, "rationale": "While $n \times 3$ is mathematically correct, the convention is to omit the multiplication symbol and write the number first ($3n$)."}]}, {"question": "If a library starts with $L$ books and adds $25$ new books each month for $m$ months, which expression represents the total number of books after $m$ months?", "options": [{"text": "$L + 25 + m$", "isCorrect": false, "rationale": "This expression adds the number of months directly, rather than multiplying by the number of books added each month."}, {"text": "$L + 25m$", "isCorrect": true, "rationale": "The initial number of books is $L$. The number of books added over $m$ months is $25$ books/month $\times m$ months, which is $25m$. Adding this to the initial number gives $L + 25m$."}, {"text": "$25L + m$", "isCorrect": false, "rationale": "This expression incorrectly multiplies the initial books by 25 and adds months."}, {"text": "$L + m / 25$", "isCorrect": false, "rationale": "This expression suggests dividing the months by 25, which does not represent adding books."}]}, {"question": "Consider the expression $P = 2l + 2w$. Based on the provided text, which of the following statements is true about this mathematical statement?", "options": [{"text": "It is an algebraic expression because it combines numbers, variables, and operations.", "isCorrect": false, "rationale": "While it combines numbers, variables, and operations, the presence of the equal sign makes it an equation, not just an expression."}, {"text": "It is an equation because it contains an equal sign.", "isCorrect": true, "rationale": "The text clearly states, 'An expression does not have an equal sign. An equation does have an equal sign.' Since $P = 2l + 2w$ includes an equal sign, it is an equation."}, {"text": "$2l$ and $2w$ are constants in this statement.", "isCorrect": false, "rationale": "$2l$ and $2w$ are terms with variables, making them variable terms, not constants. The constant would be a term without a variable."}, {"text": "$P$, $l$, and $w$ are coefficients in this statement.", "isCorrect": false, "rationale": "$P$, $l$, and $w$ are variables representing unknown values. $2$ is the coefficient for $l$ and $w$."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
