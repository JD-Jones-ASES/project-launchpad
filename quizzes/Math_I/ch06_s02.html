<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 6, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic that distinguishes a 'rate' from other types of ratios?", "options": [{"text": "It compares quantities that are both unitless.", "isCorrect": false, "rationale": "While some ratios can be unitless, a rate specifically compares quantities with different units, making this option incorrect."}, {"text": "It compares two quantities measured in different units.", "isCorrect": true, "rationale": "According to the text, 'A rate is a ratio that compares two quantities measured in different units.' This is the defining characteristic."}, {"text": "It always results in a whole number.", "isCorrect": false, "rationale": "Rates, especially unit rates, can often involve decimal or fractional values (e.g., $2.50 per pound), making this option incorrect."}, {"text": "Its second quantity (denominator) is always 1.", "isCorrect": false, "rationale": "This describes a 'unit rate,' which is a special kind of rate, but not all rates have a denominator of 1."}], "id": "q01"}, {"question": "Which statement accurately defines a 'unit rate'?", "options": [{"text": "A ratio that compares two quantities with the same units.", "isCorrect": false, "rationale": "A unit rate is a type of rate, and rates compare quantities with different units. Ratios with the same units are generally simpler ratios, not rates."}, {"text": "A rate where the first quantity is numerically larger than the second.", "isCorrect": false, "rationale": "There is no rule regarding the relative size of the numerator and denominator in a unit rate. For example, $0.75 per box is a unit rate where the first quantity is smaller."}, {"text": "A rate in which the second quantity (the denominator) is 1.", "isCorrect": true, "rationale": "The text explicitly states: 'A unit rate is a rate in which the second quantity (the denominator) is 1.'"}, {"text": "A rate expressed only using whole numbers.", "isCorrect": false, "rationale": "Unit rates can, and often do, involve decimal numbers, especially when dealing with money (e.g., $0.75 per box)."}], "id": "q02"}, {"question": "Which of the following examples represents a unit rate?", "options": [{"text": "$120$ miles in $2$ hours", "isCorrect": false, "rationale": "The second quantity (denominator) is 2 hours, not 1, so this is a rate but not a unit rate."}, {"text": "$7.50$ for $3$ pounds", "isCorrect": false, "rationale": "The second quantity (denominator) is 3 pounds, not 1, so this is a rate but not a unit rate."}, {"text": "$60$ miles per $1$ hour", "isCorrect": true, "rationale": "This explicitly states '1 hour' in the denominator, or 'per hour' implies a denominator of 1, making it a unit rate."}, {"text": "$450$ words in $10$ minutes", "isCorrect": false, "rationale": "The second quantity (denominator) is 10 minutes, not 1, so this is a rate but not a unit rate."}], "id": "q03"}, {"question": "A printer can print 180 pages in 9 minutes. What is its printing speed as a unit rate?", "options": [{"text": "20 minutes per page", "isCorrect": false, "rationale": "This inverts the rate (minutes per page instead of pages per minute) and does not represent the printing speed as commonly understood."}, {"text": "1/20 pages per minute", "isCorrect": false, "rationale": "This is the inverse of the correct unit rate (1/20 = 0.05), indicating an error in division or understanding the numerator/denominator."}, {"text": "20 pages per minute", "isCorrect": true, "rationale": "To find the unit rate, divide the total pages by the total minutes: 180 pages / 9 minutes = 20 pages per minute."}, {"text": "189 pages per minute", "isCorrect": false, "rationale": "This suggests adding the quantities instead of dividing them to find the rate."}], "id": "q04"}, {"question": "A package of 6 identical snacks costs $4.50. What is the unit price (cost per snack)?", "options": [{"text": "$0.65 per snack", "isCorrect": false, "rationale": "This is an incorrect calculation; $4.50 divided by 6 does not equal $0.65."}, {"text": "$0.75 per snack", "isCorrect": true, "rationale": "To find the unit price, divide the total cost by the number of snacks: $4.50 / 6 snacks = $0.75 per snack."}, {"text": "$1.33 per snack", "isCorrect": false, "rationale": "This would be the result of dividing 6 by $4.50 (approximately), which inverts the desired unit rate (snacks per dollar instead of dollars per snack)."}, {"text": "$4.50 per 6 snacks", "isCorrect": false, "rationale": "This is the original rate given, not the unit rate. A unit rate must have 1 in the denominator."}], "id": "q05"}, {"question": "Store P sells 5 kilograms of rice for $9.50. Store Q sells 3 kilograms of the same rice for $5.85. Which store offers the better buy?", "options": [{"text": "Store P, because $1.90/kg is less than $1.95/kg.", "isCorrect": true, "rationale": "Store P's unit price is $9.50 / 5 kg = $1.90 per kg. Store Q's unit price is $5.85 / 3 kg = $1.95 per kg. Since $1.90 is less than $1.95, Store P is the better buy."}, {"text": "Store Q, because $1.95/kg is less than $1.90/kg.", "isCorrect": false, "rationale": "This statement incorrectly claims $1.95 is less than $1.90 and identifies the wrong store as the better buy."}, {"text": "Store P, because it sells a larger quantity.", "isCorrect": false, "rationale": "While Store P sells a larger quantity, the 'better buy' is determined by the unit price (cost per unit), not just the total quantity offered."}, {"text": "Both stores offer the same price per kilogram.", "isCorrect": false, "rationale": "The calculated unit prices are $1.90/kg for Store P and $1.95/kg for Store Q, which are not the same."}], "id": "q06"}, {"question": "A cyclist maintains a speed of 18 miles per hour. How many miles will the cyclist cover in 2.5 hours at this rate?", "options": [{"text": "7.2 miles", "isCorrect": false, "rationale": "This would be the result of dividing 18 by 2.5, which is not the correct operation to find total distance."}, {"text": "36 miles", "isCorrect": false, "rationale": "This would be the distance covered in 2 hours, neglecting the additional half-hour."}, {"text": "45 miles", "isCorrect": true, "rationale": "To find the total distance, multiply the unit rate (18 miles per hour) by the total time: 18 miles/hour * 2.5 hours = 45 miles."}, {"text": "180 miles", "isCorrect": false, "rationale": "This is an incorrect calculation, possibly multiplying by 10 or making a significant error."}], "id": "q07"}, {"question": "Why are unit rates particularly useful for making comparisons, such as determining a 'better buy'?", "options": [{"text": "They eliminate the need for calculations.", "isCorrect": false, "rationale": "Finding and comparing unit rates requires calculation; they simplify the *comparison* after calculation, not eliminate it."}, {"text": "They express quantities in a standardized way, with a denominator of 1.", "isCorrect": true, "rationale": "By standardizing the second quantity to 1, unit rates allow for direct, apples-to-apples comparison of the first quantities (e.g., cost per single item)."}, {"text": "They always result in whole numbers, making comparison simpler.", "isCorrect": false, "rationale": "Unit rates can involve decimals, such as $0.75 per box, so they do not always result in whole numbers."}, {"text": "They only compare quantities of the same type (e.g., dollars to dollars).", "isCorrect": false, "rationale": "Rates, including unit rates, specifically compare quantities of *different* types (e.g., dollars to pounds, miles to hours)."}], "id": "q08"}, {"question": "The word 'per' in phrases like 'miles per hour' or 'price per item' is a strong indicator of what mathematical concept?", "options": [{"text": "A simple ratio comparing two similar quantities.", "isCorrect": false, "rationale": "The word 'per' indicates a comparison of different quantities, characteristic of a rate, not a simple ratio of similar quantities."}, {"text": "A unit rate, where the second quantity is assumed to be one.", "isCorrect": true, "rationale": "The text notes, 'The word per means 'for each' or 'for every 1.' When you see 'miles per hour' or 'price per item,' you are looking at a unit rate.'"}, {"text": "A proportion, showing two equivalent ratios.", "isCorrect": false, "rationale": "While unit rates can be part of a proportion, the word 'per' itself signals a single rate with a denominator of one, not the equality of two ratios."}, {"text": "An average of several measurements.", "isCorrect": false, "rationale": "Average is a different statistical concept, typically involving summing values and dividing by the count, not directly indicated by 'per' in this context."}], "id": "q09"}, {"question": "The 'caution' note advises that when comparing unit rates, you must ensure:", "options": [{"text": "The numerators are always whole numbers.", "isCorrect": false, "rationale": "The text does not state this; numerators can be decimals (e.g., $0.75 per box)."}, {"text": "Both rates use the same unit in the denominator.", "isCorrect": true, "rationale": "The caution states: 'When comparing unit rates, make sure both rates use the same unit in the denominator. Comparing 'miles per hour' with 'miles per minute' without converting will give a wrong answer.'"}, {"text": "The comparison involves at least three different rates.", "isCorrect": false, "rationale": "Comparisons can be made effectively between just two unit rates; there is no minimum requirement of three."}, {"text": "The units in the denominator are always time-based.", "isCorrect": false, "rationale": "Denominator units can be various quantities like pounds, items, or boxes, not just time."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
