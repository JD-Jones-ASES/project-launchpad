<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 2, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the product of (-9)(-6)?", "options": [{"text": "-54", "isCorrect": false, "rationale": "This answer incorrectly applies the rule for multiplying integers with different signs. When multiplying two negative integers (same signs), the product is positive."}, {"text": "15", "isCorrect": false, "rationale": "This answer performs addition instead of multiplication. The operation requested is multiplication."}, {"text": "54", "isCorrect": true, "rationale": "According to the 'Multiplying Integers—Same Signs' property, the product of two integers with the same sign (both negative in this case) is positive. Therefore, 9 multiplied by 6 is 54, and the sign is positive."}, {"text": "-15", "isCorrect": false, "rationale": "This answer performs addition and incorrectly assigns a negative sign. The operation is multiplication, and the product of two negative integers is positive."}]}, {"question": "Evaluate 7 (-5).", "options": [{"text": "35", "isCorrect": false, "rationale": "This answer incorrectly applies the rule for multiplying integers with the same sign. One factor is positive and the other is negative."}, {"text": "-12", "isCorrect": false, "rationale": "This answer results from subtracting 5 from 7, not multiplying. The operation requested is multiplication."}, {"text": "-35", "isCorrect": true, "rationale": "According to the 'Multiplying Integers—Different Signs' property, the product of two integers with different signs (one positive, one negative) is negative. Therefore, 7 multiplied by 5 is 35, and the sign is negative."}, {"text": "12", "isCorrect": false, "rationale": "This answer results from subtracting 5 from 7 and incorrectly assigning a positive sign. The operation is multiplication."}]}, {"question": "What is the result of (-48) / (-8)?", "options": [{"text": "-6", "isCorrect": false, "rationale": "This answer incorrectly applies the rule for dividing integers with different signs. When dividing two negative integers (same signs), the quotient is positive."}, {"text": "6", "isCorrect": true, "rationale": "According to the 'Dividing Integers' property, the sign rules for division are the same as for multiplication. Since both integers have the same sign (both negative), the quotient is positive. 48 divided by 8 is 6."}, {"text": "56", "isCorrect": false, "rationale": "This answer performs addition instead of division. The operation requested is division."}, {"text": "-56", "isCorrect": false, "rationale": "This answer performs addition and incorrectly assigns a negative sign. The operation is division, and the quotient of two negative integers is positive."}]}, {"question": "Determine the quotient of 63 / (-9).", "options": [{"text": "7", "isCorrect": false, "rationale": "This answer incorrectly applies the rule for dividing integers with the same sign. One integer is positive and the other is negative."}, {"text": "-7", "isCorrect": true, "rationale": "According to the 'Dividing Integers' property, the sign rules for division are the same as for multiplication. Since the integers have different signs (one positive, one negative), the quotient is negative. 63 divided by 9 is 7, and the sign is negative."}, {"text": "54", "isCorrect": false, "rationale": "This answer performs subtraction instead of division. The operation requested is division."}, {"text": "-54", "isCorrect": false, "rationale": "This answer performs subtraction and incorrectly assigns a negative sign. The operation is division."}]}, {"question": "Which of the following expressions is undefined?", "options": [{"text": "0 * (-10)", "isCorrect": false, "rationale": "This expression equals 0, as any integer multiplied by zero is zero."}, {"text": "-10 / 0", "isCorrect": true, "rationale": "The text explicitly states that 'Division by zero is undefined. You cannot divide any number by zero.' This expression represents division by zero."}, {"text": "-10 / 1", "isCorrect": false, "rationale": "This expression equals -10. Division by 1 is a valid operation."}, {"text": "0 / 10", "isCorrect": false, "rationale": "This expression equals 0, as zero divided by any nonzero number is zero."}]}, {"question": "If 'a' is any integer, what is the value of a * 0?", "options": [{"text": "a", "isCorrect": false, "rationale": "This would be the identity property if multiplying by 1. Multiplying any integer by zero results in zero, not the integer itself."}, {"text": "1", "isCorrect": false, "rationale": "Multiplying any integer by zero always results in zero, not one."}, {"text": "0", "isCorrect": true, "rationale": "According to the 'Multiplying by Zero' property, for every integer 'a', 'a * 0 = 0'. Any integer multiplied by zero is zero."}, {"text": "Undefined", "isCorrect": false, "rationale": "Only division by zero is undefined, not multiplication by zero."}]}, {"question": "What is the product of (-2)(3)(-4)(-1)?", "options": [{"text": "24", "isCorrect": false, "rationale": "This answer has the incorrect sign. There are three negative factors in the multiplication."}, {"text": "-24", "isCorrect": true, "rationale": "According to the caution about 'three or more factors,' an odd number of negative factors gives a negative product. Here, there are three negative factors (-2, -4, -1), which is an odd count. The product of the absolute values is 2 * 3 * 4 * 1 = 24. Since there's an odd number of negatives, the final product is -24."}, {"text": "10", "isCorrect": false, "rationale": "This answer results from incorrect calculation of the product of the numbers, and potentially also an incorrect sign."}, {"text": "-10", "isCorrect": false, "rationale": "This answer results from incorrect calculation of the product of the numbers and potentially also an incorrect sign."}]}, {"question": "A diver descends 4 meters per minute for 8 minutes. What is the total change in the diver's depth relative to the starting point?", "options": [{"text": "32 meters", "isCorrect": false, "rationale": "This answer gives the correct magnitude but incorrectly assigns a positive sign. A descent represents a negative change in depth."}, {"text": "-4 meters", "isCorrect": false, "rationale": "This answer represents the rate of descent, not the total change in depth over 8 minutes."}, {"text": "-32 meters", "isCorrect": true, "rationale": "A descent of 4 meters can be represented as -4 meters. To find the total change, we multiply the rate of change by the time: (-4 meters/minute) * (8 minutes) = -32 meters. This correctly represents a total drop in depth."}, {"text": "4 meters", "isCorrect": false, "rationale": "This answer represents the rate of descent and incorrectly assigns a positive sign, not the total change in depth."}]}, {"question": "The pattern 3(-1) = -3, 2(-1) = -2, 1(-1) = -1, 0(-1) = 0 demonstrates which key concept about multiplying integers?", "options": [{"text": "Multiplying by a negative number always increases the product.", "isCorrect": false, "rationale": "The products in the pattern are decreasing from -3 to -2 to -1, which is an increase in value, but the statement says 'always increases the product' without qualification, and doesn't fully capture the essence or the purpose of the pattern (which is to explain why negative times negative is positive)."}, {"text": "As the first factor decreases by 1, the product increases by 1, leading to (-1)(-1)=1.", "isCorrect": true, "rationale": "The text's 'Multiplication Pattern' example explicitly uses this pattern to explain that 'Each time the first factor decreases by 1, the product increases by 1. Following the pattern: (-1)(-1) = 1.' This demonstrates how the sign rule for negative times negative is logically consistent."}, {"text": "The sign of the product is determined by the sign of the first factor.", "isCorrect": false, "rationale": "While true for these specific examples where the second factor is negative, this statement is an oversimplification and doesn't fully explain the full pattern, especially when leading to negative times negative being positive. The sign depends on *both* factors."}, {"text": "Any number multiplied by 1 remains unchanged.", "isCorrect": false, "rationale": "The pattern involves multiplying by -1, not 1. This option describes the identity property of multiplication, which is not what this specific pattern illustrates."}]}, {"question": "An investor owns 50 shares of a stock. If the stock price drops $2 per share for 3 consecutive days, and then increases $1 per share for 2 days, what is the total change in the value of the investor's shares?", "options": [{"text": "-250", "isCorrect": false, "rationale": "This answer results from an incorrect calculation of the net change per share or misapplication of the number of shares."}, {"text": "-200", "isCorrect": true, "rationale": "First, calculate the total change per share: Drop = (-$2/day) * (3 days) = -$6 per share. Increase = ($1/day) * (2 days) = $2 per share. Net change per share = -$6 + $2 = -$4 per share. Then, multiply this net change by the number of shares: (-$4/share) * (50 shares) = -$200. The total change in the investor's shares is a decrease of $200."}, {"text": "-150", "isCorrect": false, "rationale": "This answer results from only considering the initial drop ($50 * -3 = -150$) or an incorrect calculation of the net change per share."}, {"text": "-100", "isCorrect": false, "rationale": "This answer implies a net change of -$2 per share, which is incorrect. The net change per share is -$4."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
