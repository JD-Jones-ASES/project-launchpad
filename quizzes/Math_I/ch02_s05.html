<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 2, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following expressions correctly evaluates to 23?", "options": [{"text": "5 + 6(-3)", "isCorrect": false, "rationale": "Following PEMDAS, multiplication 6(-3) = -18 occurs first, resulting in 5 + (-18) = -13. This is not 23."}, {"text": "5 - 6(-3)", "isCorrect": true, "rationale": "Following PEMDAS, multiplication 6(-3) = -18 occurs first. The expression becomes 5 - (-18), which simplifies to 5 + 18 = 23. This matches the target value."}, {"text": "(5 - 6)(-3)", "isCorrect": false, "rationale": "Following PEMDAS, the operation inside parentheses (5 - 6) = -1 occurs first. The expression then becomes (-1)(-3) = 3. This is not 23."}, {"text": "6(-3) - 5", "isCorrect": false, "rationale": "Following PEMDAS, multiplication 6(-3) = -18 occurs first. The expression becomes -18 - 5 = -23. This is not 23."}], "id": "q01"}, {"question": "When evaluating the expression $2[10 - 3(1 - 4)]$, what is the first operation that should be performed according to the order of operations?", "options": [{"text": "Multiply 2 by 10", "isCorrect": false, "rationale": "Multiplication outside the brackets should be performed after all operations within the innermost grouping symbols are completed."}, {"text": "Subtract 10 - 3", "isCorrect": false, "rationale": "Subtraction inside the brackets is not the innermost operation; the parentheses (1 - 4) must be simplified first."}, {"text": "Subtract 1 - 4", "isCorrect": true, "rationale": "According to PEMDAS, operations within the innermost grouping symbols (parentheses in this case) are evaluated first. So, 1 - 4 = -3 is the initial step."}, {"text": "Multiply 3 by 1", "isCorrect": false, "rationale": "Multiplication 3(1) would occur if there were no subtraction within the parentheses. The subtraction 1 - 4 must be done before the multiplication by 3."}], "id": "q02"}, {"question": "Evaluate the expression: $-2[4 + 3(-5)]$.", "options": [{"text": "-2", "isCorrect": false, "rationale": "This results from incorrect order of operations or sign errors, for example, if 4+3 was done before 3(-5)."}, {"text": "22", "isCorrect": true, "rationale": "Inside the brackets, 3(-5) = -15. Then 4 + (-15) = -11. Finally, -2(-11) = 22. This follows the correct order of operations."}, {"text": "-38", "isCorrect": false, "rationale": "This would result from doing 4+3 = 7 first, then 7(-5) = -35, then -2(-35) = 70, or sign errors."}, {"text": "38", "isCorrect": false, "rationale": "This would result from sign errors, such as -2 * (-19) if 4+3 was done before multiplication."}], "id": "q03"}, {"question": "Which statement correctly describes the role of absolute-value bars in an expression like $-8 + 3 - 2 - 7$?", "options": [{"text": "They indicate that the final result of the entire expression must be positive.", "isCorrect": false, "rationale": "Absolute-value bars only affect the value of the number or expression *within* them, not the sign of the overall final result unless they encompass the entire expression."}, {"text": "They signify multiplication by -1 for the enclosed value.", "isCorrect": false, "rationale": "Absolute-value bars mean 'the distance from zero', always resulting in a non-negative value, not necessarily multiplication by -1."}, {"text": "They act as grouping symbols, requiring operations inside them to be simplified first.", "isCorrect": true, "rationale": "As stated in the text, absolute-value bars act as grouping symbols. Operations within them must be completed before taking the absolute value."}, {"text": "They cause the enclosed value to become its opposite.", "isCorrect": false, "rationale": "Absolute value takes the magnitude of a number; it does not simply make a number its opposite (e.g., |-5| = 5, not 5, but |5|=5, not -5)."}], "id": "q04"}, {"question": "What is the difference between $(-4)^2$ and $-4^2$?", "options": [{"text": "Both expressions evaluate to 16.", "isCorrect": false, "rationale": "$(-4)^2 = 16$, but $-4^2 = -16$. They are not the same."}, {"text": "$(-4)^2 = -16$ and $-4^2 = 16$.", "isCorrect": false, "rationale": "This reverses the correct values. $(-4)^2 = (-4)(-4) = 16$ and $-4^2 = -(4*4) = -16$."}, {"text": "$(-4)^2 = 16$ because the base is -4, while $-4^2 = -16$ because only 4 is the base.", "isCorrect": true, "rationale": "When parentheses are used, as in $(-4)^2$, the entire base, -4, is squared, resulting in positive 16. Without parentheses, as in $-4^2$, only the 4 is squared, and then the negative sign is applied, resulting in -16."}, {"text": "The difference is only semantic; they mean the same thing in mathematics.", "isCorrect": false, "rationale": "The text explicitly states and demonstrates that they are not the same and that 'parentheses around the negative sign make a big difference.'"}], "id": "q05"}, {"question": "Evaluate the expression: $10 - 2^3 + (6 - 9)$.", "options": [{"text": "-1", "isCorrect": true, "rationale": "Following PEMDAS: First, parentheses (6 - 9) = -3. Next, exponents $2^3 = 8$. The expression becomes $10 - 8 + (-3)$. Then, perform addition/subtraction from left to right: $10 - 8 = 2$, and $2 + (-3) = -1$."}, {"text": "5", "isCorrect": false, "rationale": "This might result from miscalculating $2^3$ or incorrect order of addition/subtraction, such as doing 8+(-3)=5, then 10-5=5."}, {"text": "21", "isCorrect": false, "rationale": "This could result from incorrect sign application, e.g., $10 - (-8) + (-3)$ or similar errors."}, {"text": "1", "isCorrect": false, "rationale": "This could result from error in adding/subtracting negative numbers, for instance $2+(-3) = 1$ instead of $-1$."}], "id": "q06"}, {"question": "A diver starts at a depth of -50 feet relative to the surface. She then ascends 15 feet, descends 20 feet, and finally ascends another 10 feet. If a strong current pushes her down an additional 5 feet for every 10 seconds, and this occurs for 30 seconds before she stabilizes, what is her final depth?", "options": [{"text": "-40 feet", "isCorrect": false, "rationale": "This answer does not account for the final descent due to the current correctly, likely missing some part of the calculation."}, {"text": "-55 feet", "isCorrect": false, "rationale": "This answer may have correctly calculated the initial changes but not the current, or made an error in the current calculation."}, {"text": "-60 feet", "isCorrect": true, "rationale": "Initial depth: -50. Ascends 15: -50 + 15 = -35. Descends 20: -35 - 20 = -55. Ascends 10: -55 + 10 = -45. Current pushes her down 5 feet for every 10 seconds over 30 seconds, which is 30/10 = 3 times. So, 3 * 5 = 15 feet total descent from current. Final depth: -45 - 15 = -60 feet."}, {"text": "-30 feet", "isCorrect": false, "rationale": "This result suggests significant errors in applying the ascents, descents, or the effect of the current."}], "id": "q07"}, {"question": "Evaluate $-12 \\div 3 \\times (-2) - 5$.", "options": [{"text": "3", "isCorrect": true, "rationale": "According to PEMDAS, multiplication and division are performed from left to right. First, $-12 \\div 3 = -4$. Then, $-4 \\times (-2) = 8$. Finally, $8 - 5 = 3$."}, {"text": "13", "isCorrect": false, "rationale": "This would result if multiplication was performed before division: $3 \\times (-2) = -6$, then $-12 \\div (-6) = 2$, and $2 - 5 = -3$. Or if 3x(-2) was treated as 6, then -12/6 = -2, -2-5 = -7. This is not correct."}, {"text": "-13", "isCorrect": false, "rationale": "This might result from sign errors during the division or multiplication steps, such as treating $-4 \\times (-2)$ as $-8$."}, {"text": "-21", "isCorrect": false, "rationale": "This implies incorrect order, possibly doing division, then subtraction, then multiplication, or numerous sign errors."}], "id": "q08"}, {"question": "Consider the expression $50 - [20 - 4(8 - 12)]$. Which of the following is an intermediate step that correctly simplifies part of the expression?", "options": [{"text": "$50 - [16(8 - 12)]$", "isCorrect": false, "rationale": "This incorrectly performs 20 - 4 before the multiplication, violating PEMDAS rules for operations within brackets."}, {"text": "$50 - [20 - 4(-4)]$", "isCorrect": true, "rationale": "The innermost parentheses (8 - 12) must be simplified first. $8 - 12 = -4$. So, $50 - [20 - 4(-4)]$ is a correct intermediate step."}, {"text": "$50 - [-4(8 - 12)]$", "isCorrect": false, "rationale": "This incorrectly distributes the negative sign before the 20, or performs 20-4, which is not allowed given the multiplication."}, {"text": "$30 - 4(8 - 12)$", "isCorrect": false, "rationale": "This incorrectly performs the subtraction $50 - 20$ before operations within the brackets are fully resolved."}], "id": "q09"}, {"question": "In a scenario where the temperature starts at $0^\\circ\\text{F}$ and drops $3^\\circ\\text{F}$ every hour for 4 hours, then rises $2^\\circ\\text{F}$ every hour for 2 hours, which expression correctly models the final temperature and what is its value?", "options": [{"text": "Expression: $0 - 3(4) + 2(2)$; Value: $-8^\\circ\\text{F}$", "isCorrect": true, "rationale": "The initial temperature is 0. A drop of $3^\\circ\\text{F}$ per hour for 4 hours is $-3 \\times 4 = -12$. A rise of $2^\\circ\\text{F}$ per hour for 2 hours is $+2 \\times 2 = +4$. So, the expression is $0 - 3(4) + 2(2)$. Evaluating it: $0 - 12 + 4 = -12 + 4 = -8$. The expression correctly models the situation and the value is correct."}, {"text": "Expression: $(0 - 3) \\times 4 + 2 \\times 2$; Value: $-10^\\circ\\text{F}$", "isCorrect": false, "rationale": "The expression is incorrect as it implies an initial drop of 3 then multiplies by 4 hours. The drop of 3 is *per hour*. $(0 - 3) \\times 4 + 2 \\times 2 = -3 \\times 4 + 4 = -12 + 4 = -8$, so the value is correct but the expression implies wrong order if not careful."}, {"text": "Expression: $0 + 3(4) - 2(2)$; Value: $8^\\circ\\text{F}$", "isCorrect": false, "rationale": "This expression incorrectly represents a drop in temperature as an addition, and a rise as a subtraction. The signs are reversed for the temperature changes."}, {"text": "Expression: $0 - (3 \\times 4 + 2 \\times 2)$; Value: $-16^\\circ\\text{F}$", "isCorrect": false, "rationale": "This expression incorrectly groups the temperature changes, implying the rise also contributes to the overall drop rather than offsetting it. $0 - (12 + 4) = 0 - 16 = -16$."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
