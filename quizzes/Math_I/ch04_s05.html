<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 4, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Evaluate the expression: $5/6 - 1/3 \\times 1/2$", "options": [{"text": "$1/6$", "isCorrect": false, "rationale": "This result would be obtained if you incorrectly subtracted $1/3$ from $5/6$ first, then multiplied the result by $1/2$. The correct order is multiplication before subtraction."}, {"text": "$1/3$", "isCorrect": false, "rationale": "This result is incorrect. Ensure you perform the multiplication operation correctly ($1/3 \\times 1/2 = 1/6$) and then subtract ($5/6 - 1/6 = 4/6 = 2/3$). This option might come from an arithmetic error."}, {"text": "$2/3$", "isCorrect": true, "rationale": "According to the order of operations (PEMDAS), multiplication must be performed before subtraction. First, calculate $1/3 \\times 1/2 = 1/6$. Then, subtract this result from $5/6$: $5/6 - 1/6 = 4/6$, which simplifies to $2/3$."}, {"text": "$5/12$", "isCorrect": false, "rationale": "This option results from incorrect arithmetic or an incorrect order of operations. Always multiply first, then subtract."}], "id": "q01"}, {"question": "Evaluate the expression: $(3/4 + 1/2) \\div 1/8$", "options": [{"text": "$6$", "isCorrect": false, "rationale": "This result suggests an error in adding the fractions within the parentheses or in the subsequent division. Always simplify inside the parentheses first."}, {"text": "$10$", "isCorrect": true, "rationale": "The order of operations requires working inside the parentheses first. $3/4 + 1/2 = 3/4 + 2/4 = 5/4$. Then, divide $5/4$ by $1/8$. Dividing by a fraction is equivalent to multiplying by its reciprocal: $5/4 \\times 8/1 = 40/4 = 10$."}, {"text": "$12$", "isCorrect": false, "rationale": "This option might arise from an arithmetic mistake during the addition or division steps. Double-check common denominators and multiplication by the reciprocal."}, {"text": "$16$", "isCorrect": false, "rationale": "This result is too large and likely stems from a significant error in the division step, such as incorrectly multiplying by $1/8$ instead of $8/1$."}], "id": "q02"}, {"question": "Which of the following expressions correctly represents the first step in evaluating the complex fraction $\\frac{2/3 + 1/6}{1/2 - 1/4}$?", "options": [{"text": "$(2/3 + 1/6) \\div (1/2 - 1/4)$", "isCorrect": true, "rationale": "A fraction bar acts as a grouping symbol. This means the entire numerator $(2/3 + 1/6)$ must be evaluated as a single quantity, and the entire denominator $(1/2 - 1/4)$ must be evaluated as a single quantity, before the division operation is performed. This option correctly translates the complex fraction into this grouped division."}, {"text": "$(2/3 \\div 1/2) + (1/6 \\div 1/4)$", "isCorrect": false, "rationale": "This incorrectly distributes the division across the addition and subtraction in the numerator and denominator, which is not how fraction bars or grouping symbols work."}, {"text": "$2/3 + 1/6 \\div 1/2 - 1/4$", "isCorrect": false, "rationale": "This expression ignores the grouping function of the fraction bar, implying that operations are performed strictly left-to-right or by standard PEMDAS rules without considering the grouping, which would lead to an incorrect result."}, {"text": "$(2/3 + 1/6) \\times (1/2 - 1/4)$", "isCorrect": false, "rationale": "This option incorrectly changes the division operation (represented by the fraction bar) into multiplication. While division by a fraction is multiplication by its reciprocal, you must first simplify the numerator and denominator to single fractions before performing that step."}], "id": "q03"}, {"question": "A recipe calls for $1 \\frac{1}{2}$ cups of flour. If you want to make $2 \\frac{1}{2}$ times the recipe, how much flour do you need?", "options": [{"text": "$2 \\frac{1}{4}$ cups", "isCorrect": false, "rationale": "This result suggests an error in converting mixed numbers to improper fractions or in the subsequent multiplication. Always convert mixed numbers before multiplying or dividing."}, {"text": "$3 \\frac{3}{4}$ cups", "isCorrect": true, "rationale": "To solve this, first convert the mixed numbers to improper fractions: $1 \\frac{1}{2} = 3/2$ and $2 \\frac{1}{2} = 5/2$. Then multiply them: $(3/2) \\times (5/2) = 15/4$. Convert the improper fraction back to a mixed number: $15/4 = 3 \\frac{3}{4}$ cups."}, {"text": "$2 \\frac{2}{4}$ cups", "isCorrect": false, "rationale": "This answer is incorrect and might come from adding the whole number parts and multiplying the fraction parts separately, which is not the correct procedure for multiplying mixed numbers."}, {"text": "$3 \\frac{1}{2}$ cups", "isCorrect": false, "rationale": "This indicates an arithmetic error. Multiplying $3/2$ by $5/2$ results in $15/4$, not $7/2$ or $3 \\frac{1}{2}$."}], "id": "q04"}, {"question": "Which of the following options correctly lists the order of operations when evaluating an expression with fractions?", "options": [{"text": "Exponents, Parentheses, Multiplication and Division, Addition and Subtraction", "isCorrect": false, "rationale": "This order is incorrect; Parentheses always come before Exponents in PEMDAS."}, {"text": "Parentheses (and other grouping symbols), Exponents, Multiplication and Division (left to right), Addition and Subtraction (left to right)", "isCorrect": true, "rationale": "This correctly outlines the PEMDAS (Parentheses, Exponents, Multiplication/Division, Addition/Subtraction) rule, which applies universally to all numbers, including fractions, and specifically notes the 'left to right' rule for M/D and A/S."}, {"text": "Addition and Subtraction, Multiplication and Division, Exponents, Parentheses", "isCorrect": false, "rationale": "This order is incorrect as it reverses the standard PEMDAS sequence, starting with addition/subtraction, which should be done last."}, {"text": "Multiplication and Division, Addition and Subtraction, Parentheses, Exponents", "isCorrect": false, "rationale": "This order is incorrect because it prioritizes multiplication/division and addition/subtraction over parentheses and exponents, which should be handled first."}], "id": "q05"}, {"question": "According to the textbook section, how does a fraction bar function within the order of operations?", "options": [{"text": "It indicates that the numerator should be multiplied by the denominator.", "isCorrect": false, "rationale": "The fraction bar represents division, not multiplication of the numerator by the denominator."}, {"text": "It means the numerator and denominator can be cross-canceled before any other operations.", "isCorrect": false, "rationale": "The caution note explicitly states not to cross-cancel between the top and bottom before simplifying each part to a single fraction."}, {"text": "It acts as a grouping symbol, requiring the numerator and the denominator to be evaluated separately before dividing.", "isCorrect": true, "rationale": "The section explicitly states, 'A fraction bar acts as a grouping symbol. In an expression like (a+b)/(c-d), you must evaluate the numerator and the denominator separately before dividing.' This ensures that the operations within the numerator and denominator are completed first."}, {"text": "It implies that all operations within the fraction must be done from left to right.", "isCorrect": false, "rationale": "While 'left to right' applies to multiplication/division and addition/subtraction within the numerator or denominator, the fraction bar's primary function is grouping the entire top and bottom expressions, not just enforcing left-to-right sequence across the entire complex fraction."}], "id": "q06"}, {"question": "The 'caution' note in the textbook advises against cross-canceling in complex fractions before simplifying each part to a single fraction. Why is this caution important?", "options": [{"text": "Cross-canceling is only permitted in multiplication problems, not division.", "isCorrect": false, "rationale": "Cross-canceling is a simplification technique used within multiplication (or division by converting to multiplication) of fractions. The issue here isn't whether it's allowed in division generally, but whether it's applied prematurely in a complex fraction before distinct terms are combined."}, {"text": "It can lead to incorrect results because it bypasses the necessary grouping of the numerator and denominator.", "isCorrect": true, "rationale": "The caution states, 'do not try to cross cancel between the top and bottom before you have simplified each part to a single fraction.' This is because if the numerator or denominator contains addition or subtraction, cross-canceling individual terms would violate the order of operations and the grouping imposed by the fraction bar, leading to an incorrect answer."}, {"text": "It makes the fraction more complex and harder to simplify later.", "isCorrect": false, "rationale": "While simplifying complex fractions can be challenging, the primary reason for the caution is accuracy, not just complexity. Incorrectly applying cross-cancellation would produce a wrong answer rather than just making it harder."}, {"text": "This rule only applies to expressions involving mixed numbers, not proper fractions.", "isCorrect": false, "rationale": "The caution applies to complex fractions universally, regardless of whether they contain mixed numbers or proper fractions. The principle is about the structure of the expression, not the type of numbers."}], "id": "q07"}, {"question": "Evaluate: $(1/2)^2 + 3/4 \\div 1/2$", "options": [{"text": "$1$", "isCorrect": false, "rationale": "This result might occur from an arithmetic error during addition or from incorrectly simplifying the division. Always follow PEMDAS carefully."}, {"text": "$1/4$", "isCorrect": false, "rationale": "This would be the result if only $(1/2)^2$ was calculated and the rest of the expression was ignored or incorrectly cancelled out. You must perform all operations in the correct order."}, {"text": "$7/4$", "isCorrect": true, "rationale": "According to PEMDAS, evaluate the exponent first: $(1/2)^2 = 1/4$. Next, perform the division: $3/4 \\div 1/2 = 3/4 \\times 2/1 = 6/4 = 3/2$. Finally, perform the addition: $1/4 + 3/2 = 1/4 + 6/4 = 7/4$."}, {"text": "$3/2$", "isCorrect": false, "rationale": "This result suggests that the exponentiation $(1/2)^2$ was either not performed or incorrectly cancelled out. The division $3/4 \\div 1/2$ correctly yields $3/2$, but the full expression includes addition."}], "id": "q08"}, {"question": "A baker has $5 \\frac{1}{3}$ cups of sugar. She uses $1 \\frac{1}{2}$ cups for a cake and then divides the remaining sugar equally into $1/3$-cup portions. How many full $1/3$-cup portions can she make?", "options": [{"text": "$11$ portions", "isCorrect": true, "rationale": "First, find the remaining sugar: $5 \\frac{1}{3} - 1 \\frac{1}{2} = 16/3 - 3/2 = 32/6 - 9/6 = 23/6$ cups. Then, divide the remaining sugar by the portion size: $(23/6) \\div (1/3) = 23/6 \\times 3/1 = 23/2 = 11 \\frac{1}{2}$. Since she can only make full portions, the answer is $11$."}, {"text": "$10$ portions", "isCorrect": false, "rationale": "This result might come from an arithmetic error during the subtraction or division steps. Carefully convert mixed numbers to improper fractions and find common denominators."}, {"text": "$8$ portions", "isCorrect": false, "rationale": "This implies a significant error in calculation, possibly in the initial subtraction or conversion of mixed numbers. Recheck all steps."}, {"text": "$12$ portions", "isCorrect": false, "rationale": "This is an overestimation, possibly from rounding up too early or an error in subtraction or division. The exact calculation leads to $11 \\frac{1}{2}$ portions."}], "id": "q09"}, {"question": "The 'Key Concept Summary' suggests to 'Simplify at each step to keep the arithmetic manageable' when working with fractions. What is the primary benefit of this strategy?", "options": [{"text": "It eliminates the need to find common denominators for addition and subtraction.", "isCorrect": false, "rationale": "Simplifying fractions reduces their values, but it does not remove the requirement to find common denominators when adding or subtracting fractions with different denominators."}, {"text": "It guarantees that all intermediate results will be whole numbers.", "isCorrect": false, "rationale": "While simplifying makes numbers smaller, it does not guarantee that intermediate results will always be whole numbers. They will often remain fractions."}, {"text": "It reduces the magnitude of the numbers involved, making calculations easier and less prone to errors.", "isCorrect": true, "rationale": "By simplifying at each step, you work with smaller numerators and denominators. This makes subsequent operations (like finding common denominators, multiplying, or dividing) much simpler and significantly reduces the chance of making arithmetic mistakes."}, {"text": "It allows cross-cancellation to occur even in complex fractions before full simplification.", "isCorrect": false, "rationale": "This is incorrect and directly contradicts the 'caution' note. Simplifying helps manage arithmetic, but it does not change the rule about when cross-cancellation is appropriate in complex fractions."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
