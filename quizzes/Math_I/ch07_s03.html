<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 7, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "To find a percent of a number, what are the two main steps, in order?", "options": [{"text": "Multiply the percent by 100, then multiply by the number.", "isCorrect": false, "rationale": "Multiplying the percent by 100 is an incorrect first step; it would lead to a value 100 times too large. The correct first step is to convert the percent to a decimal by dividing by 100."}, {"text": "Convert the percent to a decimal, then multiply by the number.", "isCorrect": true, "rationale": "According to the 'Finding a Percent of a Number' property and summary, the correct procedure is to first convert the percent to a decimal (or fraction) and then multiply that decimal by the given number."}, {"text": "Divide the number by the percent, then convert the percent to a decimal.", "isCorrect": false, "rationale": "This sequence of operations is incorrect for finding a percent of a number. Division is not the primary operation, and the conversion step should precede multiplication."}, {"text": "Multiply the number by the percent, then divide by 100.", "isCorrect": false, "rationale": "This option describes a backward or incorrect approach. The percent should be converted to a decimal *before* any multiplication with the number to avoid common errors highlighted in the 'caution' note."}], "id": "q01"}, {"question": "What is 12% of 150?", "options": [{"text": "1.8", "isCorrect": false, "rationale": "This result would occur if 1.2% of 150 was calculated (0.012 * 150) or 12% of 15 (0.12 * 15), neither of which is correct for the given problem."}, {"text": "18", "isCorrect": true, "rationale": "To find 12% of 150, convert 12% to a decimal (0.12) and multiply by 150: 0.12 * 150 = 18. This matches the checkpoint example."}, {"text": "180", "isCorrect": false, "rationale": "This result would occur if 120% of 150 was calculated (1.2 * 150) or if the decimal point was misplaced (e.g., 1.2 * 150), which is incorrect."}, {"text": "1800", "isCorrect": false, "rationale": "This result is obtained by multiplying 12 directly by 150 (12 * 150), which is a common mistake explicitly warned against in the 'caution' note—not converting the percent to a decimal first."}], "id": "q02"}, {"question": "In the phrase 'Find 8.5% of 200', what does the word 'of' primarily signify in mathematical terms, according to the textbook?", "options": [{"text": "Addition", "isCorrect": false, "rationale": "The word 'of' does not signify addition in the context of finding a percent of a number."}, {"text": "Subtraction", "isCorrect": false, "rationale": "The word 'of' does not signify subtraction in the context of finding a percent of a number."}, {"text": "Multiplication", "isCorrect": true, "rationale": "The 'note' in the textbook explicitly states, 'The word of in a percent problem usually means multiply.'"}, {"text": "Division", "isCorrect": false, "rationale": "The word 'of' does not signify division in the context of finding a percent of a number."}], "id": "q03"}, {"question": "When finding 8.5% of 200, what is the correct decimal conversion for 8.5%?", "options": [{"text": "8.5", "isCorrect": false, "rationale": "This is the original number without converting the percent. To convert a percent to a decimal, you must divide by 100."}, {"text": "0.85", "isCorrect": false, "rationale": "This conversion is incorrect; it represents 85%, not 8.5%. The decimal point is shifted only one place instead of two."}, {"text": "0.085", "isCorrect": true, "rationale": "To convert 8.5% to a decimal, divide 8.5 by 100, which moves the decimal point two places to the left, resulting in 0.085. This is demonstrated in the 'Percent with a Decimal' example."}, {"text": "0.0085", "isCorrect": false, "rationale": "This conversion is incorrect; it represents 0.85%, not 8.5%. The decimal point is shifted too many places."}], "id": "q04"}, {"question": "A jacket regularly costs $60 and is on sale for 30% off. How much is the discount amount?", "options": [{"text": "$18", "isCorrect": true, "rationale": "To find the discount, calculate 30% of $60. Convert 30% to 0.30, then multiply: 0.30 * $60 = $18. This directly follows the 'Sale Discount' example."}, {"text": "$42", "isCorrect": false, "rationale": "This amount represents the sale price of the jacket ($60 - $18), not the discount amount itself."}, {"text": "$30", "isCorrect": false, "rationale": "This amount is 50% of the regular price, not 30%."}, {"text": "$1.80", "isCorrect": false, "rationale": "This result would occur if 3% of $60 was calculated (0.03 * $60), which is incorrect for a 30% discount."}], "id": "q05"}, {"question": "If you find 150% of 40, what will be the relationship between your answer and the original number 40?", "options": [{"text": "The answer will be smaller than 40.", "isCorrect": false, "rationale": "When the percent is greater than 100%, the resulting part will always be larger than the original whole, as stated in the 'Percent Greater Than 100' example and summary."}, {"text": "The answer will be equal to 40.", "isCorrect": false, "rationale": "The answer would only be equal to 40 if the percentage was 100%, not 150%."}, {"text": "The answer will be greater than 40.", "isCorrect": true, "rationale": "The 'Percent Greater Than 100' example explicitly states, 'Since the percent is greater than 100%, the result is greater than the original number.' Also, 1.50 * 40 = 60, which is greater than 40."}, {"text": "The relationship depends on whether 40 is an even or odd number.", "isCorrect": false, "rationale": "The parity of the number does not influence the relationship between the part and the whole when the percentage is greater than 100%."}], "id": "q06"}, {"question": "What is the result of finding 200% of 35?", "options": [{"text": "7", "isCorrect": false, "rationale": "This result is incorrect. It would represent 20% of 35 if the conversion was 0.20."}, {"text": "35", "isCorrect": false, "rationale": "This would be the answer if you were finding 100% of 35, not 200%."}, {"text": "70", "isCorrect": true, "rationale": "To find 200% of 35, convert 200% to a decimal (2.00) and multiply by 35: 2.00 * 35 = 70. This matches the 'Percent Greater Than 100' checkpoint."}, {"text": "700", "isCorrect": false, "rationale": "This result is obtained by multiplying 200 directly by 35 (200 * 35), which is a common mistake of not converting the percent to a decimal first."}], "id": "q07"}, {"question": "A student calculates '25% of 80' as 2,000. Based on the 'caution' note, what was the likely error?", "options": [{"text": "The student multiplied 0.25 by 800 instead of 80.", "isCorrect": false, "rationale": "While multiplying by 800 would lead to a larger number, the text specifically identifies a different common error."}, {"text": "The student divided 80 by 0.25 instead of multiplying.", "isCorrect": false, "rationale": "Dividing 80 by 0.25 (which is 320) does not result in 2,000. This is also not the specific common mistake highlighted."}, {"text": "The student used 25 instead of 0.25 when multiplying.", "isCorrect": true, "rationale": "The 'caution' note explicitly states, 'Writing 25% * 80 = 2,000 is a common mistake—it uses 25 instead of 0.25.' This directly describes the student's error."}, {"text": "The student added 25 to 80 instead of multiplying.", "isCorrect": false, "rationale": "Adding 25 to 80 would result in 105, not 2,000. The problem describes a multiplication error, not an operation error."}], "id": "q08"}, {"question": "If a store offers a 20% discount on an item that costs $120, what is the final price the customer pays?", "options": [{"text": "$24", "isCorrect": false, "rationale": "$24 is the discount amount (0.20 * $120), not the final price the customer pays."}, {"text": "$96", "isCorrect": true, "rationale": "First, find the discount: 20% of $120 = 0.20 * $120 = $24. Then, subtract the discount from the original price to find the final price: $120 - $24 = $96. This is an application of the 'Sale Discount' example."}, {"text": "$144", "isCorrect": false, "rationale": "This would be the result if a 20% tax or markup was added instead of a discount ($120 + $24)."}, {"text": "$120", "isCorrect": false, "rationale": "This is the original price, implying no discount was applied."}], "id": "q09"}, {"question": "Based on the 'Finding a Percent of a Number Summary', which statement is NOT true regarding finding a percent of a number?", "options": [{"text": "The word 'of' signals multiplication.", "isCorrect": false, "rationale": "This statement is true, as explicitly mentioned in the summary and a previous note. 'The word of signals multiplication.'"}, {"text": "You should always multiply the percent by 100 before multiplying by the whole.", "isCorrect": true, "rationale": "This statement is false. The summary states, 'Convert the percent to a decimal (divide by 100),' not multiply by 100. Multiplying by 100 would make the percent value incorrect."}, {"text": "If the percent is greater than 100%, the part is greater than the whole.", "isCorrect": false, "rationale": "This statement is true, as directly stated in the summary: 'If the percent is greater than 100%, the part is greater than the whole.'"}, {"text": "The process involves converting the percent to a decimal.", "isCorrect": false, "rationale": "This statement is true. The first step listed in the summary is 'Convert the percent to a decimal (divide by 100).'"}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
