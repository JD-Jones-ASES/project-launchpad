<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 7, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following correctly represents the percent equation as stated in the textbook section?", "options": [{"text": "percent = part × whole", "isCorrect": false, "rationale": "This formula incorrectly places 'percent' as the product of 'part' and 'whole'. The text defines 'part' as the product of 'percent' and 'whole'."}, {"text": "whole = percent ÷ part", "isCorrect": false, "rationale": "This formula is an incorrect rearrangement of the percent equation. To find the whole, you divide the part by the percent, but the structure provided is incorrect."}, {"text": "part = percent × whole", "isCorrect": true, "rationale": "This is the fundamental percent equation explicitly defined in the textbook section: 'part = percent whole'."}, {"text": "part = whole ÷ percent", "isCorrect": false, "rationale": "This formula incorrectly divides the 'whole' by the 'percent' to find the 'part'. The correct operation is multiplication."}]}, {"question": "What is 45% of 300?", "options": [{"text": "13.5", "isCorrect": false, "rationale": "This result would be obtained if the percent was incorrectly converted (e.g., 0.045) or if a different number was used."}, {"text": "135", "isCorrect": true, "rationale": "To find the part, you convert the percent to a decimal (45% = 0.45) and multiply it by the whole: 0.45 × 300 = 135."}, {"text": "6.67", "isCorrect": false, "rationale": "This result suggests an incorrect division (e.g., 300 / 45) rather than finding a part of the whole."}, {"text": "0.15", "isCorrect": false, "rationale": "This result is incorrect and does not reflect the correct calculation for finding a percentage of a number."}]}, {"question": "24 is what percent of 120?", "options": [{"text": "500%", "isCorrect": false, "rationale": "This would be the result if 120 were divided by 24 and then multiplied by 100%, which is incorrect for finding the percent."}, {"text": "20%", "isCorrect": true, "rationale": "To find the percent, you divide the part (24) by the whole (120): 24 ÷ 120 = 0.25. Converting the decimal to a percent gives 20%."}, {"text": "0.2%", "isCorrect": false, "rationale": "While 0.2 is the decimal form, it has not been converted to a percent. The question asks for 'what percent'."}, {"text": "5%", "isCorrect": false, "rationale": "This result is incorrect and likely stems from an incorrect calculation or misplacement of the decimal."}]}, {"question": "75 is 15% of what number?", "options": [{"text": "500", "isCorrect": true, "rationale": "To find the whole, you divide the part (75) by the percent (converted to a decimal, 15% = 0.15): 75 ÷ 0.15 = 500."}, {"text": "11.25", "isCorrect": false, "rationale": "This result would be obtained if you multiplied 75 by 0.15, which is an incorrect operation for finding the whole."}, {"text": "5", "isCorrect": false, "rationale": "This result is obtained by dividing 75 by 15, neglecting to convert the percent to a decimal first, as required by the text."}, {"text": "1125", "isCorrect": false, "rationale": "This result would be obtained by multiplying 75 by 15, which is an incorrect operation."}]}, {"question": "In the problem '45 is 90% of what number?', which component of the percent equation is unknown?", "options": [{"text": "The part", "isCorrect": false, "rationale": "In this problem, '45' is the known part."}, {"text": "The percent", "isCorrect": false, "rationale": "In this problem, '90%' is the known percent."}, {"text": "The whole", "isCorrect": true, "rationale": "The phrase 'what number' refers to the total amount, which is the whole. As stated in the caution, the whole often follows 'of'."}, {"text": "The ratio", "isCorrect": false, "rationale": "While a percent can be expressed as a ratio, 'ratio' is not one of the three components (part, percent, whole) of the percent equation discussed."}]}, {"question": "According to the text, what essential step must be taken with the percent value before performing multiplication or division in the percent equation?", "options": [{"text": "Multiply it by 100", "isCorrect": false, "rationale": "Multiplying by 100 would convert a decimal back into a percent, or a percent into a much larger number, which is incorrect for calculations."}, {"text": "Round it to the nearest whole number", "isCorrect": false, "rationale": "Rounding the percent could lead to inaccurate results; the text does not advise this step for calculation purposes."}, {"text": "Convert it to a decimal or fraction", "isCorrect": true, "rationale": "The text explicitly states, 'Write the percent as a decimal before multiplying or dividing' and 'Always convert the percent to a decimal (or fraction) first.'"}, {"text": "Add it to the part", "isCorrect": false, "rationale": "Adding the percent to the part is not a step in solving the percent equation."}]}, {"question": "A local charity raised $420, which represents 35% of their fundraising goal. What was their total fundraising goal?", "options": [{"text": "$147", "isCorrect": false, "rationale": "This result is obtained by multiplying $420 by 0.35, which would find 35% of $420, not the total goal."}, {"text": "$1200", "isCorrect": true, "rationale": "Here, $420 is the part and 35% is the percent. To find the whole (the total goal), divide the part by the percent (as a decimal): $420 ÷ 0.35 = $1200."}, {"text": "$120", "isCorrect": false, "rationale": "This result is obtained if the decimal point in 0.35 was misplaced during division (e.g., dividing by 3.5 instead of 0.35)."}, {"text": "$1470", "isCorrect": false, "rationale": "This result is likely from multiplying $420 by 3.5, which is an incorrect operation for this problem."}]}, {"question": "A student scored 80% on a test with 50 questions. How many questions did the student answer correctly?", "options": [{"text": "40", "isCorrect": true, "rationale": "In this problem, 80% is the percent and 50 is the whole. To find the part (correct answers), convert 80% to a decimal (0.80) and multiply by the whole: 0.80 × 50 = 40."}, {"text": "62.5", "isCorrect": false, "rationale": "This result would be obtained by dividing 50 by 0.80, which would find the whole if 50 was the part, not the number of correct answers."}, {"text": "80", "isCorrect": false, "rationale": "This is the percentage itself, not the number of questions answered correctly."}, {"text": "16", "isCorrect": false, "rationale": "This result is incorrect and does not reflect the proper application of the percent equation."}]}, {"question": "Out of 250 trees planted in a new park, 150 are oak trees. What percent of the trees are oak trees?", "options": [{"text": "60%", "isCorrect": true, "rationale": "Here, 150 is the part (oak trees) and 250 is the whole (total trees). To find the percent, divide the part by the whole: 150 ÷ 250 = 0.60. Convert the decimal to a percent: 0.60 × 100% = 60%."}, {"text": "15%", "isCorrect": false, "rationale": "This result is incorrect and does not represent the correct percentage of oak trees."}, {"text": "25%", "isCorrect": false, "rationale": "This result is incorrect and does not represent the correct percentage of oak trees."}, {"text": "6%", "isCorrect": false, "rationale": "This result would be obtained if the decimal 0.60 was incorrectly converted to a percent (e.g., by omitting multiplication by 100 or misplacing the decimal)."}]}, {"question": "The text states that 'The whole usually follows the word “of.”' Which of the following statements correctly applies this rule?", "options": [{"text": "In 'What is 20% of 80?', 20% is the whole.", "isCorrect": false, "rationale": "The '20%' is the percent, not the whole. According to the rule, '80' (following 'of') is the whole."}, {"text": "In '40 is what percent of 200?', 40 is the whole.", "isCorrect": false, "rationale": "The '40' is the part. According to the rule, '200' (following 'of') is the whole."}, {"text": "In '70 is 35% of what number?', the unknown number is the whole.", "isCorrect": true, "rationale": "The phrase 'what number' directly follows 'of', indicating that the unknown quantity (the number) is the whole in this problem, which aligns with the stated rule."}, {"text": "In 'Find 10% of 50.', 10% is the part.", "isCorrect": false, "rationale": "The '10%' is the percent. According to the rule, '50' (following 'of') is the whole, and the part is what you are trying to find."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
