<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 1, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "In the expression $8^5$, what does the number 5 represent?", "options": [{"text": "The base, which is the number being multiplied.", "isCorrect": false, "rationale": "The base is the number 8, which is being multiplied. The exponent indicates how many times the base is used as a factor."}, {"text": "The exponent, indicating how many times the base (8) is used as a factor.", "isCorrect": true, "rationale": "According to the text, in the expression $b^n$, $n$ is the exponent, which is the number of times the base is used as a factor. Here, 5 is the exponent."}, {"text": "The product of 8 multiplied by 5.", "isCorrect": false, "rationale": "This represents $8 \\times 5 = 40$, which is a common misconception about exponents. $8^5$ means $8 \\times 8 \\times 8 \\times 8 \\times 8$."}, {"text": "The sum of 8 and 5.", "isCorrect": false, "rationale": "This represents $8 + 5 = 13$, which is an irrelevant operation in the context of exponents."}], "id": "q01"}, {"question": "According to the text, what is the special way to read the expression $9^2$?", "options": [{"text": "Nine cubed.", "isCorrect": false, "rationale": "The term 'cubed' is used for an exponent of 3, such as $9^3$, not $9^2$."}, {"text": "Nine to the second power.", "isCorrect": false, "rationale": "While technically correct as a general reading, the text specifically identifies 'squared' as the special reading for an exponent of 2."}, {"text": "Nine squared.", "isCorrect": true, "rationale": "The text states that $b^2$ is read 'b squared' as a special power."}, {"text": "Nine times two.", "isCorrect": false, "rationale": "This is a common misconception; $9^2$ means $9 \\times 9$, not $9 \\times 2$."}], "id": "q02"}, {"question": "Which exponential expression correctly represents the product $5 \\times 5 \\times 5 \\times 5 \\times 5 \\times 5$?", "options": [{"text": "$6^5$", "isCorrect": false, "rationale": "The base is the number being multiplied, which is 5. The exponent is the number of times it appears."}, {"text": "$5^6$", "isCorrect": true, "rationale": "The number 5 is the base, and it appears as a factor 6 times. Therefore, the exponential form is $5^6$."}, {"text": "$5 \\times 6$", "isCorrect": false, "rationale": "This is a common misconception. Exponents represent repeated multiplication, not multiplication of the base by the exponent."}, {"text": "$5^5$", "isCorrect": false, "rationale": "The base 5 appears 6 times as a factor, not 5 times."}], "id": "q03"}, {"question": "Evaluate the expression $4^3$.", "options": [{"text": "12", "isCorrect": false, "rationale": "This is the result of multiplying the base by the exponent ($4 \\times 3$), which is a common error in evaluating powers."}, {"text": "64", "isCorrect": true, "rationale": "To evaluate $4^3$, you multiply the base (4) by itself 3 times: $4 \\times 4 \\times 4 = 16 \\times 4 = 64$."}, {"text": "16", "isCorrect": false, "rationale": "This is the result of $4^2$, not $4^3$."}, {"text": "81", "isCorrect": false, "rationale": "This is the result of $3^4$, not $4^3$."}], "id": "q04"}, {"question": "What is the value of $(2023)^0$?", "options": [{"text": "0", "isCorrect": false, "rationale": "Raising a non-zero number to the power of zero does not result in 0. Only $0^n$ for $n>0$ would be 0, or $0^0$ is typically undefined."}, {"text": "1", "isCorrect": true, "rationale": "The 'Zero Exponent' property states that for any nonzero number $b$, $b^0 = 1$. Therefore, $(2023)^0 = 1$."}, {"text": "2023", "isCorrect": false, "rationale": "This would be the result if the exponent were 1, i.e., $(2023)^1 = 2023$."}, {"text": "Undefined", "isCorrect": false, "rationale": "The expression $b^0$ is defined as 1 for any nonzero base $b$. It is $0^0$ that is typically considered undefined or context-dependent."}], "id": "q05"}, {"question": "Evaluate the expression $7 \\times 2^3 - 10$.", "options": [{"text": "46", "isCorrect": true, "rationale": "Following the order of operations: First, evaluate the exponent ($2^3 = 8$). Then, perform multiplication ($7 \\times 8 = 56$). Finally, perform subtraction ($56 - 10 = 46$)."}, {"text": "32", "isCorrect": false, "rationale": "This result occurs if the exponent was incorrectly treated as multiplication ($2 \\times 3 = 6$), leading to $7 \\times 6 - 10 = 42 - 10 = 32$."}, {"text": "-14", "isCorrect": false, "rationale": "This result occurs if operations are done out of order, such as subtraction before exponentiation and multiplication: $7 \\times (2^3 - 10) = 7 \\times (8 - 10) = 7 \\times (-2) = -14$."}, {"text": "2734", "isCorrect": false, "rationale": "This result occurs if multiplication is done before exponentiation: $(7 \\times 2)^3 - 10 = 14^3 - 10 = 2744 - 10 = 2734$."}], "id": "q06"}, {"question": "Evaluate $(2 + 3)^2 \\times 5$.", "options": [{"text": "50", "isCorrect": false, "rationale": "This result occurs if the exponent was treated as multiplication by 2: $(2+3) \\times 2 \\times 5 = 5 \\times 2 \\times 5 = 50$."}, {"text": "125", "isCorrect": true, "rationale": "Following the order of operations: First, solve inside the parentheses ($2+3 = 5$). Then, evaluate the exponent ($5^2 = 25$). Finally, perform multiplication ($25 \\times 5 = 125$)."}, {"text": "25", "isCorrect": false, "rationale": "This result occurs if the exponent was ignored after solving the parentheses: $(2+3) \\times 5 = 5 \\times 5 = 25$."}, {"text": "65", "isCorrect": false, "rationale": "This result occurs if the exponent was incorrectly distributed to each term inside the parentheses: $(2^2 + 3^2) \\times 5 = (4 + 9) \\times 5 = 13 \\times 5 = 65$."}], "id": "q07"}, {"question": "The approximate distance from Earth to the Moon is $2.4 \\times 10^5$ miles. Write this distance in standard form.", "options": [{"text": "24,000 miles", "isCorrect": false, "rationale": "This would be $2.4 \\times 10^4$. The exponent $10^5$ means the decimal point moves 5 places to the right, which creates 5 zeros after 2.4."}, {"text": "240,000 miles", "isCorrect": true, "rationale": "The expression $10^5$ represents a 1 followed by 5 zeros, which is 100,000. Multiplying $2.4$ by $100,000$ shifts the decimal point 5 places to the right, resulting in 240,000."}, {"text": "2,400,000 miles", "isCorrect": false, "rationale": "This would be $2.4 \\times 10^6$. The exponent given is 5, not 6."}, {"text": "$2.45$ miles", "isCorrect": false, "rationale": "This is an incorrect interpretation of $10^5$, possibly treating it as an addition ($10+5$) or simply ignoring the exponent's effect entirely."}], "id": "q08"}, {"question": "Which statement correctly explains the difference between $4^3$ and $4 \\times 3$?", "options": [{"text": "$4^3$ means $4 \\times 3 = 12$, while $4 \\times 3$ means $4+4+4=12$.", "isCorrect": false, "rationale": "This statement incorrectly defines $4^3$ and correctly defines $4 \\times 3$ in terms of repeated addition, but does not correctly define $4^3$."}, {"text": "$4^3$ means $4+4+4 = 12$, while $4 \\times 3$ means $4 \\times 4 \\times 4 = 64$.", "isCorrect": false, "rationale": "This statement incorrectly defines both $4^3$ (as repeated addition) and $4 \\times 3$ (as an exponent)."}, {"text": "$4^3$ means $4 \\times 4 \\times 4 = 64$, while $4 \\times 3$ means $4+4+4 = 12$.", "isCorrect": true, "rationale": "As per the text's caution, $4^3$ means using 4 as a factor 3 times ($4 \\times 4 \\times 4$). $4 \\times 3$ means 4 added to itself 3 times ($4+4+4$) or 3 added to itself 4 times ($3+3+3+3$). Both result in 12."}, {"text": "$4^3$ means $4+3+3+3 = 13$, while $4 \\times 3$ means $4 \\times 4 \\times 4 = 64$.", "isCorrect": false, "rationale": "This statement incorrectly defines both expressions."}], "id": "q09"}, {"question": "According to the 'Exponents and Powers Summary', when are exponents evaluated in the order of operations?", "options": [{"text": "Before parentheses but after multiplication and division.", "isCorrect": false, "rationale": "Parentheses are always evaluated first in the order of operations, so exponents cannot be evaluated before them."}, {"text": "After addition and subtraction but before multiplication and division.", "isCorrect": false, "rationale": "Exponents have a higher precedence than multiplication/division, and both have higher precedence than addition/subtraction."}, {"text": "After parentheses but before multiplication and division.", "isCorrect": true, "rationale": "The summary states, 'In the order of operations, evaluate exponents after parentheses but before multiplication and division.' This aligns with standard order of operations (PEMDAS/BODMAS)."}, {"text": "After multiplication and division but before addition and subtraction.", "isCorrect": false, "rationale": "This reverses the correct order of precedence between exponents and multiplication/division."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
