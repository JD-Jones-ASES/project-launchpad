        <div class="subtitle">Math I &mdash; Chapter 6, Section 3</div>

        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz

</div>

<script>
var QUESTIONS = [{"question": "What is the defining characteristic of a proportion?", "options": [{"text": "It is an equation where two fractions are multiplied together.", "isCorrect": false, "rationale": "A proportion involves the equality of two ratios, not the multiplication of fractions."}, {"text": "It is an equation that states two ratios are equal.", "isCorrect": true, "rationale": "The text explicitly defines a proportion as 'an equation that states two ratios are equal'."}, {"text": "It is a method for finding the product of two denominators.", "isCorrect": false, "rationale": "Finding the product of denominators might be part of cross multiplication, but it is not the definition of a proportion itself."}, {"text": "It is a single fraction used to represent a complex problem.", "isCorrect": false, "rationale": "A proportion consists of two equal ratios, not a single fraction."}]}, {"question": "According to the Cross Products Property, if $a/b = c/d$ (with $b \neq 0$ and $d \neq 0$), which of the following must be true?", "options": [{"text": "$a \\times c = b \\times d$", "isCorrect": false, "rationale": "This statement incorrectly multiplies numerators together and denominators together, which is not the Cross Products Property."}, {"text": "$a \\times d = b \\times c$", "isCorrect": true, "rationale": "The Cross Products Property states that if two ratios form a proportion, then their cross products are equal, meaning $a \\times d = b \\times c$."}, {"text": "$a + d = b + c$", "isCorrect": false, "rationale": "The Cross Products Property involves multiplication of terms across the equals sign, not addition."}, {"text": "$b/a = d/c$", "isCorrect": false, "rationale": "While inverting both sides of a proportion maintains equality, this is not what the Cross Products Property describes. The property specifically refers to the equality of $a \\times d$ and $b \\times c$."}]}, {"question": "Do the ratios $5/8$ and $15/20$ form a proportion?", "options": [{"text": "Yes, because $5 \\times 15 = 8 \\times 20$.", "isCorrect": false, "rationale": "This statement uses incorrect cross products. $5 \\times 15 = 75$ and $8 \\times 20 = 160$, which are not equal."}, {"text": "No, because $5 \\times 20 = 100$ and $8 \\times 15 = 120$, and $100 \\neq 120$.", "isCorrect": true, "rationale": "To determine if two ratios form a proportion, we check their cross products. $5 \\times 20 = 100$ and $8 \\times 15 = 120$. Since $100 \\neq 120$, the ratios do not form a proportion, as stated in the checkpoint example."}, {"text": "Yes, because both ratios can be simplified to $1/2$.", "isCorrect": false, "rationale": "$5/8$ cannot be simplified to $1/2$. $15/20$ simplifies to $3/4$, not $1/2$. Therefore, they are not equal."}, {"text": "No, because the numerators and denominators are not the same.", "isCorrect": false, "rationale": "Proportions do not require numerators and denominators to be the same; they require the *ratios* to be equal."}]}, {"question": "Solve the proportion $8/n = 12/9$ for $n$.", "options": [{"text": "$n = 108$", "isCorrect": false, "rationale": "This results from multiplying $12 \\times 9$, but ignores the other side of the equation and the division step. The correct cross product is $12n = 8 \\times 9 = 72$, so $n = 72/12 = 6$."}, {"text": "$n = 6$", "isCorrect": true, "rationale": "Using cross multiplication: $8 \\times 9 = 12 \\times n$. This simplifies to $72 = 12n$. Dividing both sides by $12$ gives $n = 6$. This matches the checkpoint example."}, {"text": "$n = 1.5$", "isCorrect": false, "rationale": "This might come from $12/8$, but incorrectly applied. The correct process is $12n=72$, so $n=6$."}, {"text": "$n = 72$", "isCorrect": false, "rationale": "This is the product of $8 \\times 9$, but it is equal to $12n$, not $n$ itself."}]}, {"question": "A recipe calls for $3$ cups of flour for every $2$ cups of sugar. If you want to use $8$ cups of sugar, which proportion correctly represents how to find the amount of flour ($f$) needed?", "options": [{"text": "$3 \\text{ flour} / 2 \\text{ sugar} = 8 \\text{ sugar} / f \\text{ flour}$", "isCorrect": false, "rationale": "This setup incorrectly places 'sugar' in the numerator of the second ratio when it should correspond to 'flour', and 'flour' in the denominator when it should correspond to 'sugar'. Units are not consistent."}, {"text": "$3 \\text{ flour} / 2 \\text{ sugar} = f \text{ flour} / 8 \text{ sugar}$", "isCorrect": true, "rationale": "This proportion correctly keeps 'flour' in the numerator and 'sugar' in the denominator for both ratios, ensuring corresponding quantities are in the same position."}, {"text": "$3 \text{ flour} / f \text{ flour} = 8 \text{ sugar} / 2 \text{ sugar}$", "isCorrect": false, "rationale": "This setup mixes units across the ratios. The first ratio compares flour to flour, while the second compares sugar to sugar, which doesn't directly solve for the unknown in the given context."}, {"text": "$2 \text{ sugar} / 3 \text{ flour} = f \text{ flour} / 8 \text{ sugar}$", "isCorrect": false, "rationale": "While the first ratio is inverted, the second ratio still incorrectly places 'flour' in the numerator when comparing sugar to sugar, violating the consistency rule."}]}, {"question": "A machine fills $5$ bottles every $2$ minutes. At the same rate, how many bottles does it fill in $14$ minutes?", "options": [{"text": "$70$ bottles", "isCorrect": false, "rationale": "This answer might come from multiplying $5 \\times 14$ without accounting for the $2$ minutes per $5$ bottles. The correct calculation is $2n = 5 \\times 14$, so $2n = 70$, thus $n = 35$."}, {"text": "$35$ bottles", "isCorrect": true, "rationale": "Setting up the proportion: $5 \\text{ bottles} / 2 \\text{ min} = n \\text{ bottles} / 14 \\text{ min}$. Cross multiplying gives $5 \\times 14 = 2 \\times n$, which is $70 = 2n$. Dividing by $2$ yields $n = 35$. This matches the example problem."}, {"text": "$28$ bottles", "isCorrect": false, "rationale": "This answer is likely the result of an incorrect calculation or proportion setup, such as $14 \\times (2/5)$."}, {"text": "$10$ bottles", "isCorrect": false, "rationale": "This answer is incorrect and doesn't follow the proportional relationship. It's possibly from doubling the bottles and minutes ($5 \times 2 = 10$ bottles in $2 \times 2 = 4$ minutes), but not scaling to 14 minutes."}]}, {"question": "Two similar triangles have corresponding sides in proportion. If the first triangle has a side of length $8$ cm and the second triangle has a corresponding side of length $20$ cm, and a second side of the first triangle is $12$ cm, what is the length of its corresponding side ($x$) in the second triangle?", "options": [{"text": "$x = 30$ cm", "isCorrect": true, "rationale": "Set up the proportion with corresponding sides: $8 \\text{ cm (first)} / 20 \\text{ cm (second)} = 12 \\text{ cm (first)} / x \\text{ cm (second)}$. Cross multiplying gives $8x = 20 \\times 12$, so $8x = 240$. Dividing by $8$ gives $x = 30$ cm."}, {"text": "$x = 4.8$ cm", "isCorrect": false, "rationale": "This would result if the proportion was set up as $20/8 = x/12$, which incorrectly pairs corresponding sides or inverts one ratio relative to the other."}, {"text": "$x = 24$ cm", "isCorrect": false, "rationale": "This might come from an incorrect setup like $8/12 = x/20$ leading to $12x = 160$, which is $x = 13.33$, or some other miscalculation. A common mistake would be to assume an additive relationship rather than a multiplicative one."}, {"text": "$x = 18$ cm", "isCorrect": false, "rationale": "This is an incorrect calculation. The ratio of corresponding sides is $20/8 = 2.5$. So $x = 12 \\times 2.5 = 30$."}]}, {"question": "When setting up a proportion for a word problem, such as comparing miles driven to hours traveled, what crucial rule must be followed?", "options": [{"text": "The numerators must always be larger than the denominators.", "isCorrect": false, "rationale": "This is not a general rule for proportions; ratios can be less than, equal to, or greater than one."}, {"text": "The cross products must be divided by the largest number.", "isCorrect": false, "rationale": "Cross products are divided by the coefficient of the variable, not necessarily the largest number in the equation."}, {"text": "Corresponding quantities must be in the same position in both ratios.", "isCorrect": true, "rationale": "The 'caution' note explicitly states: 'make sure the corresponding quantities are in the same position. If the first ratio has miles on top and hours on the bottom, the second ratio must also have miles on top and hours on the bottom.'"}, {"text": "Both ratios must be simplified to their lowest terms before setting up the proportion.", "isCorrect": false, "rationale": "While simplifying ratios can make calculations easier, it is not a requirement for correctly setting up a proportion. The raw numbers can be used directly."}]}, {"question": "Under what specific condition is cross multiplication a valid method to solve an equation?", "options": [{"text": "It works for any equation involving fractions.", "isCorrect": false, "rationale": "The note specifies a particular condition, meaning it does not work for *any* equation involving fractions."}, {"text": "It only works when there is a single fraction on each side of the equals sign.", "isCorrect": true, "rationale": "The 'note' section explicitly states, 'It only works when you have a single fraction on each side of the equals sign'."}, {"text": "It works only when the denominators are prime numbers.", "isCorrect": false, "rationale": "There is no such restriction mentioned or implied in the text about prime denominators."}, {"text": "It is only applicable when solving for a variable in the numerator.", "isCorrect": false, "rationale": "Cross multiplication works regardless of whether the variable is in the numerator or denominator, as shown in the example $8/n = 12/9$."}]}, {"question": "What is the primary purpose of using proportions in problem-solving?", "options": [{"text": "To simplify complex fractions into whole numbers.", "isCorrect": false, "rationale": "While simplifying is part of working with fractions, it's not the primary purpose of proportions themselves."}, {"text": "To determine if two numbers are multiples of each other.", "isCorrect": false, "rationale": "Proportions deal with the equality of ratios, not directly with determining if numbers are multiples, though related."}, {"text": "To find an unknown quantity when another related quantity changes at a constant rate.", "isCorrect": true, "rationale": "The introductory paragraph states, 'Proportions let you solve problems where one quantity changes and you need to find the other.' This aligns with finding an unknown quantity given a constant rate or relationship."}, {"text": "To convert fractions to decimals for easier calculation.", "isCorrect": false, "rationale": "Converting fractions to decimals is a representational change, not the core purpose of using proportions to solve problems."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
