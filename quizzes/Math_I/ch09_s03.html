    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 9, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately distinguishes between perimeter and area of a polygon?", "options": [{"text": "Perimeter is measured in square units, while area is measured in linear units.", "isCorrect": false, "rationale": "This statement is incorrect. Perimeter is measured in linear units (distance around), and area is measured in square units (surface covered)."}, {"text": "Perimeter tells you how much surface a figure covers, and area tells you the distance around it.", "isCorrect": false, "rationale": "This statement incorrectly swaps the definitions. Perimeter is the distance around, and area is the surface covered."}, {"text": "Perimeter is the sum of the lengths of all its sides, and area is the amount of surface it covers.", "isCorrect": true, "rationale": "This statement correctly defines both perimeter as the distance around (sum of sides) and area as the amount of surface covered by the figure."}, {"text": "Both perimeter and area are always calculated using only the lengths of the polygon's sides.", "isCorrect": false, "rationale": "This statement is incorrect. While perimeter uses side lengths, area often requires a perpendicular height, which may not be a side length (e.g., triangle, parallelogram, trapezoid)."}], "id": "q01"}, {"question": "A homeowner wants to put decorative trim around a hexagonal window. If each side of the regular hexagonal window measures 15 cm, what is the total length of trim needed?", "options": [{"text": "90 cm", "isCorrect": true, "rationale": "A regular hexagon has 6 equal sides. The perimeter is calculated as P = ns, where n=6 and s=15 cm. So, P = 6 * 15 = 90 cm."}, {"text": "75 cm", "isCorrect": false, "rationale": "This calculation would be correct for a regular pentagon (5 sides), not a hexagon."}, {"text": "105 cm", "isCorrect": false, "rationale": "This calculation would be correct for a regular heptagon (7 sides), not a hexagon."}, {"text": "1350 cm", "isCorrect": false, "rationale": "This value is excessively large and does not correspond to a perimeter calculation for a regular hexagon with side length 15 cm; it might relate to an incorrect area or volume calculation."}], "id": "q02"}, {"question": "A triangular garden plot has a base of 18 meters and a perpendicular height of 10 meters. How much area does the garden cover?", "options": [{"text": "90 m^2", "isCorrect": true, "rationale": "The area of a triangle is calculated using the formula A = 1/2bh. With b = 18 m and h = 10 m, A = 1/2 * 18 * 10 = 9 * 10 = 90 m^2."}, {"text": "180 m^2", "isCorrect": false, "rationale": "This calculation represents base times height (bh), which is the formula for a parallelogram, not a triangle."}, {"text": "28 m^2", "isCorrect": false, "rationale": "This value would be incorrect for area, as it suggests a perimeter-like calculation or a sum of base and height without proper area formula application."}, {"text": "144 m^2", "isCorrect": false, "rationale": "This calculation does not correspond to the correct formula for the area of a triangle with the given dimensions."}], "id": "q03"}, {"question": "A piece of plywood is in the shape of a parallelogram with a base of 25 inches and a perpendicular height of 12 inches. What is the area of the plywood?", "options": [{"text": "150 in.^2", "isCorrect": false, "rationale": "This calculation represents 1/2bh, which is the formula for a triangle, not a parallelogram."}, {"text": "37 in.^2", "isCorrect": false, "rationale": "This value is incorrect; it might be a sum of base and height, not an area calculation."}, {"text": "300 in.^2", "isCorrect": true, "rationale": "The area of a parallelogram is calculated using the formula A = bh. With b = 25 in. and h = 12 in., A = 25 * 12 = 300 in.^2."}, {"text": "600 in.^2", "isCorrect": false, "rationale": "This calculation is twice the correct area, possibly from multiplying by 2 instead of the correct base times height."}], "id": "q04"}, {"question": "A custom desktop has the shape of a trapezoid. Its parallel sides measure 3 feet and 5 feet, and the perpendicular distance between them is 2.5 feet. What is the area of the desktop?", "options": [{"text": "10 ft^2", "isCorrect": true, "rationale": "The area of a trapezoid is A = 1/2(b1+b2)h. With b1 = 3 ft, b2 = 5 ft, and h = 2.5 ft, A = 1/2(3+5)(2.5) = 1/2(8)(2.5) = 4 * 2.5 = 10 ft^2."}, {"text": "20 ft^2", "isCorrect": false, "rationale": "This calculation would be correct if the 1/2 factor was omitted, resulting in (b1+b2)h, which is incorrect for a trapezoid."}, {"text": "12.5 ft^2", "isCorrect": false, "rationale": "This calculation does not follow the correct formula for the area of a trapezoid with the given dimensions."}, {"text": "8 ft^2", "isCorrect": false, "rationale": "This calculation represents the sum of the bases, which is part of the formula but not the complete area."}], "id": "q05"}, {"question": "Why is it crucial for the height ('h') in area formulas for triangles, parallelograms, and trapezoids to be perpendicular to the base?", "options": [{"text": "Because it simplifies the multiplication step in the formula.", "isCorrect": false, "rationale": "The perpendicularity of height is a geometric requirement for accurately measuring the effective 'vertical' dimension relative to the base, not for simplifying calculation."}, {"text": "To ensure the height measurement is the shortest distance from the base to the opposite vertex or side, providing the true vertical extent.", "isCorrect": true, "rationale": "The perpendicular height correctly represents the shortest and true vertical distance from the base to the opposite side or vertex, which is essential for accurate area calculation."}, {"text": "A non-perpendicular height would be considered a side length, not a height.", "isCorrect": false, "rationale": "While a side might be non-perpendicular, not all non-perpendicular lengths are side lengths. The key is that 'h' specifically refers to the perpendicular distance."}, {"text": "The formulas only work with right-angled figures.", "isCorrect": false, "rationale": "This is incorrect. While the height creates a right angle, the overall polygon (e.g., a general triangle or parallelogram) does not need to be right-angled for the formulas to apply."}], "id": "q06"}, {"question": "A gardener is planning a new rectangular flower bed that is 15 feet long and 8 feet wide. They want to put a small fence around it and cover the entire bed with soil. Which statement correctly identifies the geometric concepts needed and their units?", "options": [{"text": "Fencing requires calculating the area in ft^2, and soil requires calculating the perimeter in ft.", "isCorrect": false, "rationale": "This swaps the concepts and units. Fencing is perimeter (linear units), and soil coverage is area (square units)."}, {"text": "Fencing requires calculating the perimeter in ft, and soil requires calculating the area in ft^2.", "isCorrect": true, "rationale": "Fencing goes 'around' the bed, which is perimeter and measured in linear feet. Covering the 'entire bed' with soil refers to the surface it covers, which is area and measured in square feet."}, {"text": "Both fencing and soil require calculating the area in ft^2.", "isCorrect": false, "rationale": "Fencing is a linear measure (perimeter), not area."}, {"text": "Both fencing and soil require calculating the perimeter in ft.", "isCorrect": false, "rationale": "Soil coverage is a surface measure (area), not perimeter."}], "id": "q07"}, {"question": "A square has a perimeter of 48 cm. What is its area?", "options": [{"text": "144 cm^2", "isCorrect": true, "rationale": "First, find the side length (s) of the square. P = 4s, so 48 = 4s, which means s = 12 cm. Then, the area of a square (a type of rectangle) is A = s^2 = 12^2 = 144 cm^2."}, {"text": "48 cm^2", "isCorrect": false, "rationale": "This value incorrectly assumes the perimeter itself is the area, or applies an incorrect formula."}, {"text": "96 cm^2", "isCorrect": false, "rationale": "This value does not result from the correct calculation for the area of a square with a perimeter of 48 cm."}, {"text": "24 cm^2", "isCorrect": false, "rationale": "This value is incorrect; it might be half the perimeter, which is not the area."}], "id": "q08"}, {"question": "A farmer needs to fertilize a rectangular field that is 150 meters long and 80 meters wide. How many square meters of fertilizer will he need?", "options": [{"text": "230 m^2", "isCorrect": false, "rationale": "This is the sum of the length and width, not the area."}, {"text": "460 m^2", "isCorrect": false, "rationale": "This is the perimeter of the field, P = 2(150) + 2(80) = 300 + 160 = 460 m, not the area."}, {"text": "12,000 m^2", "isCorrect": true, "rationale": "To fertilize the field, the farmer needs to cover its surface, which requires calculating the area. For a rectangle, A = lw = 150 m * 80 m = 12,000 m^2."}, {"text": "1,200 m^2", "isCorrect": false, "rationale": "This is incorrect; 150 * 80 is not 1,200. It's a calculation error."}], "id": "q09"}, {"question": "Which of the following statements about perimeter and area calculations is FALSE?", "options": [{"text": "The perimeter of a regular polygon can be found by multiplying the number of sides by the length of one side.", "isCorrect": false, "rationale": "This statement is true; P = ns is the correct formula for the perimeter of a regular polygon."}, {"text": "The area of a triangle is always half the area of a parallelogram with the same base and perpendicular height.", "isCorrect": false, "rationale": "This statement is true; A_triangle = 1/2bh and A_parallelogram = bh, so a triangle's area is half a parallelogram's with matching base and height."}, {"text": "Perimeter is always measured in linear units, while area is always measured in cubic units.", "isCorrect": true, "rationale": "This statement is false. While perimeter is measured in linear units, area is measured in square units (e.g., cm^2, m^2), not cubic units, which are for volume."}, {"text": "For a trapezoid, both base lengths (b1 and b2) and the perpendicular height (h) are needed to calculate its area.", "isCorrect": false, "rationale": "This statement is true; the formula A = 1/2(b1+b2)h requires all three parameters."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
