<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 9, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which geometric figure is defined as starting at one point and extending infinitely in only one direction?", "options": [{"text": "A line", "isCorrect": false, "rationale": "A line extends infinitely in both directions, not just one."}, {"text": "A line segment", "isCorrect": false, "rationale": "A line segment has two distinct endpoints and a finite length; it does not extend infinitely."}, {"text": "A ray", "isCorrect": true, "rationale": "A ray is defined as starting at one point (its endpoint) and extending forever in one direction, consistent with the description."}, {"text": "A plane", "isCorrect": false, "rationale": "A plane is a flat surface that extends forever in all directions, not just one from a single point."}]}, {"question": "An angle measures $170$ degrees. How would this angle be classified?", "options": [{"text": "Acute", "isCorrect": false, "rationale": "An acute angle measures between $0$ and $90$ degrees, exclusive. $170$ degrees is outside this range."}, {"text": "Right", "isCorrect": false, "rationale": "A right angle measures exactly $90$ degrees. $170$ degrees is not a right angle."}, {"text": "Obtuse", "isCorrect": true, "rationale": "An obtuse angle measures between $90$ and $180$ degrees, exclusive. Since $90 < 170 < 180$, this angle is obtuse."}, {"text": "Straight", "isCorrect": false, "rationale": "A straight angle measures exactly $180$ degrees. $170$ degrees is not a straight angle."}]}, {"question": "What is the measure of the complement of a $38$ degree angle?", "options": [{"text": "$52$ degrees", "isCorrect": true, "rationale": "Complementary angles sum to $90$ degrees. Therefore, $90 - 38 = 52$ degrees."}, {"text": "$62$ degrees", "isCorrect": false, "rationale": "This value would result if the sum was $100$ degrees, or if it was $90 - (38-10)$, which is incorrect for a complement."}, {"text": "$142$ degrees", "isCorrect": false, "rationale": "This is the measure of the supplement of a $38$ degree angle, not its complement."}, {"text": "$152$ degrees", "isCorrect": false, "rationale": "This value is incorrect for both the complement and the supplement of a $38$ degree angle."}]}, {"question": "Two angles are supplementary. If one angle measures $65$ degrees, what is the measure of the other angle?", "options": [{"text": "$25$ degrees", "isCorrect": false, "rationale": "This would be the measure if the angles were complementary (sum to $90$ degrees), not supplementary."}, {"text": "$105$ degrees", "isCorrect": false, "rationale": "This value is incorrect; $180 - 65 = 115$ degrees."}, {"text": "$115$ degrees", "isCorrect": true, "rationale": "Supplementary angles sum to $180$ degrees. Therefore, $180 - 65 = 115$ degrees."}, {"text": "$125$ degrees", "isCorrect": false, "rationale": "This value is incorrect; $180 - 65 = 115$ degrees."}]}, {"question": "When two lines intersect, the angles that are directly opposite each other at the point of intersection are always equal in measure. What are these angles called?", "options": [{"text": "Complementary angles", "isCorrect": false, "rationale": "Complementary angles sum to $90$ degrees; they are not necessarily opposite at an intersection and do not always refer to angles formed by intersecting lines in this manner."}, {"text": "Supplementary angles", "isCorrect": false, "rationale": "Supplementary angles sum to $180$ degrees. Adjacent angles formed by intersecting lines are supplementary, but opposite angles are not necessarily supplementary to each other."}, {"text": "Adjacent angles", "isCorrect": false, "rationale": "Adjacent angles share a common vertex and a common side. While angles at an intersection can be adjacent, the description specifically refers to 'opposite' angles, which is a distinct relationship."}, {"text": "Vertical angles", "isCorrect": true, "rationale": "Vertical angles are defined as the opposite angles formed when two lines intersect, and they are always equal in measure."}]}, {"question": "Two roads intersect, forming four angles. If one of the angles measures $80$ degrees, what are the measures of the other three angles?", "options": [{"text": "$80, 100, 100$ degrees", "isCorrect": true, "rationale": "The angle opposite the $80$ degree angle (its vertical angle) must also be $80$ degrees. The angles adjacent to the $80$ degree angle are supplementary, meaning they each measure $180 - 80 = 100$ degrees. Thus, the other three angles are $80, 100, 100$ degrees."}, {"text": "$80, 80, 100$ degrees", "isCorrect": false, "rationale": "This set incorrectly implies two vertical angles of $80$ and only one adjacent $100$ degree angle, or misses one of the adjacent angles entirely."}, {"text": "$100, 100, 100$ degrees", "isCorrect": false, "rationale": "If all three other angles were $100$ degrees, the sum of all four angles would be $80 + 300 = 380$ degrees, which is impossible for angles around a point (sum must be $360$). Also, it violates the vertical angle property."}, {"text": "$80, 80, 80$ degrees", "isCorrect": false, "rationale": "This set implies all four angles are $80$ degrees, which would only sum to $320$ degrees, and does not account for supplementary relationships."}]}, {"question": "Two angles are supplementary, and one angle is five times the measure of the other. Find the measures of both angles.", "options": [{"text": "$15$ and $75$ degrees", "isCorrect": false, "rationale": "These angles are complementary ($15+75=90$), not supplementary."}, {"text": "$30$ and $150$ degrees", "isCorrect": true, "rationale": "Let the smaller angle be $x$. The larger angle is $5x$. Since they are supplementary, $x + 5x = 180$. This simplifies to $6x = 180$, so $x = 30$. The angles are $30$ degrees and $5 \\times 30 = 150$ degrees."}, {"text": "$45$ and $225$ degrees", "isCorrect": false, "rationale": "While $225$ is five times $45$, their sum ($270$) is not $180$ degrees, so they are not supplementary."}, {"text": "$60$ and $300$ degrees", "isCorrect": false, "rationale": "While $300$ is five times $60$, their sum ($360$) is not $180$ degrees, so they are not supplementary. Also, $300$ is an angle greater than a straight angle, which is not typically considered in this context without specific notation."}]}, {"question": "An angle's measure is $10$ degrees less than its complement. What is the measure of the angle?", "options": [{"text": "$40$ degrees", "isCorrect": true, "rationale": "Let the angle be $x$. Its complement is $90-x$. The problem states $x = (90-x) - 10$. Solving for $x$: $x = 80 - x \\Rightarrow 2x = 80 \\Rightarrow x = 40$ degrees. The angle is $40$ degrees, and its complement is $50$ degrees, with $40$ being $10$ less than $50$."}, {"text": "$45$ degrees", "isCorrect": false, "rationale": "If the angle were $45$ degrees, its complement would also be $45$ degrees, making them equal — not $10$ degrees apart."}, {"text": "$50$ degrees", "isCorrect": false, "rationale": "If the angle is $50$ degrees, its complement is $40$ degrees. In this case, $50$ is $10$ degrees *more* than its complement, not less."}, {"text": "$80$ degrees", "isCorrect": false, "rationale": "If the angle is $80$ degrees, its complement is $10$ degrees. $80$ is $70$ degrees more than its complement, not $10$ degrees less."}]}, {"question": "Which tool is specifically mentioned in the textbook for measuring angles?", "options": [{"text": "Ruler", "isCorrect": false, "rationale": "A ruler is used to measure linear distance or length, not angles."}, {"text": "Compass", "isCorrect": false, "rationale": "A compass is used for drawing circles or arcs, or for transferring distances, not for measuring angles directly in degrees."}, {"text": "Protractor", "isCorrect": true, "rationale": "The textbook explicitly states that 'A protractor is the tool used to measure angles.'"}, {"text": "Set square", "isCorrect": false, "rationale": "A set square is used for drawing lines at specific angles (like $90, 45, 30, 60$ degrees) but not for measuring arbitrary angles in degrees."}]}, {"question": "How does a line segment fundamentally differ from a line?", "options": [{"text": "A line segment has no size, while a line has a measurable length.", "isCorrect": false, "rationale": "A point has no size. A line segment has a measurable length, and a line extends infinitely, so it does not have a measurable finite length."}, {"text": "A line segment extends infinitely in one direction, while a line extends infinitely in two directions.", "isCorrect": false, "rationale": "This description refers to a ray extending infinitely in one direction, not a line segment."}, {"text": "A line segment has two distinct endpoints, while a line extends infinitely in both directions without endpoints.", "isCorrect": true, "rationale": "The definition states a line segment is 'the part of a line between two endpoints,' whereas a line 'extends forever in both directions,' meaning it has no endpoints."}, {"text": "A line segment is named with one capital letter, while a line is named with two capital letters.", "isCorrect": false, "rationale": "A point is named with one capital letter. Both line segments and lines are typically named with two capital letters representing points on them or their endpoints."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
