<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 3, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the text, when is it generally difficult to compare fractions by sight?", "options": [{"text": "When both fractions have the same numerator.", "isCorrect": false, "rationale": "Fractions with the same numerator can often be compared by observing their denominators (e.g., 1/2 is larger than 1/4), so this is not the primary difficulty mentioned."}, {"text": "When the denominators are different.", "isCorrect": true, "rationale": "The introductory paragraph explicitly states, 'When fractions have different denominators, it is hard to compare them by sight.'"}, {"text": "When the fractions are mixed numbers.", "isCorrect": false, "rationale": "While mixed numbers can sometimes be challenging, the text specifies different denominators as the core reason for difficulty in comparing *fractions* by sight, not necessarily their format as mixed numbers."}, {"text": "When the numerators are very large.", "isCorrect": false, "rationale": "The magnitude of the numerators is not identified as the primary reason for difficulty in comparing by sight; the issue lies in the lack of a common basis for comparison due to different denominators."}], "id": "q01"}, {"question": "Using the common denominator method, compare $4/9$ and $5/12$. Which statement is correct?", "options": [{"text": "$4/9 < 5/12$ because $16/36 < 15/36$.", "isCorrect": false, "rationale": "While the LCD (36) is correctly identified and $5/12$ is correctly converted to $15/36$, $4/9$ converts to $16/36$. The comparison $16/36 < 15/36$ is incorrect."}, {"text": "$4/9 > 5/12$ because $16/36 > 15/36$.", "isCorrect": true, "rationale": "To compare $4/9$ and $5/12$, find the LCD of 9 and 12, which is 36. Convert the fractions: $4/9 = (4 \times 4)/(9 \times 4) = 16/36$ and $5/12 = (5 \times 3)/(12 \times 3) = 15/36$. Since $16 > 15$, we have $16/36 > 15/36$, meaning $4/9 > 5/12$."}, {"text": "$4/9 = 5/12$ because their difference is small.", "isCorrect": false, "rationale": "The fractions are not equal, and their 'small difference' is not a valid criterion for equality. The common denominator method clearly shows they are different."}, {"text": "$4/9 < 5/12$ because 9 is less than 12.", "isCorrect": false, "rationale": "Comparing denominators directly is an incorrect method for comparing fractions; it can lead to erroneous conclusions, as shown by this option."}], "id": "q02"}, {"question": "In the 'Comparing Fractions with Common Denominators' method, what is the primary purpose of finding the least common denominator (LCD)?", "options": [{"text": "To simplify both fractions before comparison.", "isCorrect": false, "rationale": "Finding the LCD is for rewriting fractions with a common base, not necessarily for simplifying them. Fractions are simplified by dividing both numerator and denominator by their greatest common divisor."}, {"text": "To ensure that the fractions can be added or subtracted.", "isCorrect": false, "rationale": "While finding a common denominator is essential for addition and subtraction, in the context of *comparison*, its primary role is different. The question asks about the purpose within the comparison method."}, {"text": "To rewrite the fractions so their numerators can be directly compared.", "isCorrect": true, "rationale": "As per the property, after rewriting each fraction with the LCD, the next step is to 'Compare the numerators: the fraction with the larger numerator is the larger fraction.' This directly explains the purpose of the LCD in comparison."}, {"text": "To determine if the fractions are proper or improper.", "isCorrect": false, "rationale": "The LCD has no bearing on whether a fraction is proper (numerator < denominator) or improper (numerator ≥ denominator)."}], "id": "q03"}, {"question": "Compare $5/7$ and $7/10$ using the cross multiplication method.", "options": [{"text": "$5/7 > 7/10$ because $5 \times 10 = 50$ and $7 \times 7 = 49$, and $50 > 49$.", "isCorrect": true, "rationale": "Using cross multiplication, we compute $a \times d$ and $b \times c$. For $5/7$ and $7/10$, this means $5 \times 10 = 50$ and $7 \times 7 = 49$. Since $50 > 49$, it follows that $5/7 > 7/10$."}, {"text": "$5/7 < 7/10$ because $5 \times 10 = 50$ and $7 \times 7 = 49$, and $50 < 49$.", "isCorrect": false, "rationale": "The cross products are correctly calculated ($50$ and $49$), but the comparison $50 < 49$ is incorrect, leading to a wrong conclusion about the fractions."}, {"text": "$5/7 = 7/10$ because their cross products are close.", "isCorrect": false, "rationale": "Cross products must be exactly equal for fractions to be equal. 'Closeness' is not a criterion for equality, and $50$ is not equal to $49$."}, {"text": "$5/7 < 7/10$ because 7 is greater than 5.", "isCorrect": false, "rationale": "This reasoning incorrectly compares the numerators or simply part of the fractions without using either of the prescribed methods for fractions with different denominators."}], "id": "q04"}, {"question": "When comparing $a/b$ and $c/d$ using cross multiplication, if $a \times d = b \times c$, what does this imply about the fractions?", "options": [{"text": "The fraction $a/b$ is greater than $c/d$.", "isCorrect": false, "rationale": "This outcome occurs when $a \times d > b \times c$, not when they are equal."}, {"text": "The fraction $a/b$ is less than $c/d$.", "isCorrect": false, "rationale": "This outcome occurs when $a \times d < b \times c$, not when they are equal."}, {"text": "The fractions $a/b$ and $c/d$ are equal.", "isCorrect": true, "rationale": "The 'Comparing Fractions by Cross Multiplication' property explicitly states: 'If $a d = b c$, then the fractions are equal.'"}, {"text": "The fractions cannot be compared using this method.", "isCorrect": false, "rationale": "Equality is a valid result of comparison, indicating the method works perfectly in this scenario."}], "id": "q05"}, {"question": "Order the fractions $1/2$, $2/5$, and $3/4$ from least to greatest.", "options": [{"text": "$2/5 < 1/2 < 3/4$.", "isCorrect": true, "rationale": "To order these fractions, find the LCD of 2, 5, and 4, which is 20. Convert the fractions: $1/2 = 10/20$, $2/5 = 8/20$, and $3/4 = 15/20$. Ordering the numerators gives $8 < 10 < 15$, so $8/20 < 10/20 < 15/20$, which means $2/5 < 1/2 < 3/4$."}, {"text": "$1/2 < 2/5 < 3/4$.", "isCorrect": false, "rationale": "This order is incorrect because $1/2$ (or $10/20$) is greater than $2/5$ (or $8/20$). The initial comparison is wrong."}, {"text": "$3/4 < 1/2 < 2/5$.", "isCorrect": false, "rationale": "This order is completely reversed and incorrect. $3/4$ is the largest of the three, not the smallest."}, {"text": "$2/5 < 3/4 < 1/2$.", "isCorrect": false, "rationale": "This order is incorrect because $3/4$ (or $15/20$) is greater than $1/2$ (or $10/20$). The placement of $1/2$ and $3/4$ is swapped."}], "id": "q06"}, {"question": "To compare the mixed numbers $5 \frac{3}{7}$ and $5 \frac{4}{9}$, what is the most efficient method according to the text?", "options": [{"text": "Convert both mixed numbers to improper fractions and then find a common denominator for the improper fractions.", "isCorrect": false, "rationale": "While this method works, the text highlights a more efficient approach for mixed numbers when the whole parts are equal: comparing only the fraction parts. Converting to improper fractions adds unnecessary steps."}, {"text": "Compare only the fraction parts, $3/7$ and $4/9$, using either common denominators or cross multiplication.", "isCorrect": true, "rationale": "The text states in the 'Comparing Mixed Numbers' example and the 'Comparing and Ordering Fractions Summary' that 'For mixed numbers with the same whole part, compare only the fraction parts.' This is the most efficient method."}, {"text": "Since the whole parts are the same, the fractions must be equal.", "isCorrect": false, "rationale": "This is an incorrect assumption. Equal whole parts mean you must then compare the fractional parts to determine overall equality or inequality, as shown in the example."}, {"text": "Compare the denominators first; the one with the larger denominator is the smaller fraction.", "isCorrect": false, "rationale": "This is a common mistake and not a valid method for comparing fractions with different numerators. It can lead to incorrect conclusions."}], "id": "q07"}, {"question": "A recipe calls for $3/4$ cup of flour, but you only have a $2/3$ cup measuring tool. Do you have enough flour?", "options": [{"text": "Yes, because $3 \times 3 = 9$ and $4 \times 2 = 8$, so $9 > 8$, meaning $3/4 > 2/3$.", "isCorrect": false, "rationale": "The comparison $3/4 > 2/3$ is correct. However, if $3/4$ is *needed* and you only have $2/3$, then you *do not* have enough. The conclusion 'Yes' is incorrect given the problem statement."}, {"text": "No, because $3 \times 3 = 9$ and $4 \times 2 = 8$, so $9 > 8$, meaning $3/4 > 2/3$.", "isCorrect": true, "rationale": "To determine if you have enough, compare the amount needed ($3/4$) with the amount you have ($2/3$). Using cross multiplication: $3 \times 3 = 9$ (for $3/4$) and $4 \times 2 = 8$ (for $2/3$). Since $9 > 8$, it means $3/4 > 2/3$. This implies that the amount you have ($2/3$) is less than the amount needed ($3/4$), so you do not have enough flour."}, {"text": "Yes, because $3/4 = 9/12$ and $2/3 = 8/12$, so $9/12 > 8/12$, meaning you have enough.", "isCorrect": false, "rationale": "The conversion to a common denominator is correct, and $9/12 > 8/12$ correctly shows that $3/4 > 2/3$. However, if you need $3/4$ and only have $2/3$, you do not have enough, making the 'Yes' conclusion incorrect."}, {"text": "No, because $3/4$ and $2/3$ are too close to compare accurately with these methods.", "isCorrect": false, "rationale": "The methods described (common denominator and cross multiplication) are precise and allow for accurate comparison of any two fractions, regardless of how 'close' they appear."}], "id": "q08"}, {"question": "The 'caution' note warns against a common mistake. What is it?", "options": [{"text": "Incorrectly calculating the Least Common Denominator (LCD).", "isCorrect": false, "rationale": "While an incorrect LCD calculation is a mistake, it is not the specific 'common mistake' highlighted in the caution note."}, {"text": "Comparing numerators of fractions without first finding a common denominator.", "isCorrect": true, "rationale": "The caution note explicitly states: 'A common mistake is to compare numerators without finding a common denominator first. For example, $3/8$ is not greater than $2/5$ just because $3 > 2$.'"}, {"text": "Using cross multiplication when the denominators are not positive.", "isCorrect": false, "rationale": "The cross multiplication property specifies $b,d > 0$, but the caution note refers to a different, more general error in comparing fractions."}, {"text": "Forgetting to order the fractions from least to greatest in the final step.", "isCorrect": false, "rationale": "This is a procedural error in ordering, but not the fundamental conceptual mistake in comparison methods that the 'caution' note addresses."}], "id": "q09"}, {"question": "Which of the following statements accurately summarizes a key principle for comparing fractions as described in the 'Comparing and Ordering Fractions Summary'?", "options": [{"text": "The cross multiplication method always requires finding the LCD first.", "isCorrect": false, "rationale": "The summary lists the common denominator method and cross multiplication as two distinct approaches. Cross multiplication does not require finding the LCD; it uses cross products."}, {"text": "To order three or more fractions, cross multiplication is generally the most efficient method.", "isCorrect": false, "rationale": "The summary states, 'To order three or more fractions, rewrite all of them with a common denominator,' indicating this is the preferred method for multiple fractions, not cross multiplication."}, {"text": "When comparing mixed numbers with the same whole part, only the fraction parts need to be compared.", "isCorrect": true, "rationale": "This statement is directly from the summary: 'For mixed numbers with the same whole part, compare only the fraction parts.'"}, {"text": "Comparing numerators is always valid as long as the denominators are prime numbers.", "isCorrect": false, "rationale": "This contradicts the core principle of using a common denominator and the 'caution' note. Comparing numerators is only valid when the denominators are *already* the same, regardless of whether they are prime."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
