<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 9, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "A triangle has side lengths of 7 cm, 12 cm, and 7 cm. How would you classify this triangle by its sides?", "options": [{"text": "Scalene", "isCorrect": false, "rationale": "A scalene triangle has no sides equal. This triangle has two sides of 7 cm."}, {"text": "Isosceles", "isCorrect": true, "rationale": "An isosceles triangle is defined as having at least two sides equal. This triangle has two sides measuring 7 cm."}, {"text": "Equilateral", "isCorrect": false, "rationale": "An equilateral triangle has all three sides equal. This triangle only has two equal sides."}, {"text": "Right", "isCorrect": false, "rationale": "This classification relates to the angles of a triangle, not its side lengths."}]}, {"question": "Which of the following descriptions accurately defines an obtuse triangle?", "options": [{"text": "All three angles are less than 90 degrees.", "isCorrect": false, "rationale": "This describes an acute triangle, where all angles are acute."}, {"text": "One angle is exactly 90 degrees.", "isCorrect": false, "rationale": "This describes a right triangle, which has one right angle."}, {"text": "One angle is greater than 90 degrees.", "isCorrect": true, "rationale": "An obtuse triangle is defined by having exactly one angle that measures greater than 90 degrees."}, {"text": "All three sides are equal.", "isCorrect": false, "rationale": "This classifies a triangle by its sides (equilateral), not its angles."}]}, {"question": "A triangle has two angles measuring 35 degrees and 80 degrees. What is the measure of the third angle, and how would you classify this triangle by its angles?", "options": [{"text": "65 degrees; right triangle", "isCorrect": false, "rationale": "The third angle is 180 - (35 + 80) = 180 - 115 = 65 degrees. However, no angle is exactly 90 degrees, so it is not a right triangle."}, {"text": "65 degrees; acute triangle", "isCorrect": true, "rationale": "The sum of angles in a triangle is 180 degrees. So, the third angle is 180 - (35 + 80) = 180 - 115 = 65 degrees. Since all three angles (35, 80, and 65) are less than 90 degrees, it is an acute triangle."}, {"text": "115 degrees; obtuse triangle", "isCorrect": false, "rationale": "The sum of the first two angles is 115 degrees, but this is not the measure of the third angle. The third angle is 65 degrees."}, {"text": "65 degrees; obtuse triangle", "isCorrect": false, "rationale": "While the third angle is 65 degrees, none of the angles are greater than 90 degrees, so it is not an obtuse triangle."}]}, {"question": "Which type of quadrilateral is defined by having exactly one pair of parallel sides?", "options": [{"text": "Parallelogram", "isCorrect": false, "rationale": "A parallelogram has two pairs of parallel sides."}, {"text": "Rhombus", "isCorrect": false, "rationale": "A rhombus is a type of parallelogram, so it has two pairs of parallel sides."}, {"text": "Trapezoid", "isCorrect": true, "rationale": "A trapezoid is specifically defined as a quadrilateral with exactly one pair of parallel sides."}, {"text": "Rectangle", "isCorrect": false, "rationale": "A rectangle is a type of parallelogram, so it has two pairs of parallel sides."}]}, {"question": "A gardener is designing a flower bed that has four equal sides and two pairs of parallel sides, but its angles are not all 90 degrees. How should the gardener classify this shape as specifically as possible?", "options": [{"text": "Square", "isCorrect": false, "rationale": "A square has four equal sides AND four right angles. This shape does not have all right angles."}, {"text": "Rectangle", "isCorrect": false, "rationale": "A rectangle has four right angles and two pairs of parallel sides, but its sides are not necessarily equal. This shape has equal sides but not necessarily right angles."}, {"text": "Rhombus", "isCorrect": true, "rationale": "A rhombus is a parallelogram with four equal sides. This shape fits the description perfectly: it has four equal sides and two pairs of parallel sides (being a parallelogram), but its angles are not restricted to 90 degrees."}, {"text": "Trapezoid", "isCorrect": false, "rationale": "A trapezoid has only one pair of parallel sides, whereas this shape has two pairs (implied by 'two pairs of parallel sides' and 'rhombus' definitions)."}]}, {"question": "A quadrilateral has three interior angles measuring 70 degrees, 110 degrees, and 95 degrees. What is the measure of its fourth interior angle?", "options": [{"text": "85 degrees", "isCorrect": true, "rationale": "The sum of the interior angles of any quadrilateral is 360 degrees. Therefore, the fourth angle is 360 - (70 + 110 + 95) = 360 - 275 = 85 degrees."}, {"text": "90 degrees", "isCorrect": false, "rationale": "If the fourth angle were 90 degrees, the sum would be 70 + 110 + 95 + 90 = 365 degrees, which is incorrect."}, {"text": "100 degrees", "isCorrect": false, "rationale": "If the fourth angle were 100 degrees, the sum would be 70 + 110 + 95 + 100 = 375 degrees, which is incorrect."}, {"text": "185 degrees", "isCorrect": false, "rationale": "This would make the sum of the angles far greater than 360 degrees."}]}, {"question": "A triangle has side lengths of 6 cm, 8 cm, and 10 cm, and one of its angles is 90 degrees. Classify this triangle by both its sides and its angles.", "options": [{"text": "Equilateral right triangle", "isCorrect": false, "rationale": "The sides are not all equal (6, 8, 10), so it cannot be equilateral."}, {"text": "Isosceles acute triangle", "isCorrect": false, "rationale": "No sides are equal, so it's not isosceles. It also has a 90-degree angle, so it's not acute."}, {"text": "Scalene right triangle", "isCorrect": true, "rationale": "Since all three side lengths are different (6 cm, 8 cm, 10 cm), it is a scalene triangle. Since it has one angle that is exactly 90 degrees, it is a right triangle."}, {"text": "Scalene obtuse triangle", "isCorrect": false, "rationale": "While it is scalene, it has a 90-degree angle, not an angle greater than 90 degrees, so it's not obtuse."}]}, {"question": "Based on the classifications provided, which statement about the hierarchy of quadrilaterals is always true?", "options": [{"text": "Every rectangle is also a square.", "isCorrect": false, "rationale": "This is incorrect. A rectangle is only a square if all its sides are equal. The text explicitly states, 'not every rectangle is a square'."}, {"text": "Every rhombus is also a rectangle.", "isCorrect": false, "rationale": "This is incorrect. A rhombus is only a rectangle if all its angles are 90 degrees."}, {"text": "Every square is also a parallelogram.", "isCorrect": true, "rationale": "A square is defined as a rectangle with four equal sides, and a rectangle is defined as a parallelogram with four right angles. Therefore, a square inherits all the properties of a parallelogram, including having opposite sides parallel and equal."}, {"text": "Every parallelogram is also a rhombus.", "isCorrect": false, "rationale": "This is incorrect. A parallelogram is only a rhombus if its four sides are equal."}]}, {"question": "A student claims to have drawn a triangle with two angles measuring 100 degrees and 95 degrees. Which of the following statements is true about this claim?", "options": [{"text": "It's possible, and the third angle would be -15 degrees.", "isCorrect": false, "rationale": "Angles in a triangle cannot be negative, and the sum of the two given angles (195) already exceeds 180 degrees."}, {"text": "It's possible, and the third angle would be an acute angle.", "isCorrect": false, "rationale": "The sum of 100 degrees and 95 degrees is 195 degrees, which is already greater than the total sum of angles allowed in a triangle (180 degrees)."}, {"text": "It's not possible, because the sum of two angles already exceeds 180 degrees.", "isCorrect": true, "rationale": "The text states that a triangle can have at most one right or obtuse angle. If two angles are each 90 or more, their sum alone would be 180 or more, leaving no positive measure for the third angle. Here, 100 + 95 = 195, which is impossible for a triangle."}, {"text": "It's not possible, because all angles in a triangle must be less than 90 degrees.", "isCorrect": false, "rationale": "This statement is incorrect; right and obtuse triangles exist, which have angles equal to or greater than 90 degrees. The impossibility here is due to the sum, not the individual angle values themselves being >90."}]}, {"question": "An architect is designing a bridge support in the shape of an isosceles triangle. If the angle at the apex (top vertex) is 100 degrees, what are the measures of the two base angles, and how would you classify this triangle by its angles?", "options": [{"text": "40 degrees each; acute triangle", "isCorrect": false, "rationale": "While the base angles are 40 degrees, the triangle has an angle greater than 90 degrees (100 degrees), making it obtuse, not acute."}, {"text": "80 degrees each; obtuse triangle", "isCorrect": false, "rationale": "If the base angles were 80 degrees each, the sum of the angles would be 100 + 80 + 80 = 260 degrees, which is not 180 degrees."}, {"text": "40 degrees each; obtuse triangle", "isCorrect": true, "rationale": "In an isosceles triangle, the two base angles are equal. Let each base angle be x. The sum of angles is 180 degrees, so 100 + x + x = 180. This simplifies to 2x = 80, so x = 40 degrees. Since one angle (100 degrees) is greater than 90 degrees, the triangle is classified as obtuse."}, {"text": "50 degrees each; right triangle", "isCorrect": false, "rationale": "If the base angles were 50 degrees each, the sum of the angles would be 100 + 50 + 50 = 200 degrees, which is not 180 degrees. It is also not a right triangle as no angle is 90 degrees."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
