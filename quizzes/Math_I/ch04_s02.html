<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 4, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the fundamental first step required before multiplying mixed numbers?", "options": [{"text": "Multiply the whole parts together.", "isCorrect": false, "rationale": "The textbook explicitly warns against multiplying whole parts and fraction parts separately, as it leads to incorrect results."}, {"text": "Convert each mixed number to an improper fraction.", "isCorrect": true, "rationale": "According to the textbook's 'Multiplying Mixed Numbers' property, the very first step is to convert each mixed number to an improper fraction."}, {"text": "Find a common denominator for the fraction parts.", "isCorrect": false, "rationale": "Finding a common denominator is a step for adding or subtracting fractions, not for multiplication."}, {"text": "Multiply the fraction parts together.", "isCorrect": false, "rationale": "Multiplying fraction parts separately is part of the incorrect method the textbook advises against."}], "id": "q01"}, {"question": "A student attempts to multiply $2\\,12 \\times 3\\,13$ by multiplying the whole numbers ($2 \\times 3 = 6$) and the fractions ($1/2 \\times 1/3 = 1/6$) to get $6\\,16$. Why is this approach incorrect?", "options": [{"text": "It only works if the whole numbers are both prime.", "isCorrect": false, "rationale": "The correctness of the method is not dependent on whether the whole numbers are prime or not."}, {"text": "The fractions must be simplified before multiplication.", "isCorrect": false, "rationale": "While simplifying fractions is good practice, it's not the primary reason this specific multiplication method is incorrect for mixed numbers."}, {"text": "This method does not account for the interaction between the whole and fractional parts; mixed numbers must first be converted to improper fractions.", "isCorrect": true, "rationale": "The textbook's 'caution' note explicitly states this method is incorrect because it fails to account for the full value of the mixed numbers, necessitating conversion to improper fractions."}, {"text": "It is only incorrect if the whole parts are different.", "isCorrect": false, "rationale": "The method is incorrect for multiplying mixed numbers regardless of whether their whole parts are the same or different."}], "id": "q02"}, {"question": "In the process of multiplying mixed numbers, which step directly follows converting all mixed numbers to improper fractions?", "options": [{"text": "Multiplying the numerators.", "isCorrect": false, "rationale": "Multiplying numerators happens after cross-canceling."}, {"text": "Cross-canceling common factors.", "isCorrect": true, "rationale": "The textbook's 'Multiplying Mixed Numbers' property lists cross-canceling common factors as the second step, immediately after converting to improper fractions."}, {"text": "Finding a common denominator.", "isCorrect": false, "rationale": "Finding a common denominator is not a step in multiplying fractions."}, {"text": "Converting the final improper fraction back to a mixed number.", "isCorrect": false, "rationale": "This is a final simplification step, not an intermediate step in the multiplication process."}], "id": "q03"}, {"question": "Calculate the product of $2\\,14 \\times 23$.", "options": [{"text": "$1\\,12$", "isCorrect": true, "rationale": "First, convert $2\\,14$ to $9/4$. Then multiply $9/4 \\times 2/3$. Cross-canceling $9$ and $3$ (to $3$ and $1$) and $2$ and $4$ (to $1$ and $2$) results in $3/2 \\times 1/1 = 3/2$, which simplifies to $1\\,12$."}, {"text": "$1\\,712$", "isCorrect": false, "rationale": "This result likely stems from an error in conversion or an incorrect cross-cancellation."}, {"text": "$2\\,12$", "isCorrect": false, "rationale": "This result indicates a calculation error, possibly from incorrect handling of the mixed number or fraction multiplication."}, {"text": "$912$", "isCorrect": false, "rationale": "This is the result of multiplying without cross-canceling and not simplifying the resulting improper fraction."}], "id": "q04"}, {"question": "Evaluate $1\\,23 \\times 2\\,14$.", "options": [{"text": "$2\\,212$", "isCorrect": false, "rationale": "This result indicates an error in conversion or multiplication, possibly attempting to multiply parts separately."}, {"text": "$3\\,34$", "isCorrect": true, "rationale": "Convert $1\\,23$ to $5/3$ and $2\\,14$ to $9/4$. Multiply $5/3 \\times 9/4$. Cross-canceling $3$ and $9$ (to $1$ and $3$) yields $5/1 \\times 3/4 = 15/4$, which converts to $3\\,34$."}, {"text": "$154$", "isCorrect": false, "rationale": "This is the correct improper fraction result but not fully simplified to a mixed number as is often appropriate for final answers."}, {"text": "$3\\,512$", "isCorrect": false, "rationale": "This result suggests a calculation error during the multiplication or conversion."}], "id": "q05"}, {"question": "A baker needs to make $2\\,13$ batches of cookies. If one batch requires 6 cups of flour, how much flour is needed in total?", "options": [{"text": "$12\\,13$ cups", "isCorrect": false, "rationale": "While multiplying $6 \\times 2$ and $6 \\times 1/3$ and adding can yield $12+2=14$, the recommended method from the textbook for multiplying mixed numbers is to convert to an improper fraction first. This option implies an incomplete or incorrect application of the distributive property if not using the improper fraction method."}, {"text": "14 cups", "isCorrect": true, "rationale": "Convert $6$ to $6/1$ and $2\\,13$ to $7/3$. Multiply $6/1 \\times 7/3$. Cross-canceling $6$ and $3$ (to $2$ and $1$) gives $2/1 \\times 7/1 = 14/1 = 14$ cups."}, {"text": "$12$ cups", "isCorrect": false, "rationale": "This would be the result if only the whole number parts were multiplied ($6 \\times 2$), ignoring the fractional part."}, {"text": "$8\\,13$ cups", "isCorrect": false, "rationale": "This indicates a significant calculation error during the multiplication process."}], "id": "q06"}, {"question": "The textbook emphasizes cross-canceling common factors when multiplying fractions. What is the primary benefit of this step?", "options": [{"text": "It ensures the answer will always be a whole number.", "isCorrect": false, "rationale": "Cross-canceling often simplifies numbers but does not guarantee a whole number result, as seen in many examples."}, {"text": "It simplifies the calculation by reducing the size of the numbers before multiplication, making it easier to manage.", "isCorrect": true, "rationale": "The 'note' in the textbook explicitly states that cross-canceling makes the multiplication much easier by keeping the numbers smaller."}, {"text": "It allows for multiplication of whole parts and fraction parts separately.", "isCorrect": false, "rationale": "This is the incorrect method that the textbook warns against; cross-canceling does not facilitate it."}, {"text": "It is only necessary when one of the fractions is an improper fraction.", "isCorrect": false, "rationale": "Cross-canceling is a beneficial technique for any fraction multiplication, regardless of whether they are proper or improper."}], "id": "q07"}, {"question": "A craftsman has a wooden board $3\\,13$ feet long. He needs another piece that is $1\\,12$ times the length of the current board. What length of board does he need?", "options": [{"text": "$4\\,56$ feet", "isCorrect": false, "rationale": "This is an incorrect calculation; review conversion to improper fractions and cross-cancellation."}, {"text": "$3\\,16$ feet", "isCorrect": false, "rationale": "This is an incorrect calculation; ensure all steps of multiplication are followed correctly."}, {"text": "5 feet", "isCorrect": true, "rationale": "Convert $3\\,13$ to $10/3$ and $1\\,12$ to $3/2$. Multiply $10/3 \\times 3/2$. Cross-canceling $10$ and $2$ (to $5$ and $1$) and $3$ and $3$ (to $1$ and $1$) gives $5/1 \\times 1/1 = 5$ feet."}, {"text": "$4\\,12$ feet", "isCorrect": false, "rationale": "This indicates a calculation error in the multiplication or simplification process."}], "id": "q08"}, {"question": "After multiplying the numerators and denominators and simplifying, if the result is still an improper fraction, what is the appropriate final step according to the textbook?", "options": [{"text": "Leave it as an improper fraction.", "isCorrect": false, "rationale": "The 'Multiplying Mixed Numbers' property and 'keyconcept' summary both state that one should 'Simplify or convert back to a mixed number' for the final answer."}, {"text": "Convert it back to a mixed number.", "isCorrect": true, "rationale": "The textbook explicitly instructs to 'Convert improper fraction answers back to mixed numbers when appropriate' in the final step of the process and in the summary."}, {"text": "Round it to the nearest whole number.", "isCorrect": false, "rationale": "Rounding is an approximation and not a method for simplifying or presenting an exact fractional answer."}, {"text": "Invert the fraction.", "isCorrect": false, "rationale": "Inverting a fraction (reciprocal) is relevant for division, not for simplifying a multiplication product."}], "id": "q09"}, {"question": "Consider the multiplication of $3\\,12 \\times 1\\,13$. Which of the following statements accurately describes a step in solving this problem?", "options": [{"text": "The initial step involves multiplying $3 \\times 1 = 3$ and $1/2 \\times 1/3 = 1/6$.", "isCorrect": false, "rationale": "This is the incorrect method explicitly warned against in the 'caution' box and is not the recommended first step."}, {"text": "Converting $3\\,12$ to $7/2$ and $1\\,13$ to $4/3$ is the correct first step.", "isCorrect": true, "rationale": "As per the textbook's instructions and the checkpoint example, the first step is to convert all mixed numbers to improper fractions before multiplication."}, {"text": "Cross-canceling is not possible because there are no common factors between the initial numerators and denominators once converted.", "isCorrect": false, "rationale": "After converting to $7/2 \\times 4/3$, cross-canceling is possible between the numerator $4$ and the denominator $2$ (both divisible by $2$). This results in $7/1 \\times 2/3$."}, {"text": "The final answer, $4\\,23$, is obtained by multiplying the whole number parts of the original mixed numbers.", "isCorrect": false, "rationale": "The final answer is obtained by performing the full multiplication of the improper fractions and then simplifying, not by just multiplying the whole number parts."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
