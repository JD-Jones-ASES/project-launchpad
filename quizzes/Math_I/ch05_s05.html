<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 5, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following statements best describes a 'terminating decimal'?", "options": [{"text": "A decimal that continues for a very long time but eventually stops.", "isCorrect": false, "rationale": "While it eventually stops, the defining characteristic is that it has a finite, not just 'very long,' number of digits after the decimal point. The phrase 'very long time' is vague."}, {"text": "A decimal with a finite number of digits after the decimal point.", "isCorrect": true, "rationale": "According to the text, a terminating decimal 'ends (has a finite number of digits after the decimal point).' This option directly reflects that definition."}, {"text": "A decimal in which a sequence of digits repeats endlessly.", "isCorrect": false, "rationale": "This definition describes a 'repeating decimal,' not a terminating decimal."}, {"text": "A decimal that cannot be converted into a fraction.", "isCorrect": false, "rationale": "The text states that 'every terminating or repeating decimal represents a rational number and can be written as a fraction.' This option is incorrect."}]}, {"question": "When converting the fraction $5/6$ to a decimal, which characteristic will the resulting decimal have, and how should it be notated?", "options": [{"text": "It will be a terminating decimal, approximately $0.83$.", "isCorrect": false, "rationale": "Dividing $5$ by $6$ results in $0.8333...$, which is a repeating decimal, not a terminating one. Also, $0.83$ is an approximation, not the precise repeating notation."}, {"text": "It will be a repeating decimal, $0.83$.", "isCorrect": true, "rationale": "The text's checkpoint example for $5/6$ explicitly shows the answer as $0.83$, meaning the '3' repeats. This correctly identifies it as a repeating decimal and uses the bar notation for the repeating digit."}, {"text": "It will be a repeating decimal, $0.833$.", "isCorrect": false, "rationale": "While it is a repeating decimal, the notation $0.833$ is incorrect. The bar should only be over the repeating digit, which is $3$, not $83$ or just an approximation."}, {"text": "It will be a terminating decimal, $0.8333$.", "isCorrect": false, "rationale": "Dividing $5$ by $6$ shows that the decimal repeats, it does not terminate. The number of digits shown here is an approximation, not the correct representation for a repeating decimal."}]}, {"question": "According to the 'Converting a Decimal to a Fraction' property, what is the crucial final step when writing $0.6$ as a fraction?", "options": [{"text": "Reading the decimal using place value to determine the numerator.", "isCorrect": false, "rationale": "This is an important initial step to determine the *denominator* (and numerator implicitly), but it is not the *final* step according to the property."}, {"text": "Writing the fraction with 10 in the denominator because it's 'six tenths'.", "isCorrect": false, "rationale": "This is part of the second step, but not the final step. It correctly uses place value to form the initial fraction, $6/10$."}, {"text": "Simplifying the fraction to its lowest terms.", "isCorrect": true, "rationale": "The property explicitly states the third and final step is 'Simplify to lowest terms.' For $0.6 = 6/10$, the simplified form is $3/5$."}, {"text": "Dividing the numerator by the denominator to check the result.", "isCorrect": false, "rationale": "Checking the result is good practice but is not listed as a formal step in the conversion process itself for converting a decimal to a fraction. It's a method to verify the answer."}]}, {"question": "A baker needs $0.45$ kilograms of flour for a recipe. If their scale measures in fractions, how should they represent this amount in lowest terms?", "options": [{"text": "$45/100$ kilograms", "isCorrect": false, "rationale": "This is the correct initial fraction representation based on place value ('forty-five hundredths'), but it is not in 'lowest terms' as required by the question and the conversion process."}, {"text": "$9/20$ kilograms", "isCorrect": true, "rationale": "Following the steps for converting a decimal to a fraction: $0.45$ is 'forty-five hundredths' or $45/100$. Simplifying $45/100$ by dividing both numerator and denominator by their GCF, $5$, results in $9/20$. This is in lowest terms."}, {"text": "$4/5$ kilograms", "isCorrect": false, "rationale": "This fraction ($4/5$) corresponds to $0.8$, not $0.45$. The conversion is incorrect."}, {"text": "$0.9/2$ kilograms", "isCorrect": false, "rationale": "Fractions should have whole numbers in the numerator and denominator. This representation is not a standard fraction in lowest terms."}]}, {"question": "Which of the following fractions will result in a repeating decimal when converted?", "options": [{"text": "$3/8$", "isCorrect": false, "rationale": "As shown in the example, $3/8 = 0.375$, which is a terminating decimal because the division ends with a zero remainder."}, {"text": "$2/5$", "isCorrect": false, "rationale": "$2/5 = 0.4$, which is a terminating decimal. The division of $2$ by $5$ results in a zero remainder."}, {"text": "$1/3$", "isCorrect": true, "rationale": "As demonstrated in the text, $1/3 = 0.333...$ or $0.3$, which is a repeating decimal because the digit $3$ repeats endlessly without the division ever reaching a zero remainder."}, {"text": "$4/10$", "isCorrect": false, "rationale": "$4/10 = 0.4$, which is a terminating decimal. This is equivalent to $2/5$."}]}, {"question": "A student correctly converts a fraction to a decimal and gets $0.09$. Which fraction did they most likely start with?", "options": [{"text": "$1/9$", "isCorrect": false, "rationale": "The note section states $1/9 = 0.1$. This is not the correct conversion for $0.09$."}, {"text": "$1/10$", "isCorrect": false, "rationale": "$1/10 = 0.1$. This is not the correct conversion for $0.09$."}, {"text": "$1/11$", "isCorrect": true, "rationale": "The note section lists $1/11 = 0.09$, indicating that the digits '09' repeat. This matches the target decimal $0.09$."}, {"text": "$9/100$", "isCorrect": false, "rationale": "$9/100 = 0.09$. This is a terminating decimal, whereas $0.09$ indicates a repeating decimal. Therefore, $9/100$ is not the source of $0.09$."}]}, {"question": "Which statement accurately summarizes the relationship between fractions and decimals as presented in the 'Converting Between Fractions and Decimals Summary'?", "options": [{"text": "All decimals can be converted to 'nice' fractions, but not all fractions can be decimals.", "isCorrect": false, "rationale": "The caution note states 'Not every decimal can be converted to a “nice” fraction.' Also, the text states 'Every fraction can be written as either a terminating decimal or a repeating decimal,' making the second part of this statement incorrect."}, {"text": "Every fraction results in either a terminating or a repeating decimal, and all terminating or repeating decimals represent rational numbers.", "isCorrect": true, "rationale": "The summary states 'Every fraction equals either a terminating or a repeating decimal' and the caution note mentions 'every terminating or repeating decimal represents a rational number.' This option accurately combines these key concepts."}, {"text": "Only fractions with a denominator of a power of 10 result in terminating decimals.", "isCorrect": false, "rationale": "While fractions with denominators as powers of 10 do result in terminating decimals, other fractions, like $3/8$ ($0.375$), also result in terminating decimals. This statement is too restrictive."}, {"text": "Repeating decimals are not considered rational numbers because their digits are endless.", "isCorrect": false, "rationale": "The caution note explicitly states that 'every terminating or repeating decimal represents a rational number and can be written as a fraction.' This option is incorrect."}]}, {"question": "To convert the fraction $2/3$ to a decimal, what is the most appropriate first step according to the 'Converting a Fraction to a Decimal' property?", "options": [{"text": "Read the fraction using place value.", "isCorrect": false, "rationale": "Reading using place value is a step for converting a decimal to a fraction, not a fraction to a decimal."}, {"text": "Multiply the numerator and denominator by a power of 10.", "isCorrect": false, "rationale": "This action is not part of the standard conversion process from a fraction to a decimal as described in the text."}, {"text": "Divide the denominator by the numerator.", "isCorrect": false, "rationale": "The property states 'divide the numerator by the denominator,' not the other way around. Dividing denominator by numerator would give an incorrect result."}, {"text": "Divide the numerator by the denominator.", "isCorrect": true, "rationale": "The property for converting a fraction to a decimal explicitly states: 'divide the numerator by the denominator.' This is the correct first and primary step."}]}, {"question": "A student is converting $0.625$ to a fraction. After reading it as 'six hundred twenty-five thousandths' and writing it as $625/1000$, what is the next essential step to complete the conversion correctly?", "options": [{"text": "Identify if it is a repeating or terminating decimal.", "isCorrect": false, "rationale": "The nature of the decimal (terminating) is already clear by its form, and this step is not part of the conversion to a fraction after the initial fraction is formed."}, {"text": "Divide $625$ by $1000$ to confirm the decimal value.", "isCorrect": false, "rationale": "This is checking the work, not a step in converting the decimal to a fraction. The goal is to obtain the fractional form, not re-obtain the decimal."}, {"text": "Simplify the fraction $625/1000$ to its lowest terms.", "isCorrect": true, "rationale": "According to the 'Converting a Decimal to a Fraction' property, after writing the fraction with the appropriate power of 10 in the denominator, the next and final step is to 'Simplify to lowest terms.' For example, $625/1000$ simplifies to $5/8$."}, {"text": "Convert the fraction into a mixed number.", "isCorrect": false, "rationale": "Since $0.625$ is less than 1, converting to a mixed number is not applicable. The fraction will be a proper fraction. The goal is 'lowest terms,' not necessarily a mixed number."}]}, {"question": "What is the primary reason that fractions like $1/3$ and $1/6$ result in repeating decimals when converted, as opposed to fractions like $3/8$ and $2/5$ which result in terminating decimals?", "options": [{"text": "Fractions that result in repeating decimals have larger denominators.", "isCorrect": false, "rationale": "The size of the denominator alone does not determine if a decimal terminates or repeats. For example, $1/2$ has a small denominator but terminates, while $1/7$ has a small denominator but repeats. The key is the prime factors of the denominator relative to the base (10)."}, {"text": "The division process for these fractions never yields a remainder of zero.", "isCorrect": true, "rationale": "The text states that for $3/8$, 'The division ends (zero remainder), so the decimal terminates.' Conversely, for $1/3$, 'The digit $3$ repeats without end.' This implies that repeating decimals occur when the division process continues indefinitely without a zero remainder, causing digits to repeat."}, {"text": "The numerator is smaller than the denominator for repeating decimals.", "isCorrect": false, "rationale": "This is true for all proper fractions, whether they result in terminating ($3/8$) or repeating ($1/3$) decimals. It doesn't differentiate between the two types."}, {"text": "Repeating decimals always have a bar placed over their digits.", "isCorrect": false, "rationale": "While true that a bar is used to *notate* repeating decimals, this is a convention for writing them, not the *reason* they repeat during the conversion process. The reason lies in the division itself."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
