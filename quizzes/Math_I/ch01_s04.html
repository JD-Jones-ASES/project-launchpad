<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 1, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the provided text, the distributive property is unique because it is the only property that involves which two different types of operations simultaneously?", "options": [{"text": "Addition and Subtraction", "isCorrect": false, "rationale": "Addition and subtraction are inverse operations but are typically considered within the same family of combining quantities, not two 'different operations' in the sense the text describes for the distributive property."}, {"text": "Multiplication and Division", "isCorrect": false, "rationale": "Multiplication and division are inverse operations, and while the distributive property involves multiplication, it specifically does not work with division inside the parentheses."}, {"text": "Multiplication and Addition (or Subtraction)", "isCorrect": true, "rationale": "The text explicitly states: 'The distributive property connects multiplication with addition (or subtraction). It is the only property that involves two different operations at the same time.'"}, {"text": "Exponentiation and Multiplication", "isCorrect": false, "rationale": "Exponentiation is not mentioned as an operation connected by the distributive property in this context, nor is it discussed as a fundamental operation linked in this unique way."}]}, {"question": "When using the distributive property to find $8 \\cdot 97$ mentally, which of the following is the most effective first step based on the examples provided?", "options": [{"text": "$8 \\cdot (90 + 7)$", "isCorrect": false, "rationale": "While mathematically correct, breaking 97 into 90 + 7 doesn't simplify the multiplication as much as using a 'round number' like 100, which is a key strategy for mental math highlighted in the text."}, {"text": "$8 \\cdot (100 - 3)$", "isCorrect": true, "rationale": "The text suggests rewriting one factor as a sum or difference involving a 'round number' for mental math. 100 is a round number, making 8 \\u00b7 100 and 8 \\u00b7 3 easy to calculate."}, {"text": "$8 \\cdot 97$", "isCorrect": false, "rationale": "This is the original problem, not a step in applying the distributive property for mental calculation."}, {"text": "$(8 \\cdot 9) + (8 \\cdot 7)$", "isCorrect": false, "rationale": "This incorrectly distributes the multiplication across the digits of 97 rather than breaking 97 into a sum or difference of more convenient numbers."}]}, {"question": "Which of the following expressions correctly demonstrates the application of the distributive property to $5(12 + 4)$?", "options": [{"text": "$5 \\cdot 12 + 4$", "isCorrect": false, "rationale": "This option incorrectly distributes the 5 only to the first term (12) and fails to multiply it by the second term (4)."}, {"text": "$5 + 12 \\cdot 5 + 4$", "isCorrect": false, "rationale": "This option incorrectly adds 5 to the first term and omits a multiplication, misapplying the property."}, {"text": "$5 \\cdot 12 + 5 \\cdot 4$", "isCorrect": true, "rationale": "This correctly applies the distributive property by multiplying the factor outside the parentheses (5) by each term inside the parentheses (12 and 4), then adding the results."}, {"text": "$5 \\cdot 12 \\cdot 5 \\cdot 4$", "isCorrect": false, "rationale": "This option incorrectly replaces the addition within the parentheses with multiplication, and applies the factor 5 twice in a multiplicative chain, which is not how the distributive property works."}]}, {"question": "You are given the expression $7 \\cdot 48 + 7 \\cdot 52$. Using the distributive property in reverse (factoring), what is the simplified value of this expression?", "options": [{"text": "$7 + (48 + 52) = 107$", "isCorrect": false, "rationale": "This incorrectly changes the multiplication to addition with the common factor, which is not an application of factoring with the distributive property."}, {"text": "$7 \\cdot (48 + 52) = 700$", "isCorrect": true, "rationale": "This correctly applies the distributive property in reverse (factoring) by identifying the common factor (7) and multiplying it by the sum of the remaining terms (48 + 52), which simplifies to 7 \\u00b7 100 = 700."}, {"text": "$(7 \\cdot 48) + 52 = 336 + 52 = 388$", "isCorrect": false, "rationale": "This option only performs one of the multiplications and then adds the last term, failing to apply the distributive property to simplify the entire expression."}, {"text": "$(7+48) \\cdot (7+52) = 55 \\cdot 59 = 3245$", "isCorrect": false, "rationale": "This incorrectly attempts to factor by distributing the addition, rather than factoring out a common multiplicative term."}]}, {"question": "A gardener wants to find the total area of two adjacent rectangular flower beds. One bed is 15 meters long and 6 meters wide, and the other is also 15 meters long but 8 meters wide. Which expression correctly uses the distributive property to find the total area?", "options": [{"text": "$15 + (6 \\cdot 8)$", "isCorrect": false, "rationale": "This expression incorrectly adds the length to the product of the widths, which does not represent the total area using the distributive property."}, {"text": "$(15 \\cdot 6) + 8$", "isCorrect": false, "rationale": "This expression only calculates the area of one bed and then adds the width of the second bed, which is not the total area."}, {"text": "$15 \\cdot (6 + 8)$", "isCorrect": true, "rationale": "This correctly applies the distributive property. Since both beds have the same length (15m), the total area can be found by multiplying the common length by the sum of the widths ($6+8$), which is an application of the distributive property (Area = Length \\u00b7 (Width1 + Width2))."}, {"text": "$15 \\cdot 6 \\cdot 15 \\cdot 8$", "isCorrect": false, "rationale": "This expression incorrectly multiplies all four numbers together, which would result in a value far greater than the actual total area and does not represent a proper application of the distributive property for this problem."}]}, {"question": "The text provides a caution against misapplying the distributive property. Which of the following equations represents an INCORRECT application of the distributive property?", "options": [{"text": "$5(10 + 2) = 5 \\cdot 10 + 5 \\cdot 2$", "isCorrect": false, "rationale": "This is a correct application of the distributive property over addition."}, {"text": "$7(15 - 3) = 7 \\cdot 15 - 7 \\cdot 3$", "isCorrect": false, "rationale": "This is a correct application of the distributive property over subtraction."}, {"text": "$4(12 \\div 3) = (4 \\cdot 12) \\div (4 \\cdot 3)$", "isCorrect": true, "rationale": "The text explicitly states: 'The distributive property does not work with division inside the parentheses.' This option attempts to distribute multiplication over division, which is incorrect."}, {"text": "$(8 + 9) \\cdot 2 = 8 \\cdot 2 + 9 \\cdot 2$", "isCorrect": false, "rationale": "This is a correct application of the distributive property where the factor is on the right side of the parentheses."}]}, {"question": "Which statement best describes the primary advantage of using the distributive property for mental math, as illustrated by the examples in the text?", "options": [{"text": "It eliminates the need for any multiplication operations.", "isCorrect": false, "rationale": "The distributive property involves multiplication, just in smaller, easier steps, it doesn't eliminate it."}, {"text": "It allows a difficult multiplication to be broken down into simpler multiplications and additions or subtractions, often involving 'round' numbers.", "isCorrect": true, "rationale": "The text emphasizes breaking 'hard multiplication into easier parts' and 'rewrite one factor as a sum or difference involving a round number,' which is precisely what this option describes."}, {"text": "It converts all multiplication problems into simple addition problems.", "isCorrect": false, "rationale": "The property converts one multiplication into two or more simpler multiplications that are then added or subtracted, not solely into addition."}, {"text": "It guarantees that the final answer will always be a 'round' number.", "isCorrect": false, "rationale": "The method uses 'round numbers' in intermediate steps for ease of calculation, but the final answer itself does not necessarily have to be a round number (e.g., 318 in the first example)."}]}, {"question": "If you have an expression like $(b + c)a$, how would you correctly apply the distributive property according to the text?", "options": [{"text": "$b + ca$", "isCorrect": false, "rationale": "This incorrectly distributes the 'a' only to 'c' and ignores 'b'."}, {"text": "$ba + c$", "isCorrect": false, "rationale": "This incorrectly distributes the 'a' only to 'b' and ignores 'c'."}, {"text": "$ba + ca$", "isCorrect": true, "rationale": "The text explicitly states: 'You can also write the property with the factor on the right: $(b + c)a = ba + ca$.'"}, {"text": "$bc + a$", "isCorrect": false, "rationale": "This incorrectly multiplies 'b' and 'c' and then adds 'a', which is not the distributive property."}]}, {"question": "Which of the following expressions is equivalent to $11 \\cdot 75$ using the distributive property?", "options": [{"text": "$11 + 70 + 5$", "isCorrect": false, "rationale": "This option incorrectly uses only addition, failing to apply multiplication with the distributive property."}, {"text": "$11 \\cdot 70 + 5$", "isCorrect": false, "rationale": "This option incorrectly distributes 11 only to 70 and not to 5."}, {"text": "$11 \\cdot 70 + 11 \\cdot 5$", "isCorrect": true, "rationale": "This correctly applies the distributive property by breaking 75 into $70 + 5$ and then multiplying 11 by each part."}, {"text": "$11 + 70 \\cdot 11 + 5$", "isCorrect": false, "rationale": "This option incorrectly adds 11 to the first term and misplaces the 11 in the multiplication of the second term."}]}, {"question": "The 'keyconcept' summary states that the distributive property is especially powerful for mental math when you 'rewrite one factor as a sum or difference involving a round number.' Why is using a 'round number' (like 10, 100, etc.) particularly effective?", "options": [{"text": "Round numbers are always prime numbers, simplifying calculations.", "isCorrect": false, "rationale": "Round numbers like 10, 100 are composite, not prime. Their effectiveness comes from ease of multiplication, not primality."}, {"text": "Multiplying by round numbers typically involves adding zeros or shifting decimal places, which is easy to do mentally.", "isCorrect": true, "rationale": "Multiplying by 10, 100, etc., is straightforward (e.g., 6 \\u00b7 50 = 300, 8 \\u00b7 100 = 800), making these calculations much easier for mental math than multiplying by arbitrary numbers."}, {"text": "The distributive property only works if one of the terms is a round number.", "isCorrect": false, "rationale": "The distributive property works for any numbers $a, b, c$. Using round numbers is a strategy for *mental math*, not a requirement for the property itself."}, {"text": "Round numbers simplify the final addition or subtraction by always resulting in another round number.", "isCorrect": false, "rationale": "While the intermediate steps are simpler, the final sum or difference does not necessarily have to be a round number (e.g., 318, 776). The ease comes from the multiplication steps."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
