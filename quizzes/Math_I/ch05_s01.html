<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 5, Section 1</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary role of the decimal point in a number?", "options": [{"text": "To mark the beginning of the whole-number part.", "isCorrect": false, "rationale": "The decimal point separates the whole-number part from the fractional part; it doesn't mark the beginning of the whole-number part, which is to its left."}, {"text": "To separate the whole-number part from the fractional part.", "isCorrect": true, "rationale": "According to the text, 'A decimal point separates the whole-number part from the fractional part.'"}, {"text": "To indicate that the number is less than one.", "isCorrect": false, "rationale": "While decimals show values less than one, numbers can also have a whole-number part (e.g., 12.583). The decimal point's role is separation, not solely indicating less than one."}, {"text": "To signify multiplication between digits.", "isCorrect": false, "rationale": "The decimal point has no role in indicating multiplication; that is typically represented by symbols like 'x' or '•'."}], "id": "q01"}, {"question": "Which statement correctly distinguishes between 'tens' and 'tenths' in terms of place value?", "options": [{"text": "'Tens' refers to a decimal place, while 'tenths' refers to a whole-number place.", "isCorrect": false, "rationale": "This statement is incorrect. 'Tens' is a whole-number place, and 'tenths' is a decimal place."}, {"text": "'Tens' is a whole-number place, representing multiples of 10, and 'tenths' is a decimal place, representing fractions of 10.", "isCorrect": true, "rationale": "The text states, '“Tens” is a whole-number place; “tenths” is a decimal place.' 'Tens' is 10 times the ones place, and 'tenths' is one-tenth of the ones place."}, {"text": "Both 'tens' and 'tenths' refer to positions to the right of the decimal point.", "isCorrect": false, "rationale": "This statement is incorrect. 'Tens' is a whole-number place to the left of the decimal point, while 'tenths' is a decimal place to the right."}, {"text": "There is no significant difference; they are interchangeable terms depending on context.", "isCorrect": false, "rationale": "This statement is incorrect. The text explicitly highlights the difference between 'tens' (whole-number) and 'tenths' (decimal) due to their distinct place values."}], "id": "q02"}, {"question": "In the number 23.079, what is the place value of the digit 9?", "options": [{"text": "Tenths", "isCorrect": false, "rationale": "The tenths place is the first digit to the right of the decimal point (0 in this case)."}, {"text": "Hundredths", "isCorrect": false, "rationale": "The hundredths place is the second digit to the right of the decimal point (7 in this case)."}, {"text": "Thousandths", "isCorrect": true, "rationale": "The thousandths place is the third digit to the right of the decimal point, which is where the digit 9 is located."}, {"text": "Ones", "isCorrect": false, "rationale": "The ones place is the first digit to the left of the decimal point (3 in this case)."}], "id": "q03"}, {"question": "Which of the following correctly represents the standard form of 'six and thirty-five thousandths'?", "options": [{"text": "6.35", "isCorrect": false, "rationale": "6.35 represents 'six and thirty-five hundredths,' not thousandths. It lacks the zero in the hundredths place needed for 'thirty-five thousandths'."}, {"text": "6.035", "isCorrect": true, "rationale": "The word 'and' marks the decimal point. 'Thirty-five thousandths' means the last digit (5) must be in the thousandths place, requiring a 0 in the hundredths place: 0.035. Combined with 'six,' it becomes 6.035."}, {"text": "635.0", "isCorrect": false, "rationale": "This represents 'six hundred thirty-five,' which is a whole number, not a decimal with 'thousandths'."}, {"text": "6.305", "isCorrect": false, "rationale": "6.305 represents 'six and three hundred five thousandths,' not 'thirty-five thousandths'."}], "id": "q04"}, {"question": "What is the expanded form of the decimal 1.408?", "options": [{"text": "1 + 0.4 + 0.08", "isCorrect": false, "rationale": "This expanded form incorrectly places the 8 in the hundredths place and omits the thousandths place."}, {"text": "1 + 0.4 + 0.008", "isCorrect": true, "rationale": "The expanded form breaks down the number by place value: 1 (ones) + 0.4 (tenths) + 0.008 (thousandths). The 0 in the hundredths place is not included in the sum as it has no value."}, {"text": "1 + 0.0 + 0.4 + 0.008", "isCorrect": false, "rationale": "While mathematically correct, the 0.0 term for the hundredths place is redundant and typically omitted in a standard expanded form representation, as seen in the example 4 + 0.0 + 0.03 + 0.007 where it's 0.0."}, {"text": "1 + 4 + 0.008", "isCorrect": false, "rationale": "This expanded form incorrectly treats the 4 as a whole number (4 ones) instead of 4 tenths (0.4)."}], "id": "q05"}, {"question": "Which of the following comparisons is correct?", "options": [{"text": "0.85 < 0.8", "isCorrect": false, "rationale": "When comparing 0.85 and 0.8 (which can be written as 0.80), the tenths digits are equal (8=8). Moving to the hundredths, 5 > 0, so 0.85 > 0.8."}, {"text": "0.123 > 0.13", "isCorrect": false, "rationale": "When comparing 0.123 and 0.13 (which can be written as 0.130), the tenths digits are equal (1=1). Moving to the hundredths, 2 < 3, so 0.123 < 0.13."}, {"text": "0.76 = 0.7600", "isCorrect": true, "rationale": "Annexing zeros at the end of a decimal does not change its value. Therefore, 0.76 is equal to 0.7600."}, {"text": "0.45 > 0.451", "isCorrect": false, "rationale": "When comparing 0.45 (or 0.450) and 0.451, the tenths and hundredths digits are equal. Moving to the thousandths, 0 < 1, so 0.45 < 0.451."}], "id": "q06"}, {"question": "Order the following decimals from least to greatest: 1.25, 1.2, 1.025.", "options": [{"text": "1.2, 1.25, 1.025", "isCorrect": false, "rationale": "This order is incorrect because 1.025 is smaller than both 1.2 and 1.25."}, {"text": "1.025, 1.2, 1.25", "isCorrect": true, "rationale": "To compare, annex zeros: 1.250, 1.200, 1.025. Comparing from left to right: 1.025 (ones place 1, tenths place 0) is the smallest. Then, between 1.250 and 1.200, 1.200 (tenths place 2, hundredths place 0) is smaller than 1.250 (tenths place 2, hundredths place 5)."}, {"text": "1.25, 1.025, 1.2", "isCorrect": false, "rationale": "This order is incorrect because 1.25 is not the least, and 1.025 is not in the middle position."}, {"text": "1.2, 1.025, 1.25", "isCorrect": false, "rationale": "This order is incorrect because 1.025 is smaller than 1.2."}], "id": "q07"}, {"question": "A student is comparing two measurements: 5.3 meters and 5.295 meters. Which rod is longer and why?", "options": [{"text": "5.295 meters, because 295 is a larger number than 3.", "isCorrect": false, "rationale": "This compares digits in different places without aligning decimal points, which is a common error. 295 are thousandths, while 3 is tenths."}, {"text": "5.3 meters, because when annexing zeros (5.300), its thousandths place (0) is larger than the thousandths place of 5.295 (5).", "isCorrect": false, "rationale": "When comparing 5.300 and 5.295, the ones are equal (5=5). The tenths place (3 for 5.300 vs 2 for 5.295) determines the larger number. 3 > 2, so 5.3 meters is longer."}, {"text": "5.3 meters, because after annexing zeros (5.300), the tenths digit (3) is greater than the tenths digit (2) in 5.295.", "isCorrect": true, "rationale": "To compare, align decimal points and annex zeros: 5.300 and 5.295. Compare from left to right. The ones place is the same (5=5). In the tenths place, 3 > 2. Therefore, 5.3 meters is longer."}, {"text": "They are equal in length because both have a 5 in the ones place.", "isCorrect": false, "rationale": "While the ones place is the same, the fractional parts are different, meaning they are not equal."}], "id": "q08"}, {"question": "What is the effect of 'annexing zeros' at the end of a decimal number?", "options": [{"text": "It decreases the value of the decimal by making it more precise.", "isCorrect": false, "rationale": "Annexing zeros does not change the value of the decimal, nor does it inherently decrease it."}, {"text": "It increases the value of the decimal by adding more digits.", "isCorrect": false, "rationale": "Annexing zeros does not increase the value. For example, 3.5 = 3.50 = 3.500."}, {"text": "It changes the decimal into a whole number.", "isCorrect": false, "rationale": "Annexing zeros keeps the number a decimal; it does not convert it into a whole number."}, {"text": "It allows for easier comparison of decimals without changing the number's value.", "isCorrect": true, "rationale": "The text states, 'Annexing zeros means writing extra zeros at the end of a decimal without changing its value.' This technique is primarily used to ensure numbers have the same number of decimal places for comparison."}], "id": "q09"}, {"question": "Which of the following statements about writing or comparing decimals is FALSE?", "options": [{"text": "The word 'and' in a decimal's word form always indicates the decimal point.", "isCorrect": false, "rationale": "The text explicitly states: 'The word and marks the decimal point.'"}, {"text": "To compare decimals, you must first line up the decimal points.", "isCorrect": false, "rationale": "This is one of the key steps for comparing decimals as outlined in the 'Comparing Decimals' property."}, {"text": "Each place to the right of the decimal point is ten times the value of the place before it.", "isCorrect": true, "rationale": "This statement is FALSE. The text states, 'Each place to the right of the decimal point is one-tenth the place before it.' The 'ten times' rule applies to whole numbers moving left, not decimal places moving right."}, {"text": "Comparing digits from left to right is the final step in determining which decimal is larger.", "isCorrect": false, "rationale": "This is a correct step in comparing decimals, as described in the 'Comparing Decimals' property."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
