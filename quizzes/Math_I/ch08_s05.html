<head>
    <meta charset="UTF-8">

    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>

    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>

</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 8, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "To solve the equation $7x = 56$ for $x$, which inverse operation should be applied to both sides of the equation?", "options": [{"text": "Add 7", "isCorrect": false, "rationale": "Adding 7 is the inverse operation for subtraction, not multiplication. It would result in $7x + 7 = 63$, which does not isolate $x$."}, {"text": "Subtract 7", "isCorrect": false, "rationale": "Subtracting 7 is the inverse operation for addition, not multiplication. It would result in $7x - 7 = 49$, which does not isolate $x$."}, {"text": "Multiply by 7", "isCorrect": false, "rationale": "Multiplying by 7 would result in $49x = 392$, making the coefficient larger and moving away from isolating $x$. This is not the inverse operation."}, {"text": "Divide by 7", "isCorrect": true, "rationale": "According to the 'Solving $ax = b$' example and the Division Property of Equality, dividing both sides by the coefficient (7) is the correct inverse operation to isolate $x$. $7x/7 = 56/7 \\implies x = 8$."}], "id": "q01"}, {"question": "When solving the equation $m/8 = 12$, what is the first step to isolate the variable $m$?", "options": [{"text": "Divide both sides by 8", "isCorrect": false, "rationale": "Dividing both sides by 8 would result in $m/64 = 1.5$, which does not isolate $m$. Division is the operation present, so its inverse is multiplication."}, {"text": "Multiply both sides by 8", "isCorrect": true, "rationale": "As per the 'Solving $x/a = b$' example and the Multiplication Property of Equality, to undo division by 8, you must multiply both sides by 8. This isolates $m$: $8 \\times (m/8) = 8 \\times 12 \\implies m = 96$."}, {"text": "Add 8 to both sides", "isCorrect": false, "rationale": "Adding 8 is the inverse operation for subtraction, not division. This would result in $m/8 + 8 = 20$, which does not isolate $m$."}, {"text": "Subtract 8 from both sides", "isCorrect": false, "rationale": "Subtracting 8 is the inverse operation for addition, not division. This would result in $m/8 - 8 = 4$, which does not isolate $m$."}], "id": "q02"}, {"question": "To efficiently solve the equation $(2/3)x = 10$, what operation should be applied to both sides?", "options": [{"text": "Divide by 2/3", "isCorrect": false, "rationale": "While mathematically correct, dividing by a fraction is equivalent to multiplying by its reciprocal. The textbook explicitly states that 'For fractional coefficients, multiply by the reciprocal' as the most efficient method."}, {"text": "Multiply by 2/3", "isCorrect": false, "rationale": "Multiplying by $2/3$ would make the coefficient $(2/3) \\times (2/3) = 4/9$, which does not isolate $x$. It is not the inverse operation."}, {"text": "Multiply by 3/2", "isCorrect": true, "rationale": "As shown in the 'Fractional and Decimal Coefficients' example and the 'Solving One-Step Equations (Mult/Div) Summary', when the coefficient is a fraction, the most efficient method to solve for $x$ is to multiply by its reciprocal ($3/2$). $(3/2) \\times (2/3)x = (3/2) \\times 10 \\implies x = 15$."}, {"text": "Subtract 2/3", "isCorrect": false, "rationale": "Subtracting a fraction is incorrect because subtraction undoes addition, not multiplication. The 'Caution' box specifically warns against this approach."}], "id": "q03"}, {"question": "If $0.5w = 12.5$, what is the value of $w$?", "options": [{"text": "$w = 6.25$", "isCorrect": false, "rationale": "This result comes from multiplying $12.5$ by $0.5$, which is incorrect. The inverse of multiplication by $0.5$ is division by $0.5$."}, {"text": "$w = 25$", "isCorrect": true, "rationale": "As demonstrated in the 'Fractional and Decimal Coefficients' example, to solve $0.5w = 12.5$, you divide both sides by $0.5$. So, $w = 12.5 / 0.5 = 25$."}, {"text": "$w = 12$", "isCorrect": false, "rationale": "This result comes from subtracting $0.5$ from $12.5$, which is an incorrect operation for this type of equation."}, {"text": "$w = 13$", "isCorrect": false, "rationale": "This result comes from adding $0.5$ to $12.5$, which is an incorrect operation for this type of equation."}], "id": "q04"}, {"question": "Four friends share the cost of a gift equally. Each person pays $13.50. What was the total cost of the gift?", "options": [{"text": "$3.375", "isCorrect": false, "rationale": "This result comes from dividing $13.50$ by $4$, which would be finding an individual share if $13.50$ was the total cost. The problem requires finding the total cost given individual shares."}, {"text": "$17.50", "isCorrect": false, "rationale": "This result comes from adding $4$ to $13.50$, an incorrect operation to find the total cost when dealing with equal shares."}, {"text": "$54.00", "isCorrect": true, "rationale": "As shown in the 'Sharing Equally' example, if $c$ is the total cost, then $c/4 = 13.50$. To solve for $c$, you multiply both sides by 4: $c = 4 \\times 13.50 = 54$. The total cost was $54.00."}, {"text": "$9.50", "isCorrect": false, "rationale": "This result comes from subtracting $4$ from $13.50$, an incorrect operation to find the total cost when dealing with equal shares."}], "id": "q05"}, {"question": "The Division Property of Equality states that if $a = b$ and $c \\ne 0$, then $a/c = b/c$. This property is crucial because it permits what action when solving equations?", "options": [{"text": "Adding the same number to both sides of an equation.", "isCorrect": false, "rationale": "This describes the Addition Property of Equality, not the Division Property of Equality."}, {"text": "Multiplying both sides of an equation by the same non-zero number.", "isCorrect": false, "rationale": "This describes the Multiplication Property of Equality, not the Division Property of Equality."}, {"text": "Dividing both sides of an equation by the same non-zero number.", "isCorrect": true, "rationale": "The Division Property of Equality explicitly allows you to divide both sides of an equation by the same non-zero number, which is a fundamental step in solving equations like $ax=b$."}, {"text": "Subtracting the same number from both sides of an equation.", "isCorrect": false, "rationale": "This describes the Subtraction Property of Equality, not the Division Property of Equality."}], "id": "q06"}, {"question": "A student attempts to solve $3/4m = 18$ by 'subtracting the fraction' $3/4$ from both sides. Why is this action considered incorrect for solving this particular equation, according to the textbook's 'caution' note?", "options": [{"text": "Subtracting fractions is mathematically more complex than dividing.", "isCorrect": false, "rationale": "While it might be more complex, the primary reason given in the textbook is about the function of the operation, not its complexity."}, {"text": "Subtraction is the inverse operation for addition, not multiplication, so it cannot undo a coefficient.", "isCorrect": true, "rationale": "The 'caution' note states, 'Do not try to “subtract the fraction”—subtraction undoes addition, not multiplication.' For multiplication, the inverse operation is division or multiplying by the reciprocal."}, {"text": "You can only subtract whole numbers from both sides of an equation.", "isCorrect": false, "rationale": "This statement is false; you can subtract any number, including fractions or decimals, from both sides of an equation if it is the appropriate inverse operation for addition."}, {"text": "The number 18 is not a fraction, so you cannot subtract a fraction from it.", "isCorrect": false, "rationale": "This statement is false. You can subtract fractions from whole numbers by finding a common denominator."}], "id": "q07"}, {"question": "Solve the equation $8k = 50$.", "options": [{"text": "$k = 6$", "isCorrect": false, "rationale": "This is $50/8$ rounded down or an incorrect calculation. $8 \\times 6 = 48$, not $50$."}, {"text": "$k = 58$", "isCorrect": false, "rationale": "This would be the result of adding 8 to 50, which is an incorrect operation for solving a multiplication equation."}, {"text": "$k = 6.25$", "isCorrect": true, "rationale": "To solve $8k = 50$, you must divide both sides by 8. So, $k = 50/8 = 25/4 = 6.25$."}, {"text": "$k = 400$", "isCorrect": false, "rationale": "This would be the result of multiplying 50 by 8, which is an incorrect operation for solving a multiplication equation."}], "id": "q08"}, {"question": "What is the solution to the equation $z/(-3) = 15$?", "options": [{"text": "$z = -5$", "isCorrect": false, "rationale": "This is the result of dividing $15$ by $-3$, which is incorrect. To undo division by $-3$, you must multiply by $-3$."}, {"text": "$z = 5$", "isCorrect": false, "rationale": "This is the result of dividing $15$ by $3$, which is incorrect and ignores the negative sign."}, {"text": "$z = -45$", "isCorrect": true, "rationale": "To solve $z/(-3) = 15$, you multiply both sides by $-3$. So, $z = 15 \\times (-3) = -45$."}, {"text": "$z = 45$", "isCorrect": false, "rationale": "This result comes from multiplying $15$ by $3$ and ignoring the negative sign on the denominator."}], "id": "q09"}, {"question": "What is the 'big idea' or fundamental principle for solving one-step equations involving multiplication or division, as highlighted in the section's introduction and summary?", "options": [{"text": "Always perform addition or subtraction first to simplify the equation.", "isCorrect": false, "rationale": "This principle applies to multi-step equations but is not the core 'big idea' for isolating the variable in one-step multiplication or division equations. The textbook states you will combine skills for multi-step equations in a later chapter."}, {"text": "Combine all variable terms on one side and constant terms on the other.", "isCorrect": false, "rationale": "While important for solving equations, this describes a general strategy for organizing terms, not the specific fundamental principle for inverse operations in one-step equations."}, {"text": "Use the inverse operation to get the variable alone.", "isCorrect": true, "rationale": "The introduction states, 'The same big idea applies: use the inverse operation to get the variable alone.' This principle underlies all one-step equation solving."}, {"text": "Multiply all terms by a common denominator to eliminate fractions.", "isCorrect": false, "rationale": "This is a useful strategy for equations containing multiple fractions, but it's a specific technique rather than the overarching fundamental principle for using inverse operations to isolate a variable."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
