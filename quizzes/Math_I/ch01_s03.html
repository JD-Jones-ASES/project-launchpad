<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 1, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which equation demonstrates the Commutative Property of Addition?", "options": [{"text": "(a + b) + c = a + (b + c)", "isCorrect": false, "rationale": "This equation illustrates the Associative Property of Addition, which changes the grouping of addends, not their order."}, {"text": "a + 0 = a", "isCorrect": false, "rationale": "This equation demonstrates the Identity Property of Addition, where adding zero does not change the number."}, {"text": "a + b = b + a", "isCorrect": true, "rationale": "The Commutative Property of Addition states that changing the order of the addends does not change the sum. This equation clearly shows the order of 'a' and 'b' being swapped without affecting the result."}, {"text": "a * 0 = 0", "isCorrect": false, "rationale": "This equation represents the Zero Property of Multiplication, stating that any number multiplied by zero is zero."}], "id": "q01"}, {"question": "The equation (4 * 5) * 3 = 4 * (5 * 3) is an example of which property?", "options": [{"text": "Commutative Property of Multiplication", "isCorrect": false, "rationale": "The Commutative Property of Multiplication would change the order of factors (e.g., 4 * 5 = 5 * 4), but the order of the numbers in this equation (4, 5, 3) remains the same. Only the grouping (parentheses) changes."}, {"text": "Associative Property of Multiplication", "isCorrect": true, "rationale": "The Associative Property of Multiplication states that changing the grouping of the factors does not change the product. In the given equation, the factors (4, 5, 3) remain in the same order, but their grouping is changed from (4 * 5) to (5 * 3)."}, {"text": "Identity Property of Multiplication", "isCorrect": false, "rationale": "The Identity Property of Multiplication involves multiplying a number by 1, which is not present in this equation."}, {"text": "Zero Property of Multiplication", "isCorrect": false, "rationale": "The Zero Property of Multiplication involves multiplying a number by 0, which is not present in this equation."}], "id": "q02"}, {"question": "What property is illustrated by the statement 0 + 47 = 47?", "options": [{"text": "Commutative Property of Addition", "isCorrect": false, "rationale": "While the order of 0 and 47 could be swapped, the primary concept shown here is the effect of adding zero, not merely changing order."}, {"text": "Associative Property of Addition", "isCorrect": false, "rationale": "The Associative Property involves changing the grouping of three or more addends, which is not what this equation demonstrates."}, {"text": "Identity Property of Addition", "isCorrect": true, "rationale": "The Identity Property of Addition states that the sum of any number and 0 is that number. Zero is the additive identity, as shown by 0 + 47 = 47."}, {"text": "Zero Property of Multiplication", "isCorrect": false, "rationale": "This property involves multiplication by zero, not addition. The operation shown is addition."}], "id": "q03"}, {"question": "If 'x' is any whole number, which equation represents the Zero Property of Multiplication?", "options": [{"text": "x * 1 = x", "isCorrect": false, "rationale": "This equation illustrates the Identity Property of Multiplication, where multiplying by 1 does not change the number."}, {"text": "x + 0 = x", "isCorrect": false, "rationale": "This equation illustrates the Identity Property of Addition, where adding 0 does not change the number."}, {"text": "x * 0 = 0", "isCorrect": true, "rationale": "The Zero Property of Multiplication states that the product of any number and 0 is 0. This equation correctly demonstrates that principle."}, {"text": "x * y = y * x", "isCorrect": false, "rationale": "This equation illustrates the Commutative Property of Multiplication, which states that changing the order of factors does not change the product."}], "id": "q04"}, {"question": "To efficiently calculate 50 * 9 * 2 using mental math, which sequence of properties would be most helpful?", "options": [{"text": "Commutative Property, then Associative Property", "isCorrect": true, "rationale": "To make 50 * 9 * 2 easier, you would first use the Commutative Property to rearrange it to 50 * 2 * 9. Then, you would use the Associative Property to group (50 * 2) * 9, which simplifies to 100 * 9 = 900, a much easier calculation."}, {"text": "Associative Property, then Commutative Property", "isCorrect": false, "rationale": "While both properties are involved in mental math, applying associative first to (50 * 9) * 2 would result in 450 * 2, which is correct but doesn't simplify as much as creating a round number with the commutative property first."}, {"text": "Identity Property, then Commutative Property", "isCorrect": false, "rationale": "The Identity Property (multiplying by 1) is not relevant for simplifying this particular product to a round number, and no '1' is explicitly used."}, {"text": "Zero Property, then Associative Property", "isCorrect": false, "rationale": "The Zero Property (multiplying by 0) is not relevant here as there is no 0 in the multiplication problem."}], "id": "q05"}, {"question": "A student wants to find the sum of 125 + 68 + 75 mentally. Which strategy uses the properties of addition to simplify the calculation?", "options": [{"text": "Add 125 + 68 first, then add 75.", "isCorrect": false, "rationale": "This is a standard left-to-right calculation, not utilizing properties to create an easier 'round number' sum."}, {"text": "Rearrange as 125 + 75 + 68, then group (125 + 75).", "isCorrect": true, "rationale": "This strategy correctly uses the Commutative Property (rearranging 68 and 75) and then the Associative Property (grouping 125 + 75) to create a sum of 200, making the final addition 200 + 68 = 268 much simpler."}, {"text": "Group (68 + 75) first, then add 125.", "isCorrect": false, "rationale": "Grouping (68 + 75) = 143 does not result in a round number, making the next step 125 + 143 potentially less straightforward than creating 200 first."}, {"text": "Multiply 125 by 1, then add 68 and 75.", "isCorrect": false, "rationale": "Multiplying by 1 (Identity Property of Multiplication) is irrelevant to simplifying an addition problem and does not change the numbers to make the sum easier."}], "id": "q06"}, {"question": "What is the primary difference between the Commutative Property and the Associative Property when applied to addition?", "options": [{"text": "Commutative changes the grouping, Associative changes the order.", "isCorrect": false, "rationale": "This statement incorrectly reverses the definitions. The Commutative Property changes order, and the Associative Property changes grouping."}, {"text": "Commutative involves zero, Associative involves one.", "isCorrect": false, "rationale": "These descriptions refer to the Identity Properties (additive identity is 0, multiplicative identity is 1), not the Commutative or Associative Properties."}, {"text": "Commutative changes the order of addends, Associative changes the grouping of addends.", "isCorrect": true, "rationale": "The text clearly states that the Commutative Property changes the order of numbers, while the Associative Property changes how numbers are grouped using parentheses, keeping their order the same."}, {"text": "Commutative applies to addition only, Associative applies to multiplication only.", "isCorrect": false, "rationale": "Both Commutative and Associative Properties apply to both addition and multiplication."}], "id": "q07"}, {"question": "According to the text, which pair of operations do NOT typically follow the Commutative and Associative Properties?", "options": [{"text": "Addition and Multiplication", "isCorrect": false, "rationale": "The entire section focuses on how these properties DO hold for addition and multiplication."}, {"text": "Subtraction and Division", "isCorrect": true, "rationale": "The text explicitly states: 'Subtraction is not commutative... and division is not commutative... The commutative and associative properties apply only to addition and multiplication.'"}, {"text": "Multiplication and Division", "isCorrect": false, "rationale": "Multiplication does follow these properties; only division does not among this pair."}, {"text": "Addition and Subtraction", "isCorrect": false, "rationale": "Addition does follow these properties; only subtraction does not among this pair."}], "id": "q08"}, {"question": "A small bakery sells 12 dozen cookies on Monday, 8 dozen on Tuesday, and 18 dozen on Wednesday. To quickly find the total number of dozens sold, a baker thinks: 'I'll add 12 and 8 first, then add 18.' How could the baker use properties of addition to make this calculation even faster?", "options": [{"text": "12 * 1 + 8 + 18", "isCorrect": false, "rationale": "Multiplying by 1 (Identity Property) doesn't simplify the addition to a round number. The goal is to sum the numbers efficiently."}, {"text": "12 + (8 + 18)", "isCorrect": false, "rationale": "This uses the Associative Property, but adding 8 + 18 = 26 does not create a simple round number like 10, 20, 30, etc., that is easily added to 12."}, {"text": "(12 + 18) + 8", "isCorrect": true, "rationale": "By using the Commutative Property to change the order (12 + 18 + 8) and then the Associative Property to group (12 + 18), the baker gets 30 + 8, which is an easy mental calculation (38). This makes the calculation faster."}, {"text": "12 + 8 + 18 + 0", "isCorrect": false, "rationale": "Adding 0 (Identity Property of Addition) does not change the sum or make the calculation easier; it simply adds an unnecessary step."}], "id": "q09"}, {"question": "Which equation correctly illustrates the Identity Property of Multiplication?", "options": [{"text": "1 * 86 = 86", "isCorrect": true, "rationale": "The Identity Property of Multiplication states that the product of any number and 1 is that number. One is the multiplicative identity. This equation correctly demonstrates this principle."}, {"text": "86 * 0 = 0", "isCorrect": false, "rationale": "This equation illustrates the Zero Property of Multiplication, stating that any number multiplied by zero is zero."}, {"text": "(8 * 6) * 1 = 8 * (6 * 1)", "isCorrect": false, "rationale": "This equation primarily illustrates the Associative Property of Multiplication, as the grouping of factors is changed, even though 1 is present as a factor."}, {"text": "86 + 1 = 87", "isCorrect": false, "rationale": "This is a basic addition problem and does not illustrate the Identity Property of Multiplication, which involves multiplication, not addition."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
