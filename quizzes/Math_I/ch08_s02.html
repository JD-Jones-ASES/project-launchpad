<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 8, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "According to the provided text, what is the *first* step in evaluating an algebraic expression?", "options": [{"text": "Simplify using the order of operations.", "isCorrect": false, "rationale": "This is the final step, performed after substitution, not the first step."}, {"text": "Replace every variable with the given value (use parentheses).", "isCorrect": false, "rationale": "This is the second step in the given procedure, not the first."}, {"text": "Write the original expression.", "isCorrect": true, "rationale": "The 'Steps to Evaluate an Expression' property clearly states 'Write the original expression' as the first step."}, {"text": "Check your answer for accuracy.", "isCorrect": false, "rationale": "Checking the answer is a good practice but is not listed as one of the fundamental steps to evaluation in the text."}]}, {"question": "Evaluate the expression $5y - 8$ when $y = 3$.", "options": [{"text": "-1", "isCorrect": false, "rationale": "This result would occur if the multiplication was done incorrectly or if order of operations was not followed (e.g., 5 - 8 * 3)."}, {"text": "7", "isCorrect": true, "rationale": "Substituting y=3 gives $5(3) - 8 = 15 - 8 = 7$. This follows the correct steps and order of operations."}, {"text": "15", "isCorrect": false, "rationale": "This is the result of only multiplying $5 \\times 3$, without subtracting 8."}, {"text": "23", "isCorrect": false, "rationale": "This would result from an incorrect operation such as $5(3) + 8 = 15 + 8 = 23$, or $(5-8) \\times 3 = -9$ (incorrect order)."}]}, {"question": "Evaluate the expression $3k^2 + 10$ when $k = -2$.", "options": [{"text": "-2", "isCorrect": false, "rationale": "This would occur if $k^2$ was incorrectly calculated as $-4$, leading to $3(-4) + 10 = -12 + 10 = -2$."}, {"text": "22", "isCorrect": true, "rationale": "Substituting $k=-2$ gives $3(-2)^2 + 10 = 3(4) + 10 = 12 + 10 = 22$. The parentheses ensure the negative sign is squared."}, {"text": "-32", "isCorrect": false, "rationale": "This would result from an error such as $3(-2)^2 = 3(-4) = -12$, then $-12 + 10 = -2$, or another miscalculation leading to a larger negative number."}, {"text": "46", "isCorrect": false, "rationale": "This result is not achievable with correct calculation, possibly from incorrect squaring or addition."}]}, {"question": "When evaluating $x^2 + 7$ for $x = -4$, why is it crucial to write $ (-4)^2 $ instead of $ -4^2 $?", "options": [{"text": "To indicate that 4 is a positive number.", "isCorrect": false, "rationale": "The initial value of x is -4, not 4. The parentheses clarify that the *entire* negative number is being squared."}, {"text": "To ensure the negative sign is squared along with the number, resulting in a positive value.", "isCorrect": true, "rationale": "As explained in the 'note' and 'caution' sections, $(-4)^2 = (-4) \\times (-4) = 16$, whereas $-4^2 = -(4 \\times 4) = -16$. Parentheses correctly apply the exponent to the negative sign."}, {"text": "To separate the variable from the constant term.", "isCorrect": false, "rationale": "Parentheses serve to group the substituted value, not specifically to separate it from other terms, which is handled by the operations themselves."}, {"text": "The parentheses are only necessary for positive numbers.", "isCorrect": false, "rationale": "The text explicitly states to 'Always use parentheses when you substitute a negative number' because of the ambiguity and potential for error."}]}, {"question": "The area of a rectangle is given by the formula $A = lw$, where $l$ is the length and $w$ is the width. Find the area when $l = 9$ units and $w = 4$ units.", "options": [{"text": "13 square units", "isCorrect": false, "rationale": "This would be the result of adding the length and width ($9+4=13$), not multiplying them."}, {"text": "26 square units", "isCorrect": false, "rationale": "This result is incorrect and doesn't follow the formula for area."}, {"text": "36 square units", "isCorrect": true, "rationale": "Substituting $l=9$ and $w=4$ into the formula $A = lw$ gives $A = (9)(4) = 36$. This is directly from the example in the text."}, {"text": "81 square units", "isCorrect": false, "rationale": "This would be the result if only length was squared ($9^2=81$) or other incorrect operation."}]}, {"question": "A pizza delivery driver earns $$8.50$ per hour plus tips. Her total pay for one shift is given by $8.50h + t$, where $h$ is the number of hours and $t$ is the total tips. Find her pay when she works $6$ hours and receives $$24.75$ in tips.", "options": [{"text": "$$51.00", "isCorrect": false, "rationale": "This amount only represents her hourly wage earnings ($8.50 \\times 6 = 51.00$), without adding the tips."}, {"text": "$$24.75", "isCorrect": false, "rationale": "This amount only represents her tips, without adding her hourly wage earnings."}, {"text": "$$75.75", "isCorrect": true, "rationale": "Substituting $h=6$ and $t=24.75$ into the expression $8.50h + t$ gives $8.50(6) + 24.75 = 51.00 + 24.75 = 75.75$. This matches the example in the text."}, {"text": "$$13.00", "isCorrect": false, "rationale": "This result is significantly lower than expected and indicates a major calculation error."}]}, {"question": "Which of the following is the *correct* first step to evaluate the expression $7 - y^3$ when $y = -2$?", "options": [{"text": "$7 - (-2)^3$", "isCorrect": true, "rationale": "This correctly substitutes the negative value for 'y' using parentheses, ensuring the entire number, including the negative sign, is raised to the power of 3, as emphasized in the text's 'caution'."}, {"text": "$7 - -2^3$", "isCorrect": false, "rationale": "This format is ambiguous and could be misinterpreted. The text specifically advises against such ambiguous notation."}, {"text": "$7 - 2^3$", "isCorrect": false, "rationale": "This substitution incorrectly assumes 'y' is a positive 2, losing the negative sign of the given value."}, {"text": "$7 - (2)^3$", "isCorrect": false, "rationale": "While parentheses are used, they are around a positive 2, which is not the given value for 'y'."}]}, {"question": "In the context of algebraic expressions, what does the term 'evaluate' mean?", "options": [{"text": "To simplify an expression by combining like terms.", "isCorrect": false, "rationale": "Simplifying an expression involves manipulating it algebraically, while evaluating involves finding a numerical value."}, {"text": "To solve an equation for a variable.", "isCorrect": false, "rationale": "Solving an equation finds the value of a variable that makes the equation true, whereas evaluating finds the value of an expression for a *given* variable value."}, {"text": "To substitute given values for variables and compute the resulting numerical value.", "isCorrect": true, "rationale": "The keyterm 'Evaluate' definition explicitly states: 'To evaluate an algebraic expression, substitute the given value for each variable, then compute using the order of operations.'"}, {"text": "To factor an expression into its prime components.", "isCorrect": false, "rationale": "Factoring is a method of rewriting expressions, not of finding their numerical value for specific variable assignments."}]}, {"question": "Evaluate $10 - 2(x + 1)$ when $x = 3$.", "options": [{"text": "2", "isCorrect": true, "rationale": "Substituting $x=3$ gives $10 - 2(3 + 1) = 10 - 2(4) = 10 - 8 = 2$. This correctly follows the order of operations (parentheses first, then multiplication, then subtraction)."}, {"text": "8", "isCorrect": false, "rationale": "This would result if multiplication was done before the sum in parentheses, e.g. $10 - (2 \\times 3) + 1 = 10 - 6 + 1 = 5$ (which is incorrect), or $10 - 2x + 1$ (error in distribution)."}, {"text": "24", "isCorrect": false, "rationale": "This result could come from incorrect order of operations like $10 - 2 = 8$, then $8(3+1) = 8(4) = 32$ (still incorrect calculation to reach 24), or other misinterpretations."}, {"text": "32", "isCorrect": false, "rationale": "This could result if subtraction was done first: $(10-2)(3+1) = 8(4) = 32$, which violates the order of operations."}]}, {"question": "A student evaluates the expression $2x^2$ when $x = -5$. They get a result of $-50$. What was the likely mistake?", "options": [{"text": "They incorrectly squared the negative number, treating $(-5)^2$ as $-25$ instead of $25$.", "isCorrect": true, "rationale": "If $(-5)^2$ was mistakenly calculated as $-25$, then $2x^2$ would become $2(-25) = -50$. The text specifically cautions against this error by emphasizing parentheses for negative numbers in exponents."}, {"text": "They correctly squared the negative number, but then multiplied by -2 instead of 2.", "isCorrect": false, "rationale": "If they correctly squared to 25 and then multiplied by -2, the result would be $-50$. However, the coefficient is positive 2. This suggests the error was in the squaring, not the multiplication factor itself."}, {"text": "They forgot to substitute the value for $x$.", "isCorrect": false, "rationale": "If they forgot to substitute, they wouldn't arrive at a numerical answer like -50."}, {"text": "They added 2 to $x^2$ instead of multiplying.", "isCorrect": false, "rationale": "If they added, $2+(-5)^2 = 2+25 = 27$, which is not -50."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
