<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 2, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the sum of $(-15) + (-7)$?", "options": [{"text": "22", "isCorrect": false, "rationale": "This option incorrectly results from adding the absolute values and changing the sign to positive, ignoring the 'keep the shared sign' rule for same-sign addition."}, {"text": "-22", "isCorrect": true, "rationale": "According to the 'Adding Integers—Same Sign' rule, when integers have the same sign, you add their absolute values ($15 + 7 = 22$) and give the result the shared sign, which is negative."}, {"text": "-8", "isCorrect": false, "rationale": "This option results from incorrectly subtracting the absolute values ($15 - 7 = 8$) instead of adding them, then applying the negative sign."}, {"text": "8", "isCorrect": false, "rationale": "This option results from incorrectly subtracting the absolute values ($15 - 7 = 8$) and also changing the sign to positive, misapplying both rules."}], "id": "q01"}, {"question": "Evaluate $12 + (-19)$.", "options": [{"text": "7", "isCorrect": false, "rationale": "This option correctly subtracts the absolute values ($19 - 12 = 7$) but incorrectly assigns a positive sign, ignoring the 'sign of the number with the larger absolute value' rule."}, {"text": "-7", "isCorrect": true, "rationale": "According to the 'Adding Integers—Different Signs' rule, you subtract the smaller absolute value from the larger ($19 - 12 = 7$) and give the result the sign of the number with the larger absolute value, which is $-19$, so the result is negative."}, {"text": "-31", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values ($12 + 19 = 31$) instead of subtracting them, then applies a negative sign."}, {"text": "31", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values ($12 + 19 = 31$) and assigns a positive sign, misapplying the rule for different signs."}], "id": "q02"}, {"question": "Find the difference: $-10 - 4$.", "options": [{"text": "-14", "isCorrect": true, "rationale": "To subtract an integer, you add its opposite. So, $-10 - 4$ becomes $-10 + (-4)$. Since both integers have the same sign, add their absolute values ($10 + 4 = 14$) and keep the negative sign."}, {"text": "-6", "isCorrect": false, "rationale": "This option incorrectly subtracts the absolute values ($10 - 4 = 6$) instead of adding them after converting to addition of the opposite, then assigns a negative sign."}, {"text": "6", "isCorrect": false, "rationale": "This option incorrectly subtracts the absolute values ($10 - 4 = 6$) and assigns a positive sign, misapplying both subtraction and sign rules."}, {"text": "14", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values and assigns a positive sign, ignoring the negative signs in the operation."}], "id": "q03"}, {"question": "Calculate $8 - (-13)$.", "options": [{"text": "-5", "isCorrect": false, "rationale": "This option incorrectly handles the double negative, possibly treating it as $8 - 13$ or by incorrectly combining values."}, {"text": "5", "isCorrect": false, "rationale": "This option incorrectly handles the double negative and the sign, possibly treating it as $13 - 8$ but then reversing the sign."}, {"text": "21", "isCorrect": true, "rationale": "According to the 'Subtracting Integers' rule and the caution note, subtracting a negative integer is the same as adding a positive integer. So, $8 - (-13)$ becomes $8 + 13$, which equals $21$."}, {"text": "-21", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values and assigns a negative sign, misapplying the rule for double negatives."}], "id": "q04"}, {"question": "A business bank account has a balance of $-\\$150$. The owner makes a deposit of $\\$200$. What is the new balance?", "options": [{"text": "$-\\$50$", "isCorrect": false, "rationale": "This option incorrectly subtracts the absolute values and assigns the sign of the smaller absolute value to the result, or misinterprets the deposit as a further debt."}, {"text": "$50", "isCorrect": true, "rationale": "This is an addition problem: $-150 + 200$. Since the integers have different signs, subtract their absolute values ($200 - 150 = 50$). The number with the larger absolute value ($200$) is positive, so the result is positive."}, {"text": "$-\\$350$", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values ($150 + 200 = 350$) and assigns a negative sign, treating the deposit as a withdrawal or further debt."}, {"text": "$350", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values ($150 + 200 = 350$) instead of subtracting them, misapplying the rule for adding integers with different signs."}], "id": "q05"}, {"question": "The temperature in a freezer is $-5^\\circ C$. If the temperature drops by $12^\\circ C$, what is the new temperature?", "options": [{"text": "$7^\\circ C$", "isCorrect": false, "rationale": "This option incorrectly subtracts the absolute values and assigns a positive sign, misinterpreting 'drops' as adding a positive value."}, {"text": "$17^\\circ C$", "isCorrect": false, "rationale": "This option incorrectly adds the absolute values and assigns a positive sign, ignoring the negative context of the initial temperature and the drop."}, {"text": "$-7^\\circ C$", "isCorrect": false, "rationale": "This option incorrectly subtracts the absolute values ($12 - 5 = 7$) instead of adding them, even though it correctly assigns a negative sign."}, {"text": "$-17^\\circ C$", "isCorrect": true, "rationale": "A drop in temperature means subtracting, so the problem is $-5 - 12$. Using the rule 'add the opposite,' this becomes $-5 + (-12)$. Since both integers have the same sign, add their absolute values ($5 + 12 = 17$) and keep the negative sign."}], "id": "q06"}, {"question": "Evaluate the expression: $-3 + (-8) - (-4)$.", "options": [{"text": "-15", "isCorrect": false, "rationale": "This option incorrectly handles the last part of the expression, possibly treating $-(-4)$ as $-4$ instead of $+4$, leading to $-3 + (-8) + (-4) = -15$."}, {"text": "-7", "isCorrect": true, "rationale": "First, evaluate $-3 + (-8)$. Same signs, add absolute values ($3+8=11$), keep negative, so $-11$. Next, evaluate $-11 - (-4)$. Subtracting a negative is adding a positive, so $-11 + 4$. Different signs, subtract absolute values ($11-4=7$), use the sign of the larger absolute value (from $-11$), so the result is $-7$."}, {"text": "9", "isCorrect": false, "rationale": "This option indicates multiple errors in applying the rules for adding and subtracting integers with different signs and handling double negatives."}, {"text": "15", "isCorrect": false, "rationale": "This option indicates multiple errors, including incorrect absolute value operations and sign assignments."}], "id": "q07"}, {"question": "Which operation does starting at $4$ on a number line and moving $6$ units to the left represent?", "options": [{"text": "$4 + 6$", "isCorrect": false, "rationale": "Adding a positive number or moving right on a number line increases the value, which contradicts moving left."}, {"text": "$-4 + 6$", "isCorrect": false, "rationale": "This operation starts at $-4$, not $4$, and then moves right, which is incorrect for both starting position and direction."}, {"text": "$4 + (-6)$", "isCorrect": true, "rationale": "Starting at $4$ and moving $6$ units to the left on a number line represents decreasing the value by $6$. This is equivalent to subtracting $6$ or adding $-6$. $4 + (-6)$ correctly models this."}, {"text": "$-4 - 6$", "isCorrect": false, "rationale": "This operation starts at $-4$ and moves left from there, which is incorrect for the starting position."}], "id": "q08"}, {"question": "A student calculated $10 + (-18)$ as $28$. Which rule did the student most likely misapply?", "options": [{"text": "The rule for adding integers with the same sign.", "isCorrect": false, "rationale": "The student applied an operation similar to adding same-signed numbers (summing absolute values), but the original problem involves different signs, so this rule would not be directly applied."}, {"text": "The rule for adding integers with different signs.", "isCorrect": true, "rationale": "The problem $10 + (-18)$ involves adding integers with different signs. The correct rule is to subtract the absolute values ($18 - 10 = 8$) and use the sign of the number with the larger absolute value (negative, so $-8$). The student incorrectly added the absolute values ($10 + 18 = 28$) instead of subtracting them, indicating a misapplication of this specific rule."}, {"text": "The rule for subtracting integers.", "isCorrect": false, "rationale": "The problem is an addition problem, not a subtraction problem, so the rule for subtracting integers would not be the primary misapplication."}, {"text": "The rule for adding zero to an integer.", "isCorrect": false, "rationale": "The problem does not involve adding zero, so this rule is irrelevant to the error made."}], "id": "q09"}, {"question": "When subtracting an integer, $a - b$, which of the following expressions is equivalent to the original, according to the textbook's rule?", "options": [{"text": "$(-a) - b$", "isCorrect": false, "rationale": "This expression changes the sign of the first integer, which is not part of the rule for subtracting integers by adding the opposite."}, {"text": "$a + b$", "isCorrect": false, "rationale": "This expression is only equivalent if $b$ itself is a negative number (e.g., $a - (-b) = a + b$). The general rule for $a - b$ is to add the opposite of $b$."}, {"text": "$a + (-b)$", "isCorrect": true, "rationale": "The 'Subtracting Integers' property states: 'To subtract an integer, add its opposite.' Therefore, $a - b$ is equivalent to $a + (-b)$."}, {"text": "$-(a + b)$", "isCorrect": false, "rationale": "This expression incorrectly applies a negative sign to the entire sum, which is not an equivalent transformation for general integer subtraction."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
