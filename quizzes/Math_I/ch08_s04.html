<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 8, Section 4</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "What is the primary characteristic that defines an equation, according to the text?", "options": [{"text": "It always involves variables and unknown quantities.", "isCorrect": false, "rationale": "While equations often involve variables, the definition in the text emphasizes the equality of two expressions rather than the presence of variables as the primary characteristic."}, {"text": "It is a mathematical sentence that uses an equal sign to show that two expressions have the same value.", "isCorrect": true, "rationale": "The text explicitly defines an equation as 'a mathematical sentence that uses an equal sign ($=$) to show that two expressions have the same value.'"}, {"text": "It is a statement that simplifies an algebraic expression.", "isCorrect": false, "rationale": "An equation states that two expressions are equal; it is not merely a simplification of a single expression."}, {"text": "It always results in a single numerical answer for the variable.", "isCorrect": false, "rationale": "An equation has a solution (a value that makes it true), but the primary definition focuses on the statement of equality, not necessarily the result."}]}, {"question": "Which pair of operations are specifically identified as inverse operations that 'undo' each other in the context of solving one-step equations, according to the text?", "options": [{"text": "Addition and Multiplication", "isCorrect": false, "rationale": "Addition and multiplication are not inverse operations. For example, multiplying by 2 does not undo adding 2."}, {"text": "Addition and Subtraction", "isCorrect": true, "rationale": "The text explicitly states under 'Inverse Operations' that 'Addition and subtraction are inverse operations.'"}, {"text": "Subtraction and Division", "isCorrect": false, "rationale": "Subtraction and division are not inverse operations. For example, dividing by 2 does not undo subtracting 2."}, {"text": "Multiplication and Exponentiation", "isCorrect": false, "rationale": "Multiplication and exponentiation are not discussed as inverse operations in this section, nor are they typically considered direct inverse operations in this context."}]}, {"question": "To solve the equation $k - 15 = 40$, which operation should be applied to both sides to isolate $k$, based on the principle of inverse operations?", "options": [{"text": "Subtract 15 from both sides.", "isCorrect": false, "rationale": "Subtracting 15 would result in $k - 30 = 25$, which does not isolate $k$ and moves further from the solution. Subtraction is not the inverse of subtraction."}, {"text": "Add 15 to both sides.", "isCorrect": true, "rationale": "Since the equation has $k - 15$, the inverse operation of subtracting 15 is adding 15. Applying this to both sides ($k - 15 + 15 = 40 + 15$) correctly isolates $k$ as $k = 55$ according to the Addition Property of Equality."}, {"text": "Multiply both sides by 15.", "isCorrect": false, "rationale": "Multiplication is not the inverse operation for subtraction, and this operation is not relevant for solving an equation involving only addition/subtraction."}, {"text": "Divide both sides by 15.", "isCorrect": false, "rationale": "Division is not the inverse operation for subtraction, and this operation is not relevant for solving an equation involving only addition/subtraction."}]}, {"question": "According to the Subtraction Property of Equality, if $a = b$, then $a - c = b - c$. How would you correctly apply this property to solve the equation $m + 23 = 50$?", "options": [{"text": "Add 23 to both sides to get $m = 73$.", "isCorrect": false, "rationale": "Adding 23 to both sides would result in $m + 46 = 73$, which does not isolate $m$. This is also the wrong inverse operation for addition."}, {"text": "Subtract 23 from both sides to get $m = 27$.", "isCorrect": true, "rationale": "The equation has $m + 23$. To isolate $m$, you need to perform the inverse operation, which is subtracting 23. Applying this to both sides ($m + 23 - 23 = 50 - 23$) yields $m = 27$, correctly using the Subtraction Property of Equality."}, {"text": "Subtract 50 from both sides to get $m - 27 = 0$.", "isCorrect": false, "rationale": "Subtracting 50 from both sides would not isolate $m$ effectively and would lead to $m + 23 - 50 = 0$, or $m - 27 = 0$. While mathematically valid, it's not the direct method to solve for $m$ using the inverse of adding 23."}, {"text": "Add 50 to both sides to get $m + 73 = 100$.", "isCorrect": false, "rationale": "Adding 50 to both sides is not the correct inverse operation to isolate $m$ from $m + 23$ and does not simplify the equation to find $m$."}]}, {"question": "Solve the equation $y + 13 = 25$.", "options": [{"text": "$y = 38$", "isCorrect": false, "rationale": "This result comes from adding 13 to 25, which is not the inverse operation needed to isolate $y$. You should subtract 13, not add it."}, {"text": "$y = 12$", "isCorrect": true, "rationale": "To solve $y + 13 = 25$, you must subtract 13 from both sides: $y + 13 - 13 = 25 - 13$, which results in $y = 12$. Checking: $12 + 13 = 25$, which is true."}, {"text": "$y = -12$", "isCorrect": false, "rationale": "This result would occur if you subtracted 25 from 13, or if there was a sign error. The correct operation is $25 - 13$."}, {"text": "$y = 25/13$", "isCorrect": false, "rationale": "This involves division, which is not the inverse operation for addition. The equation is solved using subtraction."}]}, {"question": "What is the solution for the equation $p - 45 = 120$?", "options": [{"text": "$p = 75$", "isCorrect": false, "rationale": "This result comes from subtracting 45 from 120, which is incorrect. The inverse operation of subtracting 45 is adding 45."}, {"text": "$p = -75$", "isCorrect": false, "rationale": "This result would occur from an error in calculation or applying the wrong inverse operation."}, {"text": "$p = 165$", "isCorrect": true, "rationale": "To solve $p - 45 = 120$, you must add 45 to both sides: $p - 45 + 45 = 120 + 45$, which results in $p = 165$. Checking: $165 - 45 = 120$, which is true."}, {"text": "$p = 120/45$", "isCorrect": false, "rationale": "This involves division, which is not the inverse operation for subtraction. The equation is solved using addition."}]}, {"question": "Consider the equation $w - 2.25 = 3$. What is the solution and how is it found?", "options": [{"text": "$w = 0.75$, by subtracting 2.25 from both sides.", "isCorrect": false, "rationale": "Subtracting 2.25 from both sides would not isolate $w$. The inverse of subtracting 2.25 is adding 2.25."}, {"text": "$w = 5.25$, by adding 2.25 to both sides.", "isCorrect": true, "rationale": "To solve $w - 2.25 = 3$, you must perform the inverse operation of subtracting 2.25, which is adding 2.25 to both sides: $w - 2.25 + 2.25 = 3 + 2.25$, resulting in $w = 5.25$. This aligns with the example given for solving equations with decimals."}, {"text": "$w = -0.75$, by subtracting 3 from both sides.", "isCorrect": false, "rationale": "Subtracting 3 from both sides would yield $w - 5.25 = 0$, not isolating $w$ effectively."}, {"text": "$w = 6.75$, by adding 3 to both sides.", "isCorrect": false, "rationale": "Adding 3 to both sides would not isolate $w$ and is not the correct inverse operation for subtracting 2.25."}]}, {"question": "When solving an equation like $x + 5 = 12$, why is it crucial to perform the inverse operation (e.g., subtract 5) on *both* sides of the equation?", "options": [{"text": "To introduce a new variable on the right side.", "isCorrect": false, "rationale": "Performing operations on both sides is not about introducing new variables but maintaining the existing equality."}, {"text": "To simplify the right side of the equation only.", "isCorrect": false, "rationale": "While it often simplifies one or both sides, the primary reason is to maintain the balance of the equation, not just to simplify one side. The caution note explicitly states 'not just one. Whatever you do to one side you must do to the other.'"}, {"text": "To maintain the equality of the two expressions.", "isCorrect": true, "rationale": "The Addition and Subtraction Properties of Equality state that if you add or subtract the same number from both sides of an equation, the equality remains true. This is explicitly highlighted in the 'caution' section: 'Whatever you do to one side you must do to the other.'"}, {"text": "To make the equation easier to check later.", "isCorrect": false, "rationale": "While solving correctly makes checking easier, the fundamental reason for operating on both sides is to maintain the equation's truth, not just for the checking phase."}]}, {"question": "A store's inventory of a specific item decreased by 34 units this week. If the current inventory is 158 units, how many units were there before this week's decrease?", "options": [{"text": "124 units", "isCorrect": false, "rationale": "This would be the result if you subtracted 34 from 158, implying the current inventory was the initial one, which is incorrect for a decrease."}, {"text": "192 units", "isCorrect": true, "rationale": "Let $x$ be the initial inventory. The decrease means $x - 34 = 158$. To solve, add 34 to both sides: $x = 158 + 34 = 192$ units. This applies the same logic as the 'Savings Goal' example."}, {"text": "158 units", "isCorrect": false, "rationale": "158 is the current inventory after the decrease, not the initial amount."}, {"text": "34 units", "isCorrect": false, "rationale": "34 is the amount of the decrease, not the initial or final inventory."}]}, {"question": "Which of the following statements about solving one-step equations involving addition or subtraction is *incorrect* based on the provided summary?", "options": [{"text": "To solve $x + a = b$, you subtract $a$ from both sides.", "isCorrect": false, "rationale": "This statement is correct, as indicated in the 'Solving One-Step Equations (Add/Sub) Summary'."}, {"text": "To solve $x - a = b$, you add $a$ to both sides.", "isCorrect": false, "rationale": "This statement is correct, as indicated in the 'Solving One-Step Equations (Add/Sub) Summary'."}, {"text": "It is always unnecessary to check your solution in the original equation.", "isCorrect": true, "rationale": "This statement is incorrect. The summary explicitly advises: 'Always check your solution in the original equation.'"}, {"text": "You should use the inverse operation to isolate the variable.", "isCorrect": false, "rationale": "This statement is correct, as indicated in the 'Solving One-Step Equations (Add/Sub) Summary'."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
