<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 7, Section 5</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately defines a percent increase?", "options": [{"text": "It describes how much a quantity has gone up, expressed as a percent of the new amount.", "isCorrect": false, "rationale": "The definition of percent increase specifies that the change is expressed as a percent of the *original* amount, not the new amount."}, {"text": "It is the total new value of a quantity after an upward change.", "isCorrect": false, "rationale": "This describes the 'new amount' or 'new value,' not the 'percent increase' itself, which is a proportional measure of the change."}, {"text": "It describes how much a quantity has gone up, expressed as a percent of the original amount.", "isCorrect": true, "rationale": "This statement directly matches the keyterm definition for 'Percent Increase' provided in the textbook section."}, {"text": "It is simply the numerical difference between the new and original values.", "isCorrect": false, "rationale": "This describes the 'amount of change,' not the 'percent increase,' which must be expressed as a percentage."}]}, {"question": "The price of a vintage comic book increased from $75 to $90. What is the percent increase?", "options": [{"text": "16.7%", "isCorrect": false, "rationale": "This incorrect calculation uses the new amount ($90) as the denominator: (15 / 90) * 100% ≈ 16.7%."}, {"text": "20%", "isCorrect": true, "rationale": "The amount of change is $90 - $75 = $15. The percent increase is (Amount of Change / Original Amount) * 100% = ($15 / $75) * 100% = 0.20 * 100% = 20%."}, {"text": "15%", "isCorrect": false, "rationale": "This is the dollar amount of the increase, not the percent increase."}, {"text": "25%", "isCorrect": false, "rationale": "This is an incorrect calculation; for example, it might arise from incorrectly taking 15 as a percentage of a different base."}]}, {"question": "A city's annual rainfall decreased from 30 inches last year to 27 inches this year. What is the percent decrease?", "options": [{"text": "10%", "isCorrect": true, "rationale": "The amount of change is 30 - 27 = 3 inches. The percent decrease is (Amount of Change / Original Amount) * 100% = (3 / 30) * 100% = 0.10 * 100% = 10%."}, {"text": "11.1%", "isCorrect": false, "rationale": "This incorrect calculation uses the new amount (27 inches) as the denominator: (3 / 27) * 100% ≈ 11.1%."}, {"text": "3%", "isCorrect": false, "rationale": "This is the numerical amount of the decrease, not the percent decrease."}, {"text": "90%", "isCorrect": false, "rationale": "This represents the percentage of the original rainfall that remains, not the percentage of decrease."}]}, {"question": "According to the 'Percent Change Formula,' why is the 'original amount' always used as the denominator?", "options": [{"text": "Because it simplifies the calculation when dealing with negative changes.", "isCorrect": false, "rationale": "The choice of denominator is about establishing a consistent baseline for comparison, not simplifying negative numbers, as the amount of change itself is used as a positive value, and the context (increase/decrease) is determined by whether the new value is greater or less than the original."}, {"text": "To ensure the change is compared to the starting point, providing an accurate relative measure.", "isCorrect": true, "rationale": "The 'note' in the text explicitly states, 'The original amount is always the denominator. Compare the change to where you started, not where you ended.' This ensures the percent change accurately reflects the change relative to the initial state."}, {"text": "The new amount is often unknown, making the original amount the only practical choice.", "isCorrect": false, "rationale": "In most percent change problems, both the original and new amounts are known, as they are needed to calculate the 'amount of change.'"}, {"text": "Using the new amount as the denominator is reserved for calculating the percent of the original value that remains.", "isCorrect": false, "rationale": "While one could calculate the new amount as a percentage of the new amount (which would be 100%), using the new amount as the denominator for *percent change* calculation is explicitly identified as incorrect by the 'caution' box."}]}, {"question": "A collector's item, originally valued at $240, increased in value by 25%. What is its new value?", "options": [{"text": "$60", "isCorrect": false, "rationale": "This is the amount of the increase (0.25 * $240), not the new total value."}, {"text": "$265", "isCorrect": false, "rationale": "This would be the result if 25 was added directly, not 25%."}, {"text": "$300", "isCorrect": true, "rationale": "The amount of increase is 25% of $240, which is 0.25 * $240 = $60. The new value is the original amount plus the increase: $240 + $60 = $300."}, {"text": "$180", "isCorrect": false, "rationale": "This would be the result if the value decreased by 25%."}]}, {"question": "A laptop priced at $800 is marked down by 15%. What is the new sale price?", "options": [{"text": "$120", "isCorrect": false, "rationale": "This is the amount of the markdown (0.15 * $800), not the new sale price."}, {"text": "$680", "isCorrect": true, "rationale": "The amount of decrease is 15% of $800, which is 0.15 * $800 = $120. The new price is the original amount minus the decrease: $800 - $120 = $680."}, {"text": "$785", "isCorrect": false, "rationale": "This would be the result if 15 was subtracted directly, not 15%."}, {"text": "$920", "isCorrect": false, "rationale": "This would be the result if the price increased by 15%."}]}, {"question": "A bakery sold 300 loaves of bread last month. This month, they sold 330 loaves. What is the percent increase in sales?", "options": [{"text": "9.1%", "isCorrect": false, "rationale": "This incorrect calculation uses the new amount (330) as the denominator: (30 / 330) * 100% ≈ 9.1%."}, {"text": "10%", "isCorrect": true, "rationale": "The amount of change is 330 - 300 = 30 loaves. The percent increase is (Amount of Change / Original Amount) * 100% = (30 / 300) * 100% = 0.10 * 100% = 10%."}, {"text": "30%", "isCorrect": false, "rationale": "This is the numerical increase in loaves, not the percent increase."}, {"text": "33%", "isCorrect": false, "rationale": "This is an incorrect calculation, possibly from using the new amount or a miscalculation of the change."}]}, {"question": "Why does the 'caution' section specifically warn against using the new amount as the denominator for percent change calculations?", "options": [{"text": "Because it makes the percent change appear smaller than it actually is.", "isCorrect": false, "rationale": "Whether the percentage appears smaller or larger depends on the specific numbers involved, but the core issue isn't just about size, but accuracy relative to the starting point."}, {"text": "Because it provides a different (incorrect) percent that compares the change to the ending point, not the starting point.", "isCorrect": true, "rationale": "The text explicitly states: 'Always use the original amount as the denominator. Using the new amount gives a different (incorrect) percent.' This highlights that the reference point for the change is the origin."}, {"text": "Because the new amount is inherently less reliable than the original amount for mathematical operations.", "isCorrect": false, "rationale": "Both original and new amounts are equally reliable data points; the choice of denominator is a definitional aspect of percent change."}, {"text": "Because it will always result in a negative percentage, regardless of whether there was an increase or decrease.", "isCorrect": false, "rationale": "The sign of the percentage (increase/decrease) is determined by whether the new value is greater or less than the original, not by the choice of denominator in this context."}]}, {"question": "A product is on sale for $105 after a 30% markdown. What was the original price of the product?", "options": [{"text": "$135", "isCorrect": false, "rationale": "This would be the original price if $105 was 30% *more* than the original price, not 30% less. ($105 / 1.30 ≈ $80.77)."}, {"text": "$150", "isCorrect": true, "rationale": "If the original price is $x$, then a 30% markdown means $x - 0.30x = $105. This simplifies to $0.70x = $105. Solving for $x$ gives $x = $105 / 0.70 = $150."}, {"text": "$136.50", "isCorrect": false, "rationale": "This might arise from incorrectly adding 30% of $105 back to $105 ($105 + (0.30 * $105) = $136.50)."}, {"text": "$73.50", "isCorrect": false, "rationale": "This would be the result if 30% was taken *off* $105 ($105 - (0.30 * $105) = $73.50), not if $105 was the result of a 30% markdown."}]}, {"question": "Which of the following scenarios best demonstrates the concept of finding a 'new amount after an increase'?", "options": [{"text": "Calculating the percentage a population has grown over a decade.", "isCorrect": false, "rationale": "This describes calculating a *percent increase*, not the *new amount* itself."}, {"text": "Determining the original price of an item given its discounted sale price.", "isCorrect": false, "rationale": "This involves working backward from a decrease to find the original amount, not finding a new amount after an increase."}, {"text": "Adding the calculated interest to a principal amount to find the total balance in a savings account.", "isCorrect": true, "rationale": "This perfectly matches the 'new amount = original + (percent * original)' formula. The interest is the 'percent * original,' and adding it to the 'original' principal gives the 'new amount' (total balance)."}, {"text": "Subtracting the cost of a coupon from the original price of an item.", "isCorrect": false, "rationale": "This describes finding a new amount after a *decrease* (markdown/discount), not an increase."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
