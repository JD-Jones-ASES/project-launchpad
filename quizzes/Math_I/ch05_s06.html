<head>
    <meta charset="UTF-8">

    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 5, Section 6</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which of the following best describes a rational number according to the textbook section?", "options": [{"text": "Any number that can be written as a fraction with a non-zero numerator.", "isCorrect": false, "rationale": "The definition specifies that the number can be written as the quotient of two integers, $a/b$, where the denominator $b$ is not zero, not necessarily the numerator."}, {"text": "A number that can be expressed as the quotient of two integers, where the denominator is not zero.", "isCorrect": true, "rationale": "This statement directly matches the key term definition provided in the text: 'A rational number is any number that can be written as the quotient of two integers, $a/b$, where $b \\ne 0$'."}, {"text": "Any number that has a finite or repeating decimal representation.", "isCorrect": false, "rationale": "While terminating and repeating decimals are types of rational numbers, this describes a characteristic of rational numbers rather than their fundamental definition as a quotient of integers."}, {"text": "Numbers that can only be positive fractions or terminating decimals.", "isCorrect": false, "rationale": "This is incorrect because rational numbers also include negative numbers, repeating decimals, and integers."}], "id": "q01"}, {"question": "What is the primary strategy recommended for comparing rational numbers that are presented in different forms (e.g., fractions and decimals)?", "options": [{"text": "Convert all numbers to fractions with a common denominator.", "isCorrect": false, "rationale": "While possible, the text notes that converting to decimals is 'often the fastest method for comparing'."}, {"text": "Convert all numbers to their absolute values before comparing.", "isCorrect": false, "rationale": "Converting to absolute values would alter the true value of negative numbers and lead to incorrect comparisons of their actual values."}, {"text": "Convert all numbers to the same form, typically decimals.", "isCorrect": true, "rationale": "The text explicitly states this as the first step in 'Comparing Rational Numbers in Different Forms' and reinforces it in the 'keyconcept' summary."}, {"text": "Plot all numbers on a number line directly, regardless of form.", "isCorrect": false, "rationale": "Directly plotting mixed forms on a number line without prior conversion would be difficult and prone to error, as precise placement requires conversion."}], "id": "q02"}, {"question": "Compare $7/8$ and $0.87$. Which statement is true?", "options": [{"text": "$7/8 < 0.87$", "isCorrect": false, "rationale": "Converting $7/8$ to a decimal gives $0.875$. Since $0.875$ is greater than $0.870$, this statement is incorrect."}, {"text": "$7/8 = 0.87$", "isCorrect": false, "rationale": "Converting $7/8$ to a decimal gives $0.875$, which is not equal to $0.87$."}, {"text": "$7/8 > 0.87$", "isCorrect": true, "rationale": "To compare, convert $7/8$ to a decimal: $7 \\div 8 = 0.875$. Now compare $0.875$ and $0.870$. The tenths and hundredths digits are the same ($8$ and $7$), but in the thousandths place, $5 > 0$. Therefore, $0.875 > 0.87$, meaning $7/8 > 0.87$."}, {"text": "The numbers cannot be compared without more information.", "isCorrect": false, "rationale": "The numbers can be compared by converting them to the same form, as demonstrated."}], "id": "q03"}, {"question": "Order the following numbers from least to greatest: $0.6$, $2/3$, $5/8$.", "options": [{"text": "$0.6 < 5/8 < 2/3$", "isCorrect": true, "rationale": "Convert each number to a decimal: $0.6 = 0.600$, $2/3 \\approx 0.667$, and $5/8 = 0.625$. Comparing these decimals: $0.600 < 0.625 < 0.667$. Therefore, $0.6 < 5/8 < 2/3$."}, {"text": "$2/3 < 5/8 < 0.6$", "isCorrect": false, "rationale": "This order is incorrect; $2/3$ is the largest of the three, and $0.6$ is the smallest."}, {"text": "$5/8 < 0.6 < 2/3$", "isCorrect": false, "rationale": "This order is incorrect; $0.6$ is less than $5/8$."}, {"text": "$0.6 < 2/3 < 5/8$", "isCorrect": false, "rationale": "This order is incorrect; $5/8$ is less than $2/3$."}], "id": "q04"}, {"question": "Compare $-0.75$ and $-5/6$. Which statement is true?", "options": [{"text": "$-0.75 > -5/6$", "isCorrect": true, "rationale": "Convert $-5/6$ to a decimal: $-5/6 \\approx -0.833...$. Now compare $-0.75$ and $-0.833...$. On the number line, $-0.75$ is to the right of $-0.833...$, meaning it is greater. Alternatively, the absolute value of $-0.75$ is $0.75$, and the absolute value of $-0.833...$ is $0.833...$. Since $0.75 < 0.833...$, the negative number with the smaller absolute value is the greater number."}, {"text": "$-0.75 < -5/6$", "isCorrect": false, "rationale": "This is incorrect. $-0.75$ is closer to zero than $-5/6 \\approx -0.833...$, making it greater."}, {"text": "$-0.75 = -5/6$", "isCorrect": false, "rationale": "This is incorrect. $-0.75$ is exactly $-3/4$, which is not equal to $-5/6$."}, {"text": "The numbers are incomparable due to different forms.", "isCorrect": false, "rationale": "Rational numbers in different forms can be compared by converting them to the same form."}], "id": "q05"}, {"question": "When comparing two negative rational numbers, say $-A$ and $-B$ (where $A$ and $B$ are positive values), which statement is always true regarding their relationship?", "options": [{"text": "The number with the smaller absolute value is always the lesser number.", "isCorrect": false, "rationale": "This is incorrect. For negative numbers, the number with the smaller absolute value is closer to zero and thus *greater*. For example, $|-0.3| < |-0.5|$, but $-0.3 > -0.5$."}, {"text": "The number that appears farther to the right on a number line is the lesser number.", "isCorrect": false, "rationale": "Numbers farther to the right on a number line are always *greater*, regardless of their sign."}, {"text": "The number with the larger absolute value is the lesser number.", "isCorrect": true, "rationale": "As stated in the 'caution' and 'keyconcept' sections, for negative numbers, the one with the greater absolute value is farther to the left on the number line and is therefore the lesser number. For example, $|-0.5| > |-0.3|$, and $-0.5 < -0.3$."}, {"text": "The comparison depends on whether both $A$ and $B$ are integers or decimals.", "isCorrect": false, "rationale": "The rule for comparing negative numbers applies regardless of whether their absolute values are integers, decimals, or fractions."}], "id": "q06"}, {"question": "Order the following rational numbers from least to greatest: $-0.25$, $1/4$, $-1/3$, $0.2$.", "options": [{"text": "$-1/3 < -0.25 < 0.2 < 1/4$", "isCorrect": true, "rationale": "Convert all to decimals: $-0.25$, $1/4 = 0.25$, $-1/3 \\approx -0.333...$, $0.2$. Ordering these values: $-0.333... < -0.25 < 0.20 < 0.25$. So, $-1/3 < -0.25 < 0.2 < 1/4$."}, {"text": "$-0.25 < -1/3 < 0.2 < 1/4$", "isCorrect": false, "rationale": "This is incorrect because $-1/3 (\\approx -0.333)$ is less than $-0.25$."}, {"text": "$0.2 < 1/4 < -0.25 < -1/3$", "isCorrect": false, "rationale": "This is incorrect as positive numbers are always greater than negative numbers."}, {"text": "$1/4 < 0.2 < -0.25 < -1/3$", "isCorrect": false, "rationale": "This is incorrect as positive numbers are always greater than negative numbers, and $1/4$ is greater than $0.2$."}], "id": "q07"}, {"question": "A carpenter needs a piece of wood that is between $0.6$ inches and $5/8$ inches thick. Which of the following wood thicknesses would meet the requirement?", "options": [{"text": "$0.62$ inches", "isCorrect": true, "rationale": "First, convert $5/8$ to a decimal: $5 \\div 8 = 0.625$. The requirement is for a thickness between $0.6$ and $0.625$ inches. $0.62$ is greater than $0.6$ ($0.600$) and less than $0.625$. Therefore, $0.600 < 0.620 < 0.625$, so $0.62$ inches meets the requirement."}, {"text": "$0.59$ inches", "isCorrect": false, "rationale": "This is incorrect because $0.59$ inches is less than $0.6$ inches."}, {"text": "$2/3$ inches", "isCorrect": false, "rationale": "Convert $2/3$ to a decimal: $2/3 \\approx 0.667$. This is greater than $5/8$ ($0.625$), so it does not fit the requirement."}, {"text": "$0.63$ inches", "isCorrect": false, "rationale": "This is incorrect because $0.63$ inches is greater than $5/8$ ($0.625$) inches."}], "id": "q08"}, {"question": "Which of the following numbers is NOT a rational number, based on the definition provided?", "options": [{"text": "$-4$", "isCorrect": false, "rationale": "$-4$ is an integer and can be written as $-4/1$, making it a rational number."}, {"text": "$0.333...$", "isCorrect": false, "rationale": "$0.333...$ is a repeating decimal, which can be written as the fraction $1/3$, making it a rational number."}, {"text": "$2.5$", "isCorrect": false, "rationale": "$2.5$ is a terminating decimal, which can be written as $5/2$, making it a rational number."}, {"text": "$\\u221A2$", "isCorrect": true, "rationale": "$\\u221A2$ (the square root of 2) is an irrational number because it cannot be expressed as a simple fraction $a/b$ where $a$ and $b$ are integers and $b \\ne 0$. Its decimal representation is non-terminating and non-repeating."}], "id": "q09"}, {"question": "You are comparing the values $A = -2/5$, $B = -0.42$, and $C = -1/2$. If you order them from greatest to least, what is the correct sequence?", "options": [{"text": "$A > B > C$", "isCorrect": true, "rationale": "Convert all numbers to decimals: $A = -2/5 = -0.4$, $B = -0.42$, $C = -1/2 = -0.5$. Comparing these negative decimals, the number closest to zero is the greatest. $-0.4$ is closest to zero, followed by $-0.42$, and then $-0.5$ is farthest from zero. So, $-0.4 > -0.42 > -0.5$, meaning $A > B > C$."}, {"text": "$C > B > A$", "isCorrect": false, "rationale": "This order is incorrect. $C (-0.5)$ is the least of the three values."}, {"text": "$A > C > B$", "isCorrect": false, "rationale": "This order is incorrect. $B (-0.42)$ is greater than $C (-0.5)$."}, {"text": "$B > A > C$", "isCorrect": false, "rationale": "This order is incorrect. $A (-0.4)$ is greater than $B (-0.42)$."}], "id": "q10"}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = q.id || ('q' + qi);

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
