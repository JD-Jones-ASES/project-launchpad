        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 3, Section 2</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately defines equivalent fractions?", "options": [{"text": "Fractions that have the same numerator and denominator.", "isCorrect": false, "rationale": "This describes identical fractions, not necessarily equivalent fractions. Equivalent fractions represent the same amount but often have different numerators and denominators."}, {"text": "Fractions that represent the same proportion or part of a whole.", "isCorrect": true, "rationale": "The text states, 'Two fractions are equivalent if they represent the same part of a whole.'"}, {"text": "Fractions whose numerator and denominator have a common factor greater than 1.", "isCorrect": false, "rationale": "This describes fractions that are not in simplest form, but doesn't define equivalence itself."}, {"text": "Fractions that can only be created by multiplying the numerator and denominator by 2.", "isCorrect": false, "rationale": "Equivalent fractions can be created by multiplying or dividing by any non-zero number, not just 2."}]}, {"question": "Which of the following fractions is equivalent to 4/7?", "options": [{"text": "8/14", "isCorrect": true, "rationale": "Multiplying both the numerator (4) and the denominator (7) by the same non-zero number (2) produces an equivalent fraction: (4 * 2) / (7 * 2) = 8/14."}, {"text": "4/14", "isCorrect": false, "rationale": "Only the denominator was multiplied by 2, which changes the value of the fraction, making it not equivalent."}, {"text": "8/7", "isCorrect": false, "rationale": "Only the numerator was multiplied by 2, which changes the value of the fraction, making it not equivalent."}, {"text": "1/7", "isCorrect": false, "rationale": "This fraction is not equivalent to 4/7; it represents a different amount."}]}, {"question": "What condition must be met for a fraction to be in its simplest form?", "options": [{"text": "The numerator and denominator are both prime numbers.", "isCorrect": false, "rationale": "While some fractions in simplest form might have prime numerators and denominators (e.g., 2/3), it's not a strict requirement (e.g., 4/5 is simplest, but 4 is not prime)."}, {"text": "The numerator is smaller than the denominator.", "isCorrect": false, "rationale": "This describes a proper fraction, but a proper fraction is not necessarily in simplest form (e.g., 2/4 is proper but not simplest)."}, {"text": "The only common factor between the numerator and denominator is 1.", "isCorrect": true, "rationale": "The text defines simplest form as 'when the numerator and denominator have no common factor other than 1. In other words, (numerator,denominator) = 1.'"}, {"text": "The fraction has been divided by the smallest possible whole number.", "isCorrect": false, "rationale": "Simplifying involves dividing by the greatest common factor (GCF), not necessarily the smallest whole number, and this phrasing is ambiguous."}]}, {"question": "Simplify the fraction 30/45 to its simplest form.", "options": [{"text": "6/9", "isCorrect": false, "rationale": "While 30/45 can be reduced to 6/9 by dividing by 5, 6/9 is not in simplest form because 6 and 9 still share a common factor of 3."}, {"text": "2/3", "isCorrect": true, "rationale": "To simplify 30/45, find the greatest common factor (GCF) of 30 and 45, which is 15. Divide both the numerator and denominator by 15: 30 ÷ 15 = 2, and 45 ÷ 15 = 3. So, the simplest form is 2/3."}, {"text": "10/15", "isCorrect": false, "rationale": "While 30/45 can be reduced to 10/15 by dividing by 3, 10/15 is not in simplest form because 10 and 15 still share a common factor of 5."}, {"text": "1/2", "isCorrect": false, "rationale": "This is not equivalent to 30/45. 30/45 represents 2/3, not 1/2."}]}, {"question": "Which of the following fractions is NOT in its simplest form?", "options": [{"text": "5/7", "isCorrect": false, "rationale": "The GCF of 5 and 7 is 1, so 5/7 is in simplest form."}, {"text": "9/12", "isCorrect": true, "rationale": "The GCF of 9 and 12 is 3 (9=3*3, 12=3*4). Since their GCF is greater than 1, 9/12 is not in simplest form (it simplifies to 3/4)."}, {"text": "11/13", "isCorrect": false, "rationale": "The GCF of 11 and 13 is 1, so 11/13 is in simplest form."}, {"text": "17/19", "isCorrect": false, "rationale": "The GCF of 17 and 19 is 1, so 17/19 is in simplest form."}]}, {"question": "Are the fractions 12/20 and 18/30 equivalent?", "options": [{"text": "Yes, because 12/20 simplifies to 3/5 and 18/30 simplifies to 3/5.", "isCorrect": true, "rationale": "To determine equivalence, simplify both fractions. For 12/20, the GCF of 12 and 20 is 4, so 12÷4 / 20÷4 = 3/5. For 18/30, the GCF of 18 and 30 is 6, so 18÷6 / 30÷6 = 3/5. Since both simplify to the same fraction, they are equivalent."}, {"text": "No, because their numerators (12 and 18) are different.", "isCorrect": false, "rationale": "Equivalent fractions often have different numerators and denominators. The equality of numerators alone does not determine equivalence."}, {"text": "Yes, because multiplying 12 by 1.5 gives 18.", "isCorrect": false, "rationale": "While true for the numerators, for fractions to be equivalent by multiplication, both the numerator and denominator must be multiplied by the same non-zero whole number. (20 * 1.5 = 30, so this would actually lead to equivalence, but the rationale given is incomplete for a general rule). The best way to confirm is simplifying both."}, {"text": "No, because 12/20 is less than 1, while 18/30 is greater than 1.", "isCorrect": false, "rationale": "Both 12/20 and 18/30 are less than 1, as their numerators are smaller than their denominators. This statement is factually incorrect and doesn't address equivalence."}]}, {"question": "Using the cross-multiplication method, determine if 5/8 and 15/24 are equivalent.", "options": [{"text": "No, because 5 * 24 = 120 and 8 * 15 = 120, which shows they are not equal.", "isCorrect": false, "rationale": "The cross products are equal (120 = 120), which means the fractions *are* equivalent. The conclusion is incorrect."}, {"text": "Yes, because 5 * 24 = 120 and 8 * 15 = 120, so they are equal.", "isCorrect": true, "rationale": "According to the text, 'Since the cross products are equal, the fractions are equivalent.' Here, 5 * 24 = 120 and 8 * 15 = 120. Since 120 = 120, the fractions are equivalent."}, {"text": "No, because 15 is 3 times 5, but 24 is not 3 times 8.", "isCorrect": false, "rationale": "This statement is incorrect. 15 is indeed 3 times 5, and 24 *is* 3 times 8, indicating they are equivalent by multiplication."}, {"text": "Yes, because both fractions simplify to 1/3.", "isCorrect": false, "rationale": "While simplifying is another method, the question specifically asks for cross-multiplication. Also, neither 5/8 nor 15/24 simplifies to 1/3."}]}, {"question": "A gardener planted 21 rose bushes out of a total of 35 bushes. What fraction of the bushes are rose bushes, expressed in simplest form?", "options": [{"text": "21/35", "isCorrect": false, "rationale": "21/35 correctly represents the fraction, but it is not in simplest form, as 21 and 35 share a common factor of 7."}, {"text": "3/5", "isCorrect": true, "rationale": "The fraction is 21/35. To simplify, find the GCF of 21 and 35, which is 7. Divide both the numerator and denominator by 7: 21 ÷ 7 = 3, and 35 ÷ 7 = 5. So, the simplest form is 3/5."}, {"text": "7/10", "isCorrect": false, "rationale": "This fraction (7/10) is not equivalent to 21/35."}, {"text": "1/3", "isCorrect": false, "rationale": "This fraction (1/3) is not equivalent to 21/35."}]}, {"question": "A student attempts to create an equivalent fraction to 3/4 by adding 2 to the numerator, resulting in 5/4. Why is this incorrect?", "options": [{"text": "Adding to fractions is generally not the method for finding equivalent fractions.", "isCorrect": false, "rationale": "While true, this option is less precise than B in explaining the specific rule violation for creating equivalent fractions."}, {"text": "Only multiplication or division by the same non-zero number can produce an equivalent fraction.", "isCorrect": true, "rationale": "The caution note states, 'You must multiply or divide both the numerator and the denominator by the same number. Changing only one of them creates a different fraction, not an equivalent one.' Adding to only one part of the fraction does not create an equivalent fraction."}, {"text": "5/4 is an improper fraction, while 3/4 is a proper fraction, so they cannot be equivalent.", "isCorrect": false, "rationale": "While 5/4 is improper and 3/4 is proper, the type of fraction is not the primary reason they are not equivalent. The core issue is the operation used to transform the fraction."}, {"text": "The denominator was not changed, which automatically means it's not equivalent.", "isCorrect": false, "rationale": "While the denominator not changing contributed to the error, the fundamental rule broken is that only multiplication or division by the same factor (not addition) produces equivalence."}]}, {"question": "Based on the key concepts presented in the section, which statement about equivalent fractions and simplest form is true?", "options": [{"text": "Every fraction has exactly one equivalent fraction.", "isCorrect": false, "rationale": "The text explicitly states, 'There is no single “right” equivalent fraction—there are infinitely many.'"}, {"text": "A fraction can have multiple simplest forms depending on the method used.", "isCorrect": false, "rationale": "The text states, 'But there is only one simplest form for any fraction.'"}, {"text": "There are infinitely many equivalent fractions for any given fraction, but only one simplest form.", "isCorrect": true, "rationale": "This statement accurately summarizes the key note provided: 'There is no single “right” equivalent fraction—there are infinitely many. But there is only one simplest form for any fraction.'"}, {"text": "Simplest form is always obtained by repeatedly dividing by the smallest prime number.", "isCorrect": false, "rationale": "Simplest form is obtained by dividing by the greatest common factor (GCF), not necessarily the smallest prime, and this method isn't always efficient or correct if not applied systematically."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
