<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Quiz &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-breadcrumb">
        <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
    </div>
    <div class="quiz-hero">
        <h1>QUIZ</h1>
        <div class="subtitle">Math I &mdash; Chapter 3, Section 3</div>
    </div>

    <div id="score-box" class="score-box">
        <h2>Results</h2>
        <div class="score-pct" id="score-pct"></div>
        <div class="score-detail" id="score-detail"></div>
    </div>

    <div id="questions"></div>

    <div class="quiz-actions">
        <button class="quiz-btn" id="submit-btn" onclick="gradeQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" id="reset-btn" style="display:none" onclick="resetQuiz()">Try Again</button>
    </div>

    <div class="quiz-footer">
        Scholastica Codex &mdash; Self-Grading Quiz
    </div>
</div>

<script>
var QUESTIONS = [{"question": "Which statement accurately defines a proper fraction?", "options": [{"text": "Its numerator is greater than its denominator.", "isCorrect": false, "rationale": "This describes an improper fraction, not a proper fraction."}, {"text": "Its value is 1 or greater.", "isCorrect": false, "rationale": "This describes an improper fraction, not a proper fraction."}, {"text": "Its numerator is less than its denominator.", "isCorrect": true, "rationale": "According to the definition, a proper fraction has a numerator that is less than its denominator, and its value is between 0 and 1."}, {"text": "It combines a whole-number part and a proper-fraction part.", "isCorrect": false, "rationale": "This describes a mixed number, not a proper fraction."}]}, {"question": "An improper fraction is characterized by:", "options": [{"text": "A numerator less than its denominator.", "isCorrect": false, "rationale": "This describes a proper fraction, not an improper fraction."}, {"text": "A value always less than 1.", "isCorrect": false, "rationale": "Proper fractions have values less than 1. Improper fractions have values 1 or greater."}, {"text": "A numerator greater than or equal to its denominator.", "isCorrect": true, "rationale": "The text defines an improper fraction as having a numerator that is greater than or equal to its denominator, meaning its value is 1 or greater."}, {"text": "A whole number part combined with a fraction part.", "isCorrect": false, "rationale": "This describes a mixed number, not an improper fraction."}]}, {"question": "What does the mixed number 2 34 represent?", "options": [{"text": "The multiplication of 2, 3, and 4.", "isCorrect": false, "rationale": "A mixed number does not imply multiplication between its parts."}, {"text": "The subtraction of 34 from 2.", "isCorrect": false, "rationale": "A mixed number implies addition, not subtraction, between its whole and fractional parts."}, {"text": "2 + 34.", "isCorrect": true, "rationale": "The text explicitly states that 2 34 means 2 + 34, indicating the sum of a whole number and a proper fraction."}, {"text": "The fraction 234.", "isCorrect": false, "rationale": "This notation is for a mixed number, not a single fraction 23 divided by 4 or 2 divided by 34."}]}, {"question": "Convert the improper fraction 223 to a mixed number.", "options": [{"text": "3 27", "isCorrect": false, "rationale": "Dividing 22 by 3 gives a quotient of 7 with a remainder of 1. The denominator also changed incorrectly in this option."}, {"text": "7 13", "isCorrect": true, "rationale": "To convert 223 to a mixed number, divide 22 by 3. The quotient is 7, and the remainder is 1. So, the mixed number is 7 and 13 (7 13)."}, {"text": "22 13", "isCorrect": false, "rationale": "This option incorrectly uses the numerator as the whole number and changes the denominator."}, {"text": "1 223", "isCorrect": false, "rationale": "This option incorrectly sets the whole number and does not properly convert the fraction."}]}, {"question": "Convert the mixed number 4 56 to an improper fraction.", "options": [{"text": "246", "isCorrect": false, "rationale": "This option correctly multiplies the whole number by the denominator (4 × 6 = 24) but fails to add the numerator (5) to it."}, {"text": "296", "isCorrect": true, "rationale": "To convert 4 56, multiply the whole number (4) by the denominator (6), which is 24. Then add the numerator (5), resulting in 29. The denominator remains 6, so the improper fraction is 296."}, {"text": "456", "isCorrect": false, "rationale": "This option incorrectly interprets the mixed number as a single fraction without the conversion steps."}, {"text": "546", "isCorrect": false, "rationale": "This option incorrectly places the whole number in the numerator and changes the original numerator to the denominator."}]}, {"question": "Which of the following numbers represents an improper fraction?", "options": [{"text": "58", "isCorrect": false, "rationale": "58 is a proper fraction because its numerator (5) is less than its denominator (8)."}, {"text": "2 13", "isCorrect": false, "rationale": "2 13 is a mixed number, which combines a whole number and a proper fraction."}, {"text": "127", "isCorrect": true, "rationale": "127 is an improper fraction because its numerator (12) is greater than its denominator (7)."}, {"text": "0.5", "isCorrect": false, "rationale": "0.5 is a decimal, not an improper fraction. It could be written as the proper fraction 12."}]}, {"question": "You have 175 meters of rope. Which of the following mixed numbers describes the same length?", "options": [{"text": "1 75 meters", "isCorrect": false, "rationale": "This option incorrectly uses 7 as the numerator and 5 as the whole number. 17 divided by 5 is not 1 with a remainder of 7."}, {"text": "3 25 meters", "isCorrect": true, "rationale": "To convert 175 to a mixed number, divide 17 by 5. The quotient is 3 (the whole number part), and the remainder is 2 (the new numerator). The denominator stays 5. Thus, 175 is equal to 3 25."}, {"text": "5 17 meters", "isCorrect": false, "rationale": "This option incorrectly swaps the numerator and denominator and uses 5 as the whole number."}, {"text": "2 35 meters", "isCorrect": false, "rationale": "Dividing 17 by 5 results in a quotient of 3, not 2."}]}, {"question": "A baker uses 136 cups of sugar for a large batch of cookies. How can this amount be expressed as a mixed number for easier measurement?", "options": [{"text": "1 36 cups", "isCorrect": false, "rationale": "This option incorrectly converts the fraction; 13 divided by 6 is not 1 with a remainder of 3."}, {"text": "2 16 cups", "isCorrect": true, "rationale": "To convert 136 to a mixed number, divide 13 by 6. The quotient is 2 (whole number), and the remainder is 1 (new numerator). The denominator remains 6. So, 136 = 2 16 cups."}, {"text": "6 13 cups", "isCorrect": false, "rationale": "This option incorrectly inverts the fraction and uses the denominator as the whole number."}, {"text": "136 cups (no change needed)", "isCorrect": false, "rationale": "The question asks to express the amount as a mixed number for easier understanding/measurement, implying a conversion is needed from the improper fraction."}]}, {"question": "A carpenter needs to cut 3 14 foot sections of wood. If they want to calculate the total number of quarter-foot pieces they have, converting 3 14 to an improper fraction is beneficial because:", "options": [{"text": "It simplifies the addition process with other mixed numbers.", "isCorrect": false, "rationale": "While mixed numbers can be added, converting to improper fractions isn't inherently simpler for *all* addition, and the question specifically asks about 'total number of quarter-foot pieces'."}, {"text": "It helps to visualize the length on a number line more clearly.", "isCorrect": false, "rationale": "Mixed numbers are often easier to visualize on a number line as they directly indicate the whole number range."}, {"text": "It directly tells the total number of equal smaller parts (quarters).", "isCorrect": true, "rationale": "Converting 3 14 to an improper fraction (134) makes the numerator (13) explicitly represent the total number of quarter-foot pieces (13 quarters), which is useful for counting or calculations involving those smaller units."}, {"text": "Mixed numbers are generally harder to work with in calculations.", "isCorrect": false, "rationale": "This is a generalization that isn't always true; both forms have their uses depending on the specific calculation or context."}]}, {"question": "According to the 'Caution' note, what is a common error when converting a mixed number like 3 27 to an improper fraction?", "options": [{"text": "Forgetting to multiply the whole number by the denominator.", "isCorrect": false, "rationale": "While an error, the 'Caution' note specifically highlights a different common mistake."}, {"text": "Incorrectly adding the numerator to the denominator.", "isCorrect": false, "rationale": "The note doesn't mention adding numerator to denominator as the primary error."}, {"text": "Forgetting to add the numerator after multiplying.", "isCorrect": true, "rationale": "The 'Caution' note explicitly states: 'A common error is to write 3 27 as 217 instead of the correct 237,' which implies forgetting to add the numerator (2) after multiplying the whole number (3) by the denominator (7)."}, {"text": "Keeping the original numerator instead of a new one.", "isCorrect": false, "rationale": "When converting a mixed number to an improper fraction, the original numerator IS added to the product of the whole number and denominator to form the new numerator, so this statement is confusing in context."}]}];
var graded = false;

function buildQuiz() {
    var container = document.getElementById('questions');
    container.innerHTML = '';
    QUESTIONS.forEach(function(q, qi) {
        var block = document.createElement('div');
        block.className = 'question-block';
        block.id = 'q' + qi;

        var numEl = document.createElement('div');
        numEl.className = 'question-num';
        numEl.textContent = 'Question ' + (qi + 1) + ' of ' + QUESTIONS.length;
        block.appendChild(numEl);

        var textEl = document.createElement('div');
        textEl.className = 'question-text';
        textEl.innerHTML = q.question;
        block.appendChild(textEl);

        q.options.forEach(function(opt, oi) {
            var label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'q' + qi + '_o' + oi;

            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q' + qi;
            radio.value = oi;
            label.appendChild(radio);

            var span = document.createElement('span');
            span.innerHTML = opt.text;
            label.appendChild(span);
            block.appendChild(label);

            var rat = document.createElement('div');
            rat.className = 'rationale';
            rat.id = 'rat_q' + qi + '_o' + oi;
            rat.innerHTML = opt.rationale;
            block.appendChild(rat);
        });

        container.appendChild(block);
    });
    if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
}

function gradeQuiz() {
    if (graded) return;
    graded = true;
    var correct = 0;

    QUESTIONS.forEach(function(q, qi) {
        var block = document.getElementById('q' + qi);
        var selected = document.querySelector('input[name="q' + qi + '"]:checked');
        var selectedIdx = selected ? parseInt(selected.value) : -1;

        var correctIdx = -1;
        q.options.forEach(function(opt, oi) {
            if (opt.isCorrect) correctIdx = oi;
        });

        if (selectedIdx === correctIdx) {
            correct++;
            block.classList.add('correct');
            document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-correct');
        } else {
            block.classList.add('incorrect');
            if (selectedIdx >= 0) {
                document.getElementById('q' + qi + '_o' + selectedIdx).classList.add('selected-incorrect');
            }
            document.getElementById('q' + qi + '_o' + correctIdx).classList.add('was-correct');
        }

        if (selectedIdx >= 0) {
            document.getElementById('rat_q' + qi + '_o' + selectedIdx).classList.add('show');
        }
        if (correctIdx !== selectedIdx) {
            document.getElementById('rat_q' + qi + '_o' + correctIdx).classList.add('show');
        }

        var radios = block.querySelectorAll('input[type="radio"]');
        radios.forEach(function(r) { r.disabled = true; });
    });

    var pct = Math.round(correct / QUESTIONS.length * 100);
    document.getElementById('score-pct').textContent = pct + '%';
    document.getElementById('score-detail').textContent = correct + ' of ' + QUESTIONS.length + ' correct';
    document.getElementById('score-box').style.display = 'block';
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'inline-block';
    document.getElementById('score-box').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    graded = false;
    document.getElementById('score-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'inline-block';
    document.getElementById('reset-btn').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
